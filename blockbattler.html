<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Battler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0e0;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
#topbar{display:flex;align-items:center;padding:6px 12px;gap:12px;background:#111118;border-bottom:2px solid #1e1e2a}
#topbar a{color:#ff6b35;text-decoration:none;font-size:20px}
#topbar h1{font-size:18px;color:#ff6b35;letter-spacing:2px}
#best{margin-left:auto;color:#f7c948;font-size:13px}
#gamearea{flex:1;display:flex;flex-direction:column;min-height:0}
canvas{flex:1;display:block;width:100%}
#panel{background:#111118;border-top:2px solid #1e1e2a;padding:6px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:56px;overflow-x:auto}
.btn{padding:5px 10px;background:#1a1a24;border:2px solid #2a2a3a;color:#ccc;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:#ff6b35;color:#ff6b35}
.btn.sel{background:#ff6b35;color:#fff;border-color:#ff6b35}
.btn:disabled{opacity:.35;cursor:default}
.btn.go{background:#ff6b35;color:#fff;border-color:#ff6b35;font-weight:bold;font-size:14px}
.btn.go:hover{background:#ff8855}
#info{display:flex;gap:14px;font-size:13px;margin-right:auto;flex-shrink:0}
.gold{color:#f7c948;font-weight:bold}.hp-txt{color:#4ade80}.round-txt{color:#ff6b35}
</style>
</head>
<body>
<div id="topbar">
<a href="index.html">&#8592;</a>
<h1>BLOCK BATTLER</h1>
<span id="best"></span>
</div>
<div id="gamearea"><canvas id="C"></canvas></div>
<div id="panel"></div>
<script>
const C=document.getElementById('C'),ctx=C.getContext('2d'),panel=document.getElementById('panel'),bestEl=document.getElementById('best');
let W,H,FLOOR;
function resize(){W=C.width=C.offsetWidth;H=C.height=C.offsetHeight;FLOOR=H-14}
resize();window.onresize=resize;

// ===== AUDIO =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(freq,dur,type='square',vol=0.018){
  try{const o=AC.createOscillator(),g=AC.createGain();o.type=type;
  o.frequency.setValueAtTime(freq,AC.currentTime);o.frequency.exponentialRampToValueAtTime(Math.max(freq*.25,20),AC.currentTime+dur);
  g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur)}catch(e){}}
function sndNoise(dur,vol=0.015){
  try{const n=AC.createBufferSource(),buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);n.buffer=buf;
  const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=600;
  const g=AC.createGain();g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dur);
  n.connect(f);f.connect(g);g.connect(AC.destination);n.start();n.stop(AC.currentTime+dur)}catch(e){}}
const sfx={
  place(){snd(440,.08,'sine');snd(554,.08,'sine',0.01)},
  impact(){sndNoise(.12,0.018);snd(100,.1,'sawtooth',0.012)},
  shatter(){sndNoise(.25,0.02);snd(70,.2,'sawtooth',0.015)},
  explode(){sndNoise(.35,0.02);snd(50,.35,'square',0.018)},
  buy(){snd(880,.06,'sine',0.012);snd(1100,.06,'sine',0.008)},
  roundStart(){snd(523,.12,'square',0.015);setTimeout(()=>snd(659,.12,'square',0.015),120);setTimeout(()=>snd(784,.15,'square',0.015),240)},
  win(){snd(523,.1,'sine',0.015);setTimeout(()=>snd(659,.1,'sine',0.015),100);setTimeout(()=>snd(784,.15,'sine',0.015),200);setTimeout(()=>snd(1047,.25,'sine',0.015),320)},
  lose(){snd(350,.2,'sawtooth',0.015);setTimeout(()=>snd(280,.25,'sawtooth',0.015),180);setTimeout(()=>snd(200,.35,'sawtooth',0.015),380)}
};

// ===== SCREEN SHAKE =====
let shake={x:0,y:0,t:0};
function doShake(amt){shake.t=16;shake.x=(Math.random()-.5)*amt;shake.y=(Math.random()-.5)*amt}
function tickShake(){if(shake.t>0){shake.t--;shake.x*=.82;shake.y*=.82}else shake.x=shake.y=0}

// ===== PARTICLES =====
let particles=[];
function emitP(x,y,color,n=8,spd=6){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;const s=Math.random()*spd;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:20+Math.random()*20,maxLife:40,color,size:2+Math.random()*4})}
}
function tickParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;p.size*=.97;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/p.maxLife);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}

// ===== BLOCK TYPES =====
const TYPES={
  wood:  {name:'Wood',  cost:2, hp:20,  mass:2, w:38,h:38, color:'#b87333', emoji:'🪵', icon:'🟫',special:'none',     desc:'Cheap & light'},
  stone: {name:'Stone', cost:4, hp:50,  mass:4, w:40,h:40, color:'#708090', emoji:'🪨', icon:'🪨',special:'none',     desc:'Solid & reliable'},
  metal: {name:'Metal', cost:7, hp:100, mass:8, w:42,h:42, color:'#8a9bae', emoji:'🔩', icon:'🔩',special:'none',     desc:'Very tough'},
  bomb:  {name:'Bomb',  cost:5, hp:10,  mass:2, w:36,h:36, color:'#cc3333', emoji:'💣', icon:'💣',special:'bomb',     desc:'AoE on death'},
  crystal:{name:'Crystal',cost:6,hp:15, mass:2, w:36,h:36, color:'#5be0d0', emoji:'💎', icon:'💎',special:'crystal',  desc:'+15 HP neighbors'},
  shield:{name:'Shield',cost:8, hp:60,  mass:5, w:40,h:40, color:'#4488cc', emoji:'🛡️',icon:'🛡️',special:'shield',  desc:'50% less dmg'},
  magnet:{name:'Magnet',cost:6, hp:30,  mass:4, w:38,h:38, color:'#aa44aa', emoji:'🧲', icon:'🧲',special:'magnet',  desc:'Attracts shots'},
  archer:{name:'Archer',cost:10,hp:20,  mass:2, w:36,h:36, color:'#44aa44', emoji:'🏹', icon:'🏹',special:'archer',  desc:'+2 projectiles'}
};

// ===== PHYSICS =====
const GRAV=0.4, REST=0.3, FRIC=0.9;

function aabb(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function resolve(a,b){
  const ox=Math.min(a.x+a.w,b.x+b.w)-Math.max(a.x,b.x);
  const oy=Math.min(a.y+a.h,b.y+b.h)-Math.max(a.y,b.y);
  if(ox<=0||oy<=0)return;
  const tm=a.mass+b.mass,ar=b.mass/tm,br=a.mass/tm;
  if(ox<oy){
    const dir=a.x+a.w/2<b.x+b.w/2?-1:1;
    a.x+=dir*ox*ar*.5;b.x-=dir*ox*br*.5;
    const rv=a.vx-b.vx;
    a.vx-=rv*ar*(1+REST)*.5;b.vx+=rv*br*(1+REST)*.5;
    a.vx*=FRIC;b.vx*=FRIC;
  }else{
    const dir=a.y+a.h/2<b.y+b.h/2?-1:1;
    a.y+=dir*oy*ar*.5;b.y-=dir*oy*br*.5;
    const rv=a.vy-b.vy;
    a.vy-=rv*ar*(1+REST)*.5;b.vy+=rv*br*(1+REST)*.5;
  }
}

function physStep(blocks){
  for(const b of blocks){
    if(b.dead)continue;
    b.vy+=GRAV;b.x+=b.vx;b.y+=b.vy;
    // Floor
    if(b.y+b.h>FLOOR){b.y=FLOOR-b.h;if(Math.abs(b.vy)>1.2)b.vy*=-REST*.5;else b.vy=0;b.vx*=FRIC}
    // Walls
    if(b.x<0){b.x=0;b.vx*=-REST*.4}
    if(b.x+b.w>W){b.x=W-b.w;b.vx*=-REST*.4}
    b.vx*=.995;
    if(Math.abs(b.vx)<.02)b.vx=0;
    if(Math.abs(b.vy)<.02&&b.y+b.h>=FLOOR-1)b.vy=0;
  }
  // Block-block collisions (multiple passes for stacking stability)
  for(let pass=0;pass<3;pass++){
    for(let i=0;i<blocks.length;i++){
      if(blocks[i].dead)continue;
      for(let j=i+1;j<blocks.length;j++){
        if(blocks[j].dead)continue;
        if(aabb(blocks[i],blocks[j]))resolve(blocks[i],blocks[j]);
      }
    }
  }
}

// ===== GAME STATE =====
let G={
  phase:'shop', // shop, battle, results, gameover
  round:1, maxRounds:10,
  gold:15,
  playerBlocks:[], enemyBlocks:[],
  projectiles:[],
  selectedType:null,
  shopTimer:0, battleTimer:0,
  pShotsFired:0, eShotsFired:0,
  maxShots:5,
  resultMsg:'', resultTimer:0,
  totalPlayerHP:0, totalEnemyHP:0,
  banner:'', bannerTimer:0, bannerColor:'#ff6b35',
  bestScore:parseInt(localStorage.getItem('blockbattler-best'))||0
};

function showBest(){bestEl.textContent=G.bestScore>0?'Best: '+G.bestScore+' HP':''}

function newGame(){
  G.phase='shop';G.round=1;G.gold=15;
  G.playerBlocks=[];G.enemyBlocks=[];G.projectiles=[];
  G.selectedType=null;G.totalPlayerHP=0;G.totalEnemyHP=0;
  particles=[];
  buildEnemyFort();
  setBanner('ROUND 1 - BUILD!','#ff6b35');
  sfx.roundStart();
  updatePanel();
}

function setBanner(msg,color='#ff6b35'){G.banner=msg;G.bannerTimer=90;G.bannerColor=color}

// ===== BLOCK CREATION =====
function makeBlock(type,x,y,side){
  const t=TYPES[type];
  return{x,y,w:t.w,h:t.h,vx:0,vy:0,mass:t.mass,hp:t.hp,maxHp:t.hp,
    color:t.color,emoji:t.emoji,type,side,dead:false,special:t.special,
    face:'happy',faceTimer:0,crystalApplied:false,shieldMult:t.special==='shield'?.5:1};
}

function applyCrystalBuffs(blocks){
  // Reset crystal buffs
  for(const b of blocks){if(!b.dead&&b.crystalApplied){b.hp-=15;b.maxHp-=15;b.crystalApplied=false}}
  for(const c of blocks){
    if(c.dead||c.special!=='crystal')continue;
    for(const b of blocks){
      if(b===c||b.dead||b.crystalApplied)continue;
      const dx=Math.abs((b.x+b.w/2)-(c.x+c.w/2));
      const dy=Math.abs((b.y+b.h/2)-(c.y+c.h/2));
      if(dx<55&&dy<55){b.hp+=15;b.maxHp+=15;b.crystalApplied=true}
    }
  }
}

// ===== ENEMY AI =====
function buildEnemyFort(){
  G.enemyBlocks=[];
  const r=G.round;
  // Budget scales with round, slightly more than player
  let budget=14+r*4;
  const zoneLeft=W*0.6, zoneRight=W-10;
  const zoneW=zoneRight-zoneLeft;
  // Weighted type selection based on round
  const pool=[];
  pool.push(...Array(5).fill('wood'));
  pool.push(...Array(4).fill('stone'));
  if(r>=2)pool.push(...Array(3).fill('metal'));
  if(r>=2)pool.push(...Array(2).fill('bomb'));
  if(r>=3)pool.push('shield','shield');
  if(r>=3)pool.push('crystal');
  if(r>=4)pool.push('magnet');
  if(r>=5)pool.push('archer');

  // Build columns
  const cols=2+Math.min(Math.floor(r/2),3);
  const colW=Math.min(44,zoneW/cols);
  const colBlocks=Array.from({length:cols},()=>[]);
  let attempts=0;

  while(budget>0&&attempts<40){
    attempts++;
    const type=pool[Math.floor(Math.random()*pool.length)];
    const t=TYPES[type];
    if(t.cost>budget)continue;
    budget-=t.cost;
    // Pick shortest column
    let minCol=0,minH=999;
    for(let c=0;c<cols;c++){if(colBlocks[c].length<minH){minH=colBlocks[c].length;minCol=c}}
    const bx=zoneLeft+20+minCol*colW+(colW-t.w)/2+(Math.random()-.5)*4;
    const by=FLOOR-t.h*(colBlocks[minCol].length+1);
    colBlocks[minCol].push(type);
    G.enemyBlocks.push(makeBlock(type,bx,by,'enemy'));
  }
  applyCrystalBuffs(G.enemyBlocks);
}

// ===== BLOCK DESTRUCTION =====
function destroyBlock(b){
  if(b.dead)return;
  b.dead=true;b.face='dead';
  sfx.shatter();emitP(b.x+b.w/2,b.y+b.h/2,b.color,12,5);
  // Bomb AoE
  if(b.special==='bomb'){
    sfx.explode();doShake(14);
    emitP(b.x+b.w/2,b.y+b.h/2,'#ff4444',20,8);
    emitP(b.x+b.w/2,b.y+b.h/2,'#ffaa22',14,6);
    const all=[...G.playerBlocks,...G.enemyBlocks];
    for(const ob of all){
      if(ob.dead||ob===b)continue;
      const dx=ob.x+ob.w/2-(b.x+b.w/2),dy=ob.y+ob.h/2-(b.y+b.h/2);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        const dmg=Math.floor(40*(1-dist/100));
        ob.hp-=dmg;
        const push=8*(1-dist/100);
        ob.vx+=dx/(dist+1)*push;ob.vy+=dy/(dist+1)*push-4;
        ob.face='hurt';ob.faceTimer=15;
        if(ob.hp<=0)destroyBlock(ob);
      }
    }
  }
}

// ===== PROJECTILE HANDLING =====
function fireProjectile(side,extraFrom){
  const isP=side==='player';
  const targets=isP?G.enemyBlocks:G.playerBlocks;
  const alive=targets.filter(b=>!b.dead);
  if(!alive.length)return;

  let sx,sy;
  if(extraFrom){
    sx=extraFrom.x+extraFrom.w/2;sy=extraFrom.y;
  }else{
    sx=isP?W*.22:W*.78;sy=FLOOR-60-Math.random()*40;
  }

  const tgt=alive[Math.floor(Math.random()*alive.length)];
  const tx=tgt.x+tgt.w/2+(Math.random()-.5)*25;
  const ty=tgt.y+tgt.h/2;
  const dx=tx-sx,dy=ty-sy;
  const t=32+Math.random()*12;

  G.projectiles.push({
    x:sx,y:sy,vx:dx/t,vy:dy/t-GRAV*.7*t/2,
    r:5,dmg:12+G.round*2,side,
    color:isP?'#ff6b35':'#ef4444',
    trail:[]
  });
  snd(320+Math.random()*80,.08,'sine',0.012);
}

function tickProjectiles(){
  const all=[...G.playerBlocks,...G.enemyBlocks];
  // Magnet attraction
  const magnets=all.filter(b=>!b.dead&&b.special==='magnet');

  for(let i=G.projectiles.length-1;i>=0;i--){
    const p=G.projectiles[i];
    p.vy+=GRAV*.65;

    // Magnet pull: attract enemy projectiles toward magnet blocks
    for(const m of magnets){
      if(m.side===p.side)continue; // only attract enemy fire
      const dx=m.x+m.w/2-p.x, dy=m.y+m.h/2-p.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<180&&dist>5){
        const force=2.5/(dist*.08+1);
        p.vx+=dx/dist*force;p.vy+=dy/dist*force;
      }
    }

    p.x+=p.vx;p.y+=p.vy;

    // Trail
    p.trail.push({x:p.x,y:p.y,life:10});
    if(p.trail.length>12)p.trail.shift();

    // Out of bounds
    if(p.y>FLOOR+30||p.x<-100||p.x>W+100){G.projectiles.splice(i,1);continue}

    // Ground hit
    if(p.y>FLOOR){
      emitP(p.x,FLOOR,p.color,5,3);sfx.impact();doShake(2);
      G.projectiles.splice(i,1);continue;
    }

    // Block hit
    let hit=false;
    for(const b of all){
      if(b.dead||b.side===p.side)continue;
      if(p.x>b.x&&p.x<b.x+b.w&&p.y>b.y&&p.y<b.y+b.h){
        let dmg=p.dmg;
        if(b.special==='shield')dmg=Math.floor(dmg*.5);
        b.hp-=dmg;
        const kx=p.vx>0?3.5:-3.5;
        b.vx+=kx;b.vy-=2.5;
        b.face='hurt';b.faceTimer=18;
        sfx.impact();doShake(5);emitP(p.x,p.y,p.color,6,4);
        if(b.hp<=0)destroyBlock(b);
        hit=true;break;
      }
    }
    if(hit)G.projectiles.splice(i,1);
  }
}

// ===== SHOP PHASE =====
function placeBlock(mx,my){
  if(G.phase!=='shop'||!G.selectedType)return;
  const zoneRight=W*0.45;
  if(mx<5||mx>zoneRight||my<40||my>FLOOR)return;
  const t=TYPES[G.selectedType];
  if(G.gold<t.cost)return;
  G.gold-=t.cost;
  const b=makeBlock(G.selectedType,mx-t.w/2,my-t.h/2,'player');
  b.vy=-1; // small drop effect
  G.playerBlocks.push(b);
  applyCrystalBuffs(G.playerBlocks);
  sfx.place();
  updatePanel();
}

function buySelect(type){
  if(G.gold<TYPES[type].cost)return;
  G.selectedType=G.selectedType===type?null:type;
  sfx.buy();updatePanel();
}

// ===== BATTLE PHASE =====
function startBattle(){
  if(G.phase!=='shop')return;
  G.phase='battle';G.battleTimer=0;G.projectiles=[];
  G.pShotsFired=0;G.eShotsFired=0;
  // Count archer blocks for extra shots
  const pArchers=G.playerBlocks.filter(b=>!b.dead&&b.special==='archer').length;
  const eArchers=G.enemyBlocks.filter(b=>!b.dead&&b.special==='archer').length;
  G.maxShots=5+pArchers*2;
  G.eMaxShots=5+eArchers*2;
  G.selectedType=null;
  // Scare enemy blocks
  G.enemyBlocks.forEach(b=>{if(!b.dead){b.face='scared';b.faceTimer=40}});
  setBanner('BATTLE!','#ff6b35');
  sfx.roundStart();
  updatePanel();
}

function tickBattle(){
  G.battleTimer++;
  const all=[...G.playerBlocks,...G.enemyBlocks];
  physStep(all);
  tickProjectiles();

  // Staggered firing
  const fireInterval=18;
  if(G.battleTimer%fireInterval===6&&G.pShotsFired<G.maxShots){
    fireProjectile('player');G.pShotsFired++;
    // Archer blocks fire from their own position
    const archers=G.playerBlocks.filter(b=>!b.dead&&b.special==='archer');
    for(const a of archers){if(G.pShotsFired<G.maxShots){fireProjectile('player',a);G.pShotsFired++}}
  }
  if(G.battleTimer%fireInterval===12&&G.eShotsFired<G.eMaxShots){
    fireProjectile('enemy');G.eShotsFired++;
    const archers=G.enemyBlocks.filter(b=>!b.dead&&b.special==='archer');
    for(const a of archers){if(G.eShotsFired<G.eMaxShots){fireProjectile('enemy',a);G.eShotsFired++}}
  }

  // Battle end: all shots fired and projectiles resolved
  const allFired=G.pShotsFired>=G.maxShots&&G.eShotsFired>=G.eMaxShots;
  if((allFired&&G.projectiles.length===0&&G.battleTimer>60)||G.battleTimer>400){
    endBattle();
  }
}

function endBattle(){
  G.phase='results';G.resultTimer=0;
  const php=G.playerBlocks.filter(b=>!b.dead).reduce((s,b)=>s+b.hp,0);
  const ehp=G.enemyBlocks.filter(b=>!b.dead).reduce((s,b)=>s+b.hp,0);
  const pAlive=G.playerBlocks.filter(b=>!b.dead).length;
  const eAlive=G.enemyBlocks.filter(b=>!b.dead).length;
  const eDestroyed=G.enemyBlocks.filter(b=>b.dead).length;

  G.totalPlayerHP=php;G.totalEnemyHP=ehp;

  const goldEarned=5+eDestroyed*2+G.round;
  G.gold+=goldEarned;

  G.resultMsg=`Round ${G.round} done! You: ${pAlive} blocks (${php} HP) | Enemy: ${eAlive} blocks (${ehp} HP) | +$${goldEarned}`;
  updatePanel();
}

function nextRound(){
  G.round++;
  if(G.round>G.maxRounds){
    endGame();return;
  }
  G.phase='shop';G.projectiles=[];
  // Remove dead blocks
  G.playerBlocks=G.playerBlocks.filter(b=>!b.dead);
  // Heal surviving player blocks slightly
  G.playerBlocks.forEach(b=>{b.hp=Math.min(b.maxHp,b.hp+Math.floor(b.maxHp*.15));b.face='happy';b.faceTimer=0;b.vx=0;b.vy=0});
  buildEnemyFort();
  setBanner('ROUND '+G.round+' - BUILD!','#ff6b35');
  sfx.roundStart();
  updatePanel();
}

function endGame(){
  G.phase='gameover';
  const php=G.playerBlocks.filter(b=>!b.dead).reduce((s,b)=>s+b.hp,0);
  const ehp=G.enemyBlocks.filter(b=>!b.dead).reduce((s,b)=>s+b.hp,0);
  G.totalPlayerHP=php;G.totalEnemyHP=ehp;
  if(php>G.bestScore){G.bestScore=php;localStorage.setItem('blockbattler-best',php)}
  if(php>=ehp)sfx.win();else sfx.lose();
  showBest();updatePanel();
}

// ===== DRAWING =====
function drawBg(){
  // Dark background with zone tints
  ctx.fillStyle='#0a0a12';ctx.fillRect(-20,-20,W+40,H+40);
  // Player zone (blue tint)
  const grd1=ctx.createLinearGradient(0,0,W*.45,0);
  grd1.addColorStop(0,'rgba(40,60,120,0.08)');grd1.addColorStop(1,'rgba(40,60,120,0)');
  ctx.fillStyle=grd1;ctx.fillRect(0,0,W*.45,FLOOR);
  // Enemy zone (red tint)
  const grd2=ctx.createLinearGradient(W*.55,0,W,0);
  grd2.addColorStop(0,'rgba(120,40,40,0)');grd2.addColorStop(1,'rgba(120,40,40,0.08)');
  ctx.fillStyle=grd2;ctx.fillRect(W*.55,0,W*.45,FLOOR);
  // Divider
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.setLineDash([4,8]);
  ctx.beginPath();ctx.moveTo(W/2,30);ctx.lineTo(W/2,FLOOR);ctx.stroke();ctx.setLineDash([]);
}

function drawFloor(){
  ctx.fillStyle='#0e1620';ctx.fillRect(0,FLOOR,W,H-FLOOR+20);
  // Glow line
  const grd=ctx.createLinearGradient(0,FLOOR-4,0,FLOOR+4);
  grd.addColorStop(0,'rgba(74,222,128,0.15)');grd.addColorStop(1,'rgba(74,222,128,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,FLOOR-4,W,8);
  ctx.fillStyle='#2a5a3a';ctx.fillRect(0,FLOOR,W,2);
}

function drawBlock(b){
  if(b.dead)return;
  const cx=b.x+b.w/2,cy=b.y+b.h/2;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  roundRect(b.x+3,b.y+3,b.w,b.h,5);
  // Body
  ctx.fillStyle=b.color;
  roundRect(b.x,b.y,b.w,b.h,5);
  // Top highlight
  ctx.fillStyle='rgba(255,255,255,0.12)';
  roundRect(b.x+1,b.y+1,b.w-2,b.h*.35,4);
  // Crystal shimmer
  if(b.crystalApplied){ctx.strokeStyle='rgba(91,224,208,0.5)';ctx.lineWidth=2;roundRectStroke(b.x-1,b.y-1,b.w+2,b.h+2,6)}
  // Face
  const fs=Math.min(b.w,b.h)*.5;
  ctx.font=fs+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  let emoji;
  if(b.face==='hurt'){emoji='😰';if(--b.faceTimer<=0)b.face=b.hp<b.maxHp*.25?'dying':'happy'}
  else if(b.face==='scared'){emoji='😰';if(--b.faceTimer<=0)b.face='happy'}
  else if(b.face==='dying')emoji='💀';
  else if(b.face==='dead')emoji='😵';
  else emoji='😊';
  ctx.fillText(emoji,cx,cy+1);
  // HP bar
  if(b.maxHp&&b.hp>0&&b.hp<b.maxHp){
    const bw=b.w,bh=3;
    ctx.fillStyle='#0a0a12';ctx.fillRect(b.x,b.y-6,bw,bh+2);
    const pct=Math.max(0,b.hp/b.maxHp);
    ctx.fillStyle=pct>.5?'#4ade80':pct>.25?'#f7c948':'#ef4444';
    ctx.fillRect(b.x+1,b.y-5,Math.max(1,(bw-2)*pct),bh);
  }
  // Type icon (small, top-right)
  if(b.special!=='none'){ctx.font='10px serif';ctx.textAlign='right';ctx.fillText(b.emoji,b.x+b.w-2,b.y+10)}
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
}

function roundRectStroke(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.stroke();
}

function drawProjectile(p){
  // Trail
  for(let i=p.trail.length-1;i>=0;i--){
    const t=p.trail[i];t.life--;
    if(t.life<=0){p.trail.splice(i,1);continue}
    ctx.globalAlpha=t.life/12*.4;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(t.x,t.y,p.r*(t.life/12),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Glow
  ctx.beginPath();ctx.arc(p.x,p.y,p.r+4,0,Math.PI*2);
  ctx.fillStyle=p.side==='player'?'rgba(255,107,53,0.25)':'rgba(239,68,68,0.25)';ctx.fill();
  // Core
  ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fillStyle=p.color;ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();ctx.arc(p.x-1,p.y-1,p.r*.4,0,Math.PI*2);ctx.fill();
}

function drawShopZone(){
  if(G.phase!=='shop')return;
  const zr=W*.45;
  ctx.strokeStyle='rgba(74,222,128,0.2)';ctx.setLineDash([6,6]);ctx.lineWidth=1;
  ctx.strokeRect(5,40,zr-10,FLOOR-45);ctx.setLineDash([]);
  ctx.fillStyle='rgba(74,222,128,0.03)';ctx.fillRect(5,40,zr-10,FLOOR-45);
  ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(74,222,128,0.4)';
  ctx.fillText('TAP TO PLACE',zr/2,55);
  if(G.selectedType){
    ctx.fillStyle='rgba(255,107,53,0.7)';ctx.font='bold 13px sans-serif';
    ctx.fillText('Selected: '+TYPES[G.selectedType].emoji+' '+TYPES[G.selectedType].name,(zr)/2,FLOOR+10);
  }
}

function drawHUD(){
  const php=G.playerBlocks.filter(b=>!b.dead).reduce((s,b)=>s+b.hp,0);
  const ehp=G.enemyBlocks.filter(b=>!b.dead).reduce((s,b)=>s+b.hp,0);
  // Top HUD bar
  ctx.fillStyle='rgba(10,10,18,0.8)';ctx.fillRect(0,0,W,28);
  ctx.font='bold 13px sans-serif';ctx.textBaseline='middle';
  // Left: gold + round
  ctx.textAlign='left';
  ctx.fillStyle='#f7c948';ctx.fillText('$'+G.gold,10,15);
  ctx.fillStyle='#ff6b35';ctx.fillText('Rd '+G.round+'/'+G.maxRounds,68,15);
  // HP totals
  ctx.fillStyle='#4ade80';ctx.textAlign='left';ctx.fillText('You:'+php+'HP',155,15);
  ctx.fillStyle='#ef4444';ctx.textAlign='right';ctx.fillText('Foe:'+ehp+'HP',W-10,15);
  // Center: banner
  if(G.bannerTimer>0){
    G.bannerTimer--;
    ctx.textAlign='center';ctx.fillStyle=G.bannerColor;
    ctx.font='bold 16px sans-serif';
    const a=Math.min(1,G.bannerTimer/15);
    ctx.globalAlpha=a;
    ctx.fillText(G.banner,W/2,15);
    ctx.globalAlpha=1;
  }
  // Side labels
  ctx.font='bold 11px sans-serif';ctx.globalAlpha=.4;
  ctx.textAlign='center';
  ctx.fillStyle='#6688cc';ctx.fillText('YOUR FORT',W*.22,38);
  ctx.fillStyle='#cc6666';ctx.fillText('ENEMY FORT',W*.78,38);
  ctx.globalAlpha=1;
}

function drawResults(){
  if(G.phase!=='results'){return}
  G.resultTimer++;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
  const php=G.totalPlayerHP,ehp=G.totalEnemyHP;
  const won=php>=ehp;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=won?'#4ade80':'#ef4444';ctx.font='bold 28px sans-serif';
  ctx.fillText(won?'ROUND WON!':'ROUND LOST!',W/2,H/2-50);
  ctx.fillStyle='#ccc';ctx.font='16px sans-serif';
  ctx.fillText('Your HP: '+php+'  |  Enemy HP: '+ehp,W/2,H/2-15);
  ctx.fillStyle='#f7c948';ctx.font='bold 15px sans-serif';
  ctx.fillText('Gold earned this round: +$'+(5+G.enemyBlocks.filter(b=>b.dead).length*2+G.round),W/2,H/2+15);
  if(G.round>=G.maxRounds){
    ctx.fillStyle='#ff6b35';ctx.font='bold 14px sans-serif';
    ctx.fillText('Final round! Tap NEXT to see final results.',W/2,H/2+45);
  }
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  const php=G.totalPlayerHP,ehp=G.totalEnemyHP;
  const won=php>=ehp;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=won?'#4ade80':'#ef4444';ctx.font='bold 44px sans-serif';
  ctx.fillText(won?'VICTORY!':'DEFEAT!',W/2,H/2-60);
  ctx.fillStyle='#ccc';ctx.font='18px sans-serif';
  ctx.fillText('Final HP  -  You: '+php+'  |  Enemy: '+ehp,W/2,H/2-15);
  ctx.fillStyle='#f7c948';ctx.font='bold 16px sans-serif';
  ctx.fillText('Your Score: '+php+' HP',W/2,H/2+20);
  if(php>=G.bestScore&&php>0){ctx.fillStyle='#ff6b35';ctx.fillText('NEW BEST!',W/2,H/2+48)}
  ctx.fillStyle='#888';ctx.font='15px sans-serif';
  ctx.fillText('Tap PLAY AGAIN to restart',W/2,H/2+75);
}

// ===== PANEL =====
function updatePanel(){
  let h='<div id="info"><span class="gold">$'+G.gold+'</span><span class="round-txt">Rd '+G.round+'/'+G.maxRounds+'</span></div>';

  if(G.phase==='shop'){
    for(const k in TYPES){
      const t=TYPES[k];
      const dis=G.gold<t.cost?'disabled':'';
      const sel=G.selectedType===k?'sel':'';
      h+=`<button class="btn ${sel}" ${dis} onclick="buySelect('${k}')" title="${t.desc}">${t.icon}${t.name} $${t.cost}</button>`;
    }
    h+='<button class="btn go" onclick="startBattle()">BATTLE!</button>';
  }else if(G.phase==='battle'){
    h+='<span style="color:#ff6b35;font-weight:bold;font-size:14px">Battle in progress...</span>';
  }else if(G.phase==='results'){
    h+='<span style="color:#ccc;font-size:12px;max-width:350px">'+G.resultMsg+'</span>';
    h+='<button class="btn go" onclick="nextRound()">'+(G.round>=G.maxRounds?'FINAL RESULTS':'NEXT ROUND')+'</button>';
  }else if(G.phase==='gameover'){
    h+='<button class="btn go" onclick="newGame()">PLAY AGAIN</button>';
  }
  panel.innerHTML=h;
}

// ===== INPUT =====
function getPos(cx,cy){const r=C.getBoundingClientRect();return[(cx-r.left)*(W/r.width),(cy-r.top)*(H/r.height)]}

function handleTap(mx,my){
  if(AC.state==='suspended')AC.resume();
  if(G.phase==='shop'){placeBlock(mx,my)}
}

C.addEventListener('mousedown',e=>{const[mx,my]=getPos(e.clientX,e.clientY);handleTap(mx,my)});
C.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const[mx,my]=getPos(t.clientX,t.clientY);handleTap(mx,my)},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault()},{passive:false});

// ===== MAIN LOOP =====
function tick(){
  tickShake();tickParticles();
  if(G.phase==='shop'){
    // Physics for settling blocks during shop
    physStep(G.playerBlocks);
    physStep(G.enemyBlocks);
    // Update dying faces
    const all=[...G.playerBlocks,...G.enemyBlocks];
    for(const b of all){if(!b.dead&&b.hp<b.maxHp*.25)b.face='dying'}
  }else if(G.phase==='battle'){
    tickBattle();
  }else if(G.phase==='results'){
    // Keep physics running for settling
    physStep([...G.playerBlocks,...G.enemyBlocks]);
  }
}

function draw(){
  ctx.save();ctx.translate(shake.x,shake.y);
  drawBg();drawFloor();drawShopZone();
  G.playerBlocks.forEach(drawBlock);
  G.enemyBlocks.forEach(drawBlock);
  G.projectiles.forEach(drawProjectile);
  drawParticles();
  drawHUD();
  if(G.phase==='results')drawResults();
  if(G.phase==='gameover')drawGameOver();
  ctx.restore();
}

function loop(){tick();draw();requestAnimationFrame(loop)}

// ===== INIT =====
showBest();newGame();loop();
</script>
