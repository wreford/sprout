<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a10">
<meta name="description" content="Hued — TikTok for named colours. Swipe through thousands of named hues. Save, share, build palettes.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hued">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff375f'/%3E%3Cpath d='M16 6 c3 0 3 3 0 6 c-3 3-6 3-6 6 c0 3 3 6 6 6 c3 0 6-3 6-6' fill='none' stroke='%23fff' stroke-width='2'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff375f'/%3E%3Cstop offset='.4' stop-color='%23ffcc00'/%3E%3Cstop offset='.7' stop-color='%2330d158'/%3E%3Cstop offset='1' stop-color='%23bf5af2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3C/svg%3E">
<title>Hued — TikTok for named colours</title>
<style>
:root{
  --bg:#0a0a10; --panel:#191926; --border:#26262e; --border2:#3a3a48;
  --text:#f5f5f7; --dim:#8a8a98; --dimmer:#5a5a68;
  --hot:#ff375f; --pink:#ff2d92; --amber:#ffcc00; --lime:#c8ff2f; --violet:#bf5af2; --green:#30d158;
  --disp:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;height:100%}
html,body{background:#000;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;overflow:hidden}
body{position:fixed;inset:0;width:100%;height:100%}
button,a,input,select{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input,select{font-size:16px}

/* ══════ Feed ══════ */
.feed{
  position:fixed;inset:0;z-index:1;
  overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scroll-snap-type:y mandatory
}
.card{
  height:100vh;height:100dvh;width:100%;position:relative;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden
}
.card .bg{position:absolute;inset:0;z-index:0;transition:background-color .3s}
.card .halo{
  position:absolute;inset:-10%;z-index:0;
  background:radial-gradient(60% 40% at 30% 40%,rgba(255,255,255,.14),transparent 55%),
             radial-gradient(50% 40% at 70% 70%,rgba(0,0,0,.18),transparent 55%);
  pointer-events:none
}

.card .info{
  position:relative;z-index:2;
  padding:52px 24px calc(env(safe-area-inset-bottom) + 40px);
  padding-right:calc(env(safe-area-inset-right) + 100px);
  padding-left:calc(env(safe-area-inset-left) + 24px);
  color:#fff
}
.card.light .info{color:#0a0a10}
.card .info::before{
  content:"";position:absolute;left:0;right:0;top:0;bottom:0;z-index:-1;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.42) 55%,rgba(0,0,0,.78));
  pointer-events:none
}
.card.light .info::before{background:linear-gradient(180deg,transparent,rgba(255,255,255,.35) 55%,rgba(255,255,255,.75))}
.card .kicker{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;
  color:rgba(255,255,255,.75);text-transform:uppercase;font-weight:600;
  margin-bottom:8px;display:flex;gap:10px;align-items:center
}
.card.light .kicker{color:rgba(0,0,0,.55)}
.card .kicker .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6}
.card .name{
  font-family:var(--disp);font-weight:900;
  font-size:clamp(46px,13vw,110px);line-height:.9;letter-spacing:-.035em;
  margin-bottom:14px;color:inherit;
  text-shadow:0 4px 20px rgba(0,0,0,.16);
  overflow-wrap:anywhere
}
.card.light .name{text-shadow:0 2px 12px rgba(255,255,255,.18)}
.card .hex{
  font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:.18em;
  margin-bottom:6px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  padding:6px 12px;background:rgba(255,255,255,.14);border-radius:8px;
  border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(6px);
  color:inherit;transition:all .14s var(--ease);user-select:all
}
.card.light .hex{background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.14)}
.card .hex:active{transform:scale(.97)}
.card .hex .cp{font-size:10px;font-family:var(--mono);letter-spacing:.08em;opacity:.7}
.card .meta-row{
  display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;
  font-family:var(--mono);font-size:11.5px;letter-spacing:.03em
}
.card .meta-row span{opacity:.85}
.card .meta-row span b{font-weight:600;opacity:1}
.card .palette{
  display:flex;gap:0;height:36px;margin-top:16px;border-radius:10px;overflow:hidden;
  box-shadow:0 6px 22px rgba(0,0,0,.25);position:relative
}
.card .palette .sw{flex:1;cursor:pointer;transition:flex .18s var(--ease);position:relative}
.card .palette .sw:hover{flex:1.6}
.card .palette .sw::after{
  content:attr(data-hex);position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);
  font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:rgba(255,255,255,.65);
  opacity:0;transition:opacity .14s var(--ease);white-space:nowrap;pointer-events:none
}
.card.light .palette .sw::after{color:rgba(0,0,0,.65)}
.card .palette .sw:hover::after{opacity:1;bottom:-16px}

/* Skeleton for hex-in-flight */
.card.pending .info{opacity:.6}

/* ══════ Side rail ══════ */
.side{
  position:absolute;right:max(14px,env(safe-area-inset-right));
  bottom:calc(env(safe-area-inset-bottom) + 120px);z-index:3;
  display:flex;flex-direction:column;gap:20px;align-items:center
}
.side .col{display:flex;flex-direction:column;align-items:center;gap:3px}
.side .act{
  width:56px;height:56px;border-radius:50%;
  background:rgba(20,20,26,.55);color:#fff;border:1.5px solid rgba(255,255,255,.16);
  font-size:24px;font-weight:600;cursor:pointer;
  backdrop-filter:blur(14px) saturate(1.6);-webkit-backdrop-filter:blur(14px) saturate(1.6);
  display:flex;align-items:center;justify-content:center;
  transition:transform .16s var(--ease),background .18s;
  box-shadow:0 4px 14px rgba(0,0,0,.35)
}
.card.light .side .act{
  background:rgba(255,255,255,.5);color:#0a0a10;border-color:rgba(0,0,0,.14);
  backdrop-filter:blur(14px) saturate(1.4)
}
.side .act:hover{transform:scale(1.08)}
.side .act:active{transform:scale(.94)}
.side .act.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent;color:#fff;animation:pump .4s var(--ease)}
@keyframes pump{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.94)}100%{transform:scale(1)}}
.side .lbl{
  font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.85);
  margin-top:4px;letter-spacing:.05em;font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,.6)
}
.card.light .side .lbl{color:rgba(0,0,0,.75);text-shadow:0 1px 3px rgba(255,255,255,.4)}
@media(max-width:520px){
  .side{right:10px;bottom:calc(env(safe-area-inset-bottom) + 110px);gap:16px}
  .side .act{width:50px;height:50px;font-size:21px}
  .side .lbl{font-size:9.5px}
}

/* ══════ Top nav ══════ */
.top{
  position:fixed;top:0;left:0;right:0;z-index:110;
  padding:calc(env(safe-area-inset-top) + 10px) max(14px,env(safe-area-inset-right)) 14px max(14px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);pointer-events:none
}
.top .l,.top .r{display:flex;align-items:center;gap:6px;pointer-events:auto}
.top .brand{
  color:#fff;font-family:var(--disp);font-weight:900;font-size:17px;
  letter-spacing:-.015em;pointer-events:auto;text-shadow:0 2px 8px rgba(0,0,0,.6);
  display:flex;align-items:center;gap:8px
}
.top .brand .g{
  background:linear-gradient(120deg,var(--hot) 0%,var(--amber) 30%,var(--lime) 60%,var(--violet) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.tico{
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,20,26,.55);color:#fff;border:1px solid rgba(255,255,255,.14);
  font-size:16px;font-weight:600;
  backdrop-filter:blur(12px) saturate(1.5);cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:all .16s var(--ease);text-decoration:none
}
.tico:hover{background:var(--hot);border-color:transparent}
.tico.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent}
.tico .badge{
  position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;
  border-radius:9px;background:var(--hot);color:#fff;
  font-family:var(--mono);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid #000
}

.hint{
  position:fixed;top:calc(env(safe-area-inset-top) + 66px);left:50%;transform:translateX(-50%);
  z-index:105;pointer-events:none;
  padding:7px 16px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.14);
  border-radius:20px;color:rgba(255,255,255,.9);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
  backdrop-filter:blur(12px);
  animation:hintfade 4s ease-in forwards;opacity:0
}
@keyframes hintfade{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* Loading card */
.card.loading{background:#0a0a10;align-items:center;justify-content:center}
.card.loading .spinner{
  display:flex;gap:8px;
}
.card.loading .spinner span{
  width:12px;height:12px;border-radius:50%;background:var(--hot);
  animation:bounce 1.4s ease-in-out infinite
}
.card.loading .spinner span:nth-child(2){animation-delay:.2s;background:var(--pink)}
.card.loading .spinner span:nth-child(3){animation-delay:.4s;background:var(--amber)}
@keyframes bounce{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.2) translateY(-8px);opacity:.6}}

/* ══════ Sheets ══════ */
.sheet{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.72);display:none;align-items:flex-end;justify-content:center;padding:0}
.sheet.show{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@media(min-width:640px){.sheet{align-items:center;padding:24px}}
.sheet-card{
  width:100%;max-width:520px;background:linear-gradient(180deg,var(--panel),#0f0f18);
  border:1px solid var(--border);border-radius:20px 20px 0 0;
  padding-bottom:calc(env(safe-area-inset-bottom) + 22px);
  max-height:90dvh;display:flex;flex-direction:column;
  transform:translateY(30px);animation:sheetup .32s var(--ease) forwards;
  box-shadow:0 -24px 60px rgba(0,0,0,.5);position:relative
}
@keyframes sheetup{to{transform:none}}
@media(min-width:640px){.sheet-card{border-radius:20px}}
.sheet-hdr{
  padding:14px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative
}
.sheet-hdr::before{
  content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;border-radius:2px;background:var(--border2)
}
.sheet-hdr .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);font-weight:600;text-transform:uppercase;margin-top:2px}
.sheet-hdr h3{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.01em}
.sheet-close{width:32px;height:32px;border-radius:9px;background:#22222e;border:1px solid var(--border);color:var(--dim);font-size:16px}
.sheet-close:hover{color:var(--hot);border-color:var(--hot)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 4px;flex:1;min-height:0}
.sheet-body::-webkit-scrollbar{width:5px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Details sheet body */
.det-preview{
  display:grid;grid-template-columns:96px 1fr;gap:12px;padding:6px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px;align-items:center
}
.det-swatch{width:96px;height:96px;border-radius:14px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06),0 8px 24px rgba(0,0,0,.4)}
.det-preview .t{font-family:var(--disp);font-weight:900;font-size:22px;line-height:1.05;letter-spacing:-.015em;margin-bottom:4px}
.det-preview .m{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em}

.det-sec{margin-bottom:18px}
.det-sec h4{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--hot);
  text-transform:uppercase;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px
}
.det-sec h4::before{content:"◆";color:var(--hot);font-size:8px}
.det-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.det-line{display:flex;justify-content:space-between;padding:8px 10px;background:#12121a;border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:12px}
.det-line .k{color:var(--dim);letter-spacing:.06em;text-transform:uppercase;font-size:10px;font-weight:600}
.det-line .v{color:var(--text);letter-spacing:.03em}

.palette-strip{display:flex;gap:6px;height:90px;border-radius:12px;overflow:hidden}
.palette-strip .sw{flex:1;cursor:pointer;position:relative;transition:flex .18s var(--ease)}
.palette-strip .sw:hover{flex:1.4}
.palette-strip .sw .lbl{
  position:absolute;left:0;right:0;bottom:6px;padding:0 6px;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.02em;text-align:center;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);
  opacity:0;transition:opacity .14s var(--ease)
}
.palette-strip .sw.light .lbl{color:#0a0a10;text-shadow:0 1px 3px rgba(255,255,255,.4)}
.palette-strip .sw:hover .lbl{opacity:1}

.det-actions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;padding:12px 0 6px;border-top:1px solid var(--border)
}
.det-actions .btn{
  padding:12px 10px;background:#22222e;border:1px solid var(--border);
  color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  border-radius:9px;font-weight:600;cursor:pointer;min-height:44px;text-decoration:none;
  display:inline-flex;align-items:center;justify-content:center;gap:6px
}
.det-actions .btn:hover{border-color:var(--hot);color:var(--hot)}
.det-actions .btn.primary{background:linear-gradient(135deg,var(--hot),var(--pink));border:none;color:#fff;grid-column:1/-1}
.det-actions .btn.primary:hover{color:#fff;filter:brightness(1.1)}

/* Filter sheet */
.family-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.family-chip{
  padding:16px 8px;border-radius:14px;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;font-weight:600;
  text-align:center;cursor:pointer;transition:transform .12s var(--ease);
  border:2px solid transparent;color:#fff;
  text-transform:uppercase;min-height:56px
}
.family-chip.on{border-color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.4);transform:scale(1.04)}
.family-chip:hover{transform:translateY(-2px)}
.family-clear{width:100%;padding:12px;background:#22222e;border:1px solid var(--border);border-radius:11px;color:var(--dim);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;min-height:44px}
.family-clear:hover{color:var(--hot);border-color:var(--hot)}
.family-clear.on{color:var(--text)}

/* Favs drawer */
.fav-drawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,100%);z-index:200;
  background:var(--panel);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .28s var(--ease);
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-right:env(safe-area-inset-right)
}
.fav-drawer.show{transform:translateX(0)}
.fav-drawer .fdrawer-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.fav-drawer .fdrawer-hdr h3{font-family:var(--disp);font-weight:600;font-size:17px}
.fav-drawer .fdrawer-list{flex:1;overflow-y:auto;padding:10px 12px}
.fav-drawer .fdrawer-empty{padding:40px 20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:11px;line-height:1.6;font-style:italic}
.fav-drawer .fav-card{display:flex;gap:12px;padding:10px;background:#12121a;border:1px solid var(--border);border-radius:11px;margin-bottom:6px;cursor:pointer;align-items:center;position:relative;transition:border-color .12s}
.fav-drawer .fav-card:hover{border-color:var(--hot)}
.fav-drawer .fav-card .sw{width:48px;height:48px;border-radius:9px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
.fav-drawer .fav-card .info{flex:1;min-width:0}
.fav-drawer .fav-card .info .n{font-family:var(--disp);font-weight:600;font-size:14px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-drawer .fav-card .info .h{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.06em}
.fav-drawer .fav-card .rm{width:24px;height:24px;border-radius:50%;background:transparent;color:var(--dim);font-size:14px}
.fav-drawer .fav-card .rm:hover{background:var(--hot);color:#fff}
.fdrawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:195;display:none}
.fdrawer-bg.show{display:block;animation:fadein .18s}
.fdrawer-export{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.fdrawer-export button{flex:1;padding:9px;background:#22222e;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.fdrawer-export button:hover{border-color:var(--hot);color:var(--hot)}

/* Toast */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%);
  z-index:250;padding:10px 18px;background:rgba(20,20,26,.95);color:#fff;
  border:1px solid var(--border2);border-radius:24px;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.4);
  animation:toast-in .28s var(--ease),toast-out .28s 1.9s var(--ease) forwards;pointer-events:none
}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toast-out{to{opacity:0;transform:translate(-50%,10px)}}

/* Heart burst on double-tap save */
.heart-pop{
  position:absolute;transform:translate(-50%,-50%);color:var(--hot);
  font-size:120px;line-height:1;pointer-events:none;z-index:5;
  text-shadow:0 0 30px rgba(255,55,95,.7),0 8px 24px rgba(0,0,0,.5);
  animation:heart-fly .9s var(--ease) forwards
}
@keyframes heart-fly{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-8deg)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(6deg)}
  30%{transform:translate(-50%,-50%) scale(1) rotate(-4deg)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(.6) rotate(0)}
}
</style>
</head>
<body>

<div class="feed" id="feed"></div>

<nav class="top">
  <div class="l">

<script>
'use strict';
const API = 'https://www.thecolorapi.com';
const $ = id => document.getElementById(id);
const pick = a => a[Math.floor(Math.random() * a.length)];
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

/* ═══════════ State ═══════════ */
const state = {
  favorites: JSON.parse(localStorage.getItem('hued-favs') || '[]'),
  seen: new Set(),
  family: '',          // 'red' | 'orange' | 'yellow' | 'green' | 'cyan' | 'blue' | 'purple' | 'pink' | 'brown' | 'grey' | 'white' | 'black' | ''
  cache: JSON.parse(localStorage.getItem('hued-cache') || '{}'),   // hex -> color data
};

/* ═══════════ Hue families ═══════════ */
const FAMILIES = [
  { key:'red',    label:'Red',    seed:'#e53935', hueRange:[[345,360],[0,15]] },
  { key:'orange', label:'Orange', seed:'#fb8c00', hueRange:[[15,45]] },
  { key:'yellow', label:'Yellow', seed:'#fdd835', hueRange:[[45,65]] },
  { key:'green',  label:'Green',  seed:'#43a047', hueRange:[[65,165]] },
  { key:'cyan',   label:'Cyan',   seed:'#00acc1', hueRange:[[165,200]] },
  { key:'blue',   label:'Blue',   seed:'#1e88e5', hueRange:[[200,255]] },
  { key:'purple', label:'Purple', seed:'#8e24aa', hueRange:[[255,300]] },
  { key:'pink',   label:'Pink',   seed:'#ec407a', hueRange:[[300,345]] },
  { key:'brown',  label:'Brown',  seed:'#795548', hueRange:[[15,45]], satMax:50, lightMax:50 },
  { key:'grey',   label:'Grey',   seed:'#9e9e9e', satMax:8 },
  { key:'white',  label:'White',  seed:'#f5f5f5', lightMin:85 },
  { key:'black',  label:'Black',  seed:'#212121', lightMax:15 },
];

/* ═══════════ Hex helpers + luminance ═══════════ */
function normHex(v) {
  v = String(v || '').trim().replace(/^#/, '');
  if (/^[0-9a-f]{3}$/i.test(v)) v = v.split('').map(c => c + c).join('');
  return /^[0-9a-f]{6}$/i.test(v) ? v.toLowerCase() : null;
}
function hexToRGB(hex) {
  const h = normHex(hex);
  if (!h) return null;
  return { r:parseInt(h.slice(0,2), 16), g:parseInt(h.slice(2,4), 16), b:parseInt(h.slice(4,6), 16) };
}
function luminance(hex) {
  const rgb = hexToRGB(hex); if (!rgb) return 0;
  const [r, g, b] = [rgb.r, rgb.g, rgb.b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
function contrastRatio(hex) {
  const L = luminance(hex);
  const w = (1 + 0.05) / (L + 0.05);
  const k = (L + 0.05) / (0 + 0.05);
  return { white: w, black: k, best: w > k ? 'white' : 'black' };
}
function rgbToHSL(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h *= 60;
  }
  return { h: Math.round(h), s: Math.round(s * 100), l: Math.round(l * 100) };
}
function randomHexInFamily(fam) {
  if (!fam) {
    // Pleasing random: S 30-95%, L 20-80%
    const h = Math.floor(Math.random() * 360);
    const s = 30 + Math.floor(Math.random() * 65);
    const l = 20 + Math.floor(Math.random() * 60);
    return hslToHex(h, s, l);
  }
  const f = FAMILIES.find(x => x.key === fam);
  if (!f) return randomHexInFamily('');
  let h;
  if (f.hueRange) {
    const rng = pick(f.hueRange);
    h = rng[0] + Math.floor(Math.random() * (rng[1] - rng[0]));
  } else h = Math.floor(Math.random() * 360);
  const s = Math.floor(Math.random() * (f.satMax || 100 - 30)) + (f.satMin || 30);
  const l = f.lightMin != null
    ? f.lightMin + Math.floor(Math.random() * (100 - f.lightMin))
    : (f.lightMax != null ? Math.floor(Math.random() * f.lightMax) : 25 + Math.floor(Math.random() * 55));
  return hslToHex(h, Math.min(100, Math.max(0, s)), l);
}
function hslToHex(h, s, l) {
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60) [r,g,b] = [c,x,0];
  else if (h < 120) [r,g,b] = [x,c,0];
  else if (h < 180) [r,g,b] = [0,c,x];
  else if (h < 240) [r,g,b] = [0,x,c];
  else if (h < 300) [r,g,b] = [x,0,c];
  else [r,g,b] = [c,0,x];
  const to = n => Math.round((n + m) * 255).toString(16).padStart(2, '0');
  return to(r) + to(g) + to(b);
}

/* ═══════════ Color API ═══════════ */
async function fetchColor(hex) {
  const h = normHex(hex);
  if (!h) return null;
  if (state.cache[h]) return state.cache[h];
  try {
    const r = await fetch(`${API}/id?hex=${h}`).then(r => r.json());
    // Sanitize + cache
    const data = {
      hex: h,
      name: (r.name && r.name.value) || h.toUpperCase(),
      exact: !!(r.name && r.name.exact_match_name),
      distance: r.name && r.name.distance || 0,
      rgb: r.rgb && r.rgb.value || `rgb(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)})`,
      hsl: r.hsl && r.hsl.value || '',
      hsv: r.hsv && r.hsv.value || '',
      cmyk: r.cmyk && r.cmyk.value || '',
      xyz: r.XYZ && r.XYZ.value || '',
      contrastName: r.contrast && r.contrast.value || '#000000',
    };
    state.cache[h] = data;
    // Limit cache size
    const keys = Object.keys(state.cache);
    if (keys.length > 800) {
      const drop = keys.slice(0, keys.length - 600);
      for (const k of drop) delete state.cache[k];
    }
    localStorage.setItem('hued-cache', JSON.stringify(state.cache));
    return data;
  } catch(e) {
    return { hex: h, name: h.toUpperCase(), exact: false, distance: 0, rgb: '', hsl: '', hsv: '', cmyk: '', xyz: '', contrastName: '#000' };
  }
}
async function fetchScheme(hex, mode = 'analogic', count = 5) {
  const h = normHex(hex);
  if (!h) return [];
  try {
    const r = await fetch(`${API}/scheme?hex=${h}&mode=${mode}&count=${count}`).then(r => r.json());
    return (r.colors || []).map(c => ({ hex: c.hex.clean.toLowerCase(), name: c.name && c.name.value || '' }));
  } catch(e) { return []; }
}

/* ═══════════ Feed queue ═══════════ */
const FEED = {
  el:null, queue:[], busy:false, currentIndex:0, io:null,
  BUFFER_AHEAD:6, BATCH_SIZE:6, MIN_QUEUE:12
};

async function refillFeed() {
  if (FEED.busy) return;
  FEED.busy = true;
  try {
    const ahead = FEED.queue.length - FEED.currentIndex;
    const need = Math.max(0, FEED.MIN_QUEUE - ahead);
    if (need <= 0) return;
    // Generate hex candidates
    const hexes = [];
    for (let i = 0; i < Math.max(FEED.BATCH_SIZE, need); i++) {
      let h;
      let tries = 0;
      do {
        h = randomHexInFamily(state.family);
        tries++;
      } while (state.seen.has(h) && tries < 10);
      state.seen.add(h);
      hexes.push(h);
    }
    // Fetch colour info in parallel
    const results = await Promise.all(hexes.map(h => fetchColor(h)));
    for (const c of results) {
      if (!c) continue;
      FEED.queue.push(c);
      appendCard(c);
    }
  } finally {
    FEED.busy = false;
    const stillAhead = FEED.queue.length - FEED.currentIndex;
    if (stillAhead < FEED.MIN_QUEUE - 2) setTimeout(refillFeed, 200);
  }
}

function appendCard(c) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.hex = c.hex;
  const cr = contrastRatio(c.hex);
  const light = cr.best === 'black';
  if (light) card.classList.add('light');
  const rgb = hexToRGB(c.hex);
  const hsl = rgbToHSL(rgb.r, rgb.g, rgb.b);
  card.innerHTML = `
    <div class="bg" style="background:#${c.hex}"></div>
    <div class="halo"></div>
    <div class="side">
      <div class="col">
        <button class="act ${isFav(c.hex) ? 'on' : ''}" data-act="fav">${isFav(c.hex) ? '♥' : '♡'}</button>
        <div class="lbl">save</div>
      </div>
      <div class="col">
        <button class="act" data-act="copy">⧉</button>
        <div class="lbl">copy</div>
      </div>
      <div class="col">
        <button class="act" data-act="share">↗</button>
        <div class="lbl">share</div>
      </div>
      <div class="col">
        <button class="act" data-act="details">ⓘ</button>
        <div class="lbl">details</div>
      </div>
    </div>
    <div class="info">
      <div class="kicker">
        <span>${c.exact ? 'Exact match' : 'Closest name'}</span>
        <span class="dot"></span>
        <span>H ${hsl.h}° · S ${hsl.s}% · L ${hsl.l}%</span>
      </div>
      <div class="name">${c.name}</div>
      <button class="hex" data-act="copyhex" data-hex="${c.hex}">#${c.hex.toUpperCase()}<span class="cp">TAP · COPY</span></button>
      <div class="meta-row">
        <span>${c.rgb}</span>
      </div>
      <div class="palette" data-hex="${c.hex}" data-pal="0"></div>
    </div>
    <div class="heart-burst"></div>`;

  FEED.el.appendChild(card);
  wireCardActions(card, c);
  if (FEED.io) FEED.io.observe(card);
  // Lazy-load palette when card is near view
  lazyLoadPalette(card, c);
}

async function lazyLoadPalette(card, c) {
  const strip = card.querySelector('.palette');
  if (!strip) return;
  strip.innerHTML = Array(5).fill('').map(() => '<div class="sw" style="background:rgba(255,255,255,.08)"></div>').join('');
  const cols = await fetchScheme(c.hex, 'analogic', 5);
  if (!cols.length) { strip.remove(); return; }
  strip.innerHTML = cols.map(col => `<div class="sw" style="background:#${col.hex}" data-hex="${col.hex}" data-name="${col.name.replace(/"/g,'&quot;')}"></div>`).join('');
  strip.querySelectorAll('.sw').forEach(el => el.addEventListener('click', e => {
    e.stopPropagation();
    const hex = el.dataset.hex;
    navigator.clipboard.writeText('#' + hex).catch(() => {});
    toast(`copied #${hex} · ${el.dataset.name || 'unnamed'}`);
  }));
}

function wireCardActions(card, c) {
  const favBtn = card.querySelector('[data-act="fav"]');
  favBtn.addEventListener('click', e => { e.stopPropagation(); toggleFav(c); syncFavUI(card, c); });
  card.querySelector('[data-act="copy"]').addEventListener('click', async e => {
    e.stopPropagation();
    await copyToClipboard('#' + c.hex);
    toast(`copied #${c.hex}`);
  });
  card.querySelector('[data-act="copyhex"]').addEventListener('click', async e => {
    e.stopPropagation();
    await copyToClipboard('#' + c.hex);
    toast(`copied #${c.hex}`);
  });
  card.querySelector('[data-act="share"]').addEventListener('click', e => {
    e.stopPropagation();
    shareColor(c);
  });
  card.querySelector('[data-act="details"]').addEventListener('click', e => {
    e.stopPropagation();
    openDetails(c);
  });

  // Double-tap to save
  let lastTap = 0;
  card.addEventListener('click', e => {
    if (e.target.closest('.side, [data-act], .hex, .palette')) return;
    const now = Date.now();
    if (now - lastTap < 320) {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX || (rect.left + rect.width / 2)) - rect.left;
      const y = (e.clientY || (rect.top + rect.height / 2)) - rect.top;
      burstHeart(card, x, y);
      if (!isFav(c.hex)) toggleFav(c);
      syncFavUI(card, c);
      lastTap = 0;
    } else {
      lastTap = now;
    }
  });
}

function syncFavUI(card, c) {
  const b = card.querySelector('[data-act="fav"]');
  if (!b) return;
  b.textContent = isFav(c.hex) ? '♥' : '♡';
  b.classList.toggle('on', isFav(c.hex));
  updateFavBadge();
}

function burstHeart(card, x, y) {
  const h = document.createElement('div');
  h.className = 'heart-pop'; h.textContent = '♥';
  h.style.left = x + 'px'; h.style.top = y + 'px';
  const burst = card.querySelector('.heart-burst');
  (burst || card).appendChild(h);
  setTimeout(() => h.remove(), 900);
}

async function copyToClipboard(txt) {
  try { await navigator.clipboard.writeText(txt); return true; }
  catch(e) { return false; }
}

/* ═══════════ Favorites ═══════════ */
function isFav(hex) { return state.favorites.some(f => f.hex === hex); }
function toggleFav(c) {
  if (isFav(c.hex)) state.favorites = state.favorites.filter(f => f.hex !== c.hex);
  else state.favorites.push({ hex:c.hex, name:c.name });
  localStorage.setItem('hued-favs', JSON.stringify(state.favorites));
  updateFavBadge();
}
function updateFavBadge() {
  const b = $('fav-badge');
  const n = state.favorites.length;
  if (b) { b.textContent = n; b.style.display = n ? 'flex' : 'none'; }
  $('favs').classList.toggle('on', n > 0);
  $('fav-count-hdr').textContent = n ? '· ' + n : '';
  $('fdrawer-export').style.display = n ? 'flex' : 'none';
}

function openFavDrawer() {
  const list = $('fav-list');
  if (!state.favorites.length) {
    list.innerHTML = `<div class="fdrawer-empty">Nothing saved yet.<br><br>Double-tap a colour or tap ♡ to save it.</div>`;
  } else {
    list.innerHTML = state.favorites.slice().reverse().map(f => `
      <div class="fav-card" data-hex="${f.hex}">
        <div class="sw" style="background:#${f.hex}"></div>
        <div class="info">
          <div class="n">${f.name}</div>
          <div class="h">#${f.hex.toUpperCase()}</div>
        </div>
        <button class="rm" data-act="rm">×</button>
      </div>`).join('');
    list.querySelectorAll('.fav-card').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('[data-act="rm"]')) {
          const hex = card.dataset.hex;
          state.favorites = state.favorites.filter(f => f.hex !== hex);
          localStorage.setItem('hued-favs', JSON.stringify(state.favorites));
          updateFavBadge(); openFavDrawer();
          return;
        }
        const hex = card.dataset.hex;
        closeFavDrawer();
        jumpToHex(hex);
      });
    });
  }
  $('fav-drawer').classList.add('show');
  $('fdrawer-bg').classList.add('show');
}
function closeFavDrawer() {
  $('fav-drawer').classList.remove('show');
  $('fdrawer-bg').classList.remove('show');
}

/* ═══════════ Share ═══════════ */
async function shareColor(c) {
  const base = (location.protocol.startsWith('http') ? location.origin : '') + '/hued/';
  const url = `${base}?c=${c.hex}`;
  const text = `${c.name} · #${c.hex.toUpperCase()}`;
  if (navigator.share) {
    try { await navigator.share({ title:'Hued · ' + c.name, text, url }); return; }
    catch(e) { if (e.name === 'AbortError') return; }
  }
  await copyToClipboard(url);
  toast('link copied');
}

/* ═══════════ Details sheet ═══════════ */
async function openDetails(c) {
  $('det-title').textContent = c.name;
  const body = $('det-body');
  const rgb = hexToRGB(c.hex);
  const hsl = rgbToHSL(rgb.r, rgb.g, rgb.b);
  const cr = contrastRatio(c.hex);
  body.innerHTML = `
    <div class="det-preview">
      <div class="det-swatch" style="background:#${c.hex}"></div>
      <div>
        <div class="t">${c.name}</div>
        <div class="m">${c.exact ? 'Exact CSS/named match' : 'Closest match · distance ' + c.distance}</div>
      </div>
    </div>

    <div class="det-sec">
      <h4>Values</h4>
      <div class="det-grid">
        <div class="det-line"><span class="k">Hex</span><span class="v">#${c.hex.toUpperCase()}</span></div>
        <div class="det-line"><span class="k">RGB</span><span class="v">${c.rgb || `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`}</span></div>
        <div class="det-line"><span class="k">HSL</span><span class="v">${c.hsl || `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`}</span></div>
        ${c.hsv ? `<div class="det-line"><span class="k">HSV</span><span class="v">${c.hsv}</span></div>` : ''}
        ${c.cmyk ? `<div class="det-line"><span class="k">CMYK</span><span class="v">${c.cmyk}</span></div>` : ''}
        ${c.xyz ? `<div class="det-line"><span class="k">XYZ</span><span class="v">${c.xyz}</span></div>` : ''}
      </div>
    </div>

    <div class="det-sec">
      <h4>Contrast</h4>
      <div class="det-grid">
        <div class="det-line"><span class="k">vs White</span><span class="v">${cr.white.toFixed(2)}:1</span></div>
        <div class="det-line"><span class="k">vs Black</span><span class="v">${cr.black.toFixed(2)}:1</span></div>
        <div class="det-line"><span class="k">Best on</span><span class="v" style="color:${cr.best === 'white' ? '#fff' : '#000'};background:${cr.best === 'white' ? '#000' : '#fff'};padding:2px 6px;border-radius:4px">${cr.best.toUpperCase()}</span></div>
        <div class="det-line"><span class="k">WCAG AA</span><span class="v">${Math.max(cr.white, cr.black) >= 4.5 ? 'pass' : 'fail'} · text</span></div>
      </div>
    </div>

    <div class="det-sec">
      <h4>Complementary</h4>
      <div class="palette-strip" id="pal-comp"></div>
    </div>

    <div class="det-sec">
      <h4>Analogous</h4>
      <div class="palette-strip" id="pal-ana"></div>
    </div>

    <div class="det-sec">
      <h4>Triadic</h4>
      <div class="palette-strip" id="pal-tri"></div>
    </div>

    <div class="det-actions">
      <button class="btn" id="det-copy">Copy hex</button>
      <button class="btn" id="det-copy-name">Copy name</button>
      <button class="btn primary" id="det-share">Share this colour</button>
    </div>
  `;
  $('det-copy').addEventListener('click', () => { copyToClipboard('#' + c.hex); toast('hex copied'); });
  $('det-copy-name').addEventListener('click', () => { copyToClipboard(c.name); toast('name copied'); });
  $('det-share').addEventListener('click', () => shareColor(c));

  // Load palettes lazily
  const paint = async (mode, slotId) => {
    const cols = await fetchScheme(c.hex, mode, 5);
    const slot = document.getElementById(slotId);
    if (!slot) return;
    slot.innerHTML = cols.map(col => {
      const dark = luminance(col.hex) < 0.5;
      return `<div class="sw ${dark ? '' : 'light'}" style="background:#${col.hex}" data-hex="${col.hex}">
        <div class="lbl">${col.name || '#' + col.hex}</div>
      </div>`;
    }).join('');
    slot.querySelectorAll('.sw').forEach(el => el.addEventListener('click', async () => {
      const hex = el.dataset.hex;
      await copyToClipboard('#' + hex);
      toast(`copied #${hex}`);
    }));
  };
  paint('complement', 'pal-comp');
  paint('analogic', 'pal-ana');
  paint('triad', 'pal-tri');

  $('det-sheet').classList.add('show');
}

/* ═══════════ Filter sheet ═══════════ */
function openFilter() {
  const body = $('filter-body');
  body.innerHTML = `
    <div class="family-grid">
      ${FAMILIES.map(f => `<button class="family-chip ${state.family === f.key ? 'on' : ''}" data-fam="${f.key}" style="background:${f.seed};color:${luminance(f.seed.slice(1)) > 0.5 ? '#0a0a10' : '#fff'}">${f.label}</button>`).join('')}
    </div>
    <button class="family-clear ${state.family ? 'on' : ''}" id="fam-clear">${state.family ? 'Show all colours' : 'All colours (current)'}</button>
  `;
  body.querySelectorAll('[data-fam]').forEach(b => b.addEventListener('click', () => {
    state.family = b.dataset.fam === state.family ? '' : b.dataset.fam;
    closeSheet('filter-sheet');
    resetFeed();
  }));
  $('fam-clear').addEventListener('click', () => {
    state.family = '';
    closeSheet('filter-sheet');
    resetFeed();
  });
  $('filter-sheet').classList.add('show');
}

/* ═══════════ Search / paste sheet ═══════════ */
async function runSearch(q) {
  q = String(q || '').trim();
  if (!q) { jumpToHex(randomHexInFamily(state.family)); return; }
  // Try normalize as hex
  let h = normHex(q);
  if (!h) {
    // Try CSS name → convert via canvas
    const tmp = document.createElement('canvas').getContext('2d');
    try { tmp.fillStyle = '#000'; tmp.fillStyle = q; const rgb = tmp.fillStyle; if (rgb.startsWith('#')) h = normHex(rgb); } catch(e) {}
  }
  if (!h) { toast('couldn\'t parse — try 6-digit hex or CSS name'); return; }
  jumpToHex(h);
}
async function jumpToHex(hex) {
  hex = normHex(hex);
  if (!hex) return;
  closeSheet('search-sheet');
  // If already in queue, scroll to it
  const idx = FEED.queue.findIndex(c => c.hex === hex);
  if (idx >= 0) {
    const cards = FEED.el.querySelectorAll('.card');
    if (cards[idx]) cards[idx].scrollIntoView({ behavior:'smooth', block:'start' });
    return;
  }
  // Insert at top of queue
  const c = await fetchColor(hex);
  state.seen.add(hex);
  FEED.queue.unshift(c);
  // Rebuild — quicker than fancy insert: reset and repopulate
  FEED.el.querySelectorAll('.card').forEach(el => el.remove());
  for (const col of FEED.queue) appendCard(col);
  FEED.el.scrollTo({ top:0, behavior:'auto' });
}

/* ═══════════ Sheet close helpers ═══════════ */
function closeSheet(id) { const el = $(id); if (el) el.classList.remove('show'); }
document.querySelectorAll('[data-close-sheet]').forEach(el => el.addEventListener('click', () => closeSheet(el.dataset.closeSheet)));
['det-sheet','filter-sheet','search-sheet'].forEach(id => {
  const el = $(id);
  if (el) el.addEventListener('click', e => { if (e.target.id === id) closeSheet(id); });
});

/* ═══════════ Reset / init ═══════════ */
function resetFeed() {
  FEED.queue = []; FEED.currentIndex = 0; state.seen.clear();
  FEED.el.querySelectorAll('.card').forEach(el => el.remove());
  FEED.el.scrollTo({ top:0, behavior:'auto' });
  refillFeed();
}

async function init() {
  FEED.el = $('feed');
  // Wire top nav
  $('filter').addEventListener('click', openFilter);
  $('fam').addEventListener('click', () => { $('search-sheet').classList.add('show'); setTimeout(() => $('search-input').focus(), 60); });
  $('favs').addEventListener('click', openFavDrawer);
  $('fav-close').addEventListener('click', closeFavDrawer);
  $('fdrawer-bg').addEventListener('click', closeFavDrawer);
  $('search-go').addEventListener('click', () => runSearch($('search-input').value));
  $('search-rand').addEventListener('click', () => { closeSheet('search-sheet'); jumpToHex(randomHexInFamily(state.family)); });
  $('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(e.target.value); });
  $('fav-copy').addEventListener('click', async () => {
    const txt = state.favorites.map(f => `#${f.hex.toUpperCase()}  ${f.name}`).join('\n');
    await copyToClipboard(txt);
    toast(`copied ${state.favorites.length} colours`);
  });
  $('fav-clear').addEventListener('click', () => {
    if (!confirm('Clear all saved colours?')) return;
    state.favorites = [];
    localStorage.setItem('hued-favs', JSON.stringify(state.favorites));
    updateFavBadge(); openFavDrawer();
  });
  updateFavBadge();

  // IntersectionObserver for prefetch
  FEED.io = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting && e.intersectionRatio > 0.6) {
        const cards = [...FEED.el.querySelectorAll('.card')];
        const idx = cards.indexOf(e.target);
        FEED.currentIndex = idx;
        if (idx >= cards.length - FEED.BUFFER_AHEAD) refillFeed();
      }
    }
  }, { root: FEED.el, threshold: [0, 0.6, 1] });

  // Scroll-based backup
  FEED.el.addEventListener('scroll', () => {
    if (FEED._sch) return;
    FEED._sch = true;
    requestAnimationFrame(() => {
      FEED._sch = false;
      const cardH = FEED.el.clientHeight || window.innerHeight;
      const approx = Math.floor(FEED.el.scrollTop / cardH);
      if (approx > FEED.currentIndex) FEED.currentIndex = approx;
      const ahead = FEED.queue.length - FEED.currentIndex;
      if (ahead < FEED.MIN_QUEUE) refillFeed();
    });
  }, { passive: true });

  // Keyboard: Esc closes sheets
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeSheet('det-sheet'); closeSheet('filter-sheet'); closeSheet('search-sheet');
      closeFavDrawer();
    }
  });

  // Deep link ?c=<hex>
  const p = new URLSearchParams(location.search);
  const dl = p.get('c');
  if (dl) {
    const hex = normHex(dl);
    if (hex) {
      const c = await fetchColor(hex);
      state.seen.add(hex);
      FEED.queue.push(c);
      appendCard(c);
    }
  }

  // Prime the feed
  refillFeed();
}

init();
</script>
</body>
</html>
