<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Site Diary — TaskIAP</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--bg3:#141416;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80;--red:#ef4444;--gold:#f7c948;--blue:#60a5fa;--mono:ui-monospace,"SF Mono",Menlo,monospace;--font:system-ui,-apple-system,sans-serif}
*{margin:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,15,16,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px}
.topbar .brand{font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:6px}
.topbar .brand span{color:var(--accent)}
.topbar .home{color:var(--dim);text-decoration:none;font-size:1rem;transition:color .2s}
.topbar .home:hover{color:var(--accent)}
.topbar .spacer{flex:1}
.topbar .proj-name{background:none;border:1px solid transparent;color:var(--dim);font-size:.8rem;padding:4px 8px;border-radius:6px;max-width:160px;font-family:var(--font);transition:all .2s}
.topbar .proj-name:focus{border-color:var(--accent);color:var(--text);background:var(--bg2);outline:none}

/* Date Nav */
.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.date-nav button{background:var(--bg2);border:1px solid var(--border);color:var(--dim);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.date-nav button:hover{border-color:var(--accent);color:var(--accent)}
.date-current{text-align:center}
.date-current .date-big{font-size:1.2rem;font-weight:800;font-family:var(--mono)}
.date-current .date-day{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.date-input{opacity:0;position:absolute;width:1px;height:1px}

/* Weather Strip */
.weather-strip{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;background:var(--bg)}
.weather-strip::-webkit-scrollbar{display:none}
.weather-strip .wx-chip{padding:6px 14px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--dim);transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
.weather-strip .wx-chip:hover{border-color:var(--accent);color:var(--text)}
.weather-strip .wx-chip.active{border-color:var(--accent);background:rgba(255,107,53,.12);color:var(--text)}

/* Container */
.container{max-width:800px;margin:0 auto;padding:12px 16px 80px}

/* Section Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;transition:background .15s;user-select:none}
.card-header:hover{background:rgba(255,255,255,.02)}
.card-header .icon{font-size:1.1rem;flex-shrink:0}
.card-header .title{font-size:.85rem;font-weight:700;flex:1}
.card-header .badge{font-size:.7rem;background:var(--bg);padding:2px 8px;border-radius:8px;color:var(--dim);font-family:var(--mono)}
.card-header .arrow{color:var(--dim);font-size:.8rem;transition:transform .2s}
.card.open .arrow{transform:rotate(90deg)}
.card-body{display:none;padding:0 14px 14px;animation:fadeIn .2s}
.card.open .card-body{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* Form */
label{font-size:.7rem;color:var(--dim);display:block;margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;font-size:.85rem;font-family:var(--font);transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 2px rgba(255,107,53,.1)}
textarea{resize:vertical;min-height:80px}
.row{display:flex;gap:8px;margin-bottom:8px}
.row>*{flex:1;min-width:0}

/* Crew Table */
.crew-table{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:8px}
.crew-table th{text-align:left;font-size:.68rem;color:var(--dim);padding:4px 6px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
.crew-table td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.03)}
.crew-table input{padding:5px 7px;font-size:.8rem}
.crew-table .del{width:28px;text-align:center;cursor:pointer;color:var(--red);opacity:.4;transition:opacity .15s}
.crew-table .del:hover{opacity:1}
.add-crew{padding:5px 12px;background:var(--bg);border:1px dashed var(--border);color:var(--dim);border-radius:6px;cursor:pointer;font-size:.75rem;transition:all .15s;width:100%;text-align:center;display:block;margin-top:4px}
.add-crew:hover{border-color:var(--accent);color:var(--accent)}

/* Mic Button */
.mic-wrap{display:flex;align-items:flex-start;gap:8px}
.mic-wrap textarea{flex:1}
.mic-btn{width:44px;height:44px;border-radius:50%;background:var(--bg);border:2px solid var(--border);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0;margin-top:22px}
.mic-btn:hover{border-color:var(--accent);color:var(--accent)}
.mic-btn.active{background:var(--red);border-color:var(--red);color:#fff;animation:micPulse 1.2s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
.mic-status{font-size:.68rem;color:var(--dim);font-style:italic;margin-top:2px;min-height:14px}

/* Photo Grid */
.photo-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.photo-grid .thumb{width:72px;height:72px;border-radius:6px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.photo-grid .thumb:hover{border-color:var(--accent);transform:scale(1.05)}
.photo-add{width:72px;height:72px;border-radius:6px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:1.4rem;transition:all .15s}
.photo-add:hover{border-color:var(--accent);color:var(--accent)}

/* Action Bar */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,16,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;justify-content:center;z-index:100}
.action-bar button{padding:10px 20px;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font)}
.action-bar .btn-save{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(255,107,53,.25)}
.action-bar .btn-save:hover{filter:brightness(1.1);transform:translateY(-1px)}
.action-bar .btn-sec{background:var(--bg2);border:1px solid var(--border);color:var(--dim)}
.action-bar .btn-sec:hover{border-color:var(--accent);color:var(--text)}

/* Entries List */
.entries-header{display:flex;align-items:center;justify-content:space-between;margin:16px 0 8px}
.entries-header h2{font-size:.85rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.search-box{padding:6px 10px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:.8rem;width:180px}
.entry{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;transition:all .15s}
.entry:hover{border-color:rgba(255,107,53,.2)}
.entry .e-date{font-weight:800;font-size:.9rem;color:var(--accent);display:flex;align-items:center;gap:6px}
.entry .e-wx{font-size:.75rem;color:var(--dim);margin-top:2px}
.entry .e-meta{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0;font-size:.75rem}
.entry .e-meta span{display:flex;align-items:center;gap:3px;color:var(--dim)}
.entry .e-meta span b{color:var(--text)}
.entry .e-notes{font-size:.85rem;line-height:1.6;white-space:pre-wrap;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.04)}
.entry .e-crew{font-size:.75rem;color:var(--dim);margin-top:4px}
.entry .e-photos{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.entry .e-photos img{width:60px;height:60px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.entry .e-actions{display:flex;gap:6px;margin-top:8px}
.entry .e-actions button{padding:4px 10px;font-size:.7rem;background:var(--bg);border:1px solid var(--border);color:var(--dim);border-radius:5px;cursor:pointer;transition:all .15s}
.entry .e-actions button:hover{border-color:var(--accent);color:var(--accent)}
.entry .e-actions button.del:hover{border-color:var(--red);color:var(--red)}

/* Empty state */
.empty{text-align:center;padding:40px;color:var(--dim)}
.empty .icon{font-size:2.5rem;margin-bottom:8px}
.empty p{font-size:.85rem}

/* Stats strip */
.stats-strip{display:flex;gap:8px;padding:8px 0;overflow-x:auto;scrollbar-width:none;margin-bottom:4px}
.stats-strip::-webkit-scrollbar{display:none}
.stats-strip .stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;text-align:center;flex-shrink:0;min-width:80px}
.stats-strip .stat .val{font-size:1.1rem;font-weight:800;font-family:var(--mono)}
.stats-strip .stat .lbl{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}

@media print{
  .topbar,.date-nav,.action-bar,.search-box,.e-actions,.photo-add,.mic-btn,.add-crew,.stats-strip,.weather-strip{display:none!important}
  body{background:#fff;color:#000}
  .card,.entry{border:1px solid #ccc;background:#fff}
  .card-body{display:block!important}
  .entry .e-date{color:#333}
}
@media(max-width:600px){
  .row{flex-direction:column;gap:6px}
  .container{padding:8px 10px 80px}
}
</style></head><body>

<div class="topbar">
  <a href="index.html" class="home">←</a>
  <div class="brand">📋 <span>Site Diary</span></div>
  <div class="spacer"></div>
  <input class="proj-name" id="projName" placeholder="Project name" value="">
</div>

<div class="date-nav">
  <button onclick="navDay(-1)">◀</button>
  <div class="date-current" onclick="document.getElementById('datePicker').showPicker()">
    <div class="date-big" id="dateDisplay"></div>
    <div class="date-day" id="dayDisplay"></div>
  </div>
  <button onclick="navDay(1)">▶</button>
  <input type="date" id="datePicker" class="date-input">
</div>

<div class="weather-strip" id="weatherStrip"></div>

<div class="container">
  <!-- Stats -->
  <div class="stats-strip" id="statsStrip"></div>

  <!-- Conditions Card -->
  <div class="card open" id="conditionsCard">
    <div class="card-header" onclick="toggleCard('conditionsCard')">
      <span class="icon">🌡️</span><span class="title">Conditions</span>
      <span class="badge" id="condBadge">—</span><span class="arrow">▸</span>
    </div>
    <div class="card-body">
      <div class="row">
        <div><label>Temperature (°C)</label><input id="eTemp" type="number" value="18"></div>
        <div><label>Wind</label><select id="eWind"><option>Calm</option><option>Light</option><option>Moderate</option><option>Strong</option><option>Extreme</option></select></div>
        <div><label>Precipitation</label><select id="ePrecip"><option>None</option><option>Light Rain</option><option>Heavy Rain</option><option>Snow</option><option>Freezing Rain</option></select></div>
      </div>
      <div class="row">
        <div><label>Humidity (%)</label><input id="eHumidity" type="number" value="50" min="0" max="100"></div>
        <div><label>Ground Conditions</label><select id="eGround"><option>Dry</option><option>Damp</option><option>Wet</option><option>Muddy</option><option>Frozen</option><option>Snow-covered</option></select></div>
        <div><label>Visibility</label><select id="eVis"><option>Good</option><option>Fair</option><option>Poor</option><option>Fog</option></select></div>
      </div>
      <div class="row">
        <div><label>Work Impact</label><select id="eImpact"><option value="none" style="color:#4ade80">No Impact — Full Day</option><option value="partial" style="color:#f7c948">Partial — Reduced Work</option><option value="nowork" style="color:#ef4444">No Work — Weather Day</option></select></div>
      </div>
    </div>
  </div>

  <!-- Crew Card -->
  <div class="card open" id="crewCard">
    <div class="card-header" onclick="toggleCard('crewCard')">
      <span class="icon">👷</span><span class="title">Crew</span>
      <span class="badge" id="crewBadge">0</span><span class="arrow">▸</span>
    </div>
    <div class="card-body">
      <table class="crew-table" id="crewTable">
        <thead><tr><th>Trade</th><th style="width:60px">Count</th><th style="width:80px">Hours</th><th style="width:28px"></th></tr></thead>
        <tbody id="crewBody"></tbody>
      </table>
      <div class="add-crew" onclick="addCrewRow()">+ Add Trade</div>
    </div>
  </div>

  <!-- Equipment & Deliveries -->
  <div class="card" id="logisticsCard">
    <div class="card-header" onclick="toggleCard('logisticsCard')">
      <span class="icon">🚜</span><span class="title">Equipment & Deliveries</span>
      <span class="arrow">▸</span>
    </div>
    <div class="card-body">
      <label>Equipment On Site</label>
      <textarea id="eEquip" rows="2" placeholder="Crane TC-003, Excavator CAT 320, Concrete pump 42m boom" style="margin-bottom:8px"></textarea>
      <label>Deliveries Today</label>
      <textarea id="eDeliveries" rows="2" placeholder="15T rebar from ArcelorMittal, 200m³ concrete from Holcim"></textarea>
    </div>
  </div>

  <!-- Work Performed -->
  <div class="card open" id="workCard">
    <div class="card-header" onclick="toggleCard('workCard')">
      <span class="icon">🔨</span><span class="title">Work Performed</span>
      <span class="arrow">▸</span>
    </div>
    <div class="card-body">
      <div class="mic-wrap">
        <div style="flex:1">
          <label>Daily Notes</label>
          <textarea id="eNotes" rows="6" placeholder="Tap mic or type your daily notes..."></textarea>
          <div class="mic-status" id="micStatus"></div>
        </div>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice-to-text">🎤</button>
      </div>
    </div>
  </div>

  <!-- Safety -->
  <div class="card" id="safetyCard">
    <div class="card-header" onclick="toggleCard('safetyCard')">
      <span class="icon">🦺</span><span class="title">Safety</span>
      <span class="arrow">▸</span>
    </div>
    <div class="card-body">
      <div class="row">
        <div><label>Toolbox Talk Topic</label><input id="eSafetyTopic" placeholder="Fall protection, excavation safety..."></div>
      </div>
      <div class="row">
        <div><label>Incidents / Near Misses</label><textarea id="eIncidents" rows="2" placeholder="None. (Or describe any incidents)"></textarea></div>
      </div>
      <div class="row">
        <div><label>Visitors</label><input id="eVisitors" placeholder="MOL inspector, client rep, architect"></div>
      </div>
    </div>
  </div>

  <!-- Photos -->
  <div class="card" id="photoCard">
    <div class="card-header" onclick="toggleCard('photoCard')">
      <span class="icon">📷</span><span class="title">Photos</span>
      <span class="badge" id="photoBadge">0</span><span class="arrow">▸</span>
    </div>
    <div class="card-body">
      <div class="photo-grid" id="photoGrid">
        <div class="photo-add" onclick="document.getElementById('photoInput').click()">+</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="addPhotos(this.files)">
    </div>
  </div>

  <!-- Previous Entries -->
  <div class="entries-header">
    <h2>Entries</h2>
    <input class="search-box" id="searchBox" placeholder="Search..." oninput="renderEntries()">
  </div>
  <div id="entriesList"></div>
</div>

<div class="action-bar">
  <button class="btn-save" onclick="saveEntry()">💾 Save Entry</button>
  <button class="btn-sec" onclick="window.print()">🖨️ Print</button>
  <button class="btn-sec" onclick="exportCSV()">📤 Export</button>
</div>

<script>
var STORAGE='sd_diary';var PROJ_KEY='sd_project';
var diary=[];try{diary=JSON.parse(localStorage.getItem(STORAGE))||[];}catch(e){}
var currentDate=new Date().toISOString().slice(0,10);
var photos=[];
var crewRows=[{trade:'',count:'',hours:''}];
var recognition=null,isListening=false;
var WEATHER=['☀️ Sunny','⛅ Partly Cloudy','☁️ Overcast','🌧️ Rain','❄️ Snow','🌫️ Fog','⛈️ Thunderstorm','🌬️ Windy'];
var selectedWeather='☀️ Sunny';

document.getElementById('projName').value=localStorage.getItem(PROJ_KEY)||'';
document.getElementById('projName').addEventListener('change',function(){localStorage.setItem(PROJ_KEY,this.value);});
document.getElementById('datePicker').addEventListener('change',function(){currentDate=this.value;updateDateDisplay();loadDayData();});

function updateDateDisplay(){
  var d=new Date(currentDate+'T12:00:00');
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dateDisplay').textContent=months[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  document.getElementById('dayDisplay').textContent=days[d.getDay()];
  document.getElementById('datePicker').value=currentDate;
}
function navDay(dir){var d=new Date(currentDate+'T12:00:00');d.setDate(d.getDate()+dir);currentDate=d.toISOString().slice(0,10);updateDateDisplay();loadDayData();}

function buildWeatherStrip(){
  var html='';WEATHER.forEach(function(w){html+='<div class="wx-chip'+(w===selectedWeather?' active':'')+'" onclick="pickWeather(\''+w+'\')">'+w+'</div>';});
  document.getElementById('weatherStrip').innerHTML=html;
}
function pickWeather(w){selectedWeather=w;buildWeatherStrip();}

function toggleCard(id){document.getElementById(id).classList.toggle('open');}

function addCrewRow(trade,count,hours){
  crewRows.push({trade:trade||'',count:count||'',hours:hours||'8'});renderCrew();
}
function removeCrewRow(i){crewRows.splice(i,1);renderCrew();}
function renderCrew(){
  var html='';var total=0;
  crewRows.forEach(function(r,i){
    total+=parseInt(r.count)||0;
    html+='<tr><td><input value="'+esc(r.trade)+'" placeholder="Carpenter, Laborer..." onchange="crewRows['+i+'].trade=this.value"></td>'
      +'<td><input type="number" value="'+r.count+'" min="0" onchange="crewRows['+i+'].count=this.value;renderCrew()"></td>'
      +'<td><input type="number" value="'+r.hours+'" min="0" step="0.5" onchange="crewRows['+i+'].hours=this.value"></td>'
      +'<td class="del" onclick="removeCrewRow('+i+')">✕</td></tr>';
  });
  document.getElementById('crewBody').innerHTML=html;
  document.getElementById('crewBadge').textContent=total+' workers';
}

function addPhotos(files){
  for(var i=0;i<files.length;i++){(function(file){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();img.onload=function(){
        var c=document.createElement('canvas'),cx=c.getContext('2d');
        var w=img.width,h=img.height,mx=600;
        if(w>mx){h*=mx/w;w=mx;}c.width=w;c.height=h;cx.drawImage(img,0,0,w,h);
        photos.push(c.toDataURL('image/jpeg',0.6));renderPhotos();
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  })(files[i]);}
}
function renderPhotos(){
  var html='';photos.forEach(function(p,i){html+='<img class="thumb" src="'+p+'" onclick="photos.splice('+i+',1);renderPhotos()">';});
  html+='<div class="photo-add" onclick="document.getElementById(\'photoInput\').click()">+</div>';
  document.getElementById('photoGrid').innerHTML=html;
  document.getElementById('photoBadge').textContent=photos.length;
}

function saveEntry(){
  var entry={id:Date.now(),date:currentDate,weather:selectedWeather,
    temp:document.getElementById('eTemp').value,wind:document.getElementById('eWind').value,
    precip:document.getElementById('ePrecip').value,humidity:document.getElementById('eHumidity').value,
    ground:document.getElementById('eGround').value,visibility:document.getElementById('eVis').value,
    impact:document.getElementById('eImpact').value,
    crew:crewRows.filter(function(r){return r.trade||r.count;}),
    equip:document.getElementById('eEquip').value,deliveries:document.getElementById('eDeliveries').value,
    notes:document.getElementById('eNotes').value,
    safetyTopic:document.getElementById('eSafetyTopic').value,
    incidents:document.getElementById('eIncidents').value,
    visitors:document.getElementById('eVisitors').value,
    photos:photos};
  diary.push(entry);
  try{localStorage.setItem(STORAGE,JSON.stringify(diary));}catch(e){alert('Storage full — try removing old photos');}
  document.getElementById('eNotes').value='';photos=[];renderPhotos();
  renderEntries();updateStats();
}

function loadDayData(){
  renderEntries();updateStats();
  var existing=diary.filter(function(e){return e.date===currentDate;});
  document.getElementById('condBadge').textContent=existing.length?existing[existing.length-1].weather:'—';
}

function renderEntries(){
  var q=(document.getElementById('searchBox').value||'').toLowerCase();
  var list=diary.filter(function(e){
    if(e.date!==currentDate&&!q)return false;
    if(q){var hay=(e.notes+' '+e.deliveries+' '+e.equip+' '+e.date+' '+(e.safetyTopic||'')+' '+(e.incidents||'')).toLowerCase();return hay.indexOf(q)!==-1;}
    return true;
  }).sort(function(a,b){return b.id-a.id;});
  var div=document.getElementById('entriesList');
  if(!list.length){div.innerHTML='<div class="empty"><div class="icon">📋</div><p>No entries for this day yet</p></div>';return;}
  var html='';list.forEach(function(e){
    var totalCrew=0;if(e.crew)e.crew.forEach(function(c){totalCrew+=parseInt(c.count)||0;});
    var impactIcon=e.impact==='nowork'?'🔴':e.impact==='partial'?'🟡':'🟢';
    html+='<div class="entry"><div class="e-date">'+e.weather.split(' ')[0]+' '+e.date+' <span style="font-size:.7rem;color:var(--dim);font-weight:400">'+impactIcon+'</span></div>';
    html+='<div class="e-wx">'+e.weather+' · '+e.temp+'°C · Wind: '+e.wind+' · '+e.ground+'</div>';
    html+='<div class="e-meta">';
    if(totalCrew)html+='<span>👷 <b>'+totalCrew+'</b> crew</span>';
    if(e.equip)html+='<span>🚜 '+esc(e.equip).substring(0,60)+'</span>';
    if(e.deliveries)html+='<span>📦 '+esc(e.deliveries).substring(0,60)+'</span>';
    if(e.visitors)html+='<span>👤 '+esc(e.visitors)+'</span>';
    html+='</div>';
    if(e.crew&&e.crew.length){html+='<div class="e-crew">';e.crew.forEach(function(c){if(c.trade)html+=c.trade+': '+c.count+' ('+c.hours+'h) · ';});html=html.replace(/ · $/,'');html+='</div>';}
    if(e.safetyTopic)html+='<div class="e-crew">🦺 Toolbox: '+esc(e.safetyTopic)+'</div>';
    if(e.incidents&&e.incidents!=='None.')html+='<div class="e-crew" style="color:var(--red)">⚠️ '+esc(e.incidents)+'</div>';
    if(e.notes)html+='<div class="e-notes">'+esc(e.notes)+'</div>';
    if(e.photos&&e.photos.length){html+='<div class="e-photos">';e.photos.forEach(function(p){html+='<img src="'+p+'">';});html+='</div>';}
    html+='<div class="e-actions"><button onclick="editEntry('+e.id+')">Edit</button><button class="del" onclick="deleteEntry('+e.id+')">Delete</button></div>';
    html+='</div>';
  });
  div.innerHTML=html;
}

function deleteEntry(id){if(!confirm('Delete this entry?'))return;diary=diary.filter(function(e){return e.id!==id;});localStorage.setItem(STORAGE,JSON.stringify(diary));renderEntries();updateStats();}
function editEntry(id){
  var e=diary.find(function(x){return x.id===id;});if(!e)return;
  selectedWeather=e.weather||'☀️ Sunny';buildWeatherStrip();
  document.getElementById('eTemp').value=e.temp||18;
  document.getElementById('eWind').value=e.wind||'Calm';
  document.getElementById('ePrecip').value=e.precip||'None';
  document.getElementById('eHumidity').value=e.humidity||50;
  document.getElementById('eGround').value=e.ground||'Dry';
  document.getElementById('eVis').value=e.visibility||'Good';
  document.getElementById('eImpact').value=e.impact||'none';
  crewRows=e.crew&&e.crew.length?JSON.parse(JSON.stringify(e.crew)):[{trade:'',count:'',hours:'8'}];renderCrew();
  document.getElementById('eEquip').value=e.equip||'';
  document.getElementById('eDeliveries').value=e.deliveries||'';
  document.getElementById('eNotes').value=e.notes||'';
  document.getElementById('eSafetyTopic').value=e.safetyTopic||'';
  document.getElementById('eIncidents').value=e.incidents||'';
  document.getElementById('eVisitors').value=e.visitors||'';
  photos=e.photos?e.photos.slice():[];renderPhotos();
  diary=diary.filter(function(x){return x.id!==id;});localStorage.setItem(STORAGE,JSON.stringify(diary));
  renderEntries();window.scrollTo(0,0);
}

function updateStats(){
  var all=diary.length;
  var thisMonth=diary.filter(function(e){return e.date.slice(0,7)===currentDate.slice(0,7);}).length;
  var weatherDays=diary.filter(function(e){return e.impact==='nowork';}).length;
  var totalCrewDays=0;diary.forEach(function(e){if(e.crew)e.crew.forEach(function(c){totalCrewDays+=parseInt(c.count)||0;});});
  document.getElementById('statsStrip').innerHTML=
    '<div class="stat"><div class="val" style="color:var(--accent)">'+all+'</div><div class="lbl">Total Entries</div></div>'
    +'<div class="stat"><div class="val" style="color:var(--green)">'+thisMonth+'</div><div class="lbl">This Month</div></div>'
    +'<div class="stat"><div class="val" style="color:var(--red)">'+weatherDays+'</div><div class="lbl">Weather Days</div></div>'
    +'<div class="stat"><div class="val" style="color:var(--blue)">'+totalCrewDays+'</div><div class="lbl">Total Crew-Days</div></div>';
}

function exportCSV(){
  var csv='Date,Weather,Temp,Wind,Precip,Impact,Crew Total,Equipment,Deliveries,Notes,Safety Topic,Incidents,Visitors\n';
  diary.sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(e){
    var tc=0;if(e.crew)e.crew.forEach(function(c){tc+=parseInt(c.count)||0;});
    csv+=e.date+','+q(e.weather)+','+e.temp+','+e.wind+','+(e.precip||'')+','+(e.impact||'')+','+tc+','+q(e.equip)+','+q(e.deliveries)+','+q(e.notes)+','+q(e.safetyTopic||'')+','+q(e.incidents||'')+','+q(e.visitors||'')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='site-diary-'+(document.getElementById('projName').value||'project').replace(/\s+/g,'-')+'.csv';a.click();
}
function q(s){return '"'+(s||'').replace(/"/g,'""')+'"';}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Speech Recognition
if('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();recognition.continuous=true;recognition.interimResults=true;recognition.lang='en-CA';
  recognition.onresult=function(e){
    var final='',interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript+' ';
      else interim=e.results[i][0].transcript;
    }
    if(final)document.getElementById('eNotes').value+=final;
    document.getElementById('micStatus').textContent=interim?'...'+interim:'Listening...';
  };
  recognition.onend=function(){if(isListening)recognition.start();};
  recognition.onerror=function(e){document.getElementById('micStatus').textContent='Error: '+e.error;isListening=false;updateMicUI();};
}
function toggleMic(){
  if(!recognition)return alert('Speech recognition not supported in this browser.');
  if(isListening){recognition.stop();isListening=false;document.getElementById('micStatus').textContent='';}
  else{recognition.start();isListening=true;document.getElementById('micStatus').textContent='Listening...';}
  updateMicUI();
}
function updateMicUI(){document.getElementById('micBtn').classList.toggle('active',isListening);}

// Init
updateDateDisplay();buildWeatherStrip();renderCrew();renderPhotos();loadDayData();updateStats();
</script></body></html>
