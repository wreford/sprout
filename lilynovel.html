// ── Audio Context ──
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

// ── Sound Effects ──
function playTone(freq,dur,type,vol){
  try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();
  o.type=type||"sine";o.frequency.value=freq;
  g.gain.setValueAtTime(Math.min(vol||0.012,0.015),c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}
}
function sfxPageTurn(){playTone(200,0.15,"sine",0.008);setTimeout(function(){playTone(180,0.1,"sine",0.006);},50);}
function sfxChoice(){playTone(523,0.15,"sine",0.012);setTimeout(function(){playTone(659,0.12,"sine",0.01);},80);}
function sfxNewChapter(){playTone(392,0.3,"sine",0.01);setTimeout(function(){playTone(523,0.25,"sine",0.01);},150);}
function sfxEnding(){
  var notes=[392,523,659,784];
  notes.forEach(function(n,i){setTimeout(function(){playTone(n,0.4,"sine",0.012);},i*150);});
}

// ── Background Music ──
var bgMusic={playing:false,muted:false,intervalId:null,noteIdx:0,
  melody:[261.63,293.66,329.63,392,440,523.25,587.33,659.25],
  pattern:[0,2,4,3,2,0,1,3,4,5,4,2,3,1,0,2],
  bass:[130.81,146.83,164.81,196,220],
  bassPat:[0,0,3,3,4,4,2,0],bassIdx:0};

function startBgMusic(){
  if(bgMusic.playing)return;bgMusic.playing=true;bgMusic.noteIdx=0;bgMusic.bassIdx=0;
  function playNote(){
    if(bgMusic.muted)return;
    var mFreq=bgMusic.melody[bgMusic.pattern[bgMusic.noteIdx%bgMusic.pattern.length]];
    playTone(mFreq,0.6,"sine",0.005);
    if(bgMusic.noteIdx%2===0){
      var bFreq=bgMusic.bass[bgMusic.bassPat[bgMusic.bassIdx%bgMusic.bassPat.length]];
      playTone(bFreq,1.0,"triangle",0.003);
      bgMusic.bassIdx++;
    }
    bgMusic.noteIdx++;
  }
  playNote();
  bgMusic.intervalId=setInterval(playNote,750);
}
function stopBgMusic(){bgMusic.playing=false;if(bgMusic.intervalId)clearInterval(bgMusic.intervalId);bgMusic.intervalId=null;}
function toggleMusic(){bgMusic.muted=!bgMusic.muted;render();}

// ── Narration (cancel→60ms→speak) ──
function speak(text){
  try{
    window.speechSynthesis.cancel();
    setTimeout(function(){
      var u=new SpeechSynthesisUtterance(text);
      u.rate=0.9;u.pitch=1.1;u.volume=0.7;
      var voices=window.speechSynthesis.getVoices();
      var female=voices.find(function(v){return /female|samantha|karen|victoria|zira/i.test(v.name);});
      if(female)u.voice=female;
      window.speechSynthesis.speak(u);
    },60);
  }catch(e){}
}

// ── Game State ──
var state={
  screen:"title",// title, scene, ending
  sceneId:"ch1",
  textPos:0,
  textDone:false,
  choicesVisible:false,
  endings:loadEndings(),
  transitioning:false,
  musicStarted:false
};

function loadEndings(){
  try{var e=JSON.parse(localStorage.getItem("lily-novel-endings"));return e||{};}catch(x){return {};}
}
function saveEndings(){localStorage.setItem("lily-novel-endings",JSON.stringify(state.endings));}
function loadProgress(){
  try{return JSON.parse(localStorage.getItem("lily-novel-progress"));}catch(x){return null;}
}
function saveProgress(){localStorage.setItem("lily-novel-progress",JSON.stringify({sceneId:state.sceneId}));}
function clearProgress(){localStorage.removeItem("lily-novel-progress");}
function countEndings(){return Object.keys(state.endings).length;}

// ── Typewriter ──
var typeTimer=null;
function startTypewriter(text){
  state.textPos=0;state.textDone=false;state.choicesVisible=false;
  clearInterval(typeTimer);
  typeTimer=setInterval(function(){
    state.textPos++;
    if(state.textPos>=text.length){
      state.textDone=true;state.textPos=text.length;
      clearInterval(typeTimer);typeTimer=null;
      setTimeout(function(){state.choicesVisible=true;render();},300);
    }
    render();
  },20);
}
function skipTypewriter(text){
  clearInterval(typeTimer);typeTimer=null;
  state.textPos=text.length;state.textDone=true;
  state.choicesVisible=true;render();
}

// ── Scene Transitions ──
function goToScene(id){
  if(state.transitioning)return;
  state.transitioning=true;
  sfxChoice();
  render();// render fade-out
  setTimeout(function(){
    state.sceneId=id;
    var scene=STORY[id];
    state.screen=scene.ending?"ending":"scene";
    state.textPos=0;state.textDone=false;state.choicesVisible=false;
    state.transitioning=false;
    if(scene.ending){
      state.endings["end"+scene.endingNum]=true;
      saveEndings();clearProgress();
      sfxEnding();
    }else{
      sfxNewChapter();
      saveProgress();
    }
    render();
    startTypewriter(scene.text);
    if(scene.narrate)speak(scene.narrate);
  },600);
}

// ── Render ──
var gameEl=document.getElementById("game");

function render(){
  var html="";

  if(state.screen==="title"){
    var ec=countEndings();
    var saved=loadProgress();
    html+='<div class="title-screen">';
    html+='<div class="title-horse">🐴</div>';
    html+='<div class="title-name">Lily\'s Adventure</div>';
    html+='<div class="title-sub">An Interactive Horse Novel</div>';
    html+='<div class="title-endings">'+ec+' of 13 endings discovered</div>';
    html+='<button class="btn btn-primary" onclick="beginStory()">Begin</button>';
    if(saved){
      html+='<button class="btn btn-small" onclick="continueStory()" style="margin-top:0.5rem">Continue</button>';
    }
    if(ec>0){
      html+='<button class="btn btn-small" onclick="resetEndings()" style="margin-top:1.5rem;opacity:0.5;font-size:0.75rem">Reset Progress</button>';
    }
    html+='</div>';
    gameEl.innerHTML=html;
    return;
  }

  var scene=STORY[state.sceneId];
  if(!scene){state.screen="title";render();return;}
  var visClass=state.transitioning?"scene":"scene visible";

  // Stats bar
  html+='<div class="stats-bar">';
  html+='<span>'+countEndings()+'/13 endings</span>';
  html+='<span>';
  html+='<button onclick="toggleMusic()" title="Toggle music">'+(bgMusic.muted?'🔇':'🔊')+'</button> ';
  html+='<button onclick="goHome()" title="Return to title">🏠</button>';
  html+='</span></div>';

  html+='<div class="'+visClass+'" style="padding-top:50px">';
  html+='<div class="scene-illustration">'+scene.illustration+'</div>';

  if(scene.ending){
    html+='<div style="text-align:center"><span class="ending-badge">'+scene.endingTitle+'</span></div>';
  }
  html+='<div class="scene-chapter">'+scene.chapter+'</div>';

  // Typewriter text
  var displayText=scene.text.substring(0,state.textPos);
  var textHtml=displayText.replace(/\n/g,"<br>");
  if(!state.textDone)textHtml+='<span class="cursor"></span>';
  html+='<div class="scene-text" onclick="handleTextClick()">'+textHtml+'</div>';

  if(scene.ending){
    html+='<div class="ending-desc" style="opacity:'+(state.textDone?1:0)+';transition:opacity 0.5s">'+scene.endingDesc+'</div>';
    var cVis=state.choicesVisible?"choices visible":"choices";
    html+='<div class="'+cVis+'" style="text-align:center;margin-top:1rem">';
    html+='<button class="btn btn-primary" onclick="beginStory()">Play Again</button>';
    html+='<button class="btn btn-small" onclick="goHome()" style="margin-top:0.5rem">Return to Title</button>';
    html+='</div>';
  }else if(scene.choices){
    var cVis=state.choicesVisible?"choices visible":"choices";
    html+='<div class="'+cVis+'">';
    scene.choices.forEach(function(c,i){
      html+='<button class="choice-btn" onclick="goToScene(\''+c.next+'\')" style="transition-delay:'+((i*0.12))+'s">'+c.text+'</button>';
    });
    html+='</div>';
  }

  html+='</div>';
  gameEl.innerHTML=html;
}

function handleTextClick(){
  var scene=STORY[state.sceneId];
  if(scene&&!state.textDone)skipTypewriter(scene.text);
}

function beginStory(){
  if(!state.musicStarted){startBgMusic();state.musicStarted=true;}
  clearProgress();
  state.sceneId="ch1";state.screen="scene";
  state.textPos=0;state.textDone=false;state.choicesVisible=false;
  sfxNewChapter();
  render();
  startTypewriter(STORY.ch1.text);
  speak(STORY.ch1.narrate);
  saveProgress();
}

function continueStory(){
  if(!state.musicStarted){startBgMusic();state.musicStarted=true;}
  var saved=loadProgress();
  if(saved&&STORY[saved.sceneId]){
    state.sceneId=saved.sceneId;
    state.screen=STORY[saved.sceneId].ending?"ending":"scene";
  }else{
    state.sceneId="ch1";state.screen="scene";
  }
  state.textPos=0;state.textDone=false;state.choicesVisible=false;
  sfxNewChapter();
  render();
  var scene=STORY[state.sceneId];
  startTypewriter(scene.text);
  if(scene.narrate)speak(scene.narrate);
}

function goHome(){
  clearInterval(typeTimer);typeTimer=null;
  window.speechSynthesis.cancel();
  state.screen="title";render();
}

function resetEndings(){
  if(confirm("Reset all ending progress?")){
    state.endings={};saveEndings();clearProgress();render();
  }
}

// ── Init ──
render();
// Preload voices
if(window.speechSynthesis){speechSynthesis.getVoices();}
  </script>
