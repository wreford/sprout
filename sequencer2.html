<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SEQUENCER 2 — AWPP Project Planning</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--surface:#14142a;--border:#2a2a4a;--text:#e8e8f0;--dim:#555580;--accent:#6c5ce7;--accent2:#00cec9;--green:#2ed573;--red:#ff4757;--gold:#ffa502;--radius:12px}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,0);overflow-x:hidden}
.hidden{display:none!important}
a.home-link{position:fixed;top:env(safe-area-inset-top,12px);left:max(16px,env(safe-area-inset-left,16px));color:var(--dim);text-decoration:none;font-size:13px;z-index:200;transition:.2s;font-family:ui-monospace,"SF Mono",monospace;opacity:.7;padding:4px}
a.home-link:hover{color:var(--accent2);opacity:1}
button{background:linear-gradient(135deg,#7c6cf7,var(--accent));color:#fff;border:none;padding:12px 24px;border-radius:var(--radius);font-size:15px;cursor:pointer;transition:all .2s;font-weight:600;box-shadow:0 2px 12px rgba(108,92,231,.25);min-height:44px;min-width:44px;-webkit-tap-highlight-color:transparent}
button:hover{filter:brightness(1.15);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.sec{background:var(--border);box-shadow:none}
button.sec:hover{background:#3a3a5a}
button.sm{font-size:12px;padding:6px 14px;min-height:36px}
button.danger{background:linear-gradient(135deg,#ff6b6b,var(--red));box-shadow:0 2px 12px rgba(255,71,87,.25)}
button.green{background:linear-gradient(135deg,#55efc4,var(--green));color:#000}
button.gold{background:linear-gradient(135deg,#ffc048,var(--gold));color:#000}
input,select,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:12px 14px;border-radius:var(--radius);font-size:16px;width:100%;transition:border-color .2s;min-height:44px;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(108,92,231,.15)}
h1{font-size:clamp(24px,5vw,36px);font-weight:800}
h2{font-size:clamp(18px,4vw,24px);font-weight:700;color:var(--accent2);margin-bottom:12px}
h3{font-size:16px;font-weight:600;margin-bottom:8px}

/* Stepper */
#stepper{display:flex;align-items:center;gap:0;padding:12px 16px;background:rgba(10,10,18,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(108,92,231,.1);overflow-x:auto;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
.step{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:600;color:var(--dim);transition:.2s;min-height:44px;user-select:none;-webkit-user-select:none;flex-shrink:0}
.step.active{color:var(--accent);background:rgba(108,92,231,.12)}
.step.done{color:var(--green);cursor:pointer}
.step.done:hover{background:rgba(46,213,115,.08)}
.step.locked{opacity:.4;cursor:not-allowed}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--border);transition:.2s}
.step.active .step-num{border-color:var(--accent);background:var(--accent);color:#fff}
.step.done .step-num{border-color:var(--green);background:var(--green);color:#000}
.step-line{width:20px;height:2px;background:var(--border);flex-shrink:0}
.step-line.done{background:var(--green)}

/* Phase overlay */
#phaseOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(ellipse at center,rgba(108,92,231,.15),rgba(10,10,18,.97));z-index:500;pointer-events:none;opacity:0;transition:opacity .4s}
#phaseOverlay.show{opacity:1}
#phaseOverlay h1{font-size:clamp(36px,8vw,56px);color:var(--accent);text-shadow:0 0 60px rgba(108,92,231,.6)}
#phaseOverlay p{color:var(--accent2);font-size:clamp(16px,3vw,22px);margin-top:8px}

/* Main content */
.phase-content{max-width:1200px;margin:0 auto;padding:20px 16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:.2s}
.card:hover{border-color:rgba(108,92,231,.3)}
.card.selected{border-color:var(--accent);box-shadow:0 0 16px rgba(108,92,231,.15)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.row>*{flex:1;min-width:0}
.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent)}
.pill.green{background:rgba(46,213,115,.15);color:var(--green)}
.pill.gold{background:rgba(255,165,2,.15);color:var(--gold)}
.pill.red{background:rgba(255,71,87,.15);color:var(--red)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;font-weight:600}
.form-group{margin-bottom:14px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-state p{font-size:14px;margin-top:8px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.stat-row:last-child{border:none}
.stat-val{font-weight:700;color:var(--accent2);font-family:ui-monospace,"SF Mono",monospace}
.fun-fact{background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(0,206,201,.08));border:1px solid rgba(108,92,231,.15);border-radius:var(--radius);padding:14px 16px;margin:16px 0;font-size:13px;line-height:1.5}
.fun-fact::before{content:'AWPP Fact';display:block;font-size:11px;font-weight:700;color:var(--gold);margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}

/* Poker */
.poker-cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.poker-card{width:60px;height:84px;border-radius:10px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;cursor:pointer;transition:.2s;user-select:none;-webkit-user-select:none}
.poker-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.poker-card.selected{border-color:var(--accent);background:rgba(108,92,231,.2);transform:translateY(-8px);box-shadow:0 8px 24px rgba(108,92,231,.3)}
.poker-card.revealed{border-color:var(--green);background:rgba(46,213,115,.1)}
.vote-result{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.vote-stat{text-align:center}
.vote-stat .val{font-size:28px;font-weight:800;color:var(--gold)}
.vote-stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase}
.player-votes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.player-vote{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;text-align:center;min-width:70px}
.player-vote .name{font-size:12px;color:var(--dim);margin-bottom:4px}
.player-vote .val{font-size:20px;font-weight:800}

/* Gantt */
#ganttWrap{overflow:auto;position:relative;margin-top:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
canvas{display:block}
#ganttTooltip{position:fixed;background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 16px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .15s;max-width:300px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,.5)}

/* Network diagram */
#networkWrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-top:12px}

/* Dep row */
.dep-row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
.dep-row select,.dep-row input{width:auto;min-width:80px;flex:1}

/* Resource */
.res-badge{display:inline-block;background:rgba(108,92,231,.2);color:var(--accent);padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;margin:2px}

/* Leaderboard */
.lb{display:flex;flex-direction:column;gap:6px;margin:16px 0}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.lb-row:first-child{border-color:rgba(255,165,2,.3);background:linear-gradient(145deg,#1a1630,#201840)}
.lb-row .pts{color:var(--gold);font-weight:800;font-family:ui-monospace,"SF Mono",monospace}

/* Export */
.export-bar{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;justify-content:center}

/* Constraint tags */
.constraint-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.constraint-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,165,2,.12);color:var(--gold);cursor:pointer}
.constraint-tag:hover{background:rgba(255,71,87,.2);color:var(--red);text-decoration:line-through}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:none}}
.modal h2{margin-bottom:16px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* Toast */
#toast{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 20px;font-size:14px;z-index:600;transition:transform .3s;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* Multiplayer */
.avatar{font-size:20px;margin-right:4px}
.players-bar{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.player-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px}
.player-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

@media(max-width:600px){
  .card-grid{grid-template-columns:1fr}
  .poker-card{width:52px;height:72px;font-size:18px}
  .step{padding:6px 8px;font-size:12px}
  .step-line{width:10px}
}
</style>
</head>

let audioCtx;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playTone(freq,dur,vol=0.02){
  try{
    const c=getAudio(), o=c.createOscillator(), g=c.createGain();
    o.type='sine'; o.frequency.value=freq;

let ttsTimer;
function speak(text){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  clearTimeout(ttsTimer);
  ttsTimer = setTimeout(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.rate=1.1; u.pitch=1; u.volume=0.5;
    speechSynthesis.speak(u);
  },60);
}

// ─── Save / Load ────────────────────────────────────────
const SAVE_KEY = 'sequencer2-state';
function saveState(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }catch(e){}
}
function loadState(){
  try{
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(d && d.cwps){ Object.assign(S,d); const ids=getAllIds(S); if(ids.length) nextId=Math.max(nextId,...ids)+1; return true; }
  }catch(e){}
  return false;
}
function getAllIds(obj){
  const ids=[];
  JSON.stringify(obj,(k,v)=>{ if(k==='id'&&typeof v==='string'&&v.startsWith('id_')){ ids.push(parseInt(v.slice(3))); } return v; });
  return ids;
}

// ─── Multiplayer ────────────────────────────────────────
function initMultiplayer(room){
  if(bc) bc.close();
  S.room = room;
  bc = new BroadcastChannel('seq2-'+room);
  bc.onmessage = e => handleMultiplayerMsg(e.data);
  broadcastPresence();
}
function broadcastPresence(){
  if(!bc) return;
  bc.postMessage({type:'presence', player:{id:S.playerId, name:S.playerName, avatar:getAvatar(S.playerId)}});
}
function broadcastVote(iwpId, val){
  if(!bc) return;
  bc.postMessage({type:'vote', iwpId, playerId:S.playerId, playerName:S.playerName, value:val});
}
function broadcastReveal(iwpId){
  if(!bc) return;
  bc.postMessage({type:'reveal', iwpId});
}
function broadcastState(){
  if(!bc) return;
  bc.postMessage({type:'state-sync', state:S});
}
function handleMultiplayerMsg(msg){
  if(!msg||!msg.type) return;
  switch(msg.type){
    case 'presence':
      if(!S.players.find(p=>p.id===msg.player.id)){
        S.players.push(msg.player);
        toast(msg.player.name+' joined!');
        renderPlayersBar();
      }
      broadcastPresence();
      break;
    case 'vote':
      if(!S.votes[msg.iwpId]) S.votes[msg.iwpId]={};
      S.votes[msg.iwpId][msg.playerId]={name:msg.playerName, value:msg.value};
      if(S.currentPhase===3) renderEstimation();
      break;
    case 'reveal':
      S.voteRevealed=true;
      if(S.currentPhase===3) renderEstimation();
      sfxReveal();
      break;
    case 'state-sync':
      // Only accept if we don't have data
      if(S.cwps.length===0 && msg.state.cwps.length>0){
        Object.assign(S,msg.state);
        renderCurrentPhase();
      }
      break;
  }
}
function getAvatar(id){
  const i = Math.abs(hashStr(id)) % AVATARS.length;
  return AVATARS[i];
}
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h)+s.charCodeAt(i); return h; }

// ─── CPM Engine ─────────────────────────────────────────
function getAllIWPs(){
  const all=[];
  S.cwps.forEach(c=>{
    (c.iwps||[]).forEach(iwp=>{ all.push({...iwp, cwpId:c.id, cwpName:c.name}); });
  });
  return all;
}

function runCPM(){
  const iwps = getAllIWPs();
  if(iwps.length===0) return {iwps:[], critical:[], projectDuration:0};
  const map = {};
  iwps.forEach(a=>{ map[a.id]=a; a.es=0; a.ef=0; a.ls=Infinity; a.lf=Infinity; a.tf=0; a.ff=0; a.critical=false; });

  // Build adjacency
  const succs={}, preds={};
  iwps.forEach(a=>{ succs[a.id]=[]; preds[a.id]=[]; });
  iwps.forEach(a=>{
    (a.deps||[]).forEach(d=>{
      if(!map[d.from]) return;
      if(!preds[a.id]) preds[a.id]=[];
      preds[a.id].push(d);
      if(!succs[d.from]) succs[d.from]=[];
      succs[d.from].push({to:a.id, type:d.type, lag:d.lag||0});
    });
  });

  // Topological sort (Kahn's)
  const inDeg={};
  iwps.forEach(a=>{ inDeg[a.id] = (preds[a.id]||[]).length; });
  const queue = iwps.filter(a=>inDeg[a.id]===0).map(a=>a.id);
  const order=[];
  while(queue.length){
    const id=queue.shift();
    order.push(id);
    (succs[id]||[]).forEach(s=>{
      inDeg[s.to]--;
      if(inDeg[s.to]===0) queue.push(s.to);
    });
  }
  // Add any unprocessed (cycles)
  iwps.forEach(a=>{ if(!order.includes(a.id)) order.push(a.id); });

  // Forward pass
  order.forEach(id=>{
    const a=map[id];
    const dur = a.estDuration || a.dur || 5;
    (preds[id]||[]).forEach(d=>{
      const p=map[d.from]; if(!p) return;
      const pDur = p.estDuration || p.dur || 5;
      let es=0;
      switch(d.type||'FS'){
        case 'FS': es = p.ef + (d.lag||0); break;
        case 'SS': es = p.es + (d.lag||0); break;
        case 'FF': es = p.ef + (d.lag||0) - dur; break;
        case 'SF': es = p.es + (d.lag||0) - dur; break;
      }
      a.es = Math.max(a.es, es);
    });
    a.ef = a.es + dur;
  });

  const projEnd = Math.max(...iwps.map(a=>a.ef),0);

  // Backward pass
  iwps.forEach(a=>{ a.lf=projEnd; a.ls=projEnd-(a.estDuration||a.dur||5); });
  for(let i=order.length-1;i>=0;i--){
    const id=order[i];
    const a=map[id];
    const dur=a.estDuration||a.dur||5;
    (succs[id]||[]).forEach(s=>{
      const sa=map[s.to]; if(!sa) return;
      let lf=Infinity;
      switch(s.type||'FS'){
        case 'FS': lf = sa.ls - (s.lag||0); break;
        case 'SS': lf = sa.ls - (s.lag||0) + dur; break;
        case 'FF': lf = sa.lf - (s.lag||0); break;
        case 'SF': lf = sa.lf - (s.lag||0) + dur; break;
      }
      a.lf = Math.min(a.lf, lf);
    });
    a.ls = a.lf - dur;
    a.tf = a.ls - a.es;
    // Free float
    let minSuccES = Infinity;
    (succs[id]||[]).forEach(s=>{
      const sa=map[s.to]; if(!sa) return;
      switch(s.type||'FS'){
        case 'FS': minSuccES = Math.min(minSuccES, sa.es - (s.lag||0)); break;
        default: minSuccES = Math.min(minSuccES, sa.es); break;
      }
    });
    if(minSuccES===Infinity) minSuccES=projEnd;
    a.ff = Math.max(0, (succs[id]||[]).length>0 ? minSuccES - a.ef : a.tf);
  }

  // Mark critical
  const critical=[];
  iwps.forEach(a=>{
    a.critical = Math.abs(a.tf) < 0.001;
    if(a.critical) critical.push(a.id);
  });

  // Write back
  S.cwps.forEach(c=>{
    (c.iwps||[]).forEach(iwp=>{
      const m=map[iwp.id];
      if(m){ iwp.es=m.es; iwp.ef=m.ef; iwp.ls=m.ls; iwp.lf=m.lf; iwp.tf=m.tf; iwp.ff=m.ff; iwp.critical=m.critical; }
    });
  });

  return {iwps, critical, projectDuration:projEnd, map};
}

// ─── Stepper ────────────────────────────────────────────
function renderStepper(){
  const el = document.getElementById('stepper');
  el.innerHTML='';
  PHASES.forEach((ph,i)=>{
    if(i>0){
      const line=document.createElement('div');
      line.className='step-line'+(i<=S.currentPhase?' done':'');
      el.appendChild(line);
    }
    const step=document.createElement('div');
    let cls='step';
    if(i===S.currentPhase) cls+=' active';
    else if(i<S.currentPhase || i<=S.maxPhase) cls+=' done';
    else cls+=' locked';
    step.className=cls;
    step.innerHTML=`<div class="step-num">${i<=S.maxPhase && i!==S.currentPhase?'✓':ph.icon}</div><span>${ph.name}</span>`;
    step.onclick=()=>{
      if(i<=S.maxPhase){
        sfxClick();
        goToPhase(i);
      }
    };
    el.appendChild(step);
  });
}

function goToPhase(i){
  S.currentPhase=i;
  if(i>S.maxPhase) S.maxPhase=i;
  renderStepper();
  showPhaseOverlay(PHASES[i].name);
  renderCurrentPhase();
  saveState();
}

function showPhaseOverlay(title,sub){
  const ol=document.getElementById('phaseOverlay');
  document.getElementById('overlayTitle').textContent=title;
  document.getElementById('overlaySub').textContent=sub||'';
  ol.classList.add('show');
  setTimeout(()=>ol.classList.remove('show'),800);
}

function renderCurrentPhase(){
  document.querySelectorAll('.phase-content').forEach(el=>el.classList.add('hidden'));
  const phId = PHASES[S.currentPhase].id;
  const el=document.getElementById('phase'+phId.charAt(0).toUpperCase()+phId.slice(1));
  if(el){ el.classList.remove('hidden'); }
  switch(S.currentPhase){
    case 0: renderSetup(); break;
    case 1: renderCWPPlanning(); break;
    case 2: renderIWPBreakdown(); break;
    case 3: renderEstimation(); break;
    case 4: renderSequencing(); break;
    case 5: renderResources(); break;
    case 6: renderReview(); break;
  }
}

  S.playerName = name;

  S.players = [{id:S.playerId, name, avatar:getAvatar(S.playerId)}];
  initMultiplayer(room);
  toast('Joined room: '+room);
  sfxSuccess();
  renderPlayersBar();
}

function renderPlayersBar(){
  const bars = document.querySelectorAll('.players-bar, #playersBarSetup');
  const html = S.players.map(p=>`<div class="player-chip"><span class="dot"></span><span class="avatar">${p.avatar||''}</span>${esc(p.name)}</div>`).join('');
  bars.forEach(b=>b.innerHTML=html);
}

function startProject(){
  const name = document.getElementById('projName')?.value.trim();
  const tplId = parseInt(document.getElementById('templateSel')?.value);
  S.projectName = name || 'Untitled Project';
  const pname = document.getElementById('playerNameInput')?.value.trim();
  if(pname) S.playerName = pname;

  if(tplId && !isNaN(tplId)){
    const tpl = TEMPLATES.find(t=>t.id===tplId);
    if(tpl && S.cwps.length===0){
      S.templateId = tplId;
      tpl.cwps.forEach(c=>{
        const cwpId = gid();
        const cwp = {id:cwpId, name:c.name, discipline:c.discipline, zone:c.zone, status:'planning', iwps:[]};
        (c.iwps||[]).forEach(iw=>{
          cwp.iwps.push({id:gid(), name:iw.name, dur:iw.dur, deps:[], constraints:[], resources:[], pert:{o:null,m:null,p:null}, estimatedDays:null, crew:'', trade:c.discipline});
        });
        S.cwps.push(cwp);
      });
    }
  }

  if(!S.playerName) S.playerName = 'Planner';
  if(!S.players.length) S.players=[{id:S.playerId, name:S.playerName, avatar:getAvatar(S.playerId)}];

  sfxSuccess();
  speak('Welcome to '+S.projectName);
  goToPhase(1);
}

  const el=document.getElementById('phaseCWP');
  const totalIwps = S.cwps.reduce((s,c)=>s+(c.iwps||[]).length,0);
  const completedCwps = S.cwps.filter(c=>c.status==='complete').length;

  let html=`<div class="row" style="margin-bottom:16px;align-items:flex-start">
    <div><h2>CWP Planning</h2><p style="color:var(--dim);font-size:13px">${S.cwps.length} CWPs · ${totalIwps} IWPs · ${completedCwps} complete</p></div>

    html+=`<div class="card-grid">`;
    S.cwps.forEach(c=>{
      const iwpCount = (c.iwps||[]).length;
      const estimated = (c.iwps||[]).filter(i=>i.estimatedDays).length;

      const statusColor = c.status==='complete'?'green':c.status==='active'?'gold':'';

          <span>${esc(c.discipline||'')}</span> · <span>${esc(c.zone||'')}</span>
        </div>
        <div style="font-size:13px;color:var(--dim);margin-top:4px">${iwpCount} IWPs · ${pct}% estimated</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="btn-row">
          <button class="sm sec" onclick="event.stopPropagation();editCwp('${c.id}')">Edit</button>

  el.innerHTML=html;

// ─── Phase 2: IWP Breakdown ────────────────────────────

  // CWP selector
  let html=`<div class="row" style="margin-bottom:16px;align-items:flex-end">
    <div class="form-group" style="margin-bottom:0;flex:2">
      <label>Select CWP</label>
      <select id="cwpSel" onchange="changeCwpSel(this.value)">${S.cwps.map(c=>`<option value="${c.id}" ${c.id===S.selectedCwpId?'selected':''}>${c.name} (${(c.iwps||[]).length} IWPs)</option>`).join('')}</select>
    </div>
    <button class="sm" onclick="showAddIwpModal()">+ Add IWP</button>
  </div>`;

  if(!cwp){
    html+=`<div class="empty-state"><p>Select a CWP above</p></div>`;
  } else {
    html+=`<h3>${esc(cwp.name)} — IWPs</h3>`;
    if((cwp.iwps||[]).length===0){
      html+=`<div class="empty-state"><p>No IWPs yet. Break this CWP into 1-2 week crew-level packages.</p></div>`;
    } else {
      (cwp.iwps||[]).forEach((iwp,idx)=>{
        html+=`<div class="card">
          <div class="row">
            <strong style="flex:1">${idx+1}. ${esc(iwp.name)}</strong>
            <span class="pill">${iwp.dur||'?'} days</span>
          </div>
          <div style="font-size:13px;color:var(--dim);margin-top:4px">Trade: ${esc(iwp.trade||cwp.discipline||'TBD')}</div>
          <div class="constraint-tags" id="ct_${iwp.id}">
            ${(iwp.constraints||[]).map(c=>`<span class="constraint-tag" onclick="removeConstraint('${iwp.id}','${esc(c)}')">${esc(c)} ×</span>`).join('')}
          </div>
          <div class="btn-row">
            <button class="sm sec" onclick="editIwp('${cwp.id}','${iwp.id}')">Edit</button>
            <button class="sm sec" onclick="showAddConstraintModal('${iwp.id}')">+ Constraint</button>
            ${idx>0?`<button class="sm sec" onclick="moveIwp('${cwp.id}','${iwp.id}',-1)">↑</button>`:''}

function editIwp(cwpId,iwpId){

function deleteIwp(cwpId,iwpId){

function moveIwp(cwpId,iwpId,dir){
  const cwp=S.cwps.find(c=>c.id===cwpId); if(!cwp) return;

  const ni=idx+dir;
  if(ni<0||ni>=cwp.iwps.length) return;
  [cwp.iwps[idx],cwp.iwps[ni]]=[cwp.iwps[ni],cwp.iwps[idx]];
  renderIWPBreakdown(); saveState(); sfxClick();

function advanceFromIWP(){

// ─── Phase 3: Estimation ────────────────────────────────
function renderEstimation(){
  const el=document.getElementById('phaseEstimation');
  const allIwps = getAllIWPs();

  let html=`<h2>Estimation</h2>
  <p style="color:var(--dim);font-size:13px;margin-bottom:16px">Planning Poker + PERT estimation for each IWP</p>`;

  // CWP selector for focused view
  html+=`<div class="form-group">
    <label>CWP Focus</label>
    <select id="estCwpSel" onchange="S.selectedCwpId=this.value;renderEstimation()">
      <option value="">All CWPs</option>
      ${S.cwps.map(c=>`<option value="${c.id}" ${c.id===S.selectedCwpId?'selected':''}>${c.name}</option>`).join('')}
    </select>
  </div>`;

  const filtered = S.selectedCwpId ? allIwps.filter(i=>i.cwpId===S.selectedCwpId) : allIwps;

  filtered.forEach(iwp=>{
    const isVoting = S.votingIwpId===iwp.id;
    const votes = S.votes[iwp.id]||{};
    const voteCount = Object.keys(votes).length;
    const myVote = votes[S.playerId];

    html+=`<div class="card ${isVoting?'selected':''}">
      <div class="row" style="margin-bottom:8px">
        <div>
          <strong>${esc(iwp.name)}</strong>
          <span style="color:var(--dim);font-size:12px;margin-left:8px">${esc(iwp.cwpName)}</span>
        </div>
        ${iwp.estimatedDays?`<span class="pill green">${iwp.estimatedDays}d est.</span>`:''}
      </div>`;

    // PERT inputs
    html+=`<div style="margin:8px 0">
      <label style="font-size:12px">PERT Estimate (days)</label>
      <div class="row" style="gap:6px">
        <div class="form-group" style="margin:0"><label style="font-size:11px">Optimistic</label><input type="number" min="1" value="${iwp.pert?.o||''}" onchange="updatePert('${iwp.id}','o',this.value)" placeholder="O" style="text-align:center"></div>
        <div class="form-group" style="margin:0"><label style="font-size:11px">Most Likely</label><input type="number" min="1" value="${iwp.pert?.m||''}" onchange="updatePert('${iwp.id}','m',this.value)" placeholder="M" style="text-align:center"></div>
        <div class="form-group" style="margin:0"><label style="font-size:11px">Pessimistic</label><input type="number" min="1" value="${iwp.pert?.p||''}" onchange="updatePert('${iwp.id}','p',this.value)" placeholder="P" style="text-align:center"></div>
        <div style="text-align:center;min-width:60px;padding-top:16px">
          ${iwp.pert?.o && iwp.pert?.m && iwp.pert?.p ? `<div style="color:var(--gold);font-weight:800;font-size:18px">${calcPert(iwp.pert)}</div><div style="font-size:10px;color:var(--dim)">σ=${calcPertSD(iwp.pert)}</div>`:'-'}
        </div>
      </div>
    </div>`;

    // Planning poker
    html+=`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div class="row" style="margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">Planning Poker</span>
        <span style="font-size:12px;color:var(--dim)">${voteCount} vote${voteCount!==1?'s':''}</span>
      </div>`;

    if(isVoting){
      // Show poker cards
      html+=`<div class="poker-cards">`;
      POKER_CARDS.forEach(v=>{
        const sel = myVote && myVote.value===v;
        html+=`<div class="poker-card ${sel?'selected':''} ${S.voteRevealed?'revealed':''}" onclick="castVote('${iwp.id}',${typeof v==='number'?v:"'"+v+"'"})">${v}</div>`;
      });
      html+=`</div>`;

      // Show votes
      if(S.voteRevealed && voteCount>0){
        const numVotes = Object.values(votes).filter(v=>typeof v.value==='number').map(v=>v.value);
        const avg = numVotes.length ? (numVotes.reduce((a,b)=>a+b,0)/numVotes.length).toFixed(1) : '-';
        const min = numVotes.length ? Math.min(...numVotes) : '-';
        const max = numVotes.length ? Math.max(...numVotes) : '-';
        const spread = numVotes.length>=2 ? max-min : 0;

        html+=`<div class="vote-result">
          <div class="vote-stat"><div class="val">${avg}</div><div class="lbl">Average</div></div>
          <div class="vote-stat"><div class="val">${min}</div><div class="lbl">Min</div></div>
          <div class="vote-stat"><div class="val">${max}</div><div class="lbl">Max</div></div>
          <div class="vote-stat"><div class="val">${spread}</div><div class="lbl">Spread</div></div>
        </div>`;

        html+=`<div class="player-votes">`;
        Object.values(votes).forEach(v=>{
          html+=`<div class="player-vote"><div class="name">${esc(v.name)}</div><div class="val">${v.value}</div></div>`;
        });
        html+=`</div>`;

        html+=`<div class="btn-row" style="justify-content:center">
          <button class="sm green" onclick="acceptVote('${iwp.id}',${avg})">Accept (${avg}d)</button>
          <button class="sm sec" onclick="reVote('${iwp.id}')">Re-vote</button>
        </div>`;
      } else if(voteCount>0) {
        html+=`<div class="player-votes">`;
        Object.values(votes).forEach(v=>{
          html+=`<div class="player-vote"><div class="name">${esc(v.name)}</div><div class="val">${S.voteRevealed?v.value:'?'}</div></div>`;
        });
        html+=`</div>`;
        html+=`<div class="btn-row" style="justify-content:center"><button class="sm gold" onclick="revealVotes('${iwp.id}')">Reveal Votes</button></div>`;
      }

      html+=`<div class="btn-row" style="justify-content:center;margin-top:8px"><button class="sm sec" onclick="stopVoting()">Close Voting</button></div>`;
    } else {
      html+=`<button class="sm sec" onclick="startVoting('${iwp.id}')">Start Vote</button>`;
    }

    html+=`</div>`;

    // Accept / manual
    html+=`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div class="row" style="gap:8px">
        <div class="form-group" style="margin:0;flex:1"><label style="font-size:11px">Final Estimate (days)</label>
          <input type="number" min="1" value="${iwp.estimatedDays||''}" onchange="setEstimate('${iwp.id}',this.value)" placeholder="days">
        </div>
        ${iwp.pert?.o&&iwp.pert?.m&&iwp.pert?.p?`<button class="sm sec" onclick="usePert('${iwp.id}')" style="margin-top:16px">Use PERT</button>`:''}
      </div>
    </div>`;

    html+=`</div>`;
  });

  html+=`<div class="btn-row" style="margin-top:20px;justify-content:center">
    <button class="sec" onclick="goToPhase(2)">← IWP Breakdown</button>
    <button onclick="goToPhase(4)">Continue to Sequencing →</button>
  </div>`;
  el.innerHTML=html;
}

function calcPert(p){ return ((+p.o + 4*(+p.m) + +p.p)/6).toFixed(1); }
function calcPertSD(p){ return ((+p.p - +p.o)/6).toFixed(1); }

function updatePert(iwpId, field, val){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId){ if(!i.pert) i.pert={o:null,m:null,p:null}; i.pert[field]=val?parseInt(val):null; }
  }));
  saveState();
  // Don't full re-render to preserve focus
}

function startVoting(iwpId){
  S.votingIwpId=iwpId;
  S.voteRevealed=false;
  if(!S.votes[iwpId]) S.votes[iwpId]={};
  sfxClick();
  speak('Vote now');
  renderEstimation();
}

function stopVoting(){ S.votingIwpId=null; renderEstimation(); }

function castVote(iwpId, val){
  if(!S.votes[iwpId]) S.votes[iwpId]={};
  S.votes[iwpId][S.playerId]={name:S.playerName, value:val};
  broadcastVote(iwpId, val);
  sfxClick();
  renderEstimation();
}

function revealVotes(iwpId){
  S.voteRevealed=true;
  broadcastReveal(iwpId);
  sfxReveal();
  renderEstimation();
}

function reVote(iwpId){
  S.votes[iwpId]={};
  S.voteRevealed=false;
  renderEstimation();
}

function acceptVote(iwpId, avg){
  const days = Math.round(parseFloat(avg));
  setEstimate(iwpId, days);
  S.votingIwpId=null;
  S.voteRevealed=false;
  // Score
  const votes=S.votes[iwpId]||{};
  Object.entries(votes).forEach(([pid,v])=>{
    if(typeof v.value==='number'){
      const diff=Math.abs(v.value-days);
      const pts = diff===0?10 : diff<=1?7 : diff<=2?4 : 1;
      if(!S.scores[pid]) S.scores[pid]={name:v.name, points:0};
      S.scores[pid].points+=pts;
    }
  });
  sfxSuccess();
  renderEstimation(); saveState();
}

function setEstimate(iwpId, val){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId){ i.estimatedDays=parseInt(val)||null; i.estDuration=parseInt(val)||i.dur; }
  }));
  saveState();
}

function usePert(iwpId){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId && i.pert?.o && i.pert?.m && i.pert?.p){
      const v=Math.round(calcPert(i.pert));
      i.estimatedDays=v; i.estDuration=v;
    }
  }));
  renderEstimation(); saveState();
}

// ─── Phase 4: Sequencing ────────────────────────────────
function renderSequencing(){
  const el=document.getElementById('phaseSequencing');
  const allIwps=getAllIWPs();
  let html=`<h2>Sequencing</h2>
  <p style="color:var(--dim);font-size:13px;margin-bottom:16px">Set predecessor relationships between IWPs (FS/SS/FF/SF + lag)</p>`;

  // Group by CWP
  S.cwps.forEach(cwp=>{
    if((cwp.iwps||[]).length===0) return;
    html+=`<h3 style="margin-top:16px;color:var(--accent)">${esc(cwp.name)}</h3>`;

    cwp.iwps.forEach(iwp=>{
      html+=`<div class="card">
        <strong>${esc(iwp.name)}</strong>
        <div style="font-size:12px;color:var(--dim);margin:4px 0">${(iwp.deps||[]).length} predecessor(s)</div>`;

      // Show existing deps
      (iwp.deps||[]).forEach((d,di)=>{
        const pred = allIwps.find(x=>x.id===d.from);
        html+=`<div class="dep-row">
          <select onchange="updateDep('${iwp.id}',${di},'from',this.value)">
            <option value="">-- Predecessor --</option>
            ${allIwps.filter(x=>x.id!==iwp.id).map(x=>`<option value="${x.id}" ${x.id===d.from?'selected':''}>${x.cwpName}: ${x.name}</option>`).join('')}
          </select>
          <select onchange="updateDep('${iwp.id}',${di},'type',this.value)" style="width:70px;min-width:70px;flex:none">
            ${DEP_TYPES.map(t=>`<option ${t===d.type?'selected':''}>${t}</option>`).join('')}
          </select>
          <input type="number" value="${d.lag||0}" onchange="updateDep('${iwp.id}',${di},'lag',this.value)" placeholder="Lag" style="width:60px;min-width:60px;flex:none;text-align:center">
          <button class="sm danger" onclick="removeDep('${iwp.id}',${di})" style="flex:none">✕</button>
        </div>`;
      });

      html+=`<button class="sm sec" onclick="addDep('${iwp.id}')" style="margin-top:4px">+ Predecessor</button>
      </div>`;
    });
  });

  html+=`<div class="btn-row" style="margin-top:20px;justify-content:center">
    <button class="sec" onclick="goToPhase(3)">← Estimation</button>
    <button onclick="goToPhase(5)">Continue to Resources →</button>
  </div>`;
  el.innerHTML=html;
}

function addDep(iwpId){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId){ if(!i.deps)i.deps=[]; i.deps.push({from:'',type:'FS',lag:0}); }
  }));
  renderSequencing(); saveState();
}

function updateDep(iwpId,idx,field,val){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId && i.deps[idx]){
      if(field==='lag') i.deps[idx][field]=parseInt(val)||0;
      else i.deps[idx][field]=val;
    }
  }));
  saveState();
}

function removeDep(iwpId,idx){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId) i.deps.splice(idx,1);
  }));
  renderSequencing(); saveState();
}

// ─── Phase 5: Resources ────────────────────────────────
function renderResources(){
  const el=document.getElementById('phaseResources');
  const allIwps=getAllIWPs();
  let html=`<h2>Resources</h2>

function updateRes(iwpId,field,val){
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId){
      if(field==='headcount') i[field]=parseInt(val)||0;
      else i[field]=val;
    }
  }));
  saveState();
}

function addResource(iwpId){
  const r=prompt('Equipment/Resource name:');
  if(!r) return;
  S.cwps.forEach(c=>(c.iwps||[]).forEach(i=>{
    if(i.id===iwpId){ if(!i.resources)i.resources=[]; i.resources.push(r.trim()); }
  }));
  renderResources(); saveState();
}

function renderResourceLoading(){
  const prev = document.getElementById('resLoadPreview');
  if(!prev) return;
  runCPM();
  const allIwps = getAllIWPs();
  const projDur = Math.max(...allIwps.map(i=>i.ef||0),1);

  // Group by trade
  const trades={};
  allIwps.forEach(i=>{
    const t=i.trade||'Other';
    if(!trades[t]) trades[t]=new Array(Math.ceil(projDur)).fill(0);
    const hc=i.headcount||1;
    for(let d=Math.floor(i.es||0);d<Math.ceil(i.ef||0)&&d<trades[t].length;d++){
      trades[t][d]+=hc;
    }
  });

  let html='';
  Object.entries(trades).forEach(([trade,loads])=>{
    const max=Math.max(...loads,1);
    const barW=Math.max(300,loads.length*4);
    html+=`<div style="margin:12px 0">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">${esc(trade)} <span style="color:var(--dim);font-weight:400">peak: ${max}</span></div>
      <div style="overflow-x:auto">
        <svg width="${barW}" height="60" viewBox="0 0 ${barW} 60">
          ${loads.map((v,d)=>{
            const h=v/max*50;
            const x=d*(barW/loads.length);
            const w=Math.max(1,barW/loads.length-1);
            return `<rect x="${x}" y="${55-h}" width="${w}" height="${h}" fill="var(--accent)" opacity=".7" rx="1"/>`;
          }).join('')}
          <line x1="0" y1="55" x2="${barW}" y2="55" stroke="var(--border)" stroke-width="1"/>
        </svg>
      </div>
    </div>`;
  });

  if(Object.keys(trades).length===0) html='<p style="color:var(--dim);font-size:13px">Run CPM first (set predecessors in Sequencing phase)</p>';
  prev.innerHTML=html;
}

  const constrained = allIwps.filter(i=>(i.constraints||[]).length>0).length;
  const withDeps = allIwps.filter(i=>(i.deps||[]).filter(d=>d.from).length>0).length;

  html+=`<div class="card">
    <h3>Project Statistics</h3>

      <button class="sm sec" onclick="ganttZoom(-1)">Zoom Out</button>

    critIwps.sort((a,b)=>(a.es||0)-(b.es||0));
    critIwps.forEach(i=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">

  html+=`</div>`;

  const scoreEntries = Object.entries(S.scores).sort((a,b)=>b[1].points-a[1].points);

// ─── Gantt Chart ────────────────────────────────────────
let ganttScale = 20; // px per day
function ganttZoom(dir){
  ganttScale = Math.max(6, Math.min(60, ganttScale + dir*4));
  drawGantt();
}

function drawGantt(){
  const canvas=document.getElementById('ganttCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;

  runCPM();
  let allIwps=getAllIWPs();
  const critOnly = document.getElementById('showCritOnly')?.checked;
  if(critOnly) allIwps=allIwps.filter(i=>i.critical);

  // Organize by CWP
  const rows=[];
  S.cwps.forEach(cwp=>{
    const iwps=(cwp.iwps||[]).filter(i=> critOnly ? i.critical : true);
    if(iwps.length===0) return;
    rows.push({type:'cwp', name:cwp.name, discipline:cwp.discipline});
    iwps.forEach(i=>rows.push({type:'iwp', ...i, cwpName:cwp.name}));
  });

  const rowH=32;
  const labelW=200;
  const projDur=Math.max(...allIwps.map(i=>i.ef||0),10);
  const chartW=projDur*ganttScale;
  const totalW=labelW+chartW+40;
  const totalH=rows.length*rowH+60;

  canvas.width=totalW*dpr;
  canvas.height=totalH*dpr;
  canvas.style.width=totalW+'px';
  canvas.style.height=totalH+'px';
  ctx.scale(dpr,dpr);

  // Background
  ctx.fillStyle='#14142a';
  ctx.fillRect(0,0,totalW,totalH);

  // Header
  ctx.fillStyle='#1a1a3a';
  ctx.fillRect(0,0,totalW,30);
  ctx.fillStyle='#888';
  ctx.font='11px system-ui';
  for(let d=0;d<=projDur;d+=Math.max(1,Math.floor(50/ganttScale))){
    const x=labelW+d*ganttScale;
    ctx.fillText('D'+d, x+2, 20);
    ctx.strokeStyle='rgba(42,42,74,.5)';
    ctx.beginPath(); ctx.moveTo(x,30); ctx.lineTo(x,totalH); ctx.stroke();
  }

  // Rows
  let y=30;
  const barPositions=[];
  rows.forEach((r,ri)=>{
    if(r.type==='cwp'){
      ctx.fillStyle='#1a1a3a';
      ctx.fillRect(0,y,totalW,rowH);
      ctx.fillStyle='#00cec9';
      ctx.font='bold 12px system-ui';
      ctx.fillText(r.name,8,y+20);
    } else {
      // Alt row
      ctx.fillStyle=ri%2?'rgba(20,20,42,.5)':'rgba(26,26,58,.3)';
      ctx.fillRect(0,y,totalW,rowH);

      // Label
      ctx.fillStyle='#e8e8f0';
      ctx.font='12px system-ui';
      const lbl = r.name.length>22?r.name.slice(0,20)+'..':r.name;
      ctx.fillText(lbl,16,y+20);

      // Bar
      const es=r.es||0;
      const dur=r.estDuration||r.dur||5;
      const bx=labelW+es*ganttScale;
      const bw=Math.max(dur*ganttScale,4);
      const by=y+6;
      const bh=rowH-12;

      // Float bar
      if((r.tf||0)>0){
        ctx.fillStyle='rgba(108,92,231,.1)';
        ctx.fillRect(bx,by,bw+(r.tf*ganttScale),bh);
      }

      // Main bar
      const grad=ctx.createLinearGradient(bx,by,bx,by+bh);
      if(r.critical){
        grad.addColorStop(0,'#ff6b6b');
        grad.addColorStop(1,'#ff4757');
      } else {
        grad.addColorStop(0,'#7c6cf7');
        grad.addColorStop(1,'#6c5ce7');
      }
      ctx.fillStyle=grad;
      roundRect(ctx,bx,by,bw,bh,4);
      ctx.fill();

      // Duration text
      if(bw>30){
        ctx.fillStyle='#fff';
        ctx.font='bold 10px system-ui';
        ctx.fillText(dur+'d',bx+4,y+20);
      }

      barPositions.push({id:r.id, x:bx, y:by, w:bw, h:bh, name:r.name, cwpName:r.cwpName, es, dur, tf:r.tf, critical:r.critical});
    }
    y+=rowH;
  });

  // Dep lines
  const iwpMap={};
  barPositions.forEach(b=>iwpMap[b.id]=b);
  S.cwps.forEach(cwp=>{
    (cwp.iwps||[]).forEach(iwp=>{
      (iwp.deps||[]).forEach(d=>{
        if(!d.from) return;
        const from=iwpMap[d.from], to=iwpMap[iwp.id];
        if(!from||!to) return;
        ctx.strokeStyle='rgba(0,206,201,.4)';
        ctx.lineWidth=1.5;
        ctx.beginPath();
        ctx.moveTo(from.x+from.w,from.y+from.h/2);
        const mx=Math.max(from.x+from.w+8, to.x-8);
        ctx.lineTo(mx, from.y+from.h/2);
        ctx.lineTo(mx, to.y+to.h/2);
        ctx.lineTo(to.x, to.y+to.h/2);
        ctx.stroke();
        // Arrow
        ctx.fillStyle='rgba(0,206,201,.6)';
        ctx.beginPath();
        ctx.moveTo(to.x,to.y+to.h/2);
        ctx.lineTo(to.x-6,to.y+to.h/2-3);
        ctx.lineTo(to.x-6,to.y+to.h/2+3);
        ctx.closePath(); ctx.fill();
        ctx.lineWidth=1;
      });
    });
  });

  // Tooltip on hover
  canvas.onmousemove = e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=(e.clientX-rect.left);
    const my=(e.clientY-rect.top);
    const tip=document.getElementById('ganttTooltip');
    const hit=barPositions.find(b=>mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h);
    if(hit){
      tip.innerHTML=`<strong>${esc(hit.name)}</strong><br>CWP: ${esc(hit.cwpName)}<br>ES: Day ${hit.es} | Duration: ${hit.dur}d<br>Total Float: ${hit.tf||0}d${hit.critical?' | <span style="color:var(--red)">CRITICAL</span>':''}`;
      tip.style.opacity='1';
      tip.style.left=(e.clientX+12)+'px';
      tip.style.top=(e.clientY-20)+'px';
    } else {
      tip.style.opacity='0';
    }
  };
  canvas.onmouseleave=()=>{ document.getElementById('ganttTooltip').style.opacity='0'; };
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ─── Network Diagram ────────────────────────────────────
function drawNetwork(){
  const canvas=document.getElementById('networkCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const allIwps=getAllIWPs();

  // Layout: topological order, arranged in columns by ES
  runCPM();
  const nodeW=140, nodeH=60, padX=40, padY=30;

  // Group by ES (column)
  const cols={};
  allIwps.forEach(i=>{
    const c=Math.floor((i.es||0)/5);
    if(!cols[c]) cols[c]=[];
    cols[c].push(i);
  });
  const colKeys=Object.keys(cols).map(Number).sort((a,b)=>a-b);

  const positions={};
  let maxX=0, maxY=0;
  colKeys.forEach((ck,ci)=>{
    const col=cols[ck];
    col.forEach((iwp,ri)=>{
      const x=ci*(nodeW+padX)+30;
      const y=ri*(nodeH+padY)+30;
      positions[iwp.id]={x,y,iwp};
      maxX=Math.max(maxX,x+nodeW);
      maxY=Math.max(maxY,y+nodeH);
    });
  });

  const totalW=maxX+60;
  const totalH=maxY+60;
  canvas.width=totalW*dpr;
  canvas.height=totalH*dpr;
  canvas.style.width=totalW+'px';
  canvas.style.height=totalH+'px';
  ctx.scale(dpr,dpr);

  ctx.fillStyle='#14142a';
  ctx.fillRect(0,0,totalW,totalH);

  // Draw lines first
  allIwps.forEach(iwp=>{
    (iwp.deps||[]).forEach(d=>{
      if(!d.from||!positions[d.from]||!positions[iwp.id]) return;
      const from=positions[d.from], to=positions[iwp.id];
      ctx.strokeStyle=iwp.critical&&positions[d.from].iwp.critical?'rgba(255,71,87,.6)':'rgba(108,92,231,.4)';
      ctx.lineWidth=iwp.critical&&positions[d.from].iwp.critical?2:1;
      ctx.beginPath();
      ctx.moveTo(from.x+nodeW,from.y+nodeH/2);
      ctx.lineTo(to.x,to.y+nodeH/2);
      ctx.stroke();
      // Arrow
      ctx.fillStyle=ctx.strokeStyle;
      ctx.beginPath();
      ctx.moveTo(to.x,to.y+nodeH/2);
      ctx.lineTo(to.x-8,to.y+nodeH/2-4);
      ctx.lineTo(to.x-8,to.y+nodeH/2+4);
      ctx.closePath(); ctx.fill();
    });
  });

  // Draw nodes
  Object.values(positions).forEach(p=>{
    const iwp=p.iwp;
    ctx.fillStyle=iwp.critical?'rgba(255,71,87,.15)':'rgba(108,92,231,.1)';
    ctx.strokeStyle=iwp.critical?'#ff4757':'#6c5ce7';
    ctx.lineWidth=iwp.critical?2:1;
    roundRect(ctx,p.x,p.y,nodeW,nodeH,6);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle='#e8e8f0';
    ctx.font='bold 11px system-ui';
    const name=iwp.name.length>16?iwp.name.slice(0,14)+'..':iwp.name;
    ctx.fillText(name,p.x+6,p.y+18);

    ctx.fillStyle='#888';
    ctx.font='10px system-ui';
    ctx.fillText(`ES:${iwp.es||0} EF:${iwp.ef||0}`,p.x+6,p.y+34);
    ctx.fillText(`LS:${iwp.ls||0} LF:${iwp.lf||0} TF:${iwp.tf||0}`,p.x+6,p.y+48);
  });
}

function exportCSV(){
  runCPM();
  const allIwps=getAllIWPs();
  let csv='Activity ID,Activity Name,WBS,Duration,Start,Finish,Total Float,Free Float,Predecessor,Relationship,Lag,Trade,Crew,Critical\n';
  allIwps.forEach((iwp,i)=>{
    const preds=(iwp.deps||[]).filter(d=>d.from).map(d=>{
      const p=allIwps.find(x=>x.id===d.from);
      return p? `A${allIwps.indexOf(p)+1000}${d.type}${d.lag?'+'+d.lag+'d':''}` : '';
    }).filter(Boolean).join('; ');
    csv+=`A${i+1000},"${iwp.name}","${iwp.cwpName}",${iwp.estDuration||iwp.dur||5},${iwp.es||0},${iwp.ef||0},${iwp.tf||0},${iwp.ff||0},"${preds}","","",${iwp.trade||''},${iwp.crew||''},${iwp.critical?'Y':'N'}\n`;
  });
  downloadFile(S.projectName+'_P6.csv', csv, 'text/csv');
  toast('P6 CSV exported'); sfxSuccess();
}

function exportXER(){
  runCPM();
  const allIwps=getAllIWPs();
  let xer='ERMHDR\t11.0\n';
  xer+='%T\tPROJECT\n%F\tproj_id\tproj_short_name\n';
  xer+=`%R\t1\t${S.projectName}\n`;
  xer+='%T\tTASK\n%F\ttask_id\ttask_code\ttask_name\twbs_name\ttarget_drtn_hr_cnt\tearly_start_date\tearly_end_date\ttotal_float_hr_cnt\n';
  allIwps.forEach((iwp,i)=>{
    xer+=`%R\t${i+1}\tA${i+1000}\t${iwp.name}\t${iwp.cwpName}\t${(iwp.estDuration||iwp.dur||5)*8}\t${iwp.es||0}\t${iwp.ef||0}\t${(iwp.tf||0)*8}\n`;
  });
  xer+='%T\tTASKPRED\n%F\ttask_pred_id\ttask_id\tpred_task_id\tpred_type\tlag_hr_cnt\n';
  let predId=1;
  allIwps.forEach((iwp,i)=>{
    (iwp.deps||[]).forEach(d=>{
      if(!d.from) return;
      const pi=allIwps.findIndex(x=>x.id===d.from);
      if(pi>=0) xer+=`%R\t${predId++}\t${i+1}\t${pi+1}\t${d.type||'FS'}\t${(d.lag||0)*8}\n`;
    });
  });
  xer+='%E\n';
  downloadFile(S.projectName+'.xer', xer, 'text/plain');
  toast('XER exported'); sfxSuccess();
}

  S.cwps.forEach(cwp=>{
    xml+=`    <Task><UID>${uid}</UID><Name>${escXml(cwp.name)}</Name><OutlineLevel>1</OutlineLevel><Summary>1</Summary></Task>\n`;
    const cwpUid=uid; uid++;
    (cwp.iwps||[]).forEach(iwp=>{
      uidMap[iwp.id]=uid;
      xml+=`    <Task><UID>${uid}</UID><Name>${escXml(iwp.name)}</Name><OutlineLevel>2</OutlineLevel><Duration>PT${(iwp.estDuration||iwp.dur||5)*8}H0M0S</Duration><Start>${iwp.es||0}</Start><Finish>${iwp.ef||0}</Finish><TotalSlack>${(iwp.tf||0)*8}</TotalSlack><Critical>${iwp.critical?1:0}</Critical></Task>\n`;
      uid++;
    });
  });
  xml+='  </Tasks>\n';
  // Links
  xml+='  <Links>\n';
  allIwps.forEach(iwp=>{
    (iwp.deps||[]).forEach(d=>{
      if(!d.from||!uidMap[d.from]||!uidMap[iwp.id]) return;
      const typeMap={FS:1,FF:0,SS:2,SF:3};
      xml+=`    <Link><PredecessorUID>${uidMap[d.from]}</PredecessorUID><SuccessorUID>${uidMap[iwp.id]}</SuccessorUID><Type>${typeMap[d.type]||1}</Type><LinkLag>${(d.lag||0)*4800}</LinkLag></Link>\n`;
    });
  });
  xml+='  </Links>\n</Project>';
  downloadFile(S.projectName+'.xml', xml, 'application/xml');
  toast('XML exported'); sfxSuccess();
}

function downloadFile(name,content,type){
  const blob=new Blob([content],{type});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  a.click();
  URL.revokeObjectURL(a.href);
}

function resetProject(){
  if(!confirm('This will delete ALL project data. Are you sure?')) return;
  localStorage.removeItem(SAVE_KEY);
  S={projectName:'',templateId:null,currentPhase:0,maxPhase:0,selectedCwpId:null,cwps:[],ewps:[],room:null,playerName:'',playerId:S.playerId,players:[],votes:{},votingIwpId:null,voteRevealed:false,scores:{},calendarWorkDays:[1,2,3,4,5]};
  nextId=1;
  goToPhase(0);
  toast('Project reset');
}

// ─── Modal ──────────────────────────────────────────────
function showModal(title,bodyHtml,onConfirm){
  const mc=document.getElementById('modalContainer');
  mc.innerHTML=`<div class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>${title}</h2>
      ${bodyHtml}
      <div class="btn-row" style="margin-top:16px;justify-content:flex-end">
        <button class="sec" onclick="closeModal()">Cancel</button>
        <button id="modalConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalConfirmBtn').onclick=()=>{
    const result = onConfirm();
    if(result!==false) closeModal();
  };
  // Focus first input
  setTimeout(()=>{const inp=mc.querySelector('input'); if(inp) inp.focus();},50);
}
function closeModal(e){
  if(e && e.target && !e.target.classList.contains('modal-backdrop')) return;
  document.getElementById('modalContainer').innerHTML='';
}

// ─── Utils ──────────────────────────────────────────────
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escXml(s){ return esc(s).replace(/'/g,'&apos;'); }

// ─── Init ───────────────────────────────────────────────
(function init(){
  const loaded = loadState();
  renderStepper();
  if(loaded && S.currentPhase > 0){
    renderCurrentPhase();
    // Re-init multiplayer if room was set
    if(S.room) initMultiplayer(S.room);
  } else {
    renderCurrentPhase();
  }
  // Auto-save every 5s
  setInterval(saveState, 5000);
})();
</script>
