<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Elevator/Lift Traffic Study</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:960px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.3em;margin:8px 0 10px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}.field{flex:1;min-width:130px}
label{display:block;font-size:12px;color:var(--dim);margin-bottom:3px}
select,input{width:100%;padding:7px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px}
button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:6px 4px 6px 0}
button:hover{opacity:.85}
.results{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0;display:flex;flex-wrap:wrap;gap:16px}
.stat{text-align:center;min-width:100px}.stat .val{font-size:1.4em;font-weight:700;color:var(--accent)}.stat .lbl{font-size:11px;color:var(--dim)}
.grade{font-size:1.6em;font-weight:700;padding:4px 16px;border-radius:8px;display:inline-block}
.grade-A{background:#166534;color:var(--green)}.grade-B{background:#1e3a5f;color:#60a5fa}
.grade-C{background:#713f12;color:#fbbf24}.grade-D{background:#7f1d1d;color:#fca5a5}
canvas{width:100%;max-width:500px;display:block;margin:10px auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.scenario{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.scenario button{font-size:12px;padding:5px 12px;background:var(--bg2);border:1px solid var(--border)}
.scenario button.active{border-color:var(--accent);color:var(--accent)}
</style></head><body>
<a href="index.html" class="home">← home</a>
<h1>Elevator/Lift Traffic Study</h1>
<div class="row">
 <div class="field"><label>Number of Floors</label><input id="floors" type="number" value="12" min="2" max="60"></div>
 <div class="field"><label>Number of Elevators</label><input id="elevs" type="number" value="3" min="1" max="8"></div>
 <div class="field"><label>Population per Floor</label><input id="pop" type="number" value="80" min="10" max="500"></div>
 <div class="field"><label>Car Capacity (persons)</label><input id="cap" type="number" value="16" min="6" max="30"></div>
</div>
<div class="row">
 <div class="field"><label>Speed (m/s)</label><input id="speed" type="number" value="2.5" step="0.1" min="0.5" max="10"></div>
 <div class="field"><label>Floor Height (m)</label><input id="fh" type="number" value="3.5" step="0.1"></div>
 <div class="field"><label>Door Open+Close (s)</label><input id="door" type="number" value="6" step="0.5"></div>
 <div class="field"><label>Acceleration (m/s²)</label><input id="accel" type="number" value="1.0" step="0.1"></div>
</div>
<div class="scenario">
 Scenario:
 <button class="active" onclick="setScenario('uppeak',this)">Up-Peak (Morning)</button>
 <button onclick="setScenario('interfloor',this)">Interfloor</button>
 <button onclick="setScenario('lunch',this)">Lunch Rush</button>
</div>
<button onclick="calc()">Analyze</button><button onclick="toggleSim()">▶ Simulate</button>
<div class="results" id="res" style="display:none"></div>
<canvas id="cv" height="500"></canvas>
<script>
let scenario='uppeak',simRunning=false,simFrame=0,elevators=[];

function setScenario(s,btn){
 scenario=s;document.querySelectorAll('.scenario button').forEach(b=>b.classList.remove('active'));
 if(btn)btn.classList.add('active');
}

function calc(){
 const N=+document.getElementById('floors').value,L=+document.getElementById('elevs').value;
 const P=+document.getElementById('pop').value,C=+document.getElementById('cap').value;
 const v=+document.getElementById('speed').value,fh=+document.getElementById('fh').value;
 const td=+document.getElementById('door').value,a=+document.getElementById('accel').value;
 const totalPop=P*(N-1); // exclude ground
 // Probable stops (up-peak formula)
 const p=Math.min(0.8*C,P)/P; // probability of stopping
 let S=0;for(let i=1;i<N;i++)S+=1-Math.pow(1-p,Math.min(C,P));
 S=Math.min(S,N-1);
 // Highest reversal floor
 const H=N*(1-Math.pow((N-1)/N,C));
 // Round trip time
 const tTravel=2*H*fh/v; // travel time up and down
 const tAccel=2*H*(v/a)/v; // accel/decel penalty simplified
 const tStops=(S+1)*td; // door operations
 const tPass=C*1.2*2; // passenger transfer time (1.2s per person)
 const RTT=tTravel+tStops+tPass+tAccel;
 // Interval
 const INT=RTT/L;
 // Handling capacity (5 min)
 const HC5=300*L*C*0.8/RTT;
 // % population handled
 const pctHandled=HC5/totalPop*100;
 // Average waiting time
 const AWT=INT/2;
 // Grade per CIBSE Guide D
 let grade,gradeClass;
 if(AWT<=25){grade='A';gradeClass='grade-A';}
 else if(AWT<=35){grade='B';gradeClass='grade-B';}
 else if(AWT<=55){grade='C';gradeClass='grade-C';}
 else{grade='D';gradeClass='grade-D';}
 // Scenario adjustments
 let scenarioNote='';
 if(scenario==='lunch'){
  scenarioNote='Lunch: +40% demand, bidirectional traffic';
 }else if(scenario==='interfloor'){
  scenarioNote='Interfloor: random origins, ~60% of peak demand';
 }

 document.getElementById('res').style.display='flex';
 document.getElementById('res').innerHTML=`
  <div class="stat"><div class="val">${RTT.toFixed(1)}s</div><div class="lbl">Round Trip Time</div></div>
  <div class="stat"><div class="val">${INT.toFixed(1)}s</div><div class="lbl">Interval</div></div>
  <div class="stat"><div class="val">${AWT.toFixed(0)}s</div><div class="lbl">Avg Wait Time</div></div>
  <div class="stat"><div class="val">${HC5.toFixed(0)}</div><div class="lbl">5-min Capacity</div></div>
  <div class="stat"><div class="val">${pctHandled.toFixed(1)}%</div><div class="lbl">Pop Handled</div></div>
  <div class="stat"><div class="val">${S.toFixed(1)}</div><div class="lbl">Probable Stops</div></div>
  <div class="stat"><div class="grade ${gradeClass}">${grade}</div><div class="lbl">CIBSE Grade</div></div>
  ${scenarioNote?`<div class="stat" style="flex-basis:100%;text-align:left"><div class="lbl">${scenarioNote}</div></div>`:''}`;
 initElevators();drawShafts();
}

function initElevators(){
 const L=+document.getElementById('elevs').value,N=+document.getElementById('floors').value;
 elevators=[];
 for(let i=0;i<L;i++){
  elevators.push({floor:0,target:Math.floor(Math.random()*(N-1))+1,dir:1,passengers:Math.floor(Math.random()*10),doorOpen:0});
 }
}

function drawShafts(){
 const c=document.getElementById('cv'),ctx=c.getContext('2d');
 const N=+document.getElementById('floors').value,L=elevators.length;
 c.width=c.offsetWidth*2;c.height=1000;ctx.scale(2,2);
 const W=c.offsetWidth,H=500;
 ctx.clearRect(0,0,W,H);
 const shaftW=50,gap=16,totalW=L*(shaftW+gap);
 const startX=(W-totalW)/2,floorH=(H-60)/N;
 // Floor lines
 for(let f=0;f<=N;f++){
  const y=H-30-f*floorH;
  ctx.strokeStyle=f===0?'var(--accent)':'rgba(255,255,255,0.08)';
  ctx.lineWidth=f===0?2:1;
  ctx.beginPath();ctx.moveTo(startX-30,y);ctx.lineTo(startX+totalW+10,y);ctx.stroke();
  ctx.fillStyle=f===0?'var(--accent)':'var(--dim)';ctx.font='10px system-ui';ctx.textAlign='right';
  ctx.fillText(f===0?'G':f,startX-34,y+4);
 }
 // Shafts and cars
 elevators.forEach((el,i)=>{
  const sx=startX+i*(shaftW+gap);
  // Shaft background
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.fillRect(sx,H-30-N*floorH,shaftW,N*floorH);
  // Car
  const carY=H-30-el.floor*floorH-floorH+4;
  const carH=floorH-8;
  ctx.fillStyle=el.doorOpen>0?'var(--green)':'var(--accent)';
  ctx.globalAlpha=0.85;
  ctx.fillRect(sx+4,carY,shaftW-8,carH);
  ctx.globalAlpha=1;
  // Passenger count
  ctx.fillStyle='#fff';ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText(el.passengers,sx+shaftW/2,carY+carH/2+4);
  // Direction arrow
  ctx.fillStyle='#fff';ctx.font='10px system-ui';
  ctx.fillText(el.dir>0?'▲':'▼',sx+shaftW/2,carY-2);
  // Label
  ctx.fillStyle='var(--dim)';ctx.font='10px system-ui';
  ctx.fillText('E'+(i+1),sx+shaftW/2,H-10);
 });
}

function toggleSim(){
 simRunning=!simRunning;
 if(simRunning)simLoop();
}

function simLoop(){
 if(!simRunning)return;
 const N=+document.getElementById('floors').value;
 elevators.forEach(el=>{
  if(el.doorOpen>0){el.doorOpen--;return;}
  if(Math.abs(el.floor-el.target)<0.1){
   el.floor=el.target;el.doorOpen=8;
   el.passengers=Math.max(0,el.passengers+Math.floor(Math.random()*6-2));
   if(scenario==='uppeak'){
    if(el.floor===0){el.target=Math.floor(Math.random()*(N-1))+1;el.dir=1;el.passengers=Math.floor(Math.random()*12)+2;}
    else{el.target=0;el.dir=-1;}
   }else{
    el.target=Math.floor(Math.random()*N);
    el.dir=el.target>el.floor?1:-1;
   }
  }else{
   el.floor+=(el.dir>0?0.15:-0.15);
   if(el.floor<0)el.floor=0;if(el.floor>=N-1)el.floor=N-1;
  }
 });
 drawShafts();
 requestAnimationFrame(simLoop);
}

calc();
</script></body></html>
