<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Wrefle 3</title>
<style>
:root{--bg:#121213;--bg2:#1a1a1b;--border:#3a3a3c;--text:#ffffff;--dim:#818384;--green:#538d4e;--yellow:#b59f3b;--gray:#3a3a3c;--key-bg:#818384;--key-text:#ffffff;--toast-bg:#ffffff;--toast-text:#121213}
[data-theme="light"]{--bg:#ffffff;--bg2:#f0f0f0;--border:#d3d6da;--text:#1a1a1b;--dim:#787c7e;--green:#6aaa64;--yellow:#c9b458;--gray:#787c7e;--key-bg:#d3d6da;--key-text:#1a1a1b;--toast-bg:#121213;--toast-text:#ffffff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;touch-action:manipulation;user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}
header{display:flex;align-items:center;justify-content:center;padding:8px 16px;border-bottom:1px solid var(--border);position:relative;min-height:50px;gap:8px}
header h1{font-size:1.5rem;font-weight:800;letter-spacing:0.1em}
.hdr-btn{background:none;border:none;color:var(--text);cursor:pointer;padding:4px 6px;font-size:1rem}
.hdr-btn.sm{font-size:0.6rem;font-weight:700;border:1px solid var(--border);border-radius:4px;padding:2px 6px}
.hdr-btn.sm.active{border-color:var(--green);color:var(--green)}
.game-num{font-size:0.55rem;color:var(--dim);position:absolute;bottom:2px}
#board{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:5px;padding:10px}
.row{display:flex;gap:5px}
.tile{width:62px;height:62px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;text-transform:uppercase;transition:border-color 0.1s}
.tile.filled{border-color:#565758}
.tile.pop{animation:pop 0.1s ease}
.tile.flip{animation:flipTile 0.5s ease forwards}
.tile.correct{--flip-bg:var(--green);box-shadow:0 0 6px rgba(83,141,78,0.4)}
.tile.present{--flip-bg:var(--yellow);box-shadow:0 0 6px rgba(181,159,59,0.4)}
.tile.absent{--flip-bg:var(--gray)}
.tile.bounce{animation:bounce 0.6s ease}
.row.shake{animation:shake 0.5s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes flipTile{0%{transform:rotateX(0deg)}50%{transform:rotateX(90deg);background:transparent;border-color:transparent}51%{background:var(--flip-bg);border-color:var(--flip-bg);color:#fff}100%{transform:rotateX(0deg);background:var(--flip-bg);border-color:var(--flip-bg);color:#fff}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}50%{transform:translateY(-8px)}70%{transform:translateY(-4px)}}
#keyboard{padding:8px 6px 12px;display:flex;flex-direction:column;gap:6px;align-items:center}
.kb-row{display:flex;gap:5px}
.key{height:58px;min-width:43px;border:none;border-radius:4px;background:var(--key-bg);color:var(--key-text);font-size:0.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;transition:background 0.2s,transform 0.05s;padding:0 6px}
.key:active{transform:scale(0.95)}
.key.wide{min-width:65px;font-size:0.7rem}
.key.correct{background:var(--green);color:#fff}
.key.present{background:var(--yellow);color:#fff}
.key.absent{background:#3a3a3c;color:#fff}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--toast-bg);color:var(--toast-text);padding:12px 20px;border-radius:4px;font-weight:700;font-size:0.9rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;text-align:center;max-width:90%}
#toast.show{opacity:1}
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
#modal.show{display:flex}
.modal-content{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:380px;width:90%;text-align:center;position:relative}
.modal-content h2{margin-bottom:16px;font-size:1.1rem}
.stat-row{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-val{font-size:2rem;font-weight:700}
.stat-label{font-size:0.6rem;color:var(--dim)}
.dist{text-align:left;margin:12px 0}
.dist-row{display:flex;align-items:center;gap:4px;margin:3px 0}
.dist-num{font-size:0.75rem;width:10px}
.dist-bar{height:20px;min-width:20px;background:var(--gray);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:0.7rem;font-weight:700;color:#fff;border-radius:2px}
.dist-bar.highlight{background:var(--green)}
.share-btn{background:var(--green);color:#fff;border:none;border-radius:4px;padding:12px 24px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px}
.share-btn:active{opacity:0.8}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:300}
#settings-panel{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:250}
#settings-panel.show{display:flex}
.settings-content{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:320px;width:90%}
.settings-content label{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--gray);position:relative;cursor:pointer;border:none}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left 0.2s}
.toggle.on::after{left:20px}
@media(max-width:500px){.tile{width:56px;height:56px;font-size:1.7rem}.key{height:52px;min-width:36px;font-size:0.75rem}.key.wide{min-width:54px}}
</style>
</head>

<script>
(function(){
// ── Word list
var ALL_WORDS=JSON.parse(document.getElementById('words-data').textContent);
var DICT=new Set(ALL_WORDS);
var ANSWER_POOL=Array.from(new Set(ALL_WORDS.slice(0,2000)));

// ── Starters
var STARTERS=[{name:'Nyah',code:'NYAHW'},{name:'Keira',code:'KEIRA'},{name:'Lily',code:'LILYW'},{name:'Jacky',code:'JACKY'},{name:'Troy',code:'TROYW'}];
STARTERS.forEach(function(s){DICT.add(s.code);});
var STARTER_CODES=new Set(STARTERS.map(function(s){return s.code;}));

// ── Date/seed helpers
var EPOCH=new Date(2024,0,1);
var today=new Date();today.setHours(0,0,0,0);
var dayNum=Math.floor((today-EPOCH)/(1000*60*60*24));

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function dateSeed(s){var h=0;for(var i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h;}
function getDailyWord(){var ds=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');var rng=mulberry32(dateSeed(ds));return ANSWER_POOL[Math.floor(rng()*ANSWER_POOL.length)];}

// ── Settings
var settings=JSON.parse(localStorage.getItem('wrefle3settings')||'{}');
var dailyMode=settings.daily!==false;
var hardMode=settings.hard||false;
var starterMode=settings.starter||false;
var starterIdx=settings.starterIdx||0;

// ── Pick answer
var answer;
if(dailyMode){answer=getDailyWord();}else{answer=ANSWER_POOL[Math.floor(Math.random()*ANSWER_POOL.length)];}

document.getElementById('gameNum').textContent=dailyMode?'Wrefle #'+dayNum:'Random';

// ── Game state
var board=Array.from({length:6},function(){return Array(5).fill('');});
var colors=Array.from({length:6},function(){return Array(5).fill('');});
var row=0,col=0,gameOver=false;
var keyColors={};
var audioCtx=null;

// ── Jackson moods
var jacksonEl=document.getElementById('jackson');
var JACKSON_FACES={neutral:'\u{1F63A}',happy:'\u{1F638}',sad:'\u{1F63F}',love:'\u{1F63B}',think:'\u{1F431}',shock:'\u{1F640}',smirk:'\u{1F63C}'};
function setJackson(mood){jacksonEl.textContent=JACKSON_FACES[mood]||JACKSON_FACES.neutral;}

// ── Funny messages
var WIN_MSGS=['Brilliant! Jackson is purring.','You absolute legend.','Big brain energy right there.','That\'s fridge-worthy.','Smarter than Jackson. Barely.','That\'s going on the fridge.','You did that with STYLE.','Achievement unlocked: Not Terrible!','Jackson just slow-blinked at you. That\'s love.','Call Mensa. We have a candidate.'];
var LOSE_MSGS=['Jackson is judging you silently.','That word was right THERE.','Even Jackson could\'ve gotten that. Maybe.','We don\'t talk about this one.','Your streak called. It said goodbye.','The word was having a great time hiding.','F in chat for your streak.','Jackson knocked your score off the table.','Better luck next Wrefle.','That\'s okay, words are hard.'];
var MISS_MSGS=['Interesting strategy... if the strategy is losing.','Jackson just yawned.','Are you even trying? (kidding, love you)','That word owes you nothing.','Bold guess. Wrong, but bold.','Jackson walked across your keyboard better.'];
var CLOSE_MSGS=['SO CLOSE! Jackson\'s tail is twitching!','You\'re basically there. Don\'t choke.','Ooh hot hot hot!','One more brain cell and you\'d have it!','The answer is SWEATING.'];
var INVALID_MSGS=['That\'s not a word. Jackson could tell you that.','Nope. Not in the dictionary. Nice try though.','Did your cat type that?','Scrabble would reject this too.','Letters: yes. Word: absolutely not.'];
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ── Sound
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,vol,type){try{var ctx=getAudio();var o=ctx.createOscillator();var g=ctx.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||0.02;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.stop(ctx.currentTime+dur);}catch(e){}}
function clickSound(){playTone(800,0.05,0.015);}
function flipSound(i){playTone(400+i*80,0.1,0.02);}
function winSound(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.2,0.02);},i*100);});}
function errorSound(){playTone(200,0.15,0.015,'square');}

// ── Confetti
var confCanvas=document.getElementById('confetti-canvas');
var confCtx=confCanvas.getContext('2d');
var confParts=[];var confAnim=null;
function resizeConfetti(){confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;}
resizeConfetti();window.addEventListener('resize',resizeConfetti);
function spawnConfetti(){
  var cx=window.innerWidth/2;var cy=window.innerHeight/3;
  var cols=['#ff6b6b','#ffd93d','#6bff6b','#6bb5ff','#ff6bff','#ffa06b','#6bfff0'];
  for(var i=0;i<120;i++){confParts.push({x:cx,y:cy,vx:(Math.random()-0.5)*12,vy:-(2+Math.random()*6),w:4+Math.random()*6,h:3+Math.random()*4,rot:Math.random()*360,rotV:(Math.random()-0.5)*12,color:cols[Math.floor(Math.random()*cols.length)],life:1});}
  if(!confAnim)animateConfetti();
}
function animateConfetti(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParts=confParts.filter(function(p){return p.life>0;});
  confParts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.rot+=p.rotV;p.life-=0.005;confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.rot*Math.PI/180);confCtx.globalAlpha=p.life;confCtx.fillStyle=p.color;confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);confCtx.restore();});
  if(confParts.length>0){confAnim=requestAnimationFrame(animateConfetti);}
  else{confAnim=null;confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);}
}

// ── Render board
var boardEl=document.getElementById('board');
function renderBoard(){
  boardEl.innerHTML='';
  for(var r=0;r<6;r++){
    var rowEl=document.createElement('div');rowEl.className='row';rowEl.id='row-'+r;
    for(var c=0;c<5;c++){
      var t=document.createElement('div');t.className='tile';
      if(board[r][c])t.classList.add('filled');
      if(colors[r][c])t.classList.add(colors[r][c]);
      t.textContent=board[r][c];
      t.id='tile-'+r+'-'+c;
      rowEl.appendChild(t);
    }
    boardEl.appendChild(rowEl);
  }
}

// ── Keyboard (lowercase keys matching lowercase keyColors)
var ROWS_KB=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','Backspace']];
var kbEl=document.getElementById('keyboard');
function renderKeyboard(){
  kbEl.innerHTML='';
  ROWS_KB.forEach(function(kr){
    var rowEl=document.createElement('div');rowEl.className='kb-row';
    kr.forEach(function(k){
      var btn=document.createElement('button');btn.className='key';
      if(k==='Enter'||k==='Backspace'){btn.classList.add('wide');btn.textContent=k==='Backspace'?'⌫':'ENTER';}
      else btn.textContent=k;
      // Key colors: use lowercase key to match lowercase keyColors
      var colorKey=k.toLowerCase();
      if(keyColors[colorKey])btn.classList.add(keyColors[colorKey]);
      btn.addEventListener('click',function(){handleKey(k);});
      rowEl.appendChild(btn);
    });
    kbEl.appendChild(rowEl);
  });
}

// ── Toast
var toastTimer=null;
function showToast(msg,dur){
  dur=dur||1500;
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show');},dur);
}

// ── Handle input
function handleKey(key){
  if(gameOver)return;
  if(key==='Backspace'){
    if(col>0){col--;board[row][col]='';renderBoard();}
    return;
  }
  if(key==='Enter'){
    if(col<5){showToast('Not enough letters');shakeRow();return;}
    var guess=board[row].join('').toLowerCase();
    if(!DICT.has(guess.toUpperCase())&&!STARTER_CODES.has(guess.toUpperCase())){showToast(pick(INVALID_MSGS));shakeRow();errorSound();return;}
    if(hardMode&&row>0&&!checkHardMode(guess)){return;}
    revealRow(guess);
    return;
  }
  if(/^[a-zA-Z]$/.test(key)&&col<5){
    board[row][col]=key.toLowerCase();col++;
    renderBoard();
    var tile=document.getElementById('tile-'+row+'-'+(col-1));
    if(tile)tile.classList.add('pop');
    clickSound();
  }
}

function checkHardMode(guess){
  var g=guess.toLowerCase();
  for(var r=0;r<row;r++){
    for(var c=0;c<5;c++){
      if(colors[r][c]==='correct'&&g[c]!==board[r][c]){
        showToast('Position '+(c+1)+' must be '+board[r][c].toUpperCase());shakeRow();return false;
      }
      if(colors[r][c]==='present'&&g.indexOf(board[r][c])===-1){
        showToast('Guess must contain '+board[r][c].toUpperCase());shakeRow();return false;
      }
    }
  }
  return true;
}

function shakeRow(){
  var rowEl=document.getElementById('row-'+row);
  if(rowEl){rowEl.classList.add('shake');setTimeout(function(){rowEl.classList.remove('shake');},500);}
}

function revealRow(guess){
  var ansLower=answer.toLowerCase();
  var guessLower=guess.toLowerCase();
  var result=getColors(guessLower,ansLower);
  var delay=0;
  for(var c=0;c<5;c++){
    (function(cc){
      setTimeout(function(){
        colors[row][cc]=result[cc];
        var tile=document.getElementById('tile-'+row+'-'+cc);
        if(tile){tile.classList.add('flip',result[cc]);}
        flipSound(cc);
        // Update key colors (lowercase)
        var letter=guessLower[cc];
        if(result[cc]==='correct')keyColors[letter]='correct';
        else if(result[cc]==='present'&&keyColors[letter]!=='correct')keyColors[letter]='present';
        else if(result[cc]==='absent'&&!keyColors[letter])keyColors[letter]='absent';
        if(cc===4){
          setTimeout(function(){
            renderBoard();renderKeyboard();
            if(guessLower===ansLower){winGame();}
            else if(row>=5){loseGame();}
            else{row++;col=0;}
          },300);
        }
      },delay);
    })(c);
    delay+=100;
  }
}

function getColors(guess,target){
  var res=Array(5).fill('absent');
  var tArr=target.split('');var gArr=guess.split('');
  for(var i=0;i<5;i++){if(gArr[i]===tArr[i]){res[i]='correct';tArr[i]='_';gArr[i]='*';}}
  for(var i=0;i<5;i++){if(gArr[i]!=='*'){var idx=tArr.indexOf(gArr[i]);if(idx!==-1){res[i]='present';tArr[idx]='_';}}}
  return res;
}

function winGame(){
  gameOver=true;
  setJackson('happy');
  setTimeout(function(){
    for(var c=0;c<5;c++){(function(cc){setTimeout(function(){var t=document.getElementById('tile-'+row+'-'+cc);if(t)t.classList.add('bounce');},cc*80);})(c);}
  },200);
  winSound();spawnConfetti();
  showToast(pick(WIN_MSGS),2500);
  saveStats(true,row+1);
  setTimeout(function(){showStatsModal();},2000);
}
function loseGame(){
  gameOver=true;
  setJackson('sad');
  showToast(pick(LOSE_MSGS)+' The word was: '+answer.toUpperCase(),4000);
  saveStats(false,0);
  setTimeout(function(){showStatsModal();},3000);
}

// ── Jackson reactions during game
function updateJacksonMood(guess,ansLower){
  var greens=0,yellows=0;
  for(var i=0;i<5;i++){if(ansLower[i]===guess[i])greens++;else if(ansLower.indexOf(guess[i])!==-1)yellows++;}
  if(greens>=3)setJackson('love');
  else if(greens===0&&yellows===0)setJackson('shock');
  else if(yellows>=3)setJackson('think');
  else setJackson('smirk');
}

// ── Stats
function getStats(){return JSON.parse(localStorage.getItem('wrefle3stats')||'{"played":0,"won":0,"streak":0,"maxStreak":0,"dist":[0,0,0,0,0,0],"lastDay":-1}');}
function saveStats(win,guesses){
  var s=getStats();
  if(dailyMode&&s.lastDay===dayNum)return;
  s.played++;if(dailyMode)s.lastDay=dayNum;
  if(win){s.won++;s.streak++;if(s.streak>s.maxStreak)s.maxStreak=s.streak;s.dist[guesses-1]++;}
  else{s.streak=0;}
  localStorage.setItem('wrefle3stats',JSON.stringify(s));
}

function showStatsModal(){
  var s=getStats();var modal=document.getElementById('modal');var mc=document.getElementById('modalContent');
  var maxDist=Math.max.apply(null,s.dist.concat([1]));
  var distHTML=s.dist.map(function(d,i){return '<div class="dist-row"><div class="dist-num">'+(i+1)+'</div><div class="dist-bar'+(gameOver&&row===i?' highlight':'')+'" style="width:'+Math.max(8,d/maxDist*100)+'%">'+d+'</div></div>';}).join('');
  mc.innerHTML='<h2>Statistics</h2>'+
    '<div class="stat-row">'+
    '<div class="stat"><div class="stat-val">'+s.played+'</div><div class="stat-label">Played</div></div>'+
    '<div class="stat"><div class="stat-val">'+(s.played?Math.round(s.won/s.played*100):0)+'</div><div class="stat-label">Win %</div></div>'+
    '<div class="stat"><div class="stat-val">'+s.streak+'</div><div class="stat-label">Streak</div></div>'+
    '<div class="stat"><div class="stat-val">'+s.maxStreak+'</div><div class="stat-label">Max Streak</div></div>'+
    '</div>'+
    '<div class="dist">'+distHTML+'</div>'+
    (gameOver?'<button class="share-btn" onclick="shareResult()">Share \u{1F4CB}</button>':'')+
    '<br><button class="share-btn" style="background:var(--gray)" onclick="document.getElementById(\'modal\').classList.remove(\'show\')">Close</button>';
  modal.classList.add('show');
}

// ── Share
window.shareResult=function(){
  var emojis=colors.slice(0,row+1).map(function(r){return r.map(function(c){return c==='correct'?'\u{1F7E9}':c==='present'?'\u{1F7E8}':'⬛';}).join('');}).join('\n');
  var label=dailyMode?'#'+dayNum:'Random';
  var text='Wrefle 3 '+label+' '+(gameOver&&board[row].join('').toLowerCase()===answer.toLowerCase()?row+1:'X')+'/6\n\n'+emojis;
  navigator.clipboard.writeText(text).then(function(){showToast('Copied to clipboard!');}).catch(function(){showToast('Could not copy');});
};

// ── Starter word: auto-play first row
function applyStarter(){
  if(!starterMode)return;
  var starter=STARTERS[starterIdx%STARTERS.length];
  var code=starter.code.toLowerCase();
  for(var i=0;i<5;i++){board[0][i]=code[i];}
  col=5;
  renderBoard();
  // Auto-submit after short delay
  setTimeout(function(){
    var guess=code;
    var ansLower=answer.toLowerCase();
    if(DICT.has(code.toUpperCase())||STARTER_CODES.has(code.toUpperCase())){
      revealRow(guess);
      updateJacksonMood(guess,ansLower);
    }
  },300);
}

// ── Save/load game
function loadGame(){
  var saved=JSON.parse(localStorage.getItem('wrefle3game')||'null');
  if(saved&&dailyMode&&saved.day===dayNum){
    board=saved.board;colors=saved.colors;row=saved.row;col=saved.col;gameOver=saved.gameOver;keyColors=saved.keyColors||{};
    return true;
  }
  return false;
}
function saveGame(){
  if(dailyMode){localStorage.setItem('wrefle3game',JSON.stringify({day:dayNum,board:board,colors:colors,row:row,col:col,gameOver:gameOver,keyColors:keyColors}));}
}

// ── Physical keyboard
document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter')handleKey('Enter');
  else if(e.key==='Backspace')handleKey('Backspace');
  else if(/^[a-z]$/i.test(e.key))handleKey(e.key.toLowerCase());
});

// ── Auto-save on each action
var origHandle=handleKey;
handleKey=function(k){origHandle(k);saveGame();
  // Update Jackson mood after reveal
  if(k==='Enter'&&!gameOver&&row>0){
    var prevGuess=board[row-1]?board[row-1].join(''):null;
    if(prevGuess)updateJacksonMood(prevGuess,answer.toLowerCase());
  }
};

// ── Theme
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('wrefle3theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'\u{1F319}':'☀️';}
document.getElementById('themeBtn').addEventListener('click',function(){
  var cur=localStorage.getItem('wrefle3theme')||'dark';setTheme(cur==='dark'?'light':'dark');
});

// ── Settings panel
function renderSettings(){
  var sc=document.getElementById('settingsContent');
  sc.innerHTML='<h2 style="margin-bottom:16px;font-size:1.1rem">Settings</h2>'+
    '<label>Hard Mode <button class="toggle'+(hardMode?' on':'')+'" id="toggleHard"></button></label>'+
    '<label>Daily Mode <button class="toggle'+(dailyMode?' on':'')+'" id="toggleDaily"></button></label>'+
    '<label>Starter Word <button class="toggle'+(starterMode?' on':'')+'" id="toggleStarter"></button></label>'+
    (starterMode?'<div style="font-size:0.7rem;color:var(--dim);padding:8px 0">Starter: '+STARTERS[starterIdx%STARTERS.length].code+' ('+STARTERS[starterIdx%STARTERS.length].name+')<br><button style="margin-top:4px;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg2);color:var(--text);cursor:pointer;font-size:0.7rem" id="cycleStarter">Change Starter</button></div>':'')+
    '<div style="font-size:0.6rem;color:var(--dim);margin-top:12px">'+ALL_WORDS.length+' words · Jackson approved \u{1F431}</div>'+
    '<br><button class="share-btn" style="background:var(--gray);width:100%" onclick="document.getElementById(\'settings-panel\').classList.remove(\'show\')">Close</button>';

  var th=document.getElementById('toggleHard');
  if(th)th.addEventListener('click',function(){
    if(row>0&&!hardMode){showToast('Hard mode: start a new game first');return;}
    hardMode=!hardMode;settings.hard=hardMode;localStorage.setItem('wrefle3settings',JSON.stringify(settings));renderSettings();
  });
  var td=document.getElementById('toggleDaily');
  if(td)td.addEventListener('click',function(){
    dailyMode=!dailyMode;settings.daily=dailyMode;localStorage.setItem('wrefle3settings',JSON.stringify(settings));
    showToast('Reload to apply');renderSettings();
  });
  var ts=document.getElementById('toggleStarter');
  if(ts)ts.addEventListener('click',function(){
    starterMode=!starterMode;settings.starter=starterMode;localStorage.setItem('wrefle3settings',JSON.stringify(settings));
    showToast('Reload to apply');renderSettings();
  });
  var cs=document.getElementById('cycleStarter');
  if(cs)cs.addEventListener('click',function(){
    starterIdx=(starterIdx+1)%STARTERS.length;settings.starterIdx=starterIdx;localStorage.setItem('wrefle3settings',JSON.stringify(settings));renderSettings();
  });
}

document.getElementById('settingsBtn').addEventListener('click',function(){
  renderSettings();document.getElementById('settings-panel').classList.add('show');
});
document.getElementById('settings-panel').addEventListener('click',function(e){
  if(e.target.id==='settings-panel')e.target.classList.remove('show');
});

document.getElementById('statsBtn').addEventListener('click',showStatsModal);
document.getElementById('modal').addEventListener('click',function(e){if(e.target.id==='modal')e.target.classList.remove('show');});

// ── Init
setTheme(localStorage.getItem('wrefle3theme')||'dark');
var loaded=loadGame();
renderBoard();renderKeyboard();
if(!loaded&&starterMode){applyStarter();}
})();
</script>
</body>
</html>
