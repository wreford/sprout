<title>Donny's Hockey Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a0a0e;--surface:#120608;--accent:#CF0A2C;--green:#4ade80;--gold:#FFD100;--blue:#1a0a0e;--text:#ffffff;--orange:#FFD100;--red:#CF0A2C}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;height:100vh;overflow:hidden;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);opacity:0.5}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(255,255,255,0.7);font-size:13px;margin-top:4px}
.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(255,255,255,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(232,232,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:var(--orange);color:#000}
.badge-4{background:var(--red);color:#fff}
.category{font-size:13px;color:rgba(232,232,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,0.2);border-color:#ef4444;color:#ef4444}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(255,209,0,0.3)}50%{text-shadow:0 0 12px rgba(255,209,0,0.7)}100%{text-shadow:0 0 4px rgba(255,209,0,0.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{0%{transform:scale(1);color:#fff}50%{transform:scale(1.3);color:var(--accent)}100%{transform:scale(1);color:#fff}}
.opt-btn{animation:cardIn 0.3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:0.07s}
.opt-btn:nth-child(3){animation-delay:0.14s}
.opt-btn:nth-child(4){animation-delay:0.21s}
.opt-btn.correct{animation:correctPop 0.35s ease}
.opt-btn.wrong{animation:wrongShake 0.4s ease}
.streak-fire{animation:streakFire 1.5s ease-in-out infinite}
.score-pop{animation:scoreUp 0.4s ease}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(232,232,240,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(232,232,240,0.7)}
.start-btn{width:100%;min-height:48px;padding:12px;margin-top:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.resume-btn{background:var(--gold);color:#000;margin-top:10px}
.start-btn:hover,.resume-btn:hover{opacity:0.9}
.hidden{display:none!important}
@keyframes fireBorder{0%{border-color:#FFD100;box-shadow:0 0 8px rgba(255,209,0,0.4)}50%{border-color:#ffee66;box-shadow:0 0 18px rgba(255,238,102,0.6)}100%{border-color:#FFD100;box-shadow:0 0 8px rgba(255,209,0,0.4)}}
@keyframes orangePulse{0%{background:var(--bg)}50%{background:#8a0018}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}
body.streak-pulse{animation:orangePulse 3s ease-in-out infinite}
body.streak-shake{animation:screenShake 0.4s ease}
.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:18px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
.fact-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(232,232,240,0.85);line-height:1.5}
.fact-card .fact-emoji{font-size:22px;flex-shrink:0;line-height:1.3}
.sound-toggle{background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:18px;cursor:pointer;padding:2px 7px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}
.start-hero{font-size:56px;line-height:1;margin-bottom:8px}
.start-high-score{font-size:22px;color:var(--green);font-weight:700;margin:8px 0}
.start-last-score{font-size:14px;color:rgba(232,232,240,0.5);margin-bottom:4px}
.start-badge-300{display:inline-block;background:var(--accent);color:#000;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0}
.accuracy-bar-wrap{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin:6px 0 4px}
.accuracy-bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.grade-badge{display:inline-block;font-size:36px;font-weight:900;padding:6px 20px;border-radius:12px;margin:10px 0}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(255,209,0,0.1)}
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
</style>
</head>

<script>
const Q=[
// ===== EASY (d:1) — Questions 1-75 =====
{q:"Who is the N.H.L.'s all-time leading scorer with 2,857 career points?",o:["Mario Lemieux","Gordie Howe","Wayne Gretzky","Mark Messier"],a:2,d:1,cat:"scoring",fact:"Gretzky's point total is so far ahead that he'd still be the all-time leader even if he never scored a single goal."},
{q:"What team did Bobby Hull play for when he became the 'Golden Jet'?",o:["Detroit Red Wings","Montreal Canadiens","Chicago Blackhawks","Toronto Maple Leafs"],a:2,d:1,cat:"players",fact:"Hull's slap shot was clocked at over 100 mph, terrifying goalies who played without masks."},
{q:"How many Stanley Cup championships did the Chicago Blackhawks win between 2010 and 2015?",o:["1","2","3","4"],a:2,d:1,cat:"stanley cup",fact:"The Blackhawks won the Cup in 2010, 2013, and 2015, establishing a modern dynasty."},
{q:"What is the name of the trophy awarded to the N.H.L. playoff champion?",o:["The Presidents' Trophy","The Hart Trophy","The Stanley Cup","The Conn Smythe Trophy"],a:2,d:1,cat:"stanley cup",fact:"The Stanley Cup is the oldest professional sports trophy in North America, first awarded in 1893."},
{q:"Who captained the Chicago Blackhawks during their 2010, 2013, and 2015 Cup wins?",o:["Patrick Kane","Duncan Keith","Marian Hossa","Jonathan Toews"],a:3,d:1,cat:"players",fact:"Toews was nicknamed 'Captain Serious' for his intense focus and leadership on the ice."},
{q:"What position did Patrick Roy play?",o:["Center","Defenseman","Goaltender","Right Wing"],a:2,d:1,cat:"goaltending",fact:"Roy revolutionized goaltending with the butterfly style and won four Stanley Cups."},
{q:"Who scored the 'Golden Goal' for the U.S. in the 1980 Miracle on Ice?",o:["Mike Eruzione","Jim Craig","Mark Johnson","Buzz Schneider"],a:0,d:1,cat:"players",fact:"Eruzione's goal gave the U.S. a 4-3 lead over the Soviet Union in one of the greatest upsets in sports history."},
{q:"What N.H.L. team plays its home games at the United Center in Chicago?",o:["Chicago Bulls","Chicago Bears","Chicago Blackhawks","Chicago Fire"],a:2,d:1,cat:"teams",fact:"The United Center opened in 1995, replacing the legendary Chicago Stadium known as the loudest building in the N.H.L."},
{q:"Who holds the N.H.L. record for most goals in a single season with 92?",o:["Mario Lemieux","Brett Hull","Wayne Gretzky","Phil Esposito"],a:2,d:1,cat:"records",fact:"Gretzky scored 92 goals in the 1981-82 season with the Edmonton Oilers, a record that may never be broken."},
{q:"What is a 'hat trick' in hockey?",o:["Three assists in a game","Three penalties in a game","Three goals scored by one player in a game","Three saves in a row"],a:2,d:1,cat:"scoring",fact:"Fans traditionally throw hats on the ice when a player scores a hat trick."},
{q:"Which Original Six team is based in Detroit?",o:["Bruins","Rangers","Red Wings","Maple Leafs"],a:2,d:1,cat:"teams",fact:"The Red Wings are nicknamed the 'Winged Wheel' and have won 11 Stanley Cups."},
{q:"Who was known as 'Mr. Hockey'?",o:["Bobby Orr","Wayne Gretzky","Gordie Howe","Maurice Richard"],a:2,d:1,cat:"players",fact:"Howe played professional hockey across five decades, from the 1940s through the 1980s."},
{q:"What Chicago Blackhawks winger won the Conn Smythe Trophy in 2010?",o:["Marian Hossa","Patrick Sharp","Jonathan Toews","Patrick Kane"],a:3,d:1,cat:"stanley cup",fact:"Kane's overtime goal in Game 6 against Philadelphia clinched the Blackhawks' first Cup in 49 years."},
{q:"What does 'power play' mean in hockey?",o:["A fast break","A team has more players on ice due to an opponent's penalty","A type of shot","An overtime period"],a:1,d:1,cat:"records",fact:"N.H.L. teams typically convert on about 20% of their power play opportunities."},
{q:"Who was the Chicago Blackhawks goaltender famous for popularizing the mask in the late 1960s and 1970s?",o:["Glenn Hall","Ed Belfour","Tony Esposito","Dominik Hasek"],a:2,d:1,cat:"goaltending",fact:"Tony Esposito's butterfly style and acrobatic saves made him a fan favorite at Chicago Stadium for 15 seasons."},
{q:"What is 'icing' in hockey?",o:["Putting ice on an injury","Shooting the puck from behind center ice past the opposing goal line","A celebration after scoring","A type of penalty"],a:1,d:1,cat:"records",fact:"Icing results in a faceoff in the offending team's defensive zone."},
{q:"Which team did Wayne Gretzky play for first in the N.H.L.?",o:["Los Angeles Kings","New York Rangers","Edmonton Oilers","St. Louis Blues"],a:2,d:1,cat:"players",fact:"Gretzky won four Stanley Cups with the Oilers before his shocking trade to the Kings in 1988."},
{q:"What is the name of the award given to the N.H.L.'s most valuable player during the regular season?",o:["The Conn Smythe Trophy","The Norris Trophy","The Hart Memorial Trophy","The Vezina Trophy"],a:2,d:1,cat:"records",fact:"Wayne Gretzky won the Hart Trophy a record nine times."},
{q:"Who scored 50 goals in 50 games for the Canadiens in 1944-45?",o:["Gordie Howe","Jean Beliveau","Bobby Hull","Maurice Richard"],a:3,d:1,cat:"records",fact:"Richard was the first player to score 50 goals in a season, earning him the nickname 'The Rocket.'"},
{q:"What Chicago Blackhawk legend wore number 21 and was famous for his spin-o-rama move?",o:["Bobby Hull","Stan Mikita","Denis Savard","Jeremy Roenick"],a:2,d:1,cat:"players",fact:"Savard's signature spin move made him one of the most exciting players of the 1980s."},
{q:"How many periods are in a regulation N.H.L. game?",o:["2","3","4","5"],a:1,d:1,cat:"records",fact:"Each period is 20 minutes of playing time, for a total of 60 minutes."},
{q:"What defensive legend wore number 4 for the Boston Bruins?",o:["Ray Bourque","Phil Esposito","Bobby Orr","Cam Neely"],a:2,d:1,cat:"players",fact:"Orr revolutionized the defenseman position by becoming a dominant offensive threat."},
{q:"Who was the first European-trained player to be drafted first overall in the N.H.L.?",o:["Peter Forsberg","Mats Sundin","Alexander Ovechkin","Borje Salming"],a:1,d:1,cat:"players",fact:"Mats Sundin was selected first overall by the Quebec Nordiques in the 1989 draft."},
{q:"What trophy is awarded to the best defenseman in the N.H.L.?",o:["The Hart Trophy","The Norris Trophy","The Selke Trophy","The Calder Trophy"],a:1,d:1,cat:"records",fact:"Bobby Orr won the Norris Trophy eight consecutive times from 1968 to 1975."},
{q:"Which Blackhawks defenseman won the Norris Trophy in 2010 and 2014?",o:["Brent Seabrook","Niklas Hjalmarsson","Duncan Keith","Brian Campbell"],a:2,d:1,cat:"players",fact:"Keith logged enormous minutes during the Blackhawks' Cup runs and was known for his elite skating."},
{q:"What is the 'crease' in hockey?",o:["The area behind the net","The blue-painted area in front of the goal","The center ice circle","The penalty box"],a:1,d:1,cat:"records",fact:"Goaltenders are protected from contact while they are in the crease."},
{q:"Who was nicknamed 'The Great One'?",o:["Mario Lemieux","Bobby Orr","Wayne Gretzky","Gordie Howe"],a:2,d:1,cat:"players",fact:"Gretzky held or shared 61 N.H.L. records when he retired in 1999."},
{q:"What year did the N.H.L. expand from six to twelve teams?",o:["1965","1967","1970","1972"],a:1,d:1,cat:"teams",fact:"The 1967 expansion doubled the league and brought hockey to cities like Philadelphia, St. Louis, and Los Angeles."},
{q:"What is a 'Zamboni'?",o:["A type of hockey stick","An ice resurfacing machine","A defensive formation","A type of goal"],a:1,d:1,cat:"records",fact:"The Zamboni was invented by Frank Zamboni in 1949 and is now used in ice rinks worldwide."},
{q:"Who did the Blackhawks defeat to win the 2010 Stanley Cup?",o:["Boston Bruins","Tampa Bay Lightning","Philadelphia Flyers","Detroit Red Wings"],a:2,d:1,cat:"stanley cup",fact:"It was Chicago's first Cup since 1961, ending the longest championship drought in franchise history."},
{q:"What is 'offsides' in hockey?",o:["When a player is behind the net","When an attacking player enters the offensive zone before the puck","When a goalie leaves the crease","When a player shoots from center ice"],a:1,d:1,cat:"records",fact:"The offside rule prevents players from cherry-picking near the opponent's goal."},
{q:"Who was the first goaltender to wear a mask in an N.H.L. game?",o:["Terry Sawchuk","Tony Esposito","Jacques Plante","Patrick Roy"],a:2,d:1,cat:"goaltending",fact:"Plante first wore his mask on November 1, 1959, after being hit in the face by a shot."},
{q:"What is the name of the line that divides the ice in half?",o:["The blue line","The red line","The goal line","The hash line"],a:1,d:1,cat:"records",fact:"The center red line was introduced in 1943 to speed up the game by allowing longer passes."},
{q:"Which team did Sidney Crosby lead to three Stanley Cup championships?",o:["Philadelphia Flyers","New York Rangers","Pittsburgh Penguins","Washington Capitals"],a:2,d:1,cat:"stanley cup",fact:"Crosby won the Cup in 2009, 2016, and 2017, cementing his legacy as one of the greatest."},
{q:"What Blackhawks arena was known as the loudest building in the N.H.L.?",o:["United Center","Wrigley Field","Chicago Stadium","Soldier Field"],a:2,d:1,cat:"teams",fact:"Chicago Stadium's Barton organ and passionate fans created a deafening atmosphere that intimidated visiting teams."},
{q:"Who holds the record for most career shutouts in N.H.L. history?",o:["Terry Sawchuk","Patrick Roy","Martin Brodeur","Dominik Hasek"],a:2,d:1,cat:"goaltending",fact:"Brodeur recorded 125 career shutouts during his legendary career with the New Jersey Devils."},
{q:"What is a 'slap shot'?",o:["A quick wrist flick","A shot where the player winds up and strikes the puck with full force","A backhand shot","A shot from behind the goal"],a:1,d:1,cat:"scoring",fact:"Bobby Hull's slap shot was feared as one of the hardest in hockey history."},
{q:"Which Blackhawks player wore number 7 and was known for his physical play and leadership in the 1970s?",o:["Stan Mikita","Keith Magnuson","Bobby Hull","Pit Martin"],a:1,d:1,cat:"players",fact:"Magnuson was beloved in Chicago for his toughness and willingness to fight anyone, despite not being the biggest player."},
{q:"How many teams were in the Original Six era of the N.H.L.?",o:["4","6","8","10"],a:1,d:1,cat:"teams",fact:"The Original Six — Montreal, Toronto, Boston, New York, Chicago, and Detroit — played from 1942 to 1967."},
{q:"Who won the Calder Trophy as the N.H.L.'s best rookie in 2007?",o:["Sidney Crosby","Alexander Ovechkin","Evgeni Malkin","Patrick Kane"],a:3,d:1,cat:"players",fact:"Kane scored 72 points in his rookie year and went on to become one of the greatest American-born players."},
{q:"What is a 'penalty shot' in hockey?",o:["A free throw","A one-on-one attempt against the goalie after a foul on a breakaway","A shot from the blue line","A shot taken by the captain"],a:1,d:1,cat:"records",fact:"Penalty shots are among the most exciting plays in hockey, with the shooter skating in alone on the goalie."},
{q:"Who was the Chicago Blackhawks' owner whose penny-pinching era was called the 'Dark Ages'?",o:["Rocky Wirtz","Arthur Wirtz","Bill Wirtz","James Norris"],a:2,d:1,cat:"teams",fact:"Bill 'Dollar Bill' Wirtz refused to televise home games, contributing to a dramatic decline in fan interest."},
{q:"What year did the N.H.L. introduce the shootout to decide regular-season games?",o:["2000","2003","2005","2008"],a:2,d:1,cat:"records",fact:"The shootout was introduced after the 2004-05 lockout to eliminate ties in the regular season."},
{q:"Which player scored the most goals in N.H.L. history before Wayne Gretzky?",o:["Bobby Hull","Phil Esposito","Gordie Howe","Mike Bossy"],a:2,d:1,cat:"records",fact:"Howe held the career goals record with 801 until Gretzky surpassed him in 1994."},
{q:"What team joined the N.H.L. in 2017 and reached the Stanley Cup Final in their first season?",o:["Seattle Kraken","Arizona Coyotes","Vegas Golden Knights","Florida Panthers"],a:2,d:1,cat:"teams",fact:"The Golden Knights' run to the Final was one of the most remarkable expansion seasons in sports history."},
{q:"Who did the Blackhawks defeat to win the 2013 Stanley Cup?",o:["Los Angeles Kings","Boston Bruins","Detroit Red Wings","Tampa Bay Lightning"],a:1,d:1,cat:"stanley cup",fact:"The Blackhawks won in dramatic fashion, scoring two goals in 17 seconds in Game 6 to clinch the Cup."},

var _crowdTimer=null;
function playCrowdAmbient(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopCrowdAmbient();
function loop(){
try{
var dur=2+Math.random()*2;
var bs=Math.floor(actx.sampleRate*dur);var buf=actx.createBuffer(1,bs,actx.sampleRate);
var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
var src=actx.createBufferSource();src.buffer=buf;
var bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800+Math.random()*400;bp.Q.value=0.5;
var lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1200;
var g=actx.createGain();g.gain.setValueAtTime(0.006,actx.currentTime);
g.gain.linearRampToValueAtTime(0.01,actx.currentTime+dur*0.3);
g.gain.linearRampToValueAtTime(0.005,actx.currentTime+dur);
src.connect(bp);bp.connect(lp);lp.connect(g);g.connect(actx.destination);
src.start();src.stop(actx.currentTime+dur);
}catch(e){}
_crowdTimer=setTimeout(loop,dur*800);
}
_crowdTimer=setTimeout(loop,500);
}
function stopCrowdAmbient(){if(_crowdTimer){clearTimeout(_crowdTimer);_crowdTimer=null;}}

// Hockey announcer TTS
var announceOn=true;
function getVoices(){return speechSynthesis.getVoices();}
function findVoice(names){
// Search for voice by name keywords
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].lang.startsWith('en')&&voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];
  }
}
for(var vi2=0;vi2<voices.length;vi2++){
  if(voices[vi2].lang.startsWith('en')&&!voices[vi2].name.toLowerCase().match(/samantha|victoria|karen|tessa|moira|fiona|kate|zoe|siri.*female/))return voices[vi2];
}
return null;
}

if(v)u.voice=v;
speechSynthesis.speak(u);},80);}catch(e){}
}

[220,330,440].forEach((f,i)=>{
const o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.type='sawtooth';
o.frequency.setValueAtTime(f,t+i*0.12);
g.gain.setValueAtTime(0.02,t+i*0.12);
g.gain.linearRampToValueAtTime(0,t+i*0.12+0.25);
o.start(t+i*0.12);o.stop(t+i*0.12+0.25);
});
}

// Hockey arena music jukebox
var _ballgameTimer=null;var _currentSong=0;
var SONGS=[

];
function playBallgame(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopBallgame();
var s=SONGS[_currentSong%SONGS.length];
var beat=60/s.bpm;var idx=0;var bc=0;
function pn(){
if(idx>=s.n.length){idx=0;bc=0;_currentSong++;s=SONGS[_currentSong%SONGS.length];beat=60/s.bpm;}
try{
if(s.n[idx]>0){
var o=actx.createOscillator(),g=actx.createGain();o.type=s.w;o.frequency.value=s.n[idx];
g.gain.setValueAtTime(0.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.8);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+s.d[idx]*beat*0.8);
var ob=actx.createOscillator(),gb=actx.createGain();ob.type='triangle';ob.frequency.value=s.n[idx]*0.5;
gb.gain.setValueAtTime(0.018,actx.currentTime);gb.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.9);
ob.connect(gb);gb.connect(actx.destination);ob.start();ob.stop(actx.currentTime+s.d[idx]*beat*0.9);
}
if(bc%4===1||bc%4===3){
var bs2=Math.floor(actx.sampleRate*0.06);var buf=actx.createBuffer(1,bs2,actx.sampleRate);var dd=buf.getChannelData(0);
for(var i=0;i<bs2;i++)dd[i]=(Math.random()*2-1)*0.4;
var src=actx.createBufferSource();src.buffer=buf;var gn=actx.createGain();
gn.gain.setValueAtTime(0.02,actx.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.06);
src.connect(gn);gn.connect(actx.destination);src.start();src.stop(actx.currentTime+0.06);
}
}catch(e){}
bc++;_ballgameTimer=setTimeout(pn,s.d[idx]*beat*1000);idx++;}
_ballgameTimer=setTimeout(pn,300);
}
function stopBallgame(){if(_ballgameTimer){clearTimeout(_ballgameTimer);_ballgameTimer=null;}}

function getDiffForQ(i){
if(gameDifficulty>=1&&gameDifficulty<=4)return gameDifficulty;
if(gameDifficulty===5)return 4;
if(i<50)return 1;if(i<100)return 2;if(i<150)return 3;return 4;
}

function showBanner(text,color,announcerText){
const b=document.createElement("div");
b.className="difficulty-banner";
b.style.background=color;
b.style.color="#fff";
b.style.animation="bannerSlide35 3.5s ease forwards";
b.textContent=text;
document.body.appendChild(b);
const flash=document.createElement("div");
flash.className="diff-flash";
flash.style.background=color;
document.body.appendChild(flash);
setTimeout(()=>flash.remove(),900);
setTimeout(()=>b.remove(),3600);
if(announcerText)announce(announcerText);
}

function renderStart(){
const saved=loadState();
let resumeHTML="";
if(saved&&saved.qi>0&&saved.qi<activeQ.length&&saved.started){
resumeHTML=`<button class="start-btn resume-btn" id="resume-btn">Resume (Q${saved.qi+1}/${activeQ.length}, Score: ${saved.score})</button>`;
}
const hs=saved&&saved.highScore?saved.highScore:0;
const lastScore=(saved&&saved.started&&saved.qi>0)?saved.score:null;
app.innerHTML=`
<div class="start-screen">
<div class="start-hero">\u{1F3D2}</div>
${hs>0?`<div class="start-high-score">\u{1F3C6} High Score: ${hs}</div>`:''}
${lastScore!==null?`<div class="start-last-score">Last game: ${lastScore} pts (Q${saved.qi}/${activeQ.length})</div>`:''}
<div class="start-badge-300">\u{1F3DF}\u{FE0F} 300 Questions</div>
<p>1950&ndash;Present N.H.L. history. Gets progressively harder!</p>
<div class="notice">Points scale with difficulty. Streak bonus after 3 in a row!</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;">
<span class="badge badge-1">Easy +10</span>
<span class="badge badge-2">Medium +20</span>
<span class="badge badge-3">Hard +30</span>
<span class="badge badge-4">Expert +50</span>
</div>
<button class="start-btn" id="start-btn">Start New Game</button>
${resumeHTML}
<p style="margin-top:18px;font-size:14px;color:rgba(232,232,240,0.5)">Also try: <a href="baseball.html">Donny's Baseball Trivia</a></p>
</div>`;
document.getElementById("start-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:saved?saved.highScore||0:0,byDiff:[0,0,0,0,0],started:true};
activeQ=Q.slice();for(var si=activeQ.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=activeQ[si];activeQ[si]=activeQ[sj];activeQ[sj]=st;}
_gameStartTime=Date.now();
saveState();playBallgame();playCrowdAmbient();announce("Drop the puck! Let's see what you've got!");renderQ();
};
const rb=document.getElementById("resume-btn");
if(rb){rb.onclick=()=>{state=saved;state.answered=false;_gameStartTime=Date.now();playBallgame();playCrowdAmbient();renderQ();};}
}

function renderQ(){
if(state.qi>=activeQ.length){renderEnd();return;}
if(state.qi===75)showBanner("Difficulty Up: Medium!","#f7c948","Moving to Medium questions now! Let's step it up!");
if(state.qi===150)showBanner("Difficulty Up: Hard!","#f59e0b","Moving to Hard questions now! Time to separate the fans from the fanatics!");
if(state.qi===225)showBanner("Difficulty Up: Expert!","#ef4444","Moving to Expert questions now! Only true hockey scholars survive this!");

const q=activeQ[state.qi];
const d=q.d;
readQuestion(q.q);
const progPct=Math.round((state.qi/activeQ.length)*100);
const progColors={1:'var(--green)',2:'#f7c948',3:'#f59e0b',4:'var(--red)'};
const progColor=progColors[d]||'var(--accent)';
const streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
document.body.classList.toggle('streak-pulse',state.streak>=5);
app.innerHTML=`
<div class="${streakBarClass}" style="position:relative">
<span>Score: <strong>${state.score}</strong></span>
<span class="streak-fire">${state.streak>=3?"\u{1F525} ":""}Streak: ${state.streak}</span>
<span>Q ${state.qi+1}/${activeQ.length}</span>
<button class="sound-toggle" id="sound-toggle" title="Toggle sound">${_soundMuted?'\u{1F507}':'\u{1F50A}'}</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progPct}%;background:${progColor}"></div></div>
<div class="q-header">
<span class="q-number">Question ${state.qi+1}</span>
<span class="badge ${DIFF_CLASSES[d]}">${DIFF_LABELS[d]}</span>
<span class="category">${q.cat}</span>
</div>
<div class="question-text">${q.q}</div>
<div class="options" id="opts">
${q.o.map((o,i)=>`<button class="opt-btn" data-i="${i}">${o}</button>`).join("")}
</div>
<div id="feedback"></div>`;
document.getElementById('sound-toggle').onclick=function(){_soundMuted=!_soundMuted;this.textContent=_soundMuted?'\u{1F507}':'\u{1F50A}';if(_soundMuted){stopBallgame();stopCrowdAmbient();speechSynthesis.cancel();}else{playBallgame();playCrowdAmbient();}};
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{b.onclick=()=>handleAnswer(parseInt(b.dataset.i));});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
const q=activeQ[state.qi];
const correct=idx===q.a;
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{
b.disabled=true;
const i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
let pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreak();playCrowdRoar();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrect();playCrowdCheer();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrong();playCrowdGroan();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

const fb=document.getElementById("feedback");
fb.innerHTML=`
<div class="feedback ${correct?"correct-fb":"wrong-fb"}">
<h3>${correct?"Correct!"+(state.streak>=3?" \u{1F525} Streak x"+state.streak+"!":""):"Wrong!"}</h3>
${!correct?`<p>The answer was: <strong>${q.o[q.a]}</strong></p>`:""}
${state.streak>=3&&correct?`<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>`:""}
<div class="fact-card"><span class="fact-emoji">\u{1F3D2}</span><span>${q.fact}</span></div>
</div>
<button class="next-btn" id="next-btn" ${_speaking?'disabled style="opacity:0.4"':''}>${state.qi+1>=activeQ.length?"See Results":"Next Question \u{2192}"}</button>`;
var nb=document.getElementById("next-btn");
nb.onclick=()=>{
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopBallgame();stopCrowdAmbient();
const pct=Math.round(state.correct/activeQ.length*100);
const maxScore=75*10+75*20+75*30+75*50;
const totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
const totalMin=Math.floor(totalTimeSec/60);
const totalSec=totalTimeSec%60;
const timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
const avgTimeSec=activeQ.length>0?Math.round(totalTimeSec/activeQ.length*10)/10:0;
let grade='F',gradeColor='var(--red)';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='#f7c948';}
else if(pct>=60){grade='C';gradeColor='#f59e0b';}
const accBarColor=pct>=80?'var(--green)':pct>=60?'#f7c948':'var(--red)';
app.innerHTML=`
<div class="end-screen">
<h2>Game Over!</h2>
<div class="final-score">${state.score}</div>
<p style="color:rgba(232,232,240,0.5)">out of ${maxScore} possible</p>
${state.score>=state.highScore?`<div class="high-label">New High Score!</div>`:`<div class="high-label" style="color:var(--gold)">High Score: ${state.highScore}</div>`}
<div class="grade-badge" style="background:${gradeColor};color:#000">${grade}</div>
<div style="text-align:left;margin:12px 0">
<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>${pct}%</span></div>
<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:${pct}%;background:${accBarColor}"></div></div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="val">${state.correct}</div><div class="lbl">Correct</div></div>
<div class="stat-card"><div class="val">${state.wrong}</div><div class="lbl">Wrong</div></div>
<div class="stat-card"><div class="val">${state.bestStreak}</div><div class="lbl">Best Streak</div></div>
<div class="stat-card"><div class="val">${timeStr}</div><div class="lbl">Total Time</div></div>
<div class="stat-card"><div class="val">${avgTimeSec}s</div><div class="lbl">Avg / Question</div></div>
<div class="stat-card"><div class="val">${grade}</div><div class="lbl">Grade</div></div>
<div class="stat-card"><div class="val">${state.byDiff[1]}/${75}</div><div class="lbl">Easy</div></div>
<div class="stat-card"><div class="val">${state.byDiff[2]}/${75}</div><div class="lbl">Medium</div></div>
<div class="stat-card"><div class="val">${state.byDiff[3]}/${75}</div><div class="lbl">Hard</div></div>
<div class="stat-card"><div class="val">${state.byDiff[4]}/${75}</div><div class="lbl">Expert</div></div>
</div>
<button class="share-btn" id="share-btn">\u{1F4CB} Share Score</button>
<button class="restart-btn" id="restart-btn">Play Again</button>
</div>`;
document.getElementById("share-btn").onclick=function(){
var txt="\u{1F3D2} Donny's Hockey Trivia\\nScore: "+state.score+"/"+maxScore+" ("+pct+"%)\\nGrade: "+grade+"\\nBest Streak: "+state.bestStreak+"\\nTime: "+timeStr+"\\n#HockeyTrivia";
navigator.clipboard.writeText(txt).then(function(){var b=document.getElementById('share-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='\u{1F4CB} Share Score';},2000);}).catch(function(){});
};
document.getElementById("restart-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true};
_gameStartTime=Date.now();
saveState();playBallgame();playCrowdAmbient();renderQ();
};
}

// Init
renderStart();
</script>
