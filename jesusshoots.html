<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Jesus Shoots</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#2d5a27;font-family:-apple-system,BlinkMacSystemFont,sans-serif;touch-action:none;user-select:none}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<a href="index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>
<canvas id="c"></canvas>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// Audio
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function tone(f,d,t,v){
  if(!audioCtx)return;
  try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(Math.min(v||0.02,0.02),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}catch(e){}
}
function sndSwoosh(){tone(400,0.15,'sine',0.015);tone(600,0.1,'sine',0.01);}
function sndSwish(){tone(800,0.12,'sine',0.02);setTimeout(function(){tone(1000,0.1,'sine',0.015);},60);setTimeout(function(){tone(1200,0.08,'sine',0.01);},120);}
function sndRimClang(){tone(220,0.3,'triangle',0.02);tone(440,0.15,'triangle',0.015);}
function sndMissThud(){tone(80,0.2,'sine',0.015);tone(60,0.15,'sine',0.01);}

// British narrator TTS - proven cancel->60ms->speak pattern
var lastSpeech=0;
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastSpeech<8000)return;
    lastSpeech=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var utter=new SpeechSynthesisUtterance(text);
        utter.rate=0.85;utter.pitch=0.8;utter.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var voice=null;
          for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.indexOf('en-GB')===0){voice=voices[i];break;}}
          if(!voice)for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.indexOf('en')===0){voice=voices[i];break;}}
          if(voice)utter.voice=voice;
        }
        speechSynthesis.speak(utter);
      }catch(e){}
    },60);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// Jokes
var JOKES_MAKE=[
  "In. Holy shot.","Swish. The lord shoots.","Nothing but net. And faith.",
  "Basket. Blessed.","From downtown Nazareth.","Three points. Three persons.",
  "Clean. Cleaner than the temple.","Cash. The money changers approve.",
  "Drained. Like the Red Sea.","In. The basket runneth over.",
  "Splash. Like walking on water.","Pure. Immaculate even.",
  "In. The prophecy fulfilled.","Sank it. Like Pharaoh's army.",
  "Money. Thirty pieces of silver worth."
];
var JOKES_MISS=[
  "Brick. Even Peter missed.","Air ball. Thoughts and prayers.",
  "Off. Way off. Galilee off.","Missed. Not every prayer lands.",
  "Wide. Wider than Noah's ark.","Bricked it. The Romans are laughing.",
  "Gone. Like the fig tree.","Missed. The disciples look away.",
  "Off target. Even Moses wandered.","Not even close. Forty years of wandering close."
];
var JOKES_STREAK=[
  "Three in a row. Trinity.","Five! Pentecost of baskets!",
  "Ten! The commandments of shooting!","Seven! A holy number of makes!",
  "Twelve in a row! One for each disciple!"
];
var JOKES_RANDOM=[
  "The recycling bin is Judas.","Wind advisory from heaven.",
  "The paper is scripture.","That bin has been baptized.",
  "The janitor is Moses.","The rim is the narrow gate.",
  "Paper ball. Crumpled like a sinner's plans.",
  "That was a sermon. In ball form.",
  "The congregation watches intently.",
  "Office supplies. Blessed."
];
function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}

// Game state
var STATE="menu";
var ball=null,balls=[],particles=[];
var made=0,attempted=0,streak=0,bestStreak=0,highScore=0;
var wind=0,mode=0,modeNames=["Easy","Medium","Hard"];
var throwPhase=0; // 0=idle, 1=dragging, 2=flying
var dragStartX=0,dragStartY=0,dragStartTime=0;
var jesusX,jesusY,canX,canY,canW,canH;
var frame=0,lastRandomTime=0;
var fanActive=false,fanAngle=0,fanParticles=[];

// Load high score
try{highScore=parseInt(localStorage.getItem('jesusshoots-best'))||0;}catch(e){}

// Trash can dimensions
function setupPositions(){
  var floorY=H*0.82;
  canW=Math.min(W*0.16,80); // bigger can = easier
  canH=canW*1.4;
  canX=W*0.78;
  canY=floorY-canH;
  // Jesus position based on mode
  var distances=[W*0.15, W*0.22, W*0.32];
  jesusX=canX-distances[mode]-canW;
  jesusY=floorY-10;
}

function newWind(){
  wind=(Math.random()-0.5)*0.4; // less wind = more predictable
}

function reset(){
  made=0;attempted=0;streak=0;bestStreak=0;
  mode=0;fanActive=false;
  balls=[];particles=[];ball=null;throwPhase=0;
  setupPositions();
  newWind();
}

// Ball physics
function Ball(x,y,vx,vy){
  this.x=x;this.y=y;this.vx=vx;this.vy=vy;
  this.spin=0;this.rotation=0;
  this.radius=8;
  this.alive=true;
  this.scored=false;
  this.missed=false;
  this.bounceCount=0;
  this.trail=[];
  this.age=0;
}

function throwBall(dx,dy,speed){
  initAudio();
  var bx=jesusX+20,by=jesusY-40;
  var angle=Math.atan2(dy,dx);
  var power=Math.min(speed*0.035,18);
  var vx=Math.cos(angle)*power;
  var vy=Math.sin(angle)*power;
  // Ensure upward and rightward
  if(vy>-2)vy=-2-Math.abs(vy);
  if(vx<1)vx=1;
  var b=new Ball(bx,by,vx,vy);
  b.spin=(Math.random()-0.5)*0.3;
  ball=b;
  balls.push(b);
  throwPhase=2;
  attempted++;
  sndSwoosh();
  // Mode changes every 5 shots
  if(attempted%5===0&&attempted>0){
    mode=(mode+1)%3;
    setupPositions();
  }
  // Fan activates after 5 total shots
  if(attempted>=5)fanActive=true;
  newWind();
}

function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    particles.push({
      x:x,y:y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4-2,
      life:1,decay:0.02+Math.random()*0.02,
      color:color,size:2+Math.random()*3
    });
  }
}

function updateBall(b){
  if(!b.alive)return;
  b.age++;
  // Trail
  b.trail.push({x:b.x,y:b.y,a:1});
  if(b.trail.length>12)b.trail.shift();
  // Gravity
  b.vy+=0.25; // gentler gravity
  // Wind
  b.vx+=wind*0.015;
  // Fan effect
  if(fanActive){
    var fanForce=Math.sin(frame*0.03)*0.03; // gentler fan
    b.vx+=fanForce;
    b.vy+=fanForce*0.15;
  }
  b.x+=b.vx;
  b.y+=b.vy;
  b.rotation+=b.spin;

  var floorY=H*0.82;
  // Check if ball entered the can from top
  var rimLeft=canX-canW/2;
  var rimRight=canX+canW/2;
  var rimTop=canY;
  var rimBottom=canY+canH;

  // Rim collision (left edge)
  if(!b.scored){
    // Left rim
    var ldx=b.x-rimLeft,ldy=b.y-rimTop;
    var ld=Math.sqrt(ldx*ldx+ldy*ldy);
    if(ld<b.radius+4&&b.y<rimTop+15){
      b.vx=Math.abs(b.vx)*0.5;
      b.vy*=-0.4;
      b.x=rimLeft+b.radius+5;
      b.bounceCount++;
      sndRimClang();
      spawnParticles(rimLeft,rimTop,'#ffaa00',4);
    }
    // Right rim
    var rdx=b.x-rimRight,rdy=b.y-rimTop;
    var rd=Math.sqrt(rdx*rdx+rdy*rdy);
    if(rd<b.radius+4&&b.y<rimTop+15){
      b.vx=-Math.abs(b.vx)*0.5;
      b.vy*=-0.4;
      b.x=rimRight-b.radius-5;
      b.bounceCount++;
      sndRimClang();
      spawnParticles(rimRight,rimTop,'#ffaa00',4);
    }
    // Score: ball passes through rim opening going down
    if(b.x>rimLeft+b.radius&&b.x<rimRight-b.radius&&b.y>rimTop&&b.y<rimTop+20&&b.vy>0){
      b.scored=true;
      made++;
      streak++;
      if(streak>bestStreak)bestStreak=streak;
      var pct=attempted>0?Math.round(made/attempted*100):0;
      if(pct>highScore&&attempted>=3){highScore=pct;try{localStorage.setItem('jesusshoots-best',highScore);}catch(e){}}
      sndSwish();
      spawnParticles(b.x,b.y,'#ffd700',12);
      spawnParticles(b.x,b.y,'#ffffff',8);
      // Speak
      if(streak===3||streak===5||streak===7||streak===10||streak===12){
        speak(pickRandom(JOKES_STREAK));
      } else if(Math.random()<0.45){
        speak(pickRandom(JOKES_MAKE));
      }
    }
  }

  // Ball inside can walls (after scoring, keep it contained)
  if(b.scored){
    if(b.x<rimLeft+b.radius){b.x=rimLeft+b.radius;b.vx*=-0.3;}
    if(b.x>rimRight-b.radius){b.x=rimRight-b.radius;b.vx*=-0.3;}
    if(b.y>rimBottom-b.radius){b.y=rimBottom-b.radius;b.vy*=-0.2;b.vx*=0.8;}
  }

  // Floor
  if(b.y>floorY-b.radius&&!b.scored){
    b.y=floorY-b.radius;
    b.vy*=-0.3;
    b.vx*=0.7;
    if(!b.missed&&!b.scored){
      b.missed=true;
      streak=0;
      sndMissThud();
      if(Math.random()<0.4)speak(pickRandom(JOKES_MISS));
    }
    if(Math.abs(b.vy)<0.5){b.alive=false;}
  }

  // Off screen
  if(b.x>W+50||b.x<-50||b.y>H+50){
    if(!b.scored&&!b.missed){streak=0;if(Math.random()<0.4)speak(pickRandom(JOKES_MISS));}
    b.alive=false;
  }
  // Timeout
  if(b.age>300)b.alive=false;
}

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}

// Drawing
function drawFloor(){
  var floorY=H*0.82;
  // Floor
  ctx.fillStyle='#8B7355';
  ctx.fillRect(0,floorY,W,H-floorY);
  // Floor line
  ctx.strokeStyle='#6B5335';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,floorY);ctx.lineTo(W,floorY);ctx.stroke();
}

function drawTrashCan(){
  var rimLeft=canX-canW/2;
  var rimRight=canX+canW/2;
  var rimTop=canY;
  var botW=canW*0.75;
  var botLeft=canX-botW/2;
  var botRight=canX+botW/2;
  var rimBottom=canY+canH;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(canX,rimBottom+5,canW/2+5,6,0,0,Math.PI*2);
  ctx.fill();

  // Can body (trapezoid)
  ctx.fillStyle='#555';
  ctx.beginPath();
  ctx.moveTo(rimLeft,rimTop);
  ctx.lineTo(botLeft,rimBottom);
  ctx.lineTo(botRight,rimBottom);
  ctx.lineTo(rimRight,rimTop);
  ctx.closePath();
  ctx.fill();

  // Can highlight
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.moveTo(rimLeft+3,rimTop);
  ctx.lineTo(botLeft+3,rimBottom);
  ctx.lineTo(canX-botW/4,rimBottom);
  ctx.lineTo(canX-canW/4,rimTop);
  ctx.closePath();
  ctx.fill();

  // Rim
  ctx.strokeStyle='#777';
  ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(rimLeft,rimTop);ctx.lineTo(rimRight,rimTop);ctx.stroke();

  // Rim dots
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.arc(rimLeft,rimTop,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(rimRight,rimTop,4,0,Math.PI*2);ctx.fill();
}

function drawJesus(){
  var size=Math.min(W*0.08,40);
  // Halo
  ctx.save();
  ctx.beginPath();
  ctx.arc(jesusX,jesusY-size*1.6,size*0.55,0,Math.PI*2);
  ctx.fillStyle='rgba(255,215,0,0.25)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,0.5)';
  ctx.lineWidth=2;
  ctx.stroke();
  ctx.restore();
  // Body emoji
  ctx.font=size+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('\u{1F9D4}',jesusX,jesusY-size);
  // Robe
  ctx.fillStyle='#e8d8c8';
  ctx.fillRect(jesusX-size*0.3,jesusY-size*0.4,size*0.6,size*0.8);
  // Arms (if dragging, show throwing motion)
  ctx.strokeStyle='#d4b896';
  ctx.lineWidth=3;
  if(throwPhase===1){
    ctx.beginPath();
    ctx.moveTo(jesusX+size*0.3,jesusY-size*0.3);
    ctx.lineTo(jesusX+size*0.6,jesusY-size*0.8);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(jesusX+size*0.3,jesusY-size*0.2);
    ctx.lineTo(jesusX+size*0.5,jesusY);
    ctx.stroke();
  }
}

function drawBall(b){
  if(!b.alive)return;
  // Trail
  for(var i=0;i<b.trail.length;i++){
    var t=b.trail[i];
    var a=i/b.trail.length*0.3;
    ctx.fillStyle='rgba(255,255,255,'+a+')';
    ctx.beginPath();ctx.arc(t.x,t.y,b.radius*0.6,0,Math.PI*2);ctx.fill();
  }
  // Paper ball
  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.rotate(b.rotation);
  // Crumpled paper
  ctx.fillStyle='#f5f5f0';
  ctx.beginPath();ctx.arc(0,0,b.radius,0,Math.PI*2);ctx.fill();
  // Crumple lines
  ctx.strokeStyle='rgba(0,0,0,0.15)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-3,-4);ctx.lineTo(2,3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-5,1);ctx.lineTo(4,-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(1,-5);ctx.lineTo(-1,5);ctx.stroke();
  // Shadow on ball
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.beginPath();ctx.arc(2,2,b.radius*0.7,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawWind(){
  // Wind indicator at top
  var cx=W/2,cy=40;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='12px monospace';
  ctx.textAlign='center';
  ctx.fillText('WIND',cx,cy-12);
  // Arrow
  var arrowLen=wind*60;
  ctx.strokeStyle='rgba(255,255,255,0.8)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(cx-arrowLen,cy);
  ctx.lineTo(cx+arrowLen,cy);
  ctx.stroke();
  // Arrow head
  if(Math.abs(wind)>0.05){
    var dir=wind>0?1:-1;
    ctx.beginPath();
    ctx.moveTo(cx+arrowLen,cy);
    ctx.lineTo(cx+arrowLen-8*dir,cy-5);
    ctx.lineTo(cx+arrowLen-8*dir,cy+5);
    ctx.closePath();
    ctx.fill();
  }
}

function drawFan(){
  if(!fanActive)return;
  fanAngle+=0.15;
  var fx=W*0.5,fy=H*0.82-30;
  // Fan base
  ctx.fillStyle='#666';
  ctx.fillRect(fx-8,fy,16,30);
  // Fan blades
  ctx.save();
  ctx.translate(fx,fy);
  ctx.rotate(fanAngle);
  ctx.fillStyle='rgba(200,200,200,0.7)';
  for(var i=0;i<3;i++){
    ctx.save();
    ctx.rotate(i*Math.PI*2/3);
    ctx.beginPath();
    ctx.ellipse(0,-12,4,12,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function drawHUD(){
  var pct=attempted>0?Math.round(made/attempted*100):0;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,70);

  ctx.fillStyle='#fff';
  ctx.font='bold 16px monospace';
  ctx.textAlign='left';
  ctx.fillText(made+'/'+attempted+(attempted>0?' ('+pct+'%)':''),15,25);

  ctx.font='12px monospace';
  ctx.fillStyle='#ffd700';
  ctx.fillText('Streak: '+streak+(bestStreak>0?' Best: '+bestStreak:''),15,45);

  ctx.textAlign='right';
  ctx.fillStyle='#aaa';
  ctx.font='12px monospace';
  ctx.fillText('Mode: '+modeNames[mode],W-15,25);
  ctx.fillText('High: '+highScore+'%',W-15,45);

  if(fanActive){
    ctx.textAlign='center';
    ctx.fillStyle='#88ccff';
    ctx.font='10px monospace';
    ctx.fillText('FAN ACTIVE',W/2,62);
  }
}

function drawMenu(){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#fff';
  ctx.font='bold '+Math.min(W*0.08,36)+'px sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Jesus Shoots',W/2,H*0.3);

  ctx.font=Math.min(W*0.045,20)+'px serif';
  ctx.fillStyle='#ffd700';
  ctx.fillText('Paper Ball Toss',W/2,H*0.37);

  ctx.font='40px serif';
  ctx.fillText('\u{1F9D4}\u{1F4DC}\u{1F5D1}',W/2,H*0.5);

  ctx.font='16px sans-serif';
  ctx.fillStyle='#aaa';
  ctx.fillText('Swipe up to throw',W/2,H*0.62);
  ctx.fillText('Power = swipe length & speed',W/2,H*0.67);

  ctx.fillStyle='#4ade80';
  ctx.font='bold 20px sans-serif';
  ctx.fillText('TAP TO PLAY',W/2,H*0.78);

  if(highScore>0){
    ctx.fillStyle='#ffd700';
    ctx.font='14px monospace';
    ctx.fillText('Best: '+highScore+'%',W/2,H*0.85);
  }
}

// Input
var touchId=null;
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();setupPositions();setTimeout(function(){speak("Paper ball. Let there be recycling.");},500);return;}
  if(throwPhase===2){
    // Check if ball is done
    if(!ball||!ball.alive)throwPhase=0;
  }
  if(throwPhase!==0)return;
  var t=e.touches[0];
  dragStartX=t.clientX;
  dragStartY=t.clientY;
  dragStartTime=Date.now();
  throwPhase=1;
  touchId=t.identifier;
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  if(throwPhase===1){
    var t=e.changedTouches[0];
    var dx=t.clientX-dragStartX;
    var dy=t.clientY-dragStartY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var dt=Date.now()-dragStartTime;
    var speed=dist/(dt||1)*1000;
    if(dist>20&&dy<-10){
      // Aim toward the can
      var aimDx=canX-jesusX;
      var aimDy=(canY-20)-jesusY;
      throwBall(aimDx,aimDy,speed);
    } else {
      throwPhase=0;
    }
  }
},{passive:false});

// Mouse support
var mouseDown=false;
canvas.addEventListener('mousedown',function(e){
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();setupPositions();setTimeout(function(){speak("Paper ball. Let there be recycling.");},500);return;}
  if(throwPhase===2&&(!ball||!ball.alive))throwPhase=0;
  if(throwPhase!==0)return;
  dragStartX=e.clientX;
  dragStartY=e.clientY;
  dragStartTime=Date.now();
  throwPhase=1;
  mouseDown=true;
});
canvas.addEventListener('mouseup',function(e){
  if(!mouseDown)return;
  mouseDown=false;
  if(throwPhase===1){
    var dx=e.clientX-dragStartX;
    var dy=e.clientY-dragStartY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var dt=Date.now()-dragStartTime;
    var speed=dist/(dt||1)*1000;
    if(dist>20&&dy<-10){
      var aimDx=canX-jesusX;
      var aimDy=(canY-20)-jesusY;
      throwBall(aimDx,aimDy,speed);
    } else {
      throwPhase=0;
    }
  }
});

// Game loop
function update(){
  frame++;
  if(STATE!=="playing")return;

  // Check if current ball is done
  if(ball&&!ball.alive&&throwPhase===2){
    throwPhase=0;
    ball=null;
  }

  // Update balls
  for(var i=0;i<balls.length;i++){
    updateBall(balls[i]);
  }
  // Clean dead balls (keep last few for visual)
  while(balls.length>5&&!balls[0].alive)balls.shift();

  updateParticles();

  // Random narration every ~25 seconds
  if(Date.now()-lastRandomTime>25000&&attempted>0){
    lastRandomTime=Date.now();
    speak(pickRandom(JOKES_RANDOM));
  }
}

function draw(){
  // Background - office/gym
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#4a6741');
  grad.addColorStop(0.5,'#3d5a35');
  grad.addColorStop(1,'#2d4a27');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Back wall
  ctx.fillStyle='#c8b8a0';
  ctx.fillRect(0,0,W,H*0.82);

  // Wall texture lines
  ctx.strokeStyle='rgba(0,0,0,0.05)';
  ctx.lineWidth=1;
  for(var i=0;i<W;i+=60){
    ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H*0.82);ctx.stroke();
  }

  drawFloor();
  drawTrashCan();
  drawFan();
  drawJesus();

  // Draw all balls
  for(var i=0;i<balls.length;i++){
    drawBall(balls[i]);
  }

  drawParticles();
  drawWind();
  drawHUD();

  // Drag indicator
  if(throwPhase===1){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.font='14px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Swipe up!',jesusX,jesusY+30);
  }

  if(STATE==="menu")drawMenu();
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
setupPositions();
gameLoop();
</script>
