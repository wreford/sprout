<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Scaffold Tag Tracker</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:900px;margin:auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:20px;margin:8px 0 12px}
input,select,button{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:14px}
button{background:var(--accent);border:none;cursor:pointer;font-weight:600}button:hover{opacity:.85}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:8px 0}
label{font-size:12px;color:var(--dim);display:block;margin-bottom:2px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;position:relative}
.tag{display:inline-block;padding:4px 10px;border-radius:4px;font-weight:700;font-size:13px;color:#000}
.tag-green{background:var(--green)}.tag-yellow{background:#facc15}.tag-red{background:#ef4444;color:#fff}
.hist{font-size:12px;color:var(--dim);margin-top:6px;max-height:80px;overflow-y:auto}
.badge{position:absolute;top:10px;right:10px;font-size:11px;padding:3px 8px;border-radius:10px;background:var(--border);color:var(--dim)}
.badge.overdue{background:#ef4444;color:#fff}
.stats{display:flex;gap:12px;margin:8px 0;flex-wrap:wrap}.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center}
.stat b{font-size:22px;display:block}
@media print{.no-print{display:none!important}.card{break-inside:avoid;border:2px solid #000;color:#000;background:#fff}}
</style></head><body>
<a class="home" href="index.html">&larr; home</a><h1>Scaffold Tag Tracker</h1>
<div class="stats" id="stats"></div>
<div class="no-print card">
<h3 style="margin-bottom:8px">Add / Edit Scaffold</h3>
<div class="g">
<div><label>Scaffold ID</label><input id="sid" placeholder="SC-001" style="width:100%"></div>
<div><label>Location</label><input id="sloc" placeholder="North elevation" style="width:100%"></div>
<div><label>Type</label><select id="stype" style="width:100%"><option>Frame</option><option>System</option><option>Suspended</option><option>Rolling Tower</option></select></div>
<div><label>Erected By</label><input id="sby" placeholder="Company name" style="width:100%"></div>
<div><label>Last Inspection</label><input id="sinsp" type="date" style="width:100%"></div>
<div><label>Tag Override</label><select id="stag" style="width:100%"><option value="">Auto (by inspection)</option><option value="green">Green — Safe</option><option value="yellow">Yellow — Caution</option><option value="red">Red — Do Not Use</option></select></div>
</div>
<div style="margin-top:8px;display:flex;gap:8px"><button onclick="addScaffold()">Save Scaffold</button><button onclick="printTags()" style="background:var(--green);color:#000">Print Tags</button></div>
</div>
<div id="list"></div>
<p style="font-size:11px;color:var(--dim);margin-top:12px">Per O. Reg. 213/91: scaffolds must be inspected every 7 days by a competent person.</p>
<script>
let scaffolds=JSON.parse(localStorage.getItem('sc_data')||'[]');
function daysSince(d){return Math.floor((Date.now()-new Date(d).getTime())/864e5)}
function getTag(s){if(s.tagOverride)return s.tagOverride;if(!s.lastInsp)return 'red';const d=daysSince(s.lastInsp);return d<=5?'green':d<=7?'yellow':'red'}
function getTagLabel(t){return{green:'SAFE — Green Tag',yellow:'CAUTION — Yellow Tag',red:'DO NOT USE — Red Tag'}[t]}
function addScaffold(){const id=document.getElementById('sid').value.trim();if(!id){alert('Scaffold ID required');return}
const idx=scaffolds.findIndex(s=>s.id===id);const obj={id,loc:document.getElementById('sloc').value.trim(),
type:document.getElementById('stype').value,erectedBy:document.getElementById('sby').value.trim(),
lastInsp:document.getElementById('sinsp').value,tagOverride:document.getElementById('stag').value,history:[]};
if(idx>=0){obj.history=scaffolds[idx].history;if(obj.lastInsp!==scaffolds[idx].lastInsp)obj.history.push({date:obj.lastInsp,action:'Inspected',by:obj.erectedBy});scaffolds[idx]=obj}
else{if(obj.lastInsp)obj.history.push({date:obj.lastInsp,action:'Erected & inspected',by:obj.erectedBy});scaffolds.push(obj)}
save();render();['sid','sloc','sby'].forEach(x=>document.getElementById(x).value='')}
function inspect(i){scaffolds[i].lastInsp=new Date().toISOString().slice(0,10);scaffolds[i].tagOverride='';
scaffolds[i].history.push({date:scaffolds[i].lastInsp,action:'Inspected',by:'Field'});save();render()}
function remove(i){if(confirm('Remove scaffold '+scaffolds[i].id+'?')){scaffolds.splice(i,1);save();render()}}
function save(){localStorage.setItem('sc_data',JSON.stringify(scaffolds))}
function printTags(){window.print()}
function render(){let h='',gn=0,yl=0,rd=0;scaffolds.forEach((s,i)=>{const tag=getTag(s);
if(tag==='green')gn++;else if(tag==='yellow')yl++;else rd++;
const days=s.lastInsp?daysSince(s.lastInsp):'N/A';const overdue=typeof days==='number'&&days>7;
h+=`<div class="card"><span class="tag tag-${tag}">${getTagLabel(tag)}</span>
${overdue?'<span class="badge overdue">OVERDUE '+days+' days</span>':'<span class="badge">'+days+' days ago</span>'}
<h3 style="margin:8px 0 4px">${s.id} — ${s.loc}</h3>
<div style="color:var(--dim);font-size:13px">${s.type} | Erected by: ${s.erectedBy} | Last: ${s.lastInsp||'Never'}</div>
<div class="hist">${s.history.slice(-5).reverse().map(h=>'<div>'+h.date+': '+h.action+' ('+h.by+')</div>').join('')}</div>
<div class="no-print" style="margin-top:6px;display:flex;gap:6px">
<button onclick="inspect(${i})" style="font-size:12px;padding:4px 10px;background:var(--green);color:#000">Re-inspect Now</button>
<button onclick="remove(${i})" style="font-size:12px;padding:4px 10px;background:var(--border)">Remove</button></div></div>`});
document.getElementById('list').innerHTML=h||'<p style="color:var(--dim)">No scaffolds. Add one above.</p>';
document.getElementById('stats').innerHTML=`<div class="stat"><b style="color:var(--green)">${gn}</b>Green</div><div class="stat"><b style="color:#facc15">${yl}</b>Yellow</div><div class="stat"><b style="color:#ef4444">${rd}</b>Red</div><div class="stat"><b>${scaffolds.length}</b>Total</div>`}
render();
</script></body></html>
