<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Project Check-in</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80;--red:#ef4444;--gold:#f7c948;--blue:#60a5fa;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);-webkit-text-size-adjust:100%}
a{color:var(--accent);text-decoration:none}
input,select,textarea,button{font-family:inherit;font-size:16px}
.app{max-width:480px;margin:0 auto;padding:12px 16px 100px}

/* Top Bar */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.home-link{font-size:1rem;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-height:44px;display:flex;align-items:center}
.top-bar h1{font-size:1.15rem;color:var(--accent);flex:1}
.streak-badge{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:.82rem;white-space:nowrap;display:flex;align-items:center;gap:4px}
.streak-num{color:var(--accent);font-weight:700}

/* Project name */
.project-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.project-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.9rem;min-height:44px}
.project-input:focus{outline:none;border-color:var(--accent)}
.checkin-count{color:var(--dim);font-size:.8rem;white-space:nowrap}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--bg2);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:10px 6px;text-align:center;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--dim);transition:all .2s;min-height:44px;display:flex;align-items:center;justify-content:center;border:none;background:none}
.tab.active{background:var(--accent);color:#fff}

/* Alert banner */
.alert-banner{background:rgba(239,68,68,.15);border:1px solid var(--red);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;font-size:.85rem;display:none}
.alert-banner.show{display:block}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h2{font-size:.92rem;color:var(--accent);margin-bottom:12px}
.card h3{font-size:.85rem;color:var(--dim);margin-bottom:8px}

/* Step indicator */
.step-bar{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:0 4px}
.step-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .25s;cursor:pointer}
.step-dot.done{background:var(--green)}
.step-dot.active{background:var(--accent);transform:scale(1.3)}
.step-line{flex:1;height:2px;background:var(--border)}
.step-label{font-size:.78rem;color:var(--dim);text-align:center;margin-bottom:4px}
.step-time{font-size:.72rem;color:var(--dim);text-align:right;margin-bottom:8px}

/* Pulse */
.pulse-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.pulse-label{font-size:.88rem;width:100%;margin-bottom:2px;font-weight:500}
.pulse-faces{display:flex;gap:4px;flex:1}
.pulse-face{width:44px;height:44px;border-radius:10px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:all .15s;background:var(--bg)}
.pulse-face.sel-1{border-color:var(--red);background:rgba(239,68,68,.2)}
.pulse-face.sel-2{border-color:#f97316;background:rgba(249,115,22,.15)}
.pulse-face.sel-3{border-color:var(--gold);background:rgba(247,201,72,.15)}
.pulse-face.sel-4{border-color:#a3e635;background:rgba(163,230,53,.15)}
.pulse-face.sel-5{border-color:var(--green);background:rgba(74,222,128,.2)}

/* Priority inputs */
.priority-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.priority-row input[type=text]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);min-height:44px}
.priority-row input:focus{outline:none;border-color:var(--accent)}
.chip-group{display:flex;gap:4px;flex-shrink:0}
.chip{padding:6px 10px;border-radius:16px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--dim);min-height:32px;display:flex;align-items:center;transition:all .15s}
.chip.low.active{background:rgba(96,165,250,.2);border-color:var(--blue);color:var(--blue)}
.chip.med.active{background:rgba(247,201,72,.2);border-color:var(--gold);color:var(--gold)}
.chip.high.active{background:rgba(249,115,22,.2);border-color:#f97316;color:#f97316}
.chip.critical.active{background:rgba(239,68,68,.2);border-color:var(--red);color:var(--red)}

/* Blocker entry */
.blocker-entry{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.blocker-entry input{flex:1;min-width:150px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);min-height:44px}
.blocker-entry input:focus{outline:none;border-color:var(--accent)}
.blocker-entry select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);min-height:44px}
.blocker-entry select:focus{outline:none;border-color:var(--accent)}
.blocker-list{margin-top:8px}
.blocker-item{display:flex;align-items:center;gap:8px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:.85rem}
.blocker-cat{font-size:.7rem;background:rgba(255,107,53,.15);color:var(--accent);padding:3px 8px;border-radius:10px;white-space:nowrap}
.blocker-remove{background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:4px 8px;margin-left:auto;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.sev-chip{font-size:.7rem;padding:3px 8px;border-radius:10px;white-space:nowrap}
.sev-low{background:rgba(96,165,250,.15);color:var(--blue)}
.sev-med{background:rgba(247,201,72,.15);color:var(--gold)}
.sev-high{background:rgba(239,68,68,.15);color:var(--red)}
.persistent-flag{font-size:.7rem;color:var(--red);margin-left:auto;font-weight:600}

/* Wins */
.win-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);min-height:80px;resize:vertical}
.win-input:focus{outline:none;border-color:var(--accent)}
.milestone-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;min-height:44px}
.milestone-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent);flex-shrink:0}
.milestone-row input[type=text]{flex:1;background:transparent;border:none;color:var(--text);font-size:.88rem}
.milestone-row input[type=text]:focus{outline:none}

/* Numbers */
.num-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.num-field label{display:block;font-size:.78rem;color:var(--dim);margin-bottom:4px}
.num-field input,.num-field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);min-height:44px}
.num-field input:focus,.num-field select:focus{outline:none;border-color:var(--accent)}
.weather-row{display:flex;gap:4px;flex-wrap:wrap}
.weather-btn{width:44px;height:44px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.weather-btn.active{border-color:var(--accent);background:rgba(255,107,53,.15)}
.impact-row{display:flex;gap:6px}
.impact-btn{flex:1;padding:10px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;min-height:44px;transition:all .15s}
.impact-btn.active{border-color:var(--green);color:var(--green);background:rgba(74,222,128,.1)}
.impact-btn.partial.active{border-color:var(--gold);color:var(--gold);background:rgba(247,201,72,.1)}
.impact-btn.none.active{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1)}
.pct-slider{width:100%;accent-color:var(--accent);margin-top:4px}
.pct-val{text-align:center;font-size:1.5rem;font-weight:700;color:var(--accent);margin-top:4px}

/* Notes */
.notes-area{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);min-height:100px;resize:vertical}
.notes-area:focus{outline:none;border-color:var(--accent)}
.mic-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.mic-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--red);background:var(--bg);color:var(--red);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.mic-btn.recording{background:var(--red);color:#fff;animation:micPulse 1s infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
.mic-status{font-size:.78rem;color:var(--dim)}
.photo-area{margin-top:12px}
.photo-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--bg);border:2px dashed var(--border);border-radius:8px;color:var(--dim);font-size:.88rem;cursor:pointer;min-height:50px;transition:border-color .2s}
.photo-btn:hover{border-color:var(--accent)}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);position:relative}
.photo-wrap{position:relative;display:inline-block}
.photo-remove{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Nav buttons */
.nav-buttons{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;padding:14px;border-radius:var(--radius);border:none;font-size:.95rem;font-weight:600;cursor:pointer;min-height:50px;transition:all .15s}
.nav-btn:active{transform:scale(.97)}
.btn-back{background:var(--bg);border:1px solid var(--border)!important;color:var(--text)}
.btn-next{background:var(--accent);color:#fff}
.btn-next:disabled{opacity:.4}
.btn-skip{background:none;border:none;color:var(--dim);font-size:.82rem;cursor:pointer;padding:8px;text-align:center;display:block;width:100%;margin-top:6px}
.btn-submit{background:var(--green);color:#000}

/* Summary */
.summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.summary-card h2{font-size:.95rem;color:var(--accent);margin-bottom:12px}
.pulse-dots{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.pulse-dot-item{display:flex;align-items:center;gap:6px;font-size:.82rem}
.pulse-dot{width:12px;height:12px;border-radius:50%}
.summary-section{margin-bottom:12px}
.summary-section h3{font-size:.82rem;color:var(--dim);margin-bottom:6px}
.summary-section p,.summary-section li{font-size:.85rem;margin-bottom:4px;line-height:1.4}
.summary-section ul{list-style:none;padding:0}
.summary-section li::before{content:'• ';color:var(--accent)}
.summary-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.summary-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;min-height:44px;display:flex;align-items:center;gap:6px;transition:all .15s}
.summary-btn:active{transform:scale(.97)}
.health-score{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.health-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700}
.health-label{font-size:.78rem;color:var(--dim);margin-top:6px}

/* Charts */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chart-card h3{font-size:.88rem;color:var(--accent);margin-bottom:10px}
.chart-card canvas{width:100%;height:200px;display:block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:1.5rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.72rem;color:var(--dim);margin-top:4px}

/* History */
.history-controls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.history-controls input,.history-controls select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);min-height:44px;flex:1;min-width:120px}
.history-controls input:focus,.history-controls select:focus{outline:none;border-color:var(--accent)}
.history-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.history-card:active{transform:scale(.99)}
.history-date{font-size:.82rem;color:var(--accent);font-weight:600}
.history-pulse{display:flex;gap:6px;margin-top:6px}
.history-mini-dot{width:8px;height:8px;border-radius:50%}
.history-details{font-size:.82rem;color:var(--dim);margin-top:6px}
.history-expanded{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.history-expanded.show{display:block}

/* Weekly summary */
.weekly-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.weekly-card h3{font-size:.88rem;color:var(--accent);margin-bottom:10px}
.week-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.week-col h4{font-size:.78rem;color:var(--dim);margin-bottom:8px;text-align:center}
.week-stat{font-size:.82rem;margin-bottom:6px;display:flex;justify-content:space-between}

/* Export */
.export-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.export-btn{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:.82rem;font-weight:600;cursor:pointer;min-height:44px;flex:1;text-align:center}
.export-btn:active{opacity:.8}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Tab panels */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* Reminder banner */
.reminder{background:rgba(255,107,53,.1);border:1px solid var(--accent);border-radius:var(--radius);padding:14px;margin-bottom:12px;font-size:.85rem;display:flex;align-items:center;gap:10px}

/* Start button */
.start-btn{width:100%;padding:18px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;min-height:56px;transition:all .15s}
.start-btn:active{transform:scale(.97)}

/* Animations */
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-30px)}}
.slide-in{animation:slideIn .25s ease}

/* Print */
@media print{
body{background:#fff;color:#000;padding:10px}
.app{max-width:100%;padding:0}
.tabs,.nav-buttons,.btn-skip,.summary-actions,.export-row,.home-link,.top-bar,.step-bar,.step-time,.step-label,.history-controls,.tab-panel:not(.print-active),.start-btn,.reminder,.alert-banner,.mic-btn,.photo-btn{display:none!important}
.summary-card,.card,.chart-card{border-color:#ccc;break-inside:avoid;background:#fff}
.pulse-dot-item,.summary-section p,.summary-section li{color:#000}
h2,h3{color:#333!important}
.health-ring{border:3px solid #333}
}
</style>
</head>
<body>
<div class="app" id="app">
<!-- Top Bar -->
<div class="top-bar">
<a href="index.html" class="home-link">&larr; home</a>
<h1>&#128202; Check-in</h1>
<div class="streak-badge"><span>&#128293;</span> <span class="streak-num" id="streakNum">0</span> <span>day streak</span></div>
</div>

<!-- Project Name -->
<div class="project-row">
<input type="text" class="project-input" id="projectName" placeholder="Project name..." oninput="saveProject()">
<span class="checkin-count" id="checkinCount">0 check-ins</span>
</div>

<!-- Alert Banner -->
<div class="alert-banner" id="alertBanner"></div>

<!-- Tabs -->
<div class="tabs">
<button class="tab active" onclick="switchTab('today')" id="tabToday">Today</button>
<button class="tab" onclick="switchTab('trends')" id="tabTrends">Trends</button>
<button class="tab" onclick="switchTab('history')" id="tabHistory">History</button>
</div>

<!-- TODAY TAB -->
<div class="tab-panel active" id="panelToday"></div>

<!-- TRENDS TAB -->
<div class="tab-panel" id="panelTrends"></div>

<!-- HISTORY TAB -->
<div class="tab-panel" id="panelHistory"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden file input for photos -->
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" multiple onchange="handlePhotos(event)">

<script>
// ===== CONSTANTS =====
const STORE_KEY = 'checkin-data';
const PROJECT_KEY = 'checkin-project';
const DRAFT_KEY = 'checkin-draft';
const PULSE_LABELS = ['Schedule','Budget','Quality','Safety','Team Morale','Client Satisfaction'];
const PULSE_KEYS = ['schedule','budget','quality','safety','morale','client'];
const PULSE_FACES = ['\u{1F62B}','\u{1F61F}','\u{1F610}','\u{1F642}','\u{1F604}'];
const BLOCKER_CATS = ['Materials','Equipment','Labour','Weather','Permits','Design','Subcontractor','Client','Inspection','Other'];
const WEATHER_OPTIONS = ['☀️','⛅','☁️','\u{1F327}️','❄️','\u{1F32B}️'];
const STEP_NAMES = ['Pulse','Priorities','Blockers','Wins','Numbers','Notes'];
const STEP_TIMES = ['~2 min left','~1.5 min left','~1 min left','~45 sec left','~30 sec left','Almost done!'];

// ===== STATE =====
let allData = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
let draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || 'null');
let currentStep = 0;
let isRecording = false;
let recognition = null;
let currentTab = 'today';

// ===== INIT =====
function init() {
  document.getElementById('projectName').value = localStorage.getItem(PROJECT_KEY) || '';
  updateStreak();
  updateCheckinCount();
  checkAlerts();
  renderToday();
}

function saveProject() {
  localStorage.setItem(PROJECT_KEY, document.getElementById('projectName').value);
}

function todayKey() { return new Date().toISOString().slice(0, 10); }

function saveDraft(d) { draft = d; localStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }
function clearDraft() { draft = null; localStorage.removeItem(DRAFT_KEY); }

function saveAll() { localStorage.setItem(STORE_KEY, JSON.stringify(allData)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== TABS =====
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  if (tab === 'today') renderToday();
  else if (tab === 'trends') renderTrends();
  else if (tab === 'history') renderHistory();
}

// ===== STREAK =====
function updateStreak() {
  let count = 0;
  let d = new Date();
  const tk = todayKey();
  if (!allData[tk]) d.setDate(d.getDate() - 1);
  while (true) {
    const k = d.toISOString().slice(0, 10);
    if (allData[k]) { count++; d.setDate(d.getDate() - 1); }
    else break;
  }
  document.getElementById('streakNum').textContent = count;
}

function updateCheckinCount() {
  const n = Object.keys(allData).length;
  document.getElementById('checkinCount').textContent = n + ' check-in' + (n !== 1 ? 's' : '');
}

// ===== ALERTS =====
function checkAlerts() {
  const banner = document.getElementById('alertBanner');
  const alerts = [];
  const tk = todayKey();
  const keys = Object.keys(allData).sort();
  if (keys.length >= 2) {
    const prev = allData[keys[keys.length - 1]];
    const prev2 = keys.length >= 2 ? allData[keys[keys.length - (allData[tk] ? 2 : 1)]] : null;
    if (prev && prev2 && prev.pulse && prev2.pulse) {
      PULSE_KEYS.forEach((k, i) => {
        const diff = (prev2.pulse[k] || 3) - (prev.pulse[k] || 3);
        if (diff >= 2) alerts.push('⚠️ ' + PULSE_LABELS[i] + ' declined by ' + diff + ' points');
      });
    }
    // Persistent blockers
    const blockerCount = {};
    const recent = keys.slice(-7);
    recent.forEach(dk => {
      const entry = allData[dk];
      if (entry && entry.blockers) {
        entry.blockers.forEach(b => {
          const key = (b.text || '').toLowerCase().trim();
          if (key) blockerCount[key] = (blockerCount[key] || 0) + 1;
        });
      }
    });
    Object.entries(blockerCount).forEach(([k, v]) => {
      if (v >= 3) alerts.push('\u{1F6A8} Persistent blocker (' + v + ' days): ' + k);
    });
    // Crew drop
    if (keys.length >= 2) {
      const last = allData[keys[keys.length - 1]];
      const prev3 = allData[keys[keys.length - 2]];
      if (last && prev3 && last.numbers && prev3.numbers && last.numbers.crew && prev3.numbers.crew) {
        const drop = prev3.numbers.crew - last.numbers.crew;
        if (drop >= 5) alerts.push('\u{1F4C9} Crew count dropped by ' + drop + ' from previous check-in');
      }
    }
  }
  if (alerts.length) {
    banner.innerHTML = alerts.join('<br>');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

function startCheckin() {
  const d = { _step: 0, _date: todayKey(), pulse: {}, priorities: [{text:'',level:'med'},{text:'',level:'med'},{text:'',level:'med'}], blockers: [], risks: [], wins: '', milestones: [], numbers: {crew:'',weather:'',impact:'full',hours:'',pct:0}, notes: '', photos: [] };

function renderStep(panel) {
  let html = '';
  // Step indicator
  html += '<div class="step-label">' + STEP_NAMES[currentStep] + ' (' + (currentStep + 1) + '/' + STEP_NAMES.length + ')</div>';
  html += '<div class="step-bar">';
  for (let i = 0; i < STEP_NAMES.length; i++) {
    if (i > 0) html += '<div class="step-line"></div>';
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    html += '<div class="step-dot ' + cls + '" onclick="goToStep(' + i + ')"></div>';
  }
  html += '</div>';
  html += '<div class="step-time">' + STEP_TIMES[currentStep] + '</div>';
  html += '<div class="slide-in">';

  if (currentStep === 0) html += renderPulseStep();
  else if (currentStep === 1) html += renderPriorityStep();
  else if (currentStep === 2) html += renderBlockerStep();
  else if (currentStep === 3) html += renderWinsStep();
  else if (currentStep === 4) html += renderNumbersStep();
  else if (currentStep === 5) html += renderNotesStep();

  html += '</div>';
  // Nav
  html += '<div class="nav-buttons">';
  if (currentStep > 0) html += '<button class="nav-btn btn-back" onclick="prevStep()">&larr; Back</button>';
  if (currentStep < 5) {
    html += '<button class="nav-btn btn-next" onclick="nextStep()">Next &rarr;</button>';
  } else {
    html += '<button class="nav-btn btn-next btn-submit" onclick="submitCheckin()">✓ Submit</button>';
  }
  html += '</div>';
  if (currentStep >= 3) html += '<button class="btn-skip" onclick="nextStep()">Skip &rarr;</button>';

  panel.innerHTML = html;
  restoreStepState();
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Speech recognition not supported');
    return;
  }
  if (isRecording) {
    recognition.stop();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-CA';
  recognition.continuous = true;
  recognition.interimResults = true;
  const btn = document.getElementById('micBtn');
  const status = document.getElementById('micStatus');
  recognition.onstart = () => {
    isRecording = true;
    btn.classList.add('recording');
    status.textContent = 'Listening...';
    status.style.color = 'var(--red)';
  };
  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    const area = document.getElementById('notesText');
    if (area) {
      const existing = draft.notes || '';
      area.value = existing + (existing ? ' ' : '') + transcript;
      draft.notes = area.value;
      saveDraft(draft);
    }
  };
  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove('recording');
    status.textContent = 'Tap to dictate';
    status.style.color = 'var(--dim)';
  };
  recognition.onerror = () => {
    isRecording = false;
    btn.classList.remove('recording');
    status.textContent = 'Tap to dictate';
    status.style.color = 'var(--dim)';
  };
  recognition.start();
}

function handlePhotos(e) {
  if (!draft) return;
  const files = e.target.files;
  Array.from(files).forEach(file => {
    if (file.size > 2 * 1024 * 1024) {
      // Resize large images
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Compress via canvas
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 800;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        draft.photos.push(dataUrl);
        saveDraft(draft);
        renderPhotoPreview();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}

  if (!draft) return;

// ===== STEP RESTORE =====
function restoreStepState() {
  if (!draft) return;
  if (currentStep === 0) {
    PULSE_KEYS.forEach(key => {
      const val = draft.pulse[key];
      if (val) {
        const el = document.querySelector('.pulse-face[data-key="' + key + '"][data-val="' + val + '"]');
        if (el) el.classList.add('sel-' + val);
      }
    });
  } else if (currentStep === 1) {
    draft.priorities.forEach((p, i) => {
      const inp = document.getElementById('pri' + i);
      if (inp) inp.value = p.text || '';
      document.querySelectorAll('.chip[data-pri="' + i + '"]').forEach(c => c.classList.remove('active'));
      const sel = document.querySelector('.chip[data-pri="' + i + '"][data-lev="' + (p.level || 'med') + '"]');
      if (sel) sel.classList.add('active');
    });
  } else if (currentStep === 2) {
    renderBlockerList();
    renderRiskList();
  } else if (currentStep === 3) {
    const wt = document.getElementById('winsText');
    if (wt) wt.value = draft.wins || '';
    renderMilestoneList();
  } else if (currentStep === 4) {
    const crew = document.getElementById('numCrew');
    const hrs = document.getElementById('numHours');
    if (crew && draft.numbers.crew) crew.value = draft.numbers.crew;
    if (hrs && draft.numbers.hours) hrs.value = draft.numbers.hours;
    if (draft.numbers.weather) {
      const idx = WEATHER_OPTIONS.indexOf(draft.numbers.weather);
      if (idx >= 0) {
        const wb = document.querySelector('.weather-btn[data-weather="' + idx + '"]');
        if (wb) wb.classList.add('active');
      }
    }
    if (draft.numbers.impact) {
      const ib = document.querySelector('.impact-btn[data-impact="' + draft.numbers.impact + '"]');
      if (ib) ib.classList.add('active');
    }
    const slider = document.getElementById('numPct');
    const pctVal = document.getElementById('pctVal');
    if (slider) slider.value = draft.numbers.pct || 0;
    if (pctVal) pctVal.textContent = (draft.numbers.pct || 0) + '%';
  } else if (currentStep === 5) {
    const nt = document.getElementById('notesText');
    if (nt) nt.value = draft.notes || '';
    renderPhotoPreview();
  }
}

// ===== SUBMIT =====
function submitCheckin() {
  if (!draft) return;
  const entry = {
    date: draft._date || todayKey(),
    timestamp: new Date().toISOString(),
    project: localStorage.getItem(PROJECT_KEY) || '',
    pulse: draft.pulse,
    priorities: draft.priorities.filter(p => p.text.trim()),
    blockers: draft.blockers,
    risks: draft.risks,
    wins: draft.wins,
    milestones: draft.milestones,
    numbers: draft.numbers,
    notes: draft.notes,
    photos: draft.photos
  };
  allData[entry.date] = entry;
  saveAll();
  clearDraft();
  updateStreak();
  updateCheckinCount();
  checkAlerts();
  showToast('Check-in saved!');
  renderToday();
}

// ===== SUMMARY =====
function renderSummary(panel, entry, dateKey) {
  const health = calcHealth(entry);
  const healthColor = health >= 70 ? 'var(--green)' : health >= 40 ? 'var(--gold)' : 'var(--red)';
  let h = '';

  // Health score
  h += '<div class="health-score">';
  h += '<div class="health-ring" style="border:4px solid ' + healthColor + ';color:' + healthColor + '">' + health + '</div>';
  h += '<div class="health-label">Project Health Score</div></div>';

  h += '<div class="summary-card">';
  h += '<h2>\u{1F4CB} Check-in Summary &mdash; ' + formatDate(dateKey) + '</h2>';

  // Pulse dots
  h += '<div class="pulse-dots">';
  PULSE_KEYS.forEach((k, i) => {
    const v = entry.pulse[k] || 0;
    const color = v <= 1 ? 'var(--red)' : v <= 2 ? '#f97316' : v <= 3 ? 'var(--gold)' : v <= 4 ? '#a3e635' : 'var(--green)';
    h += '<div class="pulse-dot-item"><div class="pulse-dot" style="background:' + color + '"></div>' + PULSE_LABELS[i] + ' ' + (v ? PULSE_FACES[v - 1] : '-') + '</div>';
  });
  h += '</div>';

  // Priorities
  if (entry.priorities && entry.priorities.length) {
    h += '<div class="summary-section"><h3>Priorities</h3><ul>';
    entry.priorities.forEach(p => {
      const lc = p.level === 'critical' ? 'var(--red)' : p.level === 'high' ? '#f97316' : p.level === 'med' ? 'var(--gold)' : 'var(--blue)';
      h += '<li>' + esc(p.text) + ' <span style="font-size:.72rem;color:' + lc + ';font-weight:600">' + (p.level || '').toUpperCase() + '</span></li>';
    });
    h += '</ul></div>';
  }

  // Blockers
  if (entry.blockers && entry.blockers.length) {
    h += '<div class="summary-section"><h3>\u{1F6A7} Blockers (' + entry.blockers.length + ')</h3><ul>';
    entry.blockers.forEach(b => {
      h += '<li>[' + b.cat + '] ' + esc(b.text) + '</li>';
    });
    h += '</ul></div>';
  }

  // Risks
  if (entry.risks && entry.risks.length) {
    h += '<div class="summary-section"><h3>⚠️ Risks</h3><ul>';
    entry.risks.forEach(r => {
      h += '<li><span class="sev-chip sev-' + r.sev.toLowerCase() + '">' + r.sev + '</span> ' + esc(r.text) + '</li>';
    });
    h += '</ul></div>';
  }

  // Wins
  if (entry.wins) {
    h += '<div class="summary-section"><h3>\u{1F389} Wins</h3><p>' + esc(entry.wins) + '</p></div>';
  }

  // Milestones
  if (entry.milestones && entry.milestones.length) {
    h += '<div class="summary-section"><h3>Milestones</h3><ul>';
    entry.milestones.forEach(m => {
      h += '<li style="' + (m.done ? 'text-decoration:line-through;color:var(--dim)' : '') + '">' + (m.done ? '✅ ' : '⬜ ') + esc(m.text) + '</li>';
    });
    h += '</ul></div>';
  }

  // Numbers
  const n = entry.numbers || {};
  h += '<div class="summary-section"><h3>Numbers</h3>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:12px;font-size:.88rem">';
  if (n.crew) h += '<span>\u{1F477} Crew: <b>' + n.crew + '</b></span>';
  if (n.hours) h += '<span>\u{1F552} Hours: <b>' + n.hours + '</b></span>';
  if (n.weather) h += '<span>Weather: ' + n.weather + '</span>';
  if (n.impact) h += '<span>Impact: <b>' + n.impact + '</b></span>';
  if (n.pct !== undefined) h += '<span>Complete: <b>' + n.pct + '%</b></span>';
  h += '</div></div>';

  // Notes
  if (entry.notes) {
    h += '<div class="summary-section"><h3>Notes</h3><p>' + esc(entry.notes) + '</p></div>';
  }

  // Photos
  if (entry.photos && entry.photos.length) {
    h += '<div class="summary-section"><h3>Photos</h3><div class="photo-preview">';
    entry.photos.forEach(p => { h += '<img class="photo-thumb" src="' + p + '" onclick="window.open(this.src)">'; });
    h += '</div></div>';
  }

  h += '</div>';

  // Actions
  h += '<div class="summary-actions">';
  h += '<button class="summary-btn" onclick="copyCheckin(\'' + dateKey + '\')">\u{1F4CB} Copy to Clipboard</button>';
  h += '<button class="summary-btn" onclick="printCheckin()">\u{1F5A8}️ Print</button>';
  h += '<button class="summary-btn" onclick="deleteCheckin(\'' + dateKey + '\')" style="color:var(--red)">\u{1F5D1}️ Delete</button>';
  h += '</div>';

  panel.innerHTML = h;
}

function calcHealth(entry) {
  if (!entry || !entry.pulse) return 0;
  const vals = PULSE_KEYS.map(k => entry.pulse[k] || 0).filter(v => v > 0);
  if (!vals.length) return 0;
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  return Math.round((avg / 5) * 100);
}

function formatDate(d) {
  const dt = new Date(d + 'T12:00:00');
  return dt.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function copyCheckin(dateKey) {
  const entry = allData[dateKey];
  if (!entry) return;
  let text = 'PROJECT CHECK-IN — ' + formatDate(dateKey) + '\n';
  text += 'Project: ' + (entry.project || 'N/A') + '\n';
  text += '='.repeat(40) + '\n\n';
  text += 'PULSE CHECK:\n';
  PULSE_KEYS.forEach((k, i) => {
    const v = entry.pulse[k] || 0;
    text += '  ' + PULSE_LABELS[i] + ': ' + (v ? PULSE_FACES[v - 1] + ' ' + v + '/5' : 'N/A') + '\n';
  });
  text += '  Health Score: ' + calcHealth(entry) + '/100\n\n';
  if (entry.priorities && entry.priorities.length) {
    text += 'PRIORITIES:\n';
    entry.priorities.forEach((p, i) => { text += '  ' + (i + 1) + '. ' + p.text + ' [' + (p.level || '').toUpperCase() + ']\n'; });
    text += '\n';
  }
  if (entry.blockers && entry.blockers.length) {
    text += 'BLOCKERS (' + entry.blockers.length + '):\n';
    entry.blockers.forEach(b => { text += '  - [' + b.cat + '] ' + b.text + '\n'; });
    text += '\n';
  }
  if (entry.risks && entry.risks.length) {
    text += 'RISKS:\n';
    entry.risks.forEach(r => { text += '  - [' + r.sev + '] ' + r.text + '\n'; });
    text += '\n';
  }
  if (entry.wins) text += 'WINS:\n  ' + entry.wins + '\n\n';
  const n = entry.numbers || {};
  text += 'NUMBERS:\n';
  if (n.crew) text += '  Crew: ' + n.crew + '\n';
  if (n.hours) text += '  Hours: ' + n.hours + '\n';
  if (n.weather) text += '  Weather: ' + n.weather + '\n';
  if (n.impact) text += '  Impact: ' + n.impact + '\n';
  if (n.pct !== undefined) text += '  Complete: ' + n.pct + '%\n';
  if (entry.notes) text += '\nNOTES:\n  ' + entry.notes + '\n';
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
}

function printCheckin() {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('print-active'));
  document.getElementById('panelToday').classList.add('print-active');
  window.print();
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('print-active'));
}

function deleteCheckin(dateKey) {
  if (!confirm('Delete this check-in?')) return;
  delete allData[dateKey];
  saveAll();
  updateStreak();
  updateCheckinCount();
  checkAlerts();
  renderToday();
  showToast('Deleted');
}

// ===== TRENDS TAB =====
function renderTrends() {
  const panel = document.getElementById('panelTrends');
  const keys = Object.keys(allData).sort();
  const recent = keys.slice(-30);

  if (keys.length < 2) {
    panel.innerHTML = '<div class="card" style="text-align:center;padding:40px"><div style="font-size:2rem;margin-bottom:12px">\u{1F4C8}</div><p style="color:var(--dim)">Need at least 2 check-ins to show trends.</p></div>';
    return;
  }

  let h = '';

  // Stats
  const avgHealth = Math.round(keys.map(k => calcHealth(allData[k])).reduce((a, b) => a + b, 0) / keys.length);
  const totalBlockers = keys.reduce((s, k) => s + ((allData[k].blockers || []).length), 0);
  const avgCrew = Math.round(keys.filter(k => allData[k].numbers && allData[k].numbers.crew).map(k => allData[k].numbers.crew).reduce((a, b) => a + b, 0) / Math.max(1, keys.filter(k => allData[k].numbers && allData[k].numbers.crew).length));
  const streak = parseInt(document.getElementById('streakNum').textContent);

  h += '<div class="stat-grid">';
  h += '<div class="stat-box"><div class="stat-val">' + avgHealth + '</div><div class="stat-label">Avg Health Score</div></div>';
  h += '<div class="stat-box"><div class="stat-val">' + totalBlockers + '</div><div class="stat-label">Total Blockers</div></div>';
  h += '<div class="stat-box"><div class="stat-val">' + avgCrew + '</div><div class="stat-label">Avg Crew Size</div></div>';
  h += '<div class="stat-box"><div class="stat-val" style="color:var(--accent)">\u{1F525} ' + streak + '</div><div class="stat-label">Day Streak</div></div>';
  h += '</div>';

  // Pulse trend chart
  h += '<div class="chart-card"><h3>Pulse Trends (last 30)</h3><canvas id="pulseTrendCanvas" height="200"></canvas></div>';

  // Blocker frequency
  h += '<div class="chart-card"><h3>Blocker Categories</h3><canvas id="blockerCanvas" height="180"></canvas></div>';

  // Crew count
  h += '<div class="chart-card"><h3>Crew Count</h3><canvas id="crewCanvas" height="160"></canvas></div>';

  // % Complete S-curve
  h += '<div class="chart-card"><h3>% Complete</h3><canvas id="pctCanvas" height="160"></canvas></div>';

  // Weekly summary
  h += renderWeeklySummary(keys);

  // Export
  h += '<div class="card"><h2>Export Data</h2>';
  h += '<div class="export-row">';
  h += '<button class="export-btn" onclick="exportCSV()">Export CSV</button>';
  h += '<button class="export-btn" onclick="exportJSON()">Export JSON</button>';
  h += '</div></div>';

  panel.innerHTML = h;

  // Draw charts
  requestAnimationFrame(() => {
    drawPulseTrend(recent);
    drawBlockerFreq(keys);
    drawCrewTrend(recent);
    drawPctCurve(keys);
  });
}

function drawPulseTrend(keys) {
  const canvas = document.getElementById('pulseTrendCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 200;
  ctx.clearRect(0, 0, W, H);

  if (keys.length < 2) return;

  const pad = { t: 20, r: 10, b: 30, l: 30 };
  const gW = W - pad.l - pad.r;
  const gH = H - pad.t - pad.b;

  // Grid
  ctx.strokeStyle = '#2a2a2d';
  ctx.lineWidth = 0.5;
  for (let i = 1; i <= 5; i++) {
    const y = pad.t + gH - (i / 5) * gH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }

  // Y labels
  ctx.fillStyle = '#6e6e73';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'right';
  for (let i = 1; i <= 5; i++) {
    const y = pad.t + gH - (i / 5) * gH;
    ctx.fillText(i, pad.l - 5, y + 3);
  }

  const colors = ['#ef4444', '#f7c948', '#60a5fa', '#4ade80', '#ff6b35', '#a78bfa'];
  PULSE_KEYS.forEach((pk, pi) => {
    ctx.beginPath();
    ctx.strokeStyle = colors[pi];
    ctx.lineWidth = 2;
    keys.forEach((k, ki) => {
      const v = allData[k].pulse[pk] || 0;
      if (!v) return;
      const x = pad.l + (ki / (keys.length - 1)) * gW;
      const y = pad.t + gH - (v / 5) * gH;
      if (ki === 0 || !allData[keys[ki - 1]].pulse[pk]) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  // Legend
  ctx.font = '9px system-ui';
  ctx.textAlign = 'left';
  const legW = gW / PULSE_KEYS.length;
  PULSE_KEYS.forEach((pk, pi) => {
    const x = pad.l + pi * legW;
    ctx.fillStyle = colors[pi];
    ctx.fillRect(x, H - 12, 12, 3);
    ctx.fillText(PULSE_LABELS[pi].slice(0, 6), x + 15, H - 8);
  });
}

function drawBlockerFreq(keys) {
  const canvas = document.getElementById('blockerCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 180 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 180;
  ctx.clearRect(0, 0, W, H);

  const freq = {};
  BLOCKER_CATS.forEach(c => { freq[c] = 0; });
  keys.forEach(k => {
    (allData[k].blockers || []).forEach(b => {
      freq[b.cat] = (freq[b.cat] || 0) + 1;
    });
  });

  const cats = Object.entries(freq).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
  if (!cats.length) {
    ctx.fillStyle = '#6e6e73';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('No blockers recorded', W / 2, H / 2);
    return;
  }

  const pad = { t: 10, r: 10, b: 30, l: 10 };
  const maxV = Math.max(...cats.map(c => c[1]));
  const barW = Math.min(40, (W - pad.l - pad.r) / cats.length - 8);

  cats.forEach(([cat, val], i) => {
    const x = pad.l + i * ((W - pad.l - pad.r) / cats.length) + ((W - pad.l - pad.r) / cats.length - barW) / 2;
    const barH = (val / maxV) * (H - pad.t - pad.b - 10);
    const y = H - pad.b - barH;
    ctx.fillStyle = '#ff6b35';
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 4);
    ctx.fill();
    ctx.fillStyle = '#f0f0f0';
    ctx.font = 'bold 10px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(val, x + barW / 2, y - 4);
    ctx.fillStyle = '#6e6e73';
    ctx.font = '8px system-ui';
    ctx.fillText(cat.slice(0, 8), x + barW / 2, H - 14);
  });
}

function drawCrewTrend(keys) {
  const canvas = document.getElementById('crewCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 160 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 160;
  ctx.clearRect(0, 0, W, H);

  const pts = keys.map(k => ({ k, v: (allData[k].numbers && allData[k].numbers.crew) || 0 })).filter(p => p.v > 0);
  if (pts.length < 2) {
    ctx.fillStyle = '#6e6e73'; ctx.font = '12px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Need more data', W / 2, H / 2);
    return;
  }

  const pad = { t: 15, r: 10, b: 25, l: 35 };
  const maxV = Math.max(...pts.map(p => p.v));
  const gW = W - pad.l - pad.r;
  const gH = H - pad.t - pad.b;

  ctx.strokeStyle = '#2a2a2d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (i / 4) * gH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#6e6e73'; ctx.font = '9px system-ui'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxV - (i / 4) * maxV), pad.l - 5, y + 3);
  }

  // Area fill
  ctx.beginPath();
  pts.forEach((p, i) => {
    const x = pad.l + (i / (pts.length - 1)) * gW;
    const y = pad.t + gH - (p.v / maxV) * gH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.l + gW, pad.t + gH);
  ctx.lineTo(pad.l, pad.t + gH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(96,165,250,.15)';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = 'var(--blue)';
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = 2;
  pts.forEach((p, i) => {
    const x = pad.l + (i / (pts.length - 1)) * gW;
    const y = pad.t + gH - (p.v / maxV) * gH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

function drawPctCurve(keys) {
  const canvas = document.getElementById('pctCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * dpr;
  canvas.height = 160 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth, H = 160;
  ctx.clearRect(0, 0, W, H);

  const pts = keys.map(k => ({ k, v: (allData[k].numbers && allData[k].numbers.pct) || 0 }));
  if (pts.length < 2) {
    ctx.fillStyle = '#6e6e73'; ctx.font = '12px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('Need more data', W / 2, H / 2);
    return;
  }

  const pad = { t: 15, r: 10, b: 25, l: 35 };
  const gW = W - pad.l - pad.r;
  const gH = H - pad.t - pad.b;

  // Grid
  ctx.strokeStyle = '#2a2a2d'; ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (i / 4) * gH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#6e6e73'; ctx.font = '9px system-ui'; ctx.textAlign = 'right';
    ctx.fillText((100 - i * 25) + '%', pad.l - 5, y + 3);
  }

  // Area
  ctx.beginPath();
  pts.forEach((p, i) => {
    const x = pad.l + (i / (pts.length - 1)) * gW;
    const y = pad.t + gH - (p.v / 100) * gH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.l + gW, pad.t + gH);
  ctx.lineTo(pad.l, pad.t + gH);
  ctx.closePath();
  ctx.fillStyle = 'rgba(74,222,128,.12)';
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 2;
  pts.forEach((p, i) => {
    const x = pad.l + (i / (pts.length - 1)) * gW;
    const y = pad.t + gH - (p.v / 100) * gH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

// ===== WEEKLY SUMMARY =====
function renderWeeklySummary(keys) {
  if (keys.length < 3) return '';

  // Current week
  const now = new Date();
  const dayOfWeek = now.getDay();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - ((dayOfWeek + 6) % 7)); // Monday
  const weekStartKey = weekStart.toISOString().slice(0, 10);
  const prevWeekStart = new Date(weekStart);
  prevWeekStart.setDate(prevWeekStart.getDate() - 7);
  const prevWeekStartKey = prevWeekStart.toISOString().slice(0, 10);

  const thisWeek = keys.filter(k => k >= weekStartKey);
  const lastWeek = keys.filter(k => k >= prevWeekStartKey && k < weekStartKey);

  function weekStats(wk) {
    if (!wk.length) return null;
    const avgPulse = {};
    PULSE_KEYS.forEach(pk => {
      const vals = wk.map(k => (allData[k].pulse[pk] || 0)).filter(v => v > 0);
      avgPulse[pk] = vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '-';
    });
    const totalBlockers = wk.reduce((s, k) => s + (allData[k].blockers || []).length, 0);
    const crewDays = wk.reduce((s, k) => s + ((allData[k].numbers && allData[k].numbers.crew) || 0), 0);
    const avgHealth = Math.round(wk.map(k => calcHealth(allData[k])).reduce((a, b) => a + b, 0) / wk.length);
    return { avgPulse, totalBlockers, crewDays, avgHealth, days: wk.length };
  }

  const tw = weekStats(thisWeek);
  const lw = weekStats(lastWeek);

  let h = '<div class="weekly-card"><h3>Weekly Summary</h3>';
  if (tw) {
    h += '<div style="font-size:.82rem;margin-bottom:12px">This week: <b>' + tw.days + '</b> check-ins | Health: <b>' + tw.avgHealth + '</b> | Crew-days: <b>' + tw.crewDays + '</b> | Blockers: <b>' + tw.totalBlockers + '</b></div>';
  }

  if (tw && lw) {
    h += '<h3 style="margin-bottom:8px">Week Comparison</h3>';
    h += '<div class="week-compare">';
    h += '<div class="week-col"><h4>This Week</h4>';
    PULSE_KEYS.forEach((pk, i) => {
      h += '<div class="week-stat"><span>' + PULSE_LABELS[i].slice(0, 8) + '</span><span>' + tw.avgPulse[pk] + '</span></div>';
    });
    h += '<div class="week-stat"><span>Health</span><span style="font-weight:700">' + tw.avgHealth + '</span></div>';
    h += '</div>';
    h += '<div class="week-col"><h4>Last Week</h4>';
    PULSE_KEYS.forEach((pk, i) => {
      h += '<div class="week-stat"><span>' + PULSE_LABELS[i].slice(0, 8) + '</span><span>' + lw.avgPulse[pk] + '</span></div>';
    });
    h += '<div class="week-stat"><span>Health</span><span style="font-weight:700">' + lw.avgHealth + '</span></div>';
    h += '</div></div>';
  }

  h += '</div>';
  return h;
}

// ===== HISTORY TAB =====
function renderHistory() {
  const panel = document.getElementById('panelHistory');
  const keys = Object.keys(allData).sort().reverse();

  let h = '<div class="history-controls">';
  h += '<input type="search" id="histSearch" placeholder="Search by keyword..." oninput="filterHistory()">';
  h += '<select id="histFilter" onchange="filterHistory()"><option value="">All scores</option><option value="bad">Bad days (health &lt; 50)</option><option value="good">Good days (health &ge; 70)</option></select>';
  h += '</div>';
  h += '<div id="historyList"></div>';

  panel.innerHTML = h;
  renderHistoryList(keys);
}

function filterHistory() {
  const search = (document.getElementById('histSearch').value || '').toLowerCase();
  const filter = document.getElementById('histFilter').value;
  let keys = Object.keys(allData).sort().reverse();
  if (search) {
    keys = keys.filter(k => {
      const e = allData[k];
      const text = (k + ' ' + (e.notes || '') + ' ' + (e.wins || '') + ' ' +
        (e.priorities || []).map(p => p.text).join(' ') + ' ' +
        (e.blockers || []).map(b => b.text).join(' ')).toLowerCase();
      return text.includes(search);
    });
  }
  if (filter === 'bad') keys = keys.filter(k => calcHealth(allData[k]) < 50);
  if (filter === 'good') keys = keys.filter(k => calcHealth(allData[k]) >= 70);
  renderHistoryList(keys);
}

function renderHistoryList(keys) {
  const el = document.getElementById('historyList');
  if (!el) return;
  if (!keys.length) {
    el.innerHTML = '<div class="card" style="text-align:center;padding:30px;color:var(--dim)">No check-ins found</div>';
    return;
  }
  el.innerHTML = keys.map(k => {
    const e = allData[k];
    const health = calcHealth(e);
    const healthColor = health >= 70 ? 'var(--green)' : health >= 40 ? 'var(--gold)' : 'var(--red)';
    let dots = '';
    PULSE_KEYS.forEach(pk => {
      const v = e.pulse[pk] || 0;
      const c = v <= 1 ? 'var(--red)' : v <= 2 ? '#f97316' : v <= 3 ? 'var(--gold)' : v <= 4 ? '#a3e635' : 'var(--green)';
      dots += '<div class="history-mini-dot" style="background:' + (v ? c : 'var(--border)') + '"></div>';
    });
    const blockerCount = (e.blockers || []).length;
    const priCount = (e.priorities || []).filter(p => p.text).length;
    const details = [];
    if (e.numbers && e.numbers.crew) details.push('\u{1F477} ' + e.numbers.crew);
    if (e.numbers && e.numbers.weather) details.push(e.numbers.weather);
    if (priCount) details.push(priCount + ' priorities');
    if (blockerCount) details.push(blockerCount + ' blockers');

    return '<div class="history-card" onclick="toggleHistoryCard(\'' + k + '\')">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<span class="history-date">' + formatDate(k) + '</span>' +
      '<span style="font-size:.82rem;font-weight:700;color:' + healthColor + '">' + health + '</span></div>' +
      '<div class="history-pulse">' + dots + '</div>' +
      '<div class="history-details">' + details.join(' · ') + '</div>' +
      '<div class="history-expanded" id="hist-' + k + '"></div></div>';
  }).join('');
}

function toggleHistoryCard(k) {
  const el = document.getElementById('hist-' + k);
  if (!el) return;
  if (el.classList.contains('show')) {
    el.classList.remove('show');
    return;
  }
  // Collapse all others
  document.querySelectorAll('.history-expanded.show').forEach(e => e.classList.remove('show'));
  const e = allData[k];
  let h = '';
  // Pulse
  h += '<div style="margin-bottom:8px">';
  PULSE_KEYS.forEach((pk, i) => {
    const v = e.pulse[pk] || 0;
    h += '<span style="font-size:.82rem;margin-right:10px">' + PULSE_LABELS[i] + ': ' + (v ? PULSE_FACES[v - 1] : '-') + '</span>';
  });
  h += '</div>';
  if (e.priorities && e.priorities.length) {
    h += '<div style="font-size:.82rem;margin-bottom:6px"><b>Priorities:</b></div>';
    e.priorities.forEach(p => { h += '<div style="font-size:.82rem;padding-left:8px">• ' + esc(p.text) + ' <span style="color:var(--dim)">[' + (p.level || '').toUpperCase() + ']</span></div>'; });
  }
  if (e.blockers && e.blockers.length) {
    h += '<div style="font-size:.82rem;margin-top:6px;margin-bottom:4px"><b>Blockers:</b></div>';
    e.blockers.forEach(b => { h += '<div style="font-size:.82rem;padding-left:8px">• [' + b.cat + '] ' + esc(b.text) + '</div>'; });
  }
  if (e.wins) h += '<div style="font-size:.82rem;margin-top:6px"><b>Wins:</b> ' + esc(e.wins) + '</div>';
  if (e.notes) h += '<div style="font-size:.82rem;margin-top:6px"><b>Notes:</b> ' + esc(e.notes) + '</div>';
  const n = e.numbers || {};
  if (n.pct !== undefined) h += '<div style="font-size:.82rem;margin-top:6px"><b>Complete:</b> ' + n.pct + '%</div>';
  if (e.photos && e.photos.length) {
    h += '<div class="photo-preview" style="margin-top:8px">';
    e.photos.forEach(p => { h += '<img class="photo-thumb" src="' + p + '">'; });
    h += '</div>';
  }
  h += '<div style="margin-top:10px"><button class="summary-btn" onclick="event.stopPropagation();copyCheckin(\'' + k + '\')">\u{1F4CB} Copy</button></div>';
  el.innerHTML = h;
  el.classList.add('show');
}

// ===== EXPORT =====
function exportCSV() {
  const keys = Object.keys(allData).sort();
  if (!keys.length) { showToast('No data to export'); return; }
  let csv = 'Date,Project,Schedule,Budget,Quality,Safety,Morale,Client,Health,Crew,Hours,Weather,Impact,PctComplete,Blockers,Priorities,Notes\n';
  keys.forEach(k => {
    const e = allData[k];
    const p = e.pulse || {};
    const n = e.numbers || {};
    const row = [
      k,
      '"' + (e.project || '').replace(/"/g, '""') + '"',
      p.schedule || '',
      p.budget || '',
      p.quality || '',
      p.safety || '',
      p.morale || '',
      p.client || '',
      calcHealth(e),
      n.crew || '',
      n.hours || '',
      (n.weather || '').replace(/,/g, ''),
      n.impact || '',
      n.pct || 0,
      (e.blockers || []).length,
      (e.priorities || []).map(pr => pr.text).join('; '),
      '"' + (e.notes || '').replace(/"/g, '""').replace(/\n/g, ' ') + '"'
    ];
    csv += row.join(',') + '\n';
  });
  downloadFile('checkin-export.csv', csv, 'text/csv');
  showToast('CSV exported');
}

function exportJSON() {
  const json = JSON.stringify(allData, null, 2);
  downloadFile('checkin-backup.json', json, 'application/json');
  showToast('JSON exported');
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== UTILS =====
// Keyboard: Enter on blocker/risk/milestone inputs triggers add
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (e.target.id === 'blockerText') { addBlocker(); e.preventDefault(); }
    if (e.target.id === 'riskText') { addRisk(); e.preventDefault(); }
    if (e.target.id === 'milestoneText') { addMilestone(); e.preventDefault(); }
  }
});

// Init
init();
</script>
