<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Eww-No!</title>
  <style>
    :root{--font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--bg:#1a0a1a;--bg2:#2a1a2a;--bg3:#3a2a3a;--border:#4a3a4a;--text:#f0e8f0;--dim:#8a7a8a;--red:#e53e3e;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--wild:#9333ea}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow:hidden;touch-action:manipulation}
    #root{height:100%}
    @keyframes dealIn{from{transform:translateY(-100px) rotate(20deg);opacity:0}to{transform:translateY(0) rotate(0);opacity:1}}
    @keyframes playCard{0%{transform:scale(1)}50%{transform:scale(1.2) rotate(-5deg)}100%{transform:scale(0.8) translateY(-60px);opacity:0}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes flyToCenter{
      0%{transform:translate(0,0) scale(1);opacity:1}
      40%{transform:translate(var(--fly-x),var(--fly-y)) scale(1.3) rotate(-10deg);opacity:1}
      100%{transform:translate(var(--fly-x),var(--fly-y)) scale(0.8) rotate(5deg);opacity:0}
    }
    @keyframes ewwnoSplash{
      0%{transform:scale(0) rotate(-10deg);opacity:0}
      30%{transform:scale(1.4) rotate(3deg);opacity:1}
      50%{transform:scale(1.2) rotate(-2deg);opacity:1}
      70%{transform:scale(1.3) rotate(1deg);opacity:1}
      100%{transform:scale(0) rotate(10deg);opacity:0}
    }
    @keyframes ewwnoPulseRing{
      0%{transform:scale(0.5);opacity:0.8}
      100%{transform:scale(2.5);opacity:0}
    }
    .deal-in{animation:dealIn 0.3s ease}.play-card{animation:playCard 0.3s ease forwards}.shake{animation:shake 0.3s ease}.pulse{animation:pulse 0.6s ease infinite}.slide-up{animation:slideUp 0.3s ease}
    .fly-to-pile{animation:flyToCenter 0.45s cubic-bezier(0.4,0,0.2,1) forwards;position:fixed;z-index:200;pointer-events:none}
    .ewwno-splash{
      animation:ewwnoSplash 1.6s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
      position:fixed;z-index:300;pointer-events:none;
      top:50%;left:50%;transform:translate(-50%,-50%);
      font-family:var(--font-mono);font-weight:900;font-size:clamp(3rem,15vw,5rem);
      color:#fff;text-shadow:0 0 40px var(--wild),0 0 80px var(--wild),0 4px 8px rgba(0,0,0,0.5);
      white-space:nowrap;
    }
    .ewwno-ring{
      animation:ewwnoPulseRing 1.2s ease-out forwards;
      position:fixed;z-index:299;pointer-events:none;
      top:50%;left:50%;transform:translate(-50%,-50%);
      width:200px;height:200px;border-radius:50%;
      border:4px solid var(--wild);
    }
    .hand-scroll{
      display:flex;gap:3px;overflow-x:auto;padding:0 8px 4px;
      -webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;
      scrollbar-width:none;-ms-overflow-style:none;
    }
    .hand-scroll::-webkit-scrollbar{display:none}
    .hand-card-wrap{scroll-snap-align:center;flex-shrink:0;transition:transform 0.2s ease}
    .hand-card-wrap.selected{transform:scale(1.25) translateY(-12px);z-index:10}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
var { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Win/Loss tracking in localStorage
function getRecord() {
  try {
    var r = JSON.parse(localStorage.getItem("ewwno_record") || "{}");
    return { wins: r.wins || 0, losses: r.losses || 0 };
  } catch(e) { return { wins: 0, losses: 0 }; }
}
function saveRecord(rec) {
  try { localStorage.setItem("ewwno_record", JSON.stringify(rec)); } catch(e) {}
}

// ── Card definitions
var COLORS = ["red","blue","green","yellow"];
var COLOR_HEX = {red:"#e53e3e",blue:"#3b82f6",green:"#22c55e",yellow:"#eab308",wild:"#9333ea"};
var GROSS_NAMES = [
  "Booger","Fart","Vomit","Earwax","Toenail","Armpit","Skidmark","Diarrhea","Snot","Pimple",
  "Mucus","Bellybutton Lint","Toe Jam","Eye Crust","Spit","Drool","Dandruff","Sweat Stain","Hairball","Smegma"
];
var GROSS_EMOJIS = ["🤢","💨","🤮","👂","🦶","🫁","💩","🚽","🤧","😖","🦠","🫃","🧟","👁️","💦","🤤","❄️","💧","🐱","🧀"];
var SPECIAL_NAMES = {skip:"Blocked Toilet 🚫",reverse:"Reverse Flush 🔄",draw2:"Double Dookie +2 💩💩"};
var WILD_NAMES = ["Mystery Stain 🌈","Unidentified Slime 🌈"];

// Build deck
function buildDeck() {
  var deck = [];
  var id = 0;
  COLORS.forEach(function(color) {
    deck.push({id:id++,color:color,type:"number",value:0,name:GROSS_NAMES[0],emoji:GROSS_EMOJIS[0]});
    for (var n = 1; n <= 9; n++) {
      deck.push({id:id++,color:color,type:"number",value:n,name:GROSS_NAMES[n],emoji:GROSS_EMOJIS[n]});
      deck.push({id:id++,color:color,type:"number",value:n,name:GROSS_NAMES[n],emoji:GROSS_EMOJIS[n]});
    }
    ["skip","reverse","draw2"].forEach(function(type) {
      deck.push({id:id++,color:color,type:type,value:20,name:SPECIAL_NAMES[type],emoji:""});
      deck.push({id:id++,color:color,type:type,value:20,name:SPECIAL_NAMES[type],emoji:""});
    });
  });
  for (var w = 0; w < 4; w++) {
    deck.push({id:id++,color:"wild",type:"wild",value:50,name:WILD_NAMES[0],emoji:""});
    deck.push({id:id++,color:"wild",type:"wild",value:50,name:"Wild Draw 4 🌈+4",emoji:"",draw4:true});
  }
  return deck;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ── Sound
var audioCtx = null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,type,vol){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.value=freq;g.gain.setValueAtTime(vol||0.04,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}}
function sndPlay(){playTone(440,0.08,"triangle",0.05);setTimeout(function(){playTone(550,0.08,"triangle",0.05);},60);}
function sndDraw(){playTone(220,0.1,"square",0.03);}
function sndSkip(){playTone(300,0.15,"sawtooth",0.04);setTimeout(function(){playTone(200,0.15,"sawtooth",0.04);},100);}
function sndWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.25,"sine",0.07);},i*100);});}
function sndUno(){playTone(880,0.3,"sine",0.06);setTimeout(function(){playTone(660,0.2,"sine",0.06);},150);}
function sndFart(){playTone(80,0.3,"sawtooth",0.06);setTimeout(function(){playTone(60,0.2,"sawtooth",0.04);},150);}
function sndEwwno(){playTone(880,0.15,"sine",0.08);setTimeout(function(){playTone(660,0.15,"sine",0.08);},120);setTimeout(function(){playTone(880,0.25,"sine",0.08);},240);}

// ── Humor
var PLAY_MSGS = [
  "Disgusting move!","Absolutely revolting.","That's nasty.","Ugh, why.","The stench!",
  "Horrifying.","Nobody asked for that.","Foul play!","Gag reflex activated.","That's vile."
];
var WIN_MSGS = ["You win! Time to wash your hands.","Victory smells sweet... unlike these cards.","Eww-No champion! Gross."];
var LOSE_MSGS = ["You lost. Fitting, really.","AI wins. Even grosser.","Defeated by diarrhea cards."];
function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ── Card Component
function Card(props) {
  var card = props.card;
  var small = props.small;
  var onClick = props.onClick;
  var playable = props.playable;
  var faceDown = props.faceDown;
  var selected = props.selected;

  var w = small ? 48 : 64;
  var h = small ? 72 : 96;

  if (faceDown) {
    return (
      <div style={{width:w,height:h,background:"linear-gradient(135deg,#2a1a3a,#1a0a2a)",border:"2px solid var(--border)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:small?"1rem":"1.4rem",flexShrink:0}}>
        🤢
      </div>
    );
  }

  var bg = card.color === "wild" ? "linear-gradient(135deg,#e53e3e,#3b82f6,#22c55e,#eab308)" : COLOR_HEX[card.color];
  var displayText = card.type === "number" ? card.value : (card.type === "skip" ? "🚫" : card.type === "reverse" ? "🔄" : card.type === "draw2" ? "+2" : card.draw4 ? "+4" : "W");

  return (
    <div onClick={onClick} className={props.className || ""} ref={props.cardRef}
      style={{
        width:w,height:h,background:bg,border:playable?"3px solid #fff":"2px solid rgba(0,0,0,0.3)",
        borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        cursor:onClick?"pointer":"default",flexShrink:0,position:"relative",
        boxShadow:playable?"0 0 12px rgba(255,255,255,0.3)":"0 2px 8px rgba(0,0,0,0.3)",
        transform:playable&&!selected?"translateY(-4px)":"none",transition:"transform 0.15s, box-shadow 0.15s"
      }}>
      <span style={{fontSize:small?"1.2rem":"1.6rem",fontWeight:800,fontFamily:"var(--font-mono)",color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)"}}>{displayText}</span>
      {!small && <span style={{fontSize:"0.5rem",color:"rgba(255,255,255,0.8)",marginTop:2,textAlign:"center",padding:"0 2px",lineHeight:1.2}}>{card.name}</span>}
    </div>
  );
}

// ── Color Picker
function ColorPicker(props) {
  return (
    <div className="slide-up" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:20,textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:"0.85rem",marginBottom:12,color:"var(--dim)"}}>Pick a color (the grosser the better)</div>
        <div style={{display:"flex",gap:10}}>
          {COLORS.map(function(c){return(
            <button key={c} onClick={function(){props.onPick(c);}} style={{width:50,height:50,borderRadius:10,border:"3px solid rgba(255,255,255,0.3)",background:COLOR_HEX[c],cursor:"pointer",fontSize:"1.5rem"}}
              onMouseEnter={function(e){e.currentTarget.style.transform="scale(1.15)";}}
              onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>
              {c==="red"?"🤮":c==="blue"?"🥶":c==="green"?"🤢":c==="yellow"?"🤧":""}
            </button>
          );})}
        </div>
      </div>
    </div>
  );
}

// ── EWW-NO Splash Component
function EwwNoSplash(props) {
  var [visible, setVisible] = useState(true);
  useEffect(function(){
    var t = setTimeout(function(){ setVisible(false); if(props.onDone) props.onDone(); }, 1600);
    return function(){ clearTimeout(t); };
  }, []);
  if (!visible) return null;
  return (
    <React.Fragment>
      <div className="ewwno-ring" />
      <div className="ewwno-splash">EWW-NO! 🤢</div>
    </React.Fragment>
  );
}

// ── Fly Animation Component
function FlyingCard(props) {
  var card = props.card;
  var startRect = props.startRect;
  var targetRect = props.targetRect;
  var onDone = props.onDone;

  useEffect(function(){
    var t = setTimeout(function(){ if(onDone) onDone(); }, 450);
    return function(){ clearTimeout(t); };
  }, []);

  if (!startRect || !targetRect) return null;

  var dx = targetRect.left + targetRect.width/2 - startRect.left - startRect.width/2;
  var dy = targetRect.top + targetRect.height/2 - startRect.top - startRect.height/2;

  var bg = card.color === "wild" ? "linear-gradient(135deg,#e53e3e,#3b82f6,#22c55e,#eab308)" : COLOR_HEX[card.color];
  var displayText = card.type === "number" ? card.value : (card.type === "skip" ? "🚫" : card.type === "reverse" ? "🔄" : card.type === "draw2" ? "+2" : card.draw4 ? "+4" : "W");

  return (
    <div className="fly-to-pile" style={{
      "--fly-x": dx+"px", "--fly-y": dy+"px",
      left: startRect.left, top: startRect.top,
      width: startRect.width, height: startRect.height,
      background: bg, borderRadius: 8, border: "2px solid rgba(255,255,255,0.5)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      boxShadow:"0 4px 20px rgba(0,0,0,0.5)"
    }}>
      <span style={{fontSize:"1.6rem",fontWeight:800,fontFamily:"var(--font-mono)",color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,0.5)"}}>{displayText}</span>
    </div>
  );
}

// ── Game Logic
function canPlay(card, topCard, currentColor) {
  if (card.color === "wild") return true;
  if (card.color === currentColor) return true;
  if (card.type === "number" && topCard.type === "number" && card.value === topCard.value) return true;
  if (card.type !== "number" && card.type === topCard.type) return true;
  return false;
}

// ── Improved AI with randomness, bluffing, wild-holding
function aiChooseCard(hand, topCard, currentColor) {
  var playable = hand.filter(function(c){return canPlay(c,topCard,currentColor);});
  if (playable.length === 0) return null;

  // Occasionally bluff: ~15% chance to draw instead of playing if hand > 3
  if (hand.length > 3 && Math.random() < 0.15) {
    // Only bluff if we don't have a huge hand and aren't about to win
    if (hand.length > 2) return null;
  }

  // Hold wilds: ~60% of the time, prefer non-wilds if available, unless hand is small
  var nonWilds = playable.filter(function(c){return c.color !== "wild";});
  var wilds = playable.filter(function(c){return c.color !== "wild" ? false : true;});
  var holdWilds = hand.length > 3 && Math.random() < 0.60 && nonWilds.length > 0;

  var candidates = holdWilds ? nonWilds : playable;

  // Add randomness: ~30% chance to pick randomly from candidates instead of optimal
  if (Math.random() < 0.30) {
    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  // Strategic play: prefer matching color non-special, then matching value, then specials, then wilds
  var normals = candidates.filter(function(c){return c.type==="number"&&c.color===currentColor;});
  if (normals.length) return normals[Math.floor(Math.random()*normals.length)];
  var matchVal = candidates.filter(function(c){return c.type==="number";});
  if (matchVal.length) return matchVal[Math.floor(Math.random()*matchVal.length)];
  var specials = candidates.filter(function(c){return c.type!=="wild"&&c.type!=="number";});
  if (specials.length) return specials[Math.floor(Math.random()*specials.length)];

  // If holding wilds and nothing else playable, use a wild
  if (holdWilds && wilds.length > 0 && nonWilds.length === 0) return wilds[0];

  return candidates[Math.floor(Math.random()*candidates.length)];
}

function aiChooseColor(hand) {
  var counts = {red:0,blue:0,green:0,yellow:0};
  hand.forEach(function(c){if(counts[c.color]!==undefined)counts[c.color]++;});

  // ~20% chance to pick a random color (bluff / misdirection)
  if (Math.random() < 0.20) {
    return COLORS[Math.floor(Math.random() * COLORS.length)];
  }

  var best = "red"; var max = 0;
  COLORS.forEach(function(c){if(counts[c]>max){max=counts[c];best=c;}});
  return best;
}

// ── Main Game
function Game(props) {
  var [deck, setDeck] = useState(function(){return shuffle(buildDeck());});
  var [playerHand, setPlayerHand] = useState([]);
  var [aiHand, setAiHand] = useState([]);
  var [pile, setPile] = useState([]);
  var [currentColor, setCurrentColor] = useState("red");
  var [direction, setDirection] = useState(1);
  var [message, setMessage] = useState("");
  var [gameOver, setGameOver] = useState(false);
  var [winner, setWinner] = useState("");
  var [showColorPicker, setShowColorPicker] = useState(false);
  var [pendingWild, setPendingWild] = useState(null);
  var [aiThinking, setAiThinking] = useState(false);
  var [turn, setTurn] = useState("player");
  var [canDraw, setCanDraw] = useState(true);
  var [selectedCard, setSelectedCard] = useState(null);
  var [flyingCard, setFlyingCard] = useState(null);
  var [showEwwNo, setShowEwwNo] = useState(false);
  var [record, setRecord] = useState(getRecord);
  var [recordSaved, setRecordSaved] = useState(false);
  var pendingRef = useRef(null);
  var pileRef = useRef(null);
  var cardRefs = useRef({});

  // Deal
  useEffect(function() {
    var d = shuffle(buildDeck());
    var ph = d.slice(0, 7);
    var ah = d.slice(7, 14);
    var startCard = d.slice(14).find(function(c){return c.type==="number";}) || d[14];
    var startIdx = d.indexOf(startCard);
    var remaining = d.filter(function(c,i){return i>=14&&c!==startCard;});
    setDeck(remaining);
    setPlayerHand(ph);
    setAiHand(ah);
    setPile([startCard]);
    setCurrentColor(startCard.color === "wild" ? "red" : startCard.color);
    setTurn("player");
    setMessage("Your turn! Play a card or draw.");
  }, []);

  // Save record when game ends
  useEffect(function() {
    if (gameOver && winner && !recordSaved) {
      var r = getRecord();
      if (winner === "player") r.wins++;
      else r.losses++;
      saveRecord(r);
      setRecord(r);
      setRecordSaved(true);
    }
  }, [gameOver, winner, recordSaved]);

  var drawCard = function(fromDeck, count) {
    count = count || 1;
    var drawn = [];
    var d = fromDeck.slice();
    for (var i = 0; i < count; i++) {
      if (d.length === 0) {
        var reshuffled = shuffle(pile.slice(0, -1));
        d = reshuffled;
        setPile([pile[pile.length-1]]);
      }
      if (d.length > 0) drawn.push(d.shift());
    }
    setDeck(d);
    return {cards: drawn, newDeck: d};
  };

  var topCard = pile.length > 0 ? pile[pile.length - 1] : {type:"number",value:0,color:"red"};

  // Trigger EWW-NO splash
  var triggerEwwNo = function() {
    setShowEwwNo(true);
    sndEwwno();
  };

  // Player plays card (with fly animation)
  var playCard = function(card) {
    if (turn !== "player" || gameOver || showColorPicker || flyingCard) return;
    if (!canPlay(card, topCard, currentColor)) {
      setMessage("Can't play that! Match color or number.");
      sndFart();
      return;
    }

    // Get source rect for fly animation
    var sourceEl = cardRefs.current[card.id];
    var targetEl = pileRef.current;
    var startRect = sourceEl ? sourceEl.getBoundingClientRect() : null;
    var targetRect = targetEl ? targetEl.getBoundingClientRect() : null;

    sndPlay();
    var newHand = playerHand.filter(function(c){return c.id!==card.id;});
    setPlayerHand(newHand);
    setSelectedCard(null);
    setCanDraw(true);

    if (startRect && targetRect) {
      setFlyingCard({card:card, startRect:startRect, targetRect:targetRect});
      setTimeout(function() {
        setFlyingCard(null);
        setPile(function(p){return p.concat([card]);});
        finishPlayerPlay(card, newHand);
      }, 400);
    } else {
      setPile(function(p){return p.concat([card]);});
      finishPlayerPlay(card, newHand);
    }
  };

  var finishPlayerPlay = function(card, newHand) {
    if (newHand.length === 0) {
      setGameOver(true); setWinner("player"); setMessage(pick(WIN_MSGS)); sndWin();
      return;
    }
    if (newHand.length === 1) {
      triggerEwwNo();
      setMessage("EWW-NO! 🤢 One card left!");
    }

    if (card.color === "wild") {
      setPendingWild(card);
      setShowColorPicker(true);
      return;
    }

    setCurrentColor(card.color);
    applyCardEffect(card, "player", newHand);
  };

  var applyCardEffect = function(card, player, hand) {
    if (card.type === "skip") {
      setMessage(player === "player" ? "Toilet blocked! AI skipped! 🚫" : "You're blocked! 🚫");
      sndSkip();
      if (player === "player") { setTimeout(function(){setTurn("player");setMessage("Your turn again!");}, 1000); }
      else { setTurn("player"); }
      return;
    }
    if (card.type === "reverse") {
      setDirection(function(d){return d*-1;});
      setMessage("Reverse flush! 🔄");
      if (player === "player") { setTimeout(function(){setTurn("player");setMessage("Your turn again!");}, 1000); }
      else { setTurn("player"); }
      return;
    }
    if (card.type === "draw2") {
      if (player === "player") {
        var result = drawCard(deck, 2);
        setAiHand(function(h){return h.concat(result.cards);});
        setDeck(result.newDeck);
        setMessage("AI draws 2! Double dookie! 💩💩");
        sndFart();
        setTimeout(function(){setTurn("player");setMessage("Your turn again!");}, 1200);
      } else {
        var result = drawCard(deck, 2);
        setPlayerHand(function(h){return h.concat(result.cards);});
        setDeck(result.newDeck);
        setMessage("You draw 2! Gross! 💩💩");
        sndFart();
        setTurn("ai");
      }
      return;
    }
    if (card.draw4) {
      if (player === "player") {
        var result = drawCard(deck, 4);
        setAiHand(function(h){return h.concat(result.cards);});
        setDeck(result.newDeck);
        setMessage("AI draws 4! Absolutely disgusting! 🤮🤮🤮🤮");
        sndFart();
        setTimeout(function(){setTurn("player");setMessage("Your turn again!");}, 1200);
      } else {
        var result = drawCard(deck, 4);
        setPlayerHand(function(h){return h.concat(result.cards);});
        setDeck(result.newDeck);
        setMessage("You draw 4! THE HORROR! 🤮🤮🤮🤮");
        sndFart();
        setTurn("ai");
      }
      return;
    }
    if (player === "player") {
      setTurn("ai");
    } else {
      setTurn("player");
      setMessage("Your turn!");
    }
  };

  var onColorPicked = function(color) {
    setShowColorPicker(false);
    setCurrentColor(color);
    var card = pendingWild;
    setPendingWild(null);
    applyCardEffect(card, "player", playerHand);
  };

  // Player draws
  var playerDraw = function() {
    if (turn !== "player" || gameOver || !canDraw) return;
    var result = drawCard(deck, 1);
    if (result.cards.length > 0) {
      setPlayerHand(function(h){return h.concat(result.cards);});
      setDeck(result.newDeck);
      sndDraw();
      setMessage("Drew: " + result.cards[0].name + " " + result.cards[0].emoji);
      setCanDraw(false);
      if (!canPlay(result.cards[0], topCard, currentColor)) {
        setTimeout(function(){setTurn("ai");setMessage("Passed. AI's turn...");}, 800);
      }
    }
  };

  // AI turn
  useEffect(function() {
    if (turn !== "ai" || gameOver) return;
    setAiThinking(true);
    var delay = 800 + Math.random() * 600;
    var timer = setTimeout(function() {
      setAiThinking(false);
      var card = aiChooseCard(aiHand, topCard, currentColor);
      if (card) {
        sndPlay();
        var newHand = aiHand.filter(function(c){return c.id!==card.id;});
        setAiHand(newHand);
        setPile(function(p){return p.concat([card]);});
        setMessage("AI plays: " + card.name + " — " + pick(PLAY_MSGS));

        if (newHand.length === 0) {
          setGameOver(true); setWinner("ai"); setMessage(pick(LOSE_MSGS)); sndFart();
          return;
        }
        if (newHand.length === 1) {
          triggerEwwNo();
          setMessage("AI says EWW-NO! 🤢");
        }

        // FIX: Choose color BEFORE applying card effect so draw4 color is set correctly
        if (card.color === "wild") {
          var chosen = aiChooseColor(newHand);
          setCurrentColor(chosen);
          // Apply effect after color is set (use setTimeout to ensure state update)
          setTimeout(function(){
            applyCardEffect(card, "ai", newHand);
          }, 50);
        } else {
          setCurrentColor(card.color);
          applyCardEffect(card, "ai", newHand);
        }
      } else {
        // AI draws
        var result = drawCard(deck, 1);
        if (result.cards.length > 0) {
          var drawnCards = result.cards;
          var newDeck = result.newDeck;
          setAiHand(function(h){return h.concat(drawnCards);});
          setDeck(newDeck);
          setMessage("AI draws a card... 🤔");
          if (canPlay(drawnCards[0], topCard, currentColor)) {
            setTimeout(function() {
              var c = drawnCards[0];
              sndPlay();
              setAiHand(function(h){return h.filter(function(x){return x.id!==c.id;});});
              setPile(function(p){return p.concat([c]);});
              setMessage("AI plays drawn card: " + c.name);
              // FIX: For drawn wild cards, choose color before applying effect
              if (c.color === "wild") {
                setAiHand(function(h){
                  var filtered = h.filter(function(x){return x.id!==c.id;});
                  var chosen = aiChooseColor(filtered);
                  setCurrentColor(chosen);
                  return filtered;
                });
                setTimeout(function(){
                  applyCardEffect(c, "ai", aiHand);
                }, 50);
              } else {
                setCurrentColor(c.color);
                applyCardEffect(c, "ai", aiHand);
              }
            }, 600);
          } else {
            setTimeout(function(){setTurn("player");setMessage("AI passes. Your turn!");setCanDraw(true);}, 600);
          }
        } else {
          setTurn("player"); setMessage("Your turn!"); setCanDraw(true);
        }
      }
    }, delay);
    return function(){clearTimeout(timer);};
  }, [turn]);

  // Handle card selection on tap (for mobile: tap to select, tap again to play)
  var handleCardClick = function(card) {
    var isPlayable = turn==="player"&&!gameOver&&canPlay(card,topCard,currentColor)&&!flyingCard;
    if (!isPlayable) return;
    if (selectedCard === card.id) {
      playCard(card);
    } else {
      setSelectedCard(card.id);
    }
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {showColorPicker && <ColorPicker onPick={onColorPicked} />}
      {showEwwNo && <EwwNoSplash onDone={function(){ setShowEwwNo(false); }} />}
      {flyingCard && <FlyingCard card={flyingCard.card} startRect={flyingCard.startRect} targetRect={flyingCard.targetRect} onDone={function(){setFlyingCard(null);}} />}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderBottom:"1px solid var(--border)"}}>
        <span style={{fontSize:"1.2rem"}}>🤢</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,letterSpacing:"0.05em",color:"var(--wild)"}}>EWW-NO!</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:"0.55rem",color:"var(--dim)",fontFamily:"var(--font-mono)"}}>W:{record.wins} L:{record.losses}</span>
          <span style={{fontSize:"0.6rem",color:"var(--dim)",fontFamily:"var(--font-mono)"}}>Color:</span>
          <div style={{width:16,height:16,borderRadius:4,background:COLOR_HEX[currentColor],border:"1px solid rgba(255,255,255,0.3)"}}/>
        </div>
      </div>

      {/* AI hand (face down) + prominent card count */}
      <div style={{padding:"6px 8px 2px",textAlign:"center"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"var(--bg3)",borderRadius:8,padding:"4px 12px",border:"1px solid var(--border)"}}>
          <span style={{fontSize:"0.75rem",fontWeight:700,fontFamily:"var(--font-mono)",color:aiHand.length<=2?"var(--red)":"var(--text)"}}>
            AI: {aiHand.length} card{aiHand.length!==1?"s":""}
          </span>
          {aiThinking && <span style={{fontSize:"0.7rem"}}>🤔</span>}
          {aiHand.length === 1 && <span style={{fontSize:"0.7rem",color:"var(--red)",fontWeight:800,fontFamily:"var(--font-mono)"}}>EWW-NO!</span>}
        </div>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:2,padding:"4px 8px",minHeight:42}}>
        {aiHand.map(function(c,i){return <Card key={c.id} card={c} faceDown small />;}).slice(0,12)}
        {aiHand.length>12 && <span style={{fontSize:"0.7rem",color:"var(--dim)",alignSelf:"center"}}>+{aiHand.length-12}</span>}
      </div>

      {/* Play area */}
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:16,padding:"0 16px"}}>
        {/* Draw pile */}
        <div onClick={turn==="player"&&canDraw&&!gameOver?playerDraw:undefined}
          style={{cursor:turn==="player"&&canDraw?"pointer":"default"}}
          className={turn==="player"&&canDraw?"pulse":""}>
          <div style={{width:64,height:96,background:"linear-gradient(135deg,#2a1a3a,#1a0a2a)",border:"2px solid var(--border)",borderRadius:8,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:"1.8rem"}}>🤢</span>
            <span style={{fontSize:"0.5rem",color:"var(--dim)",marginTop:2}}>DRAW</span>
            <span style={{fontSize:"0.55rem",color:"var(--dim)"}}>{deck.length}</span>
          </div>
        </div>

        {/* Discard pile / top card */}
        <div ref={pileRef}>
          <Card card={topCard} />
        </div>
      </div>

      {/* Message */}
      <div style={{textAlign:"center",padding:"2px 12px",minHeight:24}}>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"0.72rem",color:"var(--dim)"}}>{message}</span>
      </div>

      {/* Game over */}
      {gameOver && (
        <div style={{textAlign:"center",padding:"8px"}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:"0.7rem",color:"var(--dim)",marginBottom:6}}>
            Record: {record.wins}W / {record.losses}L
          </div>
          <button onClick={props.onRestart} style={{background:"var(--wild)",border:"none",borderRadius:8,padding:"10px 24px",color:"#fff",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,cursor:"pointer"}}>
            Play Again 🤮
          </button>
        </div>
      )}

      {/* Player hand — horizontal scroll with momentum */}
      <div style={{borderTop:"1px solid var(--border)",padding:"8px 0 12px",background:"var(--bg2)"}}>
        <div className="hand-scroll">
          {playerHand.map(function(card) {
            var isPlayable = turn==="player"&&!gameOver&&canPlay(card,topCard,currentColor)&&!flyingCard;
            var isSelected = selectedCard === card.id;
            return (
              <div key={card.id}
                className={"hand-card-wrap deal-in" + (isSelected?" selected":"")}
                style={{animationDelay:(playerHand.indexOf(card)*0.05)+"s"}}>
                <Card card={card} playable={isPlayable} selected={isSelected}
                  cardRef={function(el){ cardRefs.current[card.id] = el; }}
                  onClick={isPlayable ? function(){handleCardClick(card);} : undefined} />
              </div>
            );
          })}
        </div>
        <div style={{textAlign:"center",fontSize:"0.6rem",color:"var(--dim)",fontFamily:"var(--font-mono)",marginTop:4}}>
          {playerHand.length} cards · {turn==="player"?(selectedCard?"tap again to play":"YOUR TURN"):"waiting..."}
        </div>
      </div>
    </div>
  );
}

// ── Splash
function Splash(props) {
  var record = getRecord();
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",gap:"1rem"}}>
      <div style={{fontSize:"4rem"}}>🤮</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:"clamp(2rem,10vw,3rem)",fontWeight:800,letterSpacing:"0.06em",color:"var(--wild)"}}>EWW-NO!</div>
      <div style={{fontSize:"0.85rem",color:"var(--dim)",maxWidth:300,textAlign:"center",lineHeight:1.6}}>
        UNO but every card is something disgusting. Same rules. Match color or number. First to empty wins.
      </div>
      <div style={{fontSize:"0.7rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textAlign:"center",lineHeight:1.8,maxWidth:280}}>
        🚫 Skip = Blocked Toilet<br/>
        🔄 Reverse = Reverse Flush<br/>
        +2 = Double Dookie<br/>
        🌈 Wild = Mystery Stain<br/>
        +4 = Unidentified Slime
      </div>
      {(record.wins > 0 || record.losses > 0) && (
        <div style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",color:"var(--dim)",background:"var(--bg2)",padding:"6px 14px",borderRadius:8,border:"1px solid var(--border)"}}>
          Record: {record.wins}W / {record.losses}L
        </div>
      )}
      <button onClick={props.onStart} style={{marginTop:8,background:"var(--wild)",border:"none",borderRadius:10,padding:"14px 32px",color:"#fff",fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,letterSpacing:"0.08em",cursor:"pointer"}}>
        DEAL ME IN 🤢
      </button>
      <a href="index.html" style={{marginTop:8,fontSize:"0.65rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textDecoration:"none"}}>← taskiap.com</a>
    </div>
  );
}

// ── App
function App() {
  var [playing, setPlaying] = useState(false);
  var [key, setKey] = useState(0);
  if (!playing) return <Splash onStart={function(){setPlaying(true);}} />;
  return <Game key={key} onRestart={function(){setKey(function(k){return k+1;});}} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
