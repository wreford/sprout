<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crew Rate Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:600px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px;display:inline-block;margin-bottom:12px}
h1{font-size:20px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;color:var(--dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;margin-top:10px}
input,select{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px}
.row{display:flex;gap:10px}.row>*{flex:1}
.result{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px}
.result .val{font-size:22px;font-weight:700;color:var(--accent)}.result .lbl{font-size:12px;color:var(--dim)}
.result.green .val{color:var(--green)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
button{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
button.sm{padding:6px 12px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--dim);margin:0}
button.sm:hover{border-color:var(--accent);color:var(--accent)}
.member{display:flex;gap:8px;align-items:center;padding:8px;background:var(--bg);border-radius:6px;margin-top:6px;font-size:13px}
.member span{flex:1}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.range-row{display:flex;align-items:center;gap:10px}.range-row input[type=range]{flex:1}
.range-row .rv{min-width:50px;text-align:right;color:var(--accent);font-weight:600}
</style>
</head>
<body>
<a class="home" href="index.html">← home</a>
<h1>Crew Rate Calculator</h1>

<div class="card">
<h2>Quick Add Presets</h2>
<div class="presets">
<button class="sm" onclick="addM('Laborer',32,1)">Laborer $32</button>
<button class="sm" onclick="addM('Carpenter',45,1)">Carpenter $45</button>
<button class="sm" onclick="addM('Operator',55,1)">Operator $55</button>
<button class="sm" onclick="addM('Foreman',58,1)">Foreman $58</button>
<button class="sm" onclick="addM('Electrician',52,1)">Electrician $52</button>
<button class="sm" onclick="addM('Ironworker',50,1)">Ironworker $50</button>
</div>
<h2>Crew Members</h2>
<div id="members"></div>
<div class="row" style="margin-top:10px">
<input id="cRole" placeholder="Role">
<input id="cRate" type="number" placeholder="$/hr" value="35">
<input id="cCnt" type="number" placeholder="#" value="1" style="max-width:60px">
<button onclick="addCustom()">+</button>
</div>
</div>

<div class="card">
<h2>Burden &amp; Productivity</h2>
<label>Burden / Markup</label>
<div class="range-row"><input type="range" id="burden" min="35" max="55" value="42" oninput="calc()"><span class="rv" id="burdenV">42%</span></div>
<label>Productivity Factor</label>
<div class="range-row"><input type="range" id="prod" min="50" max="100" value="80" oninput="calc()"><span class="rv" id="prodV">0.80</span></div>
</div>

<div class="card">
<h2>Results</h2>
<div class="grid">
<div class="result"><div class="lbl">Base Blended $/hr</div><div class="val" id="baseHr">—</div></div>
<div class="result"><div class="lbl">Burdened $/hr</div><div class="val" id="burHr">—</div></div>
<div class="result green"><div class="lbl">Effective $/hr</div><div class="val" id="effHr">—</div></div>
</div>
<div class="grid" style="margin-top:8px">
<div class="result"><div class="lbl">Daily (8hr)</div><div class="val" id="daily">—</div></div>
<div class="result"><div class="lbl">Weekly (40hr)</div><div class="val" id="weekly">—</div></div>
<div class="result"><div class="lbl">Crew Size</div><div class="val" id="size">—</div></div>
</div>
</div>

<script>
let crew=[];
function addM(role,rate,cnt){crew.push({role,rate,cnt});render();calc();}
function removeM(i){crew.splice(i,1);render();calc();}
function addCustom(){
  const r=document.getElementById('cRole').value||'Worker';
  const rate=+document.getElementById('cRate').value||35;
  const cnt=+document.getElementById('cCnt').value||1;
  addM(r,rate,cnt);
}
function render(){
  document.getElementById('members').innerHTML=crew.map((m,i)=>
    `<div class="member"><span>${m.role} × ${m.cnt} — $${m.rate}/hr</span><button class="sm" onclick="removeM(${i})">✕</button></div>`
  ).join('');
}
function calc(){
  const burden=+document.getElementById('burden').value/100;
  const prod=+document.getElementById('prod').value/100;
  document.getElementById('burdenV').textContent=Math.round(burden*100)+'%';
  document.getElementById('prodV').textContent=prod.toFixed(2);
  const totalPeople=crew.reduce((s,m)=>s+m.cnt,0);
  const totalRate=crew.reduce((s,m)=>s+m.rate*m.cnt,0);
  const baseHr=totalPeople?totalRate:0;
  const burHr=baseHr*(1+burden);
  const effHr=prod>0?burHr/prod:0;
  document.getElementById('baseHr').textContent='$'+baseHr.toFixed(0);
  document.getElementById('burHr').textContent='$'+burHr.toFixed(0);
  document.getElementById('effHr').textContent='$'+effHr.toFixed(0);
  document.getElementById('daily').textContent='$'+(effHr*8).toFixed(0);
  document.getElementById('weekly').textContent='$'+(effHr*40).toLocaleString(undefined,{maximumFractionDigits:0});
  document.getElementById('size').textContent=totalPeople;
}
calc();
</script>
</body>
</html>
