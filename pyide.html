<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Nyah's Python IDE 🐍</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/dracula.min.css"/>
  <style>
    :root {
      --bg: #0f0f10;
      --bg2: #1a1a1c;
      --bg3: #282a36;
      --border: #2a2a2d;
      --text: #f0f0f0;
      --dim: #6e6e73;
      --green: #4ade80;
      --green-dark: #22c55e;
      --red: #f87171;
      --yellow: #facc15;
      --purple: #a78bfa;
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); }
    body { display: flex; flex-direction: column; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-left a {
      font-size: 0.75rem; color: var(--dim); text-decoration: none;
      font-family: var(--font-mono); letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    .header-left a:hover { color: var(--green); }
    .header-title {
      font-size: clamp(1rem, 4vw, 1.3rem); font-weight: 800;
      background: linear-gradient(135deg, var(--green), var(--yellow), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-wrap: wrap; flex-shrink: 0;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text); font-family: var(--font-mono);
      font-size: 0.75rem; cursor: pointer; transition: all 0.15s;
      white-space: nowrap; min-height: 38px;
    }
    .btn:hover { border-color: var(--green); background: rgba(74,222,128,0.08); }
    .btn:active { transform: scale(0.97); }
    .btn-run {
      background: var(--green); color: #0a0a0a; border-color: var(--green);
      font-weight: 700; font-size: 0.85rem; padding: 0.5rem 1.5rem;
    }
    .btn-run:hover { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-clear { color: var(--dim); }
    .btn-clear:hover { color: var(--red); border-color: var(--red); background: rgba(248,113,113,0.08); }

    .separator { width: 1px; height: 24px; background: var(--border); margin: 0 0.25rem; }

    .examples-label {
      font-size: 0.6rem; font-family: var(--font-mono); color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .btn-example { font-size: 0.7rem; padding: 0.4rem 0.75rem; }

    /* Main area */
    .main { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    /* Editor */
    .editor-wrap {
      flex: 1; min-height: 200px; position: relative;
      border-bottom: 2px solid var(--green);
    }
    .CodeMirror {
      height: 100% !important; font-size: 14px; font-family: var(--font-mono) !important;
      line-height: 1.6 !important;
    }

    /* Console */
    .console-wrap {
      flex: 0 0 35%; min-height: 120px; display: flex; flex-direction: column;
      background: var(--bg3);
    }
    .console-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.4rem 1rem;
      background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border);
      font-family: var(--font-mono); font-size: 0.7rem; color: var(--dim);
      flex-shrink: 0;
    }
    .console-output {
      flex: 1; overflow-y: auto; padding: 0.75rem 1rem;
      font-family: var(--font-mono); font-size: 0.82rem; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }
    .console-output .error { color: var(--red); }
    .console-output .info { color: var(--dim); font-style: italic; }
    .console-output .success { color: var(--green); }

    /* Loading overlay */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(15,15,16,0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem; transition: opacity 0.4s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-snake { font-size: 4rem; animation: bounce 0.8s ease-in-out infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-16px); } }
    .loading-text {
      font-family: var(--font-mono); font-size: 1rem; color: var(--dim);
      text-align: center; line-height: 1.8;
    }
    .loading-bar-outer {
      width: 260px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .loading-bar-inner {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--yellow));
      border-radius: 3px; transition: width 0.3s;
    }

    /* Footer */
    .footer {
      padding: 0.5rem 1rem; text-align: center;
      font-size: 0.65rem; color: var(--dim); font-family: var(--font-mono);
      background: var(--bg2); border-top: 1px solid var(--border);
      flex-shrink: 0; letter-spacing: 0.04em;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .toolbar { padding: 0.5rem 0.75rem; gap: 0.35rem; }
      .btn { padding: 0.45rem 0.7rem; font-size: 0.7rem; min-height: 36px; }
      .btn-run { padding: 0.45rem 1rem; font-size: 0.8rem; }
      .separator { display: none; }
      .examples-label { width: 100%; margin-top: 0.25rem; }
      .header { padding: 0.6rem 0.75rem; }
      .CodeMirror { font-size: 13px; }
      .console-output { font-size: 0.75rem; }
      .editor-wrap { min-height: 180px; }
    }

    /* Resize handle */
    .resize-handle {
      height: 6px; cursor: row-resize; background: transparent;
      position: relative; flex-shrink: 0;
    }
    .resize-handle::after {
      content: ''; position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 3px; background: var(--dim); border-radius: 2px;
      opacity: 0.4; transition: opacity 0.2s;
    }
    .resize-handle:hover::after { opacity: 0.8; }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-snake">🐍</div>
  <div class="loading-text">
    Loading Python engine...<br/>
    <span style="font-size:0.75rem;">(~10 MB first time, then it's cached)</span>
  </div>
  <div class="loading-bar-outer">
    <div class="loading-bar-inner" id="loadingBar"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <a href="index.html">← taskiap</a>
    <span class="header-title">Nyah's Python IDE 🐍</span>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn btn-run" id="btnRun" disabled onclick="runCode()">Run ▶</button>
  <button class="btn btn-clear" onclick="clearConsole()">Clear</button>

  <div class="separator"></div>

  <span class="examples-label">Examples:</span>
  <button class="btn btn-example" onclick="loadExample('hello')">Hello World</button>
  <button class="btn btn-example" onclick="loadExample('fibonacci')">Fibonacci</button>
  <button class="btn btn-example" onclick="loadExample('guess')">Guess the Number</button>
  <button class="btn btn-example" onclick="loadExample('drawing')">Drawing with Loops</button>
  <button class="btn btn-example" onclick="loadExample('calculator')">Calculator</button>
</div>

<!-- Main: editor + console -->
<div class="main">
  <div class="editor-wrap">
    <textarea id="code"></textarea>
  </div>
  <div class="resize-handle" id="resizeHandle"></div>
  <div class="console-wrap" id="consoleWrap">
    <div class="console-header">
      <span>OUTPUT</span>
      <span id="runStatus"></span>
    </div>
    <div class="console-output" id="output"></div>
  </div>
</div>

<!-- Footer -->
<div class="footer">made for Nyah 💜 · taskiap.com</div>

<!-- CodeMirror -->
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.min.js"></script>

<script>
// ── Examples ──
const examples = {
  hello: `# 👋 Hello World!
name = "Nyah"
print(f"Hello, {name}! 🐍")
print(f"Welcome to your Python IDE! 🎉")
print()
print("Fun fact:")
for i in range(5):
    print("⭐" * (i + 1))
print()
print(f"{name} is awesome! 💜")`,

  fibonacci: `# 🔢 Fibonacci Numbers
# Each number is the sum of the two before it!

print("✨ The First 20 Fibonacci Numbers ✨")
print("=" * 40)

a, b = 0, 1
for i in range(1, 21):
    print(f"  #{i:>2}  →  {a}")
    a, b = b, a + b

print("=" * 40)
print(f"\\nThe 20th Fibonacci number is: {a}")
print(f"That's a big number! 🤯")`,

  guess: `# 🎲 Guess the Number Game
import random

print("🎲 GUESS THE NUMBER 🎲")
print("I'm thinking of a number between 1 and 20...")
print()

secret = random.randint(1, 20)
attempts = 0

while True:
    guess = input("Your guess: ")
    try:
        guess = int(guess)
    except ValueError:
        print("❌ That's not a number! Try again.")
        continue

    attempts += 1

    if guess < secret:
        print("⬆️  Too low! Try higher.")
    elif guess > secret:
        print("⬇️  Too high! Try lower.")
    else:
        print(f"\\n🎉 YOU GOT IT! The number was {secret}!")
        print(f"It took you {attempts} {'attempt' if attempts == 1 else 'attempts'}!")
        if attempts <= 3:
            print("🏆 Amazing! You're a genius!")
        elif attempts <= 5:
            print("⭐ Great job!")
        else:
            print("👍 Nice, you got there!")
        break`,

  drawing: `# 🎨 Drawing with Loops
# Making cool patterns with characters!

print("🎄 Christmas Tree:")
for i in range(1, 10):
    spaces = " " * (9 - i)
    stars = "⭐" * (2 * i - 1)
    print(spaces + stars)
print("    " + "🟫" * 3)
print()

print("💎 Diamond:")
n = 5
for i in range(1, n + 1):
    print(" " * (n - i) + "✨" * (2 * i - 1))
for i in range(n - 1, 0, -1):
    print(" " * (n - i) + "✨" * (2 * i - 1))
print()

print("🌊 Wave Pattern:")
import math
for y in range(20):
    x = int((math.sin(y * 0.5) + 1) * 15)
    print(" " * x + "🔵")
print()

print("🏁 Checkerboard:")
for row in range(8):
    line = ""
    for col in range(8):
        if (row + col) % 2 == 0:
            line += "⬜"
        else:
            line += "⬛"
    print(line)`,

  calculator: `# 🧮 Simple Calculator
print("🧮 NYAH'S CALCULATOR 🧮")
print("=" * 30)
print()

num1 = input("Enter first number: ")
num1 = float(num1)

print("\\nOperations:")
print("  + Add")
print("  - Subtract")
print("  * Multiply")
print("  / Divide")
print("  ** Power")
print()

op = input("Pick an operation (+, -, *, /, **): ")

num2 = input("Enter second number: ")
num2 = float(num2)

print()
if op == "+":
    result = num1 + num2
    print(f"  {num1} + {num2} = {result}")
elif op == "-":
    result = num1 - num2
    print(f"  {num1} - {num2} = {result}")
elif op == "*":
    result = num1 * num2
    print(f"  {num1} × {num2} = {result}")
elif op == "/":
    if num2 == 0:
        print("  ❌ Can't divide by zero!")
    else:
        result = num1 / num2
        print(f"  {num1} ÷ {num2} = {result}")
elif op == "**":
    result = num1 ** num2
    print(f"  {num1} ^ {num2} = {result}")
else:
    print(f"  ❓ Unknown operation: {op}")

print("\\n✅ Done! Run again to try another calculation.")`
};

// ── Editor setup ──
const editor = CodeMirror.fromTextArea(document.getElementById('code'), {
  mode: 'python',
  theme: 'dracula',
  lineNumbers: true,
  indentUnit: 4,
  tabSize: 4,
  indentWithTabs: false,
  lineWrapping: true,
  matchBrackets: true,
  autoCloseBrackets: true,
  extraKeys: {
    'Ctrl-Enter': runCode,
    'Cmd-Enter': runCode,
    'Tab': function(cm) {
      cm.replaceSelection('    ', 'end');
    }
  }
});

// Load saved code or default
const savedCode = localStorage.getItem('nyah-pyide-code');
if (savedCode !== null) {
  editor.setValue(savedCode);
} else {
  editor.setValue(examples.hello);
}

// Auto-save on change
editor.on('change', () => {
  localStorage.setItem('nyah-pyide-code', editor.getValue());
});

// ── Console helpers ──
const outputEl = document.getElementById('output');
const statusEl = document.getElementById('runStatus');

function appendOutput(text, className) {
  const span = document.createElement('span');
  if (className) span.className = className;
  span.textContent = text;
  outputEl.appendChild(span);
  outputEl.scrollTop = outputEl.scrollHeight;
}

function clearConsole() {
  outputEl.innerHTML = '';
  statusEl.textContent = '';
}

// ── Load example ──
function loadExample(name) {
  if (examples[name]) {
    editor.setValue(examples[name]);
    localStorage.setItem('nyah-pyide-code', examples[name]);
    clearConsole();
    appendOutput('📝 Loaded: ' + name + '\n', 'info');
  }
}

// ── Pyodide ──
let pyodide = null;
let isRunning = false;

async function initPyodide() {
  const bar = document.getElementById('loadingBar');
  const overlay = document.getElementById('loadingOverlay');

  // Simulate progress while loading
  let progress = 0;
  const progressInterval = setInterval(() => {
    progress = Math.min(progress + Math.random() * 8, 90);
    bar.style.width = progress + '%';
  }, 200);

  try {
    pyodide = await loadPyodide({
      indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/'
    });

    // Patch input() to use window.prompt()
    pyodide.runPython(`
import sys
from io import StringIO

def _patched_input(prompt=""):
    import js
    result = js.prompt_for_python(prompt)
    if result is None:
        raise EOFError("Input cancelled")
    return result

__builtins__.input = _patched_input
`);

    clearInterval(progressInterval);
    bar.style.width = '100%';

    setTimeout(() => {
      overlay.classList.add('hidden');
      document.getElementById('btnRun').disabled = false;
    }, 400);

    appendOutput('🐍 Python is ready! Click Run ▶ or press Ctrl+Enter\n', 'success');

  } catch (err) {
    clearInterval(progressInterval);
    overlay.classList.add('hidden');
    appendOutput('❌ Failed to load Python engine: ' + err.message + '\n', 'error');
  }
}

// Expose prompt helper to JS so Python can call it
window.prompt_for_python = function(promptText) {
  const result = window.prompt(promptText || 'Input:');
  if (result !== null) {
    appendOutput(promptText + result + '\n', '');
  }
  return result;
};

// ── Run code ──
async function runCode() {
  if (!pyodide || isRunning) return;

  isRunning = true;
  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  btn.textContent = 'Running...';
  statusEl.textContent = '⏱ running...';

  clearConsole();

  const code = editor.getValue();
  const start = performance.now();

  try {
    // Redirect stdout
    pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
`);

    // Run the user code
    await pyodide.runPythonAsync(code);

    // Get stdout
    const stdout = pyodide.runPython('sys.stdout.getvalue()');
    const stderr = pyodide.runPython('sys.stderr.getvalue()');

    if (stdout) appendOutput(stdout, '');
    if (stderr) appendOutput(stderr, 'error');

    const elapsed = ((performance.now() - start) / 1000).toFixed(2);
    statusEl.textContent = '✅ done in ' + elapsed + 's';

  } catch (err) {
    let msg = err.message || String(err);
    // Clean up Pyodide traceback noise
    const pyErr = msg.split('\n').filter(line =>
      !line.includes('pyodide') && !line.includes('wasm')
    ).join('\n').trim();
    appendOutput((pyErr || msg) + '\n', 'error');
    statusEl.textContent = '❌ error';
  } finally {
    // Restore stdout/stderr
    try {
      pyodide.runPython(`
import sys
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
`);
    } catch (e) {}

    isRunning = false;
    btn.disabled = false;
    btn.textContent = 'Run ▶';
  }
}

// ── Resize handle ──
(function() {
  const handle = document.getElementById('resizeHandle');
  const mainEl = document.querySelector('.main');
  const editorWrap = document.querySelector('.editor-wrap');
  const consoleWrap = document.getElementById('consoleWrap');
  let startY, startEditorH, startConsoleH;

  handle.addEventListener('mousedown', startResize);
  handle.addEventListener('touchstart', startResize, { passive: false });

  function startResize(e) {
    e.preventDefault();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startY = clientY;
    startEditorH = editorWrap.offsetHeight;
    startConsoleH = consoleWrap.offsetHeight;
    document.addEventListener('mousemove', doResize);
    document.addEventListener('mouseup', stopResize);
    document.addEventListener('touchmove', doResize, { passive: false });
    document.addEventListener('touchend', stopResize);
  }

  function doResize(e) {
    e.preventDefault();
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dy = clientY - startY;
    const newEditorH = Math.max(100, startEditorH + dy);
    const newConsoleH = Math.max(80, startConsoleH - dy);
    editorWrap.style.flex = 'none';
    editorWrap.style.height = newEditorH + 'px';
    consoleWrap.style.flex = 'none';
    consoleWrap.style.height = newConsoleH + 'px';
    editor.refresh();
  }

  function stopResize() {
    document.removeEventListener('mousemove', doResize);
    document.removeEventListener('mouseup', stopResize);
    document.removeEventListener('touchmove', doResize);
    document.removeEventListener('touchend', stopResize);
  }
})();

// ── Keyboard shortcut ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

// ── Load Pyodide ──
</script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<script>initPyodide();</script>
</body>
</html>
