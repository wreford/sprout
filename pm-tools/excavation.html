<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Excavation Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:600px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px;display:inline-block;margin-bottom:12px}
h1{font-size:20px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;color:var(--dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px}
.row{display:flex;gap:10px}.row>*{flex:1}
.result{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px}
.result .val{font-size:22px;font-weight:700;color:var(--accent)}.result .lbl{font-size:12px;color:var(--dim)}
.result.green .val{color:var(--green)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<a class="home" href="../index.html">← home</a>
<h1>Excavation Calculator</h1>

<div class="card">
<h2>Excavation Dimensions</h2>
<div class="row">
<div><label>Length (ft)</label><input type="number" id="len" value="50" oninput="calc()"></div>
<div><label>Width (ft)</label><input type="number" id="wid" value="30" oninput="calc()"></div>
</div>
<div class="row">
<div><label>Depth (ft)</label><input type="number" id="dep" value="6" oninput="calc()"></div>
<div><label>Side Slope H:V</label><input type="number" id="slope" value="1.5" step="0.1" oninput="calc()"></div>
</div>
<label>Soil Type (Swell Factor)</label>
<select id="swell" onchange="calc()">
<option value="0.10">Sand (+10%)</option>
<option value="0.30" selected>Clay (+30%)</option>
<option value="0.50">Rock (+50%)</option>
</select>
</div>

<div class="card">
<h2>Results</h2>
<div class="grid">
<div class="result"><div class="lbl">Bank Cubic Yards</div><div class="val" id="bankCY">—</div></div>
<div class="result"><div class="lbl">Loose Cubic Yards</div><div class="val" id="looseCY">—</div></div>
<div class="result"><div class="lbl">Truck Loads (12 yd³)</div><div class="val" id="trucks">—</div></div>
<div class="result green"><div class="lbl">Est. Volume (ft³)</div><div class="val" id="volFt">—</div></div>
</div>
</div>

<div class="card">
<h2>Cut / Fill Comparison</h2>
<div class="row">
<div><label>Cut Volume (yd³)</label><input type="number" id="cutVol" value="0" oninput="calcCF()"></div>
<div><label>Fill Volume (yd³)</label><input type="number" id="fillVol" value="0" oninput="calcCF()"></div>
</div>
<div class="result" id="cfResult"><div class="lbl">Net</div><div class="val">—</div></div>
</div>

<div class="card">
<h2>Cost Estimate</h2>
<label>Cost per yd³ ($)</label>
<input type="number" id="costYd" value="12" oninput="calc()">
<div class="row" style="margin-top:10px">
<div class="result"><div class="lbl">Bank Cost</div><div class="val" id="costBank">—</div></div>
<div class="result"><div class="lbl">Loose Cost</div><div class="val" id="costLoose">—</div></div>
</div>
</div>

<script>
function calc(){
  const L=+document.getElementById('len').value, W=+document.getElementById('wid').value;
  const D=+document.getElementById('dep').value, S=+document.getElementById('slope').value;
  const sw=+document.getElementById('swell').value, cost=+document.getElementById('costYd').value;
  const topL=L+2*S*D, topW=W+2*S*D;
  const vol=(D/6)*(L*W+(L+topL)*(W+topW)/4+topL*topW);
  const bankCY=vol/27;
  const looseCY=bankCY*(1+sw);
  const trucks=Math.ceil(looseCY/12);
  document.getElementById('volFt').textContent=Math.round(vol).toLocaleString();
  document.getElementById('bankCY').textContent=Math.round(bankCY).toLocaleString();
  document.getElementById('looseCY').textContent=Math.round(looseCY).toLocaleString();
  document.getElementById('trucks').textContent=trucks;
  document.getElementById('costBank').textContent='$'+Math.round(bankCY*cost).toLocaleString();
  document.getElementById('costLoose').textContent='$'+Math.round(looseCY*cost).toLocaleString();
}
function calcCF(){
  const c=+document.getElementById('cutVol').value, f=+document.getElementById('fillVol').value;
  const net=c-f, el=document.getElementById('cfResult');
  if(net>0) el.innerHTML='<div class="lbl">Net CUT</div><div class="val" style="color:var(--accent)">'+Math.abs(net)+' yd³ excess</div>';
  else if(net<0) el.innerHTML='<div class="lbl">Net FILL</div><div class="val" style="color:var(--green)">'+Math.abs(net)+' yd³ needed</div>';
  else el.innerHTML='<div class="lbl">Net</div><div class="val">Balanced</div>';
}
calc();
</script>
</body>
</html>
