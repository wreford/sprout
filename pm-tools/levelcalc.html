<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surveying Level Calculator</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px}
a{color:var(--accent);text-decoration:none}h1{font-size:1.3rem}.bar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.form{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:end}
label{font-size:.75rem;color:var(--dim);display:flex;flex-direction:column;gap:2px}
input{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:5px 7px;border-radius:6px;font-size:.83rem;width:90px}
button{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.83rem}
button.sec{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.8rem;margin-bottom:10px}th,td{border:1px solid var(--border);padding:5px 7px;text-align:right}
th{background:var(--bg2);color:var(--accent);font-weight:600;text-align:center}
.cut{color:var(--accent)}.fill{color:var(--green)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:10px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat span{display:block;font-size:1.1rem;font-weight:700;color:var(--accent)}.stat small{color:var(--dim);font-size:.72rem}
canvas{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:100%;max-width:800px;display:block;margin:0 auto}
</style></head><body>
<div class="bar"><a href="../index.html">← home</a><h1>Surveying Level Calculator</h1></div>
<div class="form">
<label>Benchmark Elev (m)<input id="bm" type="number" step="0.001" value="100.000"></label>
<label>Design Elev (m)<input id="design" type="number" step="0.001" value="100.500"></label>
<label>Tolerance (mm)<input id="tol" type="number" value="12"></label>
</div>
<div class="form">
<label>Station<input id="sta" placeholder="0+000"></label>
<label>BS (m)<input id="bs" type="number" step="0.001"></label>
<label>FS (m)<input id="fs" type="number" step="0.001"></label>
<button onclick="addReading()">Add Reading</button>
<button class="sec" onclick="clearAll()">Clear</button>
</div>
<table><thead><tr><th>Stn</th><th>BS</th><th>HI</th><th>FS</th><th>Elevation</th><th>Design</th><th>Cut/Fill</th></tr></thead><tbody id="tbody"></tbody>
<tfoot id="tfoot"></tfoot></table>
<div class="stats">
<div class="stat"><small>Sum BS</small><span id="sBS">0.000</span></div>
<div class="stat"><small>Sum FS</small><span id="sFS">0.000</span></div>
<div class="stat"><small>Closing Error</small><span id="sErr">0.000 mm</span></div>
<div class="stat"><small>Tolerance</small><span id="sTol">OK</span></div>
</div>
<canvas id="cv" width="800" height="180"></canvas>
<p style="color:var(--dim);font-size:.72rem;text-align:center;margin-top:4px">Elevation Profile</p>
<script>
let readings=[];
function addReading(){const sta=document.getElementById('sta').value.trim(),bs=document.getElementById('bs').value,fs=document.getElementById('fs').value;
if(!sta){alert('Enter station');return}
const r={sta,bs:bs?parseFloat(bs):null,fs:fs?parseFloat(fs):null};readings.push(r);calc();
document.getElementById('sta').value='';document.getElementById('bs').value='';document.getElementById('fs').value='';document.getElementById('sta').focus()}
function calc(){const bm=parseFloat(document.getElementById('bm').value),design=parseFloat(document.getElementById('design').value),tolMM=parseFloat(document.getElementById('tol').value);
let hi=null,elev=bm,sumBS=0,sumFS=0,elevs=[];
const tbody=document.getElementById('tbody');tbody.innerHTML='';
readings.forEach((r,i)=>{let rowElev=null,rowHI=null;
if(i===0&&r.bs!==null){hi=bm+r.bs;rowHI=hi;rowElev=bm;sumBS+=r.bs}
else if(r.bs!==null&&r.fs!==null){elev=hi-r.fs;sumFS+=r.fs;rowElev=elev;hi=elev+r.bs;rowHI=hi;sumBS+=r.bs}
else if(r.fs!==null&&hi!==null){elev=hi-r.fs;sumFS+=r.fs;rowElev=elev}
else if(r.bs!==null){hi=elev+r.bs;rowHI=hi;rowElev=elev;sumBS+=r.bs}
const cf=rowElev!==null?design-rowElev:null;
elevs.push({sta:r.sta,elev:rowElev});
const cfClass=cf!==null?(cf>0?'cut':'fill'):'';
const cfTxt=cf!==null?(cf>0?'Cut ':'Fill ')+Math.abs(cf).toFixed(3)+' m':'—';
tbody.innerHTML+=`<tr><td style="text-align:left">${r.sta}</td><td>${r.bs!==null?r.bs.toFixed(3):'—'}</td><td>${rowHI!==null?rowHI.toFixed(3):'—'}</td><td>${r.fs!==null?r.fs.toFixed(3):'—'}</td><td>${rowElev!==null?rowElev.toFixed(3):'—'}</td><td>${design.toFixed(3)}</td><td class="${cfClass}">${cfTxt}</td></tr>`});
document.getElementById('sBS').textContent=sumBS.toFixed(3);
document.getElementById('sFS').textContent=sumFS.toFixed(3);
const lastElev=elevs.filter(e=>e.elev!==null).pop();
const err=lastElev?(sumBS-sumFS)-(lastElev.elev-bm):0;
const errMM=Math.abs(err*1000);
document.getElementById('sErr').textContent=errMM.toFixed(1)+' mm';
document.getElementById('sErr').style.color=errMM<=tolMM?'var(--green)':'#ef4444';
document.getElementById('sTol').textContent=errMM<=tolMM?'OK':'EXCEEDS';
document.getElementById('sTol').style.color=errMM<=tolMM?'var(--green)':'#ef4444';
drawProfile(elevs,design)}
function drawProfile(elevs,design){const cv=document.getElementById('cv'),ctx=cv.getContext('2d');ctx.clearRect(0,0,800,180);
const pts=elevs.filter(e=>e.elev!==null);if(pts.length<2)return;
const minE=Math.min(...pts.map(p=>p.elev),design)-0.5,maxE=Math.max(...pts.map(p=>p.elev),design)+0.5;
const sx=i=>30+i/(pts.length-1)*740,sy=e=>160-(e-minE)/(maxE-minE)*140;
ctx.strokeStyle='#4ade80';ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(30,sy(design));ctx.lineTo(770,sy(design));ctx.stroke();ctx.setLineDash([]);
ctx.fillStyle='var(--dim)';ctx.font='10px system-ui';ctx.fillText('Design '+design.toFixed(3),772,sy(design)+3);
ctx.beginPath();ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;pts.forEach((p,i)=>{i===0?ctx.moveTo(sx(i),sy(p.elev)):ctx.lineTo(sx(i),sy(p.elev))});ctx.stroke();
pts.forEach((p,i)=>{ctx.beginPath();ctx.arc(sx(i),sy(p.elev),4,0,Math.PI*2);ctx.fillStyle='#ff6b35';ctx.fill();
ctx.fillStyle='#f0f0f0';ctx.font='9px system-ui';ctx.fillText(p.elev.toFixed(3),sx(i)-15,sy(p.elev)-8);
ctx.fillStyle='#6e6e73';ctx.fillText(p.sta,sx(i)-10,172)})}
function clearAll(){readings=[];document.getElementById('tbody').innerHTML='';document.getElementById('cv').getContext('2d').clearRect(0,0,800,180);
['sBS','sFS'].forEach(id=>document.getElementById(id).textContent='0.000');document.getElementById('sErr').textContent='0.0 mm';document.getElementById('sTol').textContent='OK'}
</script></body></html>
