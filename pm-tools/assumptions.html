<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assumptions Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px;cursor:pointer}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
textarea{min-height:60px}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-red{background:#ef4444}
.btn-gold{background:#f7c948;color:#000}
.btn:active{opacity:.8}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;margin-bottom:12px}
.stat{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:8px;padding:12px;text-align:center}
.stat .v{font-size:1.4rem;font-weight:700}
.stat .l{font-size:.7rem;color:#999;margin-top:2px}
.a-card{background:#1a1a1c;border-left:4px solid;border-radius:8px;padding:12px;margin-bottom:8px;transition:all .2s}
.a-card.Active{border-color:#f7c948}.a-card.Validated{border-color:#4ade80}.a-card.Invalid{border-color:#ef4444}
.a-card .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.a-card .desc{font-size:.9rem;margin:6px 0}
.a-card .meta{font-size:.75rem;color:#999;display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;background:#2a2a2d}
.del{background:none;border:none;color:#ef4444;font-size:1.1rem;cursor:pointer;padding:4px 8px}
.collapse{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse.open{max-height:600px}
.impact-High{color:#ef4444}.impact-Medium{color:#f7c948}.impact-Low{color:#4ade80}
@media print{body{background:#fff;color:#000}.card,.a-card,.stat{border-color:#ccc;break-inside:avoid}.btn,.del,.home-link{display:none!important}}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Assumptions Log</h1>
<button class="btn btn-sm btn-green" onclick="exportData()">Export</button>
</div>
<div class="stats" id="stats"></div>
<div class="card">
<h2 onclick="toggleForm()">&#43; Add Assumption &#9662;</h2>
<div class="collapse" id="formWrap">
<div class="row"><div class="field"><label>Description</label><textarea id="aDesc"></textarea></div></div>
<div class="row">
<div class="field"><label>Category</label><select id="aCat"><option>Cost</option><option>Schedule</option><option>Scope</option><option>Resource</option><option>Technical</option></select></div>
<div class="field"><label>Status</label><select id="aStat"><option>Active</option><option>Validated</option><option>Invalid</option></select></div>
<div class="field"><label>Impact if Wrong</label><select id="aImp"><option>Low</option><option>Medium</option><option>High</option></select></div>
</div>
<div class="row">
<div class="field"><label>Owner</label><input id="aOwn"></div>
<div class="field"><label>Validation Date</label><input type="date" id="aDate"></div>
</div>
<div class="row"><div class="field"><label>Notes</label><textarea id="aNotes"></textarea></div></div>
<button class="btn" onclick="addItem()">Add Assumption</button>
</div>
</div>
<div id="list"></div>
<script>
const KEY='assumptions-log';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items))}
function toggleForm(){document.getElementById('formWrap').classList.toggle('open')}
function addItem(){
 const d=document.getElementById('aDesc').value.trim();if(!d)return;
 items.push({id:Date.now(),desc:d,cat:document.getElementById('aCat').value,
  status:document.getElementById('aStat').value,impact:document.getElementById('aImp').value,
  owner:document.getElementById('aOwn').value.trim(),vdate:document.getElementById('aDate').value,
  notes:document.getElementById('aNotes').value.trim()});
 save();['aDesc','aOwn','aNotes'].forEach(x=>document.getElementById(x).value='');
 document.getElementById('aDate').value='';render();
}
function delItem(id){items=items.filter(a=>a.id!==id);save();render()}
function changeStatus(id,s){const a=items.find(x=>x.id===id);if(a){a.status=s;save();render()}}
function toRisk(id){
 const a=items.find(x=>x.id===id);if(!a)return;
 const risks=JSON.parse(localStorage.getItem('risk-register')||'[]');
 risks.push({id:Date.now(),desc:'[From Assumption] '+a.desc,cat:'Technical',
  lik:a.impact==='High'?4:a.impact==='Medium'?3:2,imp:a.impact==='High'?4:a.impact==='Medium'?3:2,
  score:(a.impact==='High'?4:a.impact==='Medium'?3:2)**2,mit:'',owner:a.owner,status:'Open'});
 localStorage.setItem('risk-register',JSON.stringify(risks));
 alert('Assumption copied to Risk Register');
}
const impOrd={High:3,Medium:2,Low:1};
function render(){
 const sorted=[...items].sort((a,b)=>(impOrd[b.impact]||0)-(impOrd[a.impact]||0));
 const act=items.filter(a=>a.status==='Active').length,val=items.filter(a=>a.status==='Validated').length,inv=items.filter(a=>a.status==='Invalid').length;
 document.getElementById('stats').innerHTML=`<div class="stat"><div class="v" style="color:#ff6b35">${items.length}</div><div class="l">Total</div></div>
  <div class="stat"><div class="v" style="color:#f7c948">${act}</div><div class="l">Active</div></div>
  <div class="stat"><div class="v" style="color:#4ade80">${val}</div><div class="l">Validated</div></div>
  <div class="stat"><div class="v" style="color:#ef4444">${inv}</div><div class="l">Invalid</div></div>`;
 document.getElementById('list').innerHTML=sorted.map(a=>`<div class="a-card ${a.status}">
  <div class="top"><div><span class="badge">${a.cat}</span> <span class="badge impact-${a.impact}">${a.impact} Impact</span></div>
  <div><select onchange="changeStatus(${a.id},this.value)" style="padding:6px;background:#0f0f10;border:1px solid #2a2a2d;border-radius:4px;color:#e0e0e0;font-size:.8rem">
  ${['Active','Validated','Invalid'].map(s=>`<option${a.status===s?' selected':''}>${s}</option>`).join('')}</select>
  <button class="del" onclick="delItem(${a.id})">&#10005;</button></div></div>
  <div class="desc">${a.desc}</div>
  ${a.notes?'<div class="desc" style="color:#999">'+a.notes+'</div>':''}
  <div class="meta">${a.owner?'<span>Owner: '+a.owner+'</span>':''}${a.vdate?'<span>Validate by: '+a.vdate+'</span>':''}</div>
  <div style="margin-top:6px"><button class="btn btn-sm btn-gold" onclick="toRisk(${a.id})">Convert to Risk</button></div>
  </div>`).join('');
}
function exportData(){
 let t='ASSUMPTIONS LOG\n'+new Date().toLocaleDateString()+'\n\n';
 items.forEach((a,i)=>{t+=`${i+1}. ${a.desc}\n   Category:${a.cat} | Status:${a.status} | Impact:${a.impact}\n`;
  if(a.owner)t+=`   Owner: ${a.owner}\n`;if(a.notes)t+=`   Notes: ${a.notes}\n`;t+='\n';});
 navigator.clipboard.writeText(t).then(()=>alert('Copied to clipboard'));
}
render();
</script>
</body>
</html>
