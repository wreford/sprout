<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Building Energy Estimator</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:900px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:1.3em;margin:8px 0 12px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.field{flex:1;min-width:140px}
label{display:block;font-size:12px;color:var(--dim);margin-bottom:3px}
select,input{width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px}
button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:8px 4px 8px 0}
button:hover{opacity:.85}
.results{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0}
.bar-row{display:flex;align-items:center;margin:4px 0;font-size:13px}
.bar-label{width:100px;color:var(--dim)}.bar{height:18px;border-radius:4px;margin:0 8px;transition:width .4s}
canvas{width:100%;max-width:880px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-top:10px}
.cost{font-size:15px;margin:6px 0;color:var(--green)}
</style></head><body>
<a href="../index.html" class="home">← home</a>
<h1>Building Energy Estimator</h1>
<div class="row">
 <div class="field"><label>Area (m²)</label><input id="area" type="number" value="2000"></div>
 <div class="field"><label>Building Type</label><select id="btype"><option value="office">Office</option><option value="retail">Retail</option><option value="warehouse">Warehouse</option><option value="residential">Residential Multi</option><option value="school">School</option></select></div>
 <div class="field"><label>Climate Zone</label><select id="czone"><option value="6">Zone 6 (Southern ON)</option><option value="7a">Zone 7a (Northern ON)</option><option value="5">Zone 5 (Mild)</option><option value="8">Zone 8 (Arctic)</option></select></div>
</div>
<div class="row">
 <div class="field"><label>Wall R-value</label><input id="rwall" type="number" value="20"></div>
 <div class="field"><label>Roof R-value</label><input id="rroof" type="number" value="30"></div>
 <div class="field"><label>Window U-value</label><input id="uwin" type="number" value="1.6" step="0.1"></div>
 <div class="field"><label>Window-Wall Ratio %</label><input id="wwr" type="number" value="30"></div>
</div>
<button onclick="calc()">Calculate Energy</button>
<div class="results" id="res" style="display:none">
 <div id="bars"></div>
 <div id="cost"></div>
 <div id="rating"></div>
</div>
<canvas id="sankey" height="320"></canvas>
<script>
const typeData={office:{heat:0.18,cool:0.08,light:0.06,plug:0.05,dhw:0.02},retail:{heat:0.20,cool:0.10,light:0.08,plug:0.04,dhw:0.01},
warehouse:{heat:0.12,cool:0.03,light:0.03,plug:0.02,dhw:0.01},residential:{heat:0.22,cool:0.06,light:0.04,plug:0.04,dhw:0.06},
school:{heat:0.19,cool:0.07,light:0.05,plug:0.03,dhw:0.03}};
const czMult={'5':0.8,'6':1.0,'7a':1.25,'8':1.6};
const colors=['#ff6b35','#3b82f6','#facc15','#a78bfa','#22d3ee'];
const labels=['Heating','Cooling','Lighting','Plug Loads','DHW'];

function calc(){
 const A=+document.getElementById('area').value, bt=document.getElementById('btype').value;
 const cz=document.getElementById('czone').value, rw=+document.getElementById('rwall').value;
 const rr=+document.getElementById('rroof').value, uw=+document.getElementById('uwin').value;
 const wwr=+document.getElementById('wwr').value/100;
 const envFactor=(1/(rw/25))*(1/(rr/35))*(uw/1.4)*(wwr/0.3+0.7);
 const cm=czMult[cz]||1; const td=typeData[bt];
 const vals=[td.heat*A*cm*envFactor,td.cool*A*cm*0.8/envFactor,td.light*A,td.plug*A,td.dhw*A*cm*0.5];
 const total=vals.reduce((a,b)=>a+b,0);
 const totalGJ=total/277.78;
 let html='<b>Annual Energy: '+total.toFixed(0)+' kWh ('+totalGJ.toFixed(1)+' GJ)</b><br>';
 const mx=Math.max(...vals);
 vals.forEach((v,i)=>{
  const pct=(v/mx*100).toFixed(0);
  html+=`<div class="bar-row"><span class="bar-label">${labels[i]}</span><div class="bar" style="width:${pct}%;background:${colors[i]}">&nbsp;</div>${v.toFixed(0)} kWh (${(v/total*100).toFixed(0)}%)</div>`;
 });
 document.getElementById('bars').innerHTML=html;
 const gasCost=vals[0]/10.55*0.30; const elecCost=(vals[1]+vals[2]+vals[3])*0.13; const dhwCost=vals[4]/10.55*0.30;
 const tc=gasCost+elecCost+dhwCost;
 document.getElementById('cost').innerHTML=`<div class="cost">Est. Annual Cost: $${tc.toFixed(0)} (Gas $${gasCost.toFixed(0)} | Elec $${elecCost.toFixed(0)} | DHW $${dhwCost.toFixed(0)})</div>`;
 const eui=total/A;
 let grade=eui<120?'A (Excellent)':eui<180?'B (Good)':eui<250?'C (Average)':eui<350?'D (Below Avg)':'E (Poor)';
 document.getElementById('rating').innerHTML=`<span style="color:var(--dim)">EUI: ${eui.toFixed(0)} kWh/m² — EnerGuide Equivalent: <b style="color:var(--green)">${grade}</b></span>`;
 document.getElementById('res').style.display='block';
 drawSankey(vals,total);
}

function drawSankey(vals,total){
 const c=document.getElementById('sankey'), ctx=c.getContext('2d');
 c.width=c.offsetWidth*2;c.height=640;ctx.scale(2,2);
 const W=c.offsetWidth,H=320;
 ctx.clearRect(0,0,W,H);
 ctx.fillStyle='var(--bg2)';ctx.fillRect(0,0,W,H);
 const srcX=60,midX=W/2,endX=W-80,srcH=H-60;
 const sources=[{name:'Electricity',share:0,color:'#facc15'},{name:'Natural Gas',share:0,color:'#ff6b35'}];
 sources[1].share=vals[0]+vals[4]; sources[0].share=vals[1]+vals[2]+vals[3];
 const srcTotal=sources[0].share+sources[1].share;
 let sy=30;
 sources.forEach(s=>{
  const h=Math.max(10,(s.share/srcTotal)*srcH);
  s.y=sy;s.h=h;sy+=h+10;
  ctx.fillStyle=s.color;ctx.globalAlpha=0.85;
  ctx.fillRect(srcX-20,s.y,20,h);ctx.globalAlpha=1;
  ctx.fillStyle=s.color;ctx.font='11px system-ui';ctx.textAlign='right';
  ctx.fillText(s.name,srcX-24,s.y+h/2+4);
 });
 let ey=30;
 const ends=vals.map((v,i)=>{
  const h=Math.max(8,(v/srcTotal)*srcH);
  const o={y:ey,h,v,color:colors[i],name:labels[i]};ey+=h+8;return o;
 });
 ends.forEach(e=>{
  ctx.fillStyle=e.color;ctx.globalAlpha=0.85;
  ctx.fillRect(endX,e.y,20,e.h);ctx.globalAlpha=1;
  ctx.fillStyle=e.color;ctx.font='11px system-ui';ctx.textAlign='left';
  ctx.fillText(e.name+' '+e.v.toFixed(0)+' kWh',endX+26,e.y+e.h/2+4);
 });
 const mapping=[[1,0],[0,1],[0,2],[0,3],[1,4]];
 let srcOff=[0,0];
 mapping.forEach(([si,ei])=>{
  const s=sources[si],e=ends[ei];
  const h=e.h;
  ctx.beginPath();ctx.moveTo(srcX,s.y+srcOff[si]);
  ctx.bezierCurveTo(midX,s.y+srcOff[si],midX,e.y,endX,e.y);
  ctx.lineTo(endX,e.y+h);
  ctx.bezierCurveTo(midX,e.y+h,midX,s.y+srcOff[si]+h,srcX,s.y+srcOff[si]+h);
  ctx.closePath();ctx.fillStyle=e.color;ctx.globalAlpha=0.18;ctx.fill();
  ctx.strokeStyle=e.color;ctx.globalAlpha=0.5;ctx.lineWidth=0.5;ctx.stroke();
  ctx.globalAlpha=1;srcOff[si]+=h+2;
 });
}
window.onload=calc;window.onresize=()=>{const r=document.getElementById('res');if(r.style.display!=='none')calc();};
</script></body></html>
