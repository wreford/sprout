<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RFI Draft Generator</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px}
a{color:var(--accent);text-decoration:none}h1{font-size:1.3rem}
.bar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.form.full{grid-column:1/-1}
label{font-size:.8rem;color:var(--dim);display:flex;flex-direction:column;gap:3px}
input,textarea,select{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:6px 8px;border-radius:6px;font-size:.85rem;font-family:inherit}
textarea{min-height:60px;resize:vertical}
button{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:.85rem}
button.sec{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.preview{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:.85rem;line-height:1.6;white-space:pre-wrap;margin-bottom:12px;display:none}
.history{margin-top:12px}.history h3{font-size:.95rem;margin-bottom:6px}
.hitem{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:.8rem;cursor:pointer}
.hitem:hover{border-color:var(--accent)}.hitem small{color:var(--dim)}
@media(max-width:600px){.form{grid-template-columns:1fr}}
</style></head><body>
<div class="bar"><a href="../index.html">← home</a><h1>RFI Draft Generator</h1></div>
<div class="form">
<label>Project Name<input id="proj" placeholder="Highway 401 Expansion"></label>
<label>RFI Number<input id="rfiNo" readonly></label>
<label>Subject<input id="subj" placeholder="Foundation detail clarification"></label>
<label>Priority<select id="pri"><option>Urgent</option><option selected>High</option><option>Normal</option><option>Low</option></select></label>
<label>Drawing Reference<input id="dwg" placeholder="S-101 Detail 3"></label>
<label>Spec Reference<input id="spec" placeholder="Section 03 30 00"></label>
<label>Requested Response Date<input id="resp" type="date"></label>
<label>From (Your Name / Company)<input id="from" placeholder="J. Smith, ABC Contracting"></label>
<label style="grid-column:1/-1">Question / Request for Information<textarea id="question" rows="3" placeholder="Please clarify the reinforcing detail at the column-to-footing connection..."></textarea></label>
<label style="grid-column:1/-1">Suggested Answer (optional)<textarea id="suggested" rows="2" placeholder="We propose using a mechanical coupler per detail..."></textarea></label>
</div>
<div class="actions">
<button onclick="generate()">Generate RFI</button>
<button class="sec" onclick="copyRFI()">Copy to Clipboard</button>
<button class="sec" onclick="printRFI()">Print</button>
<button class="sec" onclick="clearForm()">Clear</button>
</div>
<div class="preview" id="preview"></div>
<div class="history"><h3>RFI History</h3><div id="hist"></div></div>
<script>
let rfis=JSON.parse(localStorage.getItem('rfis')||'[]');
function nextNo(){return'RFI-'+(String(rfis.length+1).padStart(3,'0'))}
document.getElementById('rfiNo').value=nextNo();
function generate(){const d={proj:gv('proj'),no:gv('rfiNo'),subj:gv('subj'),pri:gv('pri'),dwg:gv('dwg'),spec:gv('spec'),resp:gv('resp'),from:gv('from'),q:gv('question'),sug:gv('suggested'),date:new Date().toISOString().slice(0,10)};
if(!d.subj||!d.q){alert('Subject and Question are required');return}
const txt=formatRFI(d);document.getElementById('preview').style.display='block';document.getElementById('preview').textContent=txt;
d.txt=txt;rfis.push(d);localStorage.setItem('rfis',JSON.stringify(rfis));document.getElementById('rfiNo').value=nextNo();renderHist()}
function formatRFI(d){return`REQUEST FOR INFORMATION
${'='.repeat(50)}
RFI No:    ${d.no}
Date:      ${d.date}
Project:   ${d.proj}
From:      ${d.from}
Priority:  ${d.pri}
${'='.repeat(50)}

SUBJECT: ${d.subj}

Drawing Ref:  ${d.dwg||'N/A'}
Spec Ref:     ${d.spec||'N/A'}
Response By:  ${d.resp||'ASAP'}

${'─'.repeat(50)}
QUESTION / REQUEST:

${d.q}

${d.sug?`${'─'.repeat(50)}
SUGGESTED RESOLUTION:

${d.sug}
`:''}${'─'.repeat(50)}
RESPONSE (to be completed by design team):

______________________________________________________

______________________________________________________

Signature: _________________  Date: _______________

${'='.repeat(50)}
This RFI requires a written response. A response
constituting a change in scope may require a Change
Order. Distribution: Owner / Consultant / Contractor`}
function gv(id){return document.getElementById(id).value.trim()}
function copyRFI(){const t=document.getElementById('preview').textContent;if(!t)return;navigator.clipboard.writeText(t).then(()=>alert('Copied!'))}
function printRFI(){const w=window.open('','','width=700,height=900');w.document.write('<pre style="font-family:monospace;font-size:12px;padding:20px">'+document.getElementById('preview').textContent+'</pre>');w.document.close();w.print()}
function clearForm(){['proj','subj','dwg','spec','resp','from','question','suggested'].forEach(id=>document.getElementById(id).value='');document.getElementById('preview').style.display='none'}
function renderHist(){const el=document.getElementById('hist');el.innerHTML='';rfis.slice().reverse().forEach((r,i)=>{const d=document.createElement('div');d.className='hitem';d.innerHTML=`<strong>${r.no}</strong> — ${r.subj} <small>(${r.date}, ${r.pri})</small>`;d.onclick=()=>{document.getElementById('preview').style.display='block';document.getElementById('preview').textContent=r.txt};el.appendChild(d)})}
renderHist()
</script></body></html>
