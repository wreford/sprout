<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Porta-Potty Planner</title><style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:900px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:1.6em;margin:8px 0 4px}h1 span{font-size:1.4em}h2{font-size:1.1em;color:var(--accent);margin:16px 0 8px}
.row{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0}.col{flex:1;min-width:140px}
label{font-size:13px;color:var(--dim);display:block;margin-bottom:4px}
input[type=number]{width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:16px}
button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}button:hover{opacity:.85}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0}
.stat{text-align:center;padding:8px}.stat .num{font-size:1.8em;font-weight:700;color:var(--accent)}.stat .lbl{font-size:12px;color:var(--dim)}
canvas{border:1px solid var(--border);border-radius:8px;width:100%;max-width:500px;touch-action:none;cursor:crosshair;display:block;margin:8px auto}
.tip{padding:8px 12px;border-left:3px solid var(--accent);margin:6px 0;font-size:13px;background:var(--bg)}
.green{color:var(--green)}.cost{font-size:1.3em;font-weight:700;color:var(--green)}
</style></head><body>
<a class="home" href="../index.html">&larr; home</a>
<h1><span>&#x1f6bd;</span> Porta-Potty Planner</h1>
<p style="color:var(--dim);font-size:13px;margin-bottom:8px">OSHA-compliant throne logistics for your job site</p>
<div class="row">
<div class="col"><label>Workers on site</label><input type="number" id="workers" value="45" min="1" max="5000"></div>
<div class="col"><label>Shift length (hrs)</label><input type="number" id="shift" value="10" min="4" max="16"></div>
<div class="col"><label>Days between service</label><input type="number" id="svc" value="7" min="1" max="14"></div>
</div>
<button onclick="calc()" style="margin:8px 0">Calculate Throne Requirements</button>
<div id="results" style="display:none">
<div class="row" id="stats"></div>
<div class="card"><b>Cost Estimate</b><br><span id="costOut"></span></div>
</div>
<h2>Site Placement Grid</h2>
<p style="font-size:12px;color:var(--dim)">Click to place/remove units. Blue dots = workers (random). Shows avg walk distance.</p>
<canvas id="grid" width="500" height="400"></canvas>
<p style="font-size:13px;text-align:center" id="walkInfo">Place some units to see walk stats</p>
<h2>Pro Tips From the Trenches</h2>
<div id="tips"></div>
<script>
const tips=[
"Always place DOWNWIND from the lunch area. Nobody wants a mystery breeze with their burrito.",
"Never put one next to the client's parking spot. First impressions matter.",
"Place within 500ft of work areas or workers will 'forget' and find a bush.",
"The unit nearest the office will be treated like a 5-star hotel. The far one? A war zone.",
"Service day is basically a holiday. Plan accordingly.",
"One unit + 40 workers = Lord of the Flies by Wednesday.",
"If it's over 90°F, add 20% more units. Heat + burritos = math.",
"Put one near the gate for the concrete truck drivers. They WILL ask.",
"The hand sanitizer will be empty by 9am on Monday. Stock extra.",
"If a unit tips over, that story will be told at every BBQ for 10 years."
];
function calc(){
  const w=Math.max(1,+document.getElementById('workers').value),s=+document.getElementById('shift').value,d=+document.getElementById('svc').value;
  const ratio=s/8, units=Math.ceil((w/20)*ratio), svcFreq=d<=3?'Excellent':d<=5?'Good':d<=7?'Standard':'Risky';
  const flushes=Math.round(w*s/8*3), gallons=Math.round(units*12), weekly=units*175, monthly=weekly*4;
  document.getElementById('results').style.display='block';
  document.getElementById('stats').innerHTML=[
    ['&#x1f6bd;',units,'Units Needed'],['&#x23f1;',svcFreq,'Service Rating'],
    ['&#x1f4a8;',flushes+'/day','Est. Flushes'],['&#x1f4a7;',gallons+' gal','Blue Liquid']
  ].map(x=>`<div class="col card stat"><div class="num">${x[1]}</div><div class="lbl">${x[0]} ${x[2]}</div></div>`).join('');
  document.getElementById('costOut').innerHTML=`Weekly: <span class="cost">$${weekly.toLocaleString()}</span> &nbsp; Monthly: <span class="cost">$${monthly.toLocaleString()}</span><br><span style="font-size:12px;color:var(--dim)">Based on ~$175/unit/week standard rental. Luxury trailers extra. Way extra.</span>`;
}
const cv=document.getElementById('grid'),ctx=cv.getContext('2d');
let pots=[],workers=[];
function initWorkers(){workers=[];for(let i=0;i<30;i++)workers.push({x:Math.random()*480+10,y:Math.random()*380+10})}
initWorkers();
function draw(){
  ctx.fillStyle='#1a1a1c';ctx.fillRect(0,0,500,400);
  ctx.strokeStyle='#2a2a2d';ctx.lineWidth=1;
  for(let x=0;x<500;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,400);ctx.stroke()}
  for(let y=0;y<400;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(500,y);ctx.stroke()}
  workers.forEach(w=>{ctx.fillStyle='rgba(74,222,128,0.3)';ctx.beginPath();ctx.arc(w.x,w.y,4,0,Math.PI*2);ctx.fill()});
  pots.forEach(p=>{ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.arc(p.x,p.y,12,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('WC',p.x,p.y)});
  if(pots.length>0){
    let totalDist=0;workers.forEach(w=>{let minD=Infinity;pots.forEach(p=>{const d=Math.hypot(w.x-p.x,w.y-p.y);if(d<minD)minD=d});totalDist+=minD});
    const avgPx=totalDist/workers.length,avgFt=Math.round(avgPx*2),walkMin=(avgFt/264).toFixed(1);
    document.getElementById('walkInfo').innerHTML=`Avg walk: ~<b>${avgFt}ft</b> (~${walkMin} min) | Units placed: <b>${pots.length}</b>`;
    workers.forEach(w=>{let minD=Infinity,cp=null;pots.forEach(p=>{const d=Math.hypot(w.x-p.x,w.y-p.y);if(d<minD){minD=d;cp=p}});if(cp){ctx.strokeStyle='rgba(255,107,53,0.1)';ctx.beginPath();ctx.moveTo(w.x,w.y);ctx.lineTo(cp.x,cp.y);ctx.stroke()}});
  }
}
cv.addEventListener('click',e=>{
  const r=cv.getBoundingClientRect(),sx=500/r.width,x=((e.clientX-r.left)*sx),y=((e.clientY-r.top)*sx);
  const idx=pots.findIndex(p=>Math.hypot(p.x-x,p.y-y)<15);
  if(idx>=0)pots.splice(idx,1);else pots.push({x,y});draw()
});
document.getElementById('tips').innerHTML=tips.map(t=>`<div class="tip">${t}</div>`).join('');
draw();calc();
</script></body></html>
