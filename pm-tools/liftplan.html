<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crane Lift Planner</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:900px;margin:auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:20px;margin:8px 0 12px;display:flex;align-items:center;gap:8px}h1 span{font-size:24px}
.grid{display:flex;flex-wrap:wrap;gap:10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;flex:1;min-width:260px}
.card h2{font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
label.f{display:flex;align-items:center;gap:6px;margin:6px 0;font-size:13px}
label.f span{min-width:100px;color:var(--dim)}
label.f input,label.f select{flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-size:13px}
canvas{width:100%;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:block}
.verdict{text-align:center;padding:20px;border-radius:10px;margin:10px 0;font-size:16px;font-weight:700;transition:all .3s}
.verdict .icon{font-size:48px;display:block;margin-bottom:8px}
.metrics{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.metric{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;flex:1;min-width:100px}
.metric .val{font-size:20px;font-weight:700}.metric .lbl{font-size:11px;color:var(--dim)}
.wind-ref{font-size:12px;color:var(--dim);margin-top:10px;padding:8px;background:var(--bg);border-radius:6px}
.wind-ref div{margin:2px 0}
.rigging{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
.rig-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer}
.rig-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
</style></head><body>
<a class="home" href="../index.html">&larr; home</a>
<h1><span>🏗️</span> Crane Lift Planner</h1>
<div class="grid">
<div class="card">
<h2>Load Information</h2>
<label class="f"><span>Load Weight</span><input type="number" id="loadWt" value="5000" min="100" max="500000" step="100"> <small>lbs</small></label>
<label class="f"><span>Pick Radius</span><input type="number" id="pickR" value="40" min="10" max="300" step="5"> <small>ft</small></label>
<label class="f"><span>Set Radius</span><input type="number" id="setR" value="60" min="10" max="300" step="5"> <small>ft</small></label>
<label class="f"><span>Boom Length</span><input type="number" id="boomL" value="100" min="30" max="400" step="10"> <small>ft</small></label>
<label class="f"><span>Wind Speed</span><input type="number" id="wind" value="10" min="0" max="60" step="1"> <small>mph</small></label>
<h2>Rigging Deductions</h2>
<div class="rigging" id="rigging"></div>
<label class="f"><span>Custom Rigging</span><input type="number" id="customRig" value="0" min="0" max="5000" step="50"> <small>lbs</small></label>
<div class="verdict" id="verdict"></div>
<div class="metrics" id="metrics"></div>
<div class="wind-ref">
<strong>Wind Speed Limits:</strong>
<div>0-20 mph: Normal operations</div>
<div>20-30 mph: Caution, reduce capacity 10%</div>
<div>30-40 mph: Critical lift procedures only</div>
<div>40+ mph: <span style="color:#ef4444">STOP ALL LIFTING</span></div>
</div>
</div>
<div class="card">
<h2>Top View — Swing Path</h2>
<canvas id="cv" height="380"></canvas>
</div>
</div>
<script>
const $=id=>document.getElementById(id);
const riggingPresets=[{n:'Wire Slings',w:200},{n:'Chain Slings',w:350},{n:'Nylon Slings',w:80},{n:'Spreader Bar',w:1500},{n:'Shackles',w:120},{n:'Headache Ball',w:500}];
let selRig=new Set();
const rigDiv=$('rigging');
riggingPresets.forEach((rp,i)=>{const b=document.createElement('button');b.className='rig-btn';b.textContent=`${rp.n} (${rp.w}lb)`;
b.onclick=()=>{if(selRig.has(i)){selRig.delete(i);b.classList.remove('on')}else{selRig.add(i);b.classList.add('on')}update()};rigDiv.appendChild(b)});
function craneCapacity(radius,boom){
// Simplified load chart approximation (rough hydraulic crane curve)
const base=120000;const cap=base*Math.pow(0.97,(radius-10)/2)*(boom/100);
return Math.max(cap*0.3,cap*(1-radius/boom*0.8))}
function update(){
const loadWt=+$('loadWt').value,pickR=+$('pickR').value,setR=+$('setR').value;
const boomL=+$('boomL').value,wind=+$('wind').value;
let rigWt=+$('customRig').value;selRig.forEach(i=>rigWt+=riggingPresets[i].w);
const totalLoad=loadWt+rigWt;
const maxRadius=Math.max(pickR,setR);
const capAtPick=craneCapacity(pickR,boomL);
const capAtSet=craneCapacity(setR,boomL);
const capAtMax=Math.min(capAtPick,capAtSet);
let windFactor=1;if(wind>30)windFactor=0.75;else if(wind>20)windFactor=0.9;
const effectiveCap=capAtMax*windFactor;
const utilization=totalLoad/effectiveCap*100;
const safe=utilization<=85&&wind<40;
const v=$('verdict');
if(wind>=40){v.innerHTML='<span class="icon">🚫</span>WIND STOP — No Lifting Permitted';v.style.background='rgba(239,68,68,0.2)';v.style.color='#ef4444'}
else if(safe){v.innerHTML='<span class="icon">✅</span>GO — Lift is within capacity';v.style.background='rgba(74,222,128,0.1)';v.style.color='#4ade80'}
else{v.innerHTML='<span class="icon">❌</span>NO-GO — Exceeds safe limits';v.style.background='rgba(239,68,68,0.2)';v.style.color='#ef4444'}
$('metrics').innerHTML=[
['Total Load',totalLoad.toLocaleString()+' lb','var(--text)'],
['Rigging Wt',rigWt+' lb','var(--dim)'],
['Capacity @ '+maxRadius+'ft',Math.round(effectiveCap).toLocaleString()+' lb',effectiveCap>totalLoad?'var(--green)':'#ef4444'],
['Utilization',utilization.toFixed(1)+'%',utilization<=75?'var(--green)':utilization<=85?'#facc15':'#ef4444'],
['Safety Factor',(effectiveCap/totalLoad).toFixed(2)+'x',effectiveCap/totalLoad>=1.18?'var(--green)':'#ef4444'],
['Wind',wind+' mph',wind<20?'var(--green)':wind<30?'#facc15':'#ef4444']
].map(([l,v,c])=>`<div class="metric"><div class="val" style="color:${c}">${v}</div><div class="lbl">${l}</div></div>`).join('');
drawPlan(pickR,setR,boomL,totalLoad,effectiveCap)}
function drawPlan(pickR,setR,boomL,totalLoad,cap){
const cv=$('cv'),ctx=cv.getContext('2d');const r=cv.getBoundingClientRect();
cv.width=r.width*devicePixelRatio;cv.height=380*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);
const W=r.width,H=380,cx=W/2,cy=H/2;
const maxR=Math.max(pickR,setR,boomL)*1.2;const scale=Math.min(W,H)/2/maxR*0.85;
// grid
ctx.strokeStyle='#1a1a1c';ctx.lineWidth=0.5;
for(let rr=20;rr<=maxR;rr+=20){ctx.beginPath();ctx.arc(cx,cy,rr*scale,0,Math.PI*2);ctx.stroke();
if(rr%(maxR>150?60:40)===0||rr===20){ctx.fillStyle='#333';ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText(rr+"'",cx+rr*scale+2,cy-3)}}
// boom reach circle
ctx.beginPath();ctx.arc(cx,cy,boomL*scale,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
ctx.fillStyle='#333';ctx.font='10px system-ui';ctx.fillText('Boom reach: '+boomL+"'",cx,cy-boomL*scale-6);
// pick radius circle
ctx.beginPath();ctx.arc(cx,cy,pickR*scale,0,Math.PI*2);ctx.strokeStyle='rgba(96,165,250,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
// set radius circle
ctx.beginPath();ctx.arc(cx,cy,setR*scale,0,Math.PI*2);ctx.strokeStyle='rgba(168,85,247,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
// swing path (arc from pick to set)
const pickAngle=-Math.PI/3,setAngle=Math.PI/4;
const pickX=cx+pickR*scale*Math.cos(pickAngle),pickY=cy+pickR*scale*Math.sin(pickAngle);
const setX=cx+setR*scale*Math.cos(setAngle),setY=cy+setR*scale*Math.sin(setAngle);
// swept area
ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,Math.max(pickR,setR)*scale,pickAngle,setAngle);ctx.closePath();
ctx.fillStyle='rgba(255,107,53,0.08)';ctx.fill();
// swing arc path
ctx.beginPath();
const steps=40;for(let i=0;i<=steps;i++){const t=i/steps;const angle=pickAngle+(setAngle-pickAngle)*t;
const rad=pickR+(setR-pickR)*t;const x=cx+rad*scale*Math.cos(angle),y=cy+rad*scale*Math.sin(angle);
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
ctx.strokeStyle='var(--accent)';ctx.lineWidth=2.5;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);
// arrow at end
const endAngle=setAngle-0.1;const erad=pickR+(setR-pickR)*0.95;
ctx.beginPath();ctx.moveTo(setX,setY);
ctx.lineTo(setX-10*Math.cos(setAngle-0.5),setY-10*Math.sin(setAngle-0.5));
ctx.moveTo(setX,setY);ctx.lineTo(setX-10*Math.cos(setAngle+0.5),setY-10*Math.sin(setAngle+0.5));
ctx.strokeStyle='var(--accent)';ctx.lineWidth=2;ctx.stroke();
// pick point
ctx.beginPath();ctx.arc(pickX,pickY,8,0,Math.PI*2);ctx.fillStyle='#60a5fa';ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
ctx.fillStyle='#fff';ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.fillText('PICK',pickX,pickY-14);
ctx.fillStyle='#60a5fa';ctx.font='10px system-ui';ctx.fillText(pickR+"'",pickX,pickY+22);
// set point
ctx.beginPath();ctx.arc(setX,setY,8,0,Math.PI*2);ctx.fillStyle='#a855f7';ctx.fill();
ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
ctx.fillStyle='#fff';ctx.font='bold 11px system-ui';ctx.fillText('SET',setX,setY-14);
ctx.fillStyle='#a855f7';ctx.font='10px system-ui';ctx.fillText(setR+"'",setX,setY+22);
// crane center
ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fillStyle='#ff6b35';ctx.fill();
ctx.beginPath();ctx.arc(cx,cy,12,0,Math.PI*2);ctx.strokeStyle='rgba(255,107,53,0.4)';ctx.lineWidth=2;ctx.stroke();
ctx.fillStyle='#fff';ctx.font='bold 11px system-ui';ctx.fillText('CRANE',cx,cy-18);
// boom line to pick
ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(pickX,pickY);ctx.strokeStyle='rgba(96,165,250,0.3)';ctx.lineWidth=1;ctx.stroke();
// legend
ctx.fillStyle='#6e6e73';ctx.font='10px system-ui';ctx.textAlign='left';
ctx.fillStyle='#60a5fa';ctx.fillText('● Pick point',8,H-24);
ctx.fillStyle='#a855f7';ctx.fillText('● Set point',8,H-12);
ctx.fillStyle='#ff6b35';ctx.fillText('--- Swing path',100,H-12)}
['loadWt','pickR','setR','boomL','wind','customRig'].forEach(id=>$(id).addEventListener('input',update));
update();
</script></body></html>
