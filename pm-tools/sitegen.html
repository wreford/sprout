<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Site Problem Generator</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:600px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:22px;margin:8px 0 4px}
.score-bar{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:14px;padding:8px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--border)}
.score-bar b{color:var(--green)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.cat{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent);color:#fff;margin-bottom:8px}
.stars{color:var(--accent);font-size:16px;margin-bottom:8px}
.desc{font-size:15px;line-height:1.5;margin-bottom:14px}
.opt{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:8px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:14px;cursor:pointer;transition:.15s}
.opt:hover{border-color:var(--accent)}
.opt.good{border-color:var(--green);background:#4ade8018}.opt.ok{border-color:#facc15;background:#facc1518}.opt.bad{border-color:#f87171;background:#f8717118}
.fb{font-size:13px;margin-top:6px;padding:8px;border-radius:6px}.fb.good{color:var(--green)}.fb.ok{color:#facc15}.fb.bad{color:#f87171}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:16px;cursor:pointer;width:100%;font-weight:700}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4}
#start{text-align:center;padding:40px 0}
</style>
</head>
<body>
<a class="home" href="../index.html">← home</a>
<h1>🚧 Site Problem Generator</h1>
<div class="score-bar"><span>Problems: <b id="cnt">0</b></span><span>Score: <b id="pts">0</b>/<b id="mx">0</b></span><span>Rating: <b id="pct">—</b></span></div>
<div id="area"><div id="start"><p style="color:var(--dim);margin-bottom:16px">Test your construction management instincts.</p><button class="btn" onclick="next()">Generate Problem</button></div></div>
<script>
const P=[
{c:'Equipment',s:4,d:'The tower crane\'s slewing ring is making a grinding noise and the operator refuses to continue.',o:[{t:'Shut down crane immediately, call manufacturer rep for inspection',r:'good',f:'Correct. Safety first—never operate suspect lifting equipment.'},{t:'Tell the operator it\'s probably fine and to keep working',r:'bad',f:'Catastrophic failure risk. Crane collapses make national news.'},{t:'Reduce loads to 50% capacity and monitor',r:'ok',f:'Better than ignoring it, but an inspection should happen before any further use.'}]},
{c:'Material',s:3,d:'The concrete truck arrived 2 hours early and the forms aren\'t ready. Driver says he has to pour or dump it.',o:[{t:'Call the batch plant, negotiate return; pay short-load/washout fee',r:'good',f:'Smart. $500 washout fee beats a botched pour.'},{t:'Pour it into whatever forms are ready and figure it out later',r:'bad',f:'Out-of-sequence pours create cold joints and structural issues.'},{t:'Ask driver to wait 30 min, fast-track remaining form work with extra crew',r:'ok',f:'Risky if forms aren\'t truly ready, but shows initiative. Check with your foreman first.'}]},
{c:'Safety',s:5,d:'An OSHA inspector just pulled up to the gate. Your safety officer called in sick today.',o:[{t:'Greet inspector professionally, assign your most experienced super to escort them, be transparent',r:'good',f:'Exactly right. Cooperation and honesty is always the best OSHA strategy.'},{t:'Stall at the gate while people scramble to clean up violations',r:'bad',f:'Obstructing an inspection can result in willful violation citations—$156k+ fines.'},{t:'Tell the inspector to come back tomorrow when the safety officer is here',r:'bad',f:'You can\'t legally refuse entry during working hours. This escalates things badly.'}]},
{c:'Weather',s:3,d:'Forecast says 40% chance of rain starting at noon. You have a 200-yard concrete pour scheduled for 10am.',o:[{t:'Go ahead but have tarps, squeegees, and evaporation retarder on standby',r:'good',f:'Good call. Preparation lets you pour and protect if rain hits.'},{t:'Cancel the pour entirely and reschedule',r:'ok',f:'Safe but costly. Pump truck standby fees and schedule delays add up.'},{t:'Pour anyway, rain washes the surface cream off and actually helps curing',r:'bad',f:'Rain on fresh concrete destroys the surface finish and weakens the top layer.'}]},
{c:'Personnel',s:2,d:'Your best electrician just told you he got a better offer and is giving two weeks notice—mid-rough-in.',o:[{t:'Congratulate him, ask him to document his work and train his replacement, call the hall for a journeyman',r:'good',f:'Professional and practical. Good relationships pay off when you need people back.'},{t:'Tell him he can\'t leave until rough-in is done or he\'s fired immediately',r:'bad',f:'You can\'t force someone to stay. Firing him loses the two weeks you had.'},{t:'Offer a small raise to keep him through rough-in completion',r:'ok',f:'Reasonable, but counter-offers often just delay the inevitable.'}]},
{c:'Neighbor',s:2,d:'The neighbor\'s cat keeps sneaking onto the jobsite and sleeping on the warm rebar. Workers think it\'s the project mascot now.',o:[{t:'Gently relocate the cat each morning, notify the neighbor, add it to the toolbox talk as a jobsite hazard',r:'good',f:'Professional and thorough. Animals on jobsites are genuinely a safety/liability issue.'},{t:'Adopt it as the official jobsite cat, buy it a hard hat',r:'ok',f:'Funny, but animals on active construction sites are a real liability.'},{t:'Call animal control immediately',r:'bad',f:'Overreaction. It\'s a neighbor\'s pet, not a wild animal. Handle it diplomatically.'}]},
{c:'Schedule',s:4,d:'The mechanical sub says they need 3 extra weeks. Your liquidated damages clause kicks in if you\'re late.',o:[{t:'Meet with sub, identify specific delays, negotiate acceleration plan with overtime, update the schedule',r:'good',f:'Get to the root cause and solve it. Document everything for potential claims.'},{t:'Tell them figure it out or you\'ll back-charge them for LDs',r:'ok',f:'You may have contractual grounds, but threats rarely speed things up.'},{t:'Just push the end date and hope the owner doesn\'t notice',r:'bad',f:'The owner will absolutely notice when LDs hit. Hiding problems makes them worse.'}]},
{c:'Budget',s:3,d:'You just realized the structural steel bid excluded connection design. The steel detailer wants $45,000 for it.',o:[{t:'Review the bid docs and contract carefully—determine whose scope it actually is, then negotiate',r:'good',f:'Right approach. Connection design scope is a classic gray area. Know your contract.'},{t:'Pay it immediately to avoid delays',r:'bad',f:'Never pay a disputed cost without checking scope. You may be entitled to it.'},{t:'Refuse to pay and tell them it\'s their problem',r:'ok',f:'Might be correct, but being adversarial slows the project. Negotiate.'}]},
{c:'Quality',s:4,d:'The fireproofing thickness test failed in 30% of measured locations. The building is almost ready for drywall.',o:[{t:'Stop drywall in affected areas, get fireproofing sub back to patch and retest, document everything',r:'good',f:'Fire-life-safety is non-negotiable. Fix it properly before covering it up.'},{t:'Add an extra layer of drywall for additional fire rating',r:'bad',f:'Drywall is not a substitute for specified fireproofing. This won\'t pass inspection.'},{t:'Retest with a different inspector who might be more lenient',r:'bad',f:'Inspector shopping is unethical and the thickness either meets spec or it doesn\'t.'}]},
{c:'Neighbor',s:3,d:'The adjacent property owner is threatening to sue because your dewatering is lowering their basement water table.',o:[{t:'Hire a geotech to document conditions, install monitoring wells, meet with neighbor\'s attorney proactively',r:'good',f:'Get ahead of it with data. Pre-construction surveys would have helped prevent this.'},{t:'Ignore them—you have a right to dewater your own site',r:'ok',f:'Legally murky. Many jurisdictions hold you liable for damage to adjacent properties.'},{t:'Stop dewatering immediately',r:'bad',f:'Your excavation will flood. You need a solution, not a shutdown.'}]},
{c:'Safety',s:5,d:'A worker fell from a 6-foot ladder and is conscious but can\'t move his left arm. He says he\'s fine and wants to keep working.',o:[{t:'Keep him still, call 911, secure the scene, fill out incident report, notify safety director',r:'good',f:'Always treat potential fractures seriously. "I\'m fine" after a fall means nothing medically.'},{t:'Let him sit in the trailer with ice and see how he feels in an hour',r:'bad',f:'Delayed treatment of a fracture can cause permanent damage. And it\'s an OSHA recordable either way.'},{t:'Drive him to urgent care yourself',r:'ok',f:'Better than ignoring it, but moving someone with a potential fracture incorrectly can worsen the injury.'}]},
{c:'Equipment',s:2,d:'The porta-john delivery company dropped 4 units in the wrong spot—right where the crane needs to swing.',o:[{t:'Call for same-day relocation, set up temporary barriers, adjust crane swing plan for the day',r:'good',f:'Practical and safe. Document it so the vendor pays for the move.'},{t:'Use the forklift to move them yourself',r:'ok',f:'Gets the job done but you\'ll void the rental agreement and risk a spill.'},{t:'Work around them and relocate next week',r:'bad',f:'Restricting crane swing radius is a serious safety hazard.'}]},
{c:'Material',s:3,d:'Your window order just arrived—wrong color. Every single one. The spec says "anodized bronze" and these are "anodized champagne."',o:[{t:'Document with photos, reject shipment, notify architect and owner immediately, expedite reorder',r:'good',f:'Catch it at delivery, not at installation. Early communication prevents bigger delays.'},{t:'Install them and submit an RFI asking if champagne is acceptable',r:'ok',f:'Risky. If the architect says no, you\'re pulling installed windows.'},{t:'Send them back and yell at your supplier',r:'bad',f:'Emotional responses slow resolutions. Document and communicate professionally.'}]},
{c:'Schedule',s:4,d:'Rain has caused 12 lost days this month. You\'re contractually entitled to time extensions but the owner is pushing back.',o:[{t:'Compile daily weather logs, photos, and contemporaneous records. Submit formal time extension request per contract',r:'good',f:'Documentation wins disputes. Your daily logs are your best friend.'},{t:'Just work weekends to make up the time',r:'ok',f:'Overtime costs money you shouldn\'t bear for weather delays. But it shows good faith.'},{t:'Threaten to stop work if they don\'t grant the extension',r:'bad',f:'Stopping work is a breach of contract. Use the dispute resolution process.'}]},
{c:'Neighbor',s:2,d:'The client\'s wife wants to change all the tile in the master bath... again. This is the third time.',o:[{t:'Process it as a formal change order with full cost and schedule impact. Be professional but firm on pricing',r:'good',f:'Protect yourself financially while keeping the client happy. Change orders are profit.'},{t:'Tell her the tile is already ordered and it\'s too late',r:'ok',f:'Might work short-term but the client relationship will suffer.'},{t:'Just do it and eat the cost to keep the peace',r:'bad',f:'Never absorb costs for client changes. It sets a terrible precedent.'}]},
{c:'Safety',s:3,d:'It\'s 98°F and your crew is showing signs of heat exhaustion. You\'re behind schedule on the roof deck pour.',o:[{t:'Implement mandatory water/shade breaks every 30 min, push the pour to early morning tomorrow',r:'good',f:'Worker safety trumps schedule every time. A heat stroke is a career-ending injury.'},{t:'Buy everyone Gatorade and keep going—you can\'t afford the delay',r:'bad',f:'Heat stroke can be fatal. No pour is worth a life.'},{t:'Send the weakest-looking guys home and push through with the tough ones',r:'bad',f:'Heat doesn\'t care how tough you are. This is negligent supervision.'}]},
{c:'Equipment',s:3,d:'A pigeon has built a nest in the tower crane cab and refuses to leave. The operator is terrified of birds.',o:[{t:'Call pest control for humane removal, reassign operator temporarily, add bird deterrents to the cab',r:'good',f:'Professional solution. Bonus: check if nesting birds are protected by law in your area.'},{t:'Tell the operator to man up and deal with it',r:'ok',f:'Hostile work environment aside, a distracted crane operator is a safety hazard.'},{t:'Shoot it with a nail gun',r:'bad',f:'Illegal, inhumane, and you\'d damage the crane cab. Triple fail.'}]},
{c:'Budget',s:4,d:'The owner\'s rep is rejecting your pay application line items claiming work isn\'t complete enough to bill.',o:[{t:'Schedule a joint walk-through with photos, SOV backup, and your project manager to resolve line by line',r:'good',f:'Face-to-face with documentation resolves most billing disputes.'},{t:'Threaten to slow down work until you get paid',r:'ok',f:'Understandable but adversarial. Try diplomacy first.'},{t:'Just reduce the billing and eat the cash flow hit',r:'bad',f:'Underbilling kills contractors. Fight for what you\'ve earned.'}]},
{c:'Quality',s:3,d:'The epoxy floor coating is bubbling 24 hours after application. The flooring sub blames humidity.',o:[{t:'Get independent moisture testing done, document conditions, check if sub followed manufacturer specs for humidity and temp',r:'good',f:'Root cause analysis protects you regardless of who\'s at fault.'},{t:'Let it cure another 48 hours and see if it self-corrects',r:'bad',f:'Bubbled epoxy doesn\'t fix itself. Delay makes removal harder.'},{t:'Rip it all out and start over immediately',r:'ok',f:'Might be necessary but determine the cause first or it\'ll happen again.'}]},
{c:'Weather',s:5,d:'A tornado watch was just issued for your area. You have 40 workers on an open structural steel frame.',o:[{t:'Sound the alarm, evacuate everyone to designated shelter immediately, secure loose materials if time permits',r:'good',f:'Life safety is the only priority. Steel frames and high winds are deadly.'},{t:'Keep working but monitor the weather radio closely',r:'bad',f:'A watch means conditions are favorable for tornadoes. Evacuate.'},{t:'Send everyone to their cars to wait it out',r:'ok',f:'Cars are not safe shelter from tornadoes. Use a designated storm shelter or interior room.'}]},
{c:'Material',s:2,d:'The GC accidentally ordered metric rebar instead of imperial. The detailer says #4 and 12mm are "close enough."',o:[{t:'Check with the EOR—#4 is 0.500" vs 12mm is 0.472". Get an engineering disposition before proceeding',r:'good',f:'7% area reduction matters structurally. Always defer to the engineer of record.'},{t:'Use it—nobody will ever know',r:'ok',f:'It might be fine, but if it\'s not, you\'re liable for a structural deficiency.'},{t:'Send it all back and reorder, eating the 3-week delay',r:'ok',f:'Safe but expensive. The EOR might approve it with additional bars in critical areas.'}]},
{c:'Personnel',s:3,d:'Two foremen from different trades are in a screaming match on the 5th floor about whose crew gets the hoist first.',o:[{t:'Separate them immediately, establish a formal hoist schedule posted daily, address the behavior privately',r:'good',f:'Systems prevent conflicts. A hoist schedule should have existed from day one.'},{t:'Let them work it out—they\'re grown men',r:'bad',f:'Workplace violence starts with arguments. As superintendent, you own the peace.'},{t:'Fire them both to send a message',r:'bad',f:'Overreaction that leaves you short two experienced foremen.'}]},
{c:'Budget',s:3,d:'Your excavation sub hit an unmarked underground fuel tank. Soil is visibly contaminated.',o:[{t:'Stop work, evacuate the immediate area, call environmental remediation and your insurance carrier',r:'good',f:'Environmental contamination requires specialists and proper reporting. This is a differing site condition.'},{t:'Dig it out, haul it to the dump, and keep going',r:'bad',f:'Illegal disposal of hazardous waste. Fines start at $50k/day.'},{t:'Cover it back up and move the building footprint',r:'ok',f:'Creative but illegal. Contamination must be reported and remediated.'}]},
{c:'Quality',s:2,d:'The mason is laying brick and your superintendent notices the mortar joints are 1/2" instead of the specified 3/8".',o:[{t:'Stop the work, document with photos, have the mason correct going forward, decide with architect if installed work stays or goes',r:'good',f:'Catching it early saves massive tear-out costs. Mortar joint size affects both aesthetics and coursing.'},{t:'Let it go—1/8" difference is invisible',r:'ok',f:'Over many courses, the height difference becomes very visible and the coursing won\'t line up with openings.'},{t:'Make him tear it all down immediately',r:'ok',f:'Might be necessary but get the architect\'s opinion first—they may accept it with a credit.'}]},
{c:'Neighbor',s:4,d:'Your pile driving is cracking the foundation of the adjacent 100-year-old building. The owner is furious and has photos.',o:[{t:'Stop piling immediately, commission a structural survey, engage your insurance, review pre-construction survey',r:'good',f:'You likely have liability here. A pre-construction survey would have established baseline conditions.'},{t:'Claim the cracks were pre-existing',r:'ok',f:'Only works if you did a pre-construction survey. Did you? (You should have.)'},{t:'Keep driving piles—you have a schedule to keep',r:'bad',f:'Continued damage increases your liability exponentially.'}]},
{c:'Schedule',s:3,d:'The elevator sub says the cab interior lead time just went from 8 weeks to 20 weeks due to supply chain issues.',o:[{t:'Explore alternate suppliers, consider temporary construction elevator extension, update critical path and notify owner',r:'good',f:'Multi-pronged approach. Elevator cabs are often long-lead and on the critical path.'},{t:'Just wait—nothing you can do about supply chains',r:'bad',f:'Proactive PMs find alternatives. Waiting is not project management.'},{t:'Tell the sub that\'s unacceptable and threaten to hire someone else',r:'ok',f:'Supply chains don\'t care about threats. But you can negotiate expediting fees.'}]},
{c:'Equipment',s:3,d:'The concrete pump truck just blew a hydraulic line. Concrete is in the hopper and starting to set up.',o:[{t:'Get crew to manually wheelbarrow the remaining concrete to the pour area, call for a replacement pump ASAP',r:'good',f:'Save the mud! Every yard in a hopper that hardens is money and cleanup time lost.'},{t:'Let it set up and jackhammer it out of the hopper later',r:'bad',f:'Extremely expensive and time-consuming. That hopper concrete can usually be saved.'},{t:'Call the batch plant to cancel remaining trucks, send the concrete back',r:'ok',f:'Addresses incoming trucks but doesn\'t solve the hopper full of setting concrete.'}]},
{c:'Safety',s:4,d:'A worker is spotted free-climbing structural steel at 30 feet to retrieve his phone he dropped on a beam.',o:[{t:'Get him down immediately using calm verbal commands, issue written warning, hold safety stand-down for all workers',r:'good',f:'Fall protection violations are the #1 OSHA citation. This requires immediate corrective action.'},{t:'Fire him on the spot',r:'ok',f:'Justified but yelling up at someone 30 feet in the air might cause the fall you\'re trying to prevent.'},{t:'Let him grab it quickly—he\'s already up there',r:'bad',f:'If he falls and dies, you personally face criminal negligence charges.'}]},
{c:'Weather',s:3,d:'Temperature dropped to 28°F overnight. You poured a slab yesterday and the curing blankets blew off.',o:[{t:'Test concrete temperature with infrared thermometer, check for frost damage, consult with testing lab on core samples',r:'good',f:'Early freezing can reduce final strength by 50%. Testing determines if you have a problem.'},{t:'Just re-cover it and hope for the best',r:'bad',f:'If it froze, covering it now doesn\'t undo the damage. You need data.'},{t:'Pour hot water on it to warm it up',r:'bad',f:'Thermal shock can cause cracking. And it doesn\'t reverse freeze damage to young concrete.'}]},
{c:'Material',s:2,d:'Your lumber delivery just arrived and 40% of the studs are visibly warped, twisted, or have large knots.',o:[{t:'Reject the bad material on the delivery ticket, document with photos, call supplier for replacement',r:'good',f:'Never accept substandard material. Document the rejection on the delivery ticket before the driver leaves.'},{t:'Use the good ones and send back the bad ones next week',r:'ok',f:'Sorting works but return them ASAP or the supplier will dispute the claim.'},{t:'Use them all—they\'ll straighten out once they\'re nailed in',r:'bad',f:'Warped studs create wavy walls. Your drywall crew will hate you.'}]},
{c:'Personnel',s:4,d:'Your project manager just got poached by a competitor mid-project. They have all the institutional knowledge.',o:[{t:'Conduct an immediate knowledge transfer meeting, ensure all files are on the server, promote the APM, and move forward',r:'good',f:'Knowledge management is why we keep things documented. Two weeks notice is your friend.'},{t:'Bad-mouth them to every GC in town',r:'bad',f:'Unprofessional and it\'ll come back to bite you. The industry is smaller than you think.'},{t:'Offer double salary to keep them',r:'ok',f:'Expensive and signals desperation. If the competitor matched, you\'re in a bidding war.'}]},
{c:'Safety',s:3,d:'You discover the scaffolding company didn\'t install base plates on a 5-story scaffold. Workers are on it right now.',o:[{t:'Evacuate scaffold immediately, red-tag it, contact scaffold company for emergency remediation',r:'good',f:'Base plates are critical for load distribution. This scaffold could collapse.'},{t:'Note it for the next scaffold inspection',r:'ok',f:'Inspections catch things, but with workers on it NOW, you can\'t wait.'},{t:'It\'s on concrete so base plates don\'t matter',r:'bad',f:'Base plates prevent point loading and lateral movement regardless of surface. This is a collapse hazard.'}]},
{c:'Budget',s:5,d:'You\'re 60% through the job and your cost report shows you\'re already at 85% of budget.',o:[{t:'Conduct detailed cost-to-complete analysis, identify remaining risks, present recovery plan to leadership with options',r:'good',f:'Transparency and a plan beats surprise losses every time.'},{t:'Just reduce the contingency line and it\'ll look fine on the next report',r:'bad',f:'Cooking the books delays the reckoning and makes it worse.'},{t:'Start cutting corners on finishes to save money',r:'ok',f:'Value engineering is legitimate, but not without owner/architect approval.'}]},
{c:'Quality',s:3,d:'The concrete test cylinders broke at 3,200 PSI. The spec requires 4,000 PSI. This is for a structural slab.',o:[{t:'Get cores drilled from the actual slab, have the EOR evaluate in-place strength, prepare for potential remediation',r:'good',f:'Cylinder breaks don\'t always reflect in-place strength. Cores give the real answer.'},{t:'It\'s close enough—3,200 is plenty strong',r:'bad',f:'20% under spec on structural concrete is not "close enough." The EOR must decide.'},{t:'Tear out the slab and repour',r:'ok',f:'May be necessary but get core results first. The slab might actually be stronger than the cylinders.'}]},
{c:'Neighbor',s:1,d:'The food truck that parks outside your site every day just raised their burrito prices by $2. Workers are revolting.',o:[{t:'Negotiate a bulk discount with the food truck for daily guaranteed volume',r:'good',f:'Win-win. Happy workers are productive workers, and the food truck gets steady business.'},{t:'That\'s not a construction management problem',r:'ok',f:'Technically true, but morale affects productivity. Good supers care about their crews.'},{t:'Ban the food truck from parking near the site',r:'bad',f:'Now you have hungry AND angry workers. This is how mutinies start.'}]},
{c:'Equipment',s:4,d:'Your rented excavator was stolen from the jobsite over the weekend. The gate was locked.',o:[{t:'File police report, notify insurance and rental company, review security footage, check rental agreement for theft liability',r:'good',f:'Insurance coverage depends on your rental agreement. Many GCs are liable for theft on their site.'},{t:'Post about it on social media to try to find it',r:'ok',f:'Might help but let police handle it. Social media vigilantism can backfire.'},{t:'Just rent another one and deal with it later',r:'bad',f:'You need to report it immediately. Rental agreements have time limits for theft notification.'}]},
{c:'Schedule',s:3,d:'The building department lost your permit application. They have no record of it. Your start date is Monday.',o:[{t:'Bring your stamped copy and tracking number, escalate to the building official, request emergency review',r:'good',f:'This is why you always keep stamped copies and confirmation numbers. Advocate firmly but politely.'},{t:'Start work without the permit—you submitted it, it\'s their fault',r:'bad',f:'Working without a permit is a violation regardless of whose fault it is. Stop work orders are expensive.'},{t:'Resubmit and wait the standard review period',r:'ok',f:'Playing by the rules but costing you weeks. Escalation is appropriate here.'}]},
{c:'Material',s:4,d:'Your waterproofing membrane delivery was left in the sun for a week and the rolls are visibly deformed.',o:[{t:'Contact manufacturer for heat damage guidance, do adhesion testing on a sample, reject and reorder if compromised',r:'good',f:'UV and heat can destroy membrane properties. Manufacturer guidance is critical.'},{t:'Install it—membrane is tough stuff',r:'bad',f:'Compromised waterproofing leads to leaks, mold, and litigation. Not worth the risk.'},{t:'Return it and delay the project waiting for new material',r:'ok',f:'Safe choice, but testing might show it\'s still usable. Get data before deciding.'}]},
{c:'Personnel',s:2,d:'The apprentice electrician just wired an entire floor with the hot and neutral reversed. Everything "works" but it\'s wrong.',o:[{t:'Have a journeyman verify the extent, create a remediation plan, use this as a teaching moment with direct supervision going forward',r:'good',f:'Reversed polarity is a serious shock/fire hazard. Fix it all and improve supervision.'},{t:'It works, so leave it and move on',r:'bad',f:'Reversed polarity can electrify metal cases of appliances. This kills people.'},{t:'Fire the apprentice',r:'ok',f:'Apprentices make mistakes—that\'s why they\'re apprentices. Better supervision is the real fix.'}]},
{c:'Weather',s:4,d:'Flash flood warning just issued. Your excavation is 15 feet deep with workers and equipment at the bottom.',o:[{t:'Evacuate workers immediately, move equipment to high ground if time permits, activate dewatering pumps',r:'good',f:'Deep excavations flood fast. Lives first, equipment second.'},{t:'Finish the current task and then evacuate',r:'bad',f:'Flash floods are called "flash" for a reason. Minutes matter.'},{t:'Start pumping proactively to stay ahead of the water',r:'ok',f:'Pumping helps but get the workers out first. No pump can outrun a flash flood.'}]},
{c:'Budget',s:2,d:'The owner wants you to use their nephew\'s brand new landscaping company for the site work. The nephew has zero experience.',o:[{t:'Express concerns professionally in writing, request proof of insurance and bonding, include performance milestones in the subcontract',r:'good',f:'Protect yourself contractually while being diplomatic. Document your concerns.'},{t:'Refuse outright—you choose your own subs',r:'ok',f:'Depending on the contract, the owner may have nomination rights. Check your contract.'},{t:'Sure, what could go wrong?',r:'bad',f:'Everything. Inexperienced subs cause delays, quality issues, and safety problems.'}]},
{c:'Safety',s:5,d:'A trench just collapsed with two workers inside. One is visible, the other is not.',o:[{t:'Call 911 immediately, do NOT enter the trench, set up a perimeter, account for all workers, direct rescue to the scene',r:'good',f:'Never enter a collapsed trench to rescue—60% of trench fatalities are would-be rescuers. Wait for rescue teams.'},{t:'Jump in and start digging them out',r:'bad',f:'The soil that collapsed once will collapse again. You\'ll become the third victim.'},{t:'Use the excavator to carefully dig them out',r:'ok',f:'Excavator rescue is sometimes done by trained rescue teams, but one wrong move is fatal. Call 911 first.'}]},
{c:'Quality',s:2,d:'The GWB (drywall) finisher is a Level 3 but the spec calls for Level 5 in the lobby. Nobody caught it until paint.',o:[{t:'Have the finisher skim-coat to Level 5, sand and re-prime before paint. Document the rework cost against the drywall sub',r:'good',f:'Level 3 to Level 5 is fixable with skim coating. Catch it before critical lighting reveals every imperfection.'},{t:'Use flat paint instead of eggshell to hide imperfections',r:'ok',f:'Might work in some cases but doesn\'t meet spec and the architect will notice under lobby lighting.'},{t:'It\'s a lobby, not an operating room. Level 3 is fine.',r:'bad',f:'Level 5 was specified for a reason—lobbies have raking light that shows every defect.'}]},
{c:'Schedule',s:3,d:'Three different subs all need the freight elevator at the same time tomorrow for critical deliveries.',o:[{t:'Create a time-blocked elevator schedule for the day, with 2-hour windows per sub, earliest slot to most critical path activity',r:'good',f:'Resource scheduling is project management 101. The critical path dictates priority.'},{t:'First come, first served—be at the elevator at 6am',r:'bad',f:'Chaos. You\'ll have three trucks blocking the loading dock and three angry foremen.'},{t:'Tell them to use the stairs',r:'ok',f:'Funny but try carrying 500 lbs of copper pipe up 12 flights. Plan the elevator.'}]},
{c:'Equipment',s:2,d:'The concrete vibrator fell into the fresh pour and sank. It\'s a rental.',o:[{t:'Fish it out with a rake or rebar hook before the concrete sets, clean it immediately, continue the pour with the backup vibrator',r:'good',f:'Every pour should have a backup vibrator. Retrieve it ASAP before it becomes an expensive inclusion.'},{t:'Leave it—it\'s adding reinforcement',r:'bad',f:'A vibrator in a structural pour is a void and defect. You\'ll be coring it out later.'},{t:'Stop the pour to recover it',r:'ok',f:'Don\'t stop the pour—cold joints are worse. Retrieve it while continuing.'}]},
{c:'Weather',s:2,d:'It\'s been 105°F for a week straight. Your asphalt paving crew says the existing pavement is too hot for overlay—it\'ll shove.',o:[{t:'Switch to night paving when surface temps are below 140°F, verify with IR thermometer',r:'good',f:'Night paving is standard practice in extreme heat. Surface temp verification is key.'},{t:'Pave anyway and roll it extra',r:'bad',f:'Hot-on-hot paving causes shoving, rutting, and roller marks that are permanent.'},{t:'Wait for cooler weather',r:'ok',f:'Could be weeks. Night paving solves the problem without schedule impact.'}]},
{c:'Material',s:3,d:'You ordered 50 sheets of 5/8" Type X drywall but they delivered 50 sheets of 5/8" regular. Your firewall needs Type X.',o:[{t:'Reject the delivery, document the error, expedite Type X replacement—do NOT install regular on rated assemblies',r:'good',f:'Type X has glass fibers for fire resistance. Regular drywall on a firewall fails inspection and endangers lives.'},{t:'Use it—5/8 is 5/8, right?',r:'bad',f:'Regular 5/8" has ~30 min rating vs Type X at 60 min. It will fail fire inspection.'},{t:'Use it in non-rated areas and reorder Type X for the firewall',r:'ok',f:'Smart use of material, but make sure you don\'t accidentally mix them up on the rated walls.'}]},
{c:'Personnel',s:3,d:'Your site superintendent just told you he doesn\'t believe in safety meetings and hasn\'t held one in three weeks.',o:[{t:'Hold one right now with him present, make it clear safety meetings are non-negotiable, document the conversation',r:'good',f:'Safety meetings are required by OSHA. A superintendent who skips them is a liability.'},{t:'Fire him immediately',r:'ok',f:'Might be warranted but losing a super mid-project has consequences. Corrective action first.'},{t:'Let it slide—the guys know what they\'re doing',r:'bad',f:'Complacency kills. Experienced workers have the most accidents because they skip safety steps.'}]},
{c:'Budget',s:4,d:'The owner just told you they want to add a rooftop deck that wasn\'t in the original scope. No budget increase.',o:[{t:'Prepare a detailed change order showing cost and schedule impact, present it professionally—scope increases require funding',r:'good',f:'Never accept unfunded scope changes. A clear change order protects everyone.'},{t:'Do it as a "favor" to maintain the relationship',r:'bad',f:'Free work sets a precedent and eats your profit. The relationship suffers more when you go broke.'},{t:'Tell them it\'s impossible without more money',r:'ok',f:'True, but "impossible" is confrontational. Present options and costs instead.'}]},
{c:'Neighbor',s:3,d:'The historic preservation society is claiming your demolition permit doesn\'t cover the 1920s brick facade that needs to come down.',o:[{t:'Stop demo on the facade, review permit conditions with your attorney, engage with the preservation office directly',r:'good',f:'Historic preservation laws have serious penalties. Get legal clarity before proceeding.'},{t:'It\'s on your property, tear it down',r:'bad',f:'Historic preservation easements can exist on private property. Violation penalties are severe.'},{t:'Incorporate the facade into the new design',r:'ok',f:'Creative and might satisfy everyone, but it\'s an engineering challenge and cost increase.'}]}
];
let idx=-1,score=0,total=0,answered=false,used=new Set();
function pick(){if(used.size>=P.length)used.clear();let i;do{i=Math.floor(Math.random()*P.length)}while(used.has(i));used.add(i);return i}
function next(){idx=pick();answered=false;render()}
function render(){const p=P[idx];let h=`<div class="card"><span class="cat">${p.c}</span><div class="stars">${'★'.repeat(p.s)+'☆'.repeat(5-p.s)}</div><p class="desc">${p.d}</p>`;
p.o.forEach((o,i)=>{h+=`<button class="opt" id="o${i}" onclick="answer(${i})">${o.t}</button>`});
h+=`<div id="fb"></div></div><button class="btn" id="nb" onclick="next()" disabled>Next Problem →</button>`;
document.getElementById('area').innerHTML=h}
function answer(i){if(answered)return;answered=true;const p=P[idx],o=p.o[i];const pts={good:3,ok:1,bad:0};score+=pts[o.r];total+=3;
p.o.forEach((op,j)=>{document.getElementById('o'+j).classList.add(op.r);document.getElementById('o'+j).disabled=true});
document.getElementById('fb').innerHTML=`<div class="fb ${o.r}">${o.r==='good'?'✓ Great call!':o.r==='ok'?'⚠ Acceptable, but not ideal.':'✗ Poor choice.'} ${o.f}</div>`;
document.getElementById('nb').disabled=false;
document.getElementById('cnt').textContent=Math.ceil(total/3);document.getElementById('pts').textContent=score;document.getElementById('mx').textContent=total;
document.getElementById('pct').textContent=total?Math.round(score/total*100)+'%':'—'}
</script>
</body>
</html>
