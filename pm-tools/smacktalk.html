<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trade Smack Talk</title><style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:700px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.5em;margin:8px 0 2px}h2{font-size:1em;color:var(--accent);margin:16px 0 6px}
select{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;width:100%;appearance:none;-webkit-appearance:none}
.row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}.col{flex:1;min-width:150px}
label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px}
button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700}button:hover{opacity:.85}
.sm{padding:6px 14px;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin:10px 0}
.joke{font-size:1.2em;line-height:1.5;margin:8px 0}
.fav-item{padding:8px;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;gap:8px;align-items:start}
.fav-item .del{color:var(--dim);cursor:pointer;font-size:11px;white-space:nowrap}
.burn{background:linear-gradient(135deg,#ff6b3522,#ef444422);border:1px solid var(--accent);border-radius:10px;padding:14px;margin:10px 0}
.burn-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:700}
.vs{font-size:1.4em;font-weight:800;color:var(--accent);text-align:center;padding:4px}
</style></head><body>
<a class="home" href="../index.html">&larr; home</a>
<h1>&#x1f525; Trade Smack Talk Generator</h1>
<p style="color:var(--dim);font-size:13px">Friendly fire between the trades since forever</p>
<div class="row">
<div class="col"><label>Your Trade</label><select id="you"></select></div>
<div class="col" style="flex:0;display:flex;align-items:end"><div class="vs">vs</div></div>
<div class="col"><label>Roast This Trade</label><select id="them"></select></div>
</div>
<div style="margin:12px 0;display:flex;gap:8px;flex-wrap:wrap">
<button onclick="roast()">&#x1f525; GENERATE ROAST</button>
<button class="sm" onclick="random()">&#x1f3b2; Random Matchup</button>
</div>
<div id="out" class="card" style="display:none">
<div class="joke" id="jokeTxt"></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
<button class="sm" onclick="saveFav()">&#x2b50; Favorite</button>
<button class="sm" onclick="copyJoke()">&#x1f4cb; Copy</button>
<button class="sm" onclick="roast()">&#x1f504; Another</button>
</div></div>
<div class="burn" id="botd"></div>
<h2>&#x2b50; Saved Favorites</h2>
<div id="favs"></div>
<script>
const TRADES=["Electrician","Plumber","Carpenter","Ironworker","Concrete Finisher","HVAC Tech","Painter","Roofer","Drywaller","Heavy Equipment Operator","Laborer","Welder","Mason","Glazier","Insulator"];
const J=[
["_","Electrician","Electricians: the only trade that's shocked when they show up on time."],
["_","Electrician","An electrician's favorite exercise? Running conduit... and running from responsibility."],
["_","Electrician","Electricians spend 4 years in apprenticeship to learn that the switch was off the whole time."],
["_","Electrician","How do you spot the electrician on a job site? They're the ones standing around 'troubleshooting.'"],
["_","Electrician","Electricians don't die, they just lose their spark."],
["_","Electrician","I asked the electrician to work faster. He said he could, but it would cost extra. He was already charging by the hour."],
["_","Electrician","Electricians have one speed: 'waiting for the drywallers to finish.'"],
["_","Electrician","An electrician walks into a bar. And a wall. And a door frame. He forgot his headlamp."],
["_","Electrician","Why do electricians make bad poker players? They can never resist a full house panel."],
["_","Electrician","Electricians are just plumbers who were afraid of poop."],
["_","Plumber","Plumbers: half their job is telling you why the other plumber did it wrong."],
["_","Plumber","A plumber's creed: hot on the left, cold on the right, and blame on the last guy."],
["_","Plumber","How many plumbers does it take to change a lightbulb? None, that's not in their scope. But they'll charge you a service call to tell you that."],
["_","Plumber","Plumbers: because somebody has to deal with everyone else's crap. Literally."],
["_","Plumber","A plumber showed up on time once. Nobody was there to witness it."],
["_","Plumber","Plumbers claim they make the most money. They also spend the most on therapy."],
["_","Plumber","The plumber's truck has $40,000 worth of tools and smells like a crime scene."],
["_","Plumber","What's a plumber's favorite movie? The Drain Drain Redemption."],
["_","Plumber","Plumbers walk around the site like they own the place because you can't flush without them and they know it."],
["_","Plumber","You know you're a plumber when you judge restaurants by their pipe fittings."],
["_","Carpenter","Carpenters: measuring twice, cutting once, then blaming the lumber for being warped."],
["_","Carpenter","A carpenter's favorite pickup line: 'Are you a stud? Because I've been looking for you behind this drywall.'"],
["_","Carpenter","Carpenters carry a pencil behind their ear even when they're at the grocery store. It's a lifestyle."],
["_","Carpenter","How does a carpenter count? Caulk it, trim it, paint it... nobody will notice."],
["_","Carpenter","Carpenters: the only trade that thinks a 16th of an inch matters and also thinks 'close enough' is a valid measurement."],
["_","Carpenter","A carpenter's definition of level: 'looks good from my house.'"],
["_","Carpenter","You know you're a carpenter when you own 14 hammers and can't find any of them."],
["_","Carpenter","Carpenters don't make mistakes, they make 'custom features.'"],
["_","Carpenter","Why did the carpenter break up with the calculator? He could only count on his tape measure."],
["_","Carpenter","The carpenter said the wall was plumb. The level said otherwise. The carpenter said the level was wrong."],
["_","Ironworker","Ironworkers: afraid of nothing except paperwork."],
["_","Ironworker","Ironworkers walk on beams 200 feet up like it's nothing, then trip over a 2x4 on the ground."],
["_","Ironworker","How do you know an ironworker is at a party? Don't worry, they'll tell you. Loudly."],
["_","Ironworker","Ironworkers don't read blueprints, they just bench press them."],
["_","Ironworker","An ironworker's lunch box weighs more than most apprentices."],
["_","Ironworker","You know you're an ironworker when your idea of 'light duty' is only carrying one beam."],
["_","Ironworker","Ironworkers' retirement plan: knees optional."],
["_","Ironworker","Ironworkers walk on steel at 300 feet but need directions to find the porta-john on the ground."],
["_","Concrete Finisher","Concrete finishers: the only people who get excited about watching paint dry, except it's not paint, and they take it personally."],
["_","Concrete Finisher","A concrete finisher's version of a bad day: footprints in fresh mud."],
["_","Concrete Finisher","Why do concrete finishers work so hard? Because once it sets, their mistakes are literally set in stone."],
["_","Concrete Finisher","Concrete finishers spend 8 hours making it perfect, then a bird walks across it."],
["_","Concrete Finisher","You know you're a concrete finisher when you judge every sidewalk you walk on."],
["_","Concrete Finisher","Concrete finishers start at 4 AM because concrete doesn't care about your alarm clock."],
["_","HVAC Tech","HVAC techs: the only trade that can make the entire building uncomfortable while 'fixing' it."],
["_","HVAC Tech","An HVAC tech's solution to everything: 'Have you tried turning it off and back on?'"],
["_","HVAC Tech","HVAC techs run the most ductwork in the tightest spaces then blame the architect for bad design."],
["_","HVAC Tech","You know you're an HVAC tech when you judge every building by its thermostat placement."],
["_","HVAC Tech","HVAC: where 'a little leak' means the whole ceiling is coming down next Tuesday."],
["_","HVAC Tech","HVAC techs talk about airflow the way sommeliers talk about wine. Nobody else cares."],
["_","Painter","Painters: making everyone else's mistakes disappear since forever."],
["_","Painter","You know you're a painter when you have more paint on your clothes than on the walls."],
["_","Painter","How many painters does it take to finish a room? One, but it'll take 3 coats and 5 'touch-ups.'"],
["_","Painter","Painters show up last and somehow get blamed first."],
["_","Painter","A painter's biggest enemy isn't bad walls — it's the client's Pinterest board."],
["_","Painter","Painters have the cleanest hands on site because they wash them 47 times a day. Still have paint in their hair though."],
["_","Painter","Painters: turning 'eggshell' into 'ivory' since the client can't tell the difference anyway."],
["_","Roofer","Roofers: the only trade where the commute to work is a ladder."],
["_","Roofer","You know you're a roofer when 'calling in sick' means it's only 98 degrees instead of 110."],
["_","Roofer","Roofers are the toughest trade because they chose a job where the work surface is trying to kill them."],
["_","Roofer","A roofer's tan line starts at the hard hat and ends at the boot."],
["_","Roofer","Roofers don't retire, they just stop being able to climb the ladder."],
["_","Roofer","How do roofers stay cool? They don't. They just suffer in silence above everyone else."],
["_","Drywaller","Drywallers: turning a building into a cloud of dust since 1916."],
["_","Drywaller","How many drywallers does it take to change a lightbulb? None, that's the electrician's problem... in 3 weeks."],
["_","Drywaller","A drywaller's favorite phrase: 'The painter will fix it.'"],
["_","Drywaller","You know you're a drywaller when you blow your nose and it comes out white."],
["_","Drywaller","Drywallers move faster than any other trade. They also leave more mess than any other trade. Coincidence?"],
["_","Drywaller","Drywallers don't walk, they spackle their way through life."],
["_","Heavy Equipment Operator","Equipment operators: getting paid to sit down while everyone else stands."],
["_","Heavy Equipment Operator","You know you're an operator when you wave at other operators on the highway like you're in a secret club."],
["_","Heavy Equipment Operator","Equipment operators move more dirt by 9 AM than the laborers do all day. And they'll remind you of it."],
["_","Heavy Equipment Operator","An operator's biggest fear: someone else adjusting their seat."],
["_","Heavy Equipment Operator","Equipment operators have the best job site view and the worst job site back."],
["_","Laborer","Laborers: doing everything nobody else wants to do, and being told they're 'unskilled.'"],
["_","Laborer","Laborers know where everything is on site because they're the ones who moved it there. Twice."],
["_","Laborer","You know you're a laborer when your job description is 'yes.'"],
["_","Laborer","Laborers carry everything except a grudge. Just kidding, they carry that too."],
["_","Laborer","A laborer's workout plan: go to work. That's it. That's the plan."],
["_","Welder","Welders: staring at the sun for a living and calling it skilled labor."],
["_","Welder","You know you're a welder when your clothes have more holes than fabric."],
["_","Welder","A welder's cologne: smoke, slag, and regret."],
["_","Welder","Welders don't tan, they just accumulate a protective layer of UV damage."],
["_","Welder","Welders claim their job is art. The grinding wheel says otherwise."],
["_","Welder","How do you know a welder did a good job? They'll show you 47 pictures of the bead."],
["_","Mason","Masons: stacking blocks and acting superior since the pyramids."],
["_","Mason","You know you're a mason when your idea of a vacation involves looking at old brick buildings."],
["_","Mason","Masons are the only trade that thinks lunch is just a break between mortar batches."],
["_","Mason","A mason's hands look like they belong to a 90-year-old by age 30."],
["_","Mason","Masons: 'It's not a wall, it's a work of art.' Sir, it's a retaining wall behind a Wendy's."],
["_","Glazier","Glaziers: installing windows and shattering expectations since day one."],
["_","Glazier","You know you're a glazier when you judge every building by its window quality."],
["_","Glazier","Glaziers handle the most expensive material on site with the least amount of margin for error. No pressure."],
["_","Glazier","A glazier's worst nightmare: a bird. Just... birds."],
["_","Glazier","Glaziers are the reason the phrase 'you break it, you buy it' hits different on a construction site."],
["_","Insulator","Insulators: wrapping things for a living and somehow making it sound complicated."],
["_","Insulator","You know you're an insulator when you're itchy 24/7 and it's just your normal state."],
["_","Insulator","Insulators: invisible until the building fails inspection, then suddenly the most important trade on site."],
["_","Insulator","An insulator's idea of a good time: a perfectly wrapped elbow joint."],
["_","Insulator","Nobody remembers the insulator's name until the pipes freeze."],
["Electrician","Plumber","Hey plumber, we both run pipe — mine just doesn't carry sewage."],
["Plumber","Electrician","At least when I make a mistake, it doesn't kill anyone. It just floods the building."],
["Carpenter","Drywaller","I spend a week framing perfect walls and the drywaller covers my art in dust and sadness."],
["Drywaller","Carpenter","If your framing was actually straight, I wouldn't need so much mud."],
["Electrician","Carpenter","Carpenters drill a thousand holes. Electricians fill them with purpose."],
["Plumber","HVAC Tech","HVAC guys run a duct the size of a Buick through my pipe space then complain about clearance."],
["HVAC Tech","Plumber","Plumbers put a 4-inch waste line exactly where my main trunk was supposed to go. Every single time."],
["Ironworker","Carpenter","Carpenters build with wood. We build with steel. This conversation is over."],
["Carpenter","Ironworker","Sure, you carry steel. We carry precision. And you're welcome for the forms your concrete goes into."],
["Painter","Drywaller","I can't paint over craters. This isn't the moon. Sand it again."],
["Drywaller","Painter","If painters could apply paint half as thick as they apply excuses, they'd only need one coat."],
["Laborer","_","I've done every trade's grunt work. I know where all the bodies are buried. Literally, I dug the holes."],
["Welder","Ironworker","Ironworkers connect steel. Welders make it permanent. You're the setup crew."],
["Ironworker","Welder","Without us, you'd be welding on the ground. You're welcome for the altitude."],
["Roofer","Painter","Painters complain about fumes. Roofers work in 130-degree heat on black tar. Your argument is invalid."],
["Mason","Concrete Finisher","We lay each block by hand with precision. You just pour slurry and push it around with a flat stick."],
["Concrete Finisher","Mason","Our work holds up the entire building. Your work holds up a mailbox."],
["Electrician","HVAC Tech","HVAC guys think they're electricians because they wire a thermostat. That's cute."],
["HVAC Tech","Electrician","We design entire comfort systems. You install outlets. We are not the same."],
["Glazier","Carpenter","Carpenters leave rough openings that are anything but. I've seen better framing on a kindergarten art project."],
["Heavy Equipment Operator","Laborer","I move in 5 minutes what takes you all day with a shovel. But sure, tell me about hard work."],
["Laborer","Heavy Equipment Operator","Must be nice having a seat and A/C. Some of us actually break a sweat."],
["Insulator","HVAC Tech","I make your system actually work. Without me, your ductwork is just a really expensive wind tunnel."],
["Plumber","Carpenter","Carpenters think caulk fixes everything. Newsflash: caulk is not a building material."],
["Carpenter","Plumber","At least I can tell clients what I do without them making a face."],
["Electrician","Laborer","Laborers carry materials. Electricians carry knowledge. Both are heavy but only one earns journeyman rate."],
["Laborer","Electrician","I've seen apprentice electricians spend 20 minutes looking for a stud. I found 6 in the time it took you to find your stud finder."],
["Welder","Plumber","Plumbers solder. Welders WELD. There's a difference and it's measured in amps."],
["Roofer","HVAC Tech","HVAC puts a unit on my roof then it leaks for 10 years. Thanks for that."],
["Painter","Carpenter","Caulk and paint make a carpenter what he ain't. I'm basically your PR department."],
["Mason","Carpenter","Wood rots. Brick doesn't. See you at the 100-year mark."],
["Carpenter","Mason","We frame an entire house in a week. You lay 200 bricks. Same week."]
];
const sel1=document.getElementById('you'),sel2=document.getElementById('them');
TRADES.forEach(t=>{sel1.innerHTML+=`<option>${t}</option>`;sel2.innerHTML+=`<option>${t}</option>`});
sel2.selectedIndex=1;
let curJoke='',favs=JSON.parse(localStorage.getItem('smack_favs')||'[]');
function getJokes(you,them){
  return J.filter(j=>{
    const from=j[0],to=j[1];
    if(from==='_'&&to===them)return true;
    if(from===you&&to===them)return true;
    if(from===you&&to==='_')return true;
    if(from==='_'&&to===you)return false;
    return false;
  }).map(j=>j[2]);
}
function roast(){
  const you=sel1.value,them=sel2.value;
  if(you===them){alert("You can't roast your own trade! That's just self-deprecation. Pick someone else.");return}
  let pool=getJokes(you,them);
  if(!pool.length)pool=J.filter(j=>j[1]===them).map(j=>j[2]);
  if(!pool.length)pool=["Even the joke generator couldn't find anything bad to say about "+them+". That's how forgettable they are."];
  curJoke=pool[Math.floor(Math.random()*pool.length)];
  document.getElementById('out').style.display='block';
  document.getElementById('jokeTxt').textContent=curJoke;
}
function random(){sel1.selectedIndex=Math.floor(Math.random()*TRADES.length);
  let t;do{t=Math.floor(Math.random()*TRADES.length)}while(t===sel1.selectedIndex);sel2.selectedIndex=t;roast()}
function saveFav(){if(!curJoke)return;if(!favs.includes(curJoke)){favs.unshift(curJoke);if(favs.length>20)favs.pop();localStorage.setItem('smack_favs',JSON.stringify(favs));renderFavs()}}
function copyJoke(){if(curJoke)navigator.clipboard.writeText(curJoke)}
function delFav(i){favs.splice(i,1);localStorage.setItem('smack_favs',JSON.stringify(favs));renderFavs()}
function renderFavs(){document.getElementById('favs').innerHTML=favs.length?favs.map((f,i)=>`<div class="fav-item"><span>${f}</span><span class="del" onclick="delFav(${i})">remove</span></div>`).join(''):'<div style="color:var(--dim);font-size:13px">No favorites saved yet</div>'}
function burnOfDay(){const day=Math.floor(Date.now()/864e5);const j=J[day%J.length];
  document.getElementById('botd').innerHTML=`<div class="burn-label">Burn of the Day</div><div style="font-size:1.1em;margin-top:6px">${j[2]}</div>`}
renderFavs();burnOfDay();
</script></body></html>
