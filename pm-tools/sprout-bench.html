<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Sprout Benchmarks</title>
<style>
:root{
  --bg:#0a0a0b;--bg2:#111113;--bg3:#161618;--bg4:#1c1c1f;
  --border:#222225;--border2:#333336;--text:#e8e8ea;--dim:#6e6e73;
  --accent:#4ade80;--accent-dim:rgba(74,222,128,0.10);
  --orange:#ff6b35;--gold:#f7c948;--purple:#a78bfa;
  --blue:#38bdf8;--red:#ef4444;--cyan:#22d3ee;--pink:#f472b6;
  --mono:ui-monospace,'SF Mono','Cascadia Mono','Fira Code',Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 12px;display:flex;align-items:center;gap:8px;
  height:46px;flex-shrink:0;position:sticky;top:0;z-index:10;
}
.bar .brand{font-size:15px;font-weight:800;color:var(--accent);text-decoration:none;white-space:nowrap}
.bar .title{font-size:13px;font-weight:600;color:var(--dim);white-space:nowrap}
.bar .spacer{flex:1;min-width:4px}
.bar a.link{
  font-size:11px;font-weight:600;color:var(--dim);text-decoration:none;
  padding:4px 8px;border-radius:6px;border:1px solid var(--border);
  white-space:nowrap;transition:all .15s;
}
.bar a.link:hover{color:var(--text);border-color:var(--border2)}
.bar button{
  border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:var(--sans);white-space:nowrap;
}
.btn-run{background:var(--accent);color:#111}
.btn-run:active{opacity:.8}
.btn-run:disabled{opacity:.5;cursor:default}

.container{max-width:800px;margin:0 auto;padding:16px 12px 40px}

.intro{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;margin-bottom:16px;font-size:12px;line-height:1.6;color:var(--dim);
}
.intro strong{color:var(--text)}

.status-bar{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;margin-bottom:16px;font-size:12px;color:var(--dim);
  display:flex;align-items:center;gap:8px;min-height:36px;
}
.status-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0}
.status-bar .dot.running{background:var(--gold);animation:pulse 0.6s ease-in-out infinite alternate}
.status-bar .dot.done{background:var(--accent)}
.status-bar .dot.error{background:var(--red)}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.status-bar .msg{flex:1}
.status-bar .total{font-weight:700;color:var(--accent);font-family:var(--mono)}

table{width:100%;border-collapse:collapse;font-size:12px}
thead th{
  text-align:left;padding:8px 10px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.8px;color:var(--dim);
  border-bottom:1px solid var(--border);white-space:nowrap;
}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:10px;vertical-align:top}
td.name-cell{font-weight:600;color:var(--text);min-width:100px}
td.name-cell .desc{font-size:10px;color:var(--dim);font-weight:400;margin-top:2px}
td.time-cell{font-family:var(--mono);font-size:12px;white-space:nowrap;text-align:right;min-width:70px}
td.time-cell.sprout{color:var(--accent)}
td.time-cell.native{color:var(--blue)}
td.time-cell.python{color:var(--gold)}
td.ratio-cell{font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap;min-width:50px}

.bar-wrap{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.bar-row{display:flex;align-items:center;gap:6px;font-size:10px}
.bar-row .label{width:44px;text-align:right;flex-shrink:0;font-weight:600}
.bar-row .label.sprout-l{color:var(--accent)}
.bar-row .label.js-l{color:var(--blue)}
.bar-row .label.py-l{color:var(--gold)}
.bar-row .track{flex:1;height:10px;background:var(--bg3);border-radius:3px;overflow:hidden;min-width:40px}
.bar-row .fill{height:100%;border-radius:3px;transition:width 0.5s ease;min-width:1px}
.bar-row .fill.sprout-f{background:var(--accent)}
.bar-row .fill.js-f{background:var(--blue)}
.bar-row .fill.py-f{background:var(--gold)}
.bar-row .val{width:56px;font-family:var(--mono);font-size:10px;color:var(--dim)}

.bench-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;
}
.bench-card .card-head{
  padding:10px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.bench-card .card-head .num{
  width:24px;height:24px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:var(--dim);flex-shrink:0;
}
.bench-card .card-head .bench-name{font-weight:700;font-size:13px;flex:1}
.bench-card .card-head .bench-desc{font-size:10px;color:var(--dim)}
.bench-card .card-body{padding:12px 14px}

.times-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.time-box{
  background:var(--bg3);border-radius:6px;padding:8px;text-align:center;
}
.time-box .t-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.time-box .t-label.spr{color:var(--accent)}
.time-box .t-label.js{color:var(--blue)}
.time-box .t-label.py{color:var(--gold)}
.time-box .t-value{font-family:var(--mono);font-size:16px;font-weight:700}
.time-box .t-value.spr{color:var(--accent)}
.time-box .t-value.js{color:var(--blue)}
.time-box .t-value.py{color:var(--gold)}
.time-box .t-value.pending{color:var(--dim);font-size:12px;font-weight:400}

.ratio-badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-family:var(--mono);font-size:11px;font-weight:700;
}
.ratio-badge.good{background:rgba(74,222,128,0.12);color:var(--accent)}
.ratio-badge.ok{background:rgba(247,201,72,0.12);color:var(--gold)}
.ratio-badge.slow{background:rgba(239,68,68,0.12);color:var(--red)}

.summary{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:16px;margin-top:16px;
}
.summary h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--accent)}
.summary .stat-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.summary .stat-row:last-child{border-bottom:none}
.summary .stat-label{color:var(--dim)}
.summary .stat-val{font-family:var(--mono);font-weight:600}

@media(max-width:500px){
  .bar{padding:0 8px;gap:5px;height:42px}
  .bar .title{display:none}
  .bar button{padding:4px 10px;font-size:11px}
  .container{padding:10px 8px 30px}
  .times-grid{grid-template-columns:1fr 1fr 1fr;gap:4px}
  .time-box .t-value{font-size:13px}
}
</style>
</head>
<body>

<div class="bar">
  <a href="sprout.html" class="brand">Sprout</a>
  <span class="title">Benchmarks</span>
  <span class="spacer"></span>
  <a href="sprout-ide.html" class="link">IDE</a>
  <a href="sprout.html" class="link">Language</a>
  <button class="btn-run" id="runBtn">Run All</button>
</div>

<div class="container">
  <div class="intro">
    Compares <strong>Sprout</strong> (compiled to JS via tojs.js) against hand-written <strong>native JavaScript</strong>,
    with <strong>Python</strong> reference times (measured offline, shown as static numbers).
    Each benchmark runs 5 times; the <strong>median</strong> is reported.
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span class="msg" id="statusMsg">Ready. Tap "Run All" to start.</span>
    <span class="total" id="statusTotal"></span>
  </div>

  <div id="results"></div>
  <div class="summary" id="summary" style="display:none"></div>
</div>

      let total = 0;
      for (let i = 0; i < 1000000; i++) total += i;
      return total;
    }
  },
  {
    name: "Sieve to 10,000",
    desc: "Sieve of Eratosthenes",
    python: 5,
    sproutCode: `n : 10000\nsieve : list n\ni : 1\nwhile [i <= n] [sieve i : 1, i : i + 1]\nsieve 1 : 0\np : 2\nwhile [p * p <= n] [\n  sieve p = 1 [\n    (j : p * p\n    while [j <= n] [sieve j : 0, j : j + p]),\n    0\n  ]\n  p : p + 1\n]\ncount : 0\ni : 2\nwhile [i <= n] [sieve i = 1 [count : count + 1, 0], i : i + 1]\ncount`,
    nativeJS: function() {
      const n = 10000;
      const sieve = new Uint8Array(n + 1);
      sieve.fill(1);
      sieve[0] = sieve[1] = 0;
      for (let p = 2; p * p <= n; p++) {
        if (sieve[p]) {
          for (let j = p * p; j <= n; j += p) sieve[j] = 0;
        }
      }
      let count = 0;
      for (let i = 2; i <= n; i++) if (sieve[i]) count++;
      return count;
    }
  },
  {
    name: "Collatz 1..1000",
    desc: "Total steps for n=1 to 1000",
    python: 25,
    sproutCode: `total : 0\ni : 1\nwhile [i <= 1000] [\n  n : i\n  steps : 0\n  while [n != 1] [\n    n % 2 = 0 [n : n / 2, n : 3 * n + 1]\n    steps : steps + 1\n  ]\n  total : total + steps\n  i : i + 1\n]\ntotal`,
    nativeJS: function() {
      let total = 0;
      for (let i = 1; i <= 1000; i++) {
        let n = i, steps = 0;
        while (n !== 1) {
          n = (n % 2 === 0) ? n / 2 : 3 * n + 1;
          steps++;
        }
        total += steps;
      }
      return total;
    }
  },
  {
    name: "Map 10,000 squares",
    desc: "collect [@ * @]",
    python: 3,
    sproutCode: `range 10000 collect [@ * @]`,
    nativeJS: function() {
      const arr = new Array(10000);
      for (let i = 0; i < 10000; i++) arr[i] = (i + 1) * (i + 1);
      return arr;
    }
  }
];

// ── Render ──

function renderCards() {
  const container = $('results');
  container.innerHTML = '';
  BENCHMARKS.forEach((b, idx) => {
    const card = document.createElement('div');
    card.className = 'bench-card';
    card.id = 'bench-' + idx;
    card.innerHTML = `
      <div class="card-head">
        <div class="num">${idx + 1}</div>
        <div>
          <div class="bench-name">${b.name}</div>
          <div class="bench-desc">${b.desc}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="times-grid">
          <div class="time-box">
            <div class="t-label spr">Sprout</div>
            <div class="t-value spr pending" id="spr-${idx}">--</div>
          </div>
          <div class="time-box">
            <div class="t-label js">Native JS</div>
            <div class="t-value js pending" id="js-${idx}">--</div>
          </div>
          <div class="time-box">
            <div class="t-label py">Python</div>
            <div class="t-value py" id="py-${idx}">${formatTime(b.python)}</div>
          </div>
        </div>
        <div class="bar-wrap" id="bars-${idx}">
          <div class="bar-row">
            <span class="label sprout-l">Sprout</span>
            <span class="track"><span class="fill sprout-f" id="bar-spr-${idx}" style="width:0%"></span></span>
            <span class="val" id="barval-spr-${idx}"></span>
          </div>
          <div class="bar-row">
            <span class="label js-l">JS</span>
            <span class="track"><span class="fill js-f" id="bar-js-${idx}" style="width:0%"></span></span>
            <span class="val" id="barval-js-${idx}"></span>
          </div>
          <div class="bar-row">
            <span class="label py-l">Python</span>
            <span class="track"><span class="fill py-f" id="bar-py-${idx}" style="width:0%"></span></span>
            <span class="val" id="barval-py-${idx}"></span>
          </div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });
}

function formatTime(ms) {
  if (ms < 0.01) return '<0.01ms';
  if (ms < 1) return ms.toFixed(2) + 'ms';
  if (ms < 100) return ms.toFixed(1) + 'ms';
  return Math.round(ms) + 'ms';
}

function ratioClass(ratio) {
  if (ratio <= 3) return 'good';
  if (ratio <= 10) return 'ok';
  return 'slow';
}

function updateCard(idx, sproutMs, jsMs, pyMs) {
  const sprEl = $('spr-' + idx);
  const jsEl = $('js-' + idx);

  sprEl.textContent = formatTime(sproutMs);
  sprEl.classList.remove('pending');
  jsEl.textContent = formatTime(jsMs);
  jsEl.classList.remove('pending');

  const maxMs = Math.max(sproutMs, jsMs, pyMs);
  const pctS = maxMs > 0 ? (sproutMs / maxMs * 100) : 0;
  const pctJ = maxMs > 0 ? (jsMs / maxMs * 100) : 0;
  const pctP = maxMs > 0 ? (pyMs / maxMs * 100) : 0;

  $('bar-spr-' + idx).style.width = Math.max(1, pctS) + '%';
  $('bar-js-' + idx).style.width = Math.max(1, pctJ) + '%';
  $('bar-py-' + idx).style.width = Math.max(1, pctP) + '%';

  $('barval-spr-' + idx).textContent = formatTime(sproutMs);
  $('barval-js-' + idx).textContent = formatTime(jsMs);
  $('barval-py-' + idx).textContent = formatTime(pyMs);
}

function showSummary(results) {
  const sumEl = $('summary');
  sumEl.style.display = '';
  const totalSprout = results.reduce((s, r) => s + r.sprout, 0);
  const totalJS = results.reduce((s, r) => s + r.js, 0);
  const totalPython = results.reduce((s, r) => s + r.python, 0);
  const avgRatio = results.reduce((s, r) => s + r.ratio, 0) / results.length;
  const bestRatio = Math.min(...results.map(r => r.ratio));
  const worstRatio = Math.max(...results.map(r => r.ratio));

  sumEl.innerHTML = `
    <h3>Summary</h3>
    <div class="stat-row">
      <span class="stat-label">Total Sprout time</span>
      <span class="stat-val" style="color:var(--accent)">${formatTime(totalSprout)}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Total Native JS time</span>
      <span class="stat-val" style="color:var(--blue)">${formatTime(totalJS)}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Total Python time (ref)</span>
      <span class="stat-val" style="color:var(--gold)">${formatTime(totalPython)}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Avg Sprout/JS ratio</span>
      <span class="stat-val"><span class="ratio-badge ${ratioClass(avgRatio)}">${avgRatio.toFixed(1)}x</span></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Best ratio (closest to JS)</span>
      <span class="stat-val"><span class="ratio-badge ${ratioClass(bestRatio)}">${bestRatio.toFixed(1)}x</span></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Worst ratio</span>
      <span class="stat-val"><span class="ratio-badge ${ratioClass(worstRatio)}">${worstRatio.toFixed(1)}x</span></span>
    </div>
  `;
}

// ── Run ──

let running = false;

async function runAll() {
  if (running) return;
  running = true;
  const btn = $('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';

  const dot = $('statusDot');
  const msg = $('statusMsg');
  const totalEl = $('statusTotal');

  dot.className = 'dot running';
  msg.textContent = 'Warming up...';
  totalEl.textContent = '';
  $('summary').style.display = 'none';

  // Reset all cards
  BENCHMARKS.forEach((b, idx) => {
    const sprEl = $('spr-' + idx);
    const jsEl = $('js-' + idx);
    sprEl.textContent = '--';
    sprEl.classList.add('pending');
    jsEl.textContent = '--';
    jsEl.classList.add('pending');
    $('bar-spr-' + idx).style.width = '0%';
    $('bar-js-' + idx).style.width = '0%';
    $('bar-py-' + idx).style.width = '0%';
    $('barval-spr-' + idx).textContent = '';
    $('barval-js-' + idx).textContent = '';
    $('barval-py-' + idx).textContent = '';
  });

  // Small delay so the UI can repaint
  await new Promise(r => setTimeout(r, 50));

  const allStart = performance.now();
  const results = [];

  // Pre-compile all Sprout benchmarks
  const sproutFns = [];
  for (let idx = 0; idx < BENCHMARKS.length; idx++) {
    const b = BENCHMARKS[idx];
    try {
      sproutFns.push(compileSprout(b.sproutCode));
    } catch(e) {
      sproutFns.push(null);
      console.error('Compile error for ' + b.name + ':', e);
    }
  }

  for (let idx = 0; idx < BENCHMARKS.length; idx++) {
    const b = BENCHMARKS[idx];
    msg.textContent = `Running ${idx + 1}/${BENCHMARKS.length}: ${b.name}`;

    await new Promise(r => setTimeout(r, 20));

    let sproutMs = 0, jsMs = 0;

    // Run Sprout benchmark
    if (sproutFns[idx]) {
      const sfn = sproutFns[idx];
      sproutMs = benchmark(() => {
        sfn(R.NONE,R.TRUE,R.FALSE,R.eq,R.REQ,R.RANGE,R.ZEROS,R.newmap,R.LEN,R.STORE,R.fmt,
            R.CALL,R.SEND,R.Bounce,R.RUN,R.AR,R.invoke,R.APPLY,R.TCN,R.TC,R.SELT,R.MEMO,R.keyOf,prnt);
      }, 5);
    }

    // Run native JS benchmark
    jsMs = benchmark(b.nativeJS, 5);

    const ratio = jsMs > 0.001 ? sproutMs / jsMs : sproutMs > 0 ? 999 : 1;
    results.push({ sprout: sproutMs, js: jsMs, python: b.python, ratio: ratio });

    updateCard(idx, sproutMs, jsMs, b.python);
  }

  const totalMs = performance.now() - allStart;
  dot.className = 'dot done';
  msg.textContent = `All ${BENCHMARKS.length} benchmarks complete.`;
  totalEl.textContent = formatTime(totalMs);

  showSummary(results);

  btn.disabled = false;
  btn.textContent = 'Run All';
  running = false;
}

$('runBtn').addEventListener('click', runAll);

// ── Init ──
renderCards();

// Auto-run on load
setTimeout(runAll, 300);

})();
</script>
