<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Timeline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f10;color:#e0e0e0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:#ff6b35;text-decoration:none}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #2a2a2d}
.top-bar h1{font-size:1.2rem;color:#ff6b35}
.controls{display:flex;gap:8px;padding:10px 16px;flex-wrap:wrap;align-items:center}
.controls button,.controls select{background:#1a1a1c;color:#e0e0e0;border:1px solid #2a2a2d;border-radius:6px;padding:8px 12px;font-size:.85rem;cursor:pointer}
.controls button.primary{background:#ff6b35;color:#fff;border:none;font-weight:600}
.main{display:flex;flex:1;overflow:hidden}
@media(max-width:700px){.main{flex-direction:column}}
.task-list{width:260px;min-width:200px;border-right:1px solid #2a2a2d;overflow-y:auto;flex-shrink:0}
@media(max-width:700px){.task-list{width:100%;max-height:35vh;border-right:none;border-bottom:1px solid #2a2a2d}}
.task-item{padding:10px 12px;border-bottom:1px solid #1a1a1c;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:.82rem;transition:background .15s}
.task-item:hover{background:#1a1a1c}
.task-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.task-info{flex:1;overflow:hidden}
.task-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-dates{color:#777;font-size:.72rem}
.canvas-wrap{flex:1;overflow:auto;position:relative}
canvas{display:block}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.modal-bg.active{display:flex}
.modal{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:12px;padding:20px;width:90%;max-width:420px}
.modal h2{font-size:1rem;margin-bottom:14px;color:#ff6b35}
.modal label{display:block;font-size:.8rem;color:#aaa;margin:10px 0 4px}
.modal input,.modal select,.modal textarea{width:100%;background:#232326;color:#e0e0e0;border:1px solid #2a2a2d;border-radius:6px;padding:8px 10px;font-size:.85rem;font-family:inherit}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions button{flex:1;padding:10px;border:none;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer}
.btn-save{background:#ff6b35;color:#fff}
.btn-cancel{background:#2a2a2d;color:#e0e0e0}
.btn-delete{background:#ef4444;color:#fff}
.export-box{background:#232326;border:1px solid #2a2a2d;border-radius:8px;padding:12px;font-size:.8rem;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-top:10px;font-family:monospace}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../index.html">&larr; Home</a>
  <h1>Project Timeline</h1>
  <div></div>
</div>
<div class="controls">
  <button class="primary" onclick="openAdd()">+ Add Task</button>
  <select id="zoom" onchange="draw()">
    <option value="day">Day</option>
    <option value="week" selected>Week</option>
    <option value="month">Month</option>
  </select>
  <button onclick="exportText()">Export</button>
</div>
<div class="main">
  <div class="task-list" id="taskList"></div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="cv"></canvas>
  </div>
</div>
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>
<script>
const KEY='timeline-data';
let tasks=JSON.parse(localStorage.getItem(KEY)||'[]');
let editId=null,dragTask=null,dragStartX=0,dragOrigStart=null,dragOrigEnd=null;
const COLORS=['#ff6b35','#4ade80','#60a5fa','#c084fc','#f472b6','#facc15','#34d399','#fb923c'];
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const wrap=document.getElementById('canvasWrap');

function save(){localStorage.setItem(KEY,JSON.stringify(tasks))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/864e5)}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10)}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en',{month:'short',day:'numeric'})}

function getRange(){
  if(!tasks.length)return{min:new Date(),max:addDays(new Date().toISOString().slice(0,10),30)};
  let mn=tasks[0].start,mx=tasks[0].end;
  tasks.forEach(t=>{if(t.start<mn)mn=t.start;if(t.end>mx)mx=t.end});
  return{min:addDays(mn,-3),max:addDays(mx,3)};
}

function renderList(){
  const el=document.getElementById('taskList');
  el.innerHTML=tasks.map(t=>`<div class="task-item" onclick="openEdit('${t.id}')"><span class="task-dot" style="background:${t.color}"></span><div class="task-info"><div class="task-name">${esc(t.name)}</div><div class="task-dates">${fmtDate(t.start)} - ${fmtDate(t.end)}</div></div></div>`).join('');
}

function draw(){
  const dpr=window.devicePixelRatio||1;
  const zoom=document.getElementById('zoom').value;
  const range=getRange();
  const totalDays=daysBetween(range.min,range.max)+1;
  const ROW_H=36,HEADER=50,LEFT=0;
  let dayW=zoom==='day'?40:zoom==='week'?12:4;
  const W=Math.max(wrap.clientWidth,totalDays*dayW+LEFT);
  const H=Math.max(wrap.clientHeight,HEADER+tasks.length*ROW_H+40);
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  // Grid
  ctx.fillStyle='#0f0f10';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a1a1c';ctx.lineWidth=1;
  const today=new Date().toISOString().slice(0,10);
  for(let i=0;i<=totalDays;i++){
    const d=addDays(range.min,i);
    const x=LEFT+i*dayW;
    const dt=new Date(d+'T00:00:00');
    let showLabel=zoom==='day'||(zoom==='week'&&dt.getDay()===1)||(zoom==='month'&&dt.getDate()===1);
    if(showLabel){
      ctx.strokeStyle='#2a2a2d';ctx.beginPath();ctx.moveTo(x,HEADER);ctx.lineTo(x,H);ctx.stroke();
      ctx.fillStyle='#777';ctx.font='11px system-ui';
      ctx.fillText(zoom==='month'?dt.toLocaleDateString('en',{month:'short'}):fmtDate(d),x+2,HEADER-8);
    }
    if(d===today){
      ctx.strokeStyle='#ef4444';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,HEADER);ctx.lineTo(x,H);ctx.stroke();ctx.lineWidth=1;
      ctx.fillStyle='#ef4444';ctx.font='bold 10px system-ui';ctx.fillText('Today',x+3,HEADER-26);
    }
  }
  // Task bars
  tasks.forEach((t,i)=>{
    const y=HEADER+i*ROW_H+6;
    const x1=LEFT+daysBetween(range.min,t.start)*dayW;
    const x2=LEFT+(daysBetween(range.min,t.end)+1)*dayW;
    const bh=ROW_H-12;
    ctx.fillStyle=t.color||'#ff6b35';
    ctx.globalAlpha=.85;
    roundRect(ctx,x1,y,Math.max(x2-x1,dayW),bh,4);
    ctx.fill();ctx.globalAlpha=1;
    if(x2-x1>50){ctx.fillStyle='#fff';ctx.font='bold 11px system-ui';ctx.fillText(t.name,x1+6,y+bh/2+4,x2-x1-12)}
    // Dependency line
    if(t.dep){const pi=tasks.findIndex(x=>x.id===t.dep);if(pi>=0){
      const py=HEADER+pi*ROW_H+6+bh/2;
      const px2=LEFT+(daysBetween(range.min,tasks[pi].end)+1)*dayW;
      ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(px2,py);ctx.lineTo(x1,y+bh/2);ctx.stroke();ctx.setLineDash([]);
    }}
  });
  cv._range=range;cv._dayW=dayW;cv._rowH=ROW_H;cv._header=HEADER;
}

function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath()}

// Drag to reschedule
cv.addEventListener('mousedown',e=>{
  const r=cv.getBoundingClientRect();
  const x=e.clientX-r.left+wrap.scrollLeft,y=e.clientY-r.top+wrap.scrollTop;
  const range=cv._range;if(!range)return;
  const idx=Math.floor((y-cv._header)/cv._rowH);
  if(idx<0||idx>=tasks.length)return;
  const t=tasks[idx];
  const x1=daysBetween(range.min,t.start)*cv._dayW;
  const x2=(daysBetween(range.min,t.end)+1)*cv._dayW;
  if(x>=x1&&x<=x2){dragTask=t;dragStartX=x;dragOrigStart=t.start;dragOrigEnd=t.end;cv.style.cursor='grabbing'}
});
cv.addEventListener('mousemove',e=>{
  if(!dragTask)return;
  const r=cv.getBoundingClientRect();const x=e.clientX-r.left+wrap.scrollLeft;
  const diff=Math.round((x-dragStartX)/cv._dayW);
  dragTask.start=addDays(dragOrigStart,diff);dragTask.end=addDays(dragOrigEnd,diff);
  draw();renderList();
});
document.addEventListener('mouseup',()=>{if(dragTask){save();dragTask=null;cv.style.cursor='default'}});

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function openAdd(){
  editId=null;
  const today=new Date().toISOString().slice(0,10);
  const next=addDays(today,7);
  document.getElementById('modalContent').innerHTML=`<h2>Add Task</h2>
    <label>Name *</label><input id="fName" placeholder="Task name">
    <label>Start Date</label><input id="fStart" type="date" value="${today}">
    <label>End Date</label><input id="fEnd" type="date" value="${next}">
    <label>Category</label><input id="fCat" placeholder="e.g. Design, Dev">
    <label>Color</label><div style="display:flex;gap:6px;margin-top:4px" id="colorPick">${COLORS.map(c=>`<span onclick="pickColor('${c}')" style="width:28px;height:28px;border-radius:6px;background:${c};cursor:pointer;border:2px solid transparent" data-c="${c}"></span>`).join('')}</div>
    <input id="fColor" type="hidden" value="${COLORS[0]}">
    <label>Depends on</label><select id="fDep"><option value="">None</option>${tasks.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveTask()">Save</button></div>`;
  pickColor(COLORS[0]);
  document.getElementById('modalBg').classList.add('active');
}

function openEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;editId=id;
  document.getElementById('modalContent').innerHTML=`<h2>Edit Task</h2>
    <label>Name *</label><input id="fName" value="${esc(t.name)}">
    <label>Start Date</label><input id="fStart" type="date" value="${t.start}">
    <label>End Date</label><input id="fEnd" type="date" value="${t.end}">
    <label>Category</label><input id="fCat" value="${esc(t.cat||'')}">
    <label>Color</label><div style="display:flex;gap:6px;margin-top:4px" id="colorPick">${COLORS.map(c=>`<span onclick="pickColor('${c}')" style="width:28px;height:28px;border-radius:6px;background:${c};cursor:pointer;border:2px solid transparent" data-c="${c}"></span>`).join('')}</div>
    <input id="fColor" type="hidden" value="${t.color}">
    <label>Depends on</label><select id="fDep"><option value="">None</option>${tasks.filter(x=>x.id!==id).map(x=>`<option value="${x.id}"${t.dep===x.id?' selected':''}>${esc(x.name)}</option>`).join('')}</select>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-delete" onclick="delTask()">Delete</button><button class="btn-save" onclick="saveTask()">Save</button></div>`;
  pickColor(t.color);
  document.getElementById('modalBg').classList.add('active');
}

function pickColor(c){
  document.getElementById('fColor').value=c;
  document.querySelectorAll('#colorPick span').forEach(s=>s.style.borderColor=s.dataset.c===c?'#fff':'transparent');
}

function saveTask(){
  const name=document.getElementById('fName').value.trim();if(!name)return;
  const obj={name,start:document.getElementById('fStart').value,end:document.getElementById('fEnd').value,cat:document.getElementById('fCat').value.trim(),color:document.getElementById('fColor').value,dep:document.getElementById('fDep').value||null};
  if(editId){const t=tasks.find(x=>x.id===editId);if(t)Object.assign(t,obj)}
  else{obj.id=uid();tasks.push(obj)}
  save();closeModal();renderList();draw();
}

function delTask(){if(editId){tasks=tasks.filter(t=>t.id!==editId);save();closeModal();renderList();draw()}}
function closeModal(){document.getElementById('modalBg').classList.remove('active')}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

function exportText(){
  let txt='PROJECT TIMELINE\n'+('='.repeat(40))+'\n\n';
  tasks.forEach(t=>{txt+=`${t.name}\n  ${fmtDate(t.start)} - ${fmtDate(t.end)} (${daysBetween(t.start,t.end)+1} days)\n  Category: ${t.cat||'—'}\n\n`});
  document.getElementById('modalContent').innerHTML=`<h2>Export</h2><div class="export-box">${esc(txt)}</div><div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Close</button></div>`;
  document.getElementById('modalBg').classList.add('active');
}

window.addEventListener('resize',draw);
renderList();draw();
</script>
</body>
</html>
