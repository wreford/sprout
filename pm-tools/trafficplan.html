<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Traffic Control Plan Builder</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:8px}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.2em;margin:6px 0 8px}
.top{display:flex;flex-wrap:wrap;gap:8px;align-items:start;margin-bottom:8px}
.palette{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;min-width:140px}
.palette-item{display:flex;align-items:center;gap:6px;padding:6px;cursor:pointer;border-radius:6px;font-size:12px;margin:2px 0;border:2px solid transparent;transition:all .15s;user-select:none;-webkit-user-select:none}
.palette-item:hover{background:var(--border)}
.palette-item.active{border-color:var(--accent);background:rgba(255,107,53,.12)}
.palette-item .icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px}
canvas{background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:crosshair;flex:1;min-width:300px}
.side{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;min-width:180px;font-size:12px}
.side h3{font-size:13px;margin-bottom:6px;color:var(--accent)}
button{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;margin:3px 2px}
button:hover{opacity:.85}
.calc{margin-top:8px}.calc label{font-size:11px;color:var(--dim)}.calc input{width:80px;padding:4px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;margin:2px 4px}
.ref{font-size:10px;color:var(--dim);margin-top:8px}
@media print{.no-print{display:none!important}canvas{border:1px solid #ccc}}
</style></head><body>
<a href="../index.html" class="home">← home</a>
<h1>Traffic Control Plan Builder</h1>
<div class="top">
<div class="palette no-print">
 <div style="font-size:11px;color:var(--dim);margin-bottom:4px">Tap item, then tap canvas to place:</div>
 <div class="palette-item" data-type="cone"><div class="icon">🔶</div>Cone</div>
 <div class="palette-item" data-type="barrel"><div class="icon">🛢️</div>Barrel</div>
 <div class="palette-item" data-type="barricade"><div class="icon">🚧</div>Barricade</div>
 <div class="palette-item" data-type="sign_ahead"><div class="icon">⚠️</div>Construction Ahead</div>
 <div class="palette-item" data-type="sign_lane"><div class="icon">🚫</div>Lane Closed</div>
 <div class="palette-item" data-type="sign_detour"><div class="icon">↩️</div>Detour</div>
 <div class="palette-item" data-type="sign_speed"><div class="icon">🔻</div>Speed Reduced</div>
 <div class="palette-item" data-type="flagger"><div class="icon">🧑</div>Flagger</div>
 <div class="palette-item" data-type="arrow_r"><div class="icon">➡️</div>Arrow Right</div>
 <div class="palette-item" data-type="arrow_l"><div class="icon">⬅️</div>Arrow Left</div>
</div>
<canvas id="cv" width="640" height="500"></canvas>
<div class="side">
 <h3>Equipment List</h3>
 <div id="eqlist">Place items on canvas</div>
 <div class="calc">
  <h3 style="margin-top:10px">Taper Calculator</h3>
  <label>Speed (km/h)</label><input id="spd" type="number" value="60"><br>
  <label>Lane W (m)</label><input id="lw" type="number" value="3.5"><br>
  <button onclick="calcTaper()">Calculate</button>
  <div id="taper" style="margin-top:6px"></div>
 </div>
 <div style="margin-top:10px">
  <button onclick="clearAll()" class="no-print" style="background:var(--border)">Clear All</button>
  <button onclick="window.print()">Print Plan</button>
 </div>
 <div class="ref">Ref: OTM Book 7</div>
</div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let items=[],selectedTool=null,selIdx=-1,offsetX=0,offsetY=0,isDragging=false;
const typeLabels={cone:'Cone',barrel:'Drum Barrel',barricade:'Barricade',sign_ahead:'Construction Ahead Sign',sign_lane:'Lane Closed Sign',sign_detour:'Detour Sign',sign_speed:'Speed Reduced Sign',flagger:'Flagger',arrow_r:'Arrow Board (R)',arrow_l:'Arrow Board (L)'};
const typeSymbols={cone:'▲',barrel:'●',barricade:'═',sign_ahead:'⚠',sign_lane:'✕',sign_detour:'↩',sign_speed:'▼',flagger:'🧑',arrow_r:'→',arrow_l:'←'};
const typeColors={cone:'#ff6b35',barrel:'#f59e0b',barricade:'#ef4444',sign_ahead:'#facc15',sign_lane:'#ef4444',sign_detour:'#3b82f6',sign_speed:'#facc15',flagger:'#4ade80',arrow_r:'#ff6b35',arrow_l:'#ff6b35'};

function resize(){cv.width=cv.offsetWidth*2;cv.height=500*2;ctx.scale(2,2);draw();}
window.onresize=resize;

// Palette: tap to select tool
document.querySelectorAll('.palette-item').forEach(el=>{
 el.addEventListener('click',()=>{
  if(selectedTool===el.dataset.type){selectedTool=null;}
  else{selectedTool=el.dataset.type;}
  document.querySelectorAll('.palette-item').forEach(p=>p.classList.toggle('active',p.dataset.type===selectedTool));
 });
});

function getPos(e){
 const r=cv.getBoundingClientRect();
 const t=e.touches?e.touches[0]:e;
 return{x:t.clientX-r.left,y:t.clientY-r.top};
}
function hitTest(mx,my){
 for(let i=items.length-1;i>=0;i--){
  if(Math.hypot(items[i].x-mx,items[i].y-my)<22)return i;
 }return -1;
}

// Pointer down: either start dragging existing item, or place new one
function onDown(e){
 e.preventDefault();
 const{x,y}=getPos(e);
 const hit=hitTest(x,y);
 if(hit>=0){
  selIdx=hit;offsetX=x-items[hit].x;offsetY=y-items[hit].y;isDragging=true;
 } else if(selectedTool){
  items.push({type:selectedTool,x,y});draw();updateList();
 }
}
function onMove(e){
 if(!isDragging||selIdx<0)return;
 e.preventDefault();
 const{x,y}=getPos(e);
 items[selIdx].x=x-offsetX;items[selIdx].y=y-offsetY;draw();
}
function onUp(){isDragging=false;selIdx=-1;}

// Mouse events
cv.addEventListener('mousedown',onDown);
cv.addEventListener('mousemove',onMove);
cv.addEventListener('mouseup',onUp);
// Touch events
cv.addEventListener('touchstart',onDown,{passive:false});
cv.addEventListener('touchmove',onMove,{passive:false});
cv.addEventListener('touchend',onUp);

// Double-tap / double-click to delete
let lastTap=0;
cv.addEventListener('click',e=>{
 const now=Date.now();
 if(now-lastTap<350){
  const{x,y}=getPos(e);const hit=hitTest(x,y);
  if(hit>=0){items.splice(hit,1);draw();updateList();}
 }
 lastTap=now;
});

function draw(){
 const W=cv.offsetWidth,H=500;
 ctx.clearRect(0,0,W,H);
 // Road
 ctx.fillStyle='#333';ctx.fillRect(0,H*0.35,W,H*0.3);
 ctx.strokeStyle='#facc15';ctx.lineWidth=2;ctx.setLineDash([15,10]);
 ctx.beginPath();ctx.moveTo(0,H*0.5);ctx.lineTo(W,H*0.5);ctx.stroke();
 ctx.setLineDash([]);ctx.strokeStyle='#fff';ctx.lineWidth=2;
 ctx.beginPath();ctx.moveTo(0,H*0.35);ctx.lineTo(W,H*0.35);ctx.stroke();
 ctx.beginPath();ctx.moveTo(0,H*0.65);ctx.lineTo(W,H*0.65);ctx.stroke();
 // Grid
 ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
 for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
 for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
 // Items
 items.forEach((it,i)=>{
  ctx.fillStyle=typeColors[it.type];ctx.font='bold 20px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(typeSymbols[it.type],it.x,it.y);
  ctx.fillStyle='var(--dim)';ctx.font='9px system-ui';
  ctx.fillText(typeLabels[it.type],it.x,it.y+16);
 });
}

function updateList(){
 const counts={};items.forEach(i=>{counts[i.type]=(counts[i.type]||0)+1;});
 let html='';for(const[k,v]of Object.entries(counts))html+=`<div>${v}x ${typeLabels[k]}</div>`;
 document.getElementById('eqlist').innerHTML=html||'Place items on canvas';
}

function calcTaper(){
 const S=+document.getElementById('spd').value,W=+document.getElementById('lw').value;
 const L=S*S*W/155; // OTM formula
 const buf=L*0.5;
 document.getElementById('taper').innerHTML=`Taper Length: <b style="color:var(--accent)">${L.toFixed(0)} m</b><br>Buffer Space: ${buf.toFixed(0)} m<br><span style="color:var(--dim)">L = S²×W/155 (OTM Book 7)</span>`;
}
function clearAll(){items=[];draw();updateList();}
setTimeout(resize,50);
</script></body></html>
