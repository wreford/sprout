<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Schedule Crasher Game</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:700px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:22px;margin:8px 0 6px}
.hud{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.hud>div{flex:1;min-width:100px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--dim)}
.hud b{display:block;font-size:16px;color:var(--text);margin-top:2px}.hud .warn{color:var(--accent)}.hud .ok{color:var(--green)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
canvas{width:100%;height:320px;border-radius:8px;background:var(--bg);touch-action:none}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.act{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;font-size:13px;transition:.15s}
.act:hover{border-color:var(--accent)}.act.crit{border-left:3px solid #f87171}.act.crashed{background:#ff6b3515;border-color:var(--accent)}
.act .name{font-weight:700;margin-bottom:2px}.act .info{color:var(--dim);font-size:11px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;cursor:pointer;font-weight:700;margin:4px}
.btn:hover{opacity:.85}.btn.sec{background:var(--bg);border:1px solid var(--border);color:var(--text)}
.msg{text-align:center;padding:20px;font-size:16px;line-height:1.6}.stars-d{font-size:24px;color:var(--accent);margin:8px 0}
.bar{height:8px;border-radius:4px;background:var(--border);margin-top:4px;overflow:hidden}.bar>div{height:100%;border-radius:4px;transition:.3s}
.lvl-sel{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.lvl{padding:10px 16px;border-radius:8px;background:var(--bg);border:1px solid var(--border);cursor:pointer;font-size:14px;text-align:center;flex:1;min-width:80px}
.lvl:hover{border-color:var(--accent)}.lvl b{display:block;color:var(--accent)}
</style>
</head>
<body>
<a class="home" href="../index.html">← home</a>
<h1>📊 Schedule Crasher</h1>
<div id="app"></div>
<script>
function Z(id,name,dur,cdur,ccost,deps){return{id,name,dur,cdur,cost:0,ccost,deps}}
const LEVELS=[
{name:'Garage Build',target:2,budget:800,acts:[Z('A','Excavation',3,2,300,[]),Z('B','Foundation',4,3,400,['A']),Z('C','Framing',5,3,500,['B']),Z('D','Electrical',3,2,250,['C']),Z('E','Roofing',4,3,350,['C']),Z('F','Drywall',3,2,200,['D','E']),Z('G','Painting',2,1,150,['F']),Z('H','Garage Door',2,1,100,['C'])]},
{name:'Office Reno',target:3,budget:1200,acts:[Z('A','Demo',4,2,500,[]),Z('B','Rough Plumb',3,2,300,['A']),Z('C','Rough Elec',3,2,350,['A']),Z('D','HVAC',5,3,600,['A']),Z('E','Insulation',2,1,200,['B','C','D']),Z('F','Drywall',4,3,400,['E']),Z('G','Flooring',3,2,350,['F']),Z('H','Trim/Paint',3,2,250,['F']),Z('I','Fixtures',2,1,200,['G','H'])]},
{name:'School Addition',target:4,budget:2000,acts:[Z('A','Site Prep',5,3,600,[]),Z('B','Foundation',6,4,800,['A']),Z('C','Steel Erect',5,3,700,['B']),Z('D','Deck/Slab',4,3,500,['C']),Z('E','Ext. Wall',5,4,400,['C']),Z('F','MEP Rough',6,4,700,['D']),Z('G','Interior',5,3,600,['F','E']),Z('H','Commission',3,2,400,['G']),Z('I','Landscape',3,2,300,['E'])]},
{name:'Hospital Wing',target:5,budget:2500,acts:[Z('A','Excavation',4,2,600,[]),Z('B','Piles',6,4,900,['A']),Z('C','Grade Beams',4,3,500,['B']),Z('D','Structure',7,5,800,['C']),Z('E','Curtain Wall',5,4,500,['D']),Z('F','MEP',8,5,1000,['D']),Z('G','Interior',6,4,700,['E','F']),Z('H','Med Gas',4,3,600,['F']),Z('I','Commission',3,2,500,['G','H']),Z('J','Site Work',4,3,300,['E'])]},
{name:'High-Rise',target:6,budget:3000,acts:[Z('A','Shoring',5,3,700,[]),Z('B','Excavation',6,4,800,['A']),Z('C','Mat Found.',5,3,900,['B']),Z('D','Core/Cols',8,5,1200,['C']),Z('E','Floor Slabs',7,5,800,['D']),Z('F','Facade',6,4,900,['E']),Z('G','MEP Risers',7,5,700,['D']),Z('H','Interiors',6,4,800,['E','G']),Z('I','Elevators',5,3,1000,['D']),Z('J','Punch List',3,2,400,['F','H','I'])]}];
let lv=0,acts,spent,cp,origDur;
function deepCopy(a){return a.map(x=>({...x,deps:[...x.deps],crashed:false,curDur:x.dur}))}
function cpm(a){
  const m={};a.forEach(x=>{m[x.id]={...x,es:0,ef:0,ls:0,lf:0}});
  const order=[],visited=new Set();
  function topo(id){if(visited.has(id))return;visited.add(id);m[id].deps.forEach(d=>topo(d));order.push(id)}
  a.forEach(x=>topo(x.id));
  order.forEach(id=>{const n=m[id];n.es=n.deps.length?Math.max(...n.deps.map(d=>m[d].ef)):0;n.ef=n.es+n.curDur});
  const pd=Math.max(...Object.values(m).map(n=>n.ef));
  order.reverse().forEach(id=>{const n=m[id];const s=a.filter(x=>x.deps.includes(id));n.lf=s.length?Math.min(...s.map(x=>m[x.id].ls)):pd;n.ls=n.lf-n.curDur});
  const cr=new Set();Object.values(m).forEach(n=>{if(Math.abs(n.es-n.ls)<.01)cr.add(n.id)});
  return{m,projDur:pd,critical:cr};
}
function render(){const L=LEVELS[lv];acts=deepCopy(L.acts);spent=0;origDur=cpm(acts).projDur;drawAll()}
function drawAll(){
  const L=LEVELS[lv],res=cpm(acts);cp=res.critical;const pd=res.projDur,dl=origDur-L.target,won=pd<=dl,lost=spent>L.budget;
  let h=`<div class="hud"><div>Duration<b class="${pd<=dl?'ok':'warn'}">${pd} days</b></div><div>Deadline<b>${dl} days</b></div><div>Crash needed<b class="${pd<=dl?'ok':'warn'}">${Math.max(0,pd-dl)}d</b></div><div>Budget<b class="${spent>L.budget?'warn':'ok'}">$${spent} / $${L.budget}</b><div class="bar"><div style="width:${Math.min(100,spent/L.budget*100)}%;background:${spent>L.budget?'#f87171':'var(--green)'}"></div></div></div></div>`;
  h+=`<div class="card"><canvas id="net" height="320"></canvas></div>`;
  if(won&&!lost){
    const eff=1-spent/L.budget,stars=eff>.7?3:eff>.4?2:1;
    h+=`<div class="card msg"><div class="stars-d">${'★'.repeat(stars)+'☆'.repeat(3-stars)}</div>Project completed on time!<br>Spent <b>$${spent}</b> of <b>$${L.budget}</b> budget. Efficiency: <b>${(eff*100).toFixed(0)}%</b><br><br>`;
    h+=lv<LEVELS.length-1?`<button class="btn" onclick="lv++;render()">Next Level →</button>`:`<b style="color:var(--green)">You beat all 5 levels!</b>`;
    h+=`<button class="btn sec" onclick="render()">Replay</button></div>`;
  }else{
    h+=`<div class="acts">`;
    acts.forEach(a=>{const onCp=cp.has(a.id),mx=a.dur-a.cdur,tc=a.dur-a.curDur,cc=tc<mx;
      h+=`<div class="act${onCp?' crit':''}${tc>0?' crashed':''}" onclick="crash('${a.id}')"><div class="name">${a.id}: ${a.name}</div><div class="info">Dur: ${a.curDur}d${tc>0?` (was ${a.dur})`:''} | Crash: ${cc?'-1d = $'+Math.round(a.ccost/mx):'maxed'}</div></div>`});
    h+=`</div>`;
  }
  h+=`<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn sec" onclick="render()">Reset</button><button class="btn sec" onclick="menu()">Levels</button></div>`;
  document.getElementById('app').innerHTML=h;setTimeout(()=>drawNet(res),10);
}
function crash(id){
  const a=acts.find(x=>x.id===id);if(!a)return;const mx=a.dur-a.cdur,tc=a.dur-a.curDur;
  if(tc>=mx)return;a.curDur--;spent+=Math.round(a.ccost/mx);drawAll();
}
function drawNet(res){
  const c=document.getElementById('net');if(!c)return;const ctx=c.getContext('2d');c.width=c.offsetWidth;c.height=320;
  ctx.clearRect(0,0,c.width,c.height);const nodes=Object.values(res.m);
  const cols={};nodes.forEach(n=>{const col=n.es;if(!cols[col])cols[col]=[];cols[col].push(n)});
  const ck=Object.keys(cols).map(Number).sort((a,b)=>a-b),mc=ck.length,px=50,py=30;
  const xs=(c.width-px*2)/Math.max(mc-1,1),pos={};
  ck.forEach((col,ci)=>{const ns=cols[col],ys=(c.height-py*2)/Math.max(ns.length+1,2);ns.forEach((n,ni)=>{pos[n.id]={x:px+ci*xs,y:py+(ni+1)*ys}})});
  nodes.forEach(n=>{n.deps.forEach(d=>{const f=pos[d],t=pos[n.id],onCp=cp.has(d)&&cp.has(n.id);
    ctx.strokeStyle=onCp?'#f87171':'#3a3a3d';ctx.lineWidth=onCp?3:1.5;ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);ctx.stroke();
    const a=Math.atan2(t.y-f.y,t.x-f.x),r=20;ctx.beginPath();ctx.moveTo(t.x-r*Math.cos(a),t.y-r*Math.sin(a));
    ctx.lineTo(t.x-r*Math.cos(a)-8*Math.cos(a-.4),t.y-r*Math.sin(a)-8*Math.sin(a-.4));ctx.moveTo(t.x-r*Math.cos(a),t.y-r*Math.sin(a));
    ctx.lineTo(t.x-r*Math.cos(a)-8*Math.cos(a+.4),t.y-r*Math.sin(a)-8*Math.sin(a+.4));ctx.stroke()})});
  nodes.forEach(n=>{const p=pos[n.id],onCp=cp.has(n.id),cr=n.dur>n.curDur;
    ctx.beginPath();ctx.arc(p.x,p.y,18,0,Math.PI*2);ctx.fillStyle=cr?'#ff6b3530':onCp?'#f8717120':'#1a1a1c';ctx.fill();
    ctx.strokeStyle=cr?'#ff6b35':onCp?'#f87171':'#3a3a3d';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=onCp?'#f87171':'#f0f0f0';ctx.font='bold 12px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(n.id,p.x,p.y-4);
    ctx.fillStyle=cr?'#ff6b35':'#6e6e73';ctx.font='10px system-ui';ctx.fillText(n.curDur+'d',p.x,p.y+8)});
  ctx.font='11px system-ui';ctx.textAlign='left';ctx.fillStyle='#f87171';ctx.fillRect(10,c.height-18,10,10);ctx.fillText('Critical Path',24,c.height-9);
  ctx.fillStyle='#ff6b35';ctx.fillRect(120,c.height-18,10,10);ctx.fillText('Crashed',134,c.height-9);
}
function menu(){
  let h=`<div class="card"><h2 style="color:var(--accent);font-size:18px;border:none;margin:0 0 12px">Select a Project</h2><div class="lvl-sel">`;
  LEVELS.forEach((L,i)=>{h+=`<div class="lvl" onclick="lv=${i};render()"><b>Lv ${i+1}</b>${L.name}<br><span style="font-size:11px;color:var(--dim)">Crash ${L.target}d | $${L.budget}</span></div>`});
  h+=`</div></div>`;document.getElementById('app').innerHTML=h;
}
menu();
</script>
</body>
</html>
