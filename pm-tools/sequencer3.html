<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>TaskIAP — Project Planning</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--surface:#14142a;--border:#2a2a4a;--text:#e8e8f0;--dim:#555580;--accent:#6c5ce7;--accent2:#00cec9;--green:#2ed573;--red:#ff4757;--gold:#ffa502;--radius:12px}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom,0);overflow-x:hidden}
.hidden{display:none!important}
a.home-link{position:fixed;top:env(safe-area-inset-top,10px);left:max(12px,env(safe-area-inset-left,12px));color:var(--dim);text-decoration:none;font-size:13px;z-index:200;transition:.2s;font-family:ui-monospace,"SF Mono",monospace;opacity:.7;padding:4px}
a.home-link:hover{color:var(--accent2);opacity:1}

/* Top bar */
#topBar{display:flex;align-items:center;gap:8px;padding:8px 16px;padding-left:max(56px,env(safe-area-inset-left,56px));padding-right:max(16px,env(safe-area-inset-right));background:rgba(10,10,18,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(108,92,231,.1);position:sticky;top:0;z-index:110;flex-wrap:wrap}
#topBar .title{font-size:clamp(14px,3vw,18px);font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
#topBar .room-code{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--gold);font-family:ui-monospace,"SF Mono",monospace;letter-spacing:.1em}
#topBar .player-count{font-size:12px;color:var(--dim)}
#topBar .timer{font-size:16px;font-weight:700;color:var(--gold);margin-left:auto;font-family:ui-monospace,"SF Mono",monospace}
.spacer{flex:1}

/* Stepper */
#stepper{display:flex;align-items:center;gap:0;padding:10px 16px;background:rgba(10,10,18,.92);backdrop-filter:blur(8px);position:sticky;top:44px;z-index:105;border-bottom:1px solid rgba(42,42,74,.5);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#stepper::-webkit-scrollbar{display:none}
.step{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:20px;cursor:pointer;white-space:nowrap;font-size:12px;font-weight:600;color:var(--dim);transition:.2s;min-height:36px;user-select:none;-webkit-user-select:none;flex-shrink:0}
.step.active{color:var(--accent);background:rgba(108,92,231,.12)}
.step.done{color:var(--green);cursor:pointer}
.step.done:hover{background:rgba(46,213,115,.08)}
.step.locked{opacity:.35;cursor:not-allowed}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:2px solid var(--border);transition:.2s;flex-shrink:0}
.step.active .step-num{border-color:var(--accent);background:var(--accent);color:#fff}
.step.done .step-num{border-color:var(--green);background:var(--green);color:#000}
.step-line{width:16px;height:2px;background:var(--border);flex-shrink:0}
.step-line.done{background:var(--green)}

/* Buttons */
button{background:linear-gradient(135deg,#7c6cf7,var(--accent));color:#fff;border:none;padding:11px 22px;border-radius:var(--radius);font-size:15px;cursor:pointer;transition:all .2s;font-weight:600;box-shadow:0 2px 12px rgba(108,92,231,.25);min-height:44px;min-width:44px;-webkit-tap-highlight-color:transparent}
button:hover{filter:brightness(1.15);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.sec{background:var(--border);box-shadow:none}
button.sec:hover{background:#3a3a5a}
button.sm{font-size:12px;padding:6px 13px;min-height:34px}
button.danger{background:linear-gradient(135deg,#ff6b6b,var(--red));box-shadow:0 2px 12px rgba(255,71,87,.25)}
button.green{background:linear-gradient(135deg,#55efc4,var(--green));color:#000}
button.gold{background:linear-gradient(135deg,#ffc048,var(--gold));color:#000}

/* Inputs */
input,select,textarea{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:11px 14px;border-radius:var(--radius);font-size:16px;width:100%;transition:border-color .2s;min-height:44px;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(108,92,231,.15)}

/* Typography */
h2{font-size:clamp(18px,4vw,24px);font-weight:700;color:var(--accent2);margin-bottom:12px}
h3{font-size:16px;font-weight:600;margin-bottom:8px}

/* Phase overlay */
#phaseOverlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(ellipse at center,rgba(108,92,231,.15),rgba(10,10,18,.97));z-index:500;pointer-events:none;opacity:0;transition:opacity .4s}
#phaseOverlay.show{opacity:1}
#phaseOverlay h1{font-size:clamp(36px,8vw,56px);font-weight:900;color:var(--accent);text-shadow:0 0 60px rgba(108,92,231,.6),0 0 120px rgba(108,92,231,.2)}
#phaseOverlay p{color:var(--accent2);font-size:clamp(16px,3vw,22px);margin-top:8px;font-weight:500}

/* Main content */
.phase-content{max-width:1200px;margin:0 auto;padding:20px 16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));display:none}
.phase-content.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;transition:.2s}
.card:hover{border-color:rgba(108,92,231,.3)}
.card.selected{border-color:var(--accent);box-shadow:0 0 16px rgba(108,92,231,.15)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600;background:rgba(108,92,231,.15);color:var(--accent)}
.pill.green{background:rgba(46,213,115,.15);color:var(--green)}
.pill.red{background:rgba(255,71,87,.15);color:var(--red)}
.pill.gold{background:rgba(255,165,2,.15);color:var(--gold)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;font-weight:600}
.form-group{margin-bottom:14px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s}

/* Template grid */
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:16px 0}
.template-card{background:linear-gradient(145deg,var(--surface),#181838);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden}
.template-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .25s}
.template-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px rgba(108,92,231,.15)}
.template-card:hover::before{opacity:1}
.template-card .tpl-emoji{font-size:1.8rem;display:block;margin-bottom:6px}
.template-card h4{color:var(--accent2);margin-bottom:4px;font-size:13px}
.template-card p{color:var(--dim);font-size:11px}

/* Task cards (brainstorm) */
.task-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-start}
.task-card{background:linear-gradient(145deg,var(--surface),#181838);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-width:170px;max-width:260px;flex:1;animation:cardIn .3s ease;position:relative;transition:.2s}
.task-card:hover{border-color:rgba(108,92,231,.4)}
.task-card.ms{border-color:rgba(255,165,2,.3)}
.task-card .card-name{font-weight:600;cursor:text;padding:2px 4px;border-radius:4px;display:inline-block;font-size:14px}
.task-card .card-name:hover{background:rgba(108,92,231,.15)}
.task-card .ms-badge{display:inline-block;background:var(--gold);color:#000;font-size:9px;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:700}
.task-card .wbs-tag{font-size:11px;color:var(--dim);margin-top:3px}
.task-card .card-actions{display:flex;gap:3px;margin-top:6px}
.task-card .card-actions button{font-size:10px;padding:3px 8px;background:var(--border);border-radius:6px;min-height:28px;min-width:28px;box-shadow:none}
@keyframes cardIn{from{opacity:0;transform:translateY(-20px) scale(.92)}to{opacity:1;transform:none}}

/* Estimation */
.est-row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.est-row input[type=number]{width:70px;text-align:center;min-height:38px;padding:6px}
.est-result{color:var(--gold);font-weight:700;min-width:50px;text-align:center;font-family:ui-monospace,"SF Mono",monospace}
.est-name{flex:1;min-width:140px;font-weight:600;font-size:14px}

/* Planning Poker */
.poker-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px 0}
.poker-cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.poker-card{width:56px;height:78px;border-radius:10px;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;transition:.2s;user-select:none}
.poker-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.poker-card.selected{border-color:var(--accent);background:rgba(108,92,231,.2);transform:translateY(-8px);box-shadow:0 8px 24px rgba(108,92,231,.3)}
.poker-card.revealed{border-color:var(--green);background:rgba(46,213,115,.1)}
.vote-results{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.vote-stat{text-align:center}
.vote-stat .val{font-size:24px;font-weight:800;color:var(--gold);font-family:ui-monospace,"SF Mono",monospace}
.vote-stat .lbl{font-size:10px;color:var(--dim);text-transform:uppercase}

/* Dependencies */
.dep-card{padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.dep-row{display:flex;gap:6px;align-items:center;margin:6px 0;flex-wrap:wrap}
.dep-row select,.dep-row input{width:auto;min-width:80px;flex:1;min-height:38px;padding:6px 10px;font-size:14px}

/* Constraint tags */
.constraint-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.constraint-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(255,165,2,.12);color:var(--gold);cursor:pointer;transition:.15s}
.constraint-tag:hover{background:rgba(255,71,87,.2);color:var(--red);text-decoration:line-through}

/* Resources */
.res-badge{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;margin:2px;color:#fff}
.res-preset-grid{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.res-preset-grid button{font-size:12px;padding:6px 14px;min-height:34px}

/* Stats bar */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.stat-box{background:linear-gradient(145deg,var(--surface),#181838);padding:12px 18px;border-radius:var(--radius);text-align:center;min-width:90px;border:1px solid var(--border);transition:.2s}
.stat-box:hover{border-color:rgba(0,206,201,.3);transform:translateY(-1px)}
.stat-box .val{font-size:20px;font-weight:800;color:var(--accent2);font-family:ui-monospace,"SF Mono",monospace}
.stat-box .lbl{font-size:10px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}

/* Review tabs */
.review-tabs{display:flex;gap:3px;flex-wrap:wrap;margin:12px 0}
.review-tabs button{font-size:11px;padding:7px 12px;border-radius:8px 8px 0 0;background:var(--border);border:1px solid var(--border);border-bottom:none;font-weight:500;transition:.15s;box-shadow:none;min-height:34px}
.review-tabs button:hover{background:#2a2a4a;color:var(--text)}
.review-tabs button.active{background:var(--surface);border-color:var(--accent);color:var(--accent);font-weight:700}
.tab-content{display:none}
.tab-content.active{display:block}

/* Analysis panel */
.analysis-panel{background:linear-gradient(145deg,var(--surface),#181838);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:12px 0}
.analysis-panel h3{color:var(--accent2);margin-bottom:10px;font-size:15px}

/* Critical badges */
.crit-badge{display:inline-block;background:var(--red);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;margin:2px}

/* Canvas wrap */
.canvas-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--radius);background:rgba(13,13,26,.8);margin:10px 0}
canvas{display:block}
#ganttTooltip{position:fixed;background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:10px 14px;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .15s;max-width:300px;line-height:1.6;box-shadow:0 4px 24px rgba(0,0,0,.5)}

/* Export bar */
.export-bar{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;justify-content:center}
.export-bar button{font-size:12px;padding:8px 16px;background:var(--border);box-shadow:none}

/* Leaderboard */
.lb{display:flex;flex-direction:column;gap:6px;margin:16px 0}
.lb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.lb-row:first-child{border-color:rgba(255,165,2,.3);background:linear-gradient(145deg,#1a1630,#201840)}
.lb-row .pts{color:var(--gold);font-weight:800;font-family:ui-monospace,"SF Mono",monospace}

/* Fun fact */
.fun-fact{text-align:center;color:var(--dim);font-style:italic;padding:12px 20px;font-size:12px;max-width:600px;margin:10px auto;border-top:1px solid rgba(108,92,231,.1);opacity:.7}

/* Players bar */
.players-bar{display:flex;gap:6px;flex-wrap:wrap}
.player-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px}
.player-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}

/* Emoji picker */
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.emoji-opt{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:.15s}
.emoji-opt:hover,.emoji-opt.sel{border-color:var(--accent);background:rgba(108,92,231,.15)}

/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:10px;margin:10px 0}
.toggle{position:relative;width:48px;height:26px;background:var(--border);border-radius:13px;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}
.toggle.on::after{left:25px}
.toggle-label{font-size:14px;font-weight:600}

/* AWPP Tabs */
.cwp-tabs{display:flex;gap:4px;overflow-x:auto;margin:12px 0;padding-bottom:4px;scrollbar-width:none}
.cwp-tabs::-webkit-scrollbar{display:none}
.cwp-tab{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--surface);color:var(--dim);transition:.2s;min-height:36px}
.cwp-tab.active{border-color:var(--accent);color:var(--accent);background:rgba(108,92,231,.1)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:none}}
.modal h3{color:var(--accent2);margin-bottom:14px}

/* Restore bar */
#restoreBar{background:var(--surface);border:1px solid var(--gold);border-radius:var(--radius);padding:12px 18px;margin:10px auto;max-width:600px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
#restoreBar p{color:var(--gold);font-size:13px}

/* Scenario row */
.scenario-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg);border-radius:8px;margin:6px 0;gap:8px}

/* Mode select */
.mode-select{display:flex;gap:8px;margin:12px 0}
.mode-opt{flex:1;padding:16px;border:2px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;transition:.2s;background:var(--surface)}
.mode-opt:hover{border-color:var(--accent)}
.mode-opt.sel{border-color:var(--accent);background:rgba(108,92,231,.1)}
.mode-opt h4{color:var(--accent2);margin-bottom:4px;font-size:14px}
.mode-opt p{color:var(--dim);font-size:12px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Mobile */
@media(max-width:600px){
  .card-grid{grid-template-columns:1fr}
  .template-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .task-card{min-width:120px;max-width:100%;flex:1 1 100%}
  .est-row{flex-direction:column;align-items:stretch}
  .est-row input[type=number]{width:100%}
  .dep-row{flex-direction:column;align-items:stretch}
  .dep-row select,.dep-row input{width:100%}
  .stats-bar{gap:6px}
  .stat-box{min-width:75px;padding:8px 10px}
  .stat-box .val{font-size:16px}
  .review-tabs button{font-size:10px;padding:6px 8px}
  .poker-card{width:48px;height:66px;font-size:16px}
  .step{padding:5px 7px;font-size:11px}
  .step-line{width:8px}
}
@media print{
  body{background:#fff;color:#000}
  .hidden,#topBar,#stepper,#phaseOverlay,#restoreBar,.export-bar,.lb,.fun-fact,.review-tabs,.btn-row,button,a.home-link,#ganttTooltip{display:none!important}
  .phase-content{max-width:100%}
  .stat-box{border:1px solid #ccc}.stat-box .val{color:#333}
}
</style></head><body>
<a href="../index.html" class="home-link">&larr; home</a>

<div id="topBar">
  <span class="title">TaskIAP</span>
  <span id="tbRoom" class="room-code hidden"></span>
  <span id="tbPlayers" class="player-count"></span>
  <span class="spacer"></span>
  <span id="tbTimer" class="timer hidden"></span>
</div>

<div id="stepper"></div>

<div id="phaseOverlay"><h1 id="olTitle"></h1><p id="olSub"></p></div>
<div id="ganttTooltip"></div>

<div id="restoreBar" class="hidden">
  <p>Previous session found. Restore?</p>
  <button class="sm green" onclick="restoreSession()">Restore</button>
  <button class="sm sec" onclick="dismissRestore()">Dismiss</button>
</div>

<div id="phSetup" class="phase-content"></div>
<div id="phBrainstorm" class="phase-content"></div>
<div id="phEstimate" class="phase-content"></div>
<div id="phSequence" class="phase-content"></div>
<div id="phResources" class="phase-content"></div>
<div id="phReview" class="phase-content"></div>

<div id="modalContainer"></div>
<div class="fun-fact" id="funFact"></div>
<input type="file" id="jsonFileInput" accept=".json" class="hidden">

<script>
// ══════════════════════════════════════════════════════════════
// TaskIAP — The Ultimate Project Planning Tool
// ══════════════════════════════════════════════════════════════

const PHASES=['Setup','Brainstorm','Estimate','Sequence','Resources','Review'];
const PH_IDS=['phSetup','phBrainstorm','phEstimate','phSequence','phResources','phReview'];
const POKER_VALS=[0.5,1,2,3,5,8,13,21,'?','☕'];
const CONSTRAINT_TYPES=['Materials','Permits','Equipment','Engineering','Access','Weather','Preceding Work','Inspection','Labour','Other'];
const DEP_TYPES=['FS','SS','FF','SF'];

// ── Helpers ──
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ';let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function pert(o,m,p){return Math.round((+o+4*(+m)+(+p))/6)}
function addWorkDays(start,days){const d=new Date(start);let added=0;while(added<days){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)added++}return d}
function fmtDate(d){return d.getFullYear()+'-'+(d.getMonth()+1+'').padStart(2,'0')+'-'+(d.getDate()+'').padStart(2,'0')}
function fmtDateP6(d){const m=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];return(d.getDate()+'').padStart(2,'0')+'-'+m[d.getMonth()]+'-'+(d.getFullYear()+'').slice(2)}
function resColor(r){const idx=S.resources.findIndex(x=>x.name===r);return idx>=0?RES_COLORS[idx%RES_COLORS.length]:'#6c5ce7'}
function download(data,name,type){const b=new Blob([data],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function q(s){return s.includes(',')?'"'+s+'"':s}

// ── Audio ──
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC}
function beep(freq,dur,type='sine'){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.value=0.02;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.stop(c.currentTime+dur)}catch(e){}}
function sfxAdd(){beep(880,.1);setTimeout(()=>beep(1100,.1),60)}
function sfxBuzz(){beep(200,.3,'square')}
function sfxTick(){beep(600,.05)}
function sfxCelebrate(){beep(523,.08);setTimeout(()=>beep(659,.08),80);setTimeout(()=>beep(784,.12),160);setTimeout(()=>beep(1047,.15),260)}
function sfxReveal(){beep(440,.1);setTimeout(()=>beep(660,.1),80);setTimeout(()=>beep(880,.15),160)}

// ── TTS ──
function announce(msg){if('speechSynthesis' in window){speechSynthesis.cancel();setTimeout(()=>{const u=new SpeechSynthesisUtterance(msg);u.rate=1.1;u.pitch=1;u.volume=0.5;speechSynthesis.speak(u)},60)}}

// ── BroadcastChannel ──
function initChannel(){
  if(S.channel)S.channel.close();
  S.channel=new BroadcastChannel('seq3-'+S.room);
  S.channel.onmessage=e=>{
    const d=e.data;
    if(d.type==='join'&&S.isHost){
      if(!S.players.find(p=>p.name===d.name)){S.players.push({name:d.name,emoji:d.emoji||'\u{1F477}'});S.scores[d.name]=S.scores[d.name]||0;updateTopBar();announce(d.name+' joined!')}
      S.channel.postMessage({type:'state',state:cloneState()});
    }
    if(d.type==='task'&&S.isHost){addTaskDirect(d.name,d.from);S.channel.postMessage({type:'state',state:cloneState()})}
    if(d.type==='vote'){
      if(!S.votes[d.taskIdx])S.votes[d.taskIdx]={};
      S.votes[d.taskIdx][d.name]={value:d.value};
      if(S.phase===2)renderEstimate();
    }
    if(d.type==='reveal'){S.voteRevealed=true;sfxReveal();if(S.phase===2)renderEstimate()}
    if(d.type==='state'&&!S.isHost){
      const saved={channel:S.channel,isHost:S.isHost,myName:S.myName,myEmoji:S.myEmoji,timerInt:S.timerInt};
      Object.assign(S,d.state);Object.assign(S,saved);renderPhase()}
  }
}
function cloneState(){const c=JSON.parse(JSON.stringify(S));delete c.channel;delete c.timerInt;return c}

// ── Timer ──
function startTimer(sec){
  clearInterval(S.timerInt);S.timerSec=sec;
  const el=document.getElementById('tbTimer');el.classList.remove('hidden');
  el.textContent=fmtTime(sec);
  S.timerInt=setInterval(()=>{
    S.timerSec--;el.textContent=fmtTime(S.timerSec);
    if(S.timerSec<=5&&S.timerSec>0)sfxTick();
    if(S.timerSec<=0){clearInterval(S.timerInt);el.classList.add('hidden');sfxBuzz();announce("Time is up!")}
  },1000)
}
function stopTimer(){clearInterval(S.timerInt);document.getElementById('tbTimer').classList.add('hidden')}
function fmtTime(s){return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0')}

// ── Phase Navigation ──
function setPhase(p,skipOverlay){
  S.phase=p;if(p>S.maxPhase)S.maxPhase=p;
  renderStepper();
  PH_IDS.forEach((id,i)=>{
    const el=document.getElementById(id);
    el.classList.toggle('active',i===p);
  });
  renderPhase();showFact();autoSave();
  if(!skipOverlay)showOverlay(PHASES[p],p===0?'':'Phase '+(p));
}
function renderStepper(){
  const el=document.getElementById('stepper');
  el.innerHTML='';
  PHASES.forEach((name,i)=>{
    if(i>0){const line=document.createElement('div');line.className='step-line'+(i<=S.phase?' done':'');el.appendChild(line)}
    const s=document.createElement('div');
    let cls='step';
    if(i===S.phase)cls+=' active';else if(i<=S.maxPhase)cls+=' done';else cls+=' locked';
    s.className=cls;
    s.innerHTML=`<div class="step-num">${i<=S.maxPhase&&i!==S.phase?'✓':i}</div><span>${name}</span>`;
    s.onclick=()=>{if(i<=S.maxPhase){sfxAdd();setPhase(i)}};
    el.appendChild(s);
  });
}
function showOverlay(title,sub){
  const ol=document.getElementById('phaseOverlay');
  document.getElementById('olTitle').textContent=title;
  document.getElementById('olSub').textContent=sub||'';
  ol.classList.add('show');sfxCelebrate();
  setTimeout(()=>ol.classList.remove('show'),1000);
}
function renderPhase(){
  switch(S.phase){
    case 0:renderSetup();break;case 1:renderBrainstorm();break;case 2:renderEstimate();break;
    case 3:renderSequence();break;case 4:renderResources();break;case 5:renderReview();break;
  }
  updateTopBar();
}
function updateTopBar(){
  const rm=document.getElementById('tbRoom');
  if(S.room){rm.textContent=S.room;rm.classList.remove('hidden')}else rm.classList.add('hidden');
  document.getElementById('tbPlayers').textContent=S.players.length?S.players.length+' player'+(S.players.length>1?'s':''):'';
}

    <p style="color:var(--dim);margin-bottom:24px;font-size:11px;opacity:.6">CPM • PERT • Monte Carlo • AWPP • Planning Poker</p>

    <div class="form-group" style="text-align:left"><label>Project Name</label>
      <input id="inpProject" value="${esc(S.project)}" placeholder="My Construction Project"></div>

    <div style="text-align:left;margin-bottom:16px">
      <label>Planning Mode</label>
      <div class="mode-select">
        <div class="mode-opt ${S.mode==='simple'?'sel':''}" onclick="S.mode='simple';renderSetup()">
          <h4>Simple</h4><p>Flat task list — fast and easy</p></div>
        <div class="mode-opt ${S.mode==='awpp'?'sel':''}" onclick="S.mode='awpp';renderSetup()">
          <h4>AWPP</h4><p>CWP → IWP hierarchy</p></div>
      </div>
    </div>

    <div style="text-align:left;margin-bottom:20px">
      <label>Templates</label>
      <div class="template-grid">`;
  TEMPLATES.forEach((t,i)=>{
    const showIt=(S.mode==='awpp'&&t.type==='fragnet')||(S.mode==='simple'&&t.type==='project')||(t.type==='project');
    if(!showIt&&S.mode!=='awpp')return;
    if(S.mode==='simple'&&t.type==='fragnet')return;
    h+=`<div class="template-card" onclick="loadTemplate(${i})">
      <span class="tpl-emoji">${t.emoji}</span><h4>${esc(t.name)}</h4>
      <p>${t.tasks?t.tasks.length+' tasks':t.cwps?t.cwps.reduce((s,c)=>s+(c.iwps||[]).length,0)+' IWPs':''} • ${t.type}</p></div>`;
  });
  h+=`</div></div>

    <div class="card" style="text-align:left">
      <h3>Multiplayer</h3>
      <div class="row" style="margin-bottom:10px">
        <div class="form-group" style="flex:2;margin-bottom:0"><label>Your Name</label>
          <input id="inpName" value="${esc(S.myName)}" placeholder="Your name"></div>
        <div style="margin-top:18px">
          <div class="emoji-grid">${AVATARS.map(e=>`<div class="emoji-opt ${S.myEmoji===e?'sel':''}" onclick="S.myEmoji='${e}';renderSetup()">${e}</div>`).join('')}</div>
        </div>
      </div>
      <div class="row">
        <button class="sec sm" onclick="createRoom()">Create Room</button>
        <div class="form-group" style="flex:2;margin-bottom:0">
          <input id="inpJoinCode" placeholder="Room code to join" maxlength="4" style="text-transform:uppercase;text-align:center"></div>
        <button class="sec sm" onclick="joinRoom()">Join</button>
      </div>
      <div class="players-bar" style="margin-top:10px">${S.players.map(p=>`<div class="player-chip"><span class="dot"></span>${p.emoji||''} ${esc(p.name)}</div>`).join('')}</div>
    </div>

    <button onclick="startPlanning()" style="width:100%;margin-top:20px;padding:16px;font-size:17px">Start Planning →</button>
  </div>`;
  el.innerHTML=h;
}

function createRoom(){
  S.room=genCode();S.isHost=true;
  S.myName=document.getElementById('inpName')?.value.trim()||'Host';
  S.players=[{name:S.myName,emoji:S.myEmoji}];S.scores[S.myName]=S.scores[S.myName]||0;
  initChannel();renderSetup();announce('Room created: '+S.room);
}
function joinRoom(){
  S.room=(document.getElementById('inpJoinCode')?.value||'').toUpperCase().trim();
  if(!S.room){alert('Enter a room code');return}
  S.myName=document.getElementById('inpName')?.value.trim()||'Player';
  S.isHost=false;initChannel();
  S.channel.postMessage({type:'join',name:S.myName,emoji:S.myEmoji});
  S.players=[{name:S.myName,emoji:S.myEmoji}];renderSetup();
}
function startPlanning(){
  S.project=document.getElementById('inpProject')?.value.trim()||'New Project';
  S.myName=document.getElementById('inpName')?.value.trim()||S.myName||'Host';
  if(!S.players.length){S.players=[{name:S.myName,emoji:S.myEmoji}];S.scores[S.myName]=0}
  if(!S.room){S.room=genCode();S.isHost=true;initChannel()}
  setPhase(1);startTimer(90);announce('Brainstorm phase! Add your tasks!');
}
function loadTemplate(idx){
  const t=TEMPLATES[idx];
  S.project=t.name;
  S.myName=document.getElementById('inpName')?.value.trim()||S.myName||'Host';
  if(!S.players.length){S.players=[{name:S.myName,emoji:S.myEmoji}];S.scores[S.myName]=0}
  if(!S.room){S.room=genCode();S.isHost=true;initChannel()}
  S.mode=t.type==='fragnet'?'awpp':'simple';
  if(t.tasks){
    S.tasks=t.tasks.map((tk,i)=>({id:'A'+(1000+i*10),name:tk.name,dur:tk.dur,o:Math.max(1,tk.dur-2),m:tk.dur,p:tk.dur+3,
      wbs:tk.wbs||'1.1',preds:(tk.pred||[]).map(pi=>({task:pi,type:'FS',lag:0})),resource:'',cost:0,
      milestone:!!tk.ms,constraints:[],es:0,ef:0,ls:0,lf:0,float:0}));
    setPhase(2);renderEstimate();announce('Template loaded! Review estimates.');
  } else if(t.cwps){
    S.cwps=[];
    t.cwps.forEach(c=>{
      const cwp={id:'cwp_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),name:c.name,discipline:c.discipline||'',iwps:[]};
      (c.iwps||[]).forEach((iw,j)=>{
        cwp.iwps.push({name:iw.name,dur:iw.dur,o:Math.max(1,iw.dur-1),m:iw.dur,p:iw.dur+2,preds:(iw.pred||[]).map(pi=>({task:pi,type:'FS',lag:0})),constraints:[],resource:'',cost:0});
      });
      S.cwps.push(cwp);
    });
    // Flatten cwps to tasks for processing
    flattenCwpsToTasks();
    setPhase(2);renderEstimate();announce('Fragnet loaded! Review estimates.');
  }
}
function flattenCwpsToTasks(){
  S.tasks=[];
  let offset=0;
  S.cwps.forEach(cwp=>{
    cwp.iwps.forEach((iw,j)=>{
      const globalIdx=S.tasks.length;
      S.tasks.push({id:'A'+(1000+globalIdx*10),name:iw.name,dur:iw.dur,o:iw.o||Math.max(1,iw.dur-1),m:iw.m||iw.dur,p:iw.p||iw.dur+2,
        wbs:cwp.name,preds:(iw.preds||[]).map(pr=>({task:pr.task+offset,type:pr.type||'FS',lag:pr.lag||0})),
        resource:iw.resource||'',cost:iw.cost||0,milestone:false,constraints:iw.constraints||[],
        es:0,ef:0,ls:0,lf:0,float:0,cwpId:cwp.id});
    });
    offset=S.tasks.length;
  });
}

// ══════════════════════════════════════
// PHASE 1: BRAINSTORM
// ══════════════════════════════════════
function renderBrainstorm(){
  const el=document.getElementById('phBrainstorm');
  let h='<h2>Phase 1: Brainstorm</h2>';
  if(S.mode==='awpp'){
    h+=`<p style="color:var(--dim);margin-bottom:12px">Create CWPs, then add tasks/IWPs within each.</p>`;
    h+=`<div class="row" style="margin-bottom:12px"><input id="newCwp" placeholder="New CWP name..." style="flex:1"><button class="sm" onclick="addCwp()">+ CWP</button></div>`;
    if(S.cwps.length){
      h+=`<div class="cwp-tabs">${S.cwps.map((c,i)=>`<div class="cwp-tab ${S.activeCwp===i?'active':''}" onclick="S.activeCwp=${i};renderBrainstorm()">${esc(c.name)} (${c.iwps.length})</div>`).join('')}</div>`;
      const ci=S.activeCwp!=null?S.activeCwp:0;
      const cwp=S.cwps[ci];
      if(cwp){
        h+=`<div class="row" style="margin-bottom:10px"><input id="newIwp" placeholder="New task/IWP name..." style="flex:1"><button class="sm" onclick="addIwpToCwp(${ci})">+ Add</button></div>`;
        h+=`<div class="task-grid">${(cwp.iwps||[]).map((iw,j)=>renderTaskCard(iw,j,'cwp',ci)).join('')}</div>`;
      }
    }
  } else {
    h+=`<div class="row" style="margin-bottom:12px"><input id="newTask" placeholder="Type a task name and press Enter" style="flex:1"><button onclick="addTask()">Add</button></div>`;
    h+=`<div class="task-grid">${S.tasks.map((t,i)=>renderTaskCard(t,i,'task')).join('')}</div>`;
  }
  h+=`<div class="btn-row" style="justify-content:center;margin-top:20px">
    <button class="sec" onclick="setPhase(0);">← Setup</button>
    <button onclick="endBrainstorm()">Continue to Estimate →</button></div>`;
  el.innerHTML=h;
  // Bind enter key
  const inp=document.getElementById('newTask')||document.getElementById('newIwp');
  if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();if(S.mode==='awpp')addIwpToCwp(S.activeCwp||0);else addTask()}});
  const cwpInp=document.getElementById('newCwp');
  if(cwpInp)cwpInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addCwp()}});
}
function renderTaskCard(t,i,type,cwpIdx){
  const isMs=t.milestone;
  return `<div class="task-card ${isMs?'ms':''}">
    <strong style="font-size:11px;color:var(--dim)">${t.id||('IWP-'+(i+1))}</strong>${isMs?'<span class="ms-badge">MILESTONE</span>':''}
    <div class="card-name" onclick="editTaskName(${i},'${type}',${cwpIdx},this)">${esc(t.name)}</div>
    <div class="wbs-tag">${t.wbs?'WBS: '+esc(t.wbs):''}</div>
    <div style="margin-top:4px"><label style="display:inline;font-size:11px;cursor:pointer"><input type="checkbox" ${isMs?'checked':''} onchange="toggleMs(${i},'${type}',${cwpIdx},this.checked)" style="width:auto;min-height:0;margin-right:4px">Milestone</label></div>
    <div class="card-actions">
      ${i>0?`<button onclick="moveTask(${i},-1,'${type}',${cwpIdx})">▲</button>`:''}
      ${type==='task'?(i<S.tasks.length-1?`<button onclick="moveTask(${i},1,'${type}',${cwpIdx})">▼</button>`:''):`<button onclick="moveTask(${i},1,'${type}',${cwpIdx})">▼</button>`}
      <button onclick="removeTask(${i},'${type}',${cwpIdx})" style="background:var(--red);margin-left:auto">✕</button>
    </div></div>`;
}
function addTask(){
  const inp=document.getElementById('newTask');const name=inp?.value.trim();if(!name)return;inp.value='';
  if(S.channel&&!S.isHost){S.channel.postMessage({type:'task',name,from:S.myName});return}
  addTaskDirect(name,S.myName);
}
function addTaskDirect(name,from){
  if(S.tasks.find(t=>t.name.toLowerCase()===name.toLowerCase())){sfxBuzz();return}
  const id='A'+(1000+S.tasks.length*10);
  S.tasks.push({id,name,dur:5,o:3,m:5,p:8,wbs:'1.'+(Math.floor(S.tasks.length/5)+1),preds:[],resource:'',cost:0,milestone:false,constraints:[],es:0,ef:0,ls:0,lf:0,float:0});
  if(from&&S.scores[from]!==undefined)S.scores[from]+=10;
  sfxAdd();renderBrainstorm();autoSave();
}
function addCwp(){
  const inp=document.getElementById('newCwp');const name=inp?.value.trim();if(!name)return;inp.value='';
  S.cwps.push({id:'cwp_'+Date.now(),name,discipline:'',iwps:[]});
  S.activeCwp=S.cwps.length-1;sfxAdd();renderBrainstorm();autoSave();
}
function addIwpToCwp(ci){
  const inp=document.getElementById('newIwp');const name=inp?.value.trim();if(!name)return;inp.value='';
  const cwp=S.cwps[ci];if(!cwp)return;
  cwp.iwps.push({name,dur:5,o:3,m:5,p:8,preds:[],constraints:[],resource:'',cost:0});
  sfxAdd();renderBrainstorm();autoSave();
}
function editTaskName(i,type,cwpIdx,el){
  const list=type==='cwp'?S.cwps[cwpIdx].iwps:S.tasks;
  const t=list[i];if(!t)return;
  const input=document.createElement('input');input.value=t.name;input.style.cssText='font-size:14px;padding:4px 8px;width:100%;min-height:32px';
  el.replaceWith(input);input.focus();input.select();
  const finish=()=>{const v=input.value.trim();if(v)t.name=v;renderBrainstorm();autoSave()};
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();finish()}if(e.key==='Escape')renderBrainstorm()});
}
function toggleMs(i,type,cwpIdx,val){
  const list=type==='cwp'?S.cwps[cwpIdx].iwps:S.tasks;
  const t=list[i];if(!t)return;t.milestone=val;
  if(val){t.dur=0;t.o=0;t.m=0;t.p=0}
  renderBrainstorm();autoSave();
}
function moveTask(i,dir,type,cwpIdx){
  const list=type==='cwp'?S.cwps[cwpIdx].iwps:S.tasks;
  const ni=i+dir;if(ni<0||ni>=list.length)return;
  list.forEach(t=>{(t.preds||[]).forEach(p=>{if(p.task===i)p.task=ni;else if(p.task===ni)p.task=i})});
  [list[i],list[ni]]=[list[ni],list[i]];
  renderBrainstorm();autoSave();
}
function removeTask(i,type,cwpIdx){
  const list=type==='cwp'?S.cwps[cwpIdx].iwps:S.tasks;
  list.splice(i,1);
  list.forEach(t=>{t.preds=(t.preds||[]).filter(p=>p.task!==i);(t.preds||[]).forEach(p=>{if(p.task>i)p.task--})});
  renderBrainstorm();autoSave();
}
function endBrainstorm(){
  stopTimer();
  if(S.mode==='awpp'&&S.cwps.length){flattenCwpsToTasks()}
  if(!S.tasks.length){alert('Add at least one task.');return}
  setPhase(2);announce('Estimation phase! Set your durations.');
}

// ══════════════════════════════════════
// PHASE 2: ESTIMATE (with Planning Poker)
// ══════════════════════════════════════
function renderEstimate(){
  const el=document.getElementById('phEstimate');
  let h='<h2>Phase 2: Duration & Cost Estimation</h2>';
  h+=`<div class="toggle-wrap"><div class="toggle ${S.votingEnabled?'on':''}" onclick="S.votingEnabled=!S.votingEnabled;renderEstimate()"></div><span class="toggle-label">Planning Poker Voting</span></div>`;
  h+=`<p style="color:var(--dim);margin-bottom:14px;font-size:13px">Set Optimistic, Most Likely, Pessimistic durations. PERT = (O + 4M + P) / 6</p>`;

  if(S.votingEnabled&&S.currentVoteTask>=0&&S.currentVoteTask<S.tasks.length){
    h+=renderPokerArea();
  }

  S.tasks.forEach((t,i)=>{
    const dis=t.milestone?'disabled':'';
    const pertVal=t.milestone?0:pert(t.o,t.m,t.p);
    const isVoting=S.votingEnabled&&S.currentVoteTask===i;
    h+=`<div class="est-row" style="${isVoting?'border-color:var(--accent);box-shadow:0 0 12px rgba(108,92,231,.2)':''}">
      <span class="est-name">${esc(t.id)} ${esc(t.name)}${t.milestone?' <span style="color:var(--gold);font-size:11px">(Milestone)</span>':''}</span>
      <label style="font-size:11px;color:var(--dim);margin:0">O</label><input type="number" min="0" value="${t.o}" ${dis} onchange="updEst(${i},'o',this.value)">
      <label style="font-size:11px;color:var(--dim);margin:0">M</label><input type="number" min="0" value="${t.m}" ${dis} onchange="updEst(${i},'m',this.value)">
      <label style="font-size:11px;color:var(--dim);margin:0">P</label><input type="number" min="0" value="${t.p}" ${dis} onchange="updEst(${i},'p',this.value)">
      <span class="est-result">${pertVal}d</span>
      <label style="font-size:11px;color:var(--dim);margin:0">$</label><input type="number" min="0" value="${t.cost||0}" style="width:80px" onchange="S.tasks[${i}].cost=Math.max(0,+this.value);autoSave()">
      ${S.votingEnabled?`<button class="sm ${isVoting?'':'sec'}" onclick="startVote(${i})">${isVoting?'Voting...':'Vote'}</button>`:''}
    </div>`;
  });
  h+=`<div class="btn-row" style="justify-content:center;margin-top:20px">
    <button class="sec" onclick="setPhase(1)">← Brainstorm</button>
    <button onclick="endEstimate()">Continue to Sequence →</button></div>`;
  el.innerHTML=h;
}
function updEst(i,f,v){S.tasks[i][f]=Math.max(0,+v);if(!S.tasks[i].milestone)S.tasks[i].dur=pert(S.tasks[i].o,S.tasks[i].m,S.tasks[i].p);renderEstimate();autoSave()}
function startVote(i){S.currentVoteTask=i;S.voteRevealed=false;S.votes[i]=S.votes[i]||{};renderEstimate()}
function renderPokerArea(){
  const i=S.currentVoteTask;const t=S.tasks[i];if(!t)return'';
  const myVote=S.votes[i]?.[S.myName];
  let h=`<div class="poker-area">
    <h3>Voting: ${esc(t.name)}</h3>
    <div class="poker-cards">${POKER_VALS.map(v=>{
      const sel=myVote&&myVote.value==v?'selected':'';
      return`<div class="poker-card ${sel} ${S.voteRevealed?'revealed':''}" onclick="castVote(${i},'${v}')">${v}</div>`
    }).join('')}</div>`;
  // Show votes
  const votes=S.votes[i]||{};
  const voteEntries=Object.entries(votes);
  if(voteEntries.length){
    h+=`<div style="text-align:center;margin:10px 0;color:var(--dim)">${voteEntries.length} vote(s) cast</div>`;
    if(S.voteRevealed){
      const nums=voteEntries.map(([,v])=>+v.value).filter(n=>!isNaN(n));
      if(nums.length){
        const avg=Math.round(nums.reduce((s,n)=>s+n,0)/nums.length*10)/10;
        const mn=Math.min(...nums);const mx=Math.max(...nums);
        h+=`<div class="vote-results">
          <div class="vote-stat"><div class="val">${avg}</div><div class="lbl">Average</div></div>
          <div class="vote-stat"><div class="val">${mn}</div><div class="lbl">Min</div></div>
          <div class="vote-stat"><div class="val">${mx}</div><div class="lbl">Max</div></div>
          <div class="vote-stat"><div class="val">${mx-mn}</div><div class="lbl">Spread</div></div></div>`;
        h+=`<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0">${voteEntries.map(([name,v])=>`<div style="background:var(--bg);padding:6px 12px;border-radius:8px;text-align:center"><div style="font-size:11px;color:var(--dim)">${esc(name)}</div><div style="font-size:18px;font-weight:800">${v.value}</div></div>`).join('')}</div>`;
        h+=`<div class="btn-row" style="justify-content:center">
          <button class="sm green" onclick="acceptVote(${i},${avg})">Accept (${avg}d)</button>
          <button class="sm sec" onclick="S.votes[${i}]={};S.voteRevealed=false;renderEstimate()">Re-vote</button></div>`;
      }
    } else {
      h+=`<button class="sm gold" onclick="revealVotes(${i})">Reveal Votes</button>`;
    }
  }
  h+=`</div>`;return h;
}
function castVote(taskIdx,val){
  if(!S.votes[taskIdx])S.votes[taskIdx]={};
  S.votes[taskIdx][S.myName]={value:val};
  if(S.channel)S.channel.postMessage({type:'vote',taskIdx,name:S.myName,value:val});
  sfxAdd();renderEstimate();
}
function revealVotes(taskIdx){
  S.voteRevealed=true;sfxReveal();
  if(S.channel)S.channel.postMessage({type:'reveal',taskIdx});
  renderEstimate();
}
function acceptVote(taskIdx,avg){
  const rounded=Math.round(avg);
  S.tasks[taskIdx].m=rounded;S.tasks[taskIdx].dur=rounded;
  S.tasks[taskIdx].o=Math.max(1,rounded-2);S.tasks[taskIdx].p=rounded+3;
  // Award points for close votes
  const votes=S.votes[taskIdx]||{};
  Object.entries(votes).forEach(([name,v])=>{
    const diff=Math.abs(+v.value-rounded);
    if(!isNaN(diff)&&diff<=1&&S.scores[name]!==undefined)S.scores[name]+=20;
  });
  S.currentVoteTask=-1;S.voteRevealed=false;
  sfxCelebrate();renderEstimate();autoSave();
}
function endEstimate(){
  S.tasks.forEach(t=>{if(!t.milestone)t.dur=pert(t.o,t.m,t.p)});
  setPhase(3);announce('Set your dependencies!');
}

// ══════════════════════════════════════
// PHASE 3: SEQUENCE (Dependencies)
// ══════════════════════════════════════
function renderSequence(){
  const el=document.getElementById('phSequence');
  let h='<h2>Phase 3: Sequencing & Dependencies</h2>';
  h+=`<p style="color:var(--dim);margin-bottom:14px;font-size:13px">Set predecessor relationships. Supports FS, SS, FF, SF with lag.</p>`;
  S.tasks.forEach((t,i)=>{
    h+=`<div class="dep-card"><strong>${esc(t.id)} ${esc(t.name)}</strong> <span style="color:var(--dim)">(${t.dur}d${t.milestone?' ◆ Milestone':''})</span>`;
    (t.preds||[]).forEach((pr,pi)=>{
      h+=`<div class="dep-row">
        <select onchange="S.tasks[${i}].preds[${pi}].task=+this.value;checkCircular();renderSequence();autoSave()">${S.tasks.filter((_,j)=>j!==i).map(p=>{const pidx=S.tasks.indexOf(p);return`<option value="${pidx}" ${pidx===pr.task?'selected':''}>${esc(p.id)} ${esc(p.name)}</option>`}).join('')}</select>
        <select onchange="S.tasks[${i}].preds[${pi}].type=this.value;autoSave()" style="width:70px;flex:none">${DEP_TYPES.map(dt=>`<option ${dt===pr.type?'selected':''}>${dt}</option>`).join('')}</select>
        <input type="number" value="${pr.lag}" style="width:60px;flex:none" placeholder="Lag" onchange="S.tasks[${i}].preds[${pi}].lag=+this.value;autoSave()">
        <button class="sm sec" onclick="S.tasks[${i}].preds.splice(${pi},1);renderSequence();autoSave()" style="flex:none">✕</button></div>`;
    });
    // Constraints
    h+=`<div class="constraint-tags">${(t.constraints||[]).map(c=>`<span class="constraint-tag" onclick="removeConstraint(${i},'${esc(c)}')">${esc(c)} ×</span>`).join('')}</div>`;
    h+=`<div class="btn-row" style="margin-top:6px">
      <button class="sm sec" onclick="addPred(${i})">+ Predecessor</button>
      <button class="sm sec" onclick="showConstraintPicker(${i})">+ Constraint</button></div></div>`;
  });
  h+=`<div id="circularWarn"></div>`;
  h+=`<div class="btn-row" style="justify-content:center;margin-top:20px">
    <button class="sec" onclick="setPhase(2)">← Estimate</button>
    <button onclick="endSequence()">Continue to Resources →</button></div>`;
  el.innerHTML=h;
  checkCircular();
}
function addPred(i){
  const avail=S.tasks.findIndex((_,j)=>j!==i);
  if(avail<0)return;
  S.tasks[i].preds.push({task:avail===i?(avail+1<S.tasks.length?avail+1:0):avail,type:'FS',lag:0});
  renderSequence();autoSave();
}
function removeConstraint(i,c){
  S.tasks[i].constraints=(S.tasks[i].constraints||[]).filter(x=>x!==c);
  renderSequence();autoSave();
}
function showConstraintPicker(i){
  const existing=new Set(S.tasks[i].constraints||[]);
  const avail=CONSTRAINT_TYPES.filter(c=>!existing.has(c));
  showModal('Add Constraint',avail.map(c=>`<button class="sm sec" style="margin:4px" onclick="addConstraint(${i},'${c}');closeModal()">${c}</button>`).join(''));
}
function addConstraint(i,c){
  if(!S.tasks[i].constraints)S.tasks[i].constraints=[];
  if(!S.tasks[i].constraints.includes(c))S.tasks[i].constraints.push(c);
  renderSequence();autoSave();
}
function checkCircular(){
  // Detect cycles via DFS
  const n=S.tasks.length;const visited=new Array(n).fill(0);// 0=unvisited,1=in-stack,2=done
  let hasCycle=false;
  function dfs(u){
    visited[u]=1;
    for(const pr of(S.tasks[u].preds||[])){
      const v=pr.task;if(v<0||v>=n)continue;
      if(visited[v]===1){hasCycle=true;return}
      if(visited[v]===0)dfs(v);
      if(hasCycle)return;
    }
    visited[u]=2;
  }
  for(let i=0;i<n;i++){if(visited[i]===0)dfs(i);if(hasCycle)break}
  const warn=document.getElementById('circularWarn');
  if(warn)warn.innerHTML=hasCycle?'<div style="background:rgba(255,71,87,.1);border:1px solid var(--red);border-radius:var(--radius);padding:12px;margin:10px 0;color:var(--red);font-weight:600">⚠ Circular dependency detected! Fix before proceeding.</div>':'';
}
function endSequence(){
  calcSchedule();
  setPhase(4);announce('Assign your resources!');
}

// ══════════════════════════════════════
// CPM ENGINE
// ══════════════════════════════════════
function calcSchedule(){
  const n=S.tasks.length;if(!n)return;
  S.tasks.forEach(t=>{t.es=0;t.ef=0;t.ls=0;t.lf=0;t.float=0});
  // Forward pass
  for(let i=0;i<n;i++){
    const t=S.tasks[i];let es=0;
    (t.preds||[]).forEach(pr=>{
      const p=S.tasks[pr.task];if(!p)return;
      switch(pr.type){
        case'FS':es=Math.max(es,p.ef+(pr.lag||0));break;
        case'SS':es=Math.max(es,p.es+(pr.lag||0));break;
        case'FF':es=Math.max(es,p.ef+(pr.lag||0)-t.dur);break;
        case'SF':es=Math.max(es,p.es+(pr.lag||0)-t.dur);break;
      }
    });
    t.es=Math.max(0,es);t.ef=t.es+t.dur;
  }
  const projEnd=Math.max(...S.tasks.map(t=>t.ef),0);
  // Backward pass
  S.tasks.forEach(t=>{t.lf=projEnd;t.ls=projEnd-t.dur});
  for(let i=n-1;i>=0;i--){
    const t=S.tasks[i];
    S.tasks.forEach((succ,si)=>{
      (succ.preds||[]).forEach(pr=>{
        if(pr.task===i){
          switch(pr.type){
            case'FS':t.lf=Math.min(t.lf,succ.ls-(pr.lag||0));t.ls=t.lf-t.dur;break;
            case'SS':t.ls=Math.min(t.ls,succ.ls-(pr.lag||0));t.lf=t.ls+t.dur;break;
            case'FF':t.lf=Math.min(t.lf,succ.lf-(pr.lag||0));t.ls=t.lf-t.dur;break;
            case'SF':t.ls=Math.min(t.ls,succ.lf-(pr.lag||0)+succ.dur);t.lf=t.ls+t.dur;break;
          }
        }
      });
    });
  }
  S.tasks.forEach(t=>{t.float=t.ls-t.es});
}

function drawMiniSCurve(){
  const canvas=document.getElementById('miniSCurve');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const totalCost=S.tasks.reduce((s,t)=>s+t.cost,0);
  const projEnd=Math.max(...S.tasks.map(t=>t.ef),1);
  const W=canvas.clientWidth||300;const H=120;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
  if(!totalCost){ctx.fillStyle='#555580';ctx.font='12px system-ui';ctx.fillText('No cost data',W/2-30,H/2);return}
  const daily=new Array(projEnd+1).fill(0);
  S.tasks.forEach(t=>{if(!t.cost||!t.dur)return;const pd=t.cost/t.dur;for(let d=t.es;d<t.ef;d++)daily[d]+=pd});
  const cum=[0];for(let d=0;d<projEnd;d++)cum.push(cum[cum.length-1]+daily[d]);
  const maxC=Math.max(...cum);
  ctx.strokeStyle='#00cec9';ctx.lineWidth=2;ctx.beginPath();
  cum.forEach((c,d)=>{const x=10+(d/projEnd)*(W-20);const y=H-10-(c/maxC)*(H-20);d===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.stroke();
}
function drawMiniHisto(){
  const canvas=document.getElementById('miniHisto');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.clientWidth||300;const H=120;
  const dpr=window.devicePixelRatio||1;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
  const durs=S.tasks.filter(t=>t.dur>0).map(t=>t.dur);
  if(!durs.length){ctx.fillStyle='#555580';ctx.font='12px system-ui';ctx.fillText('No duration data',W/2-40,H/2);return}
  const mx=Math.max(...durs);const bins=Math.min(10,mx);const binW=(mx+1)/bins;
  const hist=new Array(bins).fill(0);
  durs.forEach(d=>{const bi=Math.min(bins-1,Math.floor(d/binW));hist[bi]++});
  const maxB=Math.max(...hist);const bw=(W-20)/bins;
  hist.forEach((c,i)=>{
    const bh=(c/maxB)*(H-30);
    ctx.fillStyle='rgba(108,92,231,.6)';ctx.fillRect(10+i*bw,H-10-bh,bw-2,bh);
  });
}

// ── Gantt Chart ──
function drawGantt(){
  const canvas=document.getElementById('ganttCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');if(!S.tasks.length)return;
  const rowH=32,labelW=220,padR=40,padTop=40;
  const projEnd=Math.max(...S.tasks.map(t=>t.ef),1);
  const baseDayW=Math.max(10,Math.min(36,(window.innerWidth-labelW-padR-80)/projEnd));
  const dayW=baseDayW*ganttZoom;
  const W=labelW+projEnd*dayW+padR;
  const H=padTop+S.tasks.length*rowH+20;
  const dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;ctx.scale(dpr,dpr);

  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='#1a1a35';ctx.lineWidth=.5;
  for(let d=0;d<=projEnd;d++){const x=labelW+d*dayW;ctx.beginPath();ctx.moveTo(x,padTop);ctx.lineTo(x,H);ctx.stroke()}
  // Day labels
  ctx.fillStyle='#555580';ctx.font='10px system-ui';
  const step=Math.max(1,Math.floor(projEnd/(20*ganttZoom)));
  for(let d=0;d<=projEnd;d+=step)ctx.fillText('D'+d,labelW+d*dayW,padTop-8);
  // Header
  ctx.fillStyle='#6c5ce7';ctx.font='bold 13px system-ui';ctx.fillText(S.project+' — Gantt Chart',10,20);

  // Baseline bars
  if(S.baseline){
    S.baseline.tasks.forEach((bt,i)=>{
      if(i>=S.tasks.length)return;
      const y=padTop+i*rowH;const bx=labelW+bt.es*dayW;const bw=bt.dur*dayW;
      ctx.fillStyle='rgba(120,120,150,.25)';
      if(bt.milestone){const cx=bx,cy=y+rowH/2;ctx.beginPath();ctx.moveTo(cx,cy-6);ctx.lineTo(cx+6,cy);ctx.lineTo(cx,cy+6);ctx.lineTo(cx-6,cy);ctx.closePath();ctx.fill()}
      else ctx.fillRect(bx,y+10,Math.max(bw,3),rowH-20);
    });
  }

  // Dependency arrows
  ctx.lineWidth=1.5;
  S.tasks.forEach((t,i)=>{
    (t.preds||[]).forEach(pr=>{
      const p=S.tasks[pr.task];if(!p)return;
      const isCrit=t.float===0&&p.float===0;
      ctx.strokeStyle=isCrit?'rgba(255,71,87,.5)':'#555580';
      const x1=labelW+p.ef*dayW,y1=padTop+pr.task*rowH+rowH/2;
      const x2=labelW+t.es*dayW,y2=padTop+i*rowH+rowH/2;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1+5,y1);ctx.lineTo(x1+5,y2);ctx.lineTo(x2,y2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-5,y2-3);ctx.lineTo(x2-5,y2+3);ctx.closePath();ctx.fillStyle=ctx.strokeStyle;ctx.fill();
    });
  });

  // Bars
  S.tasks.forEach((t,i)=>{
    const y=padTop+i*rowH;const isCrit=t.float===0;
    ctx.fillStyle=isCrit?'#ff4757':'#e8e8f0';ctx.font=(isCrit?'bold ':'')+'11px system-ui';
    ctx.fillText((t.id+' '+t.name).slice(0,24),6,y+rowH/2+4);
    if(t.milestone||t.dur===0){
      const cx=labelW+t.es*dayW,cy=y+rowH/2;
      ctx.fillStyle=isCrit?'#ff4757':'#ffa502';
      ctx.beginPath();ctx.moveTo(cx,cy-7);ctx.lineTo(cx+7,cy);ctx.lineTo(cx,cy+7);ctx.lineTo(cx-7,cy);ctx.closePath();ctx.fill();
    } else {
      const barColor=t.resource?resColor(t.resource):(isCrit?'#ff4757':'#6c5ce7');
      const bx=labelW+t.es*dayW,bw=t.dur*dayW;
      ctx.fillStyle=barColor;ctx.beginPath();ctx.roundRect(bx,y+5,Math.max(bw,4),rowH-10,4);ctx.fill();
      if(isCrit&&t.resource){ctx.strokeStyle='#ff4757';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,y+5,Math.max(bw,4),rowH-10,4);ctx.stroke();ctx.lineWidth=1.5}
      if(t.float>0){ctx.fillStyle='rgba(46,213,115,.12)';ctx.fillRect(bx+bw,y+5,t.float*dayW,rowH-10)}
      if(bw>28){ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.fillText(t.dur+'d',bx+4,y+rowH/2+3)}
    }
  });
  canvas._ganttData={rowH,labelW,padTop,dayW,projEnd};
  // Tooltip
  setupGanttTooltip(canvas);
}
function setupGanttTooltip(canvas){
  if(canvas._tooltipBound)return;canvas._tooltipBound=true;
  const tip=document.getElementById('ganttTooltip');
  canvas.addEventListener('mousemove',e=>{
    const d=canvas._ganttData;if(!d)return;
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const idx=Math.floor((my-d.padTop)/d.rowH);
    if(idx<0||idx>=S.tasks.length){tip.style.opacity=0;return}
    const t=S.tasks[idx];
    const baseDate=new Date('2026-06-01');const sd=addWorkDays(baseDate,t.es);const fd=addWorkDays(sd,t.dur);
    let html=`<strong>${esc(t.id)} ${esc(t.name)}</strong><br>Duration: ${t.dur}d | Float: ${t.float}d<br>ES:${t.es} EF:${t.ef} LS:${t.ls} LF:${t.lf}<br>Start: ${fmtDate(sd)} | Finish: ${fmtDate(fd)}`;
    if(t.resource)html+=`<br>Resource: ${esc(t.resource)}`;
    if(t.cost)html+=`<br>Cost: $${t.cost.toLocaleString()}`;
    if(t.milestone)html+=`<br><span style="color:var(--gold)">◆ Milestone</span>`;
    if(t.float===0)html+=`<br><span style="color:var(--red)">⚠ Critical</span>`;
    if(S.baseline&&S.baseline.tasks[idx]){
      const v=t.ef-S.baseline.tasks[idx].ef;
      html+=`<br>Baseline Var: <span style="color:${v>0?'var(--red)':v<0?'var(--green)':'var(--dim)'}">${v>0?'+':''}${v}d</span>`;
    }
    tip.innerHTML=html;tip.style.opacity=1;
    tip.style.left=Math.min(e.clientX+12,window.innerWidth-320)+'px';
    tip.style.top=(e.clientY+12)+'px';
  });
  canvas.addEventListener('mouseleave',()=>{tip.style.opacity=0});
}

// ── Network Diagram ──
function drawNetwork(){
  const canvas=document.getElementById('networkCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');if(!S.tasks.length)return;
  // Layer assignment
  const n=S.tasks.length;const taskLayer=new Array(n).fill(-1);
  function assignLayer(i){
    if(taskLayer[i]>=0)return taskLayer[i];
    if(!(S.tasks[i].preds||[]).length){taskLayer[i]=0;return 0}
    let mx=0;S.tasks[i].preds.forEach(pr=>{mx=Math.max(mx,assignLayer(pr.task)+1)});
    taskLayer[i]=mx;return mx;
  }
  for(let i=0;i<n;i++)assignLayer(i);
  const maxLayer=Math.max(...taskLayer,0);
  const buckets=[];for(let l=0;l<=maxLayer;l++)buckets[l]=[];
  S.tasks.forEach((_,i)=>buckets[taskLayer[i]].push(i));

  const nw=150,nh=65,hg=50,vg=25;
  const maxBucket=Math.max(...buckets.map(b=>b.length),1);
  const W=(maxLayer+1)*(nw+hg)+hg;const H=maxBucket*(nh+vg)+vg+40;
  const dpr=window.devicePixelRatio||1;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;ctx.scale(dpr,dpr);
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);

  const pos=[];
  S.tasks.forEach((_,i)=>{
    const layer=taskLayer[i];const bucket=buckets[layer];
    const idxInBucket=bucket.indexOf(i);const total=bucket.length;
    const x=hg+layer*(nw+hg);const totalH=total*(nh+vg)-vg;
    const startY=(H-totalH)/2;const y=startY+idxInBucket*(nh+vg);
    pos[i]={x,y};
  });

  // Arrows
  S.tasks.forEach((t,i)=>{
    (t.preds||[]).forEach(pr=>{
      const from=pos[pr.task];const to=pos[i];if(!from||!to)return;
      const isCrit=t.float===0&&S.tasks[pr.task].float===0;
      ctx.strokeStyle=isCrit?'#ff4757':'#555580';ctx.lineWidth=isCrit?2.5:1.5;
      const x1=from.x+nw,y1=from.y+nh/2;const x2=to.x,y2=to.y+nh/2;
      ctx.beginPath();
      if(x2>x1){const mx=(x1+x2)/2;ctx.moveTo(x1,y1);ctx.bezierCurveTo(mx,y1,mx,y2,x2,y2)}
      else{ctx.moveTo(x1,y1);ctx.lineTo(x1+12,y1);ctx.lineTo(x1+12,y2>y1?y1+nh/2+10:y1-nh/2-10);ctx.lineTo(x2-12,y2>y1?y2-nh/2-10:y2+nh/2+10);ctx.lineTo(x2-12,y2);ctx.lineTo(x2,y2)}
      ctx.stroke();
      ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-6,y2-3);ctx.lineTo(x2-6,y2+3);ctx.closePath();ctx.fillStyle=ctx.strokeStyle;ctx.fill();
    });
  });

  // Nodes
  S.tasks.forEach((t,i)=>{
    const p=pos[i];const isCrit=t.float===0;
    ctx.fillStyle=isCrit?'rgba(255,71,87,.12)':'#14142a';
    ctx.strokeStyle=isCrit?'#ff4757':'#2a2a4a';ctx.lineWidth=isCrit?2:1;
    if(t.milestone){
      const cx=p.x+nw/2,cy=p.y+nh/2;
      ctx.beginPath();ctx.moveTo(cx,p.y);ctx.lineTo(p.x+nw,cy);ctx.lineTo(cx,p.y+nh);ctx.lineTo(p.x,cy);ctx.closePath();ctx.fill();ctx.stroke();
    } else {
      ctx.beginPath();ctx.roundRect(p.x,p.y,nw,nh,6);ctx.fill();ctx.stroke();
    }
    ctx.fillStyle=isCrit?'#ff4757':'#e8e8f0';ctx.font='bold 10px system-ui';ctx.fillText(t.id,p.x+5,p.y+14);
    ctx.fillStyle='#e8e8f0';ctx.font='10px system-ui';ctx.fillText(t.name.slice(0,16),p.x+5,p.y+28);
    ctx.fillStyle='#555580';ctx.font='9px system-ui';
    ctx.fillText(`D:${t.dur} TF:${t.float}`,p.x+5,p.y+42);
    ctx.fillText(`ES:${t.es} EF:${t.ef} LS:${t.ls} LF:${t.lf}`,p.x+5,p.y+55);
  });
}

function drawSCurve(){

  ctx.fillStyle='#6c5ce7';ctx.font='bold 13px system-ui';ctx.fillText('Cost S-Curve (Cumulative)',10,22);
  const chartW=W-padL-padR;const maxCost=Math.max(...cum);

  for(let i=0;i<=4;i++){const y=padTop+chartH-i*(chartH/4);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.fillStyle='#555580';ctx.font='10px system-ui';ctx.fillText('$'+Math.round(maxCost*i/4).toLocaleString(),4,y+4)}
  ctx.strokeStyle='#00cec9';ctx.lineWidth=2.5;ctx.beginPath();

  const st=Math.max(1,Math.floor(projEnd/10));

}

// ── Monte Carlo Tab ──
function renderMonteTab(){
  return`<div class="analysis-panel" id="montePanel"><h3>Monte Carlo Simulation</h3>
    <p style="color:var(--dim);margin-bottom:12px">Triangular distribution with O/M/P values, 1000 iterations.</p>
    <button onclick="runMonteCarlo()">Run Monte Carlo (1000 iterations)</button>
    <div id="monteResults" style="margin-top:16px"></div></div>
    <div class="canvas-wrap"><canvas id="monteCanvas"></canvas></div>`;
}
function runMonteCarlo(){
  const iterations=1000;const results=[];
  for(let iter=0;iter<iterations;iter++){
    const simDurs=S.tasks.map(t=>t.milestone?0:triangular(Math.max(0,t.o),t.m,t.p));
    const simES=new Array(S.tasks.length).fill(0);const simEF=new Array(S.tasks.length).fill(0);
    for(let i=0;i<S.tasks.length;i++){
      const t=S.tasks[i];let es=0;
      (t.preds||[]).forEach(pr=>{
        switch(pr.type){
          case'FS':es=Math.max(es,simEF[pr.task]+(pr.lag||0));break;
          case'SS':es=Math.max(es,simES[pr.task]+(pr.lag||0));break;
          case'FF':es=Math.max(es,simEF[pr.task]+(pr.lag||0)-simDurs[i]);break;
          case'SF':es=Math.max(es,simES[pr.task]+(pr.lag||0)-simDurs[i]);break;
        }
      });
      simES[i]=Math.max(0,es);simEF[i]=simES[i]+simDurs[i];
    }
    results.push(Math.max(...simEF));
  }
  results.sort((a,b)=>a-b);
  const det=Math.max(...S.tasks.map(t=>t.ef));
  const p50=results[Math.floor(iterations*.5)];
  const p80=results[Math.floor(iterations*.8)];
  const p90=results[Math.floor(iterations*.9)];
  document.getElementById('monteResults').innerHTML=`
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div class="stat-box"><div class="val">${Math.round(det)}d</div><div class="lbl">Deterministic</div></div>
      <div class="stat-box"><div class="val">${Math.round(p50)}d</div><div class="lbl">P50 (50%)</div></div>
      <div class="stat-box"><div class="val" style="color:var(--gold)">${Math.round(p80)}d</div><div class="lbl">P80 (80%)</div></div>
      <div class="stat-box"><div class="val" style="color:var(--red)">${Math.round(p90)}d</div><div class="lbl">P90 (90%)</div></div></div>
    <p style="color:var(--dim);font-size:12px;margin-top:8px">80% chance of completion within ${Math.round(p80)} working days.</p>`;
  drawMonteHisto(results,det,p50,p80,p90);sfxCelebrate();
}
function triangular(a,c,b){if(a>=b)return c;const u=Math.random();const fc=(c-a)/(b-a);if(u<fc)return a+Math.sqrt(u*(b-a)*(c-a));return b-Math.sqrt((1-u)*(b-a)*(b-c))}
function drawMonteHisto(results,det,p50,p80,p90){
  const canvas=document.getElementById('monteCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const padL=60,padTop=36,padR=30,padBot=36;
  const W=Math.max(400,Math.min(800,window.innerWidth-100));const chartH=200;const H=padTop+chartH+padBot;
  const dpr=window.devicePixelRatio||1;canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.width=W*dpr;canvas.height=H*dpr;ctx.scale(dpr,dpr);
  ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#6c5ce7';ctx.font='bold 13px system-ui';ctx.fillText('Monte Carlo Distribution (1000 iterations)',10,22);
  const minR=Math.floor(results[0]);const maxR=Math.ceil(results[results.length-1]);const range=maxR-minR||1;
  const bins=Math.min(40,range);const binW=range/bins;
  const hist=new Array(bins).fill(0);
  results.forEach(r=>{const bi=Math.min(bins-1,Math.floor((r-minR)/binW));hist[bi]++});
  const maxBin=Math.max(...hist);const chartW=W-padL-padR;const bw=chartW/bins;
  hist.forEach((count,bi)=>{
    const x=padL+bi*bw;const h=(count/maxBin)*chartH;const val=minR+bi*binW;
    ctx.fillStyle=val>=p90?'rgba(255,71,87,.7)':val>=p80?'rgba(255,165,2,.7)':'rgba(108,92,231,.7)';
    ctx.fillRect(x,padTop+chartH-h,bw-1,h);
  });
  const drawLine=(val,color,label)=>{const x=padL+((val-minR)/range)*chartW;ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(x,padTop);ctx.lineTo(x,padTop+chartH);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=color;ctx.font='bold 10px system-ui';ctx.fillText(label,x+3,padTop+12)};
  drawLine(det,'#00cec9','DET');drawLine(p50,'#2ed573','P50');drawLine(p80,'#ffa502','P80');drawLine(p90,'#ff4757','P90');
  ctx.fillStyle='#555580';ctx.font='10px system-ui';
  for(let i=0;i<=6;i++){ctx.fillText(Math.round(minR+i*(range/6))+'d',padL+(i/6)*chartW,H-8)}
}

    });
    if(scenarios.length>=2){
      h+=`<h4 style="color:var(--accent2);margin:12px 0 8px">Comparison</h4>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="color:var(--dim)"><th style="text-align:left;padding:6px">Scenario</th><th>Duration</th><th>Cost</th><th>Tasks</th><th>Critical</th></tr>`;
      scenarios.forEach(sc=>{h+=`<tr style="border-top:1px solid var(--border)"><td style="padding:6px">${esc(sc.name)}</td><td style="text-align:center">${sc.duration}d</td><td style="text-align:center">$${(sc.cost||0).toLocaleString()}</td><td style="text-align:center">${sc.taskCount}</td><td style="text-align:center">${sc.critCount||'-'}</td></tr>`});
      h+=`</table></div>`;
    }
  }
  h+=`</div>`;return h;
}
function saveScenario(){
  const name=document.getElementById('scenarioName')?.value.trim()||('Scenario '+new Date().toLocaleTimeString());
  const scenarios=JSON.parse(localStorage.getItem('seq3_scenarios')||'[]');
  const projEnd=Math.max(...S.tasks.map(t=>t.ef),0);
  scenarios.push({name,savedAt:new Date().toISOString(),project:S.project,duration:projEnd,cost:S.tasks.reduce((s,t)=>s+t.cost,0),taskCount:S.tasks.length,critCount:S.tasks.filter(t=>t.float===0).length,tasks:JSON.parse(JSON.stringify(S.tasks)),resources:JSON.parse(JSON.stringify(S.resources))});
  localStorage.setItem('seq3_scenarios',JSON.stringify(scenarios));sfxAdd();renderReview();
}
function loadScenario(idx){
  const scenarios=JSON.parse(localStorage.getItem('seq3_scenarios')||'[]');
  const sc=scenarios[idx];if(!sc)return;
  S.tasks=sc.tasks;S.resources=sc.resources;S.project=sc.project;calcSchedule();renderReview();announce('Loaded scenario: '+sc.name);
}
function deleteScenario(idx){
  const scenarios=JSON.parse(localStorage.getItem('seq3_scenarios')||'[]');
  scenarios.splice(idx,1);localStorage.setItem('seq3_scenarios',JSON.stringify(scenarios));renderReview();
}

// EXPORTS
// ══════════════════════════════════════
function getScheduleDates(){
  const base=new Date('2026-06-01');
  return S.tasks.map(t=>{const s=addWorkDays(base,t.es);const f=addWorkDays(s,t.dur);return{start:s,finish:f}});
}
function exportCSV(){
  const dates=getScheduleDates();
  let csv='Task ID,Task Name,WBS,Duration,Start,Finish,Predecessor,Resource,Calendar,Cost,Milestone\n';
  S.tasks.forEach((t,i)=>{
    const preds=t.preds.map(pr=>S.tasks[pr.task].id+pr.type+(pr.lag?'+'+pr.lag+'d':'')).join(';');
    csv+=`${t.id},${q(t.name)},${t.wbs||''},${t.dur},${fmtDate(dates[i].start)},${fmtDate(dates[i].finish)},${preds},${t.resource||''},5d/w,${t.cost||0},${t.milestone?'Y':'N'}\n`;
  });
  download(csv,S.project.replace(/\s+/g,'_')+'_P6.csv','text/csv');
}
function exportXER(){
  const dates=getScheduleDates();
  let xer='ERMHDR\t12.0\n%T\tPROJECT\nproj_id\tproj_short_name\n1\t'+S.project+'\n';
  xer+='%T\tTASK\ntask_id\ttask_code\ttask_name\torig_dur\tearly_start_date\tearly_end_date\ttotal_float\ttask_type\n';
  S.tasks.forEach((t,i)=>{xer+=`${i+1}\t${t.id}\t${t.name.replace(/\s+/g,'_')}\t${t.dur}\t${fmtDateP6(dates[i].start)}\t${fmtDateP6(dates[i].finish)}\t${t.float}\t${t.milestone?'TT_Mile':'TT_Task'}\n`});
  xer+='%T\tTASKPRED\ntask_id\tpred_task_id\tpred_type\tlag_qty\n';
  S.tasks.forEach((t,i)=>{(t.preds||[]).forEach(pr=>{xer+=`${i+1}\t${pr.task+1}\tPR_${pr.type}\t${pr.lag||0}\n`})});
  xer+='%T\tTASKRSRC\ntask_id\trsrc_name\n';
  S.tasks.forEach((t,i)=>{if(t.resource)xer+=`${i+1}\t${t.resource}\n`});
  xer+='%E';
  download(xer,S.project.replace(/\s+/g,'_')+'.xer','text/plain');
}
function exportXML(){
  const dates=getScheduleDates();
  let xml='<?xml version="1.0" encoding="UTF-8"?>\n<Project xmlns="http://schemas.microsoft.com/project">\n';
  xml+=`  <Name>${esc(S.project)}</Name>\n  <StartDate>${fmtDate(dates[0]?.start||new Date())}T08:00:00</StartDate>\n  <Tasks>\n`;
  S.tasks.forEach((t,i)=>{
    xml+=`    <Task>\n      <UID>${i+1}</UID>\n      <ID>${i+1}</ID>\n      <Name>${esc(t.name)}</Name>\n      <Duration>PT${t.dur*8}H0M0S</Duration>\n`;
    xml+=`      <Start>${fmtDate(dates[i].start)}T08:00:00</Start>\n      <Finish>${fmtDate(dates[i].finish)}T17:00:00</Finish>\n`;
    xml+=`      <WBS>${t.wbs||''}</WBS>\n      <TotalSlack>${t.float}</TotalSlack>\n      <Milestone>${t.milestone?1:0}</Milestone>\n`;
    if(t.cost)xml+=`      <Cost>${t.cost}</Cost>\n`;
    (t.preds||[]).forEach(pr=>{xml+=`      <PredecessorLink><PredecessorUID>${pr.task+1}</PredecessorUID><Type>${{FS:1,FF:0,SS:2,SF:3}[pr.type]}</Type><LinkLag>${(pr.lag||0)*4800}</LinkLag></PredecessorLink>\n`});
    xml+=`    </Task>\n`;
  });
  xml+='  </Tasks>\n  <Resources>\n';
  S.resources.forEach((r,i)=>{xml+=`    <Resource><UID>${i+1}</UID><Name>${esc(r.name)}</Name></Resource>\n`});
  xml+='  </Resources>\n  <Assignments>\n';
  S.tasks.forEach((t,i)=>{
    if(t.resource){const ri=S.resources.findIndex(r=>r.name===t.resource);if(ri>=0)xml+=`    <Assignment><TaskUID>${i+1}</TaskUID><ResourceUID>${ri+1}</ResourceUID></Assignment>\n`}
  });
  xml+='  </Assignments>\n</Project>';
  download(xml,S.project.replace(/\s+/g,'_')+'.xml','application/xml');
}
function exportJSON(){
  const data={project:S.project,mode:S.mode,tasks:S.tasks,resources:S.resources,baseline:S.baseline,cwps:S.cwps};
  download(JSON.stringify(data,null,2),S.project.replace(/\s+/g,'_')+'.json','application/json');
}
function copyText(){
  const dates=getScheduleDates();const projEnd=Math.max(...S.tasks.map(t=>t.ef));
  const totalCost=S.tasks.reduce((s,t)=>s+t.cost,0);
  let txt=`PROJECT: ${S.project}\nDuration: ${projEnd} working days\nTasks: ${S.tasks.length}\n`;
  if(totalCost)txt+=`Total Cost: $${totalCost.toLocaleString()}\n`;
  txt+='\nID       | Task Name            | Dur | Float | Pred         | Resource    | Cost\n';
  txt+='-'.repeat(100)+'\n';
  S.tasks.forEach((t,i)=>{
    const pr=(t.preds||[]).map(p=>S.tasks[p.task]?.id+p.type).join(',');
    txt+=`${(t.id||'').padEnd(9)}| ${t.name.padEnd(21).slice(0,21)}| ${(t.dur+'d').padEnd(4)}| ${(t.float+'d').padEnd(6)}| ${pr.padEnd(13)}| ${(t.resource||'-').padEnd(12)}| $${t.cost||0}\n`;
  });
  txt+='\nCritical: '+S.tasks.filter(t=>t.float===0).map(t=>t.id+' '+t.name).join(' -> ');
  navigator.clipboard.writeText(txt).then(()=>announce('Copied to clipboard!')).catch(()=>{});
}

// JSON Import
document.getElementById('jsonFileInput').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.tasks||!Array.isArray(data.tasks)){alert('Invalid schedule JSON.');return}
      S.project=data.project||'Imported';
      S.tasks=data.tasks.map(t=>({id:t.id||'A1000',name:t.name||'Task',dur:t.dur||0,o:t.o||0,m:t.m||0,p:t.p||0,wbs:t.wbs||'1.1',preds:t.preds||[],resource:t.resource||'',cost:t.cost||0,milestone:t.milestone||false,constraints:t.constraints||[],es:0,ef:0,ls:0,lf:0,float:0}));
      S.resources=data.resources||[];S.baseline=data.baseline||null;
      if(data.cwps)S.cwps=data.cwps;if(data.mode)S.mode=data.mode;
      if(!S.room){S.room=genCode();S.isHost=true;S.players=[{name:S.myName,emoji:S.myEmoji}];S.scores[S.myName]=0;initChannel()}
      calcSchedule();setPhase(5);announce('Schedule imported!');
    }catch(err){alert('Error: '+err.message)}
  };
  reader.readAsText(file);e.target.value='';
});

function showModal(title,body,onOk){
  const container=document.getElementById('modalContainer');
  let h=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>${title}</h3><div id="modalBody">${body}</div>`;
  if(onOk){
    h+=`<div class="btn-row" style="margin-top:16px"><button id="modalOkBtn">OK</button><button class="sec" onclick="closeModal()">Cancel</button></div>`;
  }
  h+=`</div></div>`;
  container.innerHTML=h;
  if(onOk){
    document.getElementById('modalOkBtn').onclick=()=>{const r=onOk();if(r!==false)closeModal()};
  }
}
function closeModal(){document.getElementById('modalContainer').innerHTML=''}

function autoSave(){
  try{
    const save={project:S.project,room:S.room,phase:S.phase,maxPhase:S.maxPhase,mode:S.mode,
      players:S.players,myName:S.myName,myEmoji:S.myEmoji,isHost:S.isHost,
      tasks:S.tasks,resources:S.resources,scores:S.scores,baseline:S.baseline,
      cwps:S.cwps,activeCwp:S.activeCwp,votingEnabled:S.votingEnabled};
    localStorage.setItem('sequencer3-state',JSON.stringify(save));
  }catch(e){}
}
function checkRestore(){
  try{
    const saved=localStorage.getItem('sequencer3-state');
    if(saved)document.getElementById('restoreBar').classList.remove('hidden');
  }catch(e){}
}
function restoreSession(){
  try{
    const saved=JSON.parse(localStorage.getItem('sequencer3-state'));
    if(!saved)return;
    Object.assign(S,saved);S.channel=null;S.timerInt=null;
    if(S.room)initChannel();
    setPhase(S.phase,true);
    document.getElementById('restoreBar').classList.add('hidden');
    announce('Session restored!');
  }catch(e){console.error('Restore failed',e)}
}
function dismissRestore(){
  document.getElementById('restoreBar').classList.add('hidden');
  localStorage.removeItem('sequencer3-state');
}
