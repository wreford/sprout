<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OHSA Trivia — Ontario Construction Safety</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;min-height:100dvh;padding:12px}
a{color:var(--accent);text-decoration:none}.home{display:inline-block;margin-bottom:12px;font-size:.95rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;max-width:700px;margin-left:auto;margin-right:auto}
h1{font-size:1.4rem;margin-bottom:4px}h2{font-size:1.1rem;color:var(--dim);font-weight:400;margin-bottom:16px}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}.stat{text-align:center}.stat b{display:block;font-size:1.5rem}.stat span{font-size:.75rem;color:var(--dim)}
button{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 16px;cursor:pointer;font-size:.95rem;transition:.15s}
button:hover{border-color:var(--accent)}button.sel{border-color:var(--accent);background:#ff6b3518}
.opt{display:block;width:100%;text-align:left;margin-bottom:8px;padding:12px 16px}.opt.correct{border-color:var(--green);background:#4ade8018;color:var(--green)}.opt.wrong{border-color:#ef4444;background:#ef444418;color:#ef4444}.opt:disabled{cursor:default}
.ref{margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;font-size:.85rem;color:var(--dim);border-left:3px solid var(--accent)}
.bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:12px;overflow:hidden}.bar div{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.timer{font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:8px}.timer.warn{color:#ef4444}
.cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}.cat{font-size:.75rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer}.cat.on{border-color:var(--accent);background:#ff6b3518}
.diff{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}.diff.easy{background:var(--green)}.diff.med{background:#facc15}.diff.hard{background:#ef4444}
.hidden{display:none}#wrap{max-width:700px;margin:0 auto}
</style>
</head>
<body>
<div id="wrap"><a href="../index.html" class="home">&larr; home</a>
<div class="card"><h1>OHSA Trivia</h1><h2>Ontario Construction Health &amp; Safety</h2>
<div class="stats"><div class="stat"><b id="hs">0</b><span>High Score</span></div><div class="stat"><b id="tp">0</b><span>Total Played</span></div><div class="stat"><b id="pct">0%</b><span>Accuracy</span></div></div>
<div id="setup">
<p style="margin-bottom:8px;font-size:.9rem;color:var(--dim)">Categories:</p>
<div class="cats" id="cats"></div>
<p style="margin:12px 0 8px;font-size:.9rem;color:var(--dim)">Mode:</p>
<div style="display:flex;gap:8px;margin-bottom:16px"><button id="btnTimed" class="sel" onclick="setMode(true)">Timed (30s)</button><button id="btnPractice" onclick="setMode(false)">Practice</button></div>
<button style="width:100%;background:var(--accent);color:#000;font-weight:600;border-color:var(--accent);padding:14px" onclick="startGame()">Start Quiz</button>
</div>
<div id="game" class="hidden">
<div class="bar"><div id="prog"></div></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span id="qnum" style="font-size:.85rem;color:var(--dim)"></span><span id="streak" style="font-size:.85rem">🔥 0</span></div>
<div id="timerWrap" class="timer"></div>
<p id="qlabel" style="margin-bottom:4px;font-size:.75rem"></p>
<p id="qtxt" style="font-size:1.05rem;margin-bottom:16px;line-height:1.5"></p>
<div id="opts"></div>
<div id="refBox" class="ref hidden"></div>
<button id="nxt" class="hidden" style="width:100%;margin-top:10px;border-color:var(--accent);color:var(--accent)" onclick="nextQ()">Next Question &rarr;</button>
</div>
<div id="results" class="hidden">
<h2 style="color:var(--text);font-weight:600;font-size:1.2rem;text-align:center;margin-bottom:12px">Quiz Complete!</h2>
<div class="stats" style="justify-content:center"><div class="stat"><b id="rScore" style="color:var(--green)">0</b><span>Score</span></div><div class="stat"><b id="rTotal">0</b><span>Questions</span></div><div class="stat"><b id="rStreak">0</b><span>Best Streak</span></div></div>
<button style="width:100%;border-color:var(--accent);color:var(--accent);margin-top:8px" onclick="resetUI()">Play Again</button>
</div></div></div>
<script>
const CATS=["Worker Rights","Duties & Responsibilities","Fall Protection","Confined Spaces","PPE","WHMIS","Reporting & Compliance","General Safety"];
const Q=[
{q:"Under OHSA, what is the minimum number of workers before a JHSC is required?",o:["10","20","25","50"],a:1,ref:"OHSA s.9(2)",c:"Duties & Responsibilities",d:"easy"},
{q:"What is the maximum free-fall distance allowed under O. Reg. 213/91?",o:["1.5 metres","2 metres","3 metres","5 metres"],a:2,ref:"O. Reg. 213/91 s.26.1",c:"Fall Protection",d:"med"},
{q:"Who has the duty to 'take every precaution reasonable in the circumstances for the protection of a worker'?",o:["Worker","Supervisor","Constructor","Employer"],a:3,ref:"OHSA s.25(2)(h)",c:"Duties & Responsibilities",d:"easy"},
{q:"Under WHMIS 2015, what replaced MSDS?",o:["HDS","SDS — Safety Data Sheet","PSDS","Chemical Info Sheet"],a:1,ref:"WHMIS 2015 / GHS",c:"WHMIS",d:"easy"},
{q:"What regulation governs construction projects in Ontario?",o:["O. Reg. 851","O. Reg. 213/91","O. Reg. 67/93","O. Reg. 490/09"],a:1,ref:"O. Reg. 213/91",c:"General Safety",d:"easy"},
{q:"A critical injury must be reported to the MOL within what timeframe?",o:["Within 1 hour","Within 24 hours","Immediately by telephone","Within 48 hours"],a:2,ref:"OHSA s.51(1)",c:"Reporting & Compliance",d:"easy"},
{q:"Working at Heights training is valid for how many years?",o:["1 year","2 years","3 years","5 years"],a:2,ref:"O. Reg. 213/91 s.26.2",c:"Fall Protection",d:"easy"},
{q:"At what height must guardrails be provided on open sides of a work surface?",o:["1.8 metres","2.4 metres","3.0 metres","1.2 metres"],a:1,ref:"O. Reg. 213/91 s.26.1",c:"Fall Protection",d:"med"},
{q:"Which section of OHSA outlines workers' rights?",o:["Section 25","Section 43","Section 28","Section 9"],a:1,ref:"OHSA s.43 (Right to Refuse)",c:"Worker Rights",d:"med"},
{q:"How many members must a JHSC have at minimum?",o:["2","4","6","8"],a:0,ref:"OHSA s.9(6)",c:"Duties & Responsibilities",d:"med"},
{q:"What percentage of JHSC members must represent workers?",o:["25%","33%","At least half","75%"],a:2,ref:"OHSA s.9(7)",c:"Duties & Responsibilities",d:"med"},
{q:"Under OHSA s.27, what is a supervisor's primary duty?",o:["File reports","Ensure workers comply with the Act","Order equipment","Set schedules"],a:1,ref:"OHSA s.27(1)(a)",c:"Duties & Responsibilities",d:"easy"},
{q:"What are the three fundamental worker rights under OHSA?",o:["Right to refuse, right to know, right to participate","Right to pay, right to leave, right to refuse","Right to sue, right to know, right to strike","Right to know, right to overtime, right to refuse"],a:0,ref:"OHSA s.43, s.9, WHMIS",c:"Worker Rights",d:"easy"},
{q:"A worker exercising the right to refuse unsafe work must first notify their:",o:["Union rep","Co-worker","Supervisor or employer","MOL inspector"],a:2,ref:"OHSA s.43(3)",c:"Worker Rights",d:"easy"},
{q:"Under O. Reg. 213/91, who must ensure a Notice of Project is filed?",o:["Worker","Employer","Constructor","Supervisor"],a:2,ref:"O. Reg. 213/91 s.6(1)",c:"Reporting & Compliance",d:"med"},
{q:"At what project value or duration must a Notice of Project be filed?",o:["$10,000 or 2 weeks","$25,000 or 3 weeks","$50,000 or 4 weeks","$100,000 or 1 month"],a:2,ref:"O. Reg. 213/91 s.6(1)",c:"Reporting & Compliance",d:"hard"},
{q:"What does GHS stand for in WHMIS 2015?",o:["General Hazard System","Global Health Standards","Globally Harmonized System","General Health & Safety"],a:2,ref:"WHMIS 2015 / GHS",c:"WHMIS",d:"easy"},
{q:"How many WHMIS 2015 hazard classes exist for physical hazards?",o:["6","9","16","20"],a:2,ref:"WHMIS 2015 Regulations",c:"WHMIS",d:"hard"},
{q:"What is the maximum noise exposure limit for an 8-hour workday in Ontario?",o:["80 dBA","85 dBA","90 dBA","95 dBA"],a:1,ref:"O. Reg. 381/15 s.2",c:"General Safety",d:"med"},
{q:"Under O. Reg. 213/91, when is a full-body harness required?",o:["At any height","Above 1.8 m","Above 3 m where guardrails impracticable","Only on scaffolds"],a:2,ref:"O. Reg. 213/91 s.26.1(2)",c:"Fall Protection",d:"med"},
{q:"Who appoints the constructor on a construction project?",o:["The MOL","The project owner","The general contractor self-declares","The JHSC"],a:1,ref:"OHSA s.1(1) definition",c:"Duties & Responsibilities",d:"hard"},
{q:"Section 25(1) of OHSA requires employers to ensure what is maintained?",o:["Worker attendance","Equipment, materials, and protective devices","Coffee breaks","Vehicle logs"],a:1,ref:"OHSA s.25(1)(a)",c:"Duties & Responsibilities",d:"easy"},
{q:"What does a compliance order from an MOL inspector require?",o:["Immediate shutdown","Compliance within specified time","Payment of a fine","Criminal charges"],a:1,ref:"OHSA s.57(1)",c:"Reporting & Compliance",d:"med"},
{q:"A stop work order under OHSA can be issued by whom?",o:["Only the Minister","Any supervisor","An MOL inspector","The JHSC"],a:2,ref:"OHSA s.57(6)",c:"Reporting & Compliance",d:"easy"},
{q:"What is the definition of 'critical injury' under O. Reg. 834?",o:["Any broken bone","Injury of a serious nature that places life in jeopardy or produces unconsciousness, substantial blood loss, fracture of limb/rib/vertebra/skull, burn to major body part, loss of sight, amputation","Any injury requiring hospital","Injury causing more than 1 day off"],a:1,ref:"O. Reg. 834 s.1",c:"Reporting & Compliance",d:"med"},
{q:"Under OHSA s.28, what is a worker's duty?",o:["File tax returns","Work in compliance with the Act and regulations","Inspect the workplace daily","Chair JHSC meetings"],a:1,ref:"OHSA s.28(1)(a)",c:"Duties & Responsibilities",d:"easy"},
{q:"WHMIS 2015 supplier labels must include how many elements?",o:["4","5","6","7"],a:2,ref:"WHMIS 2015 Regulations",c:"WHMIS",d:"hard"},
{q:"The 'skull and crossbones' pictogram represents which hazard?",o:["Corrosion","Acute toxicity (fatal/toxic)","Environmental hazard","Oxidizer"],a:1,ref:"GHS Pictograms",c:"WHMIS",d:"easy"},
{q:"Under O. Reg. 213/91, what is required before entry into a confined space?",o:["Only a hard hat","An entry permit, atmospheric testing, rescue plan","Just a supervisor's verbal OK","A union meeting"],a:1,ref:"O. Reg. 213/91 s.221",c:"Confined Spaces",d:"easy"},
{q:"Who must sign a confined space entry permit?",o:["Any worker","A competent person designated by the employer","The MOL","The building owner"],a:1,ref:"O. Reg. 213/91 s.222",c:"Confined Spaces",d:"med"},
{q:"What oxygen level range is considered safe for confined space entry?",o:["15–18%","19.5–23%","21–25%","17–21%"],a:1,ref:"O. Reg. 213/91 s.221(3)",c:"Confined Spaces",d:"med"},
{q:"An atmosphere below what oxygen percentage is considered oxygen-deficient?",o:["21%","19.5%","18%","16%"],a:1,ref:"Confined Space Standards",c:"Confined Spaces",d:"med"},
{q:"What PPE is mandatory on all Ontario construction sites?",o:["Safety glasses only","Hard hat and safety boots","Hard hat, safety boots, and high-visibility clothing where required","Respirator"],a:2,ref:"O. Reg. 213/91 s.21-25",c:"PPE",d:"easy"},
{q:"CSA Z94.1 covers which type of PPE?",o:["Safety footwear","Hard hats","Eye protection","Hearing protection"],a:0,ref:"CSA Z94.1",c:"PPE",d:"med"},
{q:"Class E hard hats protect against what voltage?",o:["750V","2,200V","20,000V","100,000V"],a:2,ref:"CSA Z94.1",c:"PPE",d:"hard"},
{q:"How often should fall arrest equipment be inspected?",o:["Monthly","Before each use","Weekly","Annually"],a:1,ref:"O. Reg. 213/91 s.26.9(4)",c:"Fall Protection",d:"easy"},
{q:"What is the purpose of a safety net under O. Reg. 213/91?",o:["Decorative","To arrest a falling worker where other protection impracticable","To catch tools","Rain protection"],a:1,ref:"O. Reg. 213/91 s.26.8",c:"Fall Protection",d:"easy"},
{q:"Under OHSA, who enforces the Act?",o:["Police","WSIB","Ministry of Labour (MOL)","Municipal inspectors"],a:2,ref:"OHSA s.54",c:"Reporting & Compliance",d:"easy"},
{q:"What is the maximum fine for a corporation on first conviction under OHSA?",o:["$100,000","$500,000","$1,500,000","$2,000,000"],a:2,ref:"OHSA s.66(1)",c:"Reporting & Compliance",d:"hard"},
{q:"What is the maximum prison sentence for an individual under OHSA?",o:["6 months","12 months","2 years","5 years"],a:1,ref:"OHSA s.66(2)",c:"Reporting & Compliance",d:"hard"},
{q:"A designated substance on a construction project requires what?",o:["Nothing special","An assessment and control program","Only PPE","A union vote"],a:1,ref:"O. Reg. 490/09",c:"General Safety",d:"med"},
{q:"Asbestos is regulated under which Ontario regulation?",o:["O. Reg. 213/91","O. Reg. 278/05","O. Reg. 490/09","O. Reg. 833"],a:2,ref:"O. Reg. 490/09",c:"General Safety",d:"hard"},
{q:"What does WSIB stand for?",o:["Workers' Safety Insurance Bureau","Workplace Safety & Insurance Board","Worker Standards & Industrial Board","Workplace Security & Inspection Board"],a:1,ref:"WSIA 1997",c:"General Safety",d:"easy"},
{q:"Under WSIB, what is the employer's reporting deadline for a workplace injury?",o:["24 hours","3 business days","7 calendar days","30 days"],a:1,ref:"WSIA s.21",c:"Reporting & Compliance",d:"med"},
{q:"A worker may refuse to work if they believe equipment is likely to:",o:["Be slow","Endanger themselves or another worker","Cost too much","Violate union rules"],a:1,ref:"OHSA s.43(3)(a)",c:"Worker Rights",d:"easy"},
{q:"During a work refusal, who investigates first?",o:["MOL inspector","The worker and supervisor together","JHSC alone","Police"],a:1,ref:"OHSA s.43(4)",c:"Worker Rights",d:"med"},
{q:"If a work refusal is unresolved after internal investigation, who is called?",o:["Police","An MOL inspector","WSIB","The media"],a:1,ref:"OHSA s.43(7)",c:"Worker Rights",d:"easy"},
{q:"Can a worker be disciplined for exercising the right to refuse?",o:["Yes, always","Only with union consent","No — reprisal is prohibited under OHSA","Only if the refusal was invalid"],a:2,ref:"OHSA s.50",c:"Worker Rights",d:"easy"},
{q:"OHSA s.50 protects workers against reprisal for:",o:["Taking vacation","Complying with or seeking enforcement of the Act","Being late","Personal disputes"],a:1,ref:"OHSA s.50(1)",c:"Worker Rights",d:"med"},
{q:"How many designated substances are listed under Ontario regulations?",o:["5","8","11","15"],a:2,ref:"O. Reg. 490/09",c:"General Safety",d:"hard"},
{q:"Scaffolds must be capable of supporting at least how many times the maximum load?",o:["2 times","3 times","4 times","5 times"],a:2,ref:"O. Reg. 213/91 s.125",c:"General Safety",d:"hard"},
{q:"Under O. Reg. 213/91, who is a 'competent person'?",o:["Anyone with a diploma","A person who is qualified because of knowledge, training, and experience","Only an engineer","Only a supervisor"],a:1,ref:"O. Reg. 213/91 s.1",c:"Duties & Responsibilities",d:"easy"},
{q:"The constructor must ensure that a copy of the Notice of Project is posted:",o:["At head office only","In a conspicuous location at the project","In the worker's lunchroom only","Online"],a:1,ref:"O. Reg. 213/91 s.6(3)",c:"Reporting & Compliance",d:"med"},
{q:"Which section of OHSA gives inspectors the right to enter a workplace?",o:["Section 25","Section 43","Section 54","Section 56"],a:3,ref:"OHSA s.54(1)(a) & s.56",c:"Reporting & Compliance",d:"hard"},
{q:"Multi-point suspended scaffolds require workers to use what fall protection?",o:["Only guardrails","A full-body harness connected to an independent lifeline","Just a hard hat","A travel restraint only"],a:1,ref:"O. Reg. 213/91 s.139.1",c:"Fall Protection",d:"med"},
{q:"Under OHSA, a workplace health and safety representative is required when there are:",o:["1–5 workers","6–19 workers","20+ workers","50+ workers"],a:1,ref:"OHSA s.8(1)",c:"Duties & Responsibilities",d:"med"},
{q:"An employer must prepare and review a health and safety policy at least:",o:["Monthly","Quarterly","Annually","Every 5 years"],a:2,ref:"OHSA s.25(2)(j)",c:"Duties & Responsibilities",d:"easy"},
{q:"What type of fire extinguisher is required for flammable liquid fires?",o:["Class A","Class B","Class C","Class D"],a:1,ref:"O. Reg. 213/91 s.52",c:"General Safety",d:"med"},
{q:"WHMIS 2015 workplace labels require at minimum:",o:["Product identifier, safe handling info, reference to SDS","Only the product name","A skull and crossbones","The supplier's phone number only"],a:0,ref:"WHMIS 2015 Regs",c:"WHMIS",d:"med"},
{q:"The 'exclamation mark' WHMIS pictogram covers which hazards?",o:["Acute toxicity (harmful), skin/eye irritation, narcotic effects","Explosive","Corrosive","Radioactive"],a:0,ref:"GHS/WHMIS Pictograms",c:"WHMIS",d:"med"},
{q:"Under O. Reg. 213/91, trenches deeper than what depth require shoring or sloping?",o:["0.6 metres","1.2 metres","2.4 metres","3.0 metres"],a:1,ref:"O. Reg. 213/91 s.222-242",c:"General Safety",d:"med"},
{q:"An MOL order under s.57(1) is commonly called a:",o:["Warning","Compliance order","Stop work order","Fine"],a:1,ref:"OHSA s.57(1)",c:"Reporting & Compliance",d:"easy"},
{q:"What document must a constructor prepare before beginning a project?",o:["Tax filing","Health and safety policy for the project","Building permit only","Environmental assessment only"],a:1,ref:"OHSA s.23(1)",c:"Duties & Responsibilities",d:"med"},
{q:"Under OHSA s.26, what are the constructor's duties?",o:["Only hire workers","Ensure compliance with the Act on the project, appoint supervisors","Only file paperwork","Only provide PPE"],a:1,ref:"OHSA s.23(1)-(2)",c:"Duties & Responsibilities",d:"med"},
];
let timed=true,cats=new Set(CATS),pool=[],qi=0,score=0,streak=0,best=0,answered=false,timer=null,timeLeft=30;
let LS=JSON.parse(localStorage.getItem("ohsa")||'{"hs":0,"tp":0,"tc":0}');
function saveLS(){localStorage.setItem("ohsa",JSON.stringify(LS))}
function updStats(){document.getElementById("hs").textContent=LS.hs;document.getElementById("tp").textContent=LS.tp;document.getElementById("pct").textContent=LS.tp?Math.round(LS.tc/LS.tp*100)+"%":"0%"}
updStats();
const cDiv=document.getElementById("cats");CATS.forEach(c=>{const b=document.createElement("button");b.className="cat on";b.textContent=c;b.onclick=()=>{cats.has(c)?cats.delete(c):cats.add(c);b.classList.toggle("on")};cDiv.appendChild(b)});
function setMode(t){timed=t;document.getElementById("btnTimed").classList.toggle("sel",t);document.getElementById("btnPractice").classList.toggle("sel",!t)}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startGame(){pool=shuffle(Q.filter(q=>cats.has(q.c)));if(!pool.length)return alert("Select at least one category.");qi=0;score=0;streak=0;best=0;answered=false;document.getElementById("setup").classList.add("hidden");document.getElementById("results").classList.add("hidden");document.getElementById("game").classList.remove("hidden");showQ()}
function showQ(){if(qi>=pool.length){endGame();return}answered=false;const q=pool[qi],dc={easy:"green",med:"#facc15",hard:"#ef4444"},dn={easy:"Easy",med:"Medium",hard:"Hard"};
document.getElementById("prog").style.width=(qi/pool.length*100)+"%";document.getElementById("qnum").textContent=`${qi+1} / ${pool.length}`;document.getElementById("streak").textContent=`\u{1F525} ${streak}`;
document.getElementById("qlabel").innerHTML=`<span class="diff ${q.d}" style="background:${dc[q.d]}"></span>${dn[q.d]} — ${q.c}`;
document.getElementById("qtxt").textContent=q.q;document.getElementById("refBox").classList.add("hidden");document.getElementById("nxt").classList.add("hidden");
const od=document.getElementById("opts");od.innerHTML="";q.o.forEach((o,i)=>{const b=document.createElement("button");b.className="opt";b.textContent=o;b.onclick=()=>answer(i);od.appendChild(b)});
if(timed){timeLeft=30;document.getElementById("timerWrap").classList.remove("hidden","warn");document.getElementById("timerWrap").textContent=timeLeft;timer=setInterval(()=>{timeLeft--;document.getElementById("timerWrap").textContent=timeLeft;if(timeLeft<=10)document.getElementById("timerWrap").classList.add("warn");if(timeLeft<=0){clearInterval(timer);answer(-1)}},1000)}else{document.getElementById("timerWrap").classList.add("hidden")}}
function answer(i){if(answered)return;answered=true;clearInterval(timer);const q=pool[qi],btns=document.getElementById("opts").children;
for(let j=0;j<btns.length;j++){btns[j].disabled=true;if(j===q.a)btns[j].classList.add("correct");if(j===i&&i!==q.a)btns[j].classList.add("wrong")}
if(i===q.a){score++;streak++;if(streak>best)best=streak;LS.tc++}else{streak=0}LS.tp++;saveLS();updStats();
document.getElementById("streak").textContent=`\u{1F525} ${streak}`;document.getElementById("refBox").innerHTML=`<b>Reference:</b> ${q.ref}`;document.getElementById("refBox").classList.remove("hidden");document.getElementById("nxt").classList.remove("hidden")}
function nextQ(){qi++;showQ()}
function endGame(){document.getElementById("game").classList.add("hidden");document.getElementById("results").classList.remove("hidden");document.getElementById("rScore").textContent=score;document.getElementById("rTotal").textContent=pool.length;document.getElementById("rStreak").textContent=best;if(score>LS.hs){LS.hs=score;saveLS();updStats()}}
function resetUI(){document.getElementById("results").classList.add("hidden");document.getElementById("game").classList.add("hidden");document.getElementById("setup").classList.remove("hidden");updStats()}
</script>
</body>
</html>
