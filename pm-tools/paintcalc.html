<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Paint & Coating Calculator</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;padding:16px;max-width:600px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:22px;margin:8px 0 16px}h2{font-size:15px;color:var(--accent);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px}
input,select{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;margin-bottom:10px}
.row{display:flex;gap:10px}.row>*{flex:1}
.counter{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.counter span{font-size:14px;min-width:80px}
.counter b{font-size:18px;min-width:24px;text-align:center}
.btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:16px;cursor:pointer;font-weight:700}
.btn:hover{opacity:.85}.btn.sm{padding:4px 12px;font-size:14px}
.result{background:var(--bg);border:1px solid var(--green);border-radius:8px;padding:12px;margin-top:10px}
.result b{color:var(--green)}.result p{font-size:14px;margin:4px 0}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.chip{width:40px;height:40px;border-radius:6px;border:2px solid var(--border);cursor:pointer;position:relative}
.chip.sel{border-color:var(--accent)}.chip span{display:none;position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;white-space:nowrap;color:var(--dim)}
.chip:hover span{display:block}
.dft-out{color:var(--green);font-size:15px;font-weight:700;margin-top:6px}
</style>
</head>
<body>
<a class="home" href="../index.html">← home</a>
<h1>🎨 Paint & Coating Calculator</h1>
<div class="card">
<h2>Room Dimensions</h2>
<div class="row"><div><label>Length (ft)</label><input id="rl" type="number" value="12" oninput="calc()"></div><div><label>Width (ft)</label><input id="rw" type="number" value="10" oninput="calc()"></div><div><label>Height (ft)</label><input id="rh" type="number" value="8" oninput="calc()"></div></div>
<div class="counter"><span>Doors (21 ft²)</span><button class="btn sm" onclick="adj('d',-1)">−</button><b id="dc">1</b><button class="btn sm" onclick="adj('d',1)">+</button></div>
<div class="counter"><span>Windows (15 ft²)</span><button class="btn sm" onclick="adj('w',-1)">−</button><b id="wc">2</b><button class="btn sm" onclick="adj('w',1)">+</button></div>
<label>Coats</label>
<select id="coats" onchange="calc()"><option value="1">1 coat</option><option value="2" selected>2 coats</option><option value="3">Primer + 2 coats</option></select>
<label>Paint Type</label>
<select id="ptype" onchange="calc()"><option value="350">Interior Latex (350 ft²/gal)</option><option value="300">Exterior (300 ft²/gal)</option><option value="400">Primer (400 ft²/gal)</option><option value="250">Stain (250 ft²/gal)</option></select>
<label>Application Method</label>
<select id="method" onchange="calc()"><option value="1">Brush (1× coverage)</option><option value="1.15">Roller (1.15× coverage)</option><option value="0.75">Spray (0.75× — more waste)</option></select>
<label>Price per Gallon ($)</label><input id="price" type="number" value="45" oninput="calc()">
<div class="chips" id="chips"></div>
<div class="result" id="res"></div>
</div>
<div class="card">
<h2>DFT Calculator (Industrial)</h2>
<div class="row"><div><label>WFT (mils)</label><input id="wft" type="number" value="6" oninput="dft()"></div><div><label>% Solids by Volume</label><input id="sol" type="number" value="60" oninput="dft()"></div></div>
<div class="dft-out" id="dftout"></div>
</div>
<script>
let doors=1,wins=2;
const colors=[{n:'Ceiling White',c:'#f5f5f0'},{n:'Warm Gray',c:'#8e8e85'},{n:'Navy',c:'#1e3a5f'},{n:'Sage',c:'#7d8c6e'},{n:'Terra Cotta',c:'#c4623a'},{n:'Charcoal',c:'#36363a'},{n:'Sky Blue',c:'#6fa8c7'},{n:'Cream',c:'#f0e6c8'}];
function init(){const ch=document.getElementById('chips');colors.forEach(c=>{ch.innerHTML+=`<div class="chip" style="background:${c.c}" onclick="this.classList.toggle('sel')"><span>${c.n}</span></div>`});calc();dft()}
function adj(t,v){if(t==='d'){doors=Math.max(0,doors+v);document.getElementById('dc').textContent=doors}else{wins=Math.max(0,wins+v);document.getElementById('wc').textContent=wins}calc()}
function calc(){
  const l=+document.getElementById('rl').value,w=+document.getElementById('rw').value,h=+document.getElementById('rh').value;
  const wallArea=2*(l+w)*h;const sub=doors*21+wins*15;const net=Math.max(0,wallArea-sub);
  const coats=+document.getElementById('coats').value;const cov=+document.getElementById('ptype').value;const meth=+document.getElementById('method').value;const price=+document.getElementById('price').value;
  const totalArea=net*(coats===3?3:coats);const adjCov=cov*meth;const gal=totalArea/adjCov;const cans=Math.ceil(gal);
  document.getElementById('res').innerHTML=`<p>Wall area: <b>${wallArea} ft²</b> — Net: <b>${net} ft²</b></p><p>Total coverage needed: <b>${totalArea} ft²</b></p><p>Gallons needed: <b>${gal.toFixed(1)}</b> → Buy: <b style="color:var(--accent)">${cans} gallon can${cans>1?'s':''}</b></p><p>Estimated cost: <b>$${(cans*price).toFixed(2)}</b></p>`;
}
function dft(){const w=+document.getElementById('wft').value,s=+document.getElementById('sol').value;const d=w*(s/100);document.getElementById('dftout').textContent=`DFT = ${d.toFixed(1)} mils (${(d*25.4).toFixed(0)} µm)`}
init();
</script>
</body>
</html>
