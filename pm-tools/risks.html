<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Register</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px;cursor:pointer}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
textarea{min-height:60px}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-red{background:#ef4444}
.btn:active{opacity:.8}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:8px;padding:12px;text-align:center}
.stat .v{font-size:1.4rem;font-weight:700;color:#ff6b35}
.stat .l{font-size:.7rem;color:#999;margin-top:2px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select{padding:10px;font-size:.9rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.risk-card{background:#1a1a1c;border-left:4px solid;border-radius:8px;padding:12px;margin-bottom:8px;transition:all .2s}
.risk-card.high{border-color:#ef4444}.risk-card.med{border-color:#f7c948}.risk-card.low{border-color:#4ade80}
.risk-card .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.risk-card .desc{font-size:.9rem;margin:6px 0}
.risk-card .meta{font-size:.75rem;color:#999;display:flex;gap:10px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.score{font-size:1.1rem;font-weight:700}
.score.high{color:#ef4444}.score.med{color:#f7c948}.score.low{color:#4ade80}
.del{background:none;border:none;color:#ef4444;font-size:1.1rem;cursor:pointer;padding:4px 8px}
.matrix{display:grid;grid-template-columns:30px repeat(5,1fr);gap:2px;margin-bottom:12px;font-size:.7rem;text-align:center}
.matrix .cell{padding:8px 4px;border-radius:4px;min-height:32px;display:flex;align-items:center;justify-content:center;font-weight:600}
.matrix .lbl{color:#999;display:flex;align-items:center;justify-content:center;font-size:.65rem}
.hidden{display:none}
.collapse{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse.open{max-height:800px}
@media print{body{background:#fff;color:#000}.card,.risk-card,.stat{border-color:#ccc;break-inside:avoid}.btn,.del,.filters,.home-link{display:none!important}}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Risk Register</h1>
<button class="btn btn-sm btn-green" onclick="exportData()">Export</button>
</div>
<div class="stats" id="stats"></div>
<div class="card">
<h2 onclick="toggleForm()">&#43; Add Risk &#9662;</h2>
<div class="collapse" id="formWrap">
<div class="row"><div class="field"><label>Description</label><textarea id="rDesc"></textarea></div></div>
<div class="row">
<div class="field"><label>Category</label><select id="rCat"><option>Technical</option><option>Financial</option><option>Schedule</option><option>Safety</option><option>Legal</option><option>Environmental</option></select></div>
<div class="field"><label>Likelihood (1-5)</label><select id="rLik"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
<div class="field"><label>Impact (1-5)</label><select id="rImp"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>
</div>
<div class="row">
<div class="field"><label>Mitigation Strategy</label><textarea id="rMit"></textarea></div>
</div>
<div class="row">
<div class="field"><label>Owner</label><input id="rOwn"></div>
<div class="field"><label>Status</label><select id="rStat"><option>Open</option><option>Mitigated</option><option>Closed</option><option>Occurred</option></select></div>
</div>
<button class="btn" onclick="addRisk()">Add Risk</button>
</div>
</div>
<div class="card"><h2>Risk Matrix</h2><div id="matrix"></div></div>
<div class="filters">
<select id="fStatus" onchange="render()"><option value="">All Status</option><option>Open</option><option>Mitigated</option><option>Closed</option><option>Occurred</option></select>
<select id="fCat" onchange="render()"><option value="">All Categories</option><option>Technical</option><option>Financial</option><option>Schedule</option><option>Safety</option><option>Legal</option><option>Environmental</option></select>
</div>
<div id="list"></div>
<script>
const KEY='risk-register';
let risks=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(risks))}
function toggleForm(){document.getElementById('formWrap').classList.toggle('open')}
function addRisk(){
 const d=document.getElementById('rDesc').value.trim();if(!d)return;
 const l=+document.getElementById('rLik').value,i=+document.getElementById('rImp').value;
 risks.push({id:Date.now(),desc:d,cat:document.getElementById('rCat').value,lik:l,imp:i,score:l*i,
  mit:document.getElementById('rMit').value.trim(),owner:document.getElementById('rOwn').value.trim(),
  status:document.getElementById('rStat').value});
 save();document.getElementById('rDesc').value='';document.getElementById('rMit').value='';document.getElementById('rOwn').value='';render();
}
function delRisk(id){risks=risks.filter(r=>r.id!==id);save();render()}
function lvl(s){return s>=15?'high':s>=8?'med':'low'}
function render(){
 const fs=document.getElementById('fStatus').value,fc=document.getElementById('fCat').value;
 let f=risks.filter(r=>(!fs||r.status===fs)&&(!fc||r.cat===fc)).sort((a,b)=>b.score-a.score);
 const open=risks.filter(r=>r.status==='Open'),avg=risks.length?Math.round(risks.reduce((s,r)=>s+r.score,0)/risks.length*10)/10:0;
 const hi=risks.length?risks.reduce((a,b)=>a.score>b.score?a:b):null;
 document.getElementById('stats').innerHTML=`<div class="stat"><div class="v">${risks.length}</div><div class="l">Total</div></div>
  <div class="stat"><div class="v">${open.length}</div><div class="l">Open</div></div>
  <div class="stat"><div class="v">${avg}</div><div class="l">Avg Score</div></div>
  <div class="stat"><div class="v" style="font-size:1rem">${hi?hi.desc.substring(0,20)+'…':'—'}</div><div class="l">Highest Risk</div></div>`;
 buildMatrix();
 document.getElementById('list').innerHTML=f.map(r=>`<div class="risk-card ${lvl(r.score)}">
  <div class="top"><div><span class="badge" style="background:#2a2a2d;color:#e0e0e0">${r.cat}</span>
  <span class="badge" style="background:#2a2a2d">${r.status}</span></div>
  <div><span class="score ${lvl(r.score)}">${r.score}</span><button class="del" onclick="delRisk(${r.id})">&#10005;</button></div></div>
  <div class="desc">${r.desc}</div>
  ${r.mit?'<div class="desc" style="color:#999">&#128737; '+r.mit+'</div>':''}
  <div class="meta"><span>L:${r.lik} × I:${r.imp}</span>${r.owner?'<span>Owner: '+r.owner+'</span>':''}</div></div>`).join('');
}
function buildMatrix(){
 const grid=Array.from({length:5},()=>Array(5).fill(0));
 risks.filter(r=>r.status==='Open').forEach(r=>{grid[r.lik-1][r.imp-1]++});
 const colors=s=>s>=15?'#ef4444':s>=10?'#f97316':s>=5?'#f7c948':'#4ade80';
 let h='<div class="lbl"></div>';for(let i=1;i<=5;i++)h+=`<div class="lbl">I:${i}</div>`;
 for(let l=5;l>=1;l--){h+=`<div class="lbl">L:${l}</div>`;
  for(let i=1;i<=5;i++){const s=l*i,c=grid[l-1][i-1];
   h+=`<div class="cell" style="background:${colors(s)}33;color:${colors(s)}">${c||''}</div>`;}}
 document.getElementById('matrix').innerHTML=`<div class="matrix">${h}</div>`;
}
function exportData(){
 let t='RISK REGISTER\n'+new Date().toLocaleDateString()+'\n\n';
 risks.sort((a,b)=>b.score-a.score).forEach((r,i)=>{
  t+=`${i+1}. [Score:${r.score}] ${r.desc}\n   Category:${r.cat} | Status:${r.status} | L:${r.lik} I:${r.imp}\n`;
  if(r.mit)t+=`   Mitigation: ${r.mit}\n`;if(r.owner)t+=`   Owner: ${r.owner}\n`;t+='\n';});
 navigator.clipboard.writeText(t).then(()=>alert('Copied to clipboard'));
}
render();
</script>
</body>
</html>
