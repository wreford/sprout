<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brick &amp; Block Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);padding:16px;max-width:600px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px;display:inline-block;margin-bottom:12px}
h1{font-size:20px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;color:var(--dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px}
.row{display:flex;gap:10px}.row>*{flex:1}
.result{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px}
.result .val{font-size:22px;font-weight:700;color:var(--accent)}.result .lbl{font-size:12px;color:var(--dim)}
.result.green .val{color:var(--green)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;margin-top:10px}
button.sm{padding:6px 12px;font-size:12px;background:transparent;border:1px solid var(--border);color:var(--dim);margin:0}
button.sm:hover{border-color:var(--accent);color:var(--accent)}
.opening{display:flex;gap:8px;align-items:center;padding:8px;background:var(--bg);border-radius:6px;margin-top:6px;font-size:13px}
.opening span{flex:1}
.range-row{display:flex;align-items:center;gap:10px}.range-row input[type=range]{flex:1}
.range-row .rv{min-width:40px;text-align:right;color:var(--accent);font-weight:600}
</style>
</head>
<body>
<a class="home" href="../index.html">← home</a>
<h1>Brick &amp; Block Calculator</h1>

<div class="card">
<h2>Wall Dimensions</h2>
<div class="row">
<div><label>Height (ft)</label><input type="number" id="wh" value="10" oninput="calc()"></div>
<div><label>Length (ft)</label><input type="number" id="wl" value="40" oninput="calc()"></div>
</div>
<label>Brick / Block Type</label>
<select id="btype" onchange="calc()">
<option value="21">Standard Brick (21/sqft)</option>
<option value="1.125">CMU 8" Block (1.125/sqft)</option>
<option value="1.125">CMU 12" Block (1.125/sqft)</option>
</select>
</div>

<div class="card">
<h2>Openings</h2>
<div id="openings"></div>
<div class="row" style="margin-top:10px">
<button class="sm" onclick="addO('Door',3,7)">+ Door (3×7)</button>
<button class="sm" onclick="addO('Window',3,4)">+ Window (3×4)</button>
<button class="sm" onclick="addO('Custom',4,4)">+ Custom</button>
</div>
</div>

<div class="card">
<h2>Waste &amp; Cost</h2>
<label>Waste Factor</label>
<div class="range-row"><input type="range" id="waste" min="5" max="10" value="5" oninput="calc()"><span class="rv" id="wasteV">5%</span></div>
<label>Cost per Unit ($)</label>
<input type="number" id="unitCost" value="0.75" step="0.01" oninput="calc()">
<label>Mortar Bag Cost ($)</label>
<input type="number" id="mortarCost" value="12" step="0.5" oninput="calc()">
</div>

<div class="card">
<h2>Results</h2>
<div class="grid">
<div class="result"><div class="lbl">Wall Area (sqft)</div><div class="val" id="area">—</div></div>
<div class="result"><div class="lbl">Net Area (sqft)</div><div class="val" id="netArea">—</div></div>
<div class="result green"><div class="lbl">Total Units</div><div class="val" id="units">—</div></div>
<div class="result"><div class="lbl">Mortar Bags</div><div class="val" id="mortar">—</div></div>
<div class="result"><div class="lbl">Unit Cost</div><div class="val" id="uCost">—</div></div>
<div class="result"><div class="lbl">Total Cost</div><div class="val" id="tCost">—</div></div>
</div>
</div>

<script>
let openings=[];
function addO(name,w,h){openings.push({name,w,h});renderO();calc();}
function removeO(i){openings.splice(i,1);renderO();calc();}
function renderO(){
  const el=document.getElementById('openings');
  el.innerHTML=openings.map((o,i)=>`<div class="opening"><span>${o.name}: ${o.w}×${o.h}ft (${o.w*o.h} sqft)</span><button class="sm" onclick="removeO(${i})">✕</button></div>`).join('');
}
function calc(){
  const H=+document.getElementById('wh').value,L=+document.getElementById('wl').value;
  const perSqft=+document.getElementById('btype').value;
  const w=+document.getElementById('waste').value/100;
  const uc=+document.getElementById('unitCost').value, mc=+document.getElementById('mortarCost').value;
  document.getElementById('wasteV').textContent=Math.round(w*100)+'%';
  const gross=H*L;
  const oArea=openings.reduce((s,o)=>s+o.w*o.h,0);
  const net=Math.max(0,gross-oArea);
  const rawUnits=Math.ceil(net*perSqft);
  const totalUnits=Math.ceil(rawUnits*(1+w));
  const isBrick=perSqft>2;
  const mortarBags=isBrick?Math.ceil(net/35):Math.ceil(net/12);
  document.getElementById('area').textContent=gross;
  document.getElementById('netArea').textContent=net;
  document.getElementById('units').textContent=totalUnits.toLocaleString();
  document.getElementById('mortar').textContent=mortarBags;
  document.getElementById('uCost').textContent='$'+(totalUnits*uc).toFixed(2);
  document.getElementById('tCost').textContent='$'+((totalUnits*uc)+(mortarBags*mc)).toFixed(2);
}
calc();
</script>
</body>
</html>
