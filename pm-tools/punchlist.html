<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punch List</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.field input:focus,.field select:focus{outline:none;border-color:#ff6b35}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn:active{opacity:.8}
.progress-bar{width:100%;height:24px;background:#0f0f10;border-radius:12px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:#4ade80;transition:width .3s;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#000;font-weight:600}
.progress-text{font-size:.85rem;color:#999;margin-bottom:12px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select{padding:8px;font-size:.85rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.item{background:#0f0f10;border-radius:8px;padding:12px;margin-bottom:8px;border-left:4px solid #999}
.item.Critical{border-left-color:#ef4444}.item.Major{border-left-color:#f7c948}.item.Minor{border-left-color:#fbbf24}.item.Fixed,.item.Verified{border-left-color:#4ade80}
.item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap}
.item-title{font-weight:600;font-size:.95rem}
.item-meta{font-size:.8rem;color:#999;margin-top:4px}
.item-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.item-actions select{padding:6px;font-size:.8rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:4px;color:#e0e0e0}
.item-actions button{padding:6px 10px;font-size:.75rem;border:none;border-radius:4px;cursor:pointer}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.badge-critical{background:#ef4444;color:#fff}.badge-major{background:#f7c948;color:#000}.badge-minor{background:#fbbf24;color:#000}
.badge-open{background:#666;color:#fff}.badge-inprogress{background:#3b82f6;color:#fff}.badge-fixed{background:#4ade80;color:#000}.badge-verified{background:#10b981;color:#fff}
.check-col{margin-right:10px}
@media print{body{background:#fff;color:#000}.card{border-color:#ccc}.btn,.filters,.item-actions{display:none!important}.item{border-color:#000!important}}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Punch List</h1>
</div>

<div class="card">
<div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div>
<div class="progress-text" id="progressText">0 of 0 items complete</div>
</div>

<div class="card">
<h2 style="color:#ff6b35;font-size:.95rem;margin-bottom:12px">Add Item</h2>
<div class="row">
<div class="field"><label>Location</label><input type="text" id="addLoc" placeholder="Room / Area"></div>
<div class="field"><label>Assigned To</label><input type="text" id="addAssign"></div>
</div>
<div class="row">
<div class="field"><label>Description</label><input type="text" id="addDesc" placeholder="Describe the deficiency"></div>
</div>
<div class="row">
<div class="field"><label>Priority</label>
<select id="addPriority"><option>Critical</option><option>Major</option><option selected>Minor</option></select></div>
</div>
<button class="btn" onclick="addItem()">+ Add Item</button>
</div>

<div class="card">
<div class="filters">
<select id="fStatus" onchange="renderItems()"><option value="">All Status</option><option>Open</option><option>In Progress</option><option>Fixed</option><option>Verified</option></select>
<select id="fPriority" onchange="renderItems()"><option value="">All Priority</option><option>Critical</option><option>Major</option><option>Minor</option></select>
<select id="fLocation" onchange="renderItems()"><option value="">All Locations</option></select>
<select id="fAssign" onchange="renderItems()"><option value="">All Assignees</option></select>
<select id="sortBy" onchange="renderItems()"><option value="priority">Sort: Priority</option><option value="date">Sort: Date</option></select>
</div>
<button class="btn btn-sm btn-green" onclick="bulkFix()">Mark Selected as Fixed</button>
<button class="btn btn-sm" onclick="exportList()">Export</button>
<div id="itemList" style="margin-top:12px"></div>
</div>

<script>
let items=[];
function loadData(){items=JSON.parse(localStorage.getItem('punchlist-data')||'[]');}
function saveData(){localStorage.setItem('punchlist-data',JSON.stringify(items));}

function addItem(){
const loc=document.getElementById('addLoc').value.trim();
const desc=document.getElementById('addDesc').value.trim();
const pri=document.getElementById('addPriority').value;
const assign=document.getElementById('addAssign').value.trim();
if(!desc)return;
items.push({id:Date.now(),location:loc,description:desc,priority:pri,assignedTo:assign,status:'Open',date:new Date().toISOString().split('T')[0]});
document.getElementById('addDesc').value='';document.getElementById('addLoc').value='';document.getElementById('addAssign').value='';
saveData();renderItems();updateFilters();
}

function updateFilters(){
const locs=[...new Set(items.map(i=>i.location).filter(Boolean))];
const assigns=[...new Set(items.map(i=>i.assignedTo).filter(Boolean))];
const fLoc=document.getElementById('fLocation');
const fAs=document.getElementById('fAssign');
const lv=fLoc.value,av=fAs.value;
fLoc.innerHTML='<option value="">All Locations</option>'+locs.map(l=>`<option>${l}</option>`).join('');
fAs.innerHTML='<option value="">All Assignees</option>'+assigns.map(a=>`<option>${a}</option>`).join('');
fLoc.value=lv;fAs.value=av;
}

function getFiltered(){
let f=items.slice();
const st=document.getElementById('fStatus').value;
const pr=document.getElementById('fPriority').value;
const lo=document.getElementById('fLocation').value;
const as=document.getElementById('fAssign').value;
if(st)f=f.filter(i=>i.status===st);
if(pr)f=f.filter(i=>i.priority===pr);
if(lo)f=f.filter(i=>i.location===lo);
if(as)f=f.filter(i=>i.assignedTo===as);
const sort=document.getElementById('sortBy').value;
if(sort==='priority'){
const ord={Critical:0,Major:1,Minor:2};
f.sort((a,b)=>ord[a.priority]-ord[b.priority]);
}else{f.sort((a,b)=>b.date.localeCompare(a.date));}
return f;
}

function renderItems(){
const f=getFiltered();
const el=document.getElementById('itemList');
el.innerHTML=f.map(item=>{
const pCls=item.priority.toLowerCase();
const sCls=item.status.replace(' ','').toLowerCase();
return`<div class="item ${item.priority} ${item.status.replace(' ','')}">
<div class="item-header">
<div><input type="checkbox" class="check-col" data-id="${item.id}">
<span class="item-title">${item.description}</span>
<div class="item-meta">${item.location||'No location'} | ${item.assignedTo||'Unassigned'} | ${item.date}</div></div>
<div><span class="badge badge-${pCls}">${item.priority}</span> <span class="badge badge-${sCls}">${item.status}</span></div>
</div>
<div class="item-actions">
<select onchange="changeStatus(${item.id},this.value)">
<option${item.status==='Open'?' selected':''}>Open</option>
<option${item.status==='In Progress'?' selected':''}>In Progress</option>
<option${item.status==='Fixed'?' selected':''}>Fixed</option>
<option${item.status==='Verified'?' selected':''}>Verified</option>
</select>
<button style="background:#ef4444;color:#fff" onclick="removeItem(${item.id})">Delete</button>
</div></div>`;
}).join('');
updateProgress();
}

function changeStatus(id,status){
const item=items.find(i=>i.id===id);if(item)item.status=status;
saveData();renderItems();
}
function removeItem(id){items=items.filter(i=>i.id!==id);saveData();renderItems();updateFilters();}

function bulkFix(){
document.querySelectorAll('.check-col:checked').forEach(cb=>{
const id=parseInt(cb.dataset.id);
const item=items.find(i=>i.id===id);if(item)item.status='Fixed';
});
saveData();renderItems();
}

function updateProgress(){
const done=items.filter(i=>i.status==='Fixed'||i.status==='Verified').length;
const total=items.length;
const pct=total?Math.round(done/total*100):0;
document.getElementById('progressFill').style.width=pct+'%';
document.getElementById('progressFill').textContent=pct+'%';
document.getElementById('progressText').textContent=`${done} of ${total} items complete`;
}

function exportList(){
let t='PUNCH LIST\nDate: '+new Date().toLocaleDateString()+'\n\n';
const pOrd={Critical:0,Major:1,Minor:2};
const sorted=[...items].sort((a,b)=>pOrd[a.priority]-pOrd[b.priority]);
sorted.forEach(i=>{
t+=`[${i.status}] ${i.priority} - ${i.description}\n  Location: ${i.location||'N/A'} | Assigned: ${i.assignedTo||'N/A'}\n\n`;
});
const done=items.filter(i=>i.status==='Fixed'||i.status==='Verified').length;
t+=`\nSUMMARY: ${done}/${items.length} complete\n`;
navigator.clipboard.writeText(t).then(()=>alert('Copied!')).catch(()=>{});
}

loadData();updateFilters();renderItems();
</script>
</body>
</html>
