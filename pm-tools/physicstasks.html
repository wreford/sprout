<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Physics Tasks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f0f10;color:#f0f0f0;font-family:'Segoe Print','Comic Sans MS','Patrick Hand',cursive,system-ui;overflow:hidden;height:100vh;touch-action:none}
#topbar{position:fixed;top:0;left:0;right:0;height:44px;background:rgba(15,15,16,.95);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 12px;z-index:100;border-bottom:1px solid #2a2a2d}
#topbar a{color:#6e6e73;text-decoration:none;font-size:14px;margin-right:10px;transition:color .2s;font-family:system-ui}
#topbar a:hover{color:#f0f0f0}
#topbar h1{font-size:15px;font-weight:700;letter-spacing:1.5px;color:#f0f0f0;flex:1;font-family:system-ui}
.counts{font-size:11px;font-family:system-ui;color:#6e6e73;white-space:nowrap}
#bottombar{position:fixed;bottom:0;left:0;right:0;height:50px;background:rgba(15,15,16,.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;gap:4px;z-index:100;border-top:1px solid #2a2a2d;padding:0 4px;overflow-x:auto;scrollbar-width:none}

#bottombar button:hover{background:rgba(255,255,255,.12);color:#fff}
#bottombar button:active{background:rgba(255,255,255,.18);transform:scale(.93)}
#bottombar button.active{background:rgba(255,107,53,.2);border-color:rgba(255,107,53,.4);color:#ff6b35}
canvas{display:block;width:100%;height:100%}
#addform{position:fixed;bottom:50px;left:0;right:0;background:rgba(26,26,28,.98);border-top:1px solid #2a2a2d;padding:12px;z-index:110;transform:translateY(100%);transition:transform .25s ease}
#addform.open{transform:translateY(0)}
#addform .row{display:flex;gap:8px;margin-bottom:8px}
#addform input,#addform select{background:rgba(255,255,255,.06);border:1px solid #2a2a2d;color:#f0f0f0;padding:8px;border-radius:6px;font-size:14px;flex:1;font-family:system-ui}

#addform button{background:#ff6b35;border:none;color:#fff;padding:8px 16px;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600;font-family:system-ui}
#editOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center}

#editBox{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:12px;padding:20px;width:300px;font-family:system-ui}
#editBox input,#editBox select{width:100%;background:rgba(255,255,255,.06);border:1px solid #2a2a2d;color:#f0f0f0;padding:10px;border-radius:6px;font-size:14px;margin-bottom:10px}
#editBox .ebtn{display:flex;gap:8px;margin-top:4px}

#tutorial p{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:16px}
#tutorial button{background:#ff6b35;border:none;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
</style>
</head>
<body>

<div id="topbar"><a href="../index.html">&larr; home</a><h1>PHYSICS TASKS</h1><span class="counts" id="counts"></span></div>
<canvas id="c"></canvas>
<div id="bottombar">
<button id="btnAdd">+ Add</button>
<button id="btnLink">Link</button>
<button id="btnShake">Shake</button>
<button id="btnNuke">Nuke</button>
<button id="btnTornado">Tornado</button>
<button id="btnScatter">Scatter</button>
<button id="btnOrganize">Organize</button>
<button id="btnRelax">Relax</button>
<button id="btnFreeze">Freeze</button>
</div>
<div id="addform">
<div class="row"><input id="taskTitle" placeholder="Task title..." maxlength="80" autocomplete="off"></div>
<div class="row">
<input type="date" id="taskDue" title="Due date (optional)">
<select id="taskPriority"><option value="low">Low</option><option value="med" selected>Med</option><option value="high">High</option><option value="critical">Critical</option></select>
<button id="taskSubmit">Add</button>
</div></div>
<div id="editOverlay"><div id="editBox">
<input id="editTitle" maxlength="80" autocomplete="off" placeholder="Task name">
<input type="date" id="editDue" title="Due date">
<select id="editPriority"><option value="low">Low</option><option value="med">Med</option><option value="high">High</option><option value="critical">Critical</option></select>
<div class="ebtn"><button class="save" id="editSave">Save</button><button class="del" id="editDel">Delete</button><button class="cancel" id="editCancel">Cancel</button></div>
</div></div>
<div id="tutorial"><div><h2>Physics Tasks</h2><p>Tasks float in zero gravity!<br>Drag them anywhere you like.<br>Double-tap to edit, long-press to delete.<br>Use <b>Link</b> to connect tasks with rubber bands.<br>Tap a rubber band line to remove it.<br>Try Shake, Nuke, and Tornado for fun!</p><button id="tutClose">Got it!</button></div></div>

<script>
const C = document.getElementById('c'), X = C.getContext('2d');
const $ = id => document.getElementById(id);

// -- Theme colors --
const COLORS = {
  bg: '#0f0f10', bg2: '#1a1a1c', border: '#2a2a2d',
  text: '#f0f0f0', dim: '#6e6e73', accent: '#ff6b35', green: '#4ade80'
};

// Priority -> sticky note color
const PRI_COLORS = { low: '#a8e6cf', med: '#ffd93d', high: '#ffb6b9', critical: '#ff6b6b' };
const PRI_LABELS = { low: 'Low', med: 'Med', high: 'High', critical: 'Critical' };

// -- Physics constants --
const SPRING_K = 0.004;       // rubber band spring constant
const SPRING_DAMPING = 0.02;  // spring velocity damping
const REST_LENGTH = 140;      // natural rubber band length
const DAMPING = 0.985;        // global velocity damping (light friction in space)
const COLLISION_REST = 0.6;   // bounciness on collision
const TERM_V = 20;            // terminal velocity
const WALL_REST = 0.5;        // wall bounce
const TASK_W = 120, TASK_H = 80; // task sticky note size

let W, H, TOP = 44, BOT = 50, dpr = 1;
let tasks = [], links = [], parts = [];
let dragTask = null, dragOff = { x: 0, y: 0 }, lastM = { x: 0, y: 0 }, prevM = { x: 0, y: 0 };
let dragMoved = false, addFormOpen = false, editTask = null, lpTimer = null;
let frame = 0, frozenUntil = 0, tornadoUntil = 0, relaxUntil = 0;
let shake = { x: 0, y: 0 }, nukeFlash = 0;
let linkMode = false, linkFirst = null;

// -- Audio --
const AC = new (window.AudioContext || window.webkitAudioContext)();
function snd(type) {
  if (AC.state === 'suspended') AC.resume();
  const g = AC.createGain(), o = AC.createOscillator();
  g.connect(AC.destination); o.connect(g);
  const t = AC.currentTime, V = 0.02;
  const recipes = {
    pop: [600, 'sine', V, 0.08],
    tap: [250, 'triangle', V * 0.6, 0.04],
    thud: [60, 'sine', V, 0.2],
    rumble: [45, 'sawtooth', V, 0.35],
    link: [800, 'sine', V * 0.5, 0.1],
    unlink: [200, 'sine', V * 0.5, 0.15]
  };
  if (recipes[type]) {
    const [f, w, v, d] = recipes[type];
    o.frequency.value = f; o.type = w;
    g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.001, t + d);
    o.start(t); o.stop(t + d);
  } else if (type === 'shatter') {
    const n = AC.createBufferSource();
    const buf = AC.createBuffer(1, AC.sampleRate * 0.3, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.15));
    n.buffer = buf;
    const gn = AC.createGain();
    gn.gain.setValueAtTime(V, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    n.connect(gn); gn.connect(AC.destination); n.start(t);
  } else if (type === 'chime') {
    [523, 659, 784].forEach((f, i) => o.frequency.setValueAtTime(f, t + i * 0.08));
    o.type = 'sine';
    g.gain.setValueAtTime(V, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.start(t); o.stop(t + 0.5);
  } else if (type === 'whoosh') {
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(800, t + 0.15);
    o.type = 'sawtooth';
    g.gain.setValueAtTime(V * 0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.2);
  }
}

// -- Resize --
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  C.width = W * dpr; C.height = H * dpr;
  C.style.width = W + 'px'; C.style.height = H + 'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

// -- Task creation --
let idCounter = Date.now();
function mkTask(title, priority, x, y, due) {
  return {
    id: idCounter++,
    title: title,
    priority: priority || 'med',
    due: due || null,
    x: x != null ? x : W / 2 - TASK_W / 2,
    y: y != null ? y : H / 2 - TASK_H / 2,
    vx: 0, vy: 0,
    w: TASK_W, h: TASK_H,
    mass: 1,
    angle: (Math.random() - 0.5) * 0.15,
    angVel: 0,
    wobble: 0, wobbleV: 0
  };
}

function addTask(title, priority, due) {
  const spread = Math.min(W, H) * 0.3;
  const x = W / 2 - TASK_W / 2 + (Math.random() - 0.5) * spread;
  const y = H / 2 - TASK_H / 2 + (Math.random() - 0.5) * spread;
  const t = mkTask(title, priority,
    Math.max(4, Math.min(W - TASK_W - 4, x)),
    Math.max(TOP + 4, Math.min(H - BOT - TASK_H - 4, y)),
    due);
  t.vx = (Math.random() - 0.5) * 3;
  t.vy = (Math.random() - 0.5) * 3;
  tasks.push(t);
  snd('pop');
  save();
  return t;
}

function deleteTask(t) {
  spawnParts(t, 25, 'square');
  snd('shatter');
  // Remove any links involving this task
  links = links.filter(l => l.a !== t.id && l.b !== t.id);
  tasks = tasks.filter(tk => tk !== t);
  save();
}

function getTaskById(id) {
  return tasks.find(t => t.id === id);
}

function isOverdue(t) {
  if (!t.due) return false;
  const d = new Date(); d.setHours(0, 0, 0, 0);
  return new Date(t.due) < d;
}

function taskColor(t) {
  return PRI_COLORS[t.priority] || PRI_COLORS.med;
}

// -- Link management --
function addLink(a, b) {
  if (a === b) return;
  // Don't add duplicate
  if (links.some(l => (l.a === a && l.b === b) || (l.a === b && l.b === a))) return;
  links.push({ a, b });
  snd('link');
  save();
}

function removeLink(idx) {
  links.splice(idx, 1);
  snd('unlink');
  save();
}

// -- Particles --
function spawnParts(t, count, type) {
  const cx = t.x + t.w / 2, cy = t.y + t.h / 2;
  const col = taskColor(t);
  for (let i = 0; i < count; i++) {
    const spd = type === 'confetti' ? 14 : 8;
    parts.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * spd,
      vy: (Math.random() - 0.5) * spd,
      life: 1,
      color: type === 'confetti'
        ? ['#ef4444', '#f97316', '#ffd93d', '#4ade80', '#60a5fa', '#e879f9', '#fff'][Math.random() * 7 | 0]
        : col,
      size: 2 + Math.random() * 5,
      rot: Math.random() * 6.28,
      type: type || 'square',
      rs: (Math.random() - 0.5) * 0.3
    });
  }
}

function spawnExplosion(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 5 + Math.random() * 15;
    parts.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1.2,
      color: ['#ff6b35', '#ffd93d', '#ef4444', '#fff'][Math.random() * 4 | 0],
      size: 3 + Math.random() * 8,
      rot: Math.random() * 6.28,
      type: 'confetti',
      rs: (Math.random() - 0.5) * 0.4
    });
  }
}

// -- Physics --
function updatePhysics() {
  const now = Date.now();
  if (now < frozenUntil) return;

  for (const t of tasks) {
    if (t === dragTask) continue;

    // NO GRAVITY - tasks float freely

    // Rubber band spring forces from links
    for (const l of links) {
      let other = null;
      if (l.a === t.id) other = getTaskById(l.b);
      else if (l.b === t.id) other = getTaskById(l.a);
      if (!other || other === dragTask) {
        // If connected to dragged task, still apply force to this task
        if (other === dragTask) {
          const tcx = t.x + t.w / 2, tcy = t.y + t.h / 2;
          const ocx = other.x + other.w / 2, ocy = other.y + other.h / 2;
          const dx = ocx - tcx, dy = ocy - tcy;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const stretch = dist - REST_LENGTH;
          if (stretch > 0) {
            const force = SPRING_K * stretch;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            t.vx += fx; t.vy += fy;
          }
        }
        if (!other) continue;
        if (other !== dragTask) continue;
        continue;
      }
      const tcx = t.x + t.w / 2, tcy = t.y + t.h / 2;
      const ocx = other.x + other.w / 2, ocy = other.y + other.h / 2;
      const dx = ocx - tcx, dy = ocy - tcy;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const stretch = dist - REST_LENGTH;
      // Spring force (attract when stretched, push when compressed)
      const force = SPRING_K * stretch;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      t.vx += fx;
      t.vy += fy;
      // Spring damping (relative velocity along spring direction)
      const relVx = other.vx - t.vx, relVy = other.vy - t.vy;
      const relVn = (relVx * dx + relVy * dy) / dist;
      t.vx += (dx / dist) * relVn * SPRING_DAMPING;
      t.vy += (dy / dist) * relVn * SPRING_DAMPING;
    }

    // Relax mode: gently move connected tasks toward rest positions
    if (now < relaxUntil) {
      for (const l of links) {
        let other = null;
        if (l.a === t.id) other = getTaskById(l.b);
        else if (l.b === t.id) other = getTaskById(l.a);
        if (!other) continue;
        const tcx = t.x + t.w / 2, tcy = t.y + t.h / 2;
        const ocx = other.x + other.w / 2, ocy = other.y + other.h / 2;
        const dx = ocx - tcx, dy = ocy - tcy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const stretch = dist - REST_LENGTH;
        t.vx += (dx / dist) * stretch * 0.002;
        t.vy += (dy / dist) * stretch * 0.002;
      }
      // Extra damping during relax
      t.vx *= 0.95;
      t.vy *= 0.95;
    }

    // Tornado vortex
    if (now < tornadoUntil) {
      const cx = W / 2, cy = (TOP + H - BOT) / 2;
      const dx = cx - (t.x + t.w / 2), dy = cy - (t.y + t.h / 2);
      const d = Math.sqrt(dx * dx + dy * dy) + 1;
      t.vx += (-dy / d * 3.5 + dx / d * 0.4) * 0.08;
      t.vy += (dx / d * 3.5 + dy / d * 0.4) * 0.08;
      t.angVel += 0.008;
    }

    // Velocity limits + damping
    t.vx = Math.max(-TERM_V, Math.min(TERM_V, t.vx));
    t.vy = Math.max(-TERM_V, Math.min(TERM_V, t.vy));
    t.vx *= DAMPING;
    t.vy *= DAMPING;

    // Rotation physics
    t.angle += t.angVel;
    t.angVel *= 0.96;
    if (Math.abs(t.angVel) < 0.0005) t.angVel = 0;

    // Move
    t.x += t.vx;
    t.y += t.vy;

    // Wall bounces
    if (t.x < 0) { t.x = 0; t.vx *= -WALL_REST; t.angVel -= t.vy * 0.003; }
    if (t.x + t.w > W) { t.x = W - t.w; t.vx *= -WALL_REST; t.angVel += t.vy * 0.003; }
    if (t.y < TOP) { t.y = TOP; t.vy *= -WALL_REST; }
    if (t.y + t.h > H - BOT) { t.y = H - BOT - t.h; t.vy *= -WALL_REST; }

    // Wobble spring
    t.wobbleV += -t.wobble * 0.25;
    t.wobbleV *= 0.88;
    t.wobble += t.wobbleV;
    if (Math.abs(t.wobble) < 0.001 && Math.abs(t.wobbleV) < 0.001) { t.wobble = 0; t.wobbleV = 0; }
  }

  // Task-task collisions
  for (let i = 0; i < tasks.length; i++) {
    for (let j = i + 1; j < tasks.length; j++) {
      resolveCollision(tasks[i], tasks[j]);
    }
  }

  // Dragged task pushes others
  if (dragTask) {
    for (const t of tasks) {
      if (t === dragTask) continue;
      const ox = Math.min(dragTask.x + dragTask.w, t.x + t.w) - Math.max(dragTask.x, t.x);
      const oy = Math.min(dragTask.y + dragTask.h, t.y + t.h) - Math.max(dragTask.y, t.y);
      if (ox > 0 && oy > 0) {
        if (ox < oy) {
          const d = dragTask.x < t.x ? 1 : -1;
          t.x += d * ox; t.vx += d * 4; t.angVel += d * 0.03;
        } else {
          const d = dragTask.y < t.y ? 1 : -1;
          t.y += d * oy; t.vy += d * 4;
        }
      }
    }
  }

  // Update particles
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= 0.018;
    p.rot += p.rs || 0.1;
    if (p.life <= 0) parts.splice(i, 1);
  }

  // Shake decay
  shake.x *= 0.82; shake.y *= 0.82;
  if (Math.abs(shake.x) < 0.3) shake.x = 0;
  if (Math.abs(shake.y) < 0.3) shake.y = 0;
  if (nukeFlash > 0) nukeFlash -= 0.04;
}

function resolveCollision(a, b) {
  if (a === dragTask && b === dragTask) return;
  const ox = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
  const oy = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
  if (ox <= 0 || oy <= 0) return;

  const tm = a.mass + b.mass;
  const ar = (a === dragTask) ? 0 : b.mass / tm;
  const br = (b === dragTask) ? 0 : a.mass / tm;

  if (ox < oy) {
    const d = a.x < b.x ? -1 : 1;
    if (a !== dragTask) a.x += d * ox * ar;
    if (b !== dragTask) b.x -= d * ox * br;
    const rv = a.vx - b.vx;
    if (a !== dragTask) a.vx -= rv * ar * (1 + COLLISION_REST) * 0.5;
    if (b !== dragTask) b.vx += rv * br * (1 + COLLISION_REST) * 0.5;
    if (a !== dragTask) a.angVel += rv * 0.003;
    if (b !== dragTask) b.angVel -= rv * 0.003;
  } else {
    const d = a.y < b.y ? -1 : 1;
    if (a !== dragTask) a.y += d * oy * ar;
    if (b !== dragTask) b.y -= d * oy * br;
    const rv = a.vy - b.vy;
    if (a !== dragTask) a.vy -= rv * ar * (1 + COLLISION_REST) * 0.5;
    if (b !== dragTask) b.vy += rv * br * (1 + COLLISION_REST) * 0.5;
  }

  // Wobble on impact
  const iv = Math.abs(a.vx - b.vx) + Math.abs(a.vy - b.vy);
  if (iv > 2) {
    if (a !== dragTask) { a.wobble = 0; a.wobbleV = iv * 0.02; }
    if (b !== dragTask) { b.wobble = 0; b.wobbleV = iv * 0.02; }
  }
}

// -- Drawing --
function draw() {
  X.save();
  X.translate(shake.x, shake.y);
  X.clearRect(-20, -20, W + 40, H + 40);

  // Background: subtle dot grid
  X.fillStyle = 'rgba(255,255,255,0.015)';
  const gs = 40;
  for (let gx = gs; gx < W; gx += gs)
    for (let gy = TOP + gs; gy < H - BOT; gy += gs)
      X.fillRect(gx - 0.5, gy - 0.5, 1, 1);

  // Subtle floating particles in background
  const time = frame * 0.01;
  X.fillStyle = 'rgba(255,255,255,0.02)';
  for (let i = 0; i < 20; i++) {
    const bx = (Math.sin(time + i * 1.7) * 0.5 + 0.5) * W;
    const by = TOP + (Math.cos(time * 0.7 + i * 2.3) * 0.5 + 0.5) * (H - TOP - BOT);
    X.beginPath(); X.arc(bx, by, 1.5, 0, Math.PI * 2); X.fill();
  }

  // Draw rubber band connections
  drawLinks();

  // Draw tasks (dragged task on top)
  const drawOrder = dragTask ? [...tasks.filter(t => t !== dragTask), dragTask] : tasks;
  for (const t of drawOrder) {
    drawTask(t);
  }

  // Draw particles
  for (const p of parts) {
    X.save();
    X.globalAlpha = Math.max(0, p.life);
    X.fillStyle = p.color;
    X.translate(p.x, p.y);
    X.rotate(p.rot);
    if (p.type === 'confetti') {
      X.fillRect(-p.size / 2, -p.size * 0.3, p.size, p.size * 0.6);
    } else {
      X.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    }
    X.restore();
  }

  // Link mode indicator
  if (linkMode) {
    X.fillStyle = 'rgba(255,107,53,0.15)';
    X.fillRect(0, TOP, W, H - TOP - BOT);
    X.fillStyle = '#ff6b35';
    X.font = 'bold 16px system-ui';
    X.textAlign = 'center';
    X.textBaseline = 'top';
    X.fillText(linkFirst ? 'Tap second task to link' : 'Tap first task to link', W / 2, TOP + 12);
  }

  // Nuke flash
  if (nukeFlash > 0) {
    X.fillStyle = `rgba(255,200,100,${nukeFlash})`;
    X.fillRect(0, 0, W, H);
  }

  // Freeze overlay
  if (Date.now() < frozenUntil) {
    X.fillStyle = 'rgba(100,200,255,0.05)';
    X.fillRect(0, TOP, W, H - TOP - BOT);
    X.strokeStyle = 'rgba(100,200,255,0.12)';
    X.lineWidth = 1; X.setLineDash([6, 10]);
    for (let y = TOP; y < H - BOT; y += 50) {
      X.beginPath();
      X.moveTo(0, y + Math.sin(frame * 0.02 + y * 0.05) * 4);
      X.lineTo(W, y + Math.sin(frame * 0.02 + y * 0.05 + 2) * 4);
      X.stroke();
    }
    X.setLineDash([]);
  }

  X.restore();
}

function drawLinks() {
  for (let li = 0; li < links.length; li++) {
    const l = links[li];
    const ta = getTaskById(l.a), tb = getTaskById(l.b);
    if (!ta || !tb) continue;

    const ax = ta.x + ta.w / 2, ay = ta.y + ta.h / 2;
    const bx = tb.x + tb.w / 2, by = tb.y + tb.h / 2;
    const dx = bx - ax, dy = by - ay;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const stretch = Math.max(0, (dist - REST_LENGTH) / REST_LENGTH); // 0 = relaxed, 1+ = stretched

    // Color based on tension: green -> yellow -> red
    let r, g, b;
    if (stretch < 0.5) {
      // green to yellow
      const t = stretch / 0.5;
      r = Math.round(74 + (255 - 74) * t);
      g = Math.round(222 + (217 - 222) * t);
      b = Math.round(128 + (61 - 128) * t);
    } else {
      // yellow to red
      const t = Math.min(1, (stretch - 0.5) / 0.5);
      r = Math.round(255);
      g = Math.round(217 - 217 * t);
      b = Math.round(61 - 61 * t);
    }
    const color = `rgb(${r},${g},${b})`;

    // Line thickness: thin when relaxed, thick when taut
    const thickness = 1.5 + Math.min(4, stretch * 5);

    // Draw the rubber band as a wavy/catenary line
    X.strokeStyle = color;
    X.lineWidth = thickness;
    X.lineCap = 'round';

    // Calculate sag for the catenary effect (less sag when stretched)
    const sag = Math.max(0, (1 - stretch * 2)) * Math.min(40, dist * 0.15);
    const mx = (ax + bx) / 2, my = (ay + by) / 2;
    // Perpendicular direction for sag
    const px = -dy / dist, py = dx / dist;

    // Animate slight wobble
    const wobble = Math.sin(frame * 0.05 + li * 2.1) * (1 - Math.min(1, stretch)) * 5;

    X.beginPath();
    X.moveTo(ax, ay);
    X.quadraticCurveTo(
      mx + px * (sag + wobble),
      my + py * (sag + wobble),
      bx, by
    );
    X.stroke();

    // Draw small circles along the band to make it look elastic
    const numDots = Math.max(3, Math.min(8, Math.floor(dist / 30)));
    const dotSize = 2 + Math.min(1.5, stretch * 1.5);
    X.fillStyle = color;
    for (let i = 1; i < numDots; i++) {
      const t = i / numDots;
      // Point on quadratic bezier
      const qx = (1 - t) * (1 - t) * ax + 2 * (1 - t) * t * (mx + px * (sag + wobble)) + t * t * bx;
      const qy = (1 - t) * (1 - t) * ay + 2 * (1 - t) * t * (my + py * (sag + wobble)) + t * t * by;
      X.beginPath();
      X.arc(qx, qy, dotSize, 0, Math.PI * 2);
      X.fill();
    }

    // Glow effect for stretched bands
    if (stretch > 0.3) {
      X.save();
      X.globalAlpha = Math.min(0.3, stretch * 0.2);
      X.strokeStyle = color;
      X.lineWidth = thickness + 4;
      X.beginPath();
      X.moveTo(ax, ay);
      X.quadraticCurveTo(mx + px * (sag + wobble), my + py * (sag + wobble), bx, by);
      X.stroke();
      X.restore();
    }
  }
}

function drawTask(t) {
  X.save();
  const isDrag = t === dragTask;
  const col = taskColor(t);
  const cx = t.x + t.w / 2, cy = t.y + t.h / 2;
  const overdue = isOverdue(t);

  X.translate(cx, cy);
  if (isDrag) X.scale(1.06, 1.06);
  X.rotate(t.angle + t.wobble);
  X.translate(-cx, -cy);

  // Overdue glow/pulse
  if (overdue) {
    const pulse = 0.4 + Math.sin(frame * 0.08) * 0.2;
    X.shadowColor = '#ef4444';
    X.shadowBlur = 15 * pulse;
  }

  // Link mode highlight
  if (linkMode && linkFirst && linkFirst.id === t.id) {
    X.shadowColor = '#ff6b35';
    X.shadowBlur = 20;
  }

  // Drop shadow
  const sh = isDrag ? 10 : 5;
  X.fillStyle = `rgba(0,0,0,${isDrag ? 0.5 : 0.3})`;
  rr(X, t.x + sh, t.y + sh, t.w, t.h, 5);
  X.fill();

  // Sticky note body with gradient
  const bg = X.createLinearGradient(t.x, t.y, t.x, t.y + t.h);
  bg.addColorStop(0, lighten(col, 30));
  bg.addColorStop(0.5, col);
  bg.addColorStop(1, darken(col, 15));
  X.fillStyle = bg;
  rr(X, t.x, t.y, t.w, t.h, 5);
  X.fill();

  // Paper texture overlay
  const tg = X.createLinearGradient(t.x, t.y, t.x + t.w * 0.8, t.y + t.h);
  tg.addColorStop(0, 'rgba(255,255,255,0.15)');
  tg.addColorStop(0.5, 'rgba(255,255,255,0.04)');
  tg.addColorStop(1, 'rgba(0,0,0,0.06)');
  X.fillStyle = tg;
  rr(X, t.x, t.y, t.w, t.h, 5);
  X.fill();

  // Fold corner (top-right)
  const fs = Math.min(t.w, t.h) * 0.18;
  X.fillStyle = darken(col, 25);
  X.beginPath();
  X.moveTo(t.x + t.w - fs, t.y);
  X.lineTo(t.x + t.w, t.y + fs);
  X.lineTo(t.x + t.w, t.y);
  X.closePath(); X.fill();
  X.fillStyle = 'rgba(0,0,0,0.1)';
  X.beginPath();
  X.moveTo(t.x + t.w - fs, t.y);
  X.lineTo(t.x + t.w, t.y + fs);
  X.lineTo(t.x + t.w - fs * 0.5, t.y + fs * 0.5);
  X.closePath(); X.fill();

  // Border
  X.strokeStyle = 'rgba(0,0,0,0.08)';
  X.lineWidth = 0.5;
  rr(X, t.x, t.y, t.w, t.h, 5);
  X.stroke();

  X.shadowColor = 'transparent'; X.shadowBlur = 0;

  // Priority badge (top-left)
  const badgeColors = { low: '#2d8a56', med: '#b8860b', high: '#c0392b', critical: '#8b0000' };
  const bc = badgeColors[t.priority] || badgeColors.med;
  X.fillStyle = bc;
  X.font = 'bold 8px system-ui';
  X.textAlign = 'left'; X.textBaseline = 'top';
  const label = PRI_LABELS[t.priority] || 'Med';
  const lw = X.measureText(label).width + 6;
  rr(X, t.x + 4, t.y + 4, lw, 12, 3);
  X.fill();
  X.fillStyle = '#fff';
  X.fillText(label, t.x + 7, t.y + 6);

  // Due date (top-right area, below fold)
  if (t.due) {
    X.fillStyle = overdue ? 'rgba(200,0,0,0.9)' : 'rgba(0,0,0,0.4)';
    X.font = 'bold 8px system-ui';
    X.textAlign = 'right'; X.textBaseline = 'top';
    const dateStr = t.due.slice(5); // MM-DD
    X.fillText(dateStr, t.x + t.w - 5, t.y + fs + 2);
  }

  // Task title text
  X.fillStyle = 'rgba(0,0,0,0.8)';
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.font = `bold 11px 'Segoe Print','Comic Sans MS',cursive`;
  let txt = t.title;
  const mw = t.w - 14;
  if (X.measureText(txt).width > mw) {
    while (txt.length > 1 && X.measureText(txt + '..').width > mw) txt = txt.slice(0, -1);
    txt += '..';
  }
  // Wrap text if needed
  const words = t.title.split(' ');
  let lines = [];
  let currentLine = '';
  for (const word of words) {
    const test = currentLine ? currentLine + ' ' + word : word;
    if (X.measureText(test).width > mw && currentLine) {
      lines.push(currentLine);
      currentLine = word;
    } else {
      currentLine = test;
    }
  }
  if (currentLine) lines.push(currentLine);
  // Truncate each line
  lines = lines.slice(0, 2).map(line => {
    if (X.measureText(line).width > mw) {
      while (line.length > 1 && X.measureText(line + '..').width > mw) line = line.slice(0, -1);
      line += '..';
    }
    return line;
  });
  const lineH = 14;
  const textY = cy + 4;
  const startY = textY - ((lines.length - 1) * lineH) / 2;
  for (let i = 0; i < lines.length; i++) {
    X.fillText(lines[i], cx, startY + i * lineH);
  }

  // Overdue indicator: pulsing red border
  if (overdue) {
    const pulse = 0.3 + Math.sin(frame * 0.08) * 0.15;
    X.strokeStyle = `rgba(239,68,68,${pulse})`;
    X.lineWidth = 2;
    rr(X, t.x - 1, t.y - 1, t.w + 2, t.h + 2, 6);
    X.stroke();
  }

  X.restore();
}

// -- Utility drawing --
function rr(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r); c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h); c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r); c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y); c.closePath();
}

function lighten(hex, p) {
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${Math.min(255, (n >> 16 & 255) + p)},${Math.min(255, (n >> 8 & 255) + p)},${Math.min(255, (n & 255) + p)})`;
}

function darken(hex, p) {
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${Math.max(0, (n >> 16 & 255) - p)},${Math.max(0, (n >> 8 & 255) - p)},${Math.max(0, (n & 255) - p)})`;
}

function updateCounts() {
  $('counts').textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''} / ${links.length} link${links.length !== 1 ? 's' : ''}`;
}

// -- Hit testing --
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

function hitTask(x, y) {
  for (let i = tasks.length - 1; i >= 0; i--) {
    const t = tasks[i];
    if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) return t;
  }
  return null;
}

function hitLink(x, y) {
  // Check if click is near any rubber band line
  for (let li = 0; li < links.length; li++) {
    const l = links[li];
    const ta = getTaskById(l.a), tb = getTaskById(l.b);
    if (!ta || !tb) continue;
    const ax = ta.x + ta.w / 2, ay = ta.y + ta.h / 2;
    const bx = tb.x + tb.w / 2, by = tb.y + tb.h / 2;
    // Point-to-line-segment distance
    const dist = pointToSegDist(x, y, ax, ay, bx, by);
    if (dist < 12) return li;
  }
  return -1;
}

function pointToSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.sqrt((px - ax) ** 2 + (py - ay) ** 2);
  let t = ((px - ax) * dx + (py - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const nearX = ax + t * dx, nearY = ay + t * dy;
  return Math.sqrt((px - nearX) ** 2 + (py - nearY) ** 2);
}

// -- Input handling --
let lastTapTask = null, lastTapTime = 0;

function handleDown(pos) {
  const now = Date.now();
  const t = hitTask(pos.x, pos.y);

  // Double-tap detection
  if (t && t === lastTapTask && now - lastTapTime < 400) {
    openEdit(t);
    lastTapTask = null;
    return true;
  }
  lastTapTime = now;

  // Link mode: tap tasks to link
  if (linkMode) {
    if (t) {
      if (!linkFirst) {
        linkFirst = t;
      } else {
        addLink(linkFirst.id, t.id);
        linkFirst = null;
        linkMode = false;
        $('btnLink').classList.remove('active');
      }
    } else {
      // Tapped empty space, cancel link mode
      linkMode = false; linkFirst = null;
      $('btnLink').classList.remove('active');
    }
    return true;
  }

  // Tap on a rubber band to remove it
  if (!t) {
    const li = hitLink(pos.x, pos.y);
    if (li >= 0) {
      removeLink(li);
      return true;
    }
  }

  return false;
}

function startDrag(e) {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  const p = getPos(e);
  if (handleDown(p)) return;
  const t = hitTask(p.x, p.y);
  if (!t) return;
  dragTask = t; dragMoved = false;
  t.vx = 0; t.vy = 0; t.angVel = 0;
  dragOff.x = p.x - t.x; dragOff.y = p.y - t.y;
  lastM = { x: p.x, y: p.y, t: Date.now() };
  prevM = { ...lastM };
  // Move to top of render order
  tasks = tasks.filter(tk => tk !== t); tasks.push(t);
  // Long press to delete
  lpTimer = setTimeout(() => {
    if (dragTask === t && !dragMoved) { deleteTask(t); dragTask = null; }
  }, 800);
}

function moveDrag(e) {
  if (!dragTask) return; e.preventDefault();
  const p = getPos(e);
  if (Math.abs(p.x - lastM.x) > 3 || Math.abs(p.y - lastM.y) > 3) dragMoved = true;
  prevM = { ...lastM };
  lastM = { x: p.x, y: p.y, t: Date.now() };
  dragTask.x = Math.max(0, Math.min(W - dragTask.w, p.x - dragOff.x));
  dragTask.y = Math.max(TOP, Math.min(H - BOT - dragTask.h, p.y - dragOff.y));
  dragTask.angVel += (p.x - prevM.x) * 0.0008;
  if (lpTimer && dragMoved) { clearTimeout(lpTimer); lpTimer = null; }
}

function endDrag() {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  if (!dragTask) return;
  const dt = Math.max(1, Date.now() - prevM.t);
  const vs = Math.min(1, 16 / dt);
  dragTask.vx = Math.max(-TERM_V, Math.min(TERM_V, (lastM.x - prevM.x) * vs * 1.3));
  dragTask.vy = Math.max(-TERM_V, Math.min(TERM_V, (lastM.y - prevM.y) * vs * 1.3));
  const spd = Math.sqrt(dragTask.vx ** 2 + dragTask.vy ** 2);
  snd(spd > 8 ? 'whoosh' : 'thud');
  const rel = dragTask;
  dragTask = null;
  save();
  if (!dragMoved) lastTapTask = rel;
}

C.addEventListener('mousedown', startDrag);
C.addEventListener('mousemove', moveDrag);
C.addEventListener('mouseup', endDrag);
C.addEventListener('mouseleave', endDrag);
C.addEventListener('touchstart', startDrag, { passive: false });
C.addEventListener('touchmove', moveDrag, { passive: false });
C.addEventListener('touchend', endDrag);
C.addEventListener('dblclick', e => { const t = hitTask(e.clientX, e.clientY); if (t) openEdit(t); });
C.addEventListener('contextmenu', e => { e.preventDefault(); const t = hitTask(e.clientX, e.clientY); if (t) deleteTask(t); });

// -- Edit overlay --
function openEdit(t) {
  editTask = t;
  $('editTitle').value = t.title;
  $('editDue').value = t.due || '';
  $('editPriority').value = t.priority;
  $('editOverlay').classList.add('open');
  setTimeout(() => $('editTitle').focus(), 50);
}

$('editSave').onclick = () => {
  if (editTask) {
    editTask.title = $('editTitle').value.trim() || editTask.title;
    editTask.due = $('editDue').value || null;
    editTask.priority = $('editPriority').value;
    save();
  }
  $('editOverlay').classList.remove('open'); editTask = null;
};
$('editDel').onclick = () => {
  if (editTask) deleteTask(editTask);
  $('editOverlay').classList.remove('open'); editTask = null;
};
$('editCancel').onclick = () => { $('editOverlay').classList.remove('open'); editTask = null; };
$('editTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('editSave').click();
  if (e.key === 'Escape') $('editCancel').click();
});
$('editOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) $('editCancel').click(); });

// -- Add form --
$('btnAdd').onclick = () => {
  addFormOpen = !addFormOpen;
  $('addform').classList.toggle('open', addFormOpen);
  if (addFormOpen) setTimeout(() => $('taskTitle').focus(), 100);
};
$('taskSubmit').onclick = () => {

  addTask(t, $('taskPriority').value, $('taskDue').value || null);
  $('taskTitle').value = ''; $('taskDue').value = '';

};
$('taskTitle').addEventListener('keydown', e => {

});

// -- Action buttons --

// Link mode
$('btnLink').onclick = () => {
  linkMode = !linkMode;
  linkFirst = null;
  $('btnLink').classList.toggle('active', linkMode);
};

// Shake: random velocity to all tasks
$('btnShake').onclick = () => {
  tasks.forEach(t => {
    t.vx += (Math.random() - 0.5) * 16;
    t.vy += (Math.random() - 0.5) * 16;
    t.angVel += (Math.random() - 0.5) * 0.2;
  });
  shake.x = 12; shake.y = 8;
  snd('rumble');
};

// Nuke: explosion from center
$('btnNuke').onclick = () => {
  const cx = W / 2, cy = (TOP + H - BOT) / 2;
  tasks.forEach(t => {
    const dx = (t.x + t.w / 2) - cx, dy = (t.y + t.h / 2) - cy;
    const d = Math.sqrt(dx * dx + dy * dy) + 1;
    t.vx += (dx / d) * 22;
    t.vy += (dy / d) * 22;
    t.angVel += (Math.random() - 0.5) * 0.5;
    spawnParts(t, 10, 'square');
  });
  spawnExplosion(cx, cy, 60);
  nukeFlash = 0.7; shake.x = 25; shake.y = 20;
  snd('shatter');
};

// Tornado: circular force
$('btnTornado').onclick = () => {
  tornadoUntil = Date.now() + 3000;
  snd('rumble');
};

// Scatter: random positions
$('btnScatter').onclick = () => {
  tasks.forEach(t => {
    t.x = 10 + Math.random() * (W - t.w - 20);
    t.y = TOP + 10 + Math.random() * (H - TOP - BOT - t.h - 20);
    t.vx = (Math.random() - 0.5) * 6;
    t.vy = (Math.random() - 0.5) * 6;
    t.angVel = (Math.random() - 0.5) * 0.15;
  });
  snd('pop');
  save();
};

// Organize: auto-arrange in grid
$('btnOrganize').onclick = () => {
  snd('chime');
  const pad = 16;
  const cols = Math.max(1, Math.floor((W - pad) / (TASK_W + pad)));
  const startX = (W - cols * (TASK_W + pad) + pad) / 2;
  const startY = TOP + pad + 20;
  tasks.forEach((t, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const targetX = startX + col * (TASK_W + pad);
    const targetY = startY + row * (TASK_H + pad);
    // Apply impulse toward target
    t.vx = (targetX - t.x) * 0.1;
    t.vy = (targetY - t.y) * 0.1;
    t.angVel = -t.angle * 0.2;
  });
};

// Relax: bring connected tasks to rest positions
$('btnRelax').onclick = () => {
  relaxUntil = Date.now() + 3000;
  snd('chime');
};

// Freeze: stop all motion
$('btnFreeze').onclick = () => {
  frozenUntil = Date.now() + 3000;
  tasks.forEach(t => { t.vx = 0; t.vy = 0; t.angVel = 0; });
  snd('tap');
};

// -- Persistence --
function save() {
  const data = {
    tasks: tasks.map(t => ({
      id: t.id, title: t.title, priority: t.priority, due: t.due,
      x: t.x, y: t.y, angle: t.angle
    })),
    links: links.map(l => ({ a: l.a, b: l.b }))
  };
  try { localStorage.setItem('physicstasks-data', JSON.stringify(data)); } catch (e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('physicstasks-data');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.tasks && Array.isArray(data.tasks)) {
      tasks = data.tasks.map(s => {
        const t = mkTask(s.title, s.priority, s.x, s.y, s.due);
        t.id = s.id;
        t.angle = s.angle || (Math.random() - 0.5) * 0.15;
        return t;
      });
      // Ensure idCounter is higher than any loaded id
      for (const t of tasks) if (t.id >= idCounter) idCounter = t.id + 1;
    }
    if (data.links && Array.isArray(data.links)) {
      links = data.links;
    }
  } catch (e) {}
}

load();

// -- Main loop --
let lastSave = 0;
function loop() {
  frame++;
  updatePhysics();
  draw();
  updateCounts();
  if (Date.now() - lastSave > 3000) { save(); lastSave = Date.now(); }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
