<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Crokinole Score Keeper</title><style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a0b;--bg2:#141416;--bg3:#1e1e21;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--gold:#fbbf24;--red:#ef4444;--blue:#3b82f6;--green:#4ade80;--wood:#3d2b1f;--woodlt:#6b4c35}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;margin:0;overflow:hidden;height:100dvh;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
a.home{color:var(--accent);text-decoration:none;font-size:13px;padding:8px 12px;display:inline-block}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}.screen.active{display:flex}
/* Setup */
#setup{padding:16px;justify-content:center;align-items:center;gap:16px}
#setup h1{font-size:1.6em;text-align:center;letter-spacing:1px}
.setup-board{width:80px;height:80px;margin:0 auto}
.setup-group{width:100%;max-width:360px}
.setup-group label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px;margin-top:12px}
.setup-group input,.setup-group select{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px}
.mode-toggle{display:flex;gap:8px;margin-top:8px}
.mode-toggle button{flex:1;padding:10px;background:var(--bg2);border:2px solid var(--border);border-radius:8px;color:var(--dim);font-size:14px;font-weight:600;transition:all .2s}
.mode-toggle button.sel{border-color:var(--accent);color:var(--accent);background:#ff6b3515}
.btn-start{width:100%;max-width:360px;padding:14px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;border-radius:10px;margin-top:16px;letter-spacing:.5px}
.btn-start:active{transform:scale(.97)}
/* Game */
#game{padding:0}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:44px}
.top-bar .round-label{font-size:13px;color:var(--dim)}
.top-bar .round-num{font-weight:700;color:var(--accent)}
.top-actions{display:flex;gap:6px}
.top-actions button{padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:12px}
.top-actions button:active{background:var(--border)}
/* Scores header */
.scores-header{display:flex;justify-content:space-between;padding:8px 16px;background:var(--bg)}
.score-col{text-align:center;flex:1}
.score-col .name{font-size:16px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-col.left .name{color:var(--red)}
.score-col.right .name{color:var(--blue)}
.score-col .total{font-size:2.4em;font-weight:900;line-height:1.1}
.vs-label{font-size:12px;color:var(--dim);align-self:center;padding:0 4px}
.score-col.left .total{color:var(--red)}
.score-col.right .total{color:var(--blue)}
.progress-row{display:flex;gap:4px;padding:0 16px 8px;height:10px}
.progress-row .bar{flex:1;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.progress-row .bar .fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar.left .fill{background:var(--red)}
.bar.right .fill{background:var(--blue)}
/* Board + controls area */
.game-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.board-area{flex:0 0 auto;display:flex;justify-content:center;padding:4px 0 2px;position:relative}
.board-svg{width:min(40vw,160px);height:min(40vw,160px)}
/* Disc counters */
.disc-area{flex:1;display:flex;gap:8px;padding:4px 8px;min-height:0;overflow:hidden}
.disc-col{flex:1;display:flex;flex-direction:column;gap:6px;justify-content:center;align-items:center}
.disc-col .col-label{font-size:13px;font-weight:700;text-align:center}
.disc-col.left .col-label{color:var(--red)}
.disc-col.right .col-label{color:var(--blue)}
.disc-col .col-total{font-size:1.6em;font-weight:800}
.disc-col.left .col-total{color:var(--red)}
.disc-col.right .col-total{color:var(--blue)}
.disc-btns{display:flex;flex-direction:column;gap:5px;width:100%}
.disc-btn{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;font-weight:700;font-size:15px;color:#fff;min-height:44px;transition:transform .1s}
.disc-btn:active{transform:scale(.95)}
.disc-btn .pts{opacity:.85;font-size:13px}.disc-btn .cnt{font-size:1.2em;min-width:24px;text-align:center;background:rgba(0,0,0,.3);border-radius:6px;padding:2px 8px}
.db-20{background:linear-gradient(135deg,#b8860b,#daa520)}.db-15{background:linear-gradient(135deg,#b91c1c,#dc2626)}.db-10{background:linear-gradient(135deg,#1d4ed8,#2563eb)}.db-5{background:linear-gradient(135deg,#15803d,#22c55e)}
/* Score round button */
.score-round-row{padding:8px 12px;display:flex;gap:8px}
.btn-score{flex:1;padding:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border-radius:10px;letter-spacing:.3px}
.btn-score:active{transform:scale(.97)}
.btn-undo{padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--dim);font-size:14px}
.btn-undo:active{background:var(--border)}
/* History panel */
.history-toggle{text-align:center;padding:4px}
.history-toggle button{background:none;color:var(--dim);font-size:12px;border:none;padding:4px 12px}
.history-panel{background:var(--bg2);border-top:1px solid var(--border);overflow-y:auto;max-height:0;transition:max-height .3s ease}
.history-panel.open{max-height:40vh}
.history-item{padding:8px 16px;font-size:13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.history-item .hi-round{color:var(--dim)}.history-item .hi-detail{color:var(--text)}.history-item .hi-result{font-weight:600}
.hi-result.pos-left{color:var(--red)}.hi-result.pos-right{color:var(--blue)}.hi-result.tie{color:var(--dim)}
/* Win screen */
#win{justify-content:center;align-items:center;gap:20px;padding:24px}
#win h2{font-size:2em;text-align:center}#win .winner-name{color:var(--accent);font-size:2.4em;font-weight:900}
#win .final-score{font-size:1.2em;color:var(--dim)}
.btn-new{padding:14px 32px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;border-radius:10px}
.btn-stats{padding:10px 24px;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:14px;border-radius:8px}
#winCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
/* Stats overlay */
.stats-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:20;display:none;justify-content:center;align-items:center}
.stats-overlay.open{display:flex}
.stats-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:340px}
.stats-box h3{margin-bottom:12px}.stats-box p{font-size:14px;color:var(--dim);margin:6px 0}.stats-box b{color:var(--text)}
.stats-box button{margin-top:12px;width:100%;padding:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;border-radius:8px}
</style></head><body>
<canvas id="winCanvas" width="400" height="800"></canvas>

<!-- SETUP SCREEN -->
<div id="setup" class="screen active">
<a class="home" href="../index.html">&larr; home</a>
<svg class="setup-board" viewBox="0 0 200 200"><circle cx="100" cy="100" r="95" fill="#3d2b1f"/><circle cx="100" cy="100" r="80" fill="none" stroke="#6b4c35" stroke-width="1.5"/><circle cx="100" cy="100" r="60" fill="none" stroke="#6b4c35" stroke-width="1.5"/><circle cx="100" cy="100" r="40" fill="none" stroke="#6b4c35" stroke-width="1.5"/><circle cx="100" cy="100" r="12" fill="#1a1a1c" stroke="#daa520" stroke-width="2"/><text x="100" y="106" text-anchor="middle" fill="#daa520" font-size="12" font-weight="700">20</text></svg>
<h1>Crokinole</h1>
<div class="setup-group">
<label>Game Mode</label>
<div class="mode-toggle"><button class="sel" onclick="setMode(2,this)">2 Players</button><button onclick="setMode(4,this)">2 Teams (4p)</button></div>
<label>Player / Team 1</label><input id="name1" value="Red" maxlength="16">
<label>Player / Team 2</label><input id="name2" value="Blue" maxlength="16">
<label>Target Score</label>
<select id="target"><option value="50">50</option><option value="100" selected>100</option><option value="150">150</option></select>
</div>
<button class="btn-start" onclick="startGame()">Start Game</button>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
<div class="top-bar">
<a class="home" href="../index.html" style="padding:0;font-size:12px">&larr;</a>
<span class="round-label">Round <span class="round-num" id="roundNum">1</span></span>
<div class="top-actions"><button onclick="toggleHistory()">Log</button><button onclick="showStats()">Stats</button><button onclick="confirmNew()">New</button></div>
</div>
<div class="scores-header">
<div class="score-col left"><div class="name" id="gName1">Red</div><div class="total" id="gScore1">0</div></div>
<div style="color:var(--dim);font-size:13px;align-self:center">vs</div>
<div class="score-col right"><div class="name" id="gName2">Blue</div><div class="total" id="gScore2">0</div></div>
</div>
<div class="progress-row"><div class="bar left"><div class="fill" id="prog1" style="width:0%"></div></div><div class="bar right"><div class="fill" id="prog2" style="width:0%"></div></div></div>
<div class="game-body">
<div class="board-area"><svg class="board-svg" id="boardSvg" viewBox="0 0 200 200"></svg></div>
<div class="disc-area">
<div class="disc-col left">
<div class="col-label" id="dLabel1">Red</div>
<div class="col-total" id="dTotal1">0</div>
<div class="disc-btns">
<button class="disc-btn db-20" onpointerdown="discDown(0,20)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">20</span><span class="cnt" id="d0_20">0</span></button>
<button class="disc-btn db-15" onpointerdown="discDown(0,15)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">15</span><span class="cnt" id="d0_15">0</span></button>
<button class="disc-btn db-10" onpointerdown="discDown(0,10)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">10</span><span class="cnt" id="d0_10">0</span></button>
<button class="disc-btn db-5" onpointerdown="discDown(0,5)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">5</span><span class="cnt" id="d0_5">0</span></button>
</div>
</div>
<div class="disc-col right">
<div class="col-label" id="dLabel2">Blue</div>
<div class="col-total" id="dTotal2">0</div>
<div class="disc-btns">
<button class="disc-btn db-20" onpointerdown="discDown(1,20)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">20</span><span class="cnt" id="d1_20">0</span></button>
<button class="disc-btn db-15" onpointerdown="discDown(1,15)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">15</span><span class="cnt" id="d1_15">0</span></button>
<button class="disc-btn db-10" onpointerdown="discDown(1,10)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">10</span><span class="cnt" id="d1_10">0</span></button>
<button class="disc-btn db-5" onpointerdown="discDown(1,5)" onpointerup="discUp()" onpointerleave="discUp()"><span class="pts">5</span><span class="cnt" id="d1_5">0</span></button>
</div>
</div>
</div>
<div class="score-round-row">
<button class="btn-undo" onclick="undoRound()">&#8630;</button>
<button class="btn-score" onclick="scoreRound()">Score Round</button>
</div>
<div class="history-toggle"><button onclick="toggleHistory()">&#9660; Round History</button></div>
<div class="history-panel" id="histPanel"></div>
</div>
</div>

<!-- WIN SCREEN -->
<div id="win" class="screen">
<h2>Game Over</h2>
<div class="winner-name" id="winnerName">Red</div>
<div class="final-score" id="finalScore">100 - 60</div>
<button class="btn-new" onclick="resetToSetup()">New Game</button>
<button class="btn-stats" onclick="showStats()">View Stats</button>
</div>

<!-- Stats Overlay -->
<div class="stats-overlay" id="statsOverlay">
<div class="stats-box">
<h3>Stats</h3>
<p>Games played: <b id="stGames">0</b></p>
<p id="stWinsRow"></p>
<button onclick="closeStats()">Close</button>
</div>
</div>

<script>
// --- State ---
let G={mode:2,names:['Red','Blue'],target:100,scores:[0,0],round:1,history:[],discs:[[0,0,0,0],[0,0,0,0]],done:false};
const PTS=[20,15,10,5],RINGS=[{r:12,c:'#daa520'},{r:40,c:'#ef4444'},{r:60,c:'#3b82f6'},{r:80,c:'#22c55e'}];
let holdTimer=null,holdFired=false;

// --- Audio ---
const AudioCtx=window.AudioContext||window.webkitAudioContext;let actx=null;
function ensureAudio(){if(!actx)actx=new AudioCtx();if(actx.state==='suspended')actx.resume()}
function playTap(){ensureAudio();const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(400,t+.06);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.08)}
function playRemove(){ensureAudio();const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;o.type='sine';o.frequency.setValueAtTime(300,t);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.06)}
function playChime(){ensureAudio();[523,659,784].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime+i*.1;o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.3)})}
function playWin(){ensureAudio();[523,587,659,698,784,880,988,1047].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime+i*.08;o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.connect(g);g.connect(actx.destination);o.start(t);o.stop(t+.25)})}

// --- Setup ---
function setMode(m,btn){G.mode=m;document.querySelectorAll('.mode-toggle button').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel')}
function startGame(){G.names=[document.getElementById('name1').value||'Red',document.getElementById('name2').value||'Blue'];G.target=+document.getElementById('target').value;G.scores=[0,0];G.round=1;G.history=[];G.discs=[[0,0,0,0],[0,0,0,0]];G.done=false;showScreen('game');renderGame();saveState()}

// --- Screens ---
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// --- Board SVG ---
function drawBoard(){
const svg=document.getElementById('boardSvg');
let h=`<circle cx="100" cy="100" r="98" fill="#3d2b1f" stroke="#6b4c35" stroke-width="1"/>`;
h+=`<circle cx="100" cy="100" r="80" fill="none" stroke="#22c55e44" stroke-width="1.5"/>`;
h+=`<circle cx="100" cy="100" r="60" fill="none" stroke="#3b82f644" stroke-width="1.5"/>`;
h+=`<circle cx="100" cy="100" r="40" fill="none" stroke="#ef444444" stroke-width="1.5"/>`;
h+=`<circle cx="100" cy="100" r="12" fill="#1a1a1c" stroke="#daa520" stroke-width="2"/>`;
// Lines
for(let a=0;a<360;a+=45){const r=Math.PI*a/180;h+=`<line x1="${100+14*Math.cos(r)}" y1="${100+14*Math.sin(r)}" x2="${100+96*Math.cos(r)}" y2="${100+96*Math.sin(r)}" stroke="#6b4c3530" stroke-width=".5"/>`}
// Discs visualization
const colors=['#ef4444','#3b82f6'];
for(let p=0;p<2;p++){
  const offsetA=p===0?-1:1;
  for(let z=0;z<4;z++){
    const cnt=G.discs[p][z],ringR=RINGS[z].r;
    for(let d=0;d<cnt;d++){
      const angle=(Math.PI*2/Math.max(cnt,1))*d+(p*Math.PI/6)+offsetA*0.15;
      const px=100+(ringR-6)*Math.cos(angle),py=100+(ringR-6)*Math.sin(angle);
      h+=`<circle cx="${px}" cy="${py}" r="4" fill="${colors[p]}" opacity=".8" stroke="#000" stroke-width=".5"/>`;
    }
  }
}
// Ring tap targets (transparent)
h+=`<circle cx="100" cy="100" r="12" fill="transparent" style="cursor:pointer" onclick="boardTap(20)"/>`;
h+=`<path d="M100,60 A40,40,0,1,1,99.99,60 L99.99,72 A28,28,0,1,0,100,72 Z" fill="transparent" style="cursor:pointer" onclick="boardTap(15)"/>`;
h+=`<path d="M100,40 A60,60,0,1,1,99.99,40 L99.99,60 A40,40,0,1,0,100,60 Z" fill="transparent" style="cursor:pointer" onclick="boardTap(10)"/>`;
h+=`<path d="M100,20 A80,80,0,1,1,99.99,20 L99.99,40 A60,60,0,1,0,100,40 Z" fill="transparent" style="cursor:pointer" onclick="boardTap(5)"/>`;
svg.innerHTML=h;
}
let boardPlayer=0;
function boardTap(pts){addDisc(boardPlayer,pts);boardPlayer=1-boardPlayer}

// --- Disc controls ---
function addDisc(player,pts){const idx=PTS.indexOf(pts);if(idx<0)return;const total=G.discs[player].reduce((a,b)=>a+b,0);if(total>=12)return;G.discs[player][idx]++;playTap();renderDiscs();drawBoard();saveState()}
function removeDisc(player,pts){const idx=PTS.indexOf(pts);if(idx<0||G.discs[player][idx]<=0)return;G.discs[player][idx]--;playRemove();renderDiscs();drawBoard();saveState()}

let pendingDisc=null;
function discDown(player,pts){holdFired=false;pendingDisc={player,pts};holdTimer=setTimeout(()=>{holdFired=true;pendingDisc=null;removeDisc(player,pts)},400)}
function discUp(){clearTimeout(holdTimer);if(!holdFired&&pendingDisc){addDisc(pendingDisc.player,pendingDisc.pts)}pendingDisc=null;}

// --- Render ---
function renderGame(){
  document.getElementById('gName1').textContent=G.names[0];
  document.getElementById('gName2').textContent=G.names[1];
  document.getElementById('dLabel1').textContent=G.names[0];
  document.getElementById('dLabel2').textContent=G.names[1];
  renderScores();renderDiscs();drawBoard();renderHistory();
}
function renderScores(){
  document.getElementById('gScore1').textContent=G.scores[0];
  document.getElementById('gScore2').textContent=G.scores[1];
  document.getElementById('roundNum').textContent=G.round;
  document.getElementById('prog1').style.width=Math.min(100,G.scores[0]/G.target*100)+'%';
  document.getElementById('prog2').style.width=Math.min(100,G.scores[1]/G.target*100)+'%';
}
function renderDiscs(){
  for(let p=0;p<2;p++){
    let t=0;
    for(let z=0;z<4;z++){
      document.getElementById(`d${p}_${PTS[z]}`).textContent=G.discs[p][z];
      t+=G.discs[p][z]*PTS[z];
    }
    document.getElementById(`dTotal${p+1}`).textContent=t;
  }
}
function renderHistory(){
  const panel=document.getElementById('histPanel');
  if(!G.history.length){panel.innerHTML='<div style="padding:12px;text-align:center;color:var(--dim);font-size:13px">No rounds yet</div>';return}
  panel.innerHTML=G.history.map((h,i)=>{
    const cls=h.delta>0?'pos-left':h.delta<0?'pos-right':'tie';
    const net0=h.delta>0?h.delta:0, net1=h.delta<0?-h.delta:0;
    const o20=h.open20s?` (20s: ${h.open20s[0]}/${h.open20s[1]})`:'';
    const res=h.delta>0?`${G.names[0]} +${net0+(h.open20s?h.open20s[0]*20:0)}`:h.delta<0?`${G.names[1]} +${net1+(h.open20s?h.open20s[1]*20:0)}`:'Tie';
    return`<div class="history-item"><span class="hi-round">R${i+1}</span><span class="hi-detail">${h.raw[0]} - ${h.raw[1]}${o20}</span><span class="hi-result ${cls}">${res}</span></div>`;
  }).join('');
}
function toggleHistory(){document.getElementById('histPanel').classList.toggle('open')}

// --- Score Round (Ontario/NCA rules) ---
// Open 20s (center hole) score individually for EACH player first, not cancelled.
// Then remaining discs (15/10/5) use difference scoring.
function scoreRound(){
  // Open 20s score directly
  const open20s_1 = G.discs[0][0] * 20;
  const open20s_2 = G.discs[1][0] * 20;
  G.scores[0] += open20s_1;
  G.scores[1] += open20s_2;
  // Remaining rings use difference scoring
  const rem1 = G.discs[0][1]*15 + G.discs[0][2]*10 + G.discs[0][3]*5;
  const rem2 = G.discs[1][1]*15 + G.discs[1][2]*10 + G.discs[1][3]*5;
  const diff = rem1 - rem2;
  if(diff > 0) G.scores[0] += diff;
  else if(diff < 0) G.scores[1] += -diff;
  const totalDelta = (open20s_1 - open20s_2) + diff;
  G.history.push({raw:[open20s_1+rem1, open20s_2+rem2], open20s:[G.discs[0][0],G.discs[1][0]], delta:totalDelta});
  G.discs=[[0,0,0,0],[0,0,0,0]];
  boardPlayer=0;
  playChime();
  // Check win
  if(G.scores[0]>=G.target||G.scores[1]>=G.target){
    G.done=true;saveState();saveStats();
    renderScores();renderDiscs();renderHistory();drawBoard();
    setTimeout(()=>showWin(),600);return;
  }
  G.round++;renderGame();saveState();
}
function undoRound(){
  if(!G.history.length)return;
  const last=G.history.pop();
  if(last.delta>0)G.scores[0]-=last.delta;else if(last.delta<0)G.scores[1]+=-last.delta;
  G.round=Math.max(1,G.round-1);
  renderGame();saveState();
}

// --- Win ---
function showWin(){
  const w=G.scores[0]>=G.target?0:1;
  document.getElementById('winnerName').textContent=G.names[w]+' Wins!';
  document.getElementById('finalScore').textContent=`${G.scores[0]} - ${G.scores[1]}`;
  showScreen('win');playWin();launchConfetti();
}
function confirmNew(){if(confirm('Start a new game?'))resetToSetup()}
function resetToSetup(){G.done=false;localStorage.removeItem('crokinole_game');showScreen('setup')}

// --- Stats ---
function saveStats(){
  const s=JSON.parse(localStorage.getItem('crokinole_stats')||'{"games":0,"wins":{}}');
  s.games++;const w=G.scores[0]>=G.target?G.names[0]:G.names[1];s.wins[w]=(s.wins[w]||0)+1;
  localStorage.setItem('crokinole_stats',JSON.stringify(s));
}
function showStats(){
  const s=JSON.parse(localStorage.getItem('crokinole_stats')||'{"games":0,"wins":{}}');
  document.getElementById('stGames').textContent=s.games;
  document.getElementById('stWinsRow').innerHTML=Object.entries(s.wins).map(([n,c])=>`<b>${n}</b>: ${c} win${c!==1?'s':''}`).join(' &middot; ')||'<i style="color:var(--dim)">No wins yet</i>';
  document.getElementById('statsOverlay').classList.add('open');
}
function closeStats(){document.getElementById('statsOverlay').classList.remove('open')}

// --- Confetti ---
const ccv=document.getElementById('winCanvas'),ccx=ccv.getContext('2d');let particles=[],animId=null;
function launchConfetti(){
  ccv.width=window.innerWidth;ccv.height=window.innerHeight;
  particles=[];for(let i=0;i<100;i++)particles.push({x:Math.random()*ccv.width,y:Math.random()*-ccv.height,vx:(Math.random()-.5)*5,vy:Math.random()*4+2,c:['#ff6b35','#4ade80','#3b82f6','#fbbf24','#ec4899','#daa520'][Math.floor(Math.random()*6)],s:Math.random()*6+3,r:Math.random()*360,rv:(Math.random()-.5)*8});
  if(animId)cancelAnimationFrame(animId);animConfetti();
}
function animConfetti(){
  ccx.clearRect(0,0,ccv.width,ccv.height);let alive=false;
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.r+=p.rv;if(p.y<ccv.height+20)alive=true;
    ccx.save();ccx.translate(p.x,p.y);ccx.rotate(p.r*Math.PI/180);ccx.fillStyle=p.c;ccx.fillRect(-p.s/2,-p.s/2,p.s,p.s*2);ccx.restore()});
  if(alive)animId=requestAnimationFrame(animConfetti);else{ccx.clearRect(0,0,ccv.width,ccv.height);animId=null}
}

// --- Persistence ---
function saveState(){localStorage.setItem('crokinole_game',JSON.stringify(G))}
function loadState(){
  const s=localStorage.getItem('crokinole_game');if(!s)return false;
  try{const d=JSON.parse(s);if(!d.names||d.done)return false;Object.assign(G,d);return true}catch(e){return false}
}

// --- Shake to undo ---
let lastShake=0;
window.addEventListener('devicemotion',function(e){
  const a=e.accelerationIncludingGravity;if(!a)return;
  const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
  if(mag>30&&Date.now()-lastShake>1000){lastShake=Date.now();
    if(document.getElementById('game').classList.contains('active')){
      // Undo last disc: find last added
      for(let p=1;p>=0;p--)for(let z=0;z<4;z++){if(G.discs[p][z]>0){G.discs[p][z]--;playRemove();renderDiscs();drawBoard();saveState();return}}
    }
  }
});

// --- Init ---
if(loadState()){showScreen('game');renderGame()}
</script></body></html>
