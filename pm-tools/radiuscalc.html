<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pipe Bend & Radius Calculator</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:900px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.3em;margin:8px 0 12px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}.field{flex:1;min-width:130px}
label{display:block;font-size:12px;color:var(--dim);margin-bottom:3px}
select,input{width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px}
button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:6px 4px 6px 0}
button:hover{opacity:.85}
.result{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0;font-size:14px}
.val{color:var(--accent);font-weight:700;font-size:1.1em}
canvas{width:100%;max-width:600px;display:block;margin:10px auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px}
.quick{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.quick button{font-size:12px;padding:5px 10px;background:var(--bg2);border:1px solid var(--border)}
.quick button:hover{border-color:var(--accent)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.tbl th,.tbl td{padding:6px 8px;border:1px solid var(--border);text-align:left}
.tbl th{background:var(--bg2);color:var(--dim)}
h3{font-size:14px;margin:12px 0 6px;color:var(--accent)}
</style></head><body>
<a href="../index.html" class="home">← home</a>
<h1>Pipe Bend & Radius Calculator</h1>
<div class="row">
 <div class="field"><label>Pipe Diameter (NPS)</label><select id="psize">
  <option value="0.5">1/2"</option><option value="0.75">3/4"</option><option value="1">1"</option><option value="1.5">1-1/2"</option>
  <option value="2" selected>2"</option><option value="3">3"</option><option value="4">4"</option><option value="6">6"</option>
  <option value="8">8"</option><option value="10">10"</option><option value="12">12"</option></select></div>
 <div class="field"><label>Bend Angle (°)</label><input id="angle" type="number" value="90" min="1" max="180"></div>
 <div class="field"><label>Bend Radius (× Diameter)</label><select id="radius">
  <option value="1">1D (Short)</option><option value="1.5" selected>1.5D (Standard)</option><option value="3">3D (Long)</option><option value="5">5D (Extra Long)</option></select></div>
 <div class="field"><label>Material</label><select id="mat"><option value="steel">Carbon Steel</option><option value="stainless">Stainless Steel</option><option value="copper">Copper</option><option value="pvc">PVC</option><option value="hdpe">HDPE</option></select></div>
</div>
<div class="quick">Quick angles: <button onclick="setAngle(22.5)">22.5°</button><button onclick="setAngle(30)">30°</button><button onclick="setAngle(45)">45°</button><button onclick="setAngle(60)">60°</button><button onclick="setAngle(90)">90°</button><button onclick="setAngle(135)">135°</button></div>
<h3>Rolling Offset</h3>
<div class="row">
 <div class="field"><label>Vertical Rise (mm)</label><input id="rise" type="number" value="300"></div>
 <div class="field"><label>Horizontal Offset (mm)</label><input id="hoff" type="number" value="400"></div>
</div>
<button onclick="calc()">Calculate</button>
<div class="result" id="res"></div>
<canvas id="cv" height="400"></canvas>
<h3>Minimum Bend Radii Reference</h3>
<table class="tbl"><tr><th>Material</th><th>Min Bend R</th><th>Notes</th></tr>
<tr><td>Carbon Steel</td><td>1D</td><td>ASME B16.49</td></tr>
<tr><td>Stainless Steel</td><td>1.5D</td><td>Wall thinning concern</td></tr>
<tr><td>Copper (soft)</td><td>2.5D</td><td>Annealed tube</td></tr>
<tr><td>PVC</td><td>5D min</td><td>Heat bending only</td></tr>
<tr><td>HDPE</td><td>20D cold / 5D hot</td><td>Temperature dependent</td></tr></table>
<script>
const ODs={0.5:21.3,0.75:26.7,1:33.4,1.5:48.3,2:60.3,3:88.9,4:114.3,6:168.3,8:219.1,10:273.1,12:323.9};
function setAngle(a){document.getElementById('angle').value=a;calc();}

function calc(){
 const nps=+document.getElementById('psize').value;
 const ang=+document.getElementById('angle').value;
 const rMult=+document.getElementById('radius').value;
 const mat=document.getElementById('mat').value;
 const OD=ODs[nps]||60.3;
 const R=OD*rMult;
 const angRad=ang*Math.PI/180;
 const arcLen=R*angRad;
 const devLen=arcLen+2*OD; // developed length with tangents
 const tangent=R*Math.tan(angRad/2);
 // Segments for field bending (5-cut)
 const nSeg=5;const segArc=arcLen/nSeg;
 // Rolling offset
 const rise=+document.getElementById('rise').value;
 const hoff=+document.getElementById('hoff').value;
 const travel=Math.sqrt(rise*rise+hoff*hoff);
 const rollAng=Math.atan2(rise,hoff)*180/Math.PI;
 const compoundAng=Math.atan(Math.sqrt(2)*Math.tan(rollAng*Math.PI/180))*180/Math.PI;

 let html=`<div><span class="val">Arc Length: ${arcLen.toFixed(1)} mm</span></div>`;
 html+=`<div>Developed Length (with tangents): <b>${devLen.toFixed(1)} mm</b></div>`;
 html+=`<div>Center-to-End (tangent): ${tangent.toFixed(1)} mm</div>`;
 html+=`<div>Bend Radius: ${R.toFixed(1)} mm (${rMult}D × ${OD.toFixed(1)} mm OD)</div>`;
 html+=`<div style="margin-top:6px">Field Bend Segments (${nSeg} cuts): ${segArc.toFixed(1)} mm each</div>`;
 if(rise||hoff){
  html+=`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><b>Rolling Offset:</b><br>`;
  html+=`Travel: ${travel.toFixed(1)} mm · Angle: ${rollAng.toFixed(1)}° · Compound: ${compoundAng.toFixed(1)}°</div>`;
 }
 document.getElementById('res').innerHTML=html;
 drawBend(OD,R,ang);
}

function drawBend(OD,R,ang){
 const c=document.getElementById('cv'),ctx=c.getContext('2d');
 c.width=c.offsetWidth*2;c.height=800;ctx.scale(2,2);
 const W=c.offsetWidth,H=400;
 ctx.clearRect(0,0,W,H);
 const cx=W*0.4,cy=H*0.6;
 const scale=Math.min(150/R,2);
 const angRad=ang*Math.PI/180;
 const rs=R*scale,od=OD*scale;
 // Draw center line arc
 ctx.strokeStyle=var_accent();ctx.lineWidth=2;
 ctx.beginPath();ctx.arc(cx,cy,rs,Math.PI,-Math.PI+angRad,true);ctx.stroke();
 // Draw pipe outer
 ctx.strokeStyle='rgba(255,107,53,0.3)';ctx.lineWidth=od;ctx.lineCap='butt';
 ctx.beginPath();ctx.arc(cx,cy,rs,Math.PI,-Math.PI+angRad,true);ctx.stroke();
 // Tangent lines
 const startX=cx-rs,startY=cy;
 const endAng=-Math.PI+angRad;
 const endX=cx+rs*Math.cos(endAng),endY=cy+rs*Math.sin(endAng);
 ctx.strokeStyle='var(--dim)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
 // start tangent (going left)
 ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(startX,startY+60);ctx.stroke();
 // end tangent
 const tAng=endAng+Math.PI/2;
 ctx.beginPath();ctx.moveTo(endX,endY);ctx.lineTo(endX+60*Math.cos(tAng),endY+60*Math.sin(tAng));ctx.stroke();
 ctx.setLineDash([]);
 // Dimensions
 ctx.fillStyle=var_accent();ctx.font='12px system-ui';ctx.textAlign='center';
 // Radius line
 ctx.strokeStyle='var(--green)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
 ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(startX,startY);ctx.stroke();
 ctx.setLineDash([]);
 ctx.fillStyle='var(--green)';ctx.fillText('R='+R.toFixed(0)+'mm',cx-rs/2,cy-10);
 // Arc label
 const midAng=-Math.PI+angRad/2;
 const lx=cx+(rs+30)*Math.cos(midAng),ly=cy+(rs+30)*Math.sin(midAng);
 ctx.fillStyle='var(--text)';ctx.fillText(ang+'°',lx,ly);
 // Arc length
 ctx.fillStyle='var(--dim)';ctx.fillText('Arc: '+(R*angRad).toFixed(0)+'mm',lx,ly+16);
 // OD
 ctx.fillText('OD: '+OD.toFixed(1)+'mm',W*0.75,30);
}

function var_accent(){return '#ff6b35';}
['psize','angle','radius','mat','rise','hoff'].forEach(id=>document.getElementById(id).addEventListener('input',calc));
calc();
</script></body></html>
