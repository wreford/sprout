<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessons Learned</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px;cursor:pointer}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
textarea{min-height:60px}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-red{background:#ef4444}
.btn:active{opacity:.8}
.search{width:100%;padding:12px;font-size:1rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:8px;color:#e0e0e0;margin-bottom:12px}
.search:focus{outline:none;border-color:#ff6b35}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select{padding:10px;font-size:.9rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.l-card{background:#1a1a1c;border-left:4px solid;border-radius:8px;padding:12px;margin-bottom:8px;transition:all .2s}
.l-card.well{border-color:#4ade80}.l-card.wrong{border-color:#ef4444}.l-card.suggest{border-color:#f7c948}
.l-card .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.l-card .title{font-size:.95rem;font-weight:600;margin:4px 0}
.l-card .desc{font-size:.85rem;color:#bbb;margin:4px 0}
.l-card .meta{font-size:.75rem;color:#999;display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;background:#2a2a2d}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:.7rem;background:#ff6b3522;color:#ff6b35;margin:1px}
.del{background:none;border:none;color:#ef4444;font-size:1.1rem;cursor:pointer;padding:4px 8px}
.vote-btn{background:none;border:1px solid #2a2a2d;color:#f7c948;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;gap:4px}
.vote-btn:active{background:#f7c94822}
.collapse{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse.open{max-height:700px}
@media print{body{background:#fff;color:#000}.card,.l-card{border-color:#ccc;break-inside:avoid}.btn,.del,.filters,.home-link,.search,.vote-btn{display:none!important}}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Lessons Learned</h1>
<button class="btn btn-sm btn-green" onclick="exportAll()">Export</button>
</div>
<input class="search" placeholder="Search lessons..." id="searchBox" oninput="render()">
<div class="card">
<h2 onclick="toggleForm()">&#43; Add Lesson &#9662;</h2>
<div class="collapse" id="formWrap">
<div class="row"><div class="field"><label>Title</label><input id="lTitle"></div></div>
<div class="row"><div class="field"><label>Description</label><textarea id="lDesc"></textarea></div></div>
<div class="row">
<div class="field"><label>Category</label><select id="lCat"><option>What went well</option><option>What went wrong</option><option>Suggestion</option></select></div>
<div class="field"><label>Phase</label><select id="lPhase"><option>Planning</option><option>Design</option><option>Construction</option><option>Closeout</option></select></div>
<div class="field"><label>Impact Area</label><select id="lArea"><option>Cost</option><option>Schedule</option><option>Quality</option><option>Safety</option></select></div>
</div>
<div class="row"><div class="field"><label>Recommendation</label><textarea id="lRec"></textarea></div></div>
<div class="row"><div class="field"><label>Tags (comma-separated)</label><input id="lTags" placeholder="e.g. concrete, scheduling"></div></div>
<button class="btn" onclick="addLesson()">Add Lesson</button>
</div>
</div>
<div class="filters">
<select id="fCat" onchange="render()"><option value="">All Categories</option><option>What went well</option><option>What went wrong</option><option>Suggestion</option></select>
<select id="fPhase" onchange="render()"><option value="">All Phases</option><option>Planning</option><option>Design</option><option>Construction</option><option>Closeout</option></select>
</div>
<div id="list"></div>
<script>
const KEY='lessons-learned';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(items))}
function toggleForm(){document.getElementById('formWrap').classList.toggle('open')}
function addLesson(){
 const t=document.getElementById('lTitle').value.trim();if(!t)return;
 const tags=document.getElementById('lTags').value.split(',').map(s=>s.trim()).filter(Boolean);
 items.push({id:Date.now(),title:t,desc:document.getElementById('lDesc').value.trim(),
  cat:document.getElementById('lCat').value,phase:document.getElementById('lPhase').value,
  area:document.getElementById('lArea').value,rec:document.getElementById('lRec').value.trim(),
  tags,votes:0,date:new Date().toISOString()});
 save();['lTitle','lDesc','lRec','lTags'].forEach(x=>document.getElementById(x).value='');render();
}
function delItem(id){items=items.filter(a=>a.id!==id);save();render()}
function vote(id){const a=items.find(x=>x.id===id);if(a){a.votes++;save();render()}}
function shareItem(id){
 const a=items.find(x=>x.id===id);if(!a)return;
 const t=`LESSON LEARNED: ${a.title}\nCategory: ${a.cat} | Phase: ${a.phase} | Area: ${a.area}\n\n${a.desc}\n\nRecommendation: ${a.rec}\nTags: ${a.tags.join(', ')}`;
 navigator.clipboard.writeText(t).then(()=>alert('Copied to clipboard'));
}
function catClass(c){return c==='What went well'?'well':c==='What went wrong'?'wrong':'suggest'}
function render(){
 const fc=document.getElementById('fCat').value,fp=document.getElementById('fPhase').value;
 const q=document.getElementById('searchBox').value.toLowerCase();
 let f=items.filter(a=>(!fc||a.cat===fc)&&(!fp||a.phase===fp));
 if(q)f=f.filter(a=>(a.title+a.desc+a.rec+a.tags.join(' ')).toLowerCase().includes(q));
 f.sort((a,b)=>b.votes-a.votes);
 document.getElementById('list').innerHTML=f.map(a=>`<div class="l-card ${catClass(a.cat)}">
  <div class="top"><div><span class="badge">${a.cat}</span> <span class="badge">${a.phase}</span> <span class="badge">${a.area}</span></div>
  <div style="display:flex;gap:4px;align-items:center">
  <button class="vote-btn" onclick="vote(${a.id})">&#9650; ${a.votes}</button>
  <button class="btn btn-sm" onclick="shareItem(${a.id})">Share</button>
  <button class="del" onclick="delItem(${a.id})">&#10005;</button></div></div>
  <div class="title">${a.title}</div>
  ${a.desc?'<div class="desc">'+a.desc+'</div>':''}
  ${a.rec?'<div class="desc" style="color:#4ade80">Rec: '+a.rec+'</div>':''}
  <div style="margin-top:4px">${a.tags.map(t=>'<span class="tag">'+t+'</span>').join('')}</div>
  <div class="meta"><span>${new Date(a.date).toLocaleDateString()}</span></div>
  </div>`).join('');
}
function exportAll(){
 let t='LESSONS LEARNED\n'+new Date().toLocaleDateString()+'\n\n';
 items.sort((a,b)=>b.votes-a.votes).forEach((a,i)=>{
  t+=`${i+1}. ${a.title} [${a.votes} votes]\n   ${a.cat} | ${a.phase} | ${a.area}\n`;
  if(a.desc)t+=`   ${a.desc}\n`;if(a.rec)t+=`   Recommendation: ${a.rec}\n`;
  if(a.tags.length)t+=`   Tags: ${a.tags.join(', ')}\n`;t+='\n';});
 navigator.clipboard.writeText(t).then(()=>alert('Copied to clipboard'));
}
render();
</script>
</body>
</html>
