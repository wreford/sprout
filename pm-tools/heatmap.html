<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Site Activity Heatmap</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:900px;margin:auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:20px;margin:8px 0 12px}canvas{border:1px solid var(--border);border-radius:8px;width:100%;cursor:crosshair;background:var(--bg2)}
.row{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;align-items:center}
input,select,button{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:14px}
button{background:var(--accent);border:none;cursor:pointer;font-weight:600}button:hover{opacity:.85}
.info{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;font-size:13px;display:none}
.legend{display:flex;gap:4px;align-items:center;margin-top:8px;font-size:12px;color:var(--dim)}
.legend span{width:20px;height:12px;border-radius:2px;display:inline-block}
</style></head><body>
<a class="home" href="../index.html">&larr; home</a><h1>Site Activity Heatmap</h1>
<canvas id="c"></canvas>
<div class="legend"><span style="background:#1a1a3e"></span>Low <span style="background:#ff6b35"></span>Med <span style="background:#ff2020"></span>High</div>
<div class="row">
<select id="actType"><option>Crews Working</option><option>Equipment</option><option>Deliveries</option></select>
<input id="actVal" type="number" min="1" max="50" value="1" style="width:60px" placeholder="#">
<button onclick="logActivity()">Log to Selected Zone</button>
<button onclick="clearAll()" style="background:var(--border)">Reset All</button>
</div>
<div class="info" id="info"></div>
<script>
const COLS=8,ROWS=6,LABELS=["Gate","Laydown A","Tower 1","Tower 2","Mech Room","Elec Room","Laydown B","Parking",
"Office","Excavation","Foundation A","Foundation B","Rebar Yard","Formwork","Crane Pad","Storage",
"North Wing","South Wing","Core","Elevator","Stair A","Stair B","Loading","Waste",
"Roof A","Roof B","HVAC Pad","Plumbing","Lobby","Corridor","Lab","Server Room",
"Grade A","Grade B","Grade C","Retention","Util Trench","Backfill","Compact","Survey Pt",
"Staging","Fuel Depot","Wash Stn","First Aid","Break Room","Tool Crib","Batch Plant","Exit"];
let data=JSON.parse(localStorage.getItem('hm_data')||'{}'),sel=-1;
const can=document.getElementById('c'),ctx=can.getContext('2d');
function resize(){can.width=can.clientWidth;can.height=can.clientWidth*ROWS/COLS}
function maxAct(){let m=1;for(let k in data){let t=0;for(let e of data[k])t+=e.v;if(t>m)m=t}return m}
function draw(){resize();const cw=can.width/COLS,ch=can.height/ROWS,mx=maxAct();
ctx.clearRect(0,0,can.width,can.height);
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const i=r*COLS+c;let t=0;
if(data[i])for(let e of data[i])t+=e.v;const n=t/mx;
const R=Math.floor(26+229*n),G=Math.floor(26+80*(1-n)),B=Math.floor(62*(1-n));
ctx.fillStyle=`rgb(${R},${G},${B})`;ctx.fillRect(c*cw,r*ch,cw-2,ch-2);
if(sel===i){ctx.strokeStyle=var_accent;ctx.lineWidth=3;ctx.strokeRect(c*cw,r*ch,cw-2,ch-2)}
ctx.fillStyle=n>.5?'#fff':'var(--dim)';ctx.fillStyle=n>.5?'#fff':'#aaa';
ctx.font='bold 11px system-ui';ctx.textAlign='center';
ctx.fillText(LABELS[i]||'Zone '+i,c*cw+cw/2-1,r*ch+ch/2-4);
ctx.font='10px system-ui';ctx.fillText(t?t+' acts':'—',c*cw+cw/2-1,r*ch+ch/2+10)}}
const var_accent='#ff6b35';
can.onclick=e=>{const rect=can.getBoundingClientRect(),cw=can.width/COLS,ch=can.height/ROWS;
const c=Math.floor((e.clientX-rect.left)/(rect.width/COLS)),r=Math.floor((e.clientY-rect.top)/(rect.height/ROWS));
sel=r*COLS+c;draw();showInfo()};
function showInfo(){const info=document.getElementById('info');if(sel<0){info.style.display='none';return}
info.style.display='block';const entries=data[sel]||[];
let h='<b>'+LABELS[sel]+'</b><br>';if(!entries.length)h+='No activity logged.';
else entries.slice(-10).reverse().forEach(e=>h+=`<div style="margin:2px 0;color:var(--dim)">${e.d} — ${e.t}: ${e.v}</div>`);
info.innerHTML=h}
function logActivity(){if(sel<0){alert('Click a zone first');return}
if(!data[sel])data[sel]=[];const d=new Date().toLocaleDateString(),t=document.getElementById('actType').value,v=+document.getElementById('actVal').value||1;
data[sel].push({d,t,v});save();draw();showInfo()}
function save(){localStorage.setItem('hm_data',JSON.stringify(data))}
function clearAll(){if(confirm('Clear all data?')){data={};sel=-1;save();draw();document.getElementById('info').style.display='none'}}
window.onresize=draw;draw();
</script></body></html>
