<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materials Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.section{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;margin-bottom:12px;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.section-header h2{font-size:1rem;color:#ff6b35}
.section-header .arrow{transition:transform .2s;font-size:1.2rem}
.section-header .arrow.open{transform:rotate(180deg)}
.section-body{padding:0 16px 16px;display:none}
.section-body.open{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.field input:focus,.field select:focus{outline:none;border-color:#ff6b35}
.results{background:#0f0f10;border:1px solid #2a2a2d;border-radius:8px;padding:12px;margin-top:12px}
.results h3{font-size:.85rem;color:#4ade80;margin-bottom:8px}
.result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a1c}
.result-row:last-child{border:none}
.result-label{color:#ccc}
.result-value{color:#4ade80;font-weight:600}
.cost-row{color:#f7c948}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-top:8px}
.btn:active{opacity:.8}
.price-input{width:80px!important;display:inline-block;padding:6px!important;font-size:.85rem!important;text-align:right}
@media print{body{background:#fff;color:#000}.section{border-color:#ccc}.results{background:#f5f5f5}}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Materials Calculator</h1>
</div>
<div id="app"></div>
<button class="btn" onclick="copyAllResults()" style="margin-bottom:20px">Copy All Results</button>

<script>
const calcs=[
{id:'paint',title:'Paint',fields:[
{id:'pL',label:'Room Length (ft)',val:12},{id:'pW',label:'Room Width (ft)',val:10},{id:'pH',label:'Room Height (ft)',val:8},
{id:'pCoats',label:'Coats',val:2},{id:'pDoors',label:'Doors',val:1},{id:'pWindows',label:'Windows',val:2},
{id:'pPrice',label:'Price/Gallon ($)',val:45}
],calc:function(v){
const wallArea=2*(v.pL+v.pW)*v.pH;
const subtract=v.pDoors*21+v.pWindows*15;
const paintable=(wallArea-subtract)*v.pCoats;
const gallons=Math.ceil(paintable/350);
const cost=(gallons*v.pPrice).toFixed(2);
return[['Paintable area',paintable+' sq ft'],['Gallons needed',gallons],['Estimated cost','$'+cost]];
}},
{id:'drywall',title:'Drywall',fields:[
{id:'dL',label:'Room Length (ft)',val:12},{id:'dW',label:'Room Width (ft)',val:10},{id:'dH',label:'Room Height (ft)',val:8},
{id:'dPrice',label:'Price/Sheet ($)',val:15}
],calc:function(v){
const wallArea=2*(v.dL+v.dW)*v.dH;const ceilArea=v.dL*v.dW;
const total=wallArea+ceilArea;const sheets=Math.ceil(total/32);
const tape=Math.ceil(total/50);const mud=Math.ceil(sheets*0.5);const screws=Math.ceil(sheets*60);
return[['Total area',total+' sq ft'],['4x8 Sheets',sheets],['Tape (rolls)',tape],['Joint compound (boxes)',mud],['Screws',screws],['Sheet cost','$'+(sheets*v.dPrice).toFixed(2)]];
}},
{id:'concrete',title:'Concrete',fields:[
{id:'cL',label:'Length (ft)',val:10},{id:'cW',label:'Width (ft)',val:10},{id:'cD',label:'Depth (in)',val:4},
{id:'cBag',label:'Bag size (lb)',val:80,type:'select',opts:[60,80]},{id:'cPrice',label:'Price/Bag ($)',val:7}
],calc:function(v){
const cuft=v.cL*v.cW*(v.cD/12);const cuyd=cuft/27;
const bagsPerYd=v.cBag===80?45:60;const bags=Math.ceil(cuft/(v.cBag===80?0.6:0.45));
return[['Volume',cuft.toFixed(1)+' cu ft'],[' ',cuyd.toFixed(2)+' cu yd'],['Bags ('+v.cBag+'lb)',bags],['Bag cost','$'+(bags*v.cPrice).toFixed(2)]];
}},
{id:'lumber',title:'Lumber / Framing',fields:[
{id:'lLen',label:'Wall/Deck Length (ft)',val:20},{id:'lSpacing',label:'Spacing (in)',val:16,type:'select',opts:[12,16,24]},
{id:'lExtra',label:'Extra % waste',val:10},{id:'lPrice',label:'Price/Stud ($)',val:6}
],calc:function(v){
const count=Math.ceil((v.lLen*12)/v.lSpacing)+1;
const withWaste=Math.ceil(count*(1+v.lExtra/100));
return[['Studs/Joists at '+v.lSpacing+'"',count],['With '+v.lExtra+'% waste',withWaste],['Cost','$'+(withWaste*v.lPrice).toFixed(2)]];
}},
{id:'tile',title:'Tile',fields:[
{id:'tArea',label:'Floor Area (sq ft)',val:100},{id:'tSize',label:'Tile Size (in)',val:12},
{id:'tWaste',label:'Waste %',val:10},{id:'tPrice',label:'Price/Tile ($)',val:3}
],calc:function(v){
const tileArea=(v.tSize*v.tSize)/144;const tiles=Math.ceil((v.tArea/tileArea)*(1+v.tWaste/100));
const adhesive=Math.ceil(v.tArea/50);const grout=Math.ceil(v.tArea/25);
return[['Tiles needed',tiles],['Adhesive (bags)',adhesive],['Grout (bags)',grout],['Tile cost','$'+(tiles*v.tPrice).toFixed(2)]];
}},
{id:'insulation',title:'Insulation',fields:[
{id:'iArea',label:'Wall Area (sq ft)',val:200},{id:'iR',label:'R-value',val:13,type:'select',opts:[11,13,19,30,38]},
{id:'iType',label:'Type',val:'batt',type:'select',opts:['batt','blown']},{id:'iPrice',label:'Price/Unit ($)',val:1.2}
],calc:function(v){
let units;
if(v.iType==='batt'){units=Math.ceil(v.iArea/40);}
else{units=Math.ceil(v.iArea/25);}
return[['Units ('+v.iType+')',units],['Coverage',v.iArea+' sq ft'],['Cost','$'+(units*v.iPrice).toFixed(2)]];
}},
{id:'roofing',title:'Roofing',fields:[
{id:'rArea',label:'Roof Footprint (sq ft)',val:1500},{id:'rPitch',label:'Pitch Factor',val:1.12,type:'select',opts:[1.0,1.03,1.06,1.12,1.2,1.3,1.41]},
{id:'rPrice',label:'Price/Square ($)',val:100}
],calc:function(v){
const actual=v.rArea*v.rPitch;const squares=Math.ceil(actual/100);
const underlayment=Math.ceil(actual/400);const nails=Math.ceil(squares*320);
return[['Actual roof area',actual.toFixed(0)+' sq ft'],['Squares (shingles)',squares],['Underlayment rolls',underlayment],['Nails (approx)',nails],['Shingle cost','$'+(squares*v.rPrice).toFixed(2)]];
}}
];

function render(){
const app=document.getElementById('app');
let html='';
calcs.forEach(c=>{
html+=`<div class="section"><div class="section-header" onclick="toggle('${c.id}')"><h2>${c.title}</h2><span class="arrow" id="arrow-${c.id}">&#9660;</span></div>`;
html+=`<div class="section-body" id="body-${c.id}"><div class="row">`;
c.fields.forEach(f=>{
html+=`<div class="field"><label>${f.label}</label>`;
if(f.type==='select'){
html+=`<select id="${f.id}" onchange="recalc('${c.id}')">`;
f.opts.forEach(o=>{html+=`<option value="${o}"${o==f.val?' selected':''}>${o}</option>`;});
html+=`</select>`;
}else{
html+=`<input type="number" id="${f.id}" value="${f.val}" oninput="recalc('${c.id}')">`;
}
html+=`</div>`;
});
html+=`</div><div class="results" id="results-${c.id}"><h3>Results</h3></div></div></div>`;
});
app.innerHTML=html;
calcs.forEach(c=>recalc(c.id));
loadState();
}

function toggle(id){
const body=document.getElementById('body-'+id);
const arrow=document.getElementById('arrow-'+id);
const open=body.classList.toggle('open');
arrow.classList.toggle('open',open);
saveState();
}

function recalc(id){
const c=calcs.find(x=>x.id===id);
const v={};
c.fields.forEach(f=>{
const el=document.getElementById(f.id);
v[f.id]=parseFloat(el.value)||0;
});
const results=c.calc(v);
const div=document.getElementById('results-'+id);
let html='<h3>Results</h3>';
results.forEach(r=>{
const isCost=r[1].toString().startsWith('$');
html+=`<div class="result-row${isCost?' cost-row':''}"><span class="result-label">${r[0]}</span><span class="result-value">${r[1]}</span></div>`;
});
div.innerHTML=html;
saveCalcData();
}

function saveState(){
const open=[];
calcs.forEach(c=>{if(document.getElementById('body-'+c.id).classList.contains('open'))open.push(c.id);});
const d=JSON.parse(localStorage.getItem('materials-calc')||'{}');
d.open=open;localStorage.setItem('materials-calc',JSON.stringify(d));
}

function saveCalcData(){
const d=JSON.parse(localStorage.getItem('materials-calc')||'{}');
d.values={};
calcs.forEach(c=>{c.fields.forEach(f=>{d.values[f.id]=document.getElementById(f.id).value;});});
localStorage.setItem('materials-calc',JSON.stringify(d));
}

function loadState(){
const d=JSON.parse(localStorage.getItem('materials-calc')||'{}');
if(d.values){
calcs.forEach(c=>{c.fields.forEach(f=>{
if(d.values[f.id]!==undefined){document.getElementById(f.id).value=d.values[f.id];}
});});
calcs.forEach(c=>recalc(c.id));
}
if(d.open){d.open.forEach(id=>toggle(id));}
else{toggle('paint');}
}

function copyAllResults(){
let text='MATERIALS CALCULATOR RESULTS\n'+new Date().toLocaleDateString()+'\n\n';
calcs.forEach(c=>{
const div=document.getElementById('results-'+c.id);
const rows=div.querySelectorAll('.result-row');
if(rows.length){
text+=c.title.toUpperCase()+'\n';
rows.forEach(r=>{text+='  '+r.children[0].textContent+': '+r.children[1].textContent+'\n';});
text+='\n';
}
});
navigator.clipboard.writeText(text).then(()=>alert('Copied!')).catch(()=>{});
}

render();
</script>
</body>
</html>
