<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monte Carlo Risk Analysis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:100px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px;font-size:.95rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.field input:focus,.field select:focus{outline:none;border-color:#ff6b35}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:6px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-gold{background:#f7c948;color:#000}
.btn-red{background:#ef4444}
.btn-outline{background:transparent;border:1px solid #2a2a2d;color:#e0e0e0}
.btn:active{opacity:.8}
.run-btn{width:100%;padding:16px;font-size:1.1rem;font-weight:700;letter-spacing:.02em;background:linear-gradient(135deg,#ff6b35,#e55a2b);border:none;border-radius:10px;color:#fff;cursor:pointer;margin:12px 0}
.run-btn:hover{opacity:.9}
.run-btn:disabled{opacity:.5;cursor:not-allowed}
.task-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:8px;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;margin-bottom:6px;font-size:.85rem}
.task-row input{width:70px;padding:6px;font-size:.85rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:4px;color:#e0e0e0;text-align:center}
.task-row input.task-name{width:140px;text-align:left}
.task-row .del-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:1.1rem;padding:2px 6px}
.task-labels{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:4px 8px;font-size:.7rem;color:#666}
.task-labels span{text-align:center}
.task-labels .lbl-name{width:140px;text-align:left}
.task-labels .lbl-num{width:70px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:8px 14px;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;cursor:pointer;font-size:.85rem;color:#999}
.tab.active{background:#ff6b35;color:#fff;border-color:#ff6b35}
.progress-wrap{width:100%;background:#0f0f10;border-radius:6px;height:8px;margin:8px 0;overflow:hidden;display:none}
.progress-bar{height:100%;background:linear-gradient(90deg,#ff6b35,#f7c948);width:0;transition:width .1s}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.stat-box{background:#0f0f10;border:1px solid #2a2a2d;border-radius:8px;padding:12px;text-align:center}
.stat-box .stat-label{font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:.05em}
.stat-box .stat-val{font-size:1.2rem;font-weight:700;color:#4ade80;margin-top:4px}
.stat-box .stat-val.gold{color:#f7c948}
.stat-box .stat-val.accent{color:#ff6b35}
.pct-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:8px}
.pct-table th,.pct-table td{padding:8px;border:1px solid #2a2a2d;text-align:center}
.pct-table th{background:#0f0f10;color:#ff6b35;font-size:.75rem;text-transform:uppercase}
.pct-table td{color:#e0e0e0}
canvas{width:100%;border-radius:8px;background:#0f0f10;display:block}
.target-result{font-size:1rem;font-weight:700;padding:12px;border-radius:8px;text-align:center;margin-top:10px}
.target-green{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid #4ade80}
.target-yellow{background:rgba(247,201,72,.15);color:#f7c948;border:1px solid #f7c948}
.target-red{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid #ef4444}
.confidence-box{padding:14px;border-radius:8px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);margin-top:10px;font-size:.9rem;line-height:1.6}
.template-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chart-wrap{position:relative;margin-bottom:12px}
#results{display:none}
@media(max-width:600px){
 .task-row input{width:55px;padding:5px;font-size:.8rem}
 .task-row input.task-name{width:100px}
 .task-labels .lbl-name{width:100px}
 .task-labels .lbl-num{width:55px}
 .stat-grid{grid-template-columns:repeat(2,1fr)}
}
@media print{
 body{background:#fff;color:#000}
 .card{border-color:#ccc;break-inside:avoid}
 .btn,.tabs,.template-btns,.run-btn,.home-link,.task-row .del-btn{display:none!important}
 canvas{border:1px solid #ccc}
 .stat-box{border-color:#ccc}
 .stat-box .stat-val,.stat-box .stat-val.gold,.stat-box .stat-val.accent{color:#000}
 .pct-table th,.pct-table td{border-color:#ccc}
 .pct-table th{color:#333}
}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Monte Carlo Risk Analysis</h1>
</div>

<div class="card">
<h2>Project Tasks</h2>
<div class="template-btns">
<button class="btn btn-sm btn-outline" onclick="loadTemplate('kitchen')">Kitchen Reno</button>
<button class="btn btn-sm btn-outline" onclick="loadTemplate('home')">New Home Build</button>
<button class="btn btn-sm btn-outline" onclick="loadTemplate('commercial')">Commercial Fit-Out</button>
<button class="btn btn-sm btn-outline" onclick="loadTemplate('deck')">Deck &amp; Patio</button>
</div>
<div class="task-labels">
<span class="lbl-name">Task</span>
<span class="lbl-num">Opt Days</span>
<span class="lbl-num">Likely</span>
<span class="lbl-num">Pess</span>
<span class="lbl-num">Opt $</span>
<span class="lbl-num">Likely $</span>
<span class="lbl-num">Pess $</span>
</div>
<div id="taskList"></div>
<button class="btn btn-sm" onclick="addTask()">+ Add Task</button>
<button class="btn btn-sm btn-red" onclick="clearTasks()">Clear All</button>
</div>

<button class="run-btn" id="runBtn" onclick="runSimulation()">&#9654; RUN SIMULATION (10,000 iterations)</button>
<div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>

<div id="results">
<div class="card">
<h2>Summary Statistics</h2>
<div class="stat-grid" id="statsGrid"></div>
<div class="confidence-box" id="confidenceBox"></div>
</div>

<div class="card">
<h2>Percentile Table</h2>
<table class="pct-table" id="pctTable"></table>
</div>

<div class="card">
<h2>Charts</h2>
<div class="tabs" id="chartTabs">
<div class="tab active" onclick="switchChart('durHist')">Duration Histogram</div>
<div class="tab" onclick="switchChart('costHist')">Cost Histogram</div>
<div class="tab" onclick="switchChart('scurve')">S-Curve</div>
<div class="tab" onclick="switchChart('tornado')">Tornado</div>
</div>
<div class="chart-wrap">
<canvas id="chartCanvas" height="350"></canvas>
</div>
</div>

<div class="card">
<h2>Target Analysis</h2>
<div class="row">
<div class="field"><label>Target Duration (days)</label><input type="number" id="targetDur" oninput="evalTarget()"></div>
<div class="field"><label>Target Budget ($)</label><input type="number" id="targetCost" oninput="evalTarget()"></div>
</div>
<div id="targetResult"></div>
</div>

<div class="card">
<h2>Export</h2>
<button class="btn btn-sm btn-green" onclick="copyResults()">Copy Summary</button>
<button class="btn btn-sm btn-gold" onclick="window.print()">Print Report</button>
</div>
</div>

<script>
const ITER=10000,BATCH=2000;
let tasks=[],simDur=[],simCost=[],taskVarDur=[],taskVarCost=[],activeChart='durHist';

const templates={
kitchen:[
 {n:'Demo & Disposal',do:2,dm:4,dp:7,co:1500,cm:2500,cp:4000},
 {n:'Plumbing Rough',do:2,dm:3,dp:5,co:2000,cm:3500,cp:5500},
 {n:'Electrical Rough',do:1,dm:2,dp:4,co:1500,cm:2500,cp:4000},
 {n:'Framing Changes',do:1,dm:2,dp:4,co:800,cm:1500,cp:3000},
 {n:'Drywall & Patch',do:2,dm:3,dp:5,co:1000,cm:2000,cp:3500},
 {n:'Cabinet Install',do:2,dm:3,dp:5,co:5000,cm:8000,cp:13000},
 {n:'Countertops',do:1,dm:2,dp:4,co:3000,cm:5000,cp:9000},
 {n:'Tile Backsplash',do:2,dm:3,dp:5,co:1200,cm:2000,cp:3500},
 {n:'Plumbing Trim',do:1,dm:2,dp:3,co:800,cm:1500,cp:2500},
 {n:'Electrical Trim',do:1,dm:1,dp:2,co:600,cm:1000,cp:1800},
 {n:'Painting',do:2,dm:3,dp:5,co:800,cm:1500,cp:2500},
 {n:'Flooring',do:2,dm:3,dp:5,co:2000,cm:3500,cp:6000}
],
home:[
 {n:'Site Prep & Excavation',do:3,dm:5,dp:10,co:5000,cm:10000,cp:18000},
 {n:'Foundation',do:5,dm:8,dp:14,co:15000,cm:25000,cp:40000},
 {n:'Framing',do:10,dm:15,dp:25,co:25000,cm:40000,cp:60000},
 {n:'Roofing',do:3,dm:5,dp:8,co:8000,cm:14000,cp:22000},
 {n:'Windows & Doors',do:2,dm:3,dp:5,co:10000,cm:18000,cp:28000},
 {n:'Plumbing Rough',do:3,dm:5,dp:8,co:8000,cm:14000,cp:22000},
 {n:'Electrical Rough',do:3,dm:5,dp:8,co:6000,cm:10000,cp:16000},
 {n:'HVAC',do:3,dm:5,dp:8,co:8000,cm:15000,cp:25000},
 {n:'Insulation',do:2,dm:3,dp:5,co:3000,cm:5000,cp:8000},
 {n:'Drywall',do:5,dm:8,dp:12,co:8000,cm:14000,cp:22000},
 {n:'Interior Trim',do:5,dm:8,dp:14,co:5000,cm:9000,cp:15000},
 {n:'Painting',do:5,dm:7,dp:12,co:5000,cm:9000,cp:15000},
 {n:'Flooring',do:4,dm:6,dp:10,co:8000,cm:15000,cp:25000},
 {n:'Plumbing & Elec Trim',do:3,dm:5,dp:8,co:4000,cm:7000,cp:12000},
 {n:'Final Finishes',do:3,dm:5,dp:10,co:5000,cm:10000,cp:18000}
],
commercial:[
 {n:'Design Finalization',do:5,dm:8,dp:14,co:8000,cm:15000,cp:25000},
 {n:'Permitting',do:5,dm:10,dp:20,co:2000,cm:4000,cp:8000},
 {n:'Demo & Strip-Out',do:3,dm:5,dp:8,co:5000,cm:10000,cp:18000},
 {n:'MEP Rough-In',do:8,dm:12,dp:20,co:20000,cm:35000,cp:55000},
 {n:'Framing & Partitions',do:5,dm:8,dp:12,co:10000,cm:18000,cp:28000},
 {n:'Fire Protection',do:3,dm:5,dp:8,co:8000,cm:14000,cp:22000},
 {n:'Ceiling Grid',do:3,dm:5,dp:8,co:5000,cm:9000,cp:15000},
 {n:'Flooring',do:4,dm:6,dp:10,co:10000,cm:18000,cp:30000},
 {n:'Millwork & Fixtures',do:5,dm:8,dp:14,co:15000,cm:25000,cp:40000},
 {n:'Final MEP & Inspection',do:3,dm:5,dp:10,co:5000,cm:8000,cp:14000}
],
deck:[
 {n:'Design & Permits',do:3,dm:5,dp:10,co:500,cm:1200,cp:2500},
 {n:'Site Prep',do:1,dm:2,dp:3,co:500,cm:1000,cp:2000},
 {n:'Footings & Posts',do:2,dm:3,dp:5,co:1500,cm:3000,cp:5000},
 {n:'Framing',do:2,dm:4,dp:6,co:2000,cm:3500,cp:6000},
 {n:'Decking',do:2,dm:3,dp:5,co:3000,cm:5000,cp:9000},
 {n:'Railing',do:1,dm:2,dp:4,co:1500,cm:2500,cp:4500},
 {n:'Stairs',do:1,dm:2,dp:3,co:800,cm:1500,cp:2800},
 {n:'Finish & Seal',do:1,dm:2,dp:3,co:400,cm:800,cp:1500}
]};

function triRand(min,mode,max){
 if(min>=max) return mode;
 const u=Math.random(),fc=(mode-min)/(max-min);
 return u<fc?min+Math.sqrt(u*(max-min)*(mode-min)):max-Math.sqrt((1-u)*(max-min)*(max-mode));
}

function addTask(t){
 tasks.push(t||{n:'New Task',do:1,dm:2,dp:4,co:500,cm:1000,cp:2000});
 renderTasks();saveData();
}
function removeTask(i){tasks.splice(i,1);renderTasks();saveData();}
function clearTasks(){tasks=[];renderTasks();saveData();}

function renderTasks(){
 const el=document.getElementById('taskList');
 el.innerHTML=tasks.map((t,i)=>`<div class="task-row">
  <input class="task-name" value="${esc(t.n)}" onchange="upd(${i},'n',this.value)">
  <input type="number" value="${t.do}" onchange="updN(${i},'do',this)" min="0">
  <input type="number" value="${t.dm}" onchange="updN(${i},'dm',this)" min="0">
  <input type="number" value="${t.dp}" onchange="updN(${i},'dp',this)" min="0">
  <input type="number" value="${t.co}" onchange="updN(${i},'co',this)" min="0">
  <input type="number" value="${t.cm}" onchange="updN(${i},'cm',this)" min="0">
  <input type="number" value="${t.cp}" onchange="updN(${i},'cp',this)" min="0">
  <button class="del-btn" onclick="removeTask(${i})">&times;</button>
 </div>`).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function upd(i,k,v){tasks[i][k]=v;saveData();}
function updN(i,k,el){const v=parseFloat(el.value)||0;tasks[i][k]=v;saveData();}

function loadTemplate(key){
 tasks=templates[key].map(t=>({...t}));
 renderTasks();saveData();
}

function saveData(){localStorage.setItem('montecarlo-data',JSON.stringify(tasks));}
function loadData(){
 try{const d=JSON.parse(localStorage.getItem('montecarlo-data'));if(d&&d.length)tasks=d;}catch(e){}
 renderTasks();
}

function runSimulation(){
 if(!tasks.length)return;
 const btn=document.getElementById('runBtn');
 btn.disabled=true;btn.textContent='Running...';
 const pw=document.getElementById('progressWrap'),pb=document.getElementById('progressBar');
 pw.style.display='block';pb.style.width='0%';
 document.getElementById('results').style.display='none';
 simDur=new Float64Array(ITER);simCost=new Float64Array(ITER);
 taskVarDur=tasks.map(()=>new Float64Array(ITER));
 taskVarCost=tasks.map(()=>new Float64Array(ITER));
 let done=0;
 function batch(){
  const end=Math.min(done+BATCH,ITER);
  for(let i=done;i<end;i++){
   let td=0,tc=0;
   for(let j=0;j<tasks.length;j++){
    const t=tasks[j];
    const d=triRand(t.do,t.dm,t.dp);
    const c=triRand(t.co,t.cm,t.cp);
    taskVarDur[j][i]=d;taskVarCost[j][i]=c;
    td+=d;tc+=c;
   }
   simDur[i]=td;simCost[i]=tc;
  }
  done=end;
  pb.style.width=(done/ITER*100)+'%';
  if(done<ITER){setTimeout(batch,0);}
  else{btn.disabled=false;btn.textContent='▶ RUN SIMULATION (10,000 iterations)';pw.style.display='none';showResults();}
 }
 setTimeout(batch,10);
}

function sorted(arr){return Float64Array.from(arr).sort();}
function percentile(s,p){const i=(p/100)*(s.length-1),lo=Math.floor(i),hi=Math.ceil(i);return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(i-lo);}
function mean(a){let s=0;for(let i=0;i<a.length;i++)s+=a[i];return s/a.length;}
function stddev(a,m){let s=0;for(let i=0;i<a.length;i++)s+=(a[i]-m)**2;return Math.sqrt(s/a.length);}

function showResults(){
 document.getElementById('results').style.display='';
 const sd=sorted(simDur),sc=sorted(simCost);
 const md=mean(simDur),mc=mean(simCost);
 const sdd=stddev(simDur,md),sdc=stddev(simCost,mc);
 const medD=percentile(sd,.5*100),medC=percentile(sc,.5*100);

 document.getElementById('statsGrid').innerHTML=
  stat('Mean Duration',md.toFixed(1)+' days','')+
  stat('Median Duration',medD.toFixed(1)+' days','')+
  stat('Std Dev (Dur)',sdd.toFixed(1)+' days','accent')+
  stat('Min / Max Dur',sd[0].toFixed(0)+' / '+sd[sd.length-1].toFixed(0)+' days','gold')+
  stat('Mean Cost',fmtM(mc),'')+
  stat('Median Cost',fmtM(medC),'')+
  stat('Std Dev (Cost)',fmtM(sdc),'accent')+
  stat('Min / Max Cost',fmtM(sc[0])+' / '+fmtM(sc[sc.length-1]),'gold');

 const pcts=[10,25,50,75,90,95];
 let tbl='<tr><th>Percentile</th>'+pcts.map(p=>'<th>P'+p+'</th>').join('')+'</tr>';
 tbl+='<tr><td style="color:#ff6b35">Duration (days)</td>'+pcts.map(p=>'<td>'+percentile(sd,p).toFixed(1)+'</td>').join('')+'</tr>';
 tbl+='<tr><td style="color:#ff6b35">Cost ($)</td>'+pcts.map(p=>'<td>'+fmtM(percentile(sc,p))+'</td>').join('')+'</tr>';
 document.getElementById('pctTable').innerHTML=tbl;

 const p75d=percentile(sd,75),p75c=percentile(sc,75);
 const p90d=percentile(sd,90),p90c=percentile(sc,90);
 document.getElementById('confidenceBox').innerHTML=
  `<strong>75% Confidence:</strong> Project completes within <span style="color:#4ade80">${p75d.toFixed(0)} days</span> and costs under <span style="color:#4ade80">${fmtM(p75c)}</span><br>`+
  `<strong>90% Confidence:</strong> Project completes within <span style="color:#f7c948">${p90d.toFixed(0)} days</span> and costs under <span style="color:#f7c948">${fmtM(p90c)}</span>`;

 drawChart();evalTarget();
}

function stat(label,val,cls){return `<div class="stat-box"><div class="stat-label">${label}</div><div class="stat-val ${cls}">${val}</div></div>`;}
function fmtM(v){return v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(1)+'K':'$'+v.toFixed(0);}

function switchChart(id){
 activeChart=id;
 document.querySelectorAll('#chartTabs .tab').forEach((t,i)=>{
  t.classList.toggle('active',['durHist','costHist','scurve','tornado'][i]===id);
 });
 drawChart();
}

function drawChart(){
 const c=document.getElementById('chartCanvas'),ctx=c.getContext('2d');
 const dpr=window.devicePixelRatio||1;
 const w=c.parentElement.clientWidth;
 const h=350;
 c.width=w*dpr;c.height=h*dpr;c.style.width=w+'px';c.style.height=h+'px';
 ctx.scale(dpr,dpr);
 ctx.fillStyle='#0f0f10';ctx.fillRect(0,0,w,h);
 const pad={t:30,r:20,b:50,l:70};
 const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;

 if(activeChart==='durHist')drawHist(ctx,simDur,'Duration (days)',pad,cw,ch,'#ff6b35');
 else if(activeChart==='costHist')drawHist(ctx,simCost,'Cost ($)',pad,cw,ch,'#4ade80');
 else if(activeChart==='scurve')drawSCurve(ctx,pad,cw,ch,w);
 else if(activeChart==='tornado')drawTornado(ctx,pad,cw,ch,h);
}

function drawHist(ctx,data,label,p,cw,ch,color){
 const mn=Math.min(...data),mx=Math.max(...data);
 const bins=40,bw=(mx-mn)/bins,counts=new Array(bins).fill(0);
 for(let i=0;i<data.length;i++){let b=Math.floor((data[i]-mn)/bw);if(b>=bins)b=bins-1;counts[b]++;}
 const maxC=Math.max(...counts);
 const barW=cw/bins;

 ctx.strokeStyle='#2a2a2d';ctx.lineWidth=1;
 for(let i=0;i<=5;i++){
  const y=p.t+ch-ch*(i/5);
  ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();
  ctx.fillStyle='#666';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='right';
  ctx.fillText(Math.round(maxC*i/5),p.l-6,y+4);
 }
 for(let i=0;i<bins;i++){
  const bh=counts[i]/maxC*ch;
  ctx.fillStyle=color;
  ctx.globalAlpha=0.85;
  ctx.fillRect(p.l+i*barW+1,p.t+ch-bh,barW-2,bh);
  ctx.globalAlpha=1;
 }
 for(let i=0;i<=5;i++){
  const v=mn+((mx-mn)*i/5);
  const x=p.l+cw*i/5;
  ctx.fillStyle='#666';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='center';
  ctx.fillText(label.includes('$')?fmtM(v):v.toFixed(0),x,p.t+ch+20);
 }
 ctx.fillStyle='#999';ctx.font='12px -apple-system,sans-serif';ctx.textAlign='center';
 ctx.fillText(label,p.l+cw/2,p.t+ch+42);
 ctx.textAlign='left';ctx.fillText('Frequency',p.l,p.t-10);

 const med=percentile(sorted(data),50);
 const mx_=p.l+((med-mn)/(mx-mn))*cw;
 ctx.setLineDash([4,4]);ctx.strokeStyle='#f7c948';ctx.lineWidth=2;
 ctx.beginPath();ctx.moveTo(mx_,p.t);ctx.lineTo(mx_,p.t+ch);ctx.stroke();
 ctx.setLineDash([]);
 ctx.fillStyle='#f7c948';ctx.font='bold 11px -apple-system,sans-serif';ctx.textAlign='center';
 ctx.fillText('Median',mx_,p.t-4);
}

function drawSCurve(ctx,p,cw,ch,w){
 const sd=sorted(simDur),sc=sorted(simCost);
 // Duration S-curve
 ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;ctx.beginPath();
 for(let i=0;i<sd.length;i+=10){
  const x=p.l+((sd[i]-sd[0])/(sd[sd.length-1]-sd[0]))*cw;
  const y=p.t+ch-ch*(i/sd.length);
  i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
 }
 ctx.stroke();

 // Cost S-curve
 ctx.strokeStyle='#4ade80';ctx.lineWidth=2;ctx.beginPath();
 for(let i=0;i<sc.length;i+=10){
  const x=p.l+((sc[i]-sc[0])/(sc[sc.length-1]-sc[0]))*cw;
  const y=p.t+ch-ch*(i/sc.length);
  i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
 }
 ctx.stroke();

 // Y axis
 ctx.strokeStyle='#2a2a2d';ctx.lineWidth=1;
 for(let i=0;i<=5;i++){
  const y=p.t+ch-ch*(i/5);
  ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke();
  ctx.fillStyle='#666';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='right';
  ctx.fillText((i*20)+'%',p.l-6,y+4);
 }

 ctx.fillStyle='#999';ctx.font='12px -apple-system,sans-serif';ctx.textAlign='left';
 ctx.fillText('Cumulative Probability',p.l,p.t-10);
 // Legend
 ctx.fillStyle='#ff6b35';ctx.fillRect(p.l+cw-120,p.t+10,14,3);
 ctx.fillStyle='#aaa';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='left';
 ctx.fillText('Duration',p.l+cw-100,p.t+14);
 ctx.fillStyle='#4ade80';ctx.fillRect(p.l+cw-120,p.t+26,14,3);
 ctx.fillStyle='#aaa';ctx.fillText('Cost',p.l+cw-100,p.t+30);
}

function drawTornado(ctx,p,cw,ch,totalH){
 if(!tasks.length)return;
 const variances=tasks.map((t,i)=>{
  const vals=taskVarDur[i];
  const m=mean(vals),s=stddev(vals,m);
  return{name:t.n,variance:s*s,lo:percentile(sorted(vals),10),hi:percentile(sorted(vals),90)};
 }).sort((a,b)=>b.variance-a.variance).slice(0,12);

 const n=variances.length;
 if(!n)return;
 const barH=Math.min(Math.floor(ch/n)-4,28);
 const gMean=mean(simDur);
 const maxRange=Math.max(...variances.map(v=>Math.max(Math.abs(v.lo),Math.abs(v.hi))));
 const allLo=Math.min(...variances.map(v=>v.lo));
 const allHi=Math.max(...variances.map(v=>v.hi));
 const scale=cw*0.4/Math.max(allHi-gMean,gMean-allLo||1);
 const cx=p.l+cw*0.5;

 ctx.setLineDash([4,4]);ctx.strokeStyle='#666';ctx.lineWidth=1;
 ctx.beginPath();ctx.moveTo(cx,p.t);ctx.lineTo(cx,p.t+ch);ctx.stroke();
 ctx.setLineDash([]);

 variances.forEach((v,i)=>{
  const y=p.t+i*(barH+4)+2;
  const x1=cx+(v.lo-gMean)*scale;
  const x2=cx+(v.hi-gMean)*scale;
  ctx.fillStyle='#ff6b35';ctx.globalAlpha=0.8;
  ctx.fillRect(Math.min(x1,cx),y,Math.abs(x1-cx),barH);
  ctx.fillStyle='#4ade80';
  ctx.fillRect(cx,y,Math.max(x2-cx,0),barH);
  ctx.globalAlpha=1;

  ctx.fillStyle='#ccc';ctx.font='11px -apple-system,sans-serif';ctx.textAlign='right';
  const nameW=p.l+cw*0.08;
  ctx.fillText(v.name.length>16?v.name.slice(0,15)+'…':v.name,Math.min(x1,cx)-6,y+barH/2+4);
  ctx.fillStyle='#888';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='left';
  ctx.fillText(v.lo.toFixed(1),Math.min(x1,cx)-6,y+barH+10>p.t+ch?y-2:y+barH+10);
  ctx.textAlign='right';
  ctx.fillText(v.hi.toFixed(1),Math.max(x2,cx)+6,y+barH+10>p.t+ch?y-2:y+barH+10);
 });

 ctx.fillStyle='#999';ctx.font='12px -apple-system,sans-serif';ctx.textAlign='center';
 ctx.fillText('Task Impact on Duration (P10 – P90 range)',p.l+cw/2,p.t-10);
}

function evalTarget(){
 const td=parseFloat(document.getElementById('targetDur').value);
 const tc=parseFloat(document.getElementById('targetCost').value);
 if((!td&&!tc)||!simDur.length){document.getElementById('targetResult').innerHTML='';return;}
 let metBoth=0,metDur=0,metCost=0;
 for(let i=0;i<ITER;i++){
  const dm=!td||simDur[i]<=td,cm=!tc||simCost[i]<=tc;
  if(dm)metDur++;if(cm)metCost++;if(dm&&cm)metBoth++;
 }
 const pBoth=(metBoth/ITER*100),pDur=(metDur/ITER*100),pCost=(metCost/ITER*100);
 const cls=pBoth>80?'target-green':pBoth>50?'target-yellow':'target-red';
 let html=`<div class="target-result ${cls}">${pBoth.toFixed(1)}% probability of meeting ${td&&tc?'both targets':'target'}</div>`;
 if(td&&tc){
  html+=`<div style="margin-top:8px;font-size:.85rem;color:#999">Duration target: ${pDur.toFixed(1)}% &nbsp;|&nbsp; Cost target: ${pCost.toFixed(1)}%</div>`;
 }
 document.getElementById('targetResult').innerHTML=html;
}

function copyResults(){
 if(!simDur.length)return;
 const sd=sorted(simDur),sc=sorted(simCost);
 const pcts=[10,25,50,75,90,95];
 let txt='MONTE CARLO SIMULATION RESULTS\n';
 txt+='==============================\n';
 txt+=`Iterations: ${ITER}\nTasks: ${tasks.length}\n\n`;
 txt+='DURATION (days)\n';
 txt+=`  Mean: ${mean(simDur).toFixed(1)}  Median: ${percentile(sd,50).toFixed(1)}  StdDev: ${stddev(simDur,mean(simDur)).toFixed(1)}\n`;
 txt+=`  Min: ${sd[0].toFixed(1)}  Max: ${sd[sd.length-1].toFixed(1)}\n`;
 txt+='  '+pcts.map(p=>`P${p}: ${percentile(sd,p).toFixed(1)}`).join('  ')+'\n\n';
 txt+='COST ($)\n';
 txt+=`  Mean: ${fmtM(mean(simCost))}  Median: ${fmtM(percentile(sc,50))}  StdDev: ${fmtM(stddev(simCost,mean(simCost)))}\n`;
 txt+=`  Min: ${fmtM(sc[0])}  Max: ${fmtM(sc[sc.length-1])}\n`;
 txt+='  '+pcts.map(p=>`P${p}: ${fmtM(percentile(sc,p))}`).join('  ')+'\n';
 navigator.clipboard.writeText(txt).then(()=>{
  const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy Summary',1500);
 });
}

window.addEventListener('resize',()=>{if(simDur.length)drawChart();});
loadData();
if(!tasks.length)loadTemplate('kitchen');
</script>
