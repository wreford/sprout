<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requirements Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px;cursor:pointer}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
textarea{min-height:60px}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-red{background:#ef4444}
.btn:active{opacity:.8}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:8px;padding:12px;text-align:center}
.stat .v{font-size:1.4rem;font-weight:700;color:#ff6b35}
.stat .l{font-size:.7rem;color:#999;margin-top:2px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select{padding:10px;font-size:.9rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.req-card{background:#1a1a1c;border-left:4px solid #ff6b35;border-radius:8px;padding:12px;margin-bottom:8px;transition:all .2s}
.req-card .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.req-card .id{font-weight:700;color:#ff6b35;font-size:.85rem}
.req-card .title{font-size:.95rem;font-weight:600;margin:4px 0}
.req-card .desc{font-size:.85rem;color:#bbb;margin:4px 0}
.req-card .meta{font-size:.75rem;color:#999;display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;background:#2a2a2d}
.badge.must{color:#ef4444}.badge.should{color:#f7c948}.badge.could{color:#4ade80}.badge.wont{color:#999}
.del{background:none;border:none;color:#ef4444;font-size:1.1rem;cursor:pointer;padding:4px 8px}
.collapse{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse.open{max-height:900px}
.log{font-size:.7rem;color:#666;margin-top:6px;border-top:1px solid #2a2a2d;padding-top:4px}
.pbar{height:6px;background:#2a2a2d;border-radius:3px;overflow:hidden;margin-top:4px}
.pbar .fill{height:100%;border-radius:3px;transition:width .3s}
@media print{body{background:#fff;color:#000}.card,.req-card,.stat{border-color:#ccc;break-inside:avoid}.btn,.del,.filters,.home-link{display:none!important}}
</style>
</head>
<body>
<div class="header">
<a href="../index.html" class="home-link">&#8592;</a>
<h1>Requirements Tracker</h1>
<button class="btn btn-sm btn-green" onclick="exportData()">Export</button>
</div>
<div class="stats" id="stats"></div>
<div class="card">
<h2 onclick="toggleForm()">&#43; Add Requirement &#9662;</h2>
<div class="collapse" id="formWrap">
<div class="row">
<div class="field"><label>Title</label><input id="rTitle"></div>
</div>
<div class="row"><div class="field"><label>Description</label><textarea id="rDesc"></textarea></div></div>
<div class="row">
<div class="field"><label>Category</label><select id="rCat"><option>Functional</option><option>Performance</option><option>Safety</option><option>Code</option><option>Client</option><option>Design</option></select></div>
<div class="field"><label>Priority (MoSCoW)</label><select id="rPri"><option>Must</option><option>Should</option><option>Could</option><option>Won't</option></select></div>
<div class="field"><label>Status</label><select id="rStat"><option>Draft</option><option>Approved</option><option>Implemented</option><option>Verified</option><option>Changed</option></select></div>
</div>
<div class="row">
<div class="field"><label>Source</label><input id="rSrc" placeholder="Who requested"></div>
<div class="field"><label>Parent Req ID (e.g. REQ-001)</label><input id="rParent" placeholder="Optional"></div>
</div>
<div class="row"><div class="field"><label>Acceptance Criteria</label><textarea id="rAcc"></textarea></div></div>
<button class="btn" onclick="addReq()">Add Requirement</button>
</div>
</div>
<div class="filters">
<select id="fCat" onchange="render()"><option value="">All Categories</option><option>Functional</option><option>Performance</option><option>Safety</option><option>Code</option><option>Client</option><option>Design</option></select>
<select id="fPri" onchange="render()"><option value="">All Priorities</option><option>Must</option><option>Should</option><option>Could</option><option>Won't</option></select>
<select id="fStat" onchange="render()"><option value="">All Status</option><option>Draft</option><option>Approved</option><option>Implemented</option><option>Verified</option><option>Changed</option></select>
</div>
<div id="list"></div>
<script>
const KEY='requirements-data';
let reqs=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(reqs))}
function toggleForm(){document.getElementById('formWrap').classList.toggle('open')}
function nextId(){const n=reqs.length?Math.max(...reqs.map(r=>r.num))+1:1;return n}
function fmtId(n){return 'REQ-'+String(n).padStart(3,'0')}
function addReq(){
 const t=document.getElementById('rTitle').value.trim();if(!t)return;
 const num=nextId();
 reqs.push({num,title:t,desc:document.getElementById('rDesc').value.trim(),
  cat:document.getElementById('rCat').value,pri:document.getElementById('rPri').value,
  status:document.getElementById('rStat').value,src:document.getElementById('rSrc').value.trim(),
  parent:document.getElementById('rParent').value.trim(),acc:document.getElementById('rAcc').value.trim(),
  log:[{status:document.getElementById('rStat').value,time:new Date().toISOString()}]});
 save();['rTitle','rDesc','rSrc','rParent','rAcc'].forEach(id=>document.getElementById(id).value='');render();
}
function delReq(num){reqs=reqs.filter(r=>r.num!==num);save();render()}
function changeStatus(num,newS){
 const r=reqs.find(x=>x.num===num);if(!r||r.status===newS)return;
 r.status=newS;r.log.push({status:newS,time:new Date().toISOString()});save();render();
}
function pct(st){const t=reqs.length;return t?Math.round(reqs.filter(r=>r.status===st||
 (['Approved','Implemented','Verified'].indexOf(r.status)>=(['Approved','Implemented','Verified'].indexOf(st))&&['Approved','Implemented','Verified'].includes(r.status)&&['Approved','Implemented','Verified'].includes(st))?false:false).length/t*100):0}
function render(){
 const fc=document.getElementById('fCat').value,fp=document.getElementById('fPri').value,fs=document.getElementById('fStat').value;
 let f=reqs.filter(r=>(!fc||r.cat===fc)&&(!fp||r.pri===fp)&&(!fs||r.status===fs));
 const t=reqs.length,ap=t?Math.round(reqs.filter(r=>['Approved','Implemented','Verified'].includes(r.status)).length/t*100):0;
 const imp=t?Math.round(reqs.filter(r=>['Implemented','Verified'].includes(r.status)).length/t*100):0;
 const ver=t?Math.round(reqs.filter(r=>r.status==='Verified').length/t*100):0;
 document.getElementById('stats').innerHTML=`<div class="stat"><div class="v">${t}</div><div class="l">Total</div></div>
  <div class="stat"><div class="v" style="color:#4ade80">${ap}%</div><div class="l">Approved+</div>
  <div class="pbar"><div class="fill" style="width:${ap}%;background:#4ade80"></div></div></div>
  <div class="stat"><div class="v" style="color:#f7c948">${imp}%</div><div class="l">Implemented+</div>
  <div class="pbar"><div class="fill" style="width:${imp}%;background:#f7c948"></div></div></div>
  <div class="stat"><div class="v" style="color:#ff6b35">${ver}%</div><div class="l">Verified</div>
  <div class="pbar"><div class="fill" style="width:${ver}%;background:#ff6b35"></div></div></div>`;
 document.getElementById('list').innerHTML=f.map(r=>{
  const pc=r.pri.toLowerCase().replace("'",'');
  const children=reqs.filter(c=>c.parent===fmtId(r.num)).map(c=>fmtId(c.num)).join(', ');
  return `<div class="req-card">
  <div class="top"><div><span class="id">${fmtId(r.num)}</span> <span class="badge ${pc}">${r.pri}</span>
  <span class="badge">${r.cat}</span></div>
  <div><select onchange="changeStatus(${r.num},this.value)" style="padding:6px;background:#0f0f10;border:1px solid #2a2a2d;border-radius:4px;color:#e0e0e0;font-size:.8rem">
  ${['Draft','Approved','Implemented','Verified','Changed'].map(s=>`<option${r.status===s?' selected':''}>${s}</option>`).join('')}</select>
  <button class="del" onclick="delReq(${r.num})">&#10005;</button></div></div>
  <div class="title">${r.title}</div>
  ${r.desc?'<div class="desc">'+r.desc+'</div>':''}
  ${r.acc?'<div class="desc" style="color:#4ade80">&#10003; '+r.acc+'</div>':''}
  <div class="meta">${r.src?'<span>Source: '+r.src+'</span>':''}${r.parent?'<span>Parent: '+r.parent+'</span>':''}${children?'<span>Children: '+children+'</span>':''}</div>
  ${r.log.length>1?'<div class="log">'+r.log.map(e=>e.status+' @ '+new Date(e.time).toLocaleDateString()).join(' → ')+'</div>':''}
  </div>`}).join('');
}
function exportData(){
 let t='REQUIREMENTS TRACKER\n'+new Date().toLocaleDateString()+'\n\n';
 reqs.forEach(r=>{t+=`${fmtId(r.num)}: ${r.title}\n  Priority:${r.pri} | Category:${r.cat} | Status:${r.status}\n`;
  if(r.desc)t+=`  Description: ${r.desc}\n`;if(r.acc)t+=`  Acceptance: ${r.acc}\n`;
  if(r.src)t+=`  Source: ${r.src}\n`;if(r.parent)t+=`  Parent: ${r.parent}\n`;t+='\n';});
 navigator.clipboard.writeText(t).then(()=>alert('Copied to clipboard'));
}
render();
</script>
</body>
</html>
