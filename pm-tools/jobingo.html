<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Job Site Bingo</title><style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:600px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.5em;margin:8px 0 4px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:12px 0}
.cell{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px;font-size:11px;text-align:center;cursor:pointer;min-height:68px;display:flex;align-items:center;justify-content:center;transition:all .2s;user-select:none;line-height:1.3}
.cell:hover{border-color:var(--accent)}.cell.marked{background:#ff6b3533;border-color:var(--accent);color:var(--accent);font-weight:600}
.cell.free{background:var(--accent);color:#fff;font-weight:700;font-size:12px}
.cell.win{animation:pulse .5s ease infinite alternate}
@keyframes pulse{from{box-shadow:0 0 5px var(--accent)}to{box-shadow:0 0 20px var(--accent)}}
.header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin:8px 0}
button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}button:hover{opacity:.85}
.sm{padding:5px 12px;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text)}
.stat{color:var(--dim);font-size:13px}.stat b{color:var(--green)}
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99}
.banner{text-align:center;font-size:2em;font-weight:800;color:var(--accent);margin:12px 0;display:none;text-transform:uppercase;letter-spacing:4px}
.seed-box{font-size:12px;color:var(--dim);margin:8px 0;word-break:break-all}
.seed-box input{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;width:140px}
</style></head><body>
<a class="home" href="../index.html">&larr; home</a>
<h1>&#x1f3b2; Construction Job Site Bingo</h1>
<div class="header">
<button onclick="newCard()">&#x1f504; New Card</button>
<span class="stat">Wins: <b id="wins">0</b></span>
<button class="sm" onclick="shareSeed()">&#x1f517; Share Card</button>
</div>
<div class="seed-box">Seed: <input id="seedIn" value="" onchange="loadSeed()"> <button class="sm" onclick="loadSeed()">Load</button></div>
<div class="grid" id="board"></div>
<div class="banner" id="banner">B I N G O !</div>
<canvas id="confetti" width="600" height="800"></canvas>
<script>
const EVENTS=[
"Someone says 'that's not in my scope'","Coffee machine breaks","Architect visits & changes something","Rain delay","Someone loses their hard hat",
"Porta-potty out of paper","Tool goes missing","Surprise inspection","Concrete truck arrives late","Client brings their spouse",
"Someone falls asleep in break room","Forklift gets stuck","Wrong material delivered","Power outage","Radio plays same song twice",
"Bird poops on someone","Safety guy catches PPE violation","Lunch truck arrives","Someone says 'back in my day...'","Sub no-shows",
"Drawing error found","WiFi goes down","Someone brings donuts","Near miss incident","Tool battery dies at worst time",
"GC asks for updated schedule","Porta-potty door won't lock","Someone backs into a cone","Crane shows up a day early","Argument about thermostat",
"Someone measures wrong","'This will only take 5 minutes' (takes 2 hours)","Mysterious puddle appears","Fire watch falls asleep","Hard hat used as a bowl",
"Someone says 'we've always done it this way'","Blueprint doesn't match field","Two trades blocking each other","Someone trips on a cord","Owner's rep takes 45 photos",
"Heated debate about best tape measure","Phone charger goes missing","Someone's truck alarm goes off","Apprentice asks obvious question","Journeyman gives wrong answer to obvious question",
"Dumpster overflowing","Elevator out of service","Meeting about a meeting","Temp worker disappears after lunch","Someone sits on wet paint",
"'That wall was supposed to be there'","Tool theft suspicion","Generator runs out of fuel","Someone locks keys in truck","Delivery shows up at wrong entrance",
"Foreman lost in thought staring at prints","Safety meeting runs 3x too long","Client changes paint color again","Port-a-john tips in the wind","Someone welds near the smoke detector",
"Saw blade breaks","Compressor won't start","Someone discovers they've been reading an old revision","The new guy is actually good","Someone duct-tapes a 'temporary' fix that becomes permanent"
];
let seed,cells,marked,wins=+(localStorage.getItem('bingo_wins')||0);
document.getElementById('wins').textContent=wins;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function shuffle(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*a.length);[a[i],a[j]]=[a[j],a[i]]}return a}
function newCard(){seed=Math.floor(Math.random()*1e8);document.getElementById('seedIn').value=seed;buildBoard()}
function loadSeed(){seed=parseInt(document.getElementById('seedIn').value)||0;buildBoard()}
function buildBoard(){
  const rng=mulberry32(seed),pool=shuffle(EVENTS,rng).slice(0,24);
  cells=[];marked=new Array(25).fill(false);marked[12]=true;
  pool.splice(12,0,"FREE SPACE");cells=pool;
  document.getElementById('banner').style.display='none';render();
}
function render(){
  document.getElementById('board').innerHTML=cells.map((c,i)=>{
    const cls=i===12?'cell free':marked[i]?'cell marked':'cell';
    return`<div class="${cls}" onclick="toggle(${i})">${c}</div>`}).join('');
}
function toggle(i){if(i===12)return;marked[i]=!marked[i];render();checkWin()}
function checkWin(){
  const lines=[];
  for(let r=0;r<5;r++){lines.push([0,1,2,3,4].map(c=>r*5+c));lines.push([0,1,2,3,4].map(c=>c*5+r))}
  lines.push([0,6,12,18,24]);lines.push([4,8,12,16,20]);
  let won=false;
  for(const ln of lines){if(ln.every(i=>marked[i])){won=true;ln.forEach(i=>{const el=document.getElementById('board').children[i];if(el)el.classList.add('win')})}}
  if(won){document.getElementById('banner').style.display='block';launchConfetti();
    if(!localStorage.getItem('bingo_won_'+seed)){wins++;localStorage.setItem('bingo_wins',wins);localStorage.setItem('bingo_won_'+seed,'1');document.getElementById('wins').textContent=wins}}
}
function shareSeed(){const url=location.origin+location.pathname+'?seed='+seed;navigator.clipboard.writeText(url).then(()=>alert('Card link copied! Share with your crew.'))}
const ccv=document.getElementById('confetti'),ccx=ccv.getContext('2d');let particles=[];
function launchConfetti(){
  particles=[];for(let i=0;i<120;i++)particles.push({x:Math.random()*600,y:Math.random()*-400,vx:(Math.random()-.5)*6,vy:Math.random()*4+2,c:['#ff6b35','#4ade80','#3b82f6','#fbbf24','#ec4899','#a855f7'][Math.floor(Math.random()*6)],s:Math.random()*6+3,r:Math.random()*360,rv:(Math.random()-.5)*10});
  animConfetti();
}
function animConfetti(){
  ccx.clearRect(0,0,600,800);let alive=false;
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.r+=p.rv;
    if(p.y<850){alive=true;ccx.save();ccx.translate(p.x,p.y);ccx.rotate(p.r*Math.PI/180);ccx.fillStyle=p.c;ccx.fillRect(-p.s/2,-p.s/2,p.s,p.s);ccx.restore()}});
  if(alive)requestAnimationFrame(animConfetti);else ccx.clearRect(0,0,600,800);
}
const params=new URLSearchParams(location.search);
if(params.has('seed')){seed=parseInt(params.get('seed'))||0;document.getElementById('seedIn').value=seed;buildBoard()}else newCard();
</script></body></html>
