// ── Dice (standard Boggle 4x4 dice)
var DICE = [
  "AAEEGN","ABBJOO","ACHOPS","AFFKPS",
  "AOOTTW","CIMOTU","DEILRX","DELRVY",
  "DISTTY","EEGHNW","EEINSU","EHRTVW",
  "EIOSST","ELRTTY","HIMNUQ","HLNNRZ"
];

function rollBoard() {
  var shuffled = DICE.slice().sort(function() { return Math.random() - 0.5; });
  return shuffled.map(function(die) { return die[Math.floor(Math.random() * 6)]; });
}

// ── Path finding (check if word can be formed on board)
function canForm(word, board) {
  var size = 4;
  var adj = function(i) {
    var r = Math.floor(i/size), c = i%size, out = [];
    for (var dr = -1; dr <= 1; dr++) for (var dc = -1; dc <= 1; dc++) {
      if (dr===0&&dc===0) continue;
      var nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<size&&nc>=0&&nc<size) out.push(nr*size+nc);
    }
    return out;
  };
  var dfs = function(idx, pos, visited) {
    if (idx === word.length) return true;
    var neighbors = adj(pos);
    for (var n = 0; n < neighbors.length; n++) {
      var next = neighbors[n];
      if (!visited[next] && board[next] === word[idx]) {
        visited[next] = true;
        if (dfs(idx+1, next, visited)) return true;
        visited[next] = false;
      }
    }
    return false;
  };
  for (var i = 0; i < 16; i++) {
    if (board[i] === word[0]) {
      var v = {}; v[i] = true;
      if (dfs(1, i, v)) return true;
    }
  }
  return false;
}

// ── Find ALL valid words on a board
function findAllWords(board) {
  var results = [];
  VALID.forEach(function(word) {
    if (canForm(word, board)) results.push(word);
  });
  return results.sort(function(a,b) { return a.length - b.length || a.localeCompare(b); });
}

// ── Generate a board guaranteed to have at least 10 valid words
function generateGoodBoard() {
  var maxAttempts = 50;
  for (var i = 0; i < maxAttempts; i++) {
    var board = rollBoard();
    var words = findAllWords(board);
    if (words.length >= 10) return { board: board, allWords: words };
  }
  // fallback: return last attempt anyway
  var board = rollBoard();
  return { board: board, allWords: findAllWords(board) };
}

// ── High Score
var HS_KEY = "loggle_high_scores";
function getHighScores() {
  try { return JSON.parse(localStorage.getItem(HS_KEY)) || []; } catch(e) { return []; }
}
function saveHighScore(score, words, duration) {
  var scores = getHighScores();
  scores.push({ score: score, words: words, duration: duration, date: new Date().toISOString() });
  scores.sort(function(a,b) { return b.score - a.score; });
  scores = scores.slice(0, 10); // keep top 10
  localStorage.setItem(HS_KEY, JSON.stringify(scores));
  return scores;
}
function isNewHighScore(score) {
  var scores = getHighScores();
  if (scores.length < 10) return true;
  return score > scores[scores.length - 1].score;
}

  var board = boardData.board;
  var allWords = boardData.allWords;

  var [time, setTime] = useState(props.duration);
  var [gameOver, setGameOver] = useState(false);
  var [score, setScore] = useState(0);
  var [selected, setSelected] = useState([]);
  var [dragging, setDragging] = useState(false);
  var [gif, setGif] = useState(null);
  var [timeMsg, setTimeMsg] = useState("");
  var [glowTiles, setGlowTiles] = useState({});
  var [showMissed, setShowMissed] = useState(false);
  var [finalScores, setFinalScores] = useState(null);
  var [isNewHS, setIsNewHS] = useState(false);
  var cellRefs = useRef([]);

  // Timer
  useEffect(function() {
    if (gameOver) return;
    var iv = setInterval(function() {
      setTime(function(t) {
        if (t <= 1) { setGameOver(true); sndFlush(); return 0; }
        if (t === 60) setTimeMsg(pick(TIME_MSGS));
        if (t === 30) setTimeMsg("30 seconds! PUSH!");
        if (t === 10) setTimeMsg("💩 FINAL PUSH!");
        return t - 1;
      });
    }, 1000);
    return function() { clearInterval(iv); };
  }, [gameOver]);

  // Save high score on game over
  useEffect(function() {
    if (gameOver && score > 0) {
      var newHS = isNewHighScore(score);
      setIsNewHS(newHS);
      var scores = saveHighScore(score, found.length, props.duration);
      setFinalScores(scores);
    }
  }, [gameOver]);

  // Haptic glow effect on tiles
  var triggerGlow = function(idx, delay) {
    setTimeout(function() {
      setGlowTiles(function(g) { var n = Object.assign({}, g); n[idx] = true; return n; });
      sndTile(idx);
      setTimeout(function() {
        setGlowTiles(function(g) { var n = Object.assign({}, g); delete n[idx]; return n; });
      }, 400);
    }, delay);
  };

  var submitWord = function(word) {
    if (word.length < 3) { setMessage("Too short! 3+ letters."); setMsgClass("wiggle"); sndBad(); setTimeout(function(){setMsgClass("");},300); return; }
    if (found.includes(word)) { setMessage("Already found that one!"); sndBad(); return; }
    if (!canForm(word, board)) { setMessage(pick(BAD_MSGS)); setMsgClass("wiggle"); sndBad(); setTimeout(function(){setMsgClass("");},300); return; }
    if (!VALID.has(word)) { setMessage("Not a word. " + pick(BAD_MSGS)); sndBad(); return; }
    // Valid!
    var pts = word.length === 3 ? 1 : word.length === 4 ? 2 : word.length === 5 ? 4 : 6;
    setFound(function(f) { return f.concat([word]); });
    setScore(function(s) { return s + pts; });
    setMessage(pick(POOP_MSGS) + " +" + pts);
    setMsgClass("plop");
    sndGood(); sndPlop();
    setTimeout(function(){setMsgClass("");},400);

    // Haptic ripple: light up selected tiles in sequence
    selected.forEach(function(tileIdx, i) { triggerGlow(tileIdx, i * 80); });

    if ((found.length + 1) % 5 === 0) {
      fetchGif("poop emoji funny").then(function(g) { setGif(g); setTimeout(function(){setGif(null);},3000); });
    }
  };

  // Keyboard input
  var onKey = function(key) {
    if (gameOver) return;
    if (key === "ENTER") { if(current.length>=3) submitWord(current); setCurrent(""); setSelected([]); return; }
    if (key === "BACKSPACE") { setCurrent(function(c){return c.slice(0,-1);}); setSelected(function(s){return s.slice(0,-1);}); return; }
    if (/^[A-Z]$/.test(key)) { setCurrent(function(c){return c+key;}); }
  };

  useEffect(function() {
    var handler = function(e) {
      if (e.ctrlKey||e.metaKey) return;
      var k = e.key.toUpperCase();
      if (k==="ENTER"||k==="BACKSPACE"||(/^[A-Z]$/.test(k)&&k.length===1)) { e.preventDefault(); onKey(k); }
    };
    window.addEventListener("keydown", handler);
    return function() { window.removeEventListener("keydown", handler); };
  });

  // Touch/drag on grid
  var getCellFromTouch = function(touch) {
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el && el.dataset && el.dataset.idx !== undefined) return parseInt(el.dataset.idx);
    return -1;
  };

    setDragging(true);
    setSelected([idx]);
    setCurrent(board[idx]);
    triggerGlow(idx, 0);
  };

    if (!dragging || gameOver) return;

    // Debounce: require 80ms between selections to prevent accidental swipes

    var last = selected[selected.length - 1];

      lastMoveTime.current = now;
      setSelected(function(s){return s.concat([idx]);});
      setCurrent(function(c){return c+board[idx];});
      triggerGlow(idx, 0);
    }
  };

  var handleCellEnd = function() {
    if (!dragging) return;
    setDragging(false);
    if (current.length >= 3) submitWord(current);
    setCurrent(""); setSelected([]);

        {/* High Scores */}
        {finalScores && finalScores.length > 0 && (
          <div style={{width:"100%",maxWidth:340,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 14px"}}>
            <div style={{fontSize:"0.72rem",color:"var(--gold)",fontFamily:"var(--font-mono)",marginBottom:6,fontWeight:700,textAlign:"center"}}>🏆 Top Dumps (High Scores)</div>
            {finalScores.slice(0, 5).map(function(hs, i) {
              return (
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"0.65rem",fontFamily:"var(--font-mono)",color:i===0?"var(--gold)":"var(--dim)",padding:"2px 0"}}>
                  <span>#{i+1}</span>
                  <span>{hs.score} pts</span>
                  <span>{hs.words} words</span>
                  <span>{Math.floor(hs.duration/60)}min</span>
                </div>
              );
            })}
          </div>
        )}

        <button onClick={props.onRestart} style={{marginTop:4,background:"var(--poop)",border:"2px solid var(--gold)",borderRadius:8,padding:"12px 28px",color:"var(--gold)",fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>💩 GO AGAIN</button>
        <a href="index.html" style={{fontSize:"0.7rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textDecoration:"none",marginBottom:16}}>← back to taskiap.com</a>
      </div>
    );
  }

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 8px 0",overflow:"hidden"}}
      onTouchMove={function(e){var idx=getCellFromTouch(e.touches[0]);handleCellMove(idx);}}
      onTouchEnd={handleCellEnd}
      onMouseUp={handleCellEnd}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,width:"100%",maxWidth:380,padding:"4px 6px",marginBottom:4}}>
        <span style={{fontSize:"1.3rem"}}>💩</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1.1rem",fontWeight:800,letterSpacing:"0.06em",color:"var(--gold)"}}>LOGGLE</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,color:time<=30?"var(--red)":"var(--text)",marginLeft:"auto"}}>{fmtTime(time)}</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"0.8rem",color:"var(--gold)",fontWeight:700}}>{score}pts</span>
      </div>

      {/* Message */}
      <div className={msgClass} style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",color:"var(--dim)",margin:"2px 0",padding:"3px 10px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:5,minHeight:22,textAlign:"center"}}>
        {timeMsg || message}
      </div>

      {/* Board info */}
      <div style={{fontFamily:"var(--font-mono)",fontSize:"0.6rem",color:"var(--dim)",margin:"2px 0",opacity:0.5}}>
        {allWords.length} words hiding on this board
      </div>

      {/* Current word */}
      <div style={{fontFamily:"var(--font-mono)",fontSize:"1.3rem",fontWeight:800,letterSpacing:"0.12em",color:"var(--gold)",margin:"4px 0",minHeight:30}}>
        {current || " "}
      </div>

      {/* Board */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,margin:"4px 0",touchAction:"none",userSelect:"none"}}>
        {board.map(function(letter, idx) {
          var isSelected = selected.includes(idx);
          var isGlowing = glowTiles[idx];
          return (
            <div key={idx} data-idx={idx}
              className={isGlowing ? "tile-glow" : ""}
              onMouseDown={function(){handleCellStart(idx);}}
              onMouseEnter={function(){if(dragging)handleCellMove(idx);}}
              onTouchStart={function(e){e.preventDefault();handleCellStart(idx);}}
              style={{
                width:cellSize, height:cellSize, display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:(cellSize*0.45)+"px", fontWeight:800, fontFamily:"var(--font-mono)",
                background:isGlowing?"var(--gold)":isSelected?"var(--poop)":"var(--bg2)",
                border:isSelected||isGlowing?"2px solid var(--gold)":"2px solid var(--border)",
                borderRadius:10, color:isGlowing?"var(--bg)":isSelected?"var(--gold)":"var(--text)",
                cursor:"pointer", transition:"background 0.15s, color 0.15s, border 0.15s",
                boxShadow:isGlowing?"0 0 18px rgba(212,160,23,0.7)":isSelected?"0 0 12px rgba(212,160,23,0.3)":"none",
                transform:isGlowing?"scale(1.1)":isSelected?"scale(1.05)":"scale(1)"
              }}>
              {letter === "Q" ? "Qu" : letter}
            </div>
          );
        })}
      </div>

      {/* Gif */}
      {gif && <img src={gif} alt="" style={{width:120,height:90,objectFit:"cover",borderRadius:8,margin:"6px 0",border:"1px solid var(--border)"}} />}

      {/* Found words */}
      <div style={{margin:"6px 0",fontSize:"0.65rem",fontFamily:"var(--font-mono)",color:"var(--dim)",maxWidth:320,textAlign:"center",lineHeight:1.8,flex:"1",overflow:"auto"}}>
        {found.map(function(w,i){return <span key={i} className="plop" style={{display:"inline-block",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:4,padding:"2px 5px",margin:2}}>{w} 💩</span>;})}
      </div>

      {/* Bottom keyboard row for quick typing */}
      <div style={{display:"flex",gap:4,paddingBottom:8,width:"100%",maxWidth:380}}>
        <button onClick={function(){onKey("BACKSPACE");}} style={{flex:1,height:44,borderRadius:6,border:"none",background:"var(--bg3)",color:"var(--red)",fontFamily:"var(--font-mono)",fontSize:"0.8rem",fontWeight:700,cursor:"pointer"}}>⌫</button>
        <button onClick={function(){if(current.length>=3)submitWord(current);setCurrent("");setSelected([]);}} style={{flex:3,height:44,borderRadius:6,border:"2px solid var(--gold)",background:"var(--poop)",color:"var(--gold)",fontFamily:"var(--font-mono)",fontSize:"0.95rem",fontWeight:800,letterSpacing:"0.1em",cursor:"pointer"}}>SUBMIT 💩</button>
        <button onClick={function(){setCurrent("");setSelected([]);}} style={{flex:1,height:44,borderRadius:6,border:"none",background:"var(--bg3)",color:"var(--dim)",fontFamily:"var(--font-mono)",fontSize:"0.7rem",fontWeight:700,cursor:"pointer"}}>CLR</button>
      </div>
    </div>
  );
}

// ── Splash
function Splash(props) {
  var [gif, setGif] = useState(null);
  var [duration, setDuration] = useState(120);
  var highScores = getHighScores();
  useEffect(function(){fetchGif("poop emoji").then(setGif);},[]);

  var durations = [
    { label: "1 min", value: 60, emoji: "💨" },
    { label: "2 min", value: 120, emoji: "💩" },
    { label: "3 min", value: 180, emoji: "🪠" },
  ];

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",gap:"0.8rem",overflow:"auto"}}>
      {gif ? <img src={gif} alt="" style={{width:140,height:100,objectFit:"cover",borderRadius:12,border:"1px solid var(--border)"}}/> : <div style={{fontSize:"3.5rem"}} className="float">💩</div>}
      <div style={{fontFamily:"var(--font-mono)",fontSize:"clamp(2rem,10vw,3rem)",fontWeight:800,letterSpacing:"0.08em",color:"var(--gold)"}}>LOGGLE</div>
      <div style={{fontSize:"0.82rem",color:"var(--dim)",textAlign:"center",maxWidth:280,lineHeight:1.5}}>Poop-themed Boggle. Find words on the grid before time runs out. Best played on the throne. 🚽</div>
      <div style={{fontSize:"0.7rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textAlign:"center",lineHeight:1.8,maxWidth:260}}>
        <b>3 letters</b> = 1pt &nbsp; <b>4</b> = 2pt &nbsp; <b>5+</b> = 4pt<br/>
        Swipe tiles or type. See all missed words at the end!
      </div>

      {/* Timer selector */}
      <div style={{display:"flex",gap:6,margin:"4px 0"}}>
        {durations.map(function(d) {
          var active = duration === d.value;
          return (
            <button key={d.value} onClick={function(){setDuration(d.value);}}
              style={{
                padding:"8px 14px",borderRadius:8,cursor:"pointer",
                fontFamily:"var(--font-mono)",fontSize:"0.8rem",fontWeight:700,
                background:active?"var(--poop)":"var(--bg2)",
                border:active?"2px solid var(--gold)":"2px solid var(--border)",
                color:active?"var(--gold)":"var(--dim)",
                transition:"all 0.2s"
              }}>
              {d.emoji} {d.label}
            </button>
          );
        })}
      </div>

      <button onClick={function(){props.onStart(duration);}} style={{marginTop:4,background:"var(--poop)",border:"2px solid var(--gold)",borderRadius:10,padding:"14px 32px",color:"var(--gold)",fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,letterSpacing:"0.1em",cursor:"pointer"}}>
        💩 DROP IN
      </button>

      {/* High Scores on splash */}
      {highScores.length > 0 && (
        <div style={{width:"100%",maxWidth:300,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 14px",marginTop:4}}>
          <div style={{fontSize:"0.72rem",color:"var(--gold)",fontFamily:"var(--font-mono)",marginBottom:6,fontWeight:700,textAlign:"center"}}>🏆 Top Dumps</div>
          {highScores.slice(0, 5).map(function(hs, i) {
            return (
              <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"0.65rem",fontFamily:"var(--font-mono)",color:i===0?"var(--gold)":"var(--dim)",padding:"2px 0"}}>
                <span>#{i+1}</span>
                <span>{hs.score} pts</span>
                <span>{hs.words} words</span>
                <span>{Math.floor(hs.duration/60)}min</span>
              </div>
            );
          })}
        </div>
      )}

      <a href="index.html" style={{marginTop:4,fontSize:"0.65rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textDecoration:"none"}}>← taskiap.com</a>
    </div>
  );
}

// ── App
function App() {
  var [playing, setPlaying] = useState(false);
  var [key, setKey] = useState(0);
  var [duration, setDuration] = useState(120);
  var restart = function() { setKey(function(k){return k+1;}); };
  if (!playing) return <Splash onStart={function(d){setDuration(d);setPlaying(true);}} />;
  return <Game key={key} duration={duration} onRestart={restart} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

function fetchGif(tag) {
  return fetch("https://api.giphy.com/v1/gifs/random?api_key=dc6zaTOxFJmzC&tag="+encodeURIComponent(tag)+"&rating=g")
    .then(function(r){return r.json();})
    .then(function(d){return d.data&&d.data.images&&d.data.images.fixed_height?d.data.images.fixed_height.url:null;})
    .catch(function(){return null;});
}

  <div style="position:fixed;bottom:2px;right:4px;font-size:0.5rem;color:#3d2e14;font-family:monospace">build-20260517-6</div>
</body>
