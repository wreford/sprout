<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a10">
<meta name="description" content="WTF-Slots — the food roulette that films your reaction. Spin, react, share.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WTF-Slots">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff375f'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='20'%3E%F0%9F%8E%B0%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff375f'/%3E%3Cstop offset='1' stop-color='%23ffcc00'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='90' y='128' text-anchor='middle' font-size='108'%3E%F0%9F%8E%B0%3C/text%3E%3C/svg%3E">
<title>WTF-Slots — react to what the food gods gave you</title>
<style>
:root{
  --bg:#0a0a10; --bg2:#12121a; --panel:#191926; --panel2:#22222e; --border:#26262e; --border2:#3a3a48;
  --text:#f5f5f7; --dim:#8a8a98; --dimmer:#5a5a68;
  --hot:#ff375f; --amber:#ffcc00; --lime:#c8ff2f; --pink:#ff2d92; --violet:#bf5af2; --green:#30d158;
  --disp:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;height:100%}
html,body{background:#000;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
body{
  min-height:100vh;min-height:100dvh;
  padding-bottom:env(safe-area-inset-bottom);
  background:
    radial-gradient(1000px 500px at 20% -10%,rgba(255,55,95,.28),transparent 55%),
    radial-gradient(700px 500px at 80% 110%,rgba(255,204,0,.14),transparent 55%),
    radial-gradient(600px 400px at 50% 50%,rgba(191,90,242,.08),transparent 60%),
    var(--bg)
}
button,a,input,select{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input,select{font-size:16px}
a{color:var(--hot);text-decoration:none}
::selection{background:rgba(255,55,95,.4);color:#fff}

/* ══════ Layout ══════ */
.wrap{max-width:520px;margin:0 auto;padding:0 18px;min-height:100dvh;display:flex;flex-direction:column;position:relative}
.top{
  padding:calc(env(safe-area-inset-top) + 12px) 4px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0
}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit}
.brand-mark{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--hot),var(--amber));
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
  box-shadow:0 6px 18px rgba(255,55,95,.35)
}
.brand .n{font-family:var(--disp);font-weight:900;font-size:16px;line-height:1;letter-spacing:-.005em}
.brand .t{font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin-top:3px}
.icon-btn{
  width:40px;height:40px;border-radius:10px;background:var(--panel);border:1px solid var(--border);
  color:var(--text);display:flex;align-items:center;justify-content:center;font-size:15px;
  text-decoration:none
}
.icon-btn:hover{color:var(--hot);border-color:var(--hot)}

.scene{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0 24px;position:relative;min-height:0}

/* ══════ Intro ══════ */
.intro{text-align:center;padding:14px 0}
.intro .eye{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--dim);
  text-transform:uppercase;margin-bottom:14px
}
.intro h1{
  font-family:var(--disp);font-weight:900;letter-spacing:-.03em;
  font-size:clamp(46px,12vw,84px);line-height:.9;margin-bottom:14px
}
.intro h1 .g{
  background:linear-gradient(120deg,var(--amber) 0%,var(--hot) 50%,var(--pink) 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.intro h1 .g2{
  background:linear-gradient(120deg,var(--pink),var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.intro .sub{
  color:var(--dim);font-size:15px;line-height:1.5;max-width:400px;margin:0 auto 18px;font-style:italic
}
.intro .sub b{color:var(--text);font-style:normal;font-weight:600}

.rules{
  display:flex;flex-direction:column;gap:8px;max-width:340px;margin:0 auto 24px;
  padding:14px 16px;background:var(--panel);border:1px solid var(--border);border-radius:14px
}
.rule{display:flex;gap:10px;align-items:baseline;text-align:left}
.rule .num{
  font-family:var(--mono);font-size:10px;color:var(--hot);letter-spacing:.1em;
  font-weight:700;min-width:22px;line-height:1.6
}
.rule .txt{font-size:13.5px;line-height:1.5;color:var(--text)}
.rule .txt em{color:var(--dim);font-style:italic}

.bigbtn{
  display:inline-flex;align-items:center;gap:12px;padding:18px 34px;
  background:linear-gradient(135deg,var(--hot),var(--pink));
  color:#fff;border:none;border-radius:16px;
  font-family:var(--disp);font-weight:900;font-size:22px;letter-spacing:-.005em;
  cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s var(--ease);
  box-shadow:0 12px 34px rgba(255,55,95,.45);
  text-transform:uppercase;font-style:italic;min-height:56px
}
.bigbtn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 42px rgba(255,55,95,.55)}
.bigbtn:active{transform:translateY(0) scale(.98)}
.bigbtn .ic{font-size:26px}
.bigbtn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--border2);box-shadow:none}
.bigbtn.ghost:hover{border-color:var(--hot);color:var(--hot);background:var(--panel)}
.bigbtn.busy{pointer-events:none;opacity:.6}
.bigbtn.busy .ic{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{margin-top:14px;font-family:var(--mono);font-size:10.5px;color:var(--dimmer);letter-spacing:.06em;font-style:italic}
.hint b{color:var(--dim);font-style:normal}

/* ══════ Slot machine ══════ */
.slot-frame{
  position:relative;
  width:100%;
  aspect-ratio:1/1;max-height:66vh;
  border-radius:22px;overflow:hidden;
  background:
    linear-gradient(180deg,rgba(255,55,95,.08),rgba(191,90,242,.05)),
    #000;
  border:2px solid rgba(255,55,95,.3);
  box-shadow:0 20px 60px rgba(0,0,0,.5),
    inset 0 0 0 1px rgba(255,255,255,.03),
    inset 0 30px 60px rgba(0,0,0,.5),
    inset 0 -30px 60px rgba(0,0,0,.5);
  animation:slot-in .4s var(--ease)
}
@keyframes slot-in{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}

.slot-reels{
  position:absolute;inset:14px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;
  border-radius:14px;overflow:hidden
}
.reel{
  position:relative;
  height:100%;overflow:hidden;
  background:linear-gradient(180deg,#161620,#0a0a10);
  border:1px solid var(--border);border-radius:11px
}
.reel-track{
  position:absolute;left:0;right:0;top:0;
  display:flex;flex-direction:column;
  transition:transform 3s cubic-bezier(.19,1,.22,1)
}
.reel-slot{
  width:100%;aspect-ratio:1/1;background:#000;
  position:relative;overflow:hidden
}
.reel-slot img{
  width:100%;height:100%;object-fit:cover;display:block
}
.reel-slot::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,transparent 40%,rgba(0,0,0,.5) 100%);
  pointer-events:none
}
.reel-name{
  position:absolute;bottom:0;left:0;right:0;padding:4px 8px;
  font-family:var(--mono);font-size:9.5px;color:#fff;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.85));
  text-align:center;letter-spacing:.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  z-index:1
}
.slot-line{
  position:absolute;top:50%;left:8px;right:8px;height:3px;
  border-radius:2px;
  background:linear-gradient(90deg,transparent,var(--hot),transparent);
  transform:translateY(-50%);
  pointer-events:none;
  box-shadow:0 0 20px rgba(255,55,95,.7);
  opacity:0;
  z-index:2
}
.slot-frame.landed .slot-line{opacity:1;animation:line-pulse 1s ease-in-out infinite}
@keyframes line-pulse{50%{opacity:.5}}

.slot-verdict{
  position:absolute;bottom:14px;left:14px;right:14px;
  background:linear-gradient(180deg,rgba(20,20,26,.85),rgba(20,20,26,.98));
  backdrop-filter:blur(14px);border:1px solid var(--border2);
  border-radius:12px;padding:12px 14px;
  transform:translateY(30px);opacity:0;transition:all .35s var(--ease);
  z-index:3
}
.slot-frame.landed .slot-verdict{transform:none;opacity:1}
.slot-verdict .k{font-family:var(--mono);font-size:9.5px;color:var(--hot);letter-spacing:.18em;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.slot-verdict .n{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.015em;line-height:1.1;color:var(--text)}

.slot-actions{
  display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center
}
.slot-actions .bigbtn{padding:14px 22px;font-size:16px;min-height:48px}
.slot-actions .bigbtn .ic{font-size:20px}

.scene-hdr{text-align:center;margin-bottom:14px}
.scene-hdr .eye{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.24em;text-transform:uppercase;margin-bottom:4px}
.scene-hdr h2{font-family:var(--disp);font-weight:900;font-size:26px;letter-spacing:-.02em;line-height:1}

/* ══════ Play frame (canvas-based camera + slot) ══════ */
.play-frame{
  position:relative;width:100%;aspect-ratio:9/16;max-height:70dvh;
  border-radius:22px;overflow:hidden;background:#000;
  border:2px solid rgba(255,55,95,.5);
  box-shadow:0 24px 60px rgba(255,55,95,.2),inset 0 0 0 1px rgba(255,255,255,.06)
}
.play-frame canvas{width:100%;height:100%;display:block}

/* ══════ Camera / recording ══════ */
.cam-frame{
  position:relative;width:100%;aspect-ratio:9/16;max-height:70vh;
  border-radius:22px;overflow:hidden;background:#000;
  border:2px solid var(--border2);
  box-shadow:0 20px 60px rgba(0,0,0,.5)
}
.cam-frame video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);background:#000}
.cam-frame video.playback{transform:none}
.cam-badge{
  position:absolute;top:14px;left:14px;
  padding:5px 11px;border-radius:14px;background:rgba(0,0,0,.65);color:#fff;
  font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
  backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px
}
.cam-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--hot);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}
.cam-time{position:absolute;top:14px;right:14px;padding:5px 10px;background:rgba(0,0,0,.65);border-radius:12px;font-family:var(--mono);font-size:11px;color:#fff;backdrop-filter:blur(10px);font-variant-numeric:tabular-nums;font-weight:600}

.cam-food{
  position:absolute;top:60px;left:14px;right:14px;
  display:flex;gap:8px;align-items:center;
  background:linear-gradient(180deg,rgba(255,55,95,.85),rgba(255,45,146,.85));
  padding:10px 12px;border-radius:14px;
  backdrop-filter:blur(6px);
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation:food-slide .4s var(--ease)
}
@keyframes food-slide{from{transform:translateY(-14px);opacity:0}to{transform:none;opacity:1}}
.cam-food img{width:38px;height:38px;border-radius:9px;object-fit:cover;flex-shrink:0}
.cam-food .txt{min-width:0;flex:1}
.cam-food .k{font-family:var(--mono);font-size:8.5px;color:rgba(255,255,255,.85);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:2px}
.cam-food .n{font-family:var(--disp);font-weight:900;font-size:15px;color:#fff;line-height:1.05;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.countdown{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at center,rgba(0,0,0,.6),rgba(0,0,0,.9));
  z-index:5;pointer-events:none
}
.countdown .n{
  font-family:var(--disp);font-weight:900;font-size:180px;
  color:var(--text);letter-spacing:-.05em;
  animation:count-pop .9s var(--ease);
  text-shadow:0 12px 40px rgba(255,55,95,.6)
}
@keyframes count-pop{
  0%{transform:scale(1.6);opacity:0}
  20%{transform:scale(1);opacity:1}
  80%{transform:scale(1);opacity:1}
  100%{transform:scale(.7);opacity:0}
}
.countdown .n.go{font-size:110px;color:var(--hot);animation-duration:.7s}

.cam-controls{
  display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap
}
.rec-btn{
  width:78px;height:78px;border-radius:50%;
  background:#fff;border:5px solid rgba(255,255,255,.25);
  cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;
  transition:all .18s var(--ease)
}
.rec-btn::after{
  content:"";width:56px;height:56px;border-radius:50%;
  background:var(--hot);transition:all .3s var(--ease)
}
.rec-btn:hover::after{background:#ff5477}
.rec-btn:active{transform:scale(.94)}
.rec-btn.recording::after{border-radius:8px;width:36px;height:36px;background:var(--hot);animation:rec-pulse 1.2s ease-in-out infinite}
@keyframes rec-pulse{50%{opacity:.6}}

.ctl-btn{
  padding:14px 22px;border-radius:14px;background:var(--panel);border:1px solid var(--border2);
  font-family:var(--mono);font-size:12px;color:var(--text);letter-spacing:.06em;
  text-transform:uppercase;font-weight:600;min-height:48px;
  display:inline-flex;align-items:center;gap:8px
}
.ctl-btn:hover{color:var(--hot);border-color:var(--hot)}
.ctl-btn.primary{background:linear-gradient(135deg,var(--hot),var(--pink));border:none;color:#fff;box-shadow:0 8px 22px rgba(255,55,95,.35)}
.ctl-btn.primary:hover{color:#fff;filter:brightness(1.1)}

/* ══════ Score / Streak ══════ */
.stats{
  display:flex;gap:6px;margin:0 auto 12px;padding:6px 12px;
  background:var(--panel);border:1px solid var(--border);border-radius:20px;
  font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.06em;
  align-items:center;width:fit-content
}
.stats b{color:var(--text);font-weight:700}
.stats .amber{color:var(--amber)}
.stats .lime{color:var(--lime)}
.stats .dot{color:var(--dimmer);margin:0 5px}

/* ══════ Playback / Share ══════ */
.playback-frame{
  position:relative;width:100%;aspect-ratio:9/16;max-height:70vh;
  border-radius:22px;overflow:hidden;background:#000;
  border:2px solid rgba(255,55,95,.4);
  box-shadow:0 24px 70px rgba(255,55,95,.15)
}
.playback-frame video{width:100%;height:100%;object-fit:cover;background:#000}

.share-actions{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin-top:16px
}
.share-btn{
  padding:12px 6px;background:var(--panel);border:1px solid var(--border);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--text);
  text-align:center;text-decoration:none;transition:all .12s;min-height:70px;justify-content:center
}
.share-btn:hover{border-color:var(--hot);color:var(--hot);transform:translateY(-2px)}
.share-btn .em{font-size:22px}
.share-btn.primary{background:linear-gradient(135deg,var(--hot),var(--pink));border:none;color:#fff}
.share-btn.primary:hover{color:#fff;filter:brightness(1.1)}

.err{
  padding:16px;background:rgba(255,55,95,.08);border:1px solid rgba(255,55,95,.35);
  border-radius:14px;color:var(--hot);text-align:center;font-size:14px;line-height:1.5
}
.err b{color:var(--text)}
.err em{color:var(--dim);font-style:italic;display:block;margin-top:6px;font-size:12px}

/* ══════ Toast ══════ */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%);
  z-index:200;padding:10px 18px;background:rgba(20,20,26,.95);color:#fff;
  border:1px solid var(--border2);border-radius:24px;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.4);
  animation:toast-in .3s var(--ease),toast-out .3s 1.9s var(--ease) forwards;pointer-events:none
}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toast-out{to{opacity:0;transform:translate(-50%,10px)}}

@media(max-width:400px){
  .wrap{padding:0 14px}
  .intro h1{font-size:44px}
  .intro .sub{font-size:14px}
  .bigbtn{padding:16px 26px;font-size:19px;width:100%;justify-content:center}
  .slot-actions .bigbtn{width:100%}
  .countdown .n{font-size:140px}
  .countdown .n.go{font-size:80px}
  .rec-btn{width:70px;height:70px;border-width:4px}
  .rec-btn::after{width:50px;height:50px}
  .rec-btn.recording::after{width:32px;height:32px}
}

/* Footer */
.foot{
  padding:16px 0 26px;text-align:center;color:var(--dimmer);
  font-family:var(--mono);font-size:10px;letter-spacing:.08em
}
.foot a{color:var(--dim);text-decoration:none;border-bottom:1px dotted currentColor}
.foot a:hover{color:var(--hot)}
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">🎰</div>
      <div>
        <div class="n">WTF-Slots</div>
        <div class="t">react · record · release</div>
      </div>
    </div>
    <button class="icon-btn" id="mute-top" title="Sound">🔊</button>
  </header>

  <main class="scene" id="scene"></main>

  <footer class="foot">
    Food images from <a href="https://www.themealdb.com" target="_blank" rel="noopener">TheMealDB</a> · your reaction stays on your device
  </footer>
</div>

<script>
'use strict';
const API = 'https://www.themealdb.com/api/json/v1/1';
const $ = id => document.getElementById(id);
const pick = a => a[Math.floor(Math.random() * a.length)];
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

// Top-nav mute toggle wiring (runs once on load)
document.addEventListener('DOMContentLoaded', () => {
  const mt = document.getElementById('mute-top');
  if (mt) mt.addEventListener('click', () => {
    state.muted = !state.muted;
    mt.textContent = state.muted ? '🔇' : '🔊';
  });
});

const state = {
  view:'intro',
  pool:[],
  target:null,
  targetLocked:false,  // when ?m=<id> was set
  score:JSON.parse(localStorage.getItem('af-score') || '{"eaten":0,"skipped":0,"streak":0}'),
  stream:null,
  recorder:null,
  chunks:[],
  recording:false,
  outputBlob:null,
  mimeType:'',
  canvas:null,
  canvasCtx:null,
  drawRaf:0,
  play:null,           // per-play state
};

/* ═══════════ Sound (Web Audio, no external files) ═══════════ */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { audioCtx = null; return; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, vol = 0.15, type = 'square', delay = 0) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.02);
}
const SFX = {
  tick(){ beep(380 + Math.random() * 140, 0.03, 0.06, 'square'); },
  clunk(){ beep(180, 0.06, 0.16, 'triangle'); },
  countBeep(){ beep(700, 0.14, 0.2, 'sine'); },
  goBeep(){ beep(880, 0.22, 0.25, 'sine'); beep(1320, 0.18, 0.18, 'sine', 0.12); },
  reelLand(){ beep(680, 0.09, 0.22, 'triangle'); beep(1000, 0.14, 0.18, 'triangle', 0.06); },
  jackpot(){
    beep(600, 0.14, 0.24, 'triangle');
    beep(800, 0.14, 0.24, 'triangle', 0.1);
    beep(1000, 0.14, 0.24, 'triangle', 0.2);
    beep(1200, 0.28, 0.28, 'sine', 0.3);
    beep(1600, 0.28, 0.2, 'sine', 0.35);
  },
  camClick(){ beep(240, 0.04, 0.14, 'square'); beep(320, 0.03, 0.12, 'square', 0.03); },
};

/* ═══════════ Meal pool ═══════════ */
async function loadMealPool(n = 18) {
  const results = await Promise.all(Array.from({length:n}, () =>
    fetch(`${API}/random.php`).then(r => r.json()).catch(() => ({}))
  ));
  const meals = results.map(r => r.meals && r.meals[0]).filter(Boolean);
  // Warm images
  for (const m of meals) { const i = new Image(); i.src = m.strMealThumb; }
  return meals;
}

/* ═══════════ Play scene — camera + slot machine on one canvas ═══════════ */
/*
   Timeline (approximate):
     0.0s   press SPIN, get camera, start recording
     0.5s   countdown "3" (beep)
     1.5s   countdown "2" (beep)
     2.5s   countdown "1" (beep)
     3.5s   "GO" + reels start spinning (goBeep)
     3.5-9.0s  reels spin, ticks every ~120ms
     9.0s   reel 1 lands (chime)
     9.7s   reel 2 lands (chime)
    10.4s   reel 3 lands (chime + JACKPOT)
    10.5-13.5s  reaction hold (3s)
    13.5s   stop recording
*/
const PHASES = {
  INIT:     { name:'init'     },
  CAM_WAIT: { name:'cam-wait' },
  C3:       { name:'c3',    at: 500 },
  C2:       { name:'c2',    at: 1500 },
  C1:       { name:'c1',    at: 2500 },
  GO:       { name:'go',    at: 3500 },
  SPIN:     { name:'spin',  at: 3500 },
  LAND1:    { name:'land1', at: 9000 },
  LAND2:    { name:'land2', at: 9700 },
  LAND3:    { name:'land3', at: 10400 },
  HOLD:     { name:'hold',  at: 10500 },
  STOP:     { name:'stop',  at: 13500 },
};

async function renderPlay() {
  state.view = 'play';
  state.play = {
    phase: 'init', t0: 0, lastTickMs: 0,
    reelOffsets: [0, 0, 0], reelSpeeds: [0, 0, 0],
    reelLanded: [false, false, false],
    countShown: { 3:false, 2:false, 1:false, go:false, spin:false, land1:false, land2:false, land3:false, jackpot:false },
    poolImgs: [],
    targetImg: null,
  };

  // Ensure we have a target
  if (!state.target) {
    if (state.pool.length < 6) state.pool = await loadMealPool(18);
    state.target = pick(state.pool);
  }
  if (state.pool.length < 6) state.pool = await loadMealPool(18);

  // Ensure the pool always contains the target
  if (!state.pool.find(m => m.idMeal === state.target.idMeal)) state.pool.unshift(state.target);

  // Preload images for the reels
  const imgs = [];
  for (const m of state.pool.slice(0, 15)) {
    const i = new Image();
    i.crossOrigin = 'anonymous';
    i.src = m.strMealThumb;
    imgs.push({ img: i, meal: m });
  }
  state.play.poolImgs = imgs;
  const t = new Image();
  t.crossOrigin = 'anonymous'; t.src = state.target.strMealThumb;
  state.play.targetImg = t;

  $('scene').innerHTML = `
    <div class="scene-hdr">
      <div class="eye">You have to eat</div>
      <h2 id="play-title">${state.target.strMeal}</h2>
    </div>
    <div class="play-frame" id="play-frame">
      <canvas id="play-canvas" width="540" height="960"></canvas>
      <video id="cam-video" autoplay playsinline muted style="display:none"></video>
    </div>
    <div class="cam-controls">
      <button class="ctl-btn" id="play-cancel">← Back</button>
      <button class="rec-btn" id="play-rec" title="Spin + record"></button>
      <button class="ctl-btn" id="mute-btn" title="Sound">🔊</button>
    </div>
    <div class="hint" style="text-align:center;margin-top:12px">tap the button · countdown, spin, and recording all start</div>`;

  $('play-cancel').addEventListener('click', () => { cleanupPlay(); renderIntro(); });
  $('mute-btn').addEventListener('click', () => {
    state.muted = !state.muted;
    $('mute-btn').textContent = state.muted ? '🔇' : '🔊';
  });
  $('play-rec').addEventListener('click', async () => {
    if (state.recording) return;
    ensureAudio();
    await startPlayback();
  });
}

function cleanupPlay() {
  cancelAnimationFrame(state.drawRaf);
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
  state.play = null; state.canvas = null; state.canvasCtx = null;
}

async function startPlayback() {
  // Get camera
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ ideal:720 }, height:{ ideal:1280 }, frameRate:{ ideal:30 } },
      audio: true
    });
    const v = $('cam-video');
    v.srcObject = state.stream;
    await v.play().catch(() => {});
  } catch (err) {
    $('scene').innerHTML = `
      <div class="scene-hdr"><h2>Camera denied</h2></div>
      <div class="err">
        <b>Camera or mic access was blocked.</b>
        <em>enable it in your browser settings and try again.</em>
      </div>
      <div style="text-align:center;margin-top:14px">
        <button class="bigbtn ghost" id="try-again"><span class="ic">←</span>Back</button>
      </div>`;
    const b = $('try-again');
    if (b) b.addEventListener('click', () => renderIntro());
    return;
  }

  // Set up canvas as display + record source
  const canvas = $('play-canvas');
  const ctx = canvas.getContext('2d');
  state.canvas = canvas; state.canvasCtx = ctx;

  // Start MediaRecorder on canvas + camera audio
  const mimes = [
    'video/mp4;codecs=avc1,mp4a.40.2', 'video/mp4',
    'video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm'
  ];
  const mime = mimes.find(m => window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)) || '';
  state.mimeType = mime;
  try {
    const canvasStream = canvas.captureStream(30);
    const audioTracks = state.stream.getAudioTracks();
    if (audioTracks.length) canvasStream.addTrack(audioTracks[0]);
    state.recorder = mime
      ? new MediaRecorder(canvasStream, { mimeType: mime, videoBitsPerSecond: 2_800_000 })
      : new MediaRecorder(canvasStream);
    state.chunks = [];
    state.recorder.ondataavailable = e => { if (e.data && e.data.size > 0) state.chunks.push(e.data); };
    state.recorder.onstop = () => finalizeRecording();
    state.recorder.start(200);
    state.recording = true;
  } catch (e) {
    console.warn('recorder failed', e);
    toast('recorder unavailable');
    cleanupPlay(); return;
  }

  // Kick off animation
  state.play.t0 = performance.now();
  state.play.phase = 'countdown';
  drawLoop();

  // Hide record button while recording
  const rec = $('play-rec');
  if (rec) { rec.classList.add('recording'); rec.title = 'Recording…'; }
}

function drawLoop() {
  const canvas = state.canvas;
  const ctx = state.canvasCtx;
  const v = $('cam-video');
  if (!canvas || !ctx) return;
  const now = performance.now();
  const t = now - state.play.t0;
  const p = state.play;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── Camera in top region (0 - 55% height, ~528px)
  const camH = Math.round(canvas.height * 0.55);
  if (v && v.videoWidth) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, canvas.width, camH);
    ctx.clip();
    ctx.scale(-1, 1);
    const vr = v.videoWidth / v.videoHeight;
    const cr = canvas.width / camH;
    let dw, dh, dx, dy;
    if (vr > cr) { dh = camH; dw = dh * vr; dx = -(dw - canvas.width) / 2; dy = 0; }
    else { dw = canvas.width; dh = dw / vr; dx = 0; dy = -(dh - camH) / 2; }
    ctx.drawImage(v, -dx - dw, dy, dw, dh);
    ctx.restore();
  }

  // ── Vertical gradient between camera and slots
  const grd = ctx.createLinearGradient(0, camH - 30, 0, camH + 40);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,0,0,.85)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, camH - 30, canvas.width, 70);

  // ── Slot machine bottom region
  const slotY = camH + 10;
  const slotH = canvas.height - slotY - 90;
  drawSlotMachine(ctx, 20, slotY, canvas.width - 40, slotH, t);

  // ── Countdown / overlays
  drawOverlays(ctx, canvas, t);

  // ── Bottom watermark strip
  drawWatermark(ctx, canvas);

  // Trigger sound events at phase boundaries
  advancePhaseSounds(t);

  // Continue until STOP
  if (t >= PHASES.STOP.at) {
    stopRecording();
    return;
  }
  state.drawRaf = requestAnimationFrame(drawLoop);
}

function drawSlotMachine(ctx, x, y, w, h, t) {
  const gap = 10;
  const reelW = Math.floor((w - gap * 2) / 3);
  const p = state.play;
  const spinStart = PHASES.SPIN.at;
  const landsAt = [PHASES.LAND1.at, PHASES.LAND2.at, PHASES.LAND3.at];

  // Background panel (chunky slot machine chrome)
  ctx.save();
  ctx.fillStyle = 'rgba(20,20,30,.9)';
  roundedRect(ctx, x, y, w, h, 18); ctx.fill();
  ctx.strokeStyle = 'rgba(255,55,95,.35)';
  ctx.lineWidth = 2;
  roundedRect(ctx, x, y, w, h, 18); ctx.stroke();
  ctx.restore();

  for (let r = 0; r < 3; r++) {
    const rx = x + 8 + r * (reelW + gap);
    const ry = y + 8;
    const rw = reelW - 4;
    const rh = h - 16;

    // Update offset
    let landed = t >= landsAt[r];
    p.reelLanded[r] = landed;

    if (t < spinStart) {
      // pre-spin: still (show first pool image)
      p.reelOffsets[r] = 0;
    } else if (!landed) {
      // spinning
      const elapsed = (t - spinStart) / 1000;
      p.reelOffsets[r] += 1000 * (0.016) * (1 + r * 0.15);   // steady scroll
    } else {
      // just landed — snap once
      // (offset stays put)
    }

    // Draw reel
    ctx.save();
    ctx.beginPath();
    roundedRect(ctx, rx, ry, rw, rh, 12); ctx.clip();
    ctx.fillStyle = '#0a0a10'; ctx.fillRect(rx, ry, rw, rh);

    const imgH = rw;                              // square images
    const centerY = ry + rh / 2;
    const pool = p.poolImgs;

    if (landed) {
      // Draw target image centered
      const img = p.targetImg;
      if (img && img.complete && img.naturalWidth) {
        ctx.drawImage(img, rx, centerY - imgH / 2, rw, imgH);
      } else {
        ctx.fillStyle = '#333'; ctx.fillRect(rx, centerY - imgH / 2, rw, imgH);
      }
      // Glow border
      ctx.strokeStyle = '#ff375f'; ctx.lineWidth = 3;
      ctx.strokeRect(rx + 1.5, centerY - imgH / 2 + 1.5, rw - 3, imgH - 3);
    } else if (t < spinStart) {
      // idle: show one image
      const img = pool[r % pool.length]?.img;
      if (img && img.complete && img.naturalWidth) ctx.drawImage(img, rx, centerY - imgH / 2, rw, imgH);
    } else {
      // spinning: draw scrolling column
      const off = p.reelOffsets[r];
      const startI = Math.floor(off / imgH);
      const yShift = off % imgH;
      for (let i = -1; i < Math.ceil(rh / imgH) + 1; i++) {
        const idx = ((startI + i + r) % pool.length + pool.length) % pool.length;
        const img = pool[idx].img;
        const yy = centerY - imgH / 2 + i * imgH - yShift;
        if (img && img.complete && img.naturalWidth) ctx.drawImage(img, rx, yy, rw, imgH);
        else { ctx.fillStyle = '#222'; ctx.fillRect(rx, yy, rw, imgH); }
      }
      // Fade top/bottom
      const fadeH = 30;
      const g1 = ctx.createLinearGradient(0, ry, 0, ry + fadeH);
      g1.addColorStop(0, 'rgba(10,10,16,1)'); g1.addColorStop(1, 'rgba(10,10,16,0)');
      ctx.fillStyle = g1; ctx.fillRect(rx, ry, rw, fadeH);
      const g2 = ctx.createLinearGradient(0, ry + rh - fadeH, 0, ry + rh);
      g2.addColorStop(0, 'rgba(10,10,16,0)'); g2.addColorStop(1, 'rgba(10,10,16,1)');
      ctx.fillStyle = g2; ctx.fillRect(rx, ry + rh - fadeH, rw, fadeH);
    }

    ctx.restore();
  }

  // Center payline
  ctx.save();
  ctx.strokeStyle = 'rgba(255,55,95,.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x + 12, y + h / 2); ctx.lineTo(x + w - 12, y + h / 2);
  ctx.stroke();
  ctx.restore();
}

function drawOverlays(ctx, canvas, t) {
  const p = state.play;
  // Countdown
  const countdownFor = n => {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 240px "Fraunces", Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const alpha = fadeAlpha((t - phaseAt(n)) / 800);
    ctx.globalAlpha = alpha;
    if (n === 'go') { ctx.fillStyle = '#ff375f'; ctx.font = 'bold 140px "Fraunces"'; ctx.fillText('GO', canvas.width / 2, canvas.height / 2); }
    else ctx.fillText(String(n), canvas.width / 2, canvas.height / 2);
    ctx.restore();
  };
  const phaseAt = n => n === 3 ? PHASES.C3.at : n === 2 ? PHASES.C2.at : n === 1 ? PHASES.C1.at : PHASES.GO.at;
  const fadeAlpha = x => x < 0 ? 0 : x < 0.15 ? x / 0.15 : x < 0.7 ? 1 : x < 1 ? (1 - (x - 0.7) / 0.3) : 0;
  if (t >= PHASES.C3.at && t < PHASES.C2.at) countdownFor(3);
  else if (t >= PHASES.C2.at && t < PHASES.C1.at) countdownFor(2);
  else if (t >= PHASES.C1.at && t < PHASES.GO.at) countdownFor(1);
  else if (t >= PHASES.GO.at && t < PHASES.SPIN.at + 800) countdownFor('go');

  // Landing "YOU HAVE TO EAT" reveal
  if (t >= PHASES.LAND3.at) {
    const since = (t - PHASES.LAND3.at) / 800;
    const alpha = since < 0.1 ? since / 0.1 : 1;
    ctx.save();
    ctx.globalAlpha = alpha;
    const barY = 30;
    const barH = 92;
    ctx.fillStyle = 'rgba(255,55,95,.92)';
    roundedRect(ctx, 20, barY, canvas.width - 40, barH, 18); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU HAVE TO EAT', canvas.width / 2, barY + 32);
    ctx.font = 'bold 30px "Fraunces", serif';
    let name = state.target.strMeal;
    if (ctx.measureText(name).width > canvas.width - 80) {
      while (name.length && ctx.measureText(name + '…').width > canvas.width - 80) name = name.slice(0, -1);
      name += '…';
    }
    ctx.fillText(name, canvas.width / 2, barY + 72);
    ctx.restore();
  }
}

function drawWatermark(ctx, canvas) {
  // Bottom watermark bar
  ctx.save();
  const barH = 60;
  const y = canvas.height - barH;
  const grd = ctx.createLinearGradient(0, y, 0, canvas.height);
  grd.addColorStop(0, 'rgba(0,0,0,.4)'); grd.addColorStop(1, 'rgba(0,0,0,.9)');
  ctx.fillStyle = grd; ctx.fillRect(0, y, canvas.width, barH);
  ctx.fillStyle = '#ff375f';
  ctx.font = 'bold 15px "IBM Plex Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('#WTFSlots', 20, y + 24);
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.font = '12px "IBM Plex Mono", monospace';
  ctx.fillText('WTF-Slots', 20, y + 44);
  // REC dot
  ctx.fillStyle = '#ff375f';
  ctx.beginPath(); ctx.arc(canvas.width - 30, y + 22, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px "IBM Plex Mono", monospace';
  ctx.textAlign = 'right';
  ctx.fillText('REC', canvas.width - 42, y + 26);
  ctx.restore();
}

function advancePhaseSounds(t) {
  const p = state.play;
  const shown = p.countShown;
  if (t >= PHASES.C3.at && !shown[3]) { shown[3] = true; if (!state.muted) SFX.countBeep(); }
  if (t >= PHASES.C2.at && !shown[2]) { shown[2] = true; if (!state.muted) SFX.countBeep(); }
  if (t >= PHASES.C1.at && !shown[1]) { shown[1] = true; if (!state.muted) SFX.countBeep(); }
  if (t >= PHASES.GO.at && !shown.go) { shown.go = true; if (!state.muted) SFX.goBeep(); }
  if (t >= PHASES.SPIN.at && !shown.spin) { shown.spin = true; if (!state.muted) SFX.camClick(); }
  // ticks during spin
  if (t >= PHASES.SPIN.at && t < PHASES.LAND1.at) {
    if (t - p.lastTickMs > 110 + Math.random() * 60) {
      p.lastTickMs = t;
      if (!state.muted) SFX.tick();
    }
  }
  if (t >= PHASES.LAND1.at && !shown.land1) { shown.land1 = true; if (!state.muted) SFX.reelLand(); }
  if (t >= PHASES.LAND2.at && !shown.land2) { shown.land2 = true; if (!state.muted) SFX.reelLand(); }
  if (t >= PHASES.LAND3.at && !shown.land3) { shown.land3 = true; if (!state.muted) SFX.reelLand(); setTimeout(() => { if (!state.muted) SFX.jackpot(); }, 200); }
}

function roundedRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  if (ctx.roundRect) { ctx.roundRect(x, y, w, h, rr); return; }
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

function stopRecording() {
  if (!state.recording) return;
  state.recording = false;
  cancelAnimationFrame(state.drawRaf);
  try { state.recorder.stop(); } catch (e) {}
}

function finalizeRecording() {
  const blob = new Blob(state.chunks, { type: state.mimeType || 'video/webm' });
  state.outputBlob = blob;
  state.score.eaten++;
  state.score.streak++;
  saveScore();
  stopStream();
  renderPlayback();
}

function stopStream() {
  if (state.stream) {
    state.stream.getTracks().forEach(t => t.stop());
    state.stream = null;
  }
  cancelAnimationFrame(state.drawRaf);
  state.canvas = null; state.canvasCtx = null;
}

/* ═══════════ Playback + share ═══════════ */
function renderPlayback() {
  state.view = 'playback';
  const url = URL.createObjectURL(state.outputBlob);
  const ext = (state.mimeType || 'video/webm').startsWith('video/mp4') ? 'mp4' : 'webm';
  const fileName = `wtf-slots-${slugify(state.target.strMeal)}.${ext}`;
  $('scene').innerHTML = `
    <div class="scene-hdr">
      <div class="eye">${state.target.strMeal}</div>
      <h2>The take</h2>
    </div>
    <div class="playback-frame">
      <video id="playback" src="${url}" playsinline controls autoplay loop></video>
    </div>
    <div class="share-actions" id="share-actions">
      <button class="share-btn primary" id="share-native"><span class="em">↗</span>Share</button>
      <a class="share-btn" id="share-dl" href="${url}" download="${fileName}"><span class="em">⬇</span>Save</a>
      <button class="share-btn" id="share-copy"><span class="em">🔗</span>Copy link</button>
      <button class="share-btn" id="share-again"><span class="em">↻</span>Again</button>
    </div>
    <div class="hint" style="text-align:center;margin-top:14px">
      ${state.score.eaten} eaten · ${state.score.streak} streak · ${state.score.skipped} skipped
    </div>`;

  const file = new File([state.outputBlob], fileName, { type: state.outputBlob.type });
  const shareText = `WTF-Slots me: ${state.target.strMeal}`;
  const shareUrl = (location.protocol.startsWith('http') ? location.origin : '') + '/airfried/';

  $('share-native').addEventListener('click', async () => {
    // Try file share first
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'WTF-Slots', text: shareText });
        return;
      } catch (e) { if (e.name === 'AbortError') return; }
    }
    // Fall back to text share
    if (navigator.share) {
      try { await navigator.share({ title: 'WTF-Slots', text: shareText, url: shareUrl }); return; }
      catch (e) { if (e.name === 'AbortError') return; }
    }
    toast('sharing not available — try Download');
  });
  $('share-copy').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(shareUrl); toast('link copied'); }
    catch (e) { toast('copy failed'); }
  });
  $('share-again').addEventListener('click', () => {
    URL.revokeObjectURL(url);
    state.outputBlob = null;
    // If target was locked via ?m=, unlock it so re-spin picks fresh
    if (!state.targetLocked) state.target = null;
    renderPlay();
  });
}

function slugify(s) {
  return (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
}

/* ═══════════ Init ═══════════ */
(async function init() {
  const p = new URLSearchParams(location.search);
  const mealId = p.get('m');
  if (mealId) {
    // Locked target from WTF deep link
    try {
      const j = await fetch(`${API}/lookup.php?i=${mealId}`).then(r => r.json());
      const meal = j.meals && j.meals[0];
      if (meal) {
        state.target = meal;
        state.targetLocked = true;
      }
    } catch(e) {}
  }
  renderIntro();
  // Warm up the pool in the background so intro → play is instant
  loadMealPool(18).then(pool => { state.pool = pool; });
})();
</script>
</body>
</html>
