<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PM Dashboard - Command Center</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--bg3:#161618;--border:#2a2a2d;--border2:#3a3a3d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80;--red:#ef4444;--gold:#f7c948;--blue:#60a5fa;--purple:#c084fc;--pink:#f472b6;--teal:#2dd4bf}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh;line-height:1.5}
a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:#ff8c5a}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

/* Top Bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:linear-gradient(180deg,rgba(26,26,28,.97),rgba(15,15,16,.97));border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar h1{font-size:1.05rem;font-weight:700;color:var(--accent);letter-spacing:1.5px;white-space:nowrap;text-shadow:0 0 24px rgba(255,107,53,.25)}
.topbar h1 .emoji{font-size:1.1rem;margin-right:4px}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar select{background:var(--border);color:var(--text);border:1px solid var(--border2);padding:5px 10px;border-radius:6px;font-size:.78rem;cursor:pointer;outline:none;transition:border-color .2s}
.topbar select:hover{border-color:var(--accent)}
.topbar .ts{font-size:.68rem;color:var(--dim);white-space:nowrap}
.btn{background:linear-gradient(180deg,var(--accent),#cc4400);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(255,107,53,.15);white-space:nowrap}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,107,53,.25)}
.btn:active{transform:translateY(0)}
.btn-sample{background:linear-gradient(180deg,#4ade80,#22aa55);box-shadow:0 2px 8px rgba(74,222,128,.15)}
.btn-sample:hover{box-shadow:0 4px 16px rgba(74,222,128,.25)}
.home-link{font-size:.82rem;color:var(--dim);transition:color .2s}
.home-link:hover{color:var(--accent)}

/* Layout */
.container{padding:16px 20px;max-width:1440px;margin:0 auto}
.row{display:grid;gap:14px;margin-bottom:14px}
.r4{grid-template-columns:repeat(4,1fr)}
.r2{grid-template-columns:1fr 1fr}
.r3{grid-template-columns:repeat(3,1fr)}

/* Cards */
.card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;transition:all .3s ease}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,107,53,.35),transparent);opacity:0;transition:opacity .35s}
.card:hover{border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(255,107,53,.05);transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card h3{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-weight:600}

/* Metric Cards */
.metric-card{cursor:pointer;text-decoration:none;display:block;color:inherit}
.metric-val{font-size:2rem;font-weight:800;line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums}
.metric-sub{font-size:.75rem;color:var(--dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge-green{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.badge-yellow{background:rgba(247,201,72,.12);color:var(--gold);border:1px solid rgba(247,201,72,.2)}
.badge-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2);animation:pulse-red 2s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 4px rgba(239,68,68,.1)}50%{box-shadow:0 0 12px rgba(239,68,68,.25)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0}to{opacity:1}}

/* Gauge */
.gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 10px}
.gauge-score-label{margin-top:10px;font-size:.85rem;color:var(--dim)}

/* Feed */
.feed{max-height:320px;overflow-y:auto;scrollbar-width:thin}
.feed-item{padding:10px 0;border-bottom:1px solid rgba(42,42,45,.6);font-size:.8rem;display:flex;gap:10px;animation:fadeIn .4s ease}
.feed-item:last-child{border:none}
.feed-icon{font-size:1.05rem;flex-shrink:0;width:24px;text-align:center}
.feed-body{flex:1;min-width:0}
.feed-text{color:#ccc;line-height:1.4}
.feed-time{color:var(--dim);font-size:.68rem;margin-top:2px}
.empty-state{color:var(--dim);font-size:.8rem;padding:24px 0;text-align:center;line-height:1.6}
.empty-state a{color:var(--accent)}

/* Status panels */
.status-list{max-height:300px;overflow-y:auto}
.status-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,42,45,.5);font-size:.78rem}
.status-item:last-child{border:none}
.status-item .name{flex:1;color:#ccc;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-item .pbar{flex:0 0 80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.status-item .pbar-fill{height:100%;border-radius:3px;transition:width 1s ease-out}
.status-item .pct{width:36px;text-align:right;color:var(--dim);font-size:.7rem;font-weight:600}
.status-item .flag{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:4px}
.flag-overdue{background:rgba(239,68,68,.15);color:var(--red)}
.flag-ok{background:rgba(74,222,128,.1);color:var(--green)}
.flag-warn{background:rgba(247,201,72,.1);color:var(--gold)}

/* Open items */
.open-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(42,42,45,.5);font-size:.78rem}
.open-item:last-child{border:none}
.open-item .tag{font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;text-transform:uppercase;letter-spacing:.5px}
.tag-rfi{background:rgba(96,165,250,.15);color:var(--blue)}
.tag-punch{background:rgba(247,201,72,.15);color:var(--gold)}
.tag-action{background:rgba(192,132,252,.15);color:var(--purple)}
.tag-critical{background:rgba(239,68,68,.2);color:var(--red)}

/* Resource */
.resource-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(42,42,45,.5);font-size:.78rem}
.resource-row:last-child{border:none}
.resource-label{color:#aaa}
.resource-val{font-weight:600;color:var(--text)}

/* Quick Links */
.links-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.link-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:.73rem;color:#aaa;text-decoration:none;transition:all .25s;overflow:hidden}
.link-btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 20px rgba(255,107,53,.08);transform:translateY(-2px)}
.link-btn .icon{font-size:1.15rem;flex-shrink:0;transition:transform .2s}
.link-btn:hover .icon{transform:scale(1.15)}

/* Canvas */
.canvas-wrap{display:flex;justify-content:center;align-items:center}
canvas{max-width:100%}

/* Responsive */
@media(max-width:1024px){.r4{grid-template-columns:repeat(2,1fr)}.r3{grid-template-columns:1fr}.links-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:768px){.r2{grid-template-columns:1fr}.links-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.r4{grid-template-columns:1fr}.links-grid{grid-template-columns:repeat(2,1fr)}.topbar{padding:8px 12px}.container{padding:10px 12px}}
@media print{body{background:#fff;color:#111}.topbar{background:#f5f5f5;border-color:#ddd}.card{background:#fff;border-color:#ddd;box-shadow:none}.badge{border:1px solid #ccc}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1><span class="emoji">&#x1F4E1;</span> PM DASHBOARD</h1>
  </div>
  <div class="topbar-right">
    <select id="projSelect" title="Select project"></select>
    <button class="btn" onclick="refresh()">&#x1F504; Refresh</button>
    <button class="btn btn-sample" onclick="loadSampleData()">&#x1F4E6; Load Sample Data</button>
    <a href="index.html" class="home-link">&larr; home</a>
    <span class="ts" id="lastUpdated"></span>
  </div>
</div>

<div class="container">
  <!-- Row 1: Metric Cards -->
  <div class="row r4" id="metricsRow"></div>

  <!-- Row 2: Health Gauge + Activity Feed -->
  <div class="row r2">
    <div class="card">
      <h3>&#x1F3AF; Project Health Score</h3>
      <div class="gauge-wrap">
        <canvas id="cvGauge" width="280" height="160"></canvas>
        <div class="gauge-score-label" id="gaugeLabel"></div>
      </div>
      <div id="healthBreakdown" style="font-size:.72rem;color:var(--dim);margin-top:6px"></div>
    </div>
    <div class="card">
      <h3>&#x1F4CB; Activity Feed</h3>
      <div class="feed" id="activityFeed"></div>
    </div>
  </div>

  <!-- Row 3: Charts -->
  <div class="row r2">
    <div class="card">
      <h3>&#x26A0;&#xFE0F; Risk Heat Map</h3>
      <div class="canvas-wrap"><canvas id="cvRisk" width="300" height="300"></canvas></div>
    </div>
    <div class="card">
      <h3>&#x1F4B0; Budget Breakdown</h3>
      <div class="canvas-wrap"><canvas id="cvBudget" width="300" height="300"></canvas></div>
    </div>
  </div>

  <!-- Row 4: Status Panels -->
  <div class="row r3">
    <div class="card">
      <h3>&#x1F4C5; Schedule Status</h3>
      <div class="status-list" id="scheduleStatus"></div>
    </div>
    <div class="card">
      <h3>&#x1F4CC; Open Items</h3>
      <div class="status-list" id="openItems"></div>
    </div>
    <div class="card">
      <h3>&#x1F465; Resource Summary</h3>
      <div class="status-list" id="resourceSummary"></div>
    </div>
  </div>

  <!-- Row 5: Quick Links -->
  <div class="card">
    <h3>&#x1F527; PM Tools</h3>
    <div class="links-grid" id="linksGrid"></div>
  </div>
</div>

<script>
/* ===== DATA KEYS ===== */
const KEYS = {
  kanban:       'kanban-data',
  risks:        'risk-register',
  rfi:          'rfi-tracker',
  punchlist:    'punchlist-data',
  timeline:     'timeline-data',
  estimates:    'estimate-projects',
  standup:      'standup-data',
  retro:        'retro-data',
  dailylog:     'daily-log-data',
  assumptions:  'assumptions-log',
  lessons:      'lessons-learned',
  requirements: 'requirements-data',
  materials:    'materials-calc',
  bidcompare:   'bidcompare-data',
  montecarlo:   'montecarlo-data',
  tasker:       'tasker-projects',
  projectiq:    'projectiq-data',
  sitediary:    'sd_diary',
  sitephoto:    'sitephoto-data'
};

const COLORS = {
  accent:'#ff6b35',green:'#4ade80',red:'#ef4444',gold:'#f7c948',
  blue:'#60a5fa',purple:'#c084fc',pink:'#f472b6',teal:'#2dd4bf'
};
const PIE_COLORS = ['#ff6b35','#4ade80','#60a5fa','#c084fc','#f472b6','#f7c948','#2dd4bf','#fb923c','#a78bfa','#34d399'];

const TOOL_LINKS = [
  {icon:'\u{1F4CA}',name:'Estimator',href:'estimate.html'},
  {icon:'\u{1F9EE}',name:'Materials',href:'materials.html'},
  {icon:'\u{1F4CB}',name:'Daily Log',href:'dailylog.html'},
  {icon:'✅',name:'Punch List',href:'punchlist.html'},
  {icon:'⚖️',name:'Bid Compare',href:'bidcompare.html'},
  {icon:'⚠️',name:'Risks',href:'risks.html'},
  {icon:'\u{1F4D0}',name:'Requirements',href:'requirements.html'},
  {icon:'\u{1F4AD}',name:'Assumptions',href:'assumptions.html'},
  {icon:'\u{1F4DA}',name:'Lessons',href:'lessons.html'},
  {icon:'❓',name:'RFIs',href:'rfi.html'},
  {icon:'\u{1F3B2}',name:'Monte Carlo',href:'montecarlo.html'},
  {icon:'\u{1F4CB}',name:'Kanban',href:'kanban.html'},
  {icon:'\u{1F4C5}',name:'Timeline',href:'timeline.html'},
  {icon:'\u{1F4DD}',name:'Standup',href:'standup.html'},
  {icon:'\u{1F504}',name:'Retro',href:'retro.html'},
  {icon:'\u{1F3D7}️',name:'Tasker CPM',href:'tasker.html'},
  {icon:'\u{1F9E0}',name:'ProjectIQ',href:'projectiq.html'},
  {icon:'\u{1F4D3}',name:'Site Diary',href:'sitediary.html'},
  {icon:'\u{1F4F7}',name:'SitePhoto',href:'sitephoto.html'},
  {icon:'\u{1F4B5}',name:'Change Order',href:'changeorder.html'},
  {icon:'\u{1F6A7}',name:'Safety Check',href:'safetycheck.html'},
  {icon:'\u{1F527}',name:'Toolbox Talk',href:'toolbox.html'},
  {icon:'\u{1F4B0}',name:'Burn Rate',href:'burnrate.html'},
  {icon:'\u{1F4BB}',name:'PM CLI',href:'pmcli.html'}
];

let D = {};

/* ===== DATA LOADING ===== */
function load(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch(e) { return null; }
}

/* Normalize kanban data - handles both array and {columns:[]} formats */
function normalizeKanban(raw) {
  if (!raw) return [];
  // If it's already a flat array of {title, col, priority}
  if (Array.isArray(raw)) return raw;
  // If it's {columns:[{name, cards:[]}]}
  if (raw.columns && Array.isArray(raw.columns)) {
    const colMap = {'Backlog':'backlog','To Do':'backlog','In Progress':'doing','Doing':'doing','Review':'review','Done':'done'};
    const out = [];
    raw.columns.forEach(col => {
      const colKey = colMap[col.name] || col.name.toLowerCase().replace(/\s+/g,'');
      (col.cards || []).forEach(card => {
        out.push({
          title: card.title || card.name || '',
          col: colKey,
          priority: card.priority || 'Medium',
          due: card.due || ''
        });
      });
    });
    return out;
  }
  return [];
}

/* Normalize risks - handle both {lik,imp} and {likelihood,impact} */
function normalizeRisks(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(r => ({
    title: r.title || r.desc || r.description || '',
    status: r.status || 'Open',
    score: r.score || (r.likelihood || r.lik || 1) * (r.impact || r.imp || 1),
    likelihood: r.likelihood || r.lik || 1,
    impact: r.impact || r.imp || 1,
    category: r.category || r.cat || 'General',
    mitigation: r.mitigation || '',
    owner: r.owner || ''
  }));
}

/* Normalize RFIs */
function normalizeRFIs(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(r => ({
    subject: r.subject || r.subj || r.title || '',
    status: r.status || 'Open',
    dateSubmitted: r.dateSubmitted || r.submitted || r.dateSubmit || '',
    dateRequired: r.dateRequired || r.needed || r.dateNeed || '',
    priority: r.priority || 'Normal',
    num: r.num || ''
  }));
}

/* Normalize punch list */
function normalizePunchlist(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(p => ({
    title: p.title || p.desc || p.description || '',
    status: normalizePunchStatus(p.status),
    priority: p.priority || 'Medium',
    location: p.location || p.loc || ''
  }));
}

function normalizePunchStatus(s) {
  if (!s) return 'Open';
  const lower = s.toLowerCase();
  if (lower === 'complete' || lower === 'fixed' || lower === 'closed') return 'Complete';
  if (lower === 'in progress') return 'In Progress';
  return 'Open';
}

/* Normalize timeline */
function normalizeTimeline(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(t => ({
    name: t.name || t.title || '',
    start: t.start || '',
    end: t.end || '',
    progress: t.progress != null ? t.progress : 0,
    dependencies: t.dependencies || [],
    color: t.color || ''
  }));
}

/* Normalize estimates */
function normalizeEstimates(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(p => ({
    name: p.name || 'Untitled',
    id: p.id || p.name || Math.random().toString(36).slice(2),
    items: (p.items || []).map(i => ({
      desc: i.desc || i.description || '',
      qty: i.qty || 0,
      unit: i.unit || '',
      unitCost: i.unitCost || i.cost || i.price || 0,
      total: i.total || (i.qty || 0) * (i.unitCost || i.cost || i.price || 0),
      category: i.cat || i.category || 'Other'
    })),
    subtotal: p.subtotal || 0,
    tax: p.tax || p.taxRate || 0,
    markup: p.markup || 0
  }));
}

/* Normalize daily log - can be array or object keyed by date */
function normalizeDailyLog(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  // Object keyed by date
  return Object.entries(raw).map(([date, entry]) => ({
    date,
    weather: entry.weather || '',
    crew: entry.crew || [],
    hours: entry.hours || (Array.isArray(entry.crew) ? entry.crew.reduce((s,c) => s + (c.hours || 0), 0) : 0),
    work: entry.work || entry.workPerformed || '',
    safety: entry.safety || '',
    notes: entry.notes || ''
  }));
}

/* Normalize standup - object keyed by date */
function normalizeStandup(raw) {
  if (!raw) return {};
  return raw;
}

/* Normalize retro */
function normalizeRetro(raw) {
  if (!raw) return { well: [], improve: [], actions: [] };
  return {
    well: raw.well || [],
    improve: raw.improve || [],
    actions: raw.actions || []
  };
}

/* Normalize assumptions */
function normalizeAssumptions(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(a => ({
    text: a.text || a.desc || a.description || '',
    status: a.status || 'Active',
    impact: a.impact || 'Medium'
  }));
}

/* Normalize lessons */
function normalizeLessons(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(l => ({
    title: l.title || '',
    category: l.category || l.cat || '',
    phase: l.phase || '',
    recommendation: l.recommendation || '',
    votes: l.votes || 0
  }));
}

/* Normalize requirements */
function normalizeRequirements(raw) {
  if (!Array.isArray(raw)) return [];
  return raw.map(r => ({
    title: r.title || '',
    priority: r.priority || 'Could',
    status: r.status || 'Draft',
    source: r.source || ''
  }));
}

/* Normalize Tasker projects */
function normalizeTasker(raw) {
  if (!raw) return null;
  return raw;
}

/* Normalize ProjectIQ */
function normalizeProjectIQ(raw) {
  if (!raw) return null;
  return raw;
}

/* Normalize site diary */
function normalizeSiteDiary(raw) {
  if (!Array.isArray(raw)) return [];
  return raw;
}

/* Normalize site photo */
function normalizeSitePhoto(raw) {
  if (!Array.isArray(raw)) return [];
  return raw;
}

function gatherData() {
  D.estimates   = normalizeEstimates(load(KEYS.estimates));
  D.kanban      = normalizeKanban(load(KEYS.kanban));
  D.timeline    = normalizeTimeline(load(KEYS.timeline));
  D.standup     = normalizeStandup(load(KEYS.standup));
  D.retro       = normalizeRetro(load(KEYS.retro));
  D.risks       = normalizeRisks(load(KEYS.risks));
  D.requirements= normalizeRequirements(load(KEYS.requirements));
  D.assumptions = normalizeAssumptions(load(KEYS.assumptions));
  D.punchlist   = normalizePunchlist(load(KEYS.punchlist));
  D.rfi         = normalizeRFIs(load(KEYS.rfi));
  D.dailylog    = normalizeDailyLog(load(KEYS.dailylog));
  D.lessons     = normalizeLessons(load(KEYS.lessons));
  D.materials   = load(KEYS.materials);
  D.bidcompare  = load(KEYS.bidcompare);
  D.montecarlo  = load(KEYS.montecarlo);
  D.tasker      = normalizeTasker(load(KEYS.tasker));
  D.projectiq   = normalizeProjectIQ(load(KEYS.projectiq));
  D.sitediary   = normalizeSiteDiary(load(KEYS.sitediary));
  D.sitephoto   = normalizeSitePhoto(load(KEYS.sitephoto));
}

/* ===== PROJECT SELECTOR ===== */
function populateProjectSelect() {
  const sel = document.getElementById('projSelect');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Projects</option>';
  D.estimates.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = p.name;
    sel.appendChild(o);
  });
  sel.value = cur;
}

function getSelectedProject() {
  const id = document.getElementById('projSelect').value;
  return id ? D.estimates.find(p => p.id === id) : null;
}

/* ===== ANIMATION ===== */
function animateValue(el, endVal, duration, prefix, suffix) {
  prefix = prefix || '';
  suffix = suffix || '';
  const startTime = performance.now();
  const startVal = 0;
  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(startVal + (endVal - startVal) * eased);
    el.textContent = prefix + current.toLocaleString() + suffix;
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

  const tasks = D.kanban;
  const done = tasks.filter(c => c.col === 'done').length;
  const totalTasks = tasks.length;
  const taskPct = totalTasks ? Math.round(done / totalTasks * 100) : 0;

  const openRisks = D.risks.filter(r => r.status === 'Open');
  const highScore = D.risks.length ? Math.max(...D.risks.map(r => r.score)) : 0;

  // Schedule from timeline or tasker
  let totalDays = 0, daysRemain = 0, schedPct = 0;

    const starts = tl.map(t => new Date(t.start)).filter(d => !isNaN(d));

    if (starts.length && ends.length) {
      const mn = new Date(Math.min(...starts));
      const mx = new Date(Math.max(...ends));

      const elapsed = Math.round((new Date() - mn) / 864e5);

      badge: totalDays === 0 ? 'No Data' : daysRemain > 14 ? 'On Track' : daysRemain > 0 ? 'Tight' : 'Overdue',
      badgeCls: totalDays === 0 ? 'badge-yellow' : daysRemain > 14 ? 'badge-green' : daysRemain > 0 ? 'badge-yellow' : 'badge-red',
      prefix: '', suffix: ' days', isNum: totalDays > 0

      badgeCls: openRisks.length > 5 ? 'badge-red' : openRisks.length > 2 ? 'badge-yellow' : 'badge-green',

/* ===== ROW 2: HEALTH GAUGE ===== */
function calcHealthScore() {
  let scores = {};

  // Budget (20%) - have a budget tracked?
  const items = D.estimates.flatMap(p => p.items);
  const budgetTotal = items.reduce((s, i) => s + i.total, 0);
  scores.budget = budgetTotal > 0 ? 85 : 0;

  // Schedule (20%) - based on remaining time and overdue tasks
  const tl = D.timeline;
  let schedScore = 50;
  if (tl.length) {
    const ends = tl.map(t => new Date(t.end)).filter(d => !isNaN(d));
    const starts = tl.map(t => new Date(t.start)).filter(d => !isNaN(d));
    if (ends.length && starts.length) {
      const mx = new Date(Math.max(...ends));
      const mn = new Date(Math.min(...starts));
      const totalD = Math.max(1, (mx - mn) / 864e5);
      const remain = (mx - new Date()) / 864e5;
      schedScore = remain > 0 ? Math.min(100, Math.round(remain / totalD * 130)) : 10;
      // Penalize for overdue tasks
      const overdue = tl.filter(t => new Date(t.end) < new Date() && (t.progress || 0) < 100).length;
      schedScore = Math.max(0, schedScore - overdue * 5);
    }
  } else { schedScore = 0; }
  scores.schedule = schedScore;

  // Risk (20%) - penalize for open high risks
  const openRisks = D.risks.filter(r => r.status === 'Open');
  const highRisks = openRisks.filter(r => r.score >= 15).length;
  scores.risk = D.risks.length === 0 ? 50 : Math.max(0, 100 - openRisks.length * 6 - highRisks * 10);

  // RFIs (15%) - penalize for overdue RFIs
  const rfiTotal = D.rfi.length;
  const rfiResolved = D.rfi.filter(r => r.status === 'Answered' || r.status === 'Closed').length;
  const rfiOverdue = D.rfi.filter(r => r.status === 'Open' && r.dateRequired && new Date() > new Date(r.dateRequired)).length;
  scores.rfi = rfiTotal ? Math.max(0, Math.round(rfiResolved / rfiTotal * 100) - rfiOverdue * 15) : 50;

  // Punch list (15%) - completion rate
  const pTotal = D.punchlist.length;
  const pDone = D.punchlist.filter(i => i.status === 'Complete').length;
  const pCritical = D.punchlist.filter(i => i.priority === 'Critical' && i.status !== 'Complete').length;
  scores.punch = pTotal ? Math.max(0, Math.round(pDone / pTotal * 100) - pCritical * 10) : 50;

  // Actions/blockers (10%) - from retro actions and standup blockers
  const retroActions = D.retro.actions ? D.retro.actions.length : 0;
  const standupDates = Object.keys(D.standup).sort().reverse();
  const latestBlockers = standupDates.length && D.standup[standupDates[0]] ? D.standup[standupDates[0]].blockers : '';
  const hasBlockers = latestBlockers && latestBlockers.trim().length > 0;
  scores.actions = hasBlockers ? 40 : (retroActions > 3 ? 60 : 80);

  const total = Math.round(
    scores.budget * 0.20 +
    scores.schedule * 0.20 +
    scores.risk * 0.20 +
    scores.rfi * 0.15 +
    scores.punch * 0.15 +
    scores.actions * 0.10
  );

  return { total: Math.max(0, Math.min(100, total)), scores };
}

function drawGauge(score) {
  const cv = document.getElementById('cvGauge'), ctx = cv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 280, H = 160;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const cx = W / 2, cy = H - 20, R = 100, r = 65;
  const startA = Math.PI, endA = 2 * Math.PI;

  // Background arc
  ctx.beginPath();
  ctx.arc(cx, cy, R, startA, endA);
  ctx.arc(cx, cy, r, endA, startA, true);
  ctx.closePath();
  ctx.fillStyle = '#222225';
  ctx.fill();

  // Gradient segments
  const segments = [
    { end: 0.33, color: COLORS.red },
    { end: 0.66, color: COLORS.gold },
    { end: 1.0,  color: COLORS.green }
  ];
  let prevEnd = 0;
  segments.forEach(seg => {
    const sa = startA + prevEnd * Math.PI;
    const ea = startA + seg.end * Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, R, sa, ea);
    ctx.arc(cx, cy, r, ea, sa, true);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.globalAlpha = 0.12;
    ctx.fill();
    prevEnd = seg.end;
  });
  ctx.globalAlpha = 1;

  // Score arc with glow
  const pct = Math.max(0, Math.min(100, score)) / 100;
  const scoreEnd = startA + pct * Math.PI;
  const color = score >= 75 ? COLORS.green : score >= 45 ? COLORS.gold : COLORS.red;

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.arc(cx, cy, R - 2, startA, scoreEnd);
  ctx.arc(cx, cy, r + 2, scoreEnd, startA, true);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Tick marks
  for (let i = 0; i <= 10; i++) {
    const a = startA + (i / 10) * Math.PI;
    const len = i % 5 === 0 ? 12 : 6;
    const x1 = cx + (R + 4) * Math.cos(a);
    const y1 = cy + (R + 4) * Math.sin(a);
    const x2 = cx + (R + 4 + len) * Math.cos(a);
    const y2 = cy + (R + 4 + len) * Math.sin(a);
    ctx.strokeStyle = i % 5 === 0 ? '#666' : '#444';
    ctx.lineWidth = i % 5 === 0 ? 1.5 : 1;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  // Labels
  ctx.fillStyle = '#666'; ctx.font = '10px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('0', cx + (R + 22) * Math.cos(Math.PI), cy + (R + 22) * Math.sin(Math.PI) - 2);
  ctx.fillText('50', cx + (R + 22) * Math.cos(Math.PI * 1.5), cy + (R + 22) * Math.sin(Math.PI * 1.5));
  ctx.fillText('100', cx + (R + 22) * Math.cos(2 * Math.PI), cy + (R + 22) * Math.sin(2 * Math.PI) - 2);

  // Needle
  const needleA = startA + pct * Math.PI;
  const needleLen = R - 10;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(needleA - Math.PI);
  ctx.beginPath();
  ctx.moveTo(0, -2);
  ctx.lineTo(needleLen, 0);
  ctx.lineTo(0, 2);
  ctx.closePath();
  ctx.fillStyle = '#fff';
  ctx.fill();
  // Center dot
  ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
  ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
  ctx.restore();

  // Score text
  ctx.fillStyle = '#fff'; ctx.font = 'bold 32px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(score, cx, cy - 25);
  ctx.fillStyle = '#666'; ctx.font = '12px system-ui';
  ctx.fillText('/ 100', cx, cy - 5);

  // Label
  const label = document.getElementById('gaugeLabel');
  const cls = score >= 75 ? 'badge-green' : score >= 45 ? 'badge-yellow' : 'badge-red';
  const text = score >= 75 ? 'Healthy' : score >= 45 ? 'Needs Attention' : 'At Risk';
  label.innerHTML = '<span class="badge ' + cls + '" style="font-size:.75rem;padding:4px 14px">' + text + '</span>';
}

/* ===== ROW 3: RISK HEAT MAP ===== */
function drawRiskHeatMap() {
  const cv = document.getElementById('cvRisk'), ctx = cv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 300, H = 300;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const openRisks = D.risks.filter(r => r.status === 'Open');

  if (!openRisks.length) {
    ctx.fillStyle = '#666'; ctx.font = '13px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('No open risks', W / 2, H / 2 - 10);
    ctx.fillStyle = '#444'; ctx.font = '11px system-ui';
    ctx.fillText('Open Risk Register to add risks', W / 2, H / 2 + 12);
    return;
  }

  const S = 44, OFF = 50;

  // Build 5x5 grid counting risks at each likelihood x impact
  const grid = Array.from({ length: 5 }, () => Array(5).fill(0));
  openRisks.forEach(r => {
    const li = Math.min(5, Math.max(1, r.likelihood)) - 1;
    const ii = Math.min(5, Math.max(1, r.impact)) - 1;
    grid[li][ii]++;
  });

  // Draw cells
  for (let y = 0; y < 5; y++) {
    for (let x = 0; x < 5; x++) {
      const score = (5 - y) * (x + 1);
      let bgColor, alpha;
      if (score >= 15) { bgColor = COLORS.red; alpha = 0.7; }
      else if (score >= 8) { bgColor = COLORS.gold; alpha = 0.45; }
      else if (score >= 4) { bgColor = COLORS.green; alpha = 0.3; }
      else { bgColor = COLORS.green; alpha = 0.15; }

      const cx = OFF + x * S, cy = OFF + y * S;

      ctx.fillStyle = bgColor;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.roundRect(cx, cy, S - 3, S - 3, 4);
      ctx.fill();

      // If risks present, draw count with bright background
      const count = grid[4 - y][x];
      if (count > 0) {
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = bgColor;
        ctx.beginPath();
        ctx.arc(cx + (S - 3) / 2, cy + (S - 3) / 2, 13, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(count, cx + (S - 3) / 2, cy + (S - 3) / 2);
      }
      ctx.globalAlpha = 1;
    }
  }

  // Axis labels
  ctx.fillStyle = '#888'; ctx.font = '10px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 1; i <= 5; i++) {
    ctx.fillText(i, OFF + (i - 1) * S + (S - 3) / 2, OFF + 5 * S + 10);
    ctx.fillText(i, OFF - 16, OFF + (5 - i) * S + (S - 3) / 2);
  }

  // Axis titles
  ctx.fillStyle = '#666'; ctx.font = '11px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('Impact →', OFF + 2.5 * S, OFF + 5 * S + 28);
  ctx.save();
  ctx.translate(12, OFF + 2.5 * S);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('Likelihood →', 0, 0);
  ctx.restore();

  // Total count
  ctx.fillStyle = '#888'; ctx.font = '10px system-ui'; ctx.textAlign = 'right';
  ctx.fillText(openRisks.length + ' open risk' + (openRisks.length !== 1 ? 's' : ''), W - 10, H - 8);
}

/* ===== ROW 3: BUDGET DONUT ===== */
function drawBudgetDonut() {
  const cv = document.getElementById('cvBudget'), ctx = cv.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = 300, H = 300;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const proj = getSelectedProject();
  const items = proj ? proj.items : D.estimates.flatMap(p => p.items);

  // Group by category
  const cats = {};
  items.forEach(i => {
    const cat = i.category || 'Other';
    cats[cat] = (cats[cat] || 0) + i.total;
  });
  const entries = Object.entries(cats).filter(e => e[1] > 0).sort((a, b) => b[1] - a[1]);
  const total = entries.reduce((s, e) => s + e[1], 0);

  if (!total) {
    ctx.fillStyle = '#666'; ctx.font = '13px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('No budget data', W / 2, H / 2 - 10);
    ctx.fillStyle = '#444'; ctx.font = '11px system-ui';
    ctx.fillText('Open Estimator to add items', W / 2, H / 2 + 12);
    return;
  }

  const cx = W / 2, cy = H / 2 - 25, R = 90, r = 55;
  let angle = -Math.PI / 2;

  entries.forEach(([cat, val], idx) => {
    const sweep = val / total * Math.PI * 2;
    const midA = angle + sweep / 2;
    const hover = 0; // could add interaction later

    ctx.beginPath();
    ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.arc(cx, cy, R, angle, angle + sweep);
    ctx.arc(cx, cy, r, angle + sweep, angle, true);
    ctx.closePath();

    ctx.fillStyle = PIE_COLORS[idx % PIE_COLORS.length];
    ctx.fill();

    // Subtle border between segments
    ctx.strokeStyle = 'rgba(15,15,16,.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    angle += sweep;
  });

  // Center text
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$' + (total >= 1e6 ? (total / 1e6).toFixed(1) + 'M' : total >= 1e3 ? Math.round(total / 1e3) + 'K' : total.toLocaleString()), cx, cy - 4);
  ctx.fillStyle = '#888'; ctx.font = '10px system-ui';
  ctx.fillText('Total Budget', cx, cy + 14);

  // Legend
  let ly = H - 10 - entries.slice(0, 6).length * 18;
  ctx.font = '11px system-ui'; ctx.textAlign = 'left';
  entries.slice(0, 6).forEach(([cat, val], idx) => {
    const pct = Math.round(val / total * 100);
    ctx.fillStyle = PIE_COLORS[idx % PIE_COLORS.length];
    ctx.beginPath(); ctx.roundRect(16, ly - 7, 10, 10, 2); ctx.fill();
    ctx.fillStyle = '#ccc';
    ctx.fillText(cat + '  $' + Math.round(val).toLocaleString() + ' (' + pct + '%)', 32, ly);
    ly += 18;
  });
  if (entries.length > 6) {
    ctx.fillStyle = '#666';
    ctx.fillText('+ ' + (entries.length - 6) + ' more categories', 32, ly);
  }
}

/* ===== ROW 4: SCHEDULE STATUS ===== */
function renderScheduleStatus() {
  const el = document.getElementById('scheduleStatus');
  const tl = D.timeline;
  const now = new Date();

  // Also pull from Tasker if available
  let tasks = [];
  tl.forEach(t => {
    const start = new Date(t.start);
    const end = new Date(t.end);
    const totalDur = Math.max(1, (end - start) / 864e5);
    const elapsed = Math.max(0, (now - start) / 864e5);
    const timePct = Math.min(100, Math.round(elapsed / totalDur * 100));
    const progress = t.progress != null ? t.progress : (now > end ? 100 : Math.min(100, timePct));
    const isOverdue = now > end && progress < 100;

    tasks.push({
      name: t.name,
      progress: Math.round(progress),
      isOverdue,
      end: t.end,
      color: t.color || COLORS.accent
    });
  });

  // Sort: overdue first, then by end date
  tasks.sort((a, b) => {
    if (a.isOverdue && !b.isOverdue) return -1;
    if (!a.isOverdue && b.isOverdue) return 1;
    return new Date(a.end) - new Date(b.end);
  });

  if (!tasks.length) {
    el.innerHTML = '<div class="empty-state">No schedule data.<br><a href="timeline.html">Open Timeline</a> or <a href="tasker.html">Tasker CPM</a></div>';
    return;
  }

  el.innerHTML = tasks.slice(0, 12).map(t => {
    const barColor = t.isOverdue ? COLORS.red : t.progress >= 100 ? COLORS.green : t.color || COLORS.accent;
    return '<div class="status-item">' +
      '<span class="name">' + esc(t.name) + '</span>' +
      '<div class="pbar"><div class="pbar-fill" style="width:' + t.progress + '%;background:' + barColor + '"></div></div>' +
      '<span class="pct">' + t.progress + '%</span>' +
      (t.isOverdue ? '<span class="flag flag-overdue">LATE</span>' : t.progress >= 100 ? '<span class="flag flag-ok">DONE</span>' : '') +
      '</div>';
  }).join('');
}

/* ===== ROW 4: OPEN ITEMS ===== */
function renderOpenItems() {
  const el = document.getElementById('openItems');
  const items = [];

  // Open RFIs
  D.rfi.filter(r => r.status === 'Open').forEach(r => {
    const overdue = r.dateRequired && new Date() > new Date(r.dateRequired);
    items.push({
      type: 'RFI',
      text: trunc(r.subject, 50),
      tag: overdue ? 'tag-critical' : 'tag-rfi',
      tagText: overdue ? 'OVERDUE' : 'RFI',
      date: r.dateRequired ? 'Need by ' + r.dateRequired : '',
      sort: overdue ? 0 : 1
    });
  });

  // Open punch items
  D.punchlist.filter(i => i.status !== 'Complete').forEach(i => {
    const isCrit = i.priority === 'Critical';
    items.push({
      type: 'PUNCH',
      text: trunc(i.title, 45) + (i.location ? ' @ ' + i.location : ''),
      tag: isCrit ? 'tag-critical' : 'tag-punch',
      tagText: isCrit ? 'CRITICAL' : 'PUNCH',
      date: i.priority,
      sort: isCrit ? 0 : 2
    });
  });

  // Retro actions
  (D.retro.actions || []).forEach(a => {
    const text = typeof a === 'string' ? a : (a.text || a.title || '');
    if (text) {
      items.push({
        type: 'ACTION',
        text: trunc(text, 50),
        tag: 'tag-action',
        tagText: 'ACTION',
        date: '',
        sort: 3
      });
    }
  });

  items.sort((a, b) => a.sort - b.sort);

  if (!items.length) {
    el.innerHTML = '<div class="empty-state">No open items!<br><span class="badge badge-green">All Clear</span></div>';
    return;
  }

  el.innerHTML = items.slice(0, 15).map(i =>
    '<div class="open-item">' +
    '<span class="tag ' + i.tag + '">' + i.tagText + '</span>' +
    '<div style="flex:1;min-width:0"><div style="color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(i.text) + '</div>' +
    (i.date ? '<div style="color:var(--dim);font-size:.68rem;margin-top:1px">' + i.date + '</div>' : '') +
    '</div></div>'
  ).join('');
}

/* ===== ROW 4: RESOURCE SUMMARY ===== */
function renderResourceSummary() {
  const el = document.getElementById('resourceSummary');
  const rows = [];

  // From daily log - crew data
  const logs = D.dailylog.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (logs.length) {
    const latest = logs[0];
    rows.push({ label: 'Latest Log Date', val: latest.date || 'N/A' });

    if (Array.isArray(latest.crew)) {
      const totalHrs = latest.crew.reduce((s, c) => s + (c.hours || 0), 0);
      rows.push({ label: 'Crew on Site', val: latest.crew.length + ' workers' });
      rows.push({ label: 'Total Hours', val: totalHrs + ' hrs' });

      // Trades breakdown
      const trades = {};
      latest.crew.forEach(c => {
        const t = c.trade || 'General';
        trades[t] = (trades[t] || 0) + 1;
      });
      Object.entries(trades).forEach(([trade, count]) => {
        rows.push({ label: '  ' + trade, val: count + '' });
      });
    }

    if (latest.weather) {
      rows.push({ label: 'Weather', val: latest.weather });
    }
  }

  // From site diary
  if (!logs.length && D.sitediary.length) {
    const latest = D.sitediary[D.sitediary.length - 1];
    rows.push({ label: 'Latest Diary', val: latest.date || 'N/A' });
    if (latest.crew) rows.push({ label: 'Crew', val: typeof latest.crew === 'number' ? latest.crew + '' : latest.crew });
    if (latest.weather) rows.push({ label: 'Weather', val: latest.weather });
  }

  // Kanban workload
  const doing = D.kanban.filter(c => c.col === 'doing').length;
  const review = D.kanban.filter(c => c.col === 'review').length;
  const backlog = D.kanban.filter(c => c.col === 'backlog').length;
  if (D.kanban.length) {
    rows.push({ label: 'Kanban Active', val: doing + ' doing, ' + review + ' review' });
    rows.push({ label: 'Kanban Backlog', val: backlog + ' items' });
  }

  // Standup blockers
  const standupDates = Object.keys(D.standup).sort().reverse();
  if (standupDates.length) {
    const latest = D.standup[standupDates[0]];
    if (latest && latest.blockers && latest.blockers.trim()) {
      rows.push({ label: 'Current Blocker', val: trunc(latest.blockers, 40) });
    }
  }

  if (!rows.length) {
    el.innerHTML = '<div class="empty-state">No resource data.<br><a href="dailylog.html">Open Daily Log</a> or <a href="sitediary.html">Site Diary</a></div>';
    return;
  }

  el.innerHTML = rows.map(r =>
    '<div class="resource-row"><span class="resource-label">' + esc(r.label) + '</span><span class="resource-val">' + esc(r.val) + '</span></div>'
  ).join('');
}

/* ===== HELPERS ===== */
function trunc(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : s || ''; }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}
