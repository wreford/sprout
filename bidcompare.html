<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bid Comparison</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-gold{background:#f7c948;color:#000}
.btn-red{background:#ef4444}
.btn:active{opacity:.8}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{padding:8px 14px;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;cursor:pointer;font-size:.85rem}
.tab.active{background:#ff6b35;color:#fff;border-color:#ff6b35}
.bid-card{background:#0f0f10;border:1px solid #2a2a2d;border-radius:8px;padding:14px;margin-bottom:10px;position:relative}
.bid-card.lowest{border-color:#4ade80}
.bid-card.highest{border-color:#ef4444}
.bid-card.awarded{border-color:#f7c948;border-width:2px}
.bid-price{font-size:1.3rem;font-weight:700;color:#4ade80}
.bid-company{font-size:1.1rem;font-weight:600}
.bid-meta{font-size:.8rem;color:#999;margin-top:4px}
.stars{display:inline-flex;gap:2px;cursor:pointer}
.star{font-size:1.2rem;color:#2a2a2d}
.star.filled{color:#f7c948}
.compare-table{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:12px;overflow-x:auto;display:block}
.compare-table th,.compare-table td{padding:8px;border:1px solid #2a2a2d;text-align:left;white-space:nowrap}
.compare-table th{background:#0f0f10;color:#ff6b35}
.lowest-cell{color:#4ade80;font-weight:600}
.highest-cell{color:#ef4444}
.award-badge{position:absolute;top:8px;right:8px;background:#f7c948;color:#000;padding:3px 10px;border-radius:10px;font-size:.7rem;font-weight:700}
.score-bar{display:flex;align-items:center;gap:8px;margin:4px 0}
.score-bar label{font-size:.8rem;color:#999;min-width:70px}
@media print{body{background:#fff;color:#000}.card{border-color:#ccc}.btn,.tabs{display:none!important}}
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="home-link">&#8592;</a>
<h1>Bid Comparison</h1>
</div>

<div class="card">
<h2>Comparisons</h2>
<div class="row">
<div class="field"><label>Scope of Work</label><input type="text" id="newScope" placeholder="e.g. Plumbing Rough-In"></div>
</div>
<button class="btn btn-sm" onclick="addComparison()">+ New Comparison</button>
<div class="tabs" id="compTabs" style="margin-top:12px"></div>
</div>

<div id="compArea" style="display:none">
<div class="card">
<h2>Add Bid</h2>
<div class="row">
<div class="field"><label>Company</label><input type="text" id="bidCompany"></div>
<div class="field"><label>Total Price ($)</label><input type="number" id="bidPrice"></div>
</div>
<div class="row">
<div class="field"><label>Timeline</label><input type="text" id="bidTimeline" placeholder="e.g. 3 weeks"></div>
<div class="field"><label>Warranty</label><input type="text" id="bidWarranty" placeholder="e.g. 1 year"></div>
</div>
<div class="row">
<div class="field"><label>Inclusions</label><input type="text" id="bidInclusions" placeholder="What's included"></div>
</div>
<div class="row">
<div class="field"><label>Exclusions</label><input type="text" id="bidExclusions" placeholder="What's NOT included"></div>
</div>
<div class="row">
<div class="field"><label>Notes</label><input type="text" id="bidNotes"></div>
</div>
<button class="btn" onclick="addBid()">+ Add Bid</button>
</div>

<div class="card">
<h2>Bids</h2>
<div id="bidList"></div>
</div>

<div class="card">
<h2>Comparison</h2>
<div style="overflow-x:auto"><table class="compare-table" id="compareTable"></table></div>
</div>

<div class="card">
<h2>Scoring & Recommendation</h2>
<div id="scoreArea"></div>
<div id="recommendation" style="margin-top:12px;font-size:1rem;font-weight:600"></div>
</div>

<button class="btn" onclick="exportComparison()">Export Comparison</button>
<button class="btn btn-red btn-sm" onclick="deleteComparison()">Delete Comparison</button>
</div>

<script>
let data={comparisons:[],active:null};
function load(){data=JSON.parse(localStorage.getItem('bidcompare-data')||'{"comparisons":[],"active":null}');}
function save(){localStorage.setItem('bidcompare-data',JSON.stringify(data));}
function getComp(){return data.comparisons.find(c=>c.id===data.active);}

function addComparison(){
const scope=document.getElementById('newScope').value.trim();if(!scope)return;
const comp={id:Date.now(),scope,bids:[],scores:{}};
data.comparisons.push(comp);data.active=comp.id;
document.getElementById('newScope').value='';
save();renderTabs();renderComp();
}
function selectComp(id){data.active=id;save();renderTabs();renderComp();}
function deleteComparison(){
data.comparisons=data.comparisons.filter(c=>c.id!==data.active);
data.active=data.comparisons.length?data.comparisons[0].id:null;
save();renderTabs();renderComp();
}

function renderTabs(){
const el=document.getElementById('compTabs');
el.innerHTML=data.comparisons.map(c=>`<div class="tab${c.id===data.active?' active':''}" onclick="selectComp(${c.id})">${c.scope}</div>`).join('');
document.getElementById('compArea').style.display=data.active?'block':'none';
}

function addBid(){
const comp=getComp();if(!comp)return;
const company=document.getElementById('bidCompany').value.trim();
const price=parseFloat(document.getElementById('bidPrice').value)||0;
if(!company)return;
comp.bids.push({
id:Date.now(),company,price,
timeline:document.getElementById('bidTimeline').value.trim(),
warranty:document.getElementById('bidWarranty').value.trim(),
inclusions:document.getElementById('bidInclusions').value.trim(),
exclusions:document.getElementById('bidExclusions').value.trim(),
notes:document.getElementById('bidNotes').value.trim(),
awarded:false
});
if(!comp.scores)comp.scores={};
comp.scores[comp.bids[comp.bids.length-1].id]={timeline:3,quality:3,warranty:3,references:3};
document.getElementById('bidCompany').value='';document.getElementById('bidPrice').value='';
document.getElementById('bidTimeline').value='';document.getElementById('bidWarranty').value='';
document.getElementById('bidInclusions').value='';document.getElementById('bidExclusions').value='';
document.getElementById('bidNotes').value='';
save();renderComp();
}

function removeBid(bidId){
const comp=getComp();comp.bids=comp.bids.filter(b=>b.id!==bidId);
delete comp.scores[bidId];save();renderComp();
}
function awardBid(bidId){
const comp=getComp();comp.bids.forEach(b=>{b.awarded=b.id===bidId;});save();renderComp();
}

function renderComp(){
const comp=getComp();if(!comp){document.getElementById('compArea').style.display='none';return;}
renderBids(comp);renderTable(comp);renderScores(comp);
}

function renderBids(comp){
const prices=comp.bids.map(b=>b.price);
const min=Math.min(...prices),max=Math.max(...prices);
const el=document.getElementById('bidList');
el.innerHTML=comp.bids.map(b=>{
let cls='';if(comp.bids.length>1){if(b.price===min)cls='lowest';if(b.price===max)cls='highest';}
if(b.awarded)cls='awarded';
return`<div class="bid-card ${cls}">
${b.awarded?'<div class="award-badge">AWARDED</div>':''}
<div class="bid-company">${b.company}</div>
<div class="bid-price">$${b.price.toLocaleString()}</div>
<div class="bid-meta">${b.timeline?'Timeline: '+b.timeline+' | ':''}${b.warranty?'Warranty: '+b.warranty:''}</div>
${b.inclusions?'<div class="bid-meta">Includes: '+b.inclusions+'</div>':''}
${b.exclusions?'<div class="bid-meta" style="color:#ef4444">Excludes: '+b.exclusions+'</div>':''}
${b.notes?'<div class="bid-meta">Notes: '+b.notes+'</div>':''}
<div style="margin-top:8px">
<button class="btn btn-sm btn-gold" onclick="awardBid(${b.id})">Award</button>
<button class="btn btn-sm btn-red" onclick="removeBid(${b.id})">Remove</button>
</div></div>`;
}).join('');
}

function renderTable(comp){
if(comp.bids.length<2){document.getElementById('compareTable').innerHTML='<tr><td style="color:#999">Add 2+ bids to compare</td></tr>';return;}
const prices=comp.bids.map(b=>b.price);const min=Math.min(...prices),max=Math.max(...prices);
let html='<tr><th>Criteria</th>'+comp.bids.map(b=>`<th>${b.company}</th>`).join('')+'</tr>';
html+='<tr><td>Price</td>'+comp.bids.map(b=>`<td class="${b.price===min?'lowest-cell':b.price===max?'highest-cell':''}">$${b.price.toLocaleString()}</td>`).join('')+'</tr>';
html+='<tr><td>Timeline</td>'+comp.bids.map(b=>`<td>${b.timeline||'-'}</td>`).join('')+'</tr>';
html+='<tr><td>Warranty</td>'+comp.bids.map(b=>`<td>${b.warranty||'-'}</td>`).join('')+'</tr>';
html+='<tr><td>Inclusions</td>'+comp.bids.map(b=>`<td>${b.inclusions||'-'}</td>`).join('')+'</tr>';
html+='<tr><td>Exclusions</td>'+comp.bids.map(b=>`<td>${b.exclusions||'-'}</td>`).join('')+'</tr>';
document.getElementById('compareTable').innerHTML=html;
}

function renderScores(comp){
if(!comp.bids.length){document.getElementById('scoreArea').innerHTML='';document.getElementById('recommendation').innerHTML='';return;}
if(!comp.scores)comp.scores={};
const cats=['timeline','quality','warranty','references'];
const weights={timeline:20,quality:30,warranty:20,references:30};
let html='';
comp.bids.forEach(b=>{
if(!comp.scores[b.id])comp.scores[b.id]={timeline:3,quality:3,warranty:3,references:3};
const s=comp.scores[b.id];
html+=`<div style="margin-bottom:16px"><strong>${b.company}</strong>`;
cats.forEach(cat=>{
html+=`<div class="score-bar"><label>${cat}</label><div class="stars">`;
for(let i=1;i<=5;i++){
html+=`<span class="star${i<=s[cat]?' filled':''}" onclick="setScore(${b.id},'${cat}',${i})">&#9733;</span>`;
}
html+=`</div></div>`;
});
html+=`</div>`;
});
document.getElementById('scoreArea').innerHTML=html;

// Calculate weighted scores
const prices=comp.bids.map(b=>b.price);const minP=Math.min(...prices),maxP=Math.max(...prices);
let best=null,bestScore=0;
comp.bids.forEach(b=>{
const s=comp.scores[b.id]||{timeline:3,quality:3,warranty:3,references:3};
const priceScore=maxP===minP?5:5-((b.price-minP)/(maxP-minP))*4;
const total=(priceScore*30+s.timeline*weights.timeline+s.quality*weights.quality+s.warranty*weights.warranty+s.references*weights.references)/
(30+weights.timeline+weights.quality+weights.warranty+weights.references)*20;
if(total>bestScore){bestScore=total;best=b.company;}
});
document.getElementById('recommendation').innerHTML=best?`<span style="color:#4ade80">Recommendation: ${best}</span> (Score: ${bestScore.toFixed(1)}/100)`:'';
}

function setScore(bidId,cat,val){
const comp=getComp();
if(!comp.scores[bidId])comp.scores[bidId]={timeline:3,quality:3,warranty:3,references:3};
comp.scores[bidId][cat]=val;save();renderScores(comp);
}

function exportComparison(){
const comp=getComp();if(!comp)return;
let t=`BID COMPARISON: ${comp.scope}\nDate: ${new Date().toLocaleDateString()}\n\n`;
comp.bids.forEach(b=>{
t+=`${b.company}${b.awarded?' [AWARDED]':''}\n  Price: $${b.price.toLocaleString()}\n  Timeline: ${b.timeline||'N/A'}\n  Warranty: ${b.warranty||'N/A'}\n  Includes: ${b.inclusions||'N/A'}\n  Excludes: ${b.exclusions||'N/A'}\n  Notes: ${b.notes||'N/A'}\n\n`;
});
navigator.clipboard.writeText(t).then(()=>alert('Copied!')).catch(()=>{});
}

load();renderTabs();if(data.active)renderComp();
</script>
</body>
</html>
