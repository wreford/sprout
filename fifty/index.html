<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#08070d">
<meta name="description" content="Fifty — a swipe through fifty open public APIs, live.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fifty">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,900&family=IBM+Plex+Mono:wght@400;600&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2382ffe4'/%3E%3Cstop offset='.5' stop-color='%23c48bff'/%3E%3Cstop offset='1' stop-color='%23ff7ac6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Fraunces,Georgia,serif' font-weight='900' font-size='16' fill='%230f0a1e'%3E50%3C/text%3E%3C/svg%3E">
<title>Fifty — 50 open APIs, live</title>
<style>
:root{
  --bg:#08070d; --panel:#141221; --panel-2:#1c1830; --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.22);
  --text:#f4f2ef; --dim:#a498bf; --dimmer:#6f5f95;
  --mint:#82ffe4; --violet:#c48bff; --pink:#ff7ac6; --amber:#ffce54; --lime:#c8ff5a; --hot:#ff3d68; --peach:#ff9a5e; --sky:#5eb1ff;
  --disp:'Fraunces',Georgia,serif;
  --serif:'Newsreader',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
  --squish:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%;overflow-x:hidden}
html,body{background:#000;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;overflow:hidden}
body{position:fixed;inset:0;width:100%;height:100%}
button,a,input,select{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
::selection{background:rgba(196,139,255,.28);color:#fff}

.feed{
  position:fixed;inset:0;z-index:1;
  overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scroll-snap-type:y mandatory
}
.card{
  height:100vh;height:100dvh;width:100%;position:relative;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;overflow:hidden;
  background:radial-gradient(120% 60% at 50% 0%, var(--tint, rgba(196,139,255,.24)), transparent 62%), linear-gradient(180deg,#0d0b18 0%,#08070d 100%)
}
.card[data-kind="image"]{background:#000}
.card .kicker{
  display:inline-flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;
  margin:calc(env(safe-area-inset-top) + 74px) max(20px,env(safe-area-inset-right)) 0 max(20px,env(safe-area-inset-left));
  font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;font-weight:700;
  color:var(--text);opacity:.86
}
.card .kicker .cat{
  padding:5px 12px;border-radius:100px;
  background:linear-gradient(135deg,var(--tint, rgba(196,139,255,.32)), rgba(255,255,255,.06));
  border:1px solid var(--tint-border, rgba(196,139,255,.4));
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.18)
}
.card .kicker .cat::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent,var(--violet));box-shadow:0 0 8px var(--accent,var(--violet))}
.card .kicker .n{color:var(--dim);font-weight:600;letter-spacing:.14em}
.card .body{
  flex:1;min-height:0;
  padding:22px max(22px,env(safe-area-inset-right)) 0 max(22px,env(safe-area-inset-left));
  display:flex;flex-direction:column;justify-content:center;
  overflow:hidden
}

/* Quote card */
.q-quote{
  font-family:var(--disp);font-style:italic;font-weight:600;
  font-size:clamp(24px,6.4vw,42px);line-height:1.15;letter-spacing:-.02em;
  color:var(--text);max-width:22ch;position:relative
}
.q-quote::before{content:"“";position:absolute;left:-.55em;top:-.35em;font-size:1.6em;color:var(--accent,var(--violet));opacity:.35;line-height:1}
.q-attrib{
  margin-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  color:var(--dim);text-transform:uppercase;font-weight:600
}
.q-attrib span{color:var(--text)}

/* Fact card */
.q-fact{
  font-family:var(--serif);font-size:clamp(20px,5.4vw,32px);line-height:1.4;
  color:var(--text);max-width:28ch
}
.q-fact::first-letter{
  font-family:var(--disp);font-weight:900;font-size:2em;line-height:.8;float:left;
  padding:.08em .1em 0 0;color:var(--accent,var(--violet))
}

/* Image card — hero image fills viewport */
.card[data-kind="image"] .body{padding:0;position:relative}
.q-image{
  position:absolute;inset:0;
  background:#000;
  display:flex;align-items:center;justify-content:center
}
.q-image img{
  width:100%;height:100%;object-fit:contain;
  animation:img-in .5s var(--ease) both
}
@keyframes img-in{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
.card[data-kind="image"] .kicker{position:absolute;top:0;left:0;right:0;z-index:5;background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);padding-bottom:14px}
.card[data-kind="image"] .info-block{
  position:absolute;left:0;right:0;bottom:0;z-index:5;
  padding:80px max(22px,env(safe-area-inset-right)) calc(env(safe-area-inset-bottom) + 100px) max(22px,env(safe-area-inset-left));
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.7) 40%,rgba(0,0,0,.95));
  color:#fff
}
.q-caption{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.45;color:rgba(255,255,255,.86);margin-top:8px;max-width:44ch}

/* Data card */
.q-data{display:flex;flex-direction:column;gap:12px;max-width:32ch}
.q-data .row{
  display:flex;justify-content:space-between;align-items:baseline;gap:12px;
  padding:12px 14px;border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14)
}
.q-data .row .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;font-weight:700}
.q-data .row .v{font-family:var(--disp);font-weight:900;font-size:clamp(18px,4.4vw,28px);color:var(--text);letter-spacing:-.01em}
.q-lede{font-family:var(--disp);font-weight:900;font-size:clamp(28px,6.8vw,40px);line-height:1;letter-spacing:-.028em;color:var(--text);margin-bottom:16px}
.q-lede em{color:var(--accent,var(--violet));font-style:italic}

/* Question card */
.q-question{font-family:var(--disp);font-weight:900;font-size:clamp(22px,5.6vw,34px);line-height:1.1;letter-spacing:-.02em;color:var(--text);margin-bottom:14px}
.q-options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.q-options button{
  padding:12px 14px;border-radius:14px;text-align:left;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  color:var(--text);font-family:var(--serif);font-size:16px;line-height:1.25;
  min-height:50px;cursor:pointer;transition:all .16s var(--ease)
}
.q-options button:hover{background:rgba(255,255,255,.12);border-color:var(--accent,var(--violet))}
.q-options button.right{background:linear-gradient(135deg,rgba(94,234,212,.24),rgba(200,255,90,.12));border-color:var(--mint);color:#fff}
.q-options button.wrong{background:linear-gradient(135deg,rgba(255,61,104,.24),rgba(255,122,198,.12));border-color:var(--hot);color:#fff}
.q-reveal{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-top:12px;font-weight:700}
.q-reveal span{color:var(--text)}

/* Footer bar — API attribution + swipe hint */
.card .foot{
  position:absolute;left:0;right:0;bottom:0;z-index:6;
  padding:14px max(20px,env(safe-area-inset-right)) calc(env(safe-area-inset-bottom) + 14px) max(20px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.7));
  pointer-events:none
}
.card .foot a,.card .foot .lbl{
  pointer-events:auto;
  padding:7px 12px;border-radius:100px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  color:var(--text);text-decoration:none;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
  display:inline-flex;align-items:center;gap:6px;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14)
}
.card .foot a:hover{background:rgba(255,255,255,.12);border-color:var(--accent,var(--violet));color:var(--accent,var(--violet))}
.card .foot .lbl{color:var(--dim)}
.card .foot .lbl::before{content:"↑";margin-right:4px;color:var(--accent,var(--violet))}
.card .again{
  pointer-events:auto;
  padding:7px 12px;border-radius:100px;
  background:linear-gradient(135deg,var(--accent,var(--violet)),var(--hot));color:#fff;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
  border:none;cursor:pointer;
  box-shadow:0 4px 12px rgba(196,139,255,.4),inset 0 1px 0 rgba(255,255,255,.28)
}

/* Loading state */
.card.loading .body{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.card.loading .spin{display:flex;gap:6px}
.card.loading .spin span{width:10px;height:10px;border-radius:50%;background:var(--accent,var(--violet));animation:bounce 1.4s ease-in-out infinite;box-shadow:0 0 10px currentColor}
.card.loading .spin span:nth-child(2){animation-delay:.15s;background:var(--mint)}
.card.loading .spin span:nth-child(3){animation-delay:.3s;background:var(--pink)}
@keyframes bounce{0%,100%{transform:scale(1) translateY(0);opacity:1}50%{transform:scale(1.2) translateY(-8px);opacity:.6}}
.card.loading .lbl{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase}

.card.err .body{align-items:center;text-align:center}
.card.err .msg{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.06em;line-height:1.6;max-width:32ch}
.card.err .msg strong{color:var(--hot);display:block;margin-bottom:8px;font-family:var(--disp);font-size:22px;font-style:italic;font-weight:900;letter-spacing:-.01em}

/* Top nav */
.top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:calc(env(safe-area-inset-top) + 10px) max(14px,env(safe-area-inset-right)) 12px max(14px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(180deg,rgba(0,0,0,.75),rgba(0,0,0,.4) 60%,transparent);
  pointer-events:none
}
.top .brand{
  color:#fff;font-family:var(--disp);font-weight:900;font-size:20px;
  letter-spacing:-.03em;pointer-events:auto;
  display:flex;align-items:center;gap:9px
}
.top .brand .n50{
  background:linear-gradient(112deg,var(--mint),var(--violet) 50%,var(--pink) 82%,var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.top .brand .badge{
  width:28px;height:28px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--mint),var(--violet) 50%,var(--pink) 80%,var(--amber));
  display:flex;align-items:center;justify-content:center;
  color:#0f0a1e;font-family:var(--disp);font-weight:900;font-size:14px;
  box-shadow:0 4px 12px rgba(196,139,255,.4),inset 0 1px 0 rgba(255,255,255,.4)
}
.top .r{display:flex;gap:6px;pointer-events:auto}
.tico{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.14);
  font-size:14px;font-weight:600;cursor:pointer;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;
  transition:all .16s var(--squish)
}
.tico:hover{background:linear-gradient(135deg,var(--violet),var(--pink));border-color:transparent;transform:translateY(-1px) scale(1.05)}
.tico:active{transform:scale(.92)}

/* Filter sheet */
.sheet-bg{
  position:fixed;inset:0;z-index:180;background:rgba(0,0,0,.65);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:none;opacity:0;transition:opacity .2s var(--ease)
}
.sheet-bg.show{display:block;opacity:1}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:190;
  background:linear-gradient(180deg,var(--panel-2),#0f0a1e);
  border-top:1px solid var(--border);border-radius:22px 22px 0 0;
  transform:translateY(100%);transition:transform .3s var(--ease);
  display:flex;flex-direction:column;
  max-height:80dvh;
  padding-bottom:calc(env(safe-area-inset-bottom) + 18px);
  box-shadow:0 -20px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.1)
}
.sheet.show{transform:none}
.sheet .hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative}
.sheet .hdr::before{content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.18)}
.sheet .hdr h3{font-family:var(--disp);font-weight:900;font-size:19px;color:var(--text);letter-spacing:-.01em}
.sheet .hdr .close{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--dim);font-size:16px}
.sheet .list{flex:1;overflow-y:auto;padding:14px 16px}
.sheet .cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sheet .cat-btn{
  padding:12px 14px;border-radius:12px;text-align:left;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:var(--text);font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
  min-height:48px;cursor:pointer;transition:all .14s var(--ease);
  display:flex;flex-direction:column;justify-content:center;gap:2px
}
.sheet .cat-btn .lbl{color:var(--dimmer);font-weight:600;letter-spacing:.06em;font-size:9.5px;text-transform:none}
.sheet .cat-btn.on{background:linear-gradient(135deg,var(--violet),var(--pink));border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(196,139,255,.4)}
.sheet .api-list{display:flex;flex-direction:column;gap:6px}
.sheet .api-row{
  padding:11px 14px;border-radius:11px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  cursor:pointer;transition:all .12s var(--ease);text-align:left;color:var(--text)
}
.sheet .api-row:hover{background:rgba(255,255,255,.08);border-color:var(--accent,var(--violet))}
.sheet .api-row .n{font-family:var(--disp);font-weight:600;font-size:14.5px;letter-spacing:-.005em}
.sheet .api-row .k{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;font-weight:700;padding:3px 8px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}

.hint{
  position:fixed;top:calc(env(safe-area-inset-top) + 62px);left:50%;transform:translateX(-50%);
  z-index:105;pointer-events:none;white-space:nowrap;
  padding:6px 14px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.14);
  border-radius:100px;color:rgba(255,255,255,.9);
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
  backdrop-filter:blur(10px);
  animation:hintfade 3s ease-in forwards;opacity:0
}
@keyframes hintfade{0%{opacity:0}12%{opacity:1}75%{opacity:1}100%{opacity:0}}

/* Kind tints */
.card[data-kind="quote"]{--accent:var(--pink);--tint:rgba(255,122,198,.24);--tint-border:rgba(255,122,198,.4)}
.card[data-kind="fact"]{--accent:var(--mint);--tint:rgba(130,255,228,.22);--tint-border:rgba(130,255,228,.4)}
.card[data-kind="image"]{--accent:var(--amber);--tint:rgba(255,206,84,.22);--tint-border:rgba(255,206,84,.42)}
.card[data-kind="data"]{--accent:var(--violet);--tint:rgba(196,139,255,.24);--tint-border:rgba(196,139,255,.42)}
.card[data-kind="question"]{--accent:var(--lime);--tint:rgba(200,255,90,.22);--tint-border:rgba(200,255,90,.42)}
.card[data-kind="character"]{--accent:var(--sky);--tint:rgba(94,177,255,.22);--tint-border:rgba(94,177,255,.42)}
</style>
</head>
<body>

<div class="feed" id="feed"></div>

<nav class="top">
  <div class="brand"><span class="badge">50</span><span class="n50">Fifty</span></div>
  <div class="r">
    <button class="tico" id="listBtn" title="Browse APIs">
      <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <button class="tico" id="shufBtn" title="Reshuffle">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
    </button>
  </div>
</nav>

<div class="hint" id="hint">↑ swipe · fifty open APIs, live ↑</div>

<div class="sheet-bg" id="sheetBg"></div>
<aside class="sheet" id="sheet">
  <div class="hdr">
    <h3>Fifty open APIs</h3>
    <button class="close" id="sheetClose">×</button>
  </div>
  <div class="list">
    <div class="cats" id="cats"></div>
    <div class="api-list" id="apiList"></div>
  </div>
</aside>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   Fifty · 50 CORS-friendly, no-auth public APIs.
   Each api provides a fetcher (returns raw json) and a
   normalizer (returns { kind, ...card fields }).
   ═══════════════════════════════════════════════════════ */

const $ = id => document.getElementById(id);
const rand = a => a[Math.floor(Math.random() * a.length)];
const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const escapeHtml = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const TIMEOUT_MS = 8000;
function fetchJson(url, opts = {}) {
  const ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
  const to = ctrl ? setTimeout(() => ctrl.abort(), TIMEOUT_MS) : null;
  const headers = opts.headers || {};
  if (!headers['accept'] && !headers['Accept']) headers['Accept'] = 'application/json';
  return fetch(url, { ...opts, headers, signal: ctrl ? ctrl.signal : undefined })
    .then(r => { if (to) clearTimeout(to); if (!r.ok) throw new Error(url + ' → ' + r.status); return r.json(); });
}

/* Simple category set */
const CATS = [
  { k:'all',   label:'All' },
  { k:'quote', label:'Quotes & jokes' },
  { k:'fact',  label:'Facts' },
  { k:'image', label:'Images' },
  { k:'data',  label:'Data' },
  { k:'trivia',label:'Trivia' },
  { k:'random',label:'Random people' },
];

const APIS = [
  /* ═══ QUOTES · JOKES · ADVICE ═══ */
  { id:'chuck', name:'Chuck Norris jokes', cat:'quote', kind:'quote', home:'https://api.chucknorris.io',
    fetch:async()=>fetchJson('https://api.chucknorris.io/jokes/random'),

/* ═══════════════════════════════════════════════════════
   Feed
   ═══════════════════════════════════════════════════════ */
const state = {
  cat: 'all',
  seen: [],   // ids already served
};
const FEED = { el:null, cards:[], currentIndex:0, io:null, busy:false };

function activeApis() {
  return state.cat === 'all' ? APIS : APIS.filter(a => a.cat === state.cat);
}

function pickNextApi() {
  const pool = activeApis();
  const unseen = pool.filter(a => !state.seen.includes(a.id));
  const src = unseen.length ? unseen : pool;
  const pick = rand(src);
  state.seen.push(pick.id);
  if (state.seen.length > pool.length * 1.5) state.seen = state.seen.slice(-Math.floor(pool.length * .8));
  return pick;
}

async function refill() {
  if (FEED.busy) return;
  FEED.busy = true;
  try {
    const need = Math.max(0, 4 - (FEED.cards.length - FEED.currentIndex));
    for (let i = 0; i < need; i++) {
      const api = pickNextApi();
      const el = appendPending(api);
      // fire and forget; each card fills itself in
      hydrateCard(el, api);
    }
  } finally { FEED.busy = false; }
}

function appendPending(api) {
  const el = document.createElement('div');
  el.className = 'card loading';
  el.dataset.kind = api.kind;
  el.dataset.apiId = api.id;
  el.innerHTML = `
    <div class="kicker">
      <span class="cat">${api.cat}</span>
      <span class="n">${escapeHtml(api.name)}</span>
    </div>
    <div class="body">
      <div class="spin"><span></span><span></span><span></span></div>
      <div class="lbl">calling ${escapeHtml(api.name)}…</div>
    </div>
    <div class="foot">
      <span class="lbl">swipe</span>
    </div>`;
  FEED.el.appendChild(el);
  FEED.cards.push(el);
  if (FEED.io) FEED.io.observe(el);
  return el;
}

async function hydrateCard(el, api) {
  try {
    const raw = await api.fetch();
    const c = api.normalize(raw);
    if (!c) throw new Error('normalize returned nothing');
    renderCard(el, api, c);
  } catch (err) {
    renderError(el, api, err);
  }
}

function renderCard(el, api, c) {
  el.classList.remove('loading');
  el.dataset.kind = c.kind;
  const kick = c.kicker ? `<span class="cat">${escapeHtml(c.kicker)}</span>` : `<span class="cat">${api.cat}</span>`;
  const nameLine = `<span class="n">${escapeHtml(api.name)}</span>`;
  let bodyHtml = '';
  let infoBlock = '';
  if (c.kind === 'quote') {
    bodyHtml = `
      <div>
        <div class="q-quote">${escapeHtml(c.text || '')}</div>
        ${c.source ? `<div class="q-attrib">— <span>${escapeHtml(c.source)}</span></div>` : ''}
      </div>`;
  } else if (c.kind === 'fact') {
    bodyHtml = `
      <div>
        <div class="q-fact">${escapeHtml(c.text || '')}</div>
        ${c.source ? `<div class="q-attrib" style="margin-top:22px">via <span>${escapeHtml(c.source)}</span></div>` : ''}
      </div>`;
  } else if (c.kind === 'data') {
    bodyHtml = `
      <div>
        ${c.title ? `<div class="q-lede">${escapeHtml(c.title)}</div>` : ''}
        <div class="q-data">
          ${(c.rows || []).map(r => `<div class="row"><span class="k">${escapeHtml(r.k)}</span><span class="v">${escapeHtml(r.v)}</span></div>`).join('')}
        </div>
      </div>`;
  } else if (c.kind === 'character') {
    bodyHtml = `
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;width:100%">
        ${c.image ? `<img src="${escapeHtml(c.image)}" alt="" loading="lazy" style="max-width:min(70%,300px);max-height:44dvh;object-fit:contain;border-radius:16px;box-shadow:0 20px 40px rgba(0,0,0,.55);background:#0a0a10">` : ''}
        <div>
          <div class="q-lede" style="margin-bottom:6px;text-align:center">${escapeHtml(c.title || '')}</div>
          ${c.subtitle ? `<div class="q-attrib" style="text-align:center">${c.subtitle}</div>` : ''}
        </div>
      </div>`;
  } else if (c.kind === 'question') {
    const opts = (c.options || []).map((o, i) => `<button data-i="${i}" data-opt="${escapeHtml(o)}">${escapeHtml(o)}</button>`).join('');
    bodyHtml = `
      <div>
        <div class="q-question">${c.question || ''}</div>
        <div class="q-options">${opts}</div>
        <div class="q-reveal" data-reveal style="display:none">Answer · <span>${escapeHtml(c.correct || '')}</span></div>
      </div>`;
  } else if (c.kind === 'image') {
    if (!c.url) {
      renderError(el, api, new Error('no image url'));
      return;
    }
    // Special image layout — no body, image is the hero
    el.innerHTML = `
      <div class="kicker" style="position:absolute;top:0;left:0;right:0;z-index:6">${kick}${nameLine}</div>
      <div class="body"><div class="q-image"><img src="${escapeHtml(c.url)}" alt="${escapeHtml(c.title || c.kicker || '')}" loading="lazy"></div></div>
      <div class="info-block">
        ${c.title ? `<div class="q-lede">${escapeHtml(c.title)}</div>` : ''}
        ${c.caption ? `<div class="q-caption">${escapeHtml(c.caption)}</div>` : ''}
      </div>
      <div class="foot">
        <a href="${escapeHtml(api.home)}" target="_blank" rel="noopener">via ${escapeHtml(c.source || api.name)}</a>
        <button class="again" data-act="again">Again</button>
      </div>`;
    wireCard(el, api, c);
    return;
  }
  el.innerHTML = `
    <div class="kicker">${kick}${nameLine}</div>
    <div class="body">${bodyHtml}</div>
    <div class="foot">
      <a href="${escapeHtml(api.home)}" target="_blank" rel="noopener">via ${escapeHtml(c.source || api.name)}</a>
      <button class="again" data-act="again">Again</button>
    </div>`;
  wireCard(el, api, c);
}

function wireCard(el, api, c) {
  const again = el.querySelector('[data-act="again"]');
  if (again) again.addEventListener('click', e => { e.stopPropagation(); el.classList.add('loading'); const kick = el.querySelector('.kicker'); const foot = el.querySelector('.foot'); el.innerHTML = `<div class="kicker">${kick ? kick.innerHTML : ''}</div><div class="body"><div class="spin"><span></span><span></span><span></span></div><div class="lbl">calling ${escapeHtml(api.name)}…</div></div><div class="foot"><span class="lbl">swipe</span></div>`; hydrateCard(el, api); });

  if (c.kind === 'question') {
    const opts = el.querySelectorAll('.q-options button');
    const reveal = el.querySelector('[data-reveal]');
    opts.forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      const chosen = b.dataset.opt;
      opts.forEach(o => { o.disabled = true; if (o.dataset.opt === c.correct) o.classList.add('right'); });
      if (chosen !== c.correct) b.classList.add('wrong');
      if (reveal) reveal.style.display = '';
    }));
  }
}

function renderError(el, api, err) {
  el.classList.remove('loading');
  el.classList.add('err');
  el.innerHTML = `
    <div class="kicker"><span class="cat">${api.cat}</span><span class="n">${escapeHtml(api.name)}</span></div>
    <div class="body">
      <div class="msg"><strong>${escapeHtml(api.name)} didn’t answer</strong>The API returned an error or was blocked. Some public APIs go down or throttle from certain IPs. Try again or shuffle.</div>
    </div>
    <div class="foot">
      <a href="${escapeHtml(api.home)}" target="_blank" rel="noopener">docs</a>
      <button class="again" data-act="again">Retry</button>
    </div>`;
  const again = el.querySelector('[data-act="again"]');
  if (again) again.addEventListener('click', e => { e.stopPropagation(); el.classList.remove('err'); el.classList.add('loading'); const kick = el.querySelector('.kicker'); el.innerHTML = `<div class="kicker">${kick ? kick.innerHTML : ''}</div><div class="body"><div class="spin"><span></span><span></span><span></span></div><div class="lbl">retrying ${escapeHtml(api.name)}…</div></div><div class="foot"><span class="lbl">swipe</span></div>`; hydrateCard(el, api); });
  try { console.warn('[fifty]', api.id, err && err.message || err); } catch(_){}
}

function reset() {
  state.seen = [];
  FEED.cards = [];
  FEED.currentIndex = 0;
  FEED.el.querySelectorAll('.card').forEach(el => el.remove());
  FEED.el.scrollTo({ top: 0, behavior: 'auto' });
  refill();
}

/* ═══════════════════════════════════════════════════════
   Category / API list sheet
   ═══════════════════════════════════════════════════════ */
function openSheet() { renderSheet(); $('sheet').classList.add('show'); $('sheetBg').classList.add('show'); }
function closeSheet() { $('sheet').classList.remove('show'); $('sheetBg').classList.remove('show'); }
function renderSheet() {
  $('cats').innerHTML = CATS.map(c => {
    const count = c.k === 'all' ? APIS.length : APIS.filter(a => a.cat === c.k).length;
    return `<button class="cat-btn ${state.cat === c.k ? 'on' : ''}" data-cat="${c.k}">${c.label}<span class="lbl">${count} apis</span></button>`;
  }).join('');
  $('cats').querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
    state.cat = b.dataset.cat;
    renderSheet();
    reset();
  }));
  $('apiList').innerHTML = APIS.filter(a => state.cat === 'all' || a.cat === state.cat)
    .map(a => `<button class="api-row" data-id="${a.id}"><span class="n">${escapeHtml(a.name)}</span><span class="k">${a.kind}</span></button>`).join('');
  $('apiList').querySelectorAll('.api-row').forEach(b => b.addEventListener('click', () => {
    const api = APIS.find(x => x.id === b.dataset.id);
    if (!api) return;
    closeSheet();
    // Insert a fresh card right after the current
    const el = document.createElement('div');
    el.className = 'card loading';
    el.dataset.kind = api.kind;
    el.dataset.apiId = api.id;
    el.innerHTML = `<div class="kicker"><span class="cat">${api.cat}</span><span class="n">${escapeHtml(api.name)}</span></div><div class="body"><div class="spin"><span></span><span></span><span></span></div><div class="lbl">calling ${escapeHtml(api.name)}…</div></div><div class="foot"><span class="lbl">swipe</span></div>`;
    const cards = [...FEED.el.querySelectorAll('.card')];
    const current = cards[FEED.currentIndex];
    if (current && current.nextSibling) FEED.el.insertBefore(el, current.nextSibling);
    else FEED.el.appendChild(el);
    FEED.cards.splice(FEED.currentIndex + 1, 0, el);
    hydrateCard(el, api);
    if (FEED.io) FEED.io.observe(el);
    el.scrollIntoView({ behavior:'smooth', block:'start' });
  }));
}

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
async function init() {
  FEED.el = $('feed');
  $('listBtn').addEventListener('click', openSheet);
  $('sheetClose').addEventListener('click', closeSheet);
  $('sheetBg').addEventListener('click', closeSheet);
  $('shufBtn').addEventListener('click', () => reset());
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

  FEED.io = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting && e.intersectionRatio > 0.6) {
        const cards = [...FEED.el.querySelectorAll('.card')];
        const idx = cards.indexOf(e.target);
        if (idx >= 0) FEED.currentIndex = idx;
        if (idx >= cards.length - 3) refill();
      }
    }
  }, { root: FEED.el, threshold: [0, 0.6, 1] });

  FEED.el.addEventListener('scroll', () => {
    if (FEED._sch) return;
    FEED._sch = true;
    requestAnimationFrame(() => {
      FEED._sch = false;
      const h = FEED.el.clientHeight || window.innerHeight;
      const approx = Math.floor(FEED.el.scrollTop / h);
      if (approx > FEED.currentIndex) FEED.currentIndex = approx;
      const ahead = FEED.cards.length - FEED.currentIndex;
      if (ahead < 3) refill();
    });
  }, { passive: true });

  refill();
}
init();
</script>
