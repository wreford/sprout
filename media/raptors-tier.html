<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raptors Tier List — Media Experiments</title>
<style>
:root{
  --bg:#0a0a0b;--panel:#141416;--border:#26262a;--text:#f5f5f7;--dim:#7a7a80;
  --raptors:#ce1141;--gold:#ffcc00;--purple:#753bbd;--black:#060606;
  --s:#ff375f;--a:#ff9500;--b:#ffcc00;--c:#30d158;--d:#5ac8fa;--f:#8e8e93;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  display:flex;flex-direction:column;align-items:stretch
}

/* ── Header ────────────────────────────────── */
.top{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(10,10,11,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);gap:12px;flex-shrink:0
}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
.brand a{color:var(--dim);text-decoration:none}
.brand a:hover{color:var(--text)}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--raptors);box-shadow:0 0 12px var(--raptors)}
.brand .live{color:var(--raptors)}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .18s ease;user-select:none
}
.btn:hover{border-color:#4a4a50;background:#1c1c1f}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--raptors);color:#fff;border-color:var(--raptors)}
.btn.primary:hover{background:#a80e35;border-color:#a80e35}
.btn.rec{color:var(--raptors)}
.btn.rec.recording{background:var(--raptors);color:#fff;animation:pulse 1.4s ease infinite}
@keyframes pulse{50%{opacity:.7}}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Stage ────────────────────────────────── */
.stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;min-height:0}
.stage{
  position:relative;width:100%;max-width:1280px;aspect-ratio:16/9;background:#0d0d0e;
  border:1px solid var(--border);border-radius:14px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 0 1px rgba(255,255,255,.04)
}
.canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

/* ── Playbar ──────────────────────────────── */
.playbar{
  display:flex;align-items:center;gap:14px;padding:10px 18px;border-top:1px solid var(--border);
  background:rgba(10,10,11,.9);backdrop-filter:blur(12px);flex-shrink:0
}
.timecode{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.08em;min-width:88px}
.timecode b{color:var(--text);font-weight:500}
.scrub{
  flex:1;height:6px;background:var(--border);border-radius:3px;position:relative;cursor:pointer;
  overflow:hidden
}
.scrub .fill{
  position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--raptors),var(--gold));
  border-radius:3px;transition:width .05s linear
}
.scrub .head{
  position:absolute;top:50%;width:14px;height:14px;background:#fff;border-radius:50%;
  transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.5);transition:left .05s linear
}
.scenes{display:flex;gap:4px}
.scene-chip{
  font-family:var(--mono);font-size:9.5px;color:var(--dim);padding:4px 8px;border-radius:5px;
  border:1px solid var(--border);letter-spacing:.08em;text-transform:uppercase;transition:all .15s ease
}
.scene-chip.active{background:var(--raptors);border-color:var(--raptors);color:#fff}

/* ── Mobile ───────────────────────────────── */
@media (max-width:720px){
  .top{padding:10px 12px}
  .brand span:not(.dot){display:none}
  .brand::after{content:"RAPTORS · TIER LIST";color:var(--dim);font-size:11px;letter-spacing:.14em}
  .btn{padding:7px 10px;font-size:10px}
  .stage-wrap{padding:10px}
  .stage{border-radius:10px}
  .playbar{padding:8px 12px;gap:10px;flex-wrap:wrap}
  .timecode{min-width:auto;font-size:10px}
  .scenes{width:100%;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .scene-chip{flex-shrink:0}
}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <span class="dot"></span>
    <a href="/media/">← media</a>
    <span>·</span>
    <span class="live">Raptors All-Time Tier List</span>
  </div>
  <div class="controls">
    <button class="btn" id="restart">↺ Restart</button>
    <button class="btn primary" id="playpause">▶ Play</button>
    <button class="btn rec" id="record">● Record</button>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage">
    <canvas class="canvas" id="cv"></canvas>
  </div>
</div>

<div class="playbar">
  <div class="timecode"><b id="tc">0:00</b> / 0:24</div>
  <div class="scrub" id="scrub">
    <div class="fill" id="fill"></div>
    <div class="head" id="head"></div>
  </div>
  <div class="scenes" id="scenes"></div>
</div>

<script>
(() => {
'use strict';

// ── COMPOSITION DEFINITION (Remotion-style) ─────────────────────────
const FPS = 60;
const WIDTH = 1920;
const HEIGHT = 1080;

// Scenes (like Remotion <Sequence>)
const SCENES = [
  { id:'intro',   from:0,   dur:180, name:'Intro'   }, // 3s
  { id:'tier-s',  from:180, dur:210, name:'S Tier'  },
  { id:'tier-a',  from:390, dur:210, name:'A Tier'  },
  { id:'tier-b',  from:600, dur:210, name:'B Tier'  },
  { id:'tier-c',  from:810, dur:210, name:'C Tier'  },
  { id:'outro',   from:1020, dur:180, name:'Outro'  }
];
const TOTAL = SCENES[SCENES.length-1].from + SCENES[SCENES.length-1].dur; // 1200f = 20s @ 60fps

// The tier list data
const TIERS = [
  { id:'S', label:'S · CHAMPION', color:'#ff375f',
    players:[
      { name:'Kawhi Leonard', years:'2018–19', tag:'2019 Champion · Finals MVP', color:'#ce1141' },
      { name:'Kyle Lowry',    years:'2012–21', tag:'6× All-Star · GRIT',         color:'#753bbd' },
      { name:'Vince Carter',  years:'1998–04', tag:'Air Canada · Dunk King',     color:'#ffcc00' },
      { name:'DeMar DeRozan', years:'2009–18', tag:'Franchise scorer',           color:'#0a84ff' }
    ]
  },
  { id:'A', label:'A · CORE',    color:'#ff9500',
    players:[
      { name:'Chris Bosh',      years:'2003–10', tag:'5× All-Star (TOR)',  color:'#30d158' },
      { name:'Pascal Siakam',   years:'2016–24', tag:'Spicy P · Champion', color:'#ff375f' },
      { name:'Fred VanVleet',   years:'2016–23', tag:'Bet on yourself',    color:'#5ac8fa' },
      { name:'OG Anunoby',      years:'2017–24', tag:'Lockdown wing',      color:'#bf5af2' }
    ]
  },
  { id:'B', label:'B · SOLID',   color:'#ffcc00',
    players:[
      { name:'Jonas Valanciunas', years:'2012–19', tag:'JV · big body',   color:'#0a84ff' },
      { name:'Amir Johnson',      years:'2009–15', tag:'Glue guy',        color:'#30d158' },
      { name:'Damon Stoudamire',  years:'1995–98', tag:'Mighty Mouse',    color:'#ff9500' },
      { name:'José Calderón',     years:'2005–13', tag:'Steady point',    color:'#5ac8fa' }
    ]
  },
  { id:'C', label:'C · ROLE',    color:'#30d158',
    players:[
      { name:'Andrea Bargnani',   years:'2006–13', tag:'#1 overall',      color:'#8e8e93' },
      { name:'Antonio Davis',     years:'1999–03', tag:'All-Star 2001',   color:'#ff375f' },
      { name:'Alvin Williams',    years:'1997–06', tag:'Reliable',        color:'#753bbd' },
      { name:'Norman Powell',     years:'2015–21', tag:'Bench spark',     color:'#0a84ff' }
    ]
  }
];

// ── Frame state ──────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let currentFrame = 0;
let playing = false;
let lastTime = 0;
let recording = false;
let mediaRecorder = null;
let recordedChunks = [];

function resizeCanvas() {
  const rect = cv.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = rect.width * dpr;
  cv.height = rect.height * dpr;
}
window.addEventListener('resize', resizeCanvas);

// ── Easing ────────────────────────────────
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
// Spring physics (Remotion-style)
function spring(frame, from = 0, config = {}) {
  const { mass=1, damping=10, stiffness=100, delay=0 } = config;
  const f = Math.max(0, frame - from - delay);
  if (f <= 0) return 0;
  const t = f / FPS;
  const w0 = Math.sqrt(stiffness/mass);
  const z = damping / (2 * Math.sqrt(stiffness*mass));
  if (z < 1) {
    const wd = w0 * Math.sqrt(1 - z*z);
    return 1 - Math.exp(-z*w0*t) * (Math.cos(wd*t) + (z*w0/wd)*Math.sin(wd*t));
  }
  return 1 - Math.exp(-w0*t) * (1 + w0*t);
}
function interp(frame, from, to, opts = {}) {
  const { fromVal=0, toVal=1, ease=easeInOutCubic } = opts;
  if (frame <= from) return fromVal;
  if (frame >= to) return toVal;
  return fromVal + (toVal - fromVal) * ease((frame - from) / (to - from));
}

// ── Scene detection ───────────────────────
function getScene(frame) {
  for (const s of SCENES) {
    if (frame >= s.from && frame < s.from + s.dur) return s;
  }
  return SCENES[SCENES.length-1];
}

// ── Coordinate helpers (design space is 1920x1080) ──
function px(v) { return v * (cv.width / WIDTH); }
function pxY(v) { return v * (cv.height / HEIGHT); }

// ── RENDER FRAME ──────────────────────────
function render(frame) {
  const scene = getScene(frame);
  const local = frame - scene.from; // frames within scene

  // Background — animated gradient
  const bgT = frame / TOTAL;
  const g = ctx.createLinearGradient(0, 0, cv.width, cv.height);
  g.addColorStop(0, `hsl(${340 + Math.sin(bgT * Math.PI * 2) * 20}, 60%, 8%)`);
  g.addColorStop(0.5, `hsl(${280 + Math.cos(bgT * Math.PI * 2) * 20}, 50%, 6%)`);
  g.addColorStop(1, `hsl(${220 + Math.sin(bgT * Math.PI * 4) * 20}, 55%, 5%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cv.width, cv.height);

  // Noise / grain
  drawGrain(frame);

  if (scene.id === 'intro') drawIntro(local);
  else if (scene.id.startsWith('tier-')) drawTier(scene, local);
  else if (scene.id === 'outro') drawOutro(local);
}

function drawGrain(frame) {
  // Deterministic-ish grain via sin/cos — cheap and doesn't require imagedata
  ctx.save();
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 40; i++) {
    const seed = (i * 9301 + frame * 173 + 1729) % 233280 / 233280;
    const x = seed * cv.width;
    const y = ((seed * 3141) % 1) * cv.height;
    ctx.fillStyle = seed > .5 ? '#fff' : '#000';
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.restore();
}

// ── INTRO SCENE ───────────────────────────
function drawIntro(f) {
  const cx = cv.width / 2, cy = cv.height / 2;

  // Basketball ball spinning in
  const ballScale = spring(f, 0, { stiffness: 80, damping: 12 });
  const ballRot = f * 0.05;
  ctx.save();
  ctx.translate(cx, cy - pxY(120));
  ctx.rotate(ballRot);
  ctx.scale(ballScale, ballScale);
  drawBasketball(0, 0, px(90));
  ctx.restore();

  // Title
  const titleY = spring(f, 20, { stiffness: 90, damping: 14 });
  const titleOpacity = interp(f, 20, 60, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = titleOpacity;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = `700 ${px(96)}px -apple-system, "Inter", sans-serif`;
  ctx.fillText('TORONTO', cx, cy + pxY(40) - (1 - titleY) * pxY(60));

  ctx.font = `900 ${px(140)}px -apple-system, "Inter", sans-serif`;
  const rgrad = ctx.createLinearGradient(cx - px(400), cy + pxY(150), cx + px(400), cy + pxY(150));
  rgrad.addColorStop(0, '#ce1141'); rgrad.addColorStop(1, '#ff375f');
  ctx.fillStyle = rgrad;
  const rapY = spring(f, 30, { stiffness: 100, damping: 13 });
  ctx.fillText('RAPTORS', cx, cy + pxY(160) - (1 - rapY) * pxY(80));

  // Subtitle
  const subOpacity = interp(f, 60, 100, { toVal: 1 });
  ctx.globalAlpha = subOpacity;
  ctx.font = `500 ${px(28)}px "SF Mono", ui-monospace, monospace`;
  ctx.fillStyle = '#7a7a80';
  ctx.fillText('· ALL-TIME TIER LIST ·', cx, cy + pxY(280));
  ctx.restore();

  // Countdown reveal
  if (f > 120) {
    const cf = f - 120;
    const digits = [3, 2, 1];
    const idx = Math.floor(cf / 20);
    if (idx < 3) {
      const digitLocal = cf - idx * 20;
      const s = spring(digitLocal, 0, { stiffness: 200, damping: 15 });
      const o = 1 - interp(digitLocal, 12, 20, { toVal: 1 });
      ctx.save();
      ctx.globalAlpha = o;
      ctx.textAlign = 'center';
      ctx.font = `900 ${px(200 + s * 40)}px -apple-system, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = o * 0.15;
      ctx.fillText(digits[idx], cx, cy);
      ctx.restore();
    }
  }
}

// ── TIER SCENE ────────────────────────────
function drawTier(scene, f) {
  const tierId = scene.id.split('-')[1].toUpperCase();
  const tier = TIERS.find(t => t.id === tierId);
  if (!tier) return;

  const cx = cv.width / 2;
  const stageW = cv.width;
  const stageH = cv.height;

  // Tier badge slides in from left
  const badgeIn = spring(f, 0, { stiffness: 100, damping: 15 });
  const badgeX = -px(400) + badgeIn * px(500);
  const badgeH = pxY(180);
  const badgeY = pxY(140);

  ctx.save();
  ctx.translate(badgeX, badgeY);
  // Badge background
  const bg = ctx.createLinearGradient(0, 0, px(400), badgeH);
  bg.addColorStop(0, tier.color); bg.addColorStop(1, shade(tier.color, -40));
  ctx.fillStyle = bg;
  roundRect(ctx, 0, 0, px(500), badgeH, px(20));
  ctx.fill();
  // Badge text
  ctx.fillStyle = '#000';
  ctx.font = `900 ${px(90)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(tier.id, px(80), badgeH/2);
  ctx.fillStyle = '#000';
  ctx.font = `700 ${px(28)}px "SF Mono", monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(tier.label.split('·')[1].trim(), px(160), badgeH/2 - pxY(20));
  ctx.font = `500 ${px(22)}px "SF Mono", monospace`;
  ctx.globalAlpha = 0.7;
  ctx.fillText('TIER', px(160), badgeH/2 + pxY(18));
  ctx.restore();

  // Player cards — staggered spring in from below
  const cardW = px(340);
  const cardH = pxY(500);
  const gap = px(30);
  const totalW = cardW * 4 + gap * 3;
  const startX = (stageW - totalW) / 2;
  const cardY = pxY(400);

  tier.players.forEach((p, i) => {
    const delayF = 30 + i * 12;
    const cardSpring = spring(f, delayF, { stiffness: 90, damping: 14 });
    const cardOpacity = interp(f, delayF, delayF + 30, { toVal: 1 });
    const y = cardY + (1 - cardSpring) * pxY(300);
    const x = startX + i * (cardW + gap);

    ctx.save();
    ctx.globalAlpha = cardOpacity;

    // Card
    const cg = ctx.createLinearGradient(x, y, x, y + cardH);
    cg.addColorStop(0, shade(p.color, 20));
    cg.addColorStop(0.6, shade(p.color, -20));
    cg.addColorStop(1, shade(p.color, -50));
    ctx.fillStyle = cg;
    roundRect(ctx, x, y, cardW, cardH, px(20));
    ctx.fill();

    // Card border
    ctx.strokeStyle = shade(p.color, 40);
    ctx.lineWidth = px(3);
    roundRect(ctx, x, y, cardW, cardH, px(20));
    ctx.stroke();

    // Jersey number (big background)
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#000';
    ctx.font = `900 ${px(340)}px -apple-system, sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText((i + 1), x + cardW - px(20), y + cardH - pxY(20));
    ctx.restore();

    // Silhouette placeholder — basketball icon top-right
    ctx.save();
    ctx.translate(x + cardW - px(70), y + pxY(70));
    ctx.globalAlpha = 0.9;
    drawBasketball(0, 0, px(38));
    ctx.restore();

    // Name (big)
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.font = `800 ${px(38)}px -apple-system, sans-serif`;
    const [firstName, ...rest] = p.name.split(' ');
    ctx.fillText(firstName, x + px(28), y + pxY(300));
    ctx.font = `800 ${px(38)}px -apple-system, sans-serif`;
    ctx.fillText(rest.join(' '), x + px(28), y + pxY(346));

    // Years
    ctx.font = `500 ${px(20)}px "SF Mono", monospace`;
    ctx.globalAlpha = cardOpacity * 0.75;
    ctx.fillStyle = '#fff';
    ctx.fillText(p.years, x + px(28), y + pxY(400));

    // Tag
    ctx.globalAlpha = cardOpacity;
    ctx.font = `600 ${px(18)}px "SF Mono", monospace`;
    ctx.fillText(p.tag.toUpperCase(), x + px(28), y + pxY(438));

    ctx.restore();
  });

  // Progress dots
  const dotY = stageH - pxY(60);
  const currentTierIdx = TIERS.findIndex(t => t.id === tierId);
  TIERS.forEach((t, i) => {
    const dx = cx - px(80) + i * px(40);
    ctx.beginPath();
    ctx.arc(dx, dotY, px(8), 0, Math.PI * 2);
    ctx.fillStyle = i === currentTierIdx ? t.color : (i < currentTierIdx ? '#fff' : '#3a3a40');
    ctx.globalAlpha = i === currentTierIdx ? 1 : (i < currentTierIdx ? 0.4 : 1);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── OUTRO SCENE ───────────────────────────
function drawOutro(f) {
  const cx = cv.width / 2, cy = cv.height / 2;

  // Ball spinning outward
  const rot = f * 0.08;
  const scale = 1 + spring(f, 0, { stiffness: 60, damping: 12 }) * 0.4;
  ctx.save();
  ctx.translate(cx, cy - pxY(140));
  ctx.rotate(rot);
  ctx.scale(scale, scale);
  drawBasketball(0, 0, px(90));
  ctx.restore();

  const titleOpacity = interp(f, 20, 60, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = titleOpacity;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `800 ${px(80)}px -apple-system, sans-serif`;
  ctx.fillText('WE THE NORTH', cx, cy + pxY(60));
  ctx.font = `500 ${px(24)}px "SF Mono", monospace`;
  ctx.fillStyle = '#7a7a80';
  ctx.fillText('· media.taskiap.com ·', cx, cy + pxY(160));
  ctx.restore();

  // Confetti
  for (let i = 0; i < 60; i++) {
    const seed = i * 137;
    const startY = -pxY(20);
    const speed = 3 + (i % 5);
    const y = startY + f * speed * pxY(2);
    const x = (seed % 100) / 100 * cv.width + Math.sin(f * 0.05 + i) * px(30);
    const rot2 = f * 0.1 + i;
    ctx.save();
    ctx.translate(x, y % cv.height);
    ctx.rotate(rot2);
    ctx.fillStyle = ['#ce1141','#ffcc00','#ff375f','#0a84ff','#30d158','#bf5af2'][i % 6];
    ctx.fillRect(-px(6), -pxY(10), px(12), pxY(20));
    ctx.restore();
  }
}

// ── Drawing helpers ───────────────────────
function drawBasketball(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  // Ball
  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  grad.addColorStop(0, '#f9a34b');
  grad.addColorStop(0.6, '#e07d1e');
  grad.addColorStop(1, '#8a3d05');
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // Lines
  ctx.strokeStyle = '#3a1a05';
  ctx.lineWidth = r * 0.04;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-r*0.55, 0, r*0.35, r*0.9, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(r*0.55, 0, r*0.35, r*0.9, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Highlight
  ctx.beginPath();
  ctx.arc(-r*0.35, -r*0.35, r*0.18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.fill();
  ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function shade(hex, amt) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amt));
  return `rgb(${r},${g},${b})`;
}

// ── UI ────────────────────────────────────
function fmtTime(f) {
  const s = Math.floor(f / FPS);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function updateUI() {
  document.getElementById('tc').textContent = fmtTime(currentFrame);
  const p = (currentFrame / TOTAL) * 100;
  document.getElementById('fill').style.width = `${p}%`;
  document.getElementById('head').style.left = `${p}%`;
  // Scene chips
  const scene = getScene(currentFrame);
  document.querySelectorAll('.scene-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === scene.id);
  });
}

// Scene chips
const scenesEl = document.getElementById('scenes');
SCENES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'scene-chip';
  el.dataset.id = s.id;
  el.textContent = s.name;
  el.style.cursor = 'pointer';
  el.onclick = () => { currentFrame = s.from; render(currentFrame); updateUI(); };
  scenesEl.appendChild(el);
});

// Playback loop
function loop(t) {
  if (!lastTime) lastTime = t;
  const dt = t - lastTime;
  lastTime = t;
  if (playing) {
    currentFrame += (dt / 1000) * FPS;
    if (currentFrame >= TOTAL) {
      currentFrame = TOTAL;
      playing = false;
      document.getElementById('playpause').textContent = '▶ Play';
    }
  }
  render(currentFrame);
  updateUI();
  requestAnimationFrame(loop);
}

document.getElementById('playpause').onclick = () => {
  playing = !playing;
  document.getElementById('playpause').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (currentFrame >= TOTAL) currentFrame = 0;
};
document.getElementById('restart').onclick = () => {
  currentFrame = 0; playing = false;
  document.getElementById('playpause').textContent = '▶ Play';
};

// Scrub bar
let dragging = false;
const scrubEl = document.getElementById('scrub');
function scrubAt(clientX) {
  const rect = scrubEl.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  currentFrame = p * TOTAL;
}
scrubEl.addEventListener('pointerdown', e => { dragging = true; playing = false; document.getElementById('playpause').textContent = '▶ Play'; scrubAt(e.clientX); scrubEl.setPointerCapture(e.pointerId); });
scrubEl.addEventListener('pointermove', e => { if (dragging) scrubAt(e.clientX); });
scrubEl.addEventListener('pointerup', e => { dragging = false; });

// Keyboard
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playpause').click(); }
  if (e.code === 'ArrowLeft') currentFrame = Math.max(0, currentFrame - FPS);
  if (e.code === 'ArrowRight') currentFrame = Math.min(TOTAL, currentFrame + FPS);
  if (e.key === 'r' || e.key === 'R') document.getElementById('restart').click();
});

// ── Recording via MediaRecorder ────────────
const recordBtn = document.getElementById('record');
recordBtn.onclick = () => {
  if (recording) {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    return;
  }
  const stream = cv.captureStream(60);
  recordedChunks = [];
  let mime = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
  try {
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8_000_000 });
  } catch (err) {
    alert('Recording not supported in this browser: ' + err.message);
    return;
  }
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'raptors-tier-list.webm'; a.click();
    URL.revokeObjectURL(url);
    recording = false;
    recordBtn.classList.remove('recording');
    recordBtn.textContent = '● Record';
  };
  mediaRecorder.start();
  recording = true;
  recordBtn.classList.add('recording');
  recordBtn.textContent = '■ Stop';

  // Auto-start playback from frame 0
  currentFrame = 0;
  playing = true;
  document.getElementById('playpause').textContent = '⏸ Pause';

  // Auto-stop at end
  const stopCheck = setInterval(() => {
    if (currentFrame >= TOTAL || !recording) {
      clearInterval(stopCheck);
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }
  }, 100);
};

// Init
resizeCanvas();
render(0);
updateUI();
requestAnimationFrame(loop);

})();
</script>
