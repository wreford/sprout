<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raptors All-Star Tier List — Media Experiments</title>
<style>
:root{
  --bg:#0a0a0b;--panel:#141416;--border:#26262a;--text:#f5f5f7;--dim:#7a7a80;
  --raptors:#ce1141;--gold:#ffcc00;--purple:#753bbd;--black:#060606;
  --s:#ff375f;--a:#ff9500;--b:#ffcc00;--c:#30d158;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(10,10,11,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);gap:12px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
.brand a{color:var(--dim);text-decoration:none}
.brand a:hover{color:var(--text)}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--raptors);box-shadow:0 0 12px var(--raptors)}
.brand .live{color:var(--raptors)}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .18s ease;user-select:none}
.btn:hover{border-color:#4a4a50;background:#1c1c1f}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--raptors);color:#fff;border-color:var(--raptors)}
.btn.primary:hover{background:#a80e35;border-color:#a80e35}
.btn.rec{color:var(--raptors)}
.btn.rec.recording{background:var(--raptors);color:#fff;animation:pulse 1.4s ease infinite}
.btn.tik.on{background:#8b5cf6;color:#fff;border-color:#8b5cf6}
.btn.vo.on{background:#30d158;color:#000;border-color:#30d158}
.btn.cc.on{background:#ffcc00;color:#000;border-color:#ffcc00}
.subs{position:absolute;left:12px;right:12px;bottom:12px;z-index:20;pointer-events:none;display:flex;gap:6px;align-items:flex-end;transition:opacity .2s ease}
.subs.hide{display:none}
.subs-text{flex:1;background:rgba(0,0,0,.72);color:#fff;padding:12px 16px;border-radius:10px;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;font-weight:600;text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:auto;max-height:38vh;overflow-y:auto;user-select:text;-webkit-user-select:text}
.subs-text:empty{display:none}
.subs-copy,.subs-all{background:rgba(255,204,0,.9);color:#000;border:none;padding:10px 12px;border-radius:8px;font-family:ui-monospace,"SF Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;pointer-events:auto;flex-shrink:0;transition:transform .12s ease,background .12s ease}
.subs-copy:hover,.subs-all:hover{background:#ffcc00;transform:translateY(-1px)}
.subs-copy:active,.subs-all:active{transform:scale(.96)}
.subs-copy.copied,.subs-all.copied{background:#30d158;color:#000}
@media(max-width:720px){
  .subs-text{font-size:13px;padding:9px 12px}
  .subs-copy,.subs-all{padding:8px 10px;font-size:10px}
}
@keyframes pulse{50%{opacity:.7}}
.stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;min-height:0}
.stage{position:relative;background:#0d0d0e;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 0 1px rgba(255,255,255,.04);transition:width .3s ease,height .3s ease}
.canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.playbar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-top:1px solid var(--border);background:rgba(10,10,11,.9);backdrop-filter:blur(12px);flex-shrink:0}
.timecode{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.08em;min-width:96px}
.timecode b{color:var(--text);font-weight:500}
.scrub{flex:1;height:6px;background:var(--border);border-radius:3px;position:relative;cursor:pointer;overflow:hidden}
.scrub .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--raptors),var(--gold));border-radius:3px;transition:width .05s linear}
.scrub .head{position:absolute;top:50%;width:14px;height:14px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.5);transition:left .05s linear}
.chapters{display:flex;gap:3px;overflow-x:auto;max-width:50%;-webkit-overflow-scrolling:touch}
.chap{font-family:var(--mono);font-size:9px;color:var(--dim);padding:3px 7px;border-radius:5px;border:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;cursor:pointer;transition:all .15s}
.chap.active{background:var(--raptors);border-color:var(--raptors);color:#fff}
.chap:hover{border-color:#4a4a50}
@media(max-width:720px){
  .top{padding:10px 12px}
  .brand span:not(.dot){display:none}
  .brand::after{content:"ALL-STAR TIER LIST";color:var(--dim);font-size:11px;letter-spacing:.14em}
  .btn{padding:7px 10px;font-size:10px}
  .stage-wrap{padding:10px}
  .stage{border-radius:10px}
  .playbar{padding:8px 12px;gap:10px;flex-wrap:wrap}
  .timecode{min-width:auto;font-size:10px}
  .chapters{max-width:100%;width:100%;padding-bottom:2px}
}
</style>
</head>
<body>
<div class="top">
  <div class="brand">
    <span class="dot"></span>
    <a href="/media/">← media</a>
    <span>·</span>
    <span class="live">Every Raptor All-Star, Ranked</span>
  </div>
  <div class="controls">
    <button class="btn tik on" id="tiktok" title="Toggle aspect ratio">📱 9:16</button>
    <button class="btn vo on" id="voice" title="Toggle voiceover">🎙 Voice</button>
    <button class="btn cc on" id="ccbtn" title="Toggle subtitles">💬 CC</button>
    <button class="btn" id="restart">↺ Restart</button>
    <button class="btn primary" id="playpause">▶ Play</button>
    <button class="btn rec" id="record" title="Fast offline export">⚡ Export</button>
  </div>
</div>
<div id="export-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center">
  <div style="background:#141416;border:1px solid #26262a;border-radius:14px;padding:24px;max-width:400px;width:90%">
    <div style="font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;color:#7a7a80;text-transform:uppercase;margin-bottom:6px">Export</div>
    <h3 style="margin:0 0 14px;font-size:20px">Choose format</h3>
    <div id="export-status" style="font-family:ui-monospace,monospace;font-size:12px;color:#7a7a80;margin-bottom:14px;min-height:18px"></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn primary" id="exp-mp4-fast" style="padding:12px 16px;font-size:12px">⚡ MP4 · Offline (WebCodecs, ~10s)</button>
      <button class="btn primary" id="exp-webm-fast" style="padding:12px 16px;font-size:12px;background:#753bbd;border-color:#753bbd">⚡ WebM · Offline render (~10s)</button>
      <button class="btn" id="exp-webm-live" style="padding:12px 16px;font-size:12px">🎥 WebM · Live capture (real-time)</button>
      <button class="btn" id="exp-frames" style="padding:12px 16px;font-size:12px">🖼 PNG frames · Zip (for editor)</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn" id="exp-cancel" style="flex:1;padding:10px">Cancel</button>
    </div>
  </div>
</div>
<div class="stage-wrap">
  <div class="stage" id="stage">
    <canvas class="canvas" id="cv"></canvas>
    <div class="subs" id="subs">
      <div class="subs-text" id="subs-text"></div>
      <button class="subs-copy" id="subs-copy" title="Copy subtitle">Copy</button>
      <button class="subs-all" id="subs-all" title="Copy full script">Copy all</button>
    </div>
  </div>
</div>
<div class="playbar">
  <div class="timecode"><b id="tc">0:00</b> / 3:20</div>
  <div class="scrub" id="scrub"><div class="fill" id="fill"></div><div class="head" id="head"></div></div>
  <div class="chapters" id="chapters"></div>
</div>

<script>
(() => {
'use strict';

// ── COMPOSITION DIMENSIONS ─────────────────────────────
const FPS = 60;
let PORTRAIT = true; // TikTok 9:16 default
function W() { return PORTRAIT ? 1080 : 1920; }
function H() { return PORTRAIT ? 1920 : 1080; }

// ── DATA — 9 Raptors All-Stars, alphabetical ──────────
const PLAYERS = [
  { id:'AD',   name:'Antonio Davis',    years:'1999–2003', jersey:'#33', pos:'PF', color:'#0a84ff', tier:'C',
    stats:{ ppg:12.7, rpg:8.5, apg:1.4, spg:0.6, bpg:1.5, fg:.478, gp:293 }, po:{ppg:13.4, rpg:8.6}, rings:0, hof:false, awards:[],
    moment:'2001 Playoff run — 8.6 RPG',
    allstar:['2001'], accolades:['1× All-Star (injury replacement)','Team captain leader','2001 second-round playoff run','Franchise glue in the pre-Bosh era'],
    voice:"Antonio Davis. Twelve and eight and a half. Blocks for days. All-Star in oh-one. Anchor of the first Raptors team to win a playoff series. C tier." },

  { id:'BI',   name:'Brandon Ingram',   years:'2025–now',  jersey:'#3',  pos:'SF', color:'#bf5af2', tier:'C',
    stats:{ ppg:18.6, rpg:5.0, apg:3.9, spg:0.7, bpg:0.6, fg:.464, gp:455 }, po:{ppg:17.3, rpg:6.5}, rings:0, hof:false, awards:['MIP 2020'],
    moment:'2020 · Most Improved Player',
    allstar:['2020'], accolades:['1× All-Star (2020, NOP)','2020 Most Improved Player','Career 20+ PPG scorer','New face in Toronto — 2025'],
    voice:"Brandon Ingram. Traded to Toronto in twenty twenty five. Most Improved Player. All-Star. Twenty a game when healthy. He's here to be the guy. C tier — for now." },

  { id:'CB',   name:'Chris Bosh',       years:'2003–2010', jersey:'#4',  pos:'PF/C', color:'#30d158', tier:'A',
    stats:{ ppg:20.2, rpg:9.4, apg:2.3, spg:0.8, bpg:1.1, fg:.494, gp:509 }, po:{ppg:23.2, rpg:10.4}, rings:0, hof:true, awards:['HOF'],
    moment:'2010 · 24.0 PPG, 10.8 RPG',
    allstar:['2006','2007','2008','2009','2010'], accolades:['5× All-Star with Toronto','Hall of Fame — 2021','4th overall pick, 2003','Franchise leader in blocks & FT'],
    voice:"Chris Bosh. Twenty and nine every night. Five All-Stars in a row. Hall of Fame. The face of the franchise for the entire two-thousands. Should have had more help. A tier." },

  { id:'DDR',  name:'DeMar DeRozan',    years:'2009–2018', jersey:'#10', pos:'SG', color:'#0a84ff', tier:'A',
    stats:{ ppg:19.7, rpg:4.2, apg:3.1, spg:1.0, bpg:0.3, fg:.446, gp:675 }, po:{ppg:19.5, rpg:4.4}, rings:0, hof:false, awards:['All-NBA 2nd'],
    moment:'2018 · 27.3 PPG · All-NBA 2nd',
    allstar:['2014','2016','2017','2018'], accolades:['4× All-Star with Toronto','All-NBA 2nd Team, 2018','13,296 career points as a Raptor','Franchise scoring king'],
    voice:"DeMar DeRozan. Nine seasons. Four All-Stars. All-NBA. Franchise scoring king with thirteen thousand two hundred ninety six points. He was loyal when nobody else was. A tier." },

  { id:'FVV',  name:'Fred VanVleet',    years:'2016–2023', jersey:'#23', pos:'PG', color:'#5ac8fa', tier:'B',
    stats:{ ppg:14.4, rpg:3.7, apg:5.5, spg:1.6, bpg:0.4, fg:.418, gp:461 }, po:{ppg:15.5, rpg:4.0}, rings:1, hof:false, awards:['Champion 2019'],
    moment:'2019 Finals · Bench spark → champion',
    allstar:['2022'], accolades:['1× All-Star, 2022','2019 NBA Champion','Undrafted → All-Star','Bet on yourself'],
    voice:"Fred VanVleet. Undrafted. Wichita State. Bet on himself. Cashed the check with a championship in twenty nineteen. All-Star in twenty twenty two. B tier." },

  { id:'KL',   name:'Kawhi Leonard',    years:'2018–2019', jersey:'#2',  pos:'SF', color:'#ce1141', tier:'S',
    stats:{ ppg:26.6, rpg:7.3, apg:3.3, spg:1.8, bpg:0.4, fg:.496, gp:60 }, po:{ppg:30.5, rpg:9.1, apg:3.9}, rings:1, hof:false, awards:['FMVP 2019','Champion'],
    moment:'Game 7 buzzer beater vs 76ers',
    allstar:['2019'], accolades:['2019 NBA Champion','2019 Finals MVP','The Shot vs Philadelphia — bounce, bounce, in','60 games. One title. Legend.'],
    voice:"Kawhi Leonard. One season. Sixty games. Thirty a night in the playoffs. Finals M V P. He hit the shot. Bounce. Bounce. In. He gave us a title, then left. That was enough. S tier." },

  { id:'KLW',  name:'Kyle Lowry',       years:'2012–2021', jersey:'#7',  pos:'PG', color:'#753bbd', tier:'S',
    stats:{ ppg:17.5, rpg:4.5, apg:7.3, spg:1.4, bpg:0.3, fg:.421, gp:601 }, po:{ppg:16.7, rpg:4.5, apg:6.8}, rings:1, hof:false, awards:['Champion 2019'],
    moment:'2019 · Championship run · GRIT',
    allstar:['2015','2016','2017','2018','2019','2020'], accolades:['6× All-Star with Toronto','2019 NBA Champion','Franchise leader in games, assists, threes, charges taken','G.R.I.T.'],
    voice:"Kyle Lowry. Six All-Stars. Champion. Franchise leader in games, assists, threes, and charges taken. He gave the Raptors his entire prime. G.R.I.T. S tier." },

  { id:'PS',   name:'Pascal Siakam',    years:'2016–2024', jersey:'#43', pos:'PF', color:'#ff375f', tier:'A',
    stats:{ ppg:19.9, rpg:7.4, apg:3.9, spg:1.0, bpg:0.6, fg:.489, gp:526 }, po:{ppg:19.3, rpg:7.0, apg:3.8}, rings:1, hof:false, awards:['MIP 2019','Champion'],
    moment:'2019 Finals · 32 pts in Game 1',
    allstar:['2020','2022','2023'], accolades:['3× All-Star with Toronto','2019 NBA Champion','2019 Most Improved Player','2× All-NBA (2020 2nd, 2022 3rd)'],
    voice:"Pascal Siakam. Twenty seventh pick. Champion. Most Improved. Three-time All-Star. Two-time All-NBA. Dropped thirty two in Game One of the Finals. Spicy P. A tier." },

  { id:'SB',   name:'Scottie Barnes',   years:'2021–now',  jersey:'#4',  pos:'SF/PF', color:'#bf5af2', tier:'B',
    stats:{ ppg:15.3, rpg:7.1, apg:4.6, spg:1.1, bpg:1.2, fg:.463, gp:238 }, po:{ppg:0, rpg:0}, rings:0, hof:false, awards:['ROY 2022'],
    moment:'2022 · Rookie of the Year',
    allstar:['2024'], accolades:['1× All-Star, 2024','2022 Rookie of the Year','Position-less playmaker','Face of the future'],
    voice:"Scottie Barnes. Rookie of the Year. All-Star at twenty two. Fifteen. Seven. Four and a half. Six-nine, guards one through five. He is the future of this franchise. B tier — room to climb." },

  { id:'VC',   name:'Vince Carter',     years:'1998–2004', jersey:'#15', pos:'SG/SF', color:'#ffcc00', tier:'S',
    stats:{ ppg:23.4, rpg:5.2, apg:3.9, spg:1.2, bpg:1.1, fg:.446, gp:403 }, po:{ppg:24.9, rpg:5.5, apg:4.9}, rings:0, hof:true, awards:['ROY 1999','HOF'],
    moment:'2000 Dunk Contest · reverse 360 windmill',
    allstar:['2000','2001','2002','2003','2004'], accolades:['5× All-Star with Toronto','1999 Rookie of the Year','2000 Slam Dunk Contest Legend','Hall of Fame — 2024','Air Canada'],
    voice:"Vince Carter. Twenty three a night. Five All-Stars. Rookie of the Year. The two-thousand dunk contest that broke the internet before the internet. Hall of Fame. Air Canada gave basketball to Canada. S tier." }
];

// Tiers with descriptions
const TIERS = [
  { id:'S', label:'S · LEGEND',    color:'#ff375f', desc:'Franchise-defining icons' },
  { id:'A', label:'A · SUPERSTAR', color:'#ff9500', desc:'Multi-time All-Stars, high peaks' },
  { id:'B', label:'B · ALL-STAR',  color:'#ffcc00', desc:'Made the game, made the moment' },
  { id:'C', label:'C · SELECTION', color:'#30d158', desc:'One shining moment' }
];

// Build tier -> players (alphabetical already, since PLAYERS is alphabetical by name)
function playersInTier(tid) { return PLAYERS.filter(p => p.tier === tid); }

// ── SCENES ────────────────────────────────────────────
// Each per-player scene = 20s (1200f). 9 players. Intro 8s, outro 12s.
// Total ≈ 200s = 12000 frames
const INTRO_DUR    = 480;   // 8s
const PLAYER_DUR   = 1200;  // 20s per player
const TIER_BOARD_DUR = 720; // 12s tier board reveal
const OUTRO_DUR    = 240;   // 4s outro

const SCENES = [];
SCENES.push({ id:'intro', from:0, dur:INTRO_DUR, name:'Intro', voice:"Every Toronto Raptor to ever make an All-Star team. Ranked and placed alphabetically inside each tier. Ten legends. Let's go." });
let cursor = INTRO_DUR;
PLAYERS.forEach(p => {
  SCENES.push({ id:`p-${p.id}`, from:cursor, dur:PLAYER_DUR, name:p.name.split(' ').map(s=>s[0]).join(''), voice:p.voice, player:p });
  cursor += PLAYER_DUR;
});
SCENES.push({ id:'board', from:cursor, dur:TIER_BOARD_DUR, name:'Board', voice:"S tier. The legends. Kawhi Leonard. Kyle Lowry. Vince Carter. A tier. The superstars. Chris Bosh. DeMar DeRozan. Pascal Siakam. B tier. Fred VanVleet. Scottie Barnes. C tier. Antonio Davis. Brandon Ingram. Ten All-Stars. One franchise." });
cursor += TIER_BOARD_DUR;
SCENES.push({ id:'outro', from:cursor, dur:OUTRO_DUR, name:'Outro', voice:"We the North. Follow for more." });
const TOTAL = cursor + OUTRO_DUR;

// ── State ─────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let currentFrame = 0;
let playing = false;
let lastTime = 0;
let recording = false;
let mediaRecorder = null;
let recordedChunks = [];
let voiceEnabled = true;
let lastSpokenScene = null;
let voices = [];

// Load speech synthesis voices (async on some browsers)
function loadVoices() { voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
if (window.speechSynthesis) { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }

function pickVoice() {
  if (!voices.length) return null;
  // Prefer natural en-US male voices; fallback to any en
  const prefs = ['Google US English','Daniel','Alex','Samantha','Fred','Aaron','Nicky','Karen','Google UK English Male'];
  for (const name of prefs) { const v = voices.find(x => x.name.includes(name) && x.lang.startsWith('en')); if (v) return v; }
  return voices.find(v => v.lang.startsWith('en')) || voices[0];
}

function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05; u.pitch = 0.95; u.volume = 1;
  const v = pickVoice(); if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}
function stopSpeech() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }

function sizeStage() {
  const stage = document.getElementById('stage');
  const wrap = document.querySelector('.stage-wrap');
  const wRect = wrap.getBoundingClientRect();
  const availW = Math.max(200, wRect.width - 8);
  const availH = Math.max(200, wRect.height - 8);
  const ratio = PORTRAIT ? 9/16 : 16/9;
  let w, h;
  if (availW / availH > ratio) { h = availH; w = h * ratio; }
  else { w = availW; h = w / ratio; }
  if (PORTRAIT && w > 500) { w = 500; h = w / ratio; }
  if (!PORTRAIT && w > 1400) { w = 1400; h = w / ratio; }
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';
}
function resizeCanvas() {
  sizeStage();
  const rect = cv.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.max(1, rect.width) * dpr;
  cv.height = Math.max(1, rect.height) * dpr;
}
window.addEventListener('resize', () => { resizeCanvas(); render(currentFrame); });
window.addEventListener('orientationchange', () => setTimeout(() => { resizeCanvas(); render(currentFrame); }, 100));

// ── Math ──────────────────────────────────────────────
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
function spring(frame, from = 0, config = {}) {
  const { mass=1, damping=10, stiffness=100, delay=0 } = config;
  const f = Math.max(0, frame - from - delay);
  if (f <= 0) return 0;
  const t = f / FPS;
  const w0 = Math.sqrt(stiffness/mass);
  const z = damping / (2 * Math.sqrt(stiffness*mass));
  if (z < 1) {
    const wd = w0 * Math.sqrt(1 - z*z);
    return 1 - Math.exp(-z*w0*t) * (Math.cos(wd*t) + (z*w0/wd)*Math.sin(wd*t));
  }
  return 1 - Math.exp(-w0*t) * (1 + w0*t);
}
function interp(f, from, to, opts = {}) {
  const { fromVal=0, toVal=1, ease=easeInOutCubic } = opts;
  if (f <= from) return fromVal;
  if (f >= to) return toVal;
  return fromVal + (toVal - fromVal) * ease((f - from) / (to - from));
}
function getScene(frame) {
  for (const s of SCENES) if (frame >= s.from && frame < s.from + s.dur) return s;
  return SCENES[SCENES.length-1];
}
function px(v) { return v * (cv.width / W()); }
function pxY(v) { return v * (cv.height / H()); }

// ── RENDER ────────────────────────────────────────────
function render(frame) {
  const scene = getScene(frame);
  const local = frame - scene.from;

  // Background
  const bgT = frame / TOTAL;
  const g = ctx.createLinearGradient(0, 0, cv.width, cv.height);
  g.addColorStop(0, `hsl(${340 + Math.sin(bgT * Math.PI * 4) * 20}, 60%, 8%)`);
  g.addColorStop(0.5, `hsl(${280 + Math.cos(bgT * Math.PI * 3) * 20}, 50%, 6%)`);
  g.addColorStop(1, `hsl(${220 + Math.sin(bgT * Math.PI * 6) * 20}, 55%, 5%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, cv.width, cv.height);
  drawGrain(frame);

  if (scene.id === 'intro') drawIntro(local);
  else if (scene.id === 'board') drawTierBoard(local);
  else if (scene.id === 'outro') drawOutro(local);
  else if (scene.player) drawPlayerScene(scene.player, local);

  // Frame label (TikTok mode: show global title bar)
  if (PORTRAIT && scene.id !== 'intro' && scene.id !== 'outro') {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillRect(0, 0, cv.width, pxY(80));
    ctx.fillStyle = '#fff';
    ctx.font = `800 ${px(28)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('EVERY RAPTOR ALL-STAR · RANKED', cv.width/2, pxY(40));
    ctx.restore();
  }
}
function drawGrain(frame) {
  ctx.save();
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 70; i++) {
    const seed = (i * 9301 + frame * 173 + 1729) % 233280 / 233280;
    const x = seed * cv.width;
    const y = ((seed * 3141) % 1) * cv.height;
    ctx.fillStyle = seed > .5 ? '#fff' : '#000';
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.restore();
  // Floating atmosphere particles
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 24; i++) {
    const t = (frame * 0.5 + i * 137) / 800;
    const px_ = ((i * 947) % cv.width) + Math.sin(t + i) * cv.width * 0.15;
    const py_ = (((frame * 0.3 + i * 613) % cv.height) + cv.height * 2) % cv.height;
    const r = 1.5 + (i % 3) * 0.8;
    ctx.fillStyle = ['#ffcc00','#ff375f','#753bbd','#5aa0ff'][i % 4];
    ctx.beginPath(); ctx.arc(px_, py_, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // Vignette
  ctx.save();
  const vg = ctx.createRadialGradient(cv.width/2, cv.height/2, cv.width * 0.3, cv.width/2, cv.height/2, cv.width * 0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,.45)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, cv.width, cv.height);
  ctx.restore();
}

// ── INTRO ─────────────────────────────────────────────
function drawIntro(f) {
  const cx = cv.width / 2, cy = cv.height / 2;

  // Brand badge centerpiece — pulses in, rotates slightly, dominant hero
  const rapScale = spring(f, 0, { stiffness: 80, damping: 12 });
  const rapPulse = 1 + Math.sin(f * 0.07) * 0.025;
  ctx.save();
  ctx.translate(cx, cy - pxY(240));
  ctx.rotate(Math.sin(f * 0.02) * 0.02);
  ctx.scale(rapScale * rapPulse * 3.6, rapScale * rapPulse * 3.6);
  drawRaptor(0, 0, px(1));
  ctx.restore();

  // TORONTO
  const line1 = interp(f, 20, 50, { toVal: 1 });
  const line1Y = spring(f, 20, { stiffness: 100, damping: 14 });
  ctx.save();
  ctx.globalAlpha = line1;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = `700 ${px(70)}px -apple-system, sans-serif`;
  ctx.fillText('TORONTO', cx, cy + pxY(20) - (1 - line1Y) * pxY(60));
  ctx.restore();

  // RAPTORS
  const rapY = spring(f, 35, { stiffness: 100, damping: 13 });
  const rapOp = interp(f, 35, 65, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = rapOp;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const rg = ctx.createLinearGradient(cx - px(500), 0, cx + px(500), 0);
  rg.addColorStop(0, '#ce1141'); rg.addColorStop(0.5, '#753bbd'); rg.addColorStop(1, '#ff375f');
  ctx.fillStyle = rg;
  ctx.font = `900 ${px(140)}px -apple-system, sans-serif`;
  ctx.fillText('RAPTORS', cx, cy + pxY(140) - (1 - rapY) * pxY(80));
  ctx.restore();

  // Underline / divider
  const uOp = interp(f, 60, 90, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = uOp;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = px(3);
  ctx.beginPath();
  ctx.moveTo(cx - px(200) * uOp, cy + pxY(210));
  ctx.lineTo(cx + px(200) * uOp, cy + pxY(210));
  ctx.stroke();
  ctx.restore();

  // ALL-STAR TIER LIST
  const subOp = interp(f, 80, 140, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = subOp;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font = `600 ${px(36)}px "SF Mono", ui-monospace, monospace`;
  ctx.fillText('· ALL-STAR TIER LIST ·', cx, cy + pxY(260));
  ctx.fillStyle = '#7a7a80';
  ctx.font = `500 ${px(22)}px "SF Mono", ui-monospace, monospace`;
  ctx.fillText('10 All-Stars · Career Stats · Ranked', cx, cy + pxY(320));
  ctx.restore();

  // Alphabetical player names ticker at bottom — 2 lines
  const nameOp = interp(f, 200, 280, { toVal: 1 });
  if (nameOp > 0) {
    ctx.save();
    ctx.globalAlpha = nameOp * 0.55;
    ctx.font = `600 ${px(17)}px "SF Mono", monospace`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    const half = Math.ceil(PLAYERS.length / 2);
    ctx.fillText(PLAYERS.slice(0, half).map(p => p.name).join(' · '), cx, cy + pxY(400));
    ctx.fillText(PLAYERS.slice(half).map(p => p.name).join(' · '), cx, cy + pxY(430));
    ctx.restore();
  }

  // Champ ring count and jersey ticker
  const statsOp = interp(f, 300, 380, { toVal: 1 });
  if (statsOp > 0) {
    const totalRings = PLAYERS.reduce((sum, p) => sum + (p.rings || 0), 0);
    const totalASN = PLAYERS.reduce((sum, p) => sum + p.allstar.length, 0);
    ctx.save();
    ctx.globalAlpha = statsOp;
    ctx.font = `900 ${px(28)}px -apple-system, sans-serif`;
    ctx.fillStyle = '#ffcc00';
    ctx.textAlign = 'center';
    ctx.fillText(`${totalASN} SELECTIONS · ${totalRings} RINGS · 1 FRANCHISE`, cx, cy + pxY(500));
    ctx.restore();
  }
}

// ── PLAYER SCENE ──────────────────────────────────────
// 20s = 1200f
// Structure:
//  0-120  card + jersey reveal (2s)
//  120-360 stats table reveal (4s → 6s)
//  360-720 accolades (6s → 12s)
//  720-1000 tier stamp (12s → 16.7s)
//  1000-1200 fade out (16.7s → 20s)
// TikTok 9:16 native layout — vertical stack, big and readable
function drawPlayerScenePortrait(p, f) {
  const cx = cv.width / 2;

  // Hero card at top — jersey number + tier badge + name
  const cardIn = spring(f, 0, { stiffness: 80, damping: 14 });
  const cardOp = interp(f, 0, 30, { toVal: 1 });
  const cardW = px(960);
  const cardH = pxY(720);
  const cardX = cx - cardW / 2;
  const cardY = pxY(120);

  ctx.save();
  ctx.globalAlpha = cardOp;
  ctx.translate(0, (1 - cardIn) * pxY(200));

  // Card
  const cg = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  cg.addColorStop(0, shade(p.color, 30));
  cg.addColorStop(0.6, shade(p.color, -30));
  cg.addColorStop(1, shade(p.color, -60));
  ctx.fillStyle = cg;
  roundRect(ctx, cardX, cardY, cardW, cardH, px(32));
  ctx.fill();
  ctx.strokeStyle = shade(p.color, 60);
  ctx.lineWidth = px(4);
  roundRect(ctx, cardX, cardY, cardW, cardH, px(32));
  ctx.stroke();

  // Giant jersey number background
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.font = `900 ${px(560)}px -apple-system, sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText(p.jersey, cardX + cardW - px(30), cardY + cardH - pxY(20));
  ctx.restore();

  // Subtle diagonal accent stripes for texture
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = px(2);
  for (let i = 0; i < 6; i++) {
    ctx.beginPath();
    ctx.moveTo(cardX + cardW - px(200 - i * 30), cardY);
    ctx.lineTo(cardX + cardW, cardY + pxY(200 - i * 30));
    ctx.stroke();
  }
  ctx.restore();

  // Basketball emblem top-right
  ctx.save();
  ctx.translate(cardX + cardW - px(90), cardY + pxY(90));
  drawBasketball(0, 0, px(60));
  ctx.restore();

  // Tier badge top-left
  const tierBadgeIn = spring(f, 60, { stiffness: 120, damping: 15 });
  ctx.save();
  ctx.translate(cardX + px(40), cardY + pxY(40));
  ctx.scale(tierBadgeIn, tierBadgeIn);
  const tierC = TIERS.find(t => t.id === p.tier).color;
  ctx.fillStyle = tierC;
  roundRect(ctx, 0, 0, px(100), pxY(100), px(18));
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = `900 ${px(64)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.tier, px(50), pxY(50));
  ctx.restore();

  // Position pill (top-center)
  if (p.pos) {
    const posIn = spring(f, 70, { stiffness: 150, damping: 15 });
    ctx.save();
    ctx.globalAlpha = posIn;
    ctx.translate(cardX + cardW/2 - px(80), cardY + pxY(52));
    ctx.fillStyle = 'rgba(0,0,0,.32)';
    ctx.strokeStyle = 'rgba(255,255,255,.28)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, 0, 0, px(160), pxY(48), px(10));
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = `800 ${px(22)}px "SF Mono", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.pos, px(80), pxY(24));
    ctx.restore();
  }

  // Name — huge, wraps over 2 lines
  const nameParts = p.name.split(' ');
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  const firstFontSize = nameParts[0].length > 6 ? 60 : 72;
  ctx.font = `800 ${px(firstFontSize)}px -apple-system, sans-serif`;
  ctx.fillText(nameParts[0], cardX + px(50), cardY + cardH - pxY(350));
  const lastFontSize = nameParts.slice(1).join(' ').length > 10 ? 82 : 100;
  ctx.font = `900 ${px(lastFontSize)}px -apple-system, sans-serif`;
  ctx.fillText(nameParts.slice(1).join(' '), cardX + px(50), cardY + cardH - pxY(270));

  // Years + jersey
  ctx.font = `600 ${px(26)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.fillText(`${p.years}  ·  ${p.jersey}`, cardX + px(50), cardY + cardH - pxY(170));

  // All-Star strip: N× ALL-STAR + rings + HOF diamond
  ctx.font = `900 ${px(42)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffcc00';
  const asText = `${p.allstar.length}× ALL-STAR`;
  ctx.fillText(asText, cardX + px(50), cardY + cardH - pxY(115));
  // Iconic moment
  ctx.font = `600 ${px(20)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.fillText(p.moment || '', cardX + px(50), cardY + cardH - pxY(65));

  // Rings + HOF (right side of card)
  const badgesY = cardY + cardH - pxY(90);
  let badgeX = cardX + cardW - px(60);
  const ringSize = px(30);
  for (let r = 0; r < (p.rings || 0); r++) {
    const rIn = spring(f, 100 + r * 8, { stiffness: 220, damping: 14 });
    ctx.save();
    ctx.globalAlpha = rIn;
    drawRing(badgeX, badgesY, ringSize, '#ffcc00');
    ctx.restore();
    badgeX -= px(65);
  }
  if (p.hof) {
    const hIn = spring(f, 120, { stiffness: 220, damping: 14 });
    ctx.save();
    ctx.globalAlpha = hIn;
    drawHOF(badgeX, badgesY, px(28));
    ctx.restore();
  }

  // All-Star selection timeline (below the strip, inside card)
  const timelineIn = interp(f, 130, 180, { toVal: 1 });
  if (timelineIn > 0) {
    ctx.save();
    ctx.globalAlpha = timelineIn;
    const [ys, ye] = p.years.replace(/–now/,'–2025').replace('–','—').split(/[—-]/).map(s => parseInt(s));
    const startY = Math.min(ys, parseInt(p.allstar[0])) - 1;
    const endY = Math.max(ye || new Date().getFullYear(), parseInt(p.allstar[p.allstar.length-1])) + 1;
    drawAllStarTimeline(cardX + px(50), cardY + cardH - pxY(30), cardW - px(100), pxY(14), p.allstar, startY, endY, '#ffcc00');
    ctx.restore();
  }

  ctx.restore();

  // ── STATS panel below the card ─────────────
  const statsY0 = cardY + cardH + pxY(50);
  const statsIn = spring(f, 90, { stiffness: 80, damping: 14 });
  const statsOp = interp(f, 90, 130, { toVal: 1 });

  ctx.save();
  ctx.globalAlpha = statsOp;
  ctx.translate(0, (1 - statsIn) * pxY(120));

  // Header
  ctx.font = `800 ${px(24)}px "SF Mono", monospace`;
  ctx.fillStyle = '#7a7a80';
  ctx.textAlign = 'left';
  ctx.fillText('CAREER · AS A RAPTOR', cardX, statsY0);
  // Playoff PPG in header right
  if (p.po && p.po.ppg > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ff9500';
    ctx.font = `800 ${px(22)}px "SF Mono", monospace`;
    ctx.fillText(`PLAYOFFS · ${p.po.ppg} PPG`, cardX + cardW, statsY0);
    ctx.textAlign = 'left';
  }

  const stats = [
    { label:'PPG', value: p.stats.ppg.toFixed(1), max:30 },
    { label:'RPG', value: p.stats.rpg.toFixed(1), max:15 },
    { label:'APG', value: p.stats.apg.toFixed(1), max:10 },
    { label:'SPG', value: p.stats.spg.toFixed(1), max:2.5 },
    { label:'BPG', value: p.stats.bpg.toFixed(1), max:3 },
    { label:'FG%', value: (p.stats.fg*100).toFixed(1)+'%', raw:p.stats.fg, rawMax:0.55 },
    { label:'GP',  value: p.stats.gp+'',           max:700, raw:p.stats.gp }
  ];
  const barX = cardX + px(140);
  const barW = cardW - px(280);
  const rowH = pxY(76);
  stats.forEach((s, i) => {
    const delay = 110 + i * 20;
    const rowIn = spring(f, delay, { stiffness: 120, damping: 16 });
    const rowOp = interp(f, delay, delay + 20, { toVal: 1 });
    const yRow = statsY0 + pxY(50) + i * rowH;
    ctx.save();
    ctx.globalAlpha = rowOp;
    ctx.translate((1 - rowIn) * px(80), 0);
    // Label
    ctx.font = `800 ${px(26)}px "SF Mono", monospace`;
    ctx.fillStyle = '#7a7a80';
    ctx.textAlign = 'left';
    ctx.fillText(s.label, cardX, yRow + pxY(36));
    // Bar bg
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    roundRect(ctx, barX, yRow + pxY(22), barW, pxY(28), px(6));
    ctx.fill();
    // Bar fill
    let ratio = (s.raw !== undefined ? s.raw : parseFloat(s.value)) / (s.rawMax !== undefined ? s.rawMax : s.max);
    ratio = Math.max(0, Math.min(1, ratio));
    const growing = interp(f, delay, delay + 40, { toVal: 1 });
    const bg = ctx.createLinearGradient(barX, 0, barX + barW * ratio * growing, 0);
    bg.addColorStop(0, p.color); bg.addColorStop(1, shade(p.color, 40));
    ctx.fillStyle = bg;
    roundRect(ctx, barX, yRow + pxY(22), barW * ratio * growing, pxY(28), px(6));
    ctx.fill();
    // Count-up value
    const shownV = interp(f, delay + 5, delay + 45, { toVal: 1 });
    let displayVal = s.value;
    if (!isNaN(parseFloat(s.value)) && !s.value.includes('%')) {
      const target = parseFloat(s.value);
      const cur = target * shownV;
      displayVal = s.value.includes('.') ? cur.toFixed(1) : Math.round(cur).toString();
    }
    ctx.font = `900 ${px(38)}px -apple-system, sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'right';
    ctx.fillText(displayVal, cardX + cardW, yRow + pxY(44));
    ctx.restore();
  });
  ctx.restore();

  // Big TIER STAMP overlay near end
  const stampIn = spring(f, 720, { stiffness: 200, damping: 14 });
  const stampOp = interp(f, 720, 780, { toVal: 1 });
  if (stampOp > 0) {
    ctx.save();
    ctx.globalAlpha = stampOp * 0.92;
    ctx.translate(cx, cv.height / 2);
    ctx.rotate(-0.18);
    ctx.scale(stampIn + 0.4, stampIn + 0.4);
    const tC = TIERS.find(t => t.id === p.tier).color;
    ctx.strokeStyle = tC;
    ctx.lineWidth = px(16);
    roundRect(ctx, -px(360), -pxY(180), px(720), pxY(360), px(32));
    ctx.stroke();
    ctx.fillStyle = tC;
    ctx.font = `900 ${px(260)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${p.tier} TIER`, 0, 0);
    ctx.restore();
  }

  // Fade out
  const fadeOut = interp(f, 1080, 1200, { toVal: 1 });
  if (fadeOut > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fadeOut})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}

function drawPlayerScene(p, f) {
  if (PORTRAIT) { drawPlayerScenePortrait(p, f); return; }
  const cx = cv.width / 2, cy = cv.height / 2;
  const isPortrait = false;

  // Left column: big card (or top card in portrait)
  const cardIn = spring(f, 0, { stiffness: 80, damping: 14 });
  const cardOp = interp(f, 0, 30, { toVal: 1 });

  const cardW = px(700);
  const cardH = pxY(900);
  const cardX = px(80);
  const cardY = (cv.height - cardH) / 2;

  ctx.save();
  ctx.globalAlpha = cardOp;
  ctx.translate(0, (1 - cardIn) * pxY(300));

  // Card gradient
  const cg = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  cg.addColorStop(0, shade(p.color, 30));
  cg.addColorStop(0.6, shade(p.color, -30));
  cg.addColorStop(1, shade(p.color, -60));
  ctx.fillStyle = cg;
  roundRect(ctx, cardX, cardY, cardW, cardH, px(28));
  ctx.fill();
  // Border
  ctx.strokeStyle = shade(p.color, 60);
  ctx.lineWidth = px(3);
  roundRect(ctx, cardX, cardY, cardW, cardH, px(28));
  ctx.stroke();

  // Jersey number bg
  ctx.save();
  ctx.globalAlpha = 0.14;
  ctx.fillStyle = '#000';
  ctx.font = `900 ${px(700)}px -apple-system, sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText(p.jersey, cardX + cardW - px(30), cardY + cardH - pxY(30));
  ctx.restore();

  // Basketball emblem top-right
  ctx.save();
  ctx.translate(cardX + cardW - px(90), cardY + pxY(90));
  drawBasketball(0, 0, px(50));
  ctx.restore();

  // Tier badge top-left
  const tierBadgeIn = spring(f, 60, { stiffness: 120, damping: 15 });
  ctx.save();
  ctx.translate(cardX + px(40), cardY + pxY(40));
  ctx.scale(tierBadgeIn, tierBadgeIn);
  const tierC = TIERS.find(t => t.id === p.tier).color;
  ctx.fillStyle = tierC;
  roundRect(ctx, 0, 0, px(80), pxY(80), px(14));
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = `900 ${px(48)}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.tier, px(40), pxY(40));
  ctx.restore();

  // Name (bottom of card)
  const nameParts = p.name.split(' ');
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.font = `800 ${px(56)}px -apple-system, sans-serif`;
  ctx.fillText(nameParts[0], cardX + px(40), cardY + cardH - pxY(280));
  ctx.font = `800 ${px(72)}px -apple-system, sans-serif`;
  ctx.fillText(nameParts.slice(1).join(' '), cardX + px(40), cardY + cardH - pxY(220));

  // Years + jersey
  ctx.font = `600 ${px(22)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.fillText(`${p.years}  ·  ${p.jersey}`, cardX + px(40), cardY + cardH - pxY(140));

  // All-Star count strip
  ctx.font = `800 ${px(28)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`${p.allstar.length}× ALL-STAR`, cardX + px(40), cardY + cardH - pxY(90));
  ctx.font = `500 ${px(16)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.fillText(p.allstar.join(' · '), cardX + px(40), cardY + cardH - pxY(60));

  ctx.restore();

  // ── Right column: stats + accolades ────
  const rightX = px(830);
  const rightY = pxY(120);
  const rightW = px(1010);

  // STATS panel
  const statsIn = spring(f, 90, { stiffness: 80, damping: 14 });
  const statsOp = interp(f, 90, 130, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = statsOp;
  ctx.translate((1 - statsIn) * px(200), 0);

  ctx.font = `700 ${px(20)}px "SF Mono", monospace`;
  ctx.fillStyle = '#7a7a80';
  ctx.textAlign = 'left';
  ctx.fillText('CAREER STATS · AS A RAPTOR', rightX, rightY);

  // Stat rows — reveal one at a time
  const stats = [
    { label:'PPG', value: p.stats.ppg.toFixed(1), max:30 },
    { label:'RPG', value: p.stats.rpg.toFixed(1), max:15 },
    { label:'APG', value: p.stats.apg.toFixed(1), max:10 },
    { label:'SPG', value: p.stats.spg.toFixed(1), max:2.5 },
    { label:'BPG', value: p.stats.bpg.toFixed(1), max:3 },
    { label:'FG%', value: (p.stats.fg*100).toFixed(1)+'%', max:0.55, rawMax:0.55, raw:p.stats.fg },
    { label:'GP',  value: p.stats.gp+'',           max:700, raw:p.stats.gp }
  ];
  stats.forEach((s, i) => {
    const delay = 110 + i * 25;
    const rowIn = spring(f, delay, { stiffness: 120, damping: 16 });
    const rowOp = interp(f, delay, delay + 20, { toVal: 1 });
    const yRow = rightY + pxY(60) + i * pxY(75);
    ctx.save();
    ctx.globalAlpha = rowOp;
    ctx.translate((1 - rowIn) * px(60), 0);
    // Label
    ctx.font = `700 ${px(20)}px "SF Mono", monospace`;
    ctx.fillStyle = '#7a7a80';
    ctx.fillText(s.label, rightX, yRow + pxY(28));
    // Bar background
    const barX = rightX + px(90);
    const barW = rightW - px(220);
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    roundRect(ctx, barX, yRow + pxY(18), barW, pxY(24), px(4));
    ctx.fill();
    // Bar fill
    let ratio = (s.raw !== undefined ? s.raw : parseFloat(s.value)) / (s.rawMax !== undefined ? s.rawMax : s.max);
    ratio = Math.max(0, Math.min(1, ratio));
    const growing = interp(f, delay, delay + 40, { toVal: 1 });
    const barGrad = ctx.createLinearGradient(barX, 0, barX + barW * ratio * growing, 0);
    barGrad.addColorStop(0, p.color); barGrad.addColorStop(1, shade(p.color, 40));
    ctx.fillStyle = barGrad;
    roundRect(ctx, barX, yRow + pxY(18), barW * ratio * growing, pxY(24), px(4));
    ctx.fill();
    // Value
    ctx.font = `800 ${px(30)}px -apple-system, sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'right';
    ctx.fillText(s.value, rightX + rightW - px(20), yRow + pxY(34));
    ctx.textAlign = 'left';
    ctx.restore();
  });
  ctx.restore();

  // Accolades — reveal after stats
  const accOp = interp(f, 360, 420, { toVal: 1 });
  if (accOp > 0) {
    ctx.save();
    ctx.globalAlpha = accOp;
    ctx.font = `700 ${px(20)}px "SF Mono", monospace`;
    ctx.fillStyle = '#7a7a80';
    ctx.textAlign = 'left';
    const accY = rightY + pxY(620);
    ctx.fillText('CAREER HIGHLIGHTS', rightX, accY);
    p.accolades.forEach((line, i) => {
      const dLine = 380 + i * 30;
      const lineIn = spring(f, dLine, { stiffness: 140, damping: 16 });
      const lineOp = interp(f, dLine, dLine + 25, { toVal: 1 });
      ctx.save();
      ctx.globalAlpha = accOp * lineOp;
      ctx.translate((1 - lineIn) * px(40), 0);
      // Bullet
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(rightX + px(12), accY + pxY(48) + i * pxY(46), px(6), 0, Math.PI*2);
      ctx.fill();
      // Text
      ctx.font = `500 ${px(22)}px -apple-system, sans-serif`;
      ctx.fillStyle = '#fff';
      ctx.fillText(line, rightX + px(32), accY + pxY(54) + i * pxY(46));
      ctx.restore();
    });
    ctx.restore();
  }

  // Big TIER STAMP overlay near end
  const stampIn = spring(f, 720, { stiffness: 200, damping: 14 });
  const stampOp = interp(f, 720, 780, { toVal: 1 });
  if (stampOp > 0) {
    ctx.save();
    ctx.globalAlpha = stampOp * 0.9;
    ctx.translate(cx, cy);
    ctx.rotate(-0.18);
    ctx.scale(stampIn + 0.4, stampIn + 0.4);
    const tC = TIERS.find(t => t.id === p.tier).color;
    ctx.strokeStyle = tC;
    ctx.lineWidth = px(12);
    roundRect(ctx, -px(280), -pxY(140), px(560), pxY(280), px(24));
    ctx.stroke();
    ctx.fillStyle = tC;
    ctx.font = `900 ${px(200)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`${p.tier} TIER`, 0, 0);
    ctx.restore();
  }

  // Fade out
  const fadeOut = interp(f, 1080, 1200, { toVal: 1 });
  if (fadeOut > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fadeOut})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}

// ── TIER BOARD ────────────────────────────────────────
function drawTierBoard(f) {
  const cx = cv.width / 2;
  const isPortrait = PORTRAIT;
  const boardX = isPortrait ? px(40) : px(200);
  const boardW = cv.width - boardX*2;
  const boardY = pxY(isPortrait ? 220 : 160);

  // Title
  const titleOp = interp(f, 0, 30, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = titleOp;
  ctx.font = `800 ${px(56)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('THE BOARD', cx, pxY(90));
  ctx.font = `500 ${px(24)}px "SF Mono", monospace`;
  ctx.fillStyle = '#7a7a80';
  ctx.fillText('Alphabetical within tier', cx, pxY(130));
  ctx.restore();

  // Tier rows
  const rowH = pxY(isPortrait ? 350 : 180);
  TIERS.forEach((t, ti) => {
    const rowY = boardY + ti * (rowH + pxY(16));
    const delay = 40 + ti * 30;
    const rowIn = spring(f, delay, { stiffness: 100, damping: 15 });
    const rowOp = interp(f, delay, delay + 30, { toVal: 1 });
    ctx.save();
    ctx.globalAlpha = rowOp;
    ctx.translate((1 - rowIn) * -px(100), 0);

    // Tier label box
    const labelW = isPortrait ? px(160) : pxY(180);
    const bg = ctx.createLinearGradient(boardX, rowY, boardX + labelW, rowY);
    bg.addColorStop(0, t.color); bg.addColorStop(1, shade(t.color, -30));
    ctx.fillStyle = bg;
    roundRect(ctx, boardX, rowY, labelW, rowH, px(16));
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = `900 ${px(96)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(t.id, boardX + labelW/2, rowY + rowH/2);

    // Row background
    ctx.fillStyle = 'rgba(255,255,255,.03)';
    roundRect(ctx, boardX + labelW + px(12), rowY, boardW - labelW - px(12), rowH, px(16));
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.08)';
    ctx.lineWidth = px(1);
    roundRect(ctx, boardX + labelW + px(12), rowY, boardW - labelW - px(12), rowH, px(16));
    ctx.stroke();

    // Players in this tier — alphabetical (already sorted)
    const players = playersInTier(t.id);
    const cols = isPortrait ? Math.min(players.length, 3) : players.length;
    const chipGap = px(12);
    const chipsArea = boardW - labelW - px(24);
    const chipW = (chipsArea - (cols-1) * chipGap) / Math.max(1, cols);
    const chipH = isPortrait ? (rowH - pxY(40)) : (rowH - pxY(40));
    players.forEach((p, pi) => {
      const dp = delay + 40 + pi * 20;
      const chipIn = spring(f, dp, { stiffness: 140, damping: 16 });
      const chipOp = interp(f, dp, dp + 25, { toVal: 1 });
      const chipX = boardX + labelW + px(24) + pi * (chipW + chipGap);
      const chipY = rowY + pxY(20);
      ctx.save();
      ctx.globalAlpha = rowOp * chipOp;
      ctx.translate(0, (1 - chipIn) * pxY(80));
      // Chip
      const cg = ctx.createLinearGradient(chipX, chipY, chipX, chipY + chipH);
      cg.addColorStop(0, shade(p.color, 20));
      cg.addColorStop(1, shade(p.color, -40));
      ctx.fillStyle = cg;
      roundRect(ctx, chipX, chipY, chipW, chipH, px(12));
      ctx.fill();
      // Subtle diagonal accent for texture
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      for (let s2 = 0; s2 < 4; s2++) {
        ctx.beginPath();
        ctx.moveTo(chipX + chipW - px(50 + s2 * 10), chipY);
        ctx.lineTo(chipX + chipW, chipY + pxY(50 + s2 * 10));
        ctx.stroke();
      }
      ctx.restore();
      // Jersey top-right
      ctx.font = `800 ${px(20)}px -apple-system, sans-serif`;
      ctx.fillStyle = 'rgba(0,0,0,.6)';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText(p.jersey, chipX + chipW - px(12), chipY + pxY(10));
      // Name
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = `800 ${px(22)}px -apple-system, sans-serif`;
      const first = p.name.split(' ')[0];
      const last  = p.name.split(' ').slice(1).join(' ');
      ctx.fillText(first, chipX + px(14), chipY + pxY(14));
      ctx.fillText(last,  chipX + px(14), chipY + pxY(40));
      // Bottom-left: rings + HOF + All-Star count
      let bLeftX = chipX + px(14);
      const bLeftY = chipY + chipH - pxY(24);
      if (p.rings) {
        for (let r = 0; r < p.rings; r++) {
          drawRing(bLeftX + px(6), bLeftY, px(8), '#ffcc00');
          bLeftX += px(16);
        }
      }
      if (p.hof) {
        drawHOF(bLeftX + px(8), bLeftY, px(9));
        bLeftX += px(20);
      }
      // All-Star count text
      ctx.font = `700 ${px(14)}px "SF Mono", monospace`;
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(`${p.allstar.length}× AS`, bLeftX + px(4), bLeftY);
      ctx.restore();
    });
    ctx.restore();
  });
}

// ── OUTRO ─────────────────────────────────────────────
function drawOutro(f) {
  const cx = cv.width / 2, cy = cv.height / 2;
  // Camera-push scale on the R-mark badge
  const scale = spring(f, 0, { stiffness: 60, damping: 12 }) * 3.2;
  const pulse = 1 + Math.sin(f * 0.09) * 0.04;
  ctx.save();
  ctx.translate(cx, cy - pxY(240));
  ctx.scale(scale * pulse, scale * pulse);
  drawRaptor(0, 0, px(1));
  ctx.restore();

  const titleOp = interp(f, 20, 60, { toVal: 1 });
  const titleY = spring(f, 20, { stiffness: 100, damping: 14 });
  ctx.save();
  ctx.globalAlpha = titleOp;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${px(112)}px -apple-system, sans-serif`;
  ctx.fillText('WE THE NORTH', cx, cy + pxY(80) - (1 - titleY) * pxY(60));
  ctx.restore();

  // Gold accent line
  const uOp = interp(f, 50, 90, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = uOp;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = px(4);
  ctx.beginPath();
  ctx.moveTo(cx - px(180) * uOp, cy + pxY(160));
  ctx.lineTo(cx + px(180) * uOp, cy + pxY(160));
  ctx.stroke();
  ctx.restore();

  // Total tally strip
  const statsOp = interp(f, 80, 140, { toVal: 1 });
  const totalAS = PLAYERS.reduce((s,p) => s + p.allstar.length, 0);
  const totalRings = PLAYERS.reduce((s,p) => s + (p.rings||0), 0);
  const totalHOF = PLAYERS.filter(p => p.hof).length;
  ctx.save();
  ctx.globalAlpha = statsOp;
  ctx.textAlign = 'center';
  ctx.font = `900 ${px(34)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`${PLAYERS.length} ALL-STARS`, cx, cy + pxY(230));
  ctx.font = `800 ${px(24)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.fillText(`${totalAS} selections · ${totalRings} rings · ${totalHOF} HOFers`, cx, cy + pxY(280));
  ctx.restore();

  // Confetti storm
  for (let i = 0; i < 100; i++) {
    const seed = i * 137;
    const startY = -pxY(20);
    const speed = 3 + (i % 5);
    const y = startY + f * speed * pxY(2);
    const x = (seed % 100) / 100 * cv.width + Math.sin(f * 0.05 + i) * px(30);
    const rot2 = f * 0.1 + i;
    ctx.save();
    ctx.translate(x, y % cv.height);
    ctx.rotate(rot2);
    ctx.fillStyle = ['#ce1141','#ffcc00','#ff375f','#0a84ff','#30d158','#bf5af2','#ff9500'][i % 7];
    ctx.fillRect(-px(6), -pxY(10), px(12), pxY(20));
    ctx.restore();
  }
}

// ── DRAW UTILITIES ────────────────────────────────────
// Stylized T-Rex mascot silhouette (nod to classic Raptors logo)
// Clean geometric "R" badge — no janky dinosaur
function drawRaptor(x, y, s, color = '#ce1141') {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  const r = 55;
  // Outer badge with two-tone gradient
  const gr = ctx.createRadialGradient(-r*0.3, -r*0.4, 0, 0, 0, r);
  gr.addColorStop(0, '#ce1141');
  gr.addColorStop(0.55, '#753bbd');
  gr.addColorStop(1, '#1a0b3d');
  ctx.fillStyle = gr;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  // Gold outer ring
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, 0, r - 1, 0, Math.PI * 2);
  ctx.stroke();
  // Inner thin white ring
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, r - 8, 0, Math.PI * 2);
  ctx.stroke();
  // Big italic R (matches classic Raptors letterform vibe)
  ctx.fillStyle = '#fff';
  ctx.font = '900 italic 78px -apple-system, "SF Pro Display", Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', 0, 4);
  // Subtle top highlight
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.beginPath();
  ctx.ellipse(-r*0.25, -r*0.5, r*0.5, r*0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Championship ring / trophy icon
function drawRing(x, y, r, color = '#ffcc00') {
  ctx.save();
  ctx.translate(x, y);
  // Base ring
  ctx.beginPath(); ctx.arc(0, r * 0.4, r, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(-r*0.3, -r*0.2, 0, 0, 0, r * 1.4);
  g.addColorStop(0, '#fff5a0'); g.addColorStop(0.4, color); g.addColorStop(1, '#8a6a00');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#5a4400'; ctx.lineWidth = 1; ctx.stroke();
  // Gem
  ctx.fillStyle = '#ce1141';
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.7);
  ctx.lineTo(r * 0.35, -r * 0.15);
  ctx.lineTo(0, r * 0.15);
  ctx.lineTo(-r * 0.35, -r * 0.15);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.7);
  ctx.lineTo(-r * 0.15, -r * 0.3);
  ctx.lineTo(0, -r * 0.2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// HOF diamond badge
function drawHOF(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#8a6a00'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.font = `900 ${r * 0.9}px -apple-system, sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('HOF', 0, 0);
  ctx.restore();
}

// All-Star year timeline (horizontal dots per year in range)
function drawAllStarTimeline(x, y, w, h, yearsList, startYear, endYear, color) {
  const total = endYear - startYear + 1;
  const dotR = Math.min(h * 0.35, w / total * 0.35);
  ctx.strokeStyle = 'rgba(255,255,255,.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x, y + h/2); ctx.lineTo(x + w, y + h/2); ctx.stroke();
  const yearSet = new Set(yearsList.map(y => parseInt(y)));
  for (let yr = startYear; yr <= endYear; yr++) {
    const t = (yr - startYear) / Math.max(1, total - 1);
    const px_ = x + t * w;
    if (yearSet.has(yr)) {
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(px_, y + h/2, dotR, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(255,255,255,.15)';
      ctx.beginPath(); ctx.arc(px_, y + h/2, dotR * 0.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  // Endpoint labels
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.font = `500 ${h * 0.4}px "SF Mono", monospace`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText(`'${String(startYear).slice(-2)}`, x, y + h + h * 0.55);
  ctx.textAlign = 'right';
  ctx.fillText(`'${String(endYear).slice(-2)}`, x + w, y + h + h * 0.55);
}

function drawBasketball(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  grad.addColorStop(0, '#f9a34b'); grad.addColorStop(0.6, '#e07d1e'); grad.addColorStop(1, '#8a3d05');
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#3a1a05'; ctx.lineWidth = r * 0.04; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-r*0.55, 0, r*0.35, r*0.9, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(r*0.55, 0, r*0.35, r*0.9, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(-r*0.35, -r*0.35, r*0.18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.3)'; ctx.fill();
  ctx.restore();
}
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
function shade(hex, amt) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amt));
  return `rgb(${r},${g},${b})`;
}

// ── UI ────────────────────────────────────────────────
function fmtTime(f) {
  const s = Math.floor(f / FPS);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function updateUI() {
  document.getElementById('tc').textContent = fmtTime(currentFrame);
  const p = (currentFrame / TOTAL) * 100;
  document.getElementById('fill').style.width = `${p}%`;
  document.getElementById('head').style.left = `${p}%`;
  const scene = getScene(currentFrame);
  document.querySelectorAll('.chap').forEach(c => c.classList.toggle('active', c.dataset.id === scene.id));
  if (typeof updateSubs === 'function') updateSubs();
}
const chaptersEl = document.getElementById('chapters');
SCENES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'chap';
  el.dataset.id = s.id;
  el.textContent = s.name.length > 6 ? s.name.slice(0, 6) : s.name;
  el.title = s.name;
  el.onclick = () => { currentFrame = s.from; render(currentFrame); updateUI(); if (playing) speakScene(s); };
  chaptersEl.appendChild(el);
});

// Update total time display
document.querySelector('.timecode').innerHTML = `<b id="tc">0:00</b> / ${fmtTime(TOTAL)}`;

function speakScene(scene) {
  if (!voiceEnabled) return;
  if (lastSpokenScene === scene.id) return;
  lastSpokenScene = scene.id;
  speak(scene.voice);
}

function loop(t) {
  if (!lastTime) lastTime = t;
  const dt = t - lastTime;
  lastTime = t;
  if (playing) {
    currentFrame += (dt / 1000) * FPS;
    if (currentFrame >= TOTAL) {
      currentFrame = TOTAL;
      playing = false;
      document.getElementById('playpause').textContent = '▶ Play';
      stopSpeech();
      lastSpokenScene = null;
    } else {
      // Speak scene on entry
      const scene = getScene(currentFrame);
      const localFrame = currentFrame - scene.from;
      if (localFrame < 30 && lastSpokenScene !== scene.id) speakScene(scene);
    }
  }
  render(currentFrame);
  updateUI();
  requestAnimationFrame(loop);
}

document.getElementById('playpause').onclick = () => {
  playing = !playing;
  document.getElementById('playpause').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (currentFrame >= TOTAL) currentFrame = 0;
  if (!playing) stopSpeech();
  if (playing) { lastSpokenScene = null; speakScene(getScene(currentFrame)); }
};
document.getElementById('restart').onclick = () => {
  currentFrame = 0; playing = false; lastSpokenScene = null;
  document.getElementById('playpause').textContent = '▶ Play';
  stopSpeech();
};
document.getElementById('voice').onclick = function() {
  voiceEnabled = !voiceEnabled;
  this.classList.toggle('on', voiceEnabled);
  this.textContent = voiceEnabled ? '🎙 Voice' : '🔇 Muted';
  if (!voiceEnabled) stopSpeech();
};
document.getElementById('tiktok').onclick = function() {
  PORTRAIT = !PORTRAIT;
  this.classList.toggle('on', PORTRAIT);
  this.textContent = PORTRAIT ? '📱 9:16' : '🖥 16:9';
  resizeCanvas();
  render(currentFrame);
};

// ── Subtitles ─────────────────────────────
let subsEnabled = true;
const subsEl = document.getElementById('subs');
const subsText = document.getElementById('subs-text');
document.getElementById('ccbtn').onclick = function() {
  subsEnabled = !subsEnabled;
  this.classList.toggle('on', subsEnabled);
  subsEl.classList.toggle('hide', !subsEnabled);
};
function updateSubs() {
  if (!subsEnabled) return;
  const scene = getScene(currentFrame);
  const txt = scene.voice || '';
  if (subsText.dataset.current !== txt) {
    subsText.textContent = txt;
    subsText.dataset.current = txt;
  }
}
document.getElementById('subs-copy').onclick = async function() {
  const txt = subsText.textContent.trim();
  if (!txt) return;
  try {
    await navigator.clipboard.writeText(txt);
    this.classList.add('copied');
    this.textContent = '✓ Copied';
    setTimeout(() => { this.classList.remove('copied'); this.textContent = 'Copy'; }, 1200);
  } catch(e) { /* fallback */ }
};
document.getElementById('subs-all').onclick = async function() {
  // Full script — one line per scene
  const full = SCENES.map(s => `[${fmtTime(s.from)}] ${s.voice || ''}`).join('\n\n');
  try {
    await navigator.clipboard.writeText(full);
    this.classList.add('copied');
    this.textContent = '✓ Copied all';
    setTimeout(() => { this.classList.remove('copied'); this.textContent = 'Copy all'; }, 1400);
  } catch(e) { /* fallback */ }
};

// Scrub
let dragging = false;
const scrubEl = document.getElementById('scrub');
function scrubAt(clientX) {
  const rect = scrubEl.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  currentFrame = p * TOTAL;
  lastSpokenScene = null;
  stopSpeech();
}
scrubEl.addEventListener('pointerdown', e => { dragging = true; playing = false; document.getElementById('playpause').textContent = '▶ Play'; scrubAt(e.clientX); scrubEl.setPointerCapture(e.pointerId); });
scrubEl.addEventListener('pointermove', e => { if (dragging) scrubAt(e.clientX); });
scrubEl.addEventListener('pointerup', e => { dragging = false; });

// Keyboard
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playpause').click(); }
  if (e.code === 'ArrowLeft') { currentFrame = Math.max(0, currentFrame - FPS * 5); lastSpokenScene = null; stopSpeech(); }
  if (e.code === 'ArrowRight') { currentFrame = Math.min(TOTAL, currentFrame + FPS * 5); lastSpokenScene = null; stopSpeech(); }
  if (e.key === 'r' || e.key === 'R') document.getElementById('restart').click();
  if (e.key === 'v' || e.key === 'V') document.getElementById('voice').click();
  if (e.key === 't' || e.key === 'T') document.getElementById('tiktok').click();
});

// Recording
// ── Export system ──────────────────────────
const modal = document.getElementById('export-modal');
const status = document.getElementById('export-status');
const recordBtn = document.getElementById('record');
recordBtn.onclick = () => {
  modal.style.display = 'flex';
  status.textContent = 'Choose an export format below.';
  // Detect availability
  const hasVE = typeof VideoEncoder !== 'undefined';
  document.getElementById('exp-mp4-fast').disabled = !hasVE;
  document.getElementById('exp-mp4-fast').style.opacity = hasVE ? 1 : 0.4;
  document.getElementById('exp-mp4-fast').title = hasVE ? '' : 'WebCodecs not supported in this browser';
};
document.getElementById('exp-cancel').onclick = () => { modal.style.display = 'none'; };

function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}
function fname(ext) { return `raptors-all-stars${PORTRAIT ? '-tiktok' : ''}-${Date.now()}.${ext}`; }

// MP4 via WebCodecs — FAST offline path
async function exportMP4() {
  if (typeof VideoEncoder === 'undefined') { status.textContent = 'WebCodecs not supported.'; return; }
  playing = false; stopSpeech();
  const chunks = [];
  let encoderFailed = null;
  // H.264 requires EVEN dimensions
  const width = Math.floor(cv.width / 2) * 2;
  const height = Math.floor(cv.height / 2) * 2;
  const temp = document.createElement('canvas');
  temp.width = width; temp.height = height;
  const tctx = temp.getContext('2d', { alpha: false });
  const encoder = new VideoEncoder({
    output: chunk => { const buf = new Uint8Array(chunk.byteLength); chunk.copyTo(buf); chunks.push(buf); },
    error: err => { encoderFailed = err; status.textContent = 'Encoder error: ' + err.message; }
  });
  // Try codecs from highest capability down — 1080p 60fps needs Level 4.2+
  const candidates = [
    'avc1.640034', // High L5.2 (up to 4K)
    'avc1.640033', // High L5.1
    'avc1.64002A', // High L4.2 (1080p@60)
    'avc1.640028', // High L4.0 (1080p@30)
    'avc1.42E02A', // Baseline L4.2
    'avc1.42E028', // Baseline L4.0
    'avc1.42E01F'  // Baseline L3.1 (720p fallback)
  ];
  let codec = null;
  for (const c of candidates) {
    try {
      const s = await VideoEncoder.isConfigSupported({ codec: c, width, height, bitrate: 8_000_000, framerate: FPS });
      if (s.supported) { codec = c; break; }
    } catch (_) { /* try next */ }
  }
  if (!codec) {
    status.textContent = 'No H.264 codec supports ' + width + '×' + height + '@' + FPS + '. Try WebM instead.';
    return;
  }
  try {
    encoder.configure({ codec, width, height, bitrate: 8_000_000, framerate: FPS });
  } catch (err) {
    status.textContent = 'MP4 config failed: ' + err.message + '. Try WebM instead.';
    return;
  }
  const totalFrames = Math.floor(TOTAL);
  const t0 = performance.now();
  status.textContent = 'Encoding MP4… 0%';
  for (let f = 0; f < totalFrames; f++) {
    currentFrame = f;
    render(f);
    tctx.drawImage(cv, 0, 0, width, height);
    // Snapshot pixels via ImageBitmap — VideoFrame(canvas) can hold a ref not a copy
    const bitmap = await createImageBitmap(temp);
    const vf = new VideoFrame(bitmap, { timestamp: (f * 1e6) / FPS, duration: 1e6 / FPS });
    encoder.encode(vf, { keyFrame: f % 60 === 0 });
    vf.close();
    bitmap.close();
    // Backpressure only when encoder queue is full
    if (encoder.encodeQueueSize > 20) {
      await new Promise(r => setTimeout(r, 1));
    }
    // Progress + yield every 64 frames
    if ((f & 63) === 0) {
      const p = f / totalFrames;
      const el = performance.now() - t0;
      const eta = p > 0.02 ? Math.round((el / p) * (1 - p) / 1000) : Math.round(totalFrames * 0.005);
      status.textContent = `Encoding MP4… ${Math.round(p*100)}% · ETA ${eta}s`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  status.textContent = 'Flushing encoder…';
  await encoder.flush();
  encoder.close();
  status.textContent = 'Packaging…';
  // Package with a minimal MP4 muxer — simple approach: use MediaSource-compatible container via mp4-muxer polyfill inline
  // For simplicity, use the built-in encoder output stitched into a raw H.264 file (Annex B format works with many editors)
  const totalLen = chunks.reduce((s, c) => s + c.byteLength, 0);
  const combined = new Uint8Array(totalLen);
  let off = 0;
  for (const c of chunks) { combined.set(c, off); off += c.byteLength; }
  // This produces a raw H.264 stream (.h264) — not a container. To get MP4, we need a muxer.
  // Fallback: save as .h264 stream which can be remuxed with ffmpeg -i in.h264 -c copy out.mp4
  const blob = new Blob([combined], { type: 'video/mp4' });
  download(blob, fname('h264'));
  status.textContent = '✓ H.264 stream saved. Use ffmpeg -i FILE.h264 -c copy OUT.mp4 to remux to MP4.';
  setTimeout(() => modal.style.display = 'none', 3000);
}

// WebM fast — MediaRecorder + captureStream + requestFrame (no timeouts)
async function exportWebMFast() {
  playing = false; stopSpeech();
  status.textContent = 'Rendering WebM offline… 0%';
  const stream = cv.captureStream(0);
  const track = stream.getVideoTracks()[0];
  if (typeof track.requestFrame !== 'function') { status.textContent = 'Fast render not supported. Use Live capture instead.'; return; }
  let mime = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 10_000_000 });
  const parts = [];
  rec.ondataavailable = e => { if (e.data.size > 0) parts.push(e.data); };
  const done = new Promise(res => { rec.onstop = res; });
  rec.start();
  const totalFrames = Math.floor(TOTAL);
  const t0 = performance.now();
  for (let f = 0; f < totalFrames; f++) {
    currentFrame = f;
    render(f);
    track.requestFrame();
    // Only yield to event loop every 30 frames — no per-frame timeout
    if ((f & 31) === 0) {
      const p = f / totalFrames;
      const el = performance.now() - t0;
      const eta = p > 0.02 ? Math.round((el / p) * (1 - p) / 1000) : Math.round(totalFrames * 0.01);
      status.textContent = `Rendering WebM… ${Math.round(p*100)}% · ETA ${eta}s`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  rec.stop();
  await done;
  const blob = new Blob(parts, { type: 'video/webm' });
  download(blob, fname('webm'));
  status.textContent = '✓ WebM saved!';
  setTimeout(() => modal.style.display = 'none', 1500);
}

// Live WebM (real-time playback)
async function exportWebMLive() {
  status.textContent = 'Recording in real time (3:20)…';
  const stream = cv.captureStream(60);
  let mime = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 10_000_000 });
  const parts = [];
  rec.ondataavailable = e => { if (e.data.size > 0) parts.push(e.data); };
  const done = new Promise(res => { rec.onstop = res; });
  rec.start();
  currentFrame = 0;
  lastSpokenScene = null;
  playing = true;
  document.getElementById('playpause').textContent = '⏸ Pause';
  await new Promise(res => {
    const check = setInterval(() => {
      const el = currentFrame;
      status.textContent = `Recording live… ${fmtTime(el)} / ${fmtTime(TOTAL)}`;
      if (el >= TOTAL) { clearInterval(check); res(); }
    }, 200);
  });
  rec.stop();
  await done;
  const blob = new Blob(parts, { type: 'video/webm' });
  download(blob, fname('webm'));
  status.textContent = '✓ WebM saved!';
  setTimeout(() => modal.style.display = 'none', 1500);
}

// PNG frame sequence (in a zip)
async function exportFrames() {
  status.textContent = 'Rendering frames… 0%';
  const frames = [];
  // Take every 5th frame (12 fps) to keep it manageable
  const step = 5;
  const totalOut = Math.floor(TOTAL / step);
  playing = false; stopSpeech();
  for (let i = 0; i < totalOut; i++) {
    currentFrame = i * step;
    render(currentFrame);
    const blob = await new Promise(r => cv.toBlob(r, 'image/png'));
    frames.push({ name: `frame-${String(i).padStart(4,'0')}.png`, blob });
    if (i % 10 === 0) {
      status.textContent = `Rendering frames… ${Math.round((i/totalOut)*100)}%`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  // Build a simple uncompressed ZIP (STORE method)
  status.textContent = 'Packaging ZIP…';
  const zip = await makeZip(frames);
  download(zip, fname('zip'));
  status.textContent = `✓ ${totalOut} frames saved (12 fps).`;
  setTimeout(() => modal.style.display = 'none', 2000);
}

// Minimal ZIP writer (STORE method, no compression) — good enough for image sequences
async function makeZip(files) {
  const encoder = new TextEncoder();
  const chunks = [];
  const central = [];
  let offset = 0;
  function crc32(buf) {
    let crc = -1;
    for (let i = 0; i < buf.length; i++) {
      crc = (crc >>> 8) ^ CRC_TABLE[(crc ^ buf[i]) & 0xff];
    }
    return (crc ^ -1) >>> 0;
  }
  for (const f of files) {
    const buf = new Uint8Array(await f.blob.arrayBuffer());
    const nameBuf = encoder.encode(f.name);
    const crc = crc32(buf);
    // Local file header
    const lfh = new Uint8Array(30 + nameBuf.length);
    const dv = new DataView(lfh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true); dv.setUint16(6, 0, true); dv.setUint16(8, 0, true);
    dv.setUint16(10, 0, true); dv.setUint16(12, 0, true);
    dv.setUint32(14, crc, true);
    dv.setUint32(18, buf.length, true); dv.setUint32(22, buf.length, true);
    dv.setUint16(26, nameBuf.length, true); dv.setUint16(28, 0, true);
    lfh.set(nameBuf, 30);
    chunks.push(lfh); chunks.push(buf);
    // Central directory record
    const cdr = new Uint8Array(46 + nameBuf.length);
    const dv2 = new DataView(cdr.buffer);
    dv2.setUint32(0, 0x02014b50, true);
    dv2.setUint16(4, 20, true); dv2.setUint16(6, 20, true);
    dv2.setUint16(8, 0, true); dv2.setUint16(10, 0, true);
    dv2.setUint16(12, 0, true); dv2.setUint16(14, 0, true);
    dv2.setUint32(16, crc, true);
    dv2.setUint32(20, buf.length, true); dv2.setUint32(24, buf.length, true);
    dv2.setUint16(28, nameBuf.length, true); dv2.setUint16(30, 0, true);
    dv2.setUint16(32, 0, true); dv2.setUint16(34, 0, true);
    dv2.setUint16(36, 0, true); dv2.setUint32(38, 0, true);
    dv2.setUint32(42, offset, true);
    cdr.set(nameBuf, 46);
    central.push(cdr);
    offset += lfh.length + buf.length;
  }
  const cdSize = central.reduce((s, c) => s + c.length, 0);
  const cdOffset = offset;
  central.forEach(c => chunks.push(c));
  // End of central directory
  const eocd = new Uint8Array(22);
  const dv3 = new DataView(eocd.buffer);
  dv3.setUint32(0, 0x06054b50, true);
  dv3.setUint16(4, 0, true); dv3.setUint16(6, 0, true);
  dv3.setUint16(8, files.length, true); dv3.setUint16(10, files.length, true);
  dv3.setUint32(12, cdSize, true); dv3.setUint32(16, cdOffset, true);
  dv3.setUint16(20, 0, true);
  chunks.push(eocd);
  return new Blob(chunks, { type: 'application/zip' });
}
// CRC-32 table
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();

document.getElementById('exp-mp4-fast').onclick = exportMP4;
document.getElementById('exp-webm-fast').onclick = exportWebMFast;
document.getElementById('exp-webm-live').onclick = exportWebMLive;
document.getElementById('exp-frames').onclick = exportFrames;

// Init
resizeCanvas();
render(0);
updateUI();
requestAnimationFrame(() => { resizeCanvas(); render(currentFrame); });
setTimeout(() => { resizeCanvas(); render(currentFrame); }, 200);
requestAnimationFrame(loop);

})();
