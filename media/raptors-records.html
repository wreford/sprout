<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Raptors Record Book — Media Experiments</title>
<style>
:root{
  --bg:#050506;--panel:#0f0f11;--border:#1f1f22;--text:#f5f5f7;--dim:#7a7a80;
  --raptors:#ce1141;--red2:#ff375f;--purple:#753bbd;--gold:#ffcc00;--white:#fff;
  --career:#bf5af2;--season:#ff9500;--game:#ffcc00;--award:#ff375f;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow:hidden;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(5,5,6,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);gap:12px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
.brand a{color:var(--dim);text-decoration:none}
.brand a:hover{color:var(--text)}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--raptors);box-shadow:0 0 12px var(--raptors)}
.brand .live{color:var(--raptors)}
.controls{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .18s ease;user-select:none}
.btn:hover{border-color:#4a4a50;background:#1c1c1f}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--raptors);color:#fff;border-color:var(--raptors)}
.btn.primary:hover{background:#a80e35;border-color:#a80e35}
.btn.rec{color:var(--raptors)}
.btn.rec.recording{background:var(--raptors);color:#fff;animation:pulse 1.4s ease infinite}
.btn.tik.on{background:#8b5cf6;color:#fff;border-color:#8b5cf6}
.btn.vo.on{background:#30d158;color:#000;border-color:#30d158}
@keyframes pulse{50%{opacity:.7}}
.stage-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden;min-height:0}
.stage{position:relative;background:#000;border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6),inset 0 0 1px rgba(255,255,255,.04);transition:width .3s ease,height .3s ease}
.canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.playbar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-top:1px solid var(--border);background:rgba(5,5,6,.9);backdrop-filter:blur(12px);flex-shrink:0}
.timecode{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.08em;min-width:96px}
.timecode b{color:var(--text);font-weight:500}
.scrub{flex:1;height:6px;background:var(--border);border-radius:3px;position:relative;cursor:pointer;overflow:hidden}
.scrub .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--raptors),var(--gold));border-radius:3px;transition:width .05s linear}
.scrub .head{position:absolute;top:50%;width:14px;height:14px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.5);transition:left .05s linear}
.chapters{display:flex;gap:3px;overflow-x:auto;max-width:52%;-webkit-overflow-scrolling:touch}
.chap{font-family:var(--mono);font-size:9px;color:var(--dim);padding:3px 7px;border-radius:5px;border:1px solid var(--border);letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;cursor:pointer;transition:all .15s}
.chap.active{background:var(--raptors);border-color:var(--raptors);color:#fff}
.chap:hover{border-color:#4a4a50}
@media(max-width:720px){
  .top{padding:10px 12px}
  .brand span:not(.dot){display:none}
  .brand::after{content:"RECORD BOOK";color:var(--dim);font-size:11px;letter-spacing:.14em}
  .btn{padding:7px 10px;font-size:10px}
  .stage-wrap{padding:10px}
  .stage{border-radius:10px}
  .playbar{padding:8px 12px;gap:10px;flex-wrap:wrap}
  .timecode{min-width:auto;font-size:10px}
  .chapters{max-width:100%;width:100%;padding-bottom:2px}
}
</style>
</head>
<body>
<div class="top">
  <div class="brand">
    <span class="dot"></span>
    <a href="/media/">← media</a>
    <span>·</span>
    <span class="live">Raptors Record Book</span>
  </div>
  <div class="controls">
    <button class="btn tik on" id="tiktok" title="Toggle aspect ratio">📱 9:16</button>
    <button class="btn vo on" id="voice" title="Toggle voiceover">🎙 Voice</button>
    <button class="btn" id="restart">↺ Restart</button>
    <button class="btn primary" id="playpause">▶ Play</button>
    <button class="btn rec" id="record" title="Fast offline export">⚡ Export</button>
  </div>
</div>
<div class="stage-wrap">
  <div class="stage" id="stage"><canvas class="canvas" id="cv"></canvas></div>
</div>
<div class="playbar">
  <div class="timecode"><b id="tc">0:00</b> / 3:24</div>
  <div class="scrub" id="scrub"><div class="fill" id="fill"></div><div class="head" id="head"></div></div>
  <div class="chapters" id="chapters"></div>
</div>

    <div id="export-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);align-items:center;justify-content:center">
      <div style="background:#141416;border:1px solid #26262a;border-radius:14px;padding:24px;max-width:400px;width:90%">
        <div style="font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.14em;color:#7a7a80;text-transform:uppercase;margin-bottom:6px">Export</div>
        <h3 style="margin:0 0 14px;font-size:20px">Choose format</h3>
        <div id="export-status" style="font-family:ui-monospace,monospace;font-size:12px;color:#7a7a80;margin-bottom:14px;min-height:18px"></div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn primary" id="exp-mp4-fast" style="padding:12px 16px;font-size:12px">⚡ MP4 · Offline (WebCodecs, ~10s)</button>
          <button class="btn primary" id="exp-webm-fast" style="padding:12px 16px;font-size:12px;background:#753bbd;border-color:#753bbd">⚡ WebM · Offline render (~10s)</button>
          <button class="btn" id="exp-webm-live" style="padding:12px 16px;font-size:12px">🎥 WebM · Live capture (real-time)</button>
          <button class="btn" id="exp-frames" style="padding:12px 16px;font-size:12px">🖼 PNG frames · Zip (for editor)</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="btn" id="exp-cancel" style="flex:1;padding:10px">Cancel</button>
        </div>
      </div>
    </div>

<script>
(() => {
'use strict';

const FPS = 60;
let PORTRAIT = true;
function W() { return PORTRAIT ? 1080 : 1920; }
function H() { return PORTRAIT ? 1920 : 1080; }

// ── CATEGORIES ────────────────────────────
const CATEGORIES = {
  CAREER: { color:'#bf5af2', label:'CAREER LEADERS',   sub:'Franchise books · all time' },
  SEASON: { color:'#ff9500', label:'SEASON RECORDS',   sub:'82 games. One book.' },
  GAME:   { color:'#ffcc00', label:'SINGLE-GAME',      sub:'One night. Forever.' },
  AWARD:  { color:'#ff375f', label:'MOMENTS & AWARDS', sub:'Hardware, hearts, history' }
};

// ── RECORDS ───────────────────────────────
// value: string shown as huge number. counter: numeric target for count-up (0 = no counter).
const RECORDS = [
  // CAREER (4)
  { id:'c-pts', cat:'CAREER', headline:'MOST POINTS',    value:'13,296', counter:13296, unit:'PTS',
    holder:'DeMar DeRozan', years:'2009–2018', jersey:'#10', color:'#0a84ff',
    detail:'Only Raptor to score 10,000+', runnerUp:'Chris Bosh · 10,275',
    icon:'ball',
    voice:"Career scoring king. DeMar DeRozan. Thirteen thousand two hundred ninety six points. The only Raptor ever to crack ten thousand." },
  { id:'c-ast', cat:'CAREER', headline:'MOST ASSISTS',   value:'4,277',  counter:4277, unit:'AST',
    holder:'Kyle Lowry',    years:'2012–2021', jersey:'#7',  color:'#753bbd',
    detail:'And 1,518 threes made — also #1',   runnerUp:'DeMar DeRozan · 2,517',
    icon:'ball',
    voice:"Franchise assist king. Kyle Lowry. Forty two hundred seventy seven dimes. Nobody else is close." },
  { id:'c-reb', cat:'CAREER', headline:'MOST REBOUNDS',  value:'4,776',  counter:4776, unit:'REB',
    holder:'Chris Bosh',    years:'2003–2010', jersey:'#4',  color:'#30d158',
    detail:'Plus 600 blocks — franchise leader', runnerUp:'Antonio Davis · 2,485',
    icon:'ball', hof:true,
    voice:"Board crasher. Chris Bosh. Forty seven hundred seventy six rebounds. Six hundred blocks. Hall of Fame. Nobody rebounded like CB4." },
  { id:'c-as',  cat:'CAREER', headline:'ALL-STAR NODS',  value:'6',      counter:6, unit:'× ALL-STAR',
    holder:'Kyle Lowry',    years:'2015–2020', jersey:'#7',  color:'#753bbd',
    detail:'Six straight. The heart of the franchise.', runnerUp:'Bosh & Carter · 5',
    icon:'star',
    voice:"Most All-Star selections ever. Kyle Lowry. Six times. Six straight. G. R. I. T." },

  // SEASON (3)
  { id:'s-win', cat:'SEASON', headline:'MOST WINS',      value:'59-23',  counter:0, unit:'2017-18',
    holder:'The 2017-18 Raptors', years:'2017–18', jersey:null, color:'#ff9500',
    detail:'Best regular-season record in franchise history', runnerUp:'2015-16 · 56-26',
    icon:'trophy',
    voice:"Best season ever. Twenty seventeen twenty eighteen. Fifty nine and twenty three. Franchise record. Then they got swept by LeBron." },
  { id:'s-ppg', cat:'SEASON', headline:'SEASON PPG',     value:'27.6',   counter:27.6, unit:'PPG · 2000-01',
    holder:'Vince Carter', years:'2000–01', jersey:'#15', color:'#ffcc00',
    detail:'Nine straight games of 30+', runnerUp:'DeRozan · 27.3 (2017-18)',
    icon:'dunk', hof:true,
    voice:"Highest scoring season. Vince Carter. Twenty seven point six a night in the year two thousand and one. Air Canada in his prime. Nobody flew higher." },
  { id:'s-3pm', cat:'SEASON', headline:'MOST 3PM',       value:'260',    counter:260, unit:'THREES · 2021-22',
    holder:'Fred VanVleet', years:'2021–22', jersey:'#23', color:'#5ac8fa',
    detail:'12 makes short of Curry that year', runnerUp:'Lowry · 236 (2018-19)',
    icon:'ball',
    voice:"Most threes in a season. Fred VanVleet. Two hundred and sixty. In twenty twenty one twenty two. The undrafted kid from Wichita shooting the lights out." },

  // GAME (3)
  { id:'g-pts', cat:'GAME',   headline:'54-POINT GAME',  value:'54',     counter:54, unit:'POINTS · FEB 2 2022',
    holder:'Fred VanVleet', years:'vs Orlando', jersey:'#23', color:'#5ac8fa',
    detail:'11 threes on 14 attempts · franchise record', runnerUp:'DeRozan · 52 · T. Ross · 51',
    icon:'trophy', date:'February 2, 2022',
    voice:"Highest scoring game in franchise history. Fred VanVleet. Fifty four points. Eleven threes against Orlando. Undrafted kid, unstoppable night." },
  { id:'g-3',   cat:'GAME',   headline:'11 THREES',      value:'11',     counter:11, unit:'MADE · FEB 2 2022',
    holder:'Fred VanVleet', years:'vs Orlando', jersey:'#23', color:'#5ac8fa',
    detail:'On the same 54-point night · franchise record',    runnerUp:'Terrence Ross · 10',
    icon:'ball', date:'February 2, 2022',
    voice:"Eleven three-pointers in one game. Franchise record. Fred VanVleet. Same night as the fifty four. Orlando could not stop him." },
  { id:'g-reb', cat:'GAME',   headline:'22 REBOUNDS',    value:'22',     counter:22, unit:'BOARDS · SEVERAL',
    holder:'Chris Bosh', years:'multiple games',  jersey:'#4', color:'#30d158',
    detail:'Cleaned the glass on both ends',    runnerUp:'Jonas Valanciunas · 21',
    icon:'ball',
    voice:"Twenty two rebounds. Chris Bosh. Cleared the glass on both ends. Hall of Fame boards." },

  // MOMENTS (4) - longer, 900f each
  { id:'m-roy',  cat:'AWARD', headline:'ROOKIES OF YEAR', value:'3',    counter:3, unit:'ROOKIES OF THE YEAR',
    holder:'Damon · Vince · Scottie', years:'1996 · 1999 · 2022', jersey:null, color:'#ffcc00',
    detail:'Only 3 franchises with more', runnerUp:null,
    icon:'trophy', long:true,
    voice:"Three Rookies of the Year. Damon Stoudamire in ninety six. Vince Carter in ninety nine. Scottie Barnes in twenty twenty two. The Raptors do rookies right." },
  { id:'m-mip', cat:'AWARD',  headline:'MOST IMPROVED',   value:'MIP', counter:0, unit:'2018-19',
    holder:'Pascal Siakam', years:'2018–19', jersey:'#43', color:'#ff375f',
    detail:'27th pick to All-NBA in three seasons', runnerUp:null,
    icon:'trophy', long:true,
    voice:"Nineteen ninety nine. Pascal Siakam. Twenty seventh overall pick. Most improved player. Then he won a championship. Then he made All-NBA. Twice." },
  { id:'m-fmvp',cat:'AWARD',  headline:'FINALS MVP',      value:'FMVP', counter:0, unit:'JUNE 13 2019',
    holder:'Kawhi Leonard', years:'2019 Finals', jersey:'#2', color:'#ce1141',
    detail:'The Shot. Game 7 · bounce, bounce, in.', runnerUp:null,
    icon:'trophy', long:true, ring:true,
    voice:"Finals M V P. Kawhi Leonard. Two thousand nineteen. He hit the shot that will never be forgotten. Bounce. Bounce. In. He gave Toronto a championship. Then he left. Enough." },
  { id:'m-chip',cat:'AWARD',  headline:'NBA CHAMPIONS',   value:'2019', counter:0, unit:'4-2 vs WARRIORS',
    holder:'The 2019 Raptors', years:'2018–19', jersey:null, color:'#ffcc00',
    detail:'Kawhi. Kyle. Spicy. Fred. Marc. Nurse.', runnerUp:null,
    icon:'trophy', long:true, ring:true,
    voice:"The greatest moment in Toronto sports history. Twenty nineteen. NBA Champions. Four games to two. Over the Warriors. We the North. And we did it." }
];

// Category slates (transition between sections)
const SLATES = [
  { cat:'CAREER', voice:"Career records. All-time franchise leaders." },
  { cat:'SEASON', voice:"Season records. Eighty two games. One book." },
  { cat:'GAME',   voice:"Single-game records. One night. Forever." },
  { cat:'AWARD',  voice:"Moments. And hardware. And history." }
];

// ── SCENES ────────────────────────────────
const INTRO_DUR    = 480;   // 8s
const SLATE_DUR    = 120;   // 2s
const REC_DUR      = 720;   // 12s (short) or override
const REC_LONG_DUR = 900;   // 15s for moments
const OUTRO_DUR    = 480;   // 8s

const SCENES = [];
SCENES.push({ id:'intro', from:0, dur:INTRO_DUR, name:'Intro',
  voice:"The Toronto Raptors record book. Career leaders. Season records. Single-game feats. And the moments that defined a franchise. Fourteen records. Let's go." });

let cursor = INTRO_DUR;
const cats = ['CAREER','SEASON','GAME','AWARD'];
cats.forEach((cat, idx) => {
  // Slate
  const slate = SLATES[idx];
  SCENES.push({ id:`slate-${cat}`, from:cursor, dur:SLATE_DUR, name:cat.slice(0,3), voice:slate.voice, slate:true, cat:cat });
  cursor += SLATE_DUR;
  // Records in this category
  RECORDS.filter(r => r.cat === cat).forEach(r => {
    const dur = r.long ? REC_LONG_DUR : REC_DUR;
    SCENES.push({ id:`r-${r.id}`, from:cursor, dur:dur, name:r.headline.slice(0,6), voice:r.voice, record:r });
    cursor += dur;
  });
});
SCENES.push({ id:'outro', from:cursor, dur:OUTRO_DUR, name:'Outro',
  voice:"Fourteen records. One franchise. We the North. Follow for more." });
const TOTAL = cursor + OUTRO_DUR;

// ── State ─────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let currentFrame = 0;
let playing = false;
let lastTime = 0;
let recording = false;
let mediaRecorder = null;
let recordedChunks = [];
let voiceEnabled = true;
let lastSpokenScene = null;
let voices = [];

function loadVoices() { voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
if (window.speechSynthesis) { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
function pickVoice() {
  if (!voices.length) return null;
  const prefs = ['Google US English','Daniel','Alex','Samantha','Fred','Aaron','Karen'];
  for (const name of prefs) { const v = voices.find(x => x.name.includes(name) && x.lang.startsWith('en')); if (v) return v; }
  return voices.find(v => v.lang.startsWith('en')) || voices[0];
}
function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.06; u.pitch = 0.95; u.volume = 1;
  const v = pickVoice(); if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}
function stopSpeech() { if (window.speechSynthesis) window.speechSynthesis.cancel(); }

function sizeStage() {
  const stage = document.getElementById('stage');
  const wrap = document.querySelector('.stage-wrap');
  const wRect = wrap.getBoundingClientRect();
  const availW = Math.max(200, wRect.width - 8);
  const availH = Math.max(200, wRect.height - 8);
  const ratio = PORTRAIT ? 9/16 : 16/9;
  let w, h;
  if (availW / availH > ratio) { h = availH; w = h * ratio; }
  else { w = availW; h = w / ratio; }
  if (PORTRAIT && w > 500) { w = 500; h = w / ratio; }
  if (!PORTRAIT && w > 1400) { w = 1400; h = w / ratio; }
  stage.style.width = w + 'px';
  stage.style.height = h + 'px';
}
function resizeCanvas() {
  sizeStage();
  const rect = cv.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.max(1, rect.width) * dpr;
  cv.height = Math.max(1, rect.height) * dpr;
}
window.addEventListener('resize', () => { resizeCanvas(); render(currentFrame); });
window.addEventListener('orientationchange', () => setTimeout(() => { resizeCanvas(); render(currentFrame); }, 100));

// ── Math ──────────────────────────────────
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
const easeOutBack = (t, s=1.7) => 1 + (t-1)*(t-1)*((s+1)*(t-1) + s);
function spring(frame, from = 0, config = {}) {
  const { mass=1, damping=10, stiffness=100, delay=0 } = config;
  const f = Math.max(0, frame - from - delay);
  if (f <= 0) return 0;
  const t = f / FPS;
  const w0 = Math.sqrt(stiffness/mass);
  const z = damping / (2 * Math.sqrt(stiffness*mass));
  if (z < 1) {
    const wd = w0 * Math.sqrt(1 - z*z);
    return 1 - Math.exp(-z*w0*t) * (Math.cos(wd*t) + (z*w0/wd)*Math.sin(wd*t));
  }
  return 1 - Math.exp(-w0*t) * (1 + w0*t);
}
function interp(f, from, to, opts = {}) {
  const { fromVal=0, toVal=1, ease=easeInOutCubic } = opts;
  if (f <= from) return fromVal;
  if (f >= to) return toVal;
  return fromVal + (toVal - fromVal) * ease((f - from) / (to - from));
}
function getScene(frame) {
  for (const s of SCENES) if (frame >= s.from && frame < s.from + s.dur) return s;
  return SCENES[SCENES.length-1];
}
function px(v) { return v * (cv.width / W()); }
function pxY(v) { return v * (cv.height / H()); }
function shade(hex, amt) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amt));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amt));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amt));
  return `rgb(${r},${g},${b})`;
}
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

// ── Icons ─────────────────────────────────
function drawRaptor(x, y, s, color = '#ce1141') {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-40, 5);
  ctx.quadraticCurveTo(-50, -10, -35, -20);
  ctx.lineTo(-15, -12);
  ctx.quadraticCurveTo(-5, -20, 5, -18);
  ctx.lineTo(15, -22);
  ctx.quadraticCurveTo(30, -30, 40, -20);
  ctx.lineTo(45, -10);
  ctx.lineTo(35, -6);
  ctx.lineTo(38, 0);
  ctx.lineTo(28, 2);
  ctx.lineTo(30, 8);
  ctx.lineTo(18, 6);
  ctx.lineTo(10, 8);
  ctx.quadraticCurveTo(-5, 15, -20, 12);
  ctx.lineTo(-30, 10);
  ctx.closePath();
  ctx.fill();
  ctx.fillRect(-5, 6, 4, 14);
  ctx.fillRect(8, 6, 4, 14);
  ctx.beginPath(); ctx.arc(-3, 22, 5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(10, 22, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillRect(-18, -4, 3, 12);
  ctx.beginPath(); ctx.arc(-22, 10, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(32, -18, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(32, -18, 1.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(30, 2); ctx.lineTo(32, 5); ctx.lineTo(28, 4); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(34, 2); ctx.lineTo(36, 5); ctx.lineTo(32, 4); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawTrophy(x, y, s, color = '#ffcc00') {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  const g = ctx.createLinearGradient(0, -40, 0, 40);
  g.addColorStop(0, shade(color, 40)); g.addColorStop(1, shade(color, -30));
  ctx.fillStyle = g;
  // Cup
  ctx.beginPath();
  ctx.moveTo(-30, -35); ctx.lineTo(30, -35);
  ctx.lineTo(28, 5);
  ctx.quadraticCurveTo(0, 15, -28, 5);
  ctx.closePath(); ctx.fill();
  // Handles
  ctx.strokeStyle = color; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(-38, -15, 12, -Math.PI/2, Math.PI/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(38, -15, 12, Math.PI/2, -Math.PI/2, true); ctx.stroke();
  // Stem + base
  ctx.fillStyle = shade(color, -20);
  ctx.fillRect(-8, 5, 16, 20);
  ctx.fillStyle = color;
  ctx.fillRect(-25, 22, 50, 8);
  ctx.fillRect(-30, 28, 60, 6);
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,.4)';
  ctx.beginPath();
  ctx.moveTo(-22, -30); ctx.lineTo(-18, -30);
  ctx.lineTo(-14, 0); ctx.lineTo(-18, 0); ctx.closePath(); ctx.fill();
  ctx.restore();
}
function drawBasketball(x, y, r) {
  ctx.save();
  ctx.translate(x, y);
  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  grad.addColorStop(0, '#f9a34b'); grad.addColorStop(0.6, '#e07d1e'); grad.addColorStop(1, '#8a3d05');
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
  ctx.strokeStyle = '#3a1a05'; ctx.lineWidth = r * 0.04; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-r*0.55, 0, r*0.35, r*0.9, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(r*0.55, 0, r*0.35, r*0.9, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
}
function drawRing(x, y, r, color = '#ffcc00') {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath(); ctx.arc(0, r * 0.4, r, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(-r*0.3, -r*0.2, 0, 0, 0, r * 1.4);
  g.addColorStop(0, '#fff5a0'); g.addColorStop(0.4, color); g.addColorStop(1, '#8a6a00');
  ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = '#ce1141';
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.7);
  ctx.lineTo(r * 0.35, -r * 0.15);
  ctx.lineTo(0, r * 0.15);
  ctx.lineTo(-r * 0.35, -r * 0.15);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawStar(x, y, r, color = '#ffcc00') {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = -Math.PI/2 + i * Math.PI / 5;
    const rr = i % 2 === 0 ? r : r * 0.4;
    const px = Math.cos(angle) * rr;
    const py = Math.sin(angle) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawDunk(x, y, s, color = '#ffcc00') {
  // Stylized dunker silhouette
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = color;
  // Body
  ctx.beginPath();
  ctx.arc(-5, -50, 12, 0, Math.PI * 2); ctx.fill(); // head
  ctx.beginPath();
  ctx.moveTo(-8, -40);
  ctx.quadraticCurveTo(-15, -20, -10, 0);
  ctx.lineTo(5, 0);
  ctx.quadraticCurveTo(10, -20, 5, -40);
  ctx.closePath();
  ctx.fill();
  // Extended arm to rim
  ctx.strokeStyle = color; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2, -40); ctx.lineTo(20, -80); ctx.stroke();
  // Ball
  drawBasketball(24, -78, 10);
  // Rim
  ctx.strokeStyle = '#ce1141'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(28, -74, 18, 0, Math.PI); ctx.stroke();
  // Legs mid-flight
  ctx.strokeStyle = color; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(-16, 30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(-6, 32); ctx.stroke();
  ctx.restore();
}

// ── RENDER ────────────────────────────────
function render(frame) {
  const scene = getScene(frame);
  const local = frame - scene.from;
  const catColor = scene.cat ? CATEGORIES[scene.cat].color
                   : scene.record ? CATEGORIES[scene.record.cat].color
                   : '#ce1141';

  // Base gradient (tinted by category)
  const bgT = frame / TOTAL;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cv.width, cv.height);
  // Radial vignette with category color
  const rg = ctx.createRadialGradient(cv.width/2, cv.height*0.4, 0, cv.width/2, cv.height*0.4, cv.width);
  rg.addColorStop(0, shade(catColor, -100));
  rg.addColorStop(0.6, '#0a0a0d');
  rg.addColorStop(1, '#000');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, cv.width, cv.height);
  drawGrain(frame);

  if (scene.id === 'intro') drawIntro(local);
  else if (scene.id === 'outro') drawOutro(local);
  else if (scene.slate) drawSlate(scene, local);
  else if (scene.record) drawRecord(scene.record, local);

  // Title bar (portrait)
  if (PORTRAIT && !['intro','outro'].includes(scene.id)) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.fillRect(0, 0, cv.width, pxY(64));
    ctx.fillStyle = '#fff';
    ctx.font = `800 ${px(24)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('RAPTORS RECORD BOOK', cv.width/2, pxY(32));
    ctx.restore();
  }
}
function drawGrain(frame) {
  ctx.save();
  ctx.globalAlpha = 0.04;
  for (let i = 0; i < 50; i++) {
    const seed = (i * 9301 + frame * 173 + 1729) % 233280 / 233280;
    const x = seed * cv.width;
    const y = ((seed * 3141) % 1) * cv.height;
    ctx.fillStyle = seed > .5 ? '#fff' : '#000';
    ctx.fillRect(x, y, 2, 2);
  }
  ctx.restore();
}

// ── INTRO ─────────────────────────────────
function drawIntro(f) {
  const cx = cv.width / 2, cy = cv.height / 2;
  // Mascot
  const rapScale = spring(f, 0, { stiffness: 80, damping: 12 });
  const rapPulse = 1 + Math.sin(f * 0.08) * 0.03;
  ctx.save();
  ctx.translate(cx, cy - pxY(220));
  ctx.scale(rapScale * rapPulse * 4.5, rapScale * rapPulse * 4.5);
  drawRaptor(0, 0, px(1), '#ce1141');
  ctx.restore();

  // TORONTO
  const line1 = interp(f, 20, 50, { toVal: 1 });
  const line1Y = spring(f, 20, { stiffness: 100, damping: 14 });
  ctx.save();
  ctx.globalAlpha = line1;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = `700 ${px(64)}px -apple-system, sans-serif`;
  ctx.fillText('TORONTO RAPTORS', cx, cy + pxY(20) - (1 - line1Y) * pxY(60));
  ctx.restore();

  // RECORD BOOK — big serif
  const rbY = spring(f, 35, { stiffness: 100, damping: 13 });
  const rbOp = interp(f, 35, 65, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = rbOp;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const rg = ctx.createLinearGradient(cx - px(500), 0, cx + px(500), 0);
  rg.addColorStop(0, '#ce1141'); rg.addColorStop(0.5, '#ffcc00'); rg.addColorStop(1, '#753bbd');
  ctx.fillStyle = rg;
  ctx.font = `900 italic ${px(160)}px "Times New Roman", Georgia, serif`;
  ctx.fillText('RECORD', cx, cy + pxY(140) - (1 - rbY) * pxY(80));
  ctx.font = `900 italic ${px(160)}px "Times New Roman", Georgia, serif`;
  ctx.fillText('BOOK', cx, cy + pxY(280) - (1 - rbY) * pxY(80));
  ctx.restore();

  // Underline
  const uOp = interp(f, 60, 90, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = uOp;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = px(4);
  ctx.beginPath();
  ctx.moveTo(cx - px(240) * uOp, cy + pxY(370));
  ctx.lineTo(cx + px(240) * uOp, cy + pxY(370));
  ctx.stroke();
  ctx.restore();

  // 4 category chips
  const catOp = interp(f, 120, 200, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = catOp;
  ctx.textAlign = 'center';
  const cats = Object.entries(CATEGORIES);
  cats.forEach(([id, c], i) => {
    const chipIn = spring(f, 130 + i * 10, { stiffness: 140, damping: 15 });
    const chipW = px(180); const chipH = pxY(60);
    const chipX = cx - (chipW * 4 + px(20) * 3) / 2 + i * (chipW + px(20));
    const chipY = cy + pxY(430);
    ctx.save();
    ctx.globalAlpha = catOp * chipIn;
    ctx.fillStyle = c.color;
    roundRect(ctx, chipX, chipY, chipW, chipH, px(10));
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = `800 ${px(18)}px "SF Mono", monospace`;
    ctx.textBaseline = 'middle';
    ctx.fillText(c.label.split(' ')[0], chipX + chipW/2, chipY + chipH/2);
    ctx.restore();
  });
  ctx.restore();

  // Records count
  const nOp = interp(f, 250, 320, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = nOp;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font = `900 ${px(48)}px -apple-system, sans-serif`;
  ctx.fillText(`${RECORDS.length} RECORDS · 3:24`, cx, cy + pxY(570));
  ctx.restore();
}

// ── SLATE ─────────────────────────────────
function drawSlate(scene, f) {
  const cat = CATEGORIES[scene.cat];
  const cx = cv.width / 2, cy = cv.height / 2;

  // Big colored wipe
  const wipe = interp(f, 0, 40, { toVal: 1 });
  ctx.save();
  ctx.fillStyle = cat.color;
  ctx.fillRect(0, cy - pxY(200), cv.width, pxY(400) * wipe);
  ctx.restore();

  // Category name
  const nameIn = spring(f, 15, { stiffness: 120, damping: 14 });
  const nameOp = interp(f, 15, 40, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = nameOp;
  ctx.translate(cx, cy);
  ctx.scale(nameIn + 0.3, nameIn + 0.3);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#000';
  ctx.font = `900 ${px(80)}px -apple-system, sans-serif`;
  ctx.fillText(cat.label, 0, -pxY(20));
  ctx.font = `600 ${px(28)}px "SF Mono", monospace`;
  ctx.globalAlpha = nameOp * 0.7;
  ctx.fillText(cat.sub, 0, pxY(60));
  ctx.restore();

  // Fade out to next
  const fade = interp(f, 90, 120, { toVal: 1 });
  if (fade > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fade})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}

// ── RECORD SCENE ──────────────────────────
function drawRecord(r, f) {
  const cx = cv.width / 2;
  const cat = CATEGORIES[r.cat];

  // Category strip (top under title bar)
  const stripIn = spring(f, 0, { stiffness: 120, damping: 14 });
  ctx.save();
  ctx.globalAlpha = stripIn;
  ctx.fillStyle = cat.color;
  ctx.fillRect(0, pxY(72), cv.width, pxY(52));
  ctx.fillStyle = '#000';
  ctx.font = `800 ${px(22)}px "SF Mono", monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(cat.label, cx, pxY(98));
  ctx.restore();

  // Headline (e.g. MOST POINTS)
  const headIn = spring(f, 20, { stiffness: 100, damping: 14 });
  const headOp = interp(f, 20, 50, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = headOp;
  ctx.translate(0, (1 - headIn) * pxY(60));
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${px(64)}px -apple-system, sans-serif`;
  ctx.fillText(r.headline, cx, pxY(210));
  ctx.restore();

  // Big value — huge, with count-up if numeric
  const valIn = spring(f, 40, { stiffness: 80, damping: 13 });
  const valOp = interp(f, 40, 80, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = valOp;
  ctx.translate(cx, pxY(560));
  const scale = valIn * 1.2;
  ctx.scale(scale, scale);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // Glow
  ctx.shadowColor = cat.color;
  ctx.shadowBlur = px(30) * valIn;
  const vg = ctx.createLinearGradient(0, -pxY(150), 0, pxY(150));
  vg.addColorStop(0, '#fff'); vg.addColorStop(1, shade(cat.color, 30));
  ctx.fillStyle = vg;
  // Adjust size for long values
  let vSize = 300;
  if (r.value.length > 4) vSize = 240;
  if (r.value.length > 5) vSize = 180;
  if (r.value.length > 6) vSize = 150;
  ctx.font = `900 italic ${px(vSize)}px "Times New Roman", Georgia, serif`;
  // Count-up
  let display = r.value;
  if (r.counter > 0) {
    const cU = interp(f, 60, 180, { toVal: 1, ease: easeOutCubic });
    const cur = r.counter * cU;
    if (r.counter >= 1000) display = Math.round(cur).toLocaleString();
    else if (r.counter % 1 !== 0) display = cur.toFixed(1);
    else display = Math.round(cur).toString();
  }
  ctx.fillText(display, 0, 0);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Unit label (below big value)
  ctx.save();
  ctx.globalAlpha = valOp;
  ctx.textAlign = 'center';
  ctx.fillStyle = cat.color;
  ctx.font = `800 ${px(36)}px "SF Mono", monospace`;
  ctx.fillText(r.unit, cx, pxY(760));
  ctx.restore();

  // Holder card at bottom
  const cardIn = spring(f, 100, { stiffness: 90, damping: 14 });
  const cardOp = interp(f, 100, 140, { toVal: 1 });
  const cardW = px(960);
  const cardH = pxY(500);
  const cardX = cx - cardW/2;
  const cardY = pxY(880);
  ctx.save();
  ctx.globalAlpha = cardOp;
  ctx.translate(0, (1 - cardIn) * pxY(200));

  // Card bg
  const cg = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
  cg.addColorStop(0, shade(r.color, 20));
  cg.addColorStop(0.7, shade(r.color, -30));
  cg.addColorStop(1, shade(r.color, -60));
  ctx.fillStyle = cg;
  roundRect(ctx, cardX, cardY, cardW, cardH, px(28));
  ctx.fill();
  ctx.strokeStyle = shade(r.color, 60);
  ctx.lineWidth = px(3);
  roundRect(ctx, cardX, cardY, cardW, cardH, px(28));
  ctx.stroke();

  // Giant jersey number bg
  if (r.jersey) {
    ctx.save();
    ctx.globalAlpha = 0.20;
    ctx.fillStyle = '#000';
    ctx.font = `900 ${px(400)}px -apple-system, sans-serif`;
    ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
    ctx.fillText(r.jersey, cardX + cardW - px(30), cardY + cardH - pxY(10));
    ctx.restore();
  }

  // Icon
  if (r.icon === 'trophy') {
    const tIn = spring(f, 130, { stiffness: 150, damping: 14 });
    ctx.save();
    ctx.translate(cardX + cardW - px(110), cardY + pxY(120));
    ctx.scale(tIn * 1.5, tIn * 1.5);
    drawTrophy(0, 0, px(1), '#ffcc00');
    ctx.restore();
  } else if (r.icon === 'ball') {
    ctx.save();
    ctx.translate(cardX + cardW - px(110), cardY + pxY(110));
    ctx.rotate(f * 0.03);
    drawBasketball(0, 0, px(60));
    ctx.restore();
  } else if (r.icon === 'star') {
    for (let i = 0; i < 3; i++) {
      const sIn = spring(f, 130 + i * 8, { stiffness: 180, damping: 14 });
      ctx.save();
      ctx.translate(cardX + cardW - px(80) - i * px(70), cardY + pxY(110));
      ctx.scale(sIn, sIn);
      drawStar(0, 0, px(40), '#ffcc00');
      ctx.restore();
    }
  } else if (r.icon === 'dunk') {
    const dIn = spring(f, 130, { stiffness: 150, damping: 14 });
    ctx.save();
    ctx.translate(cardX + cardW - px(140), cardY + pxY(180));
    ctx.scale(dIn * 1.2, dIn * 1.2);
    drawDunk(0, 0, px(1), '#ffcc00');
    ctx.restore();
  }

  // Rings if this record has one
  if (r.ring) {
    const ringIn = spring(f, 160, { stiffness: 180, damping: 14 });
    ctx.save();
    ctx.globalAlpha = ringIn;
    drawRing(cardX + px(80), cardY + pxY(60), px(28), '#ffcc00');
    ctx.restore();
  }

  // "RECORD HOLDER" label
  ctx.font = `700 ${px(20)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('RECORD HOLDER', cardX + px(40), cardY + pxY(40));

  // Holder name
  ctx.font = `900 ${px(56)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#fff';
  const nameLines = r.holder.split(/ · /);
  nameLines.forEach((line, i) => {
    ctx.fillText(line, cardX + px(40), cardY + pxY(80) + i * pxY(64));
  });

  // Years
  ctx.font = `600 ${px(28)}px "SF Mono", monospace`;
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  ctx.fillText(r.years, cardX + px(40), cardY + pxY(80) + nameLines.length * pxY(64) + pxY(8));

  // Detail line
  ctx.font = `500 ${px(24)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(r.detail, cardX + px(40), cardY + pxY(260));

  // Runner up
  if (r.runnerUp) {
    ctx.font = `600 ${px(18)}px "SF Mono", monospace`;
    ctx.fillStyle = 'rgba(255,255,255,.5)';
    ctx.fillText('NEXT CLOSEST', cardX + px(40), cardY + cardH - pxY(80));
    ctx.font = `700 ${px(26)}px -apple-system, sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.fillText(r.runnerUp, cardX + px(40), cardY + cardH - pxY(50));
  }

  // Date pill (bottom-right)
  if (r.date) {
    const dPill = cardX + cardW - px(240);
    const dPillY = cardY + cardH - pxY(70);
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    roundRect(ctx, dPill, dPillY, px(220), pxY(46), px(8));
    ctx.fill();
    ctx.font = `700 ${px(18)}px "SF Mono", monospace`;
    ctx.fillStyle = '#ffcc00';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(r.date, dPill + px(110), dPillY + pxY(23));
  }

  ctx.restore();

  // Runner-up ghost bar (comparison)
  if (r.counter > 0 && r.runnerUp) {
    const runNum = parseFloat(r.runnerUp.replace(/,/g,'').match(/[\d.]+/) || 0);
    const ratio = runNum / r.counter;
    const barY = pxY(830);
    const barInner = interp(f, 200, 320, { toVal: 1 });
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = 'rgba(255,255,255,.06)';
    const barX = cx - px(400);
    const barW = px(800);
    roundRect(ctx, barX, barY, barW, pxY(6), px(3));
    ctx.fill();
    ctx.fillStyle = cat.color;
    roundRect(ctx, barX, barY, barW * ratio * barInner, pxY(6), px(3));
    ctx.fill();
    ctx.restore();
  }

  // Fade out at end
  const dur = r.long ? REC_LONG_DUR : REC_DUR;
  const fadeOut = interp(f, dur - 40, dur, { toVal: 1 });
  if (fadeOut > 0) {
    ctx.fillStyle = `rgba(0,0,0,${fadeOut})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
  }
}

// ── OUTRO ─────────────────────────────────
function drawOutro(f) {
  const cx = cv.width / 2, cy = cv.height / 2;
  const pulse = 1 + Math.sin(f * 0.1) * 0.05;
  const scale = spring(f, 0, { stiffness: 60, damping: 12 }) * 5.5 * pulse;
  ctx.save();
  ctx.translate(cx, cy - pxY(240));
  ctx.scale(scale, scale);
  drawRaptor(0, 0, px(1), '#ce1141');
  ctx.restore();

  const titleOp = interp(f, 20, 60, { toVal: 1 });
  ctx.save();
  ctx.globalAlpha = titleOp;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${px(96)}px -apple-system, sans-serif`;
  ctx.fillText('WE THE NORTH', cx, cy + pxY(40));
  ctx.font = `900 ${px(32)}px -apple-system, sans-serif`;
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`${RECORDS.length} RECORDS · 1 FRANCHISE · 1 TITLE`, cx, cy + pxY(120));
  ctx.font = `500 ${px(28)}px "SF Mono", monospace`;
  ctx.fillStyle = '#ff375f';
  ctx.fillText('· follow for more ·', cx, cy + pxY(220));
  ctx.font = `500 ${px(22)}px "SF Mono", monospace`;
  ctx.fillStyle = '#7a7a80';
  ctx.fillText('media.taskiap.com', cx, cy + pxY(280));
  ctx.restore();

  // Confetti
  for (let i = 0; i < 100; i++) {
    const seed = i * 137;
    const startY = -pxY(20);
    const speed = 3 + (i % 5);
    const y = startY + f * speed * pxY(2);
    const x = (seed % 100) / 100 * cv.width + Math.sin(f * 0.05 + i) * px(30);
    const rot2 = f * 0.1 + i;
    ctx.save();
    ctx.translate(x, y % cv.height);
    ctx.rotate(rot2);
    ctx.fillStyle = ['#ce1141','#ffcc00','#ff375f','#0a84ff','#30d158','#bf5af2','#ff9500'][i % 7];
    ctx.fillRect(-px(6), -pxY(10), px(12), pxY(20));
    ctx.restore();
  }
}

// ── UI ────────────────────────────────────
function fmtTime(f) {
  const s = Math.floor(f / FPS);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function updateUI() {
  document.getElementById('tc').textContent = fmtTime(currentFrame);
  const p = (currentFrame / TOTAL) * 100;
  document.getElementById('fill').style.width = `${p}%`;
  document.getElementById('head').style.left = `${p}%`;
  const scene = getScene(currentFrame);
  document.querySelectorAll('.chap').forEach(c => c.classList.toggle('active', c.dataset.id === scene.id));
}
const chaptersEl = document.getElementById('chapters');
SCENES.forEach(s => {
  const el = document.createElement('div');
  el.className = 'chap';
  el.dataset.id = s.id;
  el.textContent = s.name.length > 6 ? s.name.slice(0, 6) : s.name;
  el.title = s.record ? s.record.headline : s.name;
  el.onclick = () => { currentFrame = s.from; render(currentFrame); updateUI(); if (playing) speakScene(s); };
  chaptersEl.appendChild(el);
});
document.querySelector('.timecode').innerHTML = `<b id="tc">0:00</b> / ${fmtTime(TOTAL)}`;

function speakScene(scene) {
  if (!voiceEnabled) return;
  if (lastSpokenScene === scene.id) return;
  lastSpokenScene = scene.id;
  speak(scene.voice);
}
function loop(t) {
  if (!lastTime) lastTime = t;
  const dt = t - lastTime;
  lastTime = t;
  if (playing) {
    currentFrame += (dt / 1000) * FPS;
    if (currentFrame >= TOTAL) {
      currentFrame = TOTAL;
      playing = false;
      document.getElementById('playpause').textContent = '▶ Play';
      stopSpeech();
      lastSpokenScene = null;
    } else {
      const scene = getScene(currentFrame);
      const localFrame = currentFrame - scene.from;
      if (localFrame < 30 && lastSpokenScene !== scene.id) speakScene(scene);
    }
  }
  render(currentFrame);
  updateUI();
  requestAnimationFrame(loop);
}
document.getElementById('playpause').onclick = () => {
  playing = !playing;
  document.getElementById('playpause').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (currentFrame >= TOTAL) currentFrame = 0;
  if (!playing) stopSpeech();
  if (playing) { lastSpokenScene = null; speakScene(getScene(currentFrame)); }
};
document.getElementById('restart').onclick = () => {
  currentFrame = 0; playing = false; lastSpokenScene = null;
  document.getElementById('playpause').textContent = '▶ Play';
  stopSpeech();
};
document.getElementById('voice').onclick = function() {
  voiceEnabled = !voiceEnabled;
  this.classList.toggle('on', voiceEnabled);
  this.textContent = voiceEnabled ? '🎙 Voice' : '🔇 Muted';
  if (!voiceEnabled) stopSpeech();
};
document.getElementById('tiktok').onclick = function() {
  PORTRAIT = !PORTRAIT;
  this.classList.toggle('on', PORTRAIT);
  this.textContent = PORTRAIT ? '📱 9:16' : '🖥 16:9';
  resizeCanvas(); render(currentFrame);
};
let dragging = false;
const scrubEl = document.getElementById('scrub');
function scrubAt(clientX) {
  const rect = scrubEl.getBoundingClientRect();
  const p = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  currentFrame = p * TOTAL;
  lastSpokenScene = null;
  stopSpeech();
}
scrubEl.addEventListener('pointerdown', e => { dragging = true; playing = false; document.getElementById('playpause').textContent = '▶ Play'; scrubAt(e.clientX); scrubEl.setPointerCapture(e.pointerId); });
scrubEl.addEventListener('pointermove', e => { if (dragging) scrubAt(e.clientX); });
scrubEl.addEventListener('pointerup', e => { dragging = false; });
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('playpause').click(); }
  if (e.code === 'ArrowLeft') { currentFrame = Math.max(0, currentFrame - FPS * 5); lastSpokenScene = null; stopSpeech(); }
  if (e.code === 'ArrowRight') { currentFrame = Math.min(TOTAL, currentFrame + FPS * 5); lastSpokenScene = null; stopSpeech(); }
  if (e.key === 'r' || e.key === 'R') document.getElementById('restart').click();
  if (e.key === 'v' || e.key === 'V') document.getElementById('voice').click();
  if (e.key === 't' || e.key === 'T') document.getElementById('tiktok').click();
});
// ── Export system ──────────────────────────
const modal = document.getElementById('export-modal');
const status = document.getElementById('export-status');
const recordBtn = document.getElementById('record');
recordBtn.onclick = () => {
  modal.style.display = 'flex';
  status.textContent = 'Choose an export format below.';
  // Detect availability
  const hasVE = typeof VideoEncoder !== 'undefined';
  document.getElementById('exp-mp4-fast').disabled = !hasVE;
  document.getElementById('exp-mp4-fast').style.opacity = hasVE ? 1 : 0.4;
  document.getElementById('exp-mp4-fast').title = hasVE ? '' : 'WebCodecs not supported in this browser';
};
document.getElementById('exp-cancel').onclick = () => { modal.style.display = 'none'; };

function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}
function fname(ext) { return `raptors-records${PORTRAIT ? '-tiktok' : ''}-${Date.now()}.${ext}`; }

// MP4 via WebCodecs — FAST offline path
async function exportMP4() {
  if (typeof VideoEncoder === 'undefined') { status.textContent = 'WebCodecs not supported.'; return; }
  playing = false; stopSpeech();
  const chunks = [];
  // H.264 requires EVEN dimensions
  const width = Math.floor(cv.width / 2) * 2;
  const height = Math.floor(cv.height / 2) * 2;
  const temp = document.createElement('canvas');
  temp.width = width; temp.height = height;
  const tctx = temp.getContext('2d', { alpha: false });
  const encoder = new VideoEncoder({
    output: chunk => { const buf = new Uint8Array(chunk.byteLength); chunk.copyTo(buf); chunks.push(buf); },
    error: err => { status.textContent = 'Encoder error: ' + err.message; }
  });
  // Probe codecs from highest capability down — 1080p 60fps needs Level 4.2+
  const candidates = ['avc1.640034','avc1.640033','avc1.64002A','avc1.640028','avc1.42E02A','avc1.42E028','avc1.42E01F'];
  let codec = null;
  for (const c of candidates) {
    try { const s = await VideoEncoder.isConfigSupported({ codec: c, width, height, bitrate: 8_000_000, framerate: FPS }); if (s.supported) { codec = c; break; } } catch(_){}
  }
  if (!codec) { status.textContent = 'No H.264 codec supports ' + width + '×' + height + '@' + FPS + '. Try WebM.'; return; }
  try {
    encoder.configure({ codec, width, height, bitrate: 8_000_000, framerate: FPS });
  } catch (err) {
    status.textContent = 'MP4 config failed: ' + err.message + '. Try WebM.';
    return;
  }
  const totalFrames = Math.floor(TOTAL);
  const t0 = performance.now();
  status.textContent = 'Encoding MP4… 0%';
  for (let f = 0; f < totalFrames; f++) {
    currentFrame = f;
    render(f);
    tctx.drawImage(cv, 0, 0, width, height);
    // Snapshot pixels via ImageBitmap — VideoFrame(canvas) can hold a ref not a copy
    const bitmap = await createImageBitmap(temp);
    const vf = new VideoFrame(bitmap, { timestamp: (f * 1e6) / FPS, duration: 1e6 / FPS });
    encoder.encode(vf, { keyFrame: f % 60 === 0 });
    vf.close();
    bitmap.close();
    // Backpressure only when encoder queue is full
    if (encoder.encodeQueueSize > 20) {
      await new Promise(r => setTimeout(r, 1));
    }
    // Progress + yield every 64 frames
    if ((f & 63) === 0) {
      const p = f / totalFrames;
      const el = performance.now() - t0;
      const eta = p > 0.02 ? Math.round((el / p) * (1 - p) / 1000) : Math.round(totalFrames * 0.005);
      status.textContent = `Encoding MP4… ${Math.round(p*100)}% · ETA ${eta}s`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  status.textContent = 'Flushing encoder…';
  await encoder.flush();
  encoder.close();
  status.textContent = 'Packaging…';
  // Package with a minimal MP4 muxer — simple approach: use MediaSource-compatible container via mp4-muxer polyfill inline
  // For simplicity, use the built-in encoder output stitched into a raw H.264 file (Annex B format works with many editors)
  const totalLen = chunks.reduce((s, c) => s + c.byteLength, 0);
  const combined = new Uint8Array(totalLen);
  let off = 0;
  for (const c of chunks) { combined.set(c, off); off += c.byteLength; }
  // This produces a raw H.264 stream (.h264) — not a container. To get MP4, we need a muxer.
  // Fallback: save as .h264 stream which can be remuxed with ffmpeg -i in.h264 -c copy out.mp4
  const blob = new Blob([combined], { type: 'video/mp4' });
  download(blob, fname('h264'));
  status.textContent = '✓ H.264 stream saved. Use ffmpeg -i FILE.h264 -c copy OUT.mp4 to remux to MP4.';
  setTimeout(() => modal.style.display = 'none', 3000);
}

// WebM fast — MediaRecorder + captureStream + requestFrame (no timeouts)
async function exportWebMFast() {
  playing = false; stopSpeech();
  status.textContent = 'Rendering WebM offline… 0%';
  const stream = cv.captureStream(0);
  const track = stream.getVideoTracks()[0];
  if (typeof track.requestFrame !== 'function') { status.textContent = 'Fast render not supported. Use Live capture instead.'; return; }
  let mime = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 10_000_000 });
  const parts = [];
  rec.ondataavailable = e => { if (e.data.size > 0) parts.push(e.data); };
  const done = new Promise(res => { rec.onstop = res; });
  rec.start();
  const totalFrames = Math.floor(TOTAL);
  const t0 = performance.now();
  for (let f = 0; f < totalFrames; f++) {
    currentFrame = f;
    render(f);
    track.requestFrame();
    // Only yield to event loop every 30 frames — no per-frame timeout
    if ((f & 31) === 0) {
      const p = f / totalFrames;
      const el = performance.now() - t0;
      const eta = p > 0.02 ? Math.round((el / p) * (1 - p) / 1000) : Math.round(totalFrames * 0.01);
      status.textContent = `Rendering WebM… ${Math.round(p*100)}% · ETA ${eta}s`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  rec.stop();
  await done;
  const blob = new Blob(parts, { type: 'video/webm' });
  download(blob, fname('webm'));
  status.textContent = '✓ WebM saved!';
  setTimeout(() => modal.style.display = 'none', 1500);
}

// Live WebM (real-time playback)
async function exportWebMLive() {
  status.textContent = `Recording in real time (${fmtTime(TOTAL)})…`;
  const stream = cv.captureStream(60);
  let mime = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 10_000_000 });
  const parts = [];
  rec.ondataavailable = e => { if (e.data.size > 0) parts.push(e.data); };
  const done = new Promise(res => { rec.onstop = res; });
  rec.start();
  currentFrame = 0;
  lastSpokenScene = null;
  playing = true;
  document.getElementById('playpause').textContent = '⏸ Pause';
  await new Promise(res => {
    const check = setInterval(() => {
      const el = currentFrame;
      status.textContent = `Recording live… ${fmtTime(el)} / ${fmtTime(TOTAL)}`;
      if (el >= TOTAL) { clearInterval(check); res(); }
    }, 200);
  });
  rec.stop();
  await done;
  const blob = new Blob(parts, { type: 'video/webm' });
  download(blob, fname('webm'));
  status.textContent = '✓ WebM saved!';
  setTimeout(() => modal.style.display = 'none', 1500);
}

// PNG frame sequence (in a zip)
async function exportFrames() {
  status.textContent = 'Rendering frames… 0%';
  const frames = [];
  // Take every 5th frame (12 fps) to keep it manageable
  const step = 5;
  const totalOut = Math.floor(TOTAL / step);
  playing = false; stopSpeech();
  for (let i = 0; i < totalOut; i++) {
    currentFrame = i * step;
    render(currentFrame);
    const blob = await new Promise(r => cv.toBlob(r, 'image/png'));
    frames.push({ name: `frame-${String(i).padStart(4,'0')}.png`, blob });
    if (i % 10 === 0) {
      status.textContent = `Rendering frames… ${Math.round((i/totalOut)*100)}%`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  // Build a simple uncompressed ZIP (STORE method)
  status.textContent = 'Packaging ZIP…';
  const zip = await makeZip(frames);
  download(zip, fname('zip'));
  status.textContent = `✓ ${totalOut} frames saved (12 fps).`;
  setTimeout(() => modal.style.display = 'none', 2000);
}

// Minimal ZIP writer (STORE method, no compression) — good enough for image sequences
async function makeZip(files) {
  const encoder = new TextEncoder();
  const chunks = [];
  const central = [];
  let offset = 0;
  function crc32(buf) {
    let crc = -1;
    for (let i = 0; i < buf.length; i++) {
      crc = (crc >>> 8) ^ CRC_TABLE[(crc ^ buf[i]) & 0xff];
    }
    return (crc ^ -1) >>> 0;
  }
  for (const f of files) {
    const buf = new Uint8Array(await f.blob.arrayBuffer());
    const nameBuf = encoder.encode(f.name);
    const crc = crc32(buf);
    // Local file header
    const lfh = new Uint8Array(30 + nameBuf.length);
    const dv = new DataView(lfh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true); dv.setUint16(6, 0, true); dv.setUint16(8, 0, true);
    dv.setUint16(10, 0, true); dv.setUint16(12, 0, true);
    dv.setUint32(14, crc, true);
    dv.setUint32(18, buf.length, true); dv.setUint32(22, buf.length, true);
    dv.setUint16(26, nameBuf.length, true); dv.setUint16(28, 0, true);
    lfh.set(nameBuf, 30);
    chunks.push(lfh); chunks.push(buf);
    // Central directory record
    const cdr = new Uint8Array(46 + nameBuf.length);
    const dv2 = new DataView(cdr.buffer);
    dv2.setUint32(0, 0x02014b50, true);
    dv2.setUint16(4, 20, true); dv2.setUint16(6, 20, true);
    dv2.setUint16(8, 0, true); dv2.setUint16(10, 0, true);
    dv2.setUint16(12, 0, true); dv2.setUint16(14, 0, true);
    dv2.setUint32(16, crc, true);
    dv2.setUint32(20, buf.length, true); dv2.setUint32(24, buf.length, true);
    dv2.setUint16(28, nameBuf.length, true); dv2.setUint16(30, 0, true);
    dv2.setUint16(32, 0, true); dv2.setUint16(34, 0, true);
    dv2.setUint16(36, 0, true); dv2.setUint32(38, 0, true);
    dv2.setUint32(42, offset, true);
    cdr.set(nameBuf, 46);
    central.push(cdr);
    offset += lfh.length + buf.length;
  }
  const cdSize = central.reduce((s, c) => s + c.length, 0);
  const cdOffset = offset;
  central.forEach(c => chunks.push(c));
  // End of central directory
  const eocd = new Uint8Array(22);
  const dv3 = new DataView(eocd.buffer);
  dv3.setUint32(0, 0x06054b50, true);
  dv3.setUint16(4, 0, true); dv3.setUint16(6, 0, true);
  dv3.setUint16(8, files.length, true); dv3.setUint16(10, files.length, true);
  dv3.setUint32(12, cdSize, true); dv3.setUint32(16, cdOffset, true);
  dv3.setUint16(20, 0, true);
  chunks.push(eocd);
  return new Blob(chunks, { type: 'application/zip' });
}
// CRC-32 table
const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();

document.getElementById('exp-mp4-fast').onclick = exportMP4;
document.getElementById('exp-webm-fast').onclick = exportWebMFast;
document.getElementById('exp-webm-live').onclick = exportWebMLive;
document.getElementById('exp-frames').onclick = exportFrames;
resizeCanvas();
render(0);
updateUI();
requestAnimationFrame(() => { resizeCanvas(); render(currentFrame); });
setTimeout(() => { resizeCanvas(); render(currentFrame); }, 200);
requestAnimationFrame(loop);
})();
</script>
