<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050510">
<title>ACE-X · Atomic Constraint Engine Experiments</title>
<style>
:root{
  --bg:#050510; --panel:#0d0d1a; --panel2:#141428; --border:#22223a; --border2:#3a3a55;
  --text:#f0f0f8; --dim:#7a7a90; --faint:#4a4a5c;
  --atom:#bf5af2; --atom2:#8b3fd4; --gold:#ffcc00; --red:#ff375f; --green:#30d158;
  --cyan:#5aa0ff; --orange:#ff9500;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;color:var(--text);font-family:var(--sans);overflow:hidden;overscroll-behavior:none}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

.top{
  flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;background:var(--panel);border-bottom:1px solid var(--border)
}
.brand{font-family:var(--mono);font-size:13px;letter-spacing:.16em;font-weight:700}
.brand .x{background:linear-gradient(135deg,var(--atom),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand a{color:var(--dim);text-decoration:none;font-weight:400;letter-spacing:0;margin-right:8px}
.top .r{display:flex;gap:8px;align-items:center}
.btn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;border-radius:6px;cursor:pointer
}
.btn:hover{border-color:var(--border2)}
.btn:active{transform:scale(.96)}
.btn.primary{background:linear-gradient(135deg,var(--atom),var(--red));border:none;color:#fff;font-weight:600}

.stage-wrap{
  flex:1;background:#000;display:flex;align-items:center;justify-content:center;
  padding:12px;position:relative;overflow:hidden
}
.stage-inner{position:relative;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#cv{display:block;width:100%;height:100%}

.subs{
  position:absolute;left:16px;right:16px;bottom:16px;
  background:rgba(0,0,0,.85);border-radius:10px;padding:10px 14px;
  color:#fff;font-family:var(--sans);font-size:15px;line-height:1.5;
  max-width:min(90%,600px);margin:0 auto;pointer-events:auto;text-align:center;
  border:1px solid rgba(255,255,255,.08);display:none
}
.subs.show{display:block}

.transport{
  flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;gap:10px
}
.trbtn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  width:36px;height:34px;border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center
}
.trbtn:active{transform:scale(.94)}
.trbtn.play{background:linear-gradient(135deg,var(--atom),var(--red));border:none;width:46px;color:#fff}
.tc{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:110px}
.tc b{color:var(--text)}
.scrub{flex:1;height:6px;background:var(--panel2);border-radius:3px;position:relative;cursor:pointer}
.scrub-fill{position:absolute;top:0;bottom:0;left:0;background:linear-gradient(90deg,var(--atom),var(--red));border-radius:3px}
.aspect-toggle{display:flex;gap:1px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:1px}
.aspect-toggle button{background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:10px;padding:4px 8px;border-radius:3px;cursor:pointer}
.aspect-toggle button.active{background:var(--atom);color:#fff}

.modal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(10px);z-index:100;align-items:center;justify-content:center
}
.modal.show{display:flex}
.modal-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;max-width:440px;width:92%}
.modal-title{font-size:18px;font-weight:600;margin-bottom:10px}
.modal-sub{color:var(--dim);font-family:var(--mono);font-size:11px;margin-bottom:16px;min-height:16px}
.modal-btns{display:flex;flex-direction:column;gap:6px}
.modal-btns .btn{padding:12px 14px;font-size:11px;text-align:left}
.modal-close{margin-top:12px;display:flex;justify-content:flex-end}
</style>
</head>
<body>

<div class="top">
  <div class="brand"><a href="/media/">←</a> <span>ACE</span><span class="x">-X</span></div>
  <div class="r">
    <button class="btn" id="subs-btn" title="Toggle subtitles">💬 Subs</button>
    <button class="btn" id="voice-btn" title="Toggle voiceover">🔊 Voice</button>
    <button class="btn primary" id="export-btn">⚡ Export</button>
  </div>
</div>

<div class="stage-wrap">
  <div class="stage-inner" id="stage-inner">
    <canvas id="cv"></canvas>
    <div class="subs" id="subs"></div>
  </div>
</div>

<div class="transport">
  <button class="trbtn" id="tr-start">⏮</button>
  <button class="trbtn play" id="tr-play">▶</button>
  <button class="trbtn" id="tr-end">⏭</button>
  <div class="tc"><b id="tc-cur">0:00</b> / <span id="tc-end">0:00</span></div>
  <div class="scrub" id="scrub"><div class="scrub-fill" id="scrub-fill"></div></div>
  <div class="aspect-toggle" id="aspect-toggle">
    <button data-ar="9:16" class="active">9:16</button>
    <button data-ar="16:9">16:9</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <div class="modal-title">Export ACE-X</div>
    <div class="modal-sub" id="modal-status">Choose a format.</div>
    <div class="modal-btns">
      <button class="btn primary" id="exp-mp4">⚡ MP4 · WebCodecs offline (H.264 stream)</button>
      <button class="btn" id="exp-webm">🎥 WebM · MediaRecorder capture</button>
    </div>
    <div class="modal-close"><button class="btn" id="exp-cancel">Close</button></div>
  </div>
</div>

<script>
(() => {
'use strict';

// ═══════════════════════════════════════════════════════════════════
// ACE-X · Atomic Constraint Engine Experiments · Remotion-pattern
// Every frame is pure(frame) → pixels. The math is real ACE.
// ═══════════════════════════════════════════════════════════════════

const FPS = 30;
const SCENES = [
  { id: 'intro',   name: 'Intro',           from:    0, dur: 240,  voice: "A C E dash X. Atomic Constraint Engine. Experiments in visual construction. Everything you're about to see is real math running at thirty frames a second, one primitive at a time." },
  { id: 'atom',    name: 'The Atom',        from:  240, dur: 360,  voice: "The atom. One primitive. An I D. A name. A type. A completion kind. Tags. Two link lists. Requires. Contains. That's it. Everything else is a view." },
  { id: 'contains',name: 'Contains',        from:  600, dur: 540,  voice: "Contains. The vertical link. Project contains areas. Areas contain work packages. Work packages contain tasks. One parent per atom. The tree carries rollup math." },
  { id: 'requires',name: 'Requires',        from: 1140, dur: 660,  voice: "Requires. The horizontal link. Rebar requires design approval. Formwork requires rebar. Concrete requires formwork. Cure requires pour. No cycles. Ever." },
  { id: 'settle',  name: 'Settle',          from: 1800, dur: 720,  voice: "Settle. Watch. Completion propagates. An atom is done when everything it requires is done, and everything it contains is done. One loop. Nothing reverses. This runs live, on every frame, deterministically." },
  { id: 'cpm',     name: 'Critical path',   from: 2520, dur: 720,  voice: "Critical path. The longest chain from start to finish. Atoms with zero float. Slip one, slip the project. The graph tells you which ones to protect." },
  { id: 'mc',      name: 'Monte Carlo',     from: 3240, dur: 900,  voice: "Monte Carlo. One thousand runs. Each run samples durations, walks the graph, records a finish date. The histogram tells you the truth. P fifty. P eighty. P ninety. Bet on the numbers, not the plan." },
  { id: 'outro',   name: 'Outro',           from: 4140, dur: 360,  voice: "One primitive. Three links. One settle. That is the whole engine. Everything else is a view. A C E dash X. Powered by pure math." },
];
const TOTAL = SCENES.reduce((s, x) => s + x.dur, 0);

let state = {
  aspect: '9:16', frame: 0, playing: false, playLast: 0,
  subsOn: true, voiceOn: false, spokenScene: -1
};

const RATIOS = { '9:16': [1080, 1920], '16:9': [1920, 1080] };
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d', { alpha: false });
function W() { return RATIOS[state.aspect][0]; }
function H() { return RATIOS[state.aspect][1]; }

function sizeStage() {
  const wrap = document.querySelector('.stage-wrap');
  const inner = document.getElementById('stage-inner');
  const [pw, ph] = RATIOS[state.aspect];
  const availW = wrap.clientWidth - 24, availH = wrap.clientHeight - 24;
  const r = pw / ph;
  let dw, dh;
  if (availW / availH > r) { dh = availH; dw = dh * r; }
  else { dw = availW; dh = dw / r; }
  inner.style.width = dw + 'px'; inner.style.height = dh + 'px';
  cv.width = pw; cv.height = ph;
}
window.addEventListener('resize', () => { sizeStage(); render(state.frame); });

// ═══ MATH HELPERS (Remotion-style) ═══════════════════════════════
const clamp = (x, lo=0, hi=1) => Math.max(lo, Math.min(hi, x));
const easeOutCubic = t => 1 - Math.pow(1-t, 3);
const easeInOutCubic = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
function spring(frame, from = 0, config = {}) {
  const { mass=1, damping=10, stiffness=100, delay=0 } = config;
  const f = Math.max(0, frame - from - delay);
  if (f <= 0) return 0;
  const t = f / FPS;
  const w0 = Math.sqrt(stiffness/mass);
  const z = damping / (2 * Math.sqrt(stiffness*mass));
  if (z < 1) {
    const wd = w0 * Math.sqrt(1 - z*z);
    return 1 - Math.exp(-z*w0*t) * (Math.cos(wd*t) + (z*w0/wd)*Math.sin(wd*t));
  }
  return 1 - Math.exp(-w0*t) * (1 + w0*t);
}
function interp(f, from, to, opts = {}) {
  const { fromVal=0, toVal=1, ease=easeInOutCubic } = opts;
  if (f <= from) return fromVal;
  if (f >= to) return toVal;
  return fromVal + (toVal - fromVal) * ease((f - from) / (to - from));
}
function currentScene(frame) {
  for (const s of SCENES) if (frame >= s.from && frame < s.from + s.dur) return s;
  return SCENES[SCENES.length - 1];
}
function localFrame(frame) {
  const s = currentScene(frame);
  return { s, f: frame - s.from };
}

// ═══ DETERMINISTIC RANDOM (Mulberry32 by seed) ═══════════════════
function rng(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════════════════════════
// ACE CORE (compact, deterministic — the real engine)
// ═══════════════════════════════════════════════════════════════════
function createAce() {
  const atoms = new Map();
  function add(spec) {
    const a = {
      id: spec.id, name: spec.name || spec.id, type: spec.type || 'atom',
      kind: spec.kind || 'derived', tags: spec.tags || [],
      requires: [], contains: [], parent: null,
      duration: spec.duration || [1, 1, 1], // [min, likely, max] days
      manualDone: false, // for kind:manual
    };
    atoms.set(a.id, a);
    return a;
  }
  function link(fromId, rel, toId) {
    const a = atoms.get(fromId), b = atoms.get(toId);
    if (!a || !b) return;
    if (rel === 'requires') { a.requires.push(toId); }
    else if (rel === 'contains') { a.contains.push(toId); b.parent = fromId; }
  }
  function isComplete(id, cache) {
    if (cache.has(id)) return cache.get(id);
    const a = atoms.get(id);
    cache.set(id, false); // guard against cycles
    let done;
    if (a.kind === 'manual') done = a.manualDone;
    else {
      done = a.requires.every(r => isComplete(r, cache))
          && a.contains.every(c => isComplete(c, cache));
    }
    cache.set(id, done);
    return done;
  }
  function settle() {
    const cache = new Map();
    const result = new Map();
    for (const id of atoms.keys()) result.set(id, isComplete(id, cache));
    return result;
  }
  function cpm(startIds, endId, durations) {
    // Longest path from any startId to endId. durations: id → number
    const memo = new Map();
    function finishTime(id) {
      if (memo.has(id)) return memo.get(id);
      const a = atoms.get(id);
      const preReqs = a.requires;
      let start = 0;
      for (const r of preReqs) start = Math.max(start, finishTime(r));
      const f = start + (durations.get(id) || 0);
      memo.set(id, f);
      return f;
    }
    const endTime = finishTime(endId);
    // Backtrack: an atom is on critical path if its finish == endTime -
    // Walk backward marking atoms whose finish + slack = 0.
    // Simpler: find chain by following requires that produce max finishTime.
    const path = new Set();
    function trace(id) {
      path.add(id);
      const a = atoms.get(id);
      if (a.requires.length === 0) return;
      let best = a.requires[0], bestT = -1;
      for (const r of a.requires) { const t = finishTime(r); if (t > bestT) { bestT = t; best = r; } }
      trace(best);
    }
    trace(endId);
    return { endTime, path, finishTime: memo };
  }
  function monteCarlo(startIds, endId, N, seed = 42) {
    const rand = rng(seed);
    const finishes = [];
    for (let run = 0; run < N; run++) {
      const durs = new Map();
      for (const [id, a] of atoms) {
        const [mn, ml, mx] = a.duration;
        // Triangular distribution sample
        const u = rand();
        const F = (ml - mn) / (mx - mn);
        durs.set(id, u < F
          ? mn + Math.sqrt(u * (mx - mn) * (ml - mn))
          : mx - Math.sqrt((1 - u) * (mx - mn) * (mx - ml)));
      }
      // Compute CPM for this run
      const memo = new Map();
      function ft(id) {
        if (memo.has(id)) return memo.get(id);
        const a = atoms.get(id);
        let s = 0; for (const r of a.requires) s = Math.max(s, ft(r));
        const f = s + durs.get(id);
        memo.set(id, f);
        return f;
      }
      finishes.push(ft(endId));
    }
    finishes.sort((a, b) => a - b);
    return finishes;
  }
  return { add, link, atoms, settle, cpm, monteCarlo };
}

// ═══ CANONICAL PROJECT (used across scenes) ═════════════════════
// Nuclear-refurb-style construction project. IDs match the visual layout.
const PROJECT = (() => {
  const p = createAce();
  // Root
  p.add({ id: 'PROJ', name: 'Unit 4 refurb', type: 'project', kind: 'derived' });
  // Areas (contains children of PROJ)
  p.add({ id: 'MECH', name: 'Mechanical', type: 'area', kind: 'derived' });
  p.add({ id: 'CIVL', name: 'Civil',     type: 'area', kind: 'derived' });
  p.add({ id: 'INST', name: 'I&C',       type: 'area', kind: 'derived' });
  p.link('PROJ', 'contains', 'MECH');
  p.link('PROJ', 'contains', 'CIVL');
  p.link('PROJ', 'contains', 'INST');

  // CIVL work packages
  p.add({ id: 'REBAR', name: 'Rebar cage',    type: 'iwp', kind: 'manual', duration: [3, 5, 9] });
  p.add({ id: 'FORM',  name: 'Formwork',      type: 'iwp', kind: 'manual', duration: [2, 4, 7] });
  p.add({ id: 'POUR',  name: 'Pour concrete', type: 'iwp', kind: 'manual', duration: [1, 2, 4] });
  p.add({ id: 'CURE',  name: '28-day cure',   type: 'iwp', kind: 'manual', duration: [28, 30, 34] });
  p.link('CIVL', 'contains', 'REBAR');
  p.link('CIVL', 'contains', 'FORM');
  p.link('CIVL', 'contains', 'POUR');
  p.link('CIVL', 'contains', 'CURE');
  // Requires chain: REBAR → FORM → POUR → CURE
  p.link('FORM', 'requires', 'REBAR');
  p.link('POUR', 'requires', 'FORM');
  p.link('CURE', 'requires', 'POUR');

  // MECH work packages
  p.add({ id: 'PIPE',  name: 'Pipe install',  type: 'iwp', kind: 'manual', duration: [5, 8, 14] });
  p.add({ id: 'PUMP',  name: 'Pump set',      type: 'iwp', kind: 'manual', duration: [3, 5, 8] });
  p.add({ id: 'HYDR',  name: 'Hydro test',    type: 'iwp', kind: 'manual', duration: [1, 2, 3] });
  p.link('MECH', 'contains', 'PIPE');
  p.link('MECH', 'contains', 'PUMP');
  p.link('MECH', 'contains', 'HYDR');
  p.link('PUMP', 'requires', 'PIPE');
  p.link('HYDR', 'requires', 'PUMP');
  p.link('PIPE', 'requires', 'CURE');   // cross-area dependency

  // INST work packages
  p.add({ id: 'CABL',  name: 'Cable pull',    type: 'iwp', kind: 'manual', duration: [2, 4, 6] });
  p.add({ id: 'PLC',   name: 'PLC config',    type: 'iwp', kind: 'manual', duration: [3, 5, 9] });
  p.add({ id: 'COMM',  name: 'Commissioning', type: 'iwp', kind: 'manual', duration: [4, 7, 12] });
  p.link('INST', 'contains', 'CABL');
  p.link('INST', 'contains', 'PLC');
  p.link('INST', 'contains', 'COMM');
  p.link('PLC',  'requires', 'CABL');
  p.link('COMM', 'requires', 'PLC');
  p.link('COMM', 'requires', 'HYDR');
  return p;
})();

const IWP_IDS = ['REBAR','FORM','POUR','CURE','PIPE','PUMP','HYDR','CABL','PLC','COMM'];

// ═══════════════════════════════════════════════════════════════════
// LAYOUT — positions for each atom in each scene, in normalized space
// ═══════════════════════════════════════════════════════════════════
// All layouts done in a 0..1000 x 0..W virtual space; painters scale to actual canvas.
const LAYOUT = {
  // Scene 3-6 shared graph layout (portrait):
  //          PROJ            (top center)
  //     CIVL  MECH  INST     (row)
  //   ...IWP children in columns...
  graph_9x16: {
    PROJ: { x: 500, y: 260 },
    CIVL: { x: 200, y: 480 },
    MECH: { x: 500, y: 480 },
    INST: { x: 800, y: 480 },
    REBAR:{ x: 120, y: 780 }, FORM:{ x: 200, y: 940 }, POUR:{ x: 280, y:1100 }, CURE:{ x: 360, y:1260 },
    PIPE: { x: 460, y: 780 }, PUMP:{ x: 540, y: 940 }, HYDR:{ x: 620, y:1100 },
    CABL: { x: 720, y: 780 }, PLC: { x: 800, y: 940 }, COMM:{ x: 880, y:1440 },
  },
  graph_16x9: {
    PROJ: { x: 500, y: 100 },
    CIVL: { x: 200, y: 260 }, MECH: { x: 500, y: 260 }, INST: { x: 800, y: 260 },
    REBAR:{ x: 100, y: 460 }, FORM:{ x: 180, y: 620 }, POUR:{ x: 260, y: 780 }, CURE:{ x: 340, y: 900 },
    PIPE: { x: 460, y: 460 }, PUMP:{ x: 540, y: 620 }, HYDR:{ x: 620, y: 780 },
    CABL: { x: 720, y: 460 }, PLC: { x: 800, y: 620 }, COMM:{ x: 880, y: 900 },
  }
};
function pos(id) { return (state.aspect === '9:16' ? LAYOUT.graph_9x16 : LAYOUT.graph_16x9)[id]; }
function nx(x) { return x / 1000 * cv.width; }
function ny(y) { return y / (state.aspect === '9:16' ? 1780 : 1000) * cv.height; }

// ═══════════════════════════════════════════════════════════════════
// SCENE PAINTERS
// ═══════════════════════════════════════════════════════════════════

// Common: dark space background with subtle grid + drifting motes
function drawBg(f) {
  const gr = ctx.createRadialGradient(cv.width/2, cv.height*0.4, 0, cv.width/2, cv.height*0.4, cv.width*0.9);
  gr.addColorStop(0, '#0a0a20'); gr.addColorStop(1, '#020208');
  ctx.fillStyle = gr; ctx.fillRect(0, 0, cv.width, cv.height);
  // Grid
  ctx.strokeStyle = 'rgba(90,90,140,0.05)'; ctx.lineWidth = 1;
  const sp = cv.width / 20;
  for (let x = 0; x < cv.width; x += sp) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, cv.height); ctx.stroke(); }
  for (let y = 0; y < cv.height; y += sp) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cv.width, y); ctx.stroke(); }
  // Motes drift (deterministic)
  const r = rng(1234);
  for (let i = 0; i < 40; i++) {
    const sx = r() * cv.width, sy = r() * cv.height, sz = 0.5 + r() * 1.5;
    const dx = (sx + f * (0.15 + r() * 0.3)) % cv.width;
    const dy = (sy + Math.sin(f * 0.01 + i) * 20) % cv.height;
    ctx.fillStyle = `rgba(180,180,255,${0.05 + r() * 0.15})`;
    ctx.beginPath(); ctx.arc(dx, dy, sz, 0, Math.PI * 2); ctx.fill();
  }
}

// Draw atom as glowing hexagon
function drawAtom(x, y, r, opts = {}) {
  const {
    fill = '#bf5af2', label = '', sublabel = '', glow = 1, done = false,
    critical = false, textColor = '#fff', pulse = 0
  } = opts;
  ctx.save();
  ctx.translate(x, y);
  const pR = r * (1 + Math.sin(pulse) * 0.06);
  // Outer glow
  if (glow > 0) {
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, pR * 2.4);
    const glowColor = critical ? '#ff375f' : (done ? '#ffcc00' : fill);
    const n = parseInt(glowColor.replace('#',''), 16);
    const rr = (n >> 16) & 255, gg = (n >> 8) & 255, bb = n & 255;
    g.addColorStop(0, `rgba(${rr},${gg},${bb},${0.55 * glow})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(-pR * 2.4, -pR * 2.4, pR * 4.8, pR * 4.8);
  }
  // Hex body
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3 - Math.PI / 2;
    const px = Math.cos(a) * pR, py = Math.sin(a) * pR;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  // Fill
  const bg = ctx.createLinearGradient(0, -pR, 0, pR);
  bg.addColorStop(0, done ? '#ffe066' : (critical ? '#ff8199' : fill));
  bg.addColorStop(1, done ? '#c99a00' : (critical ? '#c92050' : shade(fill, -60)));
  ctx.fillStyle = bg; ctx.fill();
  // Border
  ctx.strokeStyle = done ? '#ffcc00' : (critical ? '#ff375f' : 'rgba(255,255,255,0.35)');
  ctx.lineWidth = done || critical ? 3 : 2;
  ctx.stroke();
  // Checkmark if done
  if (done) {
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(-pR * 0.35, 0);
    ctx.lineTo(-pR * 0.1, pR * 0.28); ctx.lineTo(pR * 0.4, -pR * 0.28);
    ctx.stroke();
  }
  // Label below
  if (label) {
    ctx.fillStyle = textColor; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.font = `700 ${r * 0.35}px -apple-system,sans-serif`;
    ctx.fillText(label, 0, pR + 8);
    if (sublabel) {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = `500 ${r * 0.24}px ui-monospace,monospace`;
      ctx.fillText(sublabel, 0, pR + 8 + r * 0.42);
    }
  }
  ctx.restore();
}
function shade(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = clamp(((n >> 16) & 255) + amt, 0, 255);
  const g = clamp(((n >> 8) & 255) + amt, 0, 255);
  const b = clamp((n & 255) + amt, 0, 255);
  return `rgb(${r|0},${g|0},${b|0})`;
}

// Draw a curved connection line
function drawLink(x1, y1, x2, y2, opts = {}) {
  const { color = 'rgba(255,255,255,0.3)', width = 2, dashed = false, kind = 'requires', progress = 1, arrow = true, flow = 0 } = opts;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = width;
  if (dashed) ctx.setLineDash([6, 6]);
  // Curved line
  const dx = x2 - x1, dy = y2 - y1;
  const cxA = x1 + dx * 0.5, cyA = y1 + dy * 0.1;
  const cxB = x1 + dx * 0.5, cyB = y1 + dy * 0.9;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  // Sample the curve so we can respect progress
  const N = 40;
  for (let i = 1; i <= N * progress; i++) {
    const t = i / N;
    const mt = 1 - t;
    const x = mt*mt*mt*x1 + 3*mt*mt*t*cxA + 3*mt*t*t*cxB + t*t*t*x2;
    const y = mt*mt*mt*y1 + 3*mt*mt*t*cyA + 3*mt*t*t*cyB + t*t*t*y2;
    ctx.lineTo(x, y);
  }
  ctx.stroke();
  if (dashed) ctx.setLineDash([]);
  // Flow dot along path
  if (flow > 0 && flow < 1) {
    const t = flow;
    const mt = 1 - t;
    const x = mt*mt*mt*x1 + 3*mt*mt*t*cxA + 3*mt*t*t*cxB + t*t*t*x2;
    const y = mt*mt*mt*y1 + 3*mt*mt*t*cyA + 3*mt*t*t*cyB + t*t*t*y2;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x, y, width * 1.5 + 2, 0, Math.PI * 2); ctx.fill();
  }
  // Arrowhead
  if (arrow && progress > 0.9) {
    const t = 0.94;
    const mt = 1 - t;
    const x = mt*mt*mt*x1 + 3*mt*mt*t*cxA + 3*mt*t*t*cxB + t*t*t*x2;
    const y = mt*mt*mt*y1 + 3*mt*mt*t*cyA + 3*mt*t*t*cyB + t*t*t*y2;
    const t2 = 0.98;
    const mt2 = 1 - t2;
    const x2p = mt2*mt2*mt2*x1 + 3*mt2*mt2*t2*cxA + 3*mt2*t2*t2*cxB + t2*t2*t2*x2;
    const y2p = mt2*mt2*mt2*y1 + 3*mt2*mt2*t2*cyA + 3*mt2*t2*t2*cyB + t2*t2*t2*y2;
    const ang = Math.atan2(y2p - y, x2p - x);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x2p, y2p);
    ctx.lineTo(x2p - Math.cos(ang - 0.4) * 14, y2p - Math.sin(ang - 0.4) * 14);
    ctx.lineTo(x2p - Math.cos(ang + 0.4) * 14, y2p - Math.sin(ang + 0.4) * 14);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ═══ SCENE 1: INTRO ═══
function drawIntro(f) {
  drawBg(f);
  const P = state.aspect === '9:16' ? { cx: cv.width/2, cy: cv.height*0.42 } : { cx: cv.width/2, cy: cv.height*0.45 };
  // 12 atoms swirling toward center, then coalescing into title
  const N = 12;
  const swirl = clamp(f / 90, 0, 1);
  const gather = clamp((f - 60) / 100, 0, 1);
  const revealTitle = clamp((f - 120) / 40, 0, 1);
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2 + f * 0.03;
    const r0 = cv.width * 0.5 * (1 - swirl);
    const r1 = cv.width * (state.aspect === '9:16' ? 0.22 : 0.15) * (1 - gather * 0.5);
    const r = r0 + (r1 - r0) * swirl;
    const x = P.cx + Math.cos(a) * r;
    const y = P.cy + Math.sin(a) * r;
    const glow = 1 - gather * 0.7;
    drawAtom(x, y, cv.width * 0.028, {
      fill: '#bf5af2', glow: glow, pulse: f * 0.1 + i
    });
  }
  // Title
  const tScale = spring(f, 110, { stiffness: 120, damping: 12 });
  const tOpacity = interp(f, 110, 150);
  ctx.save();
  ctx.globalAlpha = tOpacity;
  ctx.translate(P.cx, P.cy);
  ctx.scale(tScale, tScale);
  const g = ctx.createLinearGradient(-300, 0, 300, 0);
  g.addColorStop(0, '#bf5af2'); g.addColorStop(1, '#ff375f');
  ctx.fillStyle = g;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `900 ${cv.width * 0.16}px -apple-system,sans-serif`;
  ctx.fillText('ACE', 0, 0);
  ctx.font = `900 ${cv.width * 0.07}px -apple-system,sans-serif`;
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('— X', cv.width * 0.18, 0);
  ctx.restore();
  // Subtitle
  const subFade = interp(f, 150, 200);
  ctx.globalAlpha = subFade;
  ctx.fillStyle = '#a0a0c0';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `500 ${cv.width * 0.03}px ui-monospace,monospace`;
  ctx.fillText('ATOMIC CONSTRAINT ENGINE · EXPERIMENTS', P.cx, P.cy + cv.width * 0.13);
  ctx.font = `400 ${cv.width * 0.022}px ui-monospace,monospace`;
  ctx.fillStyle = '#7a7a90';
  ctx.fillText('Every frame · pure(frame) → pixels', P.cx, P.cy + cv.width * 0.17);
  ctx.globalAlpha = 1;
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function drawContains(f) {
  drawBg(f);
  ctx.save();

  ctx.font = `600 ${cv.width * 0.024}px ui-monospace,monospace`;

  ctx.font = `800 ${cv.width * 0.055}px -apple-system,sans-serif`;
  ctx.fillText('Parent → children.', cv.width/2, cv.height * 0.08);
  ctx.restore();

  // Progressive reveal by tier:
  //   0-40:  PROJ
  //   40-100: MECH, CIVL, INST
  //   100-200: all IWPs
  const tierIn = [
    spring(f, 20, { stiffness: 90, damping: 14 }),   // PROJ
    spring(f, 60, { stiffness: 100, damping: 14 }),  // AREAS
    spring(f, 130, { stiffness: 90, damping: 15 }),  // IWPs
  ];
  const linkProgress = clamp((f - 200) / 220, 0, 1);
  const AREAS = ['MECH','CIVL','INST'];
  const IWPS = { CIVL:['REBAR','FORM','POUR','CURE'], MECH:['PIPE','PUMP','HYDR'], INST:['CABL','PLC','COMM'] };

  // Draw containment links first (behind atoms)
  ctx.save();
  for (const a of AREAS) {
    const p = pos('PROJ'), c = pos(a);
    if (tierIn[1] > 0) {
      const prg = clamp((f - 60) / 60, 0, 1) * tierIn[1];
      drawLink(nx(p.x), ny(p.y), nx(c.x), ny(c.y), { color: 'rgba(90,160,255,0.4)', width: 3, progress: prg, arrow: false });
    }
    for (const iwp of (IWPS[a] || [])) {
      if (tierIn[2] > 0) {
        const prg = clamp((f - 140) / 80, 0, 1) * tierIn[2];
        drawLink(nx(c.x), ny(c.y), nx(pos(iwp).x), ny(pos(iwp).y), { color: 'rgba(90,160,255,0.35)', width: 2, progress: prg, arrow: false });
      }
    }
  }
  ctx.restore();

  // Draw atoms
  const R = cv.width * 0.045;
  drawAtom(nx(pos('PROJ').x), ny(pos('PROJ').y), R * 1.4 * tierIn[0], { fill: '#ffcc00', label: 'PROJECT', sublabel: PROJECT.atoms.get('PROJ').name });
  for (const a of AREAS) {
    if (tierIn[1] <= 0) continue;
    const atom = PROJECT.atoms.get(a);
    drawAtom(nx(pos(a).x), ny(pos(a).y), R * 1.1 * tierIn[1], { fill: '#5aa0ff', label: atom.name });
  }
  for (const [area, iwps] of Object.entries(IWPS)) {
    for (const iwp of iwps) {
      if (tierIn[2] <= 0) continue;
      const atom = PROJECT.atoms.get(iwp);
      drawAtom(nx(pos(iwp).x), ny(pos(iwp).y), R * 0.75 * tierIn[2], { fill: '#bf5af2', label: atom.name });
    }
  }

  // Legend
  const legY = cv.height * (state.aspect === '9:16' ? 0.94 : 0.92);
  const legIn = interp(f, 260, 300);
  ctx.save(); ctx.globalAlpha = legIn;
  ctx.fillStyle = '#5aa0ff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `600 ${cv.width * 0.026}px ui-monospace,monospace`;
  ctx.fillText('1 PROJECT · 3 AREAS · 10 WORK PACKAGES', cv.width/2, legY);
  ctx.restore();
}

// ═══ SCENE 4: REQUIRES GRAPH ═══
function drawRequires(f) {

    }

  for (const [area, iwps] of Object.entries(IWPS)) for (const iwp of iwps)

// ═══ SCENE 5: SETTLE ═══
// Show completion propagating. We manually complete atoms in an order,
// then run settle() live and light up derived atoms as they complete.
function drawSettle(f) {
  drawBg(f);
  ctx.save();
  ctx.fillStyle = '#8a8aa0'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = `600 ${cv.width * 0.024}px ui-monospace,monospace`;
  ctx.fillText('04 · SETTLE · least fixed point', cv.width/2, cv.height * 0.04);
  ctx.fillStyle = '#30d158';
  ctx.font = `800 ${cv.width * 0.055}px -apple-system,sans-serif`;
  ctx.fillText('Completion propagates.', cv.width/2, cv.height * 0.08);
  ctx.restore();

  const AREAS = ['MECH','CIVL','INST'];
  const IWPS_FLAT = ['REBAR','FORM','POUR','CURE','PIPE','PUMP','HYDR','CABL','PLC','COMM'];
  const R = cv.width * 0.045;

  // Reset all manualDone
  for (const iwp of IWPS_FLAT) PROJECT.atoms.get(iwp).manualDone = false;

  // Completion order (respects requires)
  const completeAt = [
    { id: 'REBAR', at: 40 }, { id: 'FORM', at: 90 }, { id: 'POUR', at: 140 }, { id: 'CURE', at: 200 },
    { id: 'PIPE', at: 260 }, { id: 'PUMP', at: 310 }, { id: 'HYDR', at: 360 },
    { id: 'CABL', at: 410 }, { id: 'PLC', at: 460 }, { id: 'COMM', at: 520 },
  ];
  for (const c of completeAt) if (f >= c.at) PROJECT.atoms.get(c.id).manualDone = true;

  const settled = PROJECT.settle();
  // Fade in the graph
  const graphIn = spring(f, 0, { stiffness: 90, damping: 14 });

  // Draw links (dimmed contains + full requires)
  ctx.globalAlpha = 0.3 * graphIn;
  for (const a of AREAS) {
    drawLink(nx(pos('PROJ').x), ny(pos('PROJ').y), nx(pos(a).x), ny(pos(a).y), { color: '#5aa0ff', width: 2, arrow: false });
  }
  const IWPS = { CIVL:['REBAR','FORM','POUR','CURE'], MECH:['PIPE','PUMP','HYDR'], INST:['CABL','PLC','COMM'] };
  for (const [area, iwps] of Object.entries(IWPS)) for (const iwp of iwps) {
    drawLink(nx(pos(area).x), ny(pos(area).y), nx(pos(iwp).x), ny(pos(iwp).y), { color: '#5aa0ff', width: 1.5, arrow: false });
  }
  ctx.globalAlpha = graphIn;
  for (const [id, a] of PROJECT.atoms) for (const r of a.requires) {
    const done = settled.get(r);
    drawLink(nx(pos(r).x), ny(pos(r).y), nx(pos(id).x), ny(pos(id).y), {
      color: done ? 'rgba(48,209,88,0.7)' : 'rgba(255,55,95,0.5)',
      width: 2.5, progress: 1, arrow: true
    });
  }
  ctx.globalAlpha = 1;

  // Draw atoms with completion status
  drawAtom(nx(pos('PROJ').x), ny(pos('PROJ').y), R * 1.4, {
    fill: '#ffcc00', label: 'PROJECT', done: settled.get('PROJ'), pulse: f * 0.08
  });
  for (const a of AREAS) drawAtom(nx(pos(a).x), ny(pos(a).y), R * 1.1, {
    fill: '#5aa0ff', label: PROJECT.atoms.get(a).name, done: settled.get(a), pulse: f * 0.08 + a.charCodeAt(0)
  });
  for (const iwp of IWPS_FLAT) drawAtom(nx(pos(iwp).x), ny(pos(iwp).y), R * 0.75, {
    fill: '#bf5af2', label: PROJECT.atoms.get(iwp).name, done: settled.get(iwp), pulse: f * 0.08 + iwp.charCodeAt(0)
  });

  // Stats bar at bottom
  const completed = Array.from(settled.values()).filter(Boolean).length;
  const total = settled.size;
  const pct = completed / total;
  const barY = cv.height * (state.aspect === '9:16' ? 0.9 : 0.87);
  const barW = cv.width * 0.7;
  const barX = (cv.width - barW) / 2;
  ctx.save();
  ctx.fillStyle = 'rgba(30,30,50,0.8)';
  roundRect(ctx, barX, barY, barW, cv.width * 0.024, cv.width * 0.012); ctx.fill();
  const g = ctx.createLinearGradient(barX, 0, barX + barW * pct, 0);
  g.addColorStop(0, '#30d158'); g.addColorStop(1, '#ffcc00');
  ctx.fillStyle = g;
  roundRect(ctx, barX, barY, barW * pct, cv.width * 0.024, cv.width * 0.012); ctx.fill();
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = `700 ${cv.width * 0.028}px ui-monospace,monospace`;
  ctx.fillText(`${completed} / ${total} settled · ${(pct*100).toFixed(0)}%`, cv.width/2, barY + cv.width * 0.055);
  ctx.restore();
}

  ctx.fillText('05 · CRITICAL PATH', cv.width/2, cv.height * 0.04);
  ctx.fillStyle = '#ff375f';
  ctx.font = `800 ${cv.width * 0.055}px -apple-system,sans-serif`;
  ctx.fillText('Slip one. Slip everything.', cv.width/2, cv.height * 0.08);
  ctx.restore();

  // Run CPM using likely durations
  const durs = new Map();
  for (const [id, a] of PROJECT.atoms) durs.set(id, a.duration ? a.duration[1] : 0);
  const cpmResult = PROJECT.cpm(['REBAR','PIPE','CABL'], 'COMM', durs);
  const AREAS = ['MECH','CIVL','INST'];
  const IWPS_FLAT = ['REBAR','FORM','POUR','CURE','PIPE','PUMP','HYDR','CABL','PLC','COMM'];
  const IWPS = { CIVL:['REBAR','FORM','POUR','CURE'], MECH:['PIPE','PUMP','HYDR'], INST:['CABL','PLC','COMM'] };
  const R = cv.width * 0.045;

  // Dimmed base graph
  ctx.globalAlpha = 0.35;
  for (const a of AREAS) drawLink(nx(pos('PROJ').x), ny(pos('PROJ').y), nx(pos(a).x), ny(pos(a).y), { color: '#5aa0ff', width: 1.5, arrow: false });
  for (const [area, iwps] of Object.entries(IWPS)) for (const iwp of iwps)
    drawLink(nx(pos(area).x), ny(pos(area).y), nx(pos(iwp).x), ny(pos(iwp).y), { color: '#5aa0ff', width: 1.2, arrow: false });
  for (const [id, a] of PROJECT.atoms) for (const r of a.requires) {
    drawLink(nx(pos(r).x), ny(pos(r).y), nx(pos(id).x), ny(pos(id).y), { color: 'rgba(255,255,255,0.25)', width: 2, arrow: true });
  }
  ctx.globalAlpha = 1;

  // Reveal critical path progressively
  const criticalPath = Array.from(cpmResult.path);
  const revealPct = clamp((f - 60) / 360, 0, 1);
  const nReveal = Math.floor(criticalPath.length * revealPct);
  const critSet = new Set(criticalPath.slice(0, nReveal + 1));

  // Draw critical links with pulse
  for (let i = criticalPath.length - 1; i > 0; i--) {
    if (i > nReveal) continue;
    const from = criticalPath[i], to = criticalPath[i - 1];
    // Check if this is a `requires` from `to` → from
    const a = PROJECT.atoms.get(to);
    if (!a || !a.requires.includes(from)) continue;
    const pulse = 0.7 + Math.sin(f * 0.15 + i) * 0.3;
    drawLink(nx(pos(from).x), ny(pos(from).y), nx(pos(to).x), ny(pos(to).y), {
      color: `rgba(255,55,95,${pulse})`, width: 5, arrow: true
    });
  }

  // Draw all atoms (highlight critical)
  drawAtom(nx(pos('PROJ').x), ny(pos('PROJ').y), R * 1.4, {
    fill: '#ffcc00', label: 'PROJECT', critical: critSet.has('PROJ'), pulse: f * 0.1
  });
  for (const a of AREAS) drawAtom(nx(pos(a).x), ny(pos(a).y), R * 1.05, {
    fill: '#5aa0ff', label: PROJECT.atoms.get(a).name
  });
  for (const iwp of IWPS_FLAT) drawAtom(nx(pos(iwp).x), ny(pos(iwp).y), R * 0.72, {
    fill: '#bf5af2', label: PROJECT.atoms.get(iwp).name,
    critical: critSet.has(iwp), pulse: critSet.has(iwp) ? f * 0.15 : 0,
    sublabel: (durs.get(iwp)||0) + 'd'
  });

  // Total path duration readout
  const readIn = interp(f, 340, 400);
  ctx.save(); ctx.globalAlpha = readIn;
  const bY = cv.height * (state.aspect === '9:16' ? 0.9 : 0.88);
  ctx.fillStyle = '#ff375f';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `900 ${cv.width * 0.08}px -apple-system,sans-serif`;
  ctx.fillText(Math.round(cpmResult.endTime) + ' DAYS', cv.width/2, bY);
  ctx.fillStyle = '#8a8aa0';
  ctx.font = `500 ${cv.width * 0.022}px ui-monospace,monospace`;
  ctx.fillText('LONGEST CHAIN · ZERO FLOAT', cv.width/2, bY + cv.width * 0.05);
  ctx.restore();
}

// ═══ SCENE 7: MONTE CARLO ═══
// Run 1000 sims progressively, build histogram, mark P50/P80.
let mcCache = null;
function ensureMC() {
  if (!mcCache) mcCache = PROJECT.monteCarlo(['REBAR','PIPE','CABL'], 'COMM', 1000, 42);
  return mcCache;
}
function drawMC(f) {
  drawBg(f);
  ctx.save();
  ctx.fillStyle = '#8a8aa0'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.font = `600 ${cv.width * 0.024}px ui-monospace,monospace`;
  ctx.fillText('06 · MONTE CARLO · 1000 runs', cv.width/2, cv.height * 0.04);
  ctx.fillStyle = '#ffcc00';
  ctx.font = `800 ${cv.width * 0.055}px -apple-system,sans-serif`;
  ctx.fillText('Bet on the numbers.', cv.width/2, cv.height * 0.08);
  ctx.restore();

  const all = ensureMC();
  const runsShown = Math.min(all.length, Math.floor(clamp((f - 40) / 260, 0, 1) * 1000));
  const shown = all.slice(0, runsShown);

  // Histogram area
  const chartX = cv.width * 0.08;
  const chartY = cv.height * 0.2;
  const chartW = cv.width * 0.84;
  const chartH = cv.height * (state.aspect === '9:16' ? 0.4 : 0.55);

  // Bin the data
  if (shown.length > 0) {
    const min = Math.min(...all), max = Math.max(...all);
    const nBins = 40;
    const bins = new Array(nBins).fill(0);
    for (const v of shown) {
      const b = Math.min(nBins - 1, Math.floor((v - min) / (max - min) * nBins));
      bins[b]++;
    }
    const maxCount = Math.max(...bins);
    const bw = chartW / nBins;
    // Draw bars
    for (let i = 0; i < nBins; i++) {
      const h = (bins[i] / maxCount) * chartH;
      const x = chartX + i * bw;
      const y = chartY + chartH - h;
      const t = i / nBins;
      const g = ctx.createLinearGradient(0, y, 0, y + h);
      g.addColorStop(0, `hsl(${280 - t * 60},80%,60%)`);
      g.addColorStop(1, `hsl(${280 - t * 60},80%,30%)`);
      ctx.fillStyle = g;
      ctx.fillRect(x + 1, y, bw - 2, h);
    }

    // Percentile lines
    const p50 = shown[Math.floor(shown.length * 0.5)];
    const p80 = shown[Math.floor(shown.length * 0.8)];
    const p90 = shown[Math.floor(shown.length * 0.9)];
    function xOf(v) { return chartX + ((v - min) / (max - min)) * chartW; }
    const percs = [
      { v: p50, label: 'P50', color: '#30d158' },
      { v: p80, label: 'P80', color: '#ffcc00' },
      { v: p90, label: 'P90', color: '#ff375f' },
    ];
    for (const p of percs) {
      const x = xOf(p.v);
      ctx.strokeStyle = p.color; ctx.lineWidth = 2.5;
      ctx.setLineDash([10, 5]);
      ctx.beginPath(); ctx.moveTo(x, chartY); ctx.lineTo(x, chartY + chartH); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = p.color;
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.font = `700 ${cv.width * 0.022}px ui-monospace,monospace`;
      ctx.fillText(`${p.label} · ${p.v.toFixed(0)}d`, x, chartY - 4);
    }
    // Chart X-axis
    ctx.fillStyle = '#8a8aa0'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = `500 ${cv.width * 0.02}px ui-monospace,monospace`;
    ctx.fillText(min.toFixed(0) + 'd', chartX, chartY + chartH + 6);
    ctx.textAlign = 'right';
    ctx.fillText(max.toFixed(0) + 'd', chartX + chartW, chartY + chartH + 6);
  }

  // Run counter
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const cY = chartY + chartH + cv.width * 0.08;
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${cv.width * 0.06}px -apple-system,sans-serif`;
  ctx.fillText(runsShown + ' / 1000', cv.width/2, cY);
  ctx.fillStyle = '#8a8aa0';
  ctx.font = `500 ${cv.width * 0.022}px ui-monospace,monospace`;
  ctx.fillText('SIMULATIONS · TRIANGULAR SAMPLING · SEED 42', cv.width/2, cY + cv.width * 0.05);

  // Live particle "runs" flying across the graph area
  const flyIn = clamp((f - 60) / 20, 0, 1) * (1 - clamp((f - 600) / 100, 0, 1));
  if (flyIn > 0) {
    const nParticles = 30;
    const r = rng(999);
    for (let i = 0; i < nParticles; i++) {
      const seed = r() * 100 + i;
      const t = ((f + seed * 3) * 0.02) % 1;
      const x = chartX + t * chartW;
      const y = chartY + chartH - 20 - (Math.sin(t * Math.PI) * chartH * 0.3);
      ctx.globalAlpha = flyIn * 0.35;
      ctx.fillStyle = `hsl(${280 - t*60},80%,70%)`;
      ctx.beginPath(); ctx.arc(x, y, 2 + Math.sin(f * 0.1 + i) * 1, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ═══ SCENE 8: OUTRO ═══
function drawOutro(f) {
  drawBg(f);
  const P = { cx: cv.width/2, cy: cv.height * 0.4 };
  const N = 12;
  const scatter = clamp(f / 60, 0, 1);
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2;
    const r = cv.width * 0.22 * scatter;
    const x = P.cx + Math.cos(a) * r;
    const y = P.cy + Math.sin(a) * r;
    drawAtom(x, y, cv.width * 0.028, { fill: '#bf5af2', pulse: f * 0.1 + i });
  }
  // Verdict
  ctx.save();
  const line1 = interp(f, 60, 100);
  ctx.globalAlpha = line1;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.font = `800 ${cv.width * 0.09}px -apple-system,sans-serif`;
  ctx.fillText('One primitive.', cv.width/2, cv.height * 0.55);
  const line2 = interp(f, 100, 140);
  ctx.globalAlpha = line2;
  ctx.fillText('Three links.', cv.width/2, cv.height * 0.63);
  const line3 = interp(f, 140, 180);
  ctx.globalAlpha = line3;
  const gr = ctx.createLinearGradient(0, 0, cv.width, 0);
  gr.addColorStop(0, '#bf5af2'); gr.addColorStop(1, '#ff375f');
  ctx.fillStyle = gr;
  ctx.fillText('One settle.', cv.width/2, cv.height * 0.71);
  ctx.restore();

  const url = interp(f, 220, 260);
  ctx.globalAlpha = url;
  ctx.fillStyle = '#8a8aa0'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `600 ${cv.width * 0.025}px ui-monospace,monospace`;
  ctx.fillText('ACE-X · media.taskiap.com', cv.width/2, cv.height * 0.85);
  ctx.globalAlpha = 1;
}

// ═══ MASTER RENDER ══════════════════════════════════════════════
function render(frame) {
  const { s, f } = localFrame(frame);
  switch (s.id) {
    case 'intro':    drawIntro(f); break;
    case 'atom':     drawAtomScene(f); break;
    case 'contains': drawContains(f); break;
    case 'requires': drawRequires(f); break;
    case 'settle':   drawSettle(f); break;
    case 'cpm':      drawCPM(f); break;
    case 'mc':       drawMC(f); break;
    case 'outro':    drawOutro(f); break;
  }
  // Subtitles
  if (state.subsOn) {
    const subs = document.getElementById('subs');
    subs.textContent = s.voice;
    subs.classList.add('show');
  } else {
    document.getElementById('subs').classList.remove('show');
  }
  // TC
  document.getElementById('tc-cur').textContent = fmtTime(frame / FPS);
  document.getElementById('tc-end').textContent = fmtTime(TOTAL / FPS);
  document.getElementById('scrub-fill').style.width = ((frame / TOTAL) * 100) + '%';
}
function fmtTime(s) {
  const m = Math.floor(s / 60); const ss = Math.floor(s - m * 60);
  return `${m}:${String(ss).padStart(2,'0')}`;
}

// ═══ PLAYBACK ═════════════════════════════════════════════════════
function playLoop(now) {
  if (!state.playing) return;
  const dt = (now - state.playLast) / 1000;
  state.playLast = now;
  state.frame += dt * FPS;
  if (state.frame >= TOTAL) { state.frame = TOTAL - 1; state.playing = false; document.getElementById('tr-play').textContent = '▶'; if (state.voiceOn) window.speechSynthesis?.cancel(); }
  // Voice per scene
  if (state.voiceOn) {
    const s = currentScene(Math.floor(state.frame));
    const sIdx = SCENES.indexOf(s);
    if (sIdx !== state.spokenScene) {
      state.spokenScene = sIdx;
      window.speechSynthesis?.cancel();
      const u = new SpeechSynthesisUtterance(s.voice);
      u.rate = 1.05;
      window.speechSynthesis?.speak(u);
    }
  }
  render(Math.floor(state.frame));
  if (state.playing) requestAnimationFrame(playLoop);
}
document.getElementById('tr-play').addEventListener('click', () => {
  state.playing = !state.playing;
  document.getElementById('tr-play').textContent = state.playing ? '⏸' : '▶';
  if (state.playing) {
    if (state.frame >= TOTAL - 1) state.frame = 0;
    state.playLast = performance.now();
    state.spokenScene = -1;
    requestAnimationFrame(playLoop);
  } else {
    if (state.voiceOn) window.speechSynthesis?.cancel();
  }
});
document.getElementById('tr-start').addEventListener('click', () => { state.frame = 0; render(0); });
document.getElementById('tr-end').addEventListener('click', () => { state.frame = TOTAL - 1; render(TOTAL - 1); });
document.getElementById('scrub').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  state.frame = Math.floor(pct * TOTAL);
  render(state.frame);
});
document.getElementById('subs-btn').addEventListener('click', () => {
  state.subsOn = !state.subsOn;
  render(Math.floor(state.frame));
});
document.getElementById('voice-btn').addEventListener('click', () => {
  state.voiceOn = !state.voiceOn;
  if (!state.voiceOn) window.speechSynthesis?.cancel();
});
document.querySelectorAll('.aspect-toggle button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.aspect-toggle button').forEach(x => x.classList.toggle('active', x === b));
    state.aspect = b.dataset.ar;
    sizeStage(); render(Math.floor(state.frame));
  });
});

// ═══ EXPORT ═══════════════════════════════════════════════════════
document.getElementById('export-btn').addEventListener('click', () => {
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal-status').textContent = 'Choose a format.';
});
document.getElementById('exp-cancel').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('show');
});
async function renderOffline(onFrame, onProgress) {
  const wasPlaying = state.playing; state.playing = false;
  for (let i = 0; i < TOTAL; i++) {
    state.frame = i; render(i);
    await onFrame(i);
    if ((i & 15) === 0) { onProgress(i / TOTAL); await new Promise(r => setTimeout(r, 0)); }
  }
  onProgress(1);
  if (wasPlaying) { state.playing = true; state.playLast = performance.now(); requestAnimationFrame(playLoop); }
}
document.getElementById('exp-mp4').addEventListener('click', async () => {
  if (typeof VideoEncoder === 'undefined') {
    document.getElementById('modal-status').textContent = 'WebCodecs not available. Try Chrome.';
    return;
  }
  const status = document.getElementById('modal-status');
  status.textContent = 'Encoding MP4… 0%';
  const chunks = [];
  const width = Math.floor(cv.width / 2) * 2, height = Math.floor(cv.height / 2) * 2;
  const temp = document.createElement('canvas');
  temp.width = width; temp.height = height;
  const tctx = temp.getContext('2d', { alpha: false });
  const encoder = new VideoEncoder({
    output: chunk => { const buf = new Uint8Array(chunk.byteLength); chunk.copyTo(buf); chunks.push(buf); },
    error: e => { status.textContent = 'Encoder error: ' + e.message; }
  });
  const candidates = ['avc1.640034','avc1.640033','avc1.64002A','avc1.640028','avc1.42E02A','avc1.42E028','avc1.42E01F'];
  let codec = null;
  for (const c of candidates) {
    try { const s = await VideoEncoder.isConfigSupported({ codec: c, width, height, bitrate: 8_000_000, framerate: FPS }); if (s.supported) { codec = c; break; } } catch(_){}
  }
  if (!codec) { status.textContent = 'No H.264 codec supports this size.'; return; }
  encoder.configure({ codec, width, height, bitrate: 8_000_000, framerate: FPS });
  const t0 = performance.now();
  await renderOffline(async f => {
    tctx.drawImage(cv, 0, 0, width, height);
    const bitmap = await createImageBitmap(temp);
    const vf = new VideoFrame(bitmap, { timestamp: (f * 1e6) / FPS, duration: 1e6 / FPS });
    encoder.encode(vf, { keyFrame: f % 60 === 0 });
    vf.close(); bitmap.close();
    if (encoder.encodeQueueSize > 20) await new Promise(r => setTimeout(r, 1));
  }, p => {
    const pct = Math.round(p * 100);
    const el = performance.now() - t0;
    const eta = p > 0 ? Math.round((el / p) * (1 - p) / 1000) : 0;
    status.textContent = `Encoding MP4… ${pct}%  ·  ETA ${eta}s`;
  });
  await encoder.flush(); encoder.close();
  const total = chunks.reduce((s,c) => s + c.byteLength, 0);
  const out = new Uint8Array(total); let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.byteLength; }
  const blob = new Blob([out], { type: 'video/mp4' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `ace-x-${Date.now()}.h264`; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
  status.textContent = '✓ H.264 saved. Remux: ffmpeg -i file.h264 -c copy out.mp4';
});
document.getElementById('exp-webm').addEventListener('click', async () => {
  const status = document.getElementById('modal-status');
  const stream = cv.captureStream(0);
  const track = stream.getVideoTracks()[0];
  if (typeof track.requestFrame !== 'function') { status.textContent = 'Offline capture unsupported here.'; return; }
  let mime = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm;codecs=vp8';
  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 10_000_000 });
  const parts = [];
  rec.ondataavailable = e => { if (e.data.size > 0) parts.push(e.data); };
  const done = new Promise(res => { rec.onstop = res; });
  rec.start();
  const t0 = performance.now();
  await renderOffline(async () => { track.requestFrame(); }, p => {
    const pct = Math.round(p * 100);
    const el = performance.now() - t0;
    const eta = p > 0 ? Math.round((el / p) * (1 - p) / 1000) : 0;
    status.textContent = `Rendering WebM… ${pct}%  ·  ETA ${eta}s`;
  });
  rec.stop(); await done;
  const blob = new Blob(parts, { type: 'video/webm' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `ace-x-${Date.now()}.webm`; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
  status.textContent = '✓ WebM saved!';
});

// ═══ INIT ═════════════════════════════════════════════════════════
sizeStage();
render(0);

})();
</script>
