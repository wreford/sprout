<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#fbf5ff">
<meta name="description" content="Lily's Cats — a very pretty little gallery of cats from around the internet.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Lily's Cats">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600;1,9..144,900&family=Newsreader:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%23fbf5ff'/%3E%3Ctext x='16' y='24' text-anchor='middle' font-size='22'%3E🌸%3C/text%3E%3C/svg%3E">
<title>Lily's Cats</title>
<style>
:root{
  --cream:#fbf5ff;
  --paper:#f4e8ff;
  --paper-2:#ecdcf9;
  --ink:#2b1a3d;
  --ink-2:#4a325c;
  --dim:#8b6ea3;
  --dimmer:#b598cf;
  --lily:#a878d4;
  --lily-dark:#7b4dab;
  --blush:#ffb7c5;
  --blush-dark:#e88ea3;
  --gold:#d4a556;
  --leaf:#a3c4a8;
  --line:rgba(120,60,180,.14);
  --line-2:rgba(120,60,180,.28);
  --disp:'Fraunces',Georgia,serif;
  --serif:'Newsreader',Georgia,serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --squish:cubic-bezier(.34,1.56,.64,1);
  --pad-x:max(20px,env(safe-area-inset-left));
  --pad-x-r:max(20px,env(safe-area-inset-right));
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%;overflow-x:hidden}
html,body{
  background:var(--cream);color:var(--ink);
  font-family:var(--serif);
  overscroll-behavior:none;overflow-x:hidden;
  min-height:100vh;min-height:100dvh;
  -webkit-font-smoothing:antialiased
}
body{
  background:
    radial-gradient(60% 40% at 10% 0%, rgba(255,183,197,.32), transparent 60%),
    radial-gradient(50% 40% at 100% 20%, rgba(168,120,212,.24), transparent 65%),
    radial-gradient(60% 50% at 50% 100%, rgba(212,165,86,.14), transparent 62%),
    var(--cream);
  background-attachment:fixed;
  position:relative
}
button,a,input,select{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input{font-size:16px;font-family:inherit}
::selection{background:rgba(168,120,212,.28);color:var(--ink)}

/* Header — a proper title page */
.hero{
  padding:calc(env(safe-area-inset-top) + 44px) var(--pad-x-r) 24px var(--pad-x);
  text-align:center;position:relative;
  max-width:820px;margin:0 auto
}
.hero .flourish{
  font-family:var(--disp);font-style:italic;font-weight:400;font-size:14px;
  letter-spacing:.28em;text-transform:uppercase;
  color:var(--lily);margin-bottom:10px;
  display:inline-flex;align-items:center;gap:14px
}
.hero .flourish::before,.hero .flourish::after{
  content:"";height:1px;width:36px;background:linear-gradient(90deg,transparent,var(--lily));border-radius:1px
}
.hero .flourish::after{background:linear-gradient(90deg,var(--lily),transparent)}
.hero h1{
  font-family:var(--disp);font-weight:900;font-style:italic;
  font-size:clamp(48px,12vw,86px);line-height:.92;letter-spacing:-.04em;
  color:var(--ink);margin-bottom:14px;
  text-shadow:0 2px 0 rgba(120,60,180,.06)
}
.hero h1 .amp{color:var(--blush-dark);font-weight:400;font-style:italic;padding:0 .04em}
.hero .sub{
  font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.5;
  color:var(--ink-2);max-width:36ch;margin:0 auto 22px
}
.hero .petals{
  position:absolute;pointer-events:none;font-size:22px;opacity:.9;
  filter:drop-shadow(0 4px 6px rgba(120,60,180,.14));
  animation:sway 8s ease-in-out infinite alternate
}
.hero .p1{top:16%;left:6%;font-size:26px;transform:rotate(-16deg);animation-delay:0s}
.hero .p2{top:38%;right:6%;font-size:22px;transform:rotate(12deg);animation-delay:-2s}
.hero .p3{top:66%;left:12%;font-size:18px;transform:rotate(24deg);animation-delay:-4s}
.hero .p4{top:70%;right:12%;font-size:20px;transform:rotate(-18deg);animation-delay:-6s}
@keyframes sway{
  0%,100%{transform:translate3d(0,0,0) rotate(0deg)}
  50%{transform:translate3d(4px,-8px,0) rotate(6deg)}
}

/* Controls · pretty pill row */
.controls{
  max-width:820px;margin:0 auto;
  padding:0 var(--pad-x-r) 22px var(--pad-x);
  display:flex;gap:8px;flex-wrap:wrap;align-items:center
}
.search{
  flex:1;min-width:220px;
  position:relative;
  background:#fff;border:1px solid var(--line);border-radius:100px;
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;
  box-shadow:0 6px 22px rgba(120,60,180,.08),inset 0 1px 0 rgba(255,255,255,.9)
}
.search::before{
  content:"⌕";font-family:var(--serif);font-size:16px;color:var(--lily);
  transform:scaleX(-1);opacity:.7
}
.search input{
  flex:1;background:transparent;border:none;outline:none;color:var(--ink);
  font-family:var(--serif);font-style:italic;font-size:16px
}
.search input::placeholder{color:var(--dimmer)}
.pill{
  padding:10px 16px;border-radius:100px;
  background:linear-gradient(180deg,#fff,var(--paper));
  border:1px solid var(--line);color:var(--ink);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
  text-transform:uppercase;font-weight:700;
  min-height:44px;cursor:pointer;
  transition:all .18s var(--squish);
  box-shadow:0 4px 12px rgba(120,60,180,.08),inset 0 1px 0 rgba(255,255,255,.9);
  display:inline-flex;align-items:center;gap:8px
}
.pill:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(120,60,180,.16)}
.pill:active{transform:translateY(0) scale(.97)}
.pill.primary{
  background:linear-gradient(180deg,var(--blush),var(--blush-dark));
  border-color:transparent;color:#fff;
  box-shadow:0 6px 18px rgba(232,142,163,.4),inset 0 1px 0 rgba(255,255,255,.45)
}
.pill.primary:hover{filter:brightness(1.04)}
.pill.on{background:linear-gradient(180deg,var(--lily),var(--lily-dark));color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(120,60,180,.34),inset 0 1px 0 rgba(255,255,255,.35)}
.pill .num{padding:2px 8px;background:rgba(255,255,255,.28);border-radius:100px;font-size:9.5px}
.pill.on .num,.pill.primary .num{background:rgba(255,255,255,.28)}

/* Masonry grid */
.gallery{
  max-width:820px;margin:0 auto;
  padding:0 var(--pad-x-r) calc(env(safe-area-inset-bottom) + 40px) var(--pad-x);
  columns:2;column-gap:10px
}
@media(min-width:640px){.gallery{columns:3;column-gap:14px}}
@media(min-width:900px){.gallery{columns:3;column-gap:18px}}
.tile{
  break-inside:avoid;margin:0 0 10px;
  position:relative;border-radius:22px;overflow:hidden;
  background:linear-gradient(160deg,var(--paper),var(--paper-2));
  box-shadow:
    0 12px 28px rgba(120,60,180,.14),
    0 3px 6px rgba(120,60,180,.08),
    0 0 0 1px rgba(255,255,255,.5) inset;
  cursor:pointer;transition:transform .22s var(--squish),box-shadow .22s var(--ease);
  animation:tile-in .5s var(--ease) both
}
@keyframes tile-in{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.tile:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(120,60,180,.22),0 0 0 1px rgba(255,255,255,.6) inset}
.tile img{display:block;width:100%;height:auto;object-fit:cover;background:var(--paper)}
.tile .breed{
  position:absolute;left:10px;right:56px;bottom:10px;
  padding:6px 12px;border-radius:100px;
  background:rgba(255,255,255,.86);color:var(--ink);
  font-family:var(--disp);font-style:italic;font-weight:600;font-size:13px;
  letter-spacing:-.005em;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 2px 6px rgba(120,60,180,.14);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  transform:translateY(4px);opacity:0;transition:all .18s var(--ease)
}
.tile:hover .breed{transform:none;opacity:1}
.tile .heart{
  position:absolute;right:10px;bottom:10px;z-index:2;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.9);
  color:var(--dimmer);font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  backdrop-filter:blur(8px);
  box-shadow:0 3px 10px rgba(120,60,180,.2);
  transition:transform .22s var(--squish),color .16s,background .16s
}
.tile .heart:hover{transform:scale(1.1);color:var(--blush-dark)}
.tile .heart.on{background:linear-gradient(135deg,var(--blush),var(--blush-dark));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(232,142,163,.5)}
.tile .heart.on::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--blush);opacity:0;animation:heart-ping .55s var(--squish) forwards}
@keyframes heart-ping{0%{transform:scale(.8);opacity:.7}100%{transform:scale(1.6);opacity:0}}

/* Skeleton shimmer */
.tile.skel{aspect-ratio:1/1;pointer-events:none}
.tile.skel::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 25%,rgba(255,255,255,.5) 50%,transparent 75%);
  background-size:200% 100%;animation:skel 1.6s linear infinite
}
@keyframes skel{from{background-position:120% 0}to{background-position:-20% 0}}

/* Loading + load-more + status */
.status{max-width:820px;margin:0 auto;padding:12px var(--pad-x-r) 12px var(--pad-x);text-align:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--dim);text-transform:uppercase;font-weight:600}
.load-more{
  display:block;margin:14px auto 0;
  padding:14px 26px;border-radius:100px;
  background:linear-gradient(180deg,var(--lily),var(--lily-dark));color:#fff;
  font-family:var(--disp);font-style:italic;font-weight:600;font-size:16px;
  min-height:52px;cursor:pointer;
  border:none;
  box-shadow:0 10px 26px rgba(120,60,180,.36),inset 0 1px 0 rgba(255,255,255,.4);
  transition:transform .16s var(--squish),filter .12s
}
.load-more:hover{transform:translateY(-2px);filter:brightness(1.04)}
.load-more:disabled{opacity:.5;pointer-events:none}

/* Modal — full-screen cat portrait */
.modal{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:center;justify-content:center;
  padding:24px var(--pad-x-r) 24px var(--pad-x);
  background:rgba(43,26,61,.72);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)
}
.modal.show{display:flex;animation:mf .3s var(--ease)}
@keyframes mf{from{opacity:0}to{opacity:1}}
.mcard{
  position:relative;width:100%;max-width:520px;max-height:calc(100dvh - 48px);
  background:var(--cream);border-radius:26px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 40px 80px rgba(43,26,61,.55),inset 0 1px 0 rgba(255,255,255,.9);
  animation:mcard-in .35s var(--squish) both
}
@keyframes mcard-in{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:none}}
.mcard .mimg{
  width:100%;background:var(--paper);position:relative;
  aspect-ratio:1/1;overflow:hidden;flex-shrink:0
}
.mcard .mimg img{width:100%;height:100%;object-fit:cover;display:block}
.mcard .close{
  position:absolute;top:12px;right:12px;z-index:5;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.94);color:var(--ink);border:none;
  font-size:20px;line-height:1;cursor:pointer;
  box-shadow:0 4px 14px rgba(43,26,61,.3);
  display:flex;align-items:center;justify-content:center;
  transition:transform .16s var(--squish)
}
.mcard .close:hover{transform:scale(1.1)}
.mbody{padding:22px 24px calc(env(safe-area-inset-bottom) + 22px);overflow-y:auto}
.mbody .name{font-family:var(--disp);font-style:italic;font-weight:900;font-size:32px;line-height:1;letter-spacing:-.02em;color:var(--ink);margin-bottom:4px}
.mbody .origin{font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--lily);text-transform:uppercase;font-weight:700;margin-bottom:14px}
.mbody .desc{font-family:var(--serif);font-size:15.5px;line-height:1.55;color:var(--ink-2);margin-bottom:18px}
.mbody .traits{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.mbody .trait{
  padding:10px 12px;border-radius:14px;
  background:linear-gradient(180deg,#fff,var(--paper));
  border:1px solid var(--line);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9)
}
.mbody .trait .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;font-weight:700}
.mbody .trait .v{font-family:var(--disp);font-weight:600;font-size:14px;color:var(--ink);margin-top:2px}
.mbody .stars{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:16px}
.mbody .stars .stat{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.mbody .stars .dots{display:inline-flex;gap:3px}
.mbody .stars .dots span{width:8px;height:8px;border-radius:50%;background:var(--paper-2);border:1px solid var(--line)}
.mbody .stars .dots span.on{background:linear-gradient(135deg,var(--lily),var(--blush));border-color:transparent;box-shadow:0 0 6px rgba(168,120,212,.6)}
.mbody .actions{display:flex;gap:8px;flex-wrap:wrap}
.mbody .actions .pill{flex:1;justify-content:center}

/* Favourites drawer */
.fav-bg{position:fixed;inset:0;z-index:180;background:rgba(43,26,61,.5);backdrop-filter:blur(4px);display:none;opacity:0;transition:opacity .2s var(--ease)}
.fav-bg.show{display:block;opacity:1}
.fav-drawer{
  position:fixed;top:0;bottom:0;right:0;width:min(420px,92vw);z-index:190;
  background:var(--cream);
  transform:translateX(100%);transition:transform .32s var(--ease);
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-right:env(safe-area-inset-right);
  box-shadow:-20px 0 60px rgba(43,26,61,.35)
}
.fav-drawer.show{transform:none}
.fav-drawer .dh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.fav-drawer .dh h3{font-family:var(--disp);font-style:italic;font-weight:900;font-size:22px;color:var(--ink);letter-spacing:-.01em}
.fav-drawer .dh .close{width:32px;height:32px;border-radius:50%;background:var(--paper);color:var(--ink);font-size:16px}
.fav-drawer .fbody{flex:1;overflow-y:auto;padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start}
.fav-drawer .fitem{position:relative;aspect-ratio:1/1;border-radius:14px;overflow:hidden;background:var(--paper);cursor:pointer;box-shadow:0 6px 14px rgba(120,60,180,.14)}
.fav-drawer .fitem img{width:100%;height:100%;object-fit:cover;display:block}
.fav-drawer .fitem .x{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.94);color:var(--ink);font-size:14px;box-shadow:0 2px 6px rgba(43,26,61,.3);display:flex;align-items:center;justify-content:center;line-height:1}
.fav-drawer .fitem .x:hover{background:var(--blush);color:#fff}
.fempty{grid-column:1 / -1;padding:40px 24px;text-align:center;color:var(--dim);font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.5}
.fempty::before{content:"🌸";display:block;font-size:28px;margin-bottom:10px}

/* Toast */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%);
  z-index:250;padding:10px 18px;
  background:rgba(43,26,61,.94);color:#fff;
  border-radius:100px;
  font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  box-shadow:0 12px 30px rgba(43,26,61,.4);
  animation:tin .28s var(--ease),tout .28s 1.8s var(--ease) forwards;pointer-events:none
}
@keyframes tin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes tout{to{opacity:0;transform:translate(-50%,10px)}}

footer{max-width:820px;margin:24px auto 0;padding:16px var(--pad-x-r) calc(env(safe-area-inset-bottom) + 24px) var(--pad-x);text-align:center;font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;font-weight:600}
footer a{color:var(--lily);text-decoration:none;border-bottom:1px dotted var(--dimmer)}
footer a:hover{color:var(--lily-dark)}
</style>
</head>
<body>

<header class="hero">
  <span class="petals p1">🌸</span>
  <span class="petals p2">🌼</span>
  <span class="petals p3">🌷</span>
  <span class="petals p4">🌸</span>
  <div class="flourish">A little gallery</div>
  <h1>Lily's <span class="amp">&</span> her <em>Cats</em></h1>
  <p class="sub">A hundred good cats from around the internet, in a pretty little gallery. Tap any one for the whole story.</p>
</header>

<div class="controls">
  <label class="search">
    <input id="search" type="search" placeholder="Search a breed — persian, maine coon…" autocomplete="off">
  </label>
  <button class="pill" id="favBtn">♡ Favourites <span class="num" id="favN">0</span></button>
  <button class="pill primary" id="moreBtn">More cats</button>
</div>

<div class="gallery" id="gallery"></div>
<div class="status" id="status">Gathering cats…</div>

<!-- Modal · full cat portrait -->
<div class="modal" id="modal">
  <div class="mcard" id="mcard">
    <div class="mimg"><img id="mImg" alt=""><button class="close" id="mClose">×</button></div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>

<!-- Favourites drawer -->
<div class="fav-bg" id="favBg"></div>
<aside class="fav-drawer" id="favDrawer">
  <div class="dh"><h3>Your favourites</h3><button class="close" id="favClose">×</button></div>
  <div class="fbody" id="fbody"></div>
</aside>

<footer>Cat photos & breed info via <a href="https://thecatapi.com" target="_blank" rel="noopener">The Cat API</a> · Lily's Cats · <a href="/">back to taskiap</a></footer>

<script>
'use strict';

const $ = id => document.getElementById(id);
const state = {
  cats: [],           // { id, url, width, height, breeds:[{...}] }
  breeds: [],         // full breed list
  favs: JSON.parse(localStorage.getItem('lily-favs') || '[]'),
  filter: '',
  loading: false
};
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ═══════════════════════════════════════════════════════
   The Cat API
   ═══════════════════════════════════════════════════════ */
async function fetchCats(n = 20, breedId = '') {
  const url = `https://api.thecatapi.com/v1/images/search?limit=${n}&has_breeds=1${breedId ? `&breed_ids=${breedId}` : ''}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('cat api ' + r.status);
  const j = await r.json();
  return j || [];
}
async function fetchBreeds() {
  const r = await fetch('https://api.thecatapi.com/v1/breeds');
  if (!r.ok) return [];
  return r.json();
}

/* ═══════════════════════════════════════════════════════
   Gallery
   ═══════════════════════════════════════════════════════ */
async function loadMore(n = 20) {
  if (state.loading) return;
  state.loading = true;
  const status = $('status');
  status.textContent = 'Fetching more…';
  const gallery = $('gallery');
  // Prepend skeletons
  const skels = [];
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'tile skel';
    gallery.appendChild(s);
    skels.push(s);
  }
  try {
    let cats = [];
    if (state.filter) {
      const breed = state.breeds.find(b => b.name.toLowerCase().includes(state.filter.toLowerCase()));
      if (breed) cats = await fetchCats(n, breed.id);
      else cats = await fetchCats(n);
    } else {
      cats = await fetchCats(n);
    }
    // Dedup by id
    for (const c of cats) {
      if (state.cats.some(x => x.id === c.id)) continue;
      state.cats.push(c);
      appendTile(c);
    }
    status.textContent = `${state.cats.length} cats gathered so far`;
  } catch (e) {
    status.textContent = 'Could not reach The Cat API. Try again shortly.';
  } finally {
    skels.forEach(s => s.remove());
    state.loading = false;
  }
}

function appendTile(c) {
  const gallery = $('gallery');
  const breed = (c.breeds && c.breeds[0]) || null;
  const isFav = state.favs.some(f => f.id === c.id);
  const el = document.createElement('div');
  el.className = 'tile';
  el.dataset.id = c.id;
  const ratio = (c.height && c.width) ? (c.height / c.width) : 1;
  const h = Math.round(ratio * 100);
  el.innerHTML = `
    <img src="${esc(c.url)}" alt="${esc(breed ? breed.name : 'a cat')}" loading="lazy" style="aspect-ratio:${c.width || 1} / ${c.height || 1}">
    ${breed ? `<div class="breed">${esc(breed.name)}</div>` : ''}
    <button class="heart ${isFav ? 'on' : ''}" data-act="fav" aria-label="Favourite">${isFav ? '♥' : '♡'}</button>
  `;
  el.querySelector('.heart').addEventListener('click', e => {
    e.stopPropagation();
    toggleFav(c, el.querySelector('.heart'));
  });
  el.addEventListener('click', () => openModal(c));
  gallery.appendChild(el);
}

function refreshGallery() {
  $('gallery').innerHTML = '';
  state.cats = [];
  loadMore();
}

/* ═══════════════════════════════════════════════════════
   Modal
   ═══════════════════════════════════════════════════════ */
function starDots(n) {
  n = Math.max(0, Math.min(5, Math.round(n || 0)));
  let s = '';
  for (let i = 0; i < 5; i++) s += `<span class="${i < n ? 'on' : ''}"></span>`;
  return s;
}
function openModal(c) {
  const b = (c.breeds && c.breeds[0]) || null;
  $('mImg').src = c.url;
  $('mImg').alt = b ? b.name : 'a cat';
  const isFav = state.favs.some(f => f.id === c.id);
  const traits = b ? [
    { k:'Origin', v:b.origin || '—' },
    { k:'Life span', v:b.life_span ? `${b.life_span} yrs` : '—' },
    { k:'Weight', v:(b.weight && b.weight.metric) ? `${b.weight.metric} kg` : '—' },
    { k:'Temperament', v:b.temperament ? b.temperament.split(',').slice(0,2).join(', ') : '—' }
  ] : [];
  const stars = b ? [
    { k:'Affection', v:b.affection_level },
    { k:'Playfulness', v:b.social_needs },
    { k:'Energy', v:b.energy_level },
    { k:'Intelligence', v:b.intelligence }
  ] : [];
  $('mBody').innerHTML = `
    <div class="name">${esc(b ? b.name : 'A very good cat')}</div>
    <div class="origin">${b ? esc([b.origin, b.country_code].filter(Boolean).join(' · ')) : 'unknown origin'}</div>
    ${b && b.description ? `<p class="desc">${esc(b.description)}</p>` : ''}
    ${traits.length ? `<div class="traits">${traits.map(t => `<div class="trait"><div class="k">${esc(t.k)}</div><div class="v">${esc(t.v)}</div></div>`).join('')}</div>` : ''}
    ${stars.length ? `<div class="stars">${stars.map(s => `<div class="stat"><span>${esc(s.k)}</span><span class="dots">${starDots(s.v)}</span></div>`).join('')}</div>` : ''}
    <div class="actions">
      <button class="pill ${isFav ? 'on' : ''}" id="mFavBtn">${isFav ? '♥ Saved' : '♡ Save'}</button>
      ${b && b.wikipedia_url ? `<a class="pill" href="${esc(b.wikipedia_url)}" target="_blank" rel="noopener">Wikipedia ↗</a>` : ''}
      <a class="pill" href="${esc(c.url)}" target="_blank" rel="noopener">Open image ↗</a>
    </div>`;
  const mfav = $('mFavBtn');
  mfav.addEventListener('click', () => {
    toggleFav(c, mfav);
    mfav.textContent = state.favs.some(f => f.id === c.id) ? '♥ Saved' : '♡ Save';
    mfav.classList.toggle('on');
  });
  $('modal').classList.add('show');
}
function closeModal() { $('modal').classList.remove('show'); }

/* ═══════════════════════════════════════════════════════
   Favourites
   ═══════════════════════════════════════════════════════ */
function saveFavs() { try { localStorage.setItem('lily-favs', JSON.stringify(state.favs)); } catch(e) {} }
function updateFavCount() { $('favN').textContent = state.favs.length; }
function toggleFav(c, btn) {
  const idx = state.favs.findIndex(f => f.id === c.id);
  const breed = (c.breeds && c.breeds[0]) || null;
  if (idx >= 0) {
    state.favs.splice(idx, 1);
    if (btn) { btn.classList.remove('on'); btn.textContent = '♡'; }
    toast('Removed');
  } else {
    state.favs.unshift({ id:c.id, url:c.url, name: breed ? breed.name : '' });
    if (btn) { btn.classList.add('on'); btn.textContent = '♥'; }
    toast('Saved 🌸');
  }
  saveFavs();
  updateFavCount();
  // Sync all hearts in gallery for this id
  document.querySelectorAll(`.tile[data-id="${c.id}"] .heart`).forEach(h => {
    h.classList.toggle('on', state.favs.some(f => f.id === c.id));
    h.textContent = state.favs.some(f => f.id === c.id) ? '♥' : '♡';
  });
}
function openFavs() {
  const box = $('fbody');
  if (!state.favs.length) {
    box.innerHTML = `<div class="fempty">Nothing here yet.<br>Tap the little heart on any cat to save it.</div>`;
  } else {
    box.innerHTML = state.favs.map(f => `
      <div class="fitem" data-id="${esc(f.id)}">
        <img src="${esc(f.url)}" alt="${esc(f.name || 'saved cat')}">
        <button class="x" data-x="${esc(f.id)}">×</button>
      </div>`).join('');
    box.querySelectorAll('.fitem').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.dataset.x) {
          state.favs = state.favs.filter(f => f.id !== e.target.dataset.x);
          saveFavs();
          updateFavCount();
          openFavs();
          document.querySelectorAll(`.tile[data-id="${e.target.dataset.x}"] .heart`).forEach(h => { h.classList.remove('on'); h.textContent = '♡'; });
          return;
        }
        const f = state.favs.find(x => x.id === el.dataset.id);
        if (f) openModal({ id:f.id, url:f.url, breeds: f.name ? [{ name:f.name }] : [] });
      });
    });
  }
  $('favDrawer').classList.add('show');
  $('favBg').classList.add('show');
}
function closeFavs() { $('favDrawer').classList.remove('show'); $('favBg').classList.remove('show'); }

/* ═══════════════════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════════════════ */
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
async function init() {
  updateFavCount();
  $('moreBtn').addEventListener('click', () => loadMore(20));
  $('favBtn').addEventListener('click', openFavs);
  $('favClose').addEventListener('click', closeFavs);
  $('favBg').addEventListener('click', closeFavs);
  $('mClose').addEventListener('click', closeModal);
  $('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeFavs(); }
  });
  let searchTimer = null;
  $('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const v = e.target.value.trim();
    searchTimer = setTimeout(() => {
      state.filter = v;
      refreshGallery();
    }, 380);
  });
  try {
    state.breeds = await fetchBreeds();
  } catch(e) {}
  loadMore(20);
}
init();
</script>
</body>
</html>
