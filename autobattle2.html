<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Creature Colosseum 2</title>
<style>
:root{--bg:#0a0a14;--surface:#12121e;--surface2:#1a1a2e;--text:#e8e8f0;--accent:#ff6b35;--green:#4ade80;--red:#ef4444;--gold:#f7c948;--purple:#a78bfa;--blue:#60a5fa;--fire:#ff6b35;--water:#60a5fa;--earth:#4ade80;--lightning:#f7c948;--shadow:#c084fc;--light:#fef08a;--border:#2a2a3e}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden;min-height:100vh;user-select:none}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.home-link{position:fixed;top:10px;left:10px;z-index:100;font-size:14px;background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
#game-container{max-width:520px;margin:0 auto;padding:8px;display:flex;flex-direction:column;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 0;flex-wrap:wrap;gap:4px}
.top-bar .round{font-size:18px;font-weight:700;color:var(--accent)}
.top-bar .hp-wrap{display:flex;align-items:center;gap:6px;font-size:14px}
.hp-bar-outer{width:100px;height:14px;background:#333;border-radius:7px;overflow:hidden}
.hp-bar-inner{height:100%;background:var(--green);transition:width .3s;border-radius:7px}
.hp-bar-inner.danger{background:var(--red)}
.gold-display{font-size:16px;font-weight:700;color:var(--gold)}
.streak-display{font-size:12px;color:var(--accent);min-width:40px;text-align:right}
.synergy-bar{display:flex;gap:4px;padding:4px 0;flex-wrap:wrap;min-height:20px}
.synergy-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;opacity:.9}
#battle-canvas{width:100%;aspect-ratio:2/1.4;background:#0d0d1a;border-radius:8px;border:1px solid #222;cursor:default}
.phase-banner{text-align:center;padding:6px 0;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;text-shadow:0 0 20px rgba(255,107,53,.3)}
.shop-area{background:var(--surface);border-radius:10px;padding:8px;margin-top:6px}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px}
.shop-header h3{font-size:14px;color:var(--gold)}
.shop-btns{display:flex;gap:4px;flex-wrap:wrap}
.btn{padding:5px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-refresh{background:var(--accent);color:#fff}
.btn-refresh:hover{filter:brightness(1.2)}
.btn-lock{background:#333;color:var(--text)}
.btn-lock.locked{background:var(--purple);color:#fff}
.btn-start{background:var(--green);color:#000;font-size:14px;padding:8px 20px;display:block;margin:8px auto;animation:pulse 2s infinite}
.btn-start:hover{filter:brightness(1.1)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{box-shadow:0 0 0 8px rgba(74,222,128,0)}}
.btn-speed{position:absolute;top:4px;right:4px;z-index:10;background:rgba(18,18,30,.85);color:var(--text);border:1px solid #444;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer}
.btn-speed:hover{border-color:var(--accent)}
.canvas-wrap{position:relative}
.btn-newgame{background:var(--red);color:#fff;font-size:11px;padding:4px 10px}
.shop-cards{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:#333 transparent}
.shop-card{min-width:78px;flex:1;background:var(--surface2);border-radius:8px;padding:5px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative}
.shop-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.shop-card.sold{opacity:.3;pointer-events:none}
.shop-card .emoji{font-size:22px}
.shop-card .name{font-size:10px;font-weight:600;margin:2px 0}
.shop-card .cost{font-size:11px;color:var(--gold);font-weight:700}
.shop-card .stats{font-size:9px;color:#999}
.shop-card .elem-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.shop-card.rarity-uncommon{border-bottom:2px solid var(--blue)}
.shop-card.rarity-rare{border-bottom:2px solid var(--purple)}
.shop-card.rarity-epic{border-bottom:2px solid var(--gold);box-shadow:0 2px 8px rgba(247,201,72,.15)}
.shop-card.rarity-legendary{border-bottom:2px solid #ff44aa;box-shadow:0 2px 12px rgba(255,68,170,.2)}
.bench-area{margin-top:6px}
.bench-label{font-size:12px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.bench-slots,.grid-slots{display:flex;gap:4px;flex-wrap:wrap}
.bench-slot,.grid-slot{width:50px;height:50px;background:var(--surface2);border-radius:8px;border:2px dashed #333;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0}
.bench-slot:hover,.grid-slot:hover{border-color:var(--accent)}
.bench-slot.occupied,.grid-slot.occupied{border-style:solid}
.slot-emoji{font-size:18px;line-height:1}
.slot-stars{font-size:7px;color:var(--gold);line-height:1}
.slot-hp{font-size:7px;color:var(--green);line-height:1}
.slot-equip{font-size:7px;line-height:1;color:#aaa}
.grid-area{margin-top:6px}
.grid-label{font-size:12px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.grid-rows{display:flex;flex-direction:column;gap:4px}
.grid-row{display:flex;gap:4px;justify-content:center}
.sell-zone{margin-top:6px;padding:8px;text-align:center;border:2px dashed var(--red);border-radius:8px;color:var(--red);font-size:12px;font-weight:600;opacity:.5;transition:all .15s}
.sell-zone.active{opacity:1;background:rgba(239,68,68,.1)}
.tooltip{position:fixed;background:var(--surface2);border:1px solid #444;border-radius:8px;padding:10px;font-size:12px;z-index:200;max-width:220px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.tooltip .t-name{font-size:14px;font-weight:700;margin-bottom:4px}
.tooltip .t-elem{font-size:11px;opacity:.7}
.tooltip .t-stats{margin-top:4px;line-height:1.5}
.tooltip .t-ability{margin-top:4px;font-style:italic;color:var(--accent);font-size:11px}
.game-over-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:12px;padding:20px}
.game-over-overlay h1{font-size:36px;color:var(--accent)}
.game-over-overlay p{font-size:16px;color:var(--text);text-align:center}
.result-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;z-index:150;pointer-events:none;animation:flashIn .6s ease-out forwards}
@keyframes flashIn{0%{opacity:1;transform:translate(-50%,-50%) scale(1.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(2) translateY(-40px)}}
.income-breakdown{background:#111;border-radius:6px;padding:6px 8px;margin-top:4px;font-size:11px;color:#aaa;line-height:1.6}
.income-breakdown span{color:var(--gold);font-weight:600}
.high-score{font-size:11px;color:var(--purple);text-align:center;margin-top:4px}
.round-history{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.round-dot{width:10px;height:10px;border-radius:50%;border:1px solid #333}
.round-dot.win{background:var(--green)}
.round-dot.loss{background:var(--red)}
.round-dot.boss{background:var(--gold)}
.selected-slot{border-color:var(--gold)!important;box-shadow:0 0 8px rgba(247,201,72,.3)}

/* Campaign map */
.map-container{position:relative;width:100%;padding:20px 0}
.map-scroll{overflow-x:auto;overflow-y:hidden;padding:10px 0;scrollbar-width:thin;scrollbar-color:#333 transparent}
.map-track{display:flex;align-items:center;gap:0;position:relative;min-width:max-content;padding:20px 40px}
.map-node{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;border:3px solid #333;background:var(--surface2);transition:all .2s;position:relative;z-index:2;flex-shrink:0;font-size:11px;font-weight:700}
.map-node.current{border-color:var(--accent);box-shadow:0 0 14px rgba(255,107,53,.4);animation:nodePulse 1.5s infinite}
.map-node.completed{border-color:var(--green);background:#1a2e1a;opacity:.7}
.map-node.locked{opacity:.35;cursor:default}
.map-node.boss-node{border-color:var(--gold);background:#2e2a1a}
.map-node .node-icon{font-size:20px}
.map-node .node-label{font-size:8px;color:#aaa;margin-top:1px}
.map-edge{width:30px;height:3px;background:#333;flex-shrink:0;z-index:1}
.map-edge.completed{background:var(--green)}
@keyframes nodePulse{0%,100%{box-shadow:0 0 8px rgba(255,107,53,.3)}50%{box-shadow:0 0 18px rgba(255,107,53,.6)}}
.map-title{text-align:center;font-size:16px;font-weight:700;color:var(--accent);margin-bottom:6px}
.map-subtitle{text-align:center;font-size:11px;color:#888;margin-bottom:8px}

/* Equipment panel */
.equip-area{background:var(--surface);border-radius:10px;padding:8px;margin-top:6px}
.equip-header{font-size:13px;color:var(--gold);margin-bottom:6px;font-weight:700}
.equip-inv{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;flex-wrap:wrap}
.equip-item{width:44px;height:44px;background:var(--surface2);border-radius:6px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;font-size:18px;position:relative;transition:all .15s}
.equip-item:hover{border-color:var(--accent);transform:scale(1.05)}
.equip-item.selected{border-color:var(--gold);box-shadow:0 0 8px rgba(247,201,72,.3)}
.equip-item .eq-slot{position:absolute;bottom:1px;font-size:7px;color:#888}
.equip-item.rarity-uncommon{border-color:#60a5fa55}
.equip-item.rarity-rare{border-color:#a78bfa55}
.equip-item.rarity-epic{border-color:#f7c94855}

/* Loot screen */
.loot-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:250;flex-direction:column;gap:12px}
.loot-items{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.loot-card{background:var(--surface2);border-radius:10px;padding:12px 16px;text-align:center;border:2px solid var(--gold);min-width:80px}
.loot-card .loot-emoji{font-size:32px}
.loot-card .loot-name{font-size:13px;font-weight:700;margin-top:4px;color:var(--gold)}
.loot-card .loot-desc{font-size:10px;color:#aaa;margin-top:2px}

/* Evolve button */
.evolve-btn{background:linear-gradient(135deg,#ff6b35,#a78bfa);color:#fff;font-size:10px;padding:3px 6px;border:none;border-radius:4px;cursor:pointer;margin-top:2px;font-weight:700;animation:evoPulse 2s infinite}
@keyframes evoPulse{0%,100%{box-shadow:0 0 4px rgba(167,139,250,.3)}50%{box-shadow:0 0 12px rgba(167,139,250,.6)}}

/* Rest node */
.rest-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:250;flex-direction:column;gap:12px}

@media(min-width:500px){#game-container{padding:12px}.shop-card{min-width:82px}}
</style>
</head>
<body>
<a href="index.html" class="home-link">&larr; home</a>
<div id="game-container">
  <div class="top-bar" id="top-bar"></div>
  <div class="synergy-bar" id="synergy-bar"></div>
  <div class="canvas-wrap">
    <canvas id="battle-canvas"></canvas>
    <button class="btn-speed" id="speed-btn" style="display:none" onclick="toggleSpeed()">1x</button>
  </div>
  <div class="phase-banner" id="phase-banner"></div>
  <div id="main-ui"></div>
  <div class="round-history" id="round-history"></div>
  <div class="high-score" id="high-score"></div>
</div>
<div id="tooltip" class="tooltip" style="display:none"></div>
<div id="game-over" class="game-over-overlay" style="display:none"></div>
<div id="result-flash" class="result-flash" style="display:none"></div>
<div id="loot-overlay" class="loot-overlay" style="display:none"></div>
<div id="rest-overlay" class="rest-overlay" style="display:none"></div>
<script>
(()=>{
// ========== AUDIO ==========
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ensureAudio(){if(!actx)actx=new AudioCtx()}
function playSound(type){
  ensureAudio();if(!actx)return;
  const now=actx.currentTime,g=actx.createGain();g.connect(actx.destination);g.gain.value=0.02;
  const o=actx.createOscillator();o.connect(g);
  switch(type){
    case'buy':o.frequency.value=520;o.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break;
    case'sell':o.frequency.value=300;o.type='sawtooth';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.start(now);o.stop(now+.2);break;
    case'levelup':{const o2=actx.createOscillator();o2.connect(g);o.frequency.value=440;o2.frequency.value=660;o.type='sine';o2.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.4);o.start(now);o2.start(now+.1);o.stop(now+.4);o2.stop(now+.4);break}
    case'hit':o.frequency.value=150+Math.random()*100;o.type='square';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);o.start(now);o.stop(now+.08);break;
    case'crit':o.frequency.value=800;o.type='square';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break;
    case'death':o.frequency.value=200;o.type='sawtooth';o.frequency.exponentialRampToValueAtTime(50,now+.3);g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);o.start(now);o.stop(now+.3);break;
    case'win':o.frequency.value=523;o.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.6);o.start(now);o.stop(now+.6);{const w2=actx.createOscillator(),gw=actx.createGain();w2.connect(gw);gw.connect(actx.destination);gw.gain.value=0.02;w2.frequency.value=659;w2.type='sine';gw.gain.setValueAtTime(.02,now+.15);gw.gain.exponentialRampToValueAtTime(.001,now+.6);w2.start(now+.15);w2.stop(now+.6);}break;
    case'lose':o.frequency.value=250;o.type='sine';o.frequency.exponentialRampToValueAtTime(150,now+.5);g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.5);o.start(now);o.stop(now+.5);break;
    case'freeze':o.frequency.value=1200;o.type='sine';o.frequency.exponentialRampToValueAtTime(600,now+.2);g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.start(now);o.stop(now+.2);break;
    case'boss':o.frequency.value=80;o.type='sawtooth';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.8);o.start(now);o.stop(now+.8);{const o2=actx.createOscillator(),g2=actx.createGain();o2.connect(g2);g2.connect(actx.destination);o2.frequency.value=100;o2.type='square';g2.gain.setValueAtTime(.015,now+.2);g2.gain.exponentialRampToValueAtTime(.001,now+.8);o2.start(now+.2);o2.stop(now+.8);}break;
    case'equip':o.frequency.value=660;o.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);o.start(now);o.stop(now+.12);{const o2=actx.createOscillator(),g2=actx.createGain();o2.connect(g2);g2.connect(actx.destination);o2.frequency.value=880;o2.type='sine';g2.gain.setValueAtTime(.02,now+.08);g2.gain.exponentialRampToValueAtTime(.001,now+.2);o2.start(now+.08);o2.stop(now+.2);}break;
    case'coin':o.frequency.value=1400;o.type='sine';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.1);break;
    case'evolve':{const o2=actx.createOscillator(),g2=actx.createGain();o2.connect(g2);g2.connect(actx.destination);o.frequency.value=440;o2.frequency.value=880;o.type='sine';o2.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.6);g2.gain.setValueAtTime(.02,now+.15);g2.gain.exponentialRampToValueAtTime(.001,now+.6);o.start(now);o2.start(now+.15);o.stop(now+.6);o2.stop(now+.6);const o3=actx.createOscillator(),g3=actx.createGain();o3.connect(g3);g3.connect(actx.destination);o3.frequency.value=1320;o3.type='sine';g3.gain.setValueAtTime(.02,now+.3);g3.gain.exponentialRampToValueAtTime(.001,now+.7);o3.start(now+.3);o3.stop(now+.7);break}
    case'heal':o.frequency.value=600;o.type='sine';g.gain.setValueAtTime(.015,now);o.frequency.linearRampToValueAtTime(800,now+.2);g.gain.exponentialRampToValueAtTime(.001,now+.25);o.start(now);o.stop(now+.25);break;
    default:o.frequency.value=440;o.type='sine';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.1);
  }
}

// ========== ELEMENTS ==========
const ELEMENTS={
  fire:{name:'Fire',color:'#ff6b35',emoji:'🔥'},
  water:{name:'Water',color:'#60a5fa',emoji:'💧'},
  earth:{name:'Earth',color:'#4ade80',emoji:'🌿'},
  lightning:{name:'Lightning',color:'#f7c948',emoji:'⚡'},
  shadow:{name:'Shadow',color:'#c084fc',emoji:'🌑'},
  light:{name:'Light',color:'#fef08a',emoji:'✨'}
};

// ========== CREATURE DATA (24 creatures) ==========
const CREATURE_DEFS=[
  // FIRE (4)
  {id:1,name:'Ember',elem:'fire',emoji:'🔥',hp:40,atk:8,spd:1.0,range:0,cost:1,rarity:'common',ability:'Leaves burning ground on death',abilityKey:'burnDeath',evolveTo:'Inferno Dragon',evolveEmoji:'🐉',evolveAbility:'AOE fire breath every 3rd attack',evolveAbilityKey:'fireBreath'},
  {id:2,name:'Blaze',elem:'fire',emoji:'🌋',hp:55,atk:12,spd:1.2,range:3,cost:2,rarity:'uncommon',ability:'Fireball hits in AOE',abilityKey:'aoe',evolveTo:'Magma Lord',evolveEmoji:'🔶',evolveAbility:'Fireball leaves lava puddles',evolveAbilityKey:'lavaPuddle'},
  {id:3,name:'Phoenix',elem:'fire',emoji:'🦅',hp:45,atk:10,spd:1.0,range:0,cost:3,rarity:'rare',ability:'Revives once at 50% HP',abilityKey:'revive',evolveTo:'Eternal Phoenix',evolveEmoji:'🌟',evolveAbility:'Revives twice, explodes on revive',evolveAbilityKey:'doubleRevive'},
  {id:4,name:'Inferno',elem:'fire',emoji:'👹',hp:80,atk:15,spd:1.5,range:4,cost:4,rarity:'epic',ability:'Beam hits all in a line',abilityKey:'beam',evolveTo:'Hellfire King',evolveEmoji:'😈',evolveAbility:'Beam ignites all hit targets',evolveAbilityKey:'igniteBeam'},
  // WATER (4)
  {id:5,name:'Splash',elem:'water',emoji:'💧',hp:50,atk:7,spd:0.8,range:2,cost:1,rarity:'common',ability:'Slows enemy attack speed',abilityKey:'slow',evolveTo:'Maelstrom',evolveEmoji:'🌀',evolveAbility:'Slows all nearby enemies',evolveAbilityKey:'aoeSlowAtk'},
  {id:6,name:'Tidal',elem:'water',emoji:'🌊',hp:65,atk:10,spd:1.0,range:0,cost:2,rarity:'uncommon',ability:'Pushes enemies back on hit',abilityKey:'pushback',evolveTo:'Riptide',evolveEmoji:'🦈',evolveAbility:'Knockback stuns for 0.3s',evolveAbilityKey:'knockStun'},
  {id:7,name:'Frost',elem:'water',emoji:'❄️',hp:40,atk:9,spd:1.2,range:3,cost:3,rarity:'rare',ability:'Freezes target for 1s',abilityKey:'freeze',evolveTo:'Blizzard',evolveEmoji:'🏔️',evolveAbility:'Freeze splashes to adjacent',evolveAbilityKey:'aoeFreezeAtk'},
  {id:8,name:'Tsunami',elem:'water',emoji:'🐋',hp:90,atk:8,spd:2.0,range:5,cost:4,rarity:'epic',ability:'Hits entire column',abilityKey:'column',evolveTo:'Leviathan',evolveEmoji:'🐲',evolveAbility:'Column hit also heals allies',evolveAbilityKey:'healColumn'},
  // EARTH (4)

// ========== CAMPAIGN MAP NODES ==========
function generateCampaignMap(){
  // 20 nodes with types: battle, shop, treasure, rest, boss
  const nodes=[];
  for(let i=0;i<20;i++){
    let type;
    if(i===0)type='battle';
    else if((i+1)%5===0)type='boss'; // 5,10,15,20
    else if(i%5===2)type='shop';
    else if(i%5===3)type='treasure';
    else if(i%5===1&&i>1)type='rest';
    else type='battle';
    const bossIdx=Math.floor(i/5);
    nodes.push({
      id:i,type,
      completed:false,
      round:i+1,
      bossId:type==='boss'?BOSS_DEFS[Math.min(bossIdx,3)].id:null,
      goldReward:type==='treasure'?Math.floor(8+i*0.8):0
    });
  }
  return nodes;
}

// ========== SYNERGIES ==========
function countElements(grid){
  const counts={fire:0,water:0,earth:0,lightning:0,shadow:0,light:0};
  if(Array.isArray(grid[0])){
    grid.forEach(row=>row.forEach(c=>{if(c)counts[c.elem]++}));
  }else{
    grid.forEach(c=>{if(c)counts[c.elem]++});
  }
  return counts;
}

function getActiveSynergies(grid){

  const syn=[];
  // Fire
  if(c.fire>=2)syn.push({elem:'fire',level:Math.min(c.fire,4),desc:c.fire>=4?'Fire(4): +30% ATK, burn all':c.fire>=3?'Fire(3): burn on attack':'Fire(2): +15% ATK'});

  // Earth

  // Lightning
  if(c.lightning>=2)syn.push({elem:'lightning',level:Math.min(c.lightning,4),desc:c.lightning>=4?'Lgtn(4): +25% AS, 15% stun':c.lightning>=3?'Lgtn(3): 10% stun':'Lgtn(2): +15% AS'});
  // Shadow
  if(c.shadow>=2)syn.push({elem:'shadow',level:Math.min(c.shadow,4),desc:c.shadow>=4?'Shadow(4): +40% crit, lifesteal':c.shadow>=3?'Shadow(3): 15% crit all':'Shadow(2): +20% crit dmg'});
  // Light
  if(c.light>=2)syn.push({elem:'light',level:Math.min(c.light,4),desc:c.light>=4?'Light(4): regen 5HP/s, revive':c.light>=3?'Light(3): +20 shield all':'Light(2): heal 2HP/s all'});

  // Mixed bonuses
  const elemsPresent=Object.values(c).filter(v=>v>0).length;
  if(elemsPresent>=6)syn.push({elem:'rainbow',level:6,desc:'Rainbow: +15% all stats'});

// ========== COMBINING ==========
function tryCombine(){
  const all=[];
  G.bench.forEach((c,i)=>{if(c)all.push({c,loc:'bench',idx:i})});
  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{if(c)all.push({c,loc:'grid',row:r,col:ci})}));
  let combined=false;
  for(let stars=1;stars<=2;stars++){
    const groups={};
    all.forEach(e=>{
      if(e.c.stars===stars&&!e.c.evolved){
        const key=e.c.defId+'_'+e.c.stars;
        if(!groups[key])groups[key]=[];
        groups[key].push(e);
      }
    });
    for(const key in groups){
      if(groups[key].length>=3){
        const g=groups[key];
        const first=g[0];
        const upgraded=makeCreature(first.c.defId,stars+1);
        // Transfer equipment from first
        if(first.c.equipment){
          upgraded.equipment={...first.c.equipment};
        }
        for(let i=2;i>=1;i--){
          const e=g[i];
          // Return equipment from sacrificed creatures to inventory
          if(e.c.equipment){
            Object.values(e.c.equipment).forEach(eq=>{
              if(eq)G.equipmentInv.push(eq);
            });
          }
          if(e.loc==='bench')G.bench[e.idx]=null;
          else G.grid[e.row][e.col]=null;
        }
        if(first.loc==='bench')G.bench[first.idx]=upgraded;
        else G.grid[first.row][first.col]=upgraded;
        playSound('levelup');
        combined=true;
      }
    }
  }
  if(combined)tryCombine();
}

// ========== AI TEAM ==========
function generateAITeam(nodeIdx){
  const team=[];
  const round=nodeIdx+1;
  let count,maxStars,maxCost;
  if(round<=3){count=2+Math.floor(round/2);maxStars=1;maxCost=2;}
  else if(round<=6){count=3+Math.floor((round-3)/2);maxStars=1;maxCost=3;}
  else if(round<=9){count=4+Math.floor((round-6)/3);maxStars=Math.random()<.3?2:1;maxCost=3;}
  else if(round<=12){count=5+Math.floor((round-9)/2);maxStars=2;maxCost=4;}
  else if(round<=16){count=Math.min(7,5+Math.floor((round-12)/2));maxStars=Math.random()<.4?3:2;maxCost=4;}
  else{count=Math.min(8,6+Math.floor((round-16)/2));maxStars=3;maxCost=4;}
  count=Math.min(count,8);
  const pool=CREATURE_DEFS.filter(d=>d.cost<=maxCost);
  const elemKeys=Object.keys(ELEMENTS);
  const elemChoice=elemKeys[Math.floor(Math.random()*elemKeys.length)];
  for(let i=0;i<count;i++){
    const useSynergy=Math.random()<.5;
    const candidates=useSynergy?pool.filter(d=>d.elem===elemChoice):pool;
    const pick=candidates.length?candidates:pool;
    const def=pick[Math.floor(Math.random()*pick.length)];
    let stars=1;
    if(maxStars>=2&&Math.random()<(round>=10?.5:.2))stars=2;
    if(maxStars>=3&&Math.random()<(round>=16?.5:.15))stars=3;
    team.push(makeCreature(def.id,stars));
  }
  return team;
}

const canvas=document.getElementById('battle-canvas');
const ctx=canvas.getContext('2d');
let cW,cH,cellW,cellH;

function resizeCanvas(){
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*devicePixelRatio;
  canvas.height=rect.height*devicePixelRatio;
  cW=canvas.width;cH=canvas.height;
  cellW=cW/4;cellH=cH/5;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}

function gridToPixel(col,row,isEnemy){
  const gRow=isEnemy?row:(row+3);
  const x=(col+0.5)*(cW/devicePixelRatio/4);
  const y=(gRow+0.5)*(cH/devicePixelRatio/5);
  return{x,y};
}

function getCreatureStats(c){
  // Compute effective stats with equipment
  let atk=c.atk,hp=c.maxHp||c.hp,spd=c.spd,spdMult=1;
  let defense=0,critChance=0,lifesteal=0,dodge=0,thorns=0,burnChance=0,armorPen=0,abilityBoost=0,elemBoost=0,goldOnKill=0,reviveOnce=false;
  if(c.equipment){
    Object.values(c.equipment).forEach(eq=>{
      if(!eq)return;
      const ed=getEquipDef(eq.eqId);
      if(!ed)return;
      const s=ed.stats;
      if(s.atk)atk+=s.atk;
      if(s.hp)hp+=s.hp;
      if(s.defense)defense+=s.defense;
      if(s.critChance)critChance+=s.critChance;
      if(s.lifesteal)lifesteal+=s.lifesteal;
      if(s.dodge)dodge+=s.dodge;
      if(s.thorns)thorns+=s.thorns;
      if(s.burnChance)burnChance+=s.burnChance;
      if(s.armorPen)armorPen+=s.armorPen;
      if(s.spdBonus)spdMult*=(1+s.spdBonus);
      if(s.abilityBoost)abilityBoost+=s.abilityBoost;
      if(s.elemBoost)elemBoost+=s.elemBoost;
      if(s.goldOnKill)goldOnKill+=s.goldOnKill;
      if(s.reviveOnce)reviveOnce=true;
    });
  }
  return{atk,hp,spd,spdMult,defense,critChance,lifesteal,dodge,thorns,burnChance,armorPen,abilityBoost,elemBoost,goldOnKill,reviveOnce};
}

      spdMult:1,frozen:false,rooted:false,stunned:false,shielded:0,revived:false,
      eqStats:es,invisible:false,invisTimer:0,invulnTimer:0,hitCount:0,goldEarned:0,darkAuraApplied:false};
    const pos=gridToPixel(1.5,0.5,true);
    bc.x=pos.x;bc.y=pos.y;bc.targetX=pos.x;bc.targetY=pos.y;
    enemyTeam.push(bc);
    playSound('boss');
  }else{
    const aiCreatures=generateAITeam(G.currentNode);
    aiCreatures.forEach((c,i)=>{
      const row=Math.floor(i/4);
      const col=i%4;
      const es=getCreatureStats(c);
      const bc={...c,maxHp:es.hp,curHp:es.hp,atk:es.atk,
        gridCol:col,gridRow:row,isEnemy:true,
        atkTimer:c.spd*0.5*Math.random(),
        x:0,y:0,targetX:0,targetY:0,
        statusEffects:[],alive:true,moving:false,attacking:false,attackAnim:0,
        spdMult:1,frozen:false,rooted:false,stunned:false,shielded:0,revived:false,
        eqStats:es,invisible:false,invisTimer:0,invulnTimer:0,hitCount:0,goldEarned:0,darkAuraApplied:false};
      const pos=gridToPixel(col,row,true);
      bc.x=pos.x;bc.y=pos.y;bc.targetX=pos.x;bc.targetY=pos.y;
      enemyTeam.push(bc);
    });
  }

  // Apply synergies
  const pSyn=getActiveSynergies(G.grid);
  applySynergies(pSyn,playerTeam,true);

  // Simple enemy synergies
  const eElemCounts=countElements(enemyTeam);
  const eSyn=getActiveSynergies([enemyTeam]);
  applySynergies(eSyn,enemyTeam,false);

  // Light ability: Paladin grant shield
  playerTeam.filter(u=>u.abilityKey==='grantShield'||u.abilityKey==='megaShield').forEach(u=>{
    const shieldAmt=u.abilityKey==='megaShield'?30:15;
    playerTeam.filter(a=>a!==u&&dist2d(u,a,playerTeam)<80).forEach(a=>{
      a.shielded+=shieldAmt;
    });
  });

  // Shadow stealth setup
  playerTeam.concat(enemyTeam).filter(u=>u.abilityKey==='stealth'||u.abilityKey==='killStealth').forEach(u=>{
    u.invisTimer=2.0;
  });

  // Phantom teleport setup
  playerTeam.filter(u=>u.abilityKey==='teleport'||u.abilityKey==='voidStep').forEach(u=>{
    u._needsTeleport=true;
  });

  battleState={player:playerTeam,enemy:enemyTeam,time:0,done:false,winner:null,
    pSyn,eSyn,pElemCounts:countElements(G.grid),eElemCounts,isBoss,
    bossGoldEarned:0,resurrectedUids:new Set()};
  particles.length=0;dmgNums.length=0;projectiles.length=0;burningGround.length=0;
  document.getElementById('speed-btn').style.display='block';
  renderUI();
  lastBattleTime=performance.now();
  battleLoop(performance.now());
}

function dist2d(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function dist(a,b){return dist2d(a,b)}

function applySynergies(syn,team,isPlayer){
  syn.forEach(s=>{
    if(s.elem==='fire'){
      const fireTeam=team.filter(c=>c.elem==='fire');
      if(s.level>=4)team.forEach(c=>{if(c.elem==='fire')c.atk=Math.round(c.atk*1.3)});
      else if(s.level>=2)fireTeam.forEach(c=>c.atk=Math.round(c.atk*1.15));
    }
    if(s.elem==='water'){
      const waterTeam=team.filter(c=>c.elem==='water');
      const mult=s.level>=4?1.4:1.2;
      if(s.level>=2)waterTeam.forEach(c=>{c.curHp=Math.round(c.curHp*mult);c.maxHp=Math.round(c.maxHp*mult)});
    }
    if(s.elem==='earth'){
      const shieldAmt=s.level>=4?25:15;
      if(s.level>=2)team.forEach(c=>c.shielded+=shieldAmt);
    }
    if(s.elem==='lightning'){
      const mult=s.level>=4?1.25:1.15;
      if(s.level>=2)team.filter(c=>c.elem==='lightning').forEach(c=>c.spdMult*=mult);
    }
    if(s.elem==='shadow'){
      // handled in attack logic
    }
    if(s.elem==='light'){
      // heal aura handled in update
      if(s.level>=3)team.forEach(c=>c.shielded+=20);
    }
    if(s.elem==='rainbow'){
      const mult=s.level>=6?1.15:1.1;
      team.forEach(c=>{c.atk=Math.round(c.atk*mult);c.curHp=Math.round(c.curHp*mult);c.maxHp=Math.round(c.maxHp*mult);c.spdMult*=mult});
    }
  });
}

function findTarget(unit,allEnemies){
  const alive=allEnemies.filter(e=>e.alive&&!e.invisible);
  if(!alive.length){
    // Can still target invisible if no others
    const allAlive=allEnemies.filter(e=>e.alive);
    if(!allAlive.length)return null;
    return allAlive.reduce((a,b)=>dist(unit,a)<dist(unit,b)?a:b);
  }
  const taunters=alive.filter(e=>e.abilityKey==='taunt'||e.abilityKey==='reflectTaunt');
  if(taunters.length)return taunters.reduce((a,b)=>dist(unit,a)<dist(unit,b)?a:b);
  // Assassins prefer backline
  if(unit.abilityKey==='backstab'||unit.abilityKey==='nightstrike'){
    const backline=alive.filter(e=>e.gridRow===1||(e.gridRow===0&&alive.every(a=>a.gridRow===0)));
    if(backline.length)return backline.reduce((a,b)=>dist(unit,a)<dist(unit,b)?a:b);
  }
  return alive.reduce((a,b)=>dist(unit,a)<dist(unit,b)?a:b);
}

function dealDamage(attacker,target,dmg,allAllies,allEnemies,isCrit=false){
  // Dodge check
  if(target.eqStats&&target.eqStats.dodge>0&&Math.random()<target.eqStats.dodge){
    addDmgNum(target.x,target.y-15,'DODGE','#aaa');
    return;
  }
  // Invulnerable check
  if(target.invulnTimer>0){
    addDmgNum(target.x,target.y-15,'IMMUNE','#c084fc');
    return;
  }
  // Defense reduction
  if(target.eqStats&&target.eqStats.defense>0){
    let pen=attacker.eqStats?attacker.eqStats.armorPen:0;
    const effectiveDef=target.eqStats.defense*(1-pen);
    dmg=Math.max(1,dmg-effectiveDef);
  }
  // Shield
  if(target.shielded>0){
    const absorbed=Math.min(target.shielded,dmg);
    target.shielded-=absorbed;
    dmg-=absorbed;
    if(absorbed>0)addDmgNum(target.x,target.y-15,'shield -'+absorbed,'#aaa');
  }
  target.curHp-=dmg;
  if(isCrit){
    addDmgNum(target.x+(-10+Math.random()*20),target.y-20,dmg,'#f7c948',true);
    playSound('crit');
  }else{
    addDmgNum(target.x+(-10+Math.random()*20),target.y-20,dmg,'#fff');
    playSound('hit');
  }
  addParticle(target.x,target.y,ELEMENTS[attacker.elem]?ELEMENTS[attacker.elem].color:'#fff',3);

  // Lifesteal
  let ls=attacker.eqStats?attacker.eqStats.lifesteal:0;
  // Eclipse synergy
  const eclipseSyn=attacker.isEnemy?
    battleState.eSyn.some(s=>s.elem==='eclipse'):
    battleState.pSyn.some(s=>s.elem==='eclipse');
  if(eclipseSyn)ls+=0.1;
  if(ls>0){
    const healAmt=Math.round(dmg*ls);
    attacker.curHp=Math.min(attacker.maxHp,attacker.curHp+healAmt);
    if(healAmt>0)addDmgNum(attacker.x,attacker.y-10,'+'+healAmt,'#4ade80');
  }

  // Thorns
  if(target.eqStats&&target.eqStats.thorns>0){
    const thornDmg=Math.round(dmg*target.eqStats.thorns);
    if(thornDmg>0){
      attacker.curHp-=thornDmg;
      addDmgNum(attacker.x,attacker.y-15,thornDmg,'#ff8844');
    }
  }

  // Reflect (evolved Boulder)
  if(target.abilityKey==='reflectTaunt'){
    const reflectDmg=Math.round(dmg*0.2);
    if(reflectDmg>0){
      attacker.curHp-=reflectDmg;
      addDmgNum(attacker.x,attacker.y-20,reflectDmg,'#4ade80');
    }
  }

  if(target.curHp<=0){
    // Check equipment revive
    if(target.eqStats&&target.eqStats.reviveOnce&&!target.revived){
      target.revived=true;
      target.curHp=Math.round(target.maxHp*0.3);
      addDmgNum(target.x,target.y-30,'REVIVE','#fef08a',true);
      addParticle(target.x,target.y,'#fef08a',10,3);
      return;
    }
    // Check ability revive
    if((target.abilityKey==='revive')&&!target.revived){
      target.revived=true;
      target.curHp=Math.round(target.maxHp*0.5);
      addDmgNum(target.x,target.y-30,'REVIVE','#ff6b35',true);
      addParticle(target.x,target.y,'#ff6b35',10,3);
      return;
    }
    if(target.abilityKey==='doubleRevive'&&(!target.revived||target.reviveCount<2)){
      if(!target.reviveCount)target.reviveCount=0;
      target.reviveCount++;
      if(target.reviveCount<=2){
        target.revived=target.reviveCount>=2;
        target.curHp=Math.round(target.maxHp*0.5);
        addDmgNum(target.x,target.y-30,'REVIVE','#ff6b35',true);
        addParticle(target.x,target.y,'#ff6b35',15,4);
        // Explode on revive
        allEnemies.filter(e=>e.alive&&e!==attacker&&dist(e,target)<50).forEach(e=>{
          e.curHp-=Math.round(target.atk*0.5);
          addDmgNum(e.x,e.y-15,Math.round(target.atk*0.5),'#ff6b35');
        });
        return;
      }
    }
    target.alive=false;
    target.curHp=0;
    playSound('death');
    addParticle(target.x,target.y,ELEMENTS[target.elem]?ELEMENTS[target.elem].color:'#ff4444',15,4,0.8);

    // Gold on kill
    if(attacker.eqStats&&attacker.eqStats.goldOnKill>0){
      attacker.goldEarned+=attacker.eqStats.goldOnKill;
    }

    // Kill stealth
    if(attacker.abilityKey==='killStealth'){
      attacker.invisible=true;attacker.invisTimer=2.0;
      addDmgNum(attacker.x,attacker.y-20,'STEALTH','#c084fc');
    }

    // Shield on kill (evolved Golem)
    if(attacker.abilityKey==='shieldOnKill'){
      attacker.shielded+=20;
      addDmgNum(attacker.x,attacker.y-20,'+20 shield','#a78bfa');
    }

    // Check resurrect ability (Archangel)
    const allies=target.isEnemy?allEnemies:allAllies;
    const resurrectors=allies.filter(a=>a.alive&&(a.abilityKey==='resurrect'||a.abilityKey==='massRes')&&!battleState.resurrectedUids.has(a.uid));
    if(resurrectors.length>0){
      const rez=resurrectors[0];
      const maxRez=rez.abilityKey==='massRes'?2:1;
      const rezHpPct=rez.abilityKey==='massRes'?0.6:0.4;
      battleState.resurrectedUids.add(rez.uid);
      target.alive=true;
      target.curHp=Math.round(target.maxHp*rezHpPct);
      target.revived=true;
      addDmgNum(target.x,target.y-30,'RESURRECT','#fef08a',true);
      addParticle(target.x,target.y,'#fef08a',12,3,0.8);
      playSound('heal');
    }

    // Burn ground on death
    if(target.abilityKey==='burnDeath'){
      burningGround.push({x:target.x,y:target.y,life:3,side:target.isEnemy?'player':'enemy'});
    }
    // Fire synergy burn
    const fireSynLvl=attacker.isEnemy?
      (battleState.eElemCounts.fire>=3?3:0):
      (battleState.pSyn.some(s=>s.elem==='fire'&&s.level>=3)?3:0);
    if(fireSynLvl>=3&&attacker.elem==='fire'){
      burningGround.push({x:target.x,y:target.y,life:2,side:attacker.isEnemy?'enemy':'player'});
    }

    // Water kill heal
    const waterSynLvl=attacker.isEnemy?
      (battleState.eElemCounts.water>=3?3:0):
      (battleState.pSyn.some(s=>s.elem==='water'&&s.level>=3)?3:0);
    if(waterSynLvl>=3&&attacker.elem==='water'){
      attacker.curHp=Math.min(attacker.maxHp,attacker.curHp+Math.round(attacker.maxHp*0.05));
      addDmgNum(attacker.x,attacker.y-15,'+heal','#60a5fa');
    }
  }
}

function processAttack(unit,target,allAllies,allEnemies,dt){
  let dmg=unit.atk;
  let isCrit=false;

  // Element boost from equipment
  if(unit.eqStats&&unit.eqStats.elemBoost>0&&unit.elem===target.elem){
    // Element boost increases damage against all
    dmg=Math.round(dmg*(1+unit.eqStats.elemBoost));
  }

  // Ability boost
  const aboost=unit.eqStats?unit.eqStats.abilityBoost:0;

  // Shadow synergy crit bonus
  const shadowSyn=unit.isEnemy?
    battleState.eSyn.some(s=>s.elem==='shadow'):
    battleState.pSyn.some(s=>s.elem==='shadow');
  const shadowSynLvl=unit.isEnemy?
    (battleState.eSyn.find(s=>s.elem==='shadow')||{level:0}).level:
    (battleState.pSyn.find(s=>s.elem==='shadow')||{level:0}).level;

  // Crit chance
  let critChance=(unit.eqStats?unit.eqStats.critChance:0);
  if(unit.abilityKey==='crit')critChance+=0.2;
  if(unit.abilityKey==='critChain')critChance+=0.35;
  if(shadowSynLvl>=3)critChance+=0.15;
  if(shadowSynLvl>=4)critChance+=0.1;

  if(Math.random()<critChance){
    let critMult=2;
    if(shadowSynLvl>=2)critMult+=0.2;
    dmg=Math.round(dmg*critMult);
    isCrit=true;
  }

  // Backstab
  if((unit.abilityKey==='backstab'||unit.abilityKey==='nightstrike')&&target.gridRow===1){
    const backstabMult=unit.abilityKey==='nightstrike'?1.5:1.3;
    dmg=Math.round(dmg*backstabMult);
    addDmgNum(target.x+10,target.y-25,'BACKSTAB','#c084fc');
  }

  // Stealth break bonus
  if(unit.invisible){
    dmg=Math.round(dmg*1.5);
    unit.invisible=false;
    addParticle(unit.x,unit.y,'#c084fc',8,2);
  }

  // Plasma strike (evolved Spark) every 5th hit
  unit.hitCount=(unit.hitCount||0)+1;
  if(unit.abilityKey==='plasmaStrike'&&unit.hitCount%5===0){
    dmg*=3;
    addDmgNum(unit.x,unit.y-25,'PLASMA!','#f7c948',true);
    addParticle(unit.x,unit.y,'#f7c948',10,3);
  }

  // 3-star bonus
  if(unit.stars>=3&&!unit.evolved)dmg=Math.round(dmg*1.2);

  // Status effects from attack
  if(unit.abilityKey==='slow'||unit.abilityKey==='aoeSlowAtk'){
    target.spdMult=Math.max(0.5,target.spdMult*0.7);
    if(unit.abilityKey==='aoeSlowAtk'){
      allEnemies.filter(e=>e.alive&&e!==target&&dist(e,unit)<60).forEach(e=>{
        e.spdMult=Math.max(0.6,e.spdMult*0.8);
      });
    }
  }
  if((unit.abilityKey==='freeze'||unit.abilityKey==='aoeFreezeAtk')&&target.abilityKey!=='immune'&&target.abilityKey!=='shieldOnKill'){
    target.frozen=true;target.frozenTimer=1.0;playSound('freeze');addParticle(target.x,target.y,'#aaddff',8,2);
    if(unit.abilityKey==='aoeFreezeAtk'){
      allEnemies.filter(e=>e.alive&&e!==target&&dist(e,target)<40&&e.abilityKey!=='immune').forEach(e=>{
        e.frozen=true;e.frozenTimer=0.5;addParticle(e.x,e.y,'#aaddff',4,1);
      });
    }
  }
  if(unit.abilityKey==='root'||unit.abilityKey==='aoeRoot'){
    if(target.abilityKey!=='immune'&&target.abilityKey!=='shieldOnKill'){
      target.rooted=true;target.rootedTimer=1.5;addParticle(target.x,target.y,'#4ade80',6,1);
    }
    if(unit.abilityKey==='aoeRoot'){
      allEnemies.filter(e=>e.alive&&e!==target&&dist(e,target)<40&&e.abilityKey!=='immune').forEach(e=>{
        e.rooted=true;e.rootedTimer=1.0;addParticle(e.x,e.y,'#4ade80',3,1);
      });
    }
  }
  if(unit.abilityKey==='stun'||unit.abilityKey==='aoeStun'){
    target.stunned=true;target.stunnedTimer=0.5;addDmgNum(target.x,target.y-30,'STUN','#f7c948');
    if(unit.abilityKey==='aoeStun'){
      allEnemies.filter(e=>e.alive&&e!==target&&dist(e,target)<45).forEach(e=>{
        e.stunned=true;e.stunnedTimer=0.3;addDmgNum(e.x,e.y-25,'STUN','#f7c948');
      });
    }
  }
  if((unit.abilityKey==='pushback'||unit.abilityKey==='knockStun')&&!target.rooted&&!target.frozen){
    const dx=target.x-unit.x,dy=target.y-unit.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    target.x+=dx/d*15;target.y+=dy/d*15;
    if(unit.abilityKey==='knockStun'){
      target.stunned=true;target.stunnedTimer=0.3;
    }
  }

  // Equipment burn chance
  if(unit.eqStats&&unit.eqStats.burnChance>0&&Math.random()<unit.eqStats.burnChance){
    burningGround.push({x:target.x,y:target.y,life:1.5,side:unit.isEnemy?'enemy':'player'});
  }

  // Lightning synergy stun
  const ltnSyn=unit.isEnemy?
    (battleState.eElemCounts.lightning>=3):
    (battleState.pSyn.some(s=>s.elem==='lightning'&&s.level>=3));
  const ltnSynLvl=unit.isEnemy?
    (battleState.eElemCounts.lightning>=4?4:battleState.eElemCounts.lightning>=3?3:0):
    ((battleState.pSyn.find(s=>s.elem==='lightning')||{level:0}).level);
  if(ltnSyn&&unit.elem==='lightning'&&Math.random()<(ltnSynLvl>=4?0.15:0.1)){
    target.stunned=true;target.stunnedTimer=0.3;addDmgNum(target.x,target.y-30,'ZAP','#f7c948');
  }

  // AOE
  if(unit.abilityKey==='aoe'||unit.abilityKey==='lavaPuddle'){
    allEnemies.filter(e=>e.alive&&e!==target&&dist(e,target)<40).forEach(e=>dealDamage(unit,e,Math.round(dmg*0.5),allAllies,allEnemies));
    if(unit.abilityKey==='lavaPuddle'){
      burningGround.push({x:target.x,y:target.y,life:2,side:unit.isEnemy?'enemy':'player'});
    }
  }
  // Beam
  if(unit.abilityKey==='beam'||unit.abilityKey==='igniteBeam'){
    allEnemies.filter(e=>e.alive&&e!==target&&Math.abs(e.x-unit.x)<20).forEach(e=>{
      dealDamage(unit,e,Math.round(dmg*0.6),allAllies,allEnemies);
      if(unit.abilityKey==='igniteBeam'){
        burningGround.push({x:e.x,y:e.y,life:1.5,side:unit.isEnemy?'enemy':'player'});
      }
    });
  }
  // Chain
  if(unit.abilityKey==='chain'||unit.abilityKey==='megaChain'){
    let prev=target;let hits=0;
    const maxHits=unit.abilityKey==='megaChain'?5:2;
    const hitSet=new Set([target.uid]);
    while(hits<maxHits){
      const next=allEnemies.filter(e=>e.alive&&!hitSet.has(e.uid)).sort((a,b)=>dist(prev,a)-dist(prev,b))[0];
      if(!next)break;
      hitSet.add(next.uid);
      const chainDmg=unit.abilityKey==='megaChain'?Math.round(dmg*(0.5+hits*0.1)):Math.round(dmg*0.6);
      dealDamage(unit,next,chainDmg,allAllies,allEnemies);
      projectiles.push({x:prev.x,y:prev.y,tx:next.x,ty:next.y,color:'#f7c948',life:0.15});
      prev=next;hits++;
    }
  }
  // Crit chain (evolved Bolt)
  if(unit.abilityKey==='critChain'&&isCrit){
    const next=allEnemies.filter(e=>e.alive&&e!==target).sort((a,b)=>dist(target,a)-dist(target,b))[0];
    if(next){
      dealDamage(unit,next,Math.round(dmg*0.5),allAllies,allEnemies);
      projectiles.push({x:target.x,y:target.y,tx:next.x,ty:next.y,color:'#f7c948',life:0.15});
    }
  }
  // Column
  if(unit.abilityKey==='column'||unit.abilityKey==='healColumn'){
    allEnemies.filter(e=>e.alive&&e!==target&&Math.abs(e.x-target.x)<20).forEach(e=>dealDamage(unit,e,Math.round(dmg*0.7),allAllies,allEnemies));
    if(unit.abilityKey==='healColumn'){
      allAllies.filter(a=>a.alive).forEach(a=>{
        const heal=Math.round(unit.atk*0.3);
        a.curHp=Math.min(a.maxHp,a.curHp+heal);
        addDmgNum(a.x,a.y-10,'+'+heal,'#60a5fa');
      });
    }
  }
  // Fire breath (evolved Ember)
  if(unit.abilityKey==='fireBreath'&&unit.hitCount%3===0){
    allEnemies.filter(e=>e.alive&&dist(e,unit)<60).forEach(e=>{
      dealDamage(unit,e,Math.round(dmg*0.4),allAllies,allEnemies);
    });
    addParticle(unit.x,unit.y,'#ff6b35',12,3);
    addDmgNum(unit.x,unit.y-30,'FIRE BREATH','#ff6b35');
  }

  // Darkness AOE debuff (Void Lord)
  if((unit.abilityKey==='darkness'||unit.abilityKey==='abyssDrain')&&!unit.darkAuraApplied){
    unit.darkAuraApplied=true;
    allEnemies.filter(e=>e.alive&&dist(e,unit)<80).forEach(e=>{
      e.atk=Math.round(e.atk*0.7);
      addDmgNum(e.x,e.y-15,'-ATK','#c084fc');
    });
  }

  // Ranged = projectile, melee = dash
  if(unit.range>0){
    projectiles.push({x:unit.x,y:unit.y,tx:target.x,ty:target.y,color:ELEMENTS[unit.elem]?ELEMENTS[unit.elem].color:'#fff',life:0.2});
  }else{
    unit.attacking=true;unit.attackAnim=0.15;
    unit.attackTargetX=target.x;unit.attackTargetY=target.y;
  }

  dealDamage(unit,target,dmg,allAllies,allEnemies,isCrit);
}

function processHealAction(unit,allAllies,dt){
  // Sprite/evolved Fairy Queen: heal lowest ally instead of attacking
  const targets=allAllies.filter(a=>a.alive&&a!==unit&&a.curHp<a.maxHp).sort((a,b)=>(a.curHp/a.maxHp)-(b.curHp/b.maxHp));
  const healCount=unit.abilityKey==='healTwo'?2:1;
  const healAmt=Math.round(unit.atk*2);
  for(let i=0;i<Math.min(healCount,targets.length);i++){
    const t=targets[i];
    t.curHp=Math.min(t.maxHp,t.curHp+healAmt);
    addDmgNum(t.x,t.y-15,'+'+healAmt,'#4ade80');
    addParticle(t.x,t.y,'#fef08a',4,1.5);
    projectiles.push({x:unit.x,y:unit.y,tx:t.x,ty:t.y,color:'#fef08a',life:0.2});
    playSound('heal');
  }
  // If no one to heal, attack normally
  return targets.length>0;
}

function processChainHeal(unit,allAllies){
  const maxTargets=unit.abilityKey==='megaChainHeal'?5:3;
  const targets=allAllies.filter(a=>a.alive&&a!==unit).sort((a,b)=>(a.curHp/a.maxHp)-(b.curHp/b.maxHp)).slice(0,maxTargets);
  const healAmt=Math.round(unit.atk*1.5);
  let prev=unit;
  targets.forEach(t=>{
    t.curHp=Math.min(t.maxHp,t.curHp+healAmt);
    addDmgNum(t.x,t.y-15,'+'+healAmt,'#fef08a');
    addParticle(t.x,t.y,'#fef08a',3,1);
    projectiles.push({x:prev.x,y:prev.y,tx:t.x,ty:t.y,color:'#fef08a',life:0.15});
    if(unit.abilityKey==='megaChainHeal')t.shielded+=5;
    prev=t;
  });
  if(targets.length>0)playSound('heal');
}

function processBossAttack(boss,allEnemies,dt){
  boss.bossTimer+=dt;
  // Area sweep every 3s
  if(boss.abilityKey==='bossAreaSweep'&&boss.bossTimer>=3){
    boss.bossTimer=0;
    allEnemies.filter(e=>e.alive).forEach(e=>{
      const dmg=Math.round(boss.atk*0.6);
      e.curHp-=dmg;
      addDmgNum(e.x,e.y-20,dmg,'#ff6b35');
      addParticle(e.x,e.y,'#ff6b35',5,2);
      if(e.curHp<=0){e.alive=false;e.curHp=0;playSound('death');addParticle(e.x,e.y,'#ff4444',10,3)}
    });
    addDmgNum(boss.x,boss.y-40,'AREA SWEEP','#ff6b35',true);
  }
  // Kraken tentacles
  if(boss.abilityKey==='bossKraken'&&boss.bossTimer>=3.5){
    boss.bossTimer=0;
    const targets=allEnemies.filter(e=>e.alive).sort(()=>Math.random()-.5).slice(0,3);
    targets.forEach(e=>{
      const dmg=Math.round(boss.atk*0.8);
      e.curHp-=dmg;
      addDmgNum(e.x,e.y-20,dmg,'#60a5fa');
      addParticle(e.x,e.y,'#60a5fa',6,2);
      e.rooted=true;e.rootedTimer=1.5;
      if(e.curHp<=0){e.alive=false;e.curHp=0;playSound('death');addParticle(e.x,e.y,'#ff4444',10,3)}
    });
    addDmgNum(boss.x,boss.y-40,'TENTACLES','#60a5fa',true);
  }
  // Titan ground slam
  if(boss.abilityKey==='bossTitan'&&boss.bossTimer>=4){
    boss.bossTimer=0;
    allEnemies.filter(e=>e.alive).forEach(e=>{
      const dmg=Math.round(boss.atk*0.5);
      e.curHp-=dmg;
      e.stunned=true;e.stunnedTimer=1.0;
      addDmgNum(e.x,e.y-20,dmg,'#4ade80');
      addParticle(e.x,e.y,'#4ade80',8,3);
      if(e.curHp<=0){e.alive=false;e.curHp=0;playSound('death');addParticle(e.x,e.y,'#ff4444',10,3)}
    });
    addDmgNum(boss.x,boss.y-40,'GROUND SLAM','#4ade80',true);
  }
  // Dragon chain all
  if(boss.abilityKey==='bossDragon'&&boss.bossTimer>=2.5){
    boss.bossTimer=0;
    boss.bossPhase=(boss.bossPhase||0)+1;
    const mult=1+boss.bossPhase*0.1;
    allEnemies.filter(e=>e.alive).forEach(e=>{
      const dmg=Math.round(boss.atk*0.4*mult);
      e.curHp-=dmg;
      addDmgNum(e.x,e.y-20,dmg,'#f7c948');
      addParticle(e.x,e.y,'#f7c948',6,2);
      projectiles.push({x:boss.x,y:boss.y,tx:e.x,ty:e.y,color:'#f7c948',life:0.15});
      if(e.curHp<=0){e.alive=false;e.curHp=0;playSound('death');addParticle(e.x,e.y,'#ff4444',10,3)}
    });
    addDmgNum(boss.x,boss.y-40,'CHAIN ALL x'+boss.bossPhase,'#f7c948',true);
  }
}

function battleUpdate(dt){
  if(!battleState||battleState.done)return;
  battleState.time+=dt;
  const{player,enemy}=battleState;
  const pAlive=player.filter(u=>u.alive);
  const eAlive=enemy.filter(u=>u.alive);

  if(!pAlive.length||!eAlive.length||battleState.time>45){
    battleState.done=true;
    if(!pAlive.length&&!eAlive.length)battleState.winner='enemy';
    else if(!pAlive.length)battleState.winner='enemy';
    else if(!eAlive.length)battleState.winner='player';
    else{const pHpPct=pAlive.reduce((s,u)=>s+u.curHp/u.maxHp,0)/pAlive.length;const eHpPct=eAlive.reduce((s,u)=>s+u.curHp/u.maxHp,0)/eAlive.length;battleState.winner=pHpPct>=eHpPct?'player':'enemy'}
    return;
  }

  // Light synergy heal aura
  const lightHealP=battleState.pSyn.some(s=>s.elem==='light'&&s.level>=2);
  const lightHealE=battleState.eSyn.some(s=>s.elem==='light'&&s.level>=2);
  const lightHealPLvl=(battleState.pSyn.find(s=>s.elem==='light')||{level:0}).level;
  const lightHealELvl=(battleState.eSyn.find(s=>s.elem==='light')||{level:0}).level;

  // Earth regen synergy
  const earthRegenP=battleState.pSyn.some(s=>s.elem==='earth'&&s.level>=3);
  const earthRegenE=battleState.eElemCounts.earth>=3;

  const allUnits=[...pAlive,...eAlive];
  allUnits.forEach(u=>{
    // Status timers
    if(u.frozen){u.frozenTimer-=dt;if(u.frozenTimer<=0){u.frozen=false}}
    if(u.rooted){u.rootedTimer-=dt;if(u.rootedTimer<=0){u.rooted=false}}
    if(u.stunned){u.stunnedTimer-=dt;if(u.stunnedTimer<=0){u.stunned=false}}
    if(u.invulnTimer>0){u.invulnTimer-=dt}

    // Stealth timer
    if(u.invisTimer>0){
      u.invisTimer-=dt;
      if(u.invisTimer<=0&&(u.abilityKey==='stealth'||u.abilityKey==='killStealth')){
        u.invisible=true;
      }
    }

    if(u.frozen||u.stunned)return;

    // Teleport on first frame
    if(u._needsTeleport){
      u._needsTeleport=false;
      const enemies=u.isEnemy?pAlive:eAlive;
      const backline=enemies.filter(e=>e.gridRow===1||e.gridRow===0);
      if(backline.length){
        const target=backline[Math.floor(Math.random()*backline.length)];
        u.x=target.x+(Math.random()-.5)*20;
        u.y=target.y+(Math.random()-.5)*20;
        addParticle(u.x,u.y,'#c084fc',10,3);
        addDmgNum(u.x,u.y-25,'TELEPORT','#c084fc');
        if(u.abilityKey==='voidStep'){
          u.invulnTimer=1.0;
        }
      }
    }

    // Heal aura
    if(u.abilityKey==='healAura'||u.abilityKey==='globalHealAura'){
      const allies=u.isEnemy?eAlive:pAlive;
      const range=u.abilityKey==='globalHealAura'?9999:60;
      const healPerSec=u.abilityKey==='globalHealAura'?4:3;
      allies.filter(a=>a!==u&&a.alive&&dist(u,a)<range).forEach(a=>{
        a.curHp=Math.min(a.maxHp,a.curHp+healPerSec*dt);
      });
    }

    // Earth regen
    if((earthRegenP&&!u.isEnemy&&u.elem==='earth')||(earthRegenE&&u.isEnemy&&u.elem==='earth')){
      u.curHp=Math.min(u.maxHp,u.curHp+3*dt);
    }

    // Light synergy heal
    if(lightHealP&&!u.isEnemy){
      const rate=lightHealPLvl>=4?5:2;
      u.curHp=Math.min(u.maxHp,u.curHp+rate*dt);
    }
    if(lightHealE&&u.isEnemy){
      const rate=lightHealELvl>=4?5:2;
      u.curHp=Math.min(u.maxHp,u.curHp+rate*dt);
    }

    // Void drain (evolved Void Lord)
    if(u.abilityKey==='abyssDrain'){
      const enemies=u.isEnemy?pAlive:eAlive;
      enemies.filter(e=>e.alive&&dist(e,u)<80).forEach(e=>{
        const drain=2*dt;
        e.curHp-=drain;
        u.curHp=Math.min(u.maxHp,u.curHp+drain);
      });
    }

    // Boss special attacks
    if(u.isBoss){
      processBossAttack(u,u.isEnemy?pAlive:eAlive,dt);
    }

    const enemies=u.isEnemy?pAlive:eAlive;
    const allies=u.isEnemy?eAlive:pAlive;
    const target=findTarget(u,enemies);
    if(!target)return;

    const d=dist(u,target);
    const rangePx=u.range>0?u.range*cellW/devicePixelRatio*0.55:(u.isBoss?cellW/devicePixelRatio*0.5:cellW/devicePixelRatio*0.35);

    if(d>rangePx&&!u.rooted){
      const speed=(u.isBoss?80:120)*dt;
      const dx=target.x-u.x,dy=target.y-u.y;
      const dl=Math.sqrt(dx*dx+dy*dy)||1;
      u.x+=dx/dl*speed;
      u.y+=dy/dl*speed;
    }

    // Attack
    u.atkTimer-=dt*u.spdMult;
    if(u.atkTimer<=0&&d<=rangePx+10){
      u.atkTimer=u.spd;

      // Check if healer
      if(u.abilityKey==='healLowest'||u.abilityKey==='healTwo'){
        if(!processHealAction(u,allies,dt)){
          processAttack(u,target,allies,enemies,dt);
        }
        return;
      }
      if(u.abilityKey==='chainHeal'||u.abilityKey==='megaChainHeal'){
        processChainHeal(u,allies);
        // Also attack
        processAttack(u,target,allies,enemies,dt);
        return;
      }

      processAttack(u,target,allies,enemies,dt);
    }

    // Attack anim
    if(u.attacking){
      u.attackAnim-=dt;
      if(u.attackAnim<=0){u.attacking=false}
    }
  });

  // Burning ground
  burningGround.forEach(bg=>{
    bg.life-=dt;
    if(bg.life>0){
      addParticle(bg.x+(-10+Math.random()*20),bg.y+(-10+Math.random()*20),'#ff6b35',1,1,0.3);
      const targets=bg.side==='player'?eAlive:pAlive;
      targets.filter(t=>dist(t,bg)<25).forEach(t=>{
        t.curHp-=5*dt;
        if(t.curHp<=0&&t.alive){
          if((t.abilityKey==='revive'||t.abilityKey==='doubleRevive')&&!t.revived){t.revived=true;t.curHp=Math.round(t.maxHp*0.5);return}
          t.alive=false;t.curHp=0;playSound('death');addParticle(t.x,t.y,'#ff4444',10,3);
        }
      });
    }
  });
  for(let i=burningGround.length-1;i>=0;i--)if(burningGround[i].life<=0)burningGround.splice(i,1);

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=dt;p.vy+=2*dt});
  for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);
  projectiles.forEach(p=>p.life-=dt);
  for(let i=projectiles.length-1;i>=0;i--)if(projectiles[i].life<=0)projectiles.splice(i,1);
  dmgNums.forEach(d=>{d.y-=30*dt;d.life-=dt*1.5});
  for(let i=dmgNums.length-1;i>=0;i--)if(dmgNums[i].life<=0)dmgNums.splice(i,1);
}

function battleRender(){
  const w=cW/devicePixelRatio,h=cH/devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  // Grid lines
  ctx.strokeStyle='#1a1a30';ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(i*w/4,0);ctx.lineTo(i*w/4,h);ctx.stroke()}
  for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,i*h/5);ctx.lineTo(w,i*h/5);ctx.stroke()}

  // Middle divider
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,h*2/5);ctx.lineTo(w,h*2/5);ctx.stroke();

  ctx.fillStyle='#333';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText(battleState&&battleState.isBoss?'BOSS':'ENEMY',w/2,h*0.08);
  ctx.fillText('YOU',w/2,h*0.95);

  // Burning ground
  burningGround.forEach(bg=>{
    ctx.fillStyle='rgba(255,107,53,0.15)';
    ctx.beginPath();ctx.arc(bg.x,bg.y,20,0,Math.PI*2);ctx.fill();
  });

  // Creatures
  if(battleState){
    const all=[...battleState.player,...battleState.enemy];
    all.forEach(u=>{
      if(!u.alive)return;
      let drawX=u.x,drawY=u.y;
      if(u.attacking&&u.attackAnim>0){
        const t=u.attackAnim/0.15;
        const mx=(u.attackTargetX-u.x)*0.3*(1-Math.abs(t-0.5)*2);
        const my=(u.attackTargetY-u.y)*0.3*(1-Math.abs(t-0.5)*2);
        drawX+=mx;drawY+=my;
      }

      let radius=u.stars===1?14:u.stars===2?17:20;
      if(u.evolved)radius+=3;
      if(u.isBoss)radius=30;
      const elemColor=ELEMENTS[u.elem]?ELEMENTS[u.elem].color:'#fff';

      // Invisible rendering
      if(u.invisible){
        ctx.globalAlpha=0.2;
      }

      // Invulnerable glow
      if(u.invulnTimer>0){
        ctx.shadowColor='#c084fc';ctx.shadowBlur=15;
      }

      // Glow for starred/evolved
      if(u.stars>=2||u.evolved){
        ctx.shadowColor=elemColor;ctx.shadowBlur=u.evolved?18:u.stars===2?8:15;
      }

      // Shield visual
      if(u.shielded>0){
        ctx.strokeStyle='rgba(167,139,250,0.5)';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(drawX,drawY,radius+4,0,Math.PI*2);ctx.stroke();
      }

      // Body
      ctx.fillStyle=u.frozen?'#aaddff':elemColor;
      ctx.globalAlpha=u.invisible?0.2:(u.stunned?0.5:1);
      ctx.beginPath();ctx.arc(drawX,drawY,radius,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      ctx.shadowBlur=0;

      // Evolved ring
      if(u.evolved){
        ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.arc(drawX,drawY,radius+2,0,Math.PI*2);ctx.stroke();
        ctx.setLineDash([]);
      }

      // Emoji
      ctx.font=(u.isBoss?radius*0.7:radius*0.9)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(u.emoji,drawX,drawY+1);

      // HP bar
      const barW=radius*2;const barH=u.isBoss?5:3;const barY=drawY+radius+4;
      ctx.fillStyle='#333';
      ctx.fillRect(drawX-barW/2,barY,barW,barH);
      const hpPct=Math.max(0,u.curHp/u.maxHp);
      ctx.fillStyle=hpPct>.5?'#4ade80':hpPct>.25?'#f7c948':'#ef4444';
      ctx.fillRect(drawX-barW/2,barY,barW*hpPct,barH);

      // Shield bar overlay
      if(u.shielded>0){
        const shieldPct=Math.min(1,u.shielded/u.maxHp);
        ctx.fillStyle='rgba(167,139,250,0.6)';
        ctx.fillRect(drawX-barW/2+barW*hpPct,barY,barW*shieldPct,barH);
      }

      // Stars / Evolved
      ctx.font='8px sans-serif';ctx.fillStyle=u.evolved?'#ff44aa':'#f7c948';
      ctx.fillText(u.evolved?'EVO '+starStr(u.stars):starStr(u.stars),drawX,drawY-radius-5);

      // Boss HP text
      if(u.isBoss){
        ctx.font='bold 10px sans-serif';ctx.fillStyle='#fff';
        ctx.fillText(Math.round(u.curHp)+'/'+u.maxHp,drawX,barY+barH+10);
      }

      // Equipment indicators
      if(u.equipment){
        let eqX=drawX-radius;
        Object.values(u.equipment).forEach(eq=>{
          if(eq){
            const ed=getEquipDef(eq.eqId);
            if(ed){ctx.font='8px sans-serif';ctx.fillText(ed.emoji,eqX,drawY+radius+12);eqX+=10;}
          }
        });
      }

      // Status icons
      let statusY=drawY-radius-14;
      if(u.frozen){ctx.font='10px sans-serif';ctx.fillText('❄️',drawX,statusY);statusY-=12}
      if(u.rooted){ctx.font='10px sans-serif';ctx.fillText('🌿',drawX,statusY);statusY-=12}
      if(u.stunned){ctx.font='10px sans-serif';ctx.fillText('💫',drawX,statusY);statusY-=12}
      if(u.invisible){ctx.font='10px sans-serif';ctx.globalAlpha=0.5;ctx.fillText('👁️',drawX,statusY);ctx.globalAlpha=1;statusY-=12}
      if(u.invulnTimer>0){ctx.font='10px sans-serif';ctx.fillText('🛡️',drawX,statusY)}
    });
  }

  // Projectiles
  projectiles.forEach(p=>{
    const t=1-p.life/0.2;
    const px=p.x+(p.tx-p.x)*t;
    const py=p.y+(p.ty-p.y)*t;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Damage numbers
  dmgNums.forEach(d=>{
    ctx.globalAlpha=Math.max(0,d.life);
    ctx.font=d.big?'bold 16px sans-serif':'bold 12px sans-serif';
    ctx.fillStyle=d.color;ctx.textAlign='center';
    ctx.fillText(d.val,d.x,d.y);
  });
  ctx.globalAlpha=1;
}

let lastBattleTime=0;
function battleLoop(ts){
  if(G.phase!=='battle'){return}
  const rawDt=Math.min((ts-lastBattleTime)/1000,0.05);
  lastBattleTime=ts;
  const dt=rawDt*battleSpeed;
  battleUpdate(dt);
  battleRender();
  if(battleState&&battleState.done){
    setTimeout(endBattle,600);
    return;
  }
  battleRAF=requestAnimationFrame(battleLoop);
}

function endBattle(){
  const won=battleState.winner==='player';
  const node=G.campaign[G.currentNode];
  const isBoss=node.type==='boss';
  const surviving=won?0:battleState.enemy.filter(e=>e.alive).length;
  G.history.push(won?'win':'loss');

  // Collect gold earned from equipment kills
  let bonusGold=0;
  battleState.player.forEach(u=>{bonusGold+=u.goldEarned||0});

  if(won){
    G.winStreak++;G.loseStreak=0;
    playSound('win');
    showFlash('VICTORY!','#4ade80');
    node.completed=true;

    // Income
    const baseIncome=Math.min(5,G.currentNode+1);
    const interest=Math.min(5,Math.floor(G.gold*0.1));
    const streakBonus=Math.min(3,G.winStreak>1?G.winStreak-1:0);
    const roundBonus=1;
    const bossBonus=isBoss?5:0;
    const total=baseIncome+interest+streakBonus+roundBonus+bossBonus+bonusGold;
    G.lastIncome={base:baseIncome,interest,streak:streakBonus,round:roundBonus,boss:bossBonus,kills:bonusGold,total};
    G.gold+=total;

    // Boss loot drop
    if(isBoss){
      const bd=BOSS_DEFS.find(b=>b.id===node.bossId);
      if(bd&&bd.loot){
        const lootItems=bd.loot.map(eqId=>({eqId,uid:'eq_'+Math.random().toString(36).slice(2,9)}));
        G.pendingLoot=lootItems;
      }
    }else if(G.currentNode>=4&&Math.random()<0.3){
      // Random equipment drop after node 5
      const eqPool=EQUIPMENT_DEFS.filter(e=>G.currentNode>=10||e.rarity!=='epic');
      const drop=eqPool[Math.floor(Math.random()*eqPool.length)];
      G.pendingLoot=[{eqId:drop.id,uid:'eq_'+Math.random().toString(36).slice(2,9)}];
    }

    // Advance to next node
    if(G.currentNode<19){
      G.currentNode++;
    }else{
      // Completed campaign!
      G.gameOver=true;G.won=true;
      if(G.currentNode+1>G.highScore){G.highScore=G.currentNode+1;localStorage.setItem('autobattle2-highscore',G.highScore)}
      renderUI();showGameOver();saveGame();return;
    }
  }else{
    G.hp-=Math.max(1,surviving*2);
    G.loseStreak++;G.winStreak=0;
    playSound('lose');
    showFlash('DEFEAT -'+Math.max(1,surviving*2)+'HP','#ef4444');
    // Still advance on loss but take damage
    if(G.currentNode<19)G.currentNode++;
  }

  if(G.hp<=0){
    G.hp=0;G.gameOver=true;G.won=false;
    if(G.currentNode>G.highScore){G.highScore=G.currentNode;localStorage.setItem('autobattle2-highscore',G.highScore)}
    renderUI();showGameOver();saveGame();return;
  }

  if(G.currentNode>G.highScore){G.highScore=G.currentNode;localStorage.setItem('autobattle2-highscore',G.highScore)}

  G.phase='map';
  battleState=null;
  document.getElementById('speed-btn').style.display='none';

  // Show loot if any
  if(G.pendingLoot){
    showLootScreen(G.pendingLoot);
    G.pendingLoot=null;

// ========== RENDER SHOP CANVAS (idle view) ==========
function renderShopCanvas(){
  resizeCanvas();
  const w=cW/devicePixelRatio,h=cH/devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  ctx.strokeStyle='#1a1a30';ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(i*w/4,0);ctx.lineTo(i*w/4,h);ctx.stroke()}
  for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,i*h/5);ctx.lineTo(w,i*h/5);ctx.stroke()}

  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,h*2/5);ctx.lineTo(w,h*2/5);ctx.stroke();

  ctx.fillStyle='#444';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('ENEMY SIDE',w/2,h*0.08);
  ctx.fillText('YOUR GRID',w/2,h*0.95);

  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{
    if(!c)return;
    const pos=gridToPixel(ci,r,false);
    let radius=c.stars===1?14:c.stars===2?17:20;
    if(c.evolved)radius+=3;
    const elemColor=ELEMENTS[c.elem].color;
    if(c.stars>=2||c.evolved){ctx.shadowColor=elemColor;ctx.shadowBlur=c.evolved?18:c.stars===2?8:15}
    ctx.fillStyle=elemColor;
    ctx.beginPath();ctx.arc(pos.x,pos.y,radius,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    if(c.evolved){
      ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.arc(pos.x,pos.y,radius+2,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.font=(radius*0.9)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.emoji,pos.x,pos.y+1);
    ctx.font='8px sans-serif';ctx.fillStyle=c.evolved?'#ff44aa':'#f7c948';
    ctx.fillText(c.evolved?'EVO':starStr(c.stars),pos.x,pos.y-radius-5);
    const barW=radius*2,barH=3,barY=pos.y+radius+4;
    ctx.fillStyle='#333';ctx.fillRect(pos.x-barW/2,barY,barW,barH);
    ctx.fillStyle='#4ade80';ctx.fillRect(pos.x-barW/2,barY,barW,barH);
    // Equipment dots
    if(c.equipment){
      let eqX=pos.x-8;
      Object.values(c.equipment).forEach(eq=>{
        if(eq){
          const ed=getEquipDef(eq.eqId);
          if(ed){ctx.font='7px sans-serif';ctx.fillText(ed.emoji,eqX,pos.y+radius+12);eqX+=8;}
        }
      });
    }
  }));

  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{
    if(c)return;
    const pos=gridToPixel(ci,r,false);
    ctx.strokeStyle='#2a2a45';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(pos.x,pos.y,14,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }));
}

    <span class="gold-display">💰 ${G.gold}</span>
    <span class="streak-display">${G.winStreak>1?'🔥'+G.winStreak:G.loseStreak>1?'💀'+G.loseStreak:''}</span>`;

window.clickNode=function(idx){
  if(idx!==G.currentNode)return;
  ensureAudio();
  const node=G.campaign[idx];

  if(node.type==='shop'){
    G.phase='shop';
    rollShop();
    renderUI();
    renderShopCanvas();
  }else if(node.type==='treasure'){
    // Treasure: give gold + possible equipment
    const goldAmt=node.goldReward||10;
    G.gold+=goldAmt;
    playSound('coin');
    showFlash('+'+goldAmt+' GOLD','#f7c948');
    node.completed=true;
    if(Math.random()<0.5&&G.currentNode>=4){
      const eqPool=EQUIPMENT_DEFS.filter(e=>G.currentNode>=10||e.rarity!=='epic');
      const drop=eqPool[Math.floor(Math.random()*eqPool.length)];
      G.pendingLoot=[{eqId:drop.id,uid:'eq_'+Math.random().toString(36).slice(2,9)}];
      G.currentNode++;
      showLootScreen(G.pendingLoot);
      G.pendingLoot=null;
    }else{
      G.currentNode++;
      saveGame();
      renderUI();
      renderShopCanvas();
    }
  }else if(node.type==='rest'){
    showRestScreen();
  }else{
    // Battle or boss
    const creatures=G.grid.flat().filter(Boolean);
    if(!creatures.length){
      showFlash('Place creatures!','#f7c948');
      return;
    }
    G.selectedSlot=null;G.selectedEquip=null;
    lastBattleTime=performance.now();
    startBattle();
  }
};

function renderGridSlots(){

      const clickHandler=eqSel?'equipToCreature(\'grid\','+r+','+ci+')':'clickSlot(\'grid\','+r+','+ci+')';
      let html='<div class="grid-slot'+(c?' occupied':'')+(sel?' selected-slot':'')+'" style="'+(c?'border-color:'+ELEMENTS[c.elem].color+'66':'')+'" onclick="'+clickHandler+'" oncontextmenu="event.preventDefault();showCreatureTooltip(event,\'grid\','+r+','+ci+')">';

        html+='<span class="slot-stars">'+(c.evolved?'EVO':starStr(c.stars))+'</span>';

// ========== EVOLUTION ==========
function canEvolveCreature(c){
  if(!c||c.stars!==3||c.evolved)return false;
  // Need 50 gold + the creature must exist (simplified: just gold cost)
  return G.gold>=50;
}

window.evolveCreature=function(type,a,b){
  let c;
  if(type==='bench')c=G.bench[a];
  else c=G.grid[a][b];
  if(!c||c.stars!==3||c.evolved)return;
  if(G.gold<50)return;
  G.gold-=50;
  const evolved=makeCreature(c.defId,3,true);
  evolved.equipment=c.equipment;
  if(type==='bench')G.bench[a]=evolved;
  else G.grid[a][b]=evolved;
  playSound('evolve');
  showFlash('EVOLVED!','#ff44aa');
  renderUI();
  renderShopCanvas();
  saveGame();
};

// ========== EQUIPMENT ==========
window.selectEquip=function(idx){
  if(G.selectedEquip===idx){
    G.selectedEquip=null;
  }else{
    G.selectedEquip=idx;
    G.selectedSlot=null;
  }
  renderUI();
  renderShopCanvas();
};

window.equipToCreature=function(type,a,b){
  if(G.selectedEquip===null)return;
  let c;
  if(type==='bench')c=G.bench[a];
  else c=G.grid[a][b];
  if(!c){G.selectedEquip=null;renderUI();return}

  const item=G.equipmentInv[G.selectedEquip];
  const ed=getEquipDef(item.eqId);

  // Check if slot is occupied
  if(c.equipment[ed.slot]){
    // Swap back to inventory
    G.equipmentInv.push(c.equipment[ed.slot]);
  }
  c.equipment[ed.slot]=item;
  G.equipmentInv.splice(G.selectedEquip,1);

  // Update creature stats display
  const es=getCreatureStats(c);
  c.hp=es.hp;c.maxHp=es.hp;c.atk=es.atk;

  G.selectedEquip=null;
  playSound('equip');
  renderUI();
  renderShopCanvas();
  saveGame();
};

  setTimeout(()=>hideTooltip(),3000);

function positionTooltip(event,tip){
  tip.style.display='block';
  let x=event.clientX+10,y=event.clientY-10;
  if(x+220>window.innerWidth)x=event.clientX-220;
  if(y+150>window.innerHeight)y=event.clientY-150;
  tip.style.left=x+'px';tip.style.top=y+'px';
}

function hideTooltip(){document.getElementById('tooltip').style.display='none'}

// ========== GAME ACTIONS ==========
window.buyCreature=function(idx){
  if(G.shopSold[idx])return;
  const defId=G.shop[idx];
  const d=getCreatureDef(defId);
  if(G.gold<d.cost)return;

  let placed=false;
  for(let r=0;r<2&&!placed;r++){
    for(let c=0;c<4&&!placed;c++){
      if(!G.grid[r][c]){
        G.grid[r][c]=makeCreature(defId);
        placed=true;
      }
    }
  }
  if(!placed){
    for(let i=0;i<6&&!placed;i++){
      if(!G.bench[i]){
        G.bench[i]=makeCreature(defId);
        placed=true;
      }
    }
  }
  if(!placed)return;

  G.gold-=d.cost;
  G.shopSold[idx]=true;
  playSound('buy');
  tryCombine();
  renderUI();
  renderShopCanvas();
};

window.clickSlot=function(type,a,b){
  G.selectedEquip=null;
  const sel=G.selectedSlot;
  if(!sel){
    let c;
    if(type==='bench')c=G.bench[a];
    else c=G.grid[a][b];
    if(c){
      G.selectedSlot={type,idx:type==='bench'?a:undefined,row:type==='grid'?a:undefined,col:type==='grid'?b:undefined};
      renderUI();renderShopCanvas();
    }
    return;
  }

  if((sel.type==='bench'&&type==='bench'&&sel.idx===a)||(sel.type==='grid'&&type==='grid'&&sel.row===a&&sel.col===b)){
    G.selectedSlot=null;renderUI();renderShopCanvas();return;
  }

  let srcC,dstC;
  if(sel.type==='bench')srcC=G.bench[sel.idx];
  else srcC=G.grid[sel.row][sel.col];
  if(type==='bench')dstC=G.bench[a];
  else dstC=G.grid[a][b];

  if(sel.type==='bench'&&type==='bench'){
    G.bench[sel.idx]=dstC;G.bench[a]=srcC;
  }else if(sel.type==='grid'&&type==='grid'){
    G.grid[sel.row][sel.col]=dstC;G.grid[a][b]=srcC;
  }else if(sel.type==='bench'&&type==='grid'){
    G.bench[sel.idx]=dstC;G.grid[a][b]=srcC;
  }else{
    G.grid[sel.row][sel.col]=dstC;G.bench[a]=srcC;
  }

  G.selectedSlot=null;
  tryCombine();
  renderUI();renderShopCanvas();
};

window.sellSelected=function(){
  if(!G.selectedSlot)return;
  const sel=G.selectedSlot;
  let c;
  if(sel.type==='bench'){c=G.bench[sel.idx];G.bench[sel.idx]=null}
  else{c=G.grid[sel.row][sel.col];G.grid[sel.row][sel.col]=null}
  if(c){
    G.gold+=c.cost*c.stars;
    // Return equipment
    if(c.equipment){
      Object.values(c.equipment).forEach(eq=>{
        if(eq)G.equipmentInv.push(eq);
      });
    }
    playSound('sell');
  }
  G.selectedSlot=null;
  renderUI();renderShopCanvas();
};

window.refreshShop=function(){
  if(G.gold<2)return;
  G.gold-=2;
  G.shopLocked=false;
  rollShop();
  playSound('buy');
  renderUI();
};

window.toggleLock=function(){
  G.shopLocked=!G.shopLocked;
  renderUI();
};

window.startBattleFromShop=function(){
  ensureAudio();
  const creatures=G.grid.flat().filter(Boolean);
  if(!creatures.length){
    showFlash('Place creatures!','#f7c948');
    return;
  }
  G.selectedSlot=null;G.selectedEquip=null;
  G.campaign[G.currentNode].completed=true;
  // Don't advance node, that happens after battle
  // Mark shop as done, go to battle on the NEXT node which is the battle
  G.currentNode++;
  const node=G.campaign[G.currentNode];
  if(!node||node.type==='shop'||node.type==='treasure'||node.type==='rest'){
    // Next node is not a battle, go to map
    G.phase='map';
    rollShop();
    saveGame();
    renderUI();
    renderShopCanvas();
    return;
  }
  lastBattleTime=performance.now();
  startBattle();
};

window.toggleSpeed=function(){
  battleSpeed=battleSpeed===1?2:battleSpeed===2?4:1;
  document.getElementById('speed-btn').textContent=battleSpeed+'x';
};

window.newGame=function(){
  document.getElementById('game-over').style.display='none';
  document.getElementById('loot-overlay').style.display='none';
  document.getElementById('rest-overlay').style.display='none';
  G={
    phase:'map',hp:100,gold:5,
    bench:[null,null,null,null,null,null],
    grid:[[null,null,null,null],[null,null,null,null]],
    shop:[],shopLocked:false,shopSold:[false,false,false,false,false],
    winStreak:0,loseStreak:0,
    history:[],highScore:G.highScore||parseInt(localStorage.getItem('autobattle2-highscore'))||0,
    selectedSlot:null,selectedEquip:null,
    gameOver:false,won:false,
    campaign:generateCampaignMap(),
    currentNode:0,
    equipmentInv:[],
    lastIncome:null,
    pendingLoot:null,
    battleSpeed:1
  };
  battleSpeed=1;
  battleState=null;
  document.getElementById('speed-btn').style.display='none';
  renderUI();
  renderShopCanvas();
  localStorage.removeItem('autobattle2-save');
};

// ========== SAVE/LOAD ==========
function saveGame(){
  try{
    const s={
      phase:G.phase,hp:G.hp,gold:G.gold,bench:G.bench,grid:G.grid,
      shop:G.shop,shopLocked:G.shopLocked,shopSold:G.shopSold,
      winStreak:G.winStreak,loseStreak:G.loseStreak,history:G.history,
      lastIncome:G.lastIncome,campaign:G.campaign,currentNode:G.currentNode,
      equipmentInv:G.equipmentInv
    };
    localStorage.setItem('autobattle2-save',JSON.stringify(s));
  }catch(e){}
}

function loadGame(){
  try{
    const raw=localStorage.getItem('autobattle2-save');
    if(!raw)return false;
    const s=JSON.parse(raw);
    G.phase=s.phase||'map';G.hp=s.hp;G.gold=s.gold;G.bench=s.bench;G.grid=s.grid;
    G.shop=s.shop||[];G.shopLocked=s.shopLocked;G.shopSold=s.shopSold||[false,false,false,false,false];
    G.winStreak=s.winStreak;G.loseStreak=s.loseStreak;G.history=s.history||[];
    G.lastIncome=s.lastIncome;G.campaign=s.campaign||generateCampaignMap();
    G.currentNode=s.currentNode||0;G.equipmentInv=s.equipmentInv||[];
    G.gameOver=false;G.won=false;G.selectedSlot=null;G.selectedEquip=null;
    if(G.phase==='battle')G.phase='map'; // Don't resume mid-battle
    return true;
  }catch(e){return false}
}

// ========== INIT ==========
function init(){
  window.addEventListener('resize',()=>{if(G.phase!=='battle')renderShopCanvas()});
  canvas.addEventListener('click',hideTooltip);
  document.addEventListener('click',e=>{
    if(!e.target.closest('.tooltip')&&!e.target.closest('.shop-card')&&!e.target.closest('.bench-slot')&&!e.target.closest('.grid-slot')&&!e.target.closest('.equip-item')){
      hideTooltip();
    }
  });

  if(!loadGame()){
    // Give first shop for free
  }
  renderUI();
  setTimeout(()=>renderShopCanvas(),50);
}

window.showCreatureTooltip=showCreatureTooltip;

init();
})();
</script>
</body>
</html>
