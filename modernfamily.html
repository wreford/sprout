<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Modern Family Escape Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0e8d8;font-family:'Comic Sans MS','Chalkboard SE','Marker Felt',cursive;overflow:hidden;width:100vw;height:100vh;touch-action:none}

/* Lock to portrait — show rotate message in landscape */
#rotate-msg{display:none;position:fixed;inset:0;z-index:9999;background:#f0e8d8;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;font-size:24px;color:#804020}
#rotate-msg .icon{font-size:60px;margin-bottom:16px;animation:rotSpin 2s ease-in-out infinite}
@keyframes rotSpin{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media(orientation:landscape) and (max-height:500px){
  #rotate-msg{display:flex!important}
  #game-canvas,#svg-layer,#ui-layer,#start-screen,#victory-screen{display:none!important}
}
#game-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.clickable{pointer-events:all!important;cursor:pointer;-webkit-tap-highlight-color:rgba(255,215,0,0.3);touch-action:manipulation}
.item-glow,.item-bg{pointer-events:none!important}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
#ui-layer #dialogue-box,#ui-layer #monologue-box,#ui-layer #watch-hud,#ui-layer #watch-expanded,#ui-layer #arrow-left,#ui-layer #arrow-right,#ui-layer #notification,#ui-layer #hint-btn,#ui-layer .close-btn{pointer-events:auto}
#dialogue-box{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:min(92vw,620px);background:rgba(255,255,240,0.97);border:4px solid #333;border-radius:18px;padding:22px 26px;font-size:18px;line-height:1.6;min-height:100px;display:none;z-index:10;box-shadow:4px 4px 0 rgba(0,0,0,0.15);cursor:pointer}
#dialogue-box .speaker{font-weight:bold;font-size:17px;margin-bottom:6px;color:#c04040}
#dialogue-box .text{color:#333}
#dialogue-box .hint{font-size:11px;color:#999;margin-top:8px;text-align:right}
#monologue-box{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:min(88vw,520px);background:rgba(255,210,240,0.95);border:3px dashed #e080b0;border-radius:14px;padding:16px 20px;font-size:16px;font-style:italic;color:#b04080;display:none;z-index:10;text-align:center}
#watch-hud{position:absolute;top:8px;right:8px;width:44px;z-index:20;opacity:0.7;transition:opacity 0.2s}
#watch-hud:hover,#watch-hud.watch-active{opacity:1}
#watch-face{width:44px;height:54px;cursor:pointer;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4))}
#watch-expanded{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,28,30,0.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:0;padding:24px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));color:#fff;font-family:-apple-system,system-ui,sans-serif;font-size:15px;display:none;z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch}
#watch-expanded .we-close{position:absolute;top:max(12px,env(safe-area-inset-top));right:12px;width:44px;height:44px;border-radius:22px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#watch-expanded .inv-title{color:rgba(255,255,255,0.5);font-size:12px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
#watch-expanded .inv-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.08);color:#fff;font-size:16px}
#watch-expanded .inv-item:last-child{border-bottom:none}
#watch-expanded .watch-time{font-size:48px;font-weight:700;text-align:center;margin:10px 0 4px;color:#fff;letter-spacing:-1px}
#watch-expanded .watch-room{font-size:14px;text-align:center;color:rgba(255,255,255,0.5);margin-bottom:8px;font-weight:500}
#watch-expanded .hint-btn{background:rgba(255,107,53,0.9);border:none;color:#fff;padding:14px;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;width:100%;text-align:center;min-height:50px;transition:background 0.15s}
#watch-expanded .hint-btn:hover{background:rgba(255,107,53,1)}
#watch-expanded .hint-btn:disabled{opacity:0.3;cursor:default;background:rgba(255,255,255,0.1)}
#notification{position:absolute;top:-60px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.93);color:#0f0;font-family:'Courier New',monospace;font-size:14px;padding:10px 20px;border-radius:14px;border:2px solid #0a0;z-index:25;transition:top 0.4s cubic-bezier(0.25,1,0.5,1);white-space:nowrap}
#notification.notif-show{top:14px}
@keyframes notifPop{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes itemFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}40%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-80%) scale(0.8)}}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
#room-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:bold;color:#804020;text-shadow:2px 2px 0 rgba(255,255,255,0.7);z-index:10;padding:8px 22px;background:rgba(255,255,240,0.85);border-radius:12px;border:3px solid #c09060;white-space:nowrap;text-align:center}
#puzzle-modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(90vw,440px);background:#fffff0;border:5px solid #333;border-radius:20px;padding:24px;display:none;z-index:30;box-shadow:6px 6px 0 rgba(0,0,0,0.2)}
#puzzle-modal h3{font-size:18px;color:#804020;margin-bottom:12px;text-align:center}
#puzzle-modal .puzzle-desc{font-size:14px;color:#555;margin-bottom:16px;line-height:1.5}
#puzzle-modal input{width:100%;padding:16px;font-size:20px;font-family:'Comic Sans MS',cursive;border:3px solid #aaa;border-radius:12px;text-align:center;margin-bottom:14px}
#puzzle-modal button{width:100%;padding:14px;font-size:18px;font-family:'Comic Sans MS',cursive;background:#60a060;color:#fff;border:3px solid #408040;border-radius:12px;cursor:pointer;min-height:50px}
#puzzle-modal button:hover{background:#50b050}
#puzzle-modal .close-btn{position:absolute;top:8px;right:14px;font-size:24px;cursor:pointer;color:#aaa;background:none;border:none;width:auto;padding:0}
#puzzle-modal .close-btn:hover{color:#f00}
#puzzle-modal .puzzle-feedback{font-size:14px;margin-top:8px;text-align:center;min-height:20px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:28;display:none}
#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#f0e8d8;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#start-screen h1{font-size:min(8vw,42px);color:#c04040;text-shadow:3px 3px 0 #fcc;margin-bottom:8px}
#start-screen h2{font-size:min(4vw,20px);color:#804020;margin-bottom:30px;font-weight:normal}
#start-screen .start-btn{padding:16px 40px;font-size:22px;font-family:'Comic Sans MS',cursive;background:#60a060;color:#fff;border:4px solid #408040;border-radius:16px;cursor:pointer;margin:10px;box-shadow:4px 4px 0 rgba(0,0,0,0.2);touch-action:manipulation}
#start-screen .start-btn:hover{background:#50b050;transform:translateY(-2px)}
#start-screen .resume-btn{background:#4080c0;border-color:#306090}
#start-screen .resume-btn:hover{background:#3070b0}
#start-screen .subtitle{font-size:14px;color:#888;margin-top:20px}
#victory-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,200,0.97);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#victory-screen h1{font-size:36px;color:#c04040}
#victory-screen p{font-size:18px;color:#555;margin:10px 0;max-width:500px}
.clickable{cursor:pointer}
.clickable:hover{filter:brightness(1.15)}
#arrow-left,#arrow-right{position:absolute;bottom:72px;width:44px;height:44px;z-index:12;cursor:pointer;opacity:0.7;transition:opacity 0.15s,transform 0.1s;border-radius:50%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#arrow-left:active,#arrow-right:active{transform:scale(0.9);opacity:1}
#arrow-left{left:8px}
#arrow-right{right:8px}
#inv-bar{position:absolute;bottom:0;left:0;right:0;height:58px;background:rgba(30,20,10,0.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:2px solid rgba(255,200,100,0.2);display:none;align-items:center;padding:4px 10px;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;z-index:11;scrollbar-width:none}
#inv-bar::-webkit-scrollbar{display:none}
.inv-slot{width:44px;height:44px;flex-shrink:0;background:rgba(255,240,200,0.08);border:2px solid rgba(255,200,100,0.2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.12s;touch-action:manipulation;position:relative}
.inv-slot:active{border-color:#ffd700;background:rgba(255,240,200,0.2);transform:scale(1.1)}
.inv-slot .inv-label{font-size:6px;color:rgba(255,255,255,0.5);position:absolute;bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42px;text-align:center;font-family:-apple-system,system-ui,sans-serif}
.room-fade-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:8;pointer-events:none;opacity:0;transition:opacity 0.25s ease}
.room-fade-overlay.active{opacity:1}
</style>
</head>
<body>

<div id="rotate-msg"><div class="icon">📱</div>Please rotate to portrait mode!<div style="font-size:14px;color:#aaa;margin-top:12px">This game is designed for portrait</div></div>

<canvas id="game-canvas"></canvas>
<svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
<div id="ui-layer">
  <div id="room-label"></div>
  <div id="dialogue-box"><div class="speaker"></div><div class="text"></div><div class="hint">tap to continue</div></div>
  <div id="monologue-box"></div>
  <div id="notification"></div>
  <div id="watch-hud"><svg id="watch-face" viewBox="0 0 110 140"></svg></div>
  <div id="watch-expanded">
    <button class="we-close" onclick="closeWatch()" ontouchend="event.preventDefault();closeWatch();" aria-label="Close">&times;</button>
    <div class="watch-time" id="we-time"></div>
    <div class="watch-room" id="we-room"></div>
    <div class="inv-title">INVENTORY</div>
    <div id="we-inventory"></div>
    <button class="hint-btn" id="hint-btn">USE HINT (3 left)</button>
  </div>
  <div id="arrow-left" style="display:none" role="button" aria-label="Previous room">&#x25C0;</div>
  <div id="arrow-right" style="display:none" role="button" aria-label="Next room">&#x25B6;</div>
  <div id="objective-text" style="position:absolute;top:42px;left:50%;transform:translateX(-50%);font-size:13px;color:#a06830;z-index:10;text-align:center;background:rgba(255,255,240,0.7);padding:3px 14px;border-radius:8px;display:none;white-space:nowrap"></div>
  <div id="progress-bar" style="position:absolute;top:72px;left:50%;transform:translateX(-50%);font-size:12px;color:#888;z-index:10;text-align:center;display:none"></div>
  <div id="inv-bar"></div>
  <div id="room-fade" class="room-fade-overlay"></div>
</div>
<div id="overlay"></div>
<div id="puzzle-modal">
  <button class="close-btn" onclick="closePuzzle()" ontouchend="event.preventDefault();closePuzzle();">&times;</button>
  <h3 id="puzzle-title"></h3>
  <div class="puzzle-desc" id="puzzle-desc"></div>
  <input id="puzzle-input" autocomplete="off" spellcheck="false">
  <button id="puzzle-submit" onclick="submitPuzzle()">SUBMIT</button>
  <div class="puzzle-feedback" id="puzzle-feedback"></div>
</div>
<div id="start-screen">
  <svg viewBox="0 0 400 700" style="width:min(95vw,400px);height:auto;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <style>
        .crayon{stroke:#222;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
        .crayon-thin{stroke:#222;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .crayon-thk{stroke:#222;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}
      </style>
    </defs>

    <!-- SKY: light blue scribbly background -->
    <rect x="0" y="0" width="400" height="700" fill="#b0daf8" rx="6"/>
    <path d="M0,10 Q50,5 100,12 Q200,2 300,14 Q350,6 400,10 L400,0 L0,0Z" fill="#9ad0f5" opacity="0.5"/>
    <path d="M0,30 Q80,22 160,32 Q260,20 400,35" fill="none" stroke="#8ac4f0" stroke-width="8" opacity="0.3"/>
    <path d="M0,55 Q120,45 200,58 Q300,48 400,55" fill="none" stroke="#7cb8e8" stroke-width="6" opacity="0.2"/>

    <!-- SUN with sunglasses (top left) -->
    <g transform="translate(55,55)">
      <!-- Rays -->
      <line x1="0" y1="-44" x2="2" y2="-60" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="30" y1="-32" x2="44" y2="-46" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="44" y1="-2" x2="61" y2="-4" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="32" y1="28" x2="46" y2="40" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-2" y1="43" x2="-4" y2="59" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-32" y1="28" x2="-46" y2="42" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-44" y1="-1" x2="-60" y2="1" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-31" y1="-33" x2="-45" y2="-47" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <!-- Sun face -->
      <circle cx="0" cy="0" r="30" fill="#ffe23c" class="crayon"/>
      <!-- Sunglasses -->
      <rect x="-20" y="-10" width="16" height="11" rx="3" fill="#222" stroke="#111" stroke-width="2"/>
      <rect x="5" y="-10" width="16" height="11" rx="3" fill="#222" stroke="#111" stroke-width="2"/>
      <line x1="-4" y1="-5" x2="5" y2="-5" stroke="#222" stroke-width="2.5"/>
      <line x1="-20" y1="-5" x2="-28" y2="-9" stroke="#222" stroke-width="2"/>
      <line x1="21" y1="-5" x2="29" y2="-9" stroke="#222" stroke-width="2"/>
      <!-- Grin -->
      <path d="M-12,10 Q0,22 12,10" fill="none" stroke="#c08020" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- FLYING PIG (top right) -->
    <g transform="translate(330,50)">
      <!-- Body -->
      <ellipse cx="0" cy="5" rx="22" ry="15" fill="#ffaacc" class="crayon"/>
      <!-- Wings -->
      <path d="M-12,-8 Q-20,-26 -5,-20 Q5,-30 10,-12" fill="#ffd0e8" class="crayon-thin"/>
      <path d="M8,-8 Q14,-28 22,-18 Q30,-28 25,-10" fill="#ffd0e8" class="crayon-thin"/>
      <!-- Snout -->
      <ellipse cx="20" cy="6" rx="8" ry="6" fill="#ff88aa" class="crayon-thin"/>
      <circle cx="18" cy="5" r="1.5" fill="#c06080"/>
      <circle cx="22" cy="5" r="1.5" fill="#c06080"/>
      <!-- Eyes (googly) -->
      <circle cx="-4" cy="-2" r="5" fill="#fff" stroke="#222" stroke-width="1.5"/>
      <circle cx="-3" cy="-1" r="2.5" fill="#111"/>
      <circle cx="8" cy="-2" r="5" fill="#fff" stroke="#222" stroke-width="1.5"/>
      <circle cx="9" cy="-1" r="2.5" fill="#111"/>
      <!-- Tail -->
      <path d="M-22,3 Q-30,0 -28,-8 Q-26,-2 -24,6" fill="none" stroke="#ff88aa" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="-10" y1="18" x2="-12" y2="28" stroke="#ff88aa" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="19" x2="-1" y2="29" stroke="#ff88aa" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="18" x2="11" y2="28" stroke="#ff88aa" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- UFO with green alien (left side) -->
    <g transform="translate(42,145)">
      <!-- Beam of light -->
      <path d="M-5,15 L-22,65 L22,65 L5,15 Z" fill="#aaf8aa" opacity="0.25"/>
      <!-- Saucer bottom -->
      <ellipse cx="0" cy="12" rx="32" ry="8" fill="#b0b0b8" class="crayon"/>
      <!-- Dome -->
      <path d="M-18,8 Q-16,-16 0,-20 Q16,-16 18,8" fill="#80d8f8" class="crayon" fill-opacity="0.6"/>
      <!-- Alien face inside dome -->
      <ellipse cx="0" cy="-4" rx="8" ry="9" fill="#44cc44" stroke="#228822" stroke-width="1.5"/>
      <!-- Alien eyes (googly) -->
      <circle cx="-4" cy="-6" r="4" fill="#fff" stroke="#222" stroke-width="1"/>
      <circle cx="-3" cy="-5" r="2" fill="#111"/>
      <circle cx="4" cy="-6" r="4" fill="#fff" stroke="#222" stroke-width="1"/>
      <circle cx="5" cy="-5" r="2" fill="#111"/>
      <!-- Alien mouth -->
      <ellipse cx="0" cy="2" rx="3" ry="2" fill="#228822"/>
      <!-- Saucer lights -->
      <circle cx="-18" cy="12" r="3" fill="#ff4444"/>
      <circle cx="0" cy="14" r="3" fill="#ffee44"/>
      <circle cx="18" cy="12" r="3" fill="#44ff44"/>
    </g>

    <!-- GOLDEN KEY (right of title) -->
    <g transform="translate(360,175) rotate(20)">
      <circle cx="0" cy="0" r="9" fill="#ffd700" class="crayon"/>
      <circle cx="0" cy="0" r="4" fill="#b8960c" stroke="none"/>
      <line x1="0" y1="9" x2="0" y2="32" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
      <line x1="0" y1="26" x2="7" y2="26" stroke="#ffd700" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="0" y1="32" x2="6" y2="32" stroke="#ffd700" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- "MODERN FAMILY" rainbow crayon text -->
    <g transform="translate(200,185)">
      <text x="-140" y="0" font-size="34" font-family="Comic Sans MS,Chalkboard SE,cursive" font-weight="bold" stroke-width="1.5" stroke-linecap="round">
        <tspan fill="#8833aa" stroke="#6622aa">M</tspan><tspan fill="#ff8822" stroke="#cc6600">O</tspan><tspan fill="#33aa33" stroke="#228822">D</tspan><tspan fill="#ee3333" stroke="#cc2222">E</tspan><tspan fill="#3366ee" stroke="#2244cc">R</tspan><tspan fill="#886633" stroke="#664422">N</tspan>
      </text>
      <text x="-120" y="38" font-size="34" font-family="Comic Sans MS,Chalkboard SE,cursive" font-weight="bold" stroke-width="1.5" stroke-linecap="round">
        <tspan fill="#ee3333" stroke="#cc2222">F</tspan><tspan fill="#33aa33" stroke="#228822">A</tspan><tspan fill="#3366ee" stroke="#2244cc">M</tspan><tspan fill="#ff8822" stroke="#cc6600">I</tspan><tspan fill="#886633" stroke="#664422">L</tspan><tspan fill="#8833aa" stroke="#6622aa">Y</tspan>
      </text>
    </g>

    <!-- "ESCAPE ROOM" text -->
    <text x="200" y="245" text-anchor="middle" font-size="20" font-family="Comic Sans MS,Chalkboard SE,cursive" font-weight="bold" fill="#222" stroke="#222" stroke-width="0.5">ESCAPE ROOM</text>

    <!-- YELLOW HOUSE with red roof -->
    <g transform="translate(200,350)">
      <!-- House body -->
      <rect x="-55" y="-30" width="110" height="80" fill="#ffe84c" class="crayon"/>
      <!-- Roof -->
      <path d="M-65,-30 L0,-72 L65,-30 Z" fill="#ee3333" class="crayon"/>
      <!-- Chimney -->
      <rect x="25" y="-65" width="14" height="25" fill="#aa5533" class="crayon-thin"/>
      <!-- Smoke puffs -->
      <circle cx="32" cy="-72" r="4" fill="#ccc" opacity="0.5"/>
      <circle cx="36" cy="-80" r="5" fill="#bbb" opacity="0.4"/>
      <!-- Black cat on roof -->
      <g transform="translate(-30,-50)">
        <ellipse cx="0" cy="3" rx="7" ry="5" fill="#222"/>
        <circle cx="0" cy="-4" r="5" fill="#222"/>
        <polygon points="-5,-8 -3,-14 0,-7" fill="#222"/>
        <polygon points="5,-8 3,-14 0,-7" fill="#222"/>
        <circle cx="-2" cy="-5" r="1.5" fill="#44ff44"/>
        <circle cx="3" cy="-5" r="1.5" fill="#44ff44"/>
        <path d="M7,4 Q14,0 18,5" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
      </g>
      <!-- Purple door -->

// ── NES-style pixel background drawing ──
function drawRoom(){
  if(!G.gameStarted) return;
  const W=canvas.width, H=canvas.height;
  const ps = Math.max(4, Math.floor(W/120)); // pixel size
  ctx.fillStyle = ROOMS[G.room].color;
  ctx.fillRect(0,0,W,H);

  // Draw room-specific backgrounds
  switch(G.room){
    case 0: drawDunphyLiving(W,H,ps); break;
    case 1: drawGloriaKitchen(W,H,ps); break;
    case 2: drawCamMitchellLiving(W,H,ps); break;
    case 3: drawHighSchool(W,H,ps); break;
    case 4: drawBackyardBBQ(W,H,ps); break;
  }
}

function pixRect(x,y,w,h,color,ps){
  ctx.fillStyle=color;
  const px=Math.floor(x/ps)*ps, py=Math.floor(y/ps)*ps;
  for(let i=px;i<px+w;i+=ps)for(let j=py;j<py+h;j+=ps){
    ctx.fillRect(i,j,ps-1,ps-1);
  }
}

function drawFloor(W,H,ps,color1,color2,wallColor,floorY){
  // Wall
  pixRect(0,0,W,floorY,wallColor,ps);
  // Floor
  for(let x=0;x<W;x+=ps*2){
    for(let y=floorY;y<H;y+=ps){
      ctx.fillStyle=((Math.floor(x/(ps*4))+Math.floor(y/(ps*4)))%2===0)?color1:color2;
      ctx.fillRect(x,y,ps*2-1,ps-1);
    }
  }
}

function drawDunphyLiving(W,H,ps){

function crayonRoundRect(c,x,y,w,h,r,fill,stroke,lw){

// Wobbly line helper
function wobbly(x1,y1,x2,y2,wobble=3){
  const mx=(x1+x2)/2+((Math.random()-0.5)*wobble*2);
  const my=(y1+y2)/2+((Math.random()-0.5)*wobble*2);
  return `Q${mx},${my} ${x2},${y2}`;
}
function wobblySeed(x1,y1,x2,y2,seed,wobble=3){
  const s=Math.sin(seed*127.1)*43758.5453;
  const c=Math.cos(seed*269.5)*43758.5453;
  const mx=(x1+x2)/2+((s-Math.floor(s))-0.5)*wobble*2;
  const my=(y1+y2)/2+((c-Math.floor(c))-0.5)*wobble*2;
  return `Q${mx},${my} ${x2},${y2}`;
}

const _svgKebab={strokeWidth:'stroke-width',strokeLinecap:'stroke-linecap',strokeLinejoin:'stroke-linejoin',strokeDasharray:'stroke-dasharray',textAnchor:'text-anchor',fontSize:'font-size',fontFamily:'font-family',fontWeight:'font-weight',fillOpacity:'fill-opacity',strokeOpacity:'stroke-opacity'};
function svgEl(tag,attrs={}){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs)) el.setAttribute(_svgKebab[k]||k,v);
  return el;
}

function drawCharacters(){
  if(!G.gameStarted) return;
  svgLayer.innerHTML='';

function addClickHandler(el, charName){
  // Invisible hit rect inside group for reliable touch on iOS
  setTimeout(function(){try{
    var bb=el.getBBox();
    // Hit rect
    var hr=svgEl('rect',{x:String(bb.x-8),y:String(bb.y-8),width:String(bb.width+16),height:String(bb.height+16),fill:'rgba(255,215,0,0.01)',stroke:'none'});
    el.insertBefore(hr,el.firstChild);
    // Glow outline around character
    var cg=svgEl('rect',{x:String(bb.x-6),y:String(bb.y-6),width:String(bb.width+12),height:String(bb.height+12),rx:'10',fill:'none',stroke:'#ffd700',strokeWidth:'2.5',opacity:'0'});
    cg.style.pointerEvents='none';
    var cgAnim=svgEl('animate',{attributeName:'opacity',values:'0;0.6;0',dur:'2s',repeatCount:'indefinite'});
    cg.appendChild(cgAnim);
    el.insertBefore(cg,el.firstChild);
  }catch(e){}},50);
  el.setAttribute('style','cursor:pointer;pointer-events:all');
  el.setAttribute('class','clickable');
  function handler(e){e.stopPropagation();e.preventDefault();getAudio();playClick();talkToCharacter(charName);}
  el.addEventListener('click',handler);
  el.addEventListener('touchend',function(e){e.stopPropagation();e.preventDefault();getAudio();playClick();talkToCharacter(charName);},{passive:false});
}

function drawClickableItem(x,y,w,h,id,label){
  // Bright pulsing glow outline
  var glow = svgEl('rect',{x:x-3,y:y-3,width:w+6,height:h+6,rx:'8',fill:'rgba(255,215,0,0.06)',stroke:'#ffd700',strokeWidth:'3',opacity:'0','class':'item-glow'});
  var glowAnim = svgEl('animate',{attributeName:'opacity',values:'0;0.9;0',dur:'1.8s',repeatCount:'indefinite'});
  glow.appendChild(glowAnim);
  glow.style.pointerEvents='none';
  svgLayer.appendChild(glow);

  // Clickable rect
  var rect = svgEl('rect',{x:x,y:y,width:w,height:h,fill:'rgba(255,215,0,0.01)',stroke:'none','class':'clickable','data-item':id});
  rect.setAttribute('style','pointer-events:all;cursor:pointer');
  function itemHandler(e){e.stopPropagation();e.preventDefault();getAudio();playClick();glow.setAttribute('opacity','1');setTimeout(function(){glow.setAttribute('opacity','0');},200);interactItem(id,label);}
  rect.addEventListener('click',itemHandler);
  rect.addEventListener('touchend',itemHandler,{passive:false});
  svgLayer.appendChild(rect);
}

// Flash all hotspots briefly when entering a room
var _hotspotFlashTimer=null;
function flashHotspots(){
  clearTimeout(_hotspotFlashTimer);
  var glows=document.querySelectorAll('.item-glow');
  var hands=svgLayer.querySelectorAll('text');
  glows.forEach(function(g){g.setAttribute('opacity','0.9');});
  _hotspotFlashTimer=setTimeout(function(){
    glows.forEach(function(g){g.setAttribute('opacity','0');});
  },1200);
}

let dialogueIndex = {};
let monologueTimeout = null;

function talkToCharacter(name){
  if(G.puzzleOpen) return;
  getAudio();
  const lines = DIALOGUE[name];
  if(!lines) return;
  if(!dialogueIndex[name]) dialogueIndex[name]=0;

  const [speaker,text] = lines[dialogueIndex[name] % lines.length];
  dialogueIndex[name]++;

  // Visual bounce feedback on character SVG
  var charEls = svgLayer.querySelectorAll('.clickable');
  charEls.forEach(function(el){
    if(el.closest && el.closest('.clickable')){
      // Brief scale bounce
    }
  });

  playCharacterVoice(name);
  showDialogue(speaker, text);

  // Show monologue after
  const monos = MONOLOGUES[name];
  if(monos){
    clearTimeout(monologueTimeout);
    monologueTimeout = setTimeout(()=>{
      showMonologue(monos[Math.floor(Math.random()*monos.length)]);
    }, 800);
  }
}

function openPuzzle(roomIdx){
  getAudio();
  if(G.solved[roomIdx] && roomIdx < 4) return;
  if(roomIdx === 4 && !G.solved[0]){
    showDialogue('Keira','I need to solve all the other rooms first. Back to the Dunphy house!');
    return;
  }
  if(roomIdx === 4 && !G.solved[1]){
    showDialogue('Keira','Still need to crack Gloria\'s kitchen. Let me head back.');
    return;
  }
  if(roomIdx === 4 && !G.solved[2]){
    showDialogue('Keira','Cam and Mitchell\'s place isn\'t done yet.');
    return;
  }
  if(roomIdx === 4 && !G.solved[3]){
    showDialogue('Keira','Need to finish at the school first.');
    return;
  }

  G.puzzleOpen = true;
  G.currentPuzzle = roomIdx;
  playPuzzleDing();
  const p = PUZZLES[roomIdx];
  document.getElementById('puzzle-title').textContent = p.title;
  document.getElementById('puzzle-desc').textContent = p.desc;
  document.getElementById('puzzle-input').value = '';
  document.getElementById('puzzle-feedback').textContent = '';
  document.getElementById('puzzle-feedback').style.color = '#c00';
  overlay.style.display = 'block';
  puzzleModal.style.display = 'block';
  document.getElementById('puzzle-input').focus();
}

function closePuzzle(){
  G.puzzleOpen = false;
  G.currentPuzzle = null;
  overlay.style.display = 'none';
  puzzleModal.style.display = 'none';
}

document.getElementById('puzzle-input').addEventListener('keydown',(e)=>{
  if(e.key==='Enter') submitPuzzle();
});

function submitPuzzle(){
  getAudio();
  const idx = G.currentPuzzle;
  if(idx===null) return;
  const p = PUZZLES[idx];
  const val = document.getElementById('puzzle-input').value.trim().toLowerCase();

  if(val === p.answer.toLowerCase()){
    G.solved[idx] = true;
    G.clueWords[idx] = p.clueWord;
    playPuzzleSolve();
    playDoorUnlock();
    playSuccess();
    closePuzzle();

    if(idx === 4){
      winGame();
    } else {
      showDialogue('', p.successMsg);
      addItem(`Clue Word: ${p.clueWord}`, `Room ${idx+1} clue word`);
      showNotification('Room solved! Clue: ' + p.clueWord);
      saveGame();
      updateObjective();
      updateProgress();
      setTimeout(()=>{
        showMonologue(`Room ${idx+1} cleared! The clue word is "${p.clueWord}". ${4-G.solved.filter(Boolean).length} rooms to go!`);
      },2000);
      // Auto-advance offer (#30)
      if(idx < 4){
        setTimeout(function(){
          if(G.room < 4){
            showDialogue('Keira','Room cleared! Tap the arrow to continue to the next room.');
          }
        },4000);
      }
    }
  } else {
    document.getElementById('puzzle-feedback').textContent = getWrongAnswer(idx);
    document.getElementById('puzzle-feedback').style.color = '#c00';
    playWrong();
    // Shake the input (#29)
    var inp=document.getElementById('puzzle-input');
    inp.style.animation='none';inp.offsetHeight;inp.style.animation='shake 0.4s ease';
  }
}

function getWrongAnswer(idx){
  var val=document.getElementById('puzzle-input').value.trim().toLowerCase();
  var ans=PUZZLES[idx].answer.toLowerCase();
  // Check partial match for digit-based puzzles
  var hint='';
  if(idx!==2 && idx!==4 && val.length===ans.length){
    var correct=0;
    for(var i=0;i<val.length;i++){if(val[i]===ans[i])correct++;}
    if(correct>0) hint=' ('+correct+'/'+ans.length+' digits correct)';
  } else if(idx===4){
    // Check how many words match
    var vw=val.split(/\s+/),aw=ans.split(/\s+/),match=0;
    aw.forEach(function(w){if(vw.indexOf(w)!==-1)match++;});
    if(match>0) hint=' ('+match+'/'+aw.length+' words correct)';
  }
  const wrongs = [
    ["Phil: 'Nice try! But that's not Phil-osophically correct!'","Claire: 'Wrong. Just like Phil's lock.'","Haley: 'Even I know that's wrong. And I don't know things.'"],
    ["Gloria: 'NO! That is WRONG! Like Jay's taste in music!'","Jay: 'Nope. Try again.'","Manny: 'Incorrect. As Rilke once said... actually he never said anything about lock codes.'"],
    ["Cam: 'WRONG NOTE! That's like playing Phantom without the mask!'","Mitchell: 'Incorrect. I would object, but I'm too tired.'","Lily: 'Nope. Try harder.'"],
    ["Alex (via note): 'Wrong. I expected better. Well, no I didn't.'","Random Student: 'That's wrong and it's not even on the test.'","Keira: 'Okay, I'm definitely smarter than this. Let me think.'"],
    ["Phil: 'That's not it! But I believe in you! BURGER-IFIC BELIEF!'","Everyone: '...'","Gloria: 'AY! Try again! Use your BRAIN!'"]
  ];
  return wrongs[idx][Math.floor(Math.random()*wrongs[idx].length)] + hint;
}

// ── Hints ──
function useHint(){
  getAudio();
  const room = G.room;
  const used = G.hintsUsed[room]||0;
  if(used>=3) return;
  if(G.solved[room]){
    showNotification('Room already solved!');
    return;
  }
  G.hintsUsed[room] = used+1;
  const p = PUZZLES[room];
  const hint = [p.hint1,p.hint2,p.hint3][used];
  showDialogue('Apple Watch Hint', hint);
  showNotification(`Hint ${used+1}/3 used`);
  updateHintBtn();
  playHintChime();
  saveGame();
}
document.getElementById('hint-btn').addEventListener('click',useHint);
document.getElementById('hint-btn').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();useHint();},{passive:false});

function updateHintBtn(){
  const btn = document.getElementById('hint-btn');
  const used = G.hintsUsed[G.room]||0;
  const left = 3-used;
  btn.textContent = `USE HINT (${left} left)`;
  btn.disabled = left<=0 || G.solved[G.room];
}

  // Time (iOS style — large bold white)
  var now = new Date();
  var h=now.getHours()%12||12;var m=now.getMinutes();
  svg += '<text x="55" y="52" text-anchor="middle" font-size="22" fill="#fff" font-family="-apple-system,system-ui,sans-serif" font-weight="700">'+h+':'+String(m).padStart(2,'0')+'</text>';

  // Timer (game countdown)
  if(G.gameStarted && !G.gameWon){
    var elapsed = G.elapsed + (G.paused?0:(Date.now()-G.startTime));
    var remaining = Math.max(0, 1800000 - elapsed);
    var mins = Math.floor(remaining/60000);
    var secs = Math.floor((remaining%60000)/1000);
    var timerColor = mins < 5 ? '#ff453a' : '#ff9f0a';
    svg += '<text x="55" y="68" text-anchor="middle" font-size="12" fill="'+timerColor+'" font-family="-apple-system,system-ui,sans-serif" font-weight="600">'+String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0')+'</text>';
    if(remaining <= 0 && !G.gameWon) timeUp();
  }

  // Room name
  var roomName=ROOMS[G.room]?ROOMS[G.room].name:'';
  svg += '<text x="55" y="82" text-anchor="middle" font-size="7" fill="rgba(255,255,255,0.5)" font-family="-apple-system,system-ui,sans-serif" font-weight="500">'+roomName+'</text>';

  // Inventory dots (iOS-style colored circles)
  var invCount = G.inventory.length;
  svg += '<text x="55" y="96" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)" font-family="-apple-system,system-ui,sans-serif" font-weight="500">'+invCount+' item'+(invCount!==1?'s':'')+'</text>';

  // Activity rings (decorative, Apple Watch style)
  svg += '<circle cx="55" cy="108" r="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>';
  svg += '<circle cx="55" cy="108" r="6" fill="none" stroke="#ff2d55" stroke-width="2" stroke-dasharray="'+(invCount*4)+' 40" stroke-linecap="round" transform="rotate(-90 55 108)"/>';

  // Tiny item icons on watch wrist (show last 4 found items as tiny pixel icons)
  const itemIcons = {
    'tv-remote':     '<rect x="0" y="0" width="6" height="3" fill="#555" rx="0.5"/><rect x="1" y="0.5" width="1" height="0.8" fill="#f00"/>',
    'family-photo':  '<rect x="0" y="0" width="5" height="4" fill="#f0d890" stroke="#840" stroke-width="0.5"/><circle cx="2.5" cy="2" r="1" fill="#c0a0f0"/>',
    'tally-chart':   '<rect x="0" y="0" width="5" height="4" fill="#fff"/><line x1="1" y1="1" x2="1" y2="3" stroke="#222" stroke-width="0.5"/><line x1="2" y1="1" x2="2" y2="3" stroke="#222" stroke-width="0.5"/><line x1="3" y1="1" x2="3" y2="3" stroke="#222" stroke-width="0.5"/>',
    'recipe-card':   '<rect x="0" y="0" width="5" height="3.5" fill="#fff8e0" stroke="#a80" stroke-width="0.4"/><line x1="1" y1="1" x2="4" y2="1" stroke="#a80" stroke-width="0.3"/>',
    'poetry-book':   '<rect x="0" y="0" width="4" height="5" fill="#604080" rx="0.3"/><rect x="0.5" y="0.5" width="3" height="0.5" fill="#c0a0f0"/>',
    'glorias-purse': '<rect x="0" y="1" width="5" height="3" fill="#d02060" rx="0.5"/><path d="M1,1 Q2.5,0 4,1" fill="none" stroke="#d02060" stroke-width="0.6"/>',
    'law-books':     '<rect x="0" y="0" width="3" height="5" fill="#800020" rx="0.2"/><rect x="0.3" y="0.5" width="2.4" height="0.4" fill="#ffd700"/>',
    'vinyl-record':  '<circle cx="2.5" cy="2.5" r="2.5" fill="#111"/><circle cx="2.5" cy="2.5" r="0.8" fill="#ffd700"/>',
    'lily-drawing':  '<rect x="0" y="0" width="5" height="4" fill="#fff"/><path d="M1,3 L2,1 L3,2 L4,1" stroke="#f0a" stroke-width="0.5" fill="none"/>',
    'periodic-table':'<rect x="0" y="0" width="5" height="4" fill="#fff"/><rect x="0.5" y="0.5" width="1" height="1" fill="#4a4" stroke="#222" stroke-width="0.2"/><rect x="2" y="0.5" width="1" height="1" fill="#a44" stroke="#222" stroke-width="0.2"/>',
    'homework-note': '<rect x="0" y="0" width="4" height="5" fill="#fff8e0"/><text x="2" y="3" text-anchor="middle" font-size="3" fill="#222">01</text>',
    'default':       '<circle cx="2.5" cy="2.5" r="2" fill="#0a0" opacity="0.6"/>'
  };
  const recentItems = Object.keys(G.itemsFound).slice(-4);
  if(recentItems.length>0){
    recentItems.forEach((key,idx)=>{
      const ix=22+idx*16;
      const ic=itemIcons[key]||itemIcons['default'];
      svg+=`<g transform="translate(${ix},100) scale(1.8)">${ic}</g>`;
    });
  }

  // Watch face expression
  const expr = G.gameWon ? '(^_^)' : (G.puzzleOpen ? '(o_o)' : G.solved[G.room] ? '(^-^)' : '(-_-)');
  svg += `<text x="55" y="110" text-anchor="middle" font-size="12" fill="#0f0" font-family="Courier New,monospace">${expr}</text>`;

  watchFace.innerHTML = svg;
}

function updateWatchExpanded(){
  const now = new Date();
  document.getElementById('we-time').textContent = now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('we-room').textContent = ROOMS[G.room]?.name||'';

  let inv = '';
  if(G.inventory.length===0){
    inv='<div style="color:#555;font-size:11px;padding:8px 0">No items yet. Explore!</div>';
  }
  const tinyIcons = {
    'TV Remote':'\u{1F4FA}','Family Photo':'\u{1F4F7}','Tally Chart':'\u{1F4CA}',
    'Recipe Card':'\u{1F4DD}','Poetry Book':'\u{1F4D6}','Closet Key':'\u{1F511}',
    'Hollow Book Key':'\u{1F511}','Vinyl Record':'\u{1F3B5}',
    "Lily's Map":'\u{1F5FA}','Periodic Table':'\u{2697}',
    "Alex's Note":'\u{1F4DD}'
  };
  G.inventory.forEach(item=>{
    const icon=tinyIcons[item.name]||'\u{1F4E6}';
    inv+='<div class="inv-item"><span style="font-size:14px">'+icon+'</span> '+item.name+'<br><span style="color:rgba(255,255,255,0.4);font-size:10px">'+item.desc+'</span></div>';
  });
  document.getElementById('we-inventory').innerHTML = inv;
  updateHintBtn();
}

function openWatch(){getAudio();G.watchOpen=true;watchExpanded.style.display='block';watchFace.style.display='none';document.getElementById('watch-hud').classList.add('watch-active');updateWatchExpanded();playBleep(600,0.03);}
function closeWatch(){G.watchOpen=false;watchExpanded.style.display='none';watchFace.style.display='block';document.getElementById('watch-hud').classList.remove('watch-active');playBleep(400,0.03);}
watchFace.addEventListener('click',function(e){e.stopPropagation();openWatch();});
watchFace.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();openWatch();},{passive:false});
// Close button handles closing via closeWatch()

// ── Room Navigation ──
function navLeft(e){if(e){e.preventDefault();e.stopPropagation();}getAudio();if(G.room>0){showRoomFade();G.room--;enterRoom();playBleep(440,0.06);}}
function navRight(e){if(e){e.preventDefault();e.stopPropagation();}getAudio();if(G.room<4){showRoomFade();G.room++;enterRoom();playBleep(520,0.06);}}
arrowLeft.addEventListener('click',navLeft);
arrowLeft.addEventListener('touchend',navLeft,{passive:false});
arrowRight.addEventListener('click',navRight);
arrowRight.addEventListener('touchend',navRight,{passive:false});
function showRoomFade(){var f=document.getElementById('room-fade');f.classList.add('active');setTimeout(function(){f.classList.remove('active');},350);}

function enterRoom(){
  getAudio();
  playRoomEnterWhoosh();
  playWhoosh();
  dialogueBox.style.display='none';
  monologueBox.style.display='none';
  roomLabel.textContent = ROOMS[G.room].name;
  arrowLeft.style.display = G.room > 0 ? 'block':'none';
  arrowRight.style.display = G.room < 4 ? 'block':'none';

  G.keira.x = 0.3;
  G.keira.targetX = null;
  G.keira.walking = false;

  renderInvBar();
  drawRoom();
  drawCharacters();
  updateHintBtn();
  updateObjective();
  updateProgress();

  // Play room ambient melody (#18)
  setTimeout(function(){playRoomAmbient(G.room);},400);

  // Flash all hotspots briefly so player knows where to look
  setTimeout(flashHotspots, 300);

  // Room entrance dialogue
  const entranceLines = [
    "The Dunphy living room. Phil's lock contraption is glowing ominously.",
    "Gloria's kitchen. Something smells amazing and also slightly terrifying.",
    "Cam and Mitchell's place. There's show music playing from... somewhere.",
    "The high school hallway. Smells like homework and anxiety.",
    "The backyard BBQ! Phil is wearing a chef hat. This is the final puzzle."
  ];
  setTimeout(()=>showMonologue(entranceLines[G.room]),500);
  saveGame();
}

// Objective text (#26)
function updateObjective(){
  var obj=document.getElementById('objective-text');
  if(!obj)return;
  var objectives=["Find the Phil-Lock 3000 code","Crack Gloria's kitchen lock","Play the right song on Cam's keyboard","Open Alex's MENSA locker","Combine all clue words!"];
  if(G.solved[G.room]){obj.textContent='Room solved! '+String.fromCharCode(10003);obj.style.color='#408040';}
  else{obj.textContent=objectives[G.room];obj.style.color='#a06830';}
  obj.style.display='block';
}

// Progress indicator (#27)
function updateProgress(){
  var bar=document.getElementById('progress-bar');
  if(!bar)return;
  var solved=G.solved.filter(Boolean).length;
  var items=Object.keys(G.itemsFound).length;
  bar.textContent='Room '+(G.room+1)+'/5  |  '+solved+'/5 solved  |  '+items+' items';
  bar.style.display='block';
}

var INV_ICONS={'TV Remote':'📺','Family Photo':'📷','Tally Chart':'📊','Phil-Lock Code':'🔢','Recipe Card':'📝','Poetry Book':'📖',"Gloria's Purse":'👜','Closet Key':'🔑','Hollow Book Key':'🔑','Vinyl Record':'🎵',"Lily's Map":'🗺️','Periodic Table':'⚗️',"Alex's Note":'📝','Hall Pass':'🎫','Deadwood Map':'🗺️','Stagecoach Ticket':'🎫'};
function renderInvBar(){
  var bar=document.getElementById('inv-bar');if(!bar)return;
  if(!G.gameStarted||G.inventory.length===0){bar.style.display='none';return;}
  bar.style.display='flex';
  var html='';
  G.inventory.forEach(function(item){
    var icon=INV_ICONS[item.name]||'📦';
    html+='<div class="inv-slot" title="'+item.name+'" onclick="getAudio();playBleep(500,0.04);showNotification(\''+item.name.replace(/'/g,"\\'")+': '+item.desc.replace(/'/g,"\\'")+'\')"><span>'+icon+'</span><span class="inv-label">'+item.name.split(' ')[0]+'</span></div>';
  });
  bar.innerHTML=html;
}

// ── Click / Touch to Move (#36) ──
function handleMove(clientX){
  if(!G.gameStarted || G.gameWon) return;
  getAudio();
  const targetX = clientX / window.innerWidth;
  G.keira.targetX = Math.max(0.1, Math.min(0.9, targetX));
  G.keira.walking = true;
  G.keira.facing = targetX > G.keira.x ? 1 : -1;
}
document.addEventListener('click',(e)=>{
  if(!G.gameStarted || G.gameWon) return;
  if(e.target.closest('#ui-layer') && !e.target.closest('#dialogue-box') && !e.target.closest('#monologue-box') && e.target.id!=='arrow-left' && e.target.id!=='arrow-right') return;
  if(e.target.closest('.clickable')) return;
  handleMove(e.clientX);
});

// ── Game Loop ──
function gameLoop(){
  if(!G.gameStarted) {requestAnimationFrame(gameLoop); drawWatch(); return;}

  // Move Keira
  if(G.keira.targetX !== null){
    const dx = G.keira.targetX - G.keira.x;
    if(Math.abs(dx) < 0.005){
      G.keira.x = G.keira.targetX;
      G.keira.targetX = null;
      G.keira.walking = false;
    } else {
      G.keira.x += dx * 0.13;
      G.keira.facing = dx > 0 ? 1 : -1;
    }
  }

  drawRoom();
  drawCharacters();
  drawWatch();

  requestAnimationFrame(gameLoop);
}

// ── Win / Lose ──
function winGame(){
  G.gameWon = true;
  const elapsed = G.elapsed + (Date.now()-G.startTime);
  const mins = Math.floor(elapsed/60000);
  const secs = Math.floor((elapsed%60000)/1000);
  var totalItems=Object.keys(G.itemsFound).length;
  var totalHints=G.hintsUsed.reduce(function(a,b){return a+b;},0);
  var stars=3;
  if(totalHints>3)stars=2;
  if(totalHints>6)stars=1;
  if(mins<15 && totalHints<=2)stars=3;

  // Victory fanfare (#40)
  playVictoryFanfare();
  setTimeout(()=>playSuccess(),600);
  setTimeout(()=>playVictoryFanfare(),1200);
  setTimeout(()=>playSuccess(),1800);

  const victory = document.getElementById('victory-screen');
  var starStr='';for(var si=0;si<3;si++){starStr+=(si<stars)?'<span style="color:#ffd700;font-size:36px">&#9733;</span>':'<span style="color:#ccc;font-size:36px">&#9734;</span>';}
  document.getElementById('victory-content').innerHTML = `
    <div style="margin-top:10px">${starStr}</div>
    <p style="margin-top:16px;font-size:17px">The "escape" was actually just finding the bathroom because there was a line.</p>
    <p style="font-style:italic;color:#804020;margin-top:10px">Phil is crying happy tears. Gloria brought out arepas.<br>Cam is taking a bow. Mitchell is stress-eating.<br>Lily rolls her eyes. Luke is still playing video games.</p>
    <div style="margin-top:16px;background:rgba(255,255,240,0.8);border-radius:12px;padding:14px 20px;display:inline-block">
      <div style="font-size:15px;color:#666">Time: <b>${mins}m ${secs}s</b></div>
      <div style="font-size:15px;color:#666">Items found: <b>${totalItems}</b></div>
      <div style="font-size:15px;color:#666">Hints used: <b>${totalHints}/15</b></div>
      <div style="font-size:15px;color:#666">Rating: <b>${stars===3?'BURGER-IFIC!':stars===2?'Pretty Good!':'Nice Try!'}</b></div>
    </div>
    <div style="margin-top:20px">
      <svg width="400" height="200" viewBox="0 0 400 200">
        <text x="200" y="30" text-anchor="middle" font-size="14" fill="#c04040" font-family="Comic Sans MS,cursive">THE WHOLE FAMILY</text>
        ${drawVictoryFamily()}
      </svg>
    </div>
    <p style="font-weight:bold;color:#c04040;font-size:24px;margin-top:12px">BURGER-IFIC!</p>
    <p style="font-size:13px;color:#999;margin-top:6px">Phil: "I'm not crying, YOU'RE crying! ...Okay I'm crying."</p>
    <button onclick="location.reload()" style="margin-top:16px;padding:14px 36px;font-size:20px;font-family:Comic Sans MS,cursive;background:#60a060;color:#fff;border:4px solid #408040;border-radius:14px;cursor:pointer;box-shadow:4px 4px 0 rgba(0,0,0,0.2)">PLAY AGAIN</button>
  `;
  victory.style.display = 'flex';
  localStorage.removeItem('modernfamily-save');
}

function drawVictoryFamily(){
  let svg = '';
  const chars = [
    {x:40,label:'Jay',color:'#3366aa',hair:'#ccc'},
    {x:100,label:'Gloria',color:'#ff4466',hair:'#1a0a00'},
    {x:155,label:'Phil',color:'#4488bb',hair:'#5a3e28'},
    {x:205,label:'Claire',color:'#cc4466',hair:'#c8a020'},
    {x:250,label:'Cam',color:'#cc44cc',hair:'#cc6633'},
    {x:300,label:'Mitch',color:'#5577aa',hair:'#cc8833'},
    {x:355,label:'Keira',color:'#F0D0D0',hair:'#5C3317'}
  ];
  chars.forEach(c=>{
    svg += `<circle cx="${c.x}" cy="90" r="18" fill="#f0c8a0" stroke="#333" stroke-width="2"/>`;
    svg += `<path d="M${c.x-14},82 Q${c.x},68 ${c.x+14},82" fill="${c.hair}" stroke="#333" stroke-width="1.5"/>`;
    svg += `<circle cx="${c.x-5}" cy="88" r="2" fill="#222"/>`;
    svg += `<circle cx="${c.x+5}" cy="88" r="2" fill="#222"/>`;
    svg += `<path d="M${c.x-5},96 Q${c.x},102 ${c.x+5},96" stroke="#a04020" stroke-width="2" fill="none"/>`;
    svg += `<rect x="${c.x-16}" y="108" width="32" height="35" rx="4" fill="${c.color}" stroke="#333" stroke-width="2"/>`;
    svg += `<text x="${c.x}" y="160" text-anchor="middle" font-size="9" fill="#666" font-family="Comic Sans MS,cursive">${c.label}</text>`;
  });
  // Confetti
  for(let i=0;i<30;i++){
    const cx = Math.random()*400;
    const cy = Math.random()*60+10;
    const col = ['#f00','#0a0','#00f','#ff0','#f0f','#0ff'][Math.floor(Math.random()*6)];
    svg += `<rect x="${cx}" y="${cy}" width="6" height="4" fill="${col}" transform="rotate(${Math.random()*360} ${cx} ${cy})" opacity="0.7"/>`;
  }
  return svg;
}

function timeUp(){
  if(G.gameWon) return;
  G.gameWon = true;
  const victory = document.getElementById('victory-screen');
  document.getElementById('victory-content').innerHTML = `
    <h1 style="color:#804020">TIME'S UP!</h1>
    <p>Phil: "Well, at least we're all together! ...Right? Guys? Where is everyone going?"</p>
    <p>Gloria: "THIRTY MINUTES and you no can solve?! In Colombia, we solve in TEN."</p>
    <p>Cam: "This is like the time I forgot my lines in Act 2 of 'Chicago.' The show must go on... but it didn't."</p>
    <p style="font-size:14px;color:#888;margin-top:10px">You solved ${G.solved.filter(Boolean).length}/5 rooms</p>
    <button onclick="location.reload()" style="margin-top:20px;padding:12px 30px;font-size:18px;font-family:Comic Sans MS,cursive;background:#c04040;color:#fff;border:4px solid #902020;border-radius:12px;cursor:pointer">TRY AGAIN</button>
  `;
  victory.style.display = 'flex';
}

// ── Save / Load ──
function saveGame(){
  const data = {
    room: G.room,
    inventory: G.inventory,
    solved: G.solved,
    clueWords: G.clueWords,
    hintsUsed: G.hintsUsed,
    elapsed: G.elapsed + (Date.now()-G.startTime),
    itemsFound: G.itemsFound,
    dialogueIndex: dialogueIndex,
    clickCounts: G.clickCounts,
    version: 2
  };
  try{localStorage.setItem('modernfamily-save',JSON.stringify(data));}catch(e){}
}

function loadGame(){
  try{
    const raw = localStorage.getItem('modernfamily-save');
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data.version) return false;
    G.room = data.room||0;
    G.inventory = data.inventory||[];
    G.solved = data.solved||[false,false,false,false,false];
    G.clueWords = data.clueWords||['','','','',''];
    G.hintsUsed = data.hintsUsed||[0,0,0,0,0];
    G.elapsed = data.elapsed||0;
    G.itemsFound = data.itemsFound||{};
    G.clickCounts = data.clickCounts||{};
    dialogueIndex = data.dialogueIndex||{};
    return true;
  }catch(e){return false;}
}

// ── Start ──
function startGame(resume){
  stopThemeSong();
  if(resume){
    loadGame();
  } else {
    G.elapsed = 0;
    G.room = 0;
    G.inventory = [];
    G.solved = [false,false,false,false,false];
    G.clueWords = ['','','','',''];
    G.hintsUsed = [0,0,0,0,0];
    G.itemsFound = {};
    dialogueIndex = {};
    localStorage.removeItem('modernfamily-save');
  }

  G.startTime = Date.now();
  G.gameStarted = true;
  G.gameWon = false;

  document.getElementById('start-screen').style.display = 'none';
  startWalkBlips();

  resize();
  enterRoom();

  // Opening dialogue
  if(!resume){
    setTimeout(()=>{
      showDialogue('Phil','Welcome to the Dunphy household! I\'d shake your hand but... well, we\'re locked in. THANKS TO MY GENIUS.');
    },800);
    setTimeout(()=>{
      showMonologue('I\'m Keira. I\'m 15. And apparently I\'m the only one who can solve anything around here. Cool. Cool cool cool.');
    },4000);
    // Tutorial hint (#25)
    setTimeout(()=>{
      showNotification('Tip: Tap glowing items and characters to interact!');
    },6500);
  }
}

// Check for save data
if(localStorage.getItem('modernfamily-save')){
  var rb=document.getElementById('svg-resume-btn');
  if(rb){rb.style.display='block';rb.onclick=function(){titleClickResume();};}
}

// Init
resize();
requestAnimationFrame(gameLoop);
</script>
