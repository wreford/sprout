<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Modern Family Escape Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow:hidden!important;width:100vw;height:100vh}
body{background:#d8d0c0;font-family:-apple-system,system-ui,sans-serif;touch-action:none}

/* Lock to portrait — show rotate message in landscape */
#rotate-msg{display:none;position:fixed;inset:0;z-index:9999;background:#d8d0c0;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;font-size:24px;color:#804020}
#rotate-msg .icon{font-size:60px;margin-bottom:16px;animation:rotSpin 2s ease-in-out infinite}
@keyframes rotSpin{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media(orientation:landscape) and (max-height:500px){
  #rotate-msg{display:flex!important}
  #game-canvas,#svg-layer,#ui-layer,#start-screen,#victory-screen{display:none!important}
}
#game-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#svg-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.clickable{pointer-events:all!important;cursor:pointer;-webkit-tap-highlight-color:rgba(255,215,0,0.3);touch-action:manipulation}
.item-glow,.item-bg{pointer-events:none!important}
#ui-layer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}
#ui-layer #dialogue-box,#ui-layer #monologue-box,#ui-layer #watch-hud,#ui-layer #watch-expanded,#ui-layer #arrow-left,#ui-layer #arrow-right,#ui-layer #notification,#ui-layer #hint-btn,#ui-layer .close-btn{pointer-events:auto}
#dialogue-box{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);width:min(92vw,620px);background:rgba(40,30,20,0.92);border:4px solid #555;border-radius:18px;padding:22px 26px;font-size:18px;line-height:1.6;min-height:100px;display:none;z-index:10;box-shadow:4px 4px 0 rgba(0,0,0,0.3);cursor:pointer}
#dialogue-box .speaker{font-weight:bold;font-size:17px;margin-bottom:6px;color:#e0a060}
#dialogue-box .text{color:#e0d0b0}
#dialogue-box .hint{font-size:11px;color:rgba(255,255,255,0.4);margin-top:8px;text-align:right}
#monologue-box{position:absolute;top:auto;bottom:140px;left:50%;transform:translateX(-50%);width:min(88vw,520px);background:rgba(60,30,50,0.9);border:3px dashed #a06090;border-radius:14px;padding:16px 20px;font-size:16px;font-style:italic;color:#e0b0d0;display:none;z-index:10;text-align:center}
#watch-hud{position:absolute;top:8px;right:8px;width:50px;z-index:20;opacity:0.85;transition:opacity 0.2s;touch-action:manipulation}
#watch-hud:hover,#watch-hud.watch-active{opacity:1}
#watch-face{width:50px;height:62px;cursor:pointer;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5))}
#watch-expanded{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,28,30,0.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:0;padding:24px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));color:#fff;font-family:-apple-system,system-ui,sans-serif;font-size:15px;display:none;z-index:100;overflow-y:auto;-webkit-overflow-scrolling:touch}
#watch-expanded .we-close{position:absolute;top:max(12px,env(safe-area-inset-top));right:12px;width:44px;height:44px;border-radius:22px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#watch-expanded .inv-title{color:rgba(255,255,255,0.5);font-size:12px;margin:20px 0 10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
#watch-expanded .inv-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.08);color:#fff;font-size:16px}
#watch-expanded .inv-item:last-child{border-bottom:none}
#watch-expanded .watch-time{font-size:48px;font-weight:700;text-align:center;margin:10px 0 4px;color:#fff;letter-spacing:-1px}
#watch-expanded .watch-room{font-size:14px;text-align:center;color:rgba(255,255,255,0.5);margin-bottom:8px;font-weight:500}
#watch-expanded .hint-btn{background:rgba(255,107,53,0.9);border:none;color:#fff;padding:14px;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;width:100%;text-align:center;min-height:50px;transition:background 0.15s}
#watch-expanded .hint-btn{touch-action:manipulation}
#watch-expanded .hint-btn:hover{background:rgba(255,107,53,1)}
#watch-expanded .hint-btn:disabled{opacity:0.3;cursor:default;background:rgba(255,255,255,0.1)}
#notification{position:absolute;top:-60px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,0.93);color:#0f0;font-family:'Courier New',monospace;font-size:14px;padding:10px 20px;border-radius:14px;border:2px solid #0a0;z-index:25;transition:top 0.4s cubic-bezier(0.25,1,0.5,1);white-space:nowrap}
#notification.notif-show{top:70px}
@keyframes notifPop{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes itemFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}40%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-80%) scale(0.8)}}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
#room-label{display:none!important}
#puzzle-modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(90vw,440px);background:rgba(40,30,20,0.95);border:5px solid #665540;border-radius:20px;padding:24px;display:none;z-index:30;box-shadow:6px 6px 0 rgba(0,0,0,0.4)}
#puzzle-modal h3{font-size:18px;color:#e8c080;margin-bottom:12px;text-align:center}
#puzzle-modal .puzzle-desc{font-size:14px;color:#d0c0a0;margin-bottom:16px;line-height:1.5}
#puzzle-modal input{width:100%;padding:16px;font-size:24px;font-family:-apple-system,system-ui,sans-serif;border:3px solid #665540;border-radius:12px;text-align:center;margin-bottom:14px;background:#2a2018;color:#e8d8c0;min-height:54px}
#puzzle-modal input::placeholder{color:rgba(200,180,140,0.4);font-size:18px}
#puzzle-modal button{width:100%;padding:14px;font-size:18px;font-family:-apple-system,system-ui,sans-serif;background:#60a060;color:#fff;border:3px solid #408040;border-radius:12px;cursor:pointer;min-height:54px;font-weight:bold;touch-action:manipulation}
#puzzle-modal button:hover{background:#50b050}
#puzzle-modal .close-btn{position:absolute;top:8px;right:14px;font-size:24px;cursor:pointer;color:#aaa;background:none;border:none;width:auto;padding:0}
#puzzle-modal .close-btn:hover{color:#f00}
#puzzle-modal .puzzle-feedback{font-size:14px;margin-top:8px;text-align:center;min-height:20px;color:#e0a060}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:28;display:none}
#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#d8d0c0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#start-screen h1{font-size:min(8vw,42px);color:#c04040;text-shadow:3px 3px 0 #fcc;margin-bottom:8px}
#start-screen h2{font-size:min(4vw,20px);color:#804020;margin-bottom:30px;font-weight:normal}
#start-screen .start-btn{padding:16px 40px;font-size:22px;font-family:-apple-system,system-ui,sans-serif;background:#60a060;color:#fff;border:4px solid #408040;border-radius:16px;cursor:pointer;margin:10px;box-shadow:4px 4px 0 rgba(0,0,0,0.2);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#start-screen .start-btn:hover{background:#50b050;transform:translateY(-2px)}
#start-screen .resume-btn{background:#4080c0;border-color:#306090}
#start-screen .resume-btn:hover{background:#3070b0}
#start-screen .subtitle{font-size:14px;color:#888;margin-top:20px}
#victory-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,200,0.97);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
#victory-screen h1{font-size:36px;color:#c04040}
#victory-screen p{font-size:18px;color:#555;margin:10px 0;max-width:500px}
.clickable{cursor:pointer}
.clickable:hover{filter:brightness(1.15)}
#arrow-left,#arrow-right{position:absolute;bottom:72px;width:44px;height:44px;z-index:12;cursor:pointer;opacity:0.7;transition:opacity 0.15s,transform 0.1s;border-radius:50%;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#arrow-left:active,#arrow-right:active{transform:scale(0.9);opacity:1}
#arrow-left{left:8px}
#arrow-right{right:8px}
#inv-bar{position:absolute;bottom:0;left:0;right:0;height:58px;background:rgba(180,20,40,0.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:2px solid rgba(220,60,80,0.4);display:none;align-items:center;padding:4px 10px 4px 60px;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;z-index:11;scrollbar-width:none}
#inv-bar::-webkit-scrollbar{display:none}
.inv-slot{width:44px;height:44px;flex-shrink:0;background:rgba(255,240,200,0.08);border:2px solid rgba(255,255,255,0.3);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all 0.12s;touch-action:manipulation;position:relative}
.inv-slot:active{border-color:#fff;background:rgba(255,240,200,0.2);transform:scale(1.1)}
.inv-slot .inv-label{font-size:6px;color:rgba(255,255,255,0.5);position:absolute;bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42px;text-align:center;font-family:-apple-system,system-ui,sans-serif}
.room-fade-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:8;pointer-events:none;opacity:0;transition:opacity 0.4s ease}
.room-fade-overlay.active{opacity:1}
.room-name-overlay{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;color:#ffd700;font-family:-apple-system,system-ui,sans-serif;text-shadow:3px 3px 0 rgba(0,0,0,0.5);z-index:9;pointer-events:none;opacity:0;transition:opacity 0.4s ease}
.room-name-overlay.active{opacity:1}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes roomCompleteBanner{0%{transform:translate(-50%,-50%) scale(0.3);opacity:0}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.room-complete-banner{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;color:#fff;background:rgba(40,120,40,0.92);border:4px solid #ffd700;border-radius:20px;padding:20px 40px;z-index:35;pointer-events:none;text-align:center;animation:roomCompleteBanner 0.6s ease forwards}
.hint-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(88vw,400px);background:rgba(50,40,20,0.96);border:4px solid #ffd700;border-radius:18px;padding:24px;z-index:35;text-align:center;font-family:-apple-system,system-ui,sans-serif;cursor:pointer;box-shadow:0 0 30px rgba(255,215,0,0.3)}
.hint-card .hint-icon{font-size:40px;margin-bottom:8px}
.hint-card .hint-text{font-size:16px;color:#e8d8c0;line-height:1.6}
.item-tooltip{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(80vw,300px);background:rgba(20,20,20,0.95);border:2px solid rgba(255,255,255,0.15);border-radius:14px;padding:20px;z-index:35;text-align:center;font-family:-apple-system,system-ui,sans-serif;cursor:pointer;color:#f0f0f0}
.item-tooltip .item-emoji{font-size:40px;margin-bottom:6px}
.item-tooltip .item-name{font-size:18px;font-weight:bold;color:#ff9f0a;margin-bottom:4px}
.item-tooltip .item-desc{font-size:14px;font-style:italic;color:rgba(255,255,255,0.6);margin-bottom:8px}
.speech-indicator{position:absolute;pointer-events:none;font-size:14px;color:rgba(255,255,255,0.7);animation:speechDots 1s ease infinite}
@keyframes speechDots{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes timerPulse{0%,100%{box-shadow:inset 0 0 0 0 transparent}50%{box-shadow:inset 0 0 0 4px rgba(255,0,0,0.3)}}
@keyframes timerShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-2px)}20%{transform:translateX(2px)}30%{transform:translateX(-1px)}40%{transform:translateX(1px)}50%{transform:translateX(0)}}
.timer-pulse{animation:timerPulse 1s ease infinite}
.timer-shake{animation:timerShake 0.5s ease infinite}
#cutscene-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
#cutscene-overlay .cs-emoji{font-size:80px;margin-bottom:12px;animation:csBounce 0.6s ease}
#cutscene-overlay .cs-name{font-size:28px;font-weight:bold;color:#ffd700;font-family:-apple-system,system-ui,sans-serif;margin-bottom:8px}
#cutscene-overlay .cs-action{font-size:16px;font-style:italic;color:rgba(255,255,255,0.6);margin-bottom:16px}
#cutscene-overlay .cs-bubble{background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);border-radius:18px;padding:18px 28px;max-width:min(88vw,500px);font-size:20px;color:#fff;font-family:-apple-system,system-ui,sans-serif;line-height:1.5;position:relative}
#cutscene-overlay .cs-bubble::after{content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-bottom-color:rgba(255,255,255,0.25)}
@keyframes csBounce{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
#memory-game-overlay{position:fixed;inset:0;z-index:150;background:rgba(28,28,30,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#memory-game-overlay .mg-title{color:#fff;font-size:22px;font-weight:bold;font-family:-apple-system,system-ui,sans-serif;margin-bottom:12px}
#memory-game-overlay .mg-score{color:#ffd700;font-size:16px;margin-bottom:12px;font-family:-apple-system,system-ui,sans-serif}
#memory-game-overlay .mg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:320px;width:100%}
#memory-game-overlay .mg-card{width:100%;aspect-ratio:1;border-radius:12px;background:#3a3a3c;border:2px solid #555;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.3s,background 0.3s;user-select:none;-webkit-user-select:none}
#memory-game-overlay .mg-card.flipped{background:#1a4a1a;border-color:#4a4}
#memory-game-overlay .mg-card.matched{background:#1a3a4a;border-color:#4af;opacity:0.7}
#memory-game-overlay .mg-close{margin-top:16px;padding:10px 28px;border-radius:10px;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:16px;cursor:pointer;font-family:-apple-system,system-ui,sans-serif;touch-action:manipulation}
</style>
</head>
<body>

<div id="rotate-msg"><div class="icon">📱</div>Please rotate to portrait mode!<div style="font-size:14px;color:#aaa;margin-top:12px">This game is designed for portrait</div></div>

<canvas id="game-canvas"></canvas>
<svg id="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
<div id="ui-layer">
  <div id="room-label"></div>
  <div id="dialogue-box"><div class="speaker"></div><div class="text"></div><div class="hint">tap to continue</div></div>
  <div id="monologue-box"></div>
  <div id="notification"></div>
  <div id="watch-hud"><svg id="watch-face" viewBox="0 0 110 140"></svg></div>
  <div id="watch-expanded">
    <button class="we-close" onclick="closeWatch()" ontouchend="event.preventDefault();closeWatch();" aria-label="Close">&times;</button>
    <div class="watch-time" id="we-time"></div>
    <div class="watch-room" id="we-room"></div>
    <div id="we-objective" style="font-size:14px;text-align:center;color:#ff9f0a;margin:8px 0 4px;font-weight:600"></div>
    <div id="we-progress" style="font-size:12px;text-align:center;color:rgba(255,255,255,0.4);margin-bottom:8px"></div>
    <div class="inv-title">INVENTORY</div>
    <div id="we-inventory"></div>
    <button class="hint-btn" id="hint-btn">USE HINT (3 left)</button>
  </div>
  <div id="arrow-left" style="display:none" role="button" aria-label="Previous room">&#x25C0;</div>
  <div id="arrow-right" style="display:none" role="button" aria-label="Next room">&#x25B6;</div>
  <div id="objective-text" style="display:none!important"></div>
  <div id="progress-bar" style="display:none!important"></div>
  <div id="inv-bar"></div>
  <div id="room-fade" class="room-fade-overlay"></div>
  <div id="room-name-flash" class="room-name-overlay"></div>
</div>
<div id="overlay"></div>
<div id="cutscene-overlay" onclick="dismissCutscene()" ontouchend="event.preventDefault();dismissCutscene();">
  <div class="cs-emoji" id="cs-emoji"></div>
  <div class="cs-name" id="cs-name"></div>
  <div class="cs-action" id="cs-action"></div>
  <div class="cs-bubble" id="cs-bubble"></div>
</div>
<div id="memory-game-overlay">
  <div class="mg-title">Memory Match</div>
  <div class="mg-score" id="mg-score">Matches: 0/6 | Time: 30s</div>
  <div class="mg-grid" id="mg-grid"></div>
  <button class="mg-close" onclick="closeMemoryGame()" ontouchend="event.preventDefault();closeMemoryGame();">Close</button>
</div>
<div id="puzzle-modal">
  <button class="close-btn" onclick="closePuzzle()" ontouchend="event.preventDefault();closePuzzle();">&times;</button>
  <h3 id="puzzle-title"></h3>
  <div class="puzzle-desc" id="puzzle-desc"></div>
  <input id="puzzle-input" autocomplete="off" spellcheck="false" placeholder="Enter answer...">
  <button id="puzzle-submit" onclick="submitPuzzle()">SUBMIT</button>
  <div class="puzzle-feedback" id="puzzle-feedback"></div>
</div>
<div id="start-screen">
  <svg viewBox="0 0 400 700" style="width:min(95vw,400px);height:auto;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <style>
        .crayon{stroke:#222;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
        .crayon-thin{stroke:#222;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .crayon-thk{stroke:#222;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}
      </style>
    </defs>

    <!-- SKY: light blue scribbly background -->
    <rect x="0" y="0" width="400" height="700" fill="#b0daf8" rx="6"/>
    <path d="M0,10 Q50,5 100,12 Q200,2 300,14 Q350,6 400,10 L400,0 L0,0Z" fill="#9ad0f5" opacity="0.5"/>
    <path d="M0,30 Q80,22 160,32 Q260,20 400,35" fill="none" stroke="#8ac4f0" stroke-width="8" opacity="0.3"/>
    <path d="M0,55 Q120,45 200,58 Q300,48 400,55" fill="none" stroke="#7cb8e8" stroke-width="6" opacity="0.2"/>

    <!-- SUN with sunglasses (top left) -->
    <g transform="translate(55,55)">
      <!-- Rays -->
      <line x1="0" y1="-44" x2="2" y2="-60" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="30" y1="-32" x2="44" y2="-46" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="44" y1="-2" x2="61" y2="-4" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="32" y1="28" x2="46" y2="40" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-2" y1="43" x2="-4" y2="59" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-32" y1="28" x2="-46" y2="42" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-44" y1="-1" x2="-60" y2="1" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <line x1="-31" y1="-33" x2="-45" y2="-47" stroke="#f5c842" stroke-width="5" stroke-linecap="round"/>
      <!-- Sun face -->
      <circle cx="0" cy="0" r="30" fill="#ffe23c" class="crayon"/>
      <!-- Sunglasses -->
      <rect x="-20" y="-10" width="16" height="11" rx="3" fill="#222" stroke="#111" stroke-width="2"/>
      <rect x="5" y="-10" width="16" height="11" rx="3" fill="#222" stroke="#111" stroke-width="2"/>
      <line x1="-4" y1="-5" x2="5" y2="-5" stroke="#222" stroke-width="2.5"/>
      <line x1="-20" y1="-5" x2="-28" y2="-9" stroke="#222" stroke-width="2"/>

var audioCtx=null;var themeTimeout=null;var soundOn=true;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}

// ── Canvas sizing ──
// Background cache (#38) — cache the static part of each room
var _bgCache={canvas:null,room:-1,w:0,h:0};
function invalidateBgCache(){_bgCache.room=-1;}
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  svgLayer.setAttribute('viewBox',`0 0 ${window.innerWidth} ${window.innerHeight}`);
  svgLayer.style.width = window.innerWidth+'px';
  svgLayer.style.height = window.innerHeight+'px';
  invalidateBgCache();
  drawRoom();
  drawCharacters();
}
window.addEventListener('resize',resize);

// ── NES-style pixel background drawing ──
function drawRoom(){
  if(!G.gameStarted) return;
  const W=canvas.width, H=canvas.height;
  const ps = Math.max(4, Math.floor(W/120)); // pixel size
  ctx.fillStyle = ROOMS[G.room].color;
  ctx.fillRect(0,0,W,H);

  // Draw room-specific backgrounds
  switch(G.room){
    case 0: drawDunphyLiving(W,H,ps); break;
    case 1: drawGloriaKitchen(W,H,ps); break;
    case 2: drawCamMitchellLiving(W,H,ps); break;
    case 3: drawHighSchool(W,H,ps); break;
    case 4: drawBackyardBBQ(W,H,ps); break;
    case 5: drawPeeweePlayhouse(W,H,ps); break;
    case 6: drawHellBureaucracy(W,H,ps); break;
    case 7: drawAquarium(W,H,ps); break;
    case 8: drawBackToReality(W,H,ps); break;
  }
}

function pixRect(x,y,w,h,color,ps){
  ctx.fillStyle=color;
  const px=Math.floor(x/ps)*ps, py=Math.floor(y/ps)*ps;
  for(let i=px;i<px+w;i+=ps)for(let j=py;j<py+h;j+=ps){
    ctx.fillRect(i,j,ps-1,ps-1);
  }
}

function drawFloor(W,H,ps,color1,color2,wallColor,floorY){
  // Wall
  pixRect(0,0,W,floorY,wallColor,ps);
  // Floor
  for(let x=0;x<W;x+=ps*2){
    for(let y=floorY;y<H;y+=ps){
      ctx.fillStyle=((Math.floor(x/(ps*4))+Math.floor(y/(ps*4)))%2===0)?color1:color2;
      ctx.fillRect(x,y,ps*2-1,ps-1);
    }
  }
}

// Helper: draw a subtle shadow ellipse under furniture
function drawShadow(cx, bottomY, width, opacity){
  ctx.fillStyle='rgba(0,0,0,'+(opacity||0.15)+')';
  ctx.beginPath();
  ctx.ellipse(cx, bottomY+2, width/2, width*0.08, 0, 0, Math.PI*2);
  ctx.fill();
}

// Helper: draw warm ambient light from a source point
function drawAmbientGlow(cx, cy, radius, color){
  var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,radius);
  grd.addColorStop(0, color || 'rgba(255,220,140,0.12)');
  grd.addColorStop(1, 'rgba(255,220,140,0)');
  ctx.fillStyle=grd;
  ctx.fillRect(cx-radius,cy-radius,radius*2,radius*2);
}

function drawDunphyLiving(W,H,ps){
  // Use consistent unit so objects have correct proportions on any screen
  var U=Math.min(W,H)/10; // 1 unit = 1/10 of smaller dimension
  var floorY=H*0.55;
  // Walls - warm yellow like title screen house
  ctx.fillStyle='#d9c468';
  ctx.fillRect(0,0,W,floorY);
  // Crayon-textured walls (#11) - more visible strokes
  ctx.strokeStyle='rgba(200,170,80,0.2)';ctx.lineWidth=4;ctx.lineCap='round';
  for(var i=0;i<W;i+=14){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+3,floorY);ctx.stroke();}
  // Diagonal crayon scribbles
  ctx.strokeStyle='rgba(210,180,70,0.1)';ctx.lineWidth=6;
  for(var i=-H;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+floorY*0.6,floorY);ctx.stroke();}
  // Baseboard
  ctx.fillStyle='#a08060';ctx.fillRect(0,floorY-6,W,6);
  ctx.strokeStyle='#805030';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,floorY-6);ctx.lineTo(W,floorY-6);ctx.stroke();
  // Floor - warm wood planks with visible grain (#17)
  for(var y=floorY;y<H;y+=16){
    var rowIdx=Math.floor((y-floorY)/16);
    ctx.fillStyle=(rowIdx%2===0)?'#c8a070':'#b89060';
    ctx.fillRect(0,y,W,16);
    // Wood grain lines
    ctx.strokeStyle='rgba(120,70,20,0.12)';ctx.lineWidth=1;
    for(var gy=y+3;gy<y+16;gy+=4){ctx.beginPath();ctx.moveTo(0,gy);for(var gx=0;gx<W;gx+=30){ctx.lineTo(gx+15,gy+Math.sin(gx*0.1+rowIdx)*1.5);}ctx.stroke();}
    // Plank seam lines
    ctx.strokeStyle='rgba(80,40,10,0.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    // Plank gaps (staggered)
    var off=(rowIdx%2)*W*0.3;
    for(var x=off;x<W;x+=W*0.25){ctx.strokeStyle='rgba(80,40,10,0.2)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+16);ctx.stroke();}
    // Knot holes (occasional)
    if(rowIdx%4===2){ctx.fillStyle='rgba(100,50,15,0.15)';ctx.beginPath();ctx.arc(W*0.4+rowIdx*31,y+8,3,0,Math.PI*2);ctx.fill();}
  }
  ctx.lineCap='round';ctx.lineJoin='round';
  // All objects use U (unit) for consistent proportions on any screen
  var cx=W/2; // center x
  ctx.lineCap='round';ctx.lineJoin='round';

  // === COUCH (right side, sitting ON the floor) ===
  var couchW=U*3.2, couchH=U*1.0;
  var couchX=cx+U*0.8, couchY=floorY-couchH;
  crayonRoundRect(ctx,couchX,couchY,couchW,couchH,U*0.15,'#7090b0','#333',3);
  // Couch back (against wall behind couch)
  var backH=U*1.2;
  crayonRoundRect(ctx,couchX,couchY-backH+U*0.1,couchW,backH,U*0.12,'#6080a0','#333',2.5);
  // Arms
  crayonRoundRect(ctx,couchX-U*0.25,couchY-backH+U*0.1,U*0.35,backH+couchH-U*0.1,U*0.1,'#5878a0','#333',2.5);
  crayonRoundRect(ctx,couchX+couchW-U*0.1,couchY-backH+U*0.1,U*0.35,backH+couchH-U*0.1,U*0.1,'#5878a0','#333',2.5);
  // Cushion lines
  ctx.strokeStyle='rgba(50,70,100,0.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(couchX+couchW*0.33,couchY+2);ctx.lineTo(couchX+couchW*0.33,couchY+couchH-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(couchX+couchW*0.66,couchY+2);ctx.lineTo(couchX+couchW*0.66,couchY+couchH-2);ctx.stroke();
  // Throw pillows (on the couch seat)
  crayonRoundRect(ctx,couchX+U*0.2,couchY+U*0.1,U*0.45,U*0.5,U*0.06,'#e08080','#a04040',2);
  crayonRoundRect(ctx,couchX+couchW-U*0.6,couchY+U*0.1,U*0.45,U*0.5,U*0.06,'#80c0e0','#4080a0',2);

  // === TV + STAND (left side, on the floor) ===
  var tvW=U*1.8, standH=U*0.7, tvH=U*1.3;
  var tvX=W*0.06, tvStandY=floorY-standH;
  // Stand legs
  crayonRoundRect(ctx,tvX+U*0.2,tvStandY,U*0.15,standH,U*0.03,'#5a3e28','#333',2);
  crayonRoundRect(ctx,tvX+tvW-U*0.35,tvStandY,U*0.15,standH,U*0.03,'#5a3e28','#333',2);
  // Stand top
  crayonRoundRect(ctx,tvX,tvStandY,tvW,U*0.15,U*0.04,'#5a3e28','#333',2.5);
  // TV on top of stand
  crayonRoundRect(ctx,tvX-U*0.1,tvStandY-tvH,tvW+U*0.2,tvH,U*0.08,'#222','#444',3);
  // Screen
  crayonRoundRect(ctx,tvX,tvStandY-tvH+U*0.1,tvW,tvH-U*0.2,U*0.05,'#3060a0','#222',2);
  // Rabbit ears
  ctx.strokeStyle='#666';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(tvX+tvW*0.4,tvStandY-tvH);ctx.quadraticCurveTo(tvX+tvW*0.2,tvStandY-tvH-U*0.8,tvX,tvStandY-tvH-U);ctx.stroke();
  ctx.beginPath();ctx.moveTo(tvX+tvW*0.6,tvStandY-tvH);ctx.quadraticCurveTo(tvX+tvW*0.8,tvStandY-tvH-U*0.8,tvX+tvW,tvStandY-tvH-U);ctx.stroke();

  // === PURPLE DOOR (center, locked!) ===
  var doorW=U*1.5, doorH=U*4, doorX=cx-doorW/2, doorY=floorY-doorH;
  crayonRoundRect(ctx,doorX,doorY,doorW,doorH,U*0.06,'#8844aa','#333',3.5);
  // Door knob
  ctx.fillStyle='#ffd700';ctx.strokeStyle='#b8960c';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(doorX+doorW*0.82,doorY+doorH*0.55,U*0.15,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Phil-Lock 3000
  crayonRoundRect(ctx,doorX+U*0.15,doorY+doorH*0.35,U*1.2,U*1,U*0.08,'#c0c0c0','#888',2.5);
  ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(doorX+U*0.6,doorY+doorH*0.45,U*0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0f0';ctx.beginPath();ctx.arc(doorX+U*0.6,doorY+doorH*0.52,U*0.08,0,Math.PI*2);ctx.fill();
  // "PHIL-LOCK 3000" label
  ctx.fillStyle='#333';ctx.font=(U*0.18)+'px monospace';ctx.textAlign='center';
  ctx.fillText('PHIL-LOCK',doorX+doorW/2,doorY+doorH*0.62);ctx.textAlign='left';

  // === WINDOW (right wall) ===
  var winX=W-U*2, winY=floorY*0.2, winW=U*1.6, winH=U*2;
  crayonRoundRect(ctx,winX,winY,winW,winH,U*0.05,'#a0d8f8','#805030',3);
  ctx.strokeStyle='#805030';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(winX+winW/2,winY);ctx.lineTo(winX+winW/2,winY+winH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(winX,winY+winH/2);ctx.lineTo(winX+winW,winY+winH/2);ctx.stroke();
  // Curtains (#12 animated sway)
  var curtainSway=Math.sin(Date.now()/1200)*U*0.08;
  ctx.fillStyle='rgba(200,100,100,0.35)';
  ctx.beginPath();ctx.moveTo(winX-U*0.1,winY-U*0.1);ctx.quadraticCurveTo(winX+U*0.2+curtainSway,winY+winH/2,winX-U*0.05+curtainSway*0.5,winY+winH+U*0.1);ctx.lineTo(winX-U*0.1,winY+winH+U*0.1);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(winX+winW+U*0.1,winY-U*0.1);ctx.quadraticCurveTo(winX+winW-U*0.2-curtainSway,winY+winH/2,winX+winW+U*0.05-curtainSway*0.5,winY+winH+U*0.1);ctx.lineTo(winX+winW+U*0.1,winY+winH+U*0.1);ctx.closePath();ctx.fill();

  // === FRIDGE (far left) ===
  var fridgeX=W*0.01, fridgeY=floorY-U*4, fridgeW=U*1, fridgeH=U*3.8;
  crayonRoundRect(ctx,fridgeX,fridgeY,fridgeW,fridgeH,U*0.06,'#e8e8e8','#bbb',2.5);
  ctx.strokeStyle='#bbb';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fridgeX,fridgeY+fridgeH*0.45);ctx.lineTo(fridgeX+fridgeW,fridgeY+fridgeH*0.45);ctx.stroke();
  ctx.strokeStyle='#999';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(fridgeX+fridgeW-U*0.12,fridgeY+U*0.4);ctx.lineTo(fridgeX+fridgeW-U*0.12,fridgeY+U*1.2);ctx.stroke();
  // Tally chart on fridge
  crayonRoundRect(ctx,fridgeX+U*0.1,fridgeY+U*0.2,U*0.6,U*0.7,U*0.03,'#fff','#aaa',1.5);
  ctx.strokeStyle='#c00';ctx.lineWidth=1.5;
  for(var t=0;t<5;t++){ctx.beginPath();ctx.moveTo(fridgeX+U*0.18+t*U*0.09,fridgeY+U*0.3);ctx.lineTo(fridgeX+U*0.18+t*U*0.09,fridgeY+U*0.75);ctx.stroke();}

  // === BOOKSHELF (between fridge and door) ===
  var shelfX=doorX-U*1.5, shelfY=floorY-U*3, shelfW=U*1, shelfH=U*2.8;
  crayonRoundRect(ctx,shelfX,shelfY,shelfW,shelfH,U*0.04,'#8B6914','#5a3e10',2.5);
  // Shelves

  // Books
  var bkCols=['#cc3333','#3366cc','#33aa33','#cc6600','#8833aa'];
  for(var row=0;row<3;row++){bkCols.forEach(function(c,i){crayonRoundRect(ctx,shelfX+U*0.06+i*U*0.16,shelfY+U*0.05+row*shelfH/4,U*0.14,shelfH/4-U*0.12,U*0.02,c,'#333',1.5);});}

  // === FAMILY PHOTO on wall ===
  crayonRoundRect(ctx,cx+U*2.5,floorY*0.15,U*0.9,U*1.1,U*0.04,'#f0d890','#805030',2.5);
  crayonRoundRect(ctx,cx+U*2.6,floorY*0.15+U*0.1,U*0.7,U*0.8,U*0.02,'#c0a0f0','#805030',1.5);

  crayonRoundRect(ctx,doorX-U*0.8,floorY*0.15,U*0.7,U*0.6,U*0.03,'#f0d890','#805030',2);

  // === SHADOWS under furniture ===
  drawShadow(couchX+couchW/2, floorY, couchW*0.9, 0.12);

  drawShadow(doorX+doorW/2, floorY, doorW*0.6, 0.08);
  drawShadow(shelfX+shelfW/2, floorY, shelfW*0.7, 0.08);

  // === Warm lamp glow from window corner ===
  drawAmbientGlow(W-U*1.2, floorY*0.3, U*4, 'rgba(255,220,140,0.1)');

  // === Rug on the floor ===
  ctx.save();
  ctx.translate(cx, floorY+H*0.12);
  ctx.scale(1, 0.35);
  ctx.fillStyle='rgba(160,60,60,0.18)';
  ctx.strokeStyle='rgba(120,40,40,0.25)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(0,0,U*2.5,U*2.5,0,0,Math.PI*2);ctx.fill();ctx.stroke();

  ctx.strokeStyle='rgba(200,160,80,0.2)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.ellipse(0,0,U*1.8,U*1.8,0,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,0,U*1.1,U*1.1,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // === More items on bookshelf ===

  ctx.fillStyle='#5588cc';ctx.strokeStyle='#333';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(shelfX+shelfW/2,shelfY-U*0.2,U*0.18,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.strokeStyle='#44aa44';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(shelfX+shelfW/2,shelfY-U*0.2,U*0.18,U*0.06,0,0,Math.PI*2);ctx.stroke();

  // === Crayon drawings inside picture frames ===
  // First photo - stick family
  var pf1X=cx+U*2.6, pf1Y=floorY*0.15+U*0.1;
  ctx.strokeStyle='#805060';ctx.lineWidth=1;

// Helper for crayon-style rounded rectangles on canvas
function crayonRoundRect(c,x,y,w,h,r,fill,stroke,lw){
  c.fillStyle=fill;c.strokeStyle=stroke;c.lineWidth=lw||3;c.lineJoin='round';c.lineCap='round';
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();c.stroke();
}

// ── Room 7: Aquarium (everyone is fish) ──
function drawAquarium(W,H,ps){
  // Deep blue gradient
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a2040');grad.addColorStop(0.5,'#0e3060');grad.addColorStop(1,'#1a3a5c');

  ctx.fillStyle='#c8b088';ctx.fillRect(0,H*0.85,W,H*0.15);

  for(var si=0;si<W;si+=8){ctx.beginPath();ctx.arc(si,H*0.86+Math.random()*3,2,0,Math.PI);ctx.stroke();}
  // Animated bubbles
  var bt=Date.now()/1000;
  ctx.fillStyle='rgba(150,200,255,0.3)';ctx.strokeStyle='rgba(180,220,255,0.4)';ctx.lineWidth=1;
  for(var bi=0;bi<15;bi++){
    var bx=W*(0.05+bi*0.065)+Math.sin(bt*0.5+bi*2)*10;
    var by=H*(0.9-((bt*0.1+bi*0.15)%1));
    var br=2+Math.sin(bi)*2;
    ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);ctx.fill();ctx.stroke();
  }
  // Coral structures
  ctx.lineCap='round';ctx.lineJoin='round';
  // Left coral
  var coralCols=['#ff6080','#ff4060','#ff80a0','#e04060'];
  for(var ci=0;ci<4;ci++){
    ctx.strokeStyle=coralCols[ci];ctx.lineWidth=6-ci;
    ctx.beginPath();ctx.moveTo(W*0.08+ci*W*0.03,H*0.85);
    ctx.quadraticCurveTo(W*0.08+ci*W*0.03+Math.sin(ci*2)*10,H*0.75,W*0.1+ci*W*0.02,H*0.68+ci*H*0.03);
    ctx.stroke();
  }
  // Right coral
  var coralCols2=['#40c080','#30a060','#60d0a0','#50c080'];
  for(var ci=0;ci<4;ci++){
    ctx.strokeStyle=coralCols2[ci];ctx.lineWidth=5-ci*0.5;
    ctx.beginPath();ctx.moveTo(W*0.82+ci*W*0.02,H*0.85);
    ctx.quadraticCurveTo(W*0.84+ci*W*0.015,H*0.72,W*0.83+ci*W*0.025,H*0.65+ci*H*0.04);
    ctx.stroke();
  }
  // Seaweed (swaying animated)
  var sw=Date.now()/800;
  ctx.strokeStyle='#2a8040';ctx.lineWidth=4;
  for(var si=0;si<6;si++){
    var sx=W*(0.15+si*0.14);
    ctx.beginPath();ctx.moveTo(sx,H*0.85);
    ctx.quadraticCurveTo(sx+Math.sin(sw+si)*12,H*0.72,sx+Math.sin(sw+si+1)*8,H*0.6);
    ctx.stroke();
    ctx.strokeStyle='#3a9050';
    ctx.beginPath();ctx.moveTo(sx+5,H*0.85);
    ctx.quadraticCurveTo(sx+5+Math.sin(sw+si+0.5)*10,H*0.75,sx+Math.sin(sw+si+2)*6,H*0.65);
    ctx.stroke();
    ctx.strokeStyle='#2a8040';
  }
  // Current arrows (puzzle element)
  ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=3;ctx.setLineDash([8,6]);
  var arrows=[[0.2,0.3,0.35,0.28],[0.4,0.45,0.55,0.4],[0.6,0.25,0.75,0.3],[0.3,0.6,0.45,0.55]];
  arrows.forEach(function(a){
    ctx.beginPath();ctx.moveTo(W*a[0],H*a[1]);ctx.lineTo(W*a[2],H*a[3]);ctx.stroke();
    // Arrowhead
    var dx=W*a[2]-W*a[0],dy=H*a[3]-H*a[1];
    var len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    ctx.beginPath();ctx.moveTo(W*a[2],H*a[3]);ctx.lineTo(W*a[2]-dx*10-dy*5,H*a[3]-dy*10+dx*5);ctx.moveTo(W*a[2],H*a[3]);ctx.lineTo(W*a[2]-dx*10+dy*5,H*a[3]-dy*10-dx*5);ctx.stroke();
  });
  ctx.setLineDash([]);
  // Light rays from above
  ctx.fillStyle='rgba(100,180,255,0.05)';
  for(var li=0;li<4;li++){
    ctx.beginPath();ctx.moveTo(W*(0.2+li*0.2),0);ctx.lineTo(W*(0.15+li*0.2),H);ctx.lineTo(W*(0.25+li*0.2),H);ctx.closePath();ctx.fill();
  }
}

  }
  // DOOR (center, with DIFFERENT lock)
  var doorW=U*1.5, doorH=U*4, doorX=cx-doorW/2, doorY=floorY-doorH;

  ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(doorX+U*0.45,doorY+doorH*0.45,U*0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(doorX+U*0.6,doorY+doorH*0.45,U*0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0f0';ctx.beginPath();ctx.arc(doorX+U*0.75,doorY+doorH*0.45,U*0.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';ctx.font=(U*0.16)+'px monospace';ctx.textAlign='center';
  ctx.fillText('PHIL-LOCK 9000',doorX+doorW/2,doorY+doorH*0.62);ctx.textAlign='left';
  // Uncanny detail: family photo but everyone's eyes follow you
  crayonRoundRect(ctx,cx-U*3,floorY*0.15,U*0.9,U*1.1,U*0.04,'#d090f0','#805030',2.5);
  // Subtle glitch lines
  if(Math.random()>0.85){
    ctx.fillStyle='rgba(0,255,0,0.1)';
    ctx.fillRect(0,Math.random()*H,W,3);
  }
  // Pee-wee peeking from behind curtain (right edge)
  ctx.fillStyle='rgba(100,100,100,0.4)';ctx.fillRect(W-U*0.8,floorY*0.1,U*0.8,floorY*0.8);

  ctx.fillStyle='#f0c8a0';ctx.beginPath();ctx.arc(W-U*0.5,floorY*0.4,U*0.2,0,Math.PI*2);ctx.fill();

  ctx.strokeStyle='#c04020';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(W-U*0.5,floorY*0.43,U*0.08,0,Math.PI);ctx.stroke();

// ── SVG Character Drawing ──
// Wobbly line helper
function wobbly(x1,y1,x2,y2,wobble=3){
  const mx=(x1+x2)/2+((Math.random()-0.5)*wobble*2);
  const my=(y1+y2)/2+((Math.random()-0.5)*wobble*2);
  return `Q${mx},${my} ${x2},${y2}`;
}
function wobblySeed(x1,y1,x2,y2,seed,wobble=3){
  const s=Math.sin(seed*127.1)*43758.5453;
  const c=Math.cos(seed*269.5)*43758.5453;
  const mx=(x1+x2)/2+((s-Math.floor(s))-0.5)*wobble*2;
  const my=(y1+y2)/2+((c-Math.floor(c))-0.5)*wobble*2;
  return `Q${mx},${my} ${x2},${y2}`;
}

const _svgKebab={strokeWidth:'stroke-width',strokeLinecap:'stroke-linecap',strokeLinejoin:'stroke-linejoin',strokeDasharray:'stroke-dasharray',textAnchor:'text-anchor',fontSize:'font-size',fontFamily:'font-family',fontWeight:'font-weight',fillOpacity:'fill-opacity',strokeOpacity:'stroke-opacity'};
function svgEl(tag,attrs={}){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs)) el.setAttribute(_svgKebab[k]||k,v);
  return el;
}

function drawCharacters(){
  if(!G.gameStarted) return;
  svgLayer.innerHTML='';
  const W=window.innerWidth, H=window.innerHeight;

  // Draw room-specific characters
  switch(G.room){
    case 0: drawRoom0Chars(W,H); break;
    case 1: drawRoom1Chars(W,H); break;
    case 2: drawRoom2Chars(W,H); break;
    case 3: drawRoom3Chars(W,H); break;
    case 4: drawRoom4Chars(W,H); break;
    case 5: drawRoom5Chars(W,H); break;
    case 6: drawRoom6Chars(W,H); break;
    case 7: drawRoom7Chars(W,H); break;
    case 8: drawRoom8Chars(W,H); break;
  }

  // Always draw Keira — ground on the floor
  var keiraFloorY = (G.room===6) ? H*0.6 : (G.room===7 ? H*0.7 : H*0.55);
  var keiraScale = Math.min(W,H)*0.0015;
  var keiraGroundedY = groundY(keiraFloorY, keiraScale, 93);
  drawKeira(W*G.keira.x, keiraGroundedY, W, H);

  // Luke in every room doing something absurd (#35)
  if(G.room !== 0 && G.room <= 4){
    var lukeFloorY = (G.room===6) ? H*0.6 : H*0.55;
    var lukeTinyScale = Math.min(W*0.4,H*0.4)*0.001;
    var lukeTinyGroundY = groundY(lukeFloorY, lukeTinyScale);
    var lukePositions=[[0,0],[W*0.88,lukeTinyGroundY],[W*0.92,lukeTinyGroundY],[W*0.08,lukeTinyGroundY],[W*0.9,lukeTinyGroundY]];
    drawLuke(lukePositions[G.room][0], lukePositions[G.room][1], W*0.4, H*0.4, true);
  }
}

// ── Character: Keira (protagonist) ──
function drawKeira(cx,cy,W,H){
  const s = Math.min(W,H)*0.0015;
  const g = svgEl('g',{transform:`translate(${cx},${cy}) scale(${s})`});
  g.setAttribute('class','keira');
  const flip = G.keira.facing < 0 ? `scale(-1,1)` : '';
  const inner = svgEl('g',{transform:flip});

  // Walk bob
  const bob = G.keira.walking ? Math.sin(Date.now()/120)*3 : 0;

  // Birkenstocks

function drawSimpleChar(cx,cy,scale,opts){
  // Idle breathing animation (#14)

  g.appendChild(svgEl('line',{x1:'8',y1:'55',x2:'10',y2:'80',stroke:opts.pantsColor||'#336',strokeWidth:'10','stroke-linecap':'round'}));

  // Shoes
  g.appendChild(svgEl('ellipse',{cx:'-10',cy:'82',rx:'10',ry:'4',fill:opts.shoeColor||'#333',stroke:'#222',strokeWidth:'1.5'}));
  g.appendChild(svgEl('ellipse',{cx:'10',cy:'82',rx:'10',ry:'4',fill:opts.shoeColor||'#333',stroke:'#222',strokeWidth:'1.5'}));

  // Arms
  g.appendChild(svgEl('path',{d:`M-18,25 Q-32,35 -28,50`,stroke:opts.bodyColor||'#4080c0',strokeWidth:'8','stroke-linecap':'round',fill:'none'}));
  g.appendChild(svgEl('path',{d:`M18,25 Q32,35 28,50`,stroke:opts.bodyColor||'#4080c0',strokeWidth:'8','stroke-linecap':'round',fill:'none'}));
  g.appendChild(svgEl('circle',{cx:'-28',cy:'52',r:'5',fill:opts.skinColor||'#f0c8a0',stroke:'#333',strokeWidth:'1.5'}));
  g.appendChild(svgEl('circle',{cx:'28',cy:'52',r:'5',fill:opts.skinColor||'#f0c8a0',stroke:'#333',strokeWidth:'1.5'}));

  // Head
  g.appendChild(svgEl('ellipse',{cx:'0',cy:'-2',rx:'20',ry:`${opts.headSize||22}`,fill:opts.skinColor||'#f0c8a0',stroke:'#333',strokeWidth:'2.5','stroke-linecap':'round'}));

  // Hair
  if(opts.hair) opts.hair(g);

  // Eyes
  g.appendChild(svgEl('circle',{cx:'-7',cy:'-4',r:'3',fill:'#222'}));
  g.appendChild(svgEl('circle',{cx:'7',cy:'-4',r:'3',fill:'#222'}));

  g.appendChild(svgEl('circle',{cx:'8',cy:'-5',r:'1',fill:'#fff'}));

  if(opts.mouth) opts.mouth(g);
  else g.appendChild(svgEl('path',{d:'M-5,8 Q0,13 5,8',stroke:'#a04020',strokeWidth:'2',fill:'none','stroke-linecap':'round'}));

  // Extras
  if(opts.extras) opts.extras(g);

  return g;
}

// Helper: compute cy so character feet touch the floor
// shoeLocalY = bottom of shoes in local SVG coords (default 86 for drawSimpleChar)
function groundY(floorY, scale, shoeLocalY){
  return floorY - (shoeLocalY || 86) * scale;
}

function addClickHandler(el, charName){
  // Invisible hit rect inside group for reliable touch on iOS
  setTimeout(function(){try{
    var bb=el.getBBox();
    // Hit rect
    var hr=svgEl('rect',{x:String(bb.x-8),y:String(bb.y-8),width:String(bb.width+16),height:String(bb.height+16),fill:'rgba(255,215,0,0.01)',stroke:'none'});
    el.insertBefore(hr,el.firstChild);
    // Glow outline around character
    var cg=svgEl('rect',{x:String(bb.x-6),y:String(bb.y-6),width:String(bb.width+12),height:String(bb.height+12),rx:'10',fill:'none',stroke:'#ffd700',strokeWidth:'2.5',opacity:'0'});
    cg.style.pointerEvents='none';
    var cgAnim=svgEl('animate',{attributeName:'opacity',values:'0;0.6;0',dur:'2s',repeatCount:'indefinite'});
    cg.appendChild(cgAnim);
    el.insertBefore(cg,el.firstChild);
  }catch(e){}},50);
  el.setAttribute('style','cursor:pointer;pointer-events:all');
  el.setAttribute('class','clickable');
  function handler(e){e.stopPropagation();e.preventDefault();getAudio();playClick();talkToCharacter(charName);}
  el.addEventListener('click',handler);
  el.addEventListener('touchend',function(e){e.stopPropagation();e.preventDefault();getAudio();playClick();talkToCharacter(charName);},{passive:false});
}

function drawClickableItem(x,y,w,h,id,label){
  // Bright pulsing glow outline
  var glow = svgEl('rect',{x:x-3,y:y-3,width:w+6,height:h+6,rx:'8',fill:'rgba(255,215,0,0.06)',stroke:'#ffd700',strokeWidth:'3',opacity:'0','class':'item-glow'});
  var glowAnim = svgEl('animate',{attributeName:'opacity',values:'0;0.9;0',dur:'1.8s',repeatCount:'indefinite'});
  glow.appendChild(glowAnim);
  glow.style.pointerEvents='none';
  svgLayer.appendChild(glow);

  // Clickable rect
  var rect = svgEl('rect',{x:x,y:y,width:w,height:h,fill:'rgba(255,215,0,0.01)',stroke:'none','class':'clickable','data-item':id});
  rect.setAttribute('style','pointer-events:all;cursor:pointer');
  function itemHandler(e){e.stopPropagation();e.preventDefault();getAudio();playClick();glow.setAttribute('opacity','1');setTimeout(function(){glow.setAttribute('opacity','0');},200);interactItem(id,label);}
  rect.addEventListener('click',itemHandler);
  rect.addEventListener('touchend',itemHandler,{passive:false});
  svgLayer.appendChild(rect);
}

// Flash all hotspots briefly when entering a room
var _hotspotFlashTimer=null;
function flashHotspots(){
  clearTimeout(_hotspotFlashTimer);
  var glows=document.querySelectorAll('.item-glow');
  var hands=svgLayer.querySelectorAll('text');
  glows.forEach(function(g){g.setAttribute('opacity','0.9');});
  _hotspotFlashTimer=setTimeout(function(){
    glows.forEach(function(g){g.setAttribute('opacity','0');});
  },1200);
}

let dialogueIndex = {};
let monologueTimeout = null;

function talkToCharacter(name){
  if(G.puzzleOpen) return;
  getAudio();
  const lines = DIALOGUE[name];
  if(!lines) return;
  if(!dialogueIndex[name]) dialogueIndex[name]=0;

  const [speaker,text] = lines[dialogueIndex[name] % lines.length];
  dialogueIndex[name]++;

  // #4 Speech indicator "..." above character before dialogue
  var speechDots=document.createElement('div');
  speechDots.className='speech-indicator';
  speechDots.textContent='...';
  speechDots.style.cssText='position:fixed;top:30%;left:50%;transform:translateX(-50%);font-size:24px;color:#ffd700;z-index:15;pointer-events:none;text-shadow:1px 1px 0 #000';
  document.body.appendChild(speechDots);
  setTimeout(function(){speechDots.remove();},600);

  playCharacterVoice(name);
  // #7 Character-specific sound variety
  if((name==='phil'||name==='phil-bbq') && text.toLowerCase().indexOf('burger')!==-1) playPhilLaugh();
  if((name==='gloria'||name==='gloria-bbq') && (text.indexOf('!')!==-1 && text.indexOf('!!')!==-1 || text.toUpperCase()===text.substring(0,20))) playGloriaYell();
  if((name==='cam'||name==='cam-bbq') && (text.indexOf('STANDING')!==-1||text.indexOf('Oklahoma')!==-1||text.indexOf('emotional')!==-1)) playCamGasp();
  showDialogue(speaker, text);

  // Show monologue after
  const monos = MONOLOGUES[name];
  if(monos){
    clearTimeout(monologueTimeout);
    monologueTimeout = setTimeout(()=>{
      showMonologue(monos[Math.floor(Math.random()*monos.length)]);
    }, 800);
  }
}

var SPEAKER_COLORS={
  'Phil':'#3070c0','Claire':'#9040a0','Gloria':'#d04080','Jay':'#4060a0',
  'Manny':'#805020','Cam':'#b030b0','Mitchell':'#407090','Lily':'#d060a0',
  'Haley':'#d06888','Luke':'#d08020','Keira':'#b05080',
  'Random Student':'#608060','Alex (via note)':'#3060a0',
  'Apple Watch Hint':'#e08020','Phil (BBQ)':'#3070c0','Everyone':'#888'
};
var _typewriterInterval=null;
function showDialogue(speaker, text){
  var spEl=dialogueBox.querySelector('.speaker');
  spEl.textContent = speaker;
  spEl.style.color = SPEAKER_COLORS[speaker]||'#c04040';
  var textEl=dialogueBox.querySelector('.text');
  textEl.textContent = '';
  dialogueBox.style.display = 'block';
  playTalk();

  // #3 Typewriter effect — reveal one char at a time
  clearInterval(_typewriterInterval);
  var charIdx=0;
  _typewriterInterval=setInterval(function(){
    if(charIdx<text.length){
      textEl.textContent+=text[charIdx];
      if(charIdx%3===0) playTypeBlip();
      charIdx++;
    } else {
      clearInterval(_typewriterInterval);
      _typewriterInterval=null;
    }
  },30);

  clearTimeout(dialogueBox._timer);
  dialogueBox._timer = setTimeout(()=>{
    dialogueBox.style.display='none';
  }, 8000+text.length*30);
}

function dismissDialogue(){dialogueBox.style.display='none';clearTimeout(dialogueBox._timer);clearInterval(_typewriterInterval);_typewriterInterval=null;getAudio();playBleep(300,0.03);}
dialogueBox.addEventListener('click',dismissDialogue);
dialogueBox.addEventListener('touchend',function(e){e.preventDefault();dismissDialogue();},{passive:false});

function showMonologue(text){
  monologueBox.textContent = '('+text+')';
  monologueBox.style.display='block';
  clearTimeout(monologueBox._timer);
  monologueBox._timer = setTimeout(function(){monologueBox.style.display='none';},8000);
}

function dismissMonologue(){monologueBox.style.display='none';clearTimeout(monologueBox._timer);}
monologueBox.addEventListener('click',dismissMonologue);
monologueBox.addEventListener('touchend',function(e){e.preventDefault();dismissMonologue();},{passive:false});

function spawnSparkles(){

function openPuzzle(roomIdx){
  getAudio();
  if(G.solved[roomIdx] && roomIdx !== 4 && roomIdx !== 8) return;
  if(G.solved[roomIdx] && (roomIdx === 4 || roomIdx === 8)) return;
  // Room 4 requires rooms 0-3 solved
  if(roomIdx === 4 && !G.solved[0]){
    showDialogue('Keira','I need to solve all the other rooms first. Back to the Dunphy house!');
    return;
  }
  if(roomIdx === 4 && !G.solved[1]){
    showDialogue('Keira','Still need to crack Gloria\'s kitchen. Let me head back.');
    return;
  }
  if(roomIdx === 4 && !G.solved[2]){
    showDialogue('Keira','Cam and Mitchell\'s place isn\'t done yet.');
    return;
  }
  if(roomIdx === 4 && !G.solved[3]){
    showDialogue('Keira','Need to finish at the school first.');
    return;
  }
  // Room 8 requires rooms 5-7 solved
  if(roomIdx === 8 && !G.solved[5]){
    showDialogue('Keira','I need the code from Pee-wee\'s Playhouse first!');
    return;
  }
  if(roomIdx === 8 && !G.solved[6]){
    showDialogue('Keira','Still need to escape Hell. Literally.');
    return;
  }
  if(roomIdx === 8 && !G.solved[7]){
    showDialogue('Keira','Need to navigate the aquarium currents first!');
    return;
  }

  // #14 Close dialogue if open before puzzle
  dismissDialogue();

  G.puzzleOpen = true;
  G.currentPuzzle = roomIdx;
  playPuzzleDing();
  const p = PUZZLES[roomIdx];
  document.getElementById('puzzle-title').textContent = p.title;
  document.getElementById('puzzle-desc').textContent = p.desc;
  document.getElementById('puzzle-input').value = '';
  document.getElementById('puzzle-feedback').textContent = '';
  document.getElementById('puzzle-feedback').style.color = '#c00';
  overlay.style.display = 'block';
  puzzleModal.style.display = 'block';
  // #5 Puzzle UX — auto-focus
  setTimeout(function(){document.getElementById('puzzle-input').focus();},100);
}

function closePuzzle(){
  G.puzzleOpen = false;
  G.currentPuzzle = null;
  overlay.style.display = 'none';
  puzzleModal.style.display = 'none';
}

  getAudio();

  if(idx===null) return;
  const p = PUZZLES[idx];
  const val = document.getElementById('puzzle-input').value.trim().toLowerCase();

  if(val === ''){
    document.getElementById('puzzle-feedback').textContent = 'Enter an answer first!';

      showDialogue('', p.successMsg);

      showNotification('Room solved! Clue: ' + p.clueWord);
      // #9 Progress satisfaction — room complete banner + confetti
      showRoomCompleteBanner(idx);
      playRoomCompleteFanfare();
      saveGame();
      updateObjective();
      updateProgress();
      var remainingRooms=G.solved.filter(function(v,i){return !v && i<(G.room>=5?9:5);}).length;
      setTimeout(()=>{
        showMonologue('Room '+(idx+1)+' cleared! The clue word is "'+p.clueWord+'". '+remainingRooms+' rooms to go!');
      },2000);
      // Auto-advance offer (#30)

        setTimeout(function(){
          if(G.room < 8){
            showDialogue('Keira','Room cleared! Tap the arrow to continue to the next room.');
          }
        },4000);
      }
    }
  } else {
    document.getElementById('puzzle-feedback').textContent = getWrongAnswer(idx);
    document.getElementById('puzzle-feedback').style.color = '#c00';
    playWrong();
    // Shake the input (#29)
    var inp=document.getElementById('puzzle-input');
    inp.style.animation='none';inp.offsetHeight;inp.style.animation='shake 0.4s ease';
  }
}

function getWrongAnswer(idx){
  var val=document.getElementById('puzzle-input').value.trim().toLowerCase();
  var ans=PUZZLES[idx].answer.toLowerCase();
  // Check partial match for digit-based puzzles
  var hint='';
  if(idx!==2 && idx!==4 && val.length===ans.length){
    var correct=0;
    for(var i=0;i<val.length;i++){if(val[i]===ans[i])correct++;}
    if(correct>0) hint=' ('+correct+'/'+ans.length+' digits correct)';
  } else if(idx===4){
    // Check how many words match
    var vw=val.split(/\s+/),aw=ans.split(/\s+/),match=0;
    aw.forEach(function(w){if(vw.indexOf(w)!==-1)match++;});
    if(match>0) hint=' ('+match+'/'+aw.length+' words correct)';
  }
  const wrongs = [
    ["Phil: 'Nice try! But that's not Phil-osophically correct!'","Claire: 'Wrong. Just like Phil's lock.'","Haley: 'Even I know that's wrong. And I don't know things.'"],
    ["Gloria: 'NO! That is WRONG! Like Jay's taste in music!'","Jay: 'Nope. Try again.'","Manny: 'Incorrect. As Rilke once said... actually he never said anything about lock codes.'"],
    ["Cam: 'WRONG NOTE! That's like playing Phantom without the mask!'","Mitchell: 'Incorrect. I would object, but I'm too tired.'","Lily: 'Nope. Try harder.'"],
    ["Alex (via note): 'Wrong. I expected better. Well, no I didn't.'","Random Student: 'That's wrong and it's not even on the test.'","Keira: 'Okay, I'm definitely smarter than this. Let me think.'"],
    ["Phil: 'That's not it! But I believe in you! BURGER-IFIC BELIEF!'","Everyone: '...'","Gloria: 'AY! Try again! Use your BRAIN!'"],
    ["Pee-wee: 'I know you are but what am I? WRONG, that's what!'","Phil: 'Even I know that's not right! And I don't know ANYTHING!'","Conky: *prints 'INCORRECT'*"],
    ["Satan/Jay: 'Wrong. Take another number. Start over. Welcome to hell.'","Demon Secretary: 'Form rejected. Please re-submit in triplicate.'","Cam: 'Even in hell, I'd get this right. Probably.'"],
    ["Phil-Fish: 'That's not the right current! You're swimming UPSTREAM!'","Gloria-Fish: 'WRONG! Even fish know this!'","Cam-Fish: *inflates in disappointment*"],
    ["Phil: 'So close! But also so far! Like my Phil-Lock 3000 days!'","Gloria: 'AY! Think about ALL the rooms! ALL of them!'","Cam: 'Wrong note! Try the whole medley!'"]
  ];
  if(idx>=wrongs.length) return "That's not right. Try again!" + hint;
  return wrongs[idx][Math.floor(Math.random()*wrongs[idx].length)] + hint;
}

function useHint(){
  getAudio();
  const room = G.room;
  const used = G.hintsUsed[room]||0;
  if(used>=3) return;
  if(G.solved[room]){
    showNotification('Room already solved!');
    return;
  }
  G.hintsUsed[room] = used+1;
  const p = PUZZLES[room];
  const hint = [p.hint1,p.hint2,p.hint3][used];
  // #8 Hint system clarity — styled card
  showHintCard(hint, used+1);
  showNotification('Hint '+(used+1)+'/3 used');
  updateHintBtn();
  playHintChime();
  saveGame();
}
function showHintCard(text, num){
  var existing=document.querySelector('.hint-card');
  if(existing) existing.remove();
  var card=document.createElement('div');
  card.className='hint-card';
  card.innerHTML='<div class="hint-icon">\u{1F4A1}</div><div style="font-size:12px;color:#ffd700;margin-bottom:8px">HINT '+num+'/3</div><div class="hint-text">'+text+'</div><div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:12px">tap to dismiss</div>';
  function dismissHint(e){e.preventDefault();card.remove();}
  card.addEventListener('click',dismissHint);
  card.addEventListener('touchend',dismissHint,{passive:false});
  document.body.appendChild(card);
}
document.getElementById('hint-btn').addEventListener('click',useHint);
document.getElementById('hint-btn').addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();useHint();},{passive:false});

function updateHintBtn(){
  const btn = document.getElementById('hint-btn');
  const used = G.hintsUsed[G.room]||0;
  const left = 3-used;
  btn.textContent = `USE HINT (${left} left)`;
  btn.disabled = left<=0 || G.solved[G.room];
}

// ── Click / Touch to Move (#36) ──
function handleMove(clientX){
  if(!G.gameStarted || G.gameWon) return;
  getAudio();
  const targetX = clientX / window.innerWidth;
  G.keira.targetX = Math.max(0.1, Math.min(0.9, targetX));
  G.keira.walking = true;
  G.keira.facing = targetX > G.keira.x ? 1 : -1;
}
document.addEventListener('click',(e)=>{
  if(!G.gameStarted || G.gameWon) return;
  if(e.target.closest('#ui-layer') && !e.target.closest('#dialogue-box') && !e.target.closest('#monologue-box') && e.target.id!=='arrow-left' && e.target.id!=='arrow-right') return;
  if(e.target.closest('.clickable')) return;
  handleMove(e.clientX);
});

// ── Game Loop ──
function gameLoop(){
  if(!G.gameStarted) {requestAnimationFrame(gameLoop); drawWatch(); return;}

  // Move Keira
  if(G.keira.targetX !== null){
    const dx = G.keira.targetX - G.keira.x;
    if(Math.abs(dx) < 0.005){
      G.keira.x = G.keira.targetX;
      G.keira.targetX = null;
      G.keira.walking = false;
    } else {
      G.keira.x += dx * 0.13;
      G.keira.facing = dx > 0 ? 1 : -1;
    }
  }

  drawRoom();
  drawCharacters();
  drawWatch();

  // #12 Timer urgency check
  checkTimerUrgency();

  requestAnimationFrame(gameLoop);
}

function saveGame(){
  const data = {
    room: G.room,
    inventory: G.inventory,
    solved: G.solved,
    clueWords: G.clueWords,
    hintsUsed: G.hintsUsed,
    elapsed: G.elapsed + (Date.now()-G.startTime),
    itemsFound: G.itemsFound,
    dialogueIndex: dialogueIndex,
    clickCounts: G.clickCounts,
    version: 2
  };
  try{localStorage.setItem('modernfamily-save',JSON.stringify(data));}catch(e){}
}

function loadGame(){
  try{
    const raw = localStorage.getItem('modernfamily-save');
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data.version) return false;
    G.room = data.room||0;
    G.inventory = data.inventory||[];
    G.solved = data.solved||[false,false,false,false,false,false,false,false,false];
    // Extend saved arrays to 9 if they were from old 5-room save
    while(G.solved.length<9) G.solved.push(false);
    G.clueWords = data.clueWords||['','','','','','','','',''];
    while(G.clueWords.length<9) G.clueWords.push('');
    G.hintsUsed = data.hintsUsed||[0,0,0,0,0,0,0,0,0];
    while(G.hintsUsed.length<9) G.hintsUsed.push(0);
    G.elapsed = data.elapsed||0;
    G.itemsFound = data.itemsFound||{};
    G.clickCounts = data.clickCounts||{};
    dialogueIndex = data.dialogueIndex||{};
    return true;
  }catch(e){return false;}
}

// ── Memory Match Mini Game ──
var _mgState={cards:[],flipped:[],matched:0,locked:false,timer:null,timeLeft:30,pairs:6};
function openMemoryGame(){
  var items=['\u{1F511}','\u{1F4FA}','\u{1F4F7}','\u{1F4DD}','\u{1F3B5}','\u{1F4DA}'];
  var deck=items.concat(items);
  // Shuffle
  for(var i=deck.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deck[i];deck[i]=deck[j];deck[j]=t;}
  _mgState={cards:deck,flipped:[],matched:0,locked:false,timer:null,timeLeft:30,pairs:6};
  var grid=document.getElementById('mg-grid');
  grid.innerHTML='';
  deck.forEach(function(emoji,idx){
    var card=document.createElement('div');
    card.className='mg-card';
    card.dataset.idx=idx;
    card.textContent='?';
    card.addEventListener('click',function(){mgFlip(idx);});
    card.addEventListener('touchend',function(e){e.preventDefault();mgFlip(idx);},{passive:false});
    grid.appendChild(card);
  });
  document.getElementById('mg-score').textContent='Matches: 0/'+_mgState.pairs+' | Time: 30s';
  document.getElementById('memory-game-overlay').style.display='flex';
  _mgState.timer=setInterval(function(){
    _mgState.timeLeft--;
    document.getElementById('mg-score').textContent='Matches: '+_mgState.matched+'/'+_mgState.pairs+' | Time: '+_mgState.timeLeft+'s';
    if(_mgState.timeLeft<=0){clearInterval(_mgState.timer);closeMemoryGame();showNotification('Time up! Try again.');}
  },1000);
}
function mgFlip(idx){
  if(_mgState.locked) return;
  if(_mgState.flipped.indexOf(idx)!==-1) return;
  var cards=document.getElementById('mg-grid').children;
  if(cards[idx].classList.contains('matched')) return;
  cards[idx].textContent=_mgState.cards[idx];
  cards[idx].classList.add('flipped');
  _mgState.flipped.push(idx);
  playBleep(600+_mgState.flipped.length*100,0.05);
  if(_mgState.flipped.length===2){
    _mgState.locked=true;
    var a=_mgState.flipped[0],b=_mgState.flipped[1];
    if(_mgState.cards[a]===_mgState.cards[b]){
      cards[a].classList.add('matched');cards[b].classList.add('matched');
      _mgState.matched++;playCoin();
      document.getElementById('mg-score').textContent='Matches: '+_mgState.matched+'/'+_mgState.pairs+' | Time: '+_mgState.timeLeft+'s';
      _mgState.flipped=[];_mgState.locked=false;
      if(_mgState.matched===_mgState.pairs){clearInterval(_mgState.timer);setTimeout(function(){closeMemoryGame();showNotification('Memory Match complete!');playSuccess();},600);}
    } else {
      setTimeout(function(){
        cards[a].textContent='?';cards[a].classList.remove('flipped');
        cards[b].textContent='?';cards[b].classList.remove('flipped');
        _mgState.flipped=[];_mgState.locked=false;
      },700);
    }
  }
}
function closeMemoryGame(){
  clearInterval(_mgState.timer);
  document.getElementById('memory-game-overlay').style.display='none';
}

// Clock tick in Room 2
var _origDrawCamMitchellLiving=drawCamMitchellLiving;
drawCamMitchellLiving=function(W,H,ps){
  _origDrawCamMitchellLiving(W,H,ps);
  // Visible ticking clock
  var clkX=W*0.85,clkY=H*0.08,clkR=W*0.035;
  ctx.fillStyle='#fff';ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(clkX,clkY,clkR,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Hour marks
  for(var i=0;i<12;i++){var a=i*Math.PI/6-Math.PI/2;
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(clkX+Math.cos(a)*clkR*0.8,clkY+Math.sin(a)*clkR*0.8,1.5,0,Math.PI*2);ctx.fill();}
  // Hands
  var now=new Date();
  var ha=(now.getHours()%12+now.getMinutes()/60)*Math.PI/6-Math.PI/2;
  var ma=(now.getMinutes()+now.getSeconds()/60)*Math.PI/30-Math.PI/2;
  var sa=now.getSeconds()*Math.PI/30-Math.PI/2;
  ctx.strokeStyle='#333';ctx.lineWidth=2.5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(clkX,clkY);ctx.lineTo(clkX+Math.cos(ha)*clkR*0.5,clkY+Math.sin(ha)*clkR*0.5);ctx.stroke();
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(clkX,clkY);ctx.lineTo(clkX+Math.cos(ma)*clkR*0.7,clkY+Math.sin(ma)*clkR*0.7);ctx.stroke();
  ctx.strokeStyle='#f00';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(clkX,clkY);ctx.lineTo(clkX+Math.cos(sa)*clkR*0.7,clkY+Math.sin(sa)*clkR*0.7);ctx.stroke();
};

var _timerUrgencyState={pulse:false,dark:false,shake:false};
function checkTimerUrgency(){
  if(!G.gameStarted||G.gameWon) return;
  var elapsed=G.elapsed+(G.paused?0:(Date.now()-G.startTime));
  var remaining=Math.max(0,1800000-elapsed);
  var mins=remaining/60000;
  var body=document.body;
  if(mins<=5 && !_timerUrgencyState.pulse){
    _timerUrgencyState.pulse=true;
    body.classList.add('timer-pulse');

  if(mins<=2 && !_timerUrgencyState.dark){

      document.body.appendChild(darkOverlay);
    }
  }
  if(mins<=1 && !_timerUrgencyState.shake){
    _timerUrgencyState.shake=true;
    body.classList.add('timer-shake');
  }
}

    {ch:'Cam',ac:'*wiping tears*',tx:"I performed in FOUR different dimensions! QUADRUPLE CROWN!",d:17000},
    {ch:'Mitchell',ac:'*stress-organizing pillows*',tx:"I need therapy. ALL the therapy. And a LARGE glass of wine.",d:21000},
    {ch:'Luke',ac:'*hasn\'t moved*',tx:"...huh? Oh, we escaped? Cool. Back to my game.",d:25000},
    {ch:'Pee-wee',ac:'*peeking from curtain*',tx:"I know you are but what am I? HAHAHAHA!",d:28000}

// ── FEATURE 1: LIGHTS OFF OVERLAY (render loop hook) ──
// ══════════════════════════════════════════════════════════
var _indoorRooms = [0,1,2,3,5,6,8];

var _origGameLoop = gameLoop;
gameLoop = function(){
  _origGameLoop();
  if(!G.gameStarted || !G.lightsOff) return;
  var W=canvas.width, H=canvas.height;
  var isIndoor = _indoorRooms.indexOf(G.room) !== -1;
  if(!isIndoor){ G.lightsOff=false; G.uvActive=false; return; }

  if(G.uvActive && G.inventory.find(function(i){return i.name==="Phil's UV Flashlight";})){
    // UV mode: dark purple overlay
    ctx.fillStyle = 'rgba(26,0,48,0.75)';
    ctx.fillRect(0,0,W,H);
    // Draw Lily's hidden messages
    var lilyMessages = [
      "The code is on the fridge. - Lily",
      "Gloria hides chocolate behind the arepas. - Lily",
      "Cam cries at commercials. Even car ones. - Lily",
      "Alex thinks she's smarter than me. Wrong. - Lily",
      null,
      "This place is weird even for us. - Lily",
      "Hell has better WiFi than home. - Lily",
      null,
      "Wake up. This isn't real. - Lily"
    ];
    var msg = lilyMessages[G.room];
    if(msg){
      ctx.save();
      ctx.fillStyle='#cc88ff';
      ctx.font='bold '+Math.max(14,W*0.028)+'px Comic Sans MS';
      ctx.shadowColor='#aa44ff';
      ctx.shadowBlur=12;
      ctx.textAlign='center';
      ctx.fillText(msg, W*0.5, H*0.35);
      ctx.shadowBlur=0;
      ctx.restore();
    }
    // UV button glow
    ctx.fillStyle='rgba(170,68,255,0.3)';
    ctx.beginPath();ctx.arc(W*0.5,H*0.85,W*0.06,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#cc88ff';ctx.font='bold '+Math.max(10,W*0.02)+'px Comic Sans MS';
    ctx.textAlign='center';ctx.fillText('UV ON',W*0.5,H*0.86);ctx.textAlign='left';
  } else {
    // Full darkness overlay
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0,0,W,H);
    // Switch area glows faintly
    ctx.fillStyle='rgba(255,255,100,0.15)';
    ctx.beginPath();ctx.arc(W*0.97,H*0.28,W*0.04,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.6)';ctx.font='bold '+Math.max(8,W*0.015)+'px sans-serif';
    ctx.textAlign='center';ctx.fillText('SWITCH',W*0.97,H*0.29);ctx.textAlign='left';
    // If player has UV flashlight, show "Use UV Light" button
    if(G.inventory.find(function(i){return i.name==="Phil's UV Flashlight";})){
      ctx.fillStyle='rgba(100,40,180,0.5)';
      ctx.beginPath();
      ctx.roundRect(W*0.35,H*0.78,W*0.3,H*0.08,8);
      ctx.fill();
      ctx.strokeStyle='#aa44ff';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#cc88ff';ctx.font='bold '+Math.max(12,W*0.025)+'px Comic Sans MS';
      ctx.textAlign='center';ctx.fillText('Use UV Light',W*0.5,H*0.83);ctx.textAlign='left';
    }
  }
};

// Click handler for UV button in the dark
canvas.addEventListener('click',function(e){
  if(!G.lightsOff) return;
  var W=canvas.width, H=canvas.height;
  var cx=e.clientX, cy=e.clientY;
  // Check UV button click
  if(G.inventory.find(function(i){return i.name==="Phil's UV Flashlight";})){
    if(!G.uvActive && cx>W*0.35 && cx<W*0.65 && cy>H*0.78 && cy<H*0.86){
      G.uvActive=true;
      showNotification('UV Light activated! Look for hidden messages...');
      return;
    }
    if(G.uvActive && cx>W*0.44 && cx<W*0.56 && cy>H*0.82 && cy<H*0.9){
      G.uvActive=false;
      showNotification('UV Light deactivated');
      return;
    }
  }
});

var _mannyQuestions = [
  {q:"Who painted the Mona Lisa?", options:["Da Vinci","Picasso","Monet","Van Gogh"], answer:0},
  {q:"Capital of Colombia?", options:["Bogota","Lima","Caracas","Quito"], answer:0},

  {q:"Who composed Fur Elise?", options:["Beethoven","Mozart","Bach","Chopin"], answer:0},

  {q:"Who directed The Godfather?", options:["Coppola","Scorsese","Spielberg","Kubrick"], answer:0},

  {q:"Who painted Starry Night?", options:["Van Gogh","Monet","Renoir","Dali"], answer:0},
  {q:"Musical term for loud?", options:["Forte","Piano","Allegro","Adagio"], answer:0},
  {q:"What is a soliloquy?", options:["Solo speech","Duet","Song","Dance"], answer:0}
];

function openMannyTrivia(){
  getAudio();
  playBleep(330,0.1,'triangle');
  var picked = [];
  var pool = _mannyQuestions.slice();
  for(var i=0;i<3;i++){
    var ri=Math.floor(Math.random()*pool.length);
    picked.push(pool.splice(ri,1)[0]);
  }
  var currentQ = 0;
  var correct = 0;

  var modal = document.createElement('div');
  modal.id='manny-trivia-modal';
  modal.style.cssText='position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;font-family:Comic Sans MS,cursive';

  function renderQuestion(){
    var q = picked[currentQ];
    var html = '<div style="font-size:20px;color:#ffd700;margin-bottom:12px;font-weight:bold">MANNY\'S TRIVIA GATE</div>';
    html += '<div style="font-size:14px;color:#c68040;margin-bottom:20px;font-style:italic">"I\'m not letting you through without proof of CULTURE."</div>';
    html += '<div style="font-size:13px;color:#aaa;margin-bottom:8px">Question '+(currentQ+1)+' of 3</div>';
    html += '<div style="font-size:18px;color:#fff;margin-bottom:20px;max-width:350px">'+q.q+'</div>';
    for(var oi=0;oi<q.options.length;oi++){
      html += '<button class="manny-opt" data-idx="'+oi+'" style="display:block;width:min(80vw,300px);margin:6px auto;padding:12px;font-size:16px;font-family:Comic Sans MS,cursive;background:rgba(255,255,255,0.1);color:#fff;border:2px solid rgba(255,200,100,0.3);border-radius:10px;cursor:pointer;touch-action:manipulation">'+q.options[oi]+'</button>';
    }
    html += '<div id="manny-feedback" style="margin-top:12px;font-size:15px;min-height:24px;color:#e0a060"></div>';
    modal.innerHTML = html;
    // Add click handlers
    var btns = modal.querySelectorAll('.manny-opt');
    btns.forEach(function(btn){
      function handleOpt(ev){
        ev.preventDefault();ev.stopPropagation();
        var chosen = parseInt(btn.dataset.idx);
        var fb = document.getElementById('manny-feedback');
        if(chosen === q.answer){
          correct++;
          playSuccess();
          fb.textContent = 'Manny: "Finally, someone with TASTE."';
          fb.style.color = '#4a4';
          if(correct >= 3){
            G.mannyTriviaPassed = true;
            saveGame();
            setTimeout(function(){
              modal.remove();
              showCutscene('Manny','*steps aside with a bow*',"You have proven yourself worthy. Proceed, you person of CULTURE.",6000);
              setTimeout(function(){
                showRoomFade();G.room++;enterRoom();playBleep(520,0.06);
              },2000);
            },1200);
          } else {
            setTimeout(function(){currentQ++;renderQuestion();},1000);
          }
        } else {
          playWrong();
          fb.textContent = 'Manny: "Even Luke would know that." Starting over...';
          fb.style.color = '#c44';
          correct=0; currentQ=0;
          // Pick new 3 questions
          var pool2=_mannyQuestions.slice();
          picked=[];
          for(var j=0;j<3;j++){var rj=Math.floor(Math.random()*pool2.length);picked.push(pool2.splice(rj,1)[0]);}
          setTimeout(function(){renderQuestion();},1500);
        }
      }
      btn.addEventListener('click',handleOpt);
      btn.addEventListener('touchend',function(ev){ev.preventDefault();handleOpt(ev);},{passive:false});
    });
  }

  renderQuestion();
  document.body.appendChild(modal);
}

// Hook into navRight to intercept Room 1 exit
var _origNavRight = navRight;
navRight = function(e){
  if(e){e.preventDefault();e.stopPropagation();}
  getAudio();
  if(G.room === 1 && !G.mannyTriviaPassed){
    openMannyTrivia();
    return;
  }
  if(G.room<8){showRoomFade();G.room++;enterRoom();playBleep(520,0.06);}
};
// Re-bind arrow right
arrowRight.removeEventListener('click',_origNavRight);
arrowRight.removeEventListener('touchend',_origNavRight);
arrowRight.addEventListener('click',navRight);
arrowRight.addEventListener('touchend',navRight,{passive:false});

// ── FEATURE 5: USABLE ITEMS ──
// ══════════════════════════════════════════════════════════
var USABLE_ITEMS = ["Phil's UV Flashlight","Stella","Closet Key","Recipe Card","Gloria's Purse"];

// Override renderInvBar to add blue glow for usable items and active selection
var _origRenderInvBar = renderInvBar;
renderInvBar = function(){
  var bar=document.getElementById('inv-bar');if(!bar)return;
  if(!G.gameStarted||G.inventory.length===0){bar.style.display='none';return;}
  bar.style.display='flex';
  bar.innerHTML='';
  G.inventory.forEach(function(item,idx){
    var icon=INV_ICONS[item.name]||'\u{1F4E6}';
    var slot=document.createElement('div');
    slot.className='inv-slot';
    slot.title=item.name;
    slot.style.touchAction='manipulation';
    var isUsable = USABLE_ITEMS.indexOf(item.name) !== -1;
    var isActive = G.activeItem === item.name;
    if(isActive){
      slot.style.borderColor='#44aaff';
      slot.style.boxShadow='0 0 8px #44aaff, inset 0 0 4px rgba(68,170,255,0.3)';
      slot.style.background='rgba(68,170,255,0.15)';
    } else if(isUsable){
      slot.style.borderColor='rgba(68,170,255,0.5)';
      slot.style.boxShadow='0 0 4px rgba(68,170,255,0.3)';
    }
    slot.innerHTML='<span>'+icon+'</span><span class="inv-label">'+item.name.split(' ')[0]+'</span>';
    function slotHandler(e){
      e.preventDefault();e.stopPropagation();getAudio();playBleep(500,0.04);
      if(isUsable){
        if(G.activeItem === item.name){
          G.activeItem = null;
          showNotification('Deselected '+item.name);
        } else {
          G.activeItem = item.name;
          useItem(item.name);
        }
        renderInvBar();
        return;
      }
      showItemTooltip(item);
    }
    slot.addEventListener('click',slotHandler);
    slot.addEventListener('touchend',slotHandler,{passive:false});
    bar.appendChild(slot);
  });
};

function useItem(name){
  switch(name){
    case "Phil's UV Flashlight":
      if(G.lightsOff){
        G.uvActive = !G.uvActive;
        showNotification(G.uvActive ? 'UV Light ON' : 'UV Light OFF');
      } else {
        showDialogue('Keira',"The UV light only works when the lights are off. Hit the light switch first.");
      }
      G.activeItem = null;
      break;
    case 'Stella':
      stellaSniff();
      G.activeItem = null;
      break;
    case 'Closet Key':
      if(G.room === 2){
        showDialogue('Keira','You use the Closet Key on the costume trunk... click!');
        G.activeItem = null;
      } else {
        showDialogue('Keira',"Nothing to use the key on here.");
        G.activeItem = null;
      }
      break;
    case 'Recipe Card':
      showDialogue('Gloria','The recipe amounts: 2, 5, 1, 4. REMEMBER THEM!');
      G.activeItem = null;
      break;
    case "Gloria's Purse":
      var bonusItems = ["a lint roller","a backup phone","three lipsticks","a tiny screwdriver","empanada crumbs","a photo of Sofia Vergara (wait...)","a coupon from 2009"];
      var bonus = bonusItems[Math.floor(Math.random()*bonusItems.length)];
      showDialogue('Gloria',"Gloria's purse has EVERYTHING! You found: "+bonus);
      G.activeItem = null;
      break;
  }
  renderInvBar();
}

// Save/load new state
var _origSaveGame = saveGame;
saveGame = function(){
  _origSaveGame();
  try{
    var raw=localStorage.getItem('modernfamily-save');
    if(raw){
      var data=JSON.parse(raw);
      data.lightsOff=G.lightsOff;
      data.stellaFollowing=G.stellaFollowing;
      data.mannyTriviaPassed=G.mannyTriviaPassed;

loadGame = function(){

    var raw=localStorage.getItem('modernfamily-save');

      var data=JSON.parse(raw);
      G.lightsOff = data.lightsOff||false;
      G.stellaFollowing = data.stellaFollowing||false;
      G.mannyTriviaPassed = data.mannyTriviaPassed||false;

enterRoom = function(){

requestAnimationFrame(gameLoop);
