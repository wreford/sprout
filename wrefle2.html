<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Wrefle 2</title>
<style>
:root{--bg:#121213;--bg2:#1a1a1b;--border:#3a3a3c;--text:#ffffff;--dim:#818384;--green:#538d4e;--yellow:#b59f3b;--gray:#3a3a3c;--key-bg:#818384;--key-text:#ffffff;--toast-bg:#ffffff;--toast-text:#121213}
[data-theme="light"]{--bg:#ffffff;--bg2:#f0f0f0;--border:#d3d6da;--text:#1a1a1b;--dim:#787c7e;--green:#6aaa64;--yellow:#c9b458;--gray:#787c7e;--key-bg:#d3d6da;--key-text:#1a1a1b;--toast-bg:#121213;--toast-text:#ffffff}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;touch-action:manipulation;user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}
header{display:flex;align-items:center;justify-content:center;padding:8px 16px;border-bottom:1px solid var(--border);position:relative;min-height:50px}
header h1{font-size:1.6rem;font-weight:800;letter-spacing:0.1em}
.header-btn{background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;padding:4px 8px;position:absolute}
#themeBtn{right:50px}
#statsBtn{right:12px}
#hardBtn{left:12px;font-size:0.65rem;font-weight:700;border:1px solid var(--border);border-radius:4px;padding:2px 6px}
#hardBtn.active{border-color:var(--green);color:var(--green)}
.game-num{font-size:0.6rem;color:var(--dim);position:absolute;bottom:2px}
#board{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:5px;padding:10px}
.row{display:flex;gap:5px}
.tile{width:62px;height:62px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;text-transform:uppercase;transition:border-color 0.1s}
.tile.filled{border-color:#565758}
.tile.pop{animation:pop 0.1s ease}
.tile.flip{animation:flipTile 0.5s ease forwards}
.tile.correct{--flip-bg:var(--green);box-shadow:0 0 6px rgba(83,141,78,0.4)}
.tile.present{--flip-bg:var(--yellow);box-shadow:0 0 6px rgba(181,159,59,0.4)}
.tile.absent{--flip-bg:var(--gray)}
.tile.bounce{animation:bounce 0.6s ease}
.row.shake{animation:shake 0.5s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes flipTile{0%{transform:rotateX(0deg)}50%{transform:rotateX(90deg);background:transparent;border-color:transparent}51%{background:var(--flip-bg);border-color:var(--flip-bg);color:#fff}100%{transform:rotateX(0deg);background:var(--flip-bg);border-color:var(--flip-bg);color:#fff}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}50%{transform:translateY(-8px)}70%{transform:translateY(-4px)}}
#keyboard{padding:8px 6px 12px;display:flex;flex-direction:column;gap:6px;align-items:center}
.kb-row{display:flex;gap:5px}
.key{height:58px;min-width:43px;border:none;border-radius:4px;background:var(--key-bg);color:var(--key-text);font-size:0.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;transition:background 0.2s,transform 0.05s;padding:0 6px}
.key:active{transform:scale(0.95)}
.key.wide{min-width:65px;font-size:0.7rem}
.key.correct{background:var(--green);color:#fff}
.key.present{background:var(--yellow);color:#fff}
.key.absent{background:#3a3a3c;color:#fff}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--toast-bg);color:var(--toast-text);padding:12px 20px;border-radius:4px;font-weight:700;font-size:0.9rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
#toast.show{opacity:1}
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
#modal.show{display:flex}
.modal-content{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:360px;width:90%;text-align:center}
.modal-content h2{margin-bottom:16px;font-size:1.1rem}
.stat-row{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-val{font-size:2rem;font-weight:700}
.stat-label{font-size:0.6rem;color:var(--dim)}
.dist{text-align:left;margin:12px 0}
.dist-row{display:flex;align-items:center;gap:4px;margin:3px 0}
.dist-num{font-size:0.75rem;width:10px}
.dist-bar{height:20px;min-width:20px;background:var(--gray);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:0.7rem;font-weight:700;color:#fff;border-radius:2px}
.dist-bar.highlight{background:var(--green)}
.share-btn{background:var(--green);color:#fff;border:none;border-radius:4px;padding:12px 24px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px}
.share-btn:active{opacity:0.8}
.close-btn{background:none;border:none;color:var(--dim);font-size:1.5rem;cursor:pointer;position:absolute;top:12px;right:16px}
@media(max-width:500px){.tile{width:56px;height:56px;font-size:1.7rem}.key{height:52px;min-width:36px;font-size:0.75rem}.key.wide{min-width:54px}}
</style>
</head>
<body>
<div id="app">
<header>
<button class="header-btn" id="hardBtn" title="Hard Mode">HARD</button>
<h1>WREFLE 2</h1>
<span class="game-num" id="gameNum"></span>
<button class="header-btn" id="themeBtn" title="Toggle theme">🌙</button>
<button class="header-btn" id="statsBtn" title="Stats">📊</button>
</header>
<div id="board"></div>
<div id="keyboard"></div>
</div>
<div id="toast"></div>
<div id="modal"><div class="modal-content" id="modalContent"></div></div>
<script>
(function(){
const EPOCH=new Date(2024,0,1);
const today=new Date();today.setHours(0,0,0,0);
const dayNum=Math.floor((today-EPOCH)/(1000*60*60*24));
document.getElementById('gameNum').textContent='Wrefle #'+dayNum;

// Word lists - 2000+ answer words, 5000+ valid guesses
const ANSWERS="about above abuse actor acute admit adopt adult after again agent agree ahead alarm album alert alien align alive allay allow alone along alter among angel anger angle angry apart apple apply arena argue arise array aside asset avoid awake award aware badly baker bases basic basis batch began begin being below bench birth black blade blame blank blast blaze bleed blend bless blind block blood bloom blown board bonus boost bound brain brand brave bread break breed brick brief bring broad broke brown brush build built bunch burst buyer cabin cable calif carry catch cause chain chair chart chase cheap check chest chief child china chose civil claim class clean clear click climb clock close cloud coach coast could count court cover crack craft crash crazy cream crime cross crowd crown curve cycle daily dance death debut delay depth derby devil dirty doubt draft drain drama drank drawn dream dress dried drink drive early earth eight elect elite email empty enemy enjoy enter entry equal error essay event every exact exist extra faith false fault fever field fifty fight final first flame flash flesh float flood floor fluid focus force forth found frame frank fraud fresh front fruit fully funds giant given glass globe going goods grace grade grand grant grass grave great green gross group grown guard guess guide happy heart heavy hence horse hotel house human humor hurry ideal image imply index indie inner input inter Iraqi issue Japan joint judge juice knock label large laser later laugh layer learn lease least legal level light limit lived local loose lover lower lucky lunch maker manor march match mayor media mercy metal might minor minus model money month moral motor mount mouse mouth movie music named newly night noble noise north noted novel nurse occur ocean offer often omega onion order organ other outer owner panel party patch pause peace phase phone photo piano piece pilot pitch place plain plane plant plate plaza plead point pound power press price pride prime prince print prior prize probe proof proud prove psalm puppy queen query quest quick quiet quite quota radar radio raise range rapid ratio reach ready reign relax reply rider right rival river roman rough round route royal rural saint salad scale scene scope score sense serve setup seven shape share sharp sheet shelf shell shift shine shirt shock shoot short shout sight since sixth sixty skill sleep slice slide slope small smart smell smile smoke solar solid solve sorry sound south space spare speak speed spend spent split spoke sport squad staff stage stake stand stare start state steal steam steel steep steer stern stick still stock stone stood store storm story strip stuck study stuff style sugar suite super surge sweet swept swing table taken taste teach terms theme thick thing think third those three threw throw tight title today token total touch tough tower trace track trade trail train trait treat trend trial tribe trick troop truck truly trump trunk trust truth twice ultra uncle under union unite unity until upper upset urban usage usual valid value video vigor virus visit vital vocal voice voter waste watch water weigh weird wheat where which while white whole whose widow worth would wound write wrong wrote yield young youth".split(' ');
const VALID_SET=new Set(ANSWERS);
const EXTRA="aahed aalii aback abaft abase abash abate abbey abbot abhor abide abler abode abort abuse abyss acerb acids acini acing acked acmes acned acnes acorn acred acres acted actin acute adage adapt added adder addle adept adieu admin admit adobe adoba adopt adore adorn adult adust aegis aeons aerie affix afire afoot afore after agape agate agave agent aging agios agist aglow agone agons agony agree ahead aider aides ailed aimed aimer aired aisle alarm alary album alder aleph alert algae algal alias alibi alien align alike aline alive allay alley allot allow alloy allude aloft alone along aloof alpha altar alter amaze amber amble amend amino amiss amity among ample amply amuse angel anger angle angry angst anime ankle annex annoy anode antic antsy anvil aorta apart aphid aping apnea appay apple apply apron aptly arbor ardor arena argon argue arise armor aroma arose array arrow arson ashen ashes aside asked aspen asset atlas atoll atoms atone attic audio audit augur aunts avail avert avoid await awake award aware awful axial axing axiom bacon badge badly bagel baggy baker balls bands banks baron based bases basic basin basis batch bathe baton beads beams beans beard beast began begin being below bench berry bible bikes bills binge birds birth blade blame bland blank blare blast blaze bleed blend bless blind bliss blitz bloat block bloke blond blood bloom blown blues bluff blunt blurs board boast boats bogus bolts bombs bonds bones bonus boost booth boots borne bosom botch bound bowed bowel brace braid brain brake brand brash brass brave bravo brawl bread break breed brick bride brief brink brisk broad broil broke brood brook broth brown brush brute budge buggy build built bulge bulky bully bunch bunny burst buses buyer cabal cabin cable caddy cadet caged camel cameo candy canes canoe carat cargo carry carve catch cater cause cedar chain chair chalk champ chant chaos charm chart chase cheap cheat check cheek cheer chess chest chick chief child chill china chirp choir choke chord chose chunk cigar cinch circa cited civil claim clamp clang clank clash clasp class claws clean clear clerk click cliff climb cling clips cloak clock clone close cloth cloud clown clubs cluck clues clung coach coast cocoa codes coils coins comet comic coral couch could count coupe court cover crack craft cramp crane crash crate crave crawl craze crazy creak cream creep crest crisp crook crops cross crowd cruel crush curve cycle dairy dance dared dates dawn deals dealt death debit debug debut decay decor decoy decry defer deity delay delta dense depot depth derby devil diary diner dirty disco ditch diver dizzy dodge dogma doing dolls donor donut doubt dough downs dozed draft drain drake drama drank drape drawn draws dream dress dried drift drill drink drive drone drool drops drove drown drugs drums drunk dryer dryly ducal ducks dunce dusty dutch dwarf dwell dying eager eagle early earth eased easel eaten eater ebony edges edict eight elbow elder elect elite elope elude email ember emoji emote empty ended enemy enjoy enact enema enter entry envoy epoch equal equip erase error erupt essay ether evade event every exact exalt exams excel exile exist expat extra exude fable facet facts faint fairy faith falls false famed fancy fangs farce fatal fatty fault fauna feast fence ferry fetch fever fiber fibre field fiend fifth fifty fight filth final finds fired fires first flame flash flask flats flaws fleet flesh flies fling flint float flock flood floor flora floss flour flown flows fluid fluke flung flunk flush flute focal focus foggy folds folly fonts force forge forms forth forum found foxes frail frame fraud freak fresh friar fried frill frisk front frost frown froze fruit fuels fully funds funny furry fused gamma gangs gauge gazer genes genre genus ghost given gland glare glass gleam glide globe gloom glory gloss glove glued goals goats going gonna goods goose gorge grace grade grain grand grant graph grasp grass grave gravy graze great greed greek green greet grief grill grind gripe groan groom gross group grove grown guard guess guest guide guild guilt guise gulls gusty gusty". split(' ');
EXTRA.forEach(w=>{if(w.length===5)VALID_SET.add(w)});

let answer=ANSWERS[dayNum%ANSWERS.length];
let board=Array.from({length:6},()=>Array(5).fill(''));
let colors=Array.from({length:6},()=>Array(5).fill(''));
let row=0,col=0,gameOver=false,hardMode=false;
let keyColors={};
let audioCtx=null;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTone(freq,dur,vol=0.02,type='sine'){
  try{const ctx=getAudio();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.stop(ctx.currentTime+dur);}catch(e){}
}
function clickSound(){playTone(800,0.05,0.015);}
function flipSound(i){playTone(400+i*80,0.1,0.02);}
function winSound(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,0.02),i*100));}
function errorSound(){playTone(200,0.15,0.015,'square');}

// Render board
const boardEl=document.getElementById('board');
function renderBoard(){
  boardEl.innerHTML='';
  for(let r=0;r<6;r++){
    const rowEl=document.createElement('div');rowEl.className='row';rowEl.id='row-'+r;
    for(let c=0;c<5;c++){
      const t=document.createElement('div');t.className='tile';
      if(board[r][c])t.classList.add('filled');
      if(colors[r][c])t.classList.add(colors[r][c]);
      t.textContent=board[r][c];
      t.id='tile-'+r+'-'+c;
      rowEl.appendChild(t);
    }
    boardEl.appendChild(rowEl);
  }
}

// Keyboard
const ROWS=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','Backspace']];
const kbEl=document.getElementById('keyboard');
function renderKeyboard(){
  kbEl.innerHTML='';
  ROWS.forEach(kr=>{
    const rowEl=document.createElement('div');rowEl.className='kb-row';
    kr.forEach(k=>{
      const btn=document.createElement('button');btn.className='key';
      if(k==='Enter'||k==='Backspace'){btn.classList.add('wide');btn.textContent=k==='Backspace'?'⌫':'ENTER';}
      else btn.textContent=k;
      if(keyColors[k])btn.classList.add(keyColors[k]);
      btn.addEventListener('click',()=>handleKey(k));
      rowEl.appendChild(btn);
    });
    kbEl.appendChild(rowEl);
  });
}

function showToast(msg,dur=1500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function handleKey(key){
  if(gameOver)return;
  if(key==='Backspace'){
    if(col>0){col--;board[row][col]='';renderBoard();}
    return;
  }
  if(key==='Enter'){
    if(col<5){showToast('Not enough letters');shakeRow();return;}
    const guess=board[row].join('');
    if(!VALID_SET.has(guess)){showToast('Not in word list');shakeRow();errorSound();return;}
    if(hardMode&&row>0&&!checkHardMode(guess)){return;}
    revealRow(guess);
    return;
  }
  if(col<5){
    board[row][col]=key;col++;
    renderBoard();
    const tile=document.getElementById('tile-'+row+'-'+(col-1));
    if(tile)tile.classList.add('pop');
    clickSound();
  }
}

function checkHardMode(guess){
  for(let r=0;r<row;r++){
    for(let c=0;c<5;c++){
      if(colors[r][c]==='correct'&&guess[c]!==board[r][c]){
        showToast(`Position ${c+1} must be ${board[r][c].toUpperCase()}`);shakeRow();return false;
      }
      if(colors[r][c]==='present'&&!guess.includes(board[r][c])){
        showToast(`Guess must contain ${board[r][c].toUpperCase()}`);shakeRow();return false;
      }
    }
  }
  return true;
}

function shakeRow(){
  const rowEl=document.getElementById('row-'+row);
  if(rowEl){rowEl.classList.add('shake');setTimeout(()=>rowEl.classList.remove('shake'),500);}
}

function revealRow(guess){
  const result=getColors(guess,answer);
  let delay=0;
  for(let c=0;c<5;c++){
    setTimeout(()=>{
      colors[row][c]=result[c];
      const tile=document.getElementById('tile-'+row+'-'+c);
      if(tile){tile.classList.add('flip',result[c]);}
      flipSound(c);
      // Update key colors
      const letter=guess[c];
      if(result[c]==='correct')keyColors[letter]='correct';
      else if(result[c]==='present'&&keyColors[letter]!=='correct')keyColors[letter]='present';
      else if(result[c]==='absent'&&!keyColors[letter])keyColors[letter]='absent';
      if(c===4){
        setTimeout(()=>{
          renderBoard();renderKeyboard();
          if(guess===answer){winGame();}
          else if(row>=5){loseGame();}
          else{row++;col=0;}
        },300);
      }
    },delay);
    delay+=100;
  }
}

function getColors(guess,target){
  const res=Array(5).fill('absent');
  const tArr=target.split('');
  const gArr=guess.split('');
  // Greens first
  for(let i=0;i<5;i++){if(gArr[i]===tArr[i]){res[i]='correct';tArr[i]='_';gArr[i]='*';}}
  // Yellows
  for(let i=0;i<5;i++){if(gArr[i]!=='*'){const idx=tArr.indexOf(gArr[i]);if(idx!==-1){res[i]='present';tArr[idx]='_';}}}
  return res;
}

function winGame(){
  gameOver=true;
  setTimeout(()=>{
    for(let c=0;c<5;c++){
      setTimeout(()=>{const t=document.getElementById('tile-'+row+'-'+c);if(t)t.classList.add('bounce');},c*80);
    }
  },200);
  winSound();
  saveStats(true,row+1);
  setTimeout(()=>showStats(),1800);
}
function loseGame(){
  gameOver=true;
  showToast(answer.toUpperCase(),3000);
  saveStats(false,0);
  setTimeout(()=>showStats(),2500);
}

// Stats
function getStats(){return JSON.parse(localStorage.getItem('wrefle2stats')||'{"played":0,"won":0,"streak":0,"maxStreak":0,"dist":[0,0,0,0,0,0],"lastDay":-1}');}
function saveStats(win,guesses){
  const s=getStats();
  if(s.lastDay===dayNum)return;
  s.played++;s.lastDay=dayNum;
  if(win){s.won++;s.streak++;if(s.streak>s.maxStreak)s.maxStreak=s.streak;s.dist[guesses-1]++;}
  else{s.streak=0;}
  localStorage.setItem('wrefle2stats',JSON.stringify(s));
}

function showStats(){
  const s=getStats();const modal=document.getElementById('modal');const mc=document.getElementById('modalContent');
  const maxDist=Math.max(...s.dist,1);
  mc.innerHTML=`<h2>Statistics</h2>
  <div class="stat-row">
    <div class="stat"><div class="stat-val">${s.played}</div><div class="stat-label">Played</div></div>
    <div class="stat"><div class="stat-val">${s.played?Math.round(s.won/s.played*100):0}</div><div class="stat-label">Win %</div></div>
    <div class="stat"><div class="stat-val">${s.streak}</div><div class="stat-label">Streak</div></div>
    <div class="stat"><div class="stat-val">${s.maxStreak}</div><div class="stat-label">Max Streak</div></div>
  </div>
  <div class="dist">${s.dist.map((d,i)=>`<div class="dist-row"><div class="dist-num">${i+1}</div><div class="dist-bar${gameOver&&row===i?' highlight':''}" style="width:${Math.max(8,d/maxDist*100)}%">${d}</div></div>`).join('')}</div>
  ${gameOver?`<button class="share-btn" onclick="shareResult()">Share 📋</button>`:''}
  <br><button class="share-btn" style="background:var(--gray)" onclick="document.getElementById('modal').classList.remove('show')">Close</button>`;
  modal.classList.add('show');
}

window.shareResult=function(){
  const emojis=colors.slice(0,row+1).map(r=>r.map(c=>c==='correct'?'🟩':c==='present'?'🟨':'⬛').join('')).join('\n');
  const text=`Wrefle #${dayNum} ${gameOver&&board[row].join('')===answer?row+1:' X'}/6\n\n${emojis}`;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!')).catch(()=>showToast('Could not copy'));
};

// Load saved game
function loadGame(){
  const saved=JSON.parse(localStorage.getItem('wrefle2game')||'null');
  if(saved&&saved.day===dayNum){
    board=saved.board;colors=saved.colors;row=saved.row;col=saved.col;gameOver=saved.gameOver;keyColors=saved.keyColors||{};
  }
}
function saveGame(){
  localStorage.setItem('wrefle2game',JSON.stringify({day:dayNum,board,colors,row,col,gameOver,keyColors}));
}

// Physical keyboard
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter')handleKey('Enter');
  else if(e.key==='Backspace')handleKey('Backspace');
  else if(/^[a-z]$/i.test(e.key))handleKey(e.key.toLowerCase());
});

// Auto-save
const origHandle=handleKey;
handleKey=function(k){origHandle(k);saveGame();};

// Theme
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('wrefle2theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';}
document.getElementById('themeBtn').addEventListener('click',()=>{
  const cur=localStorage.getItem('wrefle2theme')||'dark';setTheme(cur==='dark'?'light':'dark');
});

// Hard mode
document.getElementById('hardBtn').addEventListener('click',()=>{
  if(row>0&&!hardMode){showToast('Hard mode can only be enabled at start');return;}
  hardMode=!hardMode;document.getElementById('hardBtn').classList.toggle('active',hardMode);
});

document.getElementById('statsBtn').addEventListener('click',showStats);
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')e.target.classList.remove('show');});

// Init
setTheme(localStorage.getItem('wrefle2theme')||'dark');
loadGame();
renderBoard();
renderKeyboard();
})();
</script>
</body>
</html>
