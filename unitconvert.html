<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Construction Unit Converter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;padding:16px;max-width:600px;margin:0 auto}
a{color:var(--accent);text-decoration:none}
h1{font-size:1.3rem;margin:8px 0 16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card h2{font-size:.95rem;color:var(--accent);margin-bottom:10px}
.tabs{display:flex;gap:0;overflow-x:auto;margin-bottom:14px;border-radius:8px;border:1px solid var(--border)}
.tabs button{flex:1;min-width:0;padding:8px 4px;border:none;background:var(--bg);color:var(--dim);font-size:.72rem;cursor:pointer;white-space:nowrap}
.tabs button:first-child{border-radius:7px 0 0 7px}
.tabs button:last-child{border-radius:0 7px 7px 0}
.tabs button.active{background:var(--accent);color:#fff}
label{display:block;font-size:.8rem;color:var(--dim);margin-bottom:3px}
input[type=number],select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:1rem;margin-bottom:8px}
.swap{display:block;margin:0 auto 8px;background:none;border:1px solid var(--border);color:var(--accent);width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer}
.swap:hover{background:var(--accent);color:#fff}
.result{text-align:center;font-size:1.4rem;color:var(--green);font-weight:700;padding:10px 0}
.sub{text-align:center;font-size:.8rem;color:var(--dim);margin-top:-6px;margin-bottom:8px}
table{width:100%;font-size:.75rem;border-collapse:collapse}
td,th{padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--accent)}
</style>
</head>
<body>
<a href="index.html">&larr; home</a>
<h1>Construction Unit Converter</h1>

<div class="tabs" id="tabs"></div>

<div class="card">
<div id="selectors"></div>
<label>Value</label>
<input type="number" id="val" oninput="convert()" step="any" value="1">
<button class="swap" onclick="swapUnits()" title="Swap">&darr;&uarr;</button>
<div class="result" id="res">--</div>
<div class="sub" id="formula"></div>
</div>

<div class="card">
<h2>Quick Reference</h2>
<div id="ref"></div>
</div>

<script>
const cats={
Length:[
  ['Feet','Meters',v=>v*0.3048,v=>v/0.3048],
  ['Inches','Millimeters',v=>v*25.4,v=>v/25.4],
  ['Inches','Centimeters',v=>v*2.54,v=>v/2.54],
  ['Feet','Inches',v=>v*12,v=>v/12],
  ['Yards','Meters',v=>v*0.9144,v=>v/0.9144],
  ['Miles','Kilometers',v=>v*1.60934,v=>v/1.60934],
],
Area:[
  ['sq ft','sq m',v=>v*0.0929,v=>v/0.0929],
  ['sq ft','sq in',v=>v*144,v=>v/144],
  ['sq yd','sq m',v=>v*0.8361,v=>v/0.8361],
  ['Acres','Hectares',v=>v*0.4047,v=>v/0.4047],
  ['Acres','sq ft',v=>v*43560,v=>v/43560],
],
Volume:[
  ['cu yd','cu m',v=>v*0.7646,v=>v/0.7646],
  ['cu ft','cu m',v=>v*0.0283,v=>v/0.0283],
  ['Gallons','Liters',v=>v*3.7854,v=>v/3.7854],
  ['cu ft','Gallons',v=>v*7.481,v=>v/7.481],
  ['cu yd','cu ft',v=>v*27,v=>v/27],
],
Weight:[
  ['Pounds','Kilograms',v=>v*0.4536,v=>v/0.4536],
  ['Tons (US)','Metric Tons',v=>v*0.9072,v=>v/0.9072],
  ['Ounces','Grams',v=>v*28.3495,v=>v/28.3495],
  ['Pounds','Tons (US)',v=>v/2000,v=>v*2000],
],
Pressure:[
  ['psi','kPa',v=>v*6.8948,v=>v/6.8948],
  ['psi','MPa',v=>v*0.006895,v=>v/0.006895],
  ['psi','bar',v=>v*0.06895,v=>v/0.06895],
  ['psf','kPa',v=>v*0.04788,v=>v/0.04788],
],
Temp:[
  ['Fahrenheit','Celsius',v=>(v-32)*5/9,v=>v*9/5+32],
  ['Celsius','Kelvin',v=>v+273.15,v=>v-273.15],
  ['Fahrenheit','Kelvin',v=>(v-32)*5/9+273.15,v=>(v-273.15)*9/5+32],
],
};

const refs={
Length:'<table><tr><th>From</th><th>To</th></tr><tr><td>1 ft</td><td>0.3048 m / 304.8 mm</td></tr><tr><td>1 in</td><td>25.4 mm</td></tr><tr><td>1 yd</td><td>0.914 m</td></tr><tr><td>1 m</td><td>3.281 ft / 39.37 in</td></tr></table>',
Area:'<table><tr><th>From</th><th>To</th></tr><tr><td>1 sq ft</td><td>0.0929 m&sup2;</td></tr><tr><td>1 acre</td><td>43,560 sq ft</td></tr><tr><td>1 sq yd</td><td>9 sq ft</td></tr></table>',
Volume:'<table><tr><th>From</th><th>To</th></tr><tr><td>1 cu yd</td><td>27 cu ft / 0.765 m&sup3;</td></tr><tr><td>1 cu ft</td><td>7.48 gal</td></tr><tr><td>1 cu yd concrete</td><td>&asymp;4,050 lbs</td></tr></table>',
Weight:'<table><tr><th>From</th><th>To</th></tr><tr><td>1 lb</td><td>0.4536 kg</td></tr><tr><td>1 ton</td><td>2,000 lbs</td></tr><tr><td>1 metric ton</td><td>2,204.6 lbs</td></tr></table>',
Pressure:'<table><tr><th>From</th><th>To</th></tr><tr><td>1 psi</td><td>6.895 kPa</td></tr><tr><td>3000 psi</td><td>20.68 MPa (typical concrete)</td></tr><tr><td>1 atm</td><td>14.696 psi</td></tr></table>',
Temp:'<table><tr><th>Ref</th><th>F</th><th>C</th></tr><tr><td>Freeze</td><td>32&deg;</td><td>0&deg;</td></tr><tr><td>Concrete cure min</td><td>50&deg;</td><td>10&deg;</td></tr><tr><td>Hot weather limit</td><td>90&deg;</td><td>32&deg;</td></tr></table>',
};

let curCat='Length',curPair=0;

function init(){
  const tb=document.getElementById('tabs');
  tb.innerHTML=Object.keys(cats).map((c,i)=>'<button '+(i===0?'class="active"':'')+' onclick="setCat(\''+c+'\',this)">'+c+'</button>').join('');
  buildSelectors();
}

function setCat(c,btn){
  curCat=c;curPair=0;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildSelectors();convert();
}

function buildSelectors(){
  const pairs=cats[curCat];
  let h='<label>Conversion</label><select id="pair" onchange="curPair=+this.value;convert()">';
  pairs.forEach((p,i)=>h+='<option value="'+i+'"'+(i===curPair?' selected':'')+'>'+p[0]+' &rarr; '+p[1]+'</option>');
  h+='</select>';
  document.getElementById('selectors').innerHTML=h;
  document.getElementById('ref').innerHTML=refs[curCat]||'';
}

function convert(){
  const v=+document.getElementById('val').value;
  const pair=cats[curCat][curPair];
  if(isNaN(v)){document.getElementById('res').textContent='--';return;}
  const result=pair[2](v);
  document.getElementById('res').textContent=result.toLocaleString(undefined,{maximumFractionDigits:6})+' '+pair[1];
  document.getElementById('formula').textContent=v+' '+pair[0]+' = '+result.toLocaleString(undefined,{maximumFractionDigits:6})+' '+pair[1];
}

function swapUnits(){
  const pairs=cats[curCat];
  const p=pairs[curPair];
  // Swap: use the reverse function with current value
  const v=+document.getElementById('val').value;
  const result=p[3](v);
  document.getElementById('val').value=result.toLocaleString(undefined,{maximumFractionDigits:6,useGrouping:false});
  // Swap the pair display
  const tmp=[p[1],p[0],p[3],p[2]];
  pairs[curPair]=tmp;
  buildSelectors();convert();
}

init();convert();
</script>
</body>
</html>
