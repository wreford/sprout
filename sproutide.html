<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SproutJS IDE</title>
<style>
:root {
  --bg: #0f0f10;
  --bg2: #1a1a1c;
  --bg3: #141416;
  --border: #2a2a2d;
  --text: #f0f0f0;
  --dim: #6e6e73;
  --accent: #ff6b35;
  --green: #4ade80;
  --gold: #f7c948;
  --purple: #a78bfa;
  --blue: #38bdf8;
  --red: #ef4444;
  --cyan: #22d3ee;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  display: flex;
  flex-direction: column;
}

/* ── Top Bar ── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: center;
  height: 48px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar a.home {
  color: var(--dim);
  text-decoration: none;
  font-size: 13px;
  transition: color 0.2s;
}
.topbar a.home:hover { color: var(--accent); }
.topbar .title {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
}
.topbar .spacer { flex: 1; }
.topbar select {
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  font-family: var(--font);
  cursor: pointer;
  outline: none;
}
.topbar select:hover { border-color: var(--dim); }
.topbar button {
  border: none;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: opacity 0.15s;
}
.topbar button:hover { opacity: 0.85; }
.btn-run { background: var(--green); color: #111; }
.btn-clear { background: var(--bg3); color: var(--dim); border: 1px solid var(--border) !important; }
.btn-share { background: var(--blue); color: #111; }
.btn-font { background: var(--bg3); color: var(--dim); border: 1px solid var(--border) !important; padding: 6px 10px; font-size: 14px; font-weight: 700; }

/* ── Main Area ── */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.editor-pane {
  flex: 7;
  min-width: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}
#editor {
  flex: 1;
}
.output-pane {
  flex: 3;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg3);
}
.output-header {
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
#output {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
#output::-webkit-scrollbar { width: 6px; }
#output::-webkit-scrollbar-track { background: var(--bg3); }
#output::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
.out-line { color: var(--green); }
.out-error { color: var(--red); }
.out-info { color: var(--dim); font-style: italic; }
.out-timestamp { color: var(--dim); font-size: 11px; }

/* ── Status Bar ── */
.statusbar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 0 16px;
  height: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 11px;
  color: var(--dim);
  flex-shrink: 0;
}
.statusbar .status-accent { color: var(--accent); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 1000;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Loading ── */
.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 50;
  color: var(--dim);
  font-size: 14px;
}
.loading-overlay .spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Mobile ── */
@media (max-width: 768px) {
  .main {
    flex-direction: column;
  }
  .editor-pane {
    flex: 1;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .output-pane {
    flex: 0 0 200px;
  }
  .topbar {
    flex-wrap: wrap;
    height: auto;
    padding: 8px 12px;
    gap: 6px;
  }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <a href="index.html" class="home">&larr; home</a>
  <span class="title">SproutJS IDE</span>
  <select id="examples" title="Load example program">
    <option value="">-- Examples --</option>
    <option value="hello">Hello World</option>
    <option value="fibonacci">Fibonacci</option>
    <option value="fizzbuzz">FizzBuzz</option>
    <option value="calculator">Calculator</option>
    <option value="listops">List Operations</option>
    <option value="counter">Counter Object</option>
  </select>
  <span class="spacer"></span>
  <button class="btn-font" id="fontDec" title="Decrease font size">A-</button>
  <button class="btn-font" id="fontInc" title="Increase font size">A+</button>
  <button class="btn-share" id="shareBtn" title="Copy code to clipboard">Share</button>
  <button class="btn-clear" id="clearBtn" title="Clear output">Clear</button>
  <button class="btn-run" id="runBtn" title="Run (Ctrl+Enter)">&#9654; Run</button>
</div>

<!-- Main Area -->
<div class="main">
  <div class="editor-pane">
    <div id="editor" style="position:relative;">
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        Loading editor...
      </div>
    </div>
  </div>
  <div class="output-pane">
    <div class="output-header">Output</div>
    <div id="output"><span class="out-info">Press Ctrl+Enter or click Run to execute.</span></div>
  </div>
</div>

<!-- Status Bar -->
<div class="statusbar">
  <span id="cursorPos">Ln 1, Col 1</span>
  <span class="status-accent">SproutJS</span>
  <span id="savedStatus"></span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     SPROUTJS RUNTIME — inlined from src/cell.js, src/compiler.js,
     src/builtins.js, src/vm.js with require() removed for browser use
     ═══════════════════════════════════════════════════════════════════════════ -->
<script>
// ── cell.js (browser module) ──────────────────────────────────────────────
var SproutCell = (function() {
  'use strict';

  const OP = {
    PUSH_CONST:  0,
    PUSH_SELF:   1,
    LOAD:        2,
    STORE:       3,
    SEND:        4,
    MAKE_CELL:   5,
    MAKE_BLOCK:  6,
    JUMP:        7,
    JUMP_FALSE:  8,
    RETURN:      9,
    POP:        10,
  };

  class Chunk {
    constructor(name = '<main>') {
      this.name = name;
      this.code = [];
      this.constants = [];
      this.chunks = [];
    }
    addConst(val) {
      const i = this.constants.indexOf(val);
      if (i !== -1) return i;
      this.constants.push(val);
      return this.constants.length - 1;
    }
    emit(...ops) {
      for (const op of ops) this.code.push(op);
      return this.code.length - 1;
    }
    emitJump(op) {
      this.code.push(op, 0);
      return this.code.length - 1;
    }
    patch(idx, val) {
      this.code[idx] = val;
    }
  }

  class Cell {
    constructor() {
      this.array  = [undefined];
      this.fields = new Map();
      this.block  = null;
      this.parent = null;
    }
    get(key) {
      if (typeof key === 'number') {
        return this.array[key] !== undefined ? this.array[key] : EMPTY;
      }
      if (this.fields.has(key)) return this.fields.get(key);
      if (this.parent !== null) return this.parent.get(key);
      return undefined;
    }
    set(key, val) {
      if (typeof key === 'number') {
        this.array[key] = val;
      } else {
        this.fields.set(key, val);
      }
    }
    isEmpty() { return this === EMPTY; }
    isTruthy() { return this !== EMPTY; }
    clone() {
      const c = new Cell();
      c.array = [...this.array];
      c.fields = new Map(this.fields);
      c.block  = this.block;
      c.parent = this.parent;
      return c;
    }
    length() { return this.array.length - 1; }
  }

  const EMPTY = new Cell();

  function wrap(val) {
    if (val instanceof Cell) return val;
    if (val === null || val === undefined) return EMPTY;
    if (typeof val === 'boolean') return val ? makeNum(1) : EMPTY;
    if (typeof val === 'number') return makeNum(val);
    if (typeof val === 'string') return makeStr(val);
    return EMPTY;
  }
  function unwrap(cell) {
    if (cell === EMPTY) return null;
    if (cell._num !== undefined) return cell._num;
    if (cell._str !== undefined) return cell._str;
    return cell;
  }
  function makeNum(n) {
    const c = new Cell();
    c._num = n;
    c.array[1] = n;
    return c;
  }
  function makeStr(s) {
    const c = new Cell();
    c._str = s;
    c.array[1] = s;
    return c;
  }
  function makeBlock(params, chunk, closure) {
    const c = new Cell();
    c.block = { params, chunk, closure };
    return c;
  }

  return { OP, Chunk, Cell, EMPTY, wrap, unwrap, makeNum, makeStr, makeBlock };
})();

// ── compiler.js (browser module) ──────────────────────────────────────────
var SproutCompiler = (function() {
  'use strict';

  const { OP, Chunk, makeNum, makeStr } = SproutCell;

  const T = {
    NUM: 'NUM', STR: 'STR', IDENT: 'IDENT', OP: 'OP',
    COLON: 'COLON', COMMA: 'COMMA', NL: 'NL',
    INDENT: 'INDENT', DEDENT: 'DEDENT',
    LBRACK: 'LBRACK', RBRACK: 'RBRACK',
    LPAREN: 'LPAREN', RPAREN: 'RPAREN',
    PIPE: 'PIPE', AT: 'AT', QMARK: 'QMARK', HASH: 'HASH', EOF: 'EOF',
  };

  class Scanner {
    constructor(src) {
      this.src = src;
      this.pos = 0;
      this.line = 1;
      this.col = 1;
      this.indent = [0];
      this.queue = [];
      this._scanAll();
    }
    _scanAll() {
      const src = this.src;
      const len = src.length;
      const toks = [];
      const indentStack = [0];
      let i = 0;
      const peek2 = () => i+1 < len ? src[i+1] : '';

      while (i < len) {
        while (i < len && (src[i] === ' ' || src[i] === '\t') && (toks.length === 0 || toks[toks.length-1].type !== T.NL)) i++;
        if (i >= len) break;
        const c = src[i];

        if (c === '-' && peek2() === '-') {
          while (i < len && src[i] !== '\n') i++;
          continue;
        }
        if (c === '\n') {
          i++;
          let indent = 0;
          while (i < len && (src[i] === ' ' || src[i] === '\t')) {
            indent += src[i] === '\t' ? 2 : 1;
            i++;
          }
          if (i < len && src[i] === '\n') continue;
          if (i >= len) break;
          const curIndent = indentStack[indentStack.length - 1];
          if (indent > curIndent) {
            indentStack.push(indent);
            toks.push({ type: T.INDENT });
          } else if (indent < curIndent) {
            while (indentStack[indentStack.length - 1] > indent) {
              indentStack.pop();
              toks.push({ type: T.DEDENT });
            }
            toks.push({ type: T.NL });
          } else {
            toks.push({ type: T.NL });
          }
          continue;
        }
        if (c >= '0' && c <= '9') {
          let s = '';
          while (i < len && ((src[i] >= '0' && src[i] <= '9') || src[i] === '.')) s += src[i++];
          toks.push({ type: T.NUM, val: parseFloat(s) });
          continue;
        }
        if (c === '"') {
          i++;
          let s = '';
          while (i < len && src[i] !== '"') {
            if (src[i] === '\\') { i++; s += src[i++]; }
            else s += src[i++];
          }
          i++;
          toks.push({ type: T.STR, val: s });
          continue;
        }
        if (c === '#') {
          i++;
          let s = '#';
          while (i < len && /[a-zA-Z0-9_]/.test(src[i])) s += src[i++];
          toks.push({ type: T.IDENT, val: s, meta: true });
          continue;
        }
        if (c === '(') {
          toks.push({ type: T.LPAREN }); i++;
          continue;
        }
        if (c === ')') {
          toks.push({ type: T.RPAREN }); i++;
          continue;
        }
        if (/[a-zA-Z_]/.test(c)) {
          let s = '';
          while (i < len && /[a-zA-Z0-9_?]/.test(src[i])) s += src[i++];
          if (s === 'mod') {
            toks.push({ type: T.OP, val: '%' });
          } else {
            toks.push({ type: T.IDENT, val: s });
          }
          continue;
        }
        if ((c === '>' || c === '<' || c === '!') && peek2() === '=') {
          toks.push({ type: T.OP, val: c + '=' });
          i += 2;
          continue;
        }
        switch (c) {
          case '+': case '-': case '*': case '/': case '%':
            toks.push({ type: T.OP, val: c }); i++; break;
          case '=': toks.push({ type: T.OP, val: '=' }); i++; break;
          case '>': toks.push({ type: T.OP, val: '>' }); i++; break;
          case '<': toks.push({ type: T.OP, val: '<' }); i++; break;
          case ':': toks.push({ type: T.COLON }); i++; break;
          case ',': toks.push({ type: T.COMMA }); i++; break;
          case '[': toks.push({ type: T.LBRACK }); i++; break;
          case ']': toks.push({ type: T.RBRACK }); i++; break;
          case '|': toks.push({ type: T.PIPE }); i++; break;
          case '@': toks.push({ type: T.AT }); i++; break;
          case '?': toks.push({ type: T.QMARK }); i++; break;
          case ' ': case '\t': case '\r': i++; break;
          default: i++;
        }
      }
      while (indentStack.length > 1) {
        indentStack.pop();
        toks.push({ type: T.DEDENT });
      }
      toks.push({ type: T.EOF });
      this.queue = toks;
      this.qi = 0;
    }
    peek(offset = 0) {
      const idx = this.qi + offset;
      return idx < this.queue.length ? this.queue[idx] : { type: T.EOF };
    }
    next() {
      const t = this.queue[this.qi];
      if (this.qi < this.queue.length - 1) this.qi++;
      return t;
    }
    check(type, val) {
      const t = this.peek();
      if (t.type !== type) return false;
      if (val !== undefined && t.val !== val) return false;
      return true;
    }
    eat(type, val) {
      if (!this.check(type, val)) return false;
      this.next();
      return true;
    }
  }

  class Compiler {
    constructor(src, name = '<main>') {
      this.sc = new Scanner(src);
      this.chunk = new Chunk(name);
    }
    compile() {
      this.compileBody(this.chunk);
      this.chunk.emit(OP.RETURN);
      return this.chunk;
    }
    compileBody(chunk) {
      this.skipNLIndent();
      while (true) {
        const t = this.sc.peek();
        if (t.type === T.EOF || t.type === T.DEDENT || t.type === T.RBRACK) break;
        this.compileExpr(chunk);
        const sep = this.sc.peek();
        if (sep.type === T.NL || sep.type === T.COMMA || sep.type === T.INDENT) {
          this.sc.next();
          const next = this.sc.peek();
          if (next.type !== T.EOF && next.type !== T.DEDENT && next.type !== T.RBRACK) {
            chunk.emit(OP.POP);
          }
          this.skipNLIndent();
        } else {
          break;
        }
      }
    }
    skipNL() {
      while (this.sc.check(T.NL)) this.sc.next();
    }
    skipNLIndent() {
      while (this.sc.check(T.NL) || this.sc.check(T.INDENT)) this.sc.next();
    }
    compileExpr(chunk) {
      const t = this.sc.peek();
      if (t.type === T.IDENT && this.sc.peek(1).type === T.COLON) {
        const name = t.val;
        this.sc.next();
        this.sc.next();
        this.compileGreedy(chunk);
        chunk.emit(OP.STORE, chunk.addConst(name));
        chunk.emit(OP.LOAD, chunk.addConst(name));
        return;
      }
      this.compileChain(chunk);
    }
    compileGreedy(chunk) {
      this.compileChain(chunk);
    }
    compileChain(chunk) {
      this.compileAtom(chunk);
      while (true) {
        const t = this.sc.peek();
        if (t.type === T.OP) {
          const op = t.val;
          this.sc.next();
          this.compileAtom(chunk);
          chunk.emit(OP.SEND, chunk.addConst(op), 1);
          continue;
        }
        if (t.type === T.QMARK) {
          this.sc.next();
          this.compileAtom(chunk);
          this.compileAtom(chunk);
          chunk.emit(OP.SEND, chunk.addConst('?'), 2);
          continue;
        }
        if (t.type === T.IDENT && this.sc.peek(1).type !== T.COLON) {
          const name = t.val;
          this.sc.next();
          if (this.sc.peek().type === T.LBRACK || this.sc.peek().type === T.LPAREN) {
            this.compileAtom(chunk);
            chunk.emit(OP.SEND, chunk.addConst(name), 1);
          } else {
            chunk.emit(OP.SEND, chunk.addConst(name), 0);
          }
          continue;
        }
        if (t.type === T.LBRACK) {
          this.compileBlockOrCell(chunk);
          chunk.emit(OP.SEND, chunk.addConst('call'), 1);
          continue;
        }
        if (t.type === T.LPAREN) {
          this.compileAtom(chunk);
          chunk.emit(OP.SEND, chunk.addConst('call'), 1);
          continue;
        }
        if (t.type === T.NUM) {
          this.sc.next();
          chunk.emit(OP.PUSH_CONST, chunk.addConst(makeNum(t.val)));
          chunk.emit(OP.SEND, chunk.addConst('call'), 1);
          continue;
        }
        if (t.type === T.STR) {
          this.sc.next();
          chunk.emit(OP.PUSH_CONST, chunk.addConst(makeStr(t.val)));
          chunk.emit(OP.SEND, chunk.addConst('call'), 1);
          continue;
        }
        break;
      }
    }
    compileAtom(chunk) {
      const t = this.sc.peek();
      if (t.type === T.NUM) {
        this.sc.next();
        chunk.emit(OP.PUSH_CONST, chunk.addConst(makeNum(t.val)));
        return;
      }
      if (t.type === T.STR) {
        this.sc.next();
        chunk.emit(OP.PUSH_CONST, chunk.addConst(makeStr(t.val)));
        return;
      }
      if (t.type === T.AT) {
        this.sc.next();
        chunk.emit(OP.LOAD, chunk.addConst('@'));
        return;
      }
      if (t.type === T.IDENT) {
        this.sc.next();
        chunk.emit(OP.LOAD, chunk.addConst(t.val));
        return;
      }
      if (t.type === T.LBRACK) {
        this.compileBlockOrCell(chunk);
        return;
      }
      if (t.type === T.LPAREN) {
        this.sc.next();
        this.compileChain(chunk);
        this.sc.eat(T.RPAREN);
        return;
      }
      chunk.emit(OP.PUSH_CONST, chunk.addConst(null));
    }
    compileBlockOrCell(chunk) {
      this.sc.next();
      if (this.sc.eat(T.RBRACK)) {
        chunk.emit(OP.PUSH_CONST, chunk.addConst(null));
        return;
      }
      const isBlock = this.looksLikeBlock();
      if (isBlock) {
        this.compileBlock(chunk);
      } else {
        this.compileCellLiteralBody(chunk);
      }
    }
    looksLikeBlock() {
      if (this.sc.peek().type === T.PIPE) return true;
      if (this.sc.peek().type === T.AT)   return true;
      let i = 0;
      while (this.sc.peek(i).type === T.IDENT) {
        i++;
        if (this.sc.peek(i).type === T.PIPE) return true;
        if (this.sc.peek(i).type === T.COMMA) { i++; continue; }
        break;
      }
      let depth = 0, n = 0;
      for (let j = 0; ; j++) {
        const t = this.sc.peek(j);
        if (t.type === T.EOF) break;
        if (t.type === T.LBRACK) { depth++; n++; continue; }
        if (t.type === T.RBRACK) { if (depth === 0) break; depth--; n++; continue; }
        if (depth > 0) continue;
        if (t.type === T.COMMA || t.type === T.NL) return false;
        if (t.type === T.COLON) return false;
        n++;
      }
      return n > 1;
    }
    compileBlock(chunk) {
      let params = [];
      if (this.sc.peek().type === T.AT) {
        params = ['@'];
      } else if (this.sc.peek().type === T.PIPE) {
        this.sc.next();
      } else {
        while (!this.sc.check(T.PIPE) && !this.sc.check(T.RBRACK) && !this.sc.check(T.EOF)) {
          if (this.sc.check(T.IDENT)) {
            params.push(this.sc.next().val);
          }
          this.sc.eat(T.COMMA);
        }

// ── vm.js (browser module) ────────────────────────────────────────────────
var SproutVM = (function() {
  'use strict';

  const { OP, Cell, EMPTY, wrap, unwrap, makeNum, makeStr, makeBlock } = SproutCell;

  class Frame {
    constructor(chunk, self, closure = null) {
      this.chunk = chunk;
      this.ip = 0;
      this.stack = [];
      this.self = self;
      this.closure = closure;
    }
    push(v) { this.stack.push(v); }
    pop()   { return this.stack.pop() ?? EMPTY; }
    peek()  { return this.stack[this.stack.length - 1] ?? EMPTY; }
  }

    constructor(builtins) {
      this.builtins = builtins;
      this.globals = new Cell();
      this._stepCount = 0;
      this._maxSteps = 500000;
    }
    run(chunk) {
      this._stepCount = 0;
      const frame = new Frame(chunk, this.globals);
      return this._exec(frame);
    }
    _exec(frame) {
      const { chunk } = frame;
      const { code, constants, chunks } = chunk;
      while (frame.ip < code.length) {
        this._stepCount++;
        if (this._stepCount > this._maxSteps) {
          throw new Error('Execution limit reached (possible infinite loop). Max steps: ' + this._maxSteps);
        }
        const op = code[frame.ip++];
        switch (op) {
          case OP.PUSH_CONST: {
            const val = constants[code[frame.ip++]];
            frame.push(val === null ? EMPTY : val);
            break;
          }
          case OP.PUSH_SELF: {
            frame.push(frame.self);
            break;
          }
          case OP.LOAD: {
            const name = constants[code[frame.ip++]];
            const val = this._lookup(name, frame);
            frame.push(val !== undefined ? val : EMPTY);
            break;
          }
          case OP.STORE: {
            const name = constants[code[frame.ip++]];
            const val = frame.peek();
            frame.self.set(name, val);
            break;
          }
          case OP.SEND: {
            const msgIdx = code[frame.ip++];
            const nargs = code[frame.ip++];
            const msg = constants[msgIdx];
            const args = [];
            for (let i = 0; i < nargs; i++) args.unshift(frame.pop());
            const receiver = frame.pop();
            const result = this._send(msg, receiver, args, frame);
            frame.push(result);
            break;
          }
          case OP.MAKE_CELL: {
            const n = code[frame.ip++];
            const cell = new Cell();
            let arrayIdx = 1;
            const pairs = [];
            for (let i = 0; i < n; i++) {
              const val = frame.pop();
              const key = frame.pop();
              pairs.unshift([key, val]);
            }
            for (const [key, val] of pairs) {
              if (key === EMPTY || key === null) {
                cell.array[arrayIdx++] = val;
              } else {
                const k = unwrap(key);
                if (typeof k === 'number') {
                  cell.array[k] = val;
                  if (k >= arrayIdx) arrayIdx = k + 1;
                } else {
                  cell.fields.set(String(k), val);
                }
              }
            }
            if (cell.array.length === 2 && cell.fields.size === 0 && cell.array[1] !== undefined) {
              frame.push(cell.array[1]);
            } else {
              frame.push(cell);
            }
            break;
          }
          case OP.MAKE_BLOCK: {
            const blockIdx = code[frame.ip++];
            const blockChunk = chunks[blockIdx];
            const params = blockChunk._params || [];
            const block = makeBlock(params, blockChunk, frame);
            frame.push(block);
            break;
          }
          case OP.JUMP: {
            frame.ip = code[frame.ip];
            break;
          }
          case OP.JUMP_FALSE: {
            const target = code[frame.ip++];
            const cond = frame.pop();
            if (!cond.isTruthy()) frame.ip = target;
            break;
          }
          case OP.RETURN: {
            return frame.pop();
          }
          case OP.POP: {
            frame.pop();
            break;
          }
          default:
            throw new Error(`Unknown opcode ${op} at ip ${frame.ip - 1}`);
        }
      }
      return EMPTY;
    }
    _lookup(name, frame) {
      const own = frame.self.get(name);
      if (own !== undefined) return own;
      let cl = frame.closure;
      while (cl) {
        const v = cl.self.get(name);
        if (v !== undefined) return v;
        cl = cl.closure;

      const g = this.globals.get(name);
      if (g !== undefined) return g;
      return undefined;

      if (msg === '?') {

        return this._callBlock(receiver, [arg], callerFrame.self, callerFrame);

        const yes = arg.get(1);
        const no  = arg.get(2);

            return this._callBlock(yes, [], callerFrame.self, callerFrame);

          return yes ?? EMPTY;

          if (no instanceof Cell && no.block) {
            return this._callBlock(no, [], callerFrame.self, callerFrame);
          }
          return no ?? EMPTY;
        }

      return EMPTY;

    _callBlock(block, args, self, callerFrame) {
      const { params, chunk, closure } = block.block;
      const blockSelf = new Cell();

      for (let i = 0; i < params.length; i++) {
        blockSelf.set(params[i], args[i] !== undefined ? args[i] : EMPTY);
      }
      const newFrame = new Frame(chunk, blockSelf, closure ?? callerFrame);
      const result = this._exec(newFrame);
      return result;
    }

})();

          [/\]/, { token: 'delimiter.bracket', bracket: '@close' }],

          // Pipe (block parameter separator)
          [/\|/, 'delimiter.pipe'],

          // Colon (assignment / key-value)
          [/:/, 'delimiter.colon'],

          // Operators
          [/[><!]=/, 'operator'],
          [/[+\-*\/=><]/, 'operator'],

          // Ternary
          [/\?/, 'keyword.operator'],

          // Comma
          [/,/, 'delimiter.comma'],

          // Whitespace
          [/\s+/, 'white'],
        ],

        string: [
          [/[^\\"]+/, 'string'],
          [/\\./, 'string.escape'],
          [/"/, { token: 'string.quote', bracket: '@close', next: '@pop' }],
        ],
      }
    });

    // Custom dark theme matching TaskIAP colors
    monaco.editor.defineTheme('sprout-dark', {
      base: 'vs-dark',
      inherit: true,
      rules: [
        { token: 'comment',             foreground: '6e6e73', fontStyle: 'italic' },
        { token: 'string',              foreground: '4ade80' },
        { token: 'string.quote',        foreground: '4ade80' },
        { token: 'string.escape',       foreground: '22d3ee' },
        { token: 'number',              foreground: 'f7c948' },
        { token: 'number.float',        foreground: 'f7c948' },
        { token: 'keyword',             foreground: 'a78bfa', fontStyle: 'bold' },
        { token: 'keyword.operator',    foreground: 'ff6b35', fontStyle: 'bold' },
        { token: 'support.function',    foreground: '38bdf8' },
        { token: 'operator',            foreground: 'ff6b35' },
        { token: 'identifier',          foreground: 'f0f0f0' },
        { token: 'variable.predefined', foreground: 'ef4444', fontStyle: 'bold' },
        { token: 'delimiter.bracket',   foreground: 'f7c948' },
        { token: 'delimiter.pipe',      foreground: 'a78bfa' },
        { token: 'delimiter.colon',     foreground: 'ff6b35' },
        { token: 'delimiter.comma',     foreground: '6e6e73' },
        { token: 'annotation',          foreground: '22d3ee', fontStyle: 'italic' },
      ],
      colors: {
        'editor.background': '#0f0f10',
        'editor.foreground': '#f0f0f0',
        'editor.lineHighlightBackground': '#1a1a1c',
        'editor.selectionBackground': '#ff6b3530',
        'editorCursor.foreground': '#ff6b35',
        'editor.inactiveSelectionBackground': '#ff6b3515',
        'editorLineNumber.foreground': '#3a3a3d',
        'editorLineNumber.activeForeground': '#6e6e73',
        'editorIndentGuide.background': '#2a2a2d',
        'editorIndentGuide.activeBackground': '#3a3a3d',
        'editorBracketMatch.background': '#ff6b3530',
        'editorBracketMatch.border': '#ff6b35',
        'editorGutter.background': '#0f0f10',
        'editorWidget.background': '#1a1a1c',
        'editorWidget.border': '#2a2a2d',
        'editorSuggestWidget.background': '#1a1a1c',
        'editorSuggestWidget.border': '#2a2a2d',
        'editorSuggestWidget.foreground': '#f0f0f0',
        'editorSuggestWidget.selectedBackground': '#ff6b3530',
        'editorSuggestWidget.highlightForeground': '#ff6b35',
        'list.hoverBackground': '#1a1a1c',
        'scrollbarSlider.background': '#33333380',
        'scrollbarSlider.hoverBackground': '#55555580',
      }
    });

    // Autocomplete provider
    monaco.languages.registerCompletionItemProvider('sprout', {
      provideCompletionItems: function(model, position) {
        const word = model.getWordUntilPosition(position);
        const range = {
          startLineNumber: position.lineNumber,
          endLineNumber: position.lineNumber,
          startColumn: word.startColumn,
          endColumn: word.endColumn,
        };

        const suggestions = [];

        // Keywords
        const kws = [
          { label: 'and', detail: 'Logical AND', insertText: 'and' },
          { label: 'or',  detail: 'Logical OR',  insertText: 'or' },
          { label: 'not', detail: 'Logical NOT', insertText: 'not' },
        ];
        for (const kw of kws) {
          suggestions.push({
            label: kw.label,
            kind: monaco.languages.CompletionItemKind.Keyword,
            detail: kw.detail,
            insertText: kw.insertText,
            range: range,
          });
        }

        // Builtins
        const builtinDefs = [
          { label: 'say',      detail: 'Print value with newline',         insertText: 'say' },
          { label: 'print',    detail: 'Print value (no newline)',         insertText: 'print' },
          { label: 'show',     detail: 'Display value with newline',       insertText: 'show' },
          { label: 'length',   detail: 'String length or cell size',       insertText: 'length' },
          { label: 'count',    detail: 'Count elements in cell',           insertText: 'count' },
          { label: 'at',       detail: 'Get element at key',              insertText: 'at' },
          { label: 'set',      detail: 'Set element at key (returns new)', insertText: 'set' },
          { label: 'push',     detail: 'Append element (returns new)',     insertText: 'push' },
          { label: 'each',     detail: 'Iterate over elements',           insertText: 'each [${1:x} | ${2:x say}]' },
          { label: 'map',      detail: 'Transform each element',          insertText: 'map [${1:x} | ${2:x * 2}]' },
          { label: 'filter',   detail: 'Keep matching elements',          insertText: 'filter [${1:x} | ${2:x > 0}]' },
          { label: 'reduce',   detail: 'Reduce to single value',          insertText: 'reduce [${1:a}, ${2:b} | ${3:a + b}] ${4:0}' },
          { label: 'first',    detail: 'First element of cell',           insertText: 'first' },
          { label: 'last',     detail: 'Last element of cell',            insertText: 'last' },
          { label: 'rest',     detail: 'All elements except first',       insertText: 'rest' },
          { label: 'reverse',  detail: 'Reverse a string',               insertText: 'reverse' },
          { label: 'upper',    detail: 'Convert to uppercase',            insertText: 'upper' },
          { label: 'lower',    detail: 'Convert to lowercase',            insertText: 'lower' },
          { label: 'trim',     detail: 'Trim whitespace',                 insertText: 'trim' },
          { label: 'split',    detail: 'Split string by separator',       insertText: 'split ["${1: }"]' },
          { label: 'join',     detail: 'Join cell elements',              insertText: 'join ["${1:, }"]' },
          { label: 'concat',   detail: 'Concatenate strings',             insertText: 'concat [${1:""}]' },
          { label: 'times',    detail: 'Repeat N times',                  insertText: 'times [${1:i} | ${2:i say}]' },
          { label: 'abs',      detail: 'Absolute value',                  insertText: 'abs' },
          { label: 'floor',    detail: 'Floor (round down)',              insertText: 'floor' },
          { label: 'ceil',     detail: 'Ceiling (round up)',              insertText: 'ceil' },
          { label: 'round',    detail: 'Round to nearest integer',        insertText: 'round' },
          { label: 'sqrt',     detail: 'Square root',                     insertText: 'sqrt' },
          { label: 'neg',      detail: 'Negate number',                   insertText: 'neg' },
          { label: 'isNum',    detail: 'Check if number',                 insertText: 'isNum' },
          { label: 'isStr',    detail: 'Check if string',                 insertText: 'isStr' },
          { label: 'isBlock',  detail: 'Check if block',                  insertText: 'isBlock' },
          { label: 'isEmpty',  detail: 'Check if empty',                  insertText: 'isEmpty' },
          { label: 'isTruthy', detail: 'Check if truthy',                 insertText: 'isTruthy' },
          { label: 'asStr',    detail: 'Convert to string',               insertText: 'asStr' },
          { label: 'asNum',    detail: 'Convert to number',               insertText: 'asNum' },
          { label: 'mixin',    detail: 'Copy fields from another cell',   insertText: 'mixin [${1:source}]' },
        ];
        for (const b of builtinDefs) {
          suggestions.push({
            label: b.label,
            kind: monaco.languages.CompletionItemKind.Function,
            detail: b.detail,
            insertText: b.insertText,
            insertTextRules: b.insertText.includes('$') ? monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet : undefined,
            range: range,
          });
        }

        // Snippet templates
        const snippets = [
          {
            label: 'block',
            detail: 'Block with parameter',
            insertText: '[${1:x} | ${2:x say}]',
          },
          {
            label: 'assign',
            detail: 'Variable assignment',
            insertText: '${1:name}: ${2:value}',
          },
          {
            label: 'ternary',
            detail: 'Ternary conditional (? trueVal falseVal)',
            insertText: '${1:condition} ? ${2:trueVal} ${3:falseVal}',
          },
          {
            label: 'conditional',
            detail: 'Conditional with blocks',
            insertText: '${1:condition} [${2:[| "yes" say]}, ${3:[| "no" say]}]',
          },
          {
            label: 'timesloop',
            detail: 'Repeat N times',
            insertText: '${1:10} times [${2:i} |\n\t${3:i say}\n]',
          },
          {
            label: 'cell',
            detail: 'Cell literal (object)',
            insertText: '[${1:key}: ${2:value}, ${3:key2}: ${4:value2}]',
          },
          {
            label: 'list',
            detail: 'List literal',
            insertText: '[${1:1}, ${2:2}, ${3:3}]',
          },
          {
            label: 'function',
            detail: 'Named function (block assigned to variable)',
            insertText: '${1:name}: [${2:x} | ${3:x}]',
          },
        ];
        for (const s of snippets) {
          suggestions.push({
            label: s.label,
            kind: monaco.languages.CompletionItemKind.Snippet,
            detail: s.detail,
            insertText: s.insertText,
            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
            range: range,
          });
        }

        return { suggestions };
      }
    });

    // Bracket configuration
    monaco.languages.setLanguageConfiguration('sprout', {
      brackets: [['[', ']']],
      autoClosingPairs: [
        { open: '[', close: ']' },
        { open: '"', close: '"' },
      ],
      surroundingPairs: [
        { open: '[', close: ']' },
        { open: '"', close: '"' },
      ],
      comments: {
        lineComment: '--',
      },
    });

    // Load saved font size
    const savedFont = localStorage.getItem(FONT_KEY);
    if (savedFont) fontSize = parseInt(savedFont, 10) || 14;

    // Load saved code or default
    const savedCode = localStorage.getItem(STORAGE_KEY);
    const defaultCode = `-- Welcome to SproutJS!\n-- Press Ctrl+Enter to run, or click the Run button.\n-- Try the Examples dropdown above.\n\n"Hello from SproutJS!" say\n\n-- Variables use colon for assignment\nname: "World"\n"Hello, " concat [name] say\n\n-- Blocks are functions in square brackets\ndouble: [x | x * 2]\ndouble [21] say\n\n-- Collections\nnums: [1, 2, 3, 4, 5]\nnums map [x | x * x] each [x | x say]`;

    // Create editor
    editor = monaco.editor.create(document.getElementById('editor'), {
      value: savedCode || defaultCode,
      language: 'sprout',
      theme: 'sprout-dark',
      minimap: { enabled: false },
      fontSize: fontSize,
      fontFamily: 'ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace',
      automaticLayout: true,
      lineNumbers: 'on',
      renderLineHighlight: 'line',
      scrollBeyondLastLine: false,
      padding: { top: 12 },
      tabSize: 2,
      insertSpaces: true,
      wordWrap: 'on',
      bracketPairColorization: { enabled: true },
      cursorBlinking: 'smooth',
      cursorSmoothCaretAnimation: 'on',
      smoothScrolling: true,
      overviewRulerBorder: false,
      hideCursorInOverviewRuler: true,
      occurrencesHighlight: 'off',
    });

    // Remove loading overlay
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) overlay.remove();

    // Cursor position tracking
    editor.onDidChangeCursorPosition(function(e) {
      document.getElementById('cursorPos').textContent =
        'Ln ' + e.position.lineNumber + ', Col ' + e.position.column;
    });

    // Ctrl+Enter / Cmd+Enter to run
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);

    // Ctrl+S / Cmd+S to save
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
      saveCode();
      showToast('Saved to browser storage');
    });

    // Auto-save periodically
    let saveTimer = null;
    editor.onDidChangeModelContent(function() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveCode, 2000);
    });
  });

  // ── Save / Load ─────────────────────────────────────────────────────────
  function saveCode() {
    if (!editor) return;
    localStorage.setItem(STORAGE_KEY, editor.getValue());
    document.getElementById('savedStatus').textContent = 'Saved';
    setTimeout(() => {
      document.getElementById('savedStatus').textContent = '';
    }, 2000);
  }

  // ── Toast ───────────────────────────────────────────────────────────────
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ── Run Code ────────────────────────────────────────────────────────────
  function runCode() {
    if (!editor) return;
    const output = document.getElementById('output');
    output.innerHTML = '';

    const now = new Date();
    const ts = now.toLocaleTimeString();
    appendOutput(`Run at ${ts}`, 'out-timestamp');
    appendOutput('---', 'out-timestamp');

    const src = editor.getValue();
    const lines = [];

    // Set up output callback for say/print/show
    SproutBuiltins._setOutputCallback(function(text) {
      lines.push(text);
      appendOutput(text, 'out-line');
    });

    try {
      const chunk = SproutCompiler.compile(src, '<ide>');
      const builtins = SproutBuiltins.makeBuiltins();
      const vm = new SproutVM.VM(builtins);
      const result = vm.run(chunk);

      // Show final result if it wasn't already printed
      const resultStr = SproutBuiltins.display(result);
      if (resultStr !== '[]' && !lines.includes(resultStr)) {
        appendOutput('=> ' + resultStr, 'out-info');
      }
    } catch (e) {
      appendOutput('Error: ' + e.message, 'out-error');
    }

    SproutBuiltins._setOutputCallback(null);
  }

  function appendOutput(text, cls) {
    const output = document.getElementById('output');
    const div = document.createElement('div');
    div.className = cls || 'out-line';
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  // ── Button Handlers ─────────────────────────────────────────────────────
  document.getElementById('runBtn').addEventListener('click', runCode);

  document.getElementById('clearBtn').addEventListener('click', function() {
    document.getElementById('output').innerHTML =
      '<span class="out-info">Output cleared.</span>';
  });

  document.getElementById('shareBtn').addEventListener('click', function() {
    if (!editor) return;
    navigator.clipboard.writeText(editor.getValue()).then(function() {
      showToast('Code copied to clipboard');
    }).catch(function() {
      showToast('Failed to copy');
    });
  });

  document.getElementById('fontInc').addEventListener('click', function() {
    if (!editor) return;
    fontSize = Math.min(fontSize + 2, 32);
    editor.updateOptions({ fontSize: fontSize });
    localStorage.setItem(FONT_KEY, fontSize);
  });

  document.getElementById('fontDec').addEventListener('click', function() {
    if (!editor) return;
    fontSize = Math.max(fontSize - 2, 8);
    editor.updateOptions({ fontSize: fontSize });
    localStorage.setItem(FONT_KEY, fontSize);
  });

  document.getElementById('examples').addEventListener('change', function() {
    const val = this.value;
    if (!val || !EXAMPLES[val] || !editor) return;
    editor.setValue(EXAMPLES[val]);
    this.value = '';
    saveCode();
  });

})();
</script>
</body>
</html>
