<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="description" content="Babelfish++ — every feature, every language. Interactive Rosetta with semantics and quirks. Sprout as the running example.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ffcc00'/%3E%3Cstop offset='.5' stop-color='%23bf5af2'/%3E%3Cstop offset='1' stop-color='%2330d158'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='%23050510'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-size='16' font-weight='700' fill='url(%23g)'%3E%7B%7D%3C/text%3E%3C/svg%3E">
<title>Babelfish++ · every feature, every language</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   BABELFISH++ · CRT TERMINAL EDITION
   Green phosphor · scanlines · vignette · IBM Plex Mono + VT323
   ═══════════════════════════════════════════════════════════════════════ */
:root{
  --bg:#000000; --bg2:#040704; --panel:#060a06; --panel2:#0a0f0a; --panel3:#101610;
  --border:#153014; --border2:#295028; --border3:#3f7a3e;
  --text:#33ff66; --text-bright:#c6ffd7; --text-dim:#22cc4d;
  --dim:#1a9933; --dimmer:#137626; --faint:#0d5119;
  --amber:#ffb000; --amber-dim:#a86e00;
  --magenta:#ff33aa; --cyan:#33ffdd; --red:#ff3838;
  --sprout:#33ff66;
  --disp:'VT323','IBM Plex Mono',ui-monospace,monospace;
  --mono:'IBM Plex Mono',ui-monospace,'Courier New',Courier,monospace;
  --sans:var(--mono);
  --ease:linear;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*:focus-visible{outline:1px dashed var(--amber);outline-offset:2px}
html,body{
  background:var(--bg); color:var(--text);
  font-family:var(--mono); height:100%; overflow:hidden;
  -webkit-font-smoothing:none; font-smooth:never;
  text-rendering:geometricPrecision;
  font-size:12px; line-height:1.45;
}
body{
  display:grid;
  grid-template-rows:56px 1fr;
  grid-template-columns:260px 1fr;
  grid-template-areas:"top top" "rail main";
  background:
    radial-gradient(ellipse at 50% 30%, #0b1a0d 0%, #050805 55%, #000 100%);
}
/* CRT scanlines */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:9998;
  background: repeating-linear-gradient(
    180deg,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.32) 3px,
    rgba(0,0,0,0) 4px
  );
  mix-blend-mode:multiply;
}
/* Vignette + phosphor bloom edge */
body::after{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0) 45%, rgba(0,0,0,0.7) 100%),
    linear-gradient(180deg, rgba(0,60,10,0.06), rgba(0,0,0,0) 4%, rgba(0,0,0,0) 96%, rgba(0,60,10,0.06));
}
button{background:none;border:none;cursor:pointer;color:inherit;font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;color:inherit;font-size:inherit}
::selection{background:var(--text);color:#000;text-shadow:none}

@keyframes blink { 0%,49% {opacity:1} 50%,100% {opacity:0} }
.cursor{
  display:inline-block; width:.55em; height:.95em;
  background:currentColor; vertical-align:-.12em; margin-left:.15em;
  box-shadow:0 0 6px currentColor;
  animation:blink 1.05s steps(2) infinite;
}

@media(max-width:800px){
  html,body{ height:100dvh; }
  body{
    grid-template-columns:1fr;
    grid-template-rows:auto auto 1fr;
    grid-template-areas:"top" "rail" "main";
  }
}

/* ══════ Top bar ══════ */
.top{
  grid-area:top;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 14px; gap:12px;
  background:#000;
  border-bottom:2px solid var(--text);
  box-shadow:0 0 14px rgba(51,255,102,.35), 0 3px 0 rgba(19,118,38,.6);
  z-index:10; position:relative;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;color:inherit}
.mark{
  width:34px; height:34px;
  border:1px solid var(--text);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--disp); font-weight:400; font-size:22px;
  color:var(--amber);
  text-shadow:0 0 6px currentColor;
  background:rgba(51,255,102,.05);
  letter-spacing:-1px;
}
.mark::before{content:">_";}
.wordmark{display:flex;flex-direction:column;line-height:1;gap:2px}
.wordmark .n{
  font-family:var(--disp); font-weight:400; font-size:28px;
  letter-spacing:.01em; color:var(--text);
  text-shadow:0 0 6px currentColor, 0 0 14px rgba(51,255,102,.35);
}
.wordmark .n .pp{color:var(--amber);font-weight:400;margin-left:1px;text-shadow:0 0 6px currentColor}
.wordmark .t{
  font-family:var(--mono); font-size:9px;
  letter-spacing:.22em; color:var(--dim);
  text-transform:uppercase;
}

.searchbox{
  flex:1; max-width:520px;
  display:flex; align-items:center; gap:10px;
  padding:6px 10px;
  background:#000;
  border:1px solid var(--border2);
  transition:border-color .1s, box-shadow .1s;
}
.searchbox:focus-within{
  border-color:var(--text);
  box-shadow:0 0 0 1px var(--text), 0 0 10px rgba(51,255,102,.35);
}
.searchbox .ic{
  color:var(--dim); flex-shrink:0;
  font-family:var(--disp); font-size:18px; line-height:1;
}
.searchbox input{
  flex:1; background:transparent; border:none; outline:none;
  font-family:var(--mono); font-size:12px; color:var(--text);
  letter-spacing:.02em; text-shadow:0 0 4px currentColor;
}
.searchbox input::placeholder{color:var(--faint);text-shadow:none}
.searchbox .kbd{
  font-family:var(--mono); font-size:9.5px;
  background:transparent; border:1px solid var(--dim);
  padding:1px 6px; color:var(--dim); letter-spacing:.06em;
}

.top-r{
  display:flex; align-items:center; gap:6px; flex-shrink:0;
  font-family:var(--mono); font-size:10px;
  color:var(--dim); letter-spacing:.12em; text-transform:uppercase;
}
.top-r b{color:var(--text);text-shadow:0 0 4px currentColor}
.top-r .dot{color:var(--faint);margin:0 3px}

/* ══════ Left rail ══════ */
.rail{
  grid-area:rail;
  background:#000;
  border-right:1px solid var(--border2);
  overflow-y:auto; overflow-x:hidden;
  padding:10px 8px 24px;
}
.rail::-webkit-scrollbar{width:8px}
.rail::-webkit-scrollbar-track{background:#000}
.rail::-webkit-scrollbar-thumb{background:var(--border);border:1px solid var(--border2)}

.rail-group{margin-bottom:12px}
.rail-group h4{
  font-family:var(--mono);
  font-size:9.5px; letter-spacing:.26em; color:var(--amber);
  text-transform:uppercase;
  padding:6px 8px 8px;
  display:flex; align-items:center; gap:8px;
  font-weight:600; text-shadow:0 0 3px currentColor;
}
.rail-group h4::before{
  content:"[+]"; color:var(--dim); text-shadow:none;
  letter-spacing:0; font-weight:400;
}
.rail-group h4 .rule{
  flex:1; height:0; border-top:1px dashed var(--faint);
}
.feat{
  display:flex; align-items:center; gap:8px;
  padding:6px 10px 6px 14px;
  cursor:pointer;
  color:var(--text-dim);
  font-family:var(--mono); font-size:11.5px;
  transition:background .1s, color .1s;
  border:1px solid transparent;
  position:relative; text-align:left; width:100%;
  background:none; min-height:30px;
}
.feat:hover{background:rgba(51,255,102,.06);color:var(--text)}
.feat.active{
  background:rgba(51,255,102,.14);
  color:var(--text);
  border-color:var(--text);
  text-shadow:0 0 4px currentColor;
  box-shadow:inset 0 0 0 1px rgba(51,255,102,.15), 0 0 8px rgba(51,255,102,.15);
}
.feat.active::before{
  content:">";
  position:absolute; left:2px; top:50%; transform:translateY(-52%);
  color:var(--amber);
  font-family:var(--disp); font-size:16px; line-height:1;
  text-shadow:0 0 6px currentColor;
  animation:blink 1.1s steps(2) infinite;
}
.feat .ico{
  font-family:var(--mono); color:var(--dim);
  font-weight:400; font-size:10.5px; letter-spacing:0;
  flex-shrink:0; min-width:12px;
}
.feat.active .ico{color:var(--amber);text-shadow:0 0 3px currentColor}
.feat .lbl{flex:1}
.feat .n{
  font-family:var(--mono); font-size:9.5px;
  color:var(--dimmer); letter-spacing:.06em;
}
.feat.active .n{color:var(--amber)}

/* ══════ Main ══════ */
.main{
  grid-area:main; overflow-y:auto;
  padding:20px 24px 60px; position:relative;
}
.main::-webkit-scrollbar{width:10px}
.main::-webkit-scrollbar-track{background:#000}
.main::-webkit-scrollbar-thumb{background:var(--border);border:1px solid var(--border2)}

.hero-row{
  display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
  padding-bottom:14px;
  border-bottom:1px dashed var(--border2);
  margin-bottom:16px;
}
.hero-l{flex:1;min-width:0}
.hero-eye{
  font-family:var(--mono);
  font-size:10px; letter-spacing:.24em; color:var(--dim);
  text-transform:uppercase; margin-bottom:8px;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.hero-eye::before{content:"//";color:var(--amber);text-shadow:0 0 3px currentColor;letter-spacing:0}
.hero-eye .fam{color:var(--amber);font-weight:600;text-shadow:0 0 3px currentColor}
h1.feature-title{
  font-family:var(--disp);
  font-size:clamp(38px,5vw,56px);
  font-weight:400; letter-spacing:.01em; line-height:1;
  margin-bottom:12px;
  color:var(--text); text-transform:uppercase;
  text-shadow:0 0 8px currentColor, 0 0 22px rgba(51,255,102,.4);
  word-break:break-word;
}
h1.feature-title::before{content:"> ";color:var(--amber);text-shadow:0 0 8px currentColor}
h1.feature-title::after{
  content:""; display:inline-block;
  width:.5em; height:.75em;
  background:currentColor;
  vertical-align:-.03em; margin-left:.12em;
  box-shadow:0 0 8px currentColor;
  animation:blink 1.05s steps(2) infinite;
}
h1.feature-title .grad{color:var(--text);background:none;-webkit-text-fill-color:currentColor}
.feat-defn{
  color:var(--text-dim);
  font-size:12px; line-height:1.6;
  max-width:720px;
  text-shadow:0 0 2px rgba(51,255,102,.4);
}
.feat-defn code{
  font-family:var(--mono); font-size:.95em;
  background:rgba(255,176,0,.1);
  padding:0 5px;
  border:1px dashed var(--amber-dim);
  color:var(--amber);
  text-shadow:0 0 3px currentColor;
}

.hero-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.chip{
  font-family:var(--mono); font-size:9.5px;
  letter-spacing:.14em; color:var(--dim);
  padding:3px 8px;
  border:1px solid var(--border2);
  background:#000; text-transform:uppercase;
}
.chip b{color:var(--text);text-shadow:0 0 3px currentColor}
.chip.hot{
  color:var(--amber);
  border-color:var(--amber);
  background:rgba(255,176,0,.06);
  text-shadow:0 0 3px currentColor;
}
.chip.hot b{color:var(--amber);text-shadow:0 0 4px currentColor}

.langtoggle{
  display:flex; flex-direction:column; gap:6px;
  margin-bottom:16px;
  padding:8px 10px;
  border:1px dashed var(--border);
  background:rgba(0,15,0,.5);
}
.fam-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:2px 0}
.langtoggle button{
  font-family:var(--mono); font-size:10.5px;
  letter-spacing:.02em;
  padding:3px 8px; min-height:22px;
  border:1px solid var(--border2) !important;
  color:var(--dim) !important;
  background:#000;
  cursor:pointer; transition:none;
  text-transform:lowercase;
}
.langtoggle button:hover{
  color:var(--text) !important;
  border-color:var(--text) !important;
  text-shadow:0 0 3px currentColor;
}
.langtoggle button.on{
  background:rgba(51,255,102,.15) !important;
  color:var(--text) !important;
  border:1px solid var(--text) !important;
  text-shadow:0 0 4px currentColor;
}

/* ══════ Language grid ══════ */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(360px,1fr));
  gap:10px;
}
.card{
  background:#000;
  border:1px solid var(--border2);
  position:relative; overflow:hidden;
  transition:border-color .1s, box-shadow .1s;
}
.card:hover{
  border-color:var(--text);
  box-shadow:0 0 12px rgba(51,255,102,.25);
}
.card::before{
  content:""; position:absolute; top:0; left:0;
  width:3px; height:100%;
  background:var(--c);
  box-shadow:0 0 6px var(--c);
}
.card-hdr{
  display:flex; align-items:center; gap:10px;
  padding:8px 12px;
  border-bottom:1px dashed var(--border);
  cursor:pointer;
  background:rgba(51,255,102,.04);
  min-height:36px;
}
.card-hdr .name{
  font-family:var(--disp); font-weight:400;
  font-size:22px; letter-spacing:0; line-height:1;
  color:var(--text); flex:1;
  text-shadow:0 0 5px currentColor;
}
.card-hdr .flag{
  font-family:var(--mono); font-size:9px;
  letter-spacing:.18em; color:var(--dim);
  text-transform:uppercase;
}
.card-hdr .flag b{color:var(--c);text-shadow:0 0 4px currentColor}
.card-hdr .toggle{
  font-family:var(--mono); font-size:10px;
  color:var(--dim); cursor:pointer;
  padding:3px 7px;
  border:1px solid var(--border2);
  text-transform:uppercase; letter-spacing:.1em;
  min-height:22px;
  display:inline-flex; align-items:center;
}
.card-hdr .toggle:hover{
  color:var(--text); border-color:var(--text);
  text-shadow:0 0 3px currentColor;
}
.code-block{
  background:#000;
  padding:12px 14px;
  overflow-x:auto;
  font-family:var(--mono); font-size:11.5px; line-height:1.55;
  color:var(--text);
  white-space:pre; position:relative;
  text-shadow:0 0 2px rgba(51,255,102,.35);
}
.code-block::-webkit-scrollbar{height:6px}
.code-block::-webkit-scrollbar-track{background:#000}
.code-block::-webkit-scrollbar-thumb{background:var(--border)}
.code-block .copy{
  position:absolute; top:6px; right:8px;
  padding:2px 7px;
  background:#000;
  border:1px solid var(--border2);
  font-family:var(--mono); font-size:9.5px;
  color:var(--dim); cursor:pointer;
  letter-spacing:.1em; text-transform:uppercase;
  opacity:0; transition:opacity .1s;
}
.card:hover .code-block .copy{opacity:1}
.code-block .copy:hover{
  color:var(--text); border-color:var(--text);
  text-shadow:0 0 3px currentColor;
}

/* Syntax highlighting — CRT palette */
.tok-k{color:var(--cyan);text-shadow:0 0 3px currentColor}
.tok-s{color:var(--amber);text-shadow:0 0 3px currentColor}
.tok-n{color:var(--magenta);text-shadow:0 0 3px currentColor}
.tok-c{color:var(--dim);font-style:normal;opacity:.85}
.tok-t{color:var(--cyan);text-shadow:0 0 3px currentColor}
.tok-f{color:var(--text-bright);text-shadow:0 0 3px currentColor}
.tok-o{color:var(--text-bright)}
.tok-p{color:var(--dim)}
.tok-a{color:var(--amber);text-shadow:0 0 3px currentColor}
.tok-i{color:var(--text)}

.card-notes{
  padding:10px 14px 12px;
  border-top:1px dashed var(--border);
  display:none;
  background:rgba(0,20,0,.25);
}
.card.expanded .card-notes{display:block}
.notes-row{margin-bottom:10px}
.notes-row:last-child{margin-bottom:0}
.notes-row .k{
  font-family:var(--mono); font-size:9.5px;
  letter-spacing:.24em; color:var(--amber);
  text-transform:uppercase;
  margin-bottom:5px; font-weight:600;
  text-shadow:0 0 3px currentColor;
}
.notes-row .k::before{content:"[ ";color:var(--dim);text-shadow:none}
.notes-row .k::after{content:" ]";color:var(--dim);text-shadow:none}
.notes-row .v{
  font-size:11.5px; line-height:1.6;
  color:var(--text-dim);
}
.notes-row .v code{
  font-family:var(--mono); font-size:.95em;
  background:rgba(51,255,102,.08);
  padding:0 4px;
  border:1px solid var(--border2);
  color:var(--text);
}
.notes-row .v em{color:var(--dim);font-style:normal;text-decoration:underline dotted}
.notes-row .v ul{padding-left:16px !important;margin:4px 0}
.notes-row .v li{margin-bottom:4px;list-style:none;position:relative;padding-left:12px}
.notes-row .v li::before{content:">";position:absolute;left:0;color:var(--dim)}

/* Toolbar */
.toolbar{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding:8px 0 8px;
  border-bottom:1px dashed var(--border2);
  margin-bottom:14px;
}
.toolbar-l{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.toolbar .btn{
  padding:5px 10px; min-height:26px;
  background:#000;
  border:1px solid var(--border2);
  color:var(--text-dim);
  font-family:var(--mono); font-size:10px;
  letter-spacing:.12em; text-transform:uppercase;
  cursor:pointer;
}
.toolbar .btn:hover{
  border-color:var(--text); color:var(--text);
  text-shadow:0 0 3px currentColor;
}
.toolbar .btn.on{
  background:rgba(51,255,102,.15);
  border-color:var(--text); color:var(--text);
  text-shadow:0 0 3px currentColor;
}

.count-pill{
  font-family:var(--mono); font-size:10px;
  color:var(--dim); letter-spacing:.12em;
  text-transform:uppercase;
}
.count-pill b{color:var(--text);text-shadow:0 0 3px currentColor}

.emptystate{
  padding:60px 20px; text-align:center;
  color:var(--dim);
  font-family:var(--mono); font-size:11px;
  letter-spacing:.14em; text-transform:uppercase;
  border:1px dashed var(--border2);
}

/* Sprout badge */
.sprout-badge{
  display:inline-flex; align-items:center; gap:5px;
  font-family:var(--mono); font-size:9.5px;
  padding:2px 7px;
  background:rgba(51,255,102,.08);
  border:1px solid var(--text);
  color:var(--text);
  letter-spacing:.14em; text-transform:uppercase; font-weight:600;
  text-shadow:0 0 3px currentColor;
}
.sprout-badge::before{content:"*";font-size:12px;line-height:1}

/* ═══════════════════════════════════════════════════════════════════════
   MOBILE · iPhone portrait & narrow screens
   Keep the CRT aesthetic (VT323, phosphor green, scanlines, ASCII) —
   just make the layout breathe at ~390px, kill horizontal overflow,
   bump interactive targets to 44px, and stop iOS focus-zoom.
   ═══════════════════════════════════════════════════════════════════════ */
@media(max-width:800px){
  html,body{ font-size:12px; overflow:hidden; }

  /* ── Top bar: brand on row 1, search on row 2, always in view ── */
  .top{
    padding:8px 12px;
    padding-top:calc(8px + env(safe-area-inset-top));
    padding-left:calc(12px + env(safe-area-inset-left));
    padding-right:calc(12px + env(safe-area-inset-right));
    gap:8px 10px; flex-wrap:wrap;
    height:auto; min-height:56px;
    z-index:20;
  }
  .brand{ flex:0 1 auto; min-width:0; }
  .mark{ width:30px; height:30px; font-size:18px; }
  .wordmark .n{ font-size:22px; }
  .wordmark .t{ display:none; }
  .searchbox{
    flex:1 1 100%; order:3; max-width:none;
    padding:7px 10px;
  }
  .searchbox input{ font-size:16px; }   /* prevents iOS zoom on focus */
  .searchbox .ic{ font-size:20px; }
  .searchbox .kbd{ display:none; }
  .top-r{ display:none; }

  /* ── Rail: horizontal-scrolling feature tab bar ── */
  .rail{
    padding:6px 10px;
    padding-left:calc(10px + env(safe-area-inset-left));
    padding-right:calc(10px + env(safe-area-inset-right));
    display:flex; flex-direction:row; align-items:center; gap:6px;
    overflow-x:auto; overflow-y:hidden;
    max-height:none; height:auto;
    border-right:none;
    border-bottom:1px solid var(--border2);
    white-space:nowrap;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
    background:#000;
  }
  .rail::-webkit-scrollbar{ display:none; }
  .rail-group{
    display:inline-flex; align-items:center; gap:6px;
    margin:0 4px 0 0; flex-shrink:0;
  }
  .rail-group h4{

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

function highlight(code, lang) {
  const kws = KWSET[lang] || new Set();
  const commentPatterns = {
    py: /^(#.*)/, ruby: /^(#.*)/, bash: /^(#.*)/, r: /^(#.*)/, perl: /^(#.*)/, nim: /^(#.*)/, elixir: /^(#.*)/, crystal: /^(#.*)/, julia: /^(#.*)/, sprout: /^(--.*)/,

    cpp: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, cs: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, java: /^(\/\/.*|\/\*[\s\S]*?\*\/)/,
    kotlin: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, swift: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, zig: /^(\/\/.*)/, dart: /^(\/\/.*|\/\*[\s\S]*?\*\/)/,
    go: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, rust: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, php: /^(\/\/.*|#.*|\/\*[\s\S]*?\*\/)/,
    scala: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, fsharp: /^(\/\/.*)/, hs: /^(--.*|\{-[\s\S]*?-\})/, elm: /^(--.*|\{-[\s\S]*?-\})/,
    ocaml: /^(\(\*[\s\S]*?\*\))/, clj: /^(;.*)/, scheme: /^(;.*)/, cl: /^(;.*)/, lua: /^(--.*|--\[\[[\s\S]*?\]\])/,
    prolog: /^(%.*|\/\*[\s\S]*?\*\/)/, fortran: /^(!.*)/, pascal: /^(\{[\s\S]*?\}|\(\*[\s\S]*?\*\))/, ada: /^(--.*)/,
    erlang: /^(%.*)/, odin: /^(\/\/.*|\/\*[\s\S]*?\*\/)/, crystal: /^(#.*)/
  };
  const commentRe = commentPatterns[lang];
  let out = '';
  let i = 0;
  while (i < code.length) {
    const rest = code.slice(i);
    // Comment
    if (commentRe) {
      const m = rest.match(commentRe);
      if (m) { out += `<span class="tok-c">${esc(m[1])}</span>`; i += m[1].length; continue; }
    }
    // String
    const strM = rest.match(/^("(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*'|`(?:\\.|[^`\\])*`)/);
    if (strM) { out += `<span class="tok-s">${esc(strM[1])}</span>`; i += strM[1].length; continue; }
    // Number
    const numM = rest.match(/^\d+(?:\.\d+)?/);
    if (numM) { out += `<span class="tok-n">${esc(numM[0])}</span>`; i += numM[0].length; continue; }
    // Decorator / annotation (Python @foo, Java @Override, Rust #[derive])
    const decoM = rest.match(/^(@[A-Za-z_][A-Za-z0-9_]*|#\[[^\]]+\])/);
    if (decoM) { out += `<span class="tok-a">${esc(decoM[0])}</span>`; i += decoM[0].length; continue; }
    // Identifier / keyword
    const idM = rest.match(/^[A-Za-z_][A-Za-z0-9_]*/);
    if (idM) {
      const w = idM[0];
      if (kws.has(w)) out += `<span class="tok-k">${esc(w)}</span>`;
      else if (/^[A-Z]/.test(w)) out += `<span class="tok-t">${esc(w)}</span>`;
      else out += `<span class="tok-i">${esc(w)}</span>`;
      i += w.length; continue;
    }
    // Operator / punctuation
    const opM = rest.match(/^[+\-*\/%=<>!&|^~?:]+/);
    if (opM) { out += `<span class="tok-o">${esc(opM[0])}</span>`; i += opM[0].length; continue; }
    const punM = rest.match(/^[(){}\[\];,.]/);
    if (punM) { out += `<span class="tok-p">${esc(punM[0])}</span>`; i += 1; continue; }
    out += esc(code[i]); i++;
  }
  return out;
}

{ id:'comment', group:'Meta', label:'Comment · single-line', def:'A note in the source that the compiler ignores. Every language picks a syntactic prefix that is otherwise unusable.', samples:{

        sem:'`//` to EOL.',

  cpp:{code:'// sprout the seed idea\nauto sprout = "seedling";',

  kotlin:{code:'// sprout the seed idea\nval sprout = "seedling"',

  zig:{code:'// sprout the seed idea\nconst sprout = "seedling";',

  clj:{code:'; sprout the seed idea\n(def sprout "seedling")',

  r:{code:'# sprout the seed idea\nsprout <- "seedling"',

{ id:'let', group:'Values', label:'Variable · immutable binding', def:'Bind a name to a value in a lexical scope. Whether the binding can be reassigned varies wildly.', samples:{
  js:{code:'const sprout = "seedling";',
      sem:'Block-scoped, cannot be reassigned. The value it points at (if an object) is still mutable.',
      quirks:['`const arr = []` then `arr.push(1)` is fine — const means the binding, not the referent.','Temporal Dead Zone: accessing `sprout` before the `const` line is a ReferenceError.']},
  ts:{code:'const sprout: string = "seedling";',
      sem:'Same as JS with a type annotation. Types are erased at build.',
      quirks:['`const sprout = "seedling"` (no annotation) narrows the type to the literal `"seedling"`, not just `string`.']},
  py:{code:'sprout: Final[str] = "seedling"',
      sem:'Python has no built-in immutability — `Final` is a static-only hint from `typing`.',
      quirks:['Assign again anywhere and Python does not stop you at runtime; only a type checker complains.','Convention: ALL_CAPS names are "constants" — enforced by review, not the interpreter.']},
  ruby:{code:'SPROUT = "seedling".freeze',
        sem:'Any name starting with uppercase is a Ruby constant. Ruby warns on reassignment but does not stop it.',
        quirks:['`.freeze` prevents mutation of the string itself.','Constants are inherited via lexical scope and can be shadowed inside `Module::` paths.']},
  go:{code:'const sprout = "seedling"',
      sem:'Compile-time constant. Cannot be reassigned or addressed by pointer.',

  rust:{code:'let sprout = "seedling";',
        sem:'`let` in Rust makes an immutable binding. Add `mut` to allow rebinding through the same name.',
        quirks:['Shadowing is legal: `let sprout = 1; let sprout = "seedling";` — the second overrides the first, even changing type.','`const` in Rust is a compile-time constant with mandatory type annotation and reserved for `static` values.']},
  c:{code:'const char *sprout = "seedling";',

  cpp:{code:'const auto sprout = "seedling";',

  cs:{code:'const string sprout = "seedling";',

  java:{code:'final String sprout = "seedling";',

          sem:'`val` = value = read-only. Cannot reassign.',

  swift:{code:'let sprout = "seedling"',

  zig:{code:'const sprout = "seedling";',

  elm:{code:'sprout : String\nsprout = "seedling"',

  ocaml:{code:'let sprout = "seedling"',

  scala:{code:'val sprout = "seedling"',

  erlang:{code:'Sprout = "seedling".',

  r:{code:'sprout <- "seedling"\nlockBinding("sprout", environment())',

  odin:{code:'sprout :: "seedling"',

  prolog:{code:'sprout("seedling").',

  sprout:{code:'sprout : "seedling"',

// ═════ IF ═════
{ id:'if', group:'Control flow', label:'If · conditional', def:'Branch on a boolean. Every language spells the two branches; a few make the result an expression instead of a statement.', samples:{

      quirks:['`==` coerces types: `"1" == 1` is true. Prefer `===`.','No `elif` — use `else if`.']},
  ts:{code:'if (sprout === "seedling") {\n  grow();\n} else {\n  wait();\n}',

      quirks:['`is` type predicates work in conditions: `if (isSprout(x))` narrows x.']},
  py:{code:'if sprout == "seedling":\n    grow()\nelif sprout == "sapling":\n    wait()\nelse:\n    harvest()',
      sem:'Statement. Indentation is significant.',

  ruby:{code:'if sprout == "seedling"\n  grow\nelsif sprout == "sapling"\n  wait\nend',

  go:{code:'if sprout == "seedling" {\n\tgrow()\n} else {\n\twait()\n}',

  rust:{code:'if sprout == "seedling" {\n    grow();\n} else {\n    wait();\n}',

  cpp:{code:'if (sprout == "seedling") {\n  grow();\n} else {\n  wait();\n}',

// ═════ ARRAY ═════
{ id:'array', group:'Data', label:'Array · list literal', def:'A sequence of values. The type may be homogeneous (Rust `Vec`, Java `List<T>`) or heterogeneous (JS, Python).', samples:{

// ═════ PRINT / LOG ═════

      sem:'`IO ()` action. Printed only when evaluated in `main`.',
      quirks:['`print` uses `Show` and adds a newline.','`putStr` no newline.']},
  elm:{code:'-- Elm has no side effects in the language.\n-- Debug.log "label" value  logs to the console.\nDebug.log "sprout" sprout',
       sem:'`Debug.log` is the only way to print, and it must return the value.',
       quirks:['Not allowed in production builds (compiler rejects).','Real output goes through a port or a subscription.']},
  ocaml:{code:'print_endline "sprout"',
         sem:'Adds a newline. `print_string` does not.',
         quirks:['`Printf.printf "%s\\n" "sprout"` for format strings.','`Format.printf` is the pretty-printer.']},
  scala:{code:'println("sprout")',
         sem:'Predef import — no prefix needed.',
         quirks:['String interpolation: `s"$name"`, `f"$pi%.2f"`, `raw"..."`.']},
  fsharp:{code:'printfn "sprout"',
          sem:'Format string is type-checked. `%s` for string, `%d` for int, `%A` for any.',
          quirks:['`printf` without newline; `eprintfn` for stderr.']},
  elixir:{code:'IO.puts("sprout")',
          sem:'`IO.puts` adds newline. `IO.write` does not.',
          quirks:['`IO.inspect(x)` returns `x` — chainable in pipelines.']},
  erlang:{code:'io:format("sprout~n").',
          sem:'`~n` is the platform newline.',
          quirks:['`io:format("~p~n", [Value])` for pretty-print.']},
  clj:{code:'(println "sprout")',
       sem:'Adds newline. `print` does not.',
       quirks:['`prn` prints EDN-readable form.','`clojure.pprint/pprint` for pretty output.']},
  scheme:{code:'(display "sprout") (newline)',
          sem:'`display` for human-readable; `write` for machine-readable.',
          quirks:['Newlines are separate — no `println` in strict R5RS.']},
  cl:{code:'(format t "sprout~%")',
      sem:'`~%` is newline. `t` sends to stdout.',
      quirks:['`format nil ...` returns a string.','Format directives are a mini-language of their own.']},
  lua:{code:'print("sprout")',
       sem:'Adds newline, separates args with tabs.',
       quirks:['`io.write("sprout\\n")` for exact output.','`print` is banned in production sometimes — logging usually goes elsewhere.']},
  php:{code:'echo "sprout\\n";',
       sem:'`echo` is a language construct, not a function.',
       quirks:['`echo` accepts multiple comma-separated args.','`print` is a function that returns 1 — usable in expressions.']},
  perl:{code:'print "sprout\\n";',
        sem:'Prints to STDOUT by default.',
        quirks:['`say "sprout"` adds newline automatically (5.10+).','List separator (`$,`) and output record separator (`$\\`) can auto-insert text.']},
  bash:{code:'echo "sprout"',
        sem:'`echo` is a shell builtin.',
        quirks:['`printf "%s\\n" "sprout"` is more portable — echo behavior differs across shells.','No `-e` needed for escape processing in bash `printf`.']},
  julia:{code:'println("sprout")',
         sem:'Adds newline. `print` does not.',
         quirks:['`@show sprout` prints the expression and its value — great for debugging.','String interpolation via `"$x"`.']},
  r:{code:'print("sprout")',
     sem:'Uses the object\'s `print` method. Formats vary by type.',
     quirks:['`cat("sprout\\n")` for a plain write.','`message("sprout")` goes to stderr.']},
  dart:{code:'print("sprout");',
        sem:'Newline-terminated. Prints to stderr in non-tty scenarios sometimes.',
        quirks:['`stdout.writeln("sprout");` for exact control.']},
  nim:{code:'echo "sprout"',
       sem:'`echo` adds newline; args separated by space.',
       quirks:['Compile-time evaluation of format strings via `strformat`.']},
  crystal:{code:'puts "sprout"',
           sem:'Same idiom as Ruby.',
           quirks:['`p x` shows inspect representation.']},
  odin:{code:'fmt.println("sprout")',
        sem:'From the `fmt` package.',
        quirks:['`fmt.tprintln` uses the temp allocator — freed on scope exit.']},
  fortran:{code:'print *, "sprout"',
           sem:'`*` means list-directed formatting.',
           quirks:['`write(*, *) "sprout"` is equivalent to unit 6 (stdout).','Newline is automatic.']},
  pascal:{code:'WriteLn(\'sprout\');',
          sem:'Adds newline; `Write` does not.',
          quirks:['`WriteLn(x, y)` prints them adjacent — no separator.']},
  ada:{code:'Ada.Text_IO.Put_Line ("sprout");',
       sem:'Standard library. `Put` without newline; `Put_Line` with.',
       quirks:['`use Ada.Text_IO;` shortens to `Put_Line`.']},
  prolog:{code:'write(sprout), nl.',
          sem:'`write` prints the term; `nl` writes a newline.',
          quirks:['`writeln` combines both in most implementations.','`format("~w~n", [sprout])` for format-string style.']},
  sprout:{code:'"sprout" say',
          sem:'Postfix message send. `say` prints with a newline; `print` writes exact bytes; `show` is the pretty-print alias.',
          quirks:['Everything is a message send — `say` is a builtin method on any value, not a keyword or a function call.','`say` returns its receiver, so it chains: `"sprout" upper say lower say`.','The empty cell `[]` prints literally as `[]`; numbers print without a decimal when integral.']},
}},

];

/* ═══════════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════════════ */
const state = {
  featureId: 'fn-def',
  filter: '',
  langOn: new Set(Object.keys(L)), // all on by default
  expanded: new Set(), // per feature+lang key, always-open cards
};

/* ═══════════════════════════════════════════════════════════════════════
   RAIL (feature picker)
   ═══════════════════════════════════════════════════════════════════════ */
function renderRail() {
  const rail = document.getElementById('rail');
  const groups = {};
  for (const f of FEATURES) (groups[f.group] ||= []).push(f);
  const order = ['Functions','Values','Control flow','Data','Meta','I/O'];
  rail.innerHTML = order.filter(g => groups[g]).map(g => `
    <div class="rail-group">
      <h4>${g}<span class="rule"></span></h4>
      ${groups[g].map(f => `
        <button class="feat ${f.id === state.featureId ? 'active' : ''}" data-id="${f.id}">
          <span class="ico">§</span>
          <span class="lbl">${f.label}</span>
          <span class="n">${Object.keys(f.samples).length}</span>
        </button>`).join('')}
    </div>`).join('');
  rail.addEventListener('click', e => {
    const b = e.target.closest('.feat');
    if (b) { state.featureId = b.dataset.id; render(); }
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   MAIN (feature + language grid)
   ═══════════════════════════════════════════════════════════════════════ */
function currentFeature() { return FEATURES.find(f => f.id === state.featureId); }

function langMatches(key, filter) {
  if (!filter) return true;
  const l = L[key];
  const f = filter.toLowerCase();
  return l.name.toLowerCase().includes(f)
      || l.fam.toLowerCase().includes(f)
      || l.tags.some(t => t.toLowerCase().includes(f))
      || key.toLowerCase().includes(f);
}

function render() {
  const f = currentFeature();
  document.querySelectorAll('.feat').forEach(el => el.classList.toggle('active', el.dataset.id === state.featureId));

  const stage = document.getElementById('stage');
  const activeLangs = Object.keys(L).filter(k =>
    state.langOn.has(k) &&
    (f.samples[k] || false) &&
    langMatches(k, state.filter)
  );

  document.getElementById('ft-count').textContent = FEATURES.length;
  document.getElementById('lang-count').textContent = Object.keys(L).length;

  // Language toggle chips grouped by family
  const families = {};
  for (const k of Object.keys(L)) (families[L[k].fam] ||= []).push(k);
  const chips = Object.entries(families).map(([fam, ks]) => {
    return `<div class="fam-group" style="display:flex;align-items:center;gap:6px;padding:0 6px 0 0"><span style="font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--dimmer);text-transform:uppercase;margin-right:4px">${fam}</span>${ks.map(k => {
      const on = state.langOn.has(k);
      return `<button data-lang="${k}" class="${on ? 'on' : ''}" style="border-color:${on ? 'transparent' : L[k].color + '33'};color:${on ? '#fff' : L[k].color}">${L[k].name}</button>`;
    }).join('')}</div>`;
  }).join('');

  stage.innerHTML = `
    <div class="hero-row">
      <div class="hero-l">
        <div class="hero-eye">Feature <span class="fam">· ${f.group}</span> · ${activeLangs.length}/${Object.keys(L).length} shown</div>
        <h1 class="feature-title"><span class="grad">${f.label}</span></h1>
        <p class="feat-defn">${f.def}</p>
      </div>
      <div class="hero-r">
        <span class="chip hot">Running example · <b>sprout</b></span>
        <span class="chip">Total samples · <b>${Object.keys(f.samples).length}</b></span>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-l">
        <button class="btn" id="all-on">All on</button>
        <button class="btn" id="all-off">All off</button>
        <button class="btn" id="expand-all">Expand notes</button>
        <button class="btn" id="collapse-all">Collapse</button>
      </div>
      <div class="count-pill">Showing <b>${activeLangs.length}</b> languages</div>
    </div>

    <div class="langtoggle">${chips}</div>

    <div class="grid" id="grid">
      ${activeLangs.length === 0 ? `<div class="emptystate">No language matches your filter. Try clearing it or clicking a chip.</div>` : ''}
      ${activeLangs.map(k => {
        const s = f.samples[k];
        const key = state.featureId + ':' + k;
        const isX = state.expanded.has(key);
        return `<div class="card ${isX ? 'expanded' : ''}" data-key="${key}" style="--c:${L[k].color}">
          <div class="card-hdr">
            <div class="name">${L[k].name}</div>
            <div class="flag"><b>${L[k].fam}</b></div>
            <div class="toggle">${isX ? '−' : '+ notes'}</div>
          </div>
          <div class="code-block">
<span class="copy">copy</span>${highlight(s.code, k)}</div>
          <div class="card-notes">
            <div class="notes-row"><div class="k">Semantics</div><div class="v">${s.sem}</div></div>
            ${s.quirks && s.quirks.length ? `<div class="notes-row"><div class="k">Quirks & gotchas</div><div class="v"><ul style="padding-left:20px;margin:4px 0">${s.quirks.map(q => `<li style="margin-bottom:4px">${q}</li>`).join('')}</ul></div></div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`;

  // Wire up interactions
  document.querySelectorAll('.langtoggle button').forEach(b => {
    b.addEventListener('click', () => {
      const k = b.dataset.lang;
      if (state.langOn.has(k)) state.langOn.delete(k);
      else state.langOn.add(k);
      render();
    });
  });
  document.getElementById('all-on').addEventListener('click', () => { state.langOn = new Set(Object.keys(L)); render(); });
  document.getElementById('all-off').addEventListener('click', () => { state.langOn = new Set(); render(); });
  document.getElementById('expand-all').addEventListener('click', () => {
    for (const k of activeLangs) state.expanded.add(state.featureId + ':' + k);
    render();
  });
  document.getElementById('collapse-all').addEventListener('click', () => {
    state.expanded = new Set();
    render();
  });
  document.querySelectorAll('.card').forEach(c => {
    c.querySelector('.card-hdr').addEventListener('click', () => {
      const k = c.dataset.key;
      if (state.expanded.has(k)) state.expanded.delete(k);
      else state.expanded.add(k);
      render();
    });
    const copy = c.querySelector('.copy');
    if (copy) copy.addEventListener('click', e => {
      e.stopPropagation();
      const code = c.querySelector('.code-block').innerText.replace(/^copy\s*/, '');
      navigator.clipboard?.writeText(code);
      copy.textContent = 'copied ✓';
      setTimeout(() => { copy.textContent = 'copy'; }, 1400);
    });
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   SEARCH · filter languages
   ═══════════════════════════════════════════════════════════════════════ */
document.getElementById('search').addEventListener('input', e => {
  state.filter = e.target.value.trim();
  render();
});

// Keyboard: `/` focuses the search
window.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

renderRail();
render();
</script>
</body>
</html>
