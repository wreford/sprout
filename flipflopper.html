<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Flip Flopper 🩴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f10;--bg2:#1a1a1c;--bg3:#141416;
  --panel:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;
  --dim:#6e6e73;--accent:#ff6b35;--green:#4ade80;
  --gold:#f7c948;--blue:#38bdf8;--red:#ef4444;
  --purple:#a78bfa;--cyan:#22d3ee;
  --spite-red:#e05050;--spite-glow:rgba(224,80,80,0.5)
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center}

/* Animated gradient background */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(224,80,80,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.04) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(224,80,80,0.05) 0%, transparent 50%);
  animation:bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift{
  0%{filter:hue-rotate(0deg)}
  100%{filter:hue-rotate(15deg)}
}

/* Stage backgrounds */
.stage-kitchen body,.stage-kitchen{--stage-bg:linear-gradient(180deg,#0f0f10 0%,#1a0a0a 100%)}
.stage-yard body,.stage-yard{--stage-bg:linear-gradient(180deg,#0a1a0a 0%,#0f1a0f 100%)}
.stage-neighborhood body,.stage-neighborhood{--stage-bg:linear-gradient(180deg,#0a0a1a 0%,#0f0f2a 100%)}
.stage-city body,.stage-city{--stage-bg:linear-gradient(180deg,#1a0a1a 0%,#2a0a2a 100%)}
.stage-world body,.stage-world{--stage-bg:linear-gradient(180deg,#1a1a0a 0%,#2a2a0a 100%)}

/* News ticker */
.ticker-bar{width:100%;background:var(--bg3);border-bottom:1px solid var(--border);overflow:hidden;height:28px;display:flex;align-items:center;flex-shrink:0;z-index:11}
.ticker-track{display:flex;white-space:nowrap;animation:tickerScroll 80s linear infinite}
.ticker-item{font-size:0.72rem;color:var(--dim);padding:0 40px}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Header */
.header{width:100%;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;gap:8px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.title{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#e05050,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.prestige-badge{font-size:0.75rem;color:var(--gold)}
.prestige-name-badge{font-size:0.7rem;color:var(--gold);font-weight:700;background:rgba(247,201,72,0.1);padding:2px 8px;border-radius:6px;border:1px solid rgba(247,201,72,0.3)}
.achieve-badge{font-size:0.75rem;color:var(--dim);cursor:pointer;transition:color 0.2s}
.achieve-badge:hover{color:var(--gold)}
.event-badge{font-size:0.72rem;color:var(--red);font-weight:700;animation:eventPulse 2s ease-in-out infinite}
@keyframes eventPulse{0%,100%{opacity:0.7}50%{opacity:1}}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.header-btn{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:5px 12px;border-radius:8px;font-size:0.72rem;cursor:pointer;font-weight:600;transition:all 0.15s}
.header-btn:hover{border-color:var(--accent);color:var(--accent)}
.prestige-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:0.75rem;cursor:pointer;display:none;animation:glow 2s ease-in-out infinite;transition:transform 0.15s}
.prestige-btn:hover{transform:scale(1.05)}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(247,201,72,0.4)}50%{box-shadow:0 0 20px rgba(247,201,72,0.8)}}

/* Prestige progress bar */
.prestige-progress-wrap{width:100%;background:var(--bg3);height:6px;flex-shrink:0;position:relative;overflow:hidden}
.prestige-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#ff8c00);transition:width 0.3s;width:0%}
.prestige-progress-label{position:absolute;right:8px;top:-1px;font-size:0.55rem;color:var(--gold);font-weight:700}

/* Spite meter */
.spite-meter-wrap{width:100%;background:var(--bg3);height:4px;flex-shrink:0;position:relative;overflow:hidden}
.spite-meter-bar{height:100%;background:linear-gradient(90deg,var(--red),#ff4040,var(--accent));transition:width 0.2s;width:0%;box-shadow:0 0 8px rgba(239,68,68,0.5)}
.spite-meter-label{position:absolute;right:8px;top:-1px;font-size:0.5rem;color:var(--red);font-weight:700}

/* Main layout */
.main{display:flex;flex:1;width:100%;max-width:1200px;overflow:hidden}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;min-height:0;overflow:hidden}
.upgrade-panel{width:340px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0}

/* Upgrade tab bar */
.tab-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:50px;background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:6px 4px;border-radius:6px;font-size:0.62rem;font-weight:700;cursor:pointer;text-align:center;transition:all 0.15s}
.tab-btn.active{border-color:var(--accent);color:var(--text);background:rgba(255,107,53,0.1)}
.tab-btn:hover:not(.active){border-color:var(--dim)}
.tab-btn .tab-notif{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:3px;vertical-align:middle}

/* Spite counter */
.fish-count{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;text-align:center;color:var(--spite-red);text-shadow:0 0 20px var(--spite-glow);transition:all 0.3s}
.fish-count.golden-mode{color:var(--gold);text-shadow:0 0 30px rgba(247,201,72,0.8)}
.fish-count.bump{animation:countBump 0.15s ease}
@keyframes countBump{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.fps-display{font-size:0.9rem;color:var(--dim);margin-top:4px;text-align:center}
.click-power{font-size:0.75rem;color:var(--dim);margin-top:2px;text-align:center}
.multiplier-display{font-size:0.7rem;color:var(--gold);margin-top:2px;text-align:center;min-height:16px}
.combo-display{font-size:0.85rem;font-weight:900;color:var(--accent);margin-top:4px;text-align:center;min-height:20px;transition:all 0.15s}
.combo-display.hot{color:var(--red);text-shadow:0 0 10px rgba(239,68,68,0.5)}
.combo-display.fire{color:var(--gold);text-shadow:0 0 15px rgba(247,201,72,0.6);animation:comboPulse 0.3s ease infinite alternate}
@keyframes comboPulse{from{transform:scale(1)}to{transform:scale(1.05)}}
.narrator-bubble{font-size:0.78rem;color:var(--accent);margin-top:8px;text-align:center;font-style:italic;max-width:420px;min-height:22px;opacity:0;transition:opacity 0.3s;padding:4px 12px;border-radius:8px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.15)}
.narrator-bubble.visible{opacity:1}
.fun-fact-display{font-size:0.65rem;color:var(--dim);margin-top:6px;text-align:center;font-style:italic;max-width:400px;opacity:0.7;min-height:16px}

/* Naughty List queue */
.naughty-queue{font-size:0.75rem;color:var(--dim);margin-top:4px;text-align:center;min-height:20px;letter-spacing:2px}

/* Chancla + peach */
.flounder-wrap{position:relative;margin:20px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:8px}
.flounder{font-size:80px;transition:transform 0.1s,font-size 0.5s;display:block;filter:drop-shadow(0 0 30px var(--spite-glow))}
.peach-target{font-size:80px;transition:transform 0.1s,filter 0.3s;display:block}
.flounder:active{transform:scale(0.92)}
.flounder.wiggle{animation:chanclaSwing 0.3s cubic-bezier(0.36,0.07,0.19,0.97)}
.peach-target.jiggle{animation:peachJiggle 0.3s cubic-bezier(0.36,0.07,0.19,0.97)}
@keyframes chanclaSwing{
  0%{transform:rotate(0) scale(1)}
  15%{transform:rotate(50deg) scale(1.2)}
  30%{transform:rotate(-25deg) scale(1.05)}
  50%{transform:rotate(15deg) scale(1.02)}
  70%{transform:rotate(-8deg)}
  100%{transform:rotate(0) scale(1)}
}
@keyframes peachJiggle{
  0%{transform:scale(1)}
  15%{transform:scale(0.8) rotate(-10deg)}
  30%{transform:scale(1.2) rotate(6deg)}
  50%{transform:scale(0.92) rotate(-3deg)}
  70%{transform:scale(1.06)}
  100%{transform:scale(1)}
}

/* Screen shake */
.game-area.shaking{animation:screenShake 0.15s ease}
@keyframes screenShake{
  0%{transform:translate(0,0)}
  25%{transform:translate(-3px,2px)}
  50%{transform:translate(3px,-2px)}
  75%{transform:translate(-2px,1px)}
  100%{transform:translate(0,0)}
}
.game-area.big-shake{animation:bigShake 0.25s ease}
@keyframes bigShake{
  0%{transform:translate(0,0)}
  20%{transform:translate(-6px,4px)}
  40%{transform:translate(6px,-4px)}
  60%{transform:translate(-4px,2px)}
  80%{transform:translate(4px,-2px)}
  100%{transform:translate(0,0)}
}

/* Prestige visual overlays */
.prestige-crown{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:36px;pointer-events:none;z-index:5}
.prestige-level-stars{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:12px;pointer-events:none;z-index:5;white-space:nowrap;color:var(--gold)}

/* Golden glow effect */
.flounder.golden-glow{filter:drop-shadow(0 0 30px rgba(247,201,72,0.8)) drop-shadow(0 0 60px rgba(247,201,72,0.4))}

/* Rainbow shimmer */
.flounder.rainbow-shimmer{animation:chanclaSwing 0.3s ease, chanclaShimmer 3s linear infinite}
@keyframes chanclaShimmer{
  0%{filter:drop-shadow(0 0 30px rgba(224,80,80,0.6)) hue-rotate(0deg)}
  25%{filter:drop-shadow(0 0 30px rgba(255,160,80,0.6)) hue-rotate(15deg)}
  50%{filter:drop-shadow(0 0 30px rgba(247,201,72,0.6)) hue-rotate(30deg)}
  75%{filter:drop-shadow(0 0 30px rgba(224,80,80,0.6)) hue-rotate(15deg)}
  100%{filter:drop-shadow(0 0 30px rgba(224,80,80,0.6)) hue-rotate(0deg)}
}

/* Anger steam particles */
.fire-particle{position:absolute;pointer-events:none;z-index:4;font-size:14px;animation:steamFloat 1.5s ease-out forwards}
@keyframes steamFloat{0%{opacity:0.8;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0.3)}}

/* Santa hat decoration for December */
.santa-hat{position:absolute;top:-20px;left:50%;transform:translateX(-40%);font-size:40px;pointer-events:none;z-index:5}

/* Particles */
.particle{position:absolute;pointer-events:none;border-radius:50%;animation:splash 0.6s ease-out forwards}
@keyframes splash{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}}

/* Golden particles for combos */
.gold-particle{position:absolute;pointer-events:none;animation:goldFloat 1s ease-out forwards;font-size:12px;z-index:15}
@keyframes goldFloat{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0) rotate(360deg)}}

/* Spark effects */
.spark{position:absolute;pointer-events:none;width:3px;height:3px;background:var(--gold);border-radius:50%;animation:sparkFly 0.4s ease-out forwards;z-index:15}
@keyframes sparkFly{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--dx),var(--dy))}}

/* Smack text */
.click-text{position:absolute;pointer-events:none;font-weight:800;font-size:1.2rem;color:var(--spite-red);animation:floatUp 0.8s ease-out forwards;z-index:20}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}

/* Smack word pop */
.smack-word{position:absolute;pointer-events:none;font-weight:900;font-size:1.6rem;color:#ff4040;text-shadow:0 0 10px rgba(255,64,64,0.5);animation:smackPop 0.6s ease-out forwards;z-index:21}
@keyframes smackPop{0%{opacity:1;transform:scale(0.5) rotate(-10deg)}30%{opacity:1;transform:scale(1.3) rotate(5deg)}100%{opacity:0;transform:scale(0.8) translateY(-40px) rotate(-5deg)}}

/* Combo text (bigger, more dramatic) */
.combo-text{position:absolute;pointer-events:none;font-weight:900;font-size:2rem;color:var(--gold);text-shadow:0 0 20px rgba(247,201,72,0.6);animation:comboFloat 1s ease-out forwards;z-index:22}
@keyframes comboFloat{0%{opacity:1;transform:scale(0.3) rotate(-5deg)}20%{opacity:1;transform:scale(1.5) rotate(3deg)}100%{opacity:0;transform:scale(0.6) translateY(-80px)}}

/* Background steam */
.bubble-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bubble{position:absolute;border-radius:50%;background:rgba(200,50,50,0.03);border:1px solid rgba(200,50,50,0.05);animation:steamRise linear infinite}
@keyframes steamRise{0%{transform:translateY(100vh) scale(1);opacity:0.6}100%{transform:translateY(-100px) scale(0.3);opacity:0}}

/* Waves at bottom */
.ocean-waves{position:fixed;bottom:0;left:0;width:200%;height:80px;pointer-events:none;z-index:0;opacity:0.4}
.wave{position:absolute;bottom:0;width:200%;height:50px;border-radius:50% 50% 0 0}
.wave1{background:rgba(15,15,16,0.5);animation:waveMove 6s ease-in-out infinite;left:-50%}
.wave2{background:rgba(26,26,28,0.4);animation:waveMove 8s ease-in-out infinite reverse;left:-30%;bottom:5px}
.wave3{background:rgba(20,20,22,0.3);animation:waveMove 10s ease-in-out infinite;left:-40%;bottom:10px}
@keyframes waveMove{0%,100%{transform:translateX(0)}50%{transform:translateX(60px)}}

/* Prestige wave animation */
.prestige-wave-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;background:linear-gradient(180deg,rgba(224,80,80,0.9),rgba(15,15,16,0.95));animation:prestigeWave 1.5s ease-in-out forwards}
@keyframes prestigeWave{0%{opacity:0;transform:translateY(100%)}30%{opacity:1;transform:translateY(0)}70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100%)}}
.prestige-wave-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;color:var(--gold);text-align:center;text-shadow:0 0 30px rgba(247,201,72,0.6)}

/* Golden Chancla */
.golden-fish{position:fixed;z-index:50;cursor:pointer;font-size:48px;filter:drop-shadow(0 0 20px rgba(247,201,72,0.8));animation:goldenSwim var(--swim-duration,5s) linear forwards;pointer-events:auto;user-select:none;-webkit-tap-highlight-color:transparent}
@keyframes goldenSwim{0%{transform:translateX(var(--start-x)) translateY(var(--start-y)) scaleX(var(--dir,1))}100%{transform:translateX(var(--end-x)) translateY(var(--end-y)) scaleX(var(--dir,1))}}
.golden-sparkle{position:fixed;pointer-events:none;font-size:16px;animation:sparkle 0.5s ease-out forwards;z-index:49}
@keyframes sparkle{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-30px)}}

/* Mega golden chancla */
.mega-golden-fish{font-size:72px !important;filter:drop-shadow(0 0 40px rgba(247,201,72,1)) drop-shadow(0 0 80px rgba(255,100,0,0.6)) !important}

/* Golden chancla click burst */
.golden-burst{position:fixed;pointer-events:none;z-index:51;font-size:28px;animation:burstOut 0.8s ease-out forwards}
@keyframes burstOut{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0.3)}}

/* Chancla rain */
.fish-rain{position:fixed;pointer-events:none;z-index:1;font-size:20px;animation:fishFall linear forwards;opacity:0.4}
@keyframes fishFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0.5}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}

/* Mini-game overlay */
.minigame-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.minigame-title{font-size:1.5rem;font-weight:900;color:var(--gold);margin-bottom:8px}
.minigame-sub{font-size:0.9rem;color:var(--dim);margin-bottom:16px}
.minigame-arena{width:90%;max-width:600px;height:300px;background:rgba(26,26,28,0.9);border:2px solid var(--border);border-radius:16px;position:relative;overflow:hidden}
.minigame-fish{position:absolute;font-size:32px;cursor:pointer;user-select:none;animation:miniSwim var(--mini-dur,3s) linear forwards}
@keyframes miniSwim{0%{left:-40px}100%{left:calc(100% + 40px)}}
.minigame-score{font-size:1.2rem;color:var(--green);font-weight:800;margin-top:12px}
.minigame-timer{font-size:2rem;color:#fff;font-weight:900;margin-bottom:8px}

/* Boss HP bar */
.boss-hp-bar-wrap{width:80%;max-width:400px;height:24px;background:#222;border-radius:12px;overflow:hidden;margin-top:8px;border:2px solid var(--border)}
.boss-hp-bar{height:100%;background:linear-gradient(90deg,#ff4040,#ff8040);transition:width 0.1s;border-radius:10px}
.boss-hp-text{font-size:0.8rem;color:#fff;font-weight:700;margin-top:4px}

/* Pattern game cells */
.pattern-grid{display:grid;grid-template-columns:repeat(3,80px);gap:8px;margin-top:12px}
.pattern-cell{width:80px;height:80px;font-size:40px;display:flex;align-items:center;justify-content:center;background:rgba(26,26,28,0.9);border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all 0.15s}
.pattern-cell.active{border-color:var(--gold);background:rgba(247,201,72,0.15)}
.pattern-cell.correct{border-color:var(--green);background:rgba(74,222,128,0.15)}
.pattern-cell.wrong{border-color:var(--red);background:rgba(239,68,68,0.15)}

/* Dodge game */
.dodge-player{position:absolute;font-size:40px;bottom:20px;transition:left 0.1s;z-index:5}
.dodge-chancla{position:absolute;font-size:32px;animation:dodgeFall linear forwards}
@keyframes dodgeFall{0%{top:-40px}100%{top:320px}}

/* Stats modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:150;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:560px;width:92%;max-height:82vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:800;margin-bottom:16px;color:var(--accent)}
.modal h3{font-size:0.9rem;font-weight:700;margin:14px 0 8px;color:var(--dim)}
.modal-close{float:right;background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer;transition:color 0.15s}
.modal-close:hover{color:var(--text)}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.82rem}
.stat-label{color:var(--dim)}
.stat-value{color:var(--text);font-weight:700}

/* Achievement grid in modal */
.achieve-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.achieve-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:0.75rem;transition:all 0.15s}
.achieve-card.earned{border-color:var(--gold);background:rgba(247,201,72,0.06)}
.achieve-card.hidden-achieve{border-style:dashed;opacity:0.5}
.achieve-card .a-icon{font-size:1.2rem}
.achieve-card .a-name{font-weight:700;margin-top:2px}
.achieve-card .a-desc{color:var(--dim);font-size:0.65rem;margin-top:1px}
.achieve-card .a-reward{color:var(--green);font-size:0.6rem;margin-top:2px}

/* Prestige confirmation modal */
.prestige-modal{max-width:500px}
.prestige-modal h2{color:var(--gold)}
.prestige-unlock{background:rgba(247,201,72,0.1);border:1px solid rgba(247,201,72,0.3);border-radius:8px;padding:10px;margin:10px 0;font-size:0.85rem;color:var(--gold)}
.prestige-keeps{color:var(--green);font-size:0.8rem;margin:4px 0}
.prestige-resets{color:var(--red);font-size:0.8rem;margin:4px 0}
.prestige-confirm-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:10px 24px;border-radius:10px;font-weight:800;font-size:1rem;cursor:pointer;margin-top:12px;width:100%;transition:transform 0.15s}
.prestige-confirm-btn:hover{transform:scale(1.02)}
.prestige-cancel-btn{background:var(--bg);color:var(--dim);border:1px solid var(--border);padding:8px 20px;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;margin-top:8px;width:100%}

/* PP shop */

function getDailyChallenge(){
  var dayKey=new Date().toISOString().slice(0,10);
  var seed=0;for(var i=0;i<dayKey.length;i++)seed+=dayKey.charCodeAt(i);
  var idx=seed%DAILY_CHALLENGES.length;
  return DAILY_CHALLENGES[idx];
}

function getDailyChallengeProgress(){
  var ch=getDailyChallenge();
  var dayKey=new Date().toISOString().slice(0,10);
  if(state.dailyChallengeDay!==dayKey){
    state.dailyChallengeDay=dayKey;
    state.dailyClicks=0;state.dailyEarned=0;state.dailyBuys=0;state.dailyGolden=0;state.dailyMinigames=0;
    state.dailyChallengeComplete=false;
  }
  var progress=0;
  if(ch.type==='clicks')progress=state.dailyClicks||0;
  else if(ch.type==='earn')progress=state.dailyEarned||0;
  else if(ch.type==='buy')progress=state.dailyBuys||0;
  else if(ch.type==='combo')progress=state.highestCombo||0;
  else if(ch.type==='golden')progress=state.dailyGolden||0;
  else if(ch.type==='spite')progress=state.spiteMeter||0;
  else if(ch.type==='minigame')progress=state.dailyMinigames||0;
  else if(ch.type==='time')progress=Math.floor((Date.now()-state.sessionStart)/1000);
  return Math.min(progress,ch.target);
}

function checkDailyChallenge(){
  var ch=getDailyChallenge();
  var prog=getDailyChallengeProgress();
  if(prog>=ch.target&&!state.dailyChallengeComplete){
    state.dailyChallengeComplete=true;
    state.fish+=ch.reward;state.totalFish+=ch.reward;state.allTimeFish+=ch.reward;
    showToast('Daily Challenge Complete! +'+fmt(ch.reward)+' spite!',true);
    showNarrator(narratorByContext.milestone[Math.floor(Math.random()*narratorByContext.milestone.length)]);
  }
}

function renderDailyChallenge(){
  var wrap=document.getElementById('dailyChallengeWrap');
  if(!wrap)return;
  var ch=getDailyChallenge();
  var prog=getDailyChallengeProgress();
  var pct=Math.min(prog/ch.target*100,100);
  var complete=state.dailyChallengeComplete;
  wrap.innerHTML='<div class="daily-challenge">'
    +'<div class="dc-title">'+(complete?'Daily Complete!':'Daily Challenge')+'</div>'
    +'<div class="dc-desc">'+ch.name+(complete?' &#10003;':' ('+fmt(prog)+'/'+fmt(ch.target)+')')+'</div>'
    +'<div class="dc-progress"><div class="dc-bar" style="width:'+pct+'%;'+(complete?'background:var(--green)':'')+'"></div></div>'
    +'</div>';
}

function playFlick(power){
  try{
    var c=getAudio(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    var pitch=Math.min(200+Math.log2(Math.max(power,1))*60,800);
    o.frequency.value=pitch;o.type='sawtooth';g.gain.value=0.018;
    o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);
    o.stop(c.currentTime+0.07);
  }catch(e){}
}

// ── Helpers ──
function fmt(n){
  if(!isFinite(n))return 'Infinity';
  if(n>=1e60)return (n/1e60).toFixed(1)+'Nv';
  if(n>=1e57)return (n/1e57).toFixed(1)+'Oc';
  if(n>=1e54)return (n/1e54).toFixed(1)+'Sp';
  if(n>=1e51)return (n/1e51).toFixed(1)+'Sx';
  if(n>=1e48)return (n/1e48).toFixed(1)+'Qi';
  if(n>=1e45)return (n/1e45).toFixed(1)+'Qa';
  if(n>=1e42)return (n/1e42).toFixed(1)+'Td';
  if(n>=1e39)return (n/1e39).toFixed(1)+'Dd';
  if(n>=1e36)return (n/1e36).toFixed(1)+'Ud';
  if(n>=1e33)return (n/1e33).toFixed(1)+'Dc';
  if(n>=1e30)return (n/1e30).toFixed(1)+'No';
  if(n>=1e27)return (n/1e27).toFixed(1)+'Oc';
  if(n>=1e24)return (n/1e24).toFixed(1)+'Sp';
  if(n>=1e21)return (n/1e21).toFixed(1)+'Sx';
  if(n>=1e18)return (n/1e18).toFixed(1)+'Qn';
  if(n>=1e15)return (n/1e15).toFixed(1)+'Q';
  if(n>=1e12)return (n/1e12).toFixed(1)+'T';
  if(n>=1e9)return (n/1e9).toFixed(1)+'B';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return n.toLocaleString('en-US',{maximumFractionDigits:0});
  return Math.floor(n).toString();
}

function getPrestigeData(){
  var current=null,next=null;
  for(var i=0;i<PRESTIGE_LEVELS.length;i++){
    if(PRESTIGE_LEVELS[i].level===state.prestigeLevel)current=PRESTIGE_LEVELS[i];
    if(PRESTIGE_LEVELS[i].level===state.prestigeLevel+1)next=PRESTIGE_LEVELS[i];
  }
  return{current:current,next:next};
}
function getNextPrestigeReq(){var pd=getPrestigeData();return pd.next?pd.next.req:Infinity;}
function getNextPrestigeMult(){var pd=getPrestigeData();return pd.next?pd.next.mult:state.prestigeMultiplier;}
function getPPUpgradeCount(id){return state.ppUpgrades[id]||0;}
function getAutoCost(i){return Math.floor(autoUpgradeDefs[i].baseCost*Math.pow(1.15,state.autoUpgrades[i]));}

function getClickPower(){
  var p=1;
  p+=getPPUpgradeCount('startClickPower');
  clickUpgradeDefs.forEach(function(d,i){if(state.clickUpgrades[i])p+=d.power;});
  if(state.researchUpgrades[8])p*=1.5;
  if(state.researchUpgrades[14])p*=3;
  var ev=getActiveEvent();
  if(ev&&ev.mult!==1)p*=ev.mult;
  if(Date.now()<state.frenzyEnd)p*=10;
  var multBonusPct=getPPUpgradeCount('multBonus');
  if(multBonusPct>0)p*=(1+multBonusPct/100);
  // Combo bonus
  var comboMult=getComboMultiplier();
  if(comboMult>1)p*=comboMult;
  // Achievement multiplier
  if(state.achieveMultiplier>1)p*=state.achieveMultiplier;
  return Math.floor(p*state.prestigeMultiplier);
}

function getComboMultiplier(){
  if(state.comboCount<5)return 1;
  var base=1+state.comboCount*0.01;
  var ppBonus=getPPUpgradeCount('comboBonus')*0.1;
  return Math.min(base+ppBonus,5); // cap at 5x
}

function getBuildingFps(i){
  var base=autoUpgradeDefs[i].fps;
  researchDefs.forEach(function(r,ri){
    if(state.researchUpgrades[ri]&&r.target==='building'&&r.idx===i)base*=r.mult;
  });
  return base;
}
function calcFPS(){
  var f=0;
  autoUpgradeDefs.forEach(function(d,i){f+=getBuildingFps(i)*state.autoUpgrades[i];});
  var allMult=1;
  researchDefs.forEach(function(r,ri){
    if(state.researchUpgrades[ri]&&r.target==='allFps')allMult+=r.mult;
  });
  f*=allMult;
  if(state.researchUpgrades[14])f*=3;
  var ev=getActiveEvent();
  if(ev&&ev.mult!==1)f*=ev.mult;
  if(Date.now()<state.elderEnd)f*=2;
  var multBonusPct=getPPUpgradeCount('multBonus');
  if(multBonusPct>0)f*=(1+multBonusPct/100);
  if(state.achieveMultiplier>1)f*=state.achieveMultiplier;
  return f*state.prestigeMultiplier;
}

// ── Click speed tracking for achievements ──
function trackClickSpeed(){
  var now=Date.now();
  state.clickTimestamps.push(now);
  // Keep last 5 seconds of timestamps
  while(state.clickTimestamps.length>0&&now-state.clickTimestamps[0]>5000)state.clickTimestamps.shift();
  state.clicksIn5Sec=state.clickTimestamps.length;
  // Count in 2 seconds
  var count2=0;
  for(var i=state.clickTimestamps.length-1;i>=0;i--){
    if(now-state.clickTimestamps[i]<=2000)count2++;else break;
  }
  state.clicksIn2Sec=count2;
}

// SMACK (CLICK) HANDLER
// ══════════════════════════════════════════
var flounderEl=document.getElementById('flounder');
var flounderWrap=document.getElementById('flounderWrap');
var peachEl=document.getElementById('peachTarget');
var ambientStarted=false;

function flick(e){
  e.preventDefault();
  if(!ambientStarted){ambientStarted=true;startAmbient();}
  lastActivityTime=Date.now();
  state.idleTime=0;

  // Track clicks for speed achievements
  trackClickSpeed();

  // Update combo
  updateCombo();

  var power=getClickPower();

  // Spite event multiplier
  if(state.spiteEventEnd&&Date.now()<state.spiteEventEnd)power*=5;

  state.fish+=power;state.totalFish+=power;state.allTimeFish+=power;state.thisPrestigeFish+=power;
  state.totalFlicks++;
  state.dailyClicks=(state.dailyClicks||0)+1;
  state.dailyEarned=(state.dailyEarned||0)+power;
  state.peachHeat=Math.min(state.peachHeat+1,25);

  // Spite meter: builds with clicks
  var spiteGain=0.3+(state.comboCount*0.05);
  var spitePPBoost=getPPUpgradeCount('spiteMeterBoost');
  if(spitePPBoost>0)spiteGain*=(1+spitePPBoost*0.1);
  state.spiteMeter=Math.min(state.spiteMeter+spiteGain,100);

  // If spite is full, trigger event
  if(state.spiteMeter>=100)triggerSpiteEvent();

  // Click streak tracking
  var now=Date.now();
  if(now-state.lastClickTime<500)state.clickStreak++;
  else state.clickStreak=1;
  state.lastClickTime=now;

  playFlick(power);

  // Chancla swing animation
  flounderEl.classList.remove('wiggle');
  void flounderEl.offsetWidth;
  flounderEl.classList.add('wiggle');

  // Peach jiggle animation
  peachEl.classList.remove('jiggle');
  void peachEl.offsetWidth;
  peachEl.classList.add('jiggle');

  updatePeachHeat();

  // Screen shake on combos
  if(state.comboCount>=50&&state.comboCount%10===0)doScreenShake(true);
  else if(state.comboCount>=20&&state.comboCount%5===0)doScreenShake(false);

  // Smack word popup (occasional, more on combos)
  if(Math.random()<0.3||state.clickStreak>5){
    var sw=document.createElement('div');
    sw.className='smack-word';
    sw.textContent=SMACK_WORDS[Math.floor(Math.random()*SMACK_WORDS.length)];
    var rect=flounderWrap.getBoundingClientRect();
    var gRect=document.getElementById('gameArea').getBoundingClientRect();
    sw.style.left=(rect.left-gRect.left+rect.width/2+Math.random()*80-40)+'px';
    sw.style.top=(rect.top-gRect.top-20+Math.random()*40-20)+'px';
    document.getElementById('gameArea').appendChild(sw);
    setTimeout(function(){sw.remove();},600);
  }

  // Combo milestone text
  if(state.comboCount>0&&state.comboCount%25===0&&state.comboCount>=25){
    var ct2=document.createElement('div');
    ct2.className='combo-text';
    ct2.textContent=state.comboCount+'x COMBO!';
    var rect3=flounderWrap.getBoundingClientRect();
    var gRect3=document.getElementById('gameArea').getBoundingClientRect();
    ct2.style.left=(rect3.left-gRect3.left+rect3.width/2-60)+'px';
    ct2.style.top=(rect3.top-gRect3.top-40)+'px';
    document.getElementById('gameArea').appendChild(ct2);
    setTimeout(function(){ct2.remove();},1000);
  }

  // Number popup
  var ct=document.createElement('div');
  ct.className='click-text';
  ct.textContent='+'+fmt(power);
  if(state.comboCount>=50)ct.style.color='var(--gold)';
  else if(state.comboCount>=20)ct.style.color='var(--accent)';
  else if(state.clickStreak>10)ct.style.color='#ff4040';
  else if(state.clickStreak>5)ct.style.color='#ff8040';
  var rect2=flounderWrap.getBoundingClientRect();
  var gRect2=document.getElementById('gameArea').getBoundingClientRect();
  ct.style.left=(rect2.left-gRect2.left+rect2.width/2-20+Math.random()*20-10)+'px';
  ct.style.top=(rect2.top-gRect2.top-10-Math.random()*15)+'px';
  document.getElementById('gameArea').appendChild(ct);
  setTimeout(function(){ct.remove();},800);

  // Regular particles
  var clientX=e.clientX||(e.touches&&e.touches[0]?e.touches[0].clientX:rect2.left+rect2.width/2);
  var clientY=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:rect2.top+rect2.height/2);
  spawnParticles(clientX,clientY);

  // Sparks on combos
  if(state.comboCount>=10)spawnSparks(clientX,clientY);
  // Gold particles on high combos
  if(state.comboCount>=30&&state.comboCount%5===0){
    for(var gi=0;gi<5;gi++)spawnGoldParticle(clientX+Math.random()*40-20,clientY+Math.random()*40-20);
  }

  // Bump the counter
  var fishCountEl=document.getElementById('fishCount');
  fishCountEl.classList.remove('bump');void fishCountEl.offsetWidth;fishCountEl.classList.add('bump');

  updateDisplay();
  updateSpiteMeter();
  checkAchievements();
  checkDailyChallenge();

  // Narrator messages (random, not too frequent)
  if(state.totalFlicks%50===0&&Math.random()<0.4){
    showNarrator(narratorLines[Math.floor(Math.random()*narratorLines.length)]);
  }
}

// ── Buy upgrades ──
function buyAuto(i){
  var cost=getAutoCost(i);
  if(state.fish>=cost){
    state.fish-=cost;state.autoUpgrades[i]++;state.fps=calcFPS();
    state.dailyBuys=(state.dailyBuys||0)+1;
    playBuy(i);
    renderUpgrades();updateDisplay();updateNaughtyQueue();checkAchievements();checkDailyChallenge();
    if(Math.random()<0.3)showNarrator(narratorByContext.purchase[Math.floor(Math.random()*narratorByContext.purchase.length)]);
  }
}
function buyClick(i){
  if(state.clickUpgrades[i])return;
  var cost=clickUpgradeDefs[i].cost;
  if(state.fish>=cost){
    state.fish-=cost;state.clickUpgrades[i]=true;
    state.dailyBuys=(state.dailyBuys||0)+1;
    playBuy(i);renderUpgrades();updateDisplay();checkAchievements();checkDailyChallenge();
  }
}
function buyResearch(i){
  if(state.researchUpgrades[i])return;
  var cost=researchDefs[i].cost;
  if(state.fish>=cost){
    state.fish-=cost;state.researchUpgrades[i]=true;state.fps=calcFPS();
    state.dailyBuys=(state.dailyBuys||0)+1;
    playBuy(i+5);renderUpgrades();updateDisplay();checkAchievements();checkDailyChallenge();
  }
}

function showPrestigeConfirm(){
  var nextReq=getNextPrestigeReq();
  if(state.totalFish<nextReq)return;
  if(state.prestigeLevel>=100){showToast('You have achieved The Abuela! No further prestige needed.');return;}
  var existing=document.querySelector('.modal-overlay');
  if(existing)existing.remove();
  var pd=getPrestigeData();var next=pd.next;if(!next)return;
  var ppEarned=next.level;
  var overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  var keepFishPct=getPPUpgradeCount('keepFish');
  var keptFish=keepFishPct>0?Math.floor(state.fish*keepFishPct/100):0;
  overlay.innerHTML='<div class="modal prestige-modal">'
    +'<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>'
    +'<h2>Prestige to Level '+next.level+': '+next.name+'</h2>'
    +'<div class="prestige-unlock">Unlock: '+next.unlock+'</div>'
    +'<div class="stat-row"><span class="stat-label">New Multiplier</span><span class="stat-value">'+next.mult+'x</span></div>'
    +'<div class="stat-row"><span class="stat-label">Spite Points Earned</span><span class="stat-value">+'+ppEarned+' SP</span></div>'
    +(keptFish>0?'<div class="stat-row"><span class="stat-label">Spite Kept ('+keepFishPct+'%)</span><span class="stat-value">'+fmt(keptFish)+'</span></div>':'')
    +'<div style="margin-top:12px">'
    +'<div class="prestige-resets">Resets: Spite, buildings, smack upgrades, research</div>'
    +'<div class="prestige-keeps">Keeps: Prestige level, multiplier, achievements, SP, skins</div>'
    +'</div>'
    +'<div style="font-size:0.75rem;color:var(--dim);font-style:italic;margin-top:12px">"'+getRandomFact()+'"</div>'
    +'<button class="prestige-confirm-btn" onclick="doPrestige();this.closest(\'.modal-overlay\').remove()">Prestige Now!</button>'
    +'<button class="prestige-cancel-btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>'
    +'</div>';
  document.body.appendChild(overlay);
}

function doPrestige(){
  var nextReq=getNextPrestigeReq();
  if(state.totalFish<nextReq||state.prestigeLevel>=100)return;
  var pd=getPrestigeData();var next=pd.next;if(!next)return;
  var timePlayed=Math.floor((Date.now()-state.prestigeSessionStart)/1000);
  state.prestigeHistory.push({level:next.level,fishAtPrestige:state.totalFish,date:Date.now(),timePlayed:timePlayed});
  if(timePlayed<state.fastestPrestige)state.fastestPrestige=timePlayed;
  if(state.totalFish>state.highestFishAtPrestige)state.highestFishAtPrestige=state.totalFish;
  var ppEarned=next.level;
  state.prestigePoints+=ppEarned;
  var keepFishPct=getPPUpgradeCount('keepFish');
  var keptFish=keepFishPct>0?Math.floor(state.fish*keepFishPct/100):0;
  state.prestigeLevel=next.level;
  state.prestigeMultiplier=next.mult;
  state.fish=keptFish;state.totalFish=keptFish;state.thisPrestigeFish=0;
  state.totalFlicks=0;
  state.autoUpgrades=[0,0,0,0,0,0,0,0];
  state.clickUpgrades=[false,false,false,false,false];
  state.researchUpgrades=new Array(15).fill(false);
  state.fps=0;state.frenzyEnd=0;state.elderEnd=0;state.spiteMeter=0;
  state.prestigeSessionStart=Date.now();
  if(getPPUpgradeCount('startFish')>0){state.fish+=100;state.totalFish+=100;}
  if(getPPUpgradeCount('freeShrimp')>0){state.autoUpgrades[0]=1;}
  state.fps=calcFPS();
  showPrestigeAnimation(next);
  playPrestigeSound();
  showToast('Prestige Level '+next.level+': '+next.name+'! '+next.mult+'x multiplier! +'+ppEarned+' SP');
  showNarrator(narratorByContext.prestige[Math.floor(Math.random()*narratorByContext.prestige.length)]);
  updateAutoClicker();
  if(state.prestigeLevel>=3)startFishRain();
  if(state.prestigeLevel>=75)startFireEffect();
  updatePrestigeVisuals();updateNaughtyQueue();renderUpgrades();updateDisplay();checkAchievements();saveGame();
}

function showPrestigeAnimation(next){
  var overlay=document.createElement('div');
  overlay.className='prestige-wave-overlay';
  overlay.innerHTML='<div class="prestige-wave-text">'+next.icon+' '+next.name+' '+next.icon+'<br><span style="font-size:1rem;color:#fff">Level '+next.level+' -- '+next.mult+'x</span><br><span style="font-size:0.8rem;color:var(--dim)">'+next.unlock+'</span></div>';
  document.body.appendChild(overlay);
  setTimeout(function(){overlay.remove();},1500);
}

// ── SP Shop ──
function showPrestigeShop(){
  var existing=document.querySelector('.modal-overlay');
  if(existing)existing.remove();
  var overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};
  var itemsHtml='';
  PP_UPGRADES.forEach(function(upg){

    var maxed=!upg.stacks&&count>=upg.max;

      +(maxed?'<span class="pp-count">MAX</span>':(upg.stacks?'<span class="pp-count">x'+count+'</span>':''))
      +'<span class="pp-cost">'+(maxed?'Done':upg.cost+' SP')+'</span></div>';
  });

function buyPPUpgrade(id){
  var upg=PP_UPGRADES.find(function(u){return u.id===id;});
  if(!upg)return;
  var count=getPPUpgradeCount(id);
  var maxed=!upg.stacks&&count>=upg.max;
  if(upg.stacks&&upg.max&&count>=upg.max)maxed=true;
  if(maxed||state.prestigePoints<upg.cost)return;
  state.prestigePoints-=upg.cost;
  state.ppUpgrades[id]=(state.ppUpgrades[id]||0)+1;
  playBuy(3);showToast('Bought: '+upg.name);
  showPrestigeShop();updateDisplay();checkAchievements();saveGame();
}

// ── Achievements ──
function checkAchievements(){
  achievementDefs.forEach(function(a){
    if(!state.achievements.has(a.id)&&a.check()){
      state.achievements.add(a.id);
      playAchieve();
      if(a.rewardFn)a.rewardFn();
      var msg=(a.hidden?'SECRET: ':'')+a.name+'! '+a.reward;
      showToast(msg,true);
    }
  });
  var total=achievementDefs.length;
  var visible=achievementDefs.filter(function(a){return !a.hidden;}).length;
  var hiddenEarned=achievementDefs.filter(function(a){return a.hidden&&state.achievements.has(a.id);}).length;
  document.getElementById('achieveBadge').textContent=state.achievements.size+'/'+(visible+hiddenEarned)+' trophies';
}

  var t=document.createElement('div');
  t.className='toast'+(isAchieve?' achieve-toast':'');
  t.textContent=msg;
  document.body.appendChild(t);

var goldenTimer=null;
function getGoldenInterval(){
  var base=30000+Math.random()*30000;
  if(state.researchUpgrades[12])base/=2;
  if(state.prestigeLevel>=1)base*=0.8;
  if(state.prestigeLevel>=29)base*=0.5;
  var goldenFasterCount=getPPUpgradeCount('goldenFaster');
  if(goldenFasterCount>0)base*=Math.pow(0.75,goldenFasterCount);
  return base;
}
function scheduleGoldenFish(){
  if(goldenTimer)clearTimeout(goldenTimer);
  goldenTimer=setTimeout(function(){spawnGoldenFish();scheduleGoldenFish();},getGoldenInterval());
}
function spawnGoldenFish(isMega){
  var fish=document.createElement('div');
  fish.className='golden-fish'+(isMega?' mega-golden-fish':'');
  fish.textContent=isMega?'👑':'🩴';
  fish.setAttribute('role','button');
  var fromLeft=Math.random()>0.5;
  var yPos=80+Math.random()*(window.innerHeight-200);
  var dur=state.prestigeLevel>=23?7:5;
  fish.style.setProperty('--start-x',fromLeft?'-60px':(window.innerWidth+60)+'px');
  fish.style.setProperty('--end-x',fromLeft?(window.innerWidth+60)+'px':'-60px');
  fish.style.setProperty('--start-y',yPos+'px');
  fish.style.setProperty('--end-y',(yPos+Math.random()*80-40)+'px');
  fish.style.setProperty('--dir',fromLeft?'1':'-1');
  fish.style.setProperty('--swim-duration',dur+'s');
  fish.style.top='0';fish.style.left='0';
  var sparkleInterval=setInterval(function(){
    if(!document.body.contains(fish)){clearInterval(sparkleInterval);return;}
    var r=fish.getBoundingClientRect();
    var s=document.createElement('div');
    s.className='golden-sparkle';s.textContent='✨';
    s.style.left=(r.left+r.width/2)+'px';s.style.top=(r.top+r.height/2)+'px';
    document.body.appendChild(s);
    setTimeout(function(){s.remove();},500);
  },200);
  function clickGolden(e){
    e.stopPropagation();e.preventDefault();
    clearInterval(sparkleInterval);
    state.goldenClicked++;state.goldenBonuses++;
    state.dailyGolden=(state.dailyGolden||0)+1;
    playGoldenFish();
    var rect=fish.getBoundingClientRect();
    for(var i=0;i<12;i++){
      var b=document.createElement('div');
      b.className='golden-burst';
      b.textContent=['⭐','💫','✨','🩴'][Math.floor(Math.random()*4)];
      var angle=Math.random()*Math.PI*2;
      var dist=60+Math.random()*80;
      b.style.setProperty('--bx',Math.cos(angle)*dist+'px');
      b.style.setProperty('--by',Math.sin(angle)*dist+'px');
      b.style.left=rect.left+rect.width/2+'px';
      b.style.top=rect.top+rect.height/2+'px';
      document.body.appendChild(b);
      setTimeout(function(el){return function(){el.remove();};}(b),800);
    }
    fish.remove();
    var rewardMult=1;
    if(isMega)rewardMult=100;
    else if(state.prestigeLevel>=43)rewardMult=5;
    else if(state.prestigeLevel>=11)rewardMult=2;
    var roll=Math.random();
    if(roll<0.33){
      var frenzyDuration=15000;
      if(state.prestigeLevel>=21)frenzyDuration+=5000;
      state.frenzyEnd=Date.now()+frenzyDuration;
      showToast('RAGE MODE! 10x smacking for '+(frenzyDuration/1000)+'s!');
      showFrenzyBanner('fish-frenzy','RAGE MODE -- 10x smacks!',frenzyDuration);
    }else if(roll<0.66){
      var bonus=Math.max(Math.floor(state.totalFish*0.1*rewardMult),100);
      state.fish+=bonus;state.totalFish+=bonus;state.allTimeFish+=bonus;state.thisPrestigeFish+=bonus;
      showToast('Guilt Trip! +'+fmt(bonus)+' spite!');
    }else{
      var elderDuration=30000;
      if(state.prestigeLevel>=34)elderDuration=60000;
      state.elderEnd=Date.now()+elderDuration;
      state.fps=calcFPS();
      showToast('Double Standards! 2x SPS for '+(elderDuration/1000)+'s!');
      showFrenzyBanner('elder-bonus','DOUBLE STANDARDS -- 2x SPS!',elderDuration);
    }
    updateDisplay();checkAchievements();checkDailyChallenge();
  }
  fish.addEventListener('click',clickGolden);
  fish.addEventListener('touchstart',function(e){e.preventDefault();clickGolden(e);},{passive:false});
  document.body.appendChild(fish);
  setTimeout(function(){clearInterval(sparkleInterval);if(document.body.contains(fish))fish.remove();},dur*1000);
}

function scheduleMegaGolden(){
  if(megaGoldenTimer)clearInterval(megaGoldenTimer);

// ══════════════════════════════════════════
// MINI-GAMES (5 types)
// ══════════════════════════════════════════
var lastMinigame=Date.now();
var minigameActive=false;
var minigameTypes=['target','dodge','speed','memory','boss'];
var lastMinigameType=-1;

function checkMinigame(){
  if(minigameActive||state.totalFlicks<10)return;
  var minInterval=180000;
  if(state.prestigeLevel>=15)minInterval=150000;
  if(state.prestigeLevel>=37)minInterval=120000;
  if(Date.now()-lastMinigame<minInterval)return;
  lastMinigame=Date.now();
  offerMinigame();
}

function offerMinigame(){
  var typeIdx;
  do{typeIdx=Math.floor(Math.random()*minigameTypes.length);}while(typeIdx===lastMinigameType);
  lastMinigameType=typeIdx;
  var names=['Target Practice','Chancla Dodge','Speed Smack','Memory Smack','Boss Battle'];
  var offer=document.createElement('div');
  offer.className='toast';offer.style.cursor='pointer';
  offer.textContent=names[typeIdx]+' available! Click here!';
  offer.style.animation='toastIn 0.3s ease';
  offer.onclick=function(){offer.remove();startMinigame(typeIdx);};
  document.body.appendChild(offer);
  setTimeout(function(){if(document.body.contains(offer))offer.remove();},8000);
}

function startMinigame(type){
  minigameActive=true;
  if(type===0)startTargetPractice();
  else if(type===1)startChanclaDodge();
  else if(type===2)startSpeedSmack();
  else if(type===3)startMemorySmack();
  else if(type===4)startBossBattle();
}

function endMinigame(overlay,bonus){
  state.fish+=bonus;state.totalFish+=bonus;state.allTimeFish+=bonus;state.thisPrestigeFish+=bonus;
  state.dailyMinigames=(state.dailyMinigames||0)+1;
  state.dailyEarned=(state.dailyEarned||0)+bonus;
  setTimeout(function(){overlay.remove();minigameActive=false;updateDisplay();checkDailyChallenge();},2500);
}

function startTargetPractice(){
  var overlay=document.createElement('div');
  overlay.className='minigame-overlay';
  var caught=0,timeLeft=5;
  overlay.innerHTML='<div class="minigame-title">Target Practice!</div><div class="minigame-sub">Tap the peaches before they escape!</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div class="minigame-arena" id="mgArena"></div><div class="minigame-score" id="mgScore">Smacked: 0</div>';
  document.body.appendChild(overlay);
  var arena=overlay.querySelector('#mgArena');
  var scoreEl=overlay.querySelector('#mgScore');
  var timerEl=overlay.querySelector('#mgTimer');
  for(var i=0;i<10;i++){
    (function(idx){
      setTimeout(function(){
        if(!document.body.contains(overlay))return;
        var f=document.createElement('div');f.className='minigame-fish';f.textContent='🍑';
        f.style.top=(20+Math.random()*240)+'px';
        var dur=2+Math.random()*2;f.style.setProperty('--mini-dur',dur+'s');
        function catchFish(e){e.stopPropagation();e.preventDefault();caught++;scoreEl.textContent='Smacked: '+caught;f.textContent='💥';f.style.pointerEvents='none';playFlick(caught*100);setTimeout(function(){f.remove();},200);}
        f.addEventListener('click',catchFish);

        arena.appendChild(f);
        setTimeout(function(){if(document.body.contains(f))f.remove();},dur*1000);
      },idx*450);

  }
  var ti=setInterval(function(){
    timeLeft--;if(timerEl)timerEl.textContent=timeLeft;

      clearInterval(ti);
      var bonus=caught*state.fps*60;
      overlay.innerHTML='<div class="minigame-title">Results!</div><div class="minigame-sub">You smacked '+caught+' peaches!</div><div class="minigame-score">Bonus: +'+fmt(bonus)+' spite</div>';
      endMinigame(overlay,bonus);
    }
  },1000);
}

function startChanclaDodge(){
  var overlay=document.createElement('div');overlay.className='minigame-overlay';
  var survived=0,timeLeft=8,playerX=50,alive=true;
  overlay.innerHTML='<div class="minigame-title">Chancla Dodge!</div><div class="minigame-sub">Tap sides or arrow keys to dodge!</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div class="minigame-arena" id="mgArena" style="cursor:pointer"><div class="dodge-player" id="dodgePlayer" style="left:50%">🧒</div></div><div class="minigame-score" id="mgScore">Dodged: 0</div>';
  document.body.appendChild(overlay);
  var arena=overlay.querySelector('#mgArena');var player=overlay.querySelector('#dodgePlayer');
  var scoreEl=overlay.querySelector('#mgScore');var timerEl=overlay.querySelector('#mgTimer');
  function movePlayer(dir){if(!alive)return;playerX=Math.max(5,Math.min(95,playerX+dir*10));player.style.left=playerX+'%';}
  arena.addEventListener('click',function(e){var r=arena.getBoundingClientRect();movePlayer((e.clientX-r.left)/r.width*100>playerX?1:-1);});
  function keyHandler(e){if(!alive||!document.body.contains(overlay)){document.removeEventListener('keydown',keyHandler);return;}if(e.key==='ArrowLeft')movePlayer(-1);if(e.key==='ArrowRight')movePlayer(1);}
  document.addEventListener('keydown',keyHandler);
  var spawnInterval=setInterval(function(){
    if(!alive||!document.body.contains(overlay)){clearInterval(spawnInterval);return;}
    var chancla=document.createElement('div');chancla.className='dodge-chancla';chancla.textContent='🩴';
    var xPos=Math.random()*90+5;chancla.style.left=xPos+'%';
    var dur=1.5+Math.random();chancla.style.animationDuration=dur+'s';
    arena.appendChild(chancla);
    setTimeout(function(){
      if(!document.body.contains(chancla))return;
      if(Math.abs(xPos-playerX)<10&&alive){
        alive=false;player.textContent='😵';clearInterval(spawnInterval);clearInterval(ti);
        var bonus=survived*state.fps*30;
        overlay.innerHTML='<div class="minigame-title">Hit!</div><div class="minigame-sub">You dodged '+survived+' chanclas!</div><div class="minigame-score">Bonus: +'+fmt(bonus)+' spite</div>';
        endMinigame(overlay,bonus);
      }else{survived++;scoreEl.textContent='Dodged: '+survived;}
      chancla.remove();
    },dur*1000);
  },600);
  var ti=setInterval(function(){
    timeLeft--;if(timerEl)timerEl.textContent=timeLeft;
    if(timeLeft<=0&&alive){
      clearInterval(ti);clearInterval(spawnInterval);alive=false;
      var bonus=survived*state.fps*60;
      overlay.innerHTML='<div class="minigame-title">Survived!</div><div class="minigame-sub">Dodged '+survived+' chanclas! Perfect!</div><div class="minigame-score">Bonus: +'+fmt(bonus)+' spite</div>';
      endMinigame(overlay,bonus);
    }
  },1000);
}

function startSpeedSmack(){
  var overlay=document.createElement('div');overlay.className='minigame-overlay';
  var taps=0,timeLeft=5;
  overlay.innerHTML='<div class="minigame-title">Speed Smack!</div><div class="minigame-sub">Tap as fast as you can!</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div style="font-size:100px;cursor:pointer;user-select:none;margin:20px 0" id="speedTarget">🍑</div><div class="minigame-score" id="mgScore">Smacks: 0</div>';
  document.body.appendChild(overlay);
  var target=overlay.querySelector('#speedTarget');var scoreEl=overlay.querySelector('#mgScore');var timerEl=overlay.querySelector('#mgTimer');

function startMemorySmack(){
  var overlay=document.createElement('div');overlay.className='minigame-overlay';
  var sequence=[],playerSeq=[],round=0,maxRounds=5,showingPattern=false;
  var cells=['🍑','🧒','👦','👧','🧑','👶','👨','👩','🐱'];
  var targets=[];while(targets.length<3){var idx=Math.floor(Math.random()*9);if(targets.indexOf(idx)===-1)targets.push(idx);}
  overlay.innerHTML='<div class="minigame-title">Memory Smack!</div><div class="minigame-sub">Remember which to smack!</div><div class="minigame-score" id="mgScore">Round 1/'+maxRounds+'</div><div class="pattern-grid" id="patternGrid"></div>';
  document.body.appendChild(overlay);
  var grid=overlay.querySelector('#patternGrid');var scoreEl=overlay.querySelector('#mgScore');
  for(var i=0;i<9;i++){
    var cell=document.createElement('div');cell.className='pattern-cell';cell.textContent=cells[i];cell.dataset.idx=i;
    cell.addEventListener('click',(function(ci){return function(){cellClick(ci);};})(i));
    grid.appendChild(cell);
  }
  var allCells=grid.querySelectorAll('.pattern-cell');
  function nextRound(){
    round++;
    if(round>maxRounds){
      var bonus=round*state.fps*60;
      overlay.innerHTML='<div class="minigame-title">Perfect!</div><div class="minigame-sub">All '+maxRounds+' rounds!</div><div class="minigame-score">Bonus: +'+fmt(bonus)+' spite</div>';
      endMinigame(overlay,bonus);return;
    }
    scoreEl.textContent='Round '+round+'/'+maxRounds;
    sequence.push(targets[Math.floor(Math.random()*targets.length)]);
    playerSeq=[];showingPattern=true;showSequence(0);
  }
  function showSequence(si){
    if(si>=sequence.length){showingPattern=false;return;}
    allCells[sequence[si]].classList.add('active');
    setTimeout(function(){allCells[sequence[si]].classList.remove('active');setTimeout(function(){showSequence(si+1);},200);},600);
  }
  function cellClick(ci){
    if(showingPattern)return;
    if(ci===sequence[playerSeq.length]){
      allCells[ci].classList.add('correct');setTimeout(function(){allCells[ci].classList.remove('correct');},300);
      playerSeq.push(ci);playFlick(100);
      if(playerSeq.length===sequence.length)setTimeout(nextRound,500);
    }else{
      allCells[ci].classList.add('wrong');setTimeout(function(){allCells[ci].classList.remove('wrong');},300);
      var bonus=round*state.fps*30;
      overlay.innerHTML='<div class="minigame-title">Wrong!</div><div class="minigame-sub">Made it to round '+round+'!</div><div class="minigame-score">Bonus: +'+fmt(bonus)+' spite</div>';
      endMinigame(overlay,bonus);
    }
  }
  nextRound();
}

function startBossBattle(){

      endMinigame(overlay,bonus);
    }
  }
  target.addEventListener('click',hitBoss);
  target.addEventListener('touchstart',function(e){e.preventDefault();hitBoss(e);},{passive:false});

      endMinigame(overlay,bonus);

function updateDisplay(){
  state.fps=calcFPS();
  document.getElementById('fishCount').textContent=fmt(state.fish)+' spite';
  document.getElementById('fpsDisplay').textContent=fmt(state.fps)+' spite/sec';
  document.getElementById('clickPower').textContent='+'+fmt(getClickPower())+' per smack';

  var mults=[];
  if(state.prestigeMultiplier>1)mults.push(fmt(state.prestigeMultiplier)+'x prestige');
  var ev=getActiveEvent();
  if(ev)mults.push(ev.mult+'x '+ev.name);
  if(Date.now()<state.frenzyEnd)mults.push('10x rage!');
  if(Date.now()<state.elderEnd)mults.push('2x double standards');
  if(state.spiteEventEnd&&Date.now()<state.spiteEventEnd)mults.push('5x SPITE!');
  if(state.achieveMultiplier>1)mults.push(state.achieveMultiplier.toFixed(2)+'x trophies');
  document.getElementById('multiplierDisplay').textContent=mults.length?mults.join(' | '):'';

  var nextReq=getNextPrestigeReq();
  var pb=document.getElementById('prestigeBtn');
  if(state.prestigeLevel>=100){
    pb.style.display='block';pb.textContent='THE ABUELA';
    pb.onclick=function(){showToast('You have ascended. There is nothing beyond The Abuela.');};
  }else{
    pb.style.display=state.totalFish>=nextReq*0.5?'block':'none';
    var pd=getPrestigeData();var nextName=pd.next?pd.next.name:'???';
    pb.textContent='Prestige -> '+nextName;
    pb.style.opacity=state.totalFish>=nextReq?'1':'0.6';
    pb.onclick=function(){showPrestigeConfirm();};
  }

  var progressBar=document.getElementById('prestigeProgressBar');
  var progressLabel=document.getElementById('prestigeProgressLabel');
  if(state.prestigeLevel>=100){
    progressBar.style.width='100%';progressLabel.textContent='THE ABUELA MODE';
  }else{
    var progress=Math.min(state.totalFish/nextReq,1)*100;
    progressBar.style.width=progress+'%';
    progressLabel.textContent=progress>5?Math.floor(progress)+'% to next prestige':'';
  }

  document.getElementById('prestigeBadge').textContent=state.prestigeLevel>0?fmt(state.prestigeMultiplier)+'x':'';
  document.getElementById('ppShopBtn').style.display=state.prestigeLevel>0?'inline-block':'none';

  var eBadge=document.getElementById('eventBadge');
  if(ev){eBadge.textContent=ev.emoji+' '+ev.desc;}else{eBadge.textContent='';}

  document.querySelectorAll('.auto-upg').forEach(function(btn,i){
    var cost=getAutoCost(i);
    btn.classList.toggle('affordable',state.fish>=cost);btn.disabled=state.fish<cost;
    var costEl=btn.querySelector('.upg-cost');var countEl=btn.querySelector('.upg-count');
    if(costEl)costEl.textContent=fmt(cost)+' spite';
    if(countEl)countEl.textContent=state.autoUpgrades[i];
  });

    if(state.clickUpgrades[i]){btn.classList.add('purchased');btn.classList.remove('affordable');btn.disabled=true;var ce=btn.querySelector('.upg-cost');if(ce)ce.textContent='Owned';}
    else{btn.classList.toggle('affordable',state.fish>=clickUpgradeDefs[i].cost);btn.disabled=state.fish<clickUpgradeDefs[i].cost;}
  });
  document.querySelectorAll('.research-upg').forEach(function(btn,i){
    if(state.researchUpgrades[i]){btn.classList.add('purchased');btn.classList.remove('affordable');btn.disabled=true;var ce=btn.querySelector('.upg-cost');if(ce)ce.textContent='Owned';}
    else{btn.classList.toggle('affordable',state.fish>=researchDefs[i].cost);btn.disabled=state.fish<researchDefs[i].cost;}
  });

  updateFlounderSize();updateBackgroundDepth();updateSpiteMeter();
  if(typeof updateMobileStatsStrip==='function')updateMobileStatsStrip();
}

function getBuildingIcon(def,count){
  if(count>=100)return '💎'+def.icon;
  if(count>=50)return '🌟'+def.icon;
  if(count>=25)return '⭐'+def.icon;
  if(count>=10)return '✨'+def.icon;
  return def.icon;
}
function getMilestoneText(count){

  if(count>=25)return ' [RARE]';
  if(count>=10)return ' [UPGRADED]';
  return '';
}

// ══════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════
var lastTick=Date.now();
var tickCount=0;
function gameTick(){
  var now=Date.now();
  var dt=(now-lastTick)/1000;
  lastTick=now;
  state.fps=calcFPS();

  // Spite event multiplier for SPS
  var spsMult=1;
  if(state.spiteEventEnd&&now<state.spiteEventEnd)spsMult=5;

  if(state.fps>0){
    var earned=state.fps*dt*spsMult;
    state.fish+=earned;state.totalFish+=earned;state.allTimeFish+=earned;state.thisPrestigeFish+=earned;
    state.dailyEarned=(state.dailyEarned||0)+earned;
  }

  // Spite meter slow decay
  if(state.spiteMeter>0&&now-state.lastClickTime>2000){
    state.spiteMeter=Math.max(0,state.spiteMeter-dt*2);
  }

  // Combo decay
  decayCombo();

  // Idle tracking
  trackIdle();

  tickCount++;
  if(tickCount%30===0){
    updateDisplay();checkAchievements();checkDailyChallenge();
    if(state.autoPrestige&&state.prestigeLevel<100){
      if(state.totalFish>=getNextPrestigeReq())doPrestige();
    }
    // Idle narrator
    if(state.idleTime>=30&&state.idleTime<32&&state.totalFlicks>5){
      showNarrator(narratorByContext.idle[Math.floor(Math.random()*narratorByContext.idle.length)]);
    }
  }else if(tickCount%5===0){
    document.getElementById('fishCount').textContent=fmt(state.fish)+' spite';
    document.getElementById('fpsDisplay').textContent=fmt(state.fps)+' spite/sec';
  }
  requestAnimationFrame(gameTick);
}

  var data={
    fish:state.fish,totalFish:state.totalFish,totalFlicks:state.totalFlicks,
    allTimeFish:state.allTimeFish,thisPrestigeFish:state.thisPrestigeFish,
    clickPower:state.clickPower,autoUpgrades:state.autoUpgrades,
    clickUpgrades:state.clickUpgrades,researchUpgrades:state.researchUpgrades,
    prestigeLevel:state.prestigeLevel,prestigeMultiplier:state.prestigeMultiplier,
    achievements:[].concat(Array.from(state.achievements)),lastSave:Date.now(),
    goldenClicked:state.goldenClicked,goldenBonuses:state.goldenBonuses,
    totalTimePlayed:state.totalTimePlayed+Math.floor((Date.now()-state.sessionStart)/1000),
    offlineEarnings:state.offlineEarnings,
    prestigePoints:state.prestigePoints,ppUpgrades:state.ppUpgrades,
    prestigeHistory:state.prestigeHistory,
    fastestPrestige:state.fastestPrestige,
    highestFishAtPrestige:state.highestFishAtPrestige,
    autoPrestige:state.autoPrestige,
    activeSkin:state.activeSkin,
    achieveMultiplier:state.achieveMultiplier,
    highestCombo:state.highestCombo,
    totalSpiteEvents:state.totalSpiteEvents,
    dailyChallengeDay:state.dailyChallengeDay,
    dailyClicks:state.dailyClicks,dailyEarned:state.dailyEarned,
    dailyBuys:state.dailyBuys,dailyGolden:state.dailyGolden,
    dailyMinigames:state.dailyMinigames,
    dailyChallengeComplete:state.dailyChallengeComplete
  };
  try{localStorage.setItem('flipflopper',JSON.stringify(data));}catch(e){}
}
function loadGame(){
  try{
    var raw=localStorage.getItem('flipflopper');
    if(!raw)return;
    var d=JSON.parse(raw);
    state.fish=d.fish||0;
    state.totalFish=d.totalFish||0;
    state.allTimeFish=d.allTimeFish||d.totalFish||0;
    state.thisPrestigeFish=d.thisPrestigeFish||0;
    state.totalFlicks=d.totalFlicks||0;
    state.autoUpgrades=d.autoUpgrades||[0,0,0,0,0,0,0,0];
    state.clickUpgrades=d.clickUpgrades||[false,false,false,false,false];
    state.researchUpgrades=d.researchUpgrades||new Array(15).fill(false);
    state.prestigeLevel=d.prestigeLevel||0;
    state.prestigeMultiplier=d.prestigeMultiplier||1;
    state.achievements=new Set(d.achievements||[]);
    state.goldenClicked=d.goldenClicked||0;
    state.goldenBonuses=d.goldenBonuses||0;
    state.totalTimePlayed=d.totalTimePlayed||0;
    state.offlineEarnings=d.offlineEarnings||0;
    state.prestigePoints=d.prestigePoints||0;
    state.ppUpgrades=d.ppUpgrades||{};
    state.prestigeHistory=d.prestigeHistory||[];
    state.fastestPrestige=d.fastestPrestige||Infinity;
    state.highestFishAtPrestige=d.highestFishAtPrestige||0;
    state.autoPrestige=d.autoPrestige||false;
    state.activeSkin=d.activeSkin||'classic';
    state.achieveMultiplier=d.achieveMultiplier||1;
    state.highestCombo=d.highestCombo||0;
    state.totalSpiteEvents=d.totalSpiteEvents||0;
    state.dailyChallengeDay=d.dailyChallengeDay||'';
    state.dailyClicks=d.dailyClicks||0;
    state.dailyEarned=d.dailyEarned||0;
    state.dailyBuys=d.dailyBuys||0;
    state.dailyGolden=d.dailyGolden||0;
    state.dailyMinigames=d.dailyMinigames||0;
    state.dailyChallengeComplete=d.dailyChallengeComplete||false;

    state.fps=calcFPS();
    if(d.lastSave&&state.fps>0){
      var elapsed=(Date.now()-d.lastSave)/1000;
      var secs=Math.min(elapsed,3600*8);
      if(secs>5){
        var offlineMult=1;
        if(getPPUpgradeCount('startFishPercent')>0)offlineMult+=0.1*getPPUpgradeCount('startFishPercent');
        var earned=state.fps*secs*offlineMult;
        state.fish+=earned;state.totalFish+=earned;state.allTimeFish+=earned;state.thisPrestigeFish+=earned;
        state.offlineEarnings+=earned;
        showToast('Welcome back! +'+fmt(earned)+' spite ('+Math.floor(secs/60)+'m offline)');
      }
    }
  }catch(e){}
}
setInterval(saveGame,10000);

// ── Background particles ──
function createBubbles(){
  var bg=document.getElementById('bubbleBg');
  for(var i=0;i<25;i++){
    var b=document.createElement('div');b.className='bubble';
    var size=6+Math.random()*40;
    b.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;animation-duration:'+(6+Math.random()*14)+'s;animation-delay:'+Math.random()*10+'s';
    bg.appendChild(b);
  }
}

// ── Ticker ──
function createTicker(){
  var track=document.getElementById('tickerTrack');
  var allMessages=tickerMessages.slice();
  for(var fi=0;fi<FUN_FACTS.length;fi++)allMessages.push('Fun Fact: '+FUN_FACTS[fi]);
  for(var si=allMessages.length-1;si>0;si--){var j=Math.floor(Math.random()*(si+1));var tmp=allMessages[si];allMessages[si]=allMessages[j];allMessages[j]=tmp;}
  var subset=allMessages.slice(0,40);
  var msgs=subset.concat(subset);
  track.innerHTML='';
  msgs.forEach(function(m){var span=document.createElement('span');span.className='ticker-item';span.textContent=m;track.appendChild(span);});
  if(state.prestigeLevel>=4)track.style.animationDuration='25s';
}

// ── Narrator (speech synthesis) ──
var lastNarration=0;
function tryNarrate(){
  if(!window.speechSynthesis)return;
  var now=Date.now();
  if(now-lastNarration<25000||state.totalFlicks<3)return;
  lastNarration=now;
  var line=narratorLines[Math.floor(Math.random()*narratorLines.length)];
  speechSynthesis.cancel();
  setTimeout(function(){
    var u=new SpeechSynthesisUtterance(line);
    u.rate=1.1;u.pitch=1.25;u.volume=0.5;
    var voices=speechSynthesis.getVoices();
    var femaleVoice=voices.find(function(v){return /female/i.test(v.name);})||voices.find(function(v){return /woman|girl|samantha|karen|moira|fiona|victoria|zira/i.test(v.name);})||voices.find(function(v){return /en.US/i.test(v.lang)&&!/male/i.test(v.name);})||voices.find(function(v){return /en/i.test(v.lang);});
    if(femaleVoice)u.voice=femaleVoice;
    speechSynthesis.speak(u);
    showNarrator(line);
  },60);
}
setInterval(tryNarrate,25000);

var isMobile=function(){return window.innerWidth<=768;};

function openMobileSheet(){
  var panel=document.getElementById('upgradePanel');
  var overlay=document.getElementById('mobileSheetOverlay');
  var shopBtn=document.getElementById('mobileShopBtn');
  panel.classList.add('sheet-open');
  overlay.classList.add('active');
  if(shopBtn)shopBtn.classList.add('hidden');
  document.body.style.overflow='hidden';
}

function closeMobileSheet(){
  var panel=document.getElementById('upgradePanel');
  var overlay=document.getElementById('mobileSheetOverlay');
  var shopBtn=document.getElementById('mobileShopBtn');
  panel.classList.remove('sheet-open');
  overlay.classList.remove('active');
  if(shopBtn)shopBtn.classList.remove('hidden');
  document.body.style.overflow='';
}

function openMobileMenu(){
  // On mobile the hamburger opens the sheet (which has all tabs including prestige, stats, etc.)
  openMobileSheet();
}

// Drag-to-dismiss on the sheet handle
(function(){
  var panel=document.getElementById('upgradePanel');
  var handle=document.getElementById('sheetHandle');
  if(!handle||!panel)return;
  var startY=0,currentY=0,dragging=false;
  handle.addEventListener('touchstart',function(e){
    dragging=true;startY=e.touches[0].clientY;currentY=startY;
    panel.style.transition='none';
  },{passive:true});
  handle.addEventListener('touchmove',function(e){
    if(!dragging)return;
    currentY=e.touches[0].clientY;
    var diff=currentY-startY;
    if(diff>0){panel.style.transform='translateY('+diff+'px)';}
  },{passive:true});
  handle.addEventListener('touchend',function(){
    if(!dragging)return;dragging=false;
    panel.style.transition='';
    var diff=currentY-startY;
    if(diff>80){closeMobileSheet();}
    else{panel.style.transform='';if(panel.classList.contains('sheet-open'))panel.style.transform='translateY(0)';}
  });
})();

  var el1=document.getElementById('mssClickPower');

}
