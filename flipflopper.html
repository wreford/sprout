<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Flip Flopper 🩴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f10;--bg2:#1a1a1c;--bg3:#141416;
  --panel:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;
  --dim:#6e6e73;--accent:#ff6b35;--green:#4ade80;
  --gold:#f7c948;--blue:#38bdf8;--red:#ef4444;
  --purple:#a78bfa;--cyan:#22d3ee;
  --spite-red:#e05050;--spite-glow:rgba(224,80,80,0.5)
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(224,80,80,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(255,107,53,0.04) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 80%, rgba(224,80,80,0.05) 0%, transparent 50%);
  animation:bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(15deg)}}

/* Layout: single scrollable column */
.page{width:100%;max-width:640px;margin:0 auto;padding:0 12px 60px;position:relative;z-index:1}

/* Home link */
.home-link{display:inline-block;padding:10px 0;font-size:0.8rem;color:var(--dim);text-decoration:none;font-family:ui-monospace,monospace;transition:color 0.2s}
.home-link:hover{color:var(--green)}

/* Top section */
.top-section{text-align:center;padding:10px 0 0}
.title{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#e05050,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.points-display{font-size:clamp(2rem,7vw,3.2rem);font-weight:900;color:var(--spite-red);text-shadow:0 0 20px var(--spite-glow);margin:8px 0 2px;font-family:ui-monospace,"Cascadia Mono",monospace;transition:all 0.15s}
.points-display.bump{animation:countBump 0.15s ease}
@keyframes countBump{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.per-sec{font-size:0.95rem;color:var(--dim)}
.click-power-display{font-size:0.8rem;color:var(--dim);margin-top:2px}
.multiplier-line{font-size:0.75rem;color:var(--gold);margin-top:2px;min-height:18px}

/* Chancla area */
.chancla-area{display:flex;flex-direction:column;align-items:center;padding:16px 0;position:relative}
.chancla-wrap{position:relative;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.chancla{font-size:100px;display:block;transition:transform 0.1s;filter:drop-shadow(0 0 30px var(--spite-glow))}
.chancla:active{transform:scale(0.9)}
.chancla.wiggle{animation:chanclaSwing 0.3s cubic-bezier(0.36,0.07,0.19,0.97)}
@keyframes chanclaSwing{
  0%{transform:rotate(0) scale(1)}
  15%{transform:rotate(50deg) scale(1.2)}
  30%{transform:rotate(-25deg) scale(1.05)}
  50%{transform:rotate(15deg) scale(1.02)}
  100%{transform:rotate(0) scale(1)}
}

/* Combo display */
.combo-display{font-size:1rem;font-weight:900;color:var(--accent);margin-top:6px;min-height:24px;text-align:center;transition:all 0.15s}
.combo-display.hot{color:var(--red);text-shadow:0 0 10px rgba(239,68,68,0.5)}
.combo-display.fire{color:var(--gold);text-shadow:0 0 15px rgba(247,201,72,0.6);animation:comboPulse 0.3s ease infinite alternate}
@keyframes comboPulse{from{transform:scale(1)}to{transform:scale(1.05)}}

/* Narrator */
.narrator-bubble{font-size:0.82rem;color:var(--accent);text-align:center;font-style:italic;margin-top:8px;padding:6px 14px;border-radius:10px;background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.15);min-height:36px;opacity:0;transition:opacity 0.3s}
.narrator-bubble.visible{opacity:1}

/* Progress bars */
.bar-section{margin-top:12px}
.bar-wrap{margin-bottom:8px}
.bar-label{font-size:0.7rem;color:var(--dim);margin-bottom:3px;display:flex;justify-content:space-between}
.bar-track{width:100%;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.3s}
.bar-fill.prestige-fill{background:linear-gradient(90deg,var(--gold),#ff8c00)}
.bar-fill.spite-fill{background:linear-gradient(90deg,var(--red),var(--accent));box-shadow:0 0 8px rgba(239,68,68,0.4)}

/* Section headers */
.section-header{font-size:0.75rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin:24px 0 10px;padding:8px 0;border-top:1px solid var(--border);text-align:center}
.section-header:first-of-type{border-top:none}
.section-subheader{font-size:0.68rem;font-weight:700;color:var(--dim);margin:14px 0 6px;padding-left:4px;letter-spacing:0.1em;text-transform:uppercase}

/* Upgrade cards */
.upgrade-card{width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.15s;text-align:left}
.upgrade-card:hover:not(.locked):not(.maxed){border-color:var(--accent);transform:translateX(2px)}
.upgrade-card.affordable{border-color:var(--green)}
.upgrade-card.locked{opacity:0.35;cursor:not-allowed}
.upgrade-card.maxed{opacity:0.5;border-color:var(--gold);cursor:default}
.uc-icon{font-size:1.5rem;flex-shrink:0}
.uc-info{flex:1;min-width:0}
.uc-name{font-size:0.85rem;font-weight:700}
.uc-desc{font-size:0.65rem;color:var(--dim);margin-top:1px}
.uc-cost{font-size:0.72rem;font-weight:700;color:var(--green);margin-top:2px}
.uc-cost.pp-cost{color:var(--gold)}
.uc-cost.sp-cost{color:var(--purple)}
.uc-cost.up-cost{color:var(--cyan)}
.uc-count{font-size:0.9rem;font-weight:800;color:var(--accent);flex-shrink:0;min-width:24px;text-align:right}

/* Prestige buttons */
.prestige-card{background:var(--bg2);border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;text-align:center;transition:all 0.3s}
.prestige-card.ready{border-color:var(--gold);box-shadow:0 0 20px rgba(247,201,72,0.2);animation:glowPulse 2s ease-in-out infinite}
.prestige-card.super-ready{border-color:var(--purple);box-shadow:0 0 20px rgba(167,139,250,0.3)}
.prestige-card.ultra-ready{border-color:var(--cyan);box-shadow:0 0 20px rgba(34,211,238,0.3)}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(247,201,72,0.15)}50%{box-shadow:0 0 25px rgba(247,201,72,0.4)}}
.prestige-title{font-size:1.1rem;font-weight:900;margin-bottom:4px}
.prestige-info{font-size:0.75rem;color:var(--dim);margin-bottom:8px}
.prestige-btn{display:inline-block;padding:10px 28px;border-radius:10px;font-weight:800;font-size:0.9rem;cursor:pointer;border:none;transition:transform 0.15s}
.prestige-btn:hover:not(:disabled){transform:scale(1.05)}
.prestige-btn:disabled{opacity:0.3;cursor:not-allowed}
.prestige-btn.p1{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000}
.prestige-btn.p2{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
.prestige-btn.p3{background:linear-gradient(135deg,var(--cyan),#06b6d4);color:#000}
.prestige-stats{font-size:0.7rem;color:var(--dim);margin-top:6px}

/* Achievement grid */
.achieve-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.achieve-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:0.72rem;transition:all 0.15s}
.achieve-card.earned{border-color:var(--gold);background:rgba(247,201,72,0.06)}
.achieve-card.hidden-ach:not(.earned){border-style:dashed;opacity:0.4}
.ach-icon{font-size:1.1rem}
.ach-name{font-weight:700;margin-top:2px}
.ach-desc{color:var(--dim);font-size:0.62rem;margin-top:1px}
.ach-reward{color:var(--green);font-size:0.58rem;margin-top:2px}

/* Stats */
.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.8rem}
.stat-label{color:var(--dim)}.stat-value{font-weight:700}

/* Click text popups */
.click-text{position:fixed;pointer-events:none;font-weight:800;font-size:1.2rem;color:var(--spite-red);animation:floatUp 0.8s ease-out forwards;z-index:999}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(0.8)}}
.smack-word{position:fixed;pointer-events:none;font-weight:900;font-size:1.4rem;color:#ff4040;text-shadow:0 0 10px rgba(255,64,64,0.5);animation:smackPop 0.6s ease-out forwards;z-index:999}
@keyframes smackPop{0%{opacity:1;transform:scale(0.5) rotate(-10deg)}30%{transform:scale(1.3) rotate(5deg)}100%{opacity:0;transform:scale(0.8) translateY(-40px)}}

/* Particles */
.particle{position:fixed;pointer-events:none;border-radius:50%;animation:splash 0.6s ease-out forwards;z-index:998}
@keyframes splash{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}}

/* Screen shake */
.chancla-area.shaking{animation:screenShake 0.15s ease}
@keyframes screenShake{0%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,1px)}100%{transform:translate(0,0)}}
.chancla-area.big-shake{animation:bigShake 0.25s ease}
@keyframes bigShake{0%{transform:translate(0,0)}20%{transform:translate(-6px,4px)}40%{transform:translate(6px,-4px)}60%{transform:translate(-4px,2px)}80%{transform:translate(4px,-2px)}100%{transform:translate(0,0)}}

/* Prestige wave overlay */
.prestige-wave{position:fixed;inset:0;z-index:9999;pointer-events:none;display:flex;align-items:center;justify-content:center;animation:prestigeFlash 1.5s ease-in-out forwards}
.prestige-wave.p1{background:linear-gradient(180deg,rgba(247,201,72,0.9),rgba(15,15,16,0.95))}
.prestige-wave.p2{background:linear-gradient(180deg,rgba(167,139,250,0.9),rgba(15,15,16,0.95))}
.prestige-wave.p3{background:linear-gradient(180deg,rgba(34,211,238,0.9),rgba(15,15,16,0.95))}
@keyframes prestigeFlash{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}
.prestige-wave-text{font-size:2rem;font-weight:900;color:#fff;text-align:center;text-shadow:0 0 40px rgba(255,255,255,0.6)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 20px;border-radius:10px;font-weight:700;font-size:0.82rem;z-index:10000;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;box-shadow:0 4px 20px rgba(247,201,72,0.4);white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px) scale(0.9)}}

/* Frenzy banner */
.frenzy-banner{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:8px 24px;border-radius:10px;font-weight:900;font-size:0.9rem;z-index:9998;animation:frenzyPulse 0.5s ease-in-out infinite alternate;pointer-events:none;white-space:nowrap;background:linear-gradient(135deg,var(--red),#ff4040);color:#fff}
@keyframes frenzyPulse{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(1.05)}}

/* Cooldown button style */
.on-cooldown{position:relative;overflow:hidden}
.on-cooldown::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.5);pointer-events:none}

/* Golden chancla */
.golden-chancla{position:fixed;z-index:50;cursor:pointer;font-size:48px;filter:drop-shadow(0 0 20px rgba(247,201,72,0.8));animation:goldenSwim var(--swim-dur,5s) linear forwards;pointer-events:auto;user-select:none}
@keyframes goldenSwim{0%{transform:translateX(var(--sx)) translateY(var(--sy))}100%{transform:translateX(var(--ex)) translateY(var(--ey))}}

/* Mobile */
@media(max-width:500px){
  .chancla{font-size:90px}
  .achieve-grid{grid-template-columns:1fr}
  .page{padding:0 8px 60px}
}
</style>
</head>

// ── Number formatting ──
function fmt(n){
  if(n<0)return '-'+fmt(-n);
  if(n<1000)return n%1===0?n.toString():n.toFixed(1);
  var suffixes=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','UDc','DDc','TDc','QaDc','QiDc','SxDc','SpDc','OcDc','NoDc','Vg'];
  var tier=Math.floor(Math.log10(Math.abs(n))/3);
  if(tier>=suffixes.length)tier=suffixes.length-1;
  if(tier<=0)return Math.floor(n).toString();
  var scale=Math.pow(10,tier*3);
  var scaled=n/scale;
  return(scaled<10?scaled.toFixed(2):scaled<100?scaled.toFixed(1):Math.floor(scaled))+suffixes[tier];
}

// ── Audio ──
var audioCtx=null;
function playSound(freq,dur,vol){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.frequency.value=freq;osc.type='sine';
    gain.gain.setValueAtTime(Math.min(vol||0.02,0.02),audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(dur||0.1));
    osc.start();osc.stop(audioCtx.currentTime+(dur||0.1));
  }catch(e){}
}
function clickSound(){playSound(800+Math.random()*400,0.08,0.015);}
function purchaseSound(){playSound(523,0.1,0.02);setTimeout(function(){playSound(659,0.1,0.02);},80);}

function narrate(category){
  var lines=NARRATOR[category];
  if(!lines||!lines.length)return;
  var line=lines[Math.floor(Math.random()*lines.length)];
  var el=document.getElementById('narrator');
  el.textContent='"'+line+'"';

function checkClickSpeed(count,seconds){
  if(!S.clickTimestamps||S.clickTimestamps.length<count)return false;
  var recent=S.clickTimestamps.slice(-count);
  return(recent[recent.length-1]-recent[0])<seconds*1000;
}

// GAME LOGIC

function getClickUpgradeCost(idx){
  return Math.floor(CLICK_UPGRADES[idx].baseCost*Math.pow(CLICK_UPGRADES[idx].scaling,S.clickUpgrades[idx]));
}
function getBuildingCost(idx){
  var base=BUILDINGS[idx].baseCost*Math.pow(BUILDINGS[idx].scaling,S.buildings[idx]);
  var discount=1;
  var ppDisc=getUpgradeCount(S.ppUpgrades,'buildingDiscount');
  discount*=Math.pow(0.95,ppDisc);
  var spDisc=getUpgradeCount(S.spUpgrades,'buildingMastery');
  discount*=Math.pow(0.85,spDisc);
  return Math.floor(base*discount);
}

function getUpgradeCount(obj,id){return obj[id]||0;}

function getClickPower(){
  var power=1;
  // Stronger Slap stacks
  power+=S.clickUpgrades[0];
  // PP starting power
  power+=getUpgradeCount(S.ppUpgrades,'startingPower')*2;
  // Click Doubler powerup
  if(S.powerups.clickDoubler)power*=2;
  // SP Mega Multiplier
  if(getUpgradeCount(S.spUpgrades,'megaMultiplier'))power*=3;
  // Ultra Infinity Slap
  if(getUpgradeCount(S.upUpgrades,'infinitySlap'))power+=Math.floor(S.totalClicks/1000);
  // Prestige bonus
  power*=getPrestigeMultiplier();
  // Achievement multiplier
  power*=S.achieveMultiplier;
  // Transcendence
  if(S.transcendenceActive)power*=2;
  return Math.floor(power);
}

function getPrestigeMultiplier(){
  var mult=1;
  // Layer 1: +25% per prestige level
  mult*=(1+S.prestigeLevel*0.25);
  // Layer 2: x2 per super prestige
  mult*=Math.pow(2,S.superPrestigeLevel);
  // Layer 3: x5 per ultra prestige
  mult*=Math.pow(5,S.ultraPrestigeLevel);
  // PP Production Boost
  mult*=(1+getUpgradeCount(S.ppUpgrades,'productionBoost')*0.1);
  // SP Time Warp
  mult*=Math.pow(2,getUpgradeCount(S.spUpgrades,'timeWarp'));
  return mult;
}

function getSPS(){
  var sps=0;
  for(var i=0;i<BUILDINGS.length;i++){
    sps+=S.buildings[i]*BUILDINGS[i].baseProd;
  }
  // Apply multipliers
  sps*=getPrestigeMultiplier();
  sps*=S.achieveMultiplier;
  // Spite Amplifier powerup
  if(S.powerups.spiteMultiplier)sps*=1.5;
  // Building Synergy powerup
  if(S.powerups.buildingSynergy){
    var types=S.buildings.filter(function(c){return c>0;}).length;
    sps*=(1+types*0.05);
  }
  // Transcendence
  if(S.transcendenceActive)sps*=2;
  // Speed boost (first 30s after prestige)
  if(getUpgradeCount(S.ppUpgrades,'speedBoost')&&(Date.now()-S.prestigeStartTime)<30000)sps*=1.5;
  // Time dilation
  if(getUpgradeCount(S.upUpgrades,'timeDilation'))sps*=1.5;
  // Auto-clicker contribution
  var autoClicks=0;
  if(S.powerups.autoClicker)autoClicks+=1;
  if(S.powerups.autoClicker2)autoClicks+=4;
  sps+=autoClicks*getClickPower();
  return sps;
}

function getPrestigeRequirement(){
  return Math.floor(10000*Math.pow(3,S.prestigeLevel));
}

function canPrestige(){
  return S.points>=getPrestigeRequirement();
}

function canSuperPrestige(){
  return S.prestigeLevel>=10;
}

function canUltraPrestige(){
  return S.superPrestigeLevel>=5;
}

// ── CLICK HANDLER ──
function doClick(e){
  var now=Date.now();
  S.totalClicks++;
  S.lastClickTime=now;
  S.idleTime=0;
  S.clickTimestamps.push(now);
  if(S.clickTimestamps.length>60)S.clickTimestamps=S.clickTimestamps.slice(-60);

  var power=getClickPower();
  var multiplier=1;

  // Combo system
  S.combo++;
  if(S.combo>S.highestCombo)S.highestCombo=S.combo;
  clearTimeout(doClick._comboTimer);
  var comboDelay=2000;
  if(S.powerups.comboExtender)comboDelay=3000;
  if(S.powerups.infiniteCombo)comboDelay=Math.max(comboDelay,1500);
  var superComboLvl=getUpgradeCount(S.spUpgrades,'superCombo');
  doClick._comboTimer=setTimeout(function(){S.combo=0;},comboDelay);

  // Combo multiplier
  var comboMult=1+Math.floor(S.combo/5)*0.1;
  var maxCombo=5+getUpgradeCount(S.ppUpgrades,'comboMaster')*0.5;
  if(!getUpgradeCount(S.upUpgrades,'ultraCombo'))comboMult=Math.min(comboMult,maxCombo);
  if(superComboLvl)comboMult*=(1+superComboLvl*0.5);
  multiplier*=comboMult;

  // Double Tap chance
  if(S.clickUpgrades[1]>0&&Math.random()<0.1*S.clickUpgrades[1])multiplier*=2;
  // Triple Threat chance
  if(S.clickUpgrades[2]>0&&Math.random()<0.05*S.clickUpgrades[2])multiplier*=3;
  // Critical Chancla
  var critMult=S.powerups.critMaster?25:10;
  if(S.clickUpgrades[3]>0&&Math.random()<0.02*S.clickUpgrades[3]){multiplier*=critMult;}
  // Lucky Chancla powerup
  if(S.powerups.luckyChancla&&Math.random()<0.05)multiplier*=5;
  // Golden Touch (SP)
  if(getUpgradeCount(S.spUpgrades,'goldenTouch')&&Math.random()<0.1)multiplier*=100;
  // Mega Click (every 10th)
  if(S.powerups.megaClick&&S.totalClicks%10===0)multiplier*=10;

  // Spite explosion bonus
  if(S.spiteExplosionEnd&&Date.now()<S.spiteExplosionEnd){
    var spiteMult=getUpgradeCount(S.spUpgrades,'spiteMastery')?10:5;
    multiplier*=spiteMult;
  }

  var total=Math.floor(power*multiplier);
  addPoints(total);

  // Spite meter
  var spiteGain=0.3;
  if(S.powerups.rageAccumulator)spiteGain*=2;
  var ppSpite=getUpgradeCount(S.ppUpgrades,'spiteSurge');
  spiteGain*=Math.pow(2,ppSpite);
  S.spiteMeter=Math.min(100,S.spiteMeter+spiteGain);
  if(S.spiteMeter>=100){
    triggerSpiteExplosion();
  }

  // Visual effects
  clickSound();
  showClickText(e,total,multiplier>2);
  if(multiplier>=5)showSmackWord(e);
  spawnParticles(e);

  var ch=document.getElementById('chancla');
  ch.classList.remove('wiggle');
  void ch.offsetWidth;
  ch.classList.add('wiggle');

  var area=document.getElementById('chanclaArea');
  if(multiplier>=10){
    area.classList.remove('big-shake');void area.offsetWidth;area.classList.add('big-shake');
  }else if(multiplier>=3){
    area.classList.remove('shaking');void area.offsetWidth;area.classList.add('shaking');
  }

  var pd=document.getElementById('points');
  pd.classList.remove('bump');void pd.offsetWidth;pd.classList.add('bump');

  // Narrator
  if(S.combo>=10&&S.combo%10===0)narrate('combo');
  else if(Math.random()<0.03)narrate('click');
}

function doPrestige(){
  if(!canPrestige())return;
  var elapsed=(Date.now()-S.prestigeStartTime)/1000;
  if(elapsed<S.fastestPrestige)S.fastestPrestige=elapsed;

  S.prestigeLevel++;
  S.prestigePoints++;
  S.points=0;S.totalPoints=0;
  S.buildings=[0,0,0,0,0,0,0];
  S.clickUpgrades=[0,0,0,0,0];
  S.powerups={};
  S.combo=0;S.spiteMeter=0;
  S.frenzyActive=false;S.frenzyEnd=0;S.frenzyCooldownEnd=0;
  S.spiteExplosionEnd=0;
  S.prestigeStartTime=Date.now();

  // Apply PP headstart
  if(getUpgradeCount(S.ppUpgrades,'headstart'))S.points+=100;
  if(getUpgradeCount(S.spUpgrades,'instantStart'))S.points+=1000;
  // Lucky start: free abuelas
  var luckyCount=getUpgradeCount(S.ppUpgrades,'luckyStart');
  if(luckyCount)S.buildings[0]+=luckyCount;

  // Auto-prestige setting
  if(getUpgradeCount(S.ppUpgrades,'autoPrestige'))S.autoPrestigeEnabled=true;

  showPrestigeWave('PRESTIGE '+S.prestigeLevel+'!','p1');
  narrate('prestige');
  prestigeSound();
  saveGame();
}

function doSuperPrestige(){
  if(!canSuperPrestige())return;
  S.superPrestigeLevel++;
  S.superPoints++;
  // Reset prestige level and PP
  S.prestigeLevel=0;
  S.prestigePoints=0;
  S.ppUpgrades={};
  // Also reset normal stuff
  S.points=0;S.totalPoints=0;
  S.buildings=[0,0,0,0,0,0,0];
  S.clickUpgrades=[0,0,0,0,0];
  S.powerups={};
  S.combo=0;S.spiteMeter=0;
  S.frenzyActive=false;S.frenzyEnd=0;S.frenzyCooldownEnd=0;
  S.spiteExplosionEnd=0;
  S.prestigeStartTime=Date.now();
  S.fastestPrestige=Infinity;

  showPrestigeWave('SUPER PRESTIGE '+S.superPrestigeLevel+'!','p2');
  narrate('superPrestige');
  prestigeSound();
  saveGame();
}

function doUltraPrestige(){
  if(!canUltraPrestige())return;
  S.ultraPrestigeLevel++;
  S.ultraPoints++;
  // Reset EVERYTHING except ultra stuff and achievements
  S.prestigeLevel=0;S.prestigePoints=0;

function saveGame(){
  S.lastSave=Date.now();
  try{localStorage.setItem('flipflopper',JSON.stringify(S));}catch(e){}
}

function loadGame(){
  try{
    var raw=localStorage.getItem('flipflopper');
    if(!raw)return;
    var saved=JSON.parse(raw);
    // Merge with defaults
    for(var k in defaultState){
      if(saved[k]===undefined)saved[k]=JSON.parse(JSON.stringify(defaultState[k]));
    }
    S=saved;
    // Ensure arrays are right length and sanitize booleans from old saves
    while(S.clickUpgrades.length<5)S.clickUpgrades.push(0);
    for(var ci=0;ci<S.clickUpgrades.length;ci++){
      if(typeof S.clickUpgrades[ci]==='boolean')S.clickUpgrades[ci]=S.clickUpgrades[ci]?1:0;
      S.clickUpgrades[ci]=Number(S.clickUpgrades[ci])||0;
    }
    while(S.buildings.length<7)S.buildings.push(0);
    for(var bi=0;bi<S.buildings.length;bi++){
      if(typeof S.buildings[bi]==='boolean')S.buildings[bi]=S.buildings[bi]?1:0;
      S.buildings[bi]=Number(S.buildings[bi])||0;
    }
    if(!S.achievements)S.achievements={};
    if(!S.ppUpgrades)S.ppUpgrades={};
    if(!S.spUpgrades)S.spUpgrades={};
    if(!S.upUpgrades)S.upUpgrades={};
    if(!S.powerups)S.powerups={};
    if(!S.clickTimestamps)S.clickTimestamps=[];

    // Recalc transcendence
    S.transcendenceActive=!!getUpgradeCount(S.upUpgrades,'transcendence');

    // Offline earnings
    if(getUpgradeCount(S.spUpgrades,'passiveIncome')){
      var elapsed=(Date.now()-S.lastSave)/1000;
      if(elapsed>10){
        var offline=Math.floor(getSPS()*0.01*elapsed);
        if(offline>0){
          S.points+=offline;S.totalPoints+=offline;S.allTimePoints+=offline;
          S.offlineEarnings+=offline;
          setTimeout(function(){showToast('Welcome back! +'+fmt(offline)+' offline spite!');},500);
        }
      }
    }
    S.sessionStart=Date.now();
  }catch(e){resetState();}
}

function renderClickUpgrades(){
  var html='';
  for(var i=0;i<CLICK_UPGRADES.length;i++){
    var u=CLICK_UPGRADES[i];
    var cost=getClickUpgradeCost(i);
    var affordable=S.points>=cost;
    var isFrenzy=u.effect==='frenzy';
    var onCooldown=isFrenzy&&S.frenzyCooldownEnd&&Date.now()<S.frenzyCooldownEnd;
    var count=S.clickUpgrades[i];
    var cls='upgrade-card'+(affordable&&!onCooldown?' affordable':'')+(onCooldown?' on-cooldown':'');
    if(isFrenzy&&count>0){
      html+='<div class="'+cls+'" onclick="buyClickFrenzy()" data-idx="'+i+'">';
    }else{
      html+='<div class="'+cls+'" onclick="buyClickUpgrade('+i+')" data-idx="'+i+'">';
    }
    html+='<span class="uc-icon">'+u.icon+'</span>';
    html+='<div class="uc-info"><div class="uc-name">'+u.name+'</div>';
    html+='<div class="uc-desc">'+u.desc+'</div>';
    if(isFrenzy&&count>0){
      if(onCooldown){
        var remaining=Math.ceil((S.frenzyCooldownEnd-Date.now())/1000);
        html+='<div class="uc-cost" style="color:var(--dim)">Cooldown: '+remaining+'s</div>';
      }else{
        html+='<div class="uc-cost" style="color:var(--accent)">READY! Click to activate</div>';
      }
    }else{
      var isMaxed=(u.max&&u.max===1&&count>=1);
      if(isMaxed){
        html+='<div class="uc-cost" style="color:var(--green)">OWNED</div>';
      }else{
        html+='<div class="uc-cost">'+fmt(cost)+' spite</div>';
      }
    }
    html+='</div>';
    var countDisplay=(u.max&&u.max===1)?(count>=1?'✓':0):count;
    html+='<span class="uc-count"'+(count>=1&&u.max===1?' style="color:var(--green)"':'')+'>'+countDisplay+'</span></div>';
  }
  document.getElementById('clickUpgrades').innerHTML=html;
}

function renderMetaShop(containerId,labelId,upgrades,owned,currency,currName,costClass,buyFn){
  var label=document.getElementById(labelId);
  var container=document.getElementById(containerId);
  if(currency<=0&&Object.keys(owned).length===0){
    label.style.display='none';
    container.innerHTML='';
    return;
  }
  label.style.display='';
  var html='';
  for(var i=0;i<upgrades.length;i++){
    var u=upgrades[i];
    var count=getUpgradeCount(owned,u.id);
    var maxed=count>=u.max;
    var affordable=currency>=u.cost&&!maxed;
    var cls='upgrade-card';
    if(maxed)cls+=' maxed';
    else if(affordable)cls+=' affordable';
    html+='<div class="'+cls+'" onclick="'+buyFn+'(\''+u.id+'\')">';
    html+='<span class="uc-icon">'+u.icon+'</span>';
    html+='<div class="uc-info"><div class="uc-name">'+u.name+'</div>';
    html+='<div class="uc-desc">'+u.desc+'</div>';
    if(maxed){
      html+='<div class="uc-cost" style="color:var(--green)">MAXED</div>';
    }else{
      html+='<div class="uc-cost '+costClass+'">'+u.cost+' '+currName+'</div>';
    }
    html+='</div>';
    if(u.max>1)html+='<span class="uc-count">'+count+'/'+u.max+'</span>';
    else if(maxed)html+='<span class="uc-count" style="color:var(--green)">&#10003;</span>';
    html+='</div>';
  }
  container.innerHTML=html;
}

    ['Ultra Prestige',S.ultraPrestigeLevel+' ('+S.ultraPoints+' UP)'],
    ['Highest Combo',S.highestCombo+'x'],
    ['Fastest Prestige',S.fastestPrestige<Infinity?Math.floor(S.fastestPrestige)+'s':'--'],
    ['Golden Chanclas Clicked',S.goldenClicked],
    ['Time Played',Math.floor(S.totalTimePlayed/60)+'m'],
    ['Buildings Owned',S.buildings.reduce(function(a,b){return a+b;},0)],
    ['Powerups Owned',Object.keys(S.powerups).filter(function(k){return S.powerups[k];}).length+'/'+POWERUPS.length]
  ];
  for(var i=0;i<rows.length;i++){
    html+='<div class="stat-row"><span class="stat-label">'+rows[i][0]+'</span><span class="stat-value">'+rows[i][1]+'</span></div>';
  }
  html+='<div style="margin-top:12px;text-align:center"><button onclick="if(confirm(\'Wipe ALL save data?\')){localStorage.removeItem(\'flipflopper\');location.reload();}" style="background:var(--bg);border:1px solid var(--red);color:var(--red);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.75rem">Reset All Data</button></div>';
  document.getElementById('statsSection').innerHTML=html;
}

// ── BUY FUNCTIONS ──
function afterBuy(){updateHUD();saveGame();}

function buyClickUpgrade(idx){
  var u=CLICK_UPGRADES[idx];
  if(u.max===1&&S.clickUpgrades[idx]>=1)return;
  var cost=getClickUpgradeCost(idx);
  if(S.points<cost)return;
  S.points-=cost;
  S.clickUpgrades[idx]++;
  purchaseSound();
  if(Math.random()<0.3)narrate('purchase');
  renderClickUpgrades();afterBuy();
}

function buyClickFrenzy(){
  if(S.frenzyCooldownEnd&&Date.now()<S.frenzyCooldownEnd)return;
  if(S.clickUpgrades[4]<1){
    var cost=getClickUpgradeCost(4);
    if(S.points<cost)return;
    S.points-=cost;
    S.clickUpgrades[4]++;
    purchaseSound();
  }
  activateFrenzy();afterBuy();
}

function buyBuilding(idx){
  var cost=getBuildingCost(idx);
  if(S.points<cost)return;
  S.points-=cost;
  S.buildings[idx]++;
  purchaseSound();
  if(Math.random()<0.3)narrate('purchase');
  renderBuildings();afterBuy();
}

function buyPowerup(id){
  var p=POWERUPS.find(function(x){return x.id===id;});
  if(!p||S.powerups[p.id]||S.points<p.cost)return;
  S.points-=p.cost;
  S.powerups[p.id]=true;
  purchaseSound();
  narrate('purchase');
  renderPowerups();afterBuy();
}

function buyPP(id){
  var u=PP_UPGRADES.find(function(x){return x.id===id;});
  if(!u)return;
  var count=getUpgradeCount(S.ppUpgrades,id);
  if(count>=u.max||S.prestigePoints<u.cost)return;
  S.prestigePoints-=u.cost;
  S.ppUpgrades[id]=(count+1);
  purchaseSound();
  if(id==='autoPrestige')S.autoPrestigeEnabled=true;
  renderPrestigeSection();afterBuy();
}

function buySP(id){
  var u=SP_UPGRADES.find(function(x){return x.id===id;});
  if(!u)return;
  var count=getUpgradeCount(S.spUpgrades,id);
  if(count>=u.max||S.superPoints<u.cost)return;
  S.superPoints-=u.cost;
  S.spUpgrades[id]=(count+1);
  purchaseSound();
  renderPrestigeSection();afterBuy();
}

function buyUP(id){
  var u=UP_UPGRADES.find(function(x){return x.id===id;});
  if(!u)return;
  var count=getUpgradeCount(S.upUpgrades,id);
  if(count>=u.max||S.ultraPoints<u.cost)return;
  S.ultraPoints-=u.cost;
  S.upUpgrades[id]=(count+1);
  if(id==='transcendence')S.transcendenceActive=true;
  purchaseSound();
  renderPrestigeSection();afterBuy();
}

// ══════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════
var lastTick=Date.now();
var renderCounter=0;

function gameLoop(){
  var now=Date.now();
  var dt=(now-lastTick)/1000;
  lastTick=now;
  if(dt>5)dt=5; // cap

  // Time played
  S.totalTimePlayed+=dt;

  // Idle tracking
  if(S.lastClickTime&&(now-S.lastClickTime)/1000>1){
    S.idleTime=(now-S.lastClickTime)/1000;
  }

  // SPS production
  var sps=getSPS();
  var earned=sps*dt;
  if(earned>0){addPoints(earned);}

  // Frenzy auto-clicks
  if(S.frenzyActive&&now<S.frenzyEnd){
    var frenzyClicks=Math.floor(5*dt);
    for(var fc=0;fc<frenzyClicks;fc++){
      var p=getClickPower();
      addPoints(p);
      S.totalClicks++;
    }
  }else if(S.frenzyActive&&now>=S.frenzyEnd){
    S.frenzyActive=false;
  }

  // Auto-prestige
  if(S.autoPrestigeEnabled&&canPrestige()){
    doPrestige();
  }

  // Auto-buy (ultra upgrade)
  if(getUpgradeCount(S.upUpgrades,'automation')){
    // Find cheapest affordable building
    var cheapest=-1,cheapestCost=Infinity;
    for(var bi=0;bi<BUILDINGS.length;bi++){
      var bc=getBuildingCost(bi);
      if(bc<cheapestCost&&S.points>=bc){cheapest=bi;cheapestCost=bc;}
    }
    if(cheapest>=0&&Math.random()<0.1){// throttle to ~10% of ticks
      S.points-=cheapestCost;
      S.buildings[cheapest]++;
    }
  }

  // Check achievements
  checkAchievements();

  // Idle narrator
  if(S.idleTime>=15&&S.idleTime<15.5&&S.totalClicks>0){narrate('idle');}

  // UI updates (throttled for performance)
  renderCounter++;
  updateHUD();
  if(renderCounter%15===0){// ~4x/sec
    renderClickUpgrades();
    renderBuildings();
    renderPowerups();
    renderPrestigeSection();
  }
  if(renderCounter%60===0){// ~1/sec
    renderAchievements();
    renderStats();
  }

  // Auto-save
  if(renderCounter%300===0)saveGame();

  requestAnimationFrame(gameLoop);
}

function updateHUD(){
  // Points
  document.getElementById('points').textContent=fmt(S.points)+' spite';
  // Per sec
  document.getElementById('perSec').textContent=fmt(getSPS())+' spite/sec';
  // Click power
  document.getElementById('clickPowerDisp').textContent='+'+fmt(getClickPower())+' per smack';
  // Multiplier line
  var ml='';
  if(S.prestigeLevel>0)ml+='P'+S.prestigeLevel+' ';
  if(S.superPrestigeLevel>0)ml+='SP'+S.superPrestigeLevel+' ';
  if(S.ultraPrestigeLevel>0)ml+='UP'+S.ultraPrestigeLevel+' ';
  if(S.spiteExplosionEnd&&Date.now()<S.spiteExplosionEnd){
    var spiteMult=getUpgradeCount(S.spUpgrades,'spiteMastery')?10:5;
    ml+='| SPITE '+spiteMult+'x! ';
  }
  if(ml)ml='[ '+ml+'] x'+fmt(getPrestigeMultiplier());
  document.getElementById('multLine').textContent=ml;

  // Combo
  var cd=document.getElementById('comboDisp');
  if(S.combo>=5){
    var comboMsg='';
    for(var ci=COMBO_MSGS.length-1;ci>=0;ci--){
      if(S.combo>=COMBO_MSGS[ci].min){comboMsg=COMBO_MSGS[ci].msg;break;}
    }
    cd.textContent=S.combo+'x COMBO! '+comboMsg;
    cd.className='combo-display'+(S.combo>=50?' fire':S.combo>=20?' hot':'');
  }else{
    cd.textContent='';
    cd.className='combo-display';
  }

  // Prestige bar
  var req=getPrestigeRequirement();
  var pct=Math.min(100,S.points/req*100);
  document.getElementById('prestigeBar').style.width=pct+'%';
  document.getElementById('prestigeBarLabel').textContent=pct.toFixed(1)+'%';

  // Spite bar
  document.getElementById('spiteBar').style.width=S.spiteMeter+'%';
  document.getElementById('spiteBarLabel').textContent=Math.floor(S.spiteMeter)+'%';
}

function checkAchievements(){
  for(var i=0;i<ACHIEVEMENTS.length;i++){
    var a=ACHIEVEMENTS[i];
    if(S.achievements[a.id])continue;
    try{
      if(a.check()){
        S.achievements[a.id]=true;
        // Apply rewards
        if(a.bonus)addPoints(a.bonus);
        if(a.bonusMult)S.achieveMultiplier*=a.bonusMult;
        if(a.bonusPP)S.prestigePoints+=a.bonusPP;
        if(a.bonusSP)S.superPoints+=a.bonusSP;
        if(a.bonusUP)S.ultraPoints+=a.bonusUP;
        showToast('🏆 '+a.name+'! '+a.reward);
        narrate('milestone');
      }
    }catch(e){}
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
function init(){
  loadGame();

  // Set up click handler
  var cw=document.getElementById('chanclaWrap');
  cw.addEventListener('pointerdown',function(e){
    e.preventDefault();
    doClick(e);
  });
  // Prevent double-tap zoom on mobile
  cw.addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

  // Initial render
  renderClickUpgrades();
  renderBuildings();
  renderPowerups();
  renderPrestigeSection();
  renderAchievements();
  renderStats();
  updateHUD();

  // Start golden chancla timer
  scheduleGolden();

  // Start game loop
  lastTick=Date.now();
  requestAnimationFrame(gameLoop);

  // Narrator greeting
  setTimeout(function(){narrate('idle');},3000);
}

init();
</script>
