<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Construction Daily Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
textarea{min-height:80px}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-red{background:#ef4444}
.btn:active{opacity:.8}
.list-item{background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.list-item span{font-size:.9rem}
.remove-btn{background:none;border:none;color:#ef4444;font-size:1.2rem;cursor:pointer;padding:4px 8px}
.man-hours{color:#4ade80;font-weight:600;font-size:.9rem;margin-top:4px}
.nav-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-row input[type="date"]{padding:10px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.photo-note{color:#999;font-style:italic;font-size:.85rem;padding:12px;background:#0f0f10;border-radius:6px;border:1px dashed #2a2a2d}
@media print{body{background:#fff;color:#000}.card{border-color:#ccc;break-inside:avoid}.btn,.remove-btn,.nav-row{display:none!important}}
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="home-link">&#8592;</a>
<h1>Daily Log</h1>
</div>
<div class="nav-row" style="margin-bottom:16px">
<input type="date" id="logDate" onchange="loadLog()">
<button class="btn btn-sm" onclick="prevDay()">&#9664; Prev</button>
<button class="btn btn-sm" onclick="nextDay()">Next &#9654;</button>
<button class="btn btn-sm btn-green" onclick="exportLog()">Export</button>
</div>

<div class="card">
<h2>Project Info</h2>
<div class="row">
<div class="field"><label>Project Name</label><input type="text" id="projectName" oninput="save()"></div>
</div>
<div class="row">
<div class="field"><label>Weather</label>
<select id="weather" onchange="save()"><option>Clear</option><option>Cloudy</option><option>Rain</option><option>Snow</option><option>Wind</option></select></div>
<div class="field"><label>Temperature</label><input type="text" id="temp" placeholder="72°F" oninput="save()"></div>
</div>
</div>

<div class="card">
<h2>Crew</h2>
<div class="row">
<div class="field"><label>Name</label><input type="text" id="crewName"></div>
<div class="field"><label>Trade</label><input type="text" id="crewTrade"></div>
<div class="field" style="max-width:80px"><label>Hours</label><input type="number" id="crewHours" value="8"></div>
</div>
<button class="btn btn-sm" onclick="addCrew()">+ Add Worker</button>
<div id="crewList" style="margin-top:10px"></div>
<div class="man-hours" id="manHours"></div>
</div>

<div class="card">
<h2>Work Performed</h2>
<div class="field"><textarea id="workPerformed" oninput="save()" placeholder="Describe work completed today..."></textarea></div>
</div>

<div class="card">
<h2>Materials Received</h2>
<div class="row">
<div class="field"><label>Item</label><input type="text" id="matItem"></div>
<div class="field" style="max-width:80px"><label>Qty</label><input type="number" id="matQty" value="1"></div>
<div class="field"><label>Supplier</label><input type="text" id="matSupplier"></div>
</div>
<button class="btn btn-sm" onclick="addMaterial()">+ Add Material</button>
<div id="matList" style="margin-top:10px"></div>
</div>

<div class="card">
<h2>Equipment Used</h2>
<div class="row">
<div class="field"><label>Type</label><input type="text" id="eqType"></div>
<div class="field" style="max-width:80px"><label>Hours</label><input type="number" id="eqHours" value="8"></div>
<div class="field"><label>Owned/Rented</label>
<select id="eqOwned"><option>Owned</option><option>Rented</option></select></div>
</div>
<button class="btn btn-sm" onclick="addEquip()">+ Add Equipment</button>
<div id="eqList" style="margin-top:10px"></div>
</div>

<div class="card">
<h2>Issues / Delays</h2>
<div class="field"><textarea id="issues" oninput="save()" placeholder="Weather delays, inspections, problems..."></textarea></div>
</div>

<div class="card">
<h2>Safety</h2>
<div class="row">
<div class="field"><label>Any incidents?</label>
<select id="safetyInc" onchange="save()"><option>No</option><option>Yes</option></select></div>
</div>
<div class="field"><label>Description (if yes)</label><textarea id="safetyDesc" oninput="save()" placeholder="Describe incident..."></textarea></div>
</div>

<div class="card">
<h2>Photos</h2>
<div class="photo-note">Attach photos in email when sending this daily log. Use Export button to generate text for email body.</div>
</div>

<script>
let log={crew:[],materials:[],equipment:[]};
const dateEl=document.getElementById('logDate');
dateEl.value=new Date().toISOString().split('T')[0];

function getKey(){return dateEl.value;}
function getAllData(){return JSON.parse(localStorage.getItem('daily-log-data')||'{}');}
function saveAll(data){localStorage.setItem('daily-log-data',JSON.stringify(data));}

function save(){
const data=getAllData();
log.projectName=document.getElementById('projectName').value;
log.weather=document.getElementById('weather').value;
log.temp=document.getElementById('temp').value;
log.workPerformed=document.getElementById('workPerformed').value;
log.issues=document.getElementById('issues').value;
log.safetyInc=document.getElementById('safetyInc').value;
log.safetyDesc=document.getElementById('safetyDesc').value;
data[getKey()]=log;
saveAll(data);
}

function loadLog(){
const data=getAllData();
log=data[getKey()]||{crew:[],materials:[],equipment:[]};
document.getElementById('projectName').value=log.projectName||'';
document.getElementById('weather').value=log.weather||'Clear';
document.getElementById('temp').value=log.temp||'';
document.getElementById('workPerformed').value=log.workPerformed||'';
document.getElementById('issues').value=log.issues||'';
document.getElementById('safetyInc').value=log.safetyInc||'No';
document.getElementById('safetyDesc').value=log.safetyDesc||'';
if(!log.crew)log.crew=[];if(!log.materials)log.materials=[];if(!log.equipment)log.equipment=[];
renderCrew();renderMaterials();renderEquip();
}

function prevDay(){const d=new Date(dateEl.value);d.setDate(d.getDate()-1);dateEl.value=d.toISOString().split('T')[0];loadLog();}
function nextDay(){const d=new Date(dateEl.value);d.setDate(d.getDate()+1);dateEl.value=d.toISOString().split('T')[0];loadLog();}

function addCrew(){
const n=document.getElementById('crewName').value.trim();
const t=document.getElementById('crewTrade').value.trim();
const h=parseFloat(document.getElementById('crewHours').value)||0;
if(!n)return;
log.crew.push({name:n,trade:t,hours:h});
document.getElementById('crewName').value='';document.getElementById('crewTrade').value='';
renderCrew();save();
}
function removeCrew(i){log.crew.splice(i,1);renderCrew();save();}
function renderCrew(){
const el=document.getElementById('crewList');
el.innerHTML=log.crew.map((c,i)=>`<div class="list-item"><span>${c.name} - ${c.trade} (${c.hours}h)</span><button class="remove-btn" onclick="removeCrew(${i})">&#10005;</button></div>`).join('');
const total=log.crew.reduce((s,c)=>s+c.hours,0);
document.getElementById('manHours').textContent=total?`Total: ${log.crew.length} workers, ${total} man-hours`:'';
}

function addMaterial(){
const item=document.getElementById('matItem').value.trim();
const qty=document.getElementById('matQty').value;
const sup=document.getElementById('matSupplier').value.trim();
if(!item)return;
log.materials.push({item,qty,supplier:sup});
document.getElementById('matItem').value='';document.getElementById('matSupplier').value='';
renderMaterials();save();
}
function removeMat(i){log.materials.splice(i,1);renderMaterials();save();}
function renderMaterials(){
const el=document.getElementById('matList');
el.innerHTML=log.materials.map((m,i)=>`<div class="list-item"><span>${m.qty}x ${m.item}${m.supplier?' ('+m.supplier+')':''}</span><button class="remove-btn" onclick="removeMat(${i})">&#10005;</button></div>`).join('');
}

function addEquip(){
const t=document.getElementById('eqType').value.trim();
const h=document.getElementById('eqHours').value;
const o=document.getElementById('eqOwned').value;
if(!t)return;
log.equipment.push({type:t,hours:h,owned:o});
document.getElementById('eqType').value='';
renderEquip();save();
}
function removeEquip(i){log.equipment.splice(i,1);renderEquip();save();}
function renderEquip(){
const el=document.getElementById('eqList');
el.innerHTML=log.equipment.map((e,i)=>`<div class="list-item"><span>${e.type} - ${e.hours}h (${e.owned})</span><button class="remove-btn" onclick="removeEquip(${i})">&#10005;</button></div>`).join('');
}

function exportLog(){
let t=`DAILY CONSTRUCTION LOG\nDate: ${getKey()}\nProject: ${log.projectName||'N/A'}\nWeather: ${log.weather||'N/A'} ${log.temp||''}\n\n`;
t+=`CREW (${log.crew.length} workers, ${log.crew.reduce((s,c)=>s+c.hours,0)} man-hours)\n`;
log.crew.forEach(c=>{t+=`  ${c.name} - ${c.trade} - ${c.hours}h\n`;});
t+=`\nWORK PERFORMED\n  ${log.workPerformed||'None recorded'}\n`;
t+=`\nMATERIALS RECEIVED\n`;
log.materials.forEach(m=>{t+=`  ${m.qty}x ${m.item} (${m.supplier})\n`;});
t+=`\nEQUIPMENT\n`;
log.equipment.forEach(e=>{t+=`  ${e.type} - ${e.hours}h - ${e.owned}\n`;});
t+=`\nISSUES/DELAYS\n  ${log.issues||'None'}\n`;
t+=`\nSAFETY\n  Incidents: ${log.safetyInc}\n`;
if(log.safetyInc==='Yes')t+=`  ${log.safetyDesc}\n`;
navigator.clipboard.writeText(t).then(()=>alert('Log copied to clipboard!')).catch(()=>{});
}

loadLog();
</script>
</body>
</html>
