<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Python Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a2332;--surface:#14202e;--accent:#4B8BBE;--green:#4ade80;--gold:#FFD43B;--text:#f0f0f0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;min-height:100vh;overflow-y:auto;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);opacity:0.15}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%)}
a{color:var(--accent);text-decoration:none}

.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}

.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(240,240,240,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(240,240,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:#f59e0b;color:#000}
.badge-4{background:#ef4444;color:#fff}
.category{font-size:13px;color:rgba(240,240,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}

.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(75,139,190,0.2);border-color:var(--accent);color:var(--accent)}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(75,139,190,0.1);border:1px solid rgba(75,139,190,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}

.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}

.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.opt-btn:nth-child(1){animation-delay:0s}

@keyframes bluePulse{0%{background:var(--bg)}50%{background:#111e2e}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}

.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}

.fact-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(240,240,240,0.85);line-height:1.5}

.start-badge-300{display:inline-block;background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0}

.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(75,139,190,0.1)}
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
