function handleConnection(conn){
conn.on('open',function(){
conn.on('data',function(data){
if(data.type==='join'&&phase==='lobby'){
if(Object.keys(players).length>=MAX_PLAYERS){
conn.send({type:'error',msg:'Room is full'});
conn.close();return;
}
var name=(data.name||'Player').substring(0,16);
// Avoid duplicate names
var existing=Object.values(players).map(function(p){return p.name;});
var origName=name;var dup=1;
while(existing.indexOf(name)!==-1){name=origName+(++dup);}
players[conn.peer]={conn:conn,name:name,score:0,streak:0,answers:[],connected:true};
conn.send({type:'welcome',name:name,roomCode:roomCode});
mpSound('join');
renderHostLobby();
broadcastPlayerList();
}else if(data.type==='answer'&&phase==='question'){
var p=players[conn.peer];
if(!p||p.answers[currentQ]!==undefined)return;
var elapsed=Date.now()-questionStartTime;
p.answers[currentQ]={choice:data.choice,time:elapsed};
// Check if all answered
var allAnswered=true;
Object.values(players).forEach(function(pl){
if(pl.connected&&pl.answers[currentQ]===undefined)allAnswered=false;
});
if(allAnswered)showResults();
}
});
conn.on('close',function(){
if(players[conn.peer])players[conn.peer].connected=false;
renderCurrentPhase();
broadcastPlayerList();
});
});
}

function broadcastPlayerList(){
var list=Object.values(players).map(function(p){return{name:p.name,score:p.score,connected:p.connected};});
broadcast({type:'playerList',players:list});
}

function broadcast(data){
Object.values(players).forEach(function(p){
if(p.connected&&p.conn&&p.conn.open)try{p.conn.send(data);}catch(e){}
});
}

function renderCurrentPhase(){
if(phase==='lobby')renderHostLobby();
else if(phase==='question'){}// don't re-render during question
else if(phase==='results'){}
else if(phase==='leaderboard')renderHostLeaderboard();
else if(phase==='podium')renderHostPodium();
}

function renderHostLobby(){
var playerCount=Object.keys(players).length;
var connectedCount=Object.values(players).filter(function(p){return p.connected;}).length;
var joinUrl='taskiap.com/games/pythontrivia.html?join='+roomCode;
app.innerHTML='<div class="mp-lobby">'+
'<div style="font-size:14px;color:rgba(240,240,240,0.5);margin-bottom:4px">ROOM CODE</div>'+
'<div class="mp-room-code">'+roomCode+'</div>'+
'<div class="mp-join-url">'+joinUrl+'</div>'+
'<div class="mp-status">'+connectedCount+' player'+(connectedCount!==1?'s':'')+' connected ('+MIN_PLAYERS+'-'+MAX_PLAYERS+' needed)</div>'+
'<div class="mp-player-list" id="mp-players">'+
Object.values(players).map(function(p){
return '<div class="mp-player-chip'+(p.connected?'':' disconnected')+'">'+escH(p.name)+'</div>';
}).join('')+
'</div>'+
'<button class="mp-start-btn" id="mp-start"'+(connectedCount<MIN_PLAYERS?' disabled':'')+'>START GAME</button>'+
'<button class="mp-test-btn" id="mp-test">TEST MODE - Add 4 Bots</button>'+
'</div>';
document.getElementById('mp-start').onclick=function(){
if(connectedCount<MIN_PLAYERS)return;
startGame();
};
document.getElementById('mp-test').onclick=function(){addBots();};
}

function addBots(){
var botNames=['PyBot','CodeBot','SnakeBot','IndentBot'];
botNames.forEach(function(name,i){
if(Object.keys(players).length>=MAX_PLAYERS)return;
var botId='bot-'+i+'-'+Date.now();
botIds.push(botId);
players[botId]={conn:null,name:name,score:0,streak:0,answers:[],connected:true,isBot:true};
});
mpSound('join');
renderHostLobby();
broadcastPlayerList();
}

function startGame(){
phase='question';
currentQ=0;
Object.values(players).forEach(function(p){p.score=0;p.streak=0;p.answers=[];});
showQuestion();
}

function showQuestion(){
if(currentQ>=questions.length){phase='podium';renderHostPodium();return;}
phase='question';
var q=questions[currentQ];
questionStartTime=Date.now();
var timeLeft=QUESTION_TIME;

broadcast({type:'question',qi:currentQ,total:questions.length,q:q.q,options:q.o,d:q.d,cat:q.cat,timeLimit:QUESTION_TIME});

// Bot answers
botIds.forEach(function(botId){
if(!players[botId]||!players[botId].connected)return;
var delay=1500+Math.random()*8000;
setTimeout(function(){
if(phase!=='question'||players[botId].answers[currentQ]!==undefined)return;
var correct=Math.random()<0.7;
var choice=correct?q.a:([0,1,2,3].filter(function(x){return x!==q.a;})[Math.floor(Math.random()*3)]);
players[botId].answers[currentQ]={choice:choice,time:delay};
// Check all answered
var allAnswered=true;
Object.values(players).forEach(function(pl){
if(pl.connected&&pl.answers[currentQ]===undefined)allAnswered=false;
});
if(allAnswered)showResults();
},delay);
});

app.innerHTML='<div class="mp-tv-question">'+
'<div class="mp-round-indicator">Question '+(currentQ+1)+' / '+questions.length+'</div>'+
'<span class="badge '+DIFF_CLASSES[q.d]+'">'+DIFF_LABELS[q.d]+'</span>'+
'<span class="category" style="margin-left:8px">'+q.cat+'</span>'+
'<div class="question-text">'+q.q+'</div>'+
'<div class="mp-timer-bar"><div class="mp-timer-fill" id="mp-timer" style="width:100%"></div></div>'+
'<div id="mp-time-text" style="font-size:14px;color:rgba(240,240,240,0.5)">'+QUESTION_TIME+'s</div>'+
'<div class="mp-tv-opts" id="mp-tv-opts">'+
q.o.map(function(o,i){return '<div class="mp-tv-opt" data-i="'+i+'">'+escH(o)+'</div>';}).join('')+
'</div>'+
'<div id="mp-answer-count" style="margin-top:16px;color:rgba(240,240,240,0.5);font-size:14px">0 / '+countConnected()+' answered</div>'+
'</div>';

if(timerInterval)clearInterval(timerInterval);
timerInterval=setInterval(function(){
var elapsed=(Date.now()-questionStartTime)/1000;
timeLeft=QUESTION_TIME-elapsed;
if(timeLeft<=0){clearInterval(timerInterval);showResults();return;}
var pct=(timeLeft/QUESTION_TIME)*100;
var bar=document.getElementById('mp-timer');
var tt=document.getElementById('mp-time-text');
if(bar){
bar.style.width=pct+'%';
bar.className='mp-timer-fill'+(timeLeft<3?' danger':timeLeft<6?' warn':'');
}
if(tt)tt.textContent=Math.ceil(timeLeft)+'s';
// Update answer count
var answered=0;
Object.values(players).forEach(function(p){if(p.connected&&p.answers[currentQ]!==undefined)answered++;});
var ac=document.getElementById('mp-answer-count');
if(ac)ac.textContent=answered+' / '+countConnected()+' answered';
},100);
}

function countConnected(){
return Object.values(players).filter(function(p){return p.connected;}).length;
}

function showResults(){
if(phase==='results')return;
phase='results';
if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
var q=questions[currentQ];
var correctAnswer=q.a;

// Calculate scores
var resultRows=[];
Object.keys(players).forEach(function(id){
var p=players[id];
if(!p.connected)return;
var ans=p.answers[currentQ];
var choice=ans?ans.choice:-1;
var time=ans?ans.time:QUESTION_TIME*1000;
var isCorrect=choice===correctAnswer;
if(isCorrect){
p.streak++;
}else{
p.streak=0;
}
var pts=calcScore(isCorrect,time,p.streak);
p.score+=pts;
resultRows.push({name:p.name,choice:choice,correct:isCorrect,time:time,pts:pts,streak:p.streak});
});

// Sort by points earned this round (descending)
resultRows.sort(function(a,b){return b.pts-a.pts;});

broadcast({type:'result',correctAnswer:correctAnswer,fact:q.fact});
// Send individual results
Object.keys(players).forEach(function(id){
var p=players[id];
if(!p.connected)return;
var ans=p.answers[currentQ];
var choice=ans?ans.choice:-1;
var isCorrect=choice===correctAnswer;
var pts=calcScore(isCorrect,ans?ans.time:QUESTION_TIME*1000,p.streak);
var msg={type:'yourResult',correct:isCorrect,pts:pts,totalScore:p.score,streak:p.streak};
if(p.isBot)return;
try{p.conn.send(msg);}catch(e){}
});

mpSound(resultRows.some(function(r){return r.correct;})?'reveal':'wrong');

// Render results on TV
var optEls=document.querySelectorAll('.mp-tv-opt');
optEls.forEach(function(el){
var idx=parseInt(el.getAttribute('data-i'));
if(idx===correctAnswer)el.classList.add('correct');
});

app.innerHTML='<div style="text-align:center;padding:10px 0">'+
'<div class="mp-round-indicator">Question '+(currentQ+1)+' / '+questions.length+' - Results</div>'+
'<div class="question-text" style="font-size:18px;margin:8px 0 16px">'+q.q+'</div>'+
'<div style="font-size:16px;color:var(--green);margin-bottom:16px">Answer: '+escH(q.o[correctAnswer])+'</div>'+
'<div class="fact-card" style="text-align:left;margin-bottom:16px"><span class="fact-emoji">&#x1F4A1;</span><span>'+q.fact+'</span></div>'+
'<table class="mp-results-table"><thead><tr><th>Player</th><th>Answer</th><th>Time</th><th>Points</th></tr></thead><tbody>'+
resultRows.map(function(r){
var ansText=r.choice>=0?escH(q.o[r.choice]):'No answer';
var cls=r.correct?'correct-row':'wrong-row';
return '<tr class="'+cls+'"><td>'+escH(r.name)+(r.streak>=3?' &#x1F525;':'')+'</td><td>'+ansText+'</td><td>'+(r.time/1000).toFixed(1)+'s</td><td>'+(r.pts>0?'+':'')+r.pts+'</td></tr>';
}).join('')+
'</tbody></table>'+
'</div>';

// After 5 seconds show leaderboard
setTimeout(function(){
if(currentQ<questions.length-1){
renderHostLeaderboard();
}else{
phase='podium';
renderHostPodium();
}
},5000);
}

function renderHostLeaderboard(){
phase='leaderboard';
var sorted=Object.values(players).filter(function(p){return p.connected;}).sort(function(a,b){return b.score-a.score;});

broadcast({type:'leaderboard',standings:sorted.map(function(p,i){return{rank:i+1,name:p.name,score:p.score};})});

app.innerHTML='<div class="mp-leaderboard" style="text-align:center">'+
'<h2 style="color:var(--gold);margin-bottom:20px">Leaderboard</h2>'+
'<div style="font-size:14px;color:rgba(240,240,240,0.5);margin-bottom:16px">After question '+(currentQ+1)+' of '+questions.length+'</div>'+
sorted.map(function(p,i){
return '<div class="mp-lb-row" style="animation-delay:'+(i*0.08)+'s"><span class="rank">#'+(i+1)+'</span><span class="name">'+escH(p.name)+'</span><span class="pts">'+p.score+'</span></div>';
}).join('')+
'</div>';

// Next question after 4 seconds
setTimeout(function(){
currentQ++;
showQuestion();
},4000);
}

function renderHostPodium(){
phase='podium';
var sorted=Object.values(players).filter(function(p){return p.connected;}).sort(function(a,b){return b.score-a.score;});
var top3=sorted.slice(0,3);

broadcast({type:'podium',standings:sorted.map(function(p,i){return{rank:i+1,name:p.name,score:p.score};})});

mpSound('podium');

// Podium: 2nd, 1st, 3rd layout
var podiumHTML='';
if(top3.length>=2){
podiumHTML+='<div class="mp-podium-slot" style="animation-delay:0.3s"><div class="podium-name">'+escH(top3[1].name)+'</div><div class="podium-score">'+top3[1].score+' pts</div><div class="podium-block">2nd</div></div>';
}
if(top3.length>=1){
podiumHTML+='<div class="mp-podium-slot" style="animation-delay:0.6s"><div class="podium-name">'+escH(top3[0].name)+'</div><div class="podium-score">'+top3[0].score+' pts</div><div class="podium-block">1st</div></div>';
}
if(top3.length>=3){
podiumHTML+='<div class="mp-podium-slot" style="animation-delay:0.1s"><div class="podium-name">'+escH(top3[2].name)+'</div><div class="podium-score">'+top3[2].score+' pts</div><div class="podium-block">3rd</div></div>';
}

app.innerHTML='<div style="text-align:center;padding:20px 0">'+
'<h2 style="font-size:32px;color:var(--gold);margin-bottom:8px">&#x1F3C6; Final Results</h2>'+
'<p style="color:rgba(240,240,240,0.6);margin-bottom:16px">'+questions.length+' questions complete</p>'+
'<div class="mp-podium">'+podiumHTML+'</div>'+
'<div class="mp-leaderboard" style="margin-top:20px">'+
sorted.map(function(p,i){
return '<div class="mp-lb-row" style="animation-delay:'+(i*0.1)+'s"><span class="rank">#'+(i+1)+'</span><span class="name">'+escH(p.name)+'</span><span class="pts">'+p.score+' pts</span></div>';
}).join('')+
'</div>'+
'<button class="restart-btn" id="mp-restart" style="margin-top:24px">Play Again</button>'+
'</div>';

document.getElementById('mp-restart').onclick=function(){
questions=pickQuestions();
currentQ=0;
Object.values(players).forEach(function(p){p.score=0;p.streak=0;p.answers=[];});
botIds=Object.keys(players).filter(function(id){return players[id].isBot;});
phase='lobby';
renderHostLobby();
broadcast({type:'restart'});
broadcastPlayerList();
};
}
}

// ===================== PLAYER MODE =====================
function initPlayer(code){
var peerId=MP_PREFIX+code;
var myName=localStorage.getItem('mp-player-name')||'';
var myPeer=new Peer();
var conn=null;
var myScore=0;
var myStreak=0;
var answered=false;
var currentPhase='join';// join, waiting, question, result, standing, podium

document.title='Python Trivia - Join';

myPeer.on('open',function(){renderJoinScreen();});
myPeer.on('error',function(err){
app.innerHTML='<div class="mp-phone-join"><h2 style="color:#ef4444">Connection Error</h2><p>'+escH(err.message)+'</p><button class="restart-btn" onclick="location.reload()">Retry</button></div>';
});

function renderJoinScreen(){
app.innerHTML='<div class="mp-phone-join">'+
'<div style="font-size:48px;margin-bottom:12px">&#x1F40D;</div>'+
'<h2 style="margin-bottom:4px">Python Trivia</h2>'+
'<p style="color:rgba(240,240,240,0.5);margin-bottom:20px">Joining room <strong style="color:var(--gold)">'+code+'</strong></p>'+
'<input type="text" class="mp-name-input" id="mp-name" placeholder="Your name" maxlength="16" value="'+escH(myName)+'">'+
'<button class="mp-join-btn" id="mp-join">JOIN</button>'+
'<div id="mp-join-error" style="color:#ef4444;font-size:14px;margin-top:8px"></div>'+
'</div>';
var nameInput=document.getElementById('mp-name');
nameInput.focus();
nameInput.addEventListener('keydown',function(e){if(e.key==='Enter')doJoin();});
document.getElementById('mp-join').onclick=doJoin;
}

function doJoin(){
var nameInput=document.getElementById('mp-name');
var name=nameInput.value.trim();
if(!name){
document.getElementById('mp-join-error').textContent='Please enter your name';
return;
}
myName=name;
localStorage.setItem('mp-player-name',myName);
document.getElementById('mp-join').disabled=true;
document.getElementById('mp-join').textContent='Connecting...';

conn=myPeer.connect(peerId,{reliable:true});
conn.on('open',function(){
conn.send({type:'join',name:myName});
});
conn.on('data',handleHostMessage);
conn.on('close',function(){
app.innerHTML='<div class="mp-phone-join"><h2 style="color:#ef4444">Disconnected</h2><p>Connection to host lost.</p><button class="restart-btn" onclick="location.reload()">Reconnect</button></div>';
});
conn.on('error',function(err){
document.getElementById('mp-join-error').textContent='Could not connect. Check the room code.';
document.getElementById('mp-join').disabled=false;
document.getElementById('mp-join').textContent='JOIN';
});

// Timeout for connection
setTimeout(function(){
if(currentPhase==='join'){
var errEl=document.getElementById('mp-join-error');
var btnEl=document.getElementById('mp-join');
if(errEl)errEl.textContent='Connection timed out. Check room code.';
if(btnEl){btnEl.disabled=false;btnEl.textContent='JOIN';}
}
},10000);
}

function handleHostMessage(data){
if(data.type==='welcome'){
myName=data.name;
currentPhase='waiting';
renderWaiting();
}else if(data.type==='error'){
document.getElementById('mp-join-error').textContent=data.msg;
document.getElementById('mp-join').disabled=false;
document.getElementById('mp-join').textContent='JOIN';
}else if(data.type==='playerList'){
if(currentPhase==='waiting')renderWaiting(data.players);
}else if(data.type==='question'){
currentPhase='question';
answered=false;
renderPhoneQuestion(data);
}else if(data.type==='result'){
// Wait for yourResult
}else if(data.type==='yourResult'){
currentPhase='result';
myScore=data.totalScore;
myStreak=data.streak;
renderPhoneResult(data);
}else if(data.type==='leaderboard'){
currentPhase='standing';
renderPhoneStandings(data.standings);
}else if(data.type==='podium'){
currentPhase='podium';
renderPhonePodium(data.standings);
}else if(data.type==='restart'){
currentPhase='waiting';
myScore=0;
myStreak=0;
renderWaiting();
}
}

function renderWaiting(playerList){
var listHTML='';
if(playerList){
listHTML='<div class="mp-player-list">'+playerList.map(function(p){
return '<div class="mp-player-chip'+(p.connected?'':' disconnected')+'">'+escH(p.name)+'</div>';
}).join('')+'</div>';
}
app.innerHTML='<div class="mp-waiting">'+
'<div style="font-size:48px;margin-bottom:16px">&#x1F40D;</div>'+
'<h2 style="margin-bottom:8px">Welcome, '+escH(myName)+'!</h2>'+
'<p>Waiting for host to start<span class="dots"></span></p>'+
listHTML+
'</div>';
}

function renderPhoneQuestion(data){
var timeLimit=data.timeLimit||QUESTION_TIME;
var startTime=Date.now();

app.innerHTML='<div class="mp-phone-answer">'+
'<div class="mp-round-indicator">Q'+(data.qi+1)+' / '+data.total+'</div>'+
'<span class="badge '+DIFF_CLASSES[data.d]+'">'+DIFF_LABELS[data.d]+'</span>'+
'<div class="mp-timer-bar"><div class="mp-timer-fill" id="mp-p-timer" style="width:100%"></div></div>'+
'<div class="question-text" style="font-size:18px;margin:10px 0 16px">'+data.q+'</div>'+
'<div class="mp-phone-opts" id="mp-p-opts">'+
data.options.map(function(o,i){
return '<button class="mp-phone-opt" data-i="'+i+'">'+escH(o)+'</button>';
}).join('')+
'</div>'+
'</div>';

var btns=document.querySelectorAll('.mp-phone-opt');
btns.forEach(function(btn){
btn.onclick=function(){
if(answered)return;
answered=true;
btn.classList.add('selected');
btns.forEach(function(b){b.disabled=true;});
conn.send({type:'answer',choice:parseInt(btn.getAttribute('data-i'))});
};
});

// Timer
var pTimerInterval=setInterval(function(){
var elapsed=(Date.now()-startTime)/1000;
var left=timeLimit-elapsed;
if(left<=0){clearInterval(pTimerInterval);return;}
var pct=(left/timeLimit)*100;
var bar=document.getElementById('mp-p-timer');
if(bar){
bar.style.width=pct+'%';
bar.className='mp-timer-fill'+(left<3?' danger':left<6?' warn':'');
}
},100);
}

function renderPhoneResult(data){
mpSound(data.correct?'correct':'wrong');
app.innerHTML='<div class="mp-phone-result">'+
'<h2 style="color:'+(data.correct?'var(--green)':'#ef4444')+'">'+(data.correct?'Correct!':'Wrong!')+'</h2>'+
(data.pts>0?'<div class="pts-earned">+'+data.pts+'</div>':'')+
(data.streak>=3?'<div style="color:var(--gold);font-size:16px">&#x1F525; Streak x'+data.streak+' (1.5x bonus!)</div>':'')+
'<div style="margin-top:16px;font-size:20px;color:var(--accent)">Total: '+data.totalScore+' pts</div>'+
'</div>';
}

function renderPhoneStandings(standings){
var myRank=0;
standings.forEach(function(s,i){if(s.name===myName)myRank=i+1;});
app.innerHTML='<div style="text-align:center;padding:20px 0">'+
'<h3 style="color:var(--gold);margin-bottom:4px">Leaderboard</h3>'+
'<div style="font-size:14px;color:rgba(240,240,240,0.5);margin-bottom:16px">You are #'+myRank+'</div>'+
'<div class="mp-leaderboard">'+
standings.map(function(s,i){
var isMe=s.name===myName;
return '<div class="mp-lb-row" style="'+(isMe?'border:2px solid var(--accent);':'')+' animation-delay:'+(i*0.06)+'s"><span class="rank">#'+s.rank+'</span><span class="name">'+escH(s.name)+(isMe?' (you)':'')+'</span><span class="pts">'+s.score+'</span></div>';
}).join('')+
'</div></div>';
}

function renderPhonePodium(standings){
mpSound('podium');
var myRank=0;
standings.forEach(function(s,i){if(s.name===myName)myRank=i+1;});
var msg=myRank===1?'You won!':myRank===2?'Runner up!':myRank===3?'Bronze medal!':'Great game!';
app.innerHTML='<div style="text-align:center;padding:20px 0">'+
'<div style="font-size:48px;margin-bottom:8px">&#x1F3C6;</div>'+
'<h2 style="color:var(--gold);margin-bottom:4px">'+msg+'</h2>'+
'<div style="font-size:36px;font-weight:800;color:var(--accent);margin:8px 0">#'+myRank+'</div>'+
'<div style="font-size:20px;color:rgba(240,240,240,0.7);margin-bottom:16px">'+myScore+' points</div>'+
'<div class="mp-leaderboard">'+
standings.map(function(s,i){
var isMe=s.name===myName;
return '<div class="mp-lb-row" style="'+(isMe?'border:2px solid var(--accent);':'')+' animation-delay:'+(i*0.08)+'s"><span class="rank">#'+s.rank+'</span><span class="name">'+escH(s.name)+(isMe?' (you)':'')+'</span><span class="pts">'+s.score+' pts</span></div>';
}).join('')+
'</div></div>';
}
}

function escH(s){
if(!s)return'';
return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

})();
</script>
</body>
</html>
