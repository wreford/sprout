<title>Trestyn's Basketball Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f10;--surface:#1a1a1e;--accent:#F26522;--green:#4ade80;--gold:#FFD100;--blue:#1D428A;--text:#ffffff;--orange:#F26522;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;min-height:100vh;overflow-y:auto;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);opacity:0.5}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%)}
a{color:var(--accent);text-decoration:none}

.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(255,255,255,0.7);font-size:13px;margin-top:4px}
.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(255,255,255,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(232,232,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:var(--orange);color:#000}
.badge-4{background:var(--red);color:#fff}
.category{font-size:13px;color:rgba(232,232,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,0.2);border-color:#ef4444;color:#ef4444}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(242,101,34,0.3)}50%{text-shadow:0 0 12px rgba(242,101,34,0.7)}100%{text-shadow:0 0 4px rgba(242,101,34,0.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{0%{transform:scale(1);color:#fff}50%{transform:scale(1.3);color:var(--accent)}100%{transform:scale(1);color:#fff}}
.opt-btn{animation:cardIn 0.3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:0.07s}
.opt-btn:nth-child(3){animation-delay:0.14s}
.opt-btn:nth-child(4){animation-delay:0.21s}
.opt-btn.correct{animation:correctPop 0.35s ease}
.opt-btn.wrong{animation:wrongShake 0.4s ease}
.streak-fire{animation:streakFire 1.5s ease-in-out infinite}
.score-pop{animation:scoreUp 0.4s ease}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(232,232,240,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(232,232,240,0.7)}
.start-btn{width:100%;min-height:48px;padding:12px;margin-top:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.resume-btn{background:var(--gold);color:#000;margin-top:10px}
.start-btn:hover,.resume-btn:hover{opacity:0.9}
.hidden{display:none!important}
@keyframes fireBorder{0%{border-color:#F26522;box-shadow:0 0 8px rgba(242,101,34,0.4)}50%{border-color:#ff9966;box-shadow:0 0 18px rgba(255,153,102,0.6)}100%{border-color:#F26522;box-shadow:0 0 8px rgba(242,101,34,0.4)}}
@keyframes orangePulse{0%{background:var(--bg)}50%{background:#2a1508}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}
body.streak-pulse{animation:orangePulse 3s ease-in-out infinite}
body.streak-shake{animation:screenShake 0.4s ease}
.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:18px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
.fact-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(232,232,240,0.85);line-height:1.5}
.fact-card .fact-emoji{font-size:22px;flex-shrink:0;line-height:1.3}
.sound-toggle{background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:18px;cursor:pointer;padding:2px 7px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}
.start-hero{font-size:56px;line-height:1;margin-bottom:8px}
.start-high-score{font-size:22px;color:var(--green);font-weight:700;margin:8px 0}
.start-last-score{font-size:14px;color:rgba(232,232,240,0.5);margin-bottom:4px}
.start-badge-300{display:inline-block;background:var(--accent);color:#000;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0}
.accuracy-bar-wrap{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin:6px 0 4px}
.accuracy-bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.grade-badge{display:inline-block;font-size:36px;font-weight:900;padding:6px 20px;border-radius:12px;margin:10px 0}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(242,101,34,0.1)}
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@media(min-width:800px){
body{height:100vh;overflow:hidden}
.container{max-width:100%;padding:4px 24px}
header{padding:2px 0}
header h1{font-size:16px;letter-spacing:1px}
header .subtitle{display:none}
.notice{display:none}
.home-link{font-size:13px;min-height:28px;line-height:28px;padding:2px 0}
.score-bar{padding:3px 10px;margin-bottom:4px;font-size:12px}
.progress-bar-wrap{height:3px;margin-bottom:4px}
.q-header{margin-bottom:2px}
.q-number{font-size:12px}
.badge{font-size:10px;padding:1px 8px;margin:0 4px}
.category{font-size:11px}
.question-text{font-size:15px;margin:4px 0 8px;line-height:1.3}
.options{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{min-height:32px;padding:6px 10px;font-size:13px;line-height:1.2}
.next-btn{min-height:36px;padding:8px;font-size:14px;margin-top:6px}
.feedback{margin-top:6px;padding:6px 10px}
.feedback h3{font-size:14px;margin-bottom:2px}
.fact-card{padding:4px 8px;margin-top:4px;font-size:12px;gap:6px;line-height:1.3}
.fact-card .fact-emoji{font-size:16px}
.start-screen{padding:8px 0}
.start-hero{font-size:36px}
.start-screen p{font-size:13px;margin:6px 0}
.start-btn{min-height:40px;padding:10px;font-size:15px}
.end-screen{padding:10px 0}
.end-screen h2{font-size:22px}
.end-screen .final-score{font-size:36px;margin:8px 0}
.stats-grid{gap:6px;margin:8px 0}
.stat-card{padding:8px}
.stat-card .val{font-size:18px}
}
</style>

<script>
const Q=[
// ===== PLAYERS & STATS (60 Qs) =====
// Easy (d:1)
{q:"Who won the NBA MVP award for the 2015-16 season with a unanimous vote?",o:["LeBron James","Kevin Durant","Stephen Curry","James Harden"],a:2,d:1,cat:"Players & Stats",fact:"Curry became the first unanimous MVP in NBA history, earning all 131 first-place votes."},
{q:"Which player is known for his 'The King' nickname and has played for the Cavaliers, Heat, and Lakers?",o:["Kevin Durant","Stephen Curry","LeBron James","Giannis Antetokounmpo"],a:2,d:1,cat:"Players & Stats",fact:"LeBron James is one of the most decorated players ever, with four MVP awards and four championships."},
{q:"Who won the NBA Rookie of the Year award in 2019 after leading the Dallas Mavericks?",o:["Trae Young","Zion Williamson","Ja Morant","Luka Doncic"],a:3,d:1,cat:"Players & Stats",fact:"Doncic averaged 21.2 points, 7.8 rebounds, and 6.0 assists in his rookie season."},
{q:"Which player won back-to-back MVP awards in 2019 and 2020 playing for the Milwaukee Bucks?",o:["Joel Embiid","Nikola Jokic","Giannis Antetokounmpo","James Harden"],a:2,d:1,cat:"Players & Stats",fact:"Giannis was nicknamed 'The Greek Freak' and became only the third player to win consecutive MVPs since LeBron."},
{q:"Who holds the NBA record for most three-pointers made in a single season with 402?",o:["Klay Thompson","Ray Allen","James Harden","Stephen Curry"],a:3,d:1,cat:"Players & Stats",fact:"Curry set this record in the 2015-16 season, breaking his own previous record of 286."},
{q:"Which player averaged a triple-double for the entire 2016-17 season with the Oklahoma City Thunder?",o:["James Harden","LeBron James","Russell Westbrook","Luka Doncic"],a:2,d:1,cat:"Players & Stats",fact:"Westbrook averaged 31.6 points, 10.7 rebounds, and 10.4 assists that season to win MVP."},
{q:"Who won the 2020-21 NBA scoring title averaging 32.0 points per game for the Washington Wizards?",o:["Kevin Durant","Stephen Curry","Bradley Beal","Damian Lillard"],a:2,d:1,cat:"Players & Stats",fact:"Beal's scoring title came despite the Wizards finishing under .500 that season."},
{q:"Which center won three consecutive MVP awards from 2021 to 2023?",o:["Joel Embiid","Giannis Antetokounmpo","Nikola Jokic","Anthony Davis"],a:2,d:1,cat:"Players & Stats",fact:"Jokic's passing ability for a center was revolutionary, averaging over 7 assists per game in his MVP seasons."},
{q:"Who was named NBA Rookie of the Year in 2024 after being drafted first overall by the San Antonio Spurs?",o:["Chet Holmgren","Scoot Henderson","Victor Wembanyama","Brandon Miller"],a:2,d:1,cat:"Players & Stats",fact:"Wembanyama, standing 7'4\", was considered the most hyped draft prospect since LeBron James."},
{q:"Which guard scored 60 points in his final NBA game in April 2016?",o:["Tim Duncan","Dirk Nowitzki","Kobe Bryant","Dwyane Wade"],a:2,d:1,cat:"Players & Stats",fact:"Kobe scored 60 points against the Utah Jazz, leading the Lakers back from a 15-point deficit to win 101-96."},
{q:"Who won the 2023-24 NBA MVP award playing for the Oklahoma City Thunder?",o:["Luka Doncic","Nikola Jokic","Jayson Tatum","Shai Gilgeous-Alexander"],a:3,d:1,cat:"Players & Stats",fact:"SGA led the Thunder to the top seed in the Western Conference with his elite scoring and efficiency."},
{q:"Which player won the NBA Defensive Player of the Year three times from 2018 to 2022 with the Utah Jazz?",o:["Draymond Green","Bam Adebayo","Rudy Gobert","Giannis Antetokounmpo"],a:2,d:1,cat:"Players & Stats",fact:"Gobert's rim protection anchored the Jazz's top-ranked defense during that period."},
{q:"Who is the all-time NBA leader in career three-pointers made?",o:["Ray Allen","Reggie Miller","Stephen Curry","James Harden"],a:2,d:1,cat:"Players & Stats",fact:"Curry surpassed Ray Allen's record of 2,973 three-pointers in December 2021."},
{q:"Which player won the 2017-18 NBA Most Valuable Player award with the Houston Rockets?",o:["LeBron James","James Harden","Russell Westbrook","Anthony Davis"],a:1,d:1,cat:"Players & Stats",fact:"Harden averaged 30.4 points per game and led the Rockets to a league-best 65 wins."},
{q:"Who won NBA Rookie of the Year for the 2017-18 season with the Philadelphia 76ers?",o:["Donovan Mitchell","Jayson Tatum","Ben Simmons","De'Aaron Fox"],a:2,d:1,cat:"Players & Stats",fact:"Simmons won despite technically being a second-year player, having missed his first season with a broken foot."},
// Medium (d:2)
{q:"Who became the youngest player in NBA history to score 10,000 career points in 2023?",o:["Jayson Tatum","Luka Doncic","Zion Williamson","Anthony Edwards"],a:1,d:2,cat:"Players & Stats",fact:"Doncic reached the milestone at just 24 years old, beating LeBron James's record."},
{q:"Which player won the 2021-22 NBA scoring title averaging 30.6 PPG for the Philadelphia 76ers?",o:["Kevin Durant","Giannis Antetokounmpo","Joel Embiid","Devin Booker"],a:2,d:2,cat:"Players & Stats",fact:"Embiid won his first scoring title and also finished second in MVP voting that season."},
{q:"Who holds the record for most triple-doubles in NBA history, surpassing Oscar Robertson?",o:["LeBron James","James Harden","Russell Westbrook","Nikola Jokic"],a:2,d:2,cat:"Players & Stats",fact:"Westbrook surpassed Robertson's record of 181 triple-doubles in May 2021."},
{q:"Which undrafted player won the NBA Most Improved Player award in 2022 with the Memphis Grizzlies?",o:["Jordan Poole","Ja Morant","Desmond Bane","Dillon Brooks"],a:1,d:2,cat:"Players & Stats",fact:"Morant was actually the 2nd overall pick in 2019 -- the 2022 MIP was Ja Morant (he won it averaging 27.4 PPG). Actually it was won by Ja Morant."},
{q:"Who was the first player since Wilt Chamberlain to average 30+ PPG in multiple consecutive seasons (2018-20)?",o:["Kevin Durant","Stephen Curry","James Harden","Damian Lillard"],a:2,d:2,cat:"Players & Stats",fact:"Harden averaged 36.1 PPG in 2018-19 and 34.3 PPG in 2019-20 for the Rockets."},
{q:"Which player scored 70 points in a game for the Phoenix Suns in 2023?",o:["Kevin Durant","Luka Doncic","Devin Booker","Donovan Mitchell"],a:2,d:2,cat:"Players & Stats",fact:"Booker scored 70 against the Boston Celtics in March 2017, becoming the youngest player to score 70 since Wilt Chamberlain."},
{q:"Who won the NBA Sixth Man of the Year award in 2018 and 2019 with the LA Clippers?",o:["Montrezl Harrell","Lou Williams","Jamal Crawford","Jordan Clarkson"],a:1,d:2,cat:"Players & Stats",fact:"Lou Williams became only the second player to win the award three times in his career."},
{q:"Which player led the NBA in assists per game for the 2019-20 season?",o:["Chris Paul","Trae Young","LeBron James","Luka Doncic"],a:2,d:2,cat:"Players & Stats",fact:"LeBron averaged 10.2 assists per game at age 35, his highest assist average ever."},
{q:"Who won the 2022-23 NBA Defensive Player of the Year with the Boston Celtics?",o:["Robert Williams III","Al Horford","Jaren Jackson Jr.","Marcus Smart"],a:2,d:2,cat:"Players & Stats",fact:"Jaren Jackson Jr. of the Grizzlies actually won it in 2023, leading the league in blocks per game."},
{q:"Which player scored 73 points for the Detroit Pistons in 2024, one of the highest individual scoring games in modern NBA history?",o:["Luka Doncic","Shai Gilgeous-Alexander","Donovan Mitchell","Devin Booker"],a:0,d:2,cat:"Players & Stats",fact:"Doncic's 73-point game against the Hawks was the fourth-highest scoring game in NBA history."},
{q:"Who won the NBA All-Star Game MVP in 2016 playing for the Toronto Raptors?",o:["DeMar DeRozan","Kyle Lowry","Russell Westbrook","Paul George"],a:2,d:2,cat:"Players & Stats",fact:"Westbrook won the All-Star MVP after scoring 31 points for the Western Conference."},
{q:"Which player became the fastest to reach 20,000 career points in NBA history?",o:["Kevin Durant","LeBron James","Luka Doncic","Giannis Antetokounmpo"],a:1,d:2,cat:"Players & Stats",fact:"LeBron reached 20,000 points in just 726 games, faster than any player before him."},
{q:"Who averaged a triple-double for the entire season THREE times in his career?",o:["LeBron James","Nikola Jokic","Luka Doncic","Russell Westbrook"],a:3,d:2,cat:"Players & Stats",fact:"Westbrook averaged a triple-double in 2016-17, 2017-18, and 2018-19 seasons."},
{q:"Which player won the 2020 NBA scoring title with 34.3 PPG while playing for the Houston Rockets?",o:["Kevin Durant","Damian Lillard","James Harden","Bradley Beal"],a:2,d:2,cat:"Players & Stats",fact:"It was Harden's third consecutive scoring title, joining an elite club of volume scorers."},
{q:"Who was named the 2019 NBA Most Improved Player after leading the Sacramento Kings?",o:["De'Aaron Fox","Buddy Hield","Pascal Siakam","D'Angelo Russell"],a:2,d:2,cat:"Players & Stats",fact:"Siakam's scoring jumped from 7.3 to 16.9 PPG as he became a key piece of the Raptors' championship run."},
// Hard (d:3)
{q:"What was Stephen Curry's exact three-point shooting percentage in his unanimous MVP season (2015-16)?",o:["43.5%","44.3%","45.4%","40.8%"],a:2,d:3,cat:"Players & Stats",fact:"Curry shot 45.4% from three on a ridiculous 11.2 attempts per game that season."},
{q:"How many consecutive games did James Harden score 30+ points during his 2019 streak?",o:["28","32","36","40"],a:1,d:3,cat:"Players & Stats",fact:"Harden's 32-game streak of 30+ point games was the longest since Wilt Chamberlain's 65-game streak in 1964."},
{q:"Who holds the NBA record for most assists in a single game since 2015, recording 22 assists for the Cavaliers?",o:["LeBron James","Rajon Rondo","Russell Westbrook","Chris Paul"],a:0,d:3,cat:"Players & Stats",fact:"LeBron's court vision and passing ability made him one of the best facilitators ever at his size."},
{q:"What was Nikola Jokic's stat line in the 2023 NBA Finals Game 5 to clinch the championship?",o:["28-16-12","30-14-10","25-20-10","28-16-4"],a:0,d:3,cat:"Players & Stats",fact:"Jokic's near triple-double in the clinching game showcased his all-around dominance."},

function playBallgame(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopBallgame();
var s=SONGS[_currentSong%SONGS.length];
var beat=60/s.bpm;var idx=0;var bc=0;
function pn(){
if(idx>=s.n.length){idx=0;bc=0;_currentSong++;s=SONGS[_currentSong%SONGS.length];beat=60/s.bpm;}
try{
if(s.n[idx]>0){
var o=actx.createOscillator(),g=actx.createGain();o.type=s.w;o.frequency.value=s.n[idx];
g.gain.setValueAtTime(0.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.8);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+s.d[idx]*beat*0.8);
var ob=actx.createOscillator(),gb=actx.createGain();ob.type='triangle';ob.frequency.value=s.n[idx]*0.5;
gb.gain.setValueAtTime(0.018,actx.currentTime);gb.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.9);
ob.connect(gb);gb.connect(actx.destination);ob.start();ob.stop(actx.currentTime+s.d[idx]*beat*0.9);
}
if(bc%4===1||bc%4===3){
var bs2=Math.floor(actx.sampleRate*0.06);var buf=actx.createBuffer(1,bs2,actx.sampleRate);var dd=buf.getChannelData(0);
for(var i=0;i<bs2;i++)dd[i]=(Math.random()*2-1)*0.4;
var src=actx.createBufferSource();src.buffer=buf;var gn=actx.createGain();
gn.gain.setValueAtTime(0.02,actx.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.06);
src.connect(gn);gn.connect(actx.destination);src.start();src.stop(actx.currentTime+0.06);
}
}catch(e){}
bc++;_ballgameTimer=setTimeout(pn,s.d[idx]*beat*1000);idx++;}
_ballgameTimer=setTimeout(pn,300);
}
function stopBallgame(){if(_ballgameTimer){clearTimeout(_ballgameTimer);_ballgameTimer=null;}}

function handleAnswer(idx){

});

<script>
(function(){
// ===== MULTIPLAYER MODULE =====
var params = new URLSearchParams(window.location.search);
var mpMode = params.has('host') ? 'host' : (params.has('join') ? 'player' : null);
if (!mpMode) return;

// Load PeerJS
var peerScript = document.createElement('script');
peerScript.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
peerScript.onload = function(){ mpInit(); };
document.head.appendChild(peerScript);

var mpAudioCtx;
try { mpAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}

function mpPlayCorrect(){
  if(!mpAudioCtx) return;
  try {
    if(mpAudioCtx.state==='suspended') mpAudioCtx.resume();
    var o=mpAudioCtx.createOscillator(),g=mpAudioCtx.createGain();
    o.connect(g);g.connect(mpAudioCtx.destination);
    o.frequency.setValueAtTime(523,mpAudioCtx.currentTime);
    o.frequency.setValueAtTime(659,mpAudioCtx.currentTime+0.08);
    o.frequency.setValueAtTime(784,mpAudioCtx.currentTime+0.16);
    g.gain.setValueAtTime(0.02,mpAudioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,mpAudioCtx.currentTime+0.3);
    o.start();o.stop(mpAudioCtx.currentTime+0.3);
  }catch(e){}
}
function mpPlayWrong(){
  if(!mpAudioCtx) return;
  try {
    if(mpAudioCtx.state==='suspended') mpAudioCtx.resume();
    var o=mpAudioCtx.createOscillator(),g=mpAudioCtx.createGain();
    o.connect(g);g.connect(mpAudioCtx.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(200,mpAudioCtx.currentTime);
    o.frequency.setValueAtTime(150,mpAudioCtx.currentTime+0.15);
    g.gain.setValueAtTime(0.02,mpAudioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,mpAudioCtx.currentTime+0.3);
    o.start();o.stop(mpAudioCtx.currentTime+0.3);
  }catch(e){}
}
function mpPlayTick(){
  if(!mpAudioCtx) return;
  try {
    if(mpAudioCtx.state==='suspended') mpAudioCtx.resume();
    var o=mpAudioCtx.createOscillator(),g=mpAudioCtx.createGain();
    o.connect(g);g.connect(mpAudioCtx.destination);
    o.frequency.value=880;
    g.gain.setValueAtTime(0.01,mpAudioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,mpAudioCtx.currentTime+0.05);
    o.start();o.stop(mpAudioCtx.currentTime+0.05);
  }catch(e){}
}

var PEER_PREFIX = 'taskiap-basketballtrivia-';
var TOTAL_QUESTIONS = 20;
var QUESTION_TIME = 15;
var appEl = document.getElementById('app');
var DIFF_LABELS=["","Easy","Medium","Hard","Expert"];
var DIFF_CLASSES=["","badge-1","badge-2","badge-3","badge-4"];

function genRoomCode(){
  var c='';for(var i=0;i<4;i++) c+=String.fromCharCode(65+Math.floor(Math.random()*26));
  return c;
}

function pickQuestions(n){
  var pool=Q.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  var easy=pool.filter(function(q){return q.d===1;});
  var med=pool.filter(function(q){return q.d===2;});
  var hard=pool.filter(function(q){return q.d===3;});
  var expert=pool.filter(function(q){return q.d===4;});
  var picked=[];
  picked=picked.concat(easy.slice(0,5));
  picked=picked.concat(med.slice(0,6));
  picked=picked.concat(hard.slice(0,5));
  picked=picked.concat(expert.slice(0,4));
  for(var i2=picked.length-1;i2>0;i2--){var j2=Math.floor(Math.random()*(i2+1));var t2=picked[i2];picked[i2]=picked[j2];picked[j2]=t2;}
  return picked.slice(0,n);
}

function mpInit(){
  if(mpMode==='host') hostInit();
  else if(mpMode==='player') playerInit();
}

// ========== HOST MODE ==========
function hostInit(){
  var roomCode = genRoomCode();
  var peerId = PEER_PREFIX + roomCode;
  var peer = new Peer(peerId);
  var players = {};
  var questions = [];
  var currentQ = 0;
  var roundAnswers = {};
  var roundStartTime = 0;
  var roundTimer = null;
  var gameStarted = false;
  var botPlayers = [];

  var subtitle = document.querySelector('header .subtitle');
  if(subtitle) subtitle.textContent = 'Multiplayer Mode';

  peer.on('open', function(){
    renderHostLobby();
  });
  peer.on('error', function(err){
    console.error('PeerJS error:', err);
    if(!gameStarted) {
      roomCode = genRoomCode();
      peer.destroy();
      peer = new Peer(PEER_PREFIX + roomCode);
      peer.on('open', function(){ renderHostLobby(); });
      peer.on('connection', handleConnection);
    }
  });
  peer.on('connection', handleConnection);

  function handleConnection(conn){
    conn.on('open', function(){
      conn.on('data', function(data){
        if(data.type==='join'){
          players[conn.peer] = {conn:conn, name:data.name, score:0, streak:0, answers:[]};
          broadcastPlayerList();
          renderHostLobby();
        }
        if(data.type==='answer' && gameStarted){
          handlePlayerAnswer(conn.peer, data.choice, data.time);
        }
      });
      conn.on('close', function(){
        if(players[conn.peer]){
          delete players[conn.peer];
          broadcastPlayerList();
          if(!gameStarted) renderHostLobby();
        }
      });
    });
  }

  function broadcastPlayerList(){
    var names = getPlayerNames();
    broadcast({type:'playerList', players:names});
  }

  function getPlayerNames(){
    var names=[];
    for(var id in players) names.push(players[id].name);
    return names;
  }

  function getPlayerCount(){
    return Object.keys(players).length;
  }

  function broadcast(data){
    for(var id in players){
      try{ players[id].conn.send(data); }catch(e){}
    }
  }

  function renderHostLobby(){
    var count = getPlayerCount();
    var names = getPlayerNames();
    var joinUrl = 'taskiap.com/games/basketball.html?join=' + roomCode;
    appEl.innerHTML = '<div class="mp-lobby">' +
      '<p style="font-size:14px;color:rgba(232,232,240,0.5);margin-bottom:4px">JOIN AT</p>' +
      '<div class="mp-join-url"><a href="' + window.location.pathname + '?join=' + roomCode + '" target="_blank">' + joinUrl + '</a></div>' +
      '<p style="font-size:14px;color:rgba(232,232,240,0.5)">ROOM CODE</p>' +
      '<div class="mp-room-code">' + roomCode + '</div>' +
      '<div class="mp-player-count">' + count + ' player' + (count!==1?'s':'') + ' connected' + (count<3?' (need at least 3)':'') + '</div>' +
      '<ul class="mp-player-list">' + names.map(function(n){return '<li>'+escHtml(n)+'</li>';}).join('') + '</ul>' +
      (count>=3 ? '<button class="mp-start-btn" id="mp-start-btn">START GAME</button>' : '<button class="mp-start-btn" id="mp-start-btn" disabled>WAITING FOR PLAYERS...</button>') +
      '<br><button class="mp-test-btn" id="mp-test-btn">TEST MODE (Add 4 Bots)</button>' +
      '</div>';

    var startBtn = document.getElementById('mp-start-btn');
    if(startBtn && count>=3){
      startBtn.onclick = function(){ startGame(); };
    }
    var testBtn = document.getElementById('mp-test-btn');
    if(testBtn){
      testBtn.onclick = function(){ addBots(); };
    }
  }

  function addBots(){
    var botNames = ['DunkBot','SwishBot','BuzzerBot','SlamBot'];
    botPlayers = [];
    for(var i=0;i<4;i++){
      var botId = 'bot-'+i+'-'+Math.random().toString(36).substr(2,6);
      players[botId] = {conn:null, name:botNames[i], score:0, streak:0, answers:[], isBot:true};
      botPlayers.push(botId);
    }
    broadcastPlayerList();
    renderHostLobby();
  }

  function startGame(){
    gameStarted = true;
    questions = pickQuestions(TOTAL_QUESTIONS);
    currentQ = 0;
    for(var id in players){
      players[id].score = 0;
      players[id].streak = 0;
      players[id].answers = [];
    }
    broadcast({type:'gameStart', totalQ: TOTAL_QUESTIONS});
    showQuestion();
  }

  function showQuestion(){
    if(currentQ >= questions.length){
      showPodium();
      return;
    }
    var q = questions[currentQ];
    roundAnswers = {};
    roundStartTime = Date.now();

    broadcast({type:'question', qi:currentQ, total:questions.length, q:q.q, options:q.o, cat:q.cat, d:q.d, time:QUESTION_TIME});

    botPlayers.forEach(function(botId){
      if(!players[botId]) return;
      var delay = 1000 + Math.random()*8000;
      var isCorrect = Math.random()<0.7;
      var choice = isCorrect ? q.a : ((q.a + 1 + Math.floor(Math.random()*3)) % 4);
      setTimeout(function(){
        if(gameStarted && currentQ < questions.length) {
          handlePlayerAnswer(botId, choice, delay/1000);
        }
      }, delay);
    });

    renderTVQuestion(q);

    var timeLeft = QUESTION_TIME;
    var timerEl;
    clearInterval(roundTimer);
    roundTimer = setInterval(function(){
      timeLeft -= 0.1;
      timerEl = document.getElementById('mp-timer-fill');
      if(timerEl){
        var pct = Math.max(0, (timeLeft/QUESTION_TIME)*100);
        timerEl.style.width = pct+'%';
        if(timeLeft<3) timerEl.style.background = 'var(--red)';
        else if(timeLeft<6) timerEl.style.background = 'var(--gold)';
      }
      var countEl = document.getElementById('mp-answer-count');
      if(countEl){
        var answered = Object.keys(roundAnswers).length;
        var total = getPlayerCount();
        countEl.textContent = answered + '/' + total + ' answered';
      }
      if(timeLeft <= 0){
        clearInterval(roundTimer);
        endRound();
      }
    }, 100);
  }

  function renderTVQuestion(q){
    var optColors = ['mp-opt-a','mp-opt-b','mp-opt-c','mp-opt-d'];
    var optLabels = ['A','B','C','D'];
    appEl.innerHTML = '<div class="mp-tv-question">' +
      '<div class="mp-tv-header">' +
        '<span>Q ' + (currentQ+1) + '/' + questions.length + '</span>' +
        '<span class="badge ' + DIFF_CLASSES[q.d] + '">' + DIFF_LABELS[q.d] + '</span>' +
        '<span class="category">' + q.cat + '</span>' +
      '</div>' +
      '<div class="mp-timer-bar"><div class="mp-timer-fill" id="mp-timer-fill" style="width:100%"></div></div>' +
      '<div class="question-text">' + q.q + '</div>' +
      '<div class="mp-tv-options">' +
        q.o.map(function(o,i){
          return '<div class="mp-tv-opt ' + optColors[i] + '" data-i="'+i+'"><strong>' + optLabels[i] + '.</strong> ' + escHtml(o) + '</div>';
        }).join('') +
      '</div>' +
      '<div class="mp-answer-count" id="mp-answer-count">0/' + getPlayerCount() + ' answered</div>' +
      '</div>';
  }

  function handlePlayerAnswer(playerId, choice, timeTaken){
    if(roundAnswers[playerId] !== undefined) return;
    roundAnswers[playerId] = {choice: choice, time: timeTaken};

    if(Object.keys(roundAnswers).length >= getPlayerCount()){
      clearInterval(roundTimer);
      setTimeout(function(){ endRound(); }, 300);
    }
  }

  function endRound(){
    clearInterval(roundTimer);
    var q = questions[currentQ];
    var correctIdx = q.a;
    var results = [];

    for(var id in players){
      var p = players[id];
      var ans = roundAnswers[id];
      var choice = ans ? ans.choice : -1;
      var timeTaken = ans ? ans.time : QUESTION_TIME;
      var isCorrect = choice === correctIdx;
      var pts = 0;
      if(isCorrect){
        pts = 1000;
        if(timeTaken <= 2) pts += 500;
        else if(timeTaken < 10) pts += Math.round(500 * (1 - (timeTaken-2)/8));
        p.streak++;
        if(p.streak >= 3) pts = Math.round(pts * 1.5);
      } else {
        p.streak = 0;
      }
      p.score += pts;
      p.answers.push({choice:choice, correct:isCorrect, pts:pts, time:timeTaken});
      results.push({name:p.name, choice:choice, correct:isCorrect, pts:pts, time:timeTaken, playerId:id, streak:p.streak});
    }

    results.sort(function(a,b){
      if(a.correct && !b.correct) return -1;
      if(!a.correct && b.correct) return 1;
      return b.pts - a.pts;
    });

    var leaderboard = [];
    for(var id2 in players){
      leaderboard.push({name:players[id2].name, score:players[id2].score, streak:players[id2].streak, playerId:id2});
    }
    leaderboard.sort(function(a,b){return b.score - a.score;});

    revealTVAnswer(q, correctIdx, results);

    broadcast({type:'roundResult', correctIdx:correctIdx, results:results, leaderboard:leaderboard, fact:q.fact, correctAnswer:q.o[correctIdx]});

    setTimeout(function(){
      showTVLeaderboard(leaderboard);
      setTimeout(function(){
        currentQ++;
        showQuestion();
      }, 4000);
    }, 5000);
  }

  function revealTVAnswer(q, correctIdx, results){
    var opts = document.querySelectorAll('.mp-tv-opt');
    opts.forEach(function(el){
      var i = parseInt(el.getAttribute('data-i'));
      if(i === correctIdx) el.classList.add('mp-correct-reveal');
      else el.classList.add('mp-wrong-reveal');
    });
    mpPlayCorrect();

    var ansCountEl = document.getElementById('mp-answer-count');
    if(ansCountEl){
      var html = '<div class="mp-result-correct">Correct: ' + escHtml(q.o[correctIdx]) + '</div>';
      results.forEach(function(r){
        html += '<div class="mp-result-row' + (r.correct?'':' mp-r-wrong') + '">' +
          '<span class="mp-r-name">' + (r.correct?'&#10003;':'&#10007;') + ' ' + escHtml(r.name) + '</span>' +
          '<span class="mp-r-answer">' + (r.choice>=0 ? escHtml(q.o[r.choice]) : 'No answer') + '</span>' +
          '<span class="mp-r-time">' + (r.choice>=0 ? r.time.toFixed(1)+'s' : '-') + '</span>' +
          '<span class="mp-r-pts">' + (r.pts>0 ? '+'+r.pts : '0') + '</span>' +
          '</div>';
      });
      ansCountEl.innerHTML = html;
    }
  }

  function showTVLeaderboard(leaderboard){
    var medals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    var html = '<div class="mp-leaderboard">' +
      '<h2>Leaderboard</h2>';
    leaderboard.forEach(function(p,i){
      html += '<div class="mp-lb-row" style="animation-delay:'+i*0.08+'s">' +
        '<span class="mp-lb-rank">' + (i<3 ? medals[i] : (i+1)) + '</span>' +
        '<span class="mp-lb-name">' + escHtml(p.name) + '</span>' +
        (p.streak>=3 ? '<span class="mp-lb-streak">\u{1F525}'+p.streak+'</span>' : '') +
        '<span class="mp-lb-score">' + p.score + '</span>' +
        '</div>';
    });
    html += '</div>';
    appEl.innerHTML = html;
    broadcast({type:'showLeaderboard', leaderboard:leaderboard});
  }

  function showPodium(){
    gameStarted = false;
    var leaderboard = [];
    for(var id in players){
      leaderboard.push({name:players[id].name, score:players[id].score, playerId:id});
    }
    leaderboard.sort(function(a,b){return b.score - a.score;});

    var places = leaderboard.slice(0,3);
    var html = '<div class="mp-podium">' +
      '<h1>FINAL RESULTS</h1>' +
      '<div class="mp-podium-places">';

    var podiumClasses = ['mp-podium-1','mp-podium-2','mp-podium-3'];
    var podiumMedals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    for(var i=0;i<Math.min(3,places.length);i++){
      html += '<div class="mp-podium-place '+podiumClasses[i]+'">' +
        '<div class="mp-podium-medal">'+podiumMedals[i]+'</div>' +
        '<div class="mp-podium-name">'+escHtml(places[i].name)+'</div>' +
        '<div class="mp-podium-score">'+places[i].score+'</div>' +
        '</div>';
    }
    html += '</div>';

    if(leaderboard.length>3){
      html += '<div style="margin-top:20px">';
      for(var j=3;j<leaderboard.length;j++){
        html += '<div class="mp-lb-row"><span class="mp-lb-rank">'+(j+1)+'</span><span class="mp-lb-name">'+escHtml(leaderboard[j].name)+'</span><span class="mp-lb-score">'+leaderboard[j].score+'</span></div>';
      }
      html += '</div>';
    }

    html += '<button class="mp-play-again" id="mp-play-again">Play Again</button></div>';
    appEl.innerHTML = html;

    broadcast({type:'podium', leaderboard:leaderboard});

    document.getElementById('mp-play-again').onclick = function(){
      botPlayers.forEach(function(bid){ delete players[bid]; });
      botPlayers = [];
      gameStarted = false;
      renderHostLobby();
      broadcast({type:'backToLobby'});
    };
  }
}

// ========== PLAYER MODE ==========
function playerInit(){
  var roomCode = params.get('join').toUpperCase();
  var peerId = PEER_PREFIX + roomCode;
  var myName = localStorage.getItem('mp-basketball-name') || '';
  var conn = null;
  var myScore = 0;
  var myStreak = 0;
  var currentChoice = -1;
  var questionStartTime = 0;
  var answered = false;
  var connected = false;

  var subtitle = document.querySelector('header .subtitle');
  if(subtitle) subtitle.textContent = 'Multiplayer Mode';

  renderJoinScreen();

  function renderJoinScreen(){
    appEl.innerHTML = '<div class="mp-phone-join">' +
      '<h2 style="color:var(--accent)">Join Game</h2>' +
      '<p style="color:rgba(232,232,240,0.6)">Room: <strong>' + roomCode + '</strong></p>' +
      '<input type="text" id="mp-name-input" placeholder="Your Name" maxlength="16" value="' + escHtml(myName) + '">' +
      '<br><button id="mp-join-btn">JOIN</button>' +
      '</div>';

    var input = document.getElementById('mp-name-input');
    var btn = document.getElementById('mp-join-btn');
    input.focus();
    input.addEventListener('keydown', function(e){ if(e.key==='Enter') btn.click(); });
    btn.onclick = function(){
      var name = input.value.trim();
      if(!name) { input.style.borderColor='#ef4444'; return; }
      myName = name;
      localStorage.setItem('mp-basketball-name', myName);
      connectToHost();
    };
  }

  function connectToHost(){
    appEl.innerHTML = '<div class="mp-phone-waiting"><h2>Connecting...</h2></div>';
    var myPeer = new Peer();
    myPeer.on('open', function(){
      conn = myPeer.connect(peerId, {reliable:true});
      conn.on('open', function(){
        connected = true;
        conn.send({type:'join', name:myName});
        renderWaiting();
      });
      conn.on('data', function(data){
        handleHostMessage(data);
      });
      conn.on('close', function(){
        connected = false;
        renderDisconnected();
      });
      conn.on('error', function(){
        connected = false;
        renderDisconnected();
      });
    });
    myPeer.on('error', function(err){
      appEl.innerHTML = '<div class="mp-disconnected"><h2>Connection Failed</h2><p>Could not find room ' + roomCode + '</p><p style="margin-top:12px"><a href="' + window.location.pathname + '?join=' + roomCode + '">Try Again</a></p></div>';
    });
  }

  function renderWaiting(){
    appEl.innerHTML = '<div class="mp-phone-waiting">' +
      '<h2>You\'re in!</h2>' +
      '<p style="font-size:20px;font-weight:700;margin:12px 0">' + escHtml(myName) + '</p>' +
      '<p class="mp-waiting-dots">Waiting for host to start the game...</p>' +
      '</div>';
  }

  function renderDisconnected(){
    appEl.innerHTML = '<div class="mp-disconnected">' +
      '<h2>Disconnected</h2>' +
      '<p>You lost connection to the host.</p>' +
      '<p style="margin-top:12px"><a href="' + window.location.pathname + '?join=' + roomCode + '">Rejoin</a></p>' +
      '</div>';
  }

  function handleHostMessage(data){
    switch(data.type){
      case 'playerList':
        break;
      case 'gameStart':
        myScore = 0;
        myStreak = 0;
        break;
      case 'question':
        answered = false;
        currentChoice = -1;
        questionStartTime = Date.now();
        renderPhoneQuestion(data);
        break;
      case 'roundResult':
        renderPhoneResult(data);
        break;
      case 'showLeaderboard':
        renderPhoneStandings(data.leaderboard);
        break;
      case 'podium':
        renderPhonePodium(data.leaderboard);
        break;
      case 'backToLobby':
        myScore = 0;
        myStreak = 0;
        renderWaiting();
        break;
    }
  }

  function renderPhoneQuestion(data){
    var optColors = ['mp-popt-a','mp-popt-b','mp-popt-c','mp-popt-d'];
    var optLabels = ['A','B','C','D'];
    appEl.innerHTML = '<div class="mp-phone">' +
      '<div class="mp-tv-header">' +
        '<span>Q ' + (data.qi+1) + '/' + data.total + '</span>' +
        '<span class="badge ' + DIFF_CLASSES[data.d] + '">' + DIFF_LABELS[data.d] + '</span>' +
      '</div>' +
      '<div class="mp-timer-bar"><div class="mp-timer-fill" id="mp-phone-timer" style="width:100%"></div></div>' +
      '<div class="question-text" style="font-size:clamp(16px,4vw,20px);margin:8px 0 16px">' + data.q + '</div>' +
      '<div class="mp-phone-opts" id="mp-phone-opts">' +
        data.options.map(function(o,i){
          return '<button class="mp-phone-opt '+optColors[i]+'" data-i="'+i+'"><strong>'+optLabels[i]+'.</strong> '+escHtml(o)+'</button>';
        }).join('') +
      '</div>' +
      '</div>';

    var timeLeft = data.time;
    var timerInterval = setInterval(function(){
      timeLeft -= 0.1;
      var el = document.getElementById('mp-phone-timer');
      if(el){
        var pct = Math.max(0,(timeLeft/data.time)*100);
        el.style.width = pct+'%';
        if(timeLeft<3) el.style.background='var(--red)';
        else if(timeLeft<6) el.style.background='var(--gold)';
      }
      if(timeLeft<=0) clearInterval(timerInterval);
    },100);

    var btns = document.querySelectorAll('.mp-phone-opt');
    btns.forEach(function(btn){
      btn.onclick = function(){
        if(answered) return;
        answered = true;
        currentChoice = parseInt(btn.getAttribute('data-i'));
        var timeTaken = (Date.now() - questionStartTime)/1000;
        clearInterval(timerInterval);
        btns.forEach(function(b){ b.classList.add('mp-phone-selected'); b.style.cursor='default'; });
        btn.classList.remove('mp-phone-selected');
        btn.style.opacity='1';
        btn.style.borderWidth='4px';
        if(conn && connected){
          conn.send({type:'answer', choice:currentChoice, time:timeTaken});
        }
        var statusEl = document.createElement('div');
        statusEl.className = 'mp-phone-status mp-waiting-dots';
        statusEl.textContent = 'Waiting for other players...';
        appEl.querySelector('.mp-phone').appendChild(statusEl);
      };
    });
  }

  function renderPhoneResult(data){
    var myResult = null;
    for(var i=0;i<data.results.length;i++){
      if(data.results[i].name === myName){
        myResult = data.results[i];
        break;
      }
    }
    if(!myResult) myResult = {correct:false, pts:0, choice:-1};

    myScore += myResult.pts;
    if(myResult.correct){
      myStreak++;
      mpPlayCorrect();
    } else {
      myStreak = 0;
      mpPlayWrong();
    }

    var opts = document.querySelectorAll('.mp-phone-opt');
    if(opts.length > 0){
      opts.forEach(function(el){
        var idx = parseInt(el.getAttribute('data-i'));
        el.classList.remove('mp-phone-selected');
        if(idx === data.correctIdx) el.classList.add('mp-phone-correct');
        else if(idx === currentChoice && !myResult.correct) el.classList.add('mp-phone-wrong');
      });
    }

    setTimeout(function(){
      appEl.innerHTML = '<div class="mp-phone-result">' +
        '<h2>' + (myResult.correct ? 'Correct!' : 'Wrong') + '</h2>' +
        (myResult.correct ? '' : '<p style="color:rgba(232,232,240,0.6)">Answer: <strong>' + escHtml(data.correctAnswer) + '</strong></p>') +
        '<div class="mp-pts-earned">' + (myResult.pts > 0 ? '+'+myResult.pts : '0') + '</div>' +
        '<div class="mp-pts-label">points' + (myStreak>=3 ? ' (1.5x streak!)' : '') + '</div>' +
        '<p style="margin-top:16px;font-size:16px;color:var(--gold)">Total: ' + myScore + '</p>' +
        (data.fact ? '<div class="fact-card" style="margin-top:16px;text-align:left"><span class="fact-emoji">\u{1F3C0}</span><span>'+data.fact+'</span></div>' : '') +
        '</div>';
    }, 1200);
  }

  function renderPhoneStandings(leaderboard){
    var html = '<div class="mp-phone-standings"><h3>Standings</h3>';
    leaderboard.forEach(function(p,i){
      var isMe = p.name === myName;
      html += '<div class="mp-phone-rank-row'+(isMe?' mp-me':'')+'">' +
        '<span class="mp-pr-rank">'+(i+1)+'</span>' +
        '<span class="mp-pr-name">'+escHtml(p.name)+(isMe?' (you)':'')+'</span>' +
        '<span class="mp-pr-score">'+p.score+'</span>' +
        '</div>';
    });
    html += '</div>';
    appEl.innerHTML = html;
  }

  function renderPhonePodium(leaderboard){
    var myRank = -1;
    for(var i=0;i<leaderboard.length;i++){
      if(leaderboard[i].name === myName){ myRank = i; break; }
    }
    var medals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    var messages = ['YOU WON!','Runner Up!','Third Place!'];
    var html = '<div class="mp-phone-result" style="padding-top:30px">';
    if(myRank >= 0 && myRank < 3){
      html += '<div style="font-size:64px;margin-bottom:12px">'+medals[myRank]+'</div>';
      html += '<h2 style="color:var(--gold)">'+messages[myRank]+'</h2>';
    } else {
      html += '<h2>Game Over</h2>';
      html += '<p style="color:rgba(232,232,240,0.6)">You finished #'+(myRank+1)+'</p>';
    }
    html += '<div class="mp-pts-earned">' + myScore + '</div>';
    html += '<div class="mp-pts-label">final score</div>';

    html += '<div class="mp-phone-standings" style="margin-top:20px"><h3>Final Standings</h3>';
    leaderboard.forEach(function(p,i){
      var isMe = p.name === myName;
      html += '<div class="mp-phone-rank-row'+(isMe?' mp-me':'')+'">' +
        '<span class="mp-pr-rank">'+(i<3?medals[i]:(i+1))+'</span>' +
        '<span class="mp-pr-name">'+escHtml(p.name)+(isMe?' (you)':'')+'</span>' +
        '<span class="mp-pr-score">'+p.score+'</span></div>';
    });
    html += '</div></div>';
    appEl.innerHTML = html;
  }
}

function escHtml(s){
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

})();
</script>
</body>
</html>
