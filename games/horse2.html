function narrate(action,horseName){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();if(now-lastNarrationTime<3500)return;lastNarrationTime=now;
    var lines=NARRATIONS[action];if(!lines||lines.length===0)return;
    var text=lines[Math.floor(Math.random()*lines.length)].replace(/\{name\}/g,horseName);
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var utter=new SpeechSynthesisUtterance(text);utter.rate=0.95;utter.pitch=1.15;utter.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){var voice=null;for(var i=0;i<voices.length;i++){var v=voices[i];if(!v.lang||v.lang.indexOf("en")!==0)continue;if(!voice)voice=v;if(v.name&&(v.name.indexOf("Samantha")>-1||v.name.indexOf("Female")>-1||v.name.indexOf("Google")>-1||v.name.indexOf("Karen")>-1)){voice=v;break;}}if(voice)utter.voice=voice;}
        speechSynthesis.speak(utter);
      }catch(e){}
    },60);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// ── Save/Load
function loadHorse(){try{return JSON.parse(localStorage.getItem("lily-horse2"));}catch(e){return null;}}

// ── Sound
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(Math.min(v||0.02,0.02),c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndNeigh(){tone(400,0.15,"sine",0.02);setTimeout(function(){tone(500,0.2,"sine",0.02);},100);}
function sndMunch(){tone(200,0.06,"sine",0.02);setTimeout(function(){tone(250,0.06,"sine",0.02);},80);}
function sndBrush(){for(var i=0;i<4;i++){(function(j){setTimeout(function(){tone(800+j*50,0.04,"sine",0.015);},j*60);})(i);}}
function sndHappy(){[440,550,660,880].forEach(function(f,i){setTimeout(function(){tone(f,0.15,"sine",0.02);},i*100);});}
function sndCoin(){tone(600,0.08,"sine",0.02);setTimeout(function(){tone(800,0.06,"sine",0.02);},60);}
function sndSleep(){tone(150,0.3,"sine",0.01);}

// ── Music
var bgMusic={playing:false,muted:false,intervalId:null,noteIndex:0,baseVolume:0.008,masterGain:null,ctx:null,
  normalNotes:[261.63,293.66,329.63,392,440,523.25,587.33,659.25],
  normalPattern:[0,2,4,3,2,0,1,3,4,5,4,2,3,1,0,2],
  raceNotes:[329.63,392,440,523.25,587.33,659.25,784,880],
  racePattern:[0,1,2,3,4,5,6,7,6,5,4,3,2,1,0,1],
  bassNotes:[130.81,146.83,164.81,196,220],
  bassPattern:[0,0,3,3,4,4,2,0],
  racing:false
};
function startBgMusic(){
  if(bgMusic.playing)return;
  try{var c=getAudio();bgMusic.ctx=c;bgMusic.masterGain=c.createGain();bgMusic.masterGain.gain.setValueAtTime(bgMusic.muted?0:bgMusic.baseVolume,c.currentTime);bgMusic.masterGain.connect(c.destination);bgMusic.playing=true;bgMusic.noteIndex=0;
  var bpm=bgMusic.racing?120:70;var beatMs=Math.floor(60000/bpm);
  function playNote(){if(!bgMusic.playing)return;try{var c=bgMusic.ctx;var now=c.currentTime;var notes=bgMusic.racing?bgMusic.raceNotes:bgMusic.normalNotes;var pattern=bgMusic.racing?bgMusic.racePattern:bgMusic.normalPattern;var mIdx=pattern[bgMusic.noteIndex%pattern.length];var mFreq=notes[mIdx];var mOsc=c.createOscillator();var mGain=c.createGain();mOsc.type="sine";mOsc.frequency.setValueAtTime(mFreq,now);mGain.gain.setValueAtTime(0,now);mGain.gain.linearRampToValueAtTime(0.7,now+0.05);mGain.gain.setValueAtTime(0.7,now+0.3);mGain.gain.exponentialRampToValueAtTime(0.001,now+0.7);mOsc.connect(mGain);mGain.connect(bgMusic.masterGain);mOsc.start(now);mOsc.stop(now+0.75);
  if(bgMusic.noteIndex%2===0){var bIdx=bgMusic.bassPattern[Math.floor(bgMusic.noteIndex/2)%bgMusic.bassPattern.length];var bFreq=bgMusic.bassNotes[bIdx];var bOsc=c.createOscillator();var bGain=c.createGain();bOsc.type="triangle";bOsc.frequency.setValueAtTime(bFreq,now);bGain.gain.setValueAtTime(0,now);bGain.gain.linearRampToValueAtTime(0.5,now+0.08);bGain.gain.exponentialRampToValueAtTime(0.001,now+1.4);bOsc.connect(bGain);bGain.connect(bgMusic.masterGain);bOsc.start(now);bOsc.stop(now+1.5);}
  bgMusic.noteIndex++;}catch(e){}}
  playNote();bgMusic.intervalId=setInterval(playNote,beatMs);}catch(e){}
}
function stopBgMusic(){bgMusic.playing=false;if(bgMusic.intervalId){clearInterval(bgMusic.intervalId);bgMusic.intervalId=null;}}
function setBgMusicVolume(v){if(bgMusic.masterGain&&bgMusic.ctx)try{bgMusic.masterGain.gain.setValueAtTime(v,bgMusic.ctx.currentTime);}catch(e){}}

// ── Time of day
function getTimeOfDay(){var h=new Date().getHours();if(h>=5&&h<8)return"morning";if(h>=8&&h<17)return"day";if(h>=17&&h<20)return"sunset";return"night";}
function getSkyColors(tod){
  if(tod==="morning")return{top:"#ff9a9e",mid:"#fad0c4",bot:"#ffecd2"};
  if(tod==="day")return{top:"#87CEEB",mid:"#B8E8B0",bot:"#90EE90"};
  if(tod==="sunset")return{top:"#ff6b35",mid:"#f7931e",bot:"#ffd700"};
  return{top:"#0f0c29",mid:"#302b63",bot:"#24243e"};
}
function getSeason(){var m=new Date().getMonth();if(m>=2&&m<=4)return"spring";if(m>=5&&m<=7)return"summer";if(m>=8&&m<=10)return"autumn";return"winter";}
function getSeasonEmoji(s){if(s==="spring")return["\u{1F338}","\u{1F33C}","\u{1F337}"];if(s==="summer")return["\u{2600}\u{FE0F}","\u{1F33B}","\u{1F3D6}\u{FE0F}"];if(s==="autumn")return["\u{1F341}","\u{1F342}","\u{1F343}"];return["\u{2744}\u{FE0F}","\u{26C4}","\u{2745}"];}

// ── Streak + Daily Bonus
function getStreak(){try{return JSON.parse(localStorage.getItem("lily-horse2-streak")||"{}");}catch(e){return{};}}
function updateStreak(){var d=getStreak();var today=new Date().toDateString();var yesterday=new Date(Date.now()-86400000).toDateString();if(d.lastVisit===today)return d.streak||1;if(d.lastVisit===yesterday){d.streak=(d.streak||1)+1;}else{d.streak=1;}d.lastVisit=today;localStorage.setItem("lily-horse2-streak",JSON.stringify(d));return d.streak;}
function checkDailyBonus(h){if(!h||!h.created)return false;var today=new Date().toDateString();if(h.lastBonusDate===today)return false;if(new Date(h.created).toDateString()===today)return false;return true;}

// ── XP/Level system
function xpForLevel(lvl){return 20+lvl*15;}
function addXP(horse,amount){
  var h=Object.assign({},horse);h.xp=(h.xp||0)+amount;
  var needed=xpForLevel(h.level||1);
  while(h.xp>=needed){h.xp-=needed;h.level=(h.level||1)+1;needed=xpForLevel(h.level);}
  return h;
}

// ── Stat bar
function StatBar(p){
  var tier=p.value>60?"good":p.value>30?"okay":"critical";
  var color=tier==="good"?"var(--green)":tier==="okay"?"var(--gold)":"var(--red)";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
      <span style={{fontSize:"0.9rem",width:22,textAlign:"center"}}>{p.icon}</span>
      <span style={{fontSize:"0.6rem",fontFamily:"var(--font-mono)",color:"var(--dim)",width:52}}>{p.label}</span>
      <div style={{flex:1,height:10,background:"var(--bg3)",borderRadius:5,overflow:"hidden",border:"1px solid var(--border)"}}>

// ── Floating particle

// ── Meadow background
function MeadowBG(p){
  var tod=getTimeOfDay();var sky=getSkyColors(tod);var season=getSeason();var emojis=getSeasonEmoji(season);var isNight=tod==="night";
  return(
    <div style={{position:"absolute",inset:0,borderRadius:16,overflow:"hidden",zIndex:0}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,"+sky.top+","+sky.mid+" 60%,"+sky.bot+")"}}/>
      {/* Clouds */}
      <div style={{position:"absolute",top:"10%",left:0,fontSize:"2rem",animation:"drift 30s linear infinite",opacity:0.7}}>{"☁️"}</div>
      <div style={{position:"absolute",top:"18%",left:0,fontSize:"1.5rem",animation:"drift 45s linear infinite",animationDelay:"-15s",opacity:0.5}}>{"☁️"}</div>
      <div style={{position:"absolute",top:"6%",left:0,fontSize:"1.8rem",animation:"drift 38s linear infinite",animationDelay:"-25s",opacity:0.6}}>{"⛅"}</div>
      {/* Stars at night */}
      {isNight&&Array.from({length:12}).map(function(_,i){return <div key={i} style={{position:"absolute",top:(5+Math.random()*40)+"%",left:(5+Math.random()*90)+"%",fontSize:"0.6rem",animation:"twinkle "+(1.5+Math.random()*2)+"s ease infinite",animationDelay:(Math.random()*3)+"s"}}>{"⭐"}</div>;})}
      {/* Rolling hills */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"35%",background:"linear-gradient(180deg,#7CB342,#558B2F)",borderRadius:"60% 60% 0 0 / 30% 30% 0 0"}}/>
      <div style={{position:"absolute",bottom:0,left:"-10%",right:"-10%",height:"28%",background:"#6aad3a",borderRadius:"50% 50% 0 0 / 40% 40% 0 0",opacity:0.7}}/>
      {/* Grass */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:24,display:"flex",justifyContent:"space-around",alignItems:"flex-end",overflow:"hidden"}}>
        {Array.from({length:20}).map(function(_,i){return <span key={i} style={{fontSize:"1rem",animation:"grassWave "+(1.5+Math.random())+"s ease infinite",animationDelay:(Math.random()*2)+"s"}}>{"\u{1F33F}"}</span>;})}
      </div>
      {/* Season decorations */}
      {emojis.map(function(e,i){return <span key={i} style={{position:"absolute",bottom:(20+i*15)+"%",left:(10+i*30)+"%",fontSize:"1rem",opacity:0.6,animation:"float "+(4+i*2)+"s ease infinite"}}>{e}</span>;})}
      {/* Butterflies */}
      {!isNight&&<span style={{position:"absolute",top:"25%",fontSize:"1rem",animation:"float 6s ease infinite",animationDelay:"-2s"}}>{"\u{1F98B}"}</span>}
    </div>
  );
}

// ── Horse display
function HorseDisplay(p){
  var horse=p.horse;var equipped=horse.equipped||[];
  var topAcc=equipped.filter(function(id){var a=ACCESSORIES.find(function(x){return x.id===id;});return a&&a.pos==="top";});
  var bodyAcc=equipped.filter(function(id){var a=ACCESSORIES.find(function(x){return x.id===id;});return a&&a.pos==="body";});
  var bottomAcc=equipped.filter(function(id){var a=ACCESSORIES.find(function(x){return x.id===id;});return a&&a.pos==="bottom";});

  var bodyAnim="";
  if(p.action==="feed")bodyAnim="munch 0.3s ease 3";
  else if(p.action==="brush")bodyAnim="wiggle 0.4s ease 2";
  else if(p.action==="play"||p.action==="ride")bodyAnim="bounce 0.5s ease 3";
  else if(p.action==="dance")bodyAnim="danceBounce 0.5s ease 4";
  else if(horse.sleeping)bodyAnim="sleepBob 2s ease infinite";

  return(
    <div style={{position:"relative",textAlign:"center",padding:"20px 0",minHeight:200}}>
      <MeadowBG/>
      {/* Top accessories */}
      <div style={{position:"relative",zIndex:2,display:"flex",justifyContent:"center",gap:4,marginBottom:-12}}>
        {topAcc.map(function(id){var a=ACCESSORIES.find(function(x){return x.id===id;});return a?<span key={id} style={{fontSize:"1.8rem"}}>{a.emoji}</span>:null;})}
      </div>
      {/* Horse */}
      <div style={{position:"relative",zIndex:1,display:"inline-block",animation:bodyAnim,filter:horse.sleeping?"brightness(0.7)":"none"}}>
        <span style={{fontSize:"6rem",lineHeight:1}}>{"\u{1F434}"}</span>

function RaceGame(p){

  function start(){setRunning(true);setGameOver(false);setScore(0);obsRef.current=[{x:320}];jumpRef.current=false;scoreRef.current=0;setObstacles([{x:320}]);
    frameRef.current=setInterval(function(){var obs=obsRef.current;for(var i=obs.length-1;i>=0;i--){obs[i].x-=5;if(obs[i].x<-30){obs.splice(i,1);scoreRef.current++;}}
    var hit=false;for(var i=0;i<obs.length;i++){if(obs[i].x>30&&obs[i].x<80&&!jumpRef.current)hit=true;}
    if(hit){clearInterval(frameRef.current);setGameOver(true);setRunning(false);setScore(scoreRef.current);p.onFinish(scoreRef.current);return;}
    if(obs.length===0||obs[obs.length-1].x<180){if(Math.random()<0.04)obs.push({x:320});}
    obsRef.current=obs;setObstacles(obs.slice());setScore(scoreRef.current);},50);}
  function jump(){if(!running||jumpRef.current)return;jumpRef.current=true;setJumping(true);setTimeout(function(){jumpRef.current=false;setJumping(false);},500);}

  return(<div onClick={jump} style={{position:"relative",height:100,background:"linear-gradient(180deg,var(--sky),#c8e6c9)",borderRadius:12,overflow:"hidden",cursor:"pointer",userSelect:"none"}}><div style={{position:"absolute",bottom:0,left:0,right:0,height:20,background:"#558B2F"}}/><div style={{position:"absolute",bottom:jumping?50:20,left:50,fontSize:"2.5rem",transition:"bottom 0.15s"}}>{"\u{1F434}"}</div>{obstacles.map(function(o,i){return <div key={i} style={{position:"absolute",bottom:20,left:o.x,fontSize:"1.5rem"}}>{"\u{1F335}"}</div>;})}<div style={{position:"absolute",top:4,right:8,fontSize:"0.7rem",fontFamily:"var(--font-mono)",color:"var(--brown)"}}>Cleared: {score}</div><div style={{position:"absolute",top:4,left:8,fontSize:"0.65rem",color:"var(--dim)"}}>TAP TO JUMP</div></div>);

// ── Dance Mini-Game
function DanceGame(p){
  var[playing,setPlaying]=useState(false);var[targets,setTargets]=useState([]);var[score,setScore]=useState(0);var[timeLeft,setTimeLeft]=useState(10);var[done,setDone]=useState(false);var timerRef=useRef(null);var scoreRef=useRef(0);
  var arrows=["⬅","➡","⬆","⬇"];

    var t=[];for(var i=0;i<8;i++)t.push({arrow:arrows[Math.floor(Math.random()*4)],hit:false,id:i});setTargets(t);

// ── Main Game
function Game(p){
  var[horse,setHorse]=useState(p.horse);
  var[action,setAction]=useState(null);var[particles,setParticles]=useState([]);var[quote,setQuote]=useState("");
  var[showShop,setShowShop]=useState(false);var[showDressUp,setShowDressUp]=useState(false);
  var[miniGame,setMiniGame]=useState(null);var[adventureState,setAdventureState]=useState(null);
  var[musicMuted,setMusicMuted]=useState(false);var[streak,setStreak]=useState(1);var[toast,setToast]=useState(null);
  var[levelUpMsg,setLevelUpMsg]=useState(null);
  var particleId=useRef(0);

  // Mood
  function getMood(h){
    var avg=(h.hunger+h.happiness+h.energy+h.clean+(h.health||100))/5;
    if(h.sleeping)return{mood:"sleeping",emoji:"\u{1F634}"};
    if(h.hunger<20||h.happiness<20||h.energy<20||h.clean<20||(h.health||100)<20)return{mood:"stressed",emoji:"\u{1F630}"};
    if(avg>=80)return{mood:"ecstatic",emoji:"\u{1F60D}"};
    if(avg>=60)return{mood:"happy",emoji:"\u{1F60A}"};
    if(avg>=40)return{mood:"okay",emoji:"\u{1F610}"};
    if(avg>=20)return{mood:"sad",emoji:"\u{1F622}"};
    return{mood:"miserable",emoji:"\u{1F62D}"};
  }
  var moodData=getMood(horse);

  // Quotes

    var q={sleeping:[name+" is dreaming of open fields...","Zzz... sweet horse dreams..."],stressed:[name+" looks uncomfortable...","Poor "+name+" needs some care!"],ecstatic:[name+" loves you SO much!",name+" is the happiest horse alive!",name+" wants to gallop forever!"],happy:[name+" swishes their tail happily.",name+" neighs softly at you.",name+" trots around proudly."],okay:[name+" could use some attention.",name+" looks at you expectantly."],sad:[name+" looks at you with big eyes.",name+" hangs their head sadly."],miserable:[name+" is really struggling!","PLEASE help "+name+"!"]};
    var arr=q[mood]||q.okay;return arr[Math.floor(Math.random()*arr.length)];
  }

  useEffect(function(){startBgMusic();var s=updateStreak();setStreak(s);
    if(checkDailyBonus(horse)){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)+5;n.lastBonusDate=new Date().toDateString();saveHorse(n);return n;});setToast("Welcome back! +5 bonus coins!");sndCoin();setTimeout(function(){setToast(null);},4000);}
    return function(){stopBgMusic();};},[]);

  useEffect(function(){if(!bgMusic.muted)setBgMusicVolume(horse.sleeping?bgMusic.baseVolume*0.3:bgMusic.baseVolume);},[horse.sleeping]);

  useEffect(function(){setQuote(getQuote(moodData.mood,horse.name));var iv=setInterval(function(){setQuote(getQuote(getMood(horse).mood,horse.name));},8000);return function(){clearInterval(iv);};},[horse.hunger,horse.happiness,horse.energy,horse.clean,horse.sleeping]);

  // Stat decay - slow, once per 10 seconds
  useEffect(function(){var iv=setInterval(function(){setHorse(function(h){var n=Object.assign({},h);
    if(!n.sleeping){n.hunger=Math.max(0,n.hunger-0.25);n.happiness=Math.max(0,n.happiness-0.12);n.clean=Math.max(0,n.clean-0.1);n.energy=Math.max(0,n.energy-0.18);n.health=Math.max(0,(n.health||100)-(n.hunger<10||n.clean<10?0.3:0));}
    else{n.energy=Math.min(100,n.energy+1.2);n.hunger=Math.max(0,n.hunger-0.08);n.health=Math.min(100,(n.health||100)+0.5);if(n.energy>=100)n.sleeping=false;}
    saveHorse(n);return n;});},10000);return function(){clearInterval(iv);};},[]);

  // Warning narration for critical stats
  useEffect(function(){
    if(horse.sleeping)return;
    if(horse.hunger<25)narrate("lowHunger",horse.name);
    else if(horse.happiness<25)narrate("lowHappiness",horse.name);
    else if(horse.energy<25)narrate("lowEnergy",horse.name);
    else if(horse.clean<25)narrate("lowClean",horse.name);
  },[Math.floor(horse.hunger/25),Math.floor(horse.happiness/25),Math.floor(horse.energy/25),Math.floor(horse.clean/25)]);

  var spawnParticle=function(emoji){var id=particleId.current++;var x=30+Math.random()*40+"%";var y=10+Math.random()*30+"%";setParticles(function(pp){return pp.concat([{id:id,x:x,y:y,emoji:emoji}]);});setTimeout(function(){setParticles(function(pp){return pp.filter(function(q){return q.id!==id;});});},1000);};

  var gainXP=function(amount,h){
    var oldLevel=h.level||1;var updated=addXP(h,amount);
    if(updated.level>oldLevel){sndLevelUp();setLevelUpMsg(horse.name+" reached Level "+updated.level+"!");narrate("levelUp",horse.name);setTimeout(function(){setLevelUpMsg(null);},4000);}
    return updated;
  };

  var doAction=function(type){
    if(horse.sleeping&&type!=="wake")return;
    setAction(type);setTimeout(function(){setAction(null);},1000);
    setHorse(function(h){var n=Object.assign({},h);
      if(type==="feed"){n.hunger=Math.min(100,n.hunger+25);n.coins=Math.max(0,(n.coins||0)-1);n.happiness=Math.min(100,n.happiness+5);sndMunch();spawnParticle("\u{1F955}");spawnParticle("\u{1F33E}");narrate("feed",n.name);n=gainXP(3,n);}
      else if(type==="brush"){n.clean=Math.min(100,n.clean+30);n.happiness=Math.min(100,n.happiness+8);sndBrush();spawnParticle("✨");spawnParticle("\u{1F4AB}");narrate("brush",n.name);n=gainXP(3,n);}
      else if(type==="pet"){n.happiness=Math.min(100,n.happiness+15);sndNeigh();spawnParticle("❤\u{FE0F}");spawnParticle("\u{1F495}");spawnParticle("\u{1F970}");narrate("pet",n.name);n=gainXP(2,n);}
      else if(type==="play"){n.happiness=Math.min(100,n.happiness+20);n.energy=Math.max(0,n.energy-15);n.hunger=Math.max(0,n.hunger-8);n.coins=(n.coins||0)+2;sndHappy();sndTrot();spawnParticle("\u{1F495}");narrate("play",n.name);n=gainXP(4,n);}
      else if(type==="ride"){n.happiness=Math.min(100,n.happiness+25);n.energy=Math.max(0,n.energy-25);n.hunger=Math.max(0,n.hunger-12);n.coins=(n.coins||0)+5;sndTrot();sndHappy();spawnParticle("\u{1F3C7}");spawnParticle("\u{1F4A8}");narrate("ride",n.name);n=gainXP(5,n);}
      else if(type==="sleep"){n.sleeping=true;sndSleep();spawnParticle("\u{1F4A4}");spawnParticle("\u{1F319}");narrate("sleep",n.name);}
      else if(type==="wake"){n.sleeping=false;sndNeigh();spawnParticle("☀\u{FE0F}");narrate("wake",n.name);}
      else if(type==="train"){n.energy=Math.max(0,n.energy-20);n.hunger=Math.max(0,n.hunger-10);n.coins=Math.max(0,(n.coins||0)-3);n.health=Math.min(100,(n.health||100)+5);sndTrot();spawnParticle("\u{1F4AA}");narrate("train",n.name);n=gainXP(8,n);}
      else if(type==="photo"){var desc=n.name+" (Lv."+n.level+") - Mood: "+getMood(n).mood+" | Hunger:"+Math.round(n.hunger)+" Happy:"+Math.round(n.happiness)+" Energy:"+Math.round(n.energy)+" Clean:"+Math.round(n.clean)+" | Coins:"+n.coins;if(navigator.clipboard){navigator.clipboard.writeText(desc);setToast("Photo saved to clipboard!");setTimeout(function(){setToast(null);},3000);}spawnParticle("\u{1F4F8}");}
      saveHorse(n);return n;
    });
  };

  var doAdventure=function(){
    if(horse.energy<20)return;
    var adv=ADVENTURES[Math.floor(Math.random()*ADVENTURES.length)];
    setAdventureState({text:adv.text.replace(/\{name\}/g,horse.name),choices:adv.choices.map(function(c){return Object.assign({},c,{result:c.result.replace(/\{name\}/g,horse.name)});})});
    narrate("adventure",horse.name);

  var resolveAdventure=function(choice){

  var buyAccessory=function(acc){setHorse(function(h){var n=Object.assign({},h);if((n.coins||0)<acc.cost)return h;var owned=n.owned||[];if(owned.indexOf(acc.id)>=0)return h;n.coins-=acc.cost;n.owned=owned.concat([acc.id]);sndHappy();spawnParticle(acc.emoji);narrate("dressup",n.name);saveHorse(n);return n;});};

  var buyShopItem=function(type){setHorse(function(h){var n=Object.assign({},h);
    if(type==="food"&&n.coins>=1){n.coins-=1;n.hunger=Math.min(100,n.hunger+25);n.happiness=Math.min(100,n.happiness+5);sndMunch();spawnParticle("\u{1F955}");}

    else if(type==="royal"&&n.coins>=8){n.coins-=8;n.hunger=100;n.happiness=100;n.energy=100;n.clean=100;n.health=100;sndHappy();spawnParticle("\u{1F451}");}
    else return h;
    saveHorse(n);return n;
  });};

  var resetHorse=function(){localStorage.removeItem("lily-horse2");window.location.reload();};
  var coins=horse.coins||0;var level=horse.level||1;
  var xpNeeded=xpForLevel(level);var xpCurrent=horse.xp||0;

  return(
    <div style={{minHeight:"100%",display:"flex",flexDirection:"column",paddingBottom:16}}>

        <span style={{fontSize:"0.5rem",fontFamily:"var(--font-mono)",color:"var(--pink)"}}>{"\u{1F525}"} {streak}d</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          <button onClick={function(){setMusicMuted(function(m){var nm=!m;bgMusic.muted=nm;setBgMusicVolume(nm?0:bgMusic.baseVolume);return nm;});}} style={{fontSize:"0.9rem",padding:"2px 5px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer",lineHeight:1}} title={musicMuted?"Unmute":"Mute"}>{musicMuted?"\u{1F507}":"\u{1F50A}"}</button>
          <span style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",fontWeight:700,color:"var(--gold)"}}>{"\u{1FA99}"} {coins}</span>
          <button onClick={resetHorse} style={{fontSize:"0.55rem",padding:"3px 6px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--dim)",cursor:"pointer",fontFamily:"var(--font-mono)"}}>New</button>
        </div>
      </div>
      {/* XP bar */}
      <div style={{padding:"3px 12px",background:"var(--bg2)",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:"0.55rem",fontFamily:"var(--font-mono)",color:"var(--dim)"}}>XP</span>
          <div style={{flex:1,height:6,background:"var(--bg3)",borderRadius:3,overflow:"hidden"}}><div style={{width:(xpCurrent/xpNeeded*100)+"%",height:"100%",background:"var(--gold)",borderRadius:3,transition:"width 0.5s"}}/></div>
          <span style={{fontSize:"0.5rem",fontFamily:"var(--font-mono)",color:"var(--dim)"}}>{xpCurrent}/{xpNeeded}</span>
        </div>
      </div>
      {/* Toast */}
      {toast&&<div className="fade-in" style={{textAlign:"center",padding:"6px 12px",fontSize:"0.8rem",fontWeight:700,color:"var(--gold)",background:"linear-gradient(90deg,transparent,rgba(212,160,23,0.1),transparent)"}}>{toast}</div>}
      {/* Level up */}
      {levelUpMsg&&<div className="fade-in" style={{textAlign:"center",padding:"8px 12px",fontSize:"0.9rem",fontWeight:800,color:"var(--green)",background:"linear-gradient(90deg,transparent,rgba(74,140,63,0.15),transparent)"}}>{"⭐"} {levelUpMsg} {"⭐"}</div>}
      {/* Horse display */}
      <div style={{background:"var(--bg2)",margin:"8px",borderRadius:16,overflow:"hidden",position:"relative",minHeight:200}}>
        <HorseDisplay horse={horse} action={action} particles={particles} moodEmoji={moodData.emoji}/>
      </div>
      {/* Quote */}
      <div className="fade-in" key={quote} style={{textAlign:"center",padding:"0 16px",minHeight:28}}>
        <span style={{fontSize:"0.72rem",color:"var(--dim)",fontStyle:"italic"}}>{quote}</span>
      </div>
      {/* Stats */}
      <div style={{padding:"4px 16px"}}>
        <StatBar icon={"\u{1F955}"} label="Hunger" value={horse.hunger}/>
        <StatBar icon={"\u{1F60A}"} label="Happy" value={horse.happiness}/>
        <StatBar icon={"⚡"} label="Energy" value={horse.energy}/>
        <StatBar icon={"✨"} label="Clean" value={horse.clean}/>
        <StatBar icon={"❤\u{FE0F}"} label="Health" value={horse.health||100}/>
      </div>
      {/* Actions - 3 rows of 4 */}
      <div style={{padding:"6px 12px",display:"flex",flexDirection:"column",gap:5}}>
        <div style={{display:"flex",gap:5}}>
          <ActionBtn icon={"\u{1F955}"} label="Feed" onClick={function(){doAction("feed");}} disabled={horse.sleeping||coins<1}/>
          <ActionBtn icon={"\u{1F9F9}"} label="Brush" onClick={function(){doAction("brush");}} disabled={horse.sleeping}/>
          <ActionBtn icon={"❤\u{FE0F}"} label="Pet" onClick={function(){doAction("pet");}} disabled={horse.sleeping}/>
          <ActionBtn icon={"\u{1F3A0}"} label="Play" onClick={function(){doAction("play");}} disabled={horse.sleeping||horse.energy<15}/>
        </div>
        <div style={{display:"flex",gap:5}}>
          <ActionBtn icon={"\u{1F3C7}"} label="Ride" onClick={function(){doAction("ride");}} disabled={horse.sleeping||horse.energy<25}/>
          <ActionBtn icon={horse.sleeping?"☀\u{FE0F}":"\u{1F319}"} label={horse.sleeping?"Wake":"Sleep"} onClick={function(){doAction(horse.sleeping?"wake":"sleep");}}/>
          <ActionBtn icon={"\u{1F3C1}"} label="Race" onClick={function(){setMiniGame("race");}} disabled={horse.sleeping||horse.energy<10}/>
          <ActionBtn icon={"\u{1F457}"} label="Dress Up" onClick={function(){setShowDressUp(true);}} disabled={horse.sleeping}/>
        </div>
        <div style={{display:"flex",gap:5}}>
          <ActionBtn icon={"\u{1F5FA}\u{FE0F}"} label="Adventure" onClick={doAdventure} disabled={horse.sleeping||horse.energy<20}/>
          <ActionBtn icon={"\u{1F4AA}"} label="Train" onClick={function(){doAction("train");}} disabled={horse.sleeping||horse.energy<20||coins<3}/>
          <ActionBtn icon={"\u{1F4F8}"} label="Photo" onClick={function(){doAction("photo");}}/>
          <ActionBtn icon={"\u{1F483}"} label="Dance" onClick={function(){setMiniGame("dance");}} disabled={horse.sleeping||horse.energy<10}/>
        </div>
        <div style={{display:"flex",gap:5,justifyContent:"center"}}>
          <ActionBtn icon={"\u{1F3EA}"} label="Shop" onClick={function(){setShowShop(true);}}/>
        </div>
      </div>
      {/* Adventure */}
      {adventureState&&(
        <div className="fade-in" style={{margin:"0 12px",padding:14,background:"var(--bg2)",borderRadius:10,border:"1px solid var(--border)",textAlign:"center"}}>
          <div style={{fontSize:"0.82rem",fontWeight:600,marginBottom:8}}>{adventureState.text}</div>
          {adventureState.choices&&!adventureState.resolved?adventureState.choices.map(function(c,i){return <button key={i} onClick={function(){resolveAdventure(c);}} style={{display:"block",width:"100%",padding:"8px 12px",marginBottom:6,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg)",cursor:"pointer",fontSize:"0.75rem",fontWeight:600,textAlign:"left"}}>{c.label} <span style={{color:"var(--gold)",float:"right"}}>{c.coins>0?"+"+c.coins+" coins":""}</span></button>;}):<button onClick={function(){setAdventureState(null);}} style={{marginTop:6,fontSize:"0.65rem",padding:"4px 12px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer"}}>OK</button>}
        </div>
      )}
      {/* Mini-game */}
      {miniGame&&(
        <div style={{margin:"0 12px",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",background:"var(--bg2)"}}>
          {miniGame==="race"&&<RaceGame onFinish={handleRaceFinish}/>}
          {miniGame==="dance"&&<DanceGame onFinish={handleDanceFinish}/>}
          <div style={{textAlign:"center",padding:6}}><button onClick={function(){setMiniGame(null);}} style={{fontSize:"0.65rem",padding:"4px 12px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer"}}>Close</button></div>
        </div>
      )}
      {/* Dress Up modal */}
      {showDressUp&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={function(){setShowDressUp(false);}}>
          <div className="fade-in" onClick={function(e){e.stopPropagation();}} style={{background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:16,padding:20,width:"90%",maxWidth:360,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,color:"var(--brown)",marginBottom:8,textAlign:"center"}}>{"\u{1F457}"} Dress Up</div>
            <div style={{fontSize:"0.7rem",color:"var(--dim)",textAlign:"center",marginBottom:12}}>{"\u{1FA99}"} {coins} coins | Tap owned items to equip/unequip</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {ACCESSORIES.map(function(acc){
                var owned=(horse.owned||[]).indexOf(acc.id)>=0;
                var equipped=(horse.equipped||[]).indexOf(acc.id)>=0;
                var locked=level<acc.level;
                return(
                  <button key={acc.id} onClick={function(){if(locked)return;if(owned)toggleEquip(acc.id);else buyAccessory(acc);}} disabled={locked} style={{padding:"8px 12px",borderRadius:8,border:equipped?"2px solid var(--green)":"1.5px solid var(--border)",background:equipped?"rgba(74,140,63,0.1)":"var(--bg2)",cursor:locked?"not-allowed":"pointer",opacity:locked?0.4:1,display:"flex",alignItems:"center",gap:8,textAlign:"left"}}>
                    <span style={{fontSize:"1.3rem"}}>{acc.emoji}</span>
                    <div style={{flex:1}}><div style={{fontSize:"0.78rem",fontWeight:600}}>{acc.name}{equipped?" (equipped)":""}</div><div style={{fontSize:"0.55rem",color:"var(--dim)"}}>{locked?"Unlocks at Lv."+acc.level:owned?"Owned":"Cost: "+acc.cost+" coins"}</div></div>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}
      {/* Shop modal */}
      {showShop&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={function(){setShowShop(false);}}>
          <div className="fade-in" onClick={function(e){e.stopPropagation();}} style={{background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:16,padding:20,width:"90%",maxWidth:340,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,color:"var(--brown)",marginBottom:12,textAlign:"center"}}>{"\u{1F3EA}"} Horse Shop</div>
            <div style={{fontSize:"0.75rem",color:"var(--dim)",textAlign:"center",marginBottom:12}}>{"\u{1FA99}"} {coins} coins</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[{type:"food",label:"\u{1F955} Carrots",cost:1,desc:"Hunger +25"},{type:"treat",label:"\u{1F34E} Apple Treat",cost:2,desc:"Happy +15, Hunger +10"},{type:"premium",label:"\u{1F370} Premium Feed",cost:5,desc:"Full hunger + Happy +10"},{type:"spa",label:"\u{1F6C1} Spa Day",cost:3,desc:"Full cleanliness"},{type:"royal",label:"\u{1F451} Royal Treatment",cost:8,desc:"Max ALL stats"}].map(function(item){
                return <button key={item.type} onClick={function(){buyShopItem(item.type);}} disabled={coins<item.cost} style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=item.cost?"var(--bg2)":"var(--bg3)",cursor:coins>=item.cost?"pointer":"default",opacity:coins>=item.cost?1:0.5,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:"0.85rem"}}>{item.label}</div><div style={{fontSize:"0.6rem",color:"var(--dim)"}}>{item.desc}</div></div><span style={{fontFamily:"var(--font-mono)",color:"var(--gold)",fontSize:"0.8rem"}}>{"\u{1FA99}"} {item.cost}</span></button>;
              })}
            </div>
          </div>
        </div>
      )}
      {/* Footer */}
      <div style={{textAlign:"center",padding:"8px",fontSize:"0.55rem",color:"var(--dim)",fontFamily:"var(--font-mono)",marginTop:"auto"}}>made for Lily {"\u{1F495}"}</div>
    </div>
  );
}

// ── App
function App(){
  var[horse,setHorse]=useState(loadHorse);
  var createHorse=function(name,coat){
    var h={name:name,coat:coat||"brown",hunger:80,happiness:70,energy:100,clean:90,health:100,sleeping:false,coins:10,level:1,xp:0,created:Date.now(),owned:[],equipped:[]};
    saveHorse(h);setHorse(h);
  };
  if(!horse)return <NamePicker onPick={createHorse}/>;
  return <Game horse={horse}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
