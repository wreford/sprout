<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ice Fishing</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none;font-family:'Press Start 2P',monospace}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;-ms-interpolation-mode:nearest-neighbor}
#scanlines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px)}
#actionBtn{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);padding:14px 40px;font-size:10px;font-family:'Press Start 2P',monospace;background:#0058f8;color:#fcfcfc;border:3px solid #003080;cursor:pointer;z-index:20;touch-action:manipulation;text-align:center;letter-spacing:1px;min-width:140px;image-rendering:pixelated}
#actionBtn:active{background:#003080}
#actionBtn.hook{background:#f83800;border-color:#b81010;animation:pulse8 0.25s infinite alternate}
#actionBtn.reel{background:#00a800;border-color:#005800}
#actionBtn.jig{background:#f8b800;border-color:#b86800}
@keyframes pulse8{from{transform:translateX(-50%) scale(1)}to{transform:translateX(-50%) scale(1.06)}}
#shopBtn{position:absolute;bottom:12px;right:8px;padding:8px 12px;font-size:7px;font-family:'Press Start 2P',monospace;background:#787878;color:#fcfcfc;border:2px solid #484848;cursor:pointer;z-index:20}
#statsBtn{position:absolute;bottom:12px;left:8px;padding:8px 12px;font-size:7px;font-family:'Press Start 2P',monospace;background:#787878;color:#fcfcfc;border:2px solid #484848;cursor:pointer;z-index:20}
#shopOverlay,#statsOverlay,#fishPopup,#leaderOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:40;display:none;overflow-y:auto;padding:30px 12px 12px;font-family:'Press Start 2P',monospace}
#shopOverlay h2,#statsOverlay h2,#leaderOverlay h2{color:#f8d800;text-align:center;margin-bottom:10px;font-size:12px}
.shopItem{background:#181830;border:3px solid #787878;padding:10px;margin:6px 0;display:flex;justify-content:space-between;align-items:center;color:#fcfcfc}
.shopItem.owned{border-color:#00a800;opacity:0.5}
.shopItem .info{flex:1}
.shopItem .info h3{font-size:8px;color:#f8d800;margin-bottom:4px}
.shopItem .info p{font-size:6px;color:#bcbcbc}
.shopItem button{padding:6px 12px;font-size:7px;font-family:'Press Start 2P',monospace;background:#0058f8;color:#fcfcfc;border:2px solid #003080;cursor:pointer}
.shopItem button:disabled{background:#484848;border-color:#333;color:#787878;cursor:default}
.closeBtn{display:block;margin:12px auto 0;padding:8px 24px;font-size:9px;font-family:'Press Start 2P',monospace;background:#f83800;color:#fcfcfc;border:2px solid #b81010;cursor:pointer}
.statRow{display:flex;justify-content:space-between;padding:5px 6px;border-bottom:1px solid #333;color:#fcfcfc;font-size:7px}
.statRow span:first-child{color:#f8d800}
#fishPopup{display:none;align-items:center;justify-content:center;flex-direction:column;padding:0}
#fishPopup .inner{background:#181830;border:4px solid #f8d800;padding:16px;text-align:center;color:#fcfcfc;max-width:240px;width:90%}
#fishPopup h2{color:#f8d800;font-size:11px;margin-bottom:6px}
#fishPopup p{margin:3px 0;font-size:7px}
#fishPopup .weight{font-size:12px;color:#fcfcfc;margin:6px 0}
#fishPopup .sizeCategory{font-size:8px;margin:4px 0}
#fishPopup .pb{color:#f83800;font-size:7px}
#fishPopup .value{color:#00a800;font-size:8px}
#fishPopup canvas{margin:8px auto;display:block;image-rendering:pixelated}
#fishPopup button{margin-top:10px;padding:8px 20px;font-size:8px;font-family:'Press Start 2P',monospace;background:#0058f8;color:#fcfcfc;border:2px solid #003080;cursor:pointer}
.leaderEntry{background:#181830;border:2px solid #484848;padding:6px 8px;margin:4px 0;color:#fcfcfc;font-size:7px;display:flex;justify-content:space-between}
.leaderEntry.top{border-color:#f8d800}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="scanlines"></div>
  <button id="actionBtn" onclick="onAction()">START DAY</button>
  <button id="shopBtn" onclick="openShop()">SHOP</button>
  <button id="statsBtn" onclick="openStats()">LOG</button>
  <div id="shopOverlay">
    <h2>TACKLE SHOP</h2>
    <div id="shopItems"></div>
    <button class="closeBtn" onclick="closeShop()">CLOSE</button>
  </div>
  <div id="statsOverlay">
    <h2>FISH LOG</h2>
    <div id="statsItems"></div>
    <button class="closeBtn" onclick="closeOverlay('statsOverlay')">CLOSE</button>
  </div>
  <div id="leaderOverlay">
    <h2>BEST DAYS</h2>
    <div id="leaderItems"></div>
    <button class="closeBtn" onclick="closeOverlay('leaderOverlay')">CLOSE</button>
  </div>
  <div id="fishPopup">
    <div class="inner">
      <h2 id="fpTitle">CAUGHT!</h2>
      <canvas id="fpCanvas" width="48" height="32"></canvas>
      <p id="fpName"></p>
      <p class="weight" id="fpWeight"></p>
      <p class="sizeCategory" id="fpSize"></p>
      <p class="pb" id="fpPB" style="display:none">NEW PERSONAL BEST!</p>
      <p class="value" id="fpValue"></p>
      <button onclick="closeFishPopup()">OK</button>
    </div>
  </div>
</div>
<script>
// ===== CANVAS SETUP =====
const W=240,H=400;
const canvas=document.getElementById('c');
canvas.width=W;canvas.height=H;
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

function resizeCanvas(){
  const wr=document.getElementById('wrap');
  const aspect=W/H;
  let cw=wr.clientWidth,ch=wr.clientHeight;
  if(cw/ch>aspect){cw=ch*aspect}else{ch=cw/aspect}
  canvas.style.width=Math.floor(cw)+'px';
  canvas.style.height=Math.floor(ch)+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// ===== NES PALETTE =====
const PAL={
  black:'#000000',white:'#fcfcfc',red:'#f83800',green:'#00a800',
  blue:'#0058f8',yellow:'#f8d800',dkred:'#b81010',ltblue:'#0078f8',
  gray:'#787878',ltgray:'#bcbcbc',salmon:'#f87858',ltgreen:'#58d854',
  periwinkle:'#6888fc',orange:'#f8b800',dkblue:'#003080',dkgreen:'#005800',
  brown:'#b86800',dkbrown:'#683800',sky:'#88c0f8',dksky:'#5080b8',
  purple:'#6828a0',ltpurple:'#9858f8',pink:'#f878f8',teal:'#00a888',
  ice:'#d8e8f8',icedk:'#a8c8e8',icelt:'#e8f0fc',water:'#003880',
  waterlt:'#0050a8',hole:'#001830'
};

// ===== FISH DATA (ice fishing species) =====
const FISH=[
  {name:'YELLOW PERCH',w:10,h:5,colors:[PAL.orange,PAL.dkbrown,PAL.black],weight:[0.2,1.5],rarity:0.45,fight:0.15,value:3,speed:0.8},
  {name:'CRAPPIE',w:8,h:6,colors:[PAL.ltgray,PAL.gray,PAL.black],weight:[0.2,1.2],rarity:0.40,fight:0.10,value:2,speed:0.7},
  {name:'WHITEFISH',w:12,h:5,colors:[PAL.white,PAL.ltgray,PAL.black],weight:[1,5],rarity:0.35,fight:0.20,value:5,speed:1.0},
  {name:'WALLEYE',w:14,h:6,colors:[PAL.yellow,PAL.brown,PAL.black,PAL.white],weight:[2,12],rarity:0.12,fight:0.55,value:20,speed:1.3},
  {name:'NORTHERN PIKE',w:18,h:5,colors:[PAL.green,PAL.dkgreen,PAL.black,PAL.yellow],weight:[3,18],rarity:0.10,fight:0.75,value:25,speed:1.8},
  {name:'LAKE TROUT',w:16,h:6,colors:[PAL.salmon,PAL.dkred,PAL.black,PAL.ltgray],weight:[3,20],rarity:0.06,fight:0.85,value:40,speed:2.0},
  {name:'BURBOT',w:14,h:5,colors:[PAL.brown,PAL.dkbrown,PAL.black,PAL.orange],weight:[1,8],rarity:0.08,fight:0.45,value:15,speed:0.6},
];

// ===== CONDITIONS =====
const CONDITIONS=['CLEAR','SNOWY','BLIZZARD'];
let dayCondition='CLEAR';

// ===== GAME STATE =====
// states: title, drilling, jigging, bite, fight, caught, dayend
let state='title';
let money=0,totalCaught=0,totalWeight=0;
let dayTimer=180; // 3 minutes per day
let dayRunning=false;
let dayNumber=1;
let dayWeight=0;
let dayCatches=0;

// Drilling
let drillX=0,drillY=0;
let drillTimer=0,drillDuration=1.5;
let holeX=120,holeY=180;
let holeReady=false;
let pickingHole=false;

// Jigging
let jigY=0,jigBaseY=0;
let jigBounce=0;
let rhythmBar=0; // 0-1, the position of the beat indicator
let rhythmSpeed=1.2; // beats per second
let rhythmScore=0; // 0-1 how well you're jigging
let rhythmHits=0,rhythmMisses=0;
let lastTapTime=0;
let sweetSpotPos=0.5; // where the sweet spot is on the rhythm bar
let sweetSpotDir=1;
let fishInterest=0; // 0-1 how interested fish are
let biteReady=false;
let biteTimer=0;
let approachingFish=[];

// Fight
let tension=0.5,progress=0;
let reeling=false;
let currentFish=null,currentFishType=-1,currentFishWeight=0;
let fightTimer=0;
let fishFightX=0,fishFightY=0,fishDir=1,fishTargetX=0;

// Tip-up flag
let flagUp=false;
let flagTimer=0;
let hookWindow=2.0;

// Visual
let caughtAnimTimer=0;
let msgText='',msgTimer=0;
let msg2Text='',msg2Timer=0;
let shakeAmount=0,shakeDuration=0;

// Under-ice fish shadows
let shadowFish=[];
const MAX_SHADOWS=6;

// Snow particles
let snowParticles=[];
const MAX_SNOW=60;

// Breath vapor
let breathTimer=0;
let breathPuffs=[];

// Huts in background
const huts=[
  {x:20,y:60,w:18,h:14},
  {x:195,y:45,w:16,h:12},
  {x:80,y:35,w:14,h:11},
];

// Tip-up flags on other holes
const otherHoles=[
  {x:50,y:90,flagUp:false,timer:0},
  {x:180,y:75,flagUp:false,timer:0},
  {x:140,y:50,flagUp:false,timer:0},
];

// Ice cracks
const iceCracks=[];
function generateCracks(){
  iceCracks.length=0;
  for(let i=0;i<8;i++){
    const sx=Math.random()*W;
    const sy=20+Math.random()*(H*0.45);
    const segs=2+Math.floor(Math.random()*3);
    const pts=[{x:sx,y:sy}];
    for(let j=0;j<segs;j++){
      pts.push({x:pts[j].x+(Math.random()-0.5)*40,y:pts[j].y+(Math.random()-0.5)*25});
    }
    iceCracks.push(pts);
  }
}
generateCracks();

// Aurora
let auroraPhase=0;

// Upgrades
let upgrades={auger:0,sonar:0,heater:0,jigs:0,tipup:0};
const SHOP_ITEMS=[
  {id:'auger',name:'POWER AUGER',desc:'Drill holes 40% faster',cost:[30,80],max:2},
  {id:'sonar',name:'FISH SONAR',desc:'See fish under ice clearer',cost:[50,120],max:2},
  {id:'heater',name:'ICE HEATER',desc:'+30s per day session',cost:[40,100],max:2},
  {id:'jigs',name:'PREMIUM JIGS',desc:'Attract rarer fish',cost:[60,150],max:2},
  {id:'tipup',name:'TIP-UP SYSTEM',desc:'Auto-fish other holes',cost:[80,200],max:2},
];

// Personal bests
let personalBest={};
let fishCaughtCount={};

// Leaderboard (best days)
let bestDays=[];

// Particles (generic)
let particles=[];

// ===== SAVE/LOAD =====
function saveGame(){
  const d={money,totalCaught,totalWeight,dayNumber,upgrades,personalBest,fishCaughtCount,bestDays};
  try{localStorage.setItem('icefishing_save',JSON.stringify(d))}catch(e){}
}
function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem('icefishing_save'));
    if(d){
      money=d.money||0;totalCaught=d.totalCaught||0;totalWeight=d.totalWeight||0;
      dayNumber=d.dayNumber||1;upgrades=d.upgrades||upgrades;
      personalBest=d.personalBest||{};fishCaughtCount=d.fishCaughtCount||{};
      bestDays=d.bestDays||[];
    }
  }catch(e){}
}
loadGame();

// ===== 8-BIT AUDIO =====
let audioCtx=null;
function initAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
}
function playTone(freq,dur,type,vol,slide){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(slide)o.frequency.linearRampToValueAtTime(slide,audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol||0.08,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playNoise(dur,vol){
  if(!audioCtx)return;
  try{
    const bufSize=audioCtx.sampleRate*dur;
    const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*0.5;
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    const g=audioCtx.createGain();
    g.gain.setValueAtTime(vol||0.04,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
    src.connect(g);g.connect(audioCtx.destination);
    src.start();
  }catch(e){}
}
function sfxDrill(){playTone(200,0.3,'sawtooth',0.06,80);playNoise(0.3,0.05);}
function sfxJig(){playTone(600,0.05,'square',0.04);}
function sfxBite(){playTone(880,0.1,'square',0.1);setTimeout(()=>playTone(1100,0.1,'square',0.1),120);}
function sfxHookSet(){playTone(440,0.15,'square',0.08,660);}
function sfxReel(){playTone(300+Math.random()*100,0.03,'square',0.02);}
function sfxSnap(){playNoise(0.3,0.08);playTone(200,0.2,'sawtooth',0.06,80);}
function sfxCatch(){playTone(523,0.1,'square',0.1);setTimeout(()=>playTone(659,0.1,'square',0.1),100);setTimeout(()=>playTone(784,0.15,'square',0.1),200);}
function sfxTrophy(){playTone(523,0.1,'square',0.12);setTimeout(()=>playTone(659,0.1,'square',0.12),120);setTimeout(()=>playTone(784,0.1,'square',0.12),240);setTimeout(()=>playTone(1047,0.2,'square',0.12),360);}
function sfxBlip(){playTone(440,0.05,'square',0.04);}
function sfxWind(){playNoise(1.0,0.015);}
function sfxDayEnd(){playTone(400,0.2,'triangle',0.08,200);}
function sfxRhythmGood(){playTone(700,0.04,'square',0.03);}
function sfxRhythmMiss(){playTone(200,0.06,'square',0.02);}

// ===== PARTICLES =====
function spawnParticle(x,y,color,vx,vy,life,size){
  particles.push({x,y,color,vx:vx||0,vy:vy||-1,life:life||1,maxLife:life||1,size:size||1});
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;
    p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    if(p.life<=0)continue;
    ctx.globalAlpha=Math.min(1,p.life/p.maxLife);
    ctx.fillStyle=p.color;
    ctx.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);
  }
  ctx.globalAlpha=1;
}
function spawnSplash(x,y,count){
  for(let i=0;i<count;i++){
    spawnParticle(x+(Math.random()-0.5)*10,y,
      Math.random()<0.5?PAL.ltblue:PAL.white,
      (Math.random()-0.5)*3,-Math.random()*4-1,0.5+Math.random()*0.5,1);
  }
}
function spawnTrophySparkles(x,y){
  const colors=[PAL.yellow,PAL.red,PAL.white,PAL.orange];
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2;
    const s=1+Math.random()*3;
    spawnParticle(x,y,colors[i%colors.length],Math.cos(a)*s,Math.sin(a)*s-2,1+Math.random(),1);
  }
}

// ===== SNOW =====
function initSnow(){
  snowParticles=[];
  const count=dayCondition==='BLIZZARD'?MAX_SNOW*2:dayCondition==='SNOWY'?MAX_SNOW:MAX_SNOW/2;
  for(let i=0;i<count;i++){
    snowParticles.push({
      x:Math.random()*W,y:Math.random()*H,
      vy:0.3+Math.random()*0.5,vx:(Math.random()-0.5)*0.3,
      size:Math.random()<0.3?2:1,
      wobble:Math.random()*Math.PI*2
    });
  }
}
function updateSnow(dt){
  const windX=dayCondition==='BLIZZARD'?1.5:0.3;
  for(const s of snowParticles){
    s.wobble+=dt*2;
    s.x+=s.vx*60*dt+Math.sin(s.wobble)*0.3+windX*dt*30;
    s.y+=s.vy*60*dt;
    if(s.y>H){s.y=-2;s.x=Math.random()*W;}
    if(s.x>W)s.x=0;
    if(s.x<0)s.x=W;
  }
}
function drawSnow(){
  ctx.fillStyle=PAL.white;
  for(const s of snowParticles){
    ctx.globalAlpha=0.7+Math.random()*0.3;
    ctx.fillRect(Math.floor(s.x),Math.floor(s.y),s.size,s.size);
  }
  ctx.globalAlpha=1;
}

// ===== SHADOW FISH (under ice) =====
function initShadowFish(){
  shadowFish=[];
  for(let i=0;i<MAX_SHADOWS;i++){
    shadowFish.push({
      x:Math.random()*W,y:200+Math.random()*150,
      vx:(Math.random()-0.5)*0.8,
      w:4+Math.random()*8,h:2+Math.random()*3,
      dir:Math.random()<0.5?1:-1,
      speed:0.3+Math.random()*0.5
    });
  }
}
function updateShadowFish(dt){
  for(const f of shadowFish){
    f.x+=f.vx*f.speed*60*dt*f.dir;
    if(f.x>W+20){f.x=-20;f.dir=1;}
    if(f.x<-20){f.x=W+20;f.dir=-1;}
    // Wiggle
    f.y+=Math.sin(performance.now()*0.002+f.x)*0.2;
    f.y=Math.max(200,Math.min(H-10,f.y));
  }
}
function drawShadowFish(){
  const sonarLevel=upgrades.sonar;
  const baseAlpha=0.15+sonarLevel*0.15;
  for(const f of shadowFish){
    ctx.globalAlpha=baseAlpha;
    ctx.fillStyle=PAL.dkblue;
    const fx=Math.floor(f.x);
    const fy=Math.floor(f.y);
    // Simple fish shape
    ctx.fillRect(fx,fy,Math.floor(f.w),Math.floor(f.h));
    // Tail
    const tw=Math.floor(f.w*0.3);
    if(f.dir>0){
      ctx.fillRect(fx-tw,fy-1,tw,Math.floor(f.h)+2);
    }else{
      ctx.fillRect(fx+Math.floor(f.w),fy-1,tw,Math.floor(f.h)+2);
    }
  }
  ctx.globalAlpha=1;
}

// ===== APPROACHING FISH (jigging phase) =====
function initApproachFish(){
  approachingFish=[];
  for(let i=0;i<3;i++){
    approachingFish.push({
      x:holeX+(Math.random()-0.5)*80,
      y:holeY+40+Math.random()*60,
      interest:0,
      targetX:holeX,targetY:holeY+20,
      w:4+Math.random()*4,
      speed:0.5+Math.random()*0.5
    });
  }
}

// ===== BREATH VAPOR =====
function updateBreath(dt){
  breathTimer-=dt;
  if(breathTimer<=0){
    breathTimer=2+Math.random()*2;
    // Player is near the hole
    breathPuffs.push({x:holeX-8,y:holeY-30,size:2,life:1.5,maxLife:1.5});
  }
  for(let i=breathPuffs.length-1;i>=0;i--){
    const b=breathPuffs[i];
    b.x-=dt*3;b.y-=dt*8;b.size+=dt*2;b.life-=dt;
    if(b.life<=0)breathPuffs.splice(i,1);
  }
}
function drawBreath(){
  for(const b of breathPuffs){
    ctx.globalAlpha=(b.life/b.maxLife)*0.4;
    ctx.fillStyle=PAL.white;
    const s=Math.floor(b.size);
    ctx.fillRect(Math.floor(b.x),Math.floor(b.y),s,s);
    ctx.fillRect(Math.floor(b.x)+1,Math.floor(b.y)-1,s-1,s+1);
  }
  ctx.globalAlpha=1;
}

// ===== DRAW PIXEL FISH =====
function drawPixelFish(c,typeIdx,x,y,dir,wobble){
  const f=FISH[typeIdx];
  if(!f)return;
  const fw=f.w,fh=f.h;
  const px=Math.floor(x-fw/2);
  const py=Math.floor(y-fh/2+Math.sin(wobble)*1);
  // Body
  c.fillStyle=f.colors[0];
  c.fillRect(px,py,fw,fh);
  // Stripe/belly
  c.fillStyle=f.colors[1];
  c.fillRect(px,py+Math.floor(fh*0.6),fw,Math.ceil(fh*0.4));
  // Eye
  c.fillStyle=f.colors[2];
  if(dir>0){
    c.fillRect(px+fw-3,py+1,2,2);
  }else{
    c.fillRect(px+1,py+1,2,2);
  }
  // Tail
  c.fillStyle=f.colors[1];
  if(dir>0){
    c.fillRect(px-2,py-1,3,fh+2);
  }else{
    c.fillRect(px+fw-1,py-1,3,fh+2);
  }
  // Accent color
  if(f.colors[3]){
    c.fillStyle=f.colors[3];
    c.fillRect(px+Math.floor(fw*0.3),py,Math.floor(fw*0.3),1);
  }
}

// ===== FISH SIZE =====
function getFishSizeCategory(typeIdx,weight){
  const f=FISH[typeIdx];
  const range=f.weight[1]-f.weight[0];
  if(range===0)return{label:'MEDIUM',color:PAL.white,tier:2};
  const pct=(weight-f.weight[0])/range;
  if(pct>=0.95)return{label:'LEGENDARY',color:PAL.ltpurple,tier:5};
  if(pct>=0.85)return{label:'TROPHY',color:PAL.yellow,tier:4};
  if(pct>=0.60)return{label:'LARGE',color:PAL.green,tier:3};
  if(pct>=0.30)return{label:'MEDIUM',color:PAL.white,tier:2};
  if(pct>=0.10)return{label:'SMALL',color:PAL.ltgray,tier:1};
  return{label:'TINY',color:PAL.gray,tier:0};
}

// ===== CHOOSE FISH =====
function chooseFish(){
  const jigLevel=upgrades.jigs;
  // Weight by rarity, jigs upgrade boosts rare
  let pool=[];
  for(let i=0;i<FISH.length;i++){
    let w=FISH[i].rarity;
    if(jigLevel>0&&FISH[i].rarity<0.15)w*=(1+jigLevel*0.4);
    // Burbot more common in blizzard
    if(FISH[i].name==='BURBOT'&&dayCondition==='BLIZZARD')w*=3;
    pool.push({idx:i,w});
  }
  const totalW=pool.reduce((a,b)=>a+b.w,0);
  let r=Math.random()*totalW;
  for(const p of pool){
    r-=p.w;
    if(r<=0)return p.idx;
  }
  return 0;
}

// ===== RHYTHM MECHANIC =====
function updateRhythm(dt){
  // Move the rhythm bar indicator
  rhythmBar+=dt*rhythmSpeed;
  if(rhythmBar>1)rhythmBar-=1;

  // Move sweet spot slowly
  sweetSpotPos+=sweetSpotDir*dt*0.15;
  if(sweetSpotPos>0.8){sweetSpotPos=0.8;sweetSpotDir=-1;}
  if(sweetSpotPos<0.2){sweetSpotPos=0.2;sweetSpotDir=1;}

  // Decay fish interest over time
  fishInterest=Math.max(0,fishInterest-dt*0.05);

  // Move approaching fish based on interest
  for(const af of approachingFish){
    const tx=holeX;
    const ty=holeY+15;
    const dx=tx-af.x;
    const dy=ty-af.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    // Move toward hole based on interest
    if(fishInterest>0.3&&dist>8){
      af.x+=dx/dist*fishInterest*af.speed*30*dt;
      af.y+=dy/dist*fishInterest*af.speed*30*dt;
    }else if(fishInterest<0.2&&dist<40){
      // Drift away
      af.x-=dx/dist*0.2*30*dt;
      af.y-=dy/dist*0.2*30*dt;
    }
    // Wiggle
    af.x+=Math.sin(performance.now()*0.003+af.y)*0.3;
  }

  // Bite countdown
  if(fishInterest>0.5){
    biteTimer-=dt*fishInterest;
  }
  if(biteTimer<=0&&!biteReady){
    triggerBite();
  }
}

function tapJig(){
  const now=performance.now()/1000;
  // Check if tap is near sweet spot
  const dist=Math.abs(rhythmBar-sweetSpotPos);
  const wrapped=Math.min(dist,1-dist);
  if(wrapped<0.15){
    // Good hit
    rhythmHits++;
    fishInterest=Math.min(1,fishInterest+0.12);
    rhythmScore=Math.min(1,rhythmScore+0.1);
    jigBounce=-4;
    sfxJig();
    sfxRhythmGood();
    // Sparkle
    spawnParticle(holeX,holeY,PAL.yellow,(Math.random()-0.5)*2,-2,0.4,1);
  }else if(wrapped<0.25){
    // OK hit
    rhythmHits++;
    fishInterest=Math.min(1,fishInterest+0.05);
    rhythmScore=Math.min(1,rhythmScore+0.03);
    jigBounce=-2;
    sfxJig();
  }else{
    // Miss
    rhythmMisses++;
    fishInterest=Math.max(0,fishInterest-0.08);
    rhythmScore=Math.max(0,rhythmScore-0.05);
    jigBounce=-1;
    sfxRhythmMiss();
  }
  lastTapTime=now;
}

// ===== FIGHT =====
function startFight(){
  state='fight';
  tension=0.5;
  progress=0;
  reeling=false;
  fightTimer=0;
  fishFightX=holeX;
  fishFightY=holeY+60;
  fishDir=1;
  fishTargetX=holeX;
  showMsg(currentFish.name+'!');
  updateButton('reel');
}

function updateFight(dt){
  if(state!=='fight')return;
  fightTimer+=dt;
  const f=currentFish;
  const fightStr=f.fight;
  const snapThresh=0.88;
  const escapeThresh=0.10;

  // Fish movement
  fishFightX+=(fishTargetX-fishFightX)*2*dt;
  fishFightY+=Math.sin(performance.now()*0.01)*fightStr*15*dt;
  fishFightY=Math.max(holeY+10,Math.min(H-20,fishFightY));

  if(Math.random()<dt*2){
    fishTargetX=holeX-40+Math.random()*80;
    fishDir=fishTargetX>fishFightX?1:-1;
  }

  if(reeling){
    tension+=dt*(0.4+fightStr*0.3);
    progress+=dt*(0.15+0.1)*(1-fightStr*0.3);
    fishFightX+=(holeX-fishFightX)*dt*0.5;
    fishFightY+=(holeY+20-fishFightY)*dt*0.3;
    if(Math.random()<0.3)sfxReel();
  }else{
    tension-=dt*0.35;
    const pull=fightStr*(0.3+Math.random()*0.7)*dt;
    tension+=pull*0.25;
    progress-=dt*0.03*fightStr;
  }

  // Random surges
  if(Math.random()<dt*fightStr*1.5)tension+=fightStr*0.08;

  tension=Math.max(0.05,Math.min(1,tension));
  progress=Math.max(0,Math.min(1,progress));

  // Check outcomes after initial grace period
  if(fightTimer>1.0){
    if(tension>snapThresh){
      state='jigging';showMsg('LINE SNAPPED!');sfxSnap();
      biteReady=false;biteTimer=5+Math.random()*5;fishInterest=0;
      updateButton('jig');return;
    }
    if(tension<escapeThresh){
      state='jigging';showMsg('FISH ESCAPED!');sfxSnap();
      biteReady=false;biteTimer=5+Math.random()*5;fishInterest=0;
      updateButton('jig');return;
    }
  }
  if(progress>=1)catchFish();
}

// ===== CATCH =====
function catchFish(){
  state='caught';
  caughtAnimTimer=0;
  const f=FISH[currentFishType];
  const sizeInfo=getFishSizeCategory(currentFishType,currentFishWeight);

  if(sizeInfo.tier>=4)sfxTrophy();else sfxCatch();

  totalCaught++;
  dayCatches++;
  const wLbs=currentFishWeight;
  dayWeight+=wLbs;
  totalWeight+=wLbs;

  let val=Math.floor(f.value*(currentFishWeight/f.weight[1]*0.5+0.75));
  if(sizeInfo.tier>=5)val=Math.floor(val*3);
  else if(sizeInfo.tier>=4)val=Math.floor(val*2);
  else if(sizeInfo.tier>=3)val=Math.floor(val*1.3);
  money+=val;

  fishCaughtCount[f.name]=(fishCaughtCount[f.name]||0)+1;

  let isPB=false;
  if(!personalBest[f.name]||currentFishWeight>personalBest[f.name]){
    personalBest[f.name]=currentFishWeight;isPB=true;
  }

  spawnSplash(holeX,holeY,10);
  if(sizeInfo.tier>=4){spawnTrophySparkles(holeX,holeY-10);triggerShake(4,0.5);}

  saveGame();

  // Post to parent window
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({
        type:'game-fish-caught',
        species:f.name,
        weightKg:Math.round(currentFishWeight*453.592)/1000,
        weightLbs:currentFishWeight,
        source:'icefishing'
      },'*');
    }
  }catch(e){}

  const capturedVal=val;
  const capturedSizeInfo=sizeInfo;
  const capturedIsPB=isPB;
  setTimeout(()=>{
    showFishPopup(f,currentFishWeight,capturedVal,capturedIsPB,capturedSizeInfo);
  },1200);
}

function showFishPopup(f,weight,val,isPB,sizeInfo){

// ===== TIP-UP (other holes) =====
function updateOtherHoles(dt){
  const tipLevel=upgrades.tipup;
  if(tipLevel<=0)return;
  for(const h of otherHoles){
    if(!h.flagUp){
      h.timer-=dt;
      if(h.timer<=0){
        h.flagUp=true;
        h.timer=8+Math.random()*10;
        // Auto-catch for tip-up
        if(tipLevel>=2){
          // Auto catch small fish
          const fi=Math.random()<0.7?0:Math.random()<0.5?1:2; // common fish
          const f=FISH[fi];
          const w=Math.round((f.weight[0]+Math.random()*(f.weight[1]-f.weight[0])*0.5)*10)/10;
          const val=Math.floor(f.value*0.5);
          money+=val;
          dayWeight+=w;
          dayCatches++;
          totalCaught++;
          totalWeight+=w;
          fishCaughtCount[f.name]=(fishCaughtCount[f.name]||0)+1;
          showMsg2('TIP-UP: '+f.name+'!');
        }
      }
    }else{
      h.timer-=dt;
      if(h.timer<=0){h.flagUp=false;h.timer=10+Math.random()*15;}
    }
  }
}

function openShop(){
  if(state==='fight'||state==='bite')return;
  const cont=document.getElementById('shopItems');
  cont.innerHTML='';
  for(const item of SHOP_ITEMS){
    const lvl=upgrades[item.id]||0;
    const maxed=lvl>=item.max;
    const cost=maxed?0:item.cost[lvl];
    const div=document.createElement('div');
    div.className='shopItem'+(maxed?' owned':'');
    div.innerHTML=`<div class="info"><h3>${item.name}${maxed?' (MAX)':' LV'+(lvl+1)}</h3><p>${item.desc}</p></div>`;
    if(!maxed){
      const btn=document.createElement('button');
      btn.textContent='$'+cost;
      btn.disabled=money<cost;
      btn.onclick=()=>{
        if(money>=cost){
          money-=cost;
          upgrades[item.id]=(upgrades[item.id]||0)+1;
          sfxBlip();
          saveGame();
          openShop();
        }
      };
      div.appendChild(btn);
    }
    cont.appendChild(div);
  }
  document.getElementById('shopOverlay').style.display='block';
}

// ===== DRAW =====
function drawScene(){
  // Sky/horizon at top (thin strip)
  const isNight=dayCondition==='BLIZZARD'; // blizzard = dark
  if(isNight){
    ctx.fillStyle='#101828';
    ctx.fillRect(0,0,W,30);
    // Aurora borealis
    drawAurora();
  }else{
    ctx.fillStyle=PAL.dksky;
    ctx.fillRect(0,0,W,30);
  }

  // Ice surface
  ctx.fillStyle=PAL.ice;
  ctx.fillRect(0,30,W,H-30);

  // Ice texture - lighter patches
  ctx.fillStyle=PAL.icelt;
  for(let i=0;i<12;i++){
    const px=(i*37+13)%W;
    const py=50+(i*23)%180;
    ctx.fillRect(px,py,8+i%5,4+i%3);
  }

  // Ice cracks
  ctx.strokeStyle=PAL.icedk;
  ctx.lineWidth=1;
  for(const crack of iceCracks){
    ctx.beginPath();
    ctx.moveTo(Math.floor(crack[0].x),Math.floor(crack[0].y));
    for(let i=1;i<crack.length;i++){
      ctx.lineTo(Math.floor(crack[i].x),Math.floor(crack[i].y));
    }
    ctx.stroke();
  }

  // Background huts
  for(const h of huts){
    // Hut body
    ctx.fillStyle='#684830';
    ctx.fillRect(h.x,h.y,h.w,h.h);
    // Roof
    ctx.fillStyle='#b81010';
    ctx.fillRect(h.x-1,h.y-3,h.w+2,4);
    // Snow on roof
    ctx.fillStyle=PAL.white;
    ctx.fillRect(h.x-1,h.y-4,h.w+2,2);
    // Door
    ctx.fillStyle=PAL.dkbrown;
    ctx.fillRect(h.x+Math.floor(h.w/2)-2,h.y+h.h-6,4,6);
  }

  // Other holes and tip-up flags
  for(const h of otherHoles){
    // Hole
    ctx.fillStyle=PAL.hole;
    ctx.fillRect(h.x-4,h.y-3,8,6);
    ctx.fillStyle=PAL.water;
    ctx.fillRect(h.x-3,h.y-2,6,4);
    // Stick
    ctx.fillStyle=PAL.brown;
    ctx.fillRect(h.x+5,h.y-10,1,12);
    // Flag
    if(h.flagUp){
      ctx.fillStyle=PAL.red;
      ctx.fillRect(h.x+6,h.y-10,5,3);
    }else{
      ctx.fillStyle=PAL.orange;
      ctx.fillRect(h.x+6,h.y-2,4,2);
    }
  }

  // Under-ice fish shadows (visible through ice)
  if(holeReady||state==='jigging'||state==='bite'||state==='fight'){
    drawShadowFish();
  }

  // The drilled hole
  if(holeReady||state==='jigging'||state==='bite'||state==='fight'||state==='caught'){
    // Hole shadow
    ctx.fillStyle=PAL.hole;
    ctx.fillRect(holeX-10,holeY-7,20,14);
    // Water in hole
    ctx.fillStyle=PAL.water;
    ctx.fillRect(holeX-8,holeY-5,16,10);
    ctx.fillStyle=PAL.waterlt;
    ctx.fillRect(holeX-6,holeY-3,12,6);
    // Ice rim highlight
    ctx.fillStyle=PAL.icelt;
    ctx.fillRect(holeX-10,holeY-8,20,2);
  }

  // Drilling animation
  if(state==='drilling'&&!pickingHole){
    const pct=drillTimer/drillDuration;
    // Auger
    const shake=Math.sin(performance.now()*0.05)*2;
    ctx.fillStyle=PAL.gray;
    ctx.fillRect(drillX-2+shake,drillY-20,4,20);
    ctx.fillStyle=PAL.ltgray;
    ctx.fillRect(drillX-4+shake,drillY-22,8,4);
    // Drilling hole expanding
    const r=Math.floor(pct*8)+2;
    ctx.fillStyle=PAL.icedk;
    ctx.fillRect(drillX-r,drillY-r/2,r*2,r);
    // Ice chips
    if(Math.random()<0.3){
      spawnParticle(drillX+(Math.random()-0.5)*10,drillY,PAL.white,
        (Math.random()-0.5)*3,-Math.random()*2,0.3,1);
    }
  }

  // Player's tip-up flag during bite
  if(state==='bite'&&flagUp){
    // Stick
    ctx.fillStyle=PAL.brown;
    ctx.fillRect(holeX+12,holeY-20,2,22);
    // Flag (animated)
    const flagWave=Math.sin(performance.now()*0.015)*2;
    ctx.fillStyle=PAL.red;
    ctx.fillRect(holeX+14,holeY-20+flagWave,8,4);
    ctx.fillStyle=PAL.orange;
    ctx.fillRect(holeX+14,holeY-16+flagWave,8,1);
  }

  // Player (simple figure near hole)
  if(holeReady||state==='jigging'||state==='bite'||state==='fight'||state==='caught'){
    drawPlayer();
  }

  // Picking hole cursor
  if(state==='drilling'&&pickingHole){
    const blink=Math.sin(performance.now()*0.005)>0;
    if(blink){
      ctx.fillStyle=PAL.red;
      ctx.fillRect(holeX-6,holeY-1,12,2);
      ctx.fillRect(holeX-1,holeY-6,2,12);
    }
  }

  // Jigging visual
  if(state==='jigging'||state==='bite'){
    drawJigging();
  }

  // Fight visual
  if(state==='fight'){
    drawFight();
  }

  // Caught animation
  if(state==='caught'){
    drawCaught();
  }
}

function drawPlayer(){
  const px=holeX-14;
  const py=holeY-28;
  // Body (parka)
  ctx.fillStyle=PAL.red;
  ctx.fillRect(px,py+8,10,10);
  // Head
  ctx.fillStyle=PAL.salmon;
  ctx.fillRect(px+2,py+2,6,6);
  // Hat
  ctx.fillStyle=PAL.blue;
  ctx.fillRect(px+1,py,8,3);
  ctx.fillRect(px+3,py-1,4,1);
  // Arms
  ctx.fillStyle=PAL.red;
  // Rod arm extends to hole
  ctx.fillRect(px+8,py+10,8,2);
  // Rod
  ctx.fillStyle=PAL.brown;
  ctx.fillRect(px+14,py+6,2,8);
  ctx.fillRect(px+14,py+6,1,1);
  // Legs
  ctx.fillStyle=PAL.dkblue;
  ctx.fillRect(px+1,py+18,4,4);
  ctx.fillRect(px+5,py+18,4,4);
  // Boots
  ctx.fillStyle=PAL.dkbrown;
  ctx.fillRect(px,py+22,5,2);
  ctx.fillRect(px+5,py+22,5,2);
}

function drawJigging(){
  // Jig/lure in hole
  const jy=jigBaseY+jigBounce;
  // Line
  ctx.fillStyle=PAL.ltgray;
  ctx.fillRect(holeX,holeY-10,1,jy-holeY+12);
  // Jig lure
  ctx.fillStyle=PAL.yellow;
  ctx.fillRect(holeX-2,Math.floor(jy),4,3);
  ctx.fillStyle=PAL.red;
  ctx.fillRect(holeX-1,Math.floor(jy)+3,2,1);
  // Hook
  ctx.fillStyle=PAL.ltgray;
  ctx.fillRect(holeX,Math.floor(jy)+4,1,2);

  // Approaching fish under ice
  const sonarLevel=upgrades.sonar;
  for(const af of approachingFish){
    ctx.globalAlpha=0.2+sonarLevel*0.15;
    ctx.fillStyle=PAL.dkblue;
    ctx.fillRect(Math.floor(af.x)-Math.floor(af.w/2),Math.floor(af.y),Math.floor(af.w),3);
    ctx.globalAlpha=1;
  }

  // Rhythm bar at bottom
  drawRhythmBar();

  // Fish interest meter
  drawInterestMeter();
}

function drawRhythmBar(){
  const barX=20,barY=H-50,barW=W-40,barH=8;
  // Background
  ctx.fillStyle=PAL.dkblue;
  ctx.fillRect(barX,barY,barW,barH);
  // Border
  ctx.fillStyle=PAL.gray;
  ctx.fillRect(barX,barY-1,barW,1);
  ctx.fillRect(barX,barY+barH,barW,1);

  // Sweet spot
  const ssX=barX+Math.floor(sweetSpotPos*barW);
  const ssW=Math.floor(barW*0.15);
  ctx.fillStyle=PAL.green;
  ctx.fillRect(ssX-Math.floor(ssW/2),barY,ssW,barH);
  // Inner sweet spot
  ctx.fillStyle=PAL.ltgreen;
  ctx.fillRect(ssX-Math.floor(ssW/4),barY+1,Math.floor(ssW/2),barH-2);

  // Beat indicator
  const biX=barX+Math.floor(rhythmBar*barW);
  ctx.fillStyle=PAL.white;
  ctx.fillRect(biX-1,barY-2,3,barH+4);

  // Label
  ctx.fillStyle=PAL.yellow;
  ctx.font='5px "Press Start 2P"';
  ctx.fillText('RHYTHM',barX,barY-4);
}

function drawInterestMeter(){
  const barX=W-30,barY=100,barW=6,barH=60;
  // Background
  ctx.fillStyle=PAL.dkblue;
  ctx.fillRect(barX,barY,barW,barH);
  // Fill
  const fillH=Math.floor(barH*fishInterest);
  let col=PAL.green;
  if(fishInterest>0.7)col=PAL.yellow;
  if(fishInterest>0.9)col=PAL.red;
  ctx.fillStyle=col;
  ctx.fillRect(barX,barY+barH-fillH,barW,fillH);
  // Border
  ctx.strokeStyle=PAL.gray;
  ctx.strokeRect(barX,barY,barW,barH);
  // Label
  ctx.fillStyle=PAL.ltgray;
  ctx.font='4px "Press Start 2P"';
  ctx.save();
  ctx.translate(barX-2,barY+barH);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('INTEREST',0,0);
  ctx.restore();
}

function drawFight(){
  // Line from rod to fish
  ctx.strokeStyle=PAL.ltgray;
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(holeX,holeY-10);
  ctx.lineTo(holeX,holeY+5);
  ctx.lineTo(Math.floor(fishFightX),Math.floor(fishFightY));
  ctx.stroke();

  // Fish under ice (semi-visible)
  ctx.globalAlpha=0.6;
  drawPixelFish(ctx,currentFishType,fishFightX,fishFightY,fishDir,performance.now()*0.005);
  ctx.globalAlpha=1;

  // Tension bar
  drawTensionBar();

  // Progress bar
  drawProgressBar();
}

function drawTensionBar(){
  const bx=10,by=H-65,bw=6,bh=50;
  ctx.fillStyle=PAL.dkblue;
  ctx.fillRect(bx,by,bw,bh);
  const fillH=Math.floor(bh*tension);
  let fillCol=PAL.green;
  if(tension>0.75)fillCol=PAL.red;
  else if(tension>0.6)fillCol=PAL.orange;
  else if(tension<0.2)fillCol=PAL.red;
  else if(tension<0.3)fillCol=PAL.orange;
  ctx.fillStyle=fillCol;
  ctx.fillRect(bx,by+bh-fillH,bw,fillH);
  ctx.strokeStyle=PAL.gray;
  ctx.strokeRect(bx,by,bw,bh);
  // Danger zones
  ctx.fillStyle='rgba(248,56,0,0.3)';
  ctx.fillRect(bx,by,bw,Math.floor(bh*0.12));
  ctx.fillRect(bx,by+bh-Math.floor(bh*0.1),bw,Math.floor(bh*0.1));
  // Label
  ctx.fillStyle=PAL.ltgray;
  ctx.font='4px "Press Start 2P"';
  ctx.fillText('LINE',bx,by-3);
}

function drawProgressBar(){
  const bx=30,by=H-55,bw=W-60,bh=6;
  ctx.fillStyle=PAL.dkblue;
  ctx.fillRect(bx,by,bw,bh);
  const fillW=Math.floor(bw*progress);
  ctx.fillStyle=PAL.green;
  ctx.fillRect(bx,by,fillW,bh);
  ctx.strokeStyle=PAL.gray;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle=PAL.ltgray;
  ctx.font='4px "Press Start 2P"';
  ctx.fillText('REEL IN',bx,by-3);
}

function drawCaught(){
  // Fish coming up through hole
  caughtAnimTimer+=0.016;
  const t=Math.min(1,caughtAnimTimer/1.0);
  const fy=holeY+30*(1-t)-10*t;
  ctx.globalAlpha=0.5+t*0.5;
  drawPixelFish(ctx,currentFishType,holeX,fy,1,performance.now()*0.005);
  ctx.globalAlpha=1;
}

function drawAurora(){
  const colors=[PAL.green,PAL.ltpurple,PAL.teal];
  for(let i=0;i<3;i++){
    ctx.globalAlpha=0.3;
    ctx.strokeStyle=colors[i];
    ctx.lineWidth=2;
    ctx.beginPath();
    for(let x=0;x<W;x+=4){
      const y=8+i*6+Math.sin(x*0.03+auroraPhase+i*2)*5;
      if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawHUD(){
  // Day timer
  if(dayRunning){
    const mins=Math.floor(dayTimer/60);
    const secs=Math.floor(dayTimer%60);
    const timeStr=mins+':'+(secs<10?'0':'')+secs;
    ctx.fillStyle=dayTimer<30?PAL.red:PAL.white;
    ctx.font='8px "Press Start 2P"';
    ctx.fillText(timeStr,W-55,12);
  }

  // Money
  ctx.fillStyle=PAL.yellow;
  ctx.font='7px "Press Start 2P"';
  ctx.fillText('$'+money,5,12);

  // Day weight
  if(dayRunning){
    ctx.fillStyle=PAL.ltgray;
    ctx.font='5px "Press Start 2P"';
    ctx.fillText(dayWeight.toFixed(1)+' LBS',5,22);
    ctx.fillText('DAY '+dayNumber,W-55,22);
  }

  // Condition
  if(dayRunning){
    ctx.fillStyle=dayCondition==='BLIZZARD'?PAL.ltpurple:dayCondition==='SNOWY'?PAL.ltblue:PAL.ltgreen;
    ctx.font='4px "Press Start 2P"';
    ctx.fillText(dayCondition,W/2-15,12);
  }

  // Fish name during fight
  if(state==='fight'&&currentFish){
    ctx.fillStyle=PAL.yellow;
    ctx.font='6px "Press Start 2P"';
    const name=currentFish.name;
    ctx.fillText(name,W/2-name.length*3,35);
    ctx.fillStyle=PAL.white;
    ctx.font='5px "Press Start 2P"';
    ctx.fillText(currentFishWeight.toFixed(1)+' LBS',W/2-20,44);
  }

  // Messages
  if(msgTimer>0){
    ctx.fillStyle=PAL.yellow;
    ctx.font='8px "Press Start 2P"';
    const tw=msgText.length*9;
    ctx.fillText(msgText,W/2-tw/2,H/2-30);
  }
  if(msg2Timer>0){
    ctx.fillStyle=PAL.orange;
    ctx.font='6px "Press Start 2P"';
    const tw=msg2Text.length*7;
    ctx.fillText(msg2Text,W/2-tw/2,H/2-18);
  }

  // Day end summary
  if(state==='dayend'){
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(20,80,W-40,120);
    ctx.strokeStyle=PAL.yellow;
    ctx.strokeRect(20,80,W-40,120);

    ctx.fillStyle=PAL.yellow;
    ctx.font='8px "Press Start 2P"';
    ctx.fillText('DAY '+(dayNumber-1),W/2-30,100);

    ctx.fillStyle=PAL.white;
    ctx.font='6px "Press Start 2P"';
    ctx.fillText('FISH: '+dayCatches,50,120);
    ctx.fillText('WEIGHT: '+dayWeight.toFixed(1)+' LBS',50,135);
    ctx.fillText('CONDITION: '+dayCondition,50,150);

    ctx.fillStyle=PAL.green;
    ctx.font='7px "Press Start 2P"';
    const best=bestDays.length>0?bestDays[0].weight:0;
    if(dayWeight>=best&&dayWeight>0){
      ctx.fillText('NEW RECORD!',W/2-40,170);
    }else{
      ctx.fillText('BEST: '+best.toFixed(1)+' LBS',50,170);
    }
  }

  // Title screen
  if(state==='title'){
    ctx.fillStyle='rgba(0,0,40,0.8)';
    ctx.fillRect(0,0,W,H);

    // Title
    ctx.fillStyle=PAL.white;
    ctx.font='12px "Press Start 2P"';
    ctx.fillText('ICE',W/2-22,100);
    ctx.fillText('FISHING',W/2-42,120);

    // Decorative fish
    drawPixelFish(ctx,3,W/2,155,1,performance.now()*0.003);

    ctx.fillStyle=PAL.ltblue;
    ctx.font='6px "Press Start 2P"';
    ctx.fillText('TAP TO START',W/2-40,200);

    // Stats
    ctx.fillStyle=PAL.ltgray;
    ctx.font='5px "Press Start 2P"';
    ctx.fillText('TOTAL: '+totalCaught+' FISH',40,240);
    ctx.fillText('MONEY: $'+money,40,255);
    if(bestDays.length>0){
      ctx.fillText('BEST DAY: '+bestDays[0].weight.toFixed(1)+' LBS',40,270);
    }

    // Blinking prompt
    if(Math.sin(performance.now()*0.004)>0){
      ctx.fillStyle=PAL.yellow;
      ctx.font='5px "Press Start 2P"';
      ctx.fillText('PRESS START DAY',W/2-48,320);
    }
  }
}

// ===== MAIN LOOP =====
let lastTime=0;
function gameLoop(time){
  const dt=Math.min(0.05,(time-lastTime)/1000);
  lastTime=time;

  // Update
  if(dayRunning){
    dayTimer-=dt;
    if(dayTimer<=0){
      dayTimer=0;
      endDay();
    }
  }

  // Drilling
  if(state==='drilling'&&!pickingHole){
    drillTimer+=dt;
    if(drillTimer%0.3<dt)sfxDrill();
    if(drillTimer>=drillDuration){
      holeReady=true;
      showMsg('HOLE DRILLED!');
      startJigging();
    }
  }

  // Jigging
  if(state==='jigging'){
    updateRhythm(dt);
    jigBounce*=0.9; // Spring back
  }

  // Bite timer
  if(state==='bite'){
    flagTimer-=dt;
    if(flagTimer<=0){
      missedBite();
    }
  }

  // Fight
  updateFight(dt);

  // Other holes tip-up
  if(dayRunning)updateOtherHoles(dt);

  // Snow
  if(dayRunning)updateSnow(dt);

  // Shadow fish
  if(dayRunning)updateShadowFish(dt);

  // Breath
  if(dayRunning&&(state==='jigging'||state==='bite'||state==='fight'))updateBreath(dt);

  // Aurora
  auroraPhase+=dt*0.3;

  // Particles
  updateParticles(dt);

  // Shake
  if(shakeDuration>0){shakeDuration-=dt;if(shakeDuration<=0)shakeAmount=0;}

  // Messages
  if(msgTimer>0)msgTimer-=dt;
  if(msg2Timer>0)msg2Timer-=dt;

  // Wind ambience
  if(dayRunning&&Math.random()<dt*0.05)sfxWind();

  // Other holes random flag toggle
  for(const h of otherHoles){
    if(!dayRunning)continue;
    // handled in updateOtherHoles
  }

  // ===== DRAW =====
  ctx.save();
  if(shakeAmount>0){
    const sx=(Math.random()-0.5)*shakeAmount;
    const sy=(Math.random()-0.5)*shakeAmount;
    ctx.translate(sx,sy);
  }

  // Clear
  ctx.fillStyle=PAL.black;
  ctx.fillRect(0,0,W,H);

  if(state!=='title'){
    drawScene();
    drawSnow();
    drawBreath();
    drawParticles();
  }

  drawHUD();

  ctx.restore();

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
