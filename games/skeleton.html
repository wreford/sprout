<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Skeleton Walk — Genetic Algorithm</title>
  <style>
    :root {
      --bg: #0f0f10;
      --bg2: #1a1a1c;
      --border: #2a2a2d;
      --text: #f0f0f0;
      --dim: #6e6e73;
      --accent: #ff6b35;
      --cyan: #00e5ff;
      --green: #4ade80;
      --magenta: #f472b6;
      --gold: #f7c948;
      --purple: #a78bfa;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow-x: hidden; touch-action: manipulation; user-select: none; }
    a { color: var(--dim); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent); }

    #header {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
      font-size: 0.75rem; z-index: 100; position: relative;
    }
    #header .title { font-size: 0.85rem; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
    #header .sub { color: var(--dim); font-size: 0.65rem; }

    #canvas-wrap {
      position: relative; width: 100%;
      flex: 1 1 auto; min-height: 250px;
    }
    canvas#main { display: block; width: 100%; height: 100%; background: var(--bg); }

    #hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      pointer-events: none; padding: 10px 16px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .hud-col { display: flex; flex-direction: column; gap: 3px; }
    .hud-label { font-size: 10px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .hud-val { font-size: 14px; font-weight: 700; color: var(--text); }
    .hud-val.accent { color: var(--accent); }
    .hud-val.cyan { color: var(--cyan); }
    .hud-val.green { color: var(--green); }

    #controls {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 16px; background: var(--bg2); border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    button.ctrl {
      padding: 7px 14px; font-size: 0.7rem; font-family: var(--mono); font-weight: 600;
      background: var(--border); color: var(--text); border: 1px solid #3a3a3d;
      border-radius: 6px; cursor: pointer; transition: background 0.15s, border-color 0.15s;
      letter-spacing: 0.04em;
    }
    button.ctrl:hover { background: #3a3a3d; border-color: var(--accent); }
    button.ctrl:active { background: var(--accent); color: #000; }
    button.ctrl.active { background: var(--accent); color: #000; border-color: var(--accent); }

    #sliders {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px 16px; padding: 10px 16px; background: var(--bg2); border-top: 1px solid var(--border);
    }
    .slider-row {
      display: flex; align-items: center; gap: 6px;
    }
    .slider-row label { font-size: 0.6rem; color: var(--dim); min-width: 80px; text-align: right; text-transform: uppercase; letter-spacing: 0.05em; }
    .slider-row input[type=range] {
      -webkit-appearance: none; flex: 1; height: 4px; background: var(--border);
      border-radius: 2px; outline: none;
    }
    .slider-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }
    .slider-row .sval { font-size: 0.6rem; color: var(--accent); min-width: 32px; text-align: left; font-weight: 700; }

    #graph-wrap {
      padding: 8px 16px; background: var(--bg); border-top: 1px solid var(--border);
    }
    #graph-wrap h3 { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    canvas#graph { width: 100%; height: 80px; display: block; border-radius: 4px; background: var(--bg2); }

    #hall-of-fame {
      padding: 10px 16px; background: var(--bg); border-top: 1px solid var(--border);
    }
    #hall-of-fame h3 {
      font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 6px;
    }
    #hof-container {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px;
    }
    #hof-container::-webkit-scrollbar { height: 4px; }
    #hof-container::-webkit-scrollbar-track { background: var(--bg2); }
    #hof-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .hof-card {
      flex: 0 0 auto; width: 110px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px; text-align: center;
    }
    .hof-card canvas { width: 100px; height: 70px; border-radius: 4px; background: var(--bg); display: block; margin: 0 auto 3px; }
    .hof-gen { font-size: 0.55rem; color: var(--dim); }
    .hof-dist { font-size: 0.65rem; color: var(--cyan); font-weight: 700; }

    #page-layout { display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }

    #genome-display {
      padding: 8px 16px; background: var(--bg); border-top: 1px solid var(--border);
    }
    #genome-display h3 { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    #genome-bars {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 3px;
    }
    .gene-bar {
      display: flex; align-items: center; gap: 4px; font-size: 0.55rem;
    }
    .gene-bar .gname { color: var(--dim); min-width: 60px; text-align: right; }
    .gene-bar .gbar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative; }
    .gene-bar .gfill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .gene-bar .gval { min-width: 28px; color: var(--text); font-weight: 600; }

    @media (max-width: 600px) {
      #controls { gap: 5px; padding: 6px 10px; }
      button.ctrl { padding: 5px 9px; font-size: 0.62rem; }
      #sliders { grid-template-columns: 1fr 1fr; padding: 8px 10px; gap: 4px 10px; }
      .slider-row label { min-width: 60px; font-size: 0.55rem; }
      .hof-card { width: 90px; }
      .hof-card canvas { width: 80px; height: 56px; }
      canvas#graph { height: 60px; }
    }
  </style>
</head>
<body>
<div id="page-layout">
  <div id="header">
    <a href="games.html">&larr; games</a>
    <span class="title">SKELETON WALK</span>
    <span class="sub">genetic algorithm evolution</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="main"></canvas>
    <div id="hud">
      <div class="hud-col">
        <div><span class="hud-label">Generation </span><span class="hud-val cyan" id="h-gen">0</span></div>
        <div><span class="hud-label">Best Dist </span><span class="hud-val accent" id="h-best">0.0</span></div>
        <div><span class="hud-label">All-Time Best </span><span class="hud-val green" id="h-record">0.0</span></div>
      </div>
      <div class="hud-col" style="text-align:right">
        <div><span class="hud-label">Avg Dist </span><span class="hud-val" id="h-avg">0.0</span></div>
        <div><span class="hud-label">Mutation </span><span class="hud-val" id="h-mut">5.0%</span></div>
        <div><span class="hud-label">Population </span><span class="hud-val" id="h-pop">50</span></div>
      </div>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl on" id="btn-start">PAUSE</button>
    <button class="ctrl" id="btn-reset">RESET</button>
    <button class="ctrl" id="btn-showbest">SHOW BEST</button>
    <button class="ctrl" id="btn-track">TRACK: BEST</button>
    <button class="ctrl" id="btn-terrain">TERRAIN: FLAT</button>
  </div>

  <div id="sliders">
    <div class="slider-row"><label>Speed</label><input type="range" id="sl-speed" min="1" max="50" value="1"/><span class="sval" id="sv-speed">1x</span></div>
    <div class="slider-row"><label>Pop Size</label><input type="range" id="sl-pop" min="10" max="200" step="10" value="50"/><span class="sval" id="sv-pop">50</span></div>
    <div class="slider-row"><label>Mutation %</label><input type="range" id="sl-mut" min="1" max="30" value="5"/><span class="sval" id="sv-mut">5%</span></div>
    <div class="slider-row"><label>Mut Strength</label><input type="range" id="sl-mutstr" min="5" max="100" value="30"/><span class="sval" id="sv-mutstr">0.30</span></div>
    <div class="slider-row"><label>Gravity</label><input type="range" id="sl-grav" min="200" max="2000" step="20" value="980"/><span class="sval" id="sv-grav">980</span></div>
    <div class="slider-row"><label>Friction</label><input type="range" id="sl-fric" min="0" max="100" value="70"/><span class="sval" id="sv-fric">0.70</span></div>
    <div class="slider-row"><label>Sim Length</label><input type="range" id="sl-steps" min="200" max="2000" step="50" value="500"/><span class="sval" id="sv-steps">500</span></div>
    <div class="slider-row"><label>Elitism</label><input type="range" id="sl-elite" min="0" max="10" value="2"/><span class="sval" id="sv-elite">2</span></div>
    <div class="slider-row"><label>Tournament</label><input type="range" id="sl-tourn" min="2" max="15" value="5"/><span class="sval" id="sv-tourn">5</span></div>
    <div class="slider-row"><label>Muscle Power</label><input type="range" id="sl-muscle" min="5" max="100" value="40"/><span class="sval" id="sv-muscle">0.40</span></div>
    <div class="slider-row"><label>Bone Stiff</label><input type="range" id="sl-constit" min="2" max="20" value="8"/><span class="sval" id="sv-constit">8</span></div>
    <div class="slider-row"><label>Damping</label><input type="range" id="sl-damp" min="90" max="100" value="99"/><span class="sval" id="sv-damp">0.99</span></div>
  </div>

  <div id="graph-wrap">
    <h3>Fitness Over Generations <span id="graph-info" style="color:var(--accent);font-weight:700"></span></h3>
    <canvas id="graph"></canvas>
  </div>

  <div id="genome-display">
    <h3>Best Genome — Muscle Parameters</h3>
    <div id="genome-bars"></div>
  </div>

  <div id="hall-of-fame">
    <h3>Hall of Fame</h3>
    <div id="hof-container"><span style="font-size:0.6rem;color:var(--dim)">Evolving...</span></div>
  </div>
</div>

<script>
(function() {
"use strict";

// --- Tuneable params (updated by sliders) ---
var POP_SIZE = 50;
var SIM_STEPS = 500;
var DT = 1 / 60;
var GRAVITY = 980;
var CONSTRAINT_ITERS = 8;
var FRICTION = 0.7;
var RESTITUTION = 0.15;
var MUTATION_RATE = 0.05;
var MUTATION_STD = 0.3;
var TOURNAMENT_SIZE = 5;
var ELITISM = 2;
var MUSCLE_SCALE = 0.4;
var DAMPING = 0.99;
var HOF_INTERVAL = 10;

// Terrain
var terrainMode = 0; // 0=flat, 1=hills, 2=rough
var terrainHeights = null;
var TERRAIN_W = 4000;

function generateTerrain() {
  terrainHeights = new Float64Array(TERRAIN_W);
  if (terrainMode === 0) return;
  var amp = terrainMode === 1 ? 20 : 8;
  var freq = terrainMode === 1 ? 0.008 : 0.03;
  var amp2 = terrainMode === 2 ? 5 : 0;
  var freq2 = 0.07;
  for (var i = 0; i < TERRAIN_W; i++) {
    terrainHeights[i] = -(Math.sin(i * freq) * amp + Math.sin(i * freq * 2.7 + 1) * amp * 0.5 + Math.sin(i * freq2) * amp2);
  }
}
generateTerrain();

function getGroundY(x) {
  if (terrainMode === 0 || !terrainHeights) return 0;
  var ix = Math.floor(x + TERRAIN_W / 2);
  if (ix < 0) ix = 0;
  if (ix >= TERRAIN_W) ix = TERRAIN_W - 1;
  return terrainHeights[ix];
}

// Skeleton joint indices
var HEAD = 0, SHOULDER = 1, HIP = 2;
var L_ELBOW = 3, L_HAND = 4, R_ELBOW = 5, R_HAND = 6;
var L_KNEE = 7, L_ANKLE = 8, L_FOOT = 9;
var R_KNEE = 10, R_ANKLE = 11, R_FOOT = 12;
var NUM_JOINTS = 13;

var BONE_DEFS = [
  [HEAD, SHOULDER],[SHOULDER, HIP],
  [SHOULDER, L_ELBOW],[L_ELBOW, L_HAND],
  [SHOULDER, R_ELBOW],[R_ELBOW, R_HAND],
  [HIP, L_KNEE],[L_KNEE, L_ANKLE],[L_ANKLE, L_FOOT],
  [HIP, R_KNEE],[R_KNEE, R_ANKLE],[R_ANKLE, R_FOOT]
];

var MUSCLE_DEFS = [
  { pivot: SHOULDER, a: HEAD, b: L_ELBOW, name: "L.Shldr" },
  { pivot: SHOULDER, a: HEAD, b: R_ELBOW, name: "R.Shldr" },
  { pivot: L_ELBOW, a: SHOULDER, b: L_HAND, name: "L.Elbow" },
  { pivot: R_ELBOW, a: SHOULDER, b: R_HAND, name: "R.Elbow" },
  { pivot: HIP, a: SHOULDER, b: L_KNEE, name: "L.Hip" },
  { pivot: HIP, a: SHOULDER, b: R_KNEE, name: "R.Hip" },
  { pivot: L_KNEE, a: HIP, b: L_ANKLE, name: "L.Knee" },
  { pivot: R_KNEE, a: HIP, b: R_ANKLE, name: "R.Knee" },
  { pivot: L_ANKLE, a: L_KNEE, b: L_FOOT, name: "L.Ankle" },
  { pivot: R_ANKLE, a: R_KNEE, b: R_FOOT, name: "R.Ankle" }
];

var NUM_MUSCLES = MUSCLE_DEFS.length;
var GENOME_LENGTH = NUM_MUSCLES * 3;

var ANGLE_CONSTRAINTS = [
  { pivot: L_KNEE, a: HIP, b: L_ANKLE, min: 0.05, max: 2.8 },
  { pivot: R_KNEE, a: HIP, b: R_ANKLE, min: 0.05, max: 2.8 },
  { pivot: L_ELBOW, a: SHOULDER, b: L_HAND, min: 0.1, max: 3.0 },
  { pivot: R_ELBOW, a: SHOULDER, b: R_HAND, min: 0.1, max: 3.0 }
];

// --- DOM ---
var canvas = document.getElementById("main");
var ctx = canvas.getContext("2d");
var graphCanvas = document.getElementById("graph");
var graphCtx = graphCanvas.getContext("2d");
var hGen = document.getElementById("h-gen");
var hBest = document.getElementById("h-best");
var hRecord = document.getElementById("h-record");
var hAvg = document.getElementById("h-avg");
var hMut = document.getElementById("h-mut");
var hPop = document.getElementById("h-pop");
var graphInfo = document.getElementById("graph-info");
var hofContainer = document.getElementById("hof-container");

var W, H, GW, GH;
function resize() {
  var wrap = document.getElementById("canvas-wrap");
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
  var gw = document.getElementById("graph-wrap");
  GW = graphCanvas.width = gw.clientWidth - 32;
  GH = graphCanvas.height = 80;
}
resize();
window.addEventListener("resize", resize);

// --- Audio ---
var audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playPop() {
  if (!audioCtx) return;
  try {
    var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = "sine"; osc.frequency.value = 220;
    osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.12);
  } catch(e) {}
}
function playChime() {
  if (!audioCtx) return;
  try {
    [523,659,784].forEach(function(f,i) {
      var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.connect(g); g.connect(audioCtx.destination);
      osc.type = "triangle"; osc.frequency.value = f;
      var t = audioCtx.currentTime + i * 0.07;
      g.gain.setValueAtTime(0.05, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
    });
  } catch(e) {}
}

// --- Utils ---
function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
function gaussRand() {
  var u = 0, v = 0;
  while (!u) u = Math.random();
  while (!v) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
function dist(ax, ay, bx, by) { var dx = bx-ax, dy = by-ay; return Math.sqrt(dx*dx+dy*dy); }

// --- Skeleton ---
function createSkeleton(startX) {
  var sx = startX, gY = getGroundY(startX);
  var j = new Float64Array(NUM_JOINTS * 2);
  var o = new Float64Array(NUM_JOINTS * 2);
  function set(idx, x, y) { j[idx*2] = x; j[idx*2+1] = y; o[idx*2] = x; o[idx*2+1] = y; }
  set(HEAD, sx, gY - 158); set(SHOULDER, sx, gY - 138); set(HIP, sx, gY - 88);
  set(L_ELBOW, sx - 12, gY - 118); set(L_HAND, sx - 12, gY - 98);
  set(R_ELBOW, sx + 12, gY - 118); set(R_HAND, sx + 12, gY - 98);
  set(L_KNEE, sx - 8, gY - 48); set(L_ANKLE, sx - 8, gY - 8); set(L_FOOT, sx + 4, gY);
  set(R_KNEE, sx + 8, gY - 48); set(R_ANKLE, sx + 8, gY - 8); set(R_FOOT, sx + 20, gY);

  var boneLens = [];
  for (var b = 0; b < BONE_DEFS.length; b++) {
    var ia = BONE_DEFS[b][0], ib = BONE_DEFS[b][1];
    boneLens.push(dist(j[ia*2], j[ia*2+1], j[ib*2], j[ib*2+1]));
  }
  return { joints: j, old: o, boneLens: boneLens };
}

// --- Physics ---
function physicsTick(skel, genome, time) {
  var j = skel.joints, o = skel.old, n = NUM_JOINTS;

  for (var i = 0; i < n; i++) {
    var ix = i*2, iy = i*2+1;
    var vx = (j[ix] - o[ix]) * DAMPING;
    var vy = (j[iy] - o[iy]) * DAMPING;
    o[ix] = j[ix]; o[iy] = j[iy];
    j[ix] += vx;
    j[iy] += vy + GRAVITY * DT * DT;
  }

  for (var m = 0; m < NUM_MUSCLES; m++) {
    var md = MUSCLE_DEFS[m];
    var amp = genome[m*3], freq = genome[m*3+1], phase = genome[m*3+2];
    var torque = amp * Math.sin(freq * time + phase);
    var pi = md.pivot, ai = md.a, bi = md.b;
    var px = j[pi*2], py = j[pi*2+1];
    var dax = j[ai*2]-px, day = j[ai*2+1]-py, dbx = j[bi*2]-px, dby = j[bi*2+1]-py;
    var la = Math.sqrt(dax*dax+day*day)||1, lb = Math.sqrt(dbx*dbx+dby*dby)||1;
    var force = torque * MUSCLE_SCALE;
    j[ai*2] += (-day/la) * force * DT;
    j[ai*2+1] += (dax/la) * force * DT;
    j[bi*2] -= (-dby/lb) * force * DT;
    j[bi*2+1] -= (dbx/lb) * force * DT;
  }

  for (var iter = 0; iter < CONSTRAINT_ITERS; iter++) {
    for (var b = 0; b < BONE_DEFS.length; b++) {
      var ia = BONE_DEFS[b][0], ib = BONE_DEFS[b][1];
      var rl = skel.boneLens[b];
      var dx = j[ib*2]-j[ia*2], dy = j[ib*2+1]-j[ia*2+1];
      var d = Math.sqrt(dx*dx+dy*dy)||0.001;
      var diff = (d - rl) / d * 0.5;
      j[ia*2] += dx*diff; j[ia*2+1] += dy*diff;
      j[ib*2] -= dx*diff; j[ib*2+1] -= dy*diff;
    }

    for (var ac = 0; ac < ANGLE_CONSTRAINTS.length; ac++) {
      var c = ANGLE_CONSTRAINTS[ac];
      var pxi=c.pivot*2, pyi=c.pivot*2+1;
      var da_x=j[c.a*2]-j[pxi], da_y=j[c.a*2+1]-j[pyi];
      var db_x=j[c.b*2]-j[pxi], db_y=j[c.b*2+1]-j[pyi];
      var angA=Math.atan2(da_y,da_x), angB=Math.atan2(db_y,db_x);
      var ang=angB-angA;
      while(ang<0) ang += Math.PI*2;
      while(ang>Math.PI*2) ang -= Math.PI*2;
      if (ang < c.min || ang > c.max) {
        var target = ang < c.min ? c.min : c.max;
        var fix = (target - ang) * 0.5;
        var la2=Math.sqrt(da_x*da_x+da_y*da_y), lb2=Math.sqrt(db_x*db_x+db_y*db_y);
        j[c.a*2]=j[pxi]+Math.cos(angA-fix)*la2; j[c.a*2+1]=j[pyi]+Math.sin(angA-fix)*la2;
        j[c.b*2]=j[pxi]+Math.cos(angB+fix)*lb2; j[c.b*2+1]=j[pyi]+Math.sin(angB+fix)*lb2;
      }
    }

    for (var gi = 0; gi < n; gi++) {
      var gndY = getGroundY(j[gi*2]);
      if (j[gi*2+1] > gndY) {
        var vy2 = j[gi*2+1] - o[gi*2+1];
        j[gi*2+1] = gndY;
        o[gi*2+1] = gndY + vy2 * RESTITUTION;
        o[gi*2] = j[gi*2] - (j[gi*2]-o[gi*2]) * FRICTION;
      }
    }
  }
}

// --- Genome ---
// Pre-tuned walking genome — alternating hip/knee/ankle with arm counter-swing
var SEED_GENOME = new Float64Array([
  // L.Shoulder: amp, freq, phase — counter-swing with right leg
  40, 5, Math.PI,
  // R.Shoulder: counter-swing with left leg
  40, 5, 0,
  // L.Elbow: slight flex
  15, 5, Math.PI * 0.5,
  // R.Elbow: slight flex
  15, 5, Math.PI * 1.5,
  // L.Hip: main drive — forward swing
  120, 5, 0,
  // R.Hip: anti-phase to left
  120, 5, Math.PI,
  // L.Knee: flex during swing phase
  80, 5, Math.PI * 0.3,
  // R.Knee: anti-phase
  80, 5, Math.PI * 1.3,
  // L.Ankle: push-off
  60, 5, Math.PI * 0.7,
  // R.Ankle: anti-phase push-off
  60, 5, Math.PI * 1.7
]);

function randomGenome() {
  var g = new Float64Array(GENOME_LENGTH);
  for (var i = 0; i < NUM_MUSCLES; i++) {
    g[i*3] = rand(-200, 200);
    g[i*3+1] = rand(1, 12);
    g[i*3+2] = rand(0, Math.PI*2);
  }
  return g;
}

function seededGenome() {
  var g = new Float64Array(SEED_GENOME);
  for (var i = 0; i < GENOME_LENGTH; i++) {
    g[i] += gaussRand() * (i % 3 === 0 ? 15 : i % 3 === 1 ? 0.5 : 0.3);
  }
  return g;
}

function crossover(a, b) {
  var c = new Float64Array(GENOME_LENGTH);
  for (var i = 0; i < GENOME_LENGTH; i++) c[i] = Math.random() < 0.5 ? a[i] : b[i];
  return c;
}

function mutate(genome) {
  var g = new Float64Array(genome);
  for (var i = 0; i < GENOME_LENGTH; i++) {
    if (Math.random() < MUTATION_RATE) {
      var pt = i % 3;
      var std = pt === 0 ? 40 * MUTATION_STD / 0.3 : pt === 1 ? 2 * MUTATION_STD / 0.3 : 0.5 * MUTATION_STD / 0.3;
      g[i] += gaussRand() * std;
    }
  }
  return g;
}

function tournamentSelect(pop, fit) {
  var best = -1, bestF = -Infinity;
  for (var i = 0; i < TOURNAMENT_SIZE; i++) {
    var idx = Math.floor(Math.random() * pop.length);
    if (fit[idx] > bestF) { bestF = fit[idx]; best = idx; }
  }
  return best;
}

// --- State ---
var population = [], skeletons = [], fitnesses = [];
var generation = 0, simStep = 0;
var running = true, speed = 1;
var bestEverDist = 0, bestEverGenome = null;
var hallOfFame = [];
var showingBest = false, showBestSkel = null, showBestGenome = null, showBestStep = 0;
var trackMode = 0; // 0=best, 1=worst, 2=all
var historyBest = [], historyAvg = [], historyWorst = [];

function initPopulation() {
  population = []; skeletons = []; fitnesses = [];
  for (var i = 0; i < POP_SIZE; i++) {
    population.push(i < POP_SIZE / 2 ? seededGenome() : randomGenome());
    skeletons.push(createSkeleton(0));
    fitnesses.push(0);
  }
  simStep = 0;
}

function computeFitness(skel) {
  var f = skel.joints[HIP*2];
  if (skel.joints[HEAD*2+1] > skel.joints[HIP*2+1]) f *= 0.3;
  // bonus for staying upright
  var headAboveHip = skel.joints[HIP*2+1] - skel.joints[HEAD*2+1];
  if (headAboveHip > 30) f += headAboveHip * 0.1;
  return f;
}

function nextGeneration() {
  var curPop = population.length;
  fitnesses = [];
  for (var i = 0; i < curPop; i++) fitnesses.push(computeFitness(skeletons[i]));

  var bestDist = -Infinity, worstDist = Infinity, avgDist = 0, bestIdx = 0;
  for (var i = 0; i < curPop; i++) {
    avgDist += fitnesses[i];
    if (fitnesses[i] > bestDist) { bestDist = fitnesses[i]; bestIdx = i; }
    if (fitnesses[i] < worstDist) worstDist = fitnesses[i];
  }
  avgDist /= curPop;

  historyBest.push(bestDist);
  historyAvg.push(avgDist);
  historyWorst.push(worstDist);

  generation++;
  hGen.textContent = generation;
  hBest.textContent = bestDist.toFixed(1);
  hAvg.textContent = avgDist.toFixed(1);
  hPop.textContent = POP_SIZE;
  hMut.textContent = (MUTATION_RATE * 100).toFixed(0) + "%";

  if (bestDist > bestEverDist) {
    bestEverDist = bestDist;
    bestEverGenome = new Float64Array(population[bestIdx]);
    hRecord.textContent = bestDist.toFixed(1);
    playChime();
  }

  if (generation % HOF_INTERVAL === 0 || generation === 1) {
    hallOfFame.push({ gen: generation, dist: bestDist, genome: new Float64Array(population[bestIdx]) });
    updateHallOfFame();
  }

  updateGenomeBars(population[bestIdx]);
  drawGraph();
  playPop();

  var indices = [];
  for (var i = 0; i < curPop; i++) indices.push(i);
  indices.sort(function(a, b) { return fitnesses[b] - fitnesses[a]; });

  var newPop = [];
  for (var i = 0; i < Math.min(ELITISM, POP_SIZE); i++) newPop.push(new Float64Array(population[indices[Math.min(i, curPop-1)]]));
  while (newPop.length < POP_SIZE) {
    var p1 = tournamentSelect(population, fitnesses);
    var p2 = tournamentSelect(population, fitnesses);
    newPop.push(mutate(crossover(population[p1], population[p2])));
  }

  population = newPop;
  skeletons = [];
  for (var i = 0; i < POP_SIZE; i++) skeletons.push(createSkeleton(0));
  simStep = 0;
}

// --- Genome display ---
var MUSCLE_COLORS = ["#00e5ff","#00e5ff","#a78bfa","#a78bfa","#f472b6","#f472b6","#4ade80","#4ade80","#f7c948","#f7c948"];
function updateGenomeBars(genome) {
  var container = document.getElementById("genome-bars");
  container.innerHTML = "";
  for (var m = 0; m < NUM_MUSCLES; m++) {
    var amp = genome[m*3], freq = genome[m*3+1], phase = genome[m*3+2];
    var color = MUSCLE_COLORS[m];

    // Amplitude bar
    var ampNorm = Math.min(Math.abs(amp) / 300, 1);
    var row = document.createElement("div"); row.className = "gene-bar";
    row.innerHTML = '<span class="gname">' + MUSCLE_DEFS[m].name + '</span>' +
      '<span class="gbar"><span class="gfill" style="width:' + (ampNorm*100) + '%;background:' + color + '"></span></span>' +
      '<span class="gval" style="color:' + color + '">' + amp.toFixed(0) + '</span>';
    container.appendChild(row);
  }
}

// --- Graph ---
function drawGraph() {
  graphCtx.clearRect(0, 0, GW, GH);
  if (historyBest.length < 2) return;

  var n = historyBest.length;
  var maxVal = -Infinity, minVal = Infinity;
  for (var i = 0; i < n; i++) {
    if (historyBest[i] > maxVal) maxVal = historyBest[i];
    if (historyWorst[i] < minVal) minVal = historyWorst[i];
  }
  var range = maxVal - minVal || 1;
  var pad = 4;
  var plotW = GW - pad * 2, plotH = GH - pad * 2;

  function px(i) { return pad + (i / (n - 1)) * plotW; }
  function py(v) { return pad + plotH - ((v - minVal) / range) * plotH; }

  // Fill between best and worst
  graphCtx.fillStyle = "rgba(0,229,255,0.06)";
  graphCtx.beginPath();
  graphCtx.moveTo(px(0), py(historyBest[0]));
  for (var i = 1; i < n; i++) graphCtx.lineTo(px(i), py(historyBest[i]));
  for (var i = n-1; i >= 0; i--) graphCtx.lineTo(px(i), py(historyWorst[i]));
  graphCtx.closePath();
  graphCtx.fill();

  // Worst line
  graphCtx.strokeStyle = "#6e6e7340";
  graphCtx.lineWidth = 1;
  graphCtx.beginPath();
  for (var i = 0; i < n; i++) { i ? graphCtx.lineTo(px(i), py(historyWorst[i])) : graphCtx.moveTo(px(i), py(historyWorst[i])); }
  graphCtx.stroke();

  // Avg line
  graphCtx.strokeStyle = var_accent;
  graphCtx.lineWidth = 1.5;
  graphCtx.beginPath();
  for (var i = 0; i < n; i++) { i ? graphCtx.lineTo(px(i), py(historyAvg[i])) : graphCtx.moveTo(px(i), py(historyAvg[i])); }
  graphCtx.stroke();

  // Best line
  graphCtx.strokeStyle = "#00e5ff";
  graphCtx.lineWidth = 2;
  graphCtx.beginPath();
  for (var i = 0; i < n; i++) { i ? graphCtx.lineTo(px(i), py(historyBest[i])) : graphCtx.moveTo(px(i), py(historyBest[i])); }
  graphCtx.stroke();

  graphInfo.textContent = "Best: " + historyBest[n-1].toFixed(0) + " | Avg: " + historyAvg[n-1].toFixed(0);
}
var var_accent = "#ff6b35";

// --- Rendering ---
function drawSkeleton(ctx2, skel, alpha, color, glow, scale, ox, oy, drawHead) {
  var j = skel.joints;
  var s = scale || 1;
  ctx2.save();
  ctx2.globalAlpha = alpha;
  ctx2.lineCap = "round";
  ctx2.lineJoin = "round";

  function jx(i) { return j[i*2]*s+(ox||0); }
  function jy(i) { return j[i*2+1]*s+(oy||0); }

  var isLeader = drawHead !== false && alpha > 0.9;

  // Torso fill for prominent skeletons
  if (isLeader) {
    ctx2.fillStyle = color.replace(")", ",0.12)").replace("hsl", "hsla").replace("#", "#");
    if (color.charAt(0) === '#') ctx2.fillStyle = color + "1a";
    ctx2.beginPath();
    ctx2.moveTo(jx(SHOULDER), jy(SHOULDER));
    ctx2.lineTo(jx(L_ELBOW), jy(L_ELBOW));
    ctx2.lineTo(jx(HIP), jy(HIP));
    ctx2.lineTo(jx(R_ELBOW), jy(R_ELBOW));
    ctx2.closePath();
    ctx2.fill();
  }

  // Glow
  ctx2.shadowColor = glow || color;
  ctx2.shadowBlur = isLeader ? 12*s : 6*s;

  // Bones — thicker for leader
  ctx2.strokeStyle = color;
  ctx2.lineWidth = isLeader ? 3.5*s : 2*s;

  ctx2.beginPath();
  for (var b = 0; b < BONE_DEFS.length; b++) {
    ctx2.moveTo(jx(BONE_DEFS[b][0]), jy(BONE_DEFS[b][0]));
    ctx2.lineTo(jx(BONE_DEFS[b][1]), jy(BONE_DEFS[b][1]));
  }
  ctx2.stroke();

  // Joints
  ctx2.fillStyle = color;
  var jr = isLeader ? 4*s : 2.5*s;
  for (var i = 0; i < NUM_JOINTS; i++) {
    if (i === HEAD && drawHead) continue;
    ctx2.beginPath(); ctx2.arc(jx(i), jy(i), jr, 0, Math.PI*2); ctx2.fill();
  }

  // Head
  if (drawHead !== false) {
    var hr = isLeader ? 9*s : 6*s;
    ctx2.beginPath(); ctx2.arc(jx(HEAD), jy(HEAD), hr, 0, Math.PI*2); ctx2.stroke();
    ctx2.shadowBlur = 0;
    ctx2.fillStyle = "#0f0f10"; ctx2.fill();
    // Eyes
    ctx2.fillStyle = color;
    ctx2.shadowColor = glow||color; ctx2.shadowBlur = 4;
    var ex = jx(HEAD), ey = jy(HEAD);
    var er = isLeader ? 1.5*s : 1*s;
    ctx2.beginPath();
    ctx2.arc(ex - 3*s, ey - 1*s, er, 0, Math.PI*2);
    ctx2.arc(ex + 3*s, ey - 1*s, er, 0, Math.PI*2);
    ctx2.fill();
    // Mouth for leader
    if (isLeader) {
      ctx2.strokeStyle = color;
      ctx2.lineWidth = 1*s;
      ctx2.beginPath();
      ctx2.arc(ex, ey + 2*s, 2.5*s, 0.1, Math.PI - 0.1);
      ctx2.stroke();
    }
  }
  ctx2.restore();
}

function render() {
  ctx.clearRect(0, 0, W, H);

  var camTarget;
  if (showingBest && showBestSkel) {
    camTarget = showBestSkel.joints[HIP*2];
  } else {
    var bestX = -Infinity, worstX = Infinity, bestI = 0, worstI = 0;
    for (var i = 0; i < skeletons.length; i++) {
      var hx = skeletons[i].joints[HIP*2];
      if (hx > bestX) { bestX = hx; bestI = i; }
      if (hx < worstX) { worstX = hx; worstI = i; }
    }
    if (trackMode === 0) camTarget = bestX;
    else if (trackMode === 1) camTarget = worstX;
    else camTarget = (bestX + worstX) / 2;
  }

  var camX = camTarget - W * 0.35;
  var groundScreenY = H * 0.72;

  // Terrain / ground
  if (terrainMode > 0) {
    ctx.strokeStyle = "#2a2a2d";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var sx = 0; sx < W; sx += 2) {
      var worldX = sx + camX;
      var gy = getGroundY(worldX);
      var sy = groundScreenY + gy;
      sx === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.stroke();

    ctx.fillStyle = "#1a1a1c";
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  } else {
    // Ground fill
    ctx.fillStyle = "#131315";
    ctx.fillRect(0, groundScreenY, W, H - groundScreenY);

    // Grid
    ctx.strokeStyle = "#1c1c1f"; ctx.lineWidth = 1;
    var gs = 50, gStart = Math.floor(camX/gs)*gs;
    for (var gx = gStart; gx < camX+W+gs; gx += gs) {
      var sx = gx - camX;
      ctx.beginPath(); ctx.moveTo(sx, groundScreenY); ctx.lineTo(sx, H); ctx.stroke();
    }
    for (var gy = 0; gy < 200; gy += gs) {
      var sy = groundScreenY + gy; if (sy > H) break;
      ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
    }
  }

  // Ground line
  if (terrainMode === 0) {
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 6;
    ctx.strokeStyle = "#00e5ff30"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, groundScreenY); ctx.lineTo(W, groundScreenY); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#3a3a3d"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, groundScreenY); ctx.lineTo(W, groundScreenY); ctx.stroke();
  }

  // Distance markers
  ctx.fillStyle = "#3a3a3d";
  ctx.font = '10px ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace';
  var ms = 100, mStart = Math.floor(camX/ms)*ms;
  for (var mx = mStart; mx < camX+W+ms; mx += ms) {
    var msx = mx - camX;
    var markerGY = groundScreenY + getGroundY(mx);
    ctx.fillText(mx.toFixed(0), msx + 3, markerGY + 14);
  }

  // Skeletons
  if (showingBest && showBestSkel) {
    drawSkeleton(ctx, showBestSkel, 1, "#00e5ff", "#00e5ff", 1, -camX, groundScreenY, true);
  } else {
    var bestX2 = -Infinity, bestI2 = 0;
    for (var i = 0; i < skeletons.length; i++) {
      if (skeletons[i].joints[HIP*2] > bestX2) { bestX2 = skeletons[i].joints[HIP*2]; bestI2 = i; }
    }
    for (var i = 0; i < skeletons.length; i++) {
      if (i === bestI2) continue;
      var rank = 0;
      for (var k = 0; k < skeletons.length; k++) { if (skeletons[k].joints[HIP*2] > skeletons[i].joints[HIP*2]) rank++; }
      var a = 0.04 + 0.12 * (1 - rank / skeletons.length);
      drawSkeleton(ctx, skeletons[i], a, "#00e5ff", "#00e5ff", 1, -camX, groundScreenY, false);
    }
    drawSkeleton(ctx, skeletons[bestI2], 1, "#00e5ff", "#00e5ff", 1, -camX, groundScreenY, true);
  }

  // Start line
  var startSX = -camX;
  if (startSX > -5 && startSX < W + 5) {
    ctx.strokeStyle = "#ff6b3540"; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(startSX, groundScreenY-180); ctx.lineTo(startSX, groundScreenY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#ff6b3580";
    ctx.font = '9px ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace';
    ctx.fillText("START", startSX+4, groundScreenY-170);
  }

  // Progress bar
  if (!showingBest) {
    var prog = simStep / SIM_STEPS;
    var bW = 140, bH = 4, bX = W/2-bW/2, bY = groundScreenY + 30;
    ctx.fillStyle = "#1a1a1c"; ctx.fillRect(bX, bY, bW, bH);
    ctx.fillStyle = "#ff6b35"; ctx.fillRect(bX, bY, bW * prog, bH);
    ctx.fillStyle = "#6e6e73"; ctx.textAlign = "center";
    ctx.font = '9px ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace';
    ctx.fillText("Step " + simStep + "/" + SIM_STEPS, W/2, bY+16);
    ctx.textAlign = "start";
  }
}

// --- Hall of Fame ---
function updateHallOfFame() {
  hofContainer.innerHTML = "";
  for (var h = 0; h < hallOfFame.length; h++) {
    var entry = hallOfFame[h];
    var card = document.createElement("div"); card.className = "hof-card";
    var cvs = document.createElement("canvas"); cvs.width = 200; cvs.height = 140;
    card.appendChild(cvs);
    var gl = document.createElement("div"); gl.className = "hof-gen"; gl.textContent = "Gen " + entry.gen; card.appendChild(gl);
    var dl = document.createElement("div"); dl.className = "hof-dist"; dl.textContent = entry.dist.toFixed(1) + " px"; card.appendChild(dl);
    hofContainer.appendChild(card);
    renderHofCard(cvs, entry.genome);
  }
}

function renderHofCard(cvs, genome) {
  var c = cvs.getContext("2d");
  var skel = createSkeleton(0);
  var frames = [];
  for (var s = 0; s < SIM_STEPS; s++) {
    physicsTick(skel, genome, s * DT);
    if (s % 30 === 0) frames.push({ joints: new Float64Array(skel.joints) });
  }
  c.fillStyle = "#0f0f10"; c.fillRect(0, 0, cvs.width, cvs.height);
  var gndY = cvs.height * 0.85;
  c.strokeStyle = "#2a2a2d"; c.lineWidth = 1;
  c.beginPath(); c.moveTo(0, gndY); c.lineTo(cvs.width, gndY); c.stroke();

  var minX = Infinity, maxX = -Infinity;
  for (var f = 0; f < frames.length; f++) for (var ji = 0; ji < NUM_JOINTS; ji++) {
    var x = frames[f].joints[ji*2];
    if (x < minX) minX = x; if (x > maxX) maxX = x;
  }
  var rx = (maxX-minX)||1, sc = Math.min((cvs.width-20)/rx, 0.8), offX = 10 - minX*sc;

  for (var f = 0; f < frames.length; f++) {
    var alpha = 0.15 + 0.6 * (f / frames.length);
    drawSkeleton(c, { joints: frames[f].joints }, alpha, "#00e5ff", "#00e5ff", sc, offX, gndY, f === frames.length-1);
  }
}

// --- Main Loop ---
function tick() {
  if (showingBest) {
    if (showBestStep < SIM_STEPS) {
      for (var sp = 0; sp < speed; sp++) { if (showBestStep < SIM_STEPS) { physicsTick(showBestSkel, showBestGenome, showBestStep*DT); showBestStep++; } }
    } else {
      showingBest = false;
      document.getElementById("btn-showbest").textContent = "SHOW BEST";
      document.getElementById("btn-showbest").classList.remove("active");
    }
    render();
    requestAnimationFrame(tick);
    return;
  }

  if (running) {
    for (var sp = 0; sp < speed; sp++) {
      if (simStep < SIM_STEPS) {
        for (var i = 0; i < skeletons.length; i++) physicsTick(skeletons[i], population[i], simStep*DT);
        simStep++;
      } else {
        nextGeneration();
        break;
      }
    }
  }

  render();
  requestAnimationFrame(tick);
}

bindSlider("sl-constit", "sv-constit", function(sl, sv) { CONSTRAINT_ITERS = +sl.value; sv.textContent = sl.value; });
bindSlider("sl-damp", "sv-damp", function(sl, sv) { DAMPING = +sl.value / 100; sv.textContent = DAMPING.toFixed(2); });

initPopulation();
requestAnimationFrame(tick);

})();
