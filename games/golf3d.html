<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mini Golf 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a3a1a;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;width:100%;height:100%;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}
#topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;background:linear-gradient(to bottom,rgba(0,0,0,0.6),rgba(0,0,0,0));color:#fff;font-size:14px;pointer-events:none;}
#topbar a{color:#90ee90;text-decoration:none;pointer-events:auto;font-size:13px;padding:4px 8px;background:rgba(0,0,0,0.3);border-radius:6px;}
.info-left,.info-center,.info-right{display:flex;flex-direction:column;align-items:center;}
.info-left{align-items:flex-start;}
.info-right{align-items:flex-end;}
.label{font-size:10px;opacity:0.7;text-transform:uppercase;letter-spacing:1px;}
.value{font-size:22px;font-weight:bold;text-shadow:0 1px 4px rgba(0,0,0,0.5);}
#powerBarWrap{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:24px;height:220px;background:rgba(0,0,0,0.5);border-radius:12px;border:2px solid rgba(255,255,255,0.4);overflow:hidden;display:none;backdrop-filter:blur(4px);}
#powerBar{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#44ff44,#ffff00,#ff4444);border-radius:0 0 10px 10px;transition:none;}
#powerLabel{position:absolute;right:52px;top:50%;transform:translateY(-50%);color:#fff;font-size:12px;font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,0.8);display:none;white-space:nowrap;}
#announcement{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%) scale(0.5);font-size:42px;font-weight:bold;color:#fff;text-shadow:0 3px 12px rgba(0,0,0,0.9),0 0 40px rgba(255,255,100,0.3);opacity:0;transition:opacity 0.4s ease-out, transform 0.4s ease-out;pointer-events:none;}
#announcement.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#nextHoleBtn{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);padding:18px 48px;background:linear-gradient(135deg,#4CAF50,#388E3C);color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:bold;cursor:pointer;pointer-events:auto;display:none;box-shadow:0 6px 20px rgba(0,0,0,0.4);letter-spacing:0.5px;}
#nextHoleBtn:active{transform:translateX(-50%) scale(0.95);}
#startScreen,#endScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,60,0,0.95),rgba(0,30,0,0.95));color:#fff;z-index:20;pointer-events:auto;}
#startScreen h1,#endScreen h1{font-size:36px;margin-bottom:6px;color:#90ee90;text-shadow:0 2px 8px rgba(0,0,0,0.5);}
#startScreen .subtitle{font-size:16px;color:#aaddaa;margin-bottom:24px;}
#startScreen p,#endScreen p{font-size:14px;opacity:0.8;margin-bottom:24px;text-align:center;padding:0 24px;line-height:1.5;}
.bigBtn{padding:18px 56px;background:linear-gradient(135deg,#4CAF50,#388E3C);color:#fff;border:none;border-radius:14px;font-size:22px;font-weight:bold;cursor:pointer;margin:8px;box-shadow:0 6px 20px rgba(0,0,0,0.4);letter-spacing:0.5px;}
.bigBtn:active{transform:scale(0.95);}
#scorecard{width:90%;max-width:360px;margin:16px 0;font-size:14px;}
#scorecard table{width:100%;border-collapse:collapse;}
#scorecard th,#scorecard td{padding:7px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.15);}
#scorecard th{font-size:11px;opacity:0.6;text-transform:uppercase;letter-spacing:0.5px;}
.under-par{color:#66ff66;font-weight:bold;}
.over-par{color:#ff6666;font-weight:bold;}
.at-par{color:#ffff66;font-weight:bold;}
#endScreen{display:none;}
#helpText{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:14px;text-align:center;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,0.6);background:rgba(0,0,0,0.3);padding:8px 20px;border-radius:20px;backdrop-filter:blur(4px);}
#strokePenalty{position:absolute;top:25%;left:50%;transform:translateX(-50%);color:#ff6666;font-size:20px;font-weight:bold;opacity:0;transition:opacity 0.3s;pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,0.8);}
.hole-info{display:flex;align-items:center;gap:8px;margin-top:4px;}
.hole-dots{display:flex;gap:3px;}
.hole-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.25);}
.hole-dot.active{background:#90ee90;}
.hole-dot.done{background:#4CAF50;}
</style>
</head>
<body>

<div id="ui">
  <div id="topbar">
    <div class="info-left">
      <a href="../index.html">Back</a>
      <div class="label" style="margin-top:8px;">Hole</div>

</div>

<script>
(function(){
"use strict";

/* ============================================================
   AUDIO ENGINE
   ============================================================ */
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function ensureAudio(){
  if(!audioCtx){
    audioCtx=new AudioCtx();
    // iOS unlock
    const b=audioCtx.createBuffer(1,1,22050);
    const s=audioCtx.createBufferSource();
    s.buffer=b;s.connect(audioCtx.destination);s.start(0);
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
}

function playHit(power){
  ensureAudio();
  const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(600+power*600,t);
  o.frequency.exponentialRampToValueAtTime(150,t+0.12);
  g.gain.setValueAtTime(0.12+power*0.15,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+0.12);
  // Click layer
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.type='sine';o2.frequency.value=1200;
  g2.gain.setValueAtTime(0.1,t);
  g2.gain.exponentialRampToValueAtTime(0.001,t+0.03);
  o2.connect(g2);g2.connect(audioCtx.destination);
  o2.start(t);o2.stop(t+0.03);
}

let rollGain=null,rollSource=null,rollPlaying=false;
function startRollSound(){
  if(rollPlaying)return;
  ensureAudio();
  rollPlaying=true;
  const bufSize=audioCtx.sampleRate*2;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*0.015;
  const filt=audioCtx.createBiquadFilter();
  filt.type='lowpass';filt.frequency.value=600;
  rollSource=audioCtx.createBufferSource();rollSource.buffer=buf;rollSource.loop=true;
  rollGain=audioCtx.createGain();rollGain.gain.value=0;
  rollSource.connect(filt);filt.connect(rollGain);rollGain.connect(audioCtx.destination);
  rollSource.start();
}
function updateRollSound(speed){
  if(!rollPlaying)startRollSound();
  if(rollGain){
    const vol=Math.min(speed/15,1)*0.06;
    rollGain.gain.value=vol;
  }
}
function stopRollSound(){
  if(rollGain)rollGain.gain.value=0;
}

function playSplash(){
  ensureAudio();
  const t=audioCtx.currentTime;
  const bufSize=audioCtx.sampleRate*0.5;
  const buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<bufSize;i++){
    const p=i/audioCtx.sampleRate;
    data[i]=(Math.random()*2-1)*Math.exp(-p*6)*0.25;
  }
  const filt=audioCtx.createBiquadFilter();
  filt.type='lowpass';filt.frequency.value=2000;
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const g=audioCtx.createGain();g.gain.value=0.3;
  src.connect(filt);filt.connect(g);g.connect(audioCtx.destination);
  src.start();
}

function playSink(){
  ensureAudio();
  const t=audioCtx.currentTime;
  [523,659,784,1047].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    const st=t+i*0.1;
    g.gain.setValueAtTime(0,st);
    g.gain.linearRampToValueAtTime(0.18,st+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.35);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(st);o.stop(st+0.35);
  });
}

function playHoleInOne(){
  ensureAudio();
  const t=audioCtx.currentTime;
  [523,659,784,880,1047,1319,1568].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    const st=t+i*0.08;
    g.gain.setValueAtTime(0,st);
    g.gain.linearRampToValueAtTime(0.2,st+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,st+0.6);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(st);o.stop(st+0.6);
  });
}

function playBounce(strength){
  ensureAudio();
  const t=audioCtx.currentTime;
  const vol=Math.min(0.12,(strength||1)*0.06);
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='square';
  o.frequency.setValueAtTime(250+Math.random()*100,t);
  o.frequency.exponentialRampToValueAtTime(80,t+0.05);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  o.connect(g);g.connect(audioCtx.destination);
  o.start(t);o.stop(t+0.05);
}

/* ============================================================
   COURSE DATA - 9 Holes
   ============================================================ */
const courses=[
  // Hole 1: Straight shot. Wide and easy. Par 2.
  {
    par:2, tee:[0,-6], hole:[0,6],

    bounds:[[-3,-8],[3,-8],[3,8],[-3,8]],

  },

    par:2, tee:[0,-6], hole:[4,5],

    ],
    bounds:[[-2,-7],[2,-7],[2,2],[8,2],[8,7],[3,7],[3,3],[-2,3]],
    obstacles:[],water:[],ramps:[],innerWalls:[]
  },
  // Hole 4: Straight with ramp to elevated green. Par 3.

    obstacles:[{type:'windmill',pos:[0,0],radius:2}],
    water:[],ramps:[],innerWalls:[]
  },
  // Hole 6: Water in the middle, go around either side. Par 3.
  {
    par:3, tee:[0,-7], hole:[0,7],
    walls:[
      [-5,-9,-5,9],[5,-9,5,9],

    ],
    bounds:[[-5,-9],[5,-9],[5,9],[-5,9]],
    obstacles:[],
    water:[{pos:[-1.5,-2.5],size:[3,5]}],
    ramps:[],innerWalls:[]
  },
  // Hole 7: Narrow bridge between two wide areas. Par 3.
  {
    par:3, tee:[0,-7], hole:[0,7],
    walls:[
      [-4,-9,4,-9],[4,-9,4,-1.5],[4,-1.5,1.2,-1.5],[1.2,-1.5,1.2,1.5],[1.2,1.5,4,1.5],[4,1.5,4,9],
      [4,9,-4,9],[-4,9,-4,1.5],[-4,1.5,-1.2,1.5],[-1.2,1.5,-1.2,-1.5],[-1.2,-1.5,-4,-1.5],[-4,-1.5,-4,-9]
    ],
    bounds:[[-4,-9],[4,-9],[4,-1.5],[1.2,-1.5],[1.2,1.5],[4,1.5],[4,9],[-4,9],[-4,1.5],[-1.2,1.5],[-1.2,-1.5],[-4,-1.5]],
    obstacles:[],
    water:[{pos:[-4,-1.5],size:[2.8,3]},{pos:[1.2,-1.5],size:[2.8,3]}],
    ramps:[],innerWalls:[]
  },
  // Hole 8: Zigzag with 2 inner walls. Par 4.
  {
    par:4, tee:[-3,-7], hole:[3,7],
    walls:[
      [-5,-9,-5,9],[5,-9,5,9],
      [-5,-9,5,-9],[-5,9,5,9]
    ],
    bounds:[[-5,-9],[5,-9],[5,9],[-5,9]],
    obstacles:[],water:[],ramps:[],
    innerWalls:[[-5,-3,2,-3],[5,3,-2,3]]
  },
  // Hole 9: Grand finale. Wide with water, ramp, wall. Par 4.
  {
    par:4, tee:[0,-10], hole:[0,10],
    walls:[
      [-5,-12,-5,12],[5,-12,5,12],
      [-5,-12,5,-12],[-5,12,5,12]
    ],
    bounds:[[-5,-12],[5,-12],[5,12],[-5,12]],
    obstacles:[],
    water:[{pos:[-2,-1],size:[4,2]}],
    ramps:[{pos:[0,6],size:[10,3],elevation:0.8,dir:'z'}],
    innerWalls:[[-2,-6,-2,-2],[2,2,2,6]]
  }
];

/* ============================================================
   THREE.JS SETUP
   ============================================================ */
let scene,camera,renderer,clock;
let ballMesh,holeCupMesh,flagGroup,aimArrow,aimCircle;
let courseMeshes=[],obstacleMeshes=[],waterMeshes=[];
let windmillArm=null;
const windmillSpeed=1.2;

const BALL_RADIUS=0.15;
const HOLE_RADIUS=0.32;
const WALL_HEIGHT=0.45;
const WALL_THICKNESS=0.2;
const FRICTION=0.982;
const BOUNCE_LOSS=0.6;
const STOP_THRESHOLD=0.04;
const MAX_POWER=22;
const SUB_STEPS=4;

let ballVel={x:0,z:0};
let currentHole=0;
let strokes=0;
let totalScore=0;
let scores=[];
let gameState='start'; // start, aiming, rolling, sunk, finished, penalty
let isDragging=false;
let dragStart={x:0,y:0};
let dragCurrent={x:0,y:0};
let aimPower=0;
let aimAngle=0;
let lastGoodPos={x:0,z:0};

// Camera state
let cameraAngle=0;
let cameraPitch=Math.PI*0.38;
let cameraDistance=14;
let cameraTargetSmooth={x:0,y:0,z:0};
let isCameraRotating=false;
let cameraDragStart={x:0,y:0};
let prevPinchDist=0;
let sinkAnimating=false;
let announcementTimeout=null;

// DOM refs
const holeNumEl=document.getElementById('holeNum');
const parValEl=document.getElementById('parVal');
const strokeValEl=document.getElementById('strokeVal');
const totalValEl=document.getElementById('totalVal');
const powerBarWrap=document.getElementById('powerBarWrap');
const powerBar=document.getElementById('powerBar');
const powerLabel=document.getElementById('powerLabel');
const announcementEl=document.getElementById('announcement');
const penaltyEl=document.getElementById('strokePenalty');
const nextHoleBtn=document.getElementById('nextHoleBtn');
const startScreen=document.getElementById('startScreen');
const endScreen=document.getElementById('endScreen');
const helpText=document.getElementById('helpText');
const holeDots=document.getElementById('holeDots');

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x6BB3E0);
  scene.fog=new THREE.FogExp2(0x6BB3E0,0.008);

  camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,300);
  renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;
  document.body.insertBefore(renderer.domElement,document.getElementById('ui'));

  clock=new THREE.Clock();

  // Lighting
  const ambient=new THREE.AmbientLight(0xffffff,0.45);
  scene.add(ambient);

  const sun=new THREE.DirectionalLight(0xfff5e0,0.9);
  sun.position.set(8,25,12);
  sun.castShadow=true;
  sun.shadow.mapSize.width=2048;
  sun.shadow.mapSize.height=2048;
  sun.shadow.camera.left=-25;sun.shadow.camera.right=25;
  sun.shadow.camera.top=25;sun.shadow.camera.bottom=-25;
  sun.shadow.camera.near=1;sun.shadow.camera.far=60;
  sun.shadow.bias=-0.001;
  scene.add(sun);

  const hemi=new THREE.HemisphereLight(0x87CEEB,0x2d5a1e,0.35);
  scene.add(hemi);

  // Sky dome
  const skyGeo=new THREE.SphereGeometry(100,16,16);
  const skyMat=new THREE.MeshBasicMaterial({
    color:0x6BB3E0,
    side:THREE.BackSide
  });
  const sky=new THREE.Mesh(skyGeo,skyMat);
  scene.add(sky);

  // Clouds
  createClouds();

  // Ground
  const groundGeo=new THREE.PlaneGeometry(300,300);
  const groundMat=new THREE.MeshLambertMaterial({color:0x2a6e14});
  const ground=new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2;
  ground.position.y=-0.08;
  ground.receiveShadow=true;
  scene.add(ground);

  // Ball
  const ballGeo=new THREE.SphereGeometry(BALL_RADIUS,20,20);
  const ballMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:0.2,metalness:0.05});
  ballMesh=new THREE.Mesh(ballGeo,ballMat);
  ballMesh.castShadow=true;
  scene.add(ballMesh);

  // Aim arrow (3D line)
  createAimArrow();

  // Build hole dots
  buildHoleDots();

  window.addEventListener('resize',onResize);
  setupInput();

  document.getElementById('startBtn').addEventListener('click',()=>{ensureAudio();startGame();});
  document.getElementById('replayBtn').addEventListener('click',()=>{endScreen.style.display='none';startGame();});
  nextHoleBtn.addEventListener('click',goNextHole);
}

function createAimArrow(){
  // Arrow shaft + head using a group of meshes for better visibility
  aimArrow=new THREE.Group();
  aimArrow.visible=false;

  // Shaft - use a thin cylinder
  const shaftGeo=new THREE.CylinderGeometry(0.04,0.04,1,6);
  shaftGeo.rotateX(Math.PI/2);
  shaftGeo.translate(0,0,0.5);
  const shaftMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.85});
  const shaft=new THREE.Mesh(shaftGeo,shaftMat);
  shaft.name='shaft';
  aimArrow.add(shaft);

  // Arrow head
  const headGeo=new THREE.ConeGeometry(0.12,0.3,6);
  headGeo.rotateX(Math.PI/2);
  const headMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.9});
  const head=new THREE.Mesh(headGeo,headMat);
  head.name='head';
  aimArrow.add(head);

  // Power ring around ball
  const ringGeo=new THREE.RingGeometry(0.2,0.35,24);
  const ringMat=new THREE.MeshBasicMaterial({color:0x44ff44,transparent:true,opacity:0.5,side:THREE.DoubleSide});
  aimCircle=new THREE.Mesh(ringGeo,ringMat);
  aimCircle.rotation.x=-Math.PI/2;
  aimCircle.visible=false;
  scene.add(aimCircle);

  scene.add(aimArrow);
}

function createClouds(){
  const cloudMat=new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.75});
  for(let i=0;i<12;i++){
    const cloud=new THREE.Group();
    const n=3+Math.floor(Math.random()*4);
    for(let j=0;j<n;j++){
      const r=1.2+Math.random()*2;
      const geo=new THREE.SphereGeometry(r,8,6);
      const puff=new THREE.Mesh(geo,cloudMat);
      puff.position.set(j*1.8-n*0.9,Math.random()*0.4-0.2,Math.random()*1-0.5);
      puff.scale.y=0.4+Math.random()*0.2;
      cloud.add(puff);
    }
    cloud.position.set(-60+Math.random()*120,22+Math.random()*15,-40+Math.random()*80);
    scene.add(cloud);
  }
}

function buildHoleDots(){
  holeDots.innerHTML='';
  for(let i=0;i<9;i++){
    const dot=document.createElement('div');
    dot.className='hole-dot';
    holeDots.appendChild(dot);
  }
}

function updateHoleDots(){
  const dots=holeDots.children;
  for(let i=0;i<9;i++){
    dots[i].className='hole-dot';
    if(i<currentHole) dots[i].classList.add('done');
    if(i===currentHole) dots[i].classList.add('active');
  }
}

/* ============================================================
   COURSE BUILDING
   ============================================================ */
function clearCourse(){
  courseMeshes.forEach(m=>{scene.remove(m);if(m.geometry)m.geometry.dispose();});
  courseMeshes=[];
  obstacleMeshes.forEach(m=>{scene.remove(m);});
  obstacleMeshes=[];
  waterMeshes.forEach(m=>{scene.remove(m);if(m.geometry)m.geometry.dispose();});
  waterMeshes=[];
  if(holeCupMesh){scene.remove(holeCupMesh);holeCupMesh=null;}
  if(flagGroup){scene.remove(flagGroup);flagGroup=null;}
  windmillArm=null;
}

function buildCourse(idx){
  clearCourse();
  const h=courses[idx];
  const b=h.bounds;

  // --- COURSE SURFACE ---
  // Outer border (darker green) - expand bounds outward
  const borderShape=new THREE.Shape();
  const pad=0.4;
  // Compute center of bounds
  let cx=0,cz=0;for(let i=0;i<b.length;i++){cx+=b[i][0];cz+=b[i][1]}cx/=b.length;cz/=b.length;
  // Expand each vertex away from center
  const padded=b.map(function(v){var dx=v[0]-cx,dz=v[1]-cz,d=Math.sqrt(dx*dx+dz*dz)||1;return[v[0]+dx/d*pad,v[1]+dz/d*pad]});
  borderShape.moveTo(padded[0][0],padded[0][1]);
  for(let i=1;i<padded.length;i++) borderShape.lineTo(padded[i][0],padded[i][1]);
  borderShape.closePath();
  const borderGeo=new THREE.ShapeGeometry(borderShape);
  const borderMat=new THREE.MeshLambertMaterial({color:0x2E7D32});
  const borderMesh=new THREE.Mesh(borderGeo,borderMat);
  borderMesh.rotation.x=-Math.PI/2;
  borderMesh.position.y=0.003;
  borderMesh.receiveShadow=true;
  courseMeshes.push(borderMesh);
  scene.add(borderMesh);

  // Main surface
  const shape=new THREE.Shape();
  shape.moveTo(b[0][0],b[0][1]);
  for(let i=1;i<b.length;i++) shape.lineTo(b[i][0],b[i][1]);
  shape.closePath();
  const surfGeo=new THREE.ShapeGeometry(shape);
  const surfMat=new THREE.MeshLambertMaterial({color:0x4CAF50});
  const surfMesh=new THREE.Mesh(surfGeo,surfMat);
  surfMesh.rotation.x=-Math.PI/2;
  surfMesh.position.y=0.01;
  surfMesh.receiveShadow=true;
  courseMeshes.push(surfMesh);
  scene.add(surfMesh);

  // --- WALLS ---
  const allWalls=[...h.walls];
  if(h.innerWalls) allWalls.push(...h.innerWalls);

  allWalls.forEach(w=>{
    const x1=w[0],z1=w[1],x2=w[2],z2=w[3];
    const dx=x2-x1,dz=z2-z1;
    const len=Math.sqrt(dx*dx+dz*dz);
    if(len<0.01)return;
    const ang=Math.atan2(dx,dz);

    // Wall body
    const wGeo=new THREE.BoxGeometry(WALL_THICKNESS,WALL_HEIGHT,len+WALL_THICKNESS);
    const wMat=new THREE.MeshLambertMaterial({color:0x795548});
    const wMesh=new THREE.Mesh(wGeo,wMat);
    wMesh.position.set((x1+x2)/2,WALL_HEIGHT/2,(z1+z2)/2);
    wMesh.rotation.y=ang;
    wMesh.castShadow=true;
    wMesh.receiveShadow=true;
    courseMeshes.push(wMesh);
    scene.add(wMesh);

    // Trim on top
    const trimGeo=new THREE.BoxGeometry(WALL_THICKNESS+0.06,0.06,len+WALL_THICKNESS+0.06);
    const trimMat=new THREE.MeshLambertMaterial({color:0x8D6E63});
    const trim=new THREE.Mesh(trimGeo,trimMat);
    trim.position.set((x1+x2)/2,WALL_HEIGHT+0.03,(z1+z2)/2);
    trim.rotation.y=ang;
    courseMeshes.push(trim);
    scene.add(trim);
  });

  // --- HOLE CUP ---
  const holeGeo=new THREE.CylinderGeometry(HOLE_RADIUS,HOLE_RADIUS,0.06,20);
  const holeMat=new THREE.MeshLambertMaterial({color:0x1a1a1a});
  holeCupMesh=new THREE.Mesh(holeGeo,holeMat);
  holeCupMesh.position.set(h.hole[0],-0.01,h.hole[1]);
  scene.add(holeCupMesh);

  // White rim
  const rimGeo=new THREE.TorusGeometry(HOLE_RADIUS,0.04,8,20);
  const rimMat=new THREE.MeshLambertMaterial({color:0xeeeeee});
  const rim=new THREE.Mesh(rimGeo,rimMat);
  rim.rotation.x=Math.PI/2;
  rim.position.set(h.hole[0],0.015,h.hole[1]);
  courseMeshes.push(rim);
  scene.add(rim);

  // --- FLAG ---
  flagGroup=new THREE.Group();
  const poleGeo=new THREE.CylinderGeometry(0.025,0.025,2.2,6);
  const poleMat=new THREE.MeshLambertMaterial({color:0xdddddd});
  const pole=new THREE.Mesh(poleGeo,poleMat);
  pole.position.y=1.1;
  pole.castShadow=true;
  flagGroup.add(pole);

  // Triangular flag
  const fShape=new THREE.Shape();
  fShape.moveTo(0,0);fShape.lineTo(0.7,-0.12);fShape.lineTo(0,-0.28);fShape.closePath();
  const fGeo=new THREE.ShapeGeometry(fShape);
  const fMat=new THREE.MeshLambertMaterial({color:0xe53935,side:THREE.DoubleSide});
  const flag=new THREE.Mesh(fGeo,fMat);
  flag.position.set(0.03,1.9,0);
  flag.castShadow=true;
  flagGroup.add(flag);

  // Hole number on flag
  flagGroup.position.set(h.hole[0],0,h.hole[1]);
  scene.add(flagGroup);

  // --- WATER ---
  if(h.water&&h.water.length>0){
    h.water.forEach(w=>{
      const wGeo=new THREE.PlaneGeometry(w.size[0],w.size[1]);
      const wMat=new THREE.MeshPhongMaterial({
        color:0x1976D2,transparent:true,opacity:0.65,
        shininess:80,specular:0x88bbff
      });
      const wMesh=new THREE.Mesh(wGeo,wMat);
      wMesh.rotation.x=-Math.PI/2;
      wMesh.position.set(w.pos[0]+w.size[0]/2,0.015,w.pos[1]+w.size[1]/2);
      wMesh.receiveShadow=true;
      waterMeshes.push(wMesh);
      scene.add(wMesh);

      // Water edge markers
      const edgeGeo=new THREE.PlaneGeometry(w.size[0]+0.3,w.size[1]+0.3);
      const edgeMat=new THREE.MeshLambertMaterial({color:0x1565C0,transparent:true,opacity:0.4});
      const edgeMesh=new THREE.Mesh(edgeGeo,edgeMat);
      edgeMesh.rotation.x=-Math.PI/2;
      edgeMesh.position.set(w.pos[0]+w.size[0]/2,0.008,w.pos[1]+w.size[1]/2);
      courseMeshes.push(edgeMesh);
      scene.add(edgeMesh);
    });
  }

  // --- RAMPS ---
  if(h.ramps&&h.ramps.length>0){
    h.ramps.forEach(r=>{
      // Ramp slope
      const hw=r.size[0]/2, hd=r.size[1]/2;
      const rampLen=Math.sqrt(r.size[1]*r.size[1]+r.elevation*r.elevation);
      const rGeo=new THREE.PlaneGeometry(r.size[0],rampLen);
      const rMat=new THREE.MeshLambertMaterial({color:0x66BB6A,side:THREE.DoubleSide});
      const rMesh=new THREE.Mesh(rGeo,rMat);
      const rampAngle=Math.atan2(r.elevation,r.size[1]);
      rMesh.rotation.x=-Math.PI/2+rampAngle;
      rMesh.position.set(r.pos[0],r.elevation/2+0.02,r.pos[1]);
      rMesh.receiveShadow=true;
      courseMeshes.push(rMesh);
      scene.add(rMesh);

      // Side walls for ramp
      for(let side=-1;side<=1;side+=2){
        const sGeo=new THREE.BufferGeometry();
        const verts=new Float32Array([
          r.pos[0]+side*hw, 0, r.pos[1]-hd,
          r.pos[0]+side*hw, r.elevation+0.3, r.pos[1]+hd,
          r.pos[0]+side*hw, 0, r.pos[1]+hd,
          r.pos[0]+side*hw, 0, r.pos[1]-hd,
          r.pos[0]+side*hw, 0.3, r.pos[1]-hd,
          r.pos[0]+side*hw, r.elevation+0.3, r.pos[1]+hd,
        ]);
        sGeo.setAttribute('position',new THREE.BufferAttribute(verts,3));
        sGeo.computeVertexNormals();
        const sMat=new THREE.MeshLambertMaterial({color:0x795548,side:THREE.DoubleSide});
        const sMesh=new THREE.Mesh(sGeo,sMat);
        sMesh.castShadow=true;
        courseMeshes.push(sMesh);
        scene.add(sMesh);
      }

      // Elevated platform after ramp
      const platLen=4;
      const platGeo=new THREE.BoxGeometry(r.size[0],r.elevation,platLen);
      const platMat=new THREE.MeshLambertMaterial({color:0x388E3C});
      const plat=new THREE.Mesh(platGeo,platMat);
      plat.position.set(r.pos[0],r.elevation/2,r.pos[1]+hd+platLen/2);
      plat.receiveShadow=true;plat.castShadow=true;
      courseMeshes.push(plat);
      scene.add(plat);

      // Top surface
      const topGeo=new THREE.PlaneGeometry(r.size[0],platLen);
      const topMat=new THREE.MeshLambertMaterial({color:0x4CAF50});
      const topMesh=new THREE.Mesh(topGeo,topMat);
      topMesh.rotation.x=-Math.PI/2;
      topMesh.position.set(r.pos[0],r.elevation+0.01,r.pos[1]+hd+platLen/2);
      topMesh.receiveShadow=true;
      courseMeshes.push(topMesh);
      scene.add(topMesh);
    });
  }

  // --- WINDMILL ---
  if(h.obstacles){
    h.obstacles.forEach(o=>{
      if(o.type==='windmill'){
        // Base tower
        const baseGeo=new THREE.CylinderGeometry(0.25,0.4,1.8,8);
        const baseMat=new THREE.MeshLambertMaterial({color:0x6D4C41});
        const baseMesh=new THREE.Mesh(baseGeo,baseMat);
        baseMesh.position.set(o.pos[0],0.9,o.pos[1]);
        baseMesh.castShadow=true;
        obstacleMeshes.push(baseMesh);
        scene.add(baseMesh);

        // Roof
        const roofGeo=new THREE.ConeGeometry(0.45,0.5,8);
        const roofMat=new THREE.MeshLambertMaterial({color:0x8D6E63});
        const roof=new THREE.Mesh(roofGeo,roofMat);
        roof.position.set(o.pos[0],2.05,o.pos[1]);
        roof.castShadow=true;
        obstacleMeshes.push(roof);
        scene.add(roof);

        // Rotating arm group
        const armGroup=new THREE.Group();
        armGroup.position.set(o.pos[0],0.4,o.pos[1]);

        // Two crossed blades
        for(let bi=0;bi<2;bi++){
          const bladeGeo=new THREE.BoxGeometry(o.radius*2,0.12,0.3);
          const bladeMat=new THREE.MeshLambertMaterial({color:bi===0?0xE53935:0xFDD835});
          const blade=new THREE.Mesh(bladeGeo,bladeMat);
          blade.rotation.y=bi*Math.PI/2;
          blade.castShadow=true;
          armGroup.add(blade);
        }

        // Hub
        const hubGeo=new THREE.CylinderGeometry(0.12,0.12,0.25,8);
        const hubMat=new THREE.MeshLambertMaterial({color:0x424242});
        const hub=new THREE.Mesh(hubGeo,hubMat);
        armGroup.add(hub);

        obstacleMeshes.push(armGroup);
        scene.add(armGroup);
        windmillArm=armGroup;
      }
    });
  }

  // --- TEE MARKER ---
  const teeGeo=new THREE.CylinderGeometry(0.25,0.25,0.04,16);
  const teeMat=new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.4});
  const teeMesh=new THREE.Mesh(teeGeo,teeMat);
  teeMesh.position.set(h.tee[0],0.02,h.tee[1]);
  courseMeshes.push(teeMesh);
  scene.add(teeMesh);

  // Small decorative elements around the course
  addDecorations(h);
}

function addDecorations(h){
  // Small shrubs around the course edges
  const bushGeo=new THREE.SphereGeometry(0.3,6,6);
  const bushMat=new THREE.MeshLambertMaterial({color:0x2E7D32});
  const b=h.bounds;
  // Place a few bushes at corners
  for(let i=0;i<b.length;i++){
    if(Math.random()>0.5)continue;
    const bx=b[i][0]+(b[i][0]>0?0.6:-0.6);
    const bz=b[i][1]+(b[i][1]>0?0.6:-0.6);
    const bush=new THREE.Mesh(bushGeo,bushMat);
    bush.position.set(bx,0.2,bz);
    bush.scale.set(0.8+Math.random()*0.6,0.6+Math.random()*0.4,0.8+Math.random()*0.6);
    bush.castShadow=true;
    courseMeshes.push(bush);
    scene.add(bush);
  }
}

/* ============================================================
   GAME FLOW
   ============================================================ */
function startGame(){
  startScreen.style.display='none';
  endScreen.style.display='none';
  currentHole=0;totalScore=0;scores=[];
  totalValEl.textContent='0';
  loadHole(0);
}

function loadHole(idx){
  currentHole=idx;
  strokes=0;
  sinkAnimating=false;
  const h=courses[idx];
  buildCourse(idx);

  ballMesh.position.set(h.tee[0],BALL_RADIUS,h.tee[1]);
  ballMesh.visible=true;
  ballMesh.scale.set(1,1,1);
  ballVel={x:0,z:0};
  lastGoodPos={x:h.tee[0],z:h.tee[1]};

  holeNumEl.textContent=(idx+1);
  parValEl.textContent=h.par;
  strokeValEl.textContent='0';
  nextHoleBtn.style.display='none';
  helpText.style.display='block';
  updateHoleDots();

  // Camera setup - top-down angled view from behind tee
  const dx=h.hole[0]-h.tee[0];
  const dz=h.hole[1]-h.tee[1];
  const midX=(h.tee[0]+h.hole[0])/2;
  const midZ=(h.tee[1]+h.hole[1])/2;
  cameraAngle=Math.atan2(dx,dz);
  cameraPitch=Math.PI*0.38;
  const dist=Math.sqrt(dx*dx+dz*dz);
  cameraDistance=Math.max(12,dist*0.8+4);
  cameraTargetSmooth={x:midX,y:0,z:midZ};

  gameState='aiming';
}

function goNextHole(){
  nextHoleBtn.style.display='none';
  if(currentHole<8){
    loadHole(currentHole+1);
  } else {
    showEndScreen();
  }
}

function showEndScreen(){
  gameState='finished';
  endScreen.style.display='flex';

  let html='<table><tr><th>Hole</th><th>Par</th><th>Score</th><th>+/-</th></tr>';
  let totalPar=0;
  scores.forEach((s,i)=>{
    const par=courses[i].par;
    totalPar+=par;
    const diff=s-par;
    const cls=diff<0?'under-par':diff>0?'over-par':'at-par';
    const diffStr=diff===0?'E':(diff>0?'+'+diff:''+diff);
    html+='<tr><td>'+(i+1)+'</td><td>'+par+'</td><td>'+s+'</td><td class="'+cls+'">'+diffStr+'</td></tr>';
  });
  html+='<tr style="border-top:2px solid rgba(255,255,255,0.4)"><td><b>Total</b></td><td><b>'+totalPar+'</b></td><td><b>'+totalScore+'</b></td>';
  const td=totalScore-totalPar;
  const tcls=td<0?'under-par':td>0?'over-par':'at-par';
  const tds=td===0?'Even':(td>0?'+'+td:''+td);
  html+='<td class="'+tcls+'"><b>'+tds+'</b></td></tr></table>';

  document.getElementById('scorecard').innerHTML=html;
  const msg=td<=-5?'Amazing round!':td<0?'Great round!':td===0?'Solid round!':td<=5?'Not bad!':'Keep practicing!';
  document.getElementById('finalScore').textContent=msg+' Final Score: '+totalScore+' ('+tds+')';
}

function showAnnouncement(text,duration){
  if(announcementTimeout)clearTimeout(announcementTimeout);
  announcementEl.textContent=text;
  announcementEl.classList.add('show');
  announcementTimeout=setTimeout(()=>{
    announcementEl.classList.remove('show');
  },duration||2200);
}

function showPenalty(text){
  penaltyEl.textContent=text;
  penaltyEl.style.opacity='1';
  setTimeout(()=>{penaltyEl.style.opacity='0';},2000);
}

/* ============================================================
   INPUT HANDLING
   ============================================================ */
function setupInput(){
  const el=renderer.domElement;
  el.addEventListener('touchstart',onTouchStart,{passive:false});
  el.addEventListener('touchmove',onTouchMove,{passive:false});
  el.addEventListener('touchend',onTouchEnd,{passive:false});
  el.addEventListener('mousedown',onMouseDown);
  el.addEventListener('mousemove',onMouseMove);
  el.addEventListener('mouseup',onMouseUp);
  el.addEventListener('wheel',onWheel,{passive:false});
  // Prevent context menu
  el.addEventListener('contextmenu',e=>e.preventDefault());
}

function getBallScreenPos(){
  const bp=ballMesh.position.clone().project(camera);
  const rect=renderer.domElement.getBoundingClientRect();
  return{
    x:(bp.x+1)/2*rect.width,
    y:(-bp.y+1)/2*rect.height
  };
}

function isBallTouch(sx,sy){
  if(!ballMesh.visible)return false;
  const bp=getBallScreenPos();
  const d=Math.sqrt((sx-bp.x)**2+(sy-bp.y)**2);
  return d<60; // generous touch area
}

function screenToWorldPlane(sx,sy){
  const rect=renderer.domElement.getBoundingClientRect();
  const nx=(sx/rect.width)*2-1;
  const ny=-(sy/rect.height)*2+1;
  const ray=new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(nx,ny),camera);
  const plane=new THREE.Plane(new THREE.Vector3(0,1,0),-BALL_RADIUS);
  const target=new THREE.Vector3();
  ray.ray.intersectPlane(plane,target);
  return target;
}

let activeTouchId=null;

function onTouchStart(e){
  e.preventDefault();
  if(gameState==='aiming'&&e.touches.length===1){
    const t=e.touches[0];
    if(isBallTouch(t.clientX,t.clientY)){
      isDragging=true;
      activeTouchId=t.identifier;
      dragStart={x:t.clientX,y:t.clientY};
      dragCurrent={x:t.clientX,y:t.clientY};
      powerBarWrap.style.display='block';
      powerLabel.style.display='block';
      helpText.style.display='none';
      return;
    }
  }
  if(e.touches.length===1&&!isDragging){
    isCameraRotating=true;
    cameraDragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if(e.touches.length===2){
    isCameraRotating=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    prevPinchDist=Math.sqrt(dx*dx+dy*dy);
  }
}

function onTouchMove(e){
  e.preventDefault();
  if(isDragging){
    for(let i=0;i<e.touches.length;i++){
      if(e.touches[i].identifier===activeTouchId){
        dragCurrent={x:e.touches[i].clientX,y:e.touches[i].clientY};
        updateAim();
        break;
      }
    }
    return;
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(prevPinchDist>0){
      cameraDistance=Math.max(6,Math.min(40,cameraDistance*(prevPinchDist/dist)));
    }
    prevPinchDist=dist;
    return;
  }
  if(isCameraRotating&&e.touches.length===1){
    const t=e.touches[0];
    const dx=t.clientX-cameraDragStart.x;
    const dy=t.clientY-cameraDragStart.y;
    cameraAngle-=dx*0.008;
    cameraPitch=Math.max(0.1,Math.min(Math.PI*0.48,cameraPitch+dy*0.004));
    cameraDragStart={x:t.clientX,y:t.clientY};
  }
}

function onTouchEnd(e){
  e.preventDefault();
  if(isDragging){
    let found=false;
    for(let i=0;i<e.touches.length;i++){
      if(e.touches[i].identifier===activeTouchId){found=true;break;}
    }
    if(!found){
      shoot();
      isDragging=false;
      activeTouchId=null;
    }
    return;
  }
  if(e.touches.length===0){
    isCameraRotating=false;
    prevPinchDist=0;
  }
}

function onMouseDown(e){
  if(e.button===2){
    isCameraRotating=true;
    cameraDragStart={x:e.clientX,y:e.clientY};
    return;
  }
  if(gameState==='aiming'&&isBallTouch(e.clientX,e.clientY)){
    isDragging=true;
    dragStart={x:e.clientX,y:e.clientY};
    dragCurrent={x:e.clientX,y:e.clientY};
    powerBarWrap.style.display='block';
    powerLabel.style.display='block';
    helpText.style.display='none';
  } else {
    isCameraRotating=true;
    cameraDragStart={x:e.clientX,y:e.clientY};
  }
}

function onMouseMove(e){
  if(isDragging){
    dragCurrent={x:e.clientX,y:e.clientY};
    updateAim();
  } else if(isCameraRotating){
    const dx=e.clientX-cameraDragStart.x;
    const dy=e.clientY-cameraDragStart.y;
    cameraAngle-=dx*0.005;
    cameraPitch=Math.max(0.1,Math.min(Math.PI*0.48,cameraPitch+dy*0.003));
    cameraDragStart={x:e.clientX,y:e.clientY};
  }
}

function onMouseUp(e){
  if(isDragging){
    shoot();
    isDragging=false;
  }
  isCameraRotating=false;
}

function onWheel(e){
  e.preventDefault();
  cameraDistance=Math.max(6,Math.min(40,cameraDistance+e.deltaY*0.03));
}

function updateAim(){
  const dx=dragCurrent.x-dragStart.x;
  const dy=dragCurrent.y-dragStart.y;
  const screenDist=Math.sqrt(dx*dx+dy*dy);
  aimPower=Math.min(screenDist/160,1);

  // Get world direction
  const startW=screenToWorldPlane(dragStart.x,dragStart.y);
  const curW=screenToWorldPlane(dragCurrent.x,dragCurrent.y);
  if(!startW||!curW)return;

  const dirX=startW.x-curW.x;
  const dirZ=startW.z-curW.z;
  const dirLen=Math.sqrt(dirX*dirX+dirZ*dirZ);
  if(dirLen>0.05){
    aimAngle=Math.atan2(dirX,dirZ);
  }

  // Power bar
  powerBar.style.height=(aimPower*100)+'%';
  const pct=Math.round(aimPower*100);
  powerLabel.textContent=pct+'%';

  // Color the power label
  if(aimPower<0.4) powerLabel.style.color='#44ff44';
  else if(aimPower<0.7) powerLabel.style.color='#ffff44';
  else powerLabel.style.color='#ff4444';

  updateAimArrow();
}

function updateAimArrow(){
  if(aimPower<0.03){
    aimArrow.visible=false;
    aimCircle.visible=false;
    return;
  }
  aimArrow.visible=true;
  aimCircle.visible=true;

  const bx=ballMesh.position.x;
  const bz=ballMesh.position.z;
  const by=ballMesh.position.y;

  const lineLen=aimPower*5+0.5;
  const endX=bx+Math.sin(aimAngle)*lineLen;
  const endZ=bz+Math.cos(aimAngle)*lineLen;

  // Position & scale shaft
  const shaft=aimArrow.getObjectByName('shaft');
  shaft.scale.z=lineLen;
  shaft.position.set(0,0,0);

  // Position head at end
  const head=aimArrow.getObjectByName('head');
  head.position.set(0,0,lineLen);

  // Orient entire group
  aimArrow.position.set(bx,by+0.02,bz);
  aimArrow.rotation.y=aimAngle;

  // Power color
  let c;
  if(aimPower<0.4) c=new THREE.Color(0x44ff44);
  else if(aimPower<0.7) c=new THREE.Color(0xffff00);
  else c=new THREE.Color(0xff4444);
  shaft.material.color=c;
  head.material.color=c;

  // Aim circle
  aimCircle.position.set(bx,by+0.02,bz);
  aimCircle.material.color=c;
  const ringScale=0.8+aimPower*0.5;
  aimCircle.scale.set(ringScale,ringScale,1);
}

function shoot(){
  aimArrow.visible=false;
  aimCircle.visible=false;
  powerBarWrap.style.display='none';
  powerLabel.style.display='none';

  if(aimPower<0.06)return;

  const power=aimPower*MAX_POWER;
  ballVel.x=Math.sin(aimAngle)*power;
  ballVel.z=Math.cos(aimAngle)*power;

  strokes++;
  strokeValEl.textContent=strokes;
  gameState='rolling';

  playHit(aimPower);
  helpText.style.display='none';

  // Save last good position
  lastGoodPos={x:ballMesh.position.x,z:ballMesh.position.z};
}

/* ============================================================
   PHYSICS
   ============================================================ */
function getElevationAt(x,z){
  const h=courses[currentHole];
  if(!h.ramps||h.ramps.length===0)return 0;
  for(const r of h.ramps){
    const hw=r.size[0]/2, hd=r.size[1]/2;
    const rx=r.pos[0], rz=r.pos[1];
    // On ramp
    if(x>=rx-hw&&x<=rx+hw&&z>=rz-hd&&z<=rz+hd){
      const t=(z-(rz-hd))/r.size[1];
      return Math.max(0,t*r.elevation);
    }
    // On platform after ramp
    if(x>=rx-hw&&x<=rx+hw&&z>rz+hd&&z<=rz+hd+4){
      return r.elevation;
    }
  }
  return 0;
}

function isInWater(x,z){
  const h=courses[currentHole];
  if(!h.water||h.water.length===0)return false;
  for(const w of h.water){
    if(x>=w.pos[0]&&x<=w.pos[0]+w.size[0]&&
       z>=w.pos[1]&&z<=w.pos[1]+w.size[1]){
      return true;
    }
  }
  return false;
}

function pointInBounds(x,z){
  const b=courses[currentHole].bounds;
  let inside=false;
  for(let i=0,j=b.length-1;i<b.length;j=i++){
    const xi=b[i][0],zi=b[i][1];
    const xj=b[j][0],zj=b[j][1];
    if((zi>z)!==(zj>z)&&(x<(xj-xi)*(z-zi)/(zj-zi)+xi)){
      inside=!inside;
    }
  }
  return inside;
}

function wallCollision(x,z,vx,vz){
  const h=courses[currentHole];
  const allWalls=[...h.walls];
  if(h.innerWalls)allWalls.push(...h.innerWalls);

  let hit=false, resVx=vx, resVz=vz, resX=x, resZ=z;

  for(const w of allWalls){
    const wx1=w[0],wz1=w[1],wx2=w[2],wz2=w[3];
    const wdx=wx2-wx1,wdz=wz2-wz1;
    const wlen=Math.sqrt(wdx*wdx+wdz*wdz);
    if(wlen<0.001)continue;

    const nx=-wdz/wlen, nz=wdx/wlen;
    const dx=x-wx1, dz=z-wz1;
    const dist=dx*nx+dz*nz;
    const proj=(dx*wdx+dz*wdz)/wlen;

    const threshold=BALL_RADIUS+WALL_THICKNESS/2+0.02;

    if(Math.abs(dist)<threshold && proj>-BALL_RADIUS*2 && proj<wlen+BALL_RADIUS*2){
      const velDot=resVx*nx+resVz*nz;
      if((dist>0&&velDot<0)||(dist<0&&velDot>0)){
        resVx=resVx-2*velDot*nx;
        resVz=resVz-2*velDot*nz;
        // Apply energy loss
        resVx*=BOUNCE_LOSS;
        resVz*=BOUNCE_LOSS;
        // Push out
        const sign=dist>0?1:-1;
        const pushDist=threshold-Math.abs(dist)+0.01;
        resX=x+nx*sign*pushDist;
        resZ=z+nz*sign*pushDist;
        hit=true;
        const speed=Math.sqrt(vx*vx+vz*vz);
        playBounce(speed/MAX_POWER);
      }
    }
  }
  return hit?{x:resX,z:resZ,vx:resVx,vz:resVz}:null;
}

function windmillCollision(x,z,vx,vz){
  const h=courses[currentHole];
  if(!h.obstacles||!windmillArm)return null;

  for(const o of h.obstacles){
    if(o.type!=='windmill')continue;
    const angle=windmillArm.rotation.y;
    const radius=o.radius;
    const ox=o.pos[0],oz=o.pos[1];

    for(let bi=0;bi<4;bi++){
      const ba=angle+bi*Math.PI/2;
      const bx2=ox+Math.sin(ba)*radius;
      const bz2=oz+Math.cos(ba)*radius;
      const bdx=bx2-ox, bdz=bz2-oz;
      const blen=Math.sqrt(bdx*bdx+bdz*bdz);
      const bnx=-bdz/blen, bnz=bdx/blen;

      const pdx=x-ox,pdz=z-oz;
      const dist=pdx*bnx+pdz*bnz;
      const proj=(pdx*bdx+pdz*bdz)/blen;

      if(Math.abs(dist)<BALL_RADIUS+0.18 && proj>-0.1 && proj<blen+0.1){
        const velDot=vx*bnx+vz*bnz;
        if((dist>0&&velDot<0)||(dist<0&&velDot>0)){
          let nvx=vx-2*velDot*bnx;
          let nvz=vz-2*velDot*bnz;
          // Add windmill rotational push
          const push=windmillSpeed*radius*0.8;
          const perpX=Math.cos(ba)*push;
          const perpZ=-Math.sin(ba)*push;
          nvx=(nvx+perpX)*BOUNCE_LOSS;
          nvz=(nvz+perpZ)*BOUNCE_LOSS;
          const sign=dist>0?1:-1;
          const pushOut=BALL_RADIUS+0.2-Math.abs(dist)+0.02;
          playBounce(0.5);
          return{vx:nvx,vz:nvz,px:x+bnx*sign*pushOut,pz:z+bnz*sign*pushOut};
        }
      }
    }
  }
  return null;
}

function updatePhysics(dt){
  if(gameState!=='rolling'||sinkAnimating)return;
  dt=Math.min(dt,1/30);

  const subDt=dt/SUB_STEPS;
  for(let step=0;step<SUB_STEPS;step++){
    const speed=Math.sqrt(ballVel.x*ballVel.x+ballVel.z*ballVel.z);

    // Ramp gravity
    const h=courses[currentHole];
    if(h.ramps){
      for(const r of h.ramps){
        const hw=r.size[0]/2, hd=r.size[1]/2;
        const rx=r.pos[0], rz=r.pos[1];
        if(ballMesh.position.x>=rx-hw&&ballMesh.position.x<=rx+hw&&
           ballMesh.position.z>=rz-hd&&ballMesh.position.z<=rz+hd){
          const slope=r.elevation/r.size[1];
          ballVel.z-=9.8*slope*subDt;
        }
      }
    }

    // Friction (frame-rate independent)
    const fric=Math.pow(FRICTION,subDt*60);
    ballVel.x*=fric;
    ballVel.z*=fric;

    // Additional friction when slow (helps ball stop cleanly)
    if(speed<1.0){
      const slowFric=Math.pow(0.96,subDt*60);
      ballVel.x*=slowFric;
      ballVel.z*=slowFric;
    }

    let nx=ballMesh.position.x+ballVel.x*subDt;
    let nz=ballMesh.position.z+ballVel.z*subDt;

    // Wall collision
    const wc=wallCollision(nx,nz,ballVel.x,ballVel.z);
    if(wc){
      nx=wc.x;nz=wc.z;
      ballVel.x=wc.vx;ballVel.z=wc.vz;
    }

    // Windmill collision
    const wm=windmillCollision(nx,nz,ballVel.x,ballVel.z);
    if(wm){
      ballVel.x=wm.vx;ballVel.z=wm.vz;
      nx=wm.px;nz=wm.pz;
    }

    // Water check
    if(isInWater(nx,nz)&&speed>0.5){
      handleWaterHazard();
      return;
    }

    // Boundary fallback
    if(!pointInBounds(nx,nz)){
      // Don't update position, just reverse velocity
      ballVel.x*=-0.5;
      ballVel.z*=-0.5;
      nx=ballMesh.position.x;
      nz=ballMesh.position.z;
      playBounce(0.3);
    }

    // Track last good position (not in water)
    if(!isInWater(nx,nz)&&pointInBounds(nx,nz)){
      lastGoodPos={x:nx,z:nz};
    }

    ballMesh.position.x=nx;
    ballMesh.position.z=nz;

    // Y elevation
    const elev=getElevationAt(nx,nz)+BALL_RADIUS;
    ballMesh.position.y+=(elev-ballMesh.position.y)*0.4;
  }

  // Ball rotation
  const speed=Math.sqrt(ballVel.x*ballVel.x+ballVel.z*ballVel.z);
  if(speed>0.01){
    const axis=new THREE.Vector3(-ballVel.z,0,ballVel.x).normalize();
    const rot=speed*dt/BALL_RADIUS;
    const q=new THREE.Quaternion().setFromAxisAngle(axis,rot);
    ballMesh.quaternion.premultiply(q);
  }

  // Rolling sound
  if(speed>0.3) updateRollSound(speed);
  else stopRollSound();

  // Check if ball sinks into hole
  const hp=courses[currentHole].hole;
  const dh=Math.sqrt((ballMesh.position.x-hp[0])**2+(ballMesh.position.z-hp[1])**2);
  if(dh<HOLE_RADIUS*0.9 && speed<10){
    sinkBall();
    return;
  }
  // Attract ball toward hole when very close and slow
  if(dh<HOLE_RADIUS*1.3 && speed<3){
    const pullStrength=0.5*(1-dh/(HOLE_RADIUS*1.3));
    ballVel.x+=(hp[0]-ballMesh.position.x)*pullStrength;
    ballVel.z+=(hp[1]-ballMesh.position.z)*pullStrength;
  }

  // Ball stopped?
  if(speed<STOP_THRESHOLD){
    ballVel={x:0,z:0};
    stopRollSound();
    // Check if in water while stopped
    if(isInWater(ballMesh.position.x,ballMesh.position.z)){
      handleWaterHazard();
      return;
    }
    gameState='aiming';
    helpText.textContent='Drag from the ball to aim';
    helpText.style.display='block';
  }
}

function handleWaterHazard(){
  gameState='penalty';
  ballVel={x:0,z:0};
  stopRollSound();
  playSplash();
  showPenalty('+1 Penalty Stroke');
  strokes++;
  strokeValEl.textContent=strokes;

  // Animate ball sinking
  const startY=ballMesh.position.y;
  let t=0;
  function sinkAnim(){
    t+=0.02;
    if(t>=1){
      // Reset to last good position or tee
      const tee=courses[currentHole].tee;
      const resetX=lastGoodPos.x;
      const resetZ=lastGoodPos.z;
      // Make sure reset pos is not in water
      if(isInWater(resetX,resetZ)){
        ballMesh.position.set(tee[0],BALL_RADIUS,tee[1]);
        lastGoodPos={x:tee[0],z:tee[1]};
      } else {
        ballMesh.position.set(resetX,BALL_RADIUS,resetZ);
      }
      ballMesh.scale.set(1,1,1);
      ballMesh.visible=true;
      gameState='aiming';
      helpText.textContent='Drag from the ball to aim';
      helpText.style.display='block';
      return;
    }
    ballMesh.position.y=startY-t*0.5;
    const s=1-t*0.3;
    ballMesh.scale.set(s,s,s);
    requestAnimationFrame(sinkAnim);
  }
  sinkAnim();
}

function sinkBall(){
  sinkAnimating=true;
  gameState='sunk';
  stopRollSound();

  const hp=courses[currentHole].hole;
  const startPos=ballMesh.position.clone();
  const elev=getElevationAt(hp[0],hp[1]);
  const endPos=new THREE.Vector3(hp[0],elev-0.15,hp[1]);
  const startScale=ballMesh.scale.clone();
  let t=0;

  function animSink(){
    t+=0.04;
    if(t>=1){
      ballMesh.visible=false;
      ballMesh.scale.copy(startScale);
      sinkAnimating=false;
      onBallSunk();
      return;
    }
    // Smooth ease-in curve
    const ease=t*t;
    ballMesh.position.lerpVectors(startPos,endPos,ease);
    const s=1-ease*0.6;
    ballMesh.scale.set(s,s,s);
    requestAnimationFrame(animSink);
  }
  animSink();

  // Score announcement
  const par=courses[currentHole].par;
  const diff=strokes-par;
  if(strokes===1){
    playHoleInOne();
    showAnnouncement('HOLE IN ONE!',3500);
  } else if(diff<=-2){
    playSink();showAnnouncement('Eagle!',2500);
  } else if(diff===-1){
    playSink();showAnnouncement('Birdie!',2500);
  } else if(diff===0){
    playSink();showAnnouncement('Par',2200);
  } else if(diff===1){
    playSink();showAnnouncement('Bogey',2200);
  } else if(diff===2){
    playSink();showAnnouncement('Double Bogey',2200);
  } else {
    playSink();showAnnouncement('+'+diff+' Over Par',2200);
  }
}

function onBallSunk(){
  scores.push(strokes);
  totalScore+=strokes;
  totalValEl.textContent=totalScore;

  nextHoleBtn.textContent=currentHole<8?'Next Hole':'See Scorecard';
  nextHoleBtn.style.display='block';
}

/* ============================================================
   CAMERA
   ============================================================ */
function updateCamera(dt){
  const tx=ballMesh.position.x;
  const tz=ballMesh.position.z;
  const ty=ballMesh.position.y;

  const lerpSpeed=gameState==='rolling'?0.06:0.04;
  cameraTargetSmooth.x+=(tx-cameraTargetSmooth.x)*lerpSpeed;
  cameraTargetSmooth.y+=(ty-cameraTargetSmooth.y)*lerpSpeed;
  cameraTargetSmooth.z+=(tz-cameraTargetSmooth.z)*lerpSpeed;

  const cx=cameraTargetSmooth.x+Math.sin(cameraAngle)*Math.cos(cameraPitch)*cameraDistance;
  const cy=cameraTargetSmooth.y+Math.sin(cameraPitch)*cameraDistance;
  const cz=cameraTargetSmooth.z+Math.cos(cameraAngle)*Math.cos(cameraPitch)*cameraDistance;

  camera.position.set(cx,Math.max(cy,1.5),cz);
  camera.lookAt(cameraTargetSmooth.x,cameraTargetSmooth.y,cameraTargetSmooth.z);
}

/* ============================================================
   RENDER LOOP
   ============================================================ */
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  if(gameState!=='start'&&gameState!=='finished'){
    updatePhysics(dt);
    updateCamera(dt);

    // Windmill rotation
    if(windmillArm){
      windmillArm.rotation.y+=windmillSpeed*dt;
    }

    // Flag wave
    if(flagGroup&&flagGroup.children[1]){
      flagGroup.children[1].rotation.y=Math.sin(Date.now()*0.004)*0.15;
    }

    // Water shimmer
    const time=Date.now()*0.002;
    waterMeshes.forEach((w,i)=>{
      w.material.opacity=0.55+Math.sin(time+i)*0.1;
      w.position.y=0.015+Math.sin(time*1.5+i*2)*0.005;
    });

    // Ball glow when aiming
    if(gameState==='aiming'&&ballMesh.visible){
      const pulse=0.5+Math.sin(Date.now()*0.005)*0.5;
      ballMesh.material.emissive=new THREE.Color(0.05*pulse,0.1*pulse,0.05*pulse);
    } else {
      ballMesh.material.emissive=new THREE.Color(0,0,0);
    }
  } else {
    // Still render for background on start/end screens
    updateCamera(dt);
  }

  renderer.render(scene,camera);
}

function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// Initialize
init();
animate();

})();
</script>
