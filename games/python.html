// ── Sound
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.04,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndCorrect(){tone(523,0.1,"sine",0.05);setTimeout(function(){tone(659,0.1,"sine",0.04);},80);}
function sndWrong(){tone(200,0.2,"square",0.04);}
function sndWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,0.2,"sine",0.06);},i*100);});}

function shuffle(arr) {
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

// ── Stats
function loadStats(){try{return JSON.parse(localStorage.getItem("py-trivia"))||{best:0,played:0};}catch(e){return{best:0,played:0};}}
function saveStats(s){localStorage.setItem("py-trivia",JSON.stringify(s));}

// ── Components
function QuizScreen(props) {
  var questions = props.questions;
  var [idx, setIdx] = useState(0);
  var [score, setScore] = useState(0);
  var [selected, setSelected] = useState(-1);
  var [revealed, setRevealed] = useState(false);
  var [streak, setStreak] = useState(0);
  var [shaking, setShaking] = useState(false);
  var [particles, setParticles] = useState([]);
  var particleId = useRef(0);

  var q = questions[idx];
  var total = questions.length;
  var progress = ((idx) / total) * 100;

  var select = function(i) {
    if (revealed) return;
    setSelected(i);
    setRevealed(true);
    if (i === q.a) {
      setScore(function(s){return s+1;});
      setStreak(function(s){return s+1;});
      sndCorrect();
      var id=particleId.current++;
      setParticles([{id:id,emoji:"✅"}]);
      setTimeout(function(){setParticles([]);},800);
    } else {
      setStreak(0);
      sndWrong();
      setShaking(true);
      setTimeout(function(){setShaking(false);},400);
    }
  };

  var next = function() {
    if (idx + 1 >= total) {
      props.onFinish(score);
      return;
    }
    setIdx(idx + 1);
    setSelected(-1);
    setRevealed(false);
  };

  var optionLabels = ["A","B","C","D"];

  return (
    <div style={{minHeight:"100%",display:"flex",flexDirection:"column",padding:"12px"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <span style={{fontSize:"1.2rem"}}>🐍</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,color:"var(--blue)"}}>Python Trivia</span>
        <span style={{marginLeft:"auto",fontFamily:"var(--font-mono)",fontSize:"0.75rem",color:"var(--dim)"}}>{idx+1}/{total}</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",color:"var(--green)"}}>{score}✓</span>
      </div>

      {/* Progress bar */}
      <div style={{height:4,background:"var(--bg3)",borderRadius:2,marginBottom:12}}>
        <div style={{height:4,background:"var(--blue)",borderRadius:2,width:progress+"%",transition:"width 0.3s"}}/>
      </div>

      {/* Streak */}
      {streak >= 3 && <div style={{textAlign:"center",fontSize:"0.7rem",fontFamily:"var(--font-mono)",color:"var(--yellow)",marginBottom:6}}>🔥 {streak} streak!</div>}

      {/* Question */}
      <div className={shaking?"shake":"fade-in"} key={idx} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:"0.9rem",lineHeight:1.6,fontWeight:500}}>{q.q}</div>
      </div>

      {/* Options */}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
        {q.o.map(function(opt, i) {
          var isCorrect = i === q.a;
          var isSelected = i === selected;
          var bg = "var(--bg2)";
          var border = "var(--border)";
          var color = "var(--text)";
          if (revealed) {
            if (isCorrect) { bg = "rgba(63,185,80,0.15)"; border = "var(--green)"; color = "var(--green)"; }
            else if (isSelected && !isCorrect) { bg = "rgba(248,81,73,0.15)"; border = "var(--red)"; color = "var(--red)"; }
            else { bg = "var(--bg3)"; color = "var(--dim)"; }
          }
          return (
            <button key={i} onClick={function(){select(i);}} disabled={revealed}
              style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:bg,
                border:"1.5px solid "+border,borderRadius:8,color:color,fontSize:"0.85rem",
                fontFamily:"var(--font-sans)",cursor:revealed?"default":"pointer",textAlign:"left",
                transition:"all 0.15s"}}>
              <span style={{width:24,height:24,borderRadius:6,background:revealed&&isCorrect?"var(--green)":revealed&&isSelected?"var(--red)":"var(--bg3)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",fontWeight:700,
                fontFamily:"var(--font-mono)",color:revealed&&(isCorrect||isSelected)?"#fff":"var(--dim)",flexShrink:0}}>
                {revealed && isCorrect ? "✓" : revealed && isSelected ? "✗" : optionLabels[i]}
              </span>
              <span>{opt}</span>
            </button>
          );
        })}
      </div>

      {/* Joke/explanation */}
      {revealed && (
        <div className="fade-in" style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"12px",marginBottom:12,fontSize:"0.78rem",color:"var(--dim)",lineHeight:1.6}}>
          <span style={{color:"var(--yellow)"}}>💡 </span>{q.joke}
        </div>
      )}

      {/* Next button */}
      {revealed && (
        <button onClick={next} className="pop"
          style={{width:"100%",padding:"14px",background:"var(--blue)",border:"none",borderRadius:8,
            color:"#fff",fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,cursor:"pointer",
            marginBottom:8}}>
          {idx + 1 >= total ? "See Results 🎉" : "Next Question →"}
        </button>
      )}

      {/* Particles */}
      {particles.map(function(p){return <span key={p.id} style={{position:"fixed",top:"40%",left:"50%",fontSize:"2rem",animation:"confetti 0.8s ease forwards",pointerEvents:"none"}}>{p.emoji}</span>;})}
    </div>
  );
}

function ResultScreen(props) {
  var score = props.score;
  var total = props.total;
  var pct = Math.round(score / total * 100);
  var stats = loadStats();
  var newBest = score > stats.best;

  useEffect(function() {
    var s = {best: Math.max(stats.best, score), played: stats.played + 1};
    saveStats(s);
    if (pct >= 80) sndWin();
  }, []);

  var grade = pct >= 90 ? "A+" : pct >= 80 ? "A" : pct >= 70 ? "B" : pct >= 60 ? "C" : pct >= 50 ? "D" : "F";
  var msg = pct >= 90 ? "You're a Python wizard! 🧙‍♂️" :
            pct >= 80 ? "Solid! You actually paid attention in class." :
            pct >= 70 ? "Not bad! A few more study sessions and you're golden." :
            pct >= 60 ? "You passed... barely. Like a car running on fumes." :
            pct >= 50 ? "You know SOME Python. Emphasis on some." :
            "Did you accidentally take the JavaScript exam? 😬";

  var roasts = [
    pct < 50 ? "Your Python knowledge is like a snake — it keeps slipping away." : null,
    pct < 40 ? "print('Please study more') # this is a cry for help" : null,
    pct >= 90 ? "You probably dream in list comprehensions." : null,
    pct >= 95 ? "Are you secretly Guido van Rossum?" : null,
  ].filter(Boolean);

  return (
    <div style={{minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",gap:"1rem"}}>
      <div style={{fontSize:"3rem"}}>{pct >= 70 ? "🐍" : pct >= 50 ? "🤔" : "💀"}</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:"2.5rem",fontWeight:800,color:pct>=70?"var(--green)":pct>=50?"var(--yellow)":"var(--red)"}}>{score}/{total}</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:"1.5rem",fontWeight:700,color:"var(--text)"}}>{grade}</div>
      <div style={{fontSize:"0.85rem",color:"var(--dim)",textAlign:"center",maxWidth:300}}>{msg}</div>
      {roasts.length > 0 && <div style={{fontSize:"0.78rem",color:"var(--yellow)",textAlign:"center",fontFamily:"var(--font-mono)"}}>{roasts[0]}</div>}
      {newBest && <div style={{fontSize:"0.8rem",color:"var(--green)",fontFamily:"var(--font-mono)"}}>🏆 NEW PERSONAL BEST!</div>}

      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 20px",display:"flex",gap:20,fontSize:"0.7rem",fontFamily:"var(--font-mono)",color:"var(--dim)",marginTop:8}}>
        <div style={{textAlign:"center"}}><div style={{fontSize:"1.1rem",color:"var(--text)",fontWeight:700}}>{pct}%</div>Score</div>
        <div style={{textAlign:"center"}}><div style={{fontSize:"1.1rem",color:"var(--green)",fontWeight:700}}>{Math.max(stats.best,score)}</div>Best</div>
        <div style={{textAlign:"center"}}><div style={{fontSize:"1.1rem",color:"var(--text)",fontWeight:700}}>{stats.played+1}</div>Played</div>
      </div>

      <div style={{display:"flex",gap:8,marginTop:8}}>
        <button onClick={props.onRestart} style={{padding:"12px 24px",background:"var(--blue)",border:"none",borderRadius:8,color:"#fff",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,cursor:"pointer"}}>
          Try Again 🐍
        </button>
        <a href="../index.html" style={{padding:"12px 24px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,color:"var(--dim)",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,textDecoration:"none",display:"flex",alignItems:"center"}}>
          Home
        </a>
      </div>
    </div>
  );
}

function Splash(props) {
  var stats = loadStats();
  return (
    <div style={{minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",gap:"1rem"}}>
      <div style={{fontSize:"3.5rem"}}>🐍</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:"clamp(1.8rem,8vw,2.4rem)",fontWeight:800,color:"var(--blue)"}}>Python Trivia</div>
      <div style={{fontSize:"0.85rem",color:"var(--dim)",textAlign:"center",maxWidth:300,lineHeight:1.6}}>
        67 questions about Python programming. Grade 11 level. Funny explanations for every answer.
      </div>
      <div style={{display:"flex",gap:12,marginTop:4}}>
        <button onClick={function(){props.onStart("all");}} style={{padding:"14px 28px",background:"var(--blue)",border:"none",borderRadius:10,color:"#fff",fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>
          All 67 Questions
        </button>
        <button onClick={function(){props.onStart("quick");}} style={{padding:"14px 28px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,cursor:"pointer"}}>
          Quick 20
        </button>
      </div>
      {stats.played > 0 && (
        <div style={{fontSize:"0.7rem",fontFamily:"var(--font-mono)",color:"var(--dim)",marginTop:4}}>
          Best: {stats.best} · Played: {stats.played}
        </div>
      )}
      <a href="../index.html" style={{marginTop:12,fontSize:"0.6rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textDecoration:"none"}}>← taskiap.com</a>
    </div>
  );
}

function App() {
  var [screen, setScreen] = useState("splash");
  var [questions, setQuestions] = useState([]);
  var [finalScore, setFinalScore] = useState(0);

  var start = function(mode) {
    var qs = shuffle(Q);
    if (mode === "quick") qs = qs.slice(0, 20);
    setQuestions(qs);
    setScreen("quiz");
  };

  var finish = function(score) {
    setFinalScore(score);
    setScreen("result");
  };

  var restart = function() { setScreen("splash"); };

  if (screen === "splash") return <Splash onStart={start}/>;
  if (screen === "quiz") return <QuizScreen questions={questions} onFinish={finish}/>;
  return <ResultScreen score={finalScore} total={questions.length} onRestart={restart}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
