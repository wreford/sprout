<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LILY'S HORSE OBBY</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #2d1b4e;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
#ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
#ui-layer > * { pointer-events: auto; }
#home-link {
  position: fixed;
  top: 10px; left: 10px;
  color: #fff;
  text-decoration: none;
  font-size: 16px;
  z-index: 100;
  background: rgba(139,69,19,0.6);
  padding: 5px 12px;
  border-radius: 12px;
}
#home-link:hover { background: rgba(139,69,19,0.8); }
#hud {
  position: fixed;
  top: 10px; right: 10px;
  color: #fff;
  font-size: 15px;
  text-align: right;
  z-index: 20;
  display: none;
}
.hud-item {
  background: rgba(80,40,20,0.7);
  padding: 4px 12px;
  margin-bottom: 4px;
  border-radius: 12px;
  font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
.hud-stage { color: #FFB6C1; font-size: 18px; }
.hud-deaths { color: #FF69B4; }
.hud-timer { color: #fff; }
.hud-coins { color: #DAA520; }
.hud-checkpoint { color: #66bb6a; font-size: 12px; }
.hud-powerups { color: #ce93d8; font-size: 12px; }
#dash-cooldown-bar {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 6px;
  background: rgba(0,0,0,0.4);
  border-radius: 3px;
  z-index: 25;
  display: none;
  overflow: hidden;
}
#dash-cooldown-fill {
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, #FF69B4, #FF1493);
  border-radius: 3px;
  transition: width 0.05s linear;
}
#touch-controls {
  position: fixed;
  bottom: 20px;
  left: 0; right: 0;
  display: none;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 30;
}
.touch-btn {
  width: 70px; height: 70px;
  border-radius: 50%;
  background: rgba(255,182,193,0.3);
  border: 3px solid rgba(255,105,180,0.5);
  color: #fff;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.touch-btn:active { background: rgba(255,105,180,0.5); }
#touch-jump {
  width: 90px; height: 90px;
  font-size: 20px;
  font-weight: bold;
}
#touch-dash {
  width: 65px; height: 65px;
  font-size: 12px;
  font-weight: bold;
  background: rgba(218,165,32,0.3);
  border-color: rgba(218,165,32,0.6);
}
#menu-screen, #stage-select-screen, #settings-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#menu-screen {
  background: linear-gradient(180deg, #87CEEB 0%, #98FB98 50%, #90EE90 80%, #4CAF50 100%);
}
.menu-title {
  font-size: 56px;
  font-weight: 900;
  color: #8B4513;
  text-shadow: 3px 3px 0 #5C2D00, 6px 6px 0 rgba(0,0,0,0.2);
  letter-spacing: 3px;
  margin-bottom: 5px;
  transform: perspective(200px) rotateX(5deg);
}
.menu-emoji {
  font-size: 64px;
  margin-bottom: 5px;
}
.menu-subtitle {
  font-size: 18px;
  color: #6B3410;
  margin-bottom: 40px;
  font-weight: bold;
  font-style: italic;
}
.menu-btn {
  padding: 14px 50px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  margin: 8px;
  transition: transform 0.1s;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.menu-btn:hover { transform: scale(1.05); }
.menu-btn:active { transform: scale(0.95); }
.btn-play {
  background: linear-gradient(180deg, #FF69B4, #DB7093);
  color: #fff;
  font-size: 26px;
  box-shadow: 0 4px 0 #C71585;
}
.btn-stages {
  background: linear-gradient(180deg, #DDA0DD, #BA55D3);
  color: #fff;
  box-shadow: 0 4px 0 #8B008B;
}
.btn-settings {
  background: linear-gradient(180deg, #DAA520, #B8860B);
  color: #fff;
  box-shadow: 0 4px 0 #8B6914;
}
.btn-back {
  background: linear-gradient(180deg, #BC8F8F, #A0522D);
  color: #fff;
  box-shadow: 0 4px 0 #8B4513;
}
#stage-select-screen {
  background: linear-gradient(180deg, #4B0082 0%, #6A0DAD 100%);
  overflow-y: auto;
  padding: 20px;
}
.stage-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  max-width: 600px;
  margin: 20px 0;
}
.stage-btn {
  width: 50px; height: 50px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
  position: relative;
}
.stage-btn.locked {
  background: #8B7D7B;
  cursor: not-allowed;
  opacity: 0.5;
}
.stage-btn.current {
  background: linear-gradient(180deg, #FF69B4, #FF1493);
  box-shadow: 0 0 10px #FF69B4;
  animation: pulse 1s infinite;
}
.stage-btn.completed {
  background: linear-gradient(180deg, #66bb6a, #43a047);
}
.stage-stars {
  position: absolute;
  bottom: 1px; left: 0; right: 0;
  font-size: 8px;
  text-align: center;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px #FF69B4; }
  50% { box-shadow: 0 0 20px #FF69B4, 0 0 30px #FF1493; }
}
#settings-screen {
  background: linear-gradient(180deg, #5C4033 0%, #3E2723 100%);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 300px;
  padding: 12px 0;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
}
.toggle-btn {
  padding: 8px 24px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
}
.toggle-on { background: #FF69B4; }
.toggle-off { background: #BC8F8F; }
#death-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(139,69,19,0.3);
  z-index: 40;
  display: none;
  pointer-events: none;
}
#stage-complete-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 45;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.complete-title {
  font-size: 42px;
  font-weight: 900;
  color: #FFD700;
  text-shadow: 3px 3px 0 #B8860B;
  margin-bottom: 20px;
}
.complete-stars {
  font-size: 48px;
  margin-bottom: 20px;
}
.complete-info {
  font-size: 20px;
  margin-bottom: 8px;
}
.complete-encourage {
  font-size: 22px;
  color: #FFB6C1;
  font-style: italic;
  margin-bottom: 10px;
}
#milestone-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 55;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: rgba(0,0,0,0.7);
  pointer-events: none;
}
.milestone-title {
  font-size: 40px;
  font-weight: 900;
  color: #FFD700;
  text-shadow: 3px 3px 0 #B8860B;
  margin-bottom: 10px;
  animation: milePulse 0.5s ease-out;
}
.milestone-desc {
  font-size: 22px;
  color: #FFB6C1;
  animation: milePulse 0.5s ease-out 0.1s both;
}
@keyframes milePulse {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
#vignette {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.25) 100%);
}
#screen-flash {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 41;
  opacity: 0;
  transition: opacity 0.1s;
}
@media (max-width: 700px) {
  .menu-title { font-size: 36px; }
  .menu-emoji { font-size: 48px; }
  .stage-grid { grid-template-columns: repeat(5, 1fr); }
  .stage-btn { width: 55px; height: 55px; font-size: 16px; }
  #touch-controls { display: flex !important; }
}
@media (pointer: coarse) {
  #touch-controls { display: flex !important; }
}
</style>
</head>
<body>
<a id="home-link" href="../index.html">&larr; home</a>
<canvas id="game-canvas"></canvas>
<div id="vignette"></div>
<div id="screen-flash"></div>

<div id="hud">
  <div class="hud-item hud-stage" id="hud-stage">Stage 1 / 50</div>
  <div class="hud-item hud-deaths" id="hud-deaths">Falls: 0</div>
  <div class="hud-item hud-timer" id="hud-timer">00:00.0</div>
  <div class="hud-item hud-coins" id="hud-coins">Horseshoes: 0 / 150</div>
  <div class="hud-item hud-checkpoint" id="hud-checkpoint">Checkpoint: Stage 1</div>
  <div class="hud-item hud-powerups" id="hud-powerups" style="display:none;"></div>
</div>

<div id="dash-cooldown-bar">
  <div id="dash-cooldown-fill"></div>
</div>

<div id="touch-controls">
  <div style="display:flex;gap:10px;">
    <button class="touch-btn" id="touch-left">&larr;</button>
    <button class="touch-btn" id="touch-right">&rarr;</button>
  </div>
  <div style="display:flex;gap:10px;align-items:flex-end;">
    <button class="touch-btn" id="touch-dash">DASH</button>
    <button class="touch-btn" id="touch-jump">JUMP</button>
  </div>
</div>

<div id="menu-screen">
  <div class="menu-emoji">&#x1F434;</div>
  <div class="menu-title">LILY'S HORSE OBBY</div>
  <div class="menu-subtitle">50 Stages of Equestrian Adventure!</div>
  <button class="menu-btn btn-play" id="btn-play">GIDDY UP!</button>
  <button class="menu-btn btn-stages" id="btn-stages">STAGE SELECT</button>
  <button class="menu-btn btn-settings" id="btn-settings">SETTINGS</button>
</div>

<div id="stage-select-screen" style="display:none;">
  <div class="menu-title" style="font-size:32px;">STAGE SELECT</div>
  <div class="stage-grid" id="stage-grid"></div>
  <button class="menu-btn btn-back" id="btn-back-stages">BACK</button>
</div>

<div id="settings-screen" style="display:none;">
  <div class="menu-title" style="font-size:32px;">SETTINGS</div>
  <div class="settings-row">
    <span>Music</span>
    <button class="toggle-btn toggle-on" id="toggle-music">ON</button>
  </div>
  <div class="settings-row">
    <span>Sound</span>
    <button class="toggle-btn toggle-on" id="toggle-sound">ON</button>
  </div>
  <br>
  <button class="menu-btn btn-back" id="btn-back-settings">BACK</button>
</div>

<div id="death-overlay"></div>

<div id="stage-complete-overlay">
  <div class="complete-title" id="complete-title">GREAT RIDE!</div>
  <div class="complete-encourage" id="complete-encourage"></div>
  <div class="complete-stars" id="complete-stars"></div>
  <div class="complete-info" id="complete-time"></div>
  <div class="complete-info" id="complete-coins-info"></div>
  <br>
  <button class="menu-btn btn-play" id="btn-next-stage">NEXT STAGE</button>
  <button class="menu-btn btn-stages" id="btn-complete-menu">MENU</button>
</div>

<div id="milestone-overlay">
  <div class="milestone-title" id="milestone-title"></div>
  <div class="milestone-desc" id="milestone-desc"></div>
</div>

<script>
// ============================================================
// LILY'S HORSE OBBY -- A horse-themed obstacle course for Lily
// ============================================================

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// --- Constants ---
const TILE = 40;
const BASE_GRAVITY = 0.48;
const PEAK_GRAVITY = 0.22;
const MAX_FALL = 14;
const MOVE_SPEED = 5.2;
const JUMP_FORCE = -11.2;
const DOUBLE_JUMP_FORCE = -10.0;
const COYOTE_TIME = 150;
const JUMP_BUFFER = 120;
const PLAYER_W = 44;
const PLAYER_H = 36;
const MAX_VOL = 0.02;
const DASH_SPEED = 18;
const DASH_DURATION = 8;
const DASH_COOLDOWN = 120;
const WALL_SLIDE_SPEED = 1.8;
const WALL_JUMP_FORCE_X = 8;
const WALL_JUMP_FORCE_Y = -11;

// --- Theme colors per stage range ---
const THEMES = [
  { // 1-10: Sunny Meadow
    sky: ['#87CEEB','#B0E2FF','#E0F7FA'],
    platTop: '#66bb6a', platFront: '#43a047', platSide: '#2e7d32', platBorder: '#1b5e20',
    name: 'Sunny Meadow',
    grassColor: '#4CAF50',
    flowerColors: ['#FF69B4','#FFD700','#FF6347','#DDA0DD','#87CEEB'],
  },
  { // 11-20: The Stable Yard
    sky: ['#D2691E','#DEB887','#FAEBD7'],
    platTop: '#DAA520', platFront: '#B8860B', platSide: '#8B6914', platBorder: '#6B4226',
    name: 'The Stable Yard',
    grassColor: '#8B7355',
    flowerColors: ['#DAA520','#CD853F','#DEB887'],
  },
  { // 21-30: Mountain Trail
    sky: ['#4682B4','#87CEEB','#B0C4DE'],
    platTop: '#A0522D', platFront: '#8B4513', platSide: '#6B3410', platBorder: '#4A2400',
    name: 'Mountain Trail',
    grassColor: '#556B2F',
    flowerColors: ['#228B22','#6B8E23','#8FBC8F'],
  },
  { // 31-40: Cloud Kingdom
    sky: ['#E6E6FA','#FFC0CB','#FFB6C1'],
    platTop: '#FFF0F5', platFront: '#FFE4E1', platSide: '#FFB6C1', platBorder: '#FF69B4',
    name: 'Cloud Kingdom',
    grassColor: '#FFE4E1',
    flowerColors: ['#FF69B4','#DDA0DD','#E6E6FA','#FFD700'],
  },
  { // 41-50: Rainbow Meadow
    sky: ['#FF69B4','#DDA0DD','#87CEEB'],
    platTop: '#FF69B4', platFront: '#BA55D3', platSide: '#9932CC', platBorder: '#8B008B',
    name: 'Rainbow Meadow',
    grassColor: '#98FB98',
    flowerColors: ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#8B00FF'],
  },
];

function getTheme(stage) { return THEMES[Math.min(Math.floor((stage - 1) / 10), 4)]; }

// --- Power-up types (horse themed) ---
const POWERUP_TYPES = {
  speed: { emoji: '\u{1F955}', color: '#FF8C00', name: 'Carrot Rush', duration: 300 },
  shield: { emoji: '\u{1F6E1}️', color: '#8B4513', name: 'Saddle Shield', duration: 9999 },
  magnet: { emoji: '\u{1F34E}', color: '#FF0000', name: 'Apple Magnet', duration: 600 },
  ghost: { emoji: '\u{1F47B}', color: '#E6E6FA', name: 'Spirit Horse', duration: 180 },
  rocket: { emoji: '\u{1F984}', color: '#FF69B4', name: 'Pegasus Jump', duration: 9999 },
};

// --- Horse color palettes ---
const HORSE_COLORS = [
  {body:'#8B4513', belly:'#D2B48C', mane:'#3E1A00', name:'Chestnut'},
  {body:'#2F1A0E', belly:'#5C3317', mane:'#000000', name:'Dark Bay'},
  {body:'#F5F5DC', belly:'#FFFAF0', mane:'#DAA520', name:'Palomino'},
  {body:'#696969', belly:'#A9A9A9', mane:'#2F2F2F', name:'Dapple Grey'},
  {body:'#FFFAF0', belly:'#FFFFFF', mane:'#FFB6C1', name:'White'},
  {body:'#CD853F', belly:'#FFDEAD', mane:'#8B4513', name:'Buckskin'},
  {body:'#B22222', belly:'#E8B88A', mane:'#4A0000', name:'Sorrel'},
  {body:'#000000', belly:'#333333', mane:'#1a1a1a', name:'Black Beauty'},
];

const TRAIL_COLORS = ['#FFD700','#FF69B4','#87CEEB','#98FB98','#DDA0DD','#FF8C00','#E6E6FA','#FF6347'];

// --- Encouraging messages ---
const COMPLETE_MESSAGES = [
  'Great ride, Lily!', 'Amazing gallop!', 'Lily is a champion!',
  'What a trot!', 'Neigh-mazing!', 'You rode like the wind!',
  'Magnificent!', 'Giddy up, Lily!', 'Horseshoe hero!',
  'Clip clop perfection!',
];
const DEATH_MESSAGES = [
  'Oopsie! Try again!', 'Almost had it!', 'Whoa there!',
  'That was a stumble!', 'Back in the saddle!', 'Shake it off!',
];
const WORLD_MESSAGES = {
  1: 'Welcome to the Sunny Meadow! The flowers are cheering for you, Lily!',
  2: 'The Stable Yard awaits! Watch out for hay bales!',
  3: 'Up the Mountain Trail! Be careful near the streams!',
  4: 'The magical Cloud Kingdom! Everything sparkles up here!',
  5: 'The Rainbow Meadow! The final adventure awaits, Lily!',
};

// --- Game State ---
let GS = {
  screen: 'menu',
  currentStage: 1,
  checkpointStage: 1,
  deaths: 0,
  totalCoins: 0,
  stageCoins: 0,
  timer: 0,
  stageStartTime: 0,
  bestTimes: {},
  stageCoinsCollected: {},
  highestStage: 1,
  completedStages: {},
  musicOn: true,
  soundOn: true,
  hasDoubleJump: false,
  playerColorIdx: 0,
  trailColorIdx: 0,
  unlockedColorChange: false,
  unlockedTrailChange: false,
  unlockedBigDash: false,
};

// --- Save/Load ---
function saveGame() {
  const data = {
    highestStage: GS.highestStage,
    bestTimes: GS.bestTimes,
    stageCoinsCollected: GS.stageCoinsCollected,
    completedStages: GS.completedStages,
    deaths: GS.deaths,
    totalCoins: GS.totalCoins,
    musicOn: GS.musicOn,
    soundOn: GS.soundOn,
    playerColorIdx: GS.playerColorIdx,
    trailColorIdx: GS.trailColorIdx,
    unlockedColorChange: GS.unlockedColorChange,
    unlockedTrailChange: GS.unlockedTrailChange,
    unlockedBigDash: GS.unlockedBigDash,
  };
  try { localStorage.setItem('horseobby_save', JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('horseobby_save');
    if (raw) {
      const d = JSON.parse(raw);
      GS.highestStage = d.highestStage || 1;
      GS.bestTimes = d.bestTimes || {};
      GS.stageCoinsCollected = d.stageCoinsCollected || {};
      GS.completedStages = d.completedStages || {};
      GS.deaths = d.deaths || 0;
      GS.totalCoins = d.totalCoins || 0;
      GS.musicOn = d.musicOn !== false;
      GS.soundOn = d.soundOn !== false;
      GS.playerColorIdx = d.playerColorIdx || 0;
      GS.trailColorIdx = d.trailColorIdx || 0;
      GS.unlockedColorChange = !!d.unlockedColorChange;
      GS.unlockedTrailChange = !!d.unlockedTrailChange;
      GS.unlockedBigDash = !!d.unlockedBigDash;
    }
  } catch(e) {}
}

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol, delay) {
  if (!GS.soundOn || !audioCtx) return;
  const v = Math.min(vol || MAX_VOL, MAX_VOL);
  const d = delay || 0;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(v, audioCtx.currentTime + d);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + d);
  osc.stop(audioCtx.currentTime + d + duration);
}

function playNoise(duration, vol) {
  if (!GS.soundOn || !audioCtx) return;
  const v = Math.min(vol || MAX_VOL, MAX_VOL);
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(v, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

// Horse-themed sounds
function sfxJump() {
  // Whinny - high pitch rising
  playTone(600, 0.08, 'sine', MAX_VOL);
  playTone(900, 0.1, 'sine', MAX_VOL * 0.7, 0.04);
  playTone(1200, 0.06, 'sine', MAX_VOL * 0.4, 0.08);
}
function sfxDoubleJump() {
  playTone(800, 0.08, 'sine', MAX_VOL);
  playTone(1200, 0.1, 'sine', MAX_VOL * 0.6, 0.04);
  playTone(1600, 0.06, 'sine', MAX_VOL * 0.3, 0.08);
}

// Music -- gentle pastoral melody
let musicNodes = [];
let musicInterval = null;
let musicBeat = 0;

// Pastoral happy melody (think horse riding through meadows)
const melodyNotes = [
  523, 587, 659, 784, 659, 587, 523, 659,
  784, 880, 784, 659, 523, 587, 659, 523,
  440, 523, 587, 659, 784, 659, 587, 523,
  659, 784, 880, 1047, 880, 784, 659, 784,
];
const bassNotes = [
  262, 262, 330, 330, 294, 294, 262, 262,
  330, 330, 349, 349, 262, 262, 294, 294,
  220, 220, 262, 262, 294, 294, 330, 330,
  262, 262, 220, 220, 294, 294, 262, 262,
];

function startMusic() {
  stopMusic();
  if (!GS.musicOn) return;
  ensureAudio();
  musicBeat = 0;

  musicInterval = setInterval(() => {
    if (!GS.musicOn || !audioCtx) { stopMusic(); return; }
    const stage = GS.currentStage || 1;
    const intensity = Math.min(Math.floor((stage - 1) / 10), 4);

    // Melody - sine for gentle pastoral feel
    const note = melodyNotes[musicBeat % melodyNotes.length];
    playTone(note, 0.14, 'sine', MAX_VOL * 0.25);

    // Bass (always) - gentle triangle wave
    const bass = bassNotes[musicBeat % bassNotes.length];
    playTone(bass, 0.2, 'triangle', MAX_VOL * 0.18);

    // Gentle kick every 4 beats
    if (musicBeat % 4 === 0) {
      playTone(80, 0.06, 'sine', MAX_VOL * 0.2);
    }
    // Soft hi-hat clip-clop (intensity 1+)
    if (intensity >= 1 && musicBeat % 2 === 0) {
      playTone(2000, 0.02, 'sine', MAX_VOL * 0.08);
    }
    // Extra clip-clop on off-beats (intensity 2+)
    if (intensity >= 2 && musicBeat % 2 === 1) {
      playTone(2500, 0.015, 'sine', MAX_VOL * 0.06);
    }
    // Harmony layer (intensity 3+)
    if (intensity >= 3 && musicBeat % 2 === 0) {
      playTone(note * 1.5, 0.08, 'sine', MAX_VOL * 0.08);
    }
    // Sparkle arpeggios (intensity 4+)
    if (intensity >= 4) {
      if (musicBeat % 4 === 1) playTone(note * 2, 0.04, 'sine', MAX_VOL * 0.06);
      if (musicBeat % 4 === 3) playTone(note * 2.5, 0.03, 'sine', MAX_VOL * 0.04);
    }
    musicBeat++;
  }, 220);
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// --- Input ---
const keys = {};
let touchLeft = false, touchRight = false, touchJump = false, touchDash = false;
let jumpBufferTime = 0;
let jumpPressed = false;
let dashPressed = false;

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','ShiftLeft','ShiftRight','KeyR','KeyC'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      jumpPressed = true;
      jumpBufferTime = performance.now();
    }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
      dashPressed = true;
    }
    if (e.code === 'KeyR' && GS.screen === 'playing') {
      killPlayer();
    }
    if (e.code === 'KeyC' && GS.unlockedColorChange) {
      GS.playerColorIdx = (GS.playerColorIdx + 1) % HORSE_COLORS.length;
      saveGame();
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
const touchLeftBtn = document.getElementById('touch-left');
const touchRightBtn = document.getElementById('touch-right');
const touchJumpBtn = document.getElementById('touch-jump');
const touchDashBtn = document.getElementById('touch-dash');

function addTouchEvents(el, onDown, onUp) {
  el.addEventListener('touchstart', e => { e.preventDefault(); onDown(); }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, {passive:false});
  el.addEventListener('touchcancel', e => { onUp(); });
  el.addEventListener('mousedown', e => { e.preventDefault(); onDown(); });
  el.addEventListener('mouseup', e => { e.preventDefault(); onUp(); });
}

addTouchEvents(touchLeftBtn, () => { touchLeft = true; }, () => { touchLeft = false; });
addTouchEvents(touchRightBtn, () => { touchRight = true; }, () => { touchRight = false; });
addTouchEvents(touchJumpBtn,
  () => { touchJump = true; jumpPressed = true; jumpBufferTime = performance.now(); },
  () => { touchJump = false; }
);
addTouchEvents(touchDashBtn,
  () => { touchDash = true; dashPressed = true; },
  () => { touchDash = false; }
);

function inputLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchLeft; }
function inputRight() { return keys['ArrowRight'] || keys['KeyD'] || touchRight; }
function inputJump() { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchJump; }

// --- Particles ---
let particles = [];
const PARTICLE_POOL_SIZE = 600;

function spawnParticle(x, y, vx, vy, color, life, size, type) {
  if (particles.length >= PARTICLE_POOL_SIZE) particles.shift();
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size || 4, type: type || 'square', rotation: Math.random() * Math.PI * 2 });
}

function spawnDeathParticles(x, y) {
  // Mud splash particles (brown tones)
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    const colors = ['#8B4513','#A0522D','#D2691E','#CD853F','#DEB887','#F5DEB3'];
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 4,
      colors[Math.floor(Math.random()*colors.length)], 50 + Math.random()*30, 4 + Math.random()*8, 'circle');
  }
  // Splash ring
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2;
    spawnParticle(x, y, Math.cos(angle)*6, Math.sin(angle)*6, '#D2B48C', 20, 3, 'circle');
  }
}

function spawnCoinParticles(x, y) {
  // Gold horseshoe sparkles
  for (let i = 0; i < 16; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 2, '#FFD700', 25 + Math.random()*15, 3 + Math.random()*3, 'circle');
  }
  spawnParticle(x, y - 10, 0, -2, '#FFD700', 40, 12, 'text+1');
}

function spawnCheckpointParticles(x, y) {
  for (let burst = 0; burst < 3; burst++) {
    const bx = x + (burst - 1) * 40;
    const by = y - 30 - burst * 20;
    const burstColors = ['#FF69B4','#FFD700','#87CEEB','#98FB98','#DDA0DD'];
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 5;
      spawnParticle(bx, by, Math.cos(angle)*speed, Math.sin(angle)*speed - 2,
        burstColors[Math.floor(Math.random()*burstColors.length)], 40 + Math.random()*20, 3 + Math.random()*4, 'circle');
    }
  }
}

function spawnCompleteParticles(x, y) {
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 7;
    const colors = ['#FFD700','#FF69B4','#87CEEB','#DDA0DD','#98FB98','#FF8C00','#E6E6FA'];
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 5,
      colors[Math.floor(Math.random()*colors.length)], 60 + Math.random()*40, 5 + Math.random()*7, 'circle');
  }
}

function spawnDustParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    spawnParticle(x + (Math.random()-0.5)*20, y,
      (Math.random()-0.5)*3, -Math.random()*2 - 0.5,
      'rgba(210,180,140,0.6)', 20 + Math.random()*15, 3 + Math.random()*3, 'circle');
  }
}

function spawnDashParticles() {
  const px = player.x + player.w/2;
  const py = player.y + player.h/2;
  const col = TRAIL_COLORS[GS.trailColorIdx];
  for (let i = 0; i < 5; i++) {
    spawnParticle(px + (Math.random()-0.5)*10, py + (Math.random()-0.5)*10,
      -player.dashDirX * (1 + Math.random()*2), (Math.random()-0.5)*2,
      col, 15 + Math.random()*10, 4 + Math.random()*4, 'circle');
  }
}

function spawnSpeedLines() {
  const speed = Math.abs(player.vx);
  if (speed < 4) return;
  const intensity = Math.min((speed - 4) / 8, 1);
  if (Math.random() > intensity * 0.7) return;
  const px = player.x + (player.facingRight ? -10 : player.w + 10);
  const py = player.y + Math.random() * player.h;
  spawnParticle(px, py, -player.vx * 0.3, 0, 'rgba(255,255,255,0.4)', 8, 2, 'line');
}

    spawn: { x: 1 * TILE, y: 8 * TILE },
    portalX: 55, portalY: 4, parTime: 45,
  });

  return stages;
}

const STAGES = generateStages();

// --- Active stage data (runtime) ---
let activePlatforms = [];
let activeCoins = [];
let activePowerups = [];
let collectedCoins = new Set();
let portalPos = { x: 0, y: 0 };
let stageTimer = 0;

// Background layer data
let bgStars = [];
let bgClouds = [];
let bgMountains = [];
let bgFlowers = [];

function initBackground() {
  bgStars = [];
  bgClouds = [];
  bgMountains = [];
  bgFlowers = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({ x: Math.random() * 2000, y: Math.random() * 600, size: 0.5 + Math.random() * 2, twinkle: Math.random() * Math.PI * 2 });
  }
  for (let i = 0; i < 10; i++) {
    bgClouds.push({ x: Math.random() * 2500, y: 30 + Math.random() * 150, w: 60 + Math.random() * 80, speed: 0.1 + Math.random() * 0.3 });
  }
  for (let i = 0; i < 6; i++) {
    bgMountains.push({ x: i * 400, w: 300 + Math.random() * 200, h: 100 + Math.random() * 80 });
  }
  for (let i = 0; i < 30; i++) {

  }
}
initBackground();

function loadStage(stageNum) {
  const idx = stageNum - 1;
  if (idx < 0 || idx >= STAGES.length) return;

  const stage = STAGES[idx];
  GS.currentStage = stageNum;
  GS.hasDoubleJump = stageNum >= 5;
  GS.stageCoins = 0;
  collectedCoins = new Set();
  stageTimer = 0;

  activePlatforms = stage.platforms.map((p, i) => {
    const ap = Object.assign({}, p);
    ap.id = i;
    ap.origX = p.x;
    ap.origY = p.y;
    ap.timer = (p.phase || 0) * 100;
    ap.visible = true;
    ap.disappearTimer = 0;
    ap.spinAngle = 0;
    ap.glowTimer = Math.random() * Math.PI * 2;
    return ap;
  });

  activeCoins = stage.coins.map((c, i) => ({ x: c.x, y: c.y, id: i, collected: false, bobTimer: Math.random() * 100 }));

  activePowerups = (stage.powerups || []).map((p, i) => ({
    x: p.x, y: p.y, type: p.type, id: i, collected: false, bobTimer: Math.random() * 100, glowTimer: Math.random() * Math.PI * 2,
  }));

  portalPos = { x: stage.portalX * TILE, y: stage.portalY * TILE };

  player.x = stage.spawn.x;
  player.y = stage.spawn.y;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.dead = false;
  player.deathTimer = 0;
  player.victoryTimer = 0;
  player.speedBoostTimer = 0;
  player.reverseGravity = false;
  player.jumpsLeft = GS.hasDoubleJump ? 2 : 1;
  player.maxJumps = GS.hasDoubleJump ? 2 : 1;
  player.squash = 1;
  player.stretch = 1;
  player.dashTimer = 0;
  player.dashCooldown = 0;
  player.wallSliding = false;
  player.wallSlideSide = 0;
  player.lastFallSpeed = 0;
  player.shield = false;
  player.magnetTimer = 0;
  player.ghostTimer = 0;
  player.rocketJump = false;
  player.powerSpeedTimer = 0;
  player.trail = [];
  player.legPhase = 0;
  player.tailPhase = 0;

  camera.x = player.x - canvas.width / 2;
  camera.y = player.y - canvas.height / 2;
  camera.targetX = camera.x;
  camera.targetY = camera.y;

  // Show world message for first stage of each world
  const worldIdx = Math.floor((stageNum - 1) / 10) + 1;
  if ((stageNum - 1) % 10 === 0 && WORLD_MESSAGES[worldIdx]) {
    showMilestone(getTheme(stageNum).name, WORLD_MESSAGES[worldIdx]);
  }

  updateHUD();
}

function respawnPlayer() {
  const stage = STAGES[GS.checkpointStage - 1];
  if (GS.currentStage !== GS.checkpointStage) {
    loadStage(GS.checkpointStage);
  } else {
    player.x = stage.spawn.x;
    player.y = stage.spawn.y;
    player.vx = 0;
    player.vy = 0;
    player.dead = false;
    player.deathTimer = 0;
    player.onGround = false;
    player.reverseGravity = false;
    player.speedBoostTimer = 0;
    player.jumpsLeft = player.maxJumps;
    player.squash = 1;
    player.stretch = 1;
    player.dashTimer = 0;
    player.dashCooldown = 0;
    player.wallSliding = false;
    player.wallSlideSide = 0;
    player.lastFallSpeed = 0;
    player.shield = false;
    player.magnetTimer = 0;
    player.ghostTimer = 0;
    player.rocketJump = false;
    player.powerSpeedTimer = 0;
    player.trail = [];
    player.legPhase = 0;
    player.tailPhase = 0;
  }
}

// --- HUD ---
function updateHUD() {
  document.getElementById('hud-stage').textContent = `Stage ${GS.currentStage} / 50`;
  document.getElementById('hud-deaths').textContent = `Falls: ${GS.deaths}`;
  const totalSecs = GS.timer / 60;
  const mins = Math.floor(totalSecs / 60);
  const secs = totalSecs % 60;
  document.getElementById('hud-timer').textContent =
    `${String(mins).padStart(2,'0')}:${secs.toFixed(1).padStart(4,'0')}`;
  document.getElementById('hud-coins').textContent = `Horseshoes: ${GS.totalCoins + GS.stageCoins} / 150`;
  document.getElementById('hud-checkpoint').textContent = `Checkpoint: Stage ${GS.checkpointStage}`;

  // Power-up display
  const puEl = document.getElementById('hud-powerups');
  let puText = '';
  if (player.shield) puText += '\u{1F6E1}️ ';
  if (player.powerSpeedTimer > 0) puText += '\u{1F955}' + Math.ceil(player.powerSpeedTimer/60) + 's ';
  if (player.magnetTimer > 0) puText += '\u{1F34E}' + Math.ceil(player.magnetTimer/60) + 's ';
  if (player.ghostTimer > 0) puText += '\u{1F47B}' + Math.ceil(player.ghostTimer/60) + 's ';
  if (player.rocketJump) puText += '\u{1F984} ';
  if (puText) {
    puEl.style.display = 'block';
    puEl.textContent = puText.trim();
  } else {
    puEl.style.display = 'none';
  }

  // Dash cooldown bar
  const dashBar = document.getElementById('dash-cooldown-bar');
  const dashFill = document.getElementById('dash-cooldown-fill');
  if (GS.screen === 'playing') {
    dashBar.style.display = 'block';
    const pct = player.dashCooldown > 0 ? Math.max(0, 1 - player.dashCooldown / DASH_COOLDOWN) * 100 : 100;
    dashFill.style.width = pct + '%';
    dashFill.style.background = pct >= 100 ? 'linear-gradient(90deg, #FF69B4, #FF1493)' : 'rgba(255,255,255,0.3)';
  } else {
    dashBar.style.display = 'none';
  }
}

// --- Screen flash helper ---
function screenFlash(color, duration) {
  const el = document.getElementById('screen-flash');
  el.style.background = color;
  el.style.opacity = '1';
  el.style.transition = 'opacity ' + (duration || 300) + 'ms';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { el.style.opacity = '0'; });

}

// --- Milestone display ---
function showMilestone(title, desc) {
  const overlay = document.getElementById('milestone-overlay');
  document.getElementById('milestone-title').textContent = title;
  document.getElementById('milestone-desc').textContent = desc;
  overlay.style.display = 'flex';
  screenFlash('rgba(255,215,0,0.3)', 500);
  for (let i = 0; i < 60; i++) {
