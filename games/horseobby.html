    const speed = 3 + Math.random() * 6;
    const colors = ['#FFD700','#FF69B4','#87CEEB','#98FB98','#DDA0DD','#FF8C00'];
    spawnParticle(player.x + player.w/2, player.y - 20,
      Math.cos(angle)*speed, Math.sin(angle)*speed - 3,
      colors[Math.floor(Math.random()*colors.length)], 60, 5 + Math.random()*5, 'circle');
  }
  setTimeout(() => { overlay.style.display = 'none'; }, 2500);
}

// --- Physics & Update ---
function updatePlayer() {
  if (player.dead) {
    player.deathTimer--;
    if (player.deathTimer <= 0) respawnPlayer();
    return;
  }

  if (player.victoryTimer > 0) {
    player.victoryTimer--;
    player.y += Math.sin(player.victoryTimer * 0.2) * 0.5;
    return;
  }

  const now = performance.now();

  // Decrement power-up timers
  if (player.powerSpeedTimer > 0) player.powerSpeedTimer--;
  if (player.magnetTimer > 0) player.magnetTimer--;
  if (player.ghostTimer > 0) player.ghostTimer--;

  // Dash logic
  if (player.dashCooldown > 0) player.dashCooldown--;

  if (dashPressed && player.dashCooldown <= 0 && player.dashTimer <= 0) {
    player.dashTimer = DASH_DURATION;
    const dashMult = GS.unlockedBigDash ? 1.4 : 1;
    player.dashDirX = player.facingRight ? 1 : -1;
    player.vx = DASH_SPEED * player.dashDirX * dashMult;
    player.vy = 0;
    player.dashCooldown = DASH_COOLDOWN;
    sfxDash();
    camera.shake = Math.max(camera.shake, 4);
    dashPressed = false;
  } else {
    dashPressed = false;
  }

  if (player.dashTimer > 0) {
    player.dashTimer--;
    player.x += player.vx;
    spawnDashParticles();
    player.trail.push({ x: player.x, y: player.y, alpha: 1 });
    player.onIce = false;
    for (const p of activePlatforms) {
      if (!p.visible) continue;
      if (p.type === 'lava' || p.type === 'spinning') continue;
      const px = p.type === 'wall' ? p.x * TILE : getPlatX(p);
      const py = p.type === 'wall' ? p.y * TILE : getPlatY(p);
      const pw = p.w * TILE;
      const ph = p.type === 'wall' ? p.h * TILE : TILE;
      if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
        if (p.type === 'kill') {
          if (player.ghostTimer > 0) continue;
          if (player.shield) { breakShield(); continue; }
          killPlayer(); return;
        }
        if (p.type === 'reverseGravity') continue;
        if (player.vx > 0) player.x = px - player.w;
        else if (player.vx < 0) player.x = px + pw;
        player.vx = 0;
        player.dashTimer = 0;
      }
    }
    player.squash += (1 - player.squash) * 0.15;
    player.stretch += (1 - player.stretch) * 0.15;
    spawnSpeedLines();
    checkCoinsAndPortal();
    checkPowerups();
    if (player.y > 16 * TILE || player.y < -5 * TILE) { killPlayer(); }
    return;
  }

  // Horizontal movement
  let moveSpeed = MOVE_SPEED;
  if (player.speedBoostTimer > 0) { moveSpeed *= 1.8; player.speedBoostTimer--; }
  if (player.powerSpeedTimer > 0) { moveSpeed *= 2; }

  let accel = player.onIce ? 0.15 : 0.6;
  let friction = player.onIce ? 0.98 : 0.75;

  if (inputLeft()) {
    player.vx -= accel * moveSpeed;
    player.facingRight = false;
  } else if (inputRight()) {
    player.vx += accel * moveSpeed;
    player.facingRight = true;
  } else {
    player.vx *= friction;
  }
  player.vx = Math.max(-moveSpeed * 1.3, Math.min(moveSpeed * 1.3, player.vx));
  if (Math.abs(player.vx) < 0.1) player.vx = 0;

  // Gravity with "hang time" at peak
  const gDir = player.reverseGravity ? -1 : 1;
  const atPeak = Math.abs(player.vy) < 2.5;
  const grav = atPeak ? PEAK_GRAVITY : BASE_GRAVITY;
  player.vy += grav * gDir;
  if (player.vy * gDir > MAX_FALL) player.vy = MAX_FALL * gDir;

  // Horse leg animation
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    player.legPhase += Math.abs(player.vx) * 0.15;
  }
  player.tailPhase += 0.05;

  // Wall sliding detection
  player.wallSliding = false;
  player.wallSlideSide = 0;
  if (!player.onGround && player.vy * gDir > 0) {
    for (const p of activePlatforms) {
      if (!p.visible) continue;
      if (p.type === 'lava' || p.type === 'spinning' || p.type === 'kill') continue;
      const px = p.type === 'wall' ? p.x * TILE : getPlatX(p);
      const py = p.type === 'wall' ? p.y * TILE : getPlatY(p);
      const pw = p.w * TILE;
      const ph = p.type === 'wall' ? p.h * TILE : TILE;

      if (inputRight() && aabb(player.x + player.w, player.y + 2, 3, player.h - 4, px, py, pw, ph)) {
        player.wallSliding = true;
        player.wallSlideSide = 1;
        break;
      }
      if (inputLeft() && aabb(player.x - 3, player.y + 2, 3, player.h - 4, px, py, pw, ph)) {
        player.wallSliding = true;
        player.wallSlideSide = -1;
        break;
      }
    }
  }

  if (player.wallSliding) {
    if (player.vy * gDir > WALL_SLIDE_SPEED) {
      player.vy = WALL_SLIDE_SPEED * gDir;
    }
    if (Math.random() > 0.5) {
      spawnParticle(
        player.x + (player.wallSlideSide === 1 ? player.w : 0),
        player.y + player.h * 0.3 + Math.random() * player.h * 0.4,
        -player.wallSlideSide * (0.5 + Math.random()), -0.5 - Math.random(),
        'rgba(210,180,140,0.5)', 10, 2, 'circle');
    }
  }

  // Jump
  const canCoyote = (now - player.lastGroundTime < COYOTE_TIME) && !player.onGround;
  const jumpBuffered = jumpPressed && (now - jumpBufferTime < JUMP_BUFFER);

  if (jumpBuffered || jumpPressed) {
    if (player.wallSliding && player.wallJumpCooldown <= 0) {
      const jumpForce = player.reverseGravity ? -WALL_JUMP_FORCE_Y : WALL_JUMP_FORCE_Y;
      player.vy = jumpForce;
      player.vx = -player.wallSlideSide * WALL_JUMP_FORCE_X;
      player.facingRight = player.wallSlideSide < 0;
      player.wallJumpCooldown = 15;
      player.wallSliding = false;
      player.jumpsLeft = Math.max(player.jumpsLeft, 1);
      sfxWallJump();
      jumpPressed = false;
      for (let i = 0; i < 8; i++) {
        spawnParticle(
          player.x + (player.wallSlideSide === 1 ? player.w : 0),
          player.y + player.h/2,
          -player.wallSlideSide * (2 + Math.random()*3), (Math.random()-0.5)*4,
          '#D2B48C', 15, 3, 'circle');
      }
    } else if (player.onGround || canCoyote) {
      let jf = JUMP_FORCE;
      if (player.rocketJump) { jf *= 2.5; player.rocketJump = false; }
      player.vy = player.reverseGravity ? -jf : jf;
      player.onGround = false;
      player.jumpsLeft = player.maxJumps - 1;
      player.squash = 0.65;
      player.stretch = 1.35;
      sfxJump();
      jumpPressed = false;
      spawnDustParticles(player.x + player.w/2, player.y + player.h, 5);
    } else if (player.jumpsLeft > 0 && GS.hasDoubleJump) {
      let jf = DOUBLE_JUMP_FORCE;
      if (player.rocketJump) { jf *= 2.5; player.rocketJump = false; }
      player.vy = player.reverseGravity ? -jf : jf;
      player.jumpsLeft--;
      player.squash = 0.65;
      player.stretch = 1.35;
      sfxDoubleJump();
      jumpPressed = false;
      for (let i = 0; i < 8; i++) {
        spawnParticle(player.x + player.w/2, player.y + player.h,
          (Math.random()-0.5)*4, 2 + Math.random()*2, '#FFB6C1', 18, 3, 'circle');
      }
    } else {
      jumpPressed = false;
    }
  }

  // Variable jump height
  if (!inputJump() && player.vy * gDir < -2) {
    player.vy *= 0.82;
  }

  // Move X
  player.x += player.vx;
  player.onIce = false;

  // Collision X
  for (const p of activePlatforms) {
    if (!p.visible) continue;
    if (p.type === 'lava' || p.type === 'spinning') continue;
    const px = p.type === 'wall' ? p.x * TILE : getPlatX(p);
    const py = p.type === 'wall' ? p.y * TILE : getPlatY(p);
    const pw = p.w * TILE;
    const ph = p.type === 'wall' ? p.h * TILE : TILE;

    if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
      if (p.type === 'kill') {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer(); return;
      }
      if (p.type === 'reverseGravity') continue;

      if (player.vx > 0) {
        player.x = px - player.w;
      } else if (player.vx < 0) {
        player.x = px + pw;
      }
      player.vx = 0;
    }
  }

  // Move Y
  player.lastFallSpeed = Math.abs(player.vy);
  player.y += player.vy;
  player.onGround = false;

  // Collision Y
  for (const p of activePlatforms) {
    if (!p.visible) continue;
    if (p.type === 'wall') continue;
    if (p.type === 'spinning') continue;

    const px = getPlatX(p);
    const py = getPlatY(p);
    const pw = p.w * TILE;
    const ph = TILE;

    if (p.type === 'lava') {
      if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer();
        return;
      }
      continue;
    }

    if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
      if (p.type === 'kill') {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer(); return;
      }
      if (p.type === 'reverseGravity') {
        player.reverseGravity = !player.reverseGravity;
        p.visible = false;
        setTimeout(() => { p.visible = true; }, 2000);
        continue;
      }

      if (player.vy > 0 && !player.reverseGravity) {
        player.y = py - player.h;
        const fallSpeed = player.lastFallSpeed;
        player.vy = 0;
        player.onGround = true;
        player.lastGroundTime = now;
        player.jumpsLeft = player.maxJumps;

        if (fallSpeed > 4) {
          player.squash = 1.2 + (fallSpeed - 4) * 0.05;
          player.stretch = 0.7 - (fallSpeed - 4) * 0.02;
          spawnDustParticles(player.x + player.w/2, player.y + player.h, Math.floor(fallSpeed));
          if (fallSpeed > 8) camera.shake = Math.max(camera.shake, fallSpeed * 0.5);
        }

        handlePlatformEffect(p);
      } else if (player.vy < 0 && !player.reverseGravity) {
        player.y = py + ph;
        player.vy = 0;
      } else if (player.vy < 0 && player.reverseGravity) {
        player.y = py + ph;
        player.vy = 0;
        player.onGround = true;
        player.lastGroundTime = now;
        player.jumpsLeft = player.maxJumps;
        handlePlatformEffect(p);
      } else if (player.vy > 0 && player.reverseGravity) {
        player.y = py - player.h;
        player.vy = 0;
      }
    }
  }

  // Spinning obstacle collision
  for (const p of activePlatforms) {
    if (p.type !== 'spinning') continue;
    const cx = p.x * TILE + TILE/2;
    const cy = p.y * TILE + TILE/2;
    const r = (p.radius || 2) * TILE;
    const angle = p.spinAngle;
    for (let end = -1; end <= 1; end += 2) {
      const bx = cx + Math.cos(angle) * r * end - TILE/2;
      const by = cy + Math.sin(angle) * r * end - TILE/4;
      if (aabb(player.x, player.y, player.w, player.h, bx, by, TILE, TILE/2)) {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer();
        return;
      }
    }
  }

  // Afterimage trail when moving fast
  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (speed > 6) {
    player.trail.push({ x: player.x, y: player.y, alpha: 0.5 });
  }

  checkCoinsAndPortal();
  checkPowerups();

  // Fall death
  if (player.y > 16 * TILE || player.y < -5 * TILE) {
    killPlayer();
    return;
  }

  // Squash/stretch recovery
  player.squash += (1 - player.squash) * 0.15;
  player.stretch += (1 - player.stretch) * 0.15;

  if (player.wallJumpCooldown > 0) player.wallJumpCooldown--;

  // Speed lines
  spawnSpeedLines();
}

function checkCoinsAndPortal() {
  const playerCX = player.x + player.w/2;
  const playerCY = player.y + player.h/2;

  // Coin magnet
  for (const c of activeCoins) {
    if (c.collected) continue;
    if (player.magnetTimer > 0) {
      const dx = playerCX - c.x;
      const dy = playerCY - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        c.x += dx / dist * 4;
        c.y += dy / dist * 4;
      }
    }
    const dx = playerCX - c.x;
    const dy = playerCY - c.y;
    if (Math.sqrt(dx*dx + dy*dy) < 25) {
      c.collected = true;
      GS.stageCoins++;
      sfxCoin();
      spawnCoinParticles(c.x, c.y);
      updateHUD();
    }
  }

  // Check portal
  const portalDx = playerCX - (portalPos.x + TILE/2);
  const portalDy = playerCY - (portalPos.y + TILE);
  if (Math.sqrt(portalDx*portalDx + portalDy*portalDy) < TILE * 1.2) {
    completeStage();
  }
}

function checkPowerups() {
  const playerCX = player.x + player.w/2;
  const playerCY = player.y + player.h/2;

  for (const pu of activePowerups) {
    if (pu.collected) continue;
    const dx = playerCX - pu.x;
    const dy = playerCY - pu.y;
    if (Math.sqrt(dx*dx + dy*dy) < 25) {
      pu.collected = true;
      sfxPowerup();
      screenFlash('rgba(255,255,255,0.2)', 200);

      switch (pu.type) {
        case 'speed':
          player.powerSpeedTimer = POWERUP_TYPES.speed.duration;
          break;
        case 'shield':
          player.shield = true;
          break;
        case 'magnet':
          player.magnetTimer = POWERUP_TYPES.magnet.duration;
          break;
        case 'ghost':
          player.ghostTimer = POWERUP_TYPES.ghost.duration;
          break;
        case 'rocket':
          player.rocketJump = true;
          break;
      }

      const info = POWERUP_TYPES[pu.type];
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        spawnParticle(pu.x, pu.y, Math.cos(angle)*3, Math.sin(angle)*3 - 1, info.color, 25, 4, 'circle');
      }
    }
  }
}

function breakShield() {
  player.shield = false;
  sfxShieldBreak();
  camera.shake = Math.max(camera.shake, 6);
  screenFlash('rgba(139,69,19,0.3)', 200);
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    spawnParticle(player.x + player.w/2, player.y + player.h/2,
      Math.cos(angle)*4, Math.sin(angle)*4, '#8B4513', 25, 4, 'circle');
  }
}

function handlePlatformEffect(p) {
  switch (p.type) {
    case 'conveyor':
      player.vx += (p.dir || 1) * (p.speed || 2) * 0.5;
      break;
    case 'bouncy':
      player.vy = -16;
      player.onGround = false;
      player.squash = 0.5;
      player.stretch = 1.6;
      sfxBounce();
      for (let i = 0; i < 8; i++) {
        spawnParticle(player.x + player.w/2, player.y + player.h,
          (Math.random()-0.5)*5, -2 - Math.random()*3, '#FFD700', 20, 3, 'circle');
      }
      break;
    case 'ice':
      player.onIce = true;
      break;
    case 'speed':
      player.speedBoostTimer = 60;
      break;
    case 'checkpoint':
      if (GS.checkpointStage < GS.currentStage) {
        GS.checkpointStage = GS.currentStage;
        sfxCheckpoint();
        spawnCheckpointParticles(player.x + player.w/2, player.y);
        screenFlash('rgba(255,255,255,0.2)', 300);
        saveGame();
      }
      break;
  }
}

function getPlatX(p) {
  if (p.moveX && p.type !== 'kill') {
    return (p.origX + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveX) * TILE;
  }
  if (p.isMoving && p.moveX) {
    return (p.origX + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveX) * TILE;
  }
  return p.x * TILE;
}

function getPlatY(p) {
  if (p.moveY && p.type !== 'kill') {
    return (p.origY + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveY) * TILE;
  }
  if (p.isMoving && p.moveY) {
    return (p.origY + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveY) * TILE;
  }
  return p.y * TILE;
}

function aabb(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  player.deathTimer = 25;
  GS.deaths++;
  camera.shake = 12;
  sfxDeath();
  spawnDeathParticles(player.x + player.w/2, player.y + player.h/2);
  screenFlash('rgba(139,69,19,0.4)', 150);
  document.getElementById('death-overlay').style.display = 'block';
  setTimeout(() => { document.getElementById('death-overlay').style.display = 'none'; }, 120);
  updateHUD();
  saveGame();
}

function completeStage() {
  if (player.victoryTimer > 0) return;
  player.victoryTimer = 90;

  sfxComplete();
  spawnCompleteParticles(player.x + player.w/2, player.y + player.h/2);
  screenFlash('rgba(255,255,255,0.3)', 400);

  const stageTime = stageTimer / 60;
  const stage = STAGES[GS.currentStage - 1];
  const parTime = stage.parTime;
  const gotAllCoins = GS.stageCoins >= 3;
  const underPar = stageTime <= parTime;

  let stars = 1;
  if (gotAllCoins) stars = 2;
  if (gotAllCoins && underPar) stars = 3;

  GS.completedStages[GS.currentStage] = true;
  GS.totalCoins += GS.stageCoins;

  if (!GS.bestTimes[GS.currentStage] || stageTime < GS.bestTimes[GS.currentStage]) {
    GS.bestTimes[GS.currentStage] = parseFloat(stageTime.toFixed(1));
  }
  if (!GS.stageCoinsCollected[GS.currentStage] || GS.stageCoins > GS.stageCoinsCollected[GS.currentStage]) {
    GS.stageCoinsCollected[GS.currentStage] = GS.stageCoins;
  }

  const completedStageNum = GS.currentStage;

  if (GS.currentStage >= GS.highestStage && GS.currentStage < 50) {
    GS.highestStage = GS.currentStage + 1;
  }
  if (GS.currentStage % 5 === 0) {
    GS.checkpointStage = Math.min(GS.currentStage + 1, 50);
  }

  // Milestone unlocks
  if (completedStageNum === 10 && !GS.unlockedColorChange) {
    GS.unlockedColorChange = true;
    setTimeout(() => showMilestone('NEW HORSE UNLOCKED!', 'Press C to change your horse!'), 800);
  }
  if (completedStageNum === 20 && !GS.unlockedTrailChange) {
    GS.unlockedTrailChange = true;
    setTimeout(() => showMilestone('TRAIL UNLOCKED!', 'Your dash trail sparkles with magic!'), 800);
  }
  if (completedStageNum === 30 && !GS.unlockedBigDash) {
    GS.unlockedBigDash = true;
    setTimeout(() => showMilestone('SUPER GALLOP!', 'Your dash is now 40% more powerful!'), 800);
  }

  saveGame();

  setTimeout(() => {
    const overlay = document.getElementById('stage-complete-overlay');
    overlay.style.display = 'flex';

    const msg = COMPLETE_MESSAGES[Math.floor(Math.random() * COMPLETE_MESSAGES.length)];
    document.getElementById('complete-encourage').textContent = msg;

    document.getElementById('complete-title').textContent =
      completedStageNum === 50 ? "LILY'S CHAMPION RIDE!" : 'GREAT RIDE!';

    let starStr = '';
    for (let i = 0; i < 3; i++) starStr += i < stars ? '★' : '☆';
    document.getElementById('complete-stars').textContent = starStr;
    document.getElementById('complete-time').textContent =
      `Time: ${stageTime.toFixed(1)}s (Par: ${parTime}s)`;
    document.getElementById('complete-coins-info').textContent =
      `Horseshoes: ${GS.stageCoins} / 3`;

    document.getElementById('btn-next-stage').textContent =
      completedStageNum === 50 ? 'RIDE AGAIN' : 'NEXT STAGE';
    document.getElementById('btn-next-stage').style.display = 'inline-block';
  }, 1200);
}

// --- Update platforms ---
function updatePlatforms() {
  for (const p of activePlatforms) {
    p.timer++;
    p.glowTimer += 0.05;

    if (p.moveX || p.moveY) {
      if (player.onGround && !player.dead && p.type !== 'kill' && p.type !== 'spinning') {
        const px = getPlatX(p);
        const py = getPlatY(p);
        const pw = p.w * TILE;
        if (player.x + player.w > px && player.x < px + pw &&
            Math.abs(player.y + player.h - py) < 4) {
          const oldTimer = p.timer;
          p.timer++;
          const dx = getPlatX(p) - px;
          const dy = getPlatY(p) - py;
          p.timer = oldTimer;
          player.x += dx * 0.5;
        }
      }
    }

    if (p.type === 'disappearing') {
      const cycle = 240;
      const t = (p.timer + (p.phase || 0) * 80) % cycle;
      if (t < 160) {
        p.visible = true;
        p.flashing = t > 100;
      } else {
        p.visible = false;
        p.flashing = false;
      }
    }

    if (p.type === 'invisible') {
      const cycle = 300;
      const t = p.timer % cycle;
      p.flashVisible = t < 40 || (t > 150 && t < 190);
    }

    if (p.type === 'spinning') {
      p.spinAngle += 0.02 * (p.speed || 2);
    }
  }
}

// --- Update particles ---
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === 'butterfly') {
      p.vx = Math.sin(p.life * 0.2) * 0.8;
      p.vy = -0.3;
    } else if (p.type !== 'line' && p.type !== 'text+1') {
      p.vy += 0.12;
    }
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Update trail ---
function updateTrail() {
  for (let i = player.trail.length - 1; i >= 0; i--) {
    player.trail[i].alpha -= 0.08;
    if (player.trail[i].alpha <= 0) player.trail.splice(i, 1);
  }
  if (player.trail.length > 12) player.trail.splice(0, player.trail.length - 12);
}

// --- Camera ---
function updateCamera() {
  const lookAhead = player.facingRight ? 100 : -100;
  camera.targetX = player.x - canvas.width / 2 + lookAhead;
  camera.targetY = player.y - canvas.height / 2 + 50;

  camera.x += (camera.targetX - camera.x) * 0.08;
  camera.y += (camera.targetY - camera.y) * 0.06;

  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  camera.targetZoom = speed > 8 ? 0.92 : 1;
  camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;

  if (camera.shake > 0) {
    camera.shake *= 0.82;
    if (camera.shake < 0.3) camera.shake = 0;
  }
}

// --- Rendering ---
function render() {
  const W = canvas.width;
  const H = canvas.height;

  const shakeX = camera.shake * (Math.random() - 0.5) * 2;
  const shakeY = camera.shake * (Math.random() - 0.5) * 2;

  const theme = getTheme(GS.currentStage);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, theme.sky[0]);
  skyGrad.addColorStop(0.5, theme.sky[1]);
  skyGrad.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Background stars for Cloud Kingdom and Rainbow Meadow
  const themeIdx = Math.floor((GS.currentStage - 1) / 10);
  if (themeIdx >= 3) {
    drawStars(W, H);
  }

  // Parallax mountains
  drawMountains(W, H, theme);

  // Parallax clouds
  drawClouds(W, H, theme);

  // Decorative elements per theme
  drawThemeDecorations(W, H, theme);

  ctx.save();
  const zoomCX = W / 2;
  const zoomCY = H / 2;
  ctx.translate(zoomCX, zoomCY);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-zoomCX, -zoomCY);

  ctx.translate(-camera.x + shakeX, -camera.y + shakeY);

  // Draw platforms
  for (const p of activePlatforms) {
    drawPlatform(p, theme);
  }

  // Draw power-ups
  for (const pu of activePowerups) {
    if (pu.collected) continue;
    pu.bobTimer += 0.05;
    pu.glowTimer += 0.07;
    const bob = Math.sin(pu.bobTimer) * 4;
    drawPowerup(pu.x, pu.y + bob, pu);
  }

  // Draw coins (horseshoes)
  for (const c of activeCoins) {
    if (c.collected) continue;
    c.bobTimer += 0.05;
    const bob = Math.sin(c.bobTimer) * 3;
    drawCoin(c.x, c.y + bob);
  }

  // Draw portal
  drawPortal(portalPos.x, portalPos.y);

  // Draw player trail (afterimages)
  for (const t of player.trail) {
    ctx.globalAlpha = t.alpha * 0.3;
    const col = TRAIL_COLORS[GS.trailColorIdx];
    ctx.fillStyle = col;
    ctx.fillRect(t.x, t.y, player.w, player.h);
  }
  ctx.globalAlpha = 1;

  // Draw player (horse)
  if (!player.dead) {
    drawHorse();
  }

  // Draw particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size/2, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'line') {
      ctx.fillRect(p.x, p.y, p.size * 4, 1);
    } else if (p.type === 'text+1') {
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('+1', p.x, p.y);
    } else if (p.type === 'butterfly') {
      // Tiny butterfly
      ctx.beginPath();
      ctx.arc(p.x - 2, p.y, p.size, 0, Math.PI * 2);
      ctx.arc(p.x + 2, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation + p.life * 0.1);
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// --- Draw functions ---

function drawStars(W, H) {
  const t = performance.now() * 0.001;
  const scrollX = camera.x * 0.02;
  const scrollY = camera.y * 0.02;
  for (const s of bgStars) {
    const sx = ((s.x - scrollX) % W + W) % W;
    const sy = ((s.y - scrollY) % H + H) % H;
    const twinkle = 0.3 + Math.sin(t * 2 + s.twinkle) * 0.3 + 0.4;
    ctx.globalAlpha = twinkle;
    // Pink/gold stars for the horse theme
    ctx.fillStyle = Math.random() > 0.5 ? '#FFD700' : '#FFB6C1';
    ctx.beginPath();
    ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawMountains(W, H, theme) {
  const scrollX = camera.x * 0.05;
  const themeIdx = Math.floor((GS.currentStage - 1) / 10);

  // Green rolling hills for meadow themes, purple/pink for cloud/rainbow
  let hillColor;
  if (themeIdx <= 1) hillColor = 'rgba(76,175,80,0.3)';
  else if (themeIdx === 2) hillColor = 'rgba(85,107,47,0.4)';
  else if (themeIdx === 3) hillColor = 'rgba(255,182,193,0.3)';
  else hillColor = 'rgba(186,85,211,0.3)';

  ctx.fillStyle = hillColor;
  for (const m of bgMountains) {
    const mx = ((m.x - scrollX) % 2400 + 2400) % 2400 - 200;
    // Rounder hills instead of sharp mountains
    ctx.beginPath();
    ctx.arc(mx + m.w/2, H + m.h * 0.2, m.w * 0.6, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
  }
}

function drawClouds(W, H, theme) {
  const t = performance.now() * 0.001;
  const themeIdx = Math.floor((GS.currentStage - 1) / 10);
  ctx.fillStyle = themeIdx === 3 ? 'rgba(255,255,255,0.5)' :
                  themeIdx === 4 ? 'rgba(255,182,193,0.35)' : 'rgba(255,255,255,0.3)';
  const scrollX = camera.x * 0.08;
  for (const c of bgClouds) {
    const cx = ((c.x + t * c.speed * 20 - scrollX) % 2500 + 2500) % 2500 - 200;
    const cy = c.y;
    ctx.beginPath();
    ctx.arc(cx, cy, c.w * 0.3, 0, Math.PI * 2);
    ctx.arc(cx + c.w * 0.25, cy - c.w * 0.1, c.w * 0.35, 0, Math.PI * 2);
    ctx.arc(cx + c.w * 0.5, cy, c.w * 0.28, 0, Math.PI * 2);
    ctx.arc(cx + c.w * 0.2, cy + c.w * 0.05, c.w * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawThemeDecorations(W, H, theme) {
  const themeIdx = Math.floor((GS.currentStage - 1) / 10);
  const t = performance.now() * 0.001;
  const scrollX = camera.x * 0.15;

  if (themeIdx === 0) {
    // Sunny Meadow: flowers and butterflies
    for (let i = 0; i < 25; i++) {
      const fx = ((i * 100 - scrollX) % 2500 + 2500) % 2500;
      const fy = H - 15 + Math.sin(t * 0.5 + i) * 3;
      const colors = theme.flowerColors;
      ctx.fillStyle = colors[i % colors.length];
      // Flower petals
      for (let p = 0; p < 5; p++) {
        const angle = (p / 5) * Math.PI * 2 + t * 0.3;
        ctx.beginPath();
        ctx.arc(fx + Math.cos(angle) * 4, fy + Math.sin(angle) * 4, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(fx, fy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Butterflies
    if (Math.random() > 0.98) {
      spawnButterflyParticle(camera.x + Math.random() * W, camera.y + Math.random() * H * 0.7);
    }
  } else if (themeIdx === 1) {
    // Stable Yard: hay bale shapes, fence posts
    ctx.fillStyle = 'rgba(139,69,19,0.3)';
    for (let i = 0; i < 12; i++) {
      const fx = ((i * 200 - scrollX) % 2400 + 2400) % 2400;
      // Fence post
      ctx.fillRect(fx, H - 50, 4, 40);
      if (i < 11) {
        // Fence rail
        ctx.fillRect(fx, H - 40, 200, 3);
        ctx.fillRect(fx, H - 25, 200, 3);
      }
    }
    // Hay bales in background
    ctx.fillStyle = 'rgba(218,165,32,0.25)';
    for (let i = 0; i < 6; i++) {
      const hx = ((i * 350 + 100 - scrollX * 0.5) % 2000 + 2000) % 2000;
      ctx.beginPath();
      ctx.arc(hx, H - 20, 18, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (themeIdx === 2) {
    // Mountain Trail: pine trees, rocks
    ctx.fillStyle = 'rgba(34,139,34,0.3)';
    for (let i = 0; i < 15; i++) {
      const tx = ((i * 160 - scrollX) % 2400 + 2400) % 2400;
      // Pine tree
      ctx.beginPath();
      ctx.moveTo(tx, H - 10);
      ctx.lineTo(tx + 10, H - 40 - Math.sin(i) * 10);
      ctx.lineTo(tx + 20, H - 10);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(tx + 3, H - 25);
      ctx.lineTo(tx + 10, H - 50 - Math.sin(i) * 8);
      ctx.lineTo(tx + 17, H - 25);
      ctx.fill();
    }
    // Streams hint (blue streaks)
    ctx.fillStyle = 'rgba(100,149,237,0.2)';
    for (let i = 0; i < 4; i++) {
      const sx = ((i * 500 + t * 10 - scrollX * 0.3) % 2000 + 2000) % 2000;
      ctx.fillRect(sx, H - 5, 80 + Math.sin(t + i) * 20, 5);
    }
  } else if (themeIdx === 3) {
    // Cloud Kingdom: rainbow bridges, sparkles
    // Rainbow arc
    const rainbowColors = ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#8B00FF'];
    for (let r = 0; r < rainbowColors.length; r++) {
      ctx.strokeStyle = rainbowColors[r];
      ctx.globalAlpha = 0.15;
      ctx.lineWidth = 4;
      ctx.beginPath();
      const rx = ((600 - scrollX * 0.4) % 2000 + 2000) % 2000;
      ctx.arc(rx, H, 200 + r * 8, Math.PI, 0);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
    // Sparkles
    for (let i = 0; i < 15; i++) {
      const sx = ((i * 150 + Math.sin(t + i) * 30 - scrollX * 0.3) % 2000 + 2000) % 2000;
      const sy = (Math.sin(t * 0.7 + i * 2) * 0.5 + 0.5) * H;
      const brightness = Math.sin(t * 3 + i) * 0.4 + 0.6;
      ctx.globalAlpha = brightness * 0.5;
      ctx.fillStyle = i % 2 === 0 ? '#FFD700' : '#FFB6C1';
      ctx.beginPath();
      ctx.arc(sx, sy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (themeIdx === 4) {
    // Rainbow Meadow: rainbow sparkle particles, colorful everything
    const rainbowColors = ['#FF0000','#FF7F00','#FFFF00','#00FF00','#0000FF','#4B0082','#8B00FF'];
    for (let i = 0; i < 20; i++) {
      const sx = ((i * 120 + Math.sin(t * 0.8 + i) * 40 - scrollX * 0.3) % 2000 + 2000) % 2000;
      const sy = (Math.sin(t * 0.5 + i * 1.5) * 0.5 + 0.5) * H;
      const brightness = Math.sin(t * 2 + i) * 0.3 + 0.7;
      ctx.globalAlpha = brightness * 0.6;
      ctx.fillStyle = rainbowColors[i % rainbowColors.length];
      ctx.beginPath();
      ctx.arc(sx, sy, 2 + Math.sin(t + i) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Rainbow stripe across sky
    for (let r = 0; r < rainbowColors.length; r++) {
      ctx.fillStyle = rainbowColors[r];
      ctx.globalAlpha = 0.06;
      ctx.fillRect(0, 20 + r * 6, W, 6);
    }
    ctx.globalAlpha = 1;
  }
}

function drawBlock3D(x, y, w, h, topColor, frontColor, sideColor, borderColor) {
  const depth = 8;
  ctx.fillStyle = frontColor;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = topColor;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + depth, y - depth);
  ctx.lineTo(x + w + depth, y - depth);
  ctx.lineTo(x + w, y);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = sideColor;
  ctx.beginPath();
  ctx.moveTo(x + w, y);
  ctx.lineTo(x + w + depth, y - depth);
  ctx.lineTo(x + w + depth, y + h - depth);
  ctx.lineTo(x + w, y + h);
  ctx.closePath();
  ctx.fill();
  if (borderColor) {
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  }
}

function drawPlatform(p, theme) {
  const px = (p.type === 'wall') ? p.x * TILE : getPlatX(p);
  const py = (p.type === 'wall') ? p.y * TILE : getPlatY(p);
  const pw = p.w * TILE;
  const ph = (p.type === 'wall') ? p.h * TILE : TILE;

  if (px + pw < camera.x - 50 || px > camera.x + canvas.width + 50) return;
  if (py + ph < camera.y - 50 || py > camera.y + canvas.height + 50) return;

  const themeIdx = Math.floor((GS.currentStage - 1) / 10);

  switch (p.type) {
    case 'normal':
    case 'wall':
    case 'checkpoint':
      if (p.type === 'checkpoint') {
        const glow = Math.sin(performance.now() * 0.005) * 0.3 + 0.7;
        ctx.shadowColor = '#FFD700';
        ctx.shadowBlur = 15 * glow;
        drawBlock3D(px, py, pw, ph, '#FFD700', '#DAA520', '#B8860B', '#8B6914');
        ctx.shadowBlur = 0;
        // Flag with horseshoe
        ctx.fillStyle = '#fff';
        ctx.fillRect(px + pw/2 - 1, py - 25, 2, 25);
        ctx.fillStyle = '#FF69B4';
        ctx.beginPath();
        ctx.moveTo(px + pw/2 + 1, py - 25);
        ctx.lineTo(px + pw/2 + 15, py - 20);
        ctx.lineTo(px + pw/2 + 1, py - 15);
        ctx.fill();
      } else {
        // Theme-specific platform look
        if (themeIdx === 0) {
          // Sunny Meadow: grass on top of brown
          drawBlock3D(px, py, pw, ph, '#66bb6a', '#8B7355', '#6B5335', '#4A3520');
          // Grass tufts on top
          ctx.fillStyle = '#4CAF50';
          for (let gx = px; gx < px + pw; gx += 8) {
            ctx.beginPath();
            ctx.moveTo(gx, py - 6);
            ctx.lineTo(gx + 3, py - 2);
            ctx.lineTo(gx + 6, py - 6);
            ctx.fill();
          }
        } else if (themeIdx === 1) {
          // Stable Yard: wooden fence/hay bale look
          drawBlock3D(px, py, pw, ph, '#DAA520', '#B8860B', '#8B6914', '#6B4226');
          // Wood grain lines
          ctx.strokeStyle = 'rgba(139,69,19,0.3)';
          ctx.lineWidth = 0.5;
          for (let gx = px + 5; gx < px + pw; gx += 12) {
            ctx.beginPath(); ctx.moveTo(gx, py); ctx.lineTo(gx, py + ph); ctx.stroke();
          }
        } else if (themeIdx === 2) {
          // Mountain Trail: rocky look
          drawBlock3D(px, py, pw, ph, '#A0522D', '#8B4513', '#6B3410', '#4A2400');
          // Stone texture
          ctx.fillStyle = 'rgba(160,130,100,0.3)';
          for (let gx = px; gx < px + pw; gx += TILE) {
            ctx.fillRect(gx + 2, py + 2, TILE/2 - 2, ph/2 - 2);
          }
        } else if (themeIdx === 3) {
          // Cloud Kingdom: fluffy cloud platforms
          drawBlock3D(px, py, pw, ph, '#FFF0F5', '#FFE4E1', '#FFB6C1', '#FF69B4');
          // Cloud puffs on top
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          for (let gx = px; gx < px + pw; gx += 15) {
            ctx.beginPath();
            ctx.arc(gx + 7, py - 3, 8, 0, Math.PI * 2);
            ctx.fill();
          }
        } else {
          // Rainbow Meadow: rainbow colored
          const rainbowColors = ['#FF6B6B','#FFA07A','#FFD700','#98FB98','#87CEEB','#DDA0DD'];
          const rIdx = Math.floor(((px / TILE) % rainbowColors.length + rainbowColors.length) % rainbowColors.length);
          const rc = rainbowColors[rIdx];
          drawBlock3D(px, py, pw, ph, rc, shadeColor(rc, -20), shadeColor(rc, -40), shadeColor(rc, -60));
          // Sparkle
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          const sparkleT = performance.now() * 0.003;
          for (let s = 0; s < 3; s++) {
            const sx = px + pw * (s + 1) / 4 + Math.sin(sparkleT + s) * 3;
            const sy = py + ph/2 + Math.cos(sparkleT + s * 2) * 3;
            ctx.beginPath();
            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      break;

    case 'kill': {
      // Mud puddle
      if (p.isMoving && !p.visible) return;
      const kx = p.isMoving ? getPlatX(p) : px;
      const ky = p.isMoving ? getPlatY(p) : py;
      const killGlow = Math.sin(p.glowTimer * 3) * 0.2 + 0.4;
      ctx.shadowColor = '#8B4513';
      ctx.shadowBlur = 8 * killGlow;
      // Brown muddy look
      drawBlock3D(kx, ky, pw, ph, '#8B6914', '#6B4226', '#4A2800', '#3E1A00');
      ctx.shadowBlur = 0;
      // Mud splat dots
      ctx.fillStyle = 'rgba(101,67,33,0.5)';
      for (let s = 0; s < pw; s += 10) {
        ctx.beginPath();
        ctx.arc(kx + s + 5, ky + ph/2, 3 + Math.sin(p.glowTimer + s) * 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Bubble effect
      const bubbleT = performance.now() * 0.003;
      ctx.fillStyle = 'rgba(139,90,43,0.4)';
      for (let b = 0; b < 2; b++) {
        const bx = kx + pw * (b + 1) / 3 + Math.sin(bubbleT + b * 2) * 3;
        const by = ky - 2 + Math.sin(bubbleT * 1.5 + b) * 2;
        ctx.beginPath();
        ctx.arc(bx, by, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }

    case 'moving':
      // Wooden cart platform
      drawBlock3D(px, py, pw, ph, '#DEB887', '#CD853F', '#A0522D', '#8B4513');
      // Wheels
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(px + 8, py + ph + 4, 5, 0, Math.PI * 2);
      ctx.arc(px + pw - 8, py + ph + 4, 5, 0, Math.PI * 2);
      ctx.fill();
      // Arrow indicators
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let a = 0; a < pw; a += 20) {
        ctx.beginPath();
        ctx.moveTo(px + a + 5, py + ph/2);
        ctx.lineTo(px + a + 12, py + 3);
        ctx.lineTo(px + a + 12, py + ph - 3);
        ctx.fill();
      }
      break;

    case 'disappearing':
      if (!p.visible) return;
      if (p.flashing) {
        ctx.globalAlpha = 0.4 + Math.sin(p.timer * 0.3) * 0.3;
      }
      // Magical fading platform
      drawBlock3D(px, py, pw, ph, '#DDA0DD', '#BA55D3', '#9932CC', '#800080');
      // Sparkle effect
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      const dt = performance.now() * 0.005;
      for (let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.arc(px + pw * (s+1)/4, py + Math.sin(dt + s) * 3, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;

    case 'invisible':
      if (p.flashVisible) {
        ctx.globalAlpha = 0.4;
        drawBlock3D(px, py, pw, ph, '#E6E6FA', '#D8BFD8', '#DDA0DD', '#BA55D3');
        ctx.globalAlpha = 1;
      }
      break;

    case 'conveyor':
      // Wind gust platform
      drawBlock3D(px, py, pw, ph, '#87CEEB', '#6495ED', '#4169E1', '#1E3A8A');
      // Wind swirl arrows
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      const cOffset = (p.timer * (p.dir || 1) * 1.5) % 20;
      for (let a = 0; a < pw; a += 20) {
        const ax = px + a + cOffset;
        if (ax >= px && ax + 10 <= px + pw) {
          const dir = p.dir || 1;
          // Swirl arrow
          ctx.beginPath();
          ctx.moveTo(ax + (dir > 0 ? 0 : 10), py + 4);
          ctx.lineTo(ax + (dir > 0 ? 10 : 0), py + ph/2);
          ctx.lineTo(ax + (dir > 0 ? 0 : 10), py + ph - 4);
          ctx.fill();
        }
      }
      // Wind line particles
      if (Math.random() > 0.7) {
        spawnParticle(px + Math.random() * pw, py + ph/2,
          (p.dir || 1) * 2, (Math.random()-0.5), 'rgba(135,206,235,0.5)', 10, 2, 'line');
      }
      break;

    case 'lava': {
      // Stream/water
      const waterGrad = ctx.createLinearGradient(px, py, px, py + ph);
      waterGrad.addColorStop(0, '#4169E1');
      waterGrad.addColorStop(0.5, '#1E90FF');
      waterGrad.addColorStop(1, '#4682B4');
      ctx.fillStyle = waterGrad;
      ctx.fillRect(px, py, pw, ph);
      // Water ripples
      for (let lb = 0; lb < pw; lb += 15) {
        const rippleY = py - 2 + Math.sin((p.timer + lb) * 0.08) * 3;
        ctx.fillStyle = 'rgba(135,206,250,0.5)';
        ctx.beginPath();
        ctx.arc(px + lb + 7, rippleY + 5, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      // Water glow
      ctx.shadowColor = '#4169E1';
      ctx.shadowBlur = 10;
      ctx.fillStyle = 'rgba(30,144,255,0.01)';
      ctx.fillRect(px, py - 5, pw, 5);
      ctx.shadowBlur = 0;
      break;
    }

    case 'bouncy': {
      // Trampoline with horseshoe design
      const bounceScale = 1 + Math.sin(p.timer * 0.1) * 0.05;
      const bh = ph * bounceScale;
      const bounceGlow = Math.sin(p.glowTimer * 3) * 0.3 + 0.5;
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 10 * bounceGlow;
      drawBlock3D(px, py + ph - bh, pw, bh, '#FFD700', '#DAA520', '#B8860B', '#8B6914');
      ctx.shadowBlur = 0;
      // Horseshoe U shapes on trampoline
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 2;
      for (let s = 0; s < 3; s++) {
        const sx = px + pw * (s + 1) / 4;
        ctx.beginPath();
        ctx.arc(sx, py + ph/2 - 2, 5, 0, Math.PI);
        ctx.stroke();
      }
      // Spring lines
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      for (let s = 0; s < 2; s++) {
        const sx = px + pw * (s + 1) / 3;
        ctx.beginPath();
        ctx.moveTo(sx - 3, py + ph - 3);
        ctx.quadraticCurveTo(sx, py - 3, sx + 3, py + ph - 3);
        ctx.stroke();
      }
      break;
    }

    case 'spinning': {
      // Spinning horseshoe
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(px + TILE/2, py + TILE/2, 6, 0, Math.PI * 2);
      ctx.fill();
      const scx = px + TILE/2;
      const scy = py + TILE/2;
      const sr = (p.radius || 2) * TILE;
      ctx.save();
      ctx.translate(scx, scy);
      ctx.rotate(p.spinAngle);
      // Gold spinning bar with horseshoes on ends
      ctx.shadowColor = '#DAA520';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(-sr, -5, sr * 2, 10);
      ctx.shadowBlur = 0;
      // Horseshoe ends
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(-sr, 0, 8, 0, Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(sr, 0, 8, 0, Math.PI);
      ctx.stroke();
      ctx.restore();
      break;
    }

    case 'ice':
      // Slippery crystal platform
      drawBlock3D(px, py, pw, ph, '#E0FFFF', '#B0E0E6', '#87CEEB', '#4682B4');
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(px + 4, py + 3, pw * 0.3, 4);
      ctx.fillRect(px + pw * 0.5, py + 5, pw * 0.2, 3);
      // Sparkle
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      const iceT = performance.now() * 0.004;
      ctx.beginPath();
      ctx.arc(px + pw * 0.3 + Math.sin(iceT) * 5, py + ph/2, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'speed': {
      // Carrot speed pad - orange
      const speedGlow = Math.sin(p.glowTimer * 4) * 0.3 + 0.6;
      ctx.shadowColor = '#FF8C00';
      ctx.shadowBlur = 12 * speedGlow;
      drawBlock3D(px, py, pw, ph, '#FF8C00', '#FF6600', '#CC5200', '#993D00');
      ctx.shadowBlur = 0;
      // Carrot shapes
      ctx.fillStyle = 'rgba(255,140,0,0.6)';
      const sOff = (p.timer * 2) % 20;
      for (let a = 0; a < pw; a += 20) {
        const sx = px + a + sOff;
        if (sx >= px && sx + 8 <= px + pw) {
          ctx.beginPath();
          ctx.moveTo(sx, py + ph/2);
          ctx.lineTo(sx + 8, py + 4);
          ctx.lineTo(sx + 8, py + ph - 4);
          ctx.fill();
        }
      }
      // Orange speed trail particles
      if (Math.random() > 0.5) {
        spawnParticle(px + Math.random() * pw, py - 2,
          0, -1 - Math.random(), '#FF8C00', 10, 3, 'circle');
      }
      break;
    }

    case 'reverseGravity':
      if (!p.visible) return;
      drawBlock3D(px, py, pw, ph, '#DDA0DD', '#BA55D3', '#9932CC', '#800080');
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('↕', px + pw/2, py + ph/2 + 6);
      break;
  }
}

// --- Draw Horse ---
function drawHorse() {
  const horseColor = HORSE_COLORS[GS.playerColorIdx];
  const px = player.x;
  const py = player.y;
  const w = player.w;
  const h = player.h;
  const facing = player.facingRight ? 1 : -1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(px + w/2, py + h + 3, w * 0.5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Speed trail
  if (player.speedBoostTimer > 0 || player.powerSpeedTimer > 0) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#FF8C00';
    for (let t = 1; t <= 3; t++) {
      const tx = px - player.vx * t * 2;
      ctx.globalAlpha = 0.25 - t * 0.07;
      ctx.fillRect(tx + 4, py + 6, w - 8, h - 12);
    }
    ctx.globalAlpha = 1;
  }

  // Ghost mode visual
  if (player.ghostTimer > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(performance.now() * 0.01) * 0.15;
  }

  // Shield glow
  if (player.shield) {
    ctx.shadowColor = '#8B4513';
    ctx.shadowBlur = 15 + Math.sin(performance.now() * 0.005) * 5;
    ctx.strokeStyle = 'rgba(139,69,19,0.6)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px + w/2, py + h/2, w * 0.7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.save();
  ctx.translate(px + w/2, py + h/2);
  if (!player.facingRight) ctx.scale(-1, 1);

  // Apply squash/stretch
  ctx.scale(player.squash, player.stretch);

  const bodyW = w * 0.7;
  const bodyH = h * 0.4;
  const bodyX = -bodyW/2 + 2;
  const bodyY = -bodyH/2 - 2;

  // LEGS (4 legs with running animation)
  const legW = 4;
  const legH = h * 0.35;
  const legY = bodyY + bodyH;
  ctx.fillStyle = shadeColor(horseColor.body, -15);

  const legAnim = player.legPhase;
  const legOffsets = [
    Math.sin(legAnim) * 5,
    Math.sin(legAnim + Math.PI) * 5,
    Math.sin(legAnim + Math.PI * 0.5) * 5,
    Math.sin(legAnim + Math.PI * 1.5) * 5,
  ];
  // Back legs
  ctx.fillRect(bodyX + 3, legY, legW, legH + legOffsets[0]);
  ctx.fillRect(bodyX + bodyW - legW - 3, legY, legW, legH + legOffsets[1]);
  // Hooves (back)
  ctx.fillStyle = '#333';
  ctx.fillRect(bodyX + 3, legY + legH + Math.max(0,legOffsets[0]) - 3, legW, 3);
  ctx.fillRect(bodyX + bodyW - legW - 3, legY + legH + Math.max(0,legOffsets[1]) - 3, legW, 3);

  // TAIL
  ctx.strokeStyle = horseColor.mane;
  ctx.lineWidth = 3;
  const tailSway = Math.sin(player.tailPhase) * 6;
  const tailX = bodyX - 2;
  const tailY = bodyY + bodyH * 0.3;
  ctx.beginPath();
  ctx.moveTo(tailX, tailY);
  ctx.quadraticCurveTo(tailX - 10 + tailSway, tailY + 8, tailX - 8 + tailSway * 1.5, tailY + 18);
  ctx.stroke();
  // Tail hair
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tailX - 8 + tailSway * 1.5, tailY + 18);
  ctx.quadraticCurveTo(tailX - 12 + tailSway * 2, tailY + 24, tailX - 6 + tailSway * 2, tailY + 26);
  ctx.stroke();

  // BODY
  ctx.fillStyle = horseColor.body;
  // Main body (rounded rectangle)
  const bRad = 6;
  ctx.beginPath();
  ctx.moveTo(bodyX + bRad, bodyY);
  ctx.lineTo(bodyX + bodyW - bRad, bodyY);
  ctx.quadraticCurveTo(bodyX + bodyW, bodyY, bodyX + bodyW, bodyY + bRad);
  ctx.lineTo(bodyX + bodyW, bodyY + bodyH - bRad);
  ctx.quadraticCurveTo(bodyX + bodyW, bodyY + bodyH, bodyX + bodyW - bRad, bodyY + bodyH);
  ctx.lineTo(bodyX + bRad, bodyY + bodyH);
  ctx.quadraticCurveTo(bodyX, bodyY + bodyH, bodyX, bodyY + bodyH - bRad);
  ctx.lineTo(bodyX, bodyY + bRad);
  ctx.quadraticCurveTo(bodyX, bodyY, bodyX + bRad, bodyY);
  ctx.fill();

  // Belly (lighter)
  ctx.fillStyle = horseColor.belly;
  ctx.beginPath();
  ctx.ellipse(bodyX + bodyW/2, bodyY + bodyH * 0.7, bodyW * 0.35, bodyH * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Front legs (on top of body)
  ctx.fillStyle = shadeColor(horseColor.body, -10);
  ctx.fillRect(bodyX + 6, legY, legW, legH + legOffsets[2]);
  ctx.fillRect(bodyX + bodyW - legW - 6, legY, legW, legH + legOffsets[3]);
  // Hooves (front)
  ctx.fillStyle = '#333';
  ctx.fillRect(bodyX + 6, legY + legH + Math.max(0,legOffsets[2]) - 3, legW, 3);
  ctx.fillRect(bodyX + bodyW - legW - 6, legY + legH + Math.max(0,legOffsets[3]) - 3, legW, 3);

  // NECK
  const neckX = bodyX + bodyW - 4;
  const neckY = bodyY - 4;
  ctx.fillStyle = horseColor.body;
  ctx.beginPath();
  ctx.moveTo(neckX - 2, bodyY + 4);
  ctx.lineTo(neckX + 6, neckY - 8);
  ctx.lineTo(neckX + 12, neckY - 6);
  ctx.lineTo(neckX + 6, bodyY + 6);
  ctx.closePath();
  ctx.fill();

  // HEAD
  const headX = neckX + 5;
  const headY = neckY - 12;
  const headW = 12;
  const headH = 10;
  ctx.fillStyle = horseColor.body;
  ctx.beginPath();
  ctx.moveTo(headX, headY + headH);
  ctx.lineTo(headX, headY + 2);
  ctx.quadraticCurveTo(headX + 2, headY, headX + headW * 0.4, headY);
  ctx.lineTo(headX + headW, headY + 2);
  ctx.quadraticCurveTo(headX + headW + 2, headY + headH * 0.5, headX + headW, headY + headH);
  ctx.closePath();
  ctx.fill();

  // Snout / nose (lighter)
  ctx.fillStyle = horseColor.belly;
  ctx.beginPath();
  ctx.ellipse(headX + headW * 0.7, headY + headH * 0.7, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nostril
  ctx.fillStyle = shadeColor(horseColor.body, -40);
  ctx.beginPath();
  ctx.arc(headX + headW * 0.8, headY + headH * 0.7, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // EYE
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(headX + headW * 0.4, headY + headH * 0.35, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(headX + headW * 0.45, headY + headH * 0.35, 1.8, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(headX + headW * 0.4, headY + headH * 0.25, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // EAR
  ctx.fillStyle = horseColor.body;
  ctx.beginPath();
  ctx.moveTo(headX + 3, headY);
  ctx.lineTo(headX + 1, headY - 7);
  ctx.lineTo(headX + 6, headY - 1);
  ctx.fill();
  // Inner ear (pink)
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.moveTo(headX + 3, headY);
  ctx.lineTo(headX + 2, headY - 4);
  ctx.lineTo(headX + 5, headY - 1);
  ctx.fill();

  // MANE
  ctx.fillStyle = horseColor.mane;
  const maneWave = Math.sin(player.tailPhase * 1.5) * 2;
  // Mane along neck
  ctx.beginPath();
  ctx.moveTo(headX + 2, headY - 2);
  ctx.quadraticCurveTo(neckX + 8 + maneWave, neckY - 12, neckX + 2, neckY - 2);
  ctx.quadraticCurveTo(neckX - 2 + maneWave, neckY - 6, neckX - 4, bodyY + 2);
  ctx.lineTo(neckX, bodyY + 2);
  ctx.quadraticCurveTo(neckX + 4, neckY - 4, headX + 6, headY);
  ctx.closePath();
  ctx.fill();

  // Forelock (hair tuft on head)
  ctx.beginPath();
  ctx.moveTo(headX + 4, headY - 1);
  ctx.quadraticCurveTo(headX + 2 + maneWave, headY - 6, headX + 6, headY - 4);
  ctx.fill();

  // Pegasus jump indicator (wings!)
  if (player.rocketJump) {
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.globalAlpha = 0.5 + Math.sin(performance.now() * 0.01) * 0.3;
    // Wing
    const wingPhase = Math.sin(performance.now() * 0.008) * 15;
    ctx.beginPath();
    ctx.moveTo(bodyX + bodyW * 0.3, bodyY);
    ctx.quadraticCurveTo(bodyX + bodyW * 0.2, bodyY - 15 + wingPhase, bodyX - 5, bodyY - 10 + wingPhase);
    ctx.quadraticCurveTo(bodyX + bodyW * 0.1, bodyY - 5, bodyX + bodyW * 0.3, bodyY + 3);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Double jump indicator
  if (GS.hasDoubleJump && player.jumpsLeft > 0 && !player.onGround) {
    ctx.fillStyle = 'rgba(255,105,180,0.5)';
    for (let i = 0; i < player.jumpsLeft; i++) {
      ctx.beginPath();
      ctx.arc(px + w/2 - 6 + i * 12, py + h + 10, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Wall slide indicator
  if (player.wallSliding) {
    ctx.fillStyle = 'rgba(210,180,140,0.5)';
    const sideX = player.wallSlideSide === 1 ? px + w + 2 : px - 6;
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(sideX, py + 5 + i * 12, 4, 8);
    }
  }
}

function drawPowerup(x, y, pu) {
  const info = POWERUP_TYPES[pu.type];
  const glow = Math.sin(pu.glowTimer) * 0.3 + 0.7;

  ctx.shadowColor = info.color;
  ctx.shadowBlur = 12 * glow;

  ctx.fillStyle = info.color + '40';
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = info.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.stroke();

  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(info.emoji, x, y + 1);

  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
}

function drawCoin(x, y) {
  // Horseshoe shape
  const glow = Math.sin(performance.now() * 0.005) * 0.3 + 0.7;

  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 8 * glow;

  // Gold circle background
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.fill();

  // Horseshoe U shape
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y - 1, 5, 0, Math.PI);
  ctx.stroke();

  // Dots at horseshoe ends
  ctx.fillStyle = '#8B6914';
  ctx.beginPath();
  ctx.arc(x - 5, y - 1, 1.5, 0, Math.PI * 2);
  ctx.arc(x + 5, y - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

function drawPortal(x, y) {
  const t = performance.now() * 0.003;
  const glow = Math.sin(t) * 0.3 + 0.7;

  // Barn door portal
  ctx.shadowColor = '#FF69B4';
  ctx.shadowBlur = 20 * glow;

  // Barn door frame
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 4;
  ctx.strokeRect(x, y, TILE * 1.5, TILE * 2);

  // Red barn door
  ctx.fillStyle = `rgba(178,34,34,${0.4 + glow * 0.3})`;
  ctx.fillRect(x + 4, y + 4, TILE * 1.5 - 8, TILE * 2 - 8);

  // Barn door cross
  ctx.strokeStyle = `rgba(139,69,19,${0.3 + glow * 0.2})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 4);
  ctx.lineTo(x + TILE * 1.5 - 4, y + TILE * 2 - 4);
  ctx.moveTo(x + TILE * 1.5 - 4, y + 4);
  ctx.lineTo(x + 4, y + TILE * 2 - 4);
  ctx.stroke();

  // Sparkle particles around door
  for (let i = 0; i < 5; i++) {
    const sx = x + TILE * 0.75 + Math.sin(t + i * 1.3) * 18;
    const sy = y + TILE + Math.cos(t + i * 1.3) * 25;
    ctx.fillStyle = i % 2 === 0 ? '#FFD700' : '#FF69B4';
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + Math.sin(t * 2 + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#FFB6C1';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('FINISH', x + TILE * 0.75, y - 8);

  ctx.shadowBlur = 0;
}

// --- Color utility ---
function shadeColor(color, percent) {
  let r, g, b;
  if (color.startsWith('#')) {
    const hex = color.slice(1);
    r = parseInt(hex.substring(0, 2), 16);
    g = parseInt(hex.substring(2, 4), 16);
    b = parseInt(hex.substring(4, 6), 16);
  } else {
    return color;
  }
  r = Math.max(0, Math.min(255, r + Math.round(r * percent / 100)));
  g = Math.max(0, Math.min(255, g + Math.round(g * percent / 100)));
  b = Math.max(0, Math.min(255, b + Math.round(b * percent / 100)));
  return `rgb(${r},${g},${b})`;
}

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Menu ---
document.getElementById('btn-play').addEventListener('click', () => {
  ensureAudio();
  startGame(GS.highestStage);
});

document.getElementById('btn-stages').addEventListener('click', () => {
  showStageSelect();
});

document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('settings-screen').style.display = 'flex';
  updateSettingsUI();
});

document.getElementById('btn-back-stages').addEventListener('click', () => {
  document.getElementById('stage-select-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
});

document.getElementById('btn-back-settings').addEventListener('click', () => {
  document.getElementById('settings-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
});

document.getElementById('toggle-music').addEventListener('click', () => {
  GS.musicOn = !GS.musicOn;
  if (GS.musicOn && GS.screen === 'playing') startMusic();
  else stopMusic();
  updateSettingsUI();
  saveGame();
});

document.getElementById('toggle-sound').addEventListener('click', () => {
  GS.soundOn = !GS.soundOn;
  updateSettingsUI();
  saveGame();
});

document.getElementById('btn-next-stage').addEventListener('click', () => {
  document.getElementById('stage-complete-overlay').style.display = 'none';
  if (GS.currentStage >= 50) {
    showMenu();
  } else {
    startGame(GS.currentStage + 1);
  }
});

document.getElementById('btn-complete-menu').addEventListener('click', () => {
  document.getElementById('stage-complete-overlay').style.display = 'none';
  showMenu();
});

function updateSettingsUI() {
  const musicBtn = document.getElementById('toggle-music');
  musicBtn.textContent = GS.musicOn ? 'ON' : 'OFF';
  musicBtn.className = 'toggle-btn ' + (GS.musicOn ? 'toggle-on' : 'toggle-off');

  const soundBtn = document.getElementById('toggle-sound');
  soundBtn.textContent = GS.soundOn ? 'ON' : 'OFF';
  soundBtn.className = 'toggle-btn ' + (GS.soundOn ? 'toggle-on' : 'toggle-off');
}

function showStageSelect() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('stage-select-screen').style.display = 'flex';

  const grid = document.getElementById('stage-grid');
  grid.innerHTML = '';

  for (let i = 1; i <= 50; i++) {
    const btn = document.createElement('button');
    btn.className = 'stage-btn';
    btn.textContent = i;

    if (GS.completedStages[i]) {
      btn.classList.add('completed');
    } else if (i <= GS.highestStage) {
      btn.classList.add('current');
    } else {
      btn.classList.add('locked');
    }

    if (GS.completedStages[i]) {
      const stars = document.createElement('div');
      stars.className = 'stage-stars';
      const sc = GS.stageCoinsCollected[i] || 0;
      const bt = GS.bestTimes[i] || Infinity;
      const pt = STAGES[i-1].parTime;
      let starCount = 1;
      if (sc >= 3) starCount = 2;
      if (sc >= 3 && bt <= pt) starCount = 3;
      let starStr = '';
      for (let s = 0; s < starCount; s++) starStr += '★';
      stars.textContent = starStr;
      btn.appendChild(stars);
    }

    if (i <= GS.highestStage) {
      btn.addEventListener('click', ((stageNum) => () => {
        ensureAudio();
        document.getElementById('stage-select-screen').style.display = 'none';
        startGame(stageNum);
      })(i));
    }

    grid.appendChild(btn);
  }
}

function showMenu() {
  GS.screen = 'menu';
  stopMusic();
  document.getElementById('menu-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('stage-complete-overlay').style.display = 'none';
  document.getElementById('dash-cooldown-bar').style.display = 'none';
}

function startGame(stageNum) {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('stage-select-screen').style.display = 'none';
  document.getElementById('stage-complete-overlay').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  GS.screen = 'playing';
  GS.stageCoins = 0;
  GS.checkpointStage = Math.floor((stageNum - 1) / 5) * 5 + 1;
  if (GS.checkpointStage < 1) GS.checkpointStage = 1;

  loadStage(stageNum);
  startMusic();
}

// --- Main loop ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  if (GS.screen !== 'playing') {
    render();
    return;
  }

  GS.timer++;
  stageTimer++;
  updatePlatforms();
  updatePlayer();
  updateCamera();
  updateParticles();
  updateTrail();
  updateHUD();

  render();
}

// --- Init ---
loadGame();
updateSettingsUI();
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
