<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Wrefle 5</title>
  <style>
    :root{--font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--bg:#0f0f10;--bg2:#1a1a1c;--bg3:#232326;--border:#333336;--text:#f0f0f0;--dim:#6e6e73;--green:#4ade80;--green-d:#166534;--yellow:#facc15;--yellow-d:#713f12;--gray:#3f3f46;--key:#52525b}
    [data-theme="light"]{--bg:#f5f5f5;--bg2:#e8e8e8;--bg3:#ddd;--border:#bbb;--text:#1a1a1a;--dim:#666;--green:#22c55e;--green-d:#bbf7d0;--yellow:#eab308;--yellow-d:#fef9c3;--gray:#9ca3af;--key:#d1d5db}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow:hidden;touch-action:manipulation}
    #root{height:100%}
    canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}
    @keyframes flip{0%{transform:rotateX(0)}45%{transform:rotateX(90deg)}55%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}30%{transform:translateX(5px)}45%{transform:translateX(-5px)}60%{transform:translateX(3px)}75%{transform:translateX(-2px)}}
    @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}50%{transform:translateY(-10px)}70%{transform:translateY(-5px)}}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(74,222,128,0.3)}50%{box-shadow:0 0 20px rgba(74,222,128,0.6)}}
    @keyframes keyflash{0%{filter:brightness(1.6)}100%{filter:brightness(1)}}
    @keyframes combopop{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.3);opacity:1}100%{transform:scale(1);opacity:0}}
    .flip{animation:flip 0.55s ease forwards}.shake{animation:shake 0.5s ease}.bounce{animation:bounce 0.7s ease}.pop{animation:pop 0.12s ease}
    .keyflash{animation:keyflash 0.35s ease}
    .comboanim{animation:combopop 1.2s ease forwards}
    /* Multiplayer styles */
    @keyframes mp-pulse{0%,100%{opacity:1}50%{opacity:0.5}}
    @keyframes mp-slide-up{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes mp-glow-border{0%,100%{box-shadow:0 0 8px rgba(74,222,128,0.2)}50%{box-shadow:0 0 20px rgba(74,222,128,0.5)}}
    @keyframes mp-winner-pop{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
    @keyframes mp-podium-rise{0%{transform:translateY(40px);opacity:0}100%{transform:translateY(0);opacity:1}}
    .mp-pulse{animation:mp-pulse 1.5s ease infinite}
    .mp-slide-up{animation:mp-slide-up 0.4s ease forwards}
    .mp-glow-border{animation:mp-glow-border 2s ease infinite}
    .mp-winner-pop{animation:mp-winner-pop 0.6s ease forwards}
    .mp-podium-rise{animation:mp-podium-rise 0.5s ease forwards}
    .mp-room-code{font-family:var(--font-mono);font-size:clamp(2.5rem,10vw,4rem);font-weight:900;letter-spacing:0.3em;background:linear-gradient(135deg,var(--green),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .mp-btn{background:var(--green-d);border:2px solid var(--green);border-radius:10px;padding:12px 28px;color:var(--green);font-family:var(--font-mono);font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.1em;transition:all 0.15s}
    .mp-btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(74,222,128,0.3)}
    .mp-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
    .mp-btn-secondary{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--dim);font-family:var(--font-mono);font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.15s}
    .mp-btn-secondary:hover{border-color:var(--green);color:var(--green)}
    .mp-player-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:100px;transition:all 0.3s}
    .mp-player-card.solved{border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,0.3)}
    .mp-player-card.failed{border-color:#dc2626;opacity:0.6}
  </style>
</head>

// ── Daily mode
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function dateSeed(dateStr) {
  var h = 0;
  for (var i = 0; i < dateStr.length; i++) { h = Math.imul(31, h) + dateStr.charCodeAt(i) | 0; }
  return h;
}
function getDailyWord() {
  var today = new Date();
  var ds = today.getFullYear() + "-" + String(today.getMonth()+1).padStart(2,"0") + "-" + String(today.getDate()).padStart(2,"0");
  var rng = mulberry32(dateSeed(ds));
  return ANSWER_POOL[Math.floor(rng() * ANSWER_POOL.length)];
}
function pickAnswer(daily, themePack) {
  if (daily) return getDailyWord();
  if (themePack && THEME_PACKS[themePack]) {
    var words = THEME_PACKS[themePack].words;
    return words[Math.floor(Math.random() * words.length)];
  }
  return ANSWER_POOL[Math.floor(Math.random() * ANSWER_POOL.length)];
}

var confettiParts = [];

function initConfetti() {
  var c = document.getElementById("confetti");
  c.width = window.innerWidth; c.height = window.innerHeight;
  confettiCtx = c.getContext("2d");
}
function spawnConfetti() {
  initConfetti();
  var colors = ["#4ade80","#facc15","#60a5fa","#f472b6","#a78bfa","#fb923c"];
  for (var i = 0; i < 120; i++) {
    confettiParts.push({
      x: Math.random() * window.innerWidth,
      y: -20 - Math.random() * 200,
      w: 6 + Math.random() * 6,
      h: 4 + Math.random() * 4,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1
    });
  }
  if (!confettiAnim) animateConfetti();
}
function animateConfetti() {
  if (!confettiCtx) return;
  confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  confettiParts = confettiParts.filter(function(p) { return p.life > 0; });
  confettiParts.forEach(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.rotV; p.life -= 0.005;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    confettiCtx.globalAlpha = p.life;
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    confettiCtx.restore();
  });
  if (confettiParts.length > 0) { confettiAnim = requestAnimationFrame(animateConfetti); }
  else { confettiAnim = null; confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); }
}

function playTone(freq, dur, type, vol) {
  try {
    var ctx = getAudio(); var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.type = type || "sine"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(Math.min(vol || 0.025, 0.025), ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// ── Share
function shareResult(guesses, answer, starter, won, daily, themePack, hardMode, timer) {
  var rows = guesses.map(function(g) {
    var line = "";
    for (var i = 0; i < 5; i++) {
      if (answer[i] === g[i]) line += "🟩";
      else if (answer.includes(g[i])) line += "🟨";
      else line += "⬛";
    }
    return line;
  });
  var label = daily ? "Daily" : themePack ? THEME_PACKS[themePack].name : starter.name;
  var starterLine = starter.code + " (" + starter.name + ")";
  var modeStr = hardMode ? " [HARD]" : "";
  var timeStr = timer ? " ⏱" + timer + "s" : "";
  var text = "Wrefle 5 " + (won ? guesses.length : "X") + "/7 [" + label + "]" + modeStr + timeStr + "\nStarter: " + starterLine + "\n" + rows.join("\n") + "\ntaskiap.com";
  if (navigator.share) { navigator.share({ text: text }); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(text); return "Copied to clipboard!"; }
  return "Shared!";
}

// ── Hard mode validation
function validateHardMode(guess, guesses, answer) {
  // Check all previously confirmed green positions
  for (var gi = 0; gi < guesses.length; gi++) {
    var prev = guesses[gi];
    for (var i = 0; i < 5; i++) {
      if (prev[i] === answer[i]) {
        // This position is confirmed green
        if (guess[i] !== answer[i]) {
          return "Position " + (i+1) + " must be " + answer[i] + " (hard mode)";
        }
      }
    }
  }
  // Check all confirmed yellow letters must be used
  var requiredLetters = {};
  for (var gi = 0; gi < guesses.length; gi++) {
    var prev = guesses[gi];
    for (var i = 0; i < 5; i++) {
      if (prev[i] !== answer[i] && answer.includes(prev[i])) {
        requiredLetters[prev[i]] = true;
      }
    }
  }
  for (var letter in requiredLetters) {
    if (!guess.includes(letter)) {
      return "Must use letter " + letter + " (hard mode)";
    }
  }
  return null;
}

// ── Streak Calendar
function StreakCalendar(props) {
  var history = props.history || [];
  var cells = [];
  var today = new Date();
  for (var i = 29; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    var ds = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    var entry = null;
    for (var j = 0; j < history.length; j++) {
      if (history[j].date === ds) { entry = history[j]; break; }
    }
    var bg = "var(--bg3)";
    if (entry) bg = entry.won ? "var(--green-d)" : "#7f1d1d";
    var border = entry ? (entry.won ? "1px solid var(--green)" : "1px solid #dc2626") : "1px solid var(--border)";
    var dayNum = d.getDate();
    cells.push(
      <div key={ds} title={ds + (entry ? (entry.won ? " W" : " L") : "")} style={{width:16,height:16,borderRadius:3,background:bg,border:border,fontSize:"0.4rem",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--dim)"}}>{dayNum}</div>
    );
  }
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:2,maxWidth:216,justifyContent:"center"}}>
      {cells}
    </div>
  );
}

// ── Histogram
function Histogram(props) {
  var dist = props.distribution || [0,0,0,0,0,0,0];
  var highlight = props.highlight;
  var max = Math.max.apply(null, dist.concat([1]));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:3,width:"100%",maxWidth:240}}>
      {dist.map(function(count, i) {
        var pct = Math.max(8, (count / max) * 100);
        var isHighlight = highlight === i;
        return (
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:"0.65rem",fontFamily:"var(--font-mono)"}}>
            <span style={{width:12,textAlign:"right",color:"var(--dim)"}}>{i+1}</span>
            <div style={{flex:1,height:16,background:"var(--bg3)",borderRadius:3,overflow:"hidden",position:"relative"}}>
              <div style={{width:pct+"%",height:"100%",background:isHighlight?"var(--green)":"var(--gray)",borderRadius:3,transition:"width 0.5s ease",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}}>
                <span style={{fontSize:"0.6rem",color:isHighlight?"var(--green-d)":"var(--text)",fontWeight:700}}>{count>0?count:""}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  var [showTimer, setShowTimer] = useState(true);
  var [elapsed, setElapsed] = useState(0);
  var [bestTime, setBestTime] = useState(loadBestTime());
  var [isNewBest, setIsNewBest] = useState(false);

  // Timer tick
  useEffect(function(){
    if (gameOver) return;
    var iv = setInterval(function(){ setElapsed(Math.floor((Date.now() - timerStart) / 1000)); }, 1000);
    return function(){ clearInterval(iv); };
  }, [gameOver, timerStart]);

  // Combo tracker: count consecutive greens across all guesses
  function countCombo(guessList, ans) {
    var c = 0;
    for (var gi = guessList.length - 1; gi >= 0; gi--) {
      var g = guessList[gi];
      var hasGreen = false;
      for (var ci = 0; ci < 5; ci++) {
        if (g[ci] === ans[ci]) { hasGreen = true; c++; }
      }
      if (!hasGreen) break;
    }
    return c;
  }

  // Jackson nervousness based on remaining guesses
  function getJacksonMood(guessCount, greens, yellows, isWin, isLose) {
    if (isWin) return "celebrate";
    if (isLose) return "sad";
    var remaining = ROWS - guessCount;
    if (remaining <= 1) return "scream";
    if (remaining <= 2) return "nervous";
    if (remaining <= 3 && greens < 2) return "worried";
    if (greens >= 4) return "love";
    if (greens >= 3) return "happy";
    if (greens === 0 && yellows === 0) return "shock";
    if (yellows >= 3) return "think";
    return "neutral";
  }

  useEffect(function(){
    if(starter.code===answer){
      setFlipRow(-1);setRevealedRows([true]);
      setGameOver(true);setTimerEnd(Date.now());setMessage("WHAT. First try?! Jackson fainted.");setCatMood("scream");sndWin();spawnConfetti();

      var s=Object.assign({},stats,{played:stats.played+1,won:stats.won+1,streak:stats.streak+1,maxStreak:Math.max(stats.maxStreak,stats.streak+1),distribution:stats.distribution.slice()});
      s.distribution[0]++;
      s.history=(stats.history||[]).concat([{date:new Date().toISOString().slice(0,10),won:true}]);
      saveStats(s);setShowStats(true);fetchGif("cat mind blown").then(setGif);
      setFunnyDef(getFunnyDef(answer));
    } else {
      setFlipRow(0);
      for(var i=0;i<5;i++)(function(j){setTimeout(function(){sndFlip(j);},j*70);})(i);
    }
  },[]);

  var submit = function(){
    if(current.length!==5){setShakeRow(guesses.length);sndError();setTimeout(function(){setShakeRow(-1);},500);return;}
    var guess=current.toUpperCase();
    if(guess==="MEOWS"){setMessage("Jackson says hi! 😺 ...but that's not the answer.");setCatMood("love");fetchGif("cat meowing").then(setGif);setShakeRow(guesses.length);setTimeout(function(){setShakeRow(-1);setMessage("");},2500);return;}
    if(guess==="CATTY"){setMessage("Jackson takes that personally.");setCatMood("smirk");}
    if(!DICT.has(guess)&&!STARTER_CODES.has(guess)){setMessage(pick(INVALID_MSGS));setShakeRow(guesses.length);sndError();try{navigator.vibrate&&navigator.vibrate(50);}catch(e){}setTimeout(function(){setShakeRow(-1);setMessage("");},2000);return;}

    // Hard mode validation
    if (hardMode) {
      var hardErr = validateHardMode(guess, guesses, answer);
      if (hardErr) {
        setMessage(hardErr);
        setShakeRow(guesses.length);sndError();
        try{navigator.vibrate&&navigator.vibrate([50,30,50]);}catch(e){}
        setTimeout(function(){setShakeRow(-1);setMessage("");},2500);
        return;
      }
    }

    var next=guesses.concat([guess]);
    setGuesses(next);setCurrent("");setFlipRow(next.length-1);
    for(var i=0;i<5;i++)(function(j){setTimeout(function(){sndFlip(j);},j*70);})(i);
    setTimeout(function(){setRevealedRows(function(r){var n=r.slice();n[next.length-1]=true;return n;});},400);

    // Flash newly-colored keys
    setTimeout(function(){
      var newFlash = {};
      for(var ki=0;ki<5;ki++){ newFlash[guess[ki]] = true; }
      setFlashKeys(newFlash);
      setTimeout(function(){ setFlashKeys({}); }, 400);
    }, 450);

    // Haptic
    try{navigator.vibrate&&navigator.vibrate(15);}catch(e){}

    // Check combo
    var greensNow = 0;
    for (var ci = 0; ci < 5; ci++) { if (guess[ci] === answer[ci]) greensNow++; }
    if (greensNow > 0) {
      var newCombo = combo + greensNow;
      setCombo(newCombo);
      if (newCombo >= 2) {
        sndCombo();
        var comboLabel = newCombo >= 5 ? "🔥 MEGA x" + newCombo : newCombo >= 4 ? "🔥 QUAD x" + newCombo : newCombo >= 3 ? "⚡ TRIPLE x" + newCombo : "💥 DOUBLE x" + newCombo;
        setComboText(comboLabel);
        setShowCombo(true);
        setTimeout(function(){ setShowCombo(false); }, 1200);
        if (NARRATOR_COMBO[Math.min(newCombo, 5)]) speak(NARRATOR_COMBO[Math.min(newCombo, 5)]);
      }
    } else {
      setCombo(0);
    }

    if(guess===answer){
      setTimeout(function(){
        var finishTime = Math.floor((Date.now() - timerStart) / 1000);
        setTimerEnd(Date.now());
        var newStreak = stats.streak+1;
        var msg = STREAK_MSGS[newStreak] || pick(WIN_MSGS);
        setFlipRow(-1);
        setRevealedRows(function(r){var n=[];for(var i=0;i<next.length;i++)n[i]=true;return n;});
        setGameOver(true);setMessage(msg);setCatMood("celebrate");setBounceRow(next.length-1);sndWin();spawnConfetti();
        speak(pick(NARRATOR_WIN));
        var s=Object.assign({},stats,{played:stats.played+1,won:stats.won+1,streak:newStreak,maxStreak:Math.max(stats.maxStreak,newStreak),distribution:stats.distribution.slice()});
        s.distribution[next.length-1]++;
        s.history=(stats.history||[]).concat([{date:new Date().toISOString().slice(0,10),won:true}]);
        saveStats(s);setShowStats(true);
        setFunnyDef(getFunnyDef(answer));
        var nb = saveBestTime(finishTime);
        if (nb) { setIsNewBest(true); setBestTime(finishTime); }
        var gifTag = newStreak>=5?"cat partying hard":newStreak>=3?"cat dancing":"cat celebration happy";
        fetchGif(gifTag).then(setGif);
      },500);
    } else if(next.length>=ROWS){
      setTimeout(function(){
        setTimerEnd(Date.now());
        setFlipRow(-1);
        setRevealedRows(function(r){var n=[];for(var i=0;i<next.length;i++)n[i]=true;return n;});
        setGameOver(true);setMessage(pick(LOSE_MSGS)+" ("+answer+")");setCatMood("sad");sndLose();
        speak(pick(NARRATOR_LOSE) + " The word was " + answer + ".");
        var s=Object.assign({},stats,{played:stats.played+1,won:stats.won,streak:0,maxStreak:stats.maxStreak,distribution:stats.distribution.slice()});
        s.history=(stats.history||[]).concat([{date:new Date().toISOString().slice(0,10),won:false}]);
        saveStats(s);setShowStats(true);fetchGif("cat disappointed dramatic").then(setGif);
      },500);
    } else {
      var yellows=0;
      for(var gi=0;gi<5;gi++){if(answer[gi]!==guess[gi]&&answer.includes(guess[gi]))yellows++;}
      var mood = getJacksonMood(next.length, greensNow, yellows, false, false);
      setCatMood(mood);

      if(greensNow>=3){setMessage(pick(CLOSE_MSGS));speak(pick(NARRATOR_GOOD));fetchGif("cat excited screaming").then(setGif);setTimeout(function(){setMessage("");},2500);}
      else if(greensNow===0&&yellows===0){setMessage(pick(MISS_MSGS));speak(pick(NARRATOR_BAD));fetchGif("cat confused staring").then(setGif);setTimeout(function(){setMessage("");},2500);}
      else if(greensNow===0&&yellows>=2){setCatMood("think");setMessage("Letters are there... just scrambled!");speak("Hmm, the letters are present but misplaced. Quite the puzzle.");setGif(null);setTimeout(function(){setMessage("");},2000);}
      else if(greensNow>=1&&yellows>=1){setMessage(pick(NARRATOR_GUESS));setGif(null);setTimeout(function(){setMessage("");},2000);}
      else{speak(pick(NARRATOR_GUESS));setGif(null);}

  var onKey = function(key){
    if(gameOver)return;

  return (

      {/* Message */}
      {message&&<div style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",margin:"2px 0",padding:"3px 12px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,fontWeight:700,maxWidth:340,textAlign:"center"}}>{message}</div>}

      {/* Combo popup */}

      {/* Grid */}
      <div style={{display:"flex",flexDirection:"column",gap:gap,margin:"4px 0",flex:"0 0 auto"}}>

          return(
            <div key={row} className={shakeRow===row?"shake":bounceRow===row?"bounce":""} style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:gap}}>
              {Array.from({length:COLS}).map(function(_,col){
                var letter="";var bg="transparent";var border="2px solid var(--border)";var color="var(--text)";
                if(guess){

            </div>

        })}
      </div>

      {/* Letter frequency hint after 4+ wrong guesses */}
      {!gameOver && guesses.length >= 4 && (function() {
        var commonLetters = "EARSTLINOUCDHMPGBFYWKVXZJQ".split("");
        var tried = {};
        guesses.forEach(function(g){ for(var i=0;i<g.length;i++) tried[g[i]]=true; });

          setGaveUp(true);

          setTimerEnd(Date.now());
          setMessage("You gave up. The word was: " + answer);

          sndLose();
          speak("A tactical retreat. The word was " + answer + ". No shame in it.");
          var s=Object.assign({},stats,{played:stats.played+1,won:stats.won,streak:0,maxStreak:stats.maxStreak,distribution:stats.distribution.slice()});
          s.history=(stats.history||[]).concat([{date:new Date().toISOString().slice(0,10),won:false}]);
          saveStats(s);setShowStats(true);
          fetchGif("cat disappointed").then(setGif);
        }} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"3px 10px",color:"var(--dim)",fontFamily:"var(--font-mono)",fontSize:"0.6rem",cursor:"pointer",margin:"1px 0",opacity:0.6,transition:"opacity 0.15s"}}
          onMouseEnter={function(e){e.currentTarget.style.opacity="1";}}
          onMouseLeave={function(e){e.currentTarget.style.opacity="0.6";}}>
          Give Up
        </button>
      )}

      {/* Gif */}
      {gif&&<img src={gif} alt="" style={{width:160,height:110,objectFit:"cover",borderRadius:10,margin:"3px 0",border:"2px solid var(--border)",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}/>}

      {/* Funny definition */}
      {funnyDef && gameOver && (
        <div style={{fontFamily:"var(--font-mono)",fontSize:"0.62rem",color:"var(--dim)",margin:"2px 0",padding:"4px 10px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:6,maxWidth:300,textAlign:"center",fontStyle:"italic",lineHeight:1.4}}>

          <div style={{display:"flex",gap:10,fontSize:"0.58rem",fontFamily:"var(--font-mono)",color:"var(--dim)"}}>

            <div style={{textAlign:"center"}}><div style={{fontSize:"0.85rem",color:"var(--green)",fontWeight:700}}>{won?stats.streak+1:0}</div>streak</div>
          </div>
          <Histogram distribution={(function(){
            var d = stats.distribution.slice();
            if (won) d[guesses.length-1]++;
            return d;
          })()} highlight={won ? guesses.length-1 : -1}/>

      {gameOver&&(
        <div style={{display:"flex",gap:6,margin:"3px 0"}}>

          <button onClick={function(){var r=shareResult(guesses,answer,starter,won,daily,themePack,hardMode,timerEnd?Math.floor((timerEnd-timerStart)/1000):null);if(r)setMessage(r);setTimeout(function(){setMessage("");},2000);}} style={{background:"var(--bg3)",border:"2px solid var(--border)",borderRadius:8,padding:"8px 16px",color:"var(--text)",fontFamily:"var(--font-mono)",fontSize:"0.8rem",fontWeight:700,cursor:"pointer"}}>SHARE 📋</button>
        </div>
      )}

      {/* Keyboard */}
      <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"center",marginTop:"auto",paddingBottom:4,width:"100%",maxWidth:500}}>
        {kbRows.map(function(row,ri){return(
          <div key={ri} style={{display:"flex",gap:3,justifyContent:"center",width:"100%"}}>
            {row.map(function(k){
              var isWide=k==="DEL";
              var c=usedColors[k];

              if(c==="gray"){clr="#3a3a3c";bg="var(--bg2)";}
              if(isWide){bg="#dc2626";clr="#fff";}
              var hasFlash = flashKeys[k];
              return(
                <button key={k} onClick={function(){onKey(k==="DEL"?"BACKSPACE":k);try{navigator.vibrate&&navigator.vibrate(10);}catch(e){}}}
                  className={hasFlash?"keyflash":""}
                  style={{flex:isWide?"1.5":"1",maxWidth:isWide?keyW*2:keyW,height:keyH,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,fontSize:isWide?"0.68rem":"0.85rem",fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"none",background:bg,color:clr,transition:"all 0.15s"}}>
                  {isWide?"⌫":k}
                </button>
              );
            })}
          </div>
        );})}
        {/* Big ENTER */}
        <button onClick={function(){onKey("ENTER");try{navigator.vibrate&&navigator.vibrate(15);}catch(e){}}} style={{width:"100%",maxWidth:340,height:keyH+2,borderRadius:8,fontSize:"0.95rem",fontWeight:800,fontFamily:"var(--font-mono)",letterSpacing:"0.15em",cursor:"pointer",border:"2px solid var(--green)",background:"var(--green-d)",color:"var(--green)",marginTop:1,transition:"all 0.15s"}}
          onMouseDown={function(e){e.currentTarget.style.transform="scale(0.97)";}}
          onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}}
          onTouchStart={function(e){e.currentTarget.style.transform="scale(0.97)";}}
          onTouchEnd={function(e){e.currentTarget.style.transform="scale(1)";}}>
          ENTER
        </button>
      </div>
    </div>
  );
}

// ── Multiplayer Detection
var MP_PARAMS = new URLSearchParams(window.location.search);
var MP_MODE = MP_PARAMS.has('host') ? 'host' : MP_PARAMS.has('join') ? 'join' : null;
var MP_JOIN_CODE = MP_PARAMS.get('join');
var MP_PEER_PREFIX = 'taskiap-wrefle-';
var MP_TOTAL_ROUNDS = 5;
var MP_MAX_GUESSES = 6;

function mpGenerateCode() {
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var code = '';
  for (var i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// ── MP Sound effects (Web Audio, volume max 0.02)
function mpPlaySound(type) {
  try {
    var ctx = getAudio();
    if (type === 'join') {
      [440, 554, 659].forEach(function(f, i) { setTimeout(function(){ playTone(f, 0.08, 'sine', 0.02); }, i * 60); });
    } else if (type === 'start') {
      [523, 659, 784, 1047].forEach(function(f, i) { setTimeout(function(){ playTone(f, 0.12, 'sine', 0.02); }, i * 80); });
    } else if (type === 'winner') {
      [523, 659, 784, 1047, 1319].forEach(function(f, i) { setTimeout(function(){ playTone(f, 0.2, 'sine', 0.02); }, i * 100); });
    } else if (type === 'round') {
      [440, 554].forEach(function(f, i) { setTimeout(function(){ playTone(f, 0.1, 'triangle', 0.015); }, i * 80); });
    } else if (type === 'fail') {
      [280, 220].forEach(function(f, i) { setTimeout(function(){ playTone(f, 0.2, 'sawtooth', 0.015); }, i * 120); });
    } else if (type === 'tick') {
      playTone(800, 0.03, 'square', 0.01);
    } else if (type === 'podium') {
      [262, 330, 392, 523, 659, 784].forEach(function(f, i) { setTimeout(function(){ playTone(f, 0.25, 'sine', 0.02); }, i * 120); });
    } else if (type === 'correct') {
      playTone(880, 0.1, 'sine', 0.02); setTimeout(function(){ playTone(1100, 0.1, 'sine', 0.02); }, 60);
    } else if (type === 'wrong') {
      playTone(200, 0.08, 'square', 0.01);
    }
  } catch(e) {}
}

function mpScoreForGuesses(numGuesses) {
  if (numGuesses <= 0 || numGuesses > 6) return 0;
  return (7 - numGuesses) * 100;
}

// ── TV/Host Component
function TVHost() {
  var [roomCode] = useState(mpGenerateCode);
  var [players, setPlayers] = useState({});
  var [phase, setPhase] = useState('lobby'); // lobby, playing, roundEnd, podium
  var [round, setRound] = useState(0);
  var [currentWord, setCurrentWord] = useState(null);
  var [winner, setWinner] = useState(null);
  var [scores, setScores] = useState({});
  var [roundResults, setRoundResults] = useState([]);
  var [countdown, setCountdown] = useState(null);
  var [testMode, setTestMode] = useState(false);
  var peerRef = useRef(null);
  var connsRef = useRef({});
  var playersRef = useRef({});
  var phaseRef = useRef('lobby');
  var currentWordRef = useRef(null);
  var firstSolverRef = useRef(null);
  var scoresRef = useRef({});
  var roundRef = useRef(0);
  var roundResultsRef = useRef([]);
  var botTimersRef = useRef([]);

  // Sync refs
  useEffect(function() { phaseRef.current = phase; }, [phase]);
  useEffect(function() { currentWordRef.current = currentWord; }, [currentWord]);
  useEffect(function() { scoresRef.current = scores; }, [scores]);
  useEffect(function() { roundRef.current = round; }, [round]);
  useEffect(function() { roundResultsRef.current = roundResults; }, [roundResults]);

  // Initialize PeerJS
  useEffect(function() {
    var peerId = MP_PEER_PREFIX + roomCode;
    var checkReady = setInterval(function() {
      if (window.Peer) {
        clearInterval(checkReady);
        var peer = new Peer(peerId);
        peerRef.current = peer;

        peer.on('open', function() {
          console.log('Host peer open:', peerId);
        });

        peer.on('connection', function(conn) {
          conn.on('open', function() {
            conn.on('data', function(data) {
              handlePlayerMessage(conn, data);
            });
          });
          conn.on('close', function() {
            handlePlayerDisconnect(conn.metadata && conn.metadata.playerId);
          });
          conn.on('error', function() {
            handlePlayerDisconnect(conn.metadata && conn.metadata.playerId);
          });
        });

        peer.on('error', function(err) {
          console.error('Peer error:', err);
        });
      }
    }, 100);

    return function() {
      clearInterval(checkReady);
      botTimersRef.current.forEach(function(t) { clearTimeout(t); clearInterval(t); });
      if (peerRef.current) peerRef.current.destroy();
    };
  }, [roomCode]);

  function broadcast(msg) {
    Object.values(connsRef.current).forEach(function(c) {
      try { c.send(msg); } catch(e) {}
    });
  }

  function sendTo(playerId, msg) {
    var c = connsRef.current[playerId];
    if (c) try { c.send(msg); } catch(e) {}
  }

  function handlePlayerMessage(conn, data) {
    if (data.type === 'join') {
      var playerId = data.playerId || ('p-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6));
      conn.metadata = { playerId: playerId };
      connsRef.current[playerId] = conn;
      var updatedPlayers = Object.assign({}, playersRef.current);
      updatedPlayers[playerId] = {
        name: data.name || 'Player',
        grid: [],
        solved: false,
        failed: false,
        guessCount: 0,
        connected: true
      };
      playersRef.current = updatedPlayers;
      setPlayers(Object.assign({}, updatedPlayers));
      mpPlaySound('join');

      // Send ack
      sendTo(playerId, { type: 'joined', playerId: playerId });

      // If game in progress, let them know
      if (phaseRef.current === 'playing') {
        sendTo(playerId, { type: 'roundStart', word: currentWordRef.current, round: roundRef.current + 1 });
      }
    } else if (data.type === 'guess') {
      var pid = conn.metadata && conn.metadata.playerId;
      if (!pid || phaseRef.current !== 'playing') return;
      var p = playersRef.current[pid];
      if (!p || p.solved || p.failed) return;

      var guess = data.guess;
      var word = currentWordRef.current;
      var colors = [];
      for (var i = 0; i < 5; i++) {
        if (word[i] === guess[i]) colors.push('green');
        else if (word.includes(guess[i])) colors.push('yellow');
        else colors.push('gray');
      }

      // Send feedback to player
      sendTo(pid, { type: 'guessFeedback', colors: colors, guess: guess, row: p.guessCount });

      // Update player grid
      p.grid = p.grid.concat([colors]);
      p.guessCount++;

      // Check solve
      var solved = colors.every(function(c) { return c === 'green'; });
      if (solved) {
        p.solved = true;
        var isFirst = !firstSolverRef.current;
        if (isFirst) firstSolverRef.current = pid;
        var pts = mpScoreForGuesses(p.guessCount) + (isFirst ? 200 : 0);
        var newScores = Object.assign({}, scoresRef.current);
        newScores[pid] = (newScores[pid] || 0) + pts;
        scoresRef.current = newScores;
        setScores(Object.assign({}, newScores));
        sendTo(pid, { type: 'solved', points: pts, firstSolve: isFirst });
        mpPlaySound('winner');
      } else if (p.guessCount >= MP_MAX_GUESSES) {
        p.failed = true;
        sendTo(pid, { type: 'failed', word: word });
        mpPlaySound('fail');
      }

      playersRef.current = Object.assign({}, playersRef.current);
      setPlayers(Object.assign({}, playersRef.current));

      // Check if all players done
      var allDone = Object.keys(playersRef.current).every(function(id) {
        var pp = playersRef.current[id];
        return pp.solved || pp.failed || !pp.connected;
      });
      if (allDone && Object.keys(playersRef.current).length > 0) {
        endRound();
      }
    }
  }

  function handlePlayerDisconnect(playerId) {
    if (!playerId) return;
    var updated = Object.assign({}, playersRef.current);
    if (updated[playerId]) {
      updated[playerId] = Object.assign({}, updated[playerId], { connected: false });
      playersRef.current = updated;
      setPlayers(Object.assign({}, updated));
    }
    delete connsRef.current[playerId];
  }

  function startRound() {
    var word = ANSWER_POOL[Math.floor(Math.random() * ANSWER_POOL.length)];
    var newRound = roundRef.current;
    currentWordRef.current = word;
    setCurrentWord(word);
    firstSolverRef.current = null;

    // Reset player states for new round
    var updated = {};
    Object.keys(playersRef.current).forEach(function(id) {
      if (playersRef.current[id].connected) {
        updated[id] = Object.assign({}, playersRef.current[id], { grid: [], solved: false, failed: false, guessCount: 0 });
      }
    });
    playersRef.current = updated;
    setPlayers(Object.assign({}, updated));
    setPhase('playing');

    broadcast({ type: 'roundStart', word: word, round: newRound + 1 });
    mpPlaySound('start');

    // Run bots if test mode
    if (testMode) {
      runBots(word);
    }
  }

  function startGame() {
    var c = 3;
    setCountdown(c);
    mpPlaySound('round');
    var iv = setInterval(function() {
      c--;
      if (c <= 0) {
        clearInterval(iv);
        setCountdown(null);
        setRound(0);
        roundRef.current = 0;
        startRound();
      } else {
        setCountdown(c);
        mpPlaySound('tick');
      }
    }, 1000);
  }

  function endRound() {
    var results = [];
    Object.keys(playersRef.current).forEach(function(id) {
      var p = playersRef.current[id];
      var pts = 0;
      if (p.solved) {
        var isFirst = firstSolverRef.current === id;
        pts = mpScoreForGuesses(p.guessCount) + (isFirst ? 200 : 0);
      }
      results.push({ id: id, name: p.name, solved: p.solved, guesses: p.guessCount, points: pts });
    });
    results.sort(function(a, b) { return (b.points - a.points) || (a.guesses - b.guesses); });
    var newRR = roundResultsRef.current.concat([{ word: currentWordRef.current, results: results }]);
    roundResultsRef.current = newRR;
    setRoundResults(newRR);
    setPhase('roundEnd');

    // Send standings to players
    var standings = {};
    Object.keys(scoresRef.current).forEach(function(id) {
      var p = playersRef.current[id];
      standings[id] = { name: p ? p.name : '???', score: scoresRef.current[id] || 0 };
    });
    broadcast({ type: 'roundEnd', word: currentWordRef.current, standings: standings, round: roundRef.current + 1, totalRounds: MP_TOTAL_ROUNDS });

    // Check if game over
    var nextRound = roundRef.current + 1;
    setRound(nextRound);
    roundRef.current = nextRound;

    if (nextRound >= MP_TOTAL_ROUNDS) {
      setTimeout(function() {
        setPhase('podium');
        mpPlaySound('podium');
        broadcast({ type: 'gameOver', standings: standings });
      }, 4000);
    }
  }

  function nextRound() {
    startRound();
  }

  // Bot logic for test mode
  function runBots(word) {
    var botIds = Object.keys(playersRef.current).filter(function(id) { return id.indexOf('bot-') === 0; });
    botIds.forEach(function(botId) {
      var guessNum = 0;
      var usedLetters = {};
      var knownGreen = [null, null, null, null, null];
      var knownYellow = {};

      function botGuess() {
        if (guessNum >= MP_MAX_GUESSES) return;
        var p = playersRef.current[botId];
        if (!p || p.solved || p.failed) return;

        // Pick a plausible word
        var guess = pickBotWord(word, guessNum, usedLetters, knownGreen, knownYellow);
        guessNum++;

        // Process the guess
        var colors = [];
        for (var i = 0; i < 5; i++) {
          if (word[i] === guess[i]) { colors.push('green'); knownGreen[i] = guess[i]; }
          else if (word.includes(guess[i])) { colors.push('yellow'); if (!knownYellow[guess[i]]) knownYellow[guess[i]] = []; knownYellow[guess[i]].push(i); }
          else { colors.push('gray'); usedLetters[guess[i]] = true; }
        }

        p.grid = p.grid.concat([colors]);
        p.guessCount = guessNum;

        var solved = colors.every(function(c) { return c === 'green'; });
        if (solved) {
          p.solved = true;
          var isFirst = !firstSolverRef.current;
          if (isFirst) firstSolverRef.current = botId;
          var pts = mpScoreForGuesses(guessNum) + (isFirst ? 200 : 0);
          var newScores = Object.assign({}, scoresRef.current);
          newScores[botId] = (newScores[botId] || 0) + pts;
          scoresRef.current = newScores;
          setScores(Object.assign({}, newScores));
        } else if (guessNum >= MP_MAX_GUESSES) {
          p.failed = true;
        }

        playersRef.current = Object.assign({}, playersRef.current);
        setPlayers(Object.assign({}, playersRef.current));

        // Check all done
        var allDone = Object.keys(playersRef.current).every(function(id) {
          var pp = playersRef.current[id];
          return pp.solved || pp.failed || !pp.connected;
        });
        if (allDone) {
          endRound();
        } else if (!solved && guessNum < MP_MAX_GUESSES) {
          var delay = 1500 + Math.random() * 3000;
          var t = setTimeout(botGuess, delay);
          botTimersRef.current.push(t);
        }
      }

      var initDelay = 800 + Math.random() * 2000;
      var t = setTimeout(botGuess, initDelay);
      botTimersRef.current.push(t);
    });
  }

  function pickBotWord(answer, guessNum, usedLetters, knownGreen, knownYellow) {
    // Bots get smarter with each guess. Attempt to find a word matching constraints.
    var candidates = ANSWER_POOL.filter(function(w) {
      for (var i = 0; i < 5; i++) {
        if (knownGreen[i] && w[i] !== knownGreen[i]) return false;
        if (usedLetters[w[i]]) return false;
      }
      // Check yellow letters are in the word but not in same position
      for (var letter in knownYellow) {
        if (!w.includes(letter)) return false;
      }
      return true;
    });

    // On last 2 guesses, bot has 70% chance to get the answer if it matches constraints
    if (guessNum >= 4 && Math.random() < 0.7) return answer;
    if (guessNum >= 3 && Math.random() < 0.3) return answer;

    if (candidates.length > 0) return candidates[Math.floor(Math.random() * candidates.length)];
    return ANSWER_POOL[Math.floor(Math.random() * ANSWER_POOL.length)];
  }

  function addTestBots() {
    setTestMode(true);
    var botNames = ['RoboGuess', 'WordBot3k', 'SylviaAI'];
    botNames.forEach(function(name, idx) {
      var botId = 'bot-' + idx;
      var updated = Object.assign({}, playersRef.current);
      updated[botId] = {
        name: name,
        grid: [],
        solved: false,
        failed: false,
        guessCount: 0,
        connected: true
      };
      playersRef.current = updated;
    });
    setPlayers(Object.assign({}, playersRef.current));
    mpPlaySound('join');
  }

  var playerCount = Object.keys(players).filter(function(id) { return players[id].connected; }).length;
  var joinUrl = 'taskiap.com/games/wrefle5.html?join=' + roomCode;

  // ── Render Lobby
  if (phase === 'lobby') {
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1.5rem',background:'var(--bg)'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.9rem',color:'var(--dim)',letterSpacing:'0.1em'}}>WREFLE 5 MULTIPLAYER</div>
        <div className="mp-room-code">{roomCode}</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--dim)',background:'var(--bg2)',padding:'8px 16px',borderRadius:8,border:'1px solid var(--border)',wordBreak:'break-all',textAlign:'center',maxWidth:400}}>
          Join at: <span style={{color:'var(--green)'}}>{joinUrl}</span>
        </div>

        {countdown !== null ? (
          <div style={{fontFamily:'var(--font-mono)',fontSize:'4rem',fontWeight:900,color:'var(--green)'}}>
            {countdown}
          </div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:'0.5rem',alignItems:'center'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)'}}>{playerCount} player{playerCount !== 1 ? 's' : ''} connected</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center',maxWidth:500}}>
              {Object.keys(players).filter(function(id){return players[id].connected;}).map(function(id){
                return (
                  <div key={id} className="mp-slide-up" style={{background:'var(--bg2)',border:'1.5px solid var(--green)',borderRadius:8,padding:'8px 16px',fontFamily:'var(--font-mono)',fontSize:'0.8rem',color:'var(--green)',fontWeight:600}}>
                    {players[id].name}
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="mp-btn" disabled={playerCount < 1} onClick={startGame}>
                START GAME
              </button>
              <button className="mp-btn-secondary" onClick={addTestBots}>
                TEST MODE
              </button>
            </div>
          </div>
        )}

        <div style={{position:'absolute',bottom:12,fontSize:'0.55rem',color:'var(--dim)',fontFamily:'var(--font-mono)'}}>
          {MP_TOTAL_ROUNDS} rounds · 2-6 players · {ANSWER_POOL.length} words
        </div>
      </div>
    );
  }

  // ── Render Playing / Round End
  if (phase === 'playing' || phase === 'roundEnd') {
    var connectedPlayers = Object.keys(players).filter(function(id) { return players[id].connected; });
    var gridCellSize = Math.max(14, Math.min(24, Math.floor((window.innerWidth - 80) / (connectedPlayers.length * 6))));
    var anyWinner = connectedPlayers.find(function(id) { return players[id].solved; });

    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',padding:'1rem',gap:'0.8rem',background:'var(--bg)',overflow:'auto'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12,width:'100%',justifyContent:'center'}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)'}}>ROUND {round + (phase === 'playing' ? 1 : 0)}/{MP_TOTAL_ROUNDS}</span>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'1rem',fontWeight:800,background:'linear-gradient(90deg,var(--green),var(--yellow))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>WREFLE 5</span>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)'}}>CODE: {roomCode}</span>
        </div>

        {/* Winner announcement */}
        {phase === 'roundEnd' && (
          <div className="mp-winner-pop" style={{background:'var(--bg2)',border:'2px solid var(--green)',borderRadius:12,padding:'12px 24px',textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--dim)',marginBottom:4}}>THE WORD WAS</div>
            <div style={{fontFamily:'var(--font-mono)',fontSize:'1.8rem',fontWeight:900,color:'var(--green)',letterSpacing:'0.2em'}}>{currentWord}</div>
            {anyWinner && (
              <div style={{fontFamily:'var(--font-mono)',fontSize:'0.85rem',color:'var(--yellow)',marginTop:4,fontWeight:700}}>
                {players[anyWinner].name} wins this round!
              </div>
            )}
            {!anyWinner && (
              <div style={{fontFamily:'var(--font-mono)',fontSize:'0.85rem',color:'#dc2626',marginTop:4}}>
                Nobody solved it!
              </div>
            )}
            {round < MP_TOTAL_ROUNDS && (
              <button className="mp-btn" style={{marginTop:10,padding:'8px 20px',fontSize:'0.8rem'}} onClick={nextRound}>
                NEXT ROUND
              </button>
            )}
          </div>
        )}

        {/* Player grids */}
        <div style={{display:'flex',flexWrap:'wrap',gap:16,justifyContent:'center',alignItems:'flex-start',flex:1,overflow:'auto',width:'100%',maxWidth:1000}}>
          {connectedPlayers.map(function(id) {
            var p = players[id];
            var cardClass = 'mp-player-card' + (p.solved ? ' solved' : '') + (p.failed ? ' failed' : '');
            return (
              <div key={id} className={cardClass}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',fontWeight:700,color:p.solved?'var(--green)':p.failed?'#dc2626':'var(--text)',marginBottom:2}}>
                  {p.name}
                  {p.solved && ' ✓'}
                  {p.failed && ' ✗'}
                </div>
                <div style={{fontFamily:'var(--font-mono)',fontSize:'0.55rem',color:'var(--dim)',marginBottom:4}}>
                  {scores[id] || 0} pts
                </div>
                {/* Mini grid - colors only, no letters */}
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  {Array.from({length: MP_MAX_GUESSES}).map(function(_, row) {
                    var rowColors = p.grid[row];
                    return (
                      <div key={row} style={{display:'flex',gap:2}}>
                        {Array.from({length: 5}).map(function(_, col) {
                          var c = rowColors ? rowColors[col] : null;
                          var bg = c === 'green' ? 'var(--green)' : c === 'yellow' ? 'var(--yellow)' : c === 'gray' ? 'var(--gray)' : 'var(--bg3)';
                          var border = c ? 'none' : '1px solid var(--border)';
                          return (
                            <div key={col} style={{width:gridCellSize,height:gridCellSize,borderRadius:3,background:bg,border:border,transition:'background 0.3s'}}/>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Scoreboard */}
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px',display:'flex',gap:12,fontFamily:'var(--font-mono)',fontSize:'0.6rem',flexWrap:'wrap',justifyContent:'center'}}>
          {connectedPlayers.sort(function(a, b) { return (scores[b] || 0) - (scores[a] || 0); }).map(function(id, idx) {
            return (
              <span key={id} style={{color: idx === 0 ? 'var(--green)' : 'var(--dim)'}}>
                {idx + 1}. {players[id].name}: {scores[id] || 0}
              </span>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Render Podium
  if (phase === 'podium') {
    var sortedPlayers = Object.keys(players).filter(function(id) { return players[id].connected || (scores[id] || 0) > 0; }).sort(function(a, b) {
      return (scores[b] || 0) - (scores[a] || 0);
    });
    var medals = ['🥇', '🥈', '🥉'];

    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1.5rem',background:'var(--bg)'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'1.2rem',fontWeight:800,color:'var(--green)',letterSpacing:'0.15em'}}>FINAL STANDINGS</div>

        <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',maxWidth:400}}>
          {sortedPlayers.map(function(id, idx) {
            var delay = idx * 0.2;
            return (
              <div key={id} className="mp-podium-rise" style={{display:'flex',alignItems:'center',gap:12,padding:'12px 20px',background:idx===0?'var(--green-d)':'var(--bg2)',border:idx===0?'2px solid var(--green)':'1.5px solid var(--border)',borderRadius:10,animationDelay:delay+'s'}}>
                <span style={{fontSize:'1.5rem'}}>{medals[idx] || (idx+1+'.')}</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:'1rem',fontWeight:700,color:idx===0?'var(--green)':'var(--text)',flex:1}}>{players[id].name}</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:'1rem',fontWeight:800,color:idx===0?'var(--green)':'var(--yellow)'}}>{scores[id] || 0}</span>
              </div>
            );
          })}
        </div>

        {/* Round history */}
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px',maxWidth:400,width:'100%'}}>
          <div style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--dim)',marginBottom:6,textAlign:'center'}}>ROUND HISTORY</div>
          {roundResults.map(function(rr, ri) {
            return (
              <div key={ri} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,fontFamily:'var(--font-mono)',fontSize:'0.6rem'}}>
                <span style={{color:'var(--dim)',width:16}}>R{ri+1}</span>
                <span style={{color:'var(--green)',fontWeight:700,width:50,letterSpacing:'0.1em'}}>{rr.word}</span>
                <span style={{color:'var(--dim)',flex:1}}>
                  {rr.results.filter(function(r){return r.solved;}).length > 0
                    ? rr.results.filter(function(r){return r.solved;}).sort(function(a,b){return a.guesses-b.guesses;})[0].name + ' (' + rr.results.filter(function(r){return r.solved;}).sort(function(a,b){return a.guesses-b.guesses;})[0].guesses + ' guesses)'
                    : 'No winner'}
                </span>
              </div>
            );
          })}
        </div>

        <button className="mp-btn" onClick={function(){
          setRound(0); roundRef.current = 0;
          setRoundResults([]); roundResultsRef.current = [];
          setScores({}); scoresRef.current = {};
          firstSolverRef.current = null;
          botTimersRef.current.forEach(function(t){ clearTimeout(t); clearInterval(t); });
          botTimersRef.current = [];
          setPhase('lobby');
          spawnConfetti();
        }}>
          PLAY AGAIN
        </button>
      </div>
    );
  }

  return null;
}


// ── Phone/Player Component
function PhonePlayer() {
  var [name, setName] = useState(function() { try { return localStorage.getItem('wrefle5-mp-name') || ''; } catch(e) { return ''; } });
  var [status, setStatus] = useState('nameEntry'); // nameEntry, connecting, waiting, playing, solved, failed, standings, gameOver
  var [word, setWord] = useState(null);
  var [guesses, setGuesses] = useState([]);
  var [current, setCurrent] = useState('');
  var [colors, setColors] = useState([]);
  var [message, setMessage] = useState('');
  var [shakeRow, setShakeRow] = useState(-1);
  var [flipRow, setFlipRow] = useState(-1);
  var [roundNum, setRoundNum] = useState(0);
  var [standings, setStandings] = useState(null);
  var [myScore, setMyScore] = useState(0);
  var [roundWord, setRoundWord] = useState(null);
  var [playerId, setPlayerId] = useState(null);
  var connRef = useRef(null);
  var peerRef = useRef(null);
  var wordRef = useRef(null);
  var guessesRef = useRef([]);
  var colorsRef = useRef([]);
  var statusRef = useRef('nameEntry');

  useEffect(function() { wordRef.current = word; }, [word]);
  useEffect(function() { guessesRef.current = guesses; }, [guesses]);
  useEffect(function() { colorsRef.current = colors; }, [colors]);
  useEffect(function() { statusRef.current = status; }, [status]);

  function connect() {
    if (!name.trim()) return;
    var playerName = name.trim().slice(0, 12);
    try { localStorage.setItem('wrefle5-mp-name', playerName); } catch(e) {}
    setStatus('connecting');

    var checkReady = setInterval(function() {
      if (window.Peer) {
        clearInterval(checkReady);
        var peer = new Peer();
        peerRef.current = peer;

        peer.on('open', function() {
          var hostId = MP_PEER_PREFIX + MP_JOIN_CODE;
          var conn = peer.connect(hostId, { reliable: true });
          connRef.current = conn;

          conn.on('open', function() {
            conn.send({ type: 'join', name: playerName });
            setStatus('waiting');
          });

          conn.on('data', function(data) {
            handleHostMessage(data);
          });

          conn.on('close', function() {
            setMessage('Disconnected from host');
            setStatus('connecting');
            // Try to reconnect after a delay
            setTimeout(function() {
              if (peerRef.current && !peerRef.current.destroyed) {
                var newConn = peerRef.current.connect(hostId, { reliable: true });
                connRef.current = newConn;
                newConn.on('open', function() {
                  newConn.send({ type: 'join', name: playerName, playerId: playerId });
                  setStatus('waiting');
                  setMessage('Reconnected!');
                  setTimeout(function() { setMessage(''); }, 2000);
                });
                newConn.on('data', function(d) { handleHostMessage(d); });
              }
            }, 2000);
          });

          conn.on('error', function(err) {
            setMessage('Connection error. Check room code.');
            setStatus('nameEntry');
          });
        });

        peer.on('error', function(err) {
          console.error('Peer error:', err);
          if (err.type === 'peer-unavailable') {
            setMessage('Room not found. Check code.');
            setStatus('nameEntry');
          }
        });
      }
    }, 100);
  }

  function handleHostMessage(data) {
    if (data.type === 'joined') {
      setPlayerId(data.playerId);
    } else if (data.type === 'roundStart') {
      wordRef.current = data.word;
      setWord(data.word);
      setGuesses([]);
      guessesRef.current = [];
      setColors([]);
      colorsRef.current = [];
      setCurrent('');
      setRoundNum(data.round);
      setStatus('playing');
      setMessage('');
      mpPlaySound('start');
    } else if (data.type === 'guessFeedback') {
      var newColors = colorsRef.current.concat([data.colors]);
      colorsRef.current = newColors;
      setColors(newColors);
      setFlipRow(newColors.length - 1);
      for (var i = 0; i < 5; i++) (function(j) { setTimeout(function() { sndFlip(j); }, j * 70); })(i);
    } else if (data.type === 'solved') {
      setStatus('solved');
      setMyScore(function(s) { return s + data.points; });
      var msg = data.firstSolve ? 'FIRST SOLVE! +' + data.points + ' pts' : 'SOLVED! +' + data.points + ' pts';
      setMessage(msg);
      mpPlaySound('correct');
      spawnConfetti();
    } else if (data.type === 'failed') {
      setStatus('failed');
      setRoundWord(data.word);
      setMessage('The word was: ' + data.word);
      mpPlaySound('fail');
    } else if (data.type === 'roundEnd') {
      setRoundWord(data.word);
      // Build standings from data
      var standingsList = [];
      Object.keys(data.standings).forEach(function(id) {
        standingsList.push({ id: id, name: data.standings[id].name, score: data.standings[id].score });
      });
      standingsList.sort(function(a, b) { return b.score - a.score; });
      setStandings(standingsList);
      if (statusRef.current !== 'solved' && statusRef.current !== 'failed') {
        setStatus('standings');
      }
      // Show standings after a moment
      setTimeout(function() {
        setStatus('standings');
      }, 2000);
    } else if (data.type === 'gameOver') {
      var finalList = [];
      Object.keys(data.standings).forEach(function(id) {
        finalList.push({ id: id, name: data.standings[id].name, score: data.standings[id].score });
      });
      finalList.sort(function(a, b) { return b.score - a.score; });
      setStandings(finalList);
      setStatus('gameOver');
      mpPlaySound('podium');
      spawnConfetti();
    }
  }

  function submitGuess() {
    if (current.length !== 5) {
      setShakeRow(guesses.length);
      sndError();
      setTimeout(function() { setShakeRow(-1); }, 500);
      return;
    }
    var guess = current.toUpperCase();
    if (!DICT.has(guess)) {
      setMessage('Not in word list');
      setShakeRow(guesses.length);
      sndError();
      setTimeout(function() { setShakeRow(-1); setMessage(''); }, 1500);
      return;
    }

    var newGuesses = guesses.concat([guess]);
    setGuesses(newGuesses);
    guessesRef.current = newGuesses;
    setCurrent('');

    // Send to host
    if (connRef.current) {
      try { connRef.current.send({ type: 'guess', guess: guess }); } catch(e) {}
    }
  }

  function onKey(key) {
    if (status !== 'playing') return;
    if (key === 'ENTER') return submitGuess();
    if (key === 'BACKSPACE') return setCurrent(function(c) { return c.slice(0, -1); });
    if (/^[A-Z]$/.test(key) && current.length < 5) { setCurrent(function(c) { return c + key; }); sndType(); }
  }

  useEffect(function() {
    var handler = function(e) {
      if (e.ctrlKey || e.metaKey) return;
      var k = e.key.toUpperCase();
      if (k === 'ENTER' || k === 'BACKSPACE' || (/^[A-Z]$/.test(k) && k.length === 1)) { e.preventDefault(); onKey(k); }
    };
    window.addEventListener('keydown', handler);
    return function() { window.removeEventListener('keydown', handler); };
  });

  // Build keyboard colors
  var usedColors = {};
  guesses.forEach(function(g, ri) {
    var rowC = colors[ri];
    if (!rowC) return;
    for (var i = 0; i < 5; i++) {
      var c = rowC[i];
      var prev = usedColors[g[i]];
      if (c === 'green' || !prev) usedColors[g[i]] = c;
      else if (c === 'yellow' && prev !== 'green') usedColors[g[i]] = c;
    }
  });

  var vw = window.innerWidth;
  var cellSize = Math.min(52, Math.floor((vw - 44) / 5));
  var keyH = 50;
  var keyW = Math.max(30, Math.min(38, Math.floor((vw - 44) / 10)));
  var kbRows = ['QWERTYUIOP'.split(''), 'ASDFGHJKL'.split(''), ['ZXCVBNM'.split('').concat(['DEL'])].flat()];

  // ── Name Entry
  if (status === 'nameEntry') {
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1.5rem',background:'var(--bg)'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'1.5rem',fontWeight:800,background:'linear-gradient(135deg,var(--green),var(--yellow))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>WREFLE 5</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)'}}>Joining room <span style={{color:'var(--green)',fontWeight:700}}>{MP_JOIN_CODE}</span></div>
        <input
          type="text"
          value={name}
          onChange={function(e) { setName(e.target.value.slice(0, 12)); }}
          onKeyDown={function(e) { if (e.key === 'Enter') connect(); }}
          placeholder="Your name"
          autoFocus
          style={{
            background:'var(--bg2)',border:'2px solid var(--border)',borderRadius:10,padding:'12px 16px',
            color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:'1.1rem',fontWeight:700,
            textAlign:'center',outline:'none',width:'100%',maxWidth:250,letterSpacing:'0.05em'
          }}
        />
        {message && <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#dc2626'}}>{message}</div>}
        <button className="mp-btn" onClick={connect} disabled={!name.trim()}>
          JOIN GAME
        </button>
      </div>
    );
  }

  // ── Connecting
  if (status === 'connecting') {
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1rem',background:'var(--bg)'}}>
        <div className="mp-pulse" style={{fontFamily:'var(--font-mono)',fontSize:'1rem',color:'var(--green)'}}>Connecting...</div>
        {message && <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'#dc2626'}}>{message}</div>}
      </div>
    );
  }

  // ── Waiting
  if (status === 'waiting') {
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1rem',background:'var(--bg)'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'1rem',fontWeight:700,color:'var(--green)'}}>You're in!</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',color:'var(--dim)'}}>Hi, {name}!</div>
        <div className="mp-pulse" style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)'}}>
          Waiting for host to start...
        </div>
        {message && <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--dim)'}}>{message}</div>}
      </div>
    );
  }

  // ── Standings
  if (status === 'standings') {
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1rem',background:'var(--bg)'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',color:'var(--dim)'}}>ROUND {roundNum} COMPLETE</div>
        {roundWord && <div style={{fontFamily:'var(--font-mono)',fontSize:'1.4rem',fontWeight:900,color:'var(--green)',letterSpacing:'0.2em'}}>{roundWord}</div>}
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--dim)'}}>Your score: <span style={{color:'var(--yellow)',fontWeight:700}}>{myScore}</span></div>
        {standings && (
          <div style={{display:'flex',flexDirection:'column',gap:6,width:'100%',maxWidth:300}}>
            {standings.map(function(s, i) {
              var isMe = s.id === playerId;
              return (
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',background:isMe?'var(--green-d)':'var(--bg2)',border:isMe?'1.5px solid var(--green)':'1px solid var(--border)',borderRadius:8}}>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)',width:20}}>{i+1}.</span>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',fontWeight:isMe?700:400,color:isMe?'var(--green)':'var(--text)',flex:1}}>{s.name}</span>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',fontWeight:700,color:'var(--yellow)'}}>{s.score}</span>
                </div>
              );
            })}
          </div>
        )}
        <div className="mp-pulse" style={{fontFamily:'var(--font-mono)',fontSize:'0.65rem',color:'var(--dim)',marginTop:8}}>
          Waiting for next round...
        </div>
      </div>
    );
  }

  // ── Game Over
  if (status === 'gameOver') {
    var medals = ['🥇', '🥈', '🥉'];
    return (
      <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'2rem',gap:'1rem',background:'var(--bg)'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'1.2rem',fontWeight:800,color:'var(--green)',letterSpacing:'0.15em'}}>GAME OVER</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.75rem',color:'var(--dim)'}}>Your final score: <span style={{color:'var(--yellow)',fontWeight:700,fontSize:'1rem'}}>{myScore}</span></div>
        {standings && (
          <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%',maxWidth:300}}>
            {standings.map(function(s, i) {
              var isMe = s.id === playerId;
              return (
                <div key={s.id} className="mp-podium-rise" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 16px',background:isMe?'var(--green-d)':'var(--bg2)',border:isMe?'2px solid var(--green)':'1.5px solid var(--border)',borderRadius:10,animationDelay:(i*0.15)+'s'}}>
                  <span style={{fontSize:'1.3rem'}}>{medals[i] || (i+1+'.')}</span>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'0.9rem',fontWeight:isMe?700:400,color:isMe?'var(--green)':'var(--text)',flex:1}}>{s.name}</span>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:'0.9rem',fontWeight:700,color:'var(--yellow)'}}>{s.score}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── Playing / Solved / Failed
  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',padding:'4px 4px 0',overflow:'hidden'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:6,width:'100%',maxWidth:380,padding:'3px 6px',marginBottom:2}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:'0.8rem',fontWeight:800,background:'linear-gradient(90deg,var(--green),var(--yellow))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>WREFLE 5</span>
        <span style={{fontSize:'0.5rem',color:'var(--dim)',fontFamily:'var(--font-mono)',marginLeft:'auto'}}>
          Round {roundNum} · {guesses.length}/{MP_MAX_GUESSES}
        </span>
      </div>

      {/* Status messages */}
      {status === 'solved' && (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.9rem',padding:'6px 16px',background:'var(--green-d)',border:'2px solid var(--green)',borderRadius:8,color:'var(--green)',fontWeight:700,margin:'4px 0',textAlign:'center'}}>
          {message}
        </div>
      )}
      {status === 'failed' && (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.9rem',padding:'6px 16px',background:'#7f1d1d',border:'2px solid #dc2626',borderRadius:8,color:'#fca5a5',fontWeight:700,margin:'4px 0',textAlign:'center'}}>
          {message}
        </div>
      )}
      {status === 'playing' && message && (
        <div style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',margin:'2px 0',padding:'3px 12px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,fontWeight:700,maxWidth:340,textAlign:'center'}}>
          {message}
        </div>
      )}

      {/* Grid */}
      <div style={{display:'flex',flexDirection:'column',gap:4,margin:'6px 0',flex:'0 0 auto'}}>
        {Array.from({length: MP_MAX_GUESSES}).map(function(_, row) {
          var guess = guesses[row];
          var rowColors = colors[row];
          var isCurrentRow = row === guesses.length && status === 'playing';
          return (
            <div key={row} className={shakeRow === row ? 'shake' : ''} style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:4}}>
              {Array.from({length: 5}).map(function(_, col) {
                var letter = '';
                var bg = 'transparent';
                var border = '2px solid var(--border)';
                var color = 'var(--text)';
                if (guess && rowColors) {
                  letter = guess[col];
                  var c = rowColors[col];
                  bg = colorBg(c); border = '2px solid ' + colorVar(c); color = colorVar(c);
                } else if (isCurrentRow && current[col]) {
                  letter = current[col]; border = '2px solid var(--dim)';
                }
                return (
                  <div key={col} className={flipRow === row && guess ? 'flip' : (isCurrentRow && current.length === col + 1 ? 'pop' : '')}
                    style={{width:cellSize,height:cellSize,display:'flex',alignItems:'center',justifyContent:'center',fontSize:(cellSize*0.48)+'px',fontWeight:800,fontFamily:'var(--font-mono)',background:bg,border:border,borderRadius:6,color:color,animationDelay:guess?(col*0.08)+'s':'0s',textTransform:'uppercase',transition:'background 0.3s'}}>
                    {letter}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Keyboard - only show during playing */}
      {status === 'playing' && (
        <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'center',marginTop:'auto',paddingBottom:4,width:'100%',maxWidth:500}}>
          {kbRows.map(function(row, ri) {
            return (
              <div key={ri} style={{display:'flex',gap:3,justifyContent:'center',width:'100%'}}>
                {row.map(function(k) {
                  var isWide = k === 'DEL';
                  var c = usedColors[k];
                  var bg = c ? colorBg(c) : 'var(--key)';
                  var clr = c ? colorText(c) : 'var(--text)';
                  if (c === 'gray') { clr = '#3a3a3c'; bg = 'var(--bg2)'; }
                  if (isWide) { bg = '#dc2626'; clr = '#fff'; }
                  return (
                    <button key={k} onClick={function() { onKey(k === 'DEL' ? 'BACKSPACE' : k); try { navigator.vibrate && navigator.vibrate(10); } catch(e) {} }}
                      style={{flex:isWide?'1.5':'1',maxWidth:isWide?keyW*2:keyW,height:keyH,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:6,fontSize:isWide?'0.68rem':'0.85rem',fontWeight:700,fontFamily:'var(--font-mono)',cursor:'pointer',border:'none',background:bg,color:clr,transition:'all 0.15s'}}>
                      {isWide ? '⌫' : k}
                    </button>
                  );
                })}
              </div>
            );
          })}
          <button onClick={function() { onKey('ENTER'); try { navigator.vibrate && navigator.vibrate(15); } catch(e) {} }}
            style={{width:'100%',maxWidth:340,height:keyH+2,borderRadius:8,fontSize:'0.95rem',fontWeight:800,fontFamily:'var(--font-mono)',letterSpacing:'0.15em',cursor:'pointer',border:'2px solid var(--green)',background:'var(--green-d)',color:'var(--green)',marginTop:1,transition:'all 0.15s'}}>
            ENTER
          </button>
        </div>
      )}
    </div>
  );
}


// ── Root
function App(){
  // Check for multiplayer mode first
  if (MP_MODE === 'host') return <TVHost />;
  if (MP_MODE === 'join') return <PhonePlayer />;

  // Original single-player mode
  var [starter,setStarter]=useState(null);
  var [daily,setDaily]=useState(false);
  var [themePack,setThemePack]=useState(null);
  var [stats,setStats]=useState(loadStats);
  var [key,setKey]=useState(0);
  var [hardMode,setHardMode]=useState(loadHardMode);
  var [theme,setTheme]=useState(loadTheme);

  useEffect(function(){
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  var toggleTheme=function(){
    var next=theme==="dark"?"light":"dark";
    setTheme(next);saveTheme(next);
  };
  var toggleHard=function(){
    var next=!hardMode;
    setHardMode(next);saveHardMode(next);
  };

  var reset=function(){setStarter(null);setDaily(false);setThemePack(null);setStats(loadStats());setKey(function(k){return k+1;});};
  var handlePickDaily=function(){
    var today=new Date();
    var ds=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
    var rng=mulberry32(dateSeed(ds+"starter"));
    var dailyStarter=STARTERS[Math.floor(rng()*STARTERS.length)];
    setDaily(true);setThemePack(null);setStarter(dailyStarter);
  };
  var handlePickTheme=function(pack){
    var s = STARTERS[Math.floor(Math.random()*STARTERS.length)];
    setDaily(false);setThemePack(pack);setStarter(s);
  };
  if(!starter)return <PickerScreen onPick={function(s){setDaily(false);setThemePack(null);setStarter(s);}} onPickDaily={handlePickDaily} onPickTheme={handlePickTheme} stats={stats} hardMode={hardMode} onToggleHard={toggleHard} theme={theme} onToggleTheme={toggleTheme}/>;
  return <Game key={key} starter={starter} daily={daily} themePack={themePack} hardMode={hardMode} onDone={reset} stats={stats}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <div style="position:fixed;bottom:2px;right:4px;font-size:0.5rem;color:#333;font-family:monospace">build-20260519-wrefle5</div>
</body>
