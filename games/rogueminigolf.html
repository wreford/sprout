function resize(){
  var aw=window.innerWidth,ah=window.innerHeight;
  var s=Math.min(aw/W,ah/H);
  SCALE=s;
  canvas.width=W;
  canvas.height=H;
  canvas.style.width=Math.floor(W*s)+'px';
  canvas.style.height=Math.floor(H*s)+'px';
  canvas.style.marginTop=Math.floor((ah-H*s)/2)+'px';
}
resize();
window.addEventListener('resize',resize);

// Audio context
var audioCtx=null;
function initAudio(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
}
function playTone(freq,dur,vol,type){
  if(!audioCtx)return;
  try{
    var o=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    g.gain.setValueAtTime((vol||0.1),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxPutt(power){
  var p=Math.max(0.3,Math.min(1,power));
  playTone(120+p*80,0.15,0.12,'square');
  setTimeout(function(){playTone(80+p*60,0.1,0.08,'triangle');},30);
}

    var charUnlocks=[];
    for(var ci=0;ci<CHARACTERS.length;ci++){if(CHARACTERS[ci].unlocked)charUnlocks.push(CHARACTERS[ci].id);}
    localStorage.setItem('rogueminigolf_save',JSON.stringify({
      bestScore:bestScore,totalCoinsEver:totalCoinsEver,
      unlockedBalls:unlockedBalls,currentBall:currentBall,
      characterUnlocks:charUnlocks,selectedCharacter:selectedCharacter,
      unlockedSkins:unlockedSkins,selectedSkin:selectedSkin,
      totalPowerupsCollected:totalPowerupsCollected,maxHoleReached:maxHoleReached
    }));
  }catch(e){}
}

// Load save
try{
  var sav=JSON.parse(localStorage.getItem('rogueminigolf_save'));
  if(sav){
    bestScore=sav.bestScore||null;
    totalCoinsEver=sav.totalCoinsEver||0;
    unlockedBalls=sav.unlockedBalls||["white"];
    currentBall=sav.currentBall||"white";
    if(sav.characterUnlocks){
      for(var ci=0;ci<CHARACTERS.length;ci++){
        if(sav.characterUnlocks.indexOf(CHARACTERS[ci].id)>=0)CHARACTERS[ci].unlocked=true;
      }
    }
    selectedCharacter=sav.selectedCharacter||0;
    if(sav.unlockedSkins)unlockedSkins=sav.unlockedSkins;
    if(typeof sav.selectedSkin==='number')selectedSkin=sav.selectedSkin;
    if(typeof sav.totalPowerupsCollected==='number')totalPowerupsCollected=sav.totalPowerupsCollected;
    if(typeof sav.maxHoleReached==='number')maxHoleReached=sav.maxHoleReached;
  }
}catch(e){}

function hasUpgrade(eff){
  for(var i=0;i<upgrades_collected.length;i++){
    if(upgrades_collected[i].effect===eff) return upgrades_collected[i];
  }
  return null;
}
function getUpgradeVal(eff){
  var v=0;
  for(var i=0;i<upgrades_collected.length;i++){
    if(upgrades_collected[i].effect===eff) v+=upgrades_collected[i].val;
  }
  return v;
}

// ---- PROCEDURAL COURSE GENERATION ----
function generateHole(holeNum){
  var isBoss=(holeNum===18);
  var isMiniBoss=(holeNum%6===0&&holeNum<18);
  var fairways=[];
  var walls=[];
  var obstacles=[];
  var enemies=[];
  var pickups=[];
  var coinsList=[];

  // Determine shape complexity
  var segments=2+Math.floor(Math.random()*2);
  if(holeNum>6)segments=Math.min(4,segments+1);
  if(isBoss)segments=5;

  // Build fairway segments
  var fw=140+Math.floor(Math.random()*40);
  var cx=W/2,cy=0;
  var teeX=0,teeY=0;
  var holeX=0,holeY=0;
  var totalH=0;
  var dir=0; // 0=down

  // Start segment
  var segH=80+Math.floor(Math.random()*40);
  fairways.push({x:cx-fw/2,y:cy,w:fw,h:segH,type:'grass'});
  teeX=cx;
  teeY=cy+30;
  cy+=segH;
  totalH=cy;

  for(var s=0;s<segments;s++){
    var turnDir=(Math.random()<0.5)?-1:1;
    var turnAmount=30+Math.floor(Math.random()*30);
    var nextCx=cx+turnDir*turnAmount;
    nextCx=Math.max(fw/2+10,Math.min(W-fw/2-10,nextCx));

    // Connector
    var connW=Math.abs(nextCx-cx)+fw+20;
    var connX=Math.min(cx,nextCx)-fw/2;
    var connH=30+Math.floor(Math.random()*20);
    fairways.push({x:connX,y:cy,w:connW,h:connH,type:'grass'});
    cy+=connH;
    cx=nextCx;

    // Next segment
    segH=70+Math.floor(Math.random()*50)+holeNum*3;
    if(isBoss)segH+=30;
    var segW=fw+Math.floor(Math.random()*20)-10;
    segW=Math.max(60,segW);
    fairways.push({x:cx-segW/2,y:cy,w:segW,h:segH,type:'grass'});
    cy+=segH;
    totalH=cy;
  }

  holeX=cx;
  holeY=cy-40;

  // Add sand traps
  if(holeNum>2){
    var sandCount=Math.floor(Math.random()*(1+holeNum/5));
    for(var i=0;i<sandCount;i++){
      var sf=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
      var sw=20+Math.floor(Math.random()*25);
      var sh=15+Math.floor(Math.random()*20);
      var sx=sf.x+10+Math.floor(Math.random()*(sf.w-sw-20));
      var sy=sf.y+10+Math.floor(Math.random()*(sf.h-sh-20));
      obstacles.push({x:sx,y:sy,w:sw,h:sh,type:'sand'});
    }
  }

  // Add water hazards
  if(holeNum>4){
    var waterCount=Math.floor(Math.random()*(holeNum/6));
    for(var i=0;i<waterCount;i++){
      var wf=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
      var ww=25+Math.floor(Math.random()*20);
      var wh=18+Math.floor(Math.random()*15);
      var wx=wf.x+10+Math.floor(Math.random()*(Math.max(1,wf.w-ww-20)));
      var wy=wf.y+10+Math.floor(Math.random()*(Math.max(1,wf.h-wh-20)));
      obstacles.push({x:wx,y:wy,w:ww,h:wh,type:'water'});
    }
  }

  // Add rocks
  if(holeNum>1){
    var rockCount=1+Math.floor(Math.random()*(1+holeNum/4));
    rockCount=Math.min(rockCount,5);
    for(var i=0;i<rockCount;i++){
      var rf=fairways[Math.floor(Math.random()*fairways.length)];
      var rr=5+Math.floor(Math.random()*6);
      var rx=rf.x+rr+5+Math.floor(Math.random()*(Math.max(1,rf.w-rr*2-10)));
      var ry=rf.y+rr+5+Math.floor(Math.random()*(Math.max(1,rf.h-rr*2-10)));
      // Don't place too close to tee or hole
      var dTee=Math.sqrt((rx-teeX)*(rx-teeX)+(ry-teeY)*(ry-teeY));
      var dHole=Math.sqrt((rx-holeX)*(rx-holeX)+(ry-holeY)*(ry-holeY));
      if(dTee>30&&dHole>25){
        obstacles.push({x:rx-rr,y:ry-rr,w:rr*2,h:rr*2,type:'rock',cx:rx,cy:ry,r:rr});
      }
    }
  }

  // Add inner walls
  var wallCount=Math.min(4,Math.floor(holeNum/4));
  if(isBoss)wallCount=3;
  for(var i=0;i<wallCount;i++){
    var wf=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
    var horizontal=Math.random()<0.5;
    if(horizontal){
      var wl=20+Math.floor(Math.random()*30);
      var wx=wf.x+5+Math.floor(Math.random()*(Math.max(1,wf.w-wl-10)));
      var wy=wf.y+15+Math.floor(Math.random()*(Math.max(1,wf.h-30)));
      walls.push({x:wx,y:wy,w:wl,h:4,moving:isBoss&&Math.random()<0.5,moveDir:'h',moveRange:20,moveSpeed:0.5+Math.random()*0.5,movePhase:Math.random()*Math.PI*2});
    }else{
      var wl=20+Math.floor(Math.random()*30);
      var wx=wf.x+15+Math.floor(Math.random()*(Math.max(1,wf.w-30)));
      var wy=wf.y+5+Math.floor(Math.random()*(Math.max(1,wf.h-wl-10)));
      walls.push({x:wx,y:wy,w:4,h:wl,moving:isBoss&&Math.random()<0.5,moveDir:'v',moveRange:20,moveSpeed:0.5+Math.random()*0.5,movePhase:Math.random()*Math.PI*2});
    }
  }

  // Add lava (after hole 6)
  var lava=[];
  if(holeNum>6){
    var lavaCount=Math.floor(Math.random()*(1+Math.floor((holeNum-6)/3)));
    lavaCount=Math.min(lavaCount,3);
    for(var i=0;i<lavaCount;i++){
      var lf=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
      var lw=18+Math.floor(Math.random()*20);
      var lh=14+Math.floor(Math.random()*16);
      var lx=lf.x+10+Math.floor(Math.random()*(Math.max(1,lf.w-lw-20)));
      var ly=lf.y+10+Math.floor(Math.random()*(Math.max(1,lf.h-lh-20)));
      var dTeeL=Math.sqrt((lx+lw/2-teeX)*(lx+lw/2-teeX)+(ly+lh/2-teeY)*(ly+lh/2-teeY));
      var dHoleL=Math.sqrt((lx+lw/2-holeX)*(lx+lw/2-holeX)+(ly+lh/2-holeY)*(ly+lh/2-holeY));
      if(dTeeL>30&&dHoleL>25){
        lava.push({x:lx,y:ly,w:lw,h:lh});
      }
    }
  }

  // Add spikes (after hole 8)
  var spikes=[];
  if(holeNum>8){
    var spikeCount=Math.floor(Math.random()*(1+Math.floor((holeNum-8)/3)));
    spikeCount=Math.min(spikeCount,3);
    for(var i=0;i<spikeCount;i++){
      var sf2=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
      var spw=16+Math.floor(Math.random()*18);
      var sph=12+Math.floor(Math.random()*14);
      var spx=sf2.x+10+Math.floor(Math.random()*(Math.max(1,sf2.w-spw-20)));
      var spy=sf2.y+10+Math.floor(Math.random()*(Math.max(1,sf2.h-sph-20)));
      var dTeeS=Math.sqrt((spx+spw/2-teeX)*(spx+spw/2-teeX)+(spy+sph/2-teeY)*(spy+sph/2-teeY));
      var dHoleS=Math.sqrt((spx+spw/2-holeX)*(spx+spw/2-holeX)+(spy+sph/2-holeY)*(spy+sph/2-holeY));
      if(dTeeS>30&&dHoleS>25){
        spikes.push({x:spx,y:spy,w:spw,h:sph});
      }
    }
  }

  // Add portals (after hole 5)
  var portals=[];
  if(holeNum>5&&Math.random()<0.5){
    var pf1=fairways[1+Math.floor(Math.random()*(Math.max(1,fairways.length-2)))];
    var pf2idx=Math.min(fairways.length-1,Math.floor(fairways.length/2)+1+Math.floor(Math.random()*(Math.max(1,fairways.length/2-1))));
    var pf2p=fairways[pf2idx];
    var p1x=pf1.x+15+Math.floor(Math.random()*(Math.max(1,pf1.w-30)));
    var p1y=pf1.y+15+Math.floor(Math.random()*(Math.max(1,pf1.h-30)));
    var p2x=pf2p.x+15+Math.floor(Math.random()*(Math.max(1,pf2p.w-30)));
    var p2y=pf2p.y+15+Math.floor(Math.random()*(Math.max(1,pf2p.h-30)));
    portals.push({x1:p1x,y1:p1y,x2:p2x,y2:p2y,cooldown:0});
  }

  // Add windmills (after hole 4)
  var windmills=[];
  if(holeNum>4&&Math.random()<0.4+holeNum*0.02){
    var wmCount=1;
    if(holeNum>10)wmCount=Math.floor(Math.random()*2)+1;
    for(var i=0;i<wmCount;i++){
      var wf2=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
      var wmx=wf2.x+20+Math.floor(Math.random()*(Math.max(1,wf2.w-40)));
      var wmy=wf2.y+20+Math.floor(Math.random()*(Math.max(1,wf2.h-40)));
      var dTeeW=Math.sqrt((wmx-teeX)*(wmx-teeX)+(wmy-teeY)*(wmy-teeY));
      var dHoleW=Math.sqrt((wmx-holeX)*(wmx-holeX)+(wmy-holeY)*(wmy-holeY));
      if(dTeeW>35&&dHoleW>30){
        windmills.push({x:wmx,y:wmy,angle:Math.random()*Math.PI*2,speed:0.015+Math.random()*0.015,bladeLen:18+Math.floor(Math.random()*8)});
      }
    }
  }

  // Add decorations
  var decorations=[];
  var isDark=(holeNum>10)||(isMiniBoss)||(isBoss);
  for(var di=0;di<fairways.length;di++){
    var df=fairways[di];
    // Cherry blossom trees near course edges
    if(!isDark&&Math.random()<0.3){
      var tx=df.x-8+Math.floor(Math.random()*4);
      var ty=df.y+10+Math.floor(Math.random()*(Math.max(1,df.h-20)));
      decorations.push({type:'tree',x:tx,y:ty});
    }
    if(!isDark&&Math.random()<0.3){
      var tx2=df.x+df.w+4+Math.floor(Math.random()*4);
      var ty2=df.y+10+Math.floor(Math.random()*(Math.max(1,df.h-20)));
      decorations.push({type:'tree',x:tx2,y:ty2});
    }
    // Lanterns
    if(Math.random()<0.25){
      var lnx=df.x+5+Math.floor(Math.random()*(Math.max(1,df.w-10)));
      var lny=df.y+5+Math.floor(Math.random()*(Math.max(1,df.h-10)));
      decorations.push({type:'lantern',x:lnx,y:lny});
    }
    // Gravestones on dark holes
    if(isDark&&Math.random()<0.35){
      var gsx=df.x-10+Math.floor(Math.random()*6);
      var gsy=df.y+10+Math.floor(Math.random()*(Math.max(1,df.h-20)));
      decorations.push({type:'gravestone',x:gsx,y:gsy});
    }
    if(isDark&&Math.random()<0.3){
      var gsx2=df.x+df.w+4+Math.floor(Math.random()*6);
      var gsy2=df.y+10+Math.floor(Math.random()*(Math.max(1,df.h-20)));
      decorations.push({type:'gravestone',x:gsx2,y:gsy2});
    }
    // Flowers on lighter holes
    if(!isDark){
      var flowerCount=Math.floor(Math.random()*4);
      for(var fi=0;fi<flowerCount;fi++){
        var fx=df.x+3+Math.floor(Math.random()*(Math.max(1,df.w-6)));
        var fy=df.y+3+Math.floor(Math.random()*(Math.max(1,df.h-6)));
        var fc=['#ff6688','#ffaa44','#ffff66','#88ccff','#cc88ff'][Math.floor(Math.random()*5)];
        decorations.push({type:'flower',x:fx,y:fy,color:fc});
      }
    }
  }

  // Add enemies
  if(holeNum>5||isMiniBoss||isBoss){
    var enemyCount=Math.floor(Math.random()*(1+holeNum/5));
    if(isMiniBoss)enemyCount=Math.max(2,enemyCount);
    if(isBoss)enemyCount=Math.max(3,enemyCount);
    enemyCount=Math.min(enemyCount,5);
    var enemyTypes=['golem','slime','ghost','skull','mimic'];
    // Add new enemy types for higher holes
    if(holeNum>=8){
      enemyTypes.push('skeletonGolfer','mole','bat');
    }
    for(var i=0;i<enemyCount;i++){
      var ef=fairways[1+Math.floor(Math.random()*(fairways.length-1))];
      var ex=ef.x+15+Math.floor(Math.random()*(Math.max(1,ef.w-30)));
      var ey=ef.y+15+Math.floor(Math.random()*(Math.max(1,ef.h-30)));
      var dTee=Math.sqrt((ex-teeX)*(ex-teeX)+(ey-teeY)*(ey-teeY));
      var dHole=Math.sqrt((ex-holeX)*(ex-holeX)+(ey-holeY)*(ey-holeY));
      if(dTee>40&&dHole>30){
        var et=enemyTypes[Math.floor(Math.random()*enemyTypes.length)];
        if(holeNum<8)et=enemyTypes[Math.floor(Math.random()*3)]; // simpler enemies early
        enemies.push({
          x:ex,y:ey,type:et,
          originX:ex,originY:ey,
          vx:0,vy:0,
          phase:Math.random()*Math.PI*2,
          speed:0.3+Math.random()*0.4,
          hp:1,alive:true,anim:0,
          fireTimer:0,fireActive:false,
          moleVisible:true,moleTimer:Math.random()*120,
          swoopTimer:0,swooping:false,swoopY:0
        });
      }
    }
    // Dragon on boss holes only
    if(isBoss){
      var df=fairways[Math.max(1,Math.floor(fairways.length/2))];
      var drx=df.x+df.w/2;
      var dry=df.y+df.h/2;
      enemies.push({
        x:drx,y:dry,type:'dragon',
        originX:drx,originY:dry,
        vx:0,vy:0,
        phase:Math.random()*Math.PI*2,
        speed:0,
        hp:3,alive:true,anim:0,
        fireTimer:0,fireActive:false,fireZone:{x:0,y:0,w:0,h:0},
        moleVisible:true,moleTimer:0,
        swoopTimer:0,swooping:false,swoopY:0
      });
    }
  }

  // Add powerups (30% chance)
  if(Math.random()<0.35){
    var pf=fairways[Math.floor(Math.random()*fairways.length)];
    var px=pf.x+15+Math.floor(Math.random()*(Math.max(1,pf.w-30)));
    var py=pf.y+15+Math.floor(Math.random()*(Math.max(1,pf.h-30)));
    var pt=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
    pickups.push({x:px,y:py,type:pt,collected:false,anim:0});
  }

  // Scatter coins
  var coinCount=2+Math.floor(Math.random()*3)+Math.floor(holeNum/4);
  var luck=getUpgradeVal('luck');
  coinCount=Math.floor(coinCount*(1+luck));
  for(var i=0;i<coinCount;i++){
    var cf=fairways[Math.floor(Math.random()*fairways.length)];
    var ccx=cf.x+8+Math.floor(Math.random()*(Math.max(1,cf.w-16)));
    var ccy=cf.y+8+Math.floor(Math.random()*(Math.max(1,cf.h-16)));
    coinsList.push({x:ccx,y:ccy,collected:false,anim:Math.random()*Math.PI*2});
  }

  // Calculate par
  var par=2+Math.floor(segments*0.8)+Math.floor(enemies.length*0.3);
  par=Math.max(2,Math.min(5,par));
  if(isBoss)par=5;
  par+=parBonusTotal;

  return {
    teeX:teeX,teeY:teeY,holeX:holeX,holeY:holeY,
    fairways:fairways,walls:walls,obstacles:obstacles,
    enemies:enemies,pickups:pickups,coins:coinsList,
    lava:lava,spikes:spikes,portals:portals,windmills:windmills,decorations:decorations,
    par:par,totalHeight:totalH+40,isBoss:isBoss,isMiniBoss:isMiniBoss
  };
}

// Check if point is on fairway
function isOnFairway(px,py){
  if(!courseData)return false;
  for(var i=0;i<courseData.fairways.length;i++){
    var f=courseData.fairways[i];
    if(px>=f.x&&px<=f.x+f.w&&py>=f.y&&py<=f.y+f.h)return true;
  }
  return false;
}

// Check obstacle at point
function getObstacleAt(px,py){
  if(!courseData)return null;
  for(var i=0;i<courseData.obstacles.length;i++){
    var o=courseData.obstacles[i];
    if(o.type==='rock'){
      var dx=px-o.cx,dy=py-o.cy;
      if(dx*dx+dy*dy<o.r*o.r)return o;
    }else{
      if(px>=o.x&&px<=o.x+o.w&&py>=o.y&&py<=o.y+o.h)return o;
    }
  }
  return null;
}

// Start new run
function startRun(){
  currentHole=1;
  totalStrokes=0;
  trailParticles=[];
  lives=3;
  maxLives=3;
  coins=0;
  holeScores=[];
  holePars=[];
  powerups_active=[];
  upgrades_collected=[];
  parBonusTotal=0;
  mulliganUsed=false;
  // Character class effects at run start
  var ch=getSelectedCharacter();
  if(ch.ability==='extraLife'){
    lives=4;maxLives=4;
  }
  checkCharacterUnlocks();
  saveData();
  startHole();
}

function startHole(){
  if(currentHole>maxHoleReached){
    maxHoleReached=currentHole;
    checkCharacterUnlocks();
    saveData();
  }
  courseData=generateHole(currentHole);
  ballX=courseData.teeX;
  ballY=courseData.teeY;
  ballVX=0;ballVY=0;
  ballLastX=ballX;ballLastY=ballY;
  ballTrail=[];
  ballStopped=true;
  holeStrokes=0;
  strokesThisHole=0;
  mulliganUsed=false;
  charX=ballX-10;charY=ballY;charState='idle';charTimer=0;charFrame=0;
  targetCameraX=ballX-W/2;
  targetCameraY=ballY-H/2;
  cameraX=targetCameraX;
  cameraY=targetCameraY;
  isAiming=false;
  state=STATE_PLAY;
  particles=[];
}

// ---- PHYSICS ----
var ghostWallUsed=false;

function updateBall(dt){
  if(!ballStopped){
    var friction=0.982;
    var onSand=false;
    var onWater=false;

    // Check terrain
    var obs=getObstacleAt(ballX,ballY);
    if(obs){
      if(obs.type==='sand'){
        friction=0.92;
        onSand=true;
        if(Math.random()<0.3){
          particles.push({x:ballX,y:ballY,vx:(Math.random()-0.5)*1,vy:-Math.random()*1,life:20,color:'#c8a84e',size:2});
        }
      }
      if(obs.type==='water'){
        onWater=true;
      }
    }

    if(hasUpgrade('stickyGreen')&&isOnFairway(ballX,ballY)){
      friction=Math.min(friction,0.96);
    }

    // Active powerup effects
    var slowTime=false;
    for(var i=powerups_active.length-1;i>=0;i--){
      var pu=powerups_active[i];
      if(pu.type==='slowTime'){slowTime=true;pu.duration--;if(pu.duration<=0)powerups_active.splice(i,1);}
      if(pu.type==='bounceBall'){/* handled in bounce */}
      if(pu.type==='windShift'){
        var dx=courseData.holeX-ballX,dy=courseData.holeY-ballY;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d>1){ballVX+=dx/d*0.08;ballVY+=dy/d*0.08;}
        pu.duration--;if(pu.duration<=0)powerups_active.splice(i,1);
      }
      if(pu.type==='magnet'){
        var dx=courseData.holeX-ballX,dy=courseData.holeY-ballY;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d>1&&d<120){ballVX+=dx/d*0.15;ballVY+=dy/d*0.15;}
        pu.duration--;if(pu.duration<=0)powerups_active.splice(i,1);
      }
    }

    var speed=slowTime?0.5:1;

    ballX+=ballVX*speed;
    ballY+=ballVY*speed;
    ballVX*=friction;
    ballVY*=friction;

    // Trail
    if(Math.abs(ballVX)>0.5||Math.abs(ballVY)>0.5){
      ballTrail.push({x:ballX,y:ballY,life:30});
    }
    if(ballTrail.length>50)ballTrail.shift();

    // Water check
    if(onWater){
      sfxSplash();
      for(var i=0;i<12;i++){
        particles.push({x:ballX,y:ballY,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:30,color:'#4488cc',size:3});
      }
      ballX=ballLastX;ballY=ballLastY;
      ballVX=0;ballVY=0;
      ballStopped=true;
      holeStrokes++;
      totalStrokes++;
      charX=ballX-10;charY=ballY;
      return;
    }

    // Wall collisions (boundary = fairway edges)
    if(!isOnFairway(ballX,ballY)){
      // Check if ball went out of bounds entirely
      // Check if ball is inside ANY fairway (don't bounce at internal edges)
      var insideFairway=false;
      var nearFairway=false;
      var nearestDist=999,nearestNx=ballX,nearestNy=ballY;
      for(var i=0;i<courseData.fairways.length;i++){
        var f=courseData.fairways[i];
        if(ballX>=f.x&&ballX<=f.x+f.w&&ballY>=f.y&&ballY<=f.y+f.h){
          insideFairway=true;break;
        }
        var nx=Math.max(f.x,Math.min(f.x+f.w,ballX));
        var ny=Math.max(f.y,Math.min(f.y+f.h,ballY));
        var dd=Math.sqrt((ballX-nx)*(ballX-nx)+(ballY-ny)*(ballY-ny));
        if(dd<nearestDist){nearestDist=dd;nearestNx=nx;nearestNy=ny}
        if(dd<20)nearFairway=true;
      }
      if(insideFairway){nearFairway=true}
      else if(nearFairway&&nearestDist<15){
        // Ball is outside but close — push it back and bounce
        var pushX=nearestNx-ballX,pushY=nearestNy-ballY;
        var pushD=Math.sqrt(pushX*pushX+pushY*pushY);
        if(pushD>0.1){
          // Reflect velocity off the boundary
          var nx2=pushX/pushD,ny2=pushY/pushD;
          var dot=ballVX*nx2+ballVY*ny2;
          if(dot<0){ballVX-=2*dot*nx2*0.7;ballVY-=2*dot*ny2*0.7}
        }
        ballX=nearestNx;ballY=nearestNy;
        sfxBounce();
      }
      if(!nearFairway){
        // Out of bounds
        flashTimer=15;
        lives--;
        sfxHit();
        ballX=ballLastX;ballY=ballLastY;
        ballVX=0;ballVY=0;
        ballStopped=true;
        holeStrokes++;
        totalStrokes++;
        charX=ballX-10;charY=ballY;
        if(lives<=0){
          state=STATE_GAMEOVER;
          sfxGameOver();
        }
        return;
      }
    }

    // Inner wall collisions
    for(var i=0;i<courseData.walls.length;i++){
      var w=courseData.walls[i];
      var wx=w.x,wy=w.y,ww=w.w,wh=w.h;
      if(w.moving){
        var off=Math.sin(performance.now()*0.002*w.moveSpeed+w.movePhase)*w.moveRange;
        if(w.moveDir==='h')wx+=off;
        else wy+=off;
      }
      if(ballX>=wx&&ballX<=wx+ww&&ballY>=wy&&ballY<=wy+wh){
        if(hasUpgrade('ghostWall')&&!ghostWallUsed){
          ghostWallUsed=true;
          continue;
        }
        // Determine which side
        var overlapL=ballX-wx,overlapR=(wx+ww)-ballX;
        var overlapT=ballY-wy,overlapB=(wy+wh)-ballY;
        var minOverlap=Math.min(overlapL,overlapR,overlapT,overlapB);
        if(minOverlap===overlapL||minOverlap===overlapR)ballVX=-ballVX*0.7;
        else ballVY=-ballVY*0.7;
        if(minOverlap===overlapL)ballX=wx-1;
        else if(minOverlap===overlapR)ballX=wx+ww+1;
        else if(minOverlap===overlapT)ballY=wy-1;
        else ballY=wy+wh+1;
        sfxBounce();
      }
    }

    // Rock collisions
    for(var i=0;i<courseData.obstacles.length;i++){
      var o=courseData.obstacles[i];
      if(o.type==='rock'){
        var dx=ballX-o.cx,dy=ballY-o.cy;
        var dd=Math.sqrt(dx*dx+dy*dy);
        if(dd<o.r+3){
          if(hasUpgrade('ironBall')){
            // Destroy rock
            courseData.obstacles.splice(i,1);i--;
            particles.push({x:o.cx,y:o.cy,vx:0,vy:0,life:20,color:'#888',size:5});
            for(var j=0;j<6;j++){
              particles.push({x:o.cx,y:o.cy,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20,color:'#666',size:3});
            }
            sfxBounce();
            continue;
          }
          // Bounce off rock
          if(dd>0){
            ballX=o.cx+dx/dd*(o.r+4);
            ballY=o.cy+dy/dd*(o.r+4);
            var dot=ballVX*dx/dd+ballVY*dy/dd;
            ballVX-=2*dot*dx/dd;
            ballVY-=2*dot*dy/dd;
            ballVX*=0.7;ballVY*=0.7;
            // Check bounce powerup
            var bounceExtra=false;
            for(var p=0;p<powerups_active.length;p++){
              if(powerups_active[p].type==='bounceBall'&&powerups_active[p].duration>0){
                bounceExtra=true;
                powerups_active[p].duration--;
                ballVX/=0.7;ballVY/=0.7; // undo energy loss
              }
            }
          }
          sfxBounce();
        }
      }
    }

    // Enemy collisions
    for(var i=0;i<courseData.enemies.length;i++){
      var e=courseData.enemies[i];
      if(!e.alive)continue;
      var dx=ballX-e.x,dy=ballY-e.y;
      var dd=Math.sqrt(dx*dx+dy*dy);
      var hitDist=(e.type==='skull')?14:(e.type==='dragon')?16:10;
      if(dd<hitDist){
        if(e.type==='skull'){
          lives--;
          flashTimer=15;
          sfxHit();
          ballVX=-ballVX*0.5;ballVY=-ballVY*0.5;
          if(lives<=0){state=STATE_GAMEOVER;sfxGameOver();return;}
        }else if(e.type==='mimic'){
          lives--;
          flashTimer=15;
          sfxHit();
          e.alive=false;
          ballVX*=-0.3;ballVY*=-0.3;
          if(lives<=0){state=STATE_GAMEOVER;sfxGameOver();return;}
        }else if(e.type==='slime'){
          // Knock ball away
          if(dd>0){
            ballVX+=dx/dd*3;
            ballVY+=dy/dd*3;
          }
          sfxBounce();
        }else if(e.type==='golem'||e.type==='ghost'){
          // Block
          if(dd>0){
            ballVX=-ballVX*0.5;
            ballVY=-ballVY*0.5;
            ballX=e.x+dx/dd*12;
            ballY=e.y+dy/dd*12;
          }
          sfxBounce();
        }else if(e.type==='skeletonGolfer'){
          // Swings club, knocks ball away hard
          if(dd>0){
            ballVX+=dx/dd*5;
            ballVY+=dy/dd*5;
          }
          sfxHit();
          screenShake=5;
        }else if(e.type==='mole'){
          // Only damages when visible
          if(e.moleVisible){
            if(dd>0){
              ballVX+=dx/dd*4;
              ballVY+=dy/dd*4;
            }
            sfxHit();
            screenShake=4;
          }
        }else if(e.type==='dragon'){
          // Dragon body is a large obstacle, bounces ball hard
          if(dd>0){
            ballVX=-ballVX*0.6;
            ballVY=-ballVY*0.6;
            ballX=e.x+dx/dd*18;
            ballY=e.y+dy/dd*18;
          }
          e.hp--;
          if(e.hp<=0){e.alive=false;coins+=50;sfxPowerUp();}
          sfxHit();
          screenShake=6;
        }else if(e.type==='bat'){
          // Swooping bat knocks ball
          if(e.swooping){
            if(dd>0){
              ballVX+=dx/dd*3.5;
              ballVY+=dy/dd*3.5;
            }
            sfxHit();
          }else{
            // Not swooping, just gentle bump
            if(dd>0){
              ballVX+=dx/dd*1.5;
              ballVY+=dy/dd*1.5;
            }
            sfxBounce();
          }
        }
      }
      // Dragon fire zone check (separate from body collision)
      if(e.type==='dragon'&&e.fireActive&&e.fireZone){
        if(ballX>=e.fireZone.x&&ballX<=e.fireZone.x+e.fireZone.w&&
           ballY>=e.fireZone.y&&ballY<=e.fireZone.y+e.fireZone.h){
          lives--;
          flashTimer=15;
          sfxHit();
          screenShake=6;
          ballX=ballLastX;ballY=ballLastY;
          ballVX=0;ballVY=0;
          ballStopped=true;
          charX=ballX-10;charY=ballY;
          if(lives<=0){state=STATE_GAMEOVER;sfxGameOver();return;}
          return;
        }
      }
    }

    // Lava collision
    if(courseData.lava){
      for(var i=0;i<courseData.lava.length;i++){
        var lv=courseData.lava[i];
        if(ballX>=lv.x&&ballX<=lv.x+lv.w&&ballY>=lv.y&&ballY<=lv.y+lv.h){
          lives--;
          flashTimer=15;
          sfxHit();
          screenShake=6;
          for(var j=0;j<8;j++){
            particles.push({x:ballX,y:ballY-cameraY,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,life:25,color:'#ff6600',size:3});
          }
          ballX=ballLastX;ballY=ballLastY;
          ballVX=0;ballVY=0;
          ballStopped=true;
          charX=ballX-10;charY=ballY;
          if(lives<=0){state=STATE_GAMEOVER;sfxGameOver();return;}
          return;
        }
      }
    }

    // Spike collision
    if(courseData.spikes){
      for(var i=0;i<courseData.spikes.length;i++){
        var sp=courseData.spikes[i];
        if(ballX>=sp.x&&ballX<=sp.x+sp.w&&ballY>=sp.y&&ballY<=sp.y+sp.h){
          flashTimer=10;
          sfxHit();
          screenShake=4;
          for(var j=0;j<6;j++){
            particles.push({x:ballX,y:ballY-cameraY,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:20,color:'#ccccdd',size:2});
          }
          holeStrokes++;
          totalStrokes++;
          ballX=ballLastX;ballY=ballLastY;
          ballVX=0;ballVY=0;
          ballStopped=true;
          charX=ballX-10;charY=ballY;
          return;
        }
      }
    }

    // Portal collision
    if(courseData.portals){
      for(var i=0;i<courseData.portals.length;i++){
        var pt=courseData.portals[i];
        if(pt.cooldown>0){pt.cooldown--;continue;}
        var d1=Math.sqrt((ballX-pt.x1)*(ballX-pt.x1)+(ballY-pt.y1)*(ballY-pt.y1));
        var d2=Math.sqrt((ballX-pt.x2)*(ballX-pt.x2)+(ballY-pt.y2)*(ballY-pt.y2));
        if(d1<10){
          ballX=pt.x2;ballY=pt.y2;
          pt.cooldown=30;
          sfxPowerUp();
          for(var j=0;j<8;j++){
            particles.push({x:pt.x1,y:pt.y1-cameraY,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20,color:'#8844cc',size:2});
            particles.push({x:pt.x2,y:pt.y2-cameraY,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20,color:'#4466dd',size:2});
          }
        }else if(d2<10){
          ballX=pt.x1;ballY=pt.y1;
          pt.cooldown=30;
          sfxPowerUp();
          for(var j=0;j<8;j++){
            particles.push({x:pt.x2,y:pt.y2-cameraY,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20,color:'#8844cc',size:2});
            particles.push({x:pt.x1,y:pt.y1-cameraY,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:20,color:'#4466dd',size:2});
          }
        }
      }
    }

    // Windmill collision
    if(courseData.windmills){
      for(var i=0;i<courseData.windmills.length;i++){
        var wm=courseData.windmills[i];
        // Check each blade
        for(var b=0;b<4;b++){
          var bAng=wm.angle+b*Math.PI/2;
          // Blade is a line segment from center outward
          var bx1=wm.x+Math.cos(bAng)*4;
          var by1=wm.y+Math.sin(bAng)*4;
          var bx2=wm.x+Math.cos(bAng)*wm.bladeLen;
          var by2=wm.y+Math.sin(bAng)*wm.bladeLen;
          // Point-line distance
          var ldx=bx2-bx1,ldy=by2-by1;
          var len2=ldx*ldx+ldy*ldy;
          if(len2>0){
            var t=Math.max(0,Math.min(1,((ballX-bx1)*ldx+(ballY-by1)*ldy)/len2));
            var cx2=bx1+t*ldx,cy2=by1+t*ldy;
            var dist=Math.sqrt((ballX-cx2)*(ballX-cx2)+(ballY-cy2)*(ballY-cy2));
            if(dist<5){
              // Bounce off blade
              var nx=-(by2-by1),ny=(bx2-bx1);
              var nl=Math.sqrt(nx*nx+ny*ny);
              if(nl>0){nx/=nl;ny/=nl;}
              var dot=ballVX*nx+ballVY*ny;
              ballVX-=2*dot*nx;
              ballVY-=2*dot*ny;
              ballVX*=0.8;ballVY*=0.8;
              // Push ball out
              ballX=cx2+nx*6;
              ballY=cy2+ny*6;
              sfxBounce();
              break;
            }
          }
        }
        // Also check center block
        var cdist=Math.sqrt((ballX-wm.x)*(ballX-wm.x)+(ballY-wm.y)*(ballY-wm.y));
        if(cdist<6){
          var ndx=ballX-wm.x,ndy=ballY-wm.y;
          if(cdist>0){ndx/=cdist;ndy/=cdist;}
          ballVX=-ballVX*0.5;ballVY=-ballVY*0.5;
          ballX=wm.x+ndx*7;ballY=wm.y+ndy*7;
          sfxBounce();
        }
      }
    }

    // Coin collection
    var coinDist=12+getUpgradeVal('coinRange');
    for(var i=0;i<courseData.coins.length;i++){
      var c=courseData.coins[i];
      if(c.collected)continue;
      var dx=ballX-c.x,dy=ballY-c.y;
      if(dx*dx+dy*dy<coinDist*coinDist){
        c.collected=true;
        var amt=5+Math.floor(Math.random()*6);
        // Pirate bonus coins
        if(getSelectedCharacter().ability==='extraCoins')amt=Math.floor(amt*1.5);
        coins+=amt;
        sfxCoin();
        for(var j=0;j<5;j++){
          particles.push({x:c.x,y:c.y,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:20,color:'#ffdd44',size:2});
        }
      }
    }

    // Powerup collection
    for(var i=0;i<courseData.pickups.length;i++){
      var p=courseData.pickups[i];
      if(p.collected)continue;
      var dx=ballX-p.x,dy=ballY-p.y;
      if(dx*dx+dy*dy<14*14){
        p.collected=true;
        sfxPowerUp();
        totalPowerupsCollected++;
        checkCharacterUnlocks();
        for(var j=0;j<8;j++){
          particles.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:25,color:'#ffffff',size:3});
        }
        if(p.type==='extraLife'){
          lives=Math.min(lives+1,maxLives);
        }else if(p.type==='coins'){
          var coinAmt=15+Math.floor(Math.random()*20);
          if(getSelectedCharacter().ability==='extraCoins')coinAmt=Math.floor(coinAmt*1.5);
          coins+=coinAmt;
        }else{
          powerups_active.push({type:p.type,duration:1});
        }
      }
    }

    // Hole detection
    var hx=courseData.holeX,hy=courseData.holeY;
    var dx=ballX-hx,dy=ballY-hy;
    var dd=Math.sqrt(dx*dx+dy*dy);
    var spd=Math.sqrt(ballVX*ballVX+ballVY*ballVY);
    if(dd<8&&spd<4){
      // Sunk!
      ballX=hx;ballY=hy;
      ballVX=0;ballVY=0;
      ballStopped=true;
      sfxHoleSink();
      state=STATE_SINK;
      sinkTimer=120;
      holeScores.push(holeStrokes);
      holePars.push(courseData.par);
      // Celebration particles
      for(var i=0;i<20;i++){
        particles.push({x:hx,y:hy-cameraY,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,life:40,color:['#ffdd44','#ff4488','#44ff88','#4488ff'][Math.floor(Math.random()*4)],size:3});
      }
      charState='celebrate';charTimer=0;
      return;
    }

    // Stop check
    if(Math.abs(ballVX)<0.2&&Math.abs(ballVY)<0.2){
      ballVX=0;ballVY=0;
      ballStopped=true;
      ballLastX=ballX;ballLastY=ballY;
      charX=ballX-10;charY=ballY;
      charState='idle';charTimer=0;
      ghostWallUsed=false;

      // Check stroke limit
      if(holeStrokes>=courseData.par+3){
        lives--;
        flashTimer=15;
        sfxHit();
        if(lives<=0){state=STATE_GAMEOVER;sfxGameOver();return;}
      }
    }
  }
}

function updateEnemies(){
  if(!courseData)return;
  for(var i=0;i<courseData.enemies.length;i++){
    var e=courseData.enemies[i];
    if(!e.alive)continue;
    e.anim+=0.05;

    if(e.type==='golem'){
      e.x=e.originX+Math.sin(e.phase+performance.now()*0.001*e.speed)*25;
    }
    if(e.type==='slime'){
      e.phase+=0.03;
      e.x=e.originX+Math.sin(e.phase)*20;
      e.y=e.originY+Math.cos(e.phase*1.3)*15;
    }
    if(e.type==='ghost'){
      // Follow ball slowly
      var dx=ballX-e.x,dy=ballY-e.y;
      var dd=Math.sqrt(dx*dx+dy*dy);
      if(dd>5){
        e.x+=dx/dd*e.speed*0.6;
        e.y+=dy/dd*e.speed*0.6;
      }
    }
    // skull and mimic are stationary

    if(e.type==='skeletonGolfer'){
      // Patrols back and forth
      e.x=e.originX+Math.sin(e.phase+performance.now()*0.0008*e.speed)*30;
    }
    if(e.type==='dragon'){
      // Sits in one spot, breathes fire periodically
      e.fireTimer++;
      if(e.fireTimer>180&&!e.fireActive){
        e.fireActive=true;
        e.fireTimer=0;
        // Set fire zone in front of dragon
        e.fireZone={x:e.x-44,y:e.y-8,w:30,h:16};
      }
      if(e.fireActive){
        e.fireTimer++;
        if(e.fireTimer>60){
          e.fireActive=false;
          e.fireTimer=0;
        }
      }
    }
    if(e.type==='mole'){
      // Pops up and down on a timer
      e.moleTimer--;
      if(e.moleTimer<=0){
        e.moleVisible=!e.moleVisible;
        e.moleTimer=60+Math.floor(Math.random()*80);
      }
    }
    if(e.type==='bat'){
      // Flies in circles
      e.phase+=0.04;
      e.x=e.originX+Math.cos(e.phase)*25;
      e.y=e.originY+Math.sin(e.phase*1.5)*15;
      // Swoops at ball periodically
      e.swoopTimer++;
      if(!e.swooping&&e.swoopTimer>120){
        var dbat=Math.sqrt((ballX-e.x)*(ballX-e.x)+(ballY-e.y)*(ballY-e.y));
        if(dbat<60){
          e.swooping=true;
          e.swoopTimer=0;
          e.swoopY=0;
        }
      }
      if(e.swooping){
        e.swoopTimer++;
        if(e.swoopTimer<15)e.swoopY=e.swoopTimer*1.5;
        else if(e.swoopTimer<30)e.swoopY=(30-e.swoopTimer)*1.5;
        else{e.swooping=false;e.swoopTimer=0;e.swoopY=0;}
      }
    }
  }
}

// ---- DRAWING ----
function drawPixelRect(x,y,w,h,color){
  ctx.fillStyle=color;
  ctx.fillRect(Math.floor(x),Math.floor(y),Math.floor(w),Math.floor(h));
}

function drawCourse(){
  if(!courseData)return;
  var ox=cameraX,oy=cameraY;

  // Draw fairways (textured grass with stone borders)
  for(var i=0;i<courseData.fairways.length;i++){
    var f=courseData.fairways[i];
    var fx=f.x,fy=f.y,fw=f.w,fh=f.h;
    var dy=fy-oy;
    // Base grass - dark green
    ctx.fillStyle='#1a4a1a';
    ctx.fillRect(fx,dy,fw,fh);
    // Grass texture - lighter random dots (seeded for consistency)
    ctx.fillStyle='#2a6a2a';
    var gdots=Math.min(800,Math.floor(fw*fh/12));
    for(var gi=0;gi<gdots;gi++){
      var seed=(fx*31+fy*17+gi*53)&0xffff;
      var gx2=fx+(seed%fw);
      var gy2=dy+((seed*7+13)%fh);
      ctx.fillRect(gx2,gy2,1,1);
    }
    // Even lighter highlights
    ctx.fillStyle='#3a8a3a';
    var gdots2=Math.min(400,Math.floor(fw*fh/30));
    for(var gi=0;gi<gdots2;gi++){
      var seed=(fx*41+fy*23+gi*67)&0xffff;
      var gx2=fx+(seed%fw);
      var gy2=dy+((seed*11+7)%fh);
      ctx.fillRect(gx2,gy2,1,1);
    }
    // Stone border edges (2px thick)
    ctx.fillStyle='#404840';
    ctx.fillRect(fx,dy,fw,2);
    ctx.fillRect(fx,dy+fh-2,fw,2);
    ctx.fillRect(fx,dy,2,fh);
    ctx.fillRect(fx+fw-2,dy,2,fh);
    // Inner edge highlight
    ctx.fillStyle='#506050';
    ctx.fillRect(fx+2,dy+2,fw-4,1);
    ctx.fillRect(fx+2,dy+2,1,fh-4);
  }

  // Draw obstacles
  for(var i=0;i<courseData.obstacles.length;i++){
    var o=courseData.obstacles[i];
    if(o.type==='sand'){
      var sdx=o.x,sdy=o.y-oy,sw=o.w,sh=o.h;
      ctx.fillStyle='#c0a060';
      ctx.fillRect(sdx,sdy,sw,sh);
      // Sand grain texture (seeded)
      ctx.fillStyle='#d0b070';
      for(var si=0,smax=Math.min(400,Math.floor(sw*sh/6));si<smax;si++){
        var sseed=(o.x*37+o.y*23+si*41)&0xffff;
        ctx.fillRect(sdx+(sseed%sw),sdy+((sseed*11)%sh),1,1);
      }
      ctx.fillStyle='#a08848';
      for(var si=0,smax2=Math.min(200,Math.floor(sw*sh/15));si<smax2;si++){
        var sseed=(o.x*43+o.y*29+si*59)&0xffff;
        ctx.fillRect(sdx+(sseed%sw),sdy+((sseed*13)%sh),1,1);
      }
    }
    if(o.type==='water'){
      var wdx=o.x,wdy=o.y-oy,ww=o.w,wh=o.h;
      var wtime=performance.now()*0.001;
      ctx.fillStyle='#103050';
      ctx.fillRect(wdx,wdy,ww,wh);
      // Wave lines
      for(var wrow=0;wrow<wh;wrow+=4){
        for(var wcol=0;wcol<ww;wcol++){
          var wave=Math.sin((wcol+wtime*40)*0.15+wrow*0.3)*1.5;
          if(Math.abs(wave)<0.5){
            ctx.fillStyle='#2060a0';
            ctx.fillRect(wdx+wcol,wdy+wrow+Math.floor(wave),1,1);
          }
        }
      }
    }
    if(o.type==='rock'){
      ctx.fillStyle='#556666';
      ctx.beginPath();
      ctx.arc(o.cx,o.cy-oy,o.r,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#667777';
      ctx.beginPath();
      ctx.arc(o.cx-1,o.cy-1-oy,o.r-2,0,Math.PI*2);
      ctx.fill();
      // Highlight
      drawPixelRect(o.cx-o.r/3,o.cy-o.r/2-oy,3,2,'#88aaaa');
    }
  }

  // Draw lava (animated glowing)
  if(courseData.lava){
    var ltime=performance.now()*0.001;
    for(var i=0;i<courseData.lava.length;i++){
      var lv=courseData.lava[i];
      var lx=lv.x,ly=lv.y-oy,lw=lv.w,lh=lv.h;
      // Dark lava base
      ctx.fillStyle='#401000';
      ctx.fillRect(lx,ly,lw,lh);
      // Glowing center
      var lglow=0.4+Math.sin(ltime*3)*0.2;
      ctx.fillStyle='rgba(255,80,0,'+lglow+')';
      ctx.fillRect(lx+2,ly+2,lw-4,lh-4);
      // Bright cracks (seeded)
      ctx.fillStyle='#ff6000';
      for(var lci=0;lci<5;lci++){
        var lseed=(lv.x*31+lv.y*17+lci*53)&0xffff;
        var crx=lx+2+(lseed%(Math.max(1,lw-4)));
        var cry=ly+2+((lseed*7)%(Math.max(1,lh-4)));
        ctx.fillRect(crx,cry,2,1);
        ctx.fillRect(crx+1,cry+1,1,2);
      }
      // Bubbles (animated)
      ctx.fillStyle='#ff8020';
      var bubX2=lx+3+Math.floor(Math.sin(ltime*2+lv.x)*3+lw/2);
      var bubY2=ly+3+Math.floor(Math.cos(ltime*1.5+lv.y)*2+lh/2);
      if(bubX2>lx&&bubX2<lx+lw-2&&bubY2>ly&&bubY2<ly+lh-2){
        ctx.fillRect(bubX2,bubY2,2,2);
      }
    }
  }

  // Draw spikes
  if(courseData.spikes){
    for(var i=0;i<courseData.spikes.length;i++){
      var sp=courseData.spikes[i];
      var spx=sp.x,spy=sp.y-oy,spw=sp.w,sph=sp.h;
      ctx.fillStyle='#333340';
      ctx.fillRect(spx,spy,spw,sph);
      ctx.fillStyle='#555565';
      ctx.fillRect(spx+1,spy+1,spw-2,sph-2);
      ctx.fillStyle='#ccccdd';
      var spikeW=4;
      for(var sx=spx+2;sx<spx+spw-2;sx+=spikeW+1){
        ctx.beginPath();
        ctx.moveTo(sx,spy+sph-2);
        ctx.lineTo(sx+spikeW/2,spy+2);
        ctx.lineTo(sx+spikeW,spy+sph-2);
        ctx.fill();
      }
    }
  }

  // Draw hole (flag) - pixel art style
  var hx=courseData.holeX,hy=courseData.holeY-oy;
  // Hole shadow ring
  ctx.fillStyle='#0a200a';
  for(var hpx=-8;hpx<=8;hpx++){
    var hrh=Math.floor(8*Math.sqrt(1-hpx*hpx/65));
    if(hrh>0) ctx.fillRect(hx+hpx,hy-hrh,1,hrh*2+1);
  }
  // Inner hole (darker)
  ctx.fillStyle='#040804';
  for(var hpx=-5;hpx<=5;hpx++){
    var hrh=Math.floor(5*Math.sqrt(1-hpx*hpx/26));
    if(hrh>0) ctx.fillRect(hx+hpx,hy-hrh,1,hrh*2+1);
  }
  // Flag pole
  ctx.fillStyle='#806040';
  ctx.fillRect(hx,hy-24,2,24);
  // Flag (red triangle with wave)
  var fwave=Math.sin(Date.now()*0.003)*1;
  ctx.fillStyle='#e03030';
  for(var fyi=0;fyi<8;fyi++){
    var fwi=8-fyi;
    ctx.fillRect(hx+2,hy-24+fyi+Math.floor(fwave),fwi,1);
  }
  // Flag highlight
  ctx.fillStyle='#f05050';
  ctx.fillRect(hx+3,hy-23+Math.floor(fwave),3,2);

  // Draw decorations
  if(courseData.decorations){
    for(var i=0;i<courseData.decorations.length;i++){
      var dec=courseData.decorations[i];
      var dcx=dec.x,dcy=dec.y-oy;
      if(dcy<-30||dcy>H+30)continue;
      if(dec.type==='tree'){
        // Trunk (pixel art)
        ctx.fillStyle='#604020';
        ctx.fillRect(dcx-1,dcy-4,3,8);
        // Canopy (pink pixel circle)
        ctx.fillStyle='#e080a0';
        for(var tpx=-5;tpx<=5;tpx++){
          var trh=Math.floor(5*Math.sqrt(1-tpx*tpx/26));
          if(trh>0) ctx.fillRect(dcx+tpx,dcy-10-trh,1,trh*2);
        }
        // Highlight
        ctx.fillStyle='#f0a0c0';
        ctx.fillRect(dcx-2,dcy-13,3,2);
        // Falling petals (animated)
        var ttime=Date.now()*0.001;
        ctx.fillStyle='#f0a0c0';
        for(var tp=0;tp<3;tp++){
          var tpxp=dcx+Math.sin(ttime+tp*2)*8;
          var tpyp=dcy-5+((ttime*15+tp*30)%20);
          ctx.fillRect(Math.floor(tpxp),Math.floor(tpyp),1,1);
        }
      }
      if(dec.type==='lantern'){
        // Pole
        ctx.fillStyle='#404040';
        ctx.fillRect(dcx,dcy-6,1,6);
        // Lamp body
        ctx.fillStyle='#f0a030';
        ctx.fillRect(dcx-2,dcy-9,5,4);
        // Glow (animated)
        ctx.globalAlpha=0.15+Math.sin(Date.now()*0.003)*0.05;
        ctx.fillStyle='#f0a030';
        for(var lgx=-6;lgx<=6;lgx++){
          var lgh=Math.floor(6*Math.sqrt(1-lgx*lgx/37));
          if(lgh>0) ctx.fillRect(dcx+lgx,dcy-8-lgh,1,lgh*2);
        }
        ctx.globalAlpha=1;
      }
      if(dec.type==='gravestone'){
        // Stone base
        ctx.fillStyle='#484858';
        ctx.fillRect(dcx-3,dcy-8,7,10);
        // Lighter face
        ctx.fillStyle='#586068';
        ctx.fillRect(dcx-2,dcy-7,5,8);
        // Rounded top highlight
        ctx.fillStyle='#687078';
        ctx.fillRect(dcx-1,dcy-8,3,1);
        // Cross carving
        ctx.fillStyle='#3a3a4a';
        ctx.fillRect(dcx,dcy-6,1,4);
        ctx.fillRect(dcx-1,dcy-5,3,1);
        // Moss at base
        ctx.fillStyle='#2a4a2a';
        ctx.fillRect(dcx-3,dcy+1,2,1);
        ctx.fillRect(dcx+3,dcy,2,1);
      }
      if(dec.type==='flower'){
        // Stem
        ctx.fillStyle='#2a7a2a';
        ctx.fillRect(dcx,dcy+2,1,3);
        // Petals
        ctx.fillStyle=dec.color;
        ctx.fillRect(dcx-1,dcy,3,1);
        ctx.fillRect(dcx,dcy-1,1,3);
        // Center
        ctx.fillStyle='#ffee66';
        ctx.fillRect(dcx,dcy,1,1);
      }
    }
  }

  // Draw inner walls (textured stone)
  for(var i=0;i<courseData.walls.length;i++){
    var w=courseData.walls[i];
    var wx=w.x,wy=w.y;
    if(w.moving){
      var off=Math.sin(performance.now()*0.002*w.moveSpeed+w.movePhase)*w.moveRange;
      if(w.moveDir==='h')wx+=off;
      else wy+=off;
    }
    var wdx2=wx,wdy2=wy-oy,www=w.w,wwh=w.h;
    // Stone base
    ctx.fillStyle='#484848';
    ctx.fillRect(wdx2,wdy2,www,wwh);
    // Lighter stone highlights (seeded)
    ctx.fillStyle='#585858';
    for(var wi2=0,wmax=Math.min(300,Math.floor(www*wwh/8));wi2<wmax;wi2++){
      var wseed=(Math.floor(wx)*37+Math.floor(wy)*19+wi2*43)&0xffff;
      ctx.fillRect(wdx2+(wseed%www),wdy2+((wseed*7)%wwh),2,1);
    }
    // Top edge highlight
    ctx.fillStyle='#686868';
    ctx.fillRect(wdx2,wdy2,www,1);
    // Bottom shadow
    ctx.fillStyle='#303030';
    ctx.fillRect(wdx2,wdy2+wwh-1,www,1);
  }

  // Draw portals
  if(courseData.portals){
    var ptime=performance.now()*0.003;
    for(var i=0;i<courseData.portals.length;i++){
      var pt=courseData.portals[i];
      for(var pi=0;pi<2;pi++){
        var ppx=pi===0?pt.x1:pt.x2;
        var ppy=(pi===0?pt.y1:pt.y2)-oy;
        for(var a=0;a<6;a++){
          var ang=ptime+a*Math.PI/3+pi*Math.PI;
          var r=8+Math.sin(ptime*2+a)*2;
          var sx2=ppx+Math.cos(ang)*r;
          var sy2=ppy+Math.sin(ang)*r;
          ctx.fillStyle=a%2===0?'#8844cc':'#4466dd';
          ctx.fillRect(Math.floor(sx2)-1,Math.floor(sy2)-1,3,3);
        }
        ctx.fillStyle='rgba(140,80,220,0.5)';
        ctx.beginPath();ctx.arc(ppx,ppy,6,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(200,150,255,0.6)';
        ctx.beginPath();ctx.arc(ppx,ppy,3,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Draw windmills
  if(courseData.windmills){
    for(var i=0;i<courseData.windmills.length;i++){
      var wm=courseData.windmills[i];
      var wmx=wm.x,wmy=wm.y-oy;
      drawPixelRect(wmx-4,wmy-4,8,8,'#666677');
      drawPixelRect(wmx-3,wmy-3,6,6,'#777788');
      drawPixelRect(wmx-1,wmy-1,2,2,'#888899');
      var bladeW=3,bladeLen=wm.bladeLen;
      for(var b=0;b<4;b++){
        var bAng=wm.angle+b*Math.PI/2;
        var bx1=wmx+Math.cos(bAng)*4;
        var by1=wmy+Math.sin(bAng)*4;
        var bx2=wmx+Math.cos(bAng)*bladeLen;
        var by2=wmy+Math.sin(bAng)*bladeLen;
        ctx.strokeStyle='#aa8855';
        ctx.lineWidth=bladeW;
        ctx.beginPath();
        ctx.moveTo(bx1,by1);
        ctx.lineTo(bx2,by2);
        ctx.stroke();
        ctx.lineWidth=1;
      }
    }
  }

  // Draw enemies
  for(var i=0;i<courseData.enemies.length;i++){
    var e=courseData.enemies[i];
    if(!e.alive)continue;
    var ex=e.x,ey=e.y-oy;

    // Map enemy type to sprite
    var enemySprite='en_sl'; // default slime
    if(e.type==='golem'||e.type==='rock_golem') enemySprite='en_kn';
    else if(e.type==='slime') enemySprite='en_sl';
    else if(e.type==='ghost') enemySprite='en_mi';
    else if(e.type==='skull') enemySprite='en_horn';
    else if(e.type==='mimic') enemySprite='en_mi';
    else if(e.type==='skeletonGolfer') enemySprite='skeleton';
    else if(e.type==='dragon') enemySprite='dragon';
    else if(e.type==='mole') enemySprite='mole';
    else if(e.type==='bat') enemySprite='bat';
    else if(e.type==='knight') enemySprite='en_kn';
    else if(e.type==='fire_golem') enemySprite='firegolem';
    else if(e.type==='spiked_ball') enemySprite='en_horn';

    // Ghost transparency
    if(e.type==='ghost'){
      ctx.globalAlpha=0.6+Math.sin(e.anim*2)*0.2;
    }
    // Skull danger zone indicator
    if(e.type==='skull'){
      ctx.fillStyle='rgba(255,50,50,0.15)';
      ctx.beginPath();ctx.arc(ex,ey,14,0,Math.PI*2);ctx.fill();
    }
    // Mole: only draw sprite when visible, otherwise just dirt mound
    if(e.type==='mole'){
      if(e.moleVisible){
        drawSP(enemySprite, Math.floor(ex-7), Math.floor(ey-7), 2, e.dir<0);
        // Dirt mound
        ctx.fillStyle='#664422';
        ctx.beginPath();ctx.arc(ex,ey+5,7,Math.PI,0);ctx.fill();
      }else{
        // Just a dirt mound
        ctx.fillStyle='#664422';
        ctx.beginPath();ctx.arc(ex,ey+5,7,Math.PI,0);ctx.fill();
        ctx.fillStyle='#553311';
        ctx.beginPath();ctx.arc(ex,ey+5,5,Math.PI,0);ctx.fill();
      }
    }else if(e.type==='bat'){
      var batY2=ey+(e.swooping?e.swoopY:0);
      drawSP(enemySprite, Math.floor(ex-7), Math.floor(batY2-7), 2, e.dir<0);
    }else{
      drawSP(enemySprite, Math.floor(ex-7), Math.floor(ey-7), 2, e.dir<0);
    }
    // Reset ghost alpha
    if(e.type==='ghost'){
      ctx.globalAlpha=1;
    }
    // Dragon fire breath effect (keep)
    if(e.type==='dragon'&&e.fireActive){
      var fLen=30+Math.sin(e.anim*8)*5;
      for(var fi=0;fi<fLen;fi+=3){
        var fSpread=fi*0.3;
        var fy2=ey-2+Math.sin(e.anim*10+fi)*fSpread;
        var fx2=ex-14-fi;
        var fc=fi<fLen/2?'#ff6600':'#ff3300';
        if(fi<fLen/3)fc='#ffcc00';
        ctx.fillStyle=fc;
        ctx.fillRect(fx2,fy2-1,3,3);
      }
      if(e.fireZone){
        ctx.fillStyle='rgba(255,80,0,0.15)';
        ctx.fillRect(e.fireZone.x,e.fireZone.y-oy,e.fireZone.w,e.fireZone.h);
      }
    }
  }

  // Draw coins
  for(var i=0;i<courseData.coins.length;i++){
    var c=courseData.coins[i];
    if(c.collected)continue;
    c.anim+=0.05;
    var cs=Math.abs(Math.sin(c.anim))*3+2;
    drawPixelRect(c.x-cs/2,c.y-cs/2-oy,cs,cs,'#ffdd44');
    drawPixelRect(c.x-1,c.y-1-oy,2,2,'#ffee88');
  }

  // Draw powerups
  for(var i=0;i<courseData.pickups.length;i++){
    var p=courseData.pickups[i];
    if(p.collected)continue;
    p.anim+=0.05;
    var bob=Math.sin(p.anim)*3;
    var px=p.x,py=p.y+bob-oy;
    // Glow
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.arc(px,py,10,0,Math.PI*2);ctx.fill();
    // Draw using sprites: coins use chest, others use potion
    if(p.type==='coins'){
      drawSP('chest', Math.floor(px-7), Math.floor(py-6), 2, false);
    }else{
      drawSP('potion', Math.floor(px-5), Math.floor(py-6), 2, false);
    }
  }
}

function drawCharacter(){
  var ox=cameraX,oy=cameraY;
  if(ballStopped){charX=ballX-16;charY=ballY}
  var cx=Math.floor(charX-ox),cy=Math.floor(charY-oy);
  charTimer++;
  if(charState==='swing'){
    drawSP('golfer',cx,cy-30,2,false);
    if(charTimer>18){charState='idle';charTimer=0}
  }else if(charState==='celebrate'){
    var bounce=Math.abs(Math.sin(charTimer*0.15))*6;
    drawSP('golfer',cx,cy-32-bounce,2,false);
  }else{
    drawSP('golfer',cx,cy-30,2,false);
  }
}

function updateTrailParticles(){
  var skin=getSelectedSkin();
  // Spawn trail particles when ball is moving
  if(!ballStopped&&skin.trail&&(Math.abs(ballVX)>0.3||Math.abs(ballVY)>0.3)){
    var t=skin.trail;
    if(t==='fire'){
      trailParticles.push({x:ballX+(Math.random()-0.5)*3,y:ballY+(Math.random()-0.5)*3,
        vx:(Math.random()-0.5)*0.5,vy:-Math.random()*1.5,life:18,maxLife:18,
        color:Math.random()<0.5?'#ff6600':'#ff3300',size:2+Math.floor(Math.random()*2),type:'fire'});
    }else if(t==='ice'){
      trailParticles.push({x:ballX+(Math.random()-0.5)*2,y:ballY+(Math.random()-0.5)*2,
        vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,life:22,maxLife:22,
        color:'#88ddff',size:1+Math.floor(Math.random()*2),type:'ice'});
    }else if(t==='lightning'){
      if(Math.random()<0.4){
        trailParticles.push({x:ballX,y:ballY,
          vx:-ballVX*0.3+(Math.random()-0.5)*2,vy:-ballVY*0.3+(Math.random()-0.5)*2,
          life:10,maxLife:10,color:'#ffee00',size:1,type:'lightning'});
      }
    }else if(t==='rainbow'){
      var hue=(Date.now()/5)%360;
      trailParticles.push({x:ballX+(Math.random()-0.5)*3,y:ballY+(Math.random()-0.5)*3,
        vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:20,maxLife:20,
        color:'hsl('+hue+',100%,60%)',size:2,type:'rainbow'});
    }else if(t==='smoke'){
      trailParticles.push({x:ballX+(Math.random()-0.5)*3,y:ballY+(Math.random()-0.5)*3,
        vx:(Math.random()-0.5)*0.3,vy:-Math.random()*0.8,life:25,maxLife:25,
        color:Math.random()<0.5?'#333344':'#222233',size:2+Math.floor(Math.random()*2),type:'smoke'});
    }else if(t==='sparkle'){
      if(Math.random()<0.6){
        trailParticles.push({x:ballX+(Math.random()-0.5)*4,y:ballY+(Math.random()-0.5)*4,
          vx:(Math.random()-0.5)*1,vy:-Math.random()*1,life:16,maxLife:16,
          color:Math.random()<0.5?'#ffd700':'#fff8cc',size:1+Math.floor(Math.random()*2),type:'sparkle'});
      }
    }
  }
  // Update existing trail particles
  for(var i=trailParticles.length-1;i>=0;i--){
    var p=trailParticles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.life--;
    if(p.type==='fire')p.vy-=0.05;
    if(p.type==='smoke')p.size=Math.min(4,p.size+0.02);
    if(p.life<=0){trailParticles.splice(i,1);}
  }
  if(trailParticles.length>80)trailParticles.splice(0,trailParticles.length-80);
}

function drawBall(){
  var ox=cameraX,oy=cameraY;
  var bx=Math.floor(ballX-ox),by=Math.floor(ballY-oy);
  var skin=getSelectedSkin();

  // Draw default trail
  for(var i=0;i<ballTrail.length;i++){
    var t=ballTrail[i];
    var a=t.life/30;
    ctx.fillStyle='rgba(255,255,255,'+a*0.3+')';
    ctx.fillRect(Math.floor(t.x-ox)-1,Math.floor(t.y-oy)-1,2,2);
  }

  // Draw skin trail particles
  for(var i=0;i<trailParticles.length;i++){
    var tp=trailParticles[i];
    var a=tp.life/tp.maxLife;
    ctx.globalAlpha=a;
    if(tp.type==='lightning'){
      // Zigzag line to ball
      ctx.strokeStyle=tp.color;
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(tp.x),Math.floor(tp.y-oy));
      var mx=(tp.x+ballX)/2+(Math.random()-0.5)*4;
      var my=(tp.y+ballY)/2+(Math.random()-0.5)*4;
      ctx.lineTo(Math.floor(mx),Math.floor(my-oy));
      ctx.lineTo(bx,by);
      ctx.stroke();
      ctx.lineWidth=1;
    }else{
      ctx.fillStyle=tp.color;
      ctx.fillRect(Math.floor(tp.x)-tp.size/2,Math.floor(tp.y-oy)-tp.size/2,tp.size,tp.size);
    }
    ctx.globalAlpha=1;
  }

  // Ball shadow
  drawPixelRect(bx-3,by+1,6,3,'rgba(0,0,0,0.3)');

  // Ball glow for certain skins
  if(skin.trail==='fire'){
    ctx.fillStyle='rgba(255,120,0,0.25)';
    ctx.beginPath();ctx.arc(bx,by-1,6,0,Math.PI*2);ctx.fill();
  }else if(skin.trail==='ice'){
    ctx.fillStyle='rgba(80,200,255,0.2)';

    ctx.fillStyle='rgba(255,200,0,0.2)';

  }

  // Visibility ring (so ball stands out against grass)
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(var rx=-8;rx<=8;rx++){var rh=Math.floor(8*Math.sqrt(1-rx*rx/65));ctx.fillRect(bx+rx,by-rh,1,rh*2+1)}

  // Ball sprite
  var ballSprite='gb_w';
  if(skin.id==='fire') ballSprite='gb_f';
  else if(skin.id==='ice') ballSprite='gb_b';
  else if(skin.id==='rainbow') ballSprite='gb_rb';
  else if(skin.id==='skull_ball') ballSprite='ball_skull';
  else if(skin.id==='star') ballSprite='gb_au';
  drawSP(ballSprite, bx-6, by-6, 1, false);
}

function drawAimLine(){
  if(!isAiming)return;
  var ox=cameraX,oy=cameraY;
  var dx=aimStartX-aimEndX;
  var dy=aimStartY-aimEndY;
  var dist=Math.sqrt(dx*dx+dy*dy);
  var maxDist=150;
  var power=Math.min(1,dist/maxDist);

  // Dotted line from ball in aim direction
  var angle=Math.atan2(dy,dx);
  var lineLen=power*120;
  for(var i=0;i<lineLen;i+=6){
    var px=ballX+Math.cos(angle)*i;
    var py=ballY-oy+Math.sin(angle)*i;
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.fillRect(Math.floor(px)-1,Math.floor(py)-1,2,2);
  }

  // Trajectory preview if has upgrade
  if(hasUpgrade('trajectory')&&lineLen>10){
    var simX=ballX,simY=ballY;
    var pMult=1+getUpgradeVal('power');
    var simVX=Math.cos(angle)*power*8*pMult;
    var simVY=Math.sin(angle)*power*8*pMult;
    for(var s=0;s<60;s++){
      simX+=simVX;simY+=simVY;
      simVX*=0.982;simVY*=0.982;
      if(s%3===0){
        ctx.fillStyle='rgba(255,200,100,0.3)';
        ctx.fillRect(Math.floor(simX)-1,Math.floor(simY-oy)-1,2,2);
      }
    }
  }

  // Power bar
  var barX=20,barY=H-70,barW=W-40,barH=12;
  drawPixelRect(barX-1,barY-1,barW+2,barH+2,'#222222');
  drawPixelRect(barX,barY,barW,barH,'#111111');
  var fillW=barW*power;
  var fillCol=power<0.4?'#44cc44':power<0.7?'#cccc44':'#cc4444';
  drawPixelRect(barX,barY,fillW,barH,fillCol);

  ctx.fillStyle='#ffffff';
  ctx.font='8px monospace';
  ctx.textAlign='center';
  ctx.fillText('POWER: '+Math.floor(power*100)+'%',W/2,barY+barH+12);
}

function drawParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.1;
    p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    var a=p.life/40;
    ctx.globalAlpha=a;
    drawPixelRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size,p.color);
    ctx.globalAlpha=1;
  }
}

  var cols=Math.min(9,holeScores.length);
  var cw=28;
  var startX=W/2-(cols*cw)/2;

  // Header
  for(var row=0;row<Math.ceil(holeScores.length/9);row++){
    var ry=startY+row*40;
    var start=row*9;
    var end=Math.min(start+9,holeScores.length);

    for(var i=start;i<end;i++){
      var x=startX+(i-start)*cw+cw/2;
      ctx.fillStyle='#666677';
      ctx.fillText(''+(i+1),x,ry);
      ctx.fillStyle='#444455';
      ctx.fillText('P'+holePars[i],x,ry+10);
      var s=holeScores[i];
      var d=s-holePars[i];
      ctx.fillStyle=d<0?'#44ff88':d>0?'#ff4444':'#ffffff';
      ctx.fillText(''+s,x,ry+22);
    }
  }
}

function drawFinalScorecard(){
  ctx.fillStyle='#0a0a18';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#ffcc22';
  ctx.font='bold 20px monospace';
  ctx.textAlign='center';
  ctx.fillText('COURSE COMPLETE!',W/2,50);

  var diff=totalStrokes-getTotalPar();
  var diffStr=diff===0?'E':(diff>0?'+'+diff:''+diff);
  ctx.fillStyle=diff<0?'#44ff88':diff>0?'#ff4444':'#ffffff';
  ctx.font='bold 16px monospace';
  ctx.fillText('FINAL: '+diffStr+' ('+totalStrokes+' strokes)',W/2,85);

  ctx.fillStyle='#ffdd44';
  ctx.font='10px monospace';
  ctx.fillText('Coins: $'+coins,W/2,110);

  if(bestScore!==null){
    var bs=bestScore===0?'E':(bestScore>0?'+'+bestScore:''+bestScore);
    ctx.fillStyle='#888899';
    ctx.fillText('Personal Best: '+bs,W/2,130);
  }

  drawScorecard(160);

  // Upgrades used
  if(upgrades_collected.length>0){
    ctx.fillStyle='#888899';
    ctx.font='8px monospace';
    ctx.fillText('UPGRADES USED:',W/2,340);
    for(var i=0;i<upgrades_collected.length;i++){
      var u=upgrades_collected[i];
      ctx.fillStyle=RARITY_COLORS[u.rarity]||'#ffffff';
      ctx.fillText(u.name,W/2,355+i*12);
    }
  }

  // Play again
  var by=H-70;
  drawPixelRect(W/2-70,by,140,36,'#ffcc22');
  drawPixelRect(W/2-68,by+2,136,32,'#332200');
  ctx.fillStyle='#ffcc22';
  ctx.font='bold 12px monospace';
  ctx.textAlign='center';
  ctx.fillText('PLAY AGAIN',W/2,by+23);
}

function drawTransition(){
  ctx.fillStyle='rgba(0,0,0,'+transOverlayAlpha+')';
  ctx.fillRect(0,0,W,H);
}

// ---- INPUT ----
var touchStartX=0,touchStartY=0;
var touchActive=false;

function canvasToGame(clientX,clientY){
  var rect=canvas.getBoundingClientRect();
  return{
    x:(clientX-rect.left)/SCALE,
    y:(clientY-rect.top)/SCALE
  };
}

function handleTouchStart(gx,gy){
  initAudio();

  if(state===STATE_TITLE){
    if(titlePage===0){
      // Start button (y=170 to 206)
      if(gy>=170&&gy<=206&&gx>=W/2-80&&gx<=W/2+80){
        startRun();
        return;
      }
      // Characters button (x=20..170, y=340..372)
      if(gx>=20&&gx<=170&&gy>=340&&gy<=372){
        titlePage=1;
        return;
      }
      // Ball Skins button (x=190..340, y=340..372)
      if(gx>=190&&gx<=340&&gy>=340&&gy<=372){
        titlePage=2;
        return;
      }
      // Character cards row (y=390..436)
      if(gy>=390&&gy<=436){
        for(var ci=0;ci<CHARACTERS.length;ci++){
          var ccX=30+ci*85;
          if(gx>=ccX&&gx<=ccX+74&&CHARACTERS[ci].unlocked){
            selectedCharacter=ci;
            saveData();
            return;
          }
        }
      }
    }else if(titlePage===1){
      // Back button
      if(gy>=H-65&&gy<=H-35&&gx>=W/2-50&&gx<=W/2+50){
        titlePage=0;
        return;
      }
      // Character cards
      for(var ci=0;ci<CHARACTERS.length;ci++){
        var cardY=60+ci*130;
        if(gy>=cardY&&gy<=cardY+115&&gx>=30&&gx<=W-30){
          if(CHARACTERS[ci].unlocked){
            selectedCharacter=ci;
            saveData();
          }
          return;
        }
      }
    }else if(titlePage===2){
      // Back button
      if(gy>=H-65&&gy<=H-35&&gx>=W/2-50&&gx<=W/2+50){
        titlePage=0;
        return;
      }
      // Skin cards
      for(var si=0;si<BALL_SKINS.length;si++){
        var sCardY=66+si*62;
        if(gy>=sCardY&&gy<=sCardY+54&&gx>=20&&gx<=W-20){
          var sk=BALL_SKINS[si];
          var isUnlocked=(unlockedSkins.indexOf(sk.id)>=0);
          if(isUnlocked){
            selectedSkin=si;
            saveData();
          }else if(totalCoinsEver>=sk.cost){
            totalCoinsEver-=sk.cost;
            unlockedSkins.push(sk.id);
            selectedSkin=si;
            saveData();
            sfxCoin();
          }
          return;
        }
      }
    }
    return;
  }

  if(state===STATE_GAMEOVER){
    if(gy>H-80){
      totalCoinsEver+=coins;
      checkCharacterUnlocks();
      saveData();
      state=STATE_TITLE;
      titlePage=0;
    }
    return;
  }

  if(state===STATE_SCORECARD){
    if(gy>H-80){
      state=STATE_TITLE;
      titlePage=0;
    }
    return;
  }

  if(state===STATE_SHOP){
    // Check card taps
    for(var i=0;i<shopCards.length;i++){
      var cy=140+i*135;
      if(gy>=cy&&gy<=cy+110&&gx>=W/2-130&&gx<=W/2+130){
        if(shopSelected===i){
          // Buy
          var cost=getCardCost(shopCards[i]);
          if(coins>=cost){
            coins-=cost;
            var card=shopCards[i];
            upgrades_collected.push(card);
            if(card.effect==='maxLife'){maxLives+=card.val;lives=Math.min(lives+1,maxLives);}
            if(card.effect==='parBonus'){parBonusTotal+=card.val;}
            sfxPowerUp();
            shopSelected=-1;
            // Next hole
            currentHole++;
            if(currentHole>18){
              finishRun();
            }else{
              doTransition(function(){startHole();});
            }
            return;
          }
        }else{
          shopSelected=i;
          sfxShop();
        }
        return;
      }
    }
    // Skip
    if(gy>H-60&&gx>W/2-50&&gx<W/2+50){
      shopSelected=-1;
      currentHole++;
      if(currentHole>18){
        finishRun();
      }else{
        doTransition(function(){startHole();});
      }
    }
    return;
  }

  if(state===STATE_PLAY&&ballStopped){
    // Check mulligan
    if(hasUpgrade('mulligan')&&!mulliganUsed&&holeStrokes>0){
      var dx=gx-ballX,dy=(gy+cameraY)-ballY;
      if(dx*dx+dy*dy<20*20){
        // Use mulligan - but only on ball tap, not aim start
        // Actually let's use a long press for mulligan to not conflict
      }
    }

    // Start aiming
    aimStartX=gx;
    aimStartY=gy;
    aimEndX=gx;
    aimEndY=gy;
    isAiming=true;
    touchActive=true;
    state=STATE_AIM;
  }
}

function handleTouchMove(gx,gy){
  if(state===STATE_AIM&&touchActive){
    aimEndX=gx;
    aimEndY=gy;
  }
}

function handleTouchEnd(gx,gy){
  if(state===STATE_AIM&&touchActive){
    touchActive=false;
    isAiming=false;

    var dx=aimStartX-aimEndX;
    var dy=aimStartY-aimEndY;
    var dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<10){
      // Too short, cancel
      state=STATE_PLAY;
      // Check mulligan on tap
      if(hasUpgrade('mulligan')&&!mulliganUsed&&holeStrokes>0){
        var bDx=gx-ballX,bDy=(gy+cameraY)-ballY;
        if(bDx*bDx+bDy*bDy<25*25){
          mulliganUsed=true;
          holeStrokes--;
          totalStrokes--;
          sfxPowerUp();
        }
      }
      return;
    }

    // Shoot!
    var maxDist=150;
    var power=Math.min(1,dist/maxDist);
    var angle=Math.atan2(dy,dx);

    var pMult=1+getUpgradeVal('power');

    // Power shot powerup
    for(var i=powerups_active.length-1;i>=0;i--){
      if(powerups_active[i].type==='powerShot'){
        pMult*=2;
        powerups_active.splice(i,1);
      }
    }

    var speed=power*8*pMult;
    // Knight has slower shots
    if(getSelectedCharacter().ability==='extraLife')speed*=0.85;
    ballVX=Math.cos(angle)*speed;
    ballVY=Math.sin(angle)*speed;
    ballStopped=false;
    ballLastX=ballX;
    ballLastY=ballY;
    holeStrokes++;
    totalStrokes++;
    strokesThisHole++;
    ghostWallUsed=false;

    // Set active powerup durations for this shot
    for(var i=0;i<powerups_active.length;i++){
      var pu=powerups_active[i];
      if(pu.type==='magnet'){pu.duration=200;if(getSelectedCharacter().ability==='extendMagnet')pu.duration=400;}
      if(pu.type==='slowTime')pu.duration=200;
      if(pu.type==='bounceBall')pu.duration=3+Math.floor(getUpgradeVal('bounces'));
      if(pu.type==='windShift')pu.duration=200;
    }

    charState='swing';charTimer=0;
    sfxPutt(power);
    if(power>0.8)screenShake=8;

    state=STATE_ROLLING;
    ballTrail=[];
  }
}

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0];
  var p=canvasToGame(t.clientX,t.clientY);
  handleTouchStart(p.x,p.y);
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  var t=e.touches[0];
  var p=canvasToGame(t.clientX,t.clientY);
  handleTouchMove(p.x,p.y);
},{passive:false});
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  var t=e.changedTouches[0];
  var p=canvasToGame(t.clientX,t.clientY);
  handleTouchEnd(p.x,p.y);
},{passive:false});

// Mouse support
var mouseDown=false;
canvas.addEventListener('mousedown',function(e){
  var p=canvasToGame(e.clientX,e.clientY);
  mouseDown=true;
  handleTouchStart(p.x,p.y);
});
canvas.addEventListener('mousemove',function(e){
  if(!mouseDown)return;
  var p=canvasToGame(e.clientX,e.clientY);
  handleTouchMove(p.x,p.y);
});
canvas.addEventListener('mouseup',function(e){
  var p=canvasToGame(e.clientX,e.clientY);
  mouseDown=false;
  handleTouchEnd(p.x,p.y);
});

var transPhase='done'; // 'in' = fade to black, 'out' = fade from black
var transOverlayAlpha=0;
var prevStateBeforeTrans=0;
function doTransition(cb){
  transitionTimer=0;
  transPhase='in';
  transOverlayAlpha=0;
  transitionCallback=cb;
  prevStateBeforeTrans=state;
  state=STATE_TRANSITION;
}

function finishRun(){
  var diff=totalStrokes-getTotalPar();
  if(bestScore===null||diff<bestScore){
    bestScore=diff;
  }
  totalCoinsEver+=coins;
  // Unlock balls based on total coins
  var ballKeys=Object.keys(BALL_COST);
  for(var i=0;i<ballKeys.length;i++){
    if(totalCoinsEver>=BALL_COST[ballKeys[i]]&&unlockedBalls.indexOf(ballKeys[i])<0){
      unlockedBalls.push(ballKeys[i]);
    }
  }
  saveData();
  state=STATE_SCORECARD;
}

function openShop(){
  // Pick 3 random upgrades
  shopCards=[];
  var pool=UPGRADES.slice();
  // Shuffle
  for(var i=pool.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=pool[i];pool[i]=pool[j];pool[j]=t;
  }
  // Weight by luck
  var luck=getUpgradeVal('luck');
  if(luck>0){
    // Sort rare to front with some probability
    pool.sort(function(a,b){
      var ra={common:1,uncommon:2,rare:3,legendary:4};
      if(Math.random()<luck)return (ra[b.rarity]||0)-(ra[a.rarity]||0);
      return 0;
    });
  }
  shopCards=pool.slice(0,3);
  shopSelected=-1;
  state=STATE_SHOP;
  sfxShop();
}

// ---- MAIN LOOP ----
function update(){
  // Transition overlay
  if(transPhase==='in'){
    transitionTimer++;
    transOverlayAlpha=Math.min(1,transitionTimer/30);
    if(transitionTimer>=30){
      if(transitionCallback){transitionCallback();transitionCallback=null;}
      transPhase='out';
      transitionTimer=0;
    }else{
      return; // Pause game during fade-in
    }
  }
  if(transPhase==='out'){
    transitionTimer++;
    transOverlayAlpha=Math.max(0,1-transitionTimer/30);
    if(transitionTimer>=30){
      transPhase='done';
      transOverlayAlpha=0;
    }
  }

  // Trail decay
  for(var i=ballTrail.length-1;i>=0;i--){
    ballTrail[i].life--;
    if(ballTrail[i].life<=0)ballTrail.splice(i,1);
  }

  // Update windmill angles
  if(courseData&&courseData.windmills){
    for(var i=0;i<courseData.windmills.length;i++){
      courseData.windmills[i].angle+=courseData.windmills[i].speed;
    }
  }

  // Update ball trail effects
  updateTrailParticles();

  if(state===STATE_ROLLING){
    updateBall(1);
    updateEnemies();

    if(ballStopped&&state===STATE_ROLLING){
      state=STATE_PLAY;
    }

    // Camera follow ball
    targetCameraY=Math.max(0,ballY-H*0.5);
    targetCameraY=Math.min(courseData.totalHeight-H+60,targetCameraY);
    targetCameraY=Math.max(0,targetCameraY);
  }

  if(state===STATE_AIM){
    targetCameraY=Math.max(0,ballY-H*0.5);
    targetCameraY=Math.min(courseData.totalHeight-H+60,targetCameraY);
    targetCameraY=Math.max(0,targetCameraY);
    updateEnemies();
  }

  if(state===STATE_PLAY){
    targetCameraY=Math.max(0,ballY-H*0.5);
    targetCameraY=Math.min(courseData.totalHeight-H+60,targetCameraY);
    targetCameraY=Math.max(0,targetCameraY);
    updateEnemies();
  }

  if(state===STATE_SINK){
    sinkTimer--;
    if(sinkTimer<=0){
      // Check if shop (every 3 holes)
      if(currentHole%3===0&&currentHole<18){
        openShop();
      }else{
        currentHole++;
        if(currentHole>18){
          finishRun();
        }else{
          doTransition(function(){startHole();});
        }
      }
    }
  }

  // Smooth camera - center on ball
  targetCameraX=ballX-W/2;
  targetCameraY=ballY-H*0.35;
  cameraX+=(targetCameraX-cameraX)*0.08;
  cameraY+=(targetCameraY-cameraY)*0.08;

  // Screen shake decay
  if(screenShake>0)screenShake*=0.85;
  if(screenShake<0.5)screenShake=0;

  // Flash decay
  if(flashTimer>0)flashTimer--;
}

function draw(){
  ctx.save();

  // Screen shake
  if(screenShake>0){
    ctx.translate((Math.random()-0.5)*screenShake,(Math.random()-0.5)*screenShake);
  }

  if(state===STATE_TITLE){
    drawTitle();
    ctx.restore();
    return;
  }

  if(state===STATE_GAMEOVER){
    drawGameOver();
    ctx.restore();
    return;
  }

  if(state===STATE_SCORECARD){
    drawFinalScorecard();
    ctx.restore();
    return;
  }

  if(state===STATE_SHOP){
    drawShop();
    ctx.restore();
    return;
  }

  // Night sky background with gradient
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#080818');
  grad.addColorStop(0.3,'#0a0a20');
  grad.addColorStop(1,'#0c0c14');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Twinkling stars (fixed position, don't scroll)
  var time=Date.now()*0.001;
  ctx.fillStyle='#ffffff';
  for(var s=0;s<50;s++){
    var sx=(s*73+17)%W;
    var sy=(s*47+31)%H;
    var twinkle=Math.sin(time*2+s*0.7);
    ctx.globalAlpha=0.3+twinkle*0.3;
    ctx.fillRect(sx,sy,1,1);
    if(s<10)ctx.fillRect(sx+1,sy,1,1);
  }
  ctx.globalAlpha=1;

  // Crescent moon (top right area)
  ctx.fillStyle='#e8e0b0';
  for(var mx=-6;mx<=6;mx++){
    var mh2=Math.floor(6*Math.sqrt(1-mx*mx/37));
    for(var my=-mh2;my<=mh2;my++){
      ctx.fillRect(W-40+mx,30+my,1,1);
    }
  }
  ctx.fillStyle='#080818';
  for(var mx=-6;mx<=6;mx++){
    var mh2=Math.floor(6*Math.sqrt(1-mx*mx/37));
    for(var my=-mh2;my<=mh2;my++){
      ctx.fillRect(W-37+mx,28+my,1,1);
    }
  }

  if(courseData){
    drawCourse();
    drawCharacter();
    drawBall();
  }

  drawAimLine();
  drawParticles();

  if(courseData)drawHUD();

  // Flash effect
  if(flashTimer>0){
    ctx.fillStyle='rgba(255,50,50,'+flashTimer/15*0.4+')';
    ctx.fillRect(0,0,W,H);
  }

  // Sink message
  if(state===STATE_SINK&&sinkTimer>60){
    var diff=holeScores[holeScores.length-1]-holePars[holePars.length-1];
    var msg='';
    if(diff<=-2)msg='EAGLE!';
    else if(diff===-1)msg='BIRDIE!';
    else if(diff===0)msg='PAR';
    else if(diff===1)msg='BOGEY';
    else msg='+'+diff;

    if(holeScores[holeScores.length-1]===1)msg='HOLE IN ONE!!';

    ctx.fillStyle='rgba(0,0,0,0.6)';
    drawPixelRect(W/2-80,H/2-30,160,50,'rgba(0,0,0,0.7)');
    ctx.fillStyle=diff<=0?'#ffcc22':'#ffffff';
    ctx.font='bold 18px monospace';
    ctx.textAlign='center';
    ctx.fillText(msg,W/2,H/2);
  }

  // Transition overlay
  if(transOverlayAlpha>0){
    drawTransition();
  }

  ctx.restore();
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();

})();
</script>
