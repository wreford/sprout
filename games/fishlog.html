<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Fish Catch Log</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#121e12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#d4d8c8;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#121e12;--bg2:#1a2e1a;--bg3:#243424;--accent:#3a6e3a;--accent2:#4a8e4a;
  --gold:#c8a848;--text:#d4d8c8;--text2:#a0a890;--danger:#c04030;--card:#1e2e1e;
  --radius:10px;--shadow:0 2px 8px rgba(0,0,0,0.4);
}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
a{color:var(--accent2);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;outline:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* Header */
.header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header .back{color:var(--text2);font-size:14px;padding:6px 0}
.header h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.header .menu-btn{background:none;color:var(--text2);font-size:20px;padding:6px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}

/* Main content area */
.main{flex:1;overflow-y:auto;padding:12px 12px 100px;-webkit-overflow-scrolling:touch}

/* New Catch button */
.new-catch-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:17px;font-weight:700;padding:14px 32px;border-radius:28px;box-shadow:0 4px 16px rgba(58,110,58,0.5);z-index:90;min-width:180px;text-align:center;letter-spacing:0.5px}
.new-catch-btn:active{background:var(--accent2);transform:translateX(-50%) scale(0.96)}

/* Tab bar */
.tab-bar{display:flex;gap:4px;margin-bottom:14px;background:var(--bg2);border-radius:var(--radius);padding:4px;position:sticky;top:0;z-index:50}
.tab-bar button{flex:1;background:none;color:var(--text2);font-size:13px;font-weight:600;padding:10px 6px;border-radius:7px;transition:background 0.15s,color 0.15s;min-height:44px}
.tab-bar button.active{background:var(--accent);color:#fff}

/* Stats cards */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--bg3);border-radius:var(--radius);padding:14px 12px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--gold)}
.stat-card .label{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.stat-card.wide{grid-column:1/-1}

/* PB table */
.pb-section{margin-top:16px}
.pb-section h3{font-size:14px;color:var(--gold);margin-bottom:8px;padding-left:4px}
.pb-table{width:100%;border-collapse:collapse;font-size:13px}
.pb-table th{text-align:left;padding:8px;color:var(--text2);border-bottom:1px solid var(--bg3);font-weight:600}
.pb-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.pb-table tr:last-child td{border-bottom:none}

/* Monthly chart */
.chart-section{margin-top:20px}
.chart-section h3{font-size:14px;color:var(--gold);margin-bottom:10px;padding-left:4px}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 4px;border-bottom:1px solid var(--bg3)}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar-col .bar{width:100%;min-width:12px;background:var(--accent);border-radius:4px 4px 0 0;transition:height 0.3s}
.bar-col .bar-label{font-size:9px;color:var(--text2);margin-top:4px}
.bar-col .bar-val{font-size:9px;color:var(--gold)}

/* Catch cards */
.catch-list{display:flex;flex-direction:column;gap:10px}
.catch-card{background:var(--card);border:1px solid var(--bg3);border-radius:var(--radius);overflow:hidden;display:flex;gap:0}
.catch-card .thumb{width:100px;min-width:100px;height:100px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.catch-card .thumb.placeholder{display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:11px}
.catch-card .info{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:3px;min-width:0}
.catch-card .species{font-size:15px;font-weight:700;color:#fff}
.catch-card .details{font-size:12px;color:var(--text2)}
.catch-card .location{font-size:12px;color:var(--accent2)}
.catch-card .date{font-size:11px;color:var(--text2);margin-top:auto}

/* Gallery grid */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.gallery-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer}
.gallery-item img{width:100%;height:100%;object-fit:cover}
.gallery-item .overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.7));padding:4px 6px;font-size:10px;color:#fff}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.filter-bar select,.filter-bar button{background:var(--bg3);color:var(--text);border:1px solid var(--accent);border-radius:6px;padding:8px 12px;font-size:13px;min-height:40px}
.filter-bar select{flex:1;min-width:0}

/* Detail overlay */
.overlay-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch}
.overlay-panel.open{display:flex;flex-direction:column}
.overlay-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bg3);position:sticky;top:0;background:var(--bg);z-index:10}
.overlay-header h2{font-size:17px;color:var(--gold)}
.overlay-header button{background:none;color:var(--text2);font-size:16px;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center}
.overlay-body{flex:1;padding:16px;overflow-y:auto}

/* Detail view */
.detail-photo{width:100%;max-height:50vh;object-fit:contain;background:#000;border-radius:var(--radius);margin-bottom:16px}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px}
.detail-row .lbl{color:var(--text2)}
.detail-row .val{color:#fff;font-weight:600;text-align:right;max-width:60%}
.detail-notes{margin-top:12px;padding:12px;background:var(--bg2);border-radius:8px;font-size:13px;color:var(--text2);line-height:1.5}
.detail-actions{display:flex;gap:10px;margin-top:20px;padding-bottom:20px}
.detail-actions button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;min-height:48px}
.btn-edit{background:var(--accent);color:#fff}
.btn-delete{background:var(--danger);color:#fff}
.btn-share{background:var(--bg3);color:var(--text);border:1px solid var(--accent)}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;font-size:15px;font-family:inherit;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);outline:none}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.photo-capture{width:100%;aspect-ratio:4/3;background:var(--bg3);border:2px dashed var(--accent);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;overflow:hidden;position:relative}
.photo-capture img,.photo-capture video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.photo-capture canvas{display:none}
.photo-capture .prompt{text-align:center;color:var(--text2);font-size:14px;z-index:1}
.photo-capture .prompt .icon{font-size:32px;display:block;margin-bottom:4px}
.gps-btn{background:var(--bg3);color:var(--accent2);border:1px solid var(--accent);border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;min-height:44px;white-space:nowrap}
.gps-btn:active{background:var(--accent);color:#fff}
.save-btn{width:100%;background:var(--accent);color:#fff;font-size:17px;font-weight:700;padding:16px;border-radius:12px;margin-top:8px;min-height:56px}
.save-btn:active{background:var(--accent2)}
.save-btn:disabled{opacity:0.5;cursor:default}
.camera-controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:5}
.camera-controls button{background:rgba(255,255,255,0.9);color:#222;width:56px;height:56px;border-radius:50%;font-size:13px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.camera-controls button:active{background:#fff;transform:scale(0.95)}

/* Export overlay */
.export-options{display:flex;flex-direction:column;gap:10px}
.export-options button{background:var(--bg3);color:var(--text);border:1px solid var(--accent);border-radius:8px;padding:14px;font-size:14px;font-weight:600;text-align:left;min-height:48px}
.export-options button:active{background:var(--accent);color:#fff}

/* Storage warning */
.storage-warning{background:rgba(192,64,48,0.15);border:1px solid var(--danger);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;color:#e8a8a0;display:none}

/* Confirm dialog */
.confirm-dialog{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-dialog.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-box p{margin-bottom:20px;font-size:15px}
.confirm-box .btns{display:flex;gap:10px}
.confirm-box .btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;min-height:48px}
.btn-cancel{background:var(--bg3);color:var(--text)}
.btn-confirm{background:var(--danger);color:#fff}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg3);color:var(--text);padding:12px 24px;border-radius:8px;font-size:14px;border:1px solid var(--accent);z-index:500;opacity:0;transition:transform 0.3s,opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px;line-height:1.6}
</style>
</head>
<body>

<div class="header">
  <a href="../index.html" class="back">Back</a>
  <h1>FISH CATCH LOG</h1>
  <button class="menu-btn" id="menuBtn" aria-label="Menu">...</button>
</div>

<div class="main" id="mainContent">
  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="active" data-tab="home">Home</button>
    <button data-tab="gallery">Gallery</button>
    <button data-tab="stats">Stats</button>
  </div>

  <div id="storageWarning" class="storage-warning">
    Storage is getting full. Consider exporting and clearing old entries.
  </div>

  <!-- HOME TAB -->
  <div id="tabHome">
    <div class="stats-grid" id="quickStats"></div>
    <h3 style="font-size:14px;color:var(--gold);margin:16px 0 10px 4px">Recent Catches</h3>
    <div class="catch-list" id="recentList"></div>
  </div>

  <!-- GALLERY TAB -->
  <div id="tabGallery" style="display:none">
    <div class="filter-bar">
      <select id="filterSpecies"><option value="">All Species</option></select>
      <select id="filterSort">
        <option value="date-desc">Newest</option>
        <option value="date-asc">Oldest</option>
        <option value="weight-desc">Heaviest</option>
        <option value="weight-asc">Lightest</option>
      </select>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>

  <!-- STATS TAB -->
  <div id="tabStats" style="display:none">
    <div class="stats-grid" id="fullStats"></div>
    <div class="chart-section">
      <h3>Fish Per Month</h3>
      <div class="bar-chart" id="monthChart"></div>
    </div>
    <div class="pb-section">
      <h3>Personal Bests</h3>
      <table class="pb-table" id="pbTable">
        <thead><tr><th>Species</th><th>Weight</th><th>Length</th><th>Date</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div style="margin-top:20px">
      <button class="export-btn" onclick="openExport()" style="width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--accent);border-radius:8px;padding:14px;font-size:14px;font-weight:600;min-height:48px">Export Data</button>
    </div>
  </div>
</div>

<button class="new-catch-btn" id="newCatchBtn">+ NEW CATCH</button>

<!-- NEW / EDIT CATCH OVERLAY -->
<div class="overlay-panel" id="catchForm">
  <div class="overlay-header">
    <button onclick="closeCatchForm()">Cancel</button>
    <h2 id="formTitle">New Catch</h2>
    <div style="width:44px"></div>
  </div>
  <div class="overlay-body">
    <div class="form-group">
      <label>Photo</label>
      <div class="photo-capture" id="photoCapture" onclick="handlePhotoClick()">
        <img id="photoPreview" style="display:none"/>
        <video id="cameraPreview" autoplay playsinline style="display:none"></video>
        <canvas id="photoCanvas"></canvas>
        <div class="prompt" id="photoPrompt">
          <span class="icon">[camera]</span>
          Tap to take photo or choose from gallery
        </div>
        <div class="camera-controls" id="cameraControls" style="display:none">
          <button onclick="event.stopPropagation();capturePhoto()">SNAP</button>
          <button onclick="event.stopPropagation();stopCamera()">X</button>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none"/>
    </div>
    <div class="form-group">
      <label>Species</label>
      <select id="fSpecies"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Weight (lbs)</label>
        <input type="number" id="fWeightLbs" min="0" max="200" step="1" placeholder="0" inputmode="numeric"/>
      </div>
      <div class="form-group">
        <label>Weight (oz)</label>
        <input type="number" id="fWeightOz" min="0" max="15" step="1" placeholder="0" inputmode="numeric"/>
      </div>
    </div>
    <div class="form-group">
      <label>Length (inches)</label>
      <input type="number" id="fLength" min="0" max="120" step="0.25" placeholder="0" inputmode="decimal"/>
    </div>
    <div class="form-group">
      <label>Location</label>
      <div style="display:flex;gap:8px">
        <input type="text" id="fLocation" placeholder="e.g. Lake Simcoe" style="flex:1"/>
        <button class="gps-btn" onclick="getGPS()">GPS</button>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="fDate"/>
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="fTime"/>
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="Lure, technique, conditions..."></textarea>
    </div>
    <input type="hidden" id="fLat"/>
    <input type="hidden" id="fLng"/>
    <input type="hidden" id="fEditId"/>
    <button class="save-btn" id="saveBtn" onclick="saveCatch()">SAVE CATCH</button>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay-panel" id="detailPanel">
  <div class="overlay-header">
    <button onclick="closeDetail()">Back</button>
    <h2 id="detailTitle">Catch Details</h2>
    <div style="width:44px"></div>
  </div>
  <div class="overlay-body" id="detailBody"></div>
</div>

<!-- EXPORT OVERLAY -->
<div class="overlay-panel" id="exportPanel">
  <div class="overlay-header">
    <button onclick="closeExport()">Back</button>
    <h2>Export Data</h2>
    <div style="width:44px"></div>
  </div>
  <div class="overlay-body">
    <div class="export-options">
      <button onclick="exportCSV()">Export as CSV (no photos)</button>
      <button onclick="exportJSON()">Export as JSON (with photos)</button>
      <button onclick="copyStats()">Copy Stats to Clipboard</button>
      <button onclick="clearAllData()" style="border-color:var(--danger);color:var(--danger)">Clear All Data</button>
    </div>
  </div>
</div>

<!-- MENU OVERLAY -->
<div class="overlay-panel" id="menuPanel">
  <div class="overlay-header">
    <button onclick="closeMenu()">Back</button>
    <h2>Menu</h2>
    <div style="width:44px"></div>
  </div>
  <div class="overlay-body">
    <div class="export-options">
      <button onclick="closeMenu();openExport()">Export / Import</button>
      <button onclick="closeMenu();importJSON()">Import JSON Backup</button>
      <button onclick="closeMenu();showStorageInfo()">Storage Info</button>
    </div>
  </div>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-dialog" id="confirmDialog">
  <div class="confirm-box">
    <p id="confirmMsg">Are you sure?</p>
    <div class="btns">
      <button class="btn-cancel" onclick="closeConfirm(false)">Cancel</button>
      <button class="btn-confirm" id="confirmOk">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<input type="file" id="importInput" accept=".json" style="display:none"/>

<script>
// --- Species List ---
const SPECIES = [
  'Walleye','Northern Pike','Smallmouth Bass','Largemouth Bass',
  'Lake Trout','Rainbow Trout','Brown Trout','Brook Trout',
  'Yellow Perch','Muskie','Channel Catfish','Crappie',
  'Bluegill/Sunfish','Rock Bass','Whitefish','Burbot',
  'Drum','Carp','Sturgeon','Other'
];

// --- State ---
let catches = [];
let currentStream = null;
let confirmResolve = null;
let currentPhotoData = null;
let editingId = null;

// --- Init ---
function init() {
  loadData();
  populateSpeciesDropdowns();
  renderHome();
  checkStorage();
  setupTabs();
  document.getElementById('newCatchBtn').onclick = () => openCatchForm();
  document.getElementById('menuBtn').onclick = () => openMenu();
  document.getElementById('fileInput').onchange = handleFileSelect;
  document.getElementById('importInput').onchange = handleImport;
}

function loadData() {
  try {
    const raw = localStorage.getItem('fishlog_catches');
    catches = raw ? JSON.parse(raw) : [];
  } catch (e) {
    catches = [];
  }
}

function saveData() {
  try {
    localStorage.setItem('fishlog_catches', JSON.stringify(catches));
  } catch (e) {
    toast('Storage full! Export and clear old entries.');
  }
}

function checkStorage() {
  try {
    const used = new Blob([localStorage.getItem('fishlog_catches') || '']).size;
    const approxMax = 5 * 1024 * 1024;
    const ratio = used / approxMax;
    document.getElementById('storageWarning').style.display = ratio > 0.8 ? 'block' : 'none';
  } catch (e) {}
}

// --- Species Dropdowns ---
function populateSpeciesDropdowns() {
  const formSel = document.getElementById('fSpecies');
  const filterSel = document.getElementById('filterSpecies');
  formSel.innerHTML = '';
  SPECIES.forEach(s => {
    formSel.appendChild(new Option(s, s));
  });
  filterSel.innerHTML = '<option value="">All Species</option>';
  SPECIES.forEach(s => {
    filterSel.appendChild(new Option(s, s));
  });
  filterSel.onchange = () => renderGallery();
  document.getElementById('filterSort').onchange = () => renderGallery();
}

// --- Tabs ---
function setupTabs() {
  document.querySelectorAll('.tab-bar button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('tabHome').style.display = tab === 'home' ? '' : 'none';
      document.getElementById('tabGallery').style.display = tab === 'gallery' ? '' : 'none';
      document.getElementById('tabStats').style.display = tab === 'stats' ? '' : 'none';
      if (tab === 'gallery') renderGallery();
      if (tab === 'stats') renderStats();
      if (tab === 'home') renderHome();
    });
  });
}

// --- Rendering: Home ---
function renderHome() {
  renderQuickStats();
  renderRecentList();
}

function renderQuickStats() {
  const el = document.getElementById('quickStats');
  const total = catches.length;
  const totalWeight = catches.reduce((s, c) => s + getWeightLbs(c), 0);
  const biggest = catches.length > 0 ? catches.reduce((a, b) => getWeightLbs(a) > getWeightLbs(b) ? a : b) : null;
  const now = new Date();
  const thisMonth = catches.filter(c => {
    const d = new Date(c.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  el.innerHTML = `
    <div class="stat-card"><div class="val">${total}</div><div class="label">Total Fish</div></div>
    <div class="stat-card"><div class="val">${thisMonth}</div><div class="label">This Month</div></div>
    <div class="stat-card"><div class="val">${totalWeight.toFixed(1)}</div><div class="label">Total Lbs</div></div>
    <div class="stat-card"><div class="val">${biggest ? biggest.species.split(' ')[0] : '--'}</div><div class="label">${biggest ? getWeightLbs(biggest).toFixed(1) + ' lb Best' : 'Best Catch'}</div></div>
  `;
}

function renderRecentList() {
  const el = document.getElementById('recentList');
  const sorted = [...catches].sort((a, b) => {
    const da = new Date(a.date + 'T' + (a.time || '00:00'));
    const db = new Date(b.date + 'T' + (b.time || '00:00'));
    return db - da;
  });
  const recent = sorted.slice(0, 20);

  if (recent.length === 0) {
    el.innerHTML = `<div class="empty-state"><span class="icon">[fish]</span><p>No catches logged yet.<br/>Tap + NEW CATCH to log your first fish!</p></div>`;
    return;
  }

  el.innerHTML = recent.map(c => `
    <div class="catch-card" onclick="openDetail(${c.id})">
      ${c.photo ? `<img class="thumb" src="${c.photo}" alt="${c.species}"/>` : `<div class="thumb placeholder">No Photo</div>`}
      <div class="info">
        <div class="species">${esc(c.species)}</div>
        <div class="details">${formatWeight(c)}${c.lengthIn ? ' / ' + c.lengthIn + ' in' : ''}</div>
        <div class="location">${esc(c.location || 'No location')}</div>
        <div class="date">${formatDate(c.date)}${c.time ? ' at ' + formatTime(c.time) : ''}</div>
      </div>
    </div>
  `).join('');
}

// --- Rendering: Gallery ---
function renderGallery() {
  const el = document.getElementById('galleryGrid');
  const speciesFilter = document.getElementById('filterSpecies').value;
  const sortVal = document.getElementById('filterSort').value;

  let filtered = [...catches];
  if (speciesFilter) filtered = filtered.filter(c => c.species === speciesFilter);

  filtered.sort((a, b) => {
    switch (sortVal) {
      case 'date-desc': return new Date(b.date) - new Date(a.date);
      case 'date-asc': return new Date(a.date) - new Date(b.date);
      case 'weight-desc': return getWeightLbs(b) - getWeightLbs(a);
      case 'weight-asc': return getWeightLbs(a) - getWeightLbs(b);
      default: return 0;
    }
  });

  if (filtered.length === 0) {
    el.innerHTML = `<div style="grid-column:1/-1" class="empty-state"><p>No catches to show.${speciesFilter ? ' Try a different filter.' : ''}</p></div>`;
    return;
  }

  el.innerHTML = filtered.map(c => `
    <div class="gallery-item" onclick="openDetail(${c.id})">
      ${c.photo ? `<img src="${c.photo}" alt="${c.species}"/>` : `<div style="width:100%;height:100%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:10px">No Photo</div>`}
      <div class="overlay">${esc(c.species)} ${formatWeight(c)}</div>
    </div>
  `).join('');
}

// --- Rendering: Stats ---
function renderStats() {
  renderFullStats();
  renderMonthChart();
  renderPBTable();
}

function renderFullStats() {
  const el = document.getElementById('fullStats');
  const total = catches.length;
  const totalWeight = catches.reduce((s, c) => s + getWeightLbs(c), 0);

  const speciesCount = {};
  catches.forEach(c => { speciesCount[c.species] = (speciesCount[c.species] || 0) + 1; });
  const topSpecies = Object.entries(speciesCount).sort((a, b) => b[1] - a[1]);
  const mostCaught = topSpecies.length > 0 ? topSpecies[0] : ['--', 0];

  const biggest = catches.length > 0 ? catches.reduce((a, b) => getWeightLbs(a) > getWeightLbs(b) ? a : b) : null;
  const longest = catches.filter(c => c.lengthIn > 0).length > 0
    ? catches.filter(c => c.lengthIn > 0).reduce((a, b) => (a.lengthIn || 0) > (b.lengthIn || 0) ? a : b)
    : null;

  const now = new Date();
  const thisMonth = catches.filter(c => {
    const d = new Date(c.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  const uniqueSpecies = Object.keys(speciesCount).length;
  const uniqueLocations = new Set(catches.map(c => (c.location || '').toLowerCase().trim()).filter(Boolean)).size;

  el.innerHTML = `
    <div class="stat-card"><div class="val">${total}</div><div class="label">Total Fish</div></div>
    <div class="stat-card"><div class="val">${thisMonth}</div><div class="label">This Month</div></div>
    <div class="stat-card"><div class="val">${totalWeight.toFixed(1)}</div><div class="label">Total Lbs</div></div>
    <div class="stat-card"><div class="val">${uniqueSpecies}</div><div class="label">Species</div></div>
    <div class="stat-card"><div class="val">${uniqueLocations}</div><div class="label">Locations</div></div>
    <div class="stat-card"><div class="val">${mostCaught[0].split(' ')[0]}</div><div class="label">Most Caught (${mostCaught[1]})</div></div>
    <div class="stat-card wide"><div class="val">${biggest ? esc(biggest.species) + ' - ' + formatWeight(biggest) : '--'}</div><div class="label">Biggest Catch</div></div>
    ${longest ? `<div class="stat-card wide"><div class="val">${esc(longest.species)} - ${longest.lengthIn} in</div><div class="label">Longest Catch</div></div>` : ''}
  `;
}

function renderMonthChart() {
  const el = document.getElementById('monthChart');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  const year = now.getFullYear();
  const counts = new Array(12).fill(0);
  catches.forEach(c => {
    const d = new Date(c.date);
    if (d.getFullYear() === year) {
      counts[d.getMonth()]++;
    }
  });
  const max = Math.max(...counts, 1);

  el.innerHTML = months.map((m, i) => `
    <div class="bar-col">
      <div class="bar-val">${counts[i] || ''}</div>
      <div class="bar" style="height:${(counts[i] / max) * 100}%"></div>
      <div class="bar-label">${m}</div>
    </div>
  `).join('');
}

function renderPBTable() {
  const tbody = document.querySelector('#pbTable tbody');
  const pbs = {};
  catches.forEach(c => {
    const w = getWeightLbs(c);
    if (!pbs[c.species] || w > getWeightLbs(pbs[c.species])) {
      pbs[c.species] = c;
    }
  });

  const sorted = Object.values(pbs).sort((a, b) => getWeightLbs(b) - getWeightLbs(a));

  if (sorted.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text2)">No catches yet</td></tr>';
    return;
  }

  tbody.innerHTML = sorted.map(c => `
    <tr>
      <td>${esc(c.species)}</td>
      <td>${formatWeight(c)}</td>
      <td>${c.lengthIn ? c.lengthIn + '"' : '--'}</td>
      <td>${formatDate(c.date)}</td>
    </tr>
  `).join('');
}

// --- Catch Form ---
function openCatchForm(id) {
  editingId = id || null;
  currentPhotoData = null;
  const panel = document.getElementById('catchForm');
  panel.classList.add('open');
  document.getElementById('formTitle').textContent = id ? 'Edit Catch' : 'New Catch';
  document.getElementById('saveBtn').textContent = id ? 'UPDATE CATCH' : 'SAVE CATCH';

  // Reset form
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoPrompt').style.display = '';
  document.getElementById('fEditId').value = '';
  document.getElementById('fLat').value = '';
  document.getElementById('fLng').value = '';
  stopCamera();

  if (id) {
    const c = catches.find(x => x.id === id);
    if (!c) return;
    document.getElementById('fSpecies').value = c.species;
    document.getElementById('fWeightLbs').value = c.weightLbs || '';
    document.getElementById('fWeightOz').value = c.weightOz || '';
    document.getElementById('fLength').value = c.lengthIn || '';
    document.getElementById('fLocation').value = c.location || '';
    document.getElementById('fDate').value = c.date || '';
    document.getElementById('fTime').value = c.time || '';
    document.getElementById('fNotes').value = c.notes || '';
    document.getElementById('fLat').value = c.lat || '';
    document.getElementById('fLng').value = c.lng || '';
    document.getElementById('fEditId').value = c.id;
    if (c.photo) {
      currentPhotoData = c.photo;
      const preview = document.getElementById('photoPreview');
      preview.src = c.photo;
      preview.style.display = 'block';
      document.getElementById('photoPrompt').style.display = 'none';
    }
  } else {
    document.getElementById('fSpecies').value = SPECIES[0];
    document.getElementById('fWeightLbs').value = '';
    document.getElementById('fWeightOz').value = '';
    document.getElementById('fLength').value = '';
    document.getElementById('fLocation').value = '';
    document.getElementById('fNotes').value = '';
    // Set today's date and current time
    const now = new Date();
    document.getElementById('fDate').value = now.toISOString().split('T')[0];
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('fTime').value = h + ':' + m;
  }
}

function closeCatchForm() {
  stopCamera();
  document.getElementById('catchForm').classList.remove('open');
  editingId = null;
  currentPhotoData = null;
}

function saveCatch() {
  const species = document.getElementById('fSpecies').value;
  const weightLbs = parseInt(document.getElementById('fWeightLbs').value) || 0;
  const weightOz = parseInt(document.getElementById('fWeightOz').value) || 0;
  const lengthIn = parseFloat(document.getElementById('fLength').value) || 0;
  const location = document.getElementById('fLocation').value.trim();
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const notes = document.getElementById('fNotes').value.trim();
  const lat = parseFloat(document.getElementById('fLat').value) || null;
  const lng = parseFloat(document.getElementById('fLng').value) || null;

  if (!date) {
    toast('Please enter a date.');
    return;
  }

  const entry = {
    id: editingId || Date.now(),
    photo: currentPhotoData || null,
    species: species,
    weightLbs: weightLbs,
    weightOz: weightOz,
    lengthIn: lengthIn,
    location: location,
    lat: lat,
    lng: lng,
    date: date,
    time: time,
    notes: notes
  };

  if (editingId) {
    const idx = catches.findIndex(c => c.id === editingId);
    if (idx >= 0) catches[idx] = entry;
  } else {
    catches.push(entry);
  }

  saveData();
  closeCatchForm();
  renderHome();
  checkStorage();
  toast(editingId ? 'Catch updated!' : 'Catch saved!');
}

// --- Camera / Photo ---
function handlePhotoClick() {
  if (currentStream) return; // already in camera mode
  // Try camera first, fall back to file input
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    openCamera();
  } else {
    document.getElementById('fileInput').click();
  }
}

async function openCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    currentStream = stream;
    const video = document.getElementById('cameraPreview');
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('photoPrompt').style.display = 'none';
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('cameraControls').style.display = 'flex';
  } catch (e) {
    // Camera failed, fallback to file input
    document.getElementById('fileInput').click();
  }
}

function capturePhoto() {
  const video = document.getElementById('cameraPreview');
  const canvas = document.getElementById('photoCanvas');
  // Scale down for storage
  const maxW = 800;
  let w = video.videoWidth;
  let h = video.videoHeight;
  if (w > maxW) {
    h = Math.round(h * (maxW / w));
    w = maxW;
  }
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  currentPhotoData = canvas.toDataURL('image/jpeg', 0.6);

  stopCamera();
  const preview = document.getElementById('photoPreview');
  preview.src = currentPhotoData;
  preview.style.display = 'block';
  document.getElementById('photoPrompt').style.display = 'none';
}

function stopCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  document.getElementById('cameraPreview').style.display = 'none';
  document.getElementById('cameraControls').style.display = 'none';
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  compressImage(file, (dataUrl) => {
    currentPhotoData = dataUrl;
    const preview = document.getElementById('photoPreview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('photoPrompt').style.display = 'none';
  });
  e.target.value = '';
}

function compressImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function (e) {
    const img = new Image();
    img.onload = function () {
      const canvas = document.createElement('canvas');
      const maxW = 800;
      let w = img.width;
      let h = img.height;
      if (w > maxW) {
        h = Math.round(h * (maxW / w));
        w = maxW;
      }
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// --- GPS ---
function getGPS() {
  if (!navigator.geolocation) {
    toast('Geolocation not available');
    return;
  }
  toast('Getting location...');
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      document.getElementById('fLat').value = pos.coords.latitude.toFixed(6);
      document.getElementById('fLng').value = pos.coords.longitude.toFixed(6);
      document.getElementById('fLocation').value =
        pos.coords.latitude.toFixed(4) + ', ' + pos.coords.longitude.toFixed(4);
      toast('Location captured');
    },
    (err) => {
      toast('Could not get location: ' + err.message);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// --- Detail View ---
function openDetail(id) {
  const c = catches.find(x => x.id === id);
  if (!c) return;
  const panel = document.getElementById('detailPanel');
  const body = document.getElementById('detailBody');
  document.getElementById('detailTitle').textContent = c.species;

  let coordsText = '';
  if (c.lat && c.lng) {
    coordsText = `<div class="detail-row"><span class="lbl">Coordinates</span><span class="val">${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</span></div>`;
  }

  body.innerHTML = `
    ${c.photo ? `<img class="detail-photo" src="${c.photo}" alt="${esc(c.species)}"/>` : ''}
    <div class="detail-row"><span class="lbl">Species</span><span class="val">${esc(c.species)}</span></div>
    <div class="detail-row"><span class="lbl">Weight</span><span class="val">${formatWeight(c)}</span></div>
    <div class="detail-row"><span class="lbl">Length</span><span class="val">${c.lengthIn ? c.lengthIn + ' inches' : '--'}</span></div>
    <div class="detail-row"><span class="lbl">Location</span><span class="val">${esc(c.location || '--')}</span></div>
    ${coordsText}
    <div class="detail-row"><span class="lbl">Date</span><span class="val">${formatDate(c.date)}</span></div>
    <div class="detail-row"><span class="lbl">Time</span><span class="val">${c.time ? formatTime(c.time) : '--'}</span></div>
    ${c.notes ? `<div class="detail-notes">${esc(c.notes)}</div>` : ''}
    <div class="detail-actions">
      <button class="btn-edit" onclick="closeDetail();openCatchForm(${c.id})">Edit</button>
      <button class="btn-share" onclick="shareCatch(${c.id})">Share</button>
      <button class="btn-delete" onclick="deleteCatch(${c.id})">Delete</button>
    </div>
  `;

  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

async function deleteCatch(id) {
  const ok = await confirm2('Delete this catch? This cannot be undone.');
  if (!ok) return;
  catches = catches.filter(c => c.id !== id);
  saveData();
  closeDetail();
  renderHome();
  renderGallery();
  checkStorage();
  toast('Catch deleted');
}

function shareCatch(id) {
  const c = catches.find(x => x.id === id);
  if (!c) return;
  const text = `Fish Catch: ${c.species}\nWeight: ${formatWeight(c)}\nLength: ${c.lengthIn ? c.lengthIn + ' in' : 'N/A'}\nLocation: ${c.location || 'N/A'}\nDate: ${formatDate(c.date)}${c.time ? ' at ' + formatTime(c.time) : ''}\n${c.notes ? 'Notes: ' + c.notes : ''}`;

  if (navigator.share) {
    const shareData = { title: 'Fish Catch - ' + c.species, text: text };
    navigator.share(shareData).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard'));
  } else {
    toast('Share not available');
  }
}

// --- Export ---
function openExport() {
  document.getElementById('exportPanel').classList.add('open');
}
function closeExport() {
  document.getElementById('exportPanel').classList.remove('open');
}

function exportCSV() {
  if (catches.length === 0) { toast('No data to export'); return; }
  const header = 'ID,Species,Weight Lbs,Weight Oz,Length In,Location,Lat,Lng,Date,Time,Notes';
  const rows = catches.map(c =>
    [c.id, q(c.species), c.weightLbs, c.weightOz, c.lengthIn, q(c.location || ''),
     c.lat || '', c.lng || '', c.date, c.time || '', q(c.notes || '')].join(',')
  );
  const csv = header + '\n' + rows.join('\n');
  downloadFile('fishlog_export.csv', csv, 'text/csv');
  toast('CSV downloaded');
}

function exportJSON() {
  if (catches.length === 0) { toast('No data to export'); return; }
  const json = JSON.stringify(catches, null, 2);
  downloadFile('fishlog_backup.json', json, 'application/json');
  toast('JSON downloaded');
}

function copyStats() {
  const total = catches.length;
  const totalWeight = catches.reduce((s, c) => s + getWeightLbs(c), 0);
  const speciesCount = {};
  catches.forEach(c => { speciesCount[c.species] = (speciesCount[c.species] || 0) + 1; });
  const topSpecies = Object.entries(speciesCount).sort((a, b) => b[1] - a[1]);

  let text = `Fish Catch Log Stats\n`;
  text += `Total Fish: ${total}\n`;
  text += `Total Weight: ${totalWeight.toFixed(1)} lbs\n`;
  text += `Species Caught: ${Object.keys(speciesCount).length}\n\n`;
  text += `Species Breakdown:\n`;
  topSpecies.forEach(([s, n]) => { text += `  ${s}: ${n}\n`; });

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('Stats copied to clipboard'));
  } else {
    toast('Clipboard not available');
  }
}

async function clearAllData() {
  closeExport();
  const ok = await confirm2('Delete ALL catch data? This cannot be undone!');
  if (!ok) return;
  catches = [];
  saveData();
  renderHome();
  checkStorage();
  toast('All data cleared');
}

function downloadFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// --- Import ---
function importJSON() {
  document.getElementById('importInput').click();
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error('Invalid format');
    const ok = await confirm2(`Import ${data.length} catches? This will add to your existing data.`);
    if (!ok) return;
    // Merge, avoiding duplicate IDs
    const existingIds = new Set(catches.map(c => c.id));
    let added = 0;
    data.forEach(c => {
      if (!existingIds.has(c.id)) {
        catches.push(c);
        added++;
      }
    });
    saveData();
    renderHome();
    checkStorage();
    toast(`Imported ${added} catches`);
  } catch (err) {
    toast('Import failed: invalid file');
  }
  e.target.value = '';
}

// --- Menu ---
function openMenu() {
  document.getElementById('menuPanel').classList.add('open');
}
function closeMenu() {
  document.getElementById('menuPanel').classList.remove('open');
}

function showStorageInfo() {
  const used = new Blob([localStorage.getItem('fishlog_catches') || '']).size;
  const kb = (used / 1024).toFixed(1);
  const mb = (used / (1024 * 1024)).toFixed(2);
  const photoCount = catches.filter(c => c.photo).length;
  toast(`Storage: ${kb} KB (${mb} MB). ${catches.length} catches, ${photoCount} with photos.`);
}

// --- Confirm Dialog ---
function confirm2(msg) {
  return new Promise((resolve) => {
    const dialog = document.getElementById('confirmDialog');
    document.getElementById('confirmMsg').textContent = msg;
    dialog.classList.add('open');
    confirmResolve = resolve;
    document.getElementById('confirmOk').onclick = () => closeConfirm(true);
  });
}

function closeConfirm(result) {
  document.getElementById('confirmDialog').classList.remove('open');
  if (confirmResolve) {
    confirmResolve(result);
    confirmResolve = null;
  }
}

// --- Toast ---
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
}

// --- Helpers ---
function getWeightLbs(c) {
  return (c.weightLbs || 0) + (c.weightOz || 0) / 16;
}

function formatWeight(c) {
  const lbs = c.weightLbs || 0;
  const oz = c.weightOz || 0;
  if (lbs === 0 && oz === 0) return '-- lb';
  if (oz === 0) return lbs + ' lb';
  return lbs + ' lb ' + oz + ' oz';
}

function formatDate(dateStr) {
  if (!dateStr) return '--';
  try {
    const parts = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
  } catch (e) {
    return dateStr;
  }
}

function formatTime(timeStr) {
  if (!timeStr) return '';
  try {
    const [h, m] = timeStr.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return h12 + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  } catch (e) {
    return timeStr;
  }
}

function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function q(str) {
  return '"' + String(str).replace(/"/g, '""') + '"';
}

// --- Start ---
init();
