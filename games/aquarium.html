<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquarium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1e2e;overflow:hidden;font-family:system-ui,sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block}
#back{position:fixed;top:14px;left:16px;font-size:12px;color:rgba(255,255,255,0.35);text-decoration:none;font-family:monospace;z-index:100}
#back:hover{color:rgba(255,255,255,0.7)}
#shell-counter{position:fixed;top:12px;left:70px;font-size:15px;color:rgba(255,255,255,0.8);z-index:100;font-family:system-ui,sans-serif;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
#gear{position:fixed;top:14px;right:16px;width:28px;height:28px;cursor:pointer;z-index:100;opacity:0.3;transition:opacity 0.3s}
#gear:hover{opacity:0.8}
#shop-btn{position:fixed;top:12px;right:52px;width:30px;height:30px;cursor:pointer;z-index:100;opacity:0.3;transition:opacity 0.3s;background:none;border:none;padding:0}
#shop-btn:hover{opacity:0.8}
#panel{position:fixed;top:50px;right:16px;background:rgba(0,10,20,0.85);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:18px;width:220px;z-index:99;display:none;color:rgba(255,255,255,0.8);font-size:13px;backdrop-filter:blur(8px)}
#panel label{display:block;margin:8px 0 2px;font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
#panel input[type=range]{width:100%;accent-color:#4db8ff}
#panel .toggle{display:flex;align-items:center;justify-content:space-between;margin:8px 0}
#panel .toggle input{accent-color:#4db8ff}
#shop-panel{position:fixed;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,10,20,0.92);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:0;width:380px;max-height:80vh;z-index:101;display:none;color:rgba(255,255,255,0.85);font-size:13px;backdrop-filter:blur(12px);overflow:hidden}
.shop-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.1)}
.shop-tab{flex:1;padding:10px 8px;text-align:center;cursor:pointer;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;transition:all 0.2s}
.shop-tab:hover{color:rgba(255,255,255,0.7)}
.shop-tab.active{color:#4db8ff;border-bottom-color:#4db8ff}
.shop-content{padding:12px 16px;max-height:60vh;overflow-y:auto}
.shop-content::-webkit-scrollbar{width:4px}
.shop-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;margin:4px 0;border-radius:8px;background:rgba(255,255,255,0.04);transition:background 0.2s;cursor:pointer}
.shop-item:hover{background:rgba(255,255,255,0.08)}
.shop-item.locked{opacity:0.45;cursor:not-allowed}
.shop-item.owned{border:1px solid rgba(100,255,100,0.2);background:rgba(100,255,100,0.05)}
.shop-item .item-info{flex:1}
.shop-item .item-name{font-size:13px;font-weight:500}
.shop-item .item-desc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.shop-item .item-price{font-size:13px;color:#ffd700;white-space:nowrap;margin-left:10px}
.shop-item .item-owned{font-size:11px;color:#6f6;margin-left:10px}
.shop-item .item-lock{font-size:10px;color:#f88;margin-left:10px}
.shop-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px}
.shop-header .shop-title{font-size:16px;font-weight:600}
.shop-header .shop-shells{font-size:14px;color:#ffd700}
.shop-close{cursor:pointer;font-size:18px;color:rgba(255,255,255,0.4);padding:4px 8px}
.shop-close:hover{color:rgba(255,255,255,0.8)}
#goal-banner{position:fixed;top:-60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(255,200,50,0.9),rgba(255,160,30,0.9));color:#1a0f00;padding:10px 24px;border-radius:0 0 12px 12px;font-size:13px;font-weight:600;z-index:200;transition:top 0.4s ease;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 4px 20px rgba(255,180,0,0.3)}
#goal-banner.show{top:0}
#hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.2);font-size:11px;font-family:monospace;z-index:100;pointer-events:none;transition:opacity 1s}
.goal-item{display:flex;align-items:center;padding:8px 10px;margin:4px 0;border-radius:8px;background:rgba(255,255,255,0.04)}
.goal-item.completed{background:rgba(100,255,100,0.05);border:1px solid rgba(100,255,100,0.15)}
.goal-name{font-size:13px;font-weight:500}
.goal-desc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px}
.goal-reward{font-size:10px;color:#ffd700;margin-top:2px}
.goal-check{margin-right:8px;font-size:14px}
</style>
</head>
<body>
<a href="games.html" id="back">&larr; games</a>
<div id="shell-counter">&#x1F41A; 0</div>
<button id="shop-btn">
<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5">
<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
<path d="M1 1h4l2.68 13.39a1 1 0 0 0 1 .61h9.72a1 1 0 0 0 .93-.64L23 6H6"/>
</svg>
</button>
<svg id="gear" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.5">
<circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
</svg>
<div id="panel">
<label>Fish Count</label>
<input type="range" id="sFish" min="8" max="40" value="18">
<label>Bubble Rate</label>
<input type="range" id="sBubble" min="1" max="10" value="5">
<label>Plant Density</label>
<input type="range" id="sPlant" min="3" max="12" value="7">
<label>Light Intensity</label>
<input type="range" id="sLight" min="0" max="10" value="6">
<div class="toggle"><span>Music</span><input type="checkbox" id="sMusic" checked></div>
</div>
<div id="shop-panel">
<div class="shop-header">
<span class="shop-title">Shop</span>
<span class="shop-shells" id="shop-shells">&#x1F41A; 0</span>
<span class="shop-close" id="shop-close">&times;</span>
</div>
<div class="shop-tabs">
<div class="shop-tab active" data-tab="fish">Fish</div>
<div class="shop-tab" data-tab="decor">Decorations</div>
<div class="shop-tab" data-tab="bg">Backgrounds</div>
<div class="shop-tab" data-tab="goals">Goals</div>
</div>
<div class="shop-content" id="shop-content"></div>
</div>
<div id="goal-banner"></div>
<div id="hint">click to scatter &middot; double-click to feed</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,sandY;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;sandY=H*0.82;}
resize();addEventListener('resize',resize);

// === PROGRESSION SYSTEM ===
const GOALS = [
  {id:'first-feed', name:'First Feeding', desc:'Drop food for the first time', reward:'Unlock Goldfish', shells:5},
  {id:'feed-10', name:'Feeding Frenzy', desc:'Feed the fish 10 times', reward:'Unlock Betta', shells:10},
  {id:'feed-50', name:'Master Feeder', desc:'Feed 50 times', reward:'Unlock Pufferfish', shells:25},
  {id:'watch-5', name:'Zen Watcher', desc:'Watch for 5 minutes', reward:'Unlock Blue Background', shells:10},
  {id:'watch-15', name:'Meditation Master', desc:'Watch for 15 minutes', reward:'Unlock Night Mode', shells:20},
  {id:'scatter-5', name:'Troublemaker', desc:'Scatter fish 5 times', reward:'Unlock Seahorse', shells:10},
  {id:'fish-20', name:'Big Tank', desc:'Have 20+ fish', reward:'Unlock Jellyfish', shells:15},
  {id:'fish-35', name:'Mega Tank', desc:'Have 35+ fish', reward:'Unlock Whale', shells:30},
  {id:'all-types', name:'Collector', desc:'Have every fish type', reward:'Unlock Rainbow Coral', shells:50},
  {id:'100-shells', name:'Shell Baron', desc:'Earn 100 shells', reward:'Unlock Treasure Chest Opens', shells:0},
  {id:'decorations', name:'Interior Designer', desc:'Place 3 decorations', reward:'Unlock Volcano Bubbles', shells:15},
];

const SHOP_FISH = [
  {id:'neon', name:'Neon Tetra', price:5, unlock:null},
  {id:'clown', name:'Clownfish', price:8, unlock:null},
  {id:'angel', name:'Angelfish', price:10, unlock:null},
  {id:'goldfish', name:'Goldfish', price:12, unlock:'first-feed'},
  {id:'betta', name:'Betta', price:15, unlock:'feed-10'},
  {id:'seahorse', name:'Seahorse', price:15, unlock:'scatter-5'},
  {id:'jellyfish', name:'Jellyfish', price:20, unlock:'fish-20'},
  {id:'pufferfish', name:'Pufferfish', price:20, unlock:'feed-50'},
  {id:'whale', name:'Mini Whale', price:40, unlock:'fish-35'},
];

const SHOP_DECOR = [
  {id:'coral', name:'Coral', desc:'Pink/orange branching coral', price:10, unlock:null},
  {id:'castle', name:'Castle', desc:'Underwater castle', price:15, unlock:null},
  {id:'ship', name:'Sunken Ship', desc:'Old shipwreck', price:20, unlock:null},
  {id:'volcano', name:'Volcano', desc:'Bubbles from the top', price:25, unlock:'decorations'},
];

const SHOP_BG = [
  {id:'default', name:'Deep Blue', desc:'Classic deep ocean', price:0, unlock:null},
  {id:'tropical', name:'Tropical', desc:'Lighter turquoise waters', price:15, unlock:null},
  {id:'night', name:'Night', desc:'Dark with bioluminescent glow', price:15, unlock:'watch-15'},
  {id:'sunset', name:'Sunset', desc:'Warm oranges from above', price:15, unlock:'watch-5'},
];

// Save state
let save = {
  shells: 0,
  totalShellsEarned: 0,
  goalsCompleted: [],
  fishOwned: {},
  decorPlaced: [],
  background: 'default',
  feedCount: 0,
  scatterCount: 0,
  watchTime: 0,
};

function loadSave(){
  try {
    const raw = localStorage.getItem('aquarium-save');
    if(raw){
      const s = JSON.parse(raw);
      save = {...save, ...s};
    }
  } catch(e){}
}
function saveSave(){
  try { localStorage.setItem('aquarium-save', JSON.stringify(save)); } catch(e){}
}
loadSave();

function hasGoal(id){ return save.goalsCompleted.includes(id); }
function isUnlocked(unlockGoal){ return !unlockGoal || hasGoal(unlockGoal); }

// Shell display
const shellEl = document.getElementById('shell-counter');
function updateShellDisplay(){
  shellEl.textContent = '\u{1F41A} ' + save.shells;
  const shopShells = document.getElementById('shop-shells');
  if(shopShells) shopShells.textContent = '\u{1F41A} ' + save.shells;
}
function addShells(n){
  save.shells += n;
  save.totalShellsEarned += n;
  updateShellDisplay();
  checkGoals();
  saveSave();
}
updateShellDisplay();

// Goal notification
let goalBannerTimer = 0;
function showGoalBanner(goal){
  const el = document.getElementById('goal-banner');
  el.textContent = `⭐ ${goal.name} — ${goal.desc} (+${goal.shells} shells, ${goal.reward})`;
  el.classList.add('show');
  goalBannerTimer = 3;
}

function completeGoal(goal){
  if(hasGoal(goal.id)) return;
  save.goalsCompleted.push(goal.id);
  addShells(goal.shells);
  showGoalBanner(goal);
  saveSave();
}

function checkGoals(){
  GOALS.forEach(g => {
    if(hasGoal(g.id)) return;
    switch(g.id){
      case 'first-feed': if(save.feedCount >= 1) completeGoal(g); break;
      case 'feed-10': if(save.feedCount >= 10) completeGoal(g); break;
      case 'feed-50': if(save.feedCount >= 50) completeGoal(g); break;
      case 'watch-5': if(save.watchTime >= 300) completeGoal(g); break;
      case 'watch-15': if(save.watchTime >= 900) completeGoal(g); break;
      case 'scatter-5': if(save.scatterCount >= 5) completeGoal(g); break;
      case 'fish-20': if(fishes.length >= 20) completeGoal(g); break;
      case 'fish-35': if(fishes.length >= 35) completeGoal(g); break;
      case 'all-types': {
        const allTypes = ['neon','angel','clown','goldfish','betta','seahorse','jellyfish','pufferfish','whale'];
        const inTank = new Set(fishes.map(f=>f.type));
        if(allTypes.every(t=>inTank.has(t))) completeGoal(g);
        break;
      }
      case '100-shells': if(save.totalShellsEarned >= 100) completeGoal(g); break;
      case 'decorations': if(save.decorPlaced.length >= 3) completeGoal(g); break;
    }
  });
}

// Passive shell income
let passiveShellTimer = 0;

// Watch time tracking
let watchTimer = 0;

// Settings
const cfg={fishCount:18,bubbleRate:5,plantCount:7,lightIntensity:0.6,music:true};
const gearEl=document.getElementById('gear'),panelEl=document.getElementById('panel');
gearEl.onclick=()=>{panelEl.style.display=panelEl.style.display==='none'?'block':'none';shopPanelEl.style.display='none';};
document.getElementById('sFish').oninput=e=>{cfg.fishCount=+e.target.value;syncFish()};
document.getElementById('sBubble').oninput=e=>cfg.bubbleRate=+e.target.value;
document.getElementById('sPlant').oninput=e=>{cfg.plantCount=+e.target.value;initPlants()};
document.getElementById('sLight').oninput=e=>cfg.lightIntensity=e.target.value/10;
document.getElementById('sMusic').onchange=e=>{cfg.music=e.target.checked;toggleMusic()};

// Shop UI
const shopBtnEl=document.getElementById('shop-btn');
const shopPanelEl=document.getElementById('shop-panel');
const shopContentEl=document.getElementById('shop-content');
let currentShopTab='fish';

shopBtnEl.onclick=()=>{
  shopPanelEl.style.display=shopPanelEl.style.display==='none'?'block':'none';
  panelEl.style.display='none';
  renderShop();
};
document.getElementById('shop-close').onclick=()=>{shopPanelEl.style.display='none';};

document.querySelectorAll('.shop-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.shop-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentShopTab=tab.dataset.tab;
    renderShop();
  };
});

function renderShop(){
  updateShellDisplay();
  let html='';
  if(currentShopTab==='fish'){
    SHOP_FISH.forEach(item=>{
      const unlocked = isUnlocked(item.unlock);
      const goal = item.unlock ? GOALS.find(g=>g.id===item.unlock) : null;
      const lockText = (!unlocked && goal) ? `Requires: ${goal.name}` : '';
      html += `<div class="shop-item${unlocked?'':' locked'}" data-action="buy-fish" data-id="${item.id}" data-price="${item.price}">
        <div class="item-info"><div class="item-name">${item.name}</div>${lockText?`<div class="item-desc">${lockText}</div>`:''}</div>
        ${unlocked?`<div class="item-price">\u{1F41A} ${item.price}</div>`:`<div class="item-lock">\u{1F512}</div>`}
      </div>`;
    });
  } else if(currentShopTab==='decor'){
    SHOP_DECOR.forEach(item=>{
      const unlocked = isUnlocked(item.unlock);
      const goal = item.unlock ? GOALS.find(g=>g.id===item.unlock) : null;
      const lockText = (!unlocked && goal) ? `Requires: ${goal.name}` : '';
      const owned = save.decorPlaced.includes(item.id);
      html += `<div class="shop-item${unlocked?'':' locked'}${owned?' owned':''}" data-action="buy-decor" data-id="${item.id}" data-price="${item.price}">
        <div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${owned?'Placed':item.desc}${lockText?' • '+lockText:''}</div></div>
        ${owned?`<div class="item-owned">✓</div>`:unlocked?`<div class="item-price">\u{1F41A} ${item.price}</div>`:`<div class="item-lock">\u{1F512}</div>`}
      </div>`;
    });
  } else if(currentShopTab==='bg'){
    SHOP_BG.forEach(item=>{
      const unlocked = isUnlocked(item.unlock);
      const goal = item.unlock ? GOALS.find(g=>g.id===item.unlock) : null;
      const lockText = (!unlocked && goal) ? `Requires: ${goal.name}` : '';
      const selected = save.background === item.id;
      const owned = item.price===0 || save.background===item.id || (save['bg_'+item.id]);
      html += `<div class="shop-item${unlocked?'':' locked'}${selected?' owned':''}" data-action="buy-bg" data-id="${item.id}" data-price="${item.price}">
        <div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${item.desc}${lockText?' • '+lockText:''}</div></div>
        ${selected?`<div class="item-owned">✓ Active</div>`:owned&&unlocked?`<div class="item-price" style="color:#6f6;cursor:pointer">Select</div>`:unlocked?`<div class="item-price">\u{1F41A} ${item.price}</div>`:`<div class="item-lock">\u{1F512}</div>`}
      </div>`;
    });
  } else if(currentShopTab==='goals'){
    GOALS.forEach(g=>{
      const done = hasGoal(g.id);
      html += `<div class="goal-item${done?' completed':''}">
        <div class="goal-check">${done?'✅':'⬜'}</div>
        <div>
          <div class="goal-name">${g.name}</div>
          <div class="goal-desc">${g.desc}</div>
          <div class="goal-reward">${g.reward}${g.shells>0?' • +'+g.shells+' shells':''}</div>
        </div>
      </div>`;
    });
  }
  shopContentEl.innerHTML=html;

  // Attach click handlers
  shopContentEl.querySelectorAll('.shop-item:not(.locked)').forEach(el=>{
    el.onclick=()=>{
      const action=el.dataset.action;
      const id=el.dataset.id;
      const price=+el.dataset.price;
      if(action==='buy-fish'){
        if(save.shells>=price){
          save.shells-=price;
          fishes.push(makeFish(id));
          cfg.fishCount=fishes.length;
          document.getElementById('sFish').value=cfg.fishCount;
          saveSave();
          checkGoals();
          renderShop();
        }
      } else if(action==='buy-decor'){
        if(save.decorPlaced.includes(id)) return;
        if(save.shells>=price){
          save.shells-=price;
          save.decorPlaced.push(id);
          initDecorations();
          saveSave();
          checkGoals();
          renderShop();
        }
      } else if(action==='buy-bg'){
        const selected = save.background===id;
        if(selected) return;
        const owned = price===0 || save['bg_'+id];
        if(owned){
          save.background=id;
          saveSave();
          renderShop();
        } else if(save.shells>=price){
          save.shells-=price;
          save['bg_'+id]=true;
          save.background=id;
          saveSave();
          renderShop();
        }
      }
      updateShellDisplay();
    };
  });
}

// Hint fade
setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity='0';setTimeout(()=>{if(h)h.remove()},1200)},6000);

// --- WEB AUDIO AMBIENT ---
let audioCtx,musicGain,masterGain,musicStarted=false;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.25;masterGain.connect(audioCtx.destination);
  musicGain=audioCtx.createGain();musicGain.gain.value=cfg.music?1:0;musicGain.connect(masterGain);
  // Ambient pads
  [110,146.83,164.81,220].forEach((f,i)=>{
    const osc=audioCtx.createOscillator();osc.type='triangle';osc.frequency.value=f;
    const g=audioCtx.createGain();g.gain.value=0.06;
    const flt=audioCtx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=300+i*40;flt.Q.value=1;
    osc.connect(flt);flt.connect(g);g.connect(musicGain);osc.start();
    // Slow LFO on volume
    const lfo=audioCtx.createOscillator();lfo.frequency.value=0.05+i*0.02;
    const lfoG=audioCtx.createGain();lfoG.gain.value=0.03;
    lfo.connect(lfoG);lfoG.connect(g.gain);lfo.start();
  });
  // Bubble sounds
  setInterval(()=>{
    if(!cfg.music||!audioCtx)return;
    const osc=audioCtx.createOscillator();osc.type='sine';
    const f=800+Math.random()*1200;
    osc.frequency.setValueAtTime(f,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(f*0.4,audioCtx.currentTime+0.15);
    const g=audioCtx.createGain();g.gain.setValueAtTime(0.02,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.15);
    osc.connect(g);g.connect(masterGain);osc.start();osc.stop(audioCtx.currentTime+0.16);
  },2000+Math.random()*3000);
  // Water drip
  setInterval(()=>{
    if(!cfg.music||!audioCtx)return;
    const osc=audioCtx.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(1800,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400,audioCtx.currentTime+0.08);
    const g=audioCtx.createGain();g.gain.setValueAtTime(0.015,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
    osc.connect(g);g.connect(masterGain);osc.start();osc.stop(audioCtx.currentTime+0.12);
  },5000+Math.random()*8000);
  musicStarted=true;
}
function toggleMusic(){if(!audioCtx)return;musicGain.gain.value=cfg.music?1:0;}
function tryInitAudio(){if(!musicStarted){initAudio()}}
addEventListener('click',tryInitAudio,{once:false});
addEventListener('keydown',tryInitAudio,{once:false});

// --- FISH ---
const TYPES=['neon','angel','clown','goldfish','betta','large','seahorse','jellyfish','pufferfish','whale'];
const TYPE_CFG={
  neon:{sizeMin:12,sizeMax:18,speedMin:1.2,speedMax:2.2,colors:['#00ffcc','#00aaff','#ff4488','#aaffee','#ffee00'],school:true,tailLen:0.6},
  angel:{sizeMin:20,sizeMax:28,speedMin:0.8,speedMax:1.5,colors:['#ffffff','#ffdd44','#cccccc','#88aacc'],school:false,tailLen:0.9},
  clown:{sizeMin:14,sizeMax:20,speedMin:1,speedMax:1.8,colors:['#ff6600'],school:true,tailLen:0.5},

let fishes=[];
function makeFish(type){
  const tc=TYPE_CFG[type];
  if(!tc) return makeFish('neon'); // fallback
  const size=tc.sizeMin+Math.random()*(tc.sizeMax-tc.sizeMin);
  const col=tc.colors[Math.floor(Math.random()*tc.colors.length)];
  const hueShift=(Math.random()-0.5)*20;
  const f = {
    type,x:Math.random()*W,y:sandY*0.15+Math.random()*(sandY*0.75),
    size,speed:tc.speedMin+Math.random()*(tc.speedMax-tc.speedMin),
    angle:Math.random()*Math.PI*2,
    targetAngle:0,turnTimer:Math.random()*3,
    color:col,hueShift,tailPhase:Math.random()*Math.PI*2,
    bodyPhase:Math.random()*Math.PI*2,
    tailLen:tc.tailLen,school:tc.school,
    scatterTimer:0,scatterAngle:0,
    // Pufferfish puffed state
    puffed:0,
    // Jellyfish pulse
    pulsePhase:Math.random()*Math.PI*2,
    // Seahorse bob
    bobPhase:Math.random()*Math.PI*2,
    // Whale spout timer
    spoutTimer:5+Math.random()*10,
  };
  return f;
}
function initFish(){
  fishes=[];
  const counts={neon:5,angel:2,clown:3,goldfish:3,betta:2,large:2};
  let total=0;
  for(const t in counts){for(let i=0;i<counts[t]&&total<cfg.fishCount;i++,total++)fishes.push(makeFish(t));}
  while(fishes.length<cfg.fishCount){
    const t=TYPES[Math.floor(Math.random()*4)]; // bias toward smaller
    fishes.push(makeFish(t));
  }
}
function syncFish(){
  while(fishes.length>cfg.fishCount)fishes.pop();
  while(fishes.length<cfg.fishCount){
    const t=TYPES[Math.floor(Math.random()*4)];
    fishes.push(makeFish(t));
  }
}
initFish();

// --- CAUSTIC PATTERN ---
function caustVal(x,y,t){
  return(Math.sin(x*0.02+t*0.7)+Math.sin(y*0.025+t*0.5)+Math.sin((x+y)*0.015+t*0.9))/3;
}

// --- BACKGROUND THEMES ---
function getBgGradient(){
  const bg = save.background;
  const grad=ctx.createLinearGradient(0,0,0,H);
  if(bg==='tropical'){
    grad.addColorStop(0,'#0e6b7a');
    grad.addColorStop(0.5,'#0a5568');
    grad.addColorStop(0.8,'#084450');
    grad.addColorStop(1,'#063540');
  } else if(bg==='night'){
    grad.addColorStop(0,'#050a15');
    grad.addColorStop(0.5,'#03081a');
    grad.addColorStop(0.8,'#020518');
    grad.addColorStop(1,'#010412');
  } else if(bg==='sunset'){
    grad.addColorStop(0,'#5c3018');
    grad.addColorStop(0.3,'#3a2820');
    grad.addColorStop(0.6,'#1a2a38');
    grad.addColorStop(1,'#0a1e2e');
  } else {
    grad.addColorStop(0,'#0e3d5c');
    grad.addColorStop(0.5,'#0a2e48');
    grad.addColorStop(0.8,'#072238');
    grad.addColorStop(1,'#051a2c');
  }
  return grad;
}

function isNightMode(){ return save.background==='night'; }

// --- DRAWING ---
let time=0;
function draw(dt){
  time+=dt;
  ctx.clearRect(0,0,W,H);

  // Water gradient
  ctx.fillStyle=getBgGradient();
  ctx.fillRect(0,0,W,H);

  // Light rays
  drawLightRays();

  // Caustics on sand
  drawCaustics();

  // Sand
  drawSand();

  // Pebbles
  pebbles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  });

  // Rocks
  drawRocks();

  // Player decorations
  drawDecorations();

  // Treasure chest
  drawChest();

  // Plants
  drawPlants();

  // Fish
  updateAndDrawFish(dt);

  // Bubbles
  updateAndDrawBubbles(dt);

  // Volcano bubbles
  updateVolcanoBubbles(dt);

  // Whale spout particles
  updateSpoutParticles(dt);

  // Food
  updateFood(dt);

  // Chest sparkles
  updateChestSparkles(dt);

  // Water surface
  drawSurface();

  // Vignette
  drawVignette();

  // Blue tint overlay
  if(!isNightMode()){
    ctx.fillStyle='rgba(10,40,80,0.08)';
    ctx.fillRect(0,0,W,H);
  }

  // Goal banner timer
  if(goalBannerTimer>0){
    goalBannerTimer-=dt;
    if(goalBannerTimer<=0){
      document.getElementById('goal-banner').classList.remove('show');
    }
  }

  // Passive shell income
  passiveShellTimer+=dt;
  if(passiveShellTimer>=30){
    passiveShellTimer-=30;
    addShells(1);
  }

  // Watch time
  watchTimer+=dt;
  if(watchTimer>=1){
    const secs=Math.floor(watchTimer);
    save.watchTime+=secs;
    watchTimer-=secs;
    if(save.watchTime%10===0){
      saveSave();
      checkGoals();
    }
  }

  // Treasure chest open/close cycle
  if(hasGoal('100-shells')){
    chestTimer+=dt;
    if(chestTimer>8){
      chestTimer=0;
      chestOpen=!chestOpen;
      if(chestOpen){
        // Spawn sparkles
        for(let i=0;i<6;i++){
          chestSparkles.push({
            x:W*0.82+(Math.random()-0.5)*20,
            y:sandY-20,
            vx:(Math.random()-0.5)*1.5,
            vy:-0.5-Math.random()*1.5,
            life:2+Math.random(),
            alpha:1,
            size:1.5+Math.random()*2
          });
        }
      }
    }
  }

  // Volcano decoration bubbles
  if(save.decorPlaced.includes('volcano') && hasGoal('decorations')){
    decorations.forEach(d=>{
      if(d.id==='volcano'){
        if(Math.random()<0.15) spawnVolcanoBubble(d.x, d.y-38);
      }
    });
  }
}

function drawLightRays(){
  const intensity=cfg.lightIntensity;
  if(intensity<0.05)return;
  if(isNightMode()) return; // no light rays at night
  ctx.save();
  for(let i=0;i<5;i++){
    const cx=W*0.15+i*W*0.18+Math.sin(time*0.2+i*1.5)*30;
    const w=30+Math.sin(time*0.3+i)*10;
    ctx.beginPath();
    ctx.moveTo(cx-w,0);
    ctx.lineTo(cx+w,0);
    ctx.lineTo(cx+w*0.3+Math.sin(time*0.15+i)*20,sandY);
    ctx.lineTo(cx-w*0.3+Math.sin(time*0.15+i)*20,sandY);
    ctx.closePath();
    ctx.fillStyle=`rgba(120,200,255,${0.02*intensity})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawCaustics(){
  const intensity=cfg.lightIntensity;
  if(intensity<0.05)return;
  ctx.save();
  const step=20;
  for(let x=0;x<W;x+=step){
    for(let y=sandY-10;y<sandY+30;y+=step){
      const v=caustVal(x,y,time);
      if(v>0.3){
        const a=((v-0.3)/0.7)*0.15*intensity;
        ctx.fillStyle=`rgba(150,220,255,${a})`;
        ctx.beginPath();
        ctx.arc(x+step/2,y+step/2,step*0.6,0,Math.PI*2);
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

function drawSand(){
  const grad=ctx.createLinearGradient(0,sandY,0,H);
  grad.addColorStop(0,'#c2a366');
  grad.addColorStop(0.3,'#b89558');
  grad.addColorStop(1,'#8a7040');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=20){
    ctx.lineTo(x,sandY+Math.sin(x*0.03+1.5)*3);
  }
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.05)';
  for(let i=0;i<80;i++){
    const sx=((i*137.5)%W),sy=sandY+5+((i*73.1)%(H-sandY-10));
    ctx.beginPath();ctx.arc(sx,sy,0.8+Math.random()*0.5,0,Math.PI*2);ctx.fill();
  }
}

function drawRocks(){
  rocks.forEach(r=>{
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(r.x,r.y-r.h*0.3,r.w*0.5,r.h*0.5,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(r.x-r.w*0.1,r.y-r.h*0.5,2,r.x,r.y-r.h*0.3,r.w*0.5);
    g.addColorStop(0,'#8899');g.addColorStop(1,r.color);
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  });
}

function drawDecorations(){
  decorations.forEach(d=>{
    if(d.id==='coral') drawCoral(d.x, d.y);
    else if(d.id==='castle') drawCastle(d.x, d.y);
    else if(d.id==='ship') drawShip(d.x, d.y);
    else if(d.id==='volcano') drawVolcano(d.x, d.y);
  });
}

function drawCoral(cx, cy){
  ctx.save();
  // Main branches
  const branches = [
    {angle:-0.3, len:35, color:'#ff6688'},
    {angle:-0.8, len:28, color:'#ff8866'},
    {angle:0.2, len:32, color:'#ff7777'},
    {angle:0.7, len:25, color:'#ffaa77'},
    {angle:-1.2, len:20, color:'#ff9988'},
  ];
  branches.forEach(b=>{
    const sway = Math.sin(time*0.5+b.angle)*3;
    ctx.strokeStyle=b.color;
    ctx.lineWidth=4;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx, cy-5);
    const ex = cx + Math.sin(b.angle)*b.len + sway;
    const ey = cy - 5 - Math.cos(b.angle)*b.len;
    const cpx = cx + Math.sin(b.angle)*b.len*0.5 + sway*0.5;
    const cpy = cy - 5 - Math.cos(b.angle)*b.len*0.7;
    ctx.quadraticCurveTo(cpx, cpy, ex, ey);
    ctx.stroke();
    // Small bulbs at tips
    ctx.beginPath();
    ctx.arc(ex, ey, 3, 0, Math.PI*2);
    ctx.fillStyle=b.color;
    ctx.fill();
  });
  // Base
  ctx.beginPath();
  ctx.ellipse(cx, cy-2, 10, 5, 0, 0, Math.PI*2);
  ctx.fillStyle='#cc5566';
  ctx.fill();
  ctx.restore();
}

function drawCastle(cx, cy){
  ctx.save();
  // Main tower
  ctx.fillStyle='#8899aa';
  ctx.fillRect(cx-15, cy-45, 30, 45);
  // Turrets
  ctx.fillRect(cx-22, cy-55, 14, 55);
  ctx.fillRect(cx+8, cy-55, 14, 55);
  // Battlement
  for(let i=0;i<3;i++){
    ctx.fillRect(cx-22+i*6, cy-60, 4, 5);
    ctx.fillRect(cx+8+i*6, cy-60, 4, 5);
  }
  ctx.fillRect(cx-13, cy-50, 4, 5);
  ctx.fillRect(cx+4, cy-50, 4, 5);
  ctx.fillRect(cx-5, cy-50, 4, 5);
  // Door
  ctx.fillStyle='#334455';
  ctx.beginPath();
  ctx.arc(cx, cy-10, 6, Math.PI, 0);
  ctx.fillRect(cx-6, cy-10, 12, 10);
  ctx.fill();
  // Window
  ctx.fillStyle='#aaddff';
  ctx.globalAlpha=0.4+Math.sin(time*2)*0.1;
  ctx.beginPath();
  ctx.arc(cx, cy-30, 3, 0, Math.PI*2);
  ctx.fill();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawShip(cx, cy){
  ctx.save();
  // Hull
  ctx.fillStyle='#5a3a1a';
  ctx.beginPath();
  ctx.moveTo(cx-35, cy-10);
  ctx.lineTo(cx+30, cy-10);
  ctx.lineTo(cx+20, cy);
  ctx.lineTo(cx-25, cy);
  ctx.closePath();
  ctx.fill();
  // Deck
  ctx.fillStyle='#6b4a2a';
  ctx.fillRect(cx-25, cy-18, 45, 8);
  // Mast (broken, tilted)
  ctx.save();
  ctx.translate(cx-5, cy-18);
  ctx.rotate(-0.15);
  ctx.fillStyle='#4a3020';
  ctx.fillRect(-2, -40, 4, 40);
  // Tattered sail
  ctx.fillStyle='rgba(200,180,150,0.3)';
  ctx.beginPath();
  ctx.moveTo(2, -38);
  ctx.lineTo(20, -25);
  ctx.lineTo(2, -15);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  // Porthole
  ctx.strokeStyle='#8a6a3a';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.arc(cx-10, cy-5, 3, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx+5, cy-5, 3, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawVolcano(cx, cy){
  ctx.save();
  // Cone
  const grad = ctx.createLinearGradient(cx, cy, cx, cy-40);
  grad.addColorStop(0, '#554433');
  grad.addColorStop(1, '#443322');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(cx-30, cy);
  ctx.lineTo(cx-8, cy-38);
  ctx.lineTo(cx+8, cy-38);
  ctx.lineTo(cx+30, cy);
  ctx.closePath();
  ctx.fill();
  // Crater
  ctx.fillStyle='#332211';
  ctx.beginPath();
  ctx.ellipse(cx, cy-38, 8, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // Glow at top
  ctx.fillStyle='rgba(255,100,30,0.2)';
  ctx.beginPath();
  ctx.arc(cx, cy-38, 10, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawChest(){
  const cx=W*0.82,cy=sandY-2;
  const isOpen = chestOpen && hasGoal('100-shells');
  ctx.save();
  // Body
  ctx.fillStyle='#6b4226';
  ctx.beginPath();
  ctx.moveTo(cx-18,cy);ctx.lineTo(cx+18,cy);ctx.lineTo(cx+16,cy-14);ctx.lineTo(cx-16,cy-14);ctx.closePath();ctx.fill();
  // Lid
  if(isOpen){
    // Lid open - rotated back
    ctx.fillStyle='#7a4f30';
    ctx.beginPath();
    ctx.moveTo(cx-17,cy-14);ctx.lineTo(cx+17,cy-14);
    ctx.lineTo(cx+15,cy-26);ctx.lineTo(cx-15,cy-26);
    ctx.closePath();
    ctx.fill();
    // Gold glow inside
    ctx.fillStyle='rgba(255,215,0,0.5)';
    ctx.fillRect(cx-14,cy-14,28,6);
    // Bright glint
    ctx.fillStyle='rgba(255,235,100,0.6)';
    ctx.beginPath();ctx.arc(cx,cy-12,5+Math.sin(time*3)*2,0,Math.PI*2);ctx.fill();
  } else {
    // Lid closed
    ctx.fillStyle='#7a4f30';
    ctx.beginPath();
    ctx.moveTo(cx-17,cy-14);ctx.lineTo(cx+17,cy-14);
    ctx.quadraticCurveTo(cx+18,cy-22,cx,cy-24);
    ctx.quadraticCurveTo(cx-18,cy-22,cx-17,cy-14);
    ctx.fill();
  }
  // Gold latch
  ctx.fillStyle='#ffd700';
  ctx.fillRect(cx-3,cy-16,6,4);
  // Gold glint
  ctx.fillStyle='rgba(255,215,0,0.3)';
  ctx.beginPath();ctx.arc(cx,cy-18,8,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function updateChestSparkles(dt){
  chestSparkles = chestSparkles.filter(s=>{
    s.x+=s.vx*dt*30;
    s.y+=s.vy*dt*30;
    s.vy+=dt*0.3; // slight gravity
    s.life-=dt;
    s.alpha=Math.max(0,s.life/2);
    if(s.life<=0) return false;
    ctx.save();
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    // Star shape
    const cx=s.x,cy=s.y,r=s.size;
    for(let i=0;i<5;i++){
      const a = (i*Math.PI*2/5) - Math.PI/2 + time*3;
      ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
      const a2 = a + Math.PI/5;
      ctx.lineTo(cx+Math.cos(a2)*r*0.4, cy+Math.sin(a2)*r*0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return true;
  });
}

function drawPlants(){
  plants.forEach(p=>{
    ctx.save();
    const baseX=p.x, baseY=sandY;
    for(let s=0;s<p.segments;s++){
      const t=s/p.segments;
      const swayAmount=t*t*15;
      const sway=Math.sin(time*p.speed+p.phase+s*0.3)*swayAmount;
      const segH=p.height/p.segments;
      const y1=baseY-s*segH;
      const y2=baseY-(s+1)*segH;
      const x1=baseX+Math.sin(time*p.speed+p.phase+s*0.3)*swayAmount*0.7;
      const x2=baseX+sway;
      const w=p.width*(1-t*0.5);
      const lightness=30+t*25;
      ctx.fillStyle=`hsl(${p.hue},60%,${lightness}%)`;
      ctx.beginPath();
      ctx.moveTo(x1-w/2,y1);
      ctx.quadraticCurveTo(x2-w/3,y2+segH*0.3,x2-w*0.3,y2);
      ctx.lineTo(x2+w*0.3,y2);
      ctx.quadraticCurveTo(x2+w/3,y2+segH*0.3,x1+w/2,y1);
      ctx.closePath();ctx.fill();
    }
    const tipSway=Math.sin(time*p.speed+p.phase+p.segments*0.3)*15;
    const tipX=baseX+tipSway;
    const tipY=baseY-p.height;
    ctx.beginPath();
    ctx.ellipse(tipX,tipY,p.width*0.2,5,tipSway*0.05,0,Math.PI*2);
    ctx.fillStyle=`hsl(${p.hue},55%,55%)`;ctx.fill();
    ctx.restore();
  });
}

// --- FISH UPDATE & DRAW ---
function updateAndDrawFish(dt){
  fishes.forEach(f=>{
    // Pufferfish deflate timer
    if(f.puffed>0) f.puffed=Math.max(0,f.puffed-dt);

    // Seahorse special movement
    if(f.type==='seahorse'){
      f.bobPhase+=dt*2;
      f.y+=Math.sin(f.bobPhase)*0.3;
    }

    // Jellyfish pulsing movement
    if(f.type==='jellyfish'){
      f.pulsePhase+=dt*2.5;
      // Drift slowly upward during pulse
      if(Math.sin(f.pulsePhase)>0.5){
        f.y-=f.speed*0.5*dt*60;
      }
      // Sink slowly otherwise
      f.y+=0.15*dt*60;
    }

    // Whale spout
    if(f.type==='whale'){
      f.spoutTimer-=dt;
      if(f.spoutTimer<=0 && f.y < sandY*0.3){
        // Create spout particles
        for(let i=0;i<5;i++){
          spoutParticles.push({
            x:f.x+(Math.random()-0.5)*5,
            y:f.y-f.size*0.3,
            vx:(Math.random()-0.5)*0.8,
            vy:-1.5-Math.random()*2,
            life:0.8+Math.random()*0.5,
            alpha:0.6,
            r:1+Math.random()*2
          });
        }
        f.spoutTimer=8+Math.random()*12;
      }
    }

    // Scatter behavior
    if(f.scatterTimer>0){
      f.scatterTimer-=dt;
      f.angle+=(f.scatterAngle-f.angle)*0.1;
      f.x+=Math.cos(f.angle)*f.speed*4*dt*60;
      f.y+=Math.sin(f.angle)*f.speed*4*dt*60;
    }else{
      // Check for nearby food
      let nearestFood=null,nearestFoodDist=Infinity;
      foodParticles.forEach(fd=>{
        if(fd.eaten)return;
        const dx=fd.x-f.x,dy=fd.y-f.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<nearestFoodDist&&d<200){nearestFoodDist=d;nearestFood=fd;}
      });
      if(nearestFood){
        const dx=nearestFood.x-f.x,dy=nearestFood.y-f.y;
        f.angle=Math.atan2(dy,dx);
        f.x+=Math.cos(f.angle)*f.speed*1.5*dt*60;
        f.y+=Math.sin(f.angle)*f.speed*1.5*dt*60;
        if(nearestFoodDist<f.size*0.5){
          nearestFood.eaten=true;
          addShells(1); // +1 shell per food eaten
        }
      }else{
        // Normal swimming
        f.turnTimer-=dt;
        if(f.turnTimer<=0){
          f.targetAngle=f.angle+(Math.random()-0.5)*1.2;
          f.turnTimer=2+Math.random()*4;
        }
        // Edge avoidance
        const margin=60;
        if(f.x<margin)f.targetAngle=0;
        if(f.x>W-margin)f.targetAngle=Math.PI;
        if(f.y<margin)f.targetAngle=Math.PI*0.3;
        if(f.y>sandY-margin)f.targetAngle=-Math.PI*0.3;
        // Schooling
        if(f.school){
          let sx=0,sy=0,cnt=0;
          fishes.forEach(o=>{
            if(o===f||o.type!==f.type)return;
            const dx=o.x-f.x,dy=o.y-f.y,d=Math.sqrt(dx*dx+dy*dy);
            if(d<120&&d>10){sx+=dx;sy+=dy;cnt++;}
          });
          if(cnt>0){
            const schoolAngle=Math.atan2(sy/cnt,sx/cnt);
            f.targetAngle=f.targetAngle*0.7+schoolAngle*0.3;
          }
        }
        // Fish avoidance
        fishes.forEach(o=>{
          if(o===f)return;
          const dx=o.x-f.x,dy=o.y-f.y,d=Math.sqrt(dx*dx+dy*dy);
          const minDist=(f.size+o.size)*1.2;
          if(d<minDist&&d>0){
            f.targetAngle=Math.atan2(-dy,-dx);
          }
        });
        // Smooth turn
        let da=f.targetAngle-f.angle;
        while(da>Math.PI)da-=Math.PI*2;
        while(da<-Math.PI)da+=Math.PI*2;
        f.angle+=da*2*dt;
        f.x+=Math.cos(f.angle)*f.speed*dt*60;
        f.y+=Math.sin(f.angle)*f.speed*dt*60;
      }
    }
    // Wrap
    if(f.x<-f.size*2)f.x=W+f.size;
    if(f.x>W+f.size*2)f.x=-f.size;
    if(f.y<10)f.y=10;
    if(f.y>sandY-20)f.y=sandY-20;

    drawFish(f);
  });

  // Check fish count goals
  checkGoals();
}

function drawFish(f){
  if(f.type==='seahorse') return drawSeahorse(f);
  if(f.type==='jellyfish') return drawJellyfish(f);
  if(f.type==='pufferfish') return drawPufferfish(f);
  if(f.type==='whale') return drawWhale(f);

  ctx.save();
  ctx.translate(f.x,f.y);
  const dir=Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);

  const s=f.size;
  const tailWag=Math.sin(time*6+f.tailPhase)*0.4;
  const bodyWag=Math.sin(time*5+f.bodyPhase)*0.03*s;

  // Night mode glow
  if(isNightMode()){
    ctx.shadowColor=f.color;
    ctx.shadowBlur=12+Math.sin(time*2+f.tailPhase)*4;
  }

  ctx.globalAlpha=0.95;

  // Tail fin
  const tailX=-s*0.6;
  const tailSize=s*f.tailLen;
  ctx.beginPath();
  ctx.moveTo(tailX,0);
  ctx.quadraticCurveTo(tailX-tailSize*0.6,tailWag*tailSize*0.5-tailSize*0.4,tailX-tailSize,tailWag*tailSize*0.3-tailSize*0.3);
  ctx.quadraticCurveTo(tailX-tailSize*0.4,tailWag*tailSize*0.1,tailX-tailSize*0.4,0);
  ctx.quadraticCurveTo(tailX-tailSize*0.4,-tailWag*tailSize*0.1,tailX-tailSize,tailWag*tailSize*0.3+tailSize*0.3);
  ctx.quadraticCurveTo(tailX-tailSize*0.6,tailWag*tailSize*0.5+tailSize*0.4,tailX,0);
  ctx.closePath();
  ctx.fillStyle=f.color;
  ctx.globalAlpha=0.7;
  ctx.fill();
  ctx.globalAlpha=0.95;

  // Body
  ctx.beginPath();
  ctx.ellipse(0,bodyWag,s*0.55,s*0.32,0,0,Math.PI*2);
  const bGrad=ctx.createLinearGradient(0,-s*0.35,0,s*0.35);
  bGrad.addColorStop(0,lightenColor(f.color,30));
  bGrad.addColorStop(0.5,f.color);
  bGrad.addColorStop(1,darkenColor(f.color,30));
  ctx.fillStyle=bGrad;
  ctx.fill();

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(-s*0.1,bodyWag-s*0.28);
  ctx.quadraticCurveTo(s*0.1,bodyWag-s*0.5+Math.sin(time*4+f.tailPhase)*3,s*0.25,bodyWag-s*0.28);
  ctx.fillStyle=f.color;ctx.globalAlpha=0.5;ctx.fill();ctx.globalAlpha=0.95;

  // Pectoral fin
  ctx.beginPath();
  const finAngle=Math.sin(time*3+f.bodyPhase)*0.3;
  ctx.ellipse(s*0.05,bodyWag+s*0.15,s*0.15,s*0.08,finAngle+0.3,0,Math.PI*2);
  ctx.fillStyle=f.color;ctx.globalAlpha=0.4;ctx.fill();ctx.globalAlpha=0.95;

  // Clown fish stripes
  if(f.type==='clown'){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillRect(s*0.1,bodyWag-s*0.32,3,s*0.64);
    ctx.fillRect(-s*0.15,bodyWag-s*0.3,3,s*0.6);
    ctx.fillRect(-s*0.35,bodyWag-s*0.2,2,s*0.4);
  }

  // Eye
  const eyeX=s*0.3,eyeY=bodyWag-s*0.05;
  ctx.beginPath();ctx.arc(eyeX,eyeY,s*0.07,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(eyeX+s*0.02,eyeY,s*0.04,0,Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();

  // Subtle highlight
  ctx.beginPath();
  ctx.ellipse(s*0.05,bodyWag-s*0.15,s*0.25,s*0.08,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawSeahorse(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const dir = Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s = f.size;
  const bob = Math.sin(f.bobPhase)*3;

  if(isNightMode()){
    ctx.shadowColor=f.color;
    ctx.shadowBlur=10;
  }

  // Upright body - elongated S-curve
  ctx.beginPath();
  // Head
  ctx.arc(0, -s*0.5+bob, s*0.25, 0, Math.PI*2);
  ctx.fillStyle=f.color;
  ctx.fill();

  // Snout
  ctx.beginPath();
  ctx.moveTo(s*0.2, -s*0.55+bob);
  ctx.lineTo(s*0.45, -s*0.6+bob);
  ctx.lineTo(s*0.2, -s*0.48+bob);
  ctx.closePath();
  ctx.fillStyle=darkenColor(f.color,20);
  ctx.fill();

  // Body trunk
  ctx.beginPath();
  ctx.ellipse(0, -s*0.1+bob, s*0.2, s*0.45, 0, 0, Math.PI*2);
  ctx.fillStyle=f.color;
  ctx.fill();

  // Curled tail
  ctx.strokeStyle=f.color;
  ctx.lineWidth=s*0.1;
  ctx.lineCap='round';
  ctx.beginPath();
  const tailCurl = Math.sin(time*2+f.tailPhase)*0.2;
  ctx.moveTo(0, s*0.3+bob);
  ctx.quadraticCurveTo(-s*0.3, s*0.55+bob, -s*0.15+tailCurl*s, s*0.7+bob);
  ctx.quadraticCurveTo(s*0.1, s*0.65+bob, s*0.05+tailCurl*s, s*0.5+bob);
  ctx.stroke();

  // Small dorsal fin
  ctx.beginPath();
  const finFlutter = Math.sin(time*8+f.bodyPhase)*3;
  ctx.moveTo(-s*0.15, -s*0.2+bob);
  ctx.quadraticCurveTo(-s*0.35, -s*0.3+bob+finFlutter, -s*0.2, -s*0.05+bob);
  ctx.fillStyle=lightenColor(f.color,20);
  ctx.globalAlpha=0.6;
  ctx.fill();
  ctx.globalAlpha=1;

  // Eye
  ctx.beginPath();
  ctx.arc(s*0.08, -s*0.55+bob, s*0.06, 0, Math.PI*2);
  ctx.fillStyle='#fff';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s*0.1, -s*0.55+bob, s*0.03, 0, Math.PI*2);
  ctx.fillStyle='#111';
  ctx.fill();

  // Ridge lines on body
  ctx.strokeStyle=darkenColor(f.color,30);
  ctx.lineWidth=0.8;
  for(let i=0;i<5;i++){
    const ry = -s*0.3+i*s*0.12+bob;
    ctx.beginPath();
    ctx.moveTo(-s*0.15, ry);
    ctx.lineTo(s*0.15, ry);
    ctx.globalAlpha=0.3;
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawJellyfish(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const s = f.size;
  const pulse = Math.sin(f.pulsePhase);
  const squish = 1 + pulse*0.15; // contract/expand

  if(isNightMode()){
    ctx.shadowColor=f.color;
    ctx.shadowBlur=18+pulse*6;
  }

  // Translucent dome (bell)
  ctx.globalAlpha=0.4;
  ctx.beginPath();
  const bellW = s*0.5*squish;
  const bellH = s*0.35/squish;
  ctx.ellipse(0, 0, bellW, bellH, 0, Math.PI, 0);
  // Close bottom with slight curve
  ctx.quadraticCurveTo(bellW*0.5, bellH*0.3, 0, bellH*0.1);
  ctx.quadraticCurveTo(-bellW*0.5, bellH*0.3, -bellW, 0);
  const jGrad = ctx.createRadialGradient(0, -bellH*0.3, 2, 0, 0, bellW);
  jGrad.addColorStop(0, lightenColor(f.color,60));
  jGrad.addColorStop(0.6, f.color);
  jGrad.addColorStop(1, darkenColor(f.color,20));
  ctx.fillStyle=jGrad;
  ctx.fill();

  // Inner dome highlight
  ctx.globalAlpha=0.2;
  ctx.beginPath();
  ctx.ellipse(0, -bellH*0.2, bellW*0.5, bellH*0.4, 0, Math.PI, 0);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fill();

  // Trailing tentacles
  ctx.globalAlpha=0.35;
  ctx.strokeStyle=f.color;
  ctx.lineWidth=1.2;
  const tentCount = 7;
  for(let i=0;i<tentCount;i++){
    const tx = -bellW*0.7 + i*(bellW*1.4/tentCount);
    ctx.beginPath();
    ctx.moveTo(tx, bellH*0.05);
    const tentLen = s*0.5 + Math.sin(i*1.3)*s*0.15;
    const sway1 = Math.sin(time*1.5+i*0.8+f.tailPhase)*8;
    const sway2 = Math.sin(time*2+i*1.2+f.bodyPhase)*5;
    ctx.quadraticCurveTo(tx+sway1, bellH*0.05+tentLen*0.5, tx+sway2, bellH*0.05+tentLen);
    ctx.stroke();
  }

  // Glow effect (subtle)
  ctx.globalAlpha=0.08+pulse*0.04;
  ctx.beginPath();
  ctx.arc(0, 0, s*0.7, 0, Math.PI*2);
  ctx.fillStyle=f.color;
  ctx.fill();

  ctx.globalAlpha=1;
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawPufferfish(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const dir = Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s = f.size;
  const puff = f.puffed > 0 ? 1.4 : 1; // inflate when puffed
  const tailWag = Math.sin(time*6+f.tailPhase)*0.3;
  const bodyWag = Math.sin(time*5+f.bodyPhase)*0.02*s;

  if(isNightMode()){
    ctx.shadowColor=f.color;
    ctx.shadowBlur=10;
  }

  ctx.globalAlpha=0.95;

  // Small tail
  ctx.beginPath();
  const tailX = -s*0.4*puff;
  ctx.moveTo(tailX, 0);
  ctx.lineTo(tailX-s*0.2, -s*0.15+tailWag*s*0.1);
  ctx.lineTo(tailX-s*0.15, 0);
  ctx.lineTo(tailX-s*0.2, s*0.15+tailWag*s*0.1);
  ctx.closePath();
  ctx.fillStyle=darkenColor(f.color,20);
  ctx.fill();

  // Round body
  ctx.beginPath();
  ctx.arc(0, bodyWag, s*0.38*puff, 0, Math.PI*2);
  const bGrad = ctx.createRadialGradient(-s*0.1, bodyWag-s*0.1, s*0.05, 0, bodyWag, s*0.38*puff);
  bGrad.addColorStop(0, lightenColor(f.color,40));
  bGrad.addColorStop(0.7, f.color);
  bGrad.addColorStop(1, darkenColor(f.color,20));
  ctx.fillStyle=bGrad;
  ctx.fill();

  // Belly (lighter bottom half)
  ctx.beginPath();
  ctx.ellipse(0, bodyWag+s*0.1*puff, s*0.3*puff, s*0.2*puff, 0, 0, Math.PI);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fill();

  // Spikes (only visible when puffed)
  if(f.puffed > 0){
    ctx.strokeStyle=darkenColor(f.color,30);
    ctx.lineWidth=1.5;
    const spikeCount = 12;
    for(let i=0;i<spikeCount;i++){
      const a = (i/spikeCount)*Math.PI*2;
      const baseR = s*0.38*puff;
      const spikeLen = s*0.12;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*baseR, bodyWag+Math.sin(a)*baseR);
      ctx.lineTo(Math.cos(a)*(baseR+spikeLen), bodyWag+Math.sin(a)*(baseR+spikeLen));
      ctx.stroke();
    }
  } else {
    // Small dots (retracted spikes) on body
    ctx.fillStyle=darkenColor(f.color,15);
    for(let i=0;i<8;i++){
      const a = (i/8)*Math.PI*2;
      const r = s*0.3;
      ctx.beginPath();
      ctx.arc(Math.cos(a)*r, bodyWag+Math.sin(a)*r, 1, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Small fins
  ctx.beginPath();
  const pFinAngle = Math.sin(time*6+f.bodyPhase)*0.3;
  ctx.ellipse(s*0.15, bodyWag+s*0.1, s*0.08, s*0.04, pFinAngle+0.4, 0, Math.PI*2);
  ctx.fillStyle=f.color;
  ctx.globalAlpha=0.5;
  ctx.fill();

  // Dorsal fin (small)
  ctx.beginPath();
  ctx.moveTo(-s*0.05, bodyWag-s*0.35*puff);
  ctx.quadraticCurveTo(s*0.05, bodyWag-s*0.5*puff+Math.sin(time*5)*2, s*0.12, bodyWag-s*0.33*puff);
  ctx.fillStyle=f.color;
  ctx.globalAlpha=0.5;
  ctx.fill();
  ctx.globalAlpha=0.95;

  // Eye (big cute eye for pufferfish)
  const eyeX = s*0.2, eyeY = bodyWag-s*0.08;
  ctx.beginPath();ctx.arc(eyeX, eyeY, s*0.1, 0, Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.arc(eyeX+s*0.02, eyeY, s*0.06, 0, Math.PI*2);
  ctx.fillStyle='#111';ctx.fill();
  // Eye highlight
  ctx.beginPath();ctx.arc(eyeX+s*0.05, eyeY-s*0.03, s*0.025, 0, Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();

  // Small mouth
  ctx.beginPath();
  ctx.arc(s*0.35, bodyWag+s*0.02, s*0.03, 0, Math.PI);
  ctx.strokeStyle=darkenColor(f.color,40);
  ctx.lineWidth=1;
  ctx.stroke();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawWhale(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const dir = Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s = f.size;
  const tailWag = Math.sin(time*3+f.tailPhase)*0.3;
  const bodyWag = Math.sin(time*2+f.bodyPhase)*0.02*s;

  if(isNightMode()){
    ctx.shadowColor=f.color;
    ctx.shadowBlur=15;
  }

  ctx.globalAlpha=0.95;

  // Large tail flukes
  const tailX = -s*0.55;
  ctx.beginPath();
  ctx.moveTo(tailX, 0);
  // Upper fluke
  ctx.quadraticCurveTo(tailX-s*0.25, -s*0.15+tailWag*s*0.1, tailX-s*0.4, -s*0.25+tailWag*s*0.15);
  ctx.quadraticCurveTo(tailX-s*0.2, -s*0.05, tailX-s*0.15, 0);
  // Lower fluke
  ctx.quadraticCurveTo(tailX-s*0.2, s*0.05, tailX-s*0.4, s*0.25+tailWag*s*0.15);
  ctx.quadraticCurveTo(tailX-s*0.25, s*0.15+tailWag*s*0.1, tailX, 0);
  ctx.closePath();
  ctx.fillStyle=darkenColor(f.color,15);
  ctx.fill();

  // Main body (elongated ellipse)
  ctx.beginPath();
  ctx.ellipse(0, bodyWag, s*0.55, s*0.28, 0, 0, Math.PI*2);
  const bGrad = ctx.createLinearGradient(0, bodyWag-s*0.3, 0, bodyWag+s*0.3);
  bGrad.addColorStop(0, lightenColor(f.color,20));
  bGrad.addColorStop(0.4, f.color);
  bGrad.addColorStop(1, darkenColor(f.color,20));
  ctx.fillStyle=bGrad;
  ctx.fill();

  // Lighter belly
  ctx.beginPath();
  ctx.ellipse(s*0.05, bodyWag+s*0.12, s*0.4, s*0.15, 0, 0, Math.PI);
  ctx.fillStyle='rgba(200,215,230,0.2)';
  ctx.fill();

  // Pectoral fin
  ctx.beginPath();
  const pfinAngle = Math.sin(time*2+f.bodyPhase)*0.2;
  ctx.ellipse(-s*0.1, bodyWag+s*0.2, s*0.2, s*0.06, pfinAngle+0.5, 0, Math.PI*2);
  ctx.fillStyle=darkenColor(f.color,10);
  ctx.globalAlpha=0.6;
  ctx.fill();
  ctx.globalAlpha=0.95;

  // Dorsal fin (small hump)
  ctx.beginPath();
  ctx.moveTo(-s*0.15, bodyWag-s*0.26);
  ctx.quadraticCurveTo(-s*0.08, bodyWag-s*0.38, 0, bodyWag-s*0.26);
  ctx.fillStyle=f.color;
  ctx.fill();

  // Eye (small relative to body)
  const eyeX = s*0.38, eyeY = bodyWag-s*0.02;
  ctx.beginPath();ctx.arc(eyeX, eyeY, s*0.04, 0, Math.PI*2);
  ctx.fillStyle='#dde';ctx.fill();
  ctx.beginPath();ctx.arc(eyeX+s*0.01, eyeY, s*0.025, 0, Math.PI*2);
  ctx.fillStyle='#223';ctx.fill();

  // Mouth line
  ctx.beginPath();
  ctx.moveTo(s*0.45, bodyWag+s*0.05);
  ctx.quadraticCurveTo(s*0.55, bodyWag+s*0.08, s*0.5, bodyWag+s*0.12);
  ctx.strokeStyle=darkenColor(f.color,30);
  ctx.lineWidth=1.5;
  ctx.stroke();

  // Subtle highlight on top
  ctx.beginPath();
  ctx.ellipse(s*0.1, bodyWag-s*0.15, s*0.3, s*0.06, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function updateSpoutParticles(dt){
  spoutParticles = spoutParticles.filter(p=>{
    p.x+=p.vx*dt*30;
    p.y+=p.vy*dt*30;
    p.vy+=dt*2; // gravity
    p.life-=dt;
    p.alpha=Math.max(0, p.life);
    if(p.life<=0) return false;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle=`rgba(180,220,255,${p.alpha*0.5})`;
    ctx.fill();
    return true;
  });
}

function lightenColor(hex,amt){
  const c=hexToRgb(hex);if(!c)return hex;
  return`rgb(${Math.min(255,c.r+amt)},${Math.min(255,c.g+amt)},${Math.min(255,c.b+amt)})`;
}
function darkenColor(hex,amt){
  const c=hexToRgb(hex);if(!c)return hex;
  return`rgb(${Math.max(0,c.r-amt)},${Math.max(0,c.g-amt)},${Math.max(0,c.b-amt)})`;
}
function hexToRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if(!r){
    const s=/^#?([a-f\d])([a-f\d])([a-f\d])$/i.exec(hex);
    if(!s)return null;
    return{r:parseInt(s[1]+s[1],16),g:parseInt(s[2]+s[2],16),b:parseInt(s[3]+s[3],16)};
  }
  return{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)};
}

// --- BUBBLES UPDATE & DRAW ---
let bubbleTimer=0;
function updateAndDrawBubbles(dt){
  bubbleTimer+=dt;
  const interval=0.3/(cfg.bubbleRate*0.2+0.1);
  if(bubbleTimer>interval){
    bubbleTimer=0;
    const stone=airStones[Math.floor(Math.random()*airStones.length)];
    spawnBubble(stone);
  }

  bubbles=bubbles.filter(b=>{
    b.y-=b.speed*dt*60;
    b.x+=Math.sin(time*3+b.wobblePhase)*b.wobbleAmp*dt*20;
    if(b.y<40){b.alpha-=dt*2;}
    if(b.y<0||b.alpha<=0)return false;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(180,220,255,${b.alpha*0.6})`;
    ctx.lineWidth=0.8;ctx.stroke();
    ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.3,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,240,255,${b.alpha*0.4})`;ctx.fill();
    return true;
  });
}

function updateVolcanoBubbles(dt){
  volcanoBubbles=volcanoBubbles.filter(b=>{
    b.y-=b.speed*dt*60;
    b.x+=Math.sin(time*4+b.wobblePhase)*0.5*dt*20;
    b.life-=dt;
    b.alpha=Math.max(0,b.life*0.6);
    if(b.life<=0)return false;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,120,50,${b.alpha*0.4})`;
    ctx.fill();
    ctx.strokeStyle=`rgba(255,180,100,${b.alpha*0.3})`;
    ctx.lineWidth=0.6;
    ctx.stroke();
    return true;
  });
}

// --- FOOD ---
function updateFood(dt){
  foodParticles=foodParticles.filter(fd=>{
    if(fd.eaten){fd.alpha-=dt*4;if(fd.alpha<=0)return false;}
    else{
      fd.y+=fd.vy*dt*60;
      fd.x+=Math.sin(time*2+fd.x)*0.2;
      if(fd.y>sandY-5){fd.vy=0;}
      fd.alpha-=dt*0.05;
      if(fd.alpha<=0)return false;
    }
    ctx.beginPath();ctx.arc(fd.x,fd.y,fd.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,120,50,${fd.alpha})`;ctx.fill();
    return true;
  });
}

// --- WATER SURFACE ---
function drawSurface(){
  ctx.save();
  const surfGrad=ctx.createLinearGradient(0,0,0,25);
  surfGrad.addColorStop(0,'rgba(180,220,255,0.15)');
  surfGrad.addColorStop(0.3,'rgba(180,220,255,0.08)');
  surfGrad.addColorStop(1,'rgba(180,220,255,0)');
  ctx.fillStyle=surfGrad;
  ctx.beginPath();
  ctx.moveTo(0,0);
  for(let x=0;x<=W;x+=10){
    ctx.lineTo(x,3+Math.sin(x*0.04+time*1.5)*2);
  }
  ctx.lineTo(W,25);ctx.lineTo(0,25);ctx.closePath();ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=0;x<=W;x+=5){
    const y=6+Math.sin(x*0.05+time*2)*2+Math.sin(x*0.02+time*1.2)*1.5;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

// --- VIGNETTE ---
function drawVignette(){
  const grd=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.75);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(1,isNightMode()?'rgba(0,2,8,0.6)':'rgba(0,5,15,0.4)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
}

// --- MAIN LOOP ---
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  draw(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTime=ts;loop(ts)});

// Reinit on resize
addEventListener('resize',()=>{initPebbles();initRocks();initDecorations();});
</script>
