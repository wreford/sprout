<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aquarium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060e18;overflow:hidden;font-family:'SF Pro Display',system-ui,-apple-system,sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block}
#shell-counter{position:fixed;top:14px;left:18px;font-size:14px;color:rgba(255,255,255,0.6);z-index:100;font-family:'SF Pro Text',system-ui,sans-serif;pointer-events:none;text-shadow:0 1px 6px rgba(0,0,0,0.5);letter-spacing:0.3px;font-weight:400}
#gear{position:fixed;top:14px;right:16px;width:28px;height:28px;cursor:pointer;z-index:100;opacity:0.2;transition:opacity 0.4s ease}
#gear:hover{opacity:0.6}
#shop-btn{position:fixed;top:12px;right:52px;width:30px;height:30px;cursor:pointer;z-index:100;opacity:0.2;transition:opacity 0.4s ease;background:none;border:none;padding:0}
#shop-btn:hover{opacity:0.6}
#panel{position:fixed;top:52px;right:16px;background:rgba(4,12,24,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;width:230px;z-index:99;display:none;color:rgba(255,255,255,0.75);font-size:13px;backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
#panel label{display:block;margin:10px 0 4px;font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
#panel input[type=range]{width:100%;accent-color:#4db8ff;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.1);border-radius:2px;outline:none}
#panel input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#4db8ff;cursor:pointer;box-shadow:0 0 8px rgba(77,184,255,0.4)}
#panel .toggle{display:flex;align-items:center;justify-content:space-between;margin:10px 0}
#panel .toggle input{accent-color:#4db8ff}
#shop-panel{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:rgba(4,12,24,0.92);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:0;width:380px;max-width:92vw;max-height:80vh;z-index:101;display:none;color:rgba(255,255,255,0.8);font-size:13px;backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.5)}
.shop-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 4px}
.shop-tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,0.3);border-bottom:2px solid transparent;transition:all 0.3s ease;font-weight:500}
.shop-tab:hover{color:rgba(255,255,255,0.6)}
.shop-tab.active{color:#4db8ff;border-bottom-color:#4db8ff}
.shop-content{padding:12px 16px;max-height:60vh;overflow-y:auto}
.shop-content::-webkit-scrollbar{width:3px}
.shop-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin:3px 0;border-radius:10px;background:rgba(255,255,255,0.03);transition:background 0.3s ease;cursor:pointer;border:1px solid transparent}
.shop-item:hover{background:rgba(255,255,255,0.06)}
.shop-item.locked{opacity:0.35;cursor:not-allowed}
.shop-item.owned{border-color:rgba(100,255,120,0.12);background:rgba(100,255,120,0.03)}
.shop-item .item-info{flex:1}
.shop-item .item-name{font-size:13px;font-weight:500;letter-spacing:0.2px}
.shop-item .item-desc{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px}
.shop-item .item-price{font-size:13px;color:rgba(255,215,100,0.9);white-space:nowrap;margin-left:10px;font-weight:500}
.shop-item .item-owned{font-size:11px;color:rgba(100,255,120,0.7);margin-left:10px}
.shop-item .item-lock{font-size:10px;color:rgba(255,130,130,0.6);margin-left:10px}
.shop-header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 10px}
.shop-header .shop-title{font-size:15px;font-weight:600;letter-spacing:0.3px;color:rgba(255,255,255,0.85)}
.shop-header .shop-shells{font-size:13px;color:rgba(255,215,100,0.9)}
.shop-close{cursor:pointer;font-size:20px;color:rgba(255,255,255,0.25);padding:4px 8px;transition:color 0.3s}
.shop-close:hover{color:rgba(255,255,255,0.6)}
#goal-banner{position:fixed;top:-70px;left:50%;transform:translateX(-50%);background:rgba(8,16,32,0.9);border:1px solid rgba(255,215,100,0.2);color:rgba(255,255,255,0.9);padding:14px 28px;border-radius:14px;font-size:13px;font-weight:500;z-index:200;transition:top 0.6s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 32px rgba(0,0,0,0.4);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);letter-spacing:0.2px}
#goal-banner.show{top:14px}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.15);font-size:11px;font-family:'SF Pro Text',system-ui,sans-serif;z-index:100;pointer-events:none;transition:opacity 1.5s ease;letter-spacing:0.5px}
.goal-item{display:flex;align-items:center;padding:10px 12px;margin:3px 0;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid transparent}
.goal-item.completed{background:rgba(100,255,120,0.03);border-color:rgba(100,255,120,0.1)}
.goal-name{font-size:13px;font-weight:500}
.goal-desc{font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px}
.goal-reward{font-size:10px;color:rgba(255,215,100,0.7);margin-top:2px}
.goal-check{margin-right:10px;font-size:13px;opacity:0.7}
</style>
</head>
<body>
<div id="shell-counter">0</div>
<button id="shop-btn">
<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
<path d="M1 1h4l2.68 13.39a1 1 0 0 0 1 .61h9.72a1 1 0 0 0 .93-.64L23 6H6"/>
</svg>
</button>
<svg id="gear" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round">
<circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
</svg>
<div id="panel">
<label>Fish Count</label>
<input type="range" id="sFish" min="8" max="40" value="18">
<label>Bubble Rate</label>
<input type="range" id="sBubble" min="1" max="10" value="5">
<label>Plant Density</label>
<input type="range" id="sPlant" min="3" max="12" value="7">
<label>Light Intensity</label>
<input type="range" id="sLight" min="0" max="10" value="6">
<div class="toggle"><span>Music</span><input type="checkbox" id="sMusic" checked></div>
</div>
<div id="shop-panel">
<div class="shop-header">
<span class="shop-title">Shop</span>
<span class="shop-shells" id="shop-shells">0</span>
<span class="shop-close" id="shop-close">&times;</span>
</div>
<div class="shop-tabs">
<div class="shop-tab active" data-tab="fish">Fish</div>
<div class="shop-tab" data-tab="decor">Decor</div>
<div class="shop-tab" data-tab="bg">Scenes</div>
<div class="shop-tab" data-tab="goals">Goals</div>
</div>
<div class="shop-content" id="shop-content"></div>
</div>
<div id="goal-banner"></div>
<div id="hint">click to scatter &middot; double-click to feed</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,sandY;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;sandY=H*0.82;}
resize();addEventListener('resize',resize);

// === PROGRESSION SYSTEM ===
const GOALS = [
  {id:'first-feed', name:'First Feeding', desc:'Drop food for the first time', reward:'Unlock Goldfish', shells:5},
  {id:'feed-10', name:'Feeding Frenzy', desc:'Feed the fish 10 times', reward:'Unlock Betta', shells:10},
  {id:'feed-50', name:'Master Feeder', desc:'Feed 50 times', reward:'Unlock Pufferfish', shells:25},
  {id:'watch-5', name:'Zen Watcher', desc:'Watch for 5 minutes', reward:'Unlock Blue Background', shells:10},
  {id:'watch-15', name:'Meditation Master', desc:'Watch for 15 minutes', reward:'Unlock Night Mode', shells:20},
  {id:'scatter-5', name:'Troublemaker', desc:'Scatter fish 5 times', reward:'Unlock Seahorse', shells:10},
  {id:'fish-20', name:'Big Tank', desc:'Have 20+ fish', reward:'Unlock Jellyfish', shells:15},
  {id:'fish-35', name:'Mega Tank', desc:'Have 35+ fish', reward:'Unlock Whale', shells:30},
  {id:'all-types', name:'Collector', desc:'Have every fish type', reward:'Unlock Rainbow Coral', shells:50},
  {id:'100-shells', name:'Shell Baron', desc:'Earn 100 shells', reward:'Unlock Treasure Chest Opens', shells:0},
  {id:'decorations', name:'Interior Designer', desc:'Place 3 decorations', reward:'Unlock Volcano Bubbles', shells:15},
];

const SHOP_FISH = [
  {id:'neon', name:'Neon Tetra', price:5, unlock:null},
  {id:'clown', name:'Clownfish', price:8, unlock:null},
  {id:'angel', name:'Angelfish', price:10, unlock:null},
  {id:'goldfish', name:'Goldfish', price:12, unlock:'first-feed'},
  {id:'betta', name:'Betta', price:15, unlock:'feed-10'},
  {id:'seahorse', name:'Seahorse', price:15, unlock:'scatter-5'},
  {id:'jellyfish', name:'Jellyfish', price:20, unlock:'fish-20'},
  {id:'pufferfish', name:'Pufferfish', price:20, unlock:'feed-50'},
  {id:'whale', name:'Mini Whale', price:40, unlock:'fish-35'},
];

const SHOP_DECOR = [
  {id:'coral', name:'Coral', desc:'Pink/orange branching coral', price:10, unlock:null},
  {id:'castle', name:'Castle', desc:'Underwater castle', price:15, unlock:null},
  {id:'ship', name:'Sunken Ship', desc:'Old shipwreck', price:20, unlock:null},
  {id:'volcano', name:'Volcano', desc:'Bubbles from the top', price:25, unlock:'decorations'},
];

const SHOP_BG = [
  {id:'default', name:'Deep Blue', desc:'Classic deep ocean', price:0, unlock:null},
  {id:'tropical', name:'Tropical', desc:'Lighter turquoise waters', price:15, unlock:null},
  {id:'night', name:'Night', desc:'Dark with bioluminescent glow', price:15, unlock:'watch-15'},
  {id:'sunset', name:'Sunset', desc:'Warm oranges from above', price:15, unlock:'watch-5'},
];

// Save state
let save = {
  shells: 0,
  totalShellsEarned: 0,
  goalsCompleted: [],
  fishOwned: {},
  decorPlaced: [],
  background: 'default',
  feedCount: 0,
  scatterCount: 0,
  watchTime: 0,
};

function loadSave(){
  try {
    const raw = localStorage.getItem('aquarium-save');
    if(raw){
      const s = JSON.parse(raw);
      save = {...save, ...s};
    }
  } catch(e){}
}
function saveSave(){
  try { localStorage.setItem('aquarium-save', JSON.stringify(save)); } catch(e){}
}
loadSave();

function hasGoal(id){ return save.goalsCompleted.includes(id); }
function isUnlocked(unlockGoal){ return !unlockGoal || hasGoal(unlockGoal); }

// Shell display
const shellEl = document.getElementById('shell-counter');
function updateShellDisplay(){
  shellEl.textContent = save.shells + ' shells';
  const shopShells = document.getElementById('shop-shells');
  if(shopShells) shopShells.textContent = save.shells + ' shells';
}
function addShells(n){
  save.shells += n;
  save.totalShellsEarned += n;
  updateShellDisplay();
  checkGoals();
  saveSave();
}
updateShellDisplay();

// Goal notification
let goalBannerTimer = 0;
function showGoalBanner(goal){
  const el = document.getElementById('goal-banner');
  el.textContent = goal.name + ' — ' + goal.reward + (goal.shells>0 ? ' (+' + goal.shells + ')' : '');
  el.classList.add('show');
  goalBannerTimer = 3.5;
}

function completeGoal(goal){
  if(hasGoal(goal.id)) return;
  save.goalsCompleted.push(goal.id);
  addShells(goal.shells);
  showGoalBanner(goal);
  saveSave();
}

function checkGoals(){
  GOALS.forEach(g => {
    if(hasGoal(g.id)) return;
    switch(g.id){
      case 'first-feed': if(save.feedCount >= 1) completeGoal(g); break;
      case 'feed-10': if(save.feedCount >= 10) completeGoal(g); break;
      case 'feed-50': if(save.feedCount >= 50) completeGoal(g); break;
      case 'watch-5': if(save.watchTime >= 300) completeGoal(g); break;
      case 'watch-15': if(save.watchTime >= 900) completeGoal(g); break;
      case 'scatter-5': if(save.scatterCount >= 5) completeGoal(g); break;
      case 'fish-20': if(fishes.length >= 20) completeGoal(g); break;
      case 'fish-35': if(fishes.length >= 35) completeGoal(g); break;
      case 'all-types': {
        const allTypes = ['neon','angel','clown','goldfish','betta','seahorse','jellyfish','pufferfish','whale'];
        const inTank = new Set(fishes.map(f=>f.type));
        if(allTypes.every(t=>inTank.has(t))) completeGoal(g);
        break;
      }
      case '100-shells': if(save.totalShellsEarned >= 100) completeGoal(g); break;
      case 'decorations': if(save.decorPlaced.length >= 3) completeGoal(g); break;
    }
  });
}

// Passive shell income
let passiveShellTimer = 0;

// Watch time tracking
let watchTimer = 0;

// Settings
const cfg={fishCount:18,bubbleRate:5,plantCount:7,lightIntensity:0.6,music:true};
const gearEl=document.getElementById('gear'),panelEl=document.getElementById('panel');
gearEl.onclick=()=>{panelEl.style.display=panelEl.style.display==='none'?'block':'none';shopPanelEl.style.display='none';};
document.getElementById('sFish').oninput=e=>{cfg.fishCount=+e.target.value;syncFish()};
document.getElementById('sBubble').oninput=e=>cfg.bubbleRate=+e.target.value;
document.getElementById('sPlant').oninput=e=>{cfg.plantCount=+e.target.value;initPlants()};
document.getElementById('sLight').oninput=e=>cfg.lightIntensity=e.target.value/10;
document.getElementById('sMusic').onchange=e=>{cfg.music=e.target.checked;toggleMusic()};

// Shop UI
const shopBtnEl=document.getElementById('shop-btn');
const shopPanelEl=document.getElementById('shop-panel');
const shopContentEl=document.getElementById('shop-content');
let currentShopTab='fish';

shopBtnEl.onclick=()=>{
  shopPanelEl.style.display=shopPanelEl.style.display==='none'?'block':'none';
  panelEl.style.display='none';
  renderShop();
};
document.getElementById('shop-close').onclick=()=>{shopPanelEl.style.display='none';};

document.querySelectorAll('.shop-tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.shop-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentShopTab=tab.dataset.tab;
    renderShop();
  };
});

function renderShop(){
  updateShellDisplay();
  let html='';
  if(currentShopTab==='fish'){
    SHOP_FISH.forEach(item=>{
      const unlocked = isUnlocked(item.unlock);
      const goal = item.unlock ? GOALS.find(g=>g.id===item.unlock) : null;
      const lockText = (!unlocked && goal) ? 'Requires: '+goal.name : '';
      html += '<div class="shop-item'+(unlocked?'':' locked')+'" data-action="buy-fish" data-id="'+item.id+'" data-price="'+item.price+'">';
      html += '<div class="item-info"><div class="item-name">'+item.name+'</div>'+(lockText?'<div class="item-desc">'+lockText+'</div>':'')+'</div>';
      html += unlocked?'<div class="item-price">'+item.price+'</div>':'<div class="item-lock">Locked</div>';
      html += '</div>';
    });
  } else if(currentShopTab==='decor'){
    SHOP_DECOR.forEach(item=>{
      const unlocked = isUnlocked(item.unlock);
      const goal = item.unlock ? GOALS.find(g=>g.id===item.unlock) : null;
      const lockText = (!unlocked && goal) ? 'Requires: '+goal.name : '';
      const owned = save.decorPlaced.includes(item.id);
      html += '<div class="shop-item'+(unlocked?'':' locked')+(owned?' owned':'')+'" data-action="buy-decor" data-id="'+item.id+'" data-price="'+item.price+'">';
      html += '<div class="item-info"><div class="item-name">'+item.name+'</div><div class="item-desc">'+(owned?'Placed':item.desc)+(lockText?' • '+lockText:'')+'</div></div>';
      html += owned?'<div class="item-owned">Placed</div>':unlocked?'<div class="item-price">'+item.price+'</div>':'<div class="item-lock">Locked</div>';
      html += '</div>';
    });
  } else if(currentShopTab==='bg'){
    SHOP_BG.forEach(item=>{
      const unlocked = isUnlocked(item.unlock);
      const goal = item.unlock ? GOALS.find(g=>g.id===item.unlock) : null;
      const lockText = (!unlocked && goal) ? 'Requires: '+goal.name : '';
      const selected = save.background === item.id;
      const owned = item.price===0 || save.background===item.id || (save['bg_'+item.id]);
      html += '<div class="shop-item'+(unlocked?'':' locked')+(selected?' owned':'')+'" data-action="buy-bg" data-id="'+item.id+'" data-price="'+item.price+'">';
      html += '<div class="item-info"><div class="item-name">'+item.name+'</div><div class="item-desc">'+item.desc+(lockText?' • '+lockText:'')+'</div></div>';
      html += selected?'<div class="item-owned">Active</div>':owned&&unlocked?'<div class="item-price" style="color:rgba(100,255,120,0.7);cursor:pointer">Select</div>':unlocked?'<div class="item-price">'+item.price+'</div>':'<div class="item-lock">Locked</div>';
      html += '</div>';
    });
  } else if(currentShopTab==='goals'){
    GOALS.forEach(g=>{
      const done = hasGoal(g.id);
      html += '<div class="goal-item'+(done?' completed':'')+'">';
      html += '<div class="goal-check">'+(done?'✓':'○')+'</div>';
      html += '<div>';
      html += '<div class="goal-name">'+g.name+'</div>';
      html += '<div class="goal-desc">'+g.desc+'</div>';
      html += '<div class="goal-reward">'+g.reward+(g.shells>0?' • +'+g.shells+' shells':'')+'</div>';
      html += '</div></div>';
    });
  }
  shopContentEl.innerHTML=html;

  // Attach click handlers
  shopContentEl.querySelectorAll('.shop-item:not(.locked)').forEach(el=>{
    el.onclick=()=>{
      const action=el.dataset.action;
      const id=el.dataset.id;
      const price=+el.dataset.price;
      if(action==='buy-fish'){
        if(save.shells>=price){
          save.shells-=price;
          fishes.push(makeFish(id));
          cfg.fishCount=fishes.length;
          document.getElementById('sFish').value=cfg.fishCount;
          saveSave();
          checkGoals();
          renderShop();
        }
      } else if(action==='buy-decor'){
        if(save.decorPlaced.includes(id)) return;
        if(save.shells>=price){
          save.shells-=price;
          save.decorPlaced.push(id);
          initDecorations();
          saveSave();
          checkGoals();
          renderShop();
        }
      } else if(action==='buy-bg'){
        const selected = save.background===id;
        if(selected) return;
        const owned = price===0 || save['bg_'+id];
        if(owned){
          save.background=id;
          saveSave();
          renderShop();
        } else if(save.shells>=price){
          save.shells-=price;
          save['bg_'+id]=true;
          save.background=id;
          saveSave();
          renderShop();
        }
      }
      updateShellDisplay();
    };
  });
}

// Hint fade
setTimeout(()=>{const h=document.getElementById('hint');if(h)h.style.opacity='0';setTimeout(()=>{if(h)h.remove()},1500)},7000);

// --- WEB AUDIO AMBIENT ---
let audioCtx,musicGain,masterGain,musicStarted=false;
let waterNoiseNode=null,waterNoiseGain=null;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.18;masterGain.connect(audioCtx.destination);
  musicGain=audioCtx.createGain();musicGain.gain.value=cfg.music?1:0;musicGain.connect(masterGain);

  // Warm ambient pad - richer chord voicing (Cmaj7 spread)
  const padNotes=[65.41,98,130.81,164.81,196,261.63];
  padNotes.forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    osc.type= i<2 ? 'triangle' : 'sine';
    osc.frequency.value=f;
    const g=audioCtx.createGain();g.gain.value= i<2 ? 0.04 : 0.025;
    const flt=audioCtx.createBiquadFilter();flt.type='lowpass';flt.frequency.value=180+i*30;flt.Q.value=0.7;
    osc.connect(flt);flt.connect(g);g.connect(musicGain);osc.start();
    // Slow breathing LFO
    const lfo=audioCtx.createOscillator();lfo.frequency.value=0.03+i*0.012;
    const lfoG=audioCtx.createGain();lfoG.gain.value=0.015;
    lfo.connect(lfoG);lfoG.connect(g.gain);lfo.start();
  });

  // Second layer: very quiet high shimmer
  const shimmer=audioCtx.createOscillator();shimmer.type='sine';shimmer.frequency.value=523.25;
  const shimG=audioCtx.createGain();shimG.gain.value=0.008;
  const shimFlt=audioCtx.createBiquadFilter();shimFlt.type='lowpass';shimFlt.frequency.value=600;shimFlt.Q.value=0.5;
  shimmer.connect(shimFlt);shimFlt.connect(shimG);shimG.connect(musicGain);shimmer.start();
  const shimLfo=audioCtx.createOscillator();shimLfo.frequency.value=0.07;
  const shimLfoG=audioCtx.createGain();shimLfoG.gain.value=0.006;
  shimLfo.connect(shimLfoG);shimLfoG.connect(shimG.gain);shimLfo.start();

  // Continuous water ambience via filtered noise
  const bufferSize=audioCtx.sampleRate*2;
  const noiseBuffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const output=noiseBuffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){output[i]=(Math.random()*2-1);}
  waterNoiseNode=audioCtx.createBufferSource();
  waterNoiseNode.buffer=noiseBuffer;
  waterNoiseNode.loop=true;
  const noiseFlt=audioCtx.createBiquadFilter();noiseFlt.type='bandpass';noiseFlt.frequency.value=400;noiseFlt.Q.value=0.3;
  waterNoiseGain=audioCtx.createGain();waterNoiseGain.gain.value=0.015;
  // Slow modulation on the water noise
  const noiseLfo=audioCtx.createOscillator();noiseLfo.frequency.value=0.12;
  const noiseLfoG=audioCtx.createGain();noiseLfoG.gain.value=0.008;
  noiseLfo.connect(noiseLfoG);noiseLfoG.connect(waterNoiseGain.gain);noiseLfo.start();
  waterNoiseNode.connect(noiseFlt);noiseFlt.connect(waterNoiseGain);waterNoiseGain.connect(musicGain);
  waterNoiseNode.start();

  // Bubble sounds with variety
  scheduleBubbleSound();

  musicStarted=true;
}

function scheduleBubbleSound(){
  if(!audioCtx)return;
  const delay=1500+Math.random()*4000;
  setTimeout(()=>{
    if(!cfg.music||!audioCtx){scheduleBubbleSound();return;}
    // Vary pitch by "size"
    const sizeRand=Math.random();
    const baseFreq = sizeRand<0.3 ? 400+Math.random()*300 : sizeRand<0.7 ? 700+Math.random()*500 : 1200+Math.random()*800;
    const dur = sizeRand<0.3 ? 0.25 : sizeRand<0.7 ? 0.15 : 0.08;
    const vol = sizeRand<0.3 ? 0.025 : sizeRand<0.7 ? 0.015 : 0.01;
    const osc=audioCtx.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(baseFreq,audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(baseFreq*0.3,audioCtx.currentTime+dur);
    const g=audioCtx.createGain();g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    osc.connect(g);g.connect(masterGain);osc.start();osc.stop(audioCtx.currentTime+dur+0.01);
    scheduleBubbleSound();
  },delay);
}

// --- NOISE FUNCTIONS for caustics ---
// Simplex-like 2D noise for organic caustics
const PERM=new Uint8Array(512);
(function(){const p=[];for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}for(let i=0;i<512;i++)PERM[i]=p[i&255];})();
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+t*(b-a);}
function grad2d(hash,x,y){const h=hash&3;return((h&1)?-x:x)+((h&2)?-y:y);}
function noise2d(x,y){
  const xi=Math.floor(x)&255,yi=Math.floor(y)&255;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=fade(xf),v=fade(yf);
  const aa=PERM[PERM[xi]+yi],ab=PERM[PERM[xi]+yi+1],ba=PERM[PERM[xi+1]+yi],bb=PERM[PERM[xi+1]+yi+1];
  return lerp(lerp(grad2d(aa,xf,yf),grad2d(ba,xf-1,yf),u),lerp(grad2d(ab,xf,yf-1),grad2d(bb,xf-1,yf-1),u),v);
}

// --- COLOR UTILS ---
function hexToRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if(!r){
    const s=/^#?([a-f\d])([a-f\d])([a-f\d])$/i.exec(hex);
    if(!s)return null;
    return{r:parseInt(s[1]+s[1],16),g:parseInt(s[2]+s[2],16),b:parseInt(s[3]+s[3],16)};
  }
  return{r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)};
}
function lightenColor(hex,amt){
  const c=hexToRgb(hex);if(!c)return hex;
  return'rgb('+Math.min(255,c.r+amt)+','+Math.min(255,c.g+amt)+','+Math.min(255,c.b+amt)+')';
}
function darkenColor(hex,amt){
  const c=hexToRgb(hex);if(!c)return hex;
  return'rgb('+Math.max(0,c.r-amt)+','+Math.max(0,c.g-amt)+','+Math.max(0,c.b-amt)+')';
}
function colorWithAlpha(hex,a){
  const c=hexToRgb(hex);if(!c)return hex;
  return'rgba('+c.r+','+c.g+','+c.b+','+a+')';
}

// --- MAIN DRAW ---
let time=0;
function draw(dt){
  time+=dt;
  ctx.clearRect(0,0,W,H);

  // Water gradient - deep feel
  ctx.fillStyle=getBgGradient();
  ctx.fillRect(0,0,W,H);

  // Depth tint overlay - darker at bottom

  depthGrad.addColorStop(0,'rgba(20,60,100,0)');
  depthGrad.addColorStop(0.7,'rgba(5,15,30,0.08)');
  depthGrad.addColorStop(1,'rgba(2,8,18,0.15)');
  ctx.fillStyle=depthGrad;
  ctx.fillRect(0,0,W,sandY);

  // Light rays
  drawLightRays();

  // Caustics on sand
  drawCaustics();

  // Sand
  drawSand();

  // Pebbles
  pebbles.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();
  });

  // Rocks
  drawRocks();

  // Player decorations
  drawDecorations();

  // Treasure chest
  drawChest();

  // Plants (back layer)
  drawPlants();

  // Fish
  updateAndDrawFish(dt);

  // Bubbles
  updateAndDrawBubbles(dt);

  // Volcano bubbles
  updateVolcanoBubbles(dt);

  // Whale spout particles
  updateSpoutParticles(dt);

  // Food
  updateFood(dt);

  // Chest sparkles
  updateChestSparkles(dt);

  // Water surface shimmer
  drawSurface();

  // Gentle vignette
  drawVignette();

  // Very subtle blue-green tint
  if(!isNightMode()){
    ctx.fillStyle='rgba(8,30,60,0.05)';
    ctx.fillRect(0,0,W,H);
  }

  // Goal banner timer
  if(goalBannerTimer>0){
    goalBannerTimer-=dt;
    if(goalBannerTimer<=0){
      document.getElementById('goal-banner').classList.remove('show');
    }
  }

  // Passive shell income
  passiveShellTimer+=dt;
  if(passiveShellTimer>=30){
    passiveShellTimer-=30;
    addShells(1);
  }

  // Watch time
  watchTimer+=dt;
  if(watchTimer>=1){
    const secs=Math.floor(watchTimer);
    save.watchTime+=secs;
    watchTimer-=secs;
    if(save.watchTime%10===0){
      saveSave();
      checkGoals();
    }
  }

  // Treasure chest cycle
  if(hasGoal('100-shells')){
    chestTimer+=dt;
    if(chestTimer>8){
      chestTimer=0;
      chestOpen=!chestOpen;
      if(chestOpen){
        for(let i=0;i<6;i++){

            life:2+Math.random(),
            alpha:1,
            size:1.5+Math.random()*2
          });
        }
      }

  }

  // Volcano bubbles
  if(save.decorPlaced.includes('volcano') && hasGoal('decorations')){
    decorations.forEach(d=>{
      if(d.id==='volcano'){
        if(Math.random()<0.15) spawnVolcanoBubble(d.x, d.y-38);
      }
    });
  }
}

function drawLightRays(){
  const intensity=cfg.lightIntensity;
  if(intensity<0.05)return;
  if(isNightMode()) return;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<6;i++){
    const cx=W*0.1+i*W*0.16+Math.sin(time*0.15+i*1.7)*40;
    const w=25+Math.sin(time*0.25+i*0.9)*12;
    const spread=Math.sin(time*0.12+i*1.1)*25;
    ctx.beginPath();
    ctx.moveTo(cx-w,0);
    ctx.lineTo(cx+w,0);
    ctx.lineTo(cx+w*0.2+spread,sandY+20);
    ctx.lineTo(cx-w*0.2+spread,sandY+20);
    ctx.closePath();
    const rayGrad=ctx.createLinearGradient(0,0,0,sandY);
    rayGrad.addColorStop(0,'rgba(100,180,255,'+(0.025*intensity)+')');
    rayGrad.addColorStop(0.5,'rgba(80,160,230,'+(0.015*intensity)+')');
    rayGrad.addColorStop(1,'rgba(60,140,200,0)');
    ctx.fillStyle=rayGrad;
    ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  ctx.restore();
}

function drawCaustics(){
  const intensity=cfg.lightIntensity;
  if(intensity<0.05)return;
  // Render caustics at 1/4 resolution for performance, using Perlin noise
  const cw=causticCanvas.width,ch=causticCanvas.height;
  const cctx=causticCtx2;
  cctx.clearRect(0,0,cw,ch);
  const t=time*0.4;
  const imgData=cctx.createImageData(cw,ch);
  const d=imgData.data;
  for(let y=0;y<ch;y++){
    for(let x=0;x<cw;x++){
      const wx=x*4, wy=y*4;
      const n1=noise2d(wx*0.008+t*0.7, wy*0.01+t*0.3);
      const n2=noise2d(wx*0.012-t*0.5, wy*0.008+t*0.6);
      const v=(n1+n2)*0.5+0.5;
      const bright=Math.max(0,v-0.45)*3.0;
      if(bright>0){
        const idx=(y*cw+x)*4;
        const a=Math.min(1,bright)*intensity*0.35;
        d[idx]=140;d[idx+1]=210;d[idx+2]=255;d[idx+3]=a*255|0;
      }
    }
  }
  cctx.putImageData(imgData,0,0);
  ctx.save();
  ctx.globalAlpha=0.6;
  ctx.globalCompositeOperation='lighter';
  ctx.drawImage(causticCanvas,0,sandY-20,W,H-sandY+40);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawSand(){
  const grad=ctx.createLinearGradient(0,sandY,0,H);
  grad.addColorStop(0,'#b8975a');
  grad.addColorStop(0.15,'#a88a50');
  grad.addColorStop(0.4,'#967d48');
  grad.addColorStop(1,'#7a6438');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=8){
    const undulation=Math.sin(x*0.02+0.8)*2.5+Math.sin(x*0.05+2.1)*1.2;
    ctx.lineTo(x,sandY+undulation);
  }
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();

  // Sand texture - subtle grain
  ctx.fillStyle='rgba(0,0,0,0.03)';
  for(let i=0;i<100;i++){
    const sx=((i*137.5)%W),sy=sandY+4+((i*73.1)%(H-sandY-10));
    ctx.beginPath();ctx.arc(sx,sy,0.6+Math.random()*0.4,0,Math.PI*2);ctx.fill();
  }
  // Lighter grain
  ctx.fillStyle='rgba(255,230,180,0.03)';
  for(let i=0;i<60;i++){
    const sx=((i*193.7+50)%W),sy=sandY+3+((i*97.3+20)%(H-sandY-10));
    ctx.beginPath();ctx.arc(sx,sy,0.5+Math.random()*0.3,0,Math.PI*2);ctx.fill();
  }
}

function drawRocks(){
  rocks.forEach(r=>{
    ctx.save();
    ctx.beginPath();
    // Smoother rock shape using multiple bezier curves
    const cx=r.x, cy=r.y-r.h*0.3, rw=r.w*0.5, rh=r.h*0.55;
    ctx.moveTo(cx-rw,cy+rh*0.2);
    ctx.bezierCurveTo(cx-rw,cy-rh*0.5, cx-rw*0.3,cy-rh, cx,cy-rh);
    ctx.bezierCurveTo(cx+rw*0.3,cy-rh, cx+rw,cy-rh*0.5, cx+rw,cy+rh*0.2);
    ctx.bezierCurveTo(cx+rw*0.8,cy+rh*0.5, cx-rw*0.8,cy+rh*0.5, cx-rw,cy+rh*0.2);
    ctx.closePath();
    const g=ctx.createRadialGradient(cx-rw*0.2,cy-rh*0.4,2,cx,cy,rw);
    g.addColorStop(0,lightenColor(r.color,20));g.addColorStop(1,r.color);
    ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  });
}

function drawDecorations(){
  decorations.forEach(d=>{
    if(d.id==='coral') drawCoral(d.x, d.y);
    else if(d.id==='castle') drawCastle(d.x, d.y);
    else if(d.id==='ship') drawShip(d.x, d.y);
    else if(d.id==='volcano') drawVolcano(d.x, d.y);
  });
}

function drawCoral(cx, cy){
  ctx.save();
  const branches = [
    {angle:-0.3, len:36, color:'#ff5580', w:5},
    {angle:-0.8, len:29, color:'#ff7755', w:4.5},
    {angle:0.15, len:33, color:'#ff6670', w:5},
    {angle:0.65, len:26, color:'#ffaa66', w:4},
    {angle:-1.15, len:21, color:'#ff8877', w:3.5},
    {angle:0.4, len:18, color:'#ff9988', w:3},
  ];
  branches.forEach(b=>{
    const sway = Math.sin(time*0.4+b.angle*2)*3;
    ctx.strokeStyle=b.color;
    ctx.lineWidth=b.w;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx, cy-5);
    const ex = cx + Math.sin(b.angle)*b.len + sway;
    const ey = cy - 5 - Math.cos(b.angle)*b.len;
    const cp1x = cx + Math.sin(b.angle)*b.len*0.35 + sway*0.3;
    const cp1y = cy - 5 - Math.cos(b.angle)*b.len*0.4;
    const cp2x = cx + Math.sin(b.angle)*b.len*0.7 + sway*0.7;
    const cp2y = cy - 5 - Math.cos(b.angle)*b.len*0.85;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,ex,ey);
    ctx.stroke();
    // Polyp bulbs at tips
    ctx.beginPath();
    ctx.arc(ex, ey, b.w*0.8, 0, Math.PI*2);
    ctx.fillStyle=lightenColor(b.color,30);
    ctx.fill();
    // Sub-branches
    if(b.len>22){
      const subAngle=b.angle+(b.angle>0?0.4:-0.4);
      const subSway=Math.sin(time*0.5+subAngle)*2;
      const midX=cx+Math.sin(b.angle)*b.len*0.5+sway*0.4;
      const midY=cy-5-Math.cos(b.angle)*b.len*0.5;
      const subEx=midX+Math.sin(subAngle)*b.len*0.35+subSway;
      const subEy=midY-Math.cos(subAngle)*b.len*0.35;
      ctx.strokeStyle=lightenColor(b.color,15);
      ctx.lineWidth=b.w*0.6;
      ctx.beginPath();ctx.moveTo(midX,midY);
      ctx.quadraticCurveTo(midX+Math.sin(subAngle)*b.len*0.2+subSway*0.5,(midY+subEy)*0.5,subEx,subEy);
      ctx.stroke();
      ctx.beginPath();ctx.arc(subEx,subEy,b.w*0.5,0,Math.PI*2);
      ctx.fillStyle=lightenColor(b.color,40);ctx.fill();
    }
  });
  // Base rock
  ctx.beginPath();
  ctx.ellipse(cx, cy-2, 12, 6, 0, 0, Math.PI*2);
  ctx.fillStyle='#8a4455';
  ctx.fill();
  ctx.restore();
}

function drawCastle(cx, cy){
  ctx.save();
  const stoneColor='#7a8898';
  const darkStone='#556070';
  const mortar='#5a6878';
  // Main tower
  ctx.fillStyle=stoneColor;
  ctx.beginPath();
  ctx.moveTo(cx-15,cy);ctx.lineTo(cx-15,cy-42);ctx.lineTo(cx+15,cy-42);ctx.lineTo(cx+15,cy);ctx.closePath();ctx.fill();
  // Side turrets
  ctx.fillStyle=darkenColor(stoneColor,8);
  ctx.fillRect(cx-23, cy-52, 15, 52);
  ctx.fillRect(cx+8, cy-52, 15, 52);
  // Battlements
  ctx.fillStyle=stoneColor;
  for(let i=0;i<3;i++){
    ctx.fillRect(cx-23+i*6, cy-58, 4, 6);
    ctx.fillRect(cx+8+i*6, cy-58, 4, 6);
  }
  for(let i=0;i<3;i++){
    ctx.fillRect(cx-13+i*8, cy-48, 5, 6);
  }
  // Stone lines
  ctx.strokeStyle=mortar;ctx.lineWidth=0.5;ctx.globalAlpha=0.3;
  for(let y=cy-5;y>cy-50;y-=6){
    ctx.beginPath();ctx.moveTo(cx-14,y);ctx.lineTo(cx+14,y);ctx.stroke();
  }
  ctx.globalAlpha=1;
  // Arched door
  ctx.fillStyle=darkStone;
  ctx.beginPath();
  ctx.arc(cx, cy-10, 7, Math.PI, 0);
  ctx.fillRect(cx-7, cy-10, 14, 10);
  ctx.fill();
  // Door depth
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.arc(cx, cy-10, 5, Math.PI, 0);ctx.fillRect(cx-5, cy-10, 10, 8);ctx.fill();
  // Windows with glow
  const windowGlow=0.35+Math.sin(time*1.5)*0.12;
  ctx.fillStyle='rgba(140,200,255,'+windowGlow+')';
  ctx.beginPath();ctx.arc(cx, cy-30, 3.5, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx-15, cy-35, 2.5, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+15, cy-35, 2.5, 0, Math.PI*2);ctx.fill();
  // Window cross bars
  ctx.strokeStyle='rgba(90,120,140,0.5)';ctx.lineWidth=0.8;
  [cx,cx-15,cx+15].forEach((wx,i)=>{
    const wy=i===0?cy-30:cy-35;const wr=i===0?3.5:2.5;
    ctx.beginPath();ctx.moveTo(wx-wr,wy);ctx.lineTo(wx+wr,wy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx,wy-wr);ctx.lineTo(wx,wy+wr);ctx.stroke();
  });
  // Moss patches
  ctx.fillStyle='rgba(60,120,60,0.25)';
  ctx.beginPath();ctx.ellipse(cx-18,cy-3,5,3,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+20,cy-8,4,2.5,-0.15,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawShip(cx, cy){
  ctx.save();
  // Hull - smooth curved shape
  const hullGrad=ctx.createLinearGradient(cx-35,cy,cx+30,cy-12);
  hullGrad.addColorStop(0,'#4a2e12');hullGrad.addColorStop(1,'#5c3a18');
  ctx.fillStyle=hullGrad;
  ctx.beginPath();
  ctx.moveTo(cx-38, cy-8);
  ctx.bezierCurveTo(cx-35,cy-14, cx+25,cy-14, cx+32,cy-8);
  ctx.bezierCurveTo(cx+28,cy+2, cx-30,cy+2, cx-38,cy-8);
  ctx.closePath();
  ctx.fill();
  // Deck planks
  ctx.fillStyle='#6b4a2a';
  ctx.fillRect(cx-28, cy-16, 48, 7);
  // Plank lines
  ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=0.5;
  for(let px=cx-26;px<cx+18;px+=6){
    ctx.beginPath();ctx.moveTo(px,cy-16);ctx.lineTo(px,cy-9);ctx.stroke();
  }
  // Cabin
  ctx.fillStyle='#5a3a1a';
  ctx.fillRect(cx+5,cy-24,16,8);
  ctx.fillStyle='#6b4a2a';
  ctx.fillRect(cx+4,cy-26,18,3);
  // Mast (broken, tilted)
  ctx.save();
  ctx.translate(cx-8, cy-16);
  ctx.rotate(-0.12);
  ctx.fillStyle='#4a3020';
  ctx.fillRect(-2.5, -42, 5, 42);
  // Crow's nest remnant
  ctx.fillStyle='#3a2518';
  ctx.fillRect(-6,-43,12,3);
  // Tattered sail
  ctx.fillStyle='rgba(190,175,145,0.22)';
  ctx.beginPath();
  ctx.moveTo(3, -40);
  const sailFlutter=Math.sin(time*0.8)*3;
  ctx.bezierCurveTo(12,-34,18+sailFlutter,-28,16+sailFlutter,-20);
  ctx.lineTo(3, -18);
  ctx.closePath();
  ctx.fill();
  // Sail seams
  ctx.strokeStyle='rgba(150,140,120,0.15)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(3,-32);ctx.lineTo(14+sailFlutter*0.5,-26);ctx.stroke();
  ctx.restore();
  // Portholes
  ctx.strokeStyle='#8a6a3a';ctx.lineWidth=1.5;
  [-12,-2,8].forEach(ox=>{
    ctx.beginPath();ctx.arc(cx+ox, cy-4, 3, 0, Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(40,60,80,0.3)';ctx.fill();
  });
  // Barnacles / algae
  ctx.fillStyle='rgba(80,130,80,0.2)';
  ctx.beginPath();ctx.ellipse(cx-30,cy-2,6,3,0.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+22,cy-3,5,2.5,-0.2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawVolcano(cx, cy){
  ctx.save();
  // Cone with curved sides
  const grad = ctx.createLinearGradient(cx, cy, cx, cy-42);
  grad.addColorStop(0, '#504035');
  grad.addColorStop(0.5, '#453528');
  grad.addColorStop(1, '#3a2a1e');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(cx-32, cy);
  ctx.bezierCurveTo(cx-28,cy-15, cx-15,cy-35, cx-9,cy-40);
  ctx.lineTo(cx+9, cy-40);
  ctx.bezierCurveTo(cx+15,cy-35, cx+28,cy-15, cx+32,cy);
  ctx.closePath();
  ctx.fill();
  // Rock texture lines
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(cx-5,cy-38);ctx.bezierCurveTo(cx-15,cy-20,cx-20,cy-10,cx-28,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+6,cy-38);ctx.bezierCurveTo(cx+12,cy-22,cx+18,cy-12,cx+26,cy);ctx.stroke();
  // Crater
  ctx.fillStyle='#2a1a0e';
  ctx.beginPath();
  ctx.ellipse(cx, cy-40, 9, 5, 0, 0, Math.PI*2);
  ctx.fill();
  // Lava glow
  const glowPulse=0.15+Math.sin(time*1.5)*0.08;
  ctx.fillStyle='rgba(255,80,20,'+glowPulse+')';
  ctx.beginPath();ctx.arc(cx, cy-40, 12, 0, Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,120,40,'+(glowPulse*0.5)+')';
  ctx.beginPath();ctx.arc(cx, cy-40, 18, 0, Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawChest(){
  const cx=W*0.82,cy=sandY-2;
  const isOpen = chestOpen && hasGoal('100-shells');
  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(cx,cy+2,22,5,0,0,Math.PI*2);ctx.fill();
  // Body
  const bodyGrad=ctx.createLinearGradient(cx-18,cy,cx+18,cy-14);
  bodyGrad.addColorStop(0,'#5a3520');bodyGrad.addColorStop(1,'#6b4226');
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  ctx.moveTo(cx-18,cy);ctx.lineTo(cx+18,cy);ctx.lineTo(cx+16,cy-14);ctx.lineTo(cx-16,cy-14);ctx.closePath();ctx.fill();
  // Metal bands
  ctx.strokeStyle='#8a7040';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(cx-17,cy-4);ctx.lineTo(cx+17,cy-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-17,cy-10);ctx.lineTo(cx+17,cy-10);ctx.stroke();
  // Lid
  if(isOpen){
    ctx.fillStyle='#7a4f30';
    ctx.beginPath();
    ctx.moveTo(cx-17,cy-14);ctx.lineTo(cx+17,cy-14);
    ctx.bezierCurveTo(cx+16,cy-22,cx+8,cy-28,cx,cy-28);
    ctx.bezierCurveTo(cx-8,cy-28,cx-16,cy-22,cx-17,cy-14);
    ctx.fill();
    // Gold glow inside
    const glowA=0.4+Math.sin(time*2)*0.15;
    ctx.fillStyle='rgba(255,210,60,'+glowA+')';
    ctx.fillRect(cx-14,cy-14,28,7);
    // Coins peeking out
    ctx.fillStyle='rgba(255,215,0,0.7)';
    ctx.beginPath();ctx.arc(cx-5,cy-12,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+4,cy-13,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+1,cy-11,2,0,Math.PI*2);ctx.fill();
    // Bright glint
    ctx.fillStyle='rgba(255,240,120,'+(0.5+Math.sin(time*3)*0.2)+')';
    ctx.beginPath();ctx.arc(cx,cy-12,4+Math.sin(time*3)*1.5,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle='#7a4f30';
    ctx.beginPath();
    ctx.moveTo(cx-17,cy-14);ctx.lineTo(cx+17,cy-14);
    ctx.bezierCurveTo(cx+18,cy-20,cx+10,cy-25,cx,cy-25);
    ctx.bezierCurveTo(cx-10,cy-25,cx-18,cy-20,cx-17,cy-14);
    ctx.fill();
    // Metal band on lid
    ctx.strokeStyle='#8a7040';ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx-16,cy-18);
    ctx.bezierCurveTo(cx-12,cy-22,cx+12,cy-22,cx+16,cy-18);
    ctx.stroke();
  }
  // Latch
  ctx.fillStyle='#ffd700';
  ctx.beginPath();
  ctx.roundRect(cx-3,cy-16,6,4,1);
  ctx.fill();
  // Keyhole
  ctx.fillStyle='#4a3018';
  ctx.beginPath();ctx.arc(cx,cy-14,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function updateChestSparkles(dt){
  chestSparkles = chestSparkles.filter(s=>{
    s.x+=s.vx*dt*30;
    s.y+=s.vy*dt*30;
    s.vy+=dt*0.3;
    s.life-=dt;
    s.alpha=Math.max(0,s.life/2);
    if(s.life<=0) return false;
    ctx.save();
    ctx.globalAlpha=s.alpha;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    const scx=s.x,scy=s.y,r=s.size;
    for(let i=0;i<4;i++){
      const a = (i*Math.PI/2) + time*2;
      ctx.lineTo(scx+Math.cos(a)*r, scy+Math.sin(a)*r);
      const a2 = a + Math.PI/4;
      ctx.lineTo(scx+Math.cos(a2)*r*0.35, scy+Math.sin(a2)*r*0.35);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    return true;
  });
}

function drawPlants(){
  plants.forEach(p=>{
    ctx.save();
    const baseX=p.x, baseY=sandY;
    let prevX=baseX, prevY=baseY;
    for(let s=0;s<p.segments;s++){
      const t=s/p.segments;
      const t1=(s+1)/p.segments;
      const sd=p.segData[s];
      const swayAmount=t*t*18;
      const sway=Math.sin(time*p.speed*sd.speedMul+p.phase+sd.phaseOff+s*0.25)*swayAmount;
      const nextSwayAmount=t1*t1*18;
      const nextSway=Math.sin(time*p.speed*(sd.speedMul*0.95)+p.phase+sd.phaseOff+(s+1)*0.25)*nextSwayAmount;
      const segH=p.height/p.segments;
      const y1=baseY-s*segH;
      const y2=baseY-(s+1)*segH;
      const x1=baseX+sway*0.7;
      const x2=baseX+nextSway;
      const w1=p.width*(1-t*0.45)*sd.widthMul;
      const w2=p.width*(1-t1*0.45)*(s+1<p.segments?p.segData[Math.min(s+1,p.segments-1)].widthMul:0.5);
      const lightness=25+t*28;
      const alpha=0.85-t*0.15;
      ctx.fillStyle='hsla('+p.hue+',55%,'+lightness+'%,'+alpha+')';
      // Smooth leaf-like segment using bezier curves
      ctx.beginPath();
      ctx.moveTo(x1-w1/2,y1);
      const cpY=(y1+y2)/2;
      ctx.bezierCurveTo(x1-w1/2.5, cpY+segH*0.15, x2-w2/2, cpY-segH*0.1, x2-w2/2.2, y2);
      ctx.lineTo(x2+w2/2.2, y2);
      ctx.bezierCurveTo(x2+w2/2, cpY-segH*0.1, x1+w1/2.5, cpY+segH*0.15, x1+w1/2, y1);
      ctx.closePath();ctx.fill();
      // Central vein
      ctx.strokeStyle='hsla('+p.hue+',45%,'+(lightness-8)+'%,'+(alpha*0.4)+')';
      ctx.lineWidth=0.6;
      ctx.beginPath();ctx.moveTo((x1),y1);ctx.lineTo((x2),y2);ctx.stroke();
      prevX=x2;prevY=y2;
    }
    // Leaf tip
    const tipSway=Math.sin(time*p.speed+p.phase+p.segments*0.25)*18;
    const tipX=baseX+tipSway;
    const tipY=baseY-p.height;
    ctx.beginPath();
    ctx.ellipse(tipX,tipY-2,p.width*0.15,6,tipSway*0.04,0,Math.PI*2);
    ctx.fillStyle='hsla('+p.hue+',50%,52%,0.7)';ctx.fill();
    ctx.restore();
  });
}

// --- FISH UPDATE & DRAW ---
function updateAndDrawFish(dt){
  fishes.forEach(f=>{
    if(f.puffed>0) f.puffed=Math.max(0,f.puffed-dt);

    if(f.type==='seahorse'){
      f.bobPhase+=dt*2;
      f.y+=Math.sin(f.bobPhase)*0.3;
    }

    if(f.type==='jellyfish'){
      f.pulsePhase+=dt*2.5;
      if(Math.sin(f.pulsePhase)>0.5){
        f.y-=f.speed*0.5*dt*60;
      }
      f.y+=0.15*dt*60;
    }

    if(f.type==='whale'){
      f.spoutTimer-=dt;
      if(f.spoutTimer<=0 && f.y < sandY*0.3){
        for(let i=0;i<5;i++){
          spoutParticles.push({
            x:f.x+(Math.random()-0.5)*5,
            y:f.y-f.size*0.3,
            vx:(Math.random()-0.5)*0.8,
            vy:-1.5-Math.random()*2,
            life:0.8+Math.random()*0.5,
            alpha:0.6,
            r:1+Math.random()*2
          });
        }
        f.spoutTimer=8+Math.random()*12;
      }
    }

    // Scatter behavior - dramatic burst then smooth return
    if(f.scatterTimer>0){
      f.scatterTimer-=dt;
      // Ease out the scatter speed
      const scatterEase=f.scatterTimer/1.6; // starts fast, slows down
      let da=f.scatterAngle-f.angle;
      while(da>Math.PI)da-=Math.PI*2;
      while(da<-Math.PI)da+=Math.PI*2;
      f.angle+=da*0.12;
      f.x+=Math.cos(f.angle)*f.speed*(2+scatterEase*4)*dt*60;
      f.y+=Math.sin(f.angle)*f.speed*(2+scatterEase*4)*dt*60;
    }else{
      // Check for nearby food - smooth curve toward it
      let nearestFood=null,nearestFoodDist=Infinity;
      foodParticles.forEach(fd=>{
        if(fd.eaten)return;
        const dx=fd.x-f.x,dy=fd.y-f.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<nearestFoodDist&&d<220){nearestFoodDist=d;nearestFood=fd;}
      });
      if(nearestFood){
        const desiredAngle=Math.atan2(nearestFood.y-f.y,nearestFood.x-f.x);
        // Smooth curve toward food, not snap
        let da=desiredAngle-f.angle;
        while(da>Math.PI)da-=Math.PI*2;
        while(da<-Math.PI)da+=Math.PI*2;
        f.angle+=da*3.5*dt; // smooth turn
        const speedMul=1.2+Math.max(0,(200-nearestFoodDist)/200)*0.8;
        f.x+=Math.cos(f.angle)*f.speed*speedMul*dt*60;
        f.y+=Math.sin(f.angle)*f.speed*speedMul*dt*60;
        if(nearestFoodDist<f.size*0.5){
          nearestFood.eaten=true;
          addShells(1);
        }
      }else{
        // Normal swimming
        f.turnTimer-=dt;
        if(f.turnTimer<=0){
          f.targetAngle=f.angle+(Math.random()-0.5)*1.0;
          f.turnTimer=2.5+Math.random()*4;
        }
        // Edge avoidance with smooth curves
        const margin=70;
        if(f.x<margin)f.targetAngle=lerp2(f.targetAngle,0,0.05);
        if(f.x>W-margin)f.targetAngle=lerp2(f.targetAngle,Math.PI,0.05);
        if(f.y<margin)f.targetAngle=lerp2(f.targetAngle,Math.PI*0.3,0.05);
        if(f.y>sandY-margin)f.targetAngle=lerp2(f.targetAngle,-Math.PI*0.3,0.05);
        // Schooling
        if(f.school){
          let sx=0,sy=0,cnt=0;
          fishes.forEach(o=>{
            if(o===f||o.type!==f.type)return;
            const dx=o.x-f.x,dy=o.y-f.y,d=Math.sqrt(dx*dx+dy*dy);
            if(d<120&&d>10){sx+=dx;sy+=dy;cnt++;}
          });
          if(cnt>0){
            const schoolAngle=Math.atan2(sy/cnt,sx/cnt);
            f.targetAngle=f.targetAngle*0.7+schoolAngle*0.3;
          }
        }
        // Fish avoidance
        fishes.forEach(o=>{
          if(o===f)return;
          const dx=o.x-f.x,dy=o.y-f.y,d=Math.sqrt(dx*dx+dy*dy);
          const minDist=(f.size+o.size)*1.2;
          if(d<minDist&&d>0){
            f.targetAngle=Math.atan2(-dy,-dx);
          }
        });
        // Smooth turn - never abrupt
        let da=f.targetAngle-f.angle;
        while(da>Math.PI)da-=Math.PI*2;
        while(da<-Math.PI)da+=Math.PI*2;
        f.angle+=da*1.8*dt;
        f.x+=Math.cos(f.angle)*f.speed*dt*60;
        f.y+=Math.sin(f.angle)*f.speed*dt*60;
      }
    }
    // Wrap smoothly
    if(f.x<-f.size*2)f.x=W+f.size;
    if(f.x>W+f.size*2)f.x=-f.size;
    if(f.y<15)f.y=15;
    if(f.y>sandY-25)f.y=sandY-25;

    drawFish(f);
  });

  checkGoals();
}

function lerp2(a,b,t){return a+(b-a)*t;}

function drawFish(f){
  if(f.type==='seahorse') return drawSeahorse(f);
  if(f.type==='jellyfish') return drawJellyfish(f);
  if(f.type==='pufferfish') return drawPufferfish(f);
  if(f.type==='whale') return drawWhale(f);
  if(f.type==='angel') return drawAngelfish(f);
  if(f.type==='clown') return drawClownfish(f);
  if(f.type==='betta') return drawBetta(f);

  // Default fish (neon, goldfish, large)
  ctx.save();
  ctx.translate(f.x,f.y);
  const dir=Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);

  const s=f.size;
  // Sinusoidal tail with easing
  const tailRaw=Math.sin(time*5.5+f.tailPhase);
  const tailWag=tailRaw*0.35*(0.7+0.3*Math.sin(time*0.8+f.bodyPhase));
  const bodyWag=Math.sin(time*4.5+f.bodyPhase)*0.025*s;

  if(isNightMode()){
    ctx.shadowColor=f.color;
    ctx.shadowBlur=12+Math.sin(time*2+f.tailPhase)*4;
  }

  ctx.globalAlpha=0.95;

  // Tail fin - graceful with bezier
  const tailX=-s*0.55;
  const tailSize=s*f.tailLen;
  ctx.beginPath();
  ctx.moveTo(tailX,0);
  ctx.bezierCurveTo(
    tailX-tailSize*0.3, tailWag*tailSize*0.3-tailSize*0.15,
    tailX-tailSize*0.7, tailWag*tailSize*0.4-tailSize*0.35,
    tailX-tailSize, tailWag*tailSize*0.25-tailSize*0.28
  );
  ctx.bezierCurveTo(
    tailX-tailSize*0.5, tailWag*tailSize*0.05,
    tailX-tailSize*0.5, -tailWag*tailSize*0.05,
    tailX-tailSize, tailWag*tailSize*0.25+tailSize*0.28
  );
  ctx.bezierCurveTo(
    tailX-tailSize*0.7, tailWag*tailSize*0.4+tailSize*0.35,
    tailX-tailSize*0.3, tailWag*tailSize*0.3+tailSize*0.15,
    tailX, 0
  );
  ctx.closePath();
  ctx.fillStyle=colorWithAlpha(f.color,0.6);
  ctx.fill();

  // Body - smooth ellipse with gradient
  ctx.beginPath();
  ctx.ellipse(0,bodyWag,s*0.55,s*0.30,0,0,Math.PI*2);
  const bGrad=ctx.createLinearGradient(0,-s*0.35,0,s*0.35);
  bGrad.addColorStop(0,lightenColor(f.color,35));
  bGrad.addColorStop(0.4,f.color);
  bGrad.addColorStop(1,darkenColor(f.color,30));
  ctx.fillStyle=bGrad;
  ctx.fill();

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(-s*0.1,bodyWag-s*0.26);
  ctx.bezierCurveTo(-s*0.05,bodyWag-s*0.42, s*0.12,bodyWag-s*0.48+Math.sin(time*3.5+f.tailPhase)*2.5, s*0.22,bodyWag-s*0.26);
  ctx.fillStyle=colorWithAlpha(f.color,0.4);ctx.fill();

  // Pectoral fin
  const finAngle=Math.sin(time*2.5+f.bodyPhase)*0.25;
  ctx.beginPath();
  ctx.ellipse(s*0.05,bodyWag+s*0.15,s*0.14,s*0.07,finAngle+0.3,0,Math.PI*2);
  ctx.fillStyle=colorWithAlpha(f.color,0.35);ctx.fill();

  // Eye
  drawEye(s*0.3,bodyWag-s*0.04,s*0.07,s*0.04);

  // Subtle body highlight
  ctx.beginPath();
  ctx.ellipse(s*0.05,bodyWag-s*0.12,s*0.22,s*0.07,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawEye(ex,ey,outerR,innerR){
  // White
  ctx.beginPath();ctx.arc(ex,ey,outerR,0,Math.PI*2);
  ctx.fillStyle='#f0f4f8';ctx.fill();
  // Pupil
  ctx.beginPath();ctx.arc(ex+outerR*0.25,ey+outerR*0.1,innerR,0,Math.PI*2);
  ctx.fillStyle='#0a0a0a';ctx.fill();
  // Highlight dot - makes eyes feel alive
  ctx.beginPath();ctx.arc(ex+outerR*0.45,ey-outerR*0.35,outerR*0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
}

function drawClownfish(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  const dir=Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s=f.size;
  const tailRaw=Math.sin(time*6+f.tailPhase);
  const tailWag=tailRaw*0.35;
  const bodyWag=Math.sin(time*5+f.bodyPhase)*0.025*s;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=10;}

  // Tail
  const tailX=-s*0.5;
  const ts=s*f.tailLen;
  ctx.beginPath();
  ctx.moveTo(tailX,0);
  ctx.bezierCurveTo(tailX-ts*0.35,tailWag*ts*0.3-ts*0.2, tailX-ts*0.7,tailWag*ts*0.4-ts*0.3, tailX-ts,tailWag*ts*0.2-ts*0.22);
  ctx.bezierCurveTo(tailX-ts*0.5,0, tailX-ts*0.5,0, tailX-ts,tailWag*ts*0.2+ts*0.22);
  ctx.bezierCurveTo(tailX-ts*0.7,tailWag*ts*0.4+ts*0.3, tailX-ts*0.35,tailWag*ts*0.3+ts*0.2, tailX,0);
  ctx.closePath();
  ctx.fillStyle='rgba(255,102,0,0.65)';ctx.fill();

  // Body - rounder for clownfish
  ctx.beginPath();
  ctx.ellipse(0,bodyWag,s*0.5,s*0.33,0,0,Math.PI*2);
  const bGrad=ctx.createLinearGradient(0,-s*0.35,0,s*0.35);
  bGrad.addColorStop(0,'#ff8830');bGrad.addColorStop(0.5,'#ff6600');bGrad.addColorStop(1,'#cc4400');
  ctx.fillStyle=bGrad;ctx.fill();

  // White stripes with black edges - the signature clownfish pattern
  // Stripe 1 (near head)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(0,bodyWag,s*0.5,s*0.33,0,0,Math.PI*2);
  ctx.clip();

  // Head stripe
  const stripePositions=[s*0.2, -s*0.08, -s*0.32];
  stripePositions.forEach((sx,i)=>{
    const sw=i===0?5:i===1?4.5:3.5;
    // Black outline
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(sx-sw/2-1.2,bodyWag-s*0.35,sw+2.4,s*0.7);
    // White stripe
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.fillRect(sx-sw/2,bodyWag-s*0.34,sw,s*0.68);
  });
  ctx.restore();

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(-s*0.05,bodyWag-s*0.3);
  ctx.bezierCurveTo(s*0.05,bodyWag-s*0.48, s*0.15,bodyWag-s*0.45+Math.sin(time*4)*2, s*0.2,bodyWag-s*0.28);
  ctx.fillStyle='rgba(255,102,0,0.5)';ctx.fill();

  // Pectoral fin
  const finA=Math.sin(time*3+f.bodyPhase)*0.3;
  ctx.beginPath();
  ctx.ellipse(s*0.08,bodyWag+s*0.16,s*0.12,s*0.06,finA+0.35,0,Math.PI*2);
  ctx.fillStyle='rgba(255,130,40,0.35)';ctx.fill();

  // Eye
  drawEye(s*0.3,bodyWag-s*0.04,s*0.075,s*0.045);

  // Highlight
  ctx.beginPath();
  ctx.ellipse(s*0.06,bodyWag-s*0.14,s*0.2,s*0.06,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawAngelfish(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  const dir=Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s=f.size;
  const tailWag=Math.sin(time*4+f.tailPhase)*0.3;
  const bodyWag=Math.sin(time*3.5+f.bodyPhase)*0.02*s;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=12;}

  // Angelfish has a tall, thin triangular profile
  // Tail - thin and elegant
  const tailX=-s*0.4;
  ctx.beginPath();
  ctx.moveTo(tailX,bodyWag);
  ctx.bezierCurveTo(tailX-s*0.15,bodyWag-s*0.12+tailWag*s*0.1, tailX-s*0.3,bodyWag-s*0.18+tailWag*s*0.12, tailX-s*0.35,bodyWag-s*0.15+tailWag*s*0.1);
  ctx.bezierCurveTo(tailX-s*0.2,bodyWag, tailX-s*0.2,bodyWag, tailX-s*0.35,bodyWag+s*0.15+tailWag*s*0.1);
  ctx.bezierCurveTo(tailX-s*0.3,bodyWag+s*0.18+tailWag*s*0.12, tailX-s*0.15,bodyWag+s*0.12+tailWag*s*0.1, tailX,bodyWag);
  ctx.closePath();
  ctx.fillStyle=colorWithAlpha(f.color,0.55);ctx.fill();

  // Body - tall diamond/disc shape (triangular from side)
  ctx.beginPath();
  ctx.moveTo(s*0.4,bodyWag); // nose
  ctx.bezierCurveTo(s*0.35,bodyWag-s*0.15, s*0.15,bodyWag-s*0.35, 0,bodyWag-s*0.42); // top curve
  ctx.bezierCurveTo(-s*0.15,bodyWag-s*0.38, -s*0.35,bodyWag-s*0.2, -s*0.4,bodyWag); // back top
  ctx.bezierCurveTo(-s*0.35,bodyWag+s*0.2, -s*0.15,bodyWag+s*0.38, 0,bodyWag+s*0.42); // back bottom
  ctx.bezierCurveTo(s*0.15,bodyWag+s*0.35, s*0.35,bodyWag+s*0.15, s*0.4,bodyWag); // bottom curve
  ctx.closePath();
  const bGrad=ctx.createLinearGradient(0,bodyWag-s*0.45,0,bodyWag+s*0.45);
  bGrad.addColorStop(0,lightenColor(f.color,40));
  bGrad.addColorStop(0.3,lightenColor(f.color,15));
  bGrad.addColorStop(0.5,f.color);
  bGrad.addColorStop(1,darkenColor(f.color,25));
  ctx.fillStyle=bGrad;ctx.fill();

  // Vertical stripes (angelfish pattern)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(s*0.4,bodyWag);
  ctx.bezierCurveTo(s*0.35,bodyWag-s*0.15, s*0.15,bodyWag-s*0.35, 0,bodyWag-s*0.42);
  ctx.bezierCurveTo(-s*0.15,bodyWag-s*0.38, -s*0.35,bodyWag-s*0.2, -s*0.4,bodyWag);
  ctx.bezierCurveTo(-s*0.35,bodyWag+s*0.2, -s*0.15,bodyWag+s*0.38, 0,bodyWag+s*0.42);
  ctx.bezierCurveTo(s*0.15,bodyWag+s*0.35, s*0.35,bodyWag+s*0.15, s*0.4,bodyWag);
  ctx.closePath();
  ctx.clip();
  ctx.fillStyle=darkenColor(f.color,40)+'80';
  ctx.fillRect(s*0.05,bodyWag-s*0.5,3,s);
  ctx.fillRect(-s*0.15,bodyWag-s*0.5,3,s);
  ctx.fillRect(-s*0.3,bodyWag-s*0.5,2,s);
  ctx.restore();

  // Long dorsal fin streaming upward
  ctx.beginPath();
  ctx.moveTo(s*0.05,bodyWag-s*0.4);
  ctx.bezierCurveTo(s*0.02,bodyWag-s*0.65, -s*0.15,bodyWag-s*0.7+Math.sin(time*3)*3, -s*0.25,bodyWag-s*0.55);
  ctx.lineTo(-s*0.2,bodyWag-s*0.35);
  ctx.fillStyle=colorWithAlpha(f.color,0.35);ctx.fill();

  // Long ventral fin streaming downward
  ctx.beginPath();
  ctx.moveTo(s*0.05,bodyWag+s*0.4);
  ctx.bezierCurveTo(s*0.02,bodyWag+s*0.65, -s*0.12,bodyWag+s*0.7+Math.sin(time*3.2)*3, -s*0.22,bodyWag+s*0.55);
  ctx.lineTo(-s*0.18,bodyWag+s*0.35);
  ctx.fillStyle=colorWithAlpha(f.color,0.3);ctx.fill();

  // Pectoral fin
  const fA=Math.sin(time*2.5+f.bodyPhase)*0.2;
  ctx.beginPath();
  ctx.ellipse(s*0.1,bodyWag+s*0.08,s*0.1,s*0.05,fA+0.3,0,Math.PI*2);
  ctx.fillStyle=colorWithAlpha(f.color,0.3);ctx.fill();

  // Eye
  drawEye(s*0.25,bodyWag-s*0.02,s*0.065,s*0.04);

  // Highlight
  ctx.beginPath();
  ctx.ellipse(s*0.1,bodyWag-s*0.15,s*0.15,s*0.06,-0.15,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawBetta(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  const dir=Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s=f.size;
  // Slow, dramatic fin movement
  const tailSin=Math.sin(time*2.8+f.tailPhase);
  const tailWag=tailSin*0.4*(0.6+0.4*Math.sin(time*0.5+f.bodyPhase));
  const bodyWag=Math.sin(time*2.5+f.bodyPhase)*0.015*s;
  const finFlow=Math.sin(time*2+f.tailPhase)*0.3;
  const finFlow2=Math.sin(time*2.3+f.bodyPhase)*0.25;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=16;}

  // Dramatic flowing tail - multiple overlapping lobes
  const tailX=-s*0.45;
  // Upper tail lobe
  ctx.beginPath();
  ctx.moveTo(tailX,bodyWag-s*0.05);
  ctx.bezierCurveTo(
    tailX-s*0.3, bodyWag-s*0.15+tailWag*s*0.15,
    tailX-s*0.65, bodyWag-s*0.4+tailWag*s*0.2+finFlow*s*0.08,
    tailX-s*0.8, bodyWag-s*0.5+tailWag*s*0.25+finFlow*s*0.1
  );
  ctx.bezierCurveTo(
    tailX-s*0.7, bodyWag-s*0.25+tailWag*s*0.15,
    tailX-s*0.45, bodyWag-s*0.05+tailWag*s*0.05,
    tailX-s*0.2, bodyWag
  );
  ctx.closePath();
  ctx.fillStyle=colorWithAlpha(f.color,0.35);ctx.fill();

  // Lower tail lobe
  ctx.beginPath();
  ctx.moveTo(tailX,bodyWag+s*0.05);
  ctx.bezierCurveTo(
    tailX-s*0.3, bodyWag+s*0.15+tailWag*s*0.15,
    tailX-s*0.65, bodyWag+s*0.4+tailWag*s*0.2+finFlow2*s*0.08,
    tailX-s*0.8, bodyWag+s*0.5+tailWag*s*0.25+finFlow2*s*0.1
  );
  ctx.bezierCurveTo(
    tailX-s*0.7, bodyWag+s*0.25+tailWag*s*0.15,
    tailX-s*0.45, bodyWag+s*0.05+tailWag*s*0.05,
    tailX-s*0.2, bodyWag
  );
  ctx.closePath();
  ctx.fillStyle=colorWithAlpha(f.color,0.3);ctx.fill();

  // Center tail lobe
  ctx.beginPath();
  ctx.moveTo(tailX,bodyWag);
  ctx.bezierCurveTo(
    tailX-s*0.35, bodyWag+tailWag*s*0.12,
    tailX-s*0.6, bodyWag-s*0.05+tailWag*s*0.2,
    tailX-s*0.75, bodyWag+tailWag*s*0.15
  );
  ctx.bezierCurveTo(
    tailX-s*0.6, bodyWag+s*0.05+tailWag*s*0.2,
    tailX-s*0.35, bodyWag+tailWag*s*0.12,
    tailX, bodyWag
  );
  ctx.closePath();
  ctx.fillStyle=colorWithAlpha(f.color,0.25);ctx.fill();

  // Body - slightly elongated
  ctx.beginPath();
  ctx.ellipse(0,bodyWag,s*0.45,s*0.25,0,0,Math.PI*2);
  const bGrad=ctx.createLinearGradient(0,bodyWag-s*0.3,0,bodyWag+s*0.3);
  bGrad.addColorStop(0,lightenColor(f.color,30));
  bGrad.addColorStop(0.4,f.color);
  bGrad.addColorStop(1,darkenColor(f.color,25));
  ctx.fillStyle=bGrad;ctx.fill();

  // Dramatic dorsal fin - flowing crest
  ctx.beginPath();
  ctx.moveTo(s*0.2,bodyWag-s*0.22);
  ctx.bezierCurveTo(s*0.15,bodyWag-s*0.5+finFlow*s*0.06, 0,bodyWag-s*0.6+finFlow*s*0.08, -s*0.15,bodyWag-s*0.55+finFlow*s*0.1);
  ctx.bezierCurveTo(-s*0.25,bodyWag-s*0.5+finFlow*s*0.08, -s*0.35,bodyWag-s*0.4+finFlow*s*0.06, -s*0.4,bodyWag-s*0.3);
  ctx.lineTo(-s*0.35,bodyWag-s*0.22);
  ctx.fillStyle=colorWithAlpha(f.color,0.4);ctx.fill();

  // Flowing ventral fin
  ctx.beginPath();
  ctx.moveTo(s*0.1,bodyWag+s*0.22);
  ctx.bezierCurveTo(s*0.05,bodyWag+s*0.45+finFlow2*s*0.05, -s*0.1,bodyWag+s*0.55+finFlow2*s*0.08, -s*0.2,bodyWag+s*0.5+finFlow2*s*0.06);
  ctx.bezierCurveTo(-s*0.25,bodyWag+s*0.4, -s*0.15,bodyWag+s*0.3, -s*0.1,bodyWag+s*0.22);
  ctx.fillStyle=colorWithAlpha(f.color,0.3);ctx.fill();

  // Pectoral fin
  const pFA=Math.sin(time*2+f.bodyPhase)*0.2;
  ctx.beginPath();
  ctx.ellipse(s*0.1,bodyWag+s*0.1,s*0.12,s*0.06,pFA+0.3,0,Math.PI*2);
  ctx.fillStyle=colorWithAlpha(f.color,0.3);ctx.fill();

  // Iridescent shimmer on body
  ctx.beginPath();
  ctx.ellipse(0,bodyWag,s*0.42,s*0.22,0,0,Math.PI*2);
  const shimGrad=ctx.createLinearGradient(-s*0.4,bodyWag,s*0.4,bodyWag);
  shimGrad.addColorStop(0,'rgba(255,255,255,0)');
  shimGrad.addColorStop(0.3+Math.sin(time*1.5)*0.15,'rgba(255,255,255,0.06)');
  shimGrad.addColorStop(0.5+Math.sin(time*1.5)*0.15,'rgba(255,255,255,0.1)');
  shimGrad.addColorStop(0.7+Math.sin(time*1.5)*0.15,'rgba(255,255,255,0.06)');
  shimGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=shimGrad;ctx.fill();

  // Eye
  drawEye(s*0.28,bodyWag-s*0.03,s*0.065,s*0.04);

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawSeahorse(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const dir = Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s = f.size;
  const bob = Math.sin(f.bobPhase)*3;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=10;}

  // Head
  ctx.beginPath();
  ctx.arc(0, -s*0.5+bob, s*0.25, 0, Math.PI*2);
  const headGrad=ctx.createRadialGradient(-s*0.05,-s*0.55+bob,2,0,-s*0.5+bob,s*0.25);
  headGrad.addColorStop(0,lightenColor(f.color,25));headGrad.addColorStop(1,f.color);
  ctx.fillStyle=headGrad;ctx.fill();

  // Crown/crest on head
  ctx.beginPath();
  ctx.moveTo(-s*0.05, -s*0.73+bob);
  ctx.bezierCurveTo(-s*0.02,-s*0.82+bob, s*0.08,-s*0.8+bob, s*0.05,-s*0.72+bob);
  ctx.fillStyle=lightenColor(f.color,15);ctx.fill();

  // Snout - elongated tube
  ctx.beginPath();
  ctx.moveTo(s*0.18, -s*0.55+bob);
  ctx.bezierCurveTo(s*0.3,-s*0.58+bob, s*0.42,-s*0.6+bob, s*0.48,-s*0.58+bob);
  ctx.bezierCurveTo(s*0.42,-s*0.55+bob, s*0.3,-s*0.52+bob, s*0.18,-s*0.5+bob);
  ctx.closePath();
  ctx.fillStyle=darkenColor(f.color,15);ctx.fill();

  // Body trunk - smoother S-curve
  ctx.beginPath();
  ctx.moveTo(-s*0.18, -s*0.28+bob);
  ctx.bezierCurveTo(-s*0.22,-s*0.1+bob, -s*0.18,s*0.1+bob, -s*0.1,s*0.25+bob);
  ctx.bezierCurveTo(-s*0.05,s*0.3+bob, s*0.1,s*0.28+bob, s*0.15,s*0.22+bob);
  ctx.lineTo(s*0.2,-s*0.05+bob);
  ctx.bezierCurveTo(s*0.22,-s*0.2+bob, s*0.2,-s*0.35+bob, s*0.15,-s*0.28+bob);
  ctx.closePath();
  const bodyGrad=ctx.createLinearGradient(-s*0.2,0,s*0.2,0);
  bodyGrad.addColorStop(0,darkenColor(f.color,15));bodyGrad.addColorStop(0.5,f.color);bodyGrad.addColorStop(1,lightenColor(f.color,10));
  ctx.fillStyle=bodyGrad;ctx.fill();

  // Curled tail
  ctx.strokeStyle=f.color;
  ctx.lineWidth=s*0.09;
  ctx.lineCap='round';
  ctx.beginPath();
  const tc = Math.sin(time*1.8+f.tailPhase)*0.2;
  ctx.moveTo(0, s*0.3+bob);
  ctx.bezierCurveTo(-s*0.2,s*0.45+bob, -s*0.3,s*0.55+bob, -s*0.2+tc*s,s*0.65+bob);
  ctx.bezierCurveTo(-s*0.05,s*0.7+bob, s*0.1,s*0.6+bob, s*0.05+tc*s,s*0.5+bob);
  ctx.bezierCurveTo(0,s*0.45+bob, -s*0.05,s*0.42+bob, -s*0.02,s*0.38+bob);
  ctx.stroke();

  // Small dorsal fin (rapid flutter)
  ctx.beginPath();
  const finFlutter = Math.sin(time*10+f.bodyPhase)*3;
  ctx.moveTo(-s*0.15, -s*0.15+bob);
  ctx.bezierCurveTo(-s*0.28,-s*0.22+bob+finFlutter, -s*0.32,-s*0.08+bob+finFlutter*0.5, -s*0.2,-s*0.02+bob);
  ctx.fillStyle=colorWithAlpha(lightenColor(f.color,20),0.5);
  ctx.fill();

  // Eye
  drawEye(s*0.08, -s*0.55+bob, s*0.06, s*0.035);

  // Body ridges
  ctx.strokeStyle=colorWithAlpha(darkenColor(f.color,25),0.3);
  ctx.lineWidth=0.8;
  for(let i=0;i<5;i++){
    const ry = -s*0.25+i*s*0.12+bob;
    ctx.beginPath();
    ctx.moveTo(-s*0.12, ry);
    ctx.lineTo(s*0.12, ry);
    ctx.stroke();
  }

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawJellyfish(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const s = f.size;
  const pulse = Math.sin(f.pulsePhase);
  const squish = 1 + pulse*0.15;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=18+pulse*6;}

  // Translucent bell/dome
  const bellW = s*0.5*squish;
  const bellH = s*0.35/squish;
  ctx.globalAlpha=0.4;
  ctx.beginPath();
  // Smooth bell using bezier
  ctx.moveTo(-bellW, 0);
  ctx.bezierCurveTo(-bellW, -bellH*1.2, -bellW*0.3, -bellH*1.8, 0, -bellH*1.6);
  ctx.bezierCurveTo(bellW*0.3, -bellH*1.8, bellW, -bellH*1.2, bellW, 0);
  // Scalloped bottom edge
  const scallops=6;
  for(let i=scallops;i>=0;i--){
    const t=i/scallops;
    const sx=-bellW+t*bellW*2;
    const sy=Math.sin(t*Math.PI*scallops)*bellH*0.08+bellH*0.05;
    if(i===scallops)ctx.lineTo(sx,sy);
    else ctx.lineTo(sx,sy);
  }
  ctx.closePath();
  const jGrad = ctx.createRadialGradient(0, -bellH*0.5, 2, 0, 0, bellW);
  jGrad.addColorStop(0, lightenColor(f.color,70));
  jGrad.addColorStop(0.5, f.color);
  jGrad.addColorStop(1, darkenColor(f.color,15));
  ctx.fillStyle=jGrad;ctx.fill();

  // Inner dome pattern
  ctx.globalAlpha=0.15;
  ctx.beginPath();
  ctx.ellipse(0, -bellH*0.4, bellW*0.45, bellH*0.5, 0, Math.PI, 0);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();

  // Oral arms (thicker, wavy tentacles near center)
  ctx.globalAlpha=0.3;
  ctx.lineWidth=2;
  ctx.strokeStyle=lightenColor(f.color,20);
  for(let i=0;i<4;i++){
    const tx = -bellW*0.3 + i*(bellW*0.6/3);
    ctx.beginPath();
    ctx.moveTo(tx, bellH*0.05);
    let cy2=bellH*0.05;
    for(let seg=0;seg<4;seg++){
      const segLen=s*0.12;
      const wavex=Math.sin(time*1.2+i*0.9+seg*0.7+f.tailPhase)*5;
      cy2+=segLen;
      ctx.quadraticCurveTo(tx+wavex,cy2-segLen*0.5,tx+wavex*0.5,cy2);
    }
    ctx.stroke();
  }

  // Trailing tentacles (thin, long)
  ctx.globalAlpha=0.25;
  ctx.strokeStyle=f.color;
  ctx.lineWidth=0.8;
  const tentCount = 9;
  for(let i=0;i<tentCount;i++){
    const tx = -bellW*0.8 + i*(bellW*1.6/tentCount);
    ctx.beginPath();
    ctx.moveTo(tx, bellH*0.05);
    const tentLen = s*0.5 + Math.sin(i*1.3)*s*0.15;
    let curX=tx,curY=bellH*0.05;
    const segments=5;
    for(let seg=0;seg<segments;seg++){
      const t2=seg/segments;
      const sway1 = Math.sin(time*1.3+i*0.6+seg*0.5+f.tailPhase)*(5+t2*4);
      curY+=tentLen/segments;
      ctx.quadraticCurveTo(curX+sway1,curY-tentLen/(segments*2),curX+sway1*0.4,curY);
      curX+=sway1*0.4;
    }
    ctx.stroke();
  }

  // Glow effect
  ctx.globalAlpha=0.06+pulse*0.03;
  ctx.beginPath();
  ctx.arc(0, -bellH*0.3, s*0.65, 0, Math.PI*2);
  ctx.fillStyle=f.color;ctx.fill();

  ctx.globalAlpha=1;
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawPufferfish(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const dir = Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s = f.size;
  const puff = f.puffed > 0 ? 1 + 0.4*(Math.min(f.puffed,1)) : 1;
  const tailWag = Math.sin(time*6+f.tailPhase)*0.3;
  const bodyWag = Math.sin(time*5+f.bodyPhase)*0.02*s;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=10;}

  // Small tail
  const tailX = -s*0.4*puff;
  ctx.beginPath();
  ctx.moveTo(tailX, bodyWag);
  ctx.bezierCurveTo(tailX-s*0.1,bodyWag-s*0.08+tailWag*s*0.05, tailX-s*0.18,bodyWag-s*0.14+tailWag*s*0.08, tailX-s*0.2,bodyWag-s*0.12+tailWag*s*0.08);
  ctx.bezierCurveTo(tailX-s*0.12,bodyWag, tailX-s*0.12,bodyWag, tailX-s*0.2,bodyWag+s*0.12+tailWag*s*0.08);
  ctx.bezierCurveTo(tailX-s*0.18,bodyWag+s*0.14+tailWag*s*0.08, tailX-s*0.1,bodyWag+s*0.08+tailWag*s*0.05, tailX,bodyWag);
  ctx.closePath();
  ctx.fillStyle=darkenColor(f.color,20);ctx.fill();

  // Round body
  ctx.beginPath();
  ctx.arc(0, bodyWag, s*0.38*puff, 0, Math.PI*2);
  const bGrad = ctx.createRadialGradient(-s*0.08, bodyWag-s*0.08, s*0.05, 0, bodyWag, s*0.38*puff);
  bGrad.addColorStop(0, lightenColor(f.color,45));
  bGrad.addColorStop(0.6, f.color);
  bGrad.addColorStop(1, darkenColor(f.color,20));
  ctx.fillStyle=bGrad;ctx.fill();

  // Spotted pattern
  ctx.fillStyle=darkenColor(f.color,25)+'60';
  const spotCount=puff>1?0:8;
  for(let i=0;i<spotCount;i++){
    const a=(i/8)*Math.PI*2+0.3;
    const r2=s*0.22;
    ctx.beginPath();ctx.arc(Math.cos(a)*r2,bodyWag+Math.sin(a)*r2,s*0.04,0,Math.PI*2);ctx.fill();
  }

  // Belly
  ctx.beginPath();
  ctx.ellipse(s*0.03, bodyWag+s*0.08*puff, s*0.28*puff, s*0.2*puff, 0, 0, Math.PI);
  ctx.fillStyle='rgba(255,255,240,0.12)';ctx.fill();

  // Spikes when puffed
  if(f.puffed > 0.1){
    ctx.strokeStyle=darkenColor(f.color,25);
    ctx.lineWidth=1.2;
    const spikeCount = 14;
    const spikeAlpha=Math.min(1,f.puffed);
    ctx.globalAlpha=spikeAlpha*0.8;
    for(let i=0;i<spikeCount;i++){
      const a = (i/spikeCount)*Math.PI*2;
      const baseR = s*0.38*puff;
      const spikeLen = s*0.1*(puff-1)/0.4;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*baseR, bodyWag+Math.sin(a)*baseR);
      ctx.lineTo(Math.cos(a)*(baseR+spikeLen), bodyWag+Math.sin(a)*(baseR+spikeLen));
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }

  // Small fins
  const pFinAngle = Math.sin(time*7+f.bodyPhase)*0.25;
  ctx.beginPath();
  ctx.ellipse(s*0.15, bodyWag+s*0.08, s*0.07, s*0.035, pFinAngle+0.4, 0, Math.PI*2);
  ctx.fillStyle=colorWithAlpha(f.color,0.4);ctx.fill();

  // Dorsal fin
  ctx.beginPath();
  ctx.moveTo(-s*0.05, bodyWag-s*0.35*puff);
  ctx.bezierCurveTo(s*0.02,bodyWag-s*0.48*puff+Math.sin(time*5)*1.5, s*0.1,bodyWag-s*0.45*puff, s*0.12,bodyWag-s*0.33*puff);
  ctx.fillStyle=colorWithAlpha(f.color,0.45);ctx.fill();

  // Big cute eye
  drawEye(s*0.2, bodyWag-s*0.06, s*0.1, s*0.06);

  // Mouth
  ctx.beginPath();
  ctx.arc(s*0.35, bodyWag+s*0.02, s*0.03, 0.1, Math.PI-0.1);
  ctx.strokeStyle=darkenColor(f.color,35);ctx.lineWidth=1;ctx.stroke();

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawWhale(f){
  ctx.save();
  ctx.translate(f.x, f.y);
  const dir = Math.cos(f.angle)>=0?1:-1;
  ctx.scale(dir,1);
  const s = f.size;
  const tailWag = Math.sin(time*2.5+f.tailPhase)*0.25;
  const bodyWag = Math.sin(time*1.8+f.bodyPhase)*0.015*s;

  if(isNightMode()){ctx.shadowColor=f.color;ctx.shadowBlur=15;}

  // Large tail flukes - graceful
  const tailX = -s*0.55;
  ctx.beginPath();
  ctx.moveTo(tailX, bodyWag);
  // Upper fluke
  ctx.bezierCurveTo(tailX-s*0.15,bodyWag-s*0.08+tailWag*s*0.06, tailX-s*0.3,bodyWag-s*0.2+tailWag*s*0.1, tailX-s*0.42,bodyWag-s*0.28+tailWag*s*0.15);
  ctx.bezierCurveTo(tailX-s*0.35,bodyWag-s*0.15+tailWag*s*0.08, tailX-s*0.2,bodyWag-s*0.04, tailX-s*0.12,bodyWag);
  // Lower fluke
  ctx.bezierCurveTo(tailX-s*0.2,bodyWag+s*0.04, tailX-s*0.35,bodyWag+s*0.15+tailWag*s*0.08, tailX-s*0.42,bodyWag+s*0.28+tailWag*s*0.15);
  ctx.bezierCurveTo(tailX-s*0.3,bodyWag+s*0.2+tailWag*s*0.1, tailX-s*0.15,bodyWag+s*0.08+tailWag*s*0.06, tailX,bodyWag);
  ctx.closePath();
  ctx.fillStyle=darkenColor(f.color,12);ctx.fill();

  // Main body - smooth elongated shape
  ctx.beginPath();
  ctx.moveTo(s*0.5,bodyWag+s*0.02);
  ctx.bezierCurveTo(s*0.48,bodyWag-s*0.15, s*0.3,bodyWag-s*0.28, 0,bodyWag-s*0.28);
  ctx.bezierCurveTo(-s*0.3,bodyWag-s*0.28, -s*0.5,bodyWag-s*0.2, -s*0.55,bodyWag);
  ctx.bezierCurveTo(-s*0.5,bodyWag+s*0.2, -s*0.3,bodyWag+s*0.28, 0,bodyWag+s*0.28);
  ctx.bezierCurveTo(s*0.3,bodyWag+s*0.28, s*0.48,bodyWag+s*0.18, s*0.5,bodyWag+s*0.02);
  ctx.closePath();
  const bGrad = ctx.createLinearGradient(0, bodyWag-s*0.3, 0, bodyWag+s*0.3);
  bGrad.addColorStop(0, lightenColor(f.color,22));
  bGrad.addColorStop(0.35, f.color);
  bGrad.addColorStop(1, darkenColor(f.color,18));
  ctx.fillStyle=bGrad;ctx.fill();

  // Belly groove lines
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(s*0.05,bodyWag+s*0.12,s*0.38,s*0.14,0,0,Math.PI);
  ctx.clip();
  ctx.strokeStyle='rgba(180,200,220,0.1)';ctx.lineWidth=0.6;
  for(let i=0;i<8;i++){
    const lx=-s*0.3+i*s*0.08;
    ctx.beginPath();ctx.moveTo(lx,bodyWag+s*0.05);ctx.lineTo(lx,bodyWag+s*0.28);ctx.stroke();
  }
  ctx.restore();

  // Lighter belly
  ctx.beginPath();
  ctx.ellipse(s*0.05, bodyWag+s*0.1, s*0.38, s*0.14, 0, 0, Math.PI);
  ctx.fillStyle='rgba(200,215,230,0.12)';ctx.fill();

  // Pectoral fin
  const pfinAngle = Math.sin(time*1.5+f.bodyPhase)*0.15;
  ctx.beginPath();
  ctx.ellipse(-s*0.08, bodyWag+s*0.18, s*0.2, s*0.055, pfinAngle+0.45, 0, Math.PI*2);
  ctx.fillStyle=darkenColor(f.color,8);
  ctx.globalAlpha=0.55;ctx.fill();ctx.globalAlpha=1;

  // Dorsal fin (small hump)
  ctx.beginPath();
  ctx.moveTo(-s*0.18, bodyWag-s*0.26);
  ctx.bezierCurveTo(-s*0.12,bodyWag-s*0.35, -s*0.02,bodyWag-s*0.34, s*0.02,bodyWag-s*0.26);
  ctx.fillStyle=f.color;ctx.fill();

  // Eye (small relative to body, with highlight)
  drawEye(s*0.38, bodyWag-s*0.02, s*0.035, s*0.022);

  // Mouth line - gentle smile
  ctx.beginPath();
  ctx.moveTo(s*0.44, bodyWag+s*0.05);
  ctx.bezierCurveTo(s*0.5,bodyWag+s*0.07, s*0.52,bodyWag+s*0.1, s*0.48,bodyWag+s*0.12);
  ctx.strokeStyle=darkenColor(f.color,25);ctx.lineWidth=1.2;ctx.stroke();

  // Top highlight
  ctx.beginPath();
  ctx.ellipse(s*0.08, bodyWag-s*0.15, s*0.28, s*0.05, -0.05, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fill();

  ctx.shadowBlur=0;
  ctx.restore();
}

function updateSpoutParticles(dt){
  spoutParticles = spoutParticles.filter(p=>{
    p.x+=p.vx*dt*30;
    p.y+=p.vy*dt*30;
    p.vy+=dt*2;
    p.life-=dt;
    p.alpha=Math.max(0, p.life);
    if(p.life<=0) return false;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle='rgba(180,220,255,'+(p.alpha*0.4)+')';
    ctx.fill();
    return true;
  });
}

// --- BUBBLES ---
let bubbleTimer=0;
function updateAndDrawBubbles(dt){
  bubbleTimer+=dt;
  const interval=0.3/(cfg.bubbleRate*0.2+0.1);
  if(bubbleTimer>interval){
    bubbleTimer=0;
    const stone=airStones[Math.floor(Math.random()*airStones.length)];
    spawnBubble(stone);
  }

  bubbles=bubbles.filter(b=>{
    b.y-=b.speed*dt*60;
    // Wobble: sine with per-bubble frequency for variety
    b.x+=Math.sin(time*b.wobbleFreq+b.wobblePhase)*b.wobbleAmp*dt*25;
    // Slight size growth as they rise
    b.r+=dt*0.02;
    if(b.y<45){b.alpha-=dt*2.5;}
    if(b.y<0||b.alpha<=0)return false;

    const a=b.alpha;
    // Bubble body (ring)
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(160,210,255,'+(a*0.5)+')';
    ctx.lineWidth=0.7;ctx.stroke();
    // Inner highlight (crescent)
    ctx.beginPath();
    ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.5,0,Math.PI*2);
    ctx.fillStyle='rgba(220,240,255,'+(a*0.35)+')';ctx.fill();
    // Small bright dot highlight
    ctx.beginPath();
    ctx.arc(b.x-b.r*0.25,b.y-b.r*0.35,b.r*0.2,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+(a*0.5)+')';ctx.fill();
    return true;
  });
}

function updateVolcanoBubbles(dt){
  volcanoBubbles=volcanoBubbles.filter(b=>{
    b.y-=b.speed*dt*60;
    b.x+=Math.sin(time*4+b.wobblePhase)*0.5*dt*20;
    b.life-=dt;
    b.alpha=Math.max(0,b.life*0.6);
    if(b.life<=0)return false;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,120,50,'+(b.alpha*0.35)+')';
    ctx.fill();
    ctx.strokeStyle='rgba(255,180,100,'+(b.alpha*0.25)+')';
    ctx.lineWidth=0.5;ctx.stroke();
    return true;
  });
}

// --- FOOD ---
function updateFood(dt){
  foodParticles=foodParticles.filter(fd=>{
    if(fd.eaten){fd.alpha-=dt*4;if(fd.alpha<=0)return false;}
    else{
      fd.y+=fd.vy*dt*60;
      fd.x+=Math.sin(time*1.5+fd.x*0.01)*0.15;
      if(fd.y>sandY-5){fd.vy=0;}
      fd.alpha-=dt*0.04;
      if(fd.alpha<=0)return false;
    }
    ctx.beginPath();ctx.arc(fd.x,fd.y,fd.r,0,Math.PI*2);
    ctx.fillStyle='rgba(170,115,45,'+(fd.alpha*0.9)+')';ctx.fill();
    // Slight highlight on food
    ctx.beginPath();ctx.arc(fd.x-fd.r*0.25,fd.y-fd.r*0.25,fd.r*0.35,0,Math.PI*2);
    ctx.fillStyle='rgba(220,175,90,'+(fd.alpha*0.5)+')';ctx.fill();
    return true;
  });
}

// --- WATER SURFACE ---
function drawSurface(){
  ctx.save();
  // Animated shimmer at top
  const surfH=22;
  const surfGrad=ctx.createLinearGradient(0,0,0,surfH);
  surfGrad.addColorStop(0,'rgba(160,210,250,0.12)');
  surfGrad.addColorStop(0.2,'rgba(160,210,250,0.06)');
  surfGrad.addColorStop(1,'rgba(160,210,250,0)');
  ctx.fillStyle=surfGrad;
  ctx.beginPath();
  ctx.moveTo(0,0);
  for(let x=0;x<=W;x+=6){
    const y=2+Math.sin(x*0.035+time*1.2)*1.8+Math.sin(x*0.018+time*0.8)*1.2;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,surfH);ctx.lineTo(0,surfH);ctx.closePath();ctx.fill();

  // Shimmer highlights - animated bright spots along surface
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<8;i++){
    const sx=W*(0.05+i*0.12)+Math.sin(time*0.6+i*1.8)*30;
    const sy=3+Math.sin(sx*0.04+time*1.5)*1.5;
    const shimmerA=0.04+Math.sin(time*1.8+i*2.3)*0.025;
    if(shimmerA>0){
      ctx.fillStyle='rgba(200,230,255,'+shimmerA+')';
      ctx.beginPath();
      ctx.ellipse(sx,sy,12+Math.sin(time*1.2+i)*4,2,0,0,Math.PI*2);
      ctx.fill();
    }
  }
  ctx.globalCompositeOperation='source-over';

  // Subtle wave line
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  ctx.lineWidth=0.8;
  ctx.beginPath();
  for(let x=0;x<=W;x+=4){
    const y=5+Math.sin(x*0.04+time*1.8)*1.5+Math.sin(x*0.02+time*1.1)*1;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

// --- VIGNETTE ---
function drawVignette(){
  const grd=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.4,W/2,H/2,Math.max(W,H)*0.72);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(1,isNightMode()?'rgba(0,2,8,0.45)':'rgba(0,5,15,0.25)');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
}

// --- MAIN LOOP ---
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  draw(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTime=ts;loop(ts)});

// Reinit on resize
addEventListener('resize',()=>{initPebbles();initRocks();initDecorations();initCausticCanvas();});
</script>
