<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PromptCraft</title>
<style>
:root{--bg:#fef7ed;--card:#fff;--ink:#2d1b0e;--accent:#e07b39;--accent2:#7c3aed;--mint:#10b981;--pink:#ec4899;--sky:#0ea5e9;--border:#e5d5c0;--faint:#9a8570;--radius:14px;--shadow:0 4px 24px rgba(45,27,14,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

.app{max-width:800px;margin:0 auto;padding:16px;min-height:100vh}

/* Header */
.hdr{text-align:center;padding:24px 0 16px}
.hdr h1{font-size:clamp(28px,6vw,42px);font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.hdr p{color:var(--faint);font-size:14px;margin-top:4px}

/* Prompt output */
.prompt-box{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px 0;min-height:120px;position:relative;box-shadow:var(--shadow);transition:border-color .3s}
.prompt-box:hover{border-color:var(--accent)}
.prompt-text{font-size:15px;line-height:1.7;color:var(--ink);white-space:pre-wrap;word-break:break-word}
.prompt-text .tag{display:inline;font-weight:600}
.prompt-text .subject{color:var(--accent)}
.prompt-text .style{color:var(--accent2)}
.prompt-text .setting{color:var(--mint)}
.prompt-text .mood{color:var(--pink)}
.prompt-text .detail{color:var(--sky)}

.prompt-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn:active{transform:scale(.96)}
.btn-copy{background:var(--accent);color:#fff}
.btn-copy:hover{background:#c96a2e}
.btn-copy.copied{background:var(--mint)}
.btn-gen{background:var(--accent2);color:#fff}
.btn-gen:hover{background:#6d28d9}
.btn-fav{background:var(--pink);color:#fff}
.btn-fav:hover{background:#db2777}
.btn-sm{background:var(--card);color:var(--ink);border:1px solid var(--border);padding:8px 14px;font-size:12px}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Slot machine */
.slots{display:grid;gap:12px;margin:16px 0}
.slot{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.slot-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.slot-label .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.slot-subject .dot{background:var(--accent)}
.slot-style .dot{background:var(--accent2)}
.slot-setting .dot{background:var(--mint)}
.slot-mood .dot{background:var(--pink)}
.slot-detail .dot{background:var(--sky)}
.slot-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg);transition:all .2s;user-select:none}
.chip:hover{border-color:var(--accent);transform:translateY(-1px)}
.chip.selected{color:#fff;border-color:transparent;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.slot-subject .chip.selected{background:var(--accent)}
.slot-style .chip.selected{background:var(--accent2)}
.slot-setting .chip.selected{background:var(--mint)}
.slot-mood .chip.selected{background:var(--pink)}
.slot-detail .chip.selected{background:var(--sky)}
.chip-shuffle{background:none;border:1px dashed var(--border);color:var(--faint);font-style:italic}
.chip-shuffle:hover{border-color:var(--accent);color:var(--accent)}

/* Aspect ratio + version */
.params{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;align-items:center}
.params label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}

/* Favorites */
.favs{margin-top:24px}
.favs h3{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fav-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:13px;line-height:1.5;display:flex;gap:8px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.fav-text{flex:1;word-break:break-word}
.fav-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.fav-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;transition:background .2s}
.fav-btn:hover{background:var(--bg)}

/* History count */
.history-bar{display:flex;justify-content:space-between;align-items:center;margin:8px 0}
.counter{font-size:12px;color:var(--faint);font-weight:500}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:100;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Animate */
@keyframes pop{0%{transform:scale(.95);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .3s ease}

/* Responsive */
@media(max-width:600px){
  .app{padding:12px}
  .prompt-box{padding:14px}
  .slots{gap:10px}
  .slot{padding:10px 12px}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>PromptCraft</h1>
    <p>Midjourney prompt generator -- photorealistic portraits</p>
  </div>

  <div class="prompt-box pop" id="prompt-box">
    <div class="prompt-text" id="prompt-text"></div>
    <div class="prompt-actions">
      <button class="btn btn-copy" id="btn-copy" onclick="copyPrompt()">Copy Prompt</button>
      <button class="btn btn-gen" onclick="generate()">New Prompt</button>
      <button class="btn btn-fav" onclick="saveFav()">Save</button>
    </div>
  </div>

  <div class="history-bar">
    <span class="counter" id="counter">0 prompts generated</span>
    <div class="params">
      <label>AR:</label>
      <button class="btn btn-sm" data-ar="--ar 1:1" onclick="setAR(this)">1:1</button>
      <button class="btn btn-sm" data-ar="--ar 16:9" onclick="setAR(this)">16:9</button>
      <button class="btn btn-sm" data-ar="--ar 9:16" onclick="setAR(this)">9:16</button>
      <button class="btn btn-sm" data-ar="--ar 3:2" onclick="setAR(this)">3:2</button>
      <button class="btn btn-sm active" data-ar="--ar 4:5" onclick="setAR(this)">4:5</button>
    </div>
  </div>

  <div class="slots" id="slots"></div>

  <div class="favs" id="favs-section" style="display:none">
    <h3>Saved Prompts</h3>
    <div id="favs-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUBJECTS = [
  "a woman with flowing dark hair looking over her shoulder","a couple embracing forehead to forehead, eyes closed","a woman in a silk robe sitting on a bed, morning light",
  "a man and woman slow dancing in an empty room","a woman lying in a field of wildflowers, hair spread out","a couple sharing a quiet moment on a balcony at sunset",
  "a woman with freckles and green eyes, close-up portrait","a couple in the rain, his jacket over both of them","a woman stretching in bed, white linen sheets",
  "a couple's hands intertwined on a cafe table","a woman leaning against a doorframe, soft smile","a man kissing a woman's hand, candlelit dinner",
  "a woman in a sundress walking barefoot on wet sand","a couple watching the sunrise from a rooftop","a woman with windswept hair on a cliff overlooking the sea",
  "a couple lying on a blanket under string lights","a woman reading by a rain-streaked window","a man embracing a woman from behind, both looking at a view",
  "a woman in a vintage slip dress, sitting on stone steps","a couple nose to nose, about to kiss, shallow depth of field",
  "a woman with her eyes closed, face tilted toward the sun","a couple silhouetted against a golden sunset","a woman wrapped in a bedsheet, sitting at a vanity mirror",
  "a couple laughing together in a kitchen, flour on their faces","a woman in an oversized sweater, legs tucked under her on a couch",
  "a man tracing a woman's jawline with his fingertips","a woman leaning back in a clawfoot bathtub, candlelight","a couple tangled in each other on a hammock",
  "a woman with wet hair stepping out of the ocean at golden hour","a couple sharing one pair of earbuds, eyes meeting",
  "a woman in lingerie sitting at a piano, soft backlighting","a couple in matching white robes on a hotel balcony",
  "a woman with tattoos and a knowing smile, dramatic lighting","a man whispering in a woman's ear at a crowded party",
  "a woman in a sheer curtain, backlit by afternoon sun","a couple in a vintage convertible, her hair blowing",
  "a woman draped across velvet furniture, art deco setting","a couple's reflection in a rain puddle on a Paris street",
  "a woman holding a glass of wine, firelight on her skin","a couple in a hot spring, steam rising around them"
];

var STYLES = [
  "shot on Sony A7IV with 85mm f/1.4 lens","shot on Canon R5 with 50mm f/1.2 lens","shot on Hasselblad medium format, 80mm lens",
  "shot on Leica M11, 35mm Summilux","shot on Nikon Z9 with 105mm f/1.4","shot on Fujifilm GFX 100S, natural color science",
  "Kodak Portra 400 film stock, analog grain","Fujifilm Pro 400H film simulation","Cinestill 800T tungsten film look",
  "Kodak Ektar 100 vivid color film","Ilford HP5 black and white film","expired Polaroid instant film aesthetic",
  "editorial fashion photography, Vogue style","fine art portrait photography","intimate boudoir photography style",
  "Peter Lindbergh inspired black and white","Annie Leibovitz dramatic portraiture","Mario Testino sun-drenched style",
  "Paolo Roversi dreamlike soft focus","Helmut Newton bold contrast","Tim Walker fantastical editorial",
  "cinematic still, anamorphic lens flare","35mm film photograph, natural grain","medium format portrait, creamy bokeh",
  "tilt-shift miniature effect portrait","cross-processed vintage film look","infrared photography ethereal glow",
  "wet plate collodion vintage process","cyanotype blue-tone print","double exposure portrait blend",
  "high fashion studio lighting, beauty dish","available light documentary style","chiaroscuro dramatic lighting"
];

var SETTINGS = [
  "in a sun-drenched Tuscan villa bedroom","on a secluded beach at golden hour","in a candlelit Parisian apartment",
  "on a rain-soaked rooftop terrace at night","in a steamy bathroom with fogged mirrors","beside floor-to-ceiling windows overlooking a city skyline at dusk",
  "in a rustic cabin with a roaring fireplace","on a moonlit balcony in Santorini","in a luxury hotel suite with rumpled white sheets",
  "among the ruins of an ancient Greek temple at sunset","in a lush tropical greenhouse","on a private yacht at twilight",
  "in a dimly lit jazz bar with neon signs","in a sunlit artist's loft with paint-splattered floors","on a cliffside terrace overlooking the Amalfi Coast",
  "in a cherry blossom garden in Kyoto at dusk","in a vintage train compartment, passing countryside","on a deserted cobblestone street after rain",
  "in a baroque palace hallway with chandeliers","in a cozy bookshop with golden light","on a rooftop pool overlooking city lights",
  "in a lavender field in Provence at golden hour","in a candle-filled cathedral, warm amber light","on a dock at a mountain lake at sunrise",
  "in a Moroccan riad with mosaic tiles and lanterns","in a penthouse with panoramic city views at night","on a misty forest path with dappled light",
  "in a vintage Hollywood boudoir with velvet curtains","in a flower market surrounded by peonies and roses","on a fire escape in Brooklyn at sunset",
  "in a spa with natural hot springs and steam","in an old library with leather chairs and lamplight"
];

var MOODS = [
  "intimate and tender","sensual and magnetic","dreamy and romantic","raw and passionate",
  "mysterious and alluring","soft and vulnerable","bold and confident","languid and relaxed",
  "electric and charged","warm and affectionate","moody and cinematic","playful and flirtatious",
  "wistful and longing","fierce and empowered","serene and ethereal","sultry and smoldering"
];

var DETAILS = [
  "shallow depth of field f/1.4, creamy bokeh","golden hour rim lighting, warm skin tones","dramatic chiaroscuro, single light source",
  "soft window light wrapping the face, catchlights in eyes","backlit silhouette with glowing edges","candlelight flickering across skin, warm shadows",
  "rain droplets on skin, glistening highlights","steam and mist diffusing the light","wet hair, water droplets on shoulders",
  "lace shadows cast across skin from window blinds","dappled sunlight through sheer curtains","neon light reflections on wet skin",
  "soft focus foreground elements framing the subject","long exposure motion blur on flowing fabric","natural skin texture, visible pores, no retouching",
  "volumetric light rays through dust particles","lens flare from backlighting, anamorphic streak","film grain, lifted blacks, faded highlights",
  "reflection in mirror adding depth, dual composition","smoke or incense trails catching the light","dewy skin, highlighter on cheekbones and collarbones",
  "hair backlit creating a golden halo effect","shadows of venetian blinds across the body","morning light with dust motes floating",
  "goosebumps on skin, extreme close-up detail","fabric texture visible -- silk, linen, or lace","color gel lighting -- warm amber and cool blue split",
  "overexposed highlights, ethereal blown-out background"
];

var currentAR = '--ar 4:5';
var currentPrompt = '';
var genCount = parseInt(localStorage.getItem('pc-count') || '0');
var favorites = JSON.parse(localStorage.getItem('pc-favs') || '[]');
var selections = { subject: -1, style: -1, setting: -1, mood: -1, detail: -1 };

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function pickIdx(arr, currentIdx) {
  if (currentIdx >= 0) return currentIdx;
  return Math.floor(Math.random() * arr.length);
}

function buildSlots() {
  var cats = [
    { key: 'subject', label: 'Subject', items: SUBJECTS, cls: 'slot-subject' },
    { key: 'style', label: 'Camera / Film', items: STYLES, cls: 'slot-style' },
    { key: 'setting', label: 'Setting', items: SETTINGS, cls: 'slot-setting' },
    { key: 'mood', label: 'Mood', items: MOODS, cls: 'slot-mood' },
    { key: 'detail', label: 'Lighting / Texture', items: DETAILS, cls: 'slot-detail' }
  ];
  var html = '';
  cats.forEach(function(cat) {
    var shown = getShownItems(cat.items, cat.key);
    html += '<div class="slot ' + cat.cls + '">';
    html += '<div class="slot-label"><span class="dot"></span>' + cat.label + '</div>';
    html += '<div class="slot-chips">';
    shown.forEach(function(item, i) {
      var sel = selections[cat.key] === item._origIdx ? ' selected' : '';
      html += '<div class="chip' + sel + '" data-cat="' + cat.key + '" data-idx="' + item._origIdx + '" onclick="selectChip(this)">' + item.text + '</div>';
    });
    html += '<div class="chip chip-shuffle" onclick="shuffleSlot(\'' + cat.key + '\')">shuffle</div>';
    html += '</div></div>';
  });
  document.getElementById('slots').innerHTML = html;
}

function getShownItems(arr, key) {
  var pool = arr.map(function(t, i) { return { text: t, _origIdx: i }; });
  var selectedIdx = selections[key];
  var result = [];
  if (selectedIdx >= 0 && selectedIdx < arr.length) {
    result.push({ text: arr[selectedIdx], _origIdx: selectedIdx });
    pool = pool.filter(function(p) { return p._origIdx !== selectedIdx; });
  }
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  var need = 5 - result.length;
  result = result.concat(pool.slice(0, need));
  return result;
}

function selectChip(el) {
  var cat = el.dataset.cat;
  var idx = parseInt(el.dataset.idx);
  if (selections[cat] === idx) {
    selections[cat] = -1;
    el.classList.remove('selected');
  } else {
    selections[cat] = idx;
    var parent = el.parentElement;
    parent.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('selected'); });
    el.classList.add('selected');
  }
  generate(true);
}

function shuffleSlot(key) {
  selections[key] = -1;
  buildSlots();
  generate(true);
}

function generate(keepSelections) {
  if (!keepSelections) {
    selections = { subject: -1, style: -1, setting: -1, mood: -1, detail: -1 };
    buildSlots();
  }

  var arrs = { subject: SUBJECTS, style: STYLES, setting: SETTINGS, mood: MOODS, detail: DETAILS };
  var chosen = {};
  for (var k in arrs) {
    chosen[k] = selections[k] >= 0 ? arrs[k][selections[k]] : pick(arrs[k]);
  }

  var suffix = ', photorealistic, ultra detailed skin texture, 8K resolution ' + currentAR + ' --v 6.1 --s 250 --style raw';

  currentPrompt = chosen.subject + ', ' + chosen.style + ', ' + chosen.setting + ', ' +
    chosen.mood + ' mood, ' + chosen.detail + suffix;

  var display = '<span class="tag subject">' + chosen.subject + '</span>, ' +
    '<span class="tag style">' + chosen.style + '</span>, ' +
    '<span class="tag setting">' + chosen.setting + '</span>, ' +
    '<span class="tag mood">' + chosen.mood + ' mood</span>, ' +
    '<span class="tag detail">' + chosen.detail + '</span>, photorealistic, ultra detailed skin texture, 8K resolution ' + currentAR + ' --v 6.1 --s 250 --style raw';

  var box = document.getElementById('prompt-box');
  box.classList.remove('pop');
  void box.offsetWidth;
  box.classList.add('pop');
  document.getElementById('prompt-text').innerHTML = display;

  genCount++;
  localStorage.setItem('pc-count', genCount);
  document.getElementById('counter').textContent = genCount + ' prompts generated';

  var copyBtn = document.getElementById('btn-copy');
  copyBtn.textContent = 'Copy Prompt';
  copyBtn.classList.remove('copied');
}

function copyPrompt() {
  if (!currentPrompt) return;
  navigator.clipboard.writeText(currentPrompt).then(function() {
    var btn = document.getElementById('btn-copy');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    showToast('Prompt copied to clipboard');
    setTimeout(function() { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  });
}

function setAR(el) {
  currentAR = el.dataset.ar;
  document.querySelectorAll('[data-ar]').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  if (currentPrompt) generate(true);
}

function saveFav() {
  if (!currentPrompt) return;
  if (favorites.indexOf(currentPrompt) >= 0) { showToast('Already saved'); return; }
  favorites.unshift(currentPrompt);
  if (favorites.length > 50) favorites.pop();
  localStorage.setItem('pc-favs', JSON.stringify(favorites));
  renderFavs();
  showToast('Prompt saved');
}

function removeFav(idx) {
  favorites.splice(idx, 1);
  localStorage.setItem('pc-favs', JSON.stringify(favorites));
  renderFavs();
}

function copyFav(idx) {
  navigator.clipboard.writeText(favorites[idx]).then(function() { showToast('Copied'); });
}

function renderFavs() {
  var section = document.getElementById('favs-section');
  var list = document.getElementById('favs-list');
  if (favorites.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  var html = '';
  favorites.forEach(function(f, i) {
    html += '<div class="fav-item"><div class="fav-text">' + escH(f) + '</div>' +
      '<div class="fav-actions">' +
      '<button class="fav-btn" onclick="copyFav(' + i + ')" title="Copy">&#128203;</button>' +
      '<button class="fav-btn" onclick="removeFav(' + i + ')" title="Remove">&#10005;</button>' +
      '</div></div>';
  });
  list.innerHTML = html;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('counter').textContent = genCount + ' prompts generated';
generate();
renderFavs();
</script>
</body>
</html>
