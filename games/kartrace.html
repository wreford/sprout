// --- AUDIO ---
var AudioCtx=window.AudioContext||window.webkitAudioContext;
var audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();}

function playTone(freq,dur,type,vol,ramp){
  type=type||'sine';vol=vol||0.15;ramp=ramp!==false;
  ensureAudio();
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.value=vol;
  if(ramp)g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playCollect(){playTone(880,0.1);setTimeout(function(){playTone(1320,0.15);},80);}
function playBoost(){playTone(200,0.3,'sawtooth',0.1);playTone(400,0.3,'sawtooth',0.08);}
function playShellFire(){playTone(600,0.1,'square',0.1);setTimeout(function(){playTone(300,0.15,'square',0.1);},60);}
function playSlip(){playTone(150,0.3,'sawtooth',0.12);}
function playStarJingle(){[660,880,1100,1320].forEach(function(f,i){setTimeout(function(){playTone(f,0.15,'square',0.08);},i*80);});}
function playLap(){playTone(523,0.15);setTimeout(function(){playTone(659,0.15);},120);setTimeout(function(){playTone(784,0.2);},240);}
function playFinish(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.2,'square',0.1);},i*150);});}
function playCountdown(high){playTone(high?880:440,0.2,'square',0.12);}
function playHit(){playTone(100,0.2,'square',0.12);playTone(80,0.3,'sawtooth',0.08);}

var engineOsc=null,engineGain=null;
function startEngine(){
  ensureAudio();
  if(engineOsc)return;
  engineOsc=audioCtx.createOscillator();engineGain=audioCtx.createGain();
  engineOsc.type='sawtooth';engineOsc.frequency.value=60;engineGain.gain.value=0.03;
  engineOsc.connect(engineGain);engineGain.connect(audioCtx.destination);engineOsc.start();
}
function updateEngine(speed){
  if(!engineOsc)return;
  engineOsc.frequency.value=40+speed*0.5;
  engineGain.gain.value=Math.min(0.06,0.015+speed*0.0002);
}
function stopEngine(){
  if(engineOsc){try{engineOsc.stop();}catch(e){}engineOsc=null;engineGain=null;}
}

// Build flat segment arrays for each track
function buildTrackSegments(track){
  var segs=[];
  var totalLen=0;
  for(var i=0;i<track.segments.length;i++){
    var s=track.segments[i];
    for(var j=0;j<s.length;j++){
      segs.push({
        curve:s.curve,
        hill:s.hill||0,
        index:totalLen,
        hasItem:Math.random()<track.itemFreq,
        itemActive:true,
        itemRespawn:0,
        hasBoost:false,
        hasBanana:false,
        bananaLane:0
      });
      totalLen++;
    }
  }
  // Add boost pads
  var boostInterval=Math.floor(totalLen/4);
  for(var i=0;i<4;i++){
    var idx=(boostInterval*i+Math.floor(boostInterval/2))%totalLen;
    segs[idx].hasBoost=true;
  }
  track.flatSegments=segs;
  track.totalLength=totalLen;
}
TRACKS.forEach(buildTrackSegments);

// Roadside objects per track
function buildRoadsideObjects(track){
  var objs=[];
  var total=track.totalLength;
  for(var i=0;i<total;i+=8+Math.floor(Math.random()*12)){
    var side=Math.random()<0.5?-1:1;
    var type=Math.random();
    objs.push({
      segIndex:i%total,
      side:side,
      offset:0.7+Math.random()*0.5,
      type:type<0.6?'tree':(type<0.8?'sign':'mushroom')
    });
  }
  track.roadsideObjects=objs;
}

// --- CAMERA / SCROLL ---
var scrollPos=0;

// =============================================================
// PSEUDO-3D RENDERING ENGINE
// =============================================================

var DRAW_DIST=200;        // how many segments to draw ahead
var SEG_LENGTH=5;         // each segment depth unit
var CAM_HEIGHT=1500;      // camera height above road
var CAM_DEPTH=1/(Math.tan((80/2)*PI/180)); // FOV

function getSegment(track,index){
  var segs=track.flatSegments;
  var total=segs.length;
  return segs[((index%total)+total)%total];
}

function project(x,y,z,camX,camY,camZ){
  // Project 3D point to 2D screen
  var scale_proj=CAM_DEPTH/(z-camZ);
  var sx=W/2+(x-camX)*scale_proj*W/2;
  var sy=H/2-(y-camY)*scale_proj*H/2;
  var sw=scale_proj*W/2;
  return {x:sx,y:sy,w:sw,scale:scale_proj};
}

function drawRoad(){
  var track=TRACKS[currentTrack];
  var segs=track.flatSegments;
  var total=segs.length;
  var baseIndex=Math.floor(player.position)%total;
  var basePercent=player.position-Math.floor(player.position);

  // Camera position
  var camZ=basePercent*SEG_LENGTH;
  var camX=player.playerX*track.roadWidth/2;
  var camY=CAM_HEIGHT;

  // Sky
  drawSky(track);

  // Accumulate curve and hill
  var curveAcc=0;
  var hillAcc=0;
  var prevProj=null;

  // Collect projected segments
  var projected=[];
  for(var i=0;i<DRAW_DIST;i++){
    var segIdx=((baseIndex+i)%total+total)%total;
    var seg=segs[segIdx];
    curveAcc+=seg.curve;
    hillAcc+=seg.hill;

    var worldX=curveAcc*50;
    var worldY=hillAcc*30;
    var worldZ=(i+1)*SEG_LENGTH-camZ;

    if(worldZ<=0)continue;

    var p=project(worldX,worldY,worldZ,camX,0,0);
    p.segIdx=segIdx;
    p.seg=seg;
    p.worldZ=worldZ;
    p.curve=curveAcc;
    projected.push(p);
  }

  // Draw from back to front
  var horizonY=H/2;
  if(projected.length>0){
    horizonY=projected[projected.length-1].y;
  }

  // Clip sky at horizon
  ctx.save();

  for(var i=projected.length-1;i>0;i--){
    var p1=projected[i];
    var p2=projected[i-1];

    // Skip if behind camera or above screen
    if(p1.y>=p2.y)continue;
    if(p2.y<0)continue;
    if(p1.y>H)continue;

    var segIdx=p2.segIdx;
    var isLight=Math.floor(segIdx/3)%2===0;

    var y1=Math.max(0,Math.floor(p1.y));
    var y2=Math.min(H,Math.ceil(p2.y));

    if(y1>=y2)continue;

    // Road widths
    var rw=track.roadWidth;
    var w1=p1.w*rw;
    var w2=p2.w*rw;
    var rumbleW1=w1*1.15;
    var rumbleW2=w2*1.15;

    // Grass
    if(track.isRainbow){
      var hue=((segIdx*3+raceTime*100)%360);
      ctx.fillStyle=isLight?'hsl('+hue+',10%,3%)':'hsl('+hue+',10%,2%)';
    } else {
      ctx.fillStyle=isLight?track.grassColor1:track.grassColor2;
    }
    ctx.fillRect(0,y1,W,y2-y1);

    // Rumble strips
    if(track.isRainbow){
      var hue2=(segIdx*8+raceTime*200)%360;
      ctx.fillStyle=isLight?'hsl('+hue2+',100%,60%)':'hsl('+((hue2+180)%360)+',100%,60%)';
    } else {
      ctx.fillStyle=isLight?track.rumbleColor1:track.rumbleColor2;
    }
    drawTrapezoid(p1.x,y1,rumbleW1,p2.x,y2,rumbleW2);

    // Road surface
    if(track.isRainbow){
      var hue3=(segIdx*5+raceTime*80)%360;
      ctx.fillStyle=isLight?'hsl('+hue3+',60%,30%)':'hsl('+hue3+',60%,22%)';
    } else {
      ctx.fillStyle=isLight?track.roadColor1:track.roadColor2;
    }
    drawTrapezoid(p1.x,y1,w1,p2.x,y2,w2);

    // White lane markers
    var laneW1=w1*0.02;
    var laneW2=w2*0.02;
    if(laneW1<1)laneW1=1;
    if(laneW2<1)laneW2=1;

    // Edge lines (always)
    ctx.fillStyle='#ffffff';
    // Left edge
    drawTrapezoid(p1.x-w1/2,y1,laneW1*2,p2.x-w2/2,y2,laneW2*2);
    // Right edge
    drawTrapezoid(p1.x+w1/2-laneW1*2,y1,laneW1*2,p2.x+w2/2-laneW2*2,y2,laneW2*2);

    // Center dashes
    if(isLight){
      ctx.fillStyle='rgba(255,255,255,0.6)';
      drawTrapezoid(p1.x-laneW1,y1,laneW1*2,p2.x-laneW2,y2,laneW2*2);
    }

    // Boost pad glow
    if(p2.seg.hasBoost){
      var glowAlpha=0.3+0.3*Math.sin(raceTime*10);
      ctx.fillStyle='rgba(255,220,0,'+glowAlpha+')';
      drawTrapezoid(p1.x,y1,w1*0.4,p2.x,y2,w2*0.4);
      // Chevron lines
      ctx.fillStyle='rgba(255,180,0,'+glowAlpha+')';
      drawTrapezoid(p1.x,y1,w1*0.05,p2.x,y2,w2*0.05);
    }

    // Start/finish line (segment 0)
    if(segIdx===0||segIdx===1||segIdx===2){
      ctx.fillStyle=(segIdx+Math.floor(raceTime*2))%2===0?'#ffffff':'#222222';
      drawTrapezoid(p1.x,y1,w1*0.8,p2.x,y2,w2*0.8);
    }
  }

  // Draw roadside objects
  drawRoadsideObjects(track,projected);

  // Draw item boxes on road
  drawTrackItems(track,projected);

  // Draw bananas on road
  drawBananasOnRoad(projected,track);

  // Draw shells
  drawShellsOnRoad(projected,track);

  // Draw AI racers
  drawAIRacers(projected,track);

  ctx.restore();
}

function drawTrapezoid(x1,y1,w1,x2,y2,w2){
  ctx.beginPath();
  ctx.moveTo(x1-w1/2,y1);
  ctx.lineTo(x1+w1/2,y1);
  ctx.lineTo(x2+w2/2,y2);
  ctx.lineTo(x2-w2/2,y2);
  ctx.closePath();
  ctx.fill();
}

function drawSky(track){
  // Gradient sky
  var grad=ctx.createLinearGradient(0,0,0,H/2);
  grad.addColorStop(0,track.bgColorTop);
  grad.addColorStop(1,track.bgColorBot);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H/2+20);

  if(track.isRainbow){
    // Stars in space
    var seed=42;
    for(var i=0;i<80;i++){
      seed=(seed*1103515245+12345)&0x7fffffff;
      var sx=(seed%W);
      seed=(seed*1103515245+12345)&0x7fffffff;
      var sy=(seed%(H/2));
      seed=(seed*1103515245+12345)&0x7fffffff;
      var bright=0.3+(seed%70)/100;
      ctx.fillStyle='rgba(255,255,255,'+bright+')';
      ctx.fillRect(sx,sy,2,2);
    }
    return;
  }

  if(track.skyMountain){
    // Mountains (parallax)
    var mountainOffset=player.steerAmount*20;

    // Far mountains
    ctx.fillStyle='rgba(100,140,180,0.4)';
    ctx.beginPath();
    ctx.moveTo(-50,H/2+10);
    for(var x=-50;x<=W+50;x+=30){
      var mh=40+Math.sin(x*0.008+1)*35+Math.sin(x*0.015)*20;
      ctx.lineTo(x+mountainOffset*0.3,H/2+10-mh*scale);
    }
    ctx.lineTo(W+50,H/2+10);
    ctx.closePath();
    ctx.fill();

    // Near mountains
    ctx.fillStyle='rgba(60,100,60,0.6)';
    ctx.beginPath();
    ctx.moveTo(-50,H/2+10);
    for(var x=-50;x<=W+50;x+=20){
      var mh=25+Math.sin(x*0.012+3)*30+Math.sin(x*0.02+1)*15;
      ctx.lineTo(x+mountainOffset*0.5,H/2+10-mh*scale);
    }
    ctx.lineTo(W+50,H/2+10);
    ctx.closePath();
    ctx.fill();

    // Clouds
    ctx.fillStyle='rgba(255,255,255,0.3)';
    var cloudBase=raceTime*5+mountainOffset*0.2;
    for(var i=0;i<5;i++){
      var cx=((i*W/3+cloudBase*3*(i%2===0?1:-1))%((W+200))-100);
      var cy=H*0.1+i*H*0.06;
      ctx.beginPath();
      ctx.arc(cx,cy,30*scale,0,TAU);
      ctx.arc(cx+25*scale,cy-5*scale,22*scale,0,TAU);
      ctx.arc(cx+50*scale,cy,28*scale,0,TAU);
      ctx.fill();
    }
  }
}

function drawRoadsideObjects(track,projected){
  if(!track.treeColor)return;
  var total=track.totalLength;
  var baseIndex=Math.floor(player.position)%total;

  for(var oi=0;oi<track.roadsideObjects.length;oi++){
    var obj=track.roadsideObjects[oi];
    var relSeg=((obj.segIndex-baseIndex)%total+total)%total;
    if(relSeg<1||relSeg>=DRAW_DIST-1)continue;

    // Find projected segment
    var pIdx=-1;
    for(var pi=0;pi<projected.length;pi++){
      if(projected[pi].segIdx===obj.segIndex){pIdx=pi;break;}
    }
    if(pIdx<0||pIdx<1)continue;

    var p=projected[pIdx];
    var rw=track.roadWidth;
    var objScale=p.scale;
    if(objScale<=0)continue;

    var lateralPos=obj.side*(rw/2*p.w+p.w*rw*obj.offset);
    var ox=p.x+lateralPos;
    var oy=p.y;

    if(ox<-100||ox>W+100||oy<0||oy>H)continue;

    var sz=objScale*W/2;
    if(sz<2)continue;

    if(obj.type==='tree'){
      // Trunk
      ctx.fillStyle=track.treeTrunk;
      var tw=sz*20;
      var th=sz*60;
      ctx.fillRect(ox-tw/2,oy-th,tw,th);
      // Foliage
      ctx.fillStyle=track.treeColor;
      ctx.beginPath();
      ctx.moveTo(ox,oy-th-sz*80);
      ctx.lineTo(ox-sz*40,oy-th+sz*10);
      ctx.lineTo(ox+sz*40,oy-th+sz*10);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ox,oy-th-sz*50);
      ctx.lineTo(ox-sz*30,oy-th+sz*25);
      ctx.lineTo(ox+sz*30,oy-th+sz*25);
      ctx.closePath();
      ctx.fill();
    } else if(obj.type==='sign'){
      // Sign post
      ctx.fillStyle='#888888';
      var sw2=sz*8;
      ctx.fillRect(ox-sw2/2,oy-sz*50,sw2,sz*50);
      // Sign board
      ctx.fillStyle='#dd4444';
      ctx.fillRect(ox-sz*25,oy-sz*55,sz*50,sz*30);
      // Arrow
      ctx.fillStyle='#ffffff';
      ctx.font=(sz*18)+'px monospace';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(obj.side>0?'<':'>',ox,oy-sz*40);
    } else if(obj.type==='mushroom'){
      // Mushroom
      var mSz=sz*25;
      ctx.fillStyle='#eeddbb';
      ctx.fillRect(ox-mSz*0.15,oy-mSz*0.8,mSz*0.3,mSz*0.8);
      ctx.fillStyle='#ee3333';
      ctx.beginPath();
      ctx.arc(ox,oy-mSz*0.8,mSz*0.5,PI,0);
      ctx.fill();
      // Dots
      ctx.fillStyle='#ffffff';
      ctx.beginPath();
      ctx.arc(ox-mSz*0.15,oy-mSz*0.95,mSz*0.1,0,TAU);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ox+mSz*0.15,oy-mSz*0.85,mSz*0.08,0,TAU);
      ctx.fill();
    }
  }
}

function drawTrackItems(track,projected){
  var total=track.totalLength;
  var baseIndex=Math.floor(player.position)%total;
  var segs=track.flatSegments;

  for(var i=0;i<projected.length;i++){
    var p=projected[i];
    var seg=p.seg;
    if(!seg.hasItem||!seg.itemActive)continue;

    var objScale=p.scale;
    if(objScale<=0.001)continue;

    var sz=objScale*W/2;
    if(sz<3)continue;

    var boxSize=sz*30;
    if(boxSize>60*scale)boxSize=60*scale;
    if(boxSize<4)continue;

    var bob=Math.sin(raceTime*4+p.segIdx)*boxSize*0.15;
    var bx=p.x;
    var by=p.y-boxSize-bob;

    if(bx<-50||bx>W+50||by<0||by>H)continue;

    // Rotating question box
    var rot=raceTime*3+p.segIdx;
    ctx.save();
    ctx.translate(bx,by);
    ctx.rotate(Math.sin(rot)*0.3);

    // Box
    ctx.fillStyle='rgba(255,200,50,0.9)';
    ctx.fillRect(-boxSize/2,-boxSize/2,boxSize,boxSize);
    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=Math.max(1,boxSize*0.1);
    ctx.strokeRect(-boxSize/2,-boxSize/2,boxSize,boxSize);

    // Question mark
    ctx.fillStyle='#ffffff';
    ctx.font='bold '+Math.max(6,boxSize*0.7)+'px monospace';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('?',0,1);

    ctx.restore();
  }
}

function drawBananasOnRoad(projected,track){
  var total=track.totalLength;
  var baseIndex=Math.floor(player.position)%total;

  for(var bi=0;bi<droppedBananas.length;bi++){
    var ban=droppedBananas[bi];
    if(!ban.active)continue;

    var relSeg=((Math.floor(ban.position)-baseIndex)%total+total)%total;
    if(relSeg<1||relSeg>=DRAW_DIST-1)continue;

    // Find projected segment
    var p=null;
    for(var pi=0;pi<projected.length;pi++){
      if(projected[pi].segIdx===Math.floor(ban.position)%total){p=projected[pi];break;}
    }
    if(!p)continue;

    var objScale=p.scale;
    if(objScale<=0)continue;

    var sz=objScale*W/2;
    var bx=p.x+ban.laneX*track.roadWidth/2*p.w;
    var by=p.y;
    var bSz=sz*20;
    if(bSz<3)continue;

    // Banana
    ctx.fillStyle='#ffee00';
    ctx.beginPath();
    ctx.arc(bx,by-bSz/2,bSz/2,0,TAU);
    ctx.fill();
    ctx.fillStyle='#cc9900';
    ctx.beginPath();
    ctx.arc(bx-bSz*0.15,by-bSz*0.6,bSz*0.2,0,TAU);
    ctx.fill();
  }
}

function drawShellsOnRoad(projected,track){
  var total=track.totalLength;
  var baseIndex=Math.floor(player.position)%total;

  for(var si=0;si<activeShells.length;si++){
    var shell=activeShells[si];

    var relSeg=((Math.floor(shell.position)-baseIndex)%total+total)%total;
    if(relSeg<1||relSeg>=DRAW_DIST-1)continue;

    var p=null;
    for(var pi=0;pi<projected.length;pi++){

    }

    var objScale=p.scale;

    var sx2=p.x+shell.laneX*track.roadWidth/2*p.w;

    var sSz=sz*15;
    if(sSz<3)continue;

    ctx.fillStyle='#00ff44';
    ctx.beginPath();
    ctx.arc(sx2,sy2-sSz/2,sSz/2,0,TAU);

    ctx.fillStyle='#00aa22';

}

function drawAIRacers(projected,track){
  var total=track.totalLength;
  var baseIndex=Math.floor(player.position)%total;

  for(var ai=0;ai<aiRacers.length;ai++){
    var racer=aiRacers[ai];
    var relSeg=((Math.floor(racer.position)-baseIndex)%total+total)%total;
    if(relSeg<1||relSeg>=DRAW_DIST-1)continue;

    // Find projected segment
    var p=null;
    for(var pi=0;pi<projected.length;pi++){
      if(projected[pi].segIdx===Math.floor(racer.position)%total){p=projected[pi];break;}
    }
    if(!p)continue;

    var objScale=p.scale;
    if(objScale<=0)continue;

    var sz=objScale*W/2;
    var rx=p.x+racer.playerX*track.roadWidth/2*p.w;
    var ry=p.y;

    var kartW=sz*50;
    var kartH=sz*35;
    if(kartW<4)continue;

    var shrunk=racer.shrinkTimer>0;
    if(shrunk){kartW*=0.6;kartH*=0.6;}

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(rx,ry,kartW/2,kartH*0.15,0,0,TAU);
    ctx.fill();

    // Kart body
    ctx.fillStyle=racer.color;
    ctx.fillRect(rx-kartW/2,ry-kartH,kartW,kartH);

    // Wheels
    ctx.fillStyle='#222222';
    ctx.fillRect(rx-kartW/2-kartW*0.1,ry-kartH*0.2,kartW*0.15,kartH*0.25);
    ctx.fillRect(rx+kartW/2-kartW*0.05,ry-kartH*0.2,kartW*0.15,kartH*0.25);
    ctx.fillRect(rx-kartW/2-kartW*0.1,ry-kartH*0.9,kartW*0.15,kartH*0.25);
    ctx.fillRect(rx+kartW/2-kartW*0.05,ry-kartH*0.9,kartW*0.15,kartH*0.25);

    // Helmet
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.arc(rx,ry-kartH*0.65,kartW*0.18,0,TAU);
    ctx.fill();
  }
}

function drawPlayerKart(){
  var kartY=H-80*scale;
  var kartX=W/2;
  var kartW=40*scale;
  var kartH=30*scale;

  // Determine lean direction
  var lean=player.steerAmount;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(kartX,kartY+kartH*0.4,kartW*0.7,kartH*0.15,0,0,TAU);
  ctx.fill();

  ctx.save();
  ctx.translate(kartX,kartY);

  // Lean transform
  ctx.transform(1,0,lean*0.15,1,0,0);

  var color='#e33333';
  if(player.starTimer>0){
    color='hsl('+((raceTime*600)%360)+',100%,60%)';
  }

  // Back of kart (wide rectangle)
  ctx.fillStyle=darkenColor(color,0.7);
  ctx.fillRect(-kartW/2,-kartH*0.1,kartW,kartH*0.5);

  // Main body
  ctx.fillStyle=color;
  ctx.fillRect(-kartW*0.45,-kartH*0.6,kartW*0.9,kartH*0.7);

  // Cockpit top
  ctx.fillStyle=darkenColor(color,0.85);
  ctx.fillRect(-kartW*0.3,-kartH*0.8,kartW*0.6,kartH*0.3);

  // Windshield
  ctx.fillStyle='rgba(150,200,255,0.6)';
  ctx.fillRect(-kartW*0.25,-kartH*0.85,kartW*0.5,kartH*0.15);

  // Helmet
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.arc(0,-kartH*0.4,kartW*0.15,0,TAU);
  ctx.fill();
  ctx.fillStyle='#333333';
  ctx.beginPath();
  ctx.arc(0,-kartH*0.42,kartW*0.1,PI,0);
  ctx.fill();

  // Left wheel
  ctx.fillStyle='#222222';
  ctx.fillRect(-kartW/2-kartW*0.12,-kartH*0.15,kartW*0.14,kartH*0.35);
  ctx.fillRect(-kartW/2-kartW*0.12,-kartH*0.7,kartW*0.14,kartH*0.35);

  // Right wheel
  ctx.fillRect(kartW/2-kartW*0.02,-kartH*0.15,kartW*0.14,kartH*0.35);
  ctx.fillRect(kartW/2-kartW*0.02,-kartH*0.7,kartW*0.14,kartH*0.35);

  // Exhaust pipe
  ctx.fillStyle='#444444';
  var exSide=lean<-0.1?-1:(lean>0.1?1:0);
  ctx.fillRect(-kartW*0.15+exSide*kartW*0.05,kartH*0.2,kartW*0.08,kartH*0.2);
  ctx.fillRect(kartW*0.07+exSide*kartW*0.05,kartH*0.2,kartW*0.08,kartH*0.2);

  ctx.restore();

  // Exhaust particles
  if(player.speed>50&&gameState===STATE_RACING){
    if(Math.random()<0.3){
      addParticle(
        kartX-kartW*0.1+Math.random()*kartW*0.2,
        kartY+kartH*0.5,
        (Math.random()-0.5)*20,
        30+Math.random()*20,
        player.boostTimer>0?'rgba(255,150,0,':'rgba(150,150,150,',
        0.4+Math.random()*0.3
      );
    }
  }

  // Speed lines when boosting
  if(player.boostTimer>0||player.starTimer>0){
    ctx.strokeStyle='rgba(255,255,255,0.4)';
    ctx.lineWidth=2;
    for(var i=0;i<6;i++){
      var lx=Math.random()*W;
      var ly1=H*0.3+Math.random()*H*0.4;
      ctx.beginPath();
      ctx.moveTo(lx,ly1);
      ctx.lineTo(lx+(lx-W/2)*0.1,ly1+40*scale);
      ctx.stroke();
    }
  }

  // Spin animation
  if(player.spinTimer>0){
    ctx.save();
    ctx.translate(kartX,kartY);
    ctx.rotate(player.spinTimer*15);
    ctx.globalAlpha=0.5;
    ctx.fillStyle='#ffff00';
    ctx.font=Math.floor(20*scale)+'px monospace';
    ctx.textAlign='center';
    ctx.fillText('*',0,-kartH);
    ctx.restore();
  }
}

function darkenColor(hex,factor){
  // Simple darken for hex colors
  if(hex.charAt(0)==='h')return hex; // hsl, skip
  var r=parseInt(hex.substr(1,2),16)||parseInt(hex.substr(1,1),16)*17;
  var g=parseInt(hex.substr(3,2),16)||parseInt(hex.substr(2,1),16)*17;
  var b=parseInt(hex.substr(5,2),16)||parseInt(hex.substr(3,1),16)*17;
  r=Math.floor(r*factor);
  g=Math.floor(g*factor);
  b=Math.floor(b*factor);
  return 'rgb('+r+','+g+','+b+')';
}

function updateParticles(dt){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0){
      particles.splice(i,1);
    }
  }
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var alpha=p.life/p.maxLife;
    ctx.fillStyle=p.color+alpha+')';
    var sz=3*scale*alpha;
    ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz);
  }
}

function drawMinimap(){
  var fs=scale;
  var mmX=W-50*fs;
  var mmY=70*fs;
  var mmR=30*fs;

  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.arc(mmX,mmY,mmR,0,TAU);
  ctx.fill();

  var track=TRACKS[currentTrack];
  var total=track.totalLength;

  // Draw track as a circle
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=3*fs;
  ctx.beginPath();
  ctx.arc(mmX,mmY,mmR*0.7,0,TAU);
  ctx.stroke();

  // Player dot
  var pAngle=(player.position/total)*TAU-PI/2;
  ctx.fillStyle='#ff3333';
  ctx.beginPath();
  ctx.arc(mmX+Math.cos(pAngle)*mmR*0.7,mmY+Math.sin(pAngle)*mmR*0.7,3*fs,0,TAU);
  ctx.fill();

  // AI dots
  for(var i=0;i<aiRacers.length;i++){
    var aiAngle=(aiRacers[i].position/total)*TAU-PI/2;
    ctx.fillStyle=aiRacers[i].color;
    ctx.beginPath();
    ctx.arc(mmX+Math.cos(aiAngle)*mmR*0.7,mmY+Math.sin(aiAngle)*mmR*0.7,2.5*fs,0,TAU);
    ctx.fill();
  }
}

// =============================================================
// GAME LOGIC
// =============================================================

function resetRace(){
  var track=TRACKS[currentTrack];
  player.position=0;
  player.speed=0;
  player.maxSpeed=200;
  player.accel=120;
  player.turnSpeed=0;
  player.steerAmount=0;
  player.playerX=0;
  player.lap=0;
  player.item=ITEM_NONE;
  player.itemTimer=0;
  player.boostTimer=0;
  player.starTimer=0;
  player.spinTimer=0;
  player.invincTimer=0;
  player.offRoad=false;
  player.finished=false;
  player.finishTime=0;

  aiRacers=[];
  for(var i=0;i<NUM_AI;i++){
    aiRacers.push(createAI(i));
  }

  droppedBananas=[];
  activeShells=[];
  particles=[];
  finishPositions=[];
  raceTime=0;
  countdown=4;
  countdownTimer=0;

  // Reset items on track
  var segs=track.flatSegments;
  for(var i=0;i<segs.length;i++){
    if(segs[i].hasItem)segs[i].itemActive=true;
    segs[i].itemRespawn=0;
  }

  gameState=STATE_COUNTDOWN;
}

function update(dt){
  if(gameState===STATE_COUNTDOWN){
    countdownTimer+=dt;
    if(countdownTimer>1){
      countdownTimer=0;
      countdown--;
      if(countdown>0)playCountdown(countdown===1);
      if(countdown<=0){
        gameState=STATE_RACING;
        playCountdown(true);
        startEngine();
      }
    }
    return;
  }

  if(gameState!==STATE_RACING)return;

  raceTime+=dt;

  var track=TRACKS[currentTrack];
  var total=track.totalLength;

  // --- PLAYER ---
  if(!player.finished){
    updatePlayerTimers(dt);

    if(player.spinTimer>0){
      player.speed*=0.95;
      player.spinTimer-=dt;
    } else {
      // Steering
      var steerInput=0;
      if(touchLeft)steerInput=-1;
      if(touchRight)steerInput=1;
      if(keys['ArrowLeft']||keys['a'])steerInput=-1;
      if(keys['ArrowRight']||keys['d'])steerInput=1;

      // Smooth steer amount for visual
      player.steerAmount+=(steerInput-player.steerAmount)*8*dt;

      // Current segment curve for natural steering feel
      var curSeg=getSegment(track,Math.floor(player.position));
      var curvePull=curSeg.curve*player.speed*0.00003;

      // Lateral movement
      var lateralSpeed=3.0;
      if(player.speed<50)lateralSpeed=1.5;
      player.playerX+=steerInput*lateralSpeed*dt;
      player.playerX+=curvePull*dt;

      // Clamp and off-road detection
      var roadEdge=1.0;
      player.offRoad=Math.abs(player.playerX)>roadEdge;

      // Slow down off-road
      var targetMax=player.maxSpeed;
      if(player.boostTimer>0)targetMax=player.maxSpeed*1.5;
      if(player.starTimer>0)targetMax=player.maxSpeed*1.4;

      if(player.offRoad){
        targetMax*=0.5;
        // Push back gently
        if(Math.abs(player.playerX)>1.5){
          player.playerX+=(player.playerX>0?-1:1)*2*dt;
        }
        // Rainbow road: fall off if too far
        if(track.isRainbow&&Math.abs(player.playerX)>1.3){
          player.playerX=0;
          player.speed=40;
          player.position-=30;
          if(player.position<0)player.position+=total;
          playSlip();
        }
      }

      // Acceleration (auto)
      if(player.speed<targetMax){
        player.speed+=player.accel*dt;
      } else {
        player.speed+=(targetMax-player.speed)*3*dt;
      }
      if(player.speed<0)player.speed=0;

      // Use item
      if(touchUseItem&&player.item!==ITEM_NONE&&player.itemTimer<=0){
        usePlayerItem();
        touchUseItem=false;
      }
    }

    // Move forward
    player.position+=player.speed*dt*0.15;

    // Lap detection
    var lapProgress=player.position/total;
    var newLap=Math.floor(lapProgress);
    if(newLap>player.lap){
      player.lap=newLap;
      if(player.lap>=LAPS_TOTAL){
        player.finished=true;
        player.finishTime=raceTime;
        finishPositions.push(-1); // -1 = player
        playFinish();
        stopEngine();
        checkRaceEnd();
      } else {
        playLap();
      }
    }

    // Item box collection
    var pSegIdx=Math.floor(player.position)%total;
    for(var di=-2;di<=2;di++){
      var checkIdx=((pSegIdx+di)%total+total)%total;
      var seg=track.flatSegments[checkIdx];
      if(seg.hasItem&&seg.itemActive&&player.item===ITEM_NONE){
        seg.itemActive=false;
        seg.itemRespawn=8;
        givePlayerItem();
        playCollect();
      }
    }

    // Boost pad check
    var pSeg=track.flatSegments[pSegIdx];
    if(pSeg.hasBoost&&Math.abs(player.playerX)<0.5){
      if(player.boostTimer<=0){
        player.boostTimer=1;
        player.speed=Math.max(player.speed,player.maxSpeed*1.3);
        playBoost();
      }
    }

    // Banana collision
    for(var bi=droppedBananas.length-1;bi>=0;bi--){
      var ban=droppedBananas[bi];
      if(!ban.active)continue;
      var bDist=Math.abs(ban.position-player.position%total);
      if(bDist>total/2)bDist=total-bDist;
      if(bDist<5&&Math.abs(ban.laneX-player.playerX)<0.4){
        if(player.starTimer<=0&&player.invincTimer<=0){
          player.spinTimer=1;
          player.speed*=0.3;
          playSlip();
        }
        ban.active=false;
      }
    }

    // Shell collision
    for(var si=activeShells.length-1;si>=0;si--){
      var shell=activeShells[si];
      if(!shell.active||shell.fromPlayer)continue;
      var sDist=Math.abs(shell.position-(player.position%total));
      if(sDist>total/2)sDist=total-sDist;
      if(sDist<5&&Math.abs(shell.laneX-player.playerX)<0.4){
        if(player.starTimer<=0&&player.invincTimer<=0){
          player.spinTimer=1.2;
          player.speed*=0.2;
          playHit();
        }
        shell.active=false;
      }
    }

    updateEngine(player.speed);
  }

  // Item respawn
  for(var i=0;i<track.flatSegments.length;i++){
    var seg=track.flatSegments[i];
    if(seg.hasItem&&!seg.itemActive){
      seg.itemRespawn-=dt;
      if(seg.itemRespawn<=0)seg.itemActive=true;
    }
  }

  // --- AI RACERS ---
  for(var ai=0;ai<aiRacers.length;ai++){
    updateAI(aiRacers[ai],ai,dt,track,total);
  }

  // --- SHELLS ---
  for(var si=activeShells.length-1;si>=0;si--){
    var shell=activeShells[si];
    if(!shell.active){activeShells.splice(si,1);continue;}
    shell.position+=shell.speed*dt*0.15;
    shell.life-=dt;
    if(shell.life<=0){shell.active=false;continue;}

    // Shell hitting AI
    if(shell.fromPlayer){
      for(var ai=0;ai<aiRacers.length;ai++){
        var racer=aiRacers[ai];
        if(racer.finished)continue;
        var sDist2=Math.abs(shell.position-(racer.position%total));
        if(sDist2>total/2)sDist2=total-sDist2;
        if(sDist2<5&&Math.abs(shell.laneX-racer.playerX)<0.4){
          racer.spinTimer=1;
          racer.speed*=0.3;
          shell.active=false;
          break;
        }
      }
    }
  }

  // --- BANANAS cleanup ---
  droppedBananas=droppedBananas.filter(function(b){return b.active;});

  // --- PARTICLES ---
  updateParticles(dt);

  // Auto-finish timeout
  if(raceTime>180){
    if(!player.finished){
      player.finished=true;
      player.finishTime=raceTime;
      finishPositions.push(-1);
    }
    for(var ai=0;ai<aiRacers.length;ai++){
      if(!aiRacers[ai].finished){
        aiRacers[ai].finished=true;
        aiRacers[ai].finishTime=raceTime;
        finishPositions.push(ai);
      }
    }
    checkRaceEnd();
  }
}

function updatePlayerTimers(dt){
  if(player.boostTimer>0)player.boostTimer-=dt;
  if(player.starTimer>0)player.starTimer-=dt;
  if(player.invincTimer>0)player.invincTimer-=dt;
  if(player.itemTimer>0)player.itemTimer-=dt;
}

function givePlayerItem(){
  var pos=getPlayerPosition();
  var weights;
  if(pos===0)weights=[0,30,35,25,5,5];
  else if(pos===3)weights=[0,15,10,15,25,35];
  else weights=[0,25,20,25,15,15];
  var total=0;
  for(var i=0;i<weights.length;i++)total+=weights[i];
  var r=Math.random()*total,acc=0;
  for(var i=0;i<weights.length;i++){
    acc+=weights[i];
    if(r<acc){player.item=i;break;}
  }
}

function usePlayerItem(){
  var item=player.item;
  player.item=ITEM_NONE;
  player.itemTimer=0.5;
  var track=TRACKS[currentTrack];
  var total=track.totalLength;

  switch(item){
    case ITEM_MUSHROOM:
      player.boostTimer=2;
      player.speed=Math.max(player.speed,player.maxSpeed*1.3);
      playBoost();
      break;
    case ITEM_BANANA:
      droppedBananas.push({
        position:((player.position%total)-10+total)%total,
        laneX:player.playerX,
        active:true
      });
      break;
    case ITEM_SHELL:
      activeShells.push({
        position:player.position%total,
        laneX:player.playerX,
        speed:400,
        life:4,
        active:true,
        fromPlayer:true
      });
      playShellFire();
      break;
    case ITEM_STAR:
      player.starTimer=4;
      player.invincTimer=4;
      player.speed=Math.max(player.speed,player.maxSpeed*1.2);
      playStarJingle();
      break;
    case ITEM_LIGHTNING:
      for(var i=0;i<aiRacers.length;i++){
        aiRacers[i].shrinkTimer=4;
        aiRacers[i].speed*=0.5;
        aiRacers[i].maxSpeed*=0.7;
      }
      // Flash effect
      lightningFlash=0.5;
      playTone(100,0.5,'square',0.15);
      break;
  }
}

var lightningFlash=0;

function updateAI(racer,idx,dt,track,total){
  if(racer.finished)return;

  if(racer.spinTimer>0){
    racer.spinTimer-=dt;
    racer.speed*=0.95;
    racer.position+=racer.speed*dt*0.15;
    return;
  }

  if(racer.shrinkTimer>0){
    racer.shrinkTimer-=dt;
    if(racer.shrinkTimer<=0){
      racer.maxSpeed=170+Math.random()*20;
    }
  }

  // Rubber-banding
  var playerProgress=player.lap*total+player.position%total;
  var aiProgress=racer.lap*total+racer.position%total;
  var progressDiff=playerProgress-aiProgress;

  var targetSpeed=racer.maxSpeed;
  if(progressDiff>total*0.2){
    targetSpeed=racer.maxSpeed*1.2;
  } else if(progressDiff<-total*0.2){
    targetSpeed=racer.maxSpeed*0.8;
  }

  // Accelerate
  if(racer.speed<targetSpeed){
    racer.speed+=100*dt;
  } else {
    racer.speed+=(targetSpeed-racer.speed)*2*dt;
  }

  // Steer based on upcoming curve
  var curSeg=getSegment(track,Math.floor(racer.position));
  var targetX=curSeg.curve*-0.3+racer.steerVariation;
  targetX=Math.max(-0.8,Math.min(0.8,targetX));
  racer.playerX+=(targetX-racer.playerX)*1.5*dt;

  // Move forward
  racer.position+=racer.speed*dt*0.15;

  // Lap detection
  var lapProgress=racer.position/total;
  var newLap=Math.floor(lapProgress);
  if(newLap>racer.lap){
    racer.lap=newLap;
    if(racer.lap>=LAPS_TOTAL){
      racer.finished=true;
      racer.finishTime=raceTime;
      finishPositions.push(idx);
      checkRaceEnd();
    }
  }

  // Banana collision with AI
  for(var bi=droppedBananas.length-1;bi>=0;bi--){
    var ban=droppedBananas[bi];
    if(!ban.active)continue;
    var bDist=Math.abs(ban.position-(racer.position%total));
    if(bDist>total/2)bDist=total-bDist;
    if(bDist<5&&Math.abs(ban.laneX-racer.playerX)<0.4){
      racer.spinTimer=1;
      racer.speed*=0.3;
      ban.active=false;
    }
  }

  // Shell collision with AI from other AI (not implemented for simplicity, only player shells)
}

function getPlayerPosition(){
  var track=TRACKS[currentTrack];
  var total=track.totalLength;
  var scores=[];
  scores.push({idx:-1,score:player.lap*total+(player.position%total)+(player.finished?total*10:0)});
  for(var i=0;i<aiRacers.length;i++){
    var r=aiRacers[i];
    scores.push({idx:i,score:r.lap*total+(r.position%total)+(r.finished?total*10:0)});
  }
  scores.sort(function(a,b){return b.score-a.score;});
  for(var i=0;i<scores.length;i++){
    if(scores[i].idx===-1)return i;
  }
  return 3;
}

function checkRaceEnd(){
  if(finishPositions.length>=4){
    endRace();
  }
}

function endRace(){
  gameState=STATE_FINISH;
  stopEngine();

  // Ensure all have finished
  if(!player.finished){
    player.finished=true;
    player.finishTime=raceTime;
    if(finishPositions.indexOf(-1)===-1)finishPositions.push(-1);
  }
  for(var i=0;i<aiRacers.length;i++){
    if(!aiRacers[i].finished){
      aiRacers[i].finished=true;
      aiRacers[i].finishTime=raceTime;
      if(finishPositions.indexOf(i)===-1)finishPositions.push(i);
    }
  }

  // Save best time
  var playerFinishIdx=finishPositions.indexOf(-1);
  if(playerFinishIdx>=0){
    var prevBest=saveData.bestTimes[currentTrack];
    if(prevBest===null||player.finishTime<prevBest){
      saveData.bestTimes[currentTrack]=player.finishTime;
    }
    // Unlock next track
    if(playerFinishIdx<3&&currentTrack+1<TRACKS.length){
      saveData.unlocked=Math.max(saveData.unlocked,currentTrack+2);
    }
  }

  // Championship
  if(championshipMode){
    finishPositions.forEach(function(id,pos){
      var pts=POINTS[pos]||0;
      if(id===-1)champStandings[0]+=pts;
      else champStandings[id+1]+=pts;
    });
  }

  writeSave();
}

function drawMenu(){
  var fs=scale;

  // Background with pseudo-3D road
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(0,0,W,H);

  // Animated sky gradient
  var grad=ctx.createLinearGradient(0,0,0,H*0.5);
  grad.addColorStop(0,'#4488cc');
  grad.addColorStop(1,'#88bbee');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H*0.5);

  // Simple road going into distance for menu
  var t=Date.now()/1000;
  var scrollMenu=(t*80)%40;
  for(var y=Math.floor(H*0.5);y<H;y++){
    var perspective=(y-H*0.5)/(H*0.5);
    if(perspective<=0)continue;
    var roadW=50+perspective*W*0.35;
    var cx=W/2+Math.sin(t*0.5)*perspective*30;

    var segIdx=Math.floor((y+scrollMenu)/10);
    var isLight=segIdx%2===0;

    // Grass
    ctx.fillStyle=isLight?'#2d8a4e':'#247a42';
    ctx.fillRect(0,y,W,1);

    // Road
    ctx.fillStyle=isLight?'#666666':'#555555';
    ctx.fillRect(cx-roadW/2,y,roadW,1);

    // Edge lines
    ctx.fillStyle='#ffffff';
    ctx.fillRect(cx-roadW/2,y,Math.max(1,perspective*3),1);
    ctx.fillRect(cx+roadW/2-Math.max(1,perspective*3),y,Math.max(1,perspective*3),1);

    // Center dashes
    if(isLight){
      ctx.fillStyle='#ffffff';
      ctx.fillRect(cx-1,y,Math.max(1,perspective*2),1);
    }
  }

  // Title
  ctx.fillStyle='#000000';
  ctx.font='bold '+Math.floor(40*fs)+'px monospace';
  ctx.textAlign='center';
  ctx.fillText('PIXEL',W/2+2,H*0.13+2);
  ctx.fillText('KART 2.0',W/2+2,H*0.21+2);
  ctx.fillStyle='#ff4444';
  ctx.fillText('PIXEL',W/2,H*0.13);
  ctx.fillStyle='#ffdd00';
  ctx.fillText('KART 2.0',W/2,H*0.21);

    ctx.strokeStyle='#ffdd00';

    ctx.textBaseline='middle';
    ctx.fillText(b.text,W/2,b.y);
  });

  ctx.font=Math.floor(11*fs)+'px monospace';
  ctx.textBaseline='alphabetic';
  ctx.fillText('BEST TIMES',W/2,H*0.68);

    var unlocked=i<saveData.unlocked;
    ctx.fillStyle=unlocked?'#888888':'#444444';
    var timeStr=saveData.bestTimes[i]!==null?formatTime(saveData.bestTimes[i]):'--:--.--';
    ctx.fillText(tr.name+': '+(unlocked?timeStr:'Locked'),W/2,H*0.73+i*18*fs);

  ctx.font=Math.floor(9*fs)+'px monospace';

function formatTime(t){
  if(t===null||t===undefined)return '--:--.--';
  var m=Math.floor(t/60);
  var s=t%60;
  return m+':'+(s<10?'0':'')+s.toFixed(2);
}

function draw(){
  ctx.fillStyle='#000000';
  ctx.fillRect(0,0,W,H);

  if(gameState===STATE_MENU){drawMenu();return;}
  if(gameState===STATE_TRACK_SELECT){drawTrackSelect();return;}
  if(gameState===STATE_CHAMP_RESULTS){drawChampResults();return;}

  // Race view
  drawRoad();
  drawPlayerKart();
  drawParticles();
  drawHUD();

  // Lightning flash
  if(lightningFlash>0){
    ctx.fillStyle='rgba(255,255,255,'+lightningFlash+')';
    ctx.fillRect(0,0,W,H);
    lightningFlash-=0.03;
  }

  // Countdown
  if(gameState===STATE_COUNTDOWN){
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=countdown>1?'#ffdd00':'#00ff44';
    ctx.font='bold '+Math.floor(80*scale)+'px monospace';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    var text=countdown>0?countdown+'':'GO!';
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillText(text,W/2+3,H/2+3);
    ctx.fillStyle=countdown>1?'#ffdd00':'#00ff44';
    ctx.fillText(text,W/2,H/2);
  }

  // Finish screen
  if(gameState===STATE_FINISH){
    drawFinishScreen();
  }
}

function handleTouchStart(e){
  e.preventDefault();
  ensureAudio();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    touches[t.identifier]={x:t.clientX,y:t.clientY};
  }
  updateTouchState();
  handleUITouch(e);
}

function handleTouchMove(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    touches[t.identifier]={x:t.clientX,y:t.clientY};
  }
  updateTouchState();
}

function handleTouchEnd(e){
  e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    delete touches[t.identifier];
  }
  updateTouchState();
}

function updateTouchState(){
  touchLeft=false;
  touchRight=false;
  var midX=window.innerWidth/2;
  var dpr=window.devicePixelRatio||1;

  for(var id in touches){
    var t=touches[id];
    var x=t.x,y=t.y;

    // Skip item button zone
    if(player.item!==ITEM_NONE){
      var ibx=window.innerWidth/2;
      var iby=window.innerHeight-60*scale/dpr;
      var ibr=35*scale/dpr;
      if(Math.sqrt((x-ibx)*(x-ibx)+(y-iby)*(y-iby))<ibr){
        continue;
      }
    }

    if(x<midX-20)touchLeft=true;
    if(x>midX+20)touchRight=true;
  }
}

function handleUITouch(e){
  var t=e.changedTouches[0];
  var x=t.clientX,y=t.clientY;
  var dpr=window.devicePixelRatio||1;
  var fs=scale/dpr;
  var wW=window.innerWidth,wH=window.innerHeight;

  if(gameState===STATE_MENU){
    if(y>wH*0.40-22*fs&&y<wH*0.40+22*fs){
      championshipMode=false;
      gameState=STATE_TRACK_SELECT;
    }
    if(y>wH*0.52-22*fs&&y<wH*0.52+22*fs){
      championshipMode=true;
      champStandings=[0,0,0,0];
      champRace=0;
      currentTrack=0;
      resetRace();
    }
    return;
  }

  if(gameState===STATE_TRACK_SELECT){
    TRACKS.forEach(function(tr,i){
      var by=wH*0.22+i*wH*0.22;
      if(y>by-28*fs&&y<by+28*fs&&i<saveData.unlocked){
        currentTrack=i;
        resetRace();
      }
    });
    if(y>wH*0.90-18*fs&&y<wH*0.90+18*fs){
      gameState=STATE_MENU;
    }
    return;
  }

  if(gameState===STATE_RACING||gameState===STATE_COUNTDOWN){
    if(player.item!==ITEM_NONE){
      var ibx=wW/2;
      var iby=wH-60*fs;
      var ibr=35*fs;
      if(Math.sqrt((x-ibx)*(x-ibx)+(y-iby)*(y-iby))<ibr){
        touchUseItem=true;
      }
    }
    return;
  }

  if(gameState===STATE_FINISH){
    var btnY=championshipMode?wH*0.88:wH*0.72;
    if(y>btnY-22*fs&&y<btnY+22*fs){
      if(championshipMode){
        champRace++;
        if(champRace>=3){
          gameState=STATE_CHAMP_RESULTS;
        } else {
          currentTrack=champRace;
          resetRace();
        }
      } else {
        gameState=STATE_MENU;
      }
    }
    return;
  }

  if(gameState===STATE_CHAMP_RESULTS){
    if(y>wH*0.86-22*fs&&y<wH*0.86+22*fs){
      gameState=STATE_MENU;
    }
    return;
  }
}

// Mouse support for desktop
function handleMouseDown(e){
  ensureAudio();
  touches[99]={x:e.clientX,y:e.clientY};
  var fakeTouch={changedTouches:[{identifier:99,clientX:e.clientX,clientY:e.clientY}],preventDefault:function(){}};
  handleTouchStart(fakeTouch);
}
function handleMouseMove(e){
  if(touches[99]){
    touches[99]={x:e.clientX,y:e.clientY};
    updateTouchState();
  }
}
function handleMouseUp(e){
  var fakeTouch={changedTouches:[{identifier:99,clientX:e.clientX,clientY:e.clientY}],preventDefault:function(){}};
  handleUITouch(fakeTouch);
  delete touches[99];
  touchLeft=false;touchRight=false;
  updateTouchState();
}

canvas.addEventListener('touchstart',handleTouchStart,{passive:false});
canvas.addEventListener('touchmove',handleTouchMove,{passive:false});
canvas.addEventListener('touchend',handleTouchEnd,{passive:false});
canvas.addEventListener('touchcancel',handleTouchEnd,{passive:false});
canvas.addEventListener('mousedown',handleMouseDown);
canvas.addEventListener('mousemove',handleMouseMove);
canvas.addEventListener('mouseup',handleMouseUp);

// Keyboard
window.addEventListener('keydown',function(e){
  keys[e.key]=true;
  ensureAudio();
  if(e.key===' '&&player.item!==ITEM_NONE)touchUseItem=true;
});
window.addEventListener('keyup',function(e){keys[e.key]=false;});

// =============================================================
// GAME LOOP
// =============================================================

var lastTime=performance.now();

function gameLoop(timestamp){
  var dt=Math.min((timestamp-lastTime)/1000,0.05);
  lastTime=timestamp;

  // Poll keyboard for racing
  if(gameState===STATE_RACING){
    if(keys['ArrowLeft']||keys['a'])touchLeft=true;
    if(keys['ArrowRight']||keys['d'])touchRight=true;
  }

  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
