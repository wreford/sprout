<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Candy Wars</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a0a1a;--panel:#251535;--border:#3a2050;--text:#f0e0ff;--dim:#8a6a9a;--green:#4ade80;--red:#ff4a6a;--gold:#ffd700;--pink:#ff69b4;--purple:#a855f7;--candy1:#ff6ec7;--candy2:#7b2ff7}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;position:relative}

/* Candy background */
.candy-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;opacity:0.06;font-size:2rem}
.candy-float{position:absolute;animation:candyDrift linear infinite}
@keyframes candyDrift{0%{transform:translateY(110vh) rotate(0deg)}100%{transform:translateY(-50px) rotate(360deg)}}

/* Top bar */
.topbar{width:100%;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;z-index:10;position:sticky;top:0}
.topbar-item{font-size:0.78rem;font-weight:700;white-space:nowrap}
.topbar-item span{color:var(--dim);font-weight:400}
.topbar-loc{color:var(--pink);font-size:0.82rem}

/* Event modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border:2px solid var(--purple);border-radius:16px;padding:28px;max-width:380px;width:100%;text-align:center;animation:modalPop 0.3s ease}
@keyframes modalPop{0%{transform:scale(0.7);opacity:0}100%{transform:scale(1);opacity:1}}
.modal-icon{font-size:3rem;margin-bottom:12px}
.modal-title{font-size:1.3rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--candy1),var(--candy2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-desc{font-size:0.85rem;color:var(--dim);line-height:1.5;margin-bottom:16px}
.modal-btn{background:linear-gradient(135deg,var(--candy1),var(--candy2));color:#fff;border:none;padding:10px 28px;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer}
.modal-btn:hover{opacity:0.9}

/* Main scroll area */
.main{width:100%;max-width:600px;padding:12px;z-index:1;flex:1;overflow-y:auto}

/* Section headers */
.sec-head{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--purple);margin:14px 0 8px;padding-left:4px}

/* Candy cards grid */
.candy-grid{display:grid;grid-template-columns:1fr;gap:8px}
.candy-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;transition:border-color 0.2s}
.candy-card.owned{border-color:var(--purple)}
.candy-card.unavailable{opacity:0.35}
.cc-icon{font-size:1.8rem;flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:0.85rem;font-weight:700}
.cc-price{font-size:0.95rem;font-weight:800;color:var(--green)}
.cc-arrow{font-size:0.7rem;margin-left:4px}
.cc-arrow.up{color:var(--green)}
.cc-arrow.down{color:var(--red)}
.cc-owned{font-size:0.7rem;color:var(--dim)}
.cc-melt{font-size:0.6rem;color:var(--red);font-style:italic}
.cc-btns{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.cc-btns button{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:0.65rem;font-weight:700;cursor:pointer;white-space:nowrap;min-width:32px}
.cc-btns button:hover{border-color:var(--pink)}
.cc-btns button.sell{color:var(--red)}
.cc-btns button.sell:hover{border-color:var(--red)}
.cc-btns button.buy{color:var(--green)}
.cc-btns button.buy:hover{border-color:var(--green)}
.qty-row{display:flex;gap:3px;margin-top:4px}
.qty-btn{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:3px 7px;border-radius:4px;font-size:0.6rem;cursor:pointer;font-weight:700}
.qty-btn.active{border-color:var(--pink);color:var(--pink)}

/* Travel button */
.travel-wrap{padding:16px 0;text-align:center}
.travel-btn{background:linear-gradient(135deg,var(--candy1),var(--candy2));color:#fff;border:none;padding:14px 40px;border-radius:14px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(255,110,199,0.4);transition:transform 0.15s,box-shadow 0.15s;letter-spacing:0.03em}
.travel-btn:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(255,110,199,0.6)}
.travel-btn:active{transform:scale(0.97)}
.travel-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}

/* Inventory summary */
.inv-bar{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;flex-wrap:wrap;gap:8px;font-size:0.75rem}
.inv-item{display:flex;align-items:center;gap:3px}

/* Game over screen */
.gameover{display:none;text-align:center;padding:30px 20px}
.gameover.show{display:block}
.go-title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--candy1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.go-rank{font-size:1.5rem;margin:10px 0}
.go-score{font-size:1.8rem;font-weight:800;color:var(--green);margin:10px 0}
.go-stats{font-size:0.8rem;color:var(--dim);line-height:2}
.go-btn{background:linear-gradient(135deg,var(--candy1),var(--candy2));color:#fff;border:none;padding:12px 32px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px}
.go-highscore{color:var(--gold);font-weight:700;font-size:0.9rem;margin-top:10px}

/* Start screen */
.startscreen{text-align:center;padding:40px 20px}
.start-title{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--candy1),var(--gold),var(--candy2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.start-sub{font-size:0.85rem;color:var(--dim);margin-bottom:24px;line-height:1.6}
.start-btn{background:linear-gradient(135deg,var(--candy1),var(--candy2));color:#fff;border:none;padding:14px 40px;border-radius:14px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(255,110,199,0.4)}
.start-btn:hover{transform:translateY(-2px)}
.start-hs{margin-top:16px;font-size:0.8rem;color:var(--gold)}

@media(min-width:500px){.candy-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>

<div class="candy-bg" id="candyBg"></div>

<!-- Top Bar -->
<div class="topbar" id="topbar" style="display:none">
  <div class="topbar-item">Day <strong id="dayNum">1</strong><span>/30</span></div>
  <div class="topbar-item">💰 $<strong id="cashDisp">100</strong></div>
  <div class="topbar-item">🎒 <strong id="capDisp">0</strong><span>/<span id="capMax">50</span></span></div>
  <div class="topbar-loc" id="locDisp">🏫 School Yard</div>
</div>

<!-- Event Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <div class="modal-icon" id="evIcon">🍬</div>
    <div class="modal-title" id="evTitle">Event!</div>
    <div class="modal-desc" id="evDesc">Something happened.</div>
    <button class="modal-btn" onclick="closeEvent()">OK</button>
  </div>
</div>

<div class="main" id="mainArea">
  <!-- Start Screen -->
  <div class="startscreen" id="startScreen">
    <div style="font-size:4rem;margin-bottom:10px">🍬</div>
    <div class="start-title">CANDY WARS</div>
    <div class="start-sub">Buy low. Sell high.<br>Trade candy across 6 neighborhoods in 30 days.<br>Random events. Melting ice cream. Golden gummies.</div>
    <button class="start-btn" onclick="startGame()">Start Trading</button>
    <div class="start-hs" id="startHs"></div>
  </div>

  <!-- Game Area (hidden until start) -->
  <div id="gameArea" style="display:none">
    <div class="sec-head">📦 Inventory</div>
    <div class="inv-bar" id="invBar"><span style="color:var(--dim)">Empty pockets</span></div>

    <div class="sec-head">🏪 Market Prices</div>
    <div class="candy-grid" id="candyGrid"></div>

    <div class="travel-wrap">
      <button class="travel-btn" id="travelBtn" onclick="travel()">🚶 Travel to New Neighborhood</button>
    </div>
  </div>

  <!-- Game Over -->
  <div class="gameover" id="gameOver">
    <div style="font-size:3rem;margin-bottom:8px">🍬👑</div>
    <div class="go-title">GAME OVER</div>
    <div class="go-rank" id="goRank">Candy Amateur</div>
    <div class="go-score" id="goScore">$0</div>
    <div class="go-stats" id="goStats"></div>
    <div class="go-highscore" id="goHs"></div>
    <button class="go-btn" onclick="startGame()">Play Again</button>
  </div>
</div>

<script>
// ---- CANDY DATA ----
const CANDIES=[
  {id:'gummy',name:'Gummy Bears',icon:'🍬',min:2,max:8},
  {id:'lollipop',name:'Lollipops',icon:'🍭',min:5,max:15},
  {id:'chocolate',name:'Chocolate Bars',icon:'🍫',min:10,max:30},
  {id:'cookie',name:'Cookies',icon:'🍪',min:3,max:12},
  {id:'cupcake',name:'Cupcakes',icon:'🧁',min:15,max:40},
  {id:'donut',name:'Donuts',icon:'🍩',min:8,max:25},
  {id:'cake',name:'Cake Slices',icon:'🍰',min:20,max:60},
  {id:'birthday',name:'Birthday Cakes',icon:'🎂',min:50,max:150},
  {id:'icecream',name:'Ice Cream',icon:'🍦',min:5,max:20,melts:true},
  {id:'golden',name:'Golden Gummy',icon:'💎',min:100,max:500,rare:true}
];

// ---- NEIGHBORHOODS ----
const HOODS=[
  {name:'School Yard',icon:'🏫',mults:{gummy:0.5,lollipop:0.5,chocolate:1,cookie:0.8,cupcake:1.2,donut:1,cake:1.3,birthday:1.2,icecream:1,golden:1}},
  {name:'Corner Store',icon:'🏪',mults:{gummy:1,lollipop:1,chocolate:1,cookie:1,cupcake:1,donut:1,cake:1,birthday:1,icecream:1,golden:1}},
  {name:'Carnival',icon:'🎪',mults:{gummy:1.2,lollipop:1.1,chocolate:1.3,cookie:0.5,cupcake:1.8,donut:1.2,cake:1.8,birthday:1.4,icecream:1.3,golden:0.9}},
  {name:'Suburbs',icon:'🏠',mults:{gummy:0.9,lollipop:0.9,chocolate:0.5,cookie:0.8,cupcake:1,donut:0.8,cake:1.1,birthday:1.8,icecream:0.9,golden:0.8}},
  {name:'Downtown',icon:'🏢',mults:{gummy:1.5,lollipop:1.4,chocolate:1.5,cookie:1.5,cupcake:1.6,donut:1.5,cake:1.4,birthday:1.3,icecream:1.5,golden:1.5},goldenBoost:true},
  {name:'Boardwalk',icon:'🌊',mults:{gummy:1.1,lollipop:1.2,chocolate:1.1,cookie:1,cupcake:1.1,donut:1.8,cake:1.2,birthday:1.1,icecream:0.4,golden:1.1}}
];

// ---- EVENTS ----
const EVENTS=[
  {name:'Sugar Rush!',icon:'⚡',apply:s=>{const c=CANDIES[Math.floor(Math.random()*9)];s.priceOverride[c.id]=2;return`${c.icon} ${c.name} prices DOUBLED!`}},
  {name:'Candy Bust!',icon:'🚔',apply:s=>{let lost=0;for(let k in s.inv){const rm=Math.floor(s.inv[k]*0.2);s.inv[k]-=rm;lost+=rm}return`Police confiscated 20% of your inventory! Lost ${lost} items.`}},
  {name:'Halloween Sale!',icon:'🎃',apply:s=>{s.priceOverride._all=0.5;return'ALL prices drop 50%!'}},
  {name:'Birthday Party!',icon:'🎂',apply:s=>{s.priceOverride.birthday=3;s.priceOverride.cake=2;return'Cake & Birthday Cake prices skyrocket!'}},
  {name:'Dentist Warning!',icon:'🦷',apply:s=>{s.priceOverride._all=0.7;return'Dentist scare! All candy prices drop.'}},
  {name:'Factory Explosion!',icon:'💥',apply:s=>{const c=CANDIES[Math.floor(Math.random()*9)];s.priceOverride[c.id]=3;return`${c.icon} ${c.name} factory exploded! Prices TRIPLE!`}},
  {name:'Free Samples!',icon:'🎁',apply:s=>{for(let i=0;i<5;i++){const c=CANDIES[Math.floor(Math.random()*9)];if(getInvTotal(s)<s.capacity){s.inv[c.id]=(s.inv[c.id]||0)+1}}return'Got 5 random candies for free!'}},
  {name:'Pocket Upgrade!',icon:'🎒',apply:s=>{s.capacity+=10;return'Pocket capacity +10!'}},
  {name:'Mugged!',icon:'😈',apply:s=>{const lost=Math.floor(s.cash*0.2);s.cash-=lost;return`Lost $${lost} to a mugger!`}},
  {name:'Sugar Tax!',icon:'🏛️',apply:s=>{const tax=Math.floor(s.cash*0.1);s.cash-=tax;return`Paid $${tax} sugar tax to the government.`}}
];

// ---- NARRATION ----
const NARR_LINES=[
  "The candy market is volatile today.",
  "Buy low, sell high. Ancient candy wisdom.",
  "That's a lot of gummy bears.",
  "The suburbs love their chocolate.",
  "Day {d} of 30. Time is money. And candy.",
  "Golden Gummies spotted. Act fast.",
  "The corner store has the best deals.",
  "Your pockets are getting heavy.",
  "The candy economy is fascinating.",
  "Somewhere, a dentist weeps.",
  "Portfolio diversification is key. Even in candy.",
  "The boardwalk ice cream is melting.",
  "Sugar futures are up.",
  "A wise trader once said: buy cookies.",
  "The carnival markup is criminal.",
  "Your candy empire grows.",
  "Thirty days to candy glory.",
  "The school yard is a buyer's market.",
  "Downtown prices are absurd. As usual.",
  "Ice cream melts. Time waits for no candy."
];
let narrIdx=0,narrTimer=null;

// ---- SOUND ----
const AC=new(window.AudioContext||window.webkitAudioContext)();
function playTone(freq,dur,vol=0.015,type='sine'){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);
  o.start();o.stop(AC.currentTime+dur);
}
function sfxBuy(){playTone(800,0.08,0.015);setTimeout(()=>playTone(1200,0.1,0.015),80)}
function sfxSell(){playTone(600,0.06,0.015);setTimeout(()=>playTone(900,0.08,0.015),60);setTimeout(()=>playTone(1100,0.06,0.012),120)}
function sfxTravel(){playTone(300,0.2,0.012,'sawtooth');setTimeout(()=>playTone(500,0.15,0.01,'sawtooth'),100)}
function sfxEvent(){playTone(400,0.15,0.018);setTimeout(()=>playTone(600,0.15,0.018),120);setTimeout(()=>playTone(800,0.2,0.015),240)}
function sfxGameOver(good){if(good){playTone(523,0.15,0.02);setTimeout(()=>playTone(659,0.15,0.02),150);setTimeout(()=>playTone(784,0.3,0.02),300)}else{playTone(400,0.3,0.02);setTimeout(()=>playTone(300,0.4,0.02),300)}}

// ---- STATE ----
let S=null,prevPrices={},qty=1;

function newState(){
  return{day:1,cash:100,capacity:50,inv:{},hood:0,prices:{},priceOverride:{},
    bestTrade:0,eventsHit:0,daysTraveled:0,gameOver:false};
}
function getInvTotal(s){let t=0;for(let k in s.inv)t+=s.inv[k];return t}

// ---- PRICE GENERATION ----
function genPrices(hoodIdx,overrides){
  const h=HOODS[hoodIdx],p={};
  CANDIES.forEach(c=>{
    if(c.rare){
      const chance=h.goldenBoost?0.25:0.1;
      if(Math.random()>chance){p[c.id]=null;return}
    }
    let base=c.min+Math.random()*(c.max-c.min);
    base*=h.mults[c.id]||1;
    if(overrides._all)base*=overrides._all;
    if(overrides[c.id])base*=overrides[c.id];
    base*=0.8+Math.random()*0.4;
    p[c.id]=Math.max(1,Math.round(base));
  });
  return p;
}

// ---- MELT ICE CREAM ----
function meltIceCream(){
  if(S.inv.icecream&&S.inv.icecream>0){
    const lost=Math.max(1,Math.floor(S.inv.icecream*0.1));
    S.inv.icecream-=lost;
    if(S.inv.icecream<=0)delete S.inv.icecream;
  }
}

// ---- UI RENDERING ----
function render(){
  if(!S||S.gameOver)return;
  const h=HOODS[S.hood];
  document.getElementById('dayNum').textContent=S.day;
  document.getElementById('cashDisp').textContent=S.cash.toLocaleString();
  document.getElementById('capDisp').textContent=getInvTotal(S);
  document.getElementById('capMax').textContent=S.capacity;
  document.getElementById('locDisp').textContent=h.icon+' '+h.name;
  document.getElementById('travelBtn').disabled=S.day>=30;

  // Inventory bar
  const invBar=document.getElementById('invBar');
  const items=[];
  CANDIES.forEach(c=>{
    if(S.inv[c.id]&&S.inv[c.id]>0)items.push(`<span class="inv-item">${c.icon} ${S.inv[c.id]}</span>`);
  });
  invBar.innerHTML=items.length?items.join(''):'<span style="color:var(--dim)">Empty pockets</span>';

  // Candy grid
  const grid=document.getElementById('candyGrid');
  grid.innerHTML='';
  CANDIES.forEach(c=>{
    const price=S.prices[c.id];
    const owned=S.inv[c.id]||0;
    const avail=price!==null&&price!==undefined;
    const prev=prevPrices[c.id];
    let arrow='';
    if(avail&&prev!==null&&prev!==undefined){
      if(price>prev)arrow='<span class="cc-arrow up">▲</span>';
      else if(price<prev)arrow='<span class="cc-arrow down">▼</span>';
    }
    const card=document.createElement('div');
    card.className='candy-card'+(owned>0?' owned':'')+(avail?'':' unavailable');
    const canBuy=avail&&S.cash>=price&&getInvTotal(S)<S.capacity;
    const canSell=owned>0;
    card.innerHTML=`
      <div class="cc-icon">${c.icon}</div>
      <div class="cc-info">
        <div class="cc-name">${c.name}${c.melts?'<span class="cc-melt"> (melts!)</span>':''}</div>
        <div class="cc-price">${avail?'$'+price.toLocaleString()+arrow:'Not available'}</div>
        ${owned>0?`<div class="cc-owned">Owned: ${owned}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <div class="cc-btns">
          ${avail?`<button class="buy" onclick="buy('${c.id}')" ${canBuy?'':'disabled'}>Buy ${qty>1?qty:''}</button>`:''}
          ${canSell?`<button class="sell" onclick="sell('${c.id}')">Sell ${qty>1?qty:''}</button>`:''}
        </div>
        ${avail||canSell?`<div class="qty-row">
          <button class="qty-btn${qty===1?' active':''}" onclick="setQty(1)">1</button>
          <button class="qty-btn${qty===5?' active':''}" onclick="setQty(5)">5</button>
          <button class="qty-btn${qty===10?' active':''}" onclick="setQty(10)">10</button>
          <button class="qty-btn${qty===99?' active':''}" onclick="setQty(99)">Max</button>
        </div>`:''}
      </div>`;
    grid.appendChild(card);
  });
}

function setQty(n){qty=n;render()}

// ---- BUY / SELL ----
function buy(id){
  if(!S||S.gameOver)return;
  const price=S.prices[id];
  if(price===null||price===undefined)return;
  let amt=qty===99?Math.min(Math.floor(S.cash/price),S.capacity-getInvTotal(S)):qty;
  amt=Math.min(amt,Math.floor(S.cash/price),S.capacity-getInvTotal(S));
  if(amt<=0)return;
  S.cash-=price*amt;
  S.inv[id]=(S.inv[id]||0)+amt;
  sfxBuy();render();
}

function sell(id){
  if(!S||S.gameOver)return;
  const price=S.prices[id];
  const owned=S.inv[id]||0;
  if(owned<=0)return;
  let amt=qty===99?owned:Math.min(qty,owned);
  if(amt<=0)return;
  const revenue=price!==null&&price!==undefined?price*amt:0;
  S.cash+=revenue;
  S.inv[id]-=amt;
  if(S.inv[id]<=0)delete S.inv[id];
  if(revenue>S.bestTrade)S.bestTrade=revenue;
  sfxSell();render();
}

// ---- TRAVEL ----
function travel(){
  if(!S||S.gameOver||S.day>=30)return;
  sfxTravel();
  prevPrices={...S.prices};
  S.priceOverride={};

  // Melt ice cream
  meltIceCream();

  // Pick new hood (different from current)
  let next;
  do{next=Math.floor(Math.random()*HOODS.length)}while(next===S.hood&&HOODS.length>1);
  S.hood=next;
  S.day++;
  S.daysTraveled++;

  // Generate new prices
  S.prices=genPrices(S.hood,S.priceOverride);

  // Random event 20% chance
  if(Math.random()<0.2){
    const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    const msg=ev.apply(S);
    S.eventsHit++;
    // Regenerate prices with overrides
    S.prices=genPrices(S.hood,S.priceOverride);
    sfxEvent();
    showEvent(ev.icon,ev.name,msg);
  }

  render();
  if(S.day>=30)setTimeout(()=>endGame(),800);
}

// ---- EVENTS UI ----
function showEvent(icon,title,desc){
  document.getElementById('evIcon').textContent=icon;
  document.getElementById('evTitle').textContent=title;
  document.getElementById('evDesc').textContent=desc;
  document.getElementById('eventModal').classList.add('show');
}
function closeEvent(){
  document.getElementById('eventModal').classList.remove('show');
  render();
}

// ---- END GAME ----
function endGame(){
  S.gameOver=true;
  // Calculate total value
  let invValue=0;
  CANDIES.forEach(c=>{
    const owned=S.inv[c.id]||0;
    if(owned>0){
      const price=S.prices[c.id]||(c.min+c.max)/2;
      invValue+=price*owned;
    }
  });
  const total=S.cash+invValue;
  let rank,rankIcon;
  if(total>=50000){rank='Candy Emperor';rankIcon='👑'}
  else if(total>=10000){rank='Candy King';rankIcon='🤴'}
  else if(total>=2000){rank='Candy Baron';rankIcon='🎩'}
  else if(total>=500){rank='Candy Dealer';rankIcon='😎'}
  else{rank='Candy Amateur';rankIcon='🍼'}

  // High score
  const hs=parseInt(localStorage.getItem('candywars_hs')||'0');
  const isNew=total>hs;
  if(isNew)localStorage.setItem('candywars_hs',total);

  sfxGameOver(total>=2000);

  document.getElementById('gameArea').style.display='none';
  document.getElementById('goRank').textContent=rankIcon+' '+rank;
  document.getElementById('goScore').textContent='$'+Math.round(total).toLocaleString();
  document.getElementById('goStats').innerHTML=
    `Cash: $${S.cash.toLocaleString()}<br>Inventory value: $${Math.round(invValue).toLocaleString()}<br>Best single trade: $${S.bestTrade.toLocaleString()}<br>Days traveled: ${S.daysTraveled}<br>Events encountered: ${S.eventsHit}`;
  document.getElementById('goHs').textContent=isNew?'🎉 NEW HIGH SCORE!':'High score: $'+hs.toLocaleString();
  document.getElementById('gameOver').classList.add('show');
  stopNarration();
}

// ---- START GAME ----
function startGame(){
  S=newState();
  prevPrices={};qty=1;
  S.prices=genPrices(S.hood,S.priceOverride);

  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('gameOver').style.display='none';
  document.getElementById('gameArea').style.display='block';
  document.getElementById('topbar').style.display='flex';

  render();
  startNarration();
}

// ---- NARRATION (TTS) ----
function speak(text){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85;u.pitch=0.8;u.volume=0.7;
  const voices=speechSynthesis.getVoices();
  const brit=voices.find(v=>/en[-_]GB/i.test(v.lang))||voices.find(v=>/en/i.test(v.lang));
  if(brit)u.voice=brit;
  speechSynthesis.speak(u);
}
function startNarration(){
  narrIdx=0;
  narrTimer=setInterval(()=>{
    if(!S||S.gameOver)return;
    let line=NARR_LINES[narrIdx%NARR_LINES.length].replace('{d}',S.day);
    speak(line);
    narrIdx++;
  },15000);
}
function stopNarration(){if(narrTimer){clearInterval(narrTimer);narrTimer=null}if(window.speechSynthesis)speechSynthesis.cancel()}

// ---- CANDY BACKGROUND ----
function initCandyBg(){
  const bg=document.getElementById('candyBg');
  const emojis=['🍬','🍭','🍫','🍪','🧁','🍩','🍰','🎂','🍦','💎'];
  for(let i=0;i<20;i++){
    const s=document.createElement('span');
    s.className='candy-float';
    s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left=Math.random()*100+'%';
    s.style.animationDuration=(15+Math.random()*20)+'s';
    s.style.animationDelay=(-Math.random()*30)+'s';
    s.style.fontSize=(1+Math.random()*2)+'rem';
    bg.appendChild(s);
  }
}

// ---- INIT ----
function init(){
  initCandyBg();
  const hs=localStorage.getItem('candywars_hs');
  if(hs)document.getElementById('startHs').textContent='🏆 High Score: $'+parseInt(hs).toLocaleString();
  // Preload voices
  if(window.speechSynthesis)speechSynthesis.getVoices();
}
init();
</script>
