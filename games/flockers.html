<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Meet the Flockers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a2e;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
#gear{position:fixed;top:max(12px,env(safe-area-inset-top));right:12px;z-index:20;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,220,170,.15);background:rgba(20,10,30,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s,background .2s;color:rgba(255,230,190,.5)}
#gear:hover{background:rgba(255,200,100,.12);color:rgba(255,230,190,.8)}
#gear.open{transform:rotate(90deg)}
#gear svg{width:18px;height:18px;fill:currentColor}
#title{position:fixed;top:0;left:0;right:0;z-index:10;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;gap:12px;pointer-events:none}
#title h1{font-size:16px;font-weight:700;color:rgba(255,230,190,.8);letter-spacing:.04em}
#title .sub{font-size:10px;color:rgba(255,220,170,.3)}
#title .count{margin-left:auto;font-size:11px;color:rgba(255,220,170,.4);font-weight:600;margin-right:44px}
#panel{position:fixed;bottom:0;left:0;right:0;z-index:15;padding:10px 14px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:rgba(12,6,20,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,200,100,.08);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;max-height:55vh}
#panel.open{transform:translateY(0)}
.row{display:flex;flex-wrap:wrap;gap:5px 14px;align-items:center;justify-content:center;margin-bottom:6px}
.sl{display:flex;align-items:center;gap:5px}
.sl label{font-size:10px;color:rgba(255,230,180,.5);text-transform:uppercase;letter-spacing:.06em;min-width:68px}
.sl input[type=range]{-webkit-appearance:none;width:76px;height:3px;background:rgba(255,200,100,.15);border-radius:2px;outline:none}
.sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#ffd080,#e8a030);cursor:pointer;box-shadow:0 0 6px rgba(255,180,60,.4)}
.sv{font-size:10px;color:rgba(255,230,180,.7);min-width:24px;font-weight:600}
.btn{font:600 10px/1 'Segoe UI',system-ui,sans-serif;padding:5px 10px;border:1px solid rgba(255,200,100,.12);border-radius:5px;background:rgba(255,200,100,.06);color:rgba(255,230,180,.65);cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:rgba(255,200,100,.14);color:rgba(255,240,200,.9)}
.btn.on{background:rgba(255,180,60,.18);border-color:rgba(255,180,60,.35);color:#ffc050}
.sep{width:100%;height:1px;background:rgba(255,200,100,.06);margin:4px 0}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="title">
  <h1>Meet the Flockers</h1>
  <span class="sub">a nature flocking simulation</span>
  <span class="count" id="count">0 birds</span>
</div>
<div id="gear" title="Settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54a7.04 7.04 0 00-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.71 8.87a.48.48 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54a7.04 7.04 0 001.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg></div>
<div id="panel">
  <div class="row">
    <div class="sl"><label>Cohesion</label><input type="range" id="sCoh" min="0" max="100" value="55"><span class="sv" id="vCoh">55</span></div>
    <div class="sl"><label>Alignment</label><input type="range" id="sAli" min="0" max="100" value="70"><span class="sv" id="vAli">70</span></div>
    <div class="sl"><label>Separation</label><input type="range" id="sSep" min="0" max="100" value="65"><span class="sv" id="vSep">65</span></div>
  </div>
  <div class="row">
    <div class="sl"><label>Speed</label><input type="range" id="sSpd" min="10" max="100" value="40"><span class="sv" id="vSpd">40</span></div>
    <div class="sl"><label>Turn Speed</label><input type="range" id="sTurn" min="10" max="100" value="50"><span class="sv" id="vTurn">50</span></div>
    <div class="sl"><label>Vision</label><input type="range" id="sVis" min="20" max="200" value="85"><span class="sv" id="vVis">85</span></div>
  </div>
  <div class="row">
    <div class="sl"><label>Flock Size</label><input type="range" id="sNum" min="20" max="800" value="300" step="10"><span class="sv" id="vNum">300</span></div>
    <div class="sl"><label>Bird Size</label><input type="range" id="sSize" min="1" max="10" value="4"><span class="sv" id="vSize">4</span></div>
    <div class="sl"><label>Trail Length</label><input type="range" id="sTrail" min="0" max="50" value="0"><span class="sv" id="vTrail">0</span></div>
  </div>
  <div class="sep"></div>
  <div class="row">
    <div class="sl"><label>Predators</label><input type="range" id="sPred" min="0" max="3" value="0"><span class="sv" id="vPred">0</span></div>
    <button class="btn" id="bWind">Wind</button>
    <button class="btn" id="bFormation">V-Formation</button>
    <button class="btn" id="bObstacle">Obstacles</button>
    <button class="btn" id="bMute">Sound: Off</button>
  </div>
  <div class="row">
    <button class="btn" id="bTheme" data-theme="0">Theme: Sunset</button>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),c=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize);

// --- Parameters ---
const BASE_COH=.55,BASE_ALI=.70,BASE_SEP=.65;
let cohesion=BASE_COH,alignment=BASE_ALI,separation=BASE_SEP;
let maxSpeed=4,turnSpeed=.5,vision=85,targetCount=300;
let trailLen=0,birdSize=4,predatorCount=0,windOn=false,formationMode=false,obstaclesOn=false;
const themes=[
  {name:'Sunset', body:[40,20,15],wing:[80,40,25],hueBase:15,hueRange:40,sat:70,lit:45},
  {name:'Ocean',  body:[10,30,50],wing:[20,60,90],hueBase:190,hueRange:40,sat:60,lit:50},
  {name:'Forest', body:[20,35,15],wing:[40,70,30],hueBase:100,hueRange:50,sat:55,lit:40},
  {name:'Neon',   body:[60,10,60],wing:[100,20,100],hueBase:0,hueRange:360,sat:90,lit:60},
  {name:'Mono',   body:[25,25,25],wing:[50,50,50],hueBase:0,hueRange:0,sat:0,lit:55}
];
let themeIdx=0,theme=themes[0];

// --- Natural drift: sine-wave oscillation on flocking params ---
const driftStart=performance.now();
function getDrift(t){
  const s=t/1000;
  return{
    coh:Math.sin(s*Math.PI*2/30)*.12,
    ali:Math.sin(s*Math.PI*2/45)*.10,
    sep:Math.sin(s*Math.PI*2/60)*.10
  };
}

// --- Sky cycle ---
let skyTime=0.45;

// --- Clouds with parallax layers ---
const clouds=[];
for(let i=0;i<16;i++){
  const layer=Math.random()<0.4?0:Math.random()<0.6?1:2;
  clouds.push({x:Math.random()*2-.3,y:.04+Math.random()*.42,w:60+Math.random()*180,h:15+Math.random()*28,
    speed:(.00008+Math.random()*.00025)*(1+layer*.4),opacity:.04+Math.random()*.1,layer});
}

// --- Stars ---
const stars=[];
for(let i=0;i<120;i++) stars.push({x:Math.random(),y:Math.random()*.6,size:.5+Math.random()*1.5,twinkle:Math.random()*Math.PI*2,speed:.8+Math.random()*2});

// --- Fireflies ---
const fireflies=[];
for(let i=0;i<40;i++) fireflies.push({x:Math.random(),y:.5+Math.random()*.45,vx:(Math.random()-.5)*.0002,vy:(Math.random()-.5)*.0001,phase:Math.random()*Math.PI*2,size:1+Math.random()*2});

// --- Grass ---
const grassBlades=[];
for(let i=0;i<200;i++) grassBlades.push({x:i/200+Math.random()*.005,h:8+Math.random()*18,phase:Math.random()*Math.PI*2,speed:.8+Math.random()*.6});

// --- Obstacles ---
const obstacles=[];
function initObstacles(){obstacles.length=0;for(let i=0;i<5;i++) obstacles.push({x:W*.15+Math.random()*W*.7,y:H*.2+Math.random()*H*.5,r:20+Math.random()*30})}

// --- Boids ---
let boids=[];
function createBoid(x,y){
  const angle=Math.random()*Math.PI*2;
  const h=theme.hueBase+Math.random()*theme.hueRange;
  return{x:x??Math.random()*W,y:y??Math.random()*H,vx:Math.cos(angle)*2,vy:Math.sin(angle)*2,
    hue:h,wingPhase:Math.random()*Math.PI*2,wingSpeed:.06+Math.random()*.05,
    size:birdSize*(.8+Math.random()*.4),swoopTimer:0,swoopVy:0,trail:[]};
}
function initBoids(n){boids=[];for(let i=0;i<n;i++) boids.push(createBoid())}
initBoids(targetCount);

// --- Predators ---
let predators=[];
function syncPredators(){
  while(predators.length<predatorCount) predators.push({x:Math.random()*W,y:Math.random()*H,vx:1.5,vy:.8,wingPhase:0,trail:[]});
  while(predators.length>predatorCount) predators.pop();
}

// --- Wind ---
let windAngle=0,windStrength=0;

// --- Mouse ---
let mouse={x:-1e4,y:-1e4,active:false};
cv.addEventListener('mousedown',e=>{mouse.active=true;mouse.x=e.clientX;mouse.y=e.clientY});
cv.addEventListener('mousemove',e=>{if(mouse.active){mouse.x=e.clientX;mouse.y=e.clientY}});
cv.addEventListener('mouseup',()=>{mouse.active=false;mouse.x=-1e4;mouse.y=-1e4});
cv.addEventListener('touchstart',e=>{e.preventDefault();mouse.active=true;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;startAudio()},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY},{passive:false});
cv.addEventListener('touchend',()=>{mouse.active=false;mouse.x=-1e4;mouse.y=-1e4});
cv.addEventListener('click',()=>startAudio(),{once:true});

// --- Spatial grid ---
const GRID_SIZE=100;
let grid={};
function gridKey(x,y){return((x/GRID_SIZE)|0)+','+(((y/GRID_SIZE)|0))}
function buildGrid(){
  grid={};
  for(let i=0;i<boids.length;i++){
    const k=gridKey(boids[i].x,boids[i].y);
    if(!grid[k])grid[k]=[];
    grid[k].push(i);
  }
}
function getNeighbors(b){
  const results=[];
  const gx=(b.x/GRID_SIZE)|0,gy=(b.y/GRID_SIZE)|0;
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
    const bucket=grid[(gx+dx)+','+(gy+dy)];
    if(bucket)for(let j=0;j<bucket.length;j++) results.push(bucket[j]);
  }
  return results;
}

// --- Audio ---
let audioCtx,audioStarted=false,audioMuted=true;
let masterGain,windGain,streamGain;

function startAudio(){
  if(audioStarted)return;
  audioStarted=true;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0;
  masterGain.connect(audioCtx.destination);

  // Deep drone
  const drone=audioCtx.createOscillator();drone.type='sine';drone.frequency.value=75;
  const droneG=audioCtx.createGain();droneG.gain.value=.05;
  const droneF=audioCtx.createBiquadFilter();droneF.type='lowpass';droneF.frequency.value=180;
  const dLfo=audioCtx.createOscillator();dLfo.type='sine';dLfo.frequency.value=.06;
  const dLfoG=audioCtx.createGain();dLfoG.gain.value=60;
  dLfo.connect(dLfoG);dLfoG.connect(droneF.frequency);dLfo.start();
  drone.connect(droneF);droneF.connect(droneG);droneG.connect(masterGain);drone.start();

  // Warm pad
  const pad=audioCtx.createOscillator();pad.type='triangle';pad.frequency.value=220;
  const padG=audioCtx.createGain();padG.gain.value=.02;
  const padF=audioCtx.createBiquadFilter();padF.type='bandpass';padF.frequency.value=220;padF.Q.value=1.5;
  const padLfo=audioCtx.createOscillator();padLfo.type='sine';padLfo.frequency.value=.04;
  const padLfoG=audioCtx.createGain();padLfoG.gain.value=40;
  padLfo.connect(padLfoG);padLfoG.connect(padF.frequency);padLfo.start();
  pad.connect(padF);padF.connect(padG);padG.connect(masterGain);pad.start();

  // Shimmer
  const shim=audioCtx.createOscillator();shim.type='sine';shim.frequency.value=880;
  const shimG=audioCtx.createGain();shimG.gain.value=.01;
  const trem=audioCtx.createOscillator();trem.type='sine';trem.frequency.value=.25;
  const tremG=audioCtx.createGain();tremG.gain.value=.007;
  trem.connect(tremG);tremG.connect(shimG.gain);trem.start();
  shim.connect(shimG);shimG.connect(masterGain);shim.start();

  // Noise buffer for wind + stream
  const bufSz=audioCtx.sampleRate*2;
  const nBuf=audioCtx.createBuffer(1,bufSz,audioCtx.sampleRate);
  const nd=nBuf.getChannelData(0);
  for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;

  // Wind noise
  const wNoise=audioCtx.createBufferSource();wNoise.buffer=nBuf;wNoise.loop=true;
  const wF=audioCtx.createBiquadFilter();wF.type='bandpass';wF.frequency.value=500;wF.Q.value=.4;
  const wLfo=audioCtx.createOscillator();wLfo.type='sine';wLfo.frequency.value=.15;
  const wLfoG=audioCtx.createGain();wLfoG.gain.value=200;
  wLfo.connect(wLfoG);wLfoG.connect(wF.frequency);wLfo.start();
  windGain=audioCtx.createGain();windGain.gain.value=0;
  wNoise.connect(wF);wF.connect(windGain);windGain.connect(masterGain);wNoise.start();

  // Stream / water sound (filtered noise, low rumble)
  const sNoise=audioCtx.createBufferSource();sNoise.buffer=nBuf;sNoise.loop=true;
  const sF=audioCtx.createBiquadFilter();sF.type='lowpass';sF.frequency.value=300;sF.Q.value=.3;
  const sF2=audioCtx.createBiquadFilter();sF2.type='highpass';sF2.frequency.value=80;sF2.Q.value=.5;
  const sLfo=audioCtx.createOscillator();sLfo.type='sine';sLfo.frequency.value=.07;
  const sLfoG=audioCtx.createGain();sLfoG.gain.value=100;
  sLfo.connect(sLfoG);sLfoG.connect(sF.frequency);sLfo.start();
  streamGain=audioCtx.createGain();streamGain.gain.value=.025;
  sNoise.connect(sF);sF.connect(sF2);sF2.connect(streamGain);streamGain.connect(masterGain);sNoise.start();

  scheduleChirp();
}

function scheduleChirp(){
  if(!audioCtx)return;
  setTimeout(()=>{
    if(!audioMuted&&audioCtx){
      const now=audioCtx.currentTime;
      const patterns=[
        ()=>chirpNote(now,800+Math.random()*1500,.06,.08),
        ()=>{chirpNote(now,1200+Math.random()*800,.04,.06);chirpNote(now+.08,1400+Math.random()*600,.03,.05)},
        ()=>{const f=1000+Math.random()*1000;chirpNote(now,f,.04,.1);chirpNote(now+.12,f*1.2,.03,.07);chirpNote(now+.22,f*1.4,.02,.05)},
        ()=>{const f=900+Math.random()*1200;chirpSlide(now,f,f*1.5,.05,.12)},
        ()=>{chirpSlide(now,2000+Math.random()*1000,800+Math.random()*600,.03,.15)}
      ];
      patterns[Math.floor(Math.random()*patterns.length)]();
    }
    scheduleChirp();
  },1500+Math.random()*4000);
}

function chirpNote(t,freq,vol,dur){
  const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=freq;
  const g=audioCtx.createGain();g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.008);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.01);
}

function chirpSlide(t,f1,f2,vol,dur){
  const o=audioCtx.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(f1,t);
  o.frequency.exponentialRampToValueAtTime(f2,t+dur);
  const g=audioCtx.createGain();g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.008);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+dur+.01);
}

// --- Sky Colors ---
function skyColors(t){
  const phases=[
    {t:0,   top:[40,20,80],  mid:[120,60,100],bot:[200,120,80], sun:[255,180,80]},
    {t:.25, top:[70,130,220],mid:[120,170,230],bot:[180,210,240],sun:[255,255,200]},
    {t:.5,  top:[30,20,80],  mid:[120,40,100],bot:[220,120,50], sun:[255,160,40]},
    {t:.75, top:[10,10,40],  mid:[20,15,50],  bot:[40,25,60],   sun:[100,60,40]},
    {t:1,   top:[40,20,80],  mid:[120,60,100],bot:[200,120,80], sun:[255,180,80]}
  ];
  let a=phases[0],b=phases[1];
  for(let i=0;i<phases.length-1;i++){if(t>=phases[i].t&&t<phases[i+1].t){a=phases[i];b=phases[i+1];break}}
  const f=(t-a.t)/(b.t-a.t);
  const lerp=(c1,c2)=>c1.map((v,j)=>v+(c2[j]-v)*f);
  return{top:lerp(a.top,b.top),mid:lerp(a.mid,b.mid),bot:lerp(a.bot,b.bot),sun:lerp(a.sun,b.sun)};
}
function rgb(c){return`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`}
function rgba(c,a){return`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`}

// --- V-Formation leader ---
let vLeaderIdx=0;

// --- Simulation ---
let lastTime=0,swoopCooldown=0,elapsed=0;

function update(dt){
  elapsed+=dt;
  buildGrid();

  // Drift on flocking params
  const drift=getDrift(performance.now()-driftStart);
  const effCoh=(cohesion+drift.coh)*.003;
  const effAli=(alignment+drift.ali)*.04;
  const effSep=(separation+drift.sep)*.08;
  const ts=turnSpeed;
  const vis2=vision*vision;

  skyTime=(skyTime+dt/60000)%1;

  // Wind audio
  if(windGain){
    const wt=windOn?.025+windStrength*.008:0;
    windGain.gain.value+=(wt-windGain.gain.value)*.03;
  }

  // Swoops
  swoopCooldown-=dt;
  if(swoopCooldown<=0&&boids.length>0){
    swoopCooldown=4000+Math.random()*8000;
    const bi=Math.floor(Math.random()*boids.length);
    boids[bi].swoopTimer=1;boids[bi].swoopVy=3+Math.random()*2;
  }

  // Formation leader
  if(formationMode&&boids.length>0){
    vLeaderIdx=vLeaderIdx%boids.length;
    const leader=boids[vLeaderIdx];
    // Leader just flies normally; others form V behind
    const la=Math.atan2(leader.vy,leader.vx);
    const armAngle=Math.PI*.82;
    for(let i=0;i<boids.length;i++){
      if(i===vLeaderIdx)continue;
      const rank=i<vLeaderIdx?i:i-1;
      const side=rank%2===0?1:-1;
      const pos=Math.floor(rank/2)+1;
      const tx=leader.x-Math.cos(la)*pos*22+Math.cos(la+armAngle*side)*pos*22;
      const ty=leader.y-Math.sin(la)*pos*22+Math.sin(la+armAngle*side)*pos*22;
      const b=boids[i];
      const dx=tx-b.x,dy=ty-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const strength=Math.min(d*.003,.15);
      b.vx+=dx/d*strength;b.vy+=dy/d*strength;
    }
  }

  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    let cx=0,cy=0,ax=0,ay=0,sx=0,sy=0,count=0;
    const neighbors=getNeighbors(b);

    for(let j=0;j<neighbors.length;j++){
      const ni=neighbors[j];
      if(ni===i)continue;
      const o=boids[ni];
      const dx=o.x-b.x,dy=o.y-b.y;
      const d2=dx*dx+dy*dy;
      if(d2>vis2||d2<1)continue;
      const d=Math.sqrt(d2);
      cx+=o.x;cy+=o.y;
      ax+=o.vx;ay+=o.vy;
      sx-=dx/d;sy-=dy/d;
      count++;
    }

    if(count>0){
      cx=cx/count-b.x;cy=cy/count-b.y;
      b.vx+=cx*effCoh*ts;b.vy+=cy*effCoh*ts;
      ax/=count;ay/=count;
      b.vx+=(ax-b.vx)*effAli*ts;b.vy+=(ay-b.vy)*effAli*ts;
      b.vx+=sx*effSep*ts;b.vy+=sy*effSep*ts;
    }

    // Mouse attraction
    if(mouse.active){
      const dx=mouse.x-b.x,dy=mouse.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<300){b.vx+=dx/d*.3;b.vy+=dy/d*.3}
    }

    // Predator avoidance
    for(let p=0;p<predators.length;p++){
      const pr=predators[p];
      const dx=pr.x-b.x,dy=pr.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<150){b.vx-=dx/d*1.5;b.vy-=dy/d*1.5}
    }

    // Obstacle avoidance
    if(obstaclesOn){
      for(let o=0;o<obstacles.length;o++){
        const ob=obstacles[o];
        const dx=ob.x-b.x,dy=ob.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        if(d<ob.r+40){b.vx-=dx/d*2;b.vy-=dy/d*2}
      }
    }

    // Wind
    if(windOn){b.vx+=Math.cos(windAngle)*windStrength*.02;b.vy+=Math.sin(windAngle)*windStrength*.02}

    // Swoop
    if(b.swoopTimer>0){
      b.swoopTimer-=dt*.002;
      if(b.swoopTimer>.5)b.vy+=b.swoopVy*.1;else b.vy-=b.swoopVy*.08;
    }

    // Speed limit
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd>maxSpeed){b.vx=b.vx/spd*maxSpeed;b.vy=b.vy/spd*maxSpeed}

    // Wing flap
    let flapMult=.5+spd/maxSpeed*.8;
    b.wingPhase+=b.wingSpeed*flapMult;

    b.x+=b.vx;b.y+=b.vy;

    // Wrap
    if(b.x<0)b.x+=W;if(b.x>W)b.x-=W;
    if(b.y<0)b.y+=H;if(b.y>H)b.y-=H;

    // Trail
    if(trailLen>0){
      b.trail.push({x:b.x,y:b.y});
      while(b.trail.length>trailLen)b.trail.shift();
    }else if(b.trail.length)b.trail.length=0;

    // Hue drift for neon theme
    if(theme.hueRange>100)b.hue=(b.hue+.3)%360;
  }

  // Predator AI
  for(let p=0;p<predators.length;p++){
    const pr=predators[p];
    let nearest=null,nd=Infinity;
    for(let i=0;i<boids.length;i++){
      const dx=boids[i].x-pr.x,dy=boids[i].y-pr.y;
      const d=dx*dx+dy*dy;
      if(d<nd){nd=d;nearest=boids[i]}
    }
    if(nearest){
      const dx=nearest.x-pr.x,dy=nearest.y-pr.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      pr.vx+=(dx/d)*.08;pr.vy+=(dy/d)*.08;
    }
    const ps=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy);
    if(ps>maxSpeed*.8){pr.vx=pr.vx/ps*maxSpeed*.8;pr.vy=pr.vy/ps*maxSpeed*.8}
    pr.x+=pr.vx;pr.y+=pr.vy;
    if(pr.x<0)pr.x+=W;if(pr.x>W)pr.x-=W;
    if(pr.y<0)pr.y+=H;if(pr.y>H)pr.y-=H;
    pr.wingPhase+=.05;
    pr.trail.push({x:pr.x,y:pr.y});
    if(pr.trail.length>30)pr.trail.shift();
  }

  // Wind drift
  if(windOn){windAngle+=.003;windStrength=2+Math.sin(performance.now()*.001)*1.5}

  // Adjust count
  while(boids.length<targetCount)boids.push(createBoid());
  while(boids.length>targetCount)boids.pop();
}

// --- Draw bird ---
function drawBird(x,y,angle,size,wingPhase,bodyColor,wingColor){
  const wing=Math.sin(wingPhase)*.65;
  c.save();
  c.translate(x,y);
  c.rotate(angle);
  // Tail
  c.beginPath();
  c.moveTo(-size*1.4,0);
  c.lineTo(-size*2.2,-size*.25);
  c.lineTo(-size*2,-size*.05);
  c.lineTo(-size*2.2,size*.25);
  c.closePath();
  c.fillStyle=wingColor;c.fill();
  // Body
  c.beginPath();
  c.ellipse(0,0,size*1.3,size*.32,0,0,Math.PI*2);
  c.fillStyle=bodyColor;c.fill();
  // Head
  c.beginPath();
  c.arc(size*1.1,0,size*.28,0,Math.PI*2);
  c.fill();
  // Beak
  c.beginPath();
  c.moveTo(size*1.35,0);
  c.lineTo(size*1.7,-size*.06);
  c.lineTo(size*1.7,size*.06);
  c.closePath();
  c.fillStyle=wingColor;c.fill();
  // Left wing
  c.save();c.rotate(-wing);
  c.beginPath();
  c.moveTo(-size*.2,0);
  c.quadraticCurveTo(-size,  -size*1.4, -size*2.2, -size*.4);
  c.quadraticCurveTo(-size*1.2,-size*.15,-size*.2,0);
  c.fillStyle=wingColor;c.fill();
  c.restore();
  // Right wing
  c.save();c.rotate(wing);
  c.beginPath();
  c.moveTo(-size*.2,0);
  c.quadraticCurveTo(-size,  size*1.4, -size*2.2, size*.4);
  c.quadraticCurveTo(-size*1.2,size*.15,-size*.2,0);
  c.fillStyle=wingColor;c.fill();
  c.restore();
  c.restore();
}

function birdColors(b){
  if(theme.sat===0) return{body:'rgba(25,25,30,0.88)',wing:'rgba(55,55,60,0.78)'};
  return{
    body:`hsla(${b.hue},${theme.sat}%,${theme.lit-10}%,0.9)`,
    wing:`hsla(${b.hue},${theme.sat+10}%,${theme.lit+8}%,0.82)`
  };
}

// --- Render ---
function render(){
  const sky=skyColors(skyTime);
  const isDusk=skyTime>.6&&skyTime<.9;
  const duskAmt=isDusk?Math.sin((skyTime-.6)/.3*Math.PI):0;
  const now=performance.now()*.001;

  // Sky gradient
  const grad=c.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,rgb(sky.top));grad.addColorStop(.5,rgb(sky.mid));grad.addColorStop(1,rgb(sky.bot));
  c.fillStyle=grad;c.fillRect(0,0,W,H);

  // Sun glow
  const sunY=H*.92,sunX=W*.7;
  const sg=c.createRadialGradient(sunX,sunY,0,sunX,sunY,H*.45);
  sg.addColorStop(0,rgba(sky.sun,.35));sg.addColorStop(.3,rgba(sky.sun,.12));sg.addColorStop(1,rgba(sky.sun,0));
  c.fillStyle=sg;c.fillRect(0,0,W,H);

  // Stars
  if(duskAmt>.05){
    for(let i=0;i<stars.length;i++){
      const s=stars[i];
      const tw=.3+.7*Math.abs(Math.sin(now*s.speed+s.twinkle));
      c.globalAlpha=duskAmt*tw*.8;
      c.fillStyle='rgba(255,255,240,1)';
      c.beginPath();c.arc(s.x*W,s.y*H,s.size,0,Math.PI*2);c.fill();
    }
    c.globalAlpha=1;
  }

  // Clouds with parallax
  const cloudBr=isDusk?.08:.25;
  for(let i=0;i<clouds.length;i++){
    const cl=clouds[i];
    const pFactor=1+cl.layer*.35;
    cl.x+=cl.speed*(windOn?1+windStrength*.3:1);
    if(cl.x>1.4)cl.x=-.35;
    const cx=cl.x*W*pFactor-(cl.layer*.15*W),cy=cl.y*H;
    const a=cl.opacity*cloudBr;
    c.fillStyle=`rgba(255,240,230,${a})`;
    c.beginPath();c.ellipse(cx,cy,cl.w,cl.h,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx+cl.w*.35,cy-cl.h*.35,cl.w*.65,cl.h*.75,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(cx-cl.w*.25,cy+cl.h*.15,cl.w*.45,cl.h*.6,0,0,Math.PI*2);c.fill();
  }

  // Obstacles
  if(obstaclesOn){
    for(let i=0;i<obstacles.length;i++){
      const ob=obstacles[i];
      c.beginPath();c.arc(ob.x,ob.y,ob.r,0,Math.PI*2);
      c.fillStyle='rgba(60,40,30,0.5)';c.fill();
      c.strokeStyle='rgba(100,70,40,0.3)';c.lineWidth=2;c.stroke();
    }
  }

  // Trails
  if(trailLen>0){
    for(let i=0;i<boids.length;i++){
      const b=boids[i];
      if(b.trail.length<2)continue;
      c.beginPath();c.moveTo(b.trail[0].x,b.trail[0].y);
      for(let t=1;t<b.trail.length;t++) c.lineTo(b.trail[t].x,b.trail[t].y);
      const bc=birdColors(b);
      c.strokeStyle=theme.sat===0?'rgba(200,200,210,0.1)':`hsla(${b.hue},${theme.sat}%,${theme.lit+20}%,0.15)`;
      c.lineWidth=1.2;c.stroke();
    }
  }

  // Birds
  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    const angle=Math.atan2(b.vy,b.vx);
    const bc=birdColors(b);
    drawBird(b.x,b.y,angle,b.size,b.wingPhase,bc.body,bc.wing);
  }

  // Predators
  for(let p=0;p<predators.length;p++){
    const pr=predators[p];
    if(pr.trail.length>1){
      c.beginPath();c.moveTo(pr.trail[0].x,pr.trail[0].y);
      for(let t=1;t<pr.trail.length;t++) c.lineTo(pr.trail[t].x,pr.trail[t].y);
      c.strokeStyle='rgba(80,20,20,0.2)';c.lineWidth=2;c.stroke();
    }
    const pa=Math.atan2(pr.vy,pr.vx);
    drawBird(pr.x,pr.y,pa,8,pr.wingPhase,'rgba(30,10,10,0.95)','rgba(50,20,15,0.9)');
  }

  // Grass at bottom
  const grassH=H*.04;
  const grassY=H-grassH;
  // Base grass fill
  c.fillStyle=isDusk?'rgba(15,25,10,0.7)':'rgba(30,60,20,0.5)';
  c.fillRect(0,grassY,W,grassH);
  // Blades
  c.strokeStyle=isDusk?'rgba(20,40,15,0.6)':'rgba(40,80,25,0.45)';
  c.lineWidth=1.5;
  for(let i=0;i<grassBlades.length;i++){
    const g=grassBlades[i];
    const gx=g.x*W;
    const sway=Math.sin(now*g.speed+g.phase)*(windOn?4+windStrength*2:3);
    c.beginPath();c.moveTo(gx,H);
    c.quadraticCurveTo(gx+sway*.5,H-g.h*.5,gx+sway,H-g.h);
    c.stroke();
  }

  // Fireflies at dusk
  if(duskAmt>.1){
    for(let i=0;i<fireflies.length;i++){
      const f=fireflies[i];
      f.x+=f.vx;f.y+=f.vy;
      f.vx+=(Math.random()-.5)*.00003;
      f.vy+=(Math.random()-.5)*.00003;
      if(f.x<0)f.x+=1;if(f.x>1)f.x-=1;
      if(f.y<.4)f.vy+=.00005;if(f.y>.95)f.vy-=.00005;
      const glow=.4+.6*Math.sin(now*1.5+f.phase);
      const a=duskAmt*glow*.7;
      const fx=f.x*W,fy=f.y*H;
      const fg=c.createRadialGradient(fx,fy,0,fx,fy,f.size*4);
      fg.addColorStop(0,`rgba(200,255,100,${a})`);
      fg.addColorStop(.5,`rgba(180,240,80,${a*.3})`);
      fg.addColorStop(1,`rgba(160,220,60,0)`);
      c.fillStyle=fg;
      c.fillRect(fx-f.size*4,fy-f.size*4,f.size*8,f.size*8);
      c.beginPath();c.arc(fx,fy,f.size*.7,0,Math.PI*2);
      c.fillStyle=`rgba(230,255,150,${a})`;c.fill();
    }
  }

  // Wind indicator
  if(windOn){
    c.save();c.translate(W-50,60);c.rotate(windAngle);
    c.strokeStyle='rgba(255,230,180,.2)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(-15,0);c.lineTo(15,0);c.moveTo(10,-4);c.lineTo(15,0);c.lineTo(10,4);c.stroke();
    c.restore();
    c.fillStyle='rgba(255,230,180,.15)';c.font='9px sans-serif';c.textAlign='center';c.fillText('WIND',W-50,80);
  }

  document.getElementById('count').textContent=boids.length+' birds';
}

// --- Loop ---
function loop(t){
  const dt=Math.min(t-lastTime,50);lastTime=t;
  update(dt);render();
  requestAnimationFrame(loop);
}
lastTime=performance.now();
requestAnimationFrame(loop);

// --- Settings panel ---
const gear=document.getElementById('gear');
const panel=document.getElementById('panel');
gear.addEventListener('click',()=>{
  panel.classList.toggle('open');
  gear.classList.toggle('open');
});

// --- Controls ---
function bind(sid,vid,fn){
  const sl=document.getElementById(sid),sv=document.getElementById(vid);
  sl.addEventListener('input',()=>{fn(+sl.value);sv.textContent=sl.value});
}
bind('sCoh','vCoh',v=>{cohesion=v/100});
bind('sAli','vAli',v=>{alignment=v/100});
bind('sSep','vSep',v=>{separation=v/100});
bind('sSpd','vSpd',v=>{maxSpeed=v/10});
bind('sTurn','vTurn',v=>{turnSpeed=v/50});
bind('sVis','vVis',v=>{vision=v});
bind('sNum','vNum',v=>{targetCount=v});
bind('sSize','vSize',v=>{birdSize=v;boids.forEach(b=>{b.size=v*(.8+Math.random()*.4)})});
bind('sTrail','vTrail',v=>{trailLen=v});
bind('sPred','vPred',v=>{predatorCount=v;syncPredators()});

document.getElementById('bWind').addEventListener('click',function(){windOn=!windOn;this.classList.toggle('on')});
document.getElementById('bFormation').addEventListener('click',function(){formationMode=!formationMode;this.classList.toggle('on');if(formationMode)vLeaderIdx=0});
document.getElementById('bObstacle').addEventListener('click',function(){obstaclesOn=!obstaclesOn;this.classList.toggle('on');if(obstaclesOn)initObstacles()});

const themeBtn=document.getElementById('bTheme');
themeBtn.addEventListener('click',function(){
  themeIdx=(themeIdx+1)%themes.length;
  theme=themes[themeIdx];
  this.textContent='Theme: '+theme.name;
  boids.forEach(b=>{b.hue=theme.hueBase+Math.random()*theme.hueRange});
});

document.getElementById('bMute').addEventListener('click',function(){
  startAudio();
  audioMuted=!audioMuted;
  this.textContent=audioMuted?'Sound: Off':'Sound: On';
  this.classList.toggle('on',!audioMuted);
  if(masterGain)masterGain.gain.setTargetAtTime(audioMuted?0:1,audioCtx.currentTime,.15);
});
</script>
