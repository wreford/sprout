<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Meet the Flockers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#87CEEB;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
#gear{position:fixed;top:max(12px,env(safe-area-inset-top));right:12px;z-index:20;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.18);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s,background .2s;color:rgba(60,80,100,.6)}
#gear:hover{background:rgba(255,255,255,.3);color:rgba(40,60,80,.85)}
#gear.open{transform:rotate(90deg)}
#gear svg{width:18px;height:18px;fill:currentColor}
#title{position:fixed;top:0;left:0;right:0;z-index:10;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;gap:12px;pointer-events:none}
#title h1{font-size:16px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.04em;text-shadow:0 1px 3px rgba(0,0,0,.2)}
#title .sub{font-size:10px;color:rgba(255,255,255,.5);text-shadow:0 1px 2px rgba(0,0,0,.15)}
#title .count{margin-left:auto;font-size:11px;color:rgba(255,255,255,.55);font-weight:600;margin-right:44px;text-shadow:0 1px 2px rgba(0,0,0,.15)}
#panel{position:fixed;bottom:0;left:0;right:0;z-index:15;padding:10px 14px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom));background:rgba(20,40,60,.78);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.1);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;max-height:55vh}
#panel.open{transform:translateY(0)}
.row{display:flex;flex-wrap:wrap;gap:5px 14px;align-items:center;justify-content:center;margin-bottom:6px}
.sl{display:flex;align-items:center;gap:5px}
.sl label{font-size:10px;color:rgba(200,220,240,.6);text-transform:uppercase;letter-spacing:.06em;min-width:68px}
.sl input[type=range]{-webkit-appearance:none;width:76px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;outline:none}
.sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#90c8f0,#5090d0);cursor:pointer;box-shadow:0 0 6px rgba(80,140,200,.4)}
.sv{font-size:10px;color:rgba(200,220,240,.8);min-width:24px;font-weight:600}
.btn{font:600 10px/1 'Segoe UI',system-ui,sans-serif;padding:5px 10px;border:1px solid rgba(255,255,255,.15);border-radius:5px;background:rgba(255,255,255,.08);color:rgba(200,220,240,.7);cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.18);color:rgba(220,235,250,.95)}
.btn.on{background:rgba(80,160,240,.22);border-color:rgba(80,160,240,.4);color:#80c8ff}
.sep{width:100%;height:1px;background:rgba(255,255,255,.08);margin:4px 0}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="title">
  <h1>Meet the Flockers</h1>
  <span class="sub">a nature flocking simulation</span>
  <span class="count" id="count">0 seagulls</span>
</div>
<div id="gear" title="Settings"><svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54a7.04 7.04 0 00-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.71 8.87a.48.48 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54a7.04 7.04 0 001.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg></div>
<div id="panel">
  <div class="row">
    <div class="sl"><label>Cohesion</label><input type="range" id="sCoh" min="0" max="100" value="60"><span class="sv" id="vCoh">60</span></div>
    <div class="sl"><label>Alignment</label><input type="range" id="sAli" min="0" max="100" value="75"><span class="sv" id="vAli">75</span></div>
    <div class="sl"><label>Separation</label><input type="range" id="sSep" min="0" max="100" value="45"><span class="sv" id="vSep">45</span></div>
  </div>
  <div class="row">
    <div class="sl"><label>Speed</label><input type="range" id="sSpd" min="10" max="100" value="28"><span class="sv" id="vSpd">28</span></div>
    <div class="sl"><label>Turn Speed</label><input type="range" id="sTurn" min="10" max="100" value="40"><span class="sv" id="vTurn">40</span></div>
    <div class="sl"><label>Vision</label><input type="range" id="sVis" min="20" max="300" value="140"><span class="sv" id="vVis">140</span></div>
  </div>
  <div class="row">
    <div class="sl"><label>Flock Size</label><input type="range" id="sNum" min="20" max="800" value="200" step="10"><span class="sv" id="vNum">200</span></div>
    <div class="sl"><label>Bird Size</label><input type="range" id="sSize" min="1" max="10" value="5"><span class="sv" id="vSize">5</span></div>
    <div class="sl"><label>Trail Length</label><input type="range" id="sTrail" min="0" max="50" value="0"><span class="sv" id="vTrail">0</span></div>
  </div>
  <div class="sep"></div>
  <div class="row">
    <div class="sl"><label>Predators</label><input type="range" id="sPred" min="0" max="3" value="0"><span class="sv" id="vPred">0</span></div>
    <button class="btn on" id="bWind">Wind</button>
    <button class="btn" id="bFormation">V-Formation</button>
    <button class="btn" id="bObstacle">Obstacles</button>
    <button class="btn on" id="bMute">Sound: On</button>
  </div>
  <div class="row">
    <button class="btn" id="bTheme" data-theme="0">Theme: Beach</button>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),c=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize);

// --- Themes ---
const themes=[
  {name:'Beach',  birdBody:'white',  birdWing:'white',  tipColor:'#555',  hueBase:0,   hueRange:0,  sat:0,  lit:0, useWhite:true},
  {name:'Sunset', birdBody:'#fff8e0',birdWing:'#ffe0a0',tipColor:'#c08030',hueBase:15,  hueRange:40, sat:70, lit:45, useWhite:false},
  {name:'Ocean',  birdBody:'#d0e8ff',birdWing:'#90b8e0',tipColor:'#406080',hueBase:200, hueRange:40, sat:60, lit:55, useWhite:false},
  {name:'Forest', birdBody:'#d8f0d0',birdWing:'#90c080',tipColor:'#405030',hueBase:110, hueRange:50, sat:50, lit:45, useWhite:false},
  {name:'Neon',   birdBody:'#ff80ff',birdWing:'#80ffff',tipColor:'#fff',   hueBase:0,   hueRange:360,sat:90, lit:60, useWhite:false},
  {name:'Mono',   birdBody:'#333',   birdWing:'#555',   tipColor:'#222',   hueBase:0,   hueRange:0,  sat:0,  lit:55, useWhite:false}
];
let themeIdx=0,theme=themes[0];

// --- Parameters ---
const BASE_COH=.60,BASE_ALI=.75,BASE_SEP=.45;
let cohesion=BASE_COH,alignment=BASE_ALI,separation=BASE_SEP;
let maxSpeed=2.8,turnSpeed=.4,vision=140,targetCount=200;
let trailLen=0,birdSize=5,predatorCount=0,windOn=true,formationMode=false,obstaclesOn=false;

// --- Natural drift ---
const driftStart=performance.now();
function getDrift(t){
  const s=t/1000;
  return{
    coh:Math.sin(s*Math.PI*2/30)*.08,
    ali:Math.sin(s*Math.PI*2/45)*.06,
    sep:Math.sin(s*Math.PI*2/60)*.06
  };
}

// --- Clouds ---
const clouds=[];
for(let i=0;i<20;i++){
  const layer=Math.random()<0.3?0:Math.random()<0.5?1:2;
  clouds.push({
    x:Math.random()*2-.3,
    y:.03+Math.random()*.35,
    w:80+Math.random()*220,
    h:18+Math.random()*30,
    speed:(.00003+Math.random()*.00012)*(1+layer*.3),
    opacity:.12+Math.random()*.20,
    layer,
    puffs:[]
  });
  // Generate soft sub-puffs for each cloud
  const cl=clouds[clouds.length-1];
  const np=3+Math.floor(Math.random()*4);
  for(let p=0;p<np;p++){
    cl.puffs.push({
      ox:(Math.random()-.5)*cl.w*.8,
      oy:(Math.random()-.5)*cl.h*.6,
      rw:cl.w*(.3+Math.random()*.5),
      rh:cl.h*(.4+Math.random()*.5)
    });
  }
}

// --- Obstacles ---
const obstacles=[];
function initObstacles(){obstacles.length=0;for(let i=0;i<5;i++) obstacles.push({x:W*.15+Math.random()*W*.7,y:H*.1+Math.random()*H*.4,r:20+Math.random()*30})}

// --- Boids ---
let boids=[];
function createBoid(x,y){
  const angle=Math.random()*Math.PI*2;
  const h=theme.hueBase+Math.random()*theme.hueRange;
  return{
    x:x??Math.random()*W,
    y:y??Math.random()*H*.55,
    vx:Math.cos(angle)*1.5,
    vy:Math.sin(angle)*1.5,
    hue:h,
    wingPhase:Math.random()*Math.PI*2,
    wingSpeed:.03+Math.random()*.02,
    size:birdSize*(.85+Math.random()*.3),
    swoopTimer:0,swoopVy:0,trail:[],
    glideTimer:0,
    thermalTimer:Math.random()*400,
    thermalActive:false,
    thermalAngle:0,
    thermalCenterX:0,
    thermalCenterY:0
  };
}
function initBoids(n){boids=[];for(let i=0;i<n;i++) boids.push(createBoid())}
initBoids(targetCount);

// --- Predators ---
let predators=[];
function syncPredators(){
  while(predators.length<predatorCount) predators.push({x:Math.random()*W,y:Math.random()*H*.4,vx:1.5,vy:.8,wingPhase:0,trail:[]});
  while(predators.length>predatorCount) predators.pop();
}

// --- Wind ---
let windAngle=0,windStrength=1.2;

// --- Mouse ---
let mouse={x:-1e4,y:-1e4,active:false};
cv.addEventListener('mousedown',e=>{mouse.active=true;mouse.x=e.clientX;mouse.y=e.clientY});
cv.addEventListener('mousemove',e=>{if(mouse.active){mouse.x=e.clientX;mouse.y=e.clientY}});
cv.addEventListener('mouseup',()=>{mouse.active=false;mouse.x=-1e4;mouse.y=-1e4});
cv.addEventListener('touchstart',e=>{e.preventDefault();mouse.active=true;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;startAudio()},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY},{passive:false});
cv.addEventListener('touchend',()=>{mouse.active=false;mouse.x=-1e4;mouse.y=-1e4});
cv.addEventListener('click',()=>startAudio(),{once:true});

// --- Spatial grid ---
const GRID_SIZE=120;
let grid={};
function gridKey(x,y){return((x/GRID_SIZE)|0)+','+(((y/GRID_SIZE)|0))}
function buildGrid(){
  grid={};
  for(let i=0;i<boids.length;i++){
    const k=gridKey(boids[i].x,boids[i].y);
    if(!grid[k])grid[k]=[];
    grid[k].push(i);
  }
}
function getNeighbors(b){
  const results=[];
  const gx=(b.x/GRID_SIZE)|0,gy=(b.y/GRID_SIZE)|0;
  const range=vision>GRID_SIZE?2:1;
  for(let dx=-range;dx<=range;dx++)for(let dy=-range;dy<=range;dy++){
    const bucket=grid[(gx+dx)+','+(gy+dy)];
    if(bucket)for(let j=0;j<bucket.length;j++) results.push(bucket[j]);
  }
  return results;
}

// --- Audio ---
let audioCtx,audioStarted=false,audioMuted=false;
let masterGain,windGain,oceanGain,oceanLfoGain;

function startAudio(){
  if(audioStarted)return;
  audioStarted=true;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=1;
  masterGain.connect(audioCtx.destination);

  // Noise buffer
  const bufSz=audioCtx.sampleRate*4;
  const nBuf=audioCtx.createBuffer(1,bufSz,audioCtx.sampleRate);
  const nd=nBuf.getChannelData(0);
  for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;

  // --- Ocean waves: filtered noise with slow volume oscillation ---
  const oceanNoise=audioCtx.createBufferSource();
  oceanNoise.buffer=nBuf;oceanNoise.loop=true;
  // Low-pass for rumble
  const oceanLP=audioCtx.createBiquadFilter();oceanLP.type='lowpass';oceanLP.frequency.value=400;oceanLP.Q.value=.3;
  // High-pass to remove sub-bass mud
  const oceanHP=audioCtx.createBiquadFilter();oceanHP.type='highpass';oceanHP.frequency.value=60;oceanHP.Q.value=.4;
  // Second low-pass for softness
  const oceanLP2=audioCtx.createBiquadFilter();oceanLP2.type='lowpass';oceanLP2.frequency.value=600;oceanLP2.Q.value=.2;
  // LFO for wave wash in/out (6-8 second cycle)
  const oceanLfo=audioCtx.createOscillator();oceanLfo.type='sine';oceanLfo.frequency.value=1/7;
  oceanLfoGain=audioCtx.createGain();oceanLfoGain.gain.value=.025;
  oceanGain=audioCtx.createGain();oceanGain.gain.value=.035;
  oceanLfo.connect(oceanLfoGain);oceanLfoGain.connect(oceanGain.gain);
  oceanNoise.connect(oceanLP);oceanLP.connect(oceanHP);oceanHP.connect(oceanLP2);oceanLP2.connect(oceanGain);oceanGain.connect(masterGain);
  oceanNoise.start();oceanLfo.start();

  // --- Wind: gentle always-present ---
  const wNoise=audioCtx.createBufferSource();wNoise.buffer=nBuf;wNoise.loop=true;
  const wF=audioCtx.createBiquadFilter();wF.type='bandpass';wF.frequency.value=350;wF.Q.value=.3;
  const wF2=audioCtx.createBiquadFilter();wF2.type='lowpass';wF2.frequency.value=800;wF2.Q.value=.2;
  const wLfo=audioCtx.createOscillator();wLfo.type='sine';wLfo.frequency.value=.08;
  const wLfoG=audioCtx.createGain();wLfoG.gain.value=150;
  wLfo.connect(wLfoG);wLfoG.connect(wF.frequency);wLfo.start();
  windGain=audioCtx.createGain();windGain.gain.value=.015;
  wNoise.connect(wF);wF.connect(wF2);wF2.connect(windGain);windGain.connect(masterGain);wNoise.start();

  scheduleSeagullCall();
}

// --- Seagull call: "kee-aah" sound ---
function seagullCall(){
  if(!audioCtx||audioMuted)return;
  const now=audioCtx.currentTime;
  const dur=0.4+Math.random()*0.15;

  // Main oscillator: ascending then descending
  const osc=audioCtx.createOscillator();
  osc.type='sine';
  osc.frequency.setValueAtTime(1500+Math.random()*200,now);
  osc.frequency.linearRampToValueAtTime(2400+Math.random()*300,now+dur*0.3);
  osc.frequency.linearRampToValueAtTime(1100+Math.random()*200,now+dur);

  // Add harmonics for realism
  const osc2=audioCtx.createOscillator();
  osc2.type='sine';
  osc2.frequency.setValueAtTime(3000+Math.random()*400,now);
  osc2.frequency.linearRampToValueAtTime(4800+Math.random()*600,now+dur*0.3);
  osc2.frequency.linearRampToValueAtTime(2200+Math.random()*400,now+dur);

  // Noise burst for harshness
  const nBufSmall=audioCtx.createBuffer(1,audioCtx.sampleRate*0.5,audioCtx.sampleRate);
  const ndd=nBufSmall.getChannelData(0);
  for(let i=0;i<ndd.length;i++) ndd[i]=Math.random()*2-1;
  const noiseSrc=audioCtx.createBufferSource();noiseSrc.buffer=nBufSmall;
  const nBP=audioCtx.createBiquadFilter();nBP.type='bandpass';nBP.frequency.value=2500;nBP.Q.value=2;
  const noiseG=audioCtx.createGain();
  noiseG.gain.setValueAtTime(0,now);
  noiseG.gain.linearRampToValueAtTime(.008,now+.02);
  noiseG.gain.linearRampToValueAtTime(.012,now+dur*0.25);
  noiseG.gain.exponentialRampToValueAtTime(.001,now+dur);

  // Envelope
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0,now);
  g.gain.linearRampToValueAtTime(.035,now+.015);
  g.gain.linearRampToValueAtTime(.045,now+dur*0.25);
  g.gain.exponentialRampToValueAtTime(.001,now+dur);

  const g2=audioCtx.createGain();
  g2.gain.setValueAtTime(0,now);
  g2.gain.linearRampToValueAtTime(.012,now+.015);
  g2.gain.exponentialRampToValueAtTime(.001,now+dur);

  osc.connect(g);g.connect(masterGain);
  osc2.connect(g2);g2.connect(masterGain);
  noiseSrc.connect(nBP);nBP.connect(noiseG);noiseG.connect(masterGain);

  osc.start(now);osc.stop(now+dur+.05);
  osc2.start(now);osc2.stop(now+dur+.05);
  noiseSrc.start(now);noiseSrc.stop(now+dur+.05);

  // Sometimes do a double call
  if(Math.random()<0.3){
    setTimeout(()=>seagullCall(),500+Math.random()*300);
  }
}

function scheduleSeagullCall(){
  if(!audioCtx)return;
  setTimeout(()=>{
    if(!audioMuted&&audioCtx) seagullCall();
    scheduleSeagullCall();
  },3000+Math.random()*8000);
}

// --- V-Formation leader ---
let vLeaderIdx=0;

// --- Simulation ---
let lastTime=0,swoopCooldown=0,elapsed=0;

function update(dt){
  elapsed+=dt;
  buildGrid();

  const drift=getDrift(performance.now()-driftStart);
  const effCoh=(cohesion+drift.coh)*.003;
  const effAli=(alignment+drift.ali)*.04;
  const effSep=(separation+drift.sep)*.06;
  const ts=turnSpeed;
  const vis2=vision*vision;

  // Wind audio
  if(windGain){
    const wt=windOn?.015+windStrength*.005:.005;
    windGain.gain.value+=(wt-windGain.gain.value)*.02;
  }

  // Swoops (occasional dive)
  swoopCooldown-=dt;
  if(swoopCooldown<=0&&boids.length>0){
    swoopCooldown=6000+Math.random()*10000;
    const bi=Math.floor(Math.random()*boids.length);
    boids[bi].swoopTimer=1;boids[bi].swoopVy=2+Math.random()*1.5;
  }

  // Formation leader
  if(formationMode&&boids.length>0){
    vLeaderIdx=vLeaderIdx%boids.length;
    const leader=boids[vLeaderIdx];
    const la=Math.atan2(leader.vy,leader.vx);
    const armAngle=Math.PI*.82;
    for(let i=0;i<boids.length;i++){
      if(i===vLeaderIdx)continue;
      const rank=i<vLeaderIdx?i:i-1;
      const side=rank%2===0?1:-1;
      const pos=Math.floor(rank/2)+1;
      const tx=leader.x-Math.cos(la)*pos*22+Math.cos(la+armAngle*side)*pos*22;
      const ty=leader.y-Math.sin(la)*pos*22+Math.sin(la+armAngle*side)*pos*22;
      const b=boids[i];
      const dx=tx-b.x,dy=ty-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const strength=Math.min(d*.002,.12);
      b.vx+=dx/d*strength;b.vy+=dy/d*strength;
    }
  }

  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    let cx=0,cy=0,ax=0,ay=0,sx=0,sy=0,count=0;
    const neighbors=getNeighbors(b);

    for(let j=0;j<neighbors.length;j++){
      const ni=neighbors[j];
      if(ni===i)continue;
      const o=boids[ni];
      const dx=o.x-b.x,dy=o.y-b.y;
      const d2=dx*dx+dy*dy;
      if(d2>vis2||d2<1)continue;
      const d=Math.sqrt(d2);
      cx+=o.x;cy+=o.y;
      ax+=o.vx;ay+=o.vy;
      sx-=dx/d;sy-=dy/d;
      count++;
    }

    if(count>0){
      cx=cx/count-b.x;cy=cy/count-b.y;
      b.vx+=cx*effCoh*ts;b.vy+=cy*effCoh*ts;
      ax/=count;ay/=count;
      b.vx+=(ax-b.vx)*effAli*ts;b.vy+=(ay-b.vy)*effAli*ts;
      b.vx+=sx*effSep*ts;b.vy+=sy*effSep*ts;
    }

    // Mouse attraction
    if(mouse.active){
      const dx=mouse.x-b.x,dy=mouse.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<300){b.vx+=dx/d*.2;b.vy+=dy/d*.2}
    }

    // Predator avoidance
    for(let p=0;p<predators.length;p++){
      const pr=predators[p];
      const dx=pr.x-b.x,dy=pr.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<150){b.vx-=dx/d*1.5;b.vy-=dy/d*1.5}
    }

    // Obstacle avoidance
    if(obstaclesOn){
      for(let o=0;o<obstacles.length;o++){
        const ob=obstacles[o];
        const dx=ob.x-b.x,dy=ob.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        if(d<ob.r+40){b.vx-=dx/d*2;b.vy-=dy/d*2}
      }
    }

    // Wind
    if(windOn){b.vx+=Math.cos(windAngle)*windStrength*.012;b.vy+=Math.sin(windAngle)*windStrength*.012}

    // Thermal soaring
    b.thermalTimer-=dt*.001;
    if(b.thermalTimer<=0&&!b.thermalActive&&Math.random()<0.02){
      b.thermalActive=true;
      b.thermalTimer=8+Math.random()*12;
      b.thermalCenterX=b.x;
      b.thermalCenterY=b.y;
      b.thermalAngle=Math.atan2(b.vy,b.vx);
    }
    if(b.thermalActive){
      b.thermalTimer-=dt*.001;
      if(b.thermalTimer<=0){
        b.thermalActive=false;
        b.thermalTimer=15+Math.random()*25;
      } else {
        // Gentle circular motion
        b.thermalAngle+=.008;
        const radius=60+Math.random()*.5;
        const tx=b.thermalCenterX+Math.cos(b.thermalAngle)*radius;
        const ty=b.thermalCenterY+Math.sin(b.thermalAngle)*radius;
        const dx=tx-b.x,dy=ty-b.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        b.vx+=dx/d*.04;b.vy+=dy/d*.04;
      }
    }

    // Swoop
    if(b.swoopTimer>0){
      b.swoopTimer-=dt*.0015;
      if(b.swoopTimer>.5)b.vy+=b.swoopVy*.06;else b.vy-=b.swoopVy*.05;
    }

    // Speed limit
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd>maxSpeed){b.vx=b.vx/spd*maxSpeed;b.vy=b.vy/spd*maxSpeed}
    // Minimum speed
    if(spd<maxSpeed*.3&&spd>0){
      b.vx=b.vx/spd*maxSpeed*.3;
      b.vy=b.vy/spd*maxSpeed*.3;
    }

    // Glide detection: when speed is steady and turning is minimal
    const turnRate=count>0?Math.abs(Math.atan2(ay,ax)-Math.atan2(b.vy,b.vx)):0;
    if(turnRate<.15&&spd>maxSpeed*.5){
      b.glideTimer=Math.min(b.glideTimer+dt*.003,1);
    } else {
      b.glideTimer=Math.max(b.glideTimer-dt*.005,0);
    }

    // Wing flap - sinusoidal, slower when gliding
    const flapRate=b.glideTimer>.5?b.wingSpeed*.15:b.wingSpeed*(.4+spd/maxSpeed*.5);
    b.wingPhase+=flapRate;

    b.x+=b.vx;b.y+=b.vy;

    // Wrap
    if(b.x<-20)b.x+=W+40;if(b.x>W+20)b.x-=W+40;
    if(b.y<-20)b.y+=H+40;if(b.y>H+20)b.y-=H+40;

    // Trail
    if(trailLen>0){
      b.trail.push({x:b.x,y:b.y});
      while(b.trail.length>trailLen)b.trail.shift();
    }else if(b.trail.length)b.trail.length=0;

    // Hue drift for neon theme
    if(theme.hueRange>100)b.hue=(b.hue+.3)%360;
  }

  // Predator AI
  for(let p=0;p<predators.length;p++){
    const pr=predators[p];
    let nearest=null,nd=Infinity;
    for(let i=0;i<boids.length;i++){
      const dx=boids[i].x-pr.x,dy=boids[i].y-pr.y;
      const d=dx*dx+dy*dy;
      if(d<nd){nd=d;nearest=boids[i]}
    }
    if(nearest){
      const dx=nearest.x-pr.x,dy=nearest.y-pr.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      pr.vx+=(dx/d)*.06;pr.vy+=(dy/d)*.06;
    }
    const ps=Math.sqrt(pr.vx*pr.vx+pr.vy*pr.vy);
    if(ps>maxSpeed*1.2){pr.vx=pr.vx/ps*maxSpeed*1.2;pr.vy=pr.vy/ps*maxSpeed*1.2}
    pr.x+=pr.vx;pr.y+=pr.vy;
    if(pr.x<0)pr.x+=W;if(pr.x>W)pr.x-=W;
    if(pr.y<0)pr.y+=H;if(pr.y>H)pr.y-=H;
    pr.wingPhase+=.04;
    pr.trail.push({x:pr.x,y:pr.y});
    if(pr.trail.length>30)pr.trail.shift();
  }

  // Wind drift - gentle, slow rotation
  if(windOn){windAngle+=.001;windStrength=1.2+Math.sin(performance.now()*.0003)*.6}

  // Adjust count
  while(boids.length<targetCount)boids.push(createBoid());
  while(boids.length>targetCount)boids.pop();
}

// --- Draw seagull with jointed wings ---
function drawBird(x,y,angle,size,wingPhase,b,glideAmt){
  // Sinusoidal wing with ease at extremes
  const rawFlap=Math.sin(wingPhase);
  // Smooth ease: cube for softer extremes
  const flap=Math.sign(rawFlap)*Math.pow(Math.abs(rawFlap),.7);
  // Glide: wings mostly spread
  const flapAmt=1-glideAmt*.85;
  const wing=flap*.55*flapAmt;
  // Slight wobble when gliding
  const glideWobble=glideAmt*Math.sin(wingPhase*.3)*.03;

  // Body pitch based on vertical velocity
  const pitch=Math.atan2(b.vy,Math.abs(b.vx)+.5)*.3;

  // Banking: tilt based on angular velocity approximation
  const speed=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||.1;
  const headingAngle=Math.atan2(b.vy,b.vx);

  // Bird colors based on theme
  let bodyColor,wingColor,tipColor;
  if(theme.useWhite){
    bodyColor='rgba(255,255,255,0.95)';
    wingColor='rgba(240,240,245,0.9)';
    tipColor='rgba(80,80,90,0.85)';
  } else if(theme.hueRange>100){
    // Neon
    bodyColor=`hsla(${b.hue},${theme.sat}%,${theme.lit}%,0.92)`;
    wingColor=`hsla(${(b.hue+60)%360},${theme.sat}%,${theme.lit+15}%,0.85)`;
    tipColor=`hsla(${(b.hue+120)%360},${theme.sat}%,${theme.lit+5}%,0.9)`;
  } else if(theme.sat===0&&!theme.useWhite){
    // Mono
    bodyColor='rgba(30,30,35,0.92)';
    wingColor='rgba(60,60,65,0.85)';
    tipColor='rgba(20,20,25,0.9)';
  } else {
    bodyColor=theme.birdBody;
    wingColor=theme.birdWing;
    tipColor=theme.tipColor;
  }

  c.save();
  c.translate(x,y);
  c.rotate(angle+pitch);

  const s=size;
  const innerWingLen=s*1.8;
  const outerWingLen=s*1.4;
  const jointAngle=wing*.25+glideWobble;    // Inner wing: mostly level
  const tipAngle=wing*.75+glideWobble;       // Outer wing: does the flapping

  // --- Tail ---
  c.beginPath();
  c.moveTo(-s*1.2,0);
  c.lineTo(-s*1.9,-s*.2);
  c.lineTo(-s*1.7,0);
  c.lineTo(-s*1.9,s*.2);
  c.closePath();
  c.fillStyle=wingColor;c.fill();

  // --- Body: elongated ellipse ---
  c.beginPath();
  c.ellipse(0,0,s*1.4,s*.28,0,0,Math.PI*2);
  c.fillStyle=bodyColor;c.fill();

  // --- Head ---
  c.beginPath();
  c.arc(s*1.2,0,s*.24,0,Math.PI*2);
  c.fillStyle=bodyColor;c.fill();

  // --- Eye (tiny dark dot) ---
  c.beginPath();
  c.arc(s*1.28,-s*.06,s*.05,0,Math.PI*2);
  c.fillStyle='rgba(20,20,20,0.8)';c.fill();

  // --- Beak: yellow-orange ---
  c.beginPath();
  c.moveTo(s*1.42,0);
  c.lineTo(s*1.75,-s*.04);
  c.lineTo(s*1.72,s*.03);
  c.closePath();
  c.fillStyle=theme.useWhite?'#e8a020':'#c08030';c.fill();

  // --- Left wing (top wing) ---
  c.save();
  // Inner wing segment
  const lInnerEndX=-s*.1+Math.cos(-Math.PI/2-jointAngle)*innerWingLen;
  const lInnerEndY=Math.sin(-Math.PI/2-jointAngle)*innerWingLen;
  // Draw inner wing
  c.beginPath();
  c.moveTo(s*.2,0);
  c.lineTo(-s*.1,0);
  c.lineTo(lInnerEndX,lInnerEndY);
  c.lineTo(lInnerEndX+s*.5,lInnerEndY*.85);
  c.closePath();
  c.fillStyle=wingColor;c.fill();
  // Outer wing segment from joint
  const outerAngle=-Math.PI/2-jointAngle-tipAngle;
  const lOuterEndX=lInnerEndX+Math.cos(outerAngle)*outerWingLen;
  const lOuterEndY=lInnerEndY+Math.sin(outerAngle)*outerWingLen;
  c.beginPath();
  c.moveTo(lInnerEndX+s*.3,lInnerEndY*.9);
  c.lineTo(lInnerEndX,lInnerEndY);
  c.lineTo(lOuterEndX,lOuterEndY);
  c.lineTo(lOuterEndX+s*.2,lOuterEndY*.9);
  c.closePath();
  c.fillStyle=wingColor;c.fill();
  // Wing tip (dark)
  c.beginPath();
  c.moveTo(lOuterEndX+s*.15,lOuterEndY*.92);
  c.lineTo(lOuterEndX,lOuterEndY);
  c.lineTo(lOuterEndX-s*.15,lOuterEndY*1.03);
  c.closePath();
  c.fillStyle=tipColor;c.fill();
  c.restore();

  // --- Right wing (bottom wing) ---
  c.save();
  const rInnerEndX=-s*.1+Math.cos(Math.PI/2+jointAngle)*innerWingLen;
  const rInnerEndY=Math.sin(Math.PI/2+jointAngle)*innerWingLen;
  c.beginPath();
  c.moveTo(s*.2,0);
  c.lineTo(-s*.1,0);
  c.lineTo(rInnerEndX,rInnerEndY);
  c.lineTo(rInnerEndX+s*.5,rInnerEndY*.85);
  c.closePath();
  c.fillStyle=wingColor;c.fill();
  const rOuterAngle=Math.PI/2+jointAngle+tipAngle;
  const rOuterEndX=rInnerEndX+Math.cos(rOuterAngle)*outerWingLen;
  const rOuterEndY=rInnerEndY+Math.sin(rOuterAngle)*outerWingLen;
  c.beginPath();
  c.moveTo(rInnerEndX+s*.3,rInnerEndY*.9);
  c.lineTo(rInnerEndX,rInnerEndY);
  c.lineTo(rOuterEndX,rOuterEndY);
  c.lineTo(rOuterEndX+s*.2,rOuterEndY*.9);
  c.closePath();
  c.fillStyle=wingColor;c.fill();
  // Wing tip (dark)
  c.beginPath();
  c.moveTo(rOuterEndX+s*.15,rOuterEndY*.92);
  c.lineTo(rOuterEndX,rOuterEndY);
  c.lineTo(rOuterEndX-s*.15,rOuterEndY*1.03);
  c.closePath();
  c.fillStyle=tipColor;c.fill();
  c.restore();

  c.restore();
}

// --- Render beach scene ---
function render(now){
  const t=now*.001;

  // --- Sky gradient: bright beach day ---
  const grad=c.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#4a90d9');
  grad.addColorStop(0.3,'#6aabe6');
  grad.addColorStop(0.45,'#88c4f0');
  grad.addColorStop(0.55,'#a0d4f8');
  c.fillStyle=grad;c.fillRect(0,0,W,H);

  // --- Sun glow ---
  const sunX=W*.75,sunY=H*.15;
  const sg=c.createRadialGradient(sunX,sunY,0,sunX,sunY,H*.35);
  sg.addColorStop(0,'rgba(255,255,220,.6)');
  sg.addColorStop(0.08,'rgba(255,250,200,.35)');
  sg.addColorStop(0.3,'rgba(255,240,180,.12)');
  sg.addColorStop(1,'rgba(255,240,180,0)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);
  // Sun disk
  c.beginPath();c.arc(sunX,sunY,18,0,Math.PI*2);
  c.fillStyle='rgba(255,255,230,.9)';c.fill();

  // --- Wispy high clouds ---
  c.globalAlpha=1;
  for(let i=0;i<clouds.length;i++){
    const cl=clouds[i];
    cl.x+=cl.speed*(windOn?1+windStrength*.2:1);
    if(cl.x>1.5)cl.x=-.4;
    const pFactor=1+cl.layer*.25;
    const baseX=cl.x*W*pFactor-(cl.layer*.12*W);
    const baseY=cl.y*H;
    // Draw puffs
    for(let p=0;p<cl.puffs.length;p++){
      const pf=cl.puffs[p];
      const px=baseX+pf.ox,py=baseY+pf.oy;
      const cg=c.createRadialGradient(px,py,0,px,py,Math.max(pf.rw,pf.rh));
      cg.addColorStop(0,`rgba(255,255,255,${cl.opacity*.6})`);
      cg.addColorStop(0.5,`rgba(255,255,255,${cl.opacity*.3})`);
      cg.addColorStop(1,'rgba(255,255,255,0)');
      c.fillStyle=cg;
      c.beginPath();c.ellipse(px,py,pf.rw,pf.rh,0,0,Math.PI*2);c.fill();
    }
  }

  // --- Ocean water (bottom half) ---
  const waterTop=H*.58;
  const waterGrad=c.createLinearGradient(0,waterTop,0,H);
  waterGrad.addColorStop(0,'#3a8ec0');
  waterGrad.addColorStop(0.15,'#2e7ab0');
  waterGrad.addColorStop(0.5,'#1e5a88');
  waterGrad.addColorStop(1,'#143e60');
  c.fillStyle=waterGrad;
  c.fillRect(0,waterTop,W,H-waterTop);

  // Water shimmer/reflection
  c.globalAlpha=.06;
  for(let i=0;i<30;i++){
    const rx=((t*.02+i*.137)%1.2-.1)*W;
    const ry=waterTop+20+i*((H-waterTop-20)/30);
    const rw=40+Math.sin(t*.5+i)*20;
    c.fillStyle='rgba(255,255,255,1)';
    c.fillRect(rx,ry,rw,1.5);
  }
  c.globalAlpha=1;

  // --- Wave animation (sine curves at waterline) ---
  const waveY=waterTop;
  // Multiple wave layers
  for(let layer=0;layer<3;layer++){
    const amp=3+layer*2;
    const freq=.015-layer*.003;
    const speed=t*(.3+layer*.15);
    const alpha=.25-layer*.06;
    c.beginPath();
    c.moveTo(0,waveY+10);
    for(let x=0;x<=W;x+=3){
      const y=waveY+Math.sin(x*freq+speed)*amp+Math.sin(x*freq*2.3+speed*1.3)*amp*.4+layer*3;
      if(x===0)c.moveTo(x,y);else c.lineTo(x,y);
    }
    c.lineTo(W,waveY+15);c.lineTo(0,waveY+15);c.closePath();
    c.fillStyle=`rgba(255,255,255,${alpha})`;
    c.fill();
  }

  // --- Sandy beach (middle strip) ---
  const sandTop=waterTop-H*.06;
  const sandBot=waterTop+5;
  const sandGrad=c.createLinearGradient(0,sandTop,0,sandBot);
  sandGrad.addColorStop(0,'#f0dca0');
  sandGrad.addColorStop(0.3,'#e8d090');
  sandGrad.addColorStop(0.7,'#dcc480');
  sandGrad.addColorStop(1,'#c0a868');
  c.fillStyle=sandGrad;
  // Sand shape with slight curve
  c.beginPath();
  c.moveTo(0,sandBot+5);
  for(let x=0;x<=W;x+=4){
    const y=sandTop+Math.sin(x*.003+1)*H*.01;
    c.lineTo(x,y);
  }
  c.lineTo(W,sandBot+5);c.closePath();
  c.fill();

  // Sand texture (subtle noise dots)
  c.globalAlpha=.08;
  for(let i=0;i<150;i++){
    const sx=(i*37.73)%W;
    const sy=sandTop+Math.random()*(sandBot-sandTop+5);
    c.fillStyle=Math.random()>.5?'rgba(180,150,80,1)':'rgba(255,240,200,1)';
    c.fillRect(sx,sy,1+Math.random(),1);
  }
  c.globalAlpha=1;

  // --- Foam line at shore ---
  c.beginPath();
  for(let x=0;x<=W;x+=2){
    const y=waterTop+Math.sin(x*.02+t*.4)*2+Math.sin(x*.05+t*.7)*1;
    if(x===0)c.moveTo(x,y);else c.lineTo(x,y);
  }
  c.strokeStyle='rgba(255,255,255,.35)';c.lineWidth=2.5;c.stroke();

  // --- Obstacles ---
  if(obstaclesOn){
    for(let i=0;i<obstacles.length;i++){
      const ob=obstacles[i];
      c.beginPath();c.arc(ob.x,ob.y,ob.r,0,Math.PI*2);
      c.fillStyle='rgba(60,40,30,0.4)';c.fill();
      c.strokeStyle='rgba(100,70,40,0.25)';c.lineWidth=2;c.stroke();
    }
  }

  // --- Trails ---
  if(trailLen>0){
    for(let i=0;i<boids.length;i++){
      const b=boids[i];
      if(b.trail.length<2)continue;
      c.beginPath();c.moveTo(b.trail[0].x,b.trail[0].y);
      for(let tt=1;tt<b.trail.length;tt++) c.lineTo(b.trail[tt].x,b.trail[tt].y);
      c.strokeStyle=theme.useWhite?'rgba(255,255,255,0.12)'
        :theme.sat===0?'rgba(100,100,110,0.12)'
        :`hsla(${b.hue},${theme.sat}%,${theme.lit+20}%,0.12)`;
      c.lineWidth=1;c.stroke();
    }
  }

  // --- Birds ---
  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    const angle=Math.atan2(b.vy,b.vx);
    drawBird(b.x,b.y,angle,b.size,b.wingPhase,b,b.glideTimer);
  }

  // --- Predators ---
  for(let p=0;p<predators.length;p++){
    const pr=predators[p];
    if(pr.trail.length>1){
      c.beginPath();c.moveTo(pr.trail[0].x,pr.trail[0].y);
      for(let tt=1;tt<pr.trail.length;tt++) c.lineTo(pr.trail[tt].x,pr.trail[tt].y);
      c.strokeStyle='rgba(80,20,20,0.15)';c.lineWidth=2;c.stroke();
    }
    const pa=Math.atan2(pr.vy,pr.vx);
    const fakeBoid={vx:pr.vx,vy:pr.vy,hue:0,glideTimer:0};
    drawBird(pr.x,pr.y,pa,9,pr.wingPhase,fakeBoid,0);
  }

  // --- Wind indicator ---
  if(windOn){
    c.save();c.translate(W-50,60);c.rotate(windAngle);
    c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(-15,0);c.lineTo(15,0);c.moveTo(10,-4);c.lineTo(15,0);c.lineTo(10,4);c.stroke();
    c.restore();
    c.fillStyle='rgba(255,255,255,.18)';c.font='9px sans-serif';c.textAlign='center';c.fillText('WIND',W-50,80);
  }

  document.getElementById('count').textContent=boids.length+' seagulls';
}

// --- Loop with delta time ---
function loop(t){
  const dt=Math.min(t-lastTime,50);lastTime=t;
  update(dt);render(t);
  requestAnimationFrame(loop);
}
lastTime=performance.now();
requestAnimationFrame(loop);

// Auto-start audio on first user interaction
document.addEventListener('click',()=>startAudio(),{once:true});
document.addEventListener('touchstart',()=>startAudio(),{once:true});

// --- Settings panel ---
const gear=document.getElementById('gear');
const panel=document.getElementById('panel');
gear.addEventListener('click',()=>{
  panel.classList.toggle('open');
  gear.classList.toggle('open');
});

// --- Controls ---
function bind(sid,vid,fn){
  const sl=document.getElementById(sid),sv=document.getElementById(vid);
  sl.addEventListener('input',()=>{fn(+sl.value);sv.textContent=sl.value});
}
bind('sCoh','vCoh',v=>{cohesion=v/100});
bind('sAli','vAli',v=>{alignment=v/100});
bind('sSep','vSep',v=>{separation=v/100});
bind('sSpd','vSpd',v=>{maxSpeed=v/10});
bind('sTurn','vTurn',v=>{turnSpeed=v/50});
bind('sVis','vVis',v=>{vision=v});
bind('sNum','vNum',v=>{targetCount=v});
bind('sSize','vSize',v=>{birdSize=v;boids.forEach(b=>{b.size=v*(.85+Math.random()*.3)})});
bind('sTrail','vTrail',v=>{trailLen=v});
bind('sPred','vPred',v=>{predatorCount=v;syncPredators()});

document.getElementById('bWind').addEventListener('click',function(){windOn=!windOn;this.classList.toggle('on')});
document.getElementById('bFormation').addEventListener('click',function(){formationMode=!formationMode;this.classList.toggle('on');if(formationMode)vLeaderIdx=0});
document.getElementById('bObstacle').addEventListener('click',function(){obstaclesOn=!obstaclesOn;this.classList.toggle('on');if(obstaclesOn)initObstacles()});

const themeBtn=document.getElementById('bTheme');
themeBtn.addEventListener('click',function(){
  themeIdx=(themeIdx+1)%themes.length;
  theme=themes[themeIdx];
  this.textContent='Theme: '+theme.name;
  boids.forEach(b=>{b.hue=theme.hueBase+Math.random()*theme.hueRange});
});

document.getElementById('bMute').addEventListener('click',function(){
  startAudio();
  audioMuted=!audioMuted;
  this.textContent=audioMuted?'Sound: Off':'Sound: On';
  this.classList.toggle('on',!audioMuted);
  if(masterGain)masterGain.gain.setTargetAtTime(audioMuted?0:1,audioCtx.currentTime,.15);
});
