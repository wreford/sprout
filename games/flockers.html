<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Meet the Flockers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:rgba(10,10,18,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.06);display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;justify-content:center}
.sl{display:flex;align-items:center;gap:5px}
.sl label{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.06em;min-width:65px}
.sl input[type=range]{-webkit-appearance:none;width:80px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;outline:none}
.sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 6px rgba(255,255,255,.3)}
.sv{font-size:10px;color:rgba(255,255,255,.7);min-width:24px;font-weight:600}
.btn{font:600 10px ui-monospace;padding:5px 12px;border:1px solid rgba(255,255,255,.12);border-radius:5px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);cursor:pointer;transition:.15s}
.btn:hover{background:rgba(255,255,255,.12);color:#fff}
.btn.on{background:rgba(120,200,255,.15);border-color:rgba(120,200,255,.3);color:#78c8ff}
#title{position:fixed;top:0;left:0;right:0;z-index:10;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));display:flex;align-items:center;gap:12px;pointer-events:none}
#title h1{font-size:16px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.04em}
#title .sub{font-size:10px;color:rgba(255,255,255,.3)}
#title .count{margin-left:auto;font-size:11px;color:rgba(255,255,255,.4);font-weight:600}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="title">
  <h1>Meet the Flockers</h1>
  <span class="sub">boids flocking simulation</span>
  <span class="count" id="count">0 boids</span>
</div>
<div id="ui">
  <div class="sl"><label>Cohesion</label><input type="range" id="sCoh" min="0" max="100" value="50"><span class="sv" id="vCoh">50</span></div>
  <div class="sl"><label>Alignment</label><input type="range" id="sAli" min="0" max="100" value="65"><span class="sv" id="vAli">65</span></div>
  <div class="sl"><label>Separation</label><input type="range" id="sSep" min="0" max="100" value="70"><span class="sv" id="vSep">70</span></div>
  <div class="sl"><label>Speed</label><input type="range" id="sSpd" min="10" max="100" value="45"><span class="sv" id="vSpd">45</span></div>
  <div class="sl"><label>Vision</label><input type="range" id="sVis" min="20" max="200" value="80"><span class="sv" id="vVis">80</span></div>
  <div class="sl"><label>Flock Size</label><input type="range" id="sNum" min="20" max="800" value="200" step="10"><span class="sv" id="vNum">200</span></div>
  <button class="btn" id="bTrails">Trails</button>
  <button class="btn" id="bPred">Predator</button>
  <button class="btn" id="bWind">Wind</button>
  <button class="btn" id="bColor">Rainbow</button>
</div>
<script>
const cv=document.getElementById('cv'),c=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}
resize();addEventListener('resize',resize);

// Parameters
let cohesion=.5,alignment=.65,separation=.7,maxSpeed=4.5,vision=80,targetCount=200;
let trails=false,predatorOn=false,windOn=false,rainbow=false;

// Boids
let boids=[];
function createBoid(x,y){
  const angle=Math.random()*Math.PI*2;
  const hue=rainbow?Math.random()*360:200+Math.random()*40;
  return{x:x||Math.random()*W,y:y||Math.random()*H,vx:Math.cos(angle)*2,vy:Math.sin(angle)*2,hue:hue,trail:[]};
}
function initBoids(n){boids=[];for(let i=0;i<n;i++)boids.push(createBoid())}
initBoids(200);

// Predator
let pred={x:W/2,y:H/2,vx:1.5,vy:0.8,trail:[]};

// Wind
let windAngle=0,windStrength=0;

// Mouse attraction
let mouse={x:-1000,y:-1000,active:false};
cv.addEventListener('mousedown',e=>{mouse.active=true;mouse.x=e.clientX;mouse.y=e.clientY});
cv.addEventListener('mousemove',e=>{if(mouse.active){mouse.x=e.clientX;mouse.y=e.clientY}});
cv.addEventListener('mouseup',()=>{mouse.active=false;mouse.x=-1000;mouse.y=-1000});
cv.addEventListener('touchstart',e=>{e.preventDefault();mouse.active=true;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY},{passive:false});
cv.addEventListener('touchend',()=>{mouse.active=false;mouse.x=-1000;mouse.y=-1000});

// Spatial grid for performance
const GRID_SIZE=100;
let grid={};
function gridKey(x,y){return((x/GRID_SIZE)|0)+','+(((y/GRID_SIZE)|0))}
function buildGrid(){
  grid={};
  for(let i=0;i<boids.length;i++){
    const k=gridKey(boids[i].x,boids[i].y);
    if(!grid[k])grid[k]=[];
    grid[k].push(i);
  }
}
function getNeighbors(b){
  const results=[];
  const gx=(b.x/GRID_SIZE)|0,gy=(b.y/GRID_SIZE)|0;
  for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
    const bucket=grid[(gx+dx)+','+(gy+dy)];
    if(bucket)for(let i=0;i<bucket.length;i++)results.push(bucket[i]);
  }
  return results;
}

// Simulation
function update(){
  buildGrid();
  const coh=cohesion*.003,ali=alignment*.04,sep=separation*.08;
  const vis2=vision*vision;

  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    let cx=0,cy=0,ax=0,ay=0,sx=0,sy=0,count=0;
    const neighbors=getNeighbors(b);

    for(let j=0;j<neighbors.length;j++){
      const ni=neighbors[j];
      if(ni===i)continue;
      const o=boids[ni];
      const dx=o.x-b.x,dy=o.y-b.y;
      const d2=dx*dx+dy*dy;
      if(d2>vis2||d2<1)continue;
      const d=Math.sqrt(d2);
      // Cohesion — steer toward center of neighbors
      cx+=o.x;cy+=o.y;
      // Alignment — match velocity
      ax+=o.vx;ay+=o.vy;
      // Separation — avoid crowding
      sx-=dx/d;sy-=dy/d;
      count++;
    }

    if(count>0){
      // Cohesion
      cx=cx/count-b.x;cy=cy/count-b.y;
      b.vx+=cx*coh;b.vy+=cy*coh;
      // Alignment
      ax/=count;ay/=count;
      b.vx+=(ax-b.vx)*ali;b.vy+=(ay-b.vy)*ali;
      // Separation
      b.vx+=sx*sep;b.vy+=sy*sep;
    }

    // Mouse attraction
    if(mouse.active){
      const dx=mouse.x-b.x,dy=mouse.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<300){b.vx+=dx/d*.3;b.vy+=dy/d*.3;}
    }

    // Predator avoidance
    if(predatorOn){
      const dx=pred.x-b.x,dy=pred.y-b.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<150){
        b.vx-=dx/d*1.5;b.vy-=dy/d*1.5;
      }
    }

    // Wind
    if(windOn){
      b.vx+=Math.cos(windAngle)*windStrength*.02;
      b.vy+=Math.sin(windAngle)*windStrength*.02;
    }

    // Speed limit
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd>maxSpeed){b.vx=b.vx/spd*maxSpeed;b.vy=b.vy/spd*maxSpeed;}

    // Move
    b.x+=b.vx;b.y+=b.vy;

    // Wrap edges
    if(b.x<0)b.x+=W;if(b.x>W)b.x-=W;
    if(b.y<0)b.y+=H;if(b.y>H)b.y-=H;

    // Trail
    if(trails){
      b.trail.push({x:b.x,y:b.y});
      if(b.trail.length>20)b.trail.shift();
    }else if(b.trail.length){b.trail.length=0;}

    // Rainbow: slowly shift hue
    if(rainbow)b.hue=(b.hue+.3)%360;
  }

  // Predator movement — chase nearest boid
  if(predatorOn){
    let nearest=null,nd=Infinity;
    for(let i=0;i<boids.length;i++){
      const dx=boids[i].x-pred.x,dy=boids[i].y-pred.y;
      const d=dx*dx+dy*dy;
      if(d<nd){nd=d;nearest=boids[i];}
    }
    if(nearest){
      const dx=nearest.x-pred.x,dy=nearest.y-pred.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      pred.vx+=(dx/d)*.08;pred.vy+=(dy/d)*.08;
    }
    const ps=Math.sqrt(pred.vx*pred.vx+pred.vy*pred.vy);
    if(ps>maxSpeed*.8){pred.vx=pred.vx/ps*maxSpeed*.8;pred.vy=pred.vy/ps*maxSpeed*.8;}
    pred.x+=pred.vx;pred.y+=pred.vy;
    if(pred.x<0)pred.x+=W;if(pred.x>W)pred.x-=W;
    if(pred.y<0)pred.y+=H;if(pred.y>H)pred.y-=H;
    pred.trail.push({x:pred.x,y:pred.y});
    if(pred.trail.length>30)pred.trail.shift();
  }

  // Wind drift
  if(windOn){
    windAngle+=.003;
    windStrength=2+Math.sin(performance.now()*.001)*1.5;
  }

  // Adjust boid count
  while(boids.length<targetCount)boids.push(createBoid());
  while(boids.length>targetCount)boids.pop();
}

// Rendering
function render(){
  // Fade trail effect
  if(trails){
    c.fillStyle='rgba(10,10,18,.12)';
    c.fillRect(0,0,W,H);
  }else{
    c.fillStyle='#0a0a12';
    c.fillRect(0,0,W,H);
  }

  // Subtle background gradient
  if(!trails){
    const bg=c.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.6);
    bg.addColorStop(0,'rgba(20,22,40,.4)');
    bg.addColorStop(1,'rgba(10,10,18,0)');
    c.fillStyle=bg;
    c.fillRect(0,0,W,H);
  }

  // Draw boid trails
  if(trails){
    for(let i=0;i<boids.length;i++){
      const b=boids[i];
      if(b.trail.length<2)continue;
      c.beginPath();
      c.moveTo(b.trail[0].x,b.trail[0].y);
      for(let t=1;t<b.trail.length;t++){
        c.lineTo(b.trail[t].x,b.trail[t].y);
      }
      c.strokeStyle='hsla('+b.hue+',70%,65%,'+(0.15)+')';
      c.lineWidth=1;
      c.stroke();
    }
  }

  // Draw boids
  for(let i=0;i<boids.length;i++){
    const b=boids[i];
    const angle=Math.atan2(b.vy,b.vx);
    const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    const size=3+spd*.4;

    c.save();
    c.translate(b.x,b.y);
    c.rotate(angle);

    // Glow
    c.shadowColor='hsla('+b.hue+',80%,60%,.6)';
    c.shadowBlur=8;

    // Body — elegant bird/arrow shape
    c.beginPath();
    c.moveTo(size*1.8,0);
    c.lineTo(-size*.8,-size*.7);
    c.quadraticCurveTo(-size*.2,0,-size*.8,size*.7);
    c.closePath();

    const sat=rainbow?'80%':'60%';
    const light=rainbow?'65%':'55%';
    c.fillStyle='hsla('+b.hue+','+sat+','+light+',0.85)';
    c.fill();

    // Wing highlight
    c.beginPath();
    c.moveTo(size*.6,0);
    c.lineTo(-size*.3,-size*.4);
    c.lineTo(-size*.1,0);
    c.closePath();
    c.fillStyle='hsla('+b.hue+',90%,80%,0.3)';
    c.fill();

    c.shadowBlur=0;
    c.restore();
  }

  // Draw predator
  if(predatorOn){
    // Predator trail
    if(pred.trail.length>1){
      c.beginPath();
      c.moveTo(pred.trail[0].x,pred.trail[0].y);
      for(let t=1;t<pred.trail.length;t++)c.lineTo(pred.trail[t].x,pred.trail[t].y);
      c.strokeStyle='rgba(255,60,60,.2)';c.lineWidth=2;c.stroke();
    }
    const pa=Math.atan2(pred.vy,pred.vx);
    c.save();
    c.translate(pred.x,pred.y);
    c.rotate(pa);
    c.shadowColor='rgba(255,40,40,.8)';c.shadowBlur=16;
    c.beginPath();
    c.moveTo(14,0);
    c.lineTo(-8,-7);
    c.lineTo(-4,0);
    c.lineTo(-8,7);
    c.closePath();
    c.fillStyle='rgba(255,50,50,.9)';
    c.fill();
    // Eye
    c.beginPath();c.arc(4,0,1.5,0,Math.PI*2);c.fillStyle='#fff';c.fill();
    c.shadowBlur=0;
    c.restore();
  }

  // Wind indicator
  if(windOn){
    c.save();
    c.translate(W-50,60);
    c.rotate(windAngle);
    c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=1.5;
    c.beginPath();c.moveTo(-15,0);c.lineTo(15,0);c.moveTo(10,-4);c.lineTo(15,0);c.lineTo(10,4);
    c.stroke();
    c.restore();
    c.fillStyle='rgba(255,255,255,.15)';c.font='9px monospace';c.textAlign='center';
    c.fillText('WIND',W-50,80);
  }

  // Count
  document.getElementById('count').textContent=boids.length+' boids';
}

// Loop
function loop(){update();render();requestAnimationFrame(loop)}
requestAnimationFrame(loop);

// Controls
function bind(sliderId,valId,fn){
  const sl=document.getElementById(sliderId),sv=document.getElementById(valId);
  sl.addEventListener('input',()=>{fn(+sl.value);sv.textContent=sl.value});
}
bind('sCoh','vCoh',v=>{cohesion=v/100});
bind('sAli','vAli',v=>{alignment=v/100});
bind('sSep','vSep',v=>{separation=v/100});
bind('sSpd','vSpd',v=>{maxSpeed=v/10});
bind('sVis','vVis',v=>{vision=v});
bind('sNum','vNum',v=>{targetCount=v});

document.getElementById('bTrails').addEventListener('click',function(){trails=!trails;this.classList.toggle('on')});
document.getElementById('bPred').addEventListener('click',function(){predatorOn=!predatorOn;this.classList.toggle('on');if(predatorOn){pred.x=W/2;pred.y=H/2;pred.trail.length=0}});
document.getElementById('bWind').addEventListener('click',function(){windOn=!windOn;this.classList.toggle('on')});
document.getElementById('bColor').addEventListener('click',function(){
  rainbow=!rainbow;this.classList.toggle('on');
  if(rainbow)boids.forEach(b=>{b.hue=Math.random()*360});
  else boids.forEach(b=>{b.hue=200+Math.random()*40});
});
</script>
</body>
</html>
