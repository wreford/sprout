<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Bruno Clicker 🎤</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;
  --dim:#6e6e73;--gold:#f7c948;--purple:#a78bfa;
  --green:#4ade80;--goldglow:rgba(247,201,72,0.4)
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 30% 25%,rgba(247,201,72,0.06) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 70%,rgba(167,139,250,0.05) 0%,transparent 50%);
  animation:bgShift 20s ease-in-out infinite alternate;
}
@keyframes bgShift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(10deg)}}

.page{width:100%;max-width:480px;margin:0 auto;padding:0 16px 40px;position:relative;z-index:1}

.home-link{display:inline-block;padding:10px 0;font-size:0.8rem;color:var(--dim);text-decoration:none;font-family:ui-monospace,monospace;transition:color 0.2s}
.home-link:hover{color:var(--gold)}

.top{text-align:center;padding:8px 0 0}
.title{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:0.7rem;color:var(--dim);margin-top:2px;letter-spacing:0.1em;text-transform:uppercase}

.score{font-size:clamp(2rem,8vw,3.2rem);font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--goldglow);margin:10px 0 2px;font-family:ui-monospace,"Cascadia Mono",monospace;transition:transform 0.15s}
.score.bump{animation:bump 0.15s ease}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.stats{font-size:0.8rem;color:var(--dim);margin-bottom:2px}
.stats span{color:var(--purple)}
.high-score{font-size:0.65rem;color:var(--dim)}

.mic-area{display:flex;flex-direction:column;align-items:center;padding:18px 0;position:relative}
.mic{font-size:96px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;display:block;filter:drop-shadow(0 0 25px var(--goldglow));transition:transform 0.1s}
.mic:active{transform:scale(0.88)}

.lyric{font-size:0.8rem;color:var(--gold);font-style:italic;text-align:center;margin-top:10px;min-height:22px;opacity:0;transition:opacity 0.25s}
.lyric.show{opacity:1}

/* Floating text */
.floater{position:absolute;pointer-events:none;font-weight:900;font-size:1.1rem;color:var(--gold);animation:floatUp 0.8s ease forwards;z-index:10}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* Prestige bar */
.prestige-bar{margin-top:10px;display:none}
.prestige-bar.show{display:block}
.bar-label{font-size:0.65rem;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:3px}
.bar-track{width:100%;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--purple));transition:width 0.3s}
.prestige-btn{display:none;width:100%;margin-top:8px;padding:10px;border:2px solid var(--gold);border-radius:10px;background:rgba(247,201,72,0.1);color:var(--gold);font-weight:800;font-size:0.85rem;cursor:pointer;text-transform:uppercase;letter-spacing:0.1em;transition:all 0.2s}
.prestige-btn.show{display:block}
.prestige-btn:hover{background:rgba(247,201,72,0.2);transform:translateY(-1px)}

/* Section header */
.section-header{font-size:0.7rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin:20px 0 8px;padding:8px 0;border-top:1px solid var(--border);text-align:center}

/* Upgrade cards */
.upgrade{width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.15s;text-align:left}
.upgrade:hover:not(.locked):not(.maxed){border-color:var(--gold);transform:translateX(2px)}
.upgrade.affordable{border-color:var(--green)}
.upgrade.locked{opacity:0.35;cursor:not-allowed}
.upgrade.maxed{opacity:0.5;border-color:var(--gold);cursor:default}
.u-icon{font-size:1.4rem;flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-name{font-size:0.82rem;font-weight:700}
.u-desc{font-size:0.62rem;color:var(--dim);margin-top:1px}
.u-cost{font-size:0.7rem;font-weight:700;color:var(--green);margin-top:2px}
.u-count{font-size:0.85rem;font-weight:800;color:var(--gold);flex-shrink:0;min-width:22px;text-align:right}

@media(max-width:400px){
  .mic{font-size:72px}
  .score{font-size:2rem}
}
</style>
</head>
<body>
<div class="page">
  <a href="../index.html" class="home-link">← home</a>
  <div class="top">
    <div class="title">Bruno Clicker</div>
    <div class="subtitle">Funk Point Factory</div>
  </div>

  <div class="score" id="score">0</div>
  <div class="stats"><span id="fps">0</span> funk/sec · <span id="cpc">1</span>/click</div>
  <div class="high-score">High: <span id="hi">0</span> · Platinums: <span id="platinums">0</span></div>

  <div class="mic-area" id="micArea">
    <div class="mic" id="mic">🎤</div>
    <div class="lyric" id="lyric"></div>
  </div>

  <div class="prestige-bar" id="prestigeBar">
    <div class="bar-label"><span>GO PLATINUM</span><span id="pPct">0%</span></div>
    <div class="bar-track"><div class="bar-fill" id="pFill" style="width:0%"></div></div>
  </div>
  <button class="prestige-btn" id="prestigeBtn" onclick="prestige()">🏆 GO PLATINUM — Permanent 2× Multiplier</button>

  <div class="section-header">Upgrades</div>
  <div id="upgrades"></div>
</div>

<script>
const LYRICS=[
  "Don't believe me just watch!","Uptown funk you up!","Today I don't feel like doing anything",
  "I'm too hot! Hot damn!","Cause you're amazing, just the way you are","I'd catch a grenade for ya",
  "Girl you're amazing","Treasure, that is what you are","When I see your face, there's not a thing I would change",
  "Just the way you are","I think I wanna marry you","Put your pinky rings up to the moon",
  "It's a beautiful night, we're looking for something dumb to do","I got you moonshine, got you feeling so right",
  "Versace on the floor","Smoother than a fresh jar of Skippy","24 karat magic in the air",
  "Calling all my lovelies","That's what I like!","Locked out of heaven"
];

const UPGRADES=[
  {id:"vocalist",name:"Backing Vocalist",icon:"🎙️",desc:"+1 per click",baseCost:50,max:-1,type:"click"},
  {id:"drum",name:"Drum Machine",icon:"🥁",desc:"+1 funk/sec",baseCost:200,max:-1,type:"auto"},
  {id:"chain",name:"Gold Chain",icon:"⛓️",desc:"2× click multiplier",baseCost:1000,max:1,type:"clickMult"},
  {id:"silk",name:"Silk Sonic Mode",icon:"🎷",desc:"+10 funk/sec",baseCost:5000,max:1,type:"autoFlat"},
  {id:"magic",name:"24K Magic",icon:"✨",desc:"10× everything",baseCost:25000,max:1,type:"globalMult"}
];

const PRESTIGE_GOAL=100000;

// State
let S={
  points:0, totalEarned:0, highScore:0, platinums:0,
  owned:{vocalist:0,drum:0,chain:0,silk:0,magic:0}
};

// Audio
const actx=new (window.AudioContext||window.webkitAudioContext)();
function playClick(){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type="triangle";o.frequency.setValueAtTime(800,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200,actx.currentTime+0.05);
  g.gain.setValueAtTime(0.02,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.1);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.1);
}
function playBuy(){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type="sine";o.frequency.setValueAtTime(1200,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(2400,actx.currentTime+0.08);
  g.gain.setValueAtTime(0.02,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+0.15);
}
function playPrestige(){
  [0,0.1,0.2].forEach((d,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type="sine";o.frequency.setValueAtTime([523,659,784][i],actx.currentTime+d);
    g.gain.setValueAtTime(0.02,actx.currentTime+d);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d+0.3);
    o.connect(g);g.connect(actx.destination);o.start(actx.currentTime+d);o.stop(actx.currentTime+d+0.3);
  });
}

// Computed values
function clickPower(){
  let base=1+S.owned.vocalist;
  let mult=1;
  if(S.owned.chain)mult*=2;
  if(S.owned.magic)mult*=10;
  mult*=Math.pow(2,S.platinums);
  return Math.floor(base*mult);
}
function funkPerSec(){
  let base=S.owned.drum;
  if(S.owned.silk)base+=10;
  let mult=1;
  if(S.owned.magic)mult*=10;
  mult*=Math.pow(2,S.platinums);
  return Math.floor(base*mult);
}
function upgradeCost(u){
  const def=UPGRADES.find(x=>x.id===u);
  if(def.max===-1)return Math.floor(def.baseCost*Math.pow(1.15,S.owned[u]));
  return def.baseCost;
}

// DOM refs
const $score=document.getElementById("score");
const $fps=document.getElementById("fps");
const $cpc=document.getElementById("cpc");
const $hi=document.getElementById("hi");
const $platinums=document.getElementById("platinums");
const $lyric=document.getElementById("lyric");
const $mic=document.getElementById("mic");
const $micArea=document.getElementById("micArea");
const $upgrades=document.getElementById("upgrades");
const $prestigeBar=document.getElementById("prestigeBar");
const $pFill=document.getElementById("pFill");
const $pPct=document.getElementById("pPct");
const $prestigeBtn=document.getElementById("prestigeBtn");

// Render upgrades
function renderUpgrades(){
  $upgrades.innerHTML="";
  UPGRADES.forEach(u=>{
    const cost=upgradeCost(u.id);
    const owned=S.owned[u.id];
    const maxed=u.max!==-1&&owned>=u.max;
    const affordable=S.points>=cost&&!maxed;
    const div=document.createElement("div");
    div.className="upgrade"+(maxed?" maxed":(affordable?" affordable":""))+((!affordable&&!maxed)?" locked":"");
    div.innerHTML=`<div class="u-icon">${u.icon}</div><div class="u-info"><div class="u-name">${u.name}</div><div class="u-desc">${u.desc}</div><div class="u-cost">${maxed?"OWNED":fmt(cost)+" FP"}</div></div><div class="u-count">${u.max===-1?owned:(maxed?"✓":"")}</div>`;
    if(!maxed)div.onclick=()=>buyUpgrade(u.id);
    $upgrades.appendChild(div);
  });
}

function buyUpgrade(id){
  const cost=upgradeCost(id);
  const def=UPGRADES.find(x=>x.id===id);
  const maxed=def.max!==-1&&S.owned[id]>=def.max;
  if(S.points<cost||maxed)return;
  S.points-=cost;
  S.owned[id]++;
  playBuy();
  updateUI();
  save();
}

// Click
let lyricTimeout;
$mic.addEventListener("click",e=>{
  if(actx.state==="suspended")actx.resume();
  const pw=clickPower();
  S.points+=pw;
  S.totalEarned+=pw;
  if(S.points>S.highScore)S.highScore=S.points;
  playClick();

  // Bump anim
  $score.classList.remove("bump");
  void $score.offsetWidth;
  $score.classList.add("bump");

  // Floater
  const f=document.createElement("div");
  f.className="floater";
  f.textContent="+"+fmt(pw);
  const rect=$micArea.getBoundingClientRect();
  f.style.left=(Math.random()*60+20)+"%";
  f.style.top="30%";
  $micArea.appendChild(f);
  setTimeout(()=>f.remove(),800);

  // Lyric
  if(Math.random()<0.3){
    $lyric.textContent='"'+LYRICS[Math.floor(Math.random()*LYRICS.length)]+'"';
    $lyric.classList.add("show");
    clearTimeout(lyricTimeout);
    lyricTimeout=setTimeout(()=>$lyric.classList.remove("show"),2000);
  }

  updateUI();
  save();
});

// Prestige
function prestige(){
  if(S.totalEarned<PRESTIGE_GOAL)return;
  playPrestige();
  S.platinums++;
  S.points=0;
  S.totalEarned=0;
  S.owned={vocalist:0,drum:0,chain:0,silk:0,magic:0};
  updateUI();
  save();
}

// Format number
function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(1)+"T";
  if(n>=1e9)return(n/1e9).toFixed(1)+"B";
  if(n>=1e6)return(n/1e6).toFixed(1)+"M";
  if(n>=1e3)return(n/1e3).toFixed(1)+"K";
  return Math.floor(n).toLocaleString();
}

// Update UI
function updateUI(){
  $score.textContent=fmt(S.points);
  $fps.textContent=fmt(funkPerSec());
  $cpc.textContent=fmt(clickPower());
  $hi.textContent=fmt(S.highScore);
  $platinums.textContent=S.platinums;
  renderUpgrades();

  // Prestige bar
  const pct=Math.min(S.totalEarned/PRESTIGE_GOAL,1);
  if(S.totalEarned>PRESTIGE_GOAL*0.1){
    $prestigeBar.classList.add("show");
    $pFill.style.width=(pct*100)+"%";
    $pPct.textContent=Math.floor(pct*100)+"%";
  }
  $prestigeBtn.classList.toggle("show",pct>=1);
}

// Auto production tick
setInterval(()=>{
  const fps=funkPerSec();
  if(fps>0){
    S.points+=fps;
    S.totalEarned+=fps;
    if(S.points>S.highScore)S.highScore=S.points;
    updateUI();
    save();
  }
},1000);

// Save/Load with Infinity handling
function toSafe(v){return v===Infinity?-1:v;}
function fromSafe(v){return v===-1?Infinity:v;}

function save(){
  const d={
    points:toSafe(S.points),totalEarned:toSafe(S.totalEarned),
    highScore:toSafe(S.highScore),platinums:S.platinums,
    owned:S.owned
  };
  try{localStorage.setItem("brunoclicker",JSON.stringify(d));}catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem("brunoclicker");
    if(!raw)return;
    const d=JSON.parse(raw);
    S.points=fromSafe(d.points??0);
    S.totalEarned=fromSafe(d.totalEarned??0);
    S.highScore=fromSafe(d.highScore??0);
    S.platinums=d.platinums??0;
    if(d.owned){
      for(const k in S.owned){
        S.owned[k]=d.owned[k]??0;
      }
    }
  }catch(e){}
}

// Init
load();
updateUI();
</script>
</body>
</html>
