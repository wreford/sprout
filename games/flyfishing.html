<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Fly Fishing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1a2a3a;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none;font-family:'Georgia','Times New Roman',serif}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
#hud{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
#hud .left,#hud .right{display:flex;flex-direction:column;gap:4px}
#hud .stat{font-size:11px;color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,0.6);letter-spacing:0.5px}
#hud .stat b{color:#f0d070}
#flyBox{position:absolute;bottom:60px;left:0;right:0;display:none;flex-direction:column;align-items:center;pointer-events:auto;z-index:30}
#flyBox .flyTitle{font-size:13px;color:#f0d070;text-shadow:0 1px 4px rgba(0,0,0,0.7);margin-bottom:6px;letter-spacing:1px}
#flyBox .hatchInfo{font-size:10px;color:rgba(255,255,255,0.7);margin-bottom:10px;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
#flyBox .flyGrid{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:340px;padding:0 12px}
.flyCard{background:rgba(20,30,20,0.88);border:1px solid rgba(120,160,100,0.4);border-radius:10px;padding:8px 10px;text-align:center;cursor:pointer;min-width:72px;transition:all .2s;backdrop-filter:blur(4px)}
.flyCard:active{transform:scale(0.95)}
.flyCard.selected{border-color:#f0d070;box-shadow:0 0 10px rgba(240,208,112,0.3)}
.flyCard .fname{font-size:9px;color:#e0e8d0;margin-bottom:2px}
.flyCard .ftype{font-size:7px;color:rgba(180,200,160,0.7);text-transform:uppercase;letter-spacing:1px}
.flyCard.locked{opacity:0.35;pointer-events:none}
#instructions{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.6);text-shadow:0 1px 3px rgba(0,0,0,0.5);pointer-events:none;transition:opacity 0.3s}
#castPower{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:10px;height:120px;background:rgba(0,0,0,0.3);border-radius:5px;display:none;overflow:hidden;border:1px solid rgba(255,255,255,0.2)}
#castPowerFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#4a9e5a,#f0d070,#d04838);border-radius:4px;transition:height 0.05s}
#tensionBar{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:10px;height:120px;background:rgba(0,0,0,0.3);border-radius:5px;display:none;overflow:hidden;border:1px solid rgba(255,255,255,0.2)}
#tensionFill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#4a9e5a,#f0d070,#d04838);border-radius:4px}
#tensionLabel{position:absolute;left:6px;top:50%;transform:translateY(-50%) rotate(-90deg);font-size:8px;color:rgba(255,255,255,0.5);display:none;letter-spacing:1px;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,20,15,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;z-index:50;backdrop-filter:blur(6px)}
#overlay .panel{max-width:320px;width:90%;text-align:center;padding:24px;background:rgba(20,35,25,0.9);border:1px solid rgba(120,160,100,0.3);border-radius:16px}
#overlay h2{font-size:18px;color:#f0d070;margin-bottom:8px;letter-spacing:2px}
#overlay .sub{font-size:11px;color:rgba(200,220,180,0.7);margin-bottom:16px;line-height:1.6}
#overlay .detail{font-size:10px;color:rgba(180,200,160,0.6);margin:4px 0}
#overlay .btn{display:inline-block;margin:6px;padding:10px 24px;font-size:12px;font-family:inherit;background:rgba(42,100,50,0.6);color:#e0e8d0;border:1px solid rgba(120,160,100,0.4);border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:1px}
#overlay .btn:active{background:rgba(42,100,50,0.9);transform:scale(0.97)}
#overlay .btn.gold{background:rgba(180,140,40,0.5);border-color:rgba(240,208,112,0.5)}
#menuOverlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,20,15,0.94);display:none;flex-direction:column;pointer-events:auto;z-index:40;overflow-y:auto;backdrop-filter:blur(6px)}
#menuOverlay .menuHeader{padding:20px 16px 12px;text-align:center;border-bottom:1px solid rgba(120,160,100,0.2)}
#menuOverlay h2{font-size:16px;color:#f0d070;letter-spacing:2px}
#menuOverlay .menuBody{padding:12px 16px;flex:1;overflow-y:auto}
#menuOverlay .section{margin-bottom:16px}
#menuOverlay .sTitle{font-size:10px;color:rgba(240,208,112,0.7);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;padding-left:4px}
.menuItem{background:rgba(20,35,25,0.7);border:1px solid rgba(120,160,100,0.25);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.menuItem:active{background:rgba(42,100,50,0.3);transform:scale(0.98)}
.menuItem.locked{opacity:0.35;pointer-events:none}
.menuItem .mIcon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.menuItem .mInfo{flex:1}
.menuItem .mInfo h3{font-size:11px;color:#e0e8d0;margin-bottom:2px}
.menuItem .mInfo p{font-size:9px;color:rgba(180,200,160,0.6)}
.menuItem .mRight{font-size:9px;color:#f0d070;text-align:right}
.closeMenu{display:block;margin:16px auto;padding:10px 32px;font-size:12px;font-family:inherit;background:rgba(160,60,40,0.5);color:#e0e8d0;border:1px solid rgba(200,80,60,0.4);border-radius:8px;cursor:pointer;pointer-events:auto}
.closeMenu:active{background:rgba(160,60,40,0.8)}
.fishEntry{display:flex;align-items:center;gap:8px;background:rgba(20,35,25,0.7);border:1px solid rgba(120,160,100,0.25);border-radius:10px;padding:8px 10px;margin-bottom:5px}
.fishEntry.uncaught{opacity:0.3}
.fishEntry .fDot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.fishEntry .fInfo{flex:1}
.fishEntry .fInfo h4{font-size:10px;color:#e0e8d0;margin-bottom:1px}
.fishEntry .fInfo p{font-size:8px;color:rgba(180,200,160,0.6)}
.fishEntry .fBest{font-size:9px;color:#f0d070;text-align:right}
#btns{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:10px;pointer-events:auto;z-index:20}
#btns button{padding:8px 16px;font-size:10px;font-family:inherit;background:rgba(20,35,25,0.8);color:#c0d0b0;border:1px solid rgba(120,160,100,0.3);border-radius:8px;cursor:pointer;backdrop-filter:blur(4px);letter-spacing:0.5px}
#btns button:active{background:rgba(42,100,50,0.5)}
#msgBox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:rgba(255,255,255,0.9);text-shadow:0 2px 8px rgba(0,0,0,0.6);text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s;line-height:1.6;max-width:280px}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="left">
      <div class="stat" id="riverName"></div>
      <div class="stat" id="condStat"></div>
    </div>
    <div class="right">
      <div class="stat">Caught: <b id="caughtCount">0</b></div>
      <div class="stat" id="flyStat"></div>
    </div>
  </div>
  <div id="castPower"><div id="castPowerFill"></div></div>
  <div id="tensionBar"><div id="tensionFill"></div></div>
  <div id="tensionLabel">TENSION</div>
  <div id="instructions">Hold and drag back to cast</div>
  <div id="flyBox">
    <div class="flyTitle">Select a Fly</div>
    <div class="hatchInfo" id="hatchInfo"></div>
    <div class="flyGrid" id="flyGrid"></div>
  </div>
  <div id="btns">
    <button onclick="openFlyBox()">Flies</button>
    <button onclick="openMenu('rivers')">Rivers</button>
    <button onclick="openMenu('log')">Fish Log</button>
    <button onclick="openMenu('gear')">Gear</button>
  </div>
  <div id="msgBox"></div>
  <div id="overlay"></div>
  <div id="menuOverlay"></div>
</div>
</div>

<script>
// ===== CONSTANTS & DATA =====
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,dpr=1;
const SAVE_KEY='flyfishing_save_v1';

// Audio context
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='sine',vol=0.08){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function playNoise(dur,vol=0.03){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const s=audioCtx.createBufferSource(),g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  s.buffer=buf;f.type='lowpass';f.frequency.value=800;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  s.connect(f);f.connect(g);g.connect(audioCtx.destination);
  s.start();
}
function playSwoosh(){playNoise(0.3,0.06);playTone(200,0.15,'triangle',0.03)}
function playSplash(){playNoise(0.15,0.08);playTone(600,0.08,'sine',0.02)}
function playPlop(){playTone(300,0.2,'sine',0.06);playTone(150,0.3,'sine',0.03)}
function playReelDrag(){playTone(800+Math.random()*400,0.1,'sawtooth',0.02)}
function playBird(){const f=1200+Math.random()*800;playTone(f,0.08,'sine',0.02);setTimeout(()=>playTone(f*1.2,0.06,'sine',0.015),100)}
function playHookSet(){playTone(500,0.1,'square',0.04);playTone(700,0.08,'square',0.03)}
function playSuccess(){playTone(523,0.15,'sine',0.06);setTimeout(()=>playTone(659,0.15,'sine',0.06),150);setTimeout(()=>playTone(784,0.2,'sine',0.06),300)}
function playSnap(){playNoise(0.08,0.12);playTone(100,0.2,'sawtooth',0.05)}

// Rivers
const RIVERS=[
  {id:'meadow',name:'Meadow Creek',desc:'A gentle mountain stream',difficulty:1,unlock:0,bg:{skyTop:'#6b93d6',skyBot:'#d4a574',mtns:'#5a7a6a',water:'#4a8090',bank:'#5a7040'}},
  {id:'canyon',name:'Canyon Run',desc:'Fast water through a gorge',difficulty:2,unlock:8,bg:{skyTop:'#4a6a9a',skyBot:'#c08050',mtns:'#4a5a50',water:'#3a6878',bank:'#6a6040'}},
  {id:'glacier',name:'Glacier Fork',desc:'Crystal clear, ice-cold water',difficulty:3,unlock:20,bg:{skyTop:'#3a5a8a',skyBot:'#9ab0c0',mtns:'#7090a0',water:'#5098a8',bank:'#607060'}}
];

// Fish species
const FISH=[
  {id:'brook',name:'Brook Trout',rarity:'common',minW:0.3,maxW:2.5,fight:0.3,color:'#4a8a60',spots:'#d04838',rivers:['meadow','canyon','glacier']},
  {id:'rainbow',name:'Rainbow Trout',rarity:'common',minW:0.5,maxW:5,fight:0.5,color:'#708aa0',spots:'#d06080',rivers:['meadow','canyon','glacier']},
  {id:'brown',name:'Brown Trout',rarity:'uncommon',minW:1,maxW:8,fight:0.6,color:'#a08840',spots:'#804020',rivers:['meadow','canyon'],wary:true},
  {id:'steelhead',name:'Steelhead',rarity:'rare',minW:3,maxW:15,fight:0.85,color:'#7090a8',spots:'#c05070',rivers:['canyon','glacier']},
  {id:'salmon',name:'Atlantic Salmon',rarity:'legendary',minW:5,maxW:25,fight:1.0,color:'#808880',spots:'#606060',rivers:['glacier']}
];

// Flies
const FLIES=[
  {id:'adams',name:'Adams',type:'dry',match:'mayfly',unlocked:true},
  {id:'elkhair',name:'Elk Hair Caddis',type:'dry',match:'caddis',unlocked:true},
  {id:'royalwulff',name:'Royal Wulff',type:'dry',match:'any',unlock:5},
  {id:'pheasanttail',name:'Pheasant Tail',type:'nymph',match:'mayfly',unlocked:true},
  {id:'haresear',name:'Hare\'s Ear',type:'nymph',match:'caddis',unlock:3},
  {id:'prince',name:'Prince Nymph',type:'nymph',match:'stonefly',unlock:10},
  {id:'woolly',name:'Woolly Bugger',type:'streamer',match:'any',unlocked:true},
  {id:'muddler',name:'Muddler Minnow',type:'streamer',match:'any',unlock:15}
];

// Hatches
const HATCHES=['mayfly','caddis','stonefly'];

// Rod upgrades
const RODS=[
  {id:'basic',name:'Starter Rod',acc:1.0,strength:1.0,cost:0,desc:'A reliable beginner rod'},
  {id:'medium',name:'Mid-Flex Rod',acc:0.85,strength:1.2,cost:8,desc:'Better accuracy, stronger tippet'},
  {id:'precision',name:'Precision Rod',acc:0.7,strength:1.0,cost:18,desc:'Pinpoint accuracy for wary fish'},
  {id:'power',name:'Power Rod',acc:0.9,strength:1.6,cost:25,desc:'For big fish, strong tippet'},
  {id:'master',name:'Master Rod',acc:0.7,strength:1.5,cost:40,desc:'The finest rod money can buy'}
];

// ===== GAME STATE =====
let state={
  river:0,
  fly:'adams',
  rod:'basic',
  totalCaught:0,
  fishLog:{},
  unlockedFlies:['adams','elkhair','pheasanttail','woolly'],
  unlockedRods:['basic'],
  unlockedRivers:[0],
  materials:0
};

// Runtime
let phase='idle'; // idle, casting, line_out, drifting, strike_window, fighting, landing, menu
let castStartX=0,castStartY=0,castPower=0,castStartTime=0;
let isDragging=false;
let linePoints=[];
let flyX=0,flyY=0,flyVx=0,flyVy=0,flyLanded=false;
let rodTipX=0,rodTipY=0;
let rodAngle=0,rodTargetAngle=0;
let driftTime=0;
let currentHatch='mayfly';
let waterZones=[];
let fishShadows=[];
let currentFish=null;
let tension=0,fishEnergy=1,fishDir=0,fishDirTimer=0;
let hookSet=false;
let strikeTimer=0;
let msgTimer=0;
let time=0;
let particles=[];
let insects=[];
let birdTimer=0;
let currentFlow=0.3;
let rocks=[];
let trees=[];
let clouds=[];
let waterLineY=0;
let bankY=0;
let surfaceWaves=[];

// ===== SAVE/LOAD =====
function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state))}catch(e){}}
function loadGame(){
  try{
    const s=localStorage.getItem(SAVE_KEY);
    if(s){const d=JSON.parse(s);Object.assign(state,d)}
  }catch(e){}
}

// ===== RESIZE =====
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
  waterLineY=H*0.52;
  bankY=H*0.85;
  generateScene();
}

// ===== SCENE GENERATION =====
function generateScene(){
  const rv=RIVERS[state.river];
  rocks=[];trees=[];clouds=[];waterZones=[];fishShadows=[];insects=[];surfaceWaves=[];

  // Clouds
  for(let i=0;i<5;i++){
    clouds.push({x:Math.random()*W,y:30+Math.random()*waterLineY*0.3,w:40+Math.random()*80,h:15+Math.random()*20,speed:0.1+Math.random()*0.2});
  }

  // Trees on banks
  for(let i=0;i<8;i++){
    const side=i<4?'back':'front';
    trees.push({
      x:Math.random()*W,
      y:side==='back'?waterLineY-10-Math.random()*20:bankY+Math.random()*15,
      h:40+Math.random()*50,
      w:20+Math.random()*20,
      side,
      sway:Math.random()*Math.PI*2,
      green:'#'+(['3a6030','4a7040','2a5020','3a5530','4a6838'])[Math.floor(Math.random()*5)]
    });
  }

  // Underwater rocks
  for(let i=0;i<12;i++){
    rocks.push({
      x:Math.random()*W,
      y:waterLineY+20+Math.random()*(bankY-waterLineY-40),
      r:5+Math.random()*15,
      color:`rgba(${80+Math.random()*40},${70+Math.random()*30},${60+Math.random()*20},0.5)`
    });
  }

  // Water zones
  const zoneW=W/3;
  const zoneTypes=['riffle','run','pool'];
  for(let i=0;i<3;i++){
    waterZones.push({
      x:i*zoneW,w:zoneW,
      type:zoneTypes[i],
      depth:zoneTypes[i]==='pool'?1.0:zoneTypes[i]==='run'?0.6:0.3,
      current:zoneTypes[i]==='riffle'?1.5:zoneTypes[i]==='run'?1.0:0.4
    });
  }
  // Add eddy behind biggest rock
  const bigRock=rocks.reduce((a,b)=>b.r>a.r?b:a,rocks[0]);
  if(bigRock){
    waterZones.push({x:bigRock.x+bigRock.r,w:30,type:'eddy',depth:0.5,current:-0.2,rock:bigRock});
  }

  // Fish shadows
  spawnFishShadows();

  // Insects
  for(let i=0;i<6;i++){
    insects.push({x:Math.random()*W,y:waterLineY-5-Math.random()*30,vy:-0.3-Math.random()*0.5,vx:Math.random()*0.5-0.25,life:Math.random()*200,size:1.5+Math.random()*1.5,wingPhase:Math.random()*Math.PI*2});
  }

  // Surface waves
  for(let i=0;i<20;i++){
    surfaceWaves.push({x:Math.random()*W,speed:0.3+Math.random()*0.5,amp:1+Math.random()*2,phase:Math.random()*Math.PI*2});
  }

  // Randomize hatch
  currentHatch=HATCHES[Math.floor(Math.random()*HATCHES.length)];
  updateHUD();
}

function spawnFishShadows(){
  fishShadows=[];
  const rv=RIVERS[state.river];
  const possible=FISH.filter(f=>f.rivers.includes(rv.id));
  const count=4+Math.floor(Math.random()*4);
  for(let i=0;i<count;i++){
    const sp=weightedFishPick(possible);
    const zone=waterZones[Math.floor(Math.random()*Math.min(3,waterZones.length))];
    fishShadows.push({
      x:zone.x+Math.random()*zone.w,
      y:waterLineY+25+Math.random()*(bankY-waterLineY-60),
      species:sp,
      vx:(0.2+Math.random()*0.3)*(Math.random()<0.5?1:-1),
      baseY:0,
      wanderPhase:Math.random()*Math.PI*2,
      interested:false,
      rising:false,
      caught:false,
      size:0.6+Math.random()*0.4
    });
    fishShadows[fishShadows.length-1].baseY=fishShadows[fishShadows.length-1].y;
  }
}

function weightedFishPick(list){
  const weights={common:10,uncommon:4,rare:1.5,legendary:0.5};
  let total=list.reduce((s,f)=>s+weights[f.rarity],0);
  let r=Math.random()*total;
  for(const f of list){
    r-=weights[f.rarity];
    if(r<=0)return f;
  }
  return list[0];
}

// ===== HUD =====
function updateHUD(){
  const rv=RIVERS[state.river];
  const fl=FLIES.find(f=>f.id===state.fly);
  document.getElementById('riverName').innerHTML=rv.name;
  document.getElementById('condStat').innerHTML='Hatch: <b>'+currentHatch+'</b>';
  document.getElementById('caughtCount').textContent=state.totalCaught;
  document.getElementById('flyStat').innerHTML='Fly: <b>'+(fl?fl.name:'')+'</b>';
}

// ===== DRAWING =====
function draw(){
  const rv=RIVERS[state.river].bg;
  X.clearRect(0,0,W,H);

  // Sky gradient
  const skyGrad=X.createLinearGradient(0,0,0,waterLineY);
  skyGrad.addColorStop(0,rv.skyTop);
  skyGrad.addColorStop(1,rv.skyBot);
  X.fillStyle=skyGrad;
  X.fillRect(0,0,W,waterLineY);

  // Clouds
  X.fillStyle='rgba(255,255,255,0.25)';
  for(const cl of clouds){
    X.beginPath();
    X.ellipse(cl.x,cl.y,cl.w,cl.h,0,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.ellipse(cl.x-cl.w*0.3,cl.y+3,cl.w*0.6,cl.h*0.7,0,0,Math.PI*2);
    X.fill();
  }

  // Mountains
  drawMountains(rv.mtns);

  // Far bank trees
  for(const t of trees){
    if(t.side==='back')drawTree(t);
  }

  // Far bank
  const bankGrad=X.createLinearGradient(0,waterLineY-15,0,waterLineY+5);
  bankGrad.addColorStop(0,rv.bank);
  bankGrad.addColorStop(1,adjustColor(rv.bank,-20));
  X.fillStyle=bankGrad;
  X.beginPath();
  X.moveTo(0,waterLineY-5);
  for(let x=0;x<=W;x+=20){
    X.lineTo(x,waterLineY-5+Math.sin(x*0.02+1)*3);
  }
  X.lineTo(W,waterLineY+10);X.lineTo(0,waterLineY+10);
  X.fill();

  // Water
  drawWater(rv);

  // Underwater rocks
  for(const r of rocks){
    X.fillStyle=r.color;
    X.beginPath();
    X.ellipse(r.x,r.y,r.r,r.r*0.6,0,0,Math.PI*2);
    X.fill();
  }

  // Fish shadows
  drawFishShadows();

  // Water surface effects
  drawSurfaceEffects();

  // Insects
  drawInsects();

  // Near bank
  const nbGrad=X.createLinearGradient(0,bankY-10,0,H);
  nbGrad.addColorStop(0,adjustColor(rv.bank,10));
  nbGrad.addColorStop(1,adjustColor(rv.bank,-30));
  X.fillStyle=nbGrad;
  X.beginPath();
  X.moveTo(0,bankY);
  for(let x=0;x<=W;x+=15){
    X.lineTo(x,bankY+Math.sin(x*0.03)*4);
  }
  X.lineTo(W,H);X.lineTo(0,H);
  X.fill();

  // Grass tufts on near bank
  X.strokeStyle='rgba(80,120,50,0.4)';
  X.lineWidth=1.5;
  for(let x=5;x<W;x+=12+Math.random()*8){
    const by=bankY+Math.sin(x*0.03)*4;
    X.beginPath();
    X.moveTo(x,by);
    X.quadraticCurveTo(x-3+Math.sin(time*0.5+x)*2,by-8-Math.random()*5,x-2+Math.sin(time*0.3+x)*3,by-12-Math.random()*5);
    X.stroke();
  }

  // Front trees
  for(const t of trees){
    if(t.side==='front')drawTree(t);
  }

  // Rod and line
  drawRodAndLine();

  // Particles
  drawParticles();

  // Water zone labels (subtle)
  if(phase==='idle'){
    X.font='9px Georgia';
    X.fillStyle='rgba(255,255,255,0.15)';
    X.textAlign='center';
    for(let i=0;i<3;i++){
      const z=waterZones[i];
      X.fillText(z.type.toUpperCase(),z.x+z.w/2,waterLineY+15);
    }
  }
}

function drawMountains(color){
  // Back range
  X.fillStyle=adjustColor(color,20);
  X.globalAlpha=0.5;
  X.beginPath();X.moveTo(0,waterLineY);
  const peaks1=[0,0.12,0.25,0.4,0.55,0.7,0.85,1.0];
  const heights1=[0.35,0.2,0.1,0.22,0.08,0.18,0.25,0.3];
  for(let i=0;i<peaks1.length;i++){
    X.lineTo(peaks1[i]*W,waterLineY-heights1[i]*waterLineY*0.7);
  }
  X.lineTo(W,waterLineY);X.fill();
  X.globalAlpha=1;

  // Front range
  X.fillStyle=color;
  X.beginPath();X.moveTo(0,waterLineY);
  const peaks=[0,0.15,0.3,0.5,0.65,0.8,1.0];
  const heights=[0.25,0.35,0.15,0.4,0.2,0.3,0.2];
  for(let i=0;i<peaks.length;i++){
    X.lineTo(peaks[i]*W,waterLineY-heights[i]*waterLineY*0.5);
  }
  X.lineTo(W,waterLineY);X.fill();

  // Snow caps
  X.fillStyle='rgba(255,255,255,0.3)';
  for(let i=0;i<peaks.length;i++){
    if(heights[i]>0.25){
      const px=peaks[i]*W,py=waterLineY-heights[i]*waterLineY*0.5;
      X.beginPath();
      X.moveTo(px-12,py+15);X.lineTo(px,py);X.lineTo(px+12,py+15);
      X.fill();
    }
  }
}

function drawTree(t){
  const sway=Math.sin(time*0.4+t.sway)*2;
  X.fillStyle='#3a2a1a';
  X.fillRect(t.x-2,t.y-t.h*0.3,4,t.h*0.4);
  X.fillStyle=t.green;
  // Layered foliage
  for(let i=0;i<3;i++){
    const ly=t.y-t.h*0.3-i*t.h*0.25;
    const lw=t.w*(1-i*0.2);
    X.beginPath();
    X.moveTo(t.x+sway*(i+1)*0.3,ly-t.h*0.22);
    X.lineTo(t.x-lw/2,ly);
    X.lineTo(t.x+lw/2,ly);
    X.fill();
  }
}

function drawWater(rv){
  // Water body
  const wGrad=X.createLinearGradient(0,waterLineY,0,bankY);
  wGrad.addColorStop(0,rv.water);
  wGrad.addColorStop(0.5,adjustColor(rv.water,-15));
  wGrad.addColorStop(1,adjustColor(rv.water,-30));
  X.fillStyle=wGrad;
  X.fillRect(0,waterLineY,W,bankY-waterLineY);

  // Zone tinting
  for(let i=0;i<Math.min(3,waterZones.length);i++){
    const z=waterZones[i];
    if(z.type==='pool'){
      X.fillStyle='rgba(0,20,40,0.15)';
      X.fillRect(z.x,waterLineY,z.w,bankY-waterLineY);
    }else if(z.type==='riffle'){
      X.fillStyle='rgba(100,180,200,0.08)';
      X.fillRect(z.x,waterLineY,z.w,bankY-waterLineY);
    }
  }

  // Current lines (animated)
  X.strokeStyle='rgba(255,255,255,0.06)';
  X.lineWidth=1;
  for(let y=waterLineY+10;y<bankY;y+=12){
    X.beginPath();
    const offset=time*30+y*2;
    for(let x=0;x<W;x+=5){
      const cx=x,cy=y+Math.sin((x+offset)*0.03)*2;
      if(x===0)X.moveTo(cx,cy);else X.lineTo(cx,cy);
    }
    X.stroke();
  }
}

function drawSurfaceEffects(){
  // Surface shimmer
  X.strokeStyle='rgba(255,255,255,0.12)';
  X.lineWidth=1;
  for(const sw of surfaceWaves){
    const x=(sw.x+time*sw.speed*40)%W;
    X.beginPath();
    X.moveTo(x,waterLineY+Math.sin(time*2+sw.phase)*sw.amp);
    X.lineTo(x+8+Math.random()*4,waterLineY+Math.sin(time*2+sw.phase+0.5)*sw.amp);
    X.stroke();
  }
}

function drawFishShadows(){
  for(const fs of fishShadows){
    if(fs.caught)continue;
    const alpha=fs.rising?0.5:0.2;
    const len=15*fs.size;
    X.fillStyle=`rgba(40,50,40,${alpha})`;
    X.save();
    X.translate(fs.x,fs.y);
    const facing=fs.vx>0?1:-1;
    X.scale(facing,1);
    // Body
    X.beginPath();
    X.ellipse(0,0,len,len*0.3,0,0,Math.PI*2);
    X.fill();
    // Tail
    X.beginPath();
    X.moveTo(-len*0.8,0);
    X.lineTo(-len*1.2,-len*0.25+Math.sin(time*5)*2);
    X.lineTo(-len*1.2,len*0.25+Math.sin(time*5)*2);
    X.fill();
    X.restore();

    // Rise ring when interested
    if(fs.rising){
      X.strokeStyle='rgba(255,255,255,0.2)';
      X.lineWidth=1;
      const ringR=5+Math.sin(time*3)*3;
      X.beginPath();
      X.ellipse(fs.x,waterLineY+2,ringR*2,ringR*0.5,0,0,Math.PI*2);
      X.stroke();
    }
  }
}

function drawInsects(){
  for(const ins of insects){
    X.fillStyle='rgba(180,160,100,0.6)';
    X.beginPath();
    X.arc(ins.x,ins.y,ins.size,0,Math.PI*2);
    X.fill();
    // Wings
    const wa=Math.sin(time*15+ins.wingPhase)*0.4;
    X.strokeStyle='rgba(200,200,180,0.3)';
    X.lineWidth=0.5;
    X.beginPath();
    X.moveTo(ins.x,ins.y);
    X.lineTo(ins.x-3*Math.cos(wa),ins.y-3*Math.sin(wa)-2);
    X.moveTo(ins.x,ins.y);
    X.lineTo(ins.x+3*Math.cos(wa),ins.y-3*Math.sin(wa)-2);
    X.stroke();
  }
}

function drawRodAndLine(){
  // Rod position (bottom right, angler implied)
  const rodBaseX=W*0.82,rodBaseY=bankY+5;
  const rodLen=H*0.28;

  // Rod angle based on phase
  if(phase==='idle'||phase==='menu'){
    rodTargetAngle=-Math.PI*0.35;
  }else if(phase==='casting'){
    // Pull back
    const pwr=castPower;
    rodTargetAngle=-Math.PI*0.15+pwr*Math.PI*0.25;
  }else if(phase==='line_out'||phase==='drifting'||phase==='strike_window'){
    rodTargetAngle=-Math.PI*0.45;
  }else if(phase==='fighting'){
    rodTargetAngle=-Math.PI*0.3-tension*0.2;
  }

  rodAngle+=(rodTargetAngle-rodAngle)*0.15;

  rodTipX=rodBaseX+Math.cos(rodAngle)*rodLen;
  rodTipY=rodBaseY+Math.sin(rodAngle)*rodLen;

  // Rod
  X.strokeStyle='#5a4a30';
  X.lineWidth=3;
  X.beginPath();
  X.moveTo(rodBaseX,rodBaseY);
  X.lineTo(rodTipX,rodTipY);
  X.stroke();

  X.strokeStyle='#8a7a50';
  X.lineWidth=1.5;
  X.beginPath();
  X.moveTo(rodBaseX,rodBaseY);
  X.lineTo(rodTipX,rodTipY);
  X.stroke();

  // Handle
  X.strokeStyle='#3a2a1a';
  X.lineWidth=5;
  X.beginPath();
  X.moveTo(rodBaseX,rodBaseY);
  X.lineTo(rodBaseX+Math.cos(rodAngle)*(-15),rodBaseY+Math.sin(rodAngle)*(-15));
  X.stroke();

  // Reel
  X.fillStyle='#606060';
  X.beginPath();
  X.arc(rodBaseX+Math.cos(rodAngle)*(-8),rodBaseY+Math.sin(rodAngle)*(-8)+3,4,0,Math.PI*2);
  X.fill();

  // Fly line
  if(phase==='line_out'||phase==='drifting'||phase==='strike_window'||phase==='fighting'||phase==='landing'){
    drawFlyLine();
  }else if(phase==='casting'&&linePoints.length>0){
    // Show casting arc
    drawCastingArc();
  }
}

function drawFlyLine(){
  if(linePoints.length<2)return;

  // Main fly line (thicker, colored)
  X.strokeStyle='rgba(240,220,100,0.6)';
  X.lineWidth=1.8;
  X.beginPath();
  X.moveTo(rodTipX,rodTipY);
  // Curve from rod tip through control points to fly
  const pts=[{x:rodTipX,y:rodTipY},...linePoints,{x:flyX,y:flyY}];

  if(pts.length>=3){
    X.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length-1;i++){
      const xc=(pts[i].x+pts[i+1].x)/2;
      const yc=(pts[i].y+pts[i+1].y)/2;
      X.quadraticCurveTo(pts[i].x,pts[i].y,xc,yc);
    }
    X.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);
  }else{
    for(const p of pts)X.lineTo(p.x,p.y);
  }
  X.stroke();

  // Leader (thinner, near fly)
  X.strokeStyle='rgba(255,255,255,0.25)';
  X.lineWidth=0.6;
  const last2=pts.slice(-3);
  X.beginPath();
  X.moveTo(last2[0].x,last2[0].y);
  for(let i=1;i<last2.length;i++)X.lineTo(last2[i].x,last2[i].y);
  X.stroke();

  // Fly
  const fl=FLIES.find(f=>f.id===state.fly);
  drawFly(flyX,flyY,fl);

  // Drift ring if on water
  if(flyLanded&&(phase==='drifting'||phase==='strike_window')){
    X.strokeStyle='rgba(255,255,255,0.15)';
    X.lineWidth=0.5;
    const r=3+Math.sin(time*2)*1.5;
    X.beginPath();
    X.ellipse(flyX,flyY,r*2,r*0.6,0,0,Math.PI*2);
    X.stroke();
  }
}

function drawFly(x,y,fl){
  if(!fl)return;
  const s=3;
  // Hook
  X.strokeStyle='#888';
  X.lineWidth=1;
  X.beginPath();
  X.arc(x,y+1,s*0.6,0,Math.PI);
  X.stroke();

  if(fl.type==='dry'){
    // Hackle
    X.fillStyle='rgba(180,140,80,0.7)';
    X.beginPath();
    X.ellipse(x,y-1,s,s*0.5,0,0,Math.PI*2);
    X.fill();
    // Wings
    X.fillStyle='rgba(220,220,200,0.4)';
    X.beginPath();
    X.ellipse(x-1,y-3,1.5,3,0.3,0,Math.PI*2);
    X.fill();
    X.beginPath();
    X.ellipse(x+1,y-3,1.5,3,-0.3,0,Math.PI*2);
    X.fill();
  }else if(fl.type==='nymph'){
    // Body
    X.fillStyle='rgba(100,80,50,0.7)';
    X.beginPath();
    X.ellipse(x,y,s*0.8,s*0.4,0.2,0,Math.PI*2);
    X.fill();
    // Legs
    X.strokeStyle='rgba(120,100,60,0.4)';
    X.lineWidth=0.5;
    for(let i=-1;i<=1;i++){
      X.beginPath();X.moveTo(x+i*2,y);X.lineTo(x+i*2-1,y+2);X.stroke();
    }
  }else{
    // Streamer - longer body
    X.fillStyle='rgba(60,60,60,0.7)';
    X.beginPath();
    X.ellipse(x,y,s*1.3,s*0.4,0,0,Math.PI*2);
    X.fill();
    // Tail fibers
    X.strokeStyle='rgba(140,60,30,0.5)';
    X.lineWidth=0.8;
    X.beginPath();X.moveTo(x+s,y);X.lineTo(x+s*2,y-1+Math.sin(time*4));X.stroke();
    X.beginPath();X.moveTo(x+s,y);X.lineTo(x+s*2,y+1+Math.sin(time*4+1));X.stroke();
  }
}

function drawCastingArc(){
  if(linePoints.length<2)return;
  X.strokeStyle='rgba(240,220,100,0.4)';
  X.lineWidth=1.5;
  X.beginPath();
  X.moveTo(rodTipX,rodTipY);
  for(const p of linePoints)X.lineTo(p.x,p.y);
  X.stroke();
}

function drawParticles(){
  for(const p of particles){
    X.globalAlpha=p.alpha;
    X.fillStyle=p.color;
    X.beginPath();
    X.arc(p.x,p.y,p.r,0,Math.PI*2);
    X.fill();
  }
  X.globalAlpha=1;
}

// ===== UPDATE =====
function update(dt){
  time+=dt;

  // Clouds
  for(const cl of clouds){
    cl.x+=cl.speed*dt*10;
    if(cl.x>W+cl.w)cl.x=-cl.w;
  }

  // Insects
  for(const ins of insects){
    ins.x+=ins.vx+Math.sin(time*2+ins.wingPhase)*0.3;
    ins.y+=Math.sin(time*3+ins.wingPhase)*0.4;
    ins.life+=dt;
    if(ins.x<-10||ins.x>W+10||ins.life>300){
      ins.x=Math.random()*W;
      ins.y=waterLineY-3-Math.random()*25;
      ins.life=0;
    }
  }

  // Fish shadow movement
  for(const fs of fishShadows){
    if(fs.caught)continue;
    fs.wanderPhase+=dt*0.5;
    fs.x+=fs.vx*dt*20;
    fs.y=fs.baseY+Math.sin(fs.wanderPhase)*5;

    if(fs.x<20||fs.x>W-20)fs.vx*=-1;
    if(fs.y<waterLineY+15)fs.y=waterLineY+15;
    if(fs.y>bankY-15)fs.y=bankY-15;
  }

  // Birds
  birdTimer-=dt;
  if(birdTimer<=0){
    birdTimer=8+Math.random()*15;
    playBird();
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=50*dt;// gravity
    p.alpha-=dt*p.decay;
    if(p.alpha<=0)particles.splice(i,1);
  }

  // Phase-specific updates
  if(phase==='line_out'){
    updateLineOut(dt);
  }else if(phase==='drifting'){
    updateDrift(dt);
  }else if(phase==='strike_window'){
    updateStrikeWindow(dt);
  }else if(phase==='fighting'){
    updateFight(dt);
  }

  // Message timer
  if(msgTimer>0){
    msgTimer-=dt;
    if(msgTimer<=0){
      document.getElementById('msgBox').style.opacity='0';
    }
  }
}

function updateLineOut(dt){
  if(!flyLanded){
    flyX+=flyVx*dt;
    flyY+=flyVy*dt;
    flyVy+=120*dt;// gravity

    // Update line points along the arc
    linePoints=[];
    const steps=8;
    for(let i=1;i<=steps;i++){
      const t=i/(steps+1);
      const lx=rodTipX+(flyX-rodTipX)*t;
      const ly=rodTipY+(flyY-rodTipY)*t-Math.sin(t*Math.PI)*30*(1-t);
      linePoints.push({x:lx,y:ly});
    }

    // Hit water
    if(flyY>=waterLineY+2){
      flyY=waterLineY+2;
      flyLanded=true;
      playSplash();
      spawnSplash(flyX,flyY);

      // Check accuracy - distance to nearest fish
      const rod=RODS.find(r=>r.id===state.rod);
      const acc=rod?rod.acc:1.0;

      let nearestDist=Infinity,nearestFish=null;
      for(const fs of fishShadows){
        if(fs.caught)continue;
        const d=Math.abs(fs.x-flyX);
        if(d<nearestDist){nearestDist=d;nearestFish=fs}
      }

      // Check if cast spooked fish (too powerful near wary fish)
      if(castPower>0.85&&nearestDist<60){
        if(nearestFish&&nearestFish.species.wary){
          showMsg('Too heavy! Fish spooked...');
          nearestFish.vx=nearestFish.x<flyX?-2:2;
          nearestFish=null;
        }
      }

      // Calculate adjusted distance with rod accuracy
      const effectiveDist=nearestDist*acc;

      if(nearestFish&&effectiveDist<50){
        nearestFish.interested=true;
        phase='drifting';
        driftTime=0;
        showMsg('Good cast... let it drift');
      }else{
        phase='drifting';
        driftTime=0;
        if(nearestDist>100){
          showMsg('No fish nearby. Try again.');
        }else{
          showMsg('Drift it... wait for a rise');
        }
      }
    }

    if(flyX<-20||flyX>W+20){
      resetCast();
    }
  }
}

function updateDrift(dt){
  driftTime+=dt;
  const fl=FLIES.find(f=>f.id===state.fly);

  // Get current at fly position
  let cur=currentFlow;
  for(const z of waterZones){
    if(flyX>=z.x&&flyX<z.x+z.w){
      cur=z.current*currentFlow;break;
    }
  }

  // Drift fly with current
  flyX+=cur*dt*25;
  flyY=waterLineY+(fl&&fl.type==='nymph'?6:fl&&fl.type==='streamer'?4:1);

  // Update line sag
  updateLinePointsDrift();

  // Check if interested fish will rise
  for(const fs of fishShadows){
    if(fs.caught||!fs.interested)continue;
    const dx=Math.abs(fs.x-flyX);

    // Match the hatch bonus
    let matchBonus=0;
    if(fl){
      if(fl.match===currentHatch)matchBonus=0.3;
      else if(fl.match==='any')matchBonus=0.1;
    }

    // Fly type suitability
    let typeBonus=0;
    if(fl){
      const zone=waterZones.find(z=>flyX>=z.x&&flyX<z.x+z.w);
      if(zone){
        if(zone.type==='riffle'&&fl.type==='dry')typeBonus=0.15;
        if(zone.type==='pool'&&fl.type==='nymph')typeBonus=0.2;
        if(zone.type==='run'&&fl.type==='streamer')typeBonus=0.15;
      }
    }

    const riseChance=(0.3+matchBonus+typeBonus)*dt;

    if(dx<40&&driftTime>1&&Math.random()<riseChance){
      // Fish rises!
      fs.rising=true;
      fs.x+=(flyX-fs.x)*0.3;
      currentFish=fs;
      phase='strike_window';
      strikeTimer=0;
      playPlop();
      showMsg('STRIKE! Tap now!');
      return;
    }
  }

  // Fly drifted off screen or too long
  if(flyX<-10||flyX>W+10||driftTime>8){
    showMsg(driftTime>8?'Fly dragged. Recast.':'');
    resetCast();
  }
}

function updateStrikeWindow(dt){
  strikeTimer+=dt;
  // Window closes after ~1.5 seconds
  if(strikeTimer>1.5){
    showMsg('Missed the take!');
    if(currentFish){
      currentFish.rising=false;
      currentFish.interested=false;
    }
    currentFish=null;
    resetCast();
  }
}

function updateFight(dt){
  if(!currentFish)return;
  const sp=currentFish.species;
  const rod=RODS.find(r=>r.id===state.rod);
  const strength=rod?rod.strength:1.0;

  // Fish behavior
  fishDirTimer-=dt;
  if(fishDirTimer<=0){
    fishDirTimer=0.5+Math.random()*1.5;
    fishDir=Math.random()*Math.PI*2;
    // Stronger fish make more dramatic runs
    if(Math.random()<sp.fight*0.4){
      fishDir=Math.random()<0.5?0:Math.PI;// Horizontal run
      fishDirTimer=1+Math.random()*2;
    }
  }

  // Fish movement
  const fightSpeed=(20+sp.fight*40)*fishEnergy;
  currentFish.x+=Math.cos(fishDir)*fightSpeed*dt;
  currentFish.y+=Math.sin(fishDir)*fightSpeed*dt*0.3;

  // Keep in water
  currentFish.x=Math.max(10,Math.min(W-10,currentFish.x));
  currentFish.y=Math.max(waterLineY+10,Math.min(bankY-10,currentFish.y));

  // Tension based on distance and fish movement
  const dx=currentFish.x-rodTipX;
  const dy=currentFish.y-rodTipY;
  const dist=Math.sqrt(dx*dx+dy*dy);

  // Base tension from distance
  tension=Math.min(1,dist/(W*0.6));

  // Fish energy drains when tension is moderate
  if(tension>0.2&&tension<0.8){
    fishEnergy-=dt*0.06*(1/sp.fight);
  }

  // Too much tension = break!
  if(tension>0.9/strength){
    playSnap();
    showMsg('Line snapped! The ' + sp.name + ' broke free!');
    currentFish.caught=false;
    currentFish.rising=false;
    currentFish.interested=false;
    currentFish=null;
    resetCast();
    return;
  }

  // Too little tension = fish escapes
  if(tension<0.05&&fishEnergy>0.3){
    // Fish can shake hook
    if(Math.random()<0.02){
      showMsg('Slack line! Fish threw the hook!');
      currentFish.rising=false;
      currentFish.interested=false;
      currentFish=null;
      resetCast();
      return;
    }
  }

  // Update line
  flyX=currentFish.x;
  flyY=currentFish.y;
  updateLinePointsFight();

  // Reel drag sound
  if(tension>0.5&&Math.random()<0.2)playReelDrag();

  // Update UI
  document.getElementById('tensionFill').style.height=(tension*100)+'%';

  // Fish tired enough = land it
  if(fishEnergy<=0){
    landFish();
  }
}

function updateLinePointsDrift(){
  linePoints=[];
  const steps=6;
  for(let i=1;i<=steps;i++){
    const t=i/(steps+1);
    const lx=rodTipX+(flyX-rodTipX)*t;
    const ly=rodTipY+(flyY-rodTipY)*t;
    // Add sag
    const sag=Math.sin(t*Math.PI)*15;
    const wave=Math.sin(time*2+t*5)*2;
    linePoints.push({x:lx+wave,y:ly+sag});
  }
}

function updateLinePointsFight(){
  linePoints=[];
  const steps=8;
  for(let i=1;i<=steps;i++){
    const t=i/(steps+1);
    const lx=rodTipX+(flyX-rodTipX)*t;
    const ly=rodTipY+(flyY-rodTipY)*t;
    // Tension affects sag
    const sag=Math.sin(t*Math.PI)*(20-tension*15);
    const fight=Math.sin(time*6+t*4)*tension*5;
    linePoints.push({x:lx+fight,y:ly+sag});
  }
}

// ===== CASTING =====
function startCast(x,y){
  if(phase!=='idle')return;
  initAudio();
  isDragging=true;
  castStartX=x;
  castStartY=y;
  castStartTime=time;
  castPower=0;
  phase='casting';
  document.getElementById('castPower').style.display='block';
  document.getElementById('instructions').style.opacity='0';
  closeFlyBox();
}

function updateCast(x,y){
  if(!isDragging||phase!=='casting')return;
  // Drag right = load power
  const dx=x-castStartX;
  castPower=Math.min(1,Math.max(0,dx/120));
  document.getElementById('castPowerFill').style.height=(castPower*100)+'%';

  // Show preview line bending
  linePoints=[];
  const steps=5;
  for(let i=0;i<steps;i++){
    const t=(i+1)/(steps+1);
    linePoints.push({
      x:rodTipX+(rodTipX-castPower*100)*t,
      y:rodTipY-Math.sin(t*Math.PI)*castPower*40
    });
  }
}

function releaseCast(){
  if(!isDragging||phase!=='casting')return;
  isDragging=false;
  document.getElementById('castPower').style.display='none';

  if(castPower<0.1){
    phase='idle';
    linePoints=[];
    document.getElementById('instructions').style.opacity='1';
    return;
  }

  playSwoosh();

  // Launch fly
  const power=castPower;
  const angle=-0.25-power*0.15;// slightly upward
  const speed=200+power*400;

  flyX=rodTipX;
  flyY=rodTipY;
  flyVx=-Math.cos(angle)*speed;// cast left
  flyVy=Math.sin(angle)*speed*0.5-80;// upward arc
  flyLanded=false;

  phase='line_out';
  linePoints=[];
}

function resetCast(){
  phase='idle';
  linePoints=[];
  flyLanded=false;
  currentFish=null;
  tension=0;
  fishEnergy=1;
  hookSet=false;
  document.getElementById('tensionBar').style.display='none';
  document.getElementById('tensionLabel').style.display='none';
  document.getElementById('instructions').style.opacity='1';
  document.getElementById('instructions').textContent='Hold and drag back to cast';

  // Reset interested fish
  for(const fs of fishShadows){
    fs.interested=false;
    fs.rising=false;
  }

  // Respawn fish if needed
  const alive=fishShadows.filter(f=>!f.caught);
  if(alive.length<2)spawnFishShadows();
}

// ===== STRIKE =====
function attemptStrike(){
  if(phase==='strike_window'&&currentFish){
    playHookSet();
    hookSet=true;
    phase='fighting';
    fishEnergy=1;
    tension=0.3;
    fishDirTimer=0;
    showMsg('Fish on! Keep tension steady!');
    document.getElementById('tensionBar').style.display='block';
    document.getElementById('tensionLabel').style.display='block';
    document.getElementById('instructions').textContent='Guide the fish - keep tension in the green';
    document.getElementById('instructions').style.opacity='1';
  }
}

// ===== FIGHT CONTROL =====
function fightInput(x,y){
  if(phase!=='fighting'||!currentFish)return;
  // Tap toward rod to reel in, away to give line
  const rodBaseX=W*0.82;
  if(x>W*0.5){
    // Reel in - increase tension
    tension=Math.min(1,tension+0.03);
    fishEnergy-=0.005;
  }else{
    // Give line - decrease tension
    tension=Math.max(0,tension-0.04);
  }
}

// ===== LAND FISH =====
function landFish(){
  if(!currentFish)return;
  const sp=currentFish.species;
  currentFish.caught=true;

  // Calculate weight
  const w=sp.minW+Math.random()*(sp.maxW-sp.minW);
  const weightLbs=Math.round(w*2.2*10)/10;
  const weightKg=Math.round(w*10)/10;

  playSuccess();

  // Spawn celebration particles
  for(let i=0;i<20;i++){
    particles.push({
      x:flyX+Math.random()*20-10,y:flyY,
      vx:Math.random()*60-30,vy:-40-Math.random()*60,
      r:1+Math.random()*2,
      color:['#f0d070','#90c090','#70a0c0','#ffffff'][Math.floor(Math.random()*4)],
      alpha:1,decay:0.8+Math.random()*0.5
    });
  }

  // Update fish log
  if(!state.fishLog[sp.id]){
    state.fishLog[sp.id]={count:0,best:0,species:sp.name};
  }
  state.fishLog[sp.id].count++;
  if(weightKg>state.fishLog[sp.id].best)state.fishLog[sp.id].best=weightKg;
  state.totalCaught++;

  // Earn materials
  const matReward={common:1,uncommon:2,rare:4,legendary:8}[sp.rarity]||1;
  state.materials+=matReward;

  // Check unlocks
  checkUnlocks();

  saveGame();
  updateHUD();

  // Post to parent
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({
        type:'game-fish-caught',
        species:sp.name,
        weightKg,
        weightLbs,
        source:'flyfishing'
      },'*');
    }
  }catch(e){}

  // Show catch overlay
  const pb=weightKg>=state.fishLog[sp.id].best;
  showOverlay(
    sp.name+'!',
    weightKg+' kg ('+weightLbs+' lbs)',
    [
      {cls:sp.rarity==='legendary'?'gold':'',text:sp.rarity.toUpperCase()},
      pb?'Personal Best!':'',
      'Materials earned: +'+matReward
    ].filter(Boolean),
    [{text:'Release & Continue',action:()=>{hideOverlay();resetCast()}}]
  );
}

function checkUnlocks(){
  // Fly unlocks
  for(const fl of FLIES){
    if(!fl.unlocked&&fl.unlock&&state.totalCaught>=fl.unlock){
      if(!state.unlockedFlies.includes(fl.id)){
        state.unlockedFlies.push(fl.id);
        showMsg('New fly unlocked: '+fl.name+'!');
      }
    }
  }
  // River unlocks
  for(let i=0;i<RIVERS.length;i++){
    if(!state.unlockedRivers.includes(i)&&state.totalCaught>=RIVERS[i].unlock){
      state.unlockedRivers.push(i);
      showMsg('New river unlocked: '+RIVERS[i].name+'!');
    }
  }
}

// ===== SPLASH PARTICLES =====
function spawnSplash(x,y){
  for(let i=0;i<8;i++){
    particles.push({
      x,y,
      vx:Math.random()*40-20,
      vy:-20-Math.random()*30,
      r:1+Math.random(),
      color:'rgba(180,210,230,0.6)',
      alpha:0.7,
      decay:1.5
    });
  }
}

// ===== UI =====
function showMsg(txt){
  const el=document.getElementById('msgBox');
  el.textContent=txt;
  el.style.opacity='1';
  msgTimer=2.5;
}

function showOverlay(title,sub,details,buttons){
  const ov=document.getElementById('overlay');
  let html='<div class="panel"><h2>'+title+'</h2><div class="sub">'+sub+'</div>';
  for(const d of details){
    if(typeof d==='string')html+='<div class="detail">'+d+'</div>';
    else html+='<div class="detail '+d.cls+'">'+d.text+'</div>';
  }
  for(const b of buttons){
    html+='<button class="btn '+(b.cls||'')+'" data-action="'+b.text+'">'+b.text+'</button>';
  }
  html+='</div>';
  ov.innerHTML=html;
  ov.style.display='flex';
  // Bind buttons
  ov.querySelectorAll('.btn').forEach((btn,i)=>{
    btn.addEventListener('click',()=>buttons[i].action());
    btn.addEventListener('touchend',(e)=>{e.preventDefault();buttons[i].action()});
  });
}

function hideOverlay(){
  document.getElementById('overlay').style.display='none';
}

// ===== FLY BOX =====
function openFlyBox(){
  if(phase!=='idle')return;
  const box=document.getElementById('flyBox');
  const grid=document.getElementById('flyGrid');
  const hatch=document.getElementById('hatchInfo');
  hatch.textContent='Current hatch: '+currentHatch+' -- match it for best results';

  grid.innerHTML='';
  for(const fl of FLIES){
    const unlocked=state.unlockedFlies.includes(fl.id);
    const selected=state.fly===fl.id;
    const card=document.createElement('div');
    card.className='flyCard'+(selected?' selected':'')+(unlocked?'':' locked');
    card.innerHTML='<div class="fname">'+(unlocked?fl.name:'???')+'</div><div class="ftype">'+fl.type+(fl.match!=='any'?' / '+fl.match:'')+'</div>';
    if(unlocked){
      card.addEventListener('click',()=>selectFly(fl.id));
      card.addEventListener('touchend',(e)=>{e.preventDefault();selectFly(fl.id)});
    }
    grid.appendChild(card);
  }

  box.style.display='flex';
}

function closeFlyBox(){
  document.getElementById('flyBox').style.display='none';
}

function selectFly(id){
  state.fly=id;
  saveGame();
  updateHUD();
  closeFlyBox();
}

// ===== MENU =====
function openMenu(tab){
  if(phase!=='idle')return;
  const ov=document.getElementById('menuOverlay');
  let html='<div class="menuHeader"><h2>'+(tab==='rivers'?'Rivers':tab==='log'?'Fish Log':'Gear')+'</h2></div><div class="menuBody">';

  if(tab==='rivers'){
    html+='<div class="section"><div class="sTitle">Choose a River</div>';
    for(let i=0;i<RIVERS.length;i++){
      const rv=RIVERS[i];
      const unlocked=state.unlockedRivers.includes(i);
      const active=state.river===i;
      html+='<div class="menuItem'+(unlocked?'':' locked')+'" data-river="'+i+'"><div class="mIcon" style="background:'+rv.bg.water+'"></div><div class="mInfo"><h3>'+rv.name+'</h3><p>'+rv.desc+' (Difficulty '+rv.difficulty+')</p></div><div class="mRight">'+(active?'CURRENT':unlocked?'SELECT':'Catch '+rv.unlock+' fish')+'</div></div>';
    }
    html+='</div>';
  }else if(tab==='log'){
    html+='<div class="section"><div class="sTitle">Fish Journal</div>';
    for(const sp of FISH){
      const log=state.fishLog[sp.id];
      const caught=log&&log.count>0;
      const rarityColors={common:'#4a9e5a',uncommon:'#3090d0',rare:'#9060d0',legendary:'#d4a83c'};
      html+='<div class="fishEntry'+(caught?'':' uncaught')+'"><div class="fDot" style="background:'+rarityColors[sp.rarity]+'"></div><div class="fInfo"><h4>'+(caught?sp.name:'???')+'</h4><p>'+sp.rarity+(caught?' -- Caught: '+log.count:'')+'</p></div>'+(caught?'<div class="fBest">Best: '+log.best+' kg</div>':'')+'</div>';
    }
    html+='</div>';
  }else if(tab==='gear'){
    html+='<div class="section"><div class="sTitle">Rods (Materials: '+state.materials+')</div>';
    for(const rod of RODS){
      const owned=state.unlockedRods.includes(rod.id);
      const active=state.rod===rod.id;
      html+='<div class="menuItem" data-rod="'+rod.id+'" data-cost="'+rod.cost+'"><div class="mIcon" style="background:rgba(90,74,48,0.5)"></div><div class="mInfo"><h3>'+rod.name+'</h3><p>'+rod.desc+'</p></div><div class="mRight">'+(active?'EQUIPPED':owned?'EQUIP':rod.cost+' mat')+'</div></div>';
    }
    html+='</div>';
  }

  html+='</div><button class="closeMenu" onclick="closeMenu()">Close</button>';
  ov.innerHTML=html;
  ov.style.display='flex';

  // Bind menu items
  if(tab==='rivers'){
    ov.querySelectorAll('[data-river]').forEach(el=>{
      const fn=()=>{
        const i=parseInt(el.dataset.river);
        if(state.unlockedRivers.includes(i)){
          state.river=i;
          saveGame();
          generateScene();
          closeMenu();
        }
      };
      el.addEventListener('click',fn);
      el.addEventListener('touchend',(e)=>{e.preventDefault();fn()});
    });
  }else if(tab==='gear'){
    ov.querySelectorAll('[data-rod]').forEach(el=>{
      const fn=()=>{
        const id=el.dataset.rod;
        const cost=parseInt(el.dataset.cost);
        if(state.unlockedRods.includes(id)){
          state.rod=id;
          saveGame();
          closeMenu();
        }else if(state.materials>=cost){
          state.materials-=cost;
          state.unlockedRods.push(id);
          state.rod=id;
          saveGame();
          openMenu('gear');// refresh
        }else{
          showMsg('Need '+cost+' materials');
        }
      };
      el.addEventListener('click',fn);
      el.addEventListener('touchend',(e)=>{e.preventDefault();fn()});
    });
  }
}

function closeMenu(){
  document.getElementById('menuOverlay').style.display='none';
}

// ===== TOUCH HANDLING =====
function getPos(e){
  const t=e.touches?e.touches[0]:e;
  return{x:t.clientX,y:t.clientY};
}

let fightHoldInterval=null;
let fightHoldX=0;

C.addEventListener('touchstart',(e)=>{
  e.preventDefault();
  const p=getPos(e);
  handleDown(p.x,p.y);
  if(phase==='fighting'){
    fightHoldX=p.x;
    clearInterval(fightHoldInterval);
    fightHoldInterval=setInterval(()=>fightInput(fightHoldX,0),50);
  }
},{passive:false});

C.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  const p=getPos(e);
  handleMove(p.x,p.y);
  if(phase==='fighting')fightHoldX=p.x;
},{passive:false});

C.addEventListener('touchend',(e)=>{
  e.preventDefault();
  handleUp();
  clearInterval(fightHoldInterval);
},{passive:false});

C.addEventListener('mousedown',(e)=>{
  const p={x:e.clientX,y:e.clientY};
  handleDown(p.x,p.y);
  if(phase==='fighting'){
    fightHoldX=e.clientX;
    clearInterval(fightHoldInterval);
    fightHoldInterval=setInterval(()=>fightInput(fightHoldX,0),50);
  }
});
C.addEventListener('mousemove',(e)=>{
  const p={x:e.clientX,y:e.clientY};
  handleMove(p.x,p.y);
  if(phase==='fighting')fightHoldX=e.clientX;
});
C.addEventListener('mouseup',()=>{
  handleUp();
  clearInterval(fightHoldInterval);
});

function handleDown(x,y){
  if(phase==='idle'){
    closeFlyBox();
    startCast(x,y);
  }else if(phase==='strike_window'){
    attemptStrike();
  }else if(phase==='fighting'){
    fightInput(x,y);
  }
}

function handleMove(x,y){
  if(phase==='casting'){
    updateCast(x,y);
  }else if(phase==='fighting'){
    fightInput(x,y);
  }
}

function handleUp(){
  if(phase==='casting'){
    releaseCast();
  }
}

// ===== UTILITIES =====
function adjustColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16)+amt;
  let g=parseInt(hex.slice(3,5),16)+amt;
  let b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));
  g=Math.max(0,Math.min(255,g));
  b=Math.max(0,Math.min(255,b));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ===== GAME LOOP =====
let lastTime=0;
function loop(ts){
  const dt=Math.min(0.05,(ts-lastTime)/1000);
  lastTime=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ===== INIT =====
loadGame();
resize();
window.addEventListener('resize',resize);
requestAnimationFrame((ts)=>{lastTime=ts;loop(ts)});

// Ambient river sound loop using noise
let ambientInterval=null;
function startAmbient(){
  if(ambientInterval)return;
  ambientInterval=setInterval(()=>{
    if(!audioCtx)return;
    playNoise(0.3,0.008);
  },250);
}
document.addEventListener('touchstart',()=>{initAudio();startAmbient()},{once:true});
document.addEventListener('click',()=>{initAudio();startAmbient()},{once:true});
</script>
