<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hamster Race</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#111; display:flex; align-items:center; justify-content:center; }
canvas { display:block; image-rendering:auto; touch-action:none; cursor:pointer; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";

var W = 360, H = 640;
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

function fitCanvas() {
  var scaleX = window.innerWidth / W;
  var scaleY = window.innerHeight / H;
  var scale = Math.min(scaleX, scaleY);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// Audio
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  ensureAudio();
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  var t = audioCtx.currentTime;

  if (type === 'jump') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    osc.start(t); osc.stop(t + 0.15);
  } else if (type === 'seed') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.start(t); osc.stop(t + 0.12);
  } else if (type === 'hit') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.2);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t); osc.stop(t + 0.25);
  } else if (type === 'gameover') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.5);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.start(t); osc.stop(t + 0.6);
    // Second tone
    var osc2 = audioCtx.createOscillator();
    var gain2 = audioCtx.createGain();
    osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(300, t + 0.3);
    osc2.frequency.exponentialRampToValueAtTime(80, t + 0.8);
    gain2.gain.setValueAtTime(0.15, t + 0.3);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    osc2.start(t + 0.3); osc2.stop(t + 0.9);
  }
}

// Rolling sound
var rollOsc = null, rollGain = null, rollPlaying = false;
function startRolling() {
  if (rollPlaying) return;
  ensureAudio();
  if (!audioCtx) return;
  rollOsc = audioCtx.createOscillator();
  rollGain = audioCtx.createGain();
  rollOsc.type = 'triangle';
  rollOsc.frequency.value = 60;
  rollGain.gain.value = 0.04;
  rollOsc.connect(rollGain);
  rollGain.connect(audioCtx.destination);
  rollOsc.start();
  rollPlaying = true;
}
function stopRolling() {
  if (!rollPlaying) return;
  try { rollOsc.stop(); } catch(e) {}
  rollPlaying = false;
  rollOsc = null; rollGain = null;
}
function updateRolling(speed) {
  if (rollGain && rollOsc) {
    rollOsc.frequency.value = 40 + speed * 8;
    rollGain.gain.value = Math.min(0.06, 0.02 + speed * 0.004);
  }
}

// State
var STATE_MENU = 0, STATE_PLAY = 1, STATE_OVER = 2;
var state = STATE_MENU;

var GROUND_Y = 480;
var BALL_RADIUS = 18;
var GRAVITY = 0.6;
var JUMP_VEL = -11;
var JUMP_HOLD_VEL = -14;
var MAX_HOLD_TIME = 12;

var hamster, scrollX, scrollSpeed, baseSpeed, platforms, score, distScore, lives;
var highScore = parseInt(localStorage.getItem('hamsterrace_hs')) || 0;
var holdTime, isHolding, jumpReleased, invincible, invTimer;
var catPaws, nextCatDist, difficultyDist;
var waterSlowTimer;
var particles;
var frameCount;
var shakeTimer, shakeAmount;

function resetGame() {
  hamster = {
    x: 80,
    y: GROUND_Y - BALL_RADIUS,
    vy: 0,
    onGround: true,
    rotation: 0
  };
  scrollX = 0;
  baseSpeed = 3;
  scrollSpeed = baseSpeed;
  platforms = [];
  score = 0;
  distScore = 0;
  lives = 3;
  holdTime = 0;
  isHolding = false;
  jumpReleased = true;
  invincible = false;
  invTimer = 0;
  catPaws = [];
  nextCatDist = 600 + Math.random() * 400;
  difficultyDist = 0;
  waterSlowTimer = 0;
  particles = [];
  frameCount = 0;
  shakeTimer = 0;
  shakeAmount = 0;

  // Initial platform
  platforms.push({x: -100, w: 500, obstacles: [], seeds: [], waters: []});
  generateAhead();
  startRolling();
}

function generateAhead() {
  var lastEnd = 0;
  if (platforms.length > 0) {
    var lp = platforms[platforms.length - 1];
    lastEnd = lp.x + lp.w;
  }

  var speedFactor = Math.min(scrollSpeed / 3, 3);

  while (lastEnd < scrollX + W + 500) {
    var gapChance = 0.25 + difficultyDist * 0.0001;
    gapChance = Math.min(gapChance, 0.45);
    var gap = Math.random() < gapChance ? 35 + Math.random() * 30 + difficultyDist * 0.01 : 0;
    gap = Math.min(gap, 80);
    var pw = 130 + Math.random() * 200;

    var p = {x: lastEnd + gap, w: pw, obstacles: [], seeds: [], waters: []};

    // Add obstacles based on difficulty
    var obChance = 0.35 + difficultyDist * 0.00015;
    obChance = Math.min(obChance, 0.65);

    if (Math.random() < obChance && pw > 80) {
      var otype = Math.random();
      if (otype < 0.5) {
        p.obstacles.push({type: 'rock', relX: 30 + Math.random() * (pw - 60)});
      } else {
        p.obstacles.push({type: 'spikes', relX: 40 + Math.random() * (pw - 80)});
      }
    }

    // Water puddles
    if (Math.random() < 0.15 && pw > 100) {
      p.waters.push({relX: 30 + Math.random() * (pw - 80), w: 40 + Math.random() * 30});
    }

    // Seeds
    for (var s = 0; s < 3; s++) {
      if (Math.random() < 0.45) {
        p.seeds.push({
          relX: 20 + Math.random() * (pw - 40),
          relY: -25 - Math.random() * 55,
          collected: false,
          bob: Math.random() * Math.PI * 2
        });
      }
    }

    platforms.push(p);
    lastEnd = p.x + p.w;
  }

  // Cleanup old platforms
  while (platforms.length > 0 && platforms[0].x + platforms[0].w < scrollX - 200) {
    platforms.shift();
  }
}

// Cat paw generation
function maybeSpawnCat() {
  if (scrollX > nextCatDist) {
    catPaws.push({
      x: scrollX + W + 50,
      y: 0,
      targetY: 120 + Math.random() * 100,
      state: 'descend',
      timer: 0,
      swipeX: 0
    });
    var interval = Math.max(300, 800 - difficultyDist * 0.05);
    nextCatDist = scrollX + interval + Math.random() * interval;
  }
}

// Particles
function addParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 1) * 4,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

// Input
var inputDown = false;

function onDown(e) {
  e.preventDefault();
  ensureAudio();
  inputDown = true;

  if (state === STATE_MENU) {
    state = STATE_PLAY;
    resetGame();
    return;
  }
  if (state === STATE_OVER) {
    state = STATE_PLAY;
    resetGame();
    return;
  }

  if (state === STATE_PLAY && hamster.onGround && jumpReleased) {
    hamster.vy = JUMP_VEL;
    hamster.onGround = false;
    holdTime = 0;
    isHolding = true;
    jumpReleased = false;
    playSound('jump');
  }
}

function onUp(e) {
  e.preventDefault();
  inputDown = false;
  isHolding = false;
  jumpReleased = true;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive: false});
canvas.addEventListener('touchend', onUp, {passive: false});
canvas.addEventListener('touchcancel', onUp, {passive: false});

// Drawing
function drawSky() {
  var grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.5, '#B0E0FF');
  grad.addColorStop(1, '#E0F0FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  var cloudOffset = -(scrollX * 0.15) % 400;
  for (var i = 0; i < 4; i++) {
    var cx = cloudOffset + i * 160 + 50;
    var cy = 50 + (i % 3) * 35;
    drawCloud(cx, cy, 30 + (i % 2) * 15);
  }
}

function drawCloud(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.arc(cx - r * 0.7, cy + r * 0.2, r * 0.6, 0, Math.PI * 2);
  ctx.arc(cx + r * 0.7, cy + r * 0.15, r * 0.65, 0, Math.PI * 2);
  ctx.arc(cx + r * 0.3, cy - r * 0.3, r * 0.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  // Underground
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Dirt gradient
  var dirtGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  dirtGrad.addColorStop(0, '#6B8E3C');
  dirtGrad.addColorStop(0.05, '#8B6E3C');
  dirtGrad.addColorStop(1, '#5A3E1C');
  ctx.fillStyle = dirtGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
}

function drawPlatforms() {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    var px = p.x - scrollX;
    if (px + p.w < -50 || px > W + 50) continue;

    // Platform surface
    ctx.fillStyle = '#5CAD3C';
    ctx.fillRect(px, GROUND_Y, p.w, 8);

    // Darker green below
    ctx.fillStyle = '#4A8A2E';
    ctx.fillRect(px, GROUND_Y + 8, p.w, H - GROUND_Y - 8);

    // Grass tufts
    ctx.fillStyle = '#6DC04A';
    for (var g = 0; g < p.w; g += 12) {
      var gx = px + g;
      if (gx < -10 || gx > W + 10) continue;
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y);
      ctx.lineTo(gx + 3, GROUND_Y - 6 - Math.sin(g * 0.5) * 2);
      ctx.lineTo(gx + 6, GROUND_Y);
      ctx.fill();
    }

    // Obstacles
    for (var j = 0; j < p.obstacles.length; j++) {
      var ob = p.obstacles[j];
      var ox = px + ob.relX;
      if (ox < -30 || ox > W + 30) continue;

      if (ob.type === 'rock') {
        drawRock(ox, GROUND_Y);
      } else if (ob.type === 'spikes') {
        drawSpikes(ox, GROUND_Y);
      }
    }

    // Water puddles
    for (var w = 0; w < p.waters.length; w++) {
      var wp = p.waters[w];
      var wx = px + wp.relX;
      if (wx < -50 || wx > W + 50) continue;
      drawWater(wx, GROUND_Y, wp.w);
    }

    // Seeds
    for (var s = 0; s < p.seeds.length; s++) {
      var seed = p.seeds[s];
      if (seed.collected) continue;
      var sx = px + seed.relX;
      var sy = GROUND_Y + seed.relY + Math.sin(frameCount * 0.05 + seed.bob) * 3;
      if (sx < -10 || sx > W + 10) continue;
      drawSeed(sx, sy);
    }
  }
}

function drawRock(x, groundY) {
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(x - 12, groundY);
  ctx.lineTo(x - 10, groundY - 14);
  ctx.lineTo(x - 3, groundY - 20);
  ctx.lineTo(x + 5, groundY - 18);
  ctx.lineTo(x + 12, groundY - 10);
  ctx.lineTo(x + 10, groundY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#999';
  ctx.beginPath();
  ctx.moveTo(x - 3, groundY - 20);
  ctx.lineTo(x + 5, groundY - 18);
  ctx.lineTo(x + 2, groundY - 12);
  ctx.lineTo(x - 5, groundY - 14);
  ctx.closePath();
  ctx.fill();
}

function drawSpikes(x, groundY) {
  ctx.fillStyle = '#CC3333';
  for (var i = 0; i < 3; i++) {
    var sx = x - 12 + i * 10;
    ctx.beginPath();
    ctx.moveTo(sx, groundY);
    ctx.lineTo(sx + 5, groundY - 16);
    ctx.lineTo(sx + 10, groundY);
    ctx.closePath();
    ctx.fill();
  }
  // Shine on tips
  ctx.fillStyle = '#FF6666';
  for (var i = 0; i < 3; i++) {
    var sx = x - 12 + i * 10;
    ctx.beginPath();
    ctx.moveTo(sx + 3, groundY - 8);
    ctx.lineTo(sx + 5, groundY - 16);
    ctx.lineTo(sx + 7, groundY - 8);
    ctx.closePath();
    ctx.fill();
  }
}

function drawWater(x, groundY, w) {
  ctx.fillStyle = 'rgba(60,140,220,0.45)';
  ctx.fillRect(x, groundY - 3, w, 6);

  // Ripples
  ctx.strokeStyle = 'rgba(100,180,255,0.5)';
  ctx.lineWidth = 1;
  var rippleOff = (frameCount * 0.8) % 20;
  for (var r = 0; r < w; r += 10) {
    ctx.beginPath();
    ctx.arc(x + r + rippleOff % 10, groundY - 1, 3, 0, Math.PI, true);
    ctx.stroke();
  }
}

function drawSeed(x, y) {
  // Glow
  ctx.fillStyle = 'rgba(255,220,50,0.3)';
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fill();

  // Seed body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(x, y, 4, 3, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Shine
  ctx.fillStyle = '#FFF8B0';
  ctx.beginPath();
  ctx.arc(x - 1, y - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawHamsterBall(x, y, radius, rotation) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(x, y + radius + 3, radius * 0.7, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball fill (very subtle)
  ctx.fillStyle = 'rgba(200,230,255,0.1)';
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();

  // Hamster inside (rotates)
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, radius - 1, 0, Math.PI * 2);
  ctx.clip();

  ctx.translate(x, y);
  ctx.rotate(rotation);

  // Body
  ctx.fillStyle = '#c89050';
  ctx.beginPath();
  ctx.ellipse(0, 2, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#e8c888';
  ctx.beginPath();
  ctx.ellipse(0, 5, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#d8a060';
  ctx.beginPath();
  ctx.arc(6, -2, 6, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = '#e8b878';
  ctx.beginPath();
  ctx.arc(9, -7, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4, -8, 3, 0, Math.PI * 2);
  ctx.fill();

  // Inner ears
  ctx.fillStyle = '#ffbbaa';
  ctx.beginPath();
  ctx.arc(9, -7, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(4, -8, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(8, -3, 1.8, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8.5, -3.5, 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#ff8888';
  ctx.beginPath();
  ctx.arc(11, -1, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Tiny legs
  ctx.fillStyle = '#c89050';
  ctx.beginPath();
  ctx.ellipse(-4, 8, 3, 2, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4, 8, 3, 2, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.fillStyle = '#d8a060';
  ctx.beginPath();
  ctx.arc(-8, 0, 2.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Ball outline
  ctx.strokeStyle = 'rgba(100,180,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();

  // Ball shine
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.arc(x - radius * 0.3, y - radius * 0.3, radius * 0.25, 0, Math.PI * 2);
  ctx.fill();

  // Small secondary shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(x + radius * 0.2, y + radius * 0.15, radius * 0.12, 0, Math.PI * 2);
  ctx.fill();
}

function drawCatPaws() {
  for (var i = 0; i < catPaws.length; i++) {
    var cp = catPaws[i];
    var px = cp.x - scrollX;
    if (px < -60 || px > W + 60) continue;

    ctx.save();
    ctx.translate(px + cp.swipeX, cp.y);

    // Arm
    ctx.fillStyle = '#F0A050';
    ctx.fillRect(-12, -200, 24, 200);

    // Paw
    ctx.fillStyle = '#E89040';
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fill();

    // Paw pads
    ctx.fillStyle = '#FFB0B0';
    ctx.beginPath();
    ctx.arc(0, 4, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath(); ctx.arc(-7, -5, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -8, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -5, 4, 0, Math.PI * 2); ctx.fill();

    // Claws
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-8, -9); ctx.lineTo(-10, -15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(0, -18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, -9); ctx.lineTo(10, -15); ctx.stroke();

    ctx.restore();
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawUI() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 20px Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.strokeText('Score: ' + score, 10, 30);
  ctx.fillText('Score: ' + score, 10, 30);

  // High score
  ctx.textAlign = 'right';
  ctx.strokeText('Best: ' + highScore, W - 10, 30);
  ctx.fillText('Best: ' + highScore, W - 10, 30);

  // Hearts
  ctx.textAlign = 'center';
  for (var i = 0; i < 3; i++) {
    var hx = W / 2 - 30 + i * 30;
    var hy = 22;
    if (i < lives) {
      drawHeart(hx, hy, 10, '#FF4466');
    } else {
      drawHeart(hx, hy, 10, '#555');
    }
  }

  // Speed indicator
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '12px Arial, sans-serif';
  ctx.textAlign = 'left';
  var speedMult = (scrollSpeed / 3).toFixed(1);
  ctx.fillText('x' + speedMult, 10, 50);
}

function drawHeart(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y - size * 0.3, x - size, y - size * 0.3, x - size, y + size * 0.1);
  ctx.bezierCurveTo(x - size, y + size * 0.6, x, y + size, x, y + size);
  ctx.bezierCurveTo(x, y + size, x + size, y + size * 0.6, x + size, y + size * 0.1);
  ctx.bezierCurveTo(x + size, y - size * 0.3, x, y - size * 0.3, x, y + size * 0.3);
  ctx.fill();
}

// Collision helpers
function hamsterWorldX() { return scrollX + hamster.x; }
function hamsterWorldY() { return hamster.y; }

function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  var closestX = Math.max(rx, Math.min(cx, rx + rw));
  var closestY = Math.max(ry, Math.min(cy, ry + rh));
  var dx = cx - closestX;
  var dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}

function takeDamage() {
  if (invincible) return;
  lives--;
  playSound('hit');
  shakeTimer = 15;
  shakeAmount = 6;
  addParticles(hamster.x, hamster.y, '#ff4444', 10);

  if (lives <= 0) {
    gameOver();
    return;
  }

  invincible = true;
  invTimer = 90; // 1.5 seconds
}

function gameOver() {
  state = STATE_OVER;
  stopRolling();
  playSound('gameover');
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('hamsterrace_hs', highScore);
  }
}

// Update
function update() {
  if (state !== STATE_PLAY) return;

  frameCount++;

  // Hold for higher jump
  if (isHolding && !hamster.onGround && holdTime < MAX_HOLD_TIME) {
    holdTime++;
    if (holdTime < MAX_HOLD_TIME) {
      hamster.vy = Math.max(hamster.vy, JUMP_HOLD_VEL);
    }
  }

  // Gravity
  hamster.vy += GRAVITY;
  hamster.y += hamster.vy;

  // Scroll
  var effectiveSpeed = scrollSpeed;
  if (waterSlowTimer > 0) {
    effectiveSpeed *= 0.5;
    waterSlowTimer--;
  }
  scrollX += effectiveSpeed;

  // Rotation
  hamster.rotation += effectiveSpeed * 0.06;

  // Difficulty progression
  difficultyDist += effectiveSpeed;
  baseSpeed = 3 + Math.floor(difficultyDist / 500) * 0.3;
  baseSpeed = Math.min(baseSpeed, 9);
  scrollSpeed = baseSpeed;

  updateRolling(scrollSpeed);

  // Distance score
  distScore += effectiveSpeed;
  score = Math.floor(distScore / 10);

  // Ground collision
  hamster.onGround = false;
  var hwx = hamsterWorldX();
  var hwy = hamsterWorldY();
  var onPlatform = false;

  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (hwx + BALL_RADIUS > p.x && hwx - BALL_RADIUS < p.x + p.w) {
      if (hwy + BALL_RADIUS >= GROUND_Y && hamster.vy >= 0) {
        hamster.y = GROUND_Y - BALL_RADIUS;
        hamster.vy = 0;
        hamster.onGround = true;
        onPlatform = true;
      }

      // Obstacle collision
      if (!invincible) {
        for (var j = 0; j < p.obstacles.length; j++) {
          var ob = p.obstacles[j];
          var ox = p.x + ob.relX;

          if (ob.type === 'rock') {
            if (circleRect(hwx, hwy, BALL_RADIUS - 2, ox - 12, GROUND_Y - 20, 24, 20)) {
              takeDamage();
            }
          } else if (ob.type === 'spikes') {
            if (circleRect(hwx, hwy, BALL_RADIUS - 2, ox - 12, GROUND_Y - 16, 30, 16)) {
              takeDamage();
            }
          }
        }
      }

      // Water collision
      for (var w = 0; w < p.waters.length; w++) {
        var wp = p.waters[w];
        var wx = p.x + wp.relX;
        if (circleRect(hwx, hwy, BALL_RADIUS, wx, GROUND_Y - 3, wp.w, 6)) {
          waterSlowTimer = 10;
        }
      }

      // Seed collection
      for (var s = 0; s < p.seeds.length; s++) {
        var seed = p.seeds[s];
        if (seed.collected) continue;
        var sx = p.x + seed.relX;
        var sy = GROUND_Y + seed.relY;
        var dx = hwx - sx;
        var dy = hwy - sy;
        if (dx * dx + dy * dy < (BALL_RADIUS + 6) * (BALL_RADIUS + 6)) {
          seed.collected = true;
          score += 10;
          distScore += 100;
          playSound('seed');
          addParticles(p.x + seed.relX - scrollX, sy, '#FFD700', 6);
        }
      }
    }
  }

  // Fall off screen
  if (hamster.y > H + 50) {
    takeDamage();
    if (state === STATE_PLAY) {
      // Reset position
      hamster.y = GROUND_Y - BALL_RADIUS - 50;
      hamster.vy = 0;
      // Find a safe platform
      for (var i = 0; i < platforms.length; i++) {
        var p = platforms[i];
        if (p.x <= hwx && p.x + p.w >= hwx) {
          hamster.y = GROUND_Y - BALL_RADIUS;
          break;
        }
        if (p.x > hwx) {
          scrollX = p.x - hamster.x + 20;
          hamster.y = GROUND_Y - BALL_RADIUS;
          break;
        }
      }
    }
  }

  // Cat paws
  maybeSpawnCat();
  for (var i = catPaws.length - 1; i >= 0; i--) {
    var cp = catPaws[i];
    cp.timer++;
    if (cp.state === 'descend') {
      cp.y += 4;
      if (cp.y >= cp.targetY) {
        cp.state = 'swipe';
        cp.timer = 0;
      }
    } else if (cp.state === 'swipe') {
      cp.swipeX -= 6;
      if (cp.timer > 20) {
        cp.state = 'retract';
        cp.timer = 0;
      }
    } else if (cp.state === 'retract') {
      cp.y -= 5;
      if (cp.y < -200) {
        catPaws.splice(i, 1);
        continue;
      }
    }

    // Cat collision
    if (!invincible) {
      var cpx = cp.x - scrollX + cp.swipeX;
      var cpy = cp.y;
      var dx = hamster.x - cpx;
      var dy = hwy - cpy;
      if (dx * dx + dy * dy < (BALL_RADIUS + 15) * (BALL_RADIUS + 15)) {
        takeDamage();
      }
    }
  }

  // Invincibility
  if (invincible) {
    invTimer--;
    if (invTimer <= 0) {
      invincible = false;
    }
  }

  // Shake
  if (shakeTimer > 0) shakeTimer--;

  // Particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx - effectiveSpeed; // scroll with world
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  generateAhead();
}

// Render
function render() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    var sx = (Math.random() - 0.5) * shakeAmount;
    var sy = (Math.random() - 0.5) * shakeAmount;
    ctx.translate(sx, sy);
  }

  if (state === STATE_MENU) {
    drawMenuScreen();
  } else if (state === STATE_PLAY) {
    drawSky();
    drawGround();

    ctx.save();
    ctx.translate(-scrollX + hamster.x - 80 + scrollX, 0);
    // Actually we keep hamster at x=80 on screen, and offset world by scrollX
    ctx.restore();

    // We need to draw everything relative to scrollX
    drawPlatforms();
    drawCatPaws();
    drawParticles();

    // Hamster (always at screen x = hamster.x)
    if (!invincible || Math.floor(frameCount / 3) % 2 === 0) {
      drawHamsterBall(hamster.x, hamster.y, BALL_RADIUS, hamster.rotation);
    }

    // Rolling dust
    if (hamster.onGround && frameCount % 4 === 0) {
      addParticles(hamster.x - BALL_RADIUS, hamster.y + BALL_RADIUS, '#c8b898', 1);
    }

    drawUI();
  } else if (state === STATE_OVER) {
    drawSky();
    drawGround();
    drawPlatforms();
    if (Math.floor(Date.now() / 300) % 2 === 0) {
      drawHamsterBall(hamster.x, hamster.y, BALL_RADIUS, hamster.rotation);
    }
    drawGameOverScreen();
  }

  ctx.restore();
}

function drawMenuScreen() {
  // Background
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(0.6, '#B0E0FF');
  grad.addColorStop(0.75, '#5CAD3C');
  grad.addColorStop(1, '#3A6E1C');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  drawCloud(80, 80, 30);
  drawCloud(250, 60, 25);
  drawCloud(160, 120, 20);

  // Title
  ctx.save();
  ctx.translate(W / 2, 200);
  ctx.font = 'bold 42px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#2a6e1c';
  ctx.lineWidth = 5;
  ctx.strokeText('HAMSTER', 0, 0);
  ctx.fillText('HAMSTER', 0, 0);
  ctx.strokeText('RACE', 0, 45);
  ctx.fillText('RACE', 0, 45);
  ctx.restore();

  // Hamster ball on menu
  var menuTime = Date.now() * 0.002;
  drawHamsterBall(W / 2, 340, 30, menuTime);

  // Tap to play
  ctx.font = 'bold 22px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  var alpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
  ctx.globalAlpha = alpha;
  ctx.strokeText('TAP TO START', W / 2, 440);
  ctx.fillText('TAP TO START', W / 2, 440);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.font = '16px Arial, sans-serif';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.strokeText('Best: ' + highScore, W / 2, 480);
    ctx.fillText('Best: ' + highScore, W / 2, 480);
  }

  // Instructions
  ctx.font = '14px Arial, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('Tap to jump, hold for higher!', W / 2, 540);
  ctx.fillText('Collect seeds, avoid obstacles!', W / 2, 560);
}

function drawGameOverScreen() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  var panelY = 180;
  var panelH = 280;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  roundRect(ctx, 40, panelY, W - 80, panelH, 15);
  ctx.fill();
  ctx.strokeStyle = '#5CAD3C';
  ctx.lineWidth = 3;
  roundRect(ctx, 40, panelY, W - 80, panelH, 15);
  ctx.stroke();

  ctx.textAlign = 'center';

  // Game over text
  ctx.font = 'bold 32px Arial, sans-serif';
  ctx.fillStyle = '#CC3333';
  ctx.fillText('GAME OVER', W / 2, panelY + 50);

  // Score
  ctx.font = 'bold 24px Arial, sans-serif';
  ctx.fillStyle = '#333';
  ctx.fillText('Score: ' + score, W / 2, panelY + 100);

  // High score
  ctx.font = '20px Arial, sans-serif';
  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.fillText('NEW BEST!', W / 2, panelY + 135);
  } else {
    ctx.fillStyle = '#888';
    ctx.fillText('Best: ' + highScore, W / 2, panelY + 135);
  }

  // Distance
  ctx.font = '16px Arial, sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText('Distance: ' + Math.floor(difficultyDist / 10) + 'm', W / 2, panelY + 170);

  // Play again button
  ctx.fillStyle = '#5CAD3C';
  roundRect(ctx, W / 2 - 80, panelY + 200, 160, 50, 25);
  ctx.fill();

  ctx.font = 'bold 20px Arial, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('PLAY AGAIN', W / 2, panelY + 232);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Game loop
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

gameLoop();

})();
</script>
</body>
</html>
