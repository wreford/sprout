<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Grammar Gladiator ⚔️</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --bg: #121213;
      --bg2: #1a1a1e;
      --bg3: #232328;
      --border: #2e2e35;
      --text: #f0f0f0;
      --dim: #8a8a95;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #facc15;
      --blue: #60a5fa;
      --purple: #c084fc;
      --orange: #fb923c;
      --pink: #f472b6;
      --teal: #2dd4bf;
      --indigo: #818cf8;
      --lime: #a3e635;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      overflow-x: hidden;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes streakPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(74,222,128,0.2); }
      50% { box-shadow: 0 0 20px rgba(74,222,128,0.4); }
    }
    .fade-in { animation: fadeIn 0.35s ease; }
    .shake { animation: shake 0.4s ease; }
    .pop { animation: pop 0.25s ease; }

    /* Layout */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Start Screen */
    .start-screen {
      text-align: center;
      padding-top: 8vh;
      flex: 1;
      animation: fadeIn 0.5s ease;
    }
    .start-icon { font-size: 4rem; margin-bottom: 12px; }
    .start-title {
      font-family: var(--font-mono);
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--green), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .start-sub {
      color: var(--dim);
      font-size: 0.85rem;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .mode-btn {
      display: block;
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .mode-btn:hover {
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(74, 222, 128, 0.12);
    }
    .mode-btn:active { transform: translateY(0); }
    .mode-btn small {
      display: block;
      color: var(--dim);
      font-size: 0.75rem;
      font-weight: 400;
      margin-top: 4px;
    }
    .mode-section { margin-top: 18px; text-align: left; }
    .mode-section-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      padding-left: 2px;
    }
    .cat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .cat-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--green); transform: translateY(-1px); }
    .cat-btn:active { transform: translateY(0); }
    .cat-btn small {
      display: block;
      color: var(--dim);
      font-size: 0.65rem;
      font-weight: 400;
      margin-top: 2px;
    }
    .timer-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 20px 0 8px;
      color: var(--dim);
      font-size: 0.82rem;
    }
    .timer-toggle input {
      accent-color: var(--green);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .best-score {
      color: var(--dim);
      font-size: 0.72rem;
      font-family: var(--font-mono);
      margin-top: 14px;
    }

    /* Progress Bar */
    .progress-wrap {
      background: var(--bg3);
      border-radius: 20px;
      height: 6px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--teal));
      border-radius: 20px;
      transition: width 0.4s ease;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--dim);
    }
    .streak-badge {
      color: var(--yellow);
      font-weight: 700;
      animation: streakPop 0.3s ease;
    }
    .timer-display {
      color: var(--orange);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .timer-display.warn {
      color: var(--red);
      animation: pulse 0.6s infinite;
    }

    /* Question Card */
    .q-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
      animation: fadeIn 0.3s ease;
    }
    .q-card.wrong-shake { animation: shake 0.4s ease; }
    .q-card.correct-glow { animation: glowPulse 0.6s ease; }
    .q-cat {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid;
    }
    .q-number {
      color: var(--dim);
      font-size: 0.72rem;
      font-family: var(--font-mono);
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.55;
      margin-bottom: 4px;
    }

    /* Answer Buttons */
    .answers {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }
    .ans-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 52px;
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .ans-btn:hover:not(.locked) {
      border-color: var(--blue);
      background: rgba(96, 165, 250, 0.06);
    }
    .ans-btn .letter {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.8rem;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--bg3);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .ans-btn.correct {
      border-color: var(--green);
      background: rgba(74, 222, 128, 0.1);
    }
    .ans-btn.correct .letter {
      background: var(--green);
      color: #000;
    }
    .ans-btn.wrong {
      border-color: var(--red);
      background: rgba(248, 113, 113, 0.08);
    }
    .ans-btn.wrong .letter {
      background: var(--red);
      color: #000;
    }
    .ans-btn.locked { cursor: default; opacity: 0.55; }
    .ans-btn.show-correct {
      border-color: var(--green);
      opacity: 1;
    }

    /* Keyboard hint */
    .kbd-hint {
      text-align: center;
      color: var(--dim);
      font-size: 0.65rem;
      font-family: var(--font-mono);
      margin-top: 4px;
      opacity: 0.6;
    }
    .kbd-hint kbd {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.6rem;
    }

    /* Explanation */
    .explanation {
      background: var(--bg3);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.82rem;
      color: var(--dim);
      line-height: 1.55;
      animation: slideDown 0.3s ease;
      margin-bottom: 14px;
    }
    .explanation strong { color: var(--green); }
    .explanation .exp-wrong strong { color: var(--red); }

    /* Next Button */
    .next-btn {
      display: block;
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .next-btn:active { transform: translateY(0); }

    /* Results Screen */
    .results {
      text-align: center;
      padding-top: 4vh;
      flex: 1;
      animation: fadeIn 0.5s ease;
      padding-bottom: 40px;
    }
    .results-grade {
      font-size: 4rem;
      font-weight: 800;
      font-family: var(--font-mono);
      margin: 10px 0;
    }
    .results-score {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .results-pct {
      font-size: 2.2rem;
      font-weight: 800;
      font-family: var(--font-mono);
    }
    .results-msg {
      color: var(--dim);
      font-size: 0.9rem;
      margin: 12px 0 24px;
      line-height: 1.5;
      font-style: italic;
    }
    .results-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
    }
    .stat-val {
      font-size: 1.3rem;
      font-weight: 800;
      font-family: var(--font-mono);
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* Category Breakdown */
    .cat-breakdown { text-align: left; margin: 16px 0; }
    .cat-breakdown-title {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }
    .cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .cat-name {
      font-size: 0.75rem;
      font-weight: 600;
      width: 135px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cat-bar-wrap {
      flex: 1;
      background: var(--bg3);
      border-radius: 10px;
      height: 10px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }
    .cat-score {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--dim);
      width: 48px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Action buttons in results */
    .share-btn, .retry-btn {
      display: block;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      font-family: var(--font-sans);
      transition: all 0.15s;
    }
    .share-btn { background: var(--blue); color: #fff; }
    .share-btn:hover { opacity: 0.9; }
    .retry-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .retry-btn:hover { border-color: var(--green); }

    /* Weakness tip card */
    .weakness-tip {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin: 10px 0;
      text-align: left;
      font-size: 0.82rem;
      color: var(--dim);
    }
    .weakness-tip strong { color: var(--text); }

    /* New best badge */
    .new-best {
      display: inline-block;
      background: var(--yellow);
      color: #000;
      font-size: 0.65rem;
      font-weight: 800;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 8px;
      animation: pop 0.4s ease;
    }

    /* Mobile optimizations */
    @media (max-width: 480px) {
      .container { padding: 12px; }
      .q-text { font-size: 1.05rem; }
      .cat-name { width: 110px; font-size: 0.7rem; }
      .results-stats { gap: 6px; }
      .stat-box { padding: 10px 6px; }
      .stat-val { font-size: 1.1rem; }
    }
  </style>
</head>

<script>
// ═══════════════════════════════════════════
//  AUDIO - All sine waves, max 0.02 volume
// ═══════════════════════════════════════════
var audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq, dur, type, vol) {
  try {
    var c = getAudio();
    var osc = c.createOscillator();
    var gain = c.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(Math.min(vol || 0.02, 0.02), c.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start();
    osc.stop(c.currentTime + dur);
  } catch (e) {}
}

// Correct: pleasant ascending chime, pitch rises with streak
function sndCorrect(streak) {
  var base = 523 + Math.min(streak, 8) * 40;
  tone(base, 0.1, 'sine', 0.02);
  setTimeout(function() { tone(base * 1.26, 0.12, 'sine', 0.018); }, 70);
}

// Wrong: low buzz
function sndWrong() {
  tone(180, 0.25, 'sawtooth', 0.015);
}

// Perfect score: triumphant fanfare
function sndPerfect() {
  [523, 659, 784, 1047].forEach(function(f, i) {
    setTimeout(function() { tone(f, 0.25, 'sine', 0.02); }, i * 120);
  });
}

// ═══════════════════════════════════════════
//  NARRATOR - British, proven cancel->60ms->speak
//  Rate 0.9, pitch 0.85, 10-second gap
// ═══════════════════════════════════════════
var narratorLines = [
  "Choose wisely.",
  "Grammar matters.",
  "Think about it.",
  "That was correct. Well done.",
  "Incorrect. How embarrassing.",
  "The English language is cruel.",
  "Your streak is impressive.",
  "Fewer, not less. Always fewer.",
  "Their, there, they're. The holy trinity of confusion.",
  "Spelling is a lost art.",
  "Your English teacher would be proud. Or horrified.",
  "Effect is the noun. Usually.",
  "Who versus whom. The eternal struggle.",
  "Grammar: the difference between knowing your stuff and knowing you're stuff.",
  "Apostrophes save lives. Let's eat, grandma."
];
var lastNarration = 0;

function narrate() {
  if (!window.speechSynthesis) return;
  var now = Date.now();
  if (now - lastNarration < 10000) return; // 10-second gap
  lastNarration = now;
  var line = narratorLines[Math.floor(Math.random() * narratorLines.length)];
  // Proven pattern: cancel, wait 60ms, then speak
  window.speechSynthesis.cancel();
  setTimeout(function() {
    var u = new SpeechSynthesisUtterance(line);
    u.rate = 0.9;
    u.pitch = 0.85;
    var voices = window.speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].lang.indexOf('en-GB') > -1) { u.voice = voices[i]; break; }
    }
    window.speechSynthesis.speak(u);
  }, 60);
}

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
var CAT_COLORS = {

// ═══════════════════════════════════════════
//  ALL 67 QUESTIONS
// ═══════════════════════════════════════════

var ALL_Q = [

  // ─── Their/There/They're (10 questions) ───

  { cat: "Their/There/They're",
    q: "_____ going to the store later.",
    o: ["Their", "There", "They're", "Thier"],
    a: 2,

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",

  { cat: "Their/There/They're",
    q: "_____ going to regret that decision.",
    o: ["There", "Their", "They're", "Thier"],
    a: 2,
    exp: "They're = they are. \"They are going to regret it.\"" },

  // ─── Your/You're (8 questions) ───

  { cat: "Your/You're",

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
var state = {
  screen: 'start',
  questions: [],
  current: 0,
  score: 0,
  streak: 0,
  maxStreak: 0,
  answered: null,       // null = unanswered, true = correct, false = wrong
  selectedAnswer: -1,   // which option was clicked
  timerOn: true,
  timeLeft: 15,
  timerInterval: null,
  startTime: 0,
  endTime: 0,
  catStats: {},
  isNewBest: false
};

// ═══════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i];
    arr[i] = arr[j];
    arr[j] = tmp;
  }
  return arr;
}

function formatTime(ms) {
  var totalSec = Math.floor(ms / 1000);
  var min = Math.floor(totalSec / 60);
  var sec = totalSec % 60;
  return min + ':' + (sec < 10 ? '0' : '') + sec;
}

function getGrade(pct) {
  if (pct >= 97) return 'A+';
  if (pct >= 93) return 'A';
  if (pct >= 90) return 'A-';
  if (pct >= 87) return 'B+';
  if (pct >= 83) return 'B';
  if (pct >= 80) return 'B-';
  if (pct >= 77) return 'C+';
  if (pct >= 73) return 'C';
  if (pct >= 70) return 'C-';
  if (pct >= 67) return 'D+';
  if (pct >= 63) return 'D';
  if (pct >= 60) return 'D-';
  return 'F';
}

function getMessage(pct) {
  if (pct >= 90) return "Grammar God! Oxford would be proud.";
  if (pct >= 80) return "Solid! You actually paid attention in school.";
  if (pct >= 70) return "Not bad. Your emails are probably fine.";
  if (pct >= 60) return "Yikes. Your autocorrect is working overtime.";
  return "We need to talk about your text messages.";
}

// ═══════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════
function startGame(mode, cat) {
  var qs;
  if (cat) {
    qs = ALL_Q.filter(function(q) { return q.cat === cat; });
  } else if (mode === 'quick') {
    qs = shuffle(ALL_Q.slice()).slice(0, 20);
  } else {
    qs = shuffle(ALL_Q.slice());
  }

  state.questions = qs;
  state.current = 0;
  state.score = 0;
  state.streak = 0;
  state.maxStreak = 0;
  state.answered = null;
  state.selectedAnswer = -1;
  state.startTime = Date.now();
  state.isNewBest = false;

  // Initialize category stats
  state.catStats = {};
  CATEGORIES.forEach(function(c) {
    state.catStats[c] = { correct: 0, total: 0 };
  });

  state.screen = 'play';
  startTimer();
  render();
  narrate();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timeLeft = 15;
  if (!state.timerOn) return;

  state.timerInterval = setInterval(function() {
    if (state.answered !== null) return;
    state.timeLeft--;
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      selectAnswer(-1); // time's up = wrong
    }
    render();
  }, 1000);
}

function selectAnswer(idx) {
  if (state.answered !== null) return;
  clearInterval(state.timerInterval);

  var q = state.questions[state.current];
  state.selectedAnswer = idx;
  var isCorrect = (idx === q.a);
  state.answered = isCorrect;
  state.catStats[q.cat].total++;

  if (isCorrect) {
    state.score++;
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    state.catStats[q.cat].correct++;
    sndCorrect(state.streak);
  } else {
    state.streak = 0;
    sndWrong();
  }

  render();
  if (Math.random() < 0.35) narrate();
}

function nextQuestion() {
  if (state.current >= state.questions.length - 1) {
    // Quiz complete - show results
    state.endTime = Date.now();
    state.screen = 'results';
    clearInterval(state.timerInterval);

    var pct = Math.round(state.score / state.questions.length * 100);
    if (pct === 100) sndPerfect();

    // Save best score to localStorage
    var best = localStorage.getItem('grammar_best');
    if (!best || pct > parseInt(best)) {
      localStorage.setItem('grammar_best', '' + pct);
      state.isNewBest = true;
    }

    render();
    narrate();
    return;
  }

  state.current++;
  state.answered = null;
  state.selectedAnswer = -1;
  startTimer();
  render();
  if (Math.random() < 0.2) narrate();
}

function shareResults() {
  var pct = Math.round(state.score / state.questions.length * 100);
  var grade = getGrade(pct);
  var txt = "I scored " + pct + "% on Grammar Gladiator! (" +
            state.score + "/" + state.questions.length + ") " + grade + " ⚔️";

  if (navigator.share) {
    navigator.share({ text: txt }).catch(function() {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function() {
      alert('Copied to clipboard!');
    });
  } else {
    alert(txt);
  }
}

// ═══════════════════════════════════════════
//  KEYBOARD SUPPORT
// ═══════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (state.screen === 'play') {
    if (state.answered === null) {
      // A/1, B/2, C/3, D/4 to pick answer
      var key = e.key.toUpperCase();
      if (key === 'A' || key === '1') selectAnswer(0);
      else if (key === 'B' || key === '2') selectAnswer(1);
      else if (key === 'C' || key === '3') selectAnswer(2);
      else if (key === 'D' || key === '4') selectAnswer(3);
    } else {
      // Enter or Space or right arrow to go next
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') {
        e.preventDefault();
        nextQuestion();
      }
    }
  }
});

// ═══════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════
function render() {
  var app = document.getElementById('app');
  if (state.screen === 'start') renderStart(app);
  else if (state.screen === 'play') renderPlay(app);
  else renderResults(app);
}

// ── Start Screen ──
function renderStart(app) {
  var best = localStorage.getItem('grammar_best');
  var h = '<div class="start-screen">';
  h += '<div class="start-icon">⚔️</div>';
  h += '<div class="start-title">Grammar Gladiator</div>';
  h += '<div class="start-sub">67 grammar and spelling questions for adults.<br>How well do you really know English?</div>';

  // Mode buttons
  h += '<button class="mode-btn" onclick="startGame(\'all\')">';
  h += '⚔️ All 67 Questions';
  h += '<small>The full gauntlet. Prove your mastery.</small>';
  h += '</button>';

  h += '<button class="mode-btn" onclick="startGame(\'quick\')">';
  h += '⚡ Quick 20';
  h += '<small>Random selection. Fast and fierce.</small>';
  h += '</button>';

  // Timer toggle
  h += '<div class="timer-toggle">';
  h += '<label><input type="checkbox" id="timerCheck" ';
  h += (state.timerOn ? 'checked' : '');
  h += ' onchange="state.timerOn=this.checked"> 15-second timer per question</label>';
  h += '</div>';

  // Category selection
  h += '<div class="mode-section">';
  h += '<div class="mode-section-title">Play by Category</div>';
  h += '<div class="cat-grid">';
  CATEGORIES.forEach(function(cat) {
    var count = ALL_Q.filter(function(q) { return q.cat === cat; }).length;
    var icon = CAT_ICONS[cat] || '';
    h += '<button class="cat-btn" onclick="startGame(\'cat\',\'' + cat.replace(/'/g, "\\'") + '\')">';
    h += icon + ' ' + cat;
    h += '<small>' + count + ' questions</small>';
    h += '</button>';
  });
  h += '</div></div>';

  // Best score
  if (best) {
    h += '<div class="best-score">Personal best: ' + best + '% (' + getGrade(parseInt(best)) + ')</div>';
  }
  h += '</div>';
  app.innerHTML = h;
}

// ── Play Screen ──
function renderPlay(app) {
  var q = state.questions[state.current];
  var total = state.questions.length;
  var progressPct = ((state.current + (state.answered !== null ? 1 : 0)) / total * 100).toFixed(1);
  var letters = ['A', 'B', 'C', 'D'];
  var catColor = CAT_COLORS[q.cat] || 'var(--green)';

  var h = '';

  // Progress bar
  h += '<div class="progress-wrap">';
  h += '<div class="progress-fill" style="width:' + progressPct + '%"></div>';
  h += '</div>';

  // Top bar: score, streak, timer
  h += '<div class="top-bar">';
  h += '<span>' + state.score + ' / ' + total + '</span>';
  if (state.streak > 1) {
    h += '<span class="streak-badge">🔥 ' + state.streak + ' streak</span>';
  }
  if (state.timerOn && state.answered === null) {
    var timerClass = 'timer-display' + (state.timeLeft <= 5 ? ' warn' : '');
    h += '<span class="' + timerClass + '">' + state.timeLeft + 's</span>';
  }
  h += '</div>';

  // Question card
  var cardClass = 'q-card';
  if (state.answered === false) cardClass += ' wrong-shake';
  else if (state.answered === true) cardClass += ' correct-glow';
  h += '<div class="' + cardClass + '">';
  h += '<div class="q-cat" style="color:' + catColor + ';border-color:' + catColor + '">';
  h += (CAT_ICONS[q.cat] || '') + ' ' + q.cat + '</div>';
  h += '<div class="q-number">Question ' + (state.current + 1) + ' of ' + total + '</div>';
  h += '<div class="q-text">' + q.q + '</div>';
  h += '</div>';

  // Answer buttons
  h += '<div class="answers">';
  for (var i = 0; i < q.o.length; i++) {
    var cls = 'ans-btn';
    if (state.answered !== null) {
      cls += ' locked';
      if (i === q.a) cls += ' correct show-correct';
      if (i === state.selectedAnswer && i !== q.a) cls += ' wrong';
    }
    h += '<button class="' + cls + '" onclick="selectAnswer(' + i + ')">';
    h += '<span class="letter">' + letters[i] + '</span>';
    h += '<span>' + q.o[i] + '</span>';
    h += '</button>';
  }
  h += '</div>';

  // Explanation after answering
  if (state.answered !== null) {
    if (state.answered) {
      h += '<div class="explanation">✅ <strong>Correct!</strong> ' + q.exp + '</div>';
    } else {
      if (state.selectedAnswer === -1) {
        h += '<div class="explanation">⏰ <strong>Time\'s up!</strong> The answer was <strong>' + q.o[q.a] + '</strong>. ' + q.exp + '</div>';
      } else {
        h += '<div class="explanation">❌ <strong>Wrong.</strong> The answer was <strong>' + q.o[q.a] + '</strong>. ' + q.exp + '</div>';
      }
    }

    var btnLabel = (state.current >= total - 1) ? 'See Results' : 'Next Question →';
    h += '<button class="next-btn" onclick="nextQuestion()">' + btnLabel + '</button>';
  }

  // Keyboard hint (desktop only)
  if (state.answered === null) {
    h += '<div class="kbd-hint">Press <kbd>A</kbd> <kbd>B</kbd> <kbd>C</kbd> <kbd>D</kbd> to answer</div>';
  } else {
    h += '<div class="kbd-hint">Press <kbd>Enter</kbd> to continue</div>';
  }

  app.innerHTML = h;
}

// ── Results Screen ──
function renderResults(app) {
  var total = state.questions.length;
  var pct = Math.round(state.score / total * 100);
  var grade = getGrade(pct);
  var msg = getMessage(pct);
  var elapsed = state.endTime - state.startTime;
  var gradeColor = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--yellow)' : 'var(--red)';

  var h = '<div class="results">';
  h += '<div class="start-icon">⚔️</div>';

  // New best badge
  if (state.isNewBest) {
    h += '<div class="new-best">NEW PERSONAL BEST!</div>';
  }

  // Grade and score
  h += '<div class="results-grade" style="color:' + gradeColor + '">' + grade + '</div>';
  h += '<div class="results-score">' + state.score + ' / ' + total + '</div>';
  h += '<div class="results-pct" style="color:' + gradeColor + '">' + pct + '%</div>';
  h += '<div class="results-msg">"' + msg + '"</div>';

  // Stats row
  h += '<div class="results-stats">';
  h += '<div class="stat-box">';
  h += '<div class="stat-val" style="color:var(--yellow)">🔥 ' + state.maxStreak + '</div>';
  h += '<div class="stat-label">Best Streak</div>';
  h += '</div>';
  h += '<div class="stat-box">';
  h += '<div class="stat-val" style="color:var(--blue)">' + formatTime(elapsed) + '</div>';
  h += '<div class="stat-label">Time Taken</div>';
  h += '</div>';
  h += '<div class="stat-box">';
  h += '<div class="stat-val" style="color:var(--green)">' + total + '</div>';
  h += '<div class="stat-label">Questions</div>';
  h += '</div>';
  h += '</div>';

  // Category breakdown with colored bars
  h += '<div class="cat-breakdown">';
  h += '<div class="cat-breakdown-title">Category Breakdown</div>';
  var weakest = '';
  var weakPct = 101;

  CATEGORIES.forEach(function(cat) {
    var s = state.catStats[cat];
    if (s.total === 0) return;
    var cp = Math.round(s.correct / s.total * 100);
    if (cp < weakPct) { weakPct = cp; weakest = cat; }
    var barColor = CAT_COLORS[cat] || 'var(--green)';

    h += '<div class="cat-row">';
    h += '<div class="cat-name" style="color:' + barColor + '">';
    h += (CAT_ICONS[cat] || '') + ' ' + cat + '</div>';
    h += '<div class="cat-bar-wrap">';
    h += '<div class="cat-bar-fill" style="width:' + cp + '%;background:' + barColor + '"></div>';
    h += '</div>';
    h += '<div class="cat-score">' + s.correct + '/' + s.total + '</div>';
    h += '</div>';
  });
  h += '</div>';

  // Weakest area tip
  if (weakest && weakPct < 100) {
    h += '<div class="weakness-tip">';
    h += '💡 <strong>Weakest area:</strong> ' + weakest + ' (' + weakPct + '%). ';
    h += 'Try practicing that category!';
    h += '</div>';
  }

  // Perfect score celebration
  if (pct === 100) {
    h += '<div class="weakness-tip" style="border-color:var(--green);text-align:center">';
    h += '🏆 <strong style="color:var(--green)">PERFECT SCORE!</strong> ';
    h += 'You made zero mistakes. Absolutely flawless.';
    h += '</div>';
  }

  // Action buttons
  h += '<button class="share-btn" onclick="shareResults()">📋 Share Results</button>';
  h += '<button class="retry-btn" onclick="state.screen=\'start\';render()">← Back to Menu</button>';
  h += '</div>';
  app.innerHTML = h;
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
render();

// Pre-load voices for narrator
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() {
    window.speechSynthesis.getVoices();
  };
}
</script>
</body>
</html>
