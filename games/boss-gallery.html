<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Boss Gallery</title>
<style>
body{background:#000;color:#0f0;font:12px monospace;display:flex;flex-wrap:wrap;gap:20px;padding:20px;justify-content:center}
.boss{text-align:center;border:2px solid #333;padding:10px;background:#0a0a0a}
.boss h3{color:#ff0;margin:0 0 4px}
.boss .stats{color:#888;font-size:9px}
canvas{image-rendering:pixelated;display:block;margin:4px auto}
</style></head><body>
<script>
const BOSSES=[
  {name:'GRABOID KING',hp:500,atk:'Ground Slam',color:'#c08040',draw:(c,x,y)=>{
    // massive worm with crown
    c.fillStyle='#c08040';c.fillRect(x-20,y-40,40,40);c.fillRect(x-25,y-25,50,20);
    c.fillStyle='#a06030';c.fillRect(x-15,y-35,30,10);
    // crown
    c.fillStyle='#ff0';c.fillRect(x-12,y-45,24,6);
    c.fillRect(x-12,y-50,4,6);c.fillRect(x-2,y-52,4,8);c.fillRect(x+8,y-50,4,6);
    c.fillStyle='#f00';c.fillRect(x-1,y-49,2,2);
    // eyes
    c.fillStyle='#f00';c.fillRect(x-8,y-35,4,4);c.fillRect(x+4,y-35,4,4);
    c.fillStyle='#ff0';c.fillRect(x-7,y-34,2,2);c.fillRect(x+5,y-34,2,2);
    // mouth/teeth
    c.fillStyle='#400';c.fillRect(x-10,y-22,20,8);
    c.fillStyle='#fff';for(let t=-8;t<=8;t+=4)c.fillRect(x+t,y-22,2,3);
    c.fillStyle='#fff';for(let t=-8;t<=8;t+=4)c.fillRect(x+t,y-17,2,3);
    // tentacles
    c.fillStyle='#d09050';
    for(let t=-2;t<=2;t++){
      const tx=x+t*12,wobble=Math.sin(Date.now()*.003+t)*5;
      c.fillRect(tx-2,y-5,4,15);c.fillRect(tx-3+wobble,y+8,6,4);
    }
  }},
  {name:'MECHA LEMMING',hp:350,atk:'Rocket Swarm',color:'#0ff',draw:(c,x,y)=>{
    // giant robot lemming
    // legs (mechanical)
    c.fillStyle='#555';c.fillRect(x-12,y-5,6,12);c.fillRect(x+6,y-5,6,12);
    c.fillStyle='#444';c.fillRect(x-14,y+5,4,4);c.fillRect(x+10,y+5,4,4);
    // body (armored)
    c.fillStyle='#0aa';c.fillRect(x-14,y-25,28,22);
    c.fillStyle='#088';c.fillRect(x-12,y-23,24,18);
    // chest core
    c.fillStyle='#f00';c.fillRect(x-3,y-18,6,6);
    c.fillStyle='#ff0';c.fillRect(x-1,y-16,2,2);
    // arms (missile pods)
    c.fillStyle='#666';c.fillRect(x-22,y-22,8,16);c.fillRect(x+14,y-22,8,16);
    c.fillStyle='#f80';c.fillRect(x-20,y-24,4,2);c.fillRect(x-20,y-20,4,2);
    c.fillRect(x+16,y-24,4,2);c.fillRect(x+16,y-20,4,2);
    // head (green hair!)
    c.fillStyle='#0f0';c.fillRect(x-6,y-35,12,4);c.fillRect(x-4,y-38,8,4);
    c.fillStyle='#0aa';c.fillRect(x-8,y-32,16,8);
    // visor
    c.fillStyle='#f00';c.fillRect(x-5,y-30,10,3);
    c.fillStyle='#ff0';c.fillRect(x-3,y-29,2,1);c.fillRect(x+2,y-29,2,1);
  }},
  {name:'DEATH BLIMP',hp:400,atk:'Bomb Rain',color:'#f80',draw:(c,x,y)=>{
    // massive evil airship
    c.fillStyle='#444';
    c.beginPath();c.ellipse(x,y-30,35,18,0,0,Math.PI*2);c.fill();
    c.fillStyle='#333';
    c.beginPath();c.ellipse(x,y-30,32,15,0,0,Math.PI*2);c.fill();
    // red stripes
    c.fillStyle='#800';c.fillRect(x-30,y-32,60,3);c.fillRect(x-28,y-26,56,2);
    // skull emblem
    c.fillStyle='#fff';c.fillRect(x-5,y-35,10,8);
    c.fillStyle='#000';c.fillRect(x-3,y-34,2,2);c.fillRect(x+1,y-34,2,2);
    c.fillRect(x-2,y-30,4,2);
    // gondola
    c.fillStyle='#555';c.fillRect(x-10,y-10,20,8);
    c.fillStyle='#666';c.fillRect(x-8,y-12,16,3);
    // cannons
    c.fillStyle='#888';
    c.fillRect(x-15,y-8,4,6);c.fillRect(x+11,y-8,4,6);
    c.fillRect(x-5,y-2,10,4);
    // bombs dropping
    c.fillStyle='#f80';
    for(let b=0;b<3;b++){
      const bx=x-8+b*8,by=y+4+Math.sin(Date.now()*.005+b)*3;
      c.fillRect(bx,by,4,6);c.fillStyle='#f00';c.fillRect(bx+1,by+5,2,2);c.fillStyle='#f80';
    }
    // propellers
    c.fillStyle='#aaa';
    const p=Math.sin(Date.now()*.02)*6;
    c.fillRect(x-35,y-31+p,4,2);c.fillRect(x-35,y-29-p,4,2);
    c.fillRect(x+31,y-31-p,4,2);c.fillRect(x+31,y-29+p,4,2);
  }},
  {name:'NUKE GOLEM',hp:600,atk:'Meltdown',color:'#0f0',draw:(c,x,y)=>{
    // radiation monster made of glowing rocks
    // feet
    c.fillStyle='#383';c.fillRect(x-16,y-4,10,8);c.fillRect(x+6,y-4,10,8);
    // body
    c.fillStyle='#2a2';c.fillRect(x-18,y-30,36,28);
    c.fillStyle='#1a1';c.fillRect(x-14,y-26,28,20);
    // cracks (glowing)
    c.fillStyle='#ff0';c.fillRect(x-10,y-24,2,16);c.fillRect(x+8,y-20,2,12);
    c.fillRect(x-4,y-18,12,2);
    // core (pulsing)
    const pulse=Math.sin(Date.now()*.004)*2;
    c.fillStyle='#ff0';c.fillRect(x-4-pulse,y-20-pulse,8+pulse*2,8+pulse*2);
    c.fillStyle='#fff';c.fillRect(x-2,y-18,4,4);
    // radiation symbol
    c.fillStyle='#000';c.fillRect(x-1,y-17,2,2);
    // arms (rocky)
    c.fillStyle='#2a2';
    c.fillRect(x-26,y-26,10,8);c.fillRect(x-28,y-20,8,12);
    c.fillRect(x+16,y-26,10,8);c.fillRect(x+20,y-20,8,12);
    // fists
    c.fillStyle='#383';c.fillRect(x-30,y-10,8,8);c.fillRect(x+22,y-10,8,8);
    // head
    c.fillStyle='#2a2';c.fillRect(x-10,y-40,20,12);
    c.fillStyle='#f00';c.fillRect(x-6,y-37,4,3);c.fillRect(x+2,y-37,4,3);
    c.fillStyle='#ff0';c.fillRect(x-5,y-36,2,1);c.fillRect(x+3,y-36,2,1);
    c.fillStyle='#400';c.fillRect(x-4,y-32,8,2);
    // glow particles
    c.fillStyle='rgba(0,255,0,.3)';
    for(let g=0;g<5;g++){
      const gx=x-20+Math.sin(Date.now()*.002+g*1.3)*25;
      const gy=y-30+Math.cos(Date.now()*.003+g*1.7)*15;
      c.fillRect(gx,gy,3,3);
    }
  }},
  {name:'SKULL LORD',hp:450,atk:'Death Beam',color:'#f0f',draw:(c,x,y)=>{
    // floating skull with magic
    // body/robes
    c.fillStyle='#206';c.fillRect(x-16,y-15,32,20);
    c.fillStyle='#104';
    for(let r=0;r<5;r++)c.fillRect(x-16+r*2,y+3,4,3+r);
    // skull
    c.fillStyle='#eee';c.fillRect(x-12,y-38,24,22);
    c.fillStyle='#ddd';c.fillRect(x-10,y-36,20,18);
    // eye sockets
    c.fillStyle='#000';c.fillRect(x-8,y-33,6,6);c.fillRect(x+2,y-33,6,6);
    // glowing eyes
    c.fillStyle='#f0f';c.fillRect(x-6,y-31,3,3);c.fillRect(x+3,y-31,3,3);
    // nose
    c.fillStyle='#000';c.fillRect(x-2,y-26,4,3);
    // teeth
    c.fillStyle='#000';c.fillRect(x-6,y-22,12,4);
    c.fillStyle='#eee';for(let t=-4;t<=4;t+=2)c.fillRect(x+t,y-22,2,3);
    // crown/horns
    c.fillStyle='#f0f';
    c.fillRect(x-14,y-42,4,8);c.fillRect(x+10,y-42,4,8);
    c.fillRect(x-16,y-46,4,6);c.fillRect(x+12,y-46,4,6);
    // magic orbs
    c.fillStyle='#f0f';
    const o1=Math.sin(Date.now()*.003)*10;
    const o2=Math.cos(Date.now()*.003)*10;
    c.beginPath();c.arc(x-20+o1,y-25+o2,4,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(x+20-o1,y-25-o2,4,0,Math.PI*2);c.fill();
    // beam charging
    c.fillStyle='rgba(255,0,255,.2)';
    c.fillRect(x-25,y-35,50,3);
  }},
  {name:'TANK HYDRA',hp:550,atk:'Triple Cannon',color:'#f00',draw:(c,x,y)=>{
    // 3-headed tank monster
    // treads (massive)
    c.fillStyle='#444';c.fillRect(x-28,y-4,56,8);
    c.fillStyle='#333';for(let w=-26;w<=26;w+=4)c.fillRect(x+w,y-2,3,4);
    // body
    c.fillStyle='#800';c.fillRect(x-22,y-16,44,14);
    c.fillStyle='#600';c.fillRect(x-18,y-12,36,6);
    // 3 turrets
    const heads=[{dx:-14,dy:-22,a:120},{dx:0,dy:-26,a:90},{dx:14,dy:-22,a:60}];
    heads.forEach(h=>{
      c.fillStyle='#a00';c.fillRect(x+h.dx-5,y+h.dy,10,8);
      // barrel
      const rad=h.a*Math.PI/180;
      c.strokeStyle='#c00';c.lineWidth=3;
      c.beginPath();c.moveTo(x+h.dx,y+h.dy);
      c.lineTo(x+h.dx+Math.cos(rad)*14,y+h.dy-Math.sin(rad)*14);c.stroke();
      // eyes
      c.fillStyle='#ff0';c.fillRect(x+h.dx-3,y+h.dy+2,2,2);c.fillRect(x+h.dx+1,y+h.dy+2,2,2);
    });
    // armor plates
    c.fillStyle='#900';c.fillRect(x-24,y-14,4,10);c.fillRect(x+20,y-14,4,10);
    // exhaust
    c.fillStyle='#f80';
    const ex=Math.sin(Date.now()*.01)*2;
    c.fillRect(x-26,y-8+ex,3,4);c.fillRect(x+23,y-8-ex,3,4);
  }}
];

BOSSES.forEach(boss=>{
  const div=document.createElement('div');div.className='boss';
  div.innerHTML='<h3>'+boss.name+'</h3>';
  const cv=document.createElement('canvas');cv.width=120;cv.height=120;
  cv.style.width='120px';cv.style.height='120px';
  const c=cv.getContext('2d');
  c.imageSmoothingEnabled=false;

  function draw(){
    c.clearRect(0,0,120,120);
    // ground
    c.fillStyle='#1a3a1a';c.fillRect(0,100,120,20);
    c.fillStyle='#2a5a2a';c.fillRect(0,98,120,3);
    boss.draw(c,60,98);
    requestAnimationFrame(draw);
  }
  draw();

  div.appendChild(cv);
  div.innerHTML+='<div class="stats">HP: '+boss.hp+' | ATK: '+boss.atk+'</div>';
  document.body.appendChild(div);
});
</script></body></html>
