<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Sketchables — Kiwi's Art Ideas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF6EC;--surface:#fff;--border:#e0d8cc;--text:#2a2520;--dim:#8a8078;
  --terracotta:#c45e3a;--olive:#6b7c3a;--dusty-blue:#5a7d9a;--mauve:#9a6b8a;--sienna:#a0522d;--sage:#7a8b6a;
  --btn:#3a2a1a;--btn-text:#FDF6EC;--radius:14px;
}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;align-items:center;padding:0 20px 32px;position:relative}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(0,0,0,.018) 30px,rgba(0,0,0,.018) 31px)}
a{color:var(--dim);text-decoration:none}
a:hover{color:var(--text)}
.back-link{align-self:flex-start;margin:12px 0 0;font-size:0.85rem;z-index:1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

header{text-align:center;margin:28px 0 4px;z-index:1}
header h1{font-size:clamp(2.4rem,7vw,3.8rem);font-weight:900;letter-spacing:-1px;color:var(--text);line-height:1;
  font-style:italic;transform:rotate(-1.5deg);display:inline-block}
header .subtitle{font-size:clamp(0.85rem,2.5vw,1rem);color:var(--dim);margin-top:6px;font-style:italic;letter-spacing:.5px}

.combo-count{text-align:center;margin:6px 0 24px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:0.78rem;color:var(--dim);z-index:1}
.combo-count b{color:var(--terracotta)}

.prompt-card{background:var(--surface);border:2px solid var(--border);border-radius:18px;
  padding:36px 28px 28px;max-width:640px;width:100%;margin:0 auto 18px;min-height:140px;
  display:flex;align-items:center;justify-content:center;text-align:center;position:relative;
  z-index:1;box-shadow:0 2px 24px rgba(0,0,0,.04)}
.prompt-text{font-size:clamp(1.15rem,3.2vw,1.6rem);line-height:1.7;font-style:italic}
.prompt-text .cw{font-weight:700;display:inline-block;transition:opacity .3s,transform .3s}
.prompt-text .cw.pop{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{0%{opacity:0;transform:translateY(12px) scale(.9)}100%{opacity:1;transform:none}}
.fav-btn{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1.4rem;cursor:pointer;
  opacity:.35;transition:opacity .2s,transform .2s}
.fav-btn:hover,.fav-btn.active{opacity:1;transform:scale(1.15)}
.fav-btn.active{color:#d4822f}

.pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:640px;margin:0 auto 20px;z-index:1}
.pill{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:0.78rem;font-weight:600;
  cursor:pointer;border:2px solid;transition:transform .15s,box-shadow .15s;user-select:none;
  -webkit-tap-highlight-color:transparent}
.pill:active{transform:scale(.95)}
.pill .lock{font-size:0.6rem;opacity:.4;transition:opacity .15s}
.pill.locked{opacity:.65;border-style:dashed}
.pill.locked .lock{opacity:1}

.big-btn{display:block;width:100%;max-width:640px;margin:0 auto 20px;padding:16px 32px;border-radius:var(--radius);
  border:none;background:var(--btn);color:var(--btn-text);font-family:Georgia,'Times New Roman',serif;
  font-size:1.15rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;z-index:1;
  transition:transform .12s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.big-btn:hover{box-shadow:0 4px 20px rgba(0,0,0,.18)}
.big-btn:active{transform:scale(.97)}

.bottom-bar{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;
  max-width:640px;width:100%;margin:0 auto 8px;z-index:1;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:0.8rem;color:var(--dim)}
.bottom-bar b{color:var(--text)}
.bottom-bar button{font-family:inherit;font-size:0.78rem;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text);cursor:pointer;font-weight:600;transition:border-color .2s}
.bottom-bar button:hover{border-color:var(--text)}
.bottom-bar button.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* favorites overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;
  justify-content:center;align-items:flex-end}
.overlay.open{display:flex}
.fav-panel{background:var(--bg);border-radius:18px 18px 0 0;width:100%;max-width:640px;max-height:70vh;
  overflow-y:auto;padding:24px 20px 32px;box-shadow:0 -4px 30px rgba(0,0,0,.1)}
.fav-panel h2{font-size:1rem;margin-bottom:16px;text-align:center;color:var(--dim);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:600}
.fav-panel .empty{text-align:center;color:var(--dim);font-style:italic;font-size:0.9rem;padding:20px 0}
.fav-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;
  margin-bottom:8px;font-size:0.85rem;font-style:italic;line-height:1.5;display:flex;align-items:flex-start;gap:10px}
.fav-item .txt{flex:1}
.fav-item button{background:none;border:none;cursor:pointer;font-size:0.9rem;opacity:.4;transition:opacity .15s;padding:2px}
.fav-item button:hover{opacity:1}
.fav-panel .close-btn{display:block;margin:16px auto 0;padding:8px 24px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);font-family:-apple-system,sans-serif;font-size:0.82rem;cursor:pointer;font-weight:600}

.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--text);color:var(--bg);padding:10px 20px;border-radius:10px;
  font-family:-apple-system,sans-serif;font-size:0.82rem;font-weight:600;opacity:0;
  transition:transform .3s,opacity .3s;z-index:100;pointer-events:none}
.copy-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:480px){
  body{padding:0 12px 24px}
  .prompt-card{padding:24px 16px 20px}
  .pills{gap:6px}
  .pill{padding:5px 10px;font-size:0.72rem}
}
</style>
</head>
<body>

<a href="../games.html" class="back-link">&larr; Back to Games</a>

<header>
  <h1>Sketchables</h1>
  <div class="subtitle">Kiwi's Art Ideas</div>
</header>

<div class="combo-count"><b id="totalCombos"></b> possible</div>

<div class="prompt-card" id="promptCard">
  <button class="fav-btn" id="favBtn" title="Save to favorites">&#9734;</button>
  <div class="prompt-text" id="promptText">Tap the button to get your first art idea!</div>
</div>

<div class="pills" id="pills"></div>

<button class="big-btn" id="generateBtn">SKETCH THIS</button>

<div class="bottom-bar">
  <div>Seen: <b id="seenCount">0</b> of <b id="possibleShort"></b></div>
  <button id="favOpenBtn">Favorites</button>
  <button id="modeBtn">Full</button>
</div>

<div class="overlay" id="favOverlay">
  <div class="fav-panel" id="favPanel">
    <h2>Favorites</h2>
    <div id="favList"></div>
    <button class="close-btn" id="favCloseBtn">Close</button>
  </div>
</div>

<div class="copy-toast" id="copyToast">Copied!</div>

<script>
// ─── WORD BANKS with tags ───
const SUBJECTS = [
  // Animals (animate)
  {w:"cat",t:"a"},{w:"dog",t:"a"},{w:"fox",t:"a"},{w:"owl",t:"a"},{w:"bear",t:"a"},
  {w:"whale",t:"a"},{w:"octopus",t:"a"},{w:"raven",t:"a"},{w:"deer",t:"a"},{w:"wolf",t:"a"},
  {w:"rabbit",t:"a"},{w:"turtle",t:"a"},{w:"elephant",t:"a"},{w:"penguin",t:"a"},{w:"butterfly",t:"a"},
  {w:"seahorse",t:"a"},{w:"hedgehog",t:"a"},{w:"frog",t:"a"},{w:"snake",t:"a"},{w:"eagle",t:"a"},
  {w:"jellyfish",t:"a"},{w:"chameleon",t:"a"},{w:"axolotl",t:"a"},{w:"narwhal",t:"a"},{w:"crow",t:"a"},
  {w:"flamingo",t:"a"},{w:"sloth",t:"a"},{w:"otter",t:"a"},{w:"parrot",t:"a"},{w:"bat",t:"a"},
  {w:"bee",t:"a"},{w:"dragonfly",t:"a"},{w:"raccoon",t:"a"},{w:"koala",t:"a"},{w:"moth",t:"a"},
  {w:"starfish",t:"a"},{w:"crab",t:"a"},{w:"firefly",t:"a"},{w:"hummingbird",t:"a"},{w:"puffin",t:"a"},
  {w:"snail",t:"a"},{w:"koi fish",t:"a"},{w:"red panda",t:"a"},{w:"arctic fox",t:"a"},
  {w:"snow leopard",t:"a"},{w:"capybara",t:"a"},{w:"platypus",t:"a"},{w:"kiwi bird",t:"a"},
  // People (animate)
  {w:"old man",t:"a"},{w:"little girl",t:"a"},{w:"grandmother",t:"a"},{w:"knight",t:"a"},
  {w:"astronaut",t:"a"},{w:"chef",t:"a"},{w:"pirate",t:"a"},{w:"witch",t:"a"},{w:"scientist",t:"a"},
  {w:"dancer",t:"a"},{w:"musician",t:"a"},{w:"detective",t:"a"},{w:"queen",t:"a"},{w:"samurai",t:"a"},
  {w:"robot",t:"a"},{w:"alien",t:"a"},{w:"mermaid",t:"a"},{w:"ghost",t:"a"},{w:"fairy",t:"a"},
  {w:"wizard",t:"a"},{w:"librarian",t:"a"},{w:"monk",t:"a"},{w:"jester",t:"a"},{w:"explorer",t:"a"},
  {w:"beekeeper",t:"a"},{w:"clockmaker",t:"a"},{w:"fortune teller",t:"a"},{w:"gardener",t:"a"},
  {w:"alchemist",t:"a"},{w:"toymaker",t:"a"},{w:"gondolier",t:"a"},{w:"falconer",t:"a"},
  {w:"wandering bard",t:"a"},
  // Objects (inanimate)
  {w:"teacup",t:"i"},{w:"lighthouse",t:"i"},{w:"clock",t:"i"},{w:"guitar",t:"i"},{w:"umbrella",t:"i"},
  {w:"lantern",t:"i"},{w:"book",t:"i"},{w:"key",t:"i"},{w:"ship",t:"i"},{w:"train",t:"i"},
  {w:"bicycle",t:"i"},{w:"typewriter",t:"i"},{w:"telescope",t:"i"},{w:"candle",t:"i"},{w:"compass",t:"i"},
  {w:"hourglass",t:"i"},{w:"music box",t:"i"},{w:"gramophone",t:"i"},{w:"birdcage",t:"i"},
  {w:"hot air balloon",t:"i"},{w:"windmill",t:"i"},{w:"treehouse",t:"i"},{w:"carousel",t:"i"},
  {w:"snow globe",t:"i"},{w:"cuckoo clock",t:"i"}
];

const ACTIONS = [
  // animate-only actions
  {w:"dancing",r:"a"},{w:"sleeping",r:"a"},{w:"reading",r:"a"},{w:"painting",r:"a"},{w:"hiding",r:"a"},
  {w:"fighting",r:"a"},{w:"dreaming",r:"a"},{w:"climbing",r:"a"},{w:"laughing",r:"a"},{w:"crying",r:"a"},
  {w:"singing",r:"a"},{w:"running",r:"a"},{w:"meditating",r:"a"},{w:"juggling",r:"a"},{w:"fishing",r:"a"},
  {w:"cooking",r:"a"},{w:"whispering",r:"a"},{w:"sketching",r:"a"},{w:"knitting",r:"a"},
  {w:"stargazing",r:"a"},{w:"napping",r:"a"},{w:"eavesdropping",r:"a"},{w:"sculpting",r:"a"},
  // works with anything
  {w:"floating",r:null},{w:"falling",r:null},{w:"glowing",r:null},{w:"dissolving",r:null},
  {w:"emerging from shadow",r:null},{w:"crumbling",r:null},{w:"spinning",r:null},{w:"tilting",r:null},
  {w:"resting",r:null},{w:"perched",r:null},{w:"half-buried",r:null},{w:"reflected",r:null},
  {w:"tangled in vines",r:null},{w:"catching light",r:null},{w:"dripping",r:null},{w:"hovering",r:null},
  {w:"sinking",r:null},{w:"balancing",r:null},{w:"unfurling",r:null},{w:"silhouetted",r:null}
];

const MOODS = [
  "melancholy","joyful","anxious","brave","lonely","mischievous","serene","furious","curious","nostalgic",
  "hopeful","terrified","proud","confused","content","gentle","fierce","dreamy","haunted","playful",
  "solemn","defiant","wistful","brooding","radiant","suspicious","determined","tender","stoic","whimsical",
  "reverent","somber","pensive","awestruck","bold","spellbound","contemplative","bittersweet","reckless","luminous"
];

const SETTINGS = [
  "in a sunflower field","at a bus stop","on the moon","underwater","in a library",
  "at the edge of a cliff","in a crowded market","on a rooftop at night","in a snowstorm","at a carnival",
  "in an abandoned factory","at the bottom of the ocean","in a cozy kitchen","on a moving train","at sunset",
  "in a graveyard","in a bamboo forest","in a candlelit cave","at a train station at midnight",
  "in a field of lavender","on a frozen lake","inside a clock tower","in a dusty attic",
  "in a greenhouse","on a crumbling bridge","at the gates of a castle","in a foggy harbor",
  "inside a snow globe","at the peak of a mountain","in an enchanted garden","on a pirate ship",
  "inside a painting","in a coral reef","on a Ferris wheel","in a medieval tavern","at a jazz club",
  "on a space station","in a mushroom forest","inside an old bookshop","in a rainstorm",
  "in a blanket fort","inside a teacup","at an abandoned amusement park"
];

const STYLES = [
  "charcoal","watercolor","ink wash","pencil sketch","pen and ink","cross-hatching","pointillism",
  "loose gestural","contour line","negative space","silhouette","mixed media","collage style",
  "woodcut","linocut","soft shading","bold outlines","minimal line","stippling","dry brush",
  "conte crayon","graphite","sumi-e","gouache","colored pencil","marker","monochrome wash",
  "geometric","expressionist","vintage engraving","storybook illustration","field sketch","chiaroscuro"
];

const MODIFIERS = [
  "wearing a tiny crown","carrying a tiny sword","surrounded by flowers","with glowing eyes","made of clockwork",
  "enormous","tiny","with butterfly wings","covered in moss","made of paper",
  "translucent","on fire","frozen in ice","holding a map","wearing headphones",
  "with a long shadow","hovering slightly","reflected in water","made of stained glass","wrapped in bandages",
  "orbited by tiny stars","trailing smoke","with a halo","stitched together","dappled in sunlight",
  "sprouting mushrooms","covered in postage stamps","tangled in string lights","with roots growing out",
  "made of constellations","dripping paint","leaving footprints of flowers","wearing a top hat","wearing mismatched shoes"
];

// ─── CATEGORIES ───
const CATS = [
  {key:"mood",    label:"Mood",    arr:MOODS,    color:"var(--mauve)",       bg:"#f3eaf0"},
  {key:"subject", label:"Subject", arr:SUBJECTS, color:"var(--terracotta)",  bg:"#fce8e2"},
  {key:"action",  label:"Action",  arr:ACTIONS,  color:"var(--sienna)",      bg:"#f5ebe0"},
  {key:"setting", label:"Setting", arr:SETTINGS, color:"var(--olive)",       bg:"#eef0e4"},
  {key:"style",   label:"Style",   arr:STYLES,   color:"var(--dusty-blue)",  bg:"#e4edf3"},
  {key:"modifier",label:"Extra",   arr:MODIFIERS,color:"var(--sage)",        bg:"#ebefe8"}
];
const SIMPLE_KEYS = ["subject","action","style"];

// ─── STATE ───
let current = {};
let locks = {};
let favorites = JSON.parse(localStorage.getItem("sketch_favorites")||"[]");
let seenCount = parseInt(localStorage.getItem("sketch_seen")||"0",10);
let mode = "full";
let hasGenerated = false;

// ─── AUDIO: pencil scratch ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function pencilScratch(){
  if(!audioCtx) audioCtx = new AudioCtx();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.max(0,1-i/data.length);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = "bandpass"; filt.frequency.value = 2500; filt.Q.value = 0.8;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  src.connect(filt); filt.connect(gain); gain.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + 0.1);
}

// ─── HELPERS ───
function activeCats(){ return CATS.filter(c => mode==="full" || SIMPLE_KEYS.includes(c.key)); }
function totalCombos(){
  return activeCats().reduce((n,c) => {
    if(c.key==="subject"||c.key==="action") return n * c.arr.length; // approximate; tag filtering doesn't change count much
    return n * c.arr.length;
  }, 1);
}
function fmtNum(n){
  if(n>=1e9) return (n/1e9).toFixed(1).replace(/\.0$/,"")+" billion";
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+" million";
  if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return n.toLocaleString();
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function pickSubject(){ return pick(SUBJECTS); }
function pickAction(subjectTag){
  // Filter actions compatible with subject
  const pool = ACTIONS.filter(a => !a.r || a.r === subjectTag);
  return pick(pool);
}

function randomize(onlyKey){
  const ac = activeCats();
  if(onlyKey){
    const cat = CATS.find(c=>c.key===onlyKey);
    if(locks[onlyKey]) return;
    if(onlyKey==="subject"){
      current.subject = pickSubject();
      // re-validate action if it no longer fits (but respect lock)
      if(!locks.action && current.action && current.action.r && current.action.r !== current.subject.t){
        current.action = pickAction(current.subject.t);
      }
    } else if(onlyKey==="action"){
      current.action = pickAction(current.subject ? current.subject.t : "a");
    } else if(onlyKey==="mood"){
      current.mood = pick(MOODS);
    } else if(onlyKey==="setting"){
      current.setting = pick(SETTINGS);
    } else if(onlyKey==="style"){
      current.style = pick(STYLES);
    } else if(onlyKey==="modifier"){
      current.modifier = pick(MODIFIERS);
    }
  } else {
    ac.forEach(c => {
      if(locks[c.key]) return;
      if(c.key==="subject") current.subject = pickSubject();
      else if(c.key==="action") current.action = pickAction(current.subject ? current.subject.t : "a");
      else if(c.key==="mood") current.mood = pick(MOODS);
      else if(c.key==="setting") current.setting = pick(SETTINGS);
      else if(c.key==="style") current.style = pick(STYLES);
      else if(c.key==="modifier") current.modifier = pick(MODIFIERS);
    });
  }
}

function getWord(key){
  const v = current[key];
  if(!v) return "...";
  return (typeof v === "object") ? v.w : v;
}

// ─── PROMPT BUILD ───
function promptParts(){
  const ac = activeCats();
  const parts = [];
  if(mode==="simple"){
    const art = /^[aeiou]/i.test(getWord("subject"))?"An":"A";
    parts.push({text:art+" ",key:null});
    parts.push({text:getWord("subject"),key:"subject"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("action"),key:"action"});
    parts.push({text:", drawn in ",key:null});
    parts.push({text:getWord("style"),key:"style"});
  } else {
    const art = /^[aeiou]/i.test(getWord("mood"))?"An":"A";
    parts.push({text:art+" ",key:null});
    parts.push({text:getWord("mood"),key:"mood"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("subject"),key:"subject"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("action"),key:"action"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("setting"),key:"setting"});
    parts.push({text:", drawn in ",key:null});
    parts.push({text:getWord("style"),key:"style"});
    parts.push({text:", ",key:null});
    parts.push({text:getWord("modifier"),key:"modifier"});
  }
  return parts;
}

const CAT_COLORS = {mood:"var(--mauve)",subject:"var(--terracotta)",action:"var(--sienna)",
  setting:"var(--olive)",style:"var(--dusty-blue)",modifier:"var(--sage)"};

function renderPrompt(animate){
  const el = document.getElementById("promptText");
  if(!hasGenerated){ el.innerHTML="Tap the button to get your first art idea!"; return; }
  const parts = promptParts();
  el.innerHTML = parts.map((p,i) => {
    if(!p.key) return p.text;
    const cls = animate ? "cw pop" : "cw";
    const delay = animate ? `animation-delay:${i*0.07}s` : "";
    return `<span class="${cls}" style="color:${CAT_COLORS[p.key]};${delay}">${p.text}</span>`;
  }).join("");
}

function promptText(){
  if(!hasGenerated) return "";
  return promptParts().map(p=>p.text).join("");
}

// ─── PILLS ───
function renderPills(){
  const cont = document.getElementById("pills");
  cont.innerHTML = "";
  activeCats().forEach(c => {
    const pill = document.createElement("div");
    pill.className = "pill" + (locks[c.key]?" locked":"");
    pill.style.background = c.bg;
    pill.style.color = c.color;
    pill.style.borderColor = c.color;
    const lockIcon = locks[c.key] ? "\u{1F512}" : "\u{1F513}";
    pill.innerHTML = `${getWord(c.key)} <span class="lock">${lockIcon}</span>`;
    pill.title = `Tap to re-roll ${c.label}`;
    pill.addEventListener("click", e => {
      if(e.shiftKey){
        locks[c.key] = !locks[c.key];
        renderPills();
        return;
      }
      // re-roll this component
      locks[c.key] = false;
      randomize(c.key);
      incrementSeen();
      renderPrompt(false);
      renderPills();
    });
    pill.addEventListener("contextmenu", e => {
      e.preventDefault();
      locks[c.key] = !locks[c.key];
      renderPills();
    });
    cont.appendChild(pill);
  });
}

// ─── SEEN COUNTER ───
function incrementSeen(){
  seenCount++;
  localStorage.setItem("sketch_seen", seenCount);
  document.getElementById("seenCount").textContent = seenCount.toLocaleString();
}

// ─── FAVORITES ───
function saveFavs(){ localStorage.setItem("sketch_favorites", JSON.stringify(favorites)); }
function updateFavBtn(){
  const btn = document.getElementById("favBtn");
  const txt = promptText();
  const isFav = favorites.includes(txt);
  btn.textContent = isFav ? "★" : "☆";
  btn.classList.toggle("active", isFav);
}
function renderFavList(){
  const cont = document.getElementById("favList");
  cont.innerHTML = "";
  if(!favorites.length){ cont.innerHTML = '<div class="empty">No favorites yet</div>'; return; }
  favorites.forEach((f,i) => {
    const div = document.createElement("div");
    div.className = "fav-item";
    div.innerHTML = `<span class="txt">${f}</span><button title="Copy">&#x1F4CB;</button><button title="Remove">&times;</button>`;
    const btns = div.querySelectorAll("button");
    btns[0].addEventListener("click", () => copyText(f));
    btns[1].addEventListener("click", () => {
      favorites.splice(i,1); saveFavs(); renderFavList(); updateFavBtn();
    });
    cont.appendChild(div);
  });
}

// ─── GENERATE with staggered animation ───
async function generate(){
  hasGenerated = true;
  const el = document.getElementById("promptText");
  const ac = activeCats();
  // quick spin: 8 frames
  for(let i=0;i<8;i++){
    randomize();
    renderPrompt(false);
    await new Promise(r => setTimeout(r, 35 + i*10));
  }
  // final pick
  randomize();
  pencilScratch();
  renderPrompt(true);
  renderPills();
  incrementSeen();
  updateFavBtn();
}

// ─── COPY ───
function copyText(txt){
  navigator.clipboard.writeText(txt).then(() => {
    const toast = document.getElementById("copyToast");
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1200);
  });
}

// ─── UPDATE COUNTS ───
function updateCounts(){
  const t = totalCombos();
  document.getElementById("totalCombos").textContent = fmtNum(t);
  document.getElementById("possibleShort").textContent = fmtNum(t);
  document.getElementById("seenCount").textContent = seenCount.toLocaleString();
}

// ─── INIT ───
function init(){
  randomize();
  updateCounts();
  renderPills();
  renderFavList();

  document.getElementById("generateBtn").addEventListener("click", generate);

  document.getElementById("favBtn").addEventListener("click", () => {
    if(!hasGenerated) return;
    const txt = promptText();
    const idx = favorites.indexOf(txt);
    if(idx>=0) favorites.splice(idx,1); else favorites.push(txt);
    saveFavs(); renderFavList(); updateFavBtn();
  });

  document.getElementById("favOpenBtn").addEventListener("click", () => {
    renderFavList();
    document.getElementById("favOverlay").classList.add("open");
  });
  document.getElementById("favCloseBtn").addEventListener("click", () => {
    document.getElementById("favOverlay").classList.remove("open");
  });
  document.getElementById("favOverlay").addEventListener("click", e => {
    if(e.target === e.currentTarget) document.getElementById("favOverlay").classList.remove("open");
  });

  document.getElementById("modeBtn").addEventListener("click", () => {
    mode = mode==="full" ? "simple" : "full";
    document.getElementById("modeBtn").textContent = mode==="full" ? "Full" : "Simple";
    document.getElementById("modeBtn").classList.toggle("active", mode==="simple");
    updateCounts();
    if(hasGenerated){ renderPrompt(false); renderPills(); }
  });

  document.addEventListener("keydown", e => {
    if(e.code==="Space" && !e.target.closest("input,textarea,button")){
      e.preventDefault();
      generate();
    }
  });
}

init();
</script>
</body>
