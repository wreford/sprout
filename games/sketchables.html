<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Sketchables</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF6F0;--surface:#FFFEFA;--border:#E8E0D4;--text:#2C2418;--dim:#9E9484;
  --sienna:#B85C38;--umber:#7A5C3E;--indigo:#4A5D7A;--olive:#6E7E48;--rose:#A66E7A;--sage:#7E8E6E;
  --btn:#2C2418;--btn-hover:#3D3224;--radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 24px 28px;min-height:100dvh;position:relative;overflow-x:hidden}

/* paper texture */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E")}

header{text-align:center;margin-bottom:6px;z-index:1;flex-shrink:0}
header h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;color:var(--umber);line-height:1.1;
  letter-spacing:-0.5px}
header .subtitle{font-size:0.8rem;color:var(--dim);margin-top:4px;font-style:italic;
  font-family:'Courier New',monospace;letter-spacing:1px;text-transform:uppercase}

.prompt-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
  padding:48px 36px 40px;max-width:580px;width:100%;margin:0 auto;
  display:flex;align-items:center;justify-content:center;text-align:center;position:relative;
  z-index:1;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 32px rgba(0,0,0,.03);
  flex:1;max-height:320px;min-height:160px}
.prompt-text{font-size:clamp(1.15rem,3vw,1.45rem);line-height:1.7;font-style:italic;color:var(--dim)}
.prompt-text.active{color:var(--text)}
.prompt-text .cw{font-weight:700;display:inline;position:relative;
  padding-bottom:2px;opacity:0;transform:translateY(8px);transition:none}
.prompt-text .cw.reveal{opacity:1;transform:translateY(0);transition:opacity .4s ease,transform .4s ease}
.prompt-text .plain{opacity:0;transition:none}
.prompt-text .plain.reveal{opacity:1;transition:opacity .3s ease .05s}

.fav-btn{position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;
  opacity:.25;transition:opacity .2s,transform .2s;color:var(--text);line-height:1}
.fav-btn:hover{opacity:.6}
.fav-btn.active{opacity:1;color:var(--sienna)}

.pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;max-width:580px;width:100%;
  margin:16px auto 0;z-index:1;flex-shrink:0}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:6px;
  font-family:'Courier New',monospace;font-size:0.68rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;cursor:pointer;border:none;background:transparent;color:var(--dim);
  transition:color .15s,background .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.pill:hover{background:rgba(0,0,0,.04)}
.pill:active{background:rgba(0,0,0,.07)}
.pill .lock{font-size:0.55rem;opacity:0;transition:opacity .15s;margin-left:2px}
.pill.locked{opacity:.7}
.pill.locked .lock{opacity:.6}
.pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.actions{display:flex;gap:10px;align-items:center;justify-content:center;max-width:580px;width:100%;
  margin:20px auto 0;z-index:1;flex-shrink:0}
.big-btn{flex:1;padding:15px 32px;border-radius:var(--radius);
  border:none;background:var(--btn);color:var(--bg);font-family:Georgia,serif;
  font-size:1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;z-index:1;
  transition:transform .15s cubic-bezier(.4,.0,.2,1),background .15s,box-shadow .15s;
  -webkit-tap-highlight-color:transparent}
.big-btn:hover{background:var(--btn-hover);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.big-btn:active{transform:scale(.97)}
.icon-btn{width:44px;height:44px;border-radius:var(--radius);border:1.5px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:1rem;transition:border-color .15s,background .15s;flex-shrink:0;color:var(--text)}
.icon-btn:hover{border-color:var(--text)}
.icon-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}

.counter{text-align:center;margin-top:16px;z-index:1;flex-shrink:0;
  font-family:'Courier New',monospace;font-size:0.72rem;color:var(--dim);letter-spacing:.3px}
.counter b{color:var(--umber);font-weight:700}

/* favorites overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(44,36,24,.25);z-index:50;
  justify-content:center;align-items:flex-end;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.fav-panel{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:580px;max-height:70vh;
  overflow-y:auto;padding:28px 24px 32px;box-shadow:0 -2px 24px rgba(0,0,0,.08)}
.fav-panel h2{font-size:0.72rem;margin-bottom:20px;text-align:center;color:var(--dim);
  font-family:'Courier New',monospace;font-weight:600;text-transform:uppercase;letter-spacing:2px}
.fav-panel .empty{text-align:center;color:var(--dim);font-style:italic;font-size:0.85rem;padding:24px 0}
.fav-item{border-bottom:1px solid var(--border);padding:14px 0;
  font-size:0.85rem;font-style:italic;line-height:1.6;display:flex;align-items:flex-start;gap:10px}
.fav-item:last-child{border-bottom:none}
.fav-item .txt{flex:1}
.fav-item button{background:none;border:none;cursor:pointer;font-size:0.8rem;opacity:.3;
  transition:opacity .15s;padding:2px;color:var(--text)}
.fav-item button:hover{opacity:1}
.fav-panel .close-btn{display:block;margin:20px auto 0;padding:10px 28px;border-radius:var(--radius);
  border:1.5px solid var(--border);background:var(--surface);font-family:'Courier New',monospace;
  font-size:0.72rem;cursor:pointer;font-weight:600;text-transform:uppercase;letter-spacing:1px;
  transition:border-color .15s}
.fav-panel .close-btn:hover{border-color:var(--text)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);
  background:var(--text);color:var(--bg);padding:10px 22px;border-radius:8px;
  font-family:'Courier New',monospace;font-size:0.72rem;font-weight:600;opacity:0;
  transition:transform .25s ease,opacity .25s ease;z-index:100;pointer-events:none;
  letter-spacing:.5px;text-transform:uppercase}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* composition guide */
#compositionGuide{display:none;max-width:580px;width:100%;margin:14px auto 0;z-index:1;flex-shrink:0;
  opacity:0;transform:translateY(6px);transition:opacity .4s ease .3s,transform .4s ease .3s}
#compositionGuide.visible{display:block;opacity:1;transform:translateY(0)}
.palette-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.swatch{display:inline-flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:transform .15s}
.swatch:active{transform:scale(.92)}
.swatch .circle{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.swatch .hex{font-family:'Courier New',monospace;font-size:0.55rem;color:var(--dim);letter-spacing:.3px;
  text-transform:uppercase}
.comp-note{font-family:Georgia,serif;font-size:0.78rem;color:var(--dim);font-style:italic;
  text-align:center;line-height:1.5;padding:0 8px}
.comp-label{font-family:'Courier New',monospace;font-size:0.6rem;color:var(--dim);text-transform:uppercase;
  letter-spacing:1.5px;text-align:center;margin-bottom:6px;font-weight:600}

@media(max-width:520px){
  body{padding:16px 16px 20px}
  .prompt-card{padding:36px 20px 32px;max-height:280px}
  .pills{gap:4px;margin-top:12px}
  .pill{padding:4px 8px;font-size:0.62rem}
  .actions{margin-top:16px}
  .counter{margin-top:12px}
  .palette-row{gap:8px}
  .swatch .hex{font-size:0.5rem}
}
</style>
</head>
<body>

<header>
  <h1>Sketchables</h1>
  <div class="subtitle">drawing prompts</div>
</header>

<div class="prompt-card" id="promptCard">
  <button class="fav-btn" id="favBtn" title="Save to favorites">&#9734;</button>
  <div class="prompt-text" id="promptText">Press the button below to get your first drawing prompt.</div>
</div>

<div class="pills" id="pills"></div>

<div id="compositionGuide">
  <div class="comp-label">Palette</div>
  <div class="palette-row" id="paletteRow"></div>
  <div class="comp-label" style="margin-top:8px">Composition</div>
  <div class="comp-note" id="compNote"></div>
</div>

<div class="actions">
  <button class="big-btn" id="generateBtn">Sketch This</button>
  <button class="icon-btn" id="copyAllBtn" title="Copy prompt + palette + notes for AI">&#128203;</button>
  <button class="icon-btn" id="favOpenBtn" title="Favorites">&#9734;</button>
  <button class="icon-btn" id="modeBtn" title="Toggle simple/full mode">6</button>
</div>

<div class="counter" id="counter">
  <span id="seenLabel"></span>
</div>

<div class="overlay" id="favOverlay">
  <div class="fav-panel" id="favPanel">
    <h2>Saved Prompts</h2>
    <div id="favList"></div>
    <button class="close-btn" id="favCloseBtn">Close</button>
  </div>
</div>

<div class="toast" id="toast">Copied</div>

<script>
// Word banks — a=animate, i=inanimate, r=requires animate subject
const S=(...w)=>w.map(x=>({w:x,t:"a"})), I=(...w)=>w.map(x=>({w:x,t:"i"}));
const SUBJECTS=[...S("cat","dog","fox","owl","bear","whale","octopus","raven","deer","wolf","rabbit","turtle",
  "elephant","penguin","butterfly","seahorse","hedgehog","frog","snake","eagle","jellyfish","chameleon",
  "axolotl","narwhal","crow","flamingo","sloth","otter","parrot","bat","bee","dragonfly","raccoon","koala",
  "moth","starfish","crab","firefly","hummingbird","puffin","snail","koi fish","red panda","arctic fox",
  "snow leopard","capybara","platypus","kiwi bird","old man","little girl","grandmother","knight",
  "astronaut","chef","pirate","witch","scientist","dancer","musician","detective","queen","samurai",
  "robot","alien","mermaid","ghost","fairy","wizard","librarian","monk","jester","explorer","beekeeper",
  "clockmaker","fortune teller","gardener","alchemist","toymaker","gondolier","falconer","wandering bard"),
  ...I("teacup","lighthouse","clock","guitar","umbrella","lantern","book","key","ship","train","bicycle",
  "typewriter","telescope","candle","compass","hourglass","music box","gramophone","birdcage",
  "hot air balloon","windmill","treehouse","carousel","snow globe","cuckoo clock")];
const ACTIONS=[
  ...["dancing","sleeping","reading","painting","hiding","fighting","dreaming","climbing","laughing",
  "crying","singing","running","meditating","juggling","fishing","cooking","whispering","sketching",
  "knitting","stargazing","napping","eavesdropping","sculpting"].map(w=>({w,r:"a"})),
  ...["floating","falling","glowing","dissolving","emerging from shadow","crumbling","spinning","tilting",
  "resting","perched","half-buried","reflected","tangled in vines","catching light","dripping","hovering",
  "sinking","balancing","unfurling","silhouetted"].map(w=>({w,r:null}))];
const MOODS=["melancholy","joyful","anxious","brave","lonely","mischievous","serene","furious","curious",
  "nostalgic","hopeful","terrified","proud","confused","content","gentle","fierce","dreamy","haunted",
  "playful","solemn","defiant","wistful","brooding","radiant","suspicious","determined","tender","stoic",
  "whimsical","reverent","somber","pensive","awestruck","bold","spellbound","contemplative","bittersweet",
  "reckless","luminous"];
const SETTINGS=["in a sunflower field","at a bus stop","on the moon","underwater","in a library",
  "at the edge of a cliff","in a crowded market","on a rooftop at night","in a snowstorm","at a carnival",
  "in an abandoned factory","at the bottom of the ocean","in a cozy kitchen","on a moving train","at sunset",
  "in a graveyard","in a bamboo forest","in a candlelit cave","at a train station at midnight",
  "in a field of lavender","on a frozen lake","inside a clock tower","in a dusty attic","in a greenhouse",
  "on a crumbling bridge","at the gates of a castle","in a foggy harbor","inside a snow globe",
  "at the peak of a mountain","in an enchanted garden","on a pirate ship","inside a painting",
  "in a coral reef","on a Ferris wheel","in a medieval tavern","at a jazz club","on a space station",
  "in a mushroom forest","inside an old bookshop","in a rainstorm","in a blanket fort","inside a teacup",
  "at an abandoned amusement park"];
const STYLES=["charcoal","watercolor","ink wash","pencil sketch","pen and ink","cross-hatching",
  "pointillism","loose gestural","contour line","negative space","silhouette","mixed media","collage style",
  "woodcut","linocut","soft shading","bold outlines","minimal line","stippling","dry brush","conte crayon",
  "graphite","sumi-e","gouache","colored pencil","marker","monochrome wash","geometric","expressionist",
  "vintage engraving","storybook illustration","field sketch","chiaroscuro"];
const MODIFIERS=["wearing a tiny crown","carrying a tiny sword","surrounded by flowers","with glowing eyes",
  "made of clockwork","enormous","tiny","with butterfly wings","covered in moss","made of paper",
  "translucent","on fire","frozen in ice","holding a map","wearing headphones","with a long shadow",
  "hovering slightly","reflected in water","made of stained glass","wrapped in bandages",
  "orbited by tiny stars","trailing smoke","with a halo","stitched together","dappled in sunlight",
  "sprouting mushrooms","covered in postage stamps","tangled in string lights","with roots growing out",
  "made of constellations","dripping paint","leaving footprints of flowers","wearing a top hat",
  "wearing mismatched shoes"];

const CATS = [
  {key:"mood",    label:"Mood",    arr:MOODS,    color:"var(--rose)"},
  {key:"subject", label:"Subject", arr:SUBJECTS, color:"var(--sienna)"},
  {key:"action",  label:"Action",  arr:ACTIONS,  color:"var(--umber)"},
  {key:"setting", label:"Setting", arr:SETTINGS, color:"var(--olive)"},
  {key:"style",   label:"Style",   arr:STYLES,   color:"var(--indigo)"},
  {key:"modifier",label:"Extra",   arr:MODIFIERS,color:"var(--sage)"}
];
const SIMPLE_KEYS = ["subject","action","style"];

// State
let current = {}, locks = {};
let favorites = JSON.parse(localStorage.getItem("sketch_favorites")||"[]");
let seenCount = parseInt(localStorage.getItem("sketch_seen")||"0",10);
let mode = "full";
let hasGenerated = false;

// Audio: soft pencil tap
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function pencilTap(){
  if(!audioCtx) audioCtx = new AudioCtx();
  const dur = 0.06;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*dur, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++){
    const t = i/d.length;
    d[i] = (Math.random()*2-1) * Math.pow(1-t, 3) * 0.3;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = "highpass"; hp.frequency.value = 1800;
  const lp = audioCtx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = 5000;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  src.connect(hp); hp.connect(lp); lp.connect(gain); gain.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime+dur);
}

// Helpers
function activeCats(){ return CATS.filter(c => mode==="full" || SIMPLE_KEYS.includes(c.key)); }
function totalCombos(){
  return activeCats().reduce((n,c) => n * c.arr.length, 1);
}
function fmtNum(n){
  if(n>=1e9) return (n/1e9).toFixed(1).replace(/\.0$/,"")+" billion";
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,"")+" million";
  if(n>=1e3) return n.toLocaleString();
  return String(n);
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pickAction(tag){ return pick(ACTIONS.filter(a => !a.r || a.r === tag)); }
function getWord(key){ const v=current[key]; return v?(typeof v==="object"?v.w:v):"..."; }

function randomize(onlyKey){
  const ac = activeCats();
  if(onlyKey){
    if(locks[onlyKey]) return;
    if(onlyKey==="subject"){
      current.subject = pick(SUBJECTS);
      if(!locks.action && current.action && current.action.r && current.action.r !== current.subject.t)
        current.action = pickAction(current.subject.t);
    } else if(onlyKey==="action"){
      current.action = pickAction(current.subject ? current.subject.t : "a");
    } else {
      current[onlyKey] = pick(CATS.find(c=>c.key===onlyKey).arr);
    }
  } else {
    ac.forEach(c => {
      if(locks[c.key]) return;
      if(c.key==="subject") current.subject = pick(SUBJECTS);
      else if(c.key==="action") current.action = pickAction(current.subject ? current.subject.t : "a");
      else current[c.key] = pick(c.arr);
    });
  }
}

// Prompt building
function promptParts(){
  const parts = [];
  if(mode==="simple"){
    const art = /^[aeiou]/i.test(getWord("subject"))?"An ":"A ";
    parts.push({text:art,key:null});
    parts.push({text:getWord("subject"),key:"subject"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("action"),key:"action"});
    parts.push({text:", drawn in ",key:null});
    parts.push({text:getWord("style"),key:"style"});
  } else {
    const art = /^[aeiou]/i.test(getWord("mood"))?"An ":"A ";
    parts.push({text:art,key:null});
    parts.push({text:getWord("mood"),key:"mood"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("subject"),key:"subject"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("action"),key:"action"});
    parts.push({text:" ",key:null});
    parts.push({text:getWord("setting"),key:"setting"});
    parts.push({text:", drawn in ",key:null});
    parts.push({text:getWord("style"),key:"style"});
    parts.push({text:", ",key:null});
    parts.push({text:getWord("modifier"),key:"modifier"});
  }
  return parts;
}

const UNDERLINE_COLORS = {
  mood:"var(--rose)",subject:"var(--sienna)",action:"var(--umber)",
  setting:"var(--olive)",style:"var(--indigo)",modifier:"var(--sage)"
};

function renderPrompt(animate){
  const el = document.getElementById("promptText");
  if(!hasGenerated){ el.classList.remove("active"); el.textContent="Press the button below to get your first drawing prompt."; return; }
  el.classList.add("active");
  const parts = promptParts();
  el.innerHTML = parts.map(p => {
    if(!p.key) return `<span class="plain${animate?'':' reveal'}">${p.text}</span>`;
    return `<span class="cw${animate?'':' reveal'}" style="text-decoration:underline;text-decoration-color:${UNDERLINE_COLORS[p.key]};text-underline-offset:3px;text-decoration-thickness:2px">${p.text}</span>`;
  }).join("");
  if(animate){
    const spans = el.querySelectorAll('.cw, .plain');
    spans.forEach((s,i) => {
      setTimeout(() => s.classList.add('reveal'), 60 + i * 70);
    });
  }
}

function promptText(){
  if(!hasGenerated) return "";
  return promptParts().map(p=>p.text).join("");
}

// Pills
function renderPills(){
  const cont = document.getElementById("pills");
  cont.innerHTML = "";
  if(!hasGenerated) return;
  activeCats().forEach(c => {
    const pill = document.createElement("button");
    pill.className = "pill" + (locks[c.key]?" locked":"");
    const lockIcon = locks[c.key] ? "•" : "";
    pill.innerHTML = `<span class="dot" style="background:${UNDERLINE_COLORS[c.key]}"></span>${c.label}`
      + (lockIcon ? `<span class="lock">${lockIcon}</span>` : '<span class="lock"></span>');
    pill.title = `Re-roll ${c.label} (long-press to lock)`;
    pill.addEventListener("click", e => {
      if(e.shiftKey || e.ctrlKey || e.metaKey){
        locks[c.key] = !locks[c.key]; renderPills(); return;
      }
      locks[c.key] = false;
      randomize(c.key);
      incrementSeen();
      renderPrompt(false);
      renderPills();
      updateFavBtn();
      renderCompositionGuide(false);
    });
    pill.addEventListener("contextmenu", e => {
      e.preventDefault();
      locks[c.key] = !locks[c.key]; renderPills();
    });
    cont.appendChild(pill);
  });
}

// Seen counter
function incrementSeen(){
  seenCount++;
  localStorage.setItem("sketch_seen", seenCount);
  updateCounter();
}
function updateCounter(){
  const t = totalCombos();
  const label = document.getElementById("seenLabel");
  if(!hasGenerated){ label.textContent = `${fmtNum(t)} possible prompts`; return; }
  label.innerHTML = `You've seen <b>${seenCount.toLocaleString()}</b> of <b>${fmtNum(t)}</b> possible ideas`;
}

// Favorites
function saveFavs(){ localStorage.setItem("sketch_favorites", JSON.stringify(favorites)); }
function updateFavBtn(){
  const btn = document.getElementById("favBtn");
  if(!hasGenerated){ btn.style.display="none"; return; }
  btn.style.display="";
  const isFav = favorites.includes(promptText());
  btn.innerHTML = isFav ? "&#9733;" : "&#9734;";
  btn.classList.toggle("active", isFav);
}
function renderFavList(){
  const cont = document.getElementById("favList");
  cont.innerHTML = "";
  if(!favorites.length){ cont.innerHTML = '<div class="empty">No saved prompts yet.</div>'; return; }
  favorites.forEach((f,i) => {
    const div = document.createElement("div");
    div.className = "fav-item";
    div.innerHTML = `<span class="txt">${f}</span><button title="Remove">&times;</button>`;
    div.querySelector("button").addEventListener("click", () => {
      favorites.splice(i,1); saveFavs(); renderFavList(); updateFavBtn();
    });
    div.querySelector(".txt").addEventListener("click", () => {
      navigator.clipboard.writeText(f).then(() => showToast("Copied"));
    });
    div.querySelector(".txt").style.cursor = "pointer";
    cont.appendChild(div);
  });
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1200);
}

const SETTING_TINTS = [
  {keywords:["forest","bamboo","garden","greenhouse","mushroom"],swatch:{hex:"#2D5A27",name:"forest green"}},
  {keywords:["desert","sunset","sun"],swatch:{hex:"#D4A76A",name:"warm sand"}},
  {keywords:["ocean","underwater","sea","coral","harbor","lake"],swatch:{hex:"#1B4B72",name:"deep ocean"}},
  {keywords:["snow","frozen","ice"],swatch:{hex:"#E8F0FE",name:"ice white"}},
  {keywords:["night","midnight","dark","cave"],swatch:{hex:"#1A1A2E",name:"midnight"}}
];

function getColorPalette(mood, subject, setting){
  // 1. Determine base palette from mood
  let palette = null;
  const moodLower = (mood||"").toLowerCase();
  for(const [group, moods] of Object.entries(MOOD_GROUPS)){
    if(moods.includes(moodLower)){
      palette = MOOD_PALETTES[group].map(c=>({...c}));
      break;
    }
  }
  if(!palette) palette = DEFAULT_PALETTE.map(c=>({...c}));

  // 2. Subject animal override (replace last 1-2 swatches)
  const subjectLower = (subject||"").toLowerCase();
  for(const [animal, colors] of Object.entries(ANIMAL_COLORS)){
    if(subjectLower.includes(animal)){
      const replaceCount = colors.length;
      for(let i=0;i<replaceCount;i++){
        palette[palette.length - replaceCount + i] = {...colors[i]};
      }
      break;
    }
  }

  // 3. Setting tint (replace the 3rd swatch)
  const settingLower = (setting||"").toLowerCase();
  for(const rule of SETTING_TINTS){
    if(rule.keywords.some(kw => settingLower.includes(kw))){
      palette[2] = {...rule.swatch};
      break;
    }
  }

  return palette;
}

const COMP_NOTES = [
  {actions:["sleeping","napping","resting"],
   note:"Low horizon. Subject curled, center-bottom. Lots of negative space above."},
  {actions:["dancing","juggling","spinning"],
   note:"Dynamic diagonal. Off-center subject with motion blur suggestion."},
  {actions:["standing in rain","falling"],
   note:"Vertical emphasis. High contrast. Light source behind for silhouette."},
  {actions:["reading","meditating","knitting","sketching","painting","sculpting"],
   note:"Intimate framing. Tight crop. Warm directional light from one side."},
  {actions:["running","climbing","fighting"],
   note:"Strong diagonal thrust. Leading space in direction of movement."},
  {actions:["hiding","eavesdropping"],
   note:"Partially obscured subject. Frame-within-a-frame composition."},
  {actions:["dreaming","stargazing"],
   note:"Expansive sky. Small subject, vast environment. Low angle."},
  {actions:["singing","laughing","whispering","crying"],
   note:"Portrait orientation. Focus on expression. Soft background blur."},
  {actions:["floating","hovering","flying"],
   note:"Central subject, no ground line. Ethereal negative space all around."},
  {actions:["dissolving","crumbling","sinking"],
   note:"Off-center, lower third. Particle scatter effect outward."},
  {actions:["emerging from shadow","glowing"],
   note:"High contrast chiaroscuro. Single strong light source."},
  {actions:["perched","balancing","tilting"],
   note:"Rule of thirds. Subject on high point. Sky-heavy composition."}
];
const DEFAULT_COMP_NOTE = "Centered subject. Balanced composition. Medium shot with environmental context.";

function getCompositionNote(action){
  const actionLower = (action||"").toLowerCase();
  for(const rule of COMP_NOTES){
    if(rule.actions.some(a => actionLower === a)){
      return rule.note;
    }
  }
  return DEFAULT_COMP_NOTE;
}

function renderCompositionGuide(animate){
  const guide = document.getElementById("compositionGuide");
  const row = document.getElementById("paletteRow");
  const noteEl = document.getElementById("compNote");
  if(!hasGenerated){
    guide.classList.remove("visible");
    guide.style.display = "none";
    return;
  }

  const mood = mode === "full" ? getWord("mood") : "";
  const subject = getWord("subject");
  const setting = mode === "full" ? getWord("setting") : "";
  const action = getWord("action");

  const palette = getColorPalette(mood, subject, setting);
  const note = getCompositionNote(action);

  // Render swatches
  row.innerHTML = "";
  palette.forEach(c => {
    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.innerHTML = `<div class="circle" style="background:${c.hex}"></div><span class="hex">${c.hex}</span>`;
    swatch.title = `${c.name} — tap to copy`;
    swatch.addEventListener("click", () => {
      navigator.clipboard.writeText(c.hex).then(() => showToast("Copied " + c.hex));
    });
    row.appendChild(swatch);
  });

  // Render composition note
  noteEl.textContent = note;

  // Show with animation
  if(animate){
    guide.style.display = "block";
    guide.classList.remove("visible");
    // Force reflow so transition triggers
    void guide.offsetWidth;
    guide.classList.add("visible");
  } else {
    guide.style.display = "block";
    guide.style.transition = "none";
    guide.classList.add("visible");
    // Re-enable transition after paint
    requestAnimationFrame(() => { guide.style.transition = ""; });
  }
}

// Generate
async function generate(){
  hasGenerated = true;
  const el = document.getElementById("promptText");
  el.classList.add("active");

  // Fade out old content
  el.style.opacity = "0";
  el.style.transform = "translateY(4px)";
  el.style.transition = "opacity .15s ease, transform .15s ease";
  await new Promise(r => setTimeout(r, 150));

  // Pick new words
  randomize();
  pencilTap();

  // Reset position for fade in
  el.style.transition = "none";
  el.style.transform = "translateY(0)";
  el.style.opacity = "1";

  // Render with staggered word animation
  renderPrompt(true);
  renderPills();
  incrementSeen();
  updateFavBtn();
  renderCompositionGuide(true);
}

// Mode button
function updateModeBtn(){
  const btn = document.getElementById("modeBtn");
  const n = activeCats().length;
  btn.textContent = n;
  btn.title = mode === "full" ? "Switch to simple (3 parts)" : "Switch to full (6 parts)";
  btn.classList.toggle("active", mode==="simple");
}

// Init
function init(){
  randomize();
  updateCounter();
  updateFavBtn();
  updateModeBtn();
  renderPills();

  document.getElementById("generateBtn").addEventListener("click", generate);

  document.getElementById("favBtn").addEventListener("click", () => {
    if(!hasGenerated) return;
    const txt = promptText();
    const idx = favorites.indexOf(txt);
    if(idx>=0) favorites.splice(idx,1); else favorites.push(txt);
    saveFavs(); renderFavList(); updateFavBtn();
  });

  document.getElementById("copyAllBtn").addEventListener("click", () => {
    if(!hasGenerated){ showToast("Generate a prompt first"); return; }
    const promptEl = document.getElementById("prompt");
    const promptText = promptEl ? promptEl.textContent.trim() : "";
    const paletteEl = document.getElementById("compPalette");
    let paletteText = "";
    if(paletteEl){
      const swatches = paletteEl.querySelectorAll("[title]");
      const hexes = [];
      swatches.forEach(s => { const m = s.title.match(/#[0-9A-Fa-f]{6}/); if(m) hexes.push(m[0]); });
      if(hexes.length) paletteText = "\n\nColor Palette: " + hexes.join(", ");
    }
    const noteEl = document.getElementById("compNote");
    const noteText = noteEl && noteEl.textContent.trim() ? "\n\nComposition: " + noteEl.textContent.trim() : "";
    const full = "Art Prompt: " + promptText + paletteText + noteText;
    navigator.clipboard.writeText(full).then(() => showToast("Copied prompt + palette + notes"));
  });

  document.getElementById("favOpenBtn").addEventListener("click", () => {
    renderFavList();
    document.getElementById("favOverlay").classList.add("open");
  });
  document.getElementById("favCloseBtn").addEventListener("click", () => {
    document.getElementById("favOverlay").classList.remove("open");
  });
  document.getElementById("favOverlay").addEventListener("click", e => {
    if(e.target === e.currentTarget) document.getElementById("favOverlay").classList.remove("open");
  });

  document.getElementById("modeBtn").addEventListener("click", () => {
    mode = mode==="full" ? "simple" : "full";
    updateModeBtn();
    updateCounter();
    if(hasGenerated){ renderPrompt(false); renderPills(); renderCompositionGuide(false); }
  });

  document.addEventListener("keydown", e => {
    if(e.code==="Space" && !e.target.closest("input,textarea,button")){
      e.preventDefault(); generate();
    }
  });
}

init();
</script>
