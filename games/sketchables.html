<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Sketchables — Kiwi's Art Ideas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf6f0;--surface:#fff;--border:#e0d8cc;--text:#2a2520;--dim:#8a8078;
  --subject:#e85d75;--action:#d4822f;--mood:#8b5cf6;--setting:#2d9f6f;--style:#2878c8;--modifier:#c45e10;
  --subject-bg:#fde8ec;--action-bg:#fef0e0;--mood-bg:#f0e8ff;--setting-bg:#e0f5ec;--style-bg:#e0f0ff;--modifier-bg:#fff0e0;
  --btn:#2a2520;--btn-text:#faf6f0;--radius:12px;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;align-items:center;padding:0 16px 40px}

/* paper texture */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,0,0,.02) 28px,rgba(0,0,0,.02) 29px);
}

a{color:var(--dim);text-decoration:none}
a:hover{color:var(--text)}

.back-link{align-self:flex-start;margin:12px 0 0;font-size:0.85rem;z-index:1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}

header{text-align:center;margin:24px 0 8px;z-index:1}
header h1{font-size:clamp(2.2rem,6vw,3.6rem);font-weight:900;letter-spacing:-1px;color:var(--text);line-height:1.1;font-style:italic}
header .subtitle{font-size:clamp(0.9rem,2.5vw,1.1rem);color:var(--dim);margin-top:4px;font-style:italic}

.combo-math{text-align:center;margin:8px 0 18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;z-index:1}
.combo-math .formula{font-size:0.7rem;color:var(--dim);letter-spacing:0.5px}
.combo-math .total{font-size:0.85rem;font-weight:700;color:var(--text);margin-top:2px}
.combo-math .total span{color:var(--subject)}

.counter-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:0.8rem;color:var(--dim);z-index:1}
.counter-bar b{color:var(--text)}

/* prompt display */
.prompt-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:28px 24px 20px;max-width:680px;width:100%;margin:0 auto 16px;min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;z-index:1;box-shadow:0 2px 20px rgba(0,0,0,.05)}
.prompt-text{font-size:clamp(1.1rem,3vw,1.5rem);line-height:1.6;font-style:italic;transition:opacity .3s}
.prompt-text .c-mood{color:var(--mood);font-weight:700}
.prompt-text .c-subject{color:var(--subject);font-weight:700}
.prompt-text .c-action{color:var(--action);font-weight:700}
.prompt-text .c-setting{color:var(--setting);font-weight:700}
.prompt-text .c-style{color:var(--style);font-weight:700}
.prompt-text .c-modifier{color:var(--modifier);font-weight:700}
.prompt-text.spinning{opacity:.3}

.fav-btn{position:absolute;top:12px;right:14px;background:none;border:none;font-size:1.4rem;cursor:pointer;opacity:.4;transition:opacity .2s,transform .2s}
.fav-btn:hover,.fav-btn.active{opacity:1;transform:scale(1.2)}
.fav-btn.active{color:#f5a623}

/* pills */
.pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:680px;margin:0 auto 16px;z-index:1}
.pill{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;border:2px solid transparent;transition:transform .15s,box-shadow .15s;user-select:none;position:relative}
.pill:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.pill:active{transform:scale(.96)}
.pill[data-cat="mood"]{background:var(--mood-bg);color:var(--mood);border-color:var(--mood)}
.pill[data-cat="subject"]{background:var(--subject-bg);color:var(--subject);border-color:var(--subject)}
.pill[data-cat="action"]{background:var(--action-bg);color:var(--action);border-color:var(--action)}
.pill[data-cat="setting"]{background:var(--setting-bg);color:var(--setting);border-color:var(--setting)}
.pill[data-cat="style"]{background:var(--style-bg);color:var(--style);border-color:var(--style)}
.pill[data-cat="modifier"]{background:var(--modifier-bg);color:var(--modifier);border-color:var(--modifier)}
.pill .lock{font-size:0.65rem;margin-left:2px;opacity:.5}
.pill.locked{opacity:.7;border-style:dashed}
.pill.locked .lock{opacity:1}

/* buttons row */
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;z-index:1}
.btn{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:12px 32px;border-radius:var(--radius);border:2px solid var(--btn);background:var(--btn);color:var(--btn-text);font-size:1rem;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .15s;letter-spacing:.5px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.btn:active{transform:scale(.97)}
.btn-sm{padding:8px 16px;font-size:0.78rem;background:var(--surface);color:var(--text);border-color:var(--border);font-weight:600}
.btn-sm:hover{border-color:var(--text)}
.btn-sm.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* controls row */
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;z-index:1}

/* timer display */
.timer-display{text-align:center;margin-bottom:12px;z-index:1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:none}
.timer-display .time{font-size:2rem;font-weight:900;color:var(--subject)}
.timer-display .time.urgent{color:#e74c3c;animation:pulse .6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.timer-display .label{font-size:0.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

/* challenge mode */
.challenge-wrap{display:none;max-width:680px;width:100%;margin:0 auto 16px;z-index:1}
.challenge-wrap h3{text-align:center;font-size:0.85rem;color:var(--dim);margin-bottom:10px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-transform:uppercase;letter-spacing:1px}
.challenge-option{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:8px;cursor:pointer;font-style:italic;font-size:0.95rem;line-height:1.5;transition:border-color .2s,transform .1s}
.challenge-option:hover{border-color:var(--text);transform:translateX(4px)}

/* history & favorites */
.section-title{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);margin:24px 0 10px;text-align:center;z-index:1}
.history-list,.fav-list{max-width:680px;width:100%;margin:0 auto;z-index:1}
.hist-item,.fav-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;font-size:0.82rem;font-style:italic;line-height:1.5;display:flex;align-items:flex-start;gap:8px;font-family:Georgia,'Times New Roman',serif}
.hist-item .num{color:var(--dim);font-size:0.7rem;font-family:-apple-system,sans-serif;min-width:20px;font-style:normal}
.hist-item .txt,.fav-item .txt{flex:1}
.fav-item .unfav{background:none;border:none;cursor:pointer;font-size:1rem;opacity:.5;transition:opacity .15s}
.fav-item .unfav:hover{opacity:1}
.share-btn{background:none;border:none;cursor:pointer;font-size:0.9rem;opacity:.4;transition:opacity .15s;padding:2px}
.share-btn:hover{opacity:1}
.copy-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:10px;font-family:-apple-system,sans-serif;font-size:0.82rem;font-weight:600;opacity:0;transition:transform .3s,opacity .3s;z-index:100;pointer-events:none}
.copy-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* responsive */
@media(max-width:480px){
  body{padding:0 10px 30px}
  .prompt-card{padding:20px 14px 16px}
  .pills{gap:6px}
  .pill{padding:5px 10px;font-size:0.72rem}
  .btn{padding:10px 24px;font-size:0.9rem}
}
</style>
</head>
<body>

<a href="../games.html" class="back-link">← Back to Games</a>

<header>
  <h1>Sketchables</h1>
  <div class="subtitle">Kiwi's Art Ideas</div>
</header>

<div class="combo-math">
  <div class="formula" id="formula"></div>
  <div class="total"><span id="totalCombos"></span> possible prompts</div>
</div>

<div class="counter-bar">
  <div>Seen: <b id="seenCount">0</b></div>
  <div>Possible: <b id="possibleShort"></b></div>
  <div>Favorites: <b id="favCount">0</b></div>
</div>

<div class="timer-display" id="timerDisplay">
  <div class="label">Next prompt in</div>
  <div class="time" id="timerTime">60</div>
</div>

<div class="challenge-wrap" id="challengeWrap">
  <h3>Pick your challenge</h3>
  <div id="challengeOptions"></div>
</div>

<div class="prompt-card" id="promptCard">
  <button class="fav-btn" id="favBtn" title="Save to favorites">☆</button>
  <div class="prompt-text" id="promptText">Press Generate to get your first sketch idea!</div>
</div>

<div class="pills" id="pills"></div>

<div class="btn-row">
  <button class="btn" id="generateBtn">Generate</button>
  <button class="btn btn-sm" id="shareBtn" title="Copy prompt">📋 Copy</button>
</div>

<div class="controls">
  <button class="btn-sm" id="difficultyBtn">Mode: Full</button>
  <button class="btn-sm" id="timerBtn">Timer: Off</button>
  <button class="btn-sm" id="challengeBtn">Challenge</button>
</div>

<div class="section-title" id="favTitle" style="display:none">★ Favorites</div>
<div class="fav-list" id="favList"></div>

<div class="section-title">Recent History</div>
<div class="history-list" id="historyList"></div>

<div class="copy-toast" id="copyToast">Copied to clipboard!</div>

<script>
// ─── WORD BANKS ───
const SUBJECTS = [
  // Animals (~80)
  "cat","dog","fox","owl","bear","whale","octopus","raven","deer","wolf",
  "rabbit","turtle","elephant","penguin","butterfly","seahorse","hedgehog","frog","snake","eagle",
  "jellyfish","chameleon","pangolin","axolotl","narwhal","crow","flamingo","sloth","otter","parrot",
  "bat","bee","dragonfly","salamander","raccoon","koala","panda","tiger","lion","gorilla",
  "swan","peacock","moth","starfish","crab","lobster","scorpion","spider","caterpillar","firefly",
  "hummingbird","pelican","toucan","puffin","albatross","stingray","manta ray","hammerhead shark","koi fish","goldfish",
  "snail","slug","worm","centipede","ladybug","praying mantis","cicada","hermit crab","sea turtle","blue whale",
  "red panda","arctic fox","snow leopard","capybara","quokka","tapir","okapi","platypus","kiwi bird","dodo",
  // People (~50)
  "old man","little girl","grandmother","knight","astronaut","chef","pirate","witch","scientist","dancer",
  "musician","farmer","detective","queen","samurai","robot","alien","mermaid","ghost","fairy",
  "goblin","wizard","librarian","monk","jester","blacksmith","explorer","archaeologist","beekeeper","lighthouse keeper",
  "clockmaker","fortune teller","street performer","puppeteer","gardener","glassblower","cartographer","alchemist","shepherdess","toymaker",
  "gravedigger","night watchman","chimney sweep","gondolier","falconer","deep sea diver","storm chaser","puppetmaster","oracle","wandering bard",
  // Objects (~30)
  "teacup","lighthouse","clock","guitar","umbrella","lantern","book","key","ship","train",
  "bicycle","typewriter","telescope","globe","candle","compass","crystal ball","hourglass","music box","gramophone",
  "sewing machine","birdcage","paper airplane","hot air balloon","windmill","treehouse","carousel","jack-in-the-box","snow globe","cuckoo clock"
];

const ACTIONS = [
  "sitting","dancing","sleeping","flying","reading","painting","hiding","fighting","dreaming","floating",
  "climbing","falling","laughing","crying","singing","running","waiting","watching","building","destroying",
  "hugging","arguing","fishing","cooking","meditating","whispering","juggling","balancing on","leaping over","crawling through",
  "conducting an orchestra of","sketching","knitting","writing a letter to","performing surgery on","taming","befriending","chasing","fleeing from","protecting",
  "studying","repairing","polishing","mourning","celebrating with","teaching","learning from","wrestling","serenading","stargazing with",
  "philosophizing about","trading secrets with","arm-wrestling","slow-dancing with","playing chess against","shadow-boxing","hitchhiking with","napping beside","eavesdropping on","photobombing",
  "high-fiving","dueling","sculpting","brewing tea for","outsmarting","consoling","interrogating","hypnotizing","ambushing","saluting"
];

const MOODS = [
  "melancholy","joyful","anxious","brave","lonely","mischievous","serene","furious","curious","nostalgic",
  "hopeful","terrified","proud","confused","content","wild","gentle","fierce","dreamy","haunted",
  "playful","solemn","defiant","wistful","giddy","brooding","radiant","suspicious","bewildered","determined",
  "bittersweet","reckless","tender","stoic","euphoric","indifferent","sheepish","vengeful","whimsical","reverent",
  "frantic","somber","exuberant","pensive","lovestruck","grumpy","awestruck","resigned","bold","nonchalant",
  "spellbound","guilt-ridden","mirthful","volatile","contemplative"
];

const SETTINGS = [
  "in a sunflower field","at a bus stop","on the moon","underwater","in a library",
  "at the edge of a cliff","in a crowded market","inside a whale","on a rooftop at night","in a snowstorm",
  "at a carnival","in an abandoned factory","inside a dream","at the bottom of the ocean","in a cozy kitchen",
  "on a moving train","at sunset","in a graveyard","at a crossroads","in a bamboo forest",
  "on top of a skyscraper","in a candlelit cave","at a train station at midnight","in a field of lavender","on a frozen lake",
  "inside a clock tower","in a dusty attic","at the mouth of a volcano","in a greenhouse","on a crumbling bridge",
  "in a paper lantern festival","at the gates of a castle","in a foggy harbor","on a desert highway","inside a snow globe",
  "in a flooded city","at the peak of a mountain","in an enchanted garden","on a pirate ship","inside a painting",
  "at a lonely gas station","in a coral reef","on a Ferris wheel","in a medieval tavern","at a jazz club",
  "in a mirror maze","on a space station","in a mushroom forest","at dawn in the Sahara","inside an old bookshop",
  "on a creaky dock","in a subway tunnel","at a roadside shrine","in a bioluminescent bay","on the wing of an airplane",
  "inside a cathedral","in a junkyard","at a farmer's market","on a lily pad","in a rainstorm",
  "at the edge of the world","in a blanket fort","on a tightrope","inside a teacup","at an abandoned amusement park"
];

const STYLES = [
  "charcoal","watercolor","ink wash","pencil sketch","pen and ink",
  "cross-hatching","pointillism","loose gestural","tight detailed","contour line",
  "blind contour","negative space","silhouette","mixed media","collage style",
  "woodcut","linocut","scratchy","soft shading","bold outlines",
  "minimal line","stippling","dry brush","conte crayon","graphite",
  "sumi-e","gouache","colored pencil","marker","monochrome wash",
  "geometric","expressionist","blueprint style","vintage engraving","editorial illustration",
  "storybook illustration","anatomical study","field sketch","quick gesture","chiaroscuro"
];

const MODIFIERS = [
  "wearing a top hat","carrying a tiny sword","surrounded by flowers","with glowing eyes","made of clockwork",
  "partially invisible","enormous","tiny","upside down","with butterfly wings",
  "covered in moss","made of paper","dripping with honey","translucent","on fire",
  "frozen in ice","multiplied","fractured","dissolving","holding a map",
  "wearing headphones","with a long shadow","entangled in vines","hovering slightly","missing a piece",
  "reflected in water","made of stained glass","wrapped in bandages","orbited by tiny stars","with an extra pair of arms",
  "half-submerged","glitching","wearing mismatched shoes","trailing smoke","with a halo",
  "stitched together","dappled in sunlight","silhouetted against the sky","cracking open","sprouting mushrooms",
  "wearing a spacesuit","covered in postage stamps","tangled in string lights","with roots growing out","carrying an impossibly tall stack of books",
  "made of constellations","dripping paint","wearing a crown of thorns","phasing through a wall","leaving footprints of flowers"
];

// ─── CATEGORIES ───
const CATS = [
  {key:"mood",   label:"Mood",    icon:"🎭", arr:MOODS,    color:"var(--mood)"},
  {key:"subject",label:"Subject", icon:"🎯", arr:SUBJECTS, color:"var(--subject)"},
  {key:"action", label:"Action",  icon:"💃", arr:ACTIONS,  color:"var(--action)"},
  {key:"setting",label:"Setting", icon:"🌍", arr:SETTINGS, color:"var(--setting)"},
  {key:"style",  label:"Style",   icon:"✏️", arr:STYLES,   color:"var(--style)"},
  {key:"modifier",label:"Extra",  icon:"✨", arr:MODIFIERS,color:"var(--modifier)"}
];

const SIMPLE_CATS = ["subject","action","style"];

// ─── STATE ───
let current = {};
let locks = {};
let history = JSON.parse(localStorage.getItem("sketch_history")||"[]");
let favorites = JSON.parse(localStorage.getItem("sketch_favorites")||"[]");
let seenCount = parseInt(localStorage.getItem("sketch_seen")||"0",10);
let mode = "full"; // full | simple
let timerMode = 0; // 0=off, 30, 60, 120
let timerInterval = null;
let timerRemaining = 0;
let challengeActive = false;
let hasGenerated = false;

// ─── AUDIO ───
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}

function playClick(){
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type="sine";o.frequency.setValueAtTime(1800,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(600,audioCtx.currentTime+.06);
  g.gain.setValueAtTime(.12,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);
  o.start();o.stop(audioCtx.currentTime+.08);
}

function playTick(){
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type="square";o.frequency.setValueAtTime(2400+Math.random()*800,audioCtx.currentTime);
  g.gain.setValueAtTime(.03,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.02);
  o.start();o.stop(audioCtx.currentTime+.02);
}

function playChime(){
  ensureAudio();
  [880,1100,1320].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type="sine";o.frequency.value=f;
    const t=audioCtx.currentTime+i*.06;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.01);
    g.gain.exponentialRampToValueAtTime(.001,t+.3);
    o.start(t);o.stop(t+.3);
  });
}

// ─── COMPUTE COMBOS ───
function activeCats(){return CATS.filter(c=>mode==="full"||SIMPLE_CATS.includes(c.key))}
function totalCombos(){return activeCats().reduce((n,c)=>n*c.arr.length,1)}
function formatNum(n){
  if(n>=1e9)return (n/1e9).toFixed(1).replace(/\.0$/,"")+"B";
  if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,"")+"M";
  if(n>=1e3)return (n/1e3).toFixed(1).replace(/\.0$/,"")+"K";
  return n.toLocaleString();
}

function updateMath(){
  const ac=activeCats();
  document.getElementById("formula").textContent=ac.map(c=>c.arr.length).join(" × ")+" = "+totalCombos().toLocaleString();
  document.getElementById("totalCombos").textContent=formatNum(totalCombos());
  document.getElementById("possibleShort").textContent=formatNum(totalCombos());
}

// ─── RANDOM PICK ───
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function randomize(onlyKey){
  const ac=activeCats();
  ac.forEach(c=>{
    if(onlyKey && c.key!==onlyKey) return;
    if(locks[c.key]) return;
    current[c.key]=pick(c.arr);
  });
}

// ─── RENDER ───
function buildPromptHTML(){
  const ac=activeCats();
  if(!hasGenerated) return "Press <b>Generate</b> to get your first sketch idea!";
  const m=current.mood, su=current.subject, ac2=current.action, se=current.setting, st=current.style, mo=current.modifier;
  if(mode==="simple"){
    // subject + action + style
    const article = /^[aeiou]/i.test(su)?"An":"A";
    return `${article} <span class="c-subject">${su}</span> <span class="c-action">${ac2}</span>, <span class="c-style">${st}</span> style`;
  }
  // full
  const article = /^[aeiou]/i.test(m)?"An":"A";
  return `${article} <span class="c-mood">${m}</span> <span class="c-subject">${su}</span> <span class="c-action">${ac2}</span> <span class="c-setting">${se}</span>, <span class="c-modifier">${mo}</span>, <span class="c-style">${st}</span>`;
}

function buildPromptText(){
  if(!hasGenerated) return "";
  const ac=activeCats();
  const m=current.mood, su=current.subject, ac2=current.action, se=current.setting, st=current.style, mo=current.modifier;
  if(mode==="simple"){
    const article = /^[aeiou]/i.test(su)?"An":"A";
    return `${article} ${su} ${ac2}, ${st} style`;
  }
  const article = /^[aeiou]/i.test(m)?"An":"A";
  return `${article} ${m} ${su} ${ac2} ${se}, ${mo}, ${st}`;
}

function renderPills(){
  const cont=document.getElementById("pills");
  cont.innerHTML="";
  const ac=activeCats();
  ac.forEach(c=>{
    const pill=document.createElement("div");
    pill.className="pill"+(locks[c.key]?" locked":"");
    pill.dataset.cat=c.key;
    pill.innerHTML=`${c.icon} ${current[c.key]||"..."} <span class="lock">${locks[c.key]?"🔒":"🔓"}</span>`;
    pill.title=`Click to re-roll ${c.label}. Hold/right-click to lock.`;
    pill.addEventListener("click",e=>{
      if(e.shiftKey){
        locks[c.key]=!locks[c.key];
        renderPills();
        return;
      }
      locks[c.key]=false;
      current[c.key]=pick(c.arr);
      playClick();
      renderPrompt();
      renderPills();
    });
    pill.addEventListener("contextmenu",e=>{
      e.preventDefault();
      locks[c.key]=!locks[c.key];
      renderPills();
    });
    cont.appendChild(pill);
  });
}

function renderPrompt(){
  document.getElementById("promptText").innerHTML=buildPromptHTML();
  updateFavBtn();
}

function renderHistory(){
  const cont=document.getElementById("historyList");
  cont.innerHTML="";
  history.slice().reverse().forEach((h,i)=>{
    const div=document.createElement("div");
    div.className="hist-item";
    div.innerHTML=`<span class="num">${history.length-i}</span><span class="txt">${h}</span><button class="share-btn" title="Copy">📋</button>`;
    div.querySelector(".share-btn").addEventListener("click",()=>copyText(h));
    cont.appendChild(div);
  });
}

function renderFavorites(){
  const cont=document.getElementById("favList");
  const title=document.getElementById("favTitle");
  cont.innerHTML="";
  title.style.display=favorites.length?"block":"none";
  document.getElementById("favCount").textContent=favorites.length;
  favorites.forEach((f,i)=>{
    const div=document.createElement("div");
    div.className="fav-item";
    div.innerHTML=`<span class="txt">${f}</span><button class="unfav" title="Remove">✕</button><button class="share-btn" title="Copy">📋</button>`;
    div.querySelector(".unfav").addEventListener("click",()=>{
      favorites.splice(i,1);
      localStorage.setItem("sketch_favorites",JSON.stringify(favorites));
      renderFavorites();
      updateFavBtn();
    });
    div.querySelector(".share-btn").addEventListener("click",()=>copyText(f));
    cont.appendChild(div);
  });
}

function updateFavBtn(){
  const btn=document.getElementById("favBtn");
  const txt=buildPromptText();
  const isFav=favorites.includes(txt);
  btn.textContent=isFav?"★":"☆";
  btn.classList.toggle("active",isFav);
}

// ─── SLOT ANIMATION ───
async function slotAnimate(){
  const el=document.getElementById("promptText");
  el.classList.add("spinning");
  const ac=activeCats();
  const steps=12;
  for(let i=0;i<steps;i++){
    ac.forEach(c=>{
      if(!locks[c.key]) current[c.key]=pick(c.arr);
    });
    el.innerHTML=buildPromptHTML();
    playTick();
    await new Promise(r=>setTimeout(r,40+i*12));
  }
  // final pick
  ac.forEach(c=>{
    if(!locks[c.key]) current[c.key]=pick(c.arr);
  });
  el.classList.remove("spinning");
  renderPrompt();
  renderPills();
  playChime();
}

// ─── GENERATE ───
async function generate(){
  hasGenerated=true;
  await slotAnimate();
  const txt=buildPromptText();
  seenCount++;
  localStorage.setItem("sketch_seen",seenCount);
  document.getElementById("seenCount").textContent=seenCount;
  // add to history (keep last 20)
  history.push(txt);
  if(history.length>20) history=history.slice(-20);
  localStorage.setItem("sketch_history",JSON.stringify(history));
  renderHistory();
  updateFavBtn();
}

// ─── TIMER ───
function startTimer(){
  stopTimer();
  if(!timerMode) return;
  timerRemaining=timerMode;
  document.getElementById("timerDisplay").style.display="block";
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerRemaining--;
    updateTimerDisplay();
    if(timerRemaining<=0){
      generate();
      timerRemaining=timerMode;
    }
  },1000);
}

function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  document.getElementById("timerDisplay").style.display="none";
}

function updateTimerDisplay(){
  const el=document.getElementById("timerTime");
  el.textContent=timerRemaining;
  el.classList.toggle("urgent",timerRemaining<=5);
}

// ─── CHALLENGE ───
function startChallenge(){
  challengeActive=true;
  const wrap=document.getElementById("challengeWrap");
  const opts=document.getElementById("challengeOptions");
  wrap.style.display="block";
  document.getElementById("promptCard").style.display="none";
  document.getElementById("pills").style.display="none";
  opts.innerHTML="";
  for(let i=0;i<3;i++){
    randomize();
    hasGenerated=true;
    const txt=buildPromptText();
    const html=buildPromptHTML();
    const div=document.createElement("div");
    div.className="challenge-option";
    div.innerHTML=html;
    div.addEventListener("click",()=>{
      wrap.style.display="none";
      document.getElementById("promptCard").style.display="flex";
      document.getElementById("pills").style.display="flex";
      // parse back the text — just re-render
      document.getElementById("promptText").innerHTML=html;
      renderPills();
      seenCount++;
      localStorage.setItem("sketch_seen",seenCount);
      document.getElementById("seenCount").textContent=seenCount;
      history.push(txt);
      if(history.length>20) history=history.slice(-20);
      localStorage.setItem("sketch_history",JSON.stringify(history));
      renderHistory();
      challengeActive=false;
      // Start a 5-minute timer
      timerMode=300;
      document.getElementById("timerBtn").textContent="Timer: 5:00";
      document.getElementById("timerBtn").classList.add("active");
      timerRemaining=300;
      document.getElementById("timerDisplay").style.display="block";
      document.getElementById("timerDisplay").querySelector(".label").textContent="Sketch time remaining";
      if(timerInterval) clearInterval(timerInterval);
      timerInterval=setInterval(()=>{
        timerRemaining--;
        if(timerRemaining<=0){
          stopTimer();
          timerMode=0;
          document.getElementById("timerBtn").textContent="Timer: Off";
          document.getElementById("timerBtn").classList.remove("active");
          playChime();playChime();
          document.getElementById("timerDisplay").querySelector(".label").textContent="Time's up!";
          document.getElementById("timerDisplay").style.display="block";
          document.getElementById("timerTime").textContent="Done!";
          document.getElementById("timerTime").classList.remove("urgent");
          return;
        }
        const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
        document.getElementById("timerTime").textContent=m+":"+(s<10?"0":"")+s;
        document.getElementById("timerTime").classList.toggle("urgent",timerRemaining<=10);
      },1000);
      const m2=Math.floor(timerRemaining/60),s2=timerRemaining%60;
      document.getElementById("timerTime").textContent=m2+":"+(s2<10?"0":"")+s2;
    });
    opts.appendChild(div);
    randomize(); // reset for next
  }
}

// ─── COPY ───
function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>{
    const toast=document.getElementById("copyToast");
    toast.classList.add("show");
    setTimeout(()=>toast.classList.remove("show"),1500);
  });
}

// ─── INIT ───
function init(){
  // initial state
  CATS.forEach(c=>{current[c.key]=pick(c.arr)});
  updateMath();
  document.getElementById("seenCount").textContent=seenCount;
  renderHistory();
  renderFavorites();
  renderPills();

  // Generate button
  document.getElementById("generateBtn").addEventListener("click",()=>{
    if(challengeActive) return;
    generate();
    if(timerMode && !document.getElementById("challengeWrap").style.display!=="none"){
      startTimer();
    }
  });

  // Favorite button
  document.getElementById("favBtn").addEventListener("click",()=>{
    if(!hasGenerated) return;
    const txt=buildPromptText();
    const idx=favorites.indexOf(txt);
    if(idx>=0){
      favorites.splice(idx,1);
    } else {
      favorites.push(txt);
    }
    localStorage.setItem("sketch_favorites",JSON.stringify(favorites));
    renderFavorites();
    updateFavBtn();
  });

  // Copy button
  document.getElementById("shareBtn").addEventListener("click",()=>{
    if(!hasGenerated) return;
    copyText(buildPromptText());
  });

  // Difficulty toggle
  document.getElementById("difficultyBtn").addEventListener("click",()=>{
    mode=mode==="full"?"simple":"full";
    document.getElementById("difficultyBtn").textContent=mode==="full"?"Mode: Full":"Mode: Simple";
    document.getElementById("difficultyBtn").classList.toggle("active",mode==="simple");
    updateMath();
    if(hasGenerated){renderPrompt();renderPills();}
  });

  // Timer toggle
  document.getElementById("timerBtn").addEventListener("click",()=>{
    const modes=[0,30,60,120];
    const labels=["Off","30s","60s","2m"];
    let idx=modes.indexOf(timerMode);
    idx=(idx+1)%modes.length;
    timerMode=modes[idx];
    document.getElementById("timerBtn").textContent="Timer: "+labels[idx];
    document.getElementById("timerBtn").classList.toggle("active",timerMode>0);
    if(timerMode>0){
      document.getElementById("timerDisplay").querySelector(".label").textContent="Next prompt in";
      startTimer();
    } else {
      stopTimer();
    }
  });

  // Challenge button
  document.getElementById("challengeBtn").addEventListener("click",()=>{
    if(challengeActive){
      challengeActive=false;
      document.getElementById("challengeWrap").style.display="none";
      document.getElementById("promptCard").style.display="flex";
      document.getElementById("pills").style.display="flex";
      return;
    }
    startChallenge();
  });

  // Keyboard shortcut
  document.addEventListener("keydown",e=>{
    if(e.code==="Space"&&!e.target.closest("input,textarea")){
      e.preventDefault();
      if(!challengeActive) generate();
    }
  });
}

init();
</script>
