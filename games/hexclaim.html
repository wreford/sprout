<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Hex Claim 🔷</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#0a0a14;overflow:hidden;touch-action:manipulation;user-select:none}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// ── Sound
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.03,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
// Chill pentatonic tones
var NOTES = [261,293,329,392,440,523,587,659];
var noteIdx = 0;
function sndClaim(){tone(NOTES[noteIdx%NOTES.length],0.15,"sine",0.02);noteIdx++;}
function sndCapture(){var base=NOTES[Math.floor(Math.random()*5)];tone(base,0.3,"sine",0.04);setTimeout(function(){tone(base*1.5,0.3,"sine",0.03);},120);setTimeout(function(){tone(base*2,0.4,"sine",0.03);},240);}
function sndDie(){tone(220,0.4,"sine",0.04);setTimeout(function(){tone(165,0.5,"sine",0.03);},200);}
function sndKill(){tone(440,0.15,"sine",0.03);setTimeout(function(){tone(523,0.15,"sine",0.03);},100);}

// ── Hex grid
var HEX_SIZE = 16;
var GRID_W = 80;
var GRID_H = 60;
var grid = []; // 0=empty, 1=player territory, 2-5=AI territory
var trail = []; // [{gx,gy}] player's current trail

var sqrt3 = Math.sqrt(3);
function hexToPixel(gx, gy) {
  var x = HEX_SIZE * 1.5 * gx;
  var y = HEX_SIZE * sqrt3 * (gy + (gx % 2 === 1 ? 0.5 : 0));
  return {x: x, y: y};
}
function pixelToHex(px, py) {
  var gx = Math.round(px / (HEX_SIZE * 1.5));
  var gy = Math.round((py / (HEX_SIZE * sqrt3)) - (gx % 2 === 1 ? 0.5 : 0));
  return {gx: gx, gy: gy};
}
function hexNeighbors(gx, gy) {
  var even = gx % 2 === 0;
  return [
    {gx:gx+1, gy:even?gy-1:gy}, {gx:gx+1, gy:even?gy:gy+1},
    {gx:gx-1, gy:even?gy-1:gy}, {gx:gx-1, gy:even?gy:gy+1},
    {gx:gx, gy:gy-1}, {gx:gx, gy:gy+1}
  ];
}
function inBounds(gx,gy){return gx>=0&&gy>=0&&gx<GRID_W&&gy<GRID_H;}
function getCell(gx,gy){if(!inBounds(gx,gy))return -1;return grid[gy*GRID_W+gx];}
function setCell(gx,gy,v){if(inBounds(gx,gy))grid[gy*GRID_W+gx]=v;}

// ── Colors
var COLORS = {
  0: "#0d0d1a",       // empty
  1: "#3b82f6",       // player
  2: "#ef4444",       // AI 1
  3: "#22c55e",       // AI 2
  4: "#f59e0b",       // AI 3
  5: "#a855f7",       // AI 4
};
var TRAIL_COLORS = {
  1: "#93c5fd",
  2: "#fca5a5",
  3: "#86efac",
  4: "#fcd34d",
  5: "#d8b4fe",
};
var TERRITORY_COLORS = {
  1: "rgba(59,130,246,0.3)",
  2: "rgba(239,68,68,0.3)",
  3: "rgba(34,197,94,0.3)",
  4: "rgba(245,158,11,0.3)",
  5: "rgba(168,85,247,0.3)",
};

// ── Player & AI entities
var player, ais, particles;
var STATE = "menu";
var score, frame, gameTime;

function createEntity(id, startGx, startGy) {
  // Claim a small starting area
  for (var dy=-1;dy<=1;dy++) for(var dx=-1;dx<=1;dx++){
    if(inBounds(startGx+dx,startGy+dy))setCell(startGx+dx,startGy+dy,id);
  }
  return {id:id, gx:startGx, gy:startGy, trail:[], dir:{gx:1,gy:0}, alive:true, speed:0, moveTimer:0, kills:0};
}

function reset() {
  grid = new Array(GRID_W * GRID_H).fill(0);
  particles = [];
  frame = 0;
  score = 0;
  gameTime = 0;

  player = createEntity(1, Math.floor(GRID_W/2), Math.floor(GRID_H/2));
  player.speed = 10;
  ais = [];
  var aiStarts = [{gx:10,gy:10},{gx:GRID_W-10,gy:10},{gx:10,gy:GRID_H-10},{gx:GRID_W-10,gy:GRID_H-10}];
  for (var i=0;i<4;i++) {
    var ai = createEntity(i+2, aiStarts[i].gx, aiStarts[i].gy);
    ai.speed = 14 + Math.floor(Math.random()*6);
    ai.targetGx = Math.floor(Math.random()*GRID_W);
    ai.targetGy = Math.floor(Math.random()*GRID_H);
    ai.maxTrail = 12 + Math.floor(Math.random()*10);
    ais.push(ai);
  }
  camX = player.gx * HEX_SIZE * 1.5 - W/2;
  camY = player.gy * HEX_SIZE * sqrt3 - H/2;
}

var camX=0, camY=0;
var keys={};
var swipeDir={gx:0,gy:0};

// ── Movement
function moveEntity(ent) {
  var ngx = ent.gx + ent.dir.gx;
  var ngy = ent.gy + ent.dir.gy;
  if(!inBounds(ngx,ngy)){
    // Bounce off walls
    if(!inBounds(ngx,ent.gy))ent.dir.gx=-ent.dir.gx;
    if(!inBounds(ent.gx,ngy))ent.dir.gy=-ent.dir.gy;
    return;
  }
  var cell = getCell(ngx,ngy);

  // Check if we hit someone's trail
  for(var i=0;i<ais.length;i++){
    if(!ais[i].alive)continue;
    for(var t=0;t<ais[i].trail.length;t++){
      if(ais[i].trail[t].gx===ngx&&ais[i].trail[t].gy===ngy&&ent.id!==ais[i].id){
        // Kill that AI
        killEntity(ais[i]);
        ent.kills++;
        if(ent.id===1)sndKill();
      }
    }
  }
  // Check player trail
  if(ent.id!==1){
    for(var t=0;t<player.trail.length;t++){
      if(player.trail[t].gx===ngx&&player.trail[t].gy===ngy){
        killEntity(player);
        return;
      }
    }
  }

  // If we step on our own trail, just skip (don't die — hex movement makes accidental self-crossing too easy)
  for(var t=0;t<ent.trail.length;t++){
    if(ent.trail[t].gx===ngx&&ent.trail[t].gy===ngy){
      return;
    }
  }

  ent.gx = ngx;
  ent.gy = ngy;

  if(cell === ent.id){
    // Back on own territory — claim trail
    if(ent.trail.length>0){
      captureTrail(ent);
      if(ent.id===1)sndCapture();
    }
  } else {
    // On foreign territory — extend trail
    ent.trail.push({gx:ngx, gy:ngy});
    if(ent.id===1)sndClaim();
  }
}

function captureTrail(ent) {
  // Convert trail to territory
  for(var i=0;i<ent.trail.length;i++){
    setCell(ent.trail[i].gx, ent.trail[i].gy, ent.id);
  }
  // Flood fill to capture enclosed area
  floodCapture(ent.id);
  if(ent.id===1) score = countTerritory(1);
  ent.trail = [];
}

function floodCapture(id) {
  // Find all cells NOT owned by id, check if they're enclosed
  var visited = new Array(GRID_W*GRID_H).fill(false);
  var toCapture = [];

  for(var gy=0;gy<GRID_H;gy++) for(var gx=0;gx<GRID_W;gx++){
    if(visited[gy*GRID_W+gx])continue;
    if(getCell(gx,gy)===id)continue;

    // BFS to find connected region of non-id cells
    var region = [];
    var queue = [{gx:gx,gy:gy}];
    var touchesEdge = false;
    visited[gy*GRID_W+gx] = true;

    while(queue.length>0){
      var cur = queue.shift();
      region.push(cur);
      if(cur.gx<=0||cur.gy<=0||cur.gx>=GRID_W-1||cur.gy>=GRID_H-1)touchesEdge=true;

      var neighbors = hexNeighbors(cur.gx, cur.gy);
      for(var n=0;n<neighbors.length;n++){
        var nb = neighbors[n];
        if(!inBounds(nb.gx,nb.gy)){touchesEdge=true;continue;}
        var idx = nb.gy*GRID_W+nb.gx;
        if(visited[idx])continue;
        if(getCell(nb.gx,nb.gy)===id)continue;
        visited[idx]=true;
        queue.push(nb);
      }
    }

    // If region doesn't touch edge and is small enough, capture it
    if(!touchesEdge && region.length < GRID_W*GRID_H*0.4){
      toCapture = toCapture.concat(region);
    }
  }

  for(var i=0;i<toCapture.length;i++){
    setCell(toCapture[i].gx, toCapture[i].gy, id);
  }
}

function countTerritory(id){
  var count=0;
  for(var i=0;i<grid.length;i++)if(grid[i]===id)count++;
  return count;
}

function killEntity(ent) {
  if(!ent.alive)return;
  ent.alive = false;
  // Clear trail
  for(var i=0;i<ent.trail.length;i++){
    var p = hexToPixel(ent.trail[i].gx,ent.trail[i].gy);
    spawnParticles(p.x,p.y,COLORS[ent.id],4);
  }
  ent.trail = [];
  // Spawn death particles
  var dp = hexToPixel(ent.gx,ent.gy);
  spawnParticles(dp.x,dp.y,COLORS[ent.id],12);
  if(ent.id===1){sndDie();STATE="dead";}

  // Respawn AI after delay
  if(ent.id>1){
    setTimeout(function(){
      if(STATE!=="playing")return;
      ent.gx = 2+Math.floor(Math.random()*(GRID_W-4));
      ent.gy = 2+Math.floor(Math.random()*(GRID_H-4));
      ent.trail = [];
      ent.alive = true;
      for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
        if(inBounds(ent.gx+dx,ent.gy+dy))setCell(ent.gx+dx,ent.gy+dy,ent.id);
      }
    },3000);
  }
}

function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,color:color,size:2+Math.random()*3});
  }
}

// ── AI logic
function updateAI(ai) {
  if(!ai.alive)return;
  ai.moveTimer++;
  if(ai.moveTimer<ai.speed)return;
  ai.moveTimer=0;

  // If trail is long enough, head home
  if(ai.trail.length >= ai.maxTrail){
    // Find direction toward own territory
    var bestDist=99999;var bestDir=null;
    var neighbors = hexNeighbors(ai.gx,ai.gy);
    for(var n=0;n<neighbors.length;n++){
      var nb=neighbors[n];
      if(!inBounds(nb.gx,nb.gy))continue;
      // Don't step on own trail
      var onTrail=false;
      for(var t=0;t<ai.trail.length;t++){if(ai.trail[t].gx===nb.gx&&ai.trail[t].gy===nb.gy){onTrail=true;break;}}
      if(onTrail)continue;
      if(getCell(nb.gx,nb.gy)===ai.id){
        // Go here!
        ai.dir={gx:nb.gx-ai.gx,gy:nb.gy-ai.gy};
        moveEntity(ai);
        return;
      }
      var dx2=nb.gx-ai.targetGx,dy2=nb.gy-ai.targetGy;
      var d=dx2*dx2+dy2*dy2;
      if(d<bestDist){bestDist=d;bestDir={gx:nb.gx-ai.gx,gy:nb.gy-ai.gy};}
    }
    if(bestDir){ai.dir=bestDir;moveEntity(ai);}
    return;
  }

  // Wander toward target
  if(Math.random()<0.05||Math.abs(ai.gx-ai.targetGx)<3&&Math.abs(ai.gy-ai.targetGy)<3){
    ai.targetGx=Math.floor(Math.random()*GRID_W);
    ai.targetGy=Math.floor(Math.random()*GRID_H);
  }

  var neighbors2=hexNeighbors(ai.gx,ai.gy);
  var bestDist2=99999;var bestDir2=null;
  for(var n=0;n<neighbors2.length;n++){
    var nb2=neighbors2[n];
    if(!inBounds(nb2.gx,nb2.gy))continue;
    var onTrail2=false;
    for(var t=0;t<ai.trail.length;t++){if(ai.trail[t].gx===nb2.gx&&ai.trail[t].gy===nb2.gy){onTrail2=true;break;}}
    if(onTrail2)continue;
    var dx3=nb2.gx-ai.targetGx,dy3=nb2.gy-ai.targetGy;
    var d2=dx3*dx3+dy3*dy3;
    if(d2<bestDist2){bestDist2=d2;bestDir2={gx:nb2.gx-ai.gx,gy:nb2.gy-ai.gy};}
  }
  if(bestDir2){ai.dir=bestDir2;moveEntity(ai);}
}

// ── Input
window.addEventListener('keydown',function(e){keys[e.code]=true;});
window.addEventListener('keyup',function(e){keys[e.code]=false;});
var touchActive=false,touchStartX=0,touchStartY=0;
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(STATE==="menu"){STATE="playing";reset();return;}
  if(STATE==="dead"){STATE="playing";reset();return;}
  touchActive=true;
  touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!touchActive)return;
  var dx=e.touches[0].clientX-touchStartX;
  var dy=e.touches[0].clientY-touchStartY;
  if(Math.abs(dx)>15||Math.abs(dy)>15){
    if(Math.abs(dx)>Math.abs(dy)){swipeDir={gx:dx>0?1:-1,gy:0};}
    else{swipeDir={gx:0,gy:dy>0?1:-1};}
    touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
  }
},{passive:false});
canvas.addEventListener('touchend',function(){touchActive=false;});
canvas.addEventListener('click',function(){
  if(STATE==="menu"){STATE="playing";reset();}
  else if(STATE==="dead"){STATE="playing";reset();}
});

// ── Update
function update() {
  if(STATE!=="playing")return;
  frame++;
  gameTime++;

  // Player direction from keys
  if(keys["ArrowRight"]||keys["KeyD"])player.dir={gx:1,gy:0};
  else if(keys["ArrowLeft"]||keys["KeyA"])player.dir={gx:-1,gy:0};
  else if(keys["ArrowDown"]||keys["KeyS"])player.dir={gx:0,gy:1};
  else if(keys["ArrowUp"]||keys["KeyW"])player.dir={gx:0,gy:-1};
  if(swipeDir.gx||swipeDir.gy){player.dir=swipeDir;swipeDir={gx:0,gy:0};}

  // Move player
  player.moveTimer++;
  if(player.moveTimer>=player.speed){
    player.moveTimer=0;
    if(player.alive)moveEntity(player);
  }

  // Move AIs
  for(var i=0;i<ais.length;i++)updateAI(ais[i]);

  // Camera follow player
  var pp=hexToPixel(player.gx,player.gy);
  camX+=(pp.x-W/2-camX)*0.08;
  camY+=(pp.y-H/2-camY)*0.08;

  // Update score
  if(frame%30===0)score=countTerritory(1);

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.025;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── Draw
function drawHex(cx, cy, size, fill, stroke) {
  ctx.beginPath();
  for(var i=0;i<6;i++){
    var angle = Math.PI/180*(60*i-30);
    var x=cx+size*Math.cos(angle);
    var y=cy+size*Math.sin(angle);
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=0.5;ctx.stroke();}
}

function draw() {
  ctx.fillStyle="#0a0a14";
  ctx.fillRect(0,0,W,H);

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 32px monospace";ctx.fillStyle="#3b82f6";ctx.fillText("HEX CLAIM",W/2,H*0.28);
    ctx.font="40px serif";ctx.fillText("🔷",W/2,H*0.4);
    ctx.font="12px monospace";ctx.fillStyle="#888";
    ctx.fillText("Chill hex territory game",W/2,H*0.52);
    ctx.fillText("Venture out, draw a path, return home to claim land",W/2,H*0.57);
    ctx.fillText("Watch out for other players' trails",W/2,H*0.62);
    ctx.fillText("WASD / Arrow keys / Swipe to move",W/2,H*0.70);
    ctx.fillStyle="#3b82f6";ctx.fillText("[ Tap / Click to start ]",W/2,H*0.80);
    ctx.font="10px monospace";ctx.fillStyle="#444";ctx.fillText("taskiap.com",W/2,H*0.92);
    return;
  }

  // Draw visible hex grid
  var startGx=Math.max(0,Math.floor((camX-HEX_SIZE)/(HEX_SIZE*1.5)));
  var endGx=Math.min(GRID_W,Math.ceil((camX+W+HEX_SIZE)/(HEX_SIZE*1.5)));
  var startGy=Math.max(0,Math.floor((camY-HEX_SIZE)/(HEX_SIZE*sqrt3)));
  var endGy=Math.min(GRID_H,Math.ceil((camY+H+HEX_SIZE)/(HEX_SIZE*sqrt3)));

  for(var gy=startGy;gy<endGy;gy++){
    for(var gx=startGx;gx<endGx;gx++){
      var p=hexToPixel(gx,gy);
      var sx=p.x-camX, sy=p.y-camY;
      var cell=getCell(gx,gy);
      var fill = cell>0 ? TERRITORY_COLORS[cell] : null;
      drawHex(sx, sy, HEX_SIZE-1, fill || "#0d0d1a", "#1a1a2e");
    }
  }

  // Draw trails
  function drawTrail(ent) {
    for(var i=0;i<ent.trail.length;i++){
      var p=hexToPixel(ent.trail[i].gx,ent.trail[i].gy);
      drawHex(p.x-camX, p.y-camY, HEX_SIZE-1, TRAIL_COLORS[ent.id], COLORS[ent.id]);
    }
  }
  if(player.alive)drawTrail(player);
  for(var i=0;i<ais.length;i++){if(ais[i].alive)drawTrail(ais[i]);}

  // Draw entities
  function drawEntity(ent) {
    if(!ent.alive)return;
    var p=hexToPixel(ent.gx,ent.gy);
    var sx=p.x-camX, sy=p.y-camY;
    ctx.fillStyle=COLORS[ent.id];
    ctx.beginPath();ctx.arc(sx,sy,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";
    ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
  }
  drawEntity(player);
  for(var i=0;i<ais.length;i++)drawEntity(ais[i]);

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // HUD
  ctx.font="bold 14px monospace";ctx.textAlign="left";
  ctx.fillStyle="#3b82f6";ctx.fillText("Territory: "+score,12,24);
  ctx.fillStyle="#888";ctx.font="11px monospace";
  ctx.fillText("Kills: "+player.kills,12,42);

  var totalCells=GRID_W*GRID_H;
  var pct=Math.round(score/totalCells*100);
  ctx.textAlign="right";
  ctx.fillStyle="#3b82f6";ctx.font="bold 14px monospace";
  ctx.fillText(pct+"%",W-12,24);

  // AI territory counts
  for(var i=0;i<ais.length;i++){
    ctx.fillStyle=COLORS[ais[i].id];ctx.font="10px monospace";
    var aiPct=Math.round(countTerritory(ais[i].id)/totalCells*100);
    ctx.fillText((ais[i].alive?"●":"✗")+" "+aiPct+"%",W-12,42+i*14);
  }

  // Minimap
  var mmW=80,mmH=60,mmX=W-mmW-8,mmY=H-mmH-8;
  ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(mmX,mmY,mmW,mmH);
  ctx.strokeStyle="#333";ctx.lineWidth=1;ctx.strokeRect(mmX,mmY,mmW,mmH);
  for(var gy2=0;gy2<GRID_H;gy2+=2){
    for(var gx2=0;gx2<GRID_W;gx2+=2){
      var c=getCell(gx2,gy2);
      if(c>0){
        ctx.fillStyle=COLORS[c];
        ctx.fillRect(mmX+gx2*mmW/GRID_W, mmY+gy2*mmH/GRID_H, 2, 2);
      }
    }
  }
  // Player dot on minimap
  ctx.fillStyle="#fff";
  ctx.fillRect(mmX+player.gx*mmW/GRID_W-1, mmY+player.gy*mmH/GRID_H-1, 3, 3);

  // Dead screen
  if(STATE==="dead"){
    ctx.fillStyle="rgba(0,0,0,0.65)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";ctx.font="bold 28px monospace";
    ctx.fillStyle="#ef4444";ctx.fillText("TRAIL CUT!",W/2,H*0.32);
    ctx.font="36px serif";ctx.fillText("💀🔷💀",W/2,H*0.42);
    ctx.font="bold 16px monospace";ctx.fillStyle="#3b82f6";
    ctx.fillText("Territory: "+score+" ("+pct+"%)",W/2,H*0.55);
    ctx.fillText("Kills: "+player.kills,W/2,H*0.62);
    ctx.font="13px monospace";ctx.fillStyle="#666";
    ctx.fillText("Tap to retry",W/2,H*0.74);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
