<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Memory Clicker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--panel:#1e293b;--border:#334155;--text:#e2e8f0;
  --dim:#64748b;--accent:#3b82f6;--gold:#fbbf24;--green:#22c55e;
  --red:#ef4444;--purple:#a855f7;--cyan:#06b6d4;--pink:#ec4899;
  --orange:#f97316;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;margin:0;padding:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
body{display:flex;flex-direction:column;align-items:center;height:100dvh}

/* Background dots */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(59,130,246,0.06) 1px,transparent 1px);
  background-size:32px 32px;
}

/* Screens */
.screen{display:none;flex-direction:column;align-items:center;width:100%;height:100%;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1}
.screen.active{display:flex}

/* Title Screen */
#title-screen{justify-content:center;gap:24px;background:radial-gradient(ellipse at 50% 40%,#1e3a5f 0%,var(--bg) 70%)}
#title-screen h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;letter-spacing:1px}
#title-screen .subtitle{color:var(--dim);font-size:0.85rem;margin-top:-12px;text-align:center}
.title-play-btn{background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;padding:16px 48px;border-radius:16px;font-size:1.2rem;font-weight:800;cursor:pointer;box-shadow:0 4px 24px rgba(59,130,246,0.4);transition:transform 0.15s,box-shadow 0.15s}
.title-play-btn:active{transform:scale(0.95);box-shadow:0 2px 12px rgba(59,130,246,0.3)}

/* Hub Screen */
#hub-screen{padding:0}
.hub-header{width:100%;background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;text-align:center;flex-shrink:0}
.points-display{font-size:1.8rem;font-weight:900;color:var(--gold);font-variant-numeric:tabular-nums}
.points-per-sec{font-size:0.8rem;color:var(--dim);margin-top:2px}
.hub-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;min-height:0}
.mascot-container{position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center}
.mascot-container svg{width:140px;height:140px}
.mascot-container.generating{animation:mascotPulse 1.5s ease-in-out infinite}
@keyframes mascotPulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(251,191,36,0.3))}50%{transform:scale(1.06);filter:drop-shadow(0 0 20px rgba(251,191,36,0.6))}}
.hub-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
.hub-btn{border:none;padding:14px 24px;border-radius:14px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:transform 0.12s;display:flex;align-items:center;justify-content:center;gap:8px}
.hub-btn:active{transform:scale(0.96)}
.play-btn{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff;box-shadow:0 4px 16px rgba(34,197,94,0.3)}
.upgrade-btn{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;box-shadow:0 4px 16px rgba(168,85,247,0.3)}
.prestige-btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;box-shadow:0 4px 16px rgba(251,191,36,0.3);display:none}
.hub-stats{width:100%;max-width:320px;display:flex;justify-content:space-around;padding:12px;background:var(--panel);border-radius:12px;border:1px solid var(--border)}
.hub-stat{text-align:center}
.hub-stat .label{font-size:0.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.hub-stat .value{font-size:1rem;font-weight:700;color:var(--text);margin-top:2px}

/* Game Screen */
#game-screen{padding:0}
.game-header{width:100%;background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.game-info{display:flex;gap:16px;align-items:center}
.game-stat{text-align:center}
.game-stat .label{font-size:0.6rem;color:var(--dim);text-transform:uppercase}
.game-stat .val{font-size:1rem;font-weight:700}
.game-quit-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:8px;font-size:0.75rem;cursor:pointer}
.game-board{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;min-height:0}
.card-grid{display:grid;gap:8px;justify-content:center;align-content:center}
.game-combo{width:100%;text-align:center;padding:4px;font-size:0.85rem;font-weight:700;color:var(--gold);min-height:24px;flex-shrink:0}

/* Card */
.card{perspective:800px;cursor:pointer;position:relative}
.card-inner{width:100%;height:100%;transition:transform 0.4s ease;transform-style:preserve-3d;position:relative}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card.matched .card-inner{transform:rotateY(180deg)}
.card.matched{pointer-events:none}
.card.matched .card-front-face{box-shadow:0 0 16px rgba(34,197,94,0.5)}
.card-face{backface-visibility:hidden;position:absolute;width:100%;height:100%;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-back-face{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:2px solid #3b82f6;box-shadow:0 2px 8px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.1)}
.card-back-face .card-pattern{position:absolute;inset:4px;border-radius:7px;border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center}
.card-back-face .card-label{font-size:0.45rem;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase}
.card-front-face{transform:rotateY(180deg);border:2px solid rgba(255,255,255,0.15);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.card-front-face svg{width:60%;height:60%}

/* Match particles */
.match-particle{position:fixed;pointer-events:none;width:8px;height:8px;border-radius:50%;z-index:100;animation:particleFly 0.7s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

/* Upgrades Screen */
#upgrades-screen{padding:0}
.upgrades-header{width:100%;background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.upgrades-header h2{font-size:1.1rem;font-weight:800}
.upgrades-points{color:var(--gold);font-weight:700;font-size:0.9rem}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:8px;font-size:0.75rem;cursor:pointer}
.upgrades-list{flex:1;overflow-y:auto;padding:12px;width:100%;display:flex;flex-direction:column;gap:8px}
.upgrade-item{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s,opacity 0.15s}
.upgrade-item:active{border-color:var(--accent)}
.upgrade-item.maxed{opacity:0.5;cursor:default;border-color:var(--green)}
.upgrade-item.locked{opacity:0.4;cursor:default}
.upgrade-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;color:#fff;font-weight:800}
.upgrade-info{flex:1;min-width:0}
.upgrade-name{font-size:0.85rem;font-weight:700}
.upgrade-desc{font-size:0.7rem;color:var(--dim);margin-top:2px}
.upgrade-level{font-size:0.65rem;color:var(--accent);margin-top:3px}
.upgrade-cost{text-align:right;flex-shrink:0}
.upgrade-cost .cost-val{font-size:0.9rem;font-weight:700;color:var(--gold)}
.upgrade-cost .cost-label{font-size:0.6rem;color:var(--dim)}
.upgrade-item.affordable .upgrade-cost .cost-val{color:var(--green)}

/* Results Screen */
#results-screen{justify-content:center;gap:20px;padding:20px}
#results-screen h2{font-size:1.8rem;font-weight:900;color:var(--gold);text-align:center}
.results-stars{display:flex;gap:8px;justify-content:center}
.results-star{width:40px;height:40px;transition:transform 0.3s,opacity 0.3s}
.results-star.earned{animation:starPop 0.4s ease-out backwards}
.results-star.unearned{opacity:0.2}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.results-stats{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:8px}
.results-row{display:flex;justify-content:space-between;align-items:center}
.results-row .rlabel{color:var(--dim);font-size:0.85rem}
.results-row .rval{font-weight:700;font-size:1rem}
.results-total{border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.results-total .rval{color:var(--gold);font-size:1.3rem}
.results-btn{background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;border:none;padding:14px 40px;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,0.3)}
.results-btn:active{transform:scale(0.96)}

/* Floating text */
.float-text{position:fixed;pointer-events:none;font-weight:800;font-size:1.1rem;z-index:200;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0.8)}}

/* Point tick animation */
.points-tick{animation:tickFlash 0.3s ease}
@keyframes tickFlash{0%{color:#fff}100%{color:var(--gold)}}

/* Prestige glow */
.prestige-glow{position:fixed;inset:0;pointer-events:none;z-index:300;background:radial-gradient(ellipse at center,rgba(251,191,36,0.3),transparent 70%);animation:prestigeFade 2s ease-out forwards}
@keyframes prestigeFade{0%{opacity:1}100%{opacity:0}}

/* Evolution badge */
.evo-badge{display:inline-block;font-size:0.65rem;padding:2px 8px;border-radius:6px;font-weight:700;margin-left:6px}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Matched card shimmer */
.card.matched .card-front-face::after{content:"";position:absolute;inset:0;border-radius:8px;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.15) 50%,transparent 60%);background-size:200% 200%;animation:shimmer 2s ease-in-out infinite}
@keyframes shimmer{0%{background-position:100% 100%}100%{background-position:0% 0%}}

/* Auto-flip highlight */
.card.auto-highlight .card-back-face{border-color:var(--gold);box-shadow:0 0 16px rgba(251,191,36,0.5)}

/* Hint flash */
.card.hint-flash .card-inner{animation:hintFlash 0.6s ease}
@keyframes hintFlash{0%,100%{transform:rotateY(0deg)}30%,70%{transform:rotateY(180deg)}}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <div class="mascot-container" style="width:180px;height:180px">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Memo the Brain mascot -->
      <defs>
        <radialGradient id="brainGrad" cx="50%" cy="40%" r="50%">
          <stop offset="0%" stop-color="#fdba74"/>
          <stop offset="100%" stop-color="#ea580c"/>
        </radialGradient>
        <filter id="brainGlow">
          <feGaussianBlur stdDeviation="3" result="glow"/>
          <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- Brain body -->
      <ellipse cx="100" cy="105" rx="70" ry="60" fill="url(#brainGrad)" filter="url(#brainGlow)"/>
      <!-- Brain folds left -->
      <path d="M45 90 Q60 70 75 85 Q65 95 50 100" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M40 110 Q55 95 70 105 Q60 115 45 118" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M55 130 Q70 118 85 128" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round"/>
      <!-- Brain folds right -->
      <path d="M155 90 Q140 70 125 85 Q135 95 150 100" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M160 110 Q145 95 130 105 Q140 115 155 118" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M145 130 Q130 118 115 128" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round"/>
      <!-- Center fold -->
      <path d="M100 50 Q98 80 100 110 Q102 130 100 155" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round"/>
      <!-- Glasses -->
      <rect x="62" y="88" width="28" height="22" rx="5" fill="none" stroke="#1e293b" stroke-width="3"/>
      <rect x="110" y="88" width="28" height="22" rx="5" fill="none" stroke="#1e293b" stroke-width="3"/>
      <line x1="90" y1="97" x2="110" y2="97" stroke="#1e293b" stroke-width="2.5"/>
      <line x1="62" y1="97" x2="50" y2="93" stroke="#1e293b" stroke-width="2"/>
      <line x1="138" y1="97" x2="150" y2="93" stroke="#1e293b" stroke-width="2"/>
      <!-- Eyes -->
      <circle cx="76" cy="99" r="4" fill="#1e293b"/>
      <circle cx="124" cy="99" r="4" fill="#1e293b"/>
      <circle cx="77.5" cy="97.5" r="1.5" fill="#fff"/>
      <circle cx="125.5" cy="97.5" r="1.5" fill="#fff"/>
      <!-- Smile -->
      <path d="M85 120 Q100 135 115 120" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Cheeks -->
      <ellipse cx="68" cy="115" rx="8" ry="5" fill="rgba(239,68,68,0.25)"/>
      <ellipse cx="132" cy="115" rx="8" ry="5" fill="rgba(239,68,68,0.25)"/>
    </svg>
  </div>
  <h1>MEMORY CLICKER</h1>
  <div class="subtitle">Match cards. Grow your brain. Repeat.</div>
  <button class="title-play-btn" onclick="startGame()">PLAY</button>
</div>

<!-- HUB SCREEN -->
<div id="hub-screen" class="screen">
  <div class="hub-header">
    <div class="points-display" id="hub-points">0</div>
    <div class="points-per-sec" id="hub-pps">+0.0/sec</div>
  </div>
  <div class="hub-body">
    <div class="mascot-container generating" id="hub-mascot" onclick="clickMascot()">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" id="mascot-svg">
        <defs>
          <radialGradient id="brainGrad2" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#fdba74"/>
            <stop offset="100%" stop-color="#ea580c"/>
          </radialGradient>
        </defs>
        <ellipse cx="100" cy="105" rx="70" ry="60" fill="url(#brainGrad2)"/>
        <path d="M45 90 Q60 70 75 85 Q65 95 50 100" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M40 110 Q55 95 70 105 Q60 115 45 118" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M55 130 Q70 118 85 128" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round"/>
        <path d="M155 90 Q140 70 125 85 Q135 95 150 100" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M160 110 Q145 95 130 105 Q140 115 155 118" fill="none" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M145 130 Q130 118 115 128" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round"/>
        <path d="M100 50 Q98 80 100 110 Q102 130 100 155" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round"/>
        <rect x="62" y="88" width="28" height="22" rx="5" fill="none" stroke="#1e293b" stroke-width="3"/>
        <rect x="110" y="88" width="28" height="22" rx="5" fill="none" stroke="#1e293b" stroke-width="3"/>
        <line x1="90" y1="97" x2="110" y2="97" stroke="#1e293b" stroke-width="2.5"/>
        <line x1="62" y1="97" x2="50" y2="93" stroke="#1e293b" stroke-width="2"/>
        <line x1="138" y1="97" x2="150" y2="93" stroke="#1e293b" stroke-width="2"/>
        <circle cx="76" cy="99" r="4" fill="#1e293b"/>
        <circle cx="124" cy="99" r="4" fill="#1e293b"/>
        <circle cx="77.5" cy="97.5" r="1.5" fill="#fff"/>
        <circle cx="125.5" cy="97.5" r="1.5" fill="#fff"/>
        <path d="M85 120 Q100 135 115 120" fill="none" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="68" cy="115" rx="8" ry="5" fill="rgba(239,68,68,0.25)"/>
        <ellipse cx="132" cy="115" rx="8" ry="5" fill="rgba(239,68,68,0.25)"/>
      </svg>
    </div>
    <div class="hub-buttons">
      <button class="hub-btn play-btn" onclick="startMemoryRound()">PLAY</button>
      <button class="hub-btn upgrade-btn" onclick="showScreen('upgrades-screen')">UPGRADES</button>
      <button class="hub-btn prestige-btn" id="prestige-btn" onclick="doPrestige()">EVOLVE BRAIN</button>
    </div>
    <div class="hub-stats">
      <div class="hub-stat"><div class="label">Level</div><div class="value" id="hub-level">1</div></div>
      <div class="hub-stat"><div class="label">Board</div><div class="value" id="hub-board">4x2</div></div>
      <div class="hub-stat"><div class="label">Matches</div><div class="value" id="hub-matches">0</div></div>
      <div class="hub-stat"><div class="label">Evos</div><div class="value" id="hub-evos">0</div></div>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-info">
      <div class="game-stat"><div class="label">Time</div><div class="val" id="game-time">0:00</div></div>
      <div class="game-stat"><div class="label">Moves</div><div class="val" id="game-moves">0</div></div>
      <div class="game-stat"><div class="label">Pairs</div><div class="val" id="game-pairs">0/4</div></div>
      <div class="game-stat"><div class="label">Points</div><div class="val" id="game-earned" style="color:var(--gold)">0</div></div>
    </div>
    <button class="game-quit-btn" onclick="quitGame()">QUIT</button>
  </div>
  <div class="game-combo" id="game-combo"></div>
  <div class="game-board" id="game-board">
    <div class="card-grid" id="card-grid"></div>
  </div>
</div>

<!-- UPGRADES SCREEN -->
<div id="upgrades-screen" class="screen">
  <div class="upgrades-header">
    <button class="back-btn" onclick="showScreen('hub-screen')">Back</button>
    <h2>Upgrades</h2>
    <div class="upgrades-points" id="upgrades-points">0</div>
  </div>
  <div class="upgrades-list" id="upgrades-list"></div>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="screen">
  <h2 id="results-title">Board Complete!</h2>
  <div class="results-stars" id="results-stars"></div>
  <div class="results-stats" id="results-stats"></div>
  <button class="results-btn" onclick="showScreen('hub-screen')">Continue</button>
</div>

<script>
// ---- AUDIO ENGINE (Web Audio API) ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();if(audioCtx.state==='suspended')audioCtx.resume()}

function playTone(freq,dur,type='sine',vol=0.12,decay=true){
  try{ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;if(decay)g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}
}
function sfxFlip(){playTone(800,0.08,'sine',0.08)}
function sfxMatch(combo){const base=523+combo*80;playTone(base,0.15,'sine',0.15);setTimeout(()=>playTone(base*1.25,0.15,'sine',0.12),80)}
function sfxMismatch(){playTone(200,0.2,'sawtooth',0.06)}
function sfxPoints(){playTone(1047,0.1,'sine',0.06);setTimeout(()=>playTone(1319,0.08,'sine',0.05),60)}
function sfxUpgrade(){playTone(523,0.1,'sine',0.1);setTimeout(()=>playTone(659,0.1,'sine',0.1),80);setTimeout(()=>playTone(784,0.15,'sine',0.1),160)}
function sfxComplete(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.12),i*120))}
function sfxPrestige(){[784,988,1175,1568].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'triangle',0.1),i*150))}

// ---- GAME STATE ----
const BOARDS=[[4,2],[4,3],[4,4],[5,4],[6,4],[6,5]];
const SYMBOLS=['star','heart','moon','sun','lightning','diamond','flower','crown'];
const SYMBOL_COLORS={
  star:{bg:'#fef3c7',border:'#f59e0b',fill:'#f59e0b'},
  heart:{bg:'#fce7f3',border:'#ec4899',fill:'#ef4444'},
  moon:{bg:'#ede9fe',border:'#8b5cf6',fill:'#7c3aed'},
  sun:{bg:'#fff7ed',border:'#f97316',fill:'#ea580c'},
  lightning:{bg:'#fef9c3',border:'#eab308',fill:'#ca8a04'},

// ---- HELPERS ----
function fmt(n){
  if(n>=1e9)return (n/1e9).toFixed(1)+'B';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}
function fmtDec(n,d=1){return n.toFixed(d)}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='hub-screen')updateHub();
  if(id==='upgrades-screen')renderUpgrades();
}

function getUpgradeCost(upg){
  const def=UPGRADES.find(u=>u.id===upg);
  const lvl=state.upgrades[upg];
  return Math.floor(def.baseCost*Math.pow(def.costMult,lvl));
}

function getPointsPerSec(){
  return (0.1+state.upgrades.idleBrain*1)*state.evoMultiplier;
}

function getMaxBoardIndex(){
  return Math.min(state.upgrades.biggerBoard,BOARDS.length-1);
}

function getCurrentBoard(){
  return BOARDS[getMaxBoardIndex()];
}

// ---- CARD RENDERING ----
function createCardElement(card,index,cardW,cardH){
  const theme=THEME_COLORS[state.currentTheme]||THEME_COLORS[0];
  const col=SYMBOL_COLORS[card.type];
  const div=document.createElement('div');
  div.className='card';
  div.style.width=cardW+'px';
  div.style.height=cardH+'px';
  div.dataset.index=index;
  div.innerHTML=`
    <div class="card-inner">
      <div class="card-face card-back-face" style="background:linear-gradient(135deg,${theme.cardBack[0]},${theme.cardBack[1]});border-color:${theme.cardBorder}">
        <div class="card-pattern">
          <span class="card-label">MEMORY</span>
        </div>
      </div>
      <div class="card-face card-front-face" style="background:${col.bg};border-color:${col.border}">
        ${symbolSVG(card.type)}
      </div>
    </div>`;
  div.addEventListener('click',()=>flipCard(index));
  return div;
}

function updateHub(){
  document.getElementById('hub-points').textContent=fmt(state.points);
  document.getElementById('hub-pps').textContent='+'+fmtDec(getPointsPerSec())+'/sec';

  if(!svg)return;
  const grad=svg.querySelector('#brainGrad2');

  });
}

// ---- IDLE LOOP ----
let idleInterval=null;
let displayedPoints=0;
function startIdleLoop(){
  if(idleInterval)clearInterval(idleInterval);
  displayedPoints=state.points;
  idleInterval=setInterval(()=>{
    const pps=getPointsPerSec();
    state.points+=pps/20;
    state.totalPoints+=pps/20;
    // Smooth counter
    const diff=state.points-displayedPoints;
    displayedPoints+=diff*0.2;
    const el=document.getElementById('hub-points');
    if(el&&document.getElementById('hub-screen').classList.contains('active')){
      el.textContent=fmt(displayedPoints);
    }
    const ppsEl=document.getElementById('hub-pps');
    if(ppsEl&&document.getElementById('hub-screen').classList.contains('active')){
      ppsEl.textContent='+'+fmtDec(pps)+'/sec';
    }
    // Update upgrade screen points
    const upEl=document.getElementById('upgrades-points');
    if(upEl&&document.getElementById('upgrades-screen').classList.contains('active')){
      upEl.textContent=fmt(state.points);
      updateUpgradeAffordability();
    }
    // Check prestige
    const pBtn=document.getElementById('prestige-btn');
    if(pBtn){
      pBtn.style.display=state.totalPoints>=1000*Math.pow(3,state.evolutions)?'block':'none';
    }
    // Autosave every ~10s
    if(Date.now()-state.lastSave>10000){saveState();state.lastSave=Date.now()}
  },50);
}

function clickMascot(){
  sfxPoints();
  const bonus=0.5*state.evoMultiplier;
  state.points+=bonus;
  state.totalPoints+=bonus;
  // Float text
  const mc=document.getElementById('hub-mascot');

// ---- MEMORY ROUND ----
function startMemoryRound(){
  const board=getCurrentBoard();
  const cols=board[0],rows=board[1];
  const totalCards=cols*rows;
  const totalPairs=totalCards/2;
  // Pick symbols
  const available=SYMBOLS.slice(0,Math.min(totalPairs,SYMBOLS.length));
  let picks=[];
  for(let i=0;i<totalPairs;i++){
    picks.push(available[i%available.length]);
  }
  // Create card pairs
  let cards=[];
  picks.forEach(type=>{cards.push({type,matched:false});cards.push({type,matched:false})});
  // Shuffle
  for(let i=cards.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [cards[i],cards[j]]=[cards[j],cards[i]];
  }
  // Setup round state
  round={cards,flipped:[],matched:0,totalPairs,moves:0,combo:0,maxCombo:0,timer:0,timerInterval:null,locked:false,autoFlipTimeout:null,boardSize:[cols,rows],pointsEarned:0};
  // Render
  renderBoard(cols,rows,cards);
  showScreen('game-screen');
  updateGameUI();
  // Start timer
  round.timerInterval=setInterval(()=>{round.timer++;updateGameUI()},1000);
  // Hint system: briefly show cards
  if(state.upgrades.hintSystem>0){
    const hintDuration=400+state.upgrades.hintSystem*300;
    const cardEls=document.querySelectorAll('#card-grid .card');
    round.locked=true;
    cardEls.forEach(c=>c.classList.add('flipped'));
    setTimeout(()=>{
      cardEls.forEach(c=>{if(!c.classList.contains('matched'))c.classList.remove('flipped')});
      round.locked=false;
    },hintDuration);
  }
}

function renderBoard(cols,rows,cards){
  const grid=document.getElementById('card-grid');
  grid.innerHTML='';
  // Calculate card size based on available space
  const boardEl=document.getElementById('game-board');
  const availW=Math.min(window.innerWidth-24,440);
  const availH=window.innerHeight-140;
  const cardW=Math.min(Math.floor((availW-((cols-1)*8))/cols),80);
  const cardH=Math.min(Math.floor((availH-((rows-1)*8))/rows),110);
  const finalW=Math.min(cardW,cardH*0.73);
  const finalH=Math.min(cardH,finalW/0.73);
  grid.style.gridTemplateColumns=`repeat(${cols},${finalW}px)`;
  grid.style.gridTemplateRows=`repeat(${rows},${finalH}px)`;
  cards.forEach((card,i)=>{
    grid.appendChild(createCardElement(card,i,finalW,finalH));
  });
}

function flipCard(index){
  if(round.locked)return;
  if(round.cards[index].matched)return;
  if(round.flipped.includes(index))return;
  if(round.flipped.length>=2)return;
  sfxFlip();
  round.flipped.push(index);
  const cardEl=document.querySelectorAll('#card-grid .card')[index];
  cardEl.classList.add('flipped');
  if(round.flipped.length===2){
    round.moves++;
    round.locked=true;
    const [i1,i2]=round.flipped;
    if(round.cards[i1].type===round.cards[i2].type){
      // Match!
      setTimeout(()=>handleMatch(i1,i2),350);
    } else {
      // Mismatch
      setTimeout(()=>handleMismatch(i1,i2),600);
    }
    updateGameUI();
  }
}

function handleMatch(i1,i2){
  sfxMatch(round.combo);
  round.cards[i1].matched=true;
  round.cards[i2].matched=true;
  round.matched++;
  round.combo++;
  if(round.combo>round.maxCombo)round.maxCombo=round.combo;
  state.totalMatches++;
  const cardEls=document.querySelectorAll('#card-grid .card');
  cardEls[i1].classList.add('matched');
  cardEls[i2].classList.add('matched');
  // Particles
  spawnParticles(cardEls[i1]);
  spawnParticles(cardEls[i2]);
  // Points
  const comboMult=1+(round.combo-1)*(0.1+state.upgrades.comboMaster*0.05);
  const memPowerMult=1+state.upgrades.memoryPower*0.1;
  const basePoints=10;
  const pts=Math.floor(basePoints*memPowerMult*comboMult*state.evoMultiplier);
  round.pointsEarned+=pts;
  state.points+=pts;
  state.totalPoints+=pts;
  // Combo display
  const comboEl=document.getElementById('game-combo');
  if(round.combo>1){
    comboEl.textContent='COMBO x'+round.combo+'! (+'+pts+')';
    comboEl.style.color=round.combo>=5?'var(--red)':round.combo>=3?'var(--orange)':'var(--gold)';
  } else {
    comboEl.textContent='+'+pts+' points';
    comboEl.style.color='var(--gold)';
  }
  // Float points
  const rect=cardEls[i1].getBoundingClientRect();
  floatText('+'+pts,rect.left+rect.width/2,rect.top,'var(--gold)');
  round.flipped=[];
  round.locked=false;
  updateGameUI();
  // Check win
  if(round.matched>=round.totalPairs){
    setTimeout(()=>completeRound(),500);
  } else {
    scheduleAutoFlip();
  }
}

function handleMismatch(i1,i2){
  sfxMismatch();
  round.combo=0;
  const cardEls=document.querySelectorAll('#card-grid .card');
  cardEls[i1].classList.remove('flipped');
  cardEls[i2].classList.remove('flipped');
  round.flipped=[];
  round.locked=false;
  document.getElementById('game-combo').textContent='';
  scheduleAutoFlip();
}

function scheduleAutoFlip(){
  if(round.autoFlipTimeout)clearTimeout(round.autoFlipTimeout);
  if(state.upgrades.autoFlip<=0)return;
  const chance=state.upgrades.autoFlip*0.12;
  if(Math.random()>chance)return;
  const delay=2000+Math.random()*3000;
  round.autoFlipTimeout=setTimeout(()=>{
    if(round.locked||round.matched>=round.totalPairs)return;
    // Find an unmatched, unflipped card
    const unmatched=round.cards.map((c,i)=>({...c,i})).filter(c=>!c.matched&&!round.flipped.includes(c.i));
    if(unmatched.length===0)return;
    const pick=unmatched[Math.floor(Math.random()*unmatched.length)];
    const cardEl=document.querySelectorAll('#card-grid .card')[pick.i];
    cardEl.classList.add('auto-highlight');
    setTimeout(()=>{
      cardEl.classList.remove('auto-highlight');
      if(!round.locked&&!round.cards[pick.i].matched&&!round.flipped.includes(pick.i)){
        flipCard(pick.i);
      }
    },800);
  },delay);
}

function completeRound(){
  clearInterval(round.timerInterval);
  if(round.autoFlipTimeout)clearTimeout(round.autoFlipTimeout);
  sfxComplete();
  // Calculate time bonus
  const totalCards=round.boardSize[0]*round.boardSize[1];
  const parTime=totalCards*4; // ~4s per card as par
  const timeBonusMult=1+state.upgrades.timeBonus*0.15;
  let timeBonus=0;
  if(round.timer<parTime){
    timeBonus=Math.floor((parTime-round.timer)*2*timeBonusMult*state.evoMultiplier);
  }
  // Accuracy bonus
  const perfectMoves=round.totalPairs;
  const accuracy=perfectMoves/round.moves;
  const accuracyBonus=Math.floor(accuracy*50*state.evoMultiplier);
  const comboBonus=round.maxCombo*5*state.evoMultiplier;
  const totalBonus=Math.floor(timeBonus+accuracyBonus+comboBonus);
  state.points+=totalBonus;
  state.totalPoints+=totalBonus;
  round.pointsEarned+=totalBonus;
  state.gamesPlayed++;
  state.level=Math.floor(state.gamesPlayed/2)+1;
  // Stars: 1=complete, 2=under par time, 3=perfect or near-perfect accuracy
  const stars=[true,round.timer<parTime,accuracy>=0.8];
  showResults(round,timeBonus,accuracyBonus,comboBonus,totalBonus,stars);
  saveState();
}

function showResults(r,timeBonus,accBonus,comboBonus,totalBonus,stars){
  document.getElementById('results-title').textContent='Board Complete!';
  const starsEl=document.getElementById('results-stars');
  starsEl.innerHTML='';
  stars.forEach((s,i)=>{
    const div=document.createElement('div');
    div.innerHTML=starSVG(s);
    div.querySelector('.results-star').style.animationDelay=(i*0.2)+'s';
    starsEl.appendChild(div);
  });
  const statsEl=document.getElementById('results-stats');
  statsEl.innerHTML=`
    <div class="results-row"><span class="rlabel">Time</span><span class="rval">${formatTime(r.timer)}</span></div>
    <div class="results-row"><span class="rlabel">Moves</span><span class="rval">${r.moves}</span></div>
    <div class="results-row"><span class="rlabel">Max Combo</span><span class="rval">x${r.maxCombo}</span></div>
    <div class="results-row"><span class="rlabel">Match Points</span><span class="rval" style="color:var(--gold)">${fmt(r.pointsEarned-totalBonus)}</span></div>
    <div class="results-row"><span class="rlabel">Time Bonus</span><span class="rval" style="color:var(--green)">+${fmt(timeBonus)}</span></div>
    <div class="results-row"><span class="rlabel">Accuracy Bonus</span><span class="rval" style="color:var(--cyan)">+${fmt(accBonus)}</span></div>
    <div class="results-row"><span class="rlabel">Combo Bonus</span><span class="rval" style="color:var(--orange)">+${fmt(comboBonus)}</span></div>
    <div class="results-row results-total"><span class="rlabel">Total Earned</span><span class="rval">${fmt(r.pointsEarned)}</span></div>
  `;
  showScreen('results-screen');
}

function quitGame(){
  clearInterval(round.timerInterval);
  if(round.autoFlipTimeout)clearTimeout(round.autoFlipTimeout);
  // Points already awarded during match handling, just go back
  showScreen('hub-screen');
}

function updateGameUI(){
  document.getElementById('game-time').textContent=formatTime(round.timer);
  document.getElementById('game-moves').textContent=round.moves;
  document.getElementById('game-pairs').textContent=round.matched+'/'+round.totalPairs;
  document.getElementById('game-earned').textContent=fmt(round.pointsEarned);
}

function formatTime(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

// ---- UPGRADES ----
function renderUpgrades(){
  const list=document.getElementById('upgrades-list');
  list.innerHTML='';
  document.getElementById('upgrades-points').textContent=fmt(state.points);
  UPGRADES.forEach(upg=>{
    const lvl=state.upgrades[upg.id];
    const maxed=lvl>=upg.maxLvl;
    const cost=maxed?0:getUpgradeCost(upg.id);
    const affordable=!maxed&&state.points>=cost;
    const item=document.createElement('div');
    item.className='upgrade-item'+(maxed?' maxed':'')+(affordable?' affordable':'');
    item.innerHTML=`
      <div class="upgrade-icon" style="background:${upg.iconBg}">${upg.icon}</div>
      <div class="upgrade-info">
        <div class="upgrade-name">${upg.name}</div>
        <div class="upgrade-desc">${upg.desc}</div>
        <div class="upgrade-level">Level ${lvl}/${upg.maxLvl}${maxed?' (MAX)':''}</div>
      </div>
      <div class="upgrade-cost">
        ${maxed?'<span class="cost-val" style="color:var(--green)">MAX</span>':'<span class="cost-val">'+fmt(cost)+'</span><div class="cost-label">points</div>'}
      </div>
    `;
    if(!maxed){
      item.addEventListener('click',()=>buyUpgrade(upg.id));
    }
    list.appendChild(item);
  });
}

function buyUpgrade(id){
  const lvl=state.upgrades[id];
  const def=UPGRADES.find(u=>u.id===id);
  if(lvl>=def.maxLvl)return;
  const cost=getUpgradeCost(id);
  if(state.points<cost)return;
  state.points-=cost;
  state.upgrades[id]++;
  sfxUpgrade();
  // If card themes upgraded, cycle theme
  if(id==='cardThemes'){
    state.currentTheme=state.upgrades.cardThemes;
  }
  renderUpgrades();
  saveState();
}

function updateUpgradeAffordability(){
  const items=document.querySelectorAll('.upgrade-item');
  items.forEach((item,i)=>{
    if(i>=UPGRADES.length)return;
    const upg=UPGRADES[i];
    const lvl=state.upgrades[upg.id];
    const maxed=lvl>=upg.maxLvl;
    if(maxed)return;
    const cost=getUpgradeCost(upg.id);
    const affordable=state.points>=cost;
    item.classList.toggle('affordable',affordable);
  });
}

// ---- PRESTIGE ----
function doPrestige(){
  const threshold=1000*Math.pow(3,state.evolutions);
  if(state.totalPoints<threshold)return;
  sfxPrestige();
  state.evolutions++;
  state.evoMultiplier=1+state.evolutions*0.5;
  // Reset upgrades and points
  state.points=0;
  state.totalPoints=0;
  Object.keys(state.upgrades).forEach(k=>state.upgrades[k]=0);
  state.currentTheme=0;
  state.level=1;
  state.gamesPlayed=0;
  // Visual feedback
  const glow=document.createElement('div');
  glow.className='prestige-glow';
  document.body.appendChild(glow);
  setTimeout(()=>glow.remove(),2100);
  saveState();
  updateHub();
}

// ---- EFFECTS ----
function spawnParticles(el){
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  const colors=['#fbbf24','#22c55e','#3b82f6','#ef4444','#a855f7','#06b6d4'];
  for(let i=0;i<8;i++){
    const p=document.createElement('div');
    p.className='match-particle';
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*60;
    p.style.left=cx+'px';
    p.style.top=cy+'px';
    p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}

function floatText(text,x,y,color){
  const el=document.createElement('div');
  el.className='float-text';
  el.textContent=text;
  el.style.left=x+'px';
  el.style.top=y+'px';
  el.style.color=color;
  el.style.transform='translateX(-50%)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

// ---- SAVE / LOAD ----
function saveState(){
  state.lastSave=Date.now();
  try{localStorage.setItem('memoryClicker',JSON.stringify(state))}catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem('memoryClicker');
    if(!raw)return;
    const saved=JSON.parse(raw);
    // Merge with defaults
    Object.keys(state).forEach(k=>{
      if(saved[k]!==undefined){
        if(k==='upgrades'){
          Object.keys(state.upgrades).forEach(u=>{
            if(saved.upgrades[u]!==undefined)state.upgrades[u]=saved.upgrades[u];
          });
        } else {
          state[k]=saved[k];
        }
      }
    });
    // Offline progress
    const elapsed=(Date.now()-state.lastSave)/1000;
    if(elapsed>5){
      const offlinePoints=getPointsPerSec()*elapsed;
      state.points+=offlinePoints;
      state.totalPoints+=offlinePoints;
      if(offlinePoints>=1){
        setTimeout(()=>{
          floatText('+'+fmt(offlinePoints)+' offline!',window.innerWidth/2,window.innerHeight/2-40,'var(--green)');
        },500);
      }
    }
    displayedPoints=state.points;
    updateHub();
  }catch(e){}
}

// ---- INIT ----
window.addEventListener('beforeunload',()=>saveState());
// Touch-start audio unlock
document.addEventListener('touchstart',()=>ensureAudio(),{once:true});
document.addEventListener('click',()=>ensureAudio(),{once:true});
</script>
