<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Creature Colosseum</title>
<style>
:root{--bg:#0a0a12;--surface:#14142a;--text:#e8e8f0;--accent:#ff6b35;--green:#4ade80;--red:#ef4444;--gold:#f7c948;--purple:#a78bfa;--blue:#60a5fa;--fire:#ff6b35;--water:#60a5fa;--earth:#4ade80;--lightning:#f7c948}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden;min-height:100vh;user-select:none}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.home-link{position:fixed;top:10px;left:10px;z-index:100;font-size:14px;background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid #333}
#game-container{max-width:480px;margin:0 auto;padding:8px;display:flex;flex-direction:column;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 0;flex-wrap:wrap;gap:4px}
.top-bar .round{font-size:18px;font-weight:700;color:var(--accent)}
.top-bar .hp-wrap{display:flex;align-items:center;gap:6px;font-size:14px}
.hp-bar-outer{width:100px;height:14px;background:#333;border-radius:7px;overflow:hidden}
.hp-bar-inner{height:100%;background:var(--green);transition:width .3s;border-radius:7px}
.hp-bar-inner.danger{background:var(--red)}
.gold-display{font-size:16px;font-weight:700;color:var(--gold)}
.streak-display{font-size:12px;color:var(--accent);min-width:40px;text-align:right}
.synergy-bar{display:flex;gap:4px;padding:4px 0;flex-wrap:wrap;min-height:20px}
.synergy-tag{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600;opacity:.9}
#battle-canvas{width:100%;aspect-ratio:2/1.4;background:#0d0d1a;border-radius:8px;border:1px solid #222;cursor:default}
.phase-banner{text-align:center;padding:8px 0;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;text-shadow:0 0 20px rgba(255,107,53,.3)}
.shop-area{background:var(--surface);border-radius:10px;padding:8px;margin-top:6px}
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.shop-header h3{font-size:14px;color:var(--gold)}
.shop-btns{display:flex;gap:6px}
.btn{padding:5px 10px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-refresh{background:var(--accent);color:#fff}
.btn-refresh:hover{filter:brightness(1.2)}
.btn-lock{background:#333;color:var(--text)}
.btn-lock.locked{background:var(--purple);color:#fff}
.btn-start{background:var(--green);color:#000;font-size:14px;padding:8px 20px;display:block;margin:8px auto;animation:pulse 2s infinite}
.btn-start:hover{filter:brightness(1.1)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,.4)}50%{box-shadow:0 0 0 8px rgba(74,222,128,0)}}
.btn-speed{position:absolute;top:4px;right:4px;z-index:10;background:rgba(20,20,42,.85);color:var(--text);border:1px solid #444;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer}
.btn-speed:hover{border-color:var(--accent)}
.canvas-wrap{position:relative}
.btn-newgame{background:var(--red);color:#fff;font-size:12px;padding:5px 12px}
.shop-cards{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px}
.shop-card{min-width:80px;flex:1;background:#1a1a35;border-radius:8px;padding:6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative}
.shop-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.shop-card.sold{opacity:.3;pointer-events:none}
.shop-card .emoji{font-size:24px}
.shop-card .name{font-size:10px;font-weight:600;margin:2px 0}
.shop-card .cost{font-size:11px;color:var(--gold);font-weight:700}
.shop-card .stats{font-size:9px;color:#999}
.shop-card .elem-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.shop-card.rarity-uncommon{border-bottom:2px solid #60a5fa}
.shop-card.rarity-rare{border-bottom:2px solid var(--purple)}
.shop-card.rarity-epic{border-bottom:2px solid var(--gold);box-shadow:0 2px 8px rgba(247,201,72,.15)}
.bench-area{margin-top:6px}
.bench-label{font-size:12px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.bench-slots,.grid-slots{display:flex;gap:4px}
.bench-slot,.grid-slot{width:52px;height:52px;background:#1a1a35;border-radius:8px;border:2px dashed #333;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0}
.bench-slot:hover,.grid-slot:hover{border-color:var(--accent)}
.bench-slot.occupied,.grid-slot.occupied{border-style:solid}
.slot-emoji{font-size:20px;line-height:1}
.slot-stars{font-size:8px;color:var(--gold);line-height:1}
.slot-hp{font-size:7px;color:var(--green);line-height:1}
.grid-area{margin-top:6px}
.grid-label{font-size:12px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.grid-rows{display:flex;flex-direction:column;gap:4px}
.grid-row{display:flex;gap:4px;justify-content:center}
.sell-zone{margin-top:6px;padding:10px;text-align:center;border:2px dashed var(--red);border-radius:8px;color:var(--red);font-size:12px;font-weight:600;opacity:.5;transition:all .15s}
.sell-zone.active{opacity:1;background:rgba(239,68,68,.1)}
.tooltip{position:fixed;background:#1a1a35;border:1px solid #444;border-radius:8px;padding:10px;font-size:12px;z-index:200;max-width:200px;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.tooltip .t-name{font-size:14px;font-weight:700;margin-bottom:4px}
.tooltip .t-elem{font-size:11px;opacity:.7}
.tooltip .t-stats{margin-top:4px;line-height:1.5}
.tooltip .t-ability{margin-top:4px;font-style:italic;color:var(--accent);font-size:11px}
.game-over-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:12px}
.game-over-overlay h1{font-size:36px;color:var(--accent)}
.game-over-overlay p{font-size:16px;color:var(--text)}
.result-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;z-index:150;pointer-events:none;animation:flashIn .6s ease-out forwards}
@keyframes flashIn{0%{opacity:1;transform:translate(-50%,-50%) scale(1.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(2) translateY(-40px)}}
.income-breakdown{background:#111;border-radius:6px;padding:6px 8px;margin-top:4px;font-size:11px;color:#aaa;line-height:1.6}
.income-breakdown span{color:var(--gold);font-weight:600}
.high-score{font-size:11px;color:var(--purple);text-align:center;margin-top:4px}
.round-history{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin-top:4px}
.round-dot{width:10px;height:10px;border-radius:50%;border:1px solid #333}
.round-dot.win{background:var(--green)}
.round-dot.loss{background:var(--red)}
.selected-slot{border-color:var(--gold)!important;box-shadow:0 0 8px rgba(247,201,72,.3)}
@media(min-width:500px){#game-container{padding:12px}.shop-card{min-width:85px}}
</style>
</head>
<body>
<a href="../index.html" class="home-link">&larr; home</a>
<div id="game-container">
  <div class="top-bar" id="top-bar"></div>
  <div class="synergy-bar" id="synergy-bar"></div>
  <div class="canvas-wrap">
    <canvas id="battle-canvas"></canvas>
    <button class="btn-speed" id="speed-btn" style="display:none" onclick="toggleSpeed()">1x</button>
  </div>
  <div class="phase-banner" id="phase-banner"></div>
  <div id="shop-phase-ui"></div>
  <div class="round-history" id="round-history"></div>
  <div class="high-score" id="high-score"></div>
</div>
<div id="tooltip" class="tooltip" style="display:none"></div>
<div id="game-over" class="game-over-overlay" style="display:none"></div>
<div id="result-flash" class="result-flash" style="display:none"></div>
<script>
(()=>{
// ========== AUDIO ==========
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ensureAudio(){if(!actx)actx=new AudioCtx()}
function playSound(type){
  ensureAudio();if(!actx)return;
  const now=actx.currentTime,g=actx.createGain();g.connect(actx.destination);g.gain.value=0.02;
  const o=actx.createOscillator();o.connect(g);
  switch(type){
    case'buy':o.frequency.value=520;o.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break;
    case'sell':o.frequency.value=300;o.type='sawtooth';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.start(now);o.stop(now+.2);break;
    case'levelup':{const o2=actx.createOscillator();o2.connect(g);o.frequency.value=440;o2.frequency.value=660;o.type='sine';o2.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.4);o.start(now);o2.start(now+.1);o.stop(now+.4);o2.stop(now+.4);break}
    case'hit':o.frequency.value=150+Math.random()*100;o.type='square';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.08);o.start(now);o.stop(now+.08);break;
    case'crit':o.frequency.value=800;o.type='square';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break;
    case'death':o.frequency.value=200;o.type='sawtooth';o.frequency.exponentialRampToValueAtTime(50,now+.3);g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);o.start(now);o.stop(now+.3);break;
    case'win':o.frequency.value=523;o.type='sine';g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.6);o.start(now);o.stop(now+.6);const w2=actx.createOscillator(),gw=actx.createGain();w2.connect(gw);gw.connect(actx.destination);gw.gain.value=0.02;w2.frequency.value=659;w2.type='sine';gw.gain.setValueAtTime(.02,now+.15);gw.gain.exponentialRampToValueAtTime(.001,now+.6);w2.start(now+.15);w2.stop(now+.6);break;
    case'lose':o.frequency.value=250;o.type='sine';o.frequency.exponentialRampToValueAtTime(150,now+.5);g.gain.setValueAtTime(.02,now);g.gain.exponentialRampToValueAtTime(.001,now+.5);o.start(now);o.stop(now+.5);break;
    case'freeze':o.frequency.value=1200;o.type='sine';o.frequency.exponentialRampToValueAtTime(600,now+.2);g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.start(now);o.stop(now+.2);break;
    default:o.frequency.value=440;o.type='sine';g.gain.setValueAtTime(.015,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.1);
  }
}

// ========== CREATURE DATA ==========
const ELEMENTS={fire:{name:'Fire',color:'#ff6b35',emoji:'🔥'},water:{name:'Water',color:'#60a5fa',emoji:'💧'},earth:{name:'Earth',color:'#4ade80',emoji:'🌿'},lightning:{name:'Lightning',color:'#f7c948',emoji:'⚡'}};
const CREATURE_DEFS=[
  {id:1,name:'Ember',elem:'fire',emoji:'🔥',hp:40,atk:8,spd:1.0,range:0,cost:1,rarity:'common',ability:'Leaves burning ground on death',abilityKey:'burnDeath'},
  {id:2,name:'Blaze',elem:'fire',emoji:'🌋',hp:55,atk:12,spd:1.2,range:3,cost:2,rarity:'uncommon',ability:'Fireball hits in AOE',abilityKey:'aoe'},
  {id:3,name:'Phoenix',elem:'fire',emoji:'🦅',hp:45,atk:10,spd:1.0,range:0,cost:3,rarity:'rare',ability:'Revives once at 50% HP',abilityKey:'revive'},
  {id:4,name:'Inferno',elem:'fire',emoji:'👹',hp:80,atk:15,spd:1.5,range:4,cost:4,rarity:'epic',ability:'Beam hits all in a line',abilityKey:'beam'},
  {id:5,name:'Splash',elem:'water',emoji:'💧',hp:50,atk:7,spd:0.8,range:2,cost:1,rarity:'common',ability:'Slows enemy attack speed',abilityKey:'slow'},
  {id:6,name:'Tidal',elem:'water',emoji:'🌊',hp:65,atk:10,spd:1.0,range:0,cost:2,rarity:'uncommon',ability:'Pushes enemies back on hit',abilityKey:'pushback'},
  {id:7,name:'Frost',elem:'water',emoji:'❄️',hp:40,atk:9,spd:1.2,range:3,cost:3,rarity:'rare',ability:'Freezes target for 1s',abilityKey:'freeze'},
  {id:8,name:'Tsunami',elem:'water',emoji:'🐋',hp:90,atk:8,spd:2.0,range:5,cost:4,rarity:'epic',ability:'Hits entire column',abilityKey:'column'},
  {id:9,name:'Sprout',elem:'earth',emoji:'🌱',hp:70,atk:5,spd:1.0,range:0,cost:1,rarity:'common',ability:'Heals adjacent allies 3HP/s',abilityKey:'healAura'},
  {id:10,name:'Boulder',elem:'earth',emoji:'🪨',hp:120,atk:6,spd:1.5,range:0,cost:2,rarity:'uncommon',ability:'Taunt - enemies target first',abilityKey:'taunt'},
  {id:11,name:'Vine',elem:'earth',emoji:'🌿',hp:45,atk:8,spd:1.0,range:2,cost:3,rarity:'rare',ability:'Roots target for 1.5s',abilityKey:'root'},
  {id:12,name:'Golem',elem:'earth',emoji:'🗿',hp:150,atk:12,spd:2.0,range:0,cost:4,rarity:'epic',ability:'Immune to freeze/root',abilityKey:'immune'},
  {id:13,name:'Spark',elem:'lightning',emoji:'✨',hp:30,atk:12,spd:0.6,range:2,cost:1,rarity:'common',ability:'Fastest attacker',abilityKey:'fast'},
  {id:14,name:'Bolt',elem:'lightning',emoji:'⚡',hp:35,atk:15,spd:0.8,range:3,cost:2,rarity:'uncommon',ability:'20% crit for double damage',abilityKey:'crit'},
  {id:15,name:'Storm',elem:'lightning',emoji:'🌩️',hp:50,atk:10,spd:1.0,range:4,cost:3,rarity:'rare',ability:'Chain lightning hits 3 targets',abilityKey:'chain'},
  {id:16,name:'Thunder',elem:'lightning',emoji:'🔱',hp:60,atk:20,spd:1.5,range:5,cost:4,rarity:'epic',ability:'Stuns target for 0.5s',abilityKey:'stun'}
];
function getCreatureDef(id){return CREATURE_DEFS.find(c=>c.id===id)}
function makeCreature(defId,stars=1){
  const d=getCreatureDef(defId);
  const mult=stars===1?1:stars===2?1.8:3.0;
  return{defId:d.id,name:d.name,elem:d.elem,emoji:d.emoji,hp:Math.round(d.hp*mult),maxHp:Math.round(d.hp*mult),atk:Math.round(d.atk*mult),spd:d.spd,range:d.range,cost:d.cost,rarity:d.rarity,ability:d.ability,abilityKey:d.abilityKey,stars,uid:Math.random().toString(36).slice(2,9),revived:false};
}
function starStr(s){return s===1?'★':s===2?'★★':'★★★'}

// ========== GAME STATE ==========
let G={
  round:1,hp:100,gold:3,phase:'shop',
  bench:[null,null,null,null,null],
  grid:[[null,null,null,null],[null,null,null,null]],
  shop:[],shopLocked:false,
  winStreak:0,loseStreak:0,
  history:[],highScore:parseInt(localStorage.getItem('autobattle-highscore'))||0,
  selectedSlot:null,
  shopSold:[false,false,false,false,false],
  gameOver:false,won:false
};

// ========== SHOP POOL ==========
function rollShop(){
  if(G.shopLocked)return;
  const pool=[];
  const round=G.round;
  CREATURE_DEFS.forEach(d=>{
    let weight=0;
    if(d.rarity==='common')weight=round<10?10:6;
    else if(d.rarity==='uncommon')weight=round<5?4:8;
    else if(d.rarity==='rare')weight=round<8?2:6;
    else weight=round<10?1:4;
    for(let i=0;i<weight;i++)pool.push(d.id);
  });
  G.shop=[];G.shopSold=[false,false,false,false,false];
  for(let i=0;i<5;i++){
    G.shop.push(pool[Math.floor(Math.random()*pool.length)]);
  }
}

// ========== SYNERGIES ==========
function countElements(grid){
  const counts={fire:0,water:0,earth:0,lightning:0};
  grid.forEach(row=>row.forEach(c=>{if(c)counts[c.elem]++}));
  return counts;
}
function getActiveSynergies(grid){
  const c=countElements(grid);
  const syn=[];
  if(c.fire>=2)syn.push({elem:'fire',level:c.fire>=3?3:2,desc:c.fire>=3?'Fire: burn on attack':'Fire: +15% ATK'});
  if(c.water>=2)syn.push({elem:'water',level:c.water>=3?3:2,desc:c.water>=3?'Water: kill heals 5HP':'Water: +20% HP'});
  if(c.earth>=2)syn.push({elem:'earth',level:c.earth>=3?3:2,desc:c.earth>=3?'Earth: regen 2HP/s':'Earth: +10 HP shield'});
  if(c.lightning>=2)syn.push({elem:'lightning',level:c.lightning>=3?3:2,desc:c.lightning>=3?'Lgtn: 10% stun':'Lgtn: +15% AS'});
  return syn;
}

// ========== COMBINING ==========
function tryCombine(){
  const all=[];
  G.bench.forEach((c,i)=>{if(c)all.push({c,loc:'bench',idx:i})});
  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{if(c)all.push({c,loc:'grid',row:r,col:ci})}));
  let combined=false;
  for(let stars=1;stars<=2;stars++){
    const groups={};
    all.forEach(e=>{
      if(e.c.stars===stars){
        const key=e.c.defId+'_'+e.c.stars;
        if(!groups[key])groups[key]=[];
        groups[key].push(e);
      }
    });
    for(const key in groups){
      if(groups[key].length>=3){
        const g=groups[key];
        const first=g[0];
        const upgraded=makeCreature(first.c.defId,stars+1);
        // remove last 2
        for(let i=2;i>=1;i--){
          const e=g[i];
          if(e.loc==='bench')G.bench[e.idx]=null;
          else G.grid[e.row][e.col]=null;
        }
        // upgrade first
        if(first.loc==='bench')G.bench[first.idx]=upgraded;
        else G.grid[first.row][first.col]=upgraded;
        playSound('levelup');
        combined=true;
      }
    }
  }
  if(combined)tryCombine(); // recursive check
}

// ========== AI TEAM ==========
function generateAITeam(round){
  const team=[];
  let count,maxStars,maxCost;
  if(round<=3){count=2+Math.floor(round/2);maxStars=1;maxCost=2;}
  else if(round<=6){count=3+Math.floor((round-3)/2);maxStars=1;maxCost=3;}
  else if(round<=9){count=4+Math.floor((round-6)/3);maxStars=Math.random()<.3?2:1;maxCost=3;}
  else if(round===10){count=5;maxStars=2;maxCost=4;}
  else if(round<=15){count=5+Math.floor((round-10)/3);maxStars=2;maxCost=4;}
  else if(round<=19){count=Math.min(8,6+Math.floor((round-15)/2));maxStars=Math.random()<.4?3:2;maxCost=4;}
  else{count=8;maxStars=3;maxCost=4;}
  count=Math.min(count,8);
  const pool=CREATURE_DEFS.filter(d=>d.cost<=maxCost);
  // try to get some synergy
  const elemChoice=['fire','water','earth','lightning'][Math.floor(Math.random()*4)];
  for(let i=0;i<count;i++){
    const useSynergy=Math.random()<.5;
    const candidates=useSynergy?pool.filter(d=>d.elem===elemChoice):pool;
    const pick=candidates.length?candidates:pool;
    const def=pick[Math.floor(Math.random()*pick.length)];
    let stars=1;
    if(maxStars>=2&&Math.random()<(round>=10?.5:.2))stars=2;
    if(maxStars>=3&&Math.random()<(round>=20?.6:.15))stars=3;
    team.push(makeCreature(def.id,stars));
  }
  return team;
}

// ========== BATTLE ENGINE ==========
let battleState=null;
let battleRAF=null;
let battleSpeed=1;
const canvas=document.getElementById('battle-canvas');
const ctx=canvas.getContext('2d');
let cW,cH,cellW,cellH;

function resizeCanvas(){
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*devicePixelRatio;
  canvas.height=rect.height*devicePixelRatio;
  cW=canvas.width;cH=canvas.height;
  cellW=cW/4;cellH=cH/5;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}

function gridToPixel(col,row,isEnemy){
  // Player rows: 3,4 (bottom), Enemy rows: 0,1 (top)
  const gRow=isEnemy?row:(row+3);
  const x=(col+0.5)*(cW/devicePixelRatio/4);
  const y=(gRow+0.5)*(cH/devicePixelRatio/5);
  return{x,y};
}

const particles=[];
const dmgNums=[];
const projectiles=[];
const burningGround=[];

function addParticle(x,y,color,count=5,speed=2,life=0.5){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=speed*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life,maxLife:life,color,r:2+Math.random()*3});
  }
}

function addDmgNum(x,y,val,color='#fff',big=false){
  dmgNums.push({x,y,val:typeof val==='number'?Math.round(val):val,color,life:1.0,big});
}

function startBattle(){
  resizeCanvas();
  G.phase='battle';
  const playerTeam=[];
  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{
    if(c){
      const bc={...c,maxHp:c.hp,curHp:c.hp,gridCol:ci,gridRow:r,isEnemy:false,
        atkTimer:c.spd*0.5*Math.random(),
        x:0,y:0,targetX:0,targetY:0,
        statusEffects:[],alive:true,moving:false,attacking:false,attackAnim:0,
        spdMult:1.0,frozen:false,rooted:false,stunned:false,shielded:0,revived:false};
      const pos=gridToPixel(ci,r,false);
      bc.x=pos.x;bc.y=pos.y;bc.targetX=pos.x;bc.targetY=pos.y;
      playerTeam.push(bc);
    }
  }));

  const aiCreatures=generateAITeam(G.round);
  const enemyTeam=[];
  const aiGrid=[[],[],[],[]];
  aiCreatures.forEach((c,i)=>{
    const row=Math.floor(i/4);
    const col=i%4;
    const bc={...c,maxHp:c.hp,curHp:c.hp,gridCol:col,gridRow:row,isEnemy:true,
      atkTimer:c.spd*0.5*Math.random(),
      x:0,y:0,targetX:0,targetY:0,
      statusEffects:[],alive:true,moving:false,attacking:false,attackAnim:0,
      spdMult:1.0,frozen:false,rooted:false,stunned:false,shielded:0,revived:false};
    const pos=gridToPixel(col,row,true);
    bc.x=pos.x;bc.y=pos.y;bc.targetX=pos.x;bc.targetY=pos.y;
    enemyTeam.push(bc);
  });

  // Apply synergies
  const pSyn=getActiveSynergies(G.grid);
  const eCounts=countElements(enemyTeam.reduce((g,c)=>{if(!g[0])g[0]=[];if(!g[1])g[1]=[];const r=c.gridRow<2?c.gridRow:0;g[r].push(c);return g;},[[],[]]));
  // Player synergies
  pSyn.forEach(s=>{
    if(s.elem==='fire'&&s.level>=2)playerTeam.filter(c=>c.elem==='fire').forEach(c=>c.atk=Math.round(c.atk*1.15));
    if(s.elem==='water'&&s.level>=2)playerTeam.filter(c=>c.elem==='water').forEach(c=>{c.curHp=Math.round(c.curHp*1.2);c.maxHp=Math.round(c.maxHp*1.2)});
    if(s.elem==='earth'&&s.level>=2)playerTeam.forEach(c=>c.shielded+=10);
    if(s.elem==='lightning'&&s.level>=2)playerTeam.filter(c=>c.elem==='lightning').forEach(c=>c.spdMult*=1.15);
  });

  // Simple enemy synergies
  const eElemCounts={fire:0,water:0,earth:0,lightning:0};
  enemyTeam.forEach(c=>eElemCounts[c.elem]++);
  if(eElemCounts.fire>=2)enemyTeam.filter(c=>c.elem==='fire').forEach(c=>c.atk=Math.round(c.atk*1.15));
  if(eElemCounts.water>=2)enemyTeam.filter(c=>c.elem==='water').forEach(c=>{c.curHp=Math.round(c.curHp*1.2);c.maxHp=Math.round(c.maxHp*1.2)});
  if(eElemCounts.earth>=2)enemyTeam.forEach(c=>c.shielded+=10);
  if(eElemCounts.lightning>=2)enemyTeam.filter(c=>c.elem==='lightning').forEach(c=>c.spdMult*=1.15);

  battleState={player:playerTeam,enemy:enemyTeam,time:0,done:false,winner:null,
    pSyn,eSyn:[],pElemCounts:countElements(G.grid),eElemCounts};
  particles.length=0;dmgNums.length=0;projectiles.length=0;burningGround.length=0;
  document.getElementById('speed-btn').style.display='block';
  renderUI();
  battleLoop(performance.now());
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}

function findTarget(unit,allEnemies){
  const alive=allEnemies.filter(e=>e.alive);
  if(!alive.length)return null;
  // Check for taunt
  const taunters=alive.filter(e=>e.abilityKey==='taunt');
  if(taunters.length)return taunters.reduce((a,b)=>dist(unit,a)<dist(unit,b)?a:b);
  return alive.reduce((a,b)=>dist(unit,a)<dist(unit,b)?a:b);
}

function dealDamage(attacker,target,dmg,allAllies,allEnemies,isCrit=false){
  if(target.shielded>0){
    const absorbed=Math.min(target.shielded,dmg);
    target.shielded-=absorbed;
    dmg-=absorbed;
    if(absorbed>0)addDmgNum(target.x,target.y-15,'🛡'+absorbed,'#aaa');
  }
  target.curHp-=dmg;
  if(isCrit){
    addDmgNum(target.x+(-10+Math.random()*20),target.y-20,dmg,'#f7c948',true);
    playSound('crit');
  }else{
    addDmgNum(target.x+(-10+Math.random()*20),target.y-20,dmg,'#fff');
    playSound('hit');
  }
  addParticle(target.x,target.y,ELEMENTS[attacker.elem].color,3);
  if(target.curHp<=0){
    // Check revive
    if(target.abilityKey==='revive'&&!target.revived){
      target.revived=true;
      target.curHp=Math.round(target.maxHp*0.5);
      addDmgNum(target.x,target.y-30,'REVIVE','#ff6b35',true);
      addParticle(target.x,target.y,'#ff6b35',10,3);
      return;
    }
    target.alive=false;
    target.curHp=0;
    playSound('death');
    addParticle(target.x,target.y,'#ff4444',15,4,0.8);
    // Burn ground on death
    if(target.abilityKey==='burnDeath'||
      (attacker.elem==='fire'&&battleState.pSyn.some(s=>s.elem==='fire'&&s.level>=3)&&!attacker.isEnemy)||
      (attacker.elem==='fire'&&battleState.eElemCounts.fire>=3&&attacker.isEnemy)){
      burningGround.push({x:target.x,y:target.y,life:3,side:attacker.isEnemy?'enemy':'player'});
    }
    // Water kill heal
    const waterSynLevel=attacker.isEnemy?(battleState.eElemCounts.water>=3?3:0):(battleState.pSyn.some(s=>s.elem==='water'&&s.level>=3)?3:0);
    if(waterSynLevel>=3&&attacker.elem==='water'){
      attacker.curHp=Math.min(attacker.maxHp,attacker.curHp+5);
      addDmgNum(attacker.x,attacker.y-15,'+5','#60a5fa');
    }
  }
}

function processAttack(unit,target,allAllies,allEnemies,dt){
  let dmg=unit.atk;
  let isCrit=false;
  // Crit
  if(unit.abilityKey==='crit'&&Math.random()<0.2){dmg*=2;isCrit=true}
  // 3-star ultimate
  if(unit.stars>=3){dmg=Math.round(dmg*1.2)}

  // Status effects from attack
  if(unit.abilityKey==='slow')target.spdMult=Math.max(0.5,target.spdMult*0.7);
  if(unit.abilityKey==='freeze'&&target.abilityKey!=='immune'){target.frozen=true;target.frozenTimer=1.0;playSound('freeze');addParticle(target.x,target.y,'#aaddff',8,2)}
  if(unit.abilityKey==='root'&&target.abilityKey!=='immune'){target.rooted=true;target.rootedTimer=1.5;addParticle(target.x,target.y,'#4ade80',6,1)}
  if(unit.abilityKey==='stun'){target.stunned=true;target.stunnedTimer=0.5;addDmgNum(target.x,target.y-30,'STUN','#f7c948')}
  if(unit.abilityKey==='pushback'&&!target.rooted&&!target.frozen){
    const dx=target.x-unit.x,dy=target.y-unit.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    target.x+=dx/d*15;target.y+=dy/d*15;
  }
  // Lightning synergy stun
  const ltnSyn=unit.isEnemy?(battleState.eElemCounts.lightning>=3):(battleState.pSyn.some(s=>s.elem==='lightning'&&s.level>=3));
  if(ltnSyn&&unit.elem==='lightning'&&Math.random()<0.1){target.stunned=true;target.stunnedTimer=0.3;addDmgNum(target.x,target.y-30,'ZAP','#f7c948')}

  // AOE
  if(unit.abilityKey==='aoe'){
    allEnemies.filter(e=>e.alive&&e!==target&&dist(e,target)<40).forEach(e=>dealDamage(unit,e,Math.round(dmg*0.5),allAllies,allEnemies));
  }
  // Beam
  if(unit.abilityKey==='beam'){
    allEnemies.filter(e=>e.alive&&e!==target&&Math.abs(e.x-unit.x)<20).forEach(e=>dealDamage(unit,e,Math.round(dmg*0.6),allAllies,allEnemies));
  }
  // Chain
  if(unit.abilityKey==='chain'){
    let prev=target;let hits=0;
    const hitSet=new Set([target.uid]);
    while(hits<2){
      const next=allEnemies.filter(e=>e.alive&&!hitSet.has(e.uid)).sort((a,b)=>dist(prev,a)-dist(prev,b))[0];
      if(!next)break;
      hitSet.add(next.uid);
      dealDamage(unit,next,Math.round(dmg*0.6),allAllies,allEnemies);
      projectiles.push({x:prev.x,y:prev.y,tx:next.x,ty:next.y,color:'#f7c948',life:0.15});
      prev=next;hits++;
    }
  }
  // Column
  if(unit.abilityKey==='column'){
    allEnemies.filter(e=>e.alive&&e!==target&&Math.abs(e.x-target.x)<20).forEach(e=>dealDamage(unit,e,Math.round(dmg*0.7),allAllies,allEnemies));
  }

  // Ranged = projectile, melee = dash
  if(unit.range>0){
    projectiles.push({x:unit.x,y:unit.y,tx:target.x,ty:target.y,color:ELEMENTS[unit.elem].color,life:0.2});
  }else{
    unit.attacking=true;unit.attackAnim=0.15;
    unit.attackTargetX=target.x;unit.attackTargetY=target.y;
  }

  // Fire synergy burn on attack
  const fireBurnSyn=unit.isEnemy?(battleState.eElemCounts.fire>=3):(battleState.pSyn.some(s=>s.elem==='fire'&&s.level>=3));
  if(fireBurnSyn&&unit.elem==='fire'){
    addParticle(target.x,target.y,'#ff6b35',3,1.5);
  }

  dealDamage(unit,target,dmg,allAllies,allEnemies,isCrit);
}

function battleUpdate(dt){
  if(!battleState||battleState.done)return;
  battleState.time+=dt;
  const{player,enemy}=battleState;
  const pAlive=player.filter(u=>u.alive);
  const eAlive=enemy.filter(u=>u.alive);

  if(!pAlive.length||!eAlive.length||battleState.time>30){
    battleState.done=true;
    if(!pAlive.length&&!eAlive.length)battleState.winner='enemy';
    else if(!pAlive.length)battleState.winner='enemy';
    else if(!eAlive.length)battleState.winner='player';
    else{const pHpPct=pAlive.reduce((s,u)=>s+u.curHp/u.maxHp,0)/pAlive.length;const eHpPct=eAlive.reduce((s,u)=>s+u.curHp/u.maxHp,0)/eAlive.length;battleState.winner=pHpPct>=eHpPct?'player':'enemy'}
    return;
  }

  // Earth regen synergy
  const earthRegenP=battleState.pSyn.some(s=>s.elem==='earth'&&s.level>=3);
  const earthRegenE=battleState.eElemCounts.earth>=3;

  const allUnits=[...pAlive,...eAlive];
  allUnits.forEach(u=>{
    // Status timers
    if(u.frozen){u.frozenTimer-=dt;if(u.frozenTimer<=0){u.frozen=false}}
    if(u.rooted){u.rootedTimer-=dt;if(u.rootedTimer<=0){u.rooted=false}}
    if(u.stunned){u.stunnedTimer-=dt;if(u.stunnedTimer<=0){u.stunned=false}}
    if(u.frozen||u.stunned)return;

    // Heal aura
    if(u.abilityKey==='healAura'){
      const allies=u.isEnemy?eAlive:pAlive;
      allies.filter(a=>a!==u&&a.alive&&dist(u,a)<60).forEach(a=>{
        a.curHp=Math.min(a.maxHp,a.curHp+3*dt);
      });
    }

    // Earth regen
    if((earthRegenP&&!u.isEnemy&&u.elem==='earth')||(earthRegenE&&u.isEnemy&&u.elem==='earth')){
      u.curHp=Math.min(u.maxHp,u.curHp+2*dt);
    }

    const enemies=u.isEnemy?pAlive:eAlive;
    const allies=u.isEnemy?eAlive:pAlive;
    const target=findTarget(u,enemies);
    if(!target)return;

    const d=dist(u,target);
    const rangePx=u.range>0?u.range*cellW/devicePixelRatio*0.55:cellW/devicePixelRatio*0.35;

    if(d>rangePx&&!u.rooted){
      // Move toward target
      const speed=120*dt;
      const dx=target.x-u.x,dy=target.y-u.y;
      const dl=Math.sqrt(dx*dx+dy*dy)||1;
      u.x+=dx/dl*speed;
      u.y+=dy/dl*speed;
    }

    // Attack
    u.atkTimer-=dt*u.spdMult;
    if(u.atkTimer<=0&&d<=rangePx+10){
      u.atkTimer=u.spd;
      processAttack(u,target,allies,enemies,dt);
    }

    // Attack anim
    if(u.attacking){
      u.attackAnim-=dt;
      if(u.attackAnim<=0){u.attacking=false}
    }
  });

  // Burning ground
  burningGround.forEach(bg=>{
    bg.life-=dt;
    if(bg.life>0){
      addParticle(bg.x+(-10+Math.random()*20),bg.y+(-10+Math.random()*20),'#ff6b35',1,1,0.3);
      const targets=bg.side==='player'?eAlive:pAlive;
      targets.filter(t=>dist(t,bg)<25).forEach(t=>{
        t.curHp-=5*dt;
        if(t.curHp<=0&&t.alive){
          if(t.abilityKey==='revive'&&!t.revived){t.revived=true;t.curHp=Math.round(t.maxHp*0.5);return}
          t.alive=false;t.curHp=0;playSound('death');addParticle(t.x,t.y,'#ff4444',10,3)
        }
      });
    }
  });
  for(let i=burningGround.length-1;i>=0;i--)if(burningGround[i].life<=0)burningGround.splice(i,1);

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=dt;p.vy+=2*dt});
  for(let i=particles.length-1;i>=0;i--)if(particles[i].life<=0)particles.splice(i,1);
  // Projectiles
  projectiles.forEach(p=>p.life-=dt);
  for(let i=projectiles.length-1;i>=0;i--)if(projectiles[i].life<=0)projectiles.splice(i,1);
  // Dmg nums
  dmgNums.forEach(d=>{d.y-=30*dt;d.life-=dt*1.5});
  for(let i=dmgNums.length-1;i>=0;i--)if(dmgNums[i].life<=0)dmgNums.splice(i,1);
}

function battleRender(){
  const w=cW/devicePixelRatio,h=cH/devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  // Grid lines
  ctx.strokeStyle='#1a1a30';ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(i*w/4,0);ctx.lineTo(i*w/4,h);ctx.stroke()}
  for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,i*h/5);ctx.lineTo(w,i*h/5);ctx.stroke()}

  // Middle divider
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,h*2/5);ctx.lineTo(w,h*2/5);ctx.stroke();

  // "ENEMY" / "YOU" labels
  ctx.fillStyle='#333';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('ENEMY',w/2,h*0.08);
  ctx.fillText('YOU',w/2,h*0.95);

  // Burning ground
  burningGround.forEach(bg=>{
    ctx.fillStyle='rgba(255,107,53,0.15)';
    ctx.beginPath();ctx.arc(bg.x,bg.y,20,0,Math.PI*2);ctx.fill();
  });

  // Creatures
  if(battleState){
    const all=[...battleState.player,...battleState.enemy];
    all.forEach(u=>{
      if(!u.alive)return;
      let drawX=u.x,drawY=u.y;
      if(u.attacking&&u.attackAnim>0){
        const t=u.attackAnim/0.15;
        const mx=(u.attackTargetX-u.x)*0.3*(1-Math.abs(t-0.5)*2);
        const my=(u.attackTargetY-u.y)*0.3*(1-Math.abs(t-0.5)*2);
        drawX+=mx;drawY+=my;
      }

      const radius=u.stars===1?14:u.stars===2?17:20;
      const elemColor=ELEMENTS[u.elem].color;

      // Glow for starred
      if(u.stars>=2){
        ctx.shadowColor=elemColor;ctx.shadowBlur=u.stars===2?8:15;
      }

      // Shield
      if(u.shielded>0){
        ctx.strokeStyle='rgba(167,139,250,0.5)';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(drawX,drawY,radius+4,0,Math.PI*2);ctx.stroke();
      }

      // Body
      ctx.fillStyle=u.frozen?'#aaddff':elemColor;
      ctx.globalAlpha=u.stunned?0.5:1;
      ctx.beginPath();ctx.arc(drawX,drawY,radius,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      ctx.shadowBlur=0;

      // Emoji
      ctx.font=(radius*0.9)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(u.emoji,drawX,drawY+1);

      // HP bar
      const barW=radius*2;const barH=3;const barY=drawY+radius+4;
      ctx.fillStyle='#333';
      ctx.fillRect(drawX-barW/2,barY,barW,barH);
      const hpPct=Math.max(0,u.curHp/u.maxHp);
      ctx.fillStyle=hpPct>.5?'#4ade80':hpPct>.25?'#f7c948':'#ef4444';
      ctx.fillRect(drawX-barW/2,barY,barW*hpPct,barH);

      // Stars
      ctx.font='8px sans-serif';ctx.fillStyle='#f7c948';
      ctx.fillText(starStr(u.stars),drawX,drawY-radius-5);

      // Status icons
      let statusY=drawY-radius-14;
      if(u.frozen){ctx.font='10px sans-serif';ctx.fillText('❄️',drawX,statusY);statusY-=12}
      if(u.rooted){ctx.font='10px sans-serif';ctx.fillText('🌿',drawX,statusY);statusY-=12}
      if(u.stunned){ctx.font='10px sans-serif';ctx.fillText('💫',drawX,statusY)}
    });
  }

  // Projectiles
  projectiles.forEach(p=>{
    const t=1-p.life/0.2;
    const px=p.x+(p.tx-p.x)*t;
    const py=p.y+(p.ty-p.y)*t;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
    ctx.shadowColor=p.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Damage numbers
  dmgNums.forEach(d=>{
    ctx.globalAlpha=Math.max(0,d.life);
    ctx.font=d.big?'bold 18px sans-serif':'bold 13px sans-serif';
    ctx.fillStyle=d.color;ctx.textAlign='center';
    ctx.fillText(d.val,d.x,d.y);
  });
  ctx.globalAlpha=1;
}

let lastBattleTime=0;
function battleLoop(ts){
  if(G.phase!=='battle'){return}
  const rawDt=Math.min((ts-lastBattleTime)/1000,0.05);
  lastBattleTime=ts;
  const dt=rawDt*battleSpeed;
  battleUpdate(dt);
  battleRender();
  if(battleState&&battleState.done){
    setTimeout(endBattle,600);
    return;
  }
  battleRAF=requestAnimationFrame(battleLoop);
}

function endBattle(){
  const won=battleState.winner==='player';
  const surviving=won?0:battleState.enemy.filter(e=>e.alive).length;
  G.history.push(won?'win':'loss');

  if(won){
    G.winStreak++;G.loseStreak=0;
    playSound('win');
    showFlash('VICTORY!','#4ade80');
  }else{
    G.hp-=surviving;
    G.loseStreak++;G.winStreak=0;
    playSound('lose');
    showFlash('DEFEAT -'+surviving+'HP','#ef4444');
  }

  if(G.hp<=0){
    G.hp=0;G.gameOver=true;G.won=false;
    if(G.round>G.highScore){G.highScore=G.round;localStorage.setItem('autobattle-highscore',G.highScore)}
    renderUI();showGameOver();return;
  }
  if(G.round>=20&&won){
    G.gameOver=true;G.won=true;
    if(G.round>G.highScore){G.highScore=G.round;localStorage.setItem('autobattle-highscore',G.highScore)}
    renderUI();showGameOver();return;
  }

  // Income
  const baseIncome=Math.min(5,G.round);
  const interest=Math.min(5,Math.floor(G.gold*0.1));
  const streakBonus=Math.min(3,G.winStreak>1?G.winStreak-1:0);
  const roundBonus=1;
  G.lastIncome={base:baseIncome,interest,streak:streakBonus,round:roundBonus,total:baseIncome+interest+streakBonus+roundBonus};
  G.gold+=G.lastIncome.total;
  G.round++;

  if(G.round>G.highScore){G.highScore=G.round;localStorage.setItem('autobattle-highscore',G.highScore)}

  G.phase='shop';
  rollShop();
  battleState=null;
  saveGame();
  renderUI();
  renderShopCanvas();
}

function showFlash(text,color){
  const el=document.getElementById('result-flash');
  el.textContent=text;el.style.color=color;el.style.display='block';
  setTimeout(()=>el.style.display='none',700);
}

function showGameOver(){
  const el=document.getElementById('game-over');
  el.style.display='flex';
  el.innerHTML=G.won?
    `<h1 style="color:#4ade80">YOU WIN!</h1><p>Survived all 20 rounds!</p><p>High Score: Round ${G.highScore}</p><button class="btn btn-start" onclick="newGame()">Play Again</button>`:
    `<h1 style="color:#ef4444">GAME OVER</h1><p>Defeated at Round ${G.round}</p><p>High Score: Round ${G.highScore}</p><button class="btn btn-start" onclick="newGame()">Play Again</button>`;
}

// ========== RENDER SHOP CANVAS (idle view) ==========
function renderShopCanvas(){
  resizeCanvas();
  const w=cW/devicePixelRatio,h=cH/devicePixelRatio;
  ctx.clearRect(0,0,w,h);

  // Grid
  ctx.strokeStyle='#1a1a30';ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(i*w/4,0);ctx.lineTo(i*w/4,h);ctx.stroke()}
  for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,i*h/5);ctx.lineTo(w,i*h/5);ctx.stroke()}

  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,h*2/5);ctx.lineTo(w,h*2/5);ctx.stroke();

  ctx.fillStyle='#444';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('ENEMY SIDE',w/2,h*0.08);
  ctx.fillText('YOUR GRID',w/2,h*0.95);

  // Draw player creatures on grid
  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{
    if(!c)return;
    const pos=gridToPixel(ci,r,false);
    const radius=c.stars===1?14:c.stars===2?17:20;
    const elemColor=ELEMENTS[c.elem].color;
    if(c.stars>=2){ctx.shadowColor=elemColor;ctx.shadowBlur=c.stars===2?8:15}
    ctx.fillStyle=elemColor;
    ctx.beginPath();ctx.arc(pos.x,pos.y,radius,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.font=(radius*0.9)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.emoji,pos.x,pos.y+1);
    ctx.font='8px sans-serif';ctx.fillStyle='#f7c948';
    ctx.fillText(starStr(c.stars),pos.x,pos.y-radius-5);
    // HP
    const barW=radius*2,barH=3,barY=pos.y+radius+4;
    ctx.fillStyle='#333';ctx.fillRect(pos.x-barW/2,barY,barW,barH);
    ctx.fillStyle='#4ade80';ctx.fillRect(pos.x-barW/2,barY,barW,barH);
  }));

  // Grid slot indicators
  G.grid.forEach((row,r)=>row.forEach((c,ci)=>{
    if(c)return;
    const pos=gridToPixel(ci,r,false);
    ctx.strokeStyle='#2a2a45';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(pos.x,pos.y,14,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
  }));
}

// ========== UI RENDERING ==========
function renderUI(){
  // Top bar
  const hpPct=G.hp/100;
  document.getElementById('top-bar').innerHTML=`
    <span class="round">Round ${G.round}/20</span>
    <span class="hp-wrap">❤️ <span class="hp-bar-outer"><span class="hp-bar-inner${hpPct<.3?' danger':''}" style="width:${hpPct*100}%"></span></span> ${G.hp}</span>
    <span class="gold-display">💰 ${G.gold}</span>
    <span class="streak-display">${G.winStreak>1?'🔥'+G.winStreak:G.loseStreak>1?'💀'+G.loseStreak:''}</span>`;

  // Synergies
  const syn=getActiveSynergies(G.grid);
  document.getElementById('synergy-bar').innerHTML=syn.map(s=>
    `<span class="synergy-tag" style="background:${ELEMENTS[s.elem].color}22;color:${ELEMENTS[s.elem].color};border:1px solid ${ELEMENTS[s.elem].color}44">${s.desc}</span>`
  ).join('');

  // Phase banner
  document.getElementById('phase-banner').textContent=G.phase==='shop'?'⚔️ PREPARE FOR BATTLE':'⚔️ BATTLE!';

  // Shop phase UI
  if(G.phase==='shop'){
    renderShopUI();
  }else{
    document.getElementById('shop-phase-ui').innerHTML='';
  }

  // Round history
  document.getElementById('round-history').innerHTML=G.history.map(h=>
    `<div class="round-dot ${h}"></div>`
  ).join('');

  // High score
  document.getElementById('high-score').textContent=G.highScore>0?`High Score: Round ${G.highScore}`:'';
}

function renderShopUI(){
  const shopHTML=G.shop.map((defId,i)=>{
    const d=getCreatureDef(defId);
    const sold=G.shopSold[i];
    const rClass=d.rarity!=='common'?' rarity-'+d.rarity:'';
    return`<div class="shop-card${sold?' sold':''}${rClass}" data-shop-idx="${i}" onclick="buyCreature(${i})">
      <span class="elem-dot" style="background:${ELEMENTS[d.elem].color}"></span>
      <div class="emoji">${d.emoji}</div>
      <div class="name">${d.name}</div>
      <div class="cost">💰${d.cost}</div>
      <div class="stats">${d.hp}HP ${d.atk}ATK</div>
    </div>`;
  }).join('');

  let incomeHTML='';
  if(G.lastIncome){
    const li=G.lastIncome;
    incomeHTML=`<div class="income-breakdown">
      Income: <span>+${li.total}g</span> (base:${li.base} int:${li.interest} streak:${li.streak} round:${li.round})
    </div>`;
  }

  const benchHTML=G.bench.map((c,i)=>{
    const sel=G.selectedSlot&&G.selectedSlot.type==='bench'&&G.selectedSlot.idx===i;
    return`<div class="bench-slot${c?' occupied':''}${sel?' selected-slot':''}" style="${c?'border-color:'+ELEMENTS[c.elem].color+'66':''}" data-bench-idx="${i}" onclick="clickSlot('bench',${i})" oncontextmenu="event.preventDefault();showCreatureTooltip(event,'bench',${i})">
      ${c?`<span class="slot-emoji">${c.emoji}</span><span class="slot-stars">${starStr(c.stars)}</span>`:''}
    </div>`;
  }).join('');

  const gridHTML=G.grid.map((row,r)=>`
    <div class="grid-row">${row.map((c,ci)=>{
      const sel=G.selectedSlot&&G.selectedSlot.type==='grid'&&G.selectedSlot.row===r&&G.selectedSlot.col===ci;
      return`<div class="grid-slot${c?' occupied':''}${sel?' selected-slot':''}" style="${c?'border-color:'+ELEMENTS[c.elem].color+'66':''}" data-grid-row="${r}" data-grid-col="${ci}" onclick="clickSlot('grid',${r},${ci})" oncontextmenu="event.preventDefault();showCreatureTooltip(event,'grid',${r},${ci})">
        ${c?`<span class="slot-emoji">${c.emoji}</span><span class="slot-stars">${starStr(c.stars)}</span><span class="slot-hp" style="color:${ELEMENTS[c.elem].color}">${c.hp}hp</span>`:''}
      </div>`;
    }).join('')}</div>`).join('');

  document.getElementById('shop-phase-ui').innerHTML=`
    <div class="shop-area">
      <div class="shop-header">
        <h3>🏪 Shop</h3>
        <div class="shop-btns">
          <button class="btn btn-lock${G.shopLocked?' locked':''}" onclick="toggleLock()">${G.shopLocked?'🔒 Locked':'🔓 Lock'}</button>
          <button class="btn btn-refresh" onclick="refreshShop()">🔄 Refresh (2g)</button>
          <button class="btn btn-newgame" onclick="newGame()">New Game</button>
        </div>
      </div>
      <div class="shop-cards">${shopHTML}</div>
      ${incomeHTML}
    </div>
    <div class="grid-area">
      <div class="grid-label"><span>⚔️ Battlefield (${G.grid.flat().filter(Boolean).length}/8)</span><span>Tap to select, tap destination to move</span></div>
      <div class="grid-rows">${gridHTML}</div>
    </div>
    <div class="bench-area">
      <div class="bench-label"><span>🪑 Bench (${G.bench.filter(Boolean).length}/5)</span></div>
      <div class="bench-slots">${benchHTML}</div>
    </div>
    <div class="sell-zone${G.selectedSlot?' active':''}" onclick="sellSelected()">
      ${G.selectedSlot?'💰 TAP TO SELL'+(() => {const s=G.selectedSlot;const c=s.type==='bench'?G.bench[s.idx]:G.grid[s.row][s.col];return c?' ('+c.cost*c.stars+'g)':''})():'Select a creature to sell'}
    </div>
    <button class="btn btn-start" onclick="startBattleClick()">⚔️ Start Battle!</button>`;

  // Attach hover tooltips for shop cards
  document.querySelectorAll('.shop-card').forEach(el=>{
    el.addEventListener('mouseenter',e=>{
      const idx=parseInt(el.dataset.shopIdx);
      if(G.shopSold[idx])return;
      showShopTooltip(e,idx);
    });
    el.addEventListener('mouseleave',()=>hideTooltip());
  });
}

// ========== TOOLTIPS ==========
function showShopTooltip(event,idx){
  const d=getCreatureDef(G.shop[idx]);
  const tip=document.getElementById('tooltip');
  tip.innerHTML=`<div class="t-name" style="color:${ELEMENTS[d.elem].color}">${d.emoji} ${d.name}</div>
    <div class="t-elem">${ELEMENTS[d.elem].emoji} ${ELEMENTS[d.elem].name} | ${d.rarity}</div>
    <div class="t-stats">HP: ${d.hp} | ATK: ${d.atk}<br>Speed: ${d.spd}s | Range: ${d.range||'melee'}<br>Cost: ${d.cost}g</div>
    <div class="t-ability">${d.ability}</div>`;
  positionTooltip(event,tip);
}

function showCreatureTooltip(event,type,a,b){
  let c;
  if(type==='bench')c=G.bench[a];
  else c=G.grid[a][b];
  if(!c)return;
  const d=getCreatureDef(c.defId);
  const tip=document.getElementById('tooltip');
  tip.innerHTML=`<div class="t-name" style="color:${ELEMENTS[c.elem].color}">${c.emoji} ${c.name} ${starStr(c.stars)}</div>
    <div class="t-elem">${ELEMENTS[c.elem].emoji} ${ELEMENTS[c.elem].name}</div>
    <div class="t-stats">HP: ${c.hp} | ATK: ${c.atk}<br>Speed: ${c.spd}s | Range: ${c.range||'melee'}<br>Sell: ${c.cost*c.stars}g</div>
    <div class="t-ability">${c.ability}</div>`;
  positionTooltip(event,tip);
  setTimeout(()=>hideTooltip(),3000);
}

function positionTooltip(event,tip){
  tip.style.display='block';
  let x=event.clientX+10,y=event.clientY-10;
  if(x+210>window.innerWidth)x=event.clientX-210;
  if(y+150>window.innerHeight)y=event.clientY-150;
  tip.style.left=x+'px';tip.style.top=y+'px';
}

function hideTooltip(){document.getElementById('tooltip').style.display='none'}

// ========== GAME ACTIONS ==========
window.buyCreature=function(idx){
  if(G.shopSold[idx])return;
  const defId=G.shop[idx];
  const d=getCreatureDef(defId);
  if(G.gold<d.cost)return;

  // Find empty slot: prefer grid first, then bench
  let placed=false;
  for(let r=0;r<2&&!placed;r++){
    for(let c=0;c<4&&!placed;c++){
      if(!G.grid[r][c]){
        G.grid[r][c]=makeCreature(defId);
        placed=true;
      }
    }
  }
  if(!placed){
    for(let i=0;i<5&&!placed;i++){
      if(!G.bench[i]){
        G.bench[i]=makeCreature(defId);
        placed=true;
      }
    }
  }
  if(!placed)return; // full

  G.gold-=d.cost;
  G.shopSold[idx]=true;
  playSound('buy');
  tryCombine();
  renderUI();
  renderShopCanvas();
};

window.clickSlot=function(type,a,b){
  const sel=G.selectedSlot;
  if(!sel){
    // Select if occupied
    let c;
    if(type==='bench')c=G.bench[a];
    else c=G.grid[a][b];
    if(c){
      G.selectedSlot={type,idx:type==='bench'?a:undefined,row:type==='grid'?a:undefined,col:type==='grid'?b:undefined};
      renderUI();renderShopCanvas();
    }
    return;
  }

  // Deselect if clicking same slot
  if((sel.type==='bench'&&type==='bench'&&sel.idx===a)||(sel.type==='grid'&&type==='grid'&&sel.row===a&&sel.col===b)){
    G.selectedSlot=null;renderUI();renderShopCanvas();return;
  }

  // Already selected — perform swap/move
  let srcC,dstC;
  if(sel.type==='bench')srcC=G.bench[sel.idx];
  else srcC=G.grid[sel.row][sel.col];
  if(type==='bench')dstC=G.bench[a];
  else dstC=G.grid[a][b];

  // Swap
  if(sel.type==='bench'&&type==='bench'){
    G.bench[sel.idx]=dstC;G.bench[a]=srcC;
  }else if(sel.type==='grid'&&type==='grid'){
    G.grid[sel.row][sel.col]=dstC;G.grid[a][b]=srcC;
  }else if(sel.type==='bench'&&type==='grid'){
    G.bench[sel.idx]=dstC;G.grid[a][b]=srcC;
  }else{
    G.grid[sel.row][sel.col]=dstC;G.bench[a]=srcC;
  }

  G.selectedSlot=null;
  tryCombine();
  renderUI();renderShopCanvas();
};

window.sellSelected=function(){
  if(!G.selectedSlot)return;
  const sel=G.selectedSlot;
  let c;
  if(sel.type==='bench'){c=G.bench[sel.idx];G.bench[sel.idx]=null}
  else{c=G.grid[sel.row][sel.col];G.grid[sel.row][sel.col]=null}
  if(c){
    G.gold+=c.cost*c.stars;
    playSound('sell');
  }
  G.selectedSlot=null;
  renderUI();renderShopCanvas();
};

window.refreshShop=function(){
  if(G.gold<2)return;
  G.gold-=2;
  G.shopLocked=false;
  rollShop();
  playSound('buy');
  renderUI();
};

window.toggleLock=function(){
  G.shopLocked=!G.shopLocked;
  renderUI();
};

window.startBattleClick=function(){
  ensureAudio();
  const creatures=G.grid.flat().filter(Boolean);
  if(!creatures.length){
    showFlash('Place creatures!','#f7c948');
    return;
  }
  G.selectedSlot=null;
  lastBattleTime=performance.now();
  startBattle();
};

window.newGame=function(){
  document.getElementById('game-over').style.display='none';
  G={round:1,hp:100,gold:3,phase:'shop',
    bench:[null,null,null,null,null],
    grid:[[null,null,null,null],[null,null,null,null]],
    shop:[],shopLocked:false,
    winStreak:0,loseStreak:0,
    history:[],highScore:G.highScore||parseInt(localStorage.getItem('autobattle-highscore'))||0,
    selectedSlot:null,shopSold:[false,false,false,false,false],
    gameOver:false,won:false,lastIncome:null};
  rollShop();
  renderUI();
  renderShopCanvas();
  localStorage.removeItem('autobattle-save');
};

// ========== SAVE/LOAD ==========
function saveGame(){
  try{
    const s={round:G.round,hp:G.hp,gold:G.gold,bench:G.bench,grid:G.grid,
      shop:G.shop,shopLocked:G.shopLocked,shopSold:G.shopSold,
      winStreak:G.winStreak,loseStreak:G.loseStreak,history:G.history,lastIncome:G.lastIncome};
    localStorage.setItem('autobattle-save',JSON.stringify(s));
  }catch(e){}
}

function loadGame(){
  try{
    const raw=localStorage.getItem('autobattle-save');
    if(!raw)return false;
    const s=JSON.parse(raw);
    G.round=s.round;G.hp=s.hp;G.gold=s.gold;G.bench=s.bench;G.grid=s.grid;
    G.shop=s.shop;G.shopLocked=s.shopLocked;G.shopSold=s.shopSold||[false,false,false,false,false];
    G.winStreak=s.winStreak;G.loseStreak=s.loseStreak;G.history=s.history||[];
    G.lastIncome=s.lastIncome||null;
    G.phase='shop';G.gameOver=false;G.won=false;G.selectedSlot=null;
    return true;
  }catch(e){return false}
}

// ========== INIT ==========
function init(){
  window.addEventListener('resize',()=>{if(G.phase==='shop')renderShopCanvas()});
  canvas.addEventListener('click',hideTooltip);
  document.addEventListener('click',e=>{
    if(!e.target.closest('.tooltip')&&!e.target.closest('.shop-card')&&!e.target.closest('.bench-slot')&&!e.target.closest('.grid-slot')){
      hideTooltip();
    }
  });

  if(!loadGame()){
    rollShop();
  }
  renderUI();
  setTimeout(()=>renderShopCanvas(),50);
}

// expose for onclick
window.showCreatureTooltip=showCreatureTooltip;

init();
})();
</script>
