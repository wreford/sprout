// === AUDIO ===
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, dur, vol = 0.1, type = 'sine') {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq; g.gain.value = vol;
  o.connect(g); g.connect(audioCtx.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}

function playCrash() {
  playTone(55, 0.35, 0.15, 'sawtooth');
  playTone(35, 0.45, 0.12, 'square');
}
function playChime() {
  playTone(523, 0.15, 0.08);
  setTimeout(() => playTone(659, 0.15, 0.08), 120);
  setTimeout(() => playTone(784, 0.3, 0.1), 240);
}
function playTick() { playTone(800, 0.05, 0.04, 'square'); }

// Engine hum — continuous low sine while moving
let engineOsc, engineGain;
function startEngine() {
  if (!audioCtx) return;
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'sine';
  engineOsc.frequency.value = 80;
  engineGain.gain.value = 0;
  engineOsc.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  engineOsc.start();
}
function updateEngine(speed, turning) {
  if (!engineOsc) return;
  const s = Math.abs(speed);
  engineGain.gain.value = s > 0.5 ? 0.01 : 0;
  engineOsc.frequency.value = 80 + s * 25 + (turning ? 8 : 0);
}

// === SPEECH — dry British narrator ===
let lastSpeech = 0;
const SPEECH_GAP = 8000;

function speak(text) {
  try {
    if (!window.speechSynthesis) return;
    var now = Date.now();
    if (now - lastSpeech < 8000) return;
    lastSpeech = now;
    try { speechSynthesis.cancel(); } catch(e) {}
    setTimeout(function() {
      try {
        var u = new SpeechSynthesisUtterance(text);
        u.rate = 0.85; u.pitch = 0.8; u.volume = 1.0;
        var voices = speechSynthesis.getVoices();
        if (voices && voices.length > 0) {
          var v = null;
          for (var i = 0; i < voices.length; i++) {
            if (voices[i].lang && voices[i].lang.indexOf('en') === 0) { v = voices[i]; break; }
          }
          if (v) u.voice = v;
        }
        speechSynthesis.speak(u);
      } catch(e) {}
    }, 60);
  } catch(e) {}
}

// Joystick
const joyCanvas = document.getElementById('joyC');
const joyCtx = joyCanvas.getContext('2d');
let joyActive = false, joyDX = 0, joyDY = 0;

function drawJoy() {
  joyCtx.clearRect(0, 0, 120, 120);
  // Outer ring
  joyCtx.beginPath();
  joyCtx.arc(60, 60, 50, 0, Math.PI * 2);
  joyCtx.fillStyle = 'rgba(255,255,255,0.1)';
  joyCtx.fill();
  joyCtx.strokeStyle = 'rgba(255,255,255,0.25)';
  joyCtx.lineWidth = 2;
  joyCtx.stroke();
  // Directional hints
  joyCtx.fillStyle = 'rgba(255,255,255,0.15)';
  joyCtx.font = '10px monospace';
  joyCtx.textAlign = 'center';
  joyCtx.fillText('▲', 60, 22);  // up arrow
  joyCtx.fillText('▼', 60, 104); // down
  joyCtx.fillText('◀', 18, 64);  // left
  joyCtx.fillText('▶', 102, 64); // right
  // Thumb
  const tx = 60 + joyDX * 35, ty = 60 + joyDY * 35;
  joyCtx.beginPath();
  joyCtx.arc(tx, ty, 18, 0, Math.PI * 2);
  joyCtx.fillStyle = 'rgba(255,255,255,0.45)';
  joyCtx.fill();
}
drawJoy();

const joyEl = document.getElementById('joystick');
joyEl.addEventListener('touchstart', e => { e.preventDefault(); joyActive = true; updateJoyTouch(e); });
joyEl.addEventListener('touchmove', e => { e.preventDefault(); updateJoyTouch(e); });
joyEl.addEventListener('touchend', () => { joyActive = false; joyDX = 0; joyDY = 0; drawJoy(); });
joyEl.addEventListener('touchcancel', () => { joyActive = false; joyDX = 0; joyDY = 0; drawJoy(); });

function updateJoyTouch(e) {
  const r = joyEl.getBoundingClientRect();
  const t = e.touches[0];
  let dx = (t.clientX - r.left - 60) / 50;
  let dy = (t.clientY - r.top - 60) / 50;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > 1) { dx /= d; dy /= d; }
  joyDX = dx; joyDY = dy;
  drawJoy();
}

brakeEl.addEventListener('touchend', () => { braking = false; });
brakeEl.addEventListener('touchcancel', () => { braking = false; });

// === COLLISION (SAT) ===
function rotRect(cx, cy, w, h, a) {
  const cos = Math.cos(a), sin = Math.sin(a);
  const hw = w / 2, hh = h / 2;
  return [[-hw, -hh], [hw, -hh], [hw, hh], [-hw, hh]].map(([px, py]) => ({
    x: cx + px * cos - py * sin,
    y: cy + px * sin + py * cos
  }));
}

function project(verts, ax) {
  let mn = Infinity, mx = -Infinity;
  for (const v of verts) {
    const d = v.x * ax.x + v.y * ax.y;
    if (d < mn) mn = d;
    if (d > mx) mx = d;
  }
  return { min: mn, max: mx };
}

function getAxes(verts) {
  const a = [];
  for (let i = 0; i < verts.length; i++) {
    const j = (i + 1) % verts.length;
    const dx = verts[j].x - verts[i].x, dy = verts[j].y - verts[i].y;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    a.push({ x: -dy / len, y: dx / len });
  }
  return a;
}

function satOverlap(v1, v2) {
  const allAxes = [...getAxes(v1), ...getAxes(v2)];
  for (const a of allAxes) {
    const p1 = project(v1, a), p2 = project(v2, a);
    if (p1.max < p2.min || p2.max < p1.min) return false;
  }
  return true;
}

function carVerts() { return rotRect(car.x, car.y, CW, CH, car.a); }
function wallVerts(w) {
  return [
    { x: w.x, y: w.y }, { x: w.x + w.w, y: w.y },
    { x: w.x + w.w, y: w.y + w.h }, { x: w.x, y: w.y + w.h }
  ];
}
function objVerts(o) { return rotRect(o.x, o.y, o.w, o.h, o.a || 0); }

function checkCollisions(lv) {
  if (hitCooldown > 0) return false;
  const cv = carVerts();
  for (const w of lv.walls) { if (satOverlap(cv, wallVerts(w))) return true; }
  for (const o of lv.cars) { if (satOverlap(cv, objVerts(o))) return true; }
  return false;
}

function checkParked(lv) {
  const s = lv.spot;
  // Angle check: allow 0 or 180 degrees match
  const da = Math.abs(((car.a - (s.a || 0)) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
  const angleOk = da < 0.35 || Math.abs(da - Math.PI) < 0.35;
  // Position check
  const dx = car.x - s.x, dy = car.y - s.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  // Must be slow and centered
  return dist < 14 && angleOk && Math.abs(car.speed) < 0.5;
}

// === UI HELPERS ===
function showMsg(t, dur = 2000) {
  msgEl.textContent = t;
  msgEl.classList.add('show');
  setTimeout(() => msgEl.classList.remove('show'), dur);
}

// Random joke scheduling
let lastRandomJoke = 0;
function maybeRandomJoke() {
  if (Date.now() - lastSpeech < SPEECH_GAP) return;
  if (Date.now() - lastRandomJoke < 15000) return;
  if (Math.random() > 0.25) return;
  speak(joke('random'));
  lastRandomJoke = Date.now();
}

// === START / LEVEL MANAGEMENT ===
document.getElementById('startBtn').onclick = () => {
  initAudio(); startEngine();
  document.getElementById('startScreen').style.display = 'none';
  startLevel(0);
};

function startLevel(n) {
  curLevel = n;
  const lv = levels[n];
  // Deep-clone spot for moving levels
  if (lv.moving) { lv.spot = { ...levels[n].spot }; }
  resetCar(lv);
  state = 'play';
  showMsg('Level ' + (n + 1) + ': ' + lv.name + '\n' + lv.desc, 3000);
  hudEls.level.textContent = 'Level ' + (n + 1);
  setTimeout(() => speak(joke('start')), 800);
}

function levelFail(reason) {
  state = 'fail';
  showMsg(reason, 2500);
  setTimeout(() => startLevel(curLevel), 3200);
}

function levelWin() {
  state = 'win';
  completedLevels = Math.max(completedLevels, curLevel + 1);
  playChime();
  if (curLevel < 9) {
    showMsg('Parked! Level ' + (curLevel + 2) + ' next...', 2800);
  } else {
    showMsg('YOU WIN!\nPerfect parking. All 10 levels complete!', 4000);
  }
  speak(joke('success'));
  setTimeout(() => {
    if (curLevel < 9) {
      startLevel(curLevel + 1);
    } else {
      state = 'menu';
      document.getElementById('startScreen').style.display = 'flex';
      document.getElementById('levelInfo').textContent = 'All 10 levels completed!';
    }
  }, 3500);
}

// === MAIN LOOP ===
let lastTime = 0;

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (state === 'play') update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// === UPDATE ===
function update(dt) {
  const lv = levels[curLevel];
  levelT += dt;

  // Timer
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    levelFail("Time's up! Try again.");
    return;
  }
  // Timer warning ticks
  if (timeLeft < 5 && timeLeft > 0) {
    const tick = Math.floor(timeLeft);
    if (tick !== tickPlayed) { playTick(); tickPlayed = tick; }
    hudEls.timer.innerHTML = '<span class="warn">Time: ' + Math.ceil(timeLeft) + 's</span>';
  } else {
    hudEls.timer.textContent = 'Time: ' + Math.ceil(timeLeft) + 's';
  }
  hudEls.damage.textContent = 'Hits: ' + hits + '/3';

  // === Input ===
  let gas = 0, turn = 0, brake = keys[' '] || braking;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) gas = 1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) gas = -1;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) turn = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) turn = 1;

  // Joystick input
  if (joyActive) {
    if (joyDY < -0.2) gas = 1;
    if (joyDY > 0.2) gas = -1;
    turn = Math.abs(joyDX) > 0.15 ? joyDX : turn;
  }

  // === Car physics ===
  if (brake) {
    car.speed *= 0.88;
    if (Math.abs(car.speed) < 0.5) car.speed = 0;
  } else if (gas !== 0) {
    car.speed += gas * 85 * dt;
  } else {
    car.speed *= 0.96; // friction
    if (Math.abs(car.speed) < 0.3) car.speed = 0;
  }
  car.speed = Math.max(-55, Math.min(110, car.speed));

  // Steering: only works when moving, scales with speed
  if (Math.abs(car.speed) > 0.5) {
    const dir = car.speed > 0 ? 1 : -1;
    const steerFactor = Math.min(Math.abs(car.speed) / 35, 1);
    car.a += turn * 2.8 * dt * dir * steerFactor;
  }

  // Hill slide effect
  if (lv.slide) {
    car.speed += lv.slide.x * 22 * dt;
  }

  // Moving spot
  if (lv.moving) {
    spotPhase += dt;
    lv.spot.x = 400 + Math.sin(spotPhase * 0.7) * 160;
    lv.spot.y = 300 + Math.cos(spotPhase * 0.5) * 120;
  }

  // Apply movement
  car.x += Math.sin(car.a) * car.speed * dt;
  car.y -= Math.cos(car.a) * car.speed * dt;

  updateEngine(car.speed, turn !== 0);

  // === Collisions ===
  if (hitCooldown > 0) hitCooldown -= dt;
  if (checkCollisions(lv)) {
    hits++;
    hitCooldown = 0.6;
    // Bounce back
    car.speed *= -0.25;
    car.x -= Math.sin(car.a) * 3;
    car.y += Math.cos(car.a) * 3;
    // Add scratch mark
    car.scratches.push({
      x: (Math.random() - 0.5) * CW * 0.7,
      y: (Math.random() - 0.5) * CH * 0.7,
      len: 3 + Math.random() * 5
    });
    playCrash();
    speak(joke('crash'));
    if (hits >= 3) {
      levelFail('Too much damage! Bring it in for repairs.');
      return;
    }
  }

  // === Check if parked ===
  if (checkParked(lv)) {
    levelWin();
    return;
  }

  // Random commentary
  maybeRandomJoke();

  // Camera follows car smoothly
  const targetCX = car.x - W / 2;
  const targetCY = car.y - H / 2;
  camX += (targetCX - camX) * 0.08;
  camY += (targetCY - camY) * 0.08;
}

// === DRAWING ===
function draw() {
  X.fillStyle = '#222';
  X.fillRect(0, 0, W, H);

  if (state === 'play' || state === 'win' || state === 'fail') {
    X.save();
    X.translate(-camX, -camY);

    const lv = levels[curLevel];

    drawAsphalt(lv);
    drawParkingLines(lv);
    drawWalls(lv);
    drawSpot(lv);
    drawObstacleCars(lv);
    drawPlayerCar();
    drawDirectionArrow(lv);

    X.restore();

    // Draw minimap for non-touch (touch has joystick in that corner)
    if (!isTouch) drawMinimap(lv);
  }
}

function drawAsphalt(lv) {
  // Background asphalt
  X.fillStyle = '#3a3a3a';
  X.fillRect(-100, -100, LW + 200, LH + 200);

  // Subtle texture lines
  X.strokeStyle = '#404040';
  X.lineWidth = 0.5;
  for (let i = -2; i < 22; i++) {
    X.beginPath();
    X.moveTo(i * 50 - 100, -100);
    X.lineTo(i * 50 - 100, LH + 100);
    X.stroke();
  }
}

function drawParkingLines(lv) {
  // Yellow parking lot lines
  X.strokeStyle = '#666';
  X.lineWidth = 1.5;
  // Draw rows of lines for parking spots
  for (let row = 0; row < 2; row++) {
    const y = 60 + row * 200;
    for (let i = 0; i < 11; i++) {
      const x = 60 + i * 70;
      X.strokeRect(x, y, 60, 8);
    }
  }
  // Lane markings (dashed center line)
  X.strokeStyle = '#555';
  X.lineWidth = 2;
  X.setLineDash([20, 15]);
  X.beginPath();
  X.moveTo(0, LH / 2);
  X.lineTo(LW, LH / 2);
  X.stroke();
  X.setLineDash([]);
}

function drawWalls(lv) {
  for (const w of lv.walls) {
    // Wall shadow
    X.fillStyle = '#111';
    X.fillRect(w.x + 2, w.y + 2, w.w, w.h);
    // Wall body
    X.fillStyle = '#2a2a2a';
    X.fillRect(w.x, w.y, w.w, w.h);
    // Highlight edge
    X.fillStyle = '#444';
    if (w.w > w.h) {
      X.fillRect(w.x, w.y, w.w, 2);
    } else {
      X.fillRect(w.x, w.y, 2, w.h);
    }
  }
}

function drawSpot(lv) {
  const sp = lv.spot;
  X.save();
  X.translate(sp.x, sp.y);
  X.rotate(sp.a || 0);

  const pulse = 0.5 + 0.5 * Math.sin(levelT * 4);
  // Glow
  X.shadowColor = 'rgba(80,220,80,0.4)';
  X.shadowBlur = 10 + pulse * 8;
  // Fill
  X.fillStyle = `rgba(80,220,80,${0.06 + pulse * 0.06})`;
  X.fillRect(-sp.w / 2, -sp.h / 2, sp.w, sp.h);
  // Dashed border
  X.shadowBlur = 0;
  X.strokeStyle = `rgba(80,220,80,${0.5 + pulse * 0.5})`;
  X.lineWidth = 3;
  X.setLineDash([8, 6]);
  X.strokeRect(-sp.w / 2, -sp.h / 2, sp.w, sp.h);
  X.setLineDash([]);
  // "P" label
  X.fillStyle = `rgba(80,220,80,${0.3 + pulse * 0.3})`;
  X.font = 'bold 16px monospace';
  X.textAlign = 'center';
  X.textBaseline = 'middle';
  X.fillText('P', 0, 0);

  X.restore();
}

function drawObstacleCars(lv) {
  for (const o of lv.cars) {
    X.save();
    X.translate(o.x, o.y);
    X.rotate(o.a || 0);

    const w = o.w, h = o.h;
    // Shadow
    X.fillStyle = 'rgba(0,0,0,0.3)';
    X.fillRect(-w / 2 + 3, -h / 2 + 3, w, h);
    // Body
    X.fillStyle = o.c;
    X.fillRect(-w / 2, -h / 2, w, h);
    // Roof (slightly darker)
    X.fillStyle = 'rgba(0,0,0,0.15)';
    X.fillRect(-w / 2 + 3, -h / 2 + h * 0.25, w - 6, h * 0.45);
    // Windshield (front = top)
    X.fillStyle = 'rgba(120,180,220,0.5)';
    X.fillRect(-w / 2 + 4, -h / 2 + 5, w - 8, h * 0.18);
    // Rear window
    X.fillStyle = 'rgba(120,180,220,0.35)';
    X.fillRect(-w / 2 + 5, h / 2 - h * 0.22, w - 10, h * 0.15);
    // Headlights (front)
    X.fillStyle = 'rgba(255,255,200,0.6)';
    X.fillRect(-w / 2 + 2, -h / 2 + 1, 5, 3);
    X.fillRect(w / 2 - 7, -h / 2 + 1, 5, 3);
    // Taillights (rear)
    X.fillStyle = 'rgba(255,50,50,0.6)';
    X.fillRect(-w / 2 + 2, h / 2 - 4, 5, 3);
    X.fillRect(w / 2 - 7, h / 2 - 4, 5, 3);
    // Label (e.g., "F" for Ferrari)
    if (o.label) {
      X.fillStyle = '#fff';
      X.font = 'bold 11px monospace';
      X.textAlign = 'center';
      X.textBaseline = 'middle';
      X.fillText(o.label, 0, 2);
    }
    X.restore();
  }
}

function drawPlayerCar() {
  X.save();
  X.translate(car.x, car.y);
  X.rotate(car.a);

  // Shadow
  X.fillStyle = 'rgba(0,0,0,0.35)';
  X.fillRect(-CW / 2 + 3, -CH / 2 + 3, CW, CH);

  // Body — player selected color
  var cc = CAR_COLORS[selectedColor];
  X.fillStyle = cc.body;
  X.fillRect(-CW / 2, -CH / 2, CW, CH);

  // Outline
  X.strokeStyle = cc.outline;
  X.lineWidth = 1.5;
  X.strokeRect(-CW / 2, -CH / 2, CW, CH);

  // Roof (slightly different shade)
  X.fillStyle = 'rgba(0,0,0,0.06)';
  X.fillRect(-CW / 2 + 3, -CH / 2 + CH * 0.25, CW - 6, CH * 0.42);

  // Windshield (front)
  X.fillStyle = 'rgba(150,200,220,0.55)';
  X.fillRect(-CW / 2 + 4, -CH / 2 + 6, CW - 8, 12);

  // Rear window
  X.fillStyle = 'rgba(150,200,220,0.4)';
  X.fillRect(-CW / 2 + 5, CH / 2 - 15, CW - 10, 10);

  // Headlights
  X.fillStyle = 'rgba(255,255,200,0.7)';
  X.fillRect(-CW / 2 + 2, -CH / 2 + 1, 5, 3);
  X.fillRect(CW / 2 - 7, -CH / 2 + 1, 5, 3);

  // Taillights
  X.fillStyle = 'rgba(255,50,50,0.5)';
  X.fillRect(-CW / 2 + 2, CH / 2 - 4, 5, 3);
  X.fillRect(CW / 2 - 7, CH / 2 - 4, 5, 3);

  // Car label text
  X.fillStyle = selectedColor === 'black' ? '#888' : 'rgba(255,255,255,0.6)';
  X.font = 'bold 7px monospace';
  X.textAlign = 'center';
  X.textBaseline = 'middle';
  X.fillText(cc.label, 0, 3);

  // Scratches (damage marks)
  if (car.scratches.length > 0) {
    X.strokeStyle = '#c33';
    X.lineWidth = 2;
    for (const s of car.scratches) {
      X.beginPath();
      X.moveTo(s.x - s.len, s.y - s.len);
      X.lineTo(s.x + s.len, s.y + s.len);
      X.stroke();
      X.beginPath();
      X.moveTo(s.x + s.len, s.y - s.len);
      X.lineTo(s.x - s.len, s.y + s.len);
      X.stroke();
    }
  }

  // Brake lights glow when braking
  if (keys[' '] || braking) {
    X.fillStyle = 'rgba(255,30,30,0.8)';
    X.fillRect(-CW / 2 + 1, CH / 2 - 5, 6, 4);
    X.fillRect(CW / 2 - 7, CH / 2 - 5, 6, 4);
  }

  X.restore();
}

function drawDirectionArrow(lv) {
  if (state !== 'play') return;
  const sp = lv.spot;
  const dx = sp.x - car.x, dy = sp.y - car.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 80) {
    const aa = Math.atan2(dx, -dy);
    const ax = car.x + Math.sin(aa) * 55;
    const ay = car.y - Math.cos(aa) * 55;
    X.save();
    X.translate(ax, ay);
    X.rotate(aa);
    X.globalAlpha = 0.5 + 0.2 * Math.sin(levelT * 3);
    X.fillStyle = '#4d4';
    X.beginPath();
    X.moveTo(0, -12);
    X.lineTo(8, 5);
    X.lineTo(-8, 5);
    X.closePath();
    X.fill();
    X.globalAlpha = 1;
    X.restore();
  }
}

function drawMinimap(lv) {
  const scale = 0.14;
  const mw = LW * scale, mh = LH * scale;
  MC.width = mw; MC.height = mh;
  MC.style.width = mw + 'px';
  MC.style.height = mh + 'px';

  // Background
  MX.fillStyle = 'rgba(30,30,30,0.85)';
  MX.fillRect(0, 0, mw, mh);

  // Walls
  MX.fillStyle = '#555';
  for (const w of lv.walls) {
    MX.fillRect(w.x * scale, w.y * scale, Math.max(w.w * scale, 1), Math.max(w.h * scale, 1));
  }

  // Other cars
  MX.fillStyle = '#888';
  for (const o of lv.cars) {
    MX.fillRect((o.x - o.w / 2) * scale, (o.y - o.h / 2) * scale, o.w * scale, o.h * scale);
  }

  // Spot
  MX.fillStyle = '#4d4';
  const sp = lv.spot;
  MX.fillRect((sp.x - sp.w / 2) * scale, (sp.y - sp.h / 2) * scale, sp.w * scale, sp.h * scale);

  // Player
  MX.fillStyle = CAR_COLORS[selectedColor].body;
  MX.fillRect((car.x - CW / 2) * scale, (car.y - CH / 2) * scale, CW * scale, CH * scale);

  // Border
  MX.strokeStyle = 'rgba(255,255,255,0.2)';
  MX.strokeRect(0, 0, mw, mh);
}
