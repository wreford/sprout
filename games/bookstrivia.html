<body>
<div class="container">
<a href="../" class="home-link">&larr; Home</a>
<header>
<h1>\u{1F4DA} BOOKS TRIVIA &mdash; THE GIVER vs THE MAZE RUNNER</h1>
<div class="subtitle">Which dystopia do YOU know better?</div>
</header>
<div id="app"></div>
</div>

<script>
const Q=[
// ===== "WHICH BOOK?" QUESTIONS (20) =====
// d:1 - Easy Which Book
{q:"Which book includes the concept of 'Release' — a word that hides a horrifying secret?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Release sounds peaceful, but it's actually lethal injection. Jonas's own father kills babies as part of his job and genuinely doesn't understand it's wrong. The banality of evil in a children's book."},
{q:"Which book has creatures called Grievers that patrol at night?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"Grievers are bio-mechanical nightmares — part slug, part machine, covered in spikes and mechanical arms. They're essentially living weapons designed to terrorize teenagers. WICKED really committed to the horror aesthetic."},
{q:"Which book ends with the main character escaping their controlled world?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:1,cat:"which book",book:"both",fact:"Jonas bikes into a frozen wilderness with a baby, while Thomas fights through Grievers to escape the Maze. Both escapes are acts of desperation, not triumph — and both leave you unsure if they actually made things better."},
{q:"Which book features a character who begins seeing the color RED for the first time?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Jonas first sees red in an apple during catch. The disturbing part? The entire Community has been genetically engineered to be colorblind. They eliminated color to prevent people from making choices based on appearance."},
{q:"Which book has a Box that delivers a new kid with erased memories once a month?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"Imagine waking up in a metal elevator with zero memories, rising into a field surrounded by massive walls. That's every Glader's first day. WICKED wipes their memories but leaves them their name — which isn't even their real name."},
{q:"Which book uses daily pills to chemically suppress all romantic and strong feelings?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:2,cat:"which book",book:"tg",fact:"The pills suppress 'Stirrings' — basically any strong emotion, especially attraction. The entire Community is chemically numbed. When Jonas stops taking them, he's the only person in the entire society who can actually FEEL things."},
{q:"Which book features telepathic communication between two characters?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:2,cat:"which book",book:"both",fact:"The Giver transfers memories mind-to-mind through touch, while Thomas and Teresa can literally hear each other's thoughts across distances. Both books treat telepathy not as a superpower but as something engineered and slightly unsettling."},
{q:"Which book has the main character's memories completely erased before the story begins?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Thomas wakes up remembering nothing except his first name — which isn't even his real name. WICKED wiped the Gladers' memories to create a 'clean variable' for their experiment. The cruelest part? Thomas himself helped DESIGN the Maze before his memory was erased."},
{q:"Which book features a character whose name is secretly a reference to a famous scientist?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"WICKED renamed every Glader after famous thinkers: Thomas (Edison), Alby (Einstein), Newt (Isaac Newton), Teresa (Mother Teresa), Gally (Galileo). They turned brilliant historical figures into lab rat names. Dark humor from a dark organization."},
{q:"Which book's society uses 'precision of language' as a strict rule to control thought?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:2,cat:"which book",book:"tg",fact:"Say 'I'm starving' in the Community and you'll be corrected — you're 'hungry,' not starving. It sounds like a grammar lesson, but it's actually thought control. If you can't exaggerate, you can't express strong emotion. If you can't express it, eventually you can't feel it."},
{q:"Which book has a main character who was specifically chosen by the controlling organization?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:2,cat:"which book",book:"both",fact:"Jonas was hand-picked by the Elders to be Receiver, and Thomas was specifically engineered by WICKED as a key variable in the Maze. Both boys were chosen before birth. Neither had a say. That's the real dystopia."},
{q:"In which book does the protagonist discover their society murders people while calling it something else?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:2,cat:"which book",book:"both",fact:"Jonas watches his father lethally inject a baby and call it 'Release.' Thomas discovers WICKED sacrificed hundreds of children and called it 'research.' Both societies sanitize killing with bureaucratic language — which is exactly how real atrocities get normalized."},
{q:"Which book has a sequel called 'Gathering Blue'?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"Gathering Blue follows a different character (Kira) in a completely different, more primitive community. Lowry doesn't reveal the connection to The Giver until the third book, Messenger, when the worlds collide. The quartet took her 19 years to complete."},
{q:"In which book does the protagonist have unusual pale eyes that mark them as different?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"In a Community of dark-eyed, identical-looking people, Jonas's pale eyes are almost unheard of. Only he, the Giver, and baby Gabriel share them — it's the genetic marker for the ability to receive memories. The Community nearly bred it out of existence."},
{q:"Which book has characters who invented fake swear words that sound suspiciously like real ones?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"The Gladers say 'shuck' (sounds like...), 'klunk' (that too), 'shank,' and 'slim it.' James Dashner essentially created a PG-rated profanity system. Readers figured out the real-world equivalents immediately, which is probably the point."},
{q:"Which book won the Newbery Medal, America's highest honor for children's literature?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"The Giver won the 1994 Newbery Medal — then immediately became one of the most banned books in America. Parents were horrified by infanticide and euthanasia in a 'children's book.' Lowry's response: children can handle truth. The banning proved her point about controlled societies."},
{q:"Which book is set in an ambiguous future where the exact year is never revealed?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:3,cat:"which book",book:"both",fact:"Neither author tells you when the story takes place. This is intentional — it makes you wonder if these futures are 50 years away or 500. Lowry's Community evolved from climate catastrophe and war. Dashner's world collapsed after sun flares. Both feel uncomfortably plausible."},
{q:"Which book features a character who attempted suicide by jumping off a wall but survived with a limp?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:3,cat:"which book",book:"mr",fact:"Newt tried to kill himself by jumping from the Maze wall after months of hopelessness. He survived but walked with a permanent limp. This isn't revealed until later books, reframing every scene where he limps from 'he got injured' to something much darker."},
{q:"Which book has been more frequently banned or challenged in American schools?",o:["The Giver","The Maze Runner","Both equally","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"The Giver consistently ranks among America's top 10 most banned books. The irony is staggering — a book about a society that suppresses uncomfortable knowledge keeps getting suppressed by people who find its knowledge uncomfortable. Lowry once said the banners proved her thesis."},
{q:"Which protagonist is significantly younger when their story begins?",o:["Jonas (11-12)","Thomas (16)","They're the same age","Neither's age is mentioned"],a:0,d:1,cat:"which book",book:"both",fact:"Jonas is just eleven turning twelve — barely out of elementary school when he learns his father murders babies. Thomas is sixteen, old enough for the physical survival horror of the Maze. Lowry chose a younger protagonist deliberately: she wanted readers to lose their innocence alongside Jonas."},

// ===== THE GIVER (15) =====
{q:"What is 'Release' actually revealed to be in The Giver?",o:["Exile to another community","Death by lethal injection","A peaceful retirement ceremony","Transfer to Elsewhere"],a:1,d:1,cat:"the giver",book:"tg",fact:"The most disturbing scene in the book: Jonas watches his cheerful, loving father weigh two identical twins, then casually inject the smaller one with a lethal needle, place the body in a box, and send it down a trash chute. His father hums while doing it. He has no idea he's killing anyone."},
{q:"What does Jonas's family do every single evening without exception?",o:["Watch the news","Share their feelings","Pray together","Study regulations"],a:1,d:1,cat:"the giver",book:"tg",fact:"Every family must share feelings each night. It sounds wholesome until you realize it's mandatory emotional surveillance — the parents are trained to identify and neutralize any 'dangerous' emotions. If a kid says they feel angry, the parents don't comfort them; they report it."},
{q:"What happened to the Giver's daughter, the previous Receiver-in-training?",o:["She escaped to Elsewhere","She was Released at her own request","She became Chief Elder","She went insane"],a:1,d:2,cat:"the giver",book:"tg",fact:"Rosemary was the Giver's own daughter. After receiving the memory of loneliness, she walked into the Release room and asked to be killed. The Giver had to watch his child choose death over carrying the weight of human suffering. He never recovered. He also couldn't stop her — the rules required it."},
{q:"When Jonas asks his parents 'Do you love me?', how do they respond?",o:["They say yes warmly","They scold him for 'imprecise language'","They say they don't understand the question","They report him to the Elders"],a:1,d:2,cat:"the giver",book:"tg",fact:"His parents tell him 'love' is a meaningless, generalized word. They 'enjoy' him. They're 'proud' of him. But love? That word has no precision. Jonas realizes he's the only person in his entire civilization who understands what love actually means — and he can never explain it to anyone."},
{q:"What is the first PAINFUL memory the Giver transmits to Jonas?",o:["A battlefield death","Sunburn","A broken bone","Starvation"],a:1,d:2,cat:"the giver",book:"tg",fact:"Jonas's first pain is a sunburn from lying on a beach. It seems mild, but it's revolutionary — he's the first person in generations to feel ANY physical pain beyond a scraped knee. The Community eliminated pain so thoroughly that a sunburn is a radical, dangerous experience."},
{q:"How does Jonas escape the Community at the end?",o:["By helicopter","Through an underground tunnel","By bicycle with baby Gabriel","By boat down a river"],a:2,d:1,cat:"the giver",book:"tg",fact:"Jonas steals his father's bicycle and flees into the unknown with baby Gabriel strapped to the seat. They nearly freeze to death. The ending is deliberately ambiguous — Lowry has confirmed she wanted readers to decide whether the music Jonas hears is real or a hallucination as he dies."},
{q:"What comfort object does Jonas's sister Lily carry — despite no one knowing what the animal actually IS?",o:["A stuffed bear","A stuffed dog","A stuffed elephant","A stuffed cat"],a:2,d:3,cat:"the giver",book:"tg",fact:"Lily has a stuffed elephant, but nobody in the Community knows what an elephant is. They've never seen one. The animals were eliminated along with everything else that might cause inconvenience. Children cuddle toys of creatures that their society effectively drove to extinction."},
{q:"What does the Community do when identical twins are born?",o:["Celebrates them as special","Releases (kills) the smaller one","Sends one to a different community","Raises them in separate family units"],a:1,d:2,cat:"the giver",book:"tg",fact:"The smaller twin is lethally injected and disposed of. The reasoning? Having two identical people would be 'confusing.' Jonas's father performs this procedure routinely, cheerfully, with zero moral awareness. Lowry wrote this scene specifically to show how normal people commit atrocities when their society tells them it's fine."},
{q:"What shocking rule does Jonas discover applies ONLY to the Receiver of Memory?",o:["They can skip school","They can lie","They can leave the Community","They can choose their own spouse"],a:1,d:2,cat:"the giver",book:"tg",fact:"Jonas discovers he's permitted to lie. This shatters his worldview — if HE can lie, how many other people have been given the same permission? His entire society might be built on lies, and he'd never know. It's the first crack in his faith in the Community, and it's devastating."},
{q:"What quality does the Chief Elder say Jonas possesses that qualifies him as Receiver?",o:["Superior intelligence","The Capacity to See Beyond","Exceptional bravery","Perfect obedience"],a:1,d:3,cat:"the giver",book:"tg",fact:"The Capacity to See Beyond manifests as seeing color — but it implies something deeper. Jonas can perceive things that don't fit neatly into Sameness. In a world engineered to eliminate differences, Jonas is genetically incapable of NOT seeing them. He was born to be a rebel in a world that doesn't allow rebellion."},
{q:"What war memory does the Giver transmit that traumatizes Jonas most deeply?",o:["A nuclear explosion","A Civil War cavalry charge","A boy soldier dying alone on a battlefield","World War II concentration camps"],a:2,d:3,cat:"the giver",book:"tg",fact:"Jonas experiences being a teenage soldier dying in agony, calling for water, surrounded by corpses. The Giver carries hundreds of these memories alone — war, famine, genocide — so the Community doesn't have to. He's essentially a human hard drive for all of humanity's worst moments."},
{q:"What does the word 'Elsewhere' actually mean in the Community?",o:["A neighboring community","Death","A mythical paradise","The world before Sameness"],a:1,d:3,cat:"the giver",book:"tg",fact:"Citizens genuinely believe Released people go to a lovely place called Elsewhere. Children wave goodbye at Release ceremonies. The elderly are celebrated before being killed. Nobody mourns because nobody knows. The genius of the Community's control isn't violence — it's making sure no one even recognizes the violence is happening."},
{q:"How are married couples matched in Jonas's Community?",o:["They choose each other","Random lottery","The Committee of Elders matches them","By genetic compatibility scores"],a:2,d:3,cat:"the giver",book:"tg",fact:"The Committee of Elders matches spouses based on complementary personalities — never love, never attraction, never choice. Couples don't even raise their own biological children; babies are produced by designated Birthmothers and assigned to approved family units. Romance is treated as a disease to be medicated away."},
{q:"What inspired Lois Lowry to write a book about a society without memories?",o:["A dream she had","Visiting her father who had lost his memory","A news article about cults","A childhood in a commune"],a:1,d:4,cat:"the giver",book:"tg",fact:"Lowry's father had lost all his long-term memories to old age. She noticed he was genuinely content — but only because he'd also lost every painful memory. She wondered: is a painless life without memories actually a good life? The Giver is her answer, and it's a resounding, horrifying 'no.'"},
{q:"Rosemary, the failed Receiver, was secretly the Giver's what?",o:["Former student","Wife","Daughter","Sister"],a:2,d:4,cat:"the giver",book:"tg",fact:"The Giver selected his own daughter to be trained as the next Receiver. When the painful memories broke her and she chose Release, he had to live with the knowledge that his job killed his child. He then had to train Jonas, knowing the same thing could happen again. He does it anyway because the alternative — no one carrying the memories — is worse."},

// ===== THE MAZE RUNNER (15) =====
{q:"What important rule does Thomas break on his SECOND DAY in the Glade?",o:["He steals food from the kitchen","He runs into the Maze after the doors close","He attacks Gally","He opens the Box"],a:1,d:1,cat:"maze runner",book:"mr",fact:"The ONE rule everyone screams at Greenies: NEVER go into the Maze after dark. Thomas does it on day two to save Alby and Minho. He survives a night with Grievers by tying Alby to the wall with vines and running until dawn. It's insane, reckless, and exactly what WICKED wanted him to do."},
{q:"How does Chuck, Thomas's best friend in the Glade, die?",o:["A Griever drags him away","He jumps in front of a knife meant for Thomas","He falls off the Cliff","He's left behind when the doors close"],a:1,d:2,cat:"maze runner",book:"mr",fact:"After surviving the entire Maze, Chuck dies in the final minutes — Gally throws a knife at Thomas, and Chuck jumps in front of it. Thomas holds him as he dies. Chuck had just asked Thomas to find his parents for him. Thomas never gets the chance. Dashner said he cried writing this scene."},
{q:"What is Thomas's role in the Glade after he proves himself?",o:["Builder","Keeper of the Runners","Runner","Slicer"],a:2,d:1,cat:"maze runner",book:"mr",fact:"Thomas becomes a Runner — the most dangerous job in the Glade. Runners sprint through the ever-changing Maze all day memorizing routes, then return before the walls close at dusk. If you're one second late, you're locked out with the Grievers. No one has ever survived a night. Until Thomas."},
{q:"What does Thomas deliberately do to himself to recover his memories?",o:["Hits his head against the Maze wall","Gets stung by a Griever on purpose","Drinks the Grief Serum","Jumps off the Cliff"],a:1,d:3,cat:"maze runner",book:"mr",fact:"Thomas intentionally lets a Griever sting him because the Changing — the agonizing process that follows — restores fragments of erased memories. He's so desperate for answers that he voluntarily subjects himself to what everyone else considers a death sentence. He discovers something worse: he helped BUILD the Maze."},
{q:"What terrifying discovery do the Gladers make near the end of the book about the Maze doors?",o:["The doors are fake","The doors stop closing at night","The doors were never locked","There are no doors — it was an illusion"],a:1,d:2,cat:"maze runner",book:"mr",fact:"The doors that have protected the Gladers every night suddenly stop closing. Grievers pour into the Glade for the first time. It's WICKED's way of forcing the endgame — survive the final test or die. Half the Gladers are killed in one night. The safety they'd relied on for years was just WICKED being patient."},
{q:"What are the six code words hidden in the Maze's movement patterns?",o:["FLOAT, CATCH, BLEED, DEATH, STIFF, PUSH","RUN, HIDE, FIGHT, KILL, LIVE, ESCAPE","WICKED, GOOD, MAZE, TRIAL, CURE, END","NORTH, SOUTH, EAST, WEST, UP, DOWN"],a:0,d:4,cat:"maze runner",book:"mr",fact:"The Runners spent YEARS mapping the Maze without realizing the sections' open-and-close patterns spelled words: FLOAT, CATCH, BLEED, DEATH, STIFF, PUSH. These are the computer code to shut down the Maze. WICKED hid the exit in plain sight the entire time, but you'd only see it if you mapped every section over months."},
{q:"What is the Griever Hole?",o:["Where Grievers sleep during the day","A trap that kills instantly","An invisible portal at the Cliff's edge leading to WICKED's lab","A hole in the Maze floor"],a:2,d:2,cat:"maze runner",book:"mr",fact:"The Cliff appears to drop into infinite darkness — but hidden in the air is an invisible portal to WICKED's underground lab. It's the exit from the Maze. The Gladers had been staring at their escape for years and never knew it because it literally looks like a bottomless void. Jump into apparent death to find freedom."},
{q:"What does the note say that arrives with Teresa, the first and only girl sent to the Glade?",o:["WICKED is good","She's the last one. Ever.","Trust no one","Everything is about to change"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Teresa arrives in a coma clutching a note: 'She's the last one. Ever.' She's the trigger for the endgame. No more monthly arrivals, no more supplies. WICKED is done waiting. The Gladers have to solve the Maze or die. Her arrival is essentially a countdown timer made of a person."},
{q:"What are Beetle Blades?",o:["Weapons hidden in the Maze walls","Tiny robot spies with cameras used by WICKED","A type of plant that grows in the Glade","Griever eggs"],a:1,d:3,cat:"maze runner",book:"mr",fact:"Beetle Blades are small lizard-like robots that skitter through the Glade with 'WICKED' stamped on them. They've been watching everything from day one — every fight, every death, every breakdown. The Gladers knew they were being watched and couldn't do anything about it. It's a surveillance state the size of a field."},
{q:"What is Newt's real role and why does he limp?",o:["Lead Runner who got hurt by a Griever","Second-in-command who injured his leg falling","Second-in-command who deliberately jumped off the Maze wall","Cook who slipped in the kitchen"],a:2,d:3,cat:"maze runner",book:"mr",fact:"Newt was once a Runner, but the hopelessness of endless Maze-running broke him. He climbed to the top of the Maze wall and jumped, trying to end it. He survived with a permanent limp. This isn't revealed until later books, turning every moment he encourages Thomas into something heartbreaking — he's the voice of hope who once lost all of his own."},
{q:"How many of the original 50+ Gladers survive the final battle to escape the Maze?",o:["About 20","About 40","About 10","About 60"],a:0,d:3,cat:"maze runner",book:"mr",fact:"Only about 20 survive. They fight through a corridor full of Grievers, using crude weapons against bio-mechanical monsters, while others input the code. Multiple named characters die in seconds. WICKED considered this an acceptable casualty rate. The survivors are told it was 'Phase One' — meaning there's more horror coming."},
{q:"Who ACTUALLY kills Chuck at the very end?",o:["A Griever","Gally, who appears mind-controlled","Thomas in a rage","A WICKED soldier"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Gally appears seemingly from nowhere, looking glazed and not himself, and throws a knife at Thomas. Chuck jumps in front of it. The implication is that WICKED was controlling Gally — Chuck's death was engineered. Even the final 'escape' was part of the experiment. Nothing in the Maze was accidental, including the death of a child."},
{q:"What does WICKED stand for?",o:["World In Catastrophe: Killzone Experiment Department","Worldwide Institute for Cruel and Killing Dystopian Experiments","World Intelligence and Crisis Knowledge Division","We Intentionally Create Kids' Darkest Experiences"],a:0,d:1,cat:"maze runner",book:"mr",fact:"World In Catastrophe: Killzone Experiment Department. They named themselves WICKED and their motto is 'WICKED is good.' They're studying teenagers' brains under extreme stress to find a cure for the Flare virus. Their logic: killing some kids to save humanity. The books never fully answer whether they're right."},
{q:"How did Newt get his limp — what's the dark truth revealed in later books?",o:["Griever attack in the Maze","He fell while running a section","He deliberately jumped from the Maze wall in a suicide attempt","A building collapsed during an earthquake"],a:2,d:4,cat:"maze runner",book:"mr",fact:"Newt tried to kill himself by jumping from the top of the Maze wall. He survived but was left with a permanent limp and could never run again. He never talks about it in the first book. Every time he limps across a scene, it's a silent reminder that even the most beloved, optimistic character was once completely broken by WICKED's maze."},
{q:"What is the Bloodhouse and what happens there?",o:["Where the Changing takes place","Where animals are slaughtered for food by the Slicers","A punishment cell for rule-breakers","Where Grievers are studied"],a:1,d:3,cat:"maze runner",book:"mr",fact:"The Bloodhouse is the Glade's slaughterhouse where the Slicers butcher animals for food. It's one of the least popular jobs, and new Gladers who can't handle it get reassigned. It's a small but telling detail: even in a prison built by sadistic scientists, someone still has to do the dishes and kill the chickens. Survival is mundane work."}
];

var _ambientTimer=null;
function playAmbient(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopAmbient();
function loop(){
try{
var dur=3+Math.random()*2;
var bs=Math.floor(actx.sampleRate*dur);var buf=actx.createBuffer(1,bs,actx.sampleRate);
var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
var src=actx.createBufferSource();src.buffer=buf;
var bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=200+Math.random()*200;bp.Q.value=0.3;
var lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;
var g=actx.createGain();g.gain.setValueAtTime(0.004,actx.currentTime);
g.gain.linearRampToValueAtTime(0.007,actx.currentTime+dur*0.4);
g.gain.linearRampToValueAtTime(0.003,actx.currentTime+dur);
src.connect(bp);bp.connect(lp);lp.connect(g);g.connect(actx.destination);
src.start();src.stop(actx.currentTime+dur);
}catch(e){}
_ambientTimer=setTimeout(loop,dur*900);
}
_ambientTimer=setTimeout(loop,500);
}
function stopAmbient(){if(_ambientTimer){clearTimeout(_ambientTimer);_ambientTimer=null;}}

// TTS Voices
var announceOn=true;
function getVoices(){return speechSynthesis.getVoices();}
function findVoice(names){
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].lang.startsWith('en')&&voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];
  }
}
for(var vi2=0;vi2<voices.length;vi2++){
  if(voices[vi2].lang.startsWith('en')&&!voices[vi2].name.toLowerCase().match(/daniel|alex|aaron|fred|james|male/))return voices[vi2];
}
return null;
}

// Voice 1: The Librarian — calm question reader (female)
function readQuestion(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
try{speechSynthesis.cancel();setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);
u.rate=0.9;u.pitch=1.0;u.volume=0.7;
var v=findVoice(['samantha','victoria','karen','kate','zoe','tessa','fiona','moira','female','woman']);
if(v)u.voice=v;
speechSynthesis.speak(u);},80);}catch(e){}
}

// Voice 2: The Dystopian Narrator — dramatic commentator (male)
var _speaking=false;
function announce(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
_speaking=true;
try{setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);
u.rate=0.95;u.pitch=1.05;u.volume=0.8;
var v=findVoice(['daniel','alex','aaron','fred','james']);
if(v)u.voice=v;
u.onend=function(){_speaking=false;enableNextBtn();};
u.onerror=function(){_speaking=false;enableNextBtn();};
speechSynthesis.speak(u);
setTimeout(function(){_speaking=false;enableNextBtn();},6000);
},500);}catch(e){_speaking=false;enableNextBtn();}
}

      165,196,220,0,196,165,131,0,110,0,131,165,131,110,0,0],
   d:[.15,.1,.15,.1,.2,.3,.2,.1,.15,.1,.2,.3,.2,.1,.15,.1,
      .2,.2,.3,.1,.2,.2,.3,.2,.15,.1,.2,.2,.2,.3,.3,.5],
   w:'square',bpm:90,name:'Griever Chase'},
  // 4: Elsewhere — hopeful but uncertain
  {n:[262,294,330,349,392,440,392,349,330,294,262,294,330,349,392,440,
      494,523,494,440,392,349,330,294,262,220,196,220,262,294,262,220],
   d:[.4,.3,.3,.4,.4,.3,.5,.3,.3,.3,.4,.3,.3,.4,.4,.3,
      .3,.5,.3,.3,.3,.4,.3,.4,.4,.3,.4,.3,.3,.4,.4,.8],
   w:'triangle',bpm:60,name:'Elsewhere'}
];
function playMusic(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopMusic();
var s=SONGS[_currentSong%SONGS.length];
var beat=60/s.bpm;var idx=0;
function pn(){
if(idx>=s.n.length){idx=0;_currentSong++;s=SONGS[_currentSong%SONGS.length];beat=60/s.bpm;}
try{
if(s.n[idx]>0){
var o=actx.createOscillator(),g=actx.createGain();o.type=s.w;o.frequency.value=s.n[idx];
g.gain.setValueAtTime(0.012,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.85);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+s.d[idx]*beat*0.85);
// Sub-bass layer
var ob=actx.createOscillator(),gb=actx.createGain();ob.type='sine';ob.frequency.value=s.n[idx]*0.5;
gb.gain.setValueAtTime(0.014,actx.currentTime);gb.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.9);
ob.connect(gb);gb.connect(actx.destination);ob.start();ob.stop(actx.currentTime+s.d[idx]*beat*0.9);
}
}catch(e){}
_musicTimer=setTimeout(pn,s.d[idx]*beat*1000);idx++;}
_musicTimer=setTimeout(pn,300);
}
function stopMusic(){if(_musicTimer){clearTimeout(_musicTimer);_musicTimer=null;}}

function getBookTag(q){
if(q.cat==='which book')return '<span class="book-tag book-tag-which">\u{1F4D5} vs \u{1F4D8}</span>';
if(q.book==='tg')return '<span class="book-tag book-tag-giver">\u{1F4D5} The Giver</span>';
if(q.book==='mr')return '<span class="book-tag book-tag-maze">\u{1F4D8} Maze Runner</span>';
if(q.book==='both')return '<span class="book-tag book-tag-which">\u{1F4DA} Both</span>';
return '';
}

function showBanner(text,color,announcerText){
const b=document.createElement("div");
b.className="difficulty-banner";
b.style.background=color;
b.style.color="#fff";
b.style.animation="bannerSlide35 3.5s ease forwards";
b.textContent=text;
document.body.appendChild(b);
const flash=document.createElement("div");
flash.className="diff-flash";
flash.style.background=color;
document.body.appendChild(flash);
setTimeout(function(){flash.remove();},900);
setTimeout(function(){b.remove();},3600);
if(announcerText)announce(announcerText);
}

function renderStart(){
const saved=loadState();
let resumeHTML="";
if(saved&&saved.qi>0&&saved.qi<activeQ.length&&saved.started){
resumeHTML='<button class="start-btn resume-btn" id="resume-btn">Resume (Q'+(saved.qi+1)+'/'+activeQ.length+', Score: '+saved.score+')</button>';
}
const hs=saved&&saved.highScore?saved.highScore:0;
const lastScore=(saved&&saved.started&&saved.qi>0)?saved.score:null;
app.innerHTML=
'<div class="start-screen">'+
'<div class="start-hero">\u{1F4DA}</div>'+
(hs>0?'<div class="start-high-score">\u{1F3C6} High Score: '+hs+'</div>':'')+
(lastScore!==null?'<div class="start-last-score">Last game: '+lastScore+' pts (Q'+saved.qi+'/'+activeQ.length+')</div>':'')+
'<div class="start-badge-300">\u{1F4D6} '+TOTAL_Q+' Questions</div>'+
'<p>The Giver vs The Maze Runner &mdash; Which dystopia do YOU know better?</p>'+
'<div class="notice">Points scale with difficulty. Streak bonus after 3 in a row! Mix of "Which Book?" and deep trivia questions.</div>'+
'<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0">'+
'<span class="badge badge-1">Easy +10</span>'+
'<span class="badge badge-2">Medium +20</span>'+
'<span class="badge badge-3">Hard +30</span>'+
'<span class="badge badge-4">Expert +50</span>'+
'</div>'+
'<button class="start-btn" id="start-btn">Start New Game</button>'+
resumeHTML+
'<p style="margin-top:18px;font-size:14px;color:rgba(232,232,240,0.5)">Also try: <a href="hockey.html">Donny\'s Hockey Trivia</a></p>'+
'</div>';
document.getElementById("start-btn").onclick=function(){
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:saved?saved.highScore||0:0,byDiff:[0,0,0,0,0],started:true,giverCorrect:0,giverTotal:0,mazeCorrect:0,mazeTotal:0};
activeQ=Q.slice();for(var si=activeQ.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=activeQ[si];activeQ[si]=activeQ[sj];activeQ[sj]=st;}
_gameStartTime=Date.now();
saveState();playMusic();playAmbient();announce("Welcome to the dystopia! Let's see which world you know better!");renderQ();
};
var rb=document.getElementById("resume-btn");
if(rb){rb.onclick=function(){state=saved;state.answered=false;_gameStartTime=Date.now();playMusic();playAmbient();renderQ();};}
}

function renderQ(){
if(state.qi>=activeQ.length){renderEnd();return;}
var q25=Math.floor(activeQ.length*0.25);
var q50=Math.floor(activeQ.length*0.5);
var q75=Math.floor(activeQ.length*0.75);
if(state.qi===q25)showBanner("Difficulty Up: Medium!","#8b5cf6","Moving to Medium questions now! The memories are getting more complex!");
if(state.qi===q50)showBanner("Difficulty Up: Hard!","#f59e0b","Hard mode! Only true dystopian scholars survive this!");
if(state.qi===q75)showBanner("Difficulty Up: Expert!","#ef4444","Expert level! You'd better have gone through the Changing for this!");

var q=activeQ[state.qi];
var d=q.d;
readQuestion(q.q);
var progPct=Math.round((state.qi/activeQ.length)*100);
var progColors={1:'var(--green)',2:'#f7c948',3:'#f59e0b',4:'var(--red)'};
var progColor=progColors[d]||'var(--accent)';
var streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
document.body.classList.toggle('streak-pulse',state.streak>=5);
app.innerHTML=
'<div class="'+streakBarClass+'" style="position:relative">'+
'<span>Score: <strong>'+state.score+'</strong></span>'+
'<span class="streak-fire">'+(state.streak>=3?"\u{1F525} ":"")+'Streak: '+state.streak+'</span>'+
'<span>Q '+(state.qi+1)+'/'+activeQ.length+'</span>'+
'<button class="sound-toggle" id="sound-toggle" title="Toggle sound">'+(_soundMuted?'\u{1F507}':'\u{1F50A}')+'</button>'+
'</div>'+
'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+progPct+'%;background:'+progColor+'"></div></div>'+
'<div class="q-header">'+
'<span class="q-number">Question '+(state.qi+1)+'</span>'+
'<span class="badge '+DIFF_CLASSES[d]+'">'+DIFF_LABELS[d]+'</span>'+
'<span class="category">'+q.cat+'</span>'+
getBookTag(q)+
'</div>'+
'<div class="question-text">'+q.q+'</div>'+
'<div class="options" id="opts">'+
q.o.map(function(o,i){return '<button class="opt-btn" data-i="'+i+'">'+o+'</button>';}).join("")+
'</div>'+
'<div id="feedback"></div>';
document.getElementById('sound-toggle').onclick=function(){_soundMuted=!_soundMuted;this.textContent=_soundMuted?'\u{1F507}':'\u{1F50A}';if(_soundMuted){stopMusic();stopAmbient();speechSynthesis.cancel();}else{playMusic();playAmbient();}};
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){b.onclick=function(){handleAnswer(parseInt(b.dataset.i));};});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
var q=activeQ[state.qi];
var correct=idx===q.a;
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){
b.disabled=true;
var i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

// Track per-book scores
if(q.book==='tg'||q.book==='both'){state.giverTotal++;if(correct)state.giverCorrect++;}
if(q.book==='mr'||q.book==='both'){state.mazeTotal++;if(correct)state.mazeCorrect++;}

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
var pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');void sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreak();playCorrectChime();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrect();playCorrectChime();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrong();playWrongBuzz();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

var factEmoji=q.book==='tg'?'\u{1F4D5}':q.book==='mr'?'\u{1F4D8}':'\u{1F4DA}';
var fb=document.getElementById("feedback");
fb.innerHTML=
'<div class="feedback '+(correct?"correct-fb":"wrong-fb")+'">'+
'<h3>'+(correct?"Correct!"+(state.streak>=3?" \u{1F525} Streak x"+state.streak+"!":""):"Wrong!")+'</h3>'+
(!correct?'<p>The answer was: <strong>'+q.o[q.a]+'</strong></p>':"")+
(state.streak>=3&&correct?'<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>':"")+
'<div class="fact-card"><span class="fact-emoji">'+factEmoji+'</span><span>'+q.fact+'</span></div>'+
'</div>'+
'<button class="next-btn" id="next-btn" '+(_speaking?'disabled style="opacity:0.4"':'')+'>'+(state.qi+1>=activeQ.length?"See Results":"Next Question \u{2192}")+'</button>';
var nb=document.getElementById("next-btn");
nb.onclick=function(){
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopMusic();stopAmbient();
var pct=Math.round(state.correct/activeQ.length*100);
var totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
var totalMin=Math.floor(totalTimeSec/60);
var totalSec=totalTimeSec%60;
var timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
var avgTimeSec=activeQ.length>0?Math.round(totalTimeSec/activeQ.length*10)/10:0;
var grade='F',gradeColor='var(--red)';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='#f7c948';}
else if(pct>=60){grade='C';gradeColor='#f59e0b';}
var accBarColor=pct>=80?'var(--green)':pct>=60?'#f7c948':'var(--red)';

// Determine book expertise
var giverPct=state.giverTotal>0?Math.round(state.giverCorrect/state.giverTotal*100):0;
var mazePct=state.mazeTotal>0?Math.round(state.mazeCorrect/state.mazeTotal*100):0;
var verdictText='',verdictBg='';
if(giverPct>mazePct){
verdictText='\u{1F4D5} You know The Giver better! ('+giverPct+'% vs '+mazePct+'%)';
verdictBg='rgba(239,68,68,0.15);border:2px solid rgba(239,68,68,0.3)';
}else if(mazePct>giverPct){
verdictText='\u{1F4D8} You\'re a Maze Runner expert! ('+mazePct+'% vs '+giverPct+'%)';
verdictBg='rgba(59,130,246,0.15);border:2px solid rgba(59,130,246,0.3)';
}else{
verdictText='\u{1F4DA} Perfectly balanced! You know both equally! ('+giverPct+'% each)';
verdictBg='rgba(139,92,246,0.15);border:2px solid rgba(139,92,246,0.3)';
}

var easyCount=0,medCount=0,hardCount=0,expCount=0;
activeQ.forEach(function(qq){if(qq.d===1)easyCount++;else if(qq.d===2)medCount++;else if(qq.d===3)hardCount++;else if(qq.d===4)expCount++;});

app.innerHTML=
'<div class="end-screen">'+
'<h2>Game Over!</h2>'+
'<div class="final-score">'+state.score+'</div>'+
(state.score>=state.highScore?'<div class="high-label">New High Score!</div>':'<div class="high-label" style="color:var(--gold)">High Score: '+state.highScore+'</div>')+
'<div class="grade-badge" style="background:'+gradeColor+';color:#000">'+grade+'</div>'+
'<div class="book-verdict" style="background:'+verdictBg+'">'+verdictText+'</div>'+
'<div style="text-align:left;margin:12px 0">'+
'<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>'+pct+'%</span></div>'+
'<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:'+pct+'%;background:'+accBarColor+'"></div></div>'+
'</div>'+
'<div class="stats-grid">'+
'<div class="stat-card"><div class="val">'+state.correct+'</div><div class="lbl">Correct</div></div>'+
'<div class="stat-card"><div class="val">'+state.wrong+'</div><div class="lbl">Wrong</div></div>'+
'<div class="stat-card"><div class="val">'+state.bestStreak+'</div><div class="lbl">Best Streak</div></div>'+
'<div class="stat-card"><div class="val">'+timeStr+'</div><div class="lbl">Total Time</div></div>'+
'<div class="stat-card"><div class="val">'+avgTimeSec+'s</div><div class="lbl">Avg / Question</div></div>'+
'<div class="stat-card"><div class="val">'+grade+'</div><div class="lbl">Grade</div></div>'+
'<div class="stat-card"><div class="val">'+state.giverCorrect+'/'+state.giverTotal+'</div><div class="lbl">\u{1F4D5} Giver</div></div>'+
'<div class="stat-card"><div class="val">'+state.mazeCorrect+'/'+state.mazeTotal+'</div><div class="lbl">\u{1F4D8} Maze Runner</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[1]+'/'+easyCount+'</div><div class="lbl">Easy</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[2]+'/'+medCount+'</div><div class="lbl">Medium</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[3]+'/'+hardCount+'</div><div class="lbl">Hard</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[4]+'/'+expCount+'</div><div class="lbl">Expert</div></div>'+
'</div>'+
'<button class="share-btn" id="share-btn">\u{1F4CB} Share Score</button>'+
'<button class="restart-btn" id="restart-btn">Play Again</button>'+
'</div>';
document.getElementById("share-btn").onclick=function(){
var txt="\u{1F4DA} Books Trivia: The Giver vs Maze Runner\nScore: "+state.score+" ("+pct+"%)\nGrade: "+grade+"\nBest Streak: "+state.bestStreak+"\n"+verdictText+"\n#BooksTrivia";
navigator.clipboard.writeText(txt).then(function(){var b=document.getElementById('share-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='\u{1F4CB} Share Score';},2000);}).catch(function(){});
};
document.getElementById("restart-btn").onclick=function(){
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true,giverCorrect:0,giverTotal:0,mazeCorrect:0,mazeTotal:0};
activeQ=Q.slice();for(var si=activeQ.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=activeQ[si];activeQ[si]=activeQ[sj];activeQ[sj]=st;}
_gameStartTime=Date.now();
saveState();playMusic();playAmbient();renderQ();
};
}

renderStart();
</script>
