<style>

@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}

<body>
<div class="container">
<a href="../" class="home-link">&larr; Home</a>
<header>
<h1>\u{1F4DA} BOOKS TRIVIA &mdash; THE GIVER vs THE MAZE RUNNER</h1>
<div class="subtitle">Which dystopia do YOU know better?</div>
</header>

<script>
const Q=[
// ===== "WHICH BOOK?" QUESTIONS (40+) =====
// d:1 - Easy Which Book
{q:"Which book features a character named Newt?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"Newt is one of the Gladers and serves as second-in-command. His real name is never revealed in the first book."},
{q:"Which book has a Community governed by Sameness?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Sameness is the ideology that eliminated color, weather, music, and emotion to create a pain-free society."},
{q:"Which book has a character who begins to see color for the first time?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Jonas first sees flashes of red when looking at an apple, then at Fiona's hair, as his capacity to perceive color awakens."},
{q:"Which book features a deadly maze that changes every night?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"The Maze's walls shift and rearrange every night, making mapping extremely difficult for the Runners."},
{q:"Which book has an organization called WICKED?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"WICKED stands for World In Catastrophe: Killzone Experiment Department. Their motto is 'WICKED is good.'"},
{q:"Which book features the Ceremony of Twelve?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"At the Ceremony of Twelve, each child receives their life Assignment chosen by the Elders based on years of observation."},
{q:"Which book has creatures called Grievers?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"Grievers are part-machine, part-animal creatures that patrol the Maze at night and can sting Gladers."},
{q:"Which book features a baby named Gabriel?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Gabriel (Gabe) is a newchild that Jonas's father brings home because he isn't developing fast enough at the Nurturing Center."},
{q:"Which book takes place in a location called the Glade?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"The Glade is the open area at the center of the Maze where the Gladers have built a small society."},
{q:"Which book features a disease called the Flare?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"The Flare is a virus that slowly destroys the brain, turning people into violent 'Cranks.' It drives the plot of the sequels."},
{q:"Which book has memory sharing as a central plot device?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"The Giver transmits memories of the past — color, snow, sunburn, war, love — to Jonas by placing his hands on Jonas's back."},
{q:"Which book features runners who map a maze daily?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"Runners leave at dawn and return by dusk, memorizing the Maze sections and drawing maps each day."},
{q:"Which book has a character called the Receiver of Memory?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"The Receiver holds all memories of the past for the entire Community so that the citizens can live without pain or knowledge of history."},
{q:"Which book ends with the main character escaping the community they live in?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:1,cat:"which book",book:"both",fact:"Jonas flees the Community with baby Gabriel, while Thomas and the surviving Gladers escape through the Maze. Both are acts of rebellion."},
{q:"Which book features mandatory career assignments for citizens?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Jobs are assigned at the Ceremony of Twelve based on each child's aptitudes, volunteer hours, and disposition."},
{q:"Which book has a character named Teresa?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Teresa is the only girl sent to the Glade. She arrives in a coma with a note saying 'She's the last one. Ever.'"},
{q:"Which book features telepathic communication?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:2,cat:"which book",book:"both",fact:"The Giver transfers memories through touch (a form of mind-to-mind transfer), while Thomas and Teresa communicate telepathically."},
{q:"Which book includes the concept of 'Release'?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:1,cat:"which book",book:"tg",fact:"Release is a euphemism for lethal injection. Citizens believe those Released go to 'Elsewhere,' but they are actually killed."},
{q:"Which book has a Box that delivers supplies?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:1,cat:"which book",book:"mr",fact:"The Box (or elevator) rises from underground every week with supplies, and once a month delivers a new Glader with no memories."},
{q:"Which book features sun flares that devastated civilization?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Massive sun flares scorched the Earth, leading to the Flare virus and the collapse of society — the backstory of the Maze trials."},
// d:2 - Medium Which Book
{q:"Which book has the main character's memories erased before the story begins?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Thomas and all Gladers had their memories wiped by WICKED before being sent into the Maze as part of the experiment."},
{q:"Which book features a character named Fiona?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:2,cat:"which book",book:"tg",fact:"Fiona is Jonas's friend who is assigned to work at the House of the Old. Jonas begins to have feelings for her."},
{q:"Which book features a character named Minho?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Minho is the Keeper of the Runners and one of Thomas's closest allies. He's fast, brave, and sarcastic."},
{q:"Which book uses pills to suppress emotions?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:2,cat:"which book",book:"tg",fact:"Citizens take daily pills called 'Stirrings' medication to suppress strong emotions, especially romantic feelings."},
{q:"Which book has the main character discover a shocking truth about their society through a video?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:2,cat:"which book",book:"tg",fact:"Jonas watches a video of his father performing a Release (killing a newborn twin) and is horrified to learn the truth."},
{q:"Which book involves a group of teens solving a code to escape?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"The Gladers must solve the Maze's code — a sequence of letters spelled by the Maze sections — to find the exit."},
{q:"Which book features characters called Keepers?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Keepers are the leaders of each job group in the Glade: Keeper of the Runners, Keeper of the Builders, etc."},
{q:"Which book's protagonist is eleven years old at the start?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:2,cat:"which book",book:"tg",fact:"Jonas is eleven and turns twelve during the Ceremony of Twelve, when he receives his Assignment as the new Receiver."},
{q:"Which book features a character named Alby?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"Alby is the leader of the Gladers and was the first boy sent to the Glade. He's named after Albert Einstein."},
{q:"Which book has a sequel called 'The Scorch Trials'?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:2,cat:"which book",book:"mr",fact:"The Scorch Trials is the second book in James Dashner's series, set in a scorched wasteland filled with Cranks."},
// d:3 - Hard Which Book
{q:"Which book features a character whose name references a famous scientist or thinker?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:3,cat:"which book",book:"mr",fact:"Many Gladers are named after famous figures: Thomas (Edison), Alby (Einstein), Newt (Isaac Newton), Teresa (Mother Teresa)."},
{q:"Which book's society uses precision of language as a strict rule?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"Citizens must use precise language at all times. Saying 'I'm starving' is corrected because true starvation doesn't exist in the Community."},
{q:"Which book features a character who goes through a process called the Changing?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:3,cat:"which book",book:"mr",fact:"When a Griever stings someone, they undergo the Changing — a painful process that restores fragments of their erased memories."},
{q:"Which book has a sequel called 'Gathering Blue'?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"Gathering Blue is the companion sequel to The Giver, featuring a girl named Kira in a different, more primitive community."},
{q:"In which book does the protagonist have pale eyes, marking them as special?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"Jonas, the Giver, and Gabriel all have unusual pale eyes — a rarity in the Community that signals the capacity to receive memories."},
{q:"Which book has characters who use a slang word meaning 'bad' that sounds like a real swear word?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:3,cat:"which book",book:"mr",fact:"The Gladers use 'shuck,' 'klunk,' 'shank,' and 'slim it' as invented slang that substitutes for profanity."},
{q:"Which book's author also wrote a prequel called 'The Kill Order'?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:3,cat:"which book",book:"mr",fact:"The Kill Order by James Dashner is a prequel showing how the sun flares and the Flare virus devastated humanity."},
{q:"Which book won the Newbery Medal?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"The Giver won the 1994 Newbery Medal for the most distinguished contribution to American literature for children."},
{q:"Which book has a main character who was specifically chosen by the antagonist organization?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:3,cat:"which book",book:"both",fact:"Jonas was selected by the Elders to be Receiver, and Thomas was specifically placed in the Maze by WICKED as a key variable."},
{q:"Which book is set in an ambiguous future where the time period is never specified?",o:["The Giver","The Maze Runner","Both","Neither"],a:2,d:3,cat:"which book",book:"both",fact:"Neither book gives an exact date. Both are set in futures where catastrophe (war or climate) reshaped civilization."},
{q:"Which book features a Cliff that plays a significant role?",o:["The Giver","The Maze Runner","Both","Neither"],a:1,d:3,cat:"which book",book:"mr",fact:"The Cliff is where the Maze appears to end with a sheer drop into darkness — but it's actually the entrance to WICKED's lab."},
{q:"Which book is considered an early example of the YA dystopian genre?",o:["The Giver","The Maze Runner","Both","Neither"],a:0,d:3,cat:"which book",book:"tg",fact:"Published in 1993, The Giver predates the YA dystopian boom and influenced books like The Hunger Games and Divergent."},

// ===== REGULAR TRIVIA - THE GIVER =====
// d:1 - Easy
{q:"What is Jonas's Assignment at the Ceremony of Twelve?",o:["Nurturer","Pilot","Receiver of Memory","Laborer"],a:2,d:1,cat:"the giver",book:"tg",fact:"Jonas is stunned when his number is skipped, then the Chief Elder explains he has been selected for the most honored role."},
{q:"What color does Jonas first see?",o:["Blue","Green","Red","Yellow"],a:2,d:1,cat:"the giver",book:"tg",fact:"Jonas first sees the color red in an apple during a game of catch, though he doesn't yet understand what he's perceiving."},
{q:"What is 'Release' actually revealed to be in The Giver?",o:["A vacation","A promotion","Death by lethal injection","A transfer to another community"],a:2,d:1,cat:"the giver",book:"tg",fact:"Jonas is devastated when he watches a video of his father calmly injecting and killing a smaller newborn twin as a routine procedure."},
{q:"What is Jonas's father's job?",o:["Teacher","Laborer","Nurturer","Doctor"],a:2,d:1,cat:"the giver",book:"tg",fact:"Jonas's father works at the Nurturing Center, caring for newchildren before they are assigned to family units."},
{q:"What does Jonas's family do each evening?",o:["Watch television","Share their feelings","Exercise together","Study"],a:1,d:1,cat:"the giver",book:"tg",fact:"The evening sharing of feelings is mandatory. Each family member describes their emotions from the day, and others offer comfort."},
{q:"Who is the old man who holds all the Community's memories?",o:["The Elder","The Chief","The Giver","The Controller"],a:2,d:1,cat:"the giver",book:"tg",fact:"The Giver (previously the Receiver) has held decades of memories alone. His real name is never revealed in the first book."},
{q:"What is Jonas's sister's name?",o:["Rosemary","Lily","Fiona","Larissa"],a:1,d:1,cat:"the giver",book:"tg",fact:"Lily is Jonas's younger sister who is outspoken and energetic. She has not yet reached the age of Ceremony of Twelve."},
{q:"What is the first painful memory The Giver transmits to Jonas?",o:["War","Sunburn","A broken leg","Starvation"],a:1,d:2,cat:"the giver",book:"tg",fact:"Jonas experiences sunburn during a memory of lying on a beach. It's his first encounter with physical pain."},
{q:"What happened to the previous Receiver-in-training, Rosemary?",o:["She escaped","She was Released","She applied for Release herself","She became the Chief Elder"],a:2,d:2,cat:"the giver",book:"tg",fact:"Rosemary requested Release after receiving painful memories. When she was killed, all her memories returned to the Community, causing chaos."},
{q:"What memory does The Giver give Jonas that represents love?",o:["A birthday party","A wedding","A family gathered at Christmas","A mother hugging her child"],a:2,d:2,cat:"the giver",book:"tg",fact:"Jonas receives a memory of grandparents, a Christmas tree, and a family gathered together — the concept of love and family warmth."},
{q:"What object does Jonas first notice the color change in?",o:["A flower","An apple","Fiona's hair","A book"],a:1,d:1,cat:"the giver",book:"tg",fact:"During a game of catch, Jonas sees the apple 'change' momentarily — his first glimpse of the color red."},
{q:"What is the name of the elderly woman Jonas talks to at the House of the Old?",o:["Rosemary","Lily","Larissa","Edna"],a:2,d:2,cat:"the giver",book:"tg",fact:"Larissa tells Jonas about the Release ceremony for an old man named Roberto, describing it as a joyful celebration."},
{q:"Why does Jonas stop taking his pills?",o:["He forgets","He wants to feel emotions","The Giver tells him to","They make him sick"],a:1,d:2,cat:"the giver",book:"tg",fact:"The Giver instructs Jonas to stop taking the Stirrings pills so he can begin to experience genuine emotions and feelings."},
{q:"How does Jonas escape the Community?",o:["Through a tunnel","By helicopter","By bicycle with Gabriel","By boat"],a:2,d:2,cat:"the giver",book:"tg",fact:"Jonas takes his father's bicycle and flees at night with Gabriel, riding toward Elsewhere through increasingly harsh terrain."},
{q:"What does Jonas hear at the very end of the novel?",o:["Silence","Screaming","Music","Thunder"],a:2,d:2,cat:"the giver",book:"tg",fact:"The ambiguous ending has Jonas hearing music from below as he and Gabriel sled downhill. Whether they survive is left uncertain."},
{q:"What rule does Jonas break by looking at the list of rules given to the new Receiver?",o:["He shares it with friends","He reads it at dinner","He discovers he is allowed to lie","He throws it away"],a:2,d:2,cat:"the giver",book:"tg",fact:"Jonas discovers his rules permit him to lie, which shocks him — he wonders how many other people were given permission to lie."},
{q:"What is the name for new babies in The Giver's Community?",o:["Infants","Newchildren","Littles","Borns"],a:1,d:1,cat:"the giver",book:"tg",fact:"Newchildren are cared for at the Nurturing Center for their first year before being assigned to family units at the Naming Ceremony."},
// d:3 - Hard Giver
{q:"What comfort object does Jonas's sister Lily have?",o:["A stuffed bear","A blanket","A stuffed elephant","A hippo"],a:2,d:3,cat:"the giver",book:"tg",fact:"Each child receives a comfort object as a young child. Lily has a stuffed elephant, though no one in the Community knows what an elephant is."},
{q:"What is the name of the pilot who accidentally flew over the Community?",o:["We never learn his name","Roberto","Caleb","Marcus"],a:0,d:3,cat:"the giver",book:"tg",fact:"The pilot who flew over the Community caused panic among citizens. He was Released (killed) for the error."},
{q:"How are spouses matched in the Community?",o:["By personal choice","By lottery","By the Committee of Elders","By age"],a:2,d:3,cat:"the giver",book:"tg",fact:"The Committee of Elders carefully matches spouses based on complementary personality traits. Love plays no part in the process."},
{q:"What does the word 'Elsewhere' actually mean in The Giver?",o:["Another community","Death","A mythical place","The outside world"],a:1,d:3,cat:"the giver",book:"tg",fact:"While citizens believe Elsewhere is a real place people go, it's a euphemism for death. Those Released are killed by lethal injection."},
{q:"What quality does the Chief Elder say Jonas has that is required for the Receiver?",o:["Intelligence","Courage","The Capacity to See Beyond","Physical strength"],a:2,d:3,cat:"the giver",book:"tg",fact:"The Capacity to See Beyond manifests as the ability to see color, but it also implies deeper perception of things beyond ordinary experience."},
{q:"How many children can each family unit have in Jonas's Community?",o:["One","Two","Three","As many as they want"],a:1,d:3,cat:"the giver",book:"tg",fact:"Each family unit is permitted exactly two children — one male and one female — carefully assigned by the Committee."},
{q:"What is the significance of Jonas's number being skipped at the Ceremony?",o:["It was a mistake","He was being punished","He was being set apart for a special Assignment","He was being Released"],a:2,d:3,cat:"the giver",book:"tg",fact:"The Chief Elder deliberately skipped Jonas to heighten the significance of his selection as the new Receiver of Memory."},
{q:"What vehicle do people primarily use in Jonas's Community?",o:["Cars","Trains","Bicycles","They walk everywhere"],a:2,d:3,cat:"the giver",book:"tg",fact:"Bicycles are the main form of transportation. Children receive their first bicycle at the Ceremony of Nine, a major milestone."},
{q:"What war memory does The Giver transmit to Jonas?",o:["World War II","A Civil War battle","A boy dying on a battlefield","Nuclear war"],a:2,d:3,cat:"the giver",book:"tg",fact:"Jonas experiences a devastating memory of a young soldier dying on a battlefield, crying out for water. It's his worst memory."},
// d:4 - Expert Giver
{q:"What year was 'The Giver' by Lois Lowry published?",o:["1990","1993","1996","1999"],a:1,d:4,cat:"the giver",book:"tg",fact:"The Giver was published in 1993 by Houghton Mifflin and immediately became one of the most discussed YA novels."},
{q:"What are the four books in The Giver quartet?",o:["The Giver, Gathering Blue, Messenger, Son","The Giver, The Searcher, The Finding, The End","The Giver, Elsewhere, Beyond, Return","The Giver, Blue, Green, Red"],a:0,d:4,cat:"the giver",book:"tg",fact:"Lowry wrote four interconnected books: The Giver (1993), Gathering Blue (2000), Messenger (2004), and Son (2012)."},
{q:"Who directed the 2014 film adaptation of The Giver?",o:["Gary Ross","Phillip Noyce","Wes Ball","Francis Lawrence"],a:1,d:4,cat:"the giver",book:"tg",fact:"The film starred Brenton Thwaites as Jonas, Jeff Bridges as The Giver, and Meryl Streep as the Chief Elder."},
{q:"What is the name of Rosemary's relationship to The Giver?",o:["His student","His wife","His daughter","His sister"],a:2,d:4,cat:"the giver",book:"tg",fact:"Rosemary was The Giver's own daughter who applied for Release after receiving the memory of loneliness and loss."},
{q:"What inspired Lois Lowry to write The Giver?",o:["A dream","Her father's memory loss","A news article","A school visit"],a:1,d:4,cat:"the giver",book:"tg",fact:"Lowry was inspired by visiting her aging father, who had lost most of his long-term memory and lived in a kind of peaceful ignorance."},
{q:"In what Ceremony do children receive their first bicycle?",o:["Ceremony of Seven","Ceremony of Eight","Ceremony of Nine","Ceremony of Ten"],a:2,d:3,cat:"the giver",book:"tg",fact:"The Ceremony of Nine is significant because bicycles represent independence and the ability to travel alone in the Community."},

// ===== REGULAR TRIVIA - THE MAZE RUNNER =====
// d:1 - Easy
{q:"What is Thomas's role in the Glade?",o:["Builder","Keeper","Runner","Slicer"],a:2,d:1,cat:"maze runner",book:"mr",fact:"Thomas becomes a Runner — one of the Gladers who enters the Maze daily to map it and search for an exit."},
{q:"Who is the leader of the Gladers?",o:["Thomas","Newt","Alby","Minho"],a:2,d:1,cat:"maze runner",book:"mr",fact:"Alby was the first Glader sent to the Glade and became the de facto leader, establishing rules and order."},
{q:"What do the Grievers inject into Gladers when they sting them?",o:["Poison","A tracker serum","The Grief Serum","A memory-erasing drug"],a:1,d:1,cat:"maze runner",book:"mr",fact:"The tracker serum triggers the Changing — a painful process that gives Gladers fragmented memories of their lives before the Maze."},
{q:"What happens to the Maze walls every night?",o:["They light up","They move and rearrange","They shrink","They disappear"],a:1,d:1,cat:"maze runner",book:"mr",fact:"The grinding sound of the Maze walls shifting is one of the most terrifying sounds the Gladers hear each night."},
{q:"What is the name of the youngest Glader who befriends Thomas?",o:["Alby","Gally","Chuck","Minho"],a:2,d:1,cat:"maze runner",book:"mr",fact:"Chuck is a chubby, good-natured younger boy who becomes Thomas's first real friend in the Glade."},
{q:"What is a 'Greenie' in Maze Runner slang?",o:["A sick person","The newest arrival to the Glade","A type of Griever","A garden worker"],a:1,d:1,cat:"maze runner",book:"mr",fact:"Every new arrival is called a Greenie until the next person comes up in the Box a month later."},
{q:"What breaks the routine in the Glade when Teresa arrives?",o:["She's the first girl","The sky turns dark","The Maze stops moving","Food stops arriving"],a:0,d:1,cat:"maze runner",book:"mr",fact:"Teresa's arrival as the first and only girl, along with her cryptic message, signals that everything is about to change."},
{q:"What is the Gladers' word for the night when the walls don't close?",o:["The Ending","The Opening","The Reckoning","None — it never happened before the climax"],a:3,d:2,cat:"maze runner",book:"mr",fact:"Near the end, the Maze doors stay open for the first time ever, allowing Grievers to enter the Glade at night."},
{q:"What important rule does Thomas break early in the book?",o:["He steals food","He goes into the Maze after the doors close","He attacks another Glader","He opens the Box"],a:1,d:1,cat:"maze runner",book:"mr",fact:"Thomas runs into the Maze to help Minho and Alby when the doors are closing, which is strictly forbidden."},
{q:"Who does Gally blame for the bad things happening in the Glade?",o:["Newt","Minho","Thomas","Alby"],a:2,d:1,cat:"maze runner",book:"mr",fact:"Gally distrusts Thomas from the beginning and believes Thomas's arrival triggered the increasingly dangerous events."},
{q:"What is the last message Teresa delivers before losing consciousness?",o:["Everything is about to change","The Maze has no exit","WICKED is good","Trust no one"],a:0,d:2,cat:"maze runner",book:"mr",fact:"Teresa telepathically tells Thomas 'Everything is going to change' before falling into a coma upon arrival."},
{q:"What does 'WICKED is good' mean in the context of the story?",o:["WICKED truly is good","It's WICKED's propaganda slogan","It's a code word","It's an acronym"],a:1,d:2,cat:"maze runner",book:"mr",fact:"WICKED uses the phrase as their motto to justify their cruel experiments. Whether they are truly 'good' is the central moral question."},
// d:2 - Medium Maze Runner
{q:"What is the Griever Hole?",o:["Where Grievers sleep","A trap in the Maze","The invisible exit from the Maze at the Cliff","A cave system"],a:2,d:2,cat:"maze runner",book:"mr",fact:"The Griever Hole is an invisible portal at the edge of the Cliff that leads to WICKED's lab and the way out of the Maze."},
{q:"What job does Frypan have in the Glade?",o:["Runner","Slicer","Cook","Med-jack"],a:2,d:2,cat:"maze runner",book:"mr",fact:"Frypan is the Keeper of the Cooks, responsible for feeding all the Gladers. His real name is Siggy."},
{q:"What is the Changing?",o:["A weather event","A painful process triggered by a Griever sting that restores some memories","A leadership challenge","The Maze rearranging"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Those who survive the Changing are never the same — they become haunted and disturbed by the fragmented memories they recover."},
{q:"How does Chuck die?",o:["Griever attack","Gally throws a knife at Thomas but Chuck jumps in front","He falls from the Cliff","He's left behind in the Maze"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Chuck sacrifices himself by jumping in front of a knife Gally throws at Thomas, dying in Thomas's arms."},
{q:"What is a Med-jack?",o:["A type of Griever","A medical worker in the Glade","A tool for running the Maze","A punishment"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Med-jacks are the Glade's medics, responsible for treating injuries and caring for those going through the Changing."},
{q:"What triggers Thomas's partial memory recovery?",o:["Seeing Teresa","Getting stung by a Griever on purpose","Finding a code","Touching the Maze walls"],a:1,d:3,cat:"maze runner",book:"mr",fact:"Thomas deliberately lets a Griever sting him so he can go through the Changing and recover memories of WICKED and his past role."},
{q:"What code do the Runners discover hidden in the Maze's patterns?",o:["WICKED","ESCAPE","A sequence of words spelling a message","Their own names"],a:2,d:3,cat:"maze runner",book:"mr",fact:"The Maze sections spell out repeating words: FLOAT, CATCH, BLEED, DEATH, STIFF, PUSH. These turn out to be the exit code."},
{q:"Who kills Gally at the end of the first book?",o:["Thomas","Minho","Chuck","No one — Gally survives"],a:3,d:3,cat:"maze runner",book:"mr",fact:"After Gally kills Chuck, Minho knocks Gally out, but Gally is alive. He reappears in later books as a different person."},
// d:3 - Hard Maze Runner
{q:"What is Thomas's real name before WICKED changed it?",o:["Stephen","Thomas IS his real name given by WICKED","We never learn it","David"],a:1,d:3,cat:"maze runner",book:"mr",fact:"All the Gladers were given new names by WICKED based on famous people. Thomas is named after Thomas Edison."},
{q:"What is the Beetle Blade?",o:["A weapon","A small robotic spy used by WICKED to observe the Gladers","A Griever's stinger","A type of plant in the Glade"],a:1,d:3,cat:"maze runner",book:"mr",fact:"Beetle Blades are small lizard-like robots with cameras that WICKED uses to monitor everything happening in the Glade and Maze."},
{q:"How many Gladers survive to escape the Maze?",o:["About 20","About 40","About 10","About 60"],a:0,d:3,cat:"maze runner",book:"mr",fact:"Only about 20 of the original 50+ Gladers survive the final battle with the Grievers and escape through the Griever Hole."},
{q:"What shocking revelation does the woman from WICKED deliver after the escape?",o:["The Maze was a test and they passed","They're on a spaceship","They were clones","The outside world is fine"],a:0,d:3,cat:"maze runner",book:"mr",fact:"A WICKED representative explains the Maze trials were Phase One of an experiment to find a cure for the Flare virus."},
{q:"What is Newt's role in the Glade's leadership?",o:["Cook","He is second-in-command to Alby","Lead Runner","He tends the garden"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Newt serves as Alby's second-in-command and often acts as a mediator. He was once a Runner before injuring his leg."},
{q:"How did Newt injure his leg?",o:["Griever attack","He fell while running","He deliberately jumped from the Maze wall","A building collapsed on him"],a:2,d:4,cat:"maze runner",book:"mr",fact:"Newt tried to kill himself by jumping from the top of the Maze wall. He survived but was left with a permanent limp."},
{q:"What year was 'The Maze Runner' by James Dashner published?",o:["2007","2009","2011","2013"],a:1,d:4,cat:"maze runner",book:"mr",fact:"The Maze Runner was published on October 6, 2009, by Delacorte Press and quickly became a bestseller."},
{q:"Who directed the 2014 Maze Runner film?",o:["Phillip Noyce","James Dashner","Wes Ball","Francis Lawrence"],a:2,d:4,cat:"maze runner",book:"mr",fact:"Wes Ball directed all three Maze Runner films. The first movie starred Dylan O'Brien as Thomas."},
{q:"What actor played Thomas in the Maze Runner films?",o:["Ansel Elgort","Dylan O'Brien","Liam Hemsworth","Thomas Brodie-Sangster"],a:1,d:3,cat:"maze runner",book:"mr",fact:"Dylan O'Brien suffered a serious on-set injury during filming of The Death Cure, delaying production by over a year."},
{q:"Who plays Newt in the Maze Runner films?",o:["Ki Hong Lee","Will Poulter","Thomas Brodie-Sangster","Kaya Scodelario"],a:2,d:3,cat:"maze runner",book:"mr",fact:"Thomas Brodie-Sangster, known for Love Actually and Game of Thrones, brought a beloved portrayal of Newt to the screen."},

// ===== COMPARISON / MIXED TRIVIA =====
// d:2 - Medium
{q:"Which book was published first?",o:["The Giver","The Maze Runner","They were published the same year","Neither — both are unpublished"],a:0,d:2,cat:"comparison",book:"both",fact:"The Giver was published in 1993, sixteen years before The Maze Runner (2009). Lowry's book helped pioneer the YA dystopia genre."},
{q:"Both books have film adaptations. Which film came out first?",o:["The Giver (2014)","The Maze Runner (2014)","They came out the same year","Neither has a film"],a:2,d:2,cat:"comparison",book:"both",fact:"Both films were released in 2014 — The Maze Runner in September and The Giver in August, just weeks apart."},
{q:"What do Jonas and Thomas have in common?",o:["Both are orphans","Both discover their societies are hiding dark secrets","Both have superpowers","Both are the oldest in their group"],a:1,d:2,cat:"comparison",book:"both",fact:"Both protagonists uncover disturbing truths: Jonas learns about Release, Thomas learns about WICKED's experiments."},
{q:"Which protagonist is older at the start of their story?",o:["Jonas (11-12)","Thomas (16)","They're the same age","Neither's age is mentioned"],a:1,d:2,cat:"comparison",book:"both",fact:"Jonas turns twelve during the story while Thomas is about sixteen. The age difference affects the tone of each book significantly."},
{q:"Both stories feature controlled societies. What's the key difference?",o:["The Giver's society controls through comfort; the Maze Runner's through fear","Both use fear","Both use comfort","There is no real difference"],a:0,d:3,cat:"comparison",book:"both",fact:"The Community achieves control by eliminating pain and choice, while WICKED controls through isolation, memory erasure, and danger."},
{q:"Which author wrote more books in their respective series?",o:["Lois Lowry (The Giver quartet: 4 books)","James Dashner (Maze Runner: 5+ books)","They wrote the same number","Neither wrote sequels"],a:1,d:3,cat:"comparison",book:"both",fact:"Dashner wrote 5 books (3 main + 2 prequels) while Lowry wrote 4 books in the Giver quartet."},
{q:"Which book has been more frequently challenged or banned in schools?",o:["The Giver","The Maze Runner","Both equally","Neither"],a:0,d:3,cat:"comparison",book:"both",fact:"The Giver is one of the most frequently challenged books in America due to its themes of euthanasia, infanticide, and questioning authority."},
{q:"In both books, the protagonist discovers something about death. What does Jonas discover vs. Thomas?",o:["Jonas: Release is death / Thomas: WICKED kills Gladers for research","Jonas: everyone dies / Thomas: no one really dies","Jonas: death doesn't exist / Thomas: death is an illusion","Jonas: old people choose death / Thomas: death is random"],a:0,d:3,cat:"comparison",book:"both",fact:"Jonas watches his father kill a newborn baby during Release. Thomas discovers WICKED has sacrificed countless children in Maze trials."},
// d:3 - Hard mixed
{q:"What is the Gladers' slang term for a fool or idiot?",o:["Shuckface","Klunkhead","Greenie","Slinthead"],a:3,d:3,cat:"maze runner",book:"mr",fact:"'Slinthead' is Glader slang for an idiot or fool. They also use 'shank' as a general term for a person, like 'dude.'"},
{q:"What is the name of the building where elderly people live in Jonas's Community?",o:["The Retirement Home","The House of the Old","The Elder Center","The Rest Home"],a:1,d:2,cat:"the giver",book:"tg",fact:"At the House of the Old, residents are bathed and cared for by volunteer children, then eventually Released in a ceremony."},
{q:"What rule about doors does the Glade have?",o:["Never open the Box","Never go through the Maze doors at night","Never open the supply room","There are no doors in the Glade"],a:1,d:2,cat:"maze runner",book:"mr",fact:"The number one rule is never to go outside the Glade into the Maze at night. The doors close at dusk to keep Grievers out."},
{q:"What memory does The Giver say is his favorite?",o:["Snow","A family gathering with music and love","Sailing","Sunlight"],a:1,d:3,cat:"the giver",book:"tg",fact:"The Giver's favorite memory is of a warm room with family, grandparents, love, and a decorated tree — essentially a Christmas memory."},
{q:"What object does Thomas find when he first arrives in the Box?",o:["A note","Nothing — he has no possessions","A knife","A key"],a:1,d:2,cat:"maze runner",book:"mr",fact:"Thomas arrives in the Box with nothing but the clothes on his back and no memories except his first name."},
{q:"What specific memories does The Giver transmit to help Jonas understand warfare?",o:["A nuclear explosion","A Civil War cavalry charge","A boy dying alone on a battlefield calling for water","World War I trenches"],a:2,d:3,cat:"the giver",book:"tg",fact:"The war memory is one of the most devastating Jonas receives — a teenage soldier dying in agony, surrounded by corpses."},
{q:"What is the Bloodhouse in the Glade?",o:["A medical facility","Where animals are slaughtered for food","A punishment room","Where the Changing happens"],a:1,d:3,cat:"maze runner",book:"mr",fact:"The Bloodhouse is where the Slicers work, butchering animals raised in the Glade for the community's food supply."},
{q:"In The Giver, what happens to identical twins?",o:["They are celebrated","The smaller one is Released","They are separated into different communities","One becomes the Receiver"],a:1,d:2,cat:"the giver",book:"tg",fact:"When twins are born, the smaller one is Released (killed). Jonas's father performs this procedure, believing it's routine."},
{q:"What is the Homestead in the Glade?",o:["The building where Gladers sleep","The garden area","The meeting hall","The lookout tower"],a:0,d:3,cat:"maze runner",book:"mr",fact:"The Homestead is the main building in the Glade, a rundown wooden structure where Gladers sleep and hold meetings."},
{q:"What does Jonas transmit to Gabriel to help him sleep?",o:["A lullaby","Memories of calm, soothing experiences","A bedtime story","Nothing — Gabriel sleeps on his own"],a:1,d:2,cat:"the giver",book:"tg",fact:"Jonas discovers he can transmit memories to Gabriel through touch, giving him peaceful memories to soothe him to sleep."},
// d:4 Expert
{q:"How many Sections does the Maze have?",o:["4","6","8","10"],a:2,d:4,cat:"maze runner",book:"mr",fact:"The Maze has 8 sections, each numbered, that the Runners map daily. The pattern of open sections spells out the code words."},
{q:"What is Lois Lowry's personal connection to the theme of memory?",o:["She has amnesia","Her father had Alzheimer's and lost his memories","She studied neuroscience","She lived in a commune"],a:1,d:4,cat:"the giver",book:"tg",fact:"Lowry's father lost his long-term memory in old age. She noticed he was content but had lost all painful memories along with the joyful ones."},
{q:"What are the six code words the Maze sections spell?",o:["FLOAT, CATCH, BLEED, DEATH, STIFF, PUSH","RUN, HIDE, FIGHT, KILL, LIVE, ESCAPE","WICKED, GOOD, MAZE, TRIAL, CURE, END","NORTH, SOUTH, EAST, WEST, UP, DOWN"],a:0,d:4,cat:"maze runner",book:"mr",fact:"Each word must be entered into the computer at the Griever Hole in sequence to shut down the Maze and open the exit."},

{q:"What letters are written on the Beetle Blades?",o:["WCKD","MAZE","WICKED","GLADE"],a:2,d:3,cat:"maze runner",book:"mr",fact:"The Gladers can see 'WICKED' written on the Beetle Blades, though they don't understand its meaning until later."},

{q:"What color are the Grievers described as?",o:["Black","Sickly gray-green with mechanical parts","Pure metal silver","Translucent"],a:1,d:3,cat:"maze runner",book:"mr",fact:"Grievers are described as slug-like creatures with wet, grayish skin covered in spikes, mechanical arms, and appendages."},

// Ambient atmospheric hum
var _ambientTimer=null;
function playAmbient(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopAmbient();
function loop(){
try{
var dur=3+Math.random()*2;
var bs=Math.floor(actx.sampleRate*dur);var buf=actx.createBuffer(1,bs,actx.sampleRate);
var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
var src=actx.createBufferSource();src.buffer=buf;
var bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=200+Math.random()*200;bp.Q.value=0.3;
var lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=400;
var g=actx.createGain();g.gain.setValueAtTime(0.004,actx.currentTime);
g.gain.linearRampToValueAtTime(0.007,actx.currentTime+dur*0.4);
g.gain.linearRampToValueAtTime(0.003,actx.currentTime+dur);
src.connect(bp);bp.connect(lp);lp.connect(g);g.connect(actx.destination);
src.start();src.stop(actx.currentTime+dur);
}catch(e){}
_ambientTimer=setTimeout(loop,dur*900);
}
_ambientTimer=setTimeout(loop,500);
}

// TTS Voices
var announceOn=true;
function getVoices(){return speechSynthesis.getVoices();}
function findVoice(names){
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].lang.startsWith('en')&&voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];
  }
}
for(var vi2=0;vi2<voices.length;vi2++){
  if(voices[vi2].lang.startsWith('en')&&!voices[vi2].name.toLowerCase().match(/daniel|alex|aaron|fred|james|male/))return voices[vi2];
}
return null;
}

function announce(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
_speaking=true;

var u=new SpeechSynthesisUtterance(text);

u.onend=function(){_speaking=false;enableNextBtn();};
u.onerror=function(){_speaking=false;enableNextBtn();};
speechSynthesis.speak(u);
setTimeout(function(){_speaking=false;enableNextBtn();},6000);
},500);}catch(e){_speaking=false;enableNextBtn();}
}

if(state.qi>=activeQ.length){renderEnd();return;}
var q25=Math.floor(activeQ.length*0.25);
var q50=Math.floor(activeQ.length*0.5);
var q75=Math.floor(activeQ.length*0.75);
if(state.qi===q25)showBanner("Difficulty Up: Medium!","#8b5cf6","Moving to Medium questions now! The memories are getting more complex!");
if(state.qi===q50)showBanner("Difficulty Up: Hard!","#f59e0b","Hard mode! Only true dystopian scholars survive this!");
if(state.qi===q75)showBanner("Difficulty Up: Expert!","#ef4444","Expert level! You'd better have gone through the Changing for this!");

var q=activeQ[state.qi];
var d=q.d;
readQuestion(q.q);
var progPct=Math.round((state.qi/activeQ.length)*100);
var progColors={1:'var(--green)',2:'#f7c948',3:'#f59e0b',4:'var(--red)'};
var progColor=progColors[d]||'var(--accent)';
var streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
document.body.classList.toggle('streak-pulse',state.streak>=5);
app.innerHTML=
'<div class="'+streakBarClass+'" style="position:relative">'+
'<span>Score: <strong>'+state.score+'</strong></span>'+
'<span class="streak-fire">'+(state.streak>=3?"\u{1F525} ":"")+'Streak: '+state.streak+'</span>'+
'<span>Q '+(state.qi+1)+'/'+activeQ.length+'</span>'+
'<button class="sound-toggle" id="sound-toggle" title="Toggle sound">'+(_soundMuted?'\u{1F507}':'\u{1F50A}')+'</button>'+
'</div>'+
'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+progPct+'%;background:'+progColor+'"></div></div>'+
'<div class="q-header">'+
'<span class="q-number">Question '+(state.qi+1)+'</span>'+
'<span class="badge '+DIFF_CLASSES[d]+'">'+DIFF_LABELS[d]+'</span>'+
'<span class="category">'+q.cat+'</span>'+
getBookTag(q)+
'</div>'+
'<div class="question-text">'+q.q+'</div>'+
'<div class="options" id="opts">'+
q.o.map(function(o,i){return '<button class="opt-btn" data-i="'+i+'">'+o+'</button>';}).join("")+
'</div>'+
'<div id="feedback"></div>';
document.getElementById('sound-toggle').onclick=function(){_soundMuted=!_soundMuted;this.textContent=_soundMuted?'\u{1F507}':'\u{1F50A}';if(_soundMuted){stopMusic();stopAmbient();speechSynthesis.cancel();}else{playMusic();playAmbient();}};
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){b.onclick=function(){handleAnswer(parseInt(b.dataset.i));};});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
var q=activeQ[state.qi];
var correct=idx===q.a;
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){
b.disabled=true;
var i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

// Track per-book scores
if(q.book==='tg'||q.book==='both'){state.giverTotal++;if(correct)state.giverCorrect++;}
if(q.book==='mr'||q.book==='both'){state.mazeTotal++;if(correct)state.mazeCorrect++;}

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
var pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');void sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreak();playCorrectChime();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrect();playCorrectChime();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrong();playWrongBuzz();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

var factEmoji=q.book==='tg'?'\u{1F4D5}':q.book==='mr'?'\u{1F4D8}':'\u{1F4DA}';
var fb=document.getElementById("feedback");
fb.innerHTML=
'<div class="feedback '+(correct?"correct-fb":"wrong-fb")+'">'+
'<h3>'+(correct?"Correct!"+(state.streak>=3?" \u{1F525} Streak x"+state.streak+"!":""):"Wrong!")+'</h3>'+
(!correct?'<p>The answer was: <strong>'+q.o[q.a]+'</strong></p>':"")+
(state.streak>=3&&correct?'<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>':"")+
'<div class="fact-card"><span class="fact-emoji">'+factEmoji+'</span><span>'+q.fact+'</span></div>'+
'</div>'+
'<button class="next-btn" id="next-btn" '+(_speaking?'disabled style="opacity:0.4"':'')+'>'+(state.qi+1>=activeQ.length?"See Results":"Next Question \u{2192}")+'</button>';
var nb=document.getElementById("next-btn");
nb.onclick=function(){
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopMusic();stopAmbient();
var pct=Math.round(state.correct/activeQ.length*100);
var totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
var totalMin=Math.floor(totalTimeSec/60);
var totalSec=totalTimeSec%60;
var timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
var avgTimeSec=activeQ.length>0?Math.round(totalTimeSec/activeQ.length*10)/10:0;
var grade='F',gradeColor='var(--red)';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='#f7c948';}
else if(pct>=60){grade='C';gradeColor='#f59e0b';}
var accBarColor=pct>=80?'var(--green)':pct>=60?'#f7c948':'var(--red)';

// Determine book expertise
var giverPct=state.giverTotal>0?Math.round(state.giverCorrect/state.giverTotal*100):0;
var mazePct=state.mazeTotal>0?Math.round(state.mazeCorrect/state.mazeTotal*100):0;
var verdictText='',verdictBg='';
if(giverPct>mazePct){
verdictText='\u{1F4D5} You know The Giver better! ('+giverPct+'% vs '+mazePct+'%)';
verdictBg='rgba(239,68,68,0.15);border:2px solid rgba(239,68,68,0.3)';
}else if(mazePct>giverPct){
verdictText='\u{1F4D8} You\'re a Maze Runner expert! ('+mazePct+'% vs '+giverPct+'%)';
verdictBg='rgba(59,130,246,0.15);border:2px solid rgba(59,130,246,0.3)';
}else{
verdictText='\u{1F4DA} Perfectly balanced! You know both equally! ('+giverPct+'% each)';
verdictBg='rgba(139,92,246,0.15);border:2px solid rgba(139,92,246,0.3)';
}

var easyCount=0,medCount=0,hardCount=0,expCount=0;
activeQ.forEach(function(qq){if(qq.d===1)easyCount++;else if(qq.d===2)medCount++;else if(qq.d===3)hardCount++;else if(qq.d===4)expCount++;});

app.innerHTML=
'<div class="end-screen">'+
'<h2>Game Over!</h2>'+
'<div class="final-score">'+state.score+'</div>'+
(state.score>=state.highScore?'<div class="high-label">New High Score!</div>':'<div class="high-label" style="color:var(--gold)">High Score: '+state.highScore+'</div>')+
'<div class="grade-badge" style="background:'+gradeColor+';color:#000">'+grade+'</div>'+
'<div class="book-verdict" style="background:'+verdictBg+'">'+verdictText+'</div>'+
'<div style="text-align:left;margin:12px 0">'+
'<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>'+pct+'%</span></div>'+
'<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:'+pct+'%;background:'+accBarColor+'"></div></div>'+
'</div>'+
'<div class="stats-grid">'+
'<div class="stat-card"><div class="val">'+state.correct+'</div><div class="lbl">Correct</div></div>'+
'<div class="stat-card"><div class="val">'+state.wrong+'</div><div class="lbl">Wrong</div></div>'+
'<div class="stat-card"><div class="val">'+state.bestStreak+'</div><div class="lbl">Best Streak</div></div>'+
'<div class="stat-card"><div class="val">'+timeStr+'</div><div class="lbl">Total Time</div></div>'+
'<div class="stat-card"><div class="val">'+avgTimeSec+'s</div><div class="lbl">Avg / Question</div></div>'+
'<div class="stat-card"><div class="val">'+grade+'</div><div class="lbl">Grade</div></div>'+
'<div class="stat-card"><div class="val">'+state.giverCorrect+'/'+state.giverTotal+'</div><div class="lbl">\u{1F4D5} Giver</div></div>'+
'<div class="stat-card"><div class="val">'+state.mazeCorrect+'/'+state.mazeTotal+'</div><div class="lbl">\u{1F4D8} Maze Runner</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[1]+'/'+easyCount+'</div><div class="lbl">Easy</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[2]+'/'+medCount+'</div><div class="lbl">Medium</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[3]+'/'+hardCount+'</div><div class="lbl">Hard</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[4]+'/'+expCount+'</div><div class="lbl">Expert</div></div>'+
'</div>'+
'<button class="share-btn" id="share-btn">\u{1F4CB} Share Score</button>'+
'<button class="restart-btn" id="restart-btn">Play Again</button>'+
'</div>';
document.getElementById("share-btn").onclick=function(){
var txt="\u{1F4DA} Books Trivia: The Giver vs Maze Runner\nScore: "+state.score+" ("+pct+"%)\nGrade: "+grade+"\nBest Streak: "+state.bestStreak+"\n"+verdictText+"\n#BooksTrivia";
navigator.clipboard.writeText(txt).then(function(){var b=document.getElementById('share-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='\u{1F4CB} Share Score';},2000);}).catch(function(){});
};
document.getElementById("restart-btn").onclick=function(){
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true,giverCorrect:0,giverTotal:0,mazeCorrect:0,mazeTotal:0};
activeQ=Q.slice();for(var si=activeQ.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=activeQ[si];activeQ[si]=activeQ[sj];activeQ[sj]=st;}
_gameStartTime=Date.now();
saveState();playMusic();playAmbient();renderQ();
};
}

renderStart();
</script>
</body>
</html>
