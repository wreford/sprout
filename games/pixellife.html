<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Pixel Life</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;touch-action:none;font-family:monospace;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;image-rendering:pixelated}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:2px 6px;padding-top:max(2px,env(safe-area-inset-top));font:bold 9px monospace;color:#ff0;background:#000;border-bottom:1px solid #333;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#hud span{white-space:nowrap}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:3px 6px;padding-bottom:max(4px,env(safe-area-inset-bottom));background:#000;border-top:1px solid #333;display:flex;gap:3px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{font:bold 8px monospace;padding:4px 6px;border:1px solid #444;background:#0a0a0a;color:#0f0;cursor:pointer}
.btn:active{background:#1a1a00;color:#ff0}
.btn.sel{border-color:#ff0;color:#ff0}
#msg{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:15;font:bold 14px monospace;color:#ff0;background:#000;padding:6px 12px;border:1px solid #ff0;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center}
#msg.show{opacity:1}
#log{position:fixed;top:22px;right:4px;z-index:10;font:8px monospace;color:#888;pointer-events:none;text-align:right;max-width:140px;overflow:hidden}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <span id="dayInfo">Day 1</span>
  <span id="popInfo" style="color:#0f0">Pop:0</span>
  <span id="foodInfo" style="color:#f80">Food:0</span>
  <span id="woodInfo" style="color:#8b6914">Wood:0</span>
  <span id="stoneInfo" style="color:#888">Stone:0</span>
  <span id="goldInfo" style="color:#ff0">Gold:0</span>
  <span id="happyInfo" style="color:#f0f">Joy:50</span>
  <span id="techInfo" style="color:#0ff">Age:1</span>
  <span style="margin-left:auto;color:#555" id="fps"></span>
</div>
<div id="ui">
  <button class="btn sel" onclick="setTool('select')" id="tSelect">Select</button>
  <button class="btn" onclick="setTool('house')" id="tHouse">House</button>
  <button class="btn" onclick="setTool('farm')" id="tFarm">Farm</button>
  <button class="btn" onclick="setTool('mine')" id="tMine">Mine</button>
  <button class="btn" onclick="setTool('lumber')" id="tLumber">Lumber</button>
  <button class="btn" onclick="setTool('market')" id="tMarket">Market</button>
  <button class="btn" onclick="setTool('temple')" id="tTemple">Temple</button>
  <button class="btn" onclick="setTool('barracks')" id="tBarracks">Barracks</button>
  <button class="btn" onclick="setTool('wall')" id="tWall">Wall</button>
  <button class="btn" onclick="setTool('tower')" id="tTower">Tower</button>
  <button class="btn" onclick="toggleAuto()" id="autoBtn" style="color:#0ff">Auto:ON</button>
  <button class="btn" onclick="toggleSpeed()" id="speedBtn">1x</button>
</div>
<div id="msg"></div>
<div id="log"></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H,GS=7,GW,GH;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;GW=Math.floor(W/GS);GH=Math.floor(H/GS)}
resize();onresize=resize;

let day=1,food=30,wood=20,stone=10,gold=0,happiness=50,techAge=1;
let speed=1,tool='select',msgTimer,autoMode=true;
let grid,entities,buildings,particles,animals,logLines=[];
const TERRAIN={water:0,grass:1,sand:2,forest:3,mountain:4,dirt:5,farmland:6,road:7};
const TCOL={0:'#2060a0',1:'#3a8a3a',2:'#c0a060',3:'#1a6a1a',4:'#888',5:'#6a5a3a',6:'#6a7a2a',7:'#5a5a4a'};

function generateWorld(){
  grid=[];
  for(let y=0;y<GH;y++){grid[y]=[];for(let x=0;x<GW;x++){
    const n=Math.sin(x*.06)*5+Math.sin(y*.08)*4+Math.sin((x+y)*.04)*6+Math.random()*3;
    if(n<3)grid[y][x]=TERRAIN.water;
    else if(n<5)grid[y][x]=TERRAIN.sand;
    else if(n<9)grid[y][x]=TERRAIN.grass;
    else if(n<12)grid[y][x]=TERRAIN.forest;
    else grid[y][x]=TERRAIN.mountain;
  }}
}

const BT={
  house:{name:'House',w:2,h:2,color:'#a06030',roof:'#c04040',costW:5,costS:0,costG:0,pop:2,prod:null},
  farm:{name:'Farm',w:3,h:2,color:'#8b6914',roof:null,costW:3,costS:0,costG:0,pop:0,prod:{food:3}},
  mine:{name:'Mine',w:2,h:2,color:'#666',roof:'#555',costW:3,costS:0,costG:0,pop:0,prod:{stone:1,gold:.2}},
  lumber:{name:'Lumber Mill',w:2,h:2,color:'#5a3a1a',roof:'#704020',costW:4,costS:2,costG:0,pop:0,prod:{wood:2}},
  market:{name:'Market',w:3,h:2,color:'#c09040',roof:'#f0c060',costW:6,costS:4,costG:0,pop:0,prod:{gold:1},happy:10},
  temple:{name:'Temple',w:2,h:3,color:'#d0d0f0',roof:'#a0a0ff',costW:8,costS:10,costG:5,pop:0,prod:null,happy:25},
  barracks:{name:'Barracks',w:3,h:2,color:'#604040',roof:'#804040',costW:8,costS:6,costG:2,pop:0,prod:null,spawnsGuard:true},
  wall:{name:'Wall',w:1,h:1,color:'#999',roof:null,costW:0,costS:2,costG:0,pop:0,prod:null,hp:60},
  tower:{name:'Tower',w:1,h:2,color:'#aaa',roof:'#ff0',costW:0,costS:6,costG:1,pop:0,prod:null,hp:100,attacks:true,range:7},
};

const JOBS=['gatherer','woodcutter','farmer','miner','builder','soldier','trader'];
const JOB_COL={gatherer:'#08f',woodcutter:'#0a0',farmer:'#880',miner:'#888',builder:'#c80',soldier:'#f00',trader:'#ff0'};

function addLog(txt){
  logLines.unshift(txt);
  if(logLines.length>8)logLines.pop();
  document.getElementById('log').innerHTML=logLines.map(l=>'<div>'+l+'</div>').join('');
}

function init(){
  generateWorld();
  entities=[];buildings=[];particles=[];animals=[];logLines=[];
  const cx=Math.floor(GW/2),cy=Math.floor(GH/2);
  for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
    const tx=cx+dx,ty=cy+dy;
    if(tx>=0&&tx<GW&&ty>=0&&ty<GH&&grid[ty][tx]!==TERRAIN.water)grid[ty][tx]=TERRAIN.grass;
  }
  for(let i=0;i<6;i++){
    entities.push(makeVillager(cx+Math.random()*4-2,cy+Math.random()*4-2,JOBS[i%3],cx,cy));
  }
  // starter animals
  for(let i=0;i<4;i++) animals.push(makeAnimal(cx+Math.random()*10-5,cy+Math.random()*10-5,'chicken'));
  for(let i=0;i<2;i++) animals.push(makeAnimal(cx+Math.random()*10-5,cy+Math.random()*10-5,'cow'));
  food=30;wood=20;stone=10;gold=0;happiness=50;techAge=1;day=1;
  addLog('Village founded!');
}

function makeVillager(x,y,job,hx,hy){
  return{x,y,type:'villager',hp:25,maxHp:25,hunger:60,job:job||'gatherer',
    target:null,timer:Math.random()*2,carrying:null,carryAmt:0,homeX:hx||x,homeY:hy||y,
    atk:3,lvl:1,xp:0,morale:50,idle:0};
}

function makeAnimal(x,y,kind){
  return{x,y,kind,timer:Math.random()*5,hp:kind==='cow'?15:5,
    prodTimer:0,prodRate:kind==='cow'?8:4,prodAmt:kind==='cow'?2:1,
    vx:0,vy:0};
}

function showMsg(txt,dur){
  const el=document.getElementById('msg');el.textContent=txt;el.classList.add('show');
  clearTimeout(msgTimer);msgTimer=setTimeout(()=>el.classList.remove('show'),dur||2000);
}

function setTool(t){
  tool=t;
  document.querySelectorAll('#ui .btn').forEach(b=>b.classList.remove('sel'));
  const id='t'+t.charAt(0).toUpperCase()+t.slice(1);
  const el=document.getElementById(id);
  if(el)el.classList.add('sel');
}

let gameSpeed=1;
function toggleSpeed(){gameSpeed=gameSpeed===1?2:gameSpeed===2?4:gameSpeed===4?8:gameSpeed===8?16:gameSpeed===16?32:1;document.getElementById('speedBtn').textContent=gameSpeed+'x';}
function toggleAuto(){autoMode=!autoMode;document.getElementById('autoBtn').textContent='Auto:'+(autoMode?'ON':'OFF');document.getElementById('autoBtn').style.color=autoMode?'#0ff':'#666';}

function canBuild(bt,gx,gy){
  if(bt.costW>wood||bt.costS>stone||bt.costG>gold)return false;
  for(let dy=0;dy<bt.h;dy++)for(let dx=0;dx<bt.w;dx++){
    const tx=gx+dx,ty=gy+dy;
    if(tx<0||tx>=GW||ty<0||ty>=GH)return false;
    if(grid[ty][tx]===TERRAIN.water||grid[ty][tx]===TERRAIN.mountain)return false;
  }
  for(const b of buildings){
    if(gx<b.x+b.bt.w&&gx+bt.w>b.x&&gy<b.y+b.bt.h&&gy+bt.h>b.y)return false;
  }
  return true;
}

function placeBuild(key,gx,gy){
  const bt=BT[key];if(!bt)return false;
  if(!canBuild(bt,gx,gy))return false;
  wood-=bt.costW;stone-=bt.costS;gold-=bt.costG;
  buildings.push({x:gx,y:gy,bt:bt,key:key,hp:bt.hp||40,maxHp:bt.hp||40,guardTimer:0});
  for(let dy=0;dy<bt.h;dy++)for(let dx=0;dx<bt.w;dx++){
    const ty=gy+dy,tx=gx+dx;
    grid[ty][tx]=key==='farm'?TERRAIN.farmland:TERRAIN.dirt;
  }
  if(bt.pop>0){
    for(let i=0;i<bt.pop;i++){
      entities.push(makeVillager(gx+Math.random()*bt.w,gy+bt.h,autoAssignJob(),gx,gy));
    }
  }
  if(bt.happy)happiness=Math.min(100,happiness+bt.happy);
  for(let k=0;k<5;k++)particles.push({x:(gx+bt.w/2)*GS,y:(gy+bt.h/2)*GS,vx:(Math.random()-.5)*3,vy:-1-Math.random()*2,life:15,color:'#8b6914'});
  addLog('Built '+bt.name);
  return true;
}

cv.addEventListener('click',e=>{
  const gx=Math.floor(e.clientX/GS),gy=Math.floor(e.clientY/GS);
  if(tool==='select')return;
  if(!placeBuild(tool,gx,gy)){
    const bt=BT[tool];
    if(!bt)return;
    if(bt.costW>wood||bt.costS>stone||bt.costG>gold)showMsg('Not enough resources',1200);
    else showMsg("Can't build here",1000);
  }
});

function autoAssignJob(){
  const vils=entities.filter(e=>e.type==='villager');
  const counts={};
  for(const j of JOBS)counts[j]=0;
  for(const v of vils)counts[v.job]=(counts[v.job]||0)+1;

  const hasFarm=buildings.some(b=>b.key==='farm');
  const hasMine=buildings.some(b=>b.key==='mine');
  const hasMarket=buildings.some(b=>b.key==='market');
  const hasBarracks=buildings.some(b=>b.key==='barracks');
  const enemies=entities.filter(e=>e.type==='enemy').length;

  if(enemies>0&&counts.soldier<Math.max(2,enemies))return'soldier';
  if(food<entities.length*3&&hasFarm&&counts.farmer<3)return'farmer';
  if(wood<10&&counts.woodcutter<2)return'woodcutter';
  if(hasMine&&counts.miner<2)return'miner';
  if(hasMarket&&counts.trader<1)return'trader';
  if(counts.farmer<1&&hasFarm)return'farmer';
  return'gatherer';
}

function rebalanceJobs(){
  const vils=entities.filter(e=>e.type==='villager');
  if(vils.length===0)return;
  for(const v of vils){
    if(v.idle>10||Math.random()<0.02){
      v.job=autoAssignJob();
      v.idle=0;
    }
  }
}

// ═══════════════════════════════════════
// AUTO-BUILD AI
// ═══════════════════════════════════════
let autoBuildTimer=0;
function autoBuildTick(){
  autoBuildTimer++;
  if(autoBuildTimer<120)return;
  autoBuildTimer=0;
  if(!autoMode)return;

  const vils=entities.filter(e=>e.type==='villager').length;
  const bc={};for(const b of buildings)bc[b.key]=(bc[b.key]||0)+1;
  const cx=Math.floor(GW/2),cy=Math.floor(GH/2);

  function tryBuild(key,priority){
    const bt=BT[key];
    for(let attempt=0;attempt<40;attempt++){
      const gx=cx+Math.floor(Math.random()*20-10);
      const gy=cy+Math.floor(Math.random()*20-10);
      if(canBuild(bt,gx,gy)){placeBuild(key,gx,gy);return true;}
    }
    return false;
  }

  // Priority logic
  if(vils<4||(food>vils*5&&wood>10&&!(bc.house>vils/2)))tryBuild('house');
  else if(food<vils*4&&(bc.farm||0)<Math.ceil(vils/4))tryBuild('farm');
  else if(wood<15&&(bc.lumber||0)<2)tryBuild('lumber');
  else if((bc.mine||0)<1&&stone<10)tryBuild('mine');
  else if((bc.market||0)<1&&wood>8&&stone>6)tryBuild('market');
  else if(happiness<40&&(bc.temple||0)<1&&stone>12&&gold>5)tryBuild('temple');
  else if(day>15&&(bc.barracks||0)<1&&wood>10)tryBuild('barracks');
  else if(day>10&&(bc.tower||0)<Math.floor(day/15)+1)tryBuild('tower');
  else if(stone>8&&(bc.wall||0)<vils&&day>8)tryBuild('wall');
  else if(vils>3&&food>vils*3)tryBuild('house');
}

// ═══════════════════════════════════════
// TECH AGES
// ═══════════════════════════════════════
function checkTechAge(){
  const vils=entities.filter(e=>e.type==='villager').length;
  const bc={};for(const b of buildings)bc[b.key]=(bc[b.key]||0)+1;
  if(techAge===1&&vils>=10&&(bc.farm||0)>=2){techAge=2;addLog('Age 2: Bronze Age!');happiness=Math.min(100,happiness+15);}
  if(techAge===2&&vils>=20&&(bc.market||0)>=1&&(bc.mine||0)>=2){techAge=3;addLog('Age 3: Iron Age!');happiness=Math.min(100,happiness+15);}
  if(techAge===3&&vils>=35&&(bc.temple||0)>=1&&gold>=20){techAge=4;addLog('Age 4: Golden Age!');happiness=Math.min(100,happiness+20);}
  if(techAge===4&&vils>=50&&(bc.barracks||0)>=2&&day>=100){techAge=5;addLog('Age 5: Imperial!');happiness=Math.min(100,happiness+20);}
}

// ═══════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════
function update(dt){
  dt*=gameSpeed;
  const dayLen=30;
  day+=dt/dayLen;

  // Enemy raids - scale with day
  const raidInterval=Math.max(3,8-Math.floor(day/20));
  if(Math.floor(day)%raidInterval===0&&Math.random()<.002*gameSpeed){
    const count=Math.floor(1+day/10+Math.random()*day/15);
    const side=Math.random();
    for(let i=0;i<count;i++){
      let ex,ey;
      if(side<.25){ex=1;ey=2+Math.random()*(GH-4);}
      else if(side<.5){ex=GW-2;ey=2+Math.random()*(GH-4);}
      else if(side<.75){ex=2+Math.random()*(GW-4);ey=1;}
      else{ex=2+Math.random()*(GW-4);ey=GH-2;}
      const hp=12+Math.floor(day*1.2)+techAge*5;
      entities.push({x:ex,y:ey,type:'enemy',hp:hp,maxHp:hp,target:null,timer:0,atk:2+Math.floor(day/5)+techAge,
        kind:Math.random()<.3?'boss':'normal'});
    }
    addLog('Raid! '+count+' enemies!');
  }

  // Update entities
  for(let i=entities.length-1;i>=0;i--){
    const e=entities[i];e.timer+=dt;
    if(e.type==='villager'){
      e.hunger-=dt*.25;
      if(e.hunger<=0){e.hp-=dt*1.5;if(e.hp<=0){entities.splice(i,1);addLog('Villager starved!');continue;}}
      if(e.hunger<25&&food>0){e.hunger=Math.min(100,e.hunger+35);food--;}

      // XP and leveling
      e.xp+=dt*0.1;
      if(e.xp>=e.lvl*10){e.lvl++;e.xp=0;e.maxHp+=3;e.hp=Math.min(e.hp+5,e.maxHp);e.atk+=1;}

      // Job AI
      if(e.timer>1.5){
        e.timer=0;
        if(e.job==='woodcutter'){
          let best=null,bd=999;
          for(let dy=-10;dy<=10;dy++)for(let dx=-10;dx<=10;dx++){
            const tx=Math.floor(e.x)+dx,ty=Math.floor(e.y)+dy;
            if(tx>=0&&tx<GW&&ty>=0&&ty<GH&&grid[ty][tx]===TERRAIN.forest){
              const d=Math.abs(dx)+Math.abs(dy);if(d<bd){bd=d;best={x:tx,y:ty};}}}
          e.target=best||{x:e.x+Math.random()*8-4,y:e.y+Math.random()*8-4};
        }else if(e.job==='farmer'){
          let best=null,bd=999;
          for(const b of buildings){if(b.key==='farm'){const d=Math.hypot(b.x-e.x,b.y-e.y);if(d<bd){bd=d;best={x:b.x+1,y:b.y+1};}}}
          e.target=best||{x:e.x+Math.random()*6-3,y:e.y+Math.random()*6-3};
        }else if(e.job==='miner'){
          let best=null,bd=999;
          for(const b of buildings){if(b.key==='mine'){const d=Math.hypot(b.x-e.x,b.y-e.y);if(d<bd){bd=d;best={x:b.x+1,y:b.y+1};}}}
          if(!best){for(let dy=-8;dy<=8;dy++)for(let dx=-8;dx<=8;dx++){
            const tx=Math.floor(e.x)+dx,ty=Math.floor(e.y)+dy;
            if(tx>=0&&tx<GW&&ty>=0&&ty<GH&&grid[ty][tx]===TERRAIN.mountain){
              const d=Math.abs(dx)+Math.abs(dy);if(d<bd){bd=d;best={x:tx,y:ty};}}}}
          e.target=best||{x:e.x+Math.random()*6-3,y:e.y+Math.random()*6-3};
        }else if(e.job==='soldier'){
          let closest=null,cd=999;
          for(const en of entities){if(en.type==='enemy'){const d=Math.hypot(en.x-e.x,en.y-e.y);if(d<cd){cd=d;closest=en;}}}
          if(closest)e.target={x:closest.x,y:closest.y,entity:closest};
          else e.target={x:e.homeX+Math.random()*4-2,y:e.homeY+Math.random()*4-2};
        }else if(e.job==='trader'){
          let best=null,bd=999;
          for(const b of buildings){if(b.key==='market'){const d=Math.hypot(b.x-e.x,b.y-e.y);if(d<bd){bd=d;best={x:b.x+1,y:b.y+1};}}}
          e.target=best||{x:e.x+Math.random()*6-3,y:e.y+Math.random()*6-3};
        }else{
          // gatherer
          const cx=Math.floor(GW/2),cy=Math.floor(GH/2);
          e.target={x:cx+Math.random()*16-8,y:cy+Math.random()*16-8};
        }
      }

      // Move toward target
      if(e.target){
        const dx=e.target.x-e.x,dy=e.target.y-e.y,d=Math.hypot(dx,dy);
        if(d>.5){
          const spd=(e.job==='soldier'?1.2:.8)*dt*(1+techAge*.1);
          e.x+=dx/d*spd;e.y+=dy/d*spd;
          e.idle=0;
        }else{
          e.idle+=dt;
          // Arrived — do work
          if(e.job==='woodcutter'){
            const tx=Math.floor(e.target.x),ty=Math.floor(e.target.y);
            if(tx>=0&&tx<GW&&ty>=0&&ty<GH&&grid[ty][tx]===TERRAIN.forest){
              grid[ty][tx]=TERRAIN.grass;wood+=1+Math.floor(techAge*.3);
              particles.push({x:tx*GS+GS/2,y:ty*GS+GS/2,vx:0,vy:-1,life:20,color:'#0f0'});
            }
          }else if(e.job==='farmer'&&Math.random()<.1*dt){
            food+=.5+techAge*.2;
          }else if(e.job==='miner'&&Math.random()<.08*dt){
            stone+=.3;if(Math.random()<.15)gold+=.1;
          }else if(e.job==='trader'&&Math.random()<.05*dt){
            gold+=.2+techAge*.1;
          }else if(e.job==='soldier'&&e.target.entity){
            const en=e.target.entity;
            if(en.hp>0&&Math.hypot(en.x-e.x,en.y-e.y)<1.5){
              if(e.timer>.3){e.timer=0;en.hp-=e.atk+e.lvl;
                particles.push({x:en.x*GS,y:en.y*GS,vx:(Math.random()-.5)*2,vy:-1,life:8,color:'#ff0'});}
            }
          }else if(e.job==='gatherer'){
            if(Math.random()<.03*dt){
              const r=Math.random();
              if(r<.5)food+=.3;else if(r<.8)wood+=.2;else stone+=.1;
            }
          }
          e.target=null;
        }
      }
      e.x=Math.max(.5,Math.min(GW-.5,e.x));e.y=Math.max(.5,Math.min(GH-.5,e.y));

    }else if(e.type==='enemy'){
      let closest=null,cd=999;
      for(const v of entities){if(v.type==='villager'){const d=Math.hypot(v.x-e.x,v.y-e.y);if(d<cd){cd=d;closest=v;}}}
      if(!closest){for(const b of buildings){const d=Math.hypot(b.x+1-e.x,b.y+1-e.y);if(d<cd){cd=d;closest={x:b.x+1,y:b.y+1,building:b};}}}
      if(closest){
        const tx=closest.x,ty=closest.y;
        const dx=tx-e.x,dy=ty-e.y,d=Math.hypot(dx,dy);
        if(d>1){const spd=(.5+e.kind==='boss'?.3:0)*dt;e.x+=dx/d*spd;e.y+=dy/d*spd;}
        else if(e.timer>1.2){
          e.timer=0;
          if(closest.hp!==undefined){closest.hp-=e.atk;if(closest.hp<=0){
            if(closest.type==='villager'){entities.splice(entities.indexOf(closest),1);addLog('Villager killed!');}
          }}
          if(closest.building){closest.building.hp-=e.atk;if(closest.building.hp<=0){
            buildings.splice(buildings.indexOf(closest.building),1);addLog(closest.building.bt.name+' destroyed!');}}
        }
      }
      // Tower attacks
      for(const b of buildings){
        if(!b.bt.attacks)continue;
        const r=b.bt.range||6;
        const td=Math.hypot(b.x+.5-e.x,b.y+1-e.y);
        if(td<r&&Math.random()<.03*gameSpeed*(1+techAge*.2)){
          e.hp-=4+techAge*2;
          particles.push({x:e.x*GS,y:e.y*GS,vx:(Math.random()-.5)*2,vy:-2,life:10,color:'#ff0'});
        }
      }
      if(e.hp<=0){
        for(let k=0;k<6;k++)particles.push({x:e.x*GS,y:e.y*GS,vx:(Math.random()-.5)*3,vy:-1-Math.random()*2,life:15,color:'#f44'});
        gold+=e.kind==='boss'?3:1;
        entities.splice(i,1);continue;
      }
    }
  }

  // Barracks spawn guards
  for(const b of buildings){
    if(b.bt.spawnsGuard){
      b.guardTimer=(b.guardTimer||0)+dt;
      const soldiers=entities.filter(e=>e.type==='villager'&&e.job==='soldier').length;
      if(b.guardTimer>15&&soldiers<5+techAge*2&&food>10){
        b.guardTimer=0;
        entities.push(makeVillager(b.x+1,b.y+2,'soldier',b.x,b.y));
        food-=3;
        addLog('Soldier trained');
      }
    }
  }

  // Building production
  for(const b of buildings){
    if(b.bt.prod){
      const mult=1+techAge*.15;
      if(b.bt.prod.food)food+=b.bt.prod.food*dt*.08*mult;
      if(b.bt.prod.stone)stone+=b.bt.prod.stone*dt*.08*mult;
      if(b.bt.prod.wood)wood+=b.bt.prod.wood*dt*.08*mult;
      if(b.bt.prod.gold)gold+=b.bt.prod.gold*dt*.08*mult;
    }
  }

  // Animals
  for(const a of animals){
    a.timer+=dt;a.prodTimer+=dt;
    if(a.timer>3){a.timer=0;a.vx=(Math.random()-.5)*.5;a.vy=(Math.random()-.5)*.5;}
    a.x+=a.vx*dt;a.y+=a.vy*dt;
    a.x=Math.max(1,Math.min(GW-1,a.x));a.y=Math.max(1,Math.min(GH-1,a.y));
    if(a.prodTimer>a.prodRate){
      a.prodTimer=0;
      food+=a.prodAmt;
    }
    // breed
    if(animals.length<20+techAge*5&&Math.random()<.0003*dt){
      animals.push(makeAnimal(a.x+Math.random()*2-1,a.y+Math.random()*2-1,a.kind));
    }
  }

  // Happiness decay
  const vils=entities.filter(e=>e.type==='villager').length;
  const enemies=entities.filter(e=>e.type==='enemy').length;
  if(enemies>0)happiness=Math.max(0,happiness-dt*.5);
  if(food<vils)happiness=Math.max(0,happiness-dt*.3);
  if(food>vils*5)happiness=Math.min(100,happiness+dt*.05);

  // Natural forest regrowth
  if(Math.random()<.01*gameSpeed){
    const rx=(Math.random()*GW)|0,ry=(Math.random()*GH)|0;
    if(rx<GW&&ry<GH&&grid[ry][rx]===TERRAIN.grass){
      let nearForest=false;
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
        const tx=rx+dx,ty=ry+dy;
        if(tx>=0&&tx<GW&&ty>=0&&ty<GH&&grid[ty][tx]===TERRAIN.forest)nearForest=true;
      }
      if(nearForest)grid[ry][rx]=TERRAIN.forest;
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  // Auto-build & rebalance
  autoBuildTick();
  if(Math.random()<.01*gameSpeed)rebalanceJobs();
  if(Math.random()<.005*gameSpeed)checkTechAge();
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);

  const dayPhase=(day%1);
  const nightAlpha=dayPhase>.75?.35*(dayPhase-.75)*4:dayPhase<.2?.35*(1-dayPhase*5):0;

  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    const t=grid[y][x];
    ctx.fillStyle=TCOL[t]||'#000';
    ctx.fillRect(x*GS,y*GS,GS,GS);
    if(t===TERRAIN.forest&&(x+y)%3===0){ctx.fillStyle='#0a5a0a';ctx.fillRect(x*GS+1,y*GS,GS-2,GS-1);}
    if(t===TERRAIN.grass&&(x*7+y*13)%11===0){ctx.fillStyle='#4a9a4a';ctx.fillRect(x*GS+2,y*GS+2,2,2);}
    if(t===TERRAIN.farmland){
      if((x+y)%2===0){ctx.fillStyle='#7a8a3a';ctx.fillRect(x*GS+1,y*GS+1,GS-2,GS-2);}
      if(Math.sin(day*.5+x+y)>.5){ctx.fillStyle='#9aaa2a';ctx.fillRect(x*GS+2,y*GS,2,GS);}
    }
    if(t===TERRAIN.water){const w=Math.sin(performance.now()*.002+x+y)*.5+.5;ctx.fillStyle=`rgba(100,180,255,${w*.15})`;ctx.fillRect(x*GS,y*GS,GS,GS);}
  }

  // Buildings
  for(const b of buildings){
    const bx=b.x*GS,by=b.y*GS,bw=b.bt.w*GS,bh=b.bt.h*GS;
    ctx.fillStyle=b.bt.color;ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=shade(b.bt.color,25);ctx.fillRect(bx,by,bw,1);ctx.fillRect(bx,by,1,bh);
    ctx.fillStyle=shade(b.bt.color,-25);ctx.fillRect(bx+bw-1,by,1,bh);ctx.fillRect(bx,by+bh-1,bw,1);
    if(b.bt.roof){
      ctx.fillStyle=b.bt.roof;
      ctx.beginPath();ctx.moveTo(bx-1,by);ctx.lineTo(bx+bw/2,by-GS*.6);ctx.lineTo(bx+bw+1,by);ctx.fill();
    }
    if(b.hp<b.maxHp){
      ctx.fillStyle='#400';ctx.fillRect(bx,by-3,bw,2);
      ctx.fillStyle='#0f0';ctx.fillRect(bx,by-3,Math.floor(bw*b.hp/b.maxHp),2);
    }
  }

  // Animals
  for(const a of animals){
    const ax=a.x*GS,ay=a.y*GS;
    if(a.kind==='chicken'){
      ctx.fillStyle='#fff';ctx.fillRect(ax-1,ay-2,3,2);
      ctx.fillStyle='#f80';ctx.fillRect(ax,ay-3,1,1);
      ctx.fillStyle='#f00';ctx.fillRect(ax+1,ay-2,1,1);
    }else{
      ctx.fillStyle='#a86030';ctx.fillRect(ax-3,ay-3,6,3);
      ctx.fillStyle='#d0a060';ctx.fillRect(ax-2,ay-4,3,1);
      ctx.fillStyle='#fff';ctx.fillRect(ax-3,ay-4,1,1);
    }
  }

  // Entities
  for(const e of entities){
    const ex=e.x*GS,ey=e.y*GS;
    if(e.type==='villager'){
      ctx.fillStyle='#deb887';ctx.fillRect(ex-2,ey-4,4,4);
      ctx.fillStyle='#f5deb3';ctx.fillRect(ex-1,ey-6,3,2);
      ctx.fillStyle=JOB_COL[e.job]||'#888';
      ctx.fillRect(ex-1,ey-7,3,1);
      if(e.hunger<20){ctx.fillStyle='#f00';ctx.fillRect(ex-1,ey-9,2,1);}
      if(e.lvl>1){ctx.fillStyle='#ff0';ctx.fillRect(ex+2,ey-6,1,1);}
    }else if(e.type==='enemy'){
      const boss=e.kind==='boss';
      const sz=boss?4:3;
      ctx.fillStyle=boss?'#800':'#a00';ctx.fillRect(ex-sz,ey-sz-1,sz*2,sz+1);
      ctx.fillStyle=boss?'#c00':'#f00';ctx.fillRect(ex-sz+1,ey-sz+1,sz*2-2,sz-1);
      ctx.fillStyle='#ff0';ctx.fillRect(ex-1,ey-sz,1,1);ctx.fillRect(ex+1,ey-sz,1,1);
      if(boss){ctx.fillStyle='#ff0';ctx.fillRect(ex-2,ey-sz-2,4,1);}
      ctx.fillStyle='#400';ctx.fillRect(ex-sz,ey-sz-3,sz*2,1);
      ctx.fillStyle='#f00';ctx.fillRect(ex-sz,ey-sz-3,Math.floor(sz*2*e.hp/e.maxHp),1);
    }
  }

  // Particles
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/15);ctx.fillStyle=p.color;
    ctx.fillRect(p.x-1,p.y-1,2,2);
  }
  ctx.globalAlpha=1;

  if(nightAlpha>0){ctx.fillStyle=`rgba(0,0,40,${nightAlpha})`;ctx.fillRect(0,0,W,H);}

  // HUD
  const vils=entities.filter(e=>e.type==='villager').length;
  const enemies=entities.filter(e=>e.type==='enemy').length;
  document.getElementById('dayInfo').textContent='Day '+Math.floor(day)+(enemies?' ⚔'+enemies:'');
  document.getElementById('popInfo').textContent='Pop:'+vils;
  document.getElementById('foodInfo').textContent='Food:'+Math.floor(food);
  document.getElementById('woodInfo').textContent='Wood:'+Math.floor(wood);
  document.getElementById('stoneInfo').textContent='Stone:'+Math.floor(stone);
  document.getElementById('goldInfo').textContent='Gold:'+Math.floor(gold);
  document.getElementById('happyInfo').textContent='Joy:'+Math.floor(happiness);
  document.getElementById('techInfo').textContent='Age:'+techAge;
}

function shade(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
  return'#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

init();
let lastT=performance.now(),fpsT=0,fpsC=0;
function loop(){
  const now=performance.now(),dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  fpsC++;fpsT+=dt;if(fpsT>1){document.getElementById('fps').textContent=fpsC+'fps';fpsC=0;fpsT=0;}
  update(dt);render();
  requestAnimationFrame(loop);
}
loop();
</script>
