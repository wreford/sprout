<style>

#startScreen{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#0a1628 0%,#1a3a5c 50%,#0a1628 100%);z-index:70;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#startScreen h1{font-size:28px;color:#ffd54f;margin-bottom:4px;text-shadow:2px 2px 8px rgba(0,0,0,0.5)}

<script>
"use strict";
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;

// ---- Audio ----
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let actx=null;
function ensureAudio(){if(!actx)actx=new AudioCtx()}
function playTone(freq,dur,type,vol){
  ensureAudio();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.15,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
}
function playNoise(dur,vol){
  ensureAudio();
  const sz=actx.sampleRate*dur,buf=actx.createBuffer(1,sz,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1);
  const s=actx.createBufferSource(),g=actx.createGain();
  s.buffer=buf;g.gain.setValueAtTime(vol||0.08,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  s.connect(g);g.connect(actx.destination);s.start();
}
function sndMotor(){playTone(80,0.15,'sawtooth',0.04)}
function sndCast(){playNoise(0.3,0.1);playTone(800,0.15,'sine',0.06)}
function sndSplash(){playNoise(0.2,0.12)}
function sndBite(){playTone(1200,0.08,'square',0.12);setTimeout(()=>playTone(1500,0.08,'square',0.12),100)}
function sndDrag(){playTone(300,0.2,'sawtooth',0.06)}
function sndHorn(){playTone(440,0.4,'square',0.15);setTimeout(()=>playTone(554,0.4,'square',0.15),200);setTimeout(()=>playTone(659,0.6,'square',0.15),400)}
function sndCheer(){for(let i=0;i<5;i++)setTimeout(()=>playNoise(0.2,0.05),i*100)}
function sndLost(){playTone(400,0.2,'sine',0.1);setTimeout(()=>playTone(300,0.3,'sine',0.1),200)}

// ---- Save Data ----
let saveData={lakes:[true,false,false],boatLevel:0,bestFinishes:[],history:[]};
function loadSave(){try{const d=localStorage.getItem('bassTournament');if(d)saveData=JSON.parse(d)}catch(e){}}
function doSave(){try{localStorage.setItem('bassTournament',JSON.stringify(saveData))}catch(e){}}
loadSave();

// ---- Lakes ----
const LAKES=[
  {name:'Pine Lake',color:'#1a5276',shoreColor:'#2d5016',structures:[
    {type:'lilypads',x:0.15,y:0.12,radius:0.05,fishChance:0.4,avgSize:1.5},
    {type:'dock',x:0.72,y:0.15,radius:0.035,fishChance:0.3,avgSize:2.0},
    {type:'fallen_tree',x:0.1,y:0.55,radius:0.04,fishChance:0.5,avgSize:1.8},
    {type:'rock_pile',x:0.6,y:0.65,radius:0.03,fishChance:0.35,avgSize:2.5},
    {type:'weed_bed',x:0.4,y:0.42,radius:0.06,fishChance:0.3,avgSize:1.2},
    {type:'point',x:0.82,y:0.3,radius:0.035,fishChance:0.25,avgSize:3.0},
    {type:'cove',x:0.12,y:0.78,radius:0.055,fishChance:0.45,avgSize:1.4},
    {type:'deep_hole',x:0.5,y:0.55,radius:0.04,fishChance:0.2,avgSize:3.2},
  ]},
  {name:'Cedar Reservoir',color:'#14425a',shoreColor:'#3a5c1e',structures:[
    {type:'lilypads',x:0.2,y:0.15,radius:0.06,fishChance:0.35,avgSize:1.6},
    {type:'dock',x:0.8,y:0.2,radius:0.03,fishChance:0.35,avgSize:2.2},
    {type:'fallen_tree',x:0.15,y:0.6,radius:0.045,fishChance:0.45,avgSize:2.0},
    {type:'rock_pile',x:0.65,y:0.7,radius:0.035,fishChance:0.4,avgSize:2.8},
    {type:'weed_bed',x:0.35,y:0.35,radius:0.055,fishChance:0.3,avgSize:1.3},
    {type:'point',x:0.75,y:0.45,radius:0.04,fishChance:0.3,avgSize:3.2},
    {type:'cove',x:0.1,y:0.82,radius:0.06,fishChance:0.4,avgSize:1.5},
    {type:'stump_field',x:0.45,y:0.5,radius:0.05,fishChance:0.35,avgSize:2.4},
    {type:'bridge',x:0.55,y:0.25,radius:0.035,fishChance:0.3,avgSize:2.6},
  ]},
  {name:'Hawg Heaven',color:'#0d3445',shoreColor:'#1e4a0e',structures:[
    {type:'lilypads',x:0.18,y:0.1,radius:0.07,fishChance:0.5,avgSize:2.0},
    {type:'dock',x:0.78,y:0.12,radius:0.04,fishChance:0.4,avgSize:2.8},
    {type:'fallen_tree',x:0.08,y:0.5,radius:0.05,fishChance:0.55,avgSize:2.5},
    {type:'rock_pile',x:0.7,y:0.6,radius:0.04,fishChance:0.45,avgSize:3.2},
    {type:'weed_bed',x:0.3,y:0.38,radius:0.06,fishChance:0.35,avgSize:1.8},
    {type:'point',x:0.85,y:0.35,radius:0.04,fishChance:0.35,avgSize:3.8},
    {type:'cove',x:0.1,y:0.85,radius:0.06,fishChance:0.5,avgSize:2.0},
    {type:'deep_hole',x:0.5,y:0.5,radius:0.045,fishChance:0.3,avgSize:4.0},
    {type:'stump_field',x:0.4,y:0.7,radius:0.05,fishChance:0.4,avgSize:2.6},
    {type:'bridge',x:0.6,y:0.18,radius:0.035,fishChance:0.35,avgSize:3.0},
  ]},
];

// ---- Lures ----
const LURES=[
  {name:'Spinnerbait',color:'#c0c0c0',desc:'Good around cover, stained water',bestStructures:['fallen_tree','stump_field','weed_bed'],timeMod:{morning:1.2,midday:0.9,evening:1.0},speedPref:0.6},
  {name:'Texas Rig Worm',color:'#8b4513',desc:'Slow finesse, works everywhere',bestStructures:['rock_pile','weed_bed','deep_hole','point'],timeMod:{morning:1.0,midday:1.3,evening:1.0},speedPref:0.3},
  {name:'Crankbait',color:'#ff6347',desc:'Covers water fast, bounces off structure',bestStructures:['point','rock_pile','bridge','stump_field'],timeMod:{morning:1.1,midday:1.0,evening:0.9},speedPref:0.7},
  {name:'Topwater Frog',color:'#228b22',desc:'Over lily pads, explosive strikes!',bestStructures:['lilypads','cove','weed_bed'],timeMod:{morning:1.3,midday:0.4,evening:1.5},speedPref:0.5},
  {name:'Jig',color:'#4a0080',desc:'Deep structure, biggest fish',bestStructures:['deep_hole','rock_pile','dock','fallen_tree','bridge'],timeMod:{morning:0.8,midday:1.4,evening:0.9},speedPref:0.35},
];

// ---- Game State ----
let state='start'; // start, playing, casting, retrieving, bite, fighting, weighin
let selectedLake=0, currentLure=0;
let gameTime=0, realTimeStart=0, GAME_DURATION=8*60; // 8 hours in game-minutes
let REAL_DURATION=300; // 5 minutes real-time in seconds

let boat={x:0.5,y:0.3,angle:0,targetX:0.5,targetY:0.3,speed:0};
let boatTrail=[];
let castTarget={x:0,y:0};
let castLine={active:false,progress:0,x:0,y:0,landed:false};
let retrieveSpeed=0.5, retrieveDragging=false;
let lurePos={x:0,y:0};
let biteTimer=0, biteActive=false, biteWindow=0;
let fightFish=null, tension=0.5, fightTime=0, reeling=false;
let ripples=[];
let livewell=[]; // [{weight,lure,time,alive}]
let aiAnglers=[];
let depthMap=null;
let tapTarget=null;
let motorTimer=0;
let notification={text:'',timer:0};
let lakePath=null;

// ---- Lake Shape ----
function genLakeShape(){
  const pts=[];
  const cx=0.5,cy=0.5;
  const n=24;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    let r=0.32+Math.sin(a*2)*0.06+Math.cos(a*3)*0.04+Math.sin(a*5+selectedLake)*0.03;
    r+=((Math.sin(i*7+selectedLake*3)*0.02));
    pts.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r});
  }
  return pts;
}

function isInLake(nx,ny){
  if(!lakePath)return false;
  const px=nx*W,py=ny*H;
  return X.isPointInPath(lakePath,px,py);
}

function buildLakePath(){
  const pts=genLakeShape();
  lakePath=new Path2D();
  lakePath.moveTo(pts[0].x*W,pts[0].y*H);
  for(let i=1;i<=pts.length;i++){
    const p0=pts[(i-1)%pts.length];
    const p1=pts[i%pts.length];
    const p2=pts[(i+1)%pts.length];
    const cpx=p1.x*W, cpy=p1.y*H;
    const nx=((p1.x+p2.x)/2)*W, ny=((p1.y+p2.y)/2)*H;
    lakePath.quadraticCurveTo(cpx,cpy,nx,ny);
  }
  lakePath.closePath();
}

// ---- Depth ----
function getDepth(nx,ny){
  if(!isInLake(nx,ny))return 0;
  const cx=0.5,cy=0.5;
  const d=Math.sqrt((nx-cx)**2+(ny-cy)**2);
  const maxR=0.35;
  let depth=1-d/maxR;
  depth=Math.max(0,Math.min(1,depth));
  // structures add depth variation
  const lake=LAKES[selectedLake];
  for(const s of lake.structures){
    const sd=Math.sqrt((nx-s.x)**2+(ny-s.y)**2);
    if(sd<s.radius*1.5){
      if(s.type==='deep_hole')depth=Math.min(1,depth+0.3*(1-sd/(s.radius*1.5)));
      else if(s.type==='lilypads'||s.type==='cove')depth=Math.max(0,depth-0.2*(1-sd/(s.radius*1.5)));
    }
  }
  return depth;
}

// ---- Time of Day ----
function getGameHour(){return 5+gameTime/60} // 5AM + minutes
function getTimeOfDay(){
  const h=getGameHour();
  if(h<7.5)return'morning';
  if(h<11)return'midday';
  return'evening';
}
function getTimeStr(){
  const totalMin=5*60+gameTime;
  const h=Math.floor(totalMin/60);
  const m=Math.floor(totalMin%60);
  const ampm=h>=12?'PM':'AM';
  const dh=h>12?h-12:h;
  return dh+':'+(m<10?'0':'')+m+' '+ampm;
}
function getSkyColor(){
  const h=getGameHour();
  if(h<5.5)return{top:'#0a0a2e',bot:'#1a1a3a',water:0.15};
  if(h<6.5)return{top:'#1a2a4a',bot:'#ff8c42',water:0.3};
  if(h<8)return{top:'#4a8ec9',bot:'#87ceeb',water:0.6};
  if(h<11)return{top:'#2980b9',bot:'#87ceeb',water:0.8};
  if(h<12)return{top:'#4a8ec9',bot:'#e8a87c',water:0.6};
  return{top:'#3a6ea5',bot:'#d4956b',water:0.5};
}

// ---- AI Anglers ----
const AI_NAMES=['Jake "BigBait"','Captain Earl','Dusty Rhodes','Mama Jean'];
function initAI(){
  aiAnglers=AI_NAMES.map(name=>{
    const skill=0.5+Math.random()*0.5;
    return{name,skill,fish:[],totalWeight:0,bigBass:0,nextCatch:10+Math.random()*30};
  });
}
function updateAI(dt){
  const tod=getTimeOfDay();
  for(const ai of aiAnglers){
    ai.nextCatch-=dt;
    if(ai.nextCatch<=0){
      const chance=ai.skill*(tod==='midday'?0.6:1.0);
      if(Math.random()<chance){
        const lake=LAKES[selectedLake];
        const struct=lake.structures[Math.floor(Math.random()*lake.structures.length)];
        let wt=struct.avgSize*(0.5+Math.random()*1.0)*ai.skill;
        wt=Math.round(wt*100)/100;
        if(wt>0.3){
          ai.fish.push(wt);
          ai.fish.sort((a,b)=>b-a);
          if(ai.fish.length>5)ai.fish.pop();
          ai.totalWeight=ai.fish.reduce((s,v)=>s+v,0);
          ai.totalWeight=Math.round(ai.totalWeight*100)/100;
          ai.bigBass=Math.max(ai.bigBass,wt);
        }
      }
      ai.nextCatch=15+Math.random()*45;
    }
  }
}

// ---- Structures Rendering ----
function drawStructure(s,lake){
  const sx=s.x*W,sy=s.y*H,sr=s.radius*Math.min(W,H);
  const bd=Math.sqrt((boat.x-s.x)**2+(boat.y-s.y)**2);
  const near=bd<s.radius*2.5;
  X.save();
  X.globalAlpha=near?0.9:0.6;
  switch(s.type){
    case'lilypads':
      X.fillStyle='#2d7d2d';
      for(let i=0;i<8;i++){
        const a=i*0.785+s.x*10;
        const px=sx+Math.cos(a)*sr*0.6;
        const py=sy+Math.sin(a)*sr*0.6;
        const r2=sr*0.15+Math.sin(i*3)*sr*0.05;
        X.beginPath();X.arc(px,py,r2,0,Math.PI*2);X.fill();
        X.fillStyle='#1a5c1a';
        X.beginPath();X.arc(px+r2*0.3,py-r2*0.2,r2*0.3,0,Math.PI*2);X.fill();
        X.fillStyle='#2d7d2d';
      }
      break;
    case'dock':
      X.fillStyle='#8B7355';
      X.fillRect(sx-sr*0.6,sy-sr*0.1,sr*1.2,sr*0.2);
      X.fillRect(sx-sr*0.6,sy-sr*0.4,sr*0.15,sr*0.8);
      X.fillRect(sx+sr*0.45,sy-sr*0.4,sr*0.15,sr*0.8);
      X.strokeStyle='#6b5b45';X.lineWidth=1;
      X.strokeRect(sx-sr*0.6,sy-sr*0.1,sr*1.2,sr*0.2);
      break;
    case'fallen_tree':
      X.strokeStyle='#5c4033';X.lineWidth=sr*0.12;X.lineCap='round';
      X.beginPath();X.moveTo(sx-sr*0.8,sy-sr*0.3);
      X.lineTo(sx+sr*0.5,sy+sr*0.4);X.stroke();
      X.strokeStyle='#4a3328';X.lineWidth=sr*0.06;
      X.beginPath();X.moveTo(sx,sy);X.lineTo(sx+sr*0.3,sy-sr*0.3);X.stroke();
      X.beginPath();X.moveTo(sx-sr*0.2,sy-sr*0.1);X.lineTo(sx-sr*0.1,sy-sr*0.4);X.stroke();
      break;
    case'rock_pile':
      X.fillStyle='#7a7a7a';
      for(let i=0;i<5;i++){
        const a=i*1.26+s.y*5;
        const px=sx+Math.cos(a)*sr*0.4;
        const py=sy+Math.sin(a)*sr*0.4;
        X.beginPath();X.arc(px,py,sr*0.2+i*sr*0.02,0,Math.PI*2);X.fill();
      }
      X.fillStyle='#6a6a6a';
      X.beginPath();X.arc(sx,sy,sr*0.25,0,Math.PI*2);X.fill();
      break;
    case'weed_bed':
      X.fillStyle='#1a6b1a';X.globalAlpha*=0.5;
      X.beginPath();X.arc(sx,sy,sr,0,Math.PI*2);X.fill();
      X.fillStyle='#2a8a2a';
      for(let i=0;i<12;i++){
        const a=i*0.524+s.x*7;
        const px=sx+Math.cos(a)*sr*0.7;
        const py=sy+Math.sin(a)*sr*0.7;
        X.beginPath();X.arc(px,py,sr*0.12,0,Math.PI*2);X.fill();
      }
      break;
    case'point':
      X.fillStyle='#a08060';X.globalAlpha*=0.6;
      X.beginPath();X.moveTo(sx-sr,sy+sr*0.5);
      X.lineTo(sx+sr,sy+sr*0.3);X.lineTo(sx+sr*0.3,sy-sr*0.8);X.closePath();X.fill();
      break;
    case'cove':
      X.strokeStyle='#3a6b2a';X.lineWidth=sr*0.15;
      X.beginPath();X.arc(sx,sy,sr,0.5,5.5);X.stroke();
      break;
    case'deep_hole':
      const dg=X.createRadialGradient(sx,sy,0,sx,sy,sr);
      dg.addColorStop(0,'rgba(0,10,30,0.5)');dg.addColorStop(1,'rgba(0,10,30,0)');
      X.fillStyle=dg;X.beginPath();X.arc(sx,sy,sr,0,Math.PI*2);X.fill();
      break;
    case'stump_field':
      X.fillStyle='#5c4033';
      for(let i=0;i<6;i++){
        const a=i*1.05+s.x*8;
        const px=sx+Math.cos(a)*sr*0.6;
        const py=sy+Math.sin(a)*sr*0.6;
        X.beginPath();X.arc(px,py,sr*0.08,0,Math.PI*2);X.fill();
      }
      break;
    case'bridge':
      X.fillStyle='#888';
      X.fillRect(sx-sr*0.8,sy-sr*0.08,sr*1.6,sr*0.16);
      X.fillStyle='#777';
      X.fillRect(sx-sr*0.7,sy-sr*0.15,sr*0.08,sr*0.3);
      X.fillRect(sx+sr*0.62,sy-sr*0.15,sr*0.08,sr*0.3);
      break;
  }
  // highlight ring when near
  if(near){
    X.globalAlpha=0.3+Math.sin(Date.now()/300)*0.15;
    X.strokeStyle='#ffd54f';X.lineWidth=2;
    X.beginPath();X.arc(sx,sy,sr+4,0,Math.PI*2);X.stroke();
  }
  X.restore();
}

// ---- Drawing ----
function drawLake(){
  const sky=getSkyColor();
  // Sky gradient
  const sg=X.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,sky.top);sg.addColorStop(1,sky.bot);
  X.fillStyle=sg;X.fillRect(0,0,W,H);
  // Shore
  X.save();
  X.fillStyle=LAKES[selectedLake].shoreColor;
  X.fillRect(0,0,W,H);
  // Lake water
  const lake=LAKES[selectedLake];
  X.fillStyle=lake.color;
  X.fill(lakePath);
  // Depth shading
  const waterBright=sky.water;
  for(let d=0.8;d>0;d-=0.2){
    X.save();
    X.globalAlpha=0.15*waterBright;
    X.fillStyle=d>0.5?'#001a33':'#003366';
    X.beginPath();
    const pts=genLakeShape();
    const cx=0.5,cy=0.5;
    pts.forEach((p,i)=>{
      const nx=cx+(p.x-cx)*d;
      const ny=cy+(p.y-cy)*d;
      if(i===0)X.moveTo(nx*W,ny*H);
      else X.lineTo(nx*W,ny*H);
    });
    X.closePath();X.fill();
    X.restore();
  }
  // Shore trees
  X.fillStyle='#1a4a0a';
  const pts=genLakeShape();
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    const cx2=0.5,cy2=0.5;
    const dx=p.x-cx2,dy=p.y-cy2;
    const len=Math.sqrt(dx*dx+dy*dy);
    const nx=p.x+dx/len*0.04,ny=p.y+dy/len*0.04;
    const tr=Math.min(W,H)*0.02+Math.sin(i*5)*3;
    X.beginPath();X.arc(nx*W,ny*H,tr,0,Math.PI*2);X.fill();
  }
  X.restore();
  // Draw structures
  for(const s of lake.structures){
    drawStructure(s,lake);
  }
}

function drawBoat(){
  const bx=boat.x*W,by=boat.y*H;
  const sz=Math.min(W,H)*0.02;
  X.save();X.translate(bx,by);X.rotate(boat.angle);
  // Wake
  if(boat.speed>0.0005){
    X.globalAlpha=Math.min(0.4,boat.speed*200);
    X.fillStyle='rgba(200,220,255,0.3)';
    X.beginPath();
    X.moveTo(-sz*0.6,-sz*1.2);
    X.lineTo(-sz*2.5,-sz*3);
    X.lineTo(0,-sz*1.5);
    X.lineTo(sz*2.5,-sz*3);
    X.lineTo(sz*0.6,-sz*1.2);
    X.closePath();X.fill();
    X.globalAlpha=1;
  }
  // Boat body
  X.fillStyle='#ddd';
  X.beginPath();
  X.moveTo(0,sz*1.5);
  X.lineTo(-sz*0.8,-sz);
  X.lineTo(-sz*0.5,-sz*1.2);
  X.lineTo(0,-sz*0.8);
  X.lineTo(sz*0.5,-sz*1.2);
  X.lineTo(sz*0.8,-sz);
  X.closePath();X.fill();
  X.strokeStyle='#999';X.lineWidth=1;X.stroke();
  // Angler dot
  X.fillStyle='#e8c170';
  X.beginPath();X.arc(0,sz*0.2,sz*0.3,0,Math.PI*2);X.fill();
  X.restore();
}

function drawCastLine(){
  if(!castLine.active)return;
  const bx=boat.x*W,by=boat.y*H;
  const lx=castLine.x*W,ly=castLine.y*H;
  const p=castLine.progress;
  if(!castLine.landed){
    const cx2=bx+(lx-bx)*p;
    const cy2=by+(ly-by)*p-Math.sin(p*Math.PI)*40;
    X.strokeStyle='rgba(200,200,200,0.6)';X.lineWidth=1;
    X.beginPath();X.moveTo(bx,by);X.lineTo(cx2,cy2);X.stroke();
    // Lure dot
    X.fillStyle=LURES[currentLure].color;
    X.beginPath();X.arc(cx2,cy2,3,0,Math.PI*2);X.fill();
  } else {
    // Line from boat to lure position
    X.strokeStyle='rgba(200,200,200,0.5)';X.lineWidth=1;
    X.beginPath();X.moveTo(bx,by);X.lineTo(lurePos.x*W,lurePos.y*H);X.stroke();
    // Lure
    X.fillStyle=LURES[currentLure].color;
    X.beginPath();X.arc(lurePos.x*W,lurePos.y*H,4,0,Math.PI*2);X.fill();
    // Ripple at lure
    if(state==='retrieving'&&retrieveSpeed>0.1){
      X.strokeStyle='rgba(200,220,255,0.3)';X.lineWidth=1;
      const rr=6+Math.sin(Date.now()/100)*3;
      X.beginPath();X.arc(lurePos.x*W,lurePos.y*H,rr,0,Math.PI*2);X.stroke();
    }
  }
}

function drawRipples(){
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i];
    r.radius+=r.speed;
    r.alpha-=0.01;
    if(r.alpha<=0){ripples.splice(i,1);continue}
    X.strokeStyle=`rgba(200,220,255,${r.alpha})`;
    X.lineWidth=1;
    X.beginPath();X.arc(r.x*W,r.y*H,r.radius,0,Math.PI*2);X.stroke();
  }
}

function drawDepthContours(){
  X.save();
  X.globalAlpha=0.12;
  X.strokeStyle='#88aacc';X.lineWidth=0.5;
  for(let d=0.2;d<0.9;d+=0.2){
    X.beginPath();
    const pts=genLakeShape();
    const cx=0.5,cy=0.5;
    let first=true;
    for(const p of pts){
      const nx=cx+(p.x-cx)*(1-d*0.8);
      const ny=cy+(p.y-cy)*(1-d*0.8);
      if(first){X.moveTo(nx*W,ny*H);first=false}
      else X.lineTo(nx*W,ny*H);

    X.closePath();X.stroke();

// ---- Boat Movement ----
function updateBoat(dt){
  const dx=boat.targetX-boat.x;
  const dy=boat.targetY-boat.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>0.005){
    const boatSpd=(0.1+saveData.boatLevel*0.03)*dt;
    const moveAmt=Math.min(boatSpd,dist);
    boat.angle=Math.atan2(dy,dx)+Math.PI/2;
    boat.x+=dx/dist*moveAmt;
    boat.y+=dy/dist*moveAmt;
    boat.speed=moveAmt;
    motorTimer-=dt;
    if(motorTimer<=0){sndMotor();motorTimer=0.3}
    // Trail
    boatTrail.push({x:boat.x,y:boat.y,alpha:0.3});
    if(boatTrail.length>30)boatTrail.shift();
  } else {
    boat.speed=0;
  }
}

function drawBoatTrail(){
  for(let i=0;i<boatTrail.length;i++){
    const t=boatTrail[i];
    t.alpha-=0.005;
    if(t.alpha<=0)continue;
    X.fillStyle=`rgba(180,200,230,${t.alpha})`;
    X.beginPath();X.arc(t.x*W,t.y*H,2,0,Math.PI*2);X.fill();
  }
  boatTrail=boatTrail.filter(t=>t.alpha>0);
}

// ---- Fishing Logic ----
function getNearestStructure(nx,ny){
  const lake=LAKES[selectedLake];
  let best=null,bestDist=Infinity;
  for(const s of lake.structures){
    const d=Math.sqrt((nx-s.x)**2+(ny-s.y)**2);
    if(d<s.radius*1.8&&d<bestDist){bestDist=d;best=s}
  }
  return best;
}

function calcBiteChance(){
  const struct=getNearestStructure(lurePos.x,lurePos.y);
  let chance=0.05; // base open water
  if(struct){
    chance=struct.fishChance;
    // Lure match bonus
    const lure=LURES[currentLure];
    if(lure.bestStructures.includes(struct.type))chance*=1.5;
    // Speed match
    const speedDiff=Math.abs(retrieveSpeed-lure.speedPref);
    chance*=(1-speedDiff*0.5);
  }
  // Time of day
  const tod=getTimeOfDay();
  const lure=LURES[currentLure];
  chance*=lure.timeMod[tod];
  // Depth consideration
  if(currentLure===3){// topwater frog
    const depth=getDepth(lurePos.x,lurePos.y);
    if(depth>0.5)chance*=0.2; // bad in deep water
  }
  if(currentLure===4){// jig
    const depth=getDepth(lurePos.x,lurePos.y);
    chance*=0.5+depth; // better in deep water
  }
  return Math.min(0.8,Math.max(0.02,chance));
}

function calcFishSize(){
  const struct=getNearestStructure(lurePos.x,lurePos.y);
  let avg=1.0;
  if(struct)avg=struct.avgSize;
  // Jig bonus for big fish
  if(currentLure===4)avg*=1.2;
  // Random variation
  let wt=avg*(0.4+Math.random()*1.2);
  // Lunker chance near best structure
  if(struct&&Math.random()<0.08){
    wt=avg*(1.5+Math.random()*1.5); // lunker!
  }
  // Lake difficulty
  wt*=(0.8+selectedLake*0.15);
  return Math.round(Math.max(0.2,wt)*100)/100;
}

function startCast(){
  if(state!=='playing')return;
  const dx=castTarget.x-boat.x;
  const dy=castTarget.y-boat.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.02||!isInLake(castTarget.x,castTarget.y))return;
  // Limit cast distance
  const maxDist=0.2;
  if(dist>maxDist){
    castTarget.x=boat.x+dx/dist*maxDist;
    castTarget.y=boat.y+dy/dist*maxDist;
  }
  state='casting';
  castLine={active:true,progress:0,x:castTarget.x,y:castTarget.y,landed:false};
  sndCast();
  document.getElementById('castBtn').style.display='none';
}

function updateCast(dt){
  if(state!=='casting')return;
  castLine.progress+=dt*3;
  if(castLine.progress>=1){
    castLine.progress=1;
    castLine.landed=true;
    lurePos.x=castLine.x;
    lurePos.y=castLine.y;
    state='retrieving';
    sndSplash();
    ripples.push({x:lurePos.x,y:lurePos.y,radius:3,speed:0.8,alpha:0.5});
    document.getElementById('retrieveBar').style.display='block';
    document.getElementById('setBtn').style.display='inline-block';
    biteTimer=1+Math.random()*3;
    biteActive=false;
  }
}

function updateRetrieve(dt){
  if(state!=='retrieving')return;
  // Move lure toward boat
  const dx=boat.x-lurePos.x;
  const dy=boat.y-lurePos.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<0.02){
    // Lure retrieved fully
    endRetrieve();
    return;
  }
  const spd=retrieveSpeed*0.08*dt;
  lurePos.x+=dx/dist*spd;
  lurePos.y+=dy/dist*spd;
  // Check for bite
  biteTimer-=dt*retrieveSpeed;
  if(biteTimer<=0&&!biteActive){
    const chance=calcBiteChance();
    if(Math.random()<chance){
      // BITE!
      biteActive=true;
      biteWindow=1.2+Math.random()*0.8;
      state='bite';
      sndBite();
      document.getElementById('setBtn').classList.add('flash');
      notify('BITE! TAP SET!');
    } else {
      biteTimer=1+Math.random()*3;
    }
  }
}

function updateBite(dt){
  if(state!=='bite')return;
  biteWindow-=dt;
  if(biteWindow<=0){
    // Missed the bite
    biteActive=false;
    state='retrieving';
    biteTimer=1.5+Math.random()*3;
    document.getElementById('setBtn').classList.remove('flash');
    notify('Missed it!');
  }
}

function hookSet(){
  if(state!=='bite'||!biteActive)return;
  document.getElementById('setBtn').classList.remove('flash');
  const wt=calcFishSize();
  fightFish={weight:wt,lure:LURES[currentLure].name,hooked:true};
  state='fighting';
  tension=0.5;
  fightTime=0;
  reeling=false;
  document.getElementById('retrieveBar').style.display='none';
  document.getElementById('setBtn').style.display='none';
  document.getElementById('tensionBar').style.display='block';
  sndDrag();
  notify('FISH ON! '+wt.toFixed(2)+' kg fighter!');
}

function updateFight(dt){
  if(state!=='fighting')return;
  fightTime+=dt;
  // Fish pulls - bigger fish pull harder
  const pull=fightFish.weight*0.08*(0.5+Math.random()*0.5);
  tension+=pull*dt;
  // Reeling reduces tension
  if(reeling){
    tension-=0.35*dt;
    if(Math.random()<0.1)sndDrag();
  }
  // Natural tension decay
  tension-=0.05*dt;
  tension=Math.max(0,Math.min(1,tension));
  // Update tension bar
  document.getElementById('tensionFill').style.width=(tension*100)+'%';
  // Line break
  if(tension>=1){
    lostFish('Line snapped!');
    return;
  }
  // Fish tires out based on time
  const tired=fightTime>(fightFish.weight*2);
  if(tired&&tension<0.3){
    // Landed!
    landFish();
    return;
  }
  // Fish escapes if tension too low for too long
  if(tension<=0&&fightTime>1){
    lostFish('Fish threw the hook!');
  }
}

function lostFish(msg){
  state='playing';
  fightFish=null;
  document.getElementById('tensionBar').style.display='none';
  document.getElementById('castBtn').style.display='inline-block';
  castLine.active=false;
  sndLost();
  notify(msg);
}

function landFish(){
  state='playing';
  const fish=fightFish;
  fightFish=null;
  document.getElementById('tensionBar').style.display='none';
  document.getElementById('castBtn').style.display='inline-block';
  castLine.active=false;
  // Add to livewell
  const entry={weight:fish.weight,lure:fish.lure,time:getTimeStr(),alive:true};
  let replaced=null;
  if(livewell.length<5){
    livewell.push(entry);
  } else {
    // Replace smallest if this is bigger
    let minIdx=0;
    for(let i=1;i<livewell.length;i++){
      if(livewell[i].weight<livewell[minIdx].weight)minIdx=i;
    }
    if(fish.weight>livewell[minIdx].weight){
      replaced=livewell[minIdx];
      livewell[minIdx]=entry;
    }
  }
  livewell.sort((a,b)=>b.weight-a.weight);
  ripples.push({x:lurePos.x,y:lurePos.y,radius:5,speed:1,alpha:0.6});
  sndHorn();
  // Show catch popup
  showCatch(fish,replaced);
  postCatch(fish);
}

function endRetrieve(){
  state='playing';
  castLine.active=false;
  biteActive=false;
  document.getElementById('retrieveBar').style.display='none';
  document.getElementById('setBtn').style.display='none';
  document.getElementById('setBtn').classList.remove('flash');
  document.getElementById('castBtn').style.display='inline-block';
}

// ---- Catch Popup ----
function showCatch(fish,replaced){
  const popup=document.getElementById('catchPopup');
  document.getElementById('catchWt').textContent=fish.weight.toFixed(2)+' kg';
  document.getElementById('catchLure').textContent='Caught on: '+fish.lure;
  let msg='';
  if(fish.weight>=3)msg='LUNKER! What a hawg!';
  else if(fish.weight>=2)msg='Solid keeper!';
  else if(fish.weight>=1)msg='Nice bass!';
  else msg='Small one, but it counts!';
  if(replaced)msg+='\nReleased '+replaced.weight.toFixed(2)+' kg fish.';
  document.getElementById('catchMsg').textContent=msg;
  popup.style.display='block';
}
function closeCatch(){document.getElementById('catchPopup').style.display='none'}

// ---- Post to Parent ----
function postCatch(fish){
  try{
    if(window.parent&&window.parent!==window){
      window.parent.postMessage({type:'catch',game:'basstournament',fish:{weight:fish.weight,lure:fish.lure}},'*');
    }
  }catch(e){}
}

// ---- Overlays ----
function openLures(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent='SELECT LURE';
  const tod=getTimeOfDay();
  let html='<div style="font-size:11px;color:#aaa;text-align:center;margin-bottom:8px">Current conditions: '+tod.toUpperCase()+'</div>';
  LURES.forEach((l,i)=>{
    const sel=i===currentLure?'selected':'';
    const eff=l.timeMod[tod];
    let effStr=eff>=1.2?'HOT':eff>=0.9?'Good':eff>=0.6?'Fair':'Poor';
    let effColor=eff>=1.2?'#4caf50':eff>=0.9?'#ffd54f':eff>=0.6?'#ff9800':'#f44336';
    html+=`<div class="lureItem ${sel}" onclick="selectLure(${i})">
      <div class="lureDot" style="background:${l.color}"></div>
      <div class="lureInfo">
        <h3>${l.name}</h3>
        <p>${l.desc}</p>
        <p style="color:${effColor};font-size:10px;margin-top:2px">${effStr} right now</p>
      </div>
    </div>`;
  });
  document.getElementById('overlayContent').innerHTML=html;
  ov.style.display='block';
}
function selectLure(i){currentLure=i;closeOverlay();notify('Switched to '+LURES[i].name)}
function openLivewell(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent='LIVE WELL';
  let html='';
  if(livewell.length===0){
    html='<div style="text-align:center;color:#aaa;padding:20px">No fish yet. Get casting!</div>';
  } else {
    const total=livewell.reduce((s,f)=>s+f.weight,0);
    html+=`<div style="text-align:center;font-size:18px;font-weight:700;color:#4caf50;margin-bottom:8px">${total.toFixed(2)} kg total</div>`;
    livewell.forEach((f,i)=>{
      html+=`<div class="lwFish">
        <div><span style="color:#ffd54f">#${i+1}</span> - ${f.lure} (${f.time})</div>
        <div class="wt">${f.weight.toFixed(2)} kg</div>
      </div>`;
    });
  }
  document.getElementById('overlayContent').innerHTML=html;
  ov.style.display='block';
}
function openLeader(){
  const ov=document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent='STANDINGS';
  const myTotal=livewell.reduce((s,f)=>s+f.weight,0);
  const myBig=livewell.length>0?Math.max(...livewell.map(f=>f.weight)):0;
  let all=[{name:'You',weight:Math.round(myTotal*100)/100,bigBass:Math.round(myBig*100)/100,isYou:true}];
  for(const ai of aiAnglers){
    all.push({name:ai.name,weight:ai.totalWeight,bigBass:ai.bigBass,isYou:false});
  }
  all.sort((a,b)=>b.weight-a.weight);
  let html='';
  all.forEach((a,i)=>{
    const cls=a.isYou?'standRow you':'standRow';
    html+=`<div class="${cls}">
      <span class="place">${i+1}.</span>
      <span class="name">${a.name}</span>
      <span class="wt">${a.weight.toFixed(2)} kg</span>
    </div>`;
  });
  html+=`<div style="text-align:center;margin-top:12px;font-size:12px;color:#ff7043">Big Bass: ${all.reduce((best,a)=>a.bigBass>best.bigBass?a:best,{bigBass:0}).name} (${all.reduce((best,a)=>a.bigBass>best.bigBass?a:best,{bigBass:0}).bigBass.toFixed(2)} kg)</div>`;
  document.getElementById('overlayContent').innerHTML=html;
  ov.style.display='block';
}
function closeOverlay(){document.getElementById('overlay').style.display='none'}

// ---- Weigh-In ----
function showWeighIn(){
  state='weighin';
  sndHorn();
  setTimeout(sndCheer,800);
  const wi=document.getElementById('weighIn');
  // Calculate penalty for dead fish (random small chance)
  let penalty=0;
  for(const f of livewell){
    if(Math.random()<0.05){f.alive=false;penalty+=0.5}
  }
  const myTotal=Math.max(0,livewell.reduce((s,f)=>s+f.weight,0)-penalty);
  const myRoundedTotal=Math.round(myTotal*100)/100;
  const myBig=livewell.length>0?Math.max(...livewell.map(f=>f.weight)):0;

  let all=[{name:'You',weight:myRoundedTotal,bigBass:Math.round(myBig*100)/100,fish:livewell.length,isYou:true}];
  for(const ai of aiAnglers)all.push({name:ai.name,weight:ai.totalWeight,bigBass:ai.bigBass,fish:ai.fish.length,isYou:false});
  all.sort((a,b)=>b.weight-a.weight);

  const myPlace=all.findIndex(a=>a.isYou)+1;
  const bigBassWinner=all.reduce((best,a)=>a.bigBass>best.bigBass?a:best,{bigBass:0});

  let html='<h1>WEIGH-IN</h1>';
  html+=`<div class="sub">Tournament Complete!</div>`;
  html+=`<div class="fishList">`;
  livewell.forEach((f,i)=>{
    const dead=!f.alive?' (DEAD -0.50 kg)':'';
    html+=`<div class="wiFish"><span>#${i+1} ${f.lure}</span><span class="wt">${f.weight.toFixed(2)} kg${dead}</span></div>`;
  });
  if(penalty>0)html+=`<div class="wiFish" style="color:#f44336"><span>Dead fish penalty</span><span>-${penalty.toFixed(2)} kg</span></div>`;
  html+=`</div>`;
  html+=`<div class="totalWt">${myRoundedTotal.toFixed(2)} kg</div>`;
  html+=`<div class="bigBass">Big Bass: ${bigBassWinner.name} - ${bigBassWinner.bigBass.toFixed(2)} kg</div>`;
  const placeText=myPlace===1?'1st Place - WINNER!':myPlace===2?'2nd Place':myPlace===3?'3rd Place':myPlace+'th Place';
  const placeColor=myPlace===1?'#ffd54f':myPlace===2?'#c0c0c0':myPlace===3?'#cd7f32':'#fff';
  html+=`<div class="placement" style="color:${placeColor}">${placeText}</div>`;
  html+=`<div class="standings">`;
  all.forEach((a,i)=>{
    const cls=a.isYou?'sRow you':'sRow';
    html+=`<div class="${cls}"><span class="pl">${i+1}.</span><span class="nm">${a.name} (${a.fish})</span><span class="wt">${a.weight.toFixed(2)} kg</span></div>`;
  });
  html+=`</div>`;
  html+=`<button onclick="endTournament()">FISH AGAIN</button>`;

  wi.innerHTML=html;
  wi.style.display='flex';

  // Save best finish
  saveData.history.push({lake:LAKES[selectedLake].name,place:myPlace,weight:myRoundedTotal,bigBass:Math.round(myBig*100)/100});
  // Unlock next lake
  if(myPlace<=2&&selectedLake<LAKES.length-1){
    if(!saveData.lakes[selectedLake+1]){
      saveData.lakes[selectedLake+1]=true;
      notify('New lake unlocked!');
    }
  }
  // Upgrade boat on 1st place
  if(myPlace===1&&saveData.boatLevel<3){
    saveData.boatLevel++;
  }
  saveData.bestFinishes.push({lake:selectedLake,place:myPlace});
  doSave();
}

function endTournament(){
  document.getElementById('weighIn').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  buildLakeSelect();
  state='start';
}

// ---- Notifications ----
function notify(text){notification={text,timer:120}}

// ---- Canvas Tap ----
function getCanvasPos(e){
  const rect=C.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-rect.left)/rect.width,y:(t.clientY-rect.top)/rect.height};
}

let lastTapTime=0;
C.addEventListener('pointerdown',e=>{
  if(state==='start'||state==='weighin')return;
  ensureAudio();
  const p=getCanvasPos(e);
  if(state==='fighting'){
    reeling=true;
    return;
  }
  if(state==='playing'){
    if(isInLake(p.x,p.y)){
      const now=Date.now();
      if(now-lastTapTime<300){
        // Double tap = cast to this spot
        castTarget.x=p.x;castTarget.y=p.y;
        startCast();
      } else {
        // Single tap = move boat
        boat.targetX=p.x;boat.targetY=p.y;
        tapTarget=p;
      }
      lastTapTime=now;
    }
  }
});
C.addEventListener('pointerup',e=>{
  if(state==='fighting')reeling=false;
});

// Retrieve bar drag
const rBar=document.getElementById('retrieveBar');
function updateRetrieveBar(e){
  if(state!=='retrieving')return;
  const rect=rBar.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  let pct=(t.clientX-rect.left)/rect.width;
  pct=Math.max(0,Math.min(1,pct));
  retrieveSpeed=pct;
  document.getElementById('retrieveFill').style.width=(pct*100)+'%';
  const label=pct<0.15?'STOP':pct<0.4?'SLOW':pct<0.7?'MEDIUM':'FAST';
  document.getElementById('retrieveLabel').textContent=label;
  e.preventDefault();
}
rBar.addEventListener('pointerdown',e=>{retrieveDragging=true;updateRetrieveBar(e)});
rBar.addEventListener('pointermove',e=>{if(retrieveDragging)updateRetrieveBar(e)});
document.addEventListener('pointerup',()=>{retrieveDragging=false});

// ---- Button Handlers ----
function onCast(){
  if(state!=='playing')return;
  ensureAudio();
  // Cast forward from boat
  const dist=0.12;
  castTarget.x=boat.x+Math.sin(boat.angle)*dist;
  castTarget.y=boat.y-Math.cos(boat.angle)*dist;
  // Clamp to lake
  if(!isInLake(castTarget.x,castTarget.y)){
    castTarget.x=boat.x+Math.sin(boat.angle)*dist*0.5;
    castTarget.y=boat.y-Math.cos(boat.angle)*dist*0.5;
  }
  startCast();
}
function onSet(){
  if(state==='bite')hookSet();
}

// ---- Start Screen ----
function buildLakeSelect(){
  const el=document.getElementById('lakeSelect');
  let html='';
  LAKES.forEach((l,i)=>{
    const unlocked=saveData.lakes[i];
    const sel=i===selectedLake?'selected':'';
    const locked=unlocked?'':'locked';
    html+=`<div class="lakeOpt ${sel} ${locked}" onclick="pickLake(${i})">${unlocked?l.name:'Locked'}</div>`;
  });
  el.innerHTML=html;
}
function pickLake(i){
  if(!saveData.lakes[i])return;
  selectedLake=i;
  buildLakeSelect();
}

function startGame(){
  ensureAudio();
  document.getElementById('startScreen').style.display='none';
  state='playing';
  gameTime=0;
  realTimeStart=Date.now();
  boat={x:0.5,y:0.3,angle:0,targetX:0.5,targetY:0.3,speed:0};
  boatTrail=[];
  castLine={active:false,progress:0,x:0,y:0,landed:false};
  livewell=[];
  ripples=[];
  currentLure=0;
  fightFish=null;
  biteActive=false;
  notification={text:'',timer:0};
  buildLakePath();
  // Ensure boat starts in lake
  if(!isInLake(boat.x,boat.y)){boat.x=0.45;boat.y=0.4;boat.targetX=boat.x;boat.targetY=boat.y}
  initAI();
  document.getElementById('castBtn').style.display='inline-block';
  document.getElementById('setBtn').style.display='none';
  document.getElementById('retrieveBar').style.display='none';
  document.getElementById('tensionBar').style.display='none';
  sndHorn();
  notify('Tournament started! 8 hours to catch your 5 best bass!');
}

// ---- Main Loop ----
let lastTime=0;
function frame(ts){
  const dt=Math.min(0.05,(ts-lastTime)/1000);
  lastTime=ts;
  resize();
  if(state==='start'){
    drawStartBg();
    requestAnimationFrame(frame);
    return;
  }
  if(state==='weighin'){
    requestAnimationFrame(frame);
    return;
  }
  // Update game time
  const elapsed=(Date.now()-realTimeStart)/1000;
  gameTime=(elapsed/REAL_DURATION)*GAME_DURATION;
  if(gameTime>=GAME_DURATION&&state!=='weighin'){
    showWeighIn();
    requestAnimationFrame(frame);
    return;
  }
  updateBoat(dt);
  updateCast(dt);
  updateRetrieve(dt);
  updateBite(dt);
  updateFight(dt);
  updateAI(dt);
  // Draw
  drawLake();
  drawDepthContours();
  drawBoatTrail();
  drawRipples();
  drawCastLine();
  drawBoat();
  // Tap target indicator
  if(tapTarget&&state==='playing'){
    X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;
    X.beginPath();X.arc(tapTarget.x*W,tapTarget.y*H,8+Math.sin(Date.now()/200)*3,0,Math.PI*2);X.stroke();
  }
  drawHUD();
  requestAnimationFrame(frame);
}

function drawStartBg(){
  const sg=X.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#0a1628');sg.addColorStop(0.5,'#1a3a5c');sg.addColorStop(1,'#0a1628');
  X.fillStyle=sg;X.fillRect(0,0,W,H);
  // Animated water
  X.save();X.globalAlpha=0.1;
  for(let i=0;i<5;i++){
    const y=H*0.4+i*20+Math.sin(Date.now()/1000+i)*10;
    X.strokeStyle='#4fc3f7';X.lineWidth=1;
    X.beginPath();
    for(let x=0;x<W;x+=5){
      const yy=y+Math.sin(x/30+Date.now()/800+i)*8;
      if(x===0)X.moveTo(x,yy);else X.lineTo(x,yy);
    }
    X.stroke();
  }
  X.restore();
}

function resize(){
  const dpr=window.devicePixelRatio||1;
  const ww=window.innerWidth;
  const wh=window.innerHeight;
  if(C.width!==ww*dpr||C.height!==wh*dpr){
    C.width=ww*dpr;C.height=wh*dpr;
    C.style.width=ww+'px';C.style.height=wh+'px';
    X.setTransform(dpr,0,0,dpr,0,0);
    W=ww;H=wh;
    if(state!=='start')buildLakePath();
  }
}

// ---- Init ----
buildLakeSelect();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
