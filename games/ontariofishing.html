<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ontario Fishing App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ON Fishing"/>
<meta name="theme-color" content="#080e08"/>
<link rel="manifest" href="ontariofishing-manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#080e08;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e0e4d8;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:14px}
html{scroll-behavior:smooth}
:root{--bg:#080e08;--bg2:#101a10;--bg3:#1a2e1a;--card:#141e14;--border:#243424;--accent:#2a8a3a;--accent2:#4a9e5a;--gold:#d4a83c;--gold2:#e8c050;--text:#e0e4d8;--text2:#8a9a80;--red:#d04838;--green:#00b800;--blue:#3090d0}

.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* Header */
.header{background:linear-gradient(180deg,#1a2e1a 0%,#0c180c 100%);border-bottom:1px solid rgba(42,138,58,.3);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;position:relative}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,60,.2),transparent)}
.header .back:active{color:var(--text)}
.header .title-group{display:flex;align-items:center;gap:8px}
.header .title-group .title-icon{color:var(--gold);width:20px;height:20px;opacity:.8}
.header h1{font-size:15px;font-weight:800;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.header .gps-status{font-size:10px;color:var(--text2);padding:5px 10px;background:rgba(0,0,0,.3);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;font-weight:600;cursor:pointer;transition:all .2s}
.header .gps-status .gps-icon{width:14px;height:14px}
.header .gps-status.active{color:var(--green);border-color:rgba(0,184,0,.4);background:rgba(0,184,0,.08)}
.header .gps-status.active .gps-icon{animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Tab content */
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;background:var(--bg2);opacity:0}
.tab-frame.active{display:block;opacity:1}

/* Bottom tabs */
.bottom-tabs{display:flex;background:rgba(8,14,8,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(42,138,58,.2);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);position:relative}
.bottom-tabs::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,60,.15),transparent)}
.tab-btn{flex:1;padding:8px 2px 10px;background:none;border:none;color:#4a5a4a;font-family:'Inter',inherit;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:58px;cursor:pointer;transition:all .2s;position:relative;letter-spacing:0.3px}
.tab-btn.active{color:var(--gold)}
.tab-btn.active::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 2px 2px}
.tab-btn .ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s}
.tab-btn .ico svg{width:20px;height:20px}
.tab-btn.active .ico{background:rgba(212,168,60,.12)}
.tab-btn .lbl{font-size:9px;font-weight:600}

/* Scroll shadow */
.hs-scroll{width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;scroll-behavior:smooth}
.scroll-shadow{position:sticky;top:0;left:0;right:0;height:12px;background:linear-gradient(180deg,rgba(8,14,8,.6) 0%,transparent 100%);z-index:10;pointer-events:none;margin-bottom:-12px}
.hs-pad{padding:18px 16px 28px}
.install-visible .hs-pad{padding-bottom:180px}

/* Hero card */
.hs-hero{background:linear-gradient(135deg,#1a3a1a 0%,#0a200a 50%,#142814 100%);border:1px solid var(--border);border-radius:16px;padding:22px 18px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hs-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(212,168,60,.06) 0%,transparent 70%);border-radius:50%}
.hs-hero h2{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hs-hero .subtitle{font-size:12px;color:var(--text2);margin-bottom:14px}
.hs-hero .stat-row{display:flex;gap:12px}
.hs-hero .mini-stat{flex:1;text-align:center;background:rgba(0,0,0,.25);border-radius:10px;padding:10px 4px}
.hs-hero .mini-stat .num{font-size:22px;font-weight:800;color:#fff}
.hs-hero .mini-stat .lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.card:active{border-color:var(--accent);transform:scale(0.985)}
.card-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.card-title .badge{font-size:8px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:600}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.card-row .k{color:var(--text2)}
.card-row .v{color:var(--text);font-weight:600}
.card-divider{height:1px;background:var(--border);margin:8px 0}

/* Section headers */
.section-hdr{display:flex;align-items:center;gap:8px;margin:22px 0 12px;padding-left:2px}
.section-hdr h3{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.section-hdr .count{font-size:10px;color:var(--text2);background:rgba(0,0,0,.3);padding:3px 10px;border-radius:8px;font-weight:500}

/* Spot cards */
.spot{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:14px;overflow:hidden;margin-bottom:12px;transition:all .15s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.spot:active{transform:scale(0.98);border-color:var(--accent)}
.spot-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.spot-info{flex:1;min-width:0}
.spot-rank{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),#a08838);color:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-left:10px;box-shadow:0 2px 8px rgba(212,168,60,.2)}
.spot-rank svg{width:14px;height:14px}
.spot-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spot-meta{font-size:12px;color:var(--text2);line-height:1.6;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spot-meta .meta-item{display:flex;align-items:center;gap:3px}
.spot-meta .meta-item svg{width:12px;height:12px;opacity:.6}
.spot-species-bar{padding:0 16px 10px;display:flex;gap:5px;flex-wrap:wrap}
.sp-chip{font-size:10px;padding:4px 8px;background:rgba(42,138,58,.15);color:var(--accent2);border-radius:6px;border:1px solid rgba(42,138,58,.2);font-weight:500}
.spot-bottom{display:flex;border-top:1px solid var(--border)}
.spot-bottom button{flex:1;padding:12px;background:none;border:none;border-right:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',inherit;min-height:44px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.spot-bottom button:last-child{border-right:none}
.spot-bottom button:active{background:rgba(42,138,58,.12);color:var(--accent2)}
.spot-bottom button svg{width:14px;height:14px}
.spot-best{padding:6px 16px 12px;font-size:12px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:4px}

/* Weather card */
.weather{background:linear-gradient(135deg,#142a20 0%,#0e1e14 100%);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.weather:active{transform:scale(0.985)}
.weather-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.weather-main{display:flex;align-items:center;gap:12px}
.weather-icon{color:var(--gold);opacity:.9}
.weather-icon svg{width:32px;height:32px}
.weather-temp{font-size:36px;font-weight:800;color:#fff;line-height:1}
.weather-desc{font-size:13px;color:var(--text2);margin-top:2px}
.weather-live{font-size:8px;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.weather-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-smooth 2s ease-in-out infinite}
@keyframes pulse-smooth{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.4;box-shadow:0 0 8px var(--green)}}
.weather-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.weather-item{text-align:center;background:rgba(0,0,0,.25);border-radius:10px;padding:10px 4px}
.weather-item .wi-icon{display:flex;justify-content:center;margin-bottom:4px;color:var(--text2)}
.weather-item .wi-icon svg{width:16px;height:16px}
.weather-item .wv{font-size:15px;font-weight:700;color:var(--text)}
.weather-item .wl{font-size:9px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}

/* Solunar */
.solunar{background:linear-gradient(135deg,#1a1a2e 0%,#0e0e1a 100%);border:1px solid #2a2a3e;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.solunar:active{transform:scale(0.985)}
.solunar.sol-good{box-shadow:0 0 20px rgba(0,184,0,.08),0 2px 12px rgba(0,0,0,.2);border-color:rgba(0,184,0,.2)}
.sol-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sol-moon-group{display:flex;align-items:center;gap:8px}
.sol-moon-icon{color:#c0c0e0;opacity:.8}
.sol-moon-icon svg{width:20px;height:20px}
.sol-moon{font-size:17px;font-weight:800;color:#e0e0f0}
.sol-feeding{font-size:11px;padding:5px 12px;border-radius:8px;font-weight:700;letter-spacing:.3px}
.sol-feeding.good{background:rgba(0,184,0,.12);color:var(--green)}
.sol-feeding.ok{background:rgba(212,168,60,.12);color:var(--gold)}
.sol-feeding.poor{background:rgba(208,72,56,.12);color:var(--red)}
.sol-periods{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sol-period{background:rgba(0,0,0,.25);border-radius:10px;padding:10px;text-align:center}
.sol-period .pt{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:4px}
.sol-period .pt svg{width:12px;height:12px}
.sol-period .pv{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.sol-period.major .pv{color:var(--green)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.toggle-left{display:flex;align-items:center;gap:12px}
.toggle-icon{color:var(--text2);opacity:.7}
.toggle-icon svg{width:18px;height:18px}
.toggle-row .tl{font-size:14px;color:var(--text);font-weight:600}
.toggle-row .td{font-size:11px;color:var(--text2);margin-top:2px}
.tswitch{width:52px;height:30px;background:#2a2a2a;border-radius:15px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tswitch.on{background:var(--accent)}
.tswitch::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;background:#fff;border-radius:50%;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tswitch.on::after{left:24px}

/* Empty */
.empty{text-align:center;padding:34px 22px;color:var(--text2);font-size:14px;line-height:1.7;background:var(--card);border:1px dashed var(--border);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}

/* Gamification */
.xp-card{background:linear-gradient(135deg,#1a2a10 0%,#0e1a08 100%);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.xp-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(212,168,60,.06) 0%,transparent 70%);border-radius:50%}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.xp-level{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.xp-level svg{width:16px;height:16px}
.xp-xp{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.xp-xp svg{width:14px;height:14px;color:var(--gold)}
.xp-title{font-size:20px;font-weight:800;color:#fff}
.xp-bar-wrap{height:10px;background:rgba(0,0,0,.35);border-radius:5px;overflow:hidden;margin-bottom:6px;margin-top:4px;position:relative}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#2a8a3a,#d4a83c,#e8c050);border-radius:5px;transition:width .6s ease-out;position:relative;overflow:hidden}
.xp-bar-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2.5s ease-in-out infinite}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
.xp-label{font-size:10px;color:var(--text2);display:flex;justify-content:space-between;font-weight:500}
.badge-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--border);transition:all .2s}
.badge svg{width:18px;height:18px}
.badge.earned{background:linear-gradient(135deg,#2a3a1a,#1a2a10);border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(212,168,60,.15)}
.badge.locked{background:rgba(8,14,8,.6);color:#333;border-color:#1a1a1a}
.badge.locked svg{opacity:.2}
.badge-tooltip{position:fixed;background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);z-index:500;pointer-events:none;max-width:200px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}

/* Streak */
.streak-card{background:linear-gradient(135deg,#2a1a10,#1a1008);border:1px solid #3a2a1a;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.2);position:relative;overflow:hidden}
.streak-flame{display:flex;align-items:center;justify-content:center;min-width:40px;position:relative}
.streak-flame svg{width:28px;height:28px}
.streak-flame .flame-icon{color:#f87830;filter:drop-shadow(0 0 6px rgba(248,120,48,.4));animation:flame-pulse 2s ease-in-out infinite}
@keyframes flame-pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(248,120,48,.4));transform:scale(1)}50%{filter:drop-shadow(0 0 12px rgba(248,120,48,.6));transform:scale(1.1)}}
.streak-count{position:absolute;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.streak-info{flex:1}
.streak-info .si-title{font-size:14px;font-weight:700;color:#f8a848}
.streak-info .si-desc{font-size:11px;color:var(--text2);margin-top:3px}

/* Daily Challenge */
.challenge-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.challenge-card.completed{box-shadow:0 0 18px rgba(0,184,0,.1),0 2px 12px rgba(0,0,0,.2);border-left-color:var(--green)}
.challenge-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.challenge-icon{width:36px;height:36px;background:rgba(212,168,60,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.challenge-icon svg{width:20px;height:20px}
.challenge-card.completed .challenge-icon{background:rgba(0,184,0,.12);color:var(--green)}
.challenge-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.challenge-card.completed .challenge-label{color:var(--green)}
.challenge-desc{font-size:14px;font-weight:700;color:var(--text);flex:1}
.challenge-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.challenge-xp{font-size:12px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:4px}
.challenge-xp svg{width:14px;height:14px}
.challenge-check{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--green)}
.challenge-check svg{width:16px;height:16px}

/* Fish of the Day */
.fotd-card{background:linear-gradient(135deg,#2a2a10,#1a1a08);border:1px solid #3a3a1a;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.fotd-icon{width:36px;height:36px;background:rgba(212,168,60,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.fotd-icon svg{width:20px;height:20px}
.fotd-info{flex:1}
.fotd-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.fotd-species{font-size:15px;font-weight:800;color:#fff;margin-top:2px}
.fotd-bonus{font-size:11px;color:var(--gold);font-weight:600;margin-top:2px}

/* Lucky Lure */
.lure-card{background:linear-gradient(135deg,#1a1a2a,#0e0e1a);border:1px solid #2a2a3e;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.lure-icon{width:36px;height:36px;background:rgba(100,100,220,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#8888cc;flex-shrink:0}
.lure-icon svg{width:20px;height:20px}
.lure-info{flex:1}
.lure-label{font-size:9px;font-weight:700;color:#8888cc;letter-spacing:1px;text-transform:uppercase}
.lure-name{font-size:14px;font-weight:700;color:var(--text);margin-top:2px}

/* Fish Collection */
.collection-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.collection-header h3{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.collection-count{font-size:11px;color:var(--text2);font-weight:600}
.collection-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.coll-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 4px 8px;text-align:center;position:relative;transition:all .2s}
.coll-item .ci-initials{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:13px;font-weight:800;position:relative}
.coll-item .ci-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.coll-item .ci-badge svg{width:10px;height:10px}
.coll-item .ci-name{font-size:9px;line-height:1.2;font-weight:600;min-height:20px;display:flex;align-items:center;justify-content:center}
.coll-item .ci-count{font-size:9px;font-weight:600;margin-top:2px}
.coll-item.caught{border-color:rgba(0,184,0,.3)}
.coll-item.caught .ci-initials{background:rgba(0,184,0,.15);color:var(--green)}
.coll-item.caught .ci-badge{background:var(--green);color:#fff}
.coll-item.caught .ci-name{color:var(--text)}
.coll-item.caught .ci-count{color:var(--green)}
.coll-item.locked .ci-initials{background:rgba(40,40,40,.6);color:#333}

/* Fishing Fact */

/* Current location */
.loc-banner{background:linear-gradient(135deg,var(--accent),#2a5e2a);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.loc-icon{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.loc-icon svg{width:18px;height:18px;color:#fff;animation:spin 3s linear infinite}
.loc-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 8px var(--green);animation:pulse-smooth 2s ease-in-out infinite}
.loc-text{font-size:12px;color:#fff;line-height:1.5;flex:1}
.loc-text .coords{font-size:11px;color:rgba(255,255,255,.6);font-family:'SF Mono','Fira Code',monospace}
.loc-text .accuracy{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.loc-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',inherit;flex-shrink:0;transition:background .2s}
.loc-btn:active{background:rgba(255,255,255,.25)}
/* Install Banner */
.install-banner{position:fixed;bottom:70px;left:8px;right:8px;background:linear-gradient(135deg,#1a3018,#0e200e);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.install-banner .ib-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}

.install-banner .ib-close{background:none;border:none;color:var(--text2);font-size:18px;padding:4px 8px;cursor:pointer;min-width:32px;min-height:32px}

.install-banner .ib-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;min-height:40px}
.install-banner .ib-btn-primary{background:var(--accent);color:#fff}
.install-banner .ib-btn-dismiss{background:rgba(255,255,255,.08);color:var(--text2)}

/* Shimmer loading for weather */
@keyframes weather-shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.shimmer{background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.03) 50%,var(--card) 75%);background-size:400px 100%;animation:weather-shimmer 1.5s infinite}

/* Confetti for completed challenge */
@keyframes confetti-pop{0%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(.8) translateY(-20px)}}
.confetti-done{position:relative;overflow:hidden}
.confetti-done::before,.confetti-done::after{content:'*';position:absolute;font-size:16px;animation:confetti-pop 2s infinite;pointer-events:none}
.confetti-done::before{top:5px;right:15px;color:#d4a83c}
.confetti-done::after{top:10px;right:40px;color:#2a8a3a;animation-delay:.3s}

/* Layered card shadows */
.card,.spot,.weather,.solunar,.xp-card,.challenge-card,.fotd-card,.lure-card,.fact-card,.collection-section,.streak-card{
  box-shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);
}

/* Section divider */

/* Solunar timeline */

/* Active/pressed states for all interactive elements */
.tab-btn:active,.toggle-row:active,.fotd-card:active,.lure-card:active,.fact-card:active,.streak-card:active,.loc-btn:active,.loc-banner:active,.badge:active,.coll-item:active,.sp-chip:active{transform:scale(0.97)}

/* Tab frame fade transition */

/* XP bar shimmer - smoother and more visible */
.xp-bar-fill::after{background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:xp-shimmer 2s ease-in-out infinite}
@keyframes xp-shimmer{0%{left:-100%}50%{left:100%}100%{left:100%}}

/* Fishing forecast banner */

/* Badge tooltip */

/* Hotspot rank medals */

/* Empty hotspot enhanced */
.empty-enhanced{text-align:center;padding:40px 22px;color:var(--text2);font-size:14px;line-height:1.7;background:var(--card);border:1px dashed var(--border);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}

<body>
<div class="app">
  <div class="header">
    <div class="title-group">
      <i data-lucide="fish" class="title-icon"></i>
      <h1>ONTARIO FISHING</h1>
    </div>
    <div class="gps-status" id="gpsStatus"><i data-lucide="navigation" class="gps-icon"></i><span id="gpsLabel">TAP GPS</span></div>
  </div>
  <div class="tab-content" id="tabContent">
    <iframe id="frame-log" class="tab-frame active" src="fishlog.html" allow="geolocation;camera"></iframe>
    <iframe id="frame-game" class="tab-frame" src="8bitperch.html"></iframe>
    <iframe id="frame-bait" class="tab-frame" src="baithelper.html"></iframe>
    <iframe id="frame-regs" class="tab-frame" src="fishregs.html"></iframe>
    <div id="frame-hotspot" class="tab-frame">
      <div class="hs-scroll" id="hsScroll">
        <div class="scroll-shadow"></div>
        <div class="hs-pad" id="hotspotBody"></div>
      </div>
    </div>
  </div>
  <div class="bottom-tabs" id="bottomTabs">
    <button class="tab-btn active" data-tab="log"><span class="ico"><i data-lucide="book-open"></i></span><span class="lbl">Log</span></button>
    <button class="tab-btn" data-tab="game"><span class="ico"><i data-lucide="gamepad-2"></i></span><span class="lbl">Fish!</span></button>
    <button class="tab-btn" data-tab="bait"><span class="ico"><i data-lucide="target"></i></span><span class="lbl">Bait</span></button>
    <button class="tab-btn" data-tab="regs"><span class="ico"><i data-lucide="scale"></i></span><span class="lbl">Regs</span></button>
    <button class="tab-btn" data-tab="hotspot"><span class="ico"><i data-lucide="map-pin"></i></span><span class="lbl">GPS</span></button>
  </div>
</div>

<!-- Install Banner -->
<div class="install-banner" id="installBanner">
  <div class="ib-top">
    <div class="ib-icon"><i data-lucide="download"></i></div>
    <div class="ib-text">
      <div class="ib-title">Install This App</div>
      <div class="ib-desc">Add to your home screen for the best experience</div>
    </div>
    <button class="ib-close" onclick="dismissInstall()">&times;</button>
  </div>
  <div class="ib-steps" id="installSteps"></div>
  <div class="ib-actions">
    <button class="ib-btn ib-btn-primary" id="installBtn" onclick="doInstall()">Install</button>
    <button class="ib-btn ib-btn-dismiss" onclick="dismissInstall()">Not Now</button>
  </div>
</div>

<script>
// Init Lucide icons in header/tabs on load
lucide.createIcons();

// ─── TAB SWITCHING ───
const tabs=document.querySelectorAll('.tab-btn');
const frames={log:document.getElementById('frame-log'),game:document.getElementById('frame-game'),bait:document.getElementById('frame-bait'),regs:document.getElementById('frame-regs'),hotspot:document.getElementById('frame-hotspot')};
let activeTab='log';
tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.tab;if(t===activeTab)return;
    tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    var prev=frames[activeTab];if(prev)prev.style.opacity='0';
    setTimeout(function(){
      Object.values(frames).forEach(f=>f.classList.remove('active'));frames[t].classList.add('active');
      frames[t].style.opacity='1';
      activeTab=t;if(t==='hotspot')renderHotspots();
    },80);
    localStorage.setItem('ontfish_tab',t);
  });
});
const savedTab=localStorage.getItem('ontfish_tab');
if(savedTab&&frames[savedTab]){tabs.forEach(b=>b.classList.toggle('active',b.dataset.tab===savedTab));Object.values(frames).forEach(f=>f.classList.remove('active'));frames[savedTab].classList.add('active');activeTab=savedTab}

// ─── GPS ───
let currentLat=null,currentLng=null,currentAccuracy=null,gpsWatchId=null,gpsAttempts=0;
const gpsEl=document.getElementById('gpsStatus');
const gpsLabel=gpsEl.querySelector&&gpsEl.querySelector('#gpsLabel')||gpsEl;
function updateGPSLabel(text){try{const el=document.getElementById('gpsLabel');if(el)el.textContent=text;else gpsEl.textContent=text}catch(e){}}
function startGPS(){
  if(!navigator.geolocation){updateGPSLabel('NO GPS');return}
  if(gpsWatchId)return;
  gpsAttempts++;updateGPSLabel('Locating...');
  // Try without high accuracy first (faster, works better on iOS)
  const opts=gpsAttempts<=1?{enableHighAccuracy:false,maximumAge:120000,timeout:15000}:{enableHighAccuracy:true,maximumAge:60000,timeout:20000};
  navigator.geolocation.getCurrentPosition(
    function(pos){
      currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;currentAccuracy=pos.coords.accuracy;
      updateGPSLabel('GPS ON');gpsEl.classList.add('active');
      // Now start watching with high accuracy
      gpsWatchId=navigator.geolocation.watchPosition(
        function(p){currentLat=p.coords.latitude;currentLng=p.coords.longitude;currentAccuracy=p.coords.accuracy},
        function(){},
        {enableHighAccuracy:true,maximumAge:60000,timeout:30000}
      );
      if(activeTab==='hotspot')renderHotspots();
    },
    function(err){
      // GPS error: err.code, err.message
      if(err.code===1)updateGPSLabel('GPS Denied');
      else if(err.code===2)updateGPSLabel('GPS N/A');
      else updateGPSLabel('GPS Timeout');
      gpsEl.classList.remove('active');
      // Try to load last known position from localStorage
      try{
        const saved=JSON.parse(localStorage.getItem('ontfish_lastgps')||'null');
        if(saved){currentLat=saved.lat;currentLng=saved.lng;updateGPSLabel('Last GPS');if(activeTab==='hotspot')renderHotspots()}
      }catch(e){}
    },
    opts
  );
}
// Save GPS position periodically
setInterval(function(){if(currentLat)try{localStorage.setItem('ontfish_lastgps',JSON.stringify({lat:currentLat,lng:currentLng}))}catch(e){}},30000);
// GPS button tap
gpsEl.addEventListener('click',function(){startGPS()});
// Try GPS on first meaningful user interaction (iOS needs gesture)
var gpsTriggered=false;
function tryGPSOnce(){if(!gpsTriggered){gpsTriggered=true;setTimeout(startGPS,100)}}
document.addEventListener('touchstart',tryGPSOnce,{once:true,passive:true});
document.addEventListener('click',tryGPSOnce,{once:true});

// ─── WAKE LOCK ───
let wakeLock=null,wakeLockOn=localStorage.getItem('ontfish_wakelock')==='1';
async function requestWakeLock(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(e){}}
async function releaseWakeLock(){try{if(wakeLock){await wakeLock.release();wakeLock=null}}catch(e){}}
if(wakeLockOn)requestWakeLock();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&wakeLockOn)requestWakeLock()});

// ─── GAMIFICATION ───
const ACHIEVEMENTS=[
  {id:'first',name:'FIRST CATCH',desc:'Log your first fish',check:c=>c.length>=1,xp:10,icon:'fish'},
  {id:'five',name:'HIGH FIVE',desc:'Log 5 fish',check:c=>c.length>=5,xp:25,icon:'fish'},
  {id:'ten',name:'DOUBLE DIGITS',desc:'Log 10 fish',check:c=>c.length>=10,xp:50,icon:'star'},
  {id:'fifty',name:'HALF CENTURY',desc:'Log 50 fish',check:c=>c.length>=50,xp:100,icon:'award'},
  {id:'hundred',name:'CENTURION',desc:'Log 100 fish',check:c=>c.length>=100,xp:200,icon:'trophy'},
  {id:'walleye',name:'WALLEYE HUNTER',desc:'Catch 5 walleye',check:c=>c.filter(f=>f.species==='Walleye').length>=5,xp:50,icon:'target'},
  {id:'pike',name:'PIKE MASTER',desc:'Catch 5 pike',check:c=>c.filter(f=>f.species==='Northern Pike').length>=5,xp:50,icon:'zap'},
  {id:'bass',name:'BASS PRO',desc:'Catch 5 bass',check:c=>c.filter(f=>(f.species||'').includes('Bass')).length>=5,xp:50,icon:'fish'},
  {id:'muskie',name:'MUSKIE LEGEND',desc:'Catch a muskie',check:c=>c.some(f=>f.species==='Muskie'),xp:100,icon:'award'},
  {id:'trophy',name:'TROPHY FISH',desc:'Catch a fish over 10 lbs',check:c=>c.some(f=>(f.weightLbs||0)>=10),xp:75,icon:'trophy'},
  {id:'monster',name:'MONSTER',desc:'Catch a fish over 20 lbs',check:c=>c.some(f=>(f.weightLbs||0)>=20),xp:150,icon:'zap'},
  {id:'explorer',name:'EXPLORER',desc:'Fish at 5 different spots',check:c=>{const s=new Set(c.map(f=>f.location).filter(Boolean));return s.size>=5},xp:60,icon:'compass'},
  {id:'globe',name:'GLOBE TROTTER',desc:'Fish at 10 spots',check:c=>{const s=new Set(c.map(f=>f.location).filter(Boolean));return s.size>=10},xp:100,icon:'compass'},
  {id:'variety',name:'VARIETY PACK',desc:'Catch 5 different species',check:c=>{const s=new Set(c.map(f=>f.species).filter(Boolean));return s.size>=5},xp:60,icon:'star'},
  {id:'collector',name:'COLLECTOR',desc:'Catch 10 different species',check:c=>{const s=new Set(c.map(f=>f.species).filter(Boolean));return s.size>=10},xp:120,icon:'star'},
  {id:'dawn',name:'EARLY BIRD',desc:'Log a catch before 7 AM',check:c=>c.some(f=>{const t=f.time||'';const h=parseInt(t);return h>=0&&h<7}),xp:30,icon:'sun'},
  {id:'night',name:'NIGHT OWL',desc:'Log a catch after 9 PM',check:c=>c.some(f=>{const t=f.time||'';const h=parseInt(t);return h>=21}),xp:30,icon:'moon'},
  {id:'release',name:'CONSERVATIONIST',desc:'Release 10 fish',check:c=>c.filter(f=>f.released).length>=10,xp:40,icon:'anchor'},
];
// ─── DAILY CHALLENGES ───
const DAILY_CHALLENGES = [
  {desc:'Catch 3 fish today',check:c=>{const today=new Date().toISOString().slice(0,10);return c.filter(f=>f.date===today).length>=3},xp:30},
  {desc:'Catch a fish before 9 AM',check:c=>{const today=new Date().toISOString().slice(0,10);return c.some(f=>f.date===today&&parseInt(f.time||'99')<9)},xp:25},
  {desc:'Catch a bass today',check:c=>{const today=new Date().toISOString().slice(0,10);return c.some(f=>f.date===today&&(f.species||'').includes('Bass'))},xp:25},
  {desc:'Fish at a new location',check:c=>{const today=new Date().toISOString().slice(0,10);const todayLocs=new Set(c.filter(f=>f.date===today).map(f=>f.location));const oldLocs=new Set(c.filter(f=>f.date!==today).map(f=>f.location));for(const l of todayLocs)if(!oldLocs.has(l))return true;return false},xp:35},
  {desc:'Catch 2 different species',check:c=>{const today=new Date().toISOString().slice(0,10);return new Set(c.filter(f=>f.date===today).map(f=>f.species)).size>=2},xp:30},
  {desc:'Catch a fish over 3 lbs',check:c=>{const today=new Date().toISOString().slice(0,10);return c.some(f=>f.date===today&&(f.weightLbs||0)>=3)},xp:30},
  {desc:'Log a catch with notes',check:c=>{const today=new Date().toISOString().slice(0,10);return c.some(f=>f.date===today&&f.notes&&f.notes.length>5)},xp:15},
  {desc:'Release a fish today',check:c=>{const today=new Date().toISOString().slice(0,10);return c.some(f=>f.date===today&&f.released)},xp:20},
  {desc:'Catch a walleye',check:c=>{const today=new Date().toISOString().slice(0,10);return c.some(f=>f.date===today&&f.species==='Walleye')},xp:30},
  {desc:'Catch 5 fish total today',check:c=>{const today=new Date().toISOString().slice(0,10);return c.filter(f=>f.date===today).length>=5},xp:50},
];

// ─── FISH COLLECTION ───
const ALL_SPECIES = ['Walleye','Northern Pike','Smallmouth Bass','Largemouth Bass','Lake Trout','Rainbow Trout','Brown Trout','Brook Trout','Yellow Perch','Muskie','Channel Catfish','Crappie','Bluegill/Sunfish','Rock Bass','Whitefish','Burbot','Drum','Carp','Sturgeon','Pumpkinseed'];

// ─── FISHING FACTS ───
const FACTS = [
  'Lake Simcoe is home to one of the best ice fishing spots in Ontario.',
  'The Muskellunge is called the "fish of 10,000 casts" -- keep trying!',
  'Walleye have a special reflective layer in their eyes called the tapetum lucidum.',
  'Ontario has over 250,000 lakes -- more than any other province.',
  'The largest muskie ever caught in Ontario weighed 65 pounds.',
  'Yellow perch are the most commonly caught fish in Ontario.',
  'Northern pike can grow up to 4 feet long in Ontario waters.',
  'Lake trout can live over 40 years in cold deep lakes.',
  'Bass fishing tournaments generate over $1 billion annually in Ontario.',
  'The French River was designated a Canadian Heritage River in 1986.',
  'Walleye are most active during low-light conditions at dawn and dusk.',
  'Smallmouth bass are considered the best fighting freshwater fish pound-for-pound.',
  'Lake Nipissing is famous for its trophy walleye and muskie.',
  'The Great Lakes contain 20% of the world\'s surface fresh water.',
  'Brook trout are Ontario\'s only native trout species.',
  'Catch and release can improve fish populations by up to 60%.',
  'The best walleye fishing in Ontario is typically from May to early July.',
  'Muskie prefer water temperatures between 67-72F.',
  'Georgian Bay is one of the world\'s largest freshwater bays.',
  'Perch travel in schools -- if you catch one, there are usually more.',
];

// ─── LUCKY LURES ───
const LURES = ['Nightcrawler on jig','Rapala Original Floater','Mepps Spinner #3','Senko (green pumpkin)','White spinnerbait','Tube jig (brown)','Red/white spoon','Woolly bugger (black)','Live minnow on bobber','Ned rig (TRD worm)'];

function getAnglerStats(){
  const catches=getCatches();
  let totalXP=0;const earned=[];
  ACHIEVEMENTS.forEach(a=>{if(a.check(catches)){totalXP+=a.xp;earned.push(a.id)}});
  totalXP+=catches.length*5;
  let level=1,xpForNext=50,xpInLevel=totalXP;
  while(xpInLevel>=xpForNext){xpInLevel-=xpForNext;level++;xpForNext=Math.floor(xpForNext*1.4)}
  const titles=['Beginner','Novice','Apprentice','Angler','Skilled Angler','Expert','Master Angler','Grand Master','Legend','Ontario Legend'];
  const title=titles[Math.min(level-1,titles.length-1)];
  const days=new Set(catches.map(c=>c.date).filter(Boolean));
  const today=new Date();let streak=0;
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(days.has(ds))streak++;else if(i>0)break}
  return{totalXP,level,xpInLevel,xpForNext,title,earned,streak,catches};
}

// ─── MOON / SOLUNAR ───
function getMoonPhase(date){
  let y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  if(m<3){y--;m+=12}
  const c=Math.floor(365.25*y),e=Math.floor(30.6001*(m+1));
  let jd=c+e+d-694039.09;jd/=29.5305882;jd-=Math.floor(jd);
  const age=Math.round(jd*29.5305882);
  if(age<2)return{phase:'New Moon',feeding:'poor'};
  if(age<7)return{phase:'Waxing Crescent',feeding:'ok'};
  if(age<9)return{phase:'First Quarter',feeding:'good'};
  if(age<14)return{phase:'Waxing Gibbous',feeding:'ok'};
  if(age<16)return{phase:'Full Moon',feeding:'good'};
  if(age<21)return{phase:'Waning Gibbous',feeding:'ok'};
  if(age<23)return{phase:'Last Quarter',feeding:'good'};
  return{phase:'Waning Crescent',feeding:'ok'};
}
function getSolunar(date){
  const moon=getMoonPhase(date);const h=date.getHours();
  const seed=date.getDate()*7+date.getMonth()*31;
  const mr=(5+seed%4);
  const periods=[{type:'Major',start:mr,dur:2},{type:'Major',start:(mr+12)%24,dur:2},{type:'Minor',start:(mr+6)%24,dur:1},{type:'Minor',start:(mr+18)%24,dur:1}];
  let feeding='poor';
  for(const p of periods){const e=(p.start+p.dur)%24;if((p.start<e&&h>=p.start&&h<e)||(p.start>=e&&(h>=p.start||h<e))){feeding=p.type==='Major'?'good':'ok';break}}
  return{moon,periods,feeding};
}
function fmtH(h){h=((h%24)+24)%24;return((h%12)||12)+(h>=12?'PM':'AM')}

// ─── DATA ───
function getCatches(){try{return JSON.parse(localStorage.getItem('fishlog_catches')||'[]')}catch(e){return[]}}
function getHotspots(){
  const catches=getCatches(),spots={};
  catches.forEach(c=>{
    const loc=c.location||'Unknown';
    if(!spots[loc])spots[loc]={name:loc,catches:[],totalWeight:0,species:{},lat:c.lat||null,lng:c.lng||null};
    spots[loc].catches.push(c);
    spots[loc].totalWeight+=(c.weightLbs||0)+(c.weightOz||0)/1000;
    spots[loc].species[c.species||'Unknown']=(spots[loc].species[c.species||'Unknown']||0)+1;
    if(c.lat&&c.lng&&!spots[loc].lat){spots[loc].lat=c.lat;spots[loc].lng=c.lng}
  });
  return Object.values(spots).sort((a,b)=>b.catches.length-a.catches.length);
}

// ─── Weather icon helper ───
function weatherIconName(code){
  if(code<=1)return'sun';
  if(code<=3)return'cloud';
  if(code>=45&&code<=48)return'cloud';
  if(code>=51&&code<=67)return'droplets';
  if(code>=71&&code<=77)return'cloud';
  if(code>=80&&code<=82)return'droplets';
  if(code>=95)return'zap';
  return'sun';
}

// ─── FISHING FORECAST ───
function getFishingForecast(weatherCode, windSpeed, solFeeding) {
  var score = 50;
  var hour = new Date().getHours();
  if(hour >= 5 && hour <= 8) score += 15;
  if(hour >= 17 && hour <= 20) score += 15;
  if(solFeeding === 'good') score += 20;
  else if(solFeeding === 'ok') score += 10;
  if([2,3].indexOf(weatherCode) >= 0) score += 15;
  if([61,63,80].indexOf(weatherCode) >= 0) score += 10;
  if([65,95].indexOf(weatherCode) >= 0) score -= 20;
  if(windSpeed >= 5 && windSpeed <= 15) score += 10;
  if(windSpeed > 20) score -= 10;
  score = Math.max(0, Math.min(100, score));
  if(score >= 75) return {rating:'EXCELLENT', color:'#00c040', desc:'Perfect conditions. Get out there!', score:score};
  if(score >= 55) return {rating:'GOOD', color:'#80c020', desc:'Solid fishing conditions.', score:score};
  if(score >= 40) return {rating:'FAIR', color:'#c0a020', desc:'Fish may be less active.', score:score};
  return {rating:'POOR', color:'#c04030', desc:'Try deeper water or wait.', score:score};
}

// ─── DISTANCE ───
function getDistKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─── WEATHER ───
let lastWeatherCode=0;

  const card=document.getElementById('weatherCard');if(!card)return;
  try{
    let lat=currentLat||43.84,lng=currentLng||-79.38;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code,relative_humidity_2m&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto`;
    const data=await(await fetch(url)).json();const c=data.current;
    const codes={0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Fog',51:'Lt. Drizzle',53:'Drizzle',55:'Hvy. Drizzle',61:'Lt. Rain',63:'Rain',65:'Hvy. Rain',71:'Lt. Snow',73:'Snow',75:'Hvy. Snow',80:'Showers',81:'Hvy. Showers',95:'Thunderstorm'};
    const desc=codes[c.weather_code]||'--';
    const dirs=['N','NE','E','SE','S','SW','W','NW'];
    const wd=dirs[Math.round(c.wind_direction_10m/45)%8];

      <div class="forecast-desc" style="color:${forecast.color}">${forecast.desc}</div>
      <div class="forecast-bar-wrap"><div class="forecast-bar-fill" style="width:${forecast.score}%;background:${forecast.color}"></div></div>
    </div>
    <div class="weather-top">
      <div class="weather-main">
        <div class="weather-icon"><i data-lucide="${wIcon}"></i></div>
        <div><div class="weather-temp">${Math.round(c.temperature_2m)}°C</div><div class="weather-desc">${desc}</div></div>

      <div class="weather-live"><span class="weather-live-dot"></span> LIVE</div>

// ─── NAVIGATE ───
function navigateTo(lat,lng){
  const iOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  window.open(iOS?`maps://maps.apple.com/?daddr=${lat},${lng}`:`https://maps.google.com/maps?daddr=${lat},${lng}`,'_blank');
}
function shareLoc(name,lat,lng){
  const text=`Fishing spot: ${name}${lat?'\nhttps://maps.google.com/?q='+lat+','+lng:''}`;
  if(navigator.share){navigator.share({title:'Fishing Spot',text}).catch(()=>{})}
  else{navigator.clipboard.writeText(text).catch(()=>{})}
}
function refreshGPS(){
  navigator.geolocation.getCurrentPosition(
    pos=>{currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;currentAccuracy=pos.coords.accuracy;renderHotspots()},
    ()=>{},{enableHighAccuracy:true,timeout:10000}
  );
}

  }
  // Game catch from 8bit Perch
  if(e.data.type==='game-fish-caught'&&gameFishToLog){
    var gc={
      id:Date.now(),
      species:e.data.species==='PERCH'?'Yellow Perch':e.data.species==='BASS'?'Smallmouth Bass':e.data.species==='PIKE'?'Northern Pike':e.data.species==='CATFISH'?'Channel Catfish':e.data.species==='TROUT'?'Rainbow Trout':e.data.species==='WALLEYE'?'Walleye':e.data.species==='MUSKIE'?'Muskie':e.data.species==='SUNFISH'?'Bluegill/Sunfish':e.data.species||'Other',
      weightLbs:Math.round(e.data.weightKg*10)/10,
      weightOz:0,
      lengthIn:0,
      location:'8bit Perch (Game)',
      date:new Date().toISOString().slice(0,10),
      time:new Date().toTimeString().slice(0,5),
      notes:'Caught in 8bit Perch game',
      photos:[],
      released:false,
      isGameFish:true,
      source:'8bitperch'
    };
    try{
      var catches=JSON.parse(localStorage.getItem('fishlog_catches')||'[]');
      catches.unshift(gc);
      localStorage.setItem('fishlog_catches',JSON.stringify(catches));
      speak(gc.weightLbs+' kg '+gc.species+' from the game!');
    }catch(ex){}
    if(navigator.vibrate)navigator.vibrate([50,30,50]);
  }
});

if(activeTab==='hotspot')renderHotspots();

// ─── INSTALL PROMPT ───
let deferredPrompt=null;
const installBanner=document.getElementById('installBanner');
const installSteps=document.getElementById('installSteps');
const installBtn=document.getElementById('installBtn');

function isInstalled(){return window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone===true}
function wasDismissed(){return localStorage.getItem('ontfish_install_dismissed')&&Date.now()-parseInt(localStorage.getItem('ontfish_install_dismissed'))<7*86400000}

function detectPlatform(){
  const ua=navigator.userAgent;
  if(/iPad|iPhone|iPod/.test(ua)&&!window.MSStream)return'ios';
  if(/android/i.test(ua))return'android';
  return'desktop';
}

function showInstallBanner(){
  if(isInstalled()||wasDismissed())return;
  const platform=detectPlatform();
  if(platform==='ios'){
    installSteps.innerHTML='<b>To install on iPhone/iPad:</b><br>1. Tap the <b>Share</b> button (box with arrow) in Safari<br>2. Scroll down and tap <b>"Add to Home Screen"</b><br>3. Tap <b>"Add"</b> in the top right<br><br>The app will appear on your home screen!';
    installBtn.textContent='Got It';
    installBtn.onclick=function(){dismissInstall()};
  } else if(platform==='android'){
    if(deferredPrompt){
      installSteps.innerHTML='<b>Install as an app</b> for offline access, full screen, and faster loading.';
      installBtn.textContent='Install App';
    } else {
      installSteps.innerHTML='<b>To install on Android:</b><br>1. Tap the <b>menu</b> (3 dots) in Chrome<br>2. Tap <b>"Add to Home Screen"</b> or <b>"Install App"</b><br>3. Tap <b>"Install"</b>';
      installBtn.textContent='Got It';
      installBtn.onclick=function(){dismissInstall()};
    }
  } else {
    installSteps.innerHTML='<b>To install on desktop:</b><br>Click the install icon in your browser\'s address bar, or use the browser menu.';
    installBtn.textContent='Got It';
    installBtn.onclick=function(){dismissInstall()};
  }
  installBanner.style.display='block';
  document.querySelector('.app').classList.add('install-visible');
  try{lucide.createIcons({nodes:[installBanner]})}catch(e){}
}

function doInstall(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){if(r.outcome==='accepted')installBanner.style.display='none'});
    deferredPrompt=null;
  } else {
    dismissInstall();
  }
}

function dismissInstall(){
  installBanner.style.display='none';
  document.querySelector('.app').classList.remove('install-visible');
  localStorage.setItem('ontfish_install_dismissed',Date.now().toString());
}

// Capture beforeinstallprompt (Chrome/Edge/Android)
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  showInstallBanner();
});

// Show banner after 5 seconds for iOS (no beforeinstallprompt event)
setTimeout(function(){if(!deferredPrompt&&!isInstalled())showInstallBanner()},5000);
</script>
