<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ontario Fishing App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a160a"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a160a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#d4d8c8;overflow:hidden;-webkit-font-smoothing:antialiased}
:root{--bg:#0a160a;--bg2:#121e12;--bg3:#1a2e1a;--card:#1e2e1e;--border:#2a3e2a;--accent:#3a6e3a;--accent2:#4a8e4a;--gold:#c8a848;--gold2:#e0c060;--text:#d4d8c8;--text2:#8a9080;--red:#c04030;--green:#00a800;--blue:#3080c0}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* Header */
.header{background:linear-gradient(180deg,#162616 0%,#0e1a0e 100%);border-bottom:1px solid var(--accent);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.header .back{color:var(--text2);font-size:13px;text-decoration:none;padding:8px 0;min-width:44px}
.header h1{font-size:15px;font-weight:800;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
.header .gps-status{font-size:10px;color:var(--text2);padding:4px 8px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.header .gps-status.active{color:var(--green);border-color:var(--green)}

/* Tab content */
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;background:var(--bg2)}
.tab-frame.active{display:block}

/* Bottom tabs */
.bottom-tabs{display:flex;background:linear-gradient(180deg,#0e1a0e 0%,#060e06 100%);border-top:1px solid var(--accent);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:6px 2px 8px;background:none;border:none;color:#4a5a4a;font-family:inherit;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:56px;cursor:pointer;transition:all .2s;position:relative;letter-spacing:0.3px}
.tab-btn.active{color:var(--gold)}
.tab-btn.active::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:var(--gold);border-radius:0 0 2px 2px}
.tab-btn .ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:11px;font-weight:800;transition:all .2s}
.tab-btn.active .ico{background:rgba(200,168,72,0.15)}
.tab-btn .lbl{font-size:9px}

/* Hotspot tab */
.hs-scroll{width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.hs-pad{padding:16px 14px 24px}
.hs-hero{background:linear-gradient(135deg,#1a3a1a 0%,#0a200a 50%,#142814 100%);border:1px solid var(--border);border-radius:14px;padding:20px 16px;margin-bottom:16px;position:relative;overflow:hidden}
.hs-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(200,168,72,.08) 0%,transparent 70%);border-radius:50%}
.hs-hero h2{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hs-hero .subtitle{font-size:11px;color:var(--text2);margin-bottom:12px}
.hs-hero .stat-row{display:flex;gap:12px}
.hs-hero .mini-stat{flex:1;text-align:center;background:rgba(0,0,0,.2);border-radius:8px;padding:8px 4px}
.hs-hero .mini-stat .num{font-size:20px;font-weight:800;color:#fff}
.hs-hero .mini-stat .lbl{font-size:8px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .2s}
.card:active{border-color:var(--accent)}
.card-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px;letter-spacing:0.5px}
.card-title .badge{font-size:8px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:600}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.card-row .k{color:var(--text2)}
.card-row .v{color:var(--text);font-weight:600}
.card-divider{height:1px;background:var(--border);margin:8px 0}

/* Section headers */
.section-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 10px;padding-left:2px}
.section-hdr h3{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.section-hdr .count{font-size:10px;color:var(--text2);background:var(--bg);padding:2px 8px;border-radius:8px}

/* Spot cards */
.spot{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;transition:transform .1s}
.spot:active{transform:scale(0.98)}
.spot-top{padding:12px 14px;display:flex;justify-content:space-between;align-items:flex-start}
.spot-info{flex:1;min-width:0}
.spot-rank{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),#a08838);color:#000;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-left:8px}
.spot-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spot-meta{font-size:11px;color:var(--text2);line-height:1.5}
.spot-species-bar{padding:0 14px 8px;display:flex;gap:4px;flex-wrap:wrap}
.sp-chip{font-size:9px;padding:3px 7px;background:rgba(58,110,58,.2);color:var(--accent2);border-radius:4px;border:1px solid rgba(58,110,58,.3)}
.spot-bottom{display:flex;border-top:1px solid var(--border)}
.spot-bottom button{flex:1;padding:10px;background:none;border:none;border-right:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px;transition:all .15s}
.spot-bottom button:last-child{border-right:none}
.spot-bottom button:active{background:rgba(58,110,58,.15);color:var(--accent2)}
.spot-best{padding:4px 14px 10px;font-size:11px;color:var(--gold);font-weight:600}

/* Weather card */
.weather{background:linear-gradient(135deg,#142a20 0%,#0e1e14 100%);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.weather-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.weather-main{display:flex;align-items:center;gap:10px}
.weather-temp{font-size:28px;font-weight:800;color:#fff}
.weather-desc{font-size:12px;color:var(--text2)}
.weather-live{font-size:8px;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.weather-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.weather-item{text-align:center;background:rgba(0,0,0,.2);border-radius:8px;padding:8px 4px}
.weather-item .wv{font-size:14px;font-weight:700;color:var(--text)}
.weather-item .wl{font-size:8px;color:var(--text2);margin-top:2px;text-transform:uppercase}

/* Solunar */
.solunar{background:linear-gradient(135deg,#1a1a2a 0%,#0e0e1a 100%);border:1px solid #2a2a3a;border-radius:12px;padding:14px;margin-bottom:10px}
.sol-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sol-moon{font-size:15px;font-weight:800;color:#e0e0f0}
.sol-feeding{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:700}
.sol-feeding.good{background:rgba(0,168,0,.15);color:var(--green)}
.sol-feeding.ok{background:rgba(200,168,72,.15);color:var(--gold)}
.sol-feeding.poor{background:rgba(192,64,48,.15);color:var(--red)}
.sol-periods{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sol-period{background:rgba(0,0,0,.2);border-radius:8px;padding:8px;text-align:center}
.sol-period .pt{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.sol-period .pv{font-size:12px;font-weight:700;color:var(--text);margin-top:2px}
.sol-period.major .pv{color:var(--green)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.toggle-row .tl{font-size:13px;color:var(--text)}
.toggle-row .td{font-size:10px;color:var(--text2)}
.tswitch{width:48px;height:26px;background:#333;border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tswitch.on{background:var(--accent)}
.tswitch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tswitch.on::after{left:25px}

/* Empty */
.empty{text-align:center;padding:30px 20px;color:var(--text2);font-size:13px;line-height:1.7;background:var(--card);border:1px dashed var(--border);border-radius:12px}

/* Current location */
.loc-banner{background:linear-gradient(135deg,var(--accent),#2a5e2a);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.loc-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loc-text{font-size:11px;color:#fff;line-height:1.4}
.loc-text .coords{font-size:10px;color:rgba(255,255,255,.6);font-family:monospace}
.loc-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="../index.html" class="back">Back</a>
    <h1>ONTARIO FISHING</h1>
    <div class="gps-status" id="gpsStatus">GPS OFF</div>
  </div>
  <div class="tab-content" id="tabContent">
    <iframe id="frame-log" class="tab-frame active" src="fishlog.html"></iframe>
    <iframe id="frame-bait" class="tab-frame" src="baithelper.html"></iframe>
    <iframe id="frame-regs" class="tab-frame" src="fishregs.html"></iframe>
    <div id="frame-hotspot" class="tab-frame">
      <div class="hs-scroll">
        <div class="hs-pad" id="hotspotBody"></div>
      </div>
    </div>
  </div>
  <div class="bottom-tabs" id="bottomTabs">
    <button class="tab-btn active" data-tab="log"><span class="ico">LOG</span><span class="lbl">Catches</span></button>
    <button class="tab-btn" data-tab="bait"><span class="ico">BAIT</span><span class="lbl">Helper</span></button>
    <button class="tab-btn" data-tab="regs"><span class="ico">REGS</span><span class="lbl">Rules</span></button>
    <button class="tab-btn" data-tab="hotspot"><span class="ico">GPS</span><span class="lbl">Hotspots</span></button>
  </div>
</div>
<script>
// ─── TAB SWITCHING ───
const tabs=document.querySelectorAll('.tab-btn');
const frames={log:document.getElementById('frame-log'),bait:document.getElementById('frame-bait'),regs:document.getElementById('frame-regs'),hotspot:document.getElementById('frame-hotspot')};
let activeTab='log';
tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.tab;if(t===activeTab)return;
    tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    Object.values(frames).forEach(f=>f.classList.remove('active'));frames[t].classList.add('active');
    activeTab=t;if(t==='hotspot')renderHotspots();
    localStorage.setItem('ontfish_tab',t);
  });
});
const savedTab=localStorage.getItem('ontfish_tab');
if(savedTab&&frames[savedTab]){tabs.forEach(b=>b.classList.toggle('active',b.dataset.tab===savedTab));Object.values(frames).forEach(f=>f.classList.remove('active'));frames[savedTab].classList.add('active');activeTab=savedTab}

// ─── GPS ───
let currentLat=null,currentLng=null,gpsWatchId=null;
const gpsEl=document.getElementById('gpsStatus');
function startGPS(){
  if(!navigator.geolocation)return;
  gpsWatchId=navigator.geolocation.watchPosition(
    pos=>{currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;gpsEl.textContent='GPS ON';gpsEl.classList.add('active')},
    err=>{gpsEl.textContent='GPS OFF';gpsEl.classList.remove('active')},
    {enableHighAccuracy:true,maximumAge:30000,timeout:10000}
  );
}
startGPS();

// ─── WAKE LOCK ───
let wakeLock=null,wakeLockOn=localStorage.getItem('ontfish_wakelock')==='1';
async function requestWakeLock(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(e){}}
async function releaseWakeLock(){try{if(wakeLock){await wakeLock.release();wakeLock=null}}catch(e){}}
if(wakeLockOn)requestWakeLock();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&wakeLockOn)requestWakeLock()});

// ─── MOON / SOLUNAR ───
function getMoonPhase(date){
  let y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  if(m<3){y--;m+=12}
  const c=Math.floor(365.25*y),e=Math.floor(30.6001*(m+1));
  let jd=c+e+d-694039.09;jd/=29.5305882;jd-=Math.floor(jd);
  const age=Math.round(jd*29.5305882);
  if(age<2)return{phase:'New Moon',feeding:'poor'};
  if(age<7)return{phase:'Waxing Crescent',feeding:'ok'};
  if(age<9)return{phase:'First Quarter',feeding:'good'};
  if(age<14)return{phase:'Waxing Gibbous',feeding:'ok'};
  if(age<16)return{phase:'Full Moon',feeding:'good'};
  if(age<21)return{phase:'Waning Gibbous',feeding:'ok'};
  if(age<23)return{phase:'Last Quarter',feeding:'good'};
  return{phase:'Waning Crescent',feeding:'ok'};
}
function getSolunar(date){
  const moon=getMoonPhase(date);const h=date.getHours();
  const seed=date.getDate()*7+date.getMonth()*31;
  const mr=(5+seed%4);
  const periods=[{type:'Major',start:mr,dur:2},{type:'Major',start:(mr+12)%24,dur:2},{type:'Minor',start:(mr+6)%24,dur:1},{type:'Minor',start:(mr+18)%24,dur:1}];
  let feeding='poor';
  for(const p of periods){const e=(p.start+p.dur)%24;if((p.start<e&&h>=p.start&&h<e)||(p.start>=e&&(h>=p.start||h<e))){feeding=p.type==='Major'?'good':'ok';break}}
  return{moon,periods,feeding};
}
function fmtH(h){h=((h%24)+24)%24;return((h%12)||12)+(h>=12?'PM':'AM')}

// ─── DATA ───
function getCatches(){try{return JSON.parse(localStorage.getItem('fishlog_catches')||'[]')}catch(e){return[]}}
function getHotspots(){
  const catches=getCatches(),spots={};
  catches.forEach(c=>{
    const loc=c.location||'Unknown';
    if(!spots[loc])spots[loc]={name:loc,catches:[],totalWeight:0,species:{},lat:c.lat||null,lng:c.lng||null};
    spots[loc].catches.push(c);
    spots[loc].totalWeight+=(c.weightLbs||0)+(c.weightOz||0)/16;
    spots[loc].species[c.species||'Unknown']=(spots[loc].species[c.species||'Unknown']||0)+1;
    if(c.lat&&c.lng&&!spots[loc].lat){spots[loc].lat=c.lat;spots[loc].lng=c.lng}
  });
  return Object.values(spots).sort((a,b)=>b.catches.length-a.catches.length);
}

// ─── RENDER ───
function renderHotspots(){
  const body=document.getElementById('hotspotBody');
  const spots=getHotspots();const catches=getCatches();
  const now=new Date();const sol=getSolunar(now);
  const totalW=catches.reduce((s,c)=>s+(c.weightLbs||0)+(c.weightOz||0)/16,0);

  let h='';

  // Hero
  h+=`<div class="hs-hero"><h2>FISHING HOTSPOTS</h2>
    <div class="subtitle">Your fishing intelligence</div>
    <div class="stat-row">
      <div class="mini-stat"><div class="num">${catches.length}</div><div class="lbl">Fish</div></div>
      <div class="mini-stat"><div class="num">${spots.length}</div><div class="lbl">Spots</div></div>
      <div class="mini-stat"><div class="num">${totalW.toFixed(0)}</div><div class="lbl">Total lbs</div></div>
    </div></div>`;

  // GPS location
  if(currentLat){
    h+=`<div class="loc-banner"><div class="loc-dot"></div>
      <div class="loc-text">GPS Active<br><span class="coords">${currentLat.toFixed(5)}, ${currentLng.toFixed(5)}</span></div>
      <button class="loc-btn" onclick="refreshGPS()">Refresh</button></div>`;
  }

  // Weather
  h+=`<div class="weather" id="weatherCard">
    <div class="weather-top"><div class="weather-main"><div class="weather-temp">--</div><div class="weather-desc">Loading...</div></div><div class="weather-live">LIVE</div></div>
    <div class="weather-grid"><div class="weather-item"><div class="wv">--</div><div class="wl">Wind</div></div><div class="weather-item"><div class="wv">--</div><div class="wl">Humidity</div></div><div class="weather-item"><div class="wv">--</div><div class="wl">Feels Like</div></div></div></div>`;

  // Solunar
  h+=`<div class="solunar"><div class="sol-header"><div class="sol-moon">${sol.moon.phase}</div>
    <div class="sol-feeding ${sol.feeding}">${sol.feeding.toUpperCase()} FEEDING</div></div>
    <div class="sol-periods">${sol.periods.map(p=>`<div class="sol-period${p.type==='Major'?' major':''}"><div class="pt">${p.type}</div><div class="pv">${fmtH(p.start)}-${fmtH(p.start+p.dur)}</div></div>`).join('')}</div></div>`;

  // Wake Lock + Speech
  h+=`<div class="toggle-row"><div><div class="tl">Screen Stay On</div><div class="td">Keep screen awake while fishing</div></div>
    <div class="tswitch${wakeLockOn?' on':''}" id="wlToggle"></div></div>`;

  // Hotspots
  h+=`<div class="section-hdr"><h3>YOUR SPOTS</h3><span class="count">${spots.length} locations</span></div>`;

  if(!spots.length){
    h+=`<div class="empty">No catches logged yet.<br>Log fish in the Catches tab to build your hotspot map.</div>`;
  } else {
    spots.slice(0,20).forEach((s,i)=>{
      const topSp=Object.entries(s.species).sort((a,b)=>b[1]-a[1]).slice(0,4);
      const best=s.catches.reduce((b,c)=>{const w=(c.weightLbs||0)+(c.weightOz||0)/16;return w>b.w?{w,sp:c.species}:b},{w:0,sp:''});
      const hasGPS=s.lat&&s.lng;
      const dist=hasGPS&&currentLat?getDistKm(currentLat,currentLng,s.lat,s.lng):null;
      h+=`<div class="spot"><div class="spot-top"><div class="spot-info">
        <div class="spot-name">${s.name}</div>
        <div class="spot-meta">${s.catches.length} fish | ${s.totalWeight.toFixed(1)} lbs${dist!==null?' | '+dist.toFixed(1)+'km away':''}</div>
        </div><div class="spot-rank">${i+1}</div></div>`;
      if(topSp.length)h+=`<div class="spot-species-bar">${topSp.map(([sp,n])=>`<span class="sp-chip">${sp} (${n})</span>`).join('')}</div>`;
      if(best.w>0)h+=`<div class="spot-best">Best: ${best.w.toFixed(1)} lb ${best.sp}</div>`;
      h+=`<div class="spot-bottom">`;
      if(hasGPS)h+=`<button onclick="navigateTo(${s.lat},${s.lng})">Navigate</button>`;
      h+=`<button onclick="shareLoc('${s.name}',${s.lat||0},${s.lng||0})">Share</button></div></div>`;
    });
  }

  body.innerHTML=h;

  // Bind wake lock
  const wl=document.getElementById('wlToggle');
  if(wl)wl.onclick=()=>{wakeLockOn=!wakeLockOn;wl.classList.toggle('on',wakeLockOn);localStorage.setItem('ontfish_wakelock',wakeLockOn?'1':'0');if(wakeLockOn)requestWakeLock();else releaseWakeLock()};

  fetchWeather();
}

// ─── DISTANCE ───
function getDistKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─── WEATHER ───
async function fetchWeather(){
  const card=document.getElementById('weatherCard');if(!card)return;
  try{
    let lat=currentLat||43.84,lng=currentLng||-79.38;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
    const data=await(await fetch(url)).json();const c=data.current;
    const codes={0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Fog',51:'Lt. Drizzle',53:'Drizzle',55:'Hvy. Drizzle',61:'Lt. Rain',63:'Rain',65:'Hvy. Rain',71:'Lt. Snow',73:'Snow',75:'Hvy. Snow',80:'Showers',81:'Hvy. Showers',95:'Thunderstorm'};
    const desc=codes[c.weather_code]||'--';
    const dirs=['N','NE','E','SE','S','SW','W','NW'];
    const wd=dirs[Math.round(c.wind_direction_10m/45)%8];
    card.innerHTML=`<div class="weather-top"><div class="weather-main"><div class="weather-temp">${Math.round(c.temperature_2m)}°F</div><div class="weather-desc">${desc}</div></div><div class="weather-live">LIVE</div></div>
      <div class="weather-grid"><div class="weather-item"><div class="wv">${Math.round(c.wind_speed_10m)} ${wd}</div><div class="wl">Wind mph</div></div><div class="weather-item"><div class="wv">${c.relative_humidity_2m}%</div><div class="wl">Humidity</div></div><div class="weather-item"><div class="wv">${Math.round(c.apparent_temperature)}°F</div><div class="wl">Feels Like</div></div></div>`;
  }catch(e){card.querySelector('.weather-desc').textContent='Unavailable'}
}

// ─── NAVIGATE ───
function navigateTo(lat,lng){
  const iOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  window.open(iOS?`maps://maps.apple.com/?daddr=${lat},${lng}`:`https://maps.google.com/maps?daddr=${lat},${lng}`,'_blank');
}
function shareLoc(name,lat,lng){
  const text=`Fishing spot: ${name}${lat?'\nhttps://maps.google.com/?q='+lat+','+lng:''}`;
  if(navigator.share){navigator.share({title:'Fishing Spot',text}).catch(()=>{})}
  else{navigator.clipboard.writeText(text).catch(()=>{})}
}
function refreshGPS(){
  navigator.geolocation.getCurrentPosition(
    pos=>{currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;renderHotspots()},
    ()=>{},{enableHighAccuracy:true,timeout:10000}
  );
}

// ─── SPEECH ───
function speak(t){try{if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(t);u.rate=.9;speechSynthesis.speak(u)}}catch(e){}}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='fish-caught'){speak(e.data.weight+' pound '+e.data.species+'! Nice catch!');if(navigator.vibrate)navigator.vibrate([100,50,100])}
});

if(activeTab==='hotspot')renderHotspots();
</script>
</body>
</html>
