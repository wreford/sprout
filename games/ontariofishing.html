<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ontario Fishing App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a160a"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0a160a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#d4d8c8;overflow:hidden}
:root{--bg:#0a160a;--bg2:#121e12;--accent:#3a6e3a;--gold:#c8a848;--text:#d4d8c8;--text2:#8a8e80}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}
.header{background:#121e12;border-bottom:2px solid var(--accent);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.header .back{color:var(--text2);font-size:14px;text-decoration:none;padding:6px 0;min-width:44px}
.header h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:1px}
.header .spacer{min-width:44px}
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;background:#121e12}
.tab-frame.active{display:block}
.bottom-tabs{display:flex;background:#0a160a;border-top:2px solid var(--accent);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bottom-tabs button{flex:1;padding:8px 4px 6px;background:none;border:none;color:#585858;font-family:inherit;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:52px;cursor:pointer;transition:color .15s;letter-spacing:0.5px}
.bottom-tabs button.active{color:var(--gold)}
.bottom-tabs .tab-icon{font-size:16px;font-weight:800;line-height:1}
.bottom-tabs .plus-icon{font-size:24px;font-weight:300;color:var(--accent);line-height:1}
.bottom-tabs button.active .plus-icon{color:var(--gold)}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text2);font-size:14px}
/* GPS Hotspot tab */
.hotspot-content{width:100%;height:100%;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.hotspot-content h2{font-size:16px;color:var(--gold);margin-bottom:12px}
.hotspot-content h3{font-size:13px;color:var(--gold);margin:16px 0 8px}
.spot-card{background:#1e2e1e;border:1px solid #2a3e2a;border-radius:10px;padding:12px;margin-bottom:10px}
.spot-card .spot-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.spot-card .spot-stats{font-size:12px;color:var(--text2);line-height:1.6}
.spot-card .spot-species{font-size:11px;color:var(--accent);margin-top:4px}
.spot-card .spot-best{font-size:12px;color:var(--gold);margin-top:4px;font-weight:600}
.spot-card .spot-nav{display:inline-block;margin-top:6px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;border:none;cursor:pointer;font-family:inherit}
.no-spots{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;line-height:1.6}
.spot-count{font-size:12px;color:var(--text2);margin-bottom:12px}
.solunar-card{background:#1a2a1a;border:1px solid #2a3e2a;border-radius:10px;padding:12px;margin-bottom:12px}
.solunar-card .sol-title{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:6px}
.solunar-card .sol-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text);padding:3px 0}
.moon-phase{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.feeding-good{color:#00a800;font-weight:700}
.feeding-ok{color:var(--gold)}
.feeding-poor{color:#c04030}
.wakelock-toggle{display:flex;align-items:center;justify-content:space-between;background:#1e2e1e;border:1px solid #2a3e2a;border-radius:10px;padding:12px;margin-bottom:10px}
.wakelock-toggle span{font-size:13px;color:var(--text)}
.toggle-switch{width:44px;height:24px;background:#333;border-radius:12px;position:relative;cursor:pointer;transition:background .2s}
.toggle-switch.on{background:var(--accent)}
.toggle-switch::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:left .2s}
.toggle-switch.on::after{left:22px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="../index.html" class="back">Back</a>
    <h1>ONTARIO FISHING</h1>
    <div class="spacer"></div>
  </div>
  <div class="tab-content" id="tabContent">
    <iframe id="frame-log" class="tab-frame active" src="fishlog.html"></iframe>
    <iframe id="frame-bait" class="tab-frame" src="baithelper.html"></iframe>
    <iframe id="frame-regs" class="tab-frame" src="fishregs.html"></iframe>
    <div id="frame-hotspot" class="tab-frame" style="overflow-y:auto">
      <div class="hotspot-content" id="hotspotContent">
        <h2>FISHING HOTSPOTS</h2>
        <div id="hotspotBody"></div>
      </div>
    </div>
  </div>
  <div class="bottom-tabs" id="bottomTabs">
    <button class="active" data-tab="log"><span class="tab-icon">LOG</span>Catches</button>
    <button data-tab="bait"><span class="tab-icon">BAIT</span>Helper</button>
    <button data-tab="regs"><span class="tab-icon">REGS</span>Rules</button>
    <button data-tab="hotspot"><span class="tab-icon">GPS</span>Hotspots</button>
  </div>
</div>
<script>
// Tab switching
const tabs=document.querySelectorAll('#bottomTabs button');
const frames={
  log:document.getElementById('frame-log'),
  bait:document.getElementById('frame-bait'),
  regs:document.getElementById('frame-regs'),
  hotspot:document.getElementById('frame-hotspot'),
};
let activeTab='log';
tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.tab;
    if(t===activeTab)return;
    tabs.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    Object.values(frames).forEach(f=>f.classList.remove('active'));
    frames[t].classList.add('active');
    activeTab=t;
    if(t==='hotspot')renderHotspots();
    localStorage.setItem('ontfish_tab',t);
  });
});
// Restore last tab
const savedTab=localStorage.getItem('ontfish_tab');
if(savedTab&&frames[savedTab]){
  tabs.forEach(b=>{b.classList.toggle('active',b.dataset.tab===savedTab)});
  Object.values(frames).forEach(f=>f.classList.remove('active'));
  frames[savedTab].classList.add('active');
  activeTab=savedTab;
}

// ─── SCREEN WAKE LOCK ───
let wakeLock=null;
async function requestWakeLock(){
  try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen')}}catch(e){}
}
async function releaseWakeLock(){
  try{if(wakeLock){await wakeLock.release();wakeLock=null}}catch(e){}
}
let wakeLockOn=localStorage.getItem('ontfish_wakelock')==='1';
if(wakeLockOn)requestWakeLock();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&wakeLockOn)requestWakeLock()});

// ─── SOLUNAR / MOON PHASE ───
function getMoonPhase(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  let c=0,e=0,jd=0,b=0;
  if(m<3){y--;m+=12}
  c=Math.floor(365.25*y);e=Math.floor(30.6001*(m+1));
  jd=c+e+d-694039.09;jd/=29.5305882;
  b=Math.floor(jd);jd-=b;
  const age=Math.round(jd*29.5305882);
  if(age<2)return{phase:'New Moon',icon:'O',feeding:'poor'};
  if(age<7)return{phase:'Waxing Crescent',icon:')',feeding:'ok'};
  if(age<9)return{phase:'First Quarter',icon:'D',feeding:'good'};
  if(age<14)return{phase:'Waxing Gibbous',icon:'O)',feeding:'ok'};
  if(age<16)return{phase:'Full Moon',icon:'(O)',feeding:'good'};
  if(age<21)return{phase:'Waning Gibbous',icon:'(O',feeding:'ok'};
  if(age<23)return{phase:'Last Quarter',icon:'C',feeding:'good'};
  return{phase:'Waning Crescent',icon:'(',feeding:'ok'};
}
function getSolunarPeriods(date){
  const moon=getMoonPhase(date);
  const h=date.getHours();
  // Approximate major/minor feeding periods based on moon transit
  const moonRise=6+Math.floor(Math.random()*3); // simplified
  const major1=moonRise,major2=(moonRise+12)%24;
  const minor1=(moonRise+6)%24,minor2=(moonRise+18)%24;
  const periods=[];
  periods.push({type:'Major',start:major1,end:(major1+2)%24});
  periods.push({type:'Major',start:major2,end:(major2+2)%24});
  periods.push({type:'Minor',start:minor1,end:(minor1+1)%24});
  periods.push({type:'Minor',start:minor2,end:(minor2+1)%24});
  let currentFeeding='poor';
  for(const p of periods){
    if(h>=p.start&&h<p.end+(p.type==='Major'?2:1)){
      currentFeeding=p.type==='Major'?'good':'ok';break;
    }
  }
  return{moon,periods,currentFeeding};
}
function formatHour(h){h=h%24;const ap=h>=12?'PM':'AM';return((h%12)||12)+ap}

// ─── GPS HOTSPOT TRACKER ───
function getCatches(){
  try{return JSON.parse(localStorage.getItem('fishlog_catches')||'[]')}catch(e){return[]}
}
function getHotspots(){
  const catches=getCatches();
  const spots={};
  catches.forEach(c=>{
    const loc=c.location||'Unknown';
    if(!spots[loc])spots[loc]={name:loc,catches:[],totalWeight:0,species:{},lat:c.lat,lng:c.lng};
    spots[loc].catches.push(c);
    const w=(c.weightLbs||0)+(c.weightOz||0)/16;
    spots[loc].totalWeight+=w;
    const sp=c.species||'Unknown';
    spots[loc].species[sp]=(spots[loc].species[sp]||0)+1;
    if(c.lat&&c.lng&&!spots[loc].lat){spots[loc].lat=c.lat;spots[loc].lng=c.lng}
  });
  return Object.values(spots).sort((a,b)=>b.catches.length-a.catches.length);
}

function renderHotspots(){
  const body=document.getElementById('hotspotBody');
  const spots=getHotspots();
  const now=new Date();
  const sol=getSolunarPeriods(now);

  let html='';

  // Wake Lock toggle
  html+=`<div class="wakelock-toggle">
    <span>Screen Stay On</span>
    <div class="toggle-switch ${wakeLockOn?'on':''}" id="wakeLockToggle"></div>
  </div>`;

  // Solunar
  html+=`<div class="solunar-card">
    <div class="sol-title">SOLUNAR FORECAST</div>
    <div class="moon-phase">${sol.moon.icon} ${sol.moon.phase}</div>
    <div class="sol-row"><span>Current Feeding:</span><span class="feeding-${sol.currentFeeding}">${sol.currentFeeding.toUpperCase()}</span></div>
    ${sol.periods.map(p=>`<div class="sol-row"><span>${p.type}:</span><span>${formatHour(p.start)} - ${formatHour(p.end+(p.type==='Major'?2:1))}</span></div>`).join('')}
  </div>`;

  // Weather fetch
  html+=`<div class="solunar-card" id="weatherCard"><div class="sol-title">WEATHER</div><div style="font-size:12px;color:var(--text2)">Fetching...</div></div>`;

  // Hotspots
  html+=`<h3>YOUR HOTSPOTS</h3>`;
  html+=`<div class="spot-count">${spots.length} locations, ${getCatches().length} total catches</div>`;

  if(spots.length===0){
    html+=`<div class="no-spots">No catches logged yet.<br>Start logging fish in the LOG tab to build your hotspot map.</div>`;
  } else {
    spots.slice(0,15).forEach((s,i)=>{
      const topSpecies=Object.entries(s.species).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]+' ('+e[1]+')').join(', ');
      const bestCatch=s.catches.reduce((best,c)=>{
        const w=(c.weightLbs||0)+(c.weightOz||0)/16;
        return w>best.w?{w,species:c.species}:best;
      },{w:0,species:''});
      html+=`<div class="spot-card">
        <div class="spot-name">#${i+1} ${s.name}</div>
        <div class="spot-stats">${s.catches.length} fish caught | ${s.totalWeight.toFixed(1)} lbs total</div>
        <div class="spot-species">${topSpecies}</div>
        ${bestCatch.w>0?`<div class="spot-best">Best: ${bestCatch.w.toFixed(1)} lb ${bestCatch.species}</div>`:''}
        ${s.lat&&s.lng?`<button class="spot-nav" onclick="navigateToSpot(${s.lat},${s.lng})">Navigate</button>`:''}
      </div>`;
    });
  }

  body.innerHTML=html;

  // Wake lock toggle
  const wlt=document.getElementById('wakeLockToggle');
  if(wlt)wlt.addEventListener('click',()=>{
    wakeLockOn=!wakeLockOn;
    wlt.classList.toggle('on',wakeLockOn);
    localStorage.setItem('ontfish_wakelock',wakeLockOn?'1':'0');
    if(wakeLockOn)requestWakeLock();else releaseWakeLock();
  });

  // Fetch weather
  fetchWeather();
}

// ─── REAL WEATHER (Open-Meteo, no API key) ───
async function fetchWeather(){
  const card=document.getElementById('weatherCard');
  if(!card)return;
  try{
    // Try GPS first
    let lat=43.84,lng=-79.38; // Default: Lake Simcoe area
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));
      lat=pos.coords.latitude;lng=pos.coords.longitude;
    }catch(e){}
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
    const resp=await fetch(url);
    const data=await resp.json();
    const c=data.current;
    const weatherCodes={0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',80:'Rain Showers',81:'Heavy Showers',95:'Thunderstorm'};
    const desc=weatherCodes[c.weather_code]||'Unknown';
    const windDirs=['N','NE','E','SE','S','SW','W','NW'];
    const windDir=windDirs[Math.round(c.wind_direction_10m/45)%8];
    card.innerHTML=`<div class="sol-title">WEATHER (Live)</div>
      <div class="sol-row"><span>Conditions:</span><span>${desc}</span></div>
      <div class="sol-row"><span>Temperature:</span><span>${Math.round(c.temperature_2m)}°F</span></div>
      <div class="sol-row"><span>Wind:</span><span>${Math.round(c.wind_speed_10m)} mph ${windDir}</span></div>
      <div class="sol-row"><span>Humidity:</span><span>${c.relative_humidity_2m}%</span></div>`;
  }catch(e){
    card.innerHTML=`<div class="sol-title">WEATHER</div><div style="font-size:12px;color:var(--text2)">Could not fetch weather</div>`;
  }
}

// ─── NAVIGATE TO SPOT ───
function navigateToSpot(lat,lng){
  // Open in Apple Maps or Google Maps
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const url=isIOS?`maps://maps.apple.com/?daddr=${lat},${lng}`:`https://maps.google.com/maps?daddr=${lat},${lng}`;
  window.open(url,'_blank');
}

// ─── SPEECH SYNTHESIS ───
function speak(text){
  try{
    if('speechSynthesis' in window){
      const u=new SpeechSynthesisUtterance(text);
      u.rate=0.9;u.pitch=1;
      speechSynthesis.speak(u);
    }
  }catch(e){}
}

// Listen for catch events from the log iframe
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='fish-caught'){
    const d=e.data;
    speak(d.weight+' pound '+d.species+'! Nice catch!');
    if(navigator.vibrate)navigator.vibrate([100,50,100]);
  }
});

// Initial render if on hotspot tab
if(activeTab==='hotspot')renderHotspots();
</script>
</body>
</html>
