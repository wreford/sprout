<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ontario Fishing App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ON Fishing"/>
<meta name="theme-color" content="#080e08"/>
<link rel="manifest" href="ontariofishing-manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#080e08;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e0e4d8;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.55}
html{scroll-behavior:smooth}
:root{--bg:#080e08;--bg2:#101a10;--bg3:#1a2e1a;--card:#141e14;--border:#243424;--accent:#2a8a3a;--accent2:#4a9e5a;--gold:#d4a83c;--gold2:#e8c050;--text:#e0e4d8;--text2:#9aa890;--red:#d04838;--green:#00b800;--blue:#3090d0;--purple:#9060d0;--rarity-common:#4a9e5a;--rarity-uncommon:#3090d0;--rarity-rare:#9060d0;--rarity-legendary:#d4a83c}

/* Custom scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(42,138,58,.35);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(42,138,58,.55)}
*{scrollbar-width:thin;scrollbar-color:rgba(42,138,58,.35) transparent}

.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* Header */
.header{background:linear-gradient(180deg,#1a2e1a 0%,#0c180c 100%);border-bottom:1px solid rgba(42,138,58,.3);padding:14px 16px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;position:relative}
.header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,rgba(42,138,58,.4) 20%,rgba(212,168,60,.5) 50%,rgba(42,138,58,.4) 80%,transparent 100%);background-size:200% 100%;animation:wave-line 3s ease-in-out infinite}
@keyframes wave-line{0%{background-position:200% 0}100%{background-position:-200% 0}}
.header .back:active{color:var(--text)}
.header .title-group{display:flex;align-items:center;gap:10px}
.header .title-group .title-icon{color:var(--gold);width:22px;height:22px;opacity:.9}
.header h1{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:3.5px;text-transform:uppercase}
.header .hdr-right{display:flex;align-items:center;gap:8px}
.header .search-btn{background:none;border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.header .search-btn:active{background:rgba(42,138,58,.15);color:var(--accent2)}
.header .search-btn svg{width:18px;height:18px}
.header .gps-status{font-size:10px;color:var(--text2);padding:5px 12px;background:rgba(0,0,0,.35);border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;gap:6px;font-weight:600;cursor:pointer;transition:all .3s}
.header .gps-status .gps-icon{width:14px;height:14px}
.header .gps-status:not(.active) .gps-icon{animation:gps-pulse 2s ease-in-out infinite}
@keyframes gps-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header .gps-status.active{color:var(--green);border-color:rgba(0,184,0,.4);background:rgba(0,184,0,.08);box-shadow:0 0 12px rgba(0,184,0,.15)}
.header .gps-status.active .gps-icon{animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Search overlay */
.search-overlay{position:fixed;inset:0;z-index:500;background:rgba(8,14,8,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;flex-direction:column;animation:fadeIn .2s ease-out}
.search-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.search-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar button{background:none;border:none;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;padding:8px 12px;font-family:inherit}
.search-results{flex:1;overflow-y:auto;padding:12px 16px}
.search-group{margin-bottom:16px}
.search-group-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-left:4px}
.search-result{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s}
.search-result:active{background:var(--bg3);transform:scale(0.98)}
.search-result .sr-icon{color:var(--text2);flex-shrink:0}
.search-result .sr-icon svg{width:16px;height:16px}
.search-result .sr-text{flex:1;font-size:13px;color:var(--text)}
.search-result .sr-sub{font-size:11px;color:var(--text2)}
.search-empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}

/* Tab content */
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;background:var(--bg2);opacity:0;transition:opacity .2s ease}
.tab-frame.active{display:block;opacity:1}

/* Bottom tabs */
.bottom-tabs{display:flex;background:rgba(8,14,8,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(42,138,58,.25);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);position:relative}
.bottom-tabs::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,60,.2),transparent)}
.tab-btn{flex:1;padding:8px 2px 10px;background:none;border:none;color:#4a5a4a;font-family:'Inter',inherit;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:64px;cursor:pointer;transition:all .3s ease;position:relative;letter-spacing:0.3px}
.tab-btn.active{color:var(--gold)}
.tab-btn.active::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 2px 2px}
.tab-btn.active::after{content:'';position:absolute;top:0;left:15%;right:15%;height:8px;background:radial-gradient(ellipse at center top,rgba(212,168,60,.2) 0%,transparent 70%);pointer-events:none}
.tab-btn .ico{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .3s ease}
.tab-btn .ico svg{width:24px;height:24px}
.tab-btn.active .ico{background:rgba(212,168,60,.12);box-shadow:0 2px 10px rgba(212,168,60,.15)}
.tab-btn .lbl{font-size:9px;font-weight:600}

/* Scroll shadow */
.hs-scroll{width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;scroll-behavior:smooth}
.scroll-shadow{position:sticky;top:0;left:0;right:0;height:18px;background:linear-gradient(180deg,rgba(8,14,8,.85) 0%,transparent 100%);z-index:10;pointer-events:none;margin-bottom:-18px}
.hs-pad{padding:18px 16px 28px}
.install-visible .hs-pad{padding-bottom:180px}

/* Scroll to top */
.scroll-top-btn{position:fixed;bottom:80px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:150;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:all .2s}
.scroll-top-btn.visible{display:flex}
.scroll-top-btn:active{transform:scale(0.9)}
.scroll-top-btn svg{width:20px;height:20px}

/* Hero card */
.hs-hero{background:linear-gradient(135deg,#1a3a1a 0%,#0a200a 50%,#142814 100%);border:1px solid var(--border);border-radius:16px;padding:22px 18px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hs-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(212,168,60,.06) 0%,transparent 70%);border-radius:50%}
.hs-hero h2{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hs-hero .subtitle{font-size:12px;color:var(--text2);margin-bottom:14px}
.hs-hero .stat-row{display:flex;gap:12px}
.hs-hero .mini-stat{flex:1;text-align:center;background:rgba(0,0,0,.25);border-radius:10px;padding:10px 4px}
.hs-hero .mini-stat .num{font-size:22px;font-weight:800;color:#fff}
.hs-hero .mini-stat .lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}

/* Cards */
.card{background:linear-gradient(135deg,rgba(20,30,20,.95) 0%,rgba(16,24,16,.95) 100%);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.card:active{border-color:var(--accent);transform:scale(0.985);box-shadow:inset 0 0 0 1px rgba(42,138,58,.15)}
.card-title{font-size:15px;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.card-title .badge{font-size:8px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:600}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.card-row .k{color:var(--text2)}
.card-row .v{color:var(--text);font-weight:600}
.card-divider{height:1px;background:var(--border);margin:8px 0}

/* Section headers */
.section-hdr{display:flex;align-items:center;gap:10px;margin:22px 0 14px;padding-left:0;border-left:3px solid var(--gold)}
.section-hdr h3{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;padding-left:10px}
.section-hdr .count{font-size:10px;color:var(--text2);background:rgba(212,168,60,.1);padding:4px 12px;border-radius:12px;font-weight:600;border:1px solid rgba(212,168,60,.15)}

/* Spot cards */
.spot{background:linear-gradient(135deg,rgba(20,30,20,.95) 0%,rgba(16,24,16,.95) 100%);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:16px;overflow:hidden;margin-bottom:14px;transition:all .15s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.spot:active{transform:scale(0.98);box-shadow:inset 0 0 0 1px rgba(42,138,58,.15)}
.spot.spot-gold{border-left-color:#d4a83c}
.spot.spot-silver{border-left-color:#b0b8c0}
.spot.spot-bronze{border-left-color:#cd7f32}
.spot-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.spot-info{flex:1;min-width:0}
.spot-rank{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#a08838);color:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;margin-left:10px;box-shadow:0 2px 8px rgba(212,168,60,.25)}
.spot-rank svg{width:16px;height:16px}
.spot-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spot-meta{font-size:12px;color:var(--text2);line-height:1.6;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spot-meta .meta-item{display:flex;align-items:center;gap:3px}
.spot-meta .meta-item svg{width:12px;height:12px;opacity:.6}
.spot-species-bar{padding:0 16px 10px;display:flex;gap:5px;flex-wrap:wrap}
.sp-chip{font-size:10px;padding:4px 8px;background:rgba(42,138,58,.15);color:var(--accent2);border-radius:6px;border:1px solid rgba(42,138,58,.2);font-weight:500}
.spot-mini-chart{padding:0 16px 10px;display:flex;align-items:flex-end;gap:3px;height:32px}
.spot-mini-chart .chart-bar{flex:1;min-width:8px;max-width:24px;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:2px 2px 0 0;transition:height .3s;position:relative}
.spot-mini-chart .chart-bar:hover::after{content:attr(data-label);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);font-size:8px;color:var(--text2);white-space:nowrap;background:rgba(0,0,0,.7);padding:2px 4px;border-radius:3px}
.spot-bottom{display:flex;border-top:1px solid var(--border)}
.spot-bottom button{flex:1;padding:12px;background:none;border:none;border-right:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',inherit;min-height:44px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.spot-bottom button:last-child{border-right:none}
.spot-bottom button:active{background:rgba(42,138,58,.12);color:var(--accent2)}
.spot-bottom button svg{width:14px;height:14px}
.spot-best{padding:6px 16px 12px;font-size:12px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:4px}
.spot-stats{padding:4px 16px 10px;display:flex;gap:10px;font-size:11px;color:var(--text2)}
.spot-stats span{display:flex;align-items:center;gap:3px}
.spot-stats svg{width:12px;height:12px;opacity:.6}

/* Weather card */
.weather{background:linear-gradient(135deg,#142a20 0%,#0e1e14 100%);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.weather:active{transform:scale(0.985)}
.weather-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.weather-main{display:flex;align-items:center;gap:14px}
.weather-icon{color:var(--gold);opacity:.9}
.weather-icon svg{width:36px;height:36px}
.weather-temp{font-size:40px;font-weight:800;color:#fff;line-height:1}
.weather-desc{font-size:13px;color:var(--text2);margin-top:4px}
.weather-live{font-size:8px;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.weather-live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-smooth 2s ease-in-out infinite}
@keyframes pulse-smooth{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.3;box-shadow:0 0 12px var(--green),0 0 24px rgba(0,184,0,.2)}}
.weather-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.weather-item{text-align:center;background:rgba(0,0,0,.25);border-radius:12px;padding:12px 4px}
.weather-item .wi-icon{display:flex;justify-content:center;margin-bottom:6px;color:var(--text2)}
.weather-item .wi-icon svg{width:18px;height:18px}
.weather-item .wv{font-size:15px;font-weight:700;color:var(--text)}
.weather-item .wl{font-size:9px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}

/* 3-day forecast */
.forecast-days{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.forecast-day{background:rgba(0,0,0,.25);border-radius:12px;padding:12px 8px;text-align:center;position:relative;border:1px solid transparent;transition:all .2s}
.forecast-day.best{border-color:rgba(0,184,0,.3);box-shadow:0 0 12px rgba(0,184,0,.1)}
.forecast-day .fd-label{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.forecast-day .fd-icon{display:flex;justify-content:center;margin-bottom:4px;color:var(--text2)}
.forecast-day .fd-icon svg{width:22px;height:22px}
.forecast-day .fd-temps{font-size:13px;font-weight:700;color:var(--text)}
.forecast-day .fd-temps .fd-low{color:var(--text2);font-weight:500}
.forecast-day .fd-wind{font-size:10px;color:var(--text2);margin-top:4px}
.forecast-day .fd-rating{font-size:10px;font-weight:700;margin-top:6px;padding:3px 8px;border-radius:6px;display:inline-block}
.forecast-day .best-badge{position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--green);background:rgba(0,184,0,.15);padding:2px 8px;border-radius:4px;white-space:nowrap}

/* Solunar */
.solunar{background:linear-gradient(135deg,#1a1a2e 0%,#0e0e1a 100%);border:1px solid #2a2a3e;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.solunar:active{transform:scale(0.985)}
.solunar.sol-good{box-shadow:0 0 20px rgba(0,184,0,.08),0 2px 12px rgba(0,0,0,.2);border-color:rgba(0,184,0,.2)}
.sol-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sol-moon-group{display:flex;align-items:center;gap:8px}
.sol-moon-icon{color:#c0c0e0;opacity:.8}
.sol-moon-icon svg{width:20px;height:20px}
.sol-moon{font-size:17px;font-weight:800;color:#e0e0f0}
.sol-feeding{font-size:11px;padding:5px 12px;border-radius:8px;font-weight:700;letter-spacing:.3px}
.sol-feeding.good{background:rgba(0,184,0,.12);color:var(--green)}
.sol-feeding.ok{background:rgba(212,168,60,.12);color:var(--gold)}
.sol-feeding.poor{background:rgba(208,72,56,.12);color:var(--red)}
.sol-periods{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sol-period{background:rgba(0,0,0,.25);border-radius:10px;padding:10px;text-align:center}
.sol-period .pt{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:4px}
.sol-period .pt svg{width:12px;height:12px}
.sol-period .pv{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.sol-period.major .pv{color:var(--green)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.toggle-left{display:flex;align-items:center;gap:12px}
.toggle-icon{color:var(--text2);opacity:.7}
.toggle-icon svg{width:18px;height:18px}
.toggle-row .tl{font-size:14px;color:var(--text);font-weight:600}
.toggle-row .td{font-size:11px;color:var(--text2);margin-top:2px}
.tswitch{width:52px;height:30px;background:#2a2a2a;border-radius:15px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tswitch.on{background:var(--accent)}
.tswitch::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;background:#fff;border-radius:50%;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tswitch.on::after{left:24px}

/* Empty */
.empty{text-align:center;padding:34px 22px;color:var(--text2);font-size:14px;line-height:1.7;background:var(--card);border:1px dashed var(--border);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}

/* Gamification */
.xp-card{background:linear-gradient(135deg,#1a2a10 0%,#0e1a08 100%);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.xp-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(212,168,60,.06) 0%,transparent 70%);border-radius:50%}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.xp-level{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.xp-level svg{width:16px;height:16px}
.xp-xp{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.xp-xp svg{width:14px;height:14px;color:var(--gold)}
.xp-title{font-size:20px;font-weight:800;color:#fff}
.xp-bar-wrap{height:10px;background:rgba(0,0,0,.35);border-radius:5px;overflow:hidden;margin-bottom:6px;margin-top:4px;position:relative}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#2a8a3a,#d4a83c,#e8c050);border-radius:5px;transition:width .6s ease-out;position:relative;overflow:hidden}
.xp-bar-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:xp-shimmer 2s ease-in-out infinite}
@keyframes xp-shimmer{0%{left:-100%}50%{left:100%}100%{left:100%}}
.xp-label{font-size:10px;color:var(--text2);display:flex;justify-content:space-between;font-weight:500}
.xp-total-earned{font-size:11px;color:var(--gold);margin-top:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.xp-total-earned svg{width:14px;height:14px}

/* Achievement categories */
.ach-category{margin-top:10px}
.ach-cat-label{font-size:9px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.badge-grid{display:flex;flex-wrap:wrap;gap:8px}
.badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--border);transition:all .2s}
.badge svg{width:18px;height:18px}
.badge.earned{background:linear-gradient(135deg,#2a3a1a,#1a2a10);border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(212,168,60,.15)}
.badge.locked{background:rgba(8,14,8,.6);color:#333;border-color:#1a1a1a}
.badge.locked svg{opacity:.2}
.badge-tooltip{position:fixed;background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);z-index:500;pointer-events:none;max-width:200px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}

/* Next achievement card */
.next-ach{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:14px;padding:14px 16px;margin-top:12px;display:flex;align-items:center;gap:12px}
.next-ach .na-icon{width:36px;height:36px;background:rgba(212,168,60,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.next-ach .na-icon svg{width:18px;height:18px}
.next-ach .na-info{flex:1}
.next-ach .na-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.next-ach .na-name{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.next-ach .na-desc{font-size:11px;color:var(--text2);margin-top:1px}
.next-ach .na-progress{height:6px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden;margin-top:6px}
.next-ach .na-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px}

/* Streak */
.streak-card{background:linear-gradient(135deg,#2a1a10,#1a1008);border:1px solid #3a2a1a;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.2);position:relative;overflow:hidden}
.streak-flame{display:flex;align-items:center;justify-content:center;min-width:40px;position:relative}
.streak-flame svg{width:28px;height:28px}
.streak-flame .flame-icon{color:#f87830;filter:drop-shadow(0 0 6px rgba(248,120,48,.4));animation:flame-pulse 2s ease-in-out infinite}
@keyframes flame-pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(248,120,48,.4));transform:scale(1)}50%{filter:drop-shadow(0 0 12px rgba(248,120,48,.6));transform:scale(1.1)}}
.streak-count{position:absolute;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.streak-info{flex:1}
.streak-info .si-title{font-size:14px;font-weight:700;color:#f8a848}
.streak-info .si-desc{font-size:11px;color:var(--text2);margin-top:3px}

/* Daily Challenge */
.challenge-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.challenge-card.completed{box-shadow:0 0 18px rgba(0,184,0,.1),0 2px 12px rgba(0,0,0,.2);border-left-color:var(--green)}
.challenge-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.challenge-icon{width:36px;height:36px;background:rgba(212,168,60,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.challenge-icon svg{width:20px;height:20px}
.challenge-card.completed .challenge-icon{background:rgba(0,184,0,.12);color:var(--green)}
.challenge-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.challenge-card.completed .challenge-label{color:var(--green)}
.challenge-desc{font-size:14px;font-weight:700;color:var(--text);flex:1}
.challenge-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.challenge-xp{font-size:12px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:4px}
.challenge-xp svg{width:14px;height:14px}
.challenge-check{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--green)}
.challenge-check svg{width:16px;height:16px}

/* Fish of the Day */
.fotd-card{background:linear-gradient(135deg,#2a2a10,#1a1a08);border:1px solid #3a3a1a;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.fotd-icon{width:36px;height:36px;background:rgba(212,168,60,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.fotd-icon svg{width:20px;height:20px}
.fotd-info{flex:1}
.fotd-label{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.fotd-species{font-size:15px;font-weight:800;color:#fff;margin-top:2px}
.fotd-bonus{font-size:11px;color:var(--gold);font-weight:600;margin-top:2px}

/* Lucky Lure */
.lure-card{background:linear-gradient(135deg,#1a1a2a,#0e0e1a);border:1px solid #2a2a3e;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.lure-icon{width:36px;height:36px;background:rgba(100,100,220,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#8888cc;flex-shrink:0}
.lure-icon svg{width:20px;height:20px}
.lure-info{flex:1}
.lure-label{font-size:9px;font-weight:700;color:#8888cc;letter-spacing:1px;text-transform:uppercase}
.lure-name{font-size:14px;font-weight:700;color:var(--text);margin-top:2px}

/* Fish Collection */
.collection-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.collection-header h3{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.collection-count{font-size:11px;color:var(--text2);font-weight:600}
.collection-pct{font-size:28px;font-weight:800;color:var(--gold);margin-bottom:6px}
.collection-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.coll-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 4px 8px;text-align:center;position:relative;transition:all .2s;cursor:pointer}
.coll-item .ci-initials{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:13px;font-weight:800;position:relative}
.coll-item .ci-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.coll-item .ci-badge svg{width:10px;height:10px}
.coll-item .ci-name{font-size:9px;line-height:1.2;font-weight:600;min-height:20px;display:flex;align-items:center;justify-content:center}
.coll-item .ci-count{font-size:9px;font-weight:600;margin-top:2px}
.coll-item .ci-hint{font-size:8px;color:var(--text2);font-style:italic;margin-top:2px;line-height:1.2;min-height:16px}
.coll-item .ci-rarity{font-size:7px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px;padding:1px 4px;border-radius:3px;display:inline-block}
.coll-item.caught{border-color:rgba(0,184,0,.3)}
.coll-item.caught .ci-initials{background:rgba(0,184,0,.15);color:var(--green)}
.coll-item.caught .ci-badge{background:var(--green);color:#fff}
.coll-item.caught .ci-name{color:var(--text)}
.coll-item.caught .ci-count{color:var(--green)}
.coll-item.locked .ci-initials{background:rgba(40,40,40,.6);color:#333}
.coll-item.locked .ci-badge{background:#222;color:#444}
.coll-item.locked .ci-name{color:#555}
.coll-item.locked .ci-count{color:#444}
.coll-item.newly-caught{animation:newCatchGlow 2s ease-in-out 3}
@keyframes newCatchGlow{0%,100%{box-shadow:0 0 4px rgba(0,184,0,.2)}50%{box-shadow:0 0 16px rgba(0,184,0,.5),0 0 32px rgba(0,184,0,.2)}}

/* Fishing Fact */
.fact-card{background:linear-gradient(135deg,#10201a,#0a1810);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.fact-top{display:flex;align-items:flex-start;gap:10px}
.fact-icon{width:32px;height:32px;background:rgba(48,144,208,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0}
.fact-icon svg{width:18px;height:18px}
.fact-label{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.fact-text{font-size:13px;color:var(--text);line-height:1.5;font-style:italic}

/* Current location */
.loc-banner{background:linear-gradient(135deg,var(--accent),#2a5e2a);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.loc-icon{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.loc-icon svg{width:18px;height:18px;color:#fff;animation:spin 3s linear infinite}
.loc-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 8px var(--green);animation:pulse-smooth 2s ease-in-out infinite}
.loc-text{font-size:12px;color:#fff;line-height:1.5;flex:1}
.loc-text .coords{font-size:11px;color:rgba(255,255,255,.6);font-family:'SF Mono','Fira Code',monospace}
.loc-text .accuracy{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.loc-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',inherit;flex-shrink:0;transition:background .2s}
.loc-btn:active{background:rgba(255,255,255,.25)}

/* Install Banner */
.install-banner{position:fixed;bottom:80px;left:8px;right:8px;background:linear-gradient(135deg,#1a3018,#0e200e);border:1px solid var(--accent);border-radius:14px;padding:14px 16px;z-index:200;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.install-banner .ib-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.install-banner .ib-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.install-banner .ib-icon svg{width:22px;height:22px;color:#fff}
.install-banner .ib-text{flex:1}
.install-banner .ib-title{font-size:14px;font-weight:700;color:#fff}
.install-banner .ib-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.install-banner .ib-close{background:none;border:none;color:var(--text2);font-size:18px;padding:4px 8px;cursor:pointer;min-width:32px;min-height:32px}
.install-banner .ib-steps{font-size:11px;color:var(--text);line-height:1.8;padding:10px 12px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:10px}
.install-banner .ib-steps b{color:var(--gold)}
.install-banner .ib-actions{display:flex;gap:8px}
.install-banner .ib-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;min-height:40px}
.install-banner .ib-btn-primary{background:var(--accent);color:#fff}
.install-banner .ib-btn-dismiss{background:rgba(255,255,255,.08);color:var(--text2)}

/* Shimmer loading */
@keyframes weather-shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.shimmer{background:linear-gradient(90deg,var(--card) 25%,rgba(255,255,255,.03) 50%,var(--card) 75%);background-size:400px 100%;animation:weather-shimmer 1.5s infinite}

/* Skeleton cards */
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;overflow:hidden}
.skeleton-line{height:12px;background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.03) 75%);background-size:400px 100%;animation:weather-shimmer 1.5s infinite;border-radius:6px;margin-bottom:8px}
.skeleton-line.w60{width:60%}
.skeleton-line.w40{width:40%}
.skeleton-line.w80{width:80%}
.skeleton-line.thick{height:20px}

/* Confetti for completed challenge */
@keyframes confetti-pop{0%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(.8) translateY(-20px)}}
.confetti-done{position:relative;overflow:hidden}
.confetti-done::before,.confetti-done::after{content:'*';position:absolute;font-size:16px;animation:confetti-pop 2s infinite;pointer-events:none}
.confetti-done::before{top:5px;right:15px;color:#d4a83c}
.confetti-done::after{top:10px;right:40px;color:#2a8a3a;animation-delay:.3s}

/* Layered card shadows */
.card,.spot,.weather,.solunar,.xp-card,.challenge-card,.fotd-card,.lure-card,.fact-card,.collection-section,.streak-card{
  box-shadow:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15);
}

/* Section divider */
.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:16px 0}

/* Solunar timeline */
.sol-timeline{display:flex;gap:1px;height:12px;border-radius:6px;overflow:hidden;margin-top:10px}
.sol-th{flex:1;min-width:0;transition:background .2s}
.sol-th.now{border:1px solid #fff;border-radius:2px}

/* Active/pressed states */
.tab-btn:active,.toggle-row:active,.fotd-card:active,.lure-card:active,.fact-card:active,.streak-card:active,.loc-btn:active,.loc-banner:active,.badge:active,.coll-item:active,.sp-chip:active{transform:scale(0.97)}

/* Fishing forecast banner */
.forecast-banner{border-radius:10px;padding:12px;margin-bottom:12px;text-align:center}
.forecast-rating{font-size:16px;font-weight:800;letter-spacing:1px}
.forecast-desc{font-size:11px;margin-top:2px;opacity:.85}
.forecast-bar-wrap{height:6px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden;margin-top:8px}
.forecast-bar-fill{height:100%;border-radius:3px;transition:width .6s ease-out}

/* Collection progress bar */
.collection-progress-wrap{height:8px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden;margin-bottom:12px}
.collection-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;transition:width .6s ease-out}

/* Badge tooltip */
.badge-tooltip.visible{display:block}
.badge{cursor:pointer}

/* Hotspot rank medals */
.spot-rank.gold{background:linear-gradient(135deg,#d4a83c,#a08838);color:#000}
.spot-rank.silver{background:linear-gradient(135deg,#b0b0b0,#888);color:#000}
.spot-rank.bronze{background:linear-gradient(135deg,#cd7f32,#a06020);color:#000}
.spot-rank.default{background:linear-gradient(135deg,var(--bg3),var(--bg2));color:var(--text2)}

/* Empty hotspot enhanced */
.empty-enhanced{text-align:center;padding:40px 22px;color:var(--text2);font-size:14px;line-height:1.7;background:var(--card);border:1px dashed var(--border);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.empty-enhanced .empty-icon{display:flex;justify-content:center;margin-bottom:12px;color:var(--accent);opacity:.5}
.empty-enhanced .empty-icon svg{width:40px;height:40px}
.empty-enhanced .empty-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:6px}

/* Notification cards */
.notif-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:14px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;animation:slideDown .3s ease-out;position:relative}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.notif-card.notif-solunar{border-left-color:var(--green)}
.notif-card.notif-season{border-left-color:var(--blue)}
.notif-card.notif-streak{border-left-color:#f87830}
.notif-card.notif-pb{border-left-color:var(--gold)}
.notif-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon svg{width:16px;height:16px}
.notif-card.notif-solunar .notif-icon{background:rgba(0,184,0,.12);color:var(--green)}
.notif-card.notif-season .notif-icon{background:rgba(48,144,208,.12);color:var(--blue)}
.notif-card.notif-streak .notif-icon{background:rgba(248,120,48,.12);color:#f87830}
.notif-card.notif-pb .notif-icon{background:rgba(212,168,60,.12);color:var(--gold)}
.notif-text{flex:1;font-size:12px;color:var(--text);line-height:1.4}
.notif-text strong{font-weight:700;color:#fff}
.notif-dismiss{background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;flex-shrink:0}

/* Trends card */
.trends-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.trends-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.trend-item{background:rgba(0,0,0,.2);border-radius:10px;padding:10px 12px}
.trend-item .ti-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.trend-item .ti-value{font-size:18px;font-weight:800;color:#fff}
.trend-item .ti-change{font-size:11px;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:3px}
.trend-item .ti-change svg{width:12px;height:12px}
.trend-item .ti-change.up{color:var(--green)}
.trend-item .ti-change.down{color:var(--red)}
.trend-item .ti-change.flat{color:var(--text2)}
.sparkline{display:flex;align-items:flex-end;gap:2px;height:40px;padding:4px 0}
.sparkline .spark-bar{flex:1;min-width:4px;background:linear-gradient(to top,var(--accent),var(--accent2));border-radius:2px 2px 0 0;transition:height .3s}
.sparkline .spark-bar.today{background:linear-gradient(to top,var(--gold),var(--gold2))}

/* Trip planner */
.trip-planner{background:linear-gradient(135deg,#1a2a30,#0e1a20);border:1px solid rgba(48,144,208,.3);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.trip-btn{display:flex;align-items:center;gap:10px;cursor:pointer;width:100%}
.trip-btn .tb-icon{width:40px;height:40px;background:rgba(48,144,208,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--blue);flex-shrink:0}
.trip-btn .tb-icon svg{width:20px;height:20px}
.trip-btn .tb-text{flex:1}
.trip-btn .tb-title{font-size:14px;font-weight:700;color:var(--blue)}
.trip-btn .tb-desc{font-size:11px;color:var(--text2);margin-top:2px}
.trip-btn .tb-arrow{color:var(--text2)}
.trip-btn .tb-arrow svg{width:18px;height:18px}
.trip-form{margin-top:14px;display:none}
.trip-form.open{display:block}
.trip-field{margin-bottom:12px}
.trip-field label{display:block;font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.trip-field input,.trip-field select{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.trip-field input:focus,.trip-field select:focus{border-color:var(--blue)}
.trip-field .loc-suggestions{margin-top:4px;max-height:120px;overflow-y:auto}
.trip-field .loc-sug{padding:8px 10px;font-size:12px;color:var(--text);cursor:pointer;border-radius:6px;transition:background .15s}
.trip-field .loc-sug:active,.trip-field .loc-sug:hover{background:rgba(48,144,208,.12)}
.trip-result{background:rgba(0,0,0,.2);border-radius:12px;padding:14px;margin-top:12px}
.trip-result .tr-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.trip-result .tr-row .k{color:var(--text2)}
.trip-result .tr-row .v{color:var(--text);font-weight:600}
.trip-actions{display:flex;gap:8px;margin-top:12px}
.trip-actions button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;min-height:40px}
.trip-actions .ta-save{background:var(--blue);color:#fff}
.trip-actions .ta-cancel{background:rgba(255,255,255,.08);color:var(--text2)}
.saved-trips{margin-top:12px}
.saved-trip{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.saved-trip .st-info{flex:1}
.saved-trip .st-date{font-size:12px;font-weight:700;color:var(--text)}
.saved-trip .st-loc{font-size:11px;color:var(--text2);margin-top:1px}
.saved-trip .st-del{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:4px 8px;opacity:.6}

/* Report generator */
.report-card{background:linear-gradient(135deg,#2a2010,#1a1808);border:1px solid rgba(212,168,60,.25);border-radius:16px;padding:16px;margin-bottom:14px}
.report-btn{display:flex;align-items:center;gap:10px;cursor:pointer;width:100%}
.report-btn .rb-icon{width:40px;height:40px;background:rgba(212,168,60,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0}
.report-btn .rb-icon svg{width:20px;height:20px}
.report-btn .rb-text{flex:1}
.report-btn .rb-title{font-size:14px;font-weight:700;color:var(--gold)}
.report-btn .rb-desc{font-size:11px;color:var(--text2);margin-top:2px}
.report-output{margin-top:12px;background:rgba(0,0,0,.3);border-radius:10px;padding:14px;font-size:12px;color:var(--text);line-height:1.6;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap;display:none}
.report-output.visible{display:block}
.report-actions{display:flex;gap:8px;margin-top:10px;display:none}
.report-actions.visible{display:flex}
.report-actions button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:inherit;min-height:40px}
.report-actions .ra-copy{background:var(--gold);color:#000}
.report-actions .ra-share{background:rgba(255,255,255,.08);color:var(--text2)}

/* Quote card */
.quote-card{background:linear-gradient(135deg,#1a201a,#0e140e);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.quote-text{font-size:13px;color:var(--text);font-style:italic;line-height:1.5;margin-bottom:6px}
.quote-attr{font-size:10px;color:var(--text2);font-weight:600}

/* Spot sort buttons */
.sort-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sort-btn{padding:6px 12px;font-size:10px;font-weight:600;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.sort-btn.active{background:rgba(212,168,60,.12);border-color:rgba(212,168,60,.3);color:var(--gold)}

/* Achievement slide-in banner */
.ach-banner{position:fixed;top:0;left:0;right:0;z-index:600;transform:translateY(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);background:linear-gradient(135deg,#2a3a1a,#1a2a10);border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.ach-banner.show{transform:translateY(0)}
.ach-banner .ab-icon{width:44px;height:44px;background:rgba(212,168,60,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--gold)}
.ach-banner .ab-icon svg{width:24px;height:24px}
.ach-banner .ab-text{flex:1}
.ach-banner .ab-label{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase}
.ach-banner .ab-name{font-size:16px;font-weight:800;color:#fff;margin-top:2px}
.ach-banner .ab-xp{font-size:12px;color:var(--gold);margin-top:2px}

/* Pull to refresh */
.ptr-indicator{text-align:center;padding:12px;color:var(--text2);font-size:11px;font-weight:600;display:none}
.ptr-indicator.active{display:block}
.ptr-indicator svg{width:18px;height:18px;animation:spin 1s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title-group">
      <i data-lucide="fish" class="title-icon"></i>
      <h1>ONTARIO FISHING</h1>
    </div>
    <div class="hdr-right">
      <button class="search-btn" id="searchBtn" title="Search"><i data-lucide="search"></i></button>
      <div class="gps-status" id="gpsStatus"><i data-lucide="navigation" class="gps-icon"></i><span id="gpsLabel">TAP GPS</span></div>
    </div>
  </div>
  <div class="tab-content" id="tabContent">
    <iframe id="frame-log" class="tab-frame active" src="fishlog.html" allow="geolocation;camera"></iframe>
    <iframe id="frame-game" class="tab-frame" src="8bitperch.html"></iframe>
    <iframe id="frame-bait" class="tab-frame" src="baithelper.html"></iframe>
    <iframe id="frame-regs" class="tab-frame" src="fishregs.html"></iframe>
    <div id="frame-hotspot" class="tab-frame">
      <div class="hs-scroll" id="hsScroll">
        <div class="scroll-shadow"></div>
        <div class="ptr-indicator" id="ptrIndicator"><i data-lucide="loader"></i> Refreshing...</div>
        <div class="hs-pad" id="hotspotBody">
          <!-- Skeleton loading -->
          <div class="skeleton-card"><div class="skeleton-line thick w60"></div><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div></div>
          <div class="skeleton-card"><div class="skeleton-line thick w80"></div><div class="skeleton-line w60"></div></div>
          <div class="skeleton-card"><div class="skeleton-line w40"></div><div class="skeleton-line thick w60"></div><div class="skeleton-line w80"></div></div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-tabs" id="bottomTabs">
    <button class="tab-btn active" data-tab="log"><span class="ico"><i data-lucide="book-open"></i></span><span class="lbl">Log</span></button>
    <button class="tab-btn" data-tab="game"><span class="ico"><i data-lucide="gamepad-2"></i></span><span class="lbl">Fish!</span></button>
    <button class="tab-btn" data-tab="bait"><span class="ico"><i data-lucide="target"></i></span><span class="lbl">Bait</span></button>
    <button class="tab-btn" data-tab="regs"><span class="ico"><i data-lucide="scale"></i></span><span class="lbl">Regs</span></button>
    <button class="tab-btn" data-tab="hotspot"><span class="ico"><i data-lucide="map-pin"></i></span><span class="lbl">GPS</span></button>
  </div>
</div>

<!-- Scroll to top -->
<button class="scroll-top-btn" id="scrollTopBtn"><i data-lucide="chevron-up"></i></button>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search catches, species, spots..." autocomplete="off"/>
    <button id="searchClose">Cancel</button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-empty">Type to search across your catches, species, and hotspot locations.</div>
  </div>
</div>

<!-- Achievement Banner -->
<div class="ach-banner" id="achBanner">
  <div class="ab-icon"><i data-lucide="trophy"></i></div>
  <div class="ab-text">
    <div class="ab-label">Achievement Unlocked</div>
    <div class="ab-name" id="achBannerName"></div>
    <div class="ab-xp" id="achBannerXP"></div>
  </div>
</div>

<!-- Install Banner -->
<div class="install-banner" id="installBanner">
  <div class="ib-top">
    <div class="ib-icon"><i data-lucide="download"></i></div>
    <div class="ib-text">
      <div class="ib-title">Install This App</div>
      <div class="ib-desc">Add to your home screen for the best experience</div>
    </div>
    <button class="ib-close" onclick="dismissInstall()">&times;</button>
  </div>
  <div class="ib-steps" id="installSteps"></div>
  <div class="ib-actions">
    <button class="ib-btn ib-btn-primary" id="installBtn" onclick="doInstall()">Install</button>
    <button class="ib-btn ib-btn-dismiss" onclick="dismissInstall()">Not Now</button>
  </div>
</div>

<script>
// Init Lucide icons in header/tabs on load
lucide.createIcons();

// ---- PERFORMANCE: Debounce ----
function debounce(fn, ms) {
  var timer;
  return function() {
    var ctx = this, args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(ctx, args); }, ms);
  };
}

// ---- WEATHER CACHE ----
var weatherCache = { data: null, timestamp: 0 };
var WEATHER_CACHE_MS = 15 * 60 * 1000; // 15 min

// ---- TAB SWITCHING ----
var tabs = document.querySelectorAll('.tab-btn');
var frames = { log: document.getElementById('frame-log'), game: document.getElementById('frame-game'), bait: document.getElementById('frame-bait'), regs: document.getElementById('frame-regs'), hotspot: document.getElementById('frame-hotspot') };
var activeTab = 'log';
tabs.forEach(function(btn) {
  btn.addEventListener('click', function() {
    var t = btn.dataset.tab;
    if (t === activeTab) return;
    if (navigator.vibrate) navigator.vibrate(5);
    tabs.forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    var prev = frames[activeTab];
    if (prev) prev.style.opacity = '0';
    setTimeout(function() {
      Object.values(frames).forEach(function(f) { f.classList.remove('active'); });
      frames[t].classList.add('active');
      frames[t].style.opacity = '1';
      activeTab = t;
      if (t === 'hotspot') renderHotspots();
    }, 100);
    localStorage.setItem('ontfish_tab', t);
  });
});
var savedTab = localStorage.getItem('ontfish_tab');
if (savedTab && frames[savedTab]) {
  tabs.forEach(function(b) { b.classList.toggle('active', b.dataset.tab === savedTab); });
  Object.values(frames).forEach(function(f) { f.classList.remove('active'); });
  frames[savedTab].classList.add('active');
  activeTab = savedTab;
}

// ---- UNIFIED SEARCH ----
var searchOverlay = document.getElementById('searchOverlay');
var searchInput = document.getElementById('searchInput');
var searchResults = document.getElementById('searchResults');
document.getElementById('searchBtn').addEventListener('click', function() {
  searchOverlay.classList.add('active');
  searchInput.value = '';
  searchInput.focus();
  if (navigator.vibrate) navigator.vibrate(5);
});
document.getElementById('searchClose').addEventListener('click', function() {
  searchOverlay.classList.remove('active');
});
searchInput.addEventListener('input', debounce(function() {
  var q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.innerHTML = '<div class="search-empty">Type to search across your catches, species, and hotspot locations.</div>'; return; }
  var catches = getCatches();
  var spots = getHotspots();
  var html = '';
  // Search catches
  var catchResults = catches.filter(function(c) {
    return (c.species || '').toLowerCase().includes(q) || (c.location || '').toLowerCase().includes(q) || (c.notes || '').toLowerCase().includes(q);
  }).slice(0, 8);
  if (catchResults.length) {
    html += '<div class="search-group"><div class="search-group-title">Catches</div>';
    catchResults.forEach(function(c) {
      html += '<div class="search-result" data-tab="log"><div class="sr-icon"><i data-lucide="fish"></i></div><div><div class="sr-text">' + (c.species || 'Unknown') + ' - ' + (c.weightLbs || 0).toFixed(1) + ' kg</div><div class="sr-sub">' + (c.location || '') + ' - ' + (c.date || '') + '</div></div></div>';
    });
    html += '</div>';
  }
  // Search species
  var speciesResults = ALL_SPECIES.filter(function(s) { return s.toLowerCase().includes(q); });
  if (speciesResults.length) {
    html += '<div class="search-group"><div class="search-group-title">Species</div>';
    speciesResults.forEach(function(s) {
      var count = 0;
      catches.forEach(function(c) { if (c.species === s || (c.species || '').includes(s) || s.includes(c.species || '')) count++; });
      html += '<div class="search-result" data-tab="hotspot"><div class="sr-icon"><i data-lucide="target"></i></div><div><div class="sr-text">' + s + '</div><div class="sr-sub">' + (count > 0 ? count + ' caught' : 'Not yet caught') + '</div></div></div>';
    });
    html += '</div>';
  }
  // Search spots
  var spotResults = spots.filter(function(s) { return s.name.toLowerCase().includes(q); }).slice(0, 8);
  if (spotResults.length) {
    html += '<div class="search-group"><div class="search-group-title">Hotspot Locations</div>';
    spotResults.forEach(function(s) {
      html += '<div class="search-result" data-tab="hotspot"><div class="sr-icon"><i data-lucide="map-pin"></i></div><div><div class="sr-text">' + s.name + '</div><div class="sr-sub">' + s.catches.length + ' fish caught</div></div></div>';
    });
    html += '</div>';
  }
  if (!html) html = '<div class="search-empty">No results found for "' + q.replace(/</g,'&lt;') + '"</div>';
  searchResults.innerHTML = html;
  lucide.createIcons();
  // Bind result clicks
  searchResults.querySelectorAll('.search-result').forEach(function(r) {
    r.addEventListener('click', function() {
      var tab = r.getAttribute('data-tab');
      if (tab && frames[tab]) {
        searchOverlay.classList.remove('active');
        tabs.forEach(function(b) { b.classList.toggle('active', b.dataset.tab === tab); });
        Object.values(frames).forEach(function(f) { f.classList.remove('active'); });
        frames[tab].classList.add('active');
        frames[tab].style.opacity = '1';
        activeTab = tab;
        if (tab === 'hotspot') renderHotspots();
      }
    });
  });
}, 200));

// ---- SCROLL TO TOP ----
var scrollTopBtn = document.getElementById('scrollTopBtn');
var hsScroll = document.getElementById('hsScroll');
hsScroll.addEventListener('scroll', function() {
  scrollTopBtn.classList.toggle('visible', hsScroll.scrollTop > 300 && activeTab === 'hotspot');
});
scrollTopBtn.addEventListener('click', function() {
  hsScroll.scrollTo({ top: 0, behavior: 'smooth' });
  if (navigator.vibrate) navigator.vibrate(5);
});

// ---- PULL TO REFRESH ----
(function() {
  var startY = 0, pulling = false;
  var ptr = document.getElementById('ptrIndicator');
  hsScroll.addEventListener('touchstart', function(e) {
    if (hsScroll.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
  }, { passive: true });
  hsScroll.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var diff = e.touches[0].clientY - startY;
    if (diff > 80 && hsScroll.scrollTop === 0) { ptr.classList.add('active'); }
  }, { passive: true });
  hsScroll.addEventListener('touchend', function() {
    if (ptr.classList.contains('active')) {
      weatherCache.data = null;
      weatherCache.timestamp = 0;
      renderHotspots();
      setTimeout(function() { ptr.classList.remove('active'); }, 800);
    }
    pulling = false;
  }, { passive: true });
})();

// ---- GPS ----
var currentLat = null, currentLng = null, currentAccuracy = null, gpsWatchId = null, gpsAttempts = 0;
var gpsEl = document.getElementById('gpsStatus');
var gpsLabel = gpsEl.querySelector && gpsEl.querySelector('#gpsLabel') || gpsEl;
function updateGPSLabel(text) { try { var el = document.getElementById('gpsLabel'); if (el) el.textContent = text; else gpsEl.textContent = text; } catch (e) {} }
function startGPS() {
  if (!navigator.geolocation) { updateGPSLabel('NO GPS'); return; }
  if (gpsWatchId) return;
  gpsAttempts++; updateGPSLabel('Locating...');
  var opts = gpsAttempts <= 1 ? { enableHighAccuracy: false, maximumAge: 120000, timeout: 15000 } : { enableHighAccuracy: true, maximumAge: 60000, timeout: 20000 };
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; currentAccuracy = pos.coords.accuracy;
      updateGPSLabel('GPS ON'); gpsEl.classList.add('active');
      gpsWatchId = navigator.geolocation.watchPosition(
        function(p) { currentLat = p.coords.latitude; currentLng = p.coords.longitude; currentAccuracy = p.coords.accuracy; },
        function() {},
        { enableHighAccuracy: true, maximumAge: 60000, timeout: 30000 }
      );
      if (activeTab === 'hotspot') renderHotspots();
    },
    function(err) {
      if (err.code === 1) updateGPSLabel('GPS Denied');
      else if (err.code === 2) updateGPSLabel('GPS N/A');
      else updateGPSLabel('GPS Timeout');
      gpsEl.classList.remove('active');
      try {
        var saved = JSON.parse(localStorage.getItem('ontfish_lastgps') || 'null');
        if (saved) { currentLat = saved.lat; currentLng = saved.lng; updateGPSLabel('Last GPS'); if (activeTab === 'hotspot') renderHotspots(); }
      } catch (e) {}
    }, opts
  );
}
setInterval(function() { if (currentLat) try { localStorage.setItem('ontfish_lastgps', JSON.stringify({ lat: currentLat, lng: currentLng })); } catch (e) {} }, 30000);
gpsEl.addEventListener('click', function() { startGPS(); });
var gpsTriggered = false;
function tryGPSOnce() { if (!gpsTriggered) { gpsTriggered = true; setTimeout(startGPS, 100); } }
document.addEventListener('touchstart', tryGPSOnce, { once: true, passive: true });
document.addEventListener('click', tryGPSOnce, { once: true });

// ---- WAKE LOCK ----
var wakeLock = null, wakeLockOn = localStorage.getItem('ontfish_wakelock') === '1';
async function requestWakeLock() { try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (e) {} }
async function releaseWakeLock() { try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch (e) {} }
if (wakeLockOn) requestWakeLock();
document.addEventListener('visibilitychange', function() { if (document.visibilityState === 'visible' && wakeLockOn) requestWakeLock(); });

// ---- ACHIEVEMENTS ----
var ACHIEVEMENTS = [
  { id: 'first', name: 'FIRST CATCH', desc: 'Log your first fish', check: function(c) { return c.length >= 1; }, progress: function(c) { return Math.min(1, c.length); }, target: 1, xp: 10, icon: 'fish', cat: 'beginner' },
  { id: 'five', name: 'HIGH FIVE', desc: 'Log 5 fish', check: function(c) { return c.length >= 5; }, progress: function(c) { return Math.min(5, c.length); }, target: 5, xp: 25, icon: 'fish', cat: 'beginner' },
  { id: 'ten', name: 'DOUBLE DIGITS', desc: 'Log 10 fish', check: function(c) { return c.length >= 10; }, progress: function(c) { return Math.min(10, c.length); }, target: 10, xp: 50, icon: 'star', cat: 'beginner' },
  { id: 'fifty', name: 'HALF CENTURY', desc: 'Log 50 fish', check: function(c) { return c.length >= 50; }, progress: function(c) { return Math.min(50, c.length); }, target: 50, xp: 100, icon: 'award', cat: 'intermediate' },
  { id: 'hundred', name: 'CENTURION', desc: 'Log 100 fish', check: function(c) { return c.length >= 100; }, progress: function(c) { return Math.min(100, c.length); }, target: 100, xp: 200, icon: 'trophy', cat: 'expert' },
  { id: 'walleye', name: 'WALLEYE HUNTER', desc: 'Catch 5 walleye', check: function(c) { return c.filter(function(f) { return f.species === 'Walleye'; }).length >= 5; }, progress: function(c) { return Math.min(5, c.filter(function(f) { return f.species === 'Walleye'; }).length); }, target: 5, xp: 50, icon: 'target', cat: 'intermediate' },
  { id: 'pike', name: 'PIKE MASTER', desc: 'Catch 5 pike', check: function(c) { return c.filter(function(f) { return f.species === 'Northern Pike'; }).length >= 5; }, progress: function(c) { return Math.min(5, c.filter(function(f) { return f.species === 'Northern Pike'; }).length); }, target: 5, xp: 50, icon: 'zap', cat: 'intermediate' },
  { id: 'bass', name: 'BASS PRO', desc: 'Catch 5 bass', check: function(c) { return c.filter(function(f) { return (f.species || '').includes('Bass'); }).length >= 5; }, progress: function(c) { return Math.min(5, c.filter(function(f) { return (f.species || '').includes('Bass'); }).length); }, target: 5, xp: 50, icon: 'fish', cat: 'intermediate' },
  { id: 'muskie', name: 'MUSKIE LEGEND', desc: 'Catch a muskie', check: function(c) { return c.some(function(f) { return f.species === 'Muskie'; }); }, progress: function(c) { return c.some(function(f) { return f.species === 'Muskie'; }) ? 1 : 0; }, target: 1, xp: 100, icon: 'award', cat: 'expert' },
  { id: 'trophy', name: 'TROPHY FISH', desc: 'Catch a fish over 10 lbs', check: function(c) { return c.some(function(f) { return (f.weightLbs || 0) >= 10; }); }, progress: function(c) { var m = 0; c.forEach(function(f) { if ((f.weightLbs || 0) > m) m = f.weightLbs || 0; }); return Math.min(10, m); }, target: 10, xp: 75, icon: 'trophy', cat: 'expert' },
  { id: 'monster', name: 'MONSTER', desc: 'Catch a fish over 20 lbs', check: function(c) { return c.some(function(f) { return (f.weightLbs || 0) >= 20; }); }, progress: function(c) { var m = 0; c.forEach(function(f) { if ((f.weightLbs || 0) > m) m = f.weightLbs || 0; }); return Math.min(20, m); }, target: 20, xp: 150, icon: 'zap', cat: 'master' },
  { id: 'explorer', name: 'EXPLORER', desc: 'Fish at 5 different spots', check: function(c) { var s = new Set(c.map(function(f) { return f.location; }).filter(Boolean)); return s.size >= 5; }, progress: function(c) { return Math.min(5, new Set(c.map(function(f) { return f.location; }).filter(Boolean)).size); }, target: 5, xp: 60, icon: 'compass', cat: 'intermediate' },
  { id: 'globe', name: 'GLOBE TROTTER', desc: 'Fish at 10 spots', check: function(c) { var s = new Set(c.map(function(f) { return f.location; }).filter(Boolean)); return s.size >= 10; }, progress: function(c) { return Math.min(10, new Set(c.map(function(f) { return f.location; }).filter(Boolean)).size); }, target: 10, xp: 100, icon: 'compass', cat: 'expert' },
  { id: 'variety', name: 'VARIETY PACK', desc: 'Catch 5 different species', check: function(c) { var s = new Set(c.map(function(f) { return f.species; }).filter(Boolean)); return s.size >= 5; }, progress: function(c) { return Math.min(5, new Set(c.map(function(f) { return f.species; }).filter(Boolean)).size); }, target: 5, xp: 60, icon: 'star', cat: 'intermediate' },
  { id: 'collector', name: 'COLLECTOR', desc: 'Catch 10 different species', check: function(c) { var s = new Set(c.map(function(f) { return f.species; }).filter(Boolean)); return s.size >= 10; }, progress: function(c) { return Math.min(10, new Set(c.map(function(f) { return f.species; }).filter(Boolean)).size); }, target: 10, xp: 120, icon: 'star', cat: 'expert' },

// ---- MOON / SOLUNAR ----
function getMoonPhase(date) {
  var y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
  if (m < 3) { y--; m += 12; }
  var c = Math.floor(365.25 * y), e = Math.floor(30.6001 * (m + 1));
  var jd = c + e + d - 694039.09; jd /= 29.5305882; jd -= Math.floor(jd);
  var age = Math.round(jd * 29.5305882);
  if (age < 2) return { phase: 'New Moon', feeding: 'poor' };
  if (age < 7) return { phase: 'Waxing Crescent', feeding: 'ok' };
  if (age < 9) return { phase: 'First Quarter', feeding: 'good' };
  if (age < 14) return { phase: 'Waxing Gibbous', feeding: 'ok' };
  if (age < 16) return { phase: 'Full Moon', feeding: 'good' };
  if (age < 21) return { phase: 'Waning Gibbous', feeding: 'ok' };
  if (age < 23) return { phase: 'Last Quarter', feeding: 'good' };
  return { phase: 'Waning Crescent', feeding: 'ok' };
}
function getSolunar(date) {
  var moon = getMoonPhase(date); var h = date.getHours();
  var seed = date.getDate() * 7 + date.getMonth() * 31;
  var mr = (5 + seed % 4);
  var periods = [{ type: 'Major', start: mr, dur: 2 }, { type: 'Major', start: (mr + 12) % 24, dur: 2 }, { type: 'Minor', start: (mr + 6) % 24, dur: 1 }, { type: 'Minor', start: (mr + 18) % 24, dur: 1 }];
  var feeding = 'poor';
  for (var i = 0; i < periods.length; i++) {
    var p = periods[i]; var e = (p.start + p.dur) % 24;
    if ((p.start < e && h >= p.start && h < e) || (p.start >= e && (h >= p.start || h < e))) { feeding = p.type === 'Major' ? 'good' : 'ok'; break; }
  }
  return { moon: moon, periods: periods, feeding: feeding };
}
function getSolunarForDate(date) {
  var moon = getMoonPhase(date);
  var seed = date.getDate() * 7 + date.getMonth() * 31;
  var mr = (5 + seed % 4);
  var periods = [{ type: 'Major', start: mr, dur: 2 }, { type: 'Major', start: (mr + 12) % 24, dur: 2 }, { type: 'Minor', start: (mr + 6) % 24, dur: 1 }, { type: 'Minor', start: (mr + 18) % 24, dur: 1 }];
  return { moon: moon, periods: periods };
}
function fmtH(h) { h = ((h % 24) + 24) % 24; return ((h % 12) || 12) + (h >= 12 ? 'PM' : 'AM'); }

// ---- FISHING FORECAST ----
function getFishingForecast(weatherCode, windSpeed, solFeeding) {
  var score = 50;
  var hour = new Date().getHours();
  if (hour >= 5 && hour <= 8) score += 15;
  if (hour >= 17 && hour <= 20) score += 15;
  if (solFeeding === 'good') score += 20;
  else if (solFeeding === 'ok') score += 10;
  if ([2, 3].indexOf(weatherCode) >= 0) score += 15;
  if ([61, 63, 80].indexOf(weatherCode) >= 0) score += 10;
  if ([65, 95].indexOf(weatherCode) >= 0) score -= 20;
  if (windSpeed >= 5 && windSpeed <= 15) score += 10;
  if (windSpeed > 20) score -= 10;
  score = Math.max(0, Math.min(100, score));
  if (score >= 75) return { rating: 'EXCELLENT', color: '#00c040', desc: 'Perfect conditions. Get out there!', score: score };
  if (score >= 55) return { rating: 'GOOD', color: '#80c020', desc: 'Solid fishing conditions.', score: score };
  if (score >= 40) return { rating: 'FAIR', color: '#c0a020', desc: 'Fish may be less active.', score: score };
  return { rating: 'POOR', color: '#c04030', desc: 'Try deeper water or wait.', score: score };
}

function getDailyForecastScore(weatherCode, windSpeed, date) {
  var score = 50;

  if ([65, 95].indexOf(weatherCode) >= 0) score -= 20;

    else prev7 = prev7.concat(catches.filter(function(c) { return c.date === ds; }));
  }
  var l7count = last7.length, p7count = prev7.length;
  var countChange = p7count > 0 ? Math.round((l7count - p7count) / p7count * 100) : (l7count > 0 ? 100 : 0);
  // Average weight
  var l7avgW = l7count > 0 ? last7.reduce(function(s, c) { return s + (c.weightLbs || 0); }, 0) / l7count : 0;
  var p7avgW = p7count > 0 ? prev7.reduce(function(s, c) { return s + (c.weightLbs || 0); }, 0) / p7count : 0;
  var weightChange = p7avgW > 0 ? Math.round((l7avgW - p7avgW) / p7avgW * 100) : 0;

  var bestDay = '--';

  var bestHour = '--';

    if (todayCatches.length === 0 && hour >= 16) {
      var key3 = 'streak_' + todayKey;
      if (!dismissed[key3]) notifs.push({ type: 'streak', icon: 'flame', text: '<strong>You haven\'t fished today!</strong> Your ' + stats.streak + '-day streak will break if you don\'t log a catch.', key: key3 });
    }
  }
  // Personal best hint
  var speciesBest = {};
  catches.forEach(function(c) { if (c.species && c.weightLbs) { if (!speciesBest[c.species] || c.weightLbs > speciesBest[c.species]) speciesBest[c.species] = c.weightLbs; } });
  var recentCatches = catches.filter(function(c) { return c.date === todayKey; });
  recentCatches.forEach(function(c) {
    if (c.species && c.weightLbs && speciesBest[c.species]) {
      var pct = c.weightLbs / speciesBest[c.species] * 100;
      if (pct >= 80 && pct < 100) {
        var key4 = 'pb_' + c.species + '_' + todayKey;
        if (!dismissed[key4]) notifs.push({ type: 'pb', icon: 'trophy', text: '<strong>Close to your ' + c.species + ' personal best!</strong> You\'re at ' + Math.round(pct) + '% of your record.', key: key4 });
      }
    }
  });
  return notifs;
}

function dismissNotification(key) {
  try {
    var dismissed = JSON.parse(localStorage.getItem('ontfish_notif_dismissed') || '{}');
    dismissed[key] = Date.now();
    // Clean old dismissals
    var cutoff = Date.now() - 3 * 86400000;
    Object.keys(dismissed).forEach(function(k) { if (dismissed[k] < cutoff) delete dismissed[k]; });
    localStorage.setItem('ontfish_notif_dismissed', JSON.stringify(dismissed));
  } catch (e) {}
}

// ---- TRIP PLANNER ----
function getSavedTrips() { try { return JSON.parse(localStorage.getItem('ontfish_trips') || '[]'); } catch (e) { return []; } }
function saveTrip(trip) {
  var trips = getSavedTrips();
  trip.id = Date.now();
  trips.unshift(trip);
  localStorage.setItem('ontfish_trips', JSON.stringify(trips.slice(0, 20)));
}
function deleteTrip(id) {
  var trips = getSavedTrips().filter(function(t) { return t.id !== id; });
  localStorage.setItem('ontfish_trips', JSON.stringify(trips));
  renderHotspots();
}

// ---- ACHIEVEMENT ANIMATION ----
var previousEarned = [];
try { previousEarned = JSON.parse(localStorage.getItem('ontfish_prev_earned') || '[]'); } catch (e) {}
function checkNewAchievements(currentEarned) {
  var newOnes = currentEarned.filter(function(id) { return previousEarned.indexOf(id) === -1; });
  if (newOnes.length > 0) {
    var ach = ACHIEVEMENTS.find(function(a) { return a.id === newOnes[0]; });
    if (ach) showAchievementBanner(ach);
  }
  previousEarned = currentEarned.slice();
  localStorage.setItem('ontfish_prev_earned', JSON.stringify(previousEarned));
}

function showAchievementBanner(ach) {
  var banner = document.getElementById('achBanner');

  banner.classList.add('show');
