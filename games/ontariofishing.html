      h += '<div class="spot-bottom">';
      if (hasGPS) h += '<button onclick="navigateTo(' + s.lat + ',' + s.lng + ')"><i data-lucide="navigation"></i> Navigate</button>';
      h += '<button onclick="shareLoc(\'' + s.name.replace(/'/g, "\\'") + '\',' + (s.lat || 0) + ',' + (s.lng || 0) + ')"><i data-lucide="share-2"></i> Share</button></div></div>';
    });
  }

  // Fish Collection
  var caughtSpeciesMap = {};
  catches.forEach(function(c) { var sp = c.species || ''; if (sp) caughtSpeciesMap[sp] = (caughtSpeciesMap[sp] || 0) + 1; });
  var caughtCount = ALL_SPECIES.filter(function(sp) {
    for (var k of Object.keys(caughtSpeciesMap)) { if (k === sp || k.includes(sp) || sp.includes(k)) return true; }
    return false;
  }).length;

  h += '<div class="section-divider"></div>';
  var collPct = ALL_SPECIES.length > 0 ? Math.round(caughtCount / ALL_SPECIES.length * 100) : 0;
  h += '<div class="section-hdr"><h3>FISH COLLECTION</h3><span class="count">' + caughtCount + '/' + ALL_SPECIES.length + ' Species Discovered</span></div>';
  h += '<div class="collection-pct">' + collPct + '% Complete</div>';
  h += '<div class="collection-progress-wrap"><div class="collection-progress-fill" style="width:' + collPct + '%"></div></div>';

  // Recently caught species (for glow animation)
  var recentSpecies = {};
  catches.slice(0, 5).forEach(function(c) { if (c.species) recentSpecies[c.species] = true; });

  var speciesSorted = ALL_SPECIES.slice().sort(function(a, b) {
    var aC = 0, bC = 0;
    for (var k in caughtSpeciesMap) { if (k === a || k.includes(a) || a.includes(k)) aC += caughtSpeciesMap[k]; }
    for (var k2 in caughtSpeciesMap) { if (k2 === b || k2.includes(b) || b.includes(k2)) bC += caughtSpeciesMap[k2]; }
    if (aC > 0 && bC === 0) return -1;
    if (bC > 0 && aC === 0) return 1;
    return 0;
  });

  h += '<div class="collection-grid">';
  speciesSorted.forEach(function(sp) {
    var count = 0;
    for (var k in caughtSpeciesMap) { if (k === sp || k.includes(sp) || sp.includes(k)) count += caughtSpeciesMap[k]; }
    var isCaught = count > 0;
    var initials = sp.split(/[\s\/]/).map(function(w) { return w[0]; }).join('').slice(0, 2).toUpperCase();
    var rarity = SPECIES_RARITY[sp] || 'common';
    var rarityColor = RARITY_COLORS[rarity];
    var rarityLabel = RARITY_LABELS[rarity];
    var hint = SPECIES_HINTS[sp] || '';
    var isNew = isCaught && recentSpecies[sp];
    h += '<div class="coll-item ' + (isCaught ? 'caught' : 'locked') + (isNew ? ' newly-caught' : '') + '">';
    h += '<div class="ci-initials"' + (isCaught ? ' style="border:1px solid ' + rarityColor + '"' : '') + '>' + initials + '<div class="ci-badge"><i data-lucide="' + (isCaught ? 'check' : 'lock') + '"></i></div></div>';
    h += '<div class="ci-name">' + sp + '</div>';
    h += '<div class="ci-count">' + (isCaught ? count + ' caught' : '---') + '</div>';
    if (!isCaught && hint) h += '<div class="ci-hint">' + hint + '</div>';
    h += '<div class="ci-rarity" style="color:' + rarityColor + ';background:' + rarityColor + '20">' + rarityLabel + '</div>';
    h += '</div>';
  });
  h += '</div>';

  h += '<div class="section-divider"></div>';

  // ---- DAILY CONTENT ----
  // Tip of the day
  var tipIdx = (new Date().getDate() * 11 + new Date().getMonth() * 3) % TIPS_OF_DAY.length;
  h += '<div class="fact-card"><div class="fact-top"><div class="fact-icon" style="background:rgba(42,138,58,.12);color:var(--accent2)"><i data-lucide="lightbulb"></i></div><div><div class="fact-label" style="color:var(--accent2)">Tip of the Day</div><div class="fact-text" style="font-style:normal">' + TIPS_OF_DAY[tipIdx] + '</div></div></div></div>';

  // This Day in Fishing History
  var histIdx = (new Date().getDate() * 17 + new Date().getMonth() * 5) % HISTORY_FACTS.length;
  h += '<div class="fact-card"><div class="fact-top"><div class="fact-icon" style="background:rgba(212,168,60,.12);color:var(--gold)"><i data-lucide="book-open"></i></div><div><div class="fact-label" style="color:var(--gold)">Fishing History</div><div class="fact-text">' + HISTORY_FACTS[histIdx] + '</div></div></div></div>';

  // Fishing Fact
  var factIdx = (new Date().getDate() * 3 + new Date().getMonth() * 17) % FACTS.length;
  h += '<div class="fact-card"><div class="fact-top"><div class="fact-icon"><i data-lucide="info"></i></div><div><div class="fact-label">Did You Know?</div><div class="fact-text">' + FACTS[factIdx] + '</div></div></div></div>';

  body.innerHTML = h;
  lucide.createIcons();

  // Badge tooltip on click
  var tooltip = document.querySelector('.badge-tooltip');
  if (!tooltip) { tooltip = document.createElement('div'); tooltip.className = 'badge-tooltip'; document.body.appendChild(tooltip); }
  document.querySelectorAll('.badge').forEach(function(b) {
    b.addEventListener('click', function(e) {
      e.stopPropagation();
      if (navigator.vibrate) navigator.vibrate(5);
      var tip = b.getAttribute('data-tip');
      if (!tip) return;
      var parts = tip.split('\n');
      tooltip.innerHTML = '<div style="font-weight:700;color:var(--gold);margin-bottom:3px">' + parts[0] + '</div><div style="font-size:11px;color:var(--text2);margin-bottom:3px">' + parts[1] + '</div><div style="font-size:11px;color:var(--gold);font-weight:600">' + parts[2] + '</div>';
      var rect = b.getBoundingClientRect();
      tooltip.style.left = Math.max(8, Math.min(window.innerWidth - 210, rect.left - 40)) + 'px';
      tooltip.style.top = (rect.bottom + 8) + 'px';
      tooltip.classList.add('visible');
      setTimeout(function() { tooltip.classList.remove('visible'); }, 2500);
    });
  });
  document.addEventListener('click', function() { if (tooltip) tooltip.classList.remove('visible'); });

  // Count-up animation for hero stats
  document.querySelectorAll('.mini-stat .num').forEach(function(el) {
    var target = parseInt(el.textContent) || 0;
    if (target <= 0) return;
    var cur = 0; var step = Math.max(1, Math.floor(target / 20));
    el.textContent = '0';
    var iv = setInterval(function() { cur += step; if (cur >= target) { cur = target; clearInterval(iv); } el.textContent = cur; }, 40);
  });

  // Bind wake lock
  var wl = document.getElementById('wlToggle');
  if (wl) wl.onclick = function() { wakeLockOn = !wakeLockOn; wl.classList.toggle('on', wakeLockOn); localStorage.setItem('ontfish_wakelock', wakeLockOn ? '1' : '0'); if (wakeLockOn) requestWakeLock(); else releaseWakeLock(); if (navigator.vibrate) navigator.vibrate(5); };
  var gl = document.getElementById('glToggle');
  if (gl) gl.onclick = function() { gameFishToLog = !gameFishToLog; gl.classList.toggle('on', gameFishToLog); localStorage.setItem('ontfish_gamelog', gameFishToLog ? 'on' : 'off'); if (navigator.vibrate) navigator.vibrate(5); };

  // Bind sort buttons
  document.querySelectorAll('.sort-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      spotSortMode = btn.dataset.sort;
      if (navigator.vibrate) navigator.vibrate(5);
      renderHotspots();
    });
  });

  // ---- TRIP PLANNER BINDINGS ----
  var tripToggle = document.getElementById('tripToggle');
  var tripForm = document.getElementById('tripForm');
  if (tripToggle && tripForm) {
    tripToggle.addEventListener('click', function() {
      tripForm.classList.toggle('open');
      if (navigator.vibrate) navigator.vibrate(5);
      if (tripForm.classList.contains('open')) loadTripPreview();
    });
  }
  var tripDate = document.getElementById('tripDate');
  var tripLoc = document.getElementById('tripLoc');
  if (tripDate) tripDate.addEventListener('change', function() { loadTripPreview(); });
  if (tripLoc) {
    tripLoc.addEventListener('input', debounce(function() {
      var val = tripLoc.value.trim().toLowerCase();
      var sugDiv = document.getElementById('tripLocSug');
      if (!val) { sugDiv.innerHTML = ''; return; }
      var spotNames = getHotspots().map(function(s) { return s.name; });
      var matches = spotNames.filter(function(n) { return n.toLowerCase().includes(val); }).slice(0, 5);
      sugDiv.innerHTML = matches.map(function(m) { return '<div class="loc-sug" data-loc="' + m + '">' + m + '</div>'; }).join('');
      sugDiv.querySelectorAll('.loc-sug').forEach(function(s) {
        s.addEventListener('click', function() { tripLoc.value = s.dataset.loc; sugDiv.innerHTML = ''; loadTripPreview(); });
      });
    }, 150));
  }
  var tripSave = document.getElementById('tripSave');
  if (tripSave) tripSave.addEventListener('click', function() {
    var date = document.getElementById('tripDate').value;
    var loc = document.getElementById('tripLoc').value;
    if (!date) return;
    saveTrip({ date: date, location: loc || '' });
    tripForm.classList.remove('open');
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
    renderHotspots();
  });
  var tripCancel = document.getElementById('tripCancel');
  if (tripCancel) tripCancel.addEventListener('click', function() { tripForm.classList.remove('open'); });

  // ---- REPORT GENERATOR BINDINGS ----
  var reportToggle = document.getElementById('reportToggle');
  var reportOutput = document.getElementById('reportOutput');
  var reportActions = document.getElementById('reportActions');
  if (reportToggle) {
    reportToggle.addEventListener('click', function() {
      if (navigator.vibrate) navigator.vibrate(5);
      var report = generateFishingReport();
      reportOutput.textContent = report;
      reportOutput.classList.add('visible');
      reportActions.classList.add('visible');
    });
  }
  var reportCopy = document.getElementById('reportCopy');
  if (reportCopy) reportCopy.addEventListener('click', function() {
    navigator.clipboard.writeText(reportOutput.textContent).then(function() {
      reportCopy.textContent = 'Copied!';
      setTimeout(function() { reportCopy.textContent = 'Copy to Clipboard'; }, 2000);
    }).catch(function() {});
  });
  var reportShare = document.getElementById('reportShare');
  if (reportShare) reportShare.addEventListener('click', function() {
    if (navigator.share) {
      navigator.share({ title: 'Fishing Report', text: reportOutput.textContent }).catch(function() {});
    }
  });

  fetchWeather();
}, 50);

// ---- TRIP PREVIEW ----
function loadTripPreview() {
  var dateVal = document.getElementById('tripDate').value;
  var locVal = document.getElementById('tripLoc').value;
  var result = document.getElementById('tripResult');
  if (!dateVal || !result) return;
  result.style.display = 'block';
  var tripDate = new Date(dateVal + 'T12:00:00');
  var inSeason = getSpeciesInSeason(tripDate);
  var solData = getSolunarForDate(tripDate);

  // Fetch weather for trip date
  var lat = currentLat || 43.84, lng = currentLng || -79.38;
  var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng + '&daily=temperature_2m_max,temperature_2m_min,weather_code,wind_speed_10m_max,sunrise,sunset&timezone=auto&start_date=' + dateVal + '&end_date=' + dateVal;
  result.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:12px">Loading forecast...</div>';

  fetch(url).then(function(r) { return r.json(); }).then(function(data) {
    var d = data.daily;
    if (!d || !d.temperature_2m_max || !d.temperature_2m_max.length) {
      result.innerHTML = '<div style="color:var(--text2);font-size:12px">Forecast not available for this date.</div>';
      return;
    }
    var hi = Math.round(d.temperature_2m_max[0]);
    var lo = Math.round(d.temperature_2m_min[0]);
    var wCode = d.weather_code[0];
    var wind = Math.round(d.wind_speed_10m_max[0]);
    var sunrise = d.sunrise ? d.sunrise[0].slice(11, 16) : '--';
    var sunset = d.sunset ? d.sunset[0].slice(11, 16) : '--';
    var wDesc = weatherDescFromCode(wCode);
    var score = getDailyForecastScore(wCode, wind, tripDate);
    var forecast = score >= 75 ? { r: 'EXCELLENT', c: '#00c040' } : score >= 55 ? { r: 'GOOD', c: '#80c020' } : score >= 40 ? { r: 'FAIR', c: '#c0a020' } : { r: 'POOR', c: '#c04030' };

    // Recommended baits based on species in season
    var baits = [];
    if (inSeason.indexOf('Walleye') >= 0) baits.push('Jig + twister tail');
    if (inSeason.indexOf('Northern Pike') >= 0) baits.push('Spinnerbait');
    if (inSeason.indexOf('Smallmouth Bass') >= 0) baits.push('Tube jig');
    if (inSeason.indexOf('Lake Trout') >= 0) baits.push('Deep spoon');
    if (inSeason.indexOf('Muskie') >= 0) baits.push('Large bucktail');
    if (!baits.length) baits.push('Nightcrawler', 'Minnow');

    var html = '';
    html += '<div class="tr-row"><div class="k">Weather</div><div class="v">' + wDesc + ', ' + hi + '/' + lo + ' C</div></div>';
    html += '<div class="tr-row"><div class="k">Wind</div><div class="v">' + wind + ' km/h</div></div>';
    html += '<div class="tr-row"><div class="k">Sunrise / Sunset</div><div class="v">' + sunrise + ' / ' + sunset + '</div></div>';
    html += '<div class="tr-row"><div class="k">Moon Phase</div><div class="v">' + solData.moon.phase + '</div></div>';
    html += '<div class="tr-row"><div class="k">Solunar Major</div><div class="v">' + fmtH(solData.periods[0].start) + '-' + fmtH(solData.periods[0].start + solData.periods[0].dur) + '</div></div>';
    html += '<div class="tr-row"><div class="k">Fishing Forecast</div><div class="v" style="color:' + forecast.c + '">' + forecast.r + ' (' + score + '/100)</div></div>';
    html += '<div class="tr-row"><div class="k">In Season</div><div class="v" style="font-size:11px">' + inSeason.slice(0, 6).join(', ') + '</div></div>';
    html += '<div class="tr-row"><div class="k">Recommended Baits</div><div class="v" style="font-size:11px">' + baits.slice(0, 3).join(', ') + '</div></div>';
    result.innerHTML = html;
  }).catch(function() {
    // Fallback without weather
    var html = '';
    html += '<div class="tr-row"><div class="k">Moon Phase</div><div class="v">' + solData.moon.phase + '</div></div>';
    html += '<div class="tr-row"><div class="k">In Season</div><div class="v" style="font-size:11px">' + inSeason.slice(0, 6).join(', ') + '</div></div>';
    html += '<div style="color:var(--text2);font-size:11px;margin-top:8px">Weather forecast unavailable for this date.</div>';
    result.innerHTML = html;
  });
}

// ---- FISHING REPORT GENERATOR ----
function generateFishingReport() {
  var catches = getCatches();
  var now = new Date();
  var today = now.toISOString().slice(0, 10);
  var weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
  var weekAgoStr = weekAgo.toISOString().slice(0, 10);
  var recent = catches.filter(function(c) { return c.date >= weekAgoStr && c.date <= today; });
  var spots = getHotspots();
  var topSpot = spots.length > 0 ? spots[0].name : 'Unknown';

  // Species summary
  var speciesCounts = {};
  var speciesBest = {};
  recent.forEach(function(c) {
    var sp = c.species || 'Unknown';
    speciesCounts[sp] = (speciesCounts[sp] || 0) + 1;
    if (!speciesBest[sp] || (c.weightLbs || 0) > speciesBest[sp]) speciesBest[sp] = c.weightLbs || 0;
  });

  var lines = [];
  lines.push('FISHING REPORT -- ' + topSpot + ', ' + now.toLocaleDateString('en-CA', { month: 'long', day: 'numeric' }));
  lines.push('');
  if (recent.length === 0) {
    lines.push('No catches in the last 7 days.');
  } else {
    Object.keys(speciesCounts).forEach(function(sp) {
      var best = speciesBest[sp] > 0 ? ' (best ' + speciesBest[sp].toFixed(1) + ' kg)' : '';
      lines.push(speciesCounts[sp] + ' ' + sp + best);
    });
  }
  lines.push('');
  // Add weather if available
  lines.push('Conditions: Check app for live weather');
  // Solunar
  var sol = getSolunar(now);
  lines.push('Feeding: ' + sol.feeding.toUpperCase() + ' (' + sol.moon.phase + ')');
  lines.push('Major Period: ' + fmtH(sol.periods[0].start) + '-' + fmtH(sol.periods[0].start + sol.periods[0].dur));
  lines.push('');
  lines.push('Total: ' + recent.length + ' fish this week');
  lines.push('');
  lines.push('-- Sent from Ontario Fishing App');
  return lines.join('\n');
}

// ---- DISTANCE ----
function getDistKm(lat1, lng1, lat2, lng2) {
  var R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ---- WEATHER (3-day forecast) ----
var lastWeatherCode = 0;
async function fetchWeather() {
  var card = document.getElementById('weatherCard');
  if (!card) return;
  // Check cache
  if (weatherCache.data && (Date.now() - weatherCache.timestamp) < WEATHER_CACHE_MS) {
    renderWeatherCard(card, weatherCache.data);
    return;
  }
  try {
    var lat = currentLat || 43.84, lng = currentLng || -79.38;
    var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng + '&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min,weather_code,wind_speed_10m_max,sunrise,sunset&forecast_days=3&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto';
    var resp = await fetch(url);
    var data = await resp.json();
    weatherCache.data = data;
    weatherCache.timestamp = Date.now();
    renderWeatherCard(card, data);
  } catch (e) {
    var desc = card.querySelector('.weather-desc');
    if (desc) desc.textContent = 'Unavailable';
  }
}

function renderWeatherCard(card, data) {
  var c = data.current;
  var daily = data.daily;
  var desc = weatherDescFromCode(c.weather_code);
  var dirs = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
  var wd = dirs[Math.round(c.wind_direction_10m / 45) % 8];
  var wIcon = weatherIconName(c.weather_code);
  var solNow = getSolunar(new Date());
  var forecast = getFishingForecast(c.weather_code, c.wind_speed_10m, solNow.feeding);
  lastWeatherCode = c.weather_code;

  var html = '';
  // Forecast banner
  html += '<div class="forecast-banner" style="background:rgba(0,0,0,.25);border:1px solid ' + forecast.color + '30"><div class="forecast-rating" style="color:' + forecast.color + '">FISHING FORECAST: ' + forecast.rating + '</div><div class="forecast-desc" style="color:' + forecast.color + '">' + forecast.desc + '</div><div class="forecast-bar-wrap"><div class="forecast-bar-fill" style="width:' + forecast.score + '%;background:' + forecast.color + '"></div></div></div>';
  // Current weather
  html += '<div class="weather-top"><div class="weather-main"><div class="weather-icon"><i data-lucide="' + wIcon + '"></i></div><div><div class="weather-temp">' + Math.round(c.temperature_2m) + ' C</div><div class="weather-desc">' + desc + '</div></div></div><div class="weather-live"><span class="weather-live-dot"></span> LIVE</div></div>';
  html += '<div class="weather-grid"><div class="weather-item"><div class="wi-icon"><i data-lucide="wind"></i></div><div class="wv">' + Math.round(c.wind_speed_10m) + ' ' + wd + '</div><div class="wl">Wind km/h</div></div><div class="weather-item"><div class="wi-icon"><i data-lucide="droplets"></i></div><div class="wv">' + c.relative_humidity_2m + '%</div><div class="wl">Humidity</div></div><div class="weather-item"><div class="wi-icon"><i data-lucide="thermometer"></i></div><div class="wv">' + Math.round(c.apparent_temperature) + ' C</div><div class="wl">Feels Like</div></div></div>';

  // 3-day forecast
  if (daily && daily.temperature_2m_max) {
    var labels = ['Today', 'Tomorrow', 'Day After'];
    // Find best day
    var bestIdx = 0, bestScore = 0;
    for (var i = 0; i < Math.min(3, daily.temperature_2m_max.length); i++) {
      var futureDate = new Date(); futureDate.setDate(futureDate.getDate() + i);
      var score = getDailyForecastScore(daily.weather_code[i], daily.wind_speed_10m_max[i], futureDate);
      if (score > bestScore) { bestScore = score; bestIdx = i; }
    }
    html += '<div class="forecast-days">';
    for (var j = 0; j < Math.min(3, daily.temperature_2m_max.length); j++) {
      var fd = new Date(); fd.setDate(fd.getDate() + j);
      var fScore = getDailyForecastScore(daily.weather_code[j], daily.wind_speed_10m_max[j], fd);
      var fRating = fScore >= 75 ? { r: 'EXCELLENT', c: '#00c040' } : fScore >= 55 ? { r: 'GOOD', c: '#80c020' } : fScore >= 40 ? { r: 'FAIR', c: '#c0a020' } : { r: 'POOR', c: '#c04030' };
      var isBest = j === bestIdx;
      var dIcon = weatherIconName(daily.weather_code[j]);
      html += '<div class="forecast-day' + (isBest ? ' best' : '') + '">';
      if (isBest) html += '<div class="best-badge">BEST DAY</div>';
      html += '<div class="fd-label">' + labels[j] + '</div>';
      html += '<div class="fd-icon"><i data-lucide="' + dIcon + '"></i></div>';
      html += '<div class="fd-temps">' + Math.round(daily.temperature_2m_max[j]) + ' <span class="fd-low">/ ' + Math.round(daily.temperature_2m_min[j]) + '</span></div>';
      html += '<div class="fd-wind">' + Math.round(daily.wind_speed_10m_max[j]) + ' km/h</div>';
      html += '<div class="fd-rating" style="color:' + fRating.c + ';background:' + fRating.c + '15">' + fRating.r + '</div>';
      html += '</div>';
    }
    html += '</div>';
  }

  card.classList.remove('shimmer');
  card.innerHTML = html;
  lucide.createIcons();
}

// ---- NAVIGATE ----
function navigateTo(lat, lng) {
  if (navigator.vibrate) navigator.vibrate(5);
  var iOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  window.open(iOS ? 'maps://maps.apple.com/?daddr=' + lat + ',' + lng : 'https://maps.google.com/maps?daddr=' + lat + ',' + lng, '_blank');
}
function shareLoc(name, lat, lng) {
  if (navigator.vibrate) navigator.vibrate(5);
  var text = 'Fishing spot: ' + name + (lat ? '\nhttps://maps.google.com/?q=' + lat + ',' + lng : '');
  if (navigator.share) { navigator.share({ title: 'Fishing Spot', text: text }).catch(function() {}); }
  else { navigator.clipboard.writeText(text).catch(function() {}); }
}
function refreshGPS() {
  navigator.geolocation.getCurrentPosition(
    function(pos) { currentLat = pos.coords.latitude; currentLng = pos.coords.longitude; currentAccuracy = pos.coords.accuracy; renderHotspots(); },
    function() {}, { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ---- SPEECH ----
function speak(t) { try { if ('speechSynthesis' in window) { var u = new SpeechSynthesisUtterance(t); u.rate = .9; speechSynthesis.speak(u); } } catch (e) {} }

// ---- GAME FISH → REAL LOG INTEGRATION ----
var gameFishToLog = localStorage.getItem('ontfish_gamelog') !== 'off';
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'fish-caught') {
    speak(e.data.weight + ' kg ' + e.data.species + '! Nice catch!');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  }
  if (e.data.type === 'game-fish-caught' && gameFishToLog) {
    var gc = {
      id: Date.now(),
      species: e.data.species === 'PERCH' ? 'Yellow Perch' : e.data.species === 'BASS' ? 'Smallmouth Bass' : e.data.species === 'PIKE' ? 'Northern Pike' : e.data.species === 'CATFISH' ? 'Channel Catfish' : e.data.species === 'TROUT' ? 'Rainbow Trout' : e.data.species === 'WALLEYE' ? 'Walleye' : e.data.species === 'MUSKIE' ? 'Muskie' : e.data.species === 'SUNFISH' ? 'Bluegill/Sunfish' : e.data.species || 'Other',
      weightLbs: Math.round(e.data.weightKg * 10) / 10,
      weightOz: 0, lengthIn: 0,
      location: '8bit Perch (Game)',
      date: new Date().toISOString().slice(0, 10),
      time: new Date().toTimeString().slice(0, 5),
      notes: 'Caught in 8bit Perch game', photos: [], released: false, isGameFish: true, source: '8bitperch'
    };
    try {
      var catches = JSON.parse(localStorage.getItem('fishlog_catches') || '[]');
      catches.unshift(gc);
      localStorage.setItem('fishlog_catches', JSON.stringify(catches));
      speak(gc.weightLbs + ' kg ' + gc.species + ' from the game!');
    } catch (ex) {}
    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
  }
});

if (activeTab === 'hotspot') renderHotspots();

// ---- FISH MEASUREMENT TOOL ----
window.addEventListener('message', function(ev) {
  if (ev.data && ev.data.type === 'measure-fish') openMeasureTool(ev.data.photoSrc);
});

function openMeasureTool(photoSrc) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:2000;background:#000;display:flex;flex-direction:column';
  var header = document.createElement('div');
  header.style.cssText = 'padding:10px 16px;background:#101a10;display:flex;justify-content:space-between;align-items:center;flex-shrink:0';
  header.innerHTML = '<span style="color:#d4a83c;font-size:14px;font-weight:700">FISH MEASURE</span><button style="background:none;border:1px solid #585858;color:#b8b8b8;padding:6px 12px;font-size:12px;border-radius:6px;cursor:pointer" id="mClose">Close</button>';
  var info = document.createElement('div');
  info.style.cssText = 'padding:8px 16px;background:#0a160a;color:#8a9a80;font-size:11px;text-align:center;flex-shrink:0';
  info.textContent = 'Tap HEAD then TAIL of the fish. Set reference for real size.';
  var canvasWrap = document.createElement('div');
  canvasWrap.style.cssText = 'flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center';
  var mc = document.createElement('canvas'); mc.style.cssText = 'max-width:100%;max-height:100%;touch-action:none';
  canvasWrap.appendChild(mc);
  var bottom = document.createElement('div');
  bottom.style.cssText = 'padding:10px 16px;background:#101a10;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:center';
  bottom.innerHTML = '<div style="color:#d4a83c;font-size:16px;font-weight:700" id="mResult">Tap fish head...</div>' +
    '<div style="display:flex;gap:4px;margin-top:4px"><button class="mref" data-ref="coin" style="padding:6px 10px;font-size:10px;background:#1a2e1a;color:#b8b8b8;border:1px solid #3a6e3a;border-radius:6px;cursor:pointer">Loonie (26mm)</button>' +
    '<button class="mref" data-ref="card" style="padding:6px 10px;font-size:10px;background:#1a2e1a;color:#b8b8b8;border:1px solid #3a6e3a;border-radius:6px;cursor:pointer">Card (85mm)</button>' +
    '<button class="mref" data-ref="hand" style="padding:6px 10px;font-size:10px;background:#1a2e1a;color:#b8b8b8;border:1px solid #3a6e3a;border-radius:6px;cursor:pointer">Hand (180mm)</button></div>';
  overlay.appendChild(header); overlay.appendChild(info); overlay.appendChild(canvasWrap); overlay.appendChild(bottom);
  document.body.appendChild(overlay);
  var img = new Image(); var points = []; var refMM = 26; var refPixels = 0; var refMode = false;
  var mx = mc.getContext('2d');
  img.onload = function() { mc.width = img.naturalWidth; mc.height = img.naturalHeight; render(); };
  img.src = photoSrc;
  function render() {
    mx.clearRect(0, 0, mc.width, mc.height);
    mx.drawImage(img, 0, 0);
    points.forEach(function(p, i) {
      mx.fillStyle = i === 0 ? '#f83800' : '#00a800';
      mx.beginPath(); mx.arc(p.x, p.y, Math.max(6, mc.width / 60), 0, Math.PI * 2); mx.fill();
      mx.strokeStyle = '#fff'; mx.lineWidth = 2; mx.stroke();
    });
    if (points.length === 2) {
      mx.strokeStyle = '#f8d800'; mx.lineWidth = 3; mx.setLineDash([10, 5]);
      mx.beginPath(); mx.moveTo(points[0].x, points[0].y); mx.lineTo(points[1].x, points[1].y); mx.stroke();
      mx.setLineDash([]);
      var dist = Math.sqrt(Math.pow(points[1].x - points[0].x, 2) + Math.pow(points[1].y - points[0].y, 2));
      if (refPixels > 0) {
        var realMM = dist / refPixels * refMM;
        var cm = Math.round(realMM / 10 * 10) / 10;
        document.getElementById('mResult').textContent = cm.toFixed(1) + ' cm (' + Math.round(cm / 2.54 * 10) / 10 + ' in)';
      } else { document.getElementById('mResult').textContent = Math.round(dist) + ' px -- set reference!'; }
    }
    if (refMode && points.length >= 3) {
      mx.strokeStyle = '#0058f8'; mx.lineWidth = 2; mx.setLineDash([5, 3]);
      mx.beginPath(); mx.moveTo(points[2].x, points[2].y);
      if (points.length >= 4) mx.lineTo(points[3].x, points[3].y);
      mx.stroke(); mx.setLineDash([]);
    }
  }
  mc.addEventListener('pointerdown', function(e) {
    var rect = mc.getBoundingClientRect();
    var sx = (e.clientX - rect.left) / rect.width * mc.width;
    var sy = (e.clientY - rect.top) / rect.height * mc.height;
    if (refMode) {
      if (points.length < 4) points.push({ x: sx, y: sy });
      if (points.length === 4) {
        refPixels = Math.sqrt(Math.pow(points[3].x - points[2].x, 2) + Math.pow(points[3].y - points[2].y, 2));
        refMode = false; info.textContent = 'Reference set! Now tap HEAD then TAIL.'; points = [];
      }
    } else {
      if (points.length >= 2) points = [];
      points.push({ x: sx, y: sy });
      if (points.length === 1) document.getElementById('mResult').textContent = 'Now tap tail...';
    }
    render(); e.preventDefault();
  });
  bottom.querySelectorAll('.mref').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var ref = this.dataset.ref;
      if (ref === 'coin') refMM = 26;
      else if (ref === 'card') refMM = 85;
      else if (ref === 'hand') refMM = 180;
      refMode = true; points = [];
      info.textContent = 'Tap two ends of the ' + this.textContent + ' in the photo';
      document.getElementById('mResult').textContent = 'Tap reference...';
      render();
    });
  });
  document.getElementById('mClose').addEventListener('click', function() { overlay.remove(); });
}

// ---- SOCIAL MEDIA SHARE CARD GENERATOR ----
function generateShareCard(data, callback) {
  var c = document.createElement('canvas'); c.width = 1080; c.height = 1350;
  var x = c.getContext('2d');
  x.fillStyle = '#080e08'; x.fillRect(0, 0, 1080, 1350);
  var g1 = x.createLinearGradient(0, 0, 0, 500);
  g1.addColorStop(0, '#1a3a1a'); g1.addColorStop(1, '#080e08');
  x.fillStyle = g1; x.fillRect(0, 0, 1080, 500);
  x.fillStyle = '#d4a83c'; x.fillRect(0, 490, 1080, 4);
  var g2 = x.createLinearGradient(0, 850, 0, 1350);
  g2.addColorStop(0, '#080e08'); g2.addColorStop(1, '#0a1a0a');
  x.fillStyle = g2; x.fillRect(0, 850, 1080, 500);
  x.strokeStyle = 'rgba(212,168,60,.3)'; x.lineWidth = 3;
  x.strokeRect(30, 30, 1020, 1290);
  x.strokeStyle = 'rgba(42,138,58,.2)'; x.lineWidth = 1;
  x.strokeRect(40, 40, 1000, 1270);
  x.font = '700 28px Inter,sans-serif'; x.fillStyle = 'rgba(212,168,60,.6)'; x.textAlign = 'center';
  x.fillText('ONTARIO FISHING', 540, 80);
  x.fillStyle = 'rgba(212,168,60,.3)'; x.fillRect(340, 95, 400, 1);
  function drawText() {
    x.font = '900 72px Inter,sans-serif'; x.fillStyle = '#ffffff'; x.textAlign = 'center';
    x.fillText(data.species || 'Unknown Fish', 540, 600);
    var wt = data.weightLbs || 0;
    var wStr = wt > 0 ? wt.toFixed(1) + ' kg' : '';
    if (wStr) { x.font = '900 110px Inter,sans-serif'; x.fillStyle = '#d4a83c'; x.fillText(wStr, 540, 740); }
    if (data.lengthIn && data.lengthIn > 0) { x.font = '600 36px Inter,sans-serif'; x.fillStyle = 'rgba(212,168,60,.7)'; x.fillText(data.lengthIn + ' cm', 540, 800); }
    if (data.location) { x.font = '500 32px Inter,sans-serif'; x.fillStyle = '#8a9a80'; x.fillText(data.location, 540, 880); }
    var dateStr = (data.date || '') + (data.time ? ' at ' + data.time : '');
    if (dateStr) { x.font = '400 26px Inter,sans-serif'; x.fillStyle = '#6a7a60'; x.fillText(dateStr, 540, 930); }
    if (data.bait) { x.font = 'italic 400 24px Inter,sans-serif'; x.fillStyle = 'rgba(200,168,72,.5)'; x.fillText('Caught on: ' + data.bait, 540, 980); }
    if (data.weather) { x.font = '400 22px Inter,sans-serif'; x.fillStyle = '#5a6a50'; x.fillText('Weather: ' + data.weather, 540, 1020); }
    if (data.notes && data.notes.length > 0) { x.font = 'italic 400 22px Inter,sans-serif'; x.fillStyle = 'rgba(224,228,216,.4)'; var note = data.notes.length > 80 ? data.notes.substring(0, 77) + '...' : data.notes; x.fillText('"' + note + '"', 540, 1080); }
    if (data.isGameFish) { x.font = '700 20px Inter,sans-serif'; x.fillStyle = '#6828b0'; x.fillText('[8BIT PERCH GAME CATCH]', 540, 1130); }
    x.fillStyle = 'rgba(42,138,58,.15)'; x.fillRect(0, 1250, 1080, 100);
    x.font = '700 22px Inter,sans-serif'; x.fillStyle = 'rgba(212,168,60,.5)'; x.fillText('Ontario Fishing App', 540, 1290);
    x.font = '400 16px Inter,sans-serif'; x.fillStyle = 'rgba(138,154,128,.4)'; x.fillText('taskiap.com', 540, 1320);
  }
  if (data.photo || (data.photos && data.photos.length > 0)) {
    var imgSrc = data.photo || (data.photos && data.photos[0]);
    var img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = function() {
      x.save(); x.beginPath();
      var pw = 900, ph = 380, px = 90, py = 100;
      x.moveTo(px + 16, py); x.lineTo(px + pw - 16, py); x.quadraticCurveTo(px + pw, py, px + pw, py + 16);
      x.lineTo(px + pw, py + ph - 16); x.quadraticCurveTo(px + pw, py + ph, px + pw - 16, py + ph);
      x.lineTo(px + 16, py + ph); x.quadraticCurveTo(px, py + ph, px, py + ph - 16);
      x.lineTo(px, py + 16); x.quadraticCurveTo(px, py, px + 16, py); x.clip();
      var scale = Math.max(pw / img.width, ph / img.height);
      var dw = img.width * scale, dh = img.height * scale;
      x.drawImage(img, px + (pw - dw) / 2, py + (ph - dh) / 2, dw, dh); x.restore();
      x.strokeStyle = 'rgba(212,168,60,.3)'; x.lineWidth = 2; x.beginPath();
      x.moveTo(px + 16, py); x.lineTo(px + pw - 16, py); x.quadraticCurveTo(px + pw, py, px + pw, py + 16);
      x.lineTo(px + pw, py + ph - 16); x.quadraticCurveTo(px + pw, py + ph, px + pw - 16, py + ph);
      x.lineTo(px + 16, py + ph); x.quadraticCurveTo(px, py + ph, px, py + ph - 16);
      x.lineTo(px, py + 16); x.quadraticCurveTo(px, py, px + 16, py); x.stroke();
      drawText(); callback(c);
    };
    img.onerror = function() { drawText(); callback(c); };
    img.src = imgSrc;
  } else {
    x.fillStyle = 'rgba(42,138,58,.1)'; x.beginPath();
    x.ellipse(540, 300, 180, 80, 0, 0, Math.PI * 2); x.fill();
    x.fillStyle = 'rgba(42,138,58,.15)'; x.beginPath();
    x.moveTo(360, 300); x.lineTo(300, 250); x.lineTo(300, 350); x.closePath(); x.fill();
    drawText(); callback(c);
  }
}

function shareCard(catchData) {
  generateShareCard(catchData, function(canvas) {
    canvas.toBlob(function(blob) {
      if (!blob) return;
      var file = new File([blob], 'catch-' + Date.now() + '.jpg', { type: 'image/jpeg' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ title: (catchData.species || 'Fish') + ' Catch', text: ((catchData.weightLbs || 0).toFixed(1)) + ' kg ' + (catchData.species || '') + ' at ' + (catchData.location || ''), files: [file] }).catch(function() { downloadCard(canvas); });
      } else { downloadCard(canvas); }
    }, 'image/jpeg', 0.92);
  });
}

function downloadCard(canvas) {
  var a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg', 0.92);
  a.download = 'catch-' + Date.now() + '.jpg';
  a.click();
}

window.addEventListener('message', function(ev) {
  if (ev.data && ev.data.type === 'share-catch') shareCard(ev.data.catch);
});
window.shareCard = shareCard;

// ---- INSTALL PROMPT ----
var deferredPrompt = null;
var installBanner = document.getElementById('installBanner');
var installSteps = document.getElementById('installSteps');
var installBtn = document.getElementById('installBtn');

function isInstalled() { return window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone === true; }
function wasDismissed() { return localStorage.getItem('ontfish_install_dismissed') && Date.now() - parseInt(localStorage.getItem('ontfish_install_dismissed')) < 7 * 86400000; }

function detectPlatform() {
  var ua = navigator.userAgent;
  if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
  if (/android/i.test(ua)) return 'android';
  return 'desktop';
}

function showInstallBanner() {
  if (isInstalled() || wasDismissed()) return;
  var platform = detectPlatform();
  if (platform === 'ios') {
    installSteps.innerHTML = '<b>To install on iPhone/iPad:</b><br>1. Tap the <b>Share</b> button (box with arrow) in Safari<br>2. Scroll down and tap <b>"Add to Home Screen"</b><br>3. Tap <b>"Add"</b> in the top right<br><br>The app will appear on your home screen!';
    installBtn.textContent = 'Got It';
    installBtn.onclick = function() { dismissInstall(); };
  } else if (platform === 'android') {
    if (deferredPrompt) {
      installSteps.innerHTML = '<b>Install as an app</b> for offline access, full screen, and faster loading.';
      installBtn.textContent = 'Install App';
    } else {
      installSteps.innerHTML = '<b>To install on Android:</b><br>1. Tap the <b>menu</b> (3 dots) in Chrome<br>2. Tap <b>"Add to Home Screen"</b> or <b>"Install App"</b><br>3. Tap <b>"Install"</b>';
      installBtn.textContent = 'Got It';
      installBtn.onclick = function() { dismissInstall(); };
    }
  } else {
    installSteps.innerHTML = '<b>To install on desktop:</b><br>Click the install icon in your browser\'s address bar, or use the browser menu.';
    installBtn.textContent = 'Got It';
    installBtn.onclick = function() { dismissInstall(); };
  }
  installBanner.style.display = 'block';
  document.querySelector('.app').classList.add('install-visible');
  try { lucide.createIcons({ nodes: [installBanner] }); } catch (e) {}
}

function doInstall() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r) { if (r.outcome === 'accepted') installBanner.style.display = 'none'; });
    deferredPrompt = null;
  } else { dismissInstall(); }
}

function dismissInstall() {
  installBanner.style.display = 'none';
  document.querySelector('.app').classList.remove('install-visible');
  localStorage.setItem('ontfish_install_dismissed', Date.now().toString());
}

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault(); deferredPrompt = e;
  showInstallBanner();
});

setTimeout(function() { if (!deferredPrompt && !isInstalled()) showInstallBanner(); }, 5000);
</script>
