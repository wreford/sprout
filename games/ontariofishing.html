<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ontario Fishing App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080e08"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#080e08;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e0e4d8;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:14px}
html{scroll-behavior:smooth}
:root{--bg:#080e08;--bg2:#101a10;--bg3:#1a2e1a;--card:#141e14;--border:#243424;--accent:#2a8a3a;--accent2:#4a9e5a;--gold:#d4a83c;--gold2:#e8c050;--text:#e0e4d8;--text2:#8a9a80;--red:#d04838;--green:#00b800;--blue:#3090d0}

.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* Header */
.header{background:linear-gradient(180deg,#1a2e1a 0%,#0c180c 100%);border-bottom:1px solid rgba(42,138,58,.3);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;position:relative}
.header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,60,.2),transparent)}
.header .back{color:var(--text2);font-size:13px;text-decoration:none;padding:8px 0;min-width:44px;font-weight:500;display:flex;align-items:center;gap:4px;transition:color .2s}
.header .back:active{color:var(--text)}
.header .title-group{display:flex;align-items:center;gap:8px}
.header .title-group .title-icon{color:var(--gold);width:20px;height:20px;opacity:.8}
.header h1{font-size:15px;font-weight:800;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase}
.header .gps-status{font-size:10px;color:var(--text2);padding:5px 10px;background:rgba(0,0,0,.3);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;gap:5px;font-weight:600;cursor:pointer;transition:all .2s}
.header .gps-status .gps-icon{width:14px;height:14px}
.header .gps-status.active{color:var(--green);border-color:rgba(0,184,0,.4);background:rgba(0,184,0,.08)}
.header .gps-status.active .gps-icon{animation:spin 3s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Tab content */
.tab-content{flex:1;position:relative;overflow:hidden}
.tab-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none;background:var(--bg2)}
.tab-frame.active{display:block}

/* Bottom tabs */
.bottom-tabs{display:flex;background:rgba(8,14,8,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(42,138,58,.2);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);position:relative}
.bottom-tabs::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(212,168,60,.15),transparent)}
.tab-btn{flex:1;padding:8px 2px 10px;background:none;border:none;color:#4a5a4a;font-family:'Inter',inherit;font-size:9px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:58px;cursor:pointer;transition:all .2s;position:relative;letter-spacing:0.3px}
.tab-btn.active{color:var(--gold)}
.tab-btn.active::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:0 0 2px 2px}
.tab-btn .ico{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .2s}
.tab-btn .ico svg{width:20px;height:20px}
.tab-btn.active .ico{background:rgba(212,168,60,.12)}
.tab-btn .lbl{font-size:9px;font-weight:600}

/* Scroll shadow */
.hs-scroll{width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.scroll-shadow{position:sticky;top:0;left:0;right:0;height:12px;background:linear-gradient(180deg,rgba(8,14,8,.6) 0%,transparent 100%);z-index:10;pointer-events:none;margin-bottom:-12px}
.hs-pad{padding:18px 16px 28px}

/* Hero card */
.hs-hero{background:linear-gradient(135deg,#1a3a1a 0%,#0a200a 50%,#142814 100%);border:1px solid var(--border);border-radius:16px;padding:22px 18px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hs-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(212,168,60,.06) 0%,transparent 70%);border-radius:50%}
.hs-hero h2{font-size:18px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
.hs-hero .subtitle{font-size:12px;color:var(--text2);margin-bottom:14px}
.hs-hero .stat-row{display:flex;gap:12px}
.hs-hero .mini-stat{flex:1;text-align:center;background:rgba(0,0,0,.25);border-radius:10px;padding:10px 4px}
.hs-hero .mini-stat .num{font-size:22px;font-weight:800;color:#fff}
.hs-hero .mini-stat .lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:all .2s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.card:active{border-color:var(--accent);transform:scale(0.985)}
.card-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:8px;letter-spacing:0.5px}
.card-title .badge{font-size:8px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:600}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.card-row .k{color:var(--text2)}
.card-row .v{color:var(--text);font-weight:600}
.card-divider{height:1px;background:var(--border);margin:8px 0}

/* Section headers */
.section-hdr{display:flex;align-items:center;gap:8px;margin:22px 0 12px;padding-left:2px}
.section-hdr h3{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.5px}
.section-hdr .count{font-size:10px;color:var(--text2);background:rgba(0,0,0,.3);padding:3px 10px;border-radius:8px;font-weight:500}

/* Spot cards */
.spot{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:14px;overflow:hidden;margin-bottom:12px;transition:all .15s;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.spot:active{transform:scale(0.98);border-color:var(--accent)}
.spot-top{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.spot-info{flex:1;min-width:0}
.spot-rank{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),#a08838);color:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;margin-left:10px;box-shadow:0 2px 8px rgba(212,168,60,.2)}
.spot-rank svg{width:14px;height:14px}
.spot-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spot-meta{font-size:12px;color:var(--text2);line-height:1.6;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spot-meta .meta-item{display:flex;align-items:center;gap:3px}
.spot-meta .meta-item svg{width:12px;height:12px;opacity:.6}
.spot-species-bar{padding:0 16px 10px;display:flex;gap:5px;flex-wrap:wrap}
.sp-chip{font-size:10px;padding:4px 8px;background:rgba(42,138,58,.15);color:var(--accent2);border-radius:6px;border:1px solid rgba(42,138,58,.2);font-weight:500}
.spot-bottom{display:flex;border-top:1px solid var(--border)}
.spot-bottom button{flex:1;padding:12px;background:none;border:none;border-right:1px solid var(--border);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',inherit;min-height:44px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.spot-bottom button:last-child{border-right:none}
.spot-bottom button:active{background:rgba(42,138,58,.12);color:var(--accent2)}
.spot-bottom button svg{width:14px;height:14px}
.spot-best{padding:6px 16px 12px;font-size:12px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:4px}

/* Weather card */
.weather{background:linear-gradient(135deg,#142a20 0%,#0e1e14 100%);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.weather:active{transform:scale(0.985)}
.weather-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.weather-main{display:flex;align-items:center;gap:12px}
.weather-icon{color:var(--gold);opacity:.9}
.weather-icon svg{width:32px;height:32px}
.weather-temp{font-size:36px;font-weight:800;color:#fff;line-height:1}
.weather-desc{font-size:13px;color:var(--text2);margin-top:2px}
.weather-live{font-size:8px;color:var(--green);font-weight:700;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.weather-live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-smooth 2s ease-in-out infinite}
@keyframes pulse-smooth{0%,100%{opacity:1;box-shadow:0 0 4px var(--green)}50%{opacity:.4;box-shadow:0 0 8px var(--green)}}
.weather-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.weather-item{text-align:center;background:rgba(0,0,0,.25);border-radius:10px;padding:10px 4px}
.weather-item .wi-icon{display:flex;justify-content:center;margin-bottom:4px;color:var(--text2)}
.weather-item .wi-icon svg{width:16px;height:16px}
.weather-item .wv{font-size:15px;font-weight:700;color:var(--text)}
.weather-item .wl{font-size:9px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}

/* Solunar */
.solunar{background:linear-gradient(135deg,#1a1a2e 0%,#0e0e1a 100%);border:1px solid #2a2a3e;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:all .2s}
.solunar:active{transform:scale(0.985)}
.solunar.sol-good{box-shadow:0 0 20px rgba(0,184,0,.08),0 2px 12px rgba(0,0,0,.2);border-color:rgba(0,184,0,.2)}
.sol-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sol-moon-group{display:flex;align-items:center;gap:8px}
.sol-moon-icon{color:#c0c0e0;opacity:.8}
.sol-moon-icon svg{width:20px;height:20px}
.sol-moon{font-size:17px;font-weight:800;color:#e0e0f0}
.sol-feeding{font-size:11px;padding:5px 12px;border-radius:8px;font-weight:700;letter-spacing:.3px}
.sol-feeding.good{background:rgba(0,184,0,.12);color:var(--green)}
.sol-feeding.ok{background:rgba(212,168,60,.12);color:var(--gold)}
.sol-feeding.poor{background:rgba(208,72,56,.12);color:var(--red)}
.sol-periods{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sol-period{background:rgba(0,0,0,.25);border-radius:10px;padding:10px;text-align:center}
.sol-period .pt{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;justify-content:center;gap:4px}
.sol-period .pt svg{width:12px;height:12px}
.sol-period .pv{font-size:13px;font-weight:700;color:var(--text);margin-top:4px}
.sol-period.major .pv{color:var(--green)}

/* Toggle */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.toggle-left{display:flex;align-items:center;gap:12px}
.toggle-icon{color:var(--text2);opacity:.7}
.toggle-icon svg{width:18px;height:18px}
.toggle-row .tl{font-size:14px;color:var(--text);font-weight:600}
.toggle-row .td{font-size:11px;color:var(--text2);margin-top:2px}
.tswitch{width:52px;height:30px;background:#2a2a2a;border-radius:15px;position:relative;cursor:pointer;transition:background .3s;flex-shrink:0}
.tswitch.on{background:var(--accent)}
.tswitch::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;background:#fff;border-radius:50%;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tswitch.on::after{left:24px}

/* Empty */
.empty{text-align:center;padding:34px 22px;color:var(--text2);font-size:14px;line-height:1.7;background:var(--card);border:1px dashed var(--border);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.2)}

/* Gamification */
.xp-card{background:linear-gradient(135deg,#1a2a10 0%,#0e1a08 100%);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.xp-card::after{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(212,168,60,.06) 0%,transparent 70%);border-radius:50%}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.xp-level{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.xp-level svg{width:16px;height:16px}
.xp-xp{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.xp-xp svg{width:14px;height:14px;color:var(--gold)}
.xp-title{font-size:20px;font-weight:800;color:#fff}
.xp-bar-wrap{height:10px;background:rgba(0,0,0,.35);border-radius:5px;overflow:hidden;margin-bottom:6px;margin-top:4px;position:relative}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#2a8a3a,#d4a83c,#e8c050);border-radius:5px;transition:width .6s ease-out;position:relative;overflow:hidden}
.xp-bar-fill::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);animation:shimmer 2.5s ease-in-out infinite}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
.xp-label{font-size:10px;color:var(--text2);display:flex;justify-content:space-between;font-weight:500}
.badge-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--border);transition:all .2s}
.badge svg{width:18px;height:18px}
.badge.earned{background:linear-gradient(135deg,#2a3a1a,#1a2a10);border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(212,168,60,.15)}
.badge.locked{background:rgba(8,14,8,.6);color:#333;border-color:#1a1a1a}
.badge.locked svg{opacity:.2}
.badge-tooltip{position:fixed;background:var(--card);border:1px solid var(--gold);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--text);z-index:500;pointer-events:none;max-width:200px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}

/* Streak */
.streak-card{background:linear-gradient(135deg,#2a1a10,#1a1008);border:1px solid #3a2a1a;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.2);position:relative;overflow:hidden}
.streak-flame{display:flex;align-items:center;justify-content:center;min-width:40px;position:relative}
.streak-flame svg{width:28px;height:28px}
.streak-flame .flame-icon{color:#f87830;filter:drop-shadow(0 0 6px rgba(248,120,48,.4));animation:flame-pulse 2s ease-in-out infinite}
@keyframes flame-pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(248,120,48,.4));transform:scale(1)}50%{filter:drop-shadow(0 0 12px rgba(248,120,48,.6));transform:scale(1.1)}}
.streak-count{position:absolute;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.streak-info{flex:1}
.streak-info .si-title{font-size:14px;font-weight:700;color:#f8a848}
.streak-info .si-desc{font-size:11px;color:var(--text2);margin-top:3px}

/* Current location */
.loc-banner{background:linear-gradient(135deg,var(--accent),#2a5e2a);border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.loc-icon{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.loc-icon svg{width:18px;height:18px;color:#fff;animation:spin 3s linear infinite}
.loc-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 8px var(--green);animation:pulse-smooth 2s ease-in-out infinite}
.loc-text{font-size:12px;color:#fff;line-height:1.5;flex:1}
.loc-text .coords{font-size:11px;color:rgba(255,255,255,.6);font-family:'SF Mono','Fira Code',monospace}
.loc-text .accuracy{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.loc-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',inherit;flex-shrink:0;transition:background .2s}
.loc-btn:active{background:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="../index.html" class="back">Back</a>
    <div class="title-group">
      <i data-lucide="anchor" class="title-icon"></i>
      <h1>ONTARIO FISHING</h1>
    </div>
    <div class="gps-status" id="gpsStatus"><i data-lucide="navigation" class="gps-icon"></i><span id="gpsLabel">TAP GPS</span></div>
  </div>
  <div class="tab-content" id="tabContent">
    <iframe id="frame-log" class="tab-frame active" src="fishlog.html"></iframe>
    <iframe id="frame-bait" class="tab-frame" src="baithelper.html"></iframe>
    <iframe id="frame-regs" class="tab-frame" src="fishregs.html"></iframe>
    <div id="frame-hotspot" class="tab-frame">
      <div class="hs-scroll" id="hsScroll">
        <div class="scroll-shadow"></div>
        <div class="hs-pad" id="hotspotBody"></div>
      </div>
    </div>
  </div>
  <div class="bottom-tabs" id="bottomTabs">
    <button class="tab-btn active" data-tab="log"><span class="ico"><i data-lucide="book-open"></i></span><span class="lbl">Catches</span></button>
    <button class="tab-btn" data-tab="bait"><span class="ico"><i data-lucide="target"></i></span><span class="lbl">Helper</span></button>
    <button class="tab-btn" data-tab="regs"><span class="ico"><i data-lucide="scale"></i></span><span class="lbl">Rules</span></button>
    <button class="tab-btn" data-tab="hotspot"><span class="ico"><i data-lucide="map-pin"></i></span><span class="lbl">Hotspots</span></button>
  </div>
</div>
<script>
// Init Lucide icons in header/tabs on load
lucide.createIcons();

// ─── TAB SWITCHING ───
const tabs=document.querySelectorAll('.tab-btn');
const frames={log:document.getElementById('frame-log'),bait:document.getElementById('frame-bait'),regs:document.getElementById('frame-regs'),hotspot:document.getElementById('frame-hotspot')};
let activeTab='log';
tabs.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const t=btn.dataset.tab;if(t===activeTab)return;
    tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');
    Object.values(frames).forEach(f=>f.classList.remove('active'));frames[t].classList.add('active');
    activeTab=t;if(t==='hotspot')renderHotspots();
    localStorage.setItem('ontfish_tab',t);
  });
});
const savedTab=localStorage.getItem('ontfish_tab');
if(savedTab&&frames[savedTab]){tabs.forEach(b=>b.classList.toggle('active',b.dataset.tab===savedTab));Object.values(frames).forEach(f=>f.classList.remove('active'));frames[savedTab].classList.add('active');activeTab=savedTab}

// ─── GPS (requires user tap on iOS) ───
let currentLat=null,currentLng=null,currentAccuracy=null,gpsWatchId=null,gpsRequested=false;
const gpsEl=document.getElementById('gpsStatus');
const gpsLabel=document.getElementById('gpsLabel');
function startGPS(){
  if(!navigator.geolocation||gpsWatchId)return;
  gpsRequested=true;gpsLabel.textContent='GPS...';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;currentAccuracy=pos.coords.accuracy;
      gpsLabel.textContent='GPS ON';gpsEl.classList.add('active');
      gpsWatchId=navigator.geolocation.watchPosition(
        p=>{currentLat=p.coords.latitude;currentLng=p.coords.longitude;currentAccuracy=p.coords.accuracy;gpsLabel.textContent='GPS ON';gpsEl.classList.add('active')},
        ()=>{},
        {enableHighAccuracy:true,maximumAge:60000,timeout:15000}
      );
      if(activeTab==='hotspot')renderHotspots();
    },
    err=>{gpsLabel.textContent='TAP GPS';gpsEl.classList.remove('active');gpsRequested=false},
    {enableHighAccuracy:true,timeout:10000}
  );
}

  {id:'walleye',name:'WALLEYE HUNTER',desc:'Catch 5 walleye',check:c=>c.filter(f=>f.species==='Walleye').length>=5,xp:50,icon:'target'},
  {id:'pike',name:'PIKE MASTER',desc:'Catch 5 pike',check:c=>c.filter(f=>f.species==='Northern Pike').length>=5,xp:50,icon:'zap'},

  {id:'globe',name:'GLOBE TROTTER',desc:'Fish at 10 spots',check:c=>{const s=new Set(c.map(f=>f.location).filter(Boolean));return s.size>=10},xp:100,icon:'compass'},
  {id:'variety',name:'VARIETY PACK',desc:'Catch 5 different species',check:c=>{const s=new Set(c.map(f=>f.species).filter(Boolean));return s.size>=5},xp:60,icon:'star'},
  {id:'collector',name:'COLLECTOR',desc:'Catch 10 different species',check:c=>{const s=new Set(c.map(f=>f.species).filter(Boolean));return s.size>=10},xp:120,icon:'star'},
  {id:'dawn',name:'EARLY BIRD',desc:'Log a catch before 7 AM',check:c=>c.some(f=>{const t=f.time||'';const h=parseInt(t);return h>=0&&h<7}),xp:30,icon:'sun'},
  {id:'night',name:'NIGHT OWL',desc:'Log a catch after 9 PM',check:c=>c.some(f=>{const t=f.time||'';const h=parseInt(t);return h>=21}),xp:30,icon:'moon'},
  {id:'release',name:'CONSERVATIONIST',desc:'Release 10 fish',check:c=>c.filter(f=>f.released).length>=10,xp:40,icon:'anchor'},
];
function getAnglerStats(){
  const catches=getCatches();
  let totalXP=0;const earned=[];
  ACHIEVEMENTS.forEach(a=>{if(a.check(catches)){totalXP+=a.xp;earned.push(a.id)}});
  totalXP+=catches.length*5;
  let level=1,xpForNext=50,xpInLevel=totalXP;
  while(xpInLevel>=xpForNext){xpInLevel-=xpForNext;level++;xpForNext=Math.floor(xpForNext*1.4)}
  const titles=['Beginner','Novice','Apprentice','Angler','Skilled Angler','Expert','Master Angler','Grand Master','Legend','Ontario Legend'];
  const title=titles[Math.min(level-1,titles.length-1)];
  const days=new Set(catches.map(c=>c.date).filter(Boolean));
  const today=new Date();let streak=0;
  for(let i=0;i<365;i++){const d=new Date(today);d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(days.has(ds))streak++;else if(i>0)break}
  return{totalXP,level,xpInLevel,xpForNext,title,earned,streak,catches};
}

// ─── MOON / SOLUNAR ───
function getMoonPhase(date){
  let y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  if(m<3){y--;m+=12}
  const c=Math.floor(365.25*y),e=Math.floor(30.6001*(m+1));
  let jd=c+e+d-694039.09;jd/=29.5305882;jd-=Math.floor(jd);
  const age=Math.round(jd*29.5305882);
  if(age<2)return{phase:'New Moon',feeding:'poor'};
  if(age<7)return{phase:'Waxing Crescent',feeding:'ok'};
  if(age<9)return{phase:'First Quarter',feeding:'good'};
  if(age<14)return{phase:'Waxing Gibbous',feeding:'ok'};
  if(age<16)return{phase:'Full Moon',feeding:'good'};
  if(age<21)return{phase:'Waning Gibbous',feeding:'ok'};
  if(age<23)return{phase:'Last Quarter',feeding:'good'};
  return{phase:'Waning Crescent',feeding:'ok'};
}
function getSolunar(date){
  const moon=getMoonPhase(date);const h=date.getHours();
  const seed=date.getDate()*7+date.getMonth()*31;
  const mr=(5+seed%4);
  const periods=[{type:'Major',start:mr,dur:2},{type:'Major',start:(mr+12)%24,dur:2},{type:'Minor',start:(mr+6)%24,dur:1},{type:'Minor',start:(mr+18)%24,dur:1}];
  let feeding='poor';
  for(const p of periods){const e=(p.start+p.dur)%24;if((p.start<e&&h>=p.start&&h<e)||(p.start>=e&&(h>=p.start||h<e))){feeding=p.type==='Major'?'good':'ok';break}}
  return{moon,periods,feeding};
}
function fmtH(h){h=((h%24)+24)%24;return((h%12)||12)+(h>=12?'PM':'AM')}

// ─── DATA ───
function getCatches(){try{return JSON.parse(localStorage.getItem('fishlog_catches')||'[]')}catch(e){return[]}}
function getHotspots(){
  const catches=getCatches(),spots={};
  catches.forEach(c=>{
    const loc=c.location||'Unknown';
    if(!spots[loc])spots[loc]={name:loc,catches:[],totalWeight:0,species:{},lat:c.lat||null,lng:c.lng||null};
    spots[loc].catches.push(c);
    spots[loc].totalWeight+=(c.weightLbs||0)+(c.weightOz||0)/16;
    spots[loc].species[c.species||'Unknown']=(spots[loc].species[c.species||'Unknown']||0)+1;
    if(c.lat&&c.lng&&!spots[loc].lat){spots[loc].lat=c.lat;spots[loc].lng=c.lng}
  });
  return Object.values(spots).sort((a,b)=>b.catches.length-a.catches.length);
}

// ─── Weather icon helper ───
function weatherIconName(code){
  if(code<=1)return'sun';
  if(code<=3)return'cloud';
  if(code>=45&&code<=48)return'cloud';
  if(code>=51&&code<=67)return'droplets';
  if(code>=71&&code<=77)return'cloud';
  if(code>=80&&code<=82)return'droplets';
  if(code>=95)return'zap';
  return'sun';
}

// ─── DISTANCE ───
function getDistKm(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─── WEATHER ───
let lastWeatherCode=0;
async function fetchWeather(){
  const card=document.getElementById('weatherCard');if(!card)return;
  try{
    let lat=currentLat||43.84,lng=currentLng||-79.38;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,apparent_temperature,wind_speed_10m,wind_direction_10m,weather_code,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto`;
    const data=await(await fetch(url)).json();const c=data.current;
    const codes={0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Fog',51:'Lt. Drizzle',53:'Drizzle',55:'Hvy. Drizzle',61:'Lt. Rain',63:'Rain',65:'Hvy. Rain',71:'Lt. Snow',73:'Snow',75:'Hvy. Snow',80:'Showers',81:'Hvy. Showers',95:'Thunderstorm'};
    const desc=codes[c.weather_code]||'--';
    const dirs=['N','NE','E','SE','S','SW','W','NW'];
    const wd=dirs[Math.round(c.wind_direction_10m/45)%8];
    const wIcon=weatherIconName(c.weather_code);
    card.innerHTML=`<div class="weather-top">
      <div class="weather-main">
        <div class="weather-icon"><i data-lucide="${wIcon}"></i></div>
        <div><div class="weather-temp">${Math.round(c.temperature_2m)}°F</div><div class="weather-desc">${desc}</div></div>
      </div>
      <div class="weather-live"><span class="weather-live-dot"></span> LIVE</div>
    </div>
    <div class="weather-grid">
      <div class="weather-item"><div class="wi-icon"><i data-lucide="wind"></i></div><div class="wv">${Math.round(c.wind_speed_10m)} ${wd}</div><div class="wl">Wind mph</div></div>
      <div class="weather-item"><div class="wi-icon"><i data-lucide="droplets"></i></div><div class="wv">${c.relative_humidity_2m}%</div><div class="wl">Humidity</div></div>
      <div class="weather-item"><div class="wi-icon"><i data-lucide="thermometer"></i></div><div class="wv">${Math.round(c.apparent_temperature)}°F</div><div class="wl">Feels Like</div></div>
    </div>`;
    lucide.createIcons();
  }catch(e){
    const desc=card.querySelector('.weather-desc');
    if(desc)desc.textContent='Unavailable';
  }
}

// ─── NAVIGATE ───
function navigateTo(lat,lng){
  const iOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  window.open(iOS?`maps://maps.apple.com/?daddr=${lat},${lng}`:`https://maps.google.com/maps?daddr=${lat},${lng}`,'_blank');
}
function shareLoc(name,lat,lng){
  const text=`Fishing spot: ${name}${lat?'\nhttps://maps.google.com/?q='+lat+','+lng:''}`;
  if(navigator.share){navigator.share({title:'Fishing Spot',text}).catch(()=>{})}
  else{navigator.clipboard.writeText(text).catch(()=>{})}
}
function refreshGPS(){
  navigator.geolocation.getCurrentPosition(
    pos=>{currentLat=pos.coords.latitude;currentLng=pos.coords.longitude;currentAccuracy=pos.coords.accuracy;renderHotspots()},
    ()=>{},{enableHighAccuracy:true,timeout:10000}
  );
}

function speak(t){try{if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(t);u.rate=.9;speechSynthesis.speak(u)}}catch(e){}}
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='fish-caught'){speak(e.data.weight+' pound '+e.data.species+'! Nice catch!');if(navigator.vibrate)navigator.vibrate([100,50,100])}
});

if(activeTab==='hotspot')renderHotspots();
