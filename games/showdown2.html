<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossover Chaos 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f10;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;touch-action:none;user-select:none;width:100vw;height:100vh;height:100dvh;}
canvas{display:block;position:fixed;top:0;left:0;width:100vw!important;height:100vh!important;height:100dvh!important;}
#ui-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;pointer-events:none;z-index:10;overflow:visible;}
#ui-overlay *{pointer-events:auto;}
.home-link{position:absolute;top:10px;left:10px;color:#aaa;text-decoration:none;font-size:14px;z-index:100;pointer-events:auto;}
.home-link:hover{color:#fff;}

/* HUD */
#hud{display:none;position:fixed;top:0;left:0;width:100%;padding:8px 12px;z-index:30;}
.hud-row{display:flex;align-items:center;justify-content:center;gap:10px;}
.hp-section{flex:1;display:flex;flex-direction:column;gap:2px;}
.hp-section.right{align-items:flex-end;}
.hp-section.right .hp-bar-outer{direction:rtl;}
.char-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 8px rgba(0,0,0,0.8);}
.hp-bar-outer{width:100%;height:22px;background:#222;border:2px solid #444;border-radius:3px;overflow:hidden;position:relative;}
.hp-bar-inner{height:100%;transition:width 0.4s ease;border-radius:1px;}
.hp-bar-inner.p1{background:linear-gradient(180deg,#4f4,#2a2);}
.hp-bar-inner.p2{background:linear-gradient(180deg,#4f4,#2a2);}
.special-bar-outer{width:100%;height:6px;background:#111;border-radius:2px;overflow:hidden;}
.special-bar-inner{height:100%;background:linear-gradient(90deg,#00bfff,#0ff);transition:width 0.3s;}
.timer-display{font-size:28px;font-weight:900;min-width:60px;text-align:center;text-shadow:0 0 10px rgba(255,200,0,0.5);color:#ffd700;}
.round-display{font-size:11px;text-align:center;color:#888;margin-top:2px;}
.round-dots{display:flex;gap:6px;justify-content:center;margin-top:4px;}
.round-dot{width:10px;height:10px;border-radius:50%;background:#333;border:1px solid #555;}
.round-dot.won-p1{background:#4f4;border-color:#6f6;}
.round-dot.won-p2{background:#f44;border-color:#f66;}

/* Screens */
.screen{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;justify-content:center;align-items:center;flex-direction:column;z-index:50;overflow-y:auto;padding:20px;}
.screen.active{display:flex;}
#title-screen{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0f0f10 70%);}
.title-text{font-size:clamp(32px,6vw,72px);font-weight:900;text-transform:uppercase;letter-spacing:4px;background:linear-gradient(180deg,#ff6b35,#ff2d2d,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 0 20px rgba(255,50,50,0.5));animation:titlePulse 2s ease-in-out infinite;}
.title-sub{font-size:clamp(14px,2vw,24px);color:#888;margin-top:10px;letter-spacing:8px;text-transform:uppercase;}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.btn{padding:14px 40px;font-size:18px;font-weight:700;border:2px solid #555;background:linear-gradient(180deg,#2a2a2a,#1a1a1a);color:#fff;cursor:pointer;border-radius:6px;margin:8px;transition:all 0.2s;text-transform:uppercase;letter-spacing:2px;}
.btn:hover{border-color:#ff6b35;background:linear-gradient(180deg,#3a2a2a,#2a1a1a);transform:scale(1.05);}
.btn:active{transform:scale(0.97);}

/* Character Select */
#select-screen{background:rgba(15,15,16,0.95);}
.select-title{font-size:28px;font-weight:900;margin-bottom:20px;color:#ff6b35;}
.select-grid{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap;justify-content:center;}
.char-card{width:min(200px,42vw);height:min(260px,45vh);border:3px solid #333;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;transition:all 0.3s;position:relative;overflow:hidden;}
.char-card:hover{border-color:#ff6b35;transform:translateY(-5px);box-shadow:0 10px 30px rgba(255,107,53,0.3);}
.char-card.selected-p1{border-color:#4f4;box-shadow:0 0 20px rgba(68,255,68,0.4);}
.char-card.selected-p2{border-color:#f44;box-shadow:0 0 20px rgba(255,68,68,0.4);}
.char-card canvas{width:160px;height:160px;}
.char-card-name{font-size:16px;font-weight:700;margin-top:8px;}
.char-card-stats{font-size:11px;color:#888;margin-top:4px;}
.select-info{font-size:14px;color:#aaa;margin-top:15px;}
.select-picks{display:flex;gap:40px;margin-top:10px;font-size:14px;}
.pick-label{padding:6px 16px;border-radius:4px;border:1px solid #333;}
.pick-label.p1{border-color:#4f4;color:#4f4;}
.pick-label.p2{border-color:#f44;color:#f44;}

/* Fight Announcements */
#announce{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(40px,8vw,80px);font-weight:900;text-transform:uppercase;z-index:60;text-shadow:0 0 30px rgba(255,100,0,0.8),0 0 60px rgba(255,0,0,0.4);letter-spacing:4px;animation:announceIn 0.3s ease-out;}
@keyframes announceIn{from{transform:translate(-50%,-50%) scale(2);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

/* Damage Numbers */
.dmg-number{position:absolute;font-size:24px;font-weight:900;color:#ff4;text-shadow:0 0 10px rgba(255,255,0,0.8);pointer-events:none;animation:dmgFloat 1s ease-out forwards;z-index:70;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}

/* Mobile Controls */
#mobile-controls{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;pointer-events:none;padding-bottom:env(safe-area-inset-bottom,0);}
#mobile-controls *{pointer-events:auto;}
.dpad{position:fixed;left:10px;bottom:calc(20px + env(safe-area-inset-bottom,0));}
.dpad-btn{position:absolute;width:52px;height:52px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:rgba(255,255,255,0.8);-webkit-tap-highlight-color:transparent;}
.dpad-btn:active{background:rgba(255,255,255,0.45);}
.dpad-up{left:54px;top:0;}
.dpad-down{left:54px;top:108px;}
.dpad-left{left:0;top:54px;}
.dpad-right{left:108px;top:54px;}
.atk-buttons{position:fixed;right:10px;bottom:calc(40px + env(safe-area-inset-bottom,0));display:flex;gap:10px;}
.atk-btn{width:58px;height:58px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;-webkit-tap-highlight-color:transparent;}
.atk-btn.light{background:rgba(100,200,255,0.3);}
.atk-btn.heavy{background:rgba(255,150,50,0.3);}
.atk-btn.special{background:rgba(255,50,50,0.3);}
.atk-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.4);}

/* Victory */
#victory-screen{background:rgba(0,0,0,0.85);}
.victory-text{font-size:clamp(28px,5vw,52px);font-weight:900;background:linear-gradient(180deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,200,0,0.6));}
.victory-sub{font-size:18px;color:#aaa;margin-top:10px;}
</style>
</head>

<script type="module">
import * as THREE from 'three';

// ========== AUDIO ==========
let audioCtx = null;
const MASTER_VOL = 0.02;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playSound(type) {
  try {
    ensureAudio();
    const g = audioCtx.createGain();
    g.gain.value = MASTER_VOL;
    g.connect(audioCtx.destination);
    const osc = audioCtx.createOscillator();
    const now = audioCtx.currentTime;
    switch(type) {
      case 'lightHit': {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        // Add noise burst
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const ns = audioCtx.createBufferSource(); ns.buffer = buf;
        const ng = audioCtx.createGain(); ng.gain.value = MASTER_VOL * 0.6;
        ns.connect(ng); ng.connect(audioCtx.destination);
        ns.start(now); break;
      }
      case 'heavyHit': {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const ns = audioCtx.createBufferSource(); ns.buffer = buf;
        const ng = audioCtx.createGain(); ng.gain.value = MASTER_VOL;
        ns.connect(ng); ng.connect(audioCtx.destination);
        ns.start(now); break;
      }
      case 'special': {
        osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5); break;
      }
      case 'block': {
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.08);
        g.gain.setValueAtTime(MASTER_VOL * 0.5, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1); break;
      }
      case 'ko': {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
        osc.start(now); osc.stop(now + 1.0);
        const o2 = audioCtx.createOscillator();
        o2.type = 'sine'; o2.frequency.setValueAtTime(600, now);
        o2.frequency.exponentialRampToValueAtTime(50, now + 0.6);
        const g2 = audioCtx.createGain(); g2.gain.value = MASTER_VOL * 0.8;
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(now); o2.stop(now + 0.7); break;
      }
      case 'bell': {
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
        g.gain.setValueAtTime(MASTER_VOL * 0.6, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        const o2 = audioCtx.createOscillator();
        o2.type = 'sine'; o2.frequency.setValueAtTime(1800, now);
        const g2 = audioCtx.createGain(); g2.gain.value = MASTER_VOL * 0.4;
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(now); o2.stop(now + 0.4); break;
      }
      case 'crowd': {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          const env = Math.sin(Math.PI * i / d.length);
          d[i] = (Math.random() * 2 - 1) * env * 0.5;
        }
        const ns = audioCtx.createBufferSource(); ns.buffer = buf;
        const ng = audioCtx.createGain(); ng.gain.value = MASTER_VOL * 0.4;
        const filt = audioCtx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.5;
        ns.connect(filt); filt.connect(ng); ng.connect(audioCtx.destination);
        ns.start(now);
        osc.connect(g); osc.frequency.value = 1; osc.start(now); osc.stop(now + 0.01);
        return;
      }
      default: {
        osc.frequency.value = 200; osc.start(now); osc.stop(now + 0.05); break;
      }
    }
    osc.connect(g);
  } catch(e) {}
}

// Background music
let musicPlaying = false;
let musicNodes = [];
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  const now = audioCtx.currentTime;
  // Bass loop
  function bassLoop() {
    if (!musicPlaying) return;
    const notes = [55, 55, 73.4, 65.4, 55, 55, 82.4, 73.4];
    const t = audioCtx.currentTime;
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(MASTER_VOL * 0.3, t + i * 0.25);
      g.gain.exponentialRampToValueAtTime(0.001, t + (i + 1) * 0.25 - 0.02);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + i * 0.25); osc.stop(t + (i + 1) * 0.25);
      musicNodes.push({ osc, g });
    });
    setTimeout(bassLoop, notes.length * 250);
  }
  bassLoop();
}
function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.osc.stop(); } catch(e) {} });
  musicNodes = [];
}

// ========== THREE.JS SETUP ==========
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a12, 0.015);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 22);
camera.lookAt(0, 2, 0);

const baseCamPos = new THREE.Vector3(0, 4, 22);
const camShake = { x: 0, y: 0, decay: 0.9 };

// Lighting
const ambientLight = new THREE.AmbientLight(0x303050, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(5, 12, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 10; dirLight.shadow.camera.bottom = -2;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0x4488ff, 0.8);
rimLight.position.set(-5, 8, -10);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff6633, 0.4, 30);
fillLight.position.set(0, 6, 5);
scene.add(fillLight);

// ========== STAGE ==========
function buildStage() {
  const stageGroup = new THREE.Group();

  // Ground
  const groundGeo = new THREE.BoxGeometry(30, 0.5, 12);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.8 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.position.y = -0.25;
  ground.receiveShadow = true;
  stageGroup.add(ground);

  // Platform edge lines
  const edgeGeo = new THREE.BoxGeometry(30, 0.08, 0.08);
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0xff4400, emissiveIntensity: 0.5 });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.position.set(0, 0.02, 6);
  stageGroup.add(edge);
  const edge2 = edge.clone(); edge2.position.z = -6; stageGroup.add(edge2);

  // Background buildings (parallax group)
  const bgGroup = new THREE.Group();
  bgGroup.userData.parallax = true;
  const buildingColors = [0x1a1a2e, 0x16213e, 0x0f3460, 0x1a1a3e, 0x0e2040];
  for (let i = 0; i < 12; i++) {
    const h = 3 + Math.random() * 8;
    const w = 1.5 + Math.random() * 2;
    const bGeo = new THREE.BoxGeometry(w, h, 2);
    const bMat = new THREE.MeshStandardMaterial({ color: buildingColors[i % buildingColors.length] });
    const b = new THREE.Mesh(bGeo, bMat);
    b.position.set(-12 + i * 2.2 + Math.random(), h / 2, -8 - Math.random() * 3);
    bgGroup.add(b);
    // Windows
    for (let wy = 1; wy < h - 1; wy += 1.2) {
      for (let wx = -w/3; wx <= w/3; wx += w/2.5) {
        if (Math.random() > 0.4) {
          const wGeo = new THREE.BoxGeometry(0.2, 0.3, 0.05);
          const wMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffdd44, emissiveIntensity: Math.random() * 0.6 + 0.2 });
          const win = new THREE.Mesh(wGeo, wMat);
          win.position.set(b.position.x + wx, wy, b.position.z + 1.05);
          bgGroup.add(win);
        }
      }
    }
  }
  stageGroup.add(bgGroup);
  stageGroup.userData.bgGroup = bgGroup;

  // Trees
  for (let i = 0; i < 4; i++) {
    const trunk = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 1.5, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x5c3a1e })
    );
    trunk.position.set(-10 + i * 7, 0.75, -4 - Math.random());
    stageGroup.add(trunk);
    const leaves = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.2, 1.2),
      new THREE.MeshStandardMaterial({ color: 0x2d5a1e })
    );
    leaves.position.set(trunk.position.x, 2, trunk.position.z);
    stageGroup.add(leaves);
  }

  scene.add(stageGroup);
  return stageGroup;
}

// ========== CHARACTER BUILDERS ==========
function buildHorse() {

// ========== PARTICLES ==========
const particles = [];
function spawnParticles(pos, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshBasicMaterial({ color });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      Math.random() * 0.2 + 0.1,
      (Math.random() - 0.5) * 0.2
    );
    p.userData.life = 1;
    scene.add(p);
    particles.push(p);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= dt * 2;
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
      continue;
    }
    p.position.add(p.userData.vel);
    p.userData.vel.y -= 0.01;
    p.material.opacity = p.userData.life;
    p.material.transparent = true;
    p.scale.setScalar(p.userData.life);
  }
}

const mobileState = { left: false, right: false, up: false, down: false, light: false, heavy: false, special: false };

  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {

  document.querySelectorAll('.dpad-btn').forEach(btn => {

// ========== AI ==========
const ai = { actionTimer: 0, moveDir: 0, wantsAttack: '', wantsBlock: false, difficulty: 0.5 };

function updateAI(fighter, opponent, dt) {
  ai.actionTimer -= dt;
  if (ai.actionTimer <= 0) {
    const dist = Math.abs(fighter.x - opponent.x);
    const facingOpponent = (opponent.x > fighter.x && fighter.facing > 0) || (opponent.x < fighter.x && fighter.facing < 0);

    ai.actionTimer = 0.15 + Math.random() * (0.5 - ai.difficulty * 0.3);
    ai.moveDir = 0;
    ai.wantsAttack = '';
    ai.wantsBlock = false;

    if (dist > 3.5) {
      ai.moveDir = opponent.x > fighter.x ? 1 : -1;
    } else if (dist < 1.5) {
      ai.moveDir = opponent.x > fighter.x ? -1 : 1;
      if (Math.random() < 0.3 * ai.difficulty) {
        ai.wantsAttack = 'light';
      }
    }

    if (dist < fighter.def.heavyRange + 0.5 && facingOpponent) {
      const r = Math.random();
      if (r < 0.25 * ai.difficulty) {
        ai.wantsAttack = 'heavy';
      } else if (r < 0.5 * ai.difficulty) {
        ai.wantsAttack = 'light';
      } else if (r < 0.15 * ai.difficulty && fighter.specialCooldown <= 0) {
        ai.wantsAttack = 'special';
      }
    }

    if (fighter.specialCooldown <= 0 && dist < fighter.def.specialRange && Math.random() < 0.1 * ai.difficulty) {
      ai.wantsAttack = 'special';
    }

    if (opponent.state === 'lightAtk' || opponent.state === 'heavyAtk' || opponent.state === 'specialAtk') {
      if (Math.random() < 0.35 * ai.difficulty && dist < 3) {
        ai.wantsBlock = true;
        ai.wantsAttack = '';
        ai.moveDir = 0;
      }
    }
  }

  return {
    left: ai.moveDir < 0,
    right: ai.moveDir > 0,
    up: ai.wantsBlock && fighter.state !== 'jump',
    light: ai.wantsAttack === 'light',
    heavy: ai.wantsAttack === 'heavy',
    special: ai.wantsAttack === 'special',
  };
}

// ========== ANIMATIONS ==========
function animateHorse(fighter, dt) {
  const m = fighter.model;
  const legs = m.userData.legs;
  const tail = m.userData.tail;
  const head = m.userData.head;
  const snout = m.userData.snout;
  const neck = m.userData.neck;
  const body = m.userData.body;
  const t = fighter.idleTimer;

  // Reset
  legs.forEach(l => { l.rotation.x = 0; l.rotation.z = 0; });
  if (head) { head.position.y = 2.6; head.rotation.z = 0; }
  if (snout) { snout.position.y = 2.45; snout.rotation.z = 0; }
  if (neck) { neck.rotation.z = 0.3; }
  if (body) { body.scale.y = 1; body.position.y = 1.8; }

  switch (fighter.state) {
    case 'idle':
      // Breathing
      body.scale.y = 1 + Math.sin(t * 2) * 0.02;
      body.position.y = 1.8 + Math.sin(t * 2) * 0.02;
      // Tail swish
      tail.rotation.z = Math.sin(t * 3) * 0.3;
      tail.rotation.x = Math.sin(t * 1.5) * 0.1;
      // Head bob
      head.position.y = 2.6 + Math.sin(t * 1.8) * 0.03;
      snout.position.y = 2.45 + Math.sin(t * 1.8) * 0.03;
      break;

    case 'walk':
      const wc = fighter.walkCycle;
      legs[0].rotation.x = Math.sin(wc) * 0.5;
      legs[1].rotation.x = Math.sin(wc + Math.PI) * 0.5;
      legs[2].rotation.x = Math.sin(wc + Math.PI) * 0.5;
      legs[3].rotation.x = Math.sin(wc) * 0.5;
      body.position.y = 1.8 + Math.abs(Math.sin(wc)) * 0.05;
      tail.rotation.z = Math.sin(wc * 0.5) * 0.4;
      break;

    case 'jump':
      legs[0].rotation.x = -0.4;
      legs[1].rotation.x = -0.4;
      legs[2].rotation.x = 0.3;
      legs[3].rotation.x = 0.3;
      head.position.y = 2.7;
      snout.position.y = 2.55;
      break;

    case 'lightAtk': {
      const prog = fighter.stateTimer / fighter.def.lightDur;
      // Front kick
      legs[0].rotation.x = -Math.sin(prog * Math.PI) * 1.2;
      legs[1].rotation.x = -Math.sin(prog * Math.PI) * 1.2;
      head.rotation.z = Math.sin(prog * Math.PI) * 0.1;
      body.position.y = 1.85;
      break;
    }

    case 'heavyAtk': {
      const prog = fighter.stateTimer / fighter.def.heavyDur;
      // Buck kick - rear legs kick back
      if (prog < 0.4) {
        // Wind up - lean forward
        const wp = prog / 0.4;
        head.position.y = 2.6 - wp * 0.3;
        snout.position.y = 2.45 - wp * 0.3;
        body.rotation.z = wp * 0.2 * fighter.facing;
      } else {
        // Kick
        const kp = (prog - 0.4) / 0.6;
        legs[2].rotation.x = Math.sin(kp * Math.PI) * 1.5;
        legs[3].rotation.x = Math.sin(kp * Math.PI) * 1.5;
        body.rotation.z = -0.15 * fighter.facing;
        head.position.y = 2.8;
        snout.position.y = 2.65;
      }
      break;
    }

    case 'specialAtk': {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      // Gallop charge
      const gc = fighter.stateTimer * 20;
      legs[0].rotation.x = Math.sin(gc) * 0.8;
      legs[1].rotation.x = Math.sin(gc + Math.PI) * 0.8;
      legs[2].rotation.x = Math.sin(gc + Math.PI) * 0.8;
      legs[3].rotation.x = Math.sin(gc) * 0.8;
      body.position.y = 1.8 + Math.abs(Math.sin(gc)) * 0.15;
      head.position.y = 2.5;
      snout.position.y = 2.35;
      neck.rotation.z = 0.1;
      tail.rotation.z = -0.8;
      break;
    }

    case 'block':
      // Rear up on hind legs
      legs[0].rotation.x = -0.8;
      legs[1].rotation.x = -0.8;
      body.rotation.z = -0.2 * fighter.facing;
      body.position.y = 2.0;
      head.position.y = 2.9;
      snout.position.y = 2.75;
      break;

    case 'hit':
      body.position.y = 1.8 + Math.sin(t * 30) * 0.05;
      head.rotation.z = -0.2 * fighter.facing;
      break;

    case 'ko':
      const koProg = Math.min(fighter.koFall, 1);
      m.rotation.z = koProg * (Math.PI / 2) * fighter.facing;
      m.position.y = -koProg * 0.5;
      legs.forEach(l => { l.rotation.x = 0.3; });
      break;
  }

  // Reset body rotation if not in specific states
  if (fighter.state !== 'heavyAtk' && fighter.state !== 'block' && fighter.state !== 'ko') {
    body.rotation.z = 0;
  }
}

function animatePennywise(fighter, dt) {
  const m = fighter.model;
  const armL = m.userData.armL;
  const armR = m.userData.armR;
  const legL = m.userData.legL;
  const legR = m.userData.legR;
  const body = m.userData.body;
  const head = m.userData.head;
  const nose = m.userData.nose;
  const t = fighter.idleTimer;

  // Reset
  armL.rotation.x = 0; armL.rotation.z = 0;
  armR.rotation.x = 0; armR.rotation.z = 0;
  legL.rotation.x = 0; legR.rotation.x = 0;
  if (body) { body.scale.set(1,1,1); body.position.y = 1.9; body.rotation.z = 0; }
  if (head) { head.rotation.set(0,0,0); head.position.y = 3.45; }
  m.position.y = fighter.y;

  // Handle opacity for phasing
  m.traverse(child => {
    if (child.isMesh && child.material) {
      child.material.transparent = fighter.opacity < 1;
      child.material.opacity = fighter.opacity;
    }
  });

  switch (fighter.state) {
    case 'idle':
      body.scale.y = 1 + Math.sin(t * 2.5) * 0.015;
      body.position.y = 1.9 + Math.sin(t * 2.5) * 0.015;
      armL.rotation.z = 0.1 + Math.sin(t * 1.5) * 0.05;
      armR.rotation.z = -0.1 - Math.sin(t * 1.5) * 0.05;
      armL.rotation.x = Math.sin(t * 1.2) * 0.08;
      armR.rotation.x = -Math.sin(t * 1.2) * 0.08;
      head.rotation.y = Math.sin(t * 0.8) * 0.1;
      break;

    case 'walk':
      const wc = fighter.walkCycle;
      legL.rotation.x = Math.sin(wc) * 0.5;
      legR.rotation.x = Math.sin(wc + Math.PI) * 0.5;
      armL.rotation.x = Math.sin(wc + Math.PI) * 0.3;
      armR.rotation.x = Math.sin(wc) * 0.3;
      body.position.y = 1.9 + Math.abs(Math.sin(wc)) * 0.03;
      break;

    case 'jump':
      armL.rotation.z = 0.8;
      armR.rotation.z = -0.8;
      armL.rotation.x = -0.3;
      armR.rotation.x = -0.3;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.3;
      break;

    case 'lightAtk': {
      const prog = fighter.stateTimer / fighter.def.lightDur;
      // Claw swipe
      const swipe = Math.sin(prog * Math.PI);
      armR.rotation.x = -swipe * 1.5;
      armR.rotation.z = -swipe * 0.5;
      body.rotation.z = swipe * 0.1 * fighter.facing;
      break;
    }

    case 'heavyAtk': {
      const prog = fighter.stateTimer / fighter.def.heavyDur;
      // Balloon smash (overhead)
      if (prog < 0.4) {
        const wp = prog / 0.4;
        armL.rotation.x = -wp * 2.5;
        armR.rotation.x = -wp * 2.5;
        armL.rotation.z = wp * 0.3;
        armR.rotation.z = -wp * 0.3;
      } else {
        const sp = (prog - 0.4) / 0.6;
        armL.rotation.x = -2.5 + sp * 3.5;
        armR.rotation.x = -2.5 + sp * 3.5;
        body.rotation.z = sp * 0.15 * fighter.facing;
      }
      // Spawn/animate balloon
      if (!fighter.specialData && prog < 0.5) {
        const balloon = new THREE.Mesh(
          new THREE.SphereGeometry(0.4, 12, 12),
          new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 })
        );
        m.add(balloon);
        fighter.specialData = balloon;
      }
      if (fighter.specialData) {
        if (prog < 0.4) {
          fighter.specialData.position.set(0, 4.5, 0.5);
        } else {
          fighter.specialData.position.set(0, 4.5 - (prog - 0.4) / 0.6 * 3, 0.5);
        }
        if (prog > 0.9) {
          m.remove(fighter.specialData);
          fighter.specialData = null;
        }
      }
      break;
    }

    case 'specialAtk': {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      // Sewer grab - extend arm
      if (prog < 0.4) {
        const reach = prog / 0.4;
        armR.rotation.x = -reach * 1.2;
        armR.scale.y = 1 + reach * 2;
      } else if (prog < 0.7) {
        armR.rotation.x = -1.2;
        armR.scale.y = 3;
        // Pull back
        const pull = (prog - 0.4) / 0.3;
        armR.scale.y = 3 - pull * 2;
      } else {
        // Bite
        const bite = (prog - 0.7) / 0.3;
        head.rotation.x = Math.sin(bite * Math.PI * 2) * 0.3;
        armR.scale.y = 1;
      }
      break;
    }

    case 'block':
      // Phase out
      fighter.opacity = 0.35;
      body.scale.set(1.05, 1.05, 1.05);
      break;

    case 'hit':
      body.position.y = 1.9 + Math.sin(t * 30) * 0.05;
      head.rotation.z = -0.2 * fighter.facing;
      armL.rotation.z = 0.3;
      armR.rotation.z = -0.3;
      break;

    case 'ko':
      const koProg = Math.min(fighter.koFall, 1);
      m.rotation.z = koProg * (Math.PI / 2) * fighter.facing;
      m.position.y = fighter.y - koProg * 0.8;
      armL.rotation.z = 0.5;
      armR.rotation.z = -0.5;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.2;
      break;
  }

  if (fighter.state !== 'block') {
    fighter.opacity = Math.min(fighter.opacity + dt * 3, 1);
  }
}

function animateFighter(fighter, dt) {
  if (fighter.charId === 'horse') {
    animateHorse(fighter, dt);
  } else {
    animatePennywise(fighter, dt);
  }

  // Flash when hit
  if (fighter.flashTimer > 0) {
    fighter.flashTimer -= dt;
    const flash = Math.sin(fighter.flashTimer * 30) > 0;
    fighter.model.traverse(child => {
      if (child.isMesh && child.material) {
        child.material.emissive = flash ? new THREE.Color(0xffffff) : new THREE.Color(0x000000);
        child.material.emissiveIntensity = flash ? 0.8 : 0;
      }
    });
    if (fighter.flashTimer <= 0) {
      fighter.model.traverse(child => {
        if (child.isMesh && child.material) {
          child.material.emissive = new THREE.Color(0x000000);
          child.material.emissiveIntensity = 0;
        }
      });
    }
  }
}

// ========== FIGHTER UPDATE ==========
function updateFighter(fighter, opponent, dt) {
  fighter.idleTimer += dt;

  if (fighter.state === 'ko') {
    fighter.koFall += dt * 2;
    return;
  }

  // Special cooldown
  fighter.specialCooldown = Math.max(0, fighter.specialCooldown - dt);

  // State transitions
  fighter.stateTimer += dt;

  // Handle attack states
  if (['lightAtk', 'heavyAtk', 'specialAtk'].includes(fighter.state)) {
    const atkType = fighter.state.replace('Atk', '');
    const dur = fighter.def[atkType + 'Dur'];
    const hitTime = fighter.def[atkType + 'HitTime'];

    // Check hit
    if (!fighter.attackHit && fighter.stateTimer >= hitTime) {
      const dist = Math.abs(fighter.x - opponent.x);
      const range = fighter.def[atkType + 'Range'];
      const facingRight = fighter.facing > 0;
      const opponentIsRight = opponent.x > fighter.x;
      const facingCorrect = (facingRight && opponentIsRight) || (!facingRight && !opponentIsRight);

      // Special attack for horse (gallop charge) hits anywhere along path
      let inRange = dist < range && facingCorrect;
      if (fighter.charId === 'horse' && atkType === 'special') {
        inRange = dist < range; // Gallop charge covers large range
      }
      if (fighter.charId === 'pennywise' && atkType === 'special') {
        inRange = dist < range; // Sewer grab has long reach
      }

      if (inRange) {
        fighter.attackHit = true;
        let dmg = fighter.def[atkType + 'Dmg'];

        if (opponent.state === 'block') {
          dmg = Math.floor(dmg * 0.25);
          playSound('block');
          spawnParticles(new THREE.Vector3(opponent.x, 2, 0), 0x8888ff, 5);
        } else {
          opponent.state = 'hit';
          opponent.stateTimer = 0;
          opponent.hitStun = atkType === 'light' ? 0.2 : atkType === 'heavy' ? 0.35 : 0.5;
          playSound(atkType === 'light' ? 'lightHit' : atkType === 'special' ? 'special' : 'heavyHit');
          spawnParticles(new THREE.Vector3(opponent.x, 2.5, 0), 0xff4444, atkType === 'special' ? 20 : 12);
          opponent.flashTimer = 0.3;

          // Knockback
          const kb = atkType === 'light' ? 1 : atkType === 'heavy' ? 2.5 : 4;
          opponent.x += kb * fighter.facing;
          opponent.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, opponent.x));

          // Screen shake
          const shakeAmt = atkType === 'light' ? 0.1 : atkType === 'heavy' ? 0.25 : 0.5;
          camShake.x += (Math.random() - 0.5) * shakeAmt;
          camShake.y += (Math.random() - 0.5) * shakeAmt;
        }

        opponent.hp -= dmg;
        opponent.hp = Math.max(0, opponent.hp);

        // Damage number
        const pos3 = new THREE.Vector3(opponent.x, 3.5, 0);
        pos3.project(camera);
        const sx = (pos3.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-pos3.y * 0.5 + 0.5) * window.innerHeight;
        showDamage(dmg, sx, sy);

        if (opponent.hp <= 0) {
          handleKO(fighter, opponent);
        }
      }
    }

    // Horse gallop movement
    if (fighter.charId === 'horse' && fighter.state === 'specialAtk') {
      fighter.x += fighter.facing * 15 * dt;
      fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    }

    // Pennywise special pull
    if (fighter.charId === 'pennywise' && fighter.state === 'specialAtk' && fighter.attackHit) {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      if (prog > 0.4 && prog < 0.7) {
        // Pull opponent closer
        const pullSpeed = 10 * dt;
        if (opponent.x > fighter.x) opponent.x -= pullSpeed;
        else opponent.x += pullSpeed;
      }
    }

    if (fighter.stateTimer >= dur) {
      fighter.state = 'idle';
      fighter.stateTimer = 0;
      // Clean up balloon
      if (fighter.specialData) {
        fighter.model.remove(fighter.specialData);
        fighter.specialData = null;
      }
    }
    return;
  }

  // Hit stun
  if (fighter.state === 'hit') {
    fighter.hitStun -= dt;
    if (fighter.hitStun <= 0) {
      fighter.state = 'idle';
      fighter.stateTimer = 0;
    }
    return;
  }

  // Get input
  let input;
  if (fighter.playerNum === 2 && gameMode === '1p') {
    input = updateAI(fighter, opponent, dt);
  } else {
    input = getInput(fighter.playerNum);
  }

  // Blocking (while standing still on ground and pressing up)
  if (input.up && !input.left && !input.right && fighter.y <= GROUND_Y + 0.01 && fighter.state !== 'jump') {
    fighter.state = 'block';
    fighter.stateTimer = 0;
    return;
  }

  // Unblock
  if (fighter.state === 'block') {
    if (!input.up || input.left || input.right) {
      fighter.state = 'idle';
      fighter.stateTimer = 0;
    }
    return;
  }

  // Attacks
  if (input.special && fighter.specialCooldown <= 0 && fighter.y <= GROUND_Y + 0.01) {
    fighter.state = 'specialAtk';
    fighter.stateTimer = 0;
    fighter.attackHit = false;
    fighter.specialCooldown = fighter.def.specialCooldown;
    playSound('special');
    return;
  }
  if (input.heavy && fighter.y <= GROUND_Y + 0.01) {
    fighter.state = 'heavyAtk';
    fighter.stateTimer = 0;
    fighter.attackHit = false;
    return;
  }
  if (input.light && fighter.y <= GROUND_Y + 0.01) {
    fighter.state = 'lightAtk';
    fighter.stateTimer = 0;
    fighter.attackHit = false;
    return;
  }

  // Jump
  if (input.up && fighter.y <= GROUND_Y + 0.01) {
    fighter.vy = 10;
    fighter.state = 'jump';
    fighter.stateTimer = 0;
  }

  // Movement
  let moveX = 0;
  if (input.left) moveX -= 1;
  if (input.right) moveX += 1;

  if (moveX !== 0) {
    fighter.x += moveX * fighter.def.speed * dt;
    fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    fighter.facing = moveX;
    if (fighter.y <= GROUND_Y + 0.01) {
      fighter.state = 'walk';
      fighter.walkCycle += dt * 10;
    }
  } else if (fighter.y <= GROUND_Y + 0.01 && fighter.state === 'walk') {
    fighter.state = 'idle';
    fighter.stateTimer = 0;
  }

  // Face opponent (unless actively moving)
  if (moveX === 0 && fighter.state !== 'specialAtk') {
    fighter.facing = opponent.x > fighter.x ? 1 : -1;
  }

  // Gravity
  if (fighter.y > GROUND_Y || fighter.vy > 0) {
    fighter.vy += GRAVITY * dt;
    fighter.y += fighter.vy * dt;
    if (fighter.y <= GROUND_Y) {
      fighter.y = GROUND_Y;
      fighter.vy = 0;
      if (fighter.state === 'jump') {
        fighter.state = 'idle';
        fighter.stateTimer = 0;
      }
    }
  }

  // Push apart (prevent overlap)
  const dist = Math.abs(fighter.x - opponent.x);
  if (dist < 1.2 && opponent.state !== 'ko') {
    const push = (1.2 - dist) * 0.5;
    if (fighter.x < opponent.x) {
      fighter.x -= push;
      opponent.x += push;
    } else {
      fighter.x += push;
      opponent.x -= push;
    }
    fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    opponent.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, opponent.x));
  }

  // Update model position/rotation
  fighter.model.position.x = fighter.x;
  fighter.model.position.y = fighter.y;
  fighter.model.rotation.y = fighter.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
}

// ========== KO HANDLING ==========
function handleKO(winner, loser) {
  loser.state = 'ko';
  loser.koFall = 0;
  loser.stateTimer = 0;
  playSound('ko');
  playSound('crowd');
  slowMotion = 1.0;
  koZoom = 1.0;
  camShake.x += (Math.random() - 0.5) * 1.0;
  camShake.y += (Math.random() - 0.5) * 0.8;
  spawnParticles(new THREE.Vector3(loser.x, 2, 0), 0xffaa00, 30);

  announce('K.O.!', '#ff2222', 2000);

  fightActive = false;

  setTimeout(() => {
    if (winner.playerNum === 1) p1Wins++;
    else p2Wins++;

    // Announce round winner
    const rn = roundNum;
    announce(`ROUND ${rn} — ${winner.def.name.toUpperCase()} WINS`, '#ffd700', 2000);

    setTimeout(() => {
      if (p1Wins >= 2 || p2Wins >= 2) {
        showVictory(winner);
      } else {
        startRound();
      }
    }, 2500);
  }, 2200);
}

function handleTimeOut() {
  fightActive = false;
  const f1 = fighters[0], f2 = fighters[1];
  let winner, loser;
  if (f1.hp > f2.hp) { winner = f1; loser = f2; }
  else if (f2.hp > f1.hp) { winner = f2; loser = f1; }
  else {
    // Draw - both lose (give to p1)
    winner = f1; loser = f2;
  }
  loser.state = 'ko'; loser.koFall = 0;
  announce('TIME!', '#ffdd00', 2000);
  playSound('bell');

  setTimeout(() => {
    if (winner.playerNum === 1) p1Wins++;
    else p2Wins++;
    if (p1Wins >= 2 || p2Wins >= 2) {
      setTimeout(() => showVictory(winner), 1000);
    } else {
      setTimeout(() => startRound(), 1000);
    }
  }, 2000);
}

// ========== HUD UPDATE ==========
function updateHUD(dt) {
  if (fighters.length < 2) return;
  const f1 = fighters[0], f2 = fighters[1];

  // Smooth HP display
  f1.displayHp += (f1.hp - f1.displayHp) * dt * 8;
  f2.displayHp += (f2.hp - f2.displayHp) * dt * 8;

  const hp1Pct = Math.max(0, f1.displayHp / f1.maxHp * 100);
  const hp2Pct = Math.max(0, f2.displayHp / f2.maxHp * 100);

  document.getElementById('p1-hp').style.width = hp1Pct + '%';
  document.getElementById('p2-hp').style.width = hp2Pct + '%';

  // HP bar color
  const hpColor = (pct) => {
    if (pct > 60) return 'linear-gradient(180deg,#4f4,#2a2)';
    if (pct > 30) return 'linear-gradient(180deg,#ff4,#aa2)';
    return 'linear-gradient(180deg,#f44,#a22)';
  };
  document.getElementById('p1-hp').style.background = hpColor(hp1Pct);
  document.getElementById('p2-hp').style.background = hpColor(hp2Pct);

  // Special bars
  const sp1 = Math.max(0, 1 - f1.specialCooldown / f1.def.specialCooldown) * 100;
  const sp2 = Math.max(0, 1 - f2.specialCooldown / f2.def.specialCooldown) * 100;
  document.getElementById('p1-special').style.width = sp1 + '%';
  document.getElementById('p2-special').style.width = sp2 + '%';

  // Timer
  if (fightActive) {
    roundTimer -= dt;
    if (roundTimer <= 0) {
      roundTimer = 0;
      handleTimeOut();
    }
  }
  document.getElementById('timer').textContent = Math.ceil(roundTimer);
  if (roundTimer <= 10) {
    document.getElementById('timer').style.color = '#ff4444';
  } else {
    document.getElementById('timer').style.color = '#ffd700';
  }

  // Round dots
  let dots = '';
  for (let i = 0; i < 3; i++) {
    const c1 = i < p1Wins ? ' won-p1' : '';
    const c2 = i < p2Wins ? ' won-p2' : '';
    dots += `<span class="round-dot${c1}"></span>`;
  }
  dots += ' ';
  for (let i = 0; i < 3; i++) {
    const c2 = i < p2Wins ? ' won-p2' : '';
    dots += `<span class="round-dot${c2}"></span>`;
  }
  document.getElementById('round-dots').innerHTML = dots;
}

// ========== GAME FLOW ==========
function startMatch() {
  p1Wins = 0;
  p2Wins = 0;
  roundNum = 0;
  showScreen('');
  document.getElementById('hud').style.display = 'block';
  if (isMobile) document.getElementById('mobile-controls').style.display = 'block';
  if (!stageGroup) stageGroup = buildStage();
  startRound();
  startMusic();
}

function startRound() {
  roundNum++;
  roundTimer = 60;
  fightActive = false;
  slowMotion = 0;
  koZoom = 0;

  // Clear old fighters
  fighters.forEach(f => {
    scene.remove(f.model);
    if (f.specialData) f.model.remove(f.specialData);
  });
  fighters = [];

  // Create fighters
  const f1 = createFighter(p1Char, 1);
  const f2 = createFighter(p2Char, 2);
  fighters = [f1, f2];

  document.getElementById('p1-name').textContent = f1.def.name;
  document.getElementById('p2-name').textContent = f2.def.name;
  document.getElementById('round-label').textContent = 'Round ' + roundNum;

  // AI difficulty ramps
  ai.difficulty = 0.4 + roundNum * 0.15;

  // Reset camera
  camera.position.copy(baseCamPos);

  // "READY? FIGHT!" sequence
  announce('ROUND ' + roundNum, '#ffd700', 1000);
  setTimeout(() => {
    announce('READY?', '#ffaa00', 1000);
  }, 1200);
  setTimeout(() => {
    announce('FIGHT!', '#ff4444', 800);
    playSound('bell');
    fightActive = true;
  }, 2400);
}

function showVictory(winner) {
  fightActive = false;
  stopMusic();
  showScreen('victory-screen');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('victory-text').textContent = winner.def.name + ' WINS!';
  document.getElementById('victory-sub').textContent =
    `Final Score: ${p1Wins} - ${p2Wins}`;
  playSound('crowd');
}

// ========== CHARACTER SELECT ==========
function initCharSelect() {
  selectPhase = 0;
  p1Char = null;
  p2Char = null;
  showScreen('select-screen');

  const grid = document.getElementById('select-grid');
  grid.innerHTML = '';
  previewRenderers.forEach(pr => pr.prevRenderer.dispose());
  previewRenderers = [];

  Object.keys(CHAR_DEFS).forEach(charId => {
    const def = CHAR_DEFS[charId];
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.charId = charId;

    const prev = createPreviewRenderer(def.buildFn, card);
    previewRenderers.push(prev);

    const nameEl = document.createElement('div');
    nameEl.className = 'char-card-name';
    nameEl.textContent = def.name;
    card.appendChild(nameEl);

    const statsEl = document.createElement('div');
    statsEl.className = 'char-card-stats';
    statsEl.textContent = `HP:${def.hp} SPD:${def.speed} ATK:${def.lightDmg}/${def.heavyDmg}/${def.specialDmg}`;
    card.appendChild(statsEl);

    card.addEventListener('click', () => selectChar(charId, card));
    grid.appendChild(card);
  });

  updateSelectUI();
}

function selectChar(charId, card) {
  if (selectPhase === 0) {
    p1Char = charId;
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected-p1'));
    card.classList.add('selected-p1');
    selectPhase = 1;
    if (gameMode === '1p') {
      // AI picks the other character
      const chars = Object.keys(CHAR_DEFS);
      p2Char = chars.find(c => c !== charId) || chars[0];
      document.querySelectorAll('.char-card').forEach(c => {
        if (c.dataset.charId === p2Char) c.classList.add('selected-p2');
      });
      selectPhase = 2;
    }
  } else if (selectPhase === 1 && gameMode === '2p') {
    p2Char = charId;
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected-p2'));
    card.classList.add('selected-p2');
    selectPhase = 2;
  }
  updateSelectUI();
}

function updateSelectUI() {
  const p1Name = p1Char ? CHAR_DEFS[p1Char].name : '---';
  const p2Name = p2Char ? CHAR_DEFS[p2Char].name : '---';
  document.getElementById('pick-p1').textContent = 'P1: ' + p1Name;
  document.getElementById('pick-p2').textContent = 'P2: ' + p2Name;

  if (selectPhase === 0) {
    document.getElementById('select-info').textContent = 'Player 1 — pick your fighter';
  } else if (selectPhase === 1) {
    document.getElementById('select-info').textContent = 'Player 2 — pick your fighter';
  } else {
    document.getElementById('select-info').textContent = 'Ready to fight!';
  }

  document.getElementById('btn-fight').style.display = selectPhase >= 2 ? 'inline-block' : 'none';
}

// ========== MAIN LOOP ==========
let lastTime = 0;
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  const rawDt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Slow motion effect
  let dt = rawDt;
  if (slowMotion > 0) {
    slowMotion -= rawDt;
    dt = rawDt * 0.2;
  }

  // Update preview renderers (char select)
  previewRenderers.forEach(pr => {
    pr.char.rotation.y += rawDt * 0.8;
    pr.prevRenderer.render(pr.prevScene, pr.prevCam);
  });

  if (gameState === 'fight' && fighters.length === 2) {
    const f1 = fighters[0], f2 = fighters[1];

    if (fightActive || f1.state === 'ko' || f2.state === 'ko') {
      updateFighter(f1, f2, dt);
      updateFighter(f2, f1, dt);

      // Update model positions
      f1.model.position.x = f1.x;
      f1.model.position.y = f1.y;
      f1.model.rotation.y = f1.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
      f2.model.position.x = f2.x;
      f2.model.position.y = f2.y;
      f2.model.rotation.y = f2.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
    }

    animateFighter(f1, dt);
    animateFighter(f2, dt);
    updateHUD(dt);
    updateParticles(dt);

    // Camera follow (slight tracking of midpoint)
    const midX = (f1.x + f2.x) / 2;
    const spread = Math.abs(f1.x - f2.x);
    const targetZ = 22 + Math.max(0, spread - 8) * 0.5;
    camera.position.x += (midX * 0.3 - camera.position.x) * dt * 3;
    camera.position.z += (targetZ - camera.position.z) * dt * 3;

    // KO zoom
    if (koZoom > 0) {
      koZoom -= rawDt * 0.5;
      const zoomTarget = (f1.state === 'ko') ? f1 : f2;
      const targetPos = new THREE.Vector3(zoomTarget.x, 2.5, 14);
      camera.position.lerp(targetPos, rawDt * 1.5);
    }

    // Parallax
    if (stageGroup && stageGroup.userData.bgGroup) {
      stageGroup.userData.bgGroup.position.x = -midX * 0.15;
    }

    // Screen shake
    camera.position.x += camShake.x;
    camera.position.y = baseCamPos.y + camShake.y;
    camShake.x *= camShake.decay;
    camShake.y *= camShake.decay;
    if (Math.abs(camShake.x) < 0.001) camShake.x = 0;
    if (Math.abs(camShake.y) < 0.001) camShake.y = 0;

    camera.lookAt(midX * 0.3, 2, 0);
  }

  renderer.render(scene, camera);
  consumePressed();
}

// ========== EVENT LISTENERS ==========
document.getElementById('btn-1p').addEventListener('click', () => {
  ensureAudio();
  gameMode = '1p';
  gameState = 'select';
  initCharSelect();
});

document.getElementById('btn-2p').addEventListener('click', () => {
  ensureAudio();
  gameMode = '2p';
  gameState = 'select';
  initCharSelect();
});

document.getElementById('btn-fight').addEventListener('click', () => {
  gameState = 'fight';
  previewRenderers.forEach(pr => pr.prevRenderer.dispose());
  previewRenderers = [];
  startMatch();
});

document.getElementById('btn-rematch').addEventListener('click', () => {
  gameState = 'fight';
  showScreen('');
  startMatch();
});

document.getElementById('btn-menu').addEventListener('click', () => {
  gameState = 'title';
  stopMusic();
  fighters.forEach(f => scene.remove(f.model));
  fighters = [];
  if (stageGroup) { scene.remove(stageGroup); stageGroup = null; }
  document.getElementById('hud').style.display = 'none';
  showScreen('title-screen');
  camera.position.copy(baseCamPos);
});

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// Init
setupMobile();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
