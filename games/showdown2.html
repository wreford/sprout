<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossover Chaos 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f10;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;touch-action:none;user-select:none;width:100vw;height:100vh;height:100dvh;}
canvas{display:block;position:fixed;top:0;left:0;width:100vw!important;height:100vh!important;height:100dvh!important;}
#ui-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;pointer-events:none;z-index:10;overflow:visible;}
#ui-overlay *{pointer-events:auto;}
.home-link{position:absolute;top:10px;left:10px;color:#aaa;text-decoration:none;font-size:14px;z-index:100;pointer-events:auto;}
.home-link:hover{color:#fff;}

/* HUD */
#hud{display:none;position:fixed;top:0;left:0;width:100%;padding:8px 12px;z-index:30;}
.hud-row{display:flex;align-items:center;justify-content:center;gap:10px;}
.hp-section{flex:1;display:flex;flex-direction:column;gap:2px;}
.hp-section.right{align-items:flex-end;}
.hp-section.right .hp-bar-outer{direction:rtl;}
.char-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 8px rgba(0,0,0,0.8);}
.hp-bar-outer{width:100%;height:22px;background:#222;border:2px solid #444;border-radius:3px;overflow:hidden;position:relative;}
.hp-bar-inner{height:100%;transition:width 0.4s ease;border-radius:1px;}
.hp-bar-inner.p1{background:linear-gradient(180deg,#4f4,#2a2);}
.hp-bar-inner.p2{background:linear-gradient(180deg,#4f4,#2a2);}
.special-bar-outer{width:100%;height:6px;background:#111;border-radius:2px;overflow:hidden;}
.special-bar-inner{height:100%;background:linear-gradient(90deg,#00bfff,#0ff);transition:width 0.3s;}
.timer-display{font-size:28px;font-weight:900;min-width:60px;text-align:center;text-shadow:0 0 10px rgba(255,200,0,0.5);color:#ffd700;}
.round-display{font-size:11px;text-align:center;color:#888;margin-top:2px;}
.round-dots{display:flex;gap:6px;justify-content:center;margin-top:4px;}
.round-dot{width:10px;height:10px;border-radius:50%;background:#333;border:1px solid #555;}
.round-dot.won-p1{background:#4f4;border-color:#6f6;}
.round-dot.won-p2{background:#f44;border-color:#f66;}

/* Screens */
.screen{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;justify-content:center;align-items:center;flex-direction:column;z-index:50;overflow-y:auto;padding:20px;}
.screen.active{display:flex;}
#title-screen{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0f0f10 70%);}
.title-text{font-size:clamp(32px,6vw,72px);font-weight:900;text-transform:uppercase;letter-spacing:4px;background:linear-gradient(180deg,#ff6b35,#ff2d2d,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 0 20px rgba(255,50,50,0.5));animation:titlePulse 2s ease-in-out infinite;}
.title-sub{font-size:clamp(14px,2vw,24px);color:#888;margin-top:10px;letter-spacing:8px;text-transform:uppercase;}
@keyframes titlePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.btn{padding:14px 40px;font-size:18px;font-weight:700;border:2px solid #555;background:linear-gradient(180deg,#2a2a2a,#1a1a1a);color:#fff;cursor:pointer;border-radius:6px;margin:8px;transition:all 0.2s;text-transform:uppercase;letter-spacing:2px;}
.btn:hover{border-color:#ff6b35;background:linear-gradient(180deg,#3a2a2a,#2a1a1a);transform:scale(1.05);}
.btn:active{transform:scale(0.97);}

/* Character Select */
#select-screen{background:rgba(15,15,16,0.95);}
.select-title{font-size:28px;font-weight:900;margin-bottom:20px;color:#ff6b35;}
.select-grid{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap;justify-content:center;}
.char-card{width:min(170px,42vw);height:min(240px,40vh);border:3px solid #333;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;transition:all 0.3s;position:relative;overflow:hidden;}
.char-card:hover{border-color:#ff6b35;transform:translateY(-5px);box-shadow:0 10px 30px rgba(255,107,53,0.3);}
.char-card.selected-p1{border-color:#4f4;box-shadow:0 0 20px rgba(68,255,68,0.4);}
.char-card.selected-p2{border-color:#f44;box-shadow:0 0 20px rgba(255,68,68,0.4);}
.char-card canvas{width:140px;height:140px;}
.char-card-name{font-size:14px;font-weight:700;margin-top:6px;}
.char-card-stats{font-size:10px;color:#888;margin-top:4px;}
.select-info{font-size:14px;color:#aaa;margin-top:15px;}
.select-picks{display:flex;gap:40px;margin-top:10px;font-size:14px;}
.pick-label{padding:6px 16px;border-radius:4px;border:1px solid #333;}
.pick-label.p1{border-color:#4f4;color:#4f4;}
.pick-label.p2{border-color:#f44;color:#f44;}

/* Fight Announcements */
#announce{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(40px,8vw,80px);font-weight:900;text-transform:uppercase;z-index:60;text-shadow:0 0 30px rgba(255,100,0,0.8),0 0 60px rgba(255,0,0,0.4);letter-spacing:4px;animation:announceIn 0.3s ease-out;}
@keyframes announceIn{from{transform:translate(-50%,-50%) scale(2);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

/* Damage Numbers */
.dmg-number{position:absolute;font-size:24px;font-weight:900;color:#ff4;text-shadow:0 0 10px rgba(255,255,0,0.8);pointer-events:none;animation:dmgFloat 1s ease-out forwards;z-index:70;}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.5)}}

/* Mobile Controls — simple fixed buttons */
#mobile-controls{display:none;z-index:200;}
#m-left,#m-right,#m-jump,#m-lt,#m-hv,#m-sp{
  position:fixed;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-weight:700;color:#fff;
  -webkit-tap-highlight-color:transparent;z-index:200;
  border:2px solid rgba(255,255,255,0.4);
}
#m-left{left:15px;bottom:30px;width:60px;height:60px;font-size:22px;background:rgba(255,255,255,0.2);}
#m-right{left:85px;bottom:30px;width:60px;height:60px;font-size:22px;background:rgba(255,255,255,0.2);}
#m-jump{left:50px;bottom:100px;width:60px;height:60px;font-size:12px;background:rgba(255,200,0,0.25);}
#m-lt{right:145px;bottom:30px;width:58px;height:58px;font-size:12px;background:rgba(100,200,255,0.3);}
#m-hv{right:80px;bottom:30px;width:58px;height:58px;font-size:12px;background:rgba(255,150,50,0.3);}
#m-sp{right:15px;bottom:30px;width:58px;height:58px;font-size:12px;background:rgba(255,50,50,0.3);}
#m-left:active,#m-right:active,#m-jump:active,#m-lt:active,#m-hv:active,#m-sp:active{background:rgba(255,255,255,0.45);transform:scale(0.92);}
@supports(bottom: env(safe-area-inset-bottom)){
  #m-left,#m-right{bottom:calc(30px + env(safe-area-inset-bottom));}
  #m-jump{bottom:calc(100px + env(safe-area-inset-bottom));}
  #m-lt,#m-hv,#m-sp{bottom:calc(30px + env(safe-area-inset-bottom));}
}

/* Victory */
#victory-screen{background:rgba(0,0,0,0.85);}
.victory-text{font-size:clamp(28px,5vw,52px);font-weight:900;background:linear-gradient(180deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,200,0,0.6));}
.victory-sub{font-size:18px;color:#aaa;margin-top:10px;}
</style>
</head>

<script type="module">
import * as THREE from 'three';

// ========== AUDIO ==========
let audioCtx = null;
const MASTER_VOL = 0.02;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playSound(type) {
  try {
    ensureAudio();
    const g = audioCtx.createGain();
    g.gain.value = MASTER_VOL;
    g.connect(audioCtx.destination);
    const osc = audioCtx.createOscillator();
    const now = audioCtx.currentTime;
    switch(type) {
      case 'lightHit': {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.1);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const ns = audioCtx.createBufferSource(); ns.buffer = buf;
        const ng = audioCtx.createGain(); ng.gain.value = MASTER_VOL * 0.6;
        ns.connect(ng); ng.connect(audioCtx.destination);
        ns.start(now); break;
      }
      case 'heavyHit': {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const ns = audioCtx.createBufferSource(); ns.buffer = buf;
        const ng = audioCtx.createGain(); ng.gain.value = MASTER_VOL;
        ns.connect(ng); ng.connect(audioCtx.destination);
        ns.start(now); break;
      }
      case 'special': {
        osc.type = 'sine'; osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.4);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5); break;
      }
      case 'block': {
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.08);
        g.gain.setValueAtTime(MASTER_VOL * 0.5, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1); break;
      }
      case 'ko': {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.8);
        g.gain.setValueAtTime(MASTER_VOL, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
        osc.start(now); osc.stop(now + 1.0);
        const o2 = audioCtx.createOscillator();
        o2.type = 'sine'; o2.frequency.setValueAtTime(600, now);
        o2.frequency.exponentialRampToValueAtTime(50, now + 0.6);
        const g2 = audioCtx.createGain(); g2.gain.value = MASTER_VOL * 0.8;
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(now); o2.stop(now + 0.7); break;
      }
      case 'bell': {
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now);
        g.gain.setValueAtTime(MASTER_VOL * 0.6, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        const o2 = audioCtx.createOscillator();
        o2.type = 'sine'; o2.frequency.setValueAtTime(1800, now);
        const g2 = audioCtx.createGain(); g2.gain.value = MASTER_VOL * 0.4;
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(now); o2.stop(now + 0.4); break;
      }
      case 'crowd': {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 1.5, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          const env = Math.sin(Math.PI * i / d.length);
          d[i] = (Math.random() * 2 - 1) * env * 0.5;
        }
        const ns = audioCtx.createBufferSource(); ns.buffer = buf;
        const ng = audioCtx.createGain(); ng.gain.value = MASTER_VOL * 0.4;
        const filt = audioCtx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.5;
        ns.connect(filt); filt.connect(ng); ng.connect(audioCtx.destination);
        ns.start(now);
        osc.connect(g); osc.frequency.value = 1; osc.start(now); osc.stop(now + 0.01);
        return;
      }
      default: {
        osc.frequency.value = 200; osc.start(now); osc.stop(now + 0.05); break;
      }
    }
    osc.connect(g);
  } catch(e) {}
}

// Background music
let musicPlaying = false;
let musicNodes = [];
function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  const now = audioCtx.currentTime;
  function bassLoop() {
    if (!musicPlaying) return;
    const notes = [55, 55, 73.4, 65.4, 55, 55, 82.4, 73.4];
    const t = audioCtx.currentTime;
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(MASTER_VOL * 0.3, t + i * 0.25);
      g.gain.exponentialRampToValueAtTime(0.001, t + (i + 1) * 0.25 - 0.02);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(t + i * 0.25); osc.stop(t + (i + 1) * 0.25);
      musicNodes.push({ osc, g });
    });
    setTimeout(bassLoop, notes.length * 250);
  }
  bassLoop();
}
function stopMusic() {
  musicPlaying = false;
  musicNodes.forEach(n => { try { n.osc.stop(); } catch(e) {} });
  musicNodes = [];
}

// ========== THREE.JS SETUP ==========
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a12, 0.015);

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 22);
camera.lookAt(0, 2, 0);

const baseCamPos = new THREE.Vector3(0, 4, 22);
const camShake = { x: 0, y: 0, decay: 0.9 };

// Lighting
const ambientLight = new THREE.AmbientLight(0x303050, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(5, 12, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 10; dirLight.shadow.camera.bottom = -2;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0x4488ff, 0.8);
rimLight.position.set(-5, 8, -10);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff6633, 0.4, 30);
fillLight.position.set(0, 6, 5);
scene.add(fillLight);

// ========== HELPER ==========
function makeMat(color, opts) {
  const o = Object.assign({ color, roughness: 0.7 }, opts || {});
  return new THREE.MeshStandardMaterial(o);
}

// ========== STAGE ==========
function buildStage() {
  const stageGroup = new THREE.Group();

  const groundGeo = new THREE.BoxGeometry(30, 0.5, 12);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.8 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.position.y = -0.25;
  ground.receiveShadow = true;
  stageGroup.add(ground);

  const edgeGeo = new THREE.BoxGeometry(30, 0.08, 0.08);
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0xff4400, emissiveIntensity: 0.5 });
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.position.set(0, 0.02, 6);
  stageGroup.add(edge);
  const edge2 = edge.clone(); edge2.position.z = -6; stageGroup.add(edge2);

  const bgGroup = new THREE.Group();
  bgGroup.userData.parallax = true;
  const buildingColors = [0x1a1a2e, 0x16213e, 0x0f3460, 0x1a1a3e, 0x0e2040];
  for (let i = 0; i < 12; i++) {
    const h = 3 + Math.random() * 8;
    const w = 1.5 + Math.random() * 2;
    const bGeo = new THREE.BoxGeometry(w, h, 2);
    const bMat = new THREE.MeshStandardMaterial({ color: buildingColors[i % buildingColors.length] });
    const b = new THREE.Mesh(bGeo, bMat);
    b.position.set(-12 + i * 2.2 + Math.random(), h / 2, -8 - Math.random() * 3);
    bgGroup.add(b);
    for (let wy = 1; wy < h - 1; wy += 1.2) {
      for (let wx = -w/3; wx <= w/3; wx += w/2.5) {
        if (Math.random() > 0.4) {
          const wGeo = new THREE.BoxGeometry(0.2, 0.3, 0.05);
          const wMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffdd44, emissiveIntensity: Math.random() * 0.6 + 0.2 });
          const win = new THREE.Mesh(wGeo, wMat);
          win.position.set(b.position.x + wx, wy, b.position.z + 1.05);
          bgGroup.add(win);
        }
      }
    }
  }
  stageGroup.add(bgGroup);
  stageGroup.userData.bgGroup = bgGroup;

  for (let i = 0; i < 4; i++) {
    const trunk = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 1.5, 0.3),
      new THREE.MeshStandardMaterial({ color: 0x5c3a1e })
    );
    trunk.position.set(-10 + i * 7, 0.75, -4 - Math.random());
    stageGroup.add(trunk);
    const leaves = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.2, 1.2),
      new THREE.MeshStandardMaterial({ color: 0x2d5a1e })
    );
    leaves.position.set(trunk.position.x, 2, trunk.position.z);
    stageGroup.add(leaves);
  }

  scene.add(stageGroup);
  return stageGroup;
}

// ========== CHARACTER BUILDERS ==========

// ---- LILY'S HORSE (enhanced) ----
function buildHorse() {
  const group = new THREE.Group();
  const brown = makeMat(0x8B4513);
  const lightBrown = makeMat(0xCD853F);
  const darkBrown = makeMat(0x5C3317);
  const hoofMat = makeMat(0x2a1a0a);
  const eyeWhiteMat = makeMat(0xffffff);
  const pupilMat = makeMat(0x111111);
  const nostrilMat = makeMat(0x3a1a0a);
  const maneMat = makeMat(0x3a1a08);

  // Body - longer, more horse-like
  const body = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.2, 1.2), brown);
  body.position.y = 2.2;
  body.castShadow = true;
  group.add(body);
  group.userData.body = body;

  // Belly
  const belly = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.35, 1.05), lightBrown);
  belly.position.set(0, 1.55, 0);
  group.add(belly);

  // Neck - angled connecting piece
  const neck = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.4, 0.8), brown);
  neck.position.set(1.5, 3.0, 0);
  neck.rotation.z = 0.35;
  neck.castShadow = true;
  group.add(neck);
  group.userData.neck = neck;

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.75, 0.75), brown);
  head.position.set(2.1, 3.7, 0);
  head.castShadow = true;
  group.add(head);
  group.userData.head = head;

  // Snout / muzzle - lighter colored
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.45, 0.55), lightBrown);
  snout.position.set(2.65, 3.5, 0);
  group.add(snout);
  group.userData.snout = snout;

  // Nostrils - small dark circles
  const nostrilGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const nostrilL = new THREE.Mesh(nostrilGeo, nostrilMat);
  nostrilL.position.set(2.98, 3.48, 0.15);
  group.add(nostrilL);
  const nostrilR = nostrilL.clone();
  nostrilR.position.z = -0.15;
  group.add(nostrilR);

  // Eyes - white spheres with dark pupils
  const eyeGeo = new THREE.SphereGeometry(0.12, 10, 10);
  const eyeL = new THREE.Mesh(eyeGeo, eyeWhiteMat);
  eyeL.position.set(2.3, 3.85, 0.35);
  group.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.z = -0.35;
  group.add(eyeR);

  const pupilGeo = new THREE.SphereGeometry(0.07, 8, 8);
  const pL = new THREE.Mesh(pupilGeo, pupilMat);
  pL.position.set(2.38, 3.86, 0.43);
  group.add(pL);
  const pR = pL.clone();
  pR.position.z = -0.43;
  group.add(pR);

  // Ears - triangular shapes (two small boxes angled)
  const earGeo = new THREE.BoxGeometry(0.12, 0.35, 0.1);
  const earL = new THREE.Mesh(earGeo, brown);
  earL.position.set(1.95, 4.2, 0.22);
  earL.rotation.z = 0.25;
  earL.rotation.x = -0.15;
  group.add(earL);
  const earR = new THREE.Mesh(earGeo, brown);
  earR.position.set(1.95, 4.2, -0.22);
  earR.rotation.z = 0.25;
  earR.rotation.x = 0.15;
  group.add(earR);

  // Mane - multiple overlapping boxes along neck
  for (let i = 0; i < 10; i++) {
    const t = i / 9;
    const mane = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.35 + Math.sin(t * Math.PI) * 0.15, 0.1), maneMat);
    const mx = 1.0 + t * 1.2;
    const my = 2.5 + t * 1.3 + Math.sin(t * Math.PI) * 0.1;
    mane.position.set(mx, my, 0);
    mane.rotation.z = -0.3 + t * 0.2;
    group.add(mane);
  }
  // Forelock (mane on head)
  for (let i = 0; i < 3; i++) {
    const fl = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.25, 0.08), maneMat);
    fl.position.set(2.0 + i * 0.1, 4.05 + i * 0.05, 0);
    group.add(fl);
  }

  // Legs with knee joints (upper leg + lower leg + hoof)
  const legs = [];
  const legPositions = [
    [1.0, 2.2, 0.4],   // Front-left
    [1.0, 2.2, -0.4],  // Front-right
    [-1.0, 2.2, 0.4],  // Back-left
    [-1.0, 2.2, -0.4], // Back-right
  ];

  legPositions.forEach((pos) => {
    const legPivot = new THREE.Group();
    legPivot.position.set(pos[0], pos[1] - 0.5, pos[2]);

    // Upper leg
    const upperLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), brown);
    upperLeg.position.y = -0.4;
    upperLeg.castShadow = true;
    legPivot.add(upperLeg);

    // Knee joint pivot
    const kneePivot = new THREE.Group();
    kneePivot.position.y = -0.8;
    legPivot.add(kneePivot);

    // Lower leg
    const lowerLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.75, 0.25), brown);
    lowerLeg.position.y = -0.375;
    lowerLeg.castShadow = true;
    kneePivot.add(lowerLeg);

    // Hoof
    const hoof = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.32), hoofMat);
    hoof.position.y = -0.75;
    kneePivot.add(hoof);

    legPivot.userData.kneePivot = kneePivot;
    group.add(legPivot);
    legs.push(legPivot);
  });
  group.userData.legs = legs;

  // Tail - bushy, multiple boxes fanning out
  const tailPivot = new THREE.Group();
  tailPivot.position.set(-1.5, 2.6, 0);
  for (let i = 0; i < 8; i++) {
    const tw = 0.1 + Math.random() * 0.05;
    const th = 0.6 + Math.random() * 0.4;
    const tailStrand = new THREE.Mesh(new THREE.BoxGeometry(tw, th, tw), maneMat);
    tailStrand.position.set(
      -0.1 - Math.random() * 0.15,
      -0.3 - i * 0.08,
      (Math.random() - 0.5) * 0.3
    );
    tailStrand.rotation.z = -0.3 - Math.random() * 0.4;
    tailStrand.rotation.x = (Math.random() - 0.5) * 0.3;
    tailPivot.add(tailStrand);
  }
  group.add(tailPivot);
  group.userData.tail = tailPivot;

  group.userData.charId = 'horse';
  return group;
}

// ---- PENNYWISE (enhanced) ----
function buildPennywise() {
  const group = new THREE.Group();
  const white = makeMat(0xf0f0f0, { roughness: 0.5 });
  const red = makeMat(0xcc0000, { roughness: 0.5 });
  const darkRed = makeMat(0x880000, { roughness: 0.5 });
  const skin = makeMat(0xf5deb3, { roughness: 0.6 });
  const yellowEye = makeMat(0xffdd00, { emissive: 0xffaa00, emissiveIntensity: 0.6 });
  const pupilMat = makeMat(0x111100);
  const orange = makeMat(0xff6600, { roughness: 0.6 });
  const redLine = makeMat(0xcc0000, { emissive: 0x660000, emissiveIntensity: 0.3 });
  const noseRed = makeMat(0xff0000, { emissive: 0xff2200, emissiveIntensity: 0.6, roughness: 0.2 });

  // Body (taller)
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.1, 2.2, 0.85), white);
  body.position.y = 2.1;
  body.castShadow = true;
  group.add(body);
  group.userData.body = body;

  // Ruffled collar - multiple thin white boxes in a circle around neck
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const ruffle = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.12), white);
    ruffle.position.set(
      Math.cos(angle) * 0.6,
      3.25,
      Math.sin(angle) * 0.5
    );
    ruffle.rotation.y = angle;
    ruffle.rotation.z = Math.sin(angle) * 0.2;
    group.add(ruffle);
  }
  // Second row of ruffles (layered)
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2 + 0.3;
    const ruffle = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.1, 0.1), white);
    ruffle.position.set(
      Math.cos(angle) * 0.55,
      3.15,
      Math.sin(angle) * 0.45
    );
    ruffle.rotation.y = angle;
    group.add(ruffle);
  }

  // Pom-pom buttons - 3 red spheres down the front
  for (let i = 0; i < 3; i++) {
    const btn = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 10), red);
    btn.position.set(0, 2.7 - i * 0.5, 0.45);
    group.add(btn);
  }

  // Head (larger forehead / taller)
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.0, 0.8), skin);
  head.position.y = 3.9;
  head.castShadow = true;
  group.add(head);
  group.userData.head = head;

  // Forehead - bigger cranium
  const forehead = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.5, 0.82), skin);
  forehead.position.y = 4.4;
  group.add(forehead);

  // Red nose (bigger, shinier, emissive)
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.2, 14, 14), noseRed);
  nose.position.set(0, 3.85, 0.45);
  group.add(nose);
  group.userData.nose = nose;

  // Eyes - yellow with slit pupils
  const eyeGeo = new THREE.SphereGeometry(0.15, 10, 10);
  const eyeL = new THREE.Mesh(eyeGeo, yellowEye);
  eyeL.position.set(-0.22, 4.05, 0.38);
  group.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.x = 0.22;
  group.add(eyeR);

  // Slit pupils (thin vertical boxes)
  const slitGeo = new THREE.BoxGeometry(0.03, 0.14, 0.03);
  const slitL = new THREE.Mesh(slitGeo, pupilMat);
  slitL.position.set(-0.22, 4.05, 0.52);
  group.add(slitL);
  const slitR = slitL.clone();
  slitR.position.x = 0.22;
  group.add(slitR);

  // Red lines on face (thin red boxes)
  // From eyes down cheeks
  const faceLineGeo = new THREE.BoxGeometry(0.04, 0.5, 0.04);
  const lineL = new THREE.Mesh(faceLineGeo, redLine);
  lineL.position.set(-0.28, 3.65, 0.4);
  lineL.rotation.z = 0.1;
  group.add(lineL);
  const lineR = new THREE.Mesh(faceLineGeo, redLine);
  lineR.position.set(0.28, 3.65, 0.4);
  lineR.rotation.z = -0.1;
  group.add(lineR);
  // Forehead lines
  const fhLine = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.04, 0.04), redLine);
  fhLine.position.set(0, 4.3, 0.42);
  group.add(fhLine);

  // Creepy smile (wide red line)
  const smile = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.07, 0.05), red);
  smile.position.set(0, 3.6, 0.42);
  group.add(smile);
  // Smile corners
  const smCornerL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.04), red);
  smCornerL.position.set(-0.32, 3.64, 0.42);
  smCornerL.rotation.z = 0.4;
  group.add(smCornerL);
  const smCornerR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.04), red);
  smCornerR.position.set(0.32, 3.64, 0.42);
  smCornerR.rotation.z = -0.4;
  group.add(smCornerR);

  // Wild orange hair - many small boxes in all directions
  for (let i = 0; i < 18; i++) {
    const angle = (i / 18) * Math.PI * 2;
    const hLen = 0.3 + Math.random() * 0.45;
    const hair = new THREE.Mesh(new THREE.BoxGeometry(0.13, hLen, 0.13), orange);
    const r = 0.5 + Math.random() * 0.1;
    hair.position.set(
      Math.cos(angle) * r,
      4.5 + Math.random() * 0.25,
      Math.sin(angle) * r * 0.85
    );
    hair.rotation.set(
      Math.sin(angle) * (0.4 + Math.random() * 0.4),
      0,
      Math.cos(angle) * (0.4 + Math.random() * 0.4)
    );
    group.add(hair);
  }
  // Extra tufts sticking way out
  for (let i = 0; i < 6; i++) {
    const angle = (i / 6) * Math.PI * 2 + 0.5;
    const hair = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.5, 0.1), orange);
    hair.position.set(
      Math.cos(angle) * 0.65,
      4.6,
      Math.sin(angle) * 0.55
    );
    hair.rotation.set(
      Math.sin(angle) * 0.7,
      0,
      Math.cos(angle) * 0.7
    );
    group.add(hair);
  }

  // Arms (long and creepy) with distinct fingers/claws
  const armGeo = new THREE.BoxGeometry(0.25, 1.6, 0.25);
  const armPivotL = new THREE.Group();
  armPivotL.position.set(-0.7, 3.1, 0);
  const armL = new THREE.Mesh(armGeo, white);
  armL.position.y = -0.8;
  armL.castShadow = true;
  armPivotL.add(armL);
  // Hand
  const handL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.2), skin);
  handL.position.y = -1.6;
  armPivotL.add(handL);
  // Fingers/claws (5 thin elongated boxes)
  for (let c = 0; c < 5; c++) {
    const claw = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.25, 0.04), skin);
    claw.position.set(-0.08 + c * 0.04, -1.8, 0);
    claw.rotation.z = (c - 2) * 0.08;
    armPivotL.add(claw);
  }
  group.add(armPivotL);

  const armPivotR = new THREE.Group();
  armPivotR.position.set(0.7, 3.1, 0);
  const armR = new THREE.Mesh(armGeo, white);
  armR.position.y = -0.8;
  armR.castShadow = true;
  armPivotR.add(armR);
  const handR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.2), skin);
  handR.position.y = -1.6;
  armPivotR.add(handR);
  for (let c = 0; c < 5; c++) {
    const claw = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.25, 0.04), skin);
    claw.position.set(-0.08 + c * 0.04, -1.8, 0);
    claw.rotation.z = (c - 2) * 0.08;
    armPivotR.add(claw);
  }
  group.add(armPivotR);

  group.userData.armL = armPivotL;
  group.userData.armR = armPivotR;

  // Legs
  const legGeo = new THREE.BoxGeometry(0.35, 1.2, 0.35);
  const legPivotL = new THREE.Group();
  legPivotL.position.set(-0.28, 1.0, 0);
  const legL = new THREE.Mesh(legGeo, white);
  legL.position.y = -0.6;
  legL.castShadow = true;
  legPivotL.add(legL);
  // Big floppy shoe
  const shoeL = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.22, 0.7), red);
  shoeL.position.set(0, -1.2, 0.12);
  legPivotL.add(shoeL);
  group.add(legPivotL);

  const legPivotR = new THREE.Group();
  legPivotR.position.set(0.28, 1.0, 0);
  const legR = new THREE.Mesh(legGeo, white);
  legR.position.y = -0.6;
  legR.castShadow = true;
  legPivotR.add(legR);
  const shoeR = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.22, 0.7), red);
  shoeR.position.set(0, -1.2, 0.12);
  legPivotR.add(shoeR);
  group.add(legPivotR);

  group.userData.legL = legPivotL;
  group.userData.legR = legPivotR;

  group.userData.charId = 'pennywise';
  return group;
}

// ========== PARTICLES ==========
const particles = [];
function spawnParticles(pos, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mat = new THREE.MeshBasicMaterial({ color });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.3,
      Math.random() * 0.2 + 0.1,
      (Math.random() - 0.5) * 0.2
    );
    p.userData.life = 1;
    scene.add(p);
    particles.push(p);
  }
}

// Trail particles for special attacks
function spawnTrailParticle(pos, color) {
  const geo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true });
  const p = new THREE.Mesh(geo, mat);
  p.position.copy(pos);
  p.position.x += (Math.random() - 0.5) * 0.5;
  p.position.y += (Math.random() - 0.5) * 0.5;
  p.position.z += (Math.random() - 0.5) * 0.3;
  p.userData.vel = new THREE.Vector3(0, 0.05, 0);
  p.userData.life = 0.5;
  scene.add(p);
  particles.push(p);
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= dt * 2;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      particles.splice(i, 1);
      continue;
    }
    p.position.add(p.userData.vel);
    p.userData.vel.y -= 0.01;
    p.material.opacity = p.userData.life;
    p.material.transparent = true;
    p.scale.setScalar(p.userData.life);
  }
}

// ========== PROJECTILES ==========
const projectiles = [];

function spawnProjectile(ownerFighter, meshOrFn, speed, damage, maxDist) {
  const mesh = typeof meshOrFn === 'function' ? meshOrFn() : meshOrFn;
  mesh.position.set(ownerFighter.x + ownerFighter.facing * 0.8, 2.0, 0);
  scene.add(mesh);
  projectiles.push({
    mesh,
    owner: ownerFighter,
    vx: ownerFighter.facing * speed,
    damage,
    startX: ownerFighter.x,
    maxDist,
    alive: true,
  });
}

function updateProjectiles(dt, fightersList) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (!p.alive) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      projectiles.splice(i, 1);
      continue;
    }
    p.mesh.position.x += p.vx * dt;
    p.mesh.rotation.y += dt * 5;
    p.mesh.rotation.x += dt * 3;

    // Check distance
    if (Math.abs(p.mesh.position.x - p.startX) > p.maxDist) {
      p.alive = false;
      continue;
    }
    // Check stage bounds
    if (p.mesh.position.x < STAGE_LEFT - 2 || p.mesh.position.x > STAGE_RIGHT + 2) {
      p.alive = false;
      continue;
    }

    // Check hit against opponents
    for (const f of fightersList) {
      if (f === p.owner) continue;
      if (f.state === 'ko') continue;
      const dist = Math.abs(p.mesh.position.x - f.x);
      if (dist < 1.0) {
        p.alive = false;
        let dmg = p.damage;
        if (f.state === 'block') {
          dmg = Math.floor(dmg * 0.25);
          playSound('block');
          spawnParticles(new THREE.Vector3(f.x, 2, 0), 0x8888ff, 5);
        } else {
          f.state = 'hit';
          f.stateTimer = 0;
          f.hitStun = 0.3;
          playSound('heavyHit');
          spawnParticles(new THREE.Vector3(f.x, 2.5, 0), 0xff4444, 12);
          f.flashTimer = 0.3;
          const kb = 2;
          f.x += kb * p.owner.facing;
          f.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, f.x));
          camShake.x += (Math.random() - 0.5) * 0.2;
          camShake.y += (Math.random() - 0.5) * 0.15;
        }
        f.hp -= dmg;
        f.hp = Math.max(0, f.hp);
        const pos3 = new THREE.Vector3(f.x, 3.5, 0);
        pos3.project(camera);
        const sx = (pos3.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-pos3.y * 0.5 + 0.5) * window.innerHeight;
        showDamage(dmg, sx, sy);
        if (f.hp <= 0) {
          handleKO(p.owner, f);
        }
        break;
      }
    }
  }
}
