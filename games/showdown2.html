// ========== AI ==========
const ai = { actionTimer: 0, moveDir: 0, wantsAttack: '', wantsBlock: false, difficulty: 0.5 };

function updateAI(fighter, opponent, dt) {
  ai.actionTimer -= dt;
  if (ai.actionTimer <= 0) {
    const dist = Math.abs(fighter.x - opponent.x);
    const facingOpponent = (opponent.x > fighter.x && fighter.facing > 0) || (opponent.x < fighter.x && fighter.facing < 0);

    ai.actionTimer = 0.15 + Math.random() * (0.5 - ai.difficulty * 0.3);
    ai.moveDir = 0;
    ai.wantsAttack = '';
    ai.wantsBlock = false;

    if (dist > 3.5) {
      ai.moveDir = opponent.x > fighter.x ? 1 : -1;
    } else if (dist < 1.5) {
      ai.moveDir = opponent.x > fighter.x ? -1 : 1;
      if (Math.random() < 0.3 * ai.difficulty) {
        ai.wantsAttack = 'light';
      }
    }

    if (dist < fighter.def.heavyRange + 0.5 && facingOpponent) {
      const r = Math.random();
      if (r < 0.25 * ai.difficulty) {
        ai.wantsAttack = 'heavy';
      } else if (r < 0.5 * ai.difficulty) {
        ai.wantsAttack = 'light';
      } else if (r < 0.15 * ai.difficulty && fighter.specialCooldown <= 0) {
        ai.wantsAttack = 'special';
      }
    }

    if (fighter.specialCooldown <= 0 && dist < fighter.def.specialRange && Math.random() < 0.1 * ai.difficulty) {
      ai.wantsAttack = 'special';
    }

    if (opponent.state === 'lightAtk' || opponent.state === 'heavyAtk' || opponent.state === 'specialAtk') {
      if (Math.random() < 0.35 * ai.difficulty && dist < 3) {
        ai.wantsBlock = true;
        ai.wantsAttack = '';
        ai.moveDir = 0;
      }
    }
  }

  return {
    left: ai.moveDir < 0,
    right: ai.moveDir > 0,
    up: ai.wantsBlock && fighter.state !== 'jump',
    light: ai.wantsAttack === 'light',
    heavy: ai.wantsAttack === 'heavy',
    special: ai.wantsAttack === 'special',
  };
}

// ========== ANIMATIONS ==========

function animateHorse(fighter, dt) {
  const m = fighter.model;
  const legs = m.userData.legs;
  const tail = m.userData.tail;
  const head = m.userData.head;
  const snout = m.userData.snout;
  const neck = m.userData.neck;
  const body = m.userData.body;
  const t = fighter.idleTimer;

  // Reset
  legs.forEach(l => { l.rotation.x = 0; l.rotation.z = 0; if(l.userData.kneePivot) l.userData.kneePivot.rotation.x = 0; });
  if (head) { head.position.y = 3.7; head.rotation.z = 0; }
  if (snout) { snout.position.y = 3.5; snout.rotation.z = 0; }
  if (neck) { neck.rotation.z = 0.35; }
  if (body) { body.scale.y = 1; body.position.y = 2.2; body.rotation.z = 0; }

  switch (fighter.state) {
    case 'idle':
      body.scale.y = 1 + Math.sin(t * 2) * 0.02;
      body.position.y = 2.2 + Math.sin(t * 2) * 0.02;
      tail.rotation.z = Math.sin(t * 3) * 0.3;
      tail.rotation.x = Math.sin(t * 1.5) * 0.1;
      head.position.y = 3.7 + Math.sin(t * 1.8) * 0.03;
      snout.position.y = 3.5 + Math.sin(t * 1.8) * 0.03;
      // Subtle ear twitch
      break;

    case 'walk': {
      const wc = fighter.walkCycle;
      legs[0].rotation.x = Math.sin(wc) * 0.5;
      legs[1].rotation.x = Math.sin(wc + Math.PI) * 0.5;
      legs[2].rotation.x = Math.sin(wc + Math.PI) * 0.5;
      legs[3].rotation.x = Math.sin(wc) * 0.5;
      // Knee bend
      legs.forEach(l => {
        if (l.userData.kneePivot) {
          l.userData.kneePivot.rotation.x = Math.max(0, -l.rotation.x * 0.4);
        }
      });
      body.position.y = 2.2 + Math.abs(Math.sin(wc)) * 0.05;
      tail.rotation.z = Math.sin(wc * 0.5) * 0.4;
      break;
    }

    case 'jump':
      legs[0].rotation.x = -0.5;
      legs[1].rotation.x = -0.5;
      legs[2].rotation.x = 0.4;
      legs[3].rotation.x = 0.4;
      legs.forEach(l => { if(l.userData.kneePivot) l.userData.kneePivot.rotation.x = 0.3; });
      head.position.y = 3.8;
      snout.position.y = 3.6;
      break;

    case 'lightAtk': {
      const prog = fighter.stateTimer / fighter.def.lightDur;
      const kick = Math.sin(prog * Math.PI);
      // Front legs kick out far
      legs[0].rotation.x = -kick * 1.6;
      legs[1].rotation.x = -kick * 1.6;
      if(legs[0].userData.kneePivot) legs[0].userData.kneePivot.rotation.x = kick * 0.5;
      if(legs[1].userData.kneePivot) legs[1].userData.kneePivot.rotation.x = kick * 0.5;
      head.rotation.z = kick * 0.15;
      body.position.y = 2.25;
      // Trail particles
      if (prog > 0.3 && prog < 0.7) {
        spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 1.5, 1.5, 0), 0xCD853F);
      }
      break;
    }

    case 'heavyAtk': {
      const prog = fighter.stateTimer / fighter.def.heavyDur;
      if (prog < 0.35) {
        // Wind-up: lean back
        const wp = prog / 0.35;
        body.rotation.z = -wp * 0.25 * fighter.facing;
        head.position.y = 3.7 - wp * 0.3;
        snout.position.y = 3.5 - wp * 0.3;
        legs[0].rotation.x = wp * 0.3;
        legs[1].rotation.x = wp * 0.3;
      } else {
        // Buck kick - rear legs extend far back
        const kp = (prog - 0.35) / 0.65;
        const kick = Math.sin(kp * Math.PI);
        legs[2].rotation.x = kick * 1.8;
        legs[3].rotation.x = kick * 1.8;
        if(legs[2].userData.kneePivot) legs[2].userData.kneePivot.rotation.x = -kick * 0.6;
        if(legs[3].userData.kneePivot) legs[3].userData.kneePivot.rotation.x = -kick * 0.6;
        body.rotation.z = 0.2 * fighter.facing * kick;
        head.position.y = 3.9;
        snout.position.y = 3.7;
      }
      break;
    }

    case 'specialAtk': {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      const gc = fighter.stateTimer * 22;
      legs[0].rotation.x = Math.sin(gc) * 0.9;
      legs[1].rotation.x = Math.sin(gc + Math.PI) * 0.9;
      legs[2].rotation.x = Math.sin(gc + Math.PI) * 0.9;
      legs[3].rotation.x = Math.sin(gc) * 0.9;
      legs.forEach(l => {
        if(l.userData.kneePivot) l.userData.kneePivot.rotation.x = Math.max(0, -l.rotation.x * 0.5);
      });
      body.position.y = 2.2 + Math.abs(Math.sin(gc)) * 0.2;
      head.position.y = 3.5;
      snout.position.y = 3.3;
      neck.rotation.z = 0.15;
      tail.rotation.z = -1.0;
      // Trail particles during gallop
      spawnTrailParticle(new THREE.Vector3(fighter.x - fighter.facing * 1.0, 0.3, 0), 0xffaa44);
      spawnTrailParticle(new THREE.Vector3(fighter.x - fighter.facing * 0.5, 0.2, (Math.random()-0.5)*0.5), 0xdddddd);
      break;
    }

    case 'block':
      legs[0].rotation.x = -0.9;
      legs[1].rotation.x = -0.9;
      if(legs[0].userData.kneePivot) legs[0].userData.kneePivot.rotation.x = 0.4;
      if(legs[1].userData.kneePivot) legs[1].userData.kneePivot.rotation.x = 0.4;
      body.rotation.z = -0.25 * fighter.facing;
      body.position.y = 2.3;
      head.position.y = 4.0;
      snout.position.y = 3.8;
      break;

    case 'hit':
      body.position.y = 2.2 + Math.sin(t * 30) * 0.08;
      head.rotation.z = -0.25 * fighter.facing;
      body.rotation.z = 0.1 * fighter.facing;
      break;

    case 'ko': {
      const koProg = Math.min(fighter.koFall, 1);
      m.rotation.z = koProg * (Math.PI / 2) * fighter.facing;
      m.position.y = -koProg * 0.5;
      legs.forEach(l => { l.rotation.x = 0.3; });
      break;
    }
  }

  if (fighter.state !== 'heavyAtk' && fighter.state !== 'block' && fighter.state !== 'ko') {
    body.rotation.z = body.rotation.z || 0;
  }
}

function animatePennywise(fighter, dt) {
  const m = fighter.model;
  const armL = m.userData.armL;
  const armR = m.userData.armR;
  const legL = m.userData.legL;
  const legR = m.userData.legR;
  const body = m.userData.body;
  const head = m.userData.head;
  const nose = m.userData.nose;
  const t = fighter.idleTimer;

  // Reset
  armL.rotation.x = 0; armL.rotation.z = 0;
  armR.rotation.x = 0; armR.rotation.z = 0;
  legL.rotation.x = 0; legR.rotation.x = 0;
  if (body) { body.scale.set(1,1,1); body.position.y = 2.1; body.rotation.z = 0; }
  if (head) { head.rotation.set(0,0,0); head.position.y = 3.9; }
  m.position.y = fighter.y;

  // Handle opacity for phasing
  m.traverse(child => {
    if (child.isMesh && child.material) {
      child.material.transparent = fighter.opacity < 1;
      child.material.opacity = fighter.opacity;
    }
  });

  switch (fighter.state) {
    case 'idle':
      body.scale.y = 1 + Math.sin(t * 2.5) * 0.015;
      body.position.y = 2.1 + Math.sin(t * 2.5) * 0.015;
      armL.rotation.z = 0.1 + Math.sin(t * 1.5) * 0.05;
      armR.rotation.z = -0.1 - Math.sin(t * 1.5) * 0.05;
      armL.rotation.x = Math.sin(t * 1.2) * 0.08;
      armR.rotation.x = -Math.sin(t * 1.2) * 0.08;
      head.rotation.y = Math.sin(t * 0.8) * 0.1;
      break;

    case 'walk': {
      const wc = fighter.walkCycle;
      legL.rotation.x = Math.sin(wc) * 0.5;
      legR.rotation.x = Math.sin(wc + Math.PI) * 0.5;
      armL.rotation.x = Math.sin(wc + Math.PI) * 0.3;
      armR.rotation.x = Math.sin(wc) * 0.3;
      body.position.y = 2.1 + Math.abs(Math.sin(wc)) * 0.03;
      break;
    }

    case 'jump':
      armL.rotation.z = 0.8;
      armR.rotation.z = -0.8;
      armL.rotation.x = -0.3;
      armR.rotation.x = -0.3;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.3;
      break;

    case 'lightAtk': {
      const prog = fighter.stateTimer / fighter.def.lightDur;
      const swipe = Math.sin(prog * Math.PI);
      // Snappier claw swipe - both arms
      armR.rotation.x = -swipe * 1.8;
      armR.rotation.z = -swipe * 0.6;
      armL.rotation.x = -swipe * 0.8;
      body.rotation.z = swipe * 0.12 * fighter.facing;
      head.rotation.z = swipe * 0.08 * fighter.facing;
      // Trail
      if (prog > 0.3 && prog < 0.7) {
        spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 1.2, 3.0, 0), 0xff4444);
      }
      break;
    }

    case 'heavyAtk': {
      const prog = fighter.stateTimer / fighter.def.heavyDur;
      if (prog < 0.35) {
        // Wind-up - lean back, arms raise high
        const wp = prog / 0.35;
        armL.rotation.x = -wp * 2.8;
        armR.rotation.x = -wp * 2.8;
        armL.rotation.z = wp * 0.35;
        armR.rotation.z = -wp * 0.35;
        body.rotation.z = -wp * 0.1 * fighter.facing;
      } else {
        // Slam down
        const sp = (prog - 0.35) / 0.65;
        const slam = Math.sin(sp * Math.PI);
        armL.rotation.x = -2.8 + sp * 4.0;
        armR.rotation.x = -2.8 + sp * 4.0;
        body.rotation.z = slam * 0.2 * fighter.facing;
      }
      // Spawn/animate balloon
      if (!fighter.specialData && prog < 0.5) {
        const balloon = new THREE.Mesh(
          new THREE.SphereGeometry(0.4, 12, 12),
          new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 })
        );
        m.add(balloon);
        fighter.specialData = balloon;
      }
      if (fighter.specialData) {
        if (prog < 0.35) {
          fighter.specialData.position.set(0, 5.0, 0.5);
        } else {
          fighter.specialData.position.set(0, 5.0 - (prog - 0.35) / 0.65 * 3.5, 0.5);
        }
        if (prog > 0.9) {
          m.remove(fighter.specialData);
          fighter.specialData = null;
        }
      }
      break;
    }

    case 'specialAtk': {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      if (prog < 0.4) {
        const reach = prog / 0.4;
        armR.rotation.x = -reach * 1.2;
        armR.scale.y = 1 + reach * 2;
      } else if (prog < 0.7) {
        armR.rotation.x = -1.2;
        armR.scale.y = 3;
        const pull = (prog - 0.4) / 0.3;
        armR.scale.y = 3 - pull * 2;
      } else {
        const bite = (prog - 0.7) / 0.3;
        head.rotation.x = Math.sin(bite * Math.PI * 2) * 0.3;
        armR.scale.y = 1;
      }
      // Trail particles
      spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 2, 2.5, 0), 0xff0000);
      break;
    }

    case 'block':
      fighter.opacity = 0.35;
      body.scale.set(1.05, 1.05, 1.05);
      break;

    case 'hit':
      body.position.y = 2.1 + Math.sin(t * 30) * 0.08;
      head.rotation.z = -0.25 * fighter.facing;
      armL.rotation.z = 0.4;
      armR.rotation.z = -0.4;
      body.rotation.z = 0.1 * fighter.facing;
      break;

    case 'ko': {
      const koProg = Math.min(fighter.koFall, 1);
      m.rotation.z = koProg * (Math.PI / 2) * fighter.facing;
      m.position.y = fighter.y - koProg * 0.8;
      armL.rotation.z = 0.5;
      armR.rotation.z = -0.5;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.2;
      break;
    }
  }

  if (fighter.state !== 'block') {
    fighter.opacity = Math.min(fighter.opacity + dt * 3, 1);
  }
}

function animateChippy(fighter, dt) {
  const m = fighter.model;
  const armL = m.userData.armL;
  const armR = m.userData.armR;
  const legL = m.userData.legL;
  const legR = m.userData.legR;
  const body = m.userData.body;
  const head = m.userData.head;
  const tail = m.userData.tail;
  const t = fighter.idleTimer;

  // Reset
  armL.rotation.x = 0; armL.rotation.z = 0;
  armR.rotation.x = 0; armR.rotation.z = 0;
  legL.rotation.x = 0; legR.rotation.x = 0;
  if (body) { body.scale.set(1,1,1); body.position.y = 1.2; body.rotation.z = 0; }
  if (head) { head.rotation.set(0,0,0); head.position.y = 2.0; }
  m.position.y = fighter.y;

  switch (fighter.state) {
    case 'idle':
      body.scale.y = 1 + Math.sin(t * 3) * 0.03;
      body.position.y = 1.2 + Math.sin(t * 3) * 0.03;
      // Twitchy movements - chipmunks are jittery
      head.rotation.y = Math.sin(t * 4) * 0.15;
      head.rotation.z = Math.sin(t * 5.5) * 0.05;
      armL.rotation.z = 0.2 + Math.sin(t * 3) * 0.1;
      armR.rotation.z = -0.2 - Math.sin(t * 3) * 0.1;
      // Tail sway
      tail.rotation.x = Math.sin(t * 2) * 0.15;
      tail.rotation.z = Math.sin(t * 2.5) * 0.1;
      break;

    case 'walk': {
      const wc = fighter.walkCycle;
      legL.rotation.x = Math.sin(wc) * 0.7;
      legR.rotation.x = Math.sin(wc + Math.PI) * 0.7;
      armL.rotation.x = Math.sin(wc + Math.PI) * 0.5;
      armR.rotation.x = Math.sin(wc) * 0.5;
      body.position.y = 1.2 + Math.abs(Math.sin(wc * 2)) * 0.08;
      tail.rotation.x = Math.sin(wc) * 0.3;
      break;
    }

    case 'jump':
      armL.rotation.z = 0.6;
      armR.rotation.z = -0.6;
      armL.rotation.x = -0.3;
      armR.rotation.x = -0.3;
      legL.rotation.x = 0.4;
      legR.rotation.x = -0.4;
      tail.rotation.x = -0.5;
      break;

    case 'lightAtk': {
      const prog = fighter.stateTimer / fighter.def.lightDur;
      // Quick double claw swipe
      const phase = prog * 2; // two swipes
      const swipe1 = phase < 1 ? Math.sin(phase * Math.PI) : 0;
      const swipe2 = phase >= 1 ? Math.sin((phase - 1) * Math.PI) : 0;
      armR.rotation.x = -swipe1 * 2.0;
      armR.rotation.z = -swipe1 * 0.5;
      armL.rotation.x = -swipe2 * 2.0;
      armL.rotation.z = swipe2 * 0.5;
      body.rotation.z = (swipe1 - swipe2) * 0.1 * fighter.facing;
      // Trail
      if (prog > 0.2 && prog < 0.8) {
        spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 0.8, 1.8, 0), 0xA0522D);
      }
      break;
    }

    case 'heavyAtk': {
      const prog = fighter.stateTimer / fighter.def.heavyDur;
      // Acorn throw - wind up then throw
      if (prog < 0.4) {
        const wp = prog / 0.4;
        armR.rotation.x = -wp * 2.5;
        body.rotation.z = -wp * 0.2 * fighter.facing;
      } else {
        const tp = (prog - 0.4) / 0.6;
        const throwM = Math.sin(tp * Math.PI);
        armR.rotation.x = -2.5 + tp * 4.0;
        body.rotation.z = throwM * 0.15 * fighter.facing;
      }
      // Spawn acorn projectile at the right moment
      if (!fighter.attackHit && fighter.stateTimer >= fighter.def.heavyHitTime && !fighter.specialData) {
        fighter.specialData = true; // flag to prevent multiple spawns
        const acornMat = makeMat(0x8B4513);
        const acornMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), acornMat);
        // Acorn cap
        const capMesh = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.08, 0.18), makeMat(0x5C3317));
        capMesh.position.y = 0.12;
        acornMesh.add(capMesh);
        spawnProjectile(fighter, acornMesh, 14, fighter.def.heavyDmg, fighter.def.heavyRange);
        fighter.attackHit = true; // Mark as "hit processed" so main loop doesn't do melee
      }
      break;
    }

    case 'specialAtk': {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      // Tornado spin
      const spin = fighter.stateTimer * 25;
      m.rotation.y += dt * 30; // fast spin
      body.scale.set(1 + Math.sin(spin) * 0.1, 0.9, 1 + Math.cos(spin) * 0.1);
      armL.rotation.z = 1.2;
      armR.rotation.z = -1.2;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.3;
      tail.rotation.x = -0.8;
      // Trail particles
      spawnTrailParticle(new THREE.Vector3(fighter.x, 1.5, 0), 0xA0522D);
      spawnTrailParticle(new THREE.Vector3(fighter.x, 1.0, 0), 0xfff5e6);
      break;
    }

    case 'block':
      // Curl into a ball
      body.scale.set(0.8, 0.7, 0.8);
      body.position.y = 0.9;
      head.position.y = 1.3;
      armL.rotation.z = 0.8;
      armR.rotation.z = -0.8;
      armL.rotation.x = 0.5;
      armR.rotation.x = 0.5;
      legL.rotation.x = 0.6;
      legR.rotation.x = 0.6;
      tail.rotation.x = 1.0;
      break;

    case 'hit':
      body.position.y = 1.2 + Math.sin(t * 35) * 0.08;
      head.rotation.z = -0.3 * fighter.facing;
      body.rotation.z = 0.12 * fighter.facing;
      armL.rotation.z = 0.3;
      armR.rotation.z = -0.3;
      break;

    case 'ko': {
      const koProg = Math.min(fighter.koFall, 1);
      m.rotation.z = koProg * (Math.PI / 2) * fighter.facing;
      m.position.y = fighter.y - koProg * 0.4;
      armL.rotation.z = 0.5;
      armR.rotation.z = -0.5;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.2;
      break;
    }
  }
}

function animateClark(fighter, dt) {
  const m = fighter.model;
  const armL = m.userData.armL;
  const armR = m.userData.armR;
  const legL = m.userData.legL;
  const legR = m.userData.legR;
  const body = m.userData.body;
  const head = m.userData.head;
  const cape = m.userData.cape;
  const capeSegments = m.userData.capeSegments;
  const t = fighter.idleTimer;

  // Reset
  armL.rotation.x = 0; armL.rotation.z = 0;
  armR.rotation.x = 0; armR.rotation.z = 0;
  legL.rotation.x = 0; legR.rotation.x = 0;
  if (body) { body.scale.set(1,1,1); body.position.y = 2.4; body.rotation.z = 0; }
  if (head) { head.rotation.set(0,0,0); head.position.y = 3.85; }
  m.position.y = fighter.y;

  // Cape physics - gentle sine wave sway
  if (capeSegments) {
    for (let i = 0; i < capeSegments.length; i++) {
      const seg = capeSegments[i];
      const wave = Math.sin(t * 2 + i * 0.8) * 0.05 * (i + 1);
      seg.rotation.x = wave;
      seg.position.z = -i * 0.05 + Math.sin(t * 1.5 + i * 0.5) * 0.02 * (i + 1);
    }
  }

  // Stronger cape motion during movement/attacks
  const capeIntensity = (fighter.state === 'walk' || fighter.state === 'specialAtk') ? 3.0 : 1.0;

  switch (fighter.state) {
    case 'idle':
      body.scale.y = 1 + Math.sin(t * 2) * 0.01;
      body.position.y = 2.4 + Math.sin(t * 2) * 0.01;
      armL.rotation.z = 0.05 + Math.sin(t * 1.2) * 0.03;
      armR.rotation.z = -0.05 - Math.sin(t * 1.2) * 0.03;
      // Subtle confident head tilt
      head.rotation.y = Math.sin(t * 0.5) * 0.05;
      break;

    case 'walk': {
      const wc = fighter.walkCycle;
      legL.rotation.x = Math.sin(wc) * 0.5;
      legR.rotation.x = Math.sin(wc + Math.PI) * 0.5;
      armL.rotation.x = Math.sin(wc + Math.PI) * 0.3;
      armR.rotation.x = Math.sin(wc) * 0.3;
      body.position.y = 2.4 + Math.abs(Math.sin(wc)) * 0.03;
      // Cape billows while walking
      if (capeSegments) {
        for (let i = 0; i < capeSegments.length; i++) {
          capeSegments[i].rotation.x += Math.sin(wc + i * 0.5) * 0.1 * (i + 1) * 0.3;
        }
      }
      break;
    }

    case 'jump':
      armL.rotation.x = -0.5;
      armR.rotation.x = -0.5;
      armL.rotation.z = 0.3;
      armR.rotation.z = -0.3;
      legL.rotation.x = 0.2;
      legR.rotation.x = -0.2;
      // Cape spreads in air
      if (capeSegments) {
        for (let i = 0; i < capeSegments.length; i++) {
          capeSegments[i].rotation.x = 0.15 * (i + 1);
        }
      }
      break;

    case 'lightAtk': {
      const prog = fighter.stateTimer / fighter.def.lightDur;
      // Super punch - powerful straight punch
      if (prog < 0.3) {
        // Pull back
        const wp = prog / 0.3;
        armR.rotation.x = wp * 0.5;
        body.rotation.z = -wp * 0.08 * fighter.facing;
      } else {
        // Punch forward
        const pp = (prog - 0.3) / 0.7;
        const punch = Math.sin(pp * Math.PI);
        armR.rotation.x = 0.5 - pp * 2.5;
        armR.rotation.z = -punch * 0.3;
        body.rotation.z = punch * 0.12 * fighter.facing;
        body.position.y = 2.4 + punch * 0.05;
      }
      if (prog > 0.3 && prog < 0.7) {
        spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 1.5, 2.8, 0), 0x4488ff);
      }
      break;
    }

    case 'heavyAtk': {
      const prog = fighter.stateTimer / fighter.def.heavyDur;
      // Heat vision - eyes glow, beams shoot forward
      head.rotation.x = -0.1; // Look slightly forward/down
      // Create heat vision beams
      if (!fighter.specialData && prog > 0.2 && prog < 0.8) {
        const beamMat = makeMat(0xff0000, { emissive: 0xff0000, emissiveIntensity: 1.0, transparent: true, opacity: 0.8 });
        const beamGeo = new THREE.BoxGeometry(6.0, 0.06, 0.06);
        const beamL = new THREE.Mesh(beamGeo, beamMat);
        beamL.position.set(fighter.facing * 3.0, 3.92, 0.1);
        const beamR = new THREE.Mesh(beamGeo, beamMat.clone());
        beamR.position.set(fighter.facing * 3.0, 3.92, -0.1);
        m.add(beamL);
        m.add(beamR);
        fighter.specialData = { beamL, beamR };
      }
      if (fighter.specialData && prog >= 0.8) {
        m.remove(fighter.specialData.beamL);
        m.remove(fighter.specialData.beamR);
        fighter.specialData.beamL.geometry.dispose();
        fighter.specialData.beamR.geometry.dispose();
        fighter.specialData = null;
      }
      // Body tenses
      body.scale.y = 1.03;
      armL.rotation.z = 0.15;
      armR.rotation.z = -0.15;
      // Trail
      if (prog > 0.25 && prog < 0.75) {
        spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 3, 3.9, 0), 0xff2200);
        spawnTrailParticle(new THREE.Vector3(fighter.x + fighter.facing * 5, 3.9, 0), 0xff4400);
      }
      break;
    }

    case 'specialAtk': {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      // Flying tackle - arms forward, body horizontal-ish, cape streaming
      armL.rotation.x = -2.5;
      armR.rotation.x = -2.5;
      armL.rotation.z = 0.2;
      armR.rotation.z = -0.2;
      body.rotation.z = -0.3 * fighter.facing;
      legL.rotation.x = 0.4;
      legR.rotation.x = 0.3;
      // Cape streams behind dramatically
      if (capeSegments) {
        for (let i = 0; i < capeSegments.length; i++) {
          capeSegments[i].rotation.x = 0.3 * (i + 1);
          capeSegments[i].position.z = -i * 0.1;
        }
      }
      // Lift off ground slightly
      m.position.y = fighter.y + Math.sin(prog * Math.PI) * 1.5;
      // Trail particles
      spawnTrailParticle(new THREE.Vector3(fighter.x - fighter.facing * 1, 2.5, 0), 0xcc1111);
      spawnTrailParticle(new THREE.Vector3(fighter.x - fighter.facing * 0.5, 3.0, 0), 0x4488ff);
      break;
    }

    case 'block':
      // Crossed arms - classic Superman pose
      armL.rotation.x = -1.2;
      armL.rotation.z = 0.8;
      armR.rotation.x = -1.2;
      armR.rotation.z = -0.8;
      body.scale.y = 1.02;
      head.rotation.x = -0.1;
      break;

    case 'hit':
      body.position.y = 2.4 + Math.sin(t * 30) * 0.06;
      head.rotation.z = -0.2 * fighter.facing;
      body.rotation.z = 0.08 * fighter.facing;
      armL.rotation.z = 0.3;
      armR.rotation.z = -0.3;
      break;

    case 'ko': {
      const koProg = Math.min(fighter.koFall, 1);
      m.rotation.z = koProg * (Math.PI / 2) * fighter.facing;
      m.position.y = fighter.y - koProg * 0.8;
      armL.rotation.z = 0.5;
      armR.rotation.z = -0.5;
      legL.rotation.x = 0.3;
      legR.rotation.x = -0.2;
      // Cape drapes
      if (capeSegments) {
        for (let i = 0; i < capeSegments.length; i++) {
          capeSegments[i].rotation.x = koProg * 0.3 * (i + 1);
        }
      }
      break;
    }
  }
}

function animateFighter(fighter, dt) {
  switch(fighter.charId) {
    case 'horse': animateHorse(fighter, dt); break;
    case 'pennywise': animatePennywise(fighter, dt); break;
    case 'chippy': animateChippy(fighter, dt); break;
    case 'clark': animateClark(fighter, dt); break;
  }

  // Flash when hit
  if (fighter.flashTimer > 0) {
    fighter.flashTimer -= dt;
    const flash = Math.sin(fighter.flashTimer * 30) > 0;
    fighter.model.traverse(child => {
      if (child.isMesh && child.material) {
        if (child.material._origEmissive === undefined) {
          child.material._origEmissive = child.material.emissive ? child.material.emissive.getHex() : 0;
          child.material._origEmissiveIntensity = child.material.emissiveIntensity || 0;
        }
        child.material.emissive = flash ? new THREE.Color(0xffffff) : new THREE.Color(child.material._origEmissive || 0);
        child.material.emissiveIntensity = flash ? 1.0 : (child.material._origEmissiveIntensity || 0);
      }
    });
    if (fighter.flashTimer <= 0) {
      fighter.model.traverse(child => {
        if (child.isMesh && child.material) {
          child.material.emissive = new THREE.Color(child.material._origEmissive || 0);
          child.material.emissiveIntensity = child.material._origEmissiveIntensity || 0;
          delete child.material._origEmissive;
          delete child.material._origEmissiveIntensity;
        }
      });
    }
  }
}

// ========== FIGHTER UPDATE ==========
function updateFighter(fighter, opponent, dt) {
  fighter.idleTimer += dt;

  if (fighter.state === 'ko') {
    fighter.koFall += dt * 2;
    return;
  }

  // Special cooldown
  fighter.specialCooldown = Math.max(0, fighter.specialCooldown - dt);

  // State transitions
  fighter.stateTimer += dt;

  // Handle attack states
  if (['lightAtk', 'heavyAtk', 'specialAtk'].includes(fighter.state)) {
    const atkType = fighter.state.replace('Atk', '');
    const dur = fighter.def[atkType + 'Dur'];
    const hitTime = fighter.def[atkType + 'HitTime'];

    // Chippy heavy (acorn throw) is handled via projectile in animate, skip melee hit check
    const isProjectileAttack = (fighter.charId === 'chippy' && atkType === 'heavy');
    // Clark heavy (heat vision) uses long range beam
    const isBeamAttack = (fighter.charId === 'clark' && atkType === 'heavy');

    // Check hit (melee)
    if (!fighter.attackHit && fighter.stateTimer >= hitTime && !isProjectileAttack) {
      const dist = Math.abs(fighter.x - opponent.x);
      const range = fighter.def[atkType + 'Range'];
      const facingRight = fighter.facing > 0;
      const opponentIsRight = opponent.x > fighter.x;
      const facingCorrect = (facingRight && opponentIsRight) || (!facingRight && !opponentIsRight);

      let inRange = dist < range && facingCorrect;
      // Special attacks with broad range
      if (fighter.charId === 'horse' && atkType === 'special') {
        inRange = dist < range;
      }
      if (fighter.charId === 'pennywise' && atkType === 'special') {
        inRange = dist < range;
      }
      if (fighter.charId === 'chippy' && atkType === 'special') {
        inRange = dist < range;
      }
      if (fighter.charId === 'clark' && atkType === 'special') {
        inRange = dist < range;
      }
      if (isBeamAttack) {
        inRange = dist < range && facingCorrect;
      }

      if (inRange) {
        fighter.attackHit = true;
        let dmg = fighter.def[atkType + 'Dmg'];

        const blockReduction = opponent.def.blockReduction || 0.25;
        if (opponent.state === 'block') {
          dmg = Math.floor(dmg * blockReduction);
          playSound('block');
          spawnParticles(new THREE.Vector3(opponent.x, 2, 0), 0x8888ff, 5);
        } else {
          opponent.state = 'hit';
          opponent.stateTimer = 0;
          opponent.hitStun = atkType === 'light' ? 0.2 : atkType === 'heavy' ? 0.35 : 0.5;
          playSound(atkType === 'light' ? 'lightHit' : atkType === 'special' ? 'special' : 'heavyHit');
          spawnParticles(new THREE.Vector3(opponent.x, 2.5, 0), 0xff4444, atkType === 'special' ? 20 : 12);
          opponent.flashTimer = 0.35;

          // Knockback - more visible
          const kb = atkType === 'light' ? 1.5 : atkType === 'heavy' ? 3.0 : 5.0;
          opponent.x += kb * fighter.facing;
          opponent.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, opponent.x));

          // Screen shake
          const shakeAmt = atkType === 'light' ? 0.15 : atkType === 'heavy' ? 0.35 : 0.6;
          camShake.x += (Math.random() - 0.5) * shakeAmt;
          camShake.y += (Math.random() - 0.5) * shakeAmt;
        }

        opponent.hp -= dmg;
        opponent.hp = Math.max(0, opponent.hp);

        // Damage number
        const pos3 = new THREE.Vector3(opponent.x, 3.5, 0);
        pos3.project(camera);
        const sx = (pos3.x * 0.5 + 0.5) * window.innerWidth;
        const sy = (-pos3.y * 0.5 + 0.5) * window.innerHeight;
        showDamage(dmg, sx, sy);

        if (opponent.hp <= 0) {
          handleKO(fighter, opponent);
        }
      }
    }

    // Horse gallop movement
    if (fighter.charId === 'horse' && fighter.state === 'specialAtk') {
      fighter.x += fighter.facing * 15 * dt;
      fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    }

    // Pennywise special pull
    if (fighter.charId === 'pennywise' && fighter.state === 'specialAtk' && fighter.attackHit) {
      const prog = fighter.stateTimer / fighter.def.specialDur;
      if (prog > 0.4 && prog < 0.7) {
        const pullSpeed = 10 * dt;
        if (opponent.x > fighter.x) opponent.x -= pullSpeed;
        else opponent.x += pullSpeed;
      }
    }

    // Chippy tornado spin movement
    if (fighter.charId === 'chippy' && fighter.state === 'specialAtk') {
      fighter.x += fighter.facing * 16 * dt;
      fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    }

    // Clark flying tackle movement
    if (fighter.charId === 'clark' && fighter.state === 'specialAtk') {
      fighter.x += fighter.facing * 18 * dt;
      fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    }

    if (fighter.stateTimer >= dur) {
      fighter.state = 'idle';
      fighter.stateTimer = 0;
      // Clean up special data
      if (fighter.specialData) {
        if (fighter.charId === 'clark' && fighter.specialData.beamL) {
          fighter.model.remove(fighter.specialData.beamL);
          fighter.model.remove(fighter.specialData.beamR);
          fighter.specialData.beamL.geometry.dispose();
          fighter.specialData.beamR.geometry.dispose();
        } else if (fighter.specialData instanceof THREE.Mesh) {
          fighter.model.remove(fighter.specialData);
        }
        fighter.specialData = null;
      }
    }
    return;
  }

  // Hit stun
  if (fighter.state === 'hit') {
    fighter.hitStun -= dt;
    if (fighter.hitStun <= 0) {
      fighter.state = 'idle';
      fighter.stateTimer = 0;
    }
    return;
  }

  // Get input
  let input;
  if (fighter.playerNum === 2 && gameMode === '1p') {
    input = updateAI(fighter, opponent, dt);
  } else {
    input = getInput(fighter.playerNum);
  }

  // Blocking (while standing still on ground and pressing up)
  if (input.up && !input.left && !input.right && fighter.y <= GROUND_Y + 0.01 && fighter.state !== 'jump') {
    fighter.state = 'block';
    fighter.stateTimer = 0;
    return;
  }

  // Unblock
  if (fighter.state === 'block') {
    if (!input.up || input.left || input.right) {
      fighter.state = 'idle';
      fighter.stateTimer = 0;
    }
    return;
  }

  // Attacks
  if (input.special && fighter.specialCooldown <= 0 && fighter.y <= GROUND_Y + 0.01) {
    fighter.state = 'specialAtk';
    fighter.stateTimer = 0;
    fighter.attackHit = false;
    fighter.specialCooldown = fighter.def.specialCooldown;
    playSound('special');
    return;
  }
  if (input.heavy && fighter.y <= GROUND_Y + 0.01) {
    fighter.state = 'heavyAtk';
    fighter.stateTimer = 0;
    fighter.attackHit = false;
    fighter.specialData = null;
    return;
  }
  if (input.light && fighter.y <= GROUND_Y + 0.01) {
    fighter.state = 'lightAtk';
    fighter.stateTimer = 0;
    fighter.attackHit = false;
    return;
  }

  // Jump
  if (input.up && fighter.y <= GROUND_Y + 0.01) {
    fighter.vy = 10;
    fighter.state = 'jump';
    fighter.stateTimer = 0;
  }

  // Movement
  let moveX = 0;
  if (input.left) moveX -= 1;
  if (input.right) moveX += 1;

  if (moveX !== 0) {
    fighter.x += moveX * fighter.def.speed * dt;
    fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    fighter.facing = moveX;
    if (fighter.y <= GROUND_Y + 0.01) {
      fighter.state = 'walk';
      fighter.walkCycle += dt * 10;
    }
  } else if (fighter.y <= GROUND_Y + 0.01 && fighter.state === 'walk') {
    fighter.state = 'idle';
    fighter.stateTimer = 0;
  }

  // Face opponent (unless actively moving)
  if (moveX === 0 && fighter.state !== 'specialAtk') {
    fighter.facing = opponent.x > fighter.x ? 1 : -1;
  }

  // Gravity
  if (fighter.y > GROUND_Y || fighter.vy > 0) {
    fighter.vy += GRAVITY * dt;
    fighter.y += fighter.vy * dt;
    if (fighter.y <= GROUND_Y) {
      fighter.y = GROUND_Y;
      fighter.vy = 0;
      if (fighter.state === 'jump') {
        fighter.state = 'idle';
        fighter.stateTimer = 0;
      }
    }
  }

  // Push apart (prevent overlap)
  const dist = Math.abs(fighter.x - opponent.x);
  if (dist < 1.2 && opponent.state !== 'ko') {
    const push = (1.2 - dist) * 0.5;
    if (fighter.x < opponent.x) {
      fighter.x -= push;
      opponent.x += push;
    } else {
      fighter.x += push;
      opponent.x -= push;
    }
    fighter.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, fighter.x));
    opponent.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, opponent.x));
  }

  // Update model position/rotation
  fighter.model.position.x = fighter.x;
  fighter.model.position.y = fighter.y;
  fighter.model.rotation.y = fighter.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
}

// ========== KO HANDLING ==========
function handleKO(winner, loser) {
  loser.state = 'ko';
  loser.koFall = 0;
  loser.stateTimer = 0;
  playSound('ko');
  playSound('crowd');
  slowMotion = 1.0;
  koZoom = 1.0;
  camShake.x += (Math.random() - 0.5) * 1.0;
  camShake.y += (Math.random() - 0.5) * 0.8;
  spawnParticles(new THREE.Vector3(loser.x, 2, 0), 0xffaa00, 30);

  announce('K.O.!', '#ff2222', 2000);

  fightActive = false;

  setTimeout(() => {
    if (winner.playerNum === 1) p1Wins++;
    else p2Wins++;

    const rn = roundNum;
    announce(`ROUND ${rn} — ${winner.def.name.toUpperCase()} WINS`, '#ffd700', 2000);

    setTimeout(() => {
      if (p1Wins >= 2 || p2Wins >= 2) {
        showVictory(winner);
      } else {
        startRound();
      }
    }, 2500);
  }, 2200);
}

function handleTimeOut() {
  fightActive = false;
  const f1 = fighters[0], f2 = fighters[1];
  let winner, loser;
  if (f1.hp > f2.hp) { winner = f1; loser = f2; }
  else if (f2.hp > f1.hp) { winner = f2; loser = f1; }
  else {
    winner = f1; loser = f2;
  }
  loser.state = 'ko'; loser.koFall = 0;
  announce('TIME!', '#ffdd00', 2000);
  playSound('bell');

  setTimeout(() => {
    if (winner.playerNum === 1) p1Wins++;
    else p2Wins++;
    if (p1Wins >= 2 || p2Wins >= 2) {
      setTimeout(() => showVictory(winner), 1000);
    } else {
      setTimeout(() => startRound(), 1000);
    }
  }, 2000);
}

// ========== HUD UPDATE ==========
function updateHUD(dt) {
  if (fighters.length < 2) return;
  const f1 = fighters[0], f2 = fighters[1];

  // Smooth HP display
  f1.displayHp += (f1.hp - f1.displayHp) * dt * 8;
  f2.displayHp += (f2.hp - f2.displayHp) * dt * 8;

  const hp1Pct = Math.max(0, f1.displayHp / f1.maxHp * 100);
  const hp2Pct = Math.max(0, f2.displayHp / f2.maxHp * 100);

  document.getElementById('p1-hp').style.width = hp1Pct + '%';
  document.getElementById('p2-hp').style.width = hp2Pct + '%';

  const hpColor = (pct) => {
    if (pct > 60) return 'linear-gradient(180deg,#4f4,#2a2)';
    if (pct > 30) return 'linear-gradient(180deg,#ff4,#aa2)';
    return 'linear-gradient(180deg,#f44,#a22)';
  };
  document.getElementById('p1-hp').style.background = hpColor(hp1Pct);
  document.getElementById('p2-hp').style.background = hpColor(hp2Pct);

  // Special bars
  const sp1 = Math.max(0, 1 - f1.specialCooldown / f1.def.specialCooldown) * 100;
  const sp2 = Math.max(0, 1 - f2.specialCooldown / f2.def.specialCooldown) * 100;
  document.getElementById('p1-special').style.width = sp1 + '%';
  document.getElementById('p2-special').style.width = sp2 + '%';

  // Timer
  if (fightActive) {
    roundTimer -= dt;
    if (roundTimer <= 0) {
      roundTimer = 0;
      handleTimeOut();
    }
  }
  document.getElementById('timer').textContent = Math.ceil(roundTimer);
  if (roundTimer <= 10) {
    document.getElementById('timer').style.color = '#ff4444';
  } else {
    document.getElementById('timer').style.color = '#ffd700';
  }

  // Round dots
  let dots = '';
  for (let i = 0; i < 3; i++) {
    const c1 = i < p1Wins ? ' won-p1' : '';
    dots += `<span class="round-dot${c1}"></span>`;
  }
  dots += ' ';
  for (let i = 0; i < 3; i++) {
    const c2 = i < p2Wins ? ' won-p2' : '';
    dots += `<span class="round-dot${c2}"></span>`;
  }
  document.getElementById('round-dots').innerHTML = dots;
}

// ========== GAME FLOW ==========
function startMatch() {
  p1Wins = 0;
  p2Wins = 0;
  roundNum = 0;
  showScreen('');
  document.getElementById('hud').style.display = 'block';
  if (isMobile) document.getElementById('mobile-controls').style.display = 'block';
  if (!stageGroup) stageGroup = buildStage();
  startRound();
  startMusic();
}

function startRound() {
  roundNum++;
  roundTimer = 60;
  fightActive = false;
  slowMotion = 0;
  koZoom = 0;

  // Clear old fighters
  fighters.forEach(f => {
    scene.remove(f.model);
    if (f.specialData) {
      if (f.specialData instanceof THREE.Mesh) {
        f.model.remove(f.specialData);
      } else if (f.specialData.beamL) {
        f.model.remove(f.specialData.beamL);
        f.model.remove(f.specialData.beamR);
      }
    }
  });
  fighters = [];

  // Clear projectiles
  projectiles.forEach(p => {
    scene.remove(p.mesh);
    p.mesh.geometry.dispose();
    p.mesh.material.dispose();
  });
  projectiles.length = 0;

  // Create fighters
  const f1 = createFighter(p1Char, 1);
  const f2 = createFighter(p2Char, 2);
  fighters = [f1, f2];

  document.getElementById('p1-name').textContent = f1.def.name;
  document.getElementById('p2-name').textContent = f2.def.name;
  document.getElementById('round-label').textContent = 'Round ' + roundNum;

  // AI difficulty ramps
  ai.difficulty = 0.4 + roundNum * 0.15;

  // Reset camera
  camera.position.copy(baseCamPos);

  // "READY? FIGHT!" sequence
  announce('ROUND ' + roundNum, '#ffd700', 1000);
  setTimeout(() => {
    announce('READY?', '#ffaa00', 1000);
  }, 1200);
  setTimeout(() => {
    announce('FIGHT!', '#ff4444', 800);
    playSound('bell');
    fightActive = true;
  }, 2400);
}

function showVictory(winner) {
  fightActive = false;
  stopMusic();
  showScreen('victory-screen');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
  document.getElementById('victory-text').textContent = winner.def.name + ' WINS!';
  document.getElementById('victory-sub').textContent =
    `Final Score: ${p1Wins} - ${p2Wins}`;
  playSound('crowd');
}

// ========== CHARACTER SELECT ==========
function initCharSelect() {
  selectPhase = 0;
  p1Char = null;
  p2Char = null;
  showScreen('select-screen');

  const grid = document.getElementById('select-grid');
  grid.innerHTML = '';
  previewRenderers.forEach(pr => pr.prevRenderer.dispose());
  previewRenderers = [];

  Object.keys(CHAR_DEFS).forEach(charId => {
    const def = CHAR_DEFS[charId];
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.charId = charId;

    const prev = createPreviewRenderer(def.buildFn, card);
    previewRenderers.push(prev);

    const nameEl = document.createElement('div');
    nameEl.className = 'char-card-name';
    nameEl.textContent = def.name;
    card.appendChild(nameEl);

    const statsEl = document.createElement('div');
    statsEl.className = 'char-card-stats';
    statsEl.textContent = `HP:${def.hp} SPD:${def.speed} ATK:${def.lightDmg}/${def.heavyDmg}/${def.specialDmg}`;
    card.appendChild(statsEl);

    card.addEventListener('click', () => selectChar(charId, card));
    grid.appendChild(card);
  });

  updateSelectUI();
}

function selectChar(charId, card) {
  if (selectPhase === 0) {
    p1Char = charId;
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected-p1'));
    card.classList.add('selected-p1');
    selectPhase = 1;
    if (gameMode === '1p') {
      // AI picks a random different character
      const chars = Object.keys(CHAR_DEFS).filter(c => c !== charId);
      p2Char = chars[Math.floor(Math.random() * chars.length)];
      document.querySelectorAll('.char-card').forEach(c => {
        if (c.dataset.charId === p2Char) c.classList.add('selected-p2');
      });
      selectPhase = 2;
    }
  } else if (selectPhase === 1 && gameMode === '2p') {
    p2Char = charId;
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected-p2'));
    card.classList.add('selected-p2');
    selectPhase = 2;
  }
  updateSelectUI();
}

function updateSelectUI() {
  const p1Name = p1Char ? CHAR_DEFS[p1Char].name : '---';
  const p2Name = p2Char ? CHAR_DEFS[p2Char].name : '---';
  document.getElementById('pick-p1').textContent = 'P1: ' + p1Name;
  document.getElementById('pick-p2').textContent = 'P2: ' + p2Name;

  if (selectPhase === 0) {
    document.getElementById('select-info').textContent = 'Player 1 — pick your fighter';
  } else if (selectPhase === 1) {
    document.getElementById('select-info').textContent = 'Player 2 — pick your fighter';
  } else {
    document.getElementById('select-info').textContent = 'Ready to fight!';
  }

  document.getElementById('btn-fight').style.display = selectPhase >= 2 ? 'inline-block' : 'none';
}

// ========== MAIN LOOP ==========
let lastTime = 0;
function gameLoop(time) {
  requestAnimationFrame(gameLoop);
  const rawDt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // Slow motion effect
  let dt = rawDt;
  if (slowMotion > 0) {
    slowMotion -= rawDt;
    dt = rawDt * 0.2;
  }

  // Update preview renderers (char select)
  previewRenderers.forEach(pr => {
    pr.char.rotation.y += rawDt * 0.8;
    pr.prevRenderer.render(pr.prevScene, pr.prevCam);
  });

  if (gameState === 'fight' && fighters.length === 2) {
    const f1 = fighters[0], f2 = fighters[1];

    if (fightActive || f1.state === 'ko' || f2.state === 'ko') {
      updateFighter(f1, f2, dt);
      updateFighter(f2, f1, dt);

      // Update projectiles
      updateProjectiles(dt, fighters);

      // Update model positions
      f1.model.position.x = f1.x;
      f1.model.position.y = f1.y;
      f1.model.rotation.y = f1.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
      f2.model.position.x = f2.x;
      f2.model.position.y = f2.y;
      f2.model.rotation.y = f2.facing > 0 ? Math.PI / 2 : -Math.PI / 2;
    }

    animateFighter(f1, dt);
    animateFighter(f2, dt);
    updateHUD(dt);
    updateParticles(dt);

    // Camera follow
    const midX = (f1.x + f2.x) / 2;
    const spread = Math.abs(f1.x - f2.x);
    const targetZ = 22 + Math.max(0, spread - 8) * 0.5;
    camera.position.x += (midX * 0.3 - camera.position.x) * dt * 3;
    camera.position.z += (targetZ - camera.position.z) * dt * 3;

    // KO zoom
    if (koZoom > 0) {
      koZoom -= rawDt * 0.5;
      const zoomTarget = (f1.state === 'ko') ? f1 : f2;
      const targetPos = new THREE.Vector3(zoomTarget.x, 2.5, 14);
      camera.position.lerp(targetPos, rawDt * 1.5);
    }

    // Parallax
    if (stageGroup && stageGroup.userData.bgGroup) {
      stageGroup.userData.bgGroup.position.x = -midX * 0.15;
    }

    // Screen shake
    camera.position.x += camShake.x;
    camera.position.y = baseCamPos.y + camShake.y;
    camShake.x *= camShake.decay;
    camShake.y *= camShake.decay;
    if (Math.abs(camShake.x) < 0.001) camShake.x = 0;
    if (Math.abs(camShake.y) < 0.001) camShake.y = 0;

    camera.lookAt(midX * 0.3, 2, 0);
  }

  renderer.render(scene, camera);
  consumePressed();
}

// ========== EVENT LISTENERS ==========
document.getElementById('btn-1p').addEventListener('click', () => {
  ensureAudio();
  gameMode = '1p';
  gameState = 'select';
  initCharSelect();
});

document.getElementById('btn-2p').addEventListener('click', () => {
  ensureAudio();
  gameMode = '2p';
  gameState = 'select';
  initCharSelect();
});

document.getElementById('btn-fight').addEventListener('click', () => {
  gameState = 'fight';
  previewRenderers.forEach(pr => pr.prevRenderer.dispose());
  previewRenderers = [];
  startMatch();
});

document.getElementById('btn-rematch').addEventListener('click', () => {
  gameState = 'fight';
  showScreen('');
  startMatch();
});

document.getElementById('btn-menu').addEventListener('click', () => {
  gameState = 'title';
  stopMusic();
  fighters.forEach(f => scene.remove(f.model));
  fighters = [];
  // Clean up projectiles
  projectiles.forEach(p => {
    scene.remove(p.mesh);
    p.mesh.geometry.dispose();
    p.mesh.material.dispose();
  });
  projectiles.length = 0;
  if (stageGroup) { scene.remove(stageGroup); stageGroup = null; }
  document.getElementById('hud').style.display = 'none';
  showScreen('title-screen');
  camera.position.copy(baseCamPos);
});

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// Init
setupMobile();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
