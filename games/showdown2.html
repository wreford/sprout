<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crossover Chaos 2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0e;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;touch-action:none;user-select:none;width:100vw;height:100vh;height:100dvh}
canvas#main-canvas{display:block;position:fixed;top:0;left:0;width:100vw!important;height:100vh!important;height:100dvh!important}
#ui{position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;pointer-events:none;z-index:10}
#ui *{pointer-events:auto}
.home-link{position:absolute;top:8px;left:10px;color:#999;text-decoration:none;font-size:13px;z-index:100;pointer-events:auto}
.home-link:hover{color:#fff}

/* HUD */
#hud{display:none;position:fixed;top:0;left:0;width:100%;padding:4px 8px;z-index:30;background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,transparent 100%)}
.hud-row{display:flex;align-items:center;gap:6px}
.hp-sec{flex:1;display:flex;flex-direction:column;gap:1px}
.hp-sec.right{align-items:flex-end}
.hp-sec.right .hp-outer{direction:rtl}
.char-label{font-size:clamp(10px,2.5vw,12px);font-weight:700;text-transform:uppercase;letter-spacing:1px;text-shadow:0 1px 4px #000}
.hp-outer{width:100%;height:16px;background:#181818;border:2px solid #444;border-radius:3px;overflow:hidden}
.hp-inner{height:100%;border-radius:1px;transition:width .3s ease}
.sp-outer{width:100%;height:4px;background:#111;border-radius:2px;overflow:hidden;margin-top:1px}
.sp-inner{height:100%;background:linear-gradient(90deg,#0af,#0ff);transition:width .3s}
.timer-box{font-size:clamp(20px,5vw,26px);font-weight:900;min-width:44px;text-align:center;color:#ffd700;text-shadow:0 0 8px rgba(255,200,0,.4)}
.round-label{font-size:9px;text-align:center;color:#777;margin-top:1px}
.round-dots{display:flex;gap:4px;justify-content:center;margin-top:2px}
.round-dot{width:8px;height:8px;border-radius:50%;background:#222;border:1px solid #555}
.round-dot.w1{background:#4f4;border-color:#6f6}
.round-dot.w2{background:#f44;border-color:#f66}

/* Screens */
.screen{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;height:100dvh;justify-content:center;align-items:center;flex-direction:column;z-index:50;overflow-y:auto;padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0))}
.screen.active{display:flex}
#title-screen{background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0a0e 70%)}
.title-text{font-size:clamp(30px,6vw,68px);font-weight:900;text-transform:uppercase;letter-spacing:3px;background:linear-gradient(180deg,#ff6b35,#ff2222,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(255,50,50,.5));animation:tPulse 2s ease-in-out infinite}
.title-sub{font-size:clamp(12px,2vw,20px);color:#777;margin-top:8px;letter-spacing:6px;text-transform:uppercase}
@keyframes tPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.btn{padding:10px 28px;font-size:clamp(13px,3vw,16px);font-weight:700;border:2px solid #555;background:linear-gradient(180deg,#2a2a2a,#1a1a1a);color:#fff;cursor:pointer;border-radius:6px;margin:5px;transition:all .2s;text-transform:uppercase;letter-spacing:2px}
.btn:hover{border-color:#ff6b35;background:linear-gradient(180deg,#3a2a2a,#2a1a1a);transform:scale(1.05)}
.btn:active{transform:scale(.97)}

/* Select */
#select-screen{background:rgba(10,10,14,.97)}
.sel-title{font-size:clamp(18px,4vw,24px);font-weight:900;margin-bottom:10px;color:#ff6b35}
.sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;max-width:min(420px,90vw);width:100%}
.char-card{border:3px solid #333;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#161616;transition:all .3s;padding:8px 4px;position:relative}
.char-card:hover{border-color:#ff6b35;transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,107,53,.3)}
.char-card.sel1{border-color:#4f4;box-shadow:0 0 16px rgba(68,255,68,.4)}
.char-card.sel2{border-color:#f44;box-shadow:0 0 16px rgba(255,68,68,.4)}
.char-card canvas{width:min(120px,25vw);height:min(120px,25vw);border-radius:6px}
.cc-name{font-size:clamp(11px,2.5vw,13px);font-weight:700;margin-top:3px}
.cc-stats{font-size:clamp(9px,2vw,10px);color:#888;margin-top:1px}
.sel-info{font-size:13px;color:#aaa;margin-top:12px}
.sel-picks{display:flex;gap:30px;margin-top:8px;font-size:13px}
.pick-lbl{padding:5px 14px;border-radius:4px;border:1px solid #333}
.pick-lbl.p1{border-color:#4f4;color:#4f4}
.pick-lbl.p2{border-color:#f44;color:#f44}

/* Announce */
#announce{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(36px,8vw,72px);font-weight:900;text-transform:uppercase;z-index:60;text-shadow:0 0 24px rgba(255,100,0,.8),0 0 48px rgba(255,0,0,.4);letter-spacing:3px;animation:annIn .3s ease-out}
@keyframes annIn{from{transform:translate(-50%,-50%) scale(2);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

/* Damage numbers */
.dmg-num{position:absolute;font-weight:900;pointer-events:none;z-index:70;animation:dmgUp .9s ease-out forwards;text-shadow:0 0 8px rgba(0,0,0,.9)}
@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(.6)}15%{transform:translateY(-10px) scale(1.3)}100%{opacity:0;transform:translateY(-55px) scale(1)}}

/* Mobile controls */
#mobile-controls{display:none;z-index:200}
.m-btn{position:fixed;display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;color:rgba(255,255,255,.85);-webkit-tap-highlight-color:transparent;z-index:200;border:2px solid rgba(255,255,255,.3);transition:transform .05s}
#m-left{left:8px;bottom:12px;width:48px;height:48px;font-size:18px;background:rgba(255,255,255,.12)}
#m-right{left:64px;bottom:12px;width:48px;height:48px;font-size:18px;background:rgba(255,255,255,.12)}
#m-jump{left:36px;bottom:68px;width:48px;height:48px;font-size:10px;background:rgba(255,200,0,.15)}
#m-lt{right:112px;bottom:12px;width:48px;height:48px;font-size:10px;background:rgba(100,200,255,.2)}
#m-hv{right:58px;bottom:12px;width:48px;height:48px;font-size:10px;background:rgba(255,150,50,.2)}
#m-sp{right:4px;bottom:12px;width:48px;height:48px;font-size:10px;background:rgba(255,50,50,.2)}
.m-btn:active{transform:scale(.88);background:rgba(255,255,255,.35)!important}
@supports(bottom:env(safe-area-inset-bottom)){
  #m-left,#m-right,#m-lt,#m-hv,#m-sp{bottom:calc(12px + env(safe-area-inset-bottom))}
  #m-jump{bottom:calc(68px + env(safe-area-inset-bottom))}
}

/* Victory */
#victory-screen{background:rgba(0,0,0,.88)}
.vic-text{font-size:clamp(26px,5vw,48px);font-weight:900;background:linear-gradient(180deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 16px rgba(255,200,0,.6))}
.vic-sub{font-size:16px;color:#aaa;margin-top:8px}
</style>

<script type="module">
import * as THREE from 'three';

// ===================== AUDIO =====================
let audioCtx = null;
const MV = 0.02;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  try {
    ensureAudio();
    const g = audioCtx.createGain();
    g.gain.value = MV;
    g.connect(audioCtx.destination);
    const o = audioCtx.createOscillator();
    const n = audioCtx.currentTime;
    switch (type) {
      case 'lightHit': {
        o.type = 'triangle';
        o.frequency.setValueAtTime(220, n);
        o.frequency.exponentialRampToValueAtTime(80, n + 0.1);
        g.gain.setValueAtTime(MV, n);
        g.gain.exponentialRampToValueAtTime(0.001, n + 0.12);
        o.start(n); o.stop(n + 0.12);
        const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const s = audioCtx.createBufferSource(); s.buffer = b;
        const ng = audioCtx.createGain(); ng.gain.value = MV * 0.5;
        s.connect(ng); ng.connect(audioCtx.destination); s.start(n);
        break;
      }
      case 'heavyHit': {
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(140, n);
        o.frequency.exponentialRampToValueAtTime(35, n + 0.25);
        g.gain.setValueAtTime(MV, n);
        g.gain.exponentialRampToValueAtTime(0.001, n + 0.3);
        o.start(n); o.stop(n + 0.3);
        const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const s = audioCtx.createBufferSource(); s.buffer = b;
        const ng = audioCtx.createGain(); ng.gain.value = MV * 0.8;
        s.connect(ng); ng.connect(audioCtx.destination); s.start(n);
        break;
      }
      case 'special': {
        o.type = 'sine';
        o.frequency.setValueAtTime(350, n);
        o.frequency.exponentialRampToValueAtTime(900, n + 0.12);
        o.frequency.exponentialRampToValueAtTime(80, n + 0.4);
        g.gain.setValueAtTime(MV, n);
        g.gain.exponentialRampToValueAtTime(0.001, n + 0.5);
        o.start(n); o.stop(n + 0.5);
        break;
      }
      case 'block': {
        o.type = 'square';
        o.frequency.setValueAtTime(900, n);
        o.frequency.exponentialRampToValueAtTime(400, n + 0.06);
        g.gain.setValueAtTime(MV * 0.4, n);
        g.gain.exponentialRampToValueAtTime(0.001, n + 0.08);
        o.start(n); o.stop(n + 0.08);
        break;
      }
      case 'ko': {
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(90, n);
        o.frequency.exponentialRampToValueAtTime(20, n + 0.8);
        g.gain.setValueAtTime(MV, n);
        g.gain.exponentialRampToValueAtTime(0.001, n + 1);
        o.start(n); o.stop(n + 1);
        break;
      }
      case 'bell': {
        o.type = 'sine';
        o.frequency.setValueAtTime(1200, n);
        g.gain.setValueAtTime(MV * 0.5, n);
        g.gain.exponentialRampToValueAtTime(0.001, n + 0.5);
        o.start(n); o.stop(n + 0.5);
        break;
      }
      case 'whoosh': {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          const env = Math.sin(Math.PI * i / d.length);
          d[i] = (Math.random() * 2 - 1) * env;
        }
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const filt = audioCtx.createBiquadFilter(); filt.type = 'bandpass';
        filt.frequency.setValueAtTime(2000, n);
        filt.frequency.exponentialRampToValueAtTime(500, n + 0.15);
        const ng = audioCtx.createGain(); ng.gain.value = MV * 0.4;
        s.connect(filt); filt.connect(ng); ng.connect(audioCtx.destination); s.start(n);
        o.frequency.value = 1; o.start(n); o.stop(n + 0.01);
        return;
      }
      default: {
        o.frequency.value = 200;
        o.start(n); o.stop(n + 0.05);
        break;
      }
    }
    o.connect(g);
  } catch (e) {}
}

// Background music
let musicOn = false, musicNodes = [];
function startMusic() {
  if (musicOn) return;
  musicOn = true;
  function loop() {
    if (!musicOn) return;
    const notes = [55, 55, 73.4, 65.4, 55, 55, 82.4, 73.4];
    const t = audioCtx.currentTime;
    notes.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = 'triangle'; osc.frequency.value = f;
      const gg = audioCtx.createGain();
      gg.gain.setValueAtTime(MV * 0.25, t + i * 0.25);
      gg.gain.exponentialRampToValueAtTime(0.001, t + (i + 1) * 0.25 - 0.02);
      osc.connect(gg); gg.connect(audioCtx.destination);
      osc.start(t + i * 0.25); osc.stop(t + (i + 1) * 0.25);
      musicNodes.push({ osc, gg });
    });
    setTimeout(loop, notes.length * 250);
  }
  loop();
}
function stopMusic() {
  musicOn = false;
  musicNodes.forEach(n => { try { n.osc.stop(); } catch (e) {} });
  musicNodes = [];
}

// ===================== THREE.JS SETUP =====================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.domElement.id = 'main-canvas';
document.body.prepend(renderer.domElement);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080812, 0.012);

const camera = new THREE.PerspectiveCamera(32, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 22);
camera.lookAt(0, 2, 0);

const baseCamPos = new THREE.Vector3(0, 4, 22);
const camShake = { x: 0, y: 0, decay: 0.86 };

// Lighting
scene.add(new THREE.AmbientLight(0x303050, 0.5));
const dirLight = new THREE.DirectionalLight(0xffeedd, 1.4);
dirLight.position.set(5, 12, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -2;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0x4488ff, 0.6);
rimLight.position.set(-5, 8, -10);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0xff6633, 0.3, 30);
fillLight.position.set(0, 6, 5);
scene.add(fillLight);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===================== HELPERS =====================
function makeMat(color, opts) {
  return new THREE.MeshStandardMaterial(Object.assign({ color, roughness: 0.65 }, opts || {}));
}
function makeBox(w, h, d, color, opts) {
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), makeMat(color, opts));
}
function makeSphere(r, color, opts) {
  return new THREE.Mesh(new THREE.SphereGeometry(r, 12, 12), makeMat(color, opts));
}

// ===================== STAGE =====================
let stageGroup;
function buildStage() {
  stageGroup = new THREE.Group();

  // Ground
  const ground = makeBox(32, 0.5, 14, 0x222233);
  ground.position.y = -0.25;
  ground.receiveShadow = true;
  stageGroup.add(ground);

  // Glowing edges
  const edgeMat = makeMat(0xff6633, { emissive: 0xff4400, emissiveIntensity: 0.4 });
  const e1 = new THREE.Mesh(new THREE.BoxGeometry(32, 0.07, 0.07), edgeMat);
  e1.position.set(0, 0.02, 7);
  stageGroup.add(e1);
  const e2 = e1.clone();
  e2.position.z = -7;
  stageGroup.add(e2);

  // Background buildings
  const bgG = new THREE.Group();
  bgG.userData.parallax = true;
  const bCols = [0x161628, 0x14203a, 0x0e3058, 0x181838, 0x0c1c36];
  for (let i = 0; i < 14; i++) {
    const h = 3 + Math.random() * 9;
    const w = 1.5 + Math.random() * 2.2;
    const b = makeBox(w, h, 2.5, bCols[i % bCols.length]);
    b.position.set(-14 + i * 2.3 + Math.random() * 0.5, h / 2, -9 - Math.random() * 3);
    bgG.add(b);
    // Windows
    for (let wy = 1; wy < h - 1; wy += 1.1) {
      for (let wx = -w / 3; wx <= w / 3; wx += w / 2.5) {
        if (Math.random() > 0.35) {
          const win = makeBox(0.18, 0.28, 0.04, 0xffdd88, {
            emissive: 0xffdd44,
            emissiveIntensity: Math.random() * 0.5 + 0.2
          });
          win.position.set(b.position.x + wx, wy, b.position.z + 1.3);
          bgG.add(win);
        }
      }
    }
  }
  stageGroup.add(bgG);
  stageGroup.userData.bgGroup = bgG;

  // Trees
  for (let i = 0; i < 5; i++) {
    const trunk = makeBox(0.3, 1.6, 0.3, 0x5c3a1e);
    trunk.position.set(-12 + i * 6, 0.8, -5 - Math.random());
    stageGroup.add(trunk);
    const leaves = makeBox(1.3, 1.3, 1.3, 0x2d5a1e);
    leaves.position.set(trunk.position.x, 2.1, trunk.position.z);
    stageGroup.add(leaves);
  }

  scene.add(stageGroup);
  return stageGroup;
}

function buildHorse() {
  const g = new THREE.Group();
  const brown = makeMat(0x8B4513);
  const lightBrown = makeMat(0xCD853F);
  const darkBrown = makeMat(0x5C3317);
  const hoofMat = makeMat(0x1a0a05);
  const eyeWhite = makeMat(0xffffff);
  const eyePupil = makeMat(0x222211);
  const maneMat = makeMat(0x2a1208);
  const pinkMat = makeMat(0xffaaaa);

  // Body - elongated, layered for roundness
  const body = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.25, 1.3), brown);
  body.position.y = 2.2;
  body.castShadow = true;
  g.add(body);
  g.userData.body = body;

  // Rounded barrel overlay
  const barrel = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.6, 1.38), brown);
  barrel.position.set(0, 2.2, 0);
  g.add(barrel);

  // Belly underside
  const belly = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.3, 1.1), lightBrown);
  belly.position.set(0, 1.55, 0);
  g.add(belly);

  // Neck - angled
  const neck = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.85), brown);
  neck.position.set(1.5, 3.05, 0);
  neck.rotation.z = 0.35;
  neck.castShadow = true;
  g.add(neck);
  g.userData.neck = neck;

  // Head skull
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.78, 0.78), brown);
  head.position.set(2.15, 3.75, 0);
  head.castShadow = true;
  g.add(head);
  g.userData.head = head;

  // Snout / muzzle
  const snout = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.5, 0.58), lightBrown);
  snout.position.set(2.7, 3.52, 0);
  g.add(snout);

  // Nostrils
  const nostrilL = makeSphere(0.06, 0x3a1a0a);
  nostrilL.position.set(3.05, 3.5, 0.16);
  g.add(nostrilL);
  const nostrilR = nostrilL.clone();
  nostrilR.position.z = -0.16;
  g.add(nostrilR);

  // Eyes
  const eyeL = makeSphere(0.13, 0xffffff);
  eyeL.position.set(2.35, 3.9, 0.37);
  g.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.z = -0.37;
  g.add(eyeR);
  const pupilL = makeSphere(0.07, 0x222211);
  pupilL.position.set(2.42, 3.91, 0.45);
  g.add(pupilL);
  const pupilR = pupilL.clone();
  pupilR.position.z = -0.45;
  g.add(pupilR);

  // Ears with pink inside
  const earGeo = new THREE.BoxGeometry(0.12, 0.38, 0.1);
  const earL = new THREE.Mesh(earGeo, brown);
  earL.position.set(1.98, 4.25, 0.24);
  earL.rotation.z = 0.2;
  earL.rotation.x = -0.12;
  g.add(earL);
  const earLinside = makeBox(0.06, 0.25, 0.04, 0xffaaaa);
  earLinside.position.set(1.98, 4.22, 0.28);
  g.add(earLinside);
  const earR = new THREE.Mesh(earGeo, brown);
  earR.position.set(1.98, 4.25, -0.24);
  earR.rotation.z = 0.2;
  earR.rotation.x = 0.12;
  g.add(earR);
  const earRinside = makeBox(0.06, 0.25, 0.04, 0xffaaaa);
  earRinside.position.set(1.98, 4.22, -0.28);
  g.add(earRinside);

  // Mane - cascading boxes down neck
  const maneArr = [];
  for (let i = 0; i < 10; i++) {
    const t = i / 9;
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.38 + Math.sin(t * Math.PI) * 0.15, 0.12),
      maneMat
    );
    m.position.set(0.95 + t * 1.25, 2.5 + t * 1.35 + Math.sin(t * Math.PI) * 0.1, 0);
    m.rotation.z = -0.25 + t * 0.2;
    g.add(m);
    maneArr.push(m);
  }
  // Forelock
  for (let i = 0; i < 3; i++) {
    const fl = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.22, 0.08), maneMat);
    fl.position.set(2.0 + i * 0.1, 4.08 + i * 0.04, 0);
    g.add(fl);
  }
  g.userData.maneArr = maneArr;

  // Legs with articulation
  const legs = [];
  const legPositions = [
    [1.0, 1.7, 0.4],   // Front-left
    [1.0, 1.7, -0.4],  // Front-right
    [-1.0, 1.7, 0.4],  // Back-left
    [-1.0, 1.7, -0.4]  // Back-right
  ];
  legPositions.forEach(pos => {
    const legPivot = new THREE.Group();
    legPivot.position.set(pos[0], pos[1], pos[2]);

    const upperLeg = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.85, 0.32), brown);
    upperLeg.position.y = -0.42;
    upperLeg.castShadow = true;
    legPivot.add(upperLeg);

    const kneePivot = new THREE.Group();
    kneePivot.position.y = -0.85;
    legPivot.add(kneePivot);

    const lowerLeg = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.8, 0.26), brown);
    lowerLeg.position.y = -0.4;
    lowerLeg.castShadow = true;
    kneePivot.add(lowerLeg);

    const hoof = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.16, 0.34), hoofMat);
    hoof.position.y = -0.8;
    kneePivot.add(hoof);

    legPivot.userData.knee = kneePivot;
    g.add(legPivot);
    legs.push(legPivot);
  });
  g.userData.legs = legs;

  // Tail
  const tailPivot = new THREE.Group();
  tailPivot.position.set(-1.55, 2.6, 0);
  const tailArr = [];
  for (let i = 0; i < 8; i++) {
    const strand = new THREE.Mesh(
      new THREE.BoxGeometry(0.1 + Math.random() * 0.06, 0.55 + Math.random() * 0.4, 0.1 + Math.random() * 0.04),
      maneMat
    );
    strand.position.set(
      -0.12 - Math.random() * 0.15,
      -0.3 - i * 0.09,
      (Math.random() - 0.5) * 0.3
    );
    strand.rotation.z = -0.3 - Math.random() * 0.4;
    strand.rotation.x = (Math.random() - 0.5) * 0.3;
    tailPivot.add(strand);
    tailArr.push(strand);
  }
  g.add(tailPivot);
  g.userData.tail = tailPivot;
  g.userData.tailArr = tailArr;

  g.userData.charId = 'horse';
  return g;
}

// ===================== PARTICLES =====================
const particles = [];

function spawnParticles(pos, color, count = 12, spread = 0.3, speed = 0.2) {
  for (let i = 0; i < count; i++) {
    const p = new THREE.Mesh(
      new THREE.BoxGeometry(0.1, 0.1, 0.1),
      new THREE.MeshBasicMaterial({ color, transparent: true })
    );
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * spread,
      Math.random() * speed + 0.08,
      (Math.random() - 0.5) * spread * 0.6
    );
    p.userData.life = 1;
    scene.add(p);
    particles.push(p);
  }
}

function spawnBlockSparks(pos) {
  for (let i = 0; i < 8; i++) {
    const p = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.06, 0.06),
      new THREE.MeshBasicMaterial({ color: 0xffffaa, transparent: true })
    );
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.5,
      Math.random() * 0.3,
      (Math.random() - 0.5) * 0.4
    );
    p.userData.life = 0.7;
    scene.add(p);
    particles.push(p);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= dt * 2.5;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      particles.splice(i, 1);
      continue;
    }
    p.position.add(p.userData.vel.clone().multiplyScalar(dt * 60));
    p.userData.vel.y -= dt * 0.3;
    p.material.opacity = p.userData.life;
    p.scale.setScalar(p.userData.life);
  }
}

// ===================== PROJECTILES =====================
const projectiles = [];

function spawnProjectile(pos, dir, color, speed, ownerIdx) {
  const p = makeSphere(0.15, color, { emissive: color, emissiveIntensity: 0.6 });
  p.position.copy(pos);
  p.userData.vel = dir.clone().multiplyScalar(speed);
  p.userData.life = 1.5;
  p.userData.ownerIdx = ownerIdx;
  scene.add(p);
  projectiles.push(p);
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.userData.life -= dt;
    if (p.userData.life <= 0) {
      scene.remove(p);
      p.geometry.dispose();
      p.material.dispose();
      projectiles.splice(i, 1);
      continue;
    }
    p.position.add(p.userData.vel.clone().multiplyScalar(dt));
  }
}

// ===================== TEMP MESHES =====================
const tempMeshes = [];

function addTempMesh(mesh, duration) {
  scene.add(mesh);
  tempMeshes.push({ mesh, life: duration });
}

function updateTempMeshes(dt) {
  for (let i = tempMeshes.length - 1; i >= 0; i--) {
    tempMeshes[i].life -= dt;
    if (tempMeshes[i].life <= 0) {
      const m = tempMeshes[i].mesh;
      scene.remove(m);
      m.traverse(c => {
        if (c.isMesh) { c.geometry.dispose(); if (c.material.dispose) c.material.dispose(); }
      });
      tempMeshes.splice(i, 1);
    }
  }
}

function setupMobile() {
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (isMobile) document.getElementById('mobile-controls').style.display = 'block';

  const btns = [
    ['m-left', 'left'], ['m-right', 'right'], ['m-jump', 'jump'],
    ['m-lt', 'lt'], ['m-hv', 'hv'], ['m-sp', 'sp']
  ];
  btns.forEach(([id, key]) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      mobileInput[key] = true;
      if (key === 'lt' || key === 'hv' || key === 'sp' || key === 'jump') {
        mobileJustPressed[key] = true;
      }
      ensureAudio();
    }, { passive: false });
    el.addEventListener('touchend', e => {
      e.preventDefault();
      mobileInput[key] = false;
    }, { passive: false });
    el.addEventListener('touchcancel', () => { mobileInput[key] = false; });
  });
}

// Key just-pressed tracking
const keyJustPressed = {};
window.addEventListener('keydown', e => {
  if (!keyJustPressed[e.code]) keyJustPressed[e.code] = true;
});

function getP1Input() {
  let walk = 0, jump = false, atk = null;
  if (keys['KeyA'] || keys['ArrowLeft'] || mobileInput.left) walk = -1;
  if (keys['KeyD'] || keys['ArrowRight'] || mobileInput.right) walk = 1;
  if (keys['KeyW'] || keys['ArrowUp'] || mobileJustPressed.jump) jump = true;
  if (keyJustPressed['KeyZ'] || mobileJustPressed.lt) atk = 'light';
  else if (keyJustPressed['KeyX'] || mobileJustPressed.hv) atk = 'heavy';
  else if (keyJustPressed['KeyC'] || mobileJustPressed.sp) atk = 'special';
  return { walk, jump, atk };
}

function getP2Input() {
  let walk = 0, jump = false, atk = null;
  if (keys['KeyJ']) walk = -1;
  if (keys['KeyL']) walk = 1;
  if (keyJustPressed['KeyI']) jump = true;
  if (keyJustPressed['Numpad1'] || keyJustPressed['Digit7']) atk = 'light';
  else if (keyJustPressed['Numpad2'] || keyJustPressed['Digit8']) atk = 'heavy';
  else if (keyJustPressed['Numpad3'] || keyJustPressed['Digit9']) atk = 'special';
  return { walk, jump, atk };
}

function clearInputs() {
  for (const k in keyJustPressed) delete keyJustPressed[k];
  mobileJustPressed.lt = false;
  mobileJustPressed.hv = false;
  mobileJustPressed.sp = false;
  mobileJustPressed.jump = false;
}

// ===================== CPU AI =====================
function getCPUInput(me, opp) {
  const dx = opp.x - me.x;
  const adx = Math.abs(dx);
  const cd = CHARS[me.charIdx];
  let walk = 0, jump = false, atk = null;

  if (me.state === 'idle' || me.state === 'walk') {
    // Approach or retreat
    if (adx > 3.5) walk = Math.sign(dx);
    else if (adx < 1.5) walk = -Math.sign(dx);

    // Attack decisions
    if (adx < cd.atkLight.range * 1.1 && Math.random() < 0.07) atk = 'light';
    if (adx < cd.atkHeavy.range * 0.9 && Math.random() < 0.035) atk = 'heavy';
    if (adx < cd.atkSpecial.range && me.specialCd <= 0 && Math.random() < 0.018) atk = 'special';

    // Jump sometimes
    if (Math.random() < 0.012 && me.grounded) jump = true;
    // Evade attacks
    if (opp.state === 'attack' && adx < 2.5 && Math.random() < 0.1) jump = true;
  }
  return { walk, jump, atk };
}

// ===================== ANIMATION =====================
function animateChar(model, state, dt, t) {
  const d = model.userData;
  const cid = d.charId;
  const dir = state.facing;

  model.position.x = state.x;
  model.position.y = state.y;
  model.scale.x = dir;

  // Flash white on hit
  if (state.flashTimer > 0) {
    state.flashTimer -= dt;
    model.traverse(c => {
      if (c.isMesh) {
        if (!c.userData.origMat) c.userData.origMat = c.material;
        c.material = new THREE.MeshBasicMaterial({ color: 0xffffff });
      }
    });
  } else {
    model.traverse(c => {
      if (c.isMesh && c.userData.origMat) {
        c.material = c.userData.origMat;
        delete c.userData.origMat;
      }
    });
  }

  // Squash on landing
  let squashY = 1, squashXZ = 1;
  if (state.squashTimer > 0) {
    state.squashTimer -= dt;
    const s = state.squashTimer / 0.12;
    squashY = 1 - 0.15 * s;
    squashXZ = 1 + 0.08 * s;
  }

  const st = state.stateTime;

  // ---- HORSE ----
  if (cid === 'horse') {
    const body = d.body, legs = d.legs, tail = d.tail, head = d.head;
    const tailArr = d.tailArr, maneArr = d.maneArr;

    // Reset defaults
    body.rotation.z = 0;
    head.position.set(2.15, 3.75, 0);
    body.position.y = 2.2;
    legs.forEach(l => { l.rotation.x = 0; if (l.userData.knee) l.userData.knee.rotation.x = 0; });

    if (state.state === 'idle') {
      body.scale.y = squashY * (1 + Math.sin(t * 2) * 0.015);
      body.scale.x = squashXZ;
      body.scale.z = squashXZ;
      legs.forEach((l, i) => { l.rotation.x = Math.sin(t * 1.5 + i) * 0.03; });
      tail.rotation.x = Math.sin(t * 2.5) * 0.15;
      tailArr.forEach((ta, i) => { ta.rotation.z = -0.3 + Math.sin(t * 3 + i * 0.3) * 0.08; });
      if (maneArr) maneArr.forEach((m, i) => { m.rotation.x = Math.sin(t * 2 + i * 0.4) * 0.04; });
    } else if (state.state === 'walk') {
      const ws = t * 8;
      legs[0].rotation.x = Math.sin(ws) * 0.5;
      legs[1].rotation.x = Math.sin(ws + Math.PI) * 0.5;
      legs[2].rotation.x = Math.sin(ws + Math.PI) * 0.5;
      legs[3].rotation.x = Math.sin(ws) * 0.5;
      legs.forEach(l => { if (l.userData.knee) l.userData.knee.rotation.x = Math.max(0, Math.sin(ws + 1) * 0.3); });
      body.position.y = 2.2 + Math.abs(Math.sin(ws)) * 0.1;
      tail.rotation.x = Math.sin(t * 4) * 0.2;
    } else if (state.state === 'jump') {
      legs.forEach(l => { l.rotation.x = 0.4; if (l.userData.knee) l.userData.knee.rotation.x = -0.3; });
      tail.rotation.x = -0.4;
    } else if (state.state === 'attack') {
      if (state.attackType === 'light') {
        // Front kick - rears up
        const p = Math.min(st / 0.14, 1);
        const recover = st > 0.14 ? Math.min((st - 0.14) / 0.14, 1) : 0;
        const amt = p * (1 - recover);
        body.rotation.z = -0.3 * amt;
        legs[0].rotation.x = -1.3 * amt;
        legs[1].rotation.x = -1.3 * amt;
        legs[2].rotation.x = 0.2 * amt;
        legs[3].rotation.x = 0.2 * amt;
      } else if (state.attackType === 'heavy') {
        // Buck kick
        const p = Math.min(st / 0.25, 1);
        const recover = st > 0.25 ? Math.min((st - 0.25) / 0.25, 1) : 0;
        const amt = p * (1 - recover);
        body.rotation.z = 0.25 * amt;
        legs[2].rotation.x = 1.6 * amt;
        legs[3].rotation.x = 1.6 * amt;
        legs[0].rotation.x = -0.1 * amt;
        legs[1].rotation.x = -0.1 * amt;
      } else if (state.attackType === 'special') {
        // Gallop charge
        const ws = t * 18;
        legs[0].rotation.x = Math.sin(ws) * 1.0;
        legs[1].rotation.x = Math.sin(ws + Math.PI) * 1.0;
        legs[2].rotation.x = Math.sin(ws + Math.PI) * 1.0;
        legs[3].rotation.x = Math.sin(ws) * 1.0;
        legs.forEach(l => { if (l.userData.knee) l.userData.knee.rotation.x = Math.max(0, Math.sin(ws + 1) * 0.5); });
        body.position.y = 2.2 + Math.abs(Math.sin(ws)) * 0.15;
        head.position.y = 3.5;
      }
    } else if (state.state === 'hitstun') {
      body.rotation.z = -0.15;
      legs.forEach(l => { l.rotation.x = -0.1; });
    } else if (state.state === 'ko') {
      const fp = Math.min(st / 0.5, 1);
      model.rotation.z = -Math.PI / 2 * fp * dir;
      model.position.y = state.y - fp * 0.5;
    }
  }

  // ---- PENNYWISE ----
  else if (cid === 'pennywise') {
    const body = d.body, armL = d.armL, armR = d.armR;
    const legL = d.legL, legR = d.legR, head = d.head, hairArr = d.hairArr;

    // Reset
    armL.rotation.set(0, 0, 0);
    armR.rotation.set(0, 0, 0);
    armR.scale.set(1, 1, 1);
    armL.scale.set(1, 1, 1);
    body.rotation.z = 0;
    body.position.y = 2.15;
    legL.rotation.x = 0;
    legR.rotation.x = 0;

    if (state.state === 'idle') {
      body.scale.y = squashY * (1 + Math.sin(t * 1.8) * 0.02);
      body.scale.x = squashXZ;
      body.scale.z = squashXZ;
      armL.rotation.x = Math.sin(t * 1.2) * 0.08;
      armR.rotation.x = Math.sin(t * 1.2 + 0.5) * 0.08;
      armL.rotation.z = 0.1 + Math.sin(t) * 0.03;
      armR.rotation.z = -0.1 - Math.sin(t) * 0.03;
      head.rotation.z = Math.sin(t * 0.7) * 0.04;
      hairArr.forEach((h, i) => { h.rotation.z += Math.sin(t * 2 + i) * 0.001; });
    } else if (state.state === 'walk') {
      const ws = t * 6;
      legL.rotation.x = Math.sin(ws) * 0.4;
      legR.rotation.x = Math.sin(ws + Math.PI) * 0.4;
      armL.rotation.x = Math.sin(ws + Math.PI) * 0.25;
      armR.rotation.x = Math.sin(ws) * 0.25;
      body.position.y = 2.15 + Math.abs(Math.sin(ws)) * 0.06;
    } else if (state.state === 'jump') {
      legL.rotation.x = 0.3;
      legR.rotation.x = 0.3;
      armL.rotation.z = -0.6;
      armR.rotation.z = 0.6;
    } else if (state.state === 'attack') {
      if (state.attackType === 'light') {
        // Claw swipe
        const p = Math.min(st / 0.11, 1);
        const recover = st > 0.11 ? Math.min((st - 0.11) / 0.11, 1) : 0;
        const amt = p * (1 - recover);
        armR.rotation.x = -1.5 * amt;
        armR.rotation.z = -0.3 * amt;
      } else if (state.attackType === 'heavy') {
        // Balloon smash
        const p = Math.min(st / 0.27, 1);
        const recover = st > 0.27 ? Math.min((st - 0.27) / 0.28, 1) : 0;
        const amt = p * (1 - recover);
        armL.rotation.z = -Math.PI / 2 * amt;
        armR.rotation.z = Math.PI / 2 * amt;
        if (p > 0.4 && recover < 0.5) {
          armL.rotation.x = -1 * amt;
          armR.rotation.x = -1 * amt;
        }
      } else if (state.attackType === 'special') {
        // Sewer grab - arm stretches out
        const p = Math.min(st / 0.37, 1);
        const recover = st > 0.37 ? Math.min((st - 0.37) / 0.38, 1) : 0;
        const stretchAmt = p * (1 - recover);
        armR.scale.y = 1 + stretchAmt * 2;
        armR.rotation.x = -1.2 * Math.min(p * 2, 1) * (1 - recover);
      }
    } else if (state.state === 'hitstun') {
      body.rotation.z = 0.1;
      armL.rotation.z = -0.4;
      armR.rotation.z = 0.4;
    } else if (state.state === 'ko') {
      const fp = Math.min(st / 0.5, 1);
      model.rotation.z = -Math.PI / 2 * fp * dir;
      model.position.y = state.y - fp * 0.5;
    }
  }

  // ---- CHIPPY ----
  else if (cid === 'chippy') {
    const body = d.body, armL = d.armL, armR = d.armR;
    const legL = d.legL, legR = d.legR, tail = d.tail, tailArr = d.tailArr;

    // Reset
    armL.rotation.set(0, 0, 0);
    armR.rotation.set(0, 0, 0);
    body.rotation.z = 0;
    body.position.y = 1.2;
    legL.rotation.x = 0;
    legR.rotation.x = 0;
    model.rotation.y = 0;

    if (state.state === 'idle') {
      body.scale.y = squashY * (1 + Math.sin(t * 3) * 0.02);
      body.scale.x = squashXZ;
      body.scale.z = squashXZ;
      armL.rotation.x = Math.sin(t * 2) * 0.1;
      armR.rotation.x = Math.sin(t * 2 + 0.5) * 0.1;
      tail.rotation.z = Math.sin(t * 2.5) * 0.12;
      tailArr.forEach((ta, i) => { ta.rotation.z = Math.sin(t * 3 + i * 0.3) * 0.04; });
    } else if (state.state === 'walk') {
      const ws = t * 12;
      legL.rotation.x = Math.sin(ws) * 0.5;
      legR.rotation.x = Math.sin(ws + Math.PI) * 0.5;
      armL.rotation.x = Math.sin(ws + Math.PI) * 0.3;
      armR.rotation.x = Math.sin(ws) * 0.3;
      body.position.y = 1.2 + Math.abs(Math.sin(ws)) * 0.08;
      tail.rotation.z = Math.sin(ws) * 0.15;
    } else if (state.state === 'jump') {
      legL.rotation.x = 0.4;
      legR.rotation.x = 0.4;
      armL.rotation.z = -0.4;
      armR.rotation.z = 0.4;
      tail.rotation.x = 0.3;
    } else if (state.state === 'attack') {
      if (state.attackType === 'light') {
        // Rapid scratch
        const p = Math.min(st / 0.075, 1);
        const recover = st > 0.075 ? Math.min((st - 0.075) / 0.075, 1) : 0;
        const amt = p * (1 - recover);
        armL.rotation.x = -1.3 * amt;
        armR.rotation.x = -1.3 * amt;
      } else if (state.attackType === 'heavy') {
        // Acorn throw
        const p = Math.min(st / 0.21, 1);
        const recover = st > 0.21 ? Math.min((st - 0.21) / 0.21, 1) : 0;
        const amt = p * (1 - recover);
        armR.rotation.x = -1.5 * amt;
      } else if (state.attackType === 'special') {
        // Tornado spin
        model.rotation.y += dt * 35;
      }
    } else if (state.state === 'hitstun') {
      body.rotation.z = 0.12;
    } else if (state.state === 'ko') {
      const fp = Math.min(st / 0.5, 1);
      model.rotation.z = -Math.PI / 2 * fp * dir;
      model.position.y = state.y - fp * 0.5;
    }
  }

  // ---- CLARK KENT ----
  else if (cid === 'clark') {
    const body = d.body, armL = d.armL, armR = d.armR;
    const legL = d.legL, legR = d.legR, cape = d.cape, capeSegs = d.capeSegs;

    // Reset
    armL.rotation.set(0, 0, 0);
    armR.rotation.set(0, 0, 0);
    body.rotation.z = 0;
    body.position.y = 2.4;
    legL.rotation.x = 0;
    legR.rotation.x = 0;

    // Cape wind physics (always active)
    capeSegs.forEach((s, i) => {
      const windPhase = t * 3 + i * 0.5;
      s.rotation.x = Math.sin(windPhase) * 0.08 * (i + 1);
      s.position.z = -i * 0.04 + Math.sin(windPhase + i) * 0.03 * (i + 1);
      // Extra billow when moving fast
      if (Math.abs(state.vx) > 2 || state.state === 'attack') {
        s.rotation.x += 0.12 * (i + 1);
        s.position.z -= 0.025 * (i + 1);
      }
    });

    if (state.state === 'idle') {
      body.scale.y = squashY * (1 + Math.sin(t * 2) * 0.012);
      body.scale.x = squashXZ;
      body.scale.z = squashXZ;
      armL.rotation.x = Math.sin(t * 1.5) * 0.05;
      armR.rotation.x = Math.sin(t * 1.5 + 0.5) * 0.05;
    } else if (state.state === 'walk') {
      const ws = t * 7;
      legL.rotation.x = Math.sin(ws) * 0.45;
      legR.rotation.x = Math.sin(ws + Math.PI) * 0.45;
      armL.rotation.x = Math.sin(ws + Math.PI) * 0.3;
      armR.rotation.x = Math.sin(ws) * 0.3;
      body.position.y = 2.4 + Math.abs(Math.sin(ws)) * 0.06;
    } else if (state.state === 'jump') {
      legL.rotation.x = 0.3;
      legR.rotation.x = 0.3;
      armL.rotation.z = -0.3;
      armR.rotation.z = 0.3;
    } else if (state.state === 'attack') {
      if (state.attackType === 'light') {
        // Super punch - wind up then smash
        const p = Math.min(st / 0.16, 1);
        const recover = st > 0.16 ? Math.min((st - 0.16) / 0.16, 1) : 0;
        const amt = p * (1 - recover);
        armR.rotation.x = -1.8 * amt;
        armR.rotation.z = -0.2 * amt;
      } else if (state.attackType === 'heavy') {
        // Heat vision - hold pose, eyes glow
        const p = Math.min(st / 0.24, 1);
        const recover = st > 0.24 ? Math.min((st - 0.24) / 0.24, 1) : 0;
        armL.rotation.z = -0.2;
        armR.rotation.z = 0.2;
      } else if (state.attackType === 'special') {
        // Flying tackle
        const p = Math.min(st / 0.36, 1);
        const recover = st > 0.36 ? Math.min((st - 0.36) / 0.36, 1) : 0;
        const amt = p * (1 - recover * 0.5);
        armL.rotation.x = -0.3 * amt;
        armR.rotation.x = -0.3 * amt;
        armL.rotation.z = -0.2 * amt;
        armR.rotation.z = 0.2 * amt;
        legL.rotation.x = 0.2 * amt;
        legR.rotation.x = 0.2 * amt;
        body.rotation.z = -0.3 * dir * amt;
        model.position.y = state.y + 1.5 * Math.sin(Math.min(p, 1) * Math.PI);
      }
    } else if (state.state === 'hitstun') {
      body.rotation.z = 0.1;
      armL.rotation.z = -0.3;
      armR.rotation.z = 0.3;
    } else if (state.state === 'ko') {
      const fp = Math.min(st / 0.5, 1);
      model.rotation.z = -Math.PI / 2 * fp * dir;
      model.position.y = state.y - fp * 0.5;
    }
  }

  // Victory poses
  if (state.victoryPose && state.state !== 'ko') {
    model.rotation.z = 0;
    if (cid === 'horse') {
      d.body.rotation.z = -0.2;
      d.legs[0].rotation.x = -1;
      d.legs[1].rotation.x = -1;
    } else if (cid === 'pennywise') {
      d.armL.rotation.z = -1;
      d.armR.rotation.z = 1;
      d.head.rotation.z = Math.sin(t * 3) * 0.15;
    } else if (cid === 'chippy') {
      model.position.y = state.y + Math.abs(Math.sin(t * 5)) * 0.3;
      d.armL.rotation.z = -0.8;
      d.armR.rotation.z = 0.8;
    } else if (cid === 'clark') {
      model.position.y = state.y + 1.2;
      d.armL.rotation.z = -0.3;
      d.armR.rotation.z = 0.3;
      d.legL.rotation.x = 0.1;
      d.legR.rotation.x = 0.1;
    }
  }
}

// ===================== COMBAT =====================
function applyHit(attacker, victim, atkData, atkType) {
  if (victim.state === 'ko') return;

  const dmg = atkData.dmg;
  victim.hp = Math.max(0, victim.hp - dmg);

  // Hitlag (freeze frames)
  hitlagFrames = atkType === 'special' ? 7 : atkType === 'heavy' ? 5 : 3;

  // Flash white
  victim.flashTimer = 0.08;

  // Knockback
  const kb = atkType === 'special' ? 5.5 : atkType === 'heavy' ? 3.8 : 2.0;
  victim.knockbackVx = attacker.facing * kb;
  victim.vx = 0;

  // Hitstun
  victim.state = 'hitstun';
  victim.stateTime = 0;
  victim.hitstunTime = atkType === 'special' ? 0.5 : atkType === 'heavy' ? 0.35 : 0.18;

  // Screen shake (proportional to damage)
  const shk = atkType === 'special' ? 0.7 : atkType === 'heavy' ? 0.4 : 0.18;
  camShake.x += (Math.random() - 0.5) * shk;
  camShake.y += (Math.random() - 0.5) * shk;

  // Hit particles
  const hitPos = new THREE.Vector3(victim.x, 2.5, 0);
  const pCount = atkType === 'special' ? 22 : atkType === 'heavy' ? 16 : 10;
  spawnParticles(hitPos, 0xffaa00, pCount, 0.4, 0.28);

  // Damage number
  const dmgColor = atkType === 'special' ? '#f44' : atkType === 'heavy' ? '#fa0' : '#ff4';
  showDmgNum(hitPos, dmg, dmgColor);

  // Sound
  playSound(atkType === 'special' ? 'special' : atkType === 'heavy' ? 'heavyHit' : 'lightHit');

  // Special attack visual effects
  const cd = CHARS[attacker.charIdx];

  if (cd.id === 'pennywise' && atkType === 'heavy') {
    // Balloon smash
    const balloon = makeSphere(0.5, 0xff0000, { emissive: 0xff0000, emissiveIntensity: 0.3 });
    balloon.position.set(victim.x, 4.5, 0);
    addTempMesh(balloon, 0.4);
  }

  if (cd.id === 'clark' && atkType === 'heavy') {
    // Heat vision beams
    const beamMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.7 });
    const beamGeo = new THREE.BoxGeometry(0.06, 5, 0.06);
    const beam1 = new THREE.Mesh(beamGeo, beamMat.clone());
    beam1.position.set(attacker.x + attacker.facing * 2.5, 3.95, 0.1);
    beam1.rotation.z = Math.PI / 2 * -attacker.facing;
    addTempMesh(beam1, 0.3);
    const beam2 = new THREE.Mesh(beamGeo, beamMat.clone());
    beam2.position.set(attacker.x + attacker.facing * 2.5, 3.95, -0.1);
    beam2.rotation.z = Math.PI / 2 * -attacker.facing;
    addTempMesh(beam2, 0.3);
  }

  // Check KO
  if (victim.hp <= 0) {
    victim.state = 'ko';
    victim.stateTime = 0;
    playSound('ko');
    camShake.x += 1.2;
    camShake.y += 0.6;
  }
}

// ===================== GAME LOGIC =====================
function updateFighter(state, input, other, dt, t) {
  if (state.state === 'ko') return;
  state.stateTime += dt;

  // Cooldown
  if (state.specialCd > 0) state.specialCd -= dt;

  // Auto-face opponent
  if (state.state !== 'attack' && state.state !== 'hitstun') {
    state.facing = other.x > state.x ? 1 : -1;
  }

  // Hitstun
  if (state.state === 'hitstun') {
    state.hitstunTime -= dt;
    state.knockbackVx *= Math.max(0, 1 - KNOCKBACK_FRICTION * dt);
    state.x += state.knockbackVx * dt * 60;
    if (state.hitstunTime <= 0) {
      state.state = 'idle';
      state.stateTime = 0;
      state.knockbackVx = 0;
    }
    if (!state.grounded) {
      state.vy -= GRAVITY * dt;
      state.y += state.vy * dt;
      if (state.y <= GROUND_Y) {
        state.y = GROUND_Y;
        state.grounded = true;
        state.vy = 0;
        state.squashTimer = 0.12;
      }
    }
    state.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, state.x));
    return;
  }

  // Attack state
  if (state.state === 'attack') {
    const cd = CHARS[state.charIdx];
    const atkData = state.attackType === 'light' ? cd.atkLight :
                    state.attackType === 'heavy' ? cd.atkHeavy : cd.atkSpecial;
    const dur = atkData.dur;

    // Special movement during attack
    if (state.attackType === 'special') {
      if (cd.id === 'horse') { state.x += state.facing * dt * 18; }
      else if (cd.id === 'chippy') { state.x += state.facing * dt * 14; }
      else if (cd.id === 'clark') { state.x += state.facing * dt * 16; state.y = GROUND_Y; }
    }

    // Hit detection (active during 20-80% of attack)
    if (!state.attackHit && state.stateTime > dur * 0.2 && state.stateTime < dur * 0.8) {
      const range = atkData.range;
      const dx = other.x - state.x;
      const facingRight = state.facing > 0;
      if ((facingRight && dx > 0 && dx < range) || (!facingRight && dx < 0 && Math.abs(dx) < range)) {
        if (Math.abs(other.y - state.y) < 2.5) {
          state.attackHit = true;
          applyHit(state, other, atkData, state.attackType);
        }
      }
    }

    // Chippy acorn projectile
    if (cd.id === 'chippy' && state.attackType === 'heavy' && !state._acornFired && state.stateTime > dur * 0.35) {
      state._acornFired = true;
      spawnProjectile(
        new THREE.Vector3(state.x + state.facing * 0.5, 1.8, 0),
        new THREE.Vector3(state.facing, 0, 0),
        0x8B4513, 14, state.playerIdx
      );
      playSound('whoosh');
    }

    // Pennywise balloon spawn
    if (cd.id === 'pennywise' && state.attackType === 'heavy' && !state._balloonFired && state.stateTime > dur * 0.3) {
      state._balloonFired = true;
      // Balloon visual handled on hit
    }

    // Clark heat vision beams (visual handled on hit)
    if (cd.id === 'clark' && state.attackType === 'heavy' && !state._beamsFired && state.stateTime > dur * 0.3) {
      state._beamsFired = true;
    }

    // Dust trail for special attacks
    if (state.attackType === 'special' && Math.random() < 0.5) {
      spawnParticles(
        new THREE.Vector3(state.x - state.facing * 0.5, 0.1, 0),
        0x888888, 2, 0.15, 0.1
      );
    }

    if (state.stateTime >= dur) {
      state.state = 'idle';
      state.stateTime = 0;
      state.attackType = null;
      state.attackHit = false;
      state._acornFired = false;
      state._beamsFired = false;
      state._balloonFired = false;
    }

    // Gravity during air attacks
    if (!state.grounded) {
      state.vy -= GRAVITY * dt;
      state.y += state.vy * dt;
      if (state.y <= GROUND_Y) {
        state.y = GROUND_Y;
        state.grounded = true;
        state.vy = 0;
        state.squashTimer = 0.12;
      }
    }
    state.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, state.x));
    return;
  }

  // Movement
  const walkDir = input.walk;
  if (walkDir !== 0 && state.grounded) {
    state.vx += walkDir * WALK_ACCEL * dt;
    state.vx = Math.max(-WALK_MAX_SPEED, Math.min(WALK_MAX_SPEED, state.vx));
    if (state.state !== 'walk') { state.state = 'walk'; state.stateTime = 0; }
  } else {
    // Friction - snappy stop
    state.vx *= Math.max(0, 1 - 18 * dt);
    if (Math.abs(state.vx) < 0.1) state.vx = 0;
    if (state.grounded && state.state === 'walk') { state.state = 'idle'; state.stateTime = 0; }
  }
  state.x += state.vx * dt;

  // Jump
  if (input.jump && state.grounded) {
    state.vy = JUMP_FORCE;
    state.grounded = false;
    state.state = 'jump';
    state.stateTime = 0;
  }

  // Gravity
  if (!state.grounded) {
    state.vy -= GRAVITY * dt;
    state.y += state.vy * dt;
    if (state.y <= GROUND_Y) {
      state.y = GROUND_Y;
      state.grounded = true;
      state.vy = 0;
      state.squashTimer = 0.12;
      state.state = 'idle';
      state.stateTime = 0;
    }
  }

  // Attacks
  if (input.atk && (state.grounded || state.state === 'jump')) {
    const cd = CHARS[state.charIdx];
    if (input.atk === 'special' && state.specialCd > 0) {
      // On cooldown - do nothing
    } else {
      state.state = 'attack';
      state.stateTime = 0;
      state.attackType = input.atk;
      state.attackHit = false;
      state._acornFired = false;
      state._beamsFired = false;
      state._balloonFired = false;
      if (input.atk === 'special') state.specialCd = cd.atkSpecial.cd || 5;
      playSound('whoosh');
    }
  }

  // Stage bounds
  state.x = Math.max(STAGE_LEFT, Math.min(STAGE_RIGHT, state.x));
}

// Projectile hit check
function checkProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    for (let fi = 0; fi < 2; fi++) {
      if (!fState[fi] || fState[fi].state === 'ko') continue;
      if (fi === p.userData.ownerIdx) continue;
      const dx = Math.abs(p.position.x - fState[fi].x);
      const dy = Math.abs(p.position.y - (fState[fi].y + 1.5));
      if (dx < 1 && dy < 1.5) {
        const atkData = { dmg: 15, dur: 0, range: 0 };
        applyHit(fState[p.userData.ownerIdx], fState[fi], atkData, 'heavy');
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
        projectiles.splice(i, 1);
        break;
      }
    }
  }
}

// ===================== HUD UPDATE =====================
function updateHUD() {
  if (!fState[0] || !fState[1]) return;

  const p1hp = fState[0].hp / fState[0].maxHp * 100;
  const p2hp = fState[1].hp / fState[1].maxHp * 100;
  const h1 = document.getElementById('p1-hp');
  const h2 = document.getElementById('p2-hp');
  h1.style.width = p1hp + '%';
  h2.style.width = p2hp + '%';

  // Color gradient based on HP
  const hpColor = p => {
    if (p > 50) return 'linear-gradient(90deg,#2d2,#4f4)';
    if (p > 25) return 'linear-gradient(90deg,#cc2,#ff4)';
    return 'linear-gradient(90deg,#c22,#f44)';
  };
  h1.style.background = hpColor(p1hp);
  h2.style.background = hpColor(p2hp);

  // Special cooldown bars
  const cd0 = CHARS[fState[0].charIdx].atkSpecial.cd || 5;
  const cd1 = CHARS[fState[1].charIdx].atkSpecial.cd || 5;
  const sp1 = Math.max(0, 1 - fState[0].specialCd / cd0) * 100;
  const sp2 = Math.max(0, 1 - fState[1].specialCd / cd1) * 100;
  document.getElementById('p1-sp').style.width = sp1 + '%';
  document.getElementById('p2-sp').style.width = sp2 + '%';

  document.getElementById('timer').textContent = Math.ceil(roundTimer);
}

// ===================== CAMERA =====================
function updateCamera() {
  if (!fState[0] || !fState[1]) return;

  const mx = (fState[0].x + fState[1].x) / 2;
  const sep = Math.abs(fState[0].x - fState[1].x);
  const targetZ = Math.max(18, sep * 1.2 + 14);

  baseCamPos.x += (mx - baseCamPos.x) * 0.08;
  baseCamPos.z += (targetZ - baseCamPos.z) * 0.05;
  baseCamPos.y += (3.5 - baseCamPos.y) * 0.05;

  // Screen shake decay
  camShake.x *= camShake.decay;
  camShake.y *= camShake.decay;

  camera.position.set(
    baseCamPos.x + camShake.x,
    baseCamPos.y + camShake.y,
    baseCamPos.z
  );
  camera.lookAt(baseCamPos.x, 2.2, 0);

  // KO dramatic zoom
  if (fState[0].state === 'ko' || fState[1].state === 'ko') {
    const ko = fState[0].state === 'ko' ? fState[0] : fState[1];
    baseCamPos.x += (ko.x - baseCamPos.x) * 0.1;
    baseCamPos.z += (14 - baseCamPos.z) * 0.04;
  }
}

function updateParallax() {
  if (!stageGroup || !stageGroup.userData.bgGroup) return;
  stageGroup.userData.bgGroup.position.x = -camera.position.x * 0.15;
}

// ===================== ROUND MANAGEMENT =====================
let roundPhase = 'pre'; // pre, fight, end

function startRound() {
  roundPhase = 'pre';
  roundTimer = 60;

  fState[0] = createFighterState(p1Pick, 0);
  fState[1] = createFighterState(p2Pick, 1);

  fighters.forEach((f, i) => {
    f.position.set(fState[i].x, fState[i].y, 0);
    f.rotation.set(0, 0, 0);
    f.scale.set(fState[i].facing, 1, 1);
    f.traverse(c => {
      if (c.isMesh && c.userData.origMat) {
        c.material = c.userData.origMat;
        delete c.userData.origMat;
      }
    });
  });

  updateHUD();
  document.getElementById('round-lbl').textContent = 'Round ' + currentRound;
  updateRoundDots();

  announce('Round ' + currentRound, 1200);
  setTimeout(() => {
    announce('FIGHT!', 800, '#f44');
    playSound('bell');
    roundPhase = 'fight';
  }, 1400);
}

function updateRoundDots() {
  const el = document.getElementById('round-dots');
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'round-dot' + (i < roundWins[0] ? ' w1' : '');
    el.appendChild(d);
  }
  const spacer = document.createElement('div');
  spacer.style.width = '10px';
  el.appendChild(spacer);
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'round-dot' + (i < roundWins[1] ? ' w2' : '');
    el.appendChild(d);
  }
}

function endRound(winner) {
  roundPhase = 'end';
  roundWins[winner]++;
  updateRoundDots();

  if (roundWins[winner] >= 2) {
    // Match over
    setTimeout(() => {
      gameMode = 'victory';
      document.getElementById('hud').style.display = 'none';
      document.getElementById('mobile-controls').style.display = 'none';

      const vs = document.getElementById('victory-screen');
      vs.classList.add('active');
      document.getElementById('vic-text').textContent = CHARS[winner === 0 ? p1Pick : p2Pick].name + ' WINS!';
      document.getElementById('vic-sub').textContent = roundWins[0] + ' - ' + roundWins[1];

      fState[winner].victoryPose = true;
      fState[winner].state = 'idle';
      fState[winner].stateTime = 0;

      playSound('bell');
      setTimeout(() => stopMusic(), 500);
    }, 2000);
  } else {
    currentRound++;
    setTimeout(() => startRound(), 2000);
  }
}

// ===================== PREVIEW RENDERING =====================
function createPreview(builder, container) {
  const canvas = document.createElement('canvas');
  canvas.width = 240;
  canvas.height = 240;
  container.appendChild(canvas);

  const pr = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  pr.setSize(240, 240);
  pr.setClearColor(0x000000, 0);

  const sc = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
  cam.position.set(0, 3, 12);
  cam.lookAt(0, 2, 0);

  sc.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dl = new THREE.DirectionalLight(0xffeedd, 1.0);
  dl.position.set(3, 8, 5);
  sc.add(dl);

  const ch = builder();
  sc.add(ch);

  return { pr, sc, cam, ch, canvas };
}

// ===================== SCREEN MANAGEMENT =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

// Title buttons
document.getElementById('btn-1p').addEventListener('click', () => {
  isCPU = true;
  ensureAudio();
  gotoSelect();
});
document.getElementById('btn-2p').addEventListener('click', () => {
  isCPU = false;
  ensureAudio();
  gotoSelect();
});

function gotoSelect() {
  showScreen('select-screen');
  gameMode = 'select';
  p1Pick = -1;
  p2Pick = -1;
  document.getElementById('pick-p1').textContent = 'P1: ---';
  document.getElementById('pick-p2').textContent = 'P2: ---';
  document.getElementById('sel-info').textContent = 'Player 1 -- pick your fighter';
  document.getElementById('btn-fight').style.display = 'none';
  buildSelectGrid();
}

function buildSelectGrid() {
  const grid = document.getElementById('sel-grid');
  grid.innerHTML = '';

  // Clean up old previews
  previewRenderers.forEach(pr => { pr.pr.dispose(); });
  previewRenderers = [];

  CHARS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.idx = i;

    const prev = createPreview(BUILDERS[c.id], card);
    previewRenderers.push(prev);

    const name = document.createElement('div');
    name.className = 'cc-name';
    name.textContent = c.emoji + ' ' + c.name;
    card.appendChild(name);

    const stats = document.createElement('div');
    stats.className = 'cc-stats';
    stats.textContent = 'HP:' + c.hp + '  SPD:' + c.speed;
    card.appendChild(stats);

    card.addEventListener('click', () => selectChar(i));
    grid.appendChild(card);
  });
}

function selectChar(idx) {
  if (p1Pick < 0) {
    p1Pick = idx;
    document.getElementById('pick-p1').textContent = 'P1: ' + CHARS[idx].name;
    document.querySelectorAll('.char-card')[idx].classList.add('sel1');

    if (isCPU) {
      // CPU picks random different character
      let ci;
      do { ci = Math.floor(Math.random() * CHARS.length); } while (ci === idx);
      p2Pick = ci;
      document.getElementById('pick-p2').textContent = 'P2: ' + CHARS[ci].name;
      document.querySelectorAll('.char-card')[ci].classList.add('sel2');
      document.getElementById('sel-info').textContent = 'Ready!';
      document.getElementById('btn-fight').style.display = 'inline-block';
    } else {
      document.getElementById('sel-info').textContent = 'Player 2 -- pick your fighter';
    }
  } else if (p2Pick < 0 && !isCPU) {
    p2Pick = idx;
    document.getElementById('pick-p2').textContent = 'P2: ' + CHARS[idx].name;
    document.querySelectorAll('.char-card')[idx].classList.add('sel2');
    document.getElementById('sel-info').textContent = 'Ready!';
    document.getElementById('btn-fight').style.display = 'inline-block';
  }
}

document.getElementById('btn-fight').addEventListener('click', () => {
  if (p1Pick < 0 || p2Pick < 0) return;
  startFight();
});

function startFight() {
  showScreen('');
  gameMode = 'fight';
  document.getElementById('hud').style.display = 'block';

  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  if (isMobile) document.getElementById('mobile-controls').style.display = 'block';

  // Clear old fighters
  fighters.forEach(f => { if (f) scene.remove(f); });

  fighters[0] = BUILDERS[CHARS[p1Pick].id]();
  fighters[1] = BUILDERS[CHARS[p2Pick].id]();
  scene.add(fighters[0]);
  scene.add(fighters[1]);

  document.getElementById('p1-name').textContent = CHARS[p1Pick].name;
  document.getElementById('p2-name').textContent = CHARS[p2Pick].name;

  roundWins = [0, 0];
  currentRound = 1;

  if (!stageGroup) buildStage();

  ensureAudio();
  startMusic();
  startRound();
}

// Victory / rematch
document.getElementById('btn-rematch').addEventListener('click', () => {
  showScreen('');
  startFight();
});
document.getElementById('btn-menu').addEventListener('click', () => {
  stopMusic();
  gameMode = 'title';
  showScreen('title-screen');
  fighters.forEach(f => { if (f) scene.remove(f); });
  fighters = [null, null];
  fState = [null, null];
  document.getElementById('hud').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
});

// ===================== MAIN LOOP =====================
const clock = new THREE.Clock();

function gameLoop() {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // Preview rotation on select screen
  if (gameMode === 'select') {
    previewRenderers.forEach(pr => {
      pr.ch.rotation.y = t * 0.8;
      pr.pr.render(pr.sc, pr.cam);
    });
  }

  // Fight logic
  if (gameMode === 'fight' && roundPhase === 'fight') {
    // Hitlag freeze
    if (hitlagFrames > 0) {
      hitlagFrames--;
      renderer.render(scene, camera);
      clearInputs();
      return;
    }

    // Get input
    const p1In = getP1Input();
    const p2In = isCPU ? getCPUInput(fState[1], fState[0]) : getP2Input();

    if (fState[0].state !== 'ko' && fState[1].state !== 'ko') {
      updateFighter(fState[0], p1In, fState[1], dt, t);
      updateFighter(fState[1], p2In, fState[0], dt, t);
      checkProjectiles();

      // Timer
      roundTimer -= dt;
      if (roundTimer <= 0) {
        roundTimer = 0;
        if (fState[0].hp > fState[1].hp) {
          fState[1].state = 'ko';
          fState[1].stateTime = 0;
          endRound(0);
        } else if (fState[1].hp > fState[0].hp) {
          fState[0].state = 'ko';
          fState[0].stateTime = 0;
          endRound(1);
        } else {
          endRound(0); // draw goes to P1
        }
      }

      // Check KO
      if (fState[0].state === 'ko' && roundPhase === 'fight') endRound(1);
      if (fState[1].state === 'ko' && roundPhase === 'fight') endRound(0);
    } else {
      // KO animation continues
      fState[0].stateTime += dt;
      fState[1].stateTime += dt;
    }

    updateHUD();
    updateCamera();
    updateParallax();
  }

  // Animate characters (always when in fight or victory)
  if (gameMode === 'fight' || gameMode === 'victory') {
    fighters.forEach((f, i) => {
      if (f && fState[i]) animateChar(f, fState[i], dt, t);
    });
  }

  // Update particles, projectiles, temp meshes
  updateParticles(dt);
  updateProjectiles(dt);
  updateTempMeshes(dt);

  // Clear one-shot inputs at end of frame
  clearInputs();

  renderer.render(scene, camera);
}

// ===================== INIT =====================
buildStage();
requestAnimationFrame(gameLoop);

// Prevent scroll on mobile
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
