<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥨 The Seinfeld Drinking Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0a08;--surface:#1a1208;--accent:#e8a838;--green:#4ade80;--gold:#f5c842;--text:#ffffff;--red:#e84444;--warm:#c47a20}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;min-height:100vh;overflow-y:auto;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);opacity:0.5}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.4) 100%)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(255,255,255,0.6);font-size:13px;margin-top:4px;font-style:italic}
.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(255,255,255,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(232,232,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:#e8862a;color:#000}
.badge-4{background:var(--red);color:#fff}
.category{font-size:13px;color:rgba(232,232,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,0.2);border-color:#ef4444;color:#ef4444}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(232,168,56,0.3)}50%{text-shadow:0 0 12px rgba(232,168,56,0.7)}100%{text-shadow:0 0 4px rgba(232,168,56,0.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{0%{transform:scale(1);color:#fff}50%{transform:scale(1.3);color:var(--accent)}100%{transform:scale(1);color:#fff}}
.opt-btn{animation:cardIn 0.3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:0.07s}
.opt-btn:nth-child(3){animation-delay:0.14s}
.opt-btn:nth-child(4){animation-delay:0.21s}
.opt-btn.correct{animation:correctPop 0.35s ease}
.opt-btn.wrong{animation:wrongShake 0.4s ease}
.streak-fire{animation:streakFire 1.5s ease-in-out infinite}
.score-pop{animation:scoreUp 0.4s ease}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(232,232,240,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(232,232,240,0.7)}
.start-btn{width:100%;min-height:48px;padding:12px;margin-top:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.start-btn:hover{opacity:0.9}
.hidden{display:none!important}
@keyframes fireBorder{0%{border-color:var(--accent);box-shadow:0 0 8px rgba(232,168,56,0.4)}50%{border-color:#f5d280;box-shadow:0 0 18px rgba(245,210,128,0.6)}100%{border-color:var(--accent);box-shadow:0 0 8px rgba(232,168,56,0.4)}}
@keyframes warmPulse{0%{background:var(--bg)}50%{background:#2a1a08}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}
body.streak-pulse{animation:warmPulse 3s ease-in-out infinite}
body.streak-shake{animation:screenShake 0.4s ease}
.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:18px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
.fact-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(232,232,240,0.85);line-height:1.5}
.fact-card .fact-emoji{font-size:22px;flex-shrink:0;line-height:1.3}
.sound-toggle{background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:18px;cursor:pointer;padding:2px 7px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}
.start-hero{font-size:56px;line-height:1;margin-bottom:8px}
.start-high-score{font-size:22px;color:var(--green);font-weight:700;margin:8px 0}
.accuracy-bar-wrap{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin:6px 0 4px}
.accuracy-bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.grade-badge{display:inline-block;font-size:36px;font-weight:900;padding:6px 20px;border-radius:12px;margin:10px 0}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(232,168,56,0.1)}
.sip-counter{display:inline-flex;align-items:center;gap:6px;background:rgba(232,168,56,0.15);border:1px solid rgba(232,168,56,0.3);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:13px;color:var(--accent);font-weight:600;-webkit-tap-highlight-color:transparent;user-select:none}
.sip-counter:active{transform:scale(0.95)}
.dd-toggle{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:12px;color:rgba(232,232,240,0.6);-webkit-tap-highlight-color:transparent;user-select:none}
.dd-toggle.active{border-color:var(--green);color:var(--green)}
.rules-box{background:rgba(232,168,56,0.08);border:1px solid rgba(232,168,56,0.2);border-radius:10px;padding:14px;margin:12px 0;text-align:left;font-size:13px;line-height:1.7;color:rgba(255,255,255,0.8)}
.rules-box strong{color:var(--accent)}
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@media(min-width:800px){
body{height:100vh;overflow:hidden}
.container{max-width:100%;padding:4px 24px}
header{padding:2px 0}
header h1{font-size:16px;letter-spacing:1px}
header .subtitle{display:none}
.notice{display:none}
.home-link{font-size:13px;min-height:28px;line-height:28px;padding:2px 0}
.score-bar{padding:3px 10px;margin-bottom:4px;font-size:12px}
.progress-bar-wrap{height:3px;margin-bottom:4px}
.q-header{margin-bottom:2px}
.q-number{font-size:12px}
.badge{font-size:10px;padding:1px 8px;margin:0 4px}
.category{font-size:11px}
.question-text{font-size:15px;margin:4px 0 8px;line-height:1.3}
.options{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{min-height:32px;padding:6px 10px;font-size:13px;line-height:1.2}
.next-btn{min-height:36px;padding:8px;font-size:14px;margin-top:6px}
.feedback{margin-top:6px;padding:6px 10px}
.feedback h3{font-size:14px;margin-bottom:2px}
.fact-card{padding:4px 8px;margin-top:4px;font-size:12px;gap:6px;line-height:1.3}
.fact-card .fact-emoji{font-size:16px}
.start-screen{padding:8px 0}
.start-hero{font-size:36px}
.start-screen p{font-size:13px;margin:6px 0}
.start-btn{min-height:40px;padding:10px;font-size:15px}
.end-screen{padding:10px 0}
.end-screen h2{font-size:22px}
.end-screen .final-score{font-size:36px;margin:8px 0}
.stats-grid{gap:6px;margin:8px 0}
.stat-card{padding:8px}
.stat-card .val{font-size:18px}
}
</style>
</head>
<body>
<div class="container">
<header>
<h1>THE SEINFELD DRINKING GAME</h1>
<div class="subtitle">A game about nothing... and drinking</div>
</header>
<div id="app"></div>
</div>

<script>
const Q=[
// ===== EASY (d:1) =====
{q:"What is Jerry Seinfeld's profession?",o:["Actor","Comedian","Writer","Producer"],a:1,d:1,cat:"characters",fact:"Jerry plays a fictionalized version of himself throughout the series."},
{q:"What is Kramer's first name?",o:["Kevin","Cosmo","Martin","Harold"],a:1,d:1,cat:"characters",fact:"His first name wasn't revealed until Season 6, Episode 'The Switch.'"},
{q:"What does Newman do for a living?",o:["Bus driver","Mailman","Janitor","Accountant"],a:1,d:1,cat:"characters",fact:"Newman works for the United States Postal Service, and he is not happy about it."},
{q:"What holiday did Frank Costanza invent?",o:["Kwanzaa","Festivus","Thanksmas","Cranksgiving"],a:1,d:1,cat:"festivus",fact:"Festivus is celebrated on December 23rd and features the Airing of Grievances and Feats of Strength."},
{q:"What is George's last name?",o:["Vandelay","Steinbrenner","Costanza","Benes"],a:2,d:1,cat:"characters",fact:"George Louis Costanza, played by Jason Alexander, is based on Larry David."},
{q:"What is Elaine's last name?",o:["Costanza","Seinfeld","Benes","Peterman"],a:2,d:1,cat:"characters",fact:"Elaine Marie Benes is Jerry's ex-girlfriend turned best friend."},
{q:"What is the name of the restaurant where the gang always hangs out?",o:["Central Perk","Monk's Cafe","Pop's Diner","The Soup Stand"],a:1,d:1,cat:"places",fact:"Monk's Cafe is based on Tom's Restaurant at 2880 Broadway in NYC."},
{q:"Who is Jerry's arch-nemesis?",o:["George","Kramer","Newman","Tim Whatley"],a:2,d:1,cat:"characters",fact:"'Hello, Newman' became one of the show's most iconic catchphrases."},
{q:"What sport does Puddy paint his face for?",o:["New York Jets game","New York Rangers game","New Jersey Devils game","New York Knicks game"],a:2,d:1,cat:"episodes",fact:"Puddy paints a big D on his chest and his face in Devils colors."},
{q:"What is the fake company name George uses as a reference?",o:["Kramerica Industries","Vandelay Industries","Costanza & Sons","Pendant Publishing"],a:1,d:1,cat:"running gags",fact:"Vandelay Industries is an importer/exporter, or sometimes a latex manufacturer."},
{q:"What candy does Kramer drop into a patient during surgery?",o:["M&M","Skittles","Junior Mint","Tic Tac"],a:2,d:1,cat:"episodes",fact:"The Junior Mint bounced around inside the patient but he made a full recovery."},
{q:"What does Jerry's apartment number change to during the series?",o:["4A to 5A","5A to 5B","3A to 5A","7B to 7A"],a:2,d:1,cat:"trivia",fact:"The apartment number changed between seasons without explanation."},
{q:"What is the name of Elaine's eccentric boss at the catalog company?",o:["Mr. Lippman","J. Peterman","Mr. Kruger","Mr. Pitt"],a:1,d:1,cat:"characters",fact:"J. Peterman is based on a real person and a real catalog company."},
{q:"What does Kramer slide through to enter Jerry's apartment?",o:["A window","The fire escape","The door","A hole in the wall"],a:2,d:1,cat:"running gags",fact:"Kramer's sliding door entrance became one of the most recognizable physical gags in TV history."},
{q:"What game does the gang play that Elaine's boyfriend obsesses over?",o:["Monopoly","Chess","Risk","Trivial Pursuit"],a:2,d:1,cat:"episodes",fact:"The Ukraine is NOT weak! Elaine's boyfriend takes the board game way too seriously."},
{q:"Who is 'The Soup Nazi'?",o:["A mean waiter","A strict soup vendor","Newman's boss","Jerry's neighbor"],a:1,d:1,cat:"episodes",fact:"The character is based on real NYC soup vendor Al Yeganeh, who was not pleased about it."},
{q:"What phrase does the Soup Nazi say to refuse service?",o:["Get out!","You're banned!","No soup for you!","Soup's off!"],a:2,d:1,cat:"quotes",fact:"'No soup for you!' became one of the most quoted lines in television history."},
{q:"What is George pretending to be when he says 'The sea was angry that day, my friends'?",o:["A pirate","A marine biologist","A lifeguard","A fisherman"],a:1,d:1,cat:"episodes",fact:"George pulls a golf ball out of a whale's blowhole in one of the show's greatest scenes."},
{q:"DRINK CHECK: Everyone who has ever double-dipped a chip — take a sip!",o:["I double-dip with pride!","Never! That's like putting your mouth in the dip!","Only when nobody's looking","George taught me well"],a:0,d:1,cat:"drink check",fact:"According to George, it's like putting your whole mouth right in the dip!"},
{q:"How many seasons did Seinfeld run?",o:["7","8","9","10"],a:2,d:1,cat:"trivia",fact:"Seinfeld ran from July 5, 1989 to May 14, 1998."},
// ===== MEDIUM (d:2) =====
{q:"What alias does George frequently use?",o:["Buck Naked","Art Vandelay","H.E. Pennypacker","Kel Varnsen"],a:1,d:2,cat:"running gags",fact:"Art Vandelay is George's go-to fake identity, usually an importer/exporter or architect."},
{q:"What is the name of the contest the gang has about 'master of your domain'?",o:["The Bet","The Contest","The Challenge","The Wager"],a:1,d:2,cat:"episodes",fact:"'The Contest' is widely considered one of the greatest sitcom episodes ever written."},
{q:"What job does George pretend to have at Vandelay Industries?",o:["Architect","Lawyer","Importer/Exporter","Marine biologist"],a:2,d:2,cat:"running gags",fact:"George alternates between saying he imports and exports, often latex."},
{q:"What does Kramer install in his shower?",o:["A TV","A garbage disposal","A phone","A blender"],a:1,d:2,cat:"episodes",fact:"Kramer prepares food in the shower to save time. Efficiency!"},
{q:"What is the name of Elaine's terrible dancing style?",o:["The Wiggle","The Elaine","The Little Kicks","The Dry Heave"],a:2,d:2,cat:"episodes",fact:"George describes it as 'a full-body dry heave set to music.'"},
{q:"What is Kramer's failed coffee table book about?",o:["New York City apartments","Coffee tables","The Merv Griffin Show","Famous doors of NYC"],a:1,d:2,cat:"episodes",fact:"It's a coffee table book about coffee tables that folds out INTO a coffee table."},
{q:"Who said: 'These pretzels are making me thirsty'?",o:["Only Kramer","Everyone in the group says it","Only Jerry","Only George"],a:1,d:2,cat:"quotes",fact:"Each member of the gang delivers the line with their own unique reading."},
{q:"What is George's ATM code?",o:["1234","Bosco","7726","Jeter"],a:1,d:2,cat:"trivia",fact:"Bosco is a chocolate syrup brand. George's mother finds out and is horrified."},
{q:"What does Jerry refuse to do because his girlfriend ate from the trash?",o:["Date her","Kiss her","Hold her hand","Share food with her"],a:1,d:2,cat:"episodes",fact:"Jerry sees her eating a chocolate eclair from the top of the garbage."},
{q:"DRINK CHECK: If you've ever pretended to be busy at work — drink! (Costanza special)",o:["I look annoyed so people think I'm busy","I always have a spreadsheet open","George is my spirit animal","I actually work hard... sometimes"],a:0,d:2,cat:"drink check",fact:"George perfected the art of looking annoyed to appear busy. A true pioneer."},
{q:"What does Frank Costanza scream when he's stressed?",o:["Festivus forever!","Serenity now!","Hoochie mama!","All of these"],a:3,d:2,cat:"quotes",fact:"Frank screams both 'Serenity now!' and 'Hoochie mama!' at various points. He's a complex man."},
{q:"What show does Kramer recreate in his apartment?",o:["The Tonight Show","Wheel of Fortune","The Merv Griffin Show","Jeopardy"],a:2,d:2,cat:"episodes",fact:"Kramer finds the actual Merv Griffin Show set in a dumpster and conducts interviews with guests."},
{q:"What is 'shrinkage' referring to in the famous pool scene?",o:["Laundry","George's ego","The cold water effect on the male body","The pool itself"],a:2,d:2,cat:"episodes",fact:"'I was in the pool! I WAS IN THE POOL!' - George, explaining himself to a woman."},
{q:"Who is the 'close talker'?",o:["Newman","Elaine's boyfriend Aaron","Jerry's dentist","George's boss"],a:1,d:2,cat:"episodes",fact:"Aaron stands uncomfortably close when speaking to anyone, especially Jerry's parents."},
{q:"What does George do to retrieve the marble rye from the old couple?",o:["Knocks on their door","Uses a fishing pole from the street","Climbs through a window","Sends Kramer"],a:1,d:2,cat:"episodes",fact:"George steals a marble rye from an old woman and hoists it up to the window with a fishing line."},
{q:"What does Elaine's boss Mr. Pitt eat his Snickers bar with?",o:["Chopsticks","A knife and fork","A spoon","Gloves"],a:1,d:2,cat:"episodes",fact:"This started a trend of people eating candy bars with utensils."},
{q:"What is George's answer when asked 'What do you do?'",o:["I'm an architect","I'm with Vandelay Industries","I'm unemployed and I live with my parents","I'm an importer"],a:2,d:2,cat:"quotes",fact:"George eventually gets honest: 'I'm unemployed and I live with my parents.'"},
{q:"DRINK CHECK: Anyone who has a 'close talker' in their life — sip!",o:["I am the close talker","I know one and I hate it","Personal space is sacred","Aaron? Is that you?"],a:0,d:2,cat:"drink check",fact:"Close talkers exist everywhere. There is no escape."},
{q:"What is the name of Kramer's friend who always gets mentioned but rarely appears?",o:["Bob Sacamano","Lomez","Both of them","Art Vandelay"],a:2,d:2,cat:"characters",fact:"Bob Sacamano and Lomez are Kramer's mysterious off-screen friends with bizarre stories."},

// ===== TTS NARRATION (Two voices) =====
var announceOn=true;
function getVoices(){return speechSynthesis.getVoices();}
function findVoice(names,exclude){
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].lang.startsWith('en')&&voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];
  }
}
// Fallback
for(var vi2=0;vi2<voices.length;vi2++){
  if(voices[vi2].lang.startsWith('en')){
    if(exclude==='male'&&!voices[vi2].name.toLowerCase().match(/daniel|alex|aaron|fred|james|tom|david/))return voices[vi2];
    if(exclude==='female'&&voices[vi2].name.toLowerCase().match(/daniel|alex|aaron|fred|james|tom|david/))return voices[vi2];
    if(!exclude)return voices[vi2];
  }
}
return null;
}

// Voice 1: "The Announcer" - reads questions (calm, NPR-style, female)
function readQuestion(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
try{speechSynthesis.cancel();setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);
u.rate=0.9;u.pitch=1.0;u.volume=0.7;
var v=findVoice(['samantha','victoria','karen','kate','zoe','tessa','fiona','moira','female','woman'],'male');
if(v)u.voice=v;
speechSynthesis.speak(u);},80);}catch(e){}
}

// Voice 2: "Newman" - the reactor (dramatic, sarcastic, male, deeper)
var _speaking=false;
function announce(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
_speaking=true;
try{setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);
u.rate=0.85;u.pitch=0.9;u.volume=0.8;
var v=findVoice(['daniel','alex','aaron','fred','james','tom','david'],'female');
if(v)u.voice=v;
u.onend=function(){_speaking=false;enableNextBtn();};
u.onerror=function(){_speaking=false;enableNextBtn();};
speechSynthesis.speak(u);
setTimeout(function(){_speaking=false;enableNextBtn();},6000);
},500);}catch(e){_speaking=false;enableNextBtn();}
}

function renderQ(){
if(state.qi>=activeQ.length){renderEnd();return;}
var q=activeQ[state.qi];
var d=q.d;
var isDrinkCheck=q.cat==='drink check';
var isFestivus=q.cat==='festivus';
readQuestion(q.q);
var progPct=Math.round((state.qi/activeQ.length)*100);
var progColors={1:'var(--green)',2:'#f5c842',3:'#e8862a',4:'var(--red)'};
var progColor=progColors[d]||'var(--accent)';
var streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
document.body.classList.toggle('streak-pulse',state.streak>=5);
var catLabel=q.cat;
if(isFestivus)catLabel='🎄 festivus';
if(isDrinkCheck)catLabel='🍺 drink check';

'<div class="'+streakBarClass+'" style="position:relative">'+
'<span>Score: <strong>'+state.score+'</strong></span>'+
'<span class="streak-fire">'+(state.streak>=3?"🔥 ":"")+'Streak: '+state.streak+'</span>'+

'</div>'+
'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+progPct+'%;background:'+progColor+'"></div></div>'+

'<span class="q-number">Question '+(state.qi+1)+'</span>'+
'<span class="badge '+DIFF_CLASSES[d]+'">'+DIFF_LABELS[d]+'</span>'+

'</div>'+

'</div>'+

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
var q=activeQ[state.qi];
var isDrinkCheck=q.cat==='drink check';
var isFestivus=q.cat==='festivus';
var correct=isDrinkCheck?true:(idx===q.a);
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){
b.disabled=true;
var i=parseInt(b.dataset.i);
if(isDrinkCheck){if(i===idx)b.classList.add("correct");}
else{
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
}
});

var drinkMsg="";
if(correct){
state.correct++;
state.streak++;
state.wrongStreak=0;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
var pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');drinkMsg='<p style="color:var(--accent);font-weight:700">🍻 Give out 3 sips to others!</p>';}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(isDrinkCheck){
drinkMsg='<p style="color:var(--accent);font-weight:700">🍺 Drink check! Follow the instructions above!</p>';
announce("Drink check! You know the rules!");
playCorrect();
}else if(isFestivus&&correct){
drinkMsg='<p style="color:var(--green);font-weight:700">🎄 FESTIVUS! Everyone ELSE drinks!</p>';
announce("A Festivus miracle! Everyone else, take a sip!");
playStreak();
}else if(state.streak>=3){
playStreak();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)]);
}else{
playCorrect();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);
}
}else{
state.wrong++;
state.streak=0;
state.wrongStreak++;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrong();
// Drinking penalties
state.sips++;
if(q.d===4){
drinkMsg='<p style="color:var(--red);font-weight:700">💀 Expert question wrong! '+getDrinkAction('finish')+'!</p>';
state.sips+=2;
}else if(state.wrongStreak>=3){
drinkMsg='<p style="color:var(--red);font-weight:700">🍻 3 wrong in a row! '+getDrinkAction('big sip')+'!</p>';
state.sips++;
}else{
drinkMsg='<p style="color:var(--accent)">🍺 '+getDrinkAction('sip')+'!</p>';
}
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}
// Update sip counter
var sc=document.getElementById('sip-counter');
if(sc)sc.innerHTML='🍺 '+state.sips+' sips';

var fb=document.getElementById("feedback");
fb.innerHTML=
'<div class="feedback '+(correct?"correct-fb":"wrong-fb")+'">'+
'<h3>'+(correct?(isDrinkCheck?"Cheers!":(state.streak>=3?" 🔥 Streak x"+state.streak+"! Correct!":"Correct!")):"Wrong!")+'</h3>'+
(!correct&&!isDrinkCheck?'<p>The answer was: <strong>'+q.o[q.a]+'</strong></p>':"")+
(state.streak>=3&&correct&&!isDrinkCheck?'<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>':"")+
drinkMsg+
'<div class="fact-card"><span class="fact-emoji">🥨</span><span>'+q.fact+'</span></div>'+
'</div>'+
'<button class="next-btn" id="next-btn" '+(_speaking?'disabled style="opacity:0.4"':'')+'>'+(state.qi+1>=activeQ.length?"See Results":"Next Question →")+'</button>';
var nb=document.getElementById("next-btn");
nb.onclick=function(){
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function getSipRating(sips){
if(sips<=3)return{emoji:"🤔",text:"Are you even playing? Newman is disappointed."};
if(sips<=8)return{emoji:"😏",text:"Casual sipper. Jerry would approve of your restraint."};
if(sips<=15)return{emoji:"🍻",text:"Solid performance! You're sponge-worthy."};
if(sips<=25)return{emoji:"🤪",text:"George Costanza levels of commitment. Impressive."};
if(sips<=40)return{emoji:"😵",text:"You're the master of your domain... barely."};
return{emoji:"💀",text:"SERENITY NOW! You might need Kramer's coffee table to lie on."};
}
