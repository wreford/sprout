<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Do You Want a Balloon?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;overflow:hidden;font-family:'Lora',Georgia,'Times New Roman',serif;user-select:none;-webkit-user-select:none}
canvas{display:block;cursor:pointer}
#textBox{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  width:88%;max-width:680px;
  background:rgba(10,8,16,0.72);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  color:#f0ece4;font-size:19px;padding:22px 28px;
  padding-bottom:calc(22px + env(safe-area-inset-bottom));
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  line-height:1.7;min-height:60px;pointer-events:none;z-index:50;display:none;
  font-family:'Lora',Georgia,serif;
  letter-spacing:0.01em;
  text-shadow:0 1px 3px rgba(0,0,0,0.3);
}
#textBox .bold{font-weight:700;color:#ffd54f}
#textBox .scary{font-weight:700;color:#ef5350;text-shadow:0 0 8px rgba(239,83,80,0.4)}
#textBox .italic{font-style:italic;color:#b0bec5}
#prompt{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:rgba(200,195,185,0.6);font-size:12px;font-family:'Lora',Georgia,serif;letter-spacing:0.08em;z-index:51;display:none;animation:blink 1.8s ease-in-out infinite;padding-bottom:env(safe-area-inset-bottom)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#playAgain{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:14px 40px;font-size:18px;font-family:'Lora',Georgia,serif;background:rgba(211,47,47,0.9);color:#fff;border:none;border-radius:24px;cursor:pointer;z-index:60;display:none;letter-spacing:0.05em;box-shadow:0 4px 20px rgba(211,47,47,0.4);transition:all 0.3s}
#playAgain:hover{background:rgba(229,57,53,1);box-shadow:0 6px 28px rgba(229,57,53,0.6);transform:translateX(-50%) scale(1.05)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="textBox"></div>
<div id="prompt">tap to continue</div>
<button id="playAgain">Read Again</button>
<script>
var C=document.getElementById('c'),ctx=C.getContext('2d');
var textBox=document.getElementById('textBox');
var promptEl=document.getElementById('prompt');
var playAgainBtn=document.getElementById('playAgain');
var W,H,t=0,scene=0,sceneTime=0,typing=false,typeText='',typeIdx=0,typeTimer=0;
var waitingForClick=false,shakeX=0,shakeY=0,transitioning=false,transAlpha=0,transDir=1;
var nextScene=-1,audioCtx=null;
var SCALE=1;

// Line-by-line mode state
var lineByLineMode=false,linePause=1200,lineByLinePausing=false,linePauseTimer=0;

function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;SCALE=Math.min(W,H)/500;}
window.addEventListener('resize',resize);resize();

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

// ========== AUDIO ==========
function playNeigh(){
  initAudio();
  var ac=audioCtx,now=ac.currentTime;
  // More natural neigh: breathy noise + formant-shaped oscillator sweep
  var buf=ac.createBuffer(1,ac.sampleRate*0.5,ac.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++){
    var env=Math.exp(-i/(d.length*0.4));
    var vibrato=Math.sin(i/ac.sampleRate*2*Math.PI*6)*0.3;
    d[i]=(Math.random()*2-1)*0.15*env*(1+vibrato);
  }
  var noiseSrc=ac.createBufferSource(),ng=ac.createGain();
  var noiseFlt=ac.createBiquadFilter();
  noiseSrc.buffer=buf;
  noiseFlt.type='bandpass';noiseFlt.frequency.setValueAtTime(1800,now);
  noiseFlt.frequency.linearRampToValueAtTime(600,now+0.4);noiseFlt.Q.value=3;
  ng.gain.setValueAtTime(0.25,now);ng.gain.linearRampToValueAtTime(0,now+0.5);
  noiseSrc.connect(noiseFlt);noiseFlt.connect(ng);ng.connect(ac.destination);noiseSrc.start(now);

  // Tonal component - descending with vibrato
  var o=ac.createOscillator(),g=ac.createGain();
  var flt=ac.createBiquadFilter();
  o.type='sawtooth';
  o.frequency.setValueAtTime(700,now);
  o.frequency.exponentialRampToValueAtTime(250,now+0.35);
  var lfo=ac.createOscillator(),lfoG=ac.createGain();
  lfo.type='sine';lfo.frequency.value=6;lfoG.gain.value=25;
  lfo.connect(lfoG);lfoG.connect(o.frequency);
  flt.type='lowpass';flt.frequency.value=1200;
  g.gain.setValueAtTime(0.1,now);
  g.gain.linearRampToValueAtTime(0.06,now+0.2);
  g.gain.linearRampToValueAtTime(0,now+0.45);
  o.connect(flt);flt.connect(g);g.connect(ac.destination);
  o.start(now);lfo.start(now);o.stop(now+0.5);lfo.stop(now+0.5);
}

function playPop(){
  initAudio();
  var ac=audioCtx,now=ac.currentTime;
  // Sharp transient click
  var clickBuf=ac.createBuffer(1,ac.sampleRate*0.01,ac.sampleRate);
  var cd=clickBuf.getChannelData(0);
  for(var i=0;i<cd.length;i++)cd[i]=(i<cd.length*0.3?1:-0.5)*Math.exp(-i/(cd.length*0.1));
  var clickSrc=ac.createBufferSource(),cg=ac.createGain();
  clickSrc.buffer=clickBuf;cg.gain.value=0.6;
  clickSrc.connect(cg);cg.connect(ac.destination);clickSrc.start(now);

  // Burst noise
  var buf=ac.createBuffer(1,ac.sampleRate*0.12,ac.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.08));
  var src=ac.createBufferSource(),g=ac.createGain();
  var flt=ac.createBiquadFilter();
  src.buffer=buf;flt.type='highpass';flt.frequency.value=2000;
  g.gain.setValueAtTime(0.5,now);g.gain.linearRampToValueAtTime(0,now+0.1);
  src.connect(flt);flt.connect(g);g.connect(ac.destination);src.start(now);
}

function playLaugh(){
  initAudio();
  var ac=audioCtx,now=ac.currentTime;
  // Eerie giggle: staccato sine bursts descending
  for(var i=0;i<6;i++){
    (function(i){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';
      o.frequency.value=900-i*80+Math.random()*40;
      g.gain.setValueAtTime(0,now+i*0.12);
      g.gain.linearRampToValueAtTime(0.06,now+i*0.12+0.02);
      g.gain.linearRampToValueAtTime(0,now+i*0.12+0.1);
      o.connect(g);g.connect(ac.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.12);
    })(i);
  }
}

function playSting(){
  initAudio();
  var ac=audioCtx,now=ac.currentTime;
  [80,120,160].forEach(function(f,i){
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0.15,now);
    g.gain.linearRampToValueAtTime(0,now+0.6);
    o.connect(g);g.connect(ac.destination);o.start(now+i*0.03);o.stop(now+0.7);
  });
}

function playGallop(){
  initAudio();
  var ac=audioCtx;
  for(var i=0;i<12;i++){
    (function(i){
      var delay=i*80;
      setTimeout(function(){
        if(!audioCtx)return;
        var now=ac.currentTime;
        // Two-beat gallop pattern (clip-clop)
        var isClip=i%2===0;
        var buf=ac.createBuffer(1,ac.sampleRate*0.04,ac.sampleRate);
        var d=buf.getChannelData(0);
        for(var j=0;j<d.length;j++){
          d[j]=(Math.random()*2-1)*Math.exp(-j/(d.length*0.15))*(isClip?1:0.6);
        }
        var src=ac.createBufferSource(),g=ac.createGain();
        var flt=ac.createBiquadFilter();
        src.buffer=buf;
        flt.type='bandpass';flt.frequency.value=isClip?800:500;flt.Q.value=2;
        g.gain.value=0.12;
        src.connect(flt);flt.connect(g);g.connect(ac.destination);src.start(now);
      },delay);
    })(i);
  }
}

var musicNodes=[];
function playMood(mood){
  stopMusic();
  initAudio();
  var ac=audioCtx,now=ac.currentTime;

  if(mood==='peaceful'){
    // Warm C major pad with gentle motion
    [261.6,329.6,392,523.2].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
      o.type='triangle';o.frequency.value=f;
      // Gentle detuning for warmth
      o.detune.value=(i-1.5)*4;
      flt.type='lowpass';flt.frequency.value=600+i*100;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.028,now+3);
      o.connect(flt);flt.connect(g);g.connect(ac.destination);o.start(now+i*0.4);
      musicNodes.push({o:o,g:g});
    });
    // Gentle bird pings
    var birdInt=setInterval(function(){
      if(!audioCtx)return;
      var nn=ac.currentTime;
      var freqs=[1200,1400,1600,1800];
      var f=freqs[Math.floor(Math.random()*freqs.length)];
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=f;
      o.frequency.linearRampToValueAtTime(f*1.1,nn+0.15);
      g.gain.setValueAtTime(0.015,nn);
      g.gain.linearRampToValueAtTime(0,nn+0.25);
      o.connect(g);g.connect(ac.destination);o.start(nn);o.stop(nn+0.3);
    },2500+Math.random()*4000);
    musicNodes.push({interval:birdInt});

  }else if(mood==='uneasy'){
    // C minor with slow detuning and breathing
    [130.8,155.6,196].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
      o.type='sine';o.frequency.value=f;
      o.detune.setValueAtTime(0,now);o.detune.linearRampToValueAtTime(20,now+10);
      flt.type='lowpass';flt.frequency.value=300;
      // Slow breathing volume
      var lfo=ac.createOscillator(),lfoG=ac.createGain();
      lfo.type='sine';lfo.frequency.value=0.15;lfoG.gain.value=0.008;
      lfo.connect(lfoG);lfoG.connect(g.gain);
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.03,now+2);
      o.connect(flt);flt.connect(g);g.connect(ac.destination);o.start(now);lfo.start(now);
      musicNodes.push({o:o,g:g,extra:[lfo]});
    });

  }else if(mood==='creepy'){
    // Tritone drone with tremolo and high eerie whine
    [98,138.6].forEach(function(f){
      var o=ac.createOscillator(),g=ac.createGain();
      var lfo=ac.createOscillator(),lfoG=ac.createGain();
      o.type='sawtooth';o.frequency.value=f;
      lfo.type='sine';lfo.frequency.value=3+Math.random();lfoG.gain.value=0.015;
      lfo.connect(lfoG);lfoG.connect(g.gain);
      g.gain.setValueAtTime(0.025,now);
      o.connect(g);g.connect(ac.destination);o.start(now);lfo.start(now);
      musicNodes.push({o:o,g:g,extra:[lfo]});
    });
    // High eerie sine sliding
    var hi=ac.createOscillator(),hg=ac.createGain();
    hi.type='sine';hi.frequency.value=1660;
    hi.frequency.linearRampToValueAtTime(1700,now+8);
    hi.detune.value=15;
    hg.gain.setValueAtTime(0,now);hg.gain.linearRampToValueAtTime(0.012,now+4);
    hi.connect(hg);hg.connect(ac.destination);hi.start(now);
    musicNodes.push({o:hi,g:hg});

  }else if(mood==='silence'){
    // True silence - nothing plays. Most effective before jumpscare.

  }else if(mood==='jumpscare'){
    // LOUD dissonant blast
    [60,90,127,170,240,340].forEach(function(f){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.2,now);g.gain.linearRampToValueAtTime(0,now+0.7);
      o.connect(g);g.connect(ac.destination);o.start(now);o.stop(now+0.8);
    });
    // Noise burst
    var buf=ac.createBuffer(1,ac.sampleRate*0.25,ac.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.6*Math.exp(-i/(d.length*0.3));
    var src=ac.createBufferSource(),ng=ac.createGain();
    src.buffer=buf;ng.gain.setValueAtTime(0.45,now);ng.gain.linearRampToValueAtTime(0,now+0.25);
    src.connect(ng);ng.connect(ac.destination);src.start(now);

  }else if(mood==='warm'){
    // Major 7th resolution, soft and cinematic
    [261.6,329.6,392,493.9].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
      o.type='triangle';o.frequency.value=f;
      o.detune.value=(i-1.5)*3;
      flt.type='lowpass';flt.frequency.value=500+i*80;
      g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.03,now+1.5+i*0.3);
      o.connect(flt);flt.connect(g);g.connect(ac.destination);o.start(now+i*0.2);
      musicNodes.push({o:o,g:g});
    });
    // Sub bass warmth
    var sub=ac.createOscillator(),sg=ac.createGain();
    sub.type='sine';sub.frequency.value=65;
    sg.gain.setValueAtTime(0,now);sg.gain.linearRampToValueAtTime(0.02,now+2);
    sub.connect(sg);sg.connect(ac.destination);sub.start(now);
    musicNodes.push({o:sub,g:sg});
  }
}

function stopMusic(){
  musicNodes.forEach(function(n){
    try{if(n.g&&audioCtx)n.g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);}catch(e){}
    try{if(n.o)n.o.stop(audioCtx.currentTime+0.6);}catch(e){}
    try{if(n.extra)n.extra.forEach(function(x){x.stop(audioCtx.currentTime+0.6);});}catch(e){}
    try{if(n.interval)clearInterval(n.interval);}catch(e){}
  });
  musicNodes=[];
}

// ========== PAINTED SKY ==========
function drawPaintedSky(darkLevel,opts){
  darkLevel=darkLevel||0;
  opts=opts||{};

  // Base gradient - warm-to-cool (more orange near horizon, blue at top)
  var grad=ctx.createLinearGradient(0,0,0,H*0.65);
  var r1=Math.max(0,Math.min(255,110-darkLevel*130));
  var g1=Math.max(0,Math.min(255,170-darkLevel*185));
  var b1=Math.max(0,Math.min(255,245-darkLevel*200));
  var rMid=Math.max(0,Math.min(255,155-darkLevel*120));
  var gMid=Math.max(0,Math.min(255,195-darkLevel*160));
  var bMid=Math.max(0,Math.min(255,235-darkLevel*160));
  var r2=Math.max(0,Math.min(255,220-darkLevel*120));
  var g2=Math.max(0,Math.min(255,210-darkLevel*140));
  var b2=Math.max(0,Math.min(255,200-darkLevel*100));
  grad.addColorStop(0,'rgb('+r1+','+g1+','+b1+')');
  grad.addColorStop(0.45,'rgb('+rMid+','+gMid+','+bMid+')');
  grad.addColorStop(0.8,'rgb('+r2+','+g2+','+b2+')');
  grad.addColorStop(1,'rgb('+Math.min(255,r2+30)+','+Math.min(255,g2+10)+','+Math.max(0,b2-30)+')');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H*0.65);

  // Faint sun haze near horizon
  if(darkLevel<0.6){
    var hazeAlpha=Math.max(0,0.12-darkLevel*0.18);
    var hazeGrad=ctx.createRadialGradient(W*0.7,H*0.6,0,W*0.7,H*0.6,W*0.5);
    hazeGrad.addColorStop(0,'rgba(255,230,160,'+hazeAlpha+')');
    hazeGrad.addColorStop(0.4,'rgba(255,200,120,'+hazeAlpha*0.4+')');
    hazeGrad.addColorStop(1,'rgba(255,180,80,0)');
    ctx.fillStyle=hazeGrad;
    ctx.fillRect(0,H*0.3,W,H*0.35);
  }

  // Painted cloud layers with parallax
  var cloudAlpha=Math.max(0.05,0.5-darkLevel*0.4);
  // Far clouds (slow)
  ctx.fillStyle='rgba(255,255,255,'+cloudAlpha*0.3+')';
  for(var i=0;i<6;i++){
    var cx=(i*W/4+(t*3))%(W+300)-150;
    var cy=H*0.06+Math.sin(i*2.1)*H*0.04;
    drawSoftCloud(cx,cy,0.6+Math.sin(i*3)*0.2,cloudAlpha*0.3);
  }
  // Mid clouds
  for(var i=0;i<4;i++){
    var cx2=(i*W/3+(t*7))%(W+400)-200;
    var cy2=H*0.1+Math.sin(i*1.7+1)*H*0.05;
    drawSoftCloud(cx2,cy2,0.9+Math.sin(i*2+0.5)*0.3,cloudAlpha*0.5);
  }
  // Near clouds (fast, bigger)
  for(var i=0;i<3;i++){
    var cx3=(i*W/2.5+(t*12))%(W+500)-250;
    var cy3=H*0.15+Math.sin(i*1.3+2)*H*0.04;
    drawSoftCloud(cx3,cy3,1.2+Math.sin(i*1.8)*0.4,cloudAlpha*0.6);
  }
}

function drawSoftCloud(x,y,s,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#fff';
  var blobs=[
    {dx:0,dy:0,r:22},{dx:-18,dy:4,r:16},{dx:20,dy:2,r:18},
    {dx:-10,dy:-6,r:14},{dx:12,dy:-5,r:15},{dx:30,dy:6,r:12},
    {dx:-28,dy:5,r:11}
  ];
  ctx.beginPath();
  blobs.forEach(function(b){
    ctx.moveTo(x+b.dx*s*SCALE+b.r*s*SCALE,y+b.dy*s*SCALE);
    ctx.arc(x+b.dx*s*SCALE,y+b.dy*s*SCALE,b.r*s*SCALE,0,Math.PI*2);
  });
  ctx.fill();
  ctx.restore();
}

// ========== MEADOW GROUND ==========
function drawMeadow(darkLevel){
  darkLevel=darkLevel||0;
  var baseG=Math.max(40,155-darkLevel*115);
  var baseR=Math.max(20,55-darkLevel*35);
  var baseB=Math.max(10,35-darkLevel*25);

  // Rolling hill silhouette at horizon
  ctx.fillStyle='rgb('+Math.min(255,baseR+10)+','+Math.min(255,baseG+20)+','+Math.min(255,baseB+8)+')';
  ctx.beginPath();
  ctx.moveTo(0,H*0.63);
  for(var hx=0;hx<=W;hx+=5){
    var hy=H*0.62+Math.sin(hx*0.003)*H*0.012+Math.sin(hx*0.007+1.5)*H*0.008+Math.sin(hx*0.015+3)*H*0.004;
    ctx.lineTo(hx,hy);
  }
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

  // Ground fill
  ctx.fillStyle='rgb('+baseR+','+baseG+','+baseB+')';
  ctx.fillRect(0,H*0.64,W,H*0.38);

  // Grass edge highlight
  var edgeGrad=ctx.createLinearGradient(0,H*0.62,0,H*0.68);
  edgeGrad.addColorStop(0,'rgb('+Math.min(255,baseR+30)+','+Math.min(255,baseG+40)+','+Math.min(255,baseB+20)+')');
  edgeGrad.addColorStop(1,'rgb('+baseR+','+baseG+','+baseB+')');
  ctx.fillStyle=edgeGrad;
  ctx.fillRect(0,H*0.62,W,H*0.06);

  // Individual grass blades - 3 shades of green, varied heights
  if(darkLevel<0.6){
    var grassShades=[
      'rgba('+Math.min(255,baseR+15)+','+Math.min(255,baseG+25)+','+Math.min(255,baseB+10)+','+(0.6-darkLevel*0.8)+')',
      'rgba('+Math.min(255,baseR+5)+','+Math.min(255,baseG+35)+','+Math.min(255,baseB+5)+','+(0.55-darkLevel*0.7)+')',
      'rgba('+Math.min(255,baseR+20)+','+Math.min(255,baseG+15)+','+Math.min(255,baseB+15)+','+(0.5-darkLevel*0.7)+')'
    ];
    ctx.lineWidth=1.2;
    for(var i=0;i<Math.floor(W/6);i++){
      var gx=i*6+Math.sin(i*0.7)*3;
      var hillOff=Math.sin(gx*0.003)*H*0.012+Math.sin(gx*0.007+1.5)*H*0.008+Math.sin(gx*0.015+3)*H*0.004;
      var gy=H*0.625+hillOff+Math.sin(i*1.3)*2;
      var bend=Math.sin(t*1.5+i*0.3)*3;
      var bladeH=10+Math.sin(i*2.3)*5+Math.sin(i*0.7+1)*4+Math.random()*2;
      ctx.strokeStyle=grassShades[i%3];
      ctx.beginPath();
      ctx.moveTo(gx,gy);
      ctx.quadraticCurveTo(gx+bend,gy-bladeH*0.6,gx+bend*1.5,gy-bladeH);
      ctx.stroke();
    }
  }

  // Wildflowers as small colored dots
  if(darkLevel<0.5){
    var flowerColors=['#e91e63','#ff9800','#9c27b0','#ffeb3b','#2196f3','#ff5722','#e040fb','#ffab40'];
    for(var i=0;i<Math.floor(W/25);i++){
      var fx=(i*25+Math.sin(i*3.7)*10)%W;
      var fy=H*0.635+Math.sin(i*2.1)*8+Math.abs(Math.sin(i*1.1))*12;
      var fc=flowerColors[i%flowerColors.length];
      // Stem
      ctx.strokeStyle='rgba('+Math.min(255,baseR+10)+','+Math.min(255,baseG+20)+','+baseB+','+(0.5-darkLevel)+')';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(fx+Math.sin(t*0.8+i)*1.5,fy-6);ctx.stroke();
      // Petals (tiny dots)
      ctx.fillStyle=fc;
      ctx.globalAlpha=0.7-darkLevel;
      ctx.beginPath();ctx.arc(fx+Math.sin(t*0.8+i)*1.5,fy-7,2.2+Math.sin(i)*0.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  }
}

// ========== SUN ==========
function drawSun(x,y,s,bright){
  bright=bright||1;
  if(bright<=0)return;
  // Soft glow
  ctx.save();
  var glowGrad=ctx.createRadialGradient(x,y,0,x,y,50*s);
  glowGrad.addColorStop(0,'rgba(255,240,80,'+bright*0.3+')');
  glowGrad.addColorStop(0.5,'rgba(255,230,50,'+bright*0.1+')');
  glowGrad.addColorStop(1,'rgba(255,230,50,0)');
  ctx.fillStyle=glowGrad;
  ctx.beginPath();ctx.arc(x,y,50*s,0,Math.PI*2);ctx.fill();

  // Sun body
  ctx.fillStyle='rgba(255,235,60,'+bright+')';
  ctx.beginPath();ctx.arc(x,y,18*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,250,200,'+bright*0.6+')';
  ctx.beginPath();ctx.arc(x-5*s,y-5*s,8*s,0,Math.PI*2);ctx.fill();

  // Rays (soft)
  ctx.strokeStyle='rgba(255,230,50,'+(bright*0.25)+')';ctx.lineWidth=2.5*s;
  ctx.lineCap='round';
  for(var i=0;i<12;i++){
    var a=i*Math.PI/6+t*0.2;
    var r1=24*s,r2=36*s+Math.sin(t*2+i)*4*s;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*r1,y+Math.sin(a)*r1);
    ctx.lineTo(x+Math.cos(a)*r2,y+Math.sin(a)*r2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawTree(x,y,s){
  // Trunk with slight taper
  ctx.fillStyle='#5D3A1A';
  ctx.beginPath();
  ctx.moveTo(x-7*s,y);ctx.lineTo(x-5*s,y-40*s);ctx.lineTo(x+5*s,y-40*s);ctx.lineTo(x+7*s,y);
  ctx.fill();
  // Foliage layers
  ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.arc(x,y-48*s,26*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#388E3C';ctx.beginPath();ctx.arc(x-14*s,y-38*s,19*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#43A047';ctx.beginPath();ctx.arc(x+16*s,y-42*s,21*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.arc(x+5*s,y-55*s,16*s,0,Math.PI*2);ctx.fill();
}

function drawButterfly(x,y,col,seed){
  var wingFlap=Math.sin(t*8+seed)*0.5;
  var bx=x+Math.sin(t*0.7+seed*3)*40;
  var by=y+Math.sin(t*1.1+seed*7)*20;
  ctx.save();ctx.translate(bx,by);
  ctx.fillStyle='#333';ctx.fillRect(-1,-3,2,6);
  ctx.fillStyle=col;ctx.globalAlpha=0.7;
  ctx.save();ctx.scale(1,wingFlap);
  ctx.beginPath();ctx.ellipse(-4,0,5,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(4,0,5,4,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
  ctx.restore();
}

function drawBird(x,y,s){
  ctx.strokeStyle='rgba(40,40,40,0.6)';ctx.lineWidth=1.5;ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x-6*s,y+2*s);ctx.quadraticCurveTo(x-3*s,y-4*s,x,y);
  ctx.quadraticCurveTo(x+3*s,y-4*s,x+6*s,y+2*s);
  ctx.stroke();
}

function drawCreek(x1,x2,y,s){
  ctx.fillStyle='rgba(60,150,210,0.35)';
  ctx.beginPath();
  ctx.moveTo(x1,y);
  for(var cx=x1;cx<x2;cx+=15){
    ctx.lineTo(cx,y+Math.sin(cx*0.025+t*2)*3*s);
  }
  ctx.lineTo(x2,y+10*s);
  for(var cx2=x2;cx2>x1;cx2-=15){
    ctx.lineTo(cx2,y+10*s+Math.sin(cx2*0.025+t*2)*3*s);
  }
  ctx.closePath();ctx.fill();
  // Sparkles
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(var si=0;si<8;si++){
    var sx=x1+(x2-x1)*((si*0.125+t*0.04)%1);
    if(Math.sin(t*3+si*2)>0.6){
      ctx.beginPath();ctx.arc(sx,y+5*s,1.5,0,Math.PI*2);ctx.fill();
    }
  }
}

// ========== DRIP HELPER ==========
function drawDrip(x,y,s,seed){
  var cycle=(t*0.8+seed)%3;
  if(cycle<2){
    // Droplet forming
    var size=Math.min(cycle*1.5,2)*s;
    ctx.fillStyle='rgba(100,130,160,0.5)';
    ctx.beginPath();
    ctx.arc(x,y+size*2,size,0,Math.PI*2);
    ctx.fill();
  }else{
    // Droplet falling
    var fallDist=(cycle-2)*60*s;
    var dropSize=Math.max(0,2-(cycle-2)*2)*s;
    ctx.fillStyle='rgba(100,130,160,0.4)';
    ctx.beginPath();
    ctx.arc(x,y+4*s+fallDist,dropSize,0,Math.PI*2);
    ctx.fill();
  }
}

// ========== DRAIN (ominous) ==========
function drawDrain(x,y,s,glowing){
  // Cracked concrete surround
  ctx.fillStyle='#4a4a4a';
  ctx.beginPath();
  ctx.arc(x,y,28*s,Math.PI,0);
  ctx.lineTo(x+34*s,y+24*s);
  ctx.lineTo(x-34*s,y+24*s);
  ctx.closePath();ctx.fill();

  // Moss/algae patches on concrete
  ctx.fillStyle='rgba(30,70,30,0.35)';
  ctx.beginPath();ctx.ellipse(x-20*s,y+8*s,6*s,4*s,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+18*s,y+14*s,5*s,3*s,-0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(25,60,25,0.25)';
  ctx.beginPath();ctx.ellipse(x-12*s,y+18*s,4*s,3*s,0.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+25*s,y+2*s,3*s,2.5*s,-0.4,0,Math.PI*2);ctx.fill();

  // Concrete cracks with branching sub-cracks
  ctx.strokeStyle='#333';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x-25*s,y-5*s);ctx.lineTo(x-20*s,y+10*s);ctx.stroke();
  // Sub-cracks branching from main crack
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(x-22*s,y+3*s);ctx.lineTo(x-26*s,y+6*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-21*s,y+7*s);ctx.lineTo(x-18*s,y+12*s);ctx.stroke();

  ctx.strokeStyle='#333';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x+22*s,y-8*s);ctx.lineTo(x+18*s,y+5*s);ctx.lineTo(x+24*s,y+18*s);ctx.stroke();
  // Sub-cracks
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(x+20*s,y-1*s);ctx.lineTo(x+25*s,y+1*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+19*s,y+8*s);ctx.lineTo(x+15*s,y+11*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+22*s,y+14*s);ctx.lineTo(x+27*s,y+16*s);ctx.stroke();

  ctx.strokeStyle='#333';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x-10*s,y+20*s);ctx.lineTo(x-5*s,y+15*s);ctx.lineTo(x+2*s,y+22*s);ctx.stroke();
  // Sub-cracks
  ctx.strokeStyle='#3a3a3a';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.moveTo(x-7*s,y+17*s);ctx.lineTo(x-3*s,y+20*s);ctx.stroke();

  // Wet stain around drain
  ctx.fillStyle='rgba(20,25,15,0.25)';
  ctx.beginPath();
  ctx.ellipse(x,y+22*s,32*s,6*s,0,0,Math.PI*2);
  ctx.fill();

  // Dark interior - deep black
  ctx.fillStyle='#080808';
  ctx.beginPath();
  ctx.arc(x,y+2*s,22*s,Math.PI,0);
  ctx.lineTo(x+22*s,y+20*s);
  ctx.lineTo(x-22*s,y+20*s);
  ctx.closePath();ctx.fill();

  // Depth gradient inside
  var depthGrad=ctx.createRadialGradient(x,y+10*s,0,x,y+10*s,20*s);
  depthGrad.addColorStop(0,'rgba(0,0,0,0.9)');
  depthGrad.addColorStop(1,'rgba(5,5,5,0.3)');
  ctx.fillStyle=depthGrad;
  ctx.beginPath();ctx.arc(x,y+10*s,20*s,0,Math.PI*2);ctx.fill();

  // Faint mist/fog emanating from drain opening
  for(var mi=0;mi<5;mi++){
    var mx=x+(mi-2)*8*s+Math.sin(t*0.5+mi*1.3)*4*s;
    var my=y-5*s-Math.sin(t*0.3+mi*0.7)*6*s-mi*3*s;
    var mr=5*s+Math.sin(t*0.4+mi)*2*s;
    var mistAlpha=Math.max(0,0.06-mi*0.01+Math.sin(t*0.6+mi*2)*0.02);
    ctx.fillStyle='rgba(160,170,180,'+mistAlpha+')';
    ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fill();
  }

  // Red glow from inside
  if(glowing){
    var pulse=0.15+Math.sin(t*1.5)*0.08;
    var grd=ctx.createRadialGradient(x,y+8*s,0,x,y+8*s,15*s);
    grd.addColorStop(0,'rgba(180,0,0,'+pulse+')');
    grd.addColorStop(1,'rgba(100,0,0,0)');
    ctx.fillStyle=grd;
    ctx.beginPath();ctx.arc(x,y+8*s,15*s,0,Math.PI*2);ctx.fill();
  }

  // Grate bars (rusted)
  ctx.strokeStyle='#3a3530';ctx.lineWidth=2.5;
  for(var gi=-15;gi<=15;gi+=8){
    ctx.beginPath();ctx.moveTo(x+gi*s,y-16*s);ctx.lineTo(x+gi*s,y+20*s);ctx.stroke();
  }
  // Horizontal bar
  ctx.beginPath();ctx.moveTo(x-18*s,y+5*s);ctx.lineTo(x+18*s,y+5*s);ctx.stroke();

  // Dripping water from top of drain arch
  drawDrip(x-10*s,y-22*s,s,0);
  drawDrip(x+5*s,y-24*s,s,1.2);
  drawDrip(x+16*s,y-18*s,s,2.5);
}

function drawFarmhouse(x,y,s){
  // Walls
  ctx.fillStyle='#8B4513';ctx.fillRect(x-22*s,y-32*s,44*s,32*s);
  // Roof
  ctx.fillStyle='#B22222';
  ctx.beginPath();ctx.moveTo(x-28*s,y-32*s);ctx.lineTo(x,y-54*s);ctx.lineTo(x+28*s,y-32*s);ctx.closePath();ctx.fill();
  // Door
  ctx.fillStyle='#5D3A1A';ctx.fillRect(x-5*s,y-16*s,10*s,16*s);
  // Doorknob
  ctx.fillStyle='#c9a84c';ctx.beginPath();ctx.arc(x+3*s,y-8*s,1.2*s,0,Math.PI*2);ctx.fill();
  // Windows with warm glow
  ctx.fillStyle='#FFE082';
  ctx.fillRect(x-18*s,y-27*s,10*s,10*s);
  ctx.fillRect(x+8*s,y-27*s,10*s,10*s);
  // Window glow
  ctx.save();
  ctx.shadowColor='#FFE082';ctx.shadowBlur=8;
  ctx.fillStyle='rgba(255,224,130,0.4)';
  ctx.fillRect(x-18*s,y-27*s,10*s,10*s);
  ctx.fillRect(x+8*s,y-27*s,10*s,10*s);
  ctx.restore();
  // Window crosses
  ctx.strokeStyle='#5D3A1A';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-13*s,y-27*s);ctx.lineTo(x-13*s,y-17*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-18*s,y-22*s);ctx.lineTo(x-8*s,y-22*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+13*s,y-27*s);ctx.lineTo(x+13*s,y-17*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+8*s,y-22*s);ctx.lineTo(x+18*s,y-22*s);ctx.stroke();
}

// ========== CC1-STYLE HORSE (detailed) ==========
function drawHorseCC1(x,y,s,opts){
  opts=opts||{};
  var headY=-82*s;
  var torsoY=-55*s;
  var torsoH=35*s;
  var legY=-20*s;
  var legH=22*s;

  var breathe=1+Math.sin(t*3.5)*0.015;
  var tailSwish=Math.sin(t*2.5)*0.4;
  var headShake=opts.shake?Math.sin(t*10)*0.22:0;
  var earPerk=opts.alert?-6*s:0;
  var gallopBob=opts.gallop?Math.abs(Math.sin(t*14))*10*s:0;

  var legOffs=[0,0,0,0];
  if(opts.gallop){
    legOffs[0]=Math.sin(t*14)*12*s;
    legOffs[1]=Math.sin(t*14+1.5)*12*s;
    legOffs[2]=Math.sin(t*14+3)*12*s;
    legOffs[3]=Math.sin(t*14+4.5)*12*s;
  }
  var stamp=opts.stamp?Math.abs(Math.sin(t*6))*6*s:0;

  ctx.save();
  ctx.translate(x,y-gallopBob);
  if(opts.facing<0)ctx.scale(-1,1);
  ctx.scale(breathe,breathe);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(0,gallopBob,22*s,5*s,0,0,Math.PI*2);ctx.fill();

  // Dust when galloping
  if(opts.gallop){
    ctx.fillStyle='rgba(180,165,130,0.25)';
    for(var di=0;di<4;di++){
      var dx=-22*s-di*12*s+Math.sin(t*6+di)*4*s;
      var dy=-3*s+Math.sin(t*9+di*2)*3*s;
      ctx.beginPath();ctx.arc(dx,dy,3*s+di*2*s,0,Math.PI*2);ctx.fill();
    }
  }

  // === LEGS with muscle definition ===
  // Back legs
  ctx.fillStyle='#7a4e2a';
  // Back left
  ctx.save();
  ctx.translate(-12*s,legY+legOffs[0]);
  if(opts.gallop){ctx.rotate(Math.sin(t*14)*0.15);}
  ctx.fillRect(-3.5*s,0,7*s,legH+3*s);
  // Muscle bulge at top
  ctx.fillStyle='#8B5A2B';
  ctx.beginPath();ctx.ellipse(0,3*s,4.5*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Back right
  ctx.fillStyle='#7a4e2a';
  ctx.save();
  ctx.translate(-4*s,legY+legOffs[1]);
  if(opts.gallop){ctx.rotate(Math.sin(t*14+1.5)*0.15);}
  ctx.fillRect(-3.5*s,0,7*s,legH+3*s);
  ctx.fillStyle='#8B5A2B';
  ctx.beginPath();ctx.ellipse(0,3*s,4.5*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Front left
  ctx.fillStyle='#7a4e2a';
  ctx.save();
  ctx.translate(6*s,legY+legOffs[2]-stamp);
  if(opts.gallop){ctx.rotate(Math.sin(t*14+3)*0.15);}
  ctx.fillRect(-3.5*s,0,7*s,legH+3*s);
  ctx.fillStyle='#8B5A2B';
  ctx.beginPath();ctx.ellipse(0,3*s,4.5*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Front right
  ctx.fillStyle='#7a4e2a';
  ctx.save();
  ctx.translate(14*s,legY+legOffs[3]);
  if(opts.gallop){ctx.rotate(Math.sin(t*14+4.5)*0.15);}
  ctx.fillRect(-3.5*s,0,7*s,legH+3*s);
  ctx.fillStyle='#8B5A2B';
  ctx.beginPath();ctx.ellipse(0,3*s,4.5*s,5*s,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Hooves (dark with slight shape)
  ctx.fillStyle='#2a2a2a';
  [[-13.5,legOffs[0]],[-5.5,legOffs[1]],[4.5,legOffs[2]-stamp],[12.5,legOffs[3]]].forEach(function(h){
    ctx.beginPath();
    ctx.moveTo(h[0]*s-1*s,-2*s+h[1]);
    ctx.lineTo(h[0]*s-1.5*s,-4.5*s+h[1]);
    ctx.lineTo(h[0]*s+6.5*s,-4.5*s+h[1]);
    ctx.lineTo(h[0]*s+6*s,-2*s+h[1]);
    ctx.closePath();ctx.fill();
  });

  // === TORSO (barrel shaped) with gradient shading ===
  var torsoGrad=ctx.createRadialGradient(2*s,torsoY+torsoH/2+2*s,5*s,0,torsoY+torsoH/2+2*s,22*s);
  torsoGrad.addColorStop(0,'#9c6b38');
  torsoGrad.addColorStop(0.5,'#8B5A2B');
  torsoGrad.addColorStop(1,'#7a4e24');
  ctx.fillStyle=torsoGrad;
  ctx.beginPath();
  ctx.ellipse(0,torsoY+torsoH/2+2*s,20*s,torsoH/2+4*s,0,0,Math.PI*2);
  ctx.fill();
  // Belly highlight
  ctx.fillStyle='rgba(170,130,80,0.3)';
  ctx.beginPath();
  ctx.ellipse(2*s,torsoY+torsoH/2+5*s,14*s,8*s,0.1,0,Math.PI*2);
  ctx.fill();
  // Shoulder muscle
  var shoulderGrad=ctx.createRadialGradient(12*s,torsoY+8*s,2*s,12*s,torsoY+8*s,12*s);
  shoulderGrad.addColorStop(0,'#9c6b38');
  shoulderGrad.addColorStop(1,'#8B5A2B');
  ctx.fillStyle=shoulderGrad;
  ctx.beginPath();ctx.ellipse(12*s,torsoY+8*s,10*s,14*s,0.2,0,Math.PI*2);ctx.fill();
  // Haunch muscle
  var haunchGrad=ctx.createRadialGradient(-12*s,torsoY+10*s,2*s,-12*s,torsoY+10*s,12*s);
  haunchGrad.addColorStop(0,'#9c6b38');
  haunchGrad.addColorStop(1,'#8B5A2B');
  ctx.fillStyle=haunchGrad;
  ctx.beginPath();ctx.ellipse(-12*s,torsoY+10*s,10*s,13*s,-0.15,0,Math.PI*2);ctx.fill();

  // Subtle muscle definition lines
  ctx.strokeStyle='rgba(100,65,30,0.25)';ctx.lineWidth=0.8*s;
  // Shoulder line
  ctx.beginPath();
  ctx.moveTo(8*s,torsoY-2*s);
  ctx.quadraticCurveTo(14*s,torsoY+8*s,10*s,torsoY+22*s);
  ctx.stroke();
  // Haunch line
  ctx.beginPath();
  ctx.moveTo(-8*s,torsoY);
  ctx.quadraticCurveTo(-14*s,torsoY+10*s,-10*s,torsoY+24*s);
  ctx.stroke();

  // === MANE (flowing strands) ===
  ctx.strokeStyle='#4a2e12';ctx.lineWidth=2.5*s;ctx.lineCap='round';
  for(var mi=0;mi<7;mi++){
    var mx=mi*3*s-8*s;
    var mWave=Math.sin(t*2+mi*0.7)*4*s;
    ctx.beginPath();
    ctx.moveTo(mx,torsoY-5*s);
    ctx.quadraticCurveTo(mx-3*s+mWave,torsoY-15*s,mx-5*s+mWave*1.3,torsoY-22*s);
    ctx.stroke();
  }
  // Forelock
  ctx.beginPath();
  ctx.moveTo(3*s,headY+8*s);
  ctx.quadraticCurveTo(8*s+Math.sin(t*2)*2*s,headY-5*s,5*s+Math.sin(t*2.5)*3*s,headY-18*s);
  ctx.stroke();

  // === TAIL (flowing with multiple strands) ===
  ctx.strokeStyle='#4a2e12';ctx.lineWidth=3*s;ctx.lineCap='round';
  for(var ti=0;ti<4;ti++){
    ctx.beginPath();ctx.moveTo(-18*s+ti*1.5*s,torsoY+8*s+ti*3*s);
    ctx.quadraticCurveTo(
      -32*s+ti*2*s,torsoY+3*s+Math.sin(t*2.5+ti*0.5)*6*s,
      -28*s+ti*2*s+tailSwish*12*s,torsoY-8*s+ti*4*s
    );
    ctx.stroke();
  }

  // === NECK ===
  var neckGrad=ctx.createLinearGradient(0,torsoY,-2*s,headY+12*s);
  neckGrad.addColorStop(0,'#8B5A2B');
  neckGrad.addColorStop(0.5,'#9c6b38');
  neckGrad.addColorStop(1,'#8B5A2B');
  ctx.fillStyle=neckGrad;
  ctx.beginPath();
  ctx.moveTo(8*s,torsoY);
  ctx.quadraticCurveTo(14*s,torsoY-15*s,10*s,headY+12*s);
  ctx.lineTo(-2*s,headY+12*s);
  ctx.quadraticCurveTo(-4*s,torsoY-10*s,0*s,torsoY);
  ctx.closePath();ctx.fill();

  // === HEAD ===
  ctx.save();
  ctx.rotate(headShake);

  // Head with gradient
  var headGrad=ctx.createRadialGradient(6*s,headY+earPerk,3*s,6*s,headY+earPerk,18*s);
  headGrad.addColorStop(0,'#9c6b38');
  headGrad.addColorStop(1,'#8B5A2B');
  ctx.fillStyle=headGrad;
  ctx.beginPath();ctx.ellipse(6*s,headY+earPerk,11*s,17*s,0.25,0,Math.PI*2);ctx.fill();
  // Snout lighter area
  ctx.fillStyle='#a8774a';
  ctx.beginPath();ctx.ellipse(12*s,headY+6*s+earPerk,6*s,8*s,0.25,0,Math.PI*2);ctx.fill();

  // White blaze/star marking on forehead
  ctx.fillStyle='rgba(255,250,240,0.65)';
  ctx.beginPath();
  ctx.moveTo(4*s,headY-10*s+earPerk);
  ctx.quadraticCurveTo(6*s,headY-14*s+earPerk,8*s,headY-10*s+earPerk);
  ctx.quadraticCurveTo(7*s,headY-6*s+earPerk,6*s,headY-4*s+earPerk);
  ctx.quadraticCurveTo(5*s,headY-6*s+earPerk,4*s,headY-10*s+earPerk);
  ctx.fill();

  // Eyes - BIG and expressive with gradient iris
  // Eye white
  ctx.fillStyle='#f5f0e8';
  ctx.beginPath();ctx.ellipse(6*s,headY-5*s+earPerk,4.5*s,4*s,0,0,Math.PI*2);ctx.fill();
  // Iris gradient (dark brown outer to amber inner)
  var irisGrad=ctx.createRadialGradient(7*s,headY-5*s+earPerk,0.5*s,7*s,headY-5*s+earPerk,3*s);
  irisGrad.addColorStop(0,'#b8860b');
  irisGrad.addColorStop(0.5,'#6b3a10');
  irisGrad.addColorStop(1,'#3e2215');
  ctx.fillStyle=irisGrad;
  ctx.beginPath();ctx.arc(7*s,headY-5*s+earPerk,3*s,0,Math.PI*2);ctx.fill();
  // Pupil
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(7.5*s,headY-5*s+earPerk,1.8*s,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.arc(6*s,headY-6.5*s+earPerk,1.2*s,0,Math.PI*2);ctx.fill();
  // Eyelid line
  ctx.strokeStyle='#5a3a1a';ctx.lineWidth=1*s;
  ctx.beginPath();ctx.arc(6*s,headY-5*s+earPerk,4.5*s,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();

  // Nostrils
  ctx.fillStyle='#3a2210';
  ctx.beginPath();ctx.ellipse(14*s,headY+7*s+earPerk,2*s,1.5*s,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,headY+8*s+earPerk,2*s,1.5*s,0.3,0,Math.PI*2);ctx.fill();

  // Mouth line
  ctx.strokeStyle='#5a3a1a';ctx.lineWidth=1*s;
  ctx.beginPath();
  ctx.moveTo(16*s,headY+10*s+earPerk);
  ctx.quadraticCurveTo(10*s,headY+12*s+earPerk,4*s,headY+10*s+earPerk);
  ctx.stroke();

  // Ears (more detailed, pointed)
  ctx.fillStyle='#8B5A2B';
  ctx.beginPath();ctx.moveTo(-1*s,headY-14*s+earPerk);ctx.lineTo(1*s,headY-26*s+earPerk);ctx.lineTo(5*s,headY-14*s+earPerk);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(7*s,headY-15*s+earPerk);ctx.lineTo(9*s,headY-26*s+earPerk);ctx.lineTo(13*s,headY-14*s+earPerk);ctx.closePath();ctx.fill();
  // Inner ear
  ctx.fillStyle='#c4917a';
  ctx.beginPath();ctx.moveTo(0.5*s,headY-16*s+earPerk);ctx.lineTo(1.5*s,headY-23*s+earPerk);ctx.lineTo(3.5*s,headY-16*s+earPerk);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(8.5*s,headY-17*s+earPerk);ctx.lineTo(9.5*s,headY-23*s+earPerk);ctx.lineTo(11.5*s,headY-16*s+earPerk);ctx.closePath();ctx.fill();

  // Eating animation
  if(opts.eating){
    var mOpen=Math.abs(Math.sin(t*2))*3*s;
    ctx.fillStyle='#5a3a1a';
    ctx.fillRect(12*s,headY+9*s+earPerk,6*s,3*s+mOpen);
    ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(14*s,headY+9*s+earPerk);
    ctx.lineTo(14*s+Math.sin(t)*4*s,headY+earPerk);ctx.stroke();
  }

  ctx.restore(); // headShake
  ctx.restore();
}

// ========== CC1-STYLE PENNYWISE (progressive horror) ==========
function drawPennywiseCC1(x,y,s,opts){
  opts=opts||{};
  var headY=-82*s;
  var torsoY=-55*s;
  var torsoH=35*s;
  var legY=-20*s;
  var legH=22*s;
  var headR=15*s;
  var menace=opts.menace||0;
  var sway=Math.sin(t*1.2)*0.025*(1+menace*2);

  // Head twitching at high menace
  var headTwitch=0;
  if(menace>0.7){
    headTwitch=(Math.random()-0.5)*0.06*(menace-0.7)*3;
  }

  // Color desaturation based on menace
  var satShift=menace*0.6;
  var suitR=Math.floor(200-satShift*60);
  var suitG=Math.floor(200-satShift*80);
  var suitB=Math.floor(210-satShift*90);
  var suitCol='rgb('+suitR+','+suitG+','+suitB+')';
  var hairHue=Math.floor(15-menace*15);
  var hairSat=Math.floor(100-menace*30);
  var hairLight=Math.floor(50-menace*15);
  var hairCol='hsl('+hairHue+','+hairSat+'%,'+hairLight+'%)';

  ctx.save();
  ctx.translate(x,y);
  if(opts.facing<0)ctx.scale(-1,1);
  ctx.rotate(sway);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,0,22*s,5*s,0,0,Math.PI*2);ctx.fill();

  // === LEGS ===
  ctx.fillStyle='#777';
  ctx.beginPath();ctx.roundRect(-14*s,legY,12*s,legH+2*s,3*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(4*s,legY,12*s,legH+2*s,3*s);ctx.fill();
  // Shoes (oversized clown shoes)
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.ellipse(-8*s,-2*s,9*s,3*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(10*s,-2*s,9*s,3*s,0,0,Math.PI*2);ctx.fill();

  // === TORSO ===
  ctx.fillStyle=suitCol;
  ctx.beginPath();ctx.roundRect(-16*s,torsoY,32*s,torsoH+2*s,5*s);ctx.fill();
  // Pom-pom buttons
  var pomCol=menace<0.5?'#ff4400':'#880000';
  ctx.fillStyle=pomCol;
  ctx.beginPath();ctx.arc(0,torsoY+10*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,torsoY+20*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,torsoY+30*s,2.5*s,0,Math.PI*2);ctx.fill();

  // === RUFFLED COLLAR ===
  ctx.fillStyle=menace<0.5?'#eee':'#ccc';
  for(var ri=0;ri<10;ri++){
    var ra=ri*Math.PI*2/10+Math.sin(t*0.8+ri)*0.1;
    var rr=13*s+Math.sin(ri*2+t)*1.5*s;
    ctx.beginPath();ctx.arc(Math.cos(ra)*rr,torsoY-1*s+Math.sin(ra)*4*s,5*s,0,Math.PI*2);ctx.fill();
  }

  // === ARMS ===
  ctx.fillStyle=suitCol;
  // Left arm
  ctx.save();
  ctx.translate(-16*s,torsoY+6*s);
  ctx.rotate(Math.sin(t*1.5)*0.05);
  ctx.fillRect(-2*s,0,7*s,26*s);
  // Glove
  ctx.fillStyle='#f5f0e8';
  ctx.beginPath();ctx.ellipse(1.5*s,27*s,4*s,3.5*s,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  if(opts.lunge){
    // Right arm LUNGING with claws
    ctx.save();
    ctx.translate(14*s,torsoY+6*s);
    ctx.rotate(-0.5-Math.sin(t*12)*0.1);
    ctx.fillStyle=suitCol;
    ctx.fillRect(0,-3*s,32*s,8*s);
    // Hand/claws
    ctx.fillStyle='#ddd';
    ctx.beginPath();ctx.ellipse(33*s,1*s,5*s,4*s,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    for(var ci=0;ci<5;ci++){
      ctx.beginPath();
      ctx.moveTo(33*s,-4*s+ci*2.5*s);
      ctx.lineTo(40*s,-5*s+ci*2.5*s);
      ctx.lineTo(33*s,-2.5*s+ci*2.5*s);
      ctx.fill();
    }
    ctx.restore();
  }else{
    // Right arm normal
    ctx.save();
    ctx.translate(14*s,torsoY+6*s);
    ctx.rotate(-Math.sin(t*1.5)*0.05);
    ctx.fillRect(-2*s,0,7*s,26*s);
    ctx.fillStyle='#f5f0e8';
    ctx.beginPath();ctx.ellipse(1.5*s,27*s,4*s,3.5*s,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // === HEAD ===
  ctx.save();
  ctx.rotate(headTwitch);

  // Face base - gets paler with menace
  var faceR=Math.floor(240-menace*20);
  var faceG=Math.floor(240-menace*40);
  var faceB=Math.floor(240-menace*30);
  ctx.fillStyle='rgb('+faceR+','+faceG+','+faceB+')';
  ctx.beginPath();ctx.arc(0,headY,headR+2*s,0,Math.PI*2);ctx.fill();

  // Face shadows when menacing
  if(menace>0.3){
    var shadowAlpha=menace*0.3;
    ctx.fillStyle='rgba(40,0,20,'+shadowAlpha+')';
    // Under-eye shadows
    ctx.beginPath();ctx.ellipse(-6*s,headY-1*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(6*s,headY-1*s,5*s,3*s,0,0,Math.PI*2);ctx.fill();
    // Cheek hollows
    ctx.beginPath();ctx.ellipse(-8*s,headY+4*s,4*s,5*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8*s,headY+4*s,4*s,5*s,0,0,Math.PI*2);ctx.fill();
  }

  // Dark veins on face at high menace
  if(menace>0.8){
    ctx.strokeStyle='rgba(60,0,30,'+(menace-0.8)*2.5+')';
    ctx.lineWidth=0.8*s;
    // Veins radiating from left eye
    ctx.beginPath();ctx.moveTo(-6*s,headY-4*s);ctx.lineTo(-10*s,headY-10*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-6*s,headY-4*s);ctx.lineTo(-12*s,headY-6*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-6*s,headY-1*s);ctx.lineTo(-13*s,headY+1*s);ctx.stroke();
    // Veins radiating from right eye
    ctx.beginPath();ctx.moveTo(6*s,headY-4*s);ctx.lineTo(10*s,headY-10*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6*s,headY-4*s);ctx.lineTo(12*s,headY-6*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6*s,headY-1*s);ctx.lineTo(13*s,headY+1*s);ctx.stroke();
  }

  // === HAIR ===
  ctx.fillStyle=hairCol;
  // Hair wildness factor
  var hairWild=menace>0.6?(menace-0.6)*8:0;
  // Main hair puffs
  ctx.beginPath();ctx.arc(-15*s,headY-3*s,11*s+hairWild*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(15*s,headY-3*s,11*s+hairWild*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,headY-17*s,9*s+hairWild*0.5*s,0,Math.PI*2);ctx.fill();
  // Animated spiky bits
  for(var hi=0;hi<7;hi++){
    var ha=-2.5+hi*0.75;
    var hpulse=Math.sin(hi+t*1.5)*2*s;
    var wildOsc=menace>0.6?Math.sin(t*4+hi*1.7)*hairWild*s:0;
    ctx.beginPath();
    ctx.arc(Math.cos(ha)*(17*s+wildOsc),headY-4*s+Math.sin(ha)*(13*s+wildOsc),5*s+hpulse+menace*2*s+hairWild*0.5*s,0,Math.PI*2);
    ctx.fill();
  }

  // === EYES - progressive horror ===
  var eyeSize=3*s+menace*2*s; // Eyes get bigger
  var pupilSize=1.5*s-menace*0.5*s; // Pupils get smaller (more unsettling)
  var eyeY=headY-4*s;

  // Eye glow - pulsates more dramatically at high menace
  if(menace>0.15){
    var glowPulse=menace>0.5?0.5+Math.sin(t*4)*0.4:1;
    ctx.save();
    ctx.shadowColor='rgba(255,220,0,'+(menace*0.8*glowPulse)+')';
    ctx.shadowBlur=(8+menace*25)*glowPulse;
    ctx.fillStyle='rgba(255,220,0,'+(menace*0.2*glowPulse)+')';
    ctx.beginPath();ctx.arc(-6*s,eyeY,eyeSize+4*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6*s,eyeY,eyeSize+4*s,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Sclera (white or yellowish)
  ctx.fillStyle=menace>0.4?'rgba(255,255,200,1)':'#fff';
  ctx.beginPath();ctx.ellipse(-6*s,eyeY,eyeSize+1*s,eyeSize,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(6*s,eyeY,eyeSize+1*s,eyeSize,0,0,Math.PI*2);ctx.fill();

  // Iris
  var irisCol=menace>0.5?'#ffcc00':'#ffdd00';
  ctx.fillStyle=irisCol;
  ctx.beginPath();ctx.arc(-6*s,eyeY,eyeSize-0.5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*s,eyeY,eyeSize-0.5*s,0,Math.PI*2);ctx.fill();

  // Pupils (get tiny when menacing - uncanny)
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-6*s,eyeY,pupilSize,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*s,eyeY,pupilSize,0,Math.PI*2);ctx.fill();

  // Eye highlight
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();ctx.arc(-7*s,eyeY-1.5*s,1*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(5*s,eyeY-1.5*s,1*s,0,Math.PI*2);ctx.fill();

  // === RED NOSE ===
  ctx.fillStyle='#e00000';
  ctx.beginPath();ctx.arc(0,headY+2*s,3.5*s,0,Math.PI*2);ctx.fill();
  // Nose highlight
  ctx.fillStyle='rgba(255,100,100,0.5)';
  ctx.beginPath();ctx.arc(-1*s,headY+0.5*s,1.5*s,0,Math.PI*2);ctx.fill();

  // === MOUTH - progressive horror ===
  var grinW=8*s+menace*10*s; // Wider with menace
  var teethCount=Math.floor(4+menace*12); // More teeth

  // Red lip paint - gets more like a gash with menace
  ctx.strokeStyle=menace>0.6?'#990000':'#cc0000';
  ctx.lineWidth=(2+menace)*s;
  ctx.beginPath();ctx.arc(0,headY+2*s,grinW,0.1,Math.PI-0.1);ctx.stroke();

  // Upper lip paint
  if(menace>0.3){
    ctx.beginPath();ctx.arc(0,headY+2*s,grinW,-0.05,-Math.PI+0.05,true);ctx.stroke();
  }

  // Teeth
  if(menace>0.15){
    ctx.fillStyle='#fff';
    for(var ti=0;ti<teethCount;ti++){
      var tPos=-grinW+3*s+ti*(grinW*2-6*s)/(teethCount-1);
      var tHeight=2*s+menace*5*s;
      // Teeth get pointier with menace
      if(menace>0.7){
        // Fangs - triangular
        ctx.beginPath();
        ctx.moveTo(tPos-1.2*s,headY+3*s);
        ctx.lineTo(tPos,headY+3*s+tHeight+(ti%3===0?3*s:0));
        ctx.lineTo(tPos+1.2*s,headY+3*s);
        ctx.fill();
      }else{
        ctx.fillRect(tPos-1*s,headY+3*s,2*s,tHeight);
      }
    }
  }

  // Drool when very menacing
  if(menace>0.8){
    ctx.strokeStyle='rgba(200,200,220,0.4)';ctx.lineWidth=1.5*s;
    ctx.beginPath();
    ctx.moveTo(-3*s,headY+3*s+menace*5*s);
    ctx.lineTo(-4*s+Math.sin(t*3)*s,headY+15*s+Math.sin(t*2)*3*s);
    ctx.stroke();
  }

  // Face crack lines when NIGHTMARE
  if(menace>0.8){
    ctx.strokeStyle='rgba(100,0,0,0.5)';ctx.lineWidth=1*s;
    // Mouth corner tears
    ctx.beginPath();ctx.moveTo(-grinW-2*s,headY+3*s);
    ctx.lineTo(-grinW-5*s-menace*4*s,headY-3*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(grinW+2*s,headY+3*s);
    ctx.lineTo(grinW+5*s+menace*4*s,headY-3*s);ctx.stroke();
    // Forehead crack
    ctx.beginPath();ctx.moveTo(-2*s,headY-headR);
    ctx.lineTo(-1*s,headY-headR+8*s);ctx.lineTo(2*s,headY-headR+5*s);ctx.stroke();
  }

  ctx.restore(); // headTwitch
  ctx.restore();
}

// === BALLOON (shiny, with reflection) ===
function drawBalloon(x,y,s,opts){
  opts=opts||{};
  if(opts.popped)return;
  var bob=Math.sin(t*2)*6*s;
  var col=opts.color||'#D32F2F';

  if(opts.cycling){
    var hue=(t*100)%360;
    col='hsl('+hue+',75%,50%)';
  }

  var bx=x,by=y+bob;

  // String (wavy, thin)
  ctx.strokeStyle='rgba(80,80,80,0.6)';ctx.lineWidth=1;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx,by+15*s);
  for(var i=0;i<18;i++){
    ctx.lineTo(bx+Math.sin(i*0.4+t*1.8)*2.5*s,by+15*s+i*2.8*s);
  }
  ctx.stroke();

  // Balloon body (egg-shaped)
  ctx.save();
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.ellipse(bx,by,14*s,17*s,0,0,Math.PI*2);
  ctx.fill();

  // Glossy highlight (large)
  var hlGrad=ctx.createRadialGradient(bx-5*s,by-7*s,0,bx-3*s,by-4*s,10*s);
  hlGrad.addColorStop(0,'rgba(255,255,255,0.45)');
  hlGrad.addColorStop(0.5,'rgba(255,255,255,0.1)');
  hlGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hlGrad;
  ctx.beginPath();ctx.ellipse(bx-3*s,by-4*s,10*s,12*s,0,0,Math.PI*2);ctx.fill();

  // Small bright specular highlight
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.ellipse(bx-5*s,by-8*s,2.5*s,3*s,-0.3,0,Math.PI*2);ctx.fill();

  // Edge darkening
  var edgeGrad=ctx.createRadialGradient(bx,by,8*s,bx,by,16*s);
  edgeGrad.addColorStop(0,'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1,'rgba(0,0,0,0.15)');
  ctx.fillStyle=edgeGrad;
  ctx.beginPath();ctx.ellipse(bx,by,14*s,17*s,0,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Knot
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(bx-2*s,by+16*s);ctx.lineTo(bx,by+20*s);ctx.lineTo(bx+2*s,by+16*s);ctx.fill();
}

// ========== LILY (girl character) ==========
function drawLily(x,y,s,waving){
  var headY2=-80*s;
  var torsoY2=-55*s;
  ctx.save();ctx.translate(x,y);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();ctx.ellipse(0,0,12*s,4*s,0,0,Math.PI*2);ctx.fill();
  // Legs
  ctx.fillStyle='#2196F3';
  ctx.beginPath();ctx.roundRect(-10*s,-20*s,8*s,20*s,3*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(2*s,-20*s,8*s,20*s,3*s);ctx.fill();
  // Shoes
  ctx.fillStyle='#795548';
  ctx.beginPath();ctx.ellipse(-6*s,-2*s,7*s,3*s,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(6*s,-2*s,7*s,3*s,0,0,Math.PI*2);ctx.fill();
  // Dress with gradient
  var dressGrad=ctx.createLinearGradient(0,torsoY2,0,torsoY2+36*s);
  dressGrad.addColorStop(0,'#E91E63');
  dressGrad.addColorStop(0.5,'#EC407A');
  dressGrad.addColorStop(1,'#C2185B');
  ctx.fillStyle=dressGrad;
  ctx.beginPath();ctx.roundRect(-13*s,torsoY2,26*s,36*s,5*s);ctx.fill();
  // Arms
  ctx.fillStyle='#FFCCBC';
  ctx.fillRect(-16*s,torsoY2+6*s,5*s,20*s);
  if(waving){
    ctx.save();
    ctx.translate(11*s,torsoY2+6*s);
    ctx.rotate(-0.5-Math.sin(t*5)*0.35);
    ctx.fillRect(0,0,5*s,20*s);
    ctx.restore();
  }else{
    ctx.fillRect(11*s,torsoY2+6*s,5*s,20*s);
  }
  // Head
  ctx.fillStyle='#FFCCBC';
  ctx.beginPath();ctx.arc(0,headY2,13*s,0,Math.PI*2);ctx.fill();

  // Blush circles on cheeks
  ctx.fillStyle='rgba(255,130,130,0.3)';
  ctx.beginPath();ctx.arc(-7*s,headY2+3*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7*s,headY2+3*s,3*s,0,Math.PI*2);ctx.fill();

  // Hair
  ctx.fillStyle='#5D4037';
  ctx.beginPath();ctx.ellipse(0,headY2-6*s,15*s,11*s,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillRect(-14*s,headY2-4*s,5*s,26*s);
  ctx.fillRect(9*s,headY2-4*s,5*s,26*s);

  // Hair bow
  ctx.fillStyle='#E91E63';
  ctx.beginPath();
  ctx.moveTo(9*s,headY2-12*s);
  ctx.lineTo(15*s,headY2-16*s);

  ctx.beginPath();ctx.arc(4*s,headY2-2*s,2*s,0,Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath();ctx.arc(-4.5*s,headY2-3*s,0.8*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3.5*s,headY2-3*s,0.8*s,0,Math.PI*2);ctx.fill();

  // Eyelashes
  ctx.strokeStyle='#333';ctx.lineWidth=0.8*s;ctx.lineCap='round';
  // Left eye lashes
  ctx.beginPath();ctx.moveTo(-6*s,headY2-3.5*s);ctx.lineTo(-6.5*s,headY2-5*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-4*s,headY2-4*s);ctx.lineTo(-4*s,headY2-5.5*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-2*s,headY2-3.5*s);ctx.lineTo(-1.5*s,headY2-5*s);ctx.stroke();
  // Right eye lashes
  ctx.beginPath();ctx.moveTo(2*s,headY2-3.5*s);ctx.lineTo(1.5*s,headY2-5*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(4*s,headY2-4*s);ctx.lineTo(4*s,headY2-5.5*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6*s,headY2-3.5*s);ctx.lineTo(6.5*s,headY2-5*s);ctx.stroke();

  // Smile
  ctx.strokeStyle='#333';ctx.lineWidth=1.5*s;
  ctx.beginPath();ctx.arc(0,headY2+3*s,4*s,0.15,Math.PI-0.15);ctx.stroke();
  ctx.restore();
}

// ========== TEXT SYSTEM ==========
var textLines=[],textCallback=null,allTextDone=false;
var currentLineIdx=0,currentCharIdx=0,typeSpeed=36;

// Rich text: wraps *text* in bold, _text_ in italic, ALLCAPS in scary
function formatLine(line){
  // ALLCAPS words (3+ chars) get scary class
  line=line.replace(/\b([A-Z]{3,})\b/g,'<span class="scary">$1</span>');
  // *bold*
  line=line.replace(/\*([^*]+)\*/g,'<span class="bold">$1</span>');
  // _italic_
  line=line.replace(/_([^_]+)_/g,'<span class="italic">$1</span>');
  return line;
}

function showText(lines,cb){
  textBox.style.display='block';
  textBox.innerHTML='';
  promptEl.style.display='none';
  textLines=Array.isArray(lines)?lines:[lines];
  typeIdx=0;typeTimer=0;typing=true;allTextDone=false;
  waitingForClick=false;
  textCallback=cb||null;
  currentLineIdx=0;currentCharIdx=0;
  lineByLinePausing=false;linePauseTimer=0;
}

function updateText(dt){
  if(!typing)return;

  // Handle line-by-line pause
  if(lineByLineMode&&lineByLinePausing){
    linePauseTimer-=dt*1000;
    if(linePauseTimer<=0){
      lineByLinePausing=false;
      currentLineIdx++;
      currentCharIdx=0;
      if(currentLineIdx>=textLines.length){
        typing=false;allTextDone=true;
        waitingForClick=true;
        promptEl.style.display='block';
        return;
      }
    }else{
      return;
    }
  }

  typeTimer+=dt*1000;
  if(typeTimer>typeSpeed&&currentLineIdx<textLines.length){
    typeTimer=0;
    currentCharIdx++;
    var line=textLines[currentLineIdx];
    if(currentCharIdx>line.length){
      if(lineByLineMode){
        // In line-by-line mode, pause after finishing each line
        if(currentLineIdx>=textLines.length-1){
          // Last line done
          typing=false;allTextDone=true;
          waitingForClick=true;
          promptEl.style.display='block';
          // Render final state
          var html='';
          for(var i=0;i<textLines.length;i++){
            html+=formatLine(textLines[i]);
            if(i<textLines.length-1)html+='<br>';
          }
          textBox.innerHTML=html;
          return;
        }
        // Check if this is the last real line before "NEIGH." and use longer pause
        var nextNonEmpty=currentLineIdx+1;
        var isBeforeNeigh=false;
        // Check if remaining lines lead to NEIGH.
        for(var ni=nextNonEmpty;ni<textLines.length;ni++){
          if(textLines[ni].trim()==='NEIGH.'){isBeforeNeigh=true;break;}
          if(textLines[ni].trim()!=='')break;
        }
        lineByLinePausing=true;
        linePauseTimer=isBeforeNeigh?2000:linePause;
      }else{
        currentCharIdx=0;currentLineIdx++;
        if(currentLineIdx>=textLines.length){
          typing=false;allTextDone=true;
          waitingForClick=true;
          promptEl.style.display='block';
          return;
        }
      }
    }
    var html='';
    for(var i=0;i<=currentLineIdx&&i<textLines.length;i++){
      if(i===currentLineIdx){
        var partial=textLines[i].substring(0,Math.min(currentCharIdx,textLines[i].length));
        html+=formatLine(partial);
      }else{
        html+=formatLine(textLines[i])+'<br>';
      }
    }
    textBox.innerHTML=html;
  }
}

      // Warm golden light overlay
      if(brightening>0.5){
        ctx.fillStyle='rgba(255,230,150,'+(brightening-0.5)*0.06+')';
        ctx.fillRect(0,0,W,H);
      }
    },
    onEnter:function(){playGallop();}
  },

  // Scene 11: "The Moral" - sunset silhouette, cinematic
  {
    text:[
      "MORAL OF THE STORY",
      "",
      "They say don't judge a book by its cover.",
      "_That's nice advice for library books._",
      "",
      "But if the book is lurking in a storm drain",
      "with yellow eyes and a balloon...",
      "",
      "...*trust your instincts.*",
      "_Every single time._",
      "",
      "Clover knew.",
      "_Clover always knew._",
      "",
      "NEIGH."
    ],
    draw:function(dt){
      // Cinematic sunset
      var grad=ctx.createLinearGradient(0,0,0,H*0.65);
      grad.addColorStop(0,'#0d0320');
      grad.addColorStop(0.2,'#1a0533');
      grad.addColorStop(0.4,'#8b1a1a');
      grad.addColorStop(0.6,'#e65100');
      grad.addColorStop(0.8,'#ff8f00');
      grad.addColorStop(1,'#ffb74d');
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H*0.65);

      // Sun (large, low)
      var sunGrad=ctx.createRadialGradient(W*0.5,H*0.57,0,W*0.5,H*0.57,SCALE*50);
      sunGrad.addColorStop(0,'rgba(255,220,50,0.9)');
      sunGrad.addColorStop(0.3,'rgba(255,160,0,0.6)');
      sunGrad.addColorStop(0.6,'rgba(255,100,0,0.2)');
      sunGrad.addColorStop(1,'rgba(255,50,0,0)');
      ctx.fillStyle=sunGrad;
      ctx.beginPath();ctx.arc(W*0.5,H*0.57,SCALE*50,0,Math.PI*2);ctx.fill();

      // Sun core
      ctx.fillStyle='#ffd54f';
      ctx.beginPath();ctx.arc(W*0.5,H*0.57,SCALE*28,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff8e1';
      ctx.beginPath();ctx.arc(W*0.5,H*0.57,SCALE*20,0,Math.PI*2);ctx.fill();

      // Thin cloud silhouettes
      ctx.fillStyle='rgba(20,5,30,0.3)';
      for(var ci=0;ci<4;ci++){
        var ccx=(ci*W/3+(t*4))%(W+300)-150;
        drawSoftCloud(ccx,H*0.35+ci*H*0.03,0.8+ci*0.2,0.15+ci*0.05);
      }

      // Ground (dark silhouette)
      ctx.fillStyle='#0a1a00';ctx.fillRect(0,H*0.62,W,H*0.4);
      // Grass silhouette blades on horizon
      ctx.fillStyle='#0a1a00';
      for(var gi=0;gi<Math.floor(W/6);gi++){
        var gx=gi*6;
        var gh=4+Math.sin(gi*0.8)*3+Math.sin(gi*2.1)*2;
        ctx.fillRect(gx,H*0.62-gh,2,gh);
      }

      // Horse and Lily silhouettes against sunset
      var victoryTrot=allTextDone?Math.sin(t*2.5)*12:0;
      ctx.fillStyle='#0a0805';

      // Horse silhouette
      var hx2=W*0.47+victoryTrot;
      ctx.save();ctx.translate(hx2,H*0.58);
      // Body
      ctx.beginPath();ctx.ellipse(0,-37*SCALE*1.4,20*SCALE*1.4,22*SCALE*1.4,0,0,Math.PI*2);ctx.fill();
      // Legs
      ctx.fillRect(-14*SCALE*1.4,-18*SCALE*1.4,6*SCALE*1.4,22*SCALE*1.4);
      ctx.fillRect(-5*SCALE*1.4,-18*SCALE*1.4,6*SCALE*1.4,22*SCALE*1.4);
      ctx.fillRect(5*SCALE*1.4,-18*SCALE*1.4,6*SCALE*1.4,22*SCALE*1.4);
      ctx.fillRect(12*SCALE*1.4,-18*SCALE*1.4,6*SCALE*1.4,22*SCALE*1.4);
      // Neck
      ctx.beginPath();
      ctx.moveTo(10*SCALE*1.4,-50*SCALE*1.4);
      ctx.quadraticCurveTo(14*SCALE*1.4,-65*SCALE*1.4,8*SCALE*1.4,-72*SCALE*1.4);
      ctx.lineTo(0,-72*SCALE*1.4);
      ctx.quadraticCurveTo(-2*SCALE*1.4,-60*SCALE*1.4,2*SCALE*1.4,-50*SCALE*1.4);
      ctx.closePath();ctx.fill();
      // Head
      ctx.beginPath();ctx.ellipse(6*SCALE*1.4,-80*SCALE*1.4,10*SCALE*1.4,14*SCALE*1.4,0.3,0,Math.PI*2);ctx.fill();
      // Ears
      ctx.beginPath();ctx.moveTo(2*SCALE*1.4,-92*SCALE*1.4);ctx.lineTo(4*SCALE*1.4,-102*SCALE*1.4);ctx.lineTo(8*SCALE*1.4,-92*SCALE*1.4);ctx.fill();
      ctx.beginPath();ctx.moveTo(8*SCALE*1.4,-92*SCALE*1.4);ctx.lineTo(10*SCALE*1.4,-102*SCALE*1.4);ctx.lineTo(14*SCALE*1.4,-92*SCALE*1.4);ctx.fill();
      // Tail
      ctx.strokeStyle='#0a0805';ctx.lineWidth=4*SCALE*1.4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-18*SCALE*1.4,-42*SCALE*1.4);
      ctx.quadraticCurveTo(-30*SCALE*1.4,-48*SCALE*1.4+Math.sin(t*2.5)*5,-26*SCALE*1.4,-58*SCALE*1.4);ctx.stroke();
      ctx.restore();

      // Lily silhouette
      ctx.fillStyle='#0a0805';
      ctx.save();ctx.translate(W*0.38,H*0.58);
      ctx.beginPath();ctx.arc(0,-80*SCALE*1.2,13*SCALE*1.2,0,Math.PI*2);ctx.fill();
      // Body
      ctx.beginPath();
      ctx.moveTo(-13*SCALE*1.2,-55*SCALE*1.2);
      ctx.lineTo(-16*SCALE*1.2,0);
      ctx.lineTo(16*SCALE*1.2,0);
      ctx.lineTo(13*SCALE*1.2,-55*SCALE*1.2);
      ctx.closePath();ctx.fill();
      // Hair flowing
      ctx.fillRect(-14*SCALE*1.2,-75*SCALE*1.2,5*SCALE*1.2,30*SCALE*1.2);
      ctx.fillRect(9*SCALE*1.2,-75*SCALE*1.2,5*SCALE*1.2,30*SCALE*1.2);
      // Waving arm if done
      if(allTextDone){
        ctx.save();
        ctx.translate(11*SCALE*1.2,-50*SCALE*1.2);
        ctx.rotate(-0.5-Math.sin(t*5)*0.35);
        ctx.fillRect(0,0,5*SCALE*1.2,22*SCALE*1.2);
        ctx.restore();
      }
      ctx.restore();

      // THE END text
      if(allTextDone){
        ctx.save();
        ctx.textAlign='center';
        var endSize=Math.round(44*SCALE);
        ctx.font='700 '+endSize+'px Lora, Georgia, serif';
        // Shadow
        ctx.fillStyle='rgba(0,0,0,0.5)';
        ctx.fillText('THE END',W/2+2,H*0.32+2);
        // Gold text
        var textGrad=ctx.createLinearGradient(W/2-80,0,W/2+80,0);
        textGrad.addColorStop(0,'#ffd54f');
        textGrad.addColorStop(0.5,'#fff8e1');
        textGrad.addColorStop(1,'#ffd54f');
        ctx.fillStyle=textGrad;
        ctx.fillText('THE END',W/2,H*0.32);
        ctx.restore();
        playAgainBtn.style.display='block';
      }
    },
    onEnter:function(){
      typeSpeed=38;
      lineByLineMode=true;
      linePause=1200;
      setTimeout(function(){playNeigh();},13000);
    }
  }
];

// ========== SCENE MANAGEMENT ==========
// Delay timer for scene 8 dramatic pause
var sceneTextDelay=0;

function enterScene(idx){
  scene=idx;sceneTime=0;
  waitingForClick=false;typing=false;allTextDone=false;
  textBox.style.display='none';textBox.innerHTML='';
  promptEl.style.display='none';
  playAgainBtn.style.display='none';
  typeSpeed=36;
  lineByLineMode=false;
  lineByLinePausing=false;
  linePauseTimer=0;
  sceneTextDelay=0;

  // Mood music progression
  // Scenes 0-2: peaceful
  if(idx===0){playMood('peaceful');}
  // Scenes 3-5: uneasy
  else if(idx===3){playMood('uneasy');}
  // Scenes 6-7: creepy
  else if(idx===6){playMood('creepy');}
  // Scene 8: silence (dramatic pause before lunge)
  else if(idx===8){stopMusic();playMood('silence');}
  // Scene 10: warm
  else if(idx===10){playMood('warm');}
  // Scene 11: warm continues
  else if(idx===11){playMood('warm');}

  if(scenes[idx].onEnter)scenes[idx].onEnter();

  // Scene 8 gets a 2.5 second pause before text appears
  var textDelay=900;
  if(idx===8){textDelay=2500;}

  setTimeout(function(){
    showText(scenes[idx].text);
  },textDelay);
}

function advanceScene(){
  if(typing){
    // Skip typing - show all text immediately
    typing=false;allTextDone=true;
    lineByLinePausing=false;
    var html=textLines.map(formatLine).join('<br>');
    textBox.innerHTML=html;
    waitingForClick=true;
    promptEl.style.display='block';
    return;
  }
  if(!waitingForClick)return;
  if(scene>=scenes.length-1)return;
  promptEl.style.display='none';
  waitingForClick=false;
  transitioning=true;transDir=1;transAlpha=0;
  nextScene=scene+1;
}

function handleClick(){
  initAudio();
  if(transitioning)return;
  advanceScene();
}

C.addEventListener('click',handleClick);
C.addEventListener('touchstart',function(e){e.preventDefault();handleClick();},{passive:false});

playAgainBtn.addEventListener('click',function(e){
  e.stopPropagation();
  playAgainBtn.style.display='none';
  transitioning=true;transDir=1;transAlpha=0;nextScene=0;
});

// ========== MAIN LOOP ==========
var lastTime=0;
function frame(ts){
  var dt=(ts-lastTime)/1000;if(dt>0.1)dt=0.1;
  lastTime=ts;t+=dt;
  sceneTime+=dt;

  ctx.save();
  ctx.clearRect(0,0,W,H);

  if(scenes[scene])scenes[scene].draw(dt);

  updateText(dt);

  // Transition overlay (smooth crossfade)
  if(transitioning){
    transAlpha+=transDir*dt*1.4; // Smoother, more cinematic pace
    if(transAlpha>=1&&transDir===1){
      transAlpha=1;transDir=-1;
      if(nextScene>=0)enterScene(nextScene);
    }
    if(transAlpha<=0&&transDir===-1){
      transAlpha=0;transitioning=false;
    }
    ctx.fillStyle='rgba(0,0,0,'+Math.max(0,Math.min(1,transAlpha))+')';
    ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
  requestAnimationFrame(frame);
}

enterScene(0);
requestAnimationFrame(frame);
</script>
