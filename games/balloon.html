<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Do You Want a Balloon?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;overflow:hidden;font-family:system-ui,sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block;cursor:pointer}
#back{position:fixed;top:14px;left:16px;font-size:12px;color:#666;text-decoration:none;font-family:monospace;z-index:100}
#back:hover{color:#aaa}
#textBox{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:700px;background:rgba(0,0,0,0.82);color:#fff;font-size:18px;padding:18px 24px;border-radius:12px;border:3px solid #555;line-height:1.6;min-height:60px;pointer-events:none;z-index:50;display:none}
#prompt{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);color:#aaa;font-size:13px;font-family:monospace;z-index:51;display:none;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#playAgain{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);padding:14px 36px;font-size:20px;font-family:system-ui,sans-serif;background:#d32f2f;color:#fff;border:3px solid #000;border-radius:8px;cursor:pointer;z-index:60;display:none}
#playAgain:hover{background:#e53935}
</style>
</head>
<body>
<a href="games.html" id="back">&larr; games</a>
<canvas id="c"></canvas>
<div id="textBox"></div>
<div id="prompt">click to continue</div>
<button id="playAgain">Play Again</button>
<script>
var C=document.getElementById('c'),ctx=C.getContext('2d');
var textBox=document.getElementById('textBox');
var promptEl=document.getElementById('prompt');
var playAgainBtn=document.getElementById('playAgain');
var W,H,t=0,scene=0,sceneTime=0,typing=false,typeText='',typeIdx=0,typeTimer=0;
var waitingForClick=false,shakeX=0,shakeY=0,transitioning=false,transAlpha=0,transDir=1;
var nextScene=-1,audioCtx=null;
var SCALE=1;

function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;SCALE=Math.min(W,H)/500;}
window.addEventListener('resize',resize);resize();

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

// ========== AUDIO ==========
function playNeigh(){
  initAudio();
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(600,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(200,audioCtx.currentTime+0.3);
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.35);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.4);
}
function playPop(){
  initAudio();
  var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.15));
  var src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  src.buffer=buf;g.gain.value=0.3;src.connect(g);g.connect(audioCtx.destination);src.start();
}
function playLaugh(){
  initAudio();
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  var lfo=audioCtx.createOscillator(),lfoG=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(800,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(200,audioCtx.currentTime+0.8);
  lfo.type='sine';lfo.frequency.value=12;lfoG.gain.value=30;
  lfo.connect(lfoG);lfoG.connect(o.frequency);
  g.gain.setValueAtTime(0.08,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.9);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();lfo.start();o.stop(audioCtx.currentTime+1);lfo.stop(audioCtx.currentTime+1);
}
function playSting(){
  initAudio();
  [100,150].forEach(function(f,i){
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.value=f;
    g.gain.setValueAtTime(0.12,audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);
    o.connect(g);g.connect(audioCtx.destination);o.start(audioCtx.currentTime+i*0.05);o.stop(audioCtx.currentTime+0.6);
  });
}
function playGallop(){
  initAudio();
  for(var i=0;i<8;i++){
    (function(i){
      setTimeout(function(){
        var o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.type='square';o.frequency.value=80+Math.random()*40;
        g.gain.setValueAtTime(0.06,audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.05);
        o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.06);
      },i*100);
    })(i);
  }
}
function playDrone(){
  initAudio();
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  var flt=audioCtx.createBiquadFilter();
  o.type='sine';o.frequency.value=80;g.gain.value=0.012;
  flt.type='lowpass';flt.frequency.value=200;
  o.connect(flt);flt.connect(g);g.connect(audioCtx.destination);o.start();
  return{stop:function(){g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5);o.stop(audioCtx.currentTime+0.6);}};
}
var drone=null;
var musicNodes=[];
/** Mood music — evolves with the story */
function playMood(mood){
  stopMusic();
  initAudio();
  var ac=audioCtx,t=ac.currentTime;
  if(mood==='peaceful'){
    // Warm major pad — C major (C4 E4 G4) with gentle LFO
    [261.6,329.6,392].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
      o.type='triangle';o.frequency.value=f;
      flt.type='lowpass';flt.frequency.value=800;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.04,t+2);
      o.connect(flt);flt.connect(g);g.connect(ac.destination);o.start(t+i*0.3);
      musicNodes.push({o:o,g:g});
    });
    // Bird sounds — gentle high sine pings
    var birdInt=setInterval(function(){
      if(!audioCtx)return;
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sine';o.frequency.value=1200+Math.random()*800;
      g.gain.setValueAtTime(0.02,ac.currentTime);
      g.gain.linearRampToValueAtTime(0,ac.currentTime+0.3);
      o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.35);
    },3000+Math.random()*4000);
    musicNodes.push({interval:birdInt});
  }else if(mood==='uneasy'){
    // Minor pad — C minor (C3 Eb3 G3) with slow detuning
    [130.8,155.6,196].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
      o.type='sine';o.frequency.value=f;
      o.detune.setValueAtTime(0,t);o.detune.linearRampToValueAtTime(15,t+8);
      flt.type='lowpass';flt.frequency.value=400;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.035,t+1.5);
      o.connect(flt);flt.connect(g);g.connect(ac.destination);o.start(t);
      musicNodes.push({o:o,g:g});
    });
  }else if(mood==='creepy'){
    // Dissonant — tritone drone with tremolo
    [98,138.6].forEach(function(f){
      var o=ac.createOscillator(),g=ac.createGain();
      var lfo=ac.createOscillator(),lfoG=ac.createGain();
      o.type='sawtooth';o.frequency.value=f;
      lfo.type='sine';lfo.frequency.value=3;lfoG.gain.value=0.02;
      lfo.connect(lfoG);lfoG.connect(g.gain);
      g.gain.setValueAtTime(0.03,t);
      o.connect(g);g.connect(ac.destination);o.start(t);lfo.start(t);
      musicNodes.push({o:o,g:g,extra:[lfo]});
    });
    // High eerie sine
    var hi=ac.createOscillator(),hg=ac.createGain();
    hi.type='sine';hi.frequency.value=1660;hi.detune.value=20;
    hg.gain.setValueAtTime(0,t);hg.gain.linearRampToValueAtTime(0.015,t+3);
    hi.connect(hg);hg.connect(ac.destination);hi.start(t);
    musicNodes.push({o:hi,g:hg});
  }else if(mood==='jumpscare'){
    // LOUD dissonant blast — then silence
    [80,120,170,240].forEach(function(f){
      var o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.25,t);g.gain.linearRampToValueAtTime(0,t+0.8);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+1);
    });
    // Noise burst
    var buf=ac.createBuffer(1,ac.sampleRate*0.3,ac.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.5;
    var src=ac.createBufferSource(),ng=ac.createGain();
    src.buffer=buf;ng.gain.setValueAtTime(0.4,t);ng.gain.linearRampToValueAtTime(0,t+0.3);
    src.connect(ng);ng.connect(ac.destination);src.start(t);
  }else if(mood==='warm'){
    // Full House resolution — warm major 7th (C E G B) soft piano-like
    [261.6,329.6,392,493.9].forEach(function(f,i){
      var o=ac.createOscillator(),g=ac.createGain(),flt=ac.createBiquadFilter();
      o.type='triangle';o.frequency.value=f;
      flt.type='lowpass';flt.frequency.value=600;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.035,t+1+i*0.2);
      o.connect(flt);flt.connect(g);g.connect(ac.destination);o.start(t+i*0.15);
      musicNodes.push({o:o,g:g});
    });
  }
}
function stopMusic(){
  musicNodes.forEach(function(n){
    try{if(n.g)n.g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.3);}catch(e){}
    try{if(n.o)n.o.stop(audioCtx.currentTime+0.4);}catch(e){}
    try{if(n.extra)n.extra.forEach(function(x){x.stop(audioCtx.currentTime+0.4);});}catch(e){}
    try{if(n.interval)clearInterval(n.interval);}catch(e){}
  });
  musicNodes=[];
}

// ========== CC1-STYLE DRAWING ==========
// Characters drawn EXACTLY like Crossover Chaos 1 (showdown.html)
// Simple Canvas 2D: fillRect, arc, ellipse, quadraticCurveTo
// Structure: shadow -> legs -> torso -> arms -> head -> face -> features

function drawHorseCC1(x,y,s,opts){
  opts=opts||{};
  var crouch=1;
  var headY=-80*s*crouch;
  var torsoY=-55*s*crouch;
  var torsoH=35*s;
  var legY=-20*s*crouch;
  var legH=20*s;

  var breathe=1+Math.sin(t*4)*0.02;
  var tailSwish=Math.sin(t*3)*0.4;
  var headShake=opts.shake?Math.sin(t*12)*0.26:0;
  var earPerk=opts.alert?-5*s:0;
  var gallopBob=opts.gallop?Math.abs(Math.sin(t*16))*8*s:0;

  // Gallop leg offsets
  var legOffs=[0,0,0,0];
  if(opts.gallop){
    legOffs[0]=Math.sin(t*16)*10*s;
    legOffs[1]=Math.sin(t*16+1.5)*10*s;
    legOffs[2]=Math.sin(t*16+3)*10*s;
    legOffs[3]=Math.sin(t*16+4.5)*10*s;
  }
  // Stamp
  var stamp=opts.stamp?Math.abs(Math.sin(t*8))*6*s:0;

  ctx.save();
  ctx.translate(x,y-gallopBob);
  if(opts.facing<0)ctx.scale(-1,1);
  ctx.scale(breathe,breathe);

  // Shadow ellipse on ground
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,gallopBob,20*s,5*s,0,0,Math.PI*2);ctx.fill();

  // === LEGS (4 horse legs) ===
  ctx.fillStyle='#6B4226';
  ctx.fillRect(-14*s,legY+legOffs[0],6*s,legH+5*s);
  ctx.fillRect(-6*s,legY+legOffs[1],6*s,legH+5*s);
  ctx.fillRect(4*s,legY+legOffs[2]-stamp,6*s,legH+5*s);
  ctx.fillRect(12*s,legY+legOffs[3],6*s,legH+5*s);
  // Hooves (#333)
  ctx.fillStyle='#333';
  ctx.fillRect(-15*s,-3*s+legOffs[0],7*s,3*s);
  ctx.fillRect(-7*s,-3*s+legOffs[1],7*s,3*s);
  ctx.fillRect(3*s,-3*s+legOffs[2]-stamp,7*s,3*s);
  ctx.fillRect(11*s,-3*s+legOffs[3],7*s,3*s);

  // Dust clouds when galloping
  if(opts.gallop){
    ctx.fillStyle='rgba(180,160,120,0.3)';
    for(var di=0;di<3;di++){
      var dx=-20*s-di*15*s+Math.sin(t*5+di)*5*s;
      var dy=-5*s+Math.sin(t*8+di*2)*3*s;
      ctx.beginPath();ctx.arc(dx,dy,4*s+di*2*s,0,Math.PI*2);ctx.fill();
    }
  }

  // === TORSO (wide rect, 36*s) ===
  ctx.fillStyle='#8B5A2B';
  ctx.fillRect(-18*s,torsoY,36*s,torsoH+5*s);

  // === MANE (dark rectangles) ===
  ctx.fillStyle='#5a3a1a';
  ctx.fillRect(-5*s,torsoY-8*s,10*s,12*s);

  // === TAIL (quadratic curve with sin(time) swish) ===
  ctx.strokeStyle='#5a3a1a';ctx.lineWidth=4*s;
  ctx.beginPath();ctx.moveTo(-18*s,torsoY+10*s);
  ctx.quadraticCurveTo(-30*s,torsoY+5*s+Math.sin(t*3)*5*s,-25*s,torsoY-5*s+tailSwish*10*s);
  ctx.stroke();

  // === HEAD (ellipse tilted 0.3 radians) ===
  ctx.save();
  ctx.rotate(headShake);
  ctx.fillStyle='#8B5A2B';
  ctx.beginPath();ctx.ellipse(5*s,headY+earPerk,10*s,16*s,0.3,0,Math.PI*2);ctx.fill();

  // Eyes (#222)
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(8*s,headY-4*s+earPerk,3*s,0,Math.PI*2);ctx.fill();

  // Nostrils
  ctx.beginPath();ctx.arc(12*s,headY+6*s+earPerk,2*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8*s,headY+7*s+earPerk,2*s,0,Math.PI*2);ctx.fill();

  // Ears (triangular, #7a4a1a)
  ctx.fillStyle='#7a4a1a';
  ctx.beginPath();ctx.moveTo(-2*s,headY-14*s+earPerk);ctx.lineTo(2*s,headY-24*s+earPerk);ctx.lineTo(6*s,headY-14*s+earPerk);ctx.fill();
  ctx.beginPath();ctx.moveTo(6*s,headY-15*s+earPerk);ctx.lineTo(10*s,headY-24*s+earPerk);ctx.lineTo(14*s,headY-14*s+earPerk);ctx.fill();

  // Eating animation
  if(opts.eating){
    var mOpen=Math.abs(Math.sin(t*2))*3*s;
    ctx.fillStyle='#5a3a1a';
    ctx.fillRect(12*s,headY+8*s+earPerk,6*s,3*s+mOpen);
    ctx.strokeStyle='#4CAF50';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(14*s,headY+8*s+earPerk);
    ctx.lineTo(14*s+Math.sin(t)*4*s,headY+earPerk);ctx.stroke();
  }

  ctx.restore(); // headShake

  // NO arms (it's a horse)

  ctx.restore();
}

function drawPennywiseCC1(x,y,s,opts){
  opts=opts||{};
  var crouch=1;
  var headY=-80*s*crouch;
  var torsoY=-55*s*crouch;
  var torsoH=35*s;
  var legY=-20*s*crouch;
  var legH=20*s;
  var headR=14*s;
  var menace=opts.menace||0;
  var sway=Math.sin(t*1.5)*0.03*(1+menace);

  ctx.save();
  ctx.translate(x,y);
  if(opts.facing<0)ctx.scale(-1,1);
  ctx.rotate(sway);

  // Shadow ellipse on ground
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,0,20*s,5*s,0,0,Math.PI*2);ctx.fill();

  // === LEGS (regular) ===
  ctx.fillStyle='#888';
  ctx.beginPath();ctx.roundRect(-13*s,legY,11*s,legH,3*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(4*s,legY,11*s,legH,3*s);ctx.fill();
  // Shoes
  ctx.fillStyle='#222';
  ctx.fillRect(-14*s,-4*s,12*s,4*s);
  ctx.fillRect(4*s,-4*s,12*s,4*s);

  // === TORSO (gray/silver #ccc) ===
  ctx.fillStyle='#ccc';
  ctx.beginPath();ctx.roundRect(-15*s,torsoY,30*s,torsoH,4*s);ctx.fill();

  // === RUFFLED COLLAR (zigzag of circles) ===
  ctx.fillStyle='#ddd';
  for(var ri=0;ri<8;ri++){
    var ra=ri*Math.PI/4;
    ctx.beginPath();ctx.arc(Math.cos(ra)*12*s,torsoY-2*s+Math.sin(ra)*4*s,5*s,0,Math.PI*2);ctx.fill();
  }

  // === ARMS ===
  ctx.fillStyle='#ccc';
  // Left arm
  ctx.fillRect(-18*s,torsoY+5*s,6*s,25*s);

  if(opts.lunge){
    // Right arm extended with claws
    ctx.save();
    ctx.translate(14*s,torsoY+8*s);
    ctx.rotate(-0.4);
    ctx.fillStyle='#ccc';
    ctx.fillRect(0,0,30*s,8*s);
    // Claws
    ctx.fillStyle='#333';
    for(var ci=0;ci<4;ci++){
      ctx.beginPath();
      ctx.moveTo(30*s,-2*s+ci*3*s);
      ctx.lineTo(36*s,-3*s+ci*3*s);
      ctx.lineTo(30*s,ci*3*s);
      ctx.fill();
    }
    ctx.restore();
  }else{
    // Right arm
    ctx.fillRect(14*s,torsoY+5*s,6*s,25*s);
  }

  // === HEAD (white round, #f0f0f0) ===
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();ctx.arc(0,headY,headR+2*s,0,Math.PI*2);ctx.fill();

  // === WILD ORANGE/RED HAIR SPIKES (#ff4400) ===
  ctx.fillStyle='#ff4400';
  ctx.beginPath();ctx.arc(-14*s,headY-4*s,10*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(14*s,headY-4*s,10*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(0,headY-16*s,8*s,0,Math.PI*2);ctx.fill();
  // Extra spiky bits that animate
  for(var hi=0;hi<5;hi++){
    var ha=-2+hi*0.9;
    ctx.beginPath();
    ctx.arc(Math.cos(ha)*16*s,headY-4*s+Math.sin(ha)*12*s,6*s+Math.sin(hi+t*2)*2*s,0,Math.PI*2);
    ctx.fill();
  }

  // === YELLOW GLOWING EYES (#ffdd00) ===
  var eyeGlow=menace*0.5+Math.sin(t*3)*0.1;
  ctx.fillStyle='#ffdd00';
  ctx.beginPath();ctx.arc(-6*s,headY-4*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*s,headY-4*s,3*s,0,Math.PI*2);ctx.fill();
  // Pupils
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-6*s,headY-4*s,1.5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6*s,headY-4*s,1.5*s,0,Math.PI*2);ctx.fill();
  // Glow effect
  if(menace>0.2){
    ctx.save();
    ctx.shadowColor='#ffdd00';ctx.shadowBlur=10+menace*20;
    ctx.fillStyle='rgba(255,221,0,'+(menace*0.3)+')';
    ctx.beginPath();ctx.arc(-6*s,headY-4*s,5*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6*s,headY-4*s,5*s,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // === RED NOSE (#ff0000, circle) ===
  ctx.fillStyle='#ff0000';
  ctx.beginPath();ctx.arc(0,headY+1*s,3*s,0,Math.PI*2);ctx.fill();

  // === WIDE RED SMILE (#cc0000, arc) ===
  var grinW=8*s+menace*8*s;
  ctx.strokeStyle='#cc0000';ctx.lineWidth=2*s;
  ctx.beginPath();ctx.arc(0,headY+2*s,grinW,0.1,Math.PI-0.1);ctx.stroke();

  // Teeth when menacing
  if(menace>0.3){
    ctx.fillStyle='#fff';
    var teeth=Math.floor(4+menace*6);
    for(var ti=0;ti<teeth;ti++){
      var tx=-grinW+3*s+ti*(grinW*2-6*s)/(teeth-1);
      ctx.fillRect(tx-1*s,headY+2*s,2*s,2*s+menace*4*s);
    }
  }

  // Face distortion when very menacing
  if(menace>0.7){
    // Extra wide mouth lines
    ctx.strokeStyle='#cc0000';ctx.lineWidth=1.5*s;
    ctx.beginPath();
    ctx.moveTo(-grinW-3*s,headY+2*s);ctx.lineTo(-grinW-3*s-menace*4*s,headY-2*s);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(grinW+3*s,headY+2*s);ctx.lineTo(grinW+3*s+menace*4*s,headY-2*s);
    ctx.stroke();
  }

  ctx.restore();
}

// === BALLOON (red circle on string) ===
function drawBalloon(x,y,s,opts){
  opts=opts||{};
  if(opts.popped)return;
  var bob=Math.sin(t*2.5)*5*s;
  var col=opts.color||'#D32F2F';

  // Color cycling
  if(opts.cycling){
    var hue=(t*120)%360;
    col='hsl('+hue+',70%,50%)';
  }

  // String (wavy)
  ctx.strokeStyle='#555';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x,y+15*s);
  for(var i=0;i<15;i++){
    ctx.lineTo(x+Math.sin(i*0.5+t*2)*3*s,y+15*s+i*3*s);
  }
  ctx.stroke();

  // Balloon body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(x,y+bob,15*s,0,Math.PI*2);ctx.fill();
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.arc(x-4*s,y+bob-5*s,4*s,0,Math.PI*2);ctx.fill();
  // Knot
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(x-2*s,y+bob+14*s);ctx.lineTo(x,y+bob+18*s);ctx.lineTo(x+2*s,y+bob+14*s);ctx.fill();
}

// ========== ENVIRONMENT ==========
function drawSky(darkLevel){
  darkLevel=darkLevel||0;
  var grad=ctx.createLinearGradient(0,0,0,H*0.65);
  var r1=Math.min(255,100+darkLevel*155),g1=Math.max(0,180-darkLevel*180),b1=Math.max(0,255-darkLevel*200);
  var r2=Math.min(255,170+darkLevel*85),g2=Math.max(0,220-darkLevel*180),b2=Math.max(0,255-darkLevel*150);
  grad.addColorStop(0,'rgb('+r1+','+g1+','+b1+')');
  grad.addColorStop(1,'rgb('+r2+','+g2+','+b2+')');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H*0.65);
}
function drawGround(darkLevel){
  darkLevel=darkLevel||0;
  var g=Math.max(40,160-darkLevel*120);
  ctx.fillStyle='rgb('+Math.max(20,60-darkLevel*40)+','+g+','+Math.max(10,40-darkLevel*30)+')';
  ctx.fillRect(0,H*0.62,W,H*0.4);
  ctx.fillStyle='rgb('+Math.max(30,80-darkLevel*50)+','+Math.min(255,g+30)+','+Math.max(20,50-darkLevel*30)+')';
  ctx.fillRect(0,H*0.62,W,6);
}
function drawSun(x,y,s,bright){
  bright=bright||1;
  ctx.fillStyle='rgba(255,230,50,'+bright+')';
  ctx.beginPath();ctx.arc(x,y,20*s,0,Math.PI*2);ctx.fill();
  // Rays
  ctx.strokeStyle='rgba(255,230,50,'+(bright*0.4)+')';ctx.lineWidth=2*s;
  for(var i=0;i<8;i++){
    var a=i*Math.PI/4+t*0.3;
    ctx.beginPath();
    ctx.moveTo(x+Math.cos(a)*25*s,y+Math.sin(a)*25*s);
    ctx.lineTo(x+Math.cos(a)*40*s,y+Math.sin(a)*40*s);
    ctx.stroke();
  }
}
function drawCloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();ctx.arc(x,y,s*20,0,Math.PI*2);
  ctx.arc(x-s*15,y+s*5,s*14,0,Math.PI*2);
  ctx.arc(x+s*18,y+s*3,s*16,0,Math.PI*2);ctx.fill();
}
function drawTree(x,y,s){
  ctx.fillStyle='#5D3A1A';ctx.fillRect(x-6*s,y-40*s,12*s,40*s);
  ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.arc(x,y-45*s,25*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#388E3C';ctx.beginPath();ctx.arc(x-15*s,y-35*s,18*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#2E7D32';ctx.beginPath();ctx.arc(x+15*s,y-38*s,20*s,0,Math.PI*2);ctx.fill();
}
function drawFlower(x,y,col){
  ctx.fillStyle='#2a8c2a';ctx.fillRect(x-1,y-8,2,8);
  ctx.fillStyle=col;
  for(var i=0;i<5;i++){
    var a=i*Math.PI*2/5+t*0.5;
    ctx.beginPath();ctx.arc(x+Math.cos(a)*4,y-10+Math.sin(a)*4,3,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#ffeb3b';ctx.beginPath();ctx.arc(x,y-10,2,0,Math.PI*2);ctx.fill();
}
function drawButterfly(x,y,col,seed){
  var wingFlap=Math.sin(t*8+seed)*0.5;
  var bx=x+Math.sin(t*0.7+seed*3)*40;
  var by=y+Math.sin(t*1.1+seed*7)*20;
  ctx.save();ctx.translate(bx,by);
  // Body
  ctx.fillStyle='#333';ctx.fillRect(-1,-4,2,8);
  // Wings
  ctx.fillStyle=col;ctx.globalAlpha=0.7;
  ctx.save();ctx.scale(1,wingFlap);
  ctx.beginPath();ctx.ellipse(-4,0,5,4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(4,0,5,4,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
  ctx.restore();
}
function drawBird(x,y,s){
  ctx.strokeStyle='#333';ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x-6*s,y+2*s);ctx.quadraticCurveTo(x-3*s,y-4*s,x,y);
  ctx.quadraticCurveTo(x+3*s,y-4*s,x+6*s,y+2*s);
  ctx.stroke();
}
function drawCreek(x1,x2,y,s){
  ctx.fillStyle='rgba(60,140,200,0.4)';
  ctx.beginPath();
  ctx.moveTo(x1,y);
  for(var cx=x1;cx<x2;cx+=20){
    ctx.lineTo(cx,y+Math.sin(cx*0.02+t*2)*3*s);
  }
  ctx.lineTo(x2,y+8*s);
  for(var cx2=x2;cx2>x1;cx2-=20){
    ctx.lineTo(cx2,y+8*s+Math.sin(cx2*0.02+t*2)*3*s);
  }
  ctx.closePath();ctx.fill();
  // Sparkles
  ctx.fillStyle='rgba(255,255,255,0.5)';
  for(var si=0;si<5;si++){
    var sx=x1+(x2-x1)*((si*0.2+t*0.05)%1);
    if(Math.sin(t*3+si*2)>0.7){
      ctx.beginPath();ctx.arc(sx,y+4*s,1.5,0,Math.PI*2);ctx.fill();
    }
  }
}
function drawDrain(x,y,s,glowing){
  // Stone arch
  ctx.fillStyle='#555';
  ctx.beginPath();
  ctx.arc(x,y,25*s,Math.PI,0);
  ctx.lineTo(x+30*s,y+20*s);
  ctx.lineTo(x-30*s,y+20*s);
  ctx.closePath();ctx.fill();
  // Dark interior
  ctx.fillStyle='#111';
  ctx.beginPath();
  ctx.arc(x,y+2*s,20*s,Math.PI,0);
  ctx.lineTo(x+20*s,y+18*s);
  ctx.lineTo(x-20*s,y+18*s);
  ctx.closePath();ctx.fill();
  // Red glow from inside
  if(glowing){
    var pulse=0.2+Math.sin(t*2)*0.1;
    ctx.fillStyle='rgba(200,0,0,'+pulse+')';
    ctx.beginPath();ctx.arc(x,y+5*s,12*s,0,Math.PI*2);ctx.fill();
  }
  // Grate bars
  ctx.strokeStyle='#444';ctx.lineWidth=3;
  for(var gi=-15;gi<=15;gi+=10){
    ctx.beginPath();ctx.moveTo(x+gi*s,y-15*s);ctx.lineTo(x+gi*s,y+18*s);ctx.stroke();
  }
}
function drawFarmhouse(x,y,s){
  // Walls
  ctx.fillStyle='#8B4513';ctx.fillRect(x-20*s,y-30*s,40*s,30*s);
  // Roof
  ctx.fillStyle='#B22222';
  ctx.beginPath();ctx.moveTo(x-25*s,y-30*s);ctx.lineTo(x,y-50*s);ctx.lineTo(x+25*s,y-30*s);ctx.closePath();ctx.fill();
  // Door
  ctx.fillStyle='#5D3A1A';ctx.fillRect(x-5*s,y-15*s,10*s,15*s);
  // Windows
  ctx.fillStyle='#FFE082';
  ctx.fillRect(x-16*s,y-25*s,8*s,8*s);
  ctx.fillRect(x+8*s,y-25*s,8*s,8*s);
  // Window crosses
  ctx.strokeStyle='#5D3A1A';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x-12*s,y-25*s);ctx.lineTo(x-12*s,y-17*s);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-16*s,y-21*s);ctx.lineTo(x-8*s,y-21*s);ctx.stroke();
}
function drawLily(x,y,s,waving){
  // Simple girl silhouette in CC1 style
  var headY2=-80*s;
  var torsoY2=-55*s;

  ctx.save();ctx.translate(x,y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(0,0,12*s,4*s,0,0,Math.PI*2);ctx.fill();

  // Legs
  ctx.fillStyle='#2196F3';
  ctx.beginPath();ctx.roundRect(-10*s,-20*s,8*s,20*s,3*s);ctx.fill();
  ctx.beginPath();ctx.roundRect(2*s,-20*s,8*s,20*s,3*s);ctx.fill();
  // Shoes
  ctx.fillStyle='#795548';
  ctx.fillRect(-11*s,-4*s,10*s,4*s);
  ctx.fillRect(2*s,-4*s,10*s,4*s);

  // Dress/torso
  ctx.fillStyle='#E91E63';
  ctx.beginPath();ctx.roundRect(-12*s,torsoY2,24*s,35*s,4*s);ctx.fill();

  // Arms
  ctx.fillStyle='#FFCCBC';
  ctx.fillRect(-15*s,torsoY2+5*s,5*s,20*s);
  if(waving){
    ctx.save();
    ctx.translate(10*s,torsoY2+5*s);
    ctx.rotate(-0.5-Math.sin(t*6)*0.4);
    ctx.fillRect(0,0,5*s,20*s);
    ctx.restore();
  }else{
    ctx.fillRect(10*s,torsoY2+5*s,5*s,20*s);
  }

  // Head
  ctx.fillStyle='#FFCCBC';
  ctx.beginPath();ctx.arc(0,headY2,12*s,0,Math.PI*2);ctx.fill();

  // Hair (long brown)
  ctx.fillStyle='#5D4037';
  ctx.beginPath();ctx.ellipse(0,headY2-6*s,14*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillRect(-13*s,headY2-4*s,5*s,25*s);
  ctx.fillRect(8*s,headY2-4*s,5*s,25*s);

  // Face
  ctx.fillStyle='#333';
  ctx.fillRect(-4*s,headY2-3*s,2.5*s,3*s);
  ctx.fillRect(2*s,headY2-3*s,2.5*s,3*s);
  // Smile
  ctx.strokeStyle='#333';ctx.lineWidth=1.5*s;
  ctx.beginPath();ctx.arc(0,headY2+3*s,4*s,0.1,Math.PI-0.1);ctx.stroke();

  ctx.restore();
}

// ========== TEXT SYSTEM ==========
var textLines=[],textCallback=null,allTextDone=false;
var currentLineIdx=0,currentCharIdx=0,typeSpeed=35;
function showText(lines,cb){
  textBox.style.display='block';
  textBox.innerHTML='';
  promptEl.style.display='none';
  textLines=Array.isArray(lines)?lines:[lines];
  typeIdx=0;typeTimer=0;typing=true;allTextDone=false;
  waitingForClick=false;
  textCallback=cb||null;
  currentLineIdx=0;currentCharIdx=0;
}
function updateText(dt){
  if(!typing)return;
  typeTimer+=dt*1000;
  if(typeTimer>typeSpeed&&currentLineIdx<textLines.length){
    typeTimer=0;
    currentCharIdx++;
    var line=textLines[currentLineIdx];
    if(currentCharIdx>line.length){
      currentCharIdx=0;currentLineIdx++;
      if(currentLineIdx>=textLines.length){
        typing=false;allTextDone=true;
        waitingForClick=true;
        promptEl.style.display='block';
        return;
      }
    }
    var html='';
    for(var i=0;i<=currentLineIdx&&i<textLines.length;i++){
      if(i===currentLineIdx){
        html+=textLines[i].substring(0,currentCharIdx);
      }else{
        html+=textLines[i]+'<br>';
      }
    }
    textBox.innerHTML=html;
  }
}

      var trembleX=menaceRise>0.5?(Math.random()-0.5)*4:0;
      var trembleY=menaceRise>0.5?(Math.random()-0.5)*2:0;
      drawHorseCC1(W*0.25+trembleX,H*0.58+trembleY,SCALE*1.6,{alert:true});

      // Dramatic vignette
      if(menaceRise>0.5){
        var vigGrad=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
        vigGrad.addColorStop(0,'rgba(0,0,0,0)');
        vigGrad.addColorStop(1,'rgba(0,0,0,'+(menaceRise*0.4)+')');
        ctx.fillStyle=vigGrad;ctx.fillRect(0,0,W,H);
      }
    },
    onEnter:function(){playSting();}
  },

  // Scene 9: "THE LUNGE"
  {
    text:[
      "PENNYWISE LUNGED."
    ],
    draw:function(dt){
      var dark=0.8;
      drawSky(dark);

      // Red flash at start
      var flash=sceneTime<0.3?1-sceneTime/0.3:0;
      if(flash>0){
        ctx.fillStyle='rgba(200,0,0,'+(flash*0.6)+')';
        ctx.fillRect(0,0,W,H);
      }

      drawGround(dark);

      // Screen shake
      if(sceneTime<2.5){
        var shakeIntensity=Math.max(0,1-sceneTime/2.5);
        shakeX=(Math.random()-0.5)*16*shakeIntensity;
        shakeY=(Math.random()-0.5)*10*shakeIntensity;
        ctx.save();ctx.translate(shakeX,shakeY);
      }

      // Pennywise lunging - MASSIVE, teeth like razors, claws extended
      var lungeX=W*0.4+Math.min(sceneTime*120,W*0.25);
      drawPennywiseCC1(lungeX,H*0.35,SCALE*2,{menace:1,facing:1,lunge:true});

      // Balloon POP - particles
      if(sceneTime<1.5){
        for(var i=0;i<10;i++){
          var a=i*Math.PI*2/10;
          var d=sceneTime*150;
          var pr=5-sceneTime*3;
          if(pr>0){
            ctx.fillStyle='#D32F2F';
            ctx.beginPath();ctx.arc(W*0.5+Math.cos(a)*d,H*0.2+Math.sin(a)*d*0.6,pr,0,Math.PI*2);ctx.fill();
          }
        }
      }

      // Horse BOLTING at full gallop
      var horseX=W*0.6+sceneTime*100;
      if(horseX<W+200){
        drawHorseCC1(horseX,H*0.55,SCALE*1.6,{gallop:true,facing:-1});
      }

      if(sceneTime<2.5)ctx.restore();
    },
    onEnter:function(){
      playSting();playPop();
      setTimeout(function(){playNeigh();},400);
      setTimeout(function(){playGallop();},600);
    }
  },

  // Scene 10: "Safe"
  {
    text:[
      "Clover ran. Clover ran like she had never run before.",
      "Past the creek, past the old oak, past the fence where Lily was waiting with an apple and a confused expression.",
      "",
      "'What's wrong, girl?' Lily asked.",
      "",
      "Clover pressed her nose against Lily's shoulder and stayed there for a very long time."
    ],
    draw:function(dt){
      // Sun breaking through clouds
      var brightening=Math.min(1,sceneTime/4);
      var dark=0.4*(1-brightening);
      drawSky(dark);
      drawSun(W*0.8,H*0.12,SCALE*1.5,brightening);
      drawCloud(W*0.3,H*0.1,SCALE);
      drawCloud(W*0.6,H*0.08,SCALE*0.8);
      drawGround(dark);

      // Farmhouse in distance
      drawFarmhouse(W*0.78,H*0.6,SCALE*1.2);

      // Tree
      drawTree(W*0.5,H*0.62,SCALE*1.2);

      // Pennywise tiny angry figure behind
      if(sceneTime>1){
        var angryScale=SCALE*0.4;
        drawPennywiseCC1(W*0.1,H*0.59,angryScale,{menace:0.8,facing:1});
      }

      // Horse galloping toward farmhouse, then stopping near Lily
      var runDist=Math.min(1,sceneTime/3);
      var hx=W*0.2+runDist*(W*0.55);
      var isRunning=sceneTime<3;

      if(isRunning){
        drawHorseCC1(hx,H*0.58,SCALE*1.5,{gallop:true,facing:-1});
      }else{
        // Horse nuzzling Lily
        drawHorseCC1(W*0.72,H*0.58,SCALE*1.5,{facing:-1});
        drawLily(W*0.67,H*0.6,SCALE*1.2,false);
      }
    },
    onEnter:function(){playGallop();}
  },

  // Scene 11: "The Moral"
  {
    text:[
      "MORAL OF THE STORY",
      "",
      "They say don't judge a book by its cover.",
      "That's nice advice for library books.",
      "",
      "But if the book is lurking in a storm drain",
      "with yellow eyes and a balloon...",
      "",
      "...trust your instincts.",
      "Every single time.",
      "",
      "Clover knew.",
      "Clover always knew.",
      "",
      "NEIGH."
    ],
    draw:function(dt){
      // Warm sunset scene
      var grad=ctx.createLinearGradient(0,0,0,H*0.65);
      grad.addColorStop(0,'#1a0533');
      grad.addColorStop(0.3,'#ff6b35');
      grad.addColorStop(0.7,'#ffd700');
      grad.addColorStop(1,'#ffb347');
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H*0.65);

      // Sun setting
      ctx.fillStyle='#ff4500';
      ctx.beginPath();ctx.arc(W*0.5,H*0.58,SCALE*40,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(W*0.5,H*0.58,SCALE*32,0,Math.PI*2);ctx.fill();

      // Ground (dark)
      ctx.fillStyle='#1a3300';ctx.fillRect(0,H*0.62,W,H*0.4);

      // Horse and Lily silhouette against sunset
      ctx.fillStyle='#111';
      // Horse silhouette
      var victoryTrot=allTextDone?Math.sin(t*3)*15:0;
      ctx.save();
      ctx.globalAlpha=1;

      // Draw as silhouettes
      var hx2=W*0.45+victoryTrot;
      // Horse body silhouette
      ctx.fillStyle='#1a1005';
      ctx.save();ctx.translate(hx2,H*0.58);
      // Body
      ctx.fillRect(-18*SCALE*1.4,-55*SCALE*1.4,36*SCALE*1.4,40*SCALE*1.4);
      // Legs
      ctx.fillRect(-14*SCALE*1.4,-20*SCALE*1.4,6*SCALE*1.4,25*SCALE*1.4);
      ctx.fillRect(-6*SCALE*1.4,-20*SCALE*1.4,6*SCALE*1.4,25*SCALE*1.4);
      ctx.fillRect(4*SCALE*1.4,-20*SCALE*1.4,6*SCALE*1.4,25*SCALE*1.4);
      ctx.fillRect(12*SCALE*1.4,-20*SCALE*1.4,6*SCALE*1.4,25*SCALE*1.4);
      // Head
      ctx.beginPath();ctx.ellipse(5*SCALE*1.4,-80*SCALE*1.4,10*SCALE*1.4,16*SCALE*1.4,0.3,0,Math.PI*2);ctx.fill();
      // Tail swishing
      ctx.strokeStyle='#1a1005';ctx.lineWidth=4*SCALE*1.4;
      ctx.beginPath();ctx.moveTo(-18*SCALE*1.4,-45*SCALE*1.4);
      ctx.quadraticCurveTo(-30*SCALE*1.4,-50*SCALE*1.4+Math.sin(t*3)*5,-25*SCALE*1.4,-60*SCALE*1.4);ctx.stroke();
      ctx.restore();

      // Lily silhouette next to horse
      ctx.fillStyle='#1a1005';
      ctx.save();ctx.translate(W*0.38,H*0.58);
      ctx.beginPath();ctx.arc(0,-80*SCALE*1.2,12*SCALE*1.2,0,Math.PI*2);ctx.fill();
      ctx.fillRect(-12*SCALE*1.2,-55*SCALE*1.2,24*SCALE*1.2,55*SCALE*1.2);
      // Waving arm if done
      if(allTextDone){
        ctx.save();
        ctx.translate(10*SCALE*1.2,-50*SCALE*1.2);
        ctx.rotate(-0.5-Math.sin(t*6)*0.4);
        ctx.fillRect(0,0,5*SCALE*1.2,20*SCALE*1.2);
        ctx.restore();
      }
      ctx.restore();

      ctx.restore();

      // THE END
      if(allTextDone){
        ctx.save();
        ctx.fillStyle='#000';ctx.font='bold '+Math.round(48*SCALE)+'px system-ui';ctx.textAlign='center';
        ctx.fillText('THE END',W/2+2,H*0.35+2);
        ctx.fillStyle='#FFD600';
        ctx.fillText('THE END',W/2,H*0.35);
        ctx.restore();
        playAgainBtn.style.display='block';
      }
    },
    onEnter:function(){
      typeSpeed=50;
      setTimeout(function(){playNeigh();},12000);
    }
  }
];

// ========== SCENE MANAGEMENT ==========
function enterScene(idx){
  scene=idx;sceneTime=0;
  waitingForClick=false;typing=false;allTextDone=false;
  textBox.style.display='none';textBox.innerHTML='';
  promptEl.style.display='none';
  playAgainBtn.style.display='none';
  typeSpeed=35;
  /** Mood music shifts with the story arc */
  if(idx===0){playMood('peaceful');}        // relaxing meadow
  else if(idx===2){playMood('uneasy');}     // the drain appears
  else if(idx===3){playMood('creepy');}      // Pennywise emerges
  else if(idx===7){stopMusic();playMood('creepy');} // desperate
  else if(idx===8){stopMusic();}             // silence before the storm
  else if(idx===9){playMood('jumpscare');}   // THE LUNGE
  else if(idx===10){playMood('peaceful');}   // safe, running home
  else if(idx===11){playMood('warm');}       // Full House moment
  if(scenes[idx].onEnter)scenes[idx].onEnter();
  setTimeout(function(){
    showText(scenes[idx].text);
  },800);
}

function advanceScene(){
  if(typing){
    typing=false;allTextDone=true;
    var html=textLines.join('<br>');
    textBox.innerHTML=html;
    waitingForClick=true;
    promptEl.style.display='block';
    return;
  }
  if(!waitingForClick)return;
  if(scene>=scenes.length-1)return;
  promptEl.style.display='none';
  waitingForClick=false;
  transitioning=true;transDir=1;transAlpha=0;
  nextScene=scene+1;
}

function handleClick(){
  initAudio();
  if(transitioning)return;
  advanceScene();
}

C.addEventListener('click',handleClick);
C.addEventListener('touchstart',function(e){e.preventDefault();handleClick();},{passive:false});

playAgainBtn.addEventListener('click',function(e){
  e.stopPropagation();
  if(drone){drone.stop();drone=null;}
  playAgainBtn.style.display='none';
  transitioning=true;transDir=1;transAlpha=0;nextScene=0;
});

// ========== MAIN LOOP ==========
var lastTime=0;
function frame(ts){
  var dt=(ts-lastTime)/1000;if(dt>0.1)dt=0.1;
  lastTime=ts;t+=dt;
  sceneTime+=dt;

  ctx.save();
  ctx.clearRect(0,0,W,H);

  if(scenes[scene])scenes[scene].draw(dt);

  updateText(dt);

  // Transition overlay
  if(transitioning){
    transAlpha+=transDir*dt*2;
    if(transAlpha>=1&&transDir===1){
      transAlpha=1;transDir=-1;
      if(nextScene>=0)enterScene(nextScene);
    }
    if(transAlpha<=0&&transDir===-1){
      transAlpha=0;transitioning=false;
    }
    ctx.fillStyle='rgba(0,0,0,'+Math.max(0,Math.min(1,transAlpha))+')';
    ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
  requestAnimationFrame(frame);
}

enterScene(0);
requestAnimationFrame(frame);
</script>
