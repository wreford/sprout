<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1">
<title>Truth or Dare</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f10;--surface:#1a1a24;--border:#2a2a3a;--text:#e8e8ea;--dim:#777;--blue:#3b82f6;--blue-glow:rgba(59,130,246,.3);--red:#ef4444;--orange:#ff6b35;--red-glow:rgba(239,68,68,.3);--orange-glow:rgba(255,107,53,.3);--green:#2ecc71;--gold:#f1c40f;--purple:#9b59b6;--truth-gradient:linear-gradient(135deg,#3b82f6,#06b6d4);--dare-gradient:linear-gradient(135deg,#ef4444,#ff6b35)}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}
button{font-family:inherit;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
input{font-family:inherit;outline:none}
a{color:var(--dim);text-decoration:none}

/* Home link */
.home-link{position:fixed;top:12px;left:12px;font-size:.7rem;color:var(--dim);z-index:999;text-decoration:none;font-family:'Courier New',monospace}
.home-link:hover{color:var(--text)}

/* ─── SHARED ─── */
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:2vmin;text-align:center;overflow-y:auto}
.title{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:2px;margin-bottom:.3rem}
.title .truth-text{background:var(--truth-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title .dare-text{background:var(--dare-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--dim);font-size:clamp(.75rem,1.3vw,1rem);margin-bottom:1.5rem}

/* Buttons */
.btn{background:var(--orange);color:#fff;font-size:clamp(1rem,2vw,1.3rem);font-weight:700;padding:.8rem 2rem;border-radius:14px;letter-spacing:1px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px var(--orange-glow);margin:.4rem}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.btn.secondary{background:var(--surface);border:2px solid var(--border);box-shadow:none;font-size:clamp(.85rem,1.5vw,1rem)}
.btn.secondary:hover{border-color:var(--orange);background:rgba(255,107,53,.1)}
.btn-truth{background:var(--truth-gradient);box-shadow:0 4px 30px var(--blue-glow);font-size:clamp(1.3rem,3vw,2rem);padding:1.2rem 2.5rem;border-radius:18px;font-weight:900;letter-spacing:3px;position:relative;overflow:hidden}
.btn-dare{background:var(--dare-gradient);box-shadow:0 4px 30px var(--red-glow);font-size:clamp(1.3rem,3vw,2rem);padding:1.2rem 2.5rem;border-radius:18px;font-weight:900;letter-spacing:3px;position:relative;overflow:hidden}
.btn-truth:hover,.btn-dare:hover{transform:scale(1.08)}
.btn-truth:active,.btn-dare:active{transform:scale(.95)}

/* Choice buttons container */
.choice-btns{display:flex;gap:2rem;margin:2rem 0;flex-wrap:wrap;justify-content:center}

/* ─── SETUP SCREEN ─── */
.setup-wrap{max-width:500px;width:100%}
.player-inputs{display:flex;flex-direction:column;gap:.6rem;margin:1rem 0}
.player-row{display:flex;gap:.5rem;align-items:center}
.player-row input{flex:1;background:var(--surface);border:2px solid var(--border);color:var(--text);padding:.6rem 1rem;border-radius:10px;font-size:1rem}
.player-row input:focus{border-color:var(--orange)}
.player-row .remove-btn{background:none;color:var(--dim);font-size:1.2rem;padding:.3rem .6rem;border-radius:8px}
.player-row .remove-btn:hover{color:var(--red)}
.add-player-btn{background:var(--surface);border:2px dashed var(--border);color:var(--dim);padding:.5rem;border-radius:10px;font-size:.9rem;width:100%;margin:.5rem 0}
.add-player-btn:hover{border-color:var(--orange);color:var(--text)}

/* ─── GAME SCREEN ─── */
.game-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;padding:.5rem 1rem;position:relative}
.scoreboard-mini{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin:.5rem 0}
.score-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.3rem .8rem;font-size:.8rem;white-space:nowrap}
.score-chip.active{border-color:var(--orange);box-shadow:0 0 15px var(--orange-glow)}
.score-chip .chip-name{font-weight:700;margin-right:.3rem}
.score-chip .chip-score{color:var(--orange)}

/* Active player spotlight */
.spotlight{font-size:clamp(1.5rem,3.5vw,2.5rem);font-weight:900;color:var(--orange);margin:1rem 0;text-shadow:0 0 30px var(--orange-glow);animation:spotlightPulse 2s ease-in-out infinite}
@keyframes spotlightPulse{0%,100%{text-shadow:0 0 30px var(--orange-glow)}50%{text-shadow:0 0 60px var(--orange-glow),0 0 100px rgba(255,107,53,.15)}}

/* Card */
.card-container{perspective:1000px;margin:1.5rem 0}
.card{width:min(85vw,450px);min-height:220px;position:relative;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,.2,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card-front{background:var(--surface);border:2px solid var(--border)}
.card-front .card-q{font-size:3rem}
.card-back{transform:rotateY(180deg);border:3px solid}
.card-back.truth-card{background:linear-gradient(135deg,#1a2744,#1a3355);border-color:var(--blue)}
.card-back.dare-card{background:linear-gradient(135deg,#3a1a1a,#442200);border-color:var(--red)}
.card-category{font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:.8rem;opacity:.7}
.card-type{font-size:1rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:1rem}
.card-type.truth{color:var(--blue)}
.card-type.dare{color:var(--red)}
.card-text{font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:600;line-height:1.4;max-width:380px}

/* Card shake animation */
.card-shake{animation:cardShake .5s ease}
@keyframes cardShake{0%,100%{transform:rotateY(180deg) translateX(0)}15%{transform:rotateY(180deg) translateX(-8px)}30%{transform:rotateY(180deg) translateX(6px)}45%{transform:rotateY(180deg) translateX(-4px)}60%{transform:rotateY(180deg) translateX(3px)}75%{transform:rotateY(180deg) translateX(-1px)}}

/* Vote section */
.vote-section{margin:1.5rem 0;display:flex;flex-direction:column;align-items:center;gap:1rem}
.vote-btns{display:flex;gap:1.5rem}
.vote-btn{padding:1rem 2rem;border-radius:14px;font-size:1.2rem;font-weight:800;letter-spacing:1px}
.vote-yes{background:var(--green);color:#fff}
.vote-no{background:var(--red);color:#fff}
.vote-result{font-size:1.1rem;font-weight:700;margin:.5rem 0}

/* Chicken animation */
.chicken-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,.7);animation:fadeIn .3s}
.chicken-text{font-size:clamp(3rem,10vw,6rem);animation:chickenBounce 1s ease infinite}
@keyframes chickenBounce{0%,100%{transform:scale(1) rotate(0)}25%{transform:scale(1.2) rotate(-5deg)}50%{transform:scale(1) rotate(5deg)}75%{transform:scale(1.1) rotate(-3deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Confetti canvas */
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99}

/* Particle containers */
.particles-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* Scoreboard final */
.final-wrap{max-width:600px;width:100%}
.final-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem}
.podium{display:flex;flex-direction:column;gap:.8rem;width:100%;margin-bottom:1.5rem}
.podium-row{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;background:var(--surface);border-radius:14px;border:2px solid var(--border);opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
.podium-row.visible{opacity:1;transform:translateY(0)}
.podium-row:first-child{border-color:var(--gold);box-shadow:0 0 25px rgba(241,196,15,.2)}
.pod-rank{font-weight:900;min-width:2rem;text-align:center;font-size:1.5rem}
.podium-row:nth-child(1) .pod-rank{color:var(--gold)}
.podium-row:nth-child(2) .pod-rank{color:#c0c0c0}
.podium-row:nth-child(3) .pod-rank{color:#cd7f32}
.pod-name{flex:1;font-weight:700;font-size:1.1rem;text-align:left}
.pod-score{color:var(--orange);font-weight:800;font-size:1.2rem}
.pod-chickens{font-size:.8rem;color:var(--dim);margin-left:.5rem}
.stats-row{color:var(--dim);font-size:.85rem;margin:.3rem 0}

/* ─── TV / HOST MODE ─── */
.tv-room-code{font-size:clamp(4rem,10vw,8rem);font-weight:900;letter-spacing:1rem;color:var(--orange);text-shadow:0 0 40px var(--orange-glow);margin:1rem 0}
.tv-join-url{color:var(--dim);font-size:clamp(.9rem,1.8vw,1.2rem);margin-bottom:1.5rem}
.tv-join-url span{color:var(--orange);font-weight:700}
.tv-player-list{display:flex;flex-wrap:wrap;gap:.8rem;justify-content:center;margin:1rem 0;max-width:700px}
.tv-player-chip{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:.5rem 1.2rem;font-size:clamp(.9rem,1.8vw,1.2rem);font-weight:700;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.tv-test-badge{background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:.2rem .5rem;border-radius:5px;margin-left:.4rem;vertical-align:middle;letter-spacing:1px}

/* Vote results TV */
.tv-vote-results{display:flex;flex-direction:column;gap:.5rem;max-width:500px;width:100%;margin:1rem 0}
.tv-vote-row{display:flex;align-items:center;gap:.8rem;font-size:1rem}
.tv-vote-name{min-width:100px;text-align:right;font-weight:700}
.tv-vote-icon{font-size:1.5rem}

/* ─── PHONE / PLAYER MODE ─── */
.phone-wrap{max-width:400px;width:100%;padding:1rem}
.phone-status{color:var(--dim);font-size:.85rem;margin:.5rem 0}
.phone-turn-info{font-size:1.1rem;font-weight:600;margin:1rem 0;color:var(--text)}
.phone-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;padding:1.5rem;margin:1rem 0;font-size:1.1rem;line-height:1.4}
.phone-card.truth{border-color:var(--blue);background:linear-gradient(135deg,#1a2744,#1a3355)}
.phone-card.dare{border-color:var(--red);background:linear-gradient(135deg,#3a1a1a,#442200)}
.phone-standings{width:100%;margin:1rem 0}
.phone-standings table{width:100%;border-collapse:collapse;font-size:.9rem}
.phone-standings th{text-align:left;color:var(--dim);padding:.3rem .5rem;border-bottom:1px solid var(--border)}
.phone-standings td{padding:.4rem .5rem;border-bottom:1px solid rgba(42,42,58,.5)}
.phone-standings .pts{color:var(--orange);font-weight:700;text-align:right}

/* Waiting pulse */
.waiting{color:var(--orange);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Responsive */
@media(max-width:500px){
 .choice-btns{flex-direction:column;gap:1rem;align-items:center}
 .btn-truth,.btn-dare{width:80%;max-width:280px}
}
</style>
</head>
<body>

<a href="../index.html" class="home-link">&larr; taskiap.com</a>
<canvas id="confetti-canvas"></canvas>
<div class="particles-container" id="particles"></div>

<!-- ═══════ PASS-AND-PLAY SCREENS ═══════ -->

<!-- Setup -->
<div id="screen-setup" class="wrap">
 <div class="setup-wrap">
  <div class="title"><span class="truth-text">TRUTH</span> <span style="color:var(--dim)">or</span> <span class="dare-text">DARE</span></div>
  <div class="subtitle">The Party Classic &mdash; Digitized</div>
  <div class="player-inputs" id="player-inputs"></div>
  <button class="add-player-btn" id="add-player-btn" onclick="addPlayerInput()">+ Add Player</button>
  <div style="margin-top:1rem">
   <button class="btn" id="start-btn" onclick="startGame()">START GAME</button>
  </div>
  <div style="margin-top:1.5rem;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
   <button class="btn secondary" onclick="goHost()">Host (TV Mode)</button>
   <button class="btn secondary" onclick="goJoin()">Join Game</button>
  </div>
 </div>
</div>

<!-- Turn: Choose Truth or Dare -->
<div id="screen-choose" class="wrap hidden">
 <div class="scoreboard-mini" id="scoreboard-mini"></div>
 <div class="spotlight" id="active-player-name"></div>
 <div style="color:var(--dim);font-size:1rem;margin-bottom:.5rem">It's your turn! Choose wisely...</div>
 <div class="choice-btns">
  <button class="btn-truth" onclick="chooseTruth()">&#10052; TRUTH &#10052;</button>
  <button class="btn-dare" onclick="chooseDare()">&#128293; DARE &#128293;</button>
 </div>
 <button class="btn secondary" style="margin-top:2rem" onclick="endGame()">End Game</button>
</div>

<!-- Reveal Card -->
<div id="screen-reveal" class="wrap hidden">
 <div class="scoreboard-mini" id="scoreboard-mini2"></div>
 <div class="spotlight" id="reveal-player-name"></div>
 <div class="card-container">
  <div class="card" id="reveal-card">
   <div class="card-face card-front"><div class="card-q">?</div></div>
   <div class="card-face card-back" id="reveal-card-back">
    <div class="card-category" id="reveal-category"></div>
    <div class="card-type" id="reveal-type"></div>
    <div class="card-text" id="reveal-text"></div>
   </div>
  </div>
 </div>
 <div class="vote-section" id="vote-section">
  <div style="font-size:1.1rem;font-weight:600;margin-bottom:.3rem">Did they do it?</div>
  <div class="vote-btns">
   <button class="vote-btn vote-yes" onclick="voteYes()">&#10004; YES</button>
   <button class="vote-btn vote-no" onclick="voteNo()">&#10008; NOPE</button>
  </div>
 </div>
</div>

<!-- Chicken / Switch -->
<div id="screen-switch" class="wrap hidden">
 <div class="spotlight" id="switch-player-name"></div>
 <div style="font-size:1.5rem;margin:1rem 0">Chickened out! Take the other for half points?</div>
 <div class="choice-btns">
  <button class="btn" id="switch-btn" onclick="switchChoice()">Take It (50 pts)</button>
  <button class="btn secondary" onclick="skipEntirely()">Pass Completely</button>
 </div>
</div>

<!-- Final Scoreboard -->
<div id="screen-final" class="wrap hidden">
 <div class="final-wrap">
  <div class="final-title">GAME OVER</div>
  <div class="podium" id="final-podium"></div>
  <div id="final-stats"></div>
  <div style="margin-top:1.5rem;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
   <button class="btn" onclick="location.reload()">Play Again</button>
  </div>
 </div>
</div>

<!-- ═══════ TV / HOST SCREENS ═══════ -->

<div id="screen-tv-lobby" class="wrap hidden">
 <div class="title"><span class="truth-text">TRUTH</span> <span style="color:var(--dim)">or</span> <span class="dare-text">DARE</span></div>
 <div class="subtitle">Join the game on your phone!</div>
 <div class="tv-room-code" id="tv-room-code">...</div>
 <div class="tv-join-url" id="tv-join-url"></div>
 <div style="color:var(--dim);font-size:.85rem;margin-bottom:.5rem">Players:</div>
 <div class="tv-player-list" id="tv-player-list"></div>
 <div style="margin-top:1rem;display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center">
  <button class="btn" id="tv-start-btn" disabled onclick="tvStartGame()">START GAME</button>
  <button class="btn secondary" id="tv-test-btn" onclick="tvAddBots()">Test Mode</button>
 </div>
 <div class="phone-status" id="tv-status"></div>
</div>

<div id="screen-tv-game" class="wrap hidden">
 <div class="scoreboard-mini" id="tv-scoreboard"></div>
 <div class="spotlight" id="tv-active-player"></div>
 <div id="tv-game-content"></div>
</div>

<div id="screen-tv-final" class="wrap hidden">
 <div class="final-wrap">
  <div class="final-title">GAME OVER</div>
  <div class="podium" id="tv-final-podium"></div>
  <div id="tv-final-stats"></div>
  <button class="btn" style="margin-top:1rem" onclick="location.reload()">Play Again</button>
 </div>
</div>

<!-- ═══════ PHONE / PLAYER SCREENS ═══════ -->

<div id="screen-phone-join" class="wrap hidden">
 <div class="phone-wrap">
  <div class="title" style="font-size:clamp(1.5rem,4vw,2rem)"><span class="truth-text">TRUTH</span> <span style="color:var(--dim)">or</span> <span class="dare-text">DARE</span></div>
  <div class="subtitle">Join Game</div>
  <input type="text" id="phone-name-input" placeholder="Your name" style="width:100%;background:var(--surface);border:2px solid var(--border);color:var(--text);padding:.8rem 1rem;border-radius:12px;font-size:1.1rem;text-align:center;margin:1rem 0">
  <button class="btn" id="phone-join-btn" onclick="phoneJoin()">JOIN</button>
  <div class="phone-status" id="phone-status"></div>
 </div>
</div>

<div id="screen-phone-lobby" class="wrap hidden">
 <div class="phone-wrap">
  <div class="title" style="font-size:clamp(1.3rem,3vw,1.8rem)"><span class="truth-text">TRUTH</span> <span style="color:var(--dim)">or</span> <span class="dare-text">DARE</span></div>
  <div style="font-size:1.2rem;font-weight:700;margin:1rem 0" id="phone-lobby-name"></div>
  <div class="waiting">Waiting for host to start...</div>
  <div class="phone-standings" id="phone-lobby-players"></div>
 </div>
</div>

<div id="screen-phone-game" class="wrap hidden">
 <div class="phone-wrap">
  <div id="phone-game-content"></div>
  <div class="phone-standings" id="phone-standings"></div>
 </div>
</div>

// AUDIO ENGINE (Web Audio API, max volume 0.02)
// ═══════════════════════════════════════════

const AudioEngine = (function(){
 let ctx = null;
 const MAX_VOL = 0.02;

 function getCtx(){
  if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  if(ctx.state === 'suspended') ctx.resume();
  return ctx;
 }

 function playTone(freq, duration, type='sine', vol=MAX_VOL, attack=0.01, decay=0.1){
  const c = getCtx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, c.currentTime);
  gain.gain.linearRampToValueAtTime(Math.min(vol, MAX_VOL), c.currentTime + attack);
  gain.gain.linearRampToValueAtTime(0, c.currentTime + duration - decay);
  osc.connect(gain);
  gain.connect(c.destination);
  osc.start(c.currentTime);
  osc.stop(c.currentTime + duration);
 }

 function noise(duration, vol=MAX_VOL*0.5){
  const c = getCtx();
  const bufSize = c.sampleRate * duration;
  const buf = c.createBuffer(1, bufSize, c.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
  const src = c.createBufferSource();
  src.buffer = buf;
  const gain = c.createGain();
  gain.gain.setValueAtTime(Math.min(vol, MAX_VOL), c.currentTime);
  gain.gain.linearRampToValueAtTime(0, c.currentTime + duration);
  const filter = c.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 1000;
  filter.Q.value = 0.5;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(c.destination);
  src.start();
 }

 return {
  drumroll(){
   const c = getCtx();
   const dur = 1.5;
   for(let i=0;i<30;i++){
    const t = (i/30)*dur;
    const v = (i/30)*MAX_VOL;
    setTimeout(()=>noise(0.06, v), t*1000);
   }
  },
  cardFlip(){
   playTone(800, 0.1, 'sine', MAX_VOL, 0.005, 0.05);
   setTimeout(()=>playTone(1200, 0.15, 'sine', MAX_VOL*0.7, 0.005, 0.08), 50);
  },
  cheer(){
   [523,659,784,1047].forEach((f,i)=>{
    setTimeout(()=>playTone(f, 0.3, 'triangle', MAX_VOL*0.8, 0.01, 0.15), i*80);
   });
   setTimeout(()=>noise(0.3, MAX_VOL*0.3), 100);
  },
  chicken(){
   // Bawk bawk
   for(let i=0;i<3;i++){
    setTimeout(()=>{
     playTone(400+Math.random()*100, 0.12, 'sawtooth', MAX_VOL*0.6, 0.01, 0.05);
     setTimeout(()=>playTone(300+Math.random()*80, 0.08, 'sawtooth', MAX_VOL*0.4, 0.01, 0.03), 60);
    }, i*250);
   }
  },
  dareSting(){
   // Dramatic sting
   playTone(220, 0.5, 'sawtooth', MAX_VOL*0.5, 0.02, 0.2);
   setTimeout(()=>playTone(277, 0.4, 'sawtooth', MAX_VOL*0.6, 0.02, 0.15), 200);
   setTimeout(()=>playTone(330, 0.6, 'square', MAX_VOL*0.7, 0.02, 0.3), 400);
   setTimeout(()=>noise(0.15, MAX_VOL*0.3), 350);
  },
  truthChime(){
   [523,659,784].forEach((f,i)=>{
    setTimeout(()=>playTone(f, 0.4, 'sine', MAX_VOL*0.6, 0.01, 0.2), i*120);
   });
  },
  pointsSound(){
   [440,554,659].forEach((f,i)=>{
    setTimeout(()=>playTone(f, 0.15, 'triangle', MAX_VOL*0.5, 0.005, 0.08), i*60);
   });
  }
 };
})();

const confettiCanvas = document.getElementById('confetti-canvas');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiRunning = false;

function resizeConfetti(){
 confettiCanvas.width = window.innerWidth;
 confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

function launchConfetti(duration=2000){
 const colors = ['#3b82f6','#ef4444','#ff6b35','#2ecc71','#f1c40f','#9b59b6','#e8e8ea'];
 for(let i=0;i<80;i++){
  confettiPieces.push({
   x: Math.random()*confettiCanvas.width,
   y: -10 - Math.random()*100,
   w: 6+Math.random()*6,
   h: 4+Math.random()*4,
   color: colors[Math.floor(Math.random()*colors.length)],
   vx: (Math.random()-0.5)*4,
   vy: 2+Math.random()*3,
   rot: Math.random()*360,
   rotV: (Math.random()-0.5)*10,
   life: duration
  });
 }
 if(!confettiRunning){confettiRunning=true;animateConfetti();}
}

function animateConfetti(){
 confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
 confettiPieces = confettiPieces.filter(p=>{
  p.x += p.vx; p.y += p.vy; p.vy += 0.05;
  p.rot += p.rotV; p.life -= 16;
  if(p.life <= 0 || p.y > confettiCanvas.height+20) return false;
  confettiCtx.save();
  confettiCtx.translate(p.x, p.y);
  confettiCtx.rotate(p.rot*Math.PI/180);
  confettiCtx.fillStyle = p.color;
  confettiCtx.globalAlpha = Math.min(1, p.life/300);
  confettiCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
  confettiCtx.restore();
  return true;
 });
 if(confettiPieces.length > 0){
  requestAnimationFrame(animateConfetti);
 } else {
  confettiRunning = false;
  confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
 }
}

// Track used truths/dares to avoid repeats
let usedTruths = new Set();
let usedDares = new Set();

function getRandomTruth(){
 if(usedTruths.size >= ALL_TRUTHS.length) usedTruths.clear();
 let item;
 do { item = randFrom(ALL_TRUTHS); } while(usedTruths.has(item.id));
 usedTruths.add(item.id);

}

function getRandomDare(){
 if(usedDares.size >= ALL_DARES.length) usedDares.clear();
 let item;
 do { item = randFrom(ALL_DARES); } while(usedDares.has(item.id));
 usedDares.add(item.id);
 return item;
}

   $('switch-btn').textContent = '\u{1F525} Take a DARE instead (50 pts)';
  } else {
   $('switch-btn').textContent = '❄️ Take a TRUTH instead (50 pts)';
  }
 });
}

function switchChoice(){
 if(currentChoice === 'truth'){
  currentChoice = 'dare';
  currentItem = getRandomDare();
 } else {
  currentChoice = 'truth';
  currentItem = getRandomTruth();
 }
 // Show the new card but worth 50 pts
 showScreen('screen-reveal');
 renderScoreboard();
 $('reveal-player-name').textContent = players[currentPlayerIdx].name + ' (Half Points)';

 const card = $('reveal-card');
 const back = $('reveal-card-back');
 card.classList.remove('flipped','card-shake');

 back.className = 'card-face card-back ' + (currentChoice==='truth'?'truth-card':'dare-card');
 $('reveal-category').textContent = categoryLabel(currentItem.category);
 $('reveal-type').textContent = currentChoice.toUpperCase() + ' (50 pts)';
 $('reveal-type').className = 'card-type ' + currentChoice;
 $('reveal-text').textContent = currentItem.text;

 if(currentChoice === 'truth') createParticles('truth');
 else createParticles('dare');

 AudioEngine.drumroll();
 setTimeout(()=>{
  card.classList.add('flipped');
  AudioEngine.cardFlip();
  setTimeout(()=>card.classList.add('card-shake'), 800);
 }, 1200);

 // Replace vote section with simple complete/skip
 $('vote-section').classList.remove('hidden');
 $('vote-section').innerHTML = `
  <div style="font-size:1.1rem;font-weight:600;margin-bottom:.3rem">Did they complete it?</div>
  <div class="vote-btns">
   <button class="vote-btn vote-yes" onclick="halfPointsYes()">&#10004; YES (+50)</button>
   <button class="vote-btn vote-no" onclick="halfPointsNo()">&#10008; NOPE</button>
  </div>
 `;
}

function halfPointsYes(){
 players[currentPlayerIdx].score += 50;
 players[currentPlayerIdx].completed++;
 AudioEngine.cheer();
 launchConfetti(1500);
 $('vote-section').classList.add('hidden');
 setTimeout(()=>{
  $('particles').innerHTML = '';
  resetVoteSection();
  advanceTurn();
 }, 1500);
}

function halfPointsNo(){
 $('vote-section').classList.add('hidden');
 showChickenAnimation(()=>{
  $('particles').innerHTML = '';
  resetVoteSection();
  advanceTurn();
 });
}

function resetVoteSection(){
 $('vote-section').innerHTML = `
  <div style="font-size:1.1rem;font-weight:600;margin-bottom:.3rem">Did they do it?</div>
  <div class="vote-btns">
   <button class="vote-btn vote-yes" onclick="voteYes()">&#10004; YES</button>
   <button class="vote-btn vote-no" onclick="voteNo()">&#10008; NOPE</button>
  </div>
 `;
}

function skipEntirely(){
 $('particles').innerHTML = '';
 resetVoteSection();
 advanceTurn();
}

function advanceTurn(){
 currentPlayerIdx = (currentPlayerIdx+1) % players.length;
 nextTurn();
}

function endGame(){
 $('particles').innerHTML = '';
 showScreen('screen-final');
 const sorted = [...players].sort((a,b)=>b.score-a.score);
 const podium = $('final-podium');
 podium.innerHTML = sorted.map((p,i)=>`
  <div class="podium-row" style="transition-delay:${i*0.2}s">
   <div class="pod-rank">${i===0?'\u{1F451}':i===1?'\u{1F948}':i===2?'\u{1F949}':i+1}</div>
   <div class="pod-name">${p.name}</div>
   <div class="pod-score">${p.score} pts</div>
   <div class="pod-chickens">${p.chickens>0?'\u{1F414}'.repeat(Math.min(p.chickens,5)):''}</div>
  </div>
 `).join('');

 setTimeout(()=>{
  podium.querySelectorAll('.podium-row').forEach(r=>r.classList.add('visible'));
 }, 100);

 // Stats
 const mostChickens = [...players].sort((a,b)=>b.chickens-a.chickens)[0];
 const stats = $('final-stats');
 stats.innerHTML = `
  <div class="stats-row">Rounds played: ${roundNumber}</div>
  <div class="stats-row">Biggest chicken: ${mostChickens.name} (${mostChickens.chickens} time${mostChickens.chickens!==1?'s':''})</div>
 `;

 if(sorted[0]) launchConfetti(3000);
 AudioEngine.cheer();
}

// Navigation helpers
function goHost(){window.location.href = 'truthordare.html?host';}
function goJoin(){
 const code = prompt('Enter room code:');
 if(code) window.location.href = `truthordare.html?join=${code.toUpperCase()}`;
}

// ═══════════════════════════════════════════
// MULTIPLAYER — TV/HOST MODE
// ═══════════════════════════════════════════

let peer = null;
let connections = {};
let mpPlayers = {};
let mpPlayerOrder = [];
let mpCurrentIdx = 0;
let mpCurrentChoice = null;
let mpCurrentItem = null;
let mpVotes = {};
let mpRound = 0;
let roomCode = '';
let mpPhase = 'lobby'; // lobby, choosing, reveal, voting, results
let botInterval = null;

function generateCode(){
 const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
 let code = '';
 for(let i=0;i<4;i++) code += chars[Math.floor(Math.random()*chars.length)];
 return code;
}

function initHostMode(){
 showScreen('screen-tv-lobby');
 roomCode = generateCode();
 $('tv-room-code').textContent = roomCode;
 $('tv-join-url').innerHTML = `taskiap.com/games/truthordare.html?join=<span>${roomCode}</span>`;

 const peerId = 'taskiap-truthordare-' + roomCode;
 peer = new Peer(peerId, {debug:0});

 peer.on('open', ()=>{
  $('tv-status').textContent = 'Room open! Waiting for players...';
 });

 peer.on('connection', conn => {
  conn.on('open', ()=>{
   conn.on('data', data => handleHostMessage(conn, data));
  });
  conn.on('close', ()=>{
   // Player disconnected
   for(const[id, c] of Object.entries(connections)){
    if(c === conn){
     delete connections[id];
     if(mpPlayers[id]) mpPlayers[id].connected = false;
     renderTVPlayers();
     break;
    }
   }
  });
 });

 peer.on('error', err=>{
  console.error('Peer error:', err);
  $('tv-status').textContent = 'Connection error: ' + err.type;
 });
}

function handleHostMessage(conn, data){
 switch(data.type){
  case 'join':
   const pid = data.name + '_' + Date.now();
   connections[pid] = conn;
   mpPlayers[pid] = {name:data.name, score:0, chickens:0, completed:0, connected:true, isBot:false};
   conn.send({type:'joined', playerId:pid});
   renderTVPlayers();
   updateStartBtn();
   broadcastPlayerList();
   break;

  case 'choose':
   if(mpPhase === 'choosing' && data.playerId === mpPlayerOrder[mpCurrentIdx]){
    mpCurrentChoice = data.choice;
    mpCurrentItem = data.choice === 'truth' ? getRandomTruth() : getRandomDare();
    mpPhase = 'reveal';
    broadcastAll({type:'reveal', choice:mpCurrentChoice, item:mpCurrentItem, player:mpPlayers[mpPlayerOrder[mpCurrentIdx]].name});
    tvShowReveal();
   }
   break;

  case 'vote':
   if(mpPhase === 'voting' && data.playerId !== mpPlayerOrder[mpCurrentIdx]){
    mpVotes[data.playerId] = data.vote;
    checkAllVotes();
   }
   break;
 }
}

function broadcastAll(msg){
 for(const conn of Object.values(connections)){
  try{conn.send(msg);}catch(e){}
 }
}

function broadcastPlayerList(){
 const list = Object.entries(mpPlayers).map(([id,p])=>({id,name:p.name,score:p.score,chickens:p.chickens}));
 broadcastAll({type:'playerList', players:list});
}

function renderTVPlayers(){
 const list = $('tv-player-list');
 list.innerHTML = Object.values(mpPlayers).map(p=>
  `<div class="tv-player-chip">${p.name}${p.isBot?'<span class="tv-test-badge">BOT</span>':''}</div>`
 ).join('');
}

function updateStartBtn(){
 const count = Object.keys(mpPlayers).length;
 $('tv-start-btn').disabled = count < 2;
 $('tv-status').textContent = `${count} player${count!==1?'s':''} connected`;
}

function tvAddBots(){
 const botNames = ['AlphaBot','BetaBot','GammaBot'];
 botNames.forEach((name,i)=>{
  const pid = 'bot_'+i+'_'+Date.now();
  mpPlayers[pid] = {name, score:0, chickens:0, completed:0, connected:true, isBot:true};
  connections[pid] = {send:()=>{}, isBot:true};
 });
 renderTVPlayers();
 updateStartBtn();
 $('tv-test-btn').disabled = true;
}

function tvStartGame(){
 mpPlayerOrder = Object.keys(mpPlayers);
 mpCurrentIdx = 0;
 mpRound = 0;
 usedTruths.clear();
 usedDares.clear();
 broadcastAll({type:'gameStart'});
 showScreen('screen-tv-game');
 tvNextTurn();
}

function tvNextTurn(){
 mpRound++;
 mpCurrentChoice = null;
 mpCurrentItem = null;
 mpVotes = {};
 mpPhase = 'choosing';

 const pid = mpPlayerOrder[mpCurrentIdx];
 const player = mpPlayers[pid];

 renderTVScoreboard();

 $('tv-active-player').textContent = player.name + "'s Turn!";
 $('tv-game-content').innerHTML = `
  <div class="waiting" style="font-size:1.3rem;margin:1.5rem 0">Waiting for ${player.name} to choose...</div>
  <div class="choice-btns">
   <div class="btn-truth" style="opacity:.5;cursor:default">&#10052; TRUTH &#10052;</div>
   <div class="btn-dare" style="opacity:.5;cursor:default">&#128293; DARE &#128293;</div>
  </div>
 `;

 // Tell players whose turn it is
 broadcastAll({type:'turn', playerId:pid, playerName:player.name});

 // Bots auto-choose
 if(player.isBot){
  setTimeout(()=>{
   handleHostMessage(null, {type:'choose', playerId:pid, choice:Math.random()>0.5?'truth':'dare'});
  }, 1500+Math.random()*1500);
 }
}

function tvShowReveal(){
 const pid = mpPlayerOrder[mpCurrentIdx];
 const player = mpPlayers[pid];

 const isTruth = mpCurrentChoice === 'truth';

 $('tv-game-content').innerHTML = `
  <div class="card-container">
   <div class="card" id="tv-card">
    <div class="card-face card-front"><div class="card-q">?</div></div>
    <div class="card-face card-back ${isTruth?'truth-card':'dare-card'}">
     <div class="card-category">${categoryLabel(mpCurrentItem.category)}</div>
     <div class="card-type ${mpCurrentChoice}">${mpCurrentChoice.toUpperCase()}</div>
     <div class="card-text">${mpCurrentItem.text}</div>
    </div>
   </div>
  </div>
  <div class="waiting" style="margin-top:1rem" id="tv-vote-status">Revealing...</div>
 `;

 if(isTruth) createParticles('truth');
 else createParticles('dare');

 AudioEngine.drumroll();
 setTimeout(()=>{
  const card = $('tv-card');
  if(card){
   card.classList.add('flipped');
   AudioEngine.cardFlip();
   if(isTruth) AudioEngine.truthChime();
   else AudioEngine.dareSting();
   setTimeout(()=>card.classList.add('card-shake'), 800);
  }

  // After reveal, start voting
  setTimeout(()=>{
   mpPhase = 'voting';
   $('tv-vote-status').textContent = 'Everyone vote: Did they do it?';
   broadcastAll({type:'vote-start', playerId:pid});

   // Bots auto-vote
   for(const[id,p] of Object.entries(mpPlayers)){
    if(p.isBot && id !== pid){
     setTimeout(()=>{
      mpVotes[id] = Math.random() > 0.3; // Bots usually vote yes
      checkAllVotes();
     }, 1000+Math.random()*2000);
    }
   }
  }, 2000);
 }, 1500);
}

function checkAllVotes(){
 const pid = mpPlayerOrder[mpCurrentIdx];
 const voterCount = Object.keys(mpPlayers).filter(id=>id!==pid).length;
 const voteCount = Object.keys(mpVotes).length;

 $('tv-vote-status').textContent = `Votes: ${voteCount}/${voterCount}`;

 if(voteCount >= voterCount){
  mpPhase = 'results';
  tvShowVoteResults();
 }
}

function tvShowVoteResults(){
 const pid = mpPlayerOrder[mpCurrentIdx];
 const player = mpPlayers[pid];
 const yesCount = Object.values(mpVotes).filter(v=>v).length;
 const noCount = Object.values(mpVotes).filter(v=>!v).length;
 const passed = yesCount > noCount;

 $('particles').innerHTML = '';

 if(passed){
  player.score += 100;
  player.completed++;
  AudioEngine.cheer();
  launchConfetti(2500);
  $('tv-game-content').innerHTML = `
   <div style="font-size:2rem;margin:1rem 0;color:var(--green)">&#10004; COMPLETED!</div>
   <div style="font-size:1.5rem;color:var(--orange);font-weight:800">+100 points</div>
   <div class="tv-vote-results" id="tv-vote-list"></div>
  `;
 } else {
  player.chickens++;
  AudioEngine.chicken();
  $('tv-game-content').innerHTML = `
   <div style="font-size:3rem;margin:1rem 0">&#x1F414;</div>
   <div style="font-size:1.5rem;color:var(--red);font-weight:800">CHICKEN!</div>
   <div style="color:var(--dim);margin:.5rem 0">The group says: NOPE!</div>
   <div class="tv-vote-results" id="tv-vote-list"></div>
  `;
 }

 // Show individual votes
 const voteList = $('tv-vote-list');
 for(const[id,vote] of Object.entries(mpVotes)){
  const p = mpPlayers[id];
  if(p){
   const row = document.createElement('div');
   row.className = 'tv-vote-row';
   row.innerHTML = `<div class="tv-vote-name">${p.name}</div><div class="tv-vote-icon">${vote?'✅':'❌'}</div>`;
   voteList.appendChild(row);
  }
 }

 broadcastAll({type:'results', passed, scores:Object.entries(mpPlayers).map(([id,p])=>({id,name:p.name,score:p.score,chickens:p.chickens}))});
 broadcastPlayerList();
 renderTVScoreboard();

 // Auto advance
 setTimeout(()=>{
  mpCurrentIdx = (mpCurrentIdx+1) % mpPlayerOrder.length;
  // Check if we should keep going (auto-continue for now)
  tvNextTurn();
 }, 4000);
}

function renderTVScoreboard(){
 const sb = $('tv-scoreboard');
 sb.innerHTML = mpPlayerOrder.map((pid,i)=>{
  const p = mpPlayers[pid];
  return `<div class="score-chip ${i===mpCurrentIdx?'active':''}">${p.isBot?'\u{1F916} ':''}
   <span class="chip-name">${p.name}</span><span class="chip-score">${p.score}</span></div>`;
 }).join('');
}

// ═══════════════════════════════════════════
// MULTIPLAYER — PHONE/PLAYER MODE
// ═══════════════════════════════════════════

let phoneConn = null;
let myPlayerId = null;
let myName = '';

function initPhoneMode(){
 showScreen('screen-phone-join');
 const saved = localStorage.getItem('tod-phone-name');
 if(saved) $('phone-name-input').value = saved;
}

function phoneJoin(){
 myName = $('phone-name-input').value.trim();
 if(!myName){alert('Enter your name!');return;}
 localStorage.setItem('tod-phone-name', myName);

 $('phone-status').textContent = 'Connecting...';
 $('phone-join-btn').disabled = true;

 const peerId = 'taskiap-truthordare-' + JOIN_CODE;
 peer = new Peer(undefined, {debug:0});

 peer.on('open', ()=>{
  phoneConn = peer.connect(peerId, {reliable:true});

  phoneConn.on('open', ()=>{
   phoneConn.send({type:'join', name:myName});
   $('phone-status').textContent = 'Connected!';
  });

  phoneConn.on('data', data => handlePhoneMessage(data));

  phoneConn.on('close', ()=>{
   $('phone-status').textContent = 'Disconnected from host.';
  });

  phoneConn.on('error', err=>{
   $('phone-status').textContent = 'Connection error.';
   $('phone-join-btn').disabled = false;
  });
 });

 peer.on('error', err=>{
  $('phone-status').textContent = 'Could not connect. Check the room code.';
  $('phone-join-btn').disabled = false;
 });
}

function handlePhoneMessage(data){
 switch(data.type){
  case 'joined':
   myPlayerId = data.playerId;
   showScreen('screen-phone-lobby');
   $('phone-lobby-name').textContent = 'You: ' + myName;
   break;

  case 'playerList':
   renderPhonePlayerList(data.players);
   break;

  case 'gameStart':
   showScreen('screen-phone-game');
   $('phone-game-content').innerHTML = '<div class="waiting">Game starting...</div>';
   break;

  case 'turn':
   if(data.playerId === myPlayerId){
    // My turn — show choice buttons
    $('phone-game-content').innerHTML = `
     <div style="font-size:1.3rem;font-weight:800;color:var(--orange);margin:1rem 0">YOUR TURN!</div>
     <div style="color:var(--dim);margin-bottom:1rem">Choose wisely...</div>
     <div class="choice-btns">
      <button class="btn-truth" onclick="phoneChoose('truth')">&#10052; TRUTH</button>
      <button class="btn-dare" onclick="phoneChoose('dare')">&#128293; DARE</button>
     </div>
    `;
   } else {
    $('phone-game-content').innerHTML = `
     <div style="font-size:1.1rem;margin:1rem 0">${data.playerName}'s turn</div>
     <div class="waiting">Waiting for their choice...</div>
    `;
   }
   break;

  case 'reveal':
   const isTruth = data.choice === 'truth';
   $('phone-game-content').innerHTML = `
    <div style="font-size:1rem;font-weight:700;color:var(--dim);margin:.5rem 0">${data.player}'s ${data.choice.toUpperCase()}</div>
    <div class="phone-card ${data.choice}">
     <div style="font-size:.7rem;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-bottom:.5rem">${categoryLabel(data.item.category)}</div>
     <div style="font-size:.85rem;font-weight:800;letter-spacing:2px;color:${isTruth?'var(--blue)':'var(--red)'};margin-bottom:.5rem">${data.choice.toUpperCase()}</div>
     <div>${data.item.text}</div>
    </div>
    <div class="waiting" style="margin-top:1rem">Watch the TV...</div>
   `;
   break;

  case 'vote-start':
   if(data.playerId !== myPlayerId){
    // I should vote
    $('phone-game-content').innerHTML += `
     <div style="margin-top:1rem;font-weight:700">Did they do it?</div>
     <div class="vote-btns" style="margin-top:.5rem">
      <button class="vote-btn vote-yes" onclick="phoneVote(true)">&#10004; YES</button>
      <button class="vote-btn vote-no" onclick="phoneVote(false)">&#10008; NOPE</button>
     </div>
    `;
   } else {
    $('phone-game-content').innerHTML += `
     <div class="waiting" style="margin-top:1rem">Others are voting...</div>
    `;
   }
   break;

  case 'results':
   const emoji = data.passed ? '✅' : '\u{1F414}';
   const text = data.passed ? 'Completed!' : 'Chickened out!';
   $('phone-game-content').innerHTML = `
    <div style="font-size:2rem;margin:1rem 0">${emoji}</div>
    <div style="font-size:1.2rem;font-weight:700">${text}</div>
   `;
   if(data.scores) renderPhoneScores(data.scores);
   break;
 }
}

function renderPhonePlayerList(playerList){
 const el = $('phone-lobby-players') || $('phone-standings');
 if(!el) return;
 el.innerHTML = `<table><tr><th>Player</th><th style="text-align:right">Pts</th></tr>
  ${playerList.map(p=>`<tr><td>${p.name}${p.id===myPlayerId?' (you)':''}</td><td class="pts">${p.score}</td></tr>`).join('')}
 </table>`;
}

function renderPhoneScores(scores){
 const el = $('phone-standings');
 if(!el) return;
 const sorted = scores.sort((a,b)=>b.score-a.score);
 el.innerHTML = `<table><tr><th>Player</th><th style="text-align:right">Pts</th></tr>
  ${sorted.map(p=>`<tr><td>${p.name}${p.id===myPlayerId?' (you)':''}</td><td class="pts">${p.score}${p.chickens>0?' \u{1F414}'.repeat(Math.min(p.chickens,3)):''}</td></tr>`).join('')}
 </table>`;
}

function phoneChoose(choice){
 phoneConn.send({type:'choose', playerId:myPlayerId, choice});
 $('phone-game-content').innerHTML = `<div class="waiting">You chose ${choice.toUpperCase()}! Watch the TV...</div>`;
}

function phoneVote(vote){
 phoneConn.send({type:'vote', playerId:myPlayerId, vote});
 document.querySelectorAll('.vote-btn').forEach(b=>{b.disabled=true;b.style.opacity='.4';});
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

(function init(){
 if(MODE === 'host'){
  // Load PeerJS then init
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  script.onload = initHostMode;
  script.onerror = ()=>{
   document.body.innerHTML = '<div class="wrap"><div style="color:var(--red)">Failed to load PeerJS. Check your internet connection.</div><br><a href="truthordare.html" class="btn secondary">Play Locally Instead</a></div>';
  };
  document.head.appendChild(script);
 } else if(MODE === 'join'){
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
  script.onload = initPhoneMode;
  script.onerror = ()=>{
   document.body.innerHTML = '<div class="wrap"><div style="color:var(--red)">Failed to load PeerJS. Check your internet connection.</div></div>';
  };
  document.head.appendChild(script);
 } else {
  initLocalMode();
 }
})();
</script>
