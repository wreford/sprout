<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OBBY 67</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
#ui-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
#ui-layer > * { pointer-events: auto; }
#home-link {
  position: fixed;
  top: 10px; left: 10px;
  color: #fff;
  text-decoration: none;
  font-size: 16px;
  z-index: 100;
  background: rgba(0,0,0,0.5);
  padding: 5px 12px;
  border-radius: 6px;
}
#home-link:hover { background: rgba(0,0,0,0.7); }
#hud {
  position: fixed;
  top: 10px; right: 10px;
  color: #fff;
  font-size: 15px;
  text-align: right;
  z-index: 20;
  display: none;
}
.hud-item {
  background: rgba(0,0,0,0.6);
  padding: 4px 12px;
  margin-bottom: 4px;
  border-radius: 6px;
  font-weight: bold;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
.hud-stage { color: #4fc3f7; font-size: 18px; }
.hud-deaths { color: #ef5350; }
.hud-timer { color: #fff; }
.hud-coins { color: #ffd740; }
.hud-checkpoint { color: #66bb6a; font-size: 12px; }
.hud-powerups { color: #ce93d8; font-size: 12px; }
#dash-cooldown-bar {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 6px;
  background: rgba(0,0,0,0.4);
  border-radius: 3px;
  z-index: 25;
  display: none;
  overflow: hidden;
}
#dash-cooldown-fill {
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, #4fc3f7, #00e5ff);
  border-radius: 3px;
  transition: width 0.05s linear;
}
#touch-controls {
  position: fixed;
  bottom: 20px;
  left: 0; right: 0;
  display: none;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 30;
}
.touch-btn {
  width: 70px; height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  border: 3px solid rgba(255,255,255,0.5);
  color: #fff;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.touch-btn:active { background: rgba(255,255,255,0.5); }
#touch-jump {
  width: 90px; height: 90px;
  font-size: 20px;
  font-weight: bold;
}
#touch-dash {
  width: 65px; height: 65px;
  font-size: 12px;
  font-weight: bold;
  background: rgba(0,229,255,0.25);
  border-color: rgba(0,229,255,0.6);
}
#menu-screen, #stage-select-screen, #settings-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 50;
}
#menu-screen {
  background: linear-gradient(180deg, #4fc3f7 0%, #e1f5fe 60%, #fff 100%);
}
.menu-title {
  font-size: 72px;
  font-weight: 900;
  color: #1565c0;
  text-shadow: 4px 4px 0 #0d47a1, 8px 8px 0 rgba(0,0,0,0.2);
  letter-spacing: 4px;
  margin-bottom: 10px;
  transform: perspective(200px) rotateX(5deg);
}
.menu-subtitle {
  font-size: 18px;
  color: #1976d2;
  margin-bottom: 40px;
  font-weight: bold;
}
.menu-btn {
  padding: 14px 50px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 8px;
  transition: transform 0.1s;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.menu-btn:hover { transform: scale(1.05); }
.menu-btn:active { transform: scale(0.95); }
.btn-play {
  background: linear-gradient(180deg, #66bb6a, #43a047);
  color: #fff;
  font-size: 26px;
  box-shadow: 0 4px 0 #2e7d32;
}
.btn-stages {
  background: linear-gradient(180deg, #42a5f5, #1e88e5);
  color: #fff;
  box-shadow: 0 4px 0 #1565c0;
}
.btn-settings {
  background: linear-gradient(180deg, #ab47bc, #8e24aa);
  color: #fff;
  box-shadow: 0 4px 0 #6a1b9a;
}
.btn-back {
  background: linear-gradient(180deg, #78909c, #546e7a);
  color: #fff;
  box-shadow: 0 4px 0 #37474f;
}
#stage-select-screen {
  background: linear-gradient(180deg, #1a237e 0%, #283593 100%);
  overflow-y: auto;
  padding: 20px;
}
.stage-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 8px;
  max-width: 600px;
  margin: 20px 0;
}
.stage-btn {
  width: 50px; height: 50px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
  text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
  position: relative;
}
.stage-btn.locked {
  background: #546e7a;
  cursor: not-allowed;
  opacity: 0.5;
}
.stage-btn.current {
  background: linear-gradient(180deg, #fdd835, #f9a825);
  box-shadow: 0 0 10px #fdd835;
  animation: pulse 1s infinite;
}
.stage-btn.completed {
  background: linear-gradient(180deg, #66bb6a, #43a047);
}
.stage-stars {
  position: absolute;
  bottom: 1px; left: 0; right: 0;
  font-size: 8px;
  text-align: center;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px #fdd835; }
  50% { box-shadow: 0 0 20px #fdd835, 0 0 30px #f9a825; }
}
#settings-screen {
  background: linear-gradient(180deg, #37474f 0%, #263238 100%);
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 300px;
  padding: 12px 0;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
}
.toggle-btn {
  padding: 8px 24px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: #fff;
}
.toggle-on { background: #43a047; }
.toggle-off { background: #e53935; }
#death-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(255,0,0,0.3);
  z-index: 40;
  display: none;
  pointer-events: none;
}
#stage-complete-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 45;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.complete-title {
  font-size: 48px;
  font-weight: 900;
  color: #fdd835;
  text-shadow: 3px 3px 0 #f57f17;
  margin-bottom: 20px;
}
.complete-stars {
  font-size: 48px;
  margin-bottom: 20px;
}
.complete-info {
  font-size: 20px;
  margin-bottom: 8px;
}
#milestone-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 55;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  background: rgba(0,0,0,0.7);
  pointer-events: none;
}
.milestone-title {
  font-size: 40px;
  font-weight: 900;
  color: #fdd835;
  text-shadow: 3px 3px 0 #f57f17;
  margin-bottom: 10px;
  animation: milePulse 0.5s ease-out;
}
.milestone-desc {
  font-size: 22px;
  color: #fff;
  animation: milePulse 0.5s ease-out 0.1s both;
}
@keyframes milePulse {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
#vignette {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.35) 100%);
}
#screen-flash {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 41;
  opacity: 0;
  transition: opacity 0.1s;
}
@media (max-width: 700px) {
  .menu-title { font-size: 48px; }
  .stage-grid { grid-template-columns: repeat(5, 1fr); }
  .stage-btn { width: 55px; height: 55px; font-size: 16px; }
  #touch-controls { display: flex !important; }
}
@media (pointer: coarse) {
  #touch-controls { display: flex !important; }
}
</style>
</head>
<body>
<a id="home-link" href="../index.html">&larr; home</a>
<canvas id="game-canvas"></canvas>
<div id="vignette"></div>
<div id="screen-flash"></div>

<div id="hud">
  <div class="hud-item hud-stage" id="hud-stage">Stage 1 / 50</div>
  <div class="hud-item hud-deaths" id="hud-deaths">Deaths: 0</div>
  <div class="hud-item hud-timer" id="hud-timer">00:00.0</div>
  <div class="hud-item hud-coins" id="hud-coins">Coins: 0 / 150</div>
  <div class="hud-item hud-checkpoint" id="hud-checkpoint">Checkpoint: Stage 1</div>
  <div class="hud-item hud-powerups" id="hud-powerups" style="display:none;"></div>
</div>

<div id="dash-cooldown-bar">
  <div id="dash-cooldown-fill"></div>
</div>

<div id="touch-controls">
  <div style="display:flex;gap:10px;">
    <button class="touch-btn" id="touch-left">&larr;</button>
    <button class="touch-btn" id="touch-right">&rarr;</button>
  </div>
  <div style="display:flex;gap:10px;align-items:flex-end;">
    <button class="touch-btn" id="touch-dash">DASH</button>
    <button class="touch-btn" id="touch-jump">JUMP</button>
  </div>
</div>

<div id="menu-screen">
  <div class="menu-title">OBBY 67</div>
  <div class="menu-subtitle">50 Stages of Pure Chaos</div>
  <button class="menu-btn btn-play" id="btn-play">PLAY</button>
  <button class="menu-btn btn-stages" id="btn-stages">STAGE SELECT</button>
  <button class="menu-btn btn-settings" id="btn-settings">SETTINGS</button>
</div>

<div id="stage-select-screen" style="display:none;">
  <div class="menu-title" style="font-size:36px;">STAGE SELECT</div>
  <div class="stage-grid" id="stage-grid"></div>
  <button class="menu-btn btn-back" id="btn-back-stages">BACK</button>
</div>

<div id="settings-screen" style="display:none;">
  <div class="menu-title" style="font-size:36px;">SETTINGS</div>
  <div class="settings-row">
    <span>Music</span>
    <button class="toggle-btn toggle-on" id="toggle-music">ON</button>
  </div>
  <div class="settings-row">
    <span>Sound</span>
    <button class="toggle-btn toggle-on" id="toggle-sound">ON</button>
  </div>
  <br>
  <button class="menu-btn btn-back" id="btn-back-settings">BACK</button>
</div>

<div id="death-overlay"></div>

<div id="stage-complete-overlay">
  <div class="complete-title" id="complete-title">STAGE COMPLETE!</div>
  <div class="complete-stars" id="complete-stars"></div>
  <div class="complete-info" id="complete-time"></div>
  <div class="complete-info" id="complete-coins-info"></div>
  <br>
  <button class="menu-btn btn-play" id="btn-next-stage">NEXT STAGE</button>
  <button class="menu-btn btn-stages" id="btn-complete-menu">MENU</button>
</div>

<div id="milestone-overlay">
  <div class="milestone-title" id="milestone-title"></div>
  <div class="milestone-desc" id="milestone-desc"></div>
</div>

<script>
// ============================================================
// OBBY 67 -- A Roblox-style obstacle course game (JUICED UP)
// ============================================================

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// --- Constants ---
const TILE = 40;
const BASE_GRAVITY = 0.48;
const PEAK_GRAVITY = 0.22; // reduced gravity at jump peak for floatiness
const MAX_FALL = 14;
const MOVE_SPEED = 5.2;
const JUMP_FORCE = -11.2;
const DOUBLE_JUMP_FORCE = -10.0;
const COYOTE_TIME = 150;
const JUMP_BUFFER = 120;
const PLAYER_W = 28;
const PLAYER_H = 36;
const MAX_VOL = 0.02;
const DASH_SPEED = 18;
const DASH_DURATION = 8; // frames
const DASH_COOLDOWN = 120; // frames (2 seconds)
const WALL_SLIDE_SPEED = 1.8;
const WALL_JUMP_FORCE_X = 8;
const WALL_JUMP_FORCE_Y = -11;

// --- Theme colors per stage range ---
const THEMES = [
  { // 1-10: Grassland
    sky: ['#87ceeb','#b3e5fc','#e1f5fe'],
    platTop: '#66bb6a', platFront: '#43a047', platSide: '#2e7d32', platBorder: '#1b5e20',
    name: 'Grassland',
  },
  { // 11-20: Underground
    sky: ['#3e2723','#4e342e','#5d4037'],
    platTop: '#8d6e63', platFront: '#6d4c41', platSide: '#4e342e', platBorder: '#3e2723',
    name: 'Underground',
  },
  { // 21-30: Lava
    sky: ['#b71c1c','#d32f2f','#e65100'],
    platTop: '#ff7043', platFront: '#e64a19', platSide: '#bf360c', platBorder: '#870000',
    name: 'Lava Zone',
  },
  { // 31-40: Sky
    sky: ['#1a237e','#283593','#5c6bc0'],
    platTop: '#e3f2fd', platFront: '#bbdefb', platSide: '#90caf9', platBorder: '#64b5f6',
    name: 'Sky Kingdom',
  },
  { // 41-50: Void
    sky: ['#12002e','#1a0040','#2d006b'],
    platTop: '#ea80fc', platFront: '#ce93d8', platSide: '#ab47bc', platBorder: '#7b1fa2',
    name: 'The Void',
  },
];

function getTheme(stage) { return THEMES[Math.min(Math.floor((stage - 1) / 10), 4)]; }

// --- Power-up types ---
const POWERUP_TYPES = {
  speed: { emoji: '⚡', color: '#ffeb3b', name: 'Speed Boost', duration: 300 },
  shield: { emoji: '🛡️', color: '#42a5f5', name: 'Shield', duration: 9999 },
  magnet: { emoji: '🧲', color: '#e040fb', name: 'Coin Magnet', duration: 600 },
  ghost: { emoji: '👻', color: '#b0bec5', name: 'Ghost Mode', duration: 180 },
  rocket: { emoji: '🚀', color: '#ff5722', name: 'Rocket Jump', duration: 9999 },
};

// --- Player colors ---
const PLAYER_COLORS = ['#4fc3f7','#ef5350','#66bb6a','#fdd835','#ab47bc','#ff7043','#26c6da','#ec407a'];
const TRAIL_COLORS = ['#4fc3f7','#ff4081','#76ff03','#ffd740','#e040fb','#ff6e40','#18ffff','#f50057'];

// --- Game State ---
let GS = {
  screen: 'menu',
  currentStage: 1,
  checkpointStage: 1,
  deaths: 0,
  totalCoins: 0,
  stageCoins: 0,
  timer: 0,
  stageStartTime: 0,
  bestTimes: {},
  stageCoinsCollected: {},
  highestStage: 1,
  completedStages: {},
  musicOn: true,
  soundOn: true,
  hasDoubleJump: false,
  playerColorIdx: 0,
  trailColorIdx: 0,
  unlockedColorChange: false,
  unlockedTrailChange: false,
  unlockedBigDash: false,
};

// --- Save/Load ---
function saveGame() {
  const data = {
    highestStage: GS.highestStage,
    bestTimes: GS.bestTimes,
    stageCoinsCollected: GS.stageCoinsCollected,
    completedStages: GS.completedStages,
    deaths: GS.deaths,
    totalCoins: GS.totalCoins,
    musicOn: GS.musicOn,
    soundOn: GS.soundOn,
    playerColorIdx: GS.playerColorIdx,
    trailColorIdx: GS.trailColorIdx,
    unlockedColorChange: GS.unlockedColorChange,
    unlockedTrailChange: GS.unlockedTrailChange,
    unlockedBigDash: GS.unlockedBigDash,
  };
  try { localStorage.setItem('obby67_save', JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem('obby67_save');
    if (raw) {
      const d = JSON.parse(raw);
      GS.highestStage = d.highestStage || 1;
      GS.bestTimes = d.bestTimes || {};
      GS.stageCoinsCollected = d.stageCoinsCollected || {};
      GS.completedStages = d.completedStages || {};
      GS.deaths = d.deaths || 0;
      GS.totalCoins = d.totalCoins || 0;
      GS.musicOn = d.musicOn !== false;
      GS.soundOn = d.soundOn !== false;
      GS.playerColorIdx = d.playerColorIdx || 0;
      GS.trailColorIdx = d.trailColorIdx || 0;
      GS.unlockedColorChange = !!d.unlockedColorChange;
      GS.unlockedTrailChange = !!d.unlockedTrailChange;
      GS.unlockedBigDash = !!d.unlockedBigDash;
    }
  } catch(e) {}
}

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, vol, delay) {
  if (!GS.soundOn || !audioCtx) return;
  const v = Math.min(vol || MAX_VOL, MAX_VOL);
  const d = delay || 0;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(v, audioCtx.currentTime + d);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + d);
  osc.stop(audioCtx.currentTime + d + duration);
}

function playNoise(duration, vol) {
  if (!GS.soundOn || !audioCtx) return;
  const v = Math.min(vol || MAX_VOL, MAX_VOL);
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(v, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

function sfxJump() { playTone(440, 0.12, 'sine', MAX_VOL); playTone(660, 0.08, 'sine', MAX_VOL * 0.6, 0.04); }
function sfxDoubleJump() { playTone(550, 0.1, 'sine', MAX_VOL); playTone(880, 0.08, 'sine', MAX_VOL * 0.5, 0.04); }
function sfxDeath() { playNoise(0.3, MAX_VOL); playTone(200, 0.3, 'sawtooth', MAX_VOL * 0.7); playTone(100, 0.2, 'square', MAX_VOL * 0.4, 0.1); }
function sfxCoin() { playTone(880, 0.08, 'sine', MAX_VOL); playTone(1320, 0.12, 'sine', MAX_VOL, 0.06); }
function sfxCheckpoint() {
  playTone(523, 0.12, 'sine', MAX_VOL); playTone(659, 0.12, 'sine', MAX_VOL, 0.1);
  playTone(784, 0.12, 'sine', MAX_VOL, 0.2); playTone(1047, 0.2, 'sine', MAX_VOL, 0.3);
}
function sfxComplete() {
  playTone(523, 0.1, 'square', MAX_VOL); playTone(659, 0.1, 'square', MAX_VOL, 0.08);
  playTone(784, 0.1, 'square', MAX_VOL, 0.16); playTone(1047, 0.15, 'square', MAX_VOL, 0.24);
  playTone(1319, 0.2, 'sine', MAX_VOL, 0.34); playTone(1568, 0.3, 'sine', MAX_VOL * 0.8, 0.44);
}
function sfxKillBrick() { playTone(150, 0.15, 'sawtooth', MAX_VOL); playNoise(0.1, MAX_VOL * 0.5); }
function sfxBounce() { playTone(330, 0.06, 'sine', MAX_VOL); playTone(660, 0.1, 'sine', MAX_VOL, 0.05); playTone(990, 0.08, 'sine', MAX_VOL * 0.5, 0.1); }
function sfxDash() { playNoise(0.08, MAX_VOL * 0.6); playTone(600, 0.1, 'sine', MAX_VOL * 0.8); playTone(900, 0.06, 'sine', MAX_VOL * 0.4, 0.04); }
function sfxWallSlide() { playNoise(0.04, MAX_VOL * 0.15); }
function sfxWallJump() { playTone(500, 0.1, 'sine', MAX_VOL); playTone(750, 0.08, 'sine', MAX_VOL * 0.7, 0.03); }
function sfxPowerup() { playTone(660, 0.08, 'sine', MAX_VOL); playTone(880, 0.08, 'sine', MAX_VOL, 0.06); playTone(1100, 0.12, 'sine', MAX_VOL, 0.12); }
function sfxShieldBreak() { playNoise(0.2, MAX_VOL * 0.8); playTone(300, 0.2, 'sawtooth', MAX_VOL * 0.5); }

// Music -- more complex chiptune with bass, melody, drums
let musicNodes = [];
let musicInterval = null;
let musicBeat = 0;

const melodyNotes = [
  523, 659, 784, 1047, 784, 659, 523, 784,
  587, 740, 880, 1175, 880, 740, 587, 880,
  494, 622, 740, 988, 740, 622, 494, 740,
  440, 554, 659, 880, 659, 554, 440, 659,
];
const bassNotes = [
  131, 131, 165, 165, 147, 147, 131, 131,
  147, 147, 165, 165, 131, 131, 147, 147,
  110, 110, 131, 131, 147, 147, 165, 165,
  131, 131, 110, 110, 147, 147, 131, 131,
];

function startMusic() {
  stopMusic();
  if (!GS.musicOn) return;
  ensureAudio();
  musicBeat = 0;

  musicInterval = setInterval(() => {
    if (!GS.musicOn || !audioCtx) { stopMusic(); return; }
    const stage = GS.currentStage || 1;
    const intensity = Math.min(Math.floor((stage - 1) / 10), 4);

    // Melody
    const note = melodyNotes[musicBeat % melodyNotes.length];
    playTone(note, 0.12, 'square', MAX_VOL * 0.25);

    // Bass (always)
    const bass = bassNotes[musicBeat % bassNotes.length];
    playTone(bass, 0.18, 'triangle', MAX_VOL * 0.2);

    // Kick drum every 4 beats
    if (musicBeat % 4 === 0) {
      playTone(60, 0.08, 'sine', MAX_VOL * 0.3);
    }
    // Hi-hat every 2 beats (intensity 1+)
    if (intensity >= 1 && musicBeat % 2 === 0) {
      playNoise(0.03, MAX_VOL * 0.12);
    }
    // Snare on beats 2,6 (intensity 2+)
    if (intensity >= 2 && (musicBeat % 8 === 2 || musicBeat % 8 === 6)) {
      playNoise(0.06, MAX_VOL * 0.2);
    }
    // Arpeggio layer (intensity 3+)
    if (intensity >= 3 && musicBeat % 2 === 1) {
      playTone(note * 2, 0.06, 'sine', MAX_VOL * 0.1);
    }
    // Extra percussion (intensity 4+)
    if (intensity >= 4) {
      playNoise(0.02, MAX_VOL * 0.08);
      if (musicBeat % 4 === 2) playTone(note * 1.5, 0.04, 'square', MAX_VOL * 0.08);
    }
    musicBeat++;
  }, 200);
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// --- Input ---
const keys = {};
let touchLeft = false, touchRight = false, touchJump = false, touchDash = false;
let jumpBufferTime = 0;
let jumpPressed = false;
let dashPressed = false;

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD','ShiftLeft','ShiftRight','KeyR','KeyC'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      jumpPressed = true;
      jumpBufferTime = performance.now();
    }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
      dashPressed = true;
    }
    if (e.code === 'KeyR' && GS.screen === 'playing') {
      // Quick restart
      killPlayer();
    }
    if (e.code === 'KeyC' && GS.unlockedColorChange) {
      GS.playerColorIdx = (GS.playerColorIdx + 1) % PLAYER_COLORS.length;
      saveGame();
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
const touchLeftBtn = document.getElementById('touch-left');
const touchRightBtn = document.getElementById('touch-right');
const touchJumpBtn = document.getElementById('touch-jump');
const touchDashBtn = document.getElementById('touch-dash');

function addTouchEvents(el, onDown, onUp) {
  el.addEventListener('touchstart', e => { e.preventDefault(); onDown(); }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, {passive:false});
  el.addEventListener('touchcancel', e => { onUp(); });
  el.addEventListener('mousedown', e => { e.preventDefault(); onDown(); });
  el.addEventListener('mouseup', e => { e.preventDefault(); onUp(); });
}

addTouchEvents(touchLeftBtn, () => { touchLeft = true; }, () => { touchLeft = false; });
addTouchEvents(touchRightBtn, () => { touchRight = true; }, () => { touchRight = false; });
addTouchEvents(touchJumpBtn,
  () => { touchJump = true; jumpPressed = true; jumpBufferTime = performance.now(); },
  () => { touchJump = false; }
);
addTouchEvents(touchDashBtn,
  () => { touchDash = true; dashPressed = true; },
  () => { touchDash = false; }
);

function inputLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchLeft; }
function inputRight() { return keys['ArrowRight'] || keys['KeyD'] || touchRight; }
function inputJump() { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchJump; }

// --- Particles ---
let particles = [];
const PARTICLE_POOL_SIZE = 600;

function spawnParticle(x, y, vx, vy, color, life, size, type) {
  if (particles.length >= PARTICLE_POOL_SIZE) particles.shift();
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size || 4, type: type || 'square', rotation: Math.random() * Math.PI * 2 });
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 8;
    const colors = ['#ef5350','#ff7043','#ffa726','#ffee58','#fff','#e040fb'];
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 4,
      colors[Math.floor(Math.random()*colors.length)], 50 + Math.random()*30, 4 + Math.random()*8, 'circle');
  }
  // Ring burst
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2;
    spawnParticle(x, y, Math.cos(angle)*6, Math.sin(angle)*6, '#fff', 20, 3, 'circle');
  }
}

function spawnCoinParticles(x, y) {
  for (let i = 0; i < 16; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 2, '#ffd740', 25 + Math.random()*15, 3 + Math.random()*3, 'circle');
  }
  // +1 text particle
  spawnParticle(x, y - 10, 0, -2, '#ffd740', 40, 12, 'text+1');
}

function spawnCheckpointParticles(x, y) {
  // Fireworks!
  for (let burst = 0; burst < 3; burst++) {
    const bx = x + (burst - 1) * 40;
    const by = y - 30 - burst * 20;
    const burstColors = ['#66bb6a','#fdd835','#4fc3f7','#ef5350','#fff'];
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 5;
      spawnParticle(bx, by, Math.cos(angle)*speed, Math.sin(angle)*speed - 2,
        burstColors[Math.floor(Math.random()*burstColors.length)], 40 + Math.random()*20, 3 + Math.random()*4, 'circle');
    }
  }
}

function spawnCompleteParticles(x, y) {
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 7;
    const colors = ['#fdd835','#66bb6a','#4fc3f7','#ab47bc','#fff','#ff4081','#76ff03'];
    spawnParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 5,
      colors[Math.floor(Math.random()*colors.length)], 60 + Math.random()*40, 5 + Math.random()*7, 'circle');
  }
}

function spawnDustParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    spawnParticle(x + (Math.random()-0.5)*20, y,
      (Math.random()-0.5)*3, -Math.random()*2 - 0.5,
      'rgba(255,255,255,0.6)', 20 + Math.random()*15, 3 + Math.random()*3, 'circle');
  }
}

function spawnDashParticles() {
  const px = player.x + player.w/2;
  const py = player.y + player.h/2;
  const col = TRAIL_COLORS[GS.trailColorIdx];
  for (let i = 0; i < 5; i++) {
    spawnParticle(px + (Math.random()-0.5)*10, py + (Math.random()-0.5)*10,
      -player.dashDirX * (1 + Math.random()*2), (Math.random()-0.5)*2,
      col, 15 + Math.random()*10, 4 + Math.random()*4, 'circle');
  }
}

function spawnSpeedLines() {
  const speed = Math.abs(player.vx);
  if (speed < 4) return;
  const intensity = Math.min((speed - 4) / 8, 1);
  if (Math.random() > intensity * 0.7) return;
  const px = player.x + (player.facingRight ? -10 : player.w + 10);
  const py = player.y + Math.random() * player.h;
  spawnParticle(px, py, -player.vx * 0.3, 0, 'rgba(255,255,255,0.4)', 8, 2, 'line');
}

  }

    bgMountains.push({ x: i * 400, w: 300 + Math.random() * 200, h: 100 + Math.random() * 80 });
  }
}
initBackground();

function loadStage(stageNum) {
  const idx = stageNum - 1;
  if (idx < 0 || idx >= STAGES.length) return;

  const stage = STAGES[idx];
  GS.currentStage = stageNum;
  GS.hasDoubleJump = stageNum >= 5;
  GS.stageCoins = 0;
  collectedCoins = new Set();
  stageTimer = 0;

  activePlatforms = stage.platforms.map((p, i) => {
    const ap = Object.assign({}, p);
    ap.id = i;
    ap.origX = p.x;
    ap.origY = p.y;
    ap.timer = (p.phase || 0) * 100;
    ap.visible = true;
    ap.disappearTimer = 0;
    ap.spinAngle = 0;
    ap.glowTimer = Math.random() * Math.PI * 2;
    return ap;
  });

  activeCoins = stage.coins.map((c, i) => ({ x: c.x, y: c.y, id: i, collected: false, bobTimer: Math.random() * 100 }));

  activePowerups = (stage.powerups || []).map((p, i) => ({
    x: p.x, y: p.y, type: p.type, id: i, collected: false, bobTimer: Math.random() * 100, glowTimer: Math.random() * Math.PI * 2,
  }));

  portalPos = { x: stage.portalX * TILE, y: stage.portalY * TILE };

  player.x = stage.spawn.x;
  player.y = stage.spawn.y;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.dead = false;
  player.deathTimer = 0;
  player.victoryTimer = 0;
  player.speedBoostTimer = 0;
  player.reverseGravity = false;
  player.jumpsLeft = GS.hasDoubleJump ? 2 : 1;
  player.maxJumps = GS.hasDoubleJump ? 2 : 1;
  player.squash = 1;
  player.stretch = 1;
  player.dashTimer = 0;
  player.dashCooldown = 0;
  player.wallSliding = false;
  player.wallSlideSide = 0;
  player.lastFallSpeed = 0;
  player.shield = false;
  player.magnetTimer = 0;
  player.ghostTimer = 0;
  player.rocketJump = false;
  player.powerSpeedTimer = 0;
  player.trail = [];

  camera.x = player.x - canvas.width / 2;
  camera.y = player.y - canvas.height / 2;
  camera.targetX = camera.x;
  camera.targetY = camera.y;

  updateHUD();
}

function respawnPlayer() {
  const stage = STAGES[GS.checkpointStage - 1];
  if (GS.currentStage !== GS.checkpointStage) {
    loadStage(GS.checkpointStage);
  } else {
    player.x = stage.spawn.x;
    player.y = stage.spawn.y;
    player.vx = 0;
    player.vy = 0;
    player.dead = false;
    player.deathTimer = 0;
    player.onGround = false;
    player.reverseGravity = false;
    player.speedBoostTimer = 0;
    player.jumpsLeft = player.maxJumps;
    player.squash = 1;
    player.stretch = 1;
    player.dashTimer = 0;
    player.dashCooldown = 0;
    player.wallSliding = false;
    player.wallSlideSide = 0;
    player.lastFallSpeed = 0;
    player.shield = false;
    player.magnetTimer = 0;
    player.ghostTimer = 0;
    player.rocketJump = false;
    player.powerSpeedTimer = 0;
    player.trail = [];
  }
}

// --- HUD ---
function updateHUD() {
  document.getElementById('hud-stage').textContent = `Stage ${GS.currentStage} / 50`;
  document.getElementById('hud-deaths').textContent = `Deaths: ${GS.deaths}`;
  const totalSecs = GS.timer / 60;
  const mins = Math.floor(totalSecs / 60);
  const secs = totalSecs % 60;
  document.getElementById('hud-timer').textContent =
    `${String(mins).padStart(2,'0')}:${secs.toFixed(1).padStart(4,'0')}`;
  document.getElementById('hud-coins').textContent = `Coins: ${GS.totalCoins + GS.stageCoins} / 150`;
  document.getElementById('hud-checkpoint').textContent = `Checkpoint: Stage ${GS.checkpointStage}`;

  // Power-up display
  const puEl = document.getElementById('hud-powerups');
  let puText = '';
  if (player.shield) puText += '🛡️ ';
  if (player.powerSpeedTimer > 0) puText += '⚡' + Math.ceil(player.powerSpeedTimer/60) + 's ';
  if (player.magnetTimer > 0) puText += '🧲' + Math.ceil(player.magnetTimer/60) + 's ';
  if (player.ghostTimer > 0) puText += '👻' + Math.ceil(player.ghostTimer/60) + 's ';
  if (player.rocketJump) puText += '🚀 ';
  if (puText) {
    puEl.style.display = 'block';
    puEl.textContent = puText.trim();
  } else {
    puEl.style.display = 'none';
  }

  // Dash cooldown bar
  const dashBar = document.getElementById('dash-cooldown-bar');
  const dashFill = document.getElementById('dash-cooldown-fill');
  if (GS.screen === 'playing') {
    dashBar.style.display = 'block';
    const pct = player.dashCooldown > 0 ? Math.max(0, 1 - player.dashCooldown / DASH_COOLDOWN) * 100 : 100;
    dashFill.style.width = pct + '%';
    dashFill.style.background = pct >= 100 ? 'linear-gradient(90deg, #4fc3f7, #00e5ff)' : 'rgba(255,255,255,0.3)';
  } else {
    dashBar.style.display = 'none';
  }
}

// --- Screen flash helper ---
function screenFlash(color, duration) {
  const el = document.getElementById('screen-flash');
  el.style.background = color;
  el.style.opacity = '1';
  el.style.transition = 'opacity ' + (duration || 300) + 'ms';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { el.style.opacity = '0'; });
  });
}

// --- Milestone display ---
function showMilestone(title, desc) {
  const overlay = document.getElementById('milestone-overlay');
  document.getElementById('milestone-title').textContent = title;
  document.getElementById('milestone-desc').textContent = desc;
  overlay.style.display = 'flex';
  screenFlash('rgba(255,215,0,0.3)', 500);
  // Fireworks
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 6;
    const colors = ['#fdd835','#ff4081','#4fc3f7','#76ff03','#e040fb','#fff'];
    spawnParticle(player.x + player.w/2, player.y - 20,
      Math.cos(angle)*speed, Math.sin(angle)*speed - 3,
      colors[Math.floor(Math.random()*colors.length)], 60, 5 + Math.random()*5, 'circle');
  }
  setTimeout(() => { overlay.style.display = 'none'; }, 2500);
}

// --- Physics & Update ---
function updatePlayer() {
  if (player.dead) {
    player.deathTimer--;
    if (player.deathTimer <= 0) respawnPlayer();
    return;
  }

  if (player.victoryTimer > 0) {
    player.victoryTimer--;
    player.y += Math.sin(player.victoryTimer * 0.2) * 0.5;
    return;
  }

  const now = performance.now();

  // Decrement power-up timers
  if (player.powerSpeedTimer > 0) player.powerSpeedTimer--;
  if (player.magnetTimer > 0) player.magnetTimer--;
  if (player.ghostTimer > 0) player.ghostTimer--;

  // Dash logic
  if (player.dashCooldown > 0) player.dashCooldown--;

  if (dashPressed && player.dashCooldown <= 0 && player.dashTimer <= 0) {
    player.dashTimer = DASH_DURATION;
    const dashMult = GS.unlockedBigDash ? 1.4 : 1;
    player.dashDirX = player.facingRight ? 1 : -1;
    player.vx = DASH_SPEED * player.dashDirX * dashMult;
    player.vy = 0; // freeze vertical during dash
    player.dashCooldown = DASH_COOLDOWN;
    sfxDash();
    camera.shake = Math.max(camera.shake, 4);
    dashPressed = false;
  } else {
    dashPressed = false;
  }

  if (player.dashTimer > 0) {
    player.dashTimer--;
    // During dash: move fast, ignore gravity, spawn particles
    player.x += player.vx;
    spawnDashParticles();
    // Add afterimage
    player.trail.push({ x: player.x, y: player.y, alpha: 1 });
    // Still do collision X
    player.onIce = false;
    for (const p of activePlatforms) {
      if (!p.visible) continue;
      if (p.type === 'lava' || p.type === 'spinning') continue;
      const px = p.type === 'wall' ? p.x * TILE : getPlatX(p);
      const py = p.type === 'wall' ? p.y * TILE : getPlatY(p);
      const pw = p.w * TILE;
      const ph = p.type === 'wall' ? p.h * TILE : TILE;
      if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
        if (p.type === 'kill') {
          if (player.ghostTimer > 0) continue;
          if (player.shield) { breakShield(); continue; }
          killPlayer(); return;
        }
        if (p.type === 'reverseGravity') continue;
        if (player.vx > 0) player.x = px - player.w;
        else if (player.vx < 0) player.x = px + pw;
        player.vx = 0;
        player.dashTimer = 0;
      }
    }
    // Squash/stretch recovery
    player.squash += (1 - player.squash) * 0.15;
    player.stretch += (1 - player.stretch) * 0.15;
    spawnSpeedLines();
    checkCoinsAndPortal();
    checkPowerups();
    // Fall death
    if (player.y > 16 * TILE || player.y < -5 * TILE) { killPlayer(); }
    return;
  }

  // Horizontal movement
  let moveSpeed = MOVE_SPEED;
  if (player.speedBoostTimer > 0) { moveSpeed *= 1.8; player.speedBoostTimer--; }
  if (player.powerSpeedTimer > 0) { moveSpeed *= 2; }

  let accel = player.onIce ? 0.15 : 0.6;
  let friction = player.onIce ? 0.98 : 0.75;

  if (inputLeft()) {
    player.vx -= accel * moveSpeed;
    player.facingRight = false;
  } else if (inputRight()) {
    player.vx += accel * moveSpeed;
    player.facingRight = true;
  } else {
    player.vx *= friction;
  }
  player.vx = Math.max(-moveSpeed * 1.3, Math.min(moveSpeed * 1.3, player.vx));
  if (Math.abs(player.vx) < 0.1) player.vx = 0;

  // Gravity with "hang time" at peak
  const gDir = player.reverseGravity ? -1 : 1;
  const atPeak = Math.abs(player.vy) < 2.5;
  const grav = atPeak ? PEAK_GRAVITY : BASE_GRAVITY;
  player.vy += grav * gDir;
  if (player.vy * gDir > MAX_FALL) player.vy = MAX_FALL * gDir;

  // Wall sliding detection
  player.wallSliding = false;
  player.wallSlideSide = 0;
  if (!player.onGround && player.vy * gDir > 0) {
    // Check if pressing against a wall
    for (const p of activePlatforms) {
      if (!p.visible) continue;
      if (p.type === 'lava' || p.type === 'spinning' || p.type === 'kill') continue;
      const px = p.type === 'wall' ? p.x * TILE : getPlatX(p);
      const py = p.type === 'wall' ? p.y * TILE : getPlatY(p);
      const pw = p.w * TILE;
      const ph = p.type === 'wall' ? p.h * TILE : TILE;

      // Check right side of player against left side of platform
      if (inputRight() && aabb(player.x + player.w, player.y + 2, 3, player.h - 4, px, py, pw, ph)) {
        player.wallSliding = true;
        player.wallSlideSide = 1;
        break;
      }
      // Check left side
      if (inputLeft() && aabb(player.x - 3, player.y + 2, 3, player.h - 4, px, py, pw, ph)) {
        player.wallSliding = true;
        player.wallSlideSide = -1;
        break;
      }
    }
  }

  if (player.wallSliding) {
    // Slow descent
    if (player.vy * gDir > WALL_SLIDE_SPEED) {
      player.vy = WALL_SLIDE_SPEED * gDir;
    }
    // Wall slide particles
    if (Math.random() > 0.5) {
      spawnParticle(
        player.x + (player.wallSlideSide === 1 ? player.w : 0),
        player.y + player.h * 0.3 + Math.random() * player.h * 0.4,
        -player.wallSlideSide * (0.5 + Math.random()), -0.5 - Math.random(),
        'rgba(255,255,255,0.5)', 10, 2, 'circle');
    }
  }

  // Jump
  const canCoyote = (now - player.lastGroundTime < COYOTE_TIME) && !player.onGround;
  const jumpBuffered = jumpPressed && (now - jumpBufferTime < JUMP_BUFFER);

  if (jumpBuffered || jumpPressed) {
    // Wall jump
    if (player.wallSliding && player.wallJumpCooldown <= 0) {
      const jumpForce = player.reverseGravity ? -WALL_JUMP_FORCE_Y : WALL_JUMP_FORCE_Y;
      player.vy = jumpForce;
      player.vx = -player.wallSlideSide * WALL_JUMP_FORCE_X;
      player.facingRight = player.wallSlideSide < 0;
      player.wallJumpCooldown = 15;
      player.wallSliding = false;
      player.jumpsLeft = Math.max(player.jumpsLeft, 1); // preserve a jump after wall jump
      sfxWallJump();
      jumpPressed = false;
      // Wall jump particles
      for (let i = 0; i < 8; i++) {
        spawnParticle(
          player.x + (player.wallSlideSide === 1 ? player.w : 0),
          player.y + player.h/2,
          -player.wallSlideSide * (2 + Math.random()*3), (Math.random()-0.5)*4,
          '#fff', 15, 3, 'circle');
      }
    } else if (player.onGround || canCoyote) {
      let jf = JUMP_FORCE;
      if (player.rocketJump) { jf *= 2.5; player.rocketJump = false; }
      player.vy = player.reverseGravity ? -jf : jf;
      player.onGround = false;
      player.jumpsLeft = player.maxJumps - 1;
      player.squash = 0.65;
      player.stretch = 1.35;
      sfxJump();
      jumpPressed = false;
      // Jump dust
      spawnDustParticles(player.x + player.w/2, player.y + player.h, 5);
    } else if (player.jumpsLeft > 0 && GS.hasDoubleJump) {
      let jf = DOUBLE_JUMP_FORCE;
      if (player.rocketJump) { jf *= 2.5; player.rocketJump = false; }
      player.vy = player.reverseGravity ? -jf : jf;
      player.jumpsLeft--;
      player.squash = 0.65;
      player.stretch = 1.35;
      sfxDoubleJump();
      jumpPressed = false;
      for (let i = 0; i < 8; i++) {
        spawnParticle(player.x + player.w/2, player.y + player.h,
          (Math.random()-0.5)*4, 2 + Math.random()*2, '#4fc3f7', 18, 3, 'circle');
      }
    } else {
      jumpPressed = false;
    }
  }

  // Variable jump height
  if (!inputJump() && player.vy * gDir < -2) {
    player.vy *= 0.82;
  }

  // Move X
  player.x += player.vx;
  player.onIce = false;

  // Collision X
  for (const p of activePlatforms) {
    if (!p.visible) continue;
    if (p.type === 'lava' || p.type === 'spinning') continue;
    const px = p.type === 'wall' ? p.x * TILE : getPlatX(p);
    const py = p.type === 'wall' ? p.y * TILE : getPlatY(p);
    const pw = p.w * TILE;
    const ph = p.type === 'wall' ? p.h * TILE : TILE;

    if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
      if (p.type === 'kill') {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer(); return;
      }
      if (p.type === 'reverseGravity') continue;

      if (player.vx > 0) {
        player.x = px - player.w;
      } else if (player.vx < 0) {
        player.x = px + pw;
      }
      player.vx = 0;
    }
  }

  // Move Y
  player.lastFallSpeed = Math.abs(player.vy);
  player.y += player.vy;
  player.onGround = false;

  // Collision Y
  for (const p of activePlatforms) {
    if (!p.visible) continue;
    if (p.type === 'wall') continue;
    if (p.type === 'spinning') continue;

    const px = getPlatX(p);
    const py = getPlatY(p);
    const pw = p.w * TILE;
    const ph = TILE;

    if (p.type === 'lava') {
      if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer();
        return;
      }
      continue;
    }

    if (aabb(player.x, player.y, player.w, player.h, px, py, pw, ph)) {
      if (p.type === 'kill') {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer(); return;
      }
      if (p.type === 'reverseGravity') {
        player.reverseGravity = !player.reverseGravity;
        p.visible = false;
        setTimeout(() => { p.visible = true; }, 2000);
        continue;
      }

      if (player.vy > 0 && !player.reverseGravity) {
        player.y = py - player.h;
        // Landing impact
        const fallSpeed = player.lastFallSpeed;
        player.vy = 0;
        player.onGround = true;
        player.lastGroundTime = now;
        player.jumpsLeft = player.maxJumps;

        if (fallSpeed > 4) {
          player.squash = 1.2 + (fallSpeed - 4) * 0.05;
          player.stretch = 0.7 - (fallSpeed - 4) * 0.02;
          spawnDustParticles(player.x + player.w/2, player.y + player.h, Math.floor(fallSpeed));
          if (fallSpeed > 8) camera.shake = Math.max(camera.shake, fallSpeed * 0.5);
        }

        handlePlatformEffect(p);
      } else if (player.vy < 0 && !player.reverseGravity) {
        player.y = py + ph;
        player.vy = 0;
      } else if (player.vy < 0 && player.reverseGravity) {
        player.y = py + ph;
        player.vy = 0;
        player.onGround = true;
        player.lastGroundTime = now;
        player.jumpsLeft = player.maxJumps;
        handlePlatformEffect(p);
      } else if (player.vy > 0 && player.reverseGravity) {
        player.y = py - player.h;
        player.vy = 0;
      }
    }
  }

  // Spinning obstacle collision
  for (const p of activePlatforms) {
    if (p.type !== 'spinning') continue;
    const cx = p.x * TILE + TILE/2;
    const cy = p.y * TILE + TILE/2;
    const r = (p.radius || 2) * TILE;
    const angle = p.spinAngle;
    for (let end = -1; end <= 1; end += 2) {
      const bx = cx + Math.cos(angle) * r * end - TILE/2;
      const by = cy + Math.sin(angle) * r * end - TILE/4;
      if (aabb(player.x, player.y, player.w, player.h, bx, by, TILE, TILE/2)) {
        if (player.ghostTimer > 0) continue;
        if (player.shield) { breakShield(); continue; }
        killPlayer();
        return;
      }
    }
  }

  // Afterimage trail when moving fast
  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (speed > 6) {
    player.trail.push({ x: player.x, y: player.y, alpha: 0.5 });
  }

  checkCoinsAndPortal();
  checkPowerups();

  // Fall death
  if (player.y > 16 * TILE || player.y < -5 * TILE) {
    killPlayer();
    return;
  }

  // Squash/stretch recovery
  player.squash += (1 - player.squash) * 0.15;
  player.stretch += (1 - player.stretch) * 0.15;

  if (player.wallJumpCooldown > 0) player.wallJumpCooldown--;

  // Speed lines
  spawnSpeedLines();
}

function checkCoinsAndPortal() {
  const playerCX = player.x + player.w/2;
  const playerCY = player.y + player.h/2;

  // Coin magnet
  for (const c of activeCoins) {
    if (c.collected) continue;
    if (player.magnetTimer > 0) {
      const dx = playerCX - c.x;
      const dy = playerCY - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 150) {
        c.x += dx / dist * 4;
        c.y += dy / dist * 4;
      }
    }
    const dx = playerCX - c.x;
    const dy = playerCY - c.y;
    if (Math.sqrt(dx*dx + dy*dy) < 25) {
      c.collected = true;
      GS.stageCoins++;
      sfxCoin();
      spawnCoinParticles(c.x, c.y);
      updateHUD();
    }
  }

  // Check portal
  const portalDx = playerCX - (portalPos.x + TILE/2);
  const portalDy = playerCY - (portalPos.y + TILE);
  if (Math.sqrt(portalDx*portalDx + portalDy*portalDy) < TILE * 1.2) {
    completeStage();
  }
}

function checkPowerups() {
  const playerCX = player.x + player.w/2;
  const playerCY = player.y + player.h/2;

  for (const pu of activePowerups) {
    if (pu.collected) continue;
    const dx = playerCX - pu.x;
    const dy = playerCY - pu.y;
    if (Math.sqrt(dx*dx + dy*dy) < 25) {
      pu.collected = true;
      sfxPowerup();
      screenFlash('rgba(255,255,255,0.2)', 200);

      switch (pu.type) {
        case 'speed':
          player.powerSpeedTimer = POWERUP_TYPES.speed.duration;
          break;
        case 'shield':
          player.shield = true;
          break;
        case 'magnet':
          player.magnetTimer = POWERUP_TYPES.magnet.duration;
          break;
        case 'ghost':
          player.ghostTimer = POWERUP_TYPES.ghost.duration;
          break;
        case 'rocket':
          player.rocketJump = true;
          break;
      }

      // Particle burst
      const info = POWERUP_TYPES[pu.type];
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        spawnParticle(pu.x, pu.y, Math.cos(angle)*3, Math.sin(angle)*3 - 1, info.color, 25, 4, 'circle');
      }
    }
  }
}

function breakShield() {
  player.shield = false;
  sfxShieldBreak();
  camera.shake = Math.max(camera.shake, 6);
  screenFlash('rgba(66,165,245,0.3)', 200);
  for (let i = 0; i < 16; i++) {
    const angle = (i / 16) * Math.PI * 2;
    spawnParticle(player.x + player.w/2, player.y + player.h/2,
      Math.cos(angle)*4, Math.sin(angle)*4, '#42a5f5', 25, 4, 'circle');
  }
}

function handlePlatformEffect(p) {
  switch (p.type) {
    case 'conveyor':
      player.vx += (p.dir || 1) * (p.speed || 2) * 0.5;
      break;
    case 'bouncy':
      player.vy = -16;
      player.onGround = false;
      player.squash = 0.5;
      player.stretch = 1.6;
      sfxBounce();
      // Bouncy particles
      for (let i = 0; i < 8; i++) {
        spawnParticle(player.x + player.w/2, player.y + player.h,
          (Math.random()-0.5)*5, -2 - Math.random()*3, '#76ff03', 20, 3, 'circle');
      }
      break;
    case 'ice':
      player.onIce = true;
      break;
    case 'speed':
      player.speedBoostTimer = 60;
      break;
    case 'checkpoint':
      if (GS.checkpointStage < GS.currentStage) {
        GS.checkpointStage = GS.currentStage;
        sfxCheckpoint();
        spawnCheckpointParticles(player.x + player.w/2, player.y);
        screenFlash('rgba(255,255,255,0.2)', 300);
        saveGame();
      }
      break;
  }
}

function getPlatX(p) {
  if (p.moveX && p.type !== 'kill') {
    return (p.origX + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveX) * TILE;
  }
  if (p.isMoving && p.moveX) {
    return (p.origX + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveX) * TILE;
  }
  return p.x * TILE;
}

function getPlatY(p) {
  if (p.moveY && p.type !== 'kill') {
    return (p.origY + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveY) * TILE;
  }
  if (p.isMoving && p.moveY) {
    return (p.origY + Math.sin(p.timer * 0.02 * (p.speed || 1)) * p.moveY) * TILE;
  }
  return p.y * TILE;
}

function aabb(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  player.deathTimer = 25; // Fast respawn!
  GS.deaths++;
  camera.shake = 12;
  sfxDeath();
  spawnDeathParticles(player.x + player.w/2, player.y + player.h/2);
  screenFlash('rgba(255,0,0,0.4)', 150);
  document.getElementById('death-overlay').style.display = 'block';
  setTimeout(() => { document.getElementById('death-overlay').style.display = 'none'; }, 120);
  updateHUD();
  saveGame();
}

function completeStage() {
  if (player.victoryTimer > 0) return;
  player.victoryTimer = 90;

  sfxComplete();
  spawnCompleteParticles(player.x + player.w/2, player.y + player.h/2);
  screenFlash('rgba(255,255,255,0.3)', 400);

  const stageTime = stageTimer / 60;
  const stage = STAGES[GS.currentStage - 1];
  const parTime = stage.parTime;
  const gotAllCoins = GS.stageCoins >= 3;
  const underPar = stageTime <= parTime;

  let stars = 1;
  if (gotAllCoins) stars = 2;
  if (gotAllCoins && underPar) stars = 3;

  GS.completedStages[GS.currentStage] = true;
  GS.totalCoins += GS.stageCoins;

  if (!GS.bestTimes[GS.currentStage] || stageTime < GS.bestTimes[GS.currentStage]) {
    GS.bestTimes[GS.currentStage] = parseFloat(stageTime.toFixed(1));
  }
  if (!GS.stageCoinsCollected[GS.currentStage] || GS.stageCoins > GS.stageCoinsCollected[GS.currentStage]) {
    GS.stageCoinsCollected[GS.currentStage] = GS.stageCoins;
  }

  const completedStageNum = GS.currentStage;

  if (GS.currentStage >= GS.highestStage && GS.currentStage < 50) {
    GS.highestStage = GS.currentStage + 1;
  }
  if (GS.currentStage % 5 === 0) {
    GS.checkpointStage = Math.min(GS.currentStage + 1, 50);
  }

  // Milestone unlocks
  if (completedStageNum === 10 && !GS.unlockedColorChange) {
    GS.unlockedColorChange = true;
    setTimeout(() => showMilestone('COLOR UNLOCKED!', 'Press C to change character color'), 800);
  }
  if (completedStageNum === 20 && !GS.unlockedTrailChange) {
    GS.unlockedTrailChange = true;
    setTimeout(() => showMilestone('TRAIL UNLOCKED!', 'Your dash trail now changes with your color'), 800);
  }
  if (completedStageNum === 30 && !GS.unlockedBigDash) {
    GS.unlockedBigDash = true;
    setTimeout(() => showMilestone('BIG DASH UNLOCKED!', 'Your dash is now 40% more powerful!'), 800);
  }

  saveGame();

  setTimeout(() => {
    const overlay = document.getElementById('stage-complete-overlay');
    overlay.style.display = 'flex';

    document.getElementById('complete-title').textContent =
      completedStageNum === 50 ? 'YOU BEAT OBBY 67!' : 'STAGE COMPLETE!';

    let starStr = '';
    for (let i = 0; i < 3; i++) starStr += i < stars ? '★' : '☆';
    document.getElementById('complete-stars').textContent = starStr;
    document.getElementById('complete-time').textContent =
      `Time: ${stageTime.toFixed(1)}s (Par: ${parTime}s)`;
    document.getElementById('complete-coins-info').textContent =
      `Coins: ${GS.stageCoins} / 3`;

    document.getElementById('btn-next-stage').textContent =
      completedStageNum === 50 ? 'PLAY AGAIN' : 'NEXT STAGE';
    document.getElementById('btn-next-stage').style.display = 'inline-block';
  }, 1200);
}

// --- Update platforms ---
function updatePlatforms() {
  for (const p of activePlatforms) {
    p.timer++;
    p.glowTimer += 0.05;

    if (p.moveX || p.moveY) {
      if (player.onGround && !player.dead && p.type !== 'kill' && p.type !== 'spinning') {
        const px = getPlatX(p);
        const py = getPlatY(p);
        const pw = p.w * TILE;
        if (player.x + player.w > px && player.x < px + pw &&
            Math.abs(player.y + player.h - py) < 4) {
          const oldTimer = p.timer;
          p.timer++;
          const dx = getPlatX(p) - px;
          const dy = getPlatY(p) - py;
          p.timer = oldTimer;
          player.x += dx * 0.5;
        }
      }
    }

    if (p.type === 'disappearing') {
      const cycle = 240;
      const t = (p.timer + (p.phase || 0) * 80) % cycle;
      if (t < 160) {
        p.visible = true;
        p.flashing = t > 100;
      } else {
        p.visible = false;
        p.flashing = false;
      }
    }

    if (p.type === 'invisible') {
      const cycle = 300;
      const t = p.timer % cycle;
      p.flashVisible = t < 40 || (t > 150 && t < 190);
    }

    if (p.type === 'spinning') {
      p.spinAngle += 0.02 * (p.speed || 2);
    }
  }
}

// --- Update particles ---
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.type !== 'line' && p.type !== 'text+1') p.vy += 0.12;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Update trail ---
function updateTrail() {
  for (let i = player.trail.length - 1; i >= 0; i--) {
    player.trail[i].alpha -= 0.08;
    if (player.trail[i].alpha <= 0) player.trail.splice(i, 1);
  }
  if (player.trail.length > 12) player.trail.splice(0, player.trail.length - 12);
}

// --- Camera ---
function updateCamera() {
  const lookAhead = player.facingRight ? 100 : -100;
  camera.targetX = player.x - canvas.width / 2 + lookAhead;
  camera.targetY = player.y - canvas.height / 2 + 50;

  camera.x += (camera.targetX - camera.x) * 0.08;
  camera.y += (camera.targetY - camera.y) * 0.06;

  // Zoom: zoom out when moving fast
  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  camera.targetZoom = speed > 8 ? 0.92 : 1;
  camera.zoom += (camera.targetZoom - camera.zoom) * 0.05;

  if (camera.shake > 0) {
    camera.shake *= 0.82;
    if (camera.shake < 0.3) camera.shake = 0;
  }
}

// --- Rendering ---
function render() {
  const W = canvas.width;
  const H = canvas.height;

  const shakeX = camera.shake * (Math.random() - 0.5) * 2;
  const shakeY = camera.shake * (Math.random() - 0.5) * 2;

  const theme = getTheme(GS.currentStage);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, theme.sky[0]);
  skyGrad.addColorStop(0.5, theme.sky[1]);
  skyGrad.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Background stars (visible in darker themes)
  const themeIdx = Math.floor((GS.currentStage - 1) / 10);
  if (themeIdx >= 1) {
    drawStars(W, H);
  }

  // Parallax mountains
  drawMountains(W, H, theme);

  // Parallax clouds
  drawClouds(W, H, theme);

  // Decorative elements per theme
  drawThemeDecorations(W, H, theme);

  ctx.save();
  // Apply zoom
  const zoomCX = W / 2;
  const zoomCY = H / 2;
  ctx.translate(zoomCX, zoomCY);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-zoomCX, -zoomCY);

  ctx.translate(-camera.x + shakeX, -camera.y + shakeY);

  // Draw platforms
  for (const p of activePlatforms) {
    drawPlatform(p, theme);
  }

  // Draw power-ups
  for (const pu of activePowerups) {
    if (pu.collected) continue;
    pu.bobTimer += 0.05;
    pu.glowTimer += 0.07;
    const bob = Math.sin(pu.bobTimer) * 4;
    drawPowerup(pu.x, pu.y + bob, pu);
  }

  // Draw coins
  for (const c of activeCoins) {
    if (c.collected) continue;
    c.bobTimer += 0.05;
    const bob = Math.sin(c.bobTimer) * 3;
    drawCoin(c.x, c.y + bob);
  }

  // Draw portal
  drawPortal(portalPos.x, portalPos.y);

  // Draw player trail (afterimages)
  for (const t of player.trail) {
    ctx.globalAlpha = t.alpha * 0.4;
    const col = TRAIL_COLORS[GS.trailColorIdx];
    ctx.fillStyle = col;
    ctx.fillRect(t.x, t.y, player.w, player.h);
  }
  ctx.globalAlpha = 1;

  // Draw player
  if (!player.dead) {
    drawPlayer();
  }

  // Draw particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size/2, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'line') {
      ctx.fillRect(p.x, p.y, p.size * 4, 1);
    } else if (p.type === 'text+1') {
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('+1', p.x, p.y);
    } else {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation + p.life * 0.1);
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;

  ctx.restore();
}

// --- Draw functions ---

function drawStars(W, H) {
  const t = performance.now() * 0.001;
  const scrollX = camera.x * 0.02;
  const scrollY = camera.y * 0.02;
  for (const s of bgStars) {
    const sx = ((s.x - scrollX) % W + W) % W;
    const sy = ((s.y - scrollY) % H + H) % H;
    const twinkle = 0.3 + Math.sin(t * 2 + s.twinkle) * 0.3 + 0.4;
    ctx.globalAlpha = twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawMountains(W, H, theme) {
  const scrollX = camera.x * 0.05;
  ctx.fillStyle = theme.sky[1] + '80';
  for (const m of bgMountains) {
    const mx = ((m.x - scrollX) % 2400 + 2400) % 2400 - 200;
    ctx.beginPath();
    ctx.moveTo(mx, H);
    ctx.lineTo(mx + m.w/2, H - m.h);
    ctx.lineTo(mx + m.w, H);
    ctx.closePath();
    ctx.fill();
  }
}

function drawClouds(W, H, theme) {
  const t = performance.now() * 0.001;
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  const scrollX = camera.x * 0.08;
  for (const c of bgClouds) {
    const cx = ((c.x + t * c.speed * 20 - scrollX) % 2500 + 2500) % 2500 - 200;
    const cy = c.y;
    ctx.beginPath();
    ctx.arc(cx, cy, c.w * 0.3, 0, Math.PI * 2);
    ctx.arc(cx + c.w * 0.25, cy - c.w * 0.1, c.w * 0.35, 0, Math.PI * 2);
    ctx.arc(cx + c.w * 0.5, cy, c.w * 0.28, 0, Math.PI * 2);
    ctx.arc(cx + c.w * 0.2, cy + c.w * 0.05, c.w * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawThemeDecorations(W, H, theme) {
  const themeIdx = Math.floor((GS.currentStage - 1) / 10);
  const t = performance.now() * 0.001;
  const scrollX = camera.x * 0.15;

  if (themeIdx === 0) {
    // Grassland: grass tufts at bottom
    ctx.fillStyle = 'rgba(102,187,106,0.3)';
    for (let i = 0; i < 20; i++) {
      const gx = ((i * 100 - scrollX) % 2000 + 2000) % 2000;
      const gy = H - 10 + Math.sin(t + i) * 3;
      ctx.beginPath();
      ctx.moveTo(gx, gy);
      ctx.lineTo(gx + 5, gy - 15);
      ctx.lineTo(gx + 10, gy);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(gx + 8, gy);
      ctx.lineTo(gx + 14, gy - 12);
      ctx.lineTo(gx + 18, gy);
      ctx.fill();
    }
  } else if (themeIdx === 1) {
    // Underground: stalactites
    ctx.fillStyle = 'rgba(93,64,55,0.4)';
    for (let i = 0; i < 12; i++) {
      const sx = ((i * 180 - scrollX) % 2200 + 2200) % 2200;
      const sh = 20 + Math.sin(i * 1.7) * 15;
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx + 8, sh);
      ctx.lineTo(sx + 16, 0);
      ctx.fill();
    }
  } else if (themeIdx === 2) {
    // Lava: dripping lava drops
    ctx.fillStyle = 'rgba(255,87,34,0.4)';
    for (let i = 0; i < 8; i++) {
      const dx = ((i * 250 - scrollX) % 2000 + 2000) % 2000;
      const dy = (t * 30 + i * 100) % (H + 20) - 10;
      ctx.beginPath();
      ctx.arc(dx, dy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (themeIdx === 3) {
    // Sky: floating clouds closer
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (let i = 0; i < 5; i++) {
      const cx = ((i * 350 + t * 10 - scrollX * 0.5) % 2000 + 2000) % 2000;
      const cy = H * 0.3 + i * 40;
      ctx.beginPath();
      ctx.arc(cx, cy, 20, 0, Math.PI * 2);
      ctx.arc(cx + 18, cy - 5, 25, 0, Math.PI * 2);
      ctx.arc(cx + 36, cy, 18, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (themeIdx === 4) {
    // Void: neon sparkle particles in background
    for (let i = 0; i < 15; i++) {
      const sx = ((i * 150 + Math.sin(t + i) * 50 - scrollX * 0.3) % 2000 + 2000) % 2000;
      const sy = (Math.sin(t * 0.5 + i * 2) * 0.5 + 0.5) * H;
      const brightness = Math.sin(t * 3 + i) * 0.4 + 0.6;
      ctx.globalAlpha = brightness * 0.6;
      ctx.fillStyle = i % 3 === 0 ? '#ea80fc' : i % 3 === 1 ? '#00e5ff' : '#76ff03';
      ctx.beginPath();
      ctx.arc(sx, sy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawBlock3D(x, y, w, h, topColor, frontColor, sideColor, borderColor) {
  const depth = 8;
  ctx.fillStyle = frontColor;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = topColor;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + depth, y - depth);
  ctx.lineTo(x + w + depth, y - depth);
  ctx.lineTo(x + w, y);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = sideColor;
  ctx.beginPath();
  ctx.moveTo(x + w, y);
  ctx.lineTo(x + w + depth, y - depth);
  ctx.lineTo(x + w + depth, y + h - depth);
  ctx.lineTo(x + w, y + h);
  ctx.closePath();
  ctx.fill();
  if (borderColor) {
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);
  }
}

function drawPlatform(p, theme) {
  const px = (p.type === 'wall') ? p.x * TILE : getPlatX(p);
  const py = (p.type === 'wall') ? p.y * TILE : getPlatY(p);
  const pw = p.w * TILE;
  const ph = (p.type === 'wall') ? p.h * TILE : TILE;

  if (px + pw < camera.x - 50 || px > camera.x + canvas.width + 50) return;
  if (py + ph < camera.y - 50 || py > camera.y + canvas.height + 50) return;

  switch (p.type) {
    case 'normal':
    case 'wall':
    case 'checkpoint':
      if (p.type === 'checkpoint') {
        const glow = Math.sin(performance.now() * 0.005) * 0.3 + 0.7;
        ctx.shadowColor = '#fdd835';
        ctx.shadowBlur = 15 * glow;
        drawBlock3D(px, py, pw, ph, '#fdd835', '#f9a825', '#f57f17', '#e65100');
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.fillRect(px + pw/2 - 1, py - 25, 2, 25);
        ctx.fillStyle = '#e53935';
        ctx.beginPath();
        ctx.moveTo(px + pw/2 + 1, py - 25);
        ctx.lineTo(px + pw/2 + 15, py - 20);
        ctx.lineTo(px + pw/2 + 1, py - 15);
        ctx.fill();
      } else {
        drawBlock3D(px, py, pw, ph, theme.platTop, theme.platFront, theme.platSide, theme.platBorder);
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 0.5;
        for (let gx = px; gx < px + pw; gx += TILE) {
          ctx.beginPath(); ctx.moveTo(gx, py); ctx.lineTo(gx, py + ph); ctx.stroke();
        }
        for (let gy = py; gy < py + ph; gy += TILE) {
          ctx.beginPath(); ctx.moveTo(px, gy); ctx.lineTo(px + pw, gy); ctx.stroke();
        }
      }
      break;

    case 'kill': {
      if (p.isMoving && !p.visible) return;
      const kx = p.isMoving ? getPlatX(p) : px;
      const ky = p.isMoving ? getPlatY(p) : py;
      // Pulsing red glow
      const killGlow = Math.sin(p.glowTimer * 3) * 0.3 + 0.5;
      ctx.shadowColor = '#ef5350';
      ctx.shadowBlur = 12 * killGlow;
      drawBlock3D(kx, ky, pw, ph, '#ef5350', '#e53935', '#c62828', '#b71c1c');
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      for (let s = 0; s < pw; s += 12) {
        ctx.fillRect(kx + s, ky, 6, ph);
      }
      break;
    }

    case 'moving':
      drawBlock3D(px, py, pw, ph, '#42a5f5', '#1e88e5', '#1565c0', '#0d47a1');
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let a = 0; a < pw; a += 20) {
        ctx.beginPath();
        ctx.moveTo(px + a + 5, py + ph/2);
        ctx.lineTo(px + a + 12, py + 3);
        ctx.lineTo(px + a + 12, py + ph - 3);
        ctx.fill();
      }
      break;

    case 'disappearing':
      if (!p.visible) return;
      if (p.flashing) {
        ctx.globalAlpha = 0.4 + Math.sin(p.timer * 0.3) * 0.3;
      }
      drawBlock3D(px, py, pw, ph, '#ce93d8', '#ab47bc', '#8e24aa', '#6a1b9a');
      ctx.globalAlpha = 1;
      break;

    case 'invisible':
      if (p.flashVisible) {
        ctx.globalAlpha = 0.4;
        drawBlock3D(px, py, pw, ph, '#e0e0e0', '#bdbdbd', '#9e9e9e', '#757575');
        ctx.globalAlpha = 1;
      }
      break;

    case 'conveyor':
      drawBlock3D(px, py, pw, ph, '#78909c', '#546e7a', '#37474f', '#263238');
      ctx.fillStyle = '#fdd835';
      const cOffset = (p.timer * (p.dir || 1) * 1.5) % 20;
      for (let a = 0; a < pw; a += 20) {
        const ax = px + a + cOffset;
        if (ax >= px && ax + 10 <= px + pw) {
          const dir = p.dir || 1;
          ctx.beginPath();
          ctx.moveTo(ax + (dir > 0 ? 0 : 10), py + 4);
          ctx.lineTo(ax + (dir > 0 ? 10 : 0), py + ph/2);
          ctx.lineTo(ax + (dir > 0 ? 0 : 10), py + ph - 4);
          ctx.fill();
        }
      }
      break;

    case 'lava': {
      const lavaGrad = ctx.createLinearGradient(px, py, px, py + ph);
      lavaGrad.addColorStop(0, '#ff5722');
      lavaGrad.addColorStop(0.5, '#ff9800');
      lavaGrad.addColorStop(1, '#f44336');
      ctx.fillStyle = lavaGrad;
      ctx.fillRect(px, py, pw, ph);
      for (let lb = 0; lb < pw; lb += 15) {
        const blobY = py - 3 + Math.sin((p.timer + lb) * 0.08) * 4;
        ctx.fillStyle = '#ffeb3b';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(px + lb + 7, blobY + 5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      // Lava glow
      ctx.shadowColor = '#ff5722';
      ctx.shadowBlur = 15;
      ctx.fillStyle = 'rgba(255,87,34,0.01)';
      ctx.fillRect(px, py - 5, pw, 5);
      ctx.shadowBlur = 0;
      break;
    }

    case 'bouncy': {
      const bounceScale = 1 + Math.sin(p.timer * 0.1) * 0.05;
      const bh = ph * bounceScale;
      // Pulsing green glow
      const bounceGlow = Math.sin(p.glowTimer * 3) * 0.3 + 0.5;
      ctx.shadowColor = '#76ff03';
      ctx.shadowBlur = 10 * bounceGlow;
      drawBlock3D(px, py + ph - bh, pw, bh, '#76ff03', '#64dd17', '#558b2f', '#33691e');
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for (let s = 0; s < 3; s++) {
        const sx = px + pw * (s + 1) / 4;
        ctx.beginPath();
        ctx.moveTo(sx - 4, py + ph - 3);
        ctx.quadraticCurveTo(sx, py - 5, sx + 4, py + ph - 3);
        ctx.stroke();
      }
      break;
    }

    case 'spinning': {
      ctx.fillStyle = '#616161';
      ctx.beginPath();
      ctx.arc(px + TILE/2, py + TILE/2, 6, 0, Math.PI * 2);
      ctx.fill();
      const scx = px + TILE/2;
      const scy = py + TILE/2;
      const sr = (p.radius || 2) * TILE;
      ctx.save();
      ctx.translate(scx, scy);
      ctx.rotate(p.spinAngle);
      // Glow on spinning bar
      ctx.shadowColor = '#e53935';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#e53935';
      ctx.fillRect(-sr, -6, sr * 2, 12);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#b71c1c';
      ctx.beginPath(); ctx.arc(-sr, 0, 8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sr, 0, 8, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      break;
    }

    case 'ice':
      drawBlock3D(px, py, pw, ph, '#e3f2fd', '#bbdefb', '#90caf9', '#64b5f6');
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillRect(px + 4, py + 3, pw * 0.3, 4);
      ctx.fillRect(px + pw * 0.5, py + 5, pw * 0.2, 3);
      break;

    case 'speed': {
      // Blue flame glow
      const speedGlow = Math.sin(p.glowTimer * 4) * 0.3 + 0.6;
      ctx.shadowColor = '#29b6f6';
      ctx.shadowBlur = 12 * speedGlow;
      drawBlock3D(px, py, pw, ph, '#29b6f6', '#0288d1', '#01579b', '#004c8c');
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      const sOff = (p.timer * 2) % 20;
      for (let a = 0; a < pw; a += 20) {
        const sx = px + a + sOff;
        if (sx >= px && sx + 8 <= px + pw) {
          ctx.beginPath();
          ctx.moveTo(sx, py + ph/2);
          ctx.lineTo(sx + 8, py + 4);
          ctx.lineTo(sx + 8, py + ph - 4);
          ctx.fill();
        }
      }
      // Blue flame trail particles
      if (Math.random() > 0.5) {
        spawnParticle(px + Math.random() * pw, py - 2,
          0, -1 - Math.random(), '#29b6f6', 10, 3, 'circle');
      }
      break;
    }

    case 'reverseGravity':
      if (!p.visible) return;
      drawBlock3D(px, py, pw, ph, '#ea80fc', '#d500f9', '#aa00ff', '#7b1fa2');
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('↕', px + pw/2, py + ph/2 + 6);
      break;
  }
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const w = player.w * player.squash;
  const h = player.h * player.stretch;
  const offX = (player.w - w) / 2;
  const offY = player.h - h;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(px + player.w/2, py + player.h + 3, player.w * 0.6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Speed trail
  if (player.speedBoostTimer > 0 || player.powerSpeedTimer > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#29b6f6';
    for (let t = 1; t <= 4; t++) {
      const tx = px + offX - player.vx * t * 2;
      ctx.globalAlpha = 0.3 - t * 0.06;
      ctx.fillRect(tx, py + offY, w, h);
    }
    ctx.globalAlpha = 1;
  }

  // Ghost mode visual
  if (player.ghostTimer > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(performance.now() * 0.01) * 0.15;
  }

  // Shield glow
  if (player.shield) {
    ctx.shadowColor = '#42a5f5';
    ctx.shadowBlur = 15 + Math.sin(performance.now() * 0.005) * 5;
    ctx.strokeStyle = 'rgba(66,165,245,0.6)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(px + player.w/2, py + player.h/2, player.w * 0.8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Body (3D block)
  const playerCol = PLAYER_COLORS[GS.playerColorIdx];
  const bodyColor = player.reverseGravity ? '#ea80fc' : playerCol;
  // Generate darker shades
  const bodyDark = shadeColor(bodyColor, -30);
  const bodySide = shadeColor(bodyColor, -50);
  drawBlock3D(px + offX, py + offY, w, h, bodyColor, bodyDark, bodySide);

  // Rocket jump indicator
  if (player.rocketJump) {
    ctx.fillStyle = '#ff5722';
    ctx.globalAlpha = 0.5 + Math.sin(performance.now() * 0.01) * 0.3;
    ctx.beginPath();
    // Flame under feet
    ctx.moveTo(px + player.w/2 - 6, py + player.h);
    ctx.lineTo(px + player.w/2, py + player.h + 10 + Math.random()*5);
    ctx.lineTo(px + player.w/2 + 6, py + player.h);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Face
  const faceX = px + offX + (player.facingRight ? w * 0.55 : w * 0.15);
  const faceY = py + offY + h * 0.25;

  ctx.fillStyle = '#fff';
  ctx.fillRect(faceX - 3, faceY, 5, 6);
  ctx.fillRect(faceX + 5, faceY, 5, 6);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(faceX - 1, faceY + 2, 3, 3);
  ctx.fillRect(faceX + 7, faceY + 2, 3, 3);

  // Expression changes
  if (player.dashTimer > 0 || Math.abs(player.vx) > MOVE_SPEED) {
    // Determined face - flat mouth
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(faceX, faceY + 12);
    ctx.lineTo(faceX + 10, faceY + 12);
    ctx.stroke();
  } else if (player.wallSliding) {
    // Surprised face - O mouth
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(faceX + 4, faceY + 12, 3, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Happy smile
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(faceX + 4, faceY + 10, 5, 0.1, Math.PI - 0.1);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Double jump indicator
  if (GS.hasDoubleJump && player.jumpsLeft > 0 && !player.onGround) {
    ctx.fillStyle = 'rgba(79, 195, 247, 0.5)';
    for (let i = 0; i < player.jumpsLeft; i++) {
      ctx.beginPath();
      ctx.arc(px + player.w/2 - 6 + i * 12, py + player.h + 10, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Wall slide indicator
  if (player.wallSliding) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const sideX = player.wallSlideSide === 1 ? px + player.w + 2 : px - 6;
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(sideX, py + 5 + i * 12, 4, 8);
    }
  }
}

function drawPowerup(x, y, pu) {
  const info = POWERUP_TYPES[pu.type];
  const glow = Math.sin(pu.glowTimer) * 0.3 + 0.7;

  // Glow circle
  ctx.shadowColor = info.color;
  ctx.shadowBlur = 12 * glow;

  // Background circle
  ctx.fillStyle = info.color + '40';
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = info.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.stroke();

  // Emoji
  ctx.font = '16px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(info.emoji, x, y + 1);

  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
}

function drawCoin(x, y) {
  const glow = Math.sin(performance.now() * 0.005) * 0.3 + 0.7;

  ctx.shadowColor = '#ffd740';
  ctx.shadowBlur = 8 * glow;

  ctx.fillStyle = '#ffd740';
  ctx.beginPath();
  ctx.arc(x, y, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#ff8f00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 7, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = '#ff8f00';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', x, y + 1);

  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
}

function drawPortal(x, y) {
  const t = performance.now() * 0.003;
  const glow = Math.sin(t) * 0.3 + 0.7;

  ctx.shadowColor = '#66bb6a';
  ctx.shadowBlur = 20 * glow;

  ctx.strokeStyle = '#66bb6a';
  ctx.lineWidth = 4;
  ctx.strokeRect(x, y, TILE * 1.5, TILE * 2);

  ctx.fillStyle = `rgba(102, 187, 106, ${0.3 + glow * 0.3})`;
  ctx.fillRect(x + 4, y + 4, TILE * 1.5 - 8, TILE * 2 - 8);

  for (let i = 0; i < 5; i++) {
    const sx = x + TILE * 0.75 + Math.sin(t + i * 1.3) * 18;
    const sy = y + TILE + Math.cos(t + i * 1.3) * 25;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + Math.sin(t * 2 + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('FINISH', x + TILE * 0.75, y - 8);

  ctx.shadowBlur = 0;
}

// --- Color utility ---
function shadeColor(color, percent) {
  let r, g, b;
  if (color.startsWith('#')) {
    const hex = color.slice(1);
    r = parseInt(hex.substring(0, 2), 16);
    g = parseInt(hex.substring(2, 4), 16);
    b = parseInt(hex.substring(4, 6), 16);
  } else {
    return color;
  }
  r = Math.max(0, Math.min(255, r + Math.round(r * percent / 100)));
  g = Math.max(0, Math.min(255, g + Math.round(g * percent / 100)));
  b = Math.max(0, Math.min(255, b + Math.round(b * percent / 100)));
  return `rgb(${r},${g},${b})`;
}

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Menu ---
document.getElementById('btn-play').addEventListener('click', () => {
  ensureAudio();
  startGame(GS.highestStage);
});

document.getElementById('btn-stages').addEventListener('click', () => {
  showStageSelect();
});

document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('settings-screen').style.display = 'flex';
  updateSettingsUI();
});

document.getElementById('btn-back-stages').addEventListener('click', () => {
  document.getElementById('stage-select-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
});

document.getElementById('btn-back-settings').addEventListener('click', () => {
  document.getElementById('settings-screen').style.display = 'none';
  document.getElementById('menu-screen').style.display = 'flex';
});

document.getElementById('toggle-music').addEventListener('click', () => {
  GS.musicOn = !GS.musicOn;
  if (GS.musicOn && GS.screen === 'playing') startMusic();
  else stopMusic();
  updateSettingsUI();
  saveGame();
});

document.getElementById('toggle-sound').addEventListener('click', () => {
  GS.soundOn = !GS.soundOn;
  updateSettingsUI();
  saveGame();
});

document.getElementById('btn-next-stage').addEventListener('click', () => {
  document.getElementById('stage-complete-overlay').style.display = 'none';
  if (GS.currentStage >= 50) {
    showMenu();
  } else {
    startGame(GS.currentStage + 1);
  }
});

document.getElementById('btn-complete-menu').addEventListener('click', () => {
  document.getElementById('stage-complete-overlay').style.display = 'none';
  showMenu();
});

function updateSettingsUI() {
  const musicBtn = document.getElementById('toggle-music');
  musicBtn.textContent = GS.musicOn ? 'ON' : 'OFF';
  musicBtn.className = 'toggle-btn ' + (GS.musicOn ? 'toggle-on' : 'toggle-off');

  const soundBtn = document.getElementById('toggle-sound');
  soundBtn.textContent = GS.soundOn ? 'ON' : 'OFF';
  soundBtn.className = 'toggle-btn ' + (GS.soundOn ? 'toggle-on' : 'toggle-off');
}

function showStageSelect() {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('stage-select-screen').style.display = 'flex';

  const grid = document.getElementById('stage-grid');
  grid.innerHTML = '';

  for (let i = 1; i <= 50; i++) {
    const btn = document.createElement('button');
    btn.className = 'stage-btn';
    btn.textContent = i;

    if (GS.completedStages[i]) {
      btn.classList.add('completed');
    } else if (i <= GS.highestStage) {
      btn.classList.add('current');
    } else {
      btn.classList.add('locked');
    }

    if (GS.completedStages[i]) {
      const stars = document.createElement('div');
      stars.className = 'stage-stars';
      const sc = GS.stageCoinsCollected[i] || 0;
      const bt = GS.bestTimes[i] || Infinity;
      const pt = STAGES[i-1].parTime;
      let starCount = 1;
      if (sc >= 3) starCount = 2;
      if (sc >= 3 && bt <= pt) starCount = 3;
      let starStr = '';
      for (let s = 0; s < starCount; s++) starStr += '★';
      stars.textContent = starStr;
      btn.appendChild(stars);
    }

    if (i <= GS.highestStage) {
      btn.addEventListener('click', ((stageNum) => () => {
        ensureAudio();
        document.getElementById('stage-select-screen').style.display = 'none';
        startGame(stageNum);
      })(i));
    }

    grid.appendChild(btn);
  }
}

function showMenu() {
  GS.screen = 'menu';
  stopMusic();
  document.getElementById('menu-screen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('stage-complete-overlay').style.display = 'none';
  document.getElementById('dash-cooldown-bar').style.display = 'none';
}

function startGame(stageNum) {
  document.getElementById('menu-screen').style.display = 'none';
  document.getElementById('stage-select-screen').style.display = 'none';
  document.getElementById('stage-complete-overlay').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  GS.screen = 'playing';
  GS.stageCoins = 0;
  GS.checkpointStage = Math.floor((stageNum - 1) / 5) * 5 + 1;
  if (GS.checkpointStage < 1) GS.checkpointStage = 1;

  loadStage(stageNum);
  startMusic();
}

// --- Main loop ---
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  if (GS.screen !== 'playing') {
    render();
    return;
  }

  GS.timer++;
  stageTimer++;
  updatePlatforms();
  updatePlayer();
  updateCamera();
  updateParticles();
  updateTrail();
  updateHUD();

  render();
}

// --- Init ---
loadGame();
updateSettingsUI();
requestAnimationFrame(gameLoop);

</script>

</html>
