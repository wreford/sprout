<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
#home-link{position:fixed;top:12px;left:12px;color:#fff;text-decoration:none;font-size:16px;z-index:1000;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:8px;font-weight:600}
#home-link:hover{background:rgba(0,0,0,.7)}
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:100}

/* Mobile controls */
#mobile-controls{display:none;position:fixed;bottom:0;left:0;width:100%;height:100%;z-index:300;pointer-events:none}

.mobile-btn{position:absolute;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:auto;-webkit-tap-highlight-color:transparent}
.mobile-btn:active{background:rgba(255,255,255,.4)}
#btn-jump{bottom:20px;right:20px;width:100px;height:100px;font-size:18px}
#btn-sprint{bottom:130px;right:25px;width:75px;height:75px}
#btn-dash{bottom:220px;right:30px;width:70px;height:70px}
#btn-restart{top:60px;right:12px;width:50px;height:50px;font-size:11px}
/* Menu */
#menu-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#1a1a3e 0%,#0d0d2b 100%)}
#menu-title{font-size:72px;font-weight:900;color:#00e5ff;text-shadow:0 4px 0 #006064,0 8px 20px rgba(0,229,255,.4);letter-spacing:4px;margin-bottom:10px}
#menu-subtitle{font-size:18px;color:#80deea;margin-bottom:30px;font-weight:400;letter-spacing:2px;opacity:0.8}
.menu-btn{background:linear-gradient(135deg,#00e5ff,#006064);color:#fff;border:none;padding:14px 40px;font-size:20px;font-weight:700;border-radius:12px;cursor:pointer;margin:8px;min-width:200px;text-shadow:0 1px 2px rgba(0,0,0,.3);transition:transform .15s,box-shadow .15s}
.menu-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(0,229,255,.4)}

#stage-select{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:510;background:rgba(0,0,0,.95);overflow-y:auto;padding:30px}

@media(max-width:768px){

<script type="module">
import * as THREE from 'three';

// ============================================================
// CONSTANTS
// ============================================================
const GRAVITY = -26;
const WALK_SPEED = 9;
const SPRINT_MULT = 1.6;
const JUMP_VEL = 14.5;
const JUMP_HOLD_EXTRA = 10;
const JUMP_HOLD_TIME = 0.3;
const DOUBLE_JUMP_VEL = 12.5;
const DASH_SPEED = 30;
const DASH_DURATION = 0.2;
const DASH_COOLDOWN = 3;
const COYOTE_TIME = 0.2;
const JUMP_BUFFER = 0.2;
const PLAYER_W = 0.8;
const PLAYER_H = 1.8;
const PLAYER_D = 0.8;
const CAM_DIST = 7;
const CAM_HEIGHT = 3;
const CAM_LERP = 0.12;
const KILL_Y = -20;
const MAX_VOL = 0.02;

// ============================================================
// SAVE SYSTEM
// ============================================================
const SAVE_KEY = 'obby25d_save';
let saveData = loadSave();
function loadSave(){
  try{
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(d && typeof d.highestStage==='number') return d;
  }catch(e){}
  return {highestStage:1, bestTimes:{}, totalDeaths:0};
}
function writeSave(){localStorage.setItem(SAVE_KEY,JSON.stringify(saveData))}

// ============================================================
// SETTINGS
// ============================================================
let musicVol = 0.5, sfxVol = 0.7, camSens = 0.004;
const volMusic = document.getElementById('vol-music');
const volSfx = document.getElementById('vol-sfx');
const camSensEl = document.getElementById('cam-sens');
volMusic.addEventListener('input',()=>{musicVol=volMusic.value/100; updateMusicVol()});
volSfx.addEventListener('input',()=>{sfxVol=volSfx.value/100});
camSensEl.addEventListener('input',()=>{camSens=0.001+camSensEl.value/100*0.005});

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
function ensureAudio(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume();}

function playTone(freq, dur, type='square', vol=1, slide=0){
  ensureAudio();
  const v = MAX_VOL * sfxVol * vol;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if(slide) o.frequency.linearRampToValueAtTime(freq+slide, audioCtx.currentTime+dur);
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

function sfxJump(){playTone(400,0.12,'square',0.8,200)}
function sfxLand(){playTone(100,0.08,'triangle',0.5)}
function sfxDeath(){playTone(200,0.4,'sawtooth',0.7,-150)}
function sfxCheckpoint(){playTone(600,0.15,'square',0.6); setTimeout(()=>playTone(800,0.2,'square',0.6),120)}
function sfxStageComplete(){playTone(523,0.12,'square',0.7);setTimeout(()=>playTone(659,0.12,'square',0.7),100);setTimeout(()=>playTone(784,0.2,'square',0.7),200)}
function sfxDash(){playTone(150,0.2,'sawtooth',0.5,300)}
function sfxBounce(){playTone(300,0.15,'sine',0.6,400)}
function sfxSpeed(){playTone(500,0.1,'square',0.4,100)}
function sfxDimensionShift(){
  playTone(800,0.15,'sine',0.8,400);
  setTimeout(()=>playTone(1200,0.2,'sine',0.7,200),100);
  setTimeout(()=>playTone(1600,0.3,'sine',0.6,100),200);
}

// Background music
let musicGain=null, musicPlaying=false;
const musicNotes = [262,294,330,349,392,349,330,294,262,330,392,440,392,330,294,262];
let musicIdx=0, musicTimer=null;

function startMusic(){
  if(musicPlaying) return;
  ensureAudio();
  musicPlaying=true;
  musicGain = audioCtx.createGain();
  musicGain.gain.value = MAX_VOL * musicVol * 0.3;
  musicGain.connect(audioCtx.destination);
  playMusicNote();
}
function stopMusic(){
  musicPlaying=false;
  if(musicTimer){clearTimeout(musicTimer);musicTimer=null;}
}
function updateMusicVol(){
  if(musicGain) musicGain.gain.value = MAX_VOL * musicVol * 0.3;
}
function playMusicNote(){
  if(!musicPlaying) return;
  const freq = musicNotes[musicIdx % musicNotes.length];
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.value = freq * 0.5;
  const v = MAX_VOL * musicVol * 0.3;
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+0.35);
  musicIdx++;
  musicTimer = setTimeout(playMusicNote, 350);
}

// ============================================================
// THREE.JS SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 500);

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// LIGHTING
// ============================================================
const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(30,50,20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048,2048);
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 150;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);
scene.add(dirLight.target);

// ============================================================
// MATERIALS (reused)
// ============================================================
function makeMat(color, emissive=0x000000, emissiveIntensity=0){
  return new THREE.MeshStandardMaterial({color, emissive, emissiveIntensity, roughness:0.7, metalness:0.1});
}
const matGrass = makeMat(0x4caf50);
const matLava = makeMat(0xd84315);
const matSky = makeMat(0xbbdefb);
const matKill = makeMat(0xff1744, 0xff1744, 0.5);
const matBounce = makeMat(0x00e676, 0x00e676, 0.3);
const matConveyor = makeMat(0x9e9e9e);
const matCheckpoint = makeMat(0xffd700, 0xffd700, 0.4);
const matPortalEnd = makeMat(0x00e5ff, 0x00e5ff, 0.6);
const matSpinner = makeMat(0xff6f00, 0xff6f00, 0.2);
const matSpeed = makeMat(0x2196f3, 0x2196f3, 0.4);
const matMoving = makeMat(0x7e57c2);
const matDisappearing = makeMat(0xfff176);
const matPlayer = makeMat(0x4fc3f7);
const matPlayerDark = makeMat(0x0288d1);

// Dimension portal material (glowing cyan/purple)
const matDimPortal = new THREE.MeshStandardMaterial({
  color: 0x00e5ff,
  emissive: 0x00e5ff,
  emissiveIntensity: 0.8,
  roughness: 0.2,
  metalness: 0.5,
  transparent: true,
  opacity: 0.85
});

// Reusable geometries
const boxGeo = new THREE.BoxGeometry(1,1,1);
const torusGeo = new THREE.TorusGeometry(2, 0.25, 12, 32);

// ============================================================
// THEMES
// ============================================================
const themes = [
  {bg1:0x87ceeb, bg2:0xe0f7fa, fog:0xb3e5fc, platMat:matGrass, name:'Grasslands'},
  {bg1:0x4a0000, bg2:0x1a0000, fog:0x3e0000, platMat:matLava, name:'Lava Zone'},
  {bg1:0xb3e5fc, bg2:0xffffff, fog:0xe1f5fe, platMat:matSky, name:'Sky Realm'}
];

function getTheme(stageNum){
  if(stageNum<=10) return themes[0];
  if(stageNum<=20) return themes[1];
  return themes[2];
}

// ============================================================
// STAGE GENERATION
// ============================================================
function generateStage(n){
  const elems = [];
  const theme = getTheme(n);
  // Start platform
  elems.push({type:'normal',x:0,y:0,z:0,w:4,h:1,d:4});

  let cx=0, cy=0, cz=0;
  const stageLen = 8 + Math.floor(n * 1.5);
  const diff = Math.min(n/30, 1);

  // Pseudo-random seeded by stage
  let seed = n * 7919;
  function rng(){seed=(seed*16807+0)%2147483647;return(seed&0x7fffffff)/2147483647;}
  function rngRange(a,b){return a+rng()*(b-a);}
  function rngInt(a,b){return Math.floor(rngRange(a,b+1));}
  function pick(arr){return arr[rngInt(0,arr.length-1)];}

  let checkpointCount = 0;
  const maxCheckpoints = n <= 5 ? 1 : (n <= 15 ? 2 : 3);
  const midpoint = Math.floor(stageLen / 2);
  let dimPortalPlaced = false;

  for(let i=0; i<stageLen; i++){
    const isFirstHalf = i < midpoint;

    // Move forward
    const gapX = rngRange(2, 3 + diff*1.5);
    const gapY = rngRange(-1.5, 1.2 + diff*0.8);
    let gapZ;

    if(isFirstHalf){
      // First half (2D mode): platforms mostly along X, minimal Z variance
      gapZ = rngRange(-0.3, 0.3);
    } else {
      // Second half (3D mode): full 3D movement
      gapZ = rngRange(-2, 2);
    }

    cx += gapX;
    cy += gapY;
    cz += gapZ;
    if(cy < -3) cy = -2;
    if(cy > 20 + n) cy = 18 + n;
    if(Math.abs(cz)>15) cz = Math.sign(cz)*10;

    const pw = rngRange(Math.max(2.2, 3-diff*0.5), 4.5 - diff*0.8);
    const pd = rngRange(Math.max(2.2, 3-diff*0.5), 4.5 - diff*0.8);
    const ph = rngRange(0.5, 1);

    // Place dimension portal at midpoint
    if(i === midpoint && !dimPortalPlaced){
      dimPortalPlaced = true;
      elems.push({type:'normal',x:cx,y:cy,z:cz,w:4,h:1,d:4});
      elems.push({type:'dimportal',x:cx,y:cy+2.5,z:cz,w:4,h:4,d:1});
      continue;
    }

    // Decide element type
    let t = 'normal';
    const roll = rng();

    if(i === Math.floor(stageLen * 0.25) && checkpointCount < maxCheckpoints){
      t = 'checkpoint'; checkpointCount++;
    } else if(i === Math.floor(stageLen * 0.75) && checkpointCount < maxCheckpoints){
      t = 'checkpoint'; checkpointCount++;
    } else if(i === stageLen-1){
      t = 'stageportal';
    } else if(n >= 3 && roll < 0.12 * diff){
      t = 'kill';
    } else if(n >= 4 && roll < 0.2 * diff){
      t = 'moving';
    } else if(n >= 6 && roll < 0.28 * diff){
      t = 'disappearing';
    } else if(n >= 2 && roll < 0.35 * diff){
      t = 'bouncy';
    } else if(n >= 8 && roll < 0.42 * diff){
      t = 'conveyor';
    } else if(n >= 10 && roll < 0.48 * diff){
      t = 'spinner';
    } else if(n >= 7 && roll < 0.52 * diff){
      t = 'speed';
    }

    if(t === 'kill'){
      elems.push({type:'kill',x:cx,y:cy-2,z:cz,w:pw+2,h:0.3,d:pd+2});
      elems.push({type:'normal',x:cx,y:cy,z:cz,w:pw,h:ph,d:pd});
    } else if(t === 'spinner'){
      elems.push({type:'normal',x:cx,y:cy,z:cz,w:Math.max(pw,3),h:ph,d:Math.max(pd,3)});
      elems.push({type:'spinner',x:cx,y:cy+1.2,z:cz,w:5,h:0.5,d:0.6,speed:1+diff*2});
    } else if(t === 'conveyor'){
      const dir = pick(['x','z']);
      const spd = pick([-1,1]) * (2+diff*3);
      elems.push({type:'conveyor',x:cx,y:cy,z:cz,w:Math.max(pw,3),h:ph,d:Math.max(pd,3),convDir:dir,convSpeed:spd});
    } else if(t === 'moving'){
      const axis = isFirstHalf ? pick(['x','y']) : pick(['x','y','z']);
      const range = rngRange(2,5);
      elems.push({type:'moving',x:cx,y:cy,z:cz,w:pw,h:ph,d:pd,moveAxis:axis,moveRange:range,moveSpeed:0.5+diff*1.5});
    } else if(t === 'stageportal'){
      elems.push({type:'stageportal',x:cx,y:cy,z:cz,w:3,h:0.5,d:3});
    } else if(t === 'checkpoint'){
      elems.push({type:'checkpoint',x:cx,y:cy,z:cz,w:3,h:0.5,d:3});
    } else {
      elems.push({type:t,x:cx,y:cy,z:cz,w:pw,h:ph,d:pd});
    }

    // Extra hazards for later stages
    if(n >= 15 && rng() < 0.2 * diff && t === 'normal'){
      const side = pick(['left','right']);
      const kx = side==='left' ? cx-pw*0.5-1.5 : cx+pw*0.5+1.5;
      elems.push({type:'kill',x:kx,y:cy,z:cz,w:1.5,h:0.3,d:pd});
    }
  }

  return elems;
}

    this.lArm.scale.set(0.22,0.7,0.22);
    this.lArm.position.set(-0.42,0.05,0);
    this.lArm.castShadow = true;
    this.group.add(this.lArm);
    // Right arm
    this.rArm = new THREE.Mesh(boxGeo, matPlayerDark);
    this.rArm.scale.set(0.22,0.7,0.22);
    this.rArm.position.set(0.42,0.05,0);
    this.rArm.castShadow = true;
    this.group.add(this.rArm);

    this.lLeg = new THREE.Mesh(boxGeo, matPlayerDark);
    this.lLeg.scale.set(0.25,0.7,0.25);
    this.lLeg.position.set(-0.18,-0.65,0);
    this.lLeg.castShadow = true;

    this.rLeg.position.set(0.18,-0.65,0);

    this.group.add(this.rLeg);

    const shadowGeo = new THREE.CircleGeometry(0.4, 16);

    this.shadow.position.y = -0.89;

    this.animTime = 0;
    this.squash = 1;
    this.squashVel = 0;
  }

  animate(dt, moving, sprinting, onGround){
    if(moving){
      const speed = sprinting ? 12 : 8;
      this.animTime += dt * speed;
      const swing = Math.sin(this.animTime) * 0.6;
      this.lArm.rotation.x = swing;
      this.rArm.rotation.x = -swing;
      this.lLeg.rotation.x = -swing;
      this.rLeg.rotation.x = swing;
    } else {
      this.animTime = 0;
      this.lArm.rotation.x *= 0.85;
      this.rArm.rotation.x *= 0.85;
      this.lLeg.rotation.x *= 0.85;
      this.rLeg.rotation.x *= 0.85;
    }
    this.squashVel += (1 - this.squash) * 15 * dt;
    this.squashVel *= 0.85;
    this.squash += this.squashVel;
    const sy = this.squash;
    const sx = 1 + (1-sy)*0.5;
    this.group.scale.set(sx, sy, sx);
  }

  doSquash(amount){
    this.squash = amount;
  }
}

const particles = [];
function spawnParticles(pos, color, count=15){
  for(let i=0;i<count;i++){
    const m = new THREE.Mesh(boxGeo, new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.3}));
    const s = 0.1+Math.random()*0.15;
    m.scale.set(s,s,s);
    m.position.copy(pos);
    scene.add(m);
    particles.push({
      mesh:m,
      vx:(Math.random()-0.5)*12,
      vy:5+Math.random()*10,
      vz:(Math.random()-0.5)*12,
      life:1
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vy -= 20*dt;
    p.mesh.position.x += p.vx*dt;
    p.mesh.position.y += p.vy*dt;
    p.mesh.position.z += p.vz*dt;
    p.mesh.rotation.x += dt*5;
    p.mesh.rotation.z += dt*3;
    p.life -= dt*1.5;
    p.mesh.material.opacity = Math.max(0,p.life);
    p.mesh.material.transparent = true;
    if(p.life<=0){
      scene.remove(p.mesh);
      p.mesh.geometry = undefined;
      particles.splice(i,1);
    }
  }
}

  for(let i=0;i<20;i++){

      const m = new THREE.Mesh(boxGeo, cloudMat);

      m.scale.set(s*2, s*0.6, s*1.5);
      m.position.set((Math.random()-0.5)*3, (Math.random()-0.5)*0.5, (Math.random()-0.5)*2);
      g.add(m);
    }
    g.position.set(
      (Math.random()-0.5)*200,
      30+Math.random()*40,
      (Math.random()-0.5)*200
    );
    g.userData.speed = 0.5+Math.random()*1.5;
    scene.add(g);
    clouds.push(g);
  }
}

  clouds.forEach(c=>{

    if(c.position.x > 120) c.position.x = -120;
  });
}

const joystickZone = document.getElementById('joystick-zone');
const joystickBase = document.getElementById('joystick-base');
const joystickThumb = document.getElementById('joystick-thumb');
let joystickTouchId = null;
let jBaseX=0, jBaseY=0;

joystickZone.addEventListener('touchstart', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(!joystickTouchId){
      joystickTouchId = t.identifier;
      const r = joystickBase.getBoundingClientRect();
      jBaseX = r.left + r.width/2;
      jBaseY = r.top + r.height/2;
      updateJoystick(t.clientX, t.clientY);
    }
  }
},{passive:false});
joystickZone.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === joystickTouchId){
      updateJoystick(t.clientX, t.clientY);
    }
  }
},{passive:false});
joystickZone.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){
    if(t.identifier === joystickTouchId){
      joystickTouchId = null;
      joystickX = 0; joystickY = 0;
      joystickThumb.style.transform = 'translate(-50%,-50%)';
    }
  }
});

function updateJoystick(tx, ty){
  let dx = tx - jBaseX;
  let dy = ty - jBaseY;
  const maxR = 45;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
  joystickX = dx/maxR;
  joystickY = -dy/maxR;
  joystickThumb.style.transform = `translate(${-50+dx/45*50}%, ${-50-dy/45*50}%)`;
}

// ============================================================
// STAGE BUILDING
// ============================================================
function clearStage(){
  while(stageGroup.children.length) stageGroup.remove(stageGroup.children[0]);
  platforms = [];
  checkpointRings.length = 0;
  dimPortalMesh = null;
  dimPortalPosition = null;
  dimPortalGlowMeshes = [];
}

function buildStage(stageNum){
  clearStage();
  const elems = generateStage(stageNum);
  const theme = getTheme(stageNum);

  // Set sky
  scene.background = new THREE.Color(theme.bg1);
  scene.fog = new THREE.Fog(theme.fog, 40, 150);

  // Adjust lighting per theme
  if(stageNum <= 10){
    ambLight.intensity = 0.5;
    dirLight.intensity = 1.0;
    dirLight.color.set(0xffffff);
  } else if(stageNum <= 20){
    ambLight.intensity = 0.3;
    dirLight.intensity = 0.8;
    dirLight.color.set(0xff8a65);
  } else {
    ambLight.intensity = 0.6;
    dirLight.intensity = 1.2;
    dirLight.color.set(0xe1f5fe);
  }

  elems.forEach(el=>{
    if(el.type === 'dimportal'){
      // Create the dimension-shift portal: a glowing torus ring
      const torus = new THREE.Mesh(torusGeo, matDimPortal);
      torus.position.set(el.x, el.y, el.z);
      torus.rotation.y = Math.PI/2;
      torus.castShadow = false;
      stageGroup.add(torus);
      dimPortalMesh = torus;
      dimPortalPosition = {x:el.x, y:el.y, z:el.z};

      // Inner glow disc
      const glowGeo = new THREE.CircleGeometry(1.7, 32);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x00e5ff,
        transparent: true,
        opacity: 0.12,
        side: THREE.DoubleSide
      });
      const glowDisc = new THREE.Mesh(glowGeo, glowMat);
      glowDisc.position.set(el.x, el.y, el.z);
      glowDisc.rotation.y = Math.PI/2;
      stageGroup.add(glowDisc);
      dimPortalGlowMeshes.push(glowDisc);

      // Outer glow ring
      const outerRingGeo = new THREE.TorusGeometry(2.3, 0.08, 8, 32);
      const outerRingMat = new THREE.MeshBasicMaterial({
        color: 0xb388ff,
        transparent: true,
        opacity: 0.5
      });
      const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
      outerRing.position.set(el.x, el.y, el.z);
      outerRing.rotation.y = Math.PI/2;
      stageGroup.add(outerRing);
      dimPortalGlowMeshes.push(outerRing);

      // Decorative pillars flanking the portal
      const pillarMat = new THREE.MeshBasicMaterial({color:0x00e5ff, transparent:true, opacity:0.4});
      const pillar = new THREE.Mesh(boxGeo, pillarMat);
      pillar.scale.set(0.15, 5, 0.15);
      pillar.position.set(el.x, el.y, el.z - 2.5);
      stageGroup.add(pillar);
      const pillar2 = new THREE.Mesh(boxGeo, pillarMat);
      pillar2.scale.set(0.15, 5, 0.15);
      pillar2.position.set(el.x, el.y, el.z + 2.5);
      stageGroup.add(pillar2);

      platforms.push({
        mesh: torus,
        type: 'dimportal',
        data: el,
        origX: el.x,
        origY: el.y,
        origZ: el.z,
        time: 0,
        visible: true,
        disappearTimer: 0,
      });
      return;
    }

    let mat;
    switch(el.type){
      case 'kill': mat=matKill; break;
      case 'bouncy': mat=matBounce; break;
      case 'conveyor': mat=matConveyor; break;
      case 'checkpoint': mat=matCheckpoint; break;
      case 'stageportal': mat=matPortalEnd; break;
      case 'spinner': mat=matSpinner; break;
      case 'speed': mat=matSpeed; break;
      case 'moving': mat=matMoving; break;
      case 'disappearing': mat=matDisappearing; break;
      default: mat=theme.platMat;
    }

    const mesh = new THREE.Mesh(boxGeo, mat);
    mesh.scale.set(el.w, el.h, el.d);
    mesh.position.set(el.x, el.y - el.h/2, el.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    stageGroup.add(mesh);

    // Grid lines
    if(el.type === 'normal' || el.type === 'moving' || el.type === 'disappearing'){
      const edges = new THREE.EdgesGeometry(boxGeo);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000, transparent:true, opacity:0.1}));
      line.scale.copy(mesh.scale);
      line.position.copy(mesh.position);
      stageGroup.add(line);
    }

    // Checkpoint glow ring
    if(el.type === 'checkpoint'){
      const ringGeo = new THREE.RingGeometry(1.2, 1.5, 24);
      const ringMat = new THREE.MeshBasicMaterial({color:0xffd700, transparent:true, opacity:0.5, side:THREE.DoubleSide});
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.position.set(el.x, el.y+1, el.z);
      ring.rotation.x = -Math.PI/2;
      stageGroup.add(ring);
      checkpointRings.push(ring);
    }

    // Stage end portal glow
    if(el.type === 'stageportal'){
      const portalGlow = new THREE.Mesh(
        new THREE.CylinderGeometry(1.2,1.2,3,16,1,true),
        new THREE.MeshBasicMaterial({color:0x00e5ff, transparent:true, opacity:0.15, side:THREE.DoubleSide})
      );
      portalGlow.position.set(el.x, el.y+1, el.z);
      stageGroup.add(portalGlow);
    }

    platforms.push({
      mesh,
      type: el.type,
      data: el,
      origX: el.x,
      origY: el.y,
      origZ: el.z,
      time: Math.random()*10,
      visible: true,
      disappearTimer: 0,
    });
  });
}

function startStage(n){
  currentStage = n;
  deaths = 0;
  timer = 0;
  timerRunning = true;
  gameActive = true;
  inMenu = false;
  hudEl.style.display = 'block';
  if(!isMobile){ const cp=document.getElementById('click-prompt'); cp.style.display='block'; cp.style.opacity='1'; cp.style.transition='none'; setTimeout(()=>{cp.style.transition='opacity 1s';cp.style.opacity='0';setTimeout(()=>{cp.style.display='none';},1000);},5000); }

  buildStage(n);
  createClouds();

  // Reset player
  player.x = 0; player.y = 2; player.z = 0;
  player.vx = 0; player.vy = 0; player.vz = 0;
  player.onGround = false;
  player.checkpoint = {x:0, y:2, z:0};
  player.dashCooldown = 0;
  player.dashTimer = 0;
  player.speedBoostTimer = 0;
  player.usedDoubleJump = false;
  player.canDoubleJump = currentStage >= 5;

  // Reset camera mode to 2D
  cameraMode = '2d';
  cameraTransition = 0;
  dimensionShiftTriggered = false;
  camYaw = 0;
  camPitch = -0.3;

  updateModeIndicator();
  updateHUD();
  startMusic();
}

function completeStage(){
  sfxStageComplete();
  timerRunning = false;

  if(currentStage >= saveData.highestStage){
    saveData.highestStage = Math.min(currentStage+1, 30);
  }
  const key = 'stage'+currentStage;
  if(!saveData.bestTimes[key] || timer < saveData.bestTimes[key]){
    saveData.bestTimes[key] = timer;
  }
  saveData.totalDeaths = (saveData.totalDeaths||0)+deaths;
  writeSave();

  if(currentStage < 30){
    showCheckpointMsg('STAGE COMPLETE!');
    setTimeout(()=>startStage(currentStage+1), 1500);
  } else {
    showCheckpointMsg('YOU WIN! ALL 30 STAGES COMPLETE!');
    setTimeout(()=>{
      gameActive = false;
      hudEl.style.display='none';
      menuScreen.style.display='flex';
      inMenu=true;
      stopMusic();
    }, 3000);
  }
}

// ============================================================
// DIMENSION SHIFT
// ============================================================
function triggerDimensionShift(){
  if(dimensionShiftTriggered) return;
  dimensionShiftTriggered = true;

  sfxDimensionShift();

  // White flash
  const flash = document.getElementById('dimension-flash');
  flash.style.transition = 'none';
  flash.style.opacity = '0.8';
  setTimeout(()=>{
    flash.style.transition = 'opacity 0.3s';
    flash.style.opacity = '0';
  }, 200);

  // "DIMENSION SHIFT!" text
  const msg = document.getElementById('dimension-msg');
  msg.style.transition = 'none';
  msg.style.opacity = '1';
  setTimeout(()=>{
    msg.style.transition = 'opacity 1s';
    msg.style.opacity = '0';
  }, 800);

  // Spawn particles at portal
  if(dimPortalPosition){
    spawnParticles(new THREE.Vector3(dimPortalPosition.x, dimPortalPosition.y, dimPortalPosition.z), 0x00e5ff, 30);
    spawnParticles(new THREE.Vector3(dimPortalPosition.x, dimPortalPosition.y, dimPortalPosition.z), 0xb388ff, 20);
  }

  // Start camera transition
  cameraMode = '3d';
  cameraTransition = CAMERA_TRANSITION_DURATION;
  camYaw = 0;
  camPitch = -0.3;

  updateModeIndicator();
}

function updateModeIndicator(){
  const el = document.getElementById('mode-indicator');
  if(cameraMode === '2d'){
    el.textContent = '2D MODE';
    el.style.color = '#80deea';
  } else {
    el.textContent = '3D MODE';
    el.style.color = '#00e5ff';
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function getInput(){
  let mx=0, mz=0;
  let wantJump=false, wantSprint=false, wantDash=false;

  if(isMobile){
    mx = joystickX;
    mz = joystickY;
    wantJump = mobileJump;
    wantSprint = mobileSprint;
    wantDash = mobileDash;
  } else {
    if(keys['KeyW']||keys['ArrowUp']) mz=1;
    if(keys['KeyS']||keys['ArrowDown']) mz=-1;
    if(keys['KeyA']||keys['ArrowLeft']) mx=-1;
    if(keys['KeyD']||keys['ArrowRight']) mx=1;
    wantJump = !!keys['Space'];
    wantSprint = !!keys['ShiftLeft']||!!keys['ShiftRight'];
    wantDash = !!keys['KeyE'];
    if(keys['KeyR']) restartFromCheckpoint();
  }

  return {mx, mz, wantJump, wantSprint, wantDash};
}

function restartFromCheckpoint(){
  player.x = player.checkpoint.x;
  player.y = player.checkpoint.y;
  player.z = player.checkpoint.z;
  player.vx = 0; player.vy = 0; player.vz = 0;
  player.onGround = false;
  player.dashTimer = 0;
  player.usedDoubleJump = false;
}

function killPlayer(){
  deaths++;
  sfxDeath();
  spawnParticles(new THREE.Vector3(player.x, player.y, player.z), 0x4fc3f7, 20);
  cameraShake = 0.3;

  const overlay = document.getElementById('death-overlay');
  overlay.style.opacity = '1';
  setTimeout(()=>overlay.style.opacity='0', 200);

  restartFromCheckpoint();
  updateHUD();
}

function showCheckpointMsg(text){
  const el = document.getElementById('checkpoint-msg');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(()=>el.style.opacity='0', 1500);
}

let prevDashInput = false;

function updatePlayer(dt){
  if(!gameActive) return;

  const input = getInput();

  let moveX, moveZ;

  if(cameraMode === '2d' && cameraTransition <= 0){
    // 2D mode: left/right moves along X axis (the stage axis)
    // In side-view, the camera looks from +Z, so:
    //   D/right = +X (forward along stage), A/left = -X
    //   W/up and S/down also map to X for forward/back movement
    moveX = input.mx + input.mz;
    moveZ = 0; // Lock Z movement in 2D mode
    if(Math.abs(moveX) > 1) moveX = Math.sign(moveX);

    player.moving = Math.abs(moveX) > 0.1;
    player.sprinting = input.wantSprint && player.moving;
  } else {
    // 3D mode: camera-relative movement (standard obby3d)
    const forward = new THREE.Vector3(Math.sin(camYaw), 0, Math.cos(camYaw));
    const right = new THREE.Vector3(-forward.z, 0, forward.x);

    moveX = right.x * input.mx + forward.x * input.mz;
    moveZ = right.z * input.mx + forward.z * input.mz;
    const moveMag = Math.sqrt(moveX*moveX + moveZ*moveZ);
    if(moveMag > 1){moveX/=moveMag; moveZ/=moveMag;}

    player.moving = moveMag > 0.1;
    player.sprinting = input.wantSprint && player.moving;
  }

  // Speed
  let speed = WALK_SPEED;
  if(player.sprinting) speed *= SPRINT_MULT;
  if(player.speedBoostTimer > 0) speed *= 1.8;

  // Dash
  player.dashCooldown = Math.max(0, player.dashCooldown - dt);
  const moveMag2d = Math.sqrt(moveX*moveX + moveZ*moveZ);
  if(input.wantDash && !prevDashInput && player.dashCooldown <= 0 && moveMag2d > 0.1){
    player.dashTimer = DASH_DURATION;
    player.dashCooldown = DASH_COOLDOWN;
    player.dashDirX = moveX / (moveMag2d||1);
    player.dashDirZ = moveZ / (moveMag2d||1);
    sfxDash();
  }
  prevDashInput = input.wantDash;

  if(player.dashTimer > 0){
    player.dashTimer -= dt;
    player.vx = player.dashDirX * DASH_SPEED;
    player.vz = player.dashDirZ * DASH_SPEED;
  } else {
    const accel = player.onGround ? 30 : 15;
    const targetVx = moveX * speed;
    const targetVz = moveZ * speed;
    player.vx += (targetVx - player.vx) * Math.min(1, accel * dt);
    player.vz += (targetVz - player.vz) * Math.min(1, accel * dt);
  }

  // Gravity
  player.vy += GRAVITY * dt;

  // Jump
  if(player.onGround) player.coyoteTimer = COYOTE_TIME;
  else player.coyoteTimer = Math.max(0, player.coyoteTimer - dt);

  if(input.wantJump) player.jumpBufferTimer = JUMP_BUFFER;
  else player.jumpBufferTimer = Math.max(0, player.jumpBufferTimer - dt);

  const freshJumpPress = input.wantJump && !player._prevJumpInput;
  player._prevJumpInput = input.wantJump;

  if(player.jumpBufferTimer > 0 && player.coyoteTimer > 0){
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.coyoteTimer = 0;
    player.jumpBufferTimer = 0;
    player.isHoldingJump = true;
    player.jumpHoldTimer = 0;
    player.usedDoubleJump = false;
    sfxJump();
    playerModel.doSquash(1.2);
  }
  else if(freshJumpPress && !player.onGround && player.canDoubleJump && !player.usedDoubleJump && player.coyoteTimer <= 0){
    player.vy = DOUBLE_JUMP_VEL;
    player.usedDoubleJump = true;
    player.jumpBufferTimer = 0;
    player.isHoldingJump = true;
    player.jumpHoldTimer = 0;
    sfxJump();
    playerModel.doSquash(1.15);
  }

  // Variable jump height
  if(player.isHoldingJump && input.wantJump){
    player.jumpHoldTimer += dt;
    if(player.jumpHoldTimer < JUMP_HOLD_TIME){
      player.vy += JUMP_HOLD_EXTRA * dt / JUMP_HOLD_TIME;
    }
  }
  if(!input.wantJump) player.isHoldingJump = false;

  // Speed boost timer
  player.speedBoostTimer = Math.max(0, player.speedBoostTimer - dt);

  // Move
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  player.z += player.vz * dt;

  // Collision
  player.onGround = false;
  const pw = PLAYER_W/2, ph = PLAYER_H/2, pd = PLAYER_D/2;

  for(const plat of platforms){
    if(!plat.visible) continue;

    // Dimension portal uses proximity check, not AABB
    if(plat.type === 'dimportal'){
      if(dimensionShiftTriggered) continue;
      const dp = dimPortalPosition;
      if(dp){
        const dx = Math.abs(player.x - dp.x);
        const dy = Math.abs(player.y - dp.y);
        const dz = Math.abs(player.z - dp.z);
        if(dx < 1.5 && dy < 2.5 && dz < 2.5){
          triggerDimensionShift();
        }
      }
      continue;
    }

    const m = plat.mesh;
    const sx = m.scale.x/2, sy = m.scale.y/2, sz = m.scale.z/2;
    const px = m.position.x, py = m.position.y, pz = m.position.z;

    const overlapX = (pw+sx) - Math.abs(player.x - px);
    const overlapY = (ph+sy) - Math.abs(player.y - py);
    const overlapZ = (pd+sz) - Math.abs(player.z - pz);

    if(overlapX > 0 && overlapY > 0 && overlapZ > 0){
      if(plat.type === 'kill'){
        killPlayer();
        return;
      }
      if(plat.type === 'stageportal'){
        completeStage();
        return;
      }
      if(plat.type === 'checkpoint'){
        if(player.checkpoint.x !== plat.origX || player.checkpoint.z !== plat.origZ){
          player.checkpoint = {x:plat.origX, y:plat.origY+1.5, z:plat.origZ};
          sfxCheckpoint();
          showCheckpointMsg('CHECKPOINT!');
        }
      }
      if(plat.type === 'bouncy'){
        if(player.y > py && player.vy < 0){
          player.vy = 22;
          sfxBounce();
          playerModel.doSquash(0.6);
          continue;
        }
      }
      if(plat.type === 'speed'){
        if(player.speedBoostTimer <= 0) sfxSpeed();
        player.speedBoostTimer = 2;
      }

      // Resolve collision
      if(overlapX < overlapY && overlapX < overlapZ){
        const sign = Math.sign(player.x - px);
        player.x = px + sign * (pw+sx);
        player.vx = 0;
      } else if(overlapY < overlapZ){
        const sign = Math.sign(player.y - py);
        player.y = py + sign * (ph+sy);
        if(sign > 0){
          player.onGround = true;
          if(player.vy < -5){
            sfxLand();
            playerModel.doSquash(0.75);
          }
          player.vy = 0;
          player.usedDoubleJump = false;

          if(plat.type === 'moving' && plat._lastDx !== undefined){
            player.x += plat._lastDx;
            player.y += plat._lastDy;
            player.z += plat._lastDz;
          }
          if(plat.type === 'conveyor'){
            const cs = plat.data.convSpeed * dt;
            if(plat.data.convDir === 'x') player.x += cs;
            else player.z += cs;
          }
        } else {
          player.vy = 0;
        }
      } else {
        const sign = Math.sign(player.z - pz);
        player.z = pz + sign * (pd+sz);
        player.vz = 0;
      }
    }
  }

  // Kill plane
  if(player.y < KILL_Y){
    killPlayer();
  }
}

function updatePlatforms(dt){
  for(const plat of platforms){
    plat.time += dt;

    if(plat.type === 'moving'){
      const d = plat.data;
      const prevX = plat.mesh.position.x;
      const prevY = plat.mesh.position.y;
      const prevZ = plat.mesh.position.z;

      const offset = Math.sin(plat.time * d.moveSpeed) * d.moveRange;
      if(d.moveAxis === 'x') plat.mesh.position.x = plat.origX + offset;
      else if(d.moveAxis === 'y') plat.mesh.position.y = plat.origY - d.h/2 + offset;
      else plat.mesh.position.z = plat.origZ + offset;

      plat._lastDx = plat.mesh.position.x - prevX;
      plat._lastDy = plat.mesh.position.y - prevY;
      plat._lastDz = plat.mesh.position.z - prevZ;
    }

    if(plat.type === 'disappearing'){
      const cycle = plat.time % 4;
      if(cycle > 2.5 && cycle < 3.8){
        plat.visible = false;
        plat.mesh.visible = false;
      } else if(cycle > 2 && cycle < 2.5){
        plat.mesh.visible = Math.sin(plat.time * 20) > 0;
        plat.visible = plat.mesh.visible;
      } else {
        plat.visible = true;
        plat.mesh.visible = true;
      }
    }

    if(plat.type === 'spinner'){
      plat.mesh.rotation.y += (plat.data.speed || 2) * dt;
    }

    // Stage end portal bob
    if(plat.type === 'stageportal'){
      plat.mesh.position.y = plat.origY - plat.data.h/2 + Math.sin(plat.time*2)*0.2;
    }

    // Dimension portal animation
    if(plat.type === 'dimportal' && dimPortalMesh){
      dimPortalMesh.rotation.x += dt * 0.5;
      dimPortalMesh.rotation.z += dt * 0.3;
      dimPortalMesh.position.y = plat.origY + Math.sin(plat.time * 1.5) * 0.3;

      dimPortalGlowMeshes.forEach((g, idx) => {
        g.position.y = dimPortalMesh.position.y;
        if(idx === 0){
          g.material.opacity = 0.08 + Math.sin(plat.time * 3) * 0.06;
        } else {
          g.rotation.x = dimPortalMesh.rotation.x * -0.5;
          g.rotation.z = plat.time * 0.7;
        }
      });

      // Ambient particles near portal
      dimPortalParticleTimer += dt;
      if(dimPortalParticleTimer > 0.3 && !dimensionShiftTriggered){
        dimPortalParticleTimer = 0;
        const pp = dimPortalMesh.position;
        const pPos = new THREE.Vector3(
          pp.x + (Math.random()-0.5)*3,
          pp.y + (Math.random()-0.5)*3,
          pp.z + (Math.random()-0.5)*1
        );
        spawnParticles(pPos, Math.random() > 0.5 ? 0x00e5ff : 0xb388ff, 1);
      }
    }
  }

  // Checkpoint ring animation
  checkpointRings.forEach(ring=>{
    ring.rotation.z += dt;
    ring.position.y += Math.sin(Date.now()*0.003)*0.001;
  });
}

function updateCamera(dt){
  const targetX = player.x;
  const targetY = player.y;
  const targetZ = player.z;

  // Handle camera transition timer
  if(cameraTransition > 0){
    cameraTransition -= dt;
    if(cameraTransition < 0) cameraTransition = 0;
  }

  const transitionProgress = cameraTransition > 0 ? (1 - cameraTransition / CAMERA_TRANSITION_DURATION) : 1;

  if(cameraMode === '2d' && cameraTransition <= 0){
    // ---- 2D SIDE-VIEW CAMERA ----
    const desiredX = targetX;
    const desiredY = targetY + 2;
    const desiredZ = targetZ + 12;

    camPos.x += (desiredX - camPos.x) * CAM_LERP * 60 * dt;
    camPos.y += (desiredY - camPos.y) * CAM_LERP * 60 * dt;
    camPos.z += (desiredZ - camPos.z) * CAM_LERP * 60 * dt;

    let shakeX=0, shakeY=0;
    if(cameraShake > 0){
      cameraShake -= dt;
      shakeX = (Math.random()-0.5)*cameraShake*2;
      shakeY = (Math.random()-0.5)*cameraShake*2;
    }

    camera.position.set(camPos.x+shakeX, camPos.y+shakeY, camPos.z);
    camera.lookAt(targetX, targetY+0.5, targetZ);

  } else if(cameraMode === '3d' && cameraTransition > 0){
    // ---- TRANSITIONING from 2D to 3D ----
    const side2dX = targetX;
    const side2dY = targetY + 2;
    const side2dZ = targetZ + 12;

    const dist = CAM_DIST + camZoom;
    const offX3d = -Math.sin(camYaw) * Math.cos(camPitch) * dist;
    const offY3d = -Math.sin(camPitch) * dist + CAM_HEIGHT;
    const offZ3d = -Math.cos(camYaw) * Math.cos(camPitch) * dist;
    const desired3dX = targetX + offX3d;
    const desired3dY = targetY + offY3d;
    const desired3dZ = targetZ + offZ3d;

    const t = transitionProgress;
    const smoothT = t * t * (3 - 2*t); // Smoothstep

    const blendedX = side2dX + (desired3dX - side2dX) * smoothT;
    const blendedY = side2dY + (desired3dY - side2dY) * smoothT;
    const blendedZ = side2dZ + (desired3dZ - side2dZ) * smoothT;

    camPos.x += (blendedX - camPos.x) * 0.15 * 60 * dt;
    camPos.y += (blendedY - camPos.y) * 0.15 * 60 * dt;
    camPos.z += (blendedZ - camPos.z) * 0.15 * 60 * dt;

    let shakeX=0, shakeY=0;
    if(cameraShake > 0){
      cameraShake -= dt;
      shakeX = (Math.random()-0.5)*cameraShake*2;
      shakeY = (Math.random()-0.5)*cameraShake*2;
    }

    camera.position.set(camPos.x+shakeX, camPos.y+shakeY, camPos.z);
    camera.lookAt(targetX, targetY+0.5, targetZ);

  } else {
    // ---- FULL 3D MODE ----
    if(player.moving && !mouseDown && !touchLookId){
      const moveAngle = Math.atan2(player.vx, player.vz);
      let diff = moveAngle - camYaw;
      while(diff > Math.PI) diff -= Math.PI*2;
      while(diff < -Math.PI) diff += Math.PI*2;
      camYaw += diff * 1.5 * dt;
    }

    const dist = CAM_DIST + camZoom;
    const offX = -Math.sin(camYaw) * Math.cos(camPitch) * dist;
    const offY = -Math.sin(camPitch) * dist + CAM_HEIGHT;
    const offZ = -Math.cos(camYaw) * Math.cos(camPitch) * dist;

    const desiredX = targetX + offX;
    const desiredY = targetY + offY;
    const desiredZ = targetZ + offZ;

    camPos.x += (desiredX - camPos.x) * CAM_LERP * 60 * dt;
    camPos.y += (desiredY - camPos.y) * CAM_LERP * 60 * dt;
    camPos.z += (desiredZ - camPos.z) * CAM_LERP * 60 * dt;

    let shakeX=0, shakeY=0;
    if(cameraShake > 0){
      cameraShake -= dt;
      shakeX = (Math.random()-0.5)*cameraShake*2;
      shakeY = (Math.random()-0.5)*cameraShake*2;
    }

    camera.position.set(camPos.x+shakeX, camPos.y+shakeY, camPos.z);
    camera.lookAt(targetX, targetY+0.5, targetZ);
  }

  // Update directional light to follow player
  dirLight.position.set(player.x+30, player.y+50, player.z+20);
  dirLight.target.position.set(player.x, player.y, player.z);
  dirLight.target.updateMatrixWorld();
}

function updateHUD(){
  document.getElementById('hud-stage').textContent = `Stage ${currentStage} / 30`;
  document.getElementById('hud-deaths').textContent = `Deaths: ${deaths}`;
  const dashPct = Math.max(0, 1 - player.dashCooldown / DASH_COOLDOWN) * 100;
  document.getElementById('dash-bar').style.width = dashPct + '%';
}

function updateTimer(dt){
  if(timerRunning) timer += dt;
  const mins = Math.floor(timer/60);
  const secs = Math.floor(timer%60);
  const tenths = Math.floor((timer*10)%10);
  document.getElementById('hud-timer').textContent = `${mins}:${secs.toString().padStart(2,'0')}.${tenths}`;
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(t){
  requestAnimationFrame(gameLoop);
  const now = t/1000;
  let dt = now - lastTime;
  lastTime = now;
  if(dt > 0.1) dt = 0.016;
  if(dt <= 0) dt = 0.016;

  if(gameActive){
    updatePlayer(dt);
    updatePlatforms(dt);
    updateCamera(dt);
    updateTimer(dt);
    updateHUD();
    updateParticles(dt);
    updateClouds(dt);

    // Update player model
    playerModel.group.position.set(player.x, player.y - PLAYER_H/2 + 0.9, player.z);

    // Face movement direction
    if(player.moving){
      if(cameraMode === '2d' && cameraTransition <= 0){
        // In 2D mode, face left or right along X
        if(player.vx > 0.1) playerModel.group.rotation.y = Math.PI/2;
        else if(player.vx < -0.1) playerModel.group.rotation.y = -Math.PI/2;
      } else {
        const angle = Math.atan2(player.vx, player.vz);
        playerModel.group.rotation.y = angle;
      }
    }
    playerModel.animate(dt, player.moving, player.sprinting, player.onGround);
  }

  renderer.render(scene, camera);
}

requestAnimationFrame(gameLoop);

// ============================================================
// INITIAL STATE
// ============================================================
menuScreen.style.display = 'flex';
</script>
