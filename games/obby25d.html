<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OBBY 2.5D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f10;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
#home{position:fixed;top:12px;left:12px;color:#888;text-decoration:none;font-size:14px;z-index:20;padding:6px 10px;background:rgba(0,0,0,.5);border-radius:6px}
#home:hover{color:#fff}
</style>
</head>
<body>
<a id="home" href="../index.html">&#8592; Home</a>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c'), X = C.getContext('2d');
let W, H;
function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
resize(); addEventListener('resize', resize);

const GRAV = 0.52, JUMP_V = -11.2, PSPD = 4.2, STAGES = 20;
const NEON = ['#00ff88','#00ccff','#ff6600','#cc44ff','#ffcc00','#ff3366'];
const PLAT_C = ['#00ff88','#00ccff','#ff8800','#aa55ff','#44ffbb','#ff4488'];

let state = 'title', stage = 0, deaths = 0, timer = 0, tStart = 0;
let player, plats, portalPos, cam, is3D = false, portalHit = false;
let flashA = 0, shiftTextA = 0, shiftLabel = '';
let jumpHeld = false;

// ---- Input ----
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
addEventListener('keyup', e => { keys[e.code] = false; });

let tDir = 0, tJump = false;
C.addEventListener('touchstart', e => { e.preventDefault(); tch(e.touches); }, { passive: false });
C.addEventListener('touchmove', e => { e.preventDefault(); tch(e.touches); }, { passive: false });
C.addEventListener('touchend', e => { e.preventDefault(); if (!e.touches.length) { tDir = 0; tJump = false; } else tch(e.touches); }, { passive: false });
function tch(ts) {
  tDir = 0; tJump = false;
  for (let i = 0; i < ts.length; i++) {
    if (ts[i].clientX < W / 2) {
      tDir = ts[i].clientX < W / 4 ? -1 : 1;
    } else { tJump = true; }
  }
}
function inL() { return keys.ArrowLeft || keys.KeyA || tDir < 0; }
function inR() { return keys.ArrowRight || keys.KeyD || tDir > 0; }
function inJ() { return keys.Space || keys.ArrowUp || keys.KeyW || tJump; }
function anyKey() {
  for (let k in keys) if (keys[k]) return true;
  return tJump || tDir !== 0;
}

// ---- Stage Gen ----
function genStage(idx) {
  const diff = idx / STAGES;
  const gap = 75 + diff * 45;
  const mChance = 0.08 + diff * 0.38;
  const c1 = PLAT_C[idx % PLAT_C.length];
  const c2 = PLAT_C[(idx + 3) % PLAT_C.length];
  const ps = [];
  let seed = idx * 7 + 13;
  function rng() { seed = (seed * 16807 + 11) % 2147483647; return (seed & 0x7fffffff) / 0x7fffffff; }

  // 2D section
  let px = 50, py = 380;
  for (let i = 0; i < 10; i++) {
    const pw = 80 + rng() * 50;
    const mv = i > 1 && rng() < mChance;
    ps.push({
      x: px, y: py, w: pw, h: 14,
      bx: px, by: py,
      mv, mvA: mv ? 30 + rng() * 40 : 0,
      mvS: mv ? 0.6 + rng() * 0.9 : 0,
      mvD: mv ? (rng() < 0.5 ? 'x' : 'y') : 'x',
      mvP: rng() * 6.28, col: c1, sec: '2d'
    });
    px += pw + gap + rng() * 35;
    py += rng() * 80 - 40;
    py = Math.max(220, Math.min(500, py));
  }

  // Portal after last 2D platform
  const lp = ps[9];
  const portalX = lp.x + lp.w + gap * 0.6;
  const portalY = lp.y - 55;

  // 3D section
  let pz = 0.06, p3x = 0;
  for (let i = 0; i < 10; i++) {
    const pw = 100 + rng() * 50;
    const mv = i > 1 && rng() < mChance;
    ps.push({
      x: p3x, z: pz, w: pw, h: 14,
      bx: p3x, bz: pz,
      mv, mvA: mv ? 25 + rng() * 40 : 0,
      mvS: mv ? 0.5 + rng() * 0.8 : 0,
      mvP: rng() * 6.28, col: c2, sec: '3d'
    });
    p3x += (rng() - 0.5) * 130;
    p3x = Math.max(-220, Math.min(220, p3x));
    pz += 0.08 + diff * 0.025 + rng() * 0.035;
  }

  return { ps, portal: { x: portalX, y: portalY } };
}

function loadStage(idx) {
  const s = genStage(idx);
  plats = s.ps;
  portalPos = s.portal;
  is3D = false; portalHit = false;
  cam = { x: 0, y: 0 };
  const fp = plats[0];
  player = { x: fp.x + 20, y: fp.y - 30, vx: 0, vy: 0, w: 22, h: 26, gnd: false, z: 0, sec: '2d' };
}

function startGame() {
  state = 'play'; stage = 0; deaths = 0;
  tStart = performance.now(); timer = 0;
  loadStage(0);
}

// ---- Physics / Update ----
function update(dt) {
  if (state !== 'play') return;
  timer = (performance.now() - tStart) / 1000;
  const t = performance.now() / 1000;

  // Animate moving platforms
  for (const p of plats) {
    if (!p.mv) continue;
    const wave = Math.sin(t * p.mvS * 4 + p.mvP) * p.mvA;
    if (p.sec === '2d') {
      if (p.mvD === 'x') p.x = p.bx + wave; else p.y = p.by + wave;
    } else {
      p.x = p.bx + wave;
    }
  }

  if (!is3D) {
    // ---- 2D physics ----
    player.vx = 0;
    if (inL()) player.vx = -PSPD;
    if (inR()) player.vx = PSPD;
    if (inJ() && player.gnd && !jumpHeld) { player.vy = JUMP_V; player.gnd = false; jumpHeld = true; }
    if (!inJ()) jumpHeld = false;

    player.vy += GRAV;
    if (player.vy > 16) player.vy = 16;
    player.x += player.vx;
    player.y += player.vy;

    player.gnd = false;
    for (const p of plats) {
      if (p.sec !== '2d') continue;
      if (player.x + player.w > p.x && player.x < p.x + p.w) {
        if (player.vy >= 0 && player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy + 4) {
          player.y = p.y - player.h;
          player.vy = 0; player.gnd = true;
        }
      }
    }

    cam.x += (player.x - W / 3 - cam.x) * 0.1;
    cam.y += (player.y - H / 2 - cam.y) * 0.06;

    // Portal check
    const pp = portalPos;
    if (!portalHit && player.x + player.w > pp.x && player.x < pp.x + 50 && player.y + player.h > pp.y && player.y < pp.y + 80) {
      doShift();
    }
    // Fall death
    if (player.y > cam.y + H + 150) die();
  } else {
    // ---- 3D physics ----
    player.vx = 0;
    if (inL()) player.vx = -PSPD * 0.65;
    if (inR()) player.vx = PSPD * 0.65;
    if (inJ() && player.gnd && !jumpHeld) { player.vy = JUMP_V; player.gnd = false; jumpHeld = true; }
    if (!inJ()) jumpHeld = false;

    player.vy += GRAV;
    if (player.vy > 16) player.vy = 16;
    player.x += player.vx;
    player.y += player.vy;
    player.z += 0.0028 + stage * 0.00025;

    player.gnd = false;
    for (const p of plats) {
      if (p.sec !== '3d') continue;
      const dz = Math.abs(player.z - p.z);
      if (dz > 0.05) continue;
      const sc = Math.max(0.1, 1 - p.z * 0.65);
      const ppw = p.w * sc;
      const ppx = p.x * sc;
      const plSc = Math.max(0.1, 1 - player.z * 0.65);
      const plx = player.x * plSc;
      if (plx + player.w * plSc / 2 > ppx - ppw / 2 && plx - player.w * plSc / 2 < ppx + ppw / 2) {
        if (player.vy >= 0 && player.y + player.h > 0 && player.y + player.h < 22) {
          player.y = -player.h; player.vy = 0; player.gnd = true;
        }
      }
    }

    if (player.y > H * 0.45) die();

    // Win stage
    const last3d = plats.filter(p => p.sec === '3d');
    if (last3d.length && player.z >= last3d[last3d.length - 1].z + 0.06) {
      advanceStage();
    }
  }

  if (flashA > 0) flashA -= dt * 5;
  if (shiftTextA > 0) shiftTextA -= dt * 1.2;
}

function doShift() {
  if (portalHit) return;
  portalHit = true; is3D = true;
  player.sec = '3d'; player.x = 0; player.y = -player.h; player.z = 0;
  player.vx = 0; player.vy = 0; player.gnd = true;
  flashA = 1; shiftTextA = 1; shiftLabel = 'SHIFT!';
}

function die() {
  deaths++;
  loadStage(stage);
}

function advanceStage() {
  stage++;
  if (stage >= STAGES) { state = 'win'; return; }
  loadStage(stage);
  shiftLabel = 'STAGE ' + (stage + 1); shiftTextA = 1; flashA = 0.3;
}

// ---- Drawing ----
function draw() {
  X.clearRect(0, 0, W, H);
  X.fillStyle = '#0f0f10'; X.fillRect(0, 0, W, H);

  if (state === 'title') { drawTitle(); return; }
  if (state === 'win') { drawWin(); return; }

  if (!is3D) draw2D(); else draw3D();

  // flash overlay
  if (flashA > 0) {
    X.fillStyle = 'rgba(255,255,255,' + Math.min(1, flashA) + ')';
    X.fillRect(0, 0, W, H);
  }
  // shift text
  if (shiftTextA > 0) {
    var a = Math.min(1, shiftTextA * 2);
    var sz = 56 + (1 - shiftTextA) * 24;
    X.save(); X.globalAlpha = a;
    X.fillStyle = '#fff'; X.font = 'bold ' + (sz | 0) + 'px sans-serif';
    X.textAlign = 'center'; X.textBaseline = 'middle';
    X.shadowColor = '#00ffff'; X.shadowBlur = 35;
    X.fillText(shiftLabel, W / 2, H / 2);
    X.shadowBlur = 0; X.restore();
  }
  drawHUD();
  drawTouchHints();
}

function draw2D() {
  X.save(); X.translate(-cam.x, -cam.y);

  // grid bg
  X.strokeStyle = 'rgba(255,255,255,0.025)'; X.lineWidth = 1;
  var gs = 64, sx = Math.floor(cam.x / gs) * gs, sy = Math.floor(cam.y / gs) * gs;
  for (var gx = sx; gx < sx + W + gs; gx += gs) { X.beginPath(); X.moveTo(gx, sy); X.lineTo(gx, sy + H + gs); X.stroke(); }
  for (var gy = sy; gy < sy + H + gs; gy += gs) { X.beginPath(); X.moveTo(sx, gy); X.lineTo(sx + W + gs, gy); X.stroke(); }

  // platforms
  for (var pi = 0; pi < plats.length; pi++) {
    var p = plats[pi];
    if (p.sec !== '2d') continue;
    if (p.x + p.w < cam.x - 60 || p.x > cam.x + W + 60) continue;
    X.shadowColor = p.col; X.shadowBlur = 14;
    X.fillStyle = p.col; X.fillRect(p.x, p.y, p.w, p.h);
    X.shadowBlur = 0;
    X.fillStyle = 'rgba(255,255,255,0.18)'; X.fillRect(p.x, p.y, p.w, 3);
    if (p.mv) {
      X.strokeStyle = 'rgba(255,255,255,0.12)'; X.lineWidth = 1;
      X.setLineDash([4, 4]); X.strokeRect(p.x - 2, p.y - 2, p.w + 4, p.h + 4); X.setLineDash([]);
    }
  }

  // portal
  if (!portalHit) {
    var pp = portalPos, t = performance.now() / 1000;
    var pulse = Math.sin(t * 4) * 0.3 + 0.7;
    X.save();
    X.shadowColor = '#00ffff'; X.shadowBlur = 35 * pulse;
    X.strokeStyle = 'rgba(0,255,255,' + pulse + ')'; X.lineWidth = 3;
    X.strokeRect(pp.x, pp.y, 50, 80);
    X.fillStyle = 'rgba(0,255,255,' + (0.12 * pulse) + ')';
    X.fillRect(pp.x, pp.y, 50, 80);
    X.fillStyle = 'rgba(255,255,255,' + (0.08 * pulse) + ')';
    X.fillRect(pp.x + 6, pp.y + 6, 38, 68);
    // particles
    for (var i = 0; i < 8; i++) {
      var ang = t * 2.5 + i * 0.785, r = 28 + Math.sin(t * 3 + i) * 10;
      var cx = pp.x + 25 + Math.cos(ang) * r, cy = pp.y + 40 + Math.sin(ang) * r;
      X.fillStyle = 'rgba(0,255,255,' + (0.4 + Math.sin(t * 5 + i) * 0.3) + ')';
      X.beginPath(); X.arc(cx, cy, 2.5, 0, 6.28); X.fill();
    }
    X.restore();
    X.fillStyle = '#00ffff'; X.font = 'bold 12px sans-serif'; X.textAlign = 'center';
    X.fillText('SHIFT', pp.x + 25, pp.y - 10);
  }

  // lava
  var lavaY = 620;
  var lg = X.createLinearGradient(0, lavaY, 0, lavaY + 60);
  lg.addColorStop(0, 'rgba(255,60,0,0.35)'); lg.addColorStop(1, 'rgba(255,20,0,0.08)');
  X.fillStyle = lg; X.fillRect(cam.x, lavaY, W, 200);

  // player
  drawChar2D(player.x, player.y, player.w, player.h);

  X.restore();
}

function drawChar2D(px, py, pw, ph) {
  var col = NEON[stage % NEON.length];
  X.fillStyle = col; X.shadowColor = col; X.shadowBlur = 10;
  X.fillRect(px, py, pw, ph); X.shadowBlur = 0;
  X.strokeStyle = 'rgba(255,255,255,0.2)'; X.lineWidth = 1; X.strokeRect(px, py, pw, ph);
  X.fillStyle = '#fff';
  X.fillRect(px + 4, py + 7, 5, 5); X.fillRect(px + pw - 9, py + 7, 5, 5);
  X.fillStyle = '#111';
  X.fillRect(px + 6, py + 9, 2.5, 2.5); X.fillRect(px + pw - 7, py + 9, 2.5, 2.5);
}

function draw3D() {
  var hY = H * 0.28, gY = H * 0.82, cX = W / 2;

  // converging lines bg
  X.strokeStyle = 'rgba(255,255,255,0.035)'; X.lineWidth = 1;
  for (var i = -12; i <= 12; i++) {
    X.beginPath(); X.moveTo(cX, hY); X.lineTo(cX + i * (W / 8), H); X.stroke();
  }
  for (var d = 0; d < 1; d += 0.08) {
    var sy = hY + (gY - hY) * (1 - d);
    X.strokeStyle = 'rgba(255,255,255,' + (0.02 + d * 0.025) + ')';
    X.beginPath(); X.moveTo(0, sy); X.lineTo(W, sy); X.stroke();
  }

  // sort 3d plats far-to-near
  var p3 = plats.filter(function(p) { return p.sec === '3d'; }).sort(function(a, b) { return b.z - a.z; });

  for (var pi = 0; pi < p3.length; pi++) {
    var p = p3[pi];
    var z = p.z - player.z;
    if (z < -0.06 || z > 1.3) continue;
    var sc = Math.max(0.05, 1 - z * 0.65);
    var sX = cX + (p.x - player.x * 0.3) * sc;
    var sY = hY + (gY - hY) * Math.max(0, 1 - z);
    var pw = p.w * sc, ph = p.h * sc * 1.6;

    var tSc = Math.max(0.05, 1 - (z + 0.025) * 0.65);
    var tW = p.w * tSc * 0.82;
    var tY = sY - ph;
    var tX = cX + (p.x - player.x * 0.3) * tSc;

    X.fillStyle = p.col; X.shadowColor = p.col; X.shadowBlur = 8 * sc;
    X.beginPath();
    X.moveTo(sX - pw / 2, sY); X.lineTo(sX + pw / 2, sY);
    X.lineTo(tX + tW / 2, tY); X.lineTo(tX - tW / 2, tY);
    X.closePath(); X.fill(); X.shadowBlur = 0;

    X.fillStyle = 'rgba(255,255,255,0.13)';
    X.beginPath();
    X.moveTo(tX - tW / 2, tY); X.lineTo(tX + tW / 2, tY);
    X.lineTo(tX + tW / 2 * 0.94, tY - 3 * sc); X.lineTo(tX - tW / 2 * 0.94, tY - 3 * sc);
    X.closePath(); X.fill();

    if (p.mv) {
      X.strokeStyle = 'rgba(255,255,255,0.1)'; X.lineWidth = 1;
      X.setLineDash([3, 3]); X.stroke(); X.setLineDash([]);
    }
  }

  // player in 3D
  var pSX = cX + player.x * 0.3;
  var pSY = gY + player.y * 0.5;
  var col = NEON[stage % NEON.length];
  var ppw = player.w, pph = player.h;
  X.fillStyle = col; X.shadowColor = col; X.shadowBlur = 12;
  X.fillRect(pSX - ppw / 2, pSY - pph, ppw, pph); X.shadowBlur = 0;
  X.strokeStyle = 'rgba(255,255,255,0.2)'; X.lineWidth = 1;
  X.strokeRect(pSX - ppw / 2, pSY - pph, ppw, pph);
  X.fillStyle = '#fff';
  X.fillRect(pSX - ppw / 4 - 1, pSY - pph + 7, 4.5, 4.5);
  X.fillRect(pSX + ppw / 4 - 3, pSY - pph + 7, 4.5, 4.5);
  X.fillStyle = '#111';
  X.fillRect(pSX - ppw / 4 + 1, pSY - pph + 9, 2, 2);
  X.fillRect(pSX + ppw / 4 - 2, pSY - pph + 9, 2, 2);

  // bottom lava
  var lg2 = X.createLinearGradient(0, H * 0.88, 0, H);
  lg2.addColorStop(0, 'rgba(255,50,0,0.08)'); lg2.addColorStop(1, 'rgba(255,25,0,0.22)');
  X.fillStyle = lg2; X.fillRect(0, H * 0.88, W, H * 0.12);

  // progress bar
  var last = plats.filter(function(p) { return p.sec === '3d'; });
  var maxZ = last.length ? last[last.length - 1].z : 1;
  var prog = Math.min(1, player.z / maxZ);
  X.fillStyle = 'rgba(255,255,255,0.08)'; X.fillRect(cX - 100, 18, 200, 5);
  X.fillStyle = '#00ffff'; X.fillRect(cX - 100, 18, 200 * prog, 5);
}

function drawHUD() {
  X.fillStyle = '#fff'; X.font = 'bold 15px sans-serif'; X.textAlign = 'left';
  X.fillText('Stage ' + (stage + 1) + '/' + STAGES, 14, 50);
  X.fillStyle = '#ff4455'; X.fillText('Deaths: ' + deaths, 14, 70);
  X.fillStyle = '#999';
  var m = Math.floor(timer / 60), s = Math.floor(timer % 60);
  X.fillText(m + ':' + String(s).padStart(2, '0'), 14, 90);
  X.fillStyle = is3D ? '#00ccff' : '#00ff88';
  X.textAlign = 'right'; X.fillText(is3D ? '[ 3D ]' : '[ 2D ]', W - 14, 50);
}

function drawTouchHints() {
  if (!('ontouchstart' in window)) return;
  X.save(); X.globalAlpha = 0.15;
  X.strokeStyle = '#fff'; X.lineWidth = 1;
  X.beginPath(); X.moveTo(W / 2, H - 80); X.lineTo(W / 2, H); X.stroke();
  X.font = '11px sans-serif'; X.fillStyle = '#fff'; X.textAlign = 'center';
  X.fillText('< MOVE >', W / 4, H - 14);
  X.fillText('JUMP', W * 3 / 4, H - 14);
  X.restore();
}

// ---- Title ----
function drawTitle() {
  var t = performance.now() / 1000;
  X.strokeStyle = 'rgba(0,255,255,0.04)'; X.lineWidth = 1;
  for (var i = 0; i < 15; i++) {
    var y = H / 2 + Math.sin(t * 0.8 + i * 0.4) * 120;
    X.beginPath(); X.moveTo(0, y + i * 18 - 130); X.lineTo(W, y + i * 18 - 90); X.stroke();
  }

  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillStyle = '#fff'; X.font = 'bold 50px sans-serif';
  X.shadowColor = '#00ffff'; X.shadowBlur = 30;
  X.fillText('OBBY 2.5D', W / 2, H * 0.28);
  X.shadowBlur = 0;

  X.fillStyle = '#00ccff'; X.font = '17px sans-serif';
  X.fillText('Perspective shifts mid-stage. Survive 20 stages.', W / 2, H * 0.28 + 48);

  X.fillStyle = '#777'; X.font = '15px sans-serif';
  X.fillText('Arrow Keys / WASD + Space', W / 2, H * 0.50);
  X.fillText('Touch: Left side = move, Right side = jump', W / 2, H * 0.50 + 24);

  if (Math.sin(t * 3) > 0) {
    X.fillStyle = '#fff'; X.font = 'bold 20px sans-serif';
    X.fillText('TAP OR PRESS ANY KEY', W / 2, H * 0.68);
  }

  // mini preview
  var py = H * 0.84;
  X.fillStyle = '#00ff88'; X.fillRect(W / 2 - 190, py, 120, 8);
  X.fillStyle = '#00ff88'; X.fillRect(W / 2 - 160, py - 14, 10, 12);
  X.fillStyle = '#fff'; X.fillRect(W / 2 - 158, py - 10, 3, 3); X.fillRect(W / 2 - 153, py - 10, 3, 3);
  var pulse = Math.sin(t * 4) * 0.3 + 0.7;
  X.strokeStyle = 'rgba(0,255,255,' + pulse + ')'; X.lineWidth = 2;
  X.strokeRect(W / 2 - 25, py - 18, 12, 22);
  X.fillStyle = '#888'; X.font = '14px sans-serif'; X.fillText('-->', W / 2 + 10, py - 4);
  X.fillStyle = '#ff8800';
  X.beginPath();
  X.moveTo(W / 2 + 50, py + 4); X.lineTo(W / 2 + 180, py + 4);
  X.lineTo(W / 2 + 168, py - 10); X.lineTo(W / 2 + 62, py - 10);
  X.closePath(); X.fill();
  X.fillStyle = '#555'; X.font = '11px sans-serif';
  X.fillText('2D  >>>  PORTAL  >>>  3D', W / 2, py + 24);
}

// ---- Win ----
function drawWin() {
  var t = performance.now() / 1000;
  for (var i = 0; i < 35; i++) {
    var cx = W / 2 + Math.cos(t * 1.8 + i * 0.6) * 220 * (0.3 + Math.sin(i) * 0.5);
    var cy = H / 2 + Math.sin(t * 1.8 + i * 1.0) * 160 * (0.3 + Math.cos(i) * 0.5);
    X.fillStyle = NEON[i % NEON.length];
    X.globalAlpha = 0.45 + Math.sin(t * 3 + i) * 0.3;
    X.beginPath(); X.arc(cx, cy, 3.5, 0, 6.28); X.fill();
  }
  X.globalAlpha = 1;
  X.textAlign = 'center'; X.textBaseline = 'middle';
  X.fillStyle = '#fff'; X.font = 'bold 48px sans-serif';
  X.shadowColor = '#ffcc00'; X.shadowBlur = 25;
  X.fillText('YOU WIN!', W / 2, H * 0.32); X.shadowBlur = 0;
  X.fillStyle = '#ccc'; X.font = '22px sans-serif';
  var m = Math.floor(timer / 60), s = Math.floor(timer % 60);
  X.fillText('Time: ' + m + ':' + String(s).padStart(2, '0'), W / 2, H * 0.48);
  X.fillText('Deaths: ' + deaths, W / 2, H * 0.48 + 32);
  X.fillStyle = '#888'; X.font = '17px sans-serif';
  X.fillText('Tap or press any key to play again', W / 2, H * 0.68);
}

// ---- Loop ----
var lastT = 0;
function loop(ts) {
  var dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;

  if ((state === 'title' || state === 'win') && anyKey()) {
    startGame(); keys.Space = false; tJump = false; tDir = 0;
  }

  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
