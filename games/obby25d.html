<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
canvas,#three-container{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#three-container{z-index:1;display:none}
#game-canvas{z-index:1;image-rendering:pixelated}

.hud-item{background:rgba(0,0,0,.55);padding:4px 12px;margin-bottom:3px;border-radius:6px;font-weight:bold;text-shadow:1px 1px 2px rgba(0,0,0,.7)}
.hud-stage{color:#4fc3f7;font-size:16px}
.hud-deaths{color:#ef5350}
.hud-timer{color:#fff}
.hud-mode{color:#ce93d8;font-size:12px}
#shift-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#shift-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;transition:opacity .15s}
#shift-text{font-size:56px;font-weight:900;color:#fff;text-shadow:0 0 40px #e040fb,0 0 80px #7c4dff;letter-spacing:6px;opacity:0;transform:scale(2);z-index:1}
#menu-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d0d2b 0%,#1a1a3e 50%,#0d0d2b 100%)}
#menu-title{font-size:64px;font-weight:900;color:#4fc3f7;text-shadow:0 4px 0 #0288d1,0 0 30px rgba(79,195,247,.3);letter-spacing:3px;margin-bottom:8px}
#menu-sub{font-size:18px;color:#ce93d8;margin-bottom:35px;font-weight:600}
.menu-btn{background:linear-gradient(135deg,#4fc3f7,#0288d1);color:#fff;border:none;padding:14px 44px;font-size:20px;font-weight:700;border-radius:12px;cursor:pointer;margin:7px;min-width:200px;transition:transform .15s,box-shadow .15s}
.menu-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(79,195,247,.4)}
.menu-btn:active{transform:scale(.97)}
#death-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,.3);opacity:0;transition:opacity .12s;z-index:150;pointer-events:none}
#touch-controls-2d{position:fixed;bottom:18px;left:0;right:0;display:none;justify-content:space-between;padding:0 18px;z-index:310}
.touch-btn{width:65px;height:65px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.touch-btn:active{background:rgba(255,255,255,.45)}
#touch-jump-2d{width:85px;height:85px;font-size:17px;font-weight:bold}
#mobile-3d{display:none;position:fixed;bottom:0;left:0;width:100%;height:100%;z-index:310;pointer-events:none}
#joystick-zone{position:absolute;bottom:18px;left:18px;width:140px;height:140px;pointer-events:auto}
#joystick-base{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);position:absolute;bottom:15px;left:15px}
#joystick-thumb{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.45);position:absolute;bottom:47px;left:47px;transform:translate(-50%,-50%);pointer-events:none}
.m3d-btn{position:absolute;width:65px;height:65px;border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:auto;-webkit-tap-highlight-color:transparent}
.m3d-btn:active{background:rgba(255,255,255,.4)}
#btn-jump-3d{bottom:18px;right:18px;width:90px;height:90px;font-size:16px}
#btn-sprint-3d{bottom:120px;right:22px}
#win-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:550;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);color:#fff}
#win-overlay h1{font-size:48px;color:#fdd835;text-shadow:0 4px 0 #f57f17;margin-bottom:20px}
#win-overlay p{font-size:20px;margin-bottom:8px}
@media(max-width:700px){
  #menu-title{font-size:42px}
  #shift-text{font-size:36px}
}
body.touch-mode.mode-2d #touch-controls-2d{display:flex!important}
body.touch-mode.mode-3d #mobile-3d{display:block!important}
body.touch-mode.mode-2d #mobile-3d{display:none!important}
body.touch-mode.mode-3d #touch-controls-2d{display:none!important}
</style>

<script type="module">
import * as THREE from 'three';

// ====================
// CONSTANTS
// ====================
const TILE = 40;
const GRAVITY_2D = 0.45;
const MAX_FALL_2D = 13;
const MOVE_SPEED_2D = 5;
const JUMP_FORCE_2D = -11;
const PLAYER_W_2D = 26;
const PLAYER_H_2D = 34;

const GRAVITY_3D = -24;
const WALK_3D = 9;
const SPRINT_3D = 14;
const JUMP_3D = 13.5;
const PW3 = 0.8;
const PH3 = 1.8;
const PD3 = 0.8;
const CAM_DIST = 7;
const CAM_H = 3;
const KILL_Y_3D = -20;
const MAX_VOL = 0.02;

const TOTAL_STAGES = 30;

// ====================
// STATE
// ====================
let screen = 'menu';
let currentStage = 1;
let deaths = 0;
let timer = 0;
let timerRunning = false;
let is3D = false; // false = 2D, true = 3D

// ====================
// AUDIO
// ====================
let audioCtx = null;
function ensureAudio(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume();}
function playTone(freq,dur,type='square',vol=1){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(MAX_VOL*vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxJump(){playTone(440,.1,'sine');playTone(660,.07,'sine',.5)}
function sfxDeath(){playTone(200,.35,'sawtooth',.7);playTone(100,.2,'square',.3)}
function sfxCoin(){playTone(880,.07,'sine');playTone(1320,.1,'sine',.8)}
function sfxComplete(){playTone(523,.1);playTone(659,.1,.6);setTimeout(()=>{playTone(784,.1);playTone(1047,.15)},120)}
function sfxShift(){playTone(300,.2,'sawtooth',.6);playTone(600,.15,'sine',.5);setTimeout(()=>playTone(1200,.2,'sine',.4),100)}

// ====================
// 2D CANVAS SETUP
// ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

// ====================
// THREE.JS SETUP
// ====================
const container3d = document.getElementById('three-container');
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
container3d.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.Fog(0x0a0a2e,40,120);
const cam3d = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,.1,400);

window.addEventListener('resize',()=>{
  cam3d.aspect=window.innerWidth/window.innerHeight;
  cam3d.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

const ambLight = new THREE.AmbientLight(0xffffff,.45);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff,.9);
dirLight.position.set(25,40,15);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(1024,1024);
dirLight.shadow.camera.left=-50;dirLight.shadow.camera.right=50;
dirLight.shadow.camera.top=50;dirLight.shadow.camera.bottom=-50;
scene.add(dirLight);scene.add(dirLight.target);

const boxGeo = new THREE.BoxGeometry(1,1,1);
function makeMat(c,e=0,ei=0){return new THREE.MeshStandardMaterial({color:c,emissive:e,emissiveIntensity:ei,roughness:.7,metalness:.1})}
const matNorm = makeMat(0x4caf50);
const matKill = makeMat(0xff1744,0xff1744,.5);
const matMove = makeMat(0x7e57c2);
const matSpeed = makeMat(0x2196f3,0x2196f3,.4);
const matPortal = makeMat(0x00e5ff,0x00e5ff,.6);
const matCheckpoint = makeMat(0xffd700,0xffd700,.4);
const matPlayer3d = makeMat(0x4fc3f7);
const matPlayerDark = makeMat(0x0288d1);

// ====================
// PLAYER 3D MODEL
// ====================
class PlayerModel3D{
  constructor(){
    this.group=new THREE.Group();
    this.body=new THREE.Mesh(boxGeo,matPlayer3d);
    this.body.scale.set(.6,.8,.4);this.body.position.y=.1;this.body.castShadow=true;
    this.group.add(this.body);
    this.head=new THREE.Mesh(boxGeo,matPlayer3d);
    this.head.scale.set(.5,.5,.5);this.head.position.y=.75;this.head.castShadow=true;
    this.group.add(this.head);
    const eyeM=new THREE.MeshBasicMaterial({color:0xffffff});
    const pupM=new THREE.MeshBasicMaterial({color:0x111111});
    const mouM=new THREE.MeshBasicMaterial({color:0x222222});
    [[-0.12,.8,.26],[.12,.8,.26]].forEach(p=>{
      const e=new THREE.Mesh(boxGeo,eyeM);e.scale.set(.12,.12,.02);e.position.set(...p);this.group.add(e);
      const pp=new THREE.Mesh(boxGeo,pupM);pp.scale.set(.07,.08,.02);pp.position.set(p[0],p[1]-.01,p[2]+.01);this.group.add(pp);
    });
    const mouth=new THREE.Mesh(boxGeo,mouM);mouth.scale.set(.18,.05,.02);mouth.position.set(0,.65,.26);this.group.add(mouth);
    this.lArm=new THREE.Mesh(boxGeo,matPlayerDark);this.lArm.scale.set(.22,.7,.22);this.lArm.position.set(-.42,.05,0);this.group.add(this.lArm);
    this.rArm=new THREE.Mesh(boxGeo,matPlayerDark);this.rArm.scale.set(.22,.7,.22);this.rArm.position.set(.42,.05,0);this.group.add(this.rArm);
    this.lLeg=new THREE.Mesh(boxGeo,matPlayerDark);this.lLeg.scale.set(.25,.7,.25);this.lLeg.position.set(-.18,-.65,0);this.group.add(this.lLeg);
    this.rLeg=new THREE.Mesh(boxGeo,matPlayerDark);this.rLeg.scale.set(.25,.7,.25);this.rLeg.position.set(.18,-.65,0);this.group.add(this.rLeg);
    this.anim=0;
  }
  animate(dt,moving){
    if(moving){this.anim+=dt*9;const s=Math.sin(this.anim)*.6;this.lArm.rotation.x=s;this.rArm.rotation.x=-s;this.lLeg.rotation.x=-s;this.rLeg.rotation.x=s;}
    else{this.anim=0;this.lArm.rotation.x*=.85;this.rArm.rotation.x*=.85;this.lLeg.rotation.x*=.85;this.rLeg.rotation.x*=.85;}
  }
}
const playerModel = new PlayerModel3D();
scene.add(playerModel.group);

// ====================
// INPUT
// ====================
const keys={};
let touchL=false,touchR=false,touchJ2d=false;
let mobileJump3d=false,mobileSprint3d=false;
let joystickX=0,joystickY=0,joystickTouchId=null;
let camYaw=0,camPitch=-.3;
let mouseDown=false,touchLookId=null,touchLookLastX=0,touchLookLastY=0;
const camSens=.004;

document.addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','ShiftLeft','KeyR'].includes(e.code)) e.preventDefault();
  keys[e.code]=true;
  if(e.code==='KeyR'&&screen==='playing'&&!shifting){
    if(is3D) kill3d(); else kill2d();
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false});

// Touch 2D
function addTouch(el,down,up){
  el.addEventListener('touchstart',e=>{e.preventDefault();down()},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();up()},{passive:false});
  el.addEventListener('touchcancel',()=>up());
  el.addEventListener('mousedown',e=>{e.preventDefault();down()});
  el.addEventListener('mouseup',e=>{e.preventDefault();up()});
}
addTouch(document.getElementById('touch-left'),()=>{touchL=true},()=>{touchL=false});
addTouch(document.getElementById('touch-right'),()=>{touchR=true},()=>{touchR=false});
addTouch(document.getElementById('touch-jump-2d'),()=>{touchJ2d=true},()=>{touchJ2d=false});

// Touch 3D
document.getElementById('btn-jump-3d').addEventListener('touchstart',e=>{e.preventDefault();mobileJump3d=true},{passive:false});
document.getElementById('btn-jump-3d').addEventListener('touchend',()=>{mobileJump3d=false});
document.getElementById('btn-sprint-3d').addEventListener('touchstart',e=>{e.preventDefault();mobileSprint3d=true},{passive:false});
document.getElementById('btn-sprint-3d').addEventListener('touchend',()=>{mobileSprint3d=false});

// Joystick
const jZone=document.getElementById('joystick-zone');
const jBase=document.getElementById('joystick-base');
const jThumb=document.getElementById('joystick-thumb');
let jbx=0,jby=0;
jZone.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){if(!joystickTouchId){joystickTouchId=t.identifier;const r=jBase.getBoundingClientRect();jbx=r.left+r.width/2;jby=r.top+r.height/2;updateJoy(t.clientX,t.clientY);}}},{passive:false});
jZone.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joystickTouchId)updateJoy(t.clientX,t.clientY);}},{passive:false});
jZone.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===joystickTouchId){joystickTouchId=null;joystickX=0;joystickY=0;jThumb.style.transform='translate(-50%,-50%)';}}});
function updateJoy(tx,ty){let dx=tx-jbx,dy=ty-jby;const max=42,d=Math.sqrt(dx*dx+dy*dy);if(d>max){dx=dx/d*max;dy=dy/d*max;}joystickX=dx/max;joystickY=-dy/max;jThumb.style.transform=`translate(${-50+dx/max*50}%,${-50-dy/max*50}%)`;}

// 3D camera (right-drag / touch look)
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());
renderer.domElement.addEventListener('mousedown',e=>{if(e.button===2)mouseDown=true;if(e.button===0&&is3D&&screen==='playing')p3d.jumpBuffer=.15;});
document.addEventListener('mouseup',e=>{if(e.button===2)mouseDown=false;});
document.addEventListener('mousemove',e=>{if(!is3D||screen!=='playing')return;if(mouseDown){camYaw+=e.movementX*camSens;camPitch-=e.movementY*camSens;camPitch=Math.max(-1.2,Math.min(.5,camPitch));}});
document.addEventListener('touchstart',e=>{if(!is3D||screen!=='playing')return;for(const t of e.changedTouches){if(t.clientX>window.innerWidth*.4&&touchLookId===null){const el=document.elementFromPoint(t.clientX,t.clientY);if(el&&(el.classList.contains('m3d-btn')||el.closest('#joystick-zone')))continue;touchLookId=t.identifier;touchLookLastX=t.clientX;touchLookLastY=t.clientY;}}},{passive:true});
document.addEventListener('touchmove',e=>{for(const t of e.changedTouches){if(t.identifier===touchLookId){camYaw+=(t.clientX-touchLookLastX)*camSens*1.5;camPitch-=(t.clientY-touchLookLastY)*camSens*1.5;camPitch=Math.max(-1.2,Math.min(.5,camPitch));touchLookLastX=t.clientX;touchLookLastY=t.clientY;}}},{passive:true});
document.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===touchLookId)touchLookId=null;}});

// ====================
// 2D PLAYER
// ====================
const p2d = {
  x:60,y:200,vx:0,vy:0,onGround:false,facingRight:true,
  jumpPressed:false,coyote:0,squash:1
};

// ====================
// 3D PLAYER
// ====================
const p3d = {
  x:0,y:2,z:0,vx:0,vy:0,vz:0,onGround:false,
  coyote:0,jumpBuffer:0,moving:false,sprinting:false,
  speedBoost:0,
  checkpoint:{x:0,y:2,z:0}
};

// ====================
// STAGE DATA
// ====================
let platforms2d=[];
let coins2d=[];
let portalPos2d={x:0,y:0};
let cam2d={x:0,y:0};
let collectedCoins=new Set();

let platforms3d=[];
let stageGroup=new THREE.Group();
scene.add(stageGroup);

// Determine mode for a stage number
function stageIs3D(n){return n>5&&n<=10||n>15&&n<=20||n>25&&n<=30;}

// Color themes per 5-stage block
const themes2d=[
  {bg:'#0a0a2e',platC:'#4fc3f7',platE:'#0288d1',glow:'rgba(79,195,247,.3)'},
  {bg:'#0a1e0a',platC:'#66bb6a',platE:'#2e7d32',glow:'rgba(102,187,106,.3)'},
  {bg:'#1a0a2e',platC:'#ce93d8',platE:'#7b1fa2',glow:'rgba(206,147,216,.3)'},
];
const themes3d=[
  {bg:0x0a0a2e,fog:0x0a0a3e,platMat:makeMat(0x4fc3f7,0x4fc3f7,.15)},
  {bg:0x1a0a0a,fog:0x2a0a0a,platMat:makeMat(0xff7043,0xff7043,.15)},
  {bg:0x0a1a0a,fog:0x0a2a0a,platMat:makeMat(0x66bb6a,0x66bb6a,.15)},
];

function get2dTheme(n){return themes2d[Math.floor((n-1)/5)%3];}
function get3dTheme(n){return themes3d[Math.floor((n-1)/5)%3];}

// Seeded RNG per stage
function makeRng(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s&0x7fffffff)/2147483647;};}

function generate2dStage(n){
  const rng=makeRng(n*9973);
  const diff=Math.min((n-1)/29,1);
  const plats=[];const cns=[];
  const numPlats=7+Math.floor(diff*7);
  let cx=0,cy=10;
  // Start platform
  plats.push({x:0,y:10,w:4,type:'normal',origX:0,origY:10,timer:0});
  for(let i=0;i<numPlats;i++){
    const gap=2+Math.floor(rng()*(2+diff));
    cx+=gap;
    const dy=Math.floor(rng()*3)-1;
    cy+=dy;
    if(cy<5)cy=6;if(cy>12)cy=11;
    let w=Math.max(1,3-Math.floor(diff*rng()*2));
    let type='normal';
    const roll=rng();
    if(i===numPlats-1){type='normal';w=4;}
    else if(roll<.08+.1*diff&&n>2) type='kill';
    else if(roll<.18+.12*diff&&n>3) type='moving';
    else if(roll<.28+.08*diff&&n>4) type='disappearing';
    plats.push({x:cx,y:cy,w,type,origX:cx,origY:cy,moveAmt:1.5+rng()*2.5,spd:.4+rng()*.8,timer:rng()*200,phase:rng()*3});
    // Coins -- placed above platforms at varied heights
    if(rng()<.45){
      const coinH=1+Math.floor(rng()*2);
      cns.push({x:cx*TILE+w*TILE/2,y:(cy-coinH)*TILE,collected:false});
    }
    // Spikes below gaps (lava/void hazard)
    if(gap>=3&&rng()<.4+diff*.3&&type!=='kill'){
      plats.push({x:cx-gap+1,y:13,w:gap-1,type:'lava',origX:cx-gap+1,origY:13,timer:0});
    }
  }
  const last=plats[plats.length-1];
  const portalX=(last.x+Math.floor(last.w/2))*TILE;
  const portalY=(last.y-2)*TILE;
  return {plats,coins:cns,portalX,portalY,spawn:{x:60,y:8*TILE}};
}

function generate3dStage(n){
  const rng=makeRng(n*7919);
  const diff=Math.min((n-1)/29,1);
  const elems=[];
  elems.push({type:'normal',x:0,y:0,z:0,w:4,h:1,d:4});
  let cx=0,cy=0,cz=0;
  const len=8+Math.floor(n*1.2);
  for(let i=0;i<len;i++){
    cx+=2+rng()*2;
    cy+=rng()*1.5-.5;
    cz+=(rng()-.5)*3;
    if(cy<-3)cy=-2;if(cy>15)cy=13;
    if(Math.abs(cz)>12)cz=Math.sign(cz)*8;
    const pw=2+rng()*2,pd=2+rng()*2;
    let t='normal';
    const roll=rng();
    if(i===len-1) t='portal';
    else if(roll<.1*diff&&n>6) t='kill';
    else if(roll<.22*diff&&n>7) t='moving';
    else if(roll<.32*diff&&n>8) t='speed';
    if(t==='kill'){
      elems.push({type:'kill',x:cx,y:cy-2,z:cz,w:pw+1,h:.3,d:pd+1});
      elems.push({type:'normal',x:cx,y:cy,z:cz,w:pw,h:.8,d:pd});
    } else if(t==='moving'){
      const axis=['x','y','z'][Math.floor(rng()*3)];
      elems.push({type:'moving',x:cx,y:cy,z:cz,w:pw,h:.8,d:pd,moveAxis:axis,moveRange:2+rng()*3,moveSpeed:.5+diff*1.5,origX:cx,origY:cy,origZ:cz,time:rng()*10});
    } else {
      elems.push({type:t,x:cx,y:cy,z:cz,w:pw,h:t==='portal'?.5:.8,d:pd});
    }
    if(i===Math.floor(len*.4)){
      elems.push({type:'checkpoint',x:cx,y:cy,z:cz,w:3,h:.5,d:3});
    }
  }
  return elems;
}

// ====================
// BUILD STAGES
// ====================
function clearStage3d(){
  while(stageGroup.children.length)stageGroup.remove(stageGroup.children[0]);
  platforms3d=[];
}

// Detect touch device
const isTouchDevice='ontouchstart' in window||navigator.maxTouchPoints>0||window.innerWidth<769;
if(isTouchDevice) document.body.classList.add('touch-mode');
window.addEventListener('resize',()=>{if(window.innerWidth<769)document.body.classList.add('touch-mode');});

function setModeClass(mode3d){
  document.body.classList.toggle('mode-2d',!mode3d);
  document.body.classList.toggle('mode-3d',mode3d);
}

function buildStage(n){
  const mode3d=stageIs3D(n);
  is3D=mode3d;
  collectedCoins=new Set();
  setModeClass(mode3d);

  if(!mode3d){
    // 2D
    const data=generate2dStage(n);
    platforms2d=data.plats;
    coins2d=data.coins;
    portalPos2d={x:data.portalX,y:data.portalY};
    p2d.x=data.spawn.x;p2d.y=data.spawn.y;
    p2d.vx=0;p2d.vy=0;p2d.onGround=false;p2d.squash=1;
    cam2d.x=p2d.x-canvas.width/2;
    cam2d.y=p2d.y-canvas.height/2;
    container3d.style.display='none';
    canvas.style.display='block';
    clearStage3d();
  } else {
    // 3D
    clearStage3d();
    const elems=generate3dStage(n);
    const theme=get3dTheme(n);
    scene.background=new THREE.Color(theme.bg);
    scene.fog=new THREE.Fog(theme.fog,40,120);
    elems.forEach(el=>{
      let mat;
      switch(el.type){
        case 'kill':mat=matKill;break;
        case 'moving':mat=matMove;break;
        case 'speed':mat=matSpeed;break;
        case 'portal':mat=matPortal;break;
        case 'checkpoint':mat=matCheckpoint;break;
        default:mat=theme.platMat;
      }
      const m=new THREE.Mesh(boxGeo,mat);
      m.scale.set(el.w,el.h,el.d);
      m.position.set(el.x,el.y-el.h/2,el.z);
      m.castShadow=true;m.receiveShadow=true;
      stageGroup.add(m);
      platforms3d.push({mesh:m,type:el.type,data:el,origX:el.x,origY:el.y,origZ:el.z,time:el.time||Math.random()*10,visible:true,_lastDx:0,_lastDy:0,_lastDz:0});
    });
    // Portal glow
    const portal=platforms3d.find(p=>p.type==='portal');
    if(portal){
      const g=new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.2,3,16,1,true),new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:.15,side:THREE.DoubleSide}));
      g.position.copy(portal.mesh.position);g.position.y+=1;stageGroup.add(g);
    }
    // Reset 3D player
    p3d.x=0;p3d.y=2;p3d.z=0;p3d.vx=0;p3d.vy=0;p3d.vz=0;p3d.onGround=false;
    p3d.checkpoint={x:0,y:2,z:0};
    camYaw=0;camPitch=-.3;
    container3d.style.display='block';
    canvas.style.display='none';
  }
  updateHUD();
}

// ====================
// DIMENSION SHIFT ANIMATION
// ====================
let shifting=false;
function doShift(nextStage,cb){
  shifting=true;
  sfxShift();
  const overlay=document.getElementById('shift-overlay');
  const bg=document.getElementById('shift-bg');
  const txt=document.getElementById('shift-text');
  const goingTo3d=stageIs3D(nextStage);
  txt.textContent=goingTo3d?'ENTERING 3D!':'BACK TO 2D!';
  overlay.style.display='flex';
  // Phase 1: flash white
  bg.style.transition='opacity .15s';bg.style.opacity='1';
  txt.style.transition='none';txt.style.opacity='0';txt.style.transform='scale(2) rotate(-5deg)';
  setTimeout(()=>{
    // Phase 2: show text with dramatic zoom
    bg.style.transition='opacity .5s';bg.style.opacity='.9';
    txt.style.transition='opacity .25s, transform .35s cubic-bezier(.17,.67,.35,1.5)';
    txt.style.opacity='1';txt.style.transform='scale(1) rotate(0deg)';
    // Play extra shift sound
    setTimeout(()=>{playTone(800,.15,'sine',.5);playTone(1200,.15,'sine',.4);},200);
  },200);
  setTimeout(()=>{
    // Phase 2.5: change the text
    txt.textContent='DIMENSION SHIFT!';
    txt.style.transition='transform .15s';txt.style.transform='scale(1.1) rotate(2deg)';
    setTimeout(()=>{txt.style.transform='scale(1) rotate(0deg)';},150);
  },700);
  setTimeout(()=>{
    // Phase 3: zoom out text, fade
    txt.style.transition='opacity .25s, transform .4s';txt.style.opacity='0';txt.style.transform='scale(.2) rotate(10deg)';
    bg.style.transition='opacity .4s';bg.style.opacity='0';
  },1300);
  setTimeout(()=>{
    overlay.style.display='none';
    shifting=false;
    cb();
  },1750);
}

// ====================
// GAME FLOW
// ====================
function startGame(){
  screen='playing';
  currentStage=1;deaths=0;timer=0;timerRunning=true;
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('hud').style.display='block';
  buildStage(1);
}

function nextStage(){
  if(currentStage>=TOTAL_STAGES){
    winGame();return;
  }
  const prev3d=is3D;
  currentStage++;
  const next3d=stageIs3D(currentStage);
  if(prev3d!==next3d){
    // DIMENSION SHIFT
    doShift(currentStage,()=>{buildStage(currentStage);});
  } else {
    buildStage(currentStage);
  }
}

function winGame(){
  screen='win';timerRunning=false;
  document.getElementById('hud').style.display='none';
  document.getElementById('win-overlay').style.display='flex';
  const mins=Math.floor(timer/60),secs=Math.floor(timer%60),t10=Math.floor((timer*10)%10);
  document.getElementById('win-deaths').textContent=`Deaths: ${deaths}`;
  document.getElementById('win-time').textContent=`Time: ${mins}:${secs.toString().padStart(2,'0')}.${t10}`;
}

function kill2d(){
  deaths++;sfxDeath();
  const o=document.getElementById('death-overlay');o.style.opacity='1';setTimeout(()=>o.style.opacity='0',200);
  // Death particles
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    spawn2dParticle(p2d.x+PLAYER_W_2D/2,p2d.y+PLAYER_H_2D/2,Math.cos(a)*s,Math.sin(a)*s-3,
      ['#ef5350','#ff7043','#ffa726','#fff'][Math.floor(Math.random()*4)],30+Math.random()*20,3+Math.random()*4);
  }
  // Respawn at stage start
  p2d.x=60;p2d.y=8*TILE;p2d.vx=0;p2d.vy=0;p2d.onGround=false;p2d.squash=1;
  updateHUD();
}

function kill3d(){
  deaths++;sfxDeath();
  const o=document.getElementById('death-overlay');o.style.opacity='1';setTimeout(()=>o.style.opacity='0',200);
  p3d.x=p3d.checkpoint.x;p3d.y=p3d.checkpoint.y;p3d.z=p3d.checkpoint.z;
  p3d.vx=0;p3d.vy=0;p3d.vz=0;p3d.onGround=false;
  updateHUD();
}

function updateHUD(){
  document.getElementById('hud-stage').textContent=`Stage ${currentStage} / ${TOTAL_STAGES}`;
  document.getElementById('hud-deaths').textContent=`Deaths: ${deaths}`;
  document.getElementById('hud-mode').textContent=is3D?'3D MODE':'2D MODE';
}

// ====================
// 2D UPDATE
// ====================
function aabb(x1,y1,w1,h1,x2,y2,w2,h2){return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2;}

function getPlatX2d(p){
  if(p.type==='moving') return (p.origX+Math.sin((p.timer||0)*.02*(p.spd||1))*(p.moveAmt||2))*TILE;
  return p.x*TILE;
}
function getPlatY2d(p){return p.y*TILE;}

// 2D Particles
const particles2d=[];
function spawn2dParticle(x,y,vx,vy,color,life,size){
  if(particles2d.length>200)particles2d.shift();
  particles2d.push({x,y,vx,vy,color,life,maxLife:life,size:size||3});
}
function update2dParticles(){
  for(let i=particles2d.length-1;i>=0;i--){
    const p=particles2d[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;
    if(p.life<=0)particles2d.splice(i,1);
  }
}

function isPlatVisible(p){
  if(p.type==='disappearing'){
    const cycle=240;const t=((p.timer||0)+(p.phase||0)*80)%cycle;
    return t<160;
  }
  return true;
}
function isPlatFlashing(p){
  if(p.type==='disappearing'){
    const cycle=240;const t=((p.timer||0)+(p.phase||0)*80)%cycle;
    return t>100&&t<160;
  }
  return false;
}

function update2d(dt60){
  if(screen!=='playing'||is3D) return;
  // Input
  const left=keys['ArrowLeft']||keys['KeyA']||touchL;
  const right=keys['ArrowRight']||keys['KeyD']||touchR;
  const jump=keys['Space']||keys['ArrowUp']||keys['KeyW']||touchJ2d;

  // Move
  if(left){p2d.vx=-MOVE_SPEED_2D;p2d.facingRight=false;}
  else if(right){p2d.vx=MOVE_SPEED_2D;p2d.facingRight=true;}
  else p2d.vx*=.7;

  // Gravity
  p2d.vy=Math.min(p2d.vy+GRAVITY_2D,MAX_FALL_2D);

  // Jump
  if(jump&&!p2d.jumpPressed&&(p2d.onGround||p2d.coyote>0)){
    p2d.vy=JUMP_FORCE_2D;p2d.onGround=false;p2d.coyote=0;sfxJump();p2d.squash=.7;
    // Jump particles
    for(let i=0;i<6;i++) spawn2dParticle(p2d.x+PLAYER_W_2D/2+(Math.random()-.5)*16,p2d.y+PLAYER_H_2D,(Math.random()-.5)*2,-Math.random()*1.5,'rgba(255,255,255,.5)',15+Math.random()*10);
  }
  p2d.jumpPressed=jump;

  // Variable jump
  if(!jump&&p2d.vy<-2) p2d.vy*=.85;

  // Coyote
  if(p2d.onGround) p2d.coyote=8; else if(p2d.coyote>0) p2d.coyote--;

  // Move X
  p2d.x+=p2d.vx;
  p2d.onGround=false;

  // Update platform timers
  for(const p of platforms2d){if(p.timer!==undefined)p.timer++;}

  // Collision X
  for(const p of platforms2d){
    if(p.type==='kill'||p.type==='lava') continue;
    if(!isPlatVisible(p)) continue;
    const px=getPlatX2d(p),py=getPlatY2d(p),pw=p.w*TILE,ph=TILE;
    if(aabb(p2d.x,p2d.y,PLAYER_W_2D,PLAYER_H_2D,px,py,pw,ph)){
      if(p2d.vx>0) p2d.x=px-PLAYER_W_2D;
      else if(p2d.vx<0) p2d.x=px+pw;
      p2d.vx=0;
    }
  }

  // Move Y
  p2d.y+=p2d.vy;

  // Collision Y
  for(const p of platforms2d){
    if(!isPlatVisible(p)) continue;
    const px=getPlatX2d(p),py=getPlatY2d(p),pw=p.w*TILE,ph=TILE;
    if(aabb(p2d.x,p2d.y,PLAYER_W_2D,PLAYER_H_2D,px,py,pw,ph)){
      if(p.type==='kill'||p.type==='lava'){kill2d();return;}
      if(p2d.vy>0){
        p2d.y=py-PLAYER_H_2D;p2d.vy=0;p2d.onGround=true;
        if(p2d.squash<1) p2d.squash=1.15;
      } else if(p2d.vy<0){
        p2d.y=py+ph;p2d.vy=0;
      }
    }
  }

  // Coins
  for(let i=0;i<coins2d.length;i++){
    const c=coins2d[i];if(c.collected)continue;
    const dx=p2d.x+PLAYER_W_2D/2-c.x,dy=p2d.y+PLAYER_H_2D/2-c.y;
    if(Math.sqrt(dx*dx+dy*dy)<24){
      c.collected=true;sfxCoin();
      for(let j=0;j<10;j++) spawn2dParticle(c.x,c.y,(Math.random()-.5)*4,-Math.random()*3-1,'#ffd740',20+Math.random()*10,3);
    }
  }

  // Portal
  const pdx=p2d.x+PLAYER_W_2D/2-portalPos2d.x,pdy=p2d.y+PLAYER_H_2D/2-portalPos2d.y;
  if(Math.sqrt(pdx*pdx+pdy*pdy)<TILE*1.2){sfxComplete();nextStage();return;}

  // Fall death
  if(p2d.y>16*TILE){kill2d();return;}

  // Squash recover
  p2d.squash+=(1-p2d.squash)*.15;

  // Update particles
  update2dParticles();

  // Running particles
  if(p2d.onGround&&Math.abs(p2d.vx)>3&&Math.random()>.6){
    spawn2dParticle(p2d.x+PLAYER_W_2D/2+(p2d.facingRight?-8:8),p2d.y+PLAYER_H_2D,-p2d.vx*.1,-Math.random(),'rgba(255,255,255,.3)',12,2);
  }

  // Camera
  const tx=p2d.x-canvas.width/2+PLAYER_W_2D/2;
  const ty=p2d.y-canvas.height/2+PLAYER_H_2D/2;
  cam2d.x+=(tx-cam2d.x)*.08;
  cam2d.y+=(ty-cam2d.y)*.08;
}

// ====================
// 2D RENDER
// ====================
function render2d(){
  if(is3D) return;
  const w=canvas.width,h=canvas.height;
  const theme=get2dTheme(currentStage);
  ctx.fillStyle=theme.bg;ctx.fillRect(0,0,w,h);

  // Stars (parallax)
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<80;i++){
    const sx=((i*137+currentStage*51)%2000)-cam2d.x*.05;
    const sy=((i*89+currentStage*37)%600);
    const twinkle=.3+.7*Math.abs(Math.sin(Date.now()*.002+i));
    ctx.globalAlpha=twinkle;
    ctx.fillRect(((sx%w)+w)%w,sy,1+i%2,1+i%2);
  }
  ctx.globalAlpha=1;

  ctx.save();
  ctx.translate(-cam2d.x,-cam2d.y);

  // Void gradient at bottom
  const voidGrad=ctx.createLinearGradient(0,13*TILE,0,17*TILE);
  voidGrad.addColorStop(0,'rgba(255,30,30,0)');
  voidGrad.addColorStop(.5,'rgba(255,30,30,.1)');
  voidGrad.addColorStop(1,'rgba(255,30,30,.3)');
  ctx.fillStyle=voidGrad;
  ctx.fillRect(cam2d.x,13*TILE,w,4*TILE);

  // Platforms
  for(const p of platforms2d){
    const vis=isPlatVisible(p);
    const flash=isPlatFlashing(p);
    if(!vis) continue;
    if(flash&&Math.sin(Date.now()*.03)>0) continue;

    const px=getPlatX2d(p),py=getPlatY2d(p),pw=p.w*TILE,ph=TILE;

    if(p.type==='lava'){
      // Animated lava
      ctx.fillStyle='#d84315';
      ctx.shadowColor='rgba(255,87,34,.6)';ctx.shadowBlur=15;
      ctx.fillRect(px,py,pw,ph);
      ctx.shadowBlur=0;
      // Lava bubbles
      for(let b=0;b<p.w;b++){
        const bx=px+b*TILE+20+Math.sin(Date.now()*.003+b*2)*10;
        const by=py+5+Math.abs(Math.sin(Date.now()*.005+b*3))*8;
        ctx.fillStyle='#ff6e40';
        ctx.beginPath();ctx.arc(bx,by,3+Math.sin(Date.now()*.007+b)*2,0,Math.PI*2);ctx.fill();
      }
      // Spikes on top
      ctx.fillStyle='#ff1744';
      for(let s=0;s<pw;s+=16){
        ctx.beginPath();ctx.moveTo(px+s,py);ctx.lineTo(px+s+8,py-10);ctx.lineTo(px+s+16,py);ctx.fill();
      }
      continue;
    }

    // Glow
    let glowColor=theme.glow,fillColor=theme.platC,borderColor=theme.platE;
    if(p.type==='kill'){glowColor='rgba(255,23,68,.6)';fillColor='#ff1744';borderColor='#d50000';}
    else if(p.type==='moving'){fillColor='#7e57c2';borderColor='#512da8';glowColor='rgba(126,87,194,.4)';}
    else if(p.type==='disappearing'){fillColor='#fff176';borderColor='#f9a825';glowColor='rgba(255,241,118,.4)';}

    ctx.shadowColor=glowColor;ctx.shadowBlur=14;
    ctx.fillStyle=fillColor;
    ctx.fillRect(px,py,pw,ph);
    // Top highlight
    ctx.fillStyle=p.type==='kill'?'#ff5252':'rgba(255,255,255,.2)';
    ctx.fillRect(px,py,pw,3);
    // Front face (3D-ish depth)
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.fillRect(px,py+ph-6,pw,6);
    ctx.shadowBlur=0;
    // Border
    ctx.strokeStyle=borderColor;
    ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);

    // Kill brick spikes
    if(p.type==='kill'){
      ctx.fillStyle='#ff5252';
      for(let s=0;s<pw;s+=12){
        ctx.beginPath();ctx.moveTo(px+s,py);ctx.lineTo(px+s+6,py-8);ctx.lineTo(px+s+12,py);ctx.fill();
      }
    }
  }

  // Particles
  for(const p of particles2d){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // Coins
  const coinBob=Math.sin(Date.now()*.005)*4;
  for(const c of coins2d){
    if(c.collected) continue;
    ctx.fillStyle='#ffd740';
    ctx.shadowColor='rgba(255,215,0,.6)';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(c.x,c.y+coinBob,8,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.fillRect(c.x-2,c.y+coinBob-3,4,6);
  }

  // Portal
  const pt=Date.now()*.003;
  ctx.save();
  ctx.shadowColor='rgba(0,229,255,.8)';ctx.shadowBlur=25;
  ctx.fillStyle='#00e5ff';
  ctx.beginPath();
  ctx.arc(portalPos2d.x,portalPos2d.y,18+Math.sin(pt)*4,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.beginPath();ctx.arc(portalPos2d.x,portalPos2d.y,10+Math.sin(pt*2)*3,0,Math.PI*2);ctx.fill();
  // Rotating ring
  ctx.strokeStyle='rgba(0,229,255,.4)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(portalPos2d.x,portalPos2d.y,24+Math.sin(pt)*2,pt%(Math.PI*2),pt%(Math.PI*2)+Math.PI*1.3);ctx.stroke();
  ctx.shadowBlur=0;ctx.restore();

  // Player
  const pcx=p2d.x+PLAYER_W_2D/2,pcy=p2d.y+PLAYER_H_2D/2;
  ctx.save();
  ctx.translate(pcx,pcy);
  const sy=p2d.squash,sx=1+(1-sy)*.5;
  ctx.scale(p2d.facingRight?sx:-sx,sy);

  // Shadow under player
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath();ctx.ellipse(0,PLAYER_H_2D/2+2,10,3,0,0,Math.PI*2);ctx.fill();

  // Body
  ctx.fillStyle='#4fc3f7';
  ctx.shadowColor='rgba(79,195,247,.5)';ctx.shadowBlur=8;
  ctx.fillRect(-PLAYER_W_2D/2,-PLAYER_H_2D/2,PLAYER_W_2D,PLAYER_H_2D);
  ctx.shadowBlur=0;

  // Body highlight
  ctx.fillStyle='rgba(255,255,255,.1)';
  ctx.fillRect(-PLAYER_W_2D/2,-PLAYER_H_2D/2,PLAYER_W_2D/2,PLAYER_H_2D);

  // Darker limbs (arms)
  ctx.fillStyle='#0288d1';
  ctx.fillRect(-PLAYER_W_2D/2-4,-PLAYER_H_2D/2+4,5,PLAYER_H_2D-12);
  ctx.fillRect(PLAYER_W_2D/2-1,-PLAYER_H_2D/2+4,5,PLAYER_H_2D-12);

  // Eyes
  ctx.fillStyle='#fff';
  ctx.fillRect(1,-PLAYER_H_2D/2+5,7,7);
  ctx.fillRect(10,-PLAYER_H_2D/2+5,7,7);
  ctx.fillStyle='#111';
  ctx.fillRect(3,-PLAYER_H_2D/2+7,4,4);
  ctx.fillRect(12,-PLAYER_H_2D/2+7,4,4);
  // Mouth
  ctx.fillStyle='#222';
  ctx.fillRect(3,-PLAYER_H_2D/2+16,12,3);

  ctx.restore();
  ctx.restore();

  // Stage indicator text (subtle)
  ctx.fillStyle='rgba(255,255,255,.08)';
  ctx.font='bold 120px "Segoe UI",sans-serif';
  ctx.textAlign='center';
  ctx.fillText(currentStage.toString(),w/2,h/2+40);
}

// ====================
// 3D UPDATE
// ====================
let prevJump3d=false;

function update3d(dt){
  if(screen!=='playing'||!is3D) return;

  // Input
  let mx=0,mz=0,wantJump=false,wantSprint=false;
  const isMob=joystickTouchId!==null||mobileJump3d;
  if(isMob){mx=joystickX;mz=joystickY;wantJump=mobileJump3d;wantSprint=mobileSprint3d;}
  else{
    if(keys['KeyW']||keys['ArrowUp'])mz=1;if(keys['KeyS']||keys['ArrowDown'])mz=-1;
    if(keys['KeyA']||keys['ArrowLeft'])mx=-1;if(keys['KeyD']||keys['ArrowRight'])mx=1;
    wantJump=!!keys['Space'];wantSprint=!!keys['ShiftLeft'];
  }

  // Camera-relative movement
  const fwd=new THREE.Vector3(Math.sin(camYaw),0,Math.cos(camYaw));
  const rgt=new THREE.Vector3(-fwd.z,0,fwd.x);
  let mvx=rgt.x*mx+fwd.x*mz,mvz=rgt.z*mx+fwd.z*mz;
  const mag=Math.sqrt(mvx*mvx+mvz*mvz);if(mag>1){mvx/=mag;mvz/=mag;}
  p3d.moving=mag>.1;p3d.sprinting=wantSprint&&p3d.moving;

  let speed=p3d.sprinting?SPRINT_3D:WALK_3D;
  p3d.speedBoost=Math.max(0,p3d.speedBoost-dt);
  if(p3d.speedBoost>0) speed*=1.6;
  const accel=p3d.onGround?30:15;
  p3d.vx+=(mvx*speed-p3d.vx)*Math.min(1,accel*dt);
  p3d.vz+=(mvz*speed-p3d.vz)*Math.min(1,accel*dt);
  p3d.vy+=GRAVITY_3D*dt;

  // Coyote / jump buffer
  if(p3d.onGround) p3d.coyote=.15; else p3d.coyote=Math.max(0,p3d.coyote-dt);
  if(wantJump) p3d.jumpBuffer=.15; else p3d.jumpBuffer=Math.max(0,p3d.jumpBuffer-dt);

  const freshJump=wantJump&&!prevJump3d;
  prevJump3d=wantJump;

  if(p3d.jumpBuffer>0&&p3d.coyote>0){
    p3d.vy=JUMP_3D;p3d.onGround=false;p3d.coyote=0;p3d.jumpBuffer=0;sfxJump();
  }
  // Variable jump
  if(!wantJump&&p3d.vy>2) p3d.vy*=.92;

  // Move
  p3d.x+=p3d.vx*dt;p3d.y+=p3d.vy*dt;p3d.z+=p3d.vz*dt;

  // Collision
  p3d.onGround=false;
  const pw=PW3/2,ph=PH3/2,pd=PD3/2;
  for(const plat of platforms3d){
    if(!plat.visible) continue;
    const m=plat.mesh;
    const sx=m.scale.x/2,sy=m.scale.y/2,sz=m.scale.z/2;
    const px=m.position.x,py=m.position.y,pz=m.position.z;
    const ox=(pw+sx)-Math.abs(p3d.x-px);
    const oy=(ph+sy)-Math.abs(p3d.y-py);
    const oz=(pd+sz)-Math.abs(p3d.z-pz);
    if(ox>0&&oy>0&&oz>0){
      if(plat.type==='kill'){kill3d();return;}
      if(plat.type==='portal'){sfxComplete();nextStage();return;}
      if(plat.type==='checkpoint'){
        if(p3d.checkpoint.x!==plat.origX||p3d.checkpoint.z!==plat.origZ){
          p3d.checkpoint={x:plat.origX,y:plat.origY+1.5,z:plat.origZ};
        }
      }
      if(plat.type==='speed'){p3d.speedBoost=2;}
      // Resolve
      if(ox<oy&&ox<oz){p3d.x=px+Math.sign(p3d.x-px)*(pw+sx);p3d.vx=0;}
      else if(oy<oz){
        const sign=Math.sign(p3d.y-py);
        p3d.y=py+sign*(ph+sy);
        if(sign>0){p3d.onGround=true;p3d.vy=0;
          if(plat.type==='moving'&&plat._lastDx!==undefined){p3d.x+=plat._lastDx;p3d.y+=plat._lastDy;p3d.z+=plat._lastDz;}
        } else p3d.vy=0;
      } else {p3d.z=pz+Math.sign(p3d.z-pz)*(pd+sz);p3d.vz=0;}
    }
  }

  // Kill plane
  if(p3d.y<KILL_Y_3D) kill3d();

  // Auto-rotate camera
  if(p3d.moving&&!mouseDown&&touchLookId===null){
    const ma=Math.atan2(p3d.vx,p3d.vz);let d=ma-camYaw;
    while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;
    camYaw+=d*1.5*dt;
  }
}

function updatePlatforms3d(dt){
  for(const plat of platforms3d){
    plat.time+=dt;
    if(plat.type==='moving'){
      const d=plat.data,prev={x:plat.mesh.position.x,y:plat.mesh.position.y,z:plat.mesh.position.z};
      const off=Math.sin(plat.time*(d.moveSpeed||1))*(d.moveRange||3);
      if(d.moveAxis==='x')plat.mesh.position.x=plat.origX+off;
      else if(d.moveAxis==='y')plat.mesh.position.y=plat.origY-d.h/2+off;
      else plat.mesh.position.z=plat.origZ+off;
      plat._lastDx=plat.mesh.position.x-prev.x;plat._lastDy=plat.mesh.position.y-prev.y;plat._lastDz=plat.mesh.position.z-prev.z;
    }
    if(plat.type==='portal'){plat.mesh.position.y=plat.origY-plat.data.h/2+Math.sin(plat.time*2)*.2;}
  }
}

function updateCamera3d(dt){
  const dist=CAM_DIST;
  const offX=-Math.sin(camYaw)*Math.cos(camPitch)*dist;
  const offY=-Math.sin(camPitch)*dist+CAM_H;
  const offZ=-Math.cos(camYaw)*Math.cos(camPitch)*dist;
  const dx=p3d.x+offX-cam3d.position.x,dy=p3d.y+offY-cam3d.position.y,dz=p3d.z+offZ-cam3d.position.z;
  const lerp=.12*60*dt;
  cam3d.position.x+=dx*lerp;cam3d.position.y+=dy*lerp;cam3d.position.z+=dz*lerp;
  cam3d.lookAt(p3d.x,p3d.y+.5,p3d.z);
  dirLight.position.set(p3d.x+25,p3d.y+40,p3d.z+15);
  dirLight.target.position.set(p3d.x,p3d.y,p3d.z);
  dirLight.target.updateMatrixWorld();
}

function render3d(){
  if(!is3D) return;
  playerModel.group.position.set(p3d.x,p3d.y-PH3/2+.9,p3d.z);
  if(p3d.moving){playerModel.group.rotation.y=Math.atan2(p3d.vx,p3d.vz);}
  renderer.render(scene,cam3d);
}

// ====================
// MAIN LOOP
// ====================
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const now=t/1000;
  let dt=now-lastT;lastT=now;
  if(dt>.1)dt=.016;if(dt<=0)dt=.016;

  if(screen==='playing'&&!shifting){
    if(timerRunning) timer+=dt;
    const mins=Math.floor(timer/60),secs=Math.floor(timer%60),t10=Math.floor((timer*10)%10);
    document.getElementById('hud-timer').textContent=`${mins}:${secs.toString().padStart(2,'0')}.${t10}`;

    if(!is3D){
      update2d(dt);render2d();
    } else {
      update3d(dt);updatePlatforms3d(dt);updateCamera3d(dt);
      playerModel.animate(dt,p3d.moving);
      render3d();
    }
  }
}
requestAnimationFrame(loop);

// ====================
// MENU
// ====================
document.getElementById('btn-play').addEventListener('click',()=>{ensureAudio();startGame();});
document.getElementById('btn-win-menu').addEventListener('click',()=>{
  document.getElementById('win-overlay').style.display='none';
  document.getElementById('menu-screen').style.display='flex';
  screen='menu';
  container3d.style.display='none';canvas.style.display='block';
});
</script>
