<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>8bit Rogue Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace;touch-action:manipulation;user-select:none;-webkit-user-select:none;color:#fcfcfc;image-rendering:pixelated}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0px,rgba(0,0,0,.05) 1px,transparent 1px,transparent 3px)}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;transition:box-shadow .2s}
#topbar{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#0c0c0c;border-bottom:2px solid #585858;font-size:8px;flex-shrink:0;z-index:5;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:3px;line-height:1}
.stat-bar{width:50px;height:8px;background:#000;border:1px solid #585858;overflow:hidden}
.stat-fill{height:100%;transition:width .3s}
#hp-fill{background:#b81010}
#xp-bar{width:100%;height:4px;background:#000;border:1px solid #383838;overflow:hidden;margin-top:1px}
#xp-fill{height:100%;background:#6828b0;transition:width .3s;width:0}
.floor-ind{margin-left:auto;color:#f8d800;font-size:9px}
#char-icon{margin-right:2px}
#enemies{flex:0 0 auto;padding:4px 8px;display:flex;flex-direction:column;gap:3px;min-height:30px}
.enemy-row{display:flex;align-items:center;gap:6px;padding:4px 6px;background:#1c0000;border:1px solid #580000;font-size:8px;transition:all .2s}
.enemy-row.dead{opacity:.12;transform:scale(.95)}.enemy-row.hit{animation:eHit .25s}
.enemy-row.targeted{border-color:#f8d800;box-shadow:0 0 4px rgba(248,216,0,.3)}
@keyframes eHit{0%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}100%{transform:translateX(0)}}
.enemy-icon{font-size:18px}.enemy-name{font-size:7px;color:#b8b8b8;min-width:44px}
.enemy-hp-bar{flex:1;height:8px;background:#000;border:1px solid #580000;overflow:hidden}
.enemy-hp-fill{height:100%;background:#b81010;transition:width .3s}
.enemy-atk{font-size:7px;color:#f83800;min-width:28px;text-align:right}
.enemy-status{font-size:7px}
#machine{flex:0 0 auto;padding:10px;display:flex;justify-content:center;align-items:center;flex-direction:column}
.machine-label{font-size:10px;color:#f8d800;margin-bottom:6px;letter-spacing:4px}
.slot-frame{background:#000;border:4px solid #f8d800;padding:8px 10px;display:flex;gap:6px;position:relative;box-shadow:0 0 16px rgba(248,216,0,.15);transition:all .3s}
.slot-frame::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid #f83800}
.reel-container{width:64px;height:150px;overflow:hidden;background:#0c0c0c;border:2px solid #585858;position:relative}
.reel-strip{display:flex;flex-direction:column;align-items:center;transition:none;position:absolute;width:100%}
.reel-symbol{width:64px;height:50px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.reel-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s}
.reel-glow.active{opacity:1;box-shadow:inset 0 0 10px rgba(248,216,0,.5)}
.payline{position:absolute;left:-2px;right:-2px;top:50%;height:2px;background:#f83800;transform:translateY(-1px);z-index:2;box-shadow:0 0 4px #f83800;pointer-events:none}
.payline-dim{position:absolute;left:-2px;right:-2px;height:1px;z-index:2;pointer-events:none;opacity:.35}
.payline-top{top:16.67%;background:#0058f8;box-shadow:0 0 3px #0058f8}
.payline-bottom{top:83.33%;background:#00a800;box-shadow:0 0 3px #00a800}
#spinbtn{display:block;margin:6px auto 0;padding:14px 50px;font-size:14px;font-family:'Press Start 2P',monospace;background:#a80000;color:#fcfcfc;border:4px solid #f83800;cursor:pointer;letter-spacing:3px;box-shadow:0 4px 0 #580000;transition:all .1s;-webkit-tap-highlight-color:transparent}
#spinbtn:active{transform:translateY(4px);box-shadow:0 0 0 #580000}
#spinbtn:disabled{opacity:.3;cursor:default;transform:none}
#spinbtn.win-flash{animation:btnFlash .4s 3}
@keyframes btnFlash{0%,100%{background:#a80000}50%{background:#00a800}}
#perk-bar{display:flex;gap:2px;justify-content:center;padding:2px 8px;flex-wrap:wrap;min-height:14px}
.perk-icon{font-size:12px;opacity:.7;cursor:help}
#results{flex:1;overflow-y:auto;padding:4px 10px;font-size:8px;display:flex;flex-direction:column;gap:2px;min-height:20px;line-height:1.6}
.res-line{padding:1px 0}.res-dmg{color:#f83800}.res-heal{color:#00a800}.res-gold{color:#f8d800}.res-shield{color:#0058f8}.res-combo{color:#d800cc}.res-info{color:#787878}.res-enemy{color:#f87858}.res-crit{color:#f838b8}.res-xp{color:#6828b0}
#overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.95)}
#overlay.show{display:flex}
.panel{background:#0c0c0c;border:4px solid #f8d800;padding:16px;max-width:380px;width:94%;max-height:88vh;overflow-y:auto;text-align:center;box-shadow:0 0 30px rgba(248,216,0,.1)}
.panel h2{font-size:12px;margin-bottom:8px;color:#f8d800;letter-spacing:2px}
.panel h3{font-size:8px;margin:6px 0 4px;color:#b8b8b8;letter-spacing:1px}
.shop-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:6px 0}
.shop-card{background:#1c1c1c;border:2px solid #383838;padding:8px 5px;cursor:pointer;text-align:center;width:80px;transition:all .15s}
.shop-card:hover{border-color:#f8d800;background:#2c2c00}
.shop-card.sold{opacity:.15;pointer-events:none}
.shop-emoji{font-size:22px}.shop-name{font-size:6px;color:#b8b8b8;margin:2px 0}.shop-cost{font-size:8px;color:#f8d800}
.shop-desc{font-size:5px;color:#787878;line-height:1.5}
.btn{display:inline-block;padding:10px 14px;margin:3px;font-size:8px;font-family:'Press Start 2P',monospace;background:#1c1c1c;color:#fcfcfc;border:2px solid #585858;cursor:pointer;transition:all .15s;letter-spacing:1px;min-height:36px}
.btn:hover{border-color:#f8d800;color:#fff;background:#2c2c00}.btn:disabled{opacity:.2;cursor:default}
.btn-gold{background:#a87000;color:#fcfcfc;border-color:#f8d800}
.btn-gold:hover{background:#f8d800;color:#000}
.btn-red{background:#a80000;color:#fcfcfc;border-color:#f83800}
.remove-grid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0}
.remove-card{background:#1c0000;border:2px solid #580000;cursor:pointer;font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.remove-card:hover{border-color:#f83800;background:#380000}
.poison-indicator{color:#6828b0;font-size:5px}
#particles{position:fixed;inset:0;pointer-events:none;z-index:40}
.title-glow{animation:titleGlow 2s ease-in-out infinite alternate}
@keyframes titleGlow{0%{text-shadow:0 0 6px rgba(248,216,0,.2)}100%{text-shadow:0 0 16px rgba(248,216,0,.5)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:#585858}
@keyframes dmgFlash{0%{background:#380000}100%{background:transparent}}.dmg-flash{animation:dmgFlash .25s}
.float-num{position:absolute;pointer-events:none;font-family:'Press Start 2P',monospace;font-size:10px;z-index:50;animation:floatUp 1.1s ease-out forwards;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}40%{opacity:1;transform:translateY(-18px) scale(1.15)}100%{opacity:0;transform:translateY(-45px) scale(.8)}}
.combo-announce{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:1002;font-family:'Press Start 2P',monospace;font-size:22px;pointer-events:none;animation:comboIn .9s ease-out forwards;text-shadow:0 0 12px currentColor,2px 2px 0 #000}
@keyframes comboIn{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}30%{transform:translate(-50%,-50%) scale(1)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(.7) translateY(-20px)}}
@keyframes hpPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px #f04040,inset 0 0 4px #f04040}}.hp-pulse .stat-bar{animation:hpPulse .8s infinite}
@keyframes critBorder{0%{box-shadow:inset 0 0 60px rgba(255,255,255,.6)}100%{box-shadow:none}}.crit-border{animation:critBorder .3s ease-out}
@keyframes bossEntrance{0%{filter:brightness(0)}50%{filter:brightness(0)}100%{filter:brightness(1)}}.boss-enter{animation:bossEntrance .8s ease-out}
@keyframes reelBounce{0%{transform:translateY(var(--final-y))}40%{transform:translateY(calc(var(--final-y) - 12px))}70%{transform:translateY(calc(var(--final-y) + 4px))}100%{transform:translateY(var(--final-y))}}.reel-bounce{animation:reelBounce .35s ease-out forwards}
@keyframes winFlashReel{0%,100%{border-color:#585858}50%{border-color:#f8d800;box-shadow:0 0 12px rgba(248,216,0,.5)}}.win-reels .reel-container{animation:winFlashReel .3s ease-out 2}
.char-card{background:#1c1c1c;border:2px solid #383838;padding:10px;cursor:pointer;text-align:center;width:100%;margin:4px 0;transition:all .15s;min-height:44px}
.char-card:hover{border-color:#f8d800;background:#2c2c00}
.char-card .cname{font-size:9px;color:#f8d800;margin:4px 0}.char-card .desc{font-size:7px;color:#b8b8b8;line-height:1.8}
.perk-card{background:#1c1c1c;border:2px solid #383838;padding:8px;cursor:pointer;text-align:center;width:100%;margin:4px 0;transition:all .15s;min-height:44px}
.perk-card:hover{border-color:#00a800;background:#001c00}
.perk-card .pname{font-size:8px;color:#00a800;margin:3px 0}.perk-card .desc{font-size:6px;color:#b8b8b8;line-height:1.6}
.streak-bar{font-size:8px;color:#f87858;text-align:center;padding:2px;min-height:12px}
.event-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1001;font-size:16px;color:#f8d800;text-shadow:0 0 12px rgba(248,216,0,.5);animation:bannerPop 1.5s forwards;pointer-events:none}
@keyframes bannerPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}30%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%)}}
.charm-card{background:#1c001c;border:2px solid #a040a0;padding:8px;cursor:pointer;text-align:center;width:100%;margin:4px 0;transition:all .15s;min-height:44px}
.charm-card:hover{border-color:#e060e0;background:#2c002c}
.charm-card.rare{border-color:#f0d040;background:#1c1c00}
.charm-card.rare:hover{border-color:#f8e860;background:#2c2c00}
.charm-card .cname{font-size:8px;color:#e060e0;margin:3px 0}.charm-card .cname.rare{color:#f0d040}
.charm-card .desc{font-size:6px;color:#b8b8b8;line-height:1.6}
.charm-card.selected{border-color:#f83800;background:#380000;box-shadow:0 0 8px rgba(248,56,0,.4)}
.charm-icon{font-size:12px;opacity:.7;cursor:help;border:1px solid #a040a0;padding:0 1px}
.charm-icon.rare{border-color:#f0d040}
.mult-line{color:#f0d040;font-size:7px;letter-spacing:1px}
.achv-grid{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:4px 0}
.achv-item{font-size:5px;padding:2px 4px;border:1px solid #383838;color:#585858;background:#0c0c0c}
.achv-item.earned{border-color:#00a800;color:#00a800;background:#001c00}
#vol-ctrl{display:flex;gap:4px;align-items:center;margin-left:auto;font-size:6px;color:#787878}
#vol-ctrl input[type=range]{width:32px;height:10px;vertical-align:middle;-webkit-appearance:none;background:#383838;outline:none;border-radius:0}
#vol-ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:12px;background:#f8d800;border:none;cursor:pointer}
#vol-ctrl button{background:#1c1c1c;border:1px solid #585858;color:#b8b8b8;font-family:'Press Start 2P',monospace;font-size:5px;padding:3px 5px;cursor:pointer}
#vol-ctrl button:hover{border-color:#f8d800;color:#fcfcfc}
</style>
</head>
<body>
<div id="app">
<div id="topbar">
 <span id="char-icon"></span>
 <span class="stat">HP<span id="hp-text" style="color:#f83800;margin:0 2px">20/20</span><div class="stat-bar"><div class="stat-fill" id="hp-fill" style="width:100%"></div></div></span>
 <span class="stat">SH<span id="shield-text" style="color:#0058f8;margin:0 2px">0</span></span>
 <span class="stat">GP<span id="gold-text" style="color:#f8d800;margin:0 2px">0</span></span>
 <span class="stat">LV<span id="lvl-text" style="color:#6828b0;margin:0 2px">1</span></span>
 <span class="stat poison-indicator" id="poison-stat" style="display:none">PSN<span id="poison-text" style="margin-left:1px">0</span></span>
 <span class="stat" id="target-stat">TGT<span id="target-text" style="color:#f8d800;margin:0 2px">0</span></span>
 <span class="stat" id="spin-stat">SP<span id="spin-text" style="color:#00a800;margin:0 2px">8</span></span>
 <span class="floor-ind">F-<span id="floor-num">1</span></span>
 <span id="vol-ctrl">
  SFX<input type="range" id="sfx-vol" min="0" max="100" value="40" oninput="sfxVol=this.value/100">
  MUS<input type="range" id="mus-vol" min="0" max="100" value="60" oninput="musVol=this.value/100;if(musicGain)musicGain.gain.value=musVol*.04">
  <button id="music-btn" onclick="toggleMusic()">ON</button>
 </span>
</div>
<div id="xp-bar"><div id="xp-fill"></div></div>
<div id="enemies"></div>
<div id="machine">
 <div class="machine-label">ROGUE SLOTS</div>
 <div class="slot-frame" id="slot-frame"><div class="payline"></div><div class="payline-dim payline-top"></div><div class="payline-dim payline-bottom"></div></div>
</div>
<div class="streak-bar" id="streak-bar"></div>
<button id="spinbtn" onclick="spin()">SPIN</button>
<div id="perk-bar"></div>
<div id="results"></div>
</div>
<div id="overlay"><div class="panel" id="panel"></div></div>
<canvas id="particles"></canvas>
<script>

 const c=document.createElement('canvas');c.width=SPX;c.height=SPX;

 d.forEach(function(e){x.fillStyle=e[0];e[1].forEach(function(p){x.fillRect(p[0]*SS,p[1]*SS,(p[2]||1)*SS,(p[3]||1)*SS)})});
 return c.toDataURL();

function chip(f,d,t='square',v=.04){
 try{
  if(ACX.state==='suspended')ACX.resume();
  if(ACX.state!=='running')return;
  const o=ACX.createOscillator(),g=ACX.createGain();
  o.type=t;o.frequency.value=f;g.gain.value=v*sfxVol;
  g.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+d);
  o.connect(g);g.connect(ACX.destination);o.start();o.stop(ACX.currentTime+d);
 }catch(e){}
}

let currentTrack='battle',beatIdx=0;
function startMusic(){
 if(musicInterval)clearInterval(musicInterval);if(!musicOn)return;
 if(ACX.state!=='running')return;
 try{
  musicGain=ACX.createGain();musicGain.gain.value=musVol*.08;musicGain.connect(ACX.destination);
 }catch(e){return}
 beatIdx=0;const t=TRACKS[currentTrack];if(!t)return;
 const ms=Math.floor(60000/t.bpm);
 musicInterval=setInterval(()=>{
  if(!musicOn||ACX.state!=='running')return;
  try{
   const i=beatIdx%t.mel.length;
   // Melody (pulse/square)
   if(t.mel[i]>0){
    const o1=ACX.createOscillator(),g1=ACX.createGain();
    o1.type='square';o1.frequency.value=t.mel[i];g1.gain.value=.06;
    g1.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+ms/1200);
    o1.connect(g1);g1.connect(musicGain);o1.start();o1.stop(ACX.currentTime+ms/1200);
   }
   // Bass (triangle)
   if(t.bas[i]>0){
    const o2=ACX.createOscillator(),g2=ACX.createGain();
    o2.type='triangle';o2.frequency.value=t.bas[i];g2.gain.value=.05;
    g2.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+ms/800);
    o2.connect(g2);g2.connect(musicGain);o2.start();o2.stop(ACX.currentTime+ms/800);
   }
   // Kick drum on beats 0,4,8,12...
   if(i%8===0){
    const o3=ACX.createOscillator(),g3=ACX.createGain();
    o3.type='sine';o3.frequency.value=120;o3.frequency.exponentialRampToValueAtTime(30,ACX.currentTime+.08);
    g3.gain.value=.08;g3.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+.1);
    o3.connect(g3);g3.connect(musicGain);o3.start();o3.stop(ACX.currentTime+.1);
   }
   // Snare on 4,12,20,28...
   if(i%8===4){
    const n=ACX.createBufferSource(),buf=ACX.createBuffer(1,ACX.sampleRate*.06,ACX.sampleRate),dd=buf.getChannelData(0);
    for(let j=0;j<dd.length;j++)dd[j]=(Math.random()*2-1)*Math.max(0,1-j/dd.length);
    n.buffer=buf;const gn=ACX.createGain();gn.gain.value=.06;n.connect(gn);gn.connect(musicGain);n.start();
   }
   // Hi-hat on every other beat
   if(i%2===0){
    const n=ACX.createBufferSource(),buf=ACX.createBuffer(1,ACX.sampleRate*.015,ACX.sampleRate),dd=buf.getChannelData(0);
    for(let j=0;j<dd.length;j++)dd[j]=(Math.random()*2-1)*Math.max(0,1-j/dd.length)*.4;
    n.buffer=buf;const gn=ACX.createGain();gn.gain.value=.03;n.connect(gn);gn.connect(musicGain);n.start();
   }
   beatIdx++;
  }catch(e){}
 },ms);
}

function isClassUnlocked(c){
 if(!c.unlock)return true;
 var u=c.unlock;
 if(u.type==='floor')return meta.bestFloor>=u.val;
 if(u.type==='kills')return(meta.totalKills||0)>=u.val;
 if(u.type==='reels')return(meta.maxReelsEver||0)>=u.val;
 if(u.type==='jackpots')return(meta.totalJackpots||0)>=u.val;
 if(u.type==='charms')return(meta.maxCharmsEver||0)>=u.val;
 return true;
}
function getUnlocked(){
 let u=new Set(BASE_SYMBOLS);
 for(let[f,syms]of Object.entries(UNLOCK_MAP)){if(meta.bestFloor>=+f||meta.unlocked.includes(+f))syms.forEach(s=>u.add(s))}
 return[...u];
}

const pC=document.getElementById('particles'),pX=pC.getContext('2d');
let parts=[];
function resP(){pC.width=innerWidth;pC.height=innerHeight}
resP();addEventListener('resize',resP);
function addP(x,y,col,n=5){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*4.5,vy:(Math.random()-.5)*4.5-1.5,life:1,color:col,size:Math.floor(Math.random()*3+2)})}
function updP(){
 pX.clearRect(0,0,pC.width,pC.height);
 parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.018;if(p.life<=0)return false;
  pX.globalAlpha=p.life;pX.fillStyle=p.color;pX.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);return true});
 pX.globalAlpha=1;if(parts.length)requestAnimationFrame(updP);
}
function spawnP(el,col,n=8){if(!el)return;const r=el.getBoundingClientRect();addP(r.left+r.width/2,r.top+r.height/2,col,n);if(parts.length<=n)requestAnimationFrame(updP)}

function gainXP(amt){
 if(G.perkFlags.xpBoost)amt=Math.floor(amt*(1+G.perkFlags.xpBoost));
 G.xp+=amt;
 while(G.xp>=G.xpNeeded){G.xp-=G.xpNeeded;G.level++;G.xpNeeded=Math.floor(G.xpNeeded*1.3);
  G.maxHp+=2;G.hp=Math.min(G.hp+2,G.maxHp);G.gold+=3;SFX.lvl();showBanner(`LV ${G.level}!`);log(`LEVEL UP! LV${G.level} +2 MAX HP +3 GP`,'res-xp')}
 updateUI();
}

 document.getElementById('hp-fill').style.background=hp<.25?'#f04040':hp<.5?'#f0a040':'#e04040';

 document.getElementById('gold-text').textContent=G.gold;
 document.getElementById('floor-num').textContent=G.floor;
 document.getElementById('lvl-text').textContent=G.level;

 if(G.charClass){const ci=document.getElementById('char-icon');ci.innerHTML=SC[G.charClass.icon]?`<img src="${SC[G.charClass.icon]}" style="width:24px;height:24px;image-rendering:pixelated">`:G.charClass.icon}
 const ps=document.getElementById('poison-stat');
 if(G.poison>0){ps.style.display='';document.getElementById('poison-text').textContent=G.poison}else ps.style.display='none';
 document.getElementById('target-text').textContent=(G.goldThisFloor||0)+'/'+(G.floorTarget||0);
 document.getElementById('spin-text').textContent=G.spinsLeft!=null?G.spinsLeft:'?';
 document.getElementById('perk-bar').innerHTML=G.perks.map(p=>`<span class="perk-icon" title="${p.name}: ${p.desc}">${iconImg(p.icon,16)}</span>`).join('')+

 const sb=document.getElementById('streak-bar');

function renderEnemies(){

  const d=document.createElement('div');d.className='enemy-row'+(e.hp<=0?' dead':'')+(i===0&&e.hp>0?' targeted':'');d.id='enemy-'+i;

function spawnEnemies(){
 G.enemies=[];G.floorFlags={};
 const isBoss=G.floor%5===0;
 // Floor event (20% chance on non-boss)
 if(!isBoss&&G.floor>1&&Math.random()<.28){
  const ev=FLOOR_EVENTS[Math.floor(Math.random()*FLOOR_EVENTS.length)];
  ev.apply(G);showBanner(ev.name);log(`EVENT: ${ev.name} - ${ev.desc}`,'res-combo');
 }
 if(isBoss){
  const bi=Math.min(Math.floor(G.floor/5)-1,BOSSES.length-1);
  let b={...BOSSES[bi]};b.maxHp=b.hp+G.floor*2;b.hp=b.maxHp;b.poison=0;b.shield=0;b.frozen=0;
  if(G.floorFlags.bloodMoon){b.atk=Math.ceil(b.atk*1.5);b.xp=Math.ceil(b.xp*1.5)}
  G.enemies.push(b);log(`${b.name}: "${b.quip}"`,'res-enemy');setTrack('boss');SFX.boss();bossEntranceEffect();
 } else {
  const count=Math.min(4,1+Math.floor(G.floor/3));
  const pool=ENEMIES.filter((_,i)=>i<Math.min(ENEMIES.length,3+Math.floor(G.floor/2)));
  for(let i=0;i<count;i++){
   const t=pool[Math.floor(Math.random()*pool.length)];
   const sc=1+G.floor*.1;
   let e={...t};e.maxHp=Math.ceil(t.hp*sc);e.hp=e.maxHp;e.atk=Math.ceil(t.atk*(1+G.floor*.04));e.poison=0;e.shield=0;e.frozen=0;
   if(G.floorFlags.bloodMoon){e.atk=Math.ceil(e.atk*1.5);e.xp=Math.ceil((e.xp||3)*1.5)}
   G.enemies.push(e);
   if(i===0&&e.quip)log(`${e.name}: "${e.quip}"`,'res-info');
  }
  setTrack('battle');
 }
 // Gold target & spins
 G.goldThisFloor=0;
 G.floorTarget=Math.floor(3+G.floor*2.5);
 var spCtx={};G.charms.forEach(function(c){if(c.apply)c.apply(G,spCtx)});
 if(spCtx.targetReduce)G.floorTarget=Math.max(1,Math.ceil(G.floorTarget*(1-spCtx.targetReduce)));
 G.spinsLeft=Math.min(18,10+Math.floor(G.floor/3))+(spCtx.extraSpins||0);
 if(G.charClass&&G.charClass.spinBonus)G.spinsLeft+=G.charClass.spinBonus;
 G.deathDefyUsed=false;
 if(G.perkFlags.shieldWall)G.shield+=G.perkFlags.shieldWall;
 if(G.charClass&&G.charClass.shieldRegen)G.shield+=G.charClass.shieldRegen;
 if(G.perkFlags.payday){G.gold+=G.perkFlags.payday;log(`PAYDAY +${G.perkFlags.payday} GP`,'res-gold')}
 if(G.perkFlags.coffeeBreak&&G.floor>1){G.hp=G.maxHp;log('COFFEE! Full heal.','res-heal')}
 if(G.perkFlags.scavenger){const s=ALL_SHOP[Math.floor(Math.random()*ALL_SHOP.length)];const _uc=new Set(G.reels.flat()).size;if(_uc<10||G.reels.flat().includes(s)){G.reels[Math.floor(Math.random()*G.reels.length)].push(s);log(`Found ${s}!`,'res-combo')}else{log('SCAVENGE: Inventory full!','res-info')}}
 if(G.relics.some(r=>r.effect==='ironBoot'))G.floorFlags.ironBootActive=true;
 if(G.relics.some(r=>r.effect==='upgrade')){
  const ri=Math.floor(Math.random()*G.reels.length);const reel=G.reels[ri];
  const weak=reel.findIndex(s=>SYMS[s]&&SYMS[s].tier===0);
  if(weak!==-1){const better=ALL_SHOP.filter(s=>SYMS[s]&&SYMS[s].tier>=1);
   if(better.length){const ns=better[Math.floor(Math.random()*better.length)];reel[weak]=ns;log(`SHROOM: ${reel[weak]}→${ns}`,'res-combo')}}
 }

// ═══ SPIN ═══
const SYM_H=50;
function spin(){
 if(G.spinning||G.phase!=='battle'||aliveEnemies().length===0)return;
 if(G.spinsLeft<=0){outOfSpins();return}
 G.spinning=true;G.spinCount++;G.totalSpins++;G.spinsLeft--;
 document.getElementById('spinbtn').disabled=true;
 document.getElementById('results').innerHTML='';
 SFX.spin();
 if(G.perkFlags.regen&&G.spinCount%3===0){G.hp=Math.min(G.maxHp,G.hp+1);log('REGEN +1','res-heal')}
 if(G.relics.some(r=>r.effect==='hourglass')&&G.spinCount%5===0){aliveEnemies().forEach(e=>{if(e.atk>1)e.atk--});log('HOURGLASS: enemy ATK -1','res-info')}

 function pickSym(pool){
  if(G.relics.some(r=>r.effect==='weightedReels')&&Math.random()<.15){
   const best=pool.filter(s=>SYMS[s]&&(SYMS[s].dmg||SYMS[s].dmgAll));
   if(best.length)return best[Math.floor(Math.random()*best.length)];
  }
  return pool[Math.floor(Math.random()*pool.length)];
 }
 G.reelResults=G.reels.map(pool=>pickSym(pool));
 G.topResults=G.reels.map(pool=>pickSym(pool));
 G.botResults=G.reels.map(pool=>pickSym(pool));
 if(G.perkFlags.lucky7&&Math.random()<.08){const s=G.reelResults[0];G.reelResults=G.reelResults.map(()=>s)}

 const rc=G.reels.length;let stopped=0;
 G.reels.forEach((_,i)=>{
  const strip=document.getElementById('strip-'+i),pool=G.reels[i];
  const extra=10+i*3;let syms=[];
  for(let j=0;j<extra;j++)syms.push(pool[Math.floor(Math.random()*pool.length)]);
  // last 3 symbols are the final visible: top, middle(main), bottom
  syms.push(G.topResults[i]);
  syms.push(G.reelResults[i]);
  syms.push(G.botResults[i]);
  strip.innerHTML='';strip.className='reel-strip';
  syms.forEach(s=>{const d=document.createElement('div');d.className='reel-symbol';d.innerHTML=symImg(s);strip.appendChild(d)});
  strip.style.transform='translateY(0)';
  const tH=syms.length*SYM_H,tY=-(tH-SYM_H*3),dur=(16+i*6)*16;
  const finalY=tY;
  strip.style.transition='none';let st=null;
  function anim(t){
   if(!st)st=t;const p=Math.min(1,(t-st)/dur);
   strip.style.transform=`translateY(${finalY*(p<.8?p/.8:1)}px)`;
   if(p<1)requestAnimationFrame(anim);
   else{
    strip.style.setProperty('--final-y',finalY+'px');
    strip.classList.add('reel-bounce');
    setTimeout(()=>strip.classList.remove('reel-bounce'),400);
    SFX.stop(i);
    document.getElementById('glow-'+i).classList.add('active');setTimeout(()=>document.getElementById('glow-'+i).classList.remove('active'),350);
    stopped++;if(stopped===rc)setTimeout(resolveResults,280)}
  }
  setTimeout(()=>requestAnimationFrame(anim),i*240);
 });
}

// ═══ RESOLVE ═══
function resolveLine(R,mul,label,ctx){
 let tDmg=0,tHeal=0,tGold=0,tShield=0,crystB=0,refreshR=[];

 // Wild Card charm: 1 random symbol becomes WILD (copy of most common)
 if(ctx&&ctx.wildCard){
  var wi=Math.floor(Math.random()*R.length);
  var freq0={};R.forEach(function(s){if(SYMS[s]&&!SYMS[s].special)freq0[s]=(freq0[s]||0)+1});
  var mc0=R[0],mf0=0;for(var kk in freq0)if(freq0[kk]>mf0){mf0=freq0[kk];mc0=kk}
  R[wi]=mc0;
 }

 // Combo King charm: doubles count as triples
 var comboUpActive=ctx&&ctx.comboUp;
 // High Roller class: all matches count +1 tier
 var matchBoostActive=G.charClass&&G.charClass.matchBoost;

 // Joker
 var freq={};R.forEach(function(s){if(SYMS[s]&&!SYMS[s].special)freq[s]=(freq[s]||0)+1});
 var mc=R[0],mf=0;for(var ss in freq)if(freq[ss]>mf){mf=freq[ss];mc=ss}
 R=R.map(function(s){return s==='🎪'?mc:s});

 // Magnet
 R=R.map(function(s,i){if(s==='🧲'&&i>0)return R[i-1];return s});

 var hasJP=false,hasCrown=false;
 R.forEach(function(s){if(s==='🔮')crystB++;if(s==='🎰')hasJP=true;if(s==='👑')hasCrown=true});
 if(G.charClass&&G.charClass.magicBonus)crystB+=G.charClass.magicBonus;
 if(G.floorFlags.curseDmg)crystB+=G.floorFlags.curseDmg;

 // Clover + crit
 var spinCrit=(G.charClass&&G.charClass.crit||0)+(G.floorFlags.luckyCrit||0);
 R.forEach(function(s){if(s==='🍀')spinCrit+=.05});
 var isCrit=Math.random()<spinCrit;
 var critMul=isCrit?(ctx&&ctx.critX5?5:G.relics.some(function(r){return r.effect==='critX4'})?4:3):1;
 if(isCrit){log('!! CRITICAL !!','res-crit');SFX.crit();screenFlash('#ff4080');critBorderFlash()}

 // Bell
 var bellBonus=0;R.forEach(function(s){if(s==='🔔')bellBonus+=2});
 if(bellBonus)log('BELL! +'+bellBonus+' to all','res-combo');

 // Counts & matches
 var counts={};R.forEach(function(s){counts[s]=(counts[s]||0)+1});
 var rainbows=counts['🌈']||0;
 var matchMul=G.floorFlags.gamblerParadise?3:1;
 var matchTier=0;
 // Multiplier system
 var globalMult=1.0;
 var multLog='MULT x1.0';
 for(var sym2 in counts){
  var cc=counts[sym2];
  var eff=cc+(sym2!=='🌈'?rainbows:0);
  if((comboUpActive||matchBoostActive)&&eff===2)eff=3;
  if(eff>=3&&matchMul<3){matchMul=3;matchTier=2;log('>>> TRIPLE '+(SYMS[sym2]?SYMS[sym2].name:sym2)+'! x3 <<<','res-combo');SFX.combo();spawnP(document.getElementById('slot-frame'),'#e060f0',18);screenFlash('#a040f0');
   globalMult+=2;multLog+=' -> x'+globalMult.toFixed(1)+' (triple)'}
  else if(eff>=2&&matchMul<1.5&&!G.floorFlags.gamblerParadise){matchMul=1.5;matchTier=1;log('>> DOUBLE '+(SYMS[sym2]?SYMS[sym2].name:sym2)+'!','res-combo');
   globalMult+=0.5;multLog+=' -> x'+globalMult.toFixed(1)+' (double)'}
 }
 // Unique symbol bonus to mult
 var uniqSyms=Object.keys(counts).length;
 globalMult+=uniqSyms*0.1;
 multLog+=' -> x'+globalMult.toFixed(1)+' ('+uniqSyms+' uniq)';
 // Crystal adds to mult
 if(crystB>0){globalMult+=crystB;multLog+=' -> x'+globalMult.toFixed(1)+' (crystal)'}

 var jpMul=1;
 if(hasJP&&matchMul>=3){jpMul=3;globalMult*=2;multLog+=' -> x'+globalMult.toFixed(1)+' (JACKPOT)';log('!!! JACKPOT x3 !!!','res-combo');shake();screenFlash('#f0d040');spawnP(document.getElementById('slot-frame'),'#f0d040',25);
  document.getElementById('spinbtn').classList.add('win-flash');setTimeout(function(){document.getElementById('spinbtn').classList.remove('win-flash')},1200);
  meta.totalJackpots=(meta.totalJackpots||0)+1;saveMeta();checkAchievement('jackpot')}

 if(globalMult>1.0)log(multLog,'mult-line');

 // Combo master
 var comboB=G.perkFlags.comboMaster?G.streak:0;
 var berserkB=(G.perkFlags.berserker?Math.floor((G.maxHp-G.hp)/4):0)+(G.charClass&&G.charClass.id==='berserker'?Math.floor((G.maxHp-G.hp)/4)*2:0);
 var spenderB=G.perkFlags.bigSpender?Math.floor(G.gold/15):0;
 var lastM=G.perkFlags.lastStand&&G.hp<=5?2:1;

 // Glass Cannon charm
 var dmgMultCharm=(ctx&&ctx.dmgX2)?2:1;

 // Bullseye
 var mults=R.map(function(){return 1});
 R.forEach(function(s,i){if(s==='🎯'&&i<R.length-1)mults[i+1]*=2});

 var greedB=G.perkFlags.greed||0;
 var healMul=1+(G.charClass&&G.charClass.healBonus||0);
 var goldFloorMul=(G.floorFlags.goldX2?2:1)*(G.floorFlags.greedFloor?3:1);
 var crownMul=hasCrown?1.5:1;
 var charmGoldMult=(ctx&&ctx.goldMult)?ctx.goldMult:1;

 // Apply global multiplier to final values
 var gM=globalMult;

 R.forEach(function(sym,i){
  var defOrig=SYMS[sym];if(!defOrig)return;
  // Apply upgrade multiplier
  var upLvl=G.upgrades[sym]||0;
  var upMult=1+upLvl*0.5;
  var def={};for(var _k in defOrig)def[_k]=defOrig[_k];
  if(upLvl>0){if(def.dmg)def.dmg=Math.ceil(def.dmg*upMult);if(def.heal)def.heal=Math.ceil(def.heal*upMult);if(def.gold)def.gold=Math.ceil(def.gold*upMult);if(def.shield)def.shield=Math.ceil(def.shield*upMult);if(def.dmgAll)def.dmgAll=Math.ceil(def.dmgAll*upMult)}
  var m=mults[i]*matchMul*jpMul*critMul*lastM*mul*dmgMultCharm;
  var dmgExtra=berserkB+spenderB+comboB+bellBonus+crystB;
  // Sword bonus from charm
  var swordExtra=0,swordCost=0;
  if(ctx&&ctx.swordBonus&&sym==='🗡️'){swordExtra=ctx.swordBonus;swordCost=ctx.swordCost||0}

  if(def.dmg){
   var d=def.dmg+swordExtra;
   if(def.adjGlobal&&def.adj)d+=def.adjBonus*(counts[sym]-1);
   else if(def.adj){if(i>0&&R[i-1]===def.adj)d+=def.adjBonus;if(i<R.length-1&&R[i+1]===def.adj)d+=def.adjBonus}
   d=(d+dmgExtra)*m;d=Math.floor(d*gM);
   // Paladin holy damage: x2 vs undead
   if(G.charClass&&G.charClass.holyDmg){var _tgtCheck=aliveEnemies()[0];if(_tgtCheck&&_tgtCheck.tags&&_tgtCheck.tags.includes('undead')){d=d*2;log('HOLY! x2 vs UNDEAD!','res-crit')}}
   if(def.special==='bone'){if(aliveEnemies().some(function(e){return e.tags&&e.tags.includes('undead')})){d+=4;log('BONE vs UNDEAD! +4!','res-crit')}}
   if(def.special==='snipe'){var ae=aliveEnemies();var tgt=ae.length>1?ae[ae.length-1]:ae[0];
    if(tgt){dealDmg(tgt,d);tDmg+=d;log(label+d+'->'+tgt.name+' (back)','res-dmg')}}
   else{tDmg+=d;var tgt2=aliveEnemies()[0];if(tgt2){dealDmg(tgt2,d);log(label+d+'->'+tgt2.name,'res-dmg')}}
   if(G.perkFlags.poisonTip&&Math.random()<.2){var tgt3=aliveEnemies()[0];if(tgt3){tgt3.poison+=2;log('POISON TIP!','res-dmg')}}
   if(def.special==='freeze'){var tgt4=aliveEnemies()[0];if(tgt4){tgt4.frozen=2;log(tgt4.name+' FROZEN!','res-shield')}}
   if(swordCost>0){G.hp-=swordCost;log('BLOOD BLADE: -'+swordCost+' HP','res-enemy')}
   // Tax collector charm
   if(ctx&&ctx.taxGold){G.gold+=ctx.taxGold;tGold+=ctx.taxGold;G.goldThisFloor+=ctx.taxGold}
  }
  if(def.dmgAll){var d2=Math.floor((def.dmgAll+(G.perkFlags.bombBonus||0)+dmgExtra)*m*gM);
   var fireTargets=aliveEnemies();
   if(ctx&&ctx.fireAll&&sym==='🔥')fireTargets=aliveEnemies();
   fireTargets.forEach(function(e){dealDmg(e,d2)});log(label+d2+'->ALL!','res-dmg');tDmg+=d2*fireTargets.length;shake();screenFlash('#f06060');
   if(ctx&&ctx.taxGold){var taxAmt=ctx.taxGold*fireTargets.length;G.gold+=taxAmt;tGold+=taxAmt;G.goldThisFloor+=taxAmt}}
  // Shield bash charm
  if(def.shield){var sh=Math.floor(def.shield*m*gM);tShield+=sh;G.shield+=sh;
   if(ctx&&ctx.shieldDmg){var tgtS=aliveEnemies()[0];if(tgtS){var shd=Math.floor(ctx.shieldDmg*gM);dealDmg(tgtS,shd);tDmg+=shd;log('SHIELD BASH '+shd+'->'+tgtS.name,'res-dmg')}}}
  if(def.heal){var h=Math.floor(def.heal*m*healMul*gM);tHeal+=h;G.hp=Math.min(G.maxHp,G.hp+h);
   // Heart breaker charm
   if(ctx&&ctx.heartDmg&&sym==='❤️'){var tgtH=aliveEnemies()[0];if(tgtH){var hd=Math.floor(ctx.heartDmg*gM);dealDmg(tgtH,hd);tDmg+=hd;log('HEART BREAKER '+hd+'->'+tgtH.name,'res-dmg')}}}
  if(def.gold){var g=Math.floor((def.gold+greedB)*m*goldFloorMul*crownMul*charmGoldMult*gM);tGold+=g;G.gold+=g;G.goldThisFloor+=g}
  if(!def.shield&&!def.heal&&!def.gold){}// already handled
  if(def.selfDmg){var sd=Math.ceil(def.selfDmg*mul);G.hp-=sd;log('costs '+sd+' HP','res-enemy')}

  if(def.special==='star'){var u=new Set(R).size;var d3=Math.floor((u+dmgExtra)*m*gM);tDmg+=d3;var tgtSt=aliveEnemies()[0];if(tgtSt){dealDmg(tgtSt,d3);log('STAR '+u+' unique='+d3,'res-dmg')}}
  if(def.special==='poison'){
   var poisonTargets=aliveEnemies();
   if(ctx&&ctx.fireAll&&sym==='🔥')poisonTargets=aliveEnemies();
   poisonTargets.forEach(function(e){e.poison+=3;log(e.name+' poisoned!','res-dmg')})}
  if(def.special==='lightning'){var d4=Math.floor((2+dmgExtra)*m*gM);var ae2=aliveEnemies();for(var c2=0;c2<Math.min(3,ae2.length);c2++){var t2=ae2[Math.floor(Math.random()*ae2.length)];dealDmg(t2,d4);tDmg+=d4;log('BOLT->'+t2.name+' '+d4,'res-dmg');d4=Math.max(1,Math.floor(d4*.7))}}
  if(def.special==='coin'){var g2=Math.floor((G.spinCount+greedB)*m*goldFloorMul*crownMul*charmGoldMult*gM);tGold+=g2;G.gold+=g2;G.goldThisFloor+=g2;log('COIN +'+g2+' GP','res-gold')}
  if(def.special==='moon'){var d5=Math.floor((G.shield+dmgExtra)*m*gM);if(d5>0){var t3=aliveEnemies()[0];if(t3){dealDmg(t3,d5);tDmg+=d5;log('MOON '+d5+' ('+G.shield+'SH)','res-dmg')}}}
  if(def.special==='tornado'){G.enemies.sort(function(){return Math.random()-.5});log('TORNADO! Shuffled!','res-info')}
  if(def.special==='drain'){var t4=aliveEnemies()[0];if(t4){var d6=Math.min(3,t4.hp);dealDmg(t4,d6);G.hp=Math.min(G.maxHp,G.hp+d6);tDmg+=d6;tHeal+=d6;log('DRAIN '+d6+' from '+t4.name,'res-dmg')}}
  if(def.special==='lootbox'){
   var r=Math.random();
   if(r<.15){var g3=Math.floor((Math.random()*20+5)*goldFloorMul*charmGoldMult);G.gold+=g3;tGold+=g3;G.goldThisFloor+=g3;log('LOOT: '+g3+' GP!','res-gold')}
   else if(r<.3){var h2=Math.floor(Math.random()*6+3);G.hp=Math.min(G.maxHp,G.hp+h2);tHeal+=h2;log('LOOT: '+h2+' HP!','res-heal')}
   else if(r<.45){G.shield+=6;tShield+=6;log('LOOT: +6 SH!','res-shield')}
   else if(r<.65){var d7=Math.floor(Math.random()*10+5);var t5=aliveEnemies()[0];if(t5){dealDmg(t5,d7);tDmg+=d7;log('LOOT: '+d7+' DMG!','res-dmg')}}
   else if(r<.8){aliveEnemies().forEach(function(e){e.poison+=3});log('LOOT: Poison ALL!','res-dmg')}
   else{gainXP(5);log('LOOT: +5 XP!','res-xp')}
  }
  // Fire starter charm: fire hits ALL enemies
  if(ctx&&ctx.fireAll&&sym==='🔥'&&def.dmg&&!def.dmgAll){
   var fireD=Math.floor(def.dmg*m*gM);
   aliveEnemies().forEach(function(e,idx2){if(idx2>0){dealDmg(e,fireD);tDmg+=fireD}});
   log('FIRE SPREADS!','res-dmg');
  }
  if(mul>=1&&def.special==='refresh')refreshR.push(i);
 });

 // Vamp Fang charm: heal 1 per 10 DMG dealt
 if(ctx&&ctx.vampHeal&&tDmg>=10){var vh=Math.floor(tDmg/10);G.hp=Math.min(G.maxHp,G.hp+vh);tHeal+=vh;log('VAMP FANG +'+vh+' HP','res-heal')}
 // Vampire class: all attacks heal 1 HP
 if(G.charClass&&G.charClass.healOnHit&&tDmg>0){G.hp=Math.min(G.maxHp,G.hp+1);tHeal+=1;log('DRAIN +1 HP','res-heal')}

 return{tDmg:tDmg,tHeal:tHeal,tGold:tGold,tShield:tShield,refreshR:refreshR,matchTier:matchTier};
}

 // Note: goldThisFloor is already incremented per-symbol in resolveLine

 if(tDmg>0){SFX.hit();G.totalDmgDealt+=tDmg;shakeScale(tDmg);if(tDmg>=6)spawnP(document.getElementById('slot-frame'),'#f06060',Math.min(20,4+tDmg));winFlash()}
 if(tDmg>0)G.streak++;else G.streak=0;
 if(G.streak>G.bestStreak)G.bestStreak=G.streak;

 // Achievement: rich

 renderEnemies();updateUI();

 // Kill tracking

 G.enemies.forEach(function(e,i){

function dealDmg(e,d){
 if(e.shield>0){const b=Math.min(e.shield,d);e.shield-=b;d-=b}
 e.hp=Math.max(0,e.hp-d);
 const idx=G.enemies.indexOf(e),el=document.getElementById('enemy-'+idx);
 if(el){el.classList.remove('hit');void el.offsetWidth;el.classList.add('hit')}
}

// ═══ ENEMY TURN ═══
function enemyTurn(){
 let tTaken=0;
 aliveEnemies().forEach(e=>{
  if(e.poison>0){e.poison--;e.hp-=1;log(`${e.name} PSN`,'res-dmg');if(e.hp<=0){if(!e._dead){e._dead=true;G.kills++;meta.kills++;meta.totalKills++;gainXP(e.xp||3);if(G.perkFlags.vampiric){G.hp=Math.min(G.maxHp,G.hp+G.perkFlags.vampiric)}if(G.charClass?.id==='necro'){G.hp=Math.min(G.maxHp,G.hp+2)}}return}}
  if(e.hp<=0)return;
  if(e.frozen>0){e.frozen--;log(`${e.name} is FROZEN`,'res-shield');return}
  let dmg=e.atk;
  if(G.floorFlags.greedFloor)dmg=Math.ceil(dmg*1.5);
  if(e.ability==='dodge'&&Math.random()<.3){log(`${e.name} dodges!`,'res-info');return}
  if(e.ability==='phase'&&Math.random()<.4){log(`${e.name} phases!`,'res-info');return}
  if(e.ability==='confuse'&&Math.random()<.25){log(`${e.name} confuses you! Lost turn.`,'res-enemy');return}
  if(G.floorFlags.ironBootActive){G.floorFlags.ironBootActive=false;log('IRON BOOT! 0 DMG!','res-shield');return}
  if(G.perkFlags.armorReduce)dmg=Math.max(1,dmg-G.perkFlags.armorReduce);
  if(G.shield>0){const b=Math.min(G.shield,dmg);G.shield-=b;dmg-=b;if(b>0)log(`SH blocks ${b}`,'res-shield')}
  if(dmg>0){G.hp-=dmg;tTaken+=dmg;log(`${e.name} ATK ${dmg}`,'res-enemy');
   floatNum(document.getElementById('hp-text'),'-'+dmg+' HP','#f83800');
   if(G.perkFlags.thorns){const td=G.perkFlags.thorns;dealDmg(e,td);log(`THORNS ${td}!`,'res-dmg')}
   if(G.relics.some(r=>r.effect==='reflect')){const rd=Math.ceil(dmg*.25);dealDmg(e,rd);log(`REFLECT ${rd}!`,'res-dmg')}
  }
  if(e.ability==='poison'){G.poison+=2;log(`${e.name} poisons!`,'res-enemy')}
  if(e.ability==='lifesteal'){const h=Math.ceil(e.atk/2);e.hp=Math.min(e.maxHp,e.hp+h);log(`${e.name} drains ${h}`,'res-enemy')}
  if(e.ability==='shield'){e.shield+=2;log(`${e.name} +2SH`,'res-shield')}
  if(e.ability==='steal'&&dmg>0){const s=Math.min(G.gold,3);G.gold-=s;if(s>0)log(`${e.name} steals ${s}GP!`,'res-enemy')}
  if(e.ability==='complain'){e.atk+=1;log(`${e.name} ATK UP!`,'res-enemy')}
  if(e.ability==='regen'){const h=Math.ceil(e.maxHp*.05);e.hp=Math.min(e.maxHp,e.hp+h);log(`${e.name} regens ${h}`,'res-enemy')}
  if(e.ability==='split'&&e.hp>0&&e.hp<e.maxHp*.4&&!e._split){
   e._split=true;const baby={...e,hp:Math.ceil(e.maxHp*.3),maxHp:Math.ceil(e.maxHp*.3),name:'BABY',atk:Math.max(1,e.atk-1),_dead:false,_split:true};
   G.enemies.push(baby);log(`${e.name} SPLITS!`,'res-enemy');
  }
 });
 if(G.poison>0){G.hp-=G.poison;log(`PSN ${G.poison}`,'res-enemy');G.poison=Math.max(0,G.poison-1)}
 if(tTaken>0){SFX.taken();G.streak=0;G.killStreakNoDmg=0;if(tTaken>=4){shake();screenFlash('#f04040')};document.getElementById('app').classList.add('dmg-flash');setTimeout(()=>document.getElementById('app').classList.remove('dmg-flash'),250)}
 renderEnemies();updateUI();

 if(G.hp<=0){
  // Death defy charm
  var ddCtx={};G.charms.forEach(function(c){if(c.apply)c.apply(G,ddCtx)});
  if(ddCtx.deathDefy&&!G.deathDefyUsed){
   G.deathDefyUsed=true;G.hp=1;showBanner('DEATH DEFY!');log('DEATH DEFY! Survived lethal!','res-combo');SFX.relic();
   renderEnemies();updateUI();G.spinning=false;document.getElementById('spinbtn').disabled=false;return;
  }
  if(G.relics.some(function(r){return r.effect==='revive'})&&!G.reviveUsed){
   G.reviveUsed=true;G.hp=5;showBanner('REVIVED!');log('BLOOD VIAL! Revived with 5 HP!','res-combo');SFX.relic();
   G.relics=G.relics.filter(function(r){return r.effect!=='revive'});
   renderEnemies();updateUI();G.spinning=false;document.getElementById('spinbtn').disabled=false;return;
  }
  setTimeout(showDeath,400);return;
 }
 if(aliveEnemies().length===0){
  setTimeout(function(){SFX.win();log('CLEARED!','res-combo');screenFlash('#40e040');
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta()}
   for(var ff in UNLOCK_MAP){if(G.floor>=+ff&&!meta.unlocked.includes(+ff)){meta.unlocked.push(+ff);saveMeta()}}
   if(G.floor%5===0){G.bossKills++;checkAchievement('first_boss');showRelicChoice();}else showCharmChoice();
  },350);return;
 }
 G.spinning=false;document.getElementById('spinbtn').disabled=false;
}

// ═══ SHOP ═══
function showShop(){
 G.phase='shop';G.shield=0;setTrack('shop');SFX.shop();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 const unlocked=getUnlocked();const available=ALL_SHOP.filter(s=>unlocked.includes(s));
 const shopSize=G.relics.some(r=>r.effect==='bigShop')?6:5;
 let items=[],sold=[];
 function restock(){items=[...available].sort(()=>Math.random()-.5).slice(0,shopSize);sold=items.map(()=>false)}
 restock();
 const disc=G.charClass?.shopDiscount||0;
 const interestR=G.relics.some(r=>r.effect==='interest');
 if(interestR){const bonus=Math.floor(G.gold*.1);G.gold+=bonus;if(bonus>0)log(`INTEREST +${bonus} GP`,'res-gold')}
 const goldMagnet=G.relics.some(r=>r.effect==='goldMagnet');

 function render(){
  const cost=s=>{const t=SYMS[s]?.tier||0;const base=[8,18,28,40][t];return Math.floor(base*(1-disc))};
  var _symCount=new Set(G.reels.flat()).size;
  pn.innerHTML=`<h2>SHOP F${G.floor}</h2>
   <p style="font-size:5px;color:#8080a0;margin-bottom:3px">GP:<span style="color:#f0d040">${G.gold}</span> HP:${G.hp}/${G.maxHp} LV${G.level} REELS:${G.reels.length} SYMBOLS:${_symCount}/10</p>
   <h3>BUY SYMBOLS</h3>
   <div class="shop-grid">${items.map((s,i)=>{const c=cost(s),d=SYMS[s];
    return`<div class="shop-card${sold[i]?' sold':''}" onclick="buy(${i})">
     <div class="shop-emoji">${symImg(s)}</div><div class="shop-name">${d.name}</div>
     <div class="shop-desc">${d.desc}</div><div class="shop-cost">${c}G</div></div>`}).join('')}</div>
   <h3>REMOVE (5G)</h3>
   <div class="remove-grid" id="rmg">${[...new Set(G.reels.flat())].map(s=>`<div class="remove-card" data-sym="${s}">${iconImg(s,24)}</div>`).join('')}</div>
   <div style="margin-top:4px;display:flex;flex-wrap:wrap;justify-content:center;gap:2px">
    <button class="btn" onclick="heal()">HEAL ${Math.floor(15*(1-disc))}G</button>
    ${G.reels.length<5?`<button class="btn" onclick="addReel()">+REEL ${Math.floor(40*(1-disc))}G</button>`:''}
    <button class="btn" onclick="reroll()">REROLL 5G</button>
    <button class="btn" onclick="dupe()">DUPE 25G</button>
    <button class="btn btn-red" onclick="destroy()">DESTROY 0G</button>
    <button class="btn" onclick="showCombine()" style="border-color:#f0a040;color:#f0d040">COMBINE</button>
    ${G.charms.length>=2?'<button class="btn" onclick="showCharmSacrifice()" style="border-color:#a040a0;color:#e060e0">SACRIFICE</button>':''}
   </div>
   <button class="btn btn-gold" onclick="nextFloor()" style="margin-top:6px">NEXT FLOOR >></button>`;

  window.buy=i=>{if(sold[i])return;const s=items[i],c=cost(s);if(G.gold<c)return;
   var _uc2=new Set(G.reels.flat()).size;if(_uc2>=10&&!G.reels.flat().includes(s)){log('MAX 10 SYMBOLS! Remove one first.','res-info');return}
   G.gold-=c;sold[i]=true;
   G.reels[Math.floor(Math.random()*G.reels.length)].push(s);SFX.buy();render()};
  document.getElementById('rmg')?.addEventListener('click',ev=>{
   const c=ev.target.closest('.remove-card');if(!c)return;const s=c.dataset.sym;if(!s||G.gold<5)return;
   for(let r of G.reels){const i=r.indexOf(s);if(i!==-1&&r.length>3){r.splice(i,1);G.gold-=5;SFX.buy();render();return}}
  });
  window.heal=()=>{const c=Math.floor(15*(1-disc));if(G.gold<c)return;G.gold-=c;G.hp=G.maxHp;SFX.heal();render()};
  window.addReel=()=>{const c=Math.floor(40*(1-disc));if(G.gold<c||G.reels.length>=5)return;G.gold-=c;G.reels.push([...BASE_SYMBOLS]);meta.maxReelsEver=Math.max(meta.maxReelsEver||0,G.reels.length);saveMeta();SFX.buy();render()};
  window.reroll=()=>{if(G.gold<5)return;G.gold-=5;restock();SFX.buy();render()};
  window.dupe=()=>{if(G.gold<25)return;const all=[...new Set(G.reels.flat())];if(all.length<=0)return;const p=all[Math.floor(Math.random()*all.length)];
   G.gold-=25;for(let r of G.reels)r.push(p);log(`DUPED ${p}!`,'res-combo');SFX.buy();render()};
  window.destroy=()=>{
   const all=[...new Set(G.reels.flat())];if(all.length<=3)return;
   const worst=all.filter(s=>SYMS[s]&&SYMS[s].tier===0);const pick=worst.length?worst[Math.floor(Math.random()*worst.length)]:all[Math.floor(Math.random()*all.length)];
   let removed=0;for(let r of G.reels){const i=r.indexOf(pick);if(i!==-1&&r.length>3){r.splice(i,1);removed++}}
   log(`DESTROYED ${pick} (${removed}x)`,'res-dmg');SFX.taken();render()};
 }
 render();
}

window.showCombine=function(){

  '<div class="shop-grid">'+combinable.map(function(e){
   var s=e[0],c=e[1];
   var lvl=(G.upgrades[s]||0)+1;

   return'<div class="shop-card" onclick="doCombine(\''+s.replace(/'/g,"\\'")+'\')">'+
    '<div class="shop-emoji">'+symImg(s)+'</div>'+
    '<div class="shop-name">'+(defn?defn.name:'?')+' +'+lvl+'</div>'+

};

window.doCombine=function(sym){
 var removed=0;
 for(var ri=0;ri<G.reels.length;ri++){
  var r=G.reels[ri];
  while(removed<2){
   var idx=r.indexOf(sym);
   if(idx===-1)break;
   r.splice(idx,1);
   removed++;
  }
  if(removed>=2)break;
 }
 if(removed<2)return;
 G.upgrades[sym]=(G.upgrades[sym]||0)+1;
 G.reels[Math.floor(Math.random()*G.reels.length)].push(sym);
 SFX.lvl();
 log('COMBINED! '+(SYMS[sym]?SYMS[sym].name:'?')+' +'+G.upgrades[sym],'res-combo');
 showShop();
};

 pn.innerHTML=`<h2 style="color:#f04040">GAME OVER</h2>
  <div style="margin:6px">${iconImg('💀',40)}</div>
  <p style="font-size:6px;margin:4px 0">FLOOR <span style="color:#f0d040">${G.floor}</span> | LV${G.level} | ${G.charClass?.name}</p>
  <div style="border:1px solid #2a2a4a;padding:6px;margin:6px 0;font-size:5px;color:#b8b8b8;line-height:2;text-align:left">
   <span style="color:#f83800">DMG DEALT:</span> ${G.totalDmgDealt}<br>
   <span style="color:#f8d800">GOLD EARNED:</span> ${G.totalGoldEarned}<br>
   <span style="color:#0058f8">SPINS:</span> ${G.totalSpins}<br>
   <span style="color:#00a800">FLOORS:</span> ${G.floorsCleared}<br>
   <span style="color:#f87858">KILLS:</span> ${G.kills} (best streak: ${G.bestStreak})
  </div>
  ${ach.length?'<div style="border:1px solid #4a4a2a;padding:4px;margin:4px 0;font-size:4px;color:#f0d040;line-height:2">'+ach.map(function(a){return'['+a+']'}).join(' ')+'</div>':''}
  <p style="font-size:5px;color:#6a6a8a">BEST: F-${meta.bestFloor} | RUNS: ${meta.runs}</p>
  ${G.perks.length?'<p style="font-size:5px;color:#6a6a8a;margin:3px 0">PERKS: '+G.perks.map(function(p){return p.name[0]}).join('')+'</p>':''}
  ${G.relics.length?'<p style="font-size:5px;color:#f0d040;margin:2px 0">RELICS: '+G.relics.map(function(r){return r.name[0]}).join('')+'</p>':''}
  ${G.charms.length?'<p style="font-size:5px;color:#e060e0;margin:2px 0">CHARMS: '+G.charms.map(function(c){return c.name}).join(', ')+'</p>':''}
  <h3 style="margin-top:4px">ACHIEVEMENTS</h3>
  ${renderAchievements()}
  <button class="btn btn-gold" onclick="showCharSelect()" style="margin-top:6px">RETRY</button>`;
}

// ═══ CHARACTER SELECT ═══
function showCharSelect(){
 G={...freshState(CLASSES[0])};
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 pn.innerHTML=`<h2>CHOOSE CLASS</h2>
  ${CLASSES.map((c,i)=>{
   const unlocked=isClassUnlocked(c);
   if(unlocked){
    return`<div class="char-card" onclick="pick(${i})">
     ${iconImg(c.icon,32)}<div class="cname">${c.name}</div>
     <div class="desc">${c.desc.replace(/\n/g,'<br>')}</div>
     <div style="font-size:4px;color:#787878;margin-top:2px">HP:${c.hp} CRIT:${Math.round(c.crit*100)}%${c.gold?' GP:'+c.gold:''}${c.extraReels?' +REEL':''}</div>
    </div>`;
   } else {
    return`<div class="char-card" style="opacity:.3;cursor:default;border-color:#383838">
     <div class="cname" style="color:#585858">???</div>
     <div class="desc" style="color:#585858">${c.unlock.label}</div>
    </div>`;
   }
  }).join('')}`;
 window.pick=i=>{if(!isClassUnlocked(CLASSES[i]))return;SFX.buy();startRun({...CLASSES[i]})};
}

// ═══ TITLE ═══
function showTitle(){
 stopMusic();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 const stats=meta.bestFloor?`<div style="border:1px solid #2a2a4a;padding:4px;margin:4px 0;font-size:4px;color:#6a6a8a;line-height:2">
  BEST: F-${meta.bestFloor} | RUNS: ${meta.runs} | KILLS: ${meta.kills||0} | GP: ${meta.totalGold}</div>`:'';
 const unlocks=meta.bestFloor>=3?`<p style="font-size:5px;color:#a060f0;margin:2px 0">${Object.entries(UNLOCK_MAP).filter(([f])=>meta.bestFloor>=+f).map(([,s])=>s.join('')).join(' ')}</p>`:'';
 pn.innerHTML=`
  <div style="margin:8px">${iconImg('🎰',48)}</div>
  <h2 class="title-glow" style="font-size:10px;line-height:1.8">8BIT<br>ROGUE SLOTS</h2>
  <p style="font-size:4px;color:#8080a0;margin:4px 0;letter-spacing:2px">ROGUELIKE SLOT MACHINE RPG</p>
  <div style="border:1px solid #2a2a4a;padding:4px;margin:4px 0;font-size:4px;color:#6a6a8a;line-height:1.8">
   14 CLASSES • 30+ SYMBOLS • 24 PERKS<br>
   10 RELICS • 12 CHARMS • 4 RARE CHARMS<br>
   16 ENEMIES • 6 BOSSES • 3 PAYLINES<br>
   GOLD TARGETS • LIMITED SPINS • MULTIPLIERS<br>
   XP & LEVELS • ACHIEVEMENTS • ∞ FLOORS
  </div>
  ${stats}${unlocks}
  <h3 style="margin-top:4px">ACHIEVEMENTS</h3>
  ${renderAchievements()}
  <button class="btn btn-gold" onclick="showCharSelect()" style="margin-top:8px;font-size:8px;padding:10px 24px">START</button>
  <div style="font-size:3px;color:#3a3a5a;margin-top:6px">v4.0 // taskiap.com</div>`;
}

function startRun(cls){
 document.getElementById('overlay').classList.remove('show');
 G=freshState(cls);
 // Vampire: auto-set vampiric perk flag
 if(cls.healOnHit)G.perkFlags.vampiric=(G.perkFlags.vampiric||0)+1;
 // Alchemist: start with random charms
 if(cls.startCharms){for(var _ci=0;_ci<cls.startCharms;_ci++){var _ch=ALL_CHARMS[Math.floor(Math.random()*ALL_CHARMS.length)];G.charms.push({..._ch})}}
 // Track max charms/reels for unlock
 meta.maxCharmsEver=Math.max(meta.maxCharmsEver||0,G.charms.length);
 meta.maxReelsEver=Math.max(meta.maxReelsEver||0,G.reels.length);saveMeta();
 spawnEnemies();buildReels();renderEnemies();updateUI();
 document.getElementById('results').innerHTML='';
 document.getElementById('spinbtn').disabled=false;
 log(`${cls.name} ready!`,'res-combo');
 log('FLOOR 1 - FIGHT!','res-info');
 const resume=ACX.state==='suspended'?ACX.resume():Promise.resolve();
 resume.then(()=>startMusic()).catch(()=>{});
}

buildReels();updateUI();showTitle();
</script>
</body>
</html>
