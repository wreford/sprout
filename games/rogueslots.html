<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Tyler's Rogue Slots</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0b;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;user-select:none;-webkit-user-select:none;color:#e0e0e0}
a.home{position:fixed;top:8px;left:8px;z-index:100;color:#888;text-decoration:none;font-size:13px}
a.home:hover{color:#fff}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
#topbar{display:flex;align-items:center;gap:10px;padding:6px 12px;background:rgba(20,20,25,.95);border-bottom:1px solid #222;font-size:13px;flex-shrink:0;z-index:5}
.stat{display:flex;align-items:center;gap:3px}.stat-bar{width:80px;height:12px;background:#1a1a1f;border-radius:6px;overflow:hidden;border:1px solid #333}
.stat-fill{height:100%;border-radius:5px;transition:width .3s}
#hp-fill{background:linear-gradient(90deg,#e74c3c,#ff6b6b)}
#shield-fill{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.floor-ind{margin-left:auto;font-weight:700;color:#ffd700;font-size:14px}
#enemies{flex:0 0 auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.enemy-row{display:flex;align-items:center;gap:8px;padding:4px 8px;background:rgba(30,0,0,.3);border:1px solid #331111;border-radius:8px;font-size:13px;transition:all .2s}
.enemy-row.dead{opacity:.2;transform:scale(.95)}.enemy-row.hit{animation:eHit .3s}
@keyframes eHit{0%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-3px)}100%{transform:translateX(0)}}
.enemy-icon{font-size:22px}.enemy-name{font-size:11px;color:#aaa;min-width:55px}
.enemy-hp-bar{flex:1;height:10px;background:#1a1a1f;border-radius:5px;overflow:hidden;border:1px solid #333}
.enemy-hp-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#ff4444);border-radius:4px;transition:width .3s}
.enemy-atk{font-size:11px;color:#f87171;min-width:32px;text-align:right}
.enemy-status{font-size:10px}
#machine{flex:0 0 auto;padding:12px;display:flex;justify-content:center;align-items:center}
.slot-frame{background:linear-gradient(145deg,#1a1510,#0d0a06);border:3px solid #8B6914;border-radius:16px;padding:12px 16px;box-shadow:0 0 30px rgba(139,105,20,.3),inset 0 0 20px rgba(0,0,0,.5);display:flex;gap:8px;position:relative}
.reel-container{width:60px;height:70px;overflow:hidden;background:#0a0a0b;border-radius:10px;border:2px solid #444;position:relative}
.reel-strip{display:flex;flex-direction:column;align-items:center;transition:none;position:absolute;width:100%}
.reel-strip.stopping{transition:transform .4s cubic-bezier(.2,.8,.3,1.05)}
.reel-symbol{width:60px;height:70px;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0}
.reel-glow{position:absolute;inset:0;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .3s}
.reel-glow.active{opacity:1;box-shadow:inset 0 0 15px rgba(255,215,0,.4)}
#spinbtn{display:block;margin:4px auto 0;padding:14px 60px;font-size:20px;font-weight:700;background:linear-gradient(145deg,#d4a017,#b8860b);color:#000;border:none;border-radius:14px;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 20px rgba(212,160,23,.4);transition:all .15s;-webkit-tap-highlight-color:transparent}
#spinbtn:active{transform:scale(.96)}#spinbtn:disabled{opacity:.4;cursor:default;transform:none}
#results{flex:1;overflow-y:auto;padding:8px 12px;font-size:12px;display:flex;flex-direction:column;gap:3px;min-height:40px}
.res-line{padding:2px 0;line-height:1.4}.res-dmg{color:#f87171}.res-heal{color:#4ade80}.res-gold{color:#ffd700}.res-shield{color:#60a5fa}.res-combo{color:#e879f9;font-weight:700}.res-info{color:#888}.res-enemy{color:#fb923c}
#overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(5,5,10,.92)}
#overlay.show{display:flex}
.panel{background:rgba(20,20,30,.97);border:1px solid #333;border-radius:16px;padding:20px;max-width:360px;width:92%;max-height:85vh;overflow-y:auto;text-align:center}
.panel h2{font-size:18px;margin-bottom:12px;color:#ffd700}
.panel h3{font-size:14px;margin:10px 0 6px;color:#ccc}
.shop-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:8px 0}
.shop-card{background:rgba(255,255,255,.05);border:2px solid #333;border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;width:72px;transition:all .15s}
.shop-card:hover{border-color:#ffd700;transform:translateY(-2px)}
.shop-card.sold{opacity:.3;pointer-events:none}
.shop-emoji{font-size:28px}.shop-name{font-size:9px;color:#aaa;margin:2px 0}.shop-cost{font-size:11px;color:#ffd700;font-weight:700}
.shop-desc{font-size:8px;color:#777;margin-top:2px}
.btn{display:inline-block;padding:10px 20px;margin:4px;font-size:13px;background:linear-gradient(145deg,#333,#222);color:#e0e0e0;border:1px solid #444;border-radius:10px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{border-color:#ffd700;color:#fff}.btn:disabled{opacity:.3;cursor:default}
.btn-gold{background:linear-gradient(145deg,#d4a017,#b8860b);color:#000;border-color:#ffd700;font-weight:700}
.remove-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0}
.remove-card{background:rgba(255,0,0,.08);border:1px solid #633;border-radius:8px;padding:6px;cursor:pointer;font-size:24px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.remove-card:hover{border-color:#f44;background:rgba(255,0,0,.2)}
#shake{transition:transform 50ms}
.poison-indicator{color:#a855f7;font-size:10px}
#particles{position:fixed;inset:0;pointer-events:none;z-index:40}
</style>
</head>
<body>
<a class="home" href="../index.html">← Home</a>
<div id="app">
<div id="topbar">
 <span class="stat">❤️<span id="hp-text">20/20</span><div class="stat-bar"><div class="stat-fill" id="hp-fill" style="width:100%"></div></div></span>
 <span class="stat">🛡️<span id="shield-text">0</span></span>
 <span class="stat">💰<span id="gold-text">0</span></span>
 <span class="stat poison-indicator" id="poison-stat" style="display:none">☠️<span id="poison-text">0</span></span>
 <span class="floor-ind">Floor <span id="floor-num">1</span></span>
</div>
<div id="enemies"></div>
<div id="machine"><div class="slot-frame" id="slot-frame"></div></div>
<button id="spinbtn" onclick="spin()">⟫ SPIN ⟪</button>
<div id="results"></div>
</div>
<div id="overlay"><div class="panel" id="panel"></div></div>
<canvas id="particles"></canvas>
<script>
const ACX=new(window.AudioContext||window.webkitAudioContext)();
function snd(freq,dur,type='square',vol=.08){
 if(ACX.state==='suspended')ACX.resume();
 const o=ACX.createOscillator(),g=ACX.createGain();
 o.type=type;o.frequency.value=freq;g.gain.value=vol;
 g.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+dur);
 o.connect(g);g.connect(ACX.destination);o.start();o.stop(ACX.currentTime+dur);
}
function sndHit(){snd(200,.12,'sawtooth',.06);setTimeout(()=>snd(140,.08,'sawtooth',.04),40)}
function sndHeal(){snd(600,.1,'sine',.05);setTimeout(()=>snd(800,.15,'sine',.05),80)}
function sndGold(){snd(1200,.06,'square',.04);setTimeout(()=>snd(1500,.06,'square',.04),60)}
function sndSpin(){snd(100,.5,'sawtooth',.03)}
function sndStop(i){snd(300+i*100,.08,'square',.05)}
function sndDie(){snd(300,.2,'sawtooth',.06);setTimeout(()=>snd(200,.3,'sawtooth',.06),200);setTimeout(()=>snd(100,.5,'sawtooth',.06),450)}
function sndWin(){snd(500,.1,'square',.05);setTimeout(()=>snd(700,.1,'square',.05),100);setTimeout(()=>snd(900,.15,'square',.05),200)}
function sndTaken(){snd(150,.15,'sawtooth',.06)}

const SYMS={
 '🗡️':{name:'Sword',dmg:2,desc:'Deal 2 damage'},
 '🔥':{name:'Fire',dmg:3,desc:'3 dmg, +1 per adj fire',adj:'🔥',adjBonus:1},
 '🧲':{name:'Magnet',desc:'Copies symbol to its left',special:'magnet'},
 '💰':{name:'Gold',gold:3,desc:'Gives 3 gold'},
 '💎':{name:'Diamond',gold:8,desc:'Gives 8 gold'},
 '❤️':{name:'Heart',heal:2,desc:'Heals 2 HP'},
 '🛡️':{name:'Shield',shield:3,desc:'Blocks 3 damage'},
 '💀':{name:'Skull',dmg:5,selfDmg:2,desc:'5 dmg, costs 2 HP'},
 '🎯':{name:'Bullseye',desc:'Doubles symbol to its right',special:'bullseye'},
 '🌟':{name:'Star',desc:'1 dmg per unique symbol',special:'star'},
 '🍀':{name:'Clover',desc:'Luck +1 this spin',special:'clover'},
 '💣':{name:'Bomb',dmgAll:4,desc:'4 dmg to ALL enemies'},
 '🧪':{name:'Poison',desc:'1 dmg/turn for 3 turns',special:'poison'},
 '🔮':{name:'Crystal',desc:'+1 to all dmg this spin',special:'crystal'},
 '⚡':{name:'Lightning',dmg:2,desc:'2 dmg, chains randomly',special:'lightning'},
 '🪙':{name:'Coin',desc:'1 gold per spin this battle',special:'coin'},
 '🎰':{name:'Jackpot',desc:'3+ match: triple effects',special:'jackpot'},
 '🐍':{name:'Snake',dmg:1,desc:'1 dmg, +2 per snake',adj:'🐍',adjBonus:2,adjGlobal:true},
 '🔄':{name:'Refresh',desc:'Spin this reel again free',special:'refresh'},
 '🎪':{name:'Joker',desc:'Becomes most common symbol',special:'joker'},
 '🍒':{name:'Cherry',heal:1,gold:1,desc:'Heals 1, gives 1 gold'},
 '🌙':{name:'Moon',desc:'Dmg equal to current shield',special:'moon'}
};
const BASE_SYMBOLS=['🗡️','🗡️','❤️','💰','🛡️','🔥'];
const UNLOCK_MAP={3:['💀','🧪'],5:['🎯','🧲'],8:['💣','⚡'],10:['🎰','🌟']};
const ALL_SHOP=Object.keys(SYMS);
const ENEMIES=[
 {name:'Slime',icon:'🟢',hp:5,atk:1},
 {name:'Goblin',icon:'👺',hp:8,atk:2},
 {name:'Skeleton',icon:'💀',hp:12,atk:3},
 {name:'Mushroom',icon:'🍄',hp:6,atk:1,ability:'poison'},
 {name:'Golem',icon:'🗿',hp:20,atk:2},
 {name:'Vampire',icon:'🧛',hp:10,atk:3,ability:'lifesteal'},
 {name:'Dark Wizard',icon:'🧙',hp:15,atk:4,ability:'shield'},
 {name:'Mimic',icon:'📦',hp:10,atk:2,ability:'steal'}
];
const BOSS={name:'Dragon',icon:'🐉',hp:30,atk:5};

let meta=JSON.parse(localStorage.getItem('rogueslots_meta')||'null')||{bestFloor:0,totalGold:0,unlocked:[]};
function saveMeta(){localStorage.setItem('rogueslots_meta',JSON.stringify(meta))}
function getUnlocked(){
 let u=new Set(BASE_SYMBOLS);
 for(let [f,syms] of Object.entries(UNLOCK_MAP)){
  if(meta.bestFloor>=+f||meta.unlocked.includes(+f)) syms.forEach(s=>u.add(s));
 }
 return[...u];
}

let G={hp:20,maxHp:20,gold:0,shield:0,poison:0,floor:1,reels:[[...BASE_SYMBOLS],[...BASE_SYMBOLS],[...BASE_SYMBOLS]],
 enemies:[],spinning:false,spinCount:0,phase:'battle',reelResults:[]};
const pCanvas=document.getElementById('particles'),pCtx=pCanvas.getContext('2d');
let particles=[];
function resizeParticles(){pCanvas.width=innerWidth;pCanvas.height=innerHeight}
resizeParticles();addEventListener('resize',resizeParticles);
function addParticle(x,y,color,count=5){
 for(let i=0;i<count;i++) particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:1,color,size:Math.random()*4+2});
}
function updateParticles(){
 pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
 particles=particles.filter(p=>{
  p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=.025;
  if(p.life<=0)return false;
  pCtx.globalAlpha=p.life;pCtx.fillStyle=p.color;
  pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fill();
  return true;
 });
 pCtx.globalAlpha=1;
 if(particles.length)requestAnimationFrame(updateParticles);
}
function spawnParticles(el,color,n=8){
 if(!el)return;
 const r=el.getBoundingClientRect();
 addParticle(r.left+r.width/2,r.top+r.height/2,color,n);
 if(particles.length<=n)requestAnimationFrame(updateParticles);
}
function shake(){
 const f=document.getElementById('slot-frame');
 f.style.transform='translateX(4px)';setTimeout(()=>f.style.transform='translateX(-4px)',50);
 setTimeout(()=>f.style.transform='',100);
}

function updateUI(){
 document.getElementById('hp-text').textContent=`${Math.max(0,G.hp)}/${G.maxHp}`;
 document.getElementById('hp-fill').style.width=`${Math.max(0,G.hp/G.maxHp*100)}%`;
 document.getElementById('shield-text').textContent=G.shield;
 document.getElementById('gold-text').textContent=G.gold;
 document.getElementById('floor-num').textContent=G.floor;
 const ps=document.getElementById('poison-stat');
 if(G.poison>0){ps.style.display='';document.getElementById('poison-text').textContent=G.poison}else ps.style.display='none';
}
function renderEnemies(){
 const c=document.getElementById('enemies');c.innerHTML='';
 G.enemies.forEach((e,i)=>{
  const d=document.createElement('div');d.className='enemy-row'+(e.hp<=0?' dead':'');d.id='enemy-'+i;
  let status='';
  if(e.poison>0)status+=`<span class="poison-indicator">☠️${e.poison}</span>`;
  if(e.shield>0)status+=`<span style="color:#60a5fa">🛡️${e.shield}</span>`;
  d.innerHTML=`<span class="enemy-icon">${e.icon}</span><span class="enemy-name">${e.name}</span>
   <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${Math.max(0,e.hp/e.maxHp*100)}%"></div></div>
   <span class="enemy-status">${status}</span><span class="enemy-atk">⚔️${e.atk}</span>`;
  c.appendChild(d);
 });
}
function buildReels(){
 const frame=document.getElementById('slot-frame');frame.innerHTML='';
 G.reels.forEach((_,i)=>{
  const rc=document.createElement('div');rc.className='reel-container';rc.id='reel-'+i;
  const strip=document.createElement('div');strip.className='reel-strip';strip.id='strip-'+i;
  const glow=document.createElement('div');glow.className='reel-glow';glow.id='glow-'+i;
  rc.appendChild(strip);rc.appendChild(glow);frame.appendChild(rc);
 });
}
function log(msg,cls='res-info'){
 const d=document.getElementById('results');
 const l=document.createElement('div');l.className='res-line '+cls;l.textContent=msg;
 d.appendChild(l);d.scrollTop=d.scrollHeight;
 while(d.children.length>50)d.removeChild(d.firstChild);
}

function spawnEnemies(){
 G.enemies=[];
 const isBoss=G.floor%5===0;
 if(isBoss){
  let b=Object.assign({},BOSS);b.maxHp=BOSS.hp+G.floor*2;b.hp=b.maxHp;b.poison=0;b.shield=0;
  G.enemies.push(b);
 } else {
  const count=Math.min(3,1+Math.floor(G.floor/3));
  const pool=ENEMIES.filter(e=>true);
  for(let i=0;i<count;i++){
   const t=pool[Math.floor(Math.random()*Math.min(pool.length,2+Math.floor(G.floor/2)))];
   const sc=1+G.floor*0.12;
   let e=Object.assign({},t);
   e.maxHp=Math.ceil(t.hp*sc);e.hp=e.maxHp;e.atk=Math.ceil(t.atk*(1+G.floor*0.05));e.poison=0;e.shield=0;
   G.enemies.push(e);
  }
 }
}
function aliveEnemies(){return G.enemies.filter(e=>e.hp>0)}

function spin(){
 if(G.spinning||G.phase!=='battle'||aliveEnemies().length===0)return;
 G.spinning=true;G.spinCount++;
 document.getElementById('spinbtn').disabled=true;
 document.getElementById('results').innerHTML='';
 sndSpin();
 // Pick results
 G.reelResults=G.reels.map(pool=>pool[Math.floor(Math.random()*pool.length)]);
 // Animate each reel
 const reelCount=G.reels.length;
 let stopped=0;
 G.reels.forEach((_,i)=>{
  const strip=document.getElementById('strip-'+i);
  const pool=G.reels[i];
  // Build a long strip of random symbols + final result at bottom
  const extraCount=12+i*4;
  let syms=[];
  for(let j=0;j<extraCount;j++) syms.push(pool[Math.floor(Math.random()*pool.length)]);
  syms.push(G.reelResults[i]);
  strip.innerHTML='';strip.className='reel-strip';
  syms.forEach(s=>{const d=document.createElement('div');d.className='reel-symbol';d.textContent=s;strip.appendChild(d)});
  strip.style.transform='translateY(0)';
  // Animate: scroll down
  const totalH=syms.length*70;
  const targetY=-(totalH-70);
  // Start spinning
  let frame=0;const spinFrames=20+i*8;
  const dur=spinFrames*16;
  strip.style.transition='none';
  strip.style.transform='translateY(0)';
  let startT=null;
  function animate(t){
   if(!startT)startT=t;
   const prog=Math.min(1,(t-startT)/dur);
   const ease=prog<.8?prog/0.8:1;
   strip.style.transform=`translateY(${targetY*ease}px)`;
   if(prog<1){requestAnimationFrame(animate)}
   else{
    strip.style.transform=`translateY(${targetY}px)`;
    sndStop(i);
    document.getElementById('glow-'+i).classList.add('active');
    setTimeout(()=>document.getElementById('glow-'+i).classList.remove('active'),400);
    stopped++;
    if(stopped===reelCount) setTimeout(resolveResults,200);
   }
  }
  setTimeout(()=>requestAnimationFrame(animate),i*250);
 });
}

function resolveResults(){
 let results=[...G.reelResults];
 let totalDmg=0,totalHeal=0,totalGold=0,totalShield=0,crystalBonus=0,luckBonus=0;
 let hasJackpot=false,refreshReels=[];

 // Pre-pass: joker
 const freq={};results.forEach(s=>{if(SYMS[s]&&!SYMS[s].special)freq[s]=(freq[s]||0)+1});
 let mostCommon=results[0],maxFreq=0;
 for(let[s,c]of Object.entries(freq))if(c>maxFreq){maxFreq=c;mostCommon=s}
 results=results.map(s=>s==='🎪'?mostCommon:s);

 // Pre-pass: magnet
 results=results.map((s,i)=>{if(s==='🧲'&&i>0)return results[i-1];return s});

 // Pre-pass: crystal, clover, jackpot
 results.forEach(s=>{
  if(s==='🔮')crystalBonus++;
  if(s==='🍀')luckBonus++;
  if(s==='🎰')hasJackpot=true;
 });

 // Check for matches
 const counts={};results.forEach(s=>counts[s]=(counts[s]||0)+1);
 let matchMult=1;
 for(let[s,c]of Object.entries(counts)){
  if(c>=3){matchMult=3;log(`TRIPLE ${SYMS[s]?.name||s}! x3`,'res-combo');spawnParticles(document.getElementById('slot-frame'),'#e879f9',20)}
  else if(c>=2){if(matchMult<1.5)matchMult=1.5;log(`DOUBLE ${SYMS[s]?.name||s}! x1.5`,'res-combo')}
 }

 // Jackpot: if 3+ of any symbol, triple
 let jackpotMult=1;
 if(hasJackpot){
  let has3=Object.values(counts).some(c=>c>=3);
  if(has3){jackpotMult=3;log('🎰 JACKPOT! Triple ALL effects!','res-combo');shake();spawnParticles(document.getElementById('slot-frame'),'#ffd700',30)}
 }

 // Bullseye pre-pass: double the symbol to the right
 let multipliers=results.map(()=>1);
 results.forEach((s,i)=>{if(s==='🎯'&&i<results.length-1)multipliers[i+1]*=2});

 // Resolve left to right
 results.forEach((sym,i)=>{
  const def=SYMS[sym];if(!def)return;
  const m=multipliers[i]*matchMult*jackpotMult;
  // Damage
  if(def.dmg){
   let d=def.dmg;
   if(def.adjGlobal&&def.adj){d+=def.adjBonus*(counts[sym]-1)}
   else if(def.adj){
    if(i>0&&results[i-1]===def.adj)d+=def.adjBonus;
    if(i<results.length-1&&results[i+1]===def.adj)d+=def.adjBonus;
   }
   d=(d+crystalBonus)*m;d=Math.floor(d);
   totalDmg+=d;
   const tgt=aliveEnemies()[0];
   if(tgt){
    dealDmgToEnemy(tgt,d);
    log(`${sym} deals ${d} damage to ${tgt.name}`,'res-dmg');
   }
  }
  if(def.dmgAll){
   const d=Math.floor((def.dmgAll+crystalBonus)*m);
   aliveEnemies().forEach(e=>dealDmgToEnemy(e,d));
   log(`${sym} deals ${d} damage to ALL enemies!`,'res-dmg');
   totalDmg+=d*aliveEnemies().length;shake();
  }
  if(def.heal){const h=Math.floor(def.heal*m);totalHeal+=h;G.hp=Math.min(G.maxHp,G.hp+h)}
  if(def.gold){const g=Math.floor(def.gold*m);totalGold+=g;G.gold+=g}
  if(def.shield){const s=Math.floor(def.shield*m);totalShield+=s;G.shield+=s}
  if(def.selfDmg){G.hp-=def.selfDmg;log(`${sym} costs ${def.selfDmg} HP`,'res-enemy')}
  // Specials
  if(def.special==='star'){
   const uniq=new Set(results).size;const d=Math.floor((uniq+crystalBonus)*m);
   totalDmg+=d;const tgt=aliveEnemies()[0];
   if(tgt){dealDmgToEnemy(tgt,d);log(`🌟 Star: ${uniq} unique symbols = ${d} damage`,'res-dmg')}
  }
  if(def.special==='poison'){
   aliveEnemies().forEach(e=>e.poison+=3);
   log('🧪 Enemies poisoned for 3 turns!','res-dmg');
  }
  if(def.special==='lightning'){
   let d=Math.floor((2+crystalBonus)*m);
   const alive=aliveEnemies();
   if(alive.length){
    const chains=Math.min(3,alive.length);
    for(let c=0;c<chains;c++){
     const tgt=alive[Math.floor(Math.random()*alive.length)];
     dealDmgToEnemy(tgt,d);totalDmg+=d;
     log(`⚡ chains to ${tgt.name} for ${d}`,'res-dmg');
     d=Math.max(1,Math.floor(d*.7));
    }
   }
  }
  if(def.special==='coin'){const g=Math.floor(G.spinCount*m);totalGold+=g;G.gold+=g;log(`🪙 ${g} gold (spin #${G.spinCount})`,'res-gold')}
  if(def.special==='moon'){
   const d=Math.floor((G.shield+crystalBonus)*m);
   if(d>0){const tgt=aliveEnemies()[0];if(tgt){dealDmgToEnemy(tgt,d);totalDmg+=d;log(`🌙 ${d} damage (from ${G.shield} shield)`,'res-dmg')}}
  }
  if(def.special==='refresh')refreshReels.push(i);
 });

 if(totalHeal>0){log(`Healed ${totalHeal} HP`,'res-heal');sndHeal()}
 if(totalGold>0){log(`Earned ${totalGold} gold`,'res-gold');sndGold();meta.totalGold+=totalGold;saveMeta()}
 if(totalShield>0)log(`Gained ${totalShield} shield`,'res-shield');
 if(totalDmg>0){sndHit();if(totalDmg>=10){shake();spawnParticles(document.getElementById('slot-frame'),'#f87171',12)}}

 renderEnemies();updateUI();

 // Check enemy deaths
 G.enemies.forEach((e,i)=>{
  if(e.hp<=0){
   const el=document.getElementById('enemy-'+i);
   if(el&&!el.classList.contains('dead')){el.classList.add('dead');spawnParticles(el,'#ff4444',10)}
  }
 });

 // Refresh reels
 if(refreshReels.length>0){
  setTimeout(()=>{
   log('🔄 Refresh! Spinning again...','res-info');
   G.spinning=false;
   // Only re-spin those specific reels (simplified: just spin all)
   spin();
  },600);
  return;
 }

 // All enemies dead?
 if(aliveEnemies().length===0){
  setTimeout(()=>{
   sndWin();
   log('Floor cleared!','res-info');
   G.spinning=false;
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta();log(`New best floor: ${G.floor}!`,'res-combo')}
   // Check unlocks
   for(let[f,syms]of Object.entries(UNLOCK_MAP)){
    if(G.floor>=+f&&!meta.unlocked.includes(+f)){
     meta.unlocked.push(+f);saveMeta();
     log(`Unlocked: ${syms.join(' ')}!`,'res-combo');
    }
   }
   showShop();
  },500);
  return;
 }

 // Enemy turn
 setTimeout(enemyTurn,400);
}

function dealDmgToEnemy(e,d){
 if(e.shield>0){const blocked=Math.min(e.shield,d);e.shield-=blocked;d-=blocked}
 e.hp=Math.max(0,e.hp-d);
 const idx=G.enemies.indexOf(e);
 const el=document.getElementById('enemy-'+idx);
 if(el){el.classList.remove('hit');void el.offsetWidth;el.classList.add('hit')}
}

function enemyTurn(){
 let totalTaken=0;
 aliveEnemies().forEach(e=>{
  // Poison tick
  if(e.poison>0){e.poison--;const pd=1;e.hp-=pd;log(`☠️ ${e.name} takes ${pd} poison damage`,'res-dmg')}
  if(e.hp<=0)return;
  // Attack
  let dmg=e.atk;
  if(G.shield>0){const blocked=Math.min(G.shield,dmg);G.shield-=blocked;dmg-=blocked;
   if(blocked>0)log(`🛡️ Shield blocks ${blocked} from ${e.name}`,'res-shield')}
  if(dmg>0){G.hp-=dmg;totalTaken+=dmg;log(`${e.icon} ${e.name} attacks for ${dmg}`,'res-enemy')}
  // Abilities
  if(e.ability==='poison'){G.poison+=2;log(`🍄 ${e.name} poisons you!`,'res-enemy')}
  if(e.ability==='lifesteal'){const h=Math.ceil(e.atk/2);e.hp=Math.min(e.maxHp,e.hp+h);log(`🧛 ${e.name} heals ${h}`,'res-enemy')}
  if(e.ability==='shield'){e.shield+=2;log(`🧙 ${e.name} shields for 2`,'res-shield')}
  if(e.ability==='steal'&&dmg>0){const s=Math.min(G.gold,2);G.gold-=s;if(s>0)log(`📦 ${e.name} steals ${s} gold!`,'res-enemy')}
 });
 // Player poison
 if(G.poison>0){G.hp-=G.poison;log(`☠️ Poison deals ${G.poison} to you`,'res-enemy');G.poison=Math.max(0,G.poison-1)}
 if(totalTaken>0){sndTaken();if(totalTaken>=5)shake()}
 renderEnemies();updateUI();

 // Player dead?
 if(G.hp<=0){
  setTimeout(showDeath,500);
  return;
 }
 // Check if enemies died from poison
 if(aliveEnemies().length===0){
  setTimeout(()=>{
   sndWin();log('Floor cleared!','res-info');
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta()}
   for(let[f,syms]of Object.entries(UNLOCK_MAP)){
    if(G.floor>=+f&&!meta.unlocked.includes(+f)){meta.unlocked.push(+f);saveMeta();log(`Unlocked: ${syms.join(' ')}!`,'res-combo')}
   }
   showShop();
  },400);
  return;
 }
 G.spinning=false;
 document.getElementById('spinbtn').disabled=false;
}

function showShop(){
 G.phase='shop';G.shield=0;
 const ov=document.getElementById('overlay');
 const pn=document.getElementById('panel');
 ov.classList.add('show');
 const unlocked=getUnlocked();
 const available=ALL_SHOP.filter(s=>unlocked.includes(s));
 let shopItems=[];
 const shuffled=[...available].sort(()=>Math.random()-.5);
 for(let i=0;i<Math.min(4,shuffled.length);i++)shopItems.push(shuffled[i]);
 let soldFlags=shopItems.map(()=>false);
 function renderShop(){
  const cost=s=>(['💎','🎰','💣','⚡','🌟','🌙'].includes(s)?35:['💀','🧪','🎯','🧲','🔮'].includes(s)?25:15);
  pn.innerHTML=`<h2>🏪 Shop — Floor ${G.floor} Cleared!</h2>
   <p style="font-size:12px;color:#aaa;margin-bottom:8px">Gold: <span style="color:#ffd700">${G.gold}</span> | HP: ${G.hp}/${G.maxHp}</p>
   <h3>Buy Symbols</h3>
   <div class="shop-grid">${shopItems.map((s,i)=>{
    const c=cost(s);const def=SYMS[s];
    return`<div class="shop-card${soldFlags[i]?' sold':''}" onclick="buySymbol(${i})">
     <div class="shop-emoji">${s}</div><div class="shop-name">${def.name}</div>
     <div class="shop-desc">${def.desc}</div><div class="shop-cost">${c}g</div></div>`
   }).join('')}</div>
   <h3>Remove Symbol (5g)</h3>
   <div class="remove-grid" id="remove-grid">${[...new Set(G.reels[0])].map((s,j)=>`<div class="remove-card" data-ri="${j}">${s}</div>`).join('')}</div>
   <div style="margin-top:10px">
    <button class="btn" onclick="shopHeal()">❤️ Full Heal (20g)</button>
    ${G.reels.length<5?`<button class="btn" onclick="shopAddReel()">➕ Add Reel (50g)</button>`:''}
    <button class="btn" onclick="shopReroll()">🔄 Reroll (5g)</button>
   </div>
   <button class="btn btn-gold" onclick="nextFloor()" style="margin-top:12px">Next Floor →</button>`;
  // Bind buy
  window.buySymbol=function(i){
   if(soldFlags[i])return;
   const s=shopItems[i];const c=cost(s);
   if(G.gold<c)return;
   G.gold-=c;soldFlags[i]=true;
   // Add to a random reel
   const ri=Math.floor(Math.random()*G.reels.length);
   G.reels[ri].push(s);
   sndGold();renderShop();
  };
  document.getElementById('remove-grid')?.addEventListener('click',function(ev){
   const card=ev.target.closest('.remove-card');if(!card)return;
   const s=card.textContent.trim();
   if(G.gold<5)return;
   for(let r of G.reels){
    const idx=r.indexOf(s);
    if(idx!==-1&&r.length>3){r.splice(idx,1);G.gold-=5;sndGold();renderShop();return}
   }
  });
  window.shopHeal=function(){
   if(G.gold<20)return;G.gold-=20;G.hp=G.maxHp;sndHeal();renderShop();
  };
  window.shopAddReel=function(){
   if(G.gold<50||G.reels.length>=5)return;
   G.gold-=50;G.reels.push([...BASE_SYMBOLS]);sndGold();renderShop();
  };
  window.shopReroll=function(){
   if(G.gold<5)return;G.gold-=5;
   const sh=[...available].sort(()=>Math.random()-.5);
   shopItems=[];soldFlags=[];
   for(let i=0;i<Math.min(4,sh.length);i++){shopItems.push(sh[i]);soldFlags.push(false)}
   sndGold();renderShop();
  };
 }
 renderShop();
}

function nextFloor(){
 document.getElementById('overlay').classList.remove('show');
 G.floor++;G.phase='battle';G.shield=0;G.spinCount=0;G.poison=0;
 spawnEnemies();renderEnemies();buildReels();updateUI();
 document.getElementById('results').innerHTML='';
 G.spinning=false;document.getElementById('spinbtn').disabled=false;
 log(`Entering Floor ${G.floor}...`,'res-info');
}

function showDeath(){
 sndDie();G.phase='dead';
 const ov=document.getElementById('overlay');const pn=document.getElementById('panel');
 ov.classList.add('show');
 if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta()}
 pn.innerHTML=`<h2>💀 You Died!</h2>
  <p style="margin:10px 0;font-size:14px">Reached Floor <span style="color:#ffd700;font-weight:700">${G.floor}</span></p>
  <p style="font-size:12px;color:#aaa">Best: Floor ${meta.bestFloor} | Total Gold: ${meta.totalGold}</p>
  <p style="font-size:11px;color:#666;margin:8px 0">Unlocked symbols available in future runs based on best floor reached.</p>
  <button class="btn btn-gold" onclick="startRun()" style="margin-top:12px">Try Again</button>`;
}

function showTitle(){
 G.phase='title';
 const ov=document.getElementById('overlay');const pn=document.getElementById('panel');
 ov.classList.add('show');
 pn.innerHTML=`<h2 style="font-size:22px">🎰 Tyler's Rogue Slots</h2>
  <p style="margin:8px 0;font-size:12px;color:#aaa">A roguelike slot machine adventure</p>
  <p style="font-size:11px;color:#666;margin:8px 0">Spin slots to attack enemies. Build synergies. Upgrade between floors. Die and try again.</p>
  <p style="font-size:11px;color:#888;margin:8px 0">Best Floor: <span style="color:#ffd700">${meta.bestFloor}</span> | Total Gold: <span style="color:#ffd700">${meta.totalGold}</span></p>
  ${meta.bestFloor>=3?`<p style="font-size:10px;color:#a855f7">Unlocked: ${Object.entries(UNLOCK_MAP).filter(([f])=>meta.bestFloor>=+f).map(([,s])=>s.join('')).join(' ')}</p>`:''}
  <button class="btn btn-gold" onclick="startRun()" style="margin-top:16px;font-size:16px;padding:14px 40px">PLAY</button>`;
}

function startRun(){
 document.getElementById('overlay').classList.remove('show');
 const base=[...BASE_SYMBOLS];
 // Add unlocked symbols to the base pool
 const unlocked=getUnlocked();
 const extras=unlocked.filter(s=>!BASE_SYMBOLS.includes(s));
 // Don't auto-add extras — they appear in shop
 G={hp:20,maxHp:20,gold:0,shield:0,poison:0,floor:1,
  reels:[[...base],[...base],[...base]],
  enemies:[],spinning:false,spinCount:0,phase:'battle',reelResults:[]};
 spawnEnemies();buildReels();renderEnemies();updateUI();
 document.getElementById('results').innerHTML='';
 document.getElementById('spinbtn').disabled=false;
 log('Floor 1 — Fight!','res-info');
}

// Init
buildReels();updateUI();showTitle();
</script>
</body>
</html>
