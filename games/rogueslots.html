<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Tyler's Rogue Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0c0c1a;font-family:'Press Start 2P',monospace;touch-action:manipulation;user-select:none;-webkit-user-select:none;color:#e8e8e8;image-rendering:pixelated}
a.home{position:fixed;top:6px;left:6px;z-index:100;color:#6a6a8a;text-decoration:none;font-size:8px}
a.home:hover{color:#fff}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0px,rgba(0,0,0,.06) 1px,transparent 1px,transparent 3px)}
body::before{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.35) 100%)}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative;transition:box-shadow .2s}
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#12122a;border-bottom:2px solid #2a2a4a;font-size:8px;flex-shrink:0;z-index:5;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:3px;line-height:1}
.stat-bar{width:50px;height:8px;background:#0a0a18;border:1px solid #3a3a5a;overflow:hidden}
.stat-fill{height:100%;transition:width .3s}
#hp-fill{background:#e04040}
#xp-bar{width:100%;height:4px;background:#0a0a18;border:1px solid #2a2a4a;overflow:hidden;margin-top:1px}
#xp-fill{height:100%;background:#a060f0;transition:width .3s;width:0}
.floor-ind{margin-left:auto;color:#f0d040;font-size:9px;text-shadow:0 0 6px rgba(240,208,64,.5)}
#char-icon{font-size:16px;margin-right:2px}
#enemies{flex:0 0 auto;padding:4px 10px;display:flex;flex-direction:column;gap:3px;min-height:30px}
.enemy-row{display:flex;align-items:center;gap:6px;padding:4px 6px;background:rgba(40,10,10,.5);border:1px solid #4a1a1a;font-size:8px;transition:all .2s}
.enemy-row.dead{opacity:.12;transform:scale(.95)}.enemy-row.hit{animation:eHit .25s}
.enemy-row.targeted{border-color:#f0d040;box-shadow:0 0 4px rgba(240,208,64,.3)}
@keyframes eHit{0%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-2px)}100%{transform:translateX(0)}}
.enemy-icon{font-size:18px}.enemy-name{font-size:7px;color:#a08080;min-width:44px}
.enemy-hp-bar{flex:1;height:8px;background:#0a0a18;border:1px solid #4a1a1a;overflow:hidden}
.enemy-hp-fill{height:100%;background:#e04040;transition:width .3s}
.enemy-atk{font-size:7px;color:#f06060;min-width:28px;text-align:right}
.enemy-status{font-size:7px}
#machine{flex:0 0 auto;padding:10px;display:flex;justify-content:center;align-items:center;flex-direction:column}
.machine-label{font-size:10px;color:#f0d040;text-shadow:0 0 8px rgba(240,208,64,.4);margin-bottom:6px;letter-spacing:4px;animation:flicker 4s infinite}
@keyframes flicker{0%,94%,100%{opacity:1}95%{opacity:.5}96%{opacity:1}97%{opacity:.3}}
.slot-frame{background:#0a0a18;border:4px solid #f0d040;padding:8px 10px;display:flex;gap:6px;position:relative;box-shadow:0 0 20px rgba(240,208,64,.2),inset 0 0 20px rgba(0,0,0,.8);transition:all .3s}
.slot-frame::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid #f04040}
.reel-container{width:64px;height:70px;overflow:hidden;background:#08081a;border:2px solid #3a3a6a;position:relative}
.reel-strip{display:flex;flex-direction:column;align-items:center;transition:none;position:absolute;width:100%}
.reel-symbol{width:64px;height:70px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.reel-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s}
.reel-glow.active{opacity:1;box-shadow:inset 0 0 10px rgba(240,208,64,.5)}
.payline{position:absolute;left:-2px;right:-2px;top:50%;height:2px;background:#f04040;transform:translateY(-1px);z-index:2;box-shadow:0 0 4px #f04040;pointer-events:none}
#spinbtn{display:block;margin:6px auto 0;padding:14px 50px;font-size:14px;font-family:'Press Start 2P',monospace;background:#e04040;color:#fff;border:4px solid #f06060;cursor:pointer;letter-spacing:3px;box-shadow:0 4px 0 #801010,0 0 20px rgba(224,64,64,.3);transition:all .1s;-webkit-tap-highlight-color:transparent}
#spinbtn:active{transform:translateY(4px);box-shadow:0 0 0 #801010}
#spinbtn:disabled{opacity:.3;cursor:default;transform:none}
#spinbtn.win-flash{animation:btnFlash .4s 3}
@keyframes btnFlash{0%,100%{background:#e04040}50%{background:#40e040}}
#perk-bar{display:flex;gap:2px;justify-content:center;padding:2px 8px;flex-wrap:wrap;min-height:14px}
.perk-icon{font-size:12px;opacity:.7;cursor:help}
#results{flex:1;overflow-y:auto;padding:4px 10px;font-size:8px;display:flex;flex-direction:column;gap:2px;min-height:20px;line-height:1.6}
.res-line{padding:1px 0}.res-dmg{color:#f06060}.res-heal{color:#40e040}.res-gold{color:#f0d040}.res-shield{color:#6090f0}.res-combo{color:#e060f0}.res-info{color:#6a6a8a}.res-enemy{color:#f09040}.res-crit{color:#ff4080}.res-xp{color:#a060f0}
#overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(5,5,15,.95)}
#overlay.show{display:flex}
.panel{background:#12122a;border:4px solid #f0d040;padding:16px;max-width:380px;width:94%;max-height:88vh;overflow-y:auto;text-align:center;box-shadow:0 0 40px rgba(240,208,64,.15)}
.panel h2{font-size:12px;margin-bottom:8px;color:#f0d040;text-shadow:0 0 8px rgba(240,208,64,.3);letter-spacing:2px}
.panel h3{font-size:8px;margin:6px 0 4px;color:#a0a0c0;letter-spacing:1px}
.shop-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:6px 0}
.shop-card{background:rgba(255,255,255,.03);border:2px solid #2a2a4a;padding:8px 5px;cursor:pointer;text-align:center;width:80px;transition:all .15s}
.shop-card:hover{border-color:#f0d040;background:rgba(240,208,64,.05)}
.shop-card.sold{opacity:.15;pointer-events:none}
.shop-emoji{font-size:22px}.shop-name{font-size:6px;color:#8080a0;margin:2px 0}.shop-cost{font-size:8px;color:#f0d040}
.shop-desc{font-size:5px;color:#6060a0;line-height:1.5}
.btn{display:inline-block;padding:10px 14px;margin:3px;font-size:8px;font-family:'Press Start 2P',monospace;background:#1a1a3a;color:#c0c0e0;border:2px solid #3a3a6a;cursor:pointer;transition:all .15s;letter-spacing:1px;min-height:36px}
.btn:hover{border-color:#f0d040;color:#fff;background:#2a2a4a}.btn:disabled{opacity:.2;cursor:default}
.btn-gold{background:#d0a020;color:#0c0c1a;border-color:#f0d040}
.btn-gold:hover{background:#f0c040}
.btn-red{background:#a01020;color:#fff;border-color:#f04040}
.remove-grid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0}
.remove-card{background:rgba(200,40,40,.1);border:2px solid #4a1a1a;cursor:pointer;font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.remove-card:hover{border-color:#f04040;background:rgba(200,40,40,.2)}
.poison-indicator{color:#a060f0;font-size:5px}
#particles{position:fixed;inset:0;pointer-events:none;z-index:40}
#music-btn{position:fixed;top:6px;right:6px;z-index:100;background:none;border:1px solid #3a3a5a;color:#6a6a8a;font-family:'Press Start 2P',monospace;font-size:5px;padding:2px 4px;cursor:pointer}
#music-btn:hover{color:#fff;border-color:#f0d040}
.title-glow{animation:titleGlow 2s ease-in-out infinite alternate}
@keyframes titleGlow{0%{text-shadow:0 0 8px rgba(240,208,64,.3)}100%{text-shadow:0 0 24px rgba(240,208,64,.6),0 0 48px rgba(240,64,64,.2)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0a0a18}::-webkit-scrollbar-thumb{background:#3a3a6a}
@keyframes dmgFlash{0%{background:#4a0a0a}100%{background:transparent}}.dmg-flash{animation:dmgFlash .25s}
.char-card{background:rgba(255,255,255,.03);border:2px solid #2a2a4a;padding:10px;cursor:pointer;text-align:center;width:100%;margin:4px 0;transition:all .15s;min-height:44px}
.char-card:hover{border-color:#f0d040;background:rgba(240,208,64,.05)}
.char-card .emoji{font-size:28px}.char-card .cname{font-size:9px;color:#f0d040;margin:4px 0}.char-card .desc{font-size:7px;color:#8080a0;line-height:1.8}
.perk-card{background:rgba(255,255,255,.03);border:2px solid #2a2a4a;padding:8px;cursor:pointer;text-align:center;width:100%;margin:4px 0;transition:all .15s;min-height:44px}
.perk-card:hover{border-color:#40e040;background:rgba(64,224,64,.05)}
.perk-card .emoji{font-size:20px}.perk-card .pname{font-size:8px;color:#40e040;margin:3px 0}.perk-card .desc{font-size:6px;color:#8080a0;line-height:1.6}
.relic-bar{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin:3px 0}
.relic-icon{font-size:10px;padding:2px;border:1px solid #3a3a5a;background:rgba(255,255,255,.03);cursor:help}
.streak-bar{font-size:8px;color:#f09040;text-align:center;padding:2px;min-height:12px}
.event-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1001;font-size:16px;color:#f0d040;text-shadow:0 0 20px rgba(240,208,64,.6);animation:bannerPop 1.5s forwards;pointer-events:none}
@keyframes bannerPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}30%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-60%)}}
</style>
</head>
<body>
<a class="home" href="../index.html">← HOME</a>

<div id="overlay"><div class="panel" id="panel"></div></div>

function chip(f,d,t='square',v=.04){
 try{
  if(ACX.state==='suspended')ACX.resume();
  if(ACX.state!=='running')return;
  const o=ACX.createOscillator(),g=ACX.createGain();
  o.type=t;o.frequency.value=f;g.gain.value=v*sfxVol;
  g.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+d);
  o.connect(g);g.connect(ACX.destination);o.start();o.stop(ACX.currentTime+d);
 }catch(e){}
}

function startMusic(){
 if(musicInterval)clearInterval(musicInterval);if(!musicOn)return;
 if(ACX.state!=='running')return;
 try{
  musicGain=ACX.createGain();musicGain.gain.value=musVol*.04;musicGain.connect(ACX.destination);
 }catch(e){return}
 beatIdx=0;const t=TRACKS[currentTrack];if(!t)return;
 const ms=Math.floor(60000/t.bpm);
 musicInterval=setInterval(()=>{
  if(!musicOn||ACX.state!=='running')return;
  try{
   const i=beatIdx%t.mel.length;
   const o1=ACX.createOscillator(),g1=ACX.createGain();
   o1.type='square';o1.frequency.value=t.mel[i];g1.gain.value=.03;
   g1.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+.11);
   o1.connect(g1);g1.connect(musicGain);o1.start();o1.stop(ACX.currentTime+.11);
   const o2=ACX.createOscillator(),g2=ACX.createGain();
   o2.type='triangle';o2.frequency.value=t.bas[i];g2.gain.value=.02;
   g2.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+.13);
   o2.connect(g2);g2.connect(musicGain);o2.start();o2.stop(ACX.currentTime+.13);
   if(i%4===0){const n=ACX.createBufferSource(),buf=ACX.createBuffer(1,ACX.sampleRate*.04,ACX.sampleRate),d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.max(0,1-j/d.length);n.buffer=buf;const gn=ACX.createGain();gn.gain.value=.035;n.connect(gn);gn.connect(musicGain);n.start()}
   if(i%2===1){const n=ACX.createBufferSource(),buf=ACX.createBuffer(1,ACX.sampleRate*.015,ACX.sampleRate),d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.max(0,1-j/d.length)*.5;n.buffer=buf;const gn=ACX.createGain();gn.gain.value=.018;n.connect(gn);gn.connect(musicGain);n.start()}
   beatIdx++;
  }catch(e){}
 },ms);
}

  G.relics.map(r=>`<span class="perk-icon" title="${r.name}: ${r.desc}" style="border:1px solid #f0d040;padding:0 1px">${iconImg(r.icon,16)}</span>`).join('');
 const sb=document.getElementById('streak-bar');
 sb.textContent=G.streak>1?`x${G.streak} WIN STREAK`:'';
}

// ═══ ENEMIES ═══
function spawnEnemies(){
 G.enemies=[];G.floorFlags={};
 const isBoss=G.floor%5===0;
 // Floor event (20% chance on non-boss)
 if(!isBoss&&G.floor>1&&Math.random()<.2){
  const ev=FLOOR_EVENTS[Math.floor(Math.random()*FLOOR_EVENTS.length)];
  ev.apply(G);showBanner(ev.name);log(`EVENT: ${ev.name} - ${ev.desc}`,'res-combo');
 }
 if(isBoss){
  const bi=Math.min(Math.floor(G.floor/5)-1,BOSSES.length-1);
  let b={...BOSSES[bi]};b.maxHp=b.hp+G.floor*3;b.hp=b.maxHp;b.poison=0;b.shield=0;b.frozen=0;
  if(G.floorFlags.bloodMoon){b.atk=Math.ceil(b.atk*1.5);b.xp=Math.ceil(b.xp*1.5)}
  G.enemies.push(b);log(`${b.name}: "${b.quip}"`,'res-enemy');setTrack('boss');SFX.boss();
 } else {
  const count=Math.min(4,1+Math.floor(G.floor/3));
  const pool=ENEMIES.filter((_,i)=>i<Math.min(ENEMIES.length,3+Math.floor(G.floor/2)));
  for(let i=0;i<count;i++){
   const t=pool[Math.floor(Math.random()*pool.length)];
   const sc=1+G.floor*.13;
   let e={...t};e.maxHp=Math.ceil(t.hp*sc);e.hp=e.maxHp;e.atk=Math.ceil(t.atk*(1+G.floor*.06));e.poison=0;e.shield=0;e.frozen=0;
   if(G.floorFlags.bloodMoon){e.atk=Math.ceil(e.atk*1.5);e.xp=Math.ceil((e.xp||3)*1.5)}
   G.enemies.push(e);
   if(i===0&&e.quip)log(`${e.name}: "${e.quip}"`,'res-info');
  }
  setTrack('battle');
 }
 if(G.perkFlags.shieldWall)G.shield+=G.perkFlags.shieldWall;
 if(G.perkFlags.payday){G.gold+=G.perkFlags.payday;log(`PAYDAY +${G.perkFlags.payday} GP`,'res-gold')}
 if(G.perkFlags.coffeeBreak&&G.floor>1){G.hp=G.maxHp;log('COFFEE! Full heal.','res-heal')}
 if(G.perkFlags.scavenger){const s=ALL_SHOP[Math.floor(Math.random()*ALL_SHOP.length)];G.reels[Math.floor(Math.random()*G.reels.length)].push(s);log(`Found ${s}!`,'res-combo')}
 if(G.relics.some(r=>r.effect==='ironBoot'))G.floorFlags.ironBootActive=true;
 if(G.relics.some(r=>r.effect==='upgrade')){
  const ri=Math.floor(Math.random()*G.reels.length);const reel=G.reels[ri];
  const weak=reel.findIndex(s=>SYMS[s]&&SYMS[s].tier===0);
  if(weak!==-1){const better=ALL_SHOP.filter(s=>SYMS[s]&&SYMS[s].tier>=1);
   if(better.length){const ns=better[Math.floor(Math.random()*better.length)];reel[weak]=ns;log(`SHROOM: ${reel[weak]}→${ns}`,'res-combo')}}
 }
}
function aliveEnemies(){return G.enemies.filter(e=>e.hp>0)}

// ═══ SPIN ═══
function spin(){
 if(G.spinning||G.phase!=='battle'||aliveEnemies().length===0)return;
 G.spinning=true;G.spinCount++;
 document.getElementById('spinbtn').disabled=true;
 document.getElementById('results').innerHTML='';
 SFX.spin();
 if(G.perkFlags.regen&&G.spinCount%3===0){G.hp=Math.min(G.maxHp,G.hp+1);log('REGEN +1','res-heal')}
 if(G.relics.some(r=>r.effect==='hourglass')&&G.spinCount%5===0){aliveEnemies().forEach(e=>{if(e.atk>1)e.atk--});log('HOURGLASS: enemy ATK -1','res-info')}

 G.reelResults=G.reels.map((pool,ri)=>{
  if(G.relics.some(r=>r.effect==='weightedReels')&&Math.random()<.15){
   const best=pool.filter(s=>SYMS[s]&&(SYMS[s].dmg||SYMS[s].dmgAll));
   if(best.length)return best[Math.floor(Math.random()*best.length)];
  }
  return pool[Math.floor(Math.random()*pool.length)];
 });
 if(G.perkFlags.lucky7&&Math.random()<.08){const s=G.reelResults[0];G.reelResults=G.reelResults.map(()=>s)}

 const rc=G.reels.length;let stopped=0;
 G.reels.forEach((_,i)=>{
  const strip=document.getElementById('strip-'+i),pool=G.reels[i];
  const extra=10+i*3;let syms=[];
  for(let j=0;j<extra;j++)syms.push(pool[Math.floor(Math.random()*pool.length)]);
  syms.push(G.reelResults[i]);
  strip.innerHTML='';strip.className='reel-strip';
  syms.forEach(s=>{const d=document.createElement('div');d.className='reel-symbol';d.innerHTML=symImg(s);strip.appendChild(d)});
  strip.style.transform='translateY(0)';
  const tH=syms.length*70,tY=-(tH-70),dur=(16+i*6)*16;
  strip.style.transition='none';let st=null;
  function anim(t){
   if(!st)st=t;const p=Math.min(1,(t-st)/dur);
   strip.style.transform=`translateY(${tY*(p<.8?p/.8:1)}px)`;
   if(p<1)requestAnimationFrame(anim);
   else{strip.style.transform=`translateY(${tY}px)`;SFX.stop(i);
    document.getElementById('glow-'+i).classList.add('active');setTimeout(()=>document.getElementById('glow-'+i).classList.remove('active'),350);
    stopped++;if(stopped===rc)setTimeout(resolveResults,220)}
  }
  setTimeout(()=>requestAnimationFrame(anim),i*240);
 });
}

// ═══ RESOLVE ═══
function resolveResults(){
 let R=[...G.reelResults];
 let tDmg=0,tHeal=0,tGold=0,tShield=0,crystB=0,refreshR=[];

 // Joker
 const freq={};R.forEach(s=>{if(SYMS[s]&&!SYMS[s].special)freq[s]=(freq[s]||0)+1});
 let mc=R[0],mf=0;for(let[s,c]of Object.entries(freq))if(c>mf){mf=c;mc=s}
 R=R.map(s=>s==='🎪'?mc:s);

 // Rainbow: counts as matching any adjacent symbol
 // Magnet
 R=R.map((s,i)=>{if(s==='🧲'&&i>0)return R[i-1];return s});

 let hasJP=false,hasCrown=false;
 R.forEach(s=>{if(s==='🔮')crystB++;if(s==='🎰')hasJP=true;if(s==='👑')hasCrown=true});
 if(G.charClass?.magicBonus)crystB+=G.charClass.magicBonus;
 if(G.floorFlags.curseDmg)crystB+=G.floorFlags.curseDmg;

 // Clover + crit
 let spinCrit=(G.charClass?.crit||0)+(G.floorFlags.luckyCrit||0);
 R.forEach(s=>{if(s==='🍀')spinCrit+=.05});
 let isCrit=Math.random()<spinCrit;
 let critMul=isCrit?(G.relics.some(r=>r.effect==='critX4')?4:3):1;
 if(isCrit){log('!! CRITICAL !!','res-crit');SFX.crit();screenFlash('#ff4080')}

 // Bell
 let bellBonus=0;R.forEach(s=>{if(s==='🔔')bellBonus+=2});
 if(bellBonus)log(`BELL! +${bellBonus} to all`,'res-combo');

 // Counts & matches
 const counts={};R.forEach(s=>counts[s]=(counts[s]||0)+1);
 // Rainbow counts as matching
 const rainbows=counts['🌈']||0;
 let matchMul=1;
 for(let[s,c]of Object.entries(counts)){
  const eff=c+(s!=='🌈'?rainbows:0);
  if(eff>=3){matchMul=3;log(`>>> TRIPLE ${SYMS[s]?.name||s}! x3 <<<`,'res-combo');SFX.combo();spawnP(document.getElementById('slot-frame'),'#e060f0',18);screenFlash('#a040f0')}
  else if(eff>=2&&matchMul<1.5){matchMul=1.5;log(`>> DOUBLE ${SYMS[s]?.name||s}!`,'res-combo')}
 }

 let jpMul=1;
 if(hasJP&&matchMul>=3){jpMul=3;log('!!! JACKPOT x3 !!!','res-combo');shake();screenFlash('#f0d040');spawnP(document.getElementById('slot-frame'),'#f0d040',25);
  document.getElementById('spinbtn').classList.add('win-flash');setTimeout(()=>document.getElementById('spinbtn').classList.remove('win-flash'),1200)}

 // Combo master
 let comboB=G.perkFlags.comboMaster?G.streak:0;
 let berserkB=G.perkFlags.berserker?Math.floor((G.maxHp-G.hp)/5):0;
 let spenderB=G.perkFlags.bigSpender?Math.floor(G.gold/15):0;
 let lastM=G.perkFlags.lastStand&&G.hp<=5?2:1;

 // Bullseye
 let mults=R.map(()=>1);
 R.forEach((s,i)=>{if(s==='🎯'&&i<R.length-1)mults[i+1]*=2});

 const greedB=G.perkFlags.greed||0;
 const healMul=1+(G.charClass?.healBonus||0);
 const goldFloorMul=G.floorFlags.goldX2?2:1;
 const crownMul=hasCrown?1.5:1;

 R.forEach((sym,i)=>{
  const def=SYMS[sym];if(!def)return;
  const m=mults[i]*matchMul*jpMul*critMul*lastM;
  const dmgExtra=berserkB+spenderB+comboB+bellBonus+crystB;

  if(def.dmg){
   let d=def.dmg;
   if(def.adjGlobal&&def.adj)d+=def.adjBonus*(counts[sym]-1);
   else if(def.adj){if(i>0&&R[i-1]===def.adj)d+=def.adjBonus;if(i<R.length-1&&R[i+1]===def.adj)d+=def.adjBonus}
   d=(d+dmgExtra)*m;d=Math.floor(d);
   if(def.special==='bone'){if(aliveEnemies().some(e=>e.tags?.includes('undead'))){d+=4;log('BONE vs UNDEAD! +4!','res-crit')}}
   if(def.special==='snipe'){const ae=aliveEnemies();const tgt=ae.length>1?ae[ae.length-1]:ae[0];
    if(tgt){dealDmg(tgt,d);tDmg+=d;log(`${sym} ${d}→${tgt.name} (back)`,'res-dmg')}}
   else{tDmg+=d;const tgt=aliveEnemies()[0];if(tgt){dealDmg(tgt,d);log(`${sym} ${d}→${tgt.name}`,'res-dmg')}}
   if(G.perkFlags.poisonTip&&Math.random()<.2){const tgt=aliveEnemies()[0];if(tgt){tgt.poison+=2;log('POISON TIP!','res-dmg')}}
   if(def.special==='freeze'){const tgt=aliveEnemies()[0];if(tgt){tgt.frozen=2;log(`${tgt.name} FROZEN!`,'res-shield')}}
  }
  if(def.dmgAll){let d=Math.floor((def.dmgAll+(G.perkFlags.bombBonus||0)+dmgExtra)*m);
   aliveEnemies().forEach(e=>dealDmg(e,d));log(`${sym} ${d}→ALL!`,'res-dmg');tDmg+=d*aliveEnemies().length;shake();screenFlash('#f06060')}
  if(def.heal){const h=Math.floor(def.heal*m*healMul);tHeal+=h;G.hp=Math.min(G.maxHp,G.hp+h)}
  if(def.gold){const g=Math.floor((def.gold+greedB)*m*goldFloorMul*crownMul);tGold+=g;G.gold+=g}
  if(def.shield){const s=Math.floor(def.shield*m);tShield+=s;G.shield+=s}
  if(def.selfDmg){G.hp-=def.selfDmg;log(`${sym} costs ${def.selfDmg} HP`,'res-enemy')}

  if(def.special==='star'){const u=new Set(R).size;const d=Math.floor((u+dmgExtra)*m);tDmg+=d;const tgt=aliveEnemies()[0];if(tgt){dealDmg(tgt,d);log(`STAR ${u} unique=${d}`,'res-dmg')}}
  if(def.special==='poison')aliveEnemies().forEach(e=>{e.poison+=3;log(`${e.name} poisoned!`,'res-dmg')});
  if(def.special==='lightning'){let d=Math.floor((2+dmgExtra)*m);const ae=aliveEnemies();for(let c=0;c<Math.min(3,ae.length);c++){const t=ae[Math.floor(Math.random()*ae.length)];dealDmg(t,d);tDmg+=d;log(`BOLT→${t.name} ${d}`,'res-dmg');d=Math.max(1,Math.floor(d*.7))}}
  if(def.special==='coin'){const g=Math.floor((G.spinCount+greedB)*m*goldFloorMul*crownMul);tGold+=g;G.gold+=g;log(`COIN +${g} GP`,'res-gold')}
  if(def.special==='moon'){const d=Math.floor((G.shield+dmgExtra)*m);if(d>0){const t=aliveEnemies()[0];if(t){dealDmg(t,d);tDmg+=d;log(`MOON ${d} (${G.shield}SH)`,'res-dmg')}}}
  if(def.special==='tornado'){G.enemies.sort(()=>Math.random()-.5);log('TORNADO! Shuffled!','res-info')}
  if(def.special==='drain'){const t=aliveEnemies()[0];if(t){const d=Math.min(3,t.hp);dealDmg(t,d);G.hp=Math.min(G.maxHp,G.hp+d);tDmg+=d;tHeal+=d;log(`DRAIN ${d} from ${t.name}`,'res-dmg')}}
  if(def.special==='lootbox'){
   const r=Math.random();
   if(r<.15){const g=Math.floor((Math.random()*20+5)*goldFloorMul);G.gold+=g;tGold+=g;log(`LOOT: ${g} GP!`,'res-gold')}
   else if(r<.3){const h=Math.floor(Math.random()*6+3);G.hp=Math.min(G.maxHp,G.hp+h);tHeal+=h;log(`LOOT: ${h} HP!`,'res-heal')}
   else if(r<.45){G.shield+=6;tShield+=6;log('LOOT: +6 SH!','res-shield')}
   else if(r<.65){const d=Math.floor(Math.random()*10+5);const t=aliveEnemies()[0];if(t){dealDmg(t,d);tDmg+=d;log(`LOOT: ${d} DMG!`,'res-dmg')}}
   else if(r<.8){aliveEnemies().forEach(e=>e.poison+=3);log('LOOT: Poison ALL!','res-dmg')}
   else{gainXP(5);log('LOOT: +5 XP!','res-xp')}
  }
  if(def.special==='refresh')refreshR.push(i);
 });

 if(tHeal>0){log(`+${tHeal} HP`,'res-heal');SFX.heal()}
 if(tGold>0){log(`+${tGold} GP`,'res-gold');SFX.gold();meta.totalGold+=tGold;saveMeta()}
 if(tShield>0)log(`+${tShield} SH`,'res-shield');
 if(tDmg>0){SFX.hit();if(tDmg>=8){shake();spawnP(document.getElementById('slot-frame'),'#f06060',10)}}
 if(tDmg>0)G.streak++;else G.streak=0;
 if(G.streak>G.bestStreak)G.bestStreak=G.streak;

 renderEnemies();updateUI();

 // Kill tracking
 G.enemies.forEach((e,i)=>{
  if(e.hp<=0&&!e._dead){e._dead=true;G.kills++;meta.kills++;
   spawnP(document.getElementById('enemy-'+i),'#f04040',8);
   if(G.perkFlags.vampiric){const h=G.perkFlags.vampiric;G.hp=Math.min(G.maxHp,G.hp+h);log(`VAMP +${h}`,'res-heal')}
   if(G.perkFlags.goldTooth){G.gold+=1;log('+1 GP (tooth)','res-gold')}
   if(G.charClass?.id==='necro'){G.hp=Math.min(G.maxHp,G.hp+2);log('NECRO +2 HP','res-heal')}
   gainXP(e.xp||3);
  }
 });

 if(refreshR.length>0){setTimeout(()=>{log('RESPIN!','res-info');G.spinning=false;spin()},500);return}
 if(G.perkFlags.doubleDown&&Math.random()<.12){setTimeout(()=>{log('DOUBLE DOWN!','res-combo');G.spinning=false;spin()},500);return}

 if(aliveEnemies().length===0){
  setTimeout(()=>{
   SFX.win();log('FLOOR CLEARED!','res-combo');screenFlash('#40e040');showBanner('CLEAR!');
   G.spinning=false;
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta();log(`NEW BEST: F-${G.floor}!`,'res-combo')}
   for(let[f,syms]of Object.entries(UNLOCK_MAP)){if(G.floor>=+f&&!meta.unlocked.includes(+f)){meta.unlocked.push(+f);saveMeta();log(`UNLOCKED: ${syms.join(' ')}!`,'res-combo')}}
   if(G.floor%5===0)showRelicChoice();
   else if(G.floor%3===0)showPerkChoice();
   else showShop();
  },450);return;
 }
 setTimeout(enemyTurn,350);
}

function dealDmg(e,d){
 if(e.shield>0){const b=Math.min(e.shield,d);e.shield-=b;d-=b}
 e.hp=Math.max(0,e.hp-d);
 const idx=G.enemies.indexOf(e),el=document.getElementById('enemy-'+idx);
 if(el){el.classList.remove('hit');void el.offsetWidth;el.classList.add('hit')}
}

// ═══ ENEMY TURN ═══
function enemyTurn(){
 let tTaken=0;
 aliveEnemies().forEach(e=>{
  if(e.poison>0){e.poison--;e.hp-=1;log(`${e.name} PSN`,'res-dmg');if(e.hp<=0){if(!e._dead){e._dead=true;G.kills++;meta.kills++;gainXP(e.xp||3);if(G.perkFlags.vampiric){G.hp=Math.min(G.maxHp,G.hp+G.perkFlags.vampiric)}if(G.charClass?.id==='necro'){G.hp=Math.min(G.maxHp,G.hp+2)}}return}}
  if(e.hp<=0)return;
  if(e.frozen>0){e.frozen--;log(`${e.name} is FROZEN`,'res-shield');return}
  let dmg=e.atk;
  if(e.ability==='dodge'&&Math.random()<.3){log(`${e.name} dodges!`,'res-info');return}
  if(e.ability==='phase'&&Math.random()<.4){log(`${e.name} phases!`,'res-info');return}
  if(e.ability==='confuse'&&Math.random()<.25){log(`${e.name} confuses you! Lost turn.`,'res-enemy');return}
  if(G.floorFlags.ironBootActive){G.floorFlags.ironBootActive=false;log('IRON BOOT! 0 DMG!','res-shield');return}
  // Armor reduce
  if(G.perkFlags.armorReduce)dmg=Math.max(1,dmg-G.perkFlags.armorReduce);
  if(G.shield>0){const b=Math.min(G.shield,dmg);G.shield-=b;dmg-=b;if(b>0)log(`SH blocks ${b}`,'res-shield')}
  if(dmg>0){G.hp-=dmg;tTaken+=dmg;log(`${e.name} ATK ${dmg}`,'res-enemy');
   if(G.perkFlags.thorns){const td=G.perkFlags.thorns;dealDmg(e,td);log(`THORNS ${td}!`,'res-dmg')}
   if(G.relics.some(r=>r.effect==='reflect')){const rd=Math.ceil(dmg*.25);dealDmg(e,rd);log(`REFLECT ${rd}!`,'res-dmg')}
  }
  if(e.ability==='poison'){G.poison+=2;log(`${e.name} poisons!`,'res-enemy')}
  if(e.ability==='lifesteal'){const h=Math.ceil(e.atk/2);e.hp=Math.min(e.maxHp,e.hp+h);log(`${e.name} drains ${h}`,'res-enemy')}
  if(e.ability==='shield'){e.shield+=2;log(`${e.name} +2SH`,'res-shield')}
  if(e.ability==='steal'&&dmg>0){const s=Math.min(G.gold,3);G.gold-=s;if(s>0)log(`${e.name} steals ${s}GP!`,'res-enemy')}
  if(e.ability==='complain'){e.atk+=1;log(`${e.name} ATK UP!`,'res-enemy')}
  if(e.ability==='regen'){const h=Math.ceil(e.maxHp*.05);e.hp=Math.min(e.maxHp,e.hp+h);log(`${e.name} regens ${h}`,'res-enemy')}
  if(e.ability==='split'&&e.hp>0&&e.hp<e.maxHp*.4&&!e._split){
   e._split=true;const baby={...e,hp:Math.ceil(e.maxHp*.3),maxHp:Math.ceil(e.maxHp*.3),name:'BABY',atk:Math.max(1,e.atk-1),_dead:false,_split:true};
   G.enemies.push(baby);log(`${e.name} SPLITS!`,'res-enemy');
  }
 });
 if(G.poison>0){G.hp-=G.poison;log(`PSN ${G.poison}`,'res-enemy');G.poison=Math.max(0,G.poison-1)}
 if(tTaken>0){SFX.taken();G.streak=0;if(tTaken>=4){shake();screenFlash('#f04040')};document.getElementById('app').classList.add('dmg-flash');setTimeout(()=>document.getElementById('app').classList.remove('dmg-flash'),250)}
 renderEnemies();updateUI();

 if(G.hp<=0){
  if(G.relics.some(r=>r.effect==='revive')&&!G.reviveUsed){
   G.reviveUsed=true;G.hp=5;showBanner('REVIVED!');log('BLOOD VIAL! Revived with 5 HP!','res-combo');SFX.relic();
   G.relics=G.relics.filter(r=>r.effect!=='revive');
   renderEnemies();updateUI();G.spinning=false;document.getElementById('spinbtn').disabled=false;return;
  }
  setTimeout(showDeath,400);return;
 }
 if(aliveEnemies().length===0){
  setTimeout(()=>{SFX.win();log('CLEARED!','res-combo');screenFlash('#40e040');
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta()}
   for(let[f,syms]of Object.entries(UNLOCK_MAP)){if(G.floor>=+f&&!meta.unlocked.includes(+f)){meta.unlocked.push(+f);saveMeta()}}
   if(G.floor%5===0)showRelicChoice();else if(G.floor%3===0)showPerkChoice();else showShop();
  },350);return;
 }
 G.spinning=false;document.getElementById('spinbtn').disabled=false;
}

// ═══ RELIC CHOICE (every 5 floors) ═══
function showRelicChoice(){
 G.phase='relic';SFX.relic();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 const owned=new Set(G.relics.map(r=>r.id));
 const avail=ALL_RELICS.filter(r=>!owned.has(r.id));
 const choices=avail.sort(()=>Math.random()-.5).slice(0,3);
 pn.innerHTML=`<h2>RELIC FOUND!</h2><p style="font-size:4px;color:#8080a0;margin-bottom:4px">BOSS DEFEATED! CHOOSE A RELIC</p>
  ${choices.map((r,i)=>`<div class="perk-card" onclick="pickRelic(${i})" style="border-color:#f0d040">
   ${iconImg(r.icon,28)}<div class="pname" style="color:#f0d040">${r.name}</div><div class="desc">${r.desc}</div></div>`).join('')}
  <button class="btn" onclick="skipRelic()" style="margin-top:4px">SKIP (+15 GP)</button>`;
 window.pickRelic=i=>{G.relics.push(choices[i]);SFX.buy();updateUI();showPerkChoice()};
 window.skipRelic=()=>{G.gold+=15;SFX.gold();showPerkChoice()};
}

// ═══ PERK CHOICE ═══
function showPerkChoice(){
 G.phase='perk';SFX.perk();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 const owned=new Set(G.perks.map(p=>p.id));
 const avail=ALL_PERKS.filter(p=>!owned.has(p.id)||p.stack);
 const choices=avail.sort(()=>Math.random()-.5).slice(0,3);
 pn.innerHTML=`<h2>LEVEL UP!</h2><p style="font-size:4px;color:#8080a0;margin-bottom:4px">CHOOSE A PERK</p>
  ${choices.map((p,i)=>`<div class="perk-card" onclick="pickPerk(${i})">
   ${iconImg(p.icon,28)}<div class="pname">${p.name}</div><div class="desc">${p.desc}</div></div>`).join('')}
  <button class="btn" onclick="skipPerk()" style="margin-top:4px">SKIP (+10 GP)</button>`;
 window.pickPerk=i=>{choices[i].apply(G);G.perks.push(choices[i]);SFX.buy();updateUI();buildReels();showShop()};
 window.skipPerk=()=>{G.gold+=10;SFX.gold();showShop()};
}

// ═══ SHOP ═══
function showShop(){
 G.phase='shop';G.shield=0;setTrack('shop');SFX.shop();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 const unlocked=getUnlocked();const available=ALL_SHOP.filter(s=>unlocked.includes(s));
 const shopSize=G.relics.some(r=>r.effect==='bigShop')?6:5;
 let items=[],sold=[];
 function restock(){items=[...available].sort(()=>Math.random()-.5).slice(0,shopSize);sold=items.map(()=>false)}
 restock();
 const disc=G.charClass?.shopDiscount||0;
 const interestR=G.relics.some(r=>r.effect==='interest');
 if(interestR){const bonus=Math.floor(G.gold*.1);G.gold+=bonus;if(bonus>0)log(`INTEREST +${bonus} GP`,'res-gold')}
 const goldMagnet=G.relics.some(r=>r.effect==='goldMagnet');

 function render(){
  const cost=s=>{const t=SYMS[s]?.tier||0;const base=[12,22,32,45][t];return Math.floor(base*(1-disc))};
  pn.innerHTML=`<h2>SHOP F${G.floor}</h2>
   <p style="font-size:5px;color:#8080a0;margin-bottom:3px">GP:<span style="color:#f0d040">${G.gold}</span> HP:${G.hp}/${G.maxHp} LV${G.level} REELS:${G.reels.length}</p>
   <h3>BUY SYMBOLS</h3>
   <div class="shop-grid">${items.map((s,i)=>{const c=cost(s),d=SYMS[s];
    return`<div class="shop-card${sold[i]?' sold':''}" onclick="buy(${i})">
     <div class="shop-emoji">${symImg(s)}</div><div class="shop-name">${d.name}</div>
     <div class="shop-desc">${d.desc}</div><div class="shop-cost">${c}G</div></div>`}).join('')}</div>
   <h3>REMOVE (5G)</h3>
   <div class="remove-grid" id="rmg">${[...new Set(G.reels.flat())].map(s=>`<div class="remove-card">${s}</div>`).join('')}</div>
   <div style="margin-top:4px;display:flex;flex-wrap:wrap;justify-content:center;gap:2px">
    <button class="btn" onclick="heal()">HEAL ${Math.floor(18*(1-disc))}G</button>
    ${G.reels.length<7?`<button class="btn" onclick="addReel()">+REEL ${Math.floor(45*(1-disc))}G</button>`:''}
    <button class="btn" onclick="reroll()">REROLL 5G</button>
    <button class="btn" onclick="dupe()">DUPE 25G</button>
    <button class="btn btn-red" onclick="destroy()">DESTROY 0G</button>
   </div>
   <button class="btn btn-gold" onclick="nextFloor()" style="margin-top:6px">NEXT FLOOR >></button>`;

  window.buy=i=>{if(sold[i])return;const s=items[i],c=cost(s);if(G.gold<c)return;G.gold-=c;sold[i]=true;
   G.reels[Math.floor(Math.random()*G.reels.length)].push(s);SFX.buy();render()};
  document.getElementById('rmg')?.addEventListener('click',ev=>{
   const c=ev.target.closest('.remove-card');if(!c)return;const s=c.textContent.trim();if(G.gold<5)return;
   for(let r of G.reels){const i=r.indexOf(s);if(i!==-1&&r.length>3){r.splice(i,1);G.gold-=5;SFX.buy();render();return}}
  });
  window.heal=()=>{const c=Math.floor(18*(1-disc));if(G.gold<c)return;G.gold-=c;G.hp=G.maxHp;SFX.heal();render()};
  window.addReel=()=>{const c=Math.floor(45*(1-disc));if(G.gold<c||G.reels.length>=7)return;G.gold-=c;G.reels.push([...BASE_SYMBOLS]);SFX.buy();render()};
  window.reroll=()=>{if(G.gold<5)return;G.gold-=5;restock();SFX.buy();render()};
  window.dupe=()=>{if(G.gold<25)return;const all=[...new Set(G.reels.flat())];const p=all[Math.floor(Math.random()*all.length)];
   G.gold-=25;for(let r of G.reels)r.push(p);log(`DUPED ${p}!`,'res-combo');SFX.buy();render()};
  window.destroy=()=>{
   const all=[...new Set(G.reels.flat())];if(all.length<=3)return;
   const worst=all.filter(s=>SYMS[s]&&SYMS[s].tier===0);const pick=worst.length?worst[Math.floor(Math.random()*worst.length)]:all[Math.floor(Math.random()*all.length)];
   let removed=0;for(let r of G.reels){const i=r.indexOf(pick);if(i!==-1&&r.length>3){r.splice(i,1);removed++}}
   log(`DESTROYED ${pick} (${removed}x)`,'res-dmg');SFX.taken();render()};
 }
 render();
}

function nextFloor(){
 document.getElementById('overlay').classList.remove('show');
 G.floor++;G.phase='battle';G.shield=0;G.spinCount=0;G.poison=0;
 spawnEnemies();renderEnemies();buildReels();updateUI();
 document.getElementById('results').innerHTML='';
 G.spinning=false;document.getElementById('spinbtn').disabled=false;
 log(`FLOOR ${G.floor} - FIGHT!`,'res-info');screenFlash('#4080e0');
}

// ═══ DEATH ═══
function showDeath(){
 SFX.die();G.phase='dead';stopMusic();screenFlash('#f04040');
 meta.runs++;if(G.floor>meta.bestFloor){meta.bestFloor=G.floor}saveMeta();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 pn.innerHTML=`<h2 style="color:#f04040">GAME OVER</h2>
  <div style="margin:6px">${iconImg('💀',40)}</div>
  <p style="font-size:6px;margin:4px 0">FLOOR <span style="color:#f0d040">${G.floor}</span> | LV${G.level} | ${G.charClass?.name}</p>
  <p style="font-size:5px;color:#6a6a8a">${G.kills} kills | ${G.bestStreak} best streak</p>
  <p style="font-size:5px;color:#6a6a8a">BEST: F-${meta.bestFloor} | RUNS: ${meta.runs}</p>
  ${G.perks.length?`<p style="font-size:5px;color:#6a6a8a;margin:3px 0">PERKS: ${G.perks.map(p=>p.name[0]).join('')}</p>`:''}
  ${G.relics.length?`<p style="font-size:5px;color:#f0d040;margin:2px 0">RELICS: ${G.relics.map(r=>r.name[0]).join('')}</p>`:''}
  <button class="btn btn-gold" onclick="showCharSelect()" style="margin-top:6px">RETRY</button>`;
}

// ═══ CHARACTER SELECT ═══
function showCharSelect(){
 G={...freshState(CLASSES[0])};
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 pn.innerHTML=`<h2>CHOOSE CLASS</h2>
  ${CLASSES.map((c,i)=>`<div class="char-card" onclick="pick(${i})">
   ${iconImg(c.icon,32)}<div class="cname">${c.name}</div>
   <div class="desc">${c.desc.replace(/\n/g,'<br>')}</div>
   <div style="font-size:4px;color:#6060a0;margin-top:2px">HP:${c.hp} CRIT:${Math.round(c.crit*100)}%${c.gold?' GP:'+c.gold:''}${c.extraReels?' +REEL':''}</div>
  </div>`).join('')}`;
 window.pick=i=>{SFX.buy();startRun({...CLASSES[i]})};
}

// ═══ TITLE ═══
function showTitle(){
 stopMusic();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');ov.classList.add('show');
 const stats=meta.bestFloor?`<div style="border:1px solid #2a2a4a;padding:4px;margin:4px 0;font-size:4px;color:#6a6a8a;line-height:2">
  BEST: F-${meta.bestFloor} | RUNS: ${meta.runs} | KILLS: ${meta.kills||0} | GP: ${meta.totalGold}</div>`:'';
 const unlocks=meta.bestFloor>=3?`<p style="font-size:5px;color:#a060f0;margin:2px 0">${Object.entries(UNLOCK_MAP).filter(([f])=>meta.bestFloor>=+f).map(([,s])=>s.join('')).join(' ')}</p>`:'';
 pn.innerHTML=`
  <div style="margin:8px">${iconImg('🎰',48)}</div>
  <h2 class="title-glow" style="font-size:10px;line-height:1.8">TYLER'S<br>ROGUE SLOTS</h2>
  <p style="font-size:4px;color:#8080a0;margin:4px 0;letter-spacing:2px">ROGUELIKE SLOT MACHINE RPG</p>
  <div style="border:1px solid #2a2a4a;padding:4px;margin:4px 0;font-size:4px;color:#6a6a8a;line-height:1.8">
   8 CLASSES • 30+ SYMBOLS • 24 PERKS<br>
   10 RELICS • 16 ENEMIES • 6 BOSSES<br>
   XP & LEVELS • FLOOR EVENTS • ∞ FLOORS
  </div>
  ${stats}${unlocks}
  <button class="btn btn-gold" onclick="showCharSelect()" style="margin-top:8px;font-size:8px;padding:10px 24px">START</button>
  <div style="font-size:3px;color:#3a3a5a;margin-top:6px">v3.0 // taskiap.com</div>`;
}

function startRun(cls){
 document.getElementById('overlay').classList.remove('show');
 G=freshState(cls);
 spawnEnemies();buildReels();renderEnemies();updateUI();
 document.getElementById('results').innerHTML='';
 document.getElementById('spinbtn').disabled=false;
 log(`${cls.name} ready!`,'res-combo');
 log('FLOOR 1 - FIGHT!','res-info');
 const resume=ACX.state==='suspended'?ACX.resume():Promise.resolve();
 resume.then(()=>startMusic()).catch(()=>{});
}

buildReels();updateUI();showTitle();
</script>
