<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Tyler's Rogue Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0c0c1a;font-family:'Press Start 2P',monospace;touch-action:manipulation;user-select:none;-webkit-user-select:none;color:#e8e8e8;image-rendering:pixelated}
a.home{position:fixed;top:6px;left:6px;z-index:100;color:#6a6a8a;text-decoration:none;font-size:8px;letter-spacing:1px}
a.home:hover{color:#fff}
body::after{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0px,rgba(0,0,0,.07) 1px,transparent 1px,transparent 3px)}
body::before{content:'';position:fixed;inset:0;z-index:998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.4) 100%)}
#app{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;position:relative}
#topbar{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#12122a;border-bottom:2px solid #2a2a4a;font-size:7px;flex-shrink:0;z-index:5;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:2px;line-height:1}
.stat-bar{width:50px;height:7px;background:#0a0a18;border:1px solid #3a3a5a;overflow:hidden}
.stat-fill{height:100%;transition:width .3s}
#hp-fill{background:#e04040}
.floor-ind{margin-left:auto;color:#f0d040;font-size:8px;text-shadow:0 0 6px rgba(240,208,64,.5)}
#char-icon{font-size:14px;margin-right:2px}
#enemies{flex:0 0 auto;padding:4px 8px;display:flex;flex-direction:column;gap:3px;min-height:30px}
.enemy-row{display:flex;align-items:center;gap:5px;padding:3px 5px;background:rgba(40,10,10,.5);border:1px solid #4a1a1a;font-size:7px;transition:all .2s}
.enemy-row.dead{opacity:.15;transform:scale(.95)}.enemy-row.hit{animation:eHit .3s}
@keyframes eHit{0%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}100%{transform:translateX(0)}}
.enemy-icon{font-size:14px}.enemy-name{font-size:5px;color:#a08080;min-width:40px}
.enemy-hp-bar{flex:1;height:5px;background:#0a0a18;border:1px solid #4a1a1a;overflow:hidden}
.enemy-hp-fill{height:100%;background:#e04040;transition:width .3s}
.enemy-atk{font-size:5px;color:#f06060;min-width:24px;text-align:right}
.enemy-status{font-size:6px}
#machine{flex:0 0 auto;padding:8px;display:flex;justify-content:center;align-items:center;flex-direction:column}
.machine-label{font-size:7px;color:#f0d040;text-shadow:0 0 8px rgba(240,208,64,.4);margin-bottom:4px;letter-spacing:3px;animation:flicker 3s infinite}
@keyframes flicker{0%,95%,100%{opacity:1}96%{opacity:.6}97%{opacity:1}98%{opacity:.4}}
.slot-frame{background:#0a0a18;border:4px solid #f0d040;padding:6px 8px;display:flex;gap:4px;position:relative;box-shadow:0 0 20px rgba(240,208,64,.2),inset 0 0 30px rgba(0,0,0,.8);transition:all .3s}
.slot-frame::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #f04040}
.reel-container{width:48px;height:52px;overflow:hidden;background:#08081a;border:2px solid #3a3a6a;position:relative}
.reel-strip{display:flex;flex-direction:column;align-items:center;transition:none;position:absolute;width:100%}
.reel-strip.stopping{transition:transform .4s cubic-bezier(.2,.8,.3,1.05)}
.reel-symbol{width:48px;height:52px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.reel-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s}
.reel-glow.active{opacity:1;box-shadow:inset 0 0 12px rgba(240,208,64,.5)}
.payline{position:absolute;left:-2px;right:-2px;top:50%;height:2px;background:#f04040;transform:translateY(-1px);z-index:2;box-shadow:0 0 6px #f04040;pointer-events:none}
#spinbtn{display:block;margin:4px auto 0;padding:9px 36px;font-size:9px;font-family:'Press Start 2P',monospace;background:#e04040;color:#fff;border:3px solid #f06060;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 0 #801010,0 0 20px rgba(224,64,64,.3);transition:all .1s;-webkit-tap-highlight-color:transparent}
#spinbtn:active{transform:translateY(3px);box-shadow:0 1px 0 #801010}
#spinbtn:disabled{opacity:.3;cursor:default;transform:none}
#spinbtn.win-flash{animation:btnFlash .5s 3}
@keyframes btnFlash{0%,100%{background:#e04040}50%{background:#40e040}}
#perk-bar{display:flex;gap:2px;justify-content:center;padding:2px 8px;flex-wrap:wrap;min-height:12px}
.perk-icon{font-size:10px;opacity:.7;cursor:help}
#results{flex:1;overflow-y:auto;padding:4px 8px;font-size:6px;display:flex;flex-direction:column;gap:1px;min-height:20px;line-height:1.6}
.res-line{padding:1px 0}.res-dmg{color:#f06060}.res-heal{color:#40e040}.res-gold{color:#f0d040}.res-shield{color:#6090f0}.res-combo{color:#e060f0;animation:comboPulse .5s}.res-info{color:#6a6a8a}.res-enemy{color:#f09040}.res-crit{color:#ff4080;font-weight:700}
@keyframes comboPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
#overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(5,5,15,.94)}
#overlay.show{display:flex}
.panel{background:#12122a;border:4px solid #f0d040;padding:14px;max-width:360px;width:94%;max-height:88vh;overflow-y:auto;text-align:center;box-shadow:0 0 40px rgba(240,208,64,.15),inset 0 0 60px rgba(0,0,0,.5)}
.panel h2{font-size:9px;margin-bottom:8px;color:#f0d040;text-shadow:0 0 10px rgba(240,208,64,.4);letter-spacing:2px}
.panel h3{font-size:6px;margin:6px 0 4px;color:#a0a0c0;letter-spacing:1px}
.shop-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:5px 0}
.shop-card{background:rgba(255,255,255,.03);border:2px solid #2a2a4a;padding:6px 4px;cursor:pointer;text-align:center;width:72px;transition:all .15s}
.shop-card:hover{border-color:#f0d040;background:rgba(240,208,64,.05)}
.shop-card.sold{opacity:.2;pointer-events:none}
.shop-emoji{font-size:18px;margin-bottom:2px}.shop-name{font-size:5px;color:#8080a0;margin:1px 0;letter-spacing:1px}.shop-cost{font-size:6px;color:#f0d040}
.shop-desc{font-size:4px;color:#6060a0;margin-top:1px;line-height:1.5}
.btn{display:inline-block;padding:7px 12px;margin:2px;font-size:6px;font-family:'Press Start 2P',monospace;background:#1a1a3a;color:#c0c0e0;border:2px solid #3a3a6a;cursor:pointer;transition:all .15s;letter-spacing:1px}
.btn:hover{border-color:#f0d040;color:#fff;background:#2a2a4a}.btn:disabled{opacity:.2;cursor:default}
.btn-gold{background:#d0a020;color:#0c0c1a;border-color:#f0d040}
.btn-gold:hover{background:#f0c040}
.remove-grid{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:4px 0}
.remove-card{background:rgba(200,40,40,.1);border:2px solid #4a1a1a;padding:3px;cursor:pointer;font-size:16px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.remove-card:hover{border-color:#f04040;background:rgba(200,40,40,.2)}
.poison-indicator{color:#a060f0;font-size:6px}
#particles{position:fixed;inset:0;pointer-events:none;z-index:40}
#music-btn{position:fixed;top:6px;right:6px;z-index:100;background:none;border:1px solid #3a3a5a;color:#6a6a8a;font-family:'Press Start 2P',monospace;font-size:6px;padding:3px 5px;cursor:pointer}
#music-btn:hover{color:#fff;border-color:#f0d040}
.title-glow{animation:titleGlow 2s ease-in-out infinite alternate}
@keyframes titleGlow{0%{text-shadow:0 0 10px rgba(240,208,64,.3)}100%{text-shadow:0 0 30px rgba(240,208,64,.7),0 0 60px rgba(240,64,64,.3)}}
.title-sub{animation:titleSub 1.5s ease-in-out infinite alternate}
@keyframes titleSub{0%{opacity:.6}100%{opacity:1}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a18}::-webkit-scrollbar-thumb{background:#3a3a6a}
@keyframes dmgFlash{0%{background:#4a0a0a}100%{background:transparent}}
.dmg-flash{animation:dmgFlash .3s}
.char-card{background:rgba(255,255,255,.03);border:2px solid #2a2a4a;padding:8px;cursor:pointer;text-align:center;width:100%;margin:4px 0;transition:all .15s}
.char-card:hover{border-color:#f0d040;background:rgba(240,208,64,.05)}
.char-card .emoji{font-size:24px}
.char-card .name{font-size:7px;color:#f0d040;margin:4px 0}
.char-card .desc{font-size:5px;color:#8080a0;line-height:1.8}
.perk-card{background:rgba(255,255,255,.03);border:2px solid #2a2a4a;padding:6px;cursor:pointer;text-align:center;width:100%;margin:3px 0;transition:all .15s}
.perk-card:hover{border-color:#40e040;background:rgba(64,224,64,.05)}
.perk-card .emoji{font-size:16px}.perk-card .name{font-size:6px;color:#40e040;margin:2px 0}.perk-card .desc{font-size:5px;color:#8080a0;line-height:1.6}
</style>
</head>
<body>
<a class="home" href="../index.html">← HOME</a>
<button id="music-btn" onclick="toggleMusic()">♪ ON</button>
<div id="app">
<div id="topbar">
 <span id="char-icon">🤠</span>
 <span class="stat">HP<span id="hp-text" style="color:#f06060;margin:0 2px">20/20</span><div class="stat-bar"><div class="stat-fill" id="hp-fill" style="width:100%"></div></div></span>
 <span class="stat">SH<span id="shield-text" style="color:#6090f0;margin:0 2px">0</span></span>
 <span class="stat">GP<span id="gold-text" style="color:#f0d040;margin:0 2px">0</span></span>
 <span class="stat poison-indicator" id="poison-stat" style="display:none">PSN<span id="poison-text" style="margin-left:2px">0</span></span>
 <span class="floor-ind">F-<span id="floor-num">1</span></span>
</div>
<div id="enemies"></div>
<div id="machine">
 <div class="machine-label">ROGUE SLOTS</div>
 <div class="slot-frame" id="slot-frame"><div class="payline"></div></div>
</div>
<button id="spinbtn" onclick="spin()">SPIN</button>
<div id="perk-bar"></div>
<div id="results"></div>
</div>
<div id="overlay"><div class="panel" id="panel"></div></div>
<canvas id="particles"></canvas>
<script>
// ─── AUDIO ───
const ACX=new(window.AudioContext||window.webkitAudioContext)();
let musicOn=true,musicGain,musicInterval;
function chip(freq,dur,type='square',vol=.05){
 if(ACX.state==='suspended')ACX.resume();
 const o=ACX.createOscillator(),g=ACX.createGain();
 o.type=type;o.frequency.value=freq;g.gain.value=vol;
 g.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+dur);
 o.connect(g);g.connect(ACX.destination);o.start();o.stop(ACX.currentTime+dur);
}
function arp(freqs,gap=.08,dur=.1,type='square',vol=.04){freqs.forEach((f,i)=>setTimeout(()=>chip(f,dur,type,vol),i*gap*1000))}
function sndHit(){chip(180,.08,'sawtooth',.04);setTimeout(()=>chip(120,.1,'sawtooth',.03),50)}
function sndHeal(){arp([523,659,784],.06,.12,'square',.03)}
function sndGold(){arp([987,1318],.05,.08,'square',.04)}
function sndSpin(){chip(80,.6,'sawtooth',.02)}
function sndStop(i){chip(262+i*131,.06,'square',.03)}
function sndDie(){arp([392,330,262,196],.15,.2,'sawtooth',.04)}
function sndWin(){arp([523,659,784,1047],.08,.12,'square',.04)}
function sndTaken(){chip(130,.12,'sawtooth',.04)}
function sndCombo(){arp([784,988,1175,1568],.04,.08,'square',.03)}
function sndShop(){arp([523,392,330],.1,.15,'triangle',.03)}
function sndBuy(){arp([330,523,659],.05,.1,'square',.03)}
function sndPerk(){arp([440,554,659,880],.06,.1,'square',.04)}
function sndCrit(){arp([880,1175,1568],.03,.06,'square',.05)}

// ─── MUSIC ───
const TRACKS={
 battle:[[196,262,330,392,330,262,196,262,220,294,370,440,370,294,220,294],[131,165,196,262,196,165,131,165,147,196,247,294,247,196,147,196]],
 boss:[[165,196,220,262,220,247,220,196,175,208,247,294,262,247,220,196],[110,131,147,175,147,165,147,131,117,139,165,196,175,165,147,131]],
 shop:[[330,392,440,523,494,440,392,330,349,440,494,523,587,523,494,440],[165,196,220,262,247,220,196,165,175,220,247,262,294,262,247,220]]
};
let currentTrack='battle',beatIdx=0;
function startMusic(){
 if(musicInterval)clearInterval(musicInterval);if(!musicOn)return;
 if(ACX.state==='suspended')ACX.resume();
 musicGain=ACX.createGain();musicGain.gain.value=.02;musicGain.connect(ACX.destination);
 beatIdx=0;
 musicInterval=setInterval(()=>{
  if(!musicOn)return;const t=TRACKS[currentTrack];if(!t)return;
  const mel=t[0],bass=t[1],i=beatIdx%mel.length;
  const o1=ACX.createOscillator(),g1=ACX.createGain();
  o1.type='square';o1.frequency.value=mel[i];g1.gain.value=.02;
  g1.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+.12);
  o1.connect(g1);g1.connect(musicGain);o1.start();o1.stop(ACX.currentTime+.12);
  const o2=ACX.createOscillator(),g2=ACX.createGain();
  o2.type='triangle';o2.frequency.value=bass[i];g2.gain.value=.015;
  g2.gain.exponentialRampToValueAtTime(.001,ACX.currentTime+.14);
  o2.connect(g2);g2.connect(musicGain);o2.start();o2.stop(ACX.currentTime+.14);
  if(i%4===0){const n=ACX.createBufferSource(),buf=ACX.createBuffer(1,ACX.sampleRate*.05,ACX.sampleRate),d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.max(0,1-j/d.length);n.buffer=buf;const gn=ACX.createGain();gn.gain.value=.03;n.connect(gn);gn.connect(musicGain);n.start()}
  if(i%2===1){const n=ACX.createBufferSource(),buf=ACX.createBuffer(1,ACX.sampleRate*.02,ACX.sampleRate),d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*Math.max(0,1-j/d.length)*.5;n.buffer=buf;const gn=ACX.createGain();gn.gain.value=.015;n.connect(gn);gn.connect(musicGain);n.start()}
  beatIdx++;
 },140);
}
function stopMusic(){if(musicInterval){clearInterval(musicInterval);musicInterval=null}}
function setTrack(t){if(currentTrack!==t){currentTrack=t;stopMusic();startMusic()}}
function toggleMusic(){musicOn=!musicOn;document.getElementById('music-btn').textContent=musicOn?'♪ ON':'♪ OFF';if(musicOn)startMusic();else stopMusic()}

// ─── CHARACTER CLASSES ───
const CLASSES=[
 {id:'gambler',icon:'🤠',name:'THE GAMBLER',desc:'Balanced. Starts with a CHERRY.\n+5% crit chance.',hp:20,startSyms:['🍒'],crit:.05,gold:0,extraReels:0},
 {id:'knight',icon:'🛡️',name:'THE KNIGHT',desc:'Tanky. Starts with +5 HP.\nExtra SHIELD in pool.',hp:25,startSyms:['🛡️'],crit:0,gold:0,extraReels:0},
 {id:'thief',icon:'🗡️',name:'THE THIEF',desc:'Starts with 15 gold.\n+10% crit chance. Glass cannon.',hp:15,startSyms:[],crit:.1,gold:15,extraReels:0},
 {id:'wizard',icon:'🧙',name:'THE WIZARD',desc:'Starts with CRYSTAL.\nAll magic symbols +1 DMG.',hp:18,startSyms:['🔮'],crit:0,gold:0,extraReels:0,magicBonus:1},
 {id:'merchant',icon:'💰',name:'THE MERCHANT',desc:'Starts with 4th reel!\nShop prices -20%. Less HP.',hp:14,startSyms:[],crit:0,gold:10,extraReels:1,shopDiscount:.2},
 {id:'fool',icon:'🃏',name:'THE FOOL',desc:'Starts with 2 JOKERS.\nRandom perk every 3 floors.\nChaos mode.',hp:18,startSyms:['🎪','🎪'],crit:.03,gold:0,extraReels:0}
];

// ─── PERKS (upgrades between floors) ───
const ALL_PERKS=[
 {id:'thicc',icon:'🍔',name:'THICC MODE',desc:'+5 max HP. You earned those calories.',apply:G=>{G.maxHp+=5;G.hp+=5}},
 {id:'greed',icon:'🤑',name:'GREED IS GOOD',desc:'All gold symbols give +2. Money printer go brrr.',apply:G=>{G.perkFlags.greed=(G.perkFlags.greed||0)+2}},
 {id:'thorns',icon:'🌵',name:'CACTUS BODY',desc:'Enemies take 1 DMG when they hit you. Ouch.',apply:G=>{G.perkFlags.thorns=(G.perkFlags.thorns||0)+1}},
 {id:'vampiric',icon:'🩸',name:'BLOOD DONOR',desc:'Heal 1 HP per kill. Living off the dead.',apply:G=>{G.perkFlags.vampiric=true}},
 {id:'lucky7',icon:'🎲',name:'LUCKY SEVENS',desc:'7% chance for any spin to hit triple. Rigged.',apply:G=>{G.perkFlags.lucky7=true}},
 {id:'bigspender',icon:'💸',name:'BIG SPENDER',desc:'+1 DMG per 20 gold you have. Flex on em.',apply:G=>{G.perkFlags.bigSpender=true}},
 {id:'tinyreels',icon:'🔬',name:'MICROSCOPE',desc:'Reels show 1 less symbol each. Better odds.',apply:G=>{for(let r of G.reels)if(r.length>3)r.pop()}},
 {id:'doubledown',icon:'🎰',name:'DOUBLE DOWN',desc:'10% chance to spin twice for free.',apply:G=>{G.perkFlags.doubleDown=true}},
 {id:'payday',icon:'📅',name:'PAYDAY',desc:'+3 gold every floor. Passive income baby.',apply:G=>{G.perkFlags.payday=(G.perkFlags.payday||0)+3}},
 {id:'shieldwall',icon:'🏰',name:'SHIELD WALL',desc:'Start each floor with 3 shield. Safe vibes.',apply:G=>{G.perkFlags.shieldWall=(G.perkFlags.shieldWall||0)+3}},
 {id:'critup',icon:'💥',name:'CRITS GO BRR',desc:'+10% crit chance. Critical hits do x3.',apply:G=>{G.charClass.crit+=.1}},
 {id:'regen',icon:'🌱',name:'SLOW HEALER',desc:'Heal 1 HP every 3 spins. Patience.',apply:G=>{G.perkFlags.regen=true}},
 {id:'magnify',icon:'🔍',name:'MAGNIFYING GLASS',desc:'Bombs deal +3 DMG. Arson enthusiast.',apply:G=>{G.perkFlags.bombBonus=(G.perkFlags.bombBonus||0)+3}},
 {id:'snakepit',icon:'🐍',name:'SNAKE PIT',desc:'Add 2 snakes to each reel. Hisssss.',apply:G=>{for(let r of G.reels){r.push('🐍');r.push('🐍')}}},
 {id:'goldtooth',icon:'🦷',name:'GOLD TOOTH',desc:'Earn 1 gold per enemy killed. Cha-ching on death.',apply:G=>{G.perkFlags.goldTooth=true}},
 {id:'berserker',icon:'😤',name:'BERSERKER',desc:'+1 DMG for every 5 HP missing. Angry = strong.',apply:G=>{G.perkFlags.berserker=true}},
 {id:'expandoslot',icon:'📏',name:'EXPAND-O-SLOT',desc:'Add a whole new reel! More symbols = more chaos.',apply:G=>{G.reels.push([...BASE_SYMBOLS])}},
 {id:'poisontip',icon:'☠️',name:'POISON TIPS',desc:'All attacks have 20% chance to poison. Dirty.',apply:G=>{G.perkFlags.poisonTip=true}},
 {id:'laststand',icon:'💪',name:'LAST STAND',desc:'Below 5 HP? All DMG doubled. Do or die.',apply:G=>{G.perkFlags.lastStand=true}},
 {id:'coffebreak',icon:'☕',name:'COFFEE BREAK',desc:'Heal to full between floors. Ahhhh.',apply:G=>{G.perkFlags.coffeeBreak=true}},
];

// ─── SYMBOLS ───
const SYMS={
 '🗡️':{name:'SWORD',dmg:2,desc:'2 DMG'},
 '🔥':{name:'FIRE',dmg:3,desc:'3 DMG +1/adj fire',adj:'🔥',adjBonus:1},
 '🧲':{name:'MAGNET',desc:'Copy left symbol',special:'magnet'},
 '💰':{name:'GOLD',gold:3,desc:'+3 gold'},
 '💎':{name:'GEM',gold:8,desc:'+8 gold'},
 '❤️':{name:'HEART',heal:2,desc:'Heal 2 HP'},
 '🛡️':{name:'SHIELD',shield:3,desc:'Block 3 DMG'},
 '💀':{name:'SKULL',dmg:5,selfDmg:2,desc:'5 DMG costs 2 HP'},
 '🎯':{name:'BULLSEYE',desc:'x2 right symbol',special:'bullseye'},
 '🌟':{name:'STAR',desc:'1 DMG per unique',special:'star'},
 '🍀':{name:'CLOVER',desc:'Luck +1',special:'clover'},
 '💣':{name:'BOMB',dmgAll:4,desc:'4 DMG to ALL'},
 '🧪':{name:'VENOM',desc:'Poison 3 turns',special:'poison'},
 '🔮':{name:'CRYSTAL',desc:'+1 all DMG',special:'crystal'},
 '⚡':{name:'BOLT',dmg:2,desc:'2 DMG chains',special:'lightning'},
 '🪙':{name:'COIN',desc:'Gold = spin#',special:'coin'},
 '🎰':{name:'JACKPOT',desc:'3-match: x3',special:'jackpot'},
 '🐍':{name:'SNAKE',dmg:1,desc:'+2 per snake',adj:'🐍',adjBonus:2,adjGlobal:true},
 '🔄':{name:'RESPIN',desc:'Free respin',special:'refresh'},
 '🎪':{name:'JOKER',desc:'Becomes common',special:'joker'},
 '🍒':{name:'CHERRY',heal:1,gold:1,desc:'Heal 1 + 1 GP'},
 '🌙':{name:'MOON',desc:'DMG = shield',special:'moon'},
 '🌪️':{name:'TORNADO',desc:'Shuffle enemy order',special:'tornado',dmg:2},
 '🎁':{name:'LOOTBOX',desc:'Random bonus!',special:'lootbox'},
 '🍕':{name:'PIZZA',heal:3,desc:'Heal 3. Delicious.'},
 '🦴':{name:'BONE',dmg:1,desc:'1 DMG. +3 if skeleton',special:'bone'},
};

const pCanvas=document.getElementById('particles'),pCtx=pCanvas.getContext('2d');
let particles=[];
function resizeParticles(){pCanvas.width=innerWidth;pCanvas.height=innerHeight}
resizeParticles();addEventListener('resize',resizeParticles);
function addParticle(x,y,color,count=5){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5-2,life:1,color,size:Math.floor(Math.random()*3+2)})}
function updateParticles(){
 pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
 particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.02;if(p.life<=0)return false;
  pCtx.globalAlpha=p.life;pCtx.fillStyle=p.color;pCtx.fillRect(Math.floor(p.x),Math.floor(p.y),p.size,p.size);return true});
 pCtx.globalAlpha=1;if(particles.length)requestAnimationFrame(updateParticles);
}
function spawnParticles(el,color,n=8){if(!el)return;const r=el.getBoundingClientRect();addParticle(r.left+r.width/2,r.top+r.height/2,color,n);if(particles.length<=n)requestAnimationFrame(updateParticles)}
function shake(){const f=document.getElementById('slot-frame');f.style.transform='translateX(3px)';setTimeout(()=>f.style.transform='translateX(-3px)',40);setTimeout(()=>f.style.transform='',80)}

// ─── ENEMIES ───
function spawnEnemies(){
 G.enemies=[];
 const isBoss=G.floor%5===0;
 if(isBoss){
  const bi=Math.min(Math.floor(G.floor/5)-1,BOSSES.length-1);
  let b=Object.assign({},BOSSES[bi]);b.maxHp=b.hp+G.floor*2;b.hp=b.maxHp;b.poison=0;b.shield=0;
  G.enemies.push(b);
  log(`${b.icon} "${b.quip}"`,'res-enemy');
  setTrack('boss');
 } else {
  const count=Math.min(3,1+Math.floor(G.floor/3));
  for(let i=0;i<count;i++){
   const t=ENEMIES[Math.floor(Math.random()*Math.min(ENEMIES.length,3+Math.floor(G.floor/2)))];
   const sc=1+G.floor*0.12;
   let e=Object.assign({},t);
   e.maxHp=Math.ceil(t.hp*sc);e.hp=e.maxHp;e.atk=Math.ceil(t.atk*(1+G.floor*0.05));e.poison=0;e.shield=0;
   G.enemies.push(e);
   if(i===0&&e.quip)log(`${e.icon} "${e.quip}"`,'res-info');
  }
  setTrack('battle');
 }
 if(G.perkFlags.shieldWall)G.shield+=G.perkFlags.shieldWall;
 if(G.perkFlags.payday){G.gold+=G.perkFlags.payday;log(`PAYDAY +${G.perkFlags.payday} GP`,'res-gold')}
 if(G.perkFlags.coffeeBreak&&G.floor>1){G.hp=G.maxHp;log('COFFEE BREAK! Full heal.','res-heal')}
}
function aliveEnemies(){return G.enemies.filter(e=>e.hp>0)}

// ─── SPIN ───
function spin(){
 if(G.spinning||G.phase!=='battle'||aliveEnemies().length===0)return;
 G.spinning=true;G.spinCount++;
 document.getElementById('spinbtn').disabled=true;
 document.getElementById('results').innerHTML='';
 sndSpin();

 if(G.perkFlags.regen&&G.spinCount%3===0){G.hp=Math.min(G.maxHp,G.hp+1);log('REGEN +1 HP','res-heal')}

 G.reelResults=G.reels.map(pool=>pool[Math.floor(Math.random()*pool.length)]);

 // Lucky 7 perk
 if(G.perkFlags.lucky7&&Math.random()<.07){
  const sym=G.reelResults[0];
  G.reelResults=G.reelResults.map(()=>sym);
 }

 const reelCount=G.reels.length;
 let stopped=0;
 G.reels.forEach((_,i)=>{
  const strip=document.getElementById('strip-'+i);
  const pool=G.reels[i];
  const extraCount=10+i*4;
  let syms=[];
  for(let j=0;j<extraCount;j++)syms.push(pool[Math.floor(Math.random()*pool.length)]);
  syms.push(G.reelResults[i]);
  strip.innerHTML='';strip.className='reel-strip';
  syms.forEach(s=>{const d=document.createElement('div');d.className='reel-symbol';d.textContent=s;strip.appendChild(d)});
  strip.style.transform='translateY(0)';
  const totalH=syms.length*52;
  const targetY=-(totalH-52);
  const dur=(18+i*7)*16;
  strip.style.transition='none';
  let startT=null;
  function animate(t){
   if(!startT)startT=t;
   const prog=Math.min(1,(t-startT)/dur);
   strip.style.transform=`translateY(${targetY*(prog<.8?prog/.8:1)}px)`;
   if(prog<1)requestAnimationFrame(animate);
   else{
    strip.style.transform=`translateY(${targetY}px)`;sndStop(i);
    document.getElementById('glow-'+i).classList.add('active');
    setTimeout(()=>document.getElementById('glow-'+i).classList.remove('active'),400);
    stopped++;
    if(stopped===reelCount)setTimeout(resolveResults,250);
   }
  }
  setTimeout(()=>requestAnimationFrame(animate),i*260);
 });
}

// ─── RESOLVE ───
function resolveResults(){
 let results=[...G.reelResults];
 let totalDmg=0,totalHeal=0,totalGold=0,totalShield=0,crystalBonus=0,refreshReels=[];

 // Joker
 const freq={};results.forEach(s=>{if(SYMS[s]&&!SYMS[s].special)freq[s]=(freq[s]||0)+1});
 let mostCommon=results[0],maxFreq=0;
 for(let[s,c]of Object.entries(freq))if(c>maxFreq){maxFreq=c;mostCommon=s}
 results=results.map(s=>s==='🎪'?mostCommon:s);

 // Magnet
 results=results.map((s,i)=>{if(s==='🧲'&&i>0)return results[i-1];return s});

 // Crystal, jackpot
 let hasJackpot=false;
 results.forEach(s=>{if(s==='🔮')crystalBonus++;if(s==='🎰')hasJackpot=true});
 if(G.charClass?.magicBonus)crystalBonus+=G.charClass.magicBonus;

 // Crit check
 let isCrit=Math.random()<(G.charClass?.crit||0);
 let critMult=isCrit?3:1;
 if(isCrit){log('!! CRITICAL HIT !!','res-crit');sndCrit();screenFlash('#ff4080')}

 // Match check
 const counts={};results.forEach(s=>counts[s]=(counts[s]||0)+1);
 let matchMult=1;
 for(let[s,c]of Object.entries(counts)){
  if(c>=3){matchMult=3;log(`>>> TRIPLE ${SYMS[s]?.name||s}! x3 <<<`,'res-combo');sndCombo();spawnParticles(document.getElementById('slot-frame'),'#e060f0',20);screenFlash('#a040f0')}
  else if(c>=2){if(matchMult<1.5)matchMult=1.5;log(`>> DOUBLE ${SYMS[s]?.name||s}! x1.5`,'res-combo')}
 }

 let jackpotMult=1;
 if(hasJackpot&&Object.values(counts).some(c=>c>=3)){
  jackpotMult=3;log('!!! JACKPOT x3 ALL !!!','res-combo');shake();screenFlash('#f0d040');
  spawnParticles(document.getElementById('slot-frame'),'#f0d040',30);
  document.getElementById('spinbtn').classList.add('win-flash');setTimeout(()=>document.getElementById('spinbtn').classList.remove('win-flash'),1500);
 }

 // Berserker
 let berserkBonus=0;
 if(G.perkFlags.berserker){berserkBonus=Math.floor((G.maxHp-G.hp)/5);if(berserkBonus>0)log(`BERSERKER +${berserkBonus} DMG`,'res-crit')}

 // Big spender
 let spenderBonus=0;
 if(G.perkFlags.bigSpender){spenderBonus=Math.floor(G.gold/20);if(spenderBonus>0)log(`BIG SPENDER +${spenderBonus} DMG`,'res-gold')}

 // Last stand
 let lastStandMult=1;
 if(G.perkFlags.lastStand&&G.hp<=5){lastStandMult=2;log('LAST STAND! x2 DMG!','res-crit')}

 // Bullseye
 let multipliers=results.map(()=>1);
 results.forEach((s,i)=>{if(s==='🎯'&&i<results.length-1)multipliers[i+1]*=2});

 // Greed bonus
 const greedBonus=G.perkFlags.greed||0;

 // Resolve
 results.forEach((sym,i)=>{
  const def=SYMS[sym];if(!def)return;
  const m=multipliers[i]*matchMult*jackpotMult*critMult*lastStandMult;

  if(def.dmg){
   let d=def.dmg+berserkBonus+spenderBonus;
   if(def.adjGlobal&&def.adj){d+=def.adjBonus*(counts[sym]-1)}
   else if(def.adj){
    if(i>0&&results[i-1]===def.adj)d+=def.adjBonus;
    if(i<results.length-1&&results[i+1]===def.adj)d+=def.adjBonus;
   }
   d=(d+crystalBonus)*m;d=Math.floor(d);
   if(def.special==='bone'){
    const hasSkeleton=G.enemies.some(e=>e.name==='SKELTN'&&e.hp>0);
    if(hasSkeleton){d+=3;log('BONE vs SKELETON! +3!','res-crit')}
   }
   totalDmg+=d;
   const tgt=aliveEnemies()[0];
   if(tgt){dealDmgToEnemy(tgt,d);log(`${sym} ${d} DMG -> ${tgt.name}`,'res-dmg');
    if(G.perkFlags.poisonTip&&Math.random()<.2){tgt.poison+=2;log('POISON TIP!','res-dmg')}
   }
  }
  if(def.dmgAll){
   let d=Math.floor((def.dmgAll+(G.perkFlags.bombBonus||0)+crystalBonus)*m);
   aliveEnemies().forEach(e=>dealDmgToEnemy(e,d));
   log(`${sym} ${d} DMG -> ALL!`,'res-dmg');totalDmg+=d*aliveEnemies().length;shake();screenFlash('#f06060');
  }
  if(def.heal){const h=Math.floor(def.heal*m);totalHeal+=h;G.hp=Math.min(G.maxHp,G.hp+h)}
  if(def.gold){const g=Math.floor((def.gold+greedBonus)*m);totalGold+=g;G.gold+=g}
  if(def.shield){const s=Math.floor(def.shield*m);totalShield+=s;G.shield+=s}
  if(def.selfDmg){G.hp-=def.selfDmg;log(`${sym} costs ${def.selfDmg} HP`,'res-enemy')}

  // Specials
  if(def.special==='star'){
   const uniq=new Set(results).size;const d=Math.floor((uniq+crystalBonus+berserkBonus)*m);
   totalDmg+=d;const tgt=aliveEnemies()[0];
   if(tgt){dealDmgToEnemy(tgt,d);log(`STAR ${uniq} unique = ${d} DMG`,'res-dmg')}
  }
  if(def.special==='poison'){aliveEnemies().forEach(e=>e.poison+=3);log('VENOM! 3 turn poison','res-dmg')}
  if(def.special==='lightning'){
   let d=Math.floor((2+crystalBonus+berserkBonus)*m);
   const alive=aliveEnemies();
   if(alive.length){for(let c=0;c<Math.min(3,alive.length);c++){
    const tgt=alive[Math.floor(Math.random()*alive.length)];
    dealDmgToEnemy(tgt,d);totalDmg+=d;log(`BOLT -> ${tgt.name} ${d}`,'res-dmg');d=Math.max(1,Math.floor(d*.7));
   }}
  }
  if(def.special==='coin'){const g=Math.floor((G.spinCount+greedBonus)*m);totalGold+=g;G.gold+=g;log(`COIN +${g} GP (spin #${G.spinCount})`,'res-gold')}
  if(def.special==='moon'){
   const d=Math.floor((G.shield+crystalBonus)*m);
   if(d>0){const tgt=aliveEnemies()[0];if(tgt){dealDmgToEnemy(tgt,d);totalDmg+=d;log(`MOON ${d} DMG (${G.shield} SH)`,'res-dmg')}}
  }
  if(def.special==='tornado'){
   G.enemies.sort(()=>Math.random()-.5);log('TORNADO! Enemies shuffled!','res-info');
  }
  if(def.special==='lootbox'){
   const roll=Math.random();
   if(roll<.2){const g=Math.floor(Math.random()*15+5);G.gold+=g;totalGold+=g;log(`LOOTBOX: ${g} GP!`,'res-gold')}
   else if(roll<.4){const h=Math.floor(Math.random()*5+3);G.hp=Math.min(G.maxHp,G.hp+h);totalHeal+=h;log(`LOOTBOX: ${h} HP!`,'res-heal')}
   else if(roll<.6){G.shield+=5;totalShield+=5;log('LOOTBOX: +5 SHIELD!','res-shield')}
   else if(roll<.8){const d=Math.floor(Math.random()*8+4);const tgt=aliveEnemies()[0];if(tgt){dealDmgToEnemy(tgt,d);totalDmg+=d;log(`LOOTBOX: ${d} DMG!`,'res-dmg')}}
   else{aliveEnemies().forEach(e=>e.poison+=2);log('LOOTBOX: Poison ALL!','res-dmg')}
  }
  if(def.special==='refresh')refreshReels.push(i);
 });

 if(totalHeal>0){log(`+${totalHeal} HP`,'res-heal');sndHeal()}
 if(totalGold>0){log(`+${totalGold} GP`,'res-gold');sndGold();meta.totalGold+=totalGold;saveMeta()}
 if(totalShield>0)log(`+${totalShield} SHIELD`,'res-shield');
 if(totalDmg>0){sndHit();if(totalDmg>=10){shake();spawnParticles(document.getElementById('slot-frame'),'#f06060',12)}}

 renderEnemies();updateUI();

 // Kill tracking
 G.enemies.forEach((e,i)=>{
  if(e.hp<=0&&!e._dead){
   e._dead=true;
   const el=document.getElementById('enemy-'+i);
   if(el)spawnParticles(el,'#f04040',10);
   if(G.perkFlags.vampiric){G.hp=Math.min(G.maxHp,G.hp+1);log('VAMPIRIC +1 HP','res-heal')}
   if(G.perkFlags.goldTooth){G.gold+=1;log('GOLD TOOTH +1 GP','res-gold')}
  }
 });

 if(refreshReels.length>0){setTimeout(()=>{log('RESPIN!','res-info');G.spinning=false;spin()},600);return}

 // Double down perk
 if(G.perkFlags.doubleDown&&Math.random()<.1){
  setTimeout(()=>{log('DOUBLE DOWN! Free spin!','res-combo');G.spinning=false;spin()},600);return;
 }

 if(aliveEnemies().length===0){
  setTimeout(()=>{
   sndWin();log('FLOOR CLEARED!','res-combo');screenFlash('#40e040');
   G.spinning=false;
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta();log(`NEW BEST: F-${G.floor}!`,'res-combo')}
   for(let[f,syms]of Object.entries(UNLOCK_MAP)){
    if(G.floor>=+f&&!meta.unlocked.includes(+f)){meta.unlocked.push(+f);saveMeta();log(`UNLOCKED: ${syms.join(' ')}!`,'res-combo')}
   }
   if(G.floor%3===0)showPerkChoice();
   else showShop();
  },500);
  return;
 }
 setTimeout(enemyTurn,400);
}

function dealDmgToEnemy(e,d){
 if(e.shield>0){const blocked=Math.min(e.shield,d);e.shield-=blocked;d-=blocked}
 e.hp=Math.max(0,e.hp-d);
 const idx=G.enemies.indexOf(e);
 const el=document.getElementById('enemy-'+idx);
 if(el){el.classList.remove('hit');void el.offsetWidth;el.classList.add('hit')}
}

// ─── ENEMY TURN ───
function enemyTurn(){
 let totalTaken=0;
 aliveEnemies().forEach(e=>{
  if(e.poison>0){e.poison--;e.hp-=1;log(`${e.name} PSN -1`,'res-dmg')}
  if(e.hp<=0){if(!e._dead){e._dead=true;if(G.perkFlags.vampiric){G.hp=Math.min(G.maxHp,G.hp+1)}if(G.perkFlags.goldTooth)G.gold+=1}return}
  let dmg=e.atk;
  // Ghost phase: 50% miss
  if(e.ability==='phase'&&Math.random()<.5){log(`${e.name} phases through you!`,'res-info');return}
  if(G.shield>0){const blocked=Math.min(G.shield,dmg);G.shield-=blocked;dmg-=blocked;
   if(blocked>0)log(`SHIELD blocks ${blocked} from ${e.name}`,'res-shield')}
  if(dmg>0){
   G.hp-=dmg;totalTaken+=dmg;log(`${e.icon} ${e.name} ATK ${dmg}`,'res-enemy');
   if(G.perkFlags.thorns){dealDmgToEnemy(e,G.perkFlags.thorns);log(`THORNS! ${e.name} takes ${G.perkFlags.thorns}`,'res-dmg')}
  }
  if(e.ability==='poison'){G.poison+=2;log(`${e.name} poisons you!`,'res-enemy')}
  if(e.ability==='lifesteal'){const h=Math.ceil(e.atk/2);e.hp=Math.min(e.maxHp,e.hp+h);log(`${e.name} drains ${h} HP`,'res-enemy')}
  if(e.ability==='shield'){e.shield+=2;log(`${e.name} shields +2`,'res-shield')}
  if(e.ability==='steal'&&dmg>0){const s=Math.min(G.gold,2);G.gold-=s;if(s>0)log(`${e.name} steals ${s} GP!`,'res-enemy')}
  if(e.ability==='thorns'&&dmg>0){log(`${e.name} has thorns!`,'res-enemy')}
  if(e.ability==='complain'){const atk=Math.ceil(e.atk*.5);e.atk+=1;log(`${e.name} complains! ATK UP!`,'res-enemy')}
 });
 if(G.poison>0){G.hp-=G.poison;log(`PSN deals ${G.poison}`,'res-enemy');G.poison=Math.max(0,G.poison-1)}
 if(totalTaken>0){sndTaken();if(totalTaken>=5){shake();screenFlash('#f04040')};document.getElementById('app').classList.add('dmg-flash');setTimeout(()=>document.getElementById('app').classList.remove('dmg-flash'),300)}
 renderEnemies();updateUI();

 if(G.hp<=0){setTimeout(showDeath,500);return}
 if(aliveEnemies().length===0){
  setTimeout(()=>{
   sndWin();log('FLOOR CLEARED!','res-combo');screenFlash('#40e040');
   if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta()}
   for(let[f,syms]of Object.entries(UNLOCK_MAP)){if(G.floor>=+f&&!meta.unlocked.includes(+f)){meta.unlocked.push(+f);saveMeta();log(`UNLOCKED: ${syms.join(' ')}!`,'res-combo')}}
   if(G.floor%3===0)showPerkChoice();
   else showShop();
  },400);
  return;
 }
 G.spinning=false;document.getElementById('spinbtn').disabled=false;
}

// ─── PERK CHOICE (every 3 floors) ───
function showPerkChoice(){
 G.phase='perk';
 sndPerk();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');
 ov.classList.add('show');
 const owned=new Set(G.perks.map(p=>p.id));
 const available=ALL_PERKS.filter(p=>!owned.has(p.id)||p.id==='thicc'||p.id==='greed'||p.id==='payday'||p.id==='snakepit'||p.id==='expandoslot'||p.id==='critup');
 const shuffled=[...available].sort(()=>Math.random()-.5);
 const choices=shuffled.slice(0,3);

 pn.innerHTML=`<h2>LEVEL UP!</h2>
  <p style="font-size:6px;color:#8080a0;margin-bottom:8px">CHOOSE A PERK</p>
  ${choices.map((p,i)=>`<div class="perk-card" onclick="pickPerk(${i})">
   <span class="emoji">${p.icon}</span>
   <div class="name">${p.name}</div>
   <div class="desc">${p.desc}</div>
  </div>`).join('')}
  <button class="btn" onclick="skipPerk()" style="margin-top:6px">SKIP (+10 GP)</button>`;

 window.pickPerk=function(i){
  const p=choices[i];
  p.apply(G);
  G.perks.push(p);
  sndBuy();
  updateUI();buildReels();
  showShop();
 };
 window.skipPerk=function(){G.gold+=10;sndGold();showShop()};
}

// ─── SHOP ───
function showShop(){
 G.phase='shop';G.shield=0;
 setTrack('shop');sndShop();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');
 ov.classList.add('show');
 const unlocked=getUnlocked();
 const available=ALL_SHOP.filter(s=>unlocked.includes(s));
 let shopItems=[];
 const shuffled=[...available].sort(()=>Math.random()-.5);
 for(let i=0;i<Math.min(5,shuffled.length);i++)shopItems.push(shuffled[i]);
 let soldFlags=shopItems.map(()=>false);
 const disc=G.charClass?.shopDiscount||0;

 function renderShop(){
  const baseCost=s=>(['💎','🎰','💣','⚡','🌟','🌙','🌪️','🎁'].includes(s)?35:['💀','🧪','🎯','🧲','🔮','🦴'].includes(s)?25:15);
  const cost=s=>Math.floor(baseCost(s)*(1-disc));
  pn.innerHTML=`<h2>SHOP - F${G.floor}</h2>
   <p style="font-size:6px;color:#8080a0;margin-bottom:4px">GP: <span style="color:#f0d040">${G.gold}</span> | HP: ${G.hp}/${G.maxHp} | REELS: ${G.reels.length}</p>
   <h3>BUY SYMBOLS</h3>
   <div class="shop-grid">${shopItems.map((s,i)=>{
    const c=cost(s);const def=SYMS[s];
    return`<div class="shop-card${soldFlags[i]?' sold':''}" onclick="buySymbol(${i})">
     <div class="shop-emoji">${s}</div><div class="shop-name">${def.name}</div>
     <div class="shop-desc">${def.desc}</div><div class="shop-cost">${c}G</div></div>`
   }).join('')}</div>
   <h3>REMOVE (5G)</h3>
   <div class="remove-grid" id="remove-grid">${[...new Set(G.reels.flat())].map(s=>`<div class="remove-card">${s}</div>`).join('')}</div>
   <div style="margin-top:6px">
    <button class="btn" onclick="shopHeal()">HEAL (${Math.floor(20*(1-disc))}G)</button>
    ${G.reels.length<6?`<button class="btn" onclick="shopAddReel()">+REEL (${Math.floor(50*(1-disc))}G)</button>`:''}
    <button class="btn" onclick="shopReroll()">REROLL (5G)</button>
    <button class="btn" onclick="shopDupe()">DUPE (30G)</button>
   </div>
   <button class="btn btn-gold" onclick="nextFloor()" style="margin-top:8px">NEXT FLOOR >></button>`;

  window.buySymbol=function(i){
   if(soldFlags[i])return;const s=shopItems[i];const c=cost(s);if(G.gold<c)return;
   G.gold-=c;soldFlags[i]=true;G.reels[Math.floor(Math.random()*G.reels.length)].push(s);sndBuy();renderShop();
  };
  document.getElementById('remove-grid')?.addEventListener('click',function(ev){
   const card=ev.target.closest('.remove-card');if(!card)return;const s=card.textContent.trim();if(G.gold<5)return;
   for(let r of G.reels){const idx=r.indexOf(s);if(idx!==-1&&r.length>3){r.splice(idx,1);G.gold-=5;sndBuy();renderShop();return}}
  });
  window.shopHeal=function(){const c=Math.floor(20*(1-disc));if(G.gold<c)return;G.gold-=c;G.hp=G.maxHp;sndHeal();renderShop()};
  window.shopAddReel=function(){const c=Math.floor(50*(1-disc));if(G.gold<c||G.reels.length>=6)return;G.gold-=c;G.reels.push([...BASE_SYMBOLS]);sndBuy();renderShop()};
  window.shopReroll=function(){if(G.gold<5)return;G.gold-=5;const sh=[...available].sort(()=>Math.random()-.5);shopItems=[];soldFlags=[];for(let i=0;i<Math.min(5,sh.length);i++){shopItems.push(sh[i]);soldFlags.push(false)};sndBuy();renderShop()};
  window.shopDupe=function(){
   if(G.gold<30)return;
   const allSyms=[...new Set(G.reels.flat())];
   const pick=allSyms[Math.floor(Math.random()*allSyms.length)];
   G.gold-=30;
   for(let r of G.reels)r.push(pick);
   log(`DUPED ${pick} to all reels!`,'res-combo');sndBuy();renderShop();
  };
 }
 renderShop();
}

function nextFloor(){
 document.getElementById('overlay').classList.remove('show');
 G.floor++;G.phase='battle';G.shield=0;G.spinCount=0;G.poison=0;
 spawnEnemies();renderEnemies();buildReels();updateUI();
 document.getElementById('results').innerHTML='';
 G.spinning=false;document.getElementById('spinbtn').disabled=false;
 log(`FLOOR ${G.floor} - FIGHT!`,'res-info');screenFlash('#4080e0');
}

// ─── DEATH ───
function showDeath(){
 sndDie();G.phase='dead';stopMusic();screenFlash('#f04040');
 meta.runs=(meta.runs||0)+1;
 if(G.floor>meta.bestFloor){meta.bestFloor=G.floor;saveMeta()}
 saveMeta();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');
 ov.classList.add('show');
 pn.innerHTML=`<h2 style="color:#f04040">GAME OVER</h2>
  <div style="font-size:24px;margin:8px">💀</div>
  <p style="font-size:7px;margin:6px 0">FLOOR <span style="color:#f0d040">${G.floor}</span> | ${G.charClass?.name||'???'}</p>
  <p style="font-size:6px;color:#6a6a8a">BEST: F-${meta.bestFloor} | RUNS: ${meta.runs} | GP: ${meta.totalGold}</p>
  ${G.perks.length?`<p style="font-size:6px;color:#6a6a8a;margin:4px 0">PERKS: ${G.perks.map(p=>p.icon).join(' ')}</p>`:''}
  <p style="font-size:5px;color:#4a4a6a;margin:6px 0">Symbols unlock at floor milestones.</p>
  <button class="btn btn-gold" onclick="showCharSelect()" style="margin-top:8px">RETRY</button>`;
}

// ─── CHARACTER SELECT ───
function showCharSelect(){
 G.phase='select';
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');
 ov.classList.add('show');
 pn.innerHTML=`<h2>CHOOSE YOUR CLASS</h2>
  <p style="font-size:5px;color:#6a6a8a;margin-bottom:6px">Each class changes how you play</p>
  ${CLASSES.map((c,i)=>`<div class="char-card" onclick="pickClass(${i})">
   <span class="emoji">${c.icon}</span>
   <div class="name">${c.name}</div>
   <div class="desc">${c.desc.replace(/\n/g,'<br>')}</div>
   <div style="font-size:5px;color:#6060a0;margin-top:3px">HP: ${c.hp} | CRIT: ${Math.round(c.crit*100)}%${c.gold?' | GP: '+c.gold:''}${c.extraReels?' | +1 REEL':''}</div>
  </div>`).join('')}`;

 window.pickClass=function(i){
  const cls={...CLASSES[i]};
  sndBuy();
  startRunWithClass(cls);
 };
}

// ─── TITLE ───
function showTitle(){
 G.phase='title';stopMusic();
 const ov=document.getElementById('overlay'),pn=document.getElementById('panel');
 ov.classList.add('show');
 pn.innerHTML=`
  <div style="margin:10px 0">
   <div style="font-size:28px;margin-bottom:6px">🎰</div>
   <h2 class="title-glow" style="font-size:11px;line-height:1.8">TYLER'S<br>ROGUE SLOTS</h2>
   <p class="title-sub" style="font-size:5px;color:#8080a0;margin:6px 0;letter-spacing:2px">A ROGUELIKE SLOT MACHINE</p>
  </div>
  <div style="border:1px solid #2a2a4a;padding:6px;margin:6px 0;font-size:5px;color:#6a6a8a;line-height:2">
   SPIN to attack enemies<br>BUILD synergies + combos<br>CHOOSE perks every 3 floors<br>EXPAND your slot machine<br>DIE and try again
  </div>
  <p style="font-size:5px;color:#6a6a8a;margin:4px 0">
   BEST: <span style="color:#f0d040">F-${meta.bestFloor}</span> |
   RUNS: <span style="color:#f0d040">${meta.runs||0}</span> |
   GP: <span style="color:#f0d040">${meta.totalGold}</span>
  </p>
  ${meta.bestFloor>=3?`<p style="font-size:6px;color:#a060f0;margin:3px 0">${Object.entries(UNLOCK_MAP).filter(([f])=>meta.bestFloor>=+f).map(([,s])=>s.join('')).join(' ')}</p>`:''}
  <button class="btn btn-gold" onclick="showCharSelect()" style="margin-top:10px;font-size:9px;padding:10px 26px">START</button>
  <div style="font-size:4px;color:#3a3a5a;margin-top:8px">v2.0 // taskiap.com</div>`;
}

function startRunWithClass(cls){
 document.getElementById('overlay').classList.remove('show');
 if(ACX.state==='suspended')ACX.resume();
 const base=[...BASE_SYMBOLS,...cls.startSyms];
 const reelCount=3+cls.extraReels;
 const reels=[];for(let i=0;i<reelCount;i++)reels.push([...base]);
 G={hp:cls.hp,maxHp:cls.hp,gold:cls.gold,shield:0,poison:0,floor:1,
  reels,enemies:[],spinning:false,spinCount:0,phase:'battle',reelResults:[],
  charClass:cls,perks:[],perkFlags:{}};
 spawnEnemies();buildReels();renderEnemies();updateUI();
 document.getElementById('results').innerHTML='';
 document.getElementById('spinbtn').disabled=false;
 log(`${cls.icon} ${cls.name} ready!`,'res-combo');
 log('FLOOR 1 - FIGHT!','res-info');
 startMusic();
}

buildReels();updateUI();showTitle();
</script>
</body>
