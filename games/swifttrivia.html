<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taylor Swift Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f10;--surface:#1a1a2e;--accent:#e879a0;--green:#4ade80;--gold:#FFD100;--lavender:#c4b5fd;--midnight:#3b82f6;--text:#ffffff;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;min-height:100vh;overflow-y:auto;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:radial-gradient(ellipse at 20% 0%,rgba(232,121,160,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(196,181,253,0.05) 0%,transparent 50%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(255,255,255,0.7);font-size:13px;margin-top:4px}
.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(255,255,255,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(232,232,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:var(--accent);color:#000}
.badge-4{background:var(--lavender);color:#000}
.category{font-size:13px;color:rgba(232,232,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,0.2);border-color:#ef4444;color:#ef4444}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(232,121,160,0.3)}50%{text-shadow:0 0 12px rgba(232,121,160,0.7)}100%{text-shadow:0 0 4px rgba(232,121,160,0.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{0%{transform:scale(1);color:#fff}50%{transform:scale(1.3);color:var(--accent)}100%{transform:scale(1);color:#fff}}
.opt-btn{animation:cardIn 0.3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:0.07s}
.opt-btn:nth-child(3){animation-delay:0.14s}
.opt-btn:nth-child(4){animation-delay:0.21s}
.opt-btn.correct{animation:correctPop 0.35s ease}
.opt-btn.wrong{animation:wrongShake 0.4s ease}
.streak-fire{animation:streakFire 1.5s ease-in-out infinite}
.score-pop{animation:scoreUp 0.4s ease}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(232,232,240,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(232,232,240,0.7)}
.start-btn{width:100%;min-height:48px;padding:12px;margin-top:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.resume-btn{background:var(--lavender);color:#000;margin-top:10px}
.start-btn:hover,.resume-btn:hover{opacity:0.9}
.hidden{display:none!important}
@keyframes fireBorder{0%{border-color:var(--accent);box-shadow:0 0 8px rgba(232,121,160,0.4)}50%{border-color:var(--lavender);box-shadow:0 0 18px rgba(196,181,253,0.6)}100%{border-color:var(--accent);box-shadow:0 0 8px rgba(232,121,160,0.4)}}
@keyframes rosePulse{0%{background:var(--bg)}50%{background:#1a0a1e}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}
body.streak-pulse{animation:rosePulse 3s ease-in-out infinite}
body.streak-shake{animation:screenShake 0.4s ease}
.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:18px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
.fact-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(232,232,240,0.85);line-height:1.5}
.fact-card .fact-emoji{font-size:22px;flex-shrink:0;line-height:1.3}
.sound-toggle{background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:18px;cursor:pointer;padding:2px 7px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}
.start-hero{font-size:56px;line-height:1;margin-bottom:8px}
.start-high-score{font-size:22px;color:var(--green);font-weight:700;margin:8px 0}
.start-last-score{font-size:14px;color:rgba(232,232,240,0.5);margin-bottom:4px}
.start-badge-200{display:inline-block;background:var(--accent);color:#000;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0}
.accuracy-bar-wrap{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin:6px 0 4px}
.accuracy-bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.grade-badge{display:inline-block;font-size:36px;font-weight:900;padding:6px 20px;border-radius:12px;margin:10px 0}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(232,121,160,0.1)}
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@media(min-width:800px){
body{height:100vh;overflow:hidden}
.container{max-width:100%;padding:4px 24px}
header{padding:2px 0}
header h1{font-size:16px;letter-spacing:1px}
header .subtitle{display:none}
.notice{display:none}
.home-link{font-size:13px;min-height:28px;line-height:28px;padding:2px 0}
.score-bar{padding:3px 10px;margin-bottom:4px;font-size:12px}
.progress-bar-wrap{height:3px;margin-bottom:4px}
.q-header{margin-bottom:2px}
.q-number{font-size:12px}
.badge{font-size:10px;padding:1px 8px;margin:0 4px}
.category{font-size:11px}
.question-text{font-size:15px;margin:4px 0 8px;line-height:1.3}
.options{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{min-height:32px;padding:6px 10px;font-size:13px;line-height:1.2}
.next-btn{min-height:36px;padding:8px;font-size:14px;margin-top:6px}
.feedback{margin-top:6px;padding:6px 10px}
.feedback h3{font-size:14px;margin-bottom:2px}
.fact-card{padding:4px 8px;margin-top:4px;font-size:12px;gap:6px;line-height:1.3}
.fact-card .fact-emoji{font-size:16px}
.start-screen{padding:8px 0}
.start-hero{font-size:36px}
.start-screen p{font-size:13px;margin:6px 0}
.start-btn{min-height:40px;padding:10px;font-size:15px}
.end-screen{padding:10px 0}
.end-screen h2{font-size:22px}
.end-screen .final-score{font-size:36px;margin:8px 0}
.stats-grid{gap:6px;margin:8px 0}
.stat-card{padding:8px}
.stat-card .val{font-size:18px}
}
</style>
</head>

<header>
<h1>TAYLOR SWIFT TRIVIA</h1>
<div class="subtitle">The Ultimate Swiftie Challenge</div>
</header>

</div>

<script>
const Q=[
// ===== SONGS & LYRICS (50 Qs) =====
{q:"Which Taylor Swift song begins with the lyrics 'We were both young when I first saw you'?",o:["You Belong with Me","Love Story","Fifteen","Tim McGraw"],a:1,d:1,cat:"Songs & Lyrics",fact:"Love Story is inspired by Shakespeare's Romeo and Juliet and was written when Taylor was 17."},
{q:"What song includes the lyric 'Cause the players gonna play, play, play, play, play'?",o:["Bad Blood","Blank Space","Shake It Off","22"],a:2,d:1,cat:"Songs & Lyrics",fact:"Shake It Off was the lead single from 1989 and debuted at #1 on the Billboard Hot 100."},
{q:"Which album features the song 'Blank Space'?",o:["Red","1989","Reputation","Lover"],a:1,d:1,cat:"Songs & Lyrics",fact:"The music video for Blank Space has over 3 billion views on YouTube and was filmed at a Long Island estate."},
{q:"What is the opening line of 'All Too Well'?",o:["I walked through the door with you","We were in the backseat","I remember it all too well","You told me about your past"],a:0,d:2,cat:"Songs & Lyrics",fact:"All Too Well was expanded into a 10-minute version for Red (Taylor's Version) and became a fan-favorite epic."},
{q:"In which song does Taylor sing 'I've got a blank space, baby, and I'll write your name'?",o:["Style","Blank Space","Wildest Dreams","Bad Blood"],a:1,d:1,cat:"Songs & Lyrics",fact:"Blank Space was a satirical take on the media's portrayal of Taylor's dating life."},
{q:"Which Taylor Swift song features the lyric 'Long story short, I survived'?",o:["Long Story Short","The Archer","Mirrorball","Willow"],a:0,d:2,cat:"Songs & Lyrics",fact:"Long Story Short is from the Evermore album and reflects on overcoming difficult times."},
{q:"What song starts with 'Nice to meet you, where you been?'?",o:["Gorgeous","Blank Space","Cruel Summer","Style"],a:1,d:1,cat:"Songs & Lyrics",fact:"Many listeners initially misheard 'Starbucks lovers' instead of the actual lyric 'long list of ex-lovers.'"},
{q:"Which song contains the lyric 'I'm the problem, it's me'?",o:["Karma","Anti-Hero","Lavender Haze","Mastermind"],a:1,d:1,cat:"Songs & Lyrics",fact:"Anti-Hero became Taylor's biggest debut on streaming platforms and topped charts worldwide."},
{q:"In 'Cruel Summer,' what does Taylor describe sneaking through?",o:["A window","A garden gate","A back door","A fire escape"],a:1,d:2,cat:"Songs & Lyrics",fact:"Cruel Summer features a bridge that fans consider one of the best in Taylor's discography."},
{q:"Which song features the lyric 'Band-aids don't fix bullet holes'?",o:["Look What You Made Me Do","Bad Blood","I Did Something Bad","Ready for It"],a:1,d:1,cat:"Songs & Lyrics",fact:"Bad Blood is widely believed to be about a falling out between Taylor and another pop star."},
{q:"What Taylor Swift song includes the lyric 'Darling, I'm a nightmare dressed like a daydream'?",o:["Style","Blank Space","Wildest Dreams","Getaway Car"],a:1,d:1,cat:"Songs & Lyrics",fact:"This lyric perfectly captures the satirical persona Taylor created in the Blank Space music video."},
{q:"Which song begins with 'I'm walking fast through the traffic lights'?",o:["Delicate","Style","State of Grace","Welcome to New York"],a:2,d:2,cat:"Songs & Lyrics",fact:"State of Grace opens the Red album and was one of the first songs written for that record."},
{q:"In 'Cardigan,' Taylor sings about being put where?",o:["On the shelf","In the drawer","At the table","On the favorite spot"],a:0,d:2,cat:"Songs & Lyrics",fact:"Cardigan is part of a trio of songs from Folklore that tell the same love triangle from different perspectives."},
{q:"Which song features the lyric 'I remember when we broke up the first time'?",o:["22","We Are Never Getting Back Together","Begin Again","Everything Has Changed"],a:1,d:1,cat:"Songs & Lyrics",fact:"We Are Never Getting Back Together was Taylor's first #1 hit on the Billboard Hot 100."},
{q:"What Taylor Swift song contains the lyric 'Say you'll remember me standing in a nice dress, staring at the sunset'?",o:["Style","Wildest Dreams","Clean","New Romantics"],a:1,d:2,cat:"Songs & Lyrics",fact:"Wildest Dreams was inspired by the glamorous Old Hollywood aesthetic that defined the 1989 era."},
{q:"In 'Look What You Made Me Do,' what does Taylor say is dead?",o:["Her old image","The old Taylor","Her reputation","The truth"],a:1,d:1,cat:"Songs & Lyrics",fact:"The 'old Taylor can't come to the phone right now' line became one of the most quoted moments in pop music."},
{q:"Which song includes 'You drew stars around my scars, but now I'm bleeding'?",o:["Cardigan","August","Willow","Betty"],a:0,d:2,cat:"Songs & Lyrics",fact:"Cardigan is told from the perspective of Betty's longtime love interest in the Folklore love triangle."},
{q:"What are the opening words of 'Tim McGraw'?",o:["He said the way my blue eyes shined","You said the way my blue eyes shined","She said the way my blue eyes shined","I said the way my blue eyes shined"],a:0,d:2,cat:"Songs & Lyrics",fact:"Tim McGraw was Taylor's debut single, released when she was just 16 years old."},
{q:"Which song features 'Got a long list of ex-lovers, they'll tell you I'm insane'?",o:["Style","Blank Space","Shake It Off","Bad Blood"],a:1,d:1,cat:"Songs & Lyrics",fact:"The song deliberately plays on the tabloid narrative about Taylor's love life."},
{q:"In which song does Taylor sing about a 'golden string'?",o:["Invisible String","Gold Rush","Daylight","Cornelia Street"],a:0,d:2,cat:"Songs & Lyrics",fact:"Invisible String uses the concept of the red thread of fate, reimagined as a golden connection."},
{q:"What song includes the lyric 'We could leave the Christmas lights up til January'?",o:["Lover","Paper Rings","Christmas Tree Farm","It's Nice to Have a Friend"],a:0,d:1,cat:"Songs & Lyrics",fact:"Lover is often considered one of Taylor's most romantic and personal songs."},
{q:"Which Taylor Swift song starts with 'I didn't have it in myself to go with grace'?",o:["My Tears Ricochet","Tolerate It","Happiness","Champagne Problems"],a:0,d:3,cat:"Songs & Lyrics",fact:"My Tears Ricochet is believed to be about Taylor's departure from Big Machine Records."},
{q:"In 'Style,' what does Taylor say never goes out of?",o:["Fashion","Style","Love","Time"],a:1,d:1,cat:"Songs & Lyrics",fact:"Style was rumored to be about a relationship with Harry Styles, though Taylor never confirmed this."},
{q:"Which song contains the lyric 'I once believed love would be burning red, but it's golden'?",o:["Gold Rush","Daylight","Cornelia Street","London Boy"],a:1,d:2,cat:"Songs & Lyrics",fact:"Daylight closes the Lover album and represents a more mature, peaceful perspective on love."},
{q:"What song includes 'Stood on the cliffside screaming, give me a reason'?",o:["Cruel Summer","The Archer","Cornelia Street","Death by a Thousand Cuts"],a:0,d:2,cat:"Songs & Lyrics",fact:"The bridge of Cruel Summer is one of Taylor's most emotionally intense vocal performances."},
{q:"In which song does Taylor sing 'I've been the archer, I've been the prey'?",o:["The Man","The Archer","Miss Americana","Mirrorball"],a:1,d:1,cat:"Songs & Lyrics",fact:"The Archer is track 5 on Lover, continuing Taylor's tradition of making track 5 the most vulnerable song."},
{q:"Which song features the lyric 'I bet you think about me'?",o:["I Bet You Think About Me","We Are Never Getting Back Together","Picture to Burn","Should've Said No"],a:0,d:2,cat:"Songs & Lyrics",fact:"This vault track from Red (Taylor's Version) was released with a music video directed by Blake Lively."},
{q:"What Taylor Swift song has the lyric 'You're on your own, kid, you always have been'?",o:["The Archer","You're on Your Own, Kid","Anti-Hero","Maroon"],a:1,d:1,cat:"Songs & Lyrics",fact:"This Midnights track 5 follows Taylor's pattern of emotionally vulnerable fifth tracks on every album."},
{q:"In 'Fortnight,' Taylor collaborated with which artist?",o:["Bon Iver","Post Malone","Ed Sheeran","Ice Spice"],a:1,d:2,cat:"Songs & Lyrics",fact:"Fortnight was the lead single from The Tortured Poets Department, released in 2024."},
{q:"Which song contains the lyric 'So casually cruel in the name of being honest'?",o:["All Too Well","Dear John","Last Kiss","Back to December"],a:0,d:2,cat:"Songs & Lyrics",fact:"This line from All Too Well is considered one of Taylor's greatest lyrical moments by fans and critics alike."},
{q:"What is the last song on the standard edition of Folklore?",o:["Hoax","The Lakes","Betty","Epiphany"],a:0,d:3,cat:"Songs & Lyrics",fact:"Hoax closes the standard edition, while The Lakes appears as a bonus track on the deluxe version."},
{q:"In 'Enchanted,' who does Taylor say she was enchanted to meet?",o:["A specific person","The listener ('you')","No one specific","Herself"],a:1,d:2,cat:"Songs & Lyrics",fact:"Enchanted was reportedly written about Adam Young of Owl City after they met briefly at an event."},
{q:"Which song includes the lyric 'My castle crumbled overnight'?",o:["Call It What You Want","Look What You Made Me Do","This Is Why We Can't Have Nice Things","End Game"],a:0,d:2,cat:"Songs & Lyrics",fact:"Call It What You Want reflects on finding love amid public controversy during the Reputation era."},
{q:"What Taylor Swift song begins with 'Take me to the lakes where all the poets went to die'?",o:["Willow","The Lakes","Seven","Ivy"],a:1,d:2,cat:"Songs & Lyrics",fact:"The Lakes references the English Lake District and poets like William Wordsworth who lived there."},
{q:"Which song features the lyric 'I don't wanna look at anything else now that I saw you'?",o:["Daylight","Lover","Delicate","Gorgeous"],a:3,d:2,cat:"Songs & Lyrics",fact:"Taylor wrote Gorgeous while reportedly intoxicated, which she mentioned in interviews."},
{q:"In 'Betty,' what vehicle does the narrator ride to Betty's party?",o:["A car","A skateboard","A bicycle","A bus"],a:1,d:3,cat:"Songs & Lyrics",fact:"Betty is told from the perspective of James, a 17-year-old boy, in the Folklore love triangle."},
{q:"Which song contains the lyric 'I bury hatchets but I keep maps of where I put 'em'?",o:["Vigilante Shit","Karma","End Game","I Did Something Bad"],a:0,d:3,cat:"Songs & Lyrics",fact:"Vigilante Shit from Midnights has a dark, minimalist production style unusual for Taylor."},
{q:"What is the opening lyric of 'Willow'?",o:["I'm like the water when your ship rolled in that night","Wreath of laurels in my hair","Life was a willow and it bent right to your wind","Every bait and switch was a work of art"],a:0,d:3,cat:"Songs & Lyrics",fact:"Willow was the lead single from Evermore and debuted at number one on the Billboard Hot 100."},
{q:"In which song does Taylor sing 'And I can still see it all in my mind, all of you, all of me, intertwined'?",o:["Cornelia Street","Exile","Champagne Problems","Enchanted"],a:0,d:3,cat:"Songs & Lyrics",fact:"Cornelia Street is about Taylor's fear of losing a relationship and the memories tied to a place."},

const DIFF_LABELS=["","Easy","Medium","Hard","Expert"];
var gameDifficulty=0;
const DIFF_CLASSES=["","badge-1","badge-2","badge-3","badge-4"];
const DIFF_POINTS=[0,10,20,30,50];
const STORAGE_KEY="swifttrivia";
const app=document.getElementById("app");

let state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:0,byDiff:[0,0,0,0,0],started:false};
var activeQ=Q.slice();for(var si=activeQ.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=activeQ[si];activeQ[si]=activeQ[sj];activeQ[sj]=st;}
var _gameStartTime=null;
var _soundMuted=false;

function loadState(){
try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);return p;}}catch(e){}return null;
}
function saveState(){
try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}

// Dreamy ambient pad (Web Audio API)
var _padTimer=null;
const actx=new (window.AudioContext||window.webkitAudioContext)();

function playAmbientPad(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopAmbientPad();
var chords=[[262,330,392],[294,370,440],[247,311,370],[220,277,330]];
var chordIdx=0;
function pad(){
try{
var chord=chords[chordIdx%chords.length];
var dur=4;
chord.forEach(function(freq){
var o=actx.createOscillator(),g=actx.createGain();
o.type='sine';o.frequency.value=freq;
g.gain.setValueAtTime(0,actx.currentTime);
g.gain.linearRampToValueAtTime(0.008,actx.currentTime+1);
g.gain.linearRampToValueAtTime(0.006,actx.currentTime+dur-1);
g.gain.linearRampToValueAtTime(0,actx.currentTime+dur);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur);
// Add octave shimmer
var o2=actx.createOscillator(),g2=actx.createGain();
o2.type='triangle';o2.frequency.value=freq*2;
g2.gain.setValueAtTime(0,actx.currentTime);
g2.gain.linearRampToValueAtTime(0.003,actx.currentTime+1.5);
g2.gain.linearRampToValueAtTime(0,actx.currentTime+dur);
o2.connect(g2);g2.connect(actx.destination);o2.start();o2.stop(actx.currentTime+dur);
});
chordIdx++;
}catch(e){}
_padTimer=setTimeout(pad,dur*900);
}
_padTimer=setTimeout(pad,300);
}
function stopAmbientPad(){if(_padTimer){clearTimeout(_padTimer);_padTimer=null;}}

// Correct sound: sparkle ascending
function playCorrect(){
if(_soundMuted)return;
try{
[523,659,784].forEach(function(f,i){
var o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.type='sine';
o.frequency.setValueAtTime(f,actx.currentTime+i*0.08);
g.gain.setValueAtTime(0.02,actx.currentTime+i*0.08);
g.gain.linearRampToValueAtTime(0,actx.currentTime+i*0.08+0.2);
o.start(actx.currentTime+i*0.08);o.stop(actx.currentTime+i*0.08+0.2);
});
}catch(e){}
}
// Wrong sound: gentle descending
function playWrong(){
if(_soundMuted)return;
try{
var o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.type='triangle';
o.frequency.setValueAtTime(330,actx.currentTime);
o.frequency.linearRampToValueAtTime(220,actx.currentTime+0.3);
g.gain.setValueAtTime(0.02,actx.currentTime);
g.gain.linearRampToValueAtTime(0,actx.currentTime+0.35);
o.start(actx.currentTime);o.stop(actx.currentTime+0.35);
}catch(e){}
}
// Streak sound: sparkle cascade
function playStreak(){
if(_soundMuted)return;
try{
var t=actx.currentTime;
[523,659,784,1047].forEach(function(f,i){
var o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.type='sine';
o.frequency.setValueAtTime(f,t+i*0.1);
g.gain.setValueAtTime(0.02,t+i*0.1);
g.gain.linearRampToValueAtTime(0,t+i*0.1+0.25);
o.start(t+i*0.1);o.stop(t+i*0.1+0.25);
});
}catch(e){}
}

function renderStart(){
const saved=loadState();
let resumeHTML="";
if(saved&&saved.qi>0&&saved.qi<activeQ.length&&saved.started){
resumeHTML='<button class="start-btn resume-btn" id="resume-btn">Resume (Q'+(saved.qi+1)+'/'+activeQ.length+', Score: '+saved.score+')</button>';
}
const hs=saved&&saved.highScore?saved.highScore:0;
const lastScore=(saved&&saved.started&&saved.qi>0)?saved.score:null;
app.innerHTML='<div class="start-screen">'+
'<div class="start-hero">✨\u{1F3B5}✨</div>'+
(hs>0?'<div class="start-high-score">\u{1F3C6} High Score: '+hs+'</div>':'')+
(lastScore!==null?'<div class="start-last-score">Last game: '+lastScore+' pts (Q'+saved.qi+'/'+activeQ.length+')</div>':'')+
'<div class="start-badge-200">\u{1F4AB} 200 Questions</div>'+
'<p>The ultimate Taylor Swift trivia challenge across every era!</p>'+
'<div class="notice">Points scale with difficulty. Streak bonus after 3 in a row!</div>'+
'<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;">'+
'<span class="badge badge-1">Easy +10</span>'+
'<span class="badge badge-2">Medium +20</span>'+
'<span class="badge badge-3">Hard +30</span>'+
'</div>'+
'<button class="start-btn" id="start-btn">Start New Game</button>'+
resumeHTML+
'</div>';
document.getElementById("start-btn").onclick=function(){
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:saved?saved.highScore||0:0,byDiff:[0,0,0,0,0],started:true};
activeQ=Q.slice();for(var si2=activeQ.length-1;si2>0;si2--){var sj2=Math.floor(Math.random()*(si2+1));var st2=activeQ[si2];activeQ[si2]=activeQ[sj2];activeQ[sj2]=st2;}
_gameStartTime=Date.now();
saveState();playAmbientPad();renderQ();
};
var rb=document.getElementById("resume-btn");
if(rb){rb.onclick=function(){state=saved;state.answered=false;_gameStartTime=Date.now();playAmbientPad();renderQ();};}
}

function renderQ(){
if(state.qi>=activeQ.length){renderEnd();return;}
var q=activeQ[state.qi];
var d=q.d;
var progPct=Math.round((state.qi/activeQ.length)*100);
var progColors={1:'var(--green)',2:'var(--gold)',3:'var(--accent)'};
var progColor=progColors[d]||'var(--accent)';
var streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
document.body.classList.toggle('streak-pulse',state.streak>=5);
app.innerHTML='<div class="'+streakBarClass+'" style="position:relative">'+
'<span>Score: <strong>'+state.score+'</strong></span>'+
'<span class="streak-fire">'+(state.streak>=3?'\u{1F525} ':'')+'Streak: '+state.streak+'</span>'+
'<span>Q '+(state.qi+1)+'/'+activeQ.length+'</span>'+
'<button class="sound-toggle" id="sound-toggle" title="Toggle sound">'+(_soundMuted?'\u{1F507}':'\u{1F50A}')+'</button>'+
'</div>'+
'<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+progPct+'%;background:'+progColor+'"></div></div>'+
'<div class="q-header">'+
'<span class="q-number">Question '+(state.qi+1)+'</span>'+
'<span class="badge '+DIFF_CLASSES[d]+'">'+DIFF_LABELS[d]+'</span>'+
'<span class="category">'+q.cat+'</span>'+
'</div>'+
'<div class="question-text">'+q.q+'</div>'+
'<div class="options" id="opts">'+
q.o.map(function(o,i){return '<button class="opt-btn" data-i="'+i+'">'+o+'</button>';}).join('')+
'</div>'+
'<div id="feedback"></div>';
document.getElementById('sound-toggle').onclick=function(){_soundMuted=!_soundMuted;this.textContent=_soundMuted?'\u{1F507}':'\u{1F50A}';if(_soundMuted){stopAmbientPad();}else{playAmbientPad();}};
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){b.onclick=function(){handleAnswer(parseInt(b.dataset.i));};});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
var q=activeQ[state.qi];
var correct=idx===q.a;
var btns=document.querySelectorAll(".opt-btn");
btns.forEach(function(b){
b.disabled=true;
var i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
var pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreak();}
else{playCorrect();}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrong();
}

var fb=document.getElementById("feedback");
fb.innerHTML='<div class="feedback '+(correct?"correct-fb":"wrong-fb")+'">'+
'<h3>'+(correct?"Correct!"+(state.streak>=3?" \u{1F525} Streak x"+state.streak+"!":""):"Wrong!")+'</h3>'+
(!correct?'<p>The answer was: <strong>'+q.o[q.a]+'</strong></p>':'')+
(state.streak>=3&&correct?'<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>':'')+
'<div class="fact-card"><span class="fact-emoji">\u{1F3B5}</span><span>'+q.fact+'</span></div>'+
'</div>'+
'<button class="next-btn" id="next-btn">'+(state.qi+1>=activeQ.length?"See Results":"Next Question →")+'</button>';
var nb=document.getElementById("next-btn");
nb.onclick=function(){
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopAmbientPad();
var total=activeQ.length;
var pct=Math.round(state.correct/total*100);
var totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
var totalMin=Math.floor(totalTimeSec/60);
var totalSec=totalTimeSec%60;
var timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
var avgTimeSec=total>0?Math.round(totalTimeSec/total*10)/10:0;
var grade='F',gradeColor='var(--red)';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='var(--gold)';}
else if(pct>=60){grade='C';gradeColor='var(--accent)';}
var accBarColor=pct>=80?'var(--green)':pct>=60?'var(--gold)':'var(--red)';
app.innerHTML='<div class="end-screen">'+
'<h2>Game Over!</h2>'+
'<div class="final-score">'+state.score+'</div>'+
(state.score>=state.highScore?'<div class="high-label">New High Score!</div>':'<div class="high-label" style="color:var(--gold)">High Score: '+state.highScore+'</div>')+
'<div class="grade-badge" style="background:'+gradeColor+';color:#000">'+grade+'</div>'+
'<div style="text-align:left;margin:12px 0">'+
'<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>'+pct+'%</span></div>'+
'<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:'+pct+'%;background:'+accBarColor+'"></div></div>'+
'</div>'+
'<div class="stats-grid">'+
'<div class="stat-card"><div class="val">'+state.correct+'</div><div class="lbl">Correct</div></div>'+
'<div class="stat-card"><div class="val">'+state.wrong+'</div><div class="lbl">Wrong</div></div>'+
'<div class="stat-card"><div class="val">'+state.bestStreak+'</div><div class="lbl">Best Streak</div></div>'+
'<div class="stat-card"><div class="val">'+timeStr+'</div><div class="lbl">Total Time</div></div>'+
'<div class="stat-card"><div class="val">'+avgTimeSec+'s</div><div class="lbl">Avg / Question</div></div>'+
'<div class="stat-card"><div class="val">'+grade+'</div><div class="lbl">Grade</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[1]+'/'+Q.filter(function(qq){return qq.d===1;}).length+'</div><div class="lbl">Easy</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[2]+'/'+Q.filter(function(qq){return qq.d===2;}).length+'</div><div class="lbl">Medium</div></div>'+
'<div class="stat-card"><div class="val">'+state.byDiff[3]+'/'+Q.filter(function(qq){return qq.d===3;}).length+'</div><div class="lbl">Hard</div></div>'+
'</div>'+
'<button class="share-btn" id="share-btn">\u{1F4CB} Share Score</button>'+
'<button class="restart-btn" id="restart-btn">Play Again</button>'+
'</div>';

saveState();playAmbientPad();renderQ();

<script>
(function(){
// ===== MULTIPLAYER MODULE =====
var params = new URLSearchParams(window.location.search);
var mpMode = params.has('host') ? 'host' : (params.has('join') ? 'player' : null);
if (!mpMode) return;

// Load PeerJS
var peerScript = document.createElement('script');
peerScript.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
peerScript.onload = function(){ mpInit(); };
document.head.appendChild(peerScript);

// Sound effects via Web Audio API (volume max 0.02)
var mpAudioCtx;
try { mpAudioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}

function mpPlayCorrect(){
  if(!mpAudioCtx) return;
  try {
    if(mpAudioCtx.state==='suspended') mpAudioCtx.resume();
    var o=mpAudioCtx.createOscillator(),g=mpAudioCtx.createGain();
    o.connect(g);g.connect(mpAudioCtx.destination);
    o.frequency.setValueAtTime(523,mpAudioCtx.currentTime);
    o.frequency.setValueAtTime(659,mpAudioCtx.currentTime+0.08);
    o.frequency.setValueAtTime(784,mpAudioCtx.currentTime+0.16);
    g.gain.setValueAtTime(0.02,mpAudioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,mpAudioCtx.currentTime+0.3);
    o.start();o.stop(mpAudioCtx.currentTime+0.3);
  }catch(e){}
}
function mpPlayWrong(){
  if(!mpAudioCtx) return;
  try {
    if(mpAudioCtx.state==='suspended') mpAudioCtx.resume();
    var o=mpAudioCtx.createOscillator(),g=mpAudioCtx.createGain();
    o.connect(g);g.connect(mpAudioCtx.destination);
    o.type='triangle';
    o.frequency.setValueAtTime(330,mpAudioCtx.currentTime);
    o.frequency.setValueAtTime(220,mpAudioCtx.currentTime+0.15);
    g.gain.setValueAtTime(0.02,mpAudioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,mpAudioCtx.currentTime+0.3);
    o.start();o.stop(mpAudioCtx.currentTime+0.3);
  }catch(e){}
}
function mpPlayTick(){
  if(!mpAudioCtx) return;
  try {
    if(mpAudioCtx.state==='suspended') mpAudioCtx.resume();
    var o=mpAudioCtx.createOscillator(),g=mpAudioCtx.createGain();
    o.connect(g);g.connect(mpAudioCtx.destination);
    o.frequency.value=880;
    g.gain.setValueAtTime(0.01,mpAudioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0,mpAudioCtx.currentTime+0.05);
    o.start();o.stop(mpAudioCtx.currentTime+0.05);
  }catch(e){}
}

var PEER_PREFIX = 'taskiap-swifttrivia-';
var TOTAL_QUESTIONS = 20;
var QUESTION_TIME = 15;
var appEl = document.getElementById('app');

function genRoomCode(){
  var c='';for(var i=0;i<4;i++) c+=String.fromCharCode(65+Math.floor(Math.random()*26));
  return c;
}

function pickQuestions(n){
  var pool=Q.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  var easy=pool.filter(function(q){return q.d===1;});
  var med=pool.filter(function(q){return q.d===2;});
  var hard=pool.filter(function(q){return q.d===3;});
  var picked=[];
  picked=picked.concat(easy.slice(0,7));
  picked=picked.concat(med.slice(0,8));
  picked=picked.concat(hard.slice(0,5));
  for(var i2=picked.length-1;i2>0;i2--){var j2=Math.floor(Math.random()*(i2+1));var t2=picked[i2];picked[i2]=picked[j2];picked[j2]=t2;}
  return picked.slice(0,n);
}

function mpInit(){
  if(mpMode==='host') hostInit();
  else if(mpMode==='player') playerInit();
}

// ========== HOST MODE ==========
function hostInit(){
  var roomCode = genRoomCode();
  var peerId = PEER_PREFIX + roomCode;
  var peer = new Peer(peerId);
  var players = {};
  var questions = [];
  var currentQ = 0;
  var roundAnswers = {};
  var roundStartTime = 0;
  var roundTimer = null;
  var gameStarted = false;
  var botPlayers = [];

  var subtitle = document.querySelector('header .subtitle');
  if(subtitle) subtitle.textContent = 'Multiplayer Mode';

  peer.on('open', function(){
    renderHostLobby();
  });
  peer.on('error', function(err){
    console.error('PeerJS error:', err);
    if(!gameStarted) {
      roomCode = genRoomCode();
      peer.destroy();
      peer = new Peer(PEER_PREFIX + roomCode);
      peer.on('open', function(){ renderHostLobby(); });
      peer.on('connection', handleConnection);
    }
  });
  peer.on('connection', handleConnection);

  function handleConnection(conn){
    conn.on('open', function(){
      conn.on('data', function(data){
        if(data.type==='join'){
          players[conn.peer] = {conn:conn, name:data.name, score:0, streak:0, answers:[]};
          broadcastPlayerList();
          renderHostLobby();
        }
        if(data.type==='answer' && gameStarted){
          handlePlayerAnswer(conn.peer, data.choice, data.time);
        }
      });
      conn.on('close', function(){
        if(players[conn.peer]){
          delete players[conn.peer];
          broadcastPlayerList();
          if(!gameStarted) renderHostLobby();
        }
      });
    });
  }

  function broadcastPlayerList(){
    var names = getPlayerNames();
    broadcast({type:'playerList', players:names});
  }

  function getPlayerNames(){
    var names=[];
    for(var id in players) names.push(players[id].name);
    return names;
  }

  function getPlayerCount(){
    return Object.keys(players).length;
  }

  function broadcast(data){
    for(var id in players){
      try{ players[id].conn.send(data); }catch(e){}
    }
  }

  function renderHostLobby(){
    var count = getPlayerCount();
    var names = getPlayerNames();
    var joinUrl = 'taskiap.com/games/swifttrivia.html?join=' + roomCode;
    appEl.innerHTML = '<div class="mp-lobby">' +
      '<p style="font-size:14px;color:rgba(232,232,240,0.5);margin-bottom:4px">JOIN AT</p>' +
      '<div class="mp-join-url"><a href="' + window.location.pathname + '?join=' + roomCode + '" target="_blank">' + joinUrl + '</a></div>' +
      '<p style="font-size:14px;color:rgba(232,232,240,0.5)">ROOM CODE</p>' +
      '<div class="mp-room-code">' + roomCode + '</div>' +
      '<div class="mp-player-count">' + count + ' player' + (count!==1?'s':'') + ' connected' + (count<3?' (need at least 3)':'') + '</div>' +
      '<ul class="mp-player-list">' + names.map(function(n){return '<li>'+escHtml(n)+'</li>';}).join('') + '</ul>' +
      (count>=3 ? '<button class="mp-start-btn" id="mp-start-btn">START GAME</button>' : '<button class="mp-start-btn" id="mp-start-btn" disabled>WAITING FOR PLAYERS...</button>') +
      '<br><button class="mp-test-btn" id="mp-test-btn">TEST MODE (Add 4 Bots)</button>' +
      '</div>';

    var startBtn = document.getElementById('mp-start-btn');
    if(startBtn && count>=3){
      startBtn.onclick = function(){ startGame(); };
    }
    var testBtn = document.getElementById('mp-test-btn');
    if(testBtn){
      testBtn.onclick = function(){ addBots(); };
    }
  }

  function addBots(){
    var botNames = ['SwiftBot','ErasBot','KarmaBot','MidnightBot'];
    botPlayers = [];
    for(var i=0;i<4;i++){
      var botId = 'bot-'+i+'-'+Math.random().toString(36).substr(2,6);
      players[botId] = {conn:null, name:botNames[i], score:0, streak:0, answers:[], isBot:true};
      botPlayers.push(botId);
    }
    broadcastPlayerList();
    renderHostLobby();
  }

  function startGame(){
    gameStarted = true;
    questions = pickQuestions(TOTAL_QUESTIONS);
    currentQ = 0;
    for(var id in players){
      players[id].score = 0;
      players[id].streak = 0;
      players[id].answers = [];
    }
    broadcast({type:'gameStart', totalQ: TOTAL_QUESTIONS});
    showQuestion();
  }

  function showQuestion(){
    if(currentQ >= questions.length){
      showPodium();
      return;
    }
    var q = questions[currentQ];
    roundAnswers = {};
    roundStartTime = Date.now();

    broadcast({type:'question', qi:currentQ, total:questions.length, q:q.q, options:q.o, cat:q.cat, d:q.d, time:QUESTION_TIME});

    botPlayers.forEach(function(botId){
      if(!players[botId]) return;
      var delay = 1000 + Math.random()*8000;
      var isCorrect = Math.random()<0.7;
      var choice = isCorrect ? q.a : ((q.a + 1 + Math.floor(Math.random()*3)) % 4);
      setTimeout(function(){
        if(gameStarted && currentQ < questions.length) {
          handlePlayerAnswer(botId, choice, delay/1000);
        }
      }, delay);
    });

    renderTVQuestion(q);

    var timeLeft = QUESTION_TIME;
    var timerEl;
    clearInterval(roundTimer);
    roundTimer = setInterval(function(){
      timeLeft -= 0.1;
      timerEl = document.getElementById('mp-timer-fill');
      if(timerEl){
        var pct = Math.max(0, (timeLeft/QUESTION_TIME)*100);
        timerEl.style.width = pct+'%';
        if(timeLeft<3) timerEl.style.background = 'var(--red)';
        else if(timeLeft<6) timerEl.style.background = 'var(--gold)';
      }
      var countEl = document.getElementById('mp-answer-count');
      if(countEl){
        var answered = Object.keys(roundAnswers).length;
        var total = getPlayerCount();
        countEl.textContent = answered + '/' + total + ' answered';
      }
      if(timeLeft <= 0){
        clearInterval(roundTimer);
        endRound();
      }
    }, 100);
  }

  function renderTVQuestion(q){
    var optColors = ['mp-opt-a','mp-opt-b','mp-opt-c','mp-opt-d'];
    var optLabels = ['A','B','C','D'];
    appEl.innerHTML = '<div class="mp-tv-question">' +
      '<div class="mp-tv-header">' +
        '<span>Q ' + (currentQ+1) + '/' + questions.length + '</span>' +
        '<span class="badge ' + DIFF_CLASSES[q.d] + '">' + DIFF_LABELS[q.d] + '</span>' +
        '<span class="category">' + q.cat + '</span>' +
      '</div>' +
      '<div class="mp-timer-bar"><div class="mp-timer-fill" id="mp-timer-fill" style="width:100%"></div></div>' +
      '<div class="question-text">' + q.q + '</div>' +
      '<div class="mp-tv-options">' +
        q.o.map(function(o,i){
          return '<div class="mp-tv-opt ' + optColors[i] + '" data-i="'+i+'"><strong>' + optLabels[i] + '.</strong> ' + escHtml(o) + '</div>';
        }).join('') +
      '</div>' +
      '<div class="mp-answer-count" id="mp-answer-count">0/' + getPlayerCount() + ' answered</div>' +
      '</div>';
  }

  function handlePlayerAnswer(playerId, choice, timeTaken){
    if(roundAnswers[playerId] !== undefined) return;
    roundAnswers[playerId] = {choice: choice, time: timeTaken};

    if(Object.keys(roundAnswers).length >= getPlayerCount()){
      clearInterval(roundTimer);
      setTimeout(function(){ endRound(); }, 300);
    }
  }

  function endRound(){
    clearInterval(roundTimer);
    var q = questions[currentQ];
    var correctIdx = q.a;
    var results = [];

    for(var id in players){
      var p = players[id];
      var ans = roundAnswers[id];
      var choice = ans ? ans.choice : -1;
      var timeTaken = ans ? ans.time : QUESTION_TIME;
      var isCorrect = choice === correctIdx;
      var pts = 0;
      if(isCorrect){
        pts = 1000;
        if(timeTaken <= 2) pts += 500;
        else if(timeTaken < 10) pts += Math.round(500 * (1 - (timeTaken-2)/8));
        p.streak++;
        if(p.streak >= 3) pts = Math.round(pts * 1.5);
      } else {
        p.streak = 0;
      }
      p.score += pts;
      p.answers.push({choice:choice, correct:isCorrect, pts:pts, time:timeTaken});
      results.push({name:p.name, choice:choice, correct:isCorrect, pts:pts, time:timeTaken, playerId:id, streak:p.streak});
    }

    results.sort(function(a,b){
      if(a.correct && !b.correct) return -1;
      if(!a.correct && b.correct) return 1;
      return b.pts - a.pts;
    });

    var leaderboard = [];
    for(var id2 in players){
      leaderboard.push({name:players[id2].name, score:players[id2].score, streak:players[id2].streak, playerId:id2});
    }
    leaderboard.sort(function(a,b){return b.score - a.score;});

    revealTVAnswer(q, correctIdx, results);

    broadcast({type:'roundResult', correctIdx:correctIdx, results:results, leaderboard:leaderboard, fact:q.fact, correctAnswer:q.o[correctIdx]});

    setTimeout(function(){
      showTVLeaderboard(leaderboard);
      setTimeout(function(){
        currentQ++;
        showQuestion();
      }, 4000);
    }, 5000);
  }

  function revealTVAnswer(q, correctIdx, results){
    var opts = document.querySelectorAll('.mp-tv-opt');
    opts.forEach(function(el){
      var i = parseInt(el.getAttribute('data-i'));
      if(i === correctIdx) el.classList.add('mp-correct-reveal');
      else el.classList.add('mp-wrong-reveal');
    });
    mpPlayCorrect();

    var ansCountEl = document.getElementById('mp-answer-count');
    if(ansCountEl){
      var html = '<div class="mp-result-correct">Correct: ' + escHtml(q.o[correctIdx]) + '</div>';
      results.forEach(function(r){
        html += '<div class="mp-result-row' + (r.correct?'':' mp-r-wrong') + '">' +
          '<span class="mp-r-name">' + (r.correct?'✅':'❌') + ' ' + escHtml(r.name) + '</span>' +
          '<span class="mp-r-answer">' + (r.choice>=0 ? escHtml(q.o[r.choice]) : 'No answer') + '</span>' +
          '<span class="mp-r-time">' + (r.choice>=0 ? r.time.toFixed(1)+'s' : '-') + '</span>' +
          '<span class="mp-r-pts">' + (r.pts>0 ? '+'+r.pts : '0') + '</span>' +
          '</div>';
      });
      ansCountEl.innerHTML = html;
    }
  }

  function showTVLeaderboard(leaderboard){
    var medals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    var html = '<div class="mp-leaderboard">' +
      '<h2>Leaderboard</h2>';
    leaderboard.forEach(function(p,i){
      html += '<div class="mp-lb-row" style="animation-delay:'+i*0.08+'s">' +
        '<span class="mp-lb-rank">' + (i<3 ? medals[i] : (i+1)) + '</span>' +
        '<span class="mp-lb-name">' + escHtml(p.name) + '</span>' +
        (p.streak>=3 ? '<span class="mp-lb-streak">\u{1F525}'+p.streak+'</span>' : '') +
        '<span class="mp-lb-score">' + p.score + '</span>' +
        '</div>';
    });
    html += '</div>';
    appEl.innerHTML = html;
    broadcast({type:'showLeaderboard', leaderboard:leaderboard});
  }

  function showPodium(){
    gameStarted = false;
    var leaderboard = [];
    for(var id in players){
      leaderboard.push({name:players[id].name, score:players[id].score, playerId:id});
    }
    leaderboard.sort(function(a,b){return b.score - a.score;});

    var places = leaderboard.slice(0,3);
    var html = '<div class="mp-podium">' +
      '<h1>FINAL RESULTS</h1>' +
      '<div class="mp-podium-places">';

    var podiumClasses = ['mp-podium-1','mp-podium-2','mp-podium-3'];
    var podiumMedals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    for(var i=0;i<Math.min(3,places.length);i++){
      html += '<div class="mp-podium-place '+podiumClasses[i]+'">' +
        '<div class="mp-podium-medal">'+podiumMedals[i]+'</div>' +
        '<div class="mp-podium-name">'+escHtml(places[i].name)+'</div>' +
        '<div class="mp-podium-score">'+places[i].score+'</div>' +
        '</div>';
    }
    html += '</div>';

    if(leaderboard.length>3){
      html += '<div style="margin-top:20px">';
      for(var j=3;j<leaderboard.length;j++){
        html += '<div class="mp-lb-row"><span class="mp-lb-rank">'+(j+1)+'</span><span class="mp-lb-name">'+escHtml(leaderboard[j].name)+'</span><span class="mp-lb-score">'+leaderboard[j].score+'</span></div>';
      }
      html += '</div>';
    }

    html += '<button class="mp-play-again" id="mp-play-again">Play Again</button></div>';
    appEl.innerHTML = html;

    broadcast({type:'podium', leaderboard:leaderboard});

    document.getElementById('mp-play-again').onclick = function(){
      botPlayers.forEach(function(bid){ delete players[bid]; });
      botPlayers = [];
      gameStarted = false;
      renderHostLobby();
      broadcast({type:'backToLobby'});
    };
  }
}

// ========== PLAYER MODE ==========
function playerInit(){
  var roomCode = params.get('join').toUpperCase();
  var peerId = PEER_PREFIX + roomCode;
  var myName = localStorage.getItem('mp-swifttrivia-name') || '';
  var conn = null;
  var myScore = 0;
  var myStreak = 0;
  var currentChoice = -1;
  var questionStartTime = 0;
  var answered = false;
  var connected = false;

  var subtitle = document.querySelector('header .subtitle');
  if(subtitle) subtitle.textContent = 'Multiplayer Mode';

  renderJoinScreen();

  function renderJoinScreen(){
    appEl.innerHTML = '<div class="mp-phone-join">' +
      '<h2 style="color:var(--accent)">Join Game</h2>' +
      '<p style="color:rgba(232,232,240,0.6)">Room: <strong>' + roomCode + '</strong></p>' +
      '<input type="text" id="mp-name-input" placeholder="Your Name" maxlength="16" value="' + escHtml(myName) + '">' +
      '<br><button id="mp-join-btn">JOIN</button>' +
      '</div>';

    var input = document.getElementById('mp-name-input');
    var btn = document.getElementById('mp-join-btn');
    input.focus();
    input.addEventListener('keydown', function(e){ if(e.key==='Enter') btn.click(); });
    btn.onclick = function(){
      var name = input.value.trim();
      if(!name) { input.style.borderColor='#ef4444'; return; }
      myName = name;
      localStorage.setItem('mp-swifttrivia-name', myName);
      connectToHost();
    };
  }

  function connectToHost(){
    appEl.innerHTML = '<div class="mp-phone-waiting"><h2>Connecting...</h2></div>';
    var myPeer = new Peer();
    myPeer.on('open', function(){
      conn = myPeer.connect(peerId, {reliable:true});
      conn.on('open', function(){
        connected = true;
        conn.send({type:'join', name:myName});
        renderWaiting();
      });
      conn.on('data', function(data){
        handleHostMessage(data);
      });
      conn.on('close', function(){
        connected = false;
        renderDisconnected();
      });
      conn.on('error', function(){
        connected = false;
        renderDisconnected();
      });
    });
    myPeer.on('error', function(err){
      appEl.innerHTML = '<div class="mp-disconnected"><h2>Connection Failed</h2><p>Could not find room ' + roomCode + '</p><p style="margin-top:12px"><a href="' + window.location.pathname + '?join=' + roomCode + '">Try Again</a></p></div>';
    });
  }

  function renderWaiting(){
    appEl.innerHTML = '<div class="mp-phone-waiting">' +
      '<h2>You\'re in!</h2>' +
      '<p style="font-size:20px;font-weight:700;margin:12px 0">' + escHtml(myName) + '</p>' +
      '<p class="mp-waiting-dots">Waiting for host to start the game...</p>' +
      '</div>';
  }

  function renderDisconnected(){
    appEl.innerHTML = '<div class="mp-disconnected">' +
      '<h2>Disconnected</h2>' +
      '<p>You lost connection to the host.</p>' +
      '<p style="margin-top:12px"><a href="' + window.location.pathname + '?join=' + roomCode + '">Rejoin</a></p>' +
      '</div>';
  }

  function handleHostMessage(data){
    switch(data.type){
      case 'playerList':
        break;
      case 'gameStart':
        myScore = 0;
        myStreak = 0;
        break;
      case 'question':
        answered = false;
        currentChoice = -1;
        questionStartTime = Date.now();
        renderPhoneQuestion(data);
        break;
      case 'roundResult':
        renderPhoneResult(data);
        break;
      case 'showLeaderboard':
        renderPhoneStandings(data.leaderboard);
        break;
      case 'podium':
        renderPhonePodium(data.leaderboard);
        break;
      case 'backToLobby':
        myScore = 0;
        myStreak = 0;
        renderWaiting();
        break;
    }
  }

  function renderPhoneQuestion(data){
    var optColors = ['mp-popt-a','mp-popt-b','mp-popt-c','mp-popt-d'];
    var optLabels = ['A','B','C','D'];
    appEl.innerHTML = '<div class="mp-phone">' +
      '<div class="mp-tv-header">' +
        '<span>Q ' + (data.qi+1) + '/' + data.total + '</span>' +
        '<span class="badge ' + DIFF_CLASSES[data.d] + '">' + DIFF_LABELS[data.d] + '</span>' +
      '</div>' +
      '<div class="mp-timer-bar"><div class="mp-timer-fill" id="mp-phone-timer" style="width:100%"></div></div>' +
      '<div class="question-text" style="font-size:clamp(16px,4vw,20px);margin:8px 0 16px">' + data.q + '</div>' +
      '<div class="mp-phone-opts" id="mp-phone-opts">' +
        data.options.map(function(o,i){
          return '<button class="mp-phone-opt '+optColors[i]+'" data-i="'+i+'"><strong>'+optLabels[i]+'.</strong> '+escHtml(o)+'</button>';
        }).join('') +
      '</div>' +
      '</div>';

    var timeLeft = data.time;
    var timerInterval = setInterval(function(){
      timeLeft -= 0.1;
      var el = document.getElementById('mp-phone-timer');
      if(el){
        var pct = Math.max(0,(timeLeft/data.time)*100);
        el.style.width = pct+'%';
        if(timeLeft<3) el.style.background='var(--red)';
        else if(timeLeft<6) el.style.background='var(--gold)';
      }
      if(timeLeft<=0) clearInterval(timerInterval);
    },100);

    var btns = document.querySelectorAll('.mp-phone-opt');
    btns.forEach(function(btn){
      btn.onclick = function(){
        if(answered) return;
        answered = true;
        currentChoice = parseInt(btn.getAttribute('data-i'));
        var timeTaken = (Date.now() - questionStartTime)/1000;
        clearInterval(timerInterval);
        btns.forEach(function(b){ b.classList.add('mp-phone-selected'); b.style.cursor='default'; });
        btn.classList.remove('mp-phone-selected');
        btn.style.opacity='1';
        btn.style.borderWidth='4px';
        if(conn && connected){
          conn.send({type:'answer', choice:currentChoice, time:timeTaken});
        }
        var statusEl = document.createElement('div');
        statusEl.className = 'mp-phone-status mp-waiting-dots';
        statusEl.textContent = 'Waiting for other players...';
        appEl.querySelector('.mp-phone').appendChild(statusEl);
      };
    });
  }

  function renderPhoneResult(data){
    var myResult = null;
    for(var i=0;i<data.results.length;i++){
      if(data.results[i].name === myName){
        myResult = data.results[i];
        break;
      }
    }
    if(!myResult) myResult = {correct:false, pts:0, choice:-1};

    myScore += myResult.pts;
    if(myResult.correct){
      myStreak++;
      mpPlayCorrect();
    } else {
      myStreak = 0;
      mpPlayWrong();
    }

    var opts = document.querySelectorAll('.mp-phone-opt');
    if(opts.length > 0){
      opts.forEach(function(el){
        var idx = parseInt(el.getAttribute('data-i'));
        el.classList.remove('mp-phone-selected');
        if(idx === data.correctIdx) el.classList.add('mp-phone-correct');
        else if(idx === currentChoice && !myResult.correct) el.classList.add('mp-phone-wrong');
      });
    }

    setTimeout(function(){
      appEl.innerHTML = '<div class="mp-phone-result">' +
        '<h2>' + (myResult.correct ? '✅ Correct!' : '❌ Wrong') + '</h2>' +
        (myResult.correct ? '' : '<p style="color:rgba(232,232,240,0.6)">Answer: <strong>' + escHtml(data.correctAnswer) + '</strong></p>') +
        '<div class="mp-pts-earned">' + (myResult.pts > 0 ? '+'+myResult.pts : '0') + '</div>' +
        '<div class="mp-pts-label">points' + (myStreak>=3 ? ' (1.5x streak!)' : '') + '</div>' +
        '<p style="margin-top:16px;font-size:16px;color:var(--gold)">Total: ' + myScore + '</p>' +
        (data.fact ? '<div class="fact-card" style="margin-top:16px;text-align:left"><span class="fact-emoji">\u{1F3B5}</span><span>'+data.fact+'</span></div>' : '') +
        '</div>';
    }, 1200);
  }

  function renderPhoneStandings(leaderboard){
    var html = '<div class="mp-phone-standings"><h3>Standings</h3>';
    leaderboard.forEach(function(p,i){
      var isMe = p.name === myName;
      html += '<div class="mp-phone-rank-row'+(isMe?' mp-me':'')+'">' +
        '<span class="mp-pr-rank">'+(i+1)+'</span>' +
        '<span class="mp-pr-name">'+escHtml(p.name)+(isMe?' (you)':'')+'</span>' +
        '<span class="mp-pr-score">'+p.score+'</span>' +
        '</div>';
    });
    html += '</div>';
    appEl.innerHTML = html;
  }

  function renderPhonePodium(leaderboard){
    var myRank = -1;
    for(var i=0;i<leaderboard.length;i++){
      if(leaderboard[i].name === myName){ myRank = i; break; }
    }
    var medals = ['\u{1F947}','\u{1F948}','\u{1F949}'];
    var messages = ['YOU WON!','Runner Up!','Third Place!'];
    var html = '<div class="mp-phone-result" style="padding-top:30px">';
    if(myRank >= 0 && myRank < 3){
      html += '<div style="font-size:64px;margin-bottom:12px">'+medals[myRank]+'</div>';
      html += '<h2 style="color:var(--gold)">'+messages[myRank]+'</h2>';
    } else {
      html += '<h2>Game Over</h2>';
      html += '<p style="color:rgba(232,232,240,0.6)">You finished #'+(myRank+1)+'</p>';
    }
    html += '<div class="mp-pts-earned">' + myScore + '</div>';
    html += '<div class="mp-pts-label">final score</div>';

    html += '<div class="mp-phone-standings" style="margin-top:20px"><h3>Final Standings</h3>';
    leaderboard.forEach(function(p,i){
      var isMe = p.name === myName;
      html += '<div class="mp-phone-rank-row'+(isMe?' mp-me':'')+'">' +
        '<span class="mp-pr-rank">'+(i<3?medals[i]:(i+1))+'</span>' +
        '<span class="mp-pr-name">'+escHtml(p.name)+(isMe?' (you)':'')+'</span>' +
        '<span class="mp-pr-score">'+p.score+'</span></div>';
    });
    html += '</div></div>';
    appEl.innerHTML = html;
  }
}

function escHtml(s){
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

})();
</script>
</body>
</html>
