<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><title>Nyah's Indie Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f10;--surface:#1a1a1f;--accent:#c084fc;--green:#4ade80;--gold:#f7c948;--purple:#c084fc;--text:#fff;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;min-height:100vh;line-height:1.4;display:flex;flex-direction:column}
.container{max-width:600px;margin:0 auto;padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));padding-bottom:max(10px,env(safe-area-inset-bottom));flex:1;overflow-y:auto}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(255,255,255,.6);font-size:13px;margin-top:4px}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.streak-fire{color:var(--accent);animation:streakFire 1.5s ease-in-out infinite}
.q-number{font-size:14px;color:rgba(232,232,240,.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}.badge-2{background:var(--gold);color:#000}.badge-3{background:var(--purple);color:#000}
.category{font-size:13px;color:rgba(232,232,240,.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,.2);background:rgba(0,0,0,.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
.opt-btn:active{transform:scale(.98)}.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,.2);border-color:#ef4444;color:#ef4444}
.opt-btn.reveal{border-color:var(--green);opacity:.7}
.opt-btn:disabled{cursor:default;opacity:.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide .3s ease}
.feedback.correct-fb{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3)}
.feedback.wrong-fb{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--accent);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}.stat-card .lbl{font-size:12px;color:rgba(232,232,240,.5);margin-top:4px;text-transform:uppercase}
.restart-btn,.start-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.title-screen{text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:20px;background:url('nyah-title.png') center/cover no-repeat;position:relative}
.title-screen::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.85) 100%)}
.title-screen>*{position:relative;z-index:1}
.title-screen h1{font-size:clamp(28px,7vw,42px);color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8);letter-spacing:3px;margin-bottom:4px}
.title-screen .tsub{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:20px}
.title-screen .start-btn{max-width:300px;margin-bottom:max(20px,env(safe-area-inset-bottom))}
.spotify-wrap{margin:10px 0;border-radius:12px;overflow:hidden;max-height:0;transition:max-height .3s ease;overflow:hidden}
.spotify-wrap.open{max-height:400px}
.sp-toggle{font-size:12px;color:var(--accent);cursor:pointer;text-align:center;padding:6px;text-transform:uppercase;letter-spacing:1px}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(192,132,252,.3)}50%{text-shadow:0 0 12px rgba(192,132,252,.7)}100%{text-shadow:0 0 4px rgba(192,132,252,.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.opt-btn{animation:cardIn .3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}.opt-btn:nth-child(2){animation-delay:.07s}.opt-btn:nth-child(3){animation-delay:.14s}.opt-btn:nth-child(4){animation-delay:.21s}
.opt-btn.correct{animation:correctPop .35s ease}.opt-btn.wrong{animation:wrongShake .4s ease}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:var(--surface);color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
</style></head><body>
<div class="spotify-wrap" id="spWrap"><iframe style="border-radius:12px;width:100%;max-width:600px;margin:0 auto;display:block" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWVqJMsgEN0F4?theme=0" height="80" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>

<script>
var Q=[
// THE SMITHS
{q:"Which Smiths album features 'How Soon Is Now?'",o:["Meat Is Murder","The Queen Is Dead","Hatful of Hollow","Strangeways, Here We Come"],a:0,d:2,cat:"The Smiths",fact:"'How Soon Is Now?' was added to Meat Is Murder after first appearing as a B-side. It became their most famous song."},
{q:"What is Morrissey's full first name?",o:["Steven","Michael","Robert","James"],a:0,d:1,cat:"The Smiths",fact:"Steven Patrick Morrissey — he dropped 'Steven' early in his career and went by his surname only."},
{q:"Johnny Marr played guitar for which band after The Smiths split?",o:["Electronic","Oasis","Blur","Suede"],a:0,d:2,cat:"The Smiths",fact:"Johnny Marr formed Electronic with Bernard Sumner of New Order in 1989."},
{q:"Which Smiths song opens with 'I am human and I need to be loved'?",o:["How Soon Is Now?","There Is a Light That Never Goes Out","Please, Please, Please, Let Me Get What I Want","This Charming Man"],a:0,d:1,cat:"The Smiths",fact:"The haunting tremolo guitar intro is one of the most recognizable in indie rock history."},
{q:"The Smiths formed in which city?",o:["Manchester","London","Liverpool","Birmingham"],a:0,d:1,cat:"The Smiths",fact:"Morrissey and Marr met in Manchester in 1982 and formed the band that defined indie pop."},
{q:"Who was The Smiths' bassist?",o:["Andy Rourke","Peter Hook","Simon Gallup","Mike Joyce"],a:0,d:2,cat:"The Smiths",fact:"Andy Rourke's melodic basslines were a crucial part of The Smiths' sound."},
{q:"Which album contains 'There Is a Light That Never Goes Out'?",o:["The Queen Is Dead","Meat Is Murder","The Smiths","Strangeways, Here We Come"],a:0,d:1,cat:"The Smiths",fact:"Often cited as the greatest indie song ever written, from their masterpiece album."},
{q:"What year did The Smiths break up?",o:["1987","1985","1989","1990"],a:0,d:2,cat:"The Smiths",fact:"Creative tensions between Morrissey and Marr led to the split after just 5 years together."},
// RADIOHEAD
{q:"Which Radiohead album is often called the greatest album of the 90s?",o:["OK Computer","The Bends","Kid A","Amnesiac"],a:0,d:1,cat:"Radiohead",fact:"OK Computer (1997) topped countless 'best of' lists with its prescient themes about technology and alienation."},
{q:"What was Radiohead's breakthrough single?",o:["Creep","Karma Police","Paranoid Android","No Surprises"],a:0,d:1,cat:"Radiohead",fact:"'Creep' (1992) was initially a flop in the UK but became a worldwide hit, which the band later grew to resent."},
{q:"Thom Yorke's side project is called what?",o:["Atoms for Peace","Electronic","The Postal Service","Massive Attack"],a:0,d:2,cat:"Radiohead",fact:"Atoms for Peace featured Thom Yorke, Flea from RHCP, and producer Nigel Godrich."},
{q:"Which Radiohead album abandoned guitar rock for electronic experimentation?",o:["Kid A","Amnesiac","Hail to the Thief","The King of Limbs"],a:0,d:1,cat:"Radiohead",fact:"Kid A (2000) shocked fans and critics by almost completely abandoning guitars for electronic textures."},
{q:"'Paranoid Android' was inspired by a night out where the band witnessed what?",o:["A woman freaking out on cocaine","A bar fight","A car crash","A street performer"],a:0,d:3,cat:"Radiohead",fact:"Thom Yorke described seeing a woman 'whose eyes went like two black holes' at an LA bar — it terrified him."},
{q:"What is Radiohead's hometown?",o:["Abingdon, Oxfordshire","Manchester","London","Bristol"],a:0,d:2,cat:"Radiohead",fact:"All five members met at Abingdon School in Oxfordshire in the mid-1980s."},
{q:"Which Radiohead album was released as a 'pay what you want' download?",o:["In Rainbows","The King of Limbs","A Moon Shaped Pool","Amnesiac"],a:0,d:1,cat:"Radiohead",fact:"In Rainbows (2007) was a groundbreaking release — fans could download it for any price, including free."},
{q:"What instrument does Jonny Greenwood primarily play?",o:["Guitar","Bass","Drums","Keyboards"],a:0,d:1,cat:"Radiohead",fact:"Jonny Greenwood is also a film composer, scoring There Will Be Blood and The Power of the Dog."},
// NIRVANA
{q:"What was the name of Nirvana's breakthrough album?",o:["Nevermind","Bleach","In Utero","Incesticide"],a:0,d:1,cat:"Nirvana",fact:"Nevermind (1991) knocked Michael Jackson off the #1 spot and changed rock music forever."},
{q:"Which city is considered the birthplace of grunge?",o:["Seattle","Portland","San Francisco","Los Angeles"],a:0,d:1,cat:"Nirvana",fact:"Seattle's Sub Pop label and bands like Nirvana, Pearl Jam, and Soundgarden defined the grunge movement."},
{q:"What was the baby's name on the Nevermind cover?",o:["Spencer Elden","Kurt Cobain Jr","Chad Channing","Nobody knows"],a:0,d:3,cat:"Nirvana",fact:"Spencer Elden was the baby swimming toward a dollar bill. He was paid $200 for the shoot."},
{q:"Which Nirvana song features the lyric 'Here we are now, entertain us'?",o:["Smells Like Teen Spirit","Come As You Are","Lithium","In Bloom"],a:0,d:1,cat:"Nirvana",fact:"Kurt Cobain said the riff was his attempt to write a Pixies song. It became the anthem of Generation X."},
{q:"Who was Nirvana's drummer who went on to form Foo Fighters?",o:["Dave Grohl","Chad Channing","Aaron Burckhard","Dan Peters"],a:0,d:1,cat:"Nirvana",fact:"Dave Grohl joined Nirvana in 1990 and after Kurt's death founded Foo Fighters as a one-man project."},
{q:"What label released Nirvana's debut album Bleach?",o:["Sub Pop","DGC","Geffen","SST"],a:0,d:2,cat:"Nirvana",fact:"Bleach cost only $606.17 to record. Sub Pop released it in 1989 to modest success."},
{q:"Nirvana's MTV Unplugged featured covers of which artists?",o:["David Bowie, Lead Belly, Meat Puppets","Beatles, Stones, The Who","Pixies, Sonic Youth, Mudhoney","Led Zeppelin, Black Sabbath, Hendrix"],a:0,d:2,cat:"Nirvana",fact:"The legendary 1993 performance included 'The Man Who Sold the World' (Bowie) and three Meat Puppets songs."},
{q:"What was Kurt Cobain's wife's name?",o:["Courtney Love","Kim Gordon","Kathleen Hanna","PJ Harvey"],a:0,d:1,cat:"Nirvana",fact:"Courtney Love, lead singer of Hole, married Kurt in 1992. Their daughter is Frances Bean Cobain."},
// BLIND MELON
{q:"Which Blind Melon song features a girl in a bee costume in its video?",o:["No Rain","Change","Tones of Home","Galaxie"],a:0,d:1,cat:"Blind Melon",fact:"The 'Bee Girl' video became one of MTV's most iconic clips of 1993."},
{q:"Blind Melon's lead singer Shannon Hoon was from which state?",o:["Indiana","California","Washington","Oregon"],a:0,d:2,cat:"Blind Melon",fact:"Shannon Hoon grew up in Lafayette, Indiana. He tragically died of a cocaine overdose in 1995 at age 28."},
{q:"Shannon Hoon appeared in a music video for which other band before Blind Melon?",o:["Guns N' Roses","Nirvana","Pearl Jam","Soundgarden"],a:0,d:3,cat:"Blind Melon",fact:"Shannon sang backup on 'Don't Cry' and appeared in the video — he was friends with Axl Rose from Indiana."},
{q:"What year was Blind Melon's self-titled debut released?",o:["1992","1991","1993","1994"],a:0,d:2,cat:"Blind Melon",fact:"The album went 4x platinum largely on the strength of 'No Rain' and its ubiquitous MTV rotation."},
// RHCP
{q:"What instrument does Flea play in Red Hot Chili Peppers?",o:["Bass","Guitar","Drums","Keyboards"],a:0,d:1,cat:"RHCP",fact:"Flea (Michael Balzary) is considered one of the greatest bass players in rock history."},
{q:"Which RHCP album features 'Under the Bridge'?",o:["Blood Sugar Sex Magik","Californication","By the Way","One Hot Minute"],a:0,d:1,cat:"RHCP",fact:"Blood Sugar Sex Magik (1991) was produced by Rick Rubin and recorded in a haunted mansion."},
{q:"John Frusciante left and rejoined RHCP how many times?",o:["Twice","Once","Three times","Never left"],a:0,d:2,cat:"RHCP",fact:"Frusciante left in 1992 and 2009, returning in 1998 and 2019. Each return revitalized the band."},
{q:"'Californication' is about what?",o:["Hollywood's corrupting influence","A vacation","A love affair","California wine country"],a:0,d:1,cat:"RHCP",fact:"The title track critiques how California pop culture — Hollywood, porn, plastic surgery — infects the world."},
{q:"Which guitarist replaced John Frusciante during his first departure?",o:["Dave Navarro","Hillel Slovak","Josh Klinghoffer","Jack Sherman"],a:0,d:2,cat:"RHCP",fact:"Dave Navarro (Jane's Addiction) played on One Hot Minute (1995), a darker, heavier album."},
{q:"RHCP's original guitarist who died in 1988 was named?",o:["Hillel Slovak","Jack Sherman","Dave Navarro","John Frusciante"],a:0,d:2,cat:"RHCP",fact:"Hillel Slovak died of a heroin overdose at 26. His death nearly destroyed the band."},
// SMASHING PUMPKINS
{q:"Who is the frontman of Smashing Pumpkins?",o:["Billy Corgan","James Iha","D'arcy Wretzky","Jimmy Chamberlin"],a:0,d:1,cat:"Smashing Pumpkins",fact:"Billy Corgan's distinctive nasal voice and ambitious songwriting defined 90s alternative rock."},
{q:"Which double album is considered Smashing Pumpkins' masterpiece?",o:["Mellon Collie and the Infinite Sadness","Siamese Dream","Adore","Machina"],a:0,d:1,cat:"Smashing Pumpkins",fact:"Mellon Collie (1995) was a 28-track double album that debuted at #1 and sold 10 million copies."},
{q:"'1979' is about what?",o:["Teenage nostalgia","The year punk died","A car model","Billy Corgan's birth year"],a:0,d:1,cat:"Smashing Pumpkins",fact:"The dreamy song captures the bittersweet feeling of being young and realizing it won't last."},
{q:"Which Smashing Pumpkins album was produced by Butch Vig and Flood?",o:["Siamese Dream","Gish","Mellon Collie","Adore"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Siamese Dream (1993) was recorded during intense band turmoil but became a masterpiece of layered guitars."},
{q:"What was the name of Smashing Pumpkins' drummer known for his jazz-influenced style?",o:["Jimmy Chamberlin","Matt Cameron","Bill Berry","Patrick Wilson"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Jimmy Chamberlin's technical drumming was crucial to the band's sound. He was fired in 1996 for drug issues."},
// 60s/70s ROOTS
{q:"The Velvet Underground was managed by which artist?",o:["Andy Warhol","Jean-Michel Basquiat","Roy Lichtenstein","Keith Haring"],a:0,d:1,cat:"60s/70s Roots",fact:"Warhol produced their debut album and designed the iconic banana cover."},
{q:"David Bowie's alter ego 'Ziggy Stardust' was what?",o:["An alien rock star","A detective","A time traveler","A robot"],a:0,d:1,cat:"60s/70s Roots",fact:"The Rise and Fall of Ziggy Stardust (1972) told the story of an androgynous alien messiah."},
{q:"Joy Division's lead singer Ian Curtis suffered from what condition?",o:["Epilepsy","Blindness","Deafness","Paralysis"],a:0,d:2,cat:"60s/70s Roots",fact:"Ian Curtis's epilepsy influenced his intense stage movements. He died by suicide in 1980 at age 23."},
{q:"After Ian Curtis's death, Joy Division became which band?",o:["New Order","The Cure","Depeche Mode","Echo & the Bunnymen"],a:0,d:1,cat:"60s/70s Roots",fact:"The remaining members added Gillian Gilbert and became New Order, pioneers of electronic dance music."},
{q:"The Ramones are from which borough of New York City?",o:["Queens","Manhattan","Brooklyn","The Bronx"],a:0,d:2,cat:"60s/70s Roots",fact:"Forest Hills, Queens — all four adopted the surname 'Ramone' though none were related."},
{q:"Iggy Pop fronted which proto-punk band?",o:["The Stooges","MC5","Television","The Dictators"],a:0,d:1,cat:"60s/70s Roots",fact:"The Stooges' raw, confrontational sound in the late 60s directly influenced punk rock a decade later."},
// 80s POST-PUNK
{q:"The Cure's Robert Smith is known for what distinctive look?",o:["Messy black hair and red lipstick","Mohawk","Bald head","Long blonde hair"],a:0,d:1,cat:"80s Post-Punk",fact:"Smith's goth look became one of the most iconic images in alternative music."},
{q:"Pixies are credited with pioneering what song structure?",o:["Quiet-loud-quiet dynamics","12-bar blues","Verse-chorus-verse","Call and response"],a:0,d:2,cat:"80s Post-Punk",fact:"Kurt Cobain admitted 'Smells Like Teen Spirit' was his attempt to write a Pixies song."},
{q:"R.E.M. comes from which US city?",o:["Athens, Georgia","Atlanta, Georgia","Austin, Texas","Asheville, North Carolina"],a:0,d:2,cat:"80s Post-Punk",fact:"Athens, GA had a thriving college rock scene. R.E.M. helped put it on the map globally."},
{q:"Sonic Youth's Thurston Moore and Kim Gordon were married for how many years?",o:["27 years","15 years","10 years","35 years"],a:0,d:3,cat:"80s Post-Punk",fact:"Their 2011 divorce shocked the indie world and effectively ended Sonic Youth after 30 years."},
{q:"Talking Heads' frontman David Byrne wore what in the 'Stop Making Sense' concert film?",o:["An oversized suit","A chicken costume","A wedding dress","Full body paint"],a:0,d:1,cat:"80s Post-Punk",fact:"The 'Big Suit' became one of rock's most iconic visual moments, growing larger throughout the show."},
// 90s GRUNGE/ALT
{q:"Pearl Jam's debut album was called what?",o:["Ten","Vs.","Vitalogy","Yield"],a:0,d:1,cat:"90s Grunge/Alt",fact:"Ten (1991) sold over 13 million copies with hits like 'Alive', 'Even Flow', and 'Jeremy'."},
{q:"Soundgarden's Chris Cornell also fronted which supergroup?",o:["Audioslave","Temple of the Dog","Mad Season","Stone Temple Pilots"],a:0,d:1,cat:"90s Grunge/Alt",fact:"Audioslave combined Cornell's vocals with Rage Against the Machine's instrumentalists."},
{q:"Weezer's 'Blue Album' was produced by whom?",o:["Ric Ocasek","Rick Rubin","Butch Vig","Steve Albini"],a:0,d:2,cat:"90s Grunge/Alt",fact:"Ric Ocasek of The Cars produced both the Blue Album and the Green Album."},
{q:"Beck's breakthrough hit 'Loser' was from which album?",o:["Mellow Gold","Odelay","Mutations","Sea Change"],a:0,d:2,cat:"90s Grunge/Alt",fact:"'Loser' started as a joke folk-rap experiment and accidentally became a generational anthem."},
{q:"Elliott Smith was nominated for an Oscar for which song?",o:["Miss Misery","Between the Bars","Waltz #2","Angeles"],a:0,d:2,cat:"90s Grunge/Alt",fact:"'Miss Misery' from the Good Will Hunting soundtrack was nominated but lost to Celine Dion's 'Titanic' song."},
// 2000s INDIE
{q:"The Strokes' debut album that revived garage rock was called?",o:["Is This It","Room on Fire","First Impressions of Earth","Angles"],a:0,d:1,cat:"2000s Indie",fact:"Is This It (2001) was hailed as the album that saved rock and roll. It was recorded in a basement."},
{q:"Jack White of The White Stripes played with which fictional family member?",o:["His 'sister' Meg (actually ex-wife)","His brother","His cousin","His mother"],a:0,d:2,cat:"2000s Indie",fact:"Jack and Meg White were actually married 1996-2000 but claimed to be siblings for mystique."},
{q:"Arctic Monkeys became famous through which platform before their debut?",o:["MySpace","YouTube","Facebook","Napster"],a:0,d:1,cat:"2000s Indie",fact:"Fans shared demos on MySpace, making them the first band to reach #1 largely through internet hype."},
{q:"Arcade Fire's debut album 'Funeral' was named because?",o:["Several band members' relatives died during recording","It sounded funeral-like","The studio was near a cemetery","It was a metaphor"],a:0,d:2,cat:"2000s Indie",fact:"Multiple family members of band members died during the album's creation, giving it profound emotional weight."},
// 2010s-NOW
{q:"Tame Impala is actually a solo project by whom?",o:["Kevin Parker","Jay Watson","Dominic Simper","Cam Avery"],a:0,d:2,cat:"2010s-Now",fact:"Kevin Parker writes, records, produces, and performs nearly everything on Tame Impala albums."},
{q:"Phoebe Bridgers is known for performing in what unusual outfit?",o:["A skeleton suit","A wedding dress","All black","A spacesuit"],a:0,d:1,cat:"2010s-Now",fact:"Her signature skeleton onesie became iconic in indie rock. She even smashed a guitar on SNL in one."},
// GENERAL
{q:"Sub Pop Records, which launched grunge, is based where?",o:["Seattle","Portland","New York","Los Angeles"],a:0,d:1,cat:"General",fact:"Sub Pop signed Nirvana, Soundgarden, and Mudhoney. They're still independent and based in Seattle."},
{q:"Lollapalooza was founded by which artist?",o:["Perry Farrell (Jane's Addiction)","Billy Corgan","Kurt Cobain","Eddie Vedder"],a:0,d:2,cat:"General",fact:"Perry Farrell created Lollapalooza in 1991 as a farewell tour for Jane's Addiction. It became an institution."},
{q:"Which independent label released albums by Pavement, Sonic Youth, and Guided by Voices?",o:["Matador Records","Sub Pop","4AD","Merge"],a:0,d:3,cat:"General",fact:"Matador Records, founded in 1989, became the definitive US indie rock label of the 90s."},
{q:"What does 'indie' originally refer to?",o:["Independent record labels","A genre of music","Indian music","Individual artists"],a:0,d:1,cat:"General",fact:"'Indie' originally meant released on an independent label, not a major. It later became a genre descriptor."},
{q:"Which festival, held annually in England, is the world's largest greenfield music festival?",o:["Glastonbury","Reading","Download","Isle of Wight"],a:0,d:1,cat:"General",fact:"Glastonbury Festival has been running since 1970 on a farm in Somerset, drawing 200,000+ people."}
];

for(var i=Q.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=Q[i];Q[i]=Q[j];Q[j]=t;}
var state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,started:false};
var hi=+(localStorage.getItem('nyah-hi')||0);

function renderTitle(){
  app.innerHTML='<div class="title-screen"><h1>Nyah\'s Indie Trivia</h1><p class="tsub">'+Q.length+' questions -- The Smiths, Radiohead, Nirvana, and more</p><button class="start-btn" onclick="startGame()">Play</button></div>';
}
function toggleSpotify(){var w=document.getElementById('spWrap');if(w)w.classList.toggle('open');}
function startGame(){state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,started:true};renderQ();}
function renderQ(){
  var q=Q[state.qi],badges=['','badge-1','badge-2','badge-3'];
  var streak=state.streak>=5?'<span class="streak-fire">'+state.streak+'</span>':'';
  var html='<header><h1>Nyah\'s Indie Trivia</h1></header>';
  html+='<div class="score-bar"><span>Score: <b>'+state.score+'</b></span><span>'+streak+(state.streak>=5?' streak':'')+'</span><span>'+(state.qi+1)+'/'+Q.length+'</span></div>';
  html+='<div class="q-header"><span class="category">'+q.cat+'</span><span class="badge '+badges[q.d]+'">'+['','Easy','Medium','Hard'][q.d]+'</span></div>';
  html+='<div class="question-text">'+q.q+'</div><div class="options">';
  q.o.forEach(function(o,i){html+='<button class="opt-btn" onclick="answer('+i+')" id="opt'+i+'">'+o+'</button>';});
  html+='</div><div id="fb"></div>';
  app.innerHTML=html;
}
function answer(idx){
  if(state.answered)return;state.answered=true;
  var q=Q[state.qi],correct=idx===q.a;
  document.querySelectorAll('.opt-btn').forEach(function(b,i){
    b.disabled=true;
    if(i===q.a)b.classList.add(correct&&i===idx?'correct':'reveal');
    if(i===idx&&!correct)b.classList.add('wrong');
  });
  if(correct){state.score+=q.d;state.streak++;state.correct++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;}
  else{state.streak=0;state.wrong++;}
  var fb=document.getElementById('fb');
  fb.innerHTML='<div class="feedback '+(correct?'correct-fb':'wrong-fb')+'"><h3>'+(correct?'Correct!':'Wrong — '+q.o[q.a])+'</h3><div class="fact">'+q.fact+'</div></div><button class="next-btn" onclick="next()">Next</button>';
}
function next(){
  state.qi++;state.answered=false;
  if(state.qi>=Q.length){renderEnd();return;}
  renderQ();
}
function renderEnd(){
  var isHi=state.score>hi;if(isHi){hi=state.score;localStorage.setItem('nyah-hi',hi);}
  var acc=Q.length>0?Math.round(state.correct/Q.length*100):0;
  app.innerHTML='<div class="end-screen"><h2>Trivia Complete!</h2><div class="final-score">'+state.score+'</div>'+(isHi?'<div class="high-label">New High Score!</div>':'')+
    '<div class="stats-grid"><div class="stat-card"><div class="val">'+acc+'%</div><div class="lbl">Accuracy</div></div><div class="stat-card"><div class="val">'+state.bestStreak+'</div><div class="lbl">Best Streak</div></div><div class="stat-card"><div class="val">'+state.correct+'</div><div class="lbl">Correct</div></div><div class="stat-card"><div class="val">'+Q.length+'</div><div class="lbl">Questions</div></div></div>'+
    '<button class="restart-btn" onclick="location.reload()">Play Again</button>'+
    '<button class="share-btn" onclick="shareScore()">Share Score</button></div>';
}
function shareScore(){
  var t="Nyah's Indie Trivia: "+state.score+" pts, "+Math.round(state.correct/Q.length*100)+"% accuracy, "+state.bestStreak+" streak!";
  navigator.clipboard.writeText(t).then(function(){alert('Copied to clipboard!');});
}
renderTitle();
</script></body></html>
