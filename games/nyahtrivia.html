<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nyah's Indie Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#151520;--accent:#c084fc;--green:#4ade80;--gold:#f7c948;--purple:#c084fc;--text:#fff;--red:#ef4444;--dim:rgba(232,232,240,0.5)}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',-apple-system,system-ui,sans-serif;font-size:16px;min-height:100vh;line-height:1.4;display:flex;flex-direction:column;position:relative;overflow-y:auto}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:0.5}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(192,132,252,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.04) 0%,transparent 50%),radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%)}
.spotify-wrap{max-width:600px;margin:0 auto;width:100%;border-radius:12px;overflow:hidden;max-height:0;transition:max-height .3s ease;z-index:10;position:relative}
.spotify-wrap.open{max-height:100px}
.sp-toggle{font-size:11px;color:var(--accent);cursor:pointer;text-align:center;padding:6px;text-transform:uppercase;letter-spacing:2px;z-index:10;position:relative;opacity:0.7;transition:opacity .2s}
.sp-toggle:hover{opacity:1}
.container{max-width:600px;margin:0 auto;padding:10px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
header{text-align:center;padding:8px 0 6px}
header h1{font-size:clamp(16px,4.5vw,22px);letter-spacing:3px;color:var(--accent);font-weight:800;text-transform:uppercase}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.4);padding:8px 12px;border:1.5px solid rgba(192,132,252,0.3);border-radius:10px;margin-bottom:8px;font-size:13px;flex-wrap:wrap;gap:4px;position:relative;backdrop-filter:blur(4px);transition:border-color .3s,box-shadow .3s}
.score-bar span{display:flex;align-items:center;gap:4px}
.score-bar.fire{border-color:var(--accent);box-shadow:0 0 12px rgba(192,132,252,0.3);animation:fireBorder 1.2s ease-in-out infinite}
.progress-wrap{width:100%;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;margin-bottom:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease,background .4s ease}
.q-header{margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.category{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;font-weight:600}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.badge-easy{background:var(--green);color:#000}
.badge-med{background:var(--gold);color:#000}
.badge-hard{background:var(--purple);color:#000}
.question-text{font-size:clamp(17px,4.2vw,21px);font-weight:600;margin:14px 0 18px;line-height:1.45}
.options{display:flex;flex-direction:column;gap:9px}
.opt-btn{width:100%;min-height:48px;padding:12px 16px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);color:#fff;border-radius:10px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background .15s,border-color .15s,transform .1s;-webkit-tap-highlight-color:transparent;line-height:1.3;backdrop-filter:blur(2px);animation:cardIn .35s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:.06s}
.opt-btn:nth-child(3){animation-delay:.12s}
.opt-btn:nth-child(4){animation-delay:.18s}
.opt-btn:active{transform:scale(.98)}
.opt-btn:hover{border-color:rgba(192,132,252,0.5);background:rgba(192,132,252,0.06)}
.opt-btn.correct{background:rgba(74,222,128,0.15);border-color:var(--green);color:var(--green);animation:correctPop .35s ease}
.opt-btn.wrong{background:rgba(239,68,68,0.15);border-color:var(--red);color:var(--red);animation:wrongShake .4s ease}
.opt-btn.reveal{border-color:var(--green);opacity:.6}
.opt-btn:disabled{cursor:default;opacity:.85}
.feedback{margin-top:14px;padding:14px;border-radius:10px;animation:fadeSlide .3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25)}
.feedback.wrong-fb{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25)}
.feedback h3{margin-bottom:4px;font-size:17px}
.feedback .fact{font-size:13px;color:rgba(232,232,240,0.65);margin-top:8px;font-style:italic;line-height:1.5;padding-left:10px;border-left:2px solid rgba(192,132,252,0.3)}
.next-btn{width:100%;min-height:50px;padding:14px;margin-top:14px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:0.5px}
.next-btn:hover{opacity:.9}
.next-btn:active{transform:scale(.98)}
.streak-fire{color:var(--accent);animation:streakFire 1.5s ease-in-out infinite}
.sound-toggle{background:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}

/* Title screen */
.title-screen{text-align:center;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:24px 20px;background:url('nyah-title.png') center/cover no-repeat;position:relative}
.title-screen::after{content:'';position:absolute;inset:0;background:linear-gradient(transparent 30%,rgba(10,10,15,0.7) 60%,rgba(10,10,15,0.95) 85%)}
.title-screen>*{position:relative;z-index:2}
.title-screen h1{font-size:clamp(28px,7vw,44px);color:#fff;text-shadow:0 2px 30px rgba(192,132,252,0.5);letter-spacing:4px;margin-bottom:6px;text-transform:uppercase;font-weight:900}
.title-screen .tsub{color:rgba(255,255,255,0.6);font-size:clamp(13px,3.5vw,15px);margin-bottom:24px;letter-spacing:1px}
.title-screen .play-btn{max-width:280px;width:100%;min-height:54px;padding:16px;background:var(--accent);color:#000;border:none;border-radius:12px;font-size:18px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:3px;margin-bottom:max(24px,env(safe-area-inset-bottom));transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(192,132,252,0.3)}
.title-screen .play-btn:hover{transform:translateY(-1px);box-shadow:0 6px 30px rgba(192,132,252,0.4)}
.title-screen .play-btn:active{transform:scale(.97)}

/* Floating points */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-28px) scale(1.15)}100%{opacity:0;transform:translateY(-45px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:16px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
@keyframes scoreUp{0%{transform:scale(1);color:#fff}50%{transform:scale(1.25);color:var(--accent)}100%{transform:scale(1);color:#fff}}
.score-pop{animation:scoreUp .4s ease}

/* End screen */
.end-screen{text-align:center;padding:30px 0;animation:fadeSlide .4s ease}
.end-screen h2{font-size:clamp(24px,6vw,30px);color:var(--accent);margin-bottom:6px;letter-spacing:2px;text-transform:uppercase}
.end-screen .final-score{font-size:clamp(44px,12vw,56px);font-weight:900;color:var(--accent);margin:14px 0;text-shadow:0 0 30px rgba(192,132,252,0.3)}
.end-screen .high-label{color:var(--green);font-size:15px;margin-bottom:16px;letter-spacing:1px}
.grade-badge{display:inline-block;font-size:32px;font-weight:900;padding:6px 20px;border-radius:12px;margin:8px 0 16px}
.accuracy-wrap{text-align:left;margin:12px 0}
.accuracy-wrap .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;color:var(--dim)}
.accuracy-bar{width:100%;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden}
.accuracy-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:18px 0}
.stat-card{background:var(--surface);padding:12px;border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,0.06)}
.stat-card .val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:11px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:1px}
.restart-btn{width:100%;min-height:50px;padding:14px;margin-top:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.restart-btn:hover{opacity:.9}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:1.5px solid var(--accent);border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.share-btn:hover{background:rgba(192,132,252,0.08)}

/* Animations */
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.025)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(192,132,252,0.3)}50%{text-shadow:0 0 14px rgba(192,132,252,0.7)}100%{text-shadow:0 0 4px rgba(192,132,252,0.3)}}
@keyframes fireBorder{0%{border-color:rgba(192,132,252,0.4);box-shadow:0 0 8px rgba(192,132,252,0.2)}50%{border-color:rgba(192,132,252,0.8);box-shadow:0 0 20px rgba(192,132,252,0.4)}100%{border-color:rgba(192,132,252,0.4);box-shadow:0 0 8px rgba(192,132,252,0.2)}}
@keyframes screenFlash{0%{opacity:0}15%{opacity:0.12}100%{opacity:0}}
.screen-flash{position:fixed;inset:0;background:var(--accent);pointer-events:none;z-index:99;animation:screenFlash .5s ease forwards}
body.streak-glow::after{background:radial-gradient(ellipse at 20% 20%,rgba(192,132,252,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,0.08) 0%,transparent 50%),radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.5) 100%)}
@media(min-width:800px){
body{height:100vh;overflow:hidden}
.container{padding:4px 24px}
header{padding:2px 0}header h1{font-size:16px}
.score-bar{padding:4px 10px;margin-bottom:4px;font-size:12px}
.progress-wrap{height:3px;margin-bottom:4px}
.q-header{margin-bottom:3px}.category{font-size:10px}.badge{font-size:10px;padding:1px 8px}
.question-text{font-size:15px;margin:4px 0 8px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-btn{min-height:34px;padding:7px 10px;font-size:13px}
.next-btn{min-height:38px;padding:8px;font-size:14px;margin-top:6px}
.feedback{margin-top:6px;padding:8px 10px}
.feedback h3{font-size:14px}
.feedback .fact{font-size:12px}
}
</style>
</head>
