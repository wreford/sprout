<script>
/* ========================================================
   NYAH'S INDIE TRIVIA — 260 questions
   ======================================================== */
var Q=[

// ──────────────────────────────────────
// THE SMITHS (35)
// ──────────────────────────────────────
{q:"Which Smiths album features the song 'How Soon Is Now?'",o:["Meat Is Murder","The Queen Is Dead","Hatful of Hollow","Strangeways, Here We Come"],a:0,d:2,cat:"The Smiths",fact:"'How Soon Is Now?' was originally a B-side, then added to Meat Is Murder for the US release. Its tremolo guitar is one of the most sampled sounds in indie rock."},
{q:"What is Morrissey's full first name?",o:["Steven","Michael","Robert","Patrick"],a:0,d:1,cat:"The Smiths",fact:"Steven Patrick Morrissey dropped his first name early on. He once said 'Morrissey' sounded like 'an Irish criminal,' which suited him fine."},
{q:"Johnny Marr co-founded which electronic project with New Order's Bernard Sumner?",o:["Electronic","Modest Mouse","The Cribs","The Healers"],a:0,d:2,cat:"The Smiths",fact:"Electronic blended indie guitar with synth-pop and dance beats, releasing three albums between 1991 and 1999."},
{q:"Complete this Smiths lyric: 'I am human and I need to be loved, just like everybody ___'",o:["else does","knows","feels","dreams"],a:0,d:1,cat:"The Smiths",fact:"From 'How Soon Is Now?' -- the tremolo guitar intro was created by Johnny Marr feeding his guitar through multiple amps with a tremolo effect."},
{q:"The Smiths formed in which city?",o:["Manchester","London","Liverpool","Sheffield"],a:0,d:1,cat:"The Smiths",fact:"Morrissey and Marr met in Manchester in 1982 after Marr knocked on Morrissey's door uninvited and proposed they write songs together."},
{q:"Who played bass in The Smiths?",o:["Andy Rourke","Peter Hook","Simon Gallup","Paul McCartney"],a:0,d:1,cat:"The Smiths",fact:"Andy Rourke's melodic, fluid basslines were essential to The Smiths' sound. He was briefly fired in 1986 over drug issues but quickly reinstated."},
{q:"Which Smiths album contains 'There Is a Light That Never Goes Out'?",o:["The Queen Is Dead","Meat Is Murder","The Smiths","Strangeways, Here We Come"],a:0,d:1,cat:"The Smiths",fact:"Morrissey wanted it as a single but was overruled. It wasn't released as a single until 1992, five years after the band split."},
{q:"What year did The Smiths break up?",o:["1987","1985","1989","1990"],a:0,d:2,cat:"The Smiths",fact:"Johnny Marr left in August 1987 over creative tensions. The band lasted only five years but reshaped British guitar music permanently."},
{q:"Morrissey is famously outspoken about which lifestyle choice?",o:["Vegetarianism","Teetotalism","Minimalism","Pacifism"],a:0,d:1,cat:"The Smiths",fact:"The album 'Meat Is Murder' made a generation of indie kids stop eating meat. The title track features slaughterhouse sound effects."},
{q:"Who is on the cover of The Smiths' self-titled debut album?",o:["Joe Dallesandro","James Dean","Morrissey","Terence Stamp"],a:0,d:3,cat:"The Smiths",fact:"Joe Dallesandro was a Warhol Factory star. Morrissey was obsessed with using images of cultural icons on their sleeves."},
{q:"Complete the lyric: 'Punctured bicycle on a hillside ___'",o:["desolate","abandoned","alone","forsaken"],a:0,d:3,cat:"The Smiths",fact:"The opening line of 'This Charming Man,' their first Top 30 hit. Johnny Marr wrote the riff after being inspired by a Bert Jansch record."},
{q:"Which Smiths drummer later sued Morrissey and Marr over royalties?",o:["Mike Joyce","Andy Rourke","Craig Gannon","Dale Hibbert"],a:0,d:2,cat:"The Smiths",fact:"Mike Joyce won a landmark 1996 court case, with the judge awarding him 25% of recording royalties and calling Morrissey 'devious, truculent, and unreliable.'"},
{q:"What Smiths song was inspired by the Moors murders?",o:["Suffer Little Children","Reel Around the Fountain","Hand in Glove","Pretty Girls Make Graves"],a:0,d:2,cat:"The Smiths",fact:"The song about child murders in Manchester caused a boycott by some record shops. The mother of one victim initially protested but later befriended Morrissey."},
{q:"Which poet heavily influenced Morrissey's lyric writing?",o:["Oscar Wilde","T.S. Eliot","W.B. Yeats","Sylvia Plath"],a:0,d:1,cat:"The Smiths",fact:"Morrissey was obsessed with Wilde's wit and outsider status. Several Smiths songs reference Wilde directly."},
{q:"'Girlfriend in a Coma' appeared on which Smiths album?",o:["Strangeways, Here We Come","The Queen Is Dead","Meat Is Murder","Hatful of Hollow"],a:0,d:2,cat:"The Smiths",fact:"Their final studio album, named after Strangeways Prison in Manchester. It was released in September 1987, a month after the breakup."},
{q:"What was the first Smiths single?",o:["Hand in Glove","This Charming Man","What Difference Does It Make?","Heaven Knows I'm Miserable Now"],a:0,d:2,cat:"The Smiths",fact:"'Hand in Glove' was released on Rough Trade in May 1983 and only reached #124. Morrissey considered it their finest moment."},
{q:"Morrissey often performed with what item tucked into his back pocket?",o:["Flowers","A paperback book","A handkerchief","A postcard"],a:0,d:1,cat:"The Smiths",fact:"Gladioli and other flowers became his trademark. Fans would throw bouquets on stage at every gig."},
{q:"Which Smiths song features the lyric 'So you go and you stand on your own, and you leave on your own'?",o:["How Soon Is Now?","I Know It's Over","Asleep","Last Night I Dreamt That Somebody Loved Me"],a:0,d:2,cat:"The Smiths",fact:"The song is one of the most painfully honest depictions of loneliness and social anxiety in pop music."},
{q:"Which record label released all of The Smiths' albums?",o:["Rough Trade","Factory","Creation","4AD"],a:0,d:2,cat:"The Smiths",fact:"Rough Trade was a small independent label. The Smiths proved that indie labels could produce chart-topping acts without major label backing."},
{q:"Johnny Marr later joined which American band as a full member?",o:["Modest Mouse","Sonic Youth","R.E.M.","Wilco"],a:0,d:2,cat:"The Smiths",fact:"Marr joined Modest Mouse in 2006, playing guitar on their album 'We Were Dead Before the Ship Even Sank.'"},
{q:"The Queen Is Dead opens with a sample from which classic film?",o:["The L-Shaped Room","A Taste of Honey","Saturday Night and Sunday Morning","Billy Liar"],a:0,d:3,cat:"The Smiths",fact:"The album opens with a snippet of Cicely Courtneidge singing 'Take Me Back to Dear Old Blighty' from a 1962 film."},
{q:"Which Morrissey solo album reached #1 in the UK on its first week?",o:["Viva Hate","Your Arsenal","Vauxhall and I","You Are the Quarry"],a:0,d:3,cat:"The Smiths",fact:"Viva Hate (1988), his debut solo album, went straight to #1, proving Morrissey didn't need The Smiths to sell records."},
{q:"What literary figure appears on the cover of 'The Smiths' compilation 'Hatful of Hollow'?",o:["No literary figure -- it shows a still from a Cocteau film","Oscar Wilde","Shelagh Delaney","A.E. Housman"],a:0,d:3,cat:"The Smiths",fact:"The cover is a still from the Jean Cocteau film 'Orphee' (1950), fitting Morrissey's love of French cinema."},
{q:"'Panic' by The Smiths features which famous chant in its chorus?",o:["'Hang the DJ'","'Burn it down'","'Smash the state'","'Kill the radio'"],a:0,d:1,cat:"The Smiths",fact:"'Hang the DJ' was inspired by DJ Steve Wright playing Wham! after a Chernobyl news report. It became a rallying cry against mainstream pop."},
{q:"Which Smiths song was covered by Sandie Shaw, reaching the UK Top 30?",o:["Hand in Glove","This Charming Man","Please, Please, Please, Let Me Get What I Want","Jeane"],a:0,d:3,cat:"The Smiths",fact:"Sandie Shaw's cover of 'Hand in Glove' reached #27 in 1984. The Smiths actually played as her backing band on the recording."},

// ──────────────────────────────────────
// RADIOHEAD (35)
// ──────────────────────────────────────
{q:"Which Radiohead album is often called the greatest album of the 1990s?",o:["OK Computer","The Bends","Kid A","Amnesiac"],a:0,d:1,cat:"Radiohead",fact:"OK Computer (1997) was a prophetic meditation on technology, alienation, and capitalism that topped virtually every end-of-decade poll."},
{q:"What was Radiohead's breakthrough single that the band later grew to despise?",o:["Creep","Karma Police","High and Dry","Anyone Can Play Guitar"],a:0,d:1,cat:"Radiohead",fact:"'Creep' was initially a flop in the UK but became a worldwide hit. The band refused to play it live for years, calling it a noose around their necks."},
{q:"Complete this lyric from 'Creep': 'I'm a ___'",o:["creep","weirdo","loser","freak"],a:0,d:1,cat:"Radiohead",fact:"The song's self-loathing lyrics resonated with millions, though Thom Yorke said he was writing about a specific person at a party."},
{q:"Thom Yorke formed which side project with Flea from RHCP?",o:["Atoms for Peace","The Smile","The Eraser","Amok"],a:0,d:2,cat:"Radiohead",fact:"Atoms for Peace also included producer Nigel Godrich. Their album 'Amok' (2013) blended electronic beats with live instrumentation."},
{q:"Which Radiohead album abandoned guitar rock for electronic experimentation?",o:["Kid A","Amnesiac","Hail to the Thief","The King of Limbs"],a:0,d:1,cat:"Radiohead",fact:"Kid A (2000) shocked fans by ditching guitars for synthesizers, Ondes Martenot, and glitchy beats. Many initially hated it; now it's considered a masterpiece."},
{q:"'Paranoid Android' was inspired by what experience?",o:["Thom Yorke witnessing a woman on cocaine at an LA bar","A car accident","A nightmare about robots","Reading Douglas Adams"],a:0,d:3,cat:"Radiohead",fact:"Yorke said a woman's eyes 'went like two black holes' as she reacted to cocaine, terrifying him. The title references 'Hitchhiker's Guide to the Galaxy.'"},
{q:"What is Radiohead's hometown?",o:["Abingdon, Oxfordshire","Manchester","Bristol","Camden, London"],a:0,d:2,cat:"Radiohead",fact:"All five members met at Abingdon School in the 1980s. They originally called themselves On a Friday after their rehearsal slot."},
{q:"Which Radiohead album was released as a 'pay what you want' download?",o:["In Rainbows","The King of Limbs","A Moon Shaped Pool","Hail to the Thief"],a:0,d:1,cat:"Radiohead",fact:"In Rainbows (2007) was a landmark moment in music distribution. The average payment was reportedly around $6, and it still debuted at #1 when physically released."},
{q:"Jonny Greenwood composed the score for which Paul Thomas Anderson film?",o:["There Will Be Blood","Boogie Nights","Magnolia","Punch-Drunk Love"],a:0,d:2,cat:"Radiohead",fact:"Greenwood's dissonant, terrifying score was so good that parts were disqualified from the Oscars for containing pre-existing music."},
{q:"What rare instrument does Jonny Greenwood play that produces eerie wavering tones?",o:["Ondes Martenot","Theremin","Chapman Stick","Mellotron"],a:0,d:3,cat:"Radiohead",fact:"The Ondes Martenot, invented in 1928, appears on Kid A, Amnesiac, and several later albums. Greenwood owns one of the last functioning originals."},
{q:"Which Radiohead song has a music video featuring a man with multiple arms?",o:["Just","Street Spirit (Fade Out)","Karma Police","Lucky"],a:0,d:2,cat:"Radiohead",fact:"The 'Just' video ends with a man lying on the pavement — what he says that makes everyone join him is deliberately inaudible with no subtitles."},
{q:"What does Thom Yorke whisper in the background of 'Kid A'?",o:["Heavily distorted and unintelligible lyrics","A nursery rhyme","A political speech","The names of band members"],a:0,d:2,cat:"Radiohead",fact:"Yorke fed his vocals through an Ondes Martenot synthesizer, making them deliberately impossible to understand — the voice becomes just another texture."},
{q:"Which Radiohead album was recorded in the same studio as OK Computer but sounds nothing like it?",o:["Amnesiac","Kid A","Hail to the Thief","A Moon Shaped Pool"],a:0,d:2,cat:"Radiohead",fact:"Amnesiac (2001) was recorded during the same sessions as Kid A but assembled from different takes and experiments — it's the darker, jazzier twin."},
{q:"The 'No Surprises' music video shows Thom Yorke doing what?",o:["Having his head slowly submerged in water inside a helmet","Walking through an empty house","Sitting motionless for 4 minutes","Playing with toy robots"],a:0,d:2,cat:"Radiohead",fact:"Yorke's head fills with water in a diving-bell helmet. He nearly drowned during filming and the crew had to pull him out twice."},
{q:"What was Radiohead's original band name?",o:["On a Friday","The Headless Children","Shindig","Exit Music"],a:0,d:2,cat:"Radiohead",fact:"They rehearsed on Fridays at school, hence the name. They changed to Radiohead (from a Talking Heads song) when they signed to EMI in 1991."},
{q:"'Everything in Its Right Place' opens which album?",o:["Kid A","Amnesiac","OK Computer","In Rainbows"],a:0,d:1,cat:"Radiohead",fact:"The eerie, warped-keyboard opening track signals immediately that this is not going to be another Bends or OK Computer."},
{q:"Which Radiohead song was used as the closing credits music for a film about a school shooting?",o:["Exit Music (For a Film)","Lucky","The Tourist","Let Down"],a:0,d:3,cat:"Radiohead",fact:"'Exit Music (For a Film)' was actually written for Baz Luhrmann's Romeo + Juliet. The band wrote it imagining the lovers escaping together."},
{q:"Radiohead refused to appear on which popular TV show, sending a lookalike instead?",o:["None -- this is a myth","Top of the Pops","Later... with Jools Holland","The Jonathan Ross Show"],a:0,d:3,cat:"Radiohead",fact:"This is a common myth. However, Radiohead did reluctantly appear on Top of the Pops for 'Creep' and visibly hated being there."},
{q:"What is the last track on OK Computer?",o:["The Tourist","Lucky","No Surprises","Fitter Happier"],a:0,d:2,cat:"Radiohead",fact:"'The Tourist' was written by Jonny Greenwood after watching tourists in Prague rushing past beautiful architecture. The final cymbal crash was his joke about ending the album with a bang."},
{q:"Which Radiohead album was partly inspired by Thom Yorke's divorce?",o:["A Moon Shaped Pool","The King of Limbs","In Rainbows","Hail to the Thief"],a:0,d:2,cat:"Radiohead",fact:"A Moon Shaped Pool (2016) contained songs written over 20 years, with 'True Love Waits' finally getting a studio recording as a devastating piano ballad."},
{q:"Radiohead's 'Idioteque' samples a piece by which electronic music pioneer?",o:["Paul Lansky","Karlheinz Stockhausen","Steve Reich","Brian Eno"],a:0,d:3,cat:"Radiohead",fact:"The track samples Paul Lansky's 'mild und leise' (1973), an early computer music composition. Jonny Greenwood found it on a compilation of electronic music."},
{q:"In what year did Radiohead form?",o:["1985","1988","1991","1983"],a:0,d:2,cat:"Radiohead",fact:"They formed as schoolboys in 1985 at Abingdon School but didn't release their first single until 1992."},
{q:"Which Radiohead album's title is taken from a line in a Dante's Inferno painting?",o:["Amnesiac","Kid A","The Bends","A Moon Shaped Pool"],a:0,d:3,cat:"Radiohead",fact:"Amnesiac references the river Lethe, the river of forgetfulness in Greek mythology/Dante's work, fitting its themes of erasure and distortion."},
{q:"'Karma Police' opens with a piano chord sequence reminiscent of which Beatles song?",o:["Sexy Sadie","Let It Be","Yesterday","A Day in the Life"],a:0,d:3,cat:"Radiohead",fact:"The opening piano chords deliberately echo 'Sexy Sadie' from the White Album. Yorke described the song as the 'karma police' that would arrest annoying people."},
{q:"What is the name of Thom Yorke's 2024 band with Jonny Greenwood?",o:["The Smile","Atoms for Peace","The Eraser","Office Chart"],a:0,d:1,cat:"Radiohead",fact:"The Smile formed in 2021 with drummer Tom Skinner. Their name comes from a Ted Hughes poem about a smile that 'moved through the crowd.'"},

// ──────────────────────────────────────
// NIRVANA (35)
// ──────────────────────────────────────
{q:"Nirvana's Nevermind knocked which artist off the #1 spot?",o:["Michael Jackson","Guns N' Roses","U2","Garth Brooks"],a:0,d:1,cat:"Nirvana",fact:"Nevermind dethroned Michael Jackson's 'Dangerous' in January 1992 -- the moment alternative rock went mainstream."},
{q:"What is depicted on the cover of Nevermind?",o:["A naked baby swimming toward a dollar bill on a fishhook","A heart-shaped box","An angel in pain","A fetus"],a:0,d:1,cat:"Nirvana",fact:"The baby was Spencer Elden, photographed at 4 months old. The dollar bill on a fishhook was a last-minute addition symbolizing capitalist lure."},
{q:"Kurt Cobain said 'Smells Like Teen Spirit' was his attempt to rip off which band?",o:["Pixies","Black Flag","Melvins","Sonic Youth"],a:0,d:1,cat:"Nirvana",fact:"Cobain loved the Pixies' quiet-loud dynamic and openly admitted trying to copy it. The song accidentally became the anthem of a generation."},
{q:"Who was Nirvana's drummer who went on to form Foo Fighters?",o:["Dave Grohl","Chad Channing","Aaron Burckhard","Dan Peters"],a:0,d:1,cat:"Nirvana",fact:"Grohl joined in 1990 at age 21. After Kurt's death, he recorded the entire first Foo Fighters album alone in a week."},
{q:"What label released Nirvana's debut album Bleach?",o:["Sub Pop","DGC","Geffen","SST"],a:0,d:2,cat:"Nirvana",fact:"Bleach cost only $606.17 to record. Sub Pop released it in 1989. It sold 40,000 copies before Nevermind made it retroactively platinum."},
{q:"How much did it cost to record Bleach?",o:["$606.17","$1,200","$5,000","$25,000"],a:0,d:2,cat:"Nirvana",fact:"Producer Jack Endino recorded it in about 30 hours. The money came from a loan by Nirvana's second guitarist Jason Everman, who was later credited on the album despite not playing on it."},
{q:"Nirvana's MTV Unplugged featured a cover of which David Bowie song?",o:["The Man Who Sold the World","Ziggy Stardust","Heroes","Changes"],a:0,d:1,cat:"Nirvana",fact:"Many viewers thought it was a Nirvana original. Bowie later said he was flattered and that Cobain's version was 'heart-wrenching.'"},
{q:"Who produced In Utero, Nirvana's deliberately abrasive third album?",o:["Steve Albini","Butch Vig","Jack Endino","Bob Rock"],a:0,d:2,cat:"Nirvana",fact:"Albini was hired for his raw aesthetic. He recorded the album in two weeks for a flat $100,000 fee, refusing royalties on principle."},
{q:"What was Kurt Cobain's wife's name?",o:["Courtney Love","Kim Gordon","Kathleen Hanna","Tobi Vail"],a:0,d:1,cat:"Nirvana",fact:"Courtney Love of Hole married Kurt in 1992. Their daughter Frances Bean was named after Frances McKee of The Vaselines."},
{q:"Which Meat Puppets members joined Nirvana on stage for MTV Unplugged?",o:["Cris and Curt Kirkwood","All three Meat Puppets","Just Curt Kirkwood","None -- Nirvana covered them alone"],a:0,d:3,cat:"Nirvana",fact:"The Kirkwood brothers played three of their own songs with Nirvana. It revived the Meat Puppets' career overnight."},
{q:"'Heart-Shaped Box' was the first single from which album?",o:["In Utero","Nevermind","Bleach","Incesticide"],a:0,d:1,cat:"Nirvana",fact:"The song was reportedly about Kurt's turbulent relationship with Courtney Love. Its surreal video, directed by Anton Corbijn, is one of the most iconic of the 90s."},
{q:"What city is considered the birthplace of grunge?",o:["Seattle","Portland","San Francisco","Olympia"],a:0,d:1,cat:"Nirvana",fact:"Seattle's Sub Pop label and bands like Nirvana, Pearl Jam, Soundgarden, and Alice in Chains turned a local scene into a global revolution."},
{q:"Kurt Cobain's journals were published posthumously in what year?",o:["2002","1995","1999","2005"],a:0,d:3,cat:"Nirvana",fact:"The journals contain song ideas, personal rants, letters, and drawings. They reveal a deeply complex, often self-deprecating artist."},
{q:"'Smells Like Teen Spirit' was named after what?",o:["A deodorant brand","A punk fanzine","A political slogan","A Kurt Cobain poem"],a:0,d:2,cat:"Nirvana",fact:"Kathleen Hanna of Bikini Kill spray-painted 'Kurt smells like Teen Spirit' on his wall -- it was the deodorant his girlfriend Tobi Vail wore. He didn't know that."},
{q:"Nirvana performed which song on their famous 1992 appearance on Top of the Pops?",o:["Smells Like Teen Spirit but Cobain sang in a low croon mocking the show","Smells Like Teen Spirit with normal performance","Lithium","Come As You Are"],a:0,d:3,cat:"Nirvana",fact:"Cobain deliberately sang in a comedically deep voice, mocked the lip-sync format, and changed the intro lyrics to reference Morrissey. The BBC was furious."},
{q:"What was the last song Nirvana played at their final concert?",o:["Heart-Shaped Box","Smells Like Teen Spirit","Where Did You Sleep Last Night","All Apologies"],a:0,d:3,cat:"Nirvana",fact:"Their last concert was March 1, 1994 in Munich, Germany. The setlist ended with 'Heart-Shaped Box.'"},
{q:"Which early Nirvana drummer appeared on Bleach?",o:["Chad Channing","Dave Grohl","Dale Crover","Aaron Burckhard"],a:0,d:2,cat:"Nirvana",fact:"Chad Channing played drums on Bleach but was replaced by Dave Grohl in 1990 before the recording of Nevermind."},
{q:"'About a Girl' from Bleach was inspired by Kurt's relationship with which person?",o:["Tracy Marander, his girlfriend","Courtney Love","His mother","Tobi Vail"],a:0,d:2,cat:"Nirvana",fact:"Tracy Marander supported Kurt financially while he wrote songs. He wrote 'About a Girl' after listening to the Beatles all day, aiming for their pop sensibility."},
{q:"What was the working title of 'Nevermind' before the band changed it?",o:["Sheep","Grunge","Verse Chorus Verse","Lithium"],a:0,d:3,cat:"Nirvana",fact:"The working title was 'Sheep,' a sardonic comment on the mass consumerism the album would ironically become a part of."},
{q:"In Utero's album cover features what anatomical imagery?",o:["A transparent angel/woman with visible internal organs and wings","A heart-shaped box","A fetus","An X-ray"],a:0,d:2,cat:"Nirvana",fact:"The cover art was based on a figure from Kurt's own paintings, featuring an angelic figure with visible organs -- beautiful and disturbing, like the music."},
{q:"What did Kurt Cobain famously write in his suicide note about music?",o:["'The worst crime I can think of would be to rip people off by faking it'","'Music is dead to me'","'I never wanted to be famous'","'Tell the fans I'm sorry'"],a:0,d:2,cat:"Nirvana",fact:"The line referenced his inability to feel the passion for performing anymore, a tragic admission from someone whose authenticity defined an era."},
{q:"Which band member from Nirvana went on to become a political activist and nearly ran for office?",o:["Krist Novoselic","Dave Grohl","Pat Smear","Chad Channing"],a:0,d:2,cat:"Nirvana",fact:"Krist Novoselic became deeply involved in political activism, particularly around music censorship and electoral reform. He ran for county clerk in 2007."},
{q:"What Leadbelly song did Nirvana cover during MTV Unplugged as the show's devastating closer?",o:["Where Did You Sleep Last Night","Goodnight, Irene","Midnight Special","Black Betty"],a:0,d:2,cat:"Nirvana",fact:"Kurt's performance was so intense that producer Alex Coletti asked for a second take. Kurt replied: 'I'm not going to top that.'"},
{q:"Before Nirvana, Kurt Cobain briefly played in a Creedence Clearwater Revival cover band called what?",o:["The Sellouts","Fecal Matter","Skid Row","Brown Towel"],a:0,d:3,cat:"Nirvana",fact:"The Sellouts was a teenage joke band where Kurt played CCR covers. His pre-Nirvana project Fecal Matter was more serious."},

// ──────────────────────────────────────
// BLIND MELON (20)
// ──────────────────────────────────────
{q:"Which Blind Melon song features a girl in a bee costume in its video?",o:["No Rain","Change","Tones of Home","Galaxie"],a:0,d:1,cat:"Blind Melon",fact:"The 'Bee Girl' -- young Heather DeLoach tap-dancing in a bumblebee suit -- became one of MTV's most beloved images of the 1990s."},
{q:"Blind Melon's lead singer Shannon Hoon was from which state?",o:["Indiana","California","Washington","Mississippi"],a:0,d:2,cat:"Blind Melon",fact:"Shannon Hoon grew up in Lafayette, Indiana. He moved to LA to form Blind Melon and tragically died of a cocaine overdose in 1995 at age 28."},
{q:"Shannon Hoon sang backup and appeared in a video for which band?",o:["Guns N' Roses","Nirvana","Pearl Jam","Soundgarden"],a:0,d:2,cat:"Blind Melon",fact:"Shannon sang backup vocals on 'Don't Cry' and appeared in the video. He and Axl Rose grew up in the same Indiana town."},
{q:"What was Blind Melon's second album called?",o:["Soup","Tones of Home","Nico","For My Friends"],a:0,d:2,cat:"Blind Melon",fact:"Soup (1995) was a darker, more experimental album released just weeks before Shannon's death. Critics later called it an underrated masterpiece."},
{q:"How did Shannon Hoon die?",o:["Cocaine overdose on the tour bus","Car accident","Drowning","Cancer"],a:0,d:2,cat:"Blind Melon",fact:"Shannon was found dead on the tour bus in New Orleans on October 21, 1995. He was 28 years old -- the same age as many members of the '27 Club.'"},
{q:"The 'Bee Girl' in the 'No Rain' video was played by which child actress?",o:["Heather DeLoach","Anna Paquin","Christina Ricci","Kirsten Dunst"],a:0,d:3,cat:"Blind Melon",fact:"Heather DeLoach was 10 years old during filming. She appeared at Blind Melon reunion shows decades later as an adult."},
{q:"What year was Blind Melon's self-titled debut released?",o:["1992","1991","1993","1994"],a:0,d:2,cat:"Blind Melon",fact:"The album went 4x platinum largely on the strength of 'No Rain' and its ubiquitous MTV rotation."},
{q:"Which instrument did Shannon Hoon play besides singing?",o:["Guitar","Drums","Harmonica","Bass"],a:0,d:2,cat:"Blind Melon",fact:"Shannon played guitar and also occasionally played harmonica live, adding another texture to the band's jam-friendly sound."},
{q:"Blind Melon reformed in 2006 with which new lead singer?",o:["Travis Warren","Scott Weiland","Shannon Larkin","Layne Staley"],a:0,d:3,cat:"Blind Melon",fact:"Travis Warren joined the reunited band and they released 'For My Friends' in 2008, but they never recaptured the magic of the Hoon era."},
{q:"Complete this lyric from 'No Rain': 'All I can say is that my life is pretty ___'",o:["plain","strange","boring","empty"],a:0,d:1,cat:"Blind Melon",fact:"The deceptively upbeat song is actually about depression and feeling like an outsider -- the sunshine melody masks deeply sad lyrics."},
{q:"Shannon Hoon's daughter, born just before his death, is named what?",o:["Nico Blue","Rain","Summer","Luna"],a:0,d:3,cat:"Blind Melon",fact:"Nico Blue Hoon was born in 1995 and became the inspiration for the posthumous compilation 'Nico.' Shannon never got to see her grow up."},
{q:"Which Blind Melon song was featured in the film 'Dazed and Confused'?",o:["None -- common misconception","No Rain","Change","Tones of Home"],a:0,d:3,cat:"Blind Melon",fact:"Though strongly associated with 90s nostalgia, Blind Melon didn't appear on the Dazed and Confused soundtrack, which focused on 70s music."},
{q:"What style best describes Blind Melon's musical sound?",o:["Psychedelic jam rock with folk influences","Grunge","Punk","Electronic"],a:0,d:1,cat:"Blind Melon",fact:"Unlike their grunge contemporaries, Blind Melon drew more from the Grateful Dead, Led Zeppelin, and Janis Joplin than from punk."},
{q:"Blind Melon's 'Soup' album cover features what imagery?",o:["A bowl of soup with a fly in it","The bee girl","Shannon's portrait","An abstract painting"],a:0,d:3,cat:"Blind Melon",fact:"The cover shows a bowl of soup -- simple but eerie given that it was Shannon's final album, recorded during his struggles with addiction."},
{q:"Which member of Blind Melon went on to produce albums for other bands?",o:["Christopher Thorn","Rogers Stevens","Brad Smith","Glen Graham"],a:0,d:3,cat:"Blind Melon",fact:"Guitarist Christopher Thorn became a successful producer, working with artists in various genres after the band dissolved."},
{q:"Shannon Hoon was filming what during his final tour?",o:["A personal video diary on a camcorder","A documentary about homelessness","Music videos","Nothing"],a:0,d:2,cat:"Blind Melon",fact:"Shannon's camcorder footage was later compiled into the documentary 'All I Can Say' (2019), an intimate and heartbreaking self-portrait."},
{q:"'No Rain' reached what position on the Billboard Hot 100?",o:["#20","#1","#5","#45"],a:0,d:3,cat:"Blind Melon",fact:"Despite being one of the most recognizable songs of 1993, 'No Rain' only peaked at #20 -- its cultural impact far exceeded its chart position."},
{q:"What connects Shannon Hoon and Axl Rose beyond music?",o:["They grew up in the same Indiana town (Lafayette)","They were cousins","They went to the same school","They were neighbors in LA"],a:0,d:2,cat:"Blind Melon",fact:"Both grew up in Lafayette, Indiana, and were childhood acquaintances, which led to Shannon's appearance on the Guns N' Roses album."},
{q:"Blind Melon was formed in which city?",o:["Los Angeles","Indianapolis","Seattle","Austin"],a:0,d:2,cat:"Blind Melon",fact:"The band formed in LA in 1990 when Shannon Hoon met guitarist Rogers Stevens and others who had relocated from the Midwest and South."},
{q:"The documentary about Shannon Hoon made entirely from his own footage is called what?",o:["All I Can Say","Letters from a Dog","No Rain: The Shannon Hoon Story","Bee Girl"],a:0,d:2,cat:"Blind Melon",fact:"'All I Can Say' (2019) uses only Shannon's own Hi8 camcorder footage, creating an incredibly personal and tragic document of his final years."},

// ──────────────────────────────────────
// RHCP (30)
// ──────────────────────────────────────
{q:"Flea's real name is what?",o:["Michael Balzary","Michael Flea","Peter Balzary","John Flea"],a:0,d:2,cat:"RHCP",fact:"Born Michael Peter Balzary in Melbourne, Australia, he got the nickname 'Flea' as a hyperactive teenager in LA."},
{q:"Which RHCP album was recorded in a mansion rumored to be haunted?",o:["Blood Sugar Sex Magik","Californication","By the Way","One Hot Minute"],a:0,d:1,cat:"RHCP",fact:"Producer Rick Rubin rented the Mansion on Laurel Canyon for the recording. John Frusciante claimed he saw ghosts and slept in the closet."},
{q:"How many times has John Frusciante left and rejoined RHCP?",o:["Twice","Once","Three times","He never left"],a:0,d:2,cat:"RHCP",fact:"Frusciante left in 1992 (addiction) and 2009 (creative differences), returning in 1998 and 2019. Each departure and return transformed the band's sound."},
{q:"Which guitarist replaced John Frusciante during his first departure?",o:["Dave Navarro","Hillel Slovak","Josh Klinghoffer","Arik Marshall"],a:0,d:2,cat:"RHCP",fact:"Dave Navarro (Jane's Addiction) brought a darker, heavier sound to One Hot Minute (1995). The album sold well but divided fans."},
{q:"RHCP's original guitarist who died of a heroin overdose in 1988 was?",o:["Hillel Slovak","Jack Sherman","Dave Navarro","John Frusciante"],a:0,d:2,cat:"RHCP",fact:"Hillel Slovak died on June 25, 1988 at age 26. His death devastated the band and prompted drummer Jack Irons to leave, leading to the Chad Smith era."},
{q:"'Under the Bridge' is about Anthony Kiedis's experience with what?",o:["Drug addiction and loneliness in LA","A failed relationship","Homelessness","His childhood"],a:0,d:1,cat:"RHCP",fact:"Kiedis wrote the lyrics as a poem about feeling disconnected from the city and his band while scoring drugs under a bridge in downtown LA."},
{q:"What is the title of Anthony Kiedis's autobiography?",o:["Scar Tissue","Flea Bites","Red Hot Memories","Under the Bridge"],a:0,d:1,cat:"RHCP",fact:"Scar Tissue (2004) is a raw, unflinching account of addiction, fame, and musical brotherhood. It was a New York Times bestseller."},
{q:"Which bass technique is Flea famous for pioneering in rock?",o:["Slap bass funk-rock style","Fingerpicking","Using a bow","Two-hand tapping"],a:0,d:1,cat:"RHCP",fact:"Flea's aggressive slap-bass technique, influenced by Bootsy Collins and Larry Graham, became RHCP's sonic signature and influenced thousands of bassists."},
{q:"Josh Klinghoffer replaced John Frusciante in which year?",o:["2009","2007","2011","2012"],a:0,d:2,cat:"RHCP",fact:"Klinghoffer played on 'I'm with You' (2011) and 'The Getaway' (2016) before Frusciante's triumphant return in 2019."},
{q:"Which RHCP album features 'Californication' and 'Scar Tissue'?",o:["Californication","Blood Sugar Sex Magik","By the Way","Stadium Arcadium"],a:0,d:1,cat:"RHCP",fact:"Californication (1999) marked Frusciante's return from near-death heroin addiction. The album's mellower, more melodic sound became their biggest seller."},
{q:"'Give It Away' was inspired by which philosophy?",o:["The selfless giving philosophy taught to Kiedis by Nina Hagen","Buddhism","Punk DIY ethics","Native American traditions"],a:0,d:3,cat:"RHCP",fact:"Singer Nina Hagen gave Kiedis a jacket saying 'if you have something, give it away.' The song became RHCP's first Grammy winner."},
{q:"What movie did Flea appear in alongside Michael J. Fox?",o:["Back to the Future Part II","The Big Lebowski","Fear and Loathing in Las Vegas","Baby Driver"],a:0,d:2,cat:"RHCP",fact:"Flea has acted in over 20 films, including The Big Lebowski (as a nihilist), Fear and Loathing, and Back to the Future sequels."},
{q:"RHCP's massive double album 'Stadium Arcadium' won the Grammy for which category?",o:["Best Rock Album","Album of the Year","Best Alternative Album","Record of the Year"],a:0,d:2,cat:"RHCP",fact:"Stadium Arcadium (2006) was a 28-track double album. It won Best Rock Album and features 'Dani California' and 'Snow (Hey Oh).'"},
{q:"Which producer helmed Californication and By the Way?",o:["Rick Rubin","Brendan O'Brien","George Drakoulias","Butch Vig"],a:0,d:2,cat:"RHCP",fact:"Rick Rubin produced RHCP from Blood Sugar Sex Magik onward, becoming a key collaborator in refining their raw funk-rock into stadium anthems."},
{q:"'By the Way' marked a shift toward what musical style?",o:["Melodic pop-rock with Frusciante's layered harmonies","Heavy metal","Funk-punk","Electronic dance music"],a:0,d:2,cat:"RHCP",fact:"By the Way (2002) surprised fans with its lush, Beatlesque harmonies and reduced funk elements. It's Frusciante's most guitar-layered album."},
{q:"What did John Frusciante look like when he appeared on a 1994 documentary during his addiction?",o:["Emaciated with scabbed arms and missing teeth","Completely bald","Covered in tattoos","Unchanged from his stage appearance"],a:0,d:2,cat:"RHCP",fact:"Frusciante's appearance in the Dutch documentary was shocking -- gaunt, scarred, and living in squalor. His recovery and return was one of rock's greatest comebacks."},
{q:"RHCP formed in which city?",o:["Los Angeles","San Francisco","New York","Detroit"],a:0,d:1,cat:"RHCP",fact:"The band formed at Fairfax High School in LA in 1983. Their early sound fused punk, funk, and hip-hop in a way nobody had heard before."},
{q:"'Dani California' shares a chord progression with which Tom Petty song?",o:["Mary Jane's Last Dance","Free Fallin'","American Girl","Runnin' Down a Dream"],a:0,d:3,cat:"RHCP",fact:"Tom Petty noticed the similarity but shrugged it off, saying 'these things happen' and declining to sue."},
{q:"What was the name of RHCP's 2022 album that marked Frusciante's second return?",o:["Unlimited Love","Return of the Dream Canteen","The Getaway","I'm with You"],a:0,d:1,cat:"RHCP",fact:"Unlimited Love (2022) debuted at #1 in 10 countries. RHCP released a second album, 'Return of the Dream Canteen,' just six months later."},
{q:"Anthony Kiedis was how old when he first tried heroin -- with his own father?",o:["14","16","18","12"],a:0,d:3,cat:"RHCP",fact:"Kiedis's father, actor Blackie Dammett, introduced him to drugs as a teenager. This shocking revelation is detailed in 'Scar Tissue.'"},

// ──────────────────────────────────────
// SMASHING PUMPKINS (25)
// ──────────────────────────────────────
{q:"Who is the frontman of Smashing Pumpkins?",o:["Billy Corgan","James Iha","D'arcy Wretzky","Jimmy Chamberlin"],a:0,d:1,cat:"Smashing Pumpkins",fact:"William Patrick Corgan's distinctive nasal voice and megalomaniacal ambition defined 90s alternative rock. He played most of the guitar and bass on their records."},
{q:"Which double album is considered Smashing Pumpkins' magnum opus?",o:["Mellon Collie and the Infinite Sadness","Siamese Dream","Adore","Machina"],a:0,d:1,cat:"Smashing Pumpkins",fact:"Mellon Collie (1995) was a 28-track, two-disc opus that debuted at #1 and sold 10 million copies worldwide. Each disc has its own subtitle: 'Dawn to Dusk' and 'Twilight to Starlight.'"},
{q:"'1979' is about what theme?",o:["Teenage nostalgia and the bittersweet end of youth","The year punk broke","Billy Corgan's birth","A car model"],a:0,d:1,cat:"Smashing Pumpkins",fact:"The dreamy, electronic-tinged track captured suburban teenage aimlessness. Its wistful video shows kids in a convenience store parking lot, doing nothing beautifully."},
{q:"During Siamese Dream's recording, Billy Corgan suffered from what?",o:["Severe depression and suicidal thoughts","A broken hand","Hearing loss","Laryngitis"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Corgan was suicidal, the band was fracturing, and he ended up playing nearly all the guitar and bass parts himself. The resulting album is paradoxically lush and beautiful."},
{q:"Which Smashing Pumpkins drummer was known for his jazz-influenced technique?",o:["Jimmy Chamberlin","Matt Walker","Kenny Aronoff","Mike Byrne"],a:0,d:1,cat:"Smashing Pumpkins",fact:"Chamberlin's complex, powerful drumming was essential to the Pumpkins' sound. His heroin addiction led to his firing in 1996 after touring keyboardist Jonathan Melvoin died of an overdose."},
{q:"What happened to touring keyboardist Jonathan Melvoin that led to Jimmy Chamberlin's firing?",o:["Melvoin died of a heroin overdose alongside Chamberlin","Melvoin quit the band","They had a fight on stage","Melvoin was arrested"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Melvoin and Chamberlin used heroin together in a hotel room in 1996. Melvoin died; Chamberlin survived but was fired from the band."},
{q:"Which Smashing Pumpkins album marked a dramatic shift to electronic and acoustic sounds?",o:["Adore","Machina","Zeitgeist","Oceania"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Adore (1998) dropped heavy guitars for drum machines, synths, and acoustic ballads. Recorded after Corgan's mother died and Chamberlin was fired, it's their most personal album."},
{q:"'Bullet with Butterfly Wings' features which iconic lyric?",o:["'Despite all my rage I am still just a rat in a cage'","'The world is a vampire'","'Emptiness is loneliness'","'Believe in me as I believe in you'"],a:0,d:1,cat:"Smashing Pumpkins",fact:"The scream of 'despite all my rage' became one of the defining moments of 90s rock. The song won a Grammy for Best Hard Rock Performance."},
{q:"D'arcy Wretzky's departure from the band was due to what?",o:["Bitter falling out with Billy Corgan","She retired from music","She joined another band","Health issues"],a:0,d:2,cat:"Smashing Pumpkins",fact:"D'arcy and Billy's relationship deteriorated badly. She hasn't been invited to any reunions, and the two have publicly feuded over text messages."},
{q:"Which producer worked on both Siamese Dream and Nevermind?",o:["Butch Vig","Steve Albini","Flood","Alan Moulder"],a:0,d:1,cat:"Smashing Pumpkins",fact:"Butch Vig produced two of the most important albums of the 90s within two years. His polish on Siamese Dream contrasted with Albini's rawness on In Utero."},
{q:"'Tonight, Tonight' features what unusual musical accompaniment?",o:["A full string orchestra","A choir","Electronic beats","A brass band"],a:0,d:2,cat:"Smashing Pumpkins",fact:"The orchestral arrangement was inspired by Cheap Trick's 'Dream Police.' The Mellon Collie-era Pumpkins were unafraid of epic, cinematic ambition."},
{q:"Billy Corgan famously declared that he wanted Smashing Pumpkins to be as big as which band?",o:["Led Zeppelin","The Beatles","Pink Floyd","U2"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Corgan's ambition was limitless. He told interviewers he wanted to be 'the greatest rock band of all time,' drawing mockery and respect in equal measure."},
{q:"What is the first track on Siamese Dream?",o:["Cherub Rock","Quiet","Today","Rocket"],a:0,d:2,cat:"Smashing Pumpkins",fact:"'Cherub Rock' opens with feedback and a snarling guitar riff -- a pointed critique of the indie rock gatekeepers who dismissed the Pumpkins as uncool."},
{q:"'Today' has what contrast between its cheerful music and its lyrics?",o:["The bright melody disguises lyrics about suicidal despair","It sounds sad but the lyrics are happy","The lyrics are about a wedding","There is no contrast"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Corgan wrote 'Today is the greatest day I've ever known' during his darkest period. The jangly, sunny riff makes the irony devastating."},
{q:"Mellon Collie's two discs are subtitled what?",o:["'Dawn to Dusk' and 'Twilight to Starlight'","'Light' and 'Dark'","'Day' and 'Night'","'Love' and 'Death'"],a:0,d:3,cat:"Smashing Pumpkins",fact:"The ambitious structure took the album from energetic rockers to ethereal ballads across its two-disc arc."},
{q:"The Smashing Pumpkins' first album was called what?",o:["Gish","Siamese Dream","Pisces Iscariot","Mellon Collie"],a:0,d:1,cat:"Smashing Pumpkins",fact:"Gish (1991) was named after silent film star Lillian Gish. It sold slowly at first but eventually went platinum, establishing the band's wall-of-guitar sound."},
{q:"Which Smashing Pumpkins song was used in the Batman & Robin soundtrack?",o:["The End Is the Beginning Is the End","Bullet with Butterfly Wings","1979","Ava Adore"],a:0,d:2,cat:"Smashing Pumpkins",fact:"The song won a Grammy despite the movie being widely panned. Its industrial-tinged sound was a preview of the direction on Adore."},
{q:"Billy Corgan opened what type of business in the 2010s?",o:["A tea shop (Madame ZuZu's)","A record store","A guitar shop","A restaurant"],a:0,d:3,cat:"Smashing Pumpkins",fact:"Madame ZuZu's in Highland Park, Illinois serves tea and hosts acoustic performances. Corgan has also become involved in professional wrestling."},
{q:"How many copies has Mellon Collie and the Infinite Sadness sold worldwide?",o:["Over 10 million","Over 5 million","Over 20 million","Over 3 million"],a:0,d:2,cat:"Smashing Pumpkins",fact:"It's one of the best-selling double albums in history, alongside The Wall and the White Album."},

// ──────────────────────────────────────
// 60s-70s ROOTS (20)
// ──────────────────────────────────────
{q:"The Velvet Underground was managed and produced by which visual artist?",o:["Andy Warhol","Jean-Michel Basquiat","Roy Lichtenstein","David Hockney"],a:0,d:1,cat:"60s-70s Roots",fact:"Warhol designed the iconic banana cover and added Nico as a singer, though the band resented her presence."},
{q:"David Bowie's alter ego Ziggy Stardust was what kind of character?",o:["An androgynous alien rock star","A detective","A time traveler","A dystopian dictator"],a:0,d:1,cat:"60s-70s Roots",fact:"'The Rise and Fall of Ziggy Stardust and the Spiders from Mars' (1972) told the story of an alien messiah who is destroyed by fame -- a prescient self-prophecy."},
{q:"Joy Division's Ian Curtis suffered from which condition that influenced his stage presence?",o:["Epilepsy","Blindness","Tourette syndrome","Paralysis"],a:0,d:2,cat:"60s-70s Roots",fact:"Curtis's epileptic seizures looked eerily like dancing on stage, creating a haunting visual that audiences initially thought was performance art."},
{q:"After Ian Curtis's death, Joy Division became which band?",o:["New Order","The Cure","Depeche Mode","Bauhaus"],a:0,d:1,cat:"60s-70s Roots",fact:"The remaining members added Gillian Gilbert and became New Order, pioneering the fusion of post-punk guitars with electronic dance music."},
{q:"The Ramones were from which New York borough?",o:["Queens","Manhattan","Brooklyn","The Bronx"],a:0,d:2,cat:"60s-70s Roots",fact:"Forest Hills, Queens. All four adopted the surname 'Ramone' though none were related. Johnny and Joey famously hated each other for decades."},
{q:"Iggy Pop's legendary stage antics included what?",o:["Cutting himself with broken glass and stage-diving into audiences","Setting his guitar on fire","Vomiting on the audience","Playing drums naked"],a:0,d:1,cat:"60s-70s Roots",fact:"Iggy invented the stage dive, rolled in broken glass, smeared peanut butter on himself, and once walked across the audience's hands. He essentially invented punk performance."},
{q:"Television's 'Marquee Moon' is considered the pinnacle of which genre?",o:["Art-punk / proto-post-punk","Garage rock","Psychedelic rock","New wave"],a:0,d:2,cat:"60s-70s Roots",fact:"The 1977 album's intricate, interlocking guitar lines between Tom Verlaine and Richard Lloyd created a template that influenced everyone from R.E.M. to Radiohead."},
{q:"Brian Eno produced which Bowie trilogy of albums?",o:["Low, 'Heroes', Lodger (the Berlin Trilogy)","Ziggy Stardust, Aladdin Sane, Diamond Dogs","Station to Station, Young Americans, Let's Dance","Scary Monsters, Tonight, Never Let Me Down"],a:0,d:2,cat:"60s-70s Roots",fact:"The Berlin Trilogy (1977-1979) found Bowie reinventing himself through ambient textures, Krautrock, and electronic experimentation in Cold War Berlin."},
{q:"Kraftwerk's influence can be heard most directly in which genres?",o:["Electronic music, synth-pop, and hip-hop","Jazz fusion","Country","Prog rock"],a:0,d:1,cat:"60s-70s Roots",fact:"Kraftwerk's robotic electronic music directly inspired synth-pop, Detroit techno, and hip-hop. Afrika Bambaataa's 'Planet Rock' sampled them, changing music forever."},
{q:"Which Velvet Underground album features a black-on-black cover?",o:["White Light/White Heat","The Velvet Underground","Loaded","The Velvet Underground & Nico"],a:0,d:3,cat:"60s-70s Roots",fact:"White Light/White Heat (1968) was intentionally harsh and confrontational. The near-invisible cover matched its uncompromising noise."},
{q:"Wire's album 'Pink Flag' (1977) is notable for what structural innovation?",o:["21 songs in under 36 minutes, some lasting under a minute","Using only synthesizers","Having no vocals","Being recorded backwards"],a:0,d:3,cat:"60s-70s Roots",fact:"Wire stripped punk to its absolute minimum, then added art-school ideas. 'Pink Flag' influenced everyone from Minor Threat to Elastica."},
{q:"Lou Reed's 'Transformer' was produced by which glam rock icon?",o:["David Bowie","Marc Bolan","Bryan Ferry","Peter Gabriel"],a:0,d:2,cat:"60s-70s Roots",fact:"Bowie and Mick Ronson produced 'Transformer' (1972), which contained 'Walk on the Wild Side' -- a song about Warhol's Factory characters that somehow became a radio hit."},
{q:"How many copies did the Velvet Underground's first album sell initially?",o:["Poorly -- around 30,000 in its first five years","2 million","500,000","It was never commercially released"],a:0,d:2,cat:"60s-70s Roots",fact:"Brian Eno allegedly said: 'The first Velvet Underground album only sold 30,000 copies, but everyone who bought one started a band.'"},
{q:"Which Joy Division song became a massive hit only after Ian Curtis's death?",o:["Love Will Tear Us Apart","Atmosphere","She's Lost Control","Disorder"],a:0,d:1,cat:"60s-70s Roots",fact:"'Love Will Tear Us Apart' was released as a single in June 1980, one month after Curtis's suicide. Its title is engraved on his headstone."},

// ──────────────────────────────────────
// 80s POST-PUNK & INDIE (20)
// ──────────────────────────────────────
{q:"The Cure's Robert Smith is known for what signature look?",o:["Messy black hair, smeared red lipstick, and black clothes","A mohawk and leather jacket","Bald head and sunglasses","Long blonde hair"],a:0,d:1,cat:"80s",fact:"Smith's goth look -- inspired by Siouxsie Sioux -- became one of the most imitated images in alternative music history."},
{q:"Pixies are credited with pioneering what dynamic approach to songwriting?",o:["Quiet-loud-quiet dynamics","12-bar blues","Wall of sound","Polyrhythmic percussion"],a:0,d:1,cat:"80s",fact:"Black Francis screamed through choruses and whispered through verses. Kurt Cobain freely admitted 'Smells Like Teen Spirit' was his attempt to write a Pixies song."},
{q:"R.E.M. comes from which city?",o:["Athens, Georgia","Atlanta, Georgia","Austin, Texas","Chapel Hill, North Carolina"],a:0,d:2,cat:"80s",fact:"Athens had a thriving college rock scene. R.E.M., alongside the B-52s, put it on the map as an indie music mecca."},
{q:"Sonic Youth were known for using what unusual guitar technique?",o:["Alternate tunings, prepared guitars, and jamming objects between strings","Only playing bass guitars","Playing guitars with violin bows exclusively","Never using amplifiers"],a:0,d:2,cat:"80s",fact:"Thurston Moore and Lee Ranaldo used screwdrivers, drumsticks, and other objects on their guitar strings, creating textures no one had heard before."},
{q:"Talking Heads' David Byrne wore what in the 'Stop Making Sense' concert film?",o:["An enormous oversized suit","A chicken costume","A wedding dress","Full body paint"],a:0,d:1,cat:"80s",fact:"The 'Big Suit' grew larger as the show progressed. Byrne said he wanted his body to look like a building. The film is widely considered the greatest concert movie ever made."},
{q:"Sonic Youth's Thurston Moore and Kim Gordon were married for how many years before divorcing?",o:["27 years (1984-2011)","15 years","10 years","35 years"],a:0,d:3,cat:"80s",fact:"Their 2011 divorce shocked the indie world. It effectively ended Sonic Youth after 30 years, as working together became impossible."},
{q:"Cocteau Twins were known for what vocal style from Elizabeth Fraser?",o:["Ethereal, largely unintelligible singing in invented languages","Rap-singing","Operatic arias","Spoken word"],a:0,d:2,cat:"80s",fact:"Fraser often sang in glossolalia -- made-up words that sounded like an alien language. Her voice was once described as 'the voice of God.'"},
{q:"The Replacements were infamous for what behavior during live shows?",o:["Getting so drunk they could barely play, sometimes deliberately playing covers instead of their own songs","Smashing all their equipment","Playing sets in complete darkness","Walking offstage after one song"],a:0,d:2,cat:"80s",fact:"Paul Westerberg's band were legendarily self-destructive. Their drunken live shows became the stuff of punk lore -- brilliant and shambolic in equal measure."},
{q:"Husker Du's 'Zen Arcade' (1984) was groundbreaking because it was what?",o:["A double album concept record from a hardcore punk band","The first indie album to chart","A live album recorded in one take","An album with no guitars"],a:0,d:3,cat:"80s",fact:"A hardcore punk band making an ambitious, sprawling concept album about dreams and reality was unheard of in 1984. It opened doors for punk bands to be ambitious."},
{q:"Echo & the Bunnymen's frontman Ian McCulloch was known for what personality trait?",o:["Extreme arrogance and self-proclaimed genius","Extreme shyness","Constant optimism","Refusing to speak to the press"],a:0,d:2,cat:"80s",fact:"McCulloch once said 'we are the greatest band in the world' without irony. His swagger was part of the band's appeal, along with Will Sergeant's shimmering guitar."},
{q:"Depeche Mode transitioned from synth-pop to what darker sound?",o:["Industrial-tinged electronic rock","Acoustic folk","Jazz fusion","Heavy metal"],a:0,d:2,cat:"80s",fact:"Albums like 'Violator' (1990) and 'Songs of Faith and Devotion' (1993) embraced darker themes and heavier textures, making them stadium-filling icons."},
{q:"R.E.M.'s 'Murmur' (1983) was notable for what vocal approach by Michael Stipe?",o:["Deliberately mumbled, unclear lyrics that prioritized sound over meaning","Screaming throughout","Singing in Italian","Using a vocoder"],a:0,d:2,cat:"80s",fact:"Stipe buried his vocals so deep in the mix that fans debated lyrics for years. He later admitted he was too shy to let people hear what he was actually saying."},
{q:"Which 4AD label band released the influential album 'Treasure' in 1984?",o:["Cocteau Twins","This Mortal Coil","Dead Can Dance","Pixies"],a:0,d:2,cat:"80s",fact:"Cocteau Twins' 'Treasure' helped define the 4AD aesthetic -- ethereal, dreamy, and otherworldly. It influenced shoegaze, dream pop, and ambient music."},
{q:"The Cure's 'Disintegration' (1989) was released despite what warning from their label?",o:["The label said it was commercial suicide","The label refused to release it","Robert Smith was told to shorten it","The band was dropped"],a:0,d:2,cat:"80s",fact:"Fiction Records thought the album was too long and too dark to sell. It became The Cure's best-selling album and is considered their masterpiece."},

// ──────────────────────────────────────
// 90s BEYOND THE BIG 6 (20)
// ──────────────────────────────────────
{q:"Pearl Jam famously boycotted which company in 1994?",o:["Ticketmaster","MTV","Rolling Stone magazine","Walmart"],a:0,d:1,cat:"90s Alt",fact:"Pearl Jam filed a complaint with the Department of Justice over Ticketmaster's monopoly on concert venues. They spent years touring only non-Ticketmaster venues."},
{q:"Soundgarden's Chris Cornell also fronted which supergroup with Rage Against the Machine members?",o:["Audioslave","Temple of the Dog","Mad Season","Velvet Revolver"],a:0,d:1,cat:"90s Alt",fact:"Audioslave combined Cornell's soaring vocals with Tom Morello's guitar wizardry. Their self-titled debut sold 3 million copies."},
{q:"Alice in Chains singer Layne Staley tragically died from what?",o:["A drug overdose in 2002, found two weeks later","A car accident","Suicide","Cancer"],a:0,d:2,cat:"90s Alt",fact:"Staley's body wasn't discovered for about two weeks. He weighed only 86 pounds. His haunting vocals on 'Jar of Flies' remain among the most emotionally raw in rock."},
{q:"Weezer's Blue Album was produced by which Cars frontman?",o:["Ric Ocasek","Benjamin Orr","Greg Hawkes","Elliot Easton"],a:0,d:2,cat:"90s Alt",fact:"Ric Ocasek's clean, punchy production gave 'Buddy Holly' and 'Say It Ain't So' their timeless pop-rock sheen."},
{q:"Beck's 'Loser' was from which album?",o:["Mellow Gold","Odelay","Mutations","Sea Change"],a:0,d:2,cat:"90s Alt",fact:"'Loser' started as a joke folk-rap experiment recorded in a kitchen. Its chorus 'I'm a loser baby, so why don't you kill me' accidentally defined slacker culture."},
{q:"Elliott Smith was nominated for an Oscar for which song?",o:["Miss Misery","Between the Bars","Waltz #2","Angeles"],a:0,d:2,cat:"90s Alt",fact:"'Miss Misery' from the Good Will Hunting soundtrack was nominated but lost to Celine Dion. Smith performed live at the ceremony, looking deeply uncomfortable in a white suit."},
{q:"Jeff Buckley's only completed studio album was called what?",o:["Grace","Sketches for My Sweetheart the Drunk","Mystery White Boy","Live at Sin-e"],a:0,d:1,cat:"90s Alt",fact:"'Grace' (1994) sold poorly on release but became one of the most influential albums ever made. Buckley drowned in the Wolf River in 1997 at age 30."},
{q:"Neutral Milk Hotel's 'In the Aeroplane Over the Sea' is partly inspired by whose diary?",o:["Anne Frank","Sylvia Plath","Virginia Woolf","Emily Dickinson"],a:0,d:2,cat:"90s Alt",fact:"Jeff Mangum became obsessed with Anne Frank's story, and the album weaves her life into surreal, emotionally overwhelming folk-psych. It's now considered a masterpiece."},
{q:"Guided by Voices' Robert Pollard was working what day job while making lo-fi classics?",o:["Elementary school teacher","Postal worker","Bartender","Accountant"],a:0,d:2,cat:"90s Alt",fact:"Pollard taught fourth grade in Dayton, Ohio while recording albums on 4-track in his basement. He has released over 100 albums across all projects."},
{q:"Pavement's 'Slanted and Enchanted' is considered a landmark of which genre?",o:["Lo-fi indie rock","Grunge","Shoegaze","Post-rock"],a:0,d:1,cat:"90s Alt",fact:"Recorded cheaply and intentionally rough, it became the blueprint for a generation of indie bands who valued charm and songwriting over polish."},
{q:"Which 90s band's frontman was found dead in his bathtub in 2002?",o:["Alice in Chains (Layne Staley)","Stone Temple Pilots","Blind Melon","Mad Season"],a:0,d:2,cat:"90s Alt",fact:"Layne Staley had been a recluse for years before his death. His last public appearance was at the 2002 tribute concert for his bandmate's side project."},
{q:"Pavement's Stephen Malkmus was known for what performance style?",o:["Laconic irony and deliberately sloppy guitar playing","Intense stage diving","Classical guitar technique","Complete silence between songs"],a:0,d:2,cat:"90s Alt",fact:"Malkmus embodied 90s indie rock's aesthetic of appearing not to care, though his songwriting was deceptively sophisticated."},
{q:"Pearl Jam's 'Jeremy' was based on what real event?",o:["A student who shot himself in front of his classmates","A fictional story","Eddie Vedder's childhood","A news article about bullying"],a:0,d:2,cat:"90s Alt",fact:"Jeremy Delle shot himself in front of his English class in Richardson, Texas in 1991. The song and its disturbing video brought the issue of teen despair to mainstream attention."},

// ──────────────────────────────────────
// 2000s TO NOW (20)
// ──────────────────────────────────────
{q:"The Strokes' debut album that revived garage rock was called?",o:["Is This It","Room on Fire","First Impressions of Earth","Angles"],a:0,d:1,cat:"2000s-Now",fact:"Is This It (2001) was hailed as 'the album that saved rock and roll.' Recorded in a Manhattan basement, its effortless cool influenced an entire decade of bands."},
{q:"Jack and Meg White of The White Stripes were actually what to each other?",o:["Ex-husband and ex-wife who claimed to be siblings","Actual siblings","Cousins","Strangers who met at a gig"],a:0,d:2,cat:"2000s-Now",fact:"Jack and Meg were married from 1996-2000 but told everyone they were brother and sister for mystique. The lie was eventually exposed by a Detroit newspaper."},
{q:"Arctic Monkeys became famous through which platform before their debut?",o:["MySpace","YouTube","Facebook","Napster"],a:0,d:1,cat:"2000s-Now",fact:"Fans shared demos on MySpace so aggressively that 'Whatever People Say I Am, That's What I'm Not' became the fastest-selling debut in UK chart history."},
{q:"Arcade Fire's 'Funeral' was named because?",o:["Several band members' relatives died during recording","It sounded funeral-like","The studio was near a cemetery","It was a concept album about death"],a:0,d:2,cat:"2000s-Now",fact:"Multiple family members of Win Butler and Regine Chassagne died during the album's creation, giving it profound emotional weight that you can hear in every note."},
{q:"Tame Impala is essentially a solo project by whom?",o:["Kevin Parker","Jay Watson","Dominic Simper","Cam Avery"],a:0,d:1,cat:"2000s-Now",fact:"Kevin Parker writes, records, produces, mixes, and performs nearly everything on Tame Impala albums in his home studio in Perth, Australia."},
{q:"Phoebe Bridgers is known for performing in what outfit?",o:["A skeleton suit","A wedding dress","All black","A space suit"],a:0,d:1,cat:"2000s-Now",fact:"Her signature skeleton onesie became iconic. She smashed a guitar on SNL in one and was criticized for it, to which she replied with bemused indifference."},
{q:"LCD Soundsystem's James Murphy famously announced his retirement with what event?",o:["A massive farewell show at Madison Square Garden in 2011","A farewell album","A letter to fans","A final festival appearance"],a:0,d:2,cat:"2000s-Now",fact:"The 2011 MSG show was filmed as 'Shut Up and Play the Hits.' Murphy then un-retired in 2015 because, as he put it, he missed it too much."},
{q:"Interpol's debut 'Turn on the Bright Lights' drew heavy comparisons to which band?",o:["Joy Division","The Smiths","Radiohead","The Strokes"],a:0,d:2,cat:"2000s-Now",fact:"Paul Banks' baritone vocals and the band's atmospheric post-punk drew inevitable Joy Division comparisons, though Interpol carved their own moody territory."},
{q:"Fontaines D.C. are from which city?",o:["Dublin","London","Manchester","Belfast"],a:0,d:2,cat:"2000s-Now",fact:"The Irish post-punk band met at music college in Dublin. Their debut 'Dogrel' (2019) was a raw, poetic document of working-class Dublin life."},
{q:"Black Midi are known for what approach to music?",o:["Chaotic, genre-defying compositions that shift between prog, noise, jazz, and punk","Simple acoustic folk","Minimalist electronic beats","Standard indie pop"],a:0,d:2,cat:"2000s-Now",fact:"Black Midi's live shows are legendary for their intensity. They improvise heavily and sometimes play songs so differently from the recorded versions that fans can't recognize them."},
{q:"Turnstile broke through by blending hardcore punk with what?",o:["Pop melodies, shoegaze textures, and dance rhythms","Country music","Classical orchestration","Hip-hop"],a:0,d:2,cat:"2000s-Now",fact:"'Glow On' (2021) was a hardcore album that appeared on year-end lists next to pop and R&B records -- a rare crossover moment for the genre."},
{q:"The White Stripes' color scheme was restricted to which three colors?",o:["Red, white, and black","Blue and white","All colors","Green and white"],a:0,d:1,cat:"2000s-Now",fact:"Every album cover, outfit, music video, and piece of merchandise was strictly limited to red, white, and black. Jack White is obsessed with aesthetic rules and limitations."},
{q:"Arctic Monkeys' Alex Turner dramatically reinvented his image for which album?",o:["Tranquility Base Hotel & Casino","AM","Favourite Worst Nightmare","Suck It and See"],a:0,d:2,cat:"2000s-Now",fact:"For 'Tranquility Base Hotel & Casino' (2018), Turner traded leather jackets for a lounge-lizard aesthetic and the band traded guitars for keyboards, alienating and thrilling fans simultaneously."},
{q:"Arcade Fire controversially won Album of the Year at the Grammys for which album?",o:["The Suburbs","Funeral","Neon Bible","Reflektor"],a:0,d:2,cat:"2000s-Now",fact:"When 'The Suburbs' won in 2011, the Twitterverse erupted with 'Who is Arcade Fire?' -- revealing the gap between mainstream and indie audiences."},
{q:"Which band features the lyric 'I bet that you look good on the dancefloor'?",o:["Arctic Monkeys","The Strokes","Franz Ferdinand","Bloc Party"],a:0,d:1,cat:"2000s-Now",fact:"Arctic Monkeys' debut single went straight to #1 in the UK in 2005, making them the first band to achieve that feat primarily through internet hype."},

// ──────────────────────────────────────
// GENERAL / LABELS / GEAR / CULTURE (20+)
// ──────────────────────────────────────
{q:"Sub Pop Records, which launched grunge, is based where?",o:["Seattle","Portland","New York","Los Angeles"],a:0,d:1,cat:"General",fact:"Founded in 1986, Sub Pop signed Nirvana, Soundgarden, and Mudhoney. They're still independent and based in Seattle."},
{q:"Lollapalooza was founded by which artist?",o:["Perry Farrell of Jane's Addiction","Billy Corgan","Kurt Cobain","Eddie Vedder"],a:0,d:1,cat:"General",fact:"Perry Farrell created Lollapalooza in 1991 as a farewell tour for Jane's Addiction. It became the defining alternative rock festival of the 90s."},
{q:"Which independent label released albums by Pavement, Guided by Voices, and Yo La Tengo?",o:["Matador Records","Sub Pop","4AD","Merge"],a:0,d:2,cat:"General",fact:"Matador Records, founded in 1989 by Chris Lombardi, became the definitive American indie label of the 90s."},
{q:"What does 'indie' originally refer to?",o:["Music released on independent labels, not major labels","A genre of jangly guitar music","Indian music","Individual solo artists"],a:0,d:1,cat:"General",fact:"'Indie' originally meant independent from major label control. It evolved into a genre descriptor, which annoys purists to this day."},
{q:"4AD Records is known for releasing which ethereal/dream pop artists?",o:["Cocteau Twins, Dead Can Dance, Pixies, and This Mortal Coil","Nirvana and Pearl Jam","The Smiths and Joy Division","Radiohead and Blur"],a:0,d:2,cat:"General",fact:"4AD's distinctive aesthetic -- Vaughan Oliver's artwork, ethereal soundscapes -- made it one of the most visually and sonically cohesive labels ever."},
{q:"Creation Records founder Alan McGee discovered Oasis by doing what?",o:["Seeing them play a gig at King Tut's in Glasgow","Reading about them in NME","Receiving a demo tape","Meeting Noel Gallagher at a party"],a:0,d:2,cat:"General",fact:"McGee caught Oasis at King Tut's Wah Wah Hut in 1993 and signed them on the spot. Creation also released My Bloody Valentine and Primal Scream."},
{q:"Merge Records, home of Arcade Fire and Neutral Milk Hotel, was founded by members of which band?",o:["Superchunk","Archers of Loaf","Polvo","Guided by Voices"],a:0,d:3,cat:"General",fact:"Mac McCaughan and Laura Ballance of Superchunk founded Merge in 1989 in Chapel Hill, NC. It remains one of the most respected indie labels."},
{q:"The Fender Jazzmaster guitar is closely associated with which genre?",o:["Indie/alternative rock and shoegaze","Jazz","Country","Heavy metal"],a:0,d:1,cat:"General",fact:"Originally designed for jazz players, the Jazzmaster was adopted by shoegaze and indie bands for its warm, resonant tone. It's the indie guitar of choice."},
{q:"What is the 'loudness war' in music production?",o:["The trend of mastering music louder and louder, reducing dynamic range","A feud between bands about volume","A competition at music festivals","A debate about guitar amp wattage"],a:0,d:2,cat:"General",fact:"Starting in the 90s, labels demanded louder masters for radio play. Metallica's 'Death Magnetic' and Oasis's 'Be Here Now' are notorious examples of crushed dynamics."},
{q:"Which festival, held annually in England, is the world's largest greenfield music festival?",o:["Glastonbury","Reading","Download","Isle of Wight"],a:0,d:1,cat:"General",fact:"Glastonbury Festival has been running since 1970 on Michael Eavis's farm in Somerset, drawing over 200,000 people. It sells out in minutes."},
{q:"Steve Albini was famous for calling himself what instead of 'producer'?",o:["Recording engineer","Sound architect","Audio technician","Mixer"],a:0,d:2,cat:"General",fact:"Albini insisted on 'recording engineer' to distinguish his approach -- capturing a band's sound honestly rather than imposing his own vision. He charged flat fees and refused royalties."},
{q:"What connects Joy Division, The Smiths, Oasis, The Stone Roses, and The Fall?",o:["They're all from Manchester","They all had the same producer","They were all on the same label","They all broke up in the same year"],a:0,d:1,cat:"General",fact:"Manchester has produced an outsized number of influential bands. The city's post-industrial landscape, working-class energy, and music venues created a unique breeding ground."},
{q:"My Bloody Valentine's 'Loveless' (1991) is considered the definitive album of which genre?",o:["Shoegaze","Britpop","Post-rock","Dream pop"],a:0,d:1,cat:"General",fact:"Kevin Shields spent two years and nearly bankrupted Creation Records making 'Loveless.' Its swirling, otherworldly guitar textures have never been replicated."},
{q:"Which festival was the site of the infamous Oasis vs. Blur chart battle in 1995?",o:["It wasn't a festival -- it was a chart battle for #1 between singles","Glastonbury","Reading","V Festival"],a:0,d:2,cat:"General",fact:"Blur's 'Country House' narrowly beat Oasis's 'Roll With It' to #1. The press dubbed it 'The Battle of Britpop,' but Oasis's album outsold Blur's tenfold."},
{q:"What is a 'Fuzz pedal' primarily used for?",o:["Distorting guitar signal to create a heavy, buzzy tone","Adding reverb","Creating echo effects","Tuning instruments"],a:0,d:1,cat:"General",fact:"Fuzz pedals like the Big Muff became essential for grunge, shoegaze, and psychedelic rock. Billy Corgan's Siamese Dream tone is basically a Big Muff cranked to eleven."},
{q:"Pitchfork's infamous 0.0 review of which album became legendary?",o:["Travistan by Travis Morrison","St. Anger by Metallica","Lulu by Lou Reed","Chinese Democracy by GN'R"],a:0,d:3,cat:"General",fact:"The 2004 review of the former Dismemberment Plan frontman's solo debut was so brutal it became a cultural moment, demonstrating Pitchfork's power to make or break indie careers."},
{q:"'Lo-fi' recording means what?",o:["Deliberately using low-fidelity recording equipment for aesthetic effect","Recording in a large studio","Using only live instruments","Recording underwater"],a:0,d:1,cat:"General",fact:"Bands like Guided by Voices, Pavement, and early Mountain Goats embraced hiss, distortion, and boombox recordings as a deliberate aesthetic choice, not just a budget constraint."},
{q:"Who said 'The first Velvet Underground album only sold a few thousand copies, but everyone who bought one started a band'?",o:["Brian Eno","David Bowie","Andy Warhol","Lou Reed"],a:0,d:2,cat:"General",fact:"This quote (often attributed to Eno) perfectly captures the VU's influence: commercially negligible but culturally seismic."},
{q:"What do The Smiths and Radiohead have in common regarding their formation?",o:["All members met at school before forming the band","Both formed from supergroups","Both were solo projects first","Both formed through classified ads"],a:0,d:1,cat:"General",fact:"Both bands grew organically from school friendships rather than industry machinations -- a pattern common to many of the most authentic indie bands."},
{q:"Which iconic venue in New York was crucial to the development of punk and new wave?",o:["CBGB","The Bitter End","Madison Square Garden","Radio City Music Hall"],a:0,d:1,cat:"General",fact:"CBGB on the Bowery hosted the Ramones, Television, Talking Heads, Blondie, and Patti Smith. It closed in 2006 and is now a fashion boutique, which is peak irony."},
