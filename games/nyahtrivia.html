// ADDITIONAL QUESTIONS (55+ to reach 260+)
// ──────────────────────────────────────

// MORE SMITHS
{q:"Which cinema icon appears on the cover of The Smiths' 'Shoplifters of the World Unite' single?",o:["Elvis Presley","Alain Delon","James Dean","Marlon Brando"],a:0,d:3,cat:"The Smiths",fact:"Morrissey's sleeve art obsession extended to every single. He sourced obscure film stills and publicity shots of his cultural heroes."},
{q:"Johnny Marr's jangly guitar tone was partly achieved by using what type of guitar?",o:["A Rickenbacker 330","A Fender Stratocaster","A Gibson Les Paul","A Gretsch White Falcon"],a:0,d:2,cat:"The Smiths",fact:"Marr's Rickenbacker, combined with chorus effects, created the chiming, crystalline sound that defined indie guitar for a generation."},
{q:"Complete this lyric from 'Bigmouth Strikes Again': 'Now I know how Joan of Arc felt as the flames rose to her ___'",o:["Roman nose","pale face","tired eyes","weary soul"],a:0,d:3,cat:"The Smiths",fact:"Morrissey compared himself to Joan of Arc -- typically grandiose. The song is one of their most energetic, driven by Marr's riff in open G tuning."},
{q:"'The Boy with the Thorn in His Side' is about The Smiths' struggle with what?",o:["The music press refusing to take them seriously","A failed romance","Morrissey's health","Their record label"],a:0,d:2,cat:"The Smiths",fact:"Morrissey said 'the thorn' was the music industry itself, which refused to believe in the band despite their growing fanbase."},
{q:"Which Smiths song references the Moors Murderer Myra Hindley?",o:["Suffer Little Children","The Hand That Rocks the Cradle","Shakespeare's Sister","Nowhere Fast"],a:0,d:2,cat:"The Smiths",fact:"The song names the victims of the Moors Murders. It was written as a lament, not exploitation, though it caused enormous controversy."},
{q:"Morrissey wrote a book about which New York punk band before forming The Smiths?",o:["New York Dolls","Ramones","Television","Blondie"],a:0,d:2,cat:"The Smiths",fact:"Morrissey self-published a fanzine-style book about the New York Dolls in 1981, a year before meeting Johnny Marr. His fandom was encyclopedic."},
{q:"What Smiths compilation was their best-selling release in the US?",o:["Louder Than Bombs","Hatful of Hollow","The World Won't Listen","Best... I"],a:0,d:3,cat:"The Smiths",fact:"Louder Than Bombs (1987) compiled singles and B-sides for the American market and outsold their studio albums in the US."},
{q:"Which actor's face appears on the cover of 'The Queen Is Dead'?",o:["Alain Delon","Marlon Brando","Jean-Paul Belmondo","Helmut Berger"],a:0,d:3,cat:"The Smiths",fact:"The cover features Alain Delon from the 1964 film 'L'Insoumis.' Morrissey was fascinated by beautiful, doomed European cinema."},
{q:"'Last Night I Dreamt That Somebody Loved Me' opens with which unusual sound?",o:["A recording of an angry crowd/riot","Thunder","A child crying","Church bells"],a:0,d:2,cat:"The Smiths",fact:"The song opens with crowd noise from the 1984 miners' strike before transitioning into one of the most heartbreaking piano intros in pop music."},
{q:"The Smiths refused to appear on which iconic UK music show?",o:["Top of the Pops -- initially, before relenting","Question Time","Jools Holland","The Old Grey Whistle Test"],a:0,d:3,cat:"The Smiths",fact:"Morrissey initially refused TOTP appearances, finding them crass, but eventually the band performed several times, always memorably."},

// MORE RADIOHEAD
{q:"Which Radiohead song has been covered at nearly every karaoke bar in history?",o:["Creep","Karma Police","High and Dry","Fake Plastic Trees"],a:0,d:1,cat:"Radiohead",fact:"Ironically, the song Radiohead most despise is the one most people sing when they're drunk at karaoke."},
{q:"'Fitter Happier' from OK Computer features what kind of narration?",o:["A Macintosh text-to-speech computer voice","Thom Yorke whispering","A child reading","A news anchor"],a:0,d:2,cat:"Radiohead",fact:"The eerie robotic voice reads a list of self-improvement mantras that sound increasingly dystopian. It's the most unsettling two minutes on any 90s album."},
{q:"What does the bear logo that Radiohead uses represent?",o:["A modified version of the 'blinking bear' from the Kid A artwork","Their childhood mascot","The Oxford coat of arms","A logo from their first single"],a:0,d:2,cat:"Radiohead",fact:"The bear (sometimes called the 'modified bear') was designed by artist Stanley Donwood, who has created all of Radiohead's artwork since The Bends."},
{q:"Which Radiohead album was the first to be self-released, bypassing their record label?",o:["In Rainbows","The King of Limbs","A Moon Shaped Pool","Hail to the Thief"],a:0,d:2,cat:"Radiohead",fact:"In Rainbows was released independently after Radiohead's EMI contract expired. It proved artists could thrive outside the major label system."},
{q:"'Street Spirit (Fade Out)' was described by Thom Yorke as what?",o:["'One of the darkest songs I've ever written' with 'no resolve'","A love song","Their best single","A song about politics"],a:0,d:3,cat:"Radiohead",fact:"Yorke said 'it's hopeless' and admitted the song depressed him so much he hated playing it live, despite it being a fan favorite."},
{q:"Radiohead's 'Lucky' was originally recorded for what charitable cause?",o:["The War Child charity album 'Help'","Live Aid","A Greenpeace benefit","An Amnesty International compilation"],a:0,d:3,cat:"Radiohead",fact:"'Lucky' was recorded in a single day for the 1995 War Child benefit album. The band liked it so much they re-recorded it for OK Computer."},
{q:"What is the meaning behind the album title 'The Bends'?",o:["The decompression sickness felt by deep-sea divers -- a metaphor for the disorientation of fame","A curve in a road","A yoga position","A dance move"],a:0,d:2,cat:"Radiohead",fact:"After the unexpected success of 'Creep,' the band felt the disorienting 'bends' of sudden fame -- hence the album's title and themes of alienation."},
{q:"Colin Greenwood plays which instrument in Radiohead?",o:["Bass","Guitar","Keyboards","Drums"],a:0,d:1,cat:"Radiohead",fact:"Colin Greenwood is Jonny's older brother. His bass playing became increasingly creative from Kid A onward, anchoring their experimental arrangements."},
{q:"'How to Disappear Completely' was partly inspired by advice from whom?",o:["Michael Stipe of R.E.M.","Thom Yorke's therapist","Brian Eno","David Bowie"],a:0,d:3,cat:"Radiohead",fact:"During a panic attack on tour, Yorke called Michael Stipe, who told him to repeat 'I'm not here, this isn't happening' -- the song's key lyric."},
{q:"Which Radiohead album takes its title from a line scrawled on a wall?",o:["Hail to the Thief","Kid A","Amnesiac","The King of Limbs"],a:0,d:3,cat:"Radiohead",fact:"The full title is 'Hail to the Thief. (The Gloaming.)' -- political graffiti that referenced the contested 2000 US presidential election."},

// MORE NIRVANA
{q:"What guitar did Kurt Cobain famously play and destroy?",o:["Fender Mustang and Fender Jaguar","Gibson Les Paul","Fender Stratocaster","PRS Custom"],a:0,d:1,cat:"Nirvana",fact:"Cobain preferred cheap, left-handed Fenders because they sounded raw and he didn't feel bad about smashing them. A smashed Fender Mustang sold for $500,000 at auction."},
{q:"'Come as You Are' features a guitar riff similar to which Killing Joke song?",o:["Eighties","Love Like Blood","Requiem","The Wait"],a:0,d:3,cat:"Nirvana",fact:"Killing Joke considered suing over the similarity to their song 'Eighties.' The matter was never resolved in court, and the resemblance remains debated."},
{q:"Kurt Cobain named his daughter Frances Bean after which musician?",o:["Frances McKee of The Vaselines","Frances Farmer","Francis Scott Key","None -- it was a random name"],a:0,d:2,cat:"Nirvana",fact:"Frances was named after Frances McKee of The Vaselines, a Scottish band Kurt loved. 'Bean' was because she looked like a kidney bean on the ultrasound."},
{q:"What venue hosted Nirvana's legendary MTV Unplugged performance?",o:["Sony Music Studios in New York City","The Paramount in Seattle","CBGB in New York","The Crocodile in Seattle"],a:0,d:2,cat:"Nirvana",fact:"Recorded November 18, 1993 at Sony Music Studios in NYC. Kurt insisted on stargazer lilies and black candles, making it look like a funeral -- which, in retrospect, it was."},
{q:"Which Vaselines song did Nirvana cover that became a fan favorite?",o:["Jesus Wants Me for a Sunbeam","Molly's Lips","Son of a Gun","Dying"],a:0,d:2,cat:"Nirvana",fact:"'Jesus Wants Me for a Sunbeam' was performed at MTV Unplugged. Kurt's love of The Vaselines helped revive interest in the obscure Scottish duo."},
{q:"Krist Novoselic played which unusual instrument at some live shows?",o:["Accordion","Harmonica","Trumpet","Banjo"],a:0,d:3,cat:"Nirvana",fact:"Novoselic occasionally played accordion, especially during acoustic sets. His musical range extended well beyond bass guitar."},
{q:"What did Kurt Cobain wear to a 1993 Nirvana photo shoot to mock gender norms?",o:["A dress","A business suit","A cheerleader outfit","A tuxedo"],a:0,d:1,cat:"Nirvana",fact:"Kurt frequently wore dresses on stage and in photos. He said: 'I'm not gay, although I wish I were, just to piss off homophobes.'"},
{q:"'Lithium' is about a man who turns to what for comfort?",o:["Religion, after losing his girlfriend","Medication","Music","Alcohol"],a:0,d:2,cat:"Nirvana",fact:"The song captures the manic-depressive cycle of finding salvation in religion. The 'yeah yeah yeah' chorus is simultaneously joyful and desperate."},
{q:"Nirvana's 'In Utero' was originally going to be titled what?",o:["I Hate Myself and Want to Die","Verse Chorus Verse","Radio Friendly Unit Shifter","Sheep"],a:0,d:2,cat:"Nirvana",fact:"Kurt wanted to call it 'I Hate Myself and Want to Die' but was talked out of it by bandmates who feared it would be taken literally. Tragically prescient."},
{q:"Which MTV award show performance featured Kurt Cobain starting a different song than planned?",o:["1992 VMAs -- he played the banned 'Rape Me' intro before switching to 'Lithium'","1993 VMAs","1991 VMAs","They never played the VMAs"],a:0,d:3,cat:"Nirvana",fact:"MTV had banned 'Rape Me' from the broadcast. Kurt defiantly played its opening riff before switching to 'Lithium,' causing a backstage panic."},
{q:"Pat Smear, who joined Nirvana as a touring guitarist, was originally in which LA punk band?",o:["The Germs","Black Flag","X","Circle Jerks"],a:0,d:2,cat:"Nirvana",fact:"Pat Smear was the guitarist in The Germs, one of LA's first punk bands. After Nirvana, he joined Foo Fighters and remains with them."},

// MORE RHCP
{q:"'Snow (Hey Oh)' features Frusciante playing what fast picking technique?",o:["Rapid-fire fingerpicking across all six strings","Slap bass on guitar","A wah pedal solo","Hammer-ons only"],a:0,d:2,cat:"RHCP",fact:"The intro riff is one of the most difficult in rock -- Frusciante picks every single note at blistering speed rather than using hammer-ons or pull-offs."},
{q:"What album did RHCP record at The Mansion where Frusciante claimed to see ghosts?",o:["Blood Sugar Sex Magik","Californication","One Hot Minute","By the Way"],a:0,d:1,cat:"RHCP",fact:"The Harry Houdini estate on Laurel Canyon had a dark history. Frusciante slept in a closet because he said the rooms were haunted. The album's raw energy may owe something to the setting."},
{q:"Flea studied music at which famous institution?",o:["The Los Angeles Philharmonic's music program (as a trumpet student)","Juilliard","Berklee College of Music","USC"],a:0,d:3,cat:"RHCP",fact:"Flea was a classically trained trumpet player before switching to bass. His formal music education gives his bass playing its melodic sophistication."},
{q:"Which RHCP song opens with the lyric 'Sometimes I feel like I don't have a partner'?",o:["Under the Bridge","Californication","Scar Tissue","Otherside"],a:0,d:1,cat:"RHCP",fact:"One of the most recognizable opening lines in 90s rock. Kiedis initially showed the poem to Rick Rubin, who immediately recognized it as a hit."},
{q:"What connects RHCP, Atoms for Peace, and Blind Melon?",o:["Flea -- he played in or with all three","Chad Smith","Rick Rubin produced all three","They all had members die of overdoses"],a:0,d:2,cat:"RHCP",fact:"Flea collaborated widely: Atoms for Peace with Thom Yorke, and he appeared on Alanis Morissette's 'You Oughta Know' and other artists' recordings."},
{q:"What is the opening track of Blood Sugar Sex Magik?",o:["The Power of Equality","Give It Away","Suck My Kiss","Blood Sugar Sex Magik"],a:0,d:2,cat:"RHCP",fact:"'The Power of Equality' sets the album's tone with its aggressive funk-rap delivery and politically charged lyrics."},
{q:"RHCP were inducted into the Rock and Roll Hall of Fame in which year?",o:["2012","2010","2015","2008"],a:0,d:2,cat:"RHCP",fact:"All four living members from the classic lineup performed together at the induction, including a visibly emotional reconciliation."},
{q:"'Scar Tissue' won the Grammy for which category?",o:["Best Rock Song","Record of the Year","Best Alternative Performance","Song of the Year"],a:0,d:2,cat:"RHCP",fact:"The mellow, melancholic track marked a new direction for RHCP -- introspective rather than manic -- and became one of their most beloved songs."},
{q:"Chad Smith, RHCP's drummer, is frequently confused with which actor?",o:["Will Ferrell","Jack Black","Seth Rogen","Dave Grohl"],a:0,d:1,cat:"RHCP",fact:"The resemblance between Chad Smith and Will Ferrell is uncanny. They appeared together on Jimmy Fallon's show in a fake drum-off to settle the confusion."},
{q:"What is the origin of the Red Hot Chili Peppers' name?",o:["Inspired by classic band names like Muddy Waters and Howlin' Wolf -- earthy and vivid","A Mexican restaurant","A Louis Armstrong song","Anthony's favorite food"],a:0,d:2,cat:"RHCP",fact:"The name was suggested by a band friend and evokes the same tradition of blues names that combine colors with evocative nouns."},

// MORE SMASHING PUMPKINS
{q:"Which song from Mellon Collie features a music video set in an ice cream truck?",o:["Tonight, Tonight","1979","Bullet with Butterfly Wings","Zero"],a:1,d:2,cat:"Smashing Pumpkins",fact:"The '1979' video's slice-of-life aesthetic -- convenience store, basement party, kids in cars -- perfectly captured suburban teenage ennui."},
{q:"Billy Corgan played virtually all the guitar parts on Siamese Dream because why?",o:["The rest of the band was too dysfunctional to perform consistently","He wanted full creative control from the start","The producer insisted","The other guitarist was injured"],a:0,d:2,cat:"Smashing Pumpkins",fact:"James Iha and D'arcy were dealing with personal issues. Corgan's obsessive perfectionism drove him to play nearly everything himself, which created band resentment."},
{q:"The Smashing Pumpkins' 'Zero' shirt (with the word ZERO) became what?",o:["One of the most iconic band T-shirts in 90s rock","A political statement","A fashion brand","A charity campaign"],a:0,d:1,cat:"Smashing Pumpkins",fact:"The plain black shirt with silver 'ZERO' text was worn by Billy Corgan and became ubiquitous in 90s alternative culture."},
{q:"Which Smashing Pumpkins album featured a dramatic shift to goth and industrial sounds?",o:["Machina/The Machines of God","Adore","Zeitgeist","Oceania"],a:0,d:3,cat:"Smashing Pumpkins",fact:"Machina (2000) was a concept album about a rock star and his alter ego. It was a commercial disappointment, and the band broke up shortly after."},
{q:"James Iha, Smashing Pumpkins' guitarist, went on to play in which supergroup?",o:["A Perfect Circle","Audioslave","Temple of the Dog","Zwan"],a:0,d:3,cat:"Smashing Pumpkins",fact:"Iha joined A Perfect Circle (Maynard James Keenan's side project) and Tinted Windows. He also released solo albums of gentle power pop."},
{q:"'Mayonaise' from Siamese Dream is beloved by fans for what quality?",o:["Its wall of shoegaze guitars building to an emotional crescendo","Its funny lyrics","Its brevity","Its jazz influences"],a:0,d:2,cat:"Smashing Pumpkins",fact:"Often cited as the Pumpkins' best deep cut, 'Mayonaise' layers dozens of guitar tracks into a shimmering wall of sound that builds to a transcendent climax."},

// MORE 60s-70s
{q:"The Velvet Underground's 'Heroin' was controversial because it did what?",o:["Described the drug experience without moralizing or condemning it","Used actual drug sounds","Was recorded while on heroin","Promoted drug use to children"],a:0,d:2,cat:"60s-70s Roots",fact:"Lou Reed sang about injecting heroin in a matter-of-fact way that shocked 1967 audiences. The song accelerates and decelerates to mimic the drug's rush and comedown."},
{q:"Bowie's 'Heroes' was recorded in a studio near what landmark?",o:["The Berlin Wall","Buckingham Palace","The Eiffel Tower","The Colosseum"],a:0,d:2,cat:"60s-70s Roots",fact:"Hansa Studios sat near the Berlin Wall. Bowie could see a guard tower from the studio. The song was inspired by seeing producer Tony Visconti kissing a woman by the Wall."},
{q:"Which proto-punk band featured Patti Smith as their frontwoman?",o:["Patti Smith Group","The Heartbreakers","Blondie","The Runaways"],a:0,d:1,cat:"60s-70s Roots",fact:"Patti Smith's 'Horses' (1975) merged poetry with punk rock and is considered one of the most important debut albums ever made."},
{q:"The New York Dolls influenced which musical movement?",o:["Punk rock and glam rock simultaneously","Disco","Jazz fusion","New wave exclusively"],a:0,d:2,cat:"60s-70s Roots",fact:"The New York Dolls' sloppy, glamorous proto-punk directly inspired The Sex Pistols, The Ramones, and Morrissey, who was president of their UK fan club."},
{q:"Siouxsie Sioux was the frontwoman of which pioneering post-punk band?",o:["Siouxsie and the Banshees","The Slits","X-Ray Spex","The Raincoats"],a:0,d:1,cat:"60s-70s Roots",fact:"Siouxsie and the Banshees bridged punk and goth, influencing The Cure, Radiohead, and countless others with their dark, dramatic sound."},
{q:"Joy Division's producer Martin Hannett was known for what unusual recording techniques?",o:["Recording drums in elevators, breaking glass, and using extreme effects","Only recording at midnight","Using no microphones","Recording everything backwards"],a:0,d:3,cat:"60s-70s Roots",fact:"Hannett's obsessive techniques -- separating every drum hit, adding cavernous reverb -- gave Joy Division their haunting, otherworldly sound. The band actually hated his mixes."},

// MORE 80s
{q:"My Bloody Valentine's Kevin Shields spent so long making 'Loveless' that he nearly did what?",o:["Bankrupted Creation Records","Lost his hearing permanently","Got sued by the band","Retired from music"],a:0,d:2,cat:"80s",fact:"Shields reportedly spent over 250,000 pounds -- a staggering sum for an indie record -- and Creation's Alan McGee said it nearly destroyed the label."},
{q:"The Pixies' 'Where Is My Mind?' became iconic decades later because of which film?",o:["Fight Club","Donnie Darko","Garden State","Lost in Translation"],a:0,d:1,cat:"80s",fact:"The song plays during Fight Club's final scene as buildings collapse. It introduced the Pixies to a new generation and became their most-streamed song."},
{q:"R.E.M.'s 'Losing My Religion' is NOT actually about religion -- it's about what?",o:["Unrequited love -- 'losing my religion' is a Southern expression for losing composure","Leaving a church","A political stance","Growing up"],a:0,d:2,cat:"80s",fact:"Michael Stipe confirmed it's about unrequited love and obsession. The mandolin riff, played by Peter Buck, was something he came up with while learning the instrument."},
{q:"Which Cure album is considered their masterpiece of gothic pop?",o:["Disintegration","Pornography","The Head on the Door","Wish"],a:0,d:1,cat:"80s",fact:"Disintegration (1989) contains 'Lovesong,' 'Lullaby,' 'Pictures of You,' and 'Fascination Street.' Robert Smith said he wrote it because he was about to turn 30 and felt old."},
{q:"Depeche Mode's 'Violator' (1990) contains which massive hit?",o:["Personal Jesus","Enjoy the Silence","Policy of Truth","All three"],a:3,d:2,cat:"80s",fact:"Violator was Depeche Mode's commercial peak, containing three of their biggest hits. It proved that electronic bands could fill stadiums."},
{q:"The Replacements' Paul Westerberg wrote which song that appeared in a John Hughes film?",o:["Can't Hardly Wait","Alex Chilton","Bastards of Young","Unsatisfied"],a:0,d:3,cat:"80s",fact:"Westerberg contributed songs to the Cameron Crowe-inspired teen film culture. 'Can't Hardly Wait' later inspired a film title, though the movie had nothing to do with the band."},

// MORE 90s ALT
{q:"Soundgarden's 'Black Hole Sun' video features what disturbing imagery?",o:["Suburban people with distorted, melting smiles","Actual black holes","A solar eclipse","Underwater footage"],a:0,d:1,cat:"90s Alt",fact:"The surreal video shows smiling suburbanites whose faces become grotesquely distorted as a black sun consumes everything. It won the Grammy for Best Music Video."},
{q:"Alice in Chains' 'Jar of Flies' (1994) was the first EP to debut where on the Billboard chart?",o:["#1","#3","#5","#10"],a:0,d:2,cat:"90s Alt",fact:"'Jar of Flies' was the first EP in Billboard history to debut at #1. Its acoustic, haunting sound showed a different side of Alice in Chains."},
{q:"Jeff Buckley's 'Hallelujah' cover originally appeared on which album?",o:["Grace","Live at Sin-e","Sketches for My Sweetheart the Drunk","A compilation"],a:0,d:1,cat:"90s Alt",fact:"Buckley's version of the Leonard Cohen song is often called the definitive cover. Cohen himself said Buckley's version moved him deeply."},
{q:"Weezer's Rivers Cuomo did what unusual thing between albums?",o:["Enrolled at Harvard to study classical composition","Became a monk","Moved to Japan permanently","Joined the military"],a:0,d:2,cat:"90s Alt",fact:"Cuomo enrolled at Harvard in 1995 after the Blue Album's success. He lived a spartan, almost monastic life while writing songs that became Pinkerton."},
{q:"Elliott Smith's method of death in 2003 was what?",o:["Two stab wounds to the chest -- ruled as possible suicide","Drug overdose","Car accident","Natural causes"],a:0,d:3,cat:"90s Alt",fact:"The circumstances were suspicious enough that the case was never conclusively closed. His partner was home at the time. The coroner listed the manner of death as 'undetermined.'"},
{q:"Neutral Milk Hotel's Jeff Mangum essentially did what after 'In the Aeroplane Over the Sea'?",o:["Disappeared from public life for over a decade","Started a new band immediately","Became a record producer","Moved to Europe"],a:0,d:2,cat:"90s Alt",fact:"Mangum stopped giving interviews, stopped performing, and vanished. When he finally returned to touring around 2011, it was an emotional event for a devoted cult fanbase."},
{q:"Pearl Jam's 'Vitalogy' (1994) was initially released in what format only?",o:["Vinyl/LP only, two weeks before the CD release","CD only","Cassette only","Digital download"],a:0,d:3,cat:"90s Alt",fact:"The vinyl-first strategy was deliberate anti-commercial rebellion. Despite limited vinyl sales, it debuted at #1 when the CD followed."},

// MORE 2000s-NOW
{q:"The Strokes' Julian Casablancas is the son of which fashion industry figure?",o:["John Casablancas, founder of Elite Model Management","A Vogue editor","A Gap executive","A shoe designer"],a:0,d:3,cat:"2000s-Now",fact:"Julian's privileged upbringing became a point of contention when The Strokes were marketed as scruffy garage rockers. His father founded one of the world's biggest modeling agencies."},
{q:"Which Arcade Fire album is a concept record about suburban sprawl?",o:["The Suburbs","Funeral","Neon Bible","Reflektor"],a:0,d:1,cat:"2000s-Now",fact:"'The Suburbs' (2010) won the Grammy for Album of the Year. Its theme of suburban isolation resonated with a generation raised in cookie-cutter developments."},
{q:"LCD Soundsystem's first single was called what?",o:["Losing My Edge","Daft Punk Is Playing at My House","Movement","Tribulations"],a:0,d:2,cat:"2000s-Now",fact:"'Losing My Edge' (2002) is a hilarious, self-aware monologue about music snobbery, listing obscure bands to prove underground credibility. It launched DFA Records."},
{q:"Arctic Monkeys' debut album became the fastest-selling debut in UK chart history -- how fast?",o:["It sold over 360,000 copies in its first week","It sold 1 million in a month","It sold 100,000 in its first day","It went gold in one hour"],a:0,d:2,cat:"2000s-Now",fact:"'Whatever People Say I Am, That's What I'm Not' (2006) sold 363,735 copies in its first week, breaking the record held by Hear'Say."},
{q:"Which indie band's live show famously features elaborate costumes and a giant disco ball?",o:["Arcade Fire","LCD Soundsystem","Tame Impala","The Flaming Lips"],a:0,d:2,cat:"2000s-Now",fact:"Arcade Fire's arena shows feature elaborate staging, costumes, and community-building rituals. They once asked audience members to wear formal attire."}

var STORAGE_KEY = "nyah-trivia-hi";
var app = document.getElementById("app");

// State
var activeQ = [];
var state = {qi:0, score:0, streak:0, bestStreak:0, correct:0, wrong:0, answered:false};
var hi = +(localStorage.getItem(STORAGE_KEY) || 0);
var _soundMuted = false;
var _gameStartTime = null;

// Shuffle utility
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

/* ── Audio (Web Audio API) ── */
var actx;
try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}

function resumeAudio() {
  if (actx && actx.state === "suspended") actx.resume();
}

function playClick() {
  if (_soundMuted || !actx) return;
  resumeAudio();
  try {
    var t = actx.currentTime;
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine"; o.frequency.value = 800;
    g.gain.setValueAtTime(0.03, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 0.02);
  } catch(e) {}
}

function playCorrect() {
  if (_soundMuted || !actx) return;
  resumeAudio();
  try {
    var t = actx.currentTime;
    // C5 then E5
    [523.25, 659.25].forEach(function(f, i) {
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.04, t + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.15);
      o.connect(g); g.connect(actx.destination);
      o.start(t + i * 0.08); o.stop(t + i * 0.08 + 0.15);
    });
  } catch(e) {}
}

function playWrong() {
  if (_soundMuted || !actx) return;
  resumeAudio();
  try {
    var t = actx.currentTime;
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = "sawtooth"; o.frequency.value = 200;
    g.gain.setValueAtTime(0.03, t);
    g.gain.linearRampToValueAtTime(0, t + 0.12);
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + 0.12);
  } catch(e) {}
}

function playStreak() {
  if (_soundMuted || !actx) return;
  resumeAudio();
  try {
    var t = actx.currentTime;
    // Quick ascending arpeggio C-E-G-C
    [523.25, 659.25, 783.99, 1046.5].forEach(function(f, i) {
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = "triangle"; o.frequency.value = f;
      g.gain.setValueAtTime(0.03, t + i * 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.15);
      o.connect(g); g.connect(actx.destination);
      o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.15);
    });
  } catch(e) {}
}

function playHighScore() {
  if (_soundMuted || !actx) return;
  resumeAudio();
  try {
    var t = actx.currentTime;
    // Celebratory chord: C-E-G-B-D
    [523.25, 659.25, 783.99, 987.77, 1174.66].forEach(function(f, i) {
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.025, t + i * 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.4);
      o.connect(g); g.connect(actx.destination);
      o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.4);
    });
  } catch(e) {}
}

/* ── Spotify toggle ── */
document.getElementById("spToggle").onclick = function() {
  document.getElementById("spWrap").classList.toggle("open");
};

/* ── Screen flash ── */
function flashScreen() {
  var el = document.createElement("div");
  el.className = "screen-flash";
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 600);
}

/* ── Title Screen ── */
function renderTitle() {
  app.innerHTML =
    '<div class="title-screen">' +
      '<h1>Nyah\'s Indie Trivia</h1>' +
      '<p class="tsub">' + Q.length + ' questions — The Smiths, Radiohead, Nirvana & beyond</p>' +
      '<button class="play-btn" id="play-btn">PLAY</button>' +
    '</div>';
  document.getElementById("play-btn").onclick = startGame;
}

/* ── Start Game ── */
function startGame() {
  resumeAudio();
  activeQ = shuffle(Q.slice());
  state = {qi:0, score:0, streak:0, bestStreak:0, correct:0, wrong:0, answered:false};
  _gameStartTime = Date.now();
  renderQ();
}

/* ── Render Question ── */
function renderQ() {
  if (state.qi >= activeQ.length) { renderEnd(); return; }
  var q = activeQ[state.qi];
  var d = q.d;
  var progPct = Math.round((state.qi / activeQ.length) * 100);
  var progColors = {1:"var(--green)", 2:"var(--gold)", 3:"var(--purple)"};
  var fireClass = state.streak >= 5 ? " fire" : "";

  document.body.classList.toggle("streak-glow", state.streak >= 5);

  app.innerHTML =
    '<header><h1>Nyah\'s Indie Trivia</h1></header>' +
    '<div class="score-bar' + fireClass + '" style="position:relative">' +
      '<span>Score: <strong id="score-num">' + state.score + '</strong></span>' +
      '<span>' + (state.streak >= 5 ? '<span class="streak-fire">' + state.streak + ' streak</span>' : (state.streak >= 3 ? state.streak + ' streak' : '')) + '</span>' +
      '<span>' + (state.qi + 1) + '/' + activeQ.length + '</span>' +
      '<button class="sound-toggle" id="sound-toggle" title="Toggle sound">' + (_soundMuted ? '\u{1F507}' : '\u{1F50A}') + '</button>' +
    '</div>' +
    '<div class="progress-wrap"><div class="progress-fill" style="width:' + progPct + '%;background:' + (progColors[d] || "var(--accent)") + '"></div></div>' +
    '<div class="q-header">' +
      '<span class="category">' + q.cat + '</span>' +
      '<span class="badge ' + (DIFF_CLASSES[d] || "") + '">' + (DIFF_LABELS[d] || "") + '</span>' +
    '</div>' +
    '<div class="question-text">' + q.q + '</div>' +
    '<div class="options" id="opts">' +
      q.o.map(function(o, i) {
        return '<button class="opt-btn" data-i="' + i + '">' + o + '</button>';
      }).join("") +
    '</div>' +
    '<div id="feedback"></div>';

  // Bind events
  document.getElementById("sound-toggle").onclick = function() {
    _soundMuted = !_soundMuted;
    this.textContent = _soundMuted ? '\u{1F507}' : '\u{1F50A}';
  };
  var btns = document.querySelectorAll(".opt-btn");
  btns.forEach(function(b) {
    b.onclick = function() { handleAnswer(parseInt(b.dataset.i)); };
  });
}

/* ── Handle Answer ── */
function handleAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  playClick();

  var q = activeQ[state.qi];
  var correct = idx === q.a;

  // Highlight buttons
  var btns = document.querySelectorAll(".opt-btn");
  btns.forEach(function(b) {
    b.disabled = true;
    var i = parseInt(b.dataset.i);
    if (i === q.a) b.classList.add("correct");
    if (i === idx && !correct) b.classList.add("wrong");
    if (i !== q.a && i !== idx) b.style.opacity = "0.4";
  });

  if (correct) {
    state.correct++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    var pts = DIFF_POINTS[q.d] || 1;
    state.score += pts;

    // Floating points
    var scoreBar = document.querySelector(".score-bar");
    if (scoreBar) {
      var fp = document.createElement("div");
      fp.className = "float-pts";
      fp.textContent = "+" + pts;
      scoreBar.appendChild(fp);
      setTimeout(function() { fp.remove(); }, 1100);
    }
    // Score pop
    setTimeout(function() {
      var sn = document.getElementById("score-num");
      if (sn) { sn.classList.remove("score-pop"); sn.offsetHeight; sn.classList.add("score-pop"); }
    }, 50);

    // Streak effects
    if (state.streak >= 5) {
      document.body.classList.add("streak-glow");
      var sb = document.querySelector(".score-bar");
      if (sb) sb.classList.add("fire");
      flashScreen();
    }

    // Sound
    if (state.streak === 5 || state.streak === 10 || state.streak === 15 || state.streak === 20) {
      playStreak();
    } else {
      playCorrect();
    }
  } else {
    state.wrong++;
    state.streak = 0;
    document.body.classList.remove("streak-glow");
    playWrong();
  }

  // Feedback
  var fb = document.getElementById("feedback");
  fb.innerHTML =
    '<div class="feedback ' + (correct ? "correct-fb" : "wrong-fb") + '">' +
      '<h3>' + (correct ? "Correct!" + (state.streak >= 5 ? " \u{1F525} " + state.streak + " streak!" : "") : "Wrong — " + q.o[q.a]) + '</h3>' +
      '<div class="fact">' + q.fact + '</div>' +
    '</div>' +
    '<button class="next-btn" id="next-btn">' + (state.qi + 1 >= activeQ.length ? "See Results" : "Next →") + '</button>';

  document.getElementById("next-btn").onclick = function() {
    state.qi++;
    state.answered = false;
    renderQ();
  };
  setTimeout(function() {
    var nb = document.getElementById("next-btn");
    if (nb) nb.scrollIntoView({behavior:"smooth", block:"nearest"});
  }, 100);
}

/* ── End Screen ── */
function renderEnd() {
  document.body.classList.remove("streak-glow");
  var isHi = state.score > hi;
  if (isHi) {
    hi = state.score;
    localStorage.setItem(STORAGE_KEY, hi);
    playHighScore();
  }

  var pct = activeQ.length > 0 ? Math.round(state.correct / activeQ.length * 100) : 0;
  var totalTimeSec = _gameStartTime ? Math.round((Date.now() - _gameStartTime) / 1000) : 0;
  var totalMin = Math.floor(totalTimeSec / 60);
  var totalSec = totalTimeSec % 60;
  var timeStr = totalMin > 0 ? totalMin + "m " + totalSec + "s" : totalSec + "s";

  var grade = "F", gradeColor = "var(--red)";
  if (pct >= 90) { grade = "A+"; gradeColor = "var(--green)"; }
  else if (pct >= 80) { grade = "A"; gradeColor = "var(--green)"; }
  else if (pct >= 70) { grade = "B"; gradeColor = "var(--gold)"; }
  else if (pct >= 60) { grade = "C"; gradeColor = "var(--purple)"; }
  else if (pct >= 50) { grade = "D"; gradeColor = "var(--accent)"; }

  var accColor = pct >= 80 ? "var(--green)" : pct >= 60 ? "var(--gold)" : "var(--red)";

  // Max possible score
  var maxScore = 0;
  activeQ.forEach(function(qq) { maxScore += (DIFF_POINTS[qq.d] || 1); });

  app.innerHTML =
    '<div class="end-screen">' +
      '<h2>Trivia Complete</h2>' +
      '<div class="final-score">' + state.score + '</div>' +
      '<div style="font-size:13px;color:var(--dim);margin-bottom:8px">out of ' + maxScore + ' possible</div>' +
      (isHi ? '<div class="high-label">\u{2728} New High Score!</div>' : '<div class="high-label" style="color:var(--gold)">High Score: ' + hi + '</div>') +
      '<div class="grade-badge" style="background:' + gradeColor + ';color:#000">' + grade + '</div>' +
      '<div class="accuracy-wrap">' +
        '<div class="row"><span>Accuracy</span><span>' + pct + '%</span></div>' +
        '<div class="accuracy-bar"><div class="accuracy-bar-fill" style="width:' + pct + '%;background:' + accColor + '"></div></div>' +
      '</div>' +
      '<div class="stats-grid">' +
        '<div class="stat-card"><div class="val">' + state.correct + '</div><div class="lbl">Correct</div></div>' +
        '<div class="stat-card"><div class="val">' + state.wrong + '</div><div class="lbl">Wrong</div></div>' +
        '<div class="stat-card"><div class="val">' + state.bestStreak + '</div><div class="lbl">Best Streak</div></div>' +
        '<div class="stat-card"><div class="val">' + timeStr + '</div><div class="lbl">Total Time</div></div>' +
        '<div class="stat-card"><div class="val">' + activeQ.length + '</div><div class="lbl">Questions</div></div>' +
        '<div class="stat-card"><div class="val">' + grade + '</div><div class="lbl">Grade</div></div>' +
      '</div>' +
      '<button class="share-btn" id="share-btn">Share Score</button>' +
      '<button class="restart-btn" id="restart-btn">Play Again</button>' +
    '</div>';

  document.getElementById("share-btn").onclick = function() {
    var txt = "Nyah's Indie Trivia\nScore: " + state.score + "/" + maxScore + " (" + pct + "%)\nGrade: " + grade + "\nBest Streak: " + state.bestStreak + "\nTime: " + timeStr;
    navigator.clipboard.writeText(txt).then(function() {
      var b = document.getElementById("share-btn");
      b.textContent = "Copied!";
      setTimeout(function() { b.textContent = "Share Score"; }, 2000);
    }).catch(function() {});
  };

  document.getElementById("restart-btn").onclick = function() {
    startGame();
  };
}

/* ── Init ── */
renderTitle();
</script>
</body>
</html>
