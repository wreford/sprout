<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Cozy Crochet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;height:100dvh;
  background:#FAF6F0;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  color:#4A3A2A}
.vig{position:fixed;inset:0;pointer-events:none;z-index:999;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(40,30,20,0.1) 100%)}

.top{display:flex;justify-content:space-between;align-items:baseline;
  padding:10px 16px 8px;padding-top:max(10px,env(safe-area-inset-top));
  flex-shrink:0;z-index:10}
.top h1{font-size:1.05rem;font-weight:400;color:#6A5040;letter-spacing:0.02em}
.top .ct{font-size:0.68rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif;
  text-align:right;line-height:1.5}

.main{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}

.controls{flex-shrink:0;
  padding:10px 12px;
  padding-bottom:max(12px,calc(12px + env(safe-area-inset-bottom)));
  padding-left:max(12px,env(safe-area-inset-left));
  padding-right:max(12px,env(safe-area-inset-right));
  background:rgba(250,246,240,0.92);backdrop-filter:blur(10px);
  border-top:1px solid rgba(180,160,140,0.15)}

.colors{display:flex;gap:7px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;padding:0;outline:none}
.sw.on{transform:scale(1.18);box-shadow:0 0 0 2.5px #FAF6F0,0 0 0 4px #8A7A6A}
.sw.pale{box-shadow:inset 0 0 0 1px rgba(160,140,120,0.3)}
.sw.pale.on{box-shadow:0 0 0 2.5px #FAF6F0,0 0 0 4px #8A7A6A}

.types{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.tb{padding:5px 14px;border-radius:8px;border:1px solid rgba(160,140,120,0.25);
  background:transparent;cursor:pointer;font-size:0.72rem;color:#8A7A6A;
  font-family:-apple-system,system-ui,sans-serif;transition:all .15s;letter-spacing:0.03em}
.tb.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}

.acts{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.ab{padding:5px 14px;border-radius:8px;border:1px solid rgba(160,140,120,0.2);
  background:transparent;cursor:pointer;font-size:0.7rem;color:#9A8A7A;
  font-family:-apple-system,system-ui,sans-serif;transition:all .15s;min-height:32px}
.ab:active{transform:scale(0.95)}
.ab.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}

.overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(40,30,20,0.4);backdrop-filter:blur(6px);
  align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{background:#FAF6F0;border-radius:14px;padding:20px;
  max-width:340px;width:88%;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.panel h2{font-size:0.95rem;text-align:center;margin-bottom:14px;color:#6A5040;font-weight:400}
.pc{padding:14px;border-radius:10px;border:1px solid rgba(160,140,120,0.15);
  margin-bottom:8px;cursor:pointer;background:transparent;transition:background .15s}
.pc:active{background:rgba(160,140,120,0.1)}
.pc .nm{font-size:0.82rem;color:#5A4A3A;margin-bottom:2px}
.pc .ds{font-size:0.68rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.cbtn{display:block;margin:10px auto 0;padding:8px 20px;border-radius:8px;
  border:1px solid rgba(160,140,120,0.2);background:none;cursor:pointer;
  font-size:0.78rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.sp{display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:8px;
  border:1px solid rgba(160,140,120,0.15);background:transparent;cursor:pointer;
  font-size:0.82rem;font-family:Georgia,serif;color:#6A5040}
.sp.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}

.row-toast{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.88);color:#6A5040;padding:8px 22px;border-radius:16px;
  font-size:0.82rem;font-family:-apple-system,system-ui,sans-serif;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:50;
  box-shadow:0 2px 12px rgba(60,40,20,0.1)}
.row-toast.show{opacity:1}
</style>
</head>
<body>
<div class="vig"></div>

<div class="top">
  <h1>Cozy Crochet</h1>
  <div class="ct" id="ct">0 stitches</div>
</div>

<div class="main">
  <canvas id="C"></canvas>
  <div class="row-toast" id="toast"></div>
</div>

<div class="controls">
  <div class="colors" id="clr"></div>
  <div class="types" id="tps"></div>
  <div class="acts">
    <button class="ab" id="bUndo">Undo</button>
    <button class="ab" id="bAuto">Auto</button>
    <button class="ab" id="bPat">Pattern</button>
    <button class="ab" id="bSnd">Sound</button>
    <button class="ab" id="bSpd">Speed</button>
  </div>
</div>

<div class="overlay" id="oPat">
  <div class="panel">
    <h2>Patterns</h2>
    <div id="pList"></div>
    <button class="cbtn" id="cPat">Close</button>
  </div>
</div>

<div class="overlay" id="oSpd">
  <div class="panel" style="max-width:260px">
    <h2>Auto Speed</h2>
    <button class="sp" data-ms="400">Meditative</button>
    <button class="sp on" data-ms="200">Steady</button>
    <button class="sp" data-ms="100">Quick</button>
    <button class="cbtn" id="cSpd">Close</button>
  </div>
</div>

<script>
// ============================================================
// Cozy Crochet -- actual yarn thread physics
// Procedural yarn paths with bezier curves and over/under crossings
// ============================================================

const C = document.getElementById('C'), cx = C.getContext('2d');

// -- Palette: 10 warm yarn colors --
const PAL = [
  '#F0E4D0','#D4A0A0','#A8B89C','#D4A843','#8CA8B8',
  '#D08060','#B0A0C0','#B06040','#C8C4C0','#505050'
];
const PNAME = [
  'Cream','Blush','Sage','Honey','Dusty Blue',
  'Coral','Lavender','Clay','Cloud','Charcoal'
];

// -- Stitch types --
const TKEYS = ['ch','sc'];
const ST = {
  ch:{h:18, label:'ch'},
  sc:{h:28, label:'sc'}
};

// -- Patterns --
const PATTERNS = [
  { name:'Free', desc:'Freeform -- stitch whatever you like', width:10,
    getRow:()=>null },
  { name:'Scarf', desc:'8 stitches wide, color bands every 4 rows', width:8,
    colors:[1,3], totalRows:24,
    getRow(r){ return {t:'sc', c:this.colors[Math.floor(r/4)%this.colors.length]} }},
  { name:'Blanket', desc:'12 wide, rainbow stripes', width:12,
    colors:[1,5,3,6,4,0], totalRows:18,
    getRow(r){ return {t:'sc', c:this.colors[Math.floor(r/3)%this.colors.length]} }},
  { name:'Chain Band', desc:'Alternating chain and single crochet rows', width:10,
    colors:[1,5,3], totalRows:16,
    getRow(r){
      const c = this.colors[Math.floor(r/4)%this.colors.length];
      return {t: r%2===0?'ch':'sc', c};
    }},
];

// -- State --
const S = {
  type:'sc', color:1, fabric:[], row:0, col:0, width:10,
  auto:false, autoMs:200, autoTm:null, sound:true,
  panY:0, anim:false,
  pat:null, patRow:0,
  today:0, total:0
};

// -- localStorage --
try {
  const d = JSON.parse(localStorage.getItem('cc'));
  if (d) {
    S.total = d.t || 0;
    S.sound = d.s !== false;
    S.color = d.c || 1;
    if (d.dy === new Date().toDateString()) S.today = d.n || 0;
  }
} catch(e) {}

function save() {
  try { localStorage.setItem('cc', JSON.stringify({
    t:S.total, s:S.sound, c:S.color, n:S.today, dy:new Date().toDateString()
  })); } catch(e) {}
}

// ============================================================
// Color helpers
// ============================================================
function hx(h) {
  return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
}
function th(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function li(c,a) { const [r,g,b]=hx(c); return th(r+a,g+a,b+a); }
function dk(c,a) { return li(c,-a); }
function ra(c,a) { const [r,g,b]=hx(c); return `rgba(${r},${g},${b},${a})`; }

// ============================================================
// Audio -- soft pops and chimes
// ============================================================
let ac = null;
function initA() { if (ac) return; ac = new (window.AudioContext||window.webkitAudioContext)(); }

function playPop() {
  if (!S.sound || !ac) return;
  const t = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine';
  o.frequency.value = 600 + Math.random() * 200;
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t + 0.03);
  const buf = ac.createBuffer(1, ac.sampleRate * 0.02, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * 0.3;
  const ns = ac.createBufferSource(), ng = ac.createGain();
  ns.buffer = buf;
  ng.gain.setValueAtTime(0.01, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  ns.connect(ng); ng.connect(ac.destination);
  ns.start(t); ns.stop(t + 0.03);
}

function playChime() {
  if (!S.sound || !ac) return;
  const t = ac.currentTime;
  [523, 659, 784].forEach((f, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.04, t + i * 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3 + i * 0.08);
    o.connect(g); g.connect(ac.destination);
    o.start(t + i * 0.08); o.stop(t + 0.35 + i * 0.08);
  });
}

// ============================================================
// Yarn rendering engine
// ============================================================

const YARN_W = 5;       // yarn thickness
const HILITE_OFF = 1.5; // highlight offset for 3D roundness

// Draw a thick yarn bezier segment with 3D highlight
function drawYarnBezier(pts, color, shadowColor) {
  // pts = array of {x,y} -- 4 points for cubic bezier
  if (pts.length < 4) return;

  // Shadow/under layer
  if (shadowColor) {
    cx.save();
    cx.strokeStyle = shadowColor;
    cx.lineWidth = YARN_W + 2;
    cx.lineCap = 'round';
    cx.lineJoin = 'round';
    cx.beginPath();
    cx.moveTo(pts[0].x, pts[0].y);
    cx.bezierCurveTo(pts[1].x, pts[1].y, pts[2].x, pts[2].y, pts[3].x, pts[3].y);
    cx.stroke();
    cx.restore();
  }

  // Main yarn stroke
  cx.save();
  cx.strokeStyle = color;
  cx.lineWidth = YARN_W;
  cx.lineCap = 'round';
  cx.lineJoin = 'round';
  cx.beginPath();
  cx.moveTo(pts[0].x, pts[0].y);
  cx.bezierCurveTo(pts[1].x, pts[1].y, pts[2].x, pts[2].y, pts[3].x, pts[3].y);
  cx.stroke();
  cx.restore();

  // 3D highlight -- lighter, thinner, offset up-left
  cx.save();
  cx.strokeStyle = li(color, 40);
  cx.lineWidth = HILITE_OFF;
  cx.lineCap = 'round';
  cx.lineJoin = 'round';
  cx.globalAlpha = 0.5;
  cx.beginPath();
  cx.moveTo(pts[0].x - 1, pts[0].y - 1.2);
  cx.bezierCurveTo(
    pts[1].x - 1, pts[1].y - 1.2,
    pts[2].x - 1, pts[2].y - 1.2,
    pts[3].x - 1, pts[3].y - 1.2
  );
  cx.stroke();
  cx.restore();
}

// Draw a yarn polyline through multiple points as smooth bezier segments
function drawYarnPath(points, color, shadowColor) {
  if (points.length < 2) return;
  if (points.length === 2) {
    // Simple straight segment rendered as degenerate bezier
    const p0 = points[0], p1 = points[1];
    const mx = (p0.x+p1.x)/2, my = (p0.y+p1.y)/2;
    drawYarnBezier([p0, {x:mx,y:my}, {x:mx,y:my}, p1], color, shadowColor);
    return;
  }
  // For 3+ points, generate smooth cubic beziers through each segment
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i];
    const p1 = points[i+1];
    // Control points: use neighbors for tangent direction
    const prev = points[i-1] || p0;
    const next = points[i+2] || p1;
    const tension = 0.3;
    const cp1 = {
      x: p0.x + (p1.x - prev.x) * tension,
      y: p0.y + (p1.y - prev.y) * tension
    };
    const cp2 = {
      x: p1.x - (next.x - p0.x) * tension,
      y: p1.y - (next.y - p0.y) * tension
    };
    drawYarnBezier([p0, cp1, cp2, p1], color, shadowColor);
  }
}

// ============================================================
// Chain stitch: interlocking oval loops threaded through previous
// ============================================================
function drawChainStitch(x, y, w, h, color, scale) {
  const sc = scale === undefined ? 1 : scale;
  if (sc < 0.01) return;
  const mx = x + w/2;
  const my = y + h/2;

  if (sc < 1) {
    cx.save();
    cx.translate(mx, my); cx.scale(sc, sc); cx.translate(-mx, -my);
  }

  const loopW = w * 0.38;
  const loopH = h * 0.38;
  const darkCol = dk(color, 30);
  const shadowCol = ra(darkCol, 0.3);

  // The chain loop: an oval ring made of yarn
  // Draw as two halves so we can show the thread-through

  // Bottom half of the oval (the "under" part that goes behind the next chain)
  cx.save();
  cx.strokeStyle = shadowCol;
  cx.lineWidth = YARN_W + 2;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.ellipse(mx, my, loopW, loopH, 0, Math.PI * 0.15, Math.PI * 0.85);
  cx.stroke();
  cx.restore();

  cx.save();
  cx.strokeStyle = dk(color, 10);
  cx.lineWidth = YARN_W;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.ellipse(mx, my, loopW, loopH, 0, Math.PI * 0.15, Math.PI * 0.85);
  cx.stroke();
  // 3D highlight on bottom arc
  cx.strokeStyle = li(color, 30);
  cx.lineWidth = HILITE_OFF;
  cx.globalAlpha = 0.45;
  cx.beginPath();
  cx.ellipse(mx, my + 1, loopW - 1, loopH - 1, 0, Math.PI * 0.2, Math.PI * 0.8);
  cx.stroke();
  cx.restore();

  // Thread connecting to next chain (going down through the loop)
  // This is the vertical connector between chain links
  const connY1 = my + loopH * 0.6;
  const connY2 = my + h * 0.52;
  drawYarnBezier([
    {x: mx - 1, y: connY1},
    {x: mx - 2, y: (connY1+connY2)/2},
    {x: mx + 2, y: (connY1+connY2)/2},
    {x: mx + 1, y: connY2}
  ], dk(color, 8), null);

  // Top half of oval (the "over" part -- drawn on top)
  cx.save();
  cx.strokeStyle = color;
  cx.lineWidth = YARN_W;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.ellipse(mx, my, loopW, loopH, 0, -Math.PI * 0.85, Math.PI * 0.15);
  cx.stroke();
  // 3D highlight on top arc
  cx.strokeStyle = li(color, 45);
  cx.lineWidth = HILITE_OFF;
  cx.globalAlpha = 0.55;
  cx.beginPath();
  cx.ellipse(mx - 0.8, my - 1, loopW - 1, loopH - 1, 0, -Math.PI * 0.8, Math.PI * 0.1);
  cx.stroke();
  cx.restore();

  if (sc < 1) cx.restore();
}

// ============================================================
// Single crochet: two legs crossing, right over left
// Yarn goes down through stitch below, loops at bottom, comes up
// ============================================================
function drawSCStitch(x, y, w, h, color, scale) {
  const sc = scale === undefined ? 1 : scale;
  if (sc < 0.01) return;
  const mx = x + w/2;
  const my = y + h/2;

  if (sc < 1) {
    cx.save();
    cx.translate(mx, my); cx.scale(sc, sc); cx.translate(-mx, -my);
  }

  const darkCol = dk(color, 35);
  const shadowCol = ra(darkCol, 0.35);
  const legSpread = w * 0.32;
  const topY = y + h * 0.08;
  const botY = y + h * 0.88;
  const crossY = my - h * 0.02;  // crossing point

  // The two legs of the V, crossing at middle
  // Left leg: from top-left to bottom-center
  const leftLeg = [
    {x: mx - legSpread, y: topY},
    {x: mx - legSpread * 0.7, y: topY + (crossY - topY) * 0.4},
    {x: mx + legSpread * 0.1, y: crossY - h * 0.06},
    {x: mx, y: crossY}
  ];
  const leftLegLower = [
    {x: mx, y: crossY},
    {x: mx - legSpread * 0.05, y: crossY + (botY - crossY) * 0.3},
    {x: mx + w * 0.02, y: botY - h * 0.12},
    {x: mx, y: botY}
  ];

  // Right leg: from top-right to bottom-center
  const rightLeg = [
    {x: mx + legSpread, y: topY},
    {x: mx + legSpread * 0.7, y: topY + (crossY - topY) * 0.4},
    {x: mx - legSpread * 0.1, y: crossY - h * 0.06},
    {x: mx, y: crossY}
  ];
  const rightLegLower = [
    {x: mx, y: crossY},
    {x: mx + legSpread * 0.05, y: crossY + (botY - crossY) * 0.3},
    {x: mx - w * 0.02, y: botY - h * 0.12},
    {x: mx, y: botY}
  ];

  // Bottom loop: yarn loops at the very bottom
  const loopW = w * 0.18;
  const loopPts = [
    {x: mx, y: botY},
    {x: mx - loopW, y: botY + h * 0.08},
    {x: mx + loopW, y: botY + h * 0.08},
    {x: mx, y: botY}
  ];

  // -- Draw order for crossing: left leg UNDER, right leg OVER --

  // 1. Draw the left leg (goes under at crossing)
  // Left upper
  drawYarnBezier(leftLeg, dk(color, 8), shadowCol);
  // Left lower
  drawYarnBezier(leftLegLower, dk(color, 8), shadowCol);

  // 2. Bottom loop
  drawYarnBezier(loopPts, dk(color, 5), null);

  // 3. Erase / mask at crossing for the over-under illusion
  // Draw a small background patch at the crossing to break the under-strand
  cx.save();
  cx.globalCompositeOperation = 'destination-out';
  cx.beginPath();
  cx.ellipse(mx, crossY, YARN_W * 0.9, YARN_W * 1.1, Math.PI * 0.35, 0, Math.PI * 2);
  cx.fill();
  cx.globalCompositeOperation = 'source-over';
  cx.restore();

  // 3b. Redraw the left leg only at the crossing zone but darkened (shadow under)
  cx.save();
  cx.beginPath();
  cx.ellipse(mx, crossY, YARN_W * 0.9, YARN_W * 1.1, Math.PI * 0.35, 0, Math.PI * 2);
  cx.clip();
  // Shadow underneath
  cx.strokeStyle = ra(darkCol, 0.4);
  cx.lineWidth = YARN_W + 2;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(leftLeg[0].x, leftLeg[0].y);
  cx.bezierCurveTo(leftLeg[1].x, leftLeg[1].y, leftLeg[2].x, leftLeg[2].y, leftLeg[3].x, leftLeg[3].y);
  cx.stroke();
  // The under strand
  cx.strokeStyle = dk(color, 18);
  cx.lineWidth = YARN_W;
  cx.beginPath();
  cx.moveTo(leftLeg[0].x, leftLeg[0].y);
  cx.bezierCurveTo(leftLeg[1].x, leftLeg[1].y, leftLeg[2].x, leftLeg[2].y, leftLeg[3].x, leftLeg[3].y);
  cx.stroke();
  cx.restore();

  // 4. Draw the right leg ON TOP (goes over at crossing)
  drawYarnBezier(rightLeg, color, shadowCol);
  drawYarnBezier(rightLegLower, color, shadowCol);

  // 5. Highlight on the right (over) leg at the crossing
  cx.save();
  cx.strokeStyle = li(color, 35);
  cx.lineWidth = HILITE_OFF;
  cx.lineCap = 'round';
  cx.globalAlpha = 0.5;
  cx.beginPath();
  cx.moveTo(rightLeg[0].x - 0.8, rightLeg[0].y - 1);
  cx.bezierCurveTo(
    rightLeg[1].x - 0.8, rightLeg[1].y - 1,
    rightLeg[2].x - 0.8, rightLeg[2].y - 1,
    rightLeg[3].x - 0.8, rightLeg[3].y - 1
  );
  cx.stroke();
  cx.restore();

  // 6. Top bar: a small horizontal yarn connecting the two legs at top
  const barY = topY - h * 0.01;
  drawYarnBezier([
    {x: mx - legSpread - w * 0.04, y: barY},
    {x: mx - legSpread * 0.3, y: barY - h * 0.04},
    {x: mx + legSpread * 0.3, y: barY - h * 0.04},
    {x: mx + legSpread + w * 0.04, y: barY}
  ], color, null);

  if (sc < 1) cx.restore();
}

// ============================================================
// Dispatch stitch drawing
// ============================================================
function drawStitch(x, y, w, h, color, type, scale) {
  if (type === 'ch') {
    drawChainStitch(x, y, w, h, color, scale);
  } else {
    drawSCStitch(x, y, w, h, color, scale);
  }
}

// ============================================================
// Inter-row yarn connector: draw a yarn thread between rows
// ============================================================
function drawRowConnector(x1, y1, x2, y2, color) {
  const mx = (x1+x2)/2;
  const sag = Math.abs(y2-y1) * 0.15;
  drawYarnBezier([
    {x: x1, y: y1},
    {x: mx - sag, y: y1 + (y2-y1)*0.35},
    {x: mx + sag, y: y1 + (y2-y1)*0.65},
    {x: x2, y: y2}
  ], color, null);
}

// ============================================================
// Main draw
// ============================================================
function draw() {
  const dpr = window.devicePixelRatio || 1;
  const cw = C.clientWidth, ch = C.clientHeight;
  if (C.width !== cw*dpr || C.height !== ch*dpr) {
    C.width = cw*dpr; C.height = ch*dpr;
  }
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx.clearRect(0, 0, cw, ch);
  cx.fillStyle = '#FAF6F0';
  cx.fillRect(0, 0, cw, ch);

  if (S.fabric.length === 0) {
    cx.fillStyle = 'rgba(150,130,110,0.22)';
    cx.font = '14px -apple-system,system-ui,sans-serif';
    cx.textAlign = 'center';
    cx.fillText('Tap anywhere to begin', cw/2, ch/2);
    cx.fillText('Each tap adds one stitch', cw/2, ch/2+24);
    updateCt();
    return;
  }

  const bw = Math.max(20, Math.min(48, (cw - 28) / S.width));
  const fabricW = S.width * bw;
  const ox = (cw - fabricW) / 2;

  // Compute row positions (bottom-up layout, newest at bottom)
  const rys = [];
  let cum = 28 + S.panY;
  for (let r = 0; r < S.fabric.length; r++) {
    const row = S.fabric[r];
    let mh = ST.sc.h;
    for (const st of row) {
      const ti = ST[st.t] || ST.sc;
      if (ti.h > mh) mh = ti.h;
    }
    rys.push({y: cum, h: mh});
    cum += mh + 2;
  }

  // Auto-scroll
  const visBottom = ch - 8;
  if (cum > visBottom) {
    const over = cum - visBottom;
    if (S.panY > -over) S.panY = -over;
    cum = 28 + S.panY;
    for (let r = 0; r < S.fabric.length; r++) {
      rys[r].y = cum;
      cum += rys[r].h + 2;
    }
  }

  // Draw inter-row yarn connectors (behind stitches)
  for (let r = 1; r < S.fabric.length; r++) {
    const prevRow = S.fabric[r-1];
    const currRow = S.fabric[r];
    if (prevRow.length === 0 || currRow.length === 0) continue;
    // Connect last stitch of previous row to first stitch of current row
    const prevReversed = (r-1) % 2 === 1;
    const currReversed = r % 2 === 1;
    const prevLastCol = prevReversed ? 0 : prevRow.length - 1;
    const currFirstCol = currReversed ? S.width - 1 : 0;
    const prevXoff = prevReversed ? bw * 0.08 : 0;
    const currXoff = currReversed ? bw * 0.08 : 0;
    const px = ox + prevLastCol * bw + bw/2 + prevXoff;
    const py = rys[r-1].y + rys[r-1].h * 0.9;
    const nx = ox + currFirstCol * bw + bw/2 + currXoff;
    const ny = rys[r].y + rys[r].h * 0.1;
    const connColor = ra(PAL[prevRow[prevRow.length-1].c], 0.3);
    drawRowConnector(px, py, nx, ny, connColor);
  }

  // Draw each row of stitches
  for (let r = 0; r < S.fabric.length; r++) {
    const row = S.fabric[r];
    const ry = rys[r];
    const reversed = r % 2 === 1;
    const xoff = reversed ? bw * 0.08 : 0;

    for (let c = 0; c < row.length; c++) {
      const st = row[c];
      const ci = reversed ? (S.width - 1 - c) : c;
      const sx = ox + ci * bw + xoff;

      // Draw connecting yarn between stitches in the same row
      if (c > 0) {
        const prevCi = reversed ? (S.width - 1 - (c-1)) : (c-1);
        const prevX = ox + prevCi * bw + bw/2 + xoff;
        const currX = sx + bw/2;
        const connY = ry.y + ry.h * 0.06;
        const yarnCol = ra(PAL[st.c], 0.45);
        drawYarnBezier([
          {x: prevX, y: connY},
          {x: (prevX + currX)/2, y: connY - 3},
          {x: (prevX + currX)/2, y: connY - 3},
          {x: currX, y: connY}
        ], yarnCol, null);
      }

      drawStitch(sx, ry.y, bw - 1, ry.h, PAL[st.c], st.t, st.sc);
    }
  }

  // Crochet hook at current position
  const hr = S.row;
  const hc = hr % 2 === 1 ? (S.width - 1 - S.col) : S.col;
  const hoff = hr % 2 === 1 ? bw * 0.08 : 0;
  const hy = hr < rys.length ? rys[hr].y : cum;
  const hookX = ox + hc * bw + bw/2 + hoff;
  const hookY = hy - 2;

  // Draw hook
  cx.save();
  cx.translate(hookX, hookY);
  cx.strokeStyle = '#AAA'; cx.lineWidth = 2; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(0, 0); cx.lineTo(0, -12); cx.stroke();
  cx.beginPath(); cx.arc(2.5, 0, 2.5, Math.PI, Math.PI*0.3, true); cx.stroke();
  cx.strokeStyle = '#C89060'; cx.lineWidth = 3.5;
  cx.beginPath(); cx.moveTo(0, -12); cx.lineTo(0, -24); cx.stroke();
  cx.restore();

  // Yarn tail from hook to upper right
  cx.save();
  cx.strokeStyle = ra(PAL[S.color], 0.25);
  cx.lineWidth = 2; cx.lineCap = 'round'; cx.setLineDash([4, 5]);
  cx.beginPath();
  cx.moveTo(hookX, hookY);
  cx.quadraticCurveTo(cw - 18, hookY - 28, cw - 8, 12);
  cx.stroke();
  cx.setLineDash([]);
  cx.restore();

  updateCt();
}

function updateCt() {
  const total = S.fabric.reduce((a, r) => a + r.length, 0);
  const el = document.getElementById('ct');
  let txt = total + (total === 1 ? ' stitch' : ' stitches');
  if (S.total > total) txt += ' / ' + S.total + ' all time';
  el.textContent = txt;
}

// ============================================================
// Animation
// ============================================================
function animSt(st, dur) {
  return new Promise(resolve => {
    st.sc = 0.4;
    const t0 = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - t0) / dur);
      st.sc = 0.4 + 0.6 * (1 - Math.pow(1 - p, 3));
      draw();
      if (p < 1) requestAnimationFrame(tick);
      else { st.sc = 1; S.anim = false; resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

// ============================================================
// Add stitch
// ============================================================
let lastTap = 0;

function addStitch() {
  const now = Date.now();
  if (now - lastTap < 100) return;
  if (S.anim) return;
  lastTap = now;
  initA();
  S.anim = true;

  let type = S.type, color = S.color;

  if (S.pat && S.pat.getRow) {
    const info = S.pat.getRow(S.patRow);
    if (info) {
      type = info.t || type;
      color = info.c !== undefined ? info.c : color;
    }
  }

  if (!S.fabric[S.row]) S.fabric[S.row] = [];

  const st = {t: type, c: color, sc: 0.4};
  S.fabric[S.row].push(st);
  playPop();

  animSt(st, 160).then(() => {
    S.today++; S.total++; save();
    S.col++;

    if (S.col >= S.width) {
      playChime();
      showToast('Row ' + (S.row + 1) + ' complete');
      S.col = 0;
      S.row++;
      S.patRow++;

      if (S.pat && S.pat.totalRows && S.patRow >= S.pat.totalRows) {
        showToast(S.pat.name + ' finished!');
        stopAuto();
        return;
      }
    }

    if (S.auto) schedAuto();
  });
}

// ============================================================
// Toast
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

// ============================================================
// Auto crochet
// ============================================================
function toggleAuto() {
  if (S.auto) stopAuto(); else startAuto();
}
function startAuto() {
  initA(); S.auto = true;
  document.getElementById('bAuto').classList.add('on');
  document.getElementById('bAuto').textContent = 'Stop';
  schedAuto();
}
function stopAuto() {
  S.auto = false;
  if (S.autoTm) { clearTimeout(S.autoTm); S.autoTm = null; }
  document.getElementById('bAuto').classList.remove('on');
  document.getElementById('bAuto').textContent = 'Auto';
}
function schedAuto() {
  if (!S.auto) return;
  S.autoTm = setTimeout(() => {
    if (!S.auto) return;
    if (!S.anim) addStitch(); else schedAuto();
  }, S.autoMs);
}

// ============================================================
// Undo
// ============================================================
function undo() {
  if (S.auto) stopAuto();
  if (S.anim) return;
  if (S.fabric.length === 0) return;

  const last = S.fabric[S.row];
  if (last && last.length > 0) {
    last.pop();
    if (S.col > 0) S.col--;
  } else if (S.row > 0) {
    if (last && last.length === 0) S.fabric.pop();
    S.row--;
    if (S.patRow > 0) S.patRow--;
    const prev = S.fabric[S.row];
    if (prev && prev.length > 0) {
      prev.pop(); S.col = prev.length;
    } else {
      S.col = 0;
    }
  }
  draw();
}

// ============================================================
// UI builders
// ============================================================
function buildColors() {
  const el = document.getElementById('clr');
  el.innerHTML = '';
  PAL.forEach((c, i) => {
    const b = document.createElement('button');
    b.className = 'sw' + (i === S.color ? ' on' : '');
    if (i === 0 || i === 8) b.classList.add('pale');
    b.style.background = c;
    b.title = PNAME[i];
    b.addEventListener('click', () => { S.color = i; buildColors(); });
    el.appendChild(b);
  });
}

function buildTypes() {
  const el = document.getElementById('tps');
  el.innerHTML = '';
  TKEYS.forEach(k => {
    const b = document.createElement('button');
    b.className = 'tb' + (k === S.type ? ' on' : '');
    b.textContent = ST[k].label;
    b.addEventListener('click', () => { S.type = k; buildTypes(); });
    el.appendChild(b);
  });
}

// ============================================================
// Pattern selector
// ============================================================
function openPats() {
  const el = document.getElementById('pList');
  el.innerHTML = '';
  PATTERNS.forEach(p => {
    const d = document.createElement('div');
    d.className = 'pc';
    d.innerHTML = '<div class="nm">' + p.name + '</div><div class="ds">' + p.desc + '</div>';
    d.addEventListener('click', () => selPat(p));
    el.appendChild(d);
  });
  document.getElementById('oPat').classList.add('open');
}

function selPat(p) {
  stopAuto();
  S.pat = p.getRow !== undefined && p.name !== 'Free' ? p : null;
  S.width = p.width || 10;
  S.fabric = []; S.row = 0; S.col = 0; S.patRow = 0; S.panY = 0; S.anim = false;
  document.getElementById('oPat').classList.remove('open');
  draw();
}

// ============================================================
// Speed selector
// ============================================================
function openSpeed() {
  document.getElementById('oSpd').classList.add('open');
  document.querySelectorAll('.sp').forEach(b => {
    b.classList.toggle('on', parseInt(b.dataset.ms) === S.autoMs);
  });
}

// ============================================================
// Event wiring
// ============================================================
buildColors();
buildTypes();

C.addEventListener('click', e => { e.preventDefault(); if (!S.auto) addStitch(); });
C.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { e.preventDefault(); initA(); if (!S.auto) addStitch(); }
}, {passive: false});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); initA(); if (!S.auto) addStitch(); }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
  if (e.key === 'a') toggleAuto();
  const n = parseInt(e.key);
  if (n >= 1 && n <= TKEYS.length) { S.type = TKEYS[n-1]; buildTypes(); }
});

C.addEventListener('wheel', e => { S.panY -= e.deltaY * 0.5; draw(); }, {passive: true});

let tp = null;
C.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const t = e.touches[0];
    if (tp) { S.panY += t.clientY - tp.y; draw(); }
    tp = {x: t.clientX, y: t.clientY};
    e.preventDefault();
  }
}, {passive: false});
C.addEventListener('touchend', () => { tp = null; });

document.getElementById('bUndo').addEventListener('click', undo);
document.getElementById('bAuto').addEventListener('click', toggleAuto);
document.getElementById('bPat').addEventListener('click', openPats);
document.getElementById('cPat').addEventListener('click', () => {
  document.getElementById('oPat').classList.remove('open');
});

document.getElementById('bSnd').addEventListener('click', () => {
  initA(); S.sound = !S.sound;
  document.getElementById('bSnd').textContent = S.sound ? 'Sound' : 'Muted';
  save();
});
document.getElementById('bSnd').textContent = S.sound ? 'Sound' : 'Muted';

document.getElementById('bSpd').addEventListener('click', openSpeed);
document.querySelectorAll('.sp').forEach(b => {
  b.addEventListener('click', () => {
    S.autoMs = parseInt(b.dataset.ms);
    document.querySelectorAll('.sp').forEach(s =>
      s.classList.toggle('on', parseInt(s.dataset.ms) === S.autoMs));
    document.getElementById('oSpd').classList.remove('open');
  });
});
document.getElementById('cSpd').addEventListener('click', () => {
  document.getElementById('oSpd').classList.remove('open');
});

window.addEventListener('resize', () => draw());

setTimeout(draw, 0);
</script>
</body>
</html>
