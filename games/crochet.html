<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Cozy Crochet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;font-family:Georgia,serif}
body{display:flex;flex-direction:column;height:100dvh;
  background:#FAF6F0;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.035' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  color:#4A3A2A}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:999;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(40,30,20,0.12) 100%)}
.top{display:flex;justify-content:space-between;align-items:baseline;
  padding:10px 16px 8px;padding-top:max(10px,env(safe-area-inset-top));
  flex-shrink:0;z-index:10}
.top h1{font-size:1.05rem;font-weight:400;color:#6A5040;letter-spacing:0.02em}
.top .ct{font-size:0.7rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.main{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%}
.controls{flex-shrink:0;
  padding:10px 12px;
  padding-bottom:max(12px,calc(12px + env(safe-area-inset-bottom)));
  padding-left:max(12px,env(safe-area-inset-left));
  padding-right:max(12px,env(safe-area-inset-right));
  background:rgba(250,246,240,0.92);backdrop-filter:blur(10px);
  border-top:1px solid rgba(180,160,140,0.2)}
.colors{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;padding:0;outline:none}
.sw.on{transform:scale(1.2);box-shadow:0 0 0 2.5px #FAF6F0,0 0 0 4px #8A7A6A}
.types{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.tb{padding:5px 14px;border-radius:8px;border:1px solid rgba(160,140,120,0.3);
  background:transparent;cursor:pointer;font-size:0.72rem;color:#8A7A6A;
  font-family:-apple-system,system-ui,sans-serif;transition:all .15s;letter-spacing:0.03em}
.tb.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}
.acts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ab{padding:5px 14px;border-radius:8px;border:1px solid rgba(160,140,120,0.2);
  background:transparent;cursor:pointer;font-size:0.7rem;color:#9A8A7A;
  font-family:-apple-system,system-ui,sans-serif;transition:all .15s}
.ab:active{transform:scale(0.95)}
.ab.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}
.overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(40,30,20,0.45);backdrop-filter:blur(6px);
  align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{background:#FAF6F0;border-radius:14px;padding:20px;
  max-width:340px;width:88%;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.panel h2{font-size:0.95rem;text-align:center;margin-bottom:14px;color:#6A5040;font-weight:400}
.pc{padding:14px;border-radius:10px;border:1px solid rgba(160,140,120,0.2);
  margin-bottom:8px;cursor:pointer;background:transparent;transition:background .15s}
.pc:active{background:rgba(160,140,120,0.1)}
.pc .nm{font-size:0.82rem;color:#5A4A3A;margin-bottom:2px}
.pc .ds{font-size:0.68rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.cbtn{display:block;margin:10px auto 0;padding:8px 20px;border-radius:8px;
  border:1px solid rgba(160,140,120,0.2);background:none;cursor:pointer;
  font-size:0.78rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.sp{display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:8px;
  border:1px solid rgba(160,140,120,0.2);background:transparent;cursor:pointer;
  font-size:0.82rem;font-family:Georgia,serif;color:#6A5040}
.sp.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}
</style>
</head>
<body>
<div class="vignette"></div>
<div class="top">
  <h1>Cozy Crochet</h1>
  <span class="ct" id="ct">0 stitches</span>
</div>
<div class="main"><canvas id="C"></canvas></div>
<div class="controls">
  <div class="colors" id="clr"></div>
  <div class="types" id="tps"></div>
  <div class="acts">
    <button class="ab" id="bUndo">Undo</button>
    <button class="ab" id="bAuto">Auto</button>
    <button class="ab" id="bPat">Pattern</button>
    <button class="ab" id="bSnd">Sound</button>
  </div>
</div>
<div class="overlay" id="oPat">
  <div class="panel">
    <h2>Patterns</h2>
    <div id="pList"></div>
    <button class="cbtn" id="cPat">Close</button>
  </div>
</div>
<div class="overlay" id="oSpd">
  <div class="panel" style="max-width:260px">
    <h2>Auto Speed</h2>
    <button class="sp" data-ms="400">Meditative</button>
    <button class="sp on" data-ms="200">Steady</button>
    <button class="sp" data-ms="100">Quick</button>
    <button class="cbtn" id="cSpd">Close</button>
  </div>
</div>
<script>
// Cozy Crochet - A meditation app disguised as a crochet simulator

const C = document.getElementById('C'), cx = C.getContext('2d');
const PALETTE = ['#F0E4D0','#D4A0A0','#A8B89C','#D4A843','#8CA8B8',
  '#D08060','#B0A0C0','#B06040','#C8C4C0','#505050'];
const PNAMES = ['Cream','Blush','Sage','Honey','Dusty Blue',
  'Coral','Lavender','Clay','Cloud','Charcoal'];
const TYPES = {
  ch:{h:14,w:18,label:'ch'},sc:{h:22,w:20,label:'sc'},
  dc:{h:34,w:22,label:'dc'},tr:{h:46,w:24,label:'tr'}
};
const TKEYS = ['ch','sc','dc','tr'];
const PATTERNS = [
  {name:'Free',desc:'Freeform -- whatever you want',width:10,rows:null},
  {name:'Scarf',desc:'8 wide, single crochet, color bands every 4 rows',width:8,
    rows:(()=>{const r=[];for(let i=0;i<24;i++)r.push({t:'sc',c:i<4?1:i<8?3:i<12?1:i<16?3:i<20?1:3});return r})(),
    rowLen:8},
  {name:'Blanket',desc:'12 wide, rainbow stripes',width:12,
    rows:(()=>{const c=[1,5,3,6,4,0];const r=[];for(let i=0;i<18;i++)r.push({t:'sc',c:c[Math.floor(i/3)%c.length]});return r})(),
    rowLen:12},
  {name:'Granny Square',desc:'Double crochet clusters with chain gaps',width:10,
    rows:(()=>{const r=[];for(let i=0;i<12;i++){
      r.push({t:i%2===0?'dc':'ch',c:i<4?1:i<8?5:3});
    }return r})(),rowLen:10}
];

// State
const S = {
  type:'sc',color:1,fabric:[],row:0,col:0,width:10,
  auto:false,autoMs:200,autoTm:null,sound:true,
  panY:0,anim:false,pattern:null,patRow:0,
  today:0,total:0,lastColor:1
};

// Persistence
try{
  const d=JSON.parse(localStorage.getItem('cc_s'));
  if(d){S.total=d.t||0;S.sound=d.s!==false;S.lastColor=d.c||1;
    if(d.d===new Date().toDateString())S.today=d.n||0}
  S.color=S.lastColor;
}catch(e){}
function save(){try{localStorage.setItem('cc_s',JSON.stringify({
  t:S.total,s:S.sound,c:S.color,n:S.today,d:new Date().toDateString()
}))}catch(e){}}

// Color math
function hx(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rh(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function li(c,a){const[r,g,b]=hx(c);return rh(r+a,g+a,b+a)}
function dk(c,a){return li(c,-a)}
function ra(c,a){const[r,g,b]=hx(c);return`rgba(${r},${g},${b},${a})`}

// Audio
let ac=null;
function initA(){if(ac)return;ac=new(window.AudioContext||window.webkitAudioContext)()}
function pop(){
  if(!S.sound||!ac)return;
  const t=ac.currentTime;
  // Warm sine pop
  const o=ac.createOscillator(),g=ac.createGain();
  o.type='sine';o.frequency.value=600+Math.random()*200;
  g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.025);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.025);
  // Tiny noise texture
  const buf=ac.createBuffer(1,ac.sampleRate*0.02,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.3;
  const ns=ac.createBufferSource(),ng=ac.createGain();
  ns.buffer=buf;ng.gain.setValueAtTime(0.01,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.02);
  ns.connect(ng);ng.connect(ac.destination);ns.start(t);ns.stop(t+0.025);
}
function chime(){
  if(!S.sound||!ac)return;const t=ac.currentTime;
  [523,659,784].forEach((f,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.04,t+i*0.08);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.3+i*0.08);
    o.connect(g);g.connect(ac.destination);o.start(t+i*0.08);o.stop(t+0.3+i*0.08);
  });
}

// Stitch rendering - textured bumps
function drawStitch(x,y,w,h,color,type,sc){
  sc=sc===undefined?1:sc;
  if(sc<0.01)return;
  const needScale=sc<1;
  if(needScale){
    cx.save();
    const mx=x+w/2,my=y+h/2;
    cx.translate(mx,my);cx.scale(sc,sc);cx.translate(-mx,-my);
  }
  if(type==='ch'){drawChain(x,y,w,h,color)}
  else{drawBump(x,y,w,h,color,type)}
  if(needScale)cx.restore();
}

function drawChain(x,y,w,h,color){
  // Flat oval for chain stitches
  const mx=x+w/2,my=y+h/2;
  const grd=cx.createRadialGradient(mx,my-1,0,mx,my,w*0.4);
  grd.addColorStop(0,li(color,15));grd.addColorStop(0.7,color);grd.addColorStop(1,dk(color,10));
  cx.fillStyle=grd;
  cx.beginPath();
  cx.ellipse(mx,my,w*0.38,h*0.35,0,0,Math.PI*2);
  cx.fill();
  // Hole in center
  cx.fillStyle=dk(color,25);
  cx.beginPath();cx.ellipse(mx,my+0.5,w*0.15,h*0.12,0,0,Math.PI*2);cx.fill();
}

function drawBump(x,y,w,h,color,type){
  // Soft rounded bump with gradient shading
  const mx=x+w/2;
  const grd=cx.createRadialGradient(mx,y+h*0.35,0,mx,y+h*0.4,w*0.65);
  grd.addColorStop(0,li(color,22));
  grd.addColorStop(0.5,color);
  grd.addColorStop(1,dk(color,18));
  cx.fillStyle=grd;

  // Rounded bump shape
  cx.beginPath();
  cx.moveTo(x+1,y+h);
  cx.quadraticCurveTo(x,y+h*0.25,x+w*0.3,y+h*0.05);
  cx.quadraticCurveTo(mx,y-h*0.1,x+w*0.7,y+h*0.05);
  cx.quadraticCurveTo(x+w,y+h*0.25,x+w-1,y+h);
  cx.closePath();
  cx.fill();

  // V-line stitch legs
  cx.strokeStyle=ra(dk(color,25),0.5);
  cx.lineWidth=0.8;
  cx.beginPath();
  cx.moveTo(x+w*0.32,y+h*0.78);
  cx.lineTo(mx,y+h*0.22);
  cx.lineTo(x+w*0.68,y+h*0.78);
  cx.stroke();

  // Extra detail for dc/tr: yarn-over marks
  if(type==='dc'||type==='tr'){
    cx.strokeStyle=ra(li(color,20),0.4);
    cx.lineWidth=0.7;
    const wy=y+h*0.42;
    cx.beginPath();
    cx.moveTo(x+w*0.25,wy);
    cx.quadraticCurveTo(mx,wy+3,x+w*0.75,wy);
    cx.stroke();
  }
  if(type==='tr'){
    cx.strokeStyle=ra(li(color,20),0.35);
    const wy2=y+h*0.58;
    cx.beginPath();
    cx.moveTo(x+w*0.28,wy2);
    cx.quadraticCurveTo(mx,wy2+2.5,x+w*0.72,wy2);
    cx.stroke();
  }

  // Top highlight arc
  cx.strokeStyle=ra(li(color,35),0.3);
  cx.lineWidth=0.6;
  cx.beginPath();
  cx.arc(mx,y+h*0.3,w*0.22,-Math.PI*0.8,-Math.PI*0.2);
  cx.stroke();
}

// Main draw
function draw(){
  const dpr=window.devicePixelRatio||1;
  const cw=C.clientWidth,ch=C.clientHeight;
  if(C.width!==cw*dpr||C.height!==ch*dpr){C.width=cw*dpr;C.height=ch*dpr}
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.clearRect(0,0,cw,ch);
  cx.fillStyle='#FAF6F0';cx.fillRect(0,0,cw,ch);

  if(S.fabric.length===0){
    cx.fillStyle='rgba(150,130,110,0.25)';
    cx.font='14px -apple-system,system-ui,sans-serif';
    cx.textAlign='center';
    cx.fillText('Tap anywhere to begin',cw/2,ch/2);
    cx.fillText('Each tap adds one stitch',cw/2,ch/2+22);
    return;
  }

  const bw=Math.max(16,Math.min(40,(cw-32)/S.width));
  const fabricW=S.width*bw;
  const ox=(cw-fabricW)/2;

  // Compute row positions
  const rys=[];let cum=20+S.panY;
  for(let r=0;r<S.fabric.length;r++){
    const row=S.fabric[r];
    let mh=TYPES.sc.h;
    for(const st of row){const ti=TYPES[st.t]||TYPES.sc;if(ti.h>mh)mh=ti.h}
    rys.push({y:cum,h:mh});
    cum+=mh+1;
  }

  // Auto-scroll: keep newest row visible
  const visBottom=ch-10;
  if(cum>visBottom){
    const over=cum-visBottom;
    if(S.panY>-over)S.panY=-over;
    // Recompute
    cum=20+S.panY;
    for(let r=0;r<S.fabric.length;r++){
      rys[r].y=cum;cum+=rys[r].h+1;
    }
  }

  // Draw rows top-to-bottom (older rows behind, newer on top via overlap)
  for(let r=0;r<S.fabric.length;r++){
    const row=S.fabric[r];
    const ry=rys[r];
    const reversed=r%2===1;

    // Shadow line between rows
    if(r>0){
      cx.fillStyle='rgba(80,60,40,0.06)';
      cx.fillRect(ox,ry.y-1,fabricW,2);
    }

    for(let c=0;c<row.length;c++){
      const st=row[c];
      // Alternating row direction offset
      const ci=reversed?(S.width-1-c):c;
      const sx=ox+ci*bw;
      // Slight offset on odd rows
      const xoff=r%2===1?bw*0.15:0;
      const ti=TYPES[st.t]||TYPES.sc;
      drawStitch(sx+xoff,ry.y,bw-1,ry.h,PALETTE[st.c],st.t,st.s);
    }
  }

  // Hook indicator
  const hr=S.row;const hc=hr%2===1?(S.width-1-S.col):S.col;
  const hoff=hr%2===1?bw*0.15:0;
  let hy;
  if(hr<rys.length)hy=rys[hr].y;
  else hy=cum;
  const hookX=ox+hc*bw+bw/2+hoff;
  const hookY=hy-2;

  // Small crochet hook
  cx.save();cx.translate(hookX,hookY);
  cx.strokeStyle='#AAA';cx.lineWidth=2;cx.lineCap='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,-12);cx.stroke();
  cx.beginPath();cx.arc(2.5,0,2.5,Math.PI,Math.PI*0.3,true);cx.stroke();
  cx.strokeStyle='#C89060';cx.lineWidth=3.5;
  cx.beginPath();cx.moveTo(0,-12);cx.lineTo(0,-24);cx.stroke();
  cx.restore();

  // Yarn tail
  cx.strokeStyle=ra(PALETTE[S.color],0.3);
  cx.lineWidth=1.5;cx.lineCap='round';cx.setLineDash([3,4]);
  cx.beginPath();cx.moveTo(hookX,hookY);
  cx.quadraticCurveTo(cw-15,hookY-25,cw-8,15);cx.stroke();
  cx.setLineDash([]);

  updateCt();
}

function updateCt(){
  const total=S.fabric.reduce((a,r)=>a+r.length,0);
  const el=document.getElementById('ct');
  el.textContent=total+(total===1?' stitch':' stitches');
}

// Stitch animation
function animSt(st,dur){
  return new Promise(res=>{
    st.s=0.5;const t0=performance.now();
    (function tick(now){
      const p=Math.min(1,(now-t0)/dur);
      // Ease-out
      st.s=0.5+0.5*(1-Math.pow(1-p,3));
      draw();
      if(p<1)requestAnimationFrame(tick);
      else{st.s=1;S.anim=false;res()}
    })(t0);
  });
}

// Add one stitch
let lastStitchTime=0;
function addStitch(){
  const now=Date.now();
  if(now-lastStitchTime<100)return; // cooldown
  if(S.anim)return;
  lastStitchTime=now;
  initA();S.anim=true;

  let type=S.type,color=S.color;

  // Pattern-driven color/type
  if(S.pattern&&S.pattern.rows){
    const pidx=S.patRow%S.pattern.rows.length;
    const pr=S.pattern.rows[pidx];
    type=pr.t||type;color=pr.c!==undefined?pr.c:color;
  }

  if(!S.fabric[S.row])S.fabric[S.row]=[];
  const st={t:type,c:color,s:0.5};
  S.fabric[S.row].push(st);
  pop();

  animSt(st,150).then(()=>{
    S.today++;S.total++;S.lastColor=S.color;save();
    S.col++;
    if(S.col>=S.width){
      chime();
      S.col=0;S.row++;
      if(S.pattern&&S.pattern.rows){
        S.patRow++;
      }
    }
    if(S.auto)schedAuto();
  });
}

// Auto crochet
function toggleAuto(){
  if(S.auto)stopAuto();
  else startAuto();
}
function startAuto(){
  initA();S.auto=true;
  document.getElementById('bAuto').classList.add('on');
  document.getElementById('bAuto').textContent='Stop';
  schedAuto();
}
function stopAuto(){
  S.auto=false;
  if(S.autoTm){clearTimeout(S.autoTm);S.autoTm=null}
  document.getElementById('bAuto').classList.remove('on');
  document.getElementById('bAuto').textContent='Auto';
}
function schedAuto(){
  if(!S.auto)return;
  S.autoTm=setTimeout(()=>{
    if(!S.auto)return;
    if(!S.anim)addStitch();else schedAuto();
  },S.autoMs);
}

// Undo
function undo(){
  if(S.auto)stopAuto();if(S.anim)return;
  if(S.fabric.length===0)return;
  const last=S.fabric[S.row];
  if(last&&last.length>0){
    last.pop();if(S.col>0)S.col--;
  } else if(S.row>0){
    if(last&&last.length===0)S.fabric.pop();
    S.row--;
    if(S.pattern&&S.pattern.rows&&S.patRow>0)S.patRow--;
    const prev=S.fabric[S.row];
    if(prev&&prev.length>0){prev.pop();S.col=prev.length}
    else S.col=0;
  }
  draw();
}

// Build UI
function buildColors(){
  const el=document.getElementById('clr');el.innerHTML='';
  PALETTE.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='sw'+(i===S.color?' on':'');
    b.style.background=c;
    if(i===0)b.style.boxShadow=i===S.color?'0 0 0 2.5px #FAF6F0,0 0 0 4px #8A7A6A':'inset 0 0 0 1px rgba(160,140,120,0.3)';
    b.title=PNAMES[i];
    b.addEventListener('click',()=>{S.color=i;buildColors()});
    el.appendChild(b);
  });
}
function buildTypes(){
  const el=document.getElementById('tps');el.innerHTML='';
  TKEYS.forEach(k=>{
    const b=document.createElement('button');
    b.className='tb'+(k===S.type?' on':'');
    b.textContent=TYPES[k].label;
    b.addEventListener('click',()=>{S.type=k;buildTypes()});
    el.appendChild(b);
  });
}

// Pattern selector
function openPats(){
  const el=document.getElementById('pList');el.innerHTML='';
  PATTERNS.forEach(p=>{
    const d=document.createElement('div');d.className='pc';
    d.innerHTML='<div class="nm">'+p.name+'</div><div class="ds">'+p.desc+'</div>';
    d.addEventListener('click',()=>selPat(p));
    el.appendChild(d);
  });
  document.getElementById('oPat').classList.add('open');
}
function selPat(p){
  stopAuto();
  S.pattern=p.rows?p:null;
  S.width=p.width||10;
  S.fabric=[];S.row=0;S.col=0;S.patRow=0;S.panY=0;S.anim=false;
  document.getElementById('oPat').classList.remove('open');
  draw();
}

// Event wiring
buildColors();buildTypes();

C.addEventListener('click',e=>{e.preventDefault();if(!S.auto)addStitch()});
C.addEventListener('touchstart',e=>{
  if(e.touches.length===1){e.preventDefault();initA();if(!S.auto)addStitch()}
},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();initA();if(!S.auto)addStitch()}
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undo()}
  if(e.key==='a')toggleAuto();
});

// Scroll/pan
C.addEventListener('wheel',e=>{S.panY-=e.deltaY*0.5;draw()},{passive:true});
let tp=null;
C.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const t=e.touches[0];
    if(tp){S.panY+=t.clientY-tp.y;draw()}
    tp={x:t.clientX,y:t.clientY};e.preventDefault();
  }
},{passive:false});
C.addEventListener('touchend',()=>{tp=null});

document.getElementById('bUndo').addEventListener('click',undo);
document.getElementById('bAuto').addEventListener('click',()=>{
  // Long press opens speed, short tap toggles
  toggleAuto();
});

// Speed: tap Auto button area -- add a separate speed toggle via long-press on Auto
let autoLong=null;
document.getElementById('bAuto').addEventListener('contextmenu',e=>{
  e.preventDefault();
  document.getElementById('oSpd').classList.add('open');
  document.querySelectorAll('.sp').forEach(b=>{
    b.classList.toggle('on',parseInt(b.dataset.ms)===S.autoMs);
  });
});
document.querySelectorAll('.sp').forEach(b=>{
  b.addEventListener('click',()=>{
    S.autoMs=parseInt(b.dataset.ms);
    document.querySelectorAll('.sp').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.ms)===S.autoMs));
    document.getElementById('oSpd').classList.remove('open');
  });
});
document.getElementById('cSpd').addEventListener('click',()=>document.getElementById('oSpd').classList.remove('open'));

document.getElementById('bPat').addEventListener('click',openPats);
document.getElementById('cPat').addEventListener('click',()=>document.getElementById('oPat').classList.remove('open'));

document.getElementById('bSnd').addEventListener('click',()=>{
  initA();S.sound=!S.sound;
  document.getElementById('bSnd').textContent=S.sound?'Sound':'Muted';
  save();
});
document.getElementById('bSnd').textContent=S.sound?'Sound':'Muted';

window.addEventListener('resize',()=>draw());
setTimeout(draw,0);
</script>
</body>
</html>
