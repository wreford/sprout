<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Cozy Crochet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF6EC;--panel:#F5E6CC;--border:#D4C4A8;--text:#3A3028;--dim:#8A7A6A;
  --accent:#D4A0A0;--shadow:rgba(60,40,20,0.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Georgia',serif;
  overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
body{display:flex;flex-direction:column;height:100dvh}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(180deg,#FDF6EC 0%,#F5EBDA 100%)}

#back{position:fixed;top:max(10px,env(safe-area-inset-top));left:12px;z-index:100;
  color:var(--dim);text-decoration:none;font-size:0.85rem;font-family:-apple-system,sans-serif;opacity:0.7}

.top-bar{display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 6px 60px;padding-top:max(8px,env(safe-area-inset-top));
  flex-shrink:0;z-index:10;border-bottom:1px solid var(--border);
  background:rgba(245,230,204,0.9);backdrop-filter:blur(8px)}
.top-bar h1{font-size:1rem;font-weight:700;color:#5A4030}
.stats{font-size:0.7rem;color:var(--dim);text-align:right;line-height:1.5;font-family:-apple-system,sans-serif}

.main{flex:1;position:relative;overflow:hidden;z-index:1}
canvas#C{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}
canvas#preview3d{position:absolute;top:8px;right:8px;width:110px;height:110px;
  border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 12px var(--shadow);
  z-index:30;cursor:pointer;background:rgba(253,246,236,0.92);backdrop-filter:blur(4px)}
.row-flash{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:0.9rem;color:#5A4030;background:rgba(255,255,255,0.92);padding:8px 22px;
  border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;
  font-family:-apple-system,sans-serif;z-index:50;box-shadow:0 2px 16px var(--shadow)}
.row-flash.show{opacity:1}

.controls{flex-shrink:0;border-top:1px solid var(--border);
  background:rgba(245,230,204,0.95);backdrop-filter:blur(8px);
  padding:8px 10px;padding-bottom:max(10px,calc(10px + env(safe-area-inset-bottom)));
  padding-left:max(10px,env(safe-area-inset-left));
  padding-right:max(10px,env(safe-area-inset-right))}

.color-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:all .15s;box-shadow:0 1px 4px var(--shadow)}
.color-swatch.active{border-color:var(--text);transform:scale(1.15);box-shadow:0 2px 10px var(--shadow)}

.stitch-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.stitch-btn{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 14px;border-radius:12px;border:1px solid var(--border);
  background:#fff;cursor:pointer;transition:all .15s;min-width:60px;min-height:48px}
.stitch-btn.active{background:#5A4030;border-color:#5A4030;color:#fff}
.stitch-btn canvas{width:32px;height:24px;pointer-events:none}
.stitch-btn .lbl{font-size:0.6rem;font-family:-apple-system,sans-serif;text-transform:uppercase;letter-spacing:0.5px}

.action-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.action-btn{padding:6px 16px;border-radius:10px;border:1px solid var(--border);
  background:#fff;cursor:pointer;font-size:0.72rem;font-family:-apple-system,sans-serif;
  color:var(--dim);transition:all .15s;min-height:36px;min-width:48px;
  display:flex;align-items:center;justify-content:center}
.action-btn:active{transform:scale(0.95)}
.action-btn.auto-active{background:#5A4030;color:#fff;border-color:#5A4030}

/* Overlays */
.overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(60,40,20,0.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center}
.overlay.open{display:flex}
.overlay-panel{background:var(--bg);border-radius:16px;padding:20px;
  max-width:380px;width:90%;max-height:80vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.overlay-panel h2{font-size:1rem;text-align:center;margin-bottom:14px;color:#5A4030}
.pat-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;
  border:1px solid var(--border);margin-bottom:8px;cursor:pointer;background:#fff;min-height:48px}
.pat-card:active{transform:scale(0.98)}
.pat-card .icon{font-size:1.4rem;width:36px;text-align:center}
.pat-card .info{flex:1}
.pat-card .info .name{font-size:0.85rem;font-weight:600}
.pat-card .info .desc{font-size:0.68rem;color:var(--dim);font-family:-apple-system,sans-serif}
.pat-card .badge{font-size:0.65rem;color:#8A9A7C;font-family:-apple-system,sans-serif}
.close-btn{display:block;margin:10px auto 0;padding:8px 24px;border-radius:10px;
  border:1px solid var(--border);background:none;cursor:pointer;font-size:0.8rem;color:var(--dim);min-height:44px}

.speed-option{display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:10px;
  border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.85rem;
  font-family:inherit;min-height:48px}
.speed-option.active{background:#5A4030;color:#fff;border-color:#5A4030}

.complete-card{background:var(--bg);border-radius:16px;padding:28px;text-align:center;
  max-width:320px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.complete-card h2{font-size:1.2rem;color:#5A4030;margin-bottom:6px}
.complete-card p{font-size:0.8rem;color:var(--dim);margin-bottom:16px;font-family:-apple-system,sans-serif}
.complete-card .emoji{font-size:2.5rem;margin-bottom:10px}
.complete-card button{padding:10px 28px;border-radius:12px;border:1px solid var(--border);
  background:#5A4030;color:#fff;cursor:pointer;font-size:0.85rem;font-family:inherit;min-height:48px}

.pattern-bar{display:none;padding:6px 14px;background:rgba(255,255,255,0.7);
  border-bottom:1px solid var(--border);font-size:0.75rem;font-family:-apple-system,sans-serif;
  text-align:center;line-height:1.6;flex-shrink:0;z-index:10}
.pattern-bar.visible{display:block}
.pattern-bar .label{font-weight:600;color:#5A4030}
.pattern-bar .instruction{color:var(--dim)}

@media(max-width:500px){
  .stitch-btn{min-width:52px;padding:6px 10px}
  .color-swatch{width:30px;height:30px}
}
</style>
</head>
<body>
<a href="games.html" id="back">&larr; games</a>

<div class="top-bar">
  <h1>Cozy Crochet</h1>
  <div class="stats" id="stats">Row 1 | Stitch 0</div>
</div>

<div class="pattern-bar" id="patternBar">
  <span class="label" id="patLabel">Scarf</span> --
  <span class="instruction" id="patInstruction">Row 1</span>
</div>

<div class="main">
  <canvas id="C"></canvas>
  <canvas id="preview3d" width="220" height="220"></canvas>
  <div class="row-flash" id="rowFlash">Row complete!</div>
</div>

<div class="controls">
  <div class="color-row" id="colorRow"></div>
  <div class="stitch-row" id="stitchRow"></div>
  <div class="action-row">
    <button class="action-btn" id="undoBtn">Undo</button>
    <button class="action-btn" id="clearBtn">Clear</button>
    <button class="action-btn" id="autoBtn">Auto</button>
    <button class="action-btn" id="patternBtn">Patterns</button>
    <button class="action-btn" id="sndBtn">Sound</button>
    <button class="action-btn" id="speedBtn">Speed</button>
  </div>
</div>

<div class="overlay" id="patternSelect">
  <div class="overlay-panel">
    <h2>Choose a Pattern</h2>
    <div id="patList"></div>
    <button class="close-btn" id="closePat">Close</button>
  </div>
</div>

<div class="overlay" id="speedSelect">
  <div class="overlay-panel" style="max-width:280px">
    <h2>Auto-Crochet Speed</h2>
    <button class="speed-option" data-speed="0">Slow (meditative)</button>
    <button class="speed-option active" data-speed="1">Medium</button>
    <button class="speed-option" data-speed="2">Fast</button>
    <button class="close-btn" id="closeSpeed">Close</button>

</div>

<div class="overlay" id="completeOverlay">
  <div class="complete-card">
    <div class="emoji" id="completeEmoji">!</div>
    <h2 id="completeTitle">Pattern Complete!</h2>
    <p id="completeDesc">You finished the pattern!</p>
    <button id="completeClose">Continue</button>
  </div>
</div>

<script>
// ============================================================
// COZY CROCHET - Complete Rewrite with Actual Yarn Rendering
// ============================================================

const C = document.getElementById('C'), ctx = C.getContext('2d');
const prevC = document.getElementById('preview3d'), prevCtx = prevC.getContext('2d');

// -- Colors and stitch types --
const COLORS = ['#F5E6CC','#D4A0A0','#A8B89C','#D4A843','#3A4A5C','#E07050','#B8A0C8','#B05A3A','#7CB4C4','#4A4A4A'];
const COLOR_NAMES = ['Cream','Rose','Sage','Mustard','Navy','Coral','Lavender','Rust','Sky','Charcoal'];
const STITCH_TYPES = [
  {id:'ch', label:'Chain',  h:30, w:48},
  {id:'sc', label:'Single', h:50, w:48},
  {id:'dc', label:'Double', h:70, w:48},
];

// -- Patterns --
const PATTERNS = [
  {name:'Scarf', icon:'S', desc:'Cozy scarf - 8 wide, sc rows.', width:8,
    autoColors:[1,1,3,3,1,1,3,3],
    rows:(()=>{const r=[];r.push(Array(8).fill('ch'));for(let i=0;i<20;i++) r.push(Array(8).fill('sc'));return r})()},
  {name:'Granny Square', icon:'G', desc:'Open lacework with dc clusters.', width:10,
    autoColors:[1,5,3],
    rows:[
      Array(10).fill('ch'),
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch'],
    ]},
  {name:'Ripple Blanket', icon:'R', desc:'Chevron zigzag - increases and decreases.', width:12,
    autoColors:[1,2,6,4],
    rows:(()=>{const r=[];r.push(Array(12).fill('ch'));
      for(let i=0;i<16;i++) r.push(['sc','sc','dc','dc','dc','dc','dc','dc','dc','dc','sc','sc']);
      return r})()},
  {name:'Heart', icon:'H', desc:'Amigurumi heart shape.', width:8, isAmigurumi:true,
    autoColors:[5],
    rounds:[Array(6).fill('sc'),Array(12).fill('sc'),Array(12).fill('sc'),
      Array(12).fill('sc'),Array(12).fill('sc'),Array(8).fill('sc'),Array(6).fill('sc')]},
  {name:'Coaster', icon:'O', desc:'Simple circular disc.', width:8, isAmigurumi:true,
    autoColors:[2],
    rounds:[Array(6).fill('sc'),Array(12).fill('sc'),Array(18).fill('sc'),Array(24).fill('sc')]},
];

// -- State --
let state = {
  mode:'free', stitchType:'sc', colorIdx:1,
  fabric:[], currentRow:0, currentCol:0, rowWidth:8,
  autoSpeed:1, soundOn:true, animating:false,
  hookX:0, hookY:0, scrollY:0,
  activePattern:null, patternRow:0, patternCol:0,
  amiPattern:null, amiRound:0, amiStitch:0, rounds:[],
  todayStitches:0, allTimeStitches:0, completedPatterns:[],
  autoCrochet:false, autoTimer:null,
  previewAngle:0, animPhase:0, animStitch:null,
  panX:0, panY:0,
};

// Load saved
try {
  const s = JSON.parse(localStorage.getItem('crochet_stats'));
  if (s) {
    state.allTimeStitches = s.all || 0;
    state.completedPatterns = s.completed || [];
    if (s.day === new Date().toDateString()) state.todayStitches = s.today || 0;
  }
} catch(e) {}

function saveStats() {
  try { localStorage.setItem('crochet_stats', JSON.stringify({
    all: state.allTimeStitches, today: state.todayStitches,
    day: new Date().toDateString(), completed: state.completedPatterns
  })); } catch(e) {}
}

// ============================================================
// COLOR UTILITIES
// ============================================================
function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r+amt); g = Math.min(255, g+amt); b = Math.min(255, b+amt);
  return '#'+[r,g,b].map(v=>Math.max(0,v).toString(16).padStart(2,'0')).join('');
}
function darken(hex, amt) { return lighten(hex, -amt); }
function colorWithAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ============================================================
// YARN RENDERING - The core innovation
// ============================================================

// Draw yarn as a thick bezier curve with 3D highlight
function drawYarnPath(c, points, color, thickness) {
  if (points.length < 2) return;
  c.save();
  c.lineCap = 'round';
  c.lineJoin = 'round';

  // Shadow underneath
  c.strokeStyle = colorWithAlpha(darken(color, 60), 0.2);
  c.lineWidth = thickness + 2;
  c.beginPath();
  c.moveTo(points[0].x + 1, points[0].y + 1.5);
  for (let i = 1; i < points.length - 1; i++) {
    const xc = (points[i].x + points[i+1].x) / 2 + 1;
    const yc = (points[i].y + points[i+1].y) / 2 + 1.5;
    c.quadraticCurveTo(points[i].x + 1, points[i].y + 1.5, xc, yc);
  }
  c.lineTo(points[points.length-1].x + 1, points[points.length-1].y + 1.5);
  c.stroke();

  // Main yarn body
  c.strokeStyle = color;
  c.lineWidth = thickness;
  c.beginPath();
  c.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length - 1; i++) {
    const xc = (points[i].x + points[i+1].x) / 2;
    const yc = (points[i].y + points[i+1].y) / 2;
    c.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
  }
  c.lineTo(points[points.length-1].x, points[points.length-1].y);
  c.stroke();

  // Highlight (lighter stripe offset for 3D)
  c.strokeStyle = lighten(color, 40);
  c.lineWidth = thickness * 0.25;
  c.beginPath();
  const off = -thickness * 0.2;
  c.moveTo(points[0].x + off, points[0].y + off * 0.5);
  for (let i = 1; i < points.length - 1; i++) {
    const xc = (points[i].x + points[i+1].x) / 2 + off;
    const yc = (points[i].y + points[i+1].y) / 2 + off * 0.5;
    c.quadraticCurveTo(points[i].x + off, points[i].y + off * 0.5, xc, yc);
  }
  c.lineTo(points[points.length-1].x + off, points[points.length-1].y + off * 0.5);
  c.stroke();

  c.restore();
}

// Draw a CHAIN STITCH - interlocking oval loops
function drawChainStitch(c, cx, cy, color, scale) {
  c.save();
  c.translate(cx, cy);
  c.scale(scale, scale);
  const w = 20, h = 14, thick = 4;

  // The chain loop - an oval that looks like one link
  // Back of the loop (behind the next chain)
  const pts1 = [];
  for (let t = 0; t <= 1; t += 0.08) {
    const angle = t * Math.PI * 2;
    pts1.push({ x: Math.cos(angle) * w * 0.45, y: Math.sin(angle) * h * 0.5 });
  }
  pts1.push(pts1[0]); // close

  // Draw the back half first (bottom)
  c.strokeStyle = darken(color, 20);
  c.lineWidth = thick + 1;
  c.lineCap = 'round';
  c.beginPath();
  for (let i = 6; i <= 9; i++) {
    if (i === 6) c.moveTo(pts1[i].x, pts1[i].y);
    else c.lineTo(pts1[i].x, pts1[i].y);
  }
  c.stroke();

  // Main loop
  drawYarnPath(c, pts1, color, thick);

  c.restore();
}

// Draw a SINGLE CROCHET - V shape with yarn going through
function drawSingleCrochet(c, cx, cy, color, scale) {
  c.save();
  c.translate(cx, cy);
  c.scale(scale, scale);
  const w = 40, h = 44, thick = 4.5;

  // The two legs of the V going down into fabric below
  // Left leg
  const leftLeg = [
    {x: -w*0.38, y: -h*0.4},
    {x: -w*0.22, y: -h*0.1},
    {x: -w*0.05, y: h*0.15},
    {x: 0, y: h*0.35},
  ];
  // Right leg
  const rightLeg = [
    {x: w*0.38, y: -h*0.4},
    {x: w*0.22, y: -h*0.1},
    {x: w*0.05, y: h*0.15},
    {x: 0, y: h*0.35},
  ];

  // Connecting bar at top
  const topBar = [
    {x: -w*0.42, y: -h*0.42},
    {x: -w*0.2, y: -h*0.46},
    {x: 0, y: -h*0.44},
    {x: w*0.2, y: -h*0.46},
    {x: w*0.42, y: -h*0.42},
  ];

  // Draw right leg first (behind)
  drawYarnPath(c, rightLeg, darken(color, 8), thick);
  // Draw left leg (in front)
  drawYarnPath(c, leftLeg, color, thick);
  // Connecting bar
  drawYarnPath(c, topBar, lighten(color, 5), thick * 0.9);

  // Small loop at bottom where yarn pulls through
  c.strokeStyle = darken(color, 15);
  c.lineWidth = thick * 0.7;
  c.lineCap = 'round';
  c.beginPath();
  c.arc(0, h * 0.38, 4, 0, Math.PI);
  c.stroke();

  c.restore();
}

// Draw a DOUBLE CROCHET - taller V with visible yarn-over
function drawDoubleCrochet(c, cx, cy, color, scale) {
  c.save();
  c.translate(cx, cy);
  c.scale(scale, scale);
  const w = 42, h = 62, thick = 4.5;

  // Taller V with post
  const leftLeg = [
    {x: -w*0.35, y: -h*0.38},
    {x: -w*0.18, y: -h*0.12},
    {x: -w*0.06, y: h*0.1},
    {x: 0, y: h*0.32},
  ];
  const rightLeg = [
    {x: w*0.35, y: -h*0.38},
    {x: w*0.18, y: -h*0.12},
    {x: w*0.06, y: h*0.1},
    {x: 0, y: h*0.32},
  ];

  // Top bar
  const topBar = [
    {x: -w*0.4, y: -h*0.4},
    {x: -w*0.15, y: -h*0.43},
    {x: 0, y: -h*0.41},
    {x: w*0.15, y: -h*0.43},
    {x: w*0.4, y: -h*0.4},
  ];

  // Yarn-over wrap across the middle
  const yarnOver = [
    {x: -w*0.22, y: -h*0.12},
    {x: -w*0.08, y: -h*0.16},
    {x: w*0.08, y: -h*0.16},
    {x: w*0.22, y: -h*0.12},
  ];

  // Draw
  drawYarnPath(c, rightLeg, darken(color, 8), thick);
  drawYarnPath(c, leftLeg, color, thick);
  drawYarnPath(c, topBar, lighten(color, 5), thick * 0.9);
  drawYarnPath(c, yarnOver, lighten(color, 12), thick * 0.75);

  // Bottom loop
  c.strokeStyle = darken(color, 15);
  c.lineWidth = thick * 0.7;
  c.lineCap = 'round';
  c.beginPath();
  c.arc(0, h * 0.36, 5, 0, Math.PI);
  c.stroke();

  c.restore();
}

// Dispatch stitch drawing
function drawStitch(c, cx, cy, type, color, scale) {
  scale = scale || 1;
  if (scale < 0.05) return;
  switch(type) {
    case 'ch': drawChainStitch(c, cx, cy, color, scale); break;
    case 'sc': drawSingleCrochet(c, cx, cy, color, scale); break;
    case 'dc': drawDoubleCrochet(c, cx, cy, color, scale); break;
    default: drawSingleCrochet(c, cx, cy, color, scale);
  }
}

// ============================================================
// STITCH DIMENSIONS
// ============================================================
const SW = 48, SH_MAP = {ch: 30, sc: 50, dc: 70};
function stitchH(type) { return SH_MAP[type] || 50; }

// ============================================================
// CROCHET HOOK
// ============================================================
function drawHook(c, x, y, angle) {
  c.save();
  c.translate(x, y);
  c.rotate(angle || 0);

  // Shaft
  c.strokeStyle = '#888';
  c.lineWidth = 3;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(0, -20); c.lineTo(0, 10);
  c.stroke();
  // Hook tip
  c.beginPath();
  c.arc(4, 10, 4, Math.PI, Math.PI * 0.3, true);
  c.stroke();
  // Handle
  c.strokeStyle = '#C89060';
  c.lineWidth = 5;
  c.beginPath();
  c.moveTo(0, -20); c.lineTo(0, -42);
  c.stroke();
  // Grip
  c.strokeStyle = '#D4A878';
  c.lineWidth = 6;
  c.beginPath();
  c.moveTo(0, -35); c.lineTo(0, -42);
  c.stroke();

  c.restore();
}

// ============================================================
// YARN BALL
// ============================================================
function drawYarnBall(c, x, y, color, hookTarget) {
  c.save();
  c.translate(x, y);
  const r = 20;

  // Shadow
  c.fillStyle = 'rgba(0,0,0,0.08)';
  c.beginPath();
  c.ellipse(2, r + 3, r * 0.8, 4, 0, 0, Math.PI * 2);
  c.fill();

  // Ball
  c.fillStyle = color;
  c.beginPath();
  c.arc(0, 0, r, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = darken(color, 25);
  c.lineWidth = 1;
  c.stroke();

  // Texture wraps
  c.strokeStyle = darken(color, 15);
  c.lineWidth = 0.8;
  for (let i = 0; i < 5; i++) {
    c.beginPath();
    c.ellipse(0, 0, r * 0.85, r * 0.35, i * 0.6, 0, Math.PI * 2);
    c.stroke();
  }

  // Highlight
  c.fillStyle = 'rgba(255,255,255,0.3)';
  c.beginPath();
  c.ellipse(-r * 0.25, -r * 0.25, r * 0.25, r * 0.15, -0.5, 0, Math.PI * 2);
  c.fill();

  // Trailing yarn to hook
  if (hookTarget) {
    const tx = hookTarget.x - x, ty = hookTarget.y - y;
    c.strokeStyle = color;
    c.lineWidth = 3;
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(r * 0.7, r * 0.3);
    c.quadraticCurveTo(r * 1.5, r + 15, tx, ty);
    c.stroke();
    // Edge highlight
    c.strokeStyle = lighten(color, 30);
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(r * 0.7 - 1, r * 0.3 - 1);
    c.quadraticCurveTo(r * 1.5 - 1, r + 14, tx - 1, ty - 1);
    c.stroke();
  }
  c.restore();
}

// ============================================================
// ANIMATION - Mesmerizing stitch formation
// ============================================================

// Animate a new stitch being formed
// Returns a promise that resolves when animation completes
function animateStitchFormation(stitchData, duration) {
  return new Promise(resolve => {
    const start = performance.now();
    state.animStitch = { data: stitchData, progress: 0 };

    function tick(now) {
      const p = Math.min(1, (now - start) / duration);
      // Ease out cubic
      const ease = 1 - Math.pow(1 - p, 3);
      state.animStitch.progress = ease;

      // Scale: start small, overshoot slightly, settle
      if (p < 0.7) {
        stitchData.scale = ease * 1.05;
      } else {
        const settle = (p - 0.7) / 0.3;
        stitchData.scale = 1.05 - 0.05 * settle;
      }

      draw();

      if (p < 1) {
        requestAnimationFrame(tick);
      } else {
        stitchData.scale = 1;
        state.animStitch = null;
        state.animating = false;
        resolve();
      }
    }
    requestAnimationFrame(tick);
  });
}

// ============================================================
// LAYOUT
// ============================================================
function getFabricLayout() {
  const cw = C.clientWidth, ch = C.clientHeight;
  const fw = state.rowWidth * SW;
  const ox = (cw - fw) / 2 + SW / 2 + state.panX;
  let oy = 40 + state.panY;

  // Calculate row heights
  const rows = [];
  let y = oy;
  for (let r = 0; r <= state.currentRow; r++) {
    const rowStitches = state.fabric.filter(s => s.row === r);
    if (rowStitches.length === 0) continue;
    const maxH = Math.max(...rowStitches.map(s => stitchH(s.type)));
    rows.push({ y: y, h: maxH, stitches: rowStitches });
    y += maxH + 4;
  }
  return { ox, oy, rows, totalH: y - oy };
}

function getAmiLayout() {
  const cw = C.clientWidth, ch = C.clientHeight;
  return { cx: cw / 2 + state.panX, cy: ch / 2 + state.panY };
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  const dpr = window.devicePixelRatio || 1;
  const cw = C.clientWidth, ch = C.clientHeight;
  if (C.width !== cw * dpr || C.height !== ch * dpr) {
    C.width = cw * dpr;
    C.height = ch * dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cw, ch);

  // Background texture - subtle linen
  ctx.fillStyle = 'rgba(200,180,150,0.04)';
  for (let x = 0; x < cw; x += 16) {
    for (let y = 0; y < ch; y += 16) {
      if ((x + y) % 32 === 0) ctx.fillRect(x, y, 1, 1);
    }
  }

  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);
  if (isAmi) {
    drawAmigurumiFabric(cw, ch);
  } else {
    drawFlatFabric(cw, ch);
  }

  // Yarn ball
  const yarnColor = COLORS[state.colorIdx];
  drawYarnBall(ctx, cw - 45, 50, yarnColor, {x: state.hookX, y: state.hookY});

  updateStats();
}

function drawFlatFabric(cw, ch) {
  const layout = getFabricLayout();

  // Draw each row
  layout.rows.forEach((row, ri) => {
    const reversed = ri % 2 === 1;

    // Subtle shadow between rows
    ctx.fillStyle = 'rgba(60,40,20,0.03)';
    ctx.fillRect(layout.ox - SW / 2 - 5, row.y + row.h / 2, state.rowWidth * SW + 10, 3);

    row.stitches.forEach(s => {
      const col = reversed ? state.rowWidth - 1 - s.col : s.col;
      const sx = layout.ox + col * SW;
      const sy = row.y;
      drawStitch(ctx, sx, sy, s.type, COLORS[s.color], s.scale || 1);
    });
  });

  // Hook position
  const hookRow = state.currentRow;
  const hookCol = hookRow % 2 === 1 ? state.rowWidth - 1 - state.currentCol : state.currentCol;
  let hookY = layout.rows.length > 0 ?
    layout.rows[layout.rows.length - 1].y + layout.rows[layout.rows.length - 1].h + 4 : layout.oy;
  // If we're still in the same row as last stitch
  if (layout.rows.length > 0) {
    const lastRow = layout.rows[layout.rows.length - 1];
    const lastRowIdx = lastRow.stitches.length > 0 ? lastRow.stitches[0].row : -1;
    if (lastRowIdx === state.currentRow) {
      hookY = lastRow.y;
    }
  }
  const hookX = layout.ox + hookCol * SW;
  state.hookX = hookX;
  state.hookY = hookY - 30;
  drawHook(ctx, hookX, hookY - 15, 0);

  // Auto-scroll: if hook goes below visible area
  if (hookY > ch - 180) {
    state.panY -= 2;
  }
}

function drawAmigurumiFabric(cw, ch) {
  const { cx, cy } = getAmiLayout();

  state.rounds.forEach((round, ri) => {
    const count = round.length;
    const radius = 30 + ri * 24;
    round.forEach((s, si) => {
      const angle = (si / count) * Math.PI * 2 - Math.PI / 2;
      const sx = cx + Math.cos(angle) * radius;
      const sy = cy + Math.sin(angle) * radius;
      drawStitch(ctx, sx, sy, s.type, COLORS[s.color], s.scale || 1);
    });
  });

  // Hook at next position
  const curRound = state.rounds.length;
  const pat = state.amiPattern || state.activePattern;
  const nextCount = pat && pat.rounds[curRound] ? pat.rounds[curRound].length : 6 + curRound * 6;
  const radius = 30 + curRound * 24;
  const angle = (state.amiStitch / nextCount) * Math.PI * 2 - Math.PI / 2;
  const hx = cx + Math.cos(angle) * radius;
  const hy = cy + Math.sin(angle) * radius;
  state.hookX = hx; state.hookY = hy - 30;
  drawHook(ctx, hx, hy - 15, angle + Math.PI / 2);
}

// ============================================================
// 3D PREVIEW
// ============================================================
function draw3DPreview() {
  const sz = 110;
  const dpr = window.devicePixelRatio || 1;
  if (prevC.width !== sz * dpr) {
    prevC.width = sz * dpr;
    prevC.height = sz * dpr;
    prevC.style.width = sz + 'px';
    prevC.style.height = sz + 'px';
  }
  prevCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  prevCtx.clearRect(0, 0, sz, sz);

  const totalStitches = state.fabric.length + state.rounds.reduce((a, r) => a + r.length, 0);
  if (totalStitches === 0) {
    prevCtx.fillStyle = 'rgba(90,64,48,0.25)';
    prevCtx.font = '10px -apple-system, sans-serif';
    prevCtx.textAlign = 'center';
    prevCtx.fillText('3D Preview', sz / 2, sz / 2);
    return;
  }

  state.previewAngle += 0.008;
  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);

  if (isAmi) {
    draw3DAmi(sz);
  } else {
    draw3DFlat(sz);
  }
}

function draw3DFlat(sz) {
  prevCtx.save();
  const cx = sz / 2, cy = sz / 2;
  const angle = state.previewAngle;

  // Collect row colors
  const rowColors = [];
  for (let r = 0; r <= state.currentRow; r++) {
    const rs = state.fabric.filter(s => s.row === r);
    if (rs.length > 0) rowColors.push(COLORS[rs[0].color]);
  }
  if (rowColors.length === 0) { prevCtx.restore(); return; }

  const pw = sz * 0.6;
  const ph = sz * 0.45;
  const tilt = 0.55; // How much it tilts toward viewer
  const wobble = Math.sin(angle) * 0.08;

  prevCtx.translate(cx, cy + 5);

  // Shadow
  prevCtx.fillStyle = 'rgba(0,0,0,0.08)';
  prevCtx.beginPath();
  prevCtx.ellipse(3, ph * tilt * 0.5 + 8, pw * 0.5, 6, 0, 0, Math.PI * 2);
  prevCtx.fill();

  // Draw tilted rectangle with stitch texture
  const rh = ph * tilt / Math.max(rowColors.length, 1);
  const startY = -ph * tilt * 0.5;

  rowColors.forEach((col, i) => {
    const y = startY + i * rh;
    const xSkew = wobble * (y + ph * tilt * 0.5);

    // Row stripe
    prevCtx.fillStyle = col;
    prevCtx.beginPath();
    prevCtx.moveTo(-pw/2 + xSkew, y);
    prevCtx.lineTo(pw/2 + xSkew, y);
    prevCtx.lineTo(pw/2 + xSkew + wobble * rh, y + rh);
    prevCtx.lineTo(-pw/2 + xSkew + wobble * rh, y + rh);
    prevCtx.closePath();
    prevCtx.fill();

    // Stitch V texture
    const cols = Math.min(state.rowWidth, 8);
    const cw2 = pw / cols;
    prevCtx.strokeStyle = darken(col, 18);
    prevCtx.lineWidth = 0.6;
    for (let j = 0; j < cols; j++) {
      const tx = -pw/2 + j * cw2 + cw2 / 2 + xSkew + wobble * rh * 0.5;
      const ty = y + rh * 0.5;
      // Tiny V shape
      prevCtx.beginPath();
      prevCtx.moveTo(tx - 2, ty - rh * 0.3);
      prevCtx.lineTo(tx, ty + rh * 0.2);
      prevCtx.lineTo(tx + 2, ty - rh * 0.3);
      prevCtx.stroke();
    }
  });

  // Border
  prevCtx.strokeStyle = 'rgba(90,64,48,0.2)';
  prevCtx.lineWidth = 0.8;
  const totalPH = rowColors.length * rh;
  prevCtx.beginPath();
  prevCtx.moveTo(-pw/2, startY);
  prevCtx.lineTo(pw/2, startY);
  prevCtx.lineTo(pw/2 + wobble * totalPH, startY + totalPH);
  prevCtx.lineTo(-pw/2 + wobble * totalPH, startY + totalPH);
  prevCtx.closePath();
  prevCtx.stroke();

  prevCtx.restore();
}

function draw3DAmi(sz) {
  prevCtx.save();
  const cx = sz / 2, cy = sz / 2;
  const totalRounds = state.rounds.length;
  if (totalRounds === 0) { prevCtx.restore(); return; }

  const pat = state.amiPattern || state.activePattern;
  const maxRounds = pat ? pat.rounds.length : 7;
  const progress = Math.min(1, totalRounds / maxRounds);
  const r = sz * 0.32 * progress + sz * 0.06;

  prevCtx.translate(cx, cy);

  // Shadow
  prevCtx.fillStyle = 'rgba(0,0,0,0.06)';
  prevCtx.beginPath();
  prevCtx.ellipse(2, r + 5, r * 0.7, r * 0.2, 0, 0, Math.PI * 2);
  prevCtx.fill();

  const mainColor = COLORS[state.rounds[0] && state.rounds[0][0] ? state.rounds[0][0].color : state.colorIdx];

  // Sphere gradient
  const grad = prevCtx.createRadialGradient(-r * 0.2, -r * 0.2, r * 0.1, 0, 0, r);
  grad.addColorStop(0, lighten(mainColor, 30));
  grad.addColorStop(0.6, mainColor);
  grad.addColorStop(1, darken(mainColor, 35));
  prevCtx.fillStyle = grad;
  prevCtx.beginPath();
  prevCtx.arc(0, 0, r, 0, Math.PI * 2);
  prevCtx.fill();

  // Stitch texture on sphere surface
  prevCtx.strokeStyle = darken(mainColor, 20);
  prevCtx.lineWidth = 0.5;
  const angle = state.previewAngle;
  for (let i = 0; i < totalRounds; i++) {
    const ringR = r * (i + 1) / maxRounds;
    const phase = angle + i * 0.3;
    prevCtx.beginPath();
    prevCtx.ellipse(0, 0, ringR, ringR * 0.25, phase, 0, Math.PI * 2);
    prevCtx.stroke();
  }

  // Highlight
  prevCtx.fillStyle = 'rgba(255,255,255,0.25)';
  prevCtx.beginPath();
  prevCtx.ellipse(-r * 0.25, -r * 0.3, r * 0.22, r * 0.15, -0.6, 0, Math.PI * 2);
  prevCtx.fill();

  prevCtx.restore();
}

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null, ambientGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Warm ambient pad
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  ambientGain = audioCtx.createGain();
  osc1.type = 'sine'; osc1.frequency.value = 130;
  osc2.type = 'sine'; osc2.frequency.value = 196;
  ambientGain.gain.value = state.soundOn ? 0.006 : 0;
  osc1.connect(ambientGain); osc2.connect(ambientGain);
  ambientGain.connect(audioCtx.destination);
  osc1.start(); osc2.start();
}

function playYarnPull() {
  if (!state.soundOn || !audioCtx) return;
  // Filtered noise - soft yarn sound
  const bufSize = audioCtx.sampleRate * 0.08;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.15 * (1 - i / bufSize);
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 800 + Math.random() * 400;
  const g = audioCtx.createGain();
  g.gain.value = 0.06;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + 0.1);
}

function playPop() {
  if (!state.soundOn || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = 600 + Math.random() * 500;
  g.gain.value = 0.05;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.08);
}

function playChime() {
  if (!state.soundOn || !audioCtx) return;
  [523, 659, 784].forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.value = 0.03;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35 + i * 0.1);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i * 0.1);
    o.stop(audioCtx.currentTime + 0.35 + i * 0.1);
  });
}

function playComplete() {
  if (!state.soundOn || !audioCtx) return;
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.value = 0.04;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5 + i * 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i * 0.15);
    o.stop(audioCtx.currentTime + 0.5 + i * 0.15);
  });
}

// ============================================================
// ADD STITCH
// ============================================================
function addStitch() {
  if (state.animating) return;
  initAudio();
  state.animating = true;

  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);
  if (isAmi) { addAmiStitch(); return; }

  // Determine type and color
  let type = state.stitchType;
  let colorIdx = state.colorIdx;
  if (state.mode === 'pattern' && state.activePattern) {
    const pat = state.activePattern;
    if (state.patternRow < pat.rows.length) {
      type = pat.rows[state.patternRow][state.patternCol] || type;
    }
    if (pat.autoColors && state.autoCrochet) {
      const segLen = Math.max(1, Math.ceil(pat.rows.length / pat.autoColors.length));
      const cIdx = Math.floor(state.patternRow / segLen);
      colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
    }
  }

  const s = { type, color: colorIdx, row: state.currentRow, col: state.currentCol, scale: 0 };
  state.fabric.push(s);

  // Sound
  playYarnPull();
  setTimeout(() => playPop(), 60);

  // Animation duration based on speed
  const dur = [350, 180, 80][state.autoSpeed] || 180;
  animateStitchFormation(s, dur).then(() => {
    state.todayStitches++;
    state.allTimeStitches++;
    saveStats();

    // Advance
    state.currentCol++;
    if (state.mode === 'pattern' && state.activePattern) {
      state.patternCol++;
      const pat = state.activePattern;
      if (state.patternCol >= (pat.rows[state.patternRow] || []).length) {
        completeRow();
        state.patternRow++;
        state.patternCol = 0;
        state.currentCol = 0;
        state.currentRow++;
        if (state.patternRow >= pat.rows.length) {
          completePattern(pat);
          return;
        }
        if (pat.autoColors && state.autoCrochet) {
          const segLen = Math.max(1, Math.ceil(pat.rows.length / pat.autoColors.length));
          const cIdx = Math.floor(state.patternRow / segLen);
          state.colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
          buildColorRow();
        }
        updatePatternBar();
      }
    } else {
      if (state.currentCol >= state.rowWidth) {
        completeRow();
        state.currentCol = 0;
        state.currentRow++;
      }
    }
  });
}

function addAmiStitch() {
  let type = state.stitchType;
  let colorIdx = state.colorIdx;
  const pat = state.amiPattern || (state.activePattern && state.activePattern.isAmigurumi ? state.activePattern : null);
  if (pat && state.amiRound < pat.rounds.length) {
    type = pat.rounds[state.amiRound][state.amiStitch] || 'sc';
  }
  if (pat && pat.autoColors && state.autoCrochet) {
    const segLen = Math.max(1, Math.ceil(pat.rounds.length / pat.autoColors.length));
    const cIdx = Math.floor(state.amiRound / segLen);
    colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
  }

  if (!state.rounds[state.amiRound]) state.rounds[state.amiRound] = [];
  const s = { type, color: colorIdx, scale: 0 };
  state.rounds[state.amiRound].push(s);

  playYarnPull();
  setTimeout(() => playPop(), 60);

  const dur = [350, 180, 80][state.autoSpeed] || 180;
  animateStitchFormation(s, dur).then(() => {
    state.todayStitches++;
    state.allTimeStitches++;
    saveStats();

    state.amiStitch++;
    const targetLen = pat && pat.rounds[state.amiRound] ? pat.rounds[state.amiRound].length : 6 + state.amiRound * 6;
    if (state.amiStitch >= targetLen) {
      completeRow();
      state.amiRound++;
      state.amiStitch = 0;
      if (pat && state.amiRound >= pat.rounds.length) {
        completePattern(pat);
        return;
      }
      if (pat && pat.autoColors && state.autoCrochet) {
        const segLen = Math.max(1, Math.ceil(pat.rounds.length / pat.autoColors.length));
        const cIdx = Math.floor(state.amiRound / segLen);
        state.colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
        buildColorRow();
      }
      updatePatternBar();
    }
  });
}

function completeRow() {
  playChime();
  const flash = document.getElementById('rowFlash');
  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);
  flash.textContent = isAmi ? 'Round complete!' : 'Row complete!';
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1200);
}

function completePattern(pat) {
  stopAutoCrochet();
  playComplete();
  if (!state.completedPatterns.includes(pat.name)) {
    state.completedPatterns.push(pat.name);
    saveStats();
  }
  document.getElementById('completeEmoji').textContent = pat.icon || '!';
  document.getElementById('completeTitle').textContent = 'Pattern Complete!';
  document.getElementById('completeDesc').textContent = `You finished the ${pat.name}!`;
  document.getElementById('completeOverlay').classList.add('open');
}

// ============================================================
// AUTO CROCHET
// ============================================================
function toggleAutoCrochet() {
  if (state.autoCrochet) stopAutoCrochet();
  else startAutoCrochet();
}

function startAutoCrochet() {
  initAudio();
  state.autoCrochet = true;
  document.getElementById('autoBtn').classList.add('auto-active');
  document.getElementById('autoBtn').textContent = 'Stop';
  if (state.mode === 'free') {
    state.mode = 'pattern';
    selectPattern(PATTERNS[0]);
  }
  scheduleAutoStitch();
}

function stopAutoCrochet() {
  state.autoCrochet = false;
  if (state.autoTimer) { clearTimeout(state.autoTimer); state.autoTimer = null; }
  document.getElementById('autoBtn').classList.remove('auto-active');
  document.getElementById('autoBtn').textContent = 'Auto';
}

function scheduleAutoStitch() {
  if (!state.autoCrochet) return;
  const delays = [500, 280, 120];
  state.autoTimer = setTimeout(() => {
    if (!state.autoCrochet) return;
    if (!state.animating) addStitch();
    scheduleAutoStitch();
  }, delays[state.autoSpeed] || 280);
}

// ============================================================
// UNDO / CLEAR
// ============================================================
function undo() {
  if (state.autoCrochet) stopAutoCrochet();
  if (state.animating) return;

  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);
  if (isAmi) {
    const lastRound = state.rounds[state.amiRound];
    if (lastRound && lastRound.length > 0) {
      lastRound.pop();
      if (state.amiStitch > 0) state.amiStitch--;
      else if (state.amiRound > 0) {
        state.amiRound--;
        state.amiStitch = (state.rounds[state.amiRound] || []).length;
      }
    } else if (state.amiRound > 0) {
      state.rounds.pop();
      state.amiRound--;
      const prev = state.rounds[state.amiRound];
      if (prev && prev.length > 0) {
        prev.pop();
        state.amiStitch = prev.length;
      }
    }
  } else {
    if (state.fabric.length === 0) return;
    state.fabric.pop();
    if (state.currentCol > 0) {
      state.currentCol--;
      if (state.mode === 'pattern') state.patternCol = Math.max(0, state.patternCol - 1);
    } else if (state.currentRow > 0) {
      state.currentRow--;
      if (state.mode === 'pattern') state.patternRow = Math.max(0, state.patternRow - 1);
      const rowStitches = state.fabric.filter(s => s.row === state.currentRow);
      state.currentCol = rowStitches.length;
      if (state.mode === 'pattern') state.patternCol = state.currentCol;
    }
  }
  draw();
  updatePatternBar();
}

function clearFabric() {
  stopAutoCrochet();
  state.fabric = [];
  state.currentRow = 0; state.currentCol = 0;
  state.scrollY = 0; state.panX = 0; state.panY = 0;
  state.patternRow = 0; state.patternCol = 0;
  state.rounds = []; state.amiRound = 0; state.amiStitch = 0;
  state.animating = false; state.animStitch = null;
  draw();
  updatePatternBar();
}

// ============================================================
// UI SETUP
// ============================================================
function buildColorRow() {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'color-swatch' + (i === state.colorIdx ? ' active' : '');
    d.style.background = c;
    if (c === '#F5E6CC') d.style.border = '3px solid #D4C4A8';
    d.title = COLOR_NAMES[i];
    d.addEventListener('click', () => { state.colorIdx = i; buildColorRow(); });
    row.appendChild(d);
  });
}

function buildStitchRow() {
  const row = document.getElementById('stitchRow');
  row.innerHTML = '';
  STITCH_TYPES.forEach(st => {
    const b = document.createElement('button');
    b.className = 'stitch-btn' + (st.id === state.stitchType ? ' active' : '');

    // Draw a mini preview of the stitch on a small canvas
    const mini = document.createElement('canvas');
    mini.width = 64; mini.height = 48;
    const mc = mini.getContext('2d');
    mc.clearRect(0, 0, 64, 48);
    const previewColor = state.stitchType === st.id ? '#fff' : '#5A4030';
    drawStitch(mc, 32, 24, st.id, previewColor, 0.5);

    const lbl = document.createElement('span');
    lbl.className = 'lbl';
    lbl.textContent = st.label;

    b.appendChild(mini);
    b.appendChild(lbl);
    b.addEventListener('click', () => { state.stitchType = st.id; buildStitchRow(); });
    row.appendChild(b);
  });
}

function updateStats() {
  const el = document.getElementById('stats');
  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);
  const total = state.fabric.length + state.rounds.reduce((a, r) => a + r.length, 0);
  if (isAmi) {
    el.innerHTML = `Round ${state.amiRound + 1} | Stitch ${state.amiStitch}<br>Total: ${total} | All time: ${state.allTimeStitches}`;
  } else {
    el.innerHTML = `Row ${state.currentRow + 1} | ${state.currentCol}/${state.rowWidth}<br>Total: ${state.fabric.length} | All time: ${state.allTimeStitches}`;
  }
}

function updatePatternBar() {
  const bar = document.getElementById('patternBar');
  if (state.mode === 'free') { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');

  const isAmi = state.mode === 'amigurumi' || (state.activePattern && state.activePattern.isAmigurumi);
  if (!isAmi && state.activePattern) {
    const pat = state.activePattern;
    document.getElementById('patLabel').textContent = pat.name;
    const row = pat.rows[state.patternRow];
    if (row) {
      document.getElementById('patInstruction').textContent =
        `Row ${state.patternRow + 1}/${pat.rows.length}: ${row.length} stitches (${state.patternCol} done)`;
    }
  } else if (isAmi) {
    const pat = state.amiPattern || state.activePattern;
    if (pat) {
      document.getElementById('patLabel').textContent = pat.name;
      const round = pat.rounds ? pat.rounds[state.amiRound] : null;
      document.getElementById('patInstruction').textContent = round ?
        `Round ${state.amiRound + 1}/${pat.rounds.length}: ${round.length} stitches (${state.amiStitch} done)` :
        `Round ${state.amiRound + 1}`;
    } else {
      document.getElementById('patLabel').textContent = 'Free Amigurumi';
      document.getElementById('patInstruction').textContent =
        `Round ${state.amiRound + 1} - Stitch ${state.amiStitch}`;
    }
  }
}

// ============================================================
// PATTERN SELECTOR
// ============================================================
function openPatternSelect() {
  const panel = document.getElementById('patList');
  panel.innerHTML = '';
  PATTERNS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pat-card';
    card.innerHTML = `
      <div class="icon">${p.icon}</div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="desc">${p.desc}</div>
      </div>
      ${state.completedPatterns.includes(p.name) ? '<div class="badge">Done</div>' : ''}`;
    card.addEventListener('click', () => selectPattern(p));
    panel.appendChild(card);
  });
  document.getElementById('patternSelect').classList.add('open');
}

function selectPattern(pat) {
  state.activePattern = pat;
  state.amiPattern = pat.isAmigurumi ? pat : null;
  state.rowWidth = pat.width || 8;
  if (pat.isAmigurumi) state.mode = 'amigurumi';
  clearFabric();
  if (pat.autoColors) {
    state.colorIdx = pat.autoColors[0];
    buildColorRow();
  }
  document.getElementById('patternSelect').classList.remove('open');
  updatePatternBar();
}

// ============================================================
// EVENT HANDLERS
// ============================================================
buildColorRow();
buildStitchRow();

// Canvas tap/click
C.addEventListener('click', () => { initAudio(); addStitch(); });
C.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); addStitch(); }, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); initAudio(); addStitch(); }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
  if (e.key === 'a') toggleAutoCrochet();
  const num = parseInt(e.key);
  if (num >= 1 && num <= 3) { state.stitchType = STITCH_TYPES[num - 1].id; buildStitchRow(); }
});

// Scroll/pan
C.addEventListener('wheel', e => {
  state.panY -= e.deltaY * 0.5;
  draw();
}, { passive: true });

// Touch pan
let touchStart = null;
C.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    // Two-finger pan
    const t = e.touches[0];
    if (touchStart) {
      state.panX += t.clientX - touchStart.x;
      state.panY += t.clientY - touchStart.y;
      draw();
    }
    touchStart = { x: t.clientX, y: t.clientY };
    e.preventDefault();
  }
}, { passive: false });
C.addEventListener('touchend', () => { touchStart = null; });

// Buttons
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('clearBtn').addEventListener('click', clearFabric);
document.getElementById('autoBtn').addEventListener('click', toggleAutoCrochet);
document.getElementById('patternBtn').addEventListener('click', openPatternSelect);
document.getElementById('closePat').addEventListener('click', () => {
  document.getElementById('patternSelect').classList.remove('open');
});

// Sound toggle
document.getElementById('sndBtn').addEventListener('click', () => {
  initAudio();
  state.soundOn = !state.soundOn;
  document.getElementById('sndBtn').textContent = state.soundOn ? 'Sound' : 'Muted';
  if (ambientGain) ambientGain.gain.setTargetAtTime(state.soundOn ? 0.006 : 0, audioCtx.currentTime, 0.1);
});

// Speed
document.getElementById('speedBtn').addEventListener('click', () => {
  document.getElementById('speedSelect').classList.add('open');
  document.querySelectorAll('.speed-option').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === state.autoSpeed);
  });
});
document.getElementById('closeSpeed').addEventListener('click', () => {
  document.getElementById('speedSelect').classList.remove('open');
});
document.querySelectorAll('.speed-option').forEach(btn => {
  btn.addEventListener('click', () => {
    state.autoSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-option').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.speed) === state.autoSpeed);
    });
    document.getElementById('speedSelect').classList.remove('open');
  });
});

// Complete overlay
document.getElementById('completeClose').addEventListener('click', () => {
  document.getElementById('completeOverlay').classList.remove('open');
  clearFabric();
  openPatternSelect();
});

// 3D preview click
prevC.addEventListener('click', e => e.stopPropagation());

// ============================================================
// RESIZE
// ============================================================
function resize() {
  // Canvas size is set in draw() via dpr
  draw();
}
window.addEventListener('resize', resize);

// ============================================================
// RENDER LOOP
// ============================================================
function renderLoop() {
  draw3DPreview();
  requestAnimationFrame(renderLoop);
}

// Initial
setTimeout(() => {
  draw();
  requestAnimationFrame(renderLoop);
}, 0);
</script>
</body>
</html>
