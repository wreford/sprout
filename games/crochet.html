<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Cozy Crochet 🧶</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF6EC;--panel:#F5E6CC;--border:#D4C4A8;--text:#3A3028;--dim:#8A7A6A;
  --accent:#D4A0A0;--wood:#C8A882;--shadow:rgba(60,40,20,0.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Georgia','Times New Roman',serif;overflow:hidden;touch-action:manipulation}
body{display:flex;flex-direction:column;height:100vh}

body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(180,150,110,0.04) 80px,rgba(180,150,110,0.04) 82px),
    repeating-linear-gradient(90deg,transparent,transparent 200px,rgba(160,130,90,0.03) 200px,rgba(160,130,90,0.03) 203px),
    linear-gradient(180deg,#FDF6EC 0%,#F5EBDA 100%);
}

#back{position:fixed;top:10px;left:12px;z-index:100;color:var(--dim);text-decoration:none;font-size:0.85rem;font-family:-apple-system,sans-serif;opacity:0.7;transition:opacity .2s}
#back:hover{opacity:1}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px 6px 60px;flex-shrink:0;z-index:10;border-bottom:1px solid var(--border);background:rgba(245,230,204,0.85);backdrop-filter:blur(6px)}
.top-bar h1{font-size:1.05rem;font-weight:700;color:#5A4030;letter-spacing:0.5px}
.top-bar h1 span{font-size:1.1rem}
.stats{font-size:0.72rem;color:var(--dim);text-align:right;line-height:1.5;font-family:-apple-system,sans-serif}

.mode-bar{display:flex;gap:4px;padding:6px 14px;flex-shrink:0;border-bottom:1px solid var(--border);background:rgba(245,230,204,0.6);justify-content:center}
.mode-btn{background:none;border:1px solid transparent;padding:5px 16px;border-radius:20px;font-size:0.78rem;cursor:pointer;font-family:inherit;color:var(--dim);transition:all .2s}
.mode-btn.active{background:#fff;border-color:var(--border);color:var(--text);box-shadow:0 1px 4px var(--shadow)}
.mode-btn:hover{color:var(--text)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

.canvas-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;cursor:crosshair}

.pattern-bar{display:none;padding:6px 14px;background:rgba(255,255,255,0.7);border-bottom:1px solid var(--border);font-size:0.75rem;font-family:-apple-system,sans-serif;text-align:center;line-height:1.6}
.pattern-bar.visible{display:block}
.pattern-bar .label{font-weight:600;color:#5A4030}
.pattern-bar .instruction{color:var(--dim)}
.pattern-bar .progress-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px;border:1px solid var(--border)}
.pattern-bar .progress-dots span.done{background:#A8B89C;border-color:#8A9A7C}
.pattern-bar .progress-dots span.current{background:#D4A843;border-color:#B48A33;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

.controls{flex-shrink:0;border-top:1px solid var(--border);background:rgba(245,230,204,0.95);backdrop-filter:blur(6px);padding:8px 10px;padding-bottom:max(12px,calc(12px + env(safe-area-inset-bottom)))}

.color-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.color-swatch{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px var(--shadow)}
.color-swatch.active{border-color:var(--text);transform:scale(1.15);box-shadow:0 2px 8px var(--shadow)}
.color-swatch:hover{transform:scale(1.1)}

.stitch-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.stitch-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:12px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;min-width:56px}
.stitch-btn.active{background:#5A4030;border-color:#5A4030;color:#fff;box-shadow:0 2px 8px var(--shadow)}
.stitch-btn:hover{border-color:#8A7A6A}
.stitch-btn .sym{font-size:1rem;line-height:1}
.stitch-btn .lbl{font-size:0.6rem;font-family:-apple-system,sans-serif;text-transform:uppercase;letter-spacing:0.5px}

.action-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.action-btn{padding:5px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.72rem;font-family:-apple-system,sans-serif;color:var(--dim);transition:all .15s}
.action-btn:hover{border-color:#8A7A6A;color:var(--text)}
.action-btn.snd{font-size:0.85rem;padding:5px 10px}
.action-btn.auto-active{background:#5A4030;color:#fff;border-color:#5A4030}

.pattern-select{display:none;position:fixed;inset:0;z-index:200;background:rgba(60,40,20,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.pattern-select.open{display:flex}
.pattern-panel{background:var(--bg);border-radius:16px;padding:20px;max-width:380px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.pattern-panel h2{font-size:1rem;text-align:center;margin-bottom:14px;color:#5A4030}
.pat-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .15s;background:#fff}
.pat-card:hover{border-color:#8A7A6A;box-shadow:0 2px 8px var(--shadow)}
.pat-card.locked{opacity:0.5;cursor:default}
.pat-card .icon{font-size:1.4rem;width:36px;text-align:center}
.pat-card .info{flex:1}
.pat-card .info .name{font-size:0.85rem;font-weight:600}
.pat-card .info .desc{font-size:0.68rem;color:var(--dim);font-family:-apple-system,sans-serif}
.pat-card .badge{font-size:0.65rem;color:#A8B89C;font-family:-apple-system,sans-serif}
.close-btn{display:block;margin:10px auto 0;padding:6px 20px;border-radius:10px;border:1px solid var(--border);background:none;cursor:pointer;font-size:0.8rem;color:var(--dim)}

.complete-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(60,40,20,0.4);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.complete-overlay.open{display:flex}
.complete-card{background:var(--bg);border-radius:16px;padding:28px;text-align:center;max-width:320px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.complete-card h2{font-size:1.2rem;color:#5A4030;margin-bottom:6px}
.complete-card p{font-size:0.8rem;color:var(--dim);margin-bottom:16px;font-family:-apple-system,sans-serif}
.complete-card .emoji{font-size:2.5rem;margin-bottom:10px}
.complete-card button{padding:8px 24px;border-radius:12px;border:1px solid var(--border);background:#5A4030;color:#fff;cursor:pointer;font-size:0.85rem;font-family:inherit}

.row-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.9rem;color:#5A4030;background:rgba(255,255,255,0.9);padding:6px 18px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;font-family:-apple-system,sans-serif;z-index:50;box-shadow:0 2px 12px var(--shadow)}
.row-flash.show{opacity:1}

/* 3D Preview */
#preview3d{position:absolute;top:8px;right:8px;width:120px;height:120px;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 12px var(--shadow);z-index:30;cursor:pointer;background:rgba(253,246,236,0.92);backdrop-filter:blur(4px);overflow:hidden;transition:all .3s ease}
#preview3d.expanded{width:260px;height:260px;top:50%;right:50%;transform:translate(50%,-50%);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}

/* Speed selector overlay */
.speed-select{display:none;position:fixed;inset:0;z-index:200;background:rgba(60,40,20,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.speed-select.open{display:flex}
.speed-panel{background:var(--bg);border-radius:16px;padding:20px;max-width:280px;width:85%;box-shadow:0 8px 40px rgba(0,0,0,0.3);text-align:center}
.speed-panel h2{font-size:1rem;margin-bottom:14px;color:#5A4030}
.speed-option{display:block;width:100%;padding:10px;margin-bottom:8px;border-radius:10px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.85rem;font-family:inherit;transition:all .15s}
.speed-option:hover{border-color:#8A7A6A;box-shadow:0 2px 8px var(--shadow)}
.speed-option.active{background:#5A4030;color:#fff;border-color:#5A4030}

@media(max-width:500px){
  .stitch-btn{min-width:48px;padding:5px 8px}
  .stitch-btn .lbl{font-size:0.55rem}
  .color-swatch{width:22px;height:22px}
  .top-bar h1{font-size:0.9rem}
  .action-btn{padding:4px 10px;font-size:0.68rem}
}
</style>
</head>
<body>
<a href="games.html" id="back">&larr; games</a>

<div class="top-bar">
  <h1><span>🧶</span> Cozy Crochet</h1>
  <div class="stats" id="stats">Row 1 &middot; Stitch 0<br>Today: 0 &middot; All time: 0</div>
</div>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="free">Free Crochet</button>
  <button class="mode-btn" data-mode="pattern">Patterns</button>
  <button class="mode-btn" data-mode="amigurumi">Amigurumi</button>
</div>

<div class="pattern-bar" id="patternBar">
  <span class="label" id="patLabel">Scarf</span> &mdash;
  <span class="instruction" id="patInstruction">Row 1: ch x10</span>
  <div class="progress-dots" id="patDots"></div>
</div>

<div class="main">
  <div class="canvas-wrap">
    <canvas id="C"></canvas>
    <canvas id="preview3d" width="240" height="240"></canvas>
    <div class="row-flash" id="rowFlash">Row complete!</div>
  </div>
</div>

<div class="controls">
  <div class="color-row" id="colorRow"></div>
  <div class="stitch-row" id="stitchRow"></div>
  <div class="action-row">
    <button class="action-btn" id="undoBtn">Undo</button>
    <button class="action-btn" id="clearBtn">Clear</button>
    <button class="action-btn" id="autoBtn">Auto</button>
    <button class="action-btn" id="patternBtn">Patterns</button>
    <button class="action-btn snd" id="sndBtn">🔈</button>
    <button class="action-btn" id="speedBtn">Speed</button>
  </div>
</div>

<div class="pattern-select" id="patternSelect">
  <div class="pattern-panel" id="patternPanel">
    <h2>Choose a Pattern</h2>
    <div id="patList"></div>
    <button class="close-btn" id="closePat">Close</button>
  </div>
</div>

<div class="speed-select" id="speedSelect">
  <div class="speed-panel">
    <h2>Auto-Crochet Speed</h2>
    <button class="speed-option" data-speed="0">Slow (meditative)</button>
    <button class="speed-option active" data-speed="1">Medium</button>
    <button class="speed-option" data-speed="2">Fast</button>
    <button class="close-btn" id="closeSpeed">Close</button>
  </div>
</div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-card">
    <div class="emoji" id="completeEmoji">🧣</div>
    <h2 id="completeTitle">Pattern Complete!</h2>
    <p id="completeDesc">You finished the Scarf pattern!</p>
    <button id="completeClose">Continue</button>
  </div>
</div>

<script>
const C=document.getElementById('C'),ctx=C.getContext('2d');
const prevC=document.getElementById('preview3d'),prevCtx=prevC.getContext('2d');

const COLORS=['#F5E6CC','#D4A0A0','#A8B89C','#D4A843','#3A4A5C','#E07050','#B8A0C8','#B05A3A','#7CB4C4','#4A4A4A'];
const COLOR_NAMES=['Cream','Rose','Sage','Mustard','Navy','Coral','Lavender','Rust','Sky','Charcoal'];
const STITCH_TYPES=[
  {id:'ch',label:'Chain',sym:'○',h:10,w:14},
  {id:'sc',label:'Single',sym:'×',h:16,w:14},
  {id:'dc',label:'Double',sym:'⊤',h:24,w:14},
  {id:'tr',label:'Treble',sym:'⫟',h:32,w:14},
  {id:'sl',label:'Slip',sym:'·',h:8,w:14}
];

const PATTERNS=[
  {name:'Scarf',icon:'🧣',desc:'10 wide, 30 rows, alternating colors.',difficulty:0,width:10,
    autoColors:[1,1,1,1,1,3,3,3,3,3],
    rows:(()=>{const r=[];for(let i=0;i<30;i++) r.push(Array(10).fill(i===0?'ch':'sc'));return r})()},
  {name:'Granny Square',icon:'🟪',desc:'Classic granny with 3 colors.',difficulty:0,width:12,
    autoColors:[1,5,3],
    rows:[
      Array(12).fill('ch'),
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc','dc'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc','dc'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc','dc'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch','dc','dc'],
      ['sl','sl','sl','sl','sl','sl','sl','sl','sl','sl','sl','sl']
    ]},
  {name:'Baby Blanket',icon:'🛏️',desc:'Wide pastel stripes. Relaxing.',difficulty:0,width:16,
    autoColors:[1,2,0,1,2,0],
    rows:(()=>{
      const r=[];r.push(Array(16).fill('ch'));
      for(let i=0;i<18;i++) r.push(Array(16).fill(i%3===0?'dc':'sc'));
      return r;
    })()},
  {name:'Chevron',icon:'〰️',desc:'Zigzag ripple pattern.',difficulty:1,width:12,
    rows:[
      Array(12).fill('ch'),
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
      ['sc','sc','dc','dc','tr','tr','tr','tr','dc','dc','sc','sc'],
    ]},
  {name:'Coaster',icon:'🥤',desc:'Simple circle, single color.',difficulty:0,width:8,isAmigurumi:true,
    autoColors:[2],
    rounds:[
      Array(6).fill('sc'),
      Array(12).fill('sc'),
      Array(18).fill('sc'),
      Array(24).fill('sc'),
      Array(24).fill('sl'),
    ]},
  {name:'Heart',icon:'❤️',desc:'Amigurumi heart shape.',difficulty:0,width:8,isAmigurumi:true,
    autoColors:[5],
    rounds:[
      Array(6).fill('sc'),
      Array(12).fill('sc'),
      Array(12).fill('sc'),
      Array(12).fill('sc'),
      Array(12).fill('sc'),
      Array(6).fill('sc'),
    ]},
  {name:'Flower',icon:'🌸',desc:'Circular flower with petals.',difficulty:0,width:8,isAmigurumi:true,
    autoColors:[3,1,6],
    rounds:[
      ['ch','ch','ch','ch','ch','ch'],
      ['sc','sc','sc','sc','sc','sc','sc','sc','sc','sc','sc','sc'],
      ['ch','dc','dc','dc','ch','sl','ch','dc','dc','dc','ch','sl','ch','dc','dc','dc','ch','sl','ch','dc','dc','dc','ch','sl'],
      ['tr','tr','dc','dc','tr','tr','sl','tr','tr','dc','dc','tr','tr','sl','tr','tr','dc','dc','tr','tr','sl','tr','tr','dc','dc','tr','tr','sl'],
    ]},
];

const AMIGURUMI_SHAPES=[
  {name:'Ball',icon:'⚾',desc:'Simple sphere. Start here.',
    rounds:[
      Array(6).fill('sc'),
      Array(12).fill('sc'),
      Array(18).fill('sc'),
      Array(18).fill('sc'),
      Array(18).fill('sc'),
      Array(12).fill('sc'),
      Array(6).fill('sc'),
    ]},
  {name:'Star',icon:'⭐',desc:'Five-pointed star.',
    rounds:[
      Array(5).fill('sc'),
      Array(10).fill('sc'),
      Array(15).fill('sc'),
      Array(20).fill('sc'),
      Array(20).fill('sc'),
    ]}
];

let state={
  mode:'free',
  stitchType:'sc',
  colorIdx:1,
  fabric:[],
  currentRow:0,
  currentCol:0,
  rowWidth:10,
  autoSpeed:1, // 0=slow,1=medium,2=fast
  soundOn:true,
  animating:false,
  hookX:0,hookY:0,
  scrollY:0,
  activePattern:null,
  patternRow:0,
  patternCol:0,
  amiPattern:null,
  amiRound:0,
  amiStitch:0,
  rounds:[],
  todayStitches:0,
  allTimeStitches:0,
  completedPatterns:[],
  yarnRemaining:1.0,
  // auto crochet
  autoCrochet:false,
  autoTimer:null,
  // 3d preview
  previewExpanded:false,
  previewAngle:0,
};

// Load saved stats
try{
  const s=JSON.parse(localStorage.getItem('crochet_stats'));
  if(s){
    state.allTimeStitches=s.all||0;
    state.completedPatterns=s.completed||[];
    const today=new Date().toDateString();
    if(s.day===today) state.todayStitches=s.today||0;
  }
}catch(e){}

function saveStats(){
  try{localStorage.setItem('crochet_stats',JSON.stringify({
    all:state.allTimeStitches,today:state.todayStitches,
    day:new Date().toDateString(),completed:state.completedPatterns
  }))}catch(e){}
}

// ====== Audio ======
let audioCtx=null;
let ambientNode=null;
function initAudio(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    startAmbient();
  }
}
function startAmbient(){
  if(!audioCtx||ambientNode) return;
  // Warm pad ambient - very quiet
  const osc1=audioCtx.createOscillator();
  const osc2=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc1.type='sine'; osc1.frequency.value=130;
  osc2.type='sine'; osc2.frequency.value=196;
  g.gain.value=0.008;
  osc1.connect(g); osc2.connect(g); g.connect(audioCtx.destination);
  osc1.start(); osc2.start();
  ambientNode={osc1,osc2,gain:g};
}
function setAmbientVolume(v){
  if(ambientNode) ambientNode.gain.gain.setTargetAtTime(v,audioCtx.currentTime,0.1);
}

function playPop(){
  if(!state.soundOn||!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';
  // Vary pitch for meditative quality
  o.frequency.value=700+Math.random()*600;
  g.gain.value=0.07;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+0.1);
}
function playChime(){
  if(!state.soundOn||!audioCtx)return;
  [523,659,784].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.value=0.04;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3+i*0.1);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+i*0.1);o.stop(audioCtx.currentTime+0.3+i*0.1);
  });
}
function playComplete(){
  if(!state.soundOn||!audioCtx)return;
  [523,659,784,1047].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.value=0.05;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5+i*0.15);
    o.connect(g);g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime+i*0.15);o.stop(audioCtx.currentTime+0.5+i*0.15);
  });
}

// ====== UI Setup ======
function buildColorRow(){
  const row=document.getElementById('colorRow');
  row.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-swatch'+(i===state.colorIdx?' active':'');
    d.style.background=c;
    if(c==='#F5E6CC') d.style.border='2px solid #D4C4A8';
    d.title=COLOR_NAMES[i];
    d.addEventListener('click',()=>{state.colorIdx=i;buildColorRow()});
    row.appendChild(d);
  });
}
function buildStitchRow(){
  const row=document.getElementById('stitchRow');
  row.innerHTML='';
  STITCH_TYPES.forEach(s=>{
    const b=document.createElement('button');
    b.className='stitch-btn'+(s.id===state.stitchType?' active':'');
    b.innerHTML=`<span class="sym">${s.sym}</span><span class="lbl">${s.label}</span>`;
    b.addEventListener('click',()=>{state.stitchType=s.id;buildStitchRow()});
    row.appendChild(b);
  });
}
buildColorRow();
buildStitchRow();

// ====== Canvas sizing ======
function resize(){
  const wrap=document.querySelector('.canvas-wrap');
  const r=window.devicePixelRatio||1;
  C.width=wrap.clientWidth*r;
  C.height=wrap.clientHeight*r;
  C.style.width=wrap.clientWidth+'px';
  C.style.height=wrap.clientHeight+'px';
  ctx.setTransform(r,0,0,r,0,0);
  draw();
}
window.addEventListener('resize',resize);
setTimeout(resize,0);

// ====== Stitch dimensions - MUCH BIGGER ======
const SW=28,GAP=3;
function stitchH(type){return{ch:20,sc:30,dc:42,tr:52,sl:14}[type]||30}

// ====== Draw stitch - bigger, thicker, more visible ======
function drawStitch(x,y,type,color,scale=1){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(scale,scale);
  const c=color;
  const grad=ctx.createLinearGradient(-SW/2,-2,SW/2,2);
  grad.addColorStop(0,lighten(c,15));
  grad.addColorStop(0.3,c);
  grad.addColorStop(0.7,darken(c,12));
  grad.addColorStop(1,lighten(c,8));

  // Determine outline color based on brightness
  const brightness=getBrightness(c);
  const outlineColor=brightness>160?darken(c,60):lighten(c,40);

  ctx.strokeStyle=grad;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  const h=stitchH(type);
  switch(type){
    case 'ch':
      // Outline
      ctx.lineWidth=5;
      ctx.strokeStyle=outlineColor;
      ctx.beginPath();
      ctx.ellipse(0,0,SW/2-2,h/2-1,0,0,Math.PI*2);
      ctx.stroke();
      // Fill
      ctx.lineWidth=3.5;
      ctx.strokeStyle=grad;
      ctx.beginPath();
      ctx.ellipse(0,0,SW/2-2,h/2-1,0,0,Math.PI*2);
      ctx.stroke();
      // Inner shading
      ctx.lineWidth=1.5;
      ctx.strokeStyle=lighten(c,25);
      ctx.beginPath();
      ctx.ellipse(-1,-1,SW/2-5,h/2-4,0,Math.PI*0.8,Math.PI*1.8);
      ctx.stroke();
      break;
    case 'sc':
      // Outline
      ctx.lineWidth=5;
      ctx.strokeStyle=outlineColor;
      ctx.beginPath();
      ctx.moveTo(-SW/2+3,-h/2+3);
      ctx.lineTo(0,h/2-3);
      ctx.lineTo(SW/2-3,-h/2+3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-SW/2+2,-h/2+3);
      ctx.lineTo(SW/2-2,-h/2+3);
      ctx.stroke();
      // Fill
      ctx.lineWidth=3.5;
      ctx.strokeStyle=grad;
      ctx.beginPath();
      ctx.moveTo(-SW/2+3,-h/2+3);
      ctx.lineTo(0,h/2-3);
      ctx.lineTo(SW/2-3,-h/2+3);
      ctx.stroke();
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(-SW/2+2,-h/2+3);
      ctx.lineTo(SW/2-2,-h/2+3);
      ctx.stroke();
      break;
    case 'dc':
      ctx.lineWidth=5;
      ctx.strokeStyle=outlineColor;
      ctx.beginPath();
      ctx.moveTo(-SW/2+3,-h/2+3);
      ctx.lineTo(0,h/2-3);
      ctx.lineTo(SW/2-3,-h/2+3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-SW/2+2,-h/2+3);
      ctx.lineTo(SW/2-2,-h/2+3);
      ctx.stroke();
      // Fill
      ctx.lineWidth=3.5;
      ctx.strokeStyle=grad;
      ctx.beginPath();
      ctx.moveTo(-SW/2+3,-h/2+3);
      ctx.lineTo(0,h/2-3);
      ctx.lineTo(SW/2-3,-h/2+3);
      ctx.stroke();
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(-SW/2+2,-h/2+3);
      ctx.lineTo(SW/2-2,-h/2+3);
      ctx.stroke();
      // Wrap line
      ctx.lineWidth=2.5;
      ctx.strokeStyle=lighten(c,20);
      ctx.beginPath();
      ctx.moveTo(-SW/4+1,-h/4);
      ctx.lineTo(SW/4-1,-h/4);
      ctx.stroke();
      break;
    case 'tr':
      ctx.lineWidth=5;
      ctx.strokeStyle=outlineColor;
      ctx.beginPath();
      ctx.moveTo(-SW/2+3,-h/2+3);
      ctx.lineTo(0,h/2-3);
      ctx.lineTo(SW/2-3,-h/2+3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-SW/2+2,-h/2+3);
      ctx.lineTo(SW/2-2,-h/2+3);
      ctx.stroke();
      // Fill
      ctx.lineWidth=3.5;
      ctx.strokeStyle=grad;
      ctx.beginPath();
      ctx.moveTo(-SW/2+3,-h/2+3);
      ctx.lineTo(0,h/2-3);
      ctx.lineTo(SW/2-3,-h/2+3);
      ctx.stroke();
      ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(-SW/2+2,-h/2+3);
      ctx.lineTo(SW/2-2,-h/2+3);
      ctx.stroke();
      // Two wrap lines
      ctx.lineWidth=2.5;
      ctx.strokeStyle=lighten(c,20);
      ctx.beginPath();
      ctx.moveTo(-SW/4,-h*0.15);ctx.lineTo(SW/4,-h*0.15);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-SW/3,-h*0.32);ctx.lineTo(SW/3,-h*0.32);
      ctx.stroke();
      break;
    case 'sl':
      ctx.lineWidth=4;
      ctx.strokeStyle=outlineColor;
      ctx.beginPath();
      ctx.arc(0,0,5,0,Math.PI*2);
      ctx.stroke();
      ctx.fillStyle=c;
      ctx.fill();
      ctx.lineWidth=3;
      ctx.strokeStyle=c;
      ctx.beginPath();
      ctx.arc(0,0,4,0,Math.PI*2);
      ctx.stroke();
      break;
  }
  ctx.restore();
}

function getBrightness(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000;
}
function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function darken(hex,amt){return lighten(hex,-amt)}

// ====== Draw hook ======
function drawHook(x,y){
  ctx.save();
  ctx.translate(x,y);
  ctx.strokeStyle='#777';
  ctx.lineWidth=3.5;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(0,-26);ctx.lineTo(0,8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(4,8,4,Math.PI,Math.PI*0.3,true);
  ctx.stroke();
  ctx.strokeStyle='#B08060';
  ctx.lineWidth=5.5;
  ctx.beginPath();
  ctx.moveTo(0,-26);ctx.lineTo(0,-45);
  ctx.stroke();
  // Handle grip
  ctx.strokeStyle='#C8956A';
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.moveTo(0,-38);ctx.lineTo(0,-45);
  ctx.stroke();
  ctx.restore();
}

// ====== Draw yarn ball ======
function drawYarnBall(x,y,remaining){
  ctx.save();
  ctx.translate(x,y);
  const r=22*remaining+8;
  const c=COLORS[state.colorIdx];
  ctx.fillStyle=c;
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fill();
  // Stronger outline
  ctx.strokeStyle=darken(c,30);
  ctx.lineWidth=1.5;
  ctx.stroke();
  // Texture lines
  ctx.strokeStyle=darken(c,18);
  ctx.lineWidth=1;
  for(let i=0;i<6;i++){
    ctx.beginPath();
    ctx.ellipse(0,0,r*0.9,r*0.4,i*0.5,0,Math.PI*2);
    ctx.stroke();
  }
  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(-r*0.25,-r*0.25,r*0.3,r*0.2,-0.5,0,Math.PI*2);
  ctx.fill();
  // Trailing yarn to hook - THICKER
  ctx.strokeStyle=c;
  ctx.lineWidth=3.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(r*0.8,r*0.3);
  ctx.quadraticCurveTo(r*2,r*1.5,state.hookX-x,state.hookY-y);
  ctx.stroke();
  // Outline for yarn line
  ctx.strokeStyle=darken(c,25);
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(r*0.8,r*0.3);
  ctx.quadraticCurveTo(r*2,r*1.5,state.hookX-x,state.hookY-y);
  ctx.stroke();
  ctx.restore();
}

// ====== Fabric layout ======
function getFabricOrigin(){
  if(state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi)) return getAmiFabricOrigin();
  const cw=parseInt(C.style.width)||C.width;
  const ch=parseInt(C.style.height)||C.height;
  const fw=state.rowWidth*(SW+GAP);
  const ox=(cw-fw)/2+SW/2;
  let totalH=0;
  for(let r=0;r<=state.currentRow;r++){
    const rowStitches=state.fabric.filter(s=>s.row===r);
    if(rowStitches.length>0){
      totalH+=Math.max(...rowStitches.map(s=>stitchH(s.type)))+GAP;
    } else {
      totalH+=stitchH(state.stitchType)+GAP;
    }
  }
  const oy=Math.max(40,Math.min(ch-80,ch/2-totalH/2+state.scrollY));
  return {ox,oy};
}

function getAmiFabricOrigin(){
  const cw=parseInt(C.style.width)||C.width;
  const ch=parseInt(C.style.height)||C.height;
  return {ox:cw/2,oy:ch/2};
}

// ====== Main draw ======
function draw(){
  const cw=parseInt(C.style.width)||C.width;
  const ch=parseInt(C.style.height)||C.height;
  ctx.clearRect(0,0,cw,ch);

  // Subtle grid
  ctx.fillStyle='rgba(200,180,150,0.06)';
  for(let x=0;x<cw;x+=20) for(let y=0;y<ch;y+=20){
    ctx.fillRect(x,y,1,1);
  }

  const isAmi=state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi);
  if(isAmi){
    drawAmigurumi(cw,ch);
  } else {
    drawFlatFabric(cw,ch);
  }

  // Yarn ball (top right, offset for 3d preview)
  drawYarnBall(cw-50,60,state.yarnRemaining);
  updateStats();
  draw3DPreview();
}

function drawFlatFabric(cw,ch){
  const {ox,oy}=getFabricOrigin();

  let yOff=0;
  let maxRow=state.currentRow;
  for(let r=0;r<=maxRow;r++){
    const rowStitches=state.fabric.filter(s=>s.row===r);
    if(rowStitches.length===0) continue;
    const rowH=Math.max(...rowStitches.map(s=>stitchH(s.type)));

    // Row shadow/depth band between rows
    ctx.fillStyle='rgba(60,40,20,0.05)';
    ctx.fillRect(ox-SW/2-4,oy+yOff+rowH/2-1,state.rowWidth*(SW+GAP)+8,GAP+4);

    // Alternating row direction
    const reversed=r%2===1;
    rowStitches.forEach(s=>{
      const col=reversed?state.rowWidth-1-s.col:s.col;
      const sx=ox+col*(SW+GAP);
      const sy=oy+yOff;
      drawStitch(sx,sy,s.type,COLORS[s.color],s.scale||1);
    });
    yOff+=rowH+GAP;
  }

  // Hook position
  const hookCol=state.currentRow%2===1?state.rowWidth-1-state.currentCol:state.currentCol;
  const hx=ox+hookCol*(SW+GAP);
  const hy=oy+yOff;
  state.hookX=hx;state.hookY=hy-26;
  drawHook(hx,hy-10);

  // Auto-scroll
  if(hy>ch-120) state.scrollY-=3;
}

function drawAmigurumi(cw,ch){
  const {ox,oy}=getAmiFabricOrigin();
  const rounds=state.rounds;

  rounds.forEach((round,ri)=>{
    const count=round.length;
    const radius=28+ri*22;
    round.forEach((s,si)=>{
      const angle=(si/count)*Math.PI*2-Math.PI/2;
      const sx=ox+Math.cos(angle)*radius;
      const sy=oy+Math.sin(angle)*radius;
      drawStitch(sx,sy,s.type,COLORS[s.color],s.scale||1);
    });
  });

  // Hook
  const curRound=rounds.length;
  const curCount=rounds.length>0?rounds[curRound-1]?.length||6:6;
  const nextCount=state.amiPattern?state.amiPattern.rounds[curRound]?.length||curCount:curCount;
  const radius=28+curRound*22;
  const angle=(state.amiStitch/nextCount)*Math.PI*2-Math.PI/2;
  const hx=ox+Math.cos(angle)*radius;
  const hy=oy+Math.sin(angle)*radius;
  state.hookX=hx;state.hookY=hy-26;
  drawHook(hx,hy-10);
}

// ====== 3D Preview ======
function draw3DPreview(){
  const el=document.getElementById('preview3d');
  const sz=state.previewExpanded?260:120;
  const dpr=window.devicePixelRatio||1;
  prevC.width=sz*dpr;
  prevC.height=sz*dpr;
  prevC.style.width=sz+'px';
  prevC.style.height=sz+'px';
  prevCtx.setTransform(dpr,0,0,dpr,0,0);
  prevCtx.clearRect(0,0,sz,sz);

  const totalStitches=state.fabric.length;
  const totalAmiStitches=state.rounds.reduce((a,r)=>a+r.length,0);
  if(totalStitches===0&&totalAmiStitches===0) {
    // Empty state
    prevCtx.fillStyle='rgba(90,64,48,0.2)';
    prevCtx.font='10px -apple-system,sans-serif';
    prevCtx.textAlign='center';
    prevCtx.fillText('3D Preview',sz/2,sz/2);
    return;
  }

  state.previewAngle+=0.005;
  const isAmi=state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi);

  if(isAmi){
    drawPreviewAmigurumi(sz);
  } else {
    drawPreviewFlat(sz);
  }
}

function drawPreviewFlat(sz){
  prevCtx.save();
  const cx=sz/2, cy=sz/2;
  const totalRows=state.currentRow+1;
  const maxW=state.rowWidth;
  const angle=state.previewAngle;

  // Fake 3D perspective - tilted rectangle
  const pw=sz*0.7;
  const ph=sz*0.5;
  const skew=Math.sin(angle)*0.15;
  const tilt=0.65;

  prevCtx.translate(cx,cy);

  // Shadow
  prevCtx.fillStyle='rgba(0,0,0,0.1)';
  prevCtx.beginPath();
  prevCtx.ellipse(2,ph*tilt*0.5+6,pw*0.55,8,0,0,Math.PI*2);
  prevCtx.fill();

  // Draw fabric rectangle with perspective
  const fabricColors=[];
  for(let r=0;r<=state.currentRow;r++){
    const rowS=state.fabric.filter(s=>s.row===r);
    if(rowS.length>0) fabricColors.push(COLORS[rowS[0].color]);
  }

  const rh=ph*tilt/Math.max(totalRows,1);
  const startY=-ph*tilt*0.5;

  fabricColors.forEach((c,i)=>{
    const y=startY+i*rh;
    const xSkewOff=skew*(y+ph*tilt*0.5);
    prevCtx.fillStyle=c;
    prevCtx.strokeStyle=darken(c,20);
    prevCtx.lineWidth=0.5;
    prevCtx.beginPath();
    prevCtx.moveTo(-pw/2+xSkewOff,y);
    prevCtx.lineTo(pw/2+xSkewOff,y);
    prevCtx.lineTo(pw/2+xSkewOff+skew*rh,y+rh);
    prevCtx.lineTo(-pw/2+xSkewOff+skew*rh,y+rh);
    prevCtx.closePath();
    prevCtx.fill();
    prevCtx.stroke();

    // Stitch texture dots
    const cols=Math.min(maxW,12);
    const cw=pw/cols;
    for(let j=0;j<cols;j++){
      const tx=-pw/2+j*cw+cw/2+xSkewOff+skew*rh*0.5;
      const ty=y+rh*0.5;
      prevCtx.fillStyle=darken(c,15);
      prevCtx.fillRect(tx-1,ty-0.5,2,1);
    }
  });

  // Border
  if(fabricColors.length>0){
    prevCtx.strokeStyle='rgba(90,64,48,0.3)';
    prevCtx.lineWidth=1;
    const topSkew=skew*0;
    const botSkew=skew*(ph*tilt);
    prevCtx.strokeRect(-pw/2+topSkew,startY,pw,fabricColors.length*rh);
  }

  prevCtx.restore();
}

function drawPreviewAmigurumi(sz){
  prevCtx.save();
  const cx=sz/2,cy=sz/2;
  const angle=state.previewAngle;
  const totalRounds=state.rounds.length;
  if(totalRounds===0){prevCtx.restore();return;}
  const maxRounds=state.amiPattern?state.amiPattern.rounds.length:7;
  const progress=Math.min(1,totalRounds/maxRounds);

  const r=sz*0.35*progress+sz*0.05;
  prevCtx.translate(cx,cy);

  // Shadow
  prevCtx.fillStyle='rgba(0,0,0,0.08)';
  prevCtx.beginPath();
  prevCtx.ellipse(2,r+4,r*0.8,r*0.25,0,0,Math.PI*2);
  prevCtx.fill();

  // Sphere with concentric rings
  const mainColor=COLORS[state.rounds[0]?state.rounds[0][0]?.color||state.colorIdx:state.colorIdx];
  for(let i=Math.ceil(r);i>0;i-=2){
    const t=i/r;
    const shade=Math.floor(40*(1-t));
    prevCtx.fillStyle=darken(mainColor,shade);
    const yOff=Math.sin(angle)*i*0.05;
    prevCtx.beginPath();
    prevCtx.arc(0+yOff*0.2,0,i,0,Math.PI*2);
    prevCtx.fill();
  }

  // Highlight
  prevCtx.fillStyle='rgba(255,255,255,0.3)';
  prevCtx.beginPath();
  prevCtx.ellipse(-r*0.3,-r*0.3,r*0.25,r*0.18,-0.6,0,Math.PI*2);
  prevCtx.fill();

  // Ring lines showing rounds
  prevCtx.strokeStyle=darken(mainColor,25);
  prevCtx.lineWidth=0.5;
  for(let i=0;i<totalRounds;i++){
    const ringR=r*(i+1)/maxRounds;
    prevCtx.beginPath();
    prevCtx.ellipse(0,0,ringR,ringR*0.3,0,0,Math.PI*2);
    prevCtx.stroke();
  }

  prevCtx.restore();
}

// Preview click to expand/collapse
prevC.addEventListener('click',e=>{
  e.stopPropagation();
  state.previewExpanded=!state.previewExpanded;
  prevC.classList.toggle('expanded',state.previewExpanded);
  draw3DPreview();
});

// Animate 3D preview rotation
function animatePreview(){
  draw3DPreview();
  requestAnimationFrame(animatePreview);
}
requestAnimationFrame(animatePreview);

// ====== Add stitch ======
function addStitch(){
  if(state.animating) return;
  initAudio();
  state.animating=true;

  const isAmi=state.mode==='amigurumi'||(state.mode==='pattern'&&state.activePattern&&state.activePattern.isAmigurumi);
  if(isAmi){
    addAmiStitch();
    return;
  }

  // Determine stitch type and color
  let type=state.stitchType;
  let colorIdx=state.colorIdx;
  if(state.mode==='pattern'&&state.activePattern){
    const pat=state.activePattern;
    const rows=pat.rows;
    if(state.patternRow<rows.length){
      type=rows[state.patternRow][state.patternCol];
    }
    // Auto color cycling for auto-crochet patterns
    if(pat.autoColors&&state.autoCrochet){
      const cIdx=Math.floor(state.patternRow/(pat.rows.length/pat.autoColors.length));
      colorIdx=pat.autoColors[Math.min(cIdx,pat.autoColors.length-1)];
    }
  }

  const s={type,color:colorIdx,row:state.currentRow,col:state.currentCol,scale:0.3};
  state.fabric.push(s);

  const dur=[220,140,70][state.autoSpeed]||140;
  const start=performance.now();
  function anim(t){
    const p=Math.min(1,(t-start)/dur);
    const ease=1-Math.pow(1-p,3);
    s.scale=0.3+0.7*ease;
    if(p>0.7) s.scale=1+0.1*Math.sin((p-0.7)/0.3*Math.PI);
    if(p>=1){s.scale=1;state.animating=false;}
    draw();
    if(p<1) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);

  playPop();
  state.todayStitches++;
  state.allTimeStitches++;
  state.yarnRemaining=Math.max(0.1,state.yarnRemaining-0.002);
  saveStats();

  // Advance position
  state.currentCol++;
  if(state.mode==='pattern'&&state.activePattern){
    state.patternCol++;
    const pat=state.activePattern;
    if(state.patternCol>=pat.rows[state.patternRow]?.length){
      completeRow();
      state.patternRow++;
      state.patternCol=0;
      state.currentCol=0;
      state.currentRow++;
      if(state.patternRow>=pat.rows.length){
        completePattern(pat);
        return;
      }
      // Update color for auto-crochet
      if(pat.autoColors&&state.autoCrochet){
        const cIdx=Math.floor(state.patternRow/(Math.max(1,pat.rows.length/pat.autoColors.length)));
        state.colorIdx=pat.autoColors[Math.min(cIdx,pat.autoColors.length-1)];
        buildColorRow();
      }
      updatePatternBar();
    }
  } else {
    if(state.currentCol>=state.rowWidth){
      completeRow();
      state.currentCol=0;
      state.currentRow++;
    }
  }
}

function addAmiStitch(){
  initAudio();
  let type=state.stitchType;
  let colorIdx=state.colorIdx;
  const pat=state.amiPattern;
  if(pat&&state.amiRound<pat.rounds.length){
    type=pat.rounds[state.amiRound][state.amiStitch]||'sc';
  }
  // Auto color cycling
  if(pat&&pat.autoColors&&state.autoCrochet){
    const cIdx=Math.floor(state.amiRound/(Math.max(1,pat.rounds.length/pat.autoColors.length)));
    colorIdx=pat.autoColors[Math.min(cIdx,pat.autoColors.length-1)];
  }

  if(!state.rounds[state.amiRound]) state.rounds[state.amiRound]=[];
  const s={type,color:colorIdx,scale:0.3};
  state.rounds[state.amiRound].push(s);

  const dur=[220,140,70][state.autoSpeed]||140;
  const start=performance.now();
  function anim(t){
    const p=Math.min(1,(t-start)/dur);
    s.scale=0.3+0.7*(1-Math.pow(1-p,3));
    if(p>0.7) s.scale=1+0.1*Math.sin((p-0.7)/0.3*Math.PI);
    if(p>=1){s.scale=1;state.animating=false;}
    draw();
    if(p<1) requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);

  playPop();
  state.todayStitches++;
  state.allTimeStitches++;
  state.yarnRemaining=Math.max(0.1,state.yarnRemaining-0.002);
  saveStats();

  state.amiStitch++;
  const targetLen=pat?pat.rounds[state.amiRound]?.length||6:6+state.amiRound*6;
  if(state.amiStitch>=targetLen){
    completeRow();
    state.amiRound++;
    state.amiStitch=0;
    if(pat&&state.amiRound>=pat.rounds.length){
      completePattern(pat);
      return;
    }
    // Update color
    if(pat&&pat.autoColors&&state.autoCrochet){
      const cIdx=Math.floor(state.amiRound/(Math.max(1,pat.rounds.length/pat.autoColors.length)));
      state.colorIdx=pat.autoColors[Math.min(cIdx,pat.autoColors.length-1)];
      buildColorRow();
    }
    updatePatternBar();
  }
}

function completeRow(){
  playChime();
  const flash=document.getElementById('rowFlash');
  const isAmi=state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi);
  flash.textContent=isAmi?'Round complete!':'Row complete!';
  flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),1200);
}

function completePattern(pat){
  stopAutoCrochet();
  playComplete();
  if(!state.completedPatterns.includes(pat.name)){
    state.completedPatterns.push(pat.name);
    saveStats();
  }
  document.getElementById('completeEmoji').textContent=pat.icon;
  document.getElementById('completeTitle').textContent='Pattern Complete!';
  document.getElementById('completeDesc').textContent=`You finished the ${pat.name}!`;
  document.getElementById('completeOverlay').classList.add('open');
}

// ====== Auto Crochet ======
function toggleAutoCrochet(){
  if(state.autoCrochet){
    stopAutoCrochet();
  } else {
    startAutoCrochet();
  }
}

function startAutoCrochet(){
  initAudio();
  state.autoCrochet=true;
  document.getElementById('autoBtn').classList.add('auto-active');
  document.getElementById('autoBtn').textContent='Stop';
  // If no pattern active, pick scarf by default
  if(state.mode==='free'){
    state.mode='pattern';
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.mode-btn')[1].classList.add('active');
    selectPattern(PATTERNS[0]);
  }
  scheduleAutoStitch();
}

function stopAutoCrochet(){
  state.autoCrochet=false;
  if(state.autoTimer){clearTimeout(state.autoTimer);state.autoTimer=null;}
  document.getElementById('autoBtn').classList.remove('auto-active');
  document.getElementById('autoBtn').textContent='Auto';
}

function scheduleAutoStitch(){
  if(!state.autoCrochet) return;
  const delays=[450,250,100];
  const delay=delays[state.autoSpeed]||250;
  state.autoTimer=setTimeout(()=>{
    if(!state.autoCrochet) return;
    if(!state.animating){
      addStitch();
    }
    scheduleAutoStitch();
  },delay);
}

document.getElementById('autoBtn').addEventListener('click',toggleAutoCrochet);

// ====== Speed control ======
document.getElementById('speedBtn').addEventListener('click',()=>{
  document.getElementById('speedSelect').classList.add('open');
  updateSpeedButtons();
});
document.getElementById('closeSpeed').addEventListener('click',()=>{
  document.getElementById('speedSelect').classList.remove('open');
});
document.querySelectorAll('.speed-option').forEach(btn=>{
  btn.addEventListener('click',()=>{
    state.autoSpeed=parseInt(btn.dataset.speed);
    updateSpeedButtons();
    document.getElementById('speedSelect').classList.remove('open');
  });
});
function updateSpeedButtons(){
  document.querySelectorAll('.speed-option').forEach(b=>{
    b.classList.toggle('active',parseInt(b.dataset.speed)===state.autoSpeed);
  });
}

// ====== Pattern bar ======
function updatePatternBar(){
  const bar=document.getElementById('patternBar');
  if(state.mode==='free'){bar.classList.remove('visible');return;}
  bar.classList.add('visible');

  if((state.mode==='pattern')&&state.activePattern&&!state.activePattern.isAmigurumi){
    const pat=state.activePattern;
    document.getElementById('patLabel').textContent=pat.name;
    const row=pat.rows[state.patternRow];
    if(row){
      const names=row.map(s=>{const t=STITCH_TYPES.find(x=>x.id===s);return t?t.sym:s});
      document.getElementById('patInstruction').textContent=
        `Row ${state.patternRow+1}/${pat.rows.length}: ${names.join(' ')}`;
    }
    const dots=document.getElementById('patDots');
    dots.innerHTML='';
    const curRow=state.activePattern.rows[state.patternRow];
    if(curRow){
      curRow.forEach((_,i)=>{
        const span=document.createElement('span');
        if(i<state.patternCol) span.className='done';
        else if(i===state.patternCol) span.className='current';
        dots.appendChild(span);
      });
    }
  }

  const isAmi=state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi);
  if(isAmi){
    const pat=state.amiPattern||(state.activePattern&&state.activePattern.isAmigurumi?state.activePattern:null);
    if(pat){
      document.getElementById('patLabel').textContent=pat.name;
      const round=pat.rounds[state.amiRound];
      if(round){
        document.getElementById('patInstruction').textContent=
          `Round ${state.amiRound+1}/${pat.rounds.length}: ${round.length} stitches`;
      }
      const dots=document.getElementById('patDots');
      dots.innerHTML='';
      if(round){
        round.forEach((_,i)=>{
          const span=document.createElement('span');
          if(i<state.amiStitch) span.className='done';
          else if(i===state.amiStitch) span.className='current';
          dots.appendChild(span);
        });
      }
    } else {
      document.getElementById('patLabel').textContent='Free Amigurumi';
      document.getElementById('patInstruction').textContent=
        `Round ${state.amiRound+1} — Stitch ${state.amiStitch}`;
      document.getElementById('patDots').innerHTML='';
    }
  }
}

function updateStats(){
  const el=document.getElementById('stats');
  const isAmi=state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi);
  if(isAmi){
    el.innerHTML=`Round ${state.amiRound+1} &middot; Stitch ${state.amiStitch}<br>Today: ${state.todayStitches} &middot; All: ${state.allTimeStitches}`;
  } else {
    el.innerHTML=`Row ${state.currentRow+1} &middot; ${state.currentCol}/${state.rowWidth}<br>Today: ${state.todayStitches} &middot; All: ${state.allTimeStitches}`;
  }
}

// ====== Input ======
C.addEventListener('click',()=>{initAudio();addStitch()});
C.addEventListener('touchstart',e=>{e.preventDefault();initAudio();addStitch()},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();initAudio();addStitch();}
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undo();}
  if(e.key==='a') toggleAutoCrochet();
  const num=parseInt(e.key);
  if(num>=1&&num<=5){state.stitchType=STITCH_TYPES[num-1].id;buildStitchRow();}
});

// ====== Undo ======
function undo(){
  if(state.autoCrochet) stopAutoCrochet();
  const isAmi=state.mode==='amigurumi'||(state.activePattern&&state.activePattern.isAmigurumi);
  if(isAmi){
    const lastRound=state.rounds[state.amiRound];
    if(lastRound&&lastRound.length>0){
      lastRound.pop();
      if(state.amiStitch>0) state.amiStitch--;
      else if(state.amiRound>0){
        state.amiRound--;
        state.amiStitch=state.rounds[state.amiRound]?.length||0;
      }
    } else if(state.amiRound>0){
      state.rounds.pop();
      state.amiRound--;
      const prev=state.rounds[state.amiRound];
      if(prev&&prev.length>0){
        prev.pop();
        state.amiStitch=prev.length;
      }
    }
  } else {
    if(state.fabric.length===0) return;
    state.fabric.pop();
    if(state.currentCol>0){
      state.currentCol--;
      if(state.mode==='pattern') state.patternCol=Math.max(0,state.patternCol-1);
    } else if(state.currentRow>0){
      state.currentRow--;
      if(state.mode==='pattern') state.patternRow=Math.max(0,state.patternRow-1);
      const rowStitches=state.fabric.filter(s=>s.row===state.currentRow);
      state.currentCol=rowStitches.length;
      if(state.mode==='pattern') state.patternCol=state.currentCol;
    }
  }
  draw();
  updatePatternBar();
}
document.getElementById('undoBtn').addEventListener('click',undo);

// ====== Clear ======
function clearFabric(){
  stopAutoCrochet();
  state.fabric=[];
  state.currentRow=0;
  state.currentCol=0;
  state.scrollY=0;
  state.patternRow=0;
  state.patternCol=0;
  state.rounds=[];
  state.amiRound=0;
  state.amiStitch=0;
  state.yarnRemaining=1.0;
  draw();
  updatePatternBar();
}
document.getElementById('clearBtn').addEventListener('click',clearFabric);

// ====== Sound toggle ======
document.getElementById('sndBtn').addEventListener('click',()=>{
  initAudio();
  state.soundOn=!state.soundOn;
  document.getElementById('sndBtn').textContent=state.soundOn?'🔈':'🔇';
  setAmbientVolume(state.soundOn?0.008:0);
});

// ====== Mode switching ======
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    stopAutoCrochet();
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.mode=btn.dataset.mode;
    state.activePattern=null;
    state.amiPattern=null;
    clearFabric();
    if(state.mode==='pattern'){
      openPatternSelect();
    } else if(state.mode==='amigurumi'){
      openAmiSelect();
    } else {
      document.getElementById('patternBar').classList.remove('visible');
    }
    updatePatternBar();
  });
});

// ====== Pattern selector ======
function openPatternSelect(){
  const panel=document.getElementById('patList');
  panel.innerHTML='';
  PATTERNS.filter(p=>!p.isAmigurumi).forEach(p=>{
    const unlocked=p.difficulty===0||state.completedPatterns.length>=p.difficulty;
    const card=document.createElement('div');
    card.className='pat-card'+(unlocked?'':' locked');
    card.innerHTML=`
      <div class="icon">${p.icon}</div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="desc">${unlocked?p.desc:'Complete more patterns to unlock'}</div>
      </div>
      ${state.completedPatterns.includes(p.name)?'<div class="badge">Done</div>':''}
    `;
    if(unlocked) card.addEventListener('click',()=>selectPattern(p));
    panel.appendChild(card);
  });
  document.getElementById('patternSelect').classList.add('open');
}

function openAmiSelect(){
  const panel=document.getElementById('patList');
  panel.innerHTML='';
  const items=[...AMIGURUMI_SHAPES,...PATTERNS.filter(p=>p.isAmigurumi)];
  items.forEach(p=>{
    const card=document.createElement('div');
    card.className='pat-card';
    card.innerHTML=`
      <div class="icon">${p.icon}</div>
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="desc">${p.desc}</div>
      </div>
      ${state.completedPatterns.includes(p.name)?'<div class="badge">Done</div>':''}
    `;
    card.addEventListener('click',()=>selectAmiPattern(p));
    panel.appendChild(card);
  });
  // Free mode option
  const freeCard=document.createElement('div');
  freeCard.className='pat-card';
  freeCard.innerHTML=`
    <div class="icon">🧶</div>
    <div class="info">
      <div class="name">Free Form</div>
      <div class="desc">Just stitch in rounds. No pattern.</div>
    </div>`;
  freeCard.addEventListener('click',()=>{
    state.amiPattern=null;
    document.getElementById('patternSelect').classList.remove('open');
    updatePatternBar();
  });
  panel.appendChild(freeCard);
  document.getElementById('patternSelect').classList.add('open');
}

function selectPattern(pat){
  state.activePattern=pat;
  state.amiPattern=pat.isAmigurumi?pat:null;
  state.rowWidth=pat.width;
  clearFabric();
  // Set initial color from autoColors if available
  if(pat.autoColors){
    state.colorIdx=pat.autoColors[0];
    buildColorRow();
  }
  document.getElementById('patternSelect').classList.remove('open');
  updatePatternBar();
}

function selectAmiPattern(pat){
  state.amiPattern=pat;
  state.activePattern=pat;
  clearFabric();
  if(pat.autoColors){
    state.colorIdx=pat.autoColors[0];
    buildColorRow();
  }
  document.getElementById('patternSelect').classList.remove('open');
  updatePatternBar();
}

document.getElementById('closePat').addEventListener('click',()=>{
  document.getElementById('patternSelect').classList.remove('open');
});
document.getElementById('patternBtn').addEventListener('click',()=>{
  if(state.mode==='amigurumi') openAmiSelect();
  else openPatternSelect();
});
document.getElementById('completeClose').addEventListener('click',()=>{
  document.getElementById('completeOverlay').classList.remove('open');
  clearFabric();
  if(state.mode==='pattern') openPatternSelect();
  else if(state.mode==='amigurumi') openAmiSelect();
});

// Scroll fabric with wheel
C.addEventListener('wheel',e=>{
  state.scrollY-=e.deltaY*0.5;
  draw();
},{passive:true});

// Initial draw
draw();
updatePatternBar();
</script>
</body>
</html>
