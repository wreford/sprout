<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Cozy Crochet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;touch-action:manipulation;
  -webkit-user-select:none;user-select:none;font-family:Georgia,'Times New Roman',serif}
body{display:flex;flex-direction:column;height:100dvh;background:#FAF6F0;color:#4A3A2A}
.vig{position:fixed;inset:0;pointer-events:none;z-index:999;
  background:radial-gradient(ellipse at center,transparent 60%,rgba(40,30,20,0.1) 100%)}
.top{display:flex;justify-content:space-between;align-items:baseline;
  padding:10px 16px 8px;padding-top:max(10px,env(safe-area-inset-top));flex-shrink:0;z-index:10}
.top h1{font-size:1.05rem;font-weight:400;color:#6A5040;letter-spacing:0.02em}
.top .ct{font-size:0.68rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif;text-align:right;line-height:1.5}
.main{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}
.controls{flex-shrink:0;padding:10px 12px;
  padding-bottom:max(12px,calc(12px + env(safe-area-inset-bottom)));
  padding-left:max(12px,env(safe-area-inset-left));
  padding-right:max(12px,env(safe-area-inset-right));
  background:rgba(250,246,240,0.92);backdrop-filter:blur(10px);
  border-top:1px solid rgba(180,160,140,0.15)}
.colors{display:flex;gap:7px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  transition:transform .15s,box-shadow .15s;padding:0;outline:none}
.sw.on{transform:scale(1.18);box-shadow:0 0 0 2.5px #FAF6F0,0 0 0 4px #8A7A6A}
.sw.pale{box-shadow:inset 0 0 0 1px rgba(160,140,120,0.3)}
.sw.pale.on{box-shadow:0 0 0 2.5px #FAF6F0,0 0 0 4px #8A7A6A}
.types{display:flex;gap:8px;justify-content:center;margin-bottom:10px}
.tb{padding:5px 14px;border-radius:8px;border:1px solid rgba(160,140,120,0.25);
  background:transparent;cursor:pointer;font-size:0.72rem;color:#8A7A6A;
  font-family:-apple-system,system-ui,sans-serif;transition:all .15s;letter-spacing:0.03em}
.tb.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}
.acts{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.ab{padding:5px 14px;border-radius:8px;border:1px solid rgba(160,140,120,0.2);
  background:transparent;cursor:pointer;font-size:0.7rem;color:#9A8A7A;
  font-family:-apple-system,system-ui,sans-serif;transition:all .15s;min-height:32px}
.ab:active{transform:scale(0.95)}
.ab.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}
.overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(40,30,20,0.4);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{background:#FAF6F0;border-radius:14px;padding:20px;max-width:340px;width:88%;
  box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.panel h2{font-size:0.95rem;text-align:center;margin-bottom:14px;color:#6A5040;font-weight:400}
.pc{padding:14px;border-radius:10px;border:1px solid rgba(160,140,120,0.15);
  margin-bottom:8px;cursor:pointer;background:transparent;transition:background .15s}
.pc:active{background:rgba(160,140,120,0.1)}
.pc .nm{font-size:0.82rem;color:#5A4A3A;margin-bottom:2px}
.pc .ds{font-size:0.68rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.cbtn{display:block;margin:10px auto 0;padding:8px 20px;border-radius:8px;
  border:1px solid rgba(160,140,120,0.2);background:none;cursor:pointer;
  font-size:0.78rem;color:#9A8A7A;font-family:-apple-system,system-ui,sans-serif}
.sp{display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:8px;
  border:1px solid rgba(160,140,120,0.15);background:transparent;cursor:pointer;
  font-size:0.82rem;font-family:Georgia,serif;color:#6A5040}
.sp.on{background:#6A5040;color:#FAF6F0;border-color:#6A5040}
.row-toast{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.88);color:#6A5040;padding:8px 22px;border-radius:16px;
  font-size:0.82rem;font-family:-apple-system,system-ui,sans-serif;
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:50;
  box-shadow:0 2px 12px rgba(60,40,20,0.1)}
.row-toast.show{opacity:1}
</style>
</head>
<body>
<div class="vig"></div>
<div class="top">
  <h1>Cozy Crochet</h1>
  <div class="ct" id="ct">0 stitches</div>
</div>
<div class="main">
  <canvas id="C"></canvas>
  <div class="row-toast" id="toast"></div>
</div>
<div class="controls">
  <div class="colors" id="clr"></div>
  <div class="types" id="tps"></div>
  <div class="acts">
    <button class="ab" id="bUndo">Undo</button>
    <button class="ab" id="bAuto">Auto</button>
    <button class="ab" id="bPat">Pattern</button>
    <button class="ab" id="bSnd">Sound</button>
    <button class="ab" id="bSpd">Speed</button>
  </div>
</div>
<div class="overlay" id="oPat">
  <div class="panel"><h2>Patterns</h2><div id="pList"></div>
  <button class="cbtn" id="cPat">Close</button></div>
</div>
<div class="overlay" id="oSpd">
  <div class="panel" style="max-width:260px"><h2>Auto Speed</h2>
    <button class="sp" data-ms="400">Meditative</button>
    <button class="sp on" data-ms="200">Steady</button>
    <button class="sp" data-ms="100">Quick</button>
    <button class="cbtn" id="cSpd">Close</button>
  </div>
</div>

<script>
// ============================================================
// Cozy Crochet -- procedural yarn thread rendering
// Bezier yarn paths with over/under crossings at each stitch
// ============================================================
const C = document.getElementById('C'), cx = C.getContext('2d');

const PAL = [
  '#F0E4D0','#D4A0A0','#A8B89C','#D4A843','#8CA8B8',
  '#D08060','#B0A0C0','#B06040','#C8C4C0','#505050'
];
const PNAME = [
  'Cream','Blush','Sage','Honey','Dusty Blue',
  'Coral','Lavender','Clay','Cloud','Charcoal'
];
const TKEYS = ['ch','sc'];
const ST = { ch:{h:18,label:'ch'}, sc:{h:28,label:'sc'} };

const PATTERNS = [
  { name:'Free', desc:'Freeform -- stitch whatever you like', width:10, getRow:()=>null },
  { name:'Scarf', desc:'8 wide, color bands every 4 rows', width:8,
    colors:[1,3], totalRows:24,
    getRow(r){ return {t:'sc',c:this.colors[Math.floor(r/4)%this.colors.length]} }},
  { name:'Blanket', desc:'12 wide, rainbow stripes', width:12,
    colors:[1,5,3,6,4,0], totalRows:18,
    getRow(r){ return {t:'sc',c:this.colors[Math.floor(r/3)%this.colors.length]} }},
  { name:'Chain Band', desc:'Alternating chain and single crochet', width:10,
    colors:[1,5,3], totalRows:16,
    getRow(r){ return {t:r%2===0?'ch':'sc',c:this.colors[Math.floor(r/4)%this.colors.length]} }},
];

const S = {
  type:'sc',color:1,fabric:[],row:0,col:0,width:10,
  auto:false,autoMs:200,autoTm:null,sound:true,
  panY:0,anim:false,pat:null,patRow:0,today:0,total:0
};

try {
  const d=JSON.parse(localStorage.getItem('cc'));
  if(d){S.total=d.t||0;S.sound=d.s!==false;S.color=d.c||1;
    if(d.dy===new Date().toDateString())S.today=d.n||0;}
} catch(e){}
function save(){try{localStorage.setItem('cc',JSON.stringify({
  t:S.total,s:S.sound,c:S.color,n:S.today,dy:new Date().toDateString()}));}catch(e){}}

// -- Color math --
function hx(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function th(r,g,b){return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('')}
function li(c,a){const[r,g,b]=hx(c);return th(r+a,g+a,b+a)}
function dk(c,a){return li(c,-a)}
function ra(c,a){const[r,g,b]=hx(c);return`rgba(${r},${g},${b},${a})`}

// -- Audio --
let ac=null;
function initA(){if(ac)return;ac=new(window.AudioContext||window.webkitAudioContext)()}
function playPop(){
  if(!S.sound||!ac)return;const t=ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type='sine';o.frequency.value=600+Math.random()*200;
  g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.025);
  o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.03);
  const buf=ac.createBuffer(1,ac.sampleRate*0.02,ac.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.3;
  const ns=ac.createBufferSource(),ng=ac.createGain();ns.buffer=buf;
  ng.gain.setValueAtTime(0.01,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.02);
  ns.connect(ng);ng.connect(ac.destination);ns.start(t);ns.stop(t+0.03);
}
function playChime(){
  if(!S.sound||!ac)return;const t=ac.currentTime;
  [523,659,784].forEach((f,i)=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.04,t+i*0.08);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.3+i*0.08);
    o.connect(g);g.connect(ac.destination);o.start(t+i*0.08);o.stop(t+0.35+i*0.08);
  });
}

// ============================================================
// Yarn rendering primitives
// ============================================================
const YW = 5;    // yarn width
const HL = 1.5;  // highlight offset

// Stroke a cubic bezier as yarn: base color, optional shadow underneath, 3D highlight
function yarnBez(p, col, shad) {
  if (shad) {
    cx.strokeStyle = shad; cx.lineWidth = YW + 2.5;
    cx.lineCap = 'round'; cx.lineJoin = 'round';
    cx.beginPath(); cx.moveTo(p[0].x, p[0].y);
    cx.bezierCurveTo(p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y); cx.stroke();
  }
  cx.strokeStyle = col; cx.lineWidth = YW;
  cx.lineCap = 'round'; cx.lineJoin = 'round';
  cx.beginPath(); cx.moveTo(p[0].x, p[0].y);
  cx.bezierCurveTo(p[1].x,p[1].y,p[2].x,p[2].y,p[3].x,p[3].y); cx.stroke();
  // 3D highlight
  const a = cx.globalAlpha; cx.globalAlpha = 0.45;
  cx.strokeStyle = li(col, 42); cx.lineWidth = HL;
  cx.beginPath(); cx.moveTo(p[0].x-0.8, p[0].y-1);
  cx.bezierCurveTo(p[1].x-0.8,p[1].y-1,p[2].x-0.8,p[2].y-1,p[3].x-0.8,p[3].y-1);
  cx.stroke(); cx.globalAlpha = a;
}

// Stroke an elliptical arc as yarn
function yarnArc(mx, my, rx, ry, rot, a0, a1, col, shad) {
  if (shad) {
    cx.strokeStyle = shad; cx.lineWidth = YW + 2.5;
    cx.lineCap = 'round';
    cx.beginPath(); cx.ellipse(mx,my,rx,ry,rot,a0,a1); cx.stroke();
  }
  cx.strokeStyle = col; cx.lineWidth = YW; cx.lineCap = 'round';
  cx.beginPath(); cx.ellipse(mx,my,rx,ry,rot,a0,a1); cx.stroke();
  const a = cx.globalAlpha; cx.globalAlpha = 0.4;
  cx.strokeStyle = li(col, 42); cx.lineWidth = HL;
  cx.beginPath(); cx.ellipse(mx-0.7,my-0.9,Math.max(1,rx-1),Math.max(1,ry-1),rot,a0,a1);
  cx.stroke(); cx.globalAlpha = a;
}

// ============================================================
// Chain stitch: interlocking oval loops, each threaded through previous
// ============================================================
function drawChain(x, y, w, h, col, sc) {
  sc = sc == null ? 1 : sc; if (sc < 0.01) return;
  const mx = x+w/2, my = y+h/2;
  if (sc < 1) { cx.save(); cx.translate(mx,my); cx.scale(sc,sc); cx.translate(-mx,-my); }

  const lw = w*0.36, lh = h*0.36;
  const darkC = dk(col, 25);
  const shadC = ra(darkC, 0.3);
  const PI = Math.PI;

  // Bottom half of oval loop (the "under" part -- behind the next chain link)
  yarnArc(mx, my, lw, lh, 0, PI*0.12, PI*0.88, dk(col,10), shadC);

  // Vertical thread connector going through the loop center to next link
  const cy1 = my + lh*0.55, cy2 = my + h*0.48;
  yarnBez([{x:mx-1,y:cy1},{x:mx-2,y:(cy1+cy2)/2},{x:mx+2,y:(cy1+cy2)/2},{x:mx+1,y:cy2}],
    dk(col,6), null);

  // Top half of oval loop (the "over" part -- drawn on top, crossing over the thread)
  yarnArc(mx, my, lw, lh, 0, -PI*0.88, PI*0.12, col, null);

  // Tiny interior shadow to sell the hole
  cx.save(); cx.globalAlpha = 0.18;
  cx.fillStyle = dk(col, 40);
  cx.beginPath(); cx.ellipse(mx, my+0.5, lw*0.38, lh*0.28, 0, 0, PI*2); cx.fill();
  cx.restore();

  if (sc < 1) cx.restore();
}

// ============================================================
// Single crochet: two crossing legs (right OVER left) with bottom loop
// ============================================================
function drawSC(x, y, w, h, col, sc) {
  sc = sc == null ? 1 : sc; if (sc < 0.01) return;
  const mx = x+w/2, my = y+h/2;
  if (sc < 1) { cx.save(); cx.translate(mx,my); cx.scale(sc,sc); cx.translate(-mx,-my); }

  const darkC = dk(col, 30);
  const shadC = ra(darkC, 0.32);
  const leg = w*0.30;
  const topY = y + h*0.06;
  const botY = y + h*0.86;
  const crossY = my + h*0.02;

  // --- Left leg (UNDER at crossing) ---
  // Upper left: from top-left down to crossing point
  const luPts = [
    {x:mx-leg, y:topY},
    {x:mx-leg*0.65, y:topY+(crossY-topY)*0.45},
    {x:mx+leg*0.08, y:crossY-h*0.08},
    {x:mx+leg*0.12, y:crossY}
  ];
  // Lower left: from crossing down to bottom
  const llPts = [
    {x:mx+leg*0.12, y:crossY},
    {x:mx+leg*0.05, y:crossY+(botY-crossY)*0.35},
    {x:mx+w*0.03, y:botY-h*0.1},
    {x:mx, y:botY}
  ];

  // 1) Draw full left leg (will be partially covered by right leg)
  yarnBez(luPts, dk(col,12), shadC);
  yarnBez(llPts, dk(col,12), shadC);

  // --- Bottom loop ---
  const loopR = w*0.16;
  yarnBez([
    {x:mx, y:botY},
    {x:mx-loopR, y:botY+h*0.1},
    {x:mx+loopR, y:botY+h*0.1},
    {x:mx, y:botY}
  ], dk(col,5), null);

  // --- Right leg (OVER at crossing) ---
  // Upper right: from top-right down through crossing
  const ruPts = [
    {x:mx+leg, y:topY},
    {x:mx+leg*0.65, y:topY+(crossY-topY)*0.45},
    {x:mx-leg*0.08, y:crossY-h*0.08},
    {x:mx-leg*0.12, y:crossY}
  ];
  // Lower right: from crossing down to bottom
  const rlPts = [
    {x:mx-leg*0.12, y:crossY},
    {x:mx-leg*0.05, y:crossY+(botY-crossY)*0.35},
    {x:mx-w*0.03, y:botY-h*0.1},
    {x:mx, y:botY}
  ];

  // 2) "Erase" crossing zone on left leg so right leg reads as OVER
  //    Paint a background-colored stripe across the crossing on the left leg only
  cx.save();
  cx.strokeStyle = '#FAF6F0'; cx.lineWidth = YW + 4; cx.lineCap = 'round';
  // Clip to small crossing zone
  cx.beginPath();
  cx.rect(mx - leg*0.5, crossY - YW*1.8, leg, YW*3.6);
  cx.clip();
  // Overdraw the left leg path with background color at crossing
  cx.beginPath(); cx.moveTo(luPts[0].x, luPts[0].y);
  cx.bezierCurveTo(luPts[1].x,luPts[1].y,luPts[2].x,luPts[2].y,luPts[3].x,luPts[3].y);
  cx.stroke();
  cx.restore();

  // 3) Re-draw left leg segments only at crossing zone (darker, as under-strand)
  cx.save();
  cx.beginPath();
  cx.rect(mx - leg*0.5, crossY - YW*1.8, leg, YW*3.6);
  cx.clip();
  // Shadow
  cx.strokeStyle = ra(darkC, 0.45); cx.lineWidth = YW + 2; cx.lineCap = 'round';
  cx.beginPath(); cx.moveTo(luPts[0].x,luPts[0].y);
  cx.bezierCurveTo(luPts[1].x,luPts[1].y,luPts[2].x,luPts[2].y,luPts[3].x,luPts[3].y);
  cx.stroke();
  // Under-strand color (darker)
  cx.strokeStyle = dk(col, 20); cx.lineWidth = YW;
  cx.beginPath(); cx.moveTo(luPts[0].x,luPts[0].y);
  cx.bezierCurveTo(luPts[1].x,luPts[1].y,luPts[2].x,luPts[2].y,luPts[3].x,luPts[3].y);
  cx.stroke();
  cx.restore();

  // 4) Draw right leg fully on top
  yarnBez(ruPts, col, shadC);
  yarnBez(rlPts, col, shadC);

  // --- Top bar connecting the two legs ---
  const barY = topY - h*0.01;
  yarnBez([
    {x:mx-leg-w*0.04, y:barY},
    {x:mx-leg*0.3, y:barY-h*0.05},
    {x:mx+leg*0.3, y:barY-h*0.05},
    {x:mx+leg+w*0.04, y:barY}
  ], col, null);

  if (sc < 1) cx.restore();
}

// ============================================================
// Stitch dispatch
// ============================================================
function drawStitch(x,y,w,h,color,type,scale) {
  if (type==='ch') drawChain(x,y,w,h,color,scale);
  else drawSC(x,y,w,h,color,scale);
}

// ============================================================
// Main draw
// ============================================================
function draw() {
  const dpr=window.devicePixelRatio||1;
  const cw=C.clientWidth, ch=C.clientHeight;
  if(C.width!==cw*dpr||C.height!==ch*dpr){C.width=cw*dpr;C.height=ch*dpr;}
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.clearRect(0,0,cw,ch);
  cx.fillStyle='#FAF6F0'; cx.fillRect(0,0,cw,ch);

  if(!S.fabric.length){
    cx.fillStyle='rgba(150,130,110,0.22)';
    cx.font='14px -apple-system,system-ui,sans-serif';cx.textAlign='center';
    cx.fillText('Tap anywhere to begin',cw/2,ch/2);
    cx.fillText('Each tap adds one stitch',cw/2,ch/2+24);
    updateCt();return;
  }

  const bw=Math.max(22,Math.min(48,(cw-28)/S.width));
  const fabricW=S.width*bw, ox=(cw-fabricW)/2;

  // Row layout
  const rys=[];let cum=28+S.panY;
  for(let r=0;r<S.fabric.length;r++){
    const row=S.fabric[r];let mh=ST.sc.h;
    for(const st of row){const ti=ST[st.t]||ST.sc;if(ti.h>mh)mh=ti.h;}
    rys.push({y:cum,h:mh});cum+=mh+2;
  }
  // Auto-scroll
  const vb=ch-8;
  if(cum>vb){const over=cum-vb;if(S.panY>-over)S.panY=-over;
    cum=28+S.panY;
    for(let r=0;r<rys.length;r++){rys[r].y=cum;cum+=rys[r].h+2;}
  }

  // Draw inter-row connectors
  for(let r=1;r<S.fabric.length;r++){
    const pr=S.fabric[r-1],cr=S.fabric[r];
    if(!pr.length||!cr.length)continue;
    const pRev=(r-1)%2===1, cRev=r%2===1;
    const pCol=pRev?0:pr.length-1, cCol=cRev?S.width-1:0;
    const pOff=pRev?bw*0.08:0, cOff=cRev?bw*0.08:0;
    const px=ox+pCol*bw+bw/2+pOff, py=rys[r-1].y+rys[r-1].h*0.9;
    const nx=ox+cCol*bw+bw/2+cOff, ny=rys[r].y+rys[r].h*0.1;
    const cc=ra(PAL[pr[pr.length-1].c],0.25);
    const mmx=(px+nx)/2, sag=Math.abs(ny-py)*0.15;
    yarnBez([{x:px,y:py},{x:mmx-sag,y:py+(ny-py)*0.35},{x:mmx+sag,y:py+(ny-py)*0.65},{x:nx,y:ny}],cc,null);
  }

  // Draw stitches
  for(let r=0;r<S.fabric.length;r++){
    const row=S.fabric[r],ry=rys[r];
    const rev=r%2===1, xoff=rev?bw*0.08:0;
    for(let c=0;c<row.length;c++){
      const st=row[c];
      const ci=rev?(S.width-1-c):c;
      const sx=ox+ci*bw+xoff;
      // Intra-row yarn connector
      if(c>0){
        const pci=rev?(S.width-1-(c-1)):(c-1);
        const px=ox+pci*bw+bw/2+xoff, nx2=sx+bw/2;
        const cy2=ry.y+ry.h*0.05;
        yarnBez([{x:px,y:cy2},{x:(px+nx2)/2,y:cy2-3},{x:(px+nx2)/2,y:cy2-3},{x:nx2,y:cy2}],
          ra(PAL[st.c],0.35),null);
      }
      drawStitch(sx,ry.y,bw-1,ry.h,PAL[st.c],st.t,st.sc);
    }
  }

  // Hook
  const hr=S.row,hc=hr%2===1?(S.width-1-S.col):S.col;
  const hoff=hr%2===1?bw*0.08:0;
  const hy=hr<rys.length?rys[hr].y:cum;
  const hookX=ox+hc*bw+bw/2+hoff, hookY=hy-2;
  cx.save();cx.translate(hookX,hookY);
  cx.strokeStyle='#AAA';cx.lineWidth=2;cx.lineCap='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(0,-12);cx.stroke();
  cx.beginPath();cx.arc(2.5,0,2.5,Math.PI,Math.PI*0.3,true);cx.stroke();
  cx.strokeStyle='#C89060';cx.lineWidth=3.5;
  cx.beginPath();cx.moveTo(0,-12);cx.lineTo(0,-24);cx.stroke();
  cx.restore();
  // Yarn tail
  cx.save();cx.strokeStyle=ra(PAL[S.color],0.25);
  cx.lineWidth=2;cx.lineCap='round';cx.setLineDash([4,5]);
  cx.beginPath();cx.moveTo(hookX,hookY);
  cx.quadraticCurveTo(cw-18,hookY-28,cw-8,12);cx.stroke();
  cx.setLineDash([]);cx.restore();
  updateCt();
}

function updateCt(){
  const n=S.fabric.reduce((a,r)=>a+r.length,0);
  const el=document.getElementById('ct');
  let t=n+(n===1?' stitch':' stitches');
  if(S.total>n)t+=' / '+S.total+' all time';
  el.textContent=t;
}

// -- Animation --
function animSt(st,dur){return new Promise(res=>{
  st.sc=0.4;const t0=performance.now();
  function tick(now){const p=Math.min(1,(now-t0)/dur);
    st.sc=0.4+0.6*(1-Math.pow(1-p,3));draw();
    if(p<1)requestAnimationFrame(tick);else{st.sc=1;S.anim=false;res();}}
  requestAnimationFrame(tick);});}

// -- Add stitch --
let lastTap=0;
function addStitch(){
  const now=Date.now();if(now-lastTap<100||S.anim)return;
  lastTap=now;initA();S.anim=true;
  let type=S.type,color=S.color;
  if(S.pat&&S.pat.getRow){const info=S.pat.getRow(S.patRow);
    if(info){type=info.t||type;color=info.c!=null?info.c:color;}}
  if(!S.fabric[S.row])S.fabric[S.row]=[];
  const st={t:type,c:color,sc:0.4};S.fabric[S.row].push(st);playPop();
  animSt(st,160).then(()=>{S.today++;S.total++;save();S.col++;
    if(S.col>=S.width){playChime();showToast('Row '+(S.row+1)+' complete');
      S.col=0;S.row++;S.patRow++;
      if(S.pat&&S.pat.totalRows&&S.patRow>=S.pat.totalRows){
        showToast(S.pat.name+' finished!');stopAuto();return;}}
    if(S.auto)schedAuto();});
}

// -- Toast --
let toastTm=null;
function showToast(m){const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  if(toastTm)clearTimeout(toastTm);toastTm=setTimeout(()=>el.classList.remove('show'),1200);}

// -- Auto --
function toggleAuto(){if(S.auto)stopAuto();else startAuto();}
function startAuto(){initA();S.auto=true;
  document.getElementById('bAuto').classList.add('on');
  document.getElementById('bAuto').textContent='Stop';schedAuto();}
function stopAuto(){S.auto=false;if(S.autoTm){clearTimeout(S.autoTm);S.autoTm=null;}
  document.getElementById('bAuto').classList.remove('on');
  document.getElementById('bAuto').textContent='Auto';}
function schedAuto(){if(!S.auto)return;
  S.autoTm=setTimeout(()=>{if(!S.auto)return;
    if(!S.anim)addStitch();else schedAuto();},S.autoMs);}

// -- Undo --
function undo(){if(S.auto)stopAuto();if(S.anim)return;if(!S.fabric.length)return;
  const last=S.fabric[S.row];
  if(last&&last.length>0){last.pop();if(S.col>0)S.col--;}
  else if(S.row>0){if(last&&!last.length)S.fabric.pop();S.row--;
    if(S.patRow>0)S.patRow--;const prev=S.fabric[S.row];
    if(prev&&prev.length>0){prev.pop();S.col=prev.length;}else S.col=0;}
  draw();}

// -- UI --
function buildColors(){const el=document.getElementById('clr');el.innerHTML='';
  PAL.forEach((c,i)=>{const b=document.createElement('button');
    b.className='sw'+(i===S.color?' on':'');
    if(i===0||i===8)b.classList.add('pale');
    b.style.background=c;b.title=PNAME[i];
    b.addEventListener('click',()=>{S.color=i;buildColors();});el.appendChild(b);});}
function buildTypes(){const el=document.getElementById('tps');el.innerHTML='';
  TKEYS.forEach(k=>{const b=document.createElement('button');
    b.className='tb'+(k===S.type?' on':'');b.textContent=ST[k].label;
    b.addEventListener('click',()=>{S.type=k;buildTypes();});el.appendChild(b);});}

function openPats(){const el=document.getElementById('pList');el.innerHTML='';
  PATTERNS.forEach(p=>{const d=document.createElement('div');d.className='pc';
    d.innerHTML='<div class="nm">'+p.name+'</div><div class="ds">'+p.desc+'</div>';
    d.addEventListener('click',()=>selPat(p));el.appendChild(d);});
  document.getElementById('oPat').classList.add('open');}
function selPat(p){stopAuto();
  S.pat=p.getRow!=null&&p.name!=='Free'?p:null;S.width=p.width||10;
  S.fabric=[];S.row=0;S.col=0;S.patRow=0;S.panY=0;S.anim=false;
  document.getElementById('oPat').classList.remove('open');draw();}
function openSpeed(){document.getElementById('oSpd').classList.add('open');
  document.querySelectorAll('.sp').forEach(b=>
    b.classList.toggle('on',parseInt(b.dataset.ms)===S.autoMs));}

// -- Events --
buildColors();buildTypes();
C.addEventListener('click',e=>{e.preventDefault();if(!S.auto)addStitch();});
C.addEventListener('touchstart',e=>{
  if(e.touches.length===1){e.preventDefault();initA();if(!S.auto)addStitch();}
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();initA();if(!S.auto)addStitch();}
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undo();}
  if(e.key==='a')toggleAuto();
  const n=parseInt(e.key);if(n>=1&&n<=TKEYS.length){S.type=TKEYS[n-1];buildTypes();}
});
C.addEventListener('wheel',e=>{S.panY-=e.deltaY*0.5;draw();},{passive:true});
let tp=null;
C.addEventListener('touchmove',e=>{if(e.touches.length===2){
  const t=e.touches[0];if(tp){S.panY+=t.clientY-tp.y;draw();}
  tp={x:t.clientX,y:t.clientY};e.preventDefault();}},{passive:false});
C.addEventListener('touchend',()=>{tp=null;});
document.getElementById('bUndo').addEventListener('click',undo);
document.getElementById('bAuto').addEventListener('click',toggleAuto);
document.getElementById('bPat').addEventListener('click',openPats);
document.getElementById('cPat').addEventListener('click',()=>document.getElementById('oPat').classList.remove('open'));
document.getElementById('bSnd').addEventListener('click',()=>{
  initA();S.sound=!S.sound;
  document.getElementById('bSnd').textContent=S.sound?'Sound':'Muted';save();});
document.getElementById('bSnd').textContent=S.sound?'Sound':'Muted';
document.getElementById('bSpd').addEventListener('click',openSpeed);
document.querySelectorAll('.sp').forEach(b=>b.addEventListener('click',()=>{
  S.autoMs=parseInt(b.dataset.ms);
  document.querySelectorAll('.sp').forEach(s=>s.classList.toggle('on',parseInt(s.dataset.ms)===S.autoMs));
  document.getElementById('oSpd').classList.remove('open');}));
document.getElementById('cSpd').addEventListener('click',()=>document.getElementById('oSpd').classList.remove('open'));
window.addEventListener('resize',()=>draw());
setTimeout(draw,0);
</script>
</body>
</html>
