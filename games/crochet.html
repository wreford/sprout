<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>Cozy Crochet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF6EC;--panel:#F5E6CC;--border:#D4C4A8;--text:#3A3028;--dim:#8A7A6A;
  --accent:#D4A0A0;--shadow:rgba(60,40,20,0.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Georgia',serif;
  overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
body{display:flex;flex-direction:column;height:100dvh}

#back{position:fixed;top:max(10px,env(safe-area-inset-top));left:12px;z-index:100;
  color:var(--dim);text-decoration:none;font-size:0.85rem;font-family:-apple-system,sans-serif;opacity:0.7}

.top-bar{display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px 6px 60px;padding-top:max(8px,env(safe-area-inset-top));
  flex-shrink:0;z-index:10;border-bottom:1px solid var(--border);
  background:rgba(245,230,204,0.9);backdrop-filter:blur(8px)}
.top-bar h1{font-size:1rem;font-weight:700;color:#5A4030}
.stats{font-size:0.7rem;color:var(--dim);text-align:right;line-height:1.5;font-family:-apple-system,sans-serif}

.main{flex:1;position:relative;overflow:hidden;z-index:1}
canvas#C{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}
canvas#preview3d{position:absolute;top:8px;right:8px;width:110px;height:110px;
  border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 12px var(--shadow);
  z-index:30;cursor:pointer;background:rgba(253,246,236,0.92);backdrop-filter:blur(4px)}
.row-flash{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:0.9rem;color:#5A4030;background:rgba(255,255,255,0.92);padding:8px 22px;
  border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;
  font-family:-apple-system,sans-serif;z-index:50;box-shadow:0 2px 16px var(--shadow)}
.row-flash.show{opacity:1}

.controls{flex-shrink:0;border-top:1px solid var(--border);
  background:rgba(245,230,204,0.95);backdrop-filter:blur(8px);
  padding:8px 10px;padding-bottom:max(10px,calc(10px + env(safe-area-inset-bottom)));
  padding-left:max(10px,env(safe-area-inset-left));
  padding-right:max(10px,env(safe-area-inset-right))}

.color-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:all .15s;box-shadow:0 1px 4px var(--shadow)}
.color-swatch.active{border-color:var(--text);transform:scale(1.15);box-shadow:0 2px 10px var(--shadow)}

.stitch-row{display:flex;gap:6px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.stitch-btn{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 14px;border-radius:12px;border:1px solid var(--border);
  background:#fff;cursor:pointer;transition:all .15s;min-width:60px;min-height:48px}
.stitch-btn.active{background:#5A4030;border-color:#5A4030;color:#fff}
.stitch-btn .lbl{font-size:0.6rem;font-family:-apple-system,sans-serif;text-transform:uppercase;letter-spacing:0.5px}

.action-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.action-btn{padding:6px 16px;border-radius:10px;border:1px solid var(--border);
  background:#fff;cursor:pointer;font-size:0.72rem;font-family:-apple-system,sans-serif;
  color:var(--dim);transition:all .15s;min-height:36px;min-width:48px;
  display:flex;align-items:center;justify-content:center}
.action-btn:active{transform:scale(0.95)}
.action-btn.auto-active{background:#5A4030;color:#fff;border-color:#5A4030}

.overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(60,40,20,0.5);backdrop-filter:blur(4px);
  align-items:center;justify-content:center}
.overlay.open{display:flex}
.overlay-panel{background:var(--bg);border-radius:16px;padding:20px;
  max-width:380px;width:90%;max-height:80vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.overlay-panel h2{font-size:1rem;text-align:center;margin-bottom:14px;color:#5A4030}
.pat-card{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;
  border:1px solid var(--border);margin-bottom:8px;cursor:pointer;background:#fff;min-height:48px}
.pat-card:active{transform:scale(0.98)}
.pat-card .icon{font-size:1.4rem;width:36px;text-align:center}
.pat-card .info{flex:1}
.pat-card .info .name{font-size:0.85rem;font-weight:600}
.pat-card .info .desc{font-size:0.68rem;color:var(--dim);font-family:-apple-system,sans-serif}
.pat-card .badge{font-size:0.65rem;color:#8A9A7C;font-family:-apple-system,sans-serif}
.close-btn{display:block;margin:10px auto 0;padding:8px 24px;border-radius:10px;
  border:1px solid var(--border);background:none;cursor:pointer;font-size:0.8rem;color:var(--dim);min-height:44px}

.speed-option{display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:10px;
  border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.85rem;
  font-family:inherit;min-height:48px}
.speed-option.active{background:#5A4030;color:#fff;border-color:#5A4030}

.complete-card{background:var(--bg);border-radius:16px;padding:28px;text-align:center;
  max-width:320px;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.complete-card h2{font-size:1.2rem;color:#5A4030;margin-bottom:6px}
.complete-card p{font-size:0.8rem;color:var(--dim);margin-bottom:16px;font-family:-apple-system,sans-serif}
.complete-card button{padding:10px 28px;border-radius:12px;border:1px solid var(--border);
  background:#5A4030;color:#fff;cursor:pointer;font-size:0.85rem;font-family:inherit;min-height:48px}

.pattern-bar{display:none;padding:6px 14px;background:rgba(255,255,255,0.7);
  border-bottom:1px solid var(--border);font-size:0.75rem;font-family:-apple-system,sans-serif;
  text-align:center;line-height:1.6;flex-shrink:0;z-index:10}
.pattern-bar.visible{display:block}
.pattern-bar .label{font-weight:600;color:#5A4030}
.pattern-bar .instruction{color:var(--dim)}

@media(max-width:500px){
  .stitch-btn{min-width:52px;padding:6px 10px}
  .color-swatch{width:30px;height:30px}
}
</style>
</head>
<body>


<div class="top-bar">
  <h1>Cozy Crochet</h1>
  <div class="stats" id="stats">Row 1 | Stitch 0</div>
</div>

<div class="pattern-bar" id="patternBar">
  <span class="label" id="patLabel">Scarf</span> --
  <span class="instruction" id="patInstruction">Row 1</span>
</div>

<div class="main">
  <canvas id="C"></canvas>
  <canvas id="preview3d" width="220" height="220"></canvas>
  <div class="row-flash" id="rowFlash">Row complete!</div>
</div>

<div class="controls">
  <div class="color-row" id="colorRow"></div>
  <div class="stitch-row" id="stitchRow"></div>
  <div class="action-row">
    <button class="action-btn" id="undoBtn">Undo</button>
    <button class="action-btn" id="clearBtn">Clear</button>
    <button class="action-btn" id="autoBtn">Auto</button>
    <button class="action-btn" id="patternBtn">Patterns</button>
    <button class="action-btn" id="sndBtn">Sound</button>
    <button class="action-btn" id="speedBtn">Speed</button>
  </div>
</div>

<div class="overlay" id="patternSelect">
  <div class="overlay-panel">
    <h2>Choose a Pattern</h2>
    <div id="patList"></div>
    <button class="close-btn" id="closePat">Close</button>
  </div>
</div>

<div class="overlay" id="speedSelect">
  <div class="overlay-panel" style="max-width:280px">
    <h2>Auto-Crochet Speed</h2>
    <button class="speed-option" data-speed="0">Slow (meditative)</button>
    <button class="speed-option active" data-speed="1">Medium</button>
    <button class="speed-option" data-speed="2">Fast</button>
    <button class="close-btn" id="closeSpeed">Close</button>
  </div>
</div>

<div class="overlay" id="completeOverlay">
  <div class="complete-card">
    <h2 id="completeTitle">Pattern Complete!</h2>
    <p id="completeDesc">You finished the pattern!</p>
    <button id="completeClose">Continue</button>
  </div>
</div>

<script>
// ============================================================
// COZY CROCHET - Textile Texture Rendering
// ============================================================

const C = document.getElementById('C'), ctx = C.getContext('2d');
const prevC = document.getElementById('preview3d'), prevCtx = prevC.getContext('2d');

// -- Palette --
const COLORS = ['#F5E6CC','#D4A0A0','#A8B89C','#D4A843','#3A4A5C','#E07050','#B8A0C8','#B05A3A','#7CB4C4','#4A4A4A'];
const COLOR_NAMES = ['Cream','Rose','Sage','Mustard','Navy','Coral','Lavender','Rust','Sky','Charcoal'];

// -- Stitch type definitions --
// rowH = how tall one row of this stitch is, stitchW = how wide one stitch is
const STITCH_INFO = {
  ch: { label: 'Chain',  rowH: 18, stitchW: 20 },
  sc: { label: 'Single', rowH: 28, stitchW: 22 },
  dc: { label: 'Double', rowH: 42, stitchW: 24 },
  tr: { label: 'Treble', rowH: 56, stitchW: 26 },
};
const STITCH_TYPES = ['ch','sc','dc','tr'];

// -- Patterns --
const PATTERNS = [
  { name:'Scarf', desc:'Cozy scarf - 8 wide, alternating color bands.',
    width:8, autoColors:[1,1,3,3,1,1,3,3],
    rows:(()=>{ const r=[Array(8).fill('ch')]; for(let i=0;i<20;i++) r.push(Array(8).fill('sc')); return r; })()
  },
  { name:'Granny Square', desc:'Open lacework with dc clusters and chain spaces.',
    width:10, autoColors:[1,5,3],
    rows:[
      Array(10).fill('ch'),
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch'],
      ['dc','dc','dc','ch','ch','dc','dc','dc','ch','ch'],
      ['ch','dc','dc','dc','ch','ch','dc','dc','dc','ch'],
    ]
  },
  { name:'Ripple Blanket', desc:'Chevron zigzag with increases and decreases.',
    width:12, autoColors:[1,2,6,4],
    rows:(()=>{ const r=[Array(12).fill('ch')];
      for(let i=0;i<16;i++) r.push(['sc','sc','dc','dc','dc','dc','dc','dc','dc','dc','sc','sc']);
      return r; })()
  },
  { name:'Heart', desc:'Red amigurumi heart shape.',
    width:8, isAmigurumi:true, autoColors:[5],
    rounds:[Array(6).fill('sc'),Array(12).fill('sc'),Array(12).fill('sc'),
      Array(12).fill('sc'),Array(12).fill('sc'),Array(8).fill('sc'),Array(6).fill('sc')]
  },
  { name:'Simple Circle', desc:'Amigurumi disc with increases each round.',
    width:8, isAmigurumi:true, autoColors:[2],
    rounds:[Array(6).fill('sc'),Array(12).fill('sc'),Array(18).fill('sc'),Array(24).fill('sc')]
  },
];

// -- State --
const S = {
  stitchType:'sc', colorIdx:1, mode:'free',
  // Flat fabric: array of rows; each row is array of {type, color, scale}
  fabric:[], currentRow:0, currentCol:0, rowWidth:8,
  autoSpeed:1, soundOn:true, animating:false,
  activePattern:null, patternRow:0, patternCol:0,
  // Amigurumi
  rounds:[], amiRound:0, amiStitch:0,
  // View
  panX:0, panY:0,
  // Auto
  autoCrochet:false, autoTimer:null,
  // Stats
  todayStitches:0, allTimeStitches:0, completedPatterns:[],
  // 3D preview
  previewAngle:0,
  // Animation
  animQueue:null,
};

// -- localStorage --
try {
  const saved = JSON.parse(localStorage.getItem('crochet_stats'));
  if (saved) {
    S.allTimeStitches = saved.all || 0;
    S.completedPatterns = saved.completed || [];
    if (saved.day === new Date().toDateString()) S.todayStitches = saved.today || 0;
  }
  const sndPref = localStorage.getItem('crochet_sound');
  if (sndPref !== null) S.soundOn = sndPref === '1';
} catch(e) {}

function saveStats() {
  try {
    localStorage.setItem('crochet_stats', JSON.stringify({
      all: S.allTimeStitches, today: S.todayStitches,
      day: new Date().toDateString(), completed: S.completedPatterns
    }));
  } catch(e) {}
}
function saveSoundPref() {
  try { localStorage.setItem('crochet_sound', S.soundOn ? '1' : '0'); } catch(e) {}
}

// ============================================================
// COLOR HELPERS
// ============================================================
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r,g,b) {
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function lighten(hex, amt) { const [r,g,b]=hexToRgb(hex); return rgbToHex(r+amt,g+amt,b+amt); }
function darken(hex, amt) { return lighten(hex, -amt); }
function colorAlpha(hex, a) { const [r,g,b]=hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }

// ============================================================
// AUDIO - ASMR-style soft pops
// ============================================================
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playPop() {
  if (!S.soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.value = 500 + Math.random() * 200; // 500-700Hz range
  g.gain.setValueAtTime(0.07, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + 0.03);
}

function playChime() {
  if (!S.soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784].forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.03, t + i * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4 + i * 0.1);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + i * 0.1); o.stop(t + 0.4 + i * 0.1);
  });
}

function playComplete() {
  if (!S.soundOn || !audioCtx) return;
  const t = audioCtx.currentTime;
  // Warm major chord
  [262, 330, 392, 523].forEach((f, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.04, t + i * 0.12);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.8 + i * 0.12);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t + i * 0.12); o.stop(t + 0.8 + i * 0.12);
  });
}

// ============================================================
// TEXTILE TEXTURE RENDERING
// ============================================================

// Draw a single chain stitch (small horizontal oval)
function drawChain(c, x, y, w, h, color) {
  const thick = 3.5;
  c.lineCap = 'round';
  c.lineJoin = 'round';

  // Shadow
  c.strokeStyle = colorAlpha(darken(color, 50), 0.15);
  c.lineWidth = thick + 1;
  c.beginPath();
  c.ellipse(x + w/2 + 0.5, y + h/2 + 1, w*0.35, h*0.32, 0, 0, Math.PI*2);
  c.stroke();

  // Main oval
  c.strokeStyle = color;
  c.lineWidth = thick;
  c.beginPath();
  c.ellipse(x + w/2, y + h/2, w*0.35, h*0.32, 0, 0, Math.PI*2);
  c.stroke();

  // Highlight
  c.strokeStyle = lighten(color, 45);
  c.lineWidth = 1;
  c.beginPath();
  c.ellipse(x + w/2 - 1, y + h/2 - 1, w*0.25, h*0.2, 0, -0.5, Math.PI*0.8);
  c.stroke();
}

// Draw a single crochet stitch as interlocking U-loop
function drawSC(c, x, y, w, h, color) {
  const thick = 4;
  c.lineCap = 'round';
  c.lineJoin = 'round';

  const cx = x + w/2;
  const legInset = 3;

  // Shadow under the whole stitch
  c.strokeStyle = colorAlpha(darken(color, 50), 0.12);
  c.lineWidth = thick + 1.5;

  // Left leg shadow
  c.beginPath();
  c.moveTo(x + legInset + 1, y + 5);
  c.quadraticCurveTo(x + legInset + 1, y + h * 0.75 + 1, cx + 1, y + h * 0.88 + 1);
  c.stroke();
  // Right leg shadow
  c.beginPath();
  c.moveTo(x + w - legInset + 1, y + 5);
  c.quadraticCurveTo(x + w - legInset + 1, y + h * 0.75 + 1, cx + 1, y + h * 0.88 + 1);
  c.stroke();

  // Right leg (drawn first, behind left)
  c.strokeStyle = darken(color, 12);
  c.lineWidth = thick;
  c.beginPath();
  c.moveTo(x + w - legInset, y + 5);
  c.quadraticCurveTo(x + w - legInset, y + h * 0.75, cx, y + h * 0.88);
  c.stroke();

  // Left leg (in front)
  c.strokeStyle = color;
  c.lineWidth = thick;
  c.beginPath();
  c.moveTo(x + legInset, y + 5);
  c.quadraticCurveTo(x + legInset, y + h * 0.75, cx, y + h * 0.88);
  c.stroke();

  // Bottom loop (hooks through row below)
  c.strokeStyle = darken(color, 8);
  c.lineWidth = thick * 0.8;
  c.beginPath();
  c.arc(cx, y + h * 0.88, 3.5, 0, Math.PI);
  c.stroke();

  // Top bar connecting to neighbors
  c.strokeStyle = lighten(color, 8);
  c.lineWidth = thick * 0.85;
  c.beginPath();
  c.moveTo(x, y + 4);
  c.lineTo(x + w, y + 4);
  c.stroke();

  // Highlight along left leg
  c.strokeStyle = lighten(color, 40);
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(x + legInset - 1, y + 6);
  c.quadraticCurveTo(x + legInset - 1, y + h * 0.65, cx - 1, y + h * 0.82);
  c.stroke();

  // Highlight on top bar
  c.beginPath();
  c.moveTo(x + 2, y + 3);
  c.lineTo(x + w - 2, y + 3);
  c.stroke();
}

// Draw a double crochet stitch - taller with visible post
function drawDC(c, x, y, w, h, color) {
  const thick = 4;
  c.lineCap = 'round';
  c.lineJoin = 'round';

  const cx = x + w/2;
  const legInset = 3;

  // Shadow
  c.strokeStyle = colorAlpha(darken(color, 50), 0.1);
  c.lineWidth = thick + 1.5;
  c.beginPath();
  c.moveTo(x + legInset + 1, y + 5);
  c.quadraticCurveTo(x + legInset + 1, y + h * 0.8 + 1, cx + 1, y + h * 0.92 + 1);
  c.stroke();
  c.beginPath();
  c.moveTo(x + w - legInset + 1, y + 5);
  c.quadraticCurveTo(x + w - legInset + 1, y + h * 0.8 + 1, cx + 1, y + h * 0.92 + 1);
  c.stroke();

  // Right leg (behind)
  c.strokeStyle = darken(color, 12);
  c.lineWidth = thick;
  c.beginPath();
  c.moveTo(x + w - legInset, y + 5);
  c.quadraticCurveTo(x + w - legInset - 1, y + h * 0.5, cx + 2, y + h * 0.7);
  c.quadraticCurveTo(cx, y + h * 0.85, cx, y + h * 0.92);
  c.stroke();

  // Left leg (in front)
  c.strokeStyle = color;
  c.lineWidth = thick;
  c.beginPath();
  c.moveTo(x + legInset, y + 5);
  c.quadraticCurveTo(x + legInset + 1, y + h * 0.5, cx - 2, y + h * 0.7);
  c.quadraticCurveTo(cx, y + h * 0.85, cx, y + h * 0.92);
  c.stroke();

  // Yarn-over wrap across the post (distinctive dc feature)
  c.strokeStyle = lighten(color, 15);
  c.lineWidth = thick * 0.7;
  c.beginPath();
  const wrapY = y + h * 0.38;
  c.moveTo(x + legInset + 3, wrapY - 3);
  c.quadraticCurveTo(cx, wrapY + 4, x + w - legInset - 3, wrapY - 3);
  c.stroke();

  // Bottom loop
  c.strokeStyle = darken(color, 8);
  c.lineWidth = thick * 0.8;
  c.beginPath();
  c.arc(cx, y + h * 0.92, 3.5, 0, Math.PI);
  c.stroke();

  // Top bar
  c.strokeStyle = lighten(color, 8);
  c.lineWidth = thick * 0.85;
  c.beginPath();
  c.moveTo(x, y + 4);
  c.lineTo(x + w, y + 4);
  c.stroke();

  // Highlights
  c.strokeStyle = lighten(color, 40);
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(x + legInset - 1, y + 6);
  c.quadraticCurveTo(x + legInset, y + h * 0.45, cx - 2, y + h * 0.65);
  c.stroke();
  c.beginPath();
  c.moveTo(x + 2, y + 3);
  c.lineTo(x + w - 2, y + 3);
  c.stroke();
}

// Draw a treble crochet stitch - tallest, open look
function drawTR(c, x, y, w, h, color) {
  const thick = 4;
  c.lineCap = 'round';
  c.lineJoin = 'round';

  const cx = x + w/2;
  const legInset = 3;

  // Shadow
  c.strokeStyle = colorAlpha(darken(color, 50), 0.1);
  c.lineWidth = thick + 1.5;
  c.beginPath();
  c.moveTo(x + legInset + 1, y + 5);
  c.bezierCurveTo(x + legInset + 1, y + h * 0.4, cx + 1, y + h * 0.7, cx + 1, y + h * 0.94 + 1);
  c.stroke();

  // Right leg
  c.strokeStyle = darken(color, 12);
  c.lineWidth = thick;
  c.beginPath();
  c.moveTo(x + w - legInset, y + 5);
  c.bezierCurveTo(x + w - legInset - 2, y + h * 0.35, cx + 3, y + h * 0.65, cx, y + h * 0.94);
  c.stroke();

  // Left leg
  c.strokeStyle = color;
  c.lineWidth = thick;
  c.beginPath();
  c.moveTo(x + legInset, y + 5);
  c.bezierCurveTo(x + legInset + 2, y + h * 0.35, cx - 3, y + h * 0.65, cx, y + h * 0.94);
  c.stroke();

  // Two yarn-over wraps (treble has 2)
  c.strokeStyle = lighten(color, 15);
  c.lineWidth = thick * 0.65;
  for (let wi = 0; wi < 2; wi++) {
    const wy = y + h * (0.28 + wi * 0.18);
    c.beginPath();
    c.moveTo(x + legInset + 4, wy - 2);
    c.quadraticCurveTo(cx, wy + 4, x + w - legInset - 4, wy - 2);
    c.stroke();
  }

  // Bottom loop
  c.strokeStyle = darken(color, 8);
  c.lineWidth = thick * 0.8;
  c.beginPath();
  c.arc(cx, y + h * 0.94, 3.5, 0, Math.PI);
  c.stroke();

  // Top bar
  c.strokeStyle = lighten(color, 8);
  c.lineWidth = thick * 0.85;
  c.beginPath();
  c.moveTo(x, y + 4);
  c.lineTo(x + w, y + 4);
  c.stroke();

  // Highlights
  c.strokeStyle = lighten(color, 40);
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(x + legInset - 1, y + 6);
  c.bezierCurveTo(x + legInset, y + h * 0.3, cx - 2, y + h * 0.55, cx - 1, y + h * 0.85);
  c.stroke();
}

// Dispatch stitch drawing
function drawStitchAt(c, x, y, w, h, type, color) {
  switch(type) {
    case 'ch': drawChain(c, x, y, w, h, color); break;
    case 'dc': drawDC(c, x, y, w, h, color); break;
    case 'tr': drawTR(c, x, y, w, h, color); break;
    default:   drawSC(c, x, y, w, h, color); break;
  }
}

// ============================================================
// FABRIC LAYOUT
// ============================================================

// Get the row height for a given row index based on the tallest stitch in it
function getRowInfo(rowIdx) {
  const row = S.fabric[rowIdx];
  if (!row || row.length === 0) return { h: STITCH_INFO.sc.rowH, w: STITCH_INFO.sc.stitchW };
  let maxH = 0, maxW = 0;
  for (const st of row) {
    const info = STITCH_INFO[st.type] || STITCH_INFO.sc;
    if (info.rowH > maxH) maxH = info.rowH;
    if (info.stitchW > maxW) maxW = info.stitchW;
  }
  return { h: maxH, w: maxW };
}

function computeFabricMetrics() {
  const cw = C.clientWidth;
  // Each stitch is stitchW wide. We want 4-5 stitches visible on phone (~375px).
  // Auto-compute stitch width to fill nicely.
  const baseW = Math.max(18, Math.min(50, (cw - 40) / S.rowWidth));
  return { baseW };
}

// ============================================================
// MAIN DRAW - Textile texture
// ============================================================
function draw() {
  const dpr = window.devicePixelRatio || 1;
  const cw = C.clientWidth, ch = C.clientHeight;
  if (C.width !== cw * dpr || C.height !== ch * dpr) {
    C.width = cw * dpr; C.height = ch * dpr;
  }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, cw, ch);

  // Subtle background
  ctx.fillStyle = '#FDF6EC';
  ctx.fillRect(0, 0, cw, ch);

  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  if (isAmi) {
    drawAmiFabric(cw, ch);
  } else {
    drawFlatFabric(cw, ch);
  }

  updateStats();
}

function drawFlatFabric(cw, ch) {
  if (S.fabric.length === 0) {
    // Empty state hint
    ctx.fillStyle = 'rgba(90,64,48,0.2)';
    ctx.font = '14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Tap to add stitches', cw/2, ch/2);
    return;
  }

  const { baseW } = computeFabricMetrics();

  // Compute total fabric width and centering offset
  const fabricW = S.rowWidth * baseW;
  const offsetX = (cw - fabricW) / 2 + S.panX;

  // Compute row y positions (draw bottom-to-top for overlap)
  const rowYs = [];
  let cumY = 30 + S.panY; // top padding
  for (let r = 0; r < S.fabric.length; r++) {
    const ri = getRowInfo(r);
    rowYs.push(cumY);
    cumY += ri.h + 2;
  }

  // Auto-scroll to keep current work visible
  const lastRowBottom = cumY;
  if (lastRowBottom > ch - 180) {
    const overflow = lastRowBottom - (ch - 180);
    if (S.panY > -overflow) S.panY = -overflow;
  }
  // Recompute after pan adjustment
  cumY = 30 + S.panY;
  for (let r = 0; r < S.fabric.length; r++) {
    const ri = getRowInfo(r);
    rowYs[r] = cumY;
    cumY += ri.h + 2;
  }

  // Draw rows from bottom to top so each row's bottom loops overlap the row below's top bar
  for (let r = S.fabric.length - 1; r >= 0; r--) {
    const row = S.fabric[r];
    const ri = getRowInfo(r);
    const y = rowYs[r];

    // Subtle shadow under each row
    ctx.fillStyle = 'rgba(60,40,20,0.03)';
    ctx.fillRect(offsetX - 2, y + ri.h - 1, fabricW + 4, 3);

    // Draw each stitch in this row
    // Even rows go left-to-right, odd rows right-to-left (mimics real crochet turning)
    const reversed = r % 2 === 1;
    for (let c = 0; c < row.length; c++) {
      const st = row[c];
      const col = reversed ? (S.rowWidth - 1 - c) : c;
      const sx = offsetX + col * baseW;
      const info = STITCH_INFO[st.type] || STITCH_INFO.sc;

      // Scale animation
      const scale = st.scale !== undefined ? st.scale : 1;
      if (scale < 0.01) continue;

      if (scale < 1) {
        ctx.save();
        const scx = sx + baseW/2, scy = y + ri.h/2;
        ctx.translate(scx, scy);
        ctx.scale(scale, scale);
        ctx.translate(-scx, -scy);
        drawStitchAt(ctx, sx, y, baseW, ri.h, st.type, COLORS[st.color]);
        ctx.restore();
      } else {
        drawStitchAt(ctx, sx, y, baseW, ri.h, st.type, COLORS[st.color]);
      }
    }
  }

  // Draw hook indicator at current position
  const hookRow = S.currentRow;
  const hookCol = hookRow % 2 === 1 ? (S.rowWidth - 1 - S.currentCol) : S.currentCol;
  let hookY;
  if (hookRow < rowYs.length) {
    hookY = rowYs[hookRow];
  } else {
    hookY = cumY;
  }
  const hookX = offsetX + hookCol * baseW + baseW/2;
  drawHook(ctx, hookX, hookY - 4);

  // Yarn line from hook to right edge (ball)
  ctx.strokeStyle = colorAlpha(COLORS[S.colorIdx], 0.4);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(hookX, hookY - 4);
  ctx.quadraticCurveTo(cw - 20, hookY - 30, cw - 10, 20);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawHook(c, x, y) {
  c.save();
  c.translate(x, y);
  // Shaft
  c.strokeStyle = '#999';
  c.lineWidth = 2.5;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(0, 0); c.lineTo(0, -16);
  c.stroke();
  // Hook tip
  c.beginPath();
  c.arc(3, 0, 3, Math.PI, Math.PI*0.3, true);
  c.stroke();
  // Handle
  c.strokeStyle = '#C89060';
  c.lineWidth = 4;
  c.beginPath();
  c.moveTo(0, -16); c.lineTo(0, -30);
  c.stroke();
  c.restore();
}

// ============================================================
// AMIGURUMI RENDERING (circular)
// ============================================================
function drawAmiFabric(cw, ch) {
  if (S.rounds.length === 0) {
    ctx.fillStyle = 'rgba(90,64,48,0.2)';
    ctx.font = '14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Tap to add stitches', cw/2, ch/2);
    return;
  }

  const cx = cw/2 + S.panX, cy = ch/2 + S.panY;

  for (let ri = 0; ri < S.rounds.length; ri++) {
    const round = S.rounds[ri];
    const count = round.length;
    const radius = 28 + ri * 22;

    for (let si = 0; si < count; si++) {
      const st = round[si];
      const angle = (si / count) * Math.PI * 2 - Math.PI/2;
      const sx = cx + Math.cos(angle) * radius;
      const sy = cy + Math.sin(angle) * radius;
      const info = STITCH_INFO[st.type] || STITCH_INFO.sc;
      const stitchSize = Math.min(info.stitchW, (2 * Math.PI * radius) / count);

      const scale = st.scale !== undefined ? st.scale : 1;
      if (scale < 0.01) continue;

      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(angle + Math.PI/2);
      ctx.scale(scale, scale);
      drawStitchAt(ctx, -stitchSize/2, -info.rowH/2, stitchSize, info.rowH, st.type, COLORS[st.color]);
      ctx.restore();
    }
  }

  // Hook at next position
  const curRound = S.amiRound;
  const pat = S.activePattern;
  const nextCount = pat && pat.rounds[curRound] ? pat.rounds[curRound].length : 6 + curRound * 6;
  const radius = 28 + curRound * 22;
  const angle = (S.amiStitch / nextCount) * Math.PI * 2 - Math.PI/2;
  const hx = cx + Math.cos(angle) * radius;
  const hy = cy + Math.sin(angle) * radius;

  ctx.save();
  ctx.translate(hx, hy);
  ctx.rotate(angle + Math.PI/2);
  drawHook(ctx, 0, 0);
  ctx.restore();
}

// ============================================================
// 3D PREVIEW
// ============================================================
function draw3DPreview() {
  const sz = 110;
  const dpr = window.devicePixelRatio || 1;
  if (prevC.width !== sz * dpr) {
    prevC.width = sz * dpr; prevC.height = sz * dpr;
    prevC.style.width = sz + 'px'; prevC.style.height = sz + 'px';
  }
  prevCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  prevCtx.clearRect(0, 0, sz, sz);

  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  const totalStitches = isAmi
    ? S.rounds.reduce((a,r)=>a+r.length, 0)
    : S.fabric.reduce((a,r)=>a+r.length, 0);

  if (totalStitches === 0) {
    prevCtx.fillStyle = 'rgba(90,64,48,0.25)';
    prevCtx.font = '10px -apple-system, sans-serif';
    prevCtx.textAlign = 'center';
    prevCtx.fillText('3D Preview', sz/2, sz/2);
    return;
  }

  S.previewAngle += 0.008;

  if (isAmi) {
    draw3DAmi(sz);
  } else {
    draw3DFlat(sz);
  }
}

function draw3DFlat(sz) {
  prevCtx.save();
  const cx = sz/2, cy = sz/2;
  const wobble = Math.sin(S.previewAngle) * 0.06;

  // Gather per-row dominant colors
  const rowColors = [];
  for (const row of S.fabric) {
    if (row.length > 0) rowColors.push(COLORS[row[0].color]);
  }
  if (rowColors.length === 0) { prevCtx.restore(); return; }

  const pw = sz * 0.6;
  const tiltH = sz * 0.4;
  const rh = tiltH / Math.max(rowColors.length, 1);
  const startY = cy - tiltH / 2;

  // Shadow
  prevCtx.fillStyle = 'rgba(0,0,0,0.06)';
  prevCtx.beginPath();
  prevCtx.ellipse(cx + 2, cy + tiltH/2 + 6, pw*0.45, 5, 0, 0, Math.PI*2);
  prevCtx.fill();

  // Draw tilted fabric with per-row colors and V texture
  rowColors.forEach((col, i) => {
    const y = startY + i * rh;
    const xSkew = wobble * (i * rh);

    prevCtx.fillStyle = col;
    prevCtx.beginPath();
    prevCtx.moveTo(cx - pw/2 + xSkew, y);
    prevCtx.lineTo(cx + pw/2 + xSkew, y);
    prevCtx.lineTo(cx + pw/2 + xSkew + wobble * rh, y + rh);
    prevCtx.lineTo(cx - pw/2 + xSkew + wobble * rh, y + rh);
    prevCtx.closePath();
    prevCtx.fill();

    // V stitch texture
    const cols = Math.min(S.rowWidth, 8);
    const colW = pw / cols;
    prevCtx.strokeStyle = darken(col, 20);
    prevCtx.lineWidth = 0.5;
    for (let j = 0; j < cols; j++) {
      const tx = cx - pw/2 + j * colW + colW/2 + xSkew + wobble * rh * 0.5;
      const ty = y + rh * 0.5;
      prevCtx.beginPath();
      prevCtx.moveTo(tx - 2, ty - rh*0.25);
      prevCtx.lineTo(tx, ty + rh*0.15);
      prevCtx.lineTo(tx + 2, ty - rh*0.25);
      prevCtx.stroke();
    }
  });

  // Border
  prevCtx.strokeStyle = 'rgba(90,64,48,0.15)';
  prevCtx.lineWidth = 0.6;
  const totalH = rowColors.length * rh;
  prevCtx.beginPath();
  prevCtx.moveTo(cx - pw/2, startY);
  prevCtx.lineTo(cx + pw/2, startY);
  prevCtx.lineTo(cx + pw/2 + wobble * totalH, startY + totalH);
  prevCtx.lineTo(cx - pw/2 + wobble * totalH, startY + totalH);
  prevCtx.closePath();
  prevCtx.stroke();

  prevCtx.restore();
}

function draw3DAmi(sz) {
  prevCtx.save();
  const cx = sz/2, cy = sz/2;
  const totalRounds = S.rounds.length;
  if (totalRounds === 0) { prevCtx.restore(); return; }

  const pat = S.activePattern;
  const maxRounds = pat ? pat.rounds.length : 7;
  const progress = Math.min(1, totalRounds / maxRounds);
  const r = sz * 0.32 * progress + sz * 0.06;

  prevCtx.translate(cx, cy);

  // Shadow
  prevCtx.fillStyle = 'rgba(0,0,0,0.06)';
  prevCtx.beginPath();
  prevCtx.ellipse(2, r + 4, r * 0.65, r * 0.15, 0, 0, Math.PI*2);
  prevCtx.fill();

  const mainColor = S.rounds[0] && S.rounds[0][0] ? COLORS[S.rounds[0][0].color] : COLORS[S.colorIdx];

  // Sphere gradient
  const grad = prevCtx.createRadialGradient(-r*0.2, -r*0.2, r*0.1, 0, 0, r);
  grad.addColorStop(0, lighten(mainColor, 30));
  grad.addColorStop(0.6, mainColor);
  grad.addColorStop(1, darken(mainColor, 35));
  prevCtx.fillStyle = grad;
  prevCtx.beginPath();
  prevCtx.arc(0, 0, r, 0, Math.PI*2);
  prevCtx.fill();

  // Concentric stitch texture rings
  prevCtx.strokeStyle = darken(mainColor, 18);
  prevCtx.lineWidth = 0.5;
  const angle = S.previewAngle;
  for (let i = 0; i < totalRounds; i++) {
    const ringR = r * (i + 1) / maxRounds;
    prevCtx.beginPath();
    prevCtx.ellipse(0, 0, ringR, ringR * 0.3, angle + i * 0.3, 0, Math.PI*2);
    prevCtx.stroke();
  }

  // Highlight
  prevCtx.fillStyle = 'rgba(255,255,255,0.2)';
  prevCtx.beginPath();
  prevCtx.ellipse(-r*0.25, -r*0.3, r*0.2, r*0.12, -0.6, 0, Math.PI*2);
  prevCtx.fill();

  prevCtx.restore();
}

// ============================================================
// STITCH ANIMATION
// ============================================================
function animateStitch(stitch, duration) {
  return new Promise(resolve => {
    stitch.scale = 0;
    const start = performance.now();
    function tick(now) {
      const p = Math.min(1, (now - start) / duration);
      // Ease out with slight overshoot
      if (p < 0.7) {
        stitch.scale = (p / 0.7) * 1.08;
      } else {
        stitch.scale = 1.08 - 0.08 * ((p - 0.7) / 0.3);
      }
      draw();
      if (p < 1) requestAnimationFrame(tick);
      else { stitch.scale = 1; S.animating = false; resolve(); }
    }
    requestAnimationFrame(tick);
  });
}

// ============================================================
// ADD STITCH
// ============================================================
function addStitch() {
  if (S.animating) return;
  initAudio();
  S.animating = true;

  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  if (isAmi) { addAmiStitch(); return; }

  // Determine type and color
  let type = S.stitchType;
  let colorIdx = S.colorIdx;

  if (S.mode === 'pattern' && S.activePattern) {
    const pat = S.activePattern;
    if (S.patternRow < pat.rows.length) {
      type = pat.rows[S.patternRow][S.patternCol] || type;
    }
    if (pat.autoColors && S.autoCrochet) {
      const segLen = Math.max(1, Math.ceil(pat.rows.length / pat.autoColors.length));
      const cIdx = Math.floor(S.patternRow / segLen);
      colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
    }
  }

  // Ensure row array exists
  if (!S.fabric[S.currentRow]) S.fabric[S.currentRow] = [];

  const st = { type, color: colorIdx, scale: 0 };
  S.fabric[S.currentRow].push(st);

  playPop();

  const dur = [500, 200, 80][S.autoSpeed] || 200;
  animateStitch(st, dur).then(() => {
    S.todayStitches++;
    S.allTimeStitches++;
    saveStats();

    S.currentCol++;

    if (S.mode === 'pattern' && S.activePattern) {
      S.patternCol++;
      const pat = S.activePattern;
      const rowDef = pat.rows[S.patternRow];
      if (S.patternCol >= (rowDef || []).length) {
        completeRow();
        S.patternRow++;
        S.patternCol = 0;
        S.currentCol = 0;
        S.currentRow++;
        if (S.patternRow >= pat.rows.length) {
          completePattern(pat);
          return;
        }
        if (pat.autoColors && S.autoCrochet) {
          const segLen = Math.max(1, Math.ceil(pat.rows.length / pat.autoColors.length));
          const cIdx = Math.floor(S.patternRow / segLen);
          S.colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
          buildColorRow();
        }
        updatePatternBar();
      }
    } else {
      if (S.currentCol >= S.rowWidth) {
        completeRow();
        S.currentCol = 0;
        S.currentRow++;
      }
    }

    if (S.autoCrochet) scheduleAutoStitch();
  });
}

function addAmiStitch() {
  let type = S.stitchType;
  let colorIdx = S.colorIdx;
  const pat = S.activePattern;

  if (pat && S.amiRound < pat.rounds.length) {
    type = pat.rounds[S.amiRound][S.amiStitch] || 'sc';
  }
  if (pat && pat.autoColors && S.autoCrochet) {
    const segLen = Math.max(1, Math.ceil(pat.rounds.length / pat.autoColors.length));
    const cIdx = Math.floor(S.amiRound / segLen);
    colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
  }

  if (!S.rounds[S.amiRound]) S.rounds[S.amiRound] = [];
  const st = { type, color: colorIdx, scale: 0 };
  S.rounds[S.amiRound].push(st);

  playPop();

  const dur = [500, 200, 80][S.autoSpeed] || 200;
  animateStitch(st, dur).then(() => {
    S.todayStitches++;
    S.allTimeStitches++;
    saveStats();

    S.amiStitch++;
    const targetLen = pat && pat.rounds[S.amiRound] ? pat.rounds[S.amiRound].length : 6 + S.amiRound * 6;
    if (S.amiStitch >= targetLen) {
      completeRow();
      S.amiRound++;
      S.amiStitch = 0;
      if (pat && S.amiRound >= pat.rounds.length) {
        completePattern(pat);
        return;
      }
      if (pat && pat.autoColors && S.autoCrochet) {
        const segLen = Math.max(1, Math.ceil(pat.rounds.length / pat.autoColors.length));
        const cIdx = Math.floor(S.amiRound / segLen);
        S.colorIdx = pat.autoColors[Math.min(cIdx, pat.autoColors.length - 1)];
        buildColorRow();
      }
      updatePatternBar();
    }

    if (S.autoCrochet) scheduleAutoStitch();
  });
}

function completeRow() {
  playChime();
  const flash = document.getElementById('rowFlash');
  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  flash.textContent = isAmi ? 'Round complete!' : 'Row complete!';
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1200);
}

function completePattern(pat) {
  stopAutoCrochet();
  playComplete();
  if (!S.completedPatterns.includes(pat.name)) {
    S.completedPatterns.push(pat.name);
    saveStats();
  }
  document.getElementById('completeTitle').textContent = 'Pattern Complete!';
  document.getElementById('completeDesc').textContent = 'You finished the ' + pat.name + '!';
  document.getElementById('completeOverlay').classList.add('open');
}

// ============================================================
// AUTO CROCHET
// ============================================================
function toggleAutoCrochet() {
  if (S.autoCrochet) stopAutoCrochet();
  else startAutoCrochet();
}

function startAutoCrochet() {
  initAudio();
  S.autoCrochet = true;
  document.getElementById('autoBtn').classList.add('auto-active');
  document.getElementById('autoBtn').textContent = 'Stop';
  if (S.mode === 'free') {
    S.mode = 'pattern';
    selectPattern(PATTERNS[0]);
    return; // selectPattern will clear and we restart
  }
  scheduleAutoStitch();
}

function stopAutoCrochet() {
  S.autoCrochet = false;
  if (S.autoTimer) { clearTimeout(S.autoTimer); S.autoTimer = null; }
  document.getElementById('autoBtn').classList.remove('auto-active');
  document.getElementById('autoBtn').textContent = 'Auto';
}

function scheduleAutoStitch() {
  if (!S.autoCrochet) return;
  const delays = [500, 200, 80];
  S.autoTimer = setTimeout(() => {
    if (!S.autoCrochet) return;
    if (!S.animating) addStitch();
    else scheduleAutoStitch(); // retry if still animating
  }, delays[S.autoSpeed] || 200);
}

// ============================================================
// UNDO / CLEAR
// ============================================================
function undo() {
  if (S.autoCrochet) stopAutoCrochet();
  if (S.animating) return;

  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  if (isAmi) {
    if (S.rounds.length === 0) return;
    const lastRound = S.rounds[S.amiRound];
    if (lastRound && lastRound.length > 0) {
      lastRound.pop();
      if (S.amiStitch > 0) S.amiStitch--;
      else if (S.amiRound > 0) {
        S.amiRound--;
        S.amiStitch = (S.rounds[S.amiRound] || []).length;
      }
    } else if (S.amiRound > 0) {
      S.rounds.pop();
      S.amiRound--;
      const prev = S.rounds[S.amiRound];
      if (prev && prev.length > 0) {
        prev.pop();
        S.amiStitch = prev.length;
      }
    }
  } else {
    // Flat fabric undo
    if (S.fabric.length === 0) return;
    const lastRow = S.fabric[S.currentRow];
    if (lastRow && lastRow.length > 0) {
      lastRow.pop();
      if (S.currentCol > 0) {
        S.currentCol--;
        if (S.mode === 'pattern') S.patternCol = Math.max(0, S.patternCol - 1);
      }
    } else if (S.currentRow > 0) {
      // Remove empty row, go back
      if (lastRow && lastRow.length === 0) S.fabric.pop();
      S.currentRow--;
      if (S.mode === 'pattern') S.patternRow = Math.max(0, S.patternRow - 1);
      const prevRow = S.fabric[S.currentRow];
      if (prevRow && prevRow.length > 0) {
        prevRow.pop();
        S.currentCol = prevRow.length;
        if (S.mode === 'pattern') S.patternCol = S.currentCol;
      } else {
        S.currentCol = 0;
        if (S.mode === 'pattern') S.patternCol = 0;
      }
    }
  }
  draw();
  updatePatternBar();
}

function clearFabric() {
  stopAutoCrochet();
  S.fabric = [];
  S.currentRow = 0; S.currentCol = 0;
  S.panX = 0; S.panY = 0;
  S.patternRow = 0; S.patternCol = 0;
  S.rounds = []; S.amiRound = 0; S.amiStitch = 0;
  S.animating = false;
  draw();
  updatePatternBar();
}

// ============================================================
// UI BUILDERS
// ============================================================
function buildColorRow() {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'color-swatch' + (i === S.colorIdx ? ' active' : '');
    d.style.background = c;
    if (c === '#F5E6CC') d.style.border = '3px solid #D4C4A8';
    d.title = COLOR_NAMES[i];
    d.addEventListener('click', () => { S.colorIdx = i; buildColorRow(); });
    row.appendChild(d);
  });
}

function buildStitchRow() {
  const row = document.getElementById('stitchRow');
  row.innerHTML = '';
  STITCH_TYPES.forEach(id => {
    const info = STITCH_INFO[id];
    const b = document.createElement('button');
    b.className = 'stitch-btn' + (id === S.stitchType ? ' active' : '');

    const lbl = document.createElement('span');
    lbl.className = 'lbl';
    lbl.textContent = info.label;
    b.appendChild(lbl);

    b.addEventListener('click', () => { S.stitchType = id; buildStitchRow(); });
    row.appendChild(b);
  });
}

function updateStats() {
  const el = document.getElementById('stats');
  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  if (isAmi) {
    const total = S.rounds.reduce((a,r)=>a+r.length, 0);
    el.innerHTML = 'Round ' + (S.amiRound+1) + ' | Stitch ' + S.amiStitch +
      '<br>Total: ' + total + ' | All time: ' + S.allTimeStitches;
  } else {
    const total = S.fabric.reduce((a,r)=>a+r.length, 0);
    el.innerHTML = 'Row ' + (S.currentRow+1) + ' | ' + S.currentCol + '/' + S.rowWidth +
      '<br>Total: ' + total + ' | All time: ' + S.allTimeStitches;
  }
}

function updatePatternBar() {
  const bar = document.getElementById('patternBar');
  if (S.mode === 'free') { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');

  const isAmi = S.activePattern && S.activePattern.isAmigurumi;
  const pat = S.activePattern;
  if (!pat) return;

  document.getElementById('patLabel').textContent = pat.name;

  if (isAmi) {
    const round = pat.rounds ? pat.rounds[S.amiRound] : null;
    document.getElementById('patInstruction').textContent = round
      ? 'Round ' + (S.amiRound+1) + '/' + pat.rounds.length + ': ' + round.length + ' stitches (' + S.amiStitch + ' done)'
      : 'Round ' + (S.amiRound+1);
  } else {
    const rowDef = pat.rows[S.patternRow];
    if (rowDef) {
      document.getElementById('patInstruction').textContent =
        'Row ' + (S.patternRow+1) + '/' + pat.rows.length + ': ' + rowDef.length + ' stitches (' + S.patternCol + ' done)';
    }
  }
}

// ============================================================
// PATTERN SELECTOR
// ============================================================
function openPatternSelect() {
  const panel = document.getElementById('patList');
  panel.innerHTML = '';
  PATTERNS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'pat-card';
    const done = S.completedPatterns.includes(p.name);
    card.innerHTML =
      '<div class="info">' +
        '<div class="name">' + p.name + '</div>' +
        '<div class="desc">' + p.desc + '</div>' +
      '</div>' +
      (done ? '<div class="badge">Done</div>' : '');
    card.addEventListener('click', () => selectPattern(p));
    panel.appendChild(card);
  });
  document.getElementById('patternSelect').classList.add('open');
}

function selectPattern(pat) {
  S.activePattern = pat;
  S.rowWidth = pat.width || 8;
  S.mode = pat.isAmigurumi ? 'amigurumi' : 'pattern';
  clearFabric();
  if (pat.autoColors) {
    S.colorIdx = pat.autoColors[0];
    buildColorRow();
  }
  document.getElementById('patternSelect').classList.remove('open');
  updatePatternBar();
  draw();
}

// ============================================================
// EVENT HANDLERS
// ============================================================
buildColorRow();
buildStitchRow();
document.getElementById('sndBtn').textContent = S.soundOn ? 'Sound' : 'Muted';

// Canvas tap
C.addEventListener('click', (e) => {
  e.preventDefault();
  initAudio();
  if (!S.autoCrochet) addStitch();
});
C.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    e.preventDefault();
    initAudio();
    if (!S.autoCrochet) addStitch();
  }
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); initAudio(); if (!S.autoCrochet) addStitch(); }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); undo(); }
  if (e.key === 'a') toggleAutoCrochet();
  const num = parseInt(e.key);
  if (num >= 1 && num <= STITCH_TYPES.length) { S.stitchType = STITCH_TYPES[num-1]; buildStitchRow(); }
});

// Scroll/pan
C.addEventListener('wheel', e => {
  S.panY -= e.deltaY * 0.5;
  draw();
}, { passive: true });

// Two-finger pan
let touchPrev = null;
C.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const t = e.touches[0];
    if (touchPrev) {
      S.panX += t.clientX - touchPrev.x;
      S.panY += t.clientY - touchPrev.y;
      draw();
    }
    touchPrev = { x: t.clientX, y: t.clientY };
    e.preventDefault();
  }
}, { passive: false });
C.addEventListener('touchend', () => { touchPrev = null; });

// Buttons
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('clearBtn').addEventListener('click', clearFabric);
document.getElementById('autoBtn').addEventListener('click', toggleAutoCrochet);
document.getElementById('patternBtn').addEventListener('click', openPatternSelect);
document.getElementById('closePat').addEventListener('click', () => {
  document.getElementById('patternSelect').classList.remove('open');
});

// Sound
document.getElementById('sndBtn').addEventListener('click', () => {
  initAudio();
  S.soundOn = !S.soundOn;
  document.getElementById('sndBtn').textContent = S.soundOn ? 'Sound' : 'Muted';
  saveSoundPref();
});

// Speed
document.getElementById('speedBtn').addEventListener('click', () => {
  document.getElementById('speedSelect').classList.add('open');
  document.querySelectorAll('.speed-option').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.speed) === S.autoSpeed);
  });
});
document.getElementById('closeSpeed').addEventListener('click', () => {
  document.getElementById('speedSelect').classList.remove('open');
});
document.querySelectorAll('.speed-option').forEach(btn => {
  btn.addEventListener('click', () => {
    S.autoSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-option').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.speed) === S.autoSpeed);
    });
    document.getElementById('speedSelect').classList.remove('open');
  });
});

// Complete overlay
document.getElementById('completeClose').addEventListener('click', () => {
  document.getElementById('completeOverlay').classList.remove('open');
  clearFabric();
  openPatternSelect();
});

// 3D preview click
prevC.addEventListener('click', e => e.stopPropagation());

// Resize
window.addEventListener('resize', () => draw());

// ============================================================
// RENDER LOOP
// ============================================================
function renderLoop() {
  draw3DPreview();
  requestAnimationFrame(renderLoop);
}

// Init
setTimeout(() => {
  draw();
  requestAnimationFrame(renderLoop);
}, 0);
</script>
</body>
</html>
