<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:ui-monospace,"SF Mono",Menlo,monospace;touch-action:none;user-select:none;-webkit-user-select:none}
canvas#c{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none}
#hud{position:absolute;top:0;left:0;right:0;padding:6px 10px;display:flex;align-items:center;gap:8px;font-size:11px;color:#ddd;text-shadow:0 1px 2px #000}
.hbar{width:100px;height:10px;background:rgba(0,0,0,.6);border-radius:5px;border:1px solid rgba(255,255,255,.15);overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:4px;transition:width .15s;position:relative;z-index:2}
#hp-ghost{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.35);border-radius:4px;transition:width .6s;z-index:1}
#hp-fill{background:linear-gradient(90deg,#e74c3c,#ff6b6b)}
#pet-icon{font-size:14px;margin-left:-4px}
#dps-text{font-size:9px;color:#888;margin-left:4px}
#gold-text{transition:transform .15s}
.gold-bounce{animation:goldBounce .3s ease-out}
@keyframes goldBounce{0%{transform:scale(1)}30%{transform:scale(1.4) translateY(-2px)}100%{transform:scale(1)}}
#cd-fill{background:linear-gradient(90deg,#8b5cf6,#c084fc)}
#items-display{display:flex;gap:4px;margin-left:auto}
.item-slot{width:24px;height:24px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative}
.item-slot:hover{border-color:#4ade80}
.item-slot .eq-tip{display:none;position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.95);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 10px;font-size:9px;color:#ddd;white-space:nowrap;z-index:100;pointer-events:none;text-shadow:none}
.item-slot:hover .eq-tip{display:block}
.eq-label{font-size:7px;color:#888;position:absolute;bottom:-1px;right:1px;line-height:1}
.eq-plus{font-size:7px;color:#ffd700;position:absolute;top:-2px;right:0;line-height:1}
.rarity-common{border-color:rgba(255,255,255,.3)}
.rarity-uncommon{border-color:#4ade80;box-shadow:0 0 4px rgba(74,222,128,.3)}
.rarity-rare{border-color:#3b82f6;box-shadow:0 0 4px rgba(59,130,246,.3)}
.rarity-epic{border-color:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.3)}
.rarity-legendary{border-color:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.4)}
#eq-compare{position:fixed;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;background:rgba(5,5,15,.92);pointer-events:all}
#eq-compare.hidden{display:none;pointer-events:none}
.cmp-box{background:rgba(30,30,45,.95);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:16px;max-width:340px;width:90%;text-align:center}
.cmp-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:10px}
.cmp-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}
.cmp-item{flex:1;background:rgba(255,255,255,.04);border-radius:8px;padding:10px 8px;text-align:center}
.cmp-item .emoji{font-size:24px}
.cmp-item .name{font-size:11px;font-weight:700;color:#f0f0f0;margin:4px 0 2px}
.cmp-item .stats{font-size:9px;color:#aaa;line-height:1.6}
.cmp-item .stats .pos{color:#4ade80}
.cmp-item .stats .neg{color:#ef4444}
.cmp-btns{display:flex;gap:8px;justify-content:center}
.cmp-btns .btn{padding:10px 20px;font-size:12px}
.shop-item-card{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .15s;pointer-events:all;position:relative}
.shop-item-card:hover{border-color:#ffd700;transform:translateY(-2px)}
.shop-item-card.sold{opacity:.35;pointer-events:none}
.shop-sell-btn{font-size:9px;padding:4px 8px;background:rgba(239,68,68,.3);border:1px solid #ef4444;border-radius:4px;color:#ef4444;cursor:pointer;margin-top:4px;pointer-events:all}
.shop-sell-btn:hover{background:rgba(239,68,68,.5)}
#minimap{position:absolute;top:8px;right:8px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:rgba(0,0,0,.6)}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;background:rgba(5,5,15,.95);pointer-events:all;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 10px}
#overlay.hidden{display:none;pointer-events:none}
.ov-title{font-size:clamp(28px,6vw,48px);font-weight:900;margin-bottom:4px;letter-spacing:2px}
.ov-sub{font-size:13px;color:#888;margin-bottom:16px}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:420px;width:90%;margin-bottom:16px}
.hero-card{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 8px;cursor:pointer;text-align:center;transition:all .15s;pointer-events:all}
.hero-card:hover,.hero-card.selected{border-color:#4ade80;box-shadow:0 0 20px rgba(74,222,128,.2);transform:translateY(-2px)}
.hero-card canvas{display:block;margin:0 auto 6px;image-rendering:pixelated}
.hero-name{font-size:11px;font-weight:700;color:#f0f0f0;margin-bottom:2px}
.hero-stats{font-size:9px;color:#888;line-height:1.5}
.hero-special{font-size:8px;color:#c084fc;margin-top:2px}
.btn{padding:12px 32px;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .15s;pointer-events:all;letter-spacing:1px}
.btn:hover{transform:scale(1.05)}
.btn-go{background:linear-gradient(135deg,#4ade80,#22c55e);color:#0a0a0a;position:sticky;bottom:10px;z-index:25}
.btn-retry{background:linear-gradient(135deg,#e74c3c,#ff6b6b);color:#fff}
.death-stats{font-size:12px;color:#aaa;line-height:2;margin-bottom:12px;text-align:center}
.win-heroes{display:flex;gap:6px;margin:8px 0}
.win-heroes span{font-size:18px}
#touch-left{position:fixed;bottom:16px;left:16px;width:130px;height:130px;z-index:30;pointer-events:all;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center}
#touch-right{position:fixed;bottom:20px;right:16px;z-index:30;display:flex;flex-direction:column;gap:10px;pointer-events:all}
.touch-btn{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;-webkit-tap-highlight-color:transparent}
.touch-btn:active{background:rgba(74,222,128,.4);border-color:#4ade80;transform:scale(0.9)}
#touch-thumb{position:absolute;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.3);pointer-events:none;transition:transform 0.05s}
/* touch controls always visible */
</style>

// Audio
let actx=null;
function ia(){if(!actx)actx=new(AudioContext||webkitAudioContext)()}
function snd(type){
  if(!actx)return;
  const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;
  o.connect(g);g.connect(actx.destination);
  if(type==='atk'){o.type='square';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(800,t+.05);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);o.start(t);o.stop(t+.08)}
  else if(type==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+.1);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12)}
  else if(type==='hurt'){o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(60,t+.15);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2)}
  else if(type==='item'){o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.06);o.frequency.setValueAtTime(784,t+.12);g.gain.setValueAtTime(.07,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25)}
  else if(type==='boss'){o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(40,t+.8);g.gain.setValueAtTime(.12,t);g.gain.linearRampToValueAtTime(.08,t+.4);g.gain.exponentialRampToValueAtTime(.001,t+1);o.start(t);o.stop(t+1)}
  else if(type==='win'){o.type='square';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.1);o.frequency.setValueAtTime(784,t+.2);o.frequency.setValueAtTime(1047,t+.3);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5)}
  else if(type==='stair'){o.type='triangle';o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(880,t+.2);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)}
  else if(type==='heartbeat'){o.type='sine';o.frequency.setValueAtTime(50,t);o.frequency.exponentialRampToValueAtTime(40,t+.15);g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3)}
  else if(type==='combo'){o.type='sine';const base=523;o.frequency.setValueAtTime(base,t);o.frequency.setValueAtTime(base*1.25,t+.06);o.frequency.setValueAtTime(base*1.5,t+.12);g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);o.start(t);o.stop(t+.2)}
  else if(type==='bossdrum'){o.type='sawtooth';o.frequency.setValueAtTime(60,t);o.frequency.exponentialRampToValueAtTime(30,t+1.2);g.gain.setValueAtTime(.15,t);g.gain.linearRampToValueAtTime(.1,t+.5);g.gain.exponentialRampToValueAtTime(.001,t+1.5);o.start(t);o.stop(t+1.5)}
}

function isUnlocked(h){return unlockedHeroes.includes(h.id)}
function checkUnlocks(fl){
  if(fl>maxFloorReached){maxFloorReached=fl;localStorage.setItem('cr_maxfloor',''+fl)}
  let newUnlock=false;
  HEROES.forEach(h=>{
    if(!isUnlocked(h)&&fl>=h.unlock){
      unlockedHeroes.push(h.id);newUnlock=true;
      floats.push({x:player.x,y:player.y-24,text:'UNLOCKED: '+h.name+'!',life:.8,color:'#f7c948'});
    }

  if(newUnlock) localStorage.setItem('cr_unlocks',JSON.stringify(unlockedHeroes));
}

const RARITIES=[
  {name:'Common',color:'#ccc',mult:1,cssClass:'rarity-common'},
  {name:'Uncommon',color:'#4ade80',mult:1.2,cssClass:'rarity-uncommon'},
  {name:'Rare',color:'#3b82f6',mult:1.5,cssClass:'rarity-rare'},
  {name:'Epic',color:'#a855f7',mult:2,cssClass:'rarity-epic'},

];

function rollRarity(floorNum,luck){
  const base=Math.random()*100;
  const bonus=floorNum*2+(luck||0)*1.5;
  const roll=base+bonus;
  if(roll>95) return 4; // legendary
  if(roll>82) return 3; // epic
  if(roll>65) return 2; // rare
  if(roll>40) return 1; // uncommon
  return 0; // common
}

function createEquipDrop(template,rarityIdx,level){
  const r=RARITIES[rarityIdx];
  const m=r.mult;
  const lm=1+(level||0)*0.1;
  const eq={
    baseName:template.name,
    name:template.name+(level?` +${level}`:''),
    emoji:template.emoji,
    slot:template.slot,
    desc:template.desc,
    rarity:rarityIdx,
    rarityName:r.name,
    rarityColor:r.color,
    cssClass:r.cssClass,
    level:level||0,
    // scaled stats
    atk:template.atk?Math.floor(template.atk*m*lm):0,
    range:template.range?Math.round(template.range*m*lm*100)/100:0,
    def:template.def?Math.floor(template.def*m*lm):0,
    hp:template.hp?Math.floor(template.hp*m*lm):0,
    spdBonus:template.spdBonus?Math.round(template.spdBonus*m*lm*100)/100:0,
    luck:template.luck?Math.floor(template.luck*m*lm):0,
    crit:template.crit?Math.floor(template.crit*m*lm):0,
    xpMult:template.xpMult?Math.round(template.xpMult*m*lm*100)/100:0,
    goldMult:template.goldMult?Math.round(template.goldMult*m*lm*100)/100:0,
    bounce:!!template.bounce
  };
  eq.price=Math.floor(RARITY_PRICES[rarityIdx]*(1+floor*0.1));
  eq.sellPrice=Math.floor(eq.price*0.5);
  return eq;
}

function getRandomEquip(floorNum,luck){
  const pools=floorNum>=10?ALL_EQUIPMENT:floorNum>=6?ALL_EQUIPMENT.slice(0,ALL_EQUIPMENT.length-3):ALL_EQUIPMENT.slice(0,ALL_EQUIPMENT.length-5);
  const template=pools[Math.floor(Math.random()*pools.length)];
  const rarity=rollRarity(floorNum,luck);
  return createEquipDrop(template,rarity,0);
}

function getShopEquip(floorNum){
  const rarity=Math.min(4,rollRarity(floorNum,2));
  const template=ALL_EQUIPMENT[Math.floor(Math.random()*ALL_EQUIPMENT.length)];
  return createEquipDrop(template,rarity,0);
}

function equipStatSummary(eq){
  if(!eq)return 'Empty';
  const parts=[];
  if(eq.atk)parts.push(`ATK+${eq.atk}`);
  if(eq.range)parts.push(`RNG+${eq.range}`);
  if(eq.def)parts.push(`DEF+${eq.def}`);
  if(eq.hp)parts.push(`HP+${eq.hp}`);
  if(eq.spdBonus)parts.push(`SPD+${eq.spdBonus}`);
  if(eq.luck)parts.push(`LCK+${eq.luck}`);
  if(eq.crit)parts.push(`CRT+${eq.crit}%`);
  if(eq.xpMult)parts.push(`XP x${eq.xpMult}`);
  if(eq.goldMult)parts.push(`Gold x${eq.goldMult}`);
  if(eq.bounce)parts.push('Bounce');
  return parts.join(' ')||eq.desc;
}

function recalcStats(){
  if(!player)return;
  const h=player.hero;
  player.atk=player.baseAtk;
  player.spd=player.baseSpd;
  player.range=player.baseRange;
  player.luck=player.baseLuck;
  player.crit=player.baseCrit;
  player.dmgReduce=player.baseDmgReduce;
  player.bounce=player.baseBounce;
  // remove old armor HP bonus then re-add
  player.maxHp=player.baseMaxHp;
  let hpBonus=0;
  const eq=player.equipment;
  for(const slotKey of ['weapon','armor','acc']){
    const e=eq[slotKey];
    if(!e)continue;
    if(e.atk) player.atk+=e.atk;
    if(e.range) player.range+=e.range;
    if(e.spdBonus) player.spd+=e.spdBonus;
    if(e.luck) player.luck+=e.luck;
    if(e.crit) player.crit+=e.crit;
    if(e.def) player.dmgReduce=Math.min(0.7,player.dmgReduce+e.def*0.04);
    if(e.hp) hpBonus+=e.hp;
    if(e.bounce) player.bounce=true;
  }
  player.maxHp+=hpBonus;
  if(player.hp>player.maxHp) player.hp=player.maxHp;
  // xpMult / goldMult — stored for use elsewhere
  player.xpMult=1;
  player.goldMult=1;
  for(const slotKey of ['weapon','armor','acc']){
    const e=eq[slotKey];
    if(!e)continue;
    if(e.xpMult) player.xpMult*=e.xpMult;
    if(e.goldMult) player.goldMult*=e.goldMult;
  }
  // Pet bonuses to xpMult/goldMult
  if(activePet){
    const pet=PETS.find(p=>p.id===activePet);
    if(pet){
      if(pet.bonus.xpMult) player.xpMult*=pet.bonus.xpMult;
      if(pet.bonus.goldMult) player.goldMult*=pet.bonus.goldMult;
    }
  }
}

function tryEquip(newEq){
  const slot=newEq.slot==='weapon'?'weapon':newEq.slot==='armor'?'armor':'acc';
  const current=player.equipment[slot];

  // Combining: if same base name and level < 5, combine
  if(current&&current.baseName===newEq.baseName&&current.level<5){
    current.level++;
    current.name=current.baseName+' +'+current.level;
    const lm=1+current.level*0.1;
    // re-scale stats from base template
    const tpl=ALL_EQUIPMENT.find(t=>t.name===current.baseName);
    if(tpl){
      const rm=RARITIES[current.rarity].mult;
      if(tpl.atk)current.atk=Math.floor(tpl.atk*rm*lm);
      if(tpl.range)current.range=Math.round(tpl.range*rm*lm*100)/100;
      if(tpl.def)current.def=Math.floor(tpl.def*rm*lm);
      if(tpl.hp)current.hp=Math.floor(tpl.hp*rm*lm);
      if(tpl.spdBonus)current.spdBonus=Math.round(tpl.spdBonus*rm*lm*100)/100;
      if(tpl.luck)current.luck=Math.floor(tpl.luck*rm*lm);
      if(tpl.crit)current.crit=Math.floor(tpl.crit*rm*lm);
      if(tpl.xpMult)current.xpMult=Math.round(tpl.xpMult*rm*lm*100)/100;
      if(tpl.goldMult)current.goldMult=Math.round(tpl.goldMult*rm*lm*100)/100;
    }
    floats.push({x:player.x,y:player.y-16,text:`COMBINED! ${current.name}`,life:1.2,color:'#ffd700'});
    snd('win');
    recalcStats();
    updateEquipHUD();
    return;
  }

  // Empty slot: auto-equip
  if(!current){
    player.equipment[slot]=newEq;
    floats.push({x:player.x,y:player.y-16,text:`Equipped ${newEq.name}`,life:1,color:newEq.rarityColor});
    snd('item');
    // Sparkle ring around player on equip
    for(let i=0;i<10;i++){
      const ang=Math.PI*2*i/10;
      particles.push({x:player.x+8+Math.cos(ang)*16,y:player.y+8+Math.sin(ang)*16,dx:Math.cos(ang)*0.8,dy:Math.sin(ang)*0.8,life:.5,color:newEq.rarityColor,sz:2,isStar:true,noGrav:true});
    }
    recalcStats();
    updateEquipHUD();
    return;
  }

  // Slot occupied: compare stats
  // If new item is worse overall, auto-sell it instead of asking
  const oldScore = (current.atk||0) + (current.def||0)*1.5 + (current.hp||0)*0.3 + (current.range||0)*3 + (current.crit||0)*0.5 + (current.luck||0)*0.5 + (current.spdBonus||0)*5 + (current.xpMult?current.xpMult*10:0) + (current.goldMult?current.goldMult*5:0);
  const newScore = (newEq.atk||0) + (newEq.def||0)*1.5 + (newEq.hp||0)*0.3 + (newEq.range||0)*3 + (newEq.crit||0)*0.5 + (newEq.luck||0)*0.5 + (newEq.spdBonus||0)*5 + (newEq.xpMult?newEq.xpMult*10:0) + (newEq.goldMult?newEq.goldMult*5:0);
  if(newScore <= oldScore){
    // Worse — auto-sell silently
    const sellPrice = Math.max(1, Math.floor((newEq.price||10)*0.5));
    gold += sellPrice;
    floats.push({x:player.x,y:player.y-16,text:`Sold +${sellPrice}g`,life:.6,color:'#ffd700'});
    return;
  }

  showCompare(current,newEq,slot);
}

function showCompare(oldEq,newEq,slot){
  gameState='compare';
  TL.style.display='none';
  document.getElementById('touch-right').style.display='none';
  const cmp=document.getElementById('eq-compare');
  cmp.classList.remove('hidden');

  function statLine(label,oldV,newV){
    if(!oldV&&!newV)return '';
    const diff=newV-oldV;
    const cls=diff>0?'pos':diff<0?'neg':'';
    return `<div>${label}: ${oldV||0} -> <span class="${cls}">${newV||0}</span></div>`;
  }

  cmp.innerHTML=`<div class="cmp-box">
    <div class="cmp-title">Replace Equipment?</div>
    <div class="cmp-row">
      <div class="cmp-item" style="border:2px solid ${oldEq.rarityColor};border-radius:8px">
        <div style="font-size:8px;color:${oldEq.rarityColor}">[CURRENT]</div>
        <div class="emoji">${oldEq.emoji}</div>
        <div class="name" style="color:${oldEq.rarityColor}">${oldEq.name}</div>
        <div class="stats">${equipStatSummary(oldEq)}</div>
      </div>
      <div class="cmp-item" style="border:2px solid ${newEq.rarityColor};border-radius:8px">
        <div style="font-size:8px;color:${newEq.rarityColor}">[NEW]</div>
        <div class="emoji">${newEq.emoji}</div>
        <div class="name" style="color:${newEq.rarityColor}">${newEq.name}</div>
        <div class="stats">${equipStatSummary(newEq)}</div>
      </div>
    </div>
    <div class="cmp-row" style="flex-direction:column;align-items:center;font-size:10px;color:#aaa">
      ${statLine('ATK',oldEq.atk,newEq.atk)}
      ${statLine('RNG',oldEq.range,newEq.range)}
      ${statLine('DEF',oldEq.def,newEq.def)}
      ${statLine('HP',oldEq.hp,newEq.hp)}
      ${statLine('SPD',oldEq.spdBonus,newEq.spdBonus)}
      ${statLine('LCK',oldEq.luck,newEq.luck)}
      ${statLine('CRT%',oldEq.crit,newEq.crit)}
    </div>
    <div class="cmp-btns">
      <button class="btn btn-go" id="cmp-equip">EQUIP NEW</button>
      <button class="btn btn-retry" id="cmp-keep">KEEP OLD</button>
    </div>
  </div>`;
  document.getElementById('cmp-equip').onclick=()=>{
    player.equipment[slot]=newEq;
    snd('item');
    recalcStats();
    updateEquipHUD();
    closeCompare();
  };
  document.getElementById('cmp-keep').onclick=()=>{
    closeCompare();
  };
}

function closeCompare(){
  document.getElementById('eq-compare').classList.add('hidden');
  gameState='play';
  TL.style.display='flex';
  document.getElementById('touch-right').style.display='flex';
}

function updateEquipHUD(){
  const d=document.getElementById('items-display');d.innerHTML='';
  const slots=['weapon','armor','acc'];
  const labels=['W','A','R'];
  slots.forEach((s,i)=>{
    const eq=player.equipment[s];
    const div=document.createElement('div');
    div.className='item-slot '+(eq?eq.cssClass:'');
    if(eq){
      div.textContent=eq.emoji;
      div.title=eq.name;
      if(eq.level>0){
        const plus=document.createElement('span');plus.className='eq-plus';plus.textContent='+'+eq.level;div.appendChild(plus);
      }
      const tip=document.createElement('div');tip.className='eq-tip';
      tip.innerHTML=`<span style="color:${eq.rarityColor};font-weight:700">${eq.name}</span><br><span style="color:${eq.rarityColor}">${eq.rarityName}</span><br>${equipStatSummary(eq)}`;
      div.appendChild(tip);
    } else {
      const lbl=document.createElement('span');lbl.className='eq-label';lbl.textContent=labels[i];div.appendChild(lbl);
    }
    d.appendChild(div);
  });
  // Also show old passive items after equipment
  if(player.items&&player.items.length){
    player.items.forEach(it=>{
      const s=document.createElement('div');s.className='item-slot';s.textContent=it.emoji;s.title=it.name;d.appendChild(s);
    });
  }
}

// Map generation
function genFloor(fl){
  const mw=30,mh=24;
  const m=Array.from({length:mh},()=>new Uint8Array(mw));// 0=wall,1=floor,2=corridor,3=exit
  const rs=[];
  const numRooms=3+Math.floor(fl/5);
  for(let i=0;i<numRooms*30&&rs.length<numRooms;i++){
    const rw=5+Math.floor(Math.random()*4),rh=4+Math.floor(Math.random()*3);
    const rx=1+Math.floor(Math.random()*(mw-rw-2)),ry=1+Math.floor(Math.random()*(mh-rh-2));
    let ok=true;
    for(const r of rs){if(rx<r.x+r.w+1&&rx+rw>r.x-1&&ry<r.y+r.h+1&&ry+rh>r.y-1){ok=false;break}}
    if(!ok)continue;
    rs.push({x:rx,y:ry,w:rw,h:rh,cx:rx+Math.floor(rw/2),cy:ry+Math.floor(rh/2)});
    for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++)m[ry+dy][rx+dx]=1;
  }
  // Connect rooms — wide corridors (3 tiles wide)
  for(let i=1;i<rs.length;i++){
    let ax=rs[i-1].cx,ay=rs[i-1].cy,bx=rs[i].cx,by=rs[i].cy;
    while(ax!==bx){
      for(let w=-1;w<=1;w++){if(ay+w>=0&&ay+w<mh)m[ay+w][ax]=m[ay+w][ax]||2}
      ax+=ax<bx?1:-1;
    }
    while(ay!==by){
      for(let w=-1;w<=1;w++){if(ax+w>=0&&ax+w<mw)m[ay][ax+w]=m[ay][ax+w]||2}
      ay+=ay<by?1:-1;
    }
    m[ay][ax]=m[ay][ax]||2;
  }
  // Add pillars/obstacles in larger rooms for cover
  rs.forEach(r=>{
    if(r.w>=6&&r.h>=5&&Math.random()<.5){
      // Pillar pattern
      const px=r.x+2+Math.floor(Math.random()*(r.w-4));
      const py=r.y+2+Math.floor(Math.random()*(r.h-4));
      m[py][px]=0;// wall pillar
      if(Math.random()<.4&&px+1<r.x+r.w-1) m[py][px+1]=0;
      if(Math.random()<.4&&py+1<r.y+r.h-1) m[py+1][px]=0;
    }
    // Arena rooms (large, round-ish) on later floors
    if(fl>=5&&r.w>=6&&r.h>=5&&Math.random()<.3){
      // Cut corners to make it more interesting
      m[r.y][r.x]=0;m[r.y][r.x+r.w-1]=0;
      m[r.y+r.h-1][r.x]=0;m[r.y+r.h-1][r.x+r.w-1]=0;
    }
  });
  // Exit in last room
  const lr=rs[rs.length-1];
  exitX=lr.cx;exitY=lr.cy;
  m[exitY][exitX]=3;
  return {map:m,rooms:rs,w:mw,h:mh};
}

function spawnEnemies(fl,rs){
  enemies=[];
  const isBoss=fl%5===0;
  for(let i=1;i<rs.length-(isBoss?1:0);i++){
    const r=rs[i];
    const cnt=3+Math.floor(fl*0.7)+Math.floor(Math.random()*2);
    const maxIdx=Math.min(ENEMY_TYPES.length-1,2+fl);
    const avail=ENEMY_TYPES.filter((_,idx)=>idx<=maxIdx);
    for(let j=0;j<cnt;j++){
      const et=avail[Math.floor(Math.random()*avail.length)];
      const spawnCount=et.horde?Math.min(8,3+fl):1; // ants spawn in groups
      for(let k=0;k<spawnCount;k++){
        const ex=r.x+1+Math.random()*(r.w-2),ey=r.y+1+Math.random()*(r.h-2);
        const hpMul=1+fl*.3;
        enemies.push({x:ex*TS,y:ey*TS,type:et,hp:Math.floor(et.hp*hpMul),maxHp:Math.floor(et.hp*hpMul),
          atk:et.atk+Math.floor(fl/2),spd:et.spd+(et.horde?Math.random()*.5:0),sz:et.sz,
          disguised:et.id==='imposter',timer:Math.random()*4,atkCD:Math.random(),dir:1,sinOff:Math.random()*Math.PI*2,
          isBoss:false,phase:0,summonCD:0,bossId:''});
      }
    }
  }
  if(isBoss){
    const br=rs[rs.length-1];
    const bx=br.cx*TS,by=br.cy*TS;
    let bossId,bossHP,bossATK;
    if(fl===5){bossId='gloria';bossHP=Math.floor((200+fl*20)*1.5);bossATK=6}
    else if(fl===10){bossId='wormking';bossHP=Math.floor((350+fl*15)*1.5);bossATK=8}
    else{bossId='champion';bossHP=Math.floor((500+fl*10)*1.5);bossATK=10}
    enemies.push({x:bx,y:by,type:{id:'boss',color:'#ff0',hp:bossHP,atk:bossATK,spd:.6,sz:32,ai:'boss'},
      hp:bossHP,maxHp:bossHP,atk:bossATK,spd:.6,sz:32,disguised:false,timer:0,atkCD:0,dir:1,sinOff:0,
      isBoss:true,phase:0,summonCD:0,bossId});
    bossActive=true;
    snd('boss');
  }
}

function spawnChests(fl,rs){
  chests=[];
  for(let i=1;i<rs.length;i++){
    if(Math.random()<.4+fl*.02){
      const r=rs[i];
      chests.push({x:(r.x+1+Math.random()*(r.w-2))*TS,y:(r.y+1+Math.random()*(r.h-2))*TS,open:false});
    }
  }
}

function openShop(){
  shopOpen=true;gameState='shop';
  TL.style.display='none';

}

function showShopOverlay(){
  OV.classList.remove('hidden');
  OVT.style.background='linear-gradient(135deg,#ffd700,#ff9f1c)';
  OVT.style['-webkit-background-clip']='text';
  OVT.style['-webkit-text-fill-color']='transparent';
  OVT.textContent='SHOP';
  OVS.textContent=`Gold: ${gold}g`;
  OVG.innerHTML='';
  OVG.style.gridTemplateColumns='repeat(auto-fit,minmax(110px,1fr))';
  shopItems.forEach((eq,i)=>{
    const d=document.createElement('div');d.className='shop-item-card'+(eq.bought?' sold':'');
    d.style.borderColor=eq.rarityColor;
    d.innerHTML=`<div style="font-size:24px">${eq.emoji}</div>
      <div class="hero-name" style="color:${eq.rarityColor}">${eq.name}</div>
      <div style="font-size:8px;color:${eq.rarityColor}">${eq.rarityName}</div>
      <div class="hero-stats">${equipStatSummary(eq)}</div>
      <div class="hero-special" style="color:#ffd700">${eq.price}g</div>
      <div style="font-size:8px;color:#888;margin-top:2px">${eq.slot==='weapon'?'Weapon':eq.slot==='armor'?'Armor':'Accessory'}</div>`;
    d.onclick=()=>{
      if(eq.bought||gold<eq.price)return;
      gold-=eq.price;eq.bought=true;
      tryEquip(eq);
      OVS.textContent=`Gold: ${gold}g`;
      d.classList.add('sold');
      // If compare screen opened, wait for it
      if(gameState==='compare'){
        const checkInt=setInterval(()=>{
          if(gameState!=='compare'){
            clearInterval(checkInt);
            if(shopOpen){
              gameState='shop';
              TL.style.display='none';
              document.getElementById('touch-right').style.display='none';
            }
          }
        },100);
      } else {
        gameState='shop';
      }
    };
    OVG.appendChild(d);
  });
  // Sell section — show equipped items that can be sold
  const sellDiv=document.createElement('div');
  sellDiv.style.cssText='width:90%;max-width:420px;margin-top:8px;text-align:center';
  sellDiv.innerHTML='<div style="font-size:10px;color:#888;margin-bottom:4px">SELL EQUIPPED (50% value)</div>';
  const sellRow=document.createElement('div');
  sellRow.style.cssText='display:flex;gap:6px;justify-content:center;flex-wrap:wrap';
  ['weapon','armor','acc'].forEach(slot=>{
    const eq=player.equipment[slot];
    if(!eq)return;
    const sb=document.createElement('div');
    sb.className='shop-sell-btn';
    sb.textContent=`${eq.emoji} ${eq.name} → ${eq.sellPrice||5}g`;
    sb.onclick=()=>{
      gold+=eq.sellPrice||5;
      player.equipment[slot]=null;
      recalcStats();
      updateEquipHUD();
      OVS.textContent=`Gold: ${gold}g`;
      sb.remove();
      snd('item');
    };
    sellRow.appendChild(sb);
  });
  sellDiv.appendChild(sellRow);

  // Sell All consumable items button
  if(player.items&&player.items.length>0){
    const sellAllDiv=document.createElement('div');
    sellAllDiv.style.cssText='margin-top:8px';
    const sellAllBtn=document.createElement('div');
    sellAllBtn.className='shop-sell-btn';
    sellAllBtn.style.cssText='font-size:11px;padding:8px 16px;background:rgba(239,68,68,.3);border:1px solid #ef4444;border-radius:4px;color:#ef4444;cursor:pointer;pointer-events:all;display:inline-block';
    sellAllBtn.textContent=`SELL ALL ITEMS (${player.items.length} items → ${player.items.length*5}g)`;
    sellAllBtn.onclick=()=>{
      const totalEarned=player.items.length*5;
      gold+=totalEarned;
      floats.push({x:player.x,y:player.y-16,text:`Sold all for +${totalEarned}g`,life:1.2,color:'#ffd700'});
      player.items=[];
      updateEquipHUD();
      OVS.textContent=`Gold: ${gold}g`;
      sellAllBtn.textContent='SOLD!';
      sellAllBtn.style.opacity='.4';
      sellAllBtn.style.pointerEvents='none';
      snd('item');
    };
    sellAllDiv.appendChild(sellAllBtn);
    sellDiv.appendChild(sellAllDiv);
  }

  OVG.parentElement.insertBefore(sellDiv,OVB);

  OVST.style.display='none';OVH.style.display='none';
  OVB.textContent='CONTINUE';OVB.className='btn btn-go';
  OVB.style.display='';
  OVB.onclick=()=>{
    shopOpen=false;OV.classList.add('hidden');
    // Remove sell div
    if(sellDiv.parentElement)sellDiv.remove();
    OVG.style.gridTemplateColumns='repeat(3,1fr)';
    TL.style.display='flex';document.getElementById('touch-right').style.display='flex';
    gameState='play';
  };
}

// Start game
function startGame(heroIdx,bonus){
  bonus=bonus||{hp:0,atk:0,spd:0,range:0,crit:0};
  ia();
  const h=HEROES[heroIdx];
  player={x:0,y:0,hero:h,hp:h.hp+bonus.hp,maxHp:h.hp+bonus.hp,mp:h.mp,maxMp:h.mp,atk:h.atk+bonus.atk,spd:h.spd+bonus.spd,
    range:h.range+bonus.range,str:h.str,luck:h.luck,crit:h.crit+bonus.crit,facing:{x:0,y:1},
    atkCD:0,spCD:0,spActive:0,invTime:0,bounce:false,extraProj:0,dmgReduce:0,items:[],
    slimeActive:0,blockActive:0,chargeActive:0,chargeDir:{x:0,y:1},flash:0,
    xp:0,xpNext:20,level:1,
    equipment:{weapon:null,armor:null,acc:null},
    baseAtk:h.atk,baseSpd:h.spd,baseRange:h.range,baseLuck:h.luck,baseCrit:h.crit,
    baseMaxHp:h.hp,baseDmgReduce:0,baseBounce:false,
    xpMult:1,goldMult:1};
  floor=1;gold=0;kills=0;prestigeUsed=false;bossActive=false;
  slimes=[];projectiles=[];particles=[];floats=[];
  petAtkTimer=0;petFireTimer=0;petSlimeTimer=0;petWebTimer=0;petPoisonTimers=[];
  // Polish state reset
  ghostHp=player.maxHp;vignetteAlpha=0;lvlFlashAlpha=0;floorFadeAlpha=0;floorFadeDir=0;
  ambientDust=[];dpsTracker={dmg:0,timer:0,dps:0};comboKills={count:0,timer:0};
  lastGold=0;xpSparkles=[];tileNoise={};playerBobTime=0;prevPlayerSpeed=0;
  heartbeatCD=0;bossEntrancePlayed=false;
  // Apply pet bonuses
  activePets=JSON.parse(localStorage.getItem('cr_pets')||'[]');
  activePet=activePets[0]||null;
  // Apply ALL pet bonuses (stacking)
  activePets.forEach(pid=>{
    const pet=PETS.find(p=>p.id===pid);
    if(!pet)return;
    if(pet){
      const b=pet.bonus;
      if(b.atk){player.baseAtk+=b.atk}
      if(b.spd){player.baseSpd+=b.spd}
      if(b.luck){player.baseLuck+=b.luck}
      if(b.crit){player.baseCrit+=b.crit}
      if(b.hp){player.baseMaxHp+=b.hp;player.hp+=b.hp;player.maxHp+=b.hp}
      if(b.mp){player.maxMp+=b.mp;player.mp+=b.mp}
      if(b.dmgReduce){player.baseDmgReduce=Math.min(0.7,(player.baseDmgReduce||0)+b.dmgReduce)}
      if(b.extraProj){player.extraProj+=b.extraProj}
      if(b.phase){player.phaseLeft=1}
      recalcStats();
      floats.push({x:player.x,y:player.y-20,text:`Pet: ${pet.emoji} ${pet.name}`,life:2,color:'#ffd700'});
    }
  });
  loadFloor();
  camX=player.x+8-W/2;camY=player.y+8-H/2;
  OV.classList.add('hidden');
  TL.style.display='flex';
  document.getElementById('touch-right').style.display='flex';
  updateEquipHUD();
  gameState='play';
}

function loadFloor(){
  const data=genFloor(floor);
  map=data.map;rooms=data.rooms;
  const sr=rooms[0];
  player.x=sr.cx*TS;player.y=sr.cy*TS;
  if(player.phaseLeft!==undefined) player.phaseLeft=1; // reset phase per floor
  exitOpen=true;
  slimes=[];projectiles=[];particles=[];floats=[];
  spawnEnemies(floor,rooms);
  spawnChests(floor,rooms);
  bossActive=enemies.some(e=>e.isBoss);
  if(isShopFloor(floor))setTimeout(()=>openShop(),500);
  // Pet hpPerFloor bonus
  if(activePet&&player){
    const pet=PETS.find(p=>p.id===activePet);
    if(pet&&pet.bonus.hpPerFloor&&floor>1){
      const heal=pet.bonus.hpPerFloor;
      player.hp=Math.min(player.maxHp,player.hp+heal);
      floats.push({x:player.x,y:player.y-16,text:`+${heal} HP (pet)`,life:1,color:'#ff6b6b'});
    }
  }
}

function handleJoy(e){
  const t=e.touches[0],r=TL.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  let dx=t.clientX-cx,dy=t.clientY-cy;
  const d=Math.sqrt(dx*dx+dy*dy);
  if(d>maxJoy){dx=dx/d*maxJoy;dy=dy/d*maxJoy}
  if(d>8){touchDir={x:dx/d,y:dy/d}}else{touchDir={x:0,y:0}}
  TThumb.style.transform=`translate(${-50+dx/maxJoy*40}%,${-50+dy/maxJoy*40}%)`;
}
const btnAtk=document.getElementById('btn-atk');
const btnSpc=document.getElementById('btn-spc');
let atkTouchId=null,atkCX=0,atkCY=0;
btnAtk.addEventListener('touchstart',e=>{
  e.preventDefault();ia();const t=e.changedTouches[0];atkTouchId=t.identifier;
  const r=btnAtk.getBoundingClientRect();atkCX=r.left+r.width/2;atkCY=r.top+r.height/2;
  touchAtk=true;playerAttack();
},{passive:false});
btnAtk.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){if(t.identifier===atkTouchId){
    const dx=t.clientX-atkCX,dy=t.clientY-atkCY,d=Math.sqrt(dx*dx+dy*dy);
    if(d>10){const px=player.x+8-camX,py=player.y+8-camY;aimX=px+dx*3;aimY=py+dy*3;mouseAiming=true;playerAttack()}
  }}
},{passive:false});
btnAtk.addEventListener('touchend',e=>{e.preventDefault();touchAtk=false;atkTouchId=null},{passive:false});
btnSpc.addEventListener('touchstart',e=>{e.preventDefault();ia();touchSpc=true},{passive:false});
btnSpc.addEventListener('touchend',e=>{e.preventDefault();touchSpc=false},{passive:false});

// Click to attack on desktop
C.addEventListener('mousedown',()=>{if(gameState==='play'){ia();playerAttack()}});
C.addEventListener('touchstart',e=>{
  if(gameState!=='play')return;
  ia();
  const t=e.touches[0];
  const r=C.getBoundingClientRect();
  const tx=t.clientX-r.left,ty=t.clientY-r.top;
  // Right half of screen = aim and shoot toward that point
  if(tx>W*0.4){
    aimX=tx;aimY=ty;mouseAiming=true;
    playerAttack();
  }
},{passive:true});

function getMoveDir(){
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy=-1;
  if(keys['s']||keys['arrowdown'])dy=1;
  if(keys['a']||keys['arrowleft'])dx=-1;
  if(keys['d']||keys['arrowright'])dx=1;
  dx+=touchDir.x;dy+=touchDir.y;
  const d=Math.sqrt(dx*dx+dy*dy);
  return d>0?{x:dx/d,y:dy/d}:{x:0,y:0};
}

// Combat
function getAimDir(){
  if(mouseAiming){
    const px=player.x+8-camX, py=player.y+8-camY;
    const dx=aimX-px, dy=aimY-py;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d>3) return {x:dx/d,y:dy/d};
  }
  return {...player.facing};
}
function playerAttack(){
  if(player.atkCD>0)return;
  player.atkCD=Math.max(.12, .3 - player.spd*.02);
  snd('atk');
  const dir=getAimDir();
  player.facing=dir;
  const numProj=1+player.extraProj;
  const projSpd=3+player.range*1.5;
  const projLife=20+player.range*10;
  const isCrit=Math.random()*100<player.crit;
  const dmg=isCrit?Math.floor(player.atk*(1.5+player.str*.1)):player.atk;
  // Stretch player on attack
  playerScaleX=0.8;playerScaleY=1.2;playerScaleTimer=0.08;
  for(let i=0;i<numProj;i++){
    let pd={...dir};
    if(i>0){const a=Math.atan2(pd.y,pd.x)+(i%2===1?.2:-.2);pd={x:Math.cos(a),y:Math.sin(a)}}
    projectiles.push({x:player.x+8,y:player.y+8,dx:pd.x*projSpd,dy:pd.y*projSpd,dmg:dmg,life:projLife,
      owner:'player',bounce:player.bounce?2:0,sz:isCrit?6:3,color:isCrit?'#f7c948':player.hero.color,crit:isCrit,
      trail:[]});
  }
  if(isCrit){
    // Sparkle particles for crit
    for(let i=0;i<6;i++)particles.push({x:player.x+8,y:player.y+8,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:.3,color:'#ffd700',sz:1.5,isStar:true,noGrav:true});
  }
}

function useSpecial(){
  if(player.spCD>0&&player.hero.id!=='flounder')return;
  const h=player.hero.id;
  const heroData=HEROES.find(x=>x.id===h);
  // Pet cdReduce
  let cdMult=1;
  if(activePet){const pet=PETS.find(p=>p.id===activePet);if(pet&&pet.bonus.cdReduce)cdMult=1-pet.bonus.cdReduce}
  if(h==='bart'){
    // Triple shot — 3 aimed rocks from slingshot
    player.spCD=heroData.spCD*cdMult;snd('atk');
    const dir=getAimDir();
    for(let a=-1;a<=1;a++){
      const ang=Math.atan2(dir.y,dir.x)+a*.3;
      projectiles.push({x:player.x+8,y:player.y+8,dx:Math.cos(ang)*6,dy:Math.sin(ang)*6,
        dmg:player.atk*2,life:35,owner:'player',bounce:1,sz:4,color:'#aaa',crit:a===0});
    }
    shake=.1;
  } else if(h==='worm'){player.slimeActive=5;player.spCD=heroData.spCD*cdMult}
  else if(h==='chancla'){
    player.spCD=heroData.spCD*cdMult;
    for(let a=-1;a<=1;a++){
      const ang=Math.atan2(player.facing.y,player.facing.x)+a*.4;
      projectiles.push({x:player.x+8,y:player.y+8,dx:Math.cos(ang)*5,dy:Math.sin(ang)*5,
        dmg:player.atk*2,life:25,owner:'player',bounce:0,sz:5,color:'#c87030'});
    }
    snd('atk');
  } else if(h==='cube'){
    player.spCD=heroData.spCD*cdMult;shake=.3;snd('hit');
    enemies.forEach(e=>{
      const dx=e.x-player.x,dy=e.y-player.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<60){hurtEnemy(e,player.atk*3);e.x+=dx/d*20;e.y+=dy/d*20}
    });
    for(let i=0;i<12;i++)particles.push({x:player.x+8,y:player.y+8,dx:(Math.random()-.5)*3,dy:(Math.random()-.5)*3,life:.5,color:'#b8956a',sz:3});
  } else if(h==='flounder'){
    // Passive: handled on death
  } else if(h==='jesus'){
    player.blockActive=3;player.spCD=heroData.spCD*cdMult;
    snd('item');
  } else if(h==='horse'){
    player.chargeActive=.4;player.chargeDir={...player.facing};player.spCD=heroData.spCD*cdMult;
    snd('atk');
  } else if(h==='keira'){
    player.spCD=heroData.spCD*cdMult;snd('hit');shake=.1;
    // Wine splash — damage + slow enemies in radius
    enemies.forEach(e=>{
      const dx=e.x-player.x,dy=e.y-player.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<70){hurtEnemy(e,player.atk*2);e.slowTimer=3;e.origSpd=e.origSpd||e.spd;e.spd=e.origSpd*.4}
    });
    for(let i=0;i<16;i++)particles.push({x:player.x+8,y:player.y+8,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:.6,color:'#8b0000',sz:3});
  }
}

function hurtEnemy(e,dmg,isCrit){
  e.hp-=dmg;e.flash=.2;
  dpsTracker.dmg+=dmg;
  // Hit freeze for player hits — makes combat crunchy
  hitFreeze=3;
  // Screen shake on hit
  shake=Math.max(shake,0.03);
  // Damage numbers: crits get special treatment
  const driftX=(Math.random()-.5)*20;
  if(isCrit){
    floats.push({x:e.x+driftX,y:e.y-4,text:'CRIT! '+dmg,life:.8,color:'#ffd700',scale:0.5,scaleTimer:0.15,big:true,driftX:driftX*0.3});
    // Crit freeze frame
    hitFreeze=4;
    shake=Math.max(shake,0.1);
    // Star burst: 8 particles in even angles
    for(let i=0;i<8;i++){const ang=Math.PI*2*i/8;particles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:Math.cos(ang)*3,dy:Math.sin(ang)*3,life:.4,color:'#ffd700',sz:2,isStar:true,noGrav:true})}
  } else {
    floats.push({x:e.x+driftX,y:e.y-4,text:dmg.toString(),life:.6,color:'#fff',scale:0.5,scaleTimer:0.15,driftX:driftX*0.3});
  }
  snd('hit');
  // Pet poison: apply DOT
  if(activePet){
    const pet=PETS.find(p=>p.id===activePet);
    if(pet&&pet.bonus.poison&&e.hp>0){
      if(!petPoisonTimers.find(pt=>pt.enemy===e)){
        petPoisonTimers.push({enemy:e,timer:3,tickCD:1});
        floats.push({x:e.x,y:e.y-10,text:'POISON',life:.5,color:'#22c55e'});
      }
    }
  }
  if(e.hp<=0)killEnemy(e);
}

function gainXP(amt){
  const prevXp=player.xp;
  player.xp+=Math.floor((amt+Math.floor(player.luck*.5))*(player.xpMult||1));
  // XP sparkle effect
  if(player.xp>prevXp){for(let i=0;i<2;i++)xpSparkles.push({x:Math.random()*60+40,y:Math.random()*6+2,life:0.4+Math.random()*0.3})}
  while(player.xp>=player.xpNext){
    player.xp-=player.xpNext;
    player.level++;
    player.xpNext=Math.floor(player.xpNext*1.4);
    floats.push({x:player.x,y:player.y-16,text:'LEVEL UP!',life:1.2,color:'#f7c948',scale:0.5,scaleTimer:0.15,big:true});
    lvlFlashAlpha=0.5;
    // Gold vignette on level up
    flashScreen('rgba(255,215,0,0.5)',0.5);
    // Fountain of gold/purple particles shooting upward
    for(let i=0;i<20;i++){
      particles.push({x:player.x+8+(Math.random()-.5)*10,y:player.y+12,dx:(Math.random()-.5)*3,dy:-3-Math.random()*4,life:.8+Math.random()*.5,color:i%2?'#ffd700':'#a855f7',sz:2+Math.random()*2,noGrav:false});
    }
    // Sparkle ring around player
    for(let i=0;i<12;i++){
      const ang=Math.PI*2*i/12;
      particles.push({x:player.x+8+Math.cos(ang)*14,y:player.y+8+Math.sin(ang)*14,dx:Math.cos(ang)*0.5,dy:Math.sin(ang)*0.5,life:.6,color:'#ffd700',sz:1.5,isStar:true,noGrav:true});
    }
    snd('win');
    showUpgradeScreen();
  }
}

function killEnemy(e){
  kills++;
  const gm=player.goldMult||1;
  const earnedGold=Math.floor((2+floor*.5+Math.random()*3)*gm);
  gold+=earnedGold;
  // Gold pickup particles — golden spiraling rise
  for(let i=0;i<5;i++){
    const ang=Math.PI*2*i/5;
    particles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:Math.cos(ang)*1.5,dy:-2-Math.random()*2,life:.6+Math.random()*.3,color:'#ffd700',sz:2,noGrav:true,spiral:true,spiralOff:ang});
  }
  gainXP(3+floor);
  shake=Math.max(shake,0.05);
  // Death explosion: ring of particles expanding outward in a circle
  for(let i=0;i<16;i++){
    const ang=Math.PI*2*i/16;const spd=2+Math.random()*2;
    particles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:Math.cos(ang)*spd,dy:Math.sin(ang)*spd,life:.5+Math.random()*.3,color:e.type.color,sz:1.5+Math.random()*2.5,noGrav:true});
  }
  // Inner burst
  for(let i=0;i<6;i++){
    particles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:(Math.random()-.5)*5,dy:(Math.random()-.5)*5,life:.3,color:'#fff',sz:1});
  }
  // Combo tracking — kills within 2s
  comboKills.count++;comboKills.timer=2;
  if(comboKills.count===2){comboDisplayText='DOUBLE KILL!';comboDisplayLife=1.5;snd('combo')}
  else if(comboKills.count===3){comboDisplayText='TRIPLE KILL!';comboDisplayLife=1.5;snd('combo')}
  else if(comboKills.count===4){comboDisplayText='QUAD!';comboDisplayLife=1.5;snd('combo')}
  else if(comboKills.count>=5){comboDisplayText='RAMPAGE!';comboDisplayLife=2;snd('combo')}
  if(e.type.explode){
    shake=.5;
    flashScreen('rgba(255,100,0,0.8)',0.6);
    const dmg=e.atk*2;
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<50)hurtPlayer(dmg);
    for(let i=0;i<24;i++){const ang=Math.PI*2*i/24;const spd=2+Math.random()*4;particles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:Math.cos(ang)*spd,dy:Math.sin(ang)*spd,life:.6,color:i%2?'#ff4444':'#ff8800',sz:2+Math.random()*2,noGrav:true})}
  }
  if(e.type.splits&&e.sz>8){
    for(let i=0;i<2;i++){
      const ne={...e,x:e.x+(i?8:-8),y:e.y+(i?8:-8),hp:Math.floor(e.maxHp/3),maxHp:Math.floor(e.maxHp/3),sz:Math.floor(e.sz*.7),type:{...e.type,splits:false}};
      enemies.push(ne);
    }
  }
  // Equipment drop chance (10% base + floor scaling + boss guaranteed)
  const dropChance=e.isBoss?1.0:(0.10+floor*0.015);
  if(Math.random()<dropChance){
    const eq=getRandomEquip(floor,player.luck);
    chests.push({x:e.x,y:e.y,open:false,equip:eq,isEquip:true});
  } else if(Math.random()<.10+floor*.005){
    // Legacy consumable item drop (rarer now)
    const it=ITEMS[Math.floor(Math.random()*ITEMS.length)];
    chests.push({x:e.x,y:e.y,open:false,item:it,isItem:true});
  }
  e.hp=-999;
}

function hurtPlayer(dmg,attacker){
  if(player.invTime>0||player.blockActive>0)return;
  const actual=Math.max(1,Math.floor(dmg*(1-(player.dmgReduce||0))));
  player.hp-=actual;player.flash=.1;shake=.15;
  // Red vignette flash
  flashScreen('rgba(255,0,0,0.7)',0.6);
  // Squash on damage
  playerScaleX=1.3;playerScaleY=0.7;playerScaleTimer=0.1;
  // Blood-red particles that fall with gravity
  for(let i=0;i<8;i++){
    particles.push({x:player.x+8,y:player.y+8,dx:(Math.random()-.5)*3,dy:-1-Math.random()*2,life:.5+Math.random()*.3,color:i%2?'#cc0000':'#880000',sz:1.5+Math.random()*1.5,isBlood:true});
  }
  const driftX=(Math.random()-.5)*16;
  floats.push({x:player.x+driftX,y:player.y-4,text:actual.toString(),life:.6,color:'#ff4444',isPlayerDmg:true,scale:0.5,scaleTimer:0.15,driftX:driftX*0.3});
  snd('hurt');
  // Pet thorns: reflect damage to attacker
  if(activePet&&attacker){
    const pet=PETS.find(p=>p.id===activePet);
    if(pet&&pet.bonus.thorns&&attacker.hp>0){
      hurtEnemy(attacker,pet.bonus.thorns);
      floats.push({x:attacker.x,y:attacker.y-10,text:'THORNS',life:.5,color:'#fbbf24'});
    }
  }
  if(player.hp<=0){
    if(player.hero.id==='flounder'&&!prestigeUsed){
      prestigeUsed=true;player.hp=player.maxHp;
      floats.push({x:player.x,y:player.y-12,text:'PRESTIGE!',life:1.2,color:'#ffd700'});
      snd('win');player.invTime=2;
    } else {
      die();
    }
  }
}

function showPetShop(outcome){
  gameState='petshop';
  OV.classList.remove('hidden');
  OVT.style.background='linear-gradient(135deg,#fbbf24,#f472b6,#a855f7)';
  OVT.style['-webkit-background-clip']='text';OVT.style['-webkit-text-fill-color']='transparent';
  OVT.textContent='PET SHOP';
  const ownedPets=JSON.parse(localStorage.getItem('cr_pets')||'[]');
  const petStr=ownedPets.length?ownedPets.map(id=>{const p=PETS.find(x=>x.id===id);return p?p.emoji:''}).join(''):'None';
  OVS.textContent=`Gold: ${gold}g | Pets: ${petStr} (${ownedPets.length})`;
  OVG.innerHTML='';
  OVG.style.gridTemplateColumns='repeat(auto-fill,minmax(100px,1fr))';
  OVST.style.display='none';OVH.style.display='none';
  PETS.forEach(pet=>{
    const owned=ownedPets.includes(pet.id);
    const canAfford=gold>=pet.cost;
    const d=document.createElement('div');
    d.className='shop-item-card';
    d.style.borderColor=owned?'#4ade80':canAfford?'#fbbf24':'rgba(255,255,255,.1)';
    if(!canAfford&&!owned)d.style.opacity='.5';
    d.innerHTML=`<div style="font-size:22px">${pet.emoji}</div>
      <div class="hero-name" style="font-size:10px">${pet.name}</div>
      <div style="font-size:8px;color:#aaa;margin:2px 0">${pet.desc}</div>
      <div style="font-size:10px;color:${owned?'#4ade80':'#ffd700'};font-weight:700">${owned?'OWNED':pet.cost+'g'}</div>`;
    if(canAfford&&!owned){
      d.onclick=()=>{
        gold-=pet.cost;
        ownedPets.push(pet.id);
        localStorage.setItem('cr_pets',JSON.stringify(ownedPets));
        activePets=ownedPets;activePet=ownedPets[0]||null;
        snd('win');
        floats.push({x:W/2,y:H/2-50,text:`Got ${pet.emoji} ${pet.name}!`,life:2,color:'#ffd700'});

      };
    }
    OVG.appendChild(d);
  });

  // Release pet button if they have one
  if(currentPet){
    const releaseDiv=document.createElement('div');
    releaseDiv.style.cssText='width:100%;text-align:center;margin-top:8px;grid-column:1/-1';

      localStorage.removeItem('cr_pet');
      activePet=null;
      snd('item');
      OVS.textContent=`Gold: ${gold}g | No pet`;
      releaseBtn.textContent='Released!';
      releaseBtn.style.opacity='.4';
      releaseBtn.style.pointerEvents='none';
      // Re-enable buying
      showPetShop(outcome);
    };
    releaseDiv.appendChild(releaseBtn);
    OVG.appendChild(releaseDiv);
  }

  OVB.style.display='';OVB.style.marginTop='12px';
  OVB.textContent='CONTINUE';OVB.className='btn btn-go';
  OVB.onclick=()=>{
    OVG.style.gridTemplateColumns='repeat(3,1fr)';
    if(outcome==='win')showWinScreen();
    else showDeathScreen();
  };
}

      OVG.parentElement.insertBefore(petDiv,OVB);

    // Clean up pet div before leaving menu

  function showStatDistribution(heroIdx){

    const stats=['hp','atk','spd','range','crit'];
    const labels=['HP +5','ATK +1','SPD +0.2','Range +0.3','Crit +3%'];
