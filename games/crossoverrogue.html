    function renderDist(){
      OVT.textContent='DISTRIBUTE POINTS';
      OVS.textContent=h.emoji+' '+h.name+' — '+pts+' points left';
      OVG.innerHTML='';
      stats.forEach((s,i)=>{
        const d=document.createElement('div');d.className='hero-card';d.style.padding='8px';d.style.display='flex';d.style.alignItems='center';d.style.gap='8px';d.style.justifyContent='space-between';
        const cur=s==='hp'?h[s]+bonus.hp:s==='atk'?h[s]+bonus.atk:s==='spd'?h[s]+bonus.spd:s==='range'?h[s]+bonus.range:h[s]+bonus.crit;
        d.innerHTML='<span style="font-size:12px;color:#aaa;min-width:70px">'+labels[i]+'</span><span style="color:#4ade80;font-weight:700;font-size:14px">'+(s==='spd'||s==='range'?cur.toFixed(1):Math.floor(cur))+'</span>';
        const plus=document.createElement('span');plus.textContent='+';plus.style.cssText='cursor:pointer;background:#333;color:#4ade80;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;pointer-events:all';
        plus.onclick=()=>{if(pts<=0)return;pts--;bonus[s]+=vals[i];renderDist()};
        d.appendChild(plus);
        OVG.appendChild(d);
      });
      OVG.style.gridTemplateColumns='1fr';
      OVB.textContent='GO! ('+pts+' left)';
      OVB.onclick=()=>{
        OVG.style.gridTemplateColumns='repeat(3,1fr)';
        startGame(heroIdx,bonus);
      };
    }
    renderDist();
  }
}

// Update
function update(dt){
  if(gameState!=='play')return;
  DT=Math.min(dt,.05);

  // Hit freeze — skip frames for crunchy impact
  if(hitFreeze>0){hitFreeze--;return}

  // Player movement
  const dir=getMoveDir();
  if(dir.x||dir.y){player.facing=dir;
    // Dust particles
    if(Math.random()<.15)particles.push({x:player.x+8,y:player.y+14,dx:(Math.random()-.5),dy:Math.random()*.5,life:.3,color:'#666',sz:1});
  }

  let mx=dir.x*player.spd*TS*DT*3.5, my=dir.y*player.spd*TS*DT*3.5;
  if(player.chargeActive>0){mx=player.chargeDir.x*8*TS*DT;my=player.chargeDir.y*8*TS*DT;player.chargeActive-=DT;
    enemies.forEach(e=>{if(e.hp>0){const dx=e.x-player.x,dy=e.y-player.y;if(Math.sqrt(dx*dx+dy*dy)<18)hurtEnemy(e,player.atk*2)}});
  }

  // Collision with walls (pet phase: can walk through 1 wall tile per room)
  const canPhase=activePet&&PETS.find(p=>p.id===activePet)?.bonus?.phase&&(player.phaseLeft||0)>0;
  const nx=player.x+mx,ny=player.y+my;
  const tx=Math.floor(nx/TS),ty=Math.floor(ny/TS);
  const tx2=Math.floor((nx+12)/TS),ty2=Math.floor((ny+12)/TS);
  if(tx>=0&&tx2<map[0].length&&ty>=0&&ty2<map.length){
    if(map[ty][Math.floor(nx/TS)]&&map[ty][Math.floor((nx+12)/TS)]&&
       map[Math.floor(ny/TS)][Math.floor(nx/TS)]&&map[Math.floor((ny+12)/TS)][Math.floor((nx+12)/TS)]){
      player.x=nx;player.y=ny;
    } else if(canPhase&&tx>=1&&tx2<map[0].length-1&&ty>=1&&ty2<map.length-1){
      // Phase through wall
      player.x=nx;player.y=ny;player.phaseLeft--;
      floats.push({x:player.x,y:player.y-12,text:'PHASE!',life:.5,color:'#c084fc'});
      particles.push({x:player.x+8,y:player.y+8,dx:0,dy:-1,life:.4,color:'#c084fc',sz:3});
    } else {
      // Try axis-separated
      const ax=player.x+mx;
      const axt=Math.floor(ax/TS),axt2=Math.floor((ax+12)/TS),pyt=Math.floor(player.y/TS),pyt2=Math.floor((player.y+12)/TS);
      if(axt>=0&&axt2<map[0].length&&pyt>=0&&pyt2<map.length&&map[pyt][axt]&&map[pyt2][axt2])player.x=ax;
      const ay=player.y+my;
      const ayt=Math.floor(ay/TS),ayt2=Math.floor((ay+12)/TS),pxt=Math.floor(player.x/TS),pxt2=Math.floor((player.x+12)/TS);
      if(pxt>=0&&pxt2<map[0].length&&ayt>=0&&ayt2<map.length&&map[ayt][pxt]&&map[ayt2][pxt2])player.y=ay;
    }
  }

  // Slime trail
  if(player.slimeActive>0){
    player.slimeActive-=DT;
    if(Math.random()<.3)slimes.push({x:player.x+6,y:player.y+10,life:3,dmg:1});
  }

  // Timers
  player.atkCD=Math.max(0,player.atkCD-DT);
  player.spCD=Math.max(0,player.spCD-DT);
  player.invTime=Math.max(0,player.invTime-DT);
  player.blockActive=Math.max(0,player.blockActive-DT);
  player.flash=Math.max(0,player.flash-DT);

  // Auto attack with space/click
  if(keys[' ']||touchAtk)playerAttack();
  if(keys['e']||touchSpc)useSpecial();

  // Slimes damage enemies
  slimes.forEach(s=>{
    s.life-=DT;
    enemies.forEach(e=>{if(e.hp>0){const dx=e.x-s.x,dy=e.y-s.y;if(Math.sqrt(dx*dx+dy*dy)<12&&s.life>0){hurtEnemy(e,1);s.life=0}}});
  });
  slimes=slimes.filter(s=>s.life>0);

  // Pet aura effects
  if(activePet){
    const pet=PETS.find(p=>p.id===activePet);
    if(pet){
      const b=pet.bonus;
      // atkAura: pet attacks nearest enemy every 2s
      if(b.atkAura){
        petAtkTimer-=DT;
        if(petAtkTimer<=0){
          petAtkTimer=2;
          let nearest=null,nd=Infinity;
          enemies.forEach(e=>{if(e.hp>0){const d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);if(d<120&&d<nd){nd=d;nearest=e}}});
          if(nearest){
            hurtEnemy(nearest,b.atkAura);
            particles.push({x:nearest.x,y:nearest.y,dx:0,dy:-1,life:.3,color:'#ffd700',sz:2});
          }
        }
      }
      // fireBreath: pet shoots fire at nearest enemy every 3s
      if(b.fireBreath){
        petFireTimer-=DT;
        if(petFireTimer<=0){
          petFireTimer=3;
          let nearest=null,nd=Infinity;
          enemies.forEach(e=>{if(e.hp>0){const d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);if(d<150&&d<nd){nd=d;nearest=e}}});
          if(nearest){
            const dx=nearest.x-player.x,dy=nearest.y-player.y,d=Math.sqrt(dx*dx+dy*dy);
            projectiles.push({x:player.x+8,y:player.y+8,dx:dx/d*4,dy:dy/d*4,dmg:player.atk,life:25,owner:'player',bounce:0,sz:5,color:'#ff4500',crit:false});
          }
        }
      }
      // slowAura: enemies within 60px move 40% slower
      if(b.slowAura){
        enemies.forEach(e=>{
          if(e.hp>0){
            const d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);
            if(d<60){
              if(!e.petSlowed){e.petSlowed=true;e.origSpdPet=e.spd;e.spd*=0.6}
            } else if(e.petSlowed){
              e.spd=e.origSpdPet||e.spd/0.6;e.petSlowed=false;
            }
          }
        });
      }
      // webAura: nearby enemies get slowed (similar to slowAura but web visual)
      if(b.webAura){
        petWebTimer-=DT;
        if(petWebTimer<=0){
          petWebTimer=1.5;
          enemies.forEach(e=>{
            if(e.hp>0){
              const d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);
              if(d<60){
                if(!e.webSlowed){e.webSlowed=true;e.origSpdWeb=e.spd;e.spd*=0.5}
                e.webTimer=2;
                slimes.push({x:e.x,y:e.y,life:2,color:'rgba(200,200,200,0.3)',slow:true});
              }
            }
          });
        }
        enemies.forEach(e=>{
          if(e.webSlowed){
            e.webTimer=(e.webTimer||0)-DT;
            if(e.webTimer<=0){e.spd=e.origSpdWeb||e.spd/0.5;e.webSlowed=false}
          }
        });
      }
      // slimeTrail: leave damaging slime
      if(b.slimeTrail){
        petSlimeTimer-=DT;
        if(petSlimeTimer<=0){
          petSlimeTimer=0.3;
          slimes.push({x:player.x+6,y:player.y+10,life:3,dmg:1});
        }
      }
      // thorns: enemies that hit player take N damage back (handled in hurtPlayer)
      // lifesteal: handled in hurtEnemy for crits
      // poison: handled in hurtEnemy
      // mapReveal: handled in renderMinimap
      // goldMult: handled in recalcStats and gold collection
      // xpMult: handled in recalcStats
      // cdReduce: handled in useSpecial
      // phase: handled in collision
    }
  }

  // Poison tick on enemies
  petPoisonTimers.forEach(pt=>{pt.timer-=DT;pt.tickCD-=DT;if(pt.tickCD<=0&&pt.timer>0&&pt.enemy.hp>0){pt.tickCD=1;hurtEnemy(pt.enemy,1)}});
  petPoisonTimers=petPoisonTimers.filter(pt=>pt.timer>0&&pt.enemy.hp>0);

  // Projectiles
  projectiles.forEach(p=>{
    // Store trail positions
    if(!p.trail)p.trail=[];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>4)p.trail.shift();
    p.x+=p.dx;p.y+=p.dy;p.life--;
    if(p.owner==='player'){
      enemies.forEach(e=>{
        if(e.hp<=0)return;
        const dx=p.x-e.x-e.sz/2,dy=p.y-e.y-e.sz/2;
        if(Math.abs(dx)<e.sz/2+p.sz&&Math.abs(dy)<e.sz/2+p.sz){
          hurtEnemy(e,p.dmg,p.crit);
          // Pet lifesteal on crit
          if(p.crit&&activePet){
            const pet=PETS.find(pp=>pp.id===activePet);
            if(pet&&pet.bonus.lifesteal){
              const heal=Math.max(1,Math.floor(p.dmg*0.2));
              player.hp=Math.min(player.maxHp,player.hp+heal);
              floats.push({x:player.x,y:player.y-12,text:`+${heal}`,life:.4,color:'#4ade80'});
            }
          }
          if(p.bounce>0){p.bounce--;p.dx=-p.dx+Math.random()-.5;p.dy=-p.dy+Math.random()-.5}
          else p.life=0;
        }
      });
    } else {
      const dx=p.x-player.x-6,dy=p.y-player.y-6;
      if(Math.abs(dx)<10&&Math.abs(dy)<10){hurtPlayer(p.dmg);p.life=0}
    }
    // Wall collision
    const tx=Math.floor(p.x/TS),ty=Math.floor(p.y/TS);
    if(tx<0||ty<0||tx>=map[0].length||ty>=map.length||!map[ty][tx]){
      if(p.bounce>0){p.bounce--;p.dx*=-1;p.dy*=-1}else p.life=0;
    }
  });
  projectiles=projectiles.filter(p=>p.life>0);

  // Enemy AI
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    e.flash=Math.max(0,(e.flash||0)-DT);
    e.atkCD=Math.max(0,e.atkCD-DT);
    e.timer+=DT;
    const dx=player.x-e.x,dy=player.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);

    if(e.isBoss){
      // Boss AI
      const spd=e.spd*TS*DT*2;
      if(dist>30){e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      e.summonCD-=DT;
      if(e.bossId==='gloria'){
        if(e.atkCD<=0&&dist<200){
          projectiles.push({x:e.x+16,y:e.y+16,dx:dx/dist*3.6,dy:dy/dist*3.6,dmg:e.atk,life:40,owner:'enemy',bounce:0,sz:4,color:'#f5deb3'});
          e.atkCD=1.2;
        }
        if(e.summonCD<=0){
          e.summonCD=6;
          for(let i=0;i<2;i++){
            enemies.push({x:e.x+(Math.random()-.5)*40,y:e.y+(Math.random()-.5)*40,type:ENEMY_TYPES[0],
              hp:10+floor*2,maxHp:10+floor*2,atk:2,spd:1,sz:12,disguised:false,timer:0,atkCD:0,dir:1,sinOff:0,isBoss:false,phase:0,summonCD:0,bossId:''});
          }
        }
      } else if(e.bossId==='wormking'){
        if(e.atkCD<=0){
          for(let a=0;a<6;a++){
            const ang=a*Math.PI/3+e.timer;
            projectiles.push({x:e.x+16,y:e.y+16,dx:Math.cos(ang)*3.0,dy:Math.sin(ang)*3.0,dmg:e.atk,life:35,owner:'enemy',bounce:0,sz:3,color:'#e879a0'});
          }
          e.atkCD=1.5;
        }
        if(e.summonCD<=0){
          e.summonCD=8;
          for(let i=0;i<3;i++){
            enemies.push({x:e.x+(Math.random()-.5)*50,y:e.y+(Math.random()-.5)*50,type:ENEMY_TYPES[7],
              hp:8+floor,maxHp:8+floor,atk:2,spd:1.2,sz:10,disguised:false,timer:0,atkCD:0,dir:1,sinOff:0,isBoss:false,phase:0,summonCD:0,bossId:'',type:{...ENEMY_TYPES[7],splits:false}});
          }
        }
      } else if(e.bossId==='champion'){
        if(e.atkCD<=0){
          const atkType=Math.floor(Math.random()*3);
          if(atkType===0){// ranged burst
            for(let a=0;a<8;a++){const ang=a*Math.PI/4;projectiles.push({x:e.x+16,y:e.y+16,dx:Math.cos(ang)*3.6,dy:Math.sin(ang)*3.6,dmg:e.atk,life:30,owner:'enemy',bounce:0,sz:4,color:'#ffd700'})}
          } else if(atkType===1){// charge
            e.x+=dx/dist*40;e.y+=dy/dist*40;
            if(dist<40)hurtPlayer(e.atk*2,e);shake=.2;
          } else {// heal
            e.hp=Math.min(e.maxHp,e.hp+Math.floor(e.maxHp*.05));
            floats.push({x:e.x,y:e.y-8,text:'HEAL',life:.8,color:'#4ade80'});
          }
          e.atkCD=1.8;
        }
      }
      return;
    }

    const ai=e.type.ai;
    // Enemy aggro indicator: show "!" when first noticing player
    const detectRange=ai==='swarm'?250:ai==='ranged'?180:200;
    if(!e.hasNoticed&&dist<detectRange){
      e.hasNoticed=true;
      aggroIndicators.push({x:e.x+e.sz/2,y:e.y-e.sz/2-6,life:0.3});
    }

    if(ai==='imposter'){
      if(e.disguised&&dist<50){e.disguised=false;e.flash=.3}
      if(!e.disguised&&dist<150){const spd=e.spd*TS*DT*2;e.x+=dx/dist*spd;e.y+=dy/dist*spd;
        if(dist<16&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.8}}
    } else if(ai==='chase'){
      if(dist<200){const spd=e.spd*TS*DT*2;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      if(dist<16&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.6}
    } else if(ai==='ranged'){
      if(dist<160){const spd=e.spd*TS*DT*1.5;
        if(dist>60){e.x+=dx/dist*spd;e.y+=dy/dist*spd}
        else if(dist<40){e.x-=dx/dist*spd;e.y-=dy/dist*spd}
      }
      if(dist<180&&e.atkCD<=0){
        projectiles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:dx/dist*3.0,dy:dy/dist*3.0,dmg:e.atk,life:30,owner:'enemy',bounce:0,sz:3,color:'#6f4e37'});
        e.atkCD=1.5;
      }
    } else if(ai==='zigzag'){
      if(dist<180){const spd=e.spd*TS*DT*2;const za=Math.sin(e.timer*6)*2;
        e.x+=dx/dist*spd+Math.cos(e.timer*8)*za*DT*TS;e.y+=dy/dist*spd+Math.sin(e.timer*8)*za*DT*TS}
      if(dist<16&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.5}
    } else if(ai==='teleport'){
      e.timer+=DT;
      if(dist<180){const spd=e.spd*TS*DT*2;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      if(e.timer>3){e.timer=0;
        const r=rooms[Math.floor(Math.random()*rooms.length)];
        e.x=(r.x+1+Math.random()*(r.w-2))*TS;e.y=(r.y+1+Math.random()*(r.h-2))*TS;
        for(let i=0;i<6;i++)particles.push({x:e.x+e.sz/2,y:e.y+e.sz/2,dx:(Math.random()-.5)*3,dy:(Math.random()-.5)*3,life:.3,color:'#8b5cf6',sz:2});
      }
      if(dist<16&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.7}
    } else if(ai==='sine'){
      if(dist<200){const spd=e.spd*TS*DT*2;
        e.x+=dx/dist*spd;e.y+=dy/dist*spd+Math.sin(e.timer*4+e.sinOff)*spd*.8}
      if(dist<14&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.6}
    } else if(ai==='blinker'){
      // Evil Nun: stalks slowly, blinks to player's side every 4s
      if(dist<200){const spd=e.spd*TS*DT*1.5;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      if(e.timer>0&&Math.floor(e.timer)%4===0&&Math.floor(e.timer-DT)%4!==0){
        // Blink! teleport near player
        const ang=Math.random()*Math.PI*2;
        e.x=player.x+Math.cos(ang)*30;e.y=player.y+Math.sin(ang)*30;
        for(let i=0;i<8;i++)particles.push({x:e.x+7,y:e.y+7,dx:(Math.random()-.5)*4,dy:(Math.random()-.5)*4,life:.4,color:'#ef4444',sz:2});
        snd('hurt');
      }
      if(dist<16&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.5}
    } else if(ai==='swarm'){
      // Ant: fast, beelines to player, tiny
      if(dist<250){const spd=e.spd*TS*DT*2.5;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      if(dist<10&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.3}
    } else if(ai==='orbiter'){
      // Katy Perry: orbits player at distance, shoots stars
      const orbitDist=80;
      if(dist>orbitDist+20){const spd=e.spd*TS*DT*2;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      else if(dist<orbitDist-10){const spd=e.spd*TS*DT*2;e.x-=dx/dist*spd;e.y-=dy/dist*spd}
      // Orbit sideways
      const perp={x:-dy/dist,y:dx/dist};
      e.x+=perp.x*e.spd*TS*DT*1.5;e.y+=perp.y*e.spd*TS*DT*1.5;
      if(e.atkCD<=0&&dist<160){
        // Shoot a star
        projectiles.push({x:e.x+7,y:e.y+7,dx:dx/dist*3.6,dy:dy/dist*3.6,dmg:e.atk,life:25,owner:'enemy',bounce:0,sz:4,color:'#ffd700'});
        e.atkCD=1.2;
      }
    } else if(ai==='web'){
      // Spider: chases, leaves web tiles that slow player
      if(dist<180){const spd=e.spd*TS*DT*2;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      // Leave web every 2s
      if(Math.floor(e.timer*2)!==Math.floor((e.timer-DT)*2)){
        slimes.push({x:e.x,y:e.y,life:8,color:'rgba(200,200,200,0.3)',slow:true});
      }
      if(dist<14&&e.atkCD<=0){hurtPlayer(e.atk,e);e.atkCD=.7}
    } else if(ai==='disco'){
      // Disco Ball: slow, shoots lasers in 4 rotating directions
      if(dist<120){const spd=e.spd*TS*DT;e.x+=dx/dist*spd;e.y+=dy/dist*spd}
      if(e.atkCD<=0){
        for(let a=0;a<4;a++){
          const ang=e.timer*2+a*Math.PI/2;
          projectiles.push({x:e.x+7,y:e.y+7,dx:Math.cos(ang)*3.0,dy:Math.sin(ang)*3.0,dmg:e.atk,life:20,owner:'enemy',bounce:0,sz:3,color:['#ef4444','#38bdf8','#4ade80','#ffd700'][a]});
        }
        e.atkCD=1.8;
      }
    }
  });
  enemies=enemies.filter(e=>e.hp>0);

  // Check exit — exit is always open
  if(exitOpen){
    const dx=player.x-exitX*TS,dy=player.y-exitY*TS;
    if(Math.sqrt(dx*dx+dy*dy)<14){
      if(floor>=15){win();return}
      floor++;checkUnlocks(floor);
      floorFadeAlpha=1;floorFadeDir=-1;
      setTimeout(()=>{loadFloor();floorFadeDir=1;
        floats.push({x:player.x,y:player.y-12,text:`Floor ${floor}`,life:1.2,color:'#4ade80'});
      },300);
      snd('stair');tileNoise={};
    }
  }

  // Auto-pickup chests/items/equipment/gold within 24px
  chests.forEach(ch=>{
    if(ch.open)return;
    const dx=player.x-ch.x,dy=player.y-ch.y;
    if(Math.sqrt(dx*dx+dy*dy)<24){
      ch.open=true;snd('item');
      if(ch.isEquip&&ch.equip){
        floats.push({x:ch.x,y:ch.y-8,text:ch.equip.name,life:1.2,color:ch.equip.rarityColor});
        tryEquip(ch.equip);
      } else if(ch.isItem&&ch.item){
        ch.item.apply(player);addItem(ch.item);
        floats.push({x:ch.x,y:ch.y-8,text:ch.item.name,life:1,color:'#ffd700'});
      } else {
        const r=Math.random();
        if(r<.3){// Gold — auto-collect
          const gm=player.goldMult||1;
          const g=Math.floor((5+Math.floor(Math.random()*floor*3))*gm);gold+=g;
          floats.push({x:ch.x,y:ch.y-8,text:`+${g}g`,life:.8,color:'#ffd700'});
        } else if(r<.6){// Equipment from chest — auto-equip if slot empty
          const eq=getRandomEquip(floor,player.luck);
          floats.push({x:ch.x,y:ch.y-8,text:eq.name,life:1.2,color:eq.rarityColor});
          tryEquip(eq);
        } else if(r<.8){// Legacy consumable item — auto-use
          const it=ITEMS[Math.floor(Math.random()*ITEMS.length)];
          it.apply(player);addItem(it);
          floats.push({x:ch.x,y:ch.y-8,text:it.name,life:1,color:'#4ade80'});
        } else {// HP — auto-heal
          const heal=Math.floor(player.maxHp*.3);player.hp=Math.min(player.maxHp,player.hp+heal);
          floats.push({x:ch.x,y:ch.y-8,text:`+${heal} HP`,life:.8,color:'#ff6b6b'});
        }
      }
    }
  });

  // Particles — with gravity control and spiral support
  particles.forEach(p=>{
    p.x+=p.dx;p.y+=p.dy;p.life-=DT;
    if(!p.noGrav)p.dy+=DT*2;
    if(p.spiral){p.dx+=Math.sin(p.life*10+p.spiralOff)*0.1}
  });
  particles=particles.filter(p=>p.life>0);

  // Floats — with scale pop and drift
  floats.forEach(f=>{
    f.y-=DT*30;f.life-=DT;
    if(f.scaleTimer!==undefined&&f.scaleTimer>0)f.scaleTimer-=DT;
  });
  floats=floats.filter(f=>f.life>0);

  // Shake
  if(shake>0){shake-=DT;shakeX=(Math.random()-.5)*shake*20;shakeY=(Math.random()-.5)*shake*20}
  else{shakeX=0;shakeY=0}

  // Camera with lookahead in movement direction
  const lookDir=getMoveDir();
  const lookaheadX=lookDir.x*30;const lookaheadY=lookDir.y*30;
  const tcx=player.x+8-W/2+lookaheadX,tcy=player.y+8-H/2+lookaheadY;
  camX+=(tcx-camX)*.08;camY+=(tcy-camY)*.08;

  // --- POLISH UPDATES ---
  // Player bob
  const moveSpd=Math.sqrt(lookDir.x*lookDir.x+lookDir.y*lookDir.y);
  prevPlayerSpeed=moveSpd;
  if(moveSpd>0.1)playerBobTime+=DT*8; else playerBobTime=0;
  // Trail particles when moving fast
  if(moveSpd>0.5&&Math.random()<0.3){
    particles.push({x:player.x+8+(Math.random()*4-2),y:player.y+14,dx:(Math.random()-.5)*.5,dy:Math.random()*0.3,life:.25,color:player.hero.color,sz:1});
  }
  // Squash/stretch timer
  if(playerScaleTimer>0){playerScaleTimer-=DT;if(playerScaleTimer<=0){playerScaleX=1;playerScaleY=1}}
  // Ghost HP bar
  if(ghostHp>player.hp)ghostHp-=DT*15;
  if(ghostHp<player.hp)ghostHp=player.hp;
  ghostHp=Math.max(0,ghostHp);
  // Vignette decay
  if(vignetteAlpha>0)vignetteAlpha=Math.max(0,vignetteAlpha-DT*3);
  // Level-up flash decay
  if(lvlFlashAlpha>0)lvlFlashAlpha=Math.max(0,lvlFlashAlpha-DT*1.5);
  // Floor fade
  if(floorFadeDir===-1&&floorFadeAlpha>0)floorFadeAlpha=Math.max(0,floorFadeAlpha-DT*3);
  if(floorFadeDir===1&&floorFadeAlpha>0){floorFadeAlpha=Math.max(0,floorFadeAlpha-DT*2);if(floorFadeAlpha<=0)floorFadeDir=0}
  // DPS tracker
  dpsTracker.timer+=DT;
  if(dpsTracker.timer>=1){dpsTracker.dps=Math.floor(dpsTracker.dmg/dpsTracker.timer);dpsTracker.dmg=0;dpsTracker.timer=0}
  // Combo kill timer
  if(comboKills.timer>0){comboKills.timer-=DT;if(comboKills.timer<=0)comboKills.count=0}
  // Combo display decay
  if(comboDisplayLife>0)comboDisplayLife-=DT;
  // Heartbeat when low HP
  if(player.hp>0&&player.hp/player.maxHp<0.25){heartbeatCD-=DT;if(heartbeatCD<=0){snd('heartbeat');heartbeatCD=1.2}}
  // Boss entrance with full drama
  if(bossActive&&!bossEntrancePlayed){
    bossEntrancePlayed=true;snd('bossdrum');
    shake=0.4;
    flashScreen('rgba(200,0,0,0.7)',0.5);
    bossZoom=1;bossTextLife=2;
  }
  if(!bossActive)bossEntrancePlayed=false;
  if(bossZoom>0)bossZoom=Math.max(0,bossZoom-DT*1);
  if(bossTextLife>0)bossTextLife-=DT;
  // Aggro indicators decay
  aggroIndicators.forEach(a=>{a.life-=DT});
  aggroIndicators=aggroIndicators.filter(a=>a.life>0);
  // Ambient dust — tiny white motes floating
  if(ambientDust.length<20&&Math.random()<0.08){
    ambientDust.push({x:camX+Math.random()*W,y:camY+Math.random()*H,dx:(Math.random()-.5)*0.2,dy:(Math.random()-.5)*0.15,life:4+Math.random()*4,maxLife:4+Math.random()*4,sz:0.8+Math.random()*0.5});
  }
  ambientDust.forEach(d=>{d.x+=d.dx;d.y+=d.dy;d.dx+=Math.sin(d.life*2)*0.01;d.life-=DT});
  ambientDust=ambientDust.filter(d=>d.life>0);
  // XP sparkles
  xpSparkles.forEach(s=>{s.life-=DT});xpSparkles=xpSparkles.filter(s=>s.life>0);
  // Exit sparkle particles when open
  if(exitOpen&&Math.random()<0.2){
    particles.push({x:exitX*TS+Math.random()*TS,y:exitY*TS+TS,dx:(Math.random()-.5)*0.5,dy:-1-Math.random()*1.5,life:.6+Math.random()*.4,color:Math.random()>.5?'#4ade80':'#22c55e',sz:1+Math.random(),noGrav:true,isStar:true});
  }

  // HUD
  const hpPct=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('hp-fill').style.width=hpPct+'%';
  document.getElementById('hp-ghost').style.width=Math.max(0,ghostHp/player.maxHp*100)+'%';
  document.getElementById('hp-text').textContent=`${Math.max(0,player.hp)}/${player.maxHp}`;
  document.getElementById('xp-fill').style.width=(player.xp/player.xpNext*100)+'%';
  document.getElementById('level-text').textContent=`Lv${player.level}`;
  document.getElementById('floor-text').textContent=`F${floor}`;
  const goldEl=document.getElementById('gold-text');
  if(gold!==lastGold){goldEl.textContent=`${gold}g`;goldEl.classList.remove('gold-bounce');void goldEl.offsetWidth;goldEl.classList.add('gold-bounce');lastGold=gold}
  document.getElementById('dps-text').textContent=dpsTracker.dps>0?`${dpsTracker.dps} DPS`:'';
  if(activePet){const pet=PETS.find(p=>p.id===activePet);document.getElementById('pet-icon').textContent=pet?pet.emoji:''}
  else{document.getElementById('pet-icon').textContent=''}
}

// Render
function render(){
  resize();
  X.fillStyle='#0a0a0f';X.fillRect(0,0,W,H);
  if(!map||!player||gameState==='menu'||gameState==='dead'||gameState==='win')return;

  X.save();
  // Boss entrance zoom effect
  const zoomScale=1-bossZoom*0.1;
  if(bossZoom>0){
    X.translate(W/2,H/2);X.scale(zoomScale,zoomScale);X.translate(-W/2,-H/2);
  }
  X.translate(-camX+shakeX,-camY+shakeY);

  // Draw map
  const sx=Math.max(0,Math.floor(camX/TS)-1),sy=Math.max(0,Math.floor(camY/TS)-1);
  const ex=Math.min(map[0].length,Math.ceil((camX+W)/TS)+1),ey=Math.min(map.length,Math.ceil((camY+H)/TS)+1);
  for(let y=sy;y<ey;y++){
    for(let x=sx;x<ex;x++){
      const t=map[y][x];
      if(t===0){
        let adjFloor=false;
        if(y+1<map.length&&map[y+1][x])adjFloor=true;
        if(adjFloor){X.fillStyle='#3a3a48';X.fillRect(x*TS,y*TS,TS,TS);X.fillStyle='#303040';X.fillRect(x*TS,y*TS+12,TS,4)}
        else{X.fillStyle='#22222e';X.fillRect(x*TS,y*TS,TS,TS)}
      } else if(t===1||t===2){
        X.fillStyle=t===1?'#444450':'#3a3a48';X.fillRect(x*TS,y*TS,TS,TS);
        if((x+y)%4===0){X.fillStyle='rgba(255,255,255,.03)';X.fillRect(x*TS,y*TS,TS,TS)}
        X.fillStyle='rgba(0,0,0,.15)';X.fillRect(x*TS,y*TS,TS,1);X.fillRect(x*TS,y*TS,1,TS);
      } else if(t===3){
        if(exitOpen){
          X.fillStyle='#1a4a2a';X.fillRect(x*TS,y*TS,TS,TS);
          // Pulsing radial glow for exit
          const glow=Math.sin(Date.now()/300)*.3+.7;
          const exitGrad=X.createRadialGradient(x*TS+TS/2,y*TS+TS/2,2,x*TS+TS/2,y*TS+TS/2,TS*1.5);
          exitGrad.addColorStop(0,`rgba(74,222,128,${glow*0.5})`);
          exitGrad.addColorStop(1,'transparent');
          X.fillStyle=exitGrad;X.fillRect(x*TS-TS,y*TS-TS,TS*3,TS*3);
          X.fillStyle='#4ade80';X.fillRect(x*TS+4,y*TS+4,8,8);
          X.fillStyle='#22c55e';X.fillRect(x*TS+6,y*TS+2,4,2);
        } else {
          X.fillStyle='#33333d';X.fillRect(x*TS,y*TS,TS,TS);
          X.fillStyle='#444';X.fillRect(x*TS+5,y*TS+5,6,6);
        }
      }
    }
  }

  // Room lighting — subtle radial light in room centers
  if(rooms){
    rooms.forEach(r=>{
      const rcx=r.cx*TS,rcy=r.cy*TS;
      const rad=Math.max(r.w,r.h)*TS*0.7;
      const lg=X.createRadialGradient(rcx,rcy,0,rcx,rcy,rad);
      lg.addColorStop(0,'rgba(255,255,255,0.025)');
      lg.addColorStop(1,'transparent');
      X.fillStyle=lg;X.fillRect(rcx-rad,rcy-rad,rad*2,rad*2);
    });
  }

  // Ambient dust motes
  ambientDust.forEach(d=>{
    const a=Math.min(1,d.life/d.maxLife)*0.25;
    X.globalAlpha=a;X.fillStyle='#fff';
    X.beginPath();X.arc(d.x,d.y,d.sz,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;

  // Slimes
  slimes.forEach(s=>{
    X.globalAlpha=s.life/3*.5;X.fillStyle='#a0e860';X.fillRect(s.x-3,s.y-2,6,4);X.globalAlpha=1;
  });

  // Chests — with golden glow underneath
  chests.forEach(ch=>{
    if(ch.open){X.fillStyle='#555';X.fillRect(ch.x-4,ch.y-3,8,6)}
    else if(ch.isEquip&&ch.equip){
      const eq=ch.equip;
      const glow=Math.sin(Date.now()/300)*.3+.7;
      // Radial glow
      const cg=X.createRadialGradient(ch.x,ch.y,2,ch.x,ch.y,14);
      cg.addColorStop(0,eq.rarityColor);cg.addColorStop(1,'transparent');
      X.globalAlpha=glow*0.3;X.fillStyle=cg;X.fillRect(ch.x-14,ch.y-14,28,28);X.globalAlpha=1;
      X.fillStyle='#b8860b';X.fillRect(ch.x-5,ch.y-4,10,8);X.fillStyle=eq.rarityColor;X.fillRect(ch.x-4,ch.y-3,8,6);
      X.fillStyle='#fff';X.fillRect(ch.x-1,ch.y-1,2,2);
      X.fillStyle=eq.rarityColor;X.font='bold 6px monospace';X.textAlign='center';
      X.fillText(eq.emoji,ch.x,ch.y-7);
    } else {
      const glow=Math.sin(Date.now()/400)*.2+.8;
      // Golden radial glow underneath
      const cg=X.createRadialGradient(ch.x,ch.y,2,ch.x,ch.y,12);
      cg.addColorStop(0,'rgba(255,215,0,0.3)');cg.addColorStop(1,'transparent');
      X.fillStyle=cg;X.globalAlpha=glow;X.fillRect(ch.x-12,ch.y-12,24,24);X.globalAlpha=1;
      X.fillStyle='#b8860b';X.fillRect(ch.x-5,ch.y-4,10,8);X.fillStyle='#daa520';X.fillRect(ch.x-4,ch.y-3,8,6);
      X.fillStyle='#ffd700';X.fillRect(ch.x-1,ch.y-1,2,2);
    }
  });

  // Ambient dust
  ambientDust.forEach(d=>{
    X.globalAlpha=(d.life/d.maxLife)*0.12;X.fillStyle='#888';X.fillRect(d.x,d.y,d.sz,d.sz);
  });
  X.globalAlpha=1;

  // Enemies with bob, glow, better HP bars
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    const eBob=Math.sin(now/500+e.sinOff)*1.5;
    const eDrawX=e.x-e.sz/2;const eDrawY=e.y-e.sz/2+eBob;
    // Elite glow on later floors
    if(floor>=5&&!e.isBoss){
      X.save();X.shadowColor=e.type.color;X.shadowBlur=6+Math.sin(now/400+e.sinOff)*3;
      X.globalAlpha=0.5;X.fillStyle=e.type.color;X.fillRect(eDrawX-2,eDrawY-2,e.sz+4,e.sz+4);
      X.restore();X.globalAlpha=1;
    }
    // Damage flash (red overlay)
    if(e.flash>0){
      X.globalAlpha=0.3+Math.sin(now/30)*0.3;
      X.fillStyle='#ff0000';X.fillRect(eDrawX-1,eDrawY-1,e.sz+2,e.sz+2);
      X.globalAlpha=1;
    }
    if(e.isBoss){drawBoss(X,e,e.x-8,e.y-8+eBob)}
    else{drawPixelEnemy(X,e,eDrawX,eDrawY)}
    X.globalAlpha=1;
    // Wider HP bar with gradient
    if(e.hp<e.maxHp){
      const bw=e.isBoss?36:(e.sz+6);const hpPct=e.hp/e.maxHp;
      const barX=e.x-bw/2;const barY=e.y-e.sz/2-7+eBob;
      X.fillStyle='#222';X.fillRect(barX-1,barY-1,bw+2,6);
      const gr=X.createLinearGradient(barX,0,barX+bw*hpPct,0);
      gr.addColorStop(0,'#e74c3c');gr.addColorStop(1,hpPct>0.5?'#4ade80':'#f39c12');
      X.fillStyle=gr;X.fillRect(barX,barY,bw*hpPct,4);
    }
  });

  // Aggro indicators — "!" above enemies
  aggroIndicators.forEach(a=>{
    const alpha=Math.min(1,a.life*4);
    X.globalAlpha=alpha;X.fillStyle='#ef4444';X.font='bold 10px monospace';X.textAlign='center';
    X.fillText('!',a.x,a.y);
  });
  X.globalAlpha=1;

  // Player shadow
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();
  X.ellipse(player.x+8,player.y+16,6,3,0,0,Math.PI*2);
  X.fill();

  // Player with bob + squash/stretch
  const bobY=playerBobTime>0?Math.sin(playerBobTime)*1.5:0;
  if(player.flash>0){X.globalAlpha=.4+Math.sin(Date.now()/20)*.6}
  if(player.invTime>0||player.blockActive>0){X.globalAlpha=.6+Math.sin(Date.now()/60)*.3;
    X.fillStyle=player.blockActive>0?'rgba(100,180,255,.2)':'rgba(255,255,100,.15)';X.fillRect(player.x-4,player.y-4,24,24)}
  // Apply squash/stretch transform
  X.save();
  X.translate(player.x+8,player.y+8+bobY);
  X.scale(playerScaleX,playerScaleY);
  X.translate(-8,-8);
  drawPixelHero(X,player.hero.id,0,0,16,player.facing.x>=0?1:-1);
  X.restore();
  X.globalAlpha=1;
  // Draw pet next to player
  if(activePet){
    const pet=PETS.find(p=>p.id===activePet);
    if(pet){
      const petOff=Math.sin(Date.now()/400)*2;
      X.font='10px sans-serif';X.textAlign='center';
      X.fillText(pet.emoji,player.x+20,player.y+6+petOff);
    }
  }

  // Aim crosshair
  if(mouseAiming&&gameState==='play'){
    const ax=aimX+camX,ay=aimY+camY;
    X.strokeStyle='rgba(255,255,255,.4)';X.lineWidth=1;
    X.beginPath();X.arc(ax,ay,6,0,Math.PI*2);X.stroke();
    X.beginPath();X.moveTo(ax-10,ay);X.lineTo(ax+10,ay);X.moveTo(ax,ay-10);X.lineTo(ax,ay+10);X.stroke();
    X.strokeStyle='rgba(255,255,255,.1)';X.setLineDash([4,4]);
    X.beginPath();X.moveTo(player.x+8,player.y+8);X.lineTo(ax,ay);X.stroke();
    X.setLineDash([]);
  }

  // Projectiles with trails
  projectiles.forEach(p=>{
    // Draw trail
    if(p.trail&&p.trail.length>0){
      p.trail.forEach((t,i)=>{
        const a=i/p.trail.length*0.3;
        X.globalAlpha=a;
        X.fillStyle=p.color||'#fff';
        X.beginPath();
        X.arc(t.x,t.y,p.sz*(i/p.trail.length)*0.7,0,Math.PI*2);
        X.fill();
      });
      X.globalAlpha=1;
    }
    // Draw main projectile
    X.fillStyle=p.color||'#fff';
    X.beginPath();
    X.arc(p.x,p.y,p.sz/2,0,Math.PI*2);
    X.fill();
  });

  // Particles — with variety
  particles.forEach(p=>{
    X.globalAlpha=Math.min(1,p.life*2);X.fillStyle=p.color;
    if(p.isStar){
      // Star-shaped: draw a small + shape
      const s=p.sz;
      X.fillRect(p.x-s/2,p.y-0.5,s,1);
      X.fillRect(p.x-0.5,p.y-s/2,1,s);
    } else {
      X.beginPath();X.arc(p.x,p.y,p.sz/2,0,Math.PI*2);X.fill();
    }
  });
  X.globalAlpha=1;

  // Floats — with scale animation and drift
  floats.forEach(f=>{
    X.globalAlpha=Math.min(1,f.life*2);X.fillStyle=f.color;
    // Scale pop animation
    let scale=1;
    if(f.scaleTimer!==undefined&&f.scaleTimer>0){
      const t=1-f.scaleTimer/0.15;
      if(t<0.5)scale=0.5+t*1.4; // 0.5 -> 1.2
      else scale=1.2-(t-0.5)*0.4; // 1.2 -> 1.0
    } else if(f.scale!==undefined){scale=1}
    const fontSize=f.big?14:10;
    X.font=`bold ${Math.round(fontSize*scale)}px monospace`;X.textAlign='center';
    const driftOff=f.driftX?f.driftX*(1-f.life):0;
    X.fillText(f.text,f.x+8+driftOff,f.y);
  });
  X.globalAlpha=1;

  X.restore();

  // --- SCREEN-SPACE OVERLAYS ---

  // Vignette / screen flash
  if(vignetteAlpha>0){
    const grad=X.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
    grad.addColorStop(0,'transparent');
    grad.addColorStop(1,vignetteColor);
    X.globalAlpha=vignetteAlpha;
    X.fillStyle=grad;
    X.fillRect(0,0,W,H);
    X.globalAlpha=1;
  }

  // Level-up flash
  if(lvlFlashAlpha>0){
    X.globalAlpha=lvlFlashAlpha*0.3;
    X.fillStyle='#ffd700';X.fillRect(0,0,W,H);
    X.globalAlpha=1;
  }

  // Floor transition fade
  if(floorFadeAlpha>0){
    X.globalAlpha=floorFadeAlpha;
    X.fillStyle='#0a0a0f';X.fillRect(0,0,W,H);
    X.globalAlpha=1;
  }

  // Boss entrance text
  if(bossTextLife>0){
    const alpha=Math.min(1,bossTextLife*2);
    X.globalAlpha=alpha;
    X.fillStyle='#ff4444';
    X.font='bold 48px monospace';X.textAlign='center';
    X.fillText('BOSS!',W/2,H/2);
    X.globalAlpha=1;
  }

  // Kill combo display
  if(comboDisplayLife>0){
    const alpha=Math.min(1,comboDisplayLife*2);
    const scale=1+Math.sin(comboDisplayLife*8)*0.1;
    X.globalAlpha=alpha;
    X.fillStyle='#ff9f1c';
    X.font=`bold ${Math.round(24*scale)}px monospace`;X.textAlign='center';
    X.fillText(comboDisplayText,W/2,H*0.35);
    X.globalAlpha=1;
  }

  // Minimap
  renderMinimap();
}

function renderMinimap(){
  if(!map)return;
  const mw=120,mh=90,sc=Math.min(mw/(map[0]?map[0].length:30),mh/(map?map.length:24));
  MX.fillStyle='rgba(0,0,0,.7)';MX.fillRect(0,0,mw,mh);
  // Pet mapReveal: show all rooms
  const revealAll=activePet&&PETS.find(p=>p.id===activePet)?.bonus?.mapReveal;
  for(let y=0;y<map.length;y++){
    for(let x=0;x<map[0].length;x++){
      if(map[y][x]){
        MX.fillStyle=map[y][x]===3&&exitOpen?'#4ade80':'#444';
        MX.fillRect(x*sc,y*sc,Math.max(1,sc),Math.max(1,sc));
      } else if(revealAll){
        // Show walls faintly
        let adjFloor=false;
        if(y>0&&map[y-1][x])adjFloor=true;
        if(y<map.length-1&&map[y+1][x])adjFloor=true;
        if(x>0&&map[y][x-1])adjFloor=true;
        if(x<map[0].length-1&&map[y][x+1])adjFloor=true;
        if(adjFloor){MX.fillStyle='#222';MX.fillRect(x*sc,y*sc,Math.max(1,sc),Math.max(1,sc))}
      }
    }
  }
  // Player on minimap
  MX.fillStyle='#4ade80';
  MX.fillRect(player.x/TS*sc-1,player.y/TS*sc-1,3,3);
  // Enemies on minimap
  enemies.forEach(e=>{
    if(e.hp>0){MX.fillStyle=e.isBoss?'#ff4444':'#ff6b35';MX.fillRect(e.x/TS*sc,e.y/TS*sc,2,2)}
  });
}

// Main loop
function loop(t){
  const dt=(t-LT)/1000;LT=t;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// Init
showMenu();
requestAnimationFrame(loop);
</script>
</body>
