<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dewey's Workout Journal</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --card: #1e2746;
  --card-hover: #253050;
  --text: #e8e8f0;
  --text2: #a0a0b8;
  --accent: #ff6b6b;
  --accent2: #ff8a5c;
  --green: #4ecdc4;
  --blue: #5b9bd5;
  --purple: #a06cd5;
  --yellow: #f7d354;
  --shadow: rgba(0,0,0,0.3);
  --radius: 14px;
  --nav-h: 64px;
}
.light {
  --bg: #f0f2f5;
  --bg2: #e4e7ec;
  --bg3: #d0d4dc;
  --card: #ffffff;
  --card-hover: #f5f5fa;
  --text: #1a1a2e;
  --text2: #5a5a72;
  --shadow: rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + 16px);
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}
#back {
  position: fixed; top: 12px; left: 12px; z-index: 100;
  color: var(--text2); text-decoration: none; font-size: 14px;
  background: var(--card); padding: 6px 12px; border-radius: 8px;
  box-shadow: 0 2px 8px var(--shadow);
}
#back:hover { color: var(--accent); }
.header {
  text-align: center; padding: 18px 16px 10px; position: relative;
}
.header h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* Views */
.view { display: none; padding: 8px 16px 16px; animation: fadeIn .25s; }
.view.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* Bottom Nav */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nav-h); background: var(--bg2);
  display: flex; align-items: center; justify-content: space-around;
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 90; padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav button {
  background: none; border: none; color: var(--text2);
  font-size: 11px; cursor: pointer; display: flex;
  flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 10px; border-radius: 10px; transition: .2s;
  min-width: 52px;
}
.nav button .icon { font-size: 22px; }
.nav button.active { color: var(--accent); }
.nav button:active { transform: scale(0.92); }

/* Quick Log Buttons */
.quick-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-top: 12px;
}
.quick-btn {
  background: var(--card); border: 2px solid transparent;
  border-radius: var(--radius); padding: 20px 12px;
  cursor: pointer; text-align: center; transition: .2s;
  box-shadow: 0 2px 12px var(--shadow);
}
.quick-btn:active { transform: scale(0.96); }
.quick-btn:hover { border-color: var(--accent); background: var(--card-hover); }
.quick-btn .qicon { font-size: 32px; display: block; margin-bottom: 8px; }
.quick-btn .qlabel { font-size: 14px; font-weight: 600; color: var(--text); }
.quick-btn.full { grid-column: 1 / -1; }

/* Form */
.form-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-top: 12px; box-shadow: 0 2px 12px var(--shadow);
}
.form-card h3 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); background: var(--bg);
  color: var(--text); font-size: 15px; outline: none; transition: .2s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 60px; font-family: inherit; }
.autocomplete-wrap { position: relative; }
.autocomplete-list {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
  background: var(--bg2); border-radius: 8px; margin-top: 4px;
  box-shadow: 0 4px 16px var(--shadow); overflow: hidden; display: none;
}
.autocomplete-list div {
  padding: 10px 12px; cursor: pointer; font-size: 14px; transition: .15s;
}
.autocomplete-list div:hover, .autocomplete-list div.sel { background: var(--card-hover); color: var(--accent); }

.toggle-row {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.toggle-btn {
  flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: var(--bg); color: var(--text2); cursor: pointer;
  font-size: 13px; font-weight: 600; text-align: center; transition: .2s;
}
.toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.row { display: flex; gap: 10px; }
.row .field { flex: 1; }

.intensity-row { display: flex; gap: 8px; }
.intensity-btn {
  flex: 1; padding: 10px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: var(--bg); color: var(--text2); cursor: pointer;
  font-size: 12px; font-weight: 600; text-align: center; transition: .2s;
}
.intensity-btn.active { color: #fff; }
.intensity-btn[data-v="easy"].active { background: var(--green); border-color: var(--green); }
.intensity-btn[data-v="medium"].active { background: var(--blue); border-color: var(--blue); }
.intensity-btn[data-v="hard"].active { background: var(--accent); border-color: var(--accent); }
.intensity-btn[data-v="max"].active { background: var(--purple); border-color: var(--purple); }

.exercise-list { margin: 12px 0; }
.exercise-item {
  background: var(--bg); border-radius: 8px; padding: 10px 12px;
  margin-bottom: 8px; display: flex; justify-content: space-between;
  align-items: center; font-size: 14px;
}
.exercise-item .ex-info { flex: 1; }
.exercise-item .ex-name { font-weight: 600; }
.exercise-item .ex-detail { color: var(--text2); font-size: 12px; margin-top: 2px; }
.exercise-item .ex-del {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 18px; padding: 4px 8px; border-radius: 6px;
}
.exercise-item .ex-del:hover { color: var(--accent); }

.btn {
  display: block; width: 100%; padding: 14px; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: .2s; text-align: center;
}
.btn:active { transform: scale(0.97); }
.btn-accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.btn-accent:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--bg); color: var(--text); margin-top: 8px; }
.btn-secondary:hover { background: var(--card-hover); }
.btn-small { display: inline-block; width: auto; padding: 8px 16px; font-size: 13px; margin-top: 10px; }

/* Today / History cards */
.day-group { margin-bottom: 20px; }
.day-label {
  font-size: 14px; font-weight: 700; color: var(--text2);
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.workout-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 10px; cursor: pointer;
  box-shadow: 0 2px 8px var(--shadow); transition: .2s;
}
.workout-card:hover { background: var(--card-hover); }
.workout-card .wc-header { display: flex; align-items: center; gap: 10px; }
.workout-card .wc-icon { font-size: 24px; }
.workout-card .wc-title { font-weight: 600; font-size: 15px; flex: 1; }
.workout-card .wc-meta { font-size: 12px; color: var(--text2); }
.workout-card .wc-details {
  margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 13px; color: var(--text2); display: none;
}
.workout-card .wc-details.open { display: block; }
.workout-card .wc-details .ex-line { padding: 3px 0; }
.workout-card .wc-notes { font-style: italic; margin-top: 6px; color: var(--text2); font-size: 12px; }
.workout-card .wc-delete {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 12px; padding: 4px 8px; border-radius: 6px; margin-top: 8px;
}
.workout-card .wc-delete:hover { color: var(--accent); }
.intensity-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; color: #fff; margin-left: 6px;
}
.intensity-badge.easy { background: var(--green); }
.intensity-badge.medium { background: var(--blue); }
.intensity-badge.hard { background: var(--accent); }
.intensity-badge.max { background: var(--purple); }

.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px;
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

/* Stats */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  text-align: center; box-shadow: 0 2px 8px var(--shadow);
}
.stat-card .stat-val { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-card .stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
.stat-card.wide { grid-column: 1 / -1; }
.pr-list { margin-top: 8px; }
.pr-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
.pr-item .pr-name { color: var(--text); }
.pr-item .pr-val { color: var(--accent); font-weight: 700; }
.chart-wrap {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-top: 12px; box-shadow: 0 2px 8px var(--shadow);
}
.chart-wrap h4 { font-size: 14px; margin-bottom: 10px; color: var(--text2); }
canvas#statsChart { width: 100%; height: 160px; display: block; }

/* Dewey */
.dewey-section { text-align: center; padding: 10px 0; }
canvas#deweyCanvas { display: block; margin: 0 auto; border-radius: 16px; }
.dewey-msg {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-top: 14px; font-size: 15px; box-shadow: 0 2px 8px var(--shadow);
  line-height: 1.5;
}
.dewey-quote {
  background: var(--card); border-radius: var(--radius); padding: 14px;
  margin-top: 10px; font-size: 13px; color: var(--text2);
  font-style: italic; box-shadow: 0 2px 8px var(--shadow);
}

/* Settings */
.settings-group {
  background: var(--card); border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px; box-shadow: 0 2px 8px var(--shadow);
}
.settings-group h4 { font-size: 13px; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.setting-row:last-child { border: none; }
.setting-row label { font-size: 14px; }
.setting-row input[type="text"] {
  background: var(--bg); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 8px 10px; color: var(--text);
  font-size: 14px; width: 140px; text-align: right; outline: none;
}
.setting-row input[type="text"]:focus { border-color: var(--accent); }

/* Confetti */
.confetti-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 200; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 8px; height: 8px;
  animation: confettiFall 1.5s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
}

/* Save animation */
.save-check {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 64px; z-index: 200; animation: checkPop .6s ease-out forwards;
  pointer-events: none;
}
@keyframes checkPop {
  0% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
  50% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 0; }
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
</style>
</head>
<body>
<a href="games.html" id="back">&larr; games</a>

<div class="header">
  <h1>Dewey's Workout Journal</h1>
  <div class="sub" id="headerSub">Keira's fitness tracker</div>
</div>

<!-- LOG VIEW -->
<div class="view active" id="viewLog">
  <div id="quickButtons">
    <div class="quick-grid">
      <div class="quick-btn" onclick="openForm('strength')">
        <span class="qicon">&#127947;&#65039;</span>
        <span class="qlabel">Strength</span>
      </div>
      <div class="quick-btn" onclick="openForm('cardio')">
        <span class="qicon">&#127939;</span>
        <span class="qlabel">Cardio</span>
      </div>
      <div class="quick-btn" onclick="openForm('flexibility')">
        <span class="qicon">&#129336;</span>
        <span class="qlabel">Flexibility</span>
      </div>
      <div class="quick-btn" onclick="openForm('sports')">
        <span class="qicon">&#9917;</span>
        <span class="qlabel">Sports</span>
      </div>
      <div class="quick-btn full" onclick="openForm('other')">
        <span class="qicon">&#11088;</span>
        <span class="qlabel">Other</span>
      </div>
    </div>
  </div>

  <div id="logForm" style="display:none;">
    <div class="form-card">
      <h3 id="formTitle">Log Strength Workout</h3>

      <div class="field">
        <label>Exercise Name</label>
        <div class="autocomplete-wrap">
          <input type="text" id="exName" placeholder="e.g. Squats" autocomplete="off">
          <div class="autocomplete-list" id="acList"></div>
        </div>
      </div>

      <div class="toggle-row">
        <button class="toggle-btn active" id="togSets" onclick="setMode('sets')">Sets &times; Reps</button>
        <button class="toggle-btn" id="togDur" onclick="setMode('duration')">Duration</button>
      </div>

      <div id="setsFields">
        <div class="row">
          <div class="field"><label>Sets</label><input type="number" id="exSets" min="1" value="3"></div>
          <div class="field"><label>Reps</label><input type="number" id="exReps" min="1" value="10"></div>
        </div>
        <div class="row">
          <div class="field"><label>Weight (optional)</label><input type="number" id="exWeight" min="0" placeholder="0"></div>
          <div class="field"><label>Unit</label>
            <div class="toggle-row" style="margin:0">
              <button class="toggle-btn active" id="togLb" onclick="setUnit('lb')" style="padding:8px">lb</button>
              <button class="toggle-btn" id="togKg" onclick="setUnit('kg')" style="padding:8px">kg</button>
            </div>
          </div>
        </div>
      </div>

      <div id="durFields" style="display:none;">
        <div class="field"><label>Duration (minutes)</label><input type="number" id="exDuration" min="1" value="30"></div>
      </div>

      <div class="field">
        <label>Intensity</label>
        <div class="intensity-row">
          <button class="intensity-btn" data-v="easy" onclick="setIntensity('easy')">Easy</button>
          <button class="intensity-btn active" data-v="medium" onclick="setIntensity('medium')">Medium</button>
          <button class="intensity-btn" data-v="hard" onclick="setIntensity('hard')">Hard</button>
          <button class="intensity-btn" data-v="max" onclick="setIntensity('max')">Max</button>
        </div>
      </div>

      <div class="exercise-list" id="exerciseList"></div>

      <button class="btn btn-secondary" onclick="addExercise()">+ Add Exercise</button>

      <div class="field" style="margin-top:14px;">
        <label>Duration (total minutes)</label>
        <input type="number" id="totalDuration" min="1" value="30">
      </div>

      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="wNotes" placeholder="How did it feel?"></textarea>
      </div>

      <button class="btn btn-accent" onclick="saveWorkout()">Save Workout</button>
      <button class="btn btn-secondary" onclick="cancelForm()">Cancel</button>
    </div>
  </div>
</div>

<!-- TODAY VIEW -->
<div class="view" id="viewToday"></div>

<!-- HISTORY VIEW -->
<div class="view" id="viewHistory"></div>

<!-- STATS VIEW -->
<div class="view" id="viewStats"></div>

<!-- DEWEY VIEW -->
<div class="view" id="viewDewey">
  <div class="dewey-section">
    <canvas id="deweyCanvas" width="280" height="280"></canvas>
    <div class="dewey-msg" id="deweyMsg"></div>
    <div class="dewey-quote" id="deweyQuote"></div>
  </div>
</div>

<!-- SETTINGS VIEW (accessible from Dewey) -->
<div class="view" id="viewSettings">
  <div class="settings-group">
    <h4>Profile</h4>
    <div class="setting-row">
      <label>Name</label>
      <input type="text" id="setName" value="Keira" onchange="updateSetting('name',this.value)">
    </div>
  </div>
  <div class="settings-group">
    <h4>Preferences</h4>
    <div class="setting-row">
      <label>Default Unit</label>
      <div class="toggle-row" style="margin:0;width:120px">
        <button class="toggle-btn active" id="setPrefLb" onclick="updateSetting('units','lb')" style="padding:8px;font-size:13px">lb</button>
        <button class="toggle-btn" id="setPrefKg" onclick="updateSetting('units','kg')" style="padding:8px;font-size:13px">kg</button>
      </div>
    </div>
    <div class="setting-row">
      <label>Theme</label>
      <div class="toggle-row" style="margin:0;width:140px">
        <button class="toggle-btn active" id="setDark" onclick="updateSetting('theme','dark')" style="padding:8px;font-size:13px">Dark</button>
        <button class="toggle-btn" id="setLight" onclick="updateSetting('theme','light')" style="padding:8px;font-size:13px">Light</button>
      </div>
    </div>
  </div>
  <div class="settings-group">
    <h4>Data</h4>
    <button class="btn btn-secondary btn-small" onclick="exportData()">Export JSON</button>
    <button class="btn btn-secondary btn-small" style="color:var(--accent)" onclick="clearData()">Clear All Data</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="active" onclick="showView('Log')" id="navLog"><span class="icon">&#10133;</span>Log</button>
  <button onclick="showView('Today')" id="navToday"><span class="icon">&#128197;</span>Today</button>
  <button onclick="showView('History')" id="navHistory"><span class="icon">&#128214;</span>History</button>
  <button onclick="showView('Stats')" id="navStats"><span class="icon">&#128200;</span>Stats</button>
  <button onclick="showView('Dewey')" id="navDewey"><span class="icon">&#128054;</span>Dewey</button>
</nav>

<script>
// ==================== DATA ====================
const STORE_KEY = 'deweyWorkoutJournal';
let data = loadData();

function defaultData() {
  const today = fmtDate(new Date());
  const yesterday = fmtDate(new Date(Date.now() - 86400000));
  const twoDaysAgo = fmtDate(new Date(Date.now() - 172800000));
  return {
    workouts: [
      {
        id: Date.now() - 200000000, date: twoDaysAgo, type: 'strength',
        exercises: [
          { name: 'Squats', sets: 4, reps: 12, weight: 95, unit: 'lb' },
          { name: 'Lunges', sets: 3, reps: 15, weight: 0, unit: 'lb' },
          { name: 'Leg Press', sets: 3, reps: 10, weight: 180, unit: 'lb' }
        ],
        intensity: 'hard', duration: 50, notes: 'Leg day! Felt strong.'
      },
      {
        id: Date.now() - 150000000, date: yesterday, type: 'cardio',
        exercises: [{ name: 'Running', duration: 35 }],
        intensity: 'medium', duration: 35, notes: 'Easy morning run.'
      },
      {
        id: Date.now() - 100000000, date: yesterday, type: 'strength',
        exercises: [
          { name: 'Bench Press', sets: 4, reps: 8, weight: 115, unit: 'lb' },
          { name: 'Overhead Press', sets: 3, reps: 10, weight: 65, unit: 'lb' },
          { name: 'Dumbbell Rows', sets: 3, reps: 12, weight: 40, unit: 'lb' },
          { name: 'Tricep Dips', sets: 3, reps: 15, weight: 0, unit: 'lb' }
        ],
        intensity: 'hard', duration: 55, notes: 'Upper body push/pull.'
      },
      {
        id: Date.now() - 50000000, date: today, type: 'flexibility',
        exercises: [{ name: 'Yoga Flow', duration: 25 }],
        intensity: 'easy', duration: 25, notes: 'Morning stretch routine.'
      }
    ],
    settings: { name: 'Keira', units: 'lb', theme: 'dark' },
    prs: { 'Squats': 95, 'Bench Press': 115, 'Leg Press': 180, 'Overhead Press': 65, 'Dumbbell Rows': 40 }
  };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.workouts) return d;
    }
  } catch (e) {}
  const d = defaultData();
  saveData(d);
  return d;
}
function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d || data)); }
function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function todayStr() { return fmtDate(new Date()); }

// ==================== NAV ====================
let currentView = 'Log';
function showView(name) {
  currentView = name;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  if (name === 'Settings') {
    document.getElementById('viewSettings').classList.add('active');
    document.getElementById('navDewey').classList.add('active');
  } else {
    document.getElementById('view' + name).classList.add('active');
    document.getElementById('nav' + name).classList.add('active');
  }
  if (name === 'Today') renderToday();
  if (name === 'History') renderHistory();
  if (name === 'Stats') renderStats();
  if (name === 'Dewey') renderDewey();
  if (name === 'Settings') renderSettings();
}

// ==================== LOG FORM ====================
let formType = 'strength';
let formMode = 'sets';
let formUnit = 'lb';
let formIntensity = 'medium';
let formExercises = [];

const typeIcons = { strength: '\u{1F3CB}️', cardio: '\u{1F3C3}', flexibility: '\u{1F9D8}', sports: '⚽', other: '⭐' };
const typeLabels = { strength: 'Strength', cardio: 'Cardio', flexibility: 'Flexibility', sports: 'Sports', other: 'Other' };

function openForm(type) {
  formType = type;
  formExercises = [];
  formIntensity = 'medium';
  formUnit = data.settings.units || 'lb';
  formMode = (type === 'cardio' || type === 'flexibility') ? 'duration' : 'sets';
  document.getElementById('quickButtons').style.display = 'none';
  document.getElementById('logForm').style.display = 'block';
  document.getElementById('formTitle').textContent = `Log ${typeLabels[type]} Workout`;
  document.getElementById('exName').value = '';
  document.getElementById('exWeight').value = '';
  document.getElementById('wNotes').value = '';
  document.getElementById('exSets').value = '3';
  document.getElementById('exReps').value = '10';
  document.getElementById('exDuration').value = '30';
  document.getElementById('totalDuration').value = '30';
  setMode(formMode);
  setUnit(formUnit);
  setIntensity('medium');
  renderExerciseList();
}

function cancelForm() {
  document.getElementById('quickButtons').style.display = 'block';
  document.getElementById('logForm').style.display = 'none';
}

function setMode(m) {
  formMode = m;
  document.getElementById('togSets').classList.toggle('active', m === 'sets');
  document.getElementById('togDur').classList.toggle('active', m === 'duration');
  document.getElementById('setsFields').style.display = m === 'sets' ? '' : 'none';
  document.getElementById('durFields').style.display = m === 'duration' ? '' : 'none';
}

function setUnit(u) {
  formUnit = u;
  document.getElementById('togLb').classList.toggle('active', u === 'lb');
  document.getElementById('togKg').classList.toggle('active', u === 'kg');
}

function setIntensity(v) {
  formIntensity = v;
  document.querySelectorAll('.intensity-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.v === v);
  });
}

function addExercise() {
  const name = document.getElementById('exName').value.trim();
  if (!name) { document.getElementById('exName').focus(); return; }
  const ex = { name };
  if (formMode === 'sets') {
    ex.sets = parseInt(document.getElementById('exSets').value) || 3;
    ex.reps = parseInt(document.getElementById('exReps').value) || 10;
    const w = parseInt(document.getElementById('exWeight').value);
    if (w > 0) { ex.weight = w; ex.unit = formUnit; }
  } else {
    ex.duration = parseInt(document.getElementById('exDuration').value) || 30;
  }
  formExercises.push(ex);
  document.getElementById('exName').value = '';
  document.getElementById('exWeight').value = '';
  renderExerciseList();
}

function removeExercise(i) {
  formExercises.splice(i, 1);
  renderExerciseList();
}

function renderExerciseList() {
  const el = document.getElementById('exerciseList');
  if (!formExercises.length) { el.innerHTML = ''; return; }
  el.innerHTML = formExercises.map((ex, i) => `
    <div class="exercise-item">
      <div class="ex-info">
        <div class="ex-name">${esc(ex.name)}</div>
        <div class="ex-detail">${formatExDetail(ex)}</div>
      </div>
      <button class="ex-del" onclick="removeExercise(${i})">&times;</button>
    </div>
  `).join('');
}

function formatExDetail(ex) {
  if (ex.duration) return ex.duration + ' min';
  let s = ex.sets + '×' + ex.reps;
  if (ex.weight) s += ' @ ' + ex.weight + (ex.unit || 'lb');
  else s += ' bodyweight';
  return s;
}

function saveWorkout() {
  // Add current form fields as exercise if name is filled
  const curName = document.getElementById('exName').value.trim();
  if (curName) addExercise();

  if (!formExercises.length) {
    document.getElementById('exName').focus();
    return;
  }

  const workout = {
    id: Date.now(),
    date: todayStr(),
    type: formType,
    exercises: [...formExercises],
    intensity: formIntensity,
    duration: parseInt(document.getElementById('totalDuration').value) || 0,
    notes: document.getElementById('wNotes').value.trim()
  };
  data.workouts.push(workout);

  // Update PRs
  workout.exercises.forEach(ex => {
    if (ex.weight && ex.weight > 0) {
      if (!data.prs[ex.name] || ex.weight > data.prs[ex.name]) {
        const isNewPR = data.prs[ex.name] && ex.weight > data.prs[ex.name];
        data.prs[ex.name] = ex.weight;
        if (isNewPR) showConfetti();
      }
      if (!data.prs[ex.name]) data.prs[ex.name] = ex.weight;
    }
  });

  saveData();
  cancelForm();
  showSaveCheck();
}

function getAllExerciseNames() {

}

function workoutCard(w) {
  const icon = typeIcons[w.type] || '⭐';
  const label = typeLabels[w.type] || 'Workout';
  const exDetails = w.exercises.map(ex => {
    if (ex.duration) return `<div class="ex-line">${esc(ex.name)}: ${ex.duration} min</div>`;
    let s = esc(ex.name) + ': ' + (ex.sets||0) + '×' + (ex.reps||0);
    if (ex.weight) s += ' @ ' + ex.weight + (ex.unit || 'lb');
    else s += ' bodyweight';
    return `<div class="ex-line">${s}</div>`;
  }).join('');
  const intBadge = w.intensity ? `<span class="intensity-badge ${w.intensity}">${w.intensity}</span>` : '';
  return `<div class="workout-card" onclick="toggleDetails(this)">
    <div class="wc-header">

function deleteWorkout(id) {

// ==================== STATS ====================
function renderStats() {
  const el = document.getElementById('viewStats');
  const now = new Date();
  const today = todayStr();

  // This week (Mon-Sun)
  const dayOfWeek = now.getDay() || 7;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dayOfWeek + 1);
  weekStart.setHours(0,0,0,0);
  const weekWorkouts = data.workouts.filter(w => new Date(w.date + 'T12:00:00') >= weekStart);
  const weekMins = weekWorkouts.reduce((s, w) => s + (w.duration || 0), 0);

  // This month
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthWorkouts = data.workouts.filter(w => new Date(w.date + 'T12:00:00') >= monthStart);
  const monthMins = monthWorkouts.reduce((s, w) => s + (w.duration || 0), 0);

  // Streak
  let streak = 0;
  let checkDate = new Date(now);
  while (true) {
    const ds = fmtDate(checkDate);
    if (data.workouts.some(w => w.date === ds)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else break;
  }

  // Most frequent exercise
  const exCount = {};
  data.workouts.forEach(w => w.exercises.forEach(e => {
    exCount[e.name] = (exCount[e.name] || 0) + 1;
  }));
  const topEx = Object.entries(exCount).sort((a, b) => b[1] - a[1]);
  const mostFreq = topEx.length ? topEx[0][0] + ' (' + topEx[0][1] + 'x)' : 'N/A';

  // PRs
  const prEntries = Object.entries(data.prs).sort((a, b) => b[1] - a[1]);

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${weekWorkouts.length}</div><div class="stat-label">This Week</div></div>
      <div class="stat-card"><div class="stat-val">${weekMins}</div><div class="stat-label">Min This Week</div></div>
      <div class="stat-card"><div class="stat-val">${monthWorkouts.length}</div><div class="stat-label">This Month</div></div>
      <div class="stat-card"><div class="stat-val">${monthMins}</div><div class="stat-label">Min This Month</div></div>
      <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Day Streak &#128293;</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:16px">${esc(mostFreq)}</div><div class="stat-label">Most Frequent</div></div>
    </div>
    ${prEntries.length ? `<div class="form-card"><h3>Personal Records &#127942;</h3><div class="pr-list">
      ${prEntries.map(([name, val]) => `<div class="pr-item"><span class="pr-name">${esc(name)}</span><span class="pr-val">${val} ${data.settings.units}</span></div>`).join('')}
    </div></div>` : ''}
    <div class="chart-wrap"><h4>Last 14 Days</h4><canvas id="statsChart" width="600" height="160"></canvas></div>
  `;
  drawChart();
}

function drawChart() {
  const canvas = document.getElementById('statsChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = fmtDate(d);
    const count = data.workouts.filter(w => w.date === ds).length;
    days.push({ label: d.getDate(), count, ds });
  }
  const maxCount = Math.max(1, ...days.map(d => d.count));
  const barW = (W - 40) / 14 - 4;
  const baseY = H - 25;
  const maxH = H - 45;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 1; i <= maxCount; i++) {
    const y = baseY - (i / maxCount) * maxH;
    ctx.beginPath(); ctx.moveTo(30, y); ctx.lineTo(W - 10, y); ctx.stroke();
  }

  const todayDs = todayStr();
  days.forEach((d, i) => {
    const x = 30 + i * ((W - 40) / 14) + 2;
    const h = d.count ? (d.count / maxCount) * maxH : 2;
    const grad = ctx.createLinearGradient(x, baseY - h, x, baseY);
    if (d.ds === todayDs) {
      grad.addColorStop(0, '#ff6b6b');
      grad.addColorStop(1, '#ff8a5c');
    } else {
      grad.addColorStop(0, 'rgba(255,107,107,0.7)');
      grad.addColorStop(1, 'rgba(255,138,92,0.3)');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    roundRect(ctx, x, baseY - h, barW, h, 3);
    ctx.fill();

    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('color') || '#a0a0b8';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x + barW / 2, baseY + 14);

    if (d.count > 0) {
      ctx.fillStyle = '#ff6b6b';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText(d.count, x + barW / 2, baseY - h - 4);
    }
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function renderDewey() {

  } else if (todayWorkouts === 0) {
    msg = `<strong>Dewey is waiting for you!</strong> &#128021;<br>No workouts yet today. ${esc(data.settings.name)}, let's get moving!`;
  } else if (todayWorkouts === 1) {
    msg = `<strong>Dewey is proud of you!</strong> &#127881;<br>Good boy energy! Great job on that workout, ${esc(data.settings.name)}!`;
  } else {
    msg = `<strong>Dewey is AMAZED!</strong> &#129327;<br>${todayWorkouts} workouts today?! You're a machine, ${esc(data.settings.name)}!`;
  }
  if (streak >= 7) {
    msg += `<br><br>&#128293; <strong>Dewey is doing ZOOMIES! ${streak}-DAY STREAK!</strong> &#128293;`;
  } else if (streak >= 3) {
    msg += `<br><br>&#11088; ${streak}-day streak! Keep it up!`;
  }

  document.getElementById('deweyMsg').innerHTML = msg;

  document.getElementById('deweyQuote').textContent = '"' + deweyQuotes[dayOfYear % deweyQuotes.length] + '" — Dewey';

function getStreak() {
  let streak = 0;
  let d = new Date();
  while (true) {
    if (data.workouts.some(w => w.date === fmtDate(d))) {
      streak++; d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function getDaysSinceLastWorkout() {
  if (!data.workouts.length) return 999;
  const sorted = [...data.workouts].sort((a, b) => b.date.localeCompare(a.date));
  const last = new Date(sorted[0].date + 'T12:00:00');
  return Math.floor((new Date() - last) / 86400000);
}

let deweyAnim = 0;
let deweyAnimFrame;
function drawDewey(todayCount, streak, daysSince) {
  const canvas = document.getElementById('deweyCanvas');
  const ctx = canvas.getContext('2d');
  const W = 280, H = 280;
  const cx = W / 2, cy = H / 2 + 10;

  cancelAnimationFrame(deweyAnimFrame);

  let pose = 'sitting';
  if (daysSince >= 3) pose = 'sleeping';
  else if (streak >= 7) pose = 'zoomies';
  else if (todayCount >= 1) pose = 'standing';

  function frame() {
    deweyAnim += 0.04;
    ctx.clearRect(0, 0, W, H);

    const tan = '#e8b84b';
    const darkTan = '#c99a30';
    const white = '#faf3e0';
    const black = '#2a2a2a';
    const pink = '#ffb5b5';
    const nose = '#3a3a3a';

    if (pose === 'sleeping') {
      // Body (lying down)
      ctx.fillStyle = tan;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 30, 70, 35, 0, 0, Math.PI * 2);
      ctx.fill();
      // Head
      ctx.beginPath();
      ctx.arc(cx - 50, cy + 10, 32, 0, Math.PI * 2);
      ctx.fill();
      // Belly
      ctx.fillStyle = white;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 40, 50, 18, 0, 0, Math.PI);
      ctx.fill();
      // Ears (floppy, down)
      ctx.fillStyle = darkTan;
      ctx.beginPath();
      ctx.ellipse(cx - 72, cy + 22, 14, 22, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx - 32, cy + 2, 14, 22, 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Closed eyes
      ctx.strokeStyle = black; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(cx - 56, cy + 6, 5, 0, Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx - 42, cy + 6, 5, 0, Math.PI); ctx.stroke();
      // Nose
      ctx.fillStyle = nose;
      ctx.beginPath(); ctx.ellipse(cx - 49, cy + 16, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
      // Zzz
      ctx.fillStyle = 'rgba(160,160,184,0.6)';
      ctx.font = 'bold 16px sans-serif';
      const zOff = Math.sin(deweyAnim) * 3;
      ctx.fillText('z', cx - 20, cy - 20 + zOff);
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText('Z', cx - 8, cy - 35 + zOff);
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText('Z', cx + 8, cy - 48 + zOff);
      // Tail
      ctx.strokeStyle = tan; ctx.lineWidth = 6; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx + 65, cy + 25);
      ctx.quadraticCurveTo(cx + 85, cy + 15, cx + 80, cy + 5);
      ctx.stroke();

    } else if (pose === 'zoomies') {
      const bounce = Math.sin(deweyAnim * 3) * 8;
      const lean = Math.sin(deweyAnim * 3) * 0.15;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(lean);
      ctx.translate(-cx, -cy);
      // Back legs
      ctx.fillStyle = tan;
      const legKick = Math.sin(deweyAnim * 6) * 15;
      ctx.fillRect(cx - 22, cy + 40 + bounce, 12, 35 + legKick); // back left
      ctx.fillRect(cx + 10, cy + 40 + bounce, 12, 35 - legKick); // back right
      // Front legs
      ctx.fillRect(cx - 38, cy + 30 + bounce, 12, 38 - legKick);
      ctx.fillRect(cx + 26, cy + 30 + bounce, 12, 38 + legKick);
      // Paws
      ctx.fillStyle = darkTan;
      [cx-22, cx+10, cx-38, cx+26].forEach((x, i) => {
        const k = i < 2 ? (i === 0 ? legKick : -legKick) : (i === 2 ? -legKick : legKick);
        ctx.beginPath();
        ctx.ellipse(x + 6, cy + 75 + bounce + (i < 2 ? k : -k), 9, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      });
      // Body
      ctx.fillStyle = tan;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 20 + bounce, 45, 35, 0, 0, Math.PI * 2);
      ctx.fill();
      // Belly
      ctx.fillStyle = white;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 30 + bounce, 28, 18, 0, 0, Math.PI);
      ctx.fill();
      // Head
      ctx.fillStyle = tan;
      ctx.beginPath();
      ctx.arc(cx, cy - 25 + bounce, 34, 0, Math.PI * 2);
      ctx.fill();
      // Ears (flying back)
      ctx.fillStyle = darkTan;
      ctx.beginPath();
      ctx.ellipse(cx - 28, cy - 38 + bounce, 14, 20, -0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + 28, cy - 38 + bounce, 14, 20, 0.6, 0, Math.PI * 2);
      ctx.fill();
      // Eyes (excited)
      ctx.fillStyle = black;
      ctx.beginPath(); ctx.arc(cx - 12, cy - 30 + bounce, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 12, cy - 30 + bounce, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 10, cy - 32 + bounce, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 14, cy - 32 + bounce, 2, 0, Math.PI * 2); ctx.fill();
      // Nose
      ctx.fillStyle = nose;
      ctx.beginPath(); ctx.ellipse(cx, cy - 16 + bounce, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
      // Happy mouth (big open)
      ctx.strokeStyle = black; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy - 10 + bounce, 12, 0.1, Math.PI - 0.1);
      ctx.stroke();
      // Tongue
      ctx.fillStyle = pink;
      ctx.beginPath();
      ctx.ellipse(cx + 4, cy - 3 + bounce, 6, 8, 0.2, 0, Math.PI * 2);
      ctx.fill();
      // Tail (wagging fast)
      const tailWag = Math.sin(deweyAnim * 8) * 25;
      ctx.strokeStyle = tan; ctx.lineWidth = 7; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx + 40, cy + 5 + bounce);
      ctx.quadraticCurveTo(cx + 65, cy - 15 + tailWag + bounce, cx + 55, cy - 35 + tailWag + bounce);
      ctx.stroke();
      // Speed lines
      ctx.strokeStyle = 'rgba(255,107,107,0.3)'; ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const ly = cy - 10 + i * 20 + bounce;
        ctx.beginPath(); ctx.moveTo(cx - 70, ly); ctx.lineTo(cx - 90 - i * 5, ly); ctx.stroke();
      }
      ctx.restore();

    } else {
      // SITTING or STANDING
      const isStanding = pose === 'standing';
      const breathe = Math.sin(deweyAnim) * 2;

      // Tail
      const tailWag = Math.sin(deweyAnim * (isStanding ? 4 : 2)) * (isStanding ? 18 : 10);
      ctx.strokeStyle = tan; ctx.lineWidth = 7; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx + 38, cy + (isStanding ? 10 : 20));
      ctx.quadraticCurveTo(cx + 60, cy - 10 + tailWag, cx + 55, cy - 30 + tailWag);
      ctx.stroke();

      if (isStanding) {
        // Back legs
        ctx.fillStyle = tan;
        ctx.fillRect(cx - 20, cy + 35, 13, 38);
        ctx.fillRect(cx + 8, cy + 35, 13, 38);
        // Front legs
        ctx.fillRect(cx - 36, cy + 25, 13, 42);
        // Right paw up
        ctx.save();
        ctx.translate(cx + 36, cy + 25);
        ctx.rotate(Math.sin(deweyAnim * 2) * 0.15 - 0.5);
        ctx.fillRect(-6, 0, 13, 35);
        ctx.fillStyle = darkTan;
        ctx.beginPath(); ctx.ellipse(0, 35, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        // Other paws
        ctx.fillStyle = darkTan;
        ctx.beginPath(); ctx.ellipse(cx - 30, cy + 72, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx - 14, cy + 78, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx + 14, cy + 78, 9, 5, 0, 0, Math.PI * 2); ctx.fill();
      } else {
        // Sitting legs (tucked)
        ctx.fillStyle = tan;
        ctx.beginPath();
        ctx.ellipse(cx - 30, cy + 45, 22, 14, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + 30, cy + 45, 22, 14, 0.2, 0, Math.PI * 2);
        ctx.fill();
        // Front paws
        ctx.fillStyle = darkTan;
        ctx.beginPath(); ctx.ellipse(cx - 18, cy + 55, 9, 6, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx + 18, cy + 55, 9, 6, 0, 0, Math.PI * 2); ctx.fill();
      }

      // Body
      ctx.fillStyle = tan;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 15 + breathe, 42, 38, 0, 0, Math.PI * 2);
      ctx.fill();

      // Belly
      ctx.fillStyle = white;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 25 + breathe, 26, 20, 0, 0, Math.PI);
      ctx.fill();

      // Head
      ctx.fillStyle = tan;
      ctx.beginPath();
      ctx.arc(cx, cy - 28 + breathe, 34, 0, Math.PI * 2);
      ctx.fill();

      // Muzzle
      ctx.fillStyle = white;
      ctx.beginPath();
      ctx.ellipse(cx, cy - 16 + breathe, 18, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      ctx.fillStyle = darkTan;
      ctx.beginPath();
      ctx.ellipse(cx - 30, cy - 40 + breathe, 14, 22, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + 30, cy - 40 + breathe, 14, 22, 0.3, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = black;
      ctx.beginPath(); ctx.arc(cx - 12, cy - 32 + breathe, 4.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 12, cy - 32 + breathe, 4.5, 0, Math.PI * 2); ctx.fill();
      // Eye highlights
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 10, cy - 34 + breathe, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 14, cy - 34 + breathe, 1.8, 0, Math.PI * 2); ctx.fill();

      // Eyebrows (friendly)
      ctx.strokeStyle = darkTan; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(cx - 12, cy - 40 + breathe, 8, Math.PI + 0.5, Math.PI * 2 - 0.5); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx + 12, cy - 40 + breathe, 8, Math.PI + 0.5, Math.PI * 2 - 0.5); ctx.stroke();

      // Nose
      ctx.fillStyle = nose;
      ctx.beginPath(); ctx.ellipse(cx, cy - 18 + breathe, 6, 5, 0, 0, Math.PI * 2); ctx.fill();
      // Nose highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.ellipse(cx - 2, cy - 20 + breathe, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();

      // Mouth
      ctx.strokeStyle = black; ctx.lineWidth = 1.5;
      if (isStanding) {
        // Happy open mouth
        ctx.beginPath();
        ctx.arc(cx, cy - 10 + breathe, 10, 0.1, Math.PI - 0.1);
        ctx.stroke();
        ctx.fillStyle = pink;
        ctx.beginPath();
        ctx.ellipse(cx + 2, cy - 5 + breathe, 5, 7, 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Gentle smile
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy - 12 + breathe);
        ctx.lineTo(cx, cy - 10 + breathe);
        ctx.lineTo(cx + 6, cy - 12 + breathe);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy - 10 + breathe, 7, 0.2, Math.PI - 0.2);
        ctx.stroke();
      }
    }

    deweyAnimFrame = requestAnimationFrame(frame);
  }
  frame();
}

// ==================== SETTINGS ====================
function renderSettings() {
  document.getElementById('setName').value = data.settings.name || 'Keira';
  const u = data.settings.units || 'lb';
  document.getElementById('setPrefLb').classList.toggle('active', u === 'lb');
  document.getElementById('setPrefKg').classList.toggle('active', u === 'kg');
  const t = data.settings.theme || 'dark';
  document.getElementById('setDark').classList.toggle('active', t === 'dark');
  document.getElementById('setLight').classList.toggle('active', t === 'light');
}

function updateSetting(key, val) {
  data.settings[key] = val;
  saveData();
  if (key === 'name') {
    document.getElementById('headerSub').textContent = val + "'s fitness tracker";
  }
  if (key === 'theme') applyTheme();
  if (key === 'units') {
    document.getElementById('setPrefLb').classList.toggle('active', val === 'lb');
    document.getElementById('setPrefKg').classList.toggle('active', val === 'kg');
  }
  renderSettings();
}

function applyTheme() {
  document.body.classList.toggle('light', data.settings.theme === 'light');
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'dewey-workout-data.json';
  a.click(); URL.revokeObjectURL(url);
}

function clearData() {
  if (!confirm('Clear ALL workout data? This cannot be undone.')) return;
  if (!confirm('Are you really sure?')) return;
  localStorage.removeItem(STORE_KEY);
  data = defaultData();
  saveData();
  showView('Log');
}

// ==================== EFFECTS ====================
function showSaveCheck() {
  const el = document.createElement('div');
  el.className = 'save-check';
  el.textContent = '✅';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function showConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#ff6b6b', '#ff8a5c', '#4ecdc4', '#f7d354', '#a06cd5', '#5b9bd5'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (5 + Math.random() * 8) + 'px';
    piece.style.height = (5 + Math.random() * 8) + 'px';
    piece.style.animationDelay = (Math.random() * 0.5) + 's';
    piece.style.animationDuration = (1 + Math.random() * 1) + 's';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 2500);
}

// ==================== UTILS ====================
function esc(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// ==================== INIT ====================
applyTheme();
document.getElementById('headerSub').textContent = (data.settings.name || 'Keira') + "'s fitness tracker";

// Set default unit toggles
if (data.settings.units === 'kg') {
  document.getElementById('togLb').classList.remove('active');
  document.getElementById('togKg').classList.add('active');
}
</script>
