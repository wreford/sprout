// ---- Responsive sizing ----
let W, H, scale;
function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  scale = Math.min(W / 800, H / 1200);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ---- Audio Engine ----
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audio;
function ensureAudio() { if (!audio) audio = new AudioCtx(); }

function playSizzle(dur = 0.3) {
  ensureAudio();
  const buf = audio.createBufferSource();
  const n = audio.sampleRate * dur;
  const buffer = audio.createBuffer(1, n, audio.sampleRate);
  const d = buffer.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (n * 0.3)) * 0.15;
  buf.buffer = buffer;
  const filt = audio.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 4000; filt.Q.value = 2;
  buf.connect(filt); filt.connect(audio.destination);
  buf.start();
}

function playOink() {
  ensureAudio();
  const o = audio.createOscillator();
  const g = audio.createGain();
  o.type = 'sine'; o.frequency.value = 600;
  o.frequency.setValueAtTime(600, audio.currentTime);
  o.frequency.exponentialRampToValueAtTime(300, audio.currentTime + 0.15);
  g.gain.setValueAtTime(0.2, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.2);
  o.connect(g); g.connect(audio.destination);
  o.start(); o.stop(audio.currentTime + 0.2);
}

function playDing() {
  ensureAudio();
  const o = audio.createOscillator();
  const g = audio.createGain();
  o.type = 'sine'; o.frequency.value = 1200;
  g.gain.setValueAtTime(0.25, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.5);
  o.connect(g); g.connect(audio.destination);
  o.start(); o.stop(audio.currentTime + 0.5);
}

function playChop() {
  ensureAudio();
  const buf = audio.createBufferSource();
  const n = audio.sampleRate * 0.08;
  const buffer = audio.createBuffer(1, n, audio.sampleRate);
  const d = buffer.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (n * 0.15)) * 0.3;
  buf.buffer = buffer;
  buf.connect(audio.destination); buf.start();
}

function playJingle() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => {
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0, audio.currentTime + i * 0.15);
    g.gain.linearRampToValueAtTime(0.15, audio.currentTime + i * 0.15 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + i * 0.15 + 0.4);
    o.connect(g); g.connect(audio.destination);
    o.start(audio.currentTime + i * 0.15);
    o.stop(audio.currentTime + i * 0.15 + 0.4);
  });
}

// Background melody
let melodyPlaying = false;
function startMelody() {
  if (melodyPlaying) return;
  melodyPlaying = true;
  ensureAudio();
  const melody = [262, 294, 330, 349, 330, 294, 262, 0, 330, 349, 392, 440, 392, 349, 330, 0];
  let idx = 0;
  function playNote() {
    if (!melodyPlaying) return;
    const f = melody[idx % melody.length];
    if (f > 0) {
      const o = audio.createOscillator();
      const g = audio.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.value = 0.03;
      g.gain.setValueAtTime(0.03, audio.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.4);
      o.connect(g); g.connect(audio.destination);
      o.start(); o.stop(audio.currentTime + 0.4);
    }
    idx++;
    setTimeout(playNote, 500);
  }
  playNote();
}

// ---- Drawing helpers ----
function px(v) { return v * scale; }

function drawRoundRect(x, y, w, h, r, fill, stroke, lw = 3) {
  ctx.beginPath();
  ctx.roundRect(px(x), px(y), px(w), px(h), px(r));
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = px(lw); ctx.stroke(); }
}

function drawText(text, x, y, size, color = '#333', align = 'center', maxW) {
  ctx.font = `bold ${px(size)}px 'Comic Neue', 'Comic Sans MS', cursive`;
  ctx.fillStyle = color;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  if (maxW) ctx.fillText(text, px(x), px(y), px(maxW));
  else ctx.fillText(text, px(x), px(y));
}

function drawTextWrap(text, x, y, size, color, maxWidth, lineHeight) {
  ctx.font = `bold ${px(size)}px 'Comic Neue', 'Comic Sans MS', cursive`;
  ctx.fillStyle = color || '#333';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const words = text.split(' ');
  let line = '';
  let cy = px(y);
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > px(maxWidth) && line) {
      ctx.fillText(line.trim(), px(x), cy);
      line = word + ' ';
      cy += px(lineHeight || size * 1.3);
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), px(x), cy);
}

// ---- Draw Peppa ----
function drawPeppa(x, y, sc, talking = false) {
  const s = sc * scale;
  ctx.save();
  ctx.translate(px(x), px(y));

  // Body / dress
  ctx.fillStyle = '#E85D8C';
  ctx.beginPath();
  ctx.ellipse(0, s * 40, s * 22, s * 28, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 2.5;
  ctx.stroke();

  // Head — side view circle
  const headX = s * 12;
  const headY = s * -10;
  ctx.fillStyle = '#F8A4B8';
  ctx.beginPath();
  ctx.ellipse(headX, headY, s * 24, s * 22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 2.5;
  ctx.stroke();

  // Snout (protruding circle for the Peppa nose shape)
  ctx.fillStyle = '#F8A4B8';
  ctx.beginPath();
  ctx.ellipse(headX + s * 26, headY - s * 2, s * 10, s * 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 2.5;
  ctx.stroke();

  // Nostrils
  ctx.fillStyle = '#D4728A';
  ctx.beginPath();
  ctx.arc(headX + s * 28, headY - s * 3, s * 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(headX + s * 32, headY - s * 3, s * 2, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(headX + s * 10, headY - s * 8, s * 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(headX + s * 11, headY - s * 9.5, s * 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Mouth — smile
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 2;
  ctx.beginPath();
  if (talking && Math.floor(animFrame / 8) % 2 === 0) {
    // Open mouth
    ctx.ellipse(headX + s * 16, headY + s * 6, s * 7, s * 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#C44';
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.arc(headX + s * 14, headY + s * 3, s * 10, 0.2, Math.PI * 0.7);
    ctx.stroke();
  }

  // Cheek blush
  ctx.fillStyle = 'rgba(255, 100, 120, 0.3)';
  ctx.beginPath();
  ctx.ellipse(headX + s * 2, headY + s * 4, s * 6, s * 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ears (on top of head)
  ctx.fillStyle = '#F8A4B8';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 2;
  ctx.beginPath();
  ctx.ellipse(headX - s * 4, headY - s * 28, s * 5, s * 8, -0.3, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(headX + s * 6, headY - s * 30, s * 5, s * 8, 0.2, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // Arms
  ctx.strokeStyle = '#F8A4B8';
  ctx.lineWidth = s * 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-s * 15, s * 30);
  ctx.lineTo(-s * 30, s * 20 + Math.sin(animFrame * 0.1) * s * 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s * 15, s * 30);
  ctx.lineTo(s * 30, s * 20 + Math.cos(animFrame * 0.1) * s * 5);
  ctx.stroke();

  // Legs
  ctx.strokeStyle = '#F8A4B8';
  ctx.lineWidth = s * 4;
  ctx.beginPath();
  ctx.moveTo(-s * 6, s * 65);
  ctx.lineTo(-s * 8, s * 82);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s * 6, s * 65);
  ctx.lineTo(s * 8, s * 82);
  ctx.stroke();

  // Shoes
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(-s * 8, s * 85, s * 6, s * 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s * 8, s * 85, s * 6, s * 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ---- Speech Bubble ----
function drawSpeechBubble(text, x, y, maxW) {
  if (!text || speechBubbleAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, speechBubbleAlpha);

  ctx.font = `bold ${px(16)}px 'Comic Neue', 'Comic Sans MS', cursive`;
  ctx.textAlign = 'left';
  const words = text.split(' ');
  let lines = [];
  let line = '';
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > px(maxW - 30) && line) {
      lines.push(line.trim());
      line = word + ' ';
    } else { line = test; }
  }
  lines.push(line.trim());

  const lh = px(20);
  const bw = px(maxW);
  const bh = lines.length * lh + px(20);
  const bx = px(x);
  const by = px(y) - bh;

  // Bubble
  ctx.fillStyle = '#FFF';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = px(3);
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, px(12));
  ctx.fill(); ctx.stroke();

  // Tail
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.moveTo(bx + px(20), by + bh);
  ctx.lineTo(bx + px(10), by + bh + px(15));
  ctx.lineTo(bx + px(40), by + bh);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx + px(20), by + bh - px(1));
  ctx.lineTo(bx + px(10), by + bh + px(15));
  ctx.lineTo(bx + px(40), by + bh - px(1));
  ctx.strokeStyle = '#333';
  ctx.stroke();

  // Text
  ctx.fillStyle = '#333';
  ctx.textBaseline = 'top';
  lines.forEach((l, i) => {
    ctx.fillText(l, bx + px(15), by + px(10) + i * lh);
  });

  ctx.restore();
}

// ---- Sparkle effects ----
function addSparkles(cx, cy, count = 12) {
  for (let i = 0; i < count; i++) {
    sparkles.push({
      x: cx, y: cy,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1,
      size: Math.random() * 6 + 3,
      color: ['#FFD700', '#FF69B4', '#87CEEB', '#FFF'][Math.floor(Math.random() * 4)]
    });
  }
}

function updateSparkles() {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.1;
    s.life -= 0.02;
    if (s.life <= 0) sparkles.splice(i, 1);
  }
}

function drawSparkles() {
  sparkles.forEach(s => {
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    ctx.translate(px(s.x), px(s.y));
    ctx.rotate(animFrame * 0.05);
    // Star shape
    const sz = px(s.size);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      const r = i === 0 ? sz : sz;
      ctx.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
      const a2 = a + (2 * Math.PI) / 10;
      ctx.lineTo(Math.cos(a2) * sz * 0.4, Math.sin(a2) * sz * 0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });
}

      pork_skin: '\u{1F969}', crackling: '\u{1F356}', more_bacon: '\u{1F953}',

// ---- Draw Menu ----

  // Sky background

  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(0.7, '#B8E6F0');
  skyGrad.addColorStop(1, '#C5E8B0');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Grass
  ctx.fillStyle = '#7EC850';
  ctx.fillRect(0, H * 0.85, W, H * 0.15);
  // Grass tufts
  ctx.fillStyle = '#6BB840';
  for (let gx = 0; gx < W; gx += px(30)) {
    ctx.beginPath();
    ctx.moveTo(gx, H * 0.85);
    ctx.quadraticCurveTo(gx + px(8), H * 0.85 - px(10 + Math.sin(gx) * 5), gx + px(15), H * 0.85);
    ctx.fill();
  }

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [[100, 60], [350, 40], [600, 70]].forEach(([cx, cy]) => {
    const drift = (animFrame * 0.15 + cx) % 900 - 50;
    ctx.beginPath();
    ctx.arc(px(drift), px(cy), px(25), 0, Math.PI * 2);
    ctx.arc(px(drift + 25), px(cy - 8), px(20), 0, Math.PI * 2);
    ctx.arc(px(drift + 50), px(cy), px(28), 0, Math.PI * 2);
    ctx.fill();
  });

  // Title
  ctx.save();
  const titleBounce = Math.sin(animFrame * 0.04) * 3;
  drawRoundRect(80, 70 + titleBounce, 640, 80, 20, 'rgba(255,255,255,0.9)', '#F8A4B8', 4);
  drawText("Peppa's Kitchen", 400, 95 + titleBounce, 32, '#E85D8C');
  drawText("A Cooking Adventure!", 400, 125 + titleBounce, 18, '#888');
  ctx.restore();

  // Dishes cooked counter
  drawRoundRect(580, 165, 180, 35, 10, 'rgba(255,255,255,0.8)', '#F8A4B8', 2);
  drawText(`Dishes cooked: ${totalDishesCooked}`, 670, 182, 13, '#666');

  // Recipe cards (scrollable area)
  ctx.save();
  const menuTop = 210;
  const menuBottom = 1100;
  const cardH = 90;
  const cardGap = 10;
  const totalH = RECIPES.length * (cardH + cardGap);
  const maxScroll = Math.max(0, totalH - (menuBottom - menuTop));
  menuScroll = Math.max(0, Math.min(maxScroll, menuScroll));

  // Clip
  ctx.beginPath();
  ctx.rect(0, px(menuTop - 5), W, px(menuBottom - menuTop + 10));
  ctx.clip();

  RECIPES.forEach((r, i) => {
    const cy = menuTop + i * (cardH + cardGap) - menuScroll;
    if (cy + cardH < menuTop - 20 || cy > menuBottom + 20) return;

    const unlocked = !r.locked;
    const completed = completedRecipes.has(r.id);
    const isSecret = r.id === 10;

    // Card
    const cardColor = unlocked ? (completed ? 'rgba(200, 240, 200, 0.92)' : 'rgba(255,255,255,0.92)') : 'rgba(200,200,200,0.7)';
    const borderColor = completed ? '#4CAF50' : (unlocked ? '#F8A4B8' : '#AAA');
    drawRoundRect(60, cy, 680, cardH, 15, cardColor, borderColor, 3);

    if (unlocked) {
      // Emoji
      ctx.font = `${px(36)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(r.emoji, px(100), px(cy + cardH / 2));

      // Name
      drawText(r.name, 140, cy + 22, 18, '#333', 'left');

      // Description
      ctx.font = `${px(12)}px 'Comic Neue', 'Comic Sans MS', cursive`;
      ctx.fillStyle = '#777';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(r.desc, px(140), px(cy + 42), px(560));

      // Completed star
      if (completed) {
        drawText('⭐', 710, cy + cardH / 2, 24, '#FFD700');
      }
    } else {
      // Locked
      drawText('\u{1F512}', 100, cy + cardH / 2, 30, '#999');
      if (isSecret) {
        drawText('???  Complete all recipes to unlock!', 400, cy + cardH / 2, 16, '#999');
      } else {
        drawText('Locked  Complete the previous recipe!', 400, cy + cardH / 2, 16, '#999');
      }
    }
  });

  ctx.restore();

  // Peppa on the side
  drawPeppa(680, 850, 0.9);

  // Speech bubble
  if (speechBubbleAlpha > 0) {
    drawSpeechBubble(speechBubbleText, 480, 800, 260);
  }

  // Scroll indicator
  if (totalH > menuBottom - menuTop) {
    const scrollFrac = menuScroll / maxScroll;
    const barH = 300;
    const thumbH = 40;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.roundRect(px(755), px(menuTop + 10), px(8), px(barH), px(4));
    ctx.fill();
    ctx.fillStyle = 'rgba(248, 164, 184, 0.6)';
    ctx.beginPath();
    ctx.roundRect(px(755), px(menuTop + 10 + scrollFrac * (barH - thumbH)), px(8), px(thumbH), px(4));
    ctx.fill();
  }
}

    drawTextWrap("What a lovely cook! Time for a mud bath! ...the mud smells different today.", 100, 852, 16, 'rgba(255,255,255,0.9)', 600, 22);
  }

  // Peppa
  drawPeppa(650, 880, 0.8, animFrame > 60);

  // Sparkles
  drawSparkles();
}

// ---- Game Loop ----
function updateDialogue(recipe) {
  dialogueTimer++;
  if (dialogueTimer > 180) { // Change dialogue every ~3 seconds
    dialogueTimer = 0;
    dialogueIdx = (dialogueIdx + 1) % recipe.dialogue.length;
    speechBubbleText = recipe.dialogue[dialogueIdx];
    speechBubbleAlpha = 1;
    if (Math.random() < 0.3) playOink();
  }
  if (speechBubbleAlpha > 0 && dialogueTimer > 150) {
    speechBubbleAlpha -= 0.03;
  }
}

function gameLoop() {
  animFrame++;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);

  if (state === 'menu') {
    drawMenu();
    updateDialogue(RECIPES[0]); // Menu chatter
    // Menu Peppa dialogue
    const menuPhrases = [
      "What shall we cook today?",
      "I LOVE cooking! *oink*",
      "Daddy Pig is SO hungry!",
      "Let's make something YUMMY!",
      "Mummy Pig taught me everything I know!",
      "Cooking is my FAVOURITE thing!"
    ];
    if (dialogueTimer === 0) {
      speechBubbleText = menuPhrases[dialogueIdx % menuPhrases.length];
    }
  } else if (state === 'cooking') {
    drawKitchen();
    drawCookingStep(selectedRecipe, currentStep);
    updateDialogue(selectedRecipe);

    // Peppa in corner
    drawPeppa(680, 700, 0.65, speechBubbleAlpha > 0.5);
    drawSpeechBubble(speechBubbleText, 460, 660, 240);

    // Overcook timer for rapid steps
    const step = selectedRecipe.steps[currentStep];
    if (step && step.type === 'rapid' && tapCount >= step.count) {
      overcookTimer++;
      if (overcookTimer > 90) {
        overcookWarning = true;
        if (overcookTimer > 180) {
          // Burned!
          burnCount++;
          saveProgress();
          speechBubbleText = burnCount >= 3
            ? "Maybe Mummy Pig should cook..."
            : "Oh no! It's burnt! Daddy Pig will eat it anyway.";
          speechBubbleAlpha = 1;
          playOink();
          advanceStep(0); // 0 stars penalty... but let them continue
        }
      }
    }

    drawSparkles();

  } else if (state === 'rating') {
    drawRating();
  }

  updateSparkles();

  // Peppa poke message
  if (peppaPokeTimer > 0) {
    peppaPokeTimer--;
    drawRoundRect(200, 400, 400, 50, 12, 'rgba(0,0,0,0.7)', null, 0);
    drawText(peppaPokeMsg, 400, 425, 16, '#FFF');
  }

  requestAnimationFrame(gameLoop);
}

// ---- Step advancement ----
function advanceStep(starBonus = 1) {
  currentStep++;
  tapCount = 0;
  overcookTimer = 0;
  overcookWarning = false;
  stepCompleteFlash = 1;
  playChop();

  if (currentStep >= selectedRecipe.steps.length) {
    // Recipe complete!
    state = 'rating';
    animFrame = 0;
    stars = Math.min(3, Math.max(1, starBonus + (burnCount > 0 ? 0 : 1) + 1));
    completedRecipes.add(selectedRecipe.id);
    totalDishesCooked++;

    // Unlock next
    if (selectedRecipe.id + 1 < RECIPES.length && selectedRecipe.id !== 10) {
      RECIPES[selectedRecipe.id + 1].locked = false;
    }
    // Check for secret recipe
    let allDone = true;
    for (let i = 0; i < 10; i++) { if (!completedRecipes.has(i)) allDone = false; }
    if (allDone) RECIPES[10].locked = false;

    saveProgress();
    playJingle();
    for (let i = 0; i < 30; i++) {
      addSparkles(200 + Math.random() * 400, 200 + Math.random() * 200);
    }
  } else {
    addSparkles(400, 400, 6);
  }
}

// ---- Input Handling ----
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
  return {
    x: (t.clientX - rect.left) * (W / rect.width) / scale,
    y: (t.clientY - rect.top) * (H / rect.height) / scale
  };
}

function hitRect(pos, rx, ry, rw, rh) {
  return pos.x >= rx && pos.x <= rx + rw && pos.y >= ry && pos.y <= ry + rh;
}

let lastTapTime = 0;

function handleTap(e) {
  ensureAudio();
  startMelody();
  const pos = getPos(e);

  if (state === 'menu') {
    // Check recipe cards
    const menuTop = 210;
    const cardH = 90;
    const cardGap = 10;

    RECIPES.forEach((r, i) => {
      const cy = menuTop + i * (cardH + cardGap) - menuScroll;
      if (hitRect(pos, 60, cy, 680, cardH) && !r.locked) {
        selectedRecipe = r;
        currentStep = 0;
        tapCount = 0;
        overcookTimer = 0;
        overcookWarning = false;
        state = 'cooking';
        animFrame = 0;
        dialogueIdx = 0;
        dialogueTimer = 0;
        speechBubbleText = r.dialogue[0];
        speechBubbleAlpha = 1;
        playOink();
        playDing();
      }
    });

    // Peppa poke
    if (hitRect(pos, 630, 770, 100, 170)) {
      peppaPokeCount++;
      if (peppaPokeCount >= 10) {
        peppaPokeMsg = "Stop poking me! *oink*";
        peppaPokeTimer = 120;
        peppaPokeCount = 0;
        playOink();
      }
    }

  } else if (state === 'cooking') {
    const step = selectedRecipe.steps[currentStep];
    if (!step) return;

    if (step.type === 'tap') {
      // Check if tapping ingredient area (left side of screen / cutting board area)
      if (hitRect(pos, 60, 350, 200, 200)) {
        ingredientBounce = true;
        setTimeout(() => { ingredientBounce = false; }, 200);
        addSparkles(pos.x, pos.y, 5);
        playChop();
        advanceStep(2);
      }
    } else if (step.type === 'rapid') {
      if (tapCount < step.count) {
        tapCount++;
        const now = Date.now();
        if (now - lastTapTime < 300) {
          playSizzle(0.1);
        }
        lastTapTime = now;
        addSparkles(350 + Math.random() * 100, 450 + Math.random() * 30, 2);

        if (tapCount >= step.count) {
          speechBubbleText = "PERFECT! Now quickly, before it burns!";
          speechBubbleAlpha = 1;
          // Start overcook timer (handled in game loop)
          overcookTimer = 0;
          setTimeout(() => advanceStep(2), 800);
        }
      }
    }

    // Peppa poke in cooking
    if (hitRect(pos, 630, 620, 100, 170)) {
      peppaPokeCount++;
      if (peppaPokeCount >= 10) {
        peppaPokeMsg = "Stop poking me! I'm COOKING! *oink*";
        peppaPokeTimer = 120;
        peppaPokeCount = 0;
        playOink();
      }
    }

  } else if (state === 'rating') {
    // Continue button
    if (animFrame > 80 && hitRect(pos, 280, 720, 240, 60)) {
      state = 'menu';
      animFrame = 0;
      dialogueTimer = 150; // Trigger immediate dialogue
      playDing();
    }
  }
}

function handleSwipe(startPos, endPos) {
  if (state !== 'cooking') return;
  const step = selectedRecipe.steps[currentStep];
  if (!step || step.type !== 'swipe') return;

  const dx = endPos.x - startPos.x;
  const dy = endPos.y - startPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > 40) {
    addSparkles(400, 450, 8);
    playSizzle(0.2);
    advanceStep(2);
  }
}

// Touch / Mouse events
let pointerDown = null;

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  pointerDown = getPos(e);
  touchStartY = pointerDown.y;
  isDragging = false;
});

canvas.addEventListener('pointermove', e => {
  if (!pointerDown) return;
  e.preventDefault();
  const pos = getPos(e);

  // Menu scrolling
  if (state === 'menu') {
    const dy = touchStartY - pos.y;
    if (Math.abs(dy) > 5) {
      isDragging = true;
      menuScroll += dy * 0.5;
      touchStartY = pos.y;
    }
  }
});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  if (!pointerDown) return;
  const endPos = getPos(e);

  if (!isDragging) {
    // Treat as tap or swipe
    const dx = endPos.x - pointerDown.x;
    const dy = endPos.y - pointerDown.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 40) {
      handleSwipe(pointerDown, endPos);
    } else {
      handleTap(e);
    }
  }

  pointerDown = null;
  isDragging = false;
});

canvas.addEventListener('pointercancel', () => {
  pointerDown = null;
  isDragging = false;
});

// Prevent context menu on long press
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ---- Initialize ----
speechBubbleText = "What shall we cook today?";
speechBubbleAlpha = 1;

gameLoop();
</script>
