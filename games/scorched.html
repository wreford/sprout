function update(dt){
  // projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>25)p.trail.shift();
    p.vx+=wind*.02;p.vy+=9.8*dt*3.5;
    p.x+=p.vx;p.y+=p.vy;
    const px2=Math.floor(p.x);
    if(px2>=0&&px2<W&&p.y>=terrain[px2]){
      if(p.type==='roller'){
        p.y=terrain[px2]-1;p.vy=0;
        const nx=Math.max(1,Math.min(W-2,px2+Math.sign(p.vx)));
        const slope=terrain[nx]-terrain[px2];
        p.vx+=slope*.15;p.vx*=.97;
        if(Math.abs(p.vx)<.2){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='digger'){
        // burrow into terrain, carve a tunnel, explode at bottom
        p.digDepth=(p.digDepth||0)+1;
        for(let dd=-3;dd<=3;dd++){const tx3=px2+dd;if(tx3>0&&tx3<W)terrain[tx3]=Math.min(H+10,terrain[tx3]+3);}
        p.y=terrain[px2]-1;p.vy=2;
        for(let k=0;k<3;k++)particles.push({x:p.x+(Math.random()-.5)*6,y:p.y,vx:(Math.random()-.5)*2,vy:-1-Math.random()*3,life:10,color:'#8b6914'});
        if(p.digDepth>8||p.y>H-10){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='lemming'){spawnLemming(p.x,p.y,p.owner,p.weapon.ltype);projectiles.splice(i,1);continue;}
      if(p.type==='bouncer'){
        p.bounces=(p.bounces||p.weapon.bounces||4)-1;
        p.vy=-Math.abs(p.vy)*.6;p.vx*=.8;
        if(p.bounces<=0){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        else{p.y=terrain[px2]-2;sfx('land');}
        continue;
      }
      if(p.type==='flame'){
        for(let fx=-8;fx<=8;fx+=2){const tx2=px2+fx;if(tx2>0&&tx2<W)terrain[tx2]=Math.min(H,terrain[tx2]+1);}
        for(let k=0;k<6;k++)particles.push({x:p.x+(Math.random()-0.5)*16,y:p.y,vx:(Math.random()-.5)*2,vy:-1-Math.random()*2,life:12+Math.random()*8,color:Math.random()>.5?'#f80':'#f00'});
        explode(p.x,p.y,p.weapon,p.owner);
        if(Math.random()<.7){projectiles.push({x:p.x+(Math.random()-.5)*10,y:p.y-3,vx:p.vx*.3+(Math.random()-.5)*2,vy:-1-Math.random()*2,owner:p.owner,weapon:p.weapon,trail:[],type:'flame'});}
        projectiles.splice(i,1);continue;
      }
      if(p.type==='oil'){
        // create oil pool on terrain
        oilPools.push({x:Math.floor(p.x)-15,w:30,burning:false,burnTimer:0});
        for(let k=0;k<8;k++)particles.push({x:p.x+(Math.random()-.5)*20,y:p.y,vx:(Math.random()-.5)*2,vy:-1,life:15,color:'#222'});
        sfx('land');projectiles.splice(i,1);continue;
      }
      if(p.type==='dirtspray'){
        for(let s=0;s<8;s++){const dx2=(Math.random()-.5)*40;const tx2=Math.floor(p.x+dx2);if(tx2>0&&tx2<W)terrain[tx2]=Math.max(H*.1,terrain[tx2]-3-Math.random()*5);}
        for(let k=0;k<10;k++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*4,vy:-2-Math.random()*3,life:15,color:'#8b6914'});
        projectiles.splice(i,1);sfx('explode');continue;
      }
      if(p.type==='dirtmirv'){
        for(let s=0;s<(p.weapon.subs||6);s++){
          projectiles.push({x:p.x,y:p.y-5,vx:(Math.random()-.5)*5,vy:-2-Math.random()*3,owner:p.owner,weapon:{radius:20,damage:0,type:'dirtspray'},trail:[],type:'dirtspray'});
        }
        projectiles.splice(i,1);sfx('explode');continue;
      }
      // check powerup hits
      for(const pu of powerups){if(pu.alive&&Math.hypot(p.x-pu.x,p.y-pu.y)<30){
        pu.alive=false;const owner=players[p.owner];if(owner){pu.type.give(owner);showMsg(pu.type.name+'!',800);}
        for(let k=0;k<6;k++)particles.push({x:pu.x,y:pu.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:12,color:pu.type.color});
      }}
      if(p.trail.length>2){tracers.push({pts:[...p.trail],color:p.type==='deathshead'?'#f00':'#aa8',age:0});if(tracers.length>150)tracers.shift();}
      explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);continue;
    }
    // Death's Head homing after apex
    if(p.type==='deathshead'&&p.vy>0){
      let closest=null,cd=Infinity;
      for(const pl of players){if(!pl.alive||players.indexOf(pl)===p.owner)continue;
        const dd=Math.hypot(pl.x-p.x,pl.y-p.y);if(dd<cd){cd=dd;closest=pl;}}
      if(closest){
        const ha=Math.atan2(closest.y-p.y,closest.x-p.x);
        p.vx+=(Math.cos(ha)*3-p.vx)*.04;
      }
    }
    if(p.x<-100||p.x>W+100||p.y>H+100){
      projectiles.splice(i,1);
      if(Math.random()<.4){const other=players.filter((pl,idx)=>pl.alive&&idx!==p.owner);if(other.length)tankTalk(players.indexOf(other[Math.floor(Math.random()*other.length)]),'miss');}
      continue;
    }
  }
  // lemmings
  for(let i=lemmings.length-1;i>=0;i--){
    const l=lemmings[i];l.timer+=dt;
    l.vy+=6*dt;l.x+=l.vx;l.y+=l.vy;
    const lx=Math.max(0,Math.min(W-1,Math.floor(l.x)));
    if(l.y>=terrain[lx]){
      l.y=terrain[lx];l.vy=0;
      if(l.ltype==='jumper'&&Math.random()<.08)l.vy=-4-Math.random()*3;
      if(Math.random()<.02)l.vx=-l.vx;
    }
    if(l.x<5||l.x>W-5)l.vx=-l.vx;
    // digger: eats terrain as it walks
    if(l.ltype==='digger'){
      if(lx>=0&&lx<W)terrain[lx]=Math.min(H+10,terrain[lx]+dt*20);
      if(lx>0)terrain[lx-1]=Math.min(H+10,terrain[lx-1]+dt*8);
      if(lx<W-1)terrain[lx+1]=Math.min(H+10,terrain[lx+1]+dt*8);
      l.vx*=.5;
    }
    // healer: heals owner's tank
    if(l.ltype==='healer'){
      const ownerP=players[l.owner];
      if(ownerP&&ownerP.alive){
        const hd=Math.hypot(ownerP.x-l.x,ownerP.y-l.y);
        if(hd>15){const ha=Math.atan2(ownerP.y-l.y,ownerP.x-l.x);l.vx=Math.cos(ha)*1.5;}
        if(hd<25){const healRate=ownerP.skillMods?.healBoost?16:8;ownerP.hp=Math.min(ownerP.maxHp||100,ownerP.hp+dt*healRate);
          if(Math.random()<.05)particles.push({x:l.x,y:l.y-8,vx:(Math.random()-.5),vy:-1,life:15,color:'#4ade80'});}
      }
    }
    // bomber/jumper/swarm: attack enemies on contact
    if(l.ltype!=='healer'){
      for(const p of players){
        if(!p.alive||players.indexOf(p)===l.owner)continue;
        if(Math.hypot(p.x-l.x,p.y-l.y)<20){
          explode(l.x,l.y,{radius:l.radius||15,damage:l.damage||20,type:'projectile'},l.owner);
          if(!players[l.owner]?.cpu){stats.lemmingKills++;checkAchievements();}
          sfx('ouch');l.hp=0;break;
        }
      }
    }
    // builder: places terrain steps ahead of it
    if(l.ltype==='builder'){
      l.buildCount=(l.buildCount||0);
      if(l.buildCount<12&&Math.random()<.1){
        const bx2=Math.floor(l.x+l.vx*3);
        if(bx2>0&&bx2<W){terrain[bx2]=Math.min(terrain[bx2],l.y-l.buildCount*2-2);l.buildCount++;}
      }
      if(l.buildCount>=12)l.vx*=.5;
    }
    // blocker: stands still, blocks other lemmings
    if(l.ltype==='blocker'){
      l.vx=0;
      for(const l2 of lemmings){
        if(l2===l)continue;
        if(Math.abs(l2.x-l.x)<8&&Math.abs(l2.y-l.y)<10)l2.vx=-l2.vx;
      }
      for(const bg of bgLemmings){
        if(Math.abs(bg.x-l.x)<8&&Math.abs(bg.y-l.y)<10)bg.vx=-bg.vx;
      }
    }
    // climber: walks up steep terrain walls
    if(l.ltype==='climber'){
      const ahead=Math.floor(l.x+Math.sign(l.vx)*3);
      if(ahead>0&&ahead<W&&terrain[ahead]<l.y-6){
        l.climbing=true;l.y-=dt*40;l.vx*=.3;
      }else{l.climbing=false;}
    }
    if(l.timer>20)l.hp-=dt*2.5;
    if(l.hp<=0||l.y>H+20){
      if(l.ltype==='digger'&&l.hp<=0)explode(l.x,l.y,{radius:20,damage:25,type:'projectile'},l.owner);
      lemmings.splice(i,1);
    }
  }
  // background lemmings (decorative)
  for(const bg of bgLemmings){
    bg.timer+=dt;bg.x+=bg.vx;
    const bx2=Math.max(0,Math.min(W-1,Math.floor(bg.x)));
    bg.y=terrain[bx2];
    if(bg.x<5||bg.x>W-5)bg.vx=-bg.vx;
    bg.stateTimer=(bg.stateTimer||0)+dt;
    if(bg.job==='settler')bg.vx*=.99;
    if(bg.job==='campfire'){bg.vx=0;}
    if(bg.job==='flagbearer'){if(bg.x<30||bg.x>W-30)bg.vx=-bg.vx;}
    if(bg.job==='panicker'){if(Math.random()<.03)bg.vx=-bg.vx;bg.vx+=(Math.random()-.5)*.1;}
    if(bg.job==='photographer'){bg.vx=0;}
    if(bg.job==='dancer'){bg.vx=Math.sin(bg.stateTimer*3)*.3;}
    if(bg.job==='fisherman'){bg.vx=0;}
    if(bg.job==='prospector'){
      if(Math.random()<.01)bg.vx=-bg.vx;
      // actually build terrain (tiny amounts)
      const px3=Math.floor(bg.x+bg.vx*3);
      if(px3>0&&px3<W&&Math.random()<.02)terrain[px3]=Math.max(terrain[px3]-1,H*.2);
    }
  }
  // graboids (sand worms - tunnel through terrain)
  for(const gb of graboids){
    gb.timer+=dt;
    if(gb.underground){
      // tunnel: actually carve terrain as worm moves
      gb.x+=gb.dir*1.5;
      if(gb.x<20||gb.x>W-20)gb.dir=-gb.dir;
      const gx=Math.max(1,Math.min(W-2,Math.floor(gb.x)));
      // carve tunnel trail
      if(Math.random()<.3){terrain[gx]=Math.min(H,terrain[gx]+.5);
        if(gx>1)terrain[gx-1]=Math.min(H,terrain[gx-1]+.3);
        if(gx<W-2)terrain[gx+1]=Math.min(H,terrain[gx+1]+.3);
      }
      // surface ripple particles
      if(Math.random()<.08){
        const gy=terrain[gx];
        particles.push({x:gb.x+(Math.random()-.5)*6,y:gy,vx:0,vy:-1,life:8,color:'#8b6914'});
      }
      // hunt nearest player
      let closest=null,cd=Infinity;
      for(const p of players){if(!p.alive)continue;const d=Math.abs(p.x-gb.x);if(d<cd){cd=d;closest=p;}}
      if(closest&&cd<60)gb.dir=Math.sign(closest.x-gb.x)*(.5+Math.random()*.3);
      // emerge near player
      if(closest&&cd<20&&Math.random()<.02+round*.003){
        gb.underground=false;gb.surfaceTimer=2.5;sfx('ouch');
        const gy=terrain[gx];
        for(const p of players){if(!p.alive)continue;if(Math.abs(p.x-gb.x)<25){
          p.hp-=12+round;showMsg('SAND WORM!',1000);sfx('hit');
          if(p.hp<=0){p.hp=0;p.alive=false;skulls.push({x:p.x,y:p.y-15,life:120});}
        }}
        // burst crater
        for(let dx=-15;dx<=15;dx++){const tx=gx+dx;if(tx>0&&tx<W)terrain[tx]=Math.min(H,terrain[tx]+4);}
        for(let k=0;k<15;k++)particles.push({x:gb.x+(Math.random()-.5)*25,y:gy,vx:(Math.random()-.5)*4,vy:-3-Math.random()*5,life:25,color:'#a08040'});
      }
    }else{
      gb.surfaceTimer-=dt;
      if(gb.surfaceTimer<=0){gb.underground=true;gb.dir=(Math.random()>.5?1:-1)*(.4+Math.random()*.4);}
    }
  }
  // water settles into terrain valleys (real physics)
  for(const wp of waterPools){
    // expand water to fill low spots
    const lx=Math.max(1,wp.x),rx=Math.min(W-2,wp.x+wp.w);
    if(lx>1&&terrain[lx-1]<terrain[lx]+2){wp.x--;wp.w++;}
    if(rx<W-2&&terrain[rx+1]<terrain[rx]+2){wp.w++;}
    // slow terrain erosion under water
    for(let x=wp.x;x<Math.min(W-1,wp.x+wp.w);x++){
      if(terrain[x]>0)terrain[x]+=dt*.1;
    }
  }
  // oil pools persist, flow downhill, ignite from fire
  for(let oi=oilPools.length-1;oi>=0;oi--){
    const op=oilPools[oi];
    // oil flows downhill slowly
    const olx=Math.max(1,op.x),orx=Math.min(W-2,op.x+op.w);
    if(olx>1&&terrain[olx-1]>terrain[olx]+1){op.x--;op.w++;}
    if(orx<W-2&&terrain[orx+1]>terrain[orx]+1){op.w++;}
    if(op.burning){
      op.burnTimer-=dt;
      // damage anyone standing in oil
      for(const p of players){if(!p.alive)continue;
        if(Math.abs(p.x-op.x)<op.w/2){p.hp-=dt*8;if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');skulls.push({x:p.x,y:p.y-15,life:120});}}}
      // fire particles
      for(let fx=op.x;fx<op.x+op.w;fx+=4){
        if(Math.random()<.15){const ty2=terrain[Math.max(0,Math.min(W-1,fx))];
          particles.push({x:fx,y:ty2,vx:(Math.random()-.5)*.5,vy:-1-Math.random(),life:15+Math.random()*10,color:['#f00','#f40','#f80','#ff0'][Math.floor(Math.random()*4)]});}
      }
      if(op.burnTimer<=0)oilPools.splice(oi,1);
    }else{
      // check if fire particle is near oil
      for(const pt of particles){
        if((pt.color==='#f00'||pt.color==='#f40'||pt.color==='#f80')&&Math.abs(pt.x-op.x-op.w/2)<op.w/2+10){
          op.burning=true;op.burnTimer=5+Math.random()*3;sfx('sizzle');showMsg('OIL FIRE!',1500);break;
        }
      }
    }
  }
  // camera monster update
  if(camMonster&&camMonster.hp>0){
    camMonster.timer+=dt;camMonster.shootCD=Math.max(0,camMonster.shootCD-dt);
    camMonster.x+=camMonster.dir;
    if(camMonster.x<20||camMonster.x>W-20)camMonster.dir=-camMonster.dir;
    const cmx=Math.max(0,Math.min(W-1,Math.floor(camMonster.x)));
    camMonster.y=terrain[cmx]-20;
    // shoot at nearest player
    if(camMonster.shootCD<=0){
      camMonster.shootCD=4+Math.random()*2;
      const targets=players.filter(p=>p.alive);
      if(targets.length){
        const t=targets[Math.floor(Math.random()*targets.length)];
        const a=Math.atan2(t.y-camMonster.y,t.x-camMonster.x);
        projectiles.push({x:camMonster.x,y:camMonster.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,
          owner:-1,weapon:{radius:20,damage:15+round,type:'projectile'},trail:[],type:'projectile'});
        sfx('fire');
      }
    }
  }
  // boss update
  if(boss&&boss.alive){
    boss.timer+=dt;boss.shootCD=Math.max(0,boss.shootCD-dt);
    // boss shoots at random player every 3-5 seconds
    if(boss.shootCD<=0){
      boss.shootCD=3+Math.random()*2;
      const targets=players.filter(p=>p.alive);
      if(targets.length){
        const t=targets[Math.floor(Math.random()*targets.length)];
        const ba=Math.atan2(t.y-boss.y,t.x-boss.x);
        projectiles.push({x:boss.x,y:boss.y,vx:Math.cos(ba)*4,vy:Math.sin(ba)*4,
          owner:-1,weapon:{radius:boss.radius,damage:Math.floor(boss.damage*(1+round*.05)),type:'projectile'},
          trail:[],type:'projectile'});
        sfx('fire');
        if(Math.random()<.3)showMsg(boss.name+' attacks!',1000);
      }
    }
    // check if boss got hit by explosions (handled in explode via players check — add boss as hittable)
    const bx2=Math.max(0,Math.min(W-1,Math.floor(boss.x)));
    boss.y=boss.shape==='blimp_boss'?H*.1+Math.sin(boss.timer)*3:terrain[bx2]-15;
  }
  // stilts timer
  for(const p of players){if(p.stilts&&p.stiltsTimer!==undefined){p.stiltsTimer-=dt;if(p.stiltsTimer<=0)p.stilts=false;}}
  // check if all projectiles done
  if(gameState==='flying'&&projectiles.length===0&&lemmings.filter(l=>l.timer<2).length===0){
    gameState='waiting';setTimeout(nextTurn,400);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=explosions.length-1;i>=0;i--){explosions[i].life--;if(explosions[i].life<=0)explosions.splice(i,1);}
  for(let i=skulls.length-1;i>=0;i--){skulls[i].life--;skulls[i].y-=.1;if(skulls[i].life<=0)skulls.splice(i,1);}
  // random camera snapshots during gameplay
  // snap photo during big moments
  if(camReady&&!gamePhoto){
    if(shakeLife>4||Math.random()<.005)snapGamePhoto();
  }
  // gem earning (idle = passive, always = on events)
  if(idleMode){
    idleGemTimer+=dt;
    if(idleGemTimer>8){idleGemTimer=0;stats.idleGems=(stats.idleGems||0)+1;saveStats();}
  }
  const gh=document.getElementById('idleGemHud');if(gh)gh.textContent=stats.idleGems||0;
  // settle tanks + fall damage
  for(const p of players){
    if(!p.alive)continue;
    if(p.tank?.floats){
      // rubber-band: always drift toward nearest enemy so airship is reachable
      let nearD=Infinity,nearX=W/2;
      for(const o of players){if(o===p||!o.alive)continue;const d=Math.abs(o.x-p.x);if(d<nearD){nearD=d;nearX=o.x;}}
      const target=nearX+(Math.random()-.5)*40;
      p.x+=(target-p.x)*dt*.5;
      p.x=Math.max(30,Math.min(W-30,p.x));
      p.y=H*.3+Math.sin(performance.now()*.001+p.x)*5;
      continue;
    }
    if(p.tank?.immobile&&p.y<H*.5){continue;}
    const tx=Math.max(0,Math.min(W-1,Math.floor(p.x)));
    const newY=terrain[tx];
    const fall=newY-p.y;
    if(fall>8&&!p.tank?.floats){
      if(!p.stilts){
        const dmg=Math.floor(fall*.3);
        if(dmg>0){p.hp-=dmg;sfx('land');
          if(Math.random()<.3)tankTalk(players.indexOf(p),'hit');
          if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');showMsg(p.name+' fell to death!',1500);skulls.push({x:p.x,y:p.y-15,life:120});}
        }
      }
    }
    p.y=newY;
    if(p.shield>0)p.shield-=dt;
  }
}

function render(){
  ctx.imageSmoothingEnabled=false;
  // screen shake
  if(shakeLife>0){shakeX=(Math.random()-.5)*shakeLife;shakeY=(Math.random()-.5)*shakeLife;shakeLife-=.5;}
  else{shakeX=0;shakeY=0;}
  ctx.save();ctx.translate(shakeX,shakeY);

  // pixelated camera background (DOS CRT style)
  if(camOn&&camReady&&camVideo&&camVideo.readyState>=2){
    const pc=camPixBuf.getContext('2d');
    pc.save();pc.translate(40,0);pc.scale(-1,1);
    pc.drawImage(camVideo,0,0,40,30);pc.restore();
    // posterize to DOS palette
    const pid=pc.getImageData(0,0,40,30),pd=pid.data;
    for(let i=0;i<pd.length;i+=4){
      pd[i]=Math.floor(pd[i]/32)*32;pd[i+1]=Math.floor(pd[i+1]/32)*32;pd[i+2]=Math.floor(pd[i+2]/32)*32;
      pd[i+3]=camOpacity;
    }
    pc.putImageData(pid,0,0);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(camPixBuf,0,0,W,H);
  }
  // Pixel art sky — stepped color bands, no smooth gradients
  ctx.globalAlpha=(camOn&&camReady)?.65:1;
  const bg=BACKGROUNDS[bgIdx]||BACKGROUNDS[0];
  const skyColors=bg.sky;
  const bandH=Math.ceil(H*.6/skyColors.length);
  for(let i=0;i<skyColors.length;i++){ctx.fillStyle=skyColors[i];ctx.fillRect(0,i*bandH,W,bandH+1);}
  // fill below sky
  ctx.fillStyle=skyColors[skyColors.length-1];ctx.fillRect(0,skyColors.length*bandH,W,H);
  ctx.globalAlpha=1;

  // Pixel art terrain — hard banded layers
  const gc=floorType?floorType.color:bg.ground;
  const gs=bg.groundSub||['#50b028','#389018','#286010','#206008','#185004','#103004'];
  // top surface fill
  ctx.fillStyle=gc;
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  // hard sub-layers (pixel bands, no gradients)
  for(let s=0;s<gs.length;s++){
    ctx.fillStyle=gs[s];
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]+4+s*6);
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }
  // 1px bright edge (crisp pixel highlight)
  ctx.strokeStyle=shade(gc,60);ctx.lineWidth=1;
  ctx.beginPath();for(let x=0;x<W;x++)x===0?ctx.moveTo(x,terrain[x]):ctx.lineTo(x,terrain[x]);ctx.stroke();
  // pixel grass tufts (every few pixels, hard edges)
  ctx.fillStyle=shade(gc,40);
  for(let x=3;x<W;x+=7){
    const ty=Math.floor(terrain[x]);if(ty>=H)continue;
    ctx.fillRect(x,ty-2,1,2);
    if((x*13)%17<3){ctx.fillRect(x-1,ty-3,1,3);ctx.fillRect(x+1,ty-2,1,2);}
  }
  // occasional pixel flowers
  for(let x=10;x<W;x+=35){
    const ty=Math.floor(terrain[x]);if(ty>=H)continue;
    ctx.fillStyle=['#f66','#ff4','#66f','#f6f'][(x/35|0)%4];
    ctx.fillRect(x,ty-3,2,2);
    ctx.fillStyle=shade(gc,20);ctx.fillRect(x,ty-1,1,1);
  }

  // water pools (shimmering blue on terrain)
  for(const wp of waterPools){
    for(let x=wp.x;x<Math.min(W,wp.x+wp.w);x++){
      const ty2=terrain[Math.max(0,Math.min(W-1,x))];
      const shimmer=Math.sin(performance.now()*.003+x*.1)*.3+.5;
      ctx.globalAlpha=.4*shimmer;
      ctx.fillStyle='#4080c0';ctx.fillRect(x,ty2-2,1,3);
      ctx.fillStyle='#80c0ff';ctx.fillRect(x,ty2-1,1,1);
    }
    ctx.globalAlpha=1;
  }
  // oil pools (dark shiny puddles)
  for(const op of oilPools){
    for(let x=op.x;x<Math.min(W,op.x+op.w);x++){
      const ty2=terrain[Math.max(0,Math.min(W-1,x))];
      ctx.globalAlpha=op.burning?.6:.4;
      ctx.fillStyle=op.burning?'#f40':'#1a1a1a';ctx.fillRect(x,ty2-2,1,3);
      if(!op.burning){
        const rainbow=Math.sin(performance.now()*.002+x*.2);
        ctx.globalAlpha=.15;ctx.fillStyle=rainbow>.3?'#408':'#048';ctx.fillRect(x,ty2-1,1,1);
      }
    }
    ctx.globalAlpha=1;
  }
  // floating powerups (Contra-style)
  for(const pu of powerups){
    if(!pu.alive)continue;
    const bob=Math.sin(performance.now()*.003+pu.bobPhase)*4;
    const px3=pu.x,py3=pu.y+bob;
    // eagle/falcon icon box (like Contra)
    ctx.fillStyle='#222';ctx.fillRect(px3-8,py3-8,16,16);
    ctx.strokeStyle=pu.type.color;ctx.lineWidth=1;ctx.strokeRect(px3-8,py3-8,16,16);
    // letter
    ctx.fillStyle=pu.type.color;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pu.type.letter,px3,py3);
    // glow pulse
    const pulse=Math.sin(performance.now()*.005+pu.bobPhase)*.3+.3;
    ctx.globalAlpha=pulse;ctx.fillStyle=pu.type.color;ctx.fillRect(px3-10,py3-10,20,20);
    ctx.globalAlpha=1;
  }

  // background lemmings (decorative, behind tanks)
  for(const bg of bgLemmings){
    const lp=Math.sin(bg.timer*8);
    const bx=bg.x,by=bg.y,dir=bg.vx>0?1:-1;
    ctx.fillStyle='#0a0';ctx.fillRect(bx-1,by-9,2,1);
    ctx.fillStyle=bg.color;
    ctx.fillRect(bx-1,by-8,3,2);
    ctx.fillStyle='#000';ctx.fillRect(bx+dir*.5,by-7,.5,.5);
    if(bg.job==='settler'){
      // sitting by a tiny tent
      ctx.fillStyle='#a86';ctx.beginPath();ctx.moveTo(bx-4,by);ctx.lineTo(bx,by-6);ctx.lineTo(bx+4,by);ctx.fill();
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1,by-4,2,4);
      ctx.fillRect(bx+5,by-3,1,3);
    }else if(bg.job==='campfire'){
      // sitting by fire
      ctx.fillStyle=bg.color;ctx.fillRect(bx-4,by-4,2,4);ctx.fillRect(bx+3,by-4,2,4);
      // fire
      ctx.fillStyle='#f80';ctx.fillRect(bx-1,by-3,3,3);
      ctx.fillStyle='#ff0';ctx.fillRect(bx,by-5+Math.sin(bg.stateTimer*8),1,2);
      ctx.fillStyle='#f00';ctx.fillRect(bx-1,by-2,3,1);
      // smoke
      ctx.fillStyle='#555';ctx.globalAlpha=.4;
      ctx.fillRect(bx+Math.sin(bg.stateTimer*2),by-7-bg.stateTimer%3,1,1);
      ctx.globalAlpha=1;
    }else if(bg.job==='flagbearer'){
      // marching with flag
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillRect(bx-1,by-2,1,1+lp);ctx.fillRect(bx+1,by-2,1,1-lp);
      // flag pole + flag
      ctx.fillStyle='#888';ctx.fillRect(bx+dir*2,by-12,1,10);
      ctx.fillStyle='#f00';ctx.fillRect(bx+dir*2,by-12,dir*4,3);
      ctx.fillStyle='#ff0';ctx.fillRect(bx+dir*3,by-11,1,1);
    }else if(bg.job==='panicker'){
      // running with arms up
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillRect(bx-2,by-8+Math.abs(lp),1,2);ctx.fillRect(bx+2,by-8+Math.abs(lp),1,2);
      ctx.fillRect(bx-1,by-2,1,1+lp*1.5);ctx.fillRect(bx+1,by-2,1,1-lp*1.5);
      // exclamation
      ctx.fillStyle='#f00';ctx.fillRect(bx,by-11,1,2);ctx.fillRect(bx,by-8,1,1);
    }else if(bg.job==='photographer'){
      // standing with camera
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1,by-6,3,5);
      ctx.fillStyle='#333';ctx.fillRect(bx+dir*2,by-6,3,2);
      ctx.fillStyle='#f00';ctx.fillRect(bx+dir*2,by-5,1,1);
      ctx.fillRect(bx-1,by-1,1,1);ctx.fillRect(bx+1,by-1,1,1);
      // flash
      if(Math.sin(bg.stateTimer*2)>.95){ctx.fillStyle='#ff0';ctx.fillRect(bx+dir*3,by-7,2,1);}
    }else if(bg.job==='dancer'){
      // swaying back and forth
      const sw=Math.sin(bg.stateTimer*4)*2;
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1+sw,by-7,3,5);
      ctx.fillRect(bx-2,by-2,1,2);ctx.fillRect(bx+2,by-2,1,2);
      ctx.fillRect(bx-2+sw,by-9,1,2);ctx.fillRect(bx+2+sw,by-9,1,2);
    }else if(bg.job==='fisherman'){
      // sitting with fishing rod over edge
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1,by-4,2,4);
      ctx.strokeStyle='#864';ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(bx+1,by-4);ctx.lineTo(bx+8,by-10);ctx.lineTo(bx+10,by-5+Math.sin(bg.stateTimer*1.5)*2);ctx.stroke();
      ctx.fillStyle='#aaa';ctx.fillRect(bx+9,by-5+Math.sin(bg.stateTimer*1.5)*2,2,1);
    }else if(bg.job==='prospector'){
      // digging with pickaxe
      ctx.fillStyle=bg.color;ctx.fillRect(bx-1,by-6,3,5);
      ctx.fillRect(bx-1,by-1,1,1+lp);ctx.fillRect(bx+1,by-1,1,1-lp);
      ctx.strokeStyle='#888';ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(bx+dir*2,by-6);ctx.lineTo(bx+dir*5,by-9+Math.abs(Math.sin(bg.stateTimer*3))*4);ctx.stroke();
      // gold sparkle
      if(Math.random()<.02){ctx.fillStyle='#ff0';ctx.fillRect(bx+dir*4,by-1,1,1);}
    }
  }

  // old tracers (fade with age)
  for(const tr of tracers){
    ctx.globalAlpha=Math.max(.03,.2-tr.age*.03);
    ctx.strokeStyle=tr.color;ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<tr.pts.length;i++)i===0?ctx.moveTo(tr.pts[i].x,tr.pts[i].y):ctx.lineTo(tr.pts[i].x,tr.pts[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // aim line
  if(gameState==='aiming'){
    const p=players[currentPlayer];
    if(p&&p.alive){
      const rad=p.angle*Math.PI/180,len=p.power*.5;
      // dotted aim line
      ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(p.x,p.y-12);ctx.lineTo(p.x+Math.cos(rad)*len,p.y-12-Math.sin(rad)*len);ctx.stroke();ctx.setLineDash([]);
      // power dots along line
      for(let d=10;d<len;d+=12){
        const dotA=d/len;
        ctx.fillStyle=dotA>.7?'#f00':dotA>.4?'#ff0':'#0f0';
        ctx.fillRect(p.x+Math.cos(rad)*d-1,p.y-12-Math.sin(rad)*d-1,2,2);
      }
      // crosshair at end
      const ex=p.x+Math.cos(rad)*len,ey=p.y-12-Math.sin(rad)*len;
      ctx.strokeStyle=p.color;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(ex-4,ey);ctx.lineTo(ex+4,ey);ctx.moveTo(ex,ey-4);ctx.lineTo(ex,ey+4);ctx.stroke();
    }
  }

  // graboids (same size underground and surfaced)
  for(const gb of graboids){
    const gx=gb.x,gy=terrain[Math.max(0,Math.min(W-1,Math.floor(gx)))];
    // body (always same size)
    ctx.fillStyle='#c08040';
    ctx.fillRect(gx-6,gy-20,12,20);ctx.fillRect(gx-8,gy-12,16,8);
    ctx.fillStyle='#a06830';ctx.fillRect(gx-6,gy-18,12,2);ctx.fillRect(gx-6,gy-14,12,2);
    // mouth + eyes
    ctx.fillStyle='#f44';ctx.fillRect(gx-4,gy-20,8,4);
    ctx.fillStyle='#ff0';ctx.fillRect(gx-2,gy-18,1,2);ctx.fillRect(gx+2,gy-18,1,2);
    // tentacles
    ctx.strokeStyle='#d09050';ctx.lineWidth=1;
    for(let t=0;t<3;t++){
      const ta=Math.sin(performance.now()*.008+t*2)*6;
      ctx.beginPath();ctx.moveTo(gx-3+t*3,gy-20);ctx.lineTo(gx-5+t*4+ta,gy-28);ctx.stroke();
    }
    if(gb.underground){
      // tunneling: body partially buried, dirt over lower half
      ctx.fillStyle=floorType?floorType.color:'#40a020';ctx.globalAlpha=.7;
      ctx.fillRect(gx-10,gy-8,20,10);
      ctx.globalAlpha=1;
      // dirt spray from digging
      ctx.fillStyle='#8b6914';
      const spray=Math.sin(performance.now()*.015+gx)*3;
      ctx.fillRect(gx-3+spray,gy-22,2,3);ctx.fillRect(gx+1-spray,gy-24,2,2);
    }
  }

  // camera monster rendering
  if(camMonster&&camMonster.hp>0){
    const cmx=camMonster.x,cmy=camMonster.y;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(camMonster.canvas,cmx-18,cmy-18,36,36);
    ctx.imageSmoothingEnabled=true;
    // red border glow
    ctx.strokeStyle='#f00';ctx.lineWidth=2;ctx.strokeRect(cmx-18,cmy-18,36,36);
    // HP bar
    ctx.fillStyle='#400';ctx.fillRect(cmx-18,cmy-22,36,3);
    ctx.fillStyle='#f0f';ctx.fillRect(cmx-18,cmy-22,Math.floor(36*camMonster.hp/camMonster.maxHp),3);
    ctx.fillStyle='#f0f';ctx.font='6px monospace';ctx.textAlign='center';ctx.fillText('YOUR FACE',cmx,cmy-24);
  }

  // boss rendering
  if(boss&&boss.alive){
    const bx=boss.x,by=boss.y;
    ctx.fillStyle=boss.color;
    if(boss.shape==='worm'){
      ctx.fillRect(bx-18,by-30,36,30);ctx.fillRect(bx-22,by-20,44,15);
      ctx.fillStyle='#ff0';ctx.fillRect(bx-10,by-35,20,5);ctx.fillRect(bx-10,by-38,4,4);ctx.fillRect(bx+6,by-38,4,4);
      ctx.fillStyle='#f00';ctx.fillRect(bx-7,by-25,4,4);ctx.fillRect(bx+3,by-25,4,4);
      ctx.fillStyle='#fff';for(let t=-6;t<=6;t+=3)ctx.fillRect(bx+t,by-15,2,3);
    }else if(boss.shape==='mech'){
      ctx.fillRect(bx-12,by-22,24,20);ctx.fillStyle='#0ff';ctx.fillRect(bx-8,by-30,16,10);
      ctx.fillStyle='#0f0';ctx.fillRect(bx-5,by-35,10,4);
      ctx.fillStyle='#f00';ctx.fillRect(bx-2,by-18,4,4);
      ctx.fillStyle='#666';ctx.fillRect(bx-18,by-20,6,14);ctx.fillRect(bx+12,by-20,6,14);
    }else if(boss.shape==='blimp_boss'){
      ctx.fillStyle='#555';ctx.beginPath();ctx.ellipse(bx,by-8,30,14,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#800';ctx.fillRect(bx-24,by-10,48,3);
      ctx.fillStyle='#fff';ctx.fillRect(bx-4,by-13,8,6);ctx.fillStyle='#000';ctx.fillRect(bx-2,by-12,2,2);ctx.fillRect(bx+1,by-12,2,2);
      ctx.fillStyle='#444';ctx.fillRect(bx-6,by+5,12,6);
    }else if(boss.shape==='golem'){
      ctx.fillRect(bx-16,by-28,32,26);ctx.fillStyle='#ff0';ctx.fillRect(bx-3,by-20,6,6);
      ctx.fillStyle='#f00';ctx.fillRect(bx-5,by-32,4,3);ctx.fillRect(bx+1,by-32,4,3);
      ctx.fillRect(bx-22,by-22,8,16);ctx.fillRect(bx+14,by-22,8,16);
    }else if(boss.shape==='skull'){
      ctx.fillStyle='#eee';ctx.fillRect(bx-10,by-30,20,18);
      ctx.fillStyle='#000';ctx.fillRect(bx-6,by-27,5,5);ctx.fillRect(bx+1,by-27,5,5);
      ctx.fillStyle='#f0f';ctx.fillRect(bx-5,by-26,3,3);ctx.fillRect(bx+2,by-26,3,3);
      ctx.fillStyle='#206';ctx.fillRect(bx-12,by-12,24,16);
      ctx.fillStyle='#f0f';ctx.fillRect(bx-12,by-34,4,6);ctx.fillRect(bx+8,by-34,4,6);
    }else if(boss.shape==='hydra'){
      ctx.fillStyle='#444';ctx.fillRect(bx-24,by-3,48,6);
      ctx.fillStyle='#800';ctx.fillRect(bx-18,by-14,36,12);
      ctx.fillStyle='#a00';
      [-12,0,12].forEach(dx=>{ctx.fillRect(bx+dx-4,by-20,8,7);ctx.fillStyle='#ff0';ctx.fillRect(bx+dx-2,by-18,2,2);ctx.fillRect(bx+dx+1,by-18,2,2);ctx.fillStyle='#a00';});
    }
    // HP bar
    ctx.fillStyle='#400';ctx.fillRect(bx-20,by-40,40,3);
    ctx.fillStyle='#f00';ctx.fillRect(bx-20,by-40,Math.floor(40*boss.hp/boss.maxHp),3);
    ctx.fillStyle='#ff0';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText(boss.name,bx,by-43);
  }

  // dead tank wreckage
  for(const p of players){
    if(p.alive)continue;
    const tx=p.x,ty=terrain[Math.max(0,Math.min(W-1,Math.floor(p.x)))];
    ctx.fillStyle='#333';ctx.fillRect(tx-8,ty-3,16,3);
    ctx.fillStyle='#222';ctx.fillRect(tx-5,ty-5,10,3);
    ctx.fillStyle='#444';ctx.fillRect(tx-3,ty-2,2,2);ctx.fillRect(tx+2,ty-2,2,2);
  }

  // shade helper: lighten/darken hex color
  function shade(hex,amt){
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,Math.min(255,r+amt));g=Math.max(0,Math.min(255,g+amt));b=Math.max(0,Math.min(255,b+amt));
    return'#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }
  // tanks (unique per class, multi-shade)
  for(const p of players){
    if(!p.alive)continue;
    const tx=p.x;
    const stiltH=p.stilts?20:0;
    const ty=p.y-stiltH;
    const shape=p.tank?.shape||'box';
    const c=p.color,cL=shade(c,40),cD=shade(c,-40),cDD=shade(c,-80);
    // stilts
    if(p.stilts){
      ctx.strokeStyle='#888';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(tx-6,p.y);ctx.lineTo(tx-4,ty);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx+6,p.y);ctx.lineTo(tx+4,ty);ctx.stroke();
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx-5,p.y-stiltH*.5);ctx.lineTo(tx+5,p.y-stiltH*.5);ctx.stroke();
    }
    // shield (circular, fades white→black with damage)
    if(p.shield>0){
      const shieldFrac=Math.min(1,p.shield/60);
      const sr=Math.floor(shieldFrac*200+55);
      ctx.strokeStyle='rgb('+sr+','+sr+','+sr+')';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(tx,ty-5,12,0,Math.PI*2);ctx.stroke();
      if(shieldFrac>.5){ctx.strokeStyle='rgba(255,255,255,'+(shieldFrac-.5)*.3+')';ctx.beginPath();ctx.arc(tx,ty-5,10,0,Math.PI*2);ctx.stroke();}
    }
    // treads (smaller, tight)
    ctx.fillStyle='#3a3a3a';
    if(shape==='wide'){ctx.fillRect(tx-10,ty-2,20,3);ctx.fillStyle='#2a2a2a';for(let wx=-9;wx<=9;wx+=3)ctx.fillRect(tx+wx,ty-1,2,2);ctx.fillStyle='#4a4a4a';ctx.fillRect(tx-10,ty-2,20,1);}
    else if(shape==='slim'){ctx.fillRect(tx-5,ty-1,10,2);ctx.fillStyle='#2a2a2a';for(let wx=-4;wx<=4;wx+=3)ctx.fillRect(tx+wx,ty,1,1);ctx.fillStyle='#4a4a4a';ctx.fillRect(tx-5,ty-1,10,1);}
    else if(shape==='long'){ctx.fillRect(tx-9,ty-2,18,3);ctx.fillStyle='#2a2a2a';for(let wx=-8;wx<=8;wx+=3)ctx.fillRect(tx+wx,ty-1,2,2);ctx.fillStyle='#4a4a4a';ctx.fillRect(tx-9,ty-2,18,1);}
    else if(shape!=='blimp'&&shape!=='tower'){ctx.fillRect(tx-7,ty-2,14,3);ctx.fillStyle='#2a2a2a';for(let wx=-6;wx<=6;wx+=3)ctx.fillRect(tx+wx,ty-1,2,2);ctx.fillStyle='#4a4a4a';ctx.fillRect(tx-7,ty-2,14,1);}
    // body (multi-shade per shape)
    if(shape==='wide'){
      ctx.fillStyle=c;ctx.fillRect(tx-8,ty-5,16,4);
      ctx.fillStyle=cL;ctx.fillRect(tx-8,ty-5,16,1);
      ctx.fillStyle=cD;ctx.fillRect(tx-8,ty-2,16,1);
      ctx.fillStyle=c;ctx.fillRect(tx-6,ty-8,12,3);
      ctx.fillStyle=cL;ctx.fillRect(tx-6,ty-8,12,1);
      ctx.fillStyle=cDD;ctx.fillRect(tx-8,ty-5,1,4);ctx.fillRect(tx+7,ty-5,1,4);
    }else if(shape==='slim'){
      ctx.fillStyle=c;ctx.fillRect(tx-4,ty-7,8,6);
      ctx.fillStyle=cL;ctx.fillRect(tx-4,ty-7,8,1);ctx.fillRect(tx-4,ty-7,1,6);
      ctx.fillStyle=cD;ctx.fillRect(tx+3,ty-7,1,6);
      ctx.fillStyle=c;ctx.fillRect(tx-3,ty-10,6,3);
      ctx.fillStyle=cL;ctx.fillRect(tx-3,ty-10,6,1);
      ctx.fillStyle='#fff';ctx.fillRect(tx+2,ty-13,1,3);ctx.fillRect(tx+1,ty-13,2,1);
    }else if(shape==='long'){
      ctx.fillStyle=c;ctx.fillRect(tx-8,ty-5,16,4);
      ctx.fillStyle=cL;ctx.fillRect(tx-8,ty-5,16,1);
      ctx.fillStyle=cD;ctx.fillRect(tx-8,ty-2,16,1);
      ctx.fillStyle=c;ctx.fillRect(tx-5,ty-8,10,4);
      ctx.fillStyle=cL;ctx.fillRect(tx-5,ty-8,10,1);
      ctx.fillStyle=cDD;ctx.fillRect(tx+3,ty-8,2,4);
    }else if(shape==='dome'){
      ctx.fillStyle=c;ctx.fillRect(tx-6,ty-5,12,4);
      ctx.fillStyle=cL;ctx.fillRect(tx-6,ty-5,12,1);
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(tx,ty-7,4,Math.PI,0);ctx.fill();
      ctx.fillStyle=cL;ctx.beginPath();ctx.arc(tx,ty-8,3,Math.PI,0);ctx.fill();
      ctx.fillStyle=c;ctx.beginPath();ctx.arc(tx,ty-7,2.5,Math.PI,0);ctx.fill();
      ctx.fillStyle='#ff0';ctx.fillRect(tx-5,ty-3,1,1);ctx.fillRect(tx+4,ty-3,1,1);
      ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(tx-6,ty-7);ctx.lineTo(tx-9,ty-10);ctx.stroke();
      ctx.fillStyle='#ccc';ctx.fillRect(tx-10,ty-11,2,2);
    }else if(shape==='spike'){
      ctx.fillStyle=cD;ctx.fillRect(tx-7,ty-6,14,4);
      ctx.fillStyle=c;ctx.fillRect(tx-7,ty-6,14,1);
      ctx.fillStyle=cD;ctx.fillRect(tx-4,ty-9,8,4);
      ctx.fillStyle=c;ctx.fillRect(tx-4,ty-9,8,1);
      ctx.fillStyle='#f00';
      ctx.beginPath();ctx.moveTo(tx-7,ty-6);ctx.lineTo(tx-10,ty-10);ctx.lineTo(tx-5,ty-6);ctx.fill();
      ctx.beginPath();ctx.moveTo(tx+7,ty-6);ctx.lineTo(tx+10,ty-10);ctx.lineTo(tx+5,ty-6);ctx.fill();
      ctx.fillStyle='#c00';ctx.fillRect(tx-1,ty-12,2,3);
      ctx.fillStyle='#f00';ctx.fillRect(tx-2,ty-8,2,1);ctx.fillRect(tx+1,ty-8,2,1);
      ctx.fillStyle='#fff';for(let t=-3;t<=3;t+=2)ctx.fillRect(tx+t,ty-5,1,1);
    }else if(shape==='twin'){
      ctx.fillRect(tx-5,ty-5,10,4);ctx.fillRect(tx-3,ty-8,6,4);
      ctx.fillStyle=cL;ctx.fillRect(tx-5,ty-5,10,1);
      ctx.fillStyle=p.tank?.color2||'#886';ctx.fillRect(tx-1,ty-5,2,1);
    }else if(shape==='rail'){
      ctx.fillRect(tx-7,ty-4,14,3);ctx.fillRect(tx-4,ty-8,8,5);
      ctx.fillStyle='#0af';
      const charge=p.chargeCount||0;
      if(charge>0){for(let rc=0;rc<2;rc++)ctx.fillRect(tx-3+rc*3,ty-8,2,4);}
      ctx.fillStyle=cL;ctx.fillRect(tx-7,ty-4,14,1);
      ctx.fillStyle=cDD;ctx.fillRect(tx-7,ty-2,1,2);ctx.fillRect(tx+6,ty-2,1,2);
    }else if(shape==='blimp'){
      ctx.fillStyle='#777';
      ctx.beginPath();ctx.ellipse(tx,ty-5,10,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#555';
      ctx.beginPath();ctx.ellipse(tx,ty-5,8,4,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=c;ctx.fillRect(tx-7,ty-6,14,1);
      ctx.fillStyle='#444';ctx.fillRect(tx-3,ty+1,6,3);
      ctx.strokeStyle='#555';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx-3,ty+1);ctx.lineTo(tx-5,ty-2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx+3,ty+1);ctx.lineTo(tx+5,ty-2);ctx.stroke();
      const prop=Math.sin(performance.now()*.02)*3;
      ctx.fillStyle='#aaa';ctx.fillRect(tx+6,ty-6+prop,1,1);ctx.fillRect(tx+6,ty-4-prop,1,1);
    }else if(shape==='tower'){
      ctx.fillStyle='#555';ctx.fillRect(tx-2,ty-14,4,14);
      ctx.fillStyle='#666';ctx.fillRect(tx-4,ty-3,8,3);ctx.fillRect(tx-3,ty-16,6,2);
      ctx.fillStyle=p.tank?.color2||'#848';
      ctx.beginPath();ctx.arc(tx,ty-17,2,0,Math.PI*2);ctx.fill();
      if(gameState==='flying'&&players.indexOf(p)===currentPlayer){
        ctx.fillStyle='#f0f';ctx.beginPath();ctx.arc(tx,ty-17,3+Math.sin(performance.now()*.01),0,Math.PI*2);ctx.fill();
      }
      ctx.fillStyle='#444';ctx.fillRect(tx-5,ty-1,2,1);ctx.fillRect(tx+3,ty-1,2,1);
    }else{
      // standard: classic box (smaller)
      ctx.fillRect(tx-6,ty-5,12,4);ctx.fillRect(tx-3,ty-8,6,4);
      ctx.fillStyle=cL;ctx.fillRect(tx-6,ty-5,12,1);ctx.fillRect(tx-3,ty-8,6,1);
    }
    // barrel (smaller)
    const rad=p.angle*Math.PI/180;
    const blen=shape==='long'?14:shape==='slim'?8:shape==='rail'?16:shape==='wide'?12:shape==='twin'?10:shape==='blimp'?8:shape==='tower'?14:10;
    const bx=Math.cos(rad)*blen,by=-Math.sin(rad)*blen;
    ctx.strokeStyle=p.color;ctx.lineWidth=shape==='wide'?4:shape==='slim'?2:shape==='rail'?4:3;
    if(shape==='twin'){
      // twin barrels
      const off=2;
      const perp=Math.PI/2;
      ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(tx+Math.cos(rad+perp)*off,ty-12+Math.sin(rad+perp)*off);ctx.lineTo(tx+bx+Math.cos(rad+perp)*off,ty-12+by+Math.sin(rad+perp)*off);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx-Math.cos(rad+perp)*off,ty-12-Math.sin(rad+perp)*off);ctx.lineTo(tx+bx-Math.cos(rad+perp)*off,ty-12+by-Math.sin(rad+perp)*off);ctx.stroke();
    }else{
      ctx.beginPath();ctx.moveTo(tx,ty-12);ctx.lineTo(tx+bx,ty-12+by);ctx.stroke();
    }
    // muzzle flash when recently fired
    if(gameState==='flying'&&players.indexOf(p)===currentPlayer&&projectiles.length&&projectiles[0].trail.length<3){
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(tx+bx,ty-12+by,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(tx+bx,ty-12+by,2,0,Math.PI*2);ctx.fill();
    }
    // hp bar
    ctx.fillStyle='#800';ctx.fillRect(tx-12,ty-16,24,2);
    ctx.fillStyle=p.hp>p.maxHp*.5?'#0f0':p.hp>p.maxHp*.25?'#ff0':'#f00';ctx.fillRect(tx-12,ty-16,Math.floor(24*p.hp/(p.maxHp||100)),2);
    // fuel bar
    ctx.fillStyle='#004';ctx.fillRect(tx-12,ty-14,24,1);
    ctx.fillStyle='#08f';ctx.fillRect(tx-12,ty-14,Math.floor(24*Math.min(p.fuel,200)/200),1);
    // name + class icon
    ctx.fillStyle='#ff0';ctx.font='8px monospace';ctx.textAlign='center';
    const icon=shape==='wide'?'H':shape==='slim'?'S':shape==='long'?'A':shape==='dome'?'E':shape==='spike'?'B':'';
    ctx.fillText((p.cpu?'CPU ':'')+(icon?icon+' ':'')+p.name,tx,ty-19);
    if(players.indexOf(p)===currentPlayer&&gameState==='aiming'){ctx.fillStyle='#fff';ctx.fillText('v',tx,ty-24);}
    // damage smoke
    if(p.hp<p.maxHp*.4&&Math.random()<.1){
      particles.push({x:tx+(Math.random()-0.5)*6,y:ty-10,vx:(Math.random()-.5)*.5,vy:-1-Math.random(),life:12,color:p.hp<p.maxHp*.2?'#333':'#555'});
    }
  }

  // lemmings (classic pixel art with hair, arms, walking)
  for(const l of lemmings){
    const lp=Math.sin(l.timer*10);
    const dir=l.vx>0?1:-1;
    const bx=l.x,by=l.y;
    // all lemmings get: hair, body, arms, legs
    // hair (green tuft like original lemmings)
    ctx.fillStyle='#0a0';
    ctx.fillRect(bx-2,by-12,4,2);ctx.fillRect(bx-1,by-13,2,1);
    // head
    ctx.fillStyle=l.color;
    ctx.fillRect(bx-2,by-10,4,3);
    // eyes
    ctx.fillStyle='#000';ctx.fillRect(bx+dir,by-9,1,1);
    // body
    if(l.ltype==='digger'){
      ctx.fillStyle='#a0a';ctx.fillRect(bx-2,by-7,4,5);
      // pickaxe
      ctx.strokeStyle='#aaa';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx+dir*3,by-9);ctx.lineTo(bx+dir*7,by-13+lp*3);ctx.stroke();
      ctx.fillStyle='#888';ctx.fillRect(bx+dir*6,by-14+lp*3,3,2);
    }else if(l.ltype==='jumper'){
      ctx.fillStyle='#ff0';ctx.fillRect(bx-2,by-7,4,5);
      // cape
      ctx.fillStyle='#f00';ctx.fillRect(bx-dir*2,by-7,2,4+Math.abs(l.vy));
    }else if(l.ltype==='healer'){
      ctx.fillStyle='#fff';ctx.fillRect(bx-2,by-7,4,5);
      // red cross
      ctx.fillStyle='#f00';ctx.fillRect(bx-0.5,by-7,1,5);ctx.fillRect(bx-2,by-5,4,1);
      // heal sparkle
      if(Math.sin(l.timer*5)>.5){ctx.fillStyle='#0f0';ctx.fillRect(bx+dir*4,by-8,2,2);}
    }else{
      // bomber - blue suit
      ctx.fillStyle='#00f';ctx.fillRect(bx-2,by-7,4,5);
    }
    // arms (swing with walk)
    ctx.fillStyle=l.color;
    ctx.fillRect(bx-3,by-6+lp,1,3);ctx.fillRect(bx+2,by-6-lp,1,3);
    // legs (walk cycle)
    ctx.fillRect(bx-2,by-2,2,2+lp*1.5);ctx.fillRect(bx,by-2,2,2-lp*1.5);
    // feet
    ctx.fillStyle='#000';
    ctx.fillRect(bx-2,by+lp*1.5,2,1);ctx.fillRect(bx,by-lp*1.5,2,1);
  }

  // smoke from damaged tanks
  for(const p of players){
    if(!p.alive||p.hp>40)continue;
    if(Math.random()<.15){
      particles.push({x:p.x+(Math.random()-0.5)*6,y:p.y-14,vx:(Math.random()-.5)*.5,vy:-1-Math.random(),
        life:15+Math.random()*10,color:p.hp>20?'#555':'#333'});
    }
  }

  // projectiles (DOS-style with flair)
  for(const p of projectiles){
    // trail with color gradient (hot to cold)
    for(let i=0;i<p.trail.length;i++){
      const t=i/p.trail.length;
      ctx.fillStyle=p.type==='flame'?`rgb(${255},${Math.floor(100+t*100)},0)`:
        p.type==='deathshead'?`rgba(255,0,0,${t})`:
        p.type==='napalm'?`rgb(${255},${Math.floor(t*200)},0)`:
        `rgba(${200+Math.floor(t*55)},${180+Math.floor(t*60)},${Math.floor(t*100)},${.3+t*.5})`;
      ctx.fillRect(p.trail[i].x,p.trail[i].y,1+Math.floor(t*2),1);
    }
    // death's head draws a skull with red glow
    if(p.type==='deathshead'){
      ctx.fillStyle='#400';ctx.beginPath();ctx.arc(p.x,p.y,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('☠',p.x,p.y+3);
    }else if(p.type==='flame'){
      ctx.fillStyle='#f80';ctx.fillRect(p.x-2,p.y-2,4,4);
      ctx.fillStyle='#ff0';ctx.fillRect(p.x-1,p.y-1,2,2);
    }else if(p.type==='napalm'||p.type==='projectile'&&p.weapon?.name==='Nuke'){
      ctx.fillStyle='#f00';ctx.fillRect(p.x-2,p.y-2,5,5);
      ctx.fillStyle='#ff0';ctx.fillRect(p.x-1,p.y-1,3,3);
    }else{
      // normal bullet: bright pixel
      ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1,3,3);
      ctx.fillStyle='#ff0';ctx.fillRect(p.x,p.y,1,1);
    }
  }

  // pixel art explosions (fast: 4 filled rects, not O(r²) loops)
  for(const e of explosions){
    const a=e.life/12;
    ctx.globalAlpha=a;
    const r=Math.floor(e.radius*(1.2-a*.2));
    ctx.fillStyle='#800';ctx.fillRect(e.x-r,e.y-r*.7,r*2,r*1.4);
    ctx.fillStyle='#f40';ctx.fillRect(e.x-r*.65,e.y-r*.5,r*1.3,r);
    ctx.fillStyle='#ff0';ctx.fillRect(e.x-r*.35,e.y-r*.25,r*.7,r*.5);
    ctx.fillStyle='#fff';ctx.fillRect(e.x-2,e.y-2,4,4);
    ctx.globalAlpha=1;
  }
  // particles
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/25);ctx.fillStyle=p.color;ctx.fillRect(p.x-1,p.y-1,3,3);}
  ctx.globalAlpha=1;

  // death skulls
  ctx.font='bold 12px monospace';ctx.textAlign='center';
  for(const sk of skulls){
    ctx.globalAlpha=Math.min(1,sk.life/30);
    ctx.fillStyle='#fff';ctx.fillText('☠',sk.x,sk.y);
    ctx.globalAlpha=1;
  }

  // talk bubbles
  for(let i=talkBubbles.length-1;i>=0;i--){
    const tb=talkBubbles[i];tb.life--;tb.y-=.15;
    if(tb.life<=0){talkBubbles.splice(i,1);continue;}
    const a=Math.min(1,tb.life/30);
    ctx.globalAlpha=a;
    const tw=ctx.measureText||null;
    ctx.font='7px monospace';ctx.textAlign='center';
    const txt=tb.text.length>25?tb.text.slice(0,23)+'..':tb.text;
    const mx=Math.min(txt.length*4+10,W*.4);
    const bx=Math.max(mx/2+2,Math.min(W-mx/2-2,tb.x));
    // bubble bg
    ctx.fillStyle='#000';ctx.fillRect(bx-mx/2-2,tb.y-10,mx+4,14);
    ctx.strokeStyle=tb.color;ctx.lineWidth=1;ctx.strokeRect(bx-mx/2-2,tb.y-10,mx+4,14);
    // pointer
    ctx.fillStyle='#000';ctx.fillRect(bx-2,tb.y+4,4,3);
    // text
    ctx.fillStyle=tb.color;ctx.fillText(txt,bx,tb.y);
    ctx.globalAlpha=1;
  }

  // wind indicator (DOS style bar)
  const wx=W/2,wy=H-10;
  ctx.fillStyle='#222';ctx.fillRect(wx-30,wy-2,60,4);
  ctx.fillStyle='#444';ctx.fillRect(wx-1,wy-3,2,6);
  const ww=Math.abs(wind)*8;
  ctx.fillStyle=Math.abs(wind)>2?'#f00':Math.abs(wind)>1?'#ff0':'#0ff';
  if(wind>0)ctx.fillRect(wx,wy-1,ww,2);else ctx.fillRect(wx-ww,wy-1,ww,2);
  ctx.fillStyle='#fff';ctx.font='7px monospace';ctx.textAlign='center';
  ctx.fillText('WIND',wx,wy-5);

  // CPU thinking indicator
  if(gameState==='aiming'&&players[currentPlayer]&&players[currentPlayer].cpu){
    ctx.fillStyle='#ff0';ctx.font='10px monospace';ctx.textAlign='center';
    const dots='.'.repeat(1+Math.floor(performance.now()/300)%3);
    ctx.fillText('CPU THINKING'+dots,W/2,H/2-20);
  }

  ctx.restore();
  // weather effects
  if(weather&&weather.rain){
    ctx.fillStyle='rgba(100,150,255,.3)';
    for(let r=0;r<30;r++){
      const rx=(performance.now()*.3+r*137)%W,ry=(performance.now()*.8+r*89)%H;
      ctx.fillRect(rx,ry,1,4+Math.random()*3);
    }
  }
  if(weather&&weather.snow){
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let s=0;s<20;s++){
      const sx2=(performance.now()*.1+s*173+Math.sin(performance.now()*.001+s)*20)%W;
      const sy2=(performance.now()*.2+s*97)%H;
      ctx.fillRect(sx2,sy2,2,2);
    }
  }
  if(weather&&weather.skyTint){ctx.fillStyle=weather.skyTint;ctx.globalAlpha=.15;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(weather&&weather.visMult<1){ctx.fillStyle='rgba(0,0,0,'+(1-weather.visMult)*.3+')';ctx.fillRect(0,0,W,H);}

  // floor info bar (fixed at bottom above UI)
  if(floorType){
    const barY=H-55;
    ctx.fillStyle='#000';ctx.fillRect(0,barY,W,14);
    ctx.fillStyle='#333';ctx.fillRect(0,barY,W,1);
    ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillStyle=floorType.color;ctx.fillText(floorType.name+' ground',W*.25,barY+10);
    ctx.fillStyle='#888';ctx.fillText('F'+round+' | '+weather.name,W*.65,barY+10);
    ctx.fillStyle='#555';ctx.fillText(BACKGROUNDS[bgIdx].name,W*.9,barY+10);
  }

  // screen effects on big explosions
  if(shakeLife>5){
    ctx.globalCompositeOperation='difference';
    ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';
  }

  // pixel art border (dark edges, no smooth vignette)
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,2,H);ctx.fillRect(W-2,0,2,H);ctx.fillRect(0,0,W,1);
  ctx.fillStyle='rgba(0,0,0,.1)';
  ctx.fillRect(2,0,2,H);ctx.fillRect(W-4,0,2,H);ctx.fillRect(0,1,W,1);
}

let lastT=performance.now();
function loop(){
  const now=performance.now(),dt=Math.min(.04,(now-lastT)/1000);lastT=now;
  if(gameState!=='over'&&gameState!=='roundOver'){update(dt);render();requestAnimationFrame(loop);}
  else{render();}
}

// touch
let touchSY=null,touchSX=null;
// keyboard: arrow keys move tank, z/x adjust angle
const keysDown={};
document.onkeydown=e=>{keysDown[e.code]=true;if(actx&&actx.state==='suspended')actx.resume();
  if(gameState!=='aiming'||players[currentPlayer].cpu)return;
  const p=players[currentPlayer];
  if(e.code==='ArrowLeft'&&p.fuel>0){p.x=Math.max(15,p.x-3);p.fuel-=2;p.y=terrain[Math.floor(p.x)];sfx('move');}
  if(e.code==='ArrowRight'&&p.fuel>0){p.x=Math.min(W-15,p.x+3);p.fuel-=2;p.y=terrain[Math.floor(p.x)];sfx('move');}
  if(e.code==='ArrowUp'){p.angle=Math.min(180,p.angle+2);sfx('turret');}
  if(e.code==='ArrowDown'){p.angle=Math.max(0,p.angle-2);sfx('turret');}
  if(e.code==='Space')fire();
  updateUI();
};
document.onkeyup=e=>{keysDown[e.code]=false;};
cv.addEventListener('touchstart',e=>{if(gameState!=='aiming'||players[currentPlayer].cpu)return;const t=e.touches[0];touchSY=t.clientY;touchSX=t.clientX;if(actx&&actx.state==='suspended')actx.resume();});
cv.addEventListener('touchmove',e=>{if(gameState!=='aiming'||touchSY===null||players[currentPlayer].cpu)return;e.preventDefault();const t=e.touches[0];const dy=touchSY-t.clientY,dx=t.clientX-touchSX;const p=players[currentPlayer];p.angle=Math.max(0,Math.min(180,p.angle+Math.round(dy*.25)));p.power=Math.max(5,Math.min(100,p.power+Math.round(dx*.15)));touchSY=t.clientY;touchSX=t.clientX;updateUI();},{passive:false});
cv.addEventListener('touchend',()=>{touchSY=null;touchSX=null;});
let lastTap=0;
cv.addEventListener('touchend',()=>{const n=Date.now();if(n-lastTap<300&&gameState==='aiming'&&!players[currentPlayer].cpu)fire();lastTap=n;});
</script>
