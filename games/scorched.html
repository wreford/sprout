// JTM decoder
function unhexC(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rleExpand(row){let out='',i=0;while(i<row.length){let num='';while(i<row.length&&row[i]>='0'&&row[i]<='9'){num+=row[i];i++;}if(i<row.length){out+=row[i].repeat(num?parseInt(num):1);i++;}}return out;}
function decodeJTM(jtm){
  const w=jtm.w,h=jtm.h,data=new Uint8ClampedArray(w*h*4);
  const pal={};for(const k in jtm.palette)pal[k]=unhexC(jtm.palette[k]);
  const put=(x,y,rgb)=>{if(x<0||y<0||x>=w||y>=h)return;const i=(y*w+x)*4;data[i]=rgb[0];data[i+1]=rgb[1];data[i+2]=rgb[2];data[i+3]=255;};
  for(const c of jtm.cells||[]){
    const rows=c.px.length;
    for(let sy=0;sy<rows;sy++){
      const row=rleExpand(c.px[sy]);
      for(let sx=0;sx<row.length;sx++){
        const rgb=pal[row[sx]]||[255,0,255];
        const x0=c.x+Math.floor(sx*c.w/row.length);
        const y0=c.y+Math.floor(sy*c.h/rows);
        put(x0,y0,rgb);
      }
    }
  }
  const cv2=document.createElement('canvas');cv2.width=w;cv2.height=h;
  cv2.getContext('2d').putImageData(new ImageData(data,w,h),0,0);
  return cv2;
}

// deck building
let deck=[],hand=[],discard=[];
const HAND_SIZE=5;
let discards=2;
function buildDeck(tankId){
  deck=[...CORE_CARDS];
  const classCards=CLASS_CARDS[tankId]||CLASS_CARDS.standard;
  const shuffledClass=[...classCards].sort(()=>Math.random()-.5);
  deck.push(...shuffledClass.slice(0,3));
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
}
function shuffleDiscard(){
  deck.push(...discard);discard=[];
  for(let j=deck.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[deck[j],deck[k]]=[deck[k],deck[j]];}
}
function drawCards(n){
  const drawn=[];
  for(let i=0;i<n;i++){
    if(!deck.length)shuffleDiscard();
    if(deck.length)drawn.push(deck.pop());
  }
  return drawn;
}
function drawHand(){
  hand=drawCards(HAND_SIZE);
  discards=2;
}
function playCard(idx){
  if(idx<0||idx>=hand.length)return null;
  const card=hand.splice(idx,1)[0];
  if(card.rarity!=='basic')discard.push(card);
  return card;
}
function discardCards(indices){
  if(discards<=0||!indices.length)return;
  indices.sort((a,b)=>b-a);
  for(const idx of indices){
    if(idx>=0&&idx<hand.length){
      const card=hand.splice(idx,1)[0];
      if(card.rarity!=='basic')discard.push(card);
    }
  }
  discards--;
  const newCards=drawCards(indices.length);
  hand.push(...newCards);
}
// shop offers 3 random cards from your class pool
function getShopCards(tankId){
  const pool=CLASS_CARDS[tankId]||CLASS_CARDS.standard;
  const offers=[];
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  for(let i=0;i<3&&i<shuffled.length;i++)offers.push(shuffled[i]);
  return offers;
}

function buildAchieveUI(){
  const el=document.getElementById('achieveList');if(!el)return;el.innerHTML='';
  const cats=['Combat','Lemmings','Survival','Wins','Weapons','Money','Start Level','Milestones'];
  const unlocked=(stats.unlocked||[]).length;
  const total=ACHIEVEMENTS.length;
  const pct=total?Math.floor(unlocked/total*100):0;
  // header with progress bar
  let hdr='<div style="font:bold 12px monospace;color:#0f0;margin:4px 0">🏆 '+unlocked+'/'+total+' ('+pct+'%)</div>';
  hdr+='<div style="background:#222;height:6px;width:100%;margin:2px 0"><div style="background:#0f0;height:6px;width:'+pct+'%"></div></div>';
  el.innerHTML=hdr;
  for(const cat of cats){
    const items=ACHIEVEMENTS.filter(a=>a.cat===cat);if(!items.length)continue;
    const doneN=items.filter(a=>stats.unlocked&&stats.unlocked.includes(a.id)).length;
    const next=items.find(a=>!stats.unlocked||!stats.unlocked.includes(a.id));
    const catDiv=document.createElement('div');
    catDiv.style.cssText='margin:6px 0;width:100%';
    const catHdr=document.createElement('div');
    catHdr.style.cssText='font:bold 11px monospace;color:#ff0;padding:2px 0;border-bottom:1px solid #333;display:flex;justify-content:space-between;cursor:pointer';
    catHdr.innerHTML=cat+' <span style="font:9px monospace;color:'+(doneN===items.length?'#0f0':'#888')+'">'+doneN+'/'+items.length+'</span>';
    const expanded={v:false};
    const grid=document.createElement('div');
    grid.style.cssText='margin-top:3px';
    // show next unlock + recent unlocks
    const renderItems=()=>{
      grid.innerHTML='';
      const show=expanded.v?items:items.filter((a,i)=>{
        const done=stats.unlocked&&stats.unlocked.includes(a.id);
        return done||i<=doneN+1;
      });
      for(const a of show){
        const done=stats.unlocked&&stats.unlocked.includes(a.id);
        const d=document.createElement('div');
        d.style.cssText='font:10px monospace;padding:4px 6px;margin:2px 0;border:1px solid '+(done?'#0f0':'#333')+';background:'+(done?'#001a00':'#0a0a0a')+';color:'+(done?'#0f0':'#666')+';line-height:1.4';
        d.innerHTML=(done?'✓ ':'○ ')+'<b>'+a.name+'</b> — '+a.desc+'<br><span style="color:'+(done?'#ff0':'#333')+'">→ '+a.reward+'</span>';
        grid.appendChild(d);
      }
      if(!expanded.v&&items.length>show.length){
        const more=document.createElement('div');
        more.style.cssText='font:9px monospace;color:#555;padding:2px;cursor:pointer;text-align:center';
        more.textContent='+'+(items.length-show.length)+' more...';
        more.onclick=e=>{e.stopPropagation();expanded.v=true;renderItems();};
        grid.appendChild(more);
      }
    };
    catHdr.onclick=()=>{expanded.v=!expanded.v;renderItems();};
    renderItems();
    catDiv.appendChild(catHdr);
    catDiv.appendChild(grid);
    el.appendChild(catDiv);
  }
}

let songIdx=0,beatIdx=0,beatTimer=0;
function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('musBtn').style.color=musicOn?'#f80':'#555';
  if(musicOn&&!musicLoop)startMusic();
}
function startMusic(){
  if(musicLoop)clearInterval(musicLoop);
  songIdx=Math.floor(Math.random()*SONGS.length);beatIdx=0;
  const tick=()=>{
    if(!musicOn||!actx||actx.state!=='running')return;
    const song=SONGS[songIdx];const n=actx.currentTime;const dur=60/song.bpm*.9;
    // bass
    const bf=song.bass[beatIdx%song.bass.length];
    if(bf>0){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=bf;
      g.gain.setValueAtTime(.04,n);g.gain.exponentialRampToValueAtTime(.001,n+dur);
      const fl=actx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=200;
      o.connect(fl);fl.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+dur);}
    // melody
    const mf=song.mel[beatIdx%song.mel.length];
    if(mf>0){const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=mf;
      g.gain.setValueAtTime(.025,n);g.gain.exponentialRampToValueAtTime(.001,n+dur*.8);
      o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+dur);}
    // harmony
    const hf=song.mel2[beatIdx%song.mel2.length];
    if(hf>0){const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=hf;
      g.gain.setValueAtTime(.015,n);g.gain.exponentialRampToValueAtTime(.001,n+dur*.7);
      o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+dur);}
    // drums (every 4 beats)
    if(beatIdx%4===0){const buf=actx.createBuffer(1,actx.sampleRate*.05,actx.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.15));
      const s=actx.createBufferSource();s.buffer=buf;const g=actx.createGain();g.gain.value=.06;
      s.connect(g);g.connect(actx.destination);s.start(n);}
    if(beatIdx%4===2){const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=800;
      g.gain.setValueAtTime(.02,n);g.gain.exponentialRampToValueAtTime(.001,n+.03);
      o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.04);}
    beatIdx++;
    if(beatIdx>=song.bass.length*2){beatIdx=0;songIdx=(songIdx+1)%SONGS.length;}
  };
  musicLoop=setInterval(tick,60000/SONGS[songIdx].bpm);
}

function checkPowerups(p){
  for(const pu of powerups){
    if(!pu.alive)continue;
    if(Math.hypot(p.x-pu.x,p.y-pu.y)<35){
      pu.alive=false;pu.type.give(p);
      sfx('buy');showMsg(pu.type.name+'!',1000);
      for(let k=0;k<8;k++)particles.push({x:pu.x,y:pu.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:15,color:pu.type.color});
    }
  }
}
function moveTank(dir){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];if(!p||p.cpu)return;
  if(p.tank?.immobile){sfx('denied');showMsg('Tower cannot move',800);return;}
  if(p.fuel<3){sfx('denied');return;}
  p.x=Math.max(15,Math.min(W-15,p.x+dir*4));p.fuel-=3;
  p.y=terrain[Math.floor(p.x)];sfx('move');checkPowerups(p);updateUI();
}
function jetpack(){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];if(!p||p.cpu)return;
  if(p.fuel<15){sfx('denied');return;}
  p.fuel-=15;sfx('jet');
  const dir=p.angle>90?-1:1;
  p.x=Math.max(15,Math.min(W-15,p.x+dir*30));
  p.y=terrain[Math.floor(p.x)];
  for(let i=0;i<8;i++)particles.push({x:p.x-dir*5,y:p.y,vx:-dir*(2+Math.random()*3),vy:1+Math.random()*2,life:15+Math.random()*10,color:'#f80'});

function generateTerrain(){
  terrain=new Float32Array(W);
  const style=Math.floor(Math.random()*4);
  let y=H*.5+Math.random()*H*.15;
  for(let x=0;x<W;x++){
    if(style===0)y+=Math.sin(x*.006)*3+Math.sin(x*.018)*1.5+(Math.random()-.5)*.5;
    else if(style===1)y+=Math.sin(x*.003)*4+(Math.random()-.5)*.3;
    else if(style===2){y+=Math.sin(x*.01)*2+Math.cos(x*.025)*1.5+(Math.random()-.5)*.6;if(x%Math.floor(W/5)===0)y+=Math.random()*30-15;}
    else y+=Math.sin(x*.005)*3+Math.sin(x*.03)*.8+(Math.random()-.5)*.4;
    y=Math.max(H*.25,Math.min(H*.55,y));
    terrain[x]=y;
  }
  for(let pass=0;pass<4;pass++){const tmp=new Float32Array(W);for(let x=0;x<W;x++){let s=0,c=0;for(let d=-4;d<=4;d++){const xx=x+d;if(xx>=0&&xx<W){s+=terrain[xx];c++;}}tmp[x]=s/c;}terrain=tmp;}
  // add platforms (floating ledges)
  const numPlats=2+Math.floor(Math.random()*3);
  for(let p=0;p<numPlats;p++){
    const px2=40+Math.floor(Math.random()*(W-80));
    const pw=30+Math.floor(Math.random()*40);
    const py2=terrain[px2]-30-Math.floor(Math.random()*40);
    for(let x=px2;x<Math.min(W,px2+pw);x++)terrain[x]=Math.min(terrain[x],py2);
  }
}

function placePlayers(){
  players=[];
  const spacing=W/(numPlayers+1);
  for(let i=0;i<numPlayers;i++){
    const x=Math.max(25,Math.min(W-25,Math.floor(spacing*(i+1))+(Math.random()*40-20)|0));
    const isCpu=i>=numPlayers-numCPU;
    const perks=isCpu?[]:getPerks();
    const tank=isCpu?TANKS[Math.floor(Math.random()*TANKS.length)]:TANKS[chosenTank];
    const inv={};CORE_CARDS.forEach(w=>inv[w.name]=w.count||0);
    const cc=CLASS_CARDS[tank.id]||CLASS_CARDS.standard;
    cc.forEach(w=>inv[w.name]=w.count||0);
    const floorScale=1+round*.15+Math.pow(round,.6)*.1;
    let hp=Math.floor(tank.hp*(isCpu?floorScale:1)),money=100+round*10;
    if(perks.find(p=>p.id==='extra_hp'))hp+=20;
    if(perks.find(p=>p.id==='extra_cash'))money=150;
    if(perks.find(p=>p.id==='free_mirv'))inv['MIRV']=(inv['MIRV']||0)+1;
    if(perks.find(p=>p.id==='free_deaths'))inv["Deaths Head"]=(inv["Deaths Head"]||0)+1;
    if(perks.find(p=>p.id==='free_nuke'))inv['Nuke']=(inv['Nuke']||0)+1;
    const py=tank.floats?H*.3+Math.random()*H*.05:terrain[x];
    const startAngle=tank.floats?270:i<numPlayers/2?60:120;
    players.push({
      x,y:py,hp,maxHp:hp,alive:true,color:COLORS[i%5],name:NAMES[i%5],
      score:0,money,angle:startAngle,power:50,fuel:tank.immobile?0:tank.fuel,
      weapon:0,inventory:inv,upgrades:{},shield:0,cpu:isCpu,kills:0,
      tank:tank,skillMods:{},
      armor:perks.find(p=>p.id==='armor')?0.15:0
    });
    if(!isCpu)applyTrophyRewards(players[players.length-1]);
  }
}

function drawMiniTank(cv2,shape,color,color2){
  const c=cv2.getContext('2d');c.imageSmoothingEnabled=false;c.clearRect(0,0,32,24);
  const tx=16,ty=20;
  c.fillStyle='#444';
  if(shape==='blimp'){c.fillStyle='#888';c.beginPath();c.ellipse(tx,ty-8,12,6,0,0,Math.PI*2);c.fill();c.fillStyle=color;c.fillRect(tx-9,ty-9,18,2);c.fillStyle='#444';c.fillRect(tx-3,ty,6,3);return;}
  if(shape==='tower'){c.fillStyle='#555';c.fillRect(tx-2,ty-16,4,16);c.fillStyle=color2||'#848';c.beginPath();c.arc(tx,ty-18,3,0,Math.PI*2);c.fill();c.fillStyle='#666';c.fillRect(tx-4,ty-3,8,3);return;}
  if(shape==='wide')c.fillRect(tx-12,ty-2,24,4);
  else if(shape==='slim')c.fillRect(tx-7,ty-1,14,3);
  else if(shape==='long')c.fillRect(tx-11,ty-2,22,4);
  else c.fillRect(tx-9,ty-2,18,4);
  c.fillStyle=color;
  if(shape==='wide'){c.fillRect(tx-10,ty-6,20,5);c.fillRect(tx-7,ty-9,14,4);}
  else if(shape==='slim'){c.fillRect(tx-5,ty-9,10,7);c.fillRect(tx-3,ty-12,6,4);}
  else if(shape==='long'){c.fillRect(tx-9,ty-6,18,5);c.fillRect(tx-5,ty-10,10,5);}
  else if(shape==='dome'){c.fillRect(tx-7,ty-6,14,5);c.beginPath();c.arc(tx,ty-8,5,Math.PI,0);c.fill();}
  else if(shape==='spike'){c.fillRect(tx-8,ty-7,16,5);c.fillRect(tx-4,ty-11,8,5);c.fillStyle='#f00';c.fillRect(tx-1,ty-13,2,3);}
  else if(shape==='twin'){c.fillRect(tx-6,ty-6,12,5);c.fillRect(tx-4,ty-10,8,5);c.strokeStyle=color;c.lineWidth=1;c.beginPath();c.moveTo(tx-1,ty-10);c.lineTo(tx+7,ty-14);c.stroke();c.beginPath();c.moveTo(tx+1,ty-10);c.lineTo(tx+9,ty-14);c.stroke();}
  else if(shape==='rail'){c.fillRect(tx-8,ty-5,16,4);c.fillRect(tx-4,ty-10,8,6);c.fillStyle='#0af';c.fillRect(tx-2,ty-10,2,5);c.strokeStyle=color;c.lineWidth=2;c.beginPath();c.moveTo(tx,ty-10);c.lineTo(tx+12,ty-16);c.stroke();}
  else{c.fillRect(tx-7,ty-7,14,5);c.fillRect(tx-4,ty-11,8,5);c.strokeStyle=color;c.lineWidth=2;c.beginPath();c.moveTo(tx,ty-11);c.lineTo(tx+9,ty-15);c.stroke();}
}

  p.weapon=Math.min(p.weapon||0,WEAPONS.length-1);
  // discard button (Balatro style)
  if(!p.cpu&&discards>0&&markedForDiscard.length>0){
    const db=document.createElement('button');
    db.className='wbtn';db.style.borderColor='#f44';db.style.color='#f44';
    db.textContent='DISCARD('+markedForDiscard.length+') ['+discards+' left]';
    db.onclick=()=>{discardCards([...markedForDiscard]);markedForDiscard=[];buildWeaponBar();sfx('buy');};
    bar.appendChild(db);
  }
  WEAPONS.forEach((card,i)=>{
    const b=document.createElement('button');
    const sel=p.weapon===i;
    const marked=markedForDiscard.includes(i);
    const rc={basic:'#888',common:'#0f0',uncommon:'#0ff',rare:'#f0f',legendary:'#ff0'}[card.rarity]||'#888';
    b.className='wbtn'+(sel?' sel':'');
    b.style.borderColor=marked?'#f44':sel?rc:'#333';
    b.style.color=marked?'#f44':sel?rc:'#777';
    if(marked)b.style.textDecoration='line-through';
    b.textContent=card.name;b.title=(card.desc||'')+' ['+card.rarity+']';
    // tap = select, double-tap = mark for discard
    let tapTimer=0;
    b.onclick=()=>{
      const now=Date.now();
      if(now-tapTimer<300&&!p.cpu&&discards>0&&card.rarity!=='basic'){
        // double-tap: toggle discard mark
        if(marked)markedForDiscard=markedForDiscard.filter(x=>x!==i);
        else markedForDiscard.push(i);
        buildWeaponBar();
      }else{
        p.weapon=i;markedForDiscard=markedForDiscard.filter(x=>x!==i);buildWeaponBar();
      }
      tapTimer=now;
    };
    bar.appendChild(b);
  });
  // deck info
  if(!p.cpu){
    const info=document.createElement('span');
    info.style.cssText='font:7px monospace;color:#555;padding:2px 4px;white-space:nowrap';
    info.textContent='D:'+deck.length+' X:'+discard.length;
    bar.appendChild(info);
  }
}

function cpuSimShot(sx,sy,angle,power,w){
  const rad=angle*Math.PI/180,spd=power*.13;
  let px2=sx,py2=sy-12,vx=Math.cos(rad)*spd,vy=-Math.sin(rad)*spd;
  for(let step=0;step<300;step++){
    vx+=w*.015;vy+=9.8/60*2.8;px2+=vx;py2+=vy;
    const tx=Math.floor(px2);
    if(tx<0||tx>=W||py2>H)return{x:px2,y:py2,hit:false};
    if(tx>=0&&tx<W&&py2>=terrain[tx])return{x:px2,y:py2,hit:true};
  }
  return{x:px2,y:py2,hit:false};
}

function cpuTurn(){
  if(gameState!=='aiming')return;
  const me=players[currentPlayer];
  // pick target: prioritize lowest HP, then closest
  let bestTarget=null,bestScore=-Infinity;
  for(const p of players){
    if(p===me||!p.alive)continue;
    const d=Math.abs(p.x-me.x);
    const score=(100-p.hp)*2+(500-d);
    if(score>bestScore){bestScore=score;bestTarget=p;}
  }
  if(!bestTarget){me.weapon=0;setTimeout(fire,150);return;}

  // pick weapon strategically
  buildWeaponBar();
  me.weapon=0;
  const dist=Math.hypot(bestTarget.x-me.x,bestTarget.y-me.y);
  const pickW=n=>{const i=WEAPONS.findIndex(w=>w.name===n);if(i>=0){me.weapon=i;return true;}return false;};
  const hasWeapon=n=>pickW(n);
  // use shield if low HP
  if(me.hp<30&&pickW('Shield')){setTimeout(fire,150);return;}
  if(me.hp<20&&pickW('Teleport')){setTimeout(fire,150);return;}
  if(me.hp<50)pickW('Heallem');
  else if(players.filter(p=>p!==me&&p.alive&&Math.abs(p.x-bestTarget.x)<60).length>=2)pickW('Nuke');
  else if(dist>200)pickW('Deaths Head')||pickW('Howitzer');
  else if(players.filter(p=>p!==me&&p.alive&&Math.abs(p.x-bestTarget.x)<80).length>=2)pickW('MIRV')||pickW('Carpet Bomb')||pickW('Rain of Fire');
  else if(dist<250&&Math.random()<.4)pickW('Napalm')||pickW('Flame')||pickW('Berserk Flame');
  else if(Math.abs(bestTarget.y-me.y)>20&&bestTarget.y>me.y)pickW('Roller')||pickW('Blood Roller');
  else if(dist<200)pickW('Big Shot')||pickW('Bunker Buster')||pickW('Gore Bomb');
  else if(dist<150&&Math.random()<.3)pickW('Swarm')||pickW('Lemming');
  else if(dist<100&&Math.random()<.25)pickW('Dirt')||pickW('Dirt Wall');

  // simulate shots to find best angle/power
  let bestA=90,bestP=50,bestErr=Infinity;
  for(let attempt=0;attempt<40;attempt++){
    const testA=Math.max(5,Math.min(175,Math.floor(Math.atan2(-(bestTarget.y-me.y),bestTarget.x-me.x)*180/Math.PI)+Math.random()*30-15));
    const testP=Math.max(15,Math.min(95,Math.floor(dist*.1+Math.random()*30-5)));
    const sim=cpuSimShot(me.x,me.y,testA,testP,wind);
    if(sim.hit){
      const err=Math.hypot(sim.x-bestTarget.x,sim.y-bestTarget.y);
      if(err<bestErr){bestErr=err;bestA=testA;bestP=testP;}
    }
  }
  // CPU accuracy scales with cpu_aim perm upgrade
  const aimLv=stats.permUpgrades?.cpu_aim||0;
  const inaccuracy=Math.max(1,6-aimLv);
  me.angle=Math.max(5,Math.min(175,bestA+Math.floor(Math.random()*inaccuracy*2-inaccuracy)));
  me.power=Math.max(15,Math.min(95,bestP+Math.floor(Math.random()*inaccuracy*2-inaccuracy)));
  // CPU move upgrade: reposition before firing
  const moveLv=stats.permUpgrades?.cpu_move||0;
  if(moveLv>0&&me.fuel>=10&&Math.random()<moveLv*.25){
    const moveDir=bestTarget.x>me.x?1:-1;
    const moveDist=Math.min(me.fuel/3,moveLv*5);
    me.x=Math.max(15,Math.min(W-15,me.x+moveDir*moveDist));me.fuel-=Math.floor(moveDist);
    me.y=terrain[Math.floor(me.x)];checkPowerups(me);
  }
  setTimeout(fire,250);
}

function fire(){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];
  if(!WEAPONS.length||!WEAPONS[p.weapon]){p.weapon=0;buildWeaponBar();if(!WEAPONS.length)return;}
  const w=WEAPONS[p.weapon];
  // card system: play card from hand (non-basic go to discard)
  if(!p.cpu&&hand.length){playCard(p.weapon);p.weapon=0;}
  // instant-use cards
  if(w.type==='shield'){p.shield=60;gameState='waiting';sfx('buy');setTimeout(nextTurn,250);return;}
  if(w.type==='teleport'){const nx=Math.random()*W;p.x=Math.max(20,Math.min(W-20,nx));p.y=terrain[Math.floor(p.x)];gameState='waiting';sfx('buy');setTimeout(nextTurn,250);return;}
  if(w.type==='deathshead'&&!p.cpu)stats.deathsHeadUsed++;
  if(w.name==='Nuke'&&!p.cpu)stats.nukesUsed++;
  if(w.type==='deathshead'||w.name==='Nuke')checkAchievements();
  const rad=p.angle*Math.PI/180;
  const speed=p.power*.16;
  let fw={...w};
  const ulv=p.upgrades?.[w.name]||0;
  if(UPGRADES[w.name]&&ulv>0&&ulv<=UPGRADES[w.name].length){
    const u=UPGRADES[w.name][ulv-1];
    if(u.dmg)fw.damage=u.dmg;if(u.rad)fw.radius=u.rad;if(u.subs)fw.subs=u.subs;
  }
  // lasertower: instant beam that pierces terrain
  if(p.tank?.pierces&&(fw.type==='projectile'||fw.name?.includes('Laser'))){
    sfx('laser');
    const bx=Math.cos(rad),by=-Math.sin(rad);
    let hx=p.x,hy=p.y-20;
    // trace beam through everything until hitting a player or edge
    const beamPts=[{x:hx,y:hy}];
    for(let step=0;step<500;step++){
      hx+=bx*2;hy+=by*2;
      beamPts.push({x:hx,y:hy});
      if(hx<0||hx>W||hy<0||hy>H)break;
      for(const pl of players){
        if(!pl.alive||pl===p)continue;
        if(Math.hypot(pl.x-hx,pl.y-10-hy)<15){
          explode(hx,hy,fw,currentPlayer);
          step=999;break;
        }
      }
    }
    // draw laser beam as tracer
    tracers.push({pts:beamPts,color:'#f0f',age:0});
    if(tracers.length>150)tracers.shift();
    // burn terrain along beam path
    for(const bp of beamPts){const tx=Math.floor(bp.x);if(tx>0&&tx<W&&bp.y>=terrain[tx]-2)terrain[tx]=Math.min(H,terrain[tx]+1);}
    gameState='flying';
    setTimeout(()=>{gameState='waiting';setTimeout(nextTurn,200);},300);
    return;
  }
  projectiles.push({x:p.x,y:p.y-12,vx:Math.cos(rad)*speed,vy:-Math.sin(rad)*speed,
    owner:currentPlayer,weapon:fw,trail:[],type:fw.type});
  gameState='flying';sfx('fire');
}

function explode(x,y,weapon,owner){
  sfx('explode');
  shakeLife=8+weapon.radius*.1;
  const r=weapon.radius;
  if(weapon.type!=='dirt'){
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      if(terrain[tx]<y+depth)terrain[tx]=Math.min(H+10,terrain[tx]+depth*.6);
    }
  }else{
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      terrain[tx]=Math.max(H*.1,terrain[tx]-depth*.5);
    }
  }
  for(const p of players){
    if(!p.alive)continue;
    const d=Math.hypot(p.x-x,p.y-y);
    const hitR=p.tank?.floats?r*3:r*1.5;
    if(d<hitR&&weapon.damage>0){
      if(r<=0)continue;
      let dmg=Math.floor((1-d/(r*1.5))*weapon.damage);
      if(p.shield>0){dmg=Math.floor(dmg*.2);p.shield=Math.max(0,p.shield-10);}
      if(p.armor)dmg=Math.floor(dmg*(1-p.armor));
      p.hp-=dmg;damageThisRound=true;
      if(dmg>10&&p.hp>0&&Math.random()<.3)tankTalk(players.indexOf(p),'hit');
      if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');
        if(owner!==null&&players[owner]){
          players[owner].money+=50;players[owner].kills=(players[owner].kills||0)+1;
          if(!players[owner].cpu){stats.kills++;stats.totalKills++;stats.idleGems=(stats.idleGems||0)+1;saveStats();checkAchievements();}
        }
        showMsg(p.name+' destroyed!',1500);
        if(Math.random()<.7)tankTalk(players.indexOf(p),'kill');
        if(owner!==null&&Math.random()<.5)tankTalk(owner,'hit');
        skulls.push({x:p.x,y:p.y-15,life:120});
      }
    }
  }
  // camera monster damage
  if(camMonster&&camMonster.hp>0){
    const cd=Math.hypot(camMonster.x-x,camMonster.y-y);
    if(cd<r*1.5&&weapon.damage>0){
      camMonster.hp-=Math.floor((1-cd/(r*1.5))*weapon.damage);
      if(camMonster.hp<=0){sfx('hit');showMsg('YOUR FACE DEFEATED!',2000);
        for(const p of players){if(p.alive&&!p.cpu)p.money+=100;}
        for(let k=0;k<15;k++)particles.push({x:camMonster.x+(Math.random()-.5)*20,y:camMonster.y+(Math.random()-.5)*15,vx:(Math.random()-.5)*4,vy:-2-Math.random()*3,life:20,color:'#f0f'});
      }
    }
  }
  // boss damage
  if(boss&&boss.alive){
    const bd=Math.hypot(boss.x-x,boss.y-y);
    if(bd<r*1.5&&weapon.damage>0){
      const bdmg=Math.floor((1-bd/(r*1.5))*weapon.damage);
      boss.hp-=bdmg;
      if(boss.hp<=0){boss.alive=false;sfx('win');showMsg(boss.name+' DEFEATED!',3000);
        for(const p of players){if(p.alive&&!p.cpu)p.money+=200;}
        for(let k=0;k<20;k++)particles.push({x:boss.x+(Math.random()-.5)*30,y:boss.y+(Math.random()-.5)*20,vx:(Math.random()-.5)*5,vy:-2-Math.random()*4,life:30,color:boss.color});
      }
    }
  }
  for(let i=0;i<20;i++){const ang=Math.random()*Math.PI*2;const spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:25+Math.random()*15,
    color:weapon.type==='napalm'?'#ff4400':weapon.type==='dirt'?'#8b6914':'#ff6b35'});}
  explosions.push({x,y,radius:r,life:12,color:weapon.type==='napalm'?'#ff4400':'#ffa500'});
  if(weapon.type==='mirv'&&weapon.subs){
    for(let s=0;s<weapon.subs;s++){
      projectiles.push({x,y:y-10,vx:(Math.random()-.5)*4,vy:-3-Math.random()*3,
        owner,weapon:{...weapon,type:'projectile',subs:0},trail:[],type:'projectile'});
    }
  }
  if(weapon.type==='napalm'){
    sfx('sizzle');
    const spread=Math.floor(r*2.5);
    // batch napalm damage instead of 50+ setTimeouts
    for(let dx=-spread;dx<=spread;dx+=3){
      const nx=Math.max(1,Math.min(W-2,Math.floor(x)+dx));
      const ty2=terrain[nx];
      const centerH=terrain[Math.floor(x)]||y;
      if(ty2>=centerH-15){
        terrain[nx]=Math.min(H,terrain[nx]+.5);
        for(const p of players){
          if(!p.alive)continue;
          if(Math.abs(p.x-nx)<8){p.hp-=3;if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');skulls.push({x:p.x,y:p.y-15,life:120});}}
        }
        for(let k=0;k<2;k++)particles.push({x:nx+(Math.random()-.5)*4,y:ty2,vx:(Math.random()-.5)*.3,vy:-Math.random(),life:50+Math.random()*30,color:['#f00','#f40','#f80','#ff0'][Math.floor(Math.random()*4)]});
      }
    }
  }
}

function nextTurn(){
  let attempts=0;
  do{currentPlayer=(currentPlayer+1)%numPlayers;attempts++;}while(!players[currentPlayer].alive&&attempts<=numPlayers);
  const alive=players.filter(p=>p.alive);
  if(alive.length<=1){
    if(alive.length===1){alive[0].money+=100;showMsg(alive[0].name+' wins Round '+round+'!',2500);sfx('win');
      if(!alive[0].cpu){stats.roundsSurvived++;stats.maxMoney=Math.max(stats.maxMoney,alive[0].money);checkAchievements();}}
    gameState='roundOver';
    if(idleMode){
      setTimeout(()=>{round++;newRound();},2000);
    }else{
      const humanAlive=players.some(p=>p.alive&&!p.cpu);
      if(!humanAlive){setTimeout(endGame,2000);}
      else{setTimeout(()=>{round++;showShop();},2500);}
    }
    return;
  }
  wind+=(Math.random()-.5)*.8;wind=Math.max(-4,Math.min(4,wind));
  turnCount++;
  // stalemate check
  if(damageThisRound){stalemateTurns=0;damageThisRound=false;}
  else{stalemateTurns++;
    if(stalemateTurns===numPlayers*5)showMsg('⚠ STALEMATE WARNING!\nDeal damage or everyone dies!',3000);
    if(stalemateTurns>=numPlayers*10){
      showMsg('💀 STALEMATE! Everyone dies!',3000);sfx('explode');
      for(const p of players){if(p.alive){p.hp=0;p.alive=false;skulls.push({x:p.x,y:p.y-15,life:120});}}
      gameState='roundOver';
      const humanAlive=false;setTimeout(endGame,2000);return;
    }
  }
  // gunner: gets 2 shots per turn
  const cp=players[currentPlayer];
  if(cp&&cp.tank?.shotsPerTurn>1){
    cp.shotCount=(cp.shotCount||0);
    if(cp.shotCount<cp.tank.shotsPerTurn-1){
      cp.shotCount++;
      gameState='aiming';
      if(!cp.cpu)drawHand();
      updateUI();
      showMsg('Shot '+(cp.shotCount)+'/'+cp.tank.shotsPerTurn,600);
      return;
    }
    cp.shotCount=0;
  }
  // railgun: skips every other turn
  if(cp&&cp.tank?.turnsPerShot>1){
    cp.chargeCount=(cp.chargeCount||0)+1;
    if(cp.chargeCount<cp.tank.turnsPerShot){
      showMsg(cp.name+' charging...',800);
      // skip to next player
      let a2=0;do{currentPlayer=(currentPlayer+1)%numPlayers;a2++;}while(!players[currentPlayer].alive&&a2<=numPlayers);
      turnCount++;gameState='aiming';updateUI();return;
    }
    cp.chargeCount=0;
  }
  if(!cp?.cpu)drawHand();
  markedForDiscard=[];
  gameState='aiming';updateUI();
  if(Math.random()<.2&&players[currentPlayer]&&players[currentPlayer].alive)tankTalk(currentPlayer,'idle');
}

let shopOffers=[];
function showShop(){

    gamePhoto=null;
  }
  html.push('<div style="font:9px monospace;color:#888;margin-bottom:6px">Add a card ($) or skip</div>');
  // show current deck stats
  html.push('<div style="font:7px monospace;color:#555;margin-bottom:6px">Deck: '+deck.length+' | Discard: '+discard.length+'</div>');
  // card offers
  html.push('<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px">');
  shopOffers.forEach((card,i)=>{
    const rc={basic:'#888',common:'#0f0',uncommon:'#0ff',rare:'#f0f',legendary:'#ff0'}[card.rarity]||'#888';
    const p=players.find(pl=>!pl.cpu);
    const canBuy=p&&p.money>=card.cost;
    html.push('<button onclick="buyCard('+i+')" style="font:8px monospace;padding:6px 8px;border:2px solid '+rc+';background:#0a0a0a;color:'+(canBuy?rc:'#333')+';cursor:pointer;text-align:center;min-width:70px;line-height:1.4">');
    html.push('<b>'+card.name+'</b><br>');
    html.push('<span style="color:#888;font-size:7px">'+(card.damage?'DMG:'+card.damage+' ':'')+(card.radius?'R:'+card.radius:'')+'</span><br>');
    html.push('<span style="color:#aaa;font-size:6px">'+card.desc+'</span><br>');
    html.push('<span style="color:#ff0">$'+card.cost+'</span>');
    html.push('</button>');
  });
  html.push('</div>');
  // heal option
  const hp=players.find(pl=>!pl.cpu);
  if(hp)html.push('<button onclick="shopHeal()" style="font:8px monospace;padding:4px 12px;border:1px solid #f0f;background:#0a000a;color:'+(hp.money>=50?'#f0f':'#333')+';cursor:pointer">Heal 30 HP ($50)</button> ');
  // delete card option (every 3 floors, costs $200+floor*20)
  if(round%3===0){
    const delCost=200+round*20;
    const allDeck=[...deck,...discard].filter(c=>c.rarity!=='basic');
    if(allDeck.length&&hp){
      html.push('<div style="font:7px monospace;color:#f44;margin:4px 0">REMOVE A CARD ($'+delCost+')</div>');
      html.push('<div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center">');
      allDeck.forEach((card,i)=>{
        const rc={common:'#0f0',uncommon:'#0ff',rare:'#f0f',legendary:'#ff0'}[card.rarity]||'#888';
        html.push('<button onclick="deleteCard('+i+','+delCost+')" style="font:7px monospace;padding:2px 4px;border:1px solid '+(hp.money>=delCost?'#f44':'#333')+';background:#1a0000;color:'+(hp.money>=delCost?rc:'#333')+';cursor:pointer">✕ '+card.name+'</button>');
      });
      html.push('</div>');
    }
  }
  html.push('<button onclick="closeShop()" style="font:bold 12px monospace;padding:8px 24px;border:2px solid #ff0;background:#000;color:#ff0;cursor:pointer;margin-top:8px">NEXT FLOOR →</button>');
  for(const p of players){if(p.cpu)cpuBuy(p);}
  const el=document.getElementById('start');
  el.style.display='flex';el.innerHTML=html.join('');
}
function buyCard(idx){
  const card=shopOffers[idx];if(!card)return;
  const p=players.find(pl=>!pl.cpu);if(!p||p.money<card.cost)return;
  p.money-=card.cost;
  deck.push({...card});
  sfx('buy');showMsg('Added '+card.name+' to deck!',1500);showShop();
}
function shopHeal(){
  const p=players.find(pl=>!pl.cpu);if(!p||p.money<50)return;
  p.money-=50;p.hp=Math.min(p.maxHp||100,p.hp+30);sfx('buy');showShop();
}
function deleteCard(idx,cost){
  const p=players.find(pl=>!pl.cpu);if(!p||p.money<cost)return;
  const allDel=[...deck,...discard].filter(c=>c.rarity!=='basic');
  if(idx<0||idx>=allDel.length)return;
  const card=allDel[idx];
  p.money-=cost;
  // remove from deck or discard
  let di=deck.findIndex(c=>c.name===card.name&&c.rarity===card.rarity);
  if(di>=0)deck.splice(di,1);
  else{di=discard.findIndex(c=>c.name===card.name&&c.rarity===card.rarity);if(di>=0)discard.splice(di,1);}
  sfx('hit');showMsg('Removed '+card.name,1500);showShop();
}
function buyWeapon(pi,wi){
  sfx('buy');showShop();
}
function cpuBuy(p){
  // prioritize by situation
  const allCards=[...CORE_CARDS,...(CLASS_CARDS[p.tank?.id]||CLASS_CARDS.standard)];
  const buy=n=>{const card=allCards.find(w=>w.name===n);if(card&&p.money>=card.cost){p.money-=card.cost;p.inventory[n]=(p.inventory[n]||0)+1;return true;}return false;};
  // always want shields and big shots
  if(p.hp<60&&Math.random()<.7)buy('Shield');
  if(Math.random()<.5)buy('Big Shot');
  if(Math.random()<.4)buy('Big Shot');
  // offensive weapons based on budget
  if(p.money>600&&Math.random()<.5)buy('Nuke');
  if(p.money>400&&Math.random()<.4)buy("Deaths Head");
  if(p.money>300&&Math.random()<.5)buy('MIRV');
  if(p.money>200&&Math.random()<.4)buy('Napalm');
  if(Math.random()<.3)buy('Roller');
  if(Math.random()<.2)buy('Lemming');
  if(Math.random()<.2)buy('Swarm');
  if(p.hp<40&&Math.random()<.5)buy('Heallem');
  if(Math.random()<.15)buy('Digger');
  if(Math.random()<.15)buy('Teleport');
}
function buyUpgrade(pi,wn){
  const p=players[pi];if(!p)return;
  const lv=p.upgrades[wn]||0;
  const maxLv=UPGRADES[wn]?UPGRADES[wn].length:0;
  if(lv>=maxLv)return;
  const cost=UPGRADE_COST*(lv+1);
  if(p.money<cost)return;
  p.money-=cost;p.upgrades[wn]=lv+1;
  sfx('buy');showShop();
}
function closeShop(){document.getElementById('start').style.display='none';newRound();}
