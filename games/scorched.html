<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scorched Lemming</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:system-ui;-webkit-user-select:none;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:4px 8px;display:none;font:bold 11px monospace;color:#fff;text-shadow:0 1px 3px #000;pointer-events:none}
#hud.show{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:6px 8px;display:none;background:rgba(0,0,0,.9);border-top:1px solid #333}
#ui.show{display:block}
.ctrl-row{display:flex;gap:4px;align-items:center;justify-content:center;margin:2px 0;flex-wrap:wrap}
#ui label{font:10px monospace;color:#888}
#ui input[type=range]{width:80px;height:18px;accent-color:#ff6b35}
#ui .val{font:bold 11px monospace;color:#ff6b35;min-width:28px;text-align:center}
.wbtn{font:bold 10px monospace;padding:5px 8px;border:1px solid #555;border-radius:4px;background:rgba(30,30,30,.9);color:#ccc;cursor:pointer;white-space:nowrap}
.wbtn:active{background:#333}
.wbtn.sel{border-color:#ff6b35;color:#ff6b35}
.fbtn{font:bold 14px monospace;padding:8px 24px;border:2px solid #ff6b35;border-radius:6px;background:transparent;color:#ff6b35;cursor:pointer;margin-top:4px}
.fbtn:active{background:rgba(255,107,53,.2)}
#start{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#2040a0 0%,#8060a0 40%,#e08050 70%,#f0c830 100%);text-align:center;overflow-y:auto;padding:20px}
#start h1{font:900 28px system-ui;color:#f0c830;text-shadow:0 2px 4px rgba(0,0,0,.5);letter-spacing:2px;margin-bottom:4px}
#start .sub{font:11px monospace;color:#665;max-width:300px;line-height:1.5;margin-bottom:12px}
#start button{font:bold 14px monospace;padding:10px 30px;border:2px solid #ff6b35;border-radius:8px;background:transparent;color:#ff6b35;cursor:pointer}
#start select,#start input{font:12px monospace;padding:6px 10px;border:1px solid #333;border-radius:5px;background:#1a1a1a;color:#ccc;margin:4px}
.opt-row{display:flex;gap:6px;align-items:center;justify-content:center;margin:3px 0}
.opt-row label{font:10px monospace;color:#888}
#msg{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);z-index:15;font:bold 20px system-ui;color:#ff6b35;text-shadow:0 0 15px rgba(255,107,53,.4);opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;white-space:pre-line}
#msg.show{opacity:1}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <span id="turnInfo"></span>
  <span id="windInfo" style="padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.5)"></span>
  <span id="wpnInfo" style="color:#ffd700;font-size:10px"></span>
  <span style="margin-left:auto;font-size:10px" id="scores"></span>
</div>
<div id="ui">
  <div class="ctrl-row">
    <label>Angle</label><input type="range" id="asl" min="0" max="180" value="60"><span class="val" id="av">60°</span>
    <label>Power</label><input type="range" id="psl" min="5" max="100" value="50"><span class="val" id="pv">50</span>
  </div>
  <div class="ctrl-row" id="weaponBar"></div>
  <div class="ctrl-row"><button class="fbtn" id="fireBtn" onclick="fire()">FIRE</button></div>
</div>
<div id="start">
  <h1 style="color:#e08050">SCORCHED LEMMING</h1>
  <div class="sub" style="color:#c09060">The Mother of All Games.<br>Tanks on terrain. Aim & fire. Buy upgrades. Deploy lemmings.</div>
  <div class="opt-row"><label>Players</label><select id="np"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select>
  <label>CPU</label><select id="nc"><option value="0">0</option><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option></select></div>
  <div class="opt-row"><label>Rounds</label><select id="nr"><option value="3">3</option><option value="5" selected>5</option><option value="10">10</option></select></div>
  <button onclick="startGame()">PLAY</button>
</div>
<div id="msg"></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();onresize=resize;

const COLORS=['#ff6b35','#4ade80','#38bdf8','#f7c948','#a78bfa'];
const NAMES=['P1','P2','P3','P4','P5'];

const WEAPONS=[
  {name:'Shot',cost:0,radius:30,damage:40,count:99,type:'projectile'},
  {name:'Big Shot',cost:0,radius:50,damage:60,count:3,type:'projectile'},
  {name:'MIRV',cost:200,radius:25,damage:30,count:1,type:'mirv',subs:5},
  {name:'Napalm',cost:150,radius:40,damage:25,count:2,type:'napalm'},
  {name:'Dirt',cost:50,radius:35,damage:0,count:3,type:'dirt'},
  {name:'Digger',cost:100,radius:20,damage:50,count:2,type:'digger'},
  {name:'Roller',cost:75,radius:25,damage:35,count:2,type:'roller'},
  {name:'Lemming',cost:300,radius:15,damage:20,count:1,type:'lemming',ltype:'bomber'},
  {name:'Diglem',cost:250,radius:10,damage:15,count:1,type:'lemming',ltype:'digger'},
  {name:'Jumplem',cost:200,radius:12,damage:18,count:1,type:'lemming',ltype:'jumper'},
  {name:'Heallem',cost:350,radius:0,damage:0,count:1,type:'lemming',ltype:'healer'},
  {name:'Swarm',cost:500,radius:10,damage:12,count:1,type:'lemming',ltype:'swarm'},
  {name:'Shield',cost:100,radius:0,damage:0,count:2,type:'shield'},
  {name:'Teleport',cost:150,radius:0,damage:0,count:1,type:'teleport'},
];

let terrain,players,currentPlayer,wind,projectiles,explosions,particles,lemmings;
let gameState,round,maxRounds,numPlayers,numCPU,msgTimer;
let actx;

function initAudio(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();if(actx.state==='suspended')actx.resume();}
function sfx(type){
  if(!actx||actx.state!=='running')return;const n=actx.currentTime;
  if(type==='fire'){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=100;o.frequency.exponentialRampToValueAtTime(400,n+.08);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.12);}
  else if(type==='explode'){const buf=actx.createBuffer(1,actx.sampleRate*.3,actx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/actx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*10);}const s=actx.createBufferSource();s.buffer=buf;const g=actx.createGain();g.gain.value=.12;const fl=actx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=500;s.connect(fl);fl.connect(g);g.connect(actx.destination);s.start(n);}
  else if(type==='hit'){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=300;o.frequency.exponentialRampToValueAtTime(80,n+.2);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.25);}
  else if(type==='lemming'){const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=600;o.frequency.setValueAtTime(800,n+.05);o.frequency.setValueAtTime(600,n+.1);g.gain.setValueAtTime(.03,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.15);}
  else if(type==='buy'){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=500;o.frequency.setValueAtTime(700,n+.05);g.gain.setValueAtTime(.04,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.1);}
  else if(type==='win'){[523,659,784,1047].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.04,n+i*.1);g.gain.exponentialRampToValueAtTime(.001,n+i*.1+.15);o.connect(g);g.connect(actx.destination);o.start(n+i*.1);o.stop(n+i*.1+.15);});}
}

function generateTerrain(){
  terrain=new Float32Array(W);
  const style=Math.floor(Math.random()*4);
  let y=H*.4+Math.random()*H*.2;
  for(let x=0;x<W;x++){
    if(style===0)y+=Math.sin(x*.006)*3+Math.sin(x*.018)*1.5+(Math.random()-.5)*.5;
    else if(style===1)y+=Math.sin(x*.003)*4+(Math.random()-.5)*.3;
    else if(style===2){y+=Math.sin(x*.01)*2+Math.cos(x*.025)*1.5+(Math.random()-.5)*.6;if(x%Math.floor(W/5)===0)y+=Math.random()*30-15;}
    else y+=Math.sin(x*.005)*3+Math.sin(x*.03)*.8+(Math.random()-.5)*.4;
    y=Math.max(H*.2,Math.min(H*.78,y));
    terrain[x]=y;
  }
  for(let pass=0;pass<4;pass++){const tmp=new Float32Array(W);for(let x=0;x<W;x++){let s=0,c=0;for(let d=-4;d<=4;d++){const xx=x+d;if(xx>=0&&xx<W){s+=terrain[xx];c++;}}tmp[x]=s/c;}terrain=tmp;}
}

function placePlayers(){
  players=[];
  const spacing=W/(numPlayers+1);
  for(let i=0;i<numPlayers;i++){
    const x=Math.max(25,Math.min(W-25,Math.floor(spacing*(i+1))+(Math.random()*40-20)|0));
    const inv={};WEAPONS.forEach(w=>inv[w.name]=w.count);
    players.push({
      x,y:terrain[x],hp:100,alive:true,color:COLORS[i%5],name:NAMES[i%5],
      score:0,money:100,angle:i<numPlayers/2?60:120,power:50,
      weapon:0,inventory:inv,shield:0,cpu:i>=numPlayers-numCPU
    });
  }
}

function showMsg(txt,dur){const el=document.getElementById('msg');el.textContent=txt;el.classList.add('show');clearTimeout(msgTimer);msgTimer=setTimeout(()=>el.classList.remove('show'),dur||2000);}

function startGame(){
  document.getElementById('start').style.display='none';
  initAudio();
  numPlayers=parseInt(document.getElementById('np').value);
  numCPU=Math.min(parseInt(document.getElementById('nc').value),numPlayers-1);
  maxRounds=parseInt(document.getElementById('nr').value);
  round=1;newRound();
}

function newRound(){
  resize();generateTerrain();placePlayers();
  currentPlayer=0;projectiles=[];explosions=[];particles=[];lemmings=[];
  wind=(Math.random()-.5)*3;
  gameState='aiming';showMsg('Round '+round,2000);
  updateUI();
  document.getElementById('hud').classList.add('show');
  document.getElementById('ui').classList.add('show');
  requestAnimationFrame(loop);
}

function buildWeaponBar(){
  const p=players[currentPlayer];if(!p)return;
  const bar=document.getElementById('weaponBar');bar.innerHTML='';
  WEAPONS.forEach((w,i)=>{
    const cnt=p.inventory[w.name]||0;if(cnt<=0&&w.cost===0)return;
    const b=document.createElement('button');b.className='wbtn'+(p.weapon===i?' sel':'');
    b.textContent=w.name+(cnt<99?'('+cnt+')':'');
    b.onclick=()=>{if(cnt>0){p.weapon=i;buildWeaponBar();}};
    if(cnt<=0)b.style.opacity='.3';
    bar.appendChild(b);
  });
}

function updateUI(){
  const p=players[currentPlayer];if(!p)return;
  document.getElementById('turnInfo').textContent=(p.cpu?'CPU ':'')+p.name;
  document.getElementById('turnInfo').style.color=p.color;
  document.getElementById('windInfo').textContent='Wind:'+(wind>0?'→':'←')+Math.abs(wind).toFixed(1);
  document.getElementById('windInfo').style.color=wind>0?'#38bdf8':'#a78bfa';
  document.getElementById('wpnInfo').textContent=WEAPONS[p.weapon].name;
  document.getElementById('scores').textContent=players.map(p2=>(p2.alive?'':'☠')+p2.name+':$'+p2.money).join(' ');
  document.getElementById('asl').value=p.angle;document.getElementById('av').textContent=p.angle+'°';
  document.getElementById('psl').value=p.power;document.getElementById('pv').textContent=p.power;
  buildWeaponBar();
  if(p.cpu&&gameState==='aiming')setTimeout(cpuTurn,600);
}

document.getElementById('asl').oninput=function(){if(gameState==='aiming'&&!players[currentPlayer].cpu){players[currentPlayer].angle=+this.value;document.getElementById('av').textContent=this.value+'°';}};
document.getElementById('psl').oninput=function(){if(gameState==='aiming'&&!players[currentPlayer].cpu){players[currentPlayer].power=+this.value;document.getElementById('pv').textContent=this.value;}};

function cpuTurn(){
  if(gameState!=='aiming')return;
  const me=players[currentPlayer];
  let bestTarget=null,bestDist=Infinity;
  for(const p of players){if(p===me||!p.alive)continue;const d=Math.abs(p.x-me.x);if(d<bestDist){bestDist=d;bestTarget=p;}}
  if(!bestTarget){fire();return;}
  const dx=bestTarget.x-me.x,dy=bestTarget.y-me.y;
  const dist=Math.hypot(dx,dy);
  me.angle=Math.max(20,Math.min(160,Math.floor(Math.atan2(-dy,Math.abs(dx))*180/Math.PI)));
  me.power=Math.max(20,Math.min(90,Math.floor(dist*.15+Math.random()*20-10)));
  me.weapon=0;
  if(me.inventory['Big Shot']>0&&Math.random()<.3)me.weapon=1;
  if(me.inventory['Lemming']>0&&Math.random()<.15)me.weapon=7;
  setTimeout(fire,400);
}

function fire(){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];
  const w=WEAPONS[p.weapon];
  if((p.inventory[w.name]||0)<=0)return;
  if(w.type==='shield'){p.shield=60;p.inventory[w.name]--;gameState='waiting';sfx('buy');setTimeout(nextTurn,500);return;}
  if(w.type==='teleport'){const nx=Math.random()*W;p.x=Math.max(20,Math.min(W-20,nx));p.y=terrain[Math.floor(p.x)];p.inventory[w.name]--;gameState='waiting';sfx('buy');setTimeout(nextTurn,500);return;}
  p.inventory[w.name]--;
  const rad=p.angle*Math.PI/180;
  const dir=p.x<W/2?1:-1;
  const speed=p.power*.13;
  projectiles.push({x:p.x,y:p.y-14,vx:Math.cos(rad)*speed*dir,vy:-Math.sin(rad)*speed,
    owner:currentPlayer,weapon:w,trail:[],type:w.type});
  gameState='flying';sfx('fire');
}

function explode(x,y,weapon,owner){
  sfx('explode');
  const r=weapon.radius;
  if(weapon.type!=='dirt'){
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      if(terrain[tx]<y+depth)terrain[tx]=Math.min(H+10,terrain[tx]+depth*.6);
    }
  }else{
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      terrain[tx]=Math.max(H*.1,terrain[tx]-depth*.5);
    }
  }
  for(const p of players){
    if(!p.alive)continue;
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<r*1.5&&weapon.damage>0){
      let dmg=Math.floor((1-d/(r*1.5))*weapon.damage);
      if(p.shield>0){dmg=Math.floor(dmg*.2);p.shield=Math.max(0,p.shield-10);}
      p.hp-=dmg;
      if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');
        if(owner!==null&&players[owner])players[owner].money+=50;
        showMsg(p.name+' destroyed!',1500);
      }
    }
  }
  for(let i=0;i<20;i++){const ang=Math.random()*Math.PI*2;const spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:25+Math.random()*15,
    color:weapon.type==='napalm'?'#ff4400':weapon.type==='dirt'?'#8b6914':'#ff6b35'});}
  explosions.push({x,y,radius:r,life:12,color:weapon.type==='napalm'?'#ff4400':'#ffa500'});
  if(weapon.type==='mirv'&&weapon.subs){
    for(let s=0;s<weapon.subs;s++){
      projectiles.push({x,y:y-10,vx:(Math.random()-.5)*4,vy:-3-Math.random()*3,
        owner,weapon:{...weapon,type:'projectile',subs:0},trail:[],type:'projectile'});
    }
  }
  if(weapon.type==='napalm'){
    for(let s=0;s<6;s++){
      const nx=x+(Math.random()-.5)*r*2;
      setTimeout(()=>explode(nx,terrain[Math.max(0,Math.min(W-1,Math.floor(nx)))]||y,{radius:15,damage:15,type:'projectile'},owner),200+s*150);
    }
  }
}

function spawnLemming(x,y,owner,ltype){
  const col=players[owner]?players[owner].color:'#fff';
  if(ltype==='swarm'){
    for(let s=0;s<5;s++){
      lemmings.push({x:x+(Math.random()-0.5)*20,y:y-5,vx:(Math.random()>.5?1:-1)*(1.5+Math.random()),vy:-Math.random()*2,
        hp:15,owner,timer:0,color:col,ltype:'bomber',radius:10,damage:12});
    }
  }else{
    lemmings.push({x,y:y-5,vx:(Math.random()>.5?1:-1)*(ltype==='jumper'?2.5:1.2+Math.random()),vy:0,
      hp:ltype==='healer'?50:30,owner,timer:0,color:col,ltype:ltype||'bomber',
      radius:ltype==='digger'?10:15,damage:ltype==='healer'?0:20});
  }
  sfx('lemming');
}

function nextTurn(){
  let attempts=0;
  do{currentPlayer=(currentPlayer+1)%numPlayers;attempts++;}while(!players[currentPlayer].alive&&attempts<=numPlayers);
  const alive=players.filter(p=>p.alive);
  if(alive.length<=1){
    if(alive.length===1){alive[0].money+=100;showMsg(alive[0].name+' wins Round '+round+'!',2500);sfx('win');}
    gameState='roundOver';
    setTimeout(()=>{round++;if(round>maxRounds){endGame();}else{showShop();}},3000);
    return;
  }
  wind+=(Math.random()-.5)*.8;wind=Math.max(-4,Math.min(4,wind));
  gameState='aiming';updateUI();
}

function showShop(){
  const html=['<h1 style="font-size:22px;color:#ff6b35;margin-bottom:8px">SHOP — Round '+(round)+'</h1>'];
  html.push('<div style="font:11px monospace;color:#888;margin-bottom:10px">Buy weapons for next round</div>');
  for(const p of players){
    if(!p.alive&&p.hp<=0)continue;
    html.push('<div style="color:'+p.color+';font:bold 12px monospace;margin:6px 0 2px">'+(p.cpu?'CPU ':'')+p.name+' — $'+p.money+'</div>');
    if(!p.cpu){
      html.push('<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center">');
      WEAPONS.forEach((w,i)=>{
        if(w.cost===0)return;
        html.push('<button onclick="buyWeapon('+players.indexOf(p)+','+i+')" style="font:10px monospace;padding:4px 8px;border:1px solid #444;border-radius:4px;background:#1a1a1a;color:'+(p.money>=w.cost?'#ccc':'#555')+';cursor:pointer">'+w.name+' $'+w.cost+'</button>');
      });
      html.push('</div>');
    }else{
      cpuBuy(p);
    }
  }
  html.push('<button onclick="closeShop()" style="font:bold 14px monospace;padding:10px 30px;border:2px solid #ff6b35;border-radius:8px;background:transparent;color:#ff6b35;cursor:pointer;margin-top:12px">NEXT ROUND</button>');
  const el=document.getElementById('start');
  el.style.display='flex';el.innerHTML=html.join('');
}
function buyWeapon(pi,wi){
  const p=players[pi],w=WEAPONS[wi];
  if(p.money<w.cost)return;
  p.money-=w.cost;p.inventory[w.name]=(p.inventory[w.name]||0)+1;
  sfx('buy');showShop();
}
function cpuBuy(p){
  const wants=[2,3,7,8,9,10,11,4,12];
  for(const wi of wants){if(wi>=WEAPONS.length)continue;const w=WEAPONS[wi];if(p.money>=w.cost&&Math.random()<.4){p.money-=w.cost;p.inventory[w.name]=(p.inventory[w.name]||0)+1;}}
}
function closeShop(){document.getElementById('start').style.display='none';newRound();}

function endGame(){
  gameState='over';
  document.getElementById('ui').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  const winner=players.reduce((a,b)=>a.money>b.money?a:b);
  const el=document.getElementById('start');
  el.innerHTML='<h1 style="font:900 28px system-ui;color:#ff6b35">'+winner.name+' WINS!</h1><div style="font:12px monospace;color:#888;margin:8px 0;white-space:pre-line">'+players.map(p=>p.name+': $'+p.money).join('\n')+'</div><button onclick="location.reload()" style="font:bold 14px monospace;padding:10px 30px;border:2px solid #ff6b35;border-radius:8px;background:transparent;color:#ff6b35;cursor:pointer;margin-top:12px">PLAY AGAIN</button>';
  el.style.display='flex';sfx('win');
}

function update(dt){
  // projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>25)p.trail.shift();
    p.vx+=wind*.015;p.vy+=9.8*dt*2.8;
    p.x+=p.vx;p.y+=p.vy;
    const px2=Math.floor(p.x);
    if(px2>=0&&px2<W&&p.y>=terrain[px2]){
      if(p.type==='roller'){
        p.vy=0;p.y=terrain[px2]-1;
        p.vx*=.95;if(Math.abs(p.vx)<.3||p.trail.length>24){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='digger'){
        terrain[px2]=Math.min(H+10,terrain[px2]+2);p.vy=Math.abs(p.vy)*.8;
        if(p.vy<1){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='lemming'){spawnLemming(p.x,p.y,p.owner,p.weapon.ltype);projectiles.splice(i,1);continue;}
      explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);continue;
    }
    if(p.x<-100||p.x>W+100||p.y>H+100){projectiles.splice(i,1);continue;}
  }
  // lemmings
  for(let i=lemmings.length-1;i>=0;i--){
    const l=lemmings[i];l.timer+=dt;
    l.vy+=6*dt;l.x+=l.vx;l.y+=l.vy;
    const lx=Math.max(0,Math.min(W-1,Math.floor(l.x)));
    if(l.y>=terrain[lx]){
      l.y=terrain[lx];l.vy=0;
      if(l.ltype==='jumper'&&Math.random()<.08)l.vy=-4-Math.random()*3;
      if(Math.random()<.02)l.vx=-l.vx;
    }
    if(l.x<5||l.x>W-5)l.vx=-l.vx;
    // digger: eats terrain as it walks
    if(l.ltype==='digger'){
      for(let dx=-3;dx<=3;dx++){const tx=lx+dx;if(tx>=0&&tx<W)terrain[tx]=Math.min(H+10,terrain[tx]+dt*15);}
    }
    // healer: heals owner's tank
    if(l.ltype==='healer'){
      const ownerP=players[l.owner];
      if(ownerP&&ownerP.alive){
        const hd=Math.hypot(ownerP.x-l.x,ownerP.y-l.y);
        if(hd>15){const ha=Math.atan2(ownerP.y-l.y,ownerP.x-l.x);l.vx=Math.cos(ha)*1.5;}
        if(hd<25){ownerP.hp=Math.min(100,ownerP.hp+dt*8);
          if(Math.random()<.05)particles.push({x:l.x,y:l.y-8,vx:(Math.random()-.5),vy:-1,life:15,color:'#4ade80'});}
      }
    }
    // bomber/jumper/swarm: attack enemies on contact
    if(l.ltype!=='healer'){
      for(const p of players){
        if(!p.alive||players.indexOf(p)===l.owner)continue;
        if(Math.hypot(p.x-l.x,p.y-l.y)<20){
          explode(l.x,l.y,{radius:l.radius||15,damage:l.damage||20,type:'projectile'},l.owner);
          l.hp=0;break;
        }
      }
    }
    if(l.timer>10)l.hp-=dt*8;
    if(l.hp<=0||l.y>H+20){
      if(l.ltype==='digger'&&l.hp<=0)explode(l.x,l.y,{radius:20,damage:25,type:'projectile'},l.owner);
      lemmings.splice(i,1);
    }
  }
  // check if all projectiles done
  if(gameState==='flying'&&projectiles.length===0){
    gameState='waiting';setTimeout(nextTurn,800);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=explosions.length-1;i>=0;i--){explosions[i].life--;if(explosions[i].life<=0)explosions.splice(i,1);}
  // settle tanks
  for(const p of players){if(!p.alive)continue;const tx=Math.max(0,Math.min(W-1,Math.floor(p.x)));p.y=terrain[tx];if(p.shield>0)p.shield-=dt;}
}

function render(){
  // classic Scorched Earth sky gradient (blue → purple → orange → yellow)
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#2040a0');sky.addColorStop(.2,'#4060c0');sky.addColorStop(.4,'#8060a0');
  sky.addColorStop(.55,'#c06080');sky.addColorStop(.7,'#e08050');sky.addColorStop(.85,'#e8a040');
  sky.addColorStop(1,'#f0c830');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // terrain with layered gradient (like classic SE)
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]);
  ctx.lineTo(W,H);ctx.closePath();
  const tg=ctx.createLinearGradient(0,H*.2,0,H);
  tg.addColorStop(0,'#60a030');tg.addColorStop(.15,'#50882a');tg.addColorStop(.4,'#407020');
  tg.addColorStop(.7,'#305818');tg.addColorStop(1,'#204010');
  ctx.fillStyle=tg;ctx.fill();
  // terrain edge highlight
  ctx.strokeStyle='#70b838';ctx.lineWidth=1.5;
  ctx.beginPath();for(let x=0;x<W;x++)x===0?ctx.moveTo(x,terrain[x]):ctx.lineTo(x,terrain[x]);ctx.stroke();
  // sub-surface layers
  for(let layer=0;layer<3;layer++){
    const off=8+layer*12;
    ctx.strokeStyle=`rgba(${40-layer*10},${70-layer*15},${20-layer*5},.3)`;ctx.lineWidth=1;
    ctx.beginPath();for(let x=0;x<W;x++){const ty=terrain[x]+off;if(ty<H)x===0?ctx.moveTo(x,ty):ctx.lineTo(x,ty);}ctx.stroke();
  }

  // aim line
  if(gameState==='aiming'){
    const p=players[currentPlayer];
    if(p&&p.alive){
      const rad=p.angle*Math.PI/180,dir=p.x<W/2?1:-1,len=p.power*.5;
      ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(p.x,p.y-14);ctx.lineTo(p.x+Math.cos(rad)*len*dir,p.y-14-Math.sin(rad)*len);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // tanks
  for(const p of players){
    if(!p.alive)continue;
    const tx=p.x,ty=p.y;
    // shield
    if(p.shield>0){ctx.strokeStyle='rgba(100,200,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty-8,18,0,Math.PI*2);ctx.stroke();}
    // body
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;
    ctx.fillRect(tx-10,ty-7,20,7);ctx.fillRect(tx-6,ty-11,12,5);
    // barrel
    const rad=p.angle*Math.PI/180,dir=p.x<W/2?1:-1;
    ctx.strokeStyle=p.color;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(tx,ty-11);ctx.lineTo(tx+Math.cos(rad)*14*dir,ty-11-Math.sin(rad)*14);ctx.stroke();
    ctx.shadowBlur=0;
    // wheels
    ctx.fillStyle='#333';for(let wx=-8;wx<=8;wx+=4)ctx.fillRect(tx+wx-1.5,ty-2,3,3);
    // hp
    ctx.fillStyle='#300';ctx.fillRect(tx-12,ty-17,24,3);
    ctx.fillStyle=p.hp>50?'#4f4':p.hp>25?'#ff0':'#f44';ctx.fillRect(tx-12,ty-17,24*p.hp/100,3);
    // name
    ctx.fillStyle=p.color;ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText((p.cpu?'🤖':'')+p.name,tx,ty-20);
    if(players.indexOf(p)===currentPlayer&&gameState==='aiming'){ctx.fillStyle='#fff';ctx.fillText('▼',tx,ty-27);}
  }

  // lemmings
  for(const l of lemmings){
    const legPhase=Math.sin(l.timer*12)*2;
    ctx.fillStyle=l.color;
    if(l.ltype==='digger'){
      // pickaxe lemming - wider, carries tool
      ctx.fillRect(l.x-3,l.y-5,6,5);
      ctx.beginPath();ctx.arc(l.x,l.y-7,3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#888';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(l.x+3,l.y-7);ctx.lineTo(l.x+7,l.y-12+Math.sin(l.timer*8)*2);ctx.stroke();
      ctx.fillRect(l.x-2,l.y,2,2+legPhase);ctx.fillRect(l.x+1,l.y,2,2-legPhase);
    }else if(l.ltype==='jumper'){
      // springy lemming - tall, bouncy
      const stretch=l.vy<-1?2:0;
      ctx.fillRect(l.x-2,l.y-7-stretch,4,7+stretch);
      ctx.beginPath();ctx.arc(l.x,l.y-9-stretch,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(l.x-1,l.y-1,1,1);ctx.fillRect(l.x+1,l.y-1,1,1);
      ctx.fillStyle=l.color;
      ctx.fillRect(l.x-2,l.y,2,1+legPhase);ctx.fillRect(l.x,l.y,2,1-legPhase);
    }else if(l.ltype==='healer'){
      // medic lemming - cross symbol
      ctx.fillRect(l.x-2,l.y-6,4,6);
      ctx.beginPath();ctx.arc(l.x,l.y-8,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(l.x-0.5,l.y-6,1,4);ctx.fillRect(l.x-2,l.y-4.5,4,1);
      ctx.fillStyle=l.color;
      ctx.fillRect(l.x-2,l.y,2,2+legPhase);ctx.fillRect(l.x,l.y,2,2-legPhase);
      // heal aura
      ctx.strokeStyle='rgba(74,222,128,.25)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(l.x,l.y-4,8+Math.sin(l.timer*3)*2,0,Math.PI*2);ctx.stroke();
    }else{
      // default bomber lemming
      ctx.fillRect(l.x-2,l.y-6,4,6);
      ctx.beginPath();ctx.arc(l.x,l.y-8,3,0,Math.PI*2);ctx.fill();
      ctx.fillRect(l.x-2,l.y,2,2+legPhase);ctx.fillRect(l.x,l.y,2,2-legPhase);
    }
  }

  // projectiles
  for(const p of projectiles){
    ctx.strokeStyle='rgba(255,200,100,.3)';ctx.lineWidth=1;
    ctx.beginPath();for(let i=0;i<p.trail.length;i++)i===0?ctx.moveTo(p.trail[i].x,p.trail[i].y):ctx.lineTo(p.trail[i].x,p.trail[i].y);ctx.stroke();
    ctx.fillStyle='#fff';ctx.shadowColor='#ff6b35';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }

  // explosions
  for(const e of explosions){
    ctx.globalAlpha=e.life/12;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.radius);
    g.addColorStop(0,'rgba(255,255,100,.9)');g.addColorStop(.25,'rgba(255,80,30,.7)');g.addColorStop(.5,'rgba(200,30,80,.4)');g.addColorStop(.75,'rgba(120,20,160,.2)');g.addColorStop(1,'rgba(60,10,80,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // particles
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/25);ctx.fillStyle=p.color;ctx.fillRect(p.x-1,p.y-1,3,3);}
  ctx.globalAlpha=1;

  // wind arrow
  const wx=W/2,wy=H-12;
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(wx-25,wy);ctx.lineTo(wx+25,wy);ctx.stroke();
  ctx.fillStyle='#38bdf8';const wa=wx+wind*8;
  ctx.beginPath();ctx.moveTo(wa,wy-3);ctx.lineTo(wa+(wind>0?6:-6),wy);ctx.lineTo(wa,wy+3);ctx.fill();
}

let lastT=performance.now();
function loop(){
  const now=performance.now(),dt=Math.min(.04,(now-lastT)/1000);lastT=now;
  if(gameState!=='over'&&gameState!=='roundOver'){update(dt);render();requestAnimationFrame(loop);}
  else{render();}
}

// touch
let touchSY=null,touchSX=null;
cv.addEventListener('touchstart',e=>{if(gameState!=='aiming'||players[currentPlayer].cpu)return;const t=e.touches[0];touchSY=t.clientY;touchSX=t.clientX;if(actx&&actx.state==='suspended')actx.resume();});
cv.addEventListener('touchmove',e=>{if(gameState!=='aiming'||touchSY===null||players[currentPlayer].cpu)return;e.preventDefault();const t=e.touches[0];const dy=touchSY-t.clientY,dx=t.clientX-touchSX;const p=players[currentPlayer];p.angle=Math.max(0,Math.min(180,p.angle+Math.round(dy*.25)));p.power=Math.max(5,Math.min(100,p.power+Math.round(dx*.15)));touchSY=t.clientY;touchSX=t.clientX;updateUI();},{passive:false});
cv.addEventListener('touchend',()=>{touchSY=null;touchSX=null;});
let lastTap=0;
cv.addEventListener('touchend',()=>{const n=Date.now();if(n-lastTap<300&&gameState==='aiming'&&!players[currentPlayer].cpu)fire();lastTap=n;});
</script>
