<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scorched Lemming</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:monospace;-webkit-user-select:none;user-select:none;image-rendering:pixelated}
canvas{display:block;position:fixed;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:1px 4px;display:none;font:bold 9px monospace;color:#ff0;background:#000;border-bottom:1px solid #555}
#hud.show{display:flex;gap:6px;align-items:center}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:2px 4px;display:none;background:#000;border-top:1px solid #555}
#ui.show{display:flex;gap:3px;align-items:center;flex-wrap:nowrap}
#ui label{font:8px monospace;color:#0f0}
#ui input[type=range]{width:50px;height:12px;accent-color:#0f0}
#ui .val{font:bold 9px monospace;color:#0f0;min-width:20px;text-align:center}
#weaponBar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;gap:2px;flex:1;min-width:0}
#weaponBar::-webkit-scrollbar{display:none}
.wbtn{font:bold 7px monospace;padding:2px 4px;border:1px solid #555;border-radius:0;background:#000;color:#aaa;cursor:pointer;white-space:nowrap;flex-shrink:0}
.wbtn:active{background:#222}
.wbtn.sel{border-color:#ff0;color:#ff0;background:#111}
.fbtn{font:bold 10px monospace;padding:3px 10px;border:1px solid #f00;border-radius:0;background:#200;color:#f00;cursor:pointer}
.fbtn:active{background:#400}
#start{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;overflow-y:auto;padding:16px;border:3px solid #555}
#start h1{font:bold 20px monospace;color:#ff0;text-shadow:2px 2px #800;letter-spacing:2px;margin-bottom:2px}
#start .sub{font:9px monospace;color:#0f0;max-width:280px;line-height:1.3;margin-bottom:8px}
#start button{font:bold 11px monospace;padding:6px 20px;border:2px solid #ff0;border-radius:0;background:#000;color:#ff0;cursor:pointer}
#start select{font:10px monospace;padding:3px 6px;border:1px solid #555;border-radius:0;background:#000;color:#0f0;margin:2px}
.opt-row{display:flex;gap:4px;align-items:center;justify-content:center;margin:2px 0}
.opt-row label{font:8px monospace;color:#888}
#msg{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);z-index:15;font:bold 14px monospace;color:#ff0;text-shadow:2px 2px #000;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;white-space:pre-line}
#msg.show{opacity:1}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <span id="turnInfo"></span>
  <span id="windInfo" style="color:#0ff;font-size:8px"></span>
  <span id="wpnInfo" style="color:#ff0;font-size:8px"></span>
  <span style="margin-left:auto;font-size:8px;color:#888" id="scores"></span>
</div>
<div id="ui">
  <label>A</label><input type="range" id="asl" min="0" max="180" value="60"><span class="val" id="av">60</span>
  <label>P</label><input type="range" id="psl" min="5" max="100" value="50"><span class="val" id="pv">50</span>
  <div id="weaponBar"></div>
  <button class="fbtn" id="fireBtn" onclick="fire()">FIRE</button>
</div>
<div id="start">
  <h1 style="color:#ff0;text-shadow:2px 2px #800">SCORCHED LEMMING</h1>
  <div class="sub" style="color:#0f0">The Mother of All Games.<br>Tanks. Lemmings. Death's Heads. Nukes.<br>Achievements unlock permanent perks.</div>
  <div class="opt-row"><label>Players</label><select id="np"><option value="2">2</option><option value="3" selected>3</option><option value="4">4</option><option value="5">5</option></select>
  <label>CPU</label><select id="nc"><option value="0">0</option><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option></select></div>
  <div class="opt-row"><label>Rounds</label><select id="nr"><option value="3">3</option><option value="5" selected>5</option><option value="10">10</option></select></div>
  <button onclick="startGame()">PLAY</button>
</div>
<div id="msg"></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();onresize=resize;

const COLORS=['#ff0','#0f0','#0ff','#f0f','#f80'];
const NAMES=['P1','P2','P3','P4','P5'];

const WEAPONS=[
  {name:'Shot',cost:0,radius:30,damage:40,count:99,type:'projectile'},
  {name:'Big Shot',cost:0,radius:50,damage:60,count:3,type:'projectile'},
  {name:'MIRV',cost:200,radius:25,damage:30,count:1,type:'mirv',subs:5},
  {name:'Napalm',cost:150,radius:40,damage:25,count:2,type:'napalm'},
  {name:'Dirt',cost:50,radius:35,damage:0,count:3,type:'dirt'},
  {name:'Digger',cost:100,radius:20,damage:50,count:2,type:'digger'},
  {name:'Roller',cost:75,radius:25,damage:35,count:2,type:'roller'},
  {name:'Deaths Head',cost:400,radius:60,damage:80,count:0,type:'deathshead'},
  {name:'Lemming',cost:300,radius:15,damage:20,count:1,type:'lemming',ltype:'bomber'},
  {name:'Diglem',cost:250,radius:10,damage:15,count:1,type:'lemming',ltype:'digger'},
  {name:'Jumplem',cost:200,radius:12,damage:18,count:1,type:'lemming',ltype:'jumper'},
  {name:'Heallem',cost:350,radius:0,damage:0,count:1,type:'lemming',ltype:'healer'},
  {name:'Swarm',cost:500,radius:10,damage:12,count:1,type:'lemming',ltype:'swarm'},
  {name:'Shield',cost:100,radius:0,damage:0,count:2,type:'shield'},
  {name:'Teleport',cost:150,radius:0,damage:0,count:1,type:'teleport'},
  {name:'Nuke',cost:800,radius:90,damage:100,count:0,type:'projectile'},
];

// achievements + rogue unlocks (persisted)
const ACHIEVEMENTS=[
  {id:'first_kill',name:'First Blood',desc:'Destroy a tank',check:s=>s.kills>=1},
  {id:'5_kills',name:'Rampage',desc:'5 kills in one game',check:s=>s.kills>=5},
  {id:'10_kills',name:'Massacre',desc:'10 kills total',check:s=>s.totalKills>=10},
  {id:'lemming_kill',name:'Lemming Lord',desc:'Kill with a lemming',check:s=>s.lemmingKills>=1},
  {id:'win_1',name:'Victor',desc:'Win a game',check:s=>s.wins>=1},
  {id:'win_5',name:'Conqueror',desc:'Win 5 games',check:s=>s.wins>=5},
  {id:'survive_10',name:'Endurance',desc:'Survive 10 rounds',check:s=>s.roundsSurvived>=10},
  {id:'rich',name:'War Profiteer',desc:'Have $500+',check:s=>s.maxMoney>=500},
  {id:'headshot',name:'Skull Crusher',desc:"Use Death's Head",check:s=>s.deathsHeadUsed>=1},
  {id:'nuke',name:'Nuclear Option',desc:'Use a Nuke',check:s=>s.nukesUsed>=1},
];
const PERKS=[
  {id:'extra_hp',name:'+20 HP',desc:'Start with 120 HP',req:'first_kill'},
  {id:'extra_cash',name:'+$50',desc:'Start with $150',req:'5_kills'},
  {id:'free_mirv',name:'Free MIRV',desc:'Start with 1 MIRV',req:'win_1'},
  {id:'free_deaths',name:"Free Death's Head",desc:"Start with 1 Death's Head",req:'headshot'},
  {id:'armor',name:'Armor',desc:'Take 15% less damage',req:'survive_10'},
  {id:'free_nuke',name:'Free Nuke',desc:'Start with 1 Nuke',req:'nuke'},
];
let stats=JSON.parse(localStorage.getItem('sl_stats')||'{}');
if(!stats.kills)stats={kills:0,totalKills:0,lemmingKills:0,wins:0,roundsSurvived:0,maxMoney:0,deathsHeadUsed:0,nukesUsed:0,unlocked:[]};
function saveStats(){localStorage.setItem('sl_stats',JSON.stringify(stats));}
function checkAchievements(){
  let newOnes=[];
  for(const a of ACHIEVEMENTS){
    if(stats.unlocked.includes(a.id))continue;
    if(a.check(stats)){stats.unlocked.push(a.id);newOnes.push(a);saveStats();}
  }
  if(newOnes.length)showMsg('ACHIEVEMENT!\n'+newOnes.map(a=>'['+a.name+'] '+a.desc).join('\n'),3000);
}
function getPerks(){return PERKS.filter(p=>stats.unlocked.includes(p.req));}
let skulls=[];

let terrain,players,currentPlayer,wind,projectiles,explosions,particles,lemmings;
let gameState,round,maxRounds,numPlayers,numCPU,msgTimer;
let actx,shakeX=0,shakeY=0,shakeLife=0,turnCount=0;

function initAudio(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();if(actx.state==='suspended')actx.resume();}
function sfx(type){
  if(!actx||actx.state!=='running')return;const n=actx.currentTime;
  if(type==='fire'){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=100;o.frequency.exponentialRampToValueAtTime(400,n+.08);g.gain.setValueAtTime(.08,n);g.gain.exponentialRampToValueAtTime(.001,n+.12);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.12);}
  else if(type==='explode'){const buf=actx.createBuffer(1,actx.sampleRate*.3,actx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<d.length;i++){const t=i/actx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*10);}const s=actx.createBufferSource();s.buffer=buf;const g=actx.createGain();g.gain.value=.12;const fl=actx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=500;s.connect(fl);fl.connect(g);g.connect(actx.destination);s.start(n);}
  else if(type==='hit'){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=300;o.frequency.exponentialRampToValueAtTime(80,n+.2);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.25);}
  else if(type==='lemming'){const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=600;o.frequency.setValueAtTime(800,n+.05);o.frequency.setValueAtTime(600,n+.1);g.gain.setValueAtTime(.03,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.15);}
  else if(type==='buy'){const o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.value=500;o.frequency.setValueAtTime(700,n+.05);g.gain.setValueAtTime(.04,n);g.gain.exponentialRampToValueAtTime(.001,n+.1);o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.1);}
  else if(type==='win'){[523,659,784,1047].forEach((f,i)=>{const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(.04,n+i*.1);g.gain.exponentialRampToValueAtTime(.001,n+i*.1+.15);o.connect(g);g.connect(actx.destination);o.start(n+i*.1);o.stop(n+i*.1+.15);});}
}

function generateTerrain(){
  terrain=new Float32Array(W);
  const style=Math.floor(Math.random()*4);
  let y=H*.5+Math.random()*H*.15;
  for(let x=0;x<W;x++){
    if(style===0)y+=Math.sin(x*.006)*3+Math.sin(x*.018)*1.5+(Math.random()-.5)*.5;
    else if(style===1)y+=Math.sin(x*.003)*4+(Math.random()-.5)*.3;
    else if(style===2){y+=Math.sin(x*.01)*2+Math.cos(x*.025)*1.5+(Math.random()-.5)*.6;if(x%Math.floor(W/5)===0)y+=Math.random()*30-15;}
    else y+=Math.sin(x*.005)*3+Math.sin(x*.03)*.8+(Math.random()-.5)*.4;
    y=Math.max(H*.3,Math.min(H*.75,y));
    terrain[x]=y;
  }
  for(let pass=0;pass<4;pass++){const tmp=new Float32Array(W);for(let x=0;x<W;x++){let s=0,c=0;for(let d=-4;d<=4;d++){const xx=x+d;if(xx>=0&&xx<W){s+=terrain[xx];c++;}}tmp[x]=s/c;}terrain=tmp;}
}

function placePlayers(){
  players=[];
  const spacing=W/(numPlayers+1);
  for(let i=0;i<numPlayers;i++){
    const x=Math.max(25,Math.min(W-25,Math.floor(spacing*(i+1))+(Math.random()*40-20)|0));
    const inv={};WEAPONS.forEach(w=>inv[w.name]=w.count);
    const isCpu=i>=numPlayers-numCPU;
    const perks=isCpu?[]:getPerks();
    let hp=100,money=100;
    if(perks.find(p=>p.id==='extra_hp'))hp=120;
    if(perks.find(p=>p.id==='extra_cash'))money=150;
    if(perks.find(p=>p.id==='free_mirv'))inv['MIRV']=(inv['MIRV']||0)+1;
    if(perks.find(p=>p.id==='free_deaths'))inv["Deaths Head"]=(inv["Deaths Head"]||0)+1;
    if(perks.find(p=>p.id==='free_nuke'))inv['Nuke']=(inv['Nuke']||0)+1;
    players.push({
      x,y:terrain[x],hp,maxHp:hp,alive:true,color:COLORS[i%5],name:NAMES[i%5],
      score:0,money,angle:i<numPlayers/2?60:120,power:50,
      weapon:0,inventory:inv,shield:0,cpu:isCpu,kills:0,
      armor:perks.find(p=>p.id==='armor')?.15:0
    });
  }
}

function showMsg(txt,dur){const el=document.getElementById('msg');el.textContent=txt;el.classList.add('show');clearTimeout(msgTimer);msgTimer=setTimeout(()=>el.classList.remove('show'),dur||2000);}

function startGame(){
  document.getElementById('start').style.display='none';
  initAudio();
  numPlayers=parseInt(document.getElementById('np').value);
  numCPU=Math.min(parseInt(document.getElementById('nc').value),numPlayers-1);
  maxRounds=parseInt(document.getElementById('nr').value);
  round=1;newRound();
}

function newRound(){
  resize();generateTerrain();placePlayers();
  currentPlayer=0;projectiles=[];explosions=[];particles=[];lemmings=[];skulls=[];turnCount=0;
  wind=(Math.random()-.5)*3;
  gameState='aiming';showMsg('Round '+round,2000);
  updateUI();
  document.getElementById('hud').classList.add('show');
  document.getElementById('ui').classList.add('show');
  requestAnimationFrame(loop);
}

function buildWeaponBar(){
  const p=players[currentPlayer];if(!p)return;
  const bar=document.getElementById('weaponBar');bar.innerHTML='';
  WEAPONS.forEach((w,i)=>{
    const cnt=p.inventory[w.name]||0;if(cnt<=0&&w.cost===0)return;
    const b=document.createElement('button');b.className='wbtn'+(p.weapon===i?' sel':'');
    b.textContent=w.name+(cnt<99?'('+cnt+')':'');
    b.onclick=()=>{if(cnt>0){p.weapon=i;buildWeaponBar();}};
    if(cnt<=0)b.style.opacity='.3';
    bar.appendChild(b);
  });
}

function updateUI(){
  const p=players[currentPlayer];if(!p)return;
  document.getElementById('turnInfo').textContent=(p.cpu?'CPU ':'')+p.name;
  document.getElementById('turnInfo').style.color=p.color;
  document.getElementById('windInfo').textContent='Wind:'+(wind>0?'→':'←')+Math.abs(wind).toFixed(1);
  document.getElementById('windInfo').style.color=wind>0?'#38bdf8':'#a78bfa';
  document.getElementById('wpnInfo').textContent=WEAPONS[p.weapon].name;
  document.getElementById('scores').textContent=players.map(p2=>(p2.alive?'':'☠')+p2.name+':$'+p2.money).join(' ');
  document.getElementById('asl').value=p.angle;document.getElementById('av').textContent=p.angle+'°';
  document.getElementById('psl').value=p.power;document.getElementById('pv').textContent=p.power;
  buildWeaponBar();
  if(p.cpu&&gameState==='aiming')setTimeout(cpuTurn,600);
}

document.getElementById('asl').oninput=function(){if(gameState==='aiming'&&!players[currentPlayer].cpu){players[currentPlayer].angle=+this.value;document.getElementById('av').textContent=this.value+'°';}};
document.getElementById('psl').oninput=function(){if(gameState==='aiming'&&!players[currentPlayer].cpu){players[currentPlayer].power=+this.value;document.getElementById('pv').textContent=this.value;}};

function cpuTurn(){
  if(gameState!=='aiming')return;
  const me=players[currentPlayer];
  let bestTarget=null,bestDist=Infinity;
  for(const p of players){if(p===me||!p.alive)continue;const d=Math.abs(p.x-me.x);if(d<bestDist){bestDist=d;bestTarget=p;}}
  if(!bestTarget){fire();return;}
  const dx=bestTarget.x-me.x,dy=bestTarget.y-me.y;
  const dist=Math.hypot(dx,dy);
  me.angle=Math.max(10,Math.min(170,Math.floor(Math.atan2(-dy,dx)*180/Math.PI)));
  me.power=Math.max(20,Math.min(90,Math.floor(dist*.12+Math.random()*15)));
  me.weapon=0;
  if(me.inventory['Big Shot']>0&&Math.random()<.3)me.weapon=1;
  if(me.inventory['Lemming']>0&&Math.random()<.15)me.weapon=7;
  setTimeout(fire,400);
}

function fire(){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];
  const w=WEAPONS[p.weapon];
  if((p.inventory[w.name]||0)<=0)return;
  if(w.type==='shield'){p.shield=60;p.inventory[w.name]--;gameState='waiting';sfx('buy');setTimeout(nextTurn,500);return;}
  if(w.type==='teleport'){const nx=Math.random()*W;p.x=Math.max(20,Math.min(W-20,nx));p.y=terrain[Math.floor(p.x)];p.inventory[w.name]--;gameState='waiting';sfx('buy');setTimeout(nextTurn,500);return;}
  if(w.name==='Deaths Head'&&!p.cpu)stats.deathsHeadUsed++;
  if(w.name==='Nuke'&&!p.cpu)stats.nukesUsed++;
  if(w.name==='Deaths Head'||w.name==='Nuke')checkAchievements();
  p.inventory[w.name]--;
  const rad=p.angle*Math.PI/180;
  const speed=p.power*.13;
  projectiles.push({x:p.x,y:p.y-12,vx:Math.cos(rad)*speed,vy:-Math.sin(rad)*speed,
    owner:currentPlayer,weapon:w,trail:[],type:w.type});
  gameState='flying';sfx('fire');
}

function explode(x,y,weapon,owner){
  sfx('explode');
  shakeLife=8+weapon.radius*.1;
  const r=weapon.radius;
  if(weapon.type!=='dirt'){
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      if(terrain[tx]<y+depth)terrain[tx]=Math.min(H+10,terrain[tx]+depth*.6);
    }
  }else{
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      terrain[tx]=Math.max(H*.1,terrain[tx]-depth*.5);
    }
  }
  for(const p of players){
    if(!p.alive)continue;
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<r*1.5&&weapon.damage>0){
      let dmg=Math.floor((1-d/(r*1.5))*weapon.damage);
      if(p.shield>0){dmg=Math.floor(dmg*.2);p.shield=Math.max(0,p.shield-10);}
      if(p.armor)dmg=Math.floor(dmg*(1-p.armor));
      p.hp-=dmg;
      if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');
        if(owner!==null&&players[owner]){
          players[owner].money+=50;players[owner].kills=(players[owner].kills||0)+1;
          if(!players[owner].cpu){stats.kills++;stats.totalKills++;checkAchievements();}
        }
        showMsg(p.name+' destroyed!',1500);
        // death skull marker
        skulls.push({x:p.x,y:p.y-15,life:120});
      }
    }
  }
  for(let i=0;i<20;i++){const ang=Math.random()*Math.PI*2;const spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:25+Math.random()*15,
    color:weapon.type==='napalm'?'#ff4400':weapon.type==='dirt'?'#8b6914':'#ff6b35'});}
  explosions.push({x,y,radius:r,life:12,color:weapon.type==='napalm'?'#ff4400':'#ffa500'});
  if(weapon.type==='mirv'&&weapon.subs){
    for(let s=0;s<weapon.subs;s++){
      projectiles.push({x,y:y-10,vx:(Math.random()-.5)*4,vy:-3-Math.random()*3,
        owner,weapon:{...weapon,type:'projectile',subs:0},trail:[],type:'projectile'});
    }
  }
  if(weapon.type==='napalm'){
    for(let s=0;s<6;s++){
      const nx=x+(Math.random()-.5)*r*2;
      setTimeout(()=>explode(nx,terrain[Math.max(0,Math.min(W-1,Math.floor(nx)))]||y,{radius:15,damage:15,type:'projectile'},owner),200+s*150);
    }
  }
}

function spawnLemming(x,y,owner,ltype){
  const col=players[owner]?players[owner].color:'#fff';
  if(ltype==='swarm'){
    for(let s=0;s<5;s++){
      lemmings.push({x:x+(Math.random()-0.5)*20,y:y-5,vx:(Math.random()>.5?1:-1)*(1.5+Math.random()),vy:-Math.random()*2,
        hp:15,owner,timer:0,color:col,ltype:'bomber',radius:10,damage:12});
    }
  }else{
    lemmings.push({x,y:y-5,vx:(Math.random()>.5?1:-1)*(ltype==='jumper'?2.5:1.2+Math.random()),vy:0,
      hp:ltype==='healer'?50:30,owner,timer:0,color:col,ltype:ltype||'bomber',
      radius:ltype==='digger'?10:15,damage:ltype==='healer'?0:20});
  }
  sfx('lemming');
}

function nextTurn(){
  let attempts=0;
  do{currentPlayer=(currentPlayer+1)%numPlayers;attempts++;}while(!players[currentPlayer].alive&&attempts<=numPlayers);
  const alive=players.filter(p=>p.alive);
  if(alive.length<=1){
    if(alive.length===1){alive[0].money+=100;showMsg(alive[0].name+' wins Round '+round+'!',2500);sfx('win');
      if(!alive[0].cpu){stats.roundsSurvived++;stats.maxMoney=Math.max(stats.maxMoney,alive[0].money);checkAchievements();}}
    gameState='roundOver';
    setTimeout(()=>{round++;if(round>maxRounds){endGame();}else{showShop();}},3000);
    return;
  }
  wind+=(Math.random()-.5)*.8;wind=Math.max(-4,Math.min(4,wind));
  turnCount++;gameState='aiming';updateUI();
}

function showShop(){
  const html=['<h1 style="font-size:22px;color:#ff6b35;margin-bottom:8px">SHOP — Round '+(round)+'</h1>'];
  html.push('<div style="font:11px monospace;color:#888;margin-bottom:10px">Buy weapons for next round</div>');
  for(const p of players){
    if(!p.alive&&p.hp<=0)continue;
    html.push('<div style="color:'+p.color+';font:bold 12px monospace;margin:6px 0 2px">'+(p.cpu?'CPU ':'')+p.name+' — $'+p.money+'</div>');
    if(!p.cpu){
      html.push('<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center">');
      WEAPONS.forEach((w,i)=>{
        if(w.cost===0)return;
        html.push('<button onclick="buyWeapon('+players.indexOf(p)+','+i+')" style="font:10px monospace;padding:4px 8px;border:1px solid #444;border-radius:4px;background:#1a1a1a;color:'+(p.money>=w.cost?'#ccc':'#555')+';cursor:pointer">'+w.name+' $'+w.cost+'</button>');
      });
      html.push('</div>');
    }else{
      cpuBuy(p);
    }
  }
  html.push('<button onclick="closeShop()" style="font:bold 14px monospace;padding:10px 30px;border:2px solid #ff6b35;border-radius:8px;background:transparent;color:#ff6b35;cursor:pointer;margin-top:12px">NEXT ROUND</button>');
  const el=document.getElementById('start');
  el.style.display='flex';el.innerHTML=html.join('');
}
function buyWeapon(pi,wi){
  const p=players[pi],w=WEAPONS[wi];
  if(p.money<w.cost)return;
  p.money-=w.cost;p.inventory[w.name]=(p.inventory[w.name]||0)+1;
  sfx('buy');showShop();
}
function cpuBuy(p){
  const wants=[2,3,7,8,9,10,11,4,12];
  for(const wi of wants){if(wi>=WEAPONS.length)continue;const w=WEAPONS[wi];if(p.money>=w.cost&&Math.random()<.4){p.money-=w.cost;p.inventory[w.name]=(p.inventory[w.name]||0)+1;}}
}
function closeShop(){document.getElementById('start').style.display='none';newRound();}

function endGame(){
  gameState='over';
  document.getElementById('ui').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  const winner=players.reduce((a,b)=>a.money>b.money?a:b);
  if(!winner.cpu){stats.wins++;checkAchievements();}
  saveStats();
  const perks=getPerks();
  const el=document.getElementById('start');
  let h='<h1 style="font:bold 22px monospace;color:#ff0;text-shadow:2px 2px #800">'+winner.name+' WINS!</h1>';
  h+='<div style="font:10px monospace;color:#0f0;margin:6px 0;white-space:pre-line">'+players.map(p=>p.name+': $'+p.money+' ('+((p.kills||0))+' kills)').join('\n')+'</div>';
  h+='<div style="font:9px monospace;color:#888;margin:4px 0">ACHIEVEMENTS: '+stats.unlocked.length+'/'+ACHIEVEMENTS.length+'</div>';
  if(stats.unlocked.length){h+='<div style="font:8px monospace;color:#0ff;margin:2px 0">'+stats.unlocked.map(id=>{const a=ACHIEVEMENTS.find(x=>x.id===id);return a?'['+a.name+']':'';}).join(' ')+'</div>';}
  if(perks.length){h+='<div style="font:8px monospace;color:#f0f;margin:2px 0">PERKS: '+perks.map(p=>p.name).join(', ')+'</div>';}
  h+='<button onclick="location.reload()" style="font:bold 12px monospace;padding:8px 24px;border:2px solid #ff0;border-radius:0;background:#000;color:#ff0;cursor:pointer;margin-top:8px">PLAY AGAIN</button>';
  el.innerHTML=h;el.style.display='flex';sfx('win');
}

function update(dt){
  // projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>25)p.trail.shift();
    p.vx+=wind*.015;p.vy+=9.8*dt*2.8;
    p.x+=p.vx;p.y+=p.vy;
    const px2=Math.floor(p.x);
    if(px2>=0&&px2<W&&p.y>=terrain[px2]){
      if(p.type==='roller'){
        p.y=terrain[px2]-1;p.vy=0;
        const nx=Math.max(1,Math.min(W-2,px2+Math.sign(p.vx)));
        const slope=terrain[nx]-terrain[px2];
        p.vx+=slope*.15;p.vx*=.97;
        if(Math.abs(p.vx)<.2){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='digger'){
        terrain[px2]=Math.min(H+10,terrain[px2]+2);p.vy=Math.abs(p.vy)*.8;
        if(p.vy<1){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='lemming'){spawnLemming(p.x,p.y,p.owner,p.weapon.ltype);projectiles.splice(i,1);continue;}
      explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);continue;
    }
    // Death's Head homing after apex
    if(p.type==='deathshead'&&p.vy>0){
      let closest=null,cd=Infinity;
      for(const pl of players){if(!pl.alive||players.indexOf(pl)===p.owner)continue;
        const dd=Math.hypot(pl.x-p.x,pl.y-p.y);if(dd<cd){cd=dd;closest=pl;}}
      if(closest){
        const ha=Math.atan2(closest.y-p.y,closest.x-p.x);
        p.vx+=(Math.cos(ha)*3-p.vx)*.04;
      }
    }
    if(p.x<-100||p.x>W+100||p.y>H+100){projectiles.splice(i,1);continue;}
  }
  // lemmings
  for(let i=lemmings.length-1;i>=0;i--){
    const l=lemmings[i];l.timer+=dt;
    l.vy+=6*dt;l.x+=l.vx;l.y+=l.vy;
    const lx=Math.max(0,Math.min(W-1,Math.floor(l.x)));
    if(l.y>=terrain[lx]){
      l.y=terrain[lx];l.vy=0;
      if(l.ltype==='jumper'&&Math.random()<.08)l.vy=-4-Math.random()*3;
      if(Math.random()<.02)l.vx=-l.vx;
    }
    if(l.x<5||l.x>W-5)l.vx=-l.vx;
    // digger: eats terrain as it walks
    if(l.ltype==='digger'){
      for(let dx=-3;dx<=3;dx++){const tx=lx+dx;if(tx>=0&&tx<W)terrain[tx]=Math.min(H+10,terrain[tx]+dt*15);}
    }
    // healer: heals owner's tank
    if(l.ltype==='healer'){
      const ownerP=players[l.owner];
      if(ownerP&&ownerP.alive){
        const hd=Math.hypot(ownerP.x-l.x,ownerP.y-l.y);
        if(hd>15){const ha=Math.atan2(ownerP.y-l.y,ownerP.x-l.x);l.vx=Math.cos(ha)*1.5;}
        if(hd<25){ownerP.hp=Math.min(100,ownerP.hp+dt*8);
          if(Math.random()<.05)particles.push({x:l.x,y:l.y-8,vx:(Math.random()-.5),vy:-1,life:15,color:'#4ade80'});}
      }
    }
    // bomber/jumper/swarm: attack enemies on contact
    if(l.ltype!=='healer'){
      for(const p of players){
        if(!p.alive||players.indexOf(p)===l.owner)continue;
        if(Math.hypot(p.x-l.x,p.y-l.y)<20){
          explode(l.x,l.y,{radius:l.radius||15,damage:l.damage||20,type:'projectile'},l.owner);
          if(!players[l.owner]?.cpu){stats.lemmingKills++;checkAchievements();}
          l.hp=0;break;
        }
      }
    }
    if(l.timer>10)l.hp-=dt*8;
    if(l.hp<=0||l.y>H+20){
      if(l.ltype==='digger'&&l.hp<=0)explode(l.x,l.y,{radius:20,damage:25,type:'projectile'},l.owner);
      lemmings.splice(i,1);
    }
  }
  // check if all projectiles done
  if(gameState==='flying'&&projectiles.length===0){
    gameState='waiting';setTimeout(nextTurn,800);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=explosions.length-1;i>=0;i--){explosions[i].life--;if(explosions[i].life<=0)explosions.splice(i,1);}
  for(let i=skulls.length-1;i>=0;i--){skulls[i].life--;skulls[i].y-=.1;if(skulls[i].life<=0)skulls.splice(i,1);}
  // settle tanks
  for(const p of players){if(!p.alive)continue;const tx=Math.max(0,Math.min(W-1,Math.floor(p.x)));p.y=terrain[tx];if(p.shield>0)p.shield-=dt;}
}

function render(){
  ctx.imageSmoothingEnabled=false;
  // screen shake
  if(shakeLife>0){shakeX=(Math.random()-.5)*shakeLife;shakeY=(Math.random()-.5)*shakeLife;shakeLife-=.5;}
  else{shakeX=0;shakeY=0;}
  ctx.save();ctx.translate(shakeX,shakeY);

  // DOS-era banded sky with dither noise
  const skyColors=['#000088','#0000a0','#0000c0','#2020c0','#4040b0','#6040a0','#804080','#a04060','#c06040','#d08030','#e0a020','#e8c010','#f0d800'];
  const bandH=Math.ceil(H/skyColors.length);
  for(let i=0;i<skyColors.length;i++){ctx.fillStyle=skyColors[i];ctx.fillRect(0,i*bandH,W,bandH+1);}
  // dither between sky bands
  for(let i=0;i<skyColors.length-1;i++){
    const y=i*bandH+bandH;
    ctx.fillStyle=skyColors[i+1];
    for(let x=0;x<W;x+=2)if((x+i)%4<2)ctx.fillRect(x,y-2,1,4);
  }

  // terrain - solid fill with pixel edge
  ctx.fillStyle='#40a020';
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  // sub-layers with dither
  const subColors=['#38901a','#308014','#28700e','#206008','#185004','#103004'];
  for(let s=0;s<subColors.length;s++){
    ctx.fillStyle=subColors[s];
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]+5+s*7);
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }
  // terrain dither texture (pixel noise like DOS)
  for(let x=0;x<W;x+=2){
    const ty=Math.floor(terrain[x]);
    if(ty<H){
      ctx.fillStyle=(x*7+ty*3)%8<2?'#50b028':'#389018';
      ctx.fillRect(x,ty+1,1,1);
      if((x*11+ty*5)%12<2){ctx.fillStyle='#286010';ctx.fillRect(x,ty+3,1,1);}
    }
  }
  // terrain top edge
  ctx.strokeStyle='#80e040';ctx.lineWidth=1;
  ctx.beginPath();for(let x=0;x<W;x++)x===0?ctx.moveTo(x,terrain[x]):ctx.lineTo(x,terrain[x]);ctx.stroke();

  // aim line
  if(gameState==='aiming'){
    const p=players[currentPlayer];
    if(p&&p.alive){
      const rad=p.angle*Math.PI/180,len=p.power*.5;
      ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(p.x,p.y-12);ctx.lineTo(p.x+Math.cos(rad)*len,p.y-12-Math.sin(rad)*len);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // tanks (chunky pixel art style)
  for(const p of players){
    if(!p.alive)continue;
    const tx=p.x,ty=p.y;
    // shield (pixelated circle)
    if(p.shield>0){ctx.strokeStyle='#00ffff';ctx.lineWidth=1;ctx.strokeRect(tx-14,ty-18,28,20);}
    // treads
    ctx.fillStyle='#444';ctx.fillRect(tx-11,ty-3,22,4);
    ctx.fillStyle='#222';for(let wx=-10;wx<=10;wx+=4)ctx.fillRect(tx+wx,ty-2,2,2);
    // body (flat pixel block)
    ctx.fillStyle=p.color;
    ctx.fillRect(tx-9,ty-8,18,6);
    // turret dome
    ctx.fillRect(tx-5,ty-12,10,5);
    // barrel (thick, pixel)
    const rad=p.angle*Math.PI/180;
    const bx=Math.cos(rad)*16,by=-Math.sin(rad)*16;
    ctx.strokeStyle=p.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(tx,ty-12);ctx.lineTo(tx+bx,ty-12+by);ctx.stroke();
    // hp bar (DOS style)
    ctx.fillStyle='#800';ctx.fillRect(tx-12,ty-16,24,2);
    ctx.fillStyle=p.hp>50?'#0f0':p.hp>25?'#ff0':'#f00';ctx.fillRect(tx-12,ty-16,Math.floor(24*p.hp/100),2);
    // name
    ctx.fillStyle='#ff0';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText((p.cpu?'CPU ':'')+p.name,tx,ty-19);
    if(players.indexOf(p)===currentPlayer&&gameState==='aiming'){ctx.fillStyle='#fff';ctx.fillText('v',tx,ty-24);}
  }

  // lemmings (classic pixel art with hair, arms, walking)
  for(const l of lemmings){
    const lp=Math.sin(l.timer*10);
    const dir=l.vx>0?1:-1;
    const bx=l.x,by=l.y;
    // all lemmings get: hair, body, arms, legs
    // hair (green tuft like original lemmings)
    ctx.fillStyle='#0a0';
    ctx.fillRect(bx-2,by-12,4,2);ctx.fillRect(bx-1,by-13,2,1);
    // head
    ctx.fillStyle=l.color;
    ctx.fillRect(bx-2,by-10,4,3);
    // eyes
    ctx.fillStyle='#000';ctx.fillRect(bx+dir,by-9,1,1);
    // body
    if(l.ltype==='digger'){
      ctx.fillStyle='#a0a';ctx.fillRect(bx-2,by-7,4,5);
      // pickaxe
      ctx.strokeStyle='#aaa';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx+dir*3,by-9);ctx.lineTo(bx+dir*7,by-13+lp*3);ctx.stroke();
      ctx.fillStyle='#888';ctx.fillRect(bx+dir*6,by-14+lp*3,3,2);
    }else if(l.ltype==='jumper'){
      ctx.fillStyle='#ff0';ctx.fillRect(bx-2,by-7,4,5);
      // cape
      ctx.fillStyle='#f00';ctx.fillRect(bx-dir*2,by-7,2,4+Math.abs(l.vy));
    }else if(l.ltype==='healer'){
      ctx.fillStyle='#fff';ctx.fillRect(bx-2,by-7,4,5);
      // red cross
      ctx.fillStyle='#f00';ctx.fillRect(bx-0.5,by-7,1,5);ctx.fillRect(bx-2,by-5,4,1);
      // heal sparkle
      if(Math.sin(l.timer*5)>.5){ctx.fillStyle='#0f0';ctx.fillRect(bx+dir*4,by-8,2,2);}
    }else{
      // bomber - blue suit
      ctx.fillStyle='#00f';ctx.fillRect(bx-2,by-7,4,5);
    }
    // arms (swing with walk)
    ctx.fillStyle=l.color;
    ctx.fillRect(bx-3,by-6+lp,1,3);ctx.fillRect(bx+2,by-6-lp,1,3);
    // legs (walk cycle)
    ctx.fillRect(bx-2,by-2,2,2+lp*1.5);ctx.fillRect(bx,by-2,2,2-lp*1.5);
    // feet
    ctx.fillStyle='#000';
    ctx.fillRect(bx-2,by+lp*1.5,2,1);ctx.fillRect(bx,by-lp*1.5,2,1);
  }

  // smoke from damaged tanks
  for(const p of players){
    if(!p.alive||p.hp>40)continue;
    if(Math.random()<.15){
      particles.push({x:p.x+(Math.random()-0.5)*6,y:p.y-14,vx:(Math.random()-.5)*.5,vy:-1-Math.random(),
        life:15+Math.random()*10,color:p.hp>20?'#555':'#333'});
    }
  }

  // projectiles (DOS-style: white dot + dotted trail)
  for(const p of projectiles){
    // dotted trail
    ctx.fillStyle='#aa8';
    for(let i=0;i<p.trail.length;i+=2)ctx.fillRect(p.trail[i].x,p.trail[i].y,1,1);
    // death's head draws a skull
    if(p.type==='deathshead'){
      ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('☠',p.x,p.y+3);
    }else{
      // normal bullet: bright pixel
      ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1,3,3);
      ctx.fillStyle='#ff0';ctx.fillRect(p.x,p.y,1,1);
    }
  }

  // explosions
  for(const e of explosions){
    ctx.globalAlpha=e.life/12;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.radius);
    g.addColorStop(0,'#ff0');g.addColorStop(.3,'#f00');g.addColorStop(.6,'#800');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  // particles
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/25);ctx.fillStyle=p.color;ctx.fillRect(p.x-1,p.y-1,3,3);}
  ctx.globalAlpha=1;

  // death skulls
  ctx.font='bold 12px monospace';ctx.textAlign='center';
  for(const sk of skulls){
    ctx.globalAlpha=Math.min(1,sk.life/30);
    ctx.fillStyle='#fff';ctx.fillText('☠',sk.x,sk.y);
    ctx.globalAlpha=1;
  }

  // wind arrow
  const wx=W/2,wy=H-12;
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(wx-25,wy);ctx.lineTo(wx+25,wy);ctx.stroke();
  ctx.fillStyle='#38bdf8';const wa=wx+wind*8;
  ctx.beginPath();ctx.moveTo(wa,wy-3);ctx.lineTo(wa+(wind>0?6:-6),wy);ctx.lineTo(wa,wy+3);ctx.fill();

  ctx.restore();
  // CRT scanlines
  ctx.fillStyle='rgba(0,0,0,.08)';
  for(let sy=0;sy<H;sy+=2)ctx.fillRect(0,sy,W,1);
  // CRT vignette corners
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fillRect(0,0,4,H);ctx.fillRect(W-4,0,4,H);ctx.fillRect(0,0,W,3);ctx.fillRect(0,H-3,W,3);
  // round/turn counter
  ctx.fillStyle='#0f0';ctx.font='8px monospace';ctx.textAlign='left';
  ctx.fillText('R'+round+'/'+maxRounds+' T'+turnCount,6,H-6);
}

let lastT=performance.now();
function loop(){
  const now=performance.now(),dt=Math.min(.04,(now-lastT)/1000);lastT=now;
  if(gameState!=='over'&&gameState!=='roundOver'){update(dt);render();requestAnimationFrame(loop);}
  else{render();}
}

// touch
let touchSY=null,touchSX=null;
cv.addEventListener('touchstart',e=>{if(gameState!=='aiming'||players[currentPlayer].cpu)return;const t=e.touches[0];touchSY=t.clientY;touchSX=t.clientX;if(actx&&actx.state==='suspended')actx.resume();});
cv.addEventListener('touchmove',e=>{if(gameState!=='aiming'||touchSY===null||players[currentPlayer].cpu)return;e.preventDefault();const t=e.touches[0];const dy=touchSY-t.clientY,dx=t.clientX-touchSX;const p=players[currentPlayer];p.angle=Math.max(0,Math.min(180,p.angle+Math.round(dy*.25)));p.power=Math.max(5,Math.min(100,p.power+Math.round(dx*.15)));touchSY=t.clientY;touchSX=t.clientX;updateUI();},{passive:false});
cv.addEventListener('touchend',()=>{touchSY=null;touchSX=null;});
let lastTap=0;
cv.addEventListener('touchend',()=>{const n=Date.now();if(n-lastTap<300&&gameState==='aiming'&&!players[currentPlayer].cpu)fire();lastTap=n;});
</script>
