<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scorched Lemming</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:monospace;-webkit-user-select:none;user-select:none;image-rendering:pixelated}
canvas{display:block;position:fixed;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:1px 4px;display:none;font:bold 9px monospace;color:#ff0;background:rgba(0,0,0,.85);border-bottom:1px solid #444}
#hud.show{display:flex;gap:6px;align-items:center}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:2px 4px;display:none;background:rgba(0,0,0,.9);border-top:1px solid #444}
#ui.show{display:flex;flex-direction:column;gap:1px;padding:3px 6px}
.mbtn{font:bold 10px monospace;padding:4px 8px;border:1px solid #444;background:#0a0a0a;color:#0f0;cursor:pointer}
.mbtn:active{background:#1a1a00;color:#ff0}
#ui label{font:10px monospace;color:#0a0}
#ui input[type=range]{height:18px;accent-color:#0f0}
#ui .val{font:bold 11px monospace;color:#0f0;min-width:22px;text-align:center}
#weaponBar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:flex;gap:2px;flex:1;min-width:0}
#weaponBar::-webkit-scrollbar{display:none}
.wbtn{font:bold 8px monospace;padding:3px 5px;border:1px solid #444;border-radius:0;background:#0a0a0a;color:#999;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:border-color .1s}
.wbtn:active{background:#1a1a00}
.wbtn.sel{border-color:#ff0;color:#ff0;background:#1a1a00;box-shadow:0 0 3px #ff0}
.fbtn{font:bold 12px monospace;padding:5px 14px;border:1px solid #f00;border-radius:0;background:#1a0000;color:#f00;cursor:pointer;text-shadow:0 0 4px #f00}
.fbtn:active{background:#400}
#start{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;text-align:center;overflow-y:auto;padding:16px;border:3px double #666}
#start h1{font:bold 20px monospace;color:#ff0;text-shadow:2px 2px #800;letter-spacing:2px;margin-bottom:2px}
#start .sub{font:9px monospace;color:#0f0;max-width:280px;line-height:1.3;margin-bottom:8px}
#start button{font:bold 11px monospace;padding:6px 20px;border:2px solid #ff0;border-radius:0;background:#000;color:#ff0;cursor:pointer;text-shadow:0 0 6px #ff0}
#start button:active{background:#1a1a00}
#start select{font:10px monospace;padding:3px 6px;border:1px solid #555;border-radius:0;background:#0a0a0a;color:#0f0;margin:2px}
.opt-row{display:flex;gap:4px;align-items:center;justify-content:center;margin:2px 0}
.opt-row label{font:8px monospace;color:#888}
#msg{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);z-index:15;font:bold 14px monospace;color:#ff0;text-shadow:2px 2px #000,0 0 8px #ff0;opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;white-space:pre-line}
#msg.show{opacity:1}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <span id="turnInfo"></span>
  <span id="windInfo" style="color:#0ff;font-size:8px"></span>
  <span style="margin-left:auto;font-size:8px;color:#888" id="scores"></span>
  <span style="color:#0f0;font-size:7px">💎<span id="idleGemHud">0</span></span>
  <button onclick="toggleIdle()" style="font:bold 7px monospace;padding:1px 4px;border:1px solid #555;background:#000;color:#555;cursor:pointer;pointer-events:all" id="idleBtn">IDLE</button>
  <button onclick="toggleMusic()" style="font:bold 7px monospace;padding:1px 4px;border:1px solid #555;background:#000;color:#f80;cursor:pointer;pointer-events:all" id="musBtn">♪</button>
  <button onclick="toggleCam()" style="font:bold 7px monospace;padding:1px 4px;border:1px solid #555;background:#000;color:#0ff;cursor:pointer;pointer-events:all" id="camBtn">CAM</button>
</div>
<div id="wpnBar" style="position:fixed;top:16px;left:0;right:0;z-index:10;display:none;padding:1px 2px;background:rgba(0,0,0,.9);border-bottom:1px solid #333">
  <div id="weaponBar" style="display:flex;flex-wrap:wrap;gap:1px;justify-content:center"></div>
</div>
<div id="ui">
  <div style="display:flex;gap:2px;align-items:center;width:100%">
    <label>A</label><input type="range" id="asl" min="0" max="180" value="60" style="flex:1;min-width:0"><span class="val" id="av">60</span>
  </div>
  <div style="display:flex;gap:2px;align-items:center;width:100%">
    <label>P</label><input type="range" id="psl" min="5" max="100" value="50" style="flex:1;min-width:0"><span class="val" id="pv">50</span>
  </div>
  <div style="display:flex;gap:2px;align-items:center;justify-content:center">
    <button class="mbtn" onclick="moveTank(-1)">◀</button>
    <span id="fuelInfo" style="font:7px monospace;color:#08f;min-width:20px;text-align:center">100</span>
    <button class="mbtn" onclick="moveTank(1)">▶</button>
    <button class="mbtn" onclick="jetpack()" id="jetBtn" style="color:#f80">JET</button>
    <span id="wpnInfo" style="color:#ff0;font-size:8px;margin:0 1px"></span>
    <button class="fbtn" id="fireBtn" onclick="fire()">FIRE</button>
  </div>
</div>
<div id="start">
  <h1 style="color:#ff0;text-shadow:2px 2px #800">SCORCHED LEMMING</h1>
  <div class="sub" style="color:#0f0">Roguelike Tank Combat.<br>Pick a tank. Build your skill tree. Survive the dungeon.</div>
  <div class="opt-row"><label style="color:#888;font:8px monospace">You + 5 CPU. Infinite floors. How deep can you go?</label></div>
  <div style="font:8px monospace;color:#888;margin:6px 0">CHOOSE YOUR TANK</div>
  <div id="tankPick" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px"></div>
  <div style="font:8px monospace;color:#888;margin:4px 0">CHOOSE SKILL PATH</div>
  <div id="skillPick" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:8px"></div>
  <button onclick="startGame()">ENTER DUNGEON</button>
  <div style="font:8px monospace;color:#888;margin:8px 0 2px">💎 GEMS &amp; UPGRADES</div>
  <div style="font:7px monospace;color:#555;margin-top:2px" id="gemInfo"></div>
  <div id="permUpgrades" style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:4px"></div>
  <div style="font:8px monospace;color:#888;margin:8px 0 2px">🏆 ACHIEVEMENTS</div>
  <div id="achieveList" style="display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-top:2px;max-width:320px"></div>
</div>
<div id="msg"></div>
<script>

  {name:'Arctic',sky:['#4060a0','#5070b0','#6080c0','#7090d0','#80a0d8','#90b0e0','#a0c0e8','#b0d0f0','#c0e0f8','#d0e8ff','#e0f0ff','#e8f4ff','#f0f8ff'],ground:'#d8e8f0',groundSub:['#c8d8e0','#b8c8d8','#a8b8c8','#98a8b8','#8898a8','#788898']},

  {name:'Climber',cost:250,radius:12,damage:15,count:1,type:'lemming',ltype:'climber'},
  {name:'Bouncer',cost:100,radius:20,damage:30,count:2,type:'bouncer',bounces:4},
  {name:'Flame',cost:175,radius:8,damage:10,count:2,type:'flame'},
  {name:'DirtSpray',cost:75,radius:20,damage:0,count:2,type:'dirtspray'},
  {name:'DirtMIRV',cost:125,radius:25,damage:0,count:1,type:'dirtmirv',subs:6},
  {name:'Shield',cost:100,radius:0,damage:0,count:2,type:'shield'},
  {name:'Parachute',cost:50,radius:0,damage:0,count:3,type:'parachute'},
  {name:'Teleport',cost:150,radius:0,damage:0,count:1,type:'teleport'},
  {name:'Nuke',cost:800,radius:90,damage:100,count:0,type:'projectile'},
];

// achievements + rogue unlocks (persisted)
const ACHIEVEMENTS=[
  {id:'first_kill',name:'First Blood',desc:'Destroy a tank',check:s=>s.kills>=1},
  {id:'5_kills',name:'Rampage',desc:'5 kills in one game',check:s=>s.kills>=5},
  {id:'10_kills',name:'Massacre',desc:'10 kills total',check:s=>s.totalKills>=10},
  {id:'lemming_kill',name:'Lemming Lord',desc:'Kill with a lemming',check:s=>s.lemmingKills>=1},
  {id:'win_1',name:'Victor',desc:'Win a game',check:s=>s.wins>=1},
  {id:'win_5',name:'Conqueror',desc:'Win 5 games',check:s=>s.wins>=5},
  {id:'survive_10',name:'Endurance',desc:'Survive 10 rounds',check:s=>s.roundsSurvived>=10},
  {id:'rich',name:'War Profiteer',desc:'Have $500+',check:s=>s.maxMoney>=500},
  {id:'headshot',name:'Skull Crusher',desc:"Use Death's Head",check:s=>s.deathsHeadUsed>=1},
  {id:'nuke',name:'Nuclear Option',desc:'Use a Nuke',check:s=>s.nukesUsed>=1},
];
const PERKS=[
  {id:'extra_hp',name:'+20 HP',desc:'Start with 120 HP',req:'first_kill'},
  {id:'extra_cash',name:'+$50',desc:'Start with $150',req:'5_kills'},
  {id:'free_mirv',name:'Free MIRV',desc:'Start with 1 MIRV',req:'win_1'},
  {id:'free_deaths',name:"Free Death's Head",desc:"Start with 1 Death's Head",req:'headshot'},
  {id:'armor',name:'Armor',desc:'Take 15% less damage',req:'survive_10'},
  {id:'free_nuke',name:'Free Nuke',desc:'Start with 1 Nuke',req:'nuke'},
];
let stats;try{stats=JSON.parse(localStorage.getItem('sl_stats')||'{}');}catch(e){stats={};}
if(!stats.kills){stats={kills:0,totalKills:0,lemmingKills:0,wins:0,roundsSurvived:0,maxMoney:0,deathsHeadUsed:0,nukesUsed:0,unlocked:[],idleGems:10,permUpgrades:{}};localStorage.setItem('sl_stats',JSON.stringify(stats));}
if(!stats.idleGems&&stats.idleGems!==0)stats.idleGems=10;
if(!stats.permUpgrades)stats.permUpgrades={};
function saveStats(){localStorage.setItem('sl_stats',JSON.stringify(stats));}
function checkAchievements(){
  let newOnes=[];
  for(const a of ACHIEVEMENTS){
    if(stats.unlocked.includes(a.id))continue;
    if(a.check(stats)){stats.unlocked.push(a.id);newOnes.push(a);saveStats();}
  }
  if(newOnes.length)showMsg('ACHIEVEMENT!\n'+newOnes.map(a=>'['+a.name+'] '+a.desc).join('\n'),3000);
}
function getPerks(){return PERKS.filter(p=>stats.unlocked.includes(p.req));}
function buildAchieveUI(){
  const el=document.getElementById('achieveList');if(!el)return;el.innerHTML='';
  for(const a of ACHIEVEMENTS){
    const done=stats.unlocked&&stats.unlocked.includes(a.id);
    const perk=PERKS.find(p=>p.req===a.id);
    const d=document.createElement('div');
    d.style.cssText='font:7px monospace;padding:3px 5px;border:1px solid '+(done?'#0f0':'#333')+';background:'+(done?'#001a00':'#060606')+';color:'+(done?'#0f0':'#555')+';text-align:left;line-height:1.3;min-width:70px';
    d.innerHTML=(done?'✓ ':'○ ')+'<b>'+a.name+'</b><br><span style="color:'+(done?'#080':'#444')+'">'+a.desc+'</span>'+(perk?'<br><span style="color:'+(done?'#ff0':'#333')+'">→ '+perk.name+'</span>':'');
    el.appendChild(d);
  }
}

// permanent roguelike upgrades (bought with idle gems)
const PERM_UPGRADES=[
  {id:'perm_hp',name:'+10 HP',desc:'All runs start +10 HP',cost:5,max:5,apply:p=>{p.hp+=10*(stats.permUpgrades.perm_hp||0);p.maxHp=p.hp;}},
  {id:'perm_fuel',name:'+15 Fuel',desc:'All runs start +15 fuel',cost:3,max:5,apply:p=>{p.fuel+=15*(stats.permUpgrades.perm_fuel||0);}},
  {id:'perm_cash',name:'+$25',desc:'All runs start +$25',cost:4,max:4,apply:p=>{p.money+=25*(stats.permUpgrades.perm_cash||0);}},
  {id:'perm_shot',name:'Shot+',desc:'Base Shot +10 damage',cost:6,max:3,apply:p=>{}},
  {id:'perm_armor',name:'Armor+',desc:'Take 5% less damage per level',cost:8,max:3,apply:p=>{p.armor=(p.armor||0)+.05*(stats.permUpgrades.perm_armor||0);}},
  {id:'perm_bigshot',name:'Free Big Shot',desc:'+2 Big Shots per run',cost:5,max:2,apply:p=>{p.inventory['Big Shot']=(p.inventory['Big Shot']||0)+2*(stats.permUpgrades.perm_bigshot||0);}},
  {id:'cpu_aim',name:'CPU Aim+',desc:'Auto-pilot aims better',cost:4,max:5,apply:p=>{}},
  {id:'cpu_weapons',name:'CPU Weapons+',desc:'Auto-pilot uses better weapons',cost:6,max:3,apply:p=>{}},
  {id:'cpu_move',name:'CPU Move+',desc:'Auto-pilot repositions',cost:5,max:3,apply:p=>{}},
];
function applyPermUpgrades(p){for(const pu of PERM_UPGRADES)pu.apply(p);}
function buildPermUI(){
  if(!stats.permUpgrades)stats.permUpgrades={};
  const gi=document.getElementById('gemInfo');
  if(gi)gi.textContent='Gems: '+(stats.idleGems||0);
  const el=document.getElementById('permUpgrades');if(!el)return;el.innerHTML='';
  for(const pu of PERM_UPGRADES){
    const lv=stats.permUpgrades[pu.id]||0;
    if(lv>=pu.max)continue;
    const cost=pu.cost*(lv+1);
    const b=document.createElement('button');
    b.style.cssText='font:7px monospace;padding:2px 4px;border:1px solid '+((stats.idleGems||0)>=cost?'#ff0':'#333')+';background:#0a0a00;color:'+((stats.idleGems||0)>=cost?'#ff0':'#444')+';cursor:pointer';
    b.textContent=pu.name+' Lv'+(lv+1)+' ('+cost+'💎)';
    b.title=pu.desc;
    b.onclick=()=>{if((stats.idleGems||0)>=cost){stats.idleGems-=cost;stats.permUpgrades[pu.id]=(stats.permUpgrades[pu.id]||0)+1;saveStats();buildPermUI();sfx('buy');}};
    el.appendChild(b);
  }
}

let idleMode=false,idleGemTimer=0;
function toggleIdle(){
  idleMode=!idleMode;
  const p=players.find(pl=>!pl.cpu&&pl.alive);
  if(idleMode&&p){p.cpu=true;showMsg('AUTO-PILOT ON',1500);}
  else if(!idleMode&&p){p.cpu=false;showMsg('Manual control',1500);}
  document.getElementById('idleBtn').style.color=idleMode?'#0f0':'#555';
  document.getElementById('idleBtn').textContent=idleMode?'AUTO':'IDLE';
  if(idleMode&&gameState==='aiming')updateUI();
}

let skulls=[];

// tank taunts (inspired by classic SE style)

  "Ha! You couldn't hit water if you fell out of a boat!",

function toggleMusic(){
  musicOn=!musicOn;
  document.getElementById('musBtn').style.color=musicOn?'#f80':'#555';
  if(musicOn&&!musicLoop)startMusic();

function startMusic(){
  if(musicLoop)clearInterval(musicLoop);
  songIdx=Math.floor(Math.random()*SONGS.length);beatIdx=0;
  const tick=()=>{
    if(!musicOn||!actx||actx.state!=='running')return;
    const song=SONGS[songIdx];const n=actx.currentTime;const dur=60/song.bpm*.9;
    // bass
    const bf=song.bass[beatIdx%song.bass.length];
    if(bf>0){const o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.value=bf;
      g.gain.setValueAtTime(.04,n);g.gain.exponentialRampToValueAtTime(.001,n+dur);
      const fl=actx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=200;
      o.connect(fl);fl.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+dur);}
    // melody
    const mf=song.mel[beatIdx%song.mel.length];
    if(mf>0){const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=mf;
      g.gain.setValueAtTime(.025,n);g.gain.exponentialRampToValueAtTime(.001,n+dur*.8);
      o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+dur);}
    // harmony
    const hf=song.mel2[beatIdx%song.mel2.length];
    if(hf>0){const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=hf;
      g.gain.setValueAtTime(.015,n);g.gain.exponentialRampToValueAtTime(.001,n+dur*.7);
      o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+dur);}
    // drums (every 4 beats)
    if(beatIdx%4===0){const buf=actx.createBuffer(1,actx.sampleRate*.05,actx.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.15));
      const s=actx.createBufferSource();s.buffer=buf;const g=actx.createGain();g.gain.value=.06;
      s.connect(g);g.connect(actx.destination);s.start(n);}
    if(beatIdx%4===2){const o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=800;
      g.gain.setValueAtTime(.02,n);g.gain.exponentialRampToValueAtTime(.001,n+.03);
      o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.04);}
    beatIdx++;
    if(beatIdx>=song.bass.length*2){beatIdx=0;songIdx=(songIdx+1)%SONGS.length;}
  };
  musicLoop=setInterval(tick,60000/SONGS[songIdx].bpm);
}

  }
}

function generateTerrain(){
  terrain=new Float32Array(W);
  const style=Math.floor(Math.random()*4);
  let y=H*.5+Math.random()*H*.15;
  for(let x=0;x<W;x++){
    if(style===0)y+=Math.sin(x*.006)*3+Math.sin(x*.018)*1.5+(Math.random()-.5)*.5;
    else if(style===1)y+=Math.sin(x*.003)*4+(Math.random()-.5)*.3;
    else if(style===2){y+=Math.sin(x*.01)*2+Math.cos(x*.025)*1.5+(Math.random()-.5)*.6;if(x%Math.floor(W/5)===0)y+=Math.random()*30-15;}
    else y+=Math.sin(x*.005)*3+Math.sin(x*.03)*.8+(Math.random()-.5)*.4;
    y=Math.max(H*.3,Math.min(H*.75,y));
    terrain[x]=y;
  }
  for(let pass=0;pass<4;pass++){const tmp=new Float32Array(W);for(let x=0;x<W;x++){let s=0,c=0;for(let d=-4;d<=4;d++){const xx=x+d;if(xx>=0&&xx<W){s+=terrain[xx];c++;}}tmp[x]=s/c;}terrain=tmp;}
  // add platforms (floating ledges)
  const numPlats=2+Math.floor(Math.random()*3);
  for(let p=0;p<numPlats;p++){
    const px2=40+Math.floor(Math.random()*(W-80));
    const pw=30+Math.floor(Math.random()*40);
    const py2=terrain[px2]-30-Math.floor(Math.random()*40);
    for(let x=px2;x<Math.min(W,px2+pw);x++)terrain[x]=Math.min(terrain[x],py2);
  }
}

function placePlayers(){
  players=[];
  const spacing=W/(numPlayers+1);
  for(let i=0;i<numPlayers;i++){
    const x=Math.max(25,Math.min(W-25,Math.floor(spacing*(i+1))+(Math.random()*40-20)|0));
    const inv={};WEAPONS.forEach(w=>inv[w.name]=w.count);
    const isCpu=i>=numPlayers-numCPU;
    const perks=isCpu?[]:getPerks();
    const tank=isCpu?TANKS[Math.floor(Math.random()*TANKS.length)]:TANKS[chosenTank];
    const floorScale=1+round*.08;
    let hp=Math.floor(tank.hp*(isCpu?floorScale:1)),money=100+round*10;
    if(perks.find(p=>p.id==='extra_hp'))hp+=20;
    if(perks.find(p=>p.id==='extra_cash'))money=150;
    if(perks.find(p=>p.id==='free_mirv'))inv['MIRV']=(inv['MIRV']||0)+1;
    if(perks.find(p=>p.id==='free_deaths'))inv["Deaths Head"]=(inv["Deaths Head"]||0)+1;
    if(perks.find(p=>p.id==='free_nuke'))inv['Nuke']=(inv['Nuke']||0)+1;
    players.push({
      x,y:terrain[x],hp,maxHp:hp,alive:true,color:COLORS[i%5],name:NAMES[i%5],
      score:0,money,angle:i<numPlayers/2?60:120,power:50,fuel:tank.fuel,
      weapon:0,inventory:inv,upgrades:{},shield:0,cpu:isCpu,kills:0,
      tank:tank,skillMods:{},parachutes:0,parachuteOpen:0,
      armor:perks.find(p=>p.id==='armor')?0.15:0
    });
    if(!isCpu)applyPermUpgrades(players[players.length-1]);
  }
}

function cpuSimShot(sx,sy,angle,power,w){
  const rad=angle*Math.PI/180,spd=power*.13;
  let px2=sx,py2=sy-12,vx=Math.cos(rad)*spd,vy=-Math.sin(rad)*spd;
  for(let step=0;step<300;step++){
    vx+=w*.015;vy+=9.8/60*2.8;px2+=vx;py2+=vy;
    const tx=Math.floor(px2);
    if(tx<0||tx>=W||py2>H)return{x:px2,y:py2,hit:false};
    if(tx>=0&&tx<W&&py2>=terrain[tx])return{x:px2,y:py2,hit:true};
  }
  return{x:px2,y:py2,hit:false};
}

function cpuTurn(){
  if(gameState!=='aiming')return;
  const me=players[currentPlayer];
  // pick target: prioritize lowest HP, then closest
  let bestTarget=null,bestScore=-Infinity;
  for(const p of players){
    if(p===me||!p.alive)continue;
    const d=Math.abs(p.x-me.x);
    const score=(100-p.hp)*2+(500-d);
    if(score>bestScore){bestScore=score;bestTarget=p;}
  }
  if(!bestTarget){me.weapon=0;setTimeout(fire,300);return;}

  // pick weapon strategically
  me.weapon=0;
  const dist=Math.hypot(bestTarget.x-me.x,bestTarget.y-me.y);
  const hasWeapon=n=>(me.inventory[n]||0)>0;
  // use shield if low HP
  if(me.hp<30&&hasWeapon('Shield')){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Shield');
    setTimeout(fire,300);return;
  }
  // teleport if buried or cornered
  if(me.hp<20&&hasWeapon('Teleport')){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Teleport');
    setTimeout(fire,300);return;
  }
  // healer lemming if hurt
  if(me.hp<50&&hasWeapon('Heallem')){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Heallem');
  }
  // nuke for groups
  else if(hasWeapon('Nuke')&&players.filter(p=>p!==me&&p.alive&&Math.abs(p.x-bestTarget.x)<60).length>=2){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Nuke');
  }
  // death's head for distant/hard targets
  else if(hasWeapon('Deaths Head')&&dist>200){
    me.weapon=WEAPONS.findIndex(w=>w.name==="Deaths Head");
  }
  // MIRV for clustered enemies
  else if(hasWeapon('MIRV')&&players.filter(p=>p!==me&&p.alive&&Math.abs(p.x-bestTarget.x)<80).length>=2){
    me.weapon=WEAPONS.findIndex(w=>w.name==='MIRV');
  }
  // napalm for area denial
  else if(hasWeapon('Napalm')&&dist<250){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Napalm');
  }
  // roller if target is downhill
  else if(hasWeapon('Roller')&&Math.abs(bestTarget.y-me.y)>20&&bestTarget.y>me.y){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Roller');
  }
  // big shot if close
  else if(hasWeapon('Big Shot')&&dist<200){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Big Shot');
  }
  // lemming weapons for fun
  else if(hasWeapon('Swarm')&&dist<150&&Math.random()<.3){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Swarm');
  }
  else if(hasWeapon('Lemming')&&Math.random()<.2){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Lemming');
  }
  // dirt to bury nearby enemy
  else if(hasWeapon('Dirt')&&dist<100&&Math.random()<.25){
    me.weapon=WEAPONS.findIndex(w=>w.name==='Dirt');
  }

  // simulate shots to find best angle/power
  let bestA=90,bestP=50,bestErr=Infinity;
  for(let attempt=0;attempt<40;attempt++){
    const testA=Math.max(5,Math.min(175,Math.floor(Math.atan2(-(bestTarget.y-me.y),bestTarget.x-me.x)*180/Math.PI)+Math.random()*30-15));
    const testP=Math.max(15,Math.min(95,Math.floor(dist*.1+Math.random()*30-5)));
    const sim=cpuSimShot(me.x,me.y,testA,testP,wind);
    if(sim.hit){
      const err=Math.hypot(sim.x-bestTarget.x,sim.y-bestTarget.y);
      if(err<bestErr){bestErr=err;bestA=testA;bestP=testP;}
    }
  }
  // CPU accuracy scales with cpu_aim perm upgrade
  const aimLv=stats.permUpgrades?.cpu_aim||0;
  const inaccuracy=Math.max(1,6-aimLv);
  me.angle=Math.max(5,Math.min(175,bestA+Math.floor(Math.random()*inaccuracy*2-inaccuracy)));
  me.power=Math.max(15,Math.min(95,bestP+Math.floor(Math.random()*inaccuracy*2-inaccuracy)));
  // CPU move upgrade: reposition before firing
  const moveLv=stats.permUpgrades?.cpu_move||0;
  if(moveLv>0&&me.fuel>=10&&Math.random()<moveLv*.25){
    const moveDir=bestTarget.x>me.x?1:-1;
    const moveDist=Math.min(me.fuel/3,moveLv*5);
    me.x=Math.max(15,Math.min(W-15,me.x+moveDir*moveDist));me.fuel-=Math.floor(moveDist);
    me.y=terrain[Math.floor(me.x)];checkPowerups(me);
  }
  setTimeout(fire,500);
}

function fire(){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];
  const w=WEAPONS[p.weapon];
  if((p.inventory[w.name]||0)<=0)return;
  if(w.type==='parachute'){p.parachutes=(p.parachutes||0)+3;p.inventory[w.name]--;gameState='waiting';sfx('buy');showMsg('+3 Parachutes!',1000);setTimeout(nextTurn,500);return;}
  if(w.type==='shield'){p.shield=60;p.inventory[w.name]--;gameState='waiting';sfx('buy');setTimeout(nextTurn,500);return;}
  if(w.type==='teleport'){const nx=Math.random()*W;p.x=Math.max(20,Math.min(W-20,nx));p.y=terrain[Math.floor(p.x)];p.inventory[w.name]--;gameState='waiting';sfx('buy');setTimeout(nextTurn,500);return;}
  if(w.name==='Deaths Head'&&!p.cpu)stats.deathsHeadUsed++;
  if(w.name==='Nuke'&&!p.cpu)stats.nukesUsed++;
  if(w.name==='Deaths Head'||w.name==='Nuke')checkAchievements();
  p.inventory[w.name]--;
  const rad=p.angle*Math.PI/180;
  const speed=p.power*.13;
  // apply weapon upgrades
  let fw={...w};
  const ulv=p.upgrades[w.name]||0;
  if(UPGRADES[w.name]&&ulv>0&&ulv<=UPGRADES[w.name].length){
    const u=UPGRADES[w.name][ulv-1];
    if(u.dmg)fw.damage=u.dmg;if(u.rad)fw.radius=u.rad;if(u.subs)fw.subs=u.subs;
  }
  projectiles.push({x:p.x,y:p.y-12,vx:Math.cos(rad)*speed,vy:-Math.sin(rad)*speed,
    owner:currentPlayer,weapon:fw,trail:[],type:fw.type});
  gameState='flying';sfx('fire');
}

function explode(x,y,weapon,owner){
  sfx('explode');
  shakeLife=8+weapon.radius*.1;
  const r=weapon.radius;
  if(weapon.type!=='dirt'){
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      if(terrain[tx]<y+depth)terrain[tx]=Math.min(H+10,terrain[tx]+depth*.6);
    }
  }else{
    for(let tx=Math.max(0,Math.floor(x-r));tx<Math.min(W,Math.ceil(x+r));tx++){
      const dx=tx-x;const depth=Math.sqrt(Math.max(0,r*r-dx*dx));
      terrain[tx]=Math.max(H*.1,terrain[tx]-depth*.5);
    }
  }
  for(const p of players){
    if(!p.alive)continue;
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<r*1.5&&weapon.damage>0){
      if(r<=0)continue;
      let dmg=Math.floor((1-d/(r*1.5))*weapon.damage);
      if(p.shield>0){dmg=Math.floor(dmg*.2);p.shield=Math.max(0,p.shield-10);}
      if(p.armor)dmg=Math.floor(dmg*(1-p.armor));
      p.hp-=dmg;
      if(dmg>10&&p.hp>0&&Math.random()<.3)tankTalk(players.indexOf(p),'hit');
      if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');
        if(owner!==null&&players[owner]){
          players[owner].money+=50;players[owner].kills=(players[owner].kills||0)+1;
          if(!players[owner].cpu){stats.kills++;stats.totalKills++;stats.idleGems=(stats.idleGems||0)+1;saveStats();checkAchievements();}
        }
        showMsg(p.name+' destroyed!',1500);
        if(Math.random()<.7)tankTalk(players.indexOf(p),'kill');
        if(owner!==null&&Math.random()<.5)tankTalk(owner,'hit');
        skulls.push({x:p.x,y:p.y-15,life:120});
      }
    }
  }
  for(let i=0;i<20;i++){const ang=Math.random()*Math.PI*2;const spd=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:25+Math.random()*15,
    color:weapon.type==='napalm'?'#ff4400':weapon.type==='dirt'?'#8b6914':'#ff6b35'});}
  explosions.push({x,y,radius:r,life:12,color:weapon.type==='napalm'?'#ff4400':'#ffa500'});
  if(weapon.type==='mirv'&&weapon.subs){
    for(let s=0;s<weapon.subs;s++){
      projectiles.push({x,y:y-10,vx:(Math.random()-.5)*4,vy:-3-Math.random()*3,
        owner,weapon:{...weapon,type:'projectile',subs:0},trail:[],type:'projectile'});
    }
  }
  if(weapon.type==='napalm'){
    for(let s=0;s<6;s++){
      const nx=x+(Math.random()-.5)*r*2;
      setTimeout(()=>explode(nx,terrain[Math.max(0,Math.min(W-1,Math.floor(nx)))]||y,{radius:15,damage:15,type:'projectile'},owner),200+s*150);
    }
  }
}

function nextTurn(){
  let attempts=0;
  do{currentPlayer=(currentPlayer+1)%numPlayers;attempts++;}while(!players[currentPlayer].alive&&attempts<=numPlayers);
  const alive=players.filter(p=>p.alive);
  if(alive.length<=1){
    if(alive.length===1){alive[0].money+=100;showMsg(alive[0].name+' wins Round '+round+'!',2500);sfx('win');
      if(!alive[0].cpu){stats.roundsSurvived++;stats.maxMoney=Math.max(stats.maxMoney,alive[0].money);checkAchievements();}}
    gameState='roundOver';
    if(idleMode){
      setTimeout(()=>{round++;newRound();},2000);
    }else{
      const humanAlive=players.some(p=>p.alive&&!p.cpu);
      if(!humanAlive){setTimeout(endGame,2000);}
      else{setTimeout(()=>{round++;showShop();},2500);}
    }
    return;
  }
  wind+=(Math.random()-.5)*.8;wind=Math.max(-4,Math.min(4,wind));
  turnCount++;gameState='aiming';updateUI();
  if(Math.random()<.2&&players[currentPlayer]&&players[currentPlayer].alive)tankTalk(currentPlayer,'idle');
}

function showShop(){
  const html=['<h1 style="font-size:22px;color:#ff6b35;margin-bottom:8px">SHOP — Round '+(round)+'</h1>'];
  html.push('<div style="font:11px monospace;color:#888;margin-bottom:10px">Buy weapons for next round</div>');
  for(const p of players){
    if(!p.alive&&p.hp<=0)continue;
    html.push('<div style="color:'+p.color+';font:bold 12px monospace;margin:6px 0 2px">'+(p.cpu?'CPU ':'')+p.name+' — $'+p.money+'</div>');
    if(!p.cpu){
      html.push('<div style="display:flex;flex-wrap:wrap;gap:4px;justify-content:center">');
      WEAPONS.forEach((w,i)=>{
        if(w.cost===0)return;
        html.push('<button onclick="buyWeapon('+players.indexOf(p)+','+i+')" style="font:10px monospace;padding:4px 8px;border:1px solid #444;border-radius:4px;background:#1a1a1a;color:'+(p.money>=w.cost?'#ccc':'#555')+';cursor:pointer">'+w.name+' $'+w.cost+'</button>');
      });
      html.push('</div>');
    }else{
      cpuBuy(p);
    }
  }
  // upgrade section
  for(const p of players){
    if(p.cpu||!p.alive)continue;
    const pi=players.indexOf(p);
    html.push('<div style="font:8px monospace;color:#0ff;margin:4px 0">UPGRADES ('+p.name+'):</div>');
    html.push('<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center">');
    for(const wn in UPGRADES){
      const lv=p.upgrades[wn]||0;const maxLv=UPGRADES[wn].length;
      if(lv>=maxLv)continue;
      const cost=UPGRADE_COST*(lv+1);
      html.push('<button onclick="buyUpgrade('+pi+',&quot;'+wn+'&quot;)" style="font:8px monospace;padding:3px 6px;border:1px solid #0aa;background:#001a1a;color:'+(p.money>=cost?'#0ff':'#044')+';cursor:pointer">'+wn+' Lv'+(lv+1)+' $'+cost+'</button>');
    }
    html.push('</div>');
  }
  html.push('<button onclick="closeShop()" style="font:bold 14px monospace;padding:10px 30px;border:2px solid #ff0;border-radius:0;background:#000;color:#ff0;cursor:pointer;margin-top:12px">NEXT ROUND</button>');
  const el=document.getElementById('start');
  el.style.display='flex';el.innerHTML=html.join('');
}
function buyWeapon(pi,wi){
  const p=players[pi],w=WEAPONS[wi];
  if(p.money<w.cost)return;
  p.money-=w.cost;p.inventory[w.name]=(p.inventory[w.name]||0)+1;
  sfx('buy');showShop();
}
function cpuBuy(p){
  // prioritize by situation
  const buy=n=>{const wi=WEAPONS.findIndex(w=>w.name===n);if(wi>=0&&p.money>=WEAPONS[wi].cost){p.money-=WEAPONS[wi].cost;p.inventory[n]=(p.inventory[n]||0)+1;return true;}return false;};
  // always want shields and big shots
  if(p.hp<60&&Math.random()<.7)buy('Shield');
  if(Math.random()<.5)buy('Big Shot');
  if(Math.random()<.4)buy('Big Shot');
  // offensive weapons based on budget
  if(p.money>600&&Math.random()<.5)buy('Nuke');
  if(p.money>400&&Math.random()<.4)buy("Deaths Head");
  if(p.money>300&&Math.random()<.5)buy('MIRV');
  if(p.money>200&&Math.random()<.4)buy('Napalm');
  if(Math.random()<.3)buy('Roller');
  if(Math.random()<.2)buy('Lemming');
  if(Math.random()<.2)buy('Swarm');
  if(p.hp<40&&Math.random()<.5)buy('Heallem');
  if(Math.random()<.15)buy('Digger');
  if(Math.random()<.15)buy('Teleport');
}
function buyUpgrade(pi,wn){
  const p=players[pi];if(!p)return;
  const lv=p.upgrades[wn]||0;
  const maxLv=UPGRADES[wn]?UPGRADES[wn].length:0;
  if(lv>=maxLv)return;
  const cost=UPGRADE_COST*(lv+1);
  if(p.money<cost)return;
  p.money-=cost;p.upgrades[wn]=lv+1;
  sfx('buy');showShop();
}
function closeShop(){document.getElementById('start').style.display='none';newRound();}

function endGame(){
  gameState='over';stopMusic();
  document.getElementById('ui').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  document.getElementById('wpnBar').style.display='none';
  const winner=players.reduce((a,b)=>a.money>b.money?a:b);
  if(!winner.cpu){stats.wins++;checkAchievements();}
  saveStats();
  const perks=getPerks();
  const el=document.getElementById('start');
  let h='<h1 style="font:bold 22px monospace;color:#ff0;text-shadow:2px 2px #800">'+winner.name+' WINS!</h1>';
  h+='<div style="font:10px monospace;color:#0f0;margin:6px 0;white-space:pre-line">'+players.map(p=>p.name+': $'+p.money+' ('+((p.kills||0))+' kills)').join('\n')+'</div>';
  h+='<div style="font:9px monospace;color:#888;margin:4px 0">ACHIEVEMENTS: '+stats.unlocked.length+'/'+ACHIEVEMENTS.length+'</div>';
  if(stats.unlocked.length){h+='<div style="font:8px monospace;color:#0ff;margin:2px 0">'+stats.unlocked.map(id=>{const a=ACHIEVEMENTS.find(x=>x.id===id);return a?'['+a.name+']':'';}).join(' ')+'</div>';}
  if(perks.length){h+='<div style="font:8px monospace;color:#f0f;margin:2px 0">PERKS: '+perks.map(p=>p.name).join(', ')+'</div>';}
  h+='<button onclick="location.reload()" style="font:bold 12px monospace;padding:8px 24px;border:2px solid #ff0;border-radius:0;background:#000;color:#ff0;cursor:pointer;margin-top:8px">PLAY AGAIN</button>';
  el.innerHTML=h;el.style.display='flex';sfx('win');
}

function update(dt){
  // projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.trail.push({x:p.x,y:p.y});if(p.trail.length>25)p.trail.shift();
    p.vx+=wind*.015;p.vy+=9.8*dt*2.8;
    p.x+=p.vx;p.y+=p.vy;
    const px2=Math.floor(p.x);
    if(px2>=0&&px2<W&&p.y>=terrain[px2]){
      if(p.type==='roller'){
        p.y=terrain[px2]-1;p.vy=0;
        const nx=Math.max(1,Math.min(W-2,px2+Math.sign(p.vx)));
        const slope=terrain[nx]-terrain[px2];
        p.vx+=slope*.15;p.vx*=.97;
        if(Math.abs(p.vx)<.2){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='digger'){
        terrain[px2]=Math.min(H+10,terrain[px2]+2);p.vy=Math.abs(p.vy)*.8;
        if(p.vy<1){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        continue;
      }
      if(p.type==='lemming'){spawnLemming(p.x,p.y,p.owner,p.weapon.ltype);projectiles.splice(i,1);continue;}
      if(p.type==='bouncer'){
        p.bounces=(p.bounces||p.weapon.bounces||4)-1;
        p.vy=-Math.abs(p.vy)*.6;p.vx*=.8;
        if(p.bounces<=0){explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);}
        else{p.y=terrain[px2]-2;sfx('land');}
        continue;
      }
      if(p.type==='flame'){
        for(let fx=-8;fx<=8;fx+=2){const tx2=px2+fx;if(tx2>0&&tx2<W)terrain[tx2]=Math.min(H,terrain[tx2]+1);}
        for(let k=0;k<6;k++)particles.push({x:p.x+(Math.random()-0.5)*16,y:p.y,vx:(Math.random()-.5)*2,vy:-1-Math.random()*2,life:12+Math.random()*8,color:Math.random()>.5?'#f80':'#f00'});
        explode(p.x,p.y,p.weapon,p.owner);
        if(Math.random()<.7){projectiles.push({x:p.x+(Math.random()-.5)*10,y:p.y-3,vx:p.vx*.3+(Math.random()-.5)*2,vy:-1-Math.random()*2,owner:p.owner,weapon:p.weapon,trail:[],type:'flame'});}
        projectiles.splice(i,1);continue;
      }
      if(p.type==='dirtspray'){
        for(let s=0;s<8;s++){const dx2=(Math.random()-.5)*40;const tx2=Math.floor(p.x+dx2);if(tx2>0&&tx2<W)terrain[tx2]=Math.max(H*.1,terrain[tx2]-3-Math.random()*5);}
        for(let k=0;k<10;k++)particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*4,vy:-2-Math.random()*3,life:15,color:'#8b6914'});
        projectiles.splice(i,1);sfx('explode');continue;
      }
      if(p.type==='dirtmirv'){
        for(let s=0;s<(p.weapon.subs||6);s++){
          projectiles.push({x:p.x,y:p.y-5,vx:(Math.random()-.5)*5,vy:-2-Math.random()*3,owner:p.owner,weapon:{radius:20,damage:0,type:'dirtspray'},trail:[],type:'dirtspray'});
        }
        projectiles.splice(i,1);sfx('explode');continue;
      }
      // check powerup hits
      for(const pu of powerups){if(pu.alive&&Math.hypot(p.x-pu.x,p.y-pu.y)<30){
        pu.alive=false;const owner=players[p.owner];if(owner){pu.type.give(owner);showMsg(pu.type.name+'!',800);}
        for(let k=0;k<6;k++)particles.push({x:pu.x,y:pu.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:12,color:pu.type.color});
      }}
      if(p.trail.length>2)tracers.push({pts:[...p.trail],color:p.type==='deathshead'?'#f00':'#aa8',age:0});
      explode(p.x,p.y,p.weapon,p.owner);projectiles.splice(i,1);continue;
    }
    // Death's Head homing after apex
    if(p.type==='deathshead'&&p.vy>0){
      let closest=null,cd=Infinity;
      for(const pl of players){if(!pl.alive||players.indexOf(pl)===p.owner)continue;
        const dd=Math.hypot(pl.x-p.x,pl.y-p.y);if(dd<cd){cd=dd;closest=pl;}}
      if(closest){
        const ha=Math.atan2(closest.y-p.y,closest.x-p.x);
        p.vx+=(Math.cos(ha)*3-p.vx)*.04;
      }
    }
    if(p.x<-100||p.x>W+100||p.y>H+100){
      projectiles.splice(i,1);
      if(Math.random()<.4){const other=players.filter((pl,idx)=>pl.alive&&idx!==p.owner);if(other.length)tankTalk(players.indexOf(other[Math.floor(Math.random()*other.length)]),'miss');}
      continue;
    }
  }
  // lemmings
  for(let i=lemmings.length-1;i>=0;i--){
    const l=lemmings[i];l.timer+=dt;
    l.vy+=6*dt;l.x+=l.vx;l.y+=l.vy;
    const lx=Math.max(0,Math.min(W-1,Math.floor(l.x)));
    if(l.y>=terrain[lx]){
      l.y=terrain[lx];l.vy=0;
      if(l.ltype==='jumper'&&Math.random()<.08)l.vy=-4-Math.random()*3;
      if(Math.random()<.02)l.vx=-l.vx;
    }
    if(l.x<5||l.x>W-5)l.vx=-l.vx;
    // digger: eats terrain as it walks
    if(l.ltype==='digger'){
      for(let dx=-3;dx<=3;dx++){const tx=lx+dx;if(tx>=0&&tx<W)terrain[tx]=Math.min(H+10,terrain[tx]+dt*15);}
    }
    // healer: heals owner's tank
    if(l.ltype==='healer'){
      const ownerP=players[l.owner];
      if(ownerP&&ownerP.alive){
        const hd=Math.hypot(ownerP.x-l.x,ownerP.y-l.y);
        if(hd>15){const ha=Math.atan2(ownerP.y-l.y,ownerP.x-l.x);l.vx=Math.cos(ha)*1.5;}
        if(hd<25){ownerP.hp=Math.min(ownerP.maxHp||100,ownerP.hp+dt*8);
          if(Math.random()<.05)particles.push({x:l.x,y:l.y-8,vx:(Math.random()-.5),vy:-1,life:15,color:'#4ade80'});}
      }
    }
    // bomber/jumper/swarm: attack enemies on contact
    if(l.ltype!=='healer'){
      for(const p of players){
        if(!p.alive||players.indexOf(p)===l.owner)continue;
        if(Math.hypot(p.x-l.x,p.y-l.y)<20){
          explode(l.x,l.y,{radius:l.radius||15,damage:l.damage||20,type:'projectile'},l.owner);
          if(!players[l.owner]?.cpu){stats.lemmingKills++;checkAchievements();}
          sfx('ouch');l.hp=0;break;
        }
      }
    }
    // builder: places terrain steps ahead of it
    if(l.ltype==='builder'){
      l.buildCount=(l.buildCount||0);
      if(l.buildCount<12&&Math.random()<.1){
        const bx2=Math.floor(l.x+l.vx*3);
        if(bx2>0&&bx2<W){terrain[bx2]=Math.min(terrain[bx2],l.y-l.buildCount*2-2);l.buildCount++;}
      }
      if(l.buildCount>=12)l.vx*=.5;
    }
    // blocker: stands still, blocks other lemmings
    if(l.ltype==='blocker'){
      l.vx=0;
      for(const l2 of lemmings){
        if(l2===l)continue;
        if(Math.abs(l2.x-l.x)<8&&Math.abs(l2.y-l.y)<10)l2.vx=-l2.vx;
      }
      for(const bg of bgLemmings){
        if(Math.abs(bg.x-l.x)<8&&Math.abs(bg.y-l.y)<10)bg.vx=-bg.vx;
      }
    }
    // climber: walks up steep terrain walls
    if(l.ltype==='climber'){
      const ahead=Math.floor(l.x+Math.sign(l.vx)*3);
      if(ahead>0&&ahead<W&&terrain[ahead]<l.y-6){
        l.climbing=true;l.y-=dt*40;l.vx*=.3;
      }else{l.climbing=false;}
    }
    if(l.timer>10)l.hp-=dt*8;
    if(l.hp<=0||l.y>H+20){
      if(l.ltype==='digger'&&l.hp<=0)explode(l.x,l.y,{radius:20,damage:25,type:'projectile'},l.owner);
      lemmings.splice(i,1);
    }
  }
  // background lemmings (decorative)
  for(const bg of bgLemmings){
    bg.timer+=dt;bg.x+=bg.vx;
    const bx2=Math.max(0,Math.min(W-1,Math.floor(bg.x)));
    bg.y=terrain[bx2];
    if(bg.x<5||bg.x>W-5)bg.vx=-bg.vx;
    if(bg.job==='builder'&&Math.random()<.03){
      const sx=Math.floor(bg.x+bg.vx*4);
      if(sx>0&&sx<W)terrain[sx]=Math.min(terrain[sx],bg.y-1);
    }
    if(bg.job==='miner'&&Math.random()<.02){
      const mx2=Math.floor(bg.x);
      if(mx2>0&&mx2<W)terrain[mx2]=Math.min(H,terrain[mx2]+.3);
    }
    if(bg.job==='basher'){
      const bx3=Math.floor(bg.x+bg.vx*2);
      if(bx3>0&&bx3<W&&terrain[bx3]<bg.y-4)bg.vx=-bg.vx;
    }
    if(bg.job==='blocker')bg.vx=0;
    if(bg.job==='climber'){
      const ahead=Math.floor(bg.x+Math.sign(bg.vx)*2);
      if(ahead>0&&ahead<W&&terrain[ahead]<bg.y-5){bg.y-=dt*20;bg.vx*=.5;}
    }
  }
  // graboids
  for(const gb of graboids){
    gb.timer+=dt;gb.x+=gb.dir;
    if(gb.x<20||gb.x>W-20)gb.dir=-gb.dir;
    if(gb.underground){
      if(Math.random()<.005+round*.002){
        gb.underground=false;gb.surfaceTimer=2;sfx('ouch');
        for(const p of players){if(!p.alive)continue;if(Math.abs(p.x-gb.x)<25){
          p.hp-=15;showMsg('GRABOID!',1000);sfx('hit');
          if(p.hp<=0){p.hp=0;p.alive=false;skulls.push({x:p.x,y:p.y-15,life:120});}
        }}
        for(let dx=-12;dx<=12;dx++){const tx=Math.floor(gb.x)+dx;if(tx>0&&tx<W)terrain[tx]=Math.min(H,terrain[tx]+3);}
        for(let k=0;k<12;k++)particles.push({x:gb.x+(Math.random()-.5)*20,y:terrain[Math.floor(gb.x)],vx:(Math.random()-.5)*3,vy:-2-Math.random()*4,life:20,color:'#8b6914'});
      }
    }else{
      gb.surfaceTimer-=dt;
      if(gb.surfaceTimer<=0){gb.underground=true;gb.dir=(Math.random()>.5?1:-1)*(.3+Math.random()*.5);}
    }
  }
  // stilts timer
  for(const p of players){if(p.stilts&&p.stiltsTimer!==undefined){p.stiltsTimer-=dt;if(p.stiltsTimer<=0)p.stilts=false;}}
  // check if all projectiles done
  if(gameState==='flying'&&projectiles.length===0&&lemmings.filter(l=>l.timer<2).length===0){
    gameState='waiting';setTimeout(nextTurn,800);
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life--;if(p.life<=0)particles.splice(i,1);}
  for(let i=explosions.length-1;i>=0;i--){explosions[i].life--;if(explosions[i].life<=0)explosions.splice(i,1);}
  for(let i=skulls.length-1;i>=0;i--){skulls[i].life--;skulls[i].y-=.1;if(skulls[i].life<=0)skulls.splice(i,1);}
  // gem earning (idle = passive, always = on events)
  if(idleMode){
    idleGemTimer+=dt;
    if(idleGemTimer>8){idleGemTimer=0;stats.idleGems=(stats.idleGems||0)+1;saveStats();}
  }
  const gh=document.getElementById('idleGemHud');if(gh)gh.textContent=stats.idleGems||0;
  // settle tanks + fall damage
  for(const p of players){
    if(!p.alive)continue;
    const tx=Math.max(0,Math.min(W-1,Math.floor(p.x)));
    const newY=terrain[tx];
    const fall=newY-p.y;
    if(fall>8){
      if(p.parachutes>0){
        p.parachutes--;p.parachuteOpen=20;
        for(let k=0;k<4;k++)particles.push({x:p.x,y:p.y-20,vx:(Math.random()-.5)*2,vy:-1,life:15,color:'#fff'});
      }else if(!p.stilts){
        const dmg=Math.floor(fall*.3);
        if(dmg>0){p.hp-=dmg;sfx('land');
          if(Math.random()<.3)tankTalk(players.indexOf(p),'hit');
          if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');showMsg(p.name+' fell to death!',1500);skulls.push({x:p.x,y:p.y-15,life:120});}
        }
      }
    }
    if(p.parachuteOpen>0){p.parachuteOpen--;p.y+=(newY-p.y)*.15;}
    else p.y=newY;
    if(p.shield>0)p.shield-=dt;
  }
}

function render(){
  ctx.imageSmoothingEnabled=false;
  // screen shake
  if(shakeLife>0){shakeX=(Math.random()-.5)*shakeLife;shakeY=(Math.random()-.5)*shakeLife;shakeLife-=.5;}
  else{shakeX=0;shakeY=0;}
  ctx.save();ctx.translate(shakeX,shakeY);

  // pixelated camera background (DOS CRT style)
  if(camOn&&camReady&&camVideo&&camVideo.readyState>=2){
    const pc=camPixBuf.getContext('2d');
    pc.save();pc.translate(40,0);pc.scale(-1,1);
    pc.drawImage(camVideo,0,0,40,30);pc.restore();
    // posterize to DOS palette
    const pid=pc.getImageData(0,0,40,30),pd=pid.data;
    for(let i=0;i<pd.length;i+=4){
      pd[i]=Math.floor(pd[i]/32)*32;pd[i+1]=Math.floor(pd[i+1]/32)*32;pd[i+2]=Math.floor(pd[i+2]/32)*32;
      pd[i+3]=camOpacity;
    }
    pc.putImageData(pid,0,0);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(camPixBuf,0,0,W,H);
  }
  // DOS-era banded sky with dither noise (semi-transparent over camera)
  ctx.globalAlpha=(camOn&&camReady)?.65:1;
  const bg=BACKGROUNDS[bgIdx]||BACKGROUNDS[0];
  const skyColors=bg.sky;
  const bandH=Math.ceil(H/skyColors.length);
  for(let i=0;i<skyColors.length;i++){ctx.fillStyle=skyColors[i];ctx.fillRect(0,i*bandH,W,bandH+1);}
  // dither between sky bands
  for(let i=0;i<skyColors.length-1;i++){
    const y=i*bandH+bandH;
    ctx.fillStyle=skyColors[i+1];
    for(let x=0;x<W;x+=2)if((x+i)%4<2)ctx.fillRect(x,y-2,1,4);
  }
  ctx.globalAlpha=1;

  // terrain - solid fill with pixel edge
  ctx.fillStyle=floorType?floorType.color:bg.ground;
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  // sub-layers with dither
  const subColors=bg.groundSub||['#38901a','#308014','#28700e','#206008','#185004','#103004'];
  for(let s=0;s<subColors.length;s++){
    ctx.fillStyle=subColors[s];
    ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]+5+s*7);
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  }
  // terrain dither texture (pixel noise like DOS)
  for(let x=0;x<W;x+=2){
    const ty=Math.floor(terrain[x]);
    if(ty<H){
      ctx.fillStyle=(x*7+ty*3)%8<2?'#50b028':'#389018';
      ctx.fillRect(x,ty+1,1,1);
      if((x*11+ty*5)%12<2){ctx.fillStyle='#286010';ctx.fillRect(x,ty+3,1,1);}
    }
  }
  // terrain top edge
  ctx.strokeStyle='#80e040';ctx.lineWidth=1;
  ctx.beginPath();for(let x=0;x<W;x++)x===0?ctx.moveTo(x,terrain[x]):ctx.lineTo(x,terrain[x]);ctx.stroke();

  // floating powerups (Contra-style)
  for(const pu of powerups){
    if(!pu.alive)continue;
    const bob=Math.sin(performance.now()*.003+pu.bobPhase)*4;
    const px3=pu.x,py3=pu.y+bob;
    // eagle/falcon icon box (like Contra)
    ctx.fillStyle='#222';ctx.fillRect(px3-8,py3-8,16,16);
    ctx.strokeStyle=pu.type.color;ctx.lineWidth=1;ctx.strokeRect(px3-8,py3-8,16,16);
    // letter
    ctx.fillStyle=pu.type.color;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pu.type.letter,px3,py3);
    // glow pulse
    const pulse=Math.sin(performance.now()*.005+pu.bobPhase)*.3+.3;
    ctx.globalAlpha=pulse;ctx.fillStyle=pu.type.color;ctx.fillRect(px3-10,py3-10,20,20);
    ctx.globalAlpha=1;
  }

  // background lemmings (decorative, behind tanks)
  for(const bg of bgLemmings){
    const lp=Math.sin(bg.timer*8);
    const bx=bg.x,by=bg.y,dir=bg.vx>0?1:-1;
    ctx.fillStyle='#0a0';ctx.fillRect(bx-1,by-9,2,1);
    ctx.fillStyle=bg.color;
    ctx.fillRect(bx-1,by-8,3,2);
    ctx.fillStyle='#000';ctx.fillRect(bx+dir*.5,by-7,.5,.5);
    if(bg.job==='walker'){
      ctx.fillStyle='#00c';ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillRect(bx-1,by-2,1,1+lp);ctx.fillRect(bx+1,by-2,1,1-lp);
    }else if(bg.job==='builder'){
      ctx.fillStyle='#c80';ctx.fillRect(bx-1,by-6,3,4);
      ctx.strokeStyle='#aa0';ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(bx+dir*2,by-6);ctx.lineTo(bx+dir*5,by-9+lp);ctx.stroke();
      // stairs being built
      for(let s=0;s<3;s++){ctx.fillStyle='#864';ctx.fillRect(bx+dir*(3+s*3),by-s*2-2,3,1);}
      ctx.fillRect(bx-1,by-2,1,1+lp);ctx.fillRect(bx+1,by-2,1,1-lp);
    }else if(bg.job==='miner'){
      ctx.fillStyle='#a0a';ctx.fillRect(bx-1,by-6,3,4);
      ctx.strokeStyle='#888';ctx.lineWidth=.5;
      ctx.beginPath();ctx.moveTo(bx+dir*2,by-5);ctx.lineTo(bx+dir*4,by-2+lp*2);ctx.stroke();
      ctx.fillRect(bx-1,by-2,1,1+lp);ctx.fillRect(bx+1,by-2,1,1-lp);
    }else if(bg.job==='climber'){
      ctx.fillStyle='#08f';ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillRect(bx-2,by-5+lp,1,2);ctx.fillRect(bx+2,by-5-lp,1,2);
      ctx.fillRect(bx-1,by-2,1,1+lp);ctx.fillRect(bx+1,by-2,1,1-lp);
    }else if(bg.job==='blocker'){
      ctx.fillStyle='#f00';ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillRect(bx-3,by-5,2,3);ctx.fillRect(bx+2,by-5,2,3);
    }else if(bg.job==='basher'){
      ctx.fillStyle='#ff0';ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillRect(bx+dir*2,by-6+Math.abs(lp),1,2);
      ctx.fillRect(bx-1,by-2,1,1+lp);ctx.fillRect(bx+1,by-2,1,1-lp);
    }else if(bg.job==='floater'){
      ctx.fillStyle='#f0f';ctx.fillRect(bx-1,by-6,3,4);
      ctx.fillStyle='#faf';ctx.fillRect(bx-2,by-10,5,2);
      ctx.fillRect(bx-1,by-2,1,1);ctx.fillRect(bx+1,by-2,1,1);
    }
  }

  // old tracers (fade with age)
  for(const tr of tracers){
    ctx.globalAlpha=Math.max(.03,.2-tr.age*.03);
    ctx.strokeStyle=tr.color;ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<tr.pts.length;i++)i===0?ctx.moveTo(tr.pts[i].x,tr.pts[i].y):ctx.lineTo(tr.pts[i].x,tr.pts[i].y);
    ctx.stroke();
  }
  ctx.globalAlpha=1;

  // aim line
  if(gameState==='aiming'){
    const p=players[currentPlayer];
    if(p&&p.alive){
      const rad=p.angle*Math.PI/180,len=p.power*.5;
      // dotted aim line
      ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(p.x,p.y-12);ctx.lineTo(p.x+Math.cos(rad)*len,p.y-12-Math.sin(rad)*len);ctx.stroke();ctx.setLineDash([]);
      // power dots along line
      for(let d=10;d<len;d+=12){
        const dotA=d/len;
        ctx.fillStyle=dotA>.7?'#f00':dotA>.4?'#ff0':'#0f0';
        ctx.fillRect(p.x+Math.cos(rad)*d-1,p.y-12-Math.sin(rad)*d-1,2,2);
      }
      // crosshair at end
      const ex=p.x+Math.cos(rad)*len,ey=p.y-12-Math.sin(rad)*len;
      ctx.strokeStyle=p.color;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(ex-4,ey);ctx.lineTo(ex+4,ey);ctx.moveTo(ex,ey-4);ctx.lineTo(ex,ey+4);ctx.stroke();
    }
  }

  // graboids
  for(const gb of graboids){
    const gx=gb.x,gy=terrain[Math.max(0,Math.min(W-1,Math.floor(gx)))];
    if(gb.underground){
      // underground rumble line
      const rumble=Math.sin(performance.now()*.01+gx)*2;
      ctx.strokeStyle='#8b6914';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(gx-8,gy+rumble);ctx.lineTo(gx+8,gy-rumble);ctx.stroke();
      ctx.fillStyle='#654';ctx.fillRect(gx-2,gy-1,4,2);
    }else{
      // surfaced graboid - worm creature
      ctx.fillStyle='#c08040';
      ctx.fillRect(gx-6,gy-20,12,20);
      ctx.fillRect(gx-8,gy-12,16,8);
      // mouth
      ctx.fillStyle='#f44';ctx.fillRect(gx-4,gy-20,8,4);
      ctx.fillStyle='#ff0';ctx.fillRect(gx-2,gy-18,1,2);ctx.fillRect(gx+2,gy-18,1,2);
      // tentacles
      ctx.strokeStyle='#d09050';ctx.lineWidth=1;
      for(let t=0;t<3;t++){
        const ta=Math.sin(performance.now()*.008+t*2)*6;
        ctx.beginPath();ctx.moveTo(gx-3+t*3,gy-20);ctx.lineTo(gx-5+t*4+ta,gy-28);ctx.stroke();
      }
    }
  }

  // dead tank wreckage
  for(const p of players){
    if(p.alive)continue;
    const tx=p.x,ty=terrain[Math.max(0,Math.min(W-1,Math.floor(p.x)))];
    ctx.fillStyle='#333';ctx.fillRect(tx-8,ty-3,16,3);
    ctx.fillStyle='#222';ctx.fillRect(tx-5,ty-5,10,3);
    ctx.fillStyle='#444';ctx.fillRect(tx-3,ty-2,2,2);ctx.fillRect(tx+2,ty-2,2,2);
  }

  // tanks (chunky pixel art style)
  for(const p of players){
    if(!p.alive)continue;
    const tx=p.x;
    const stiltH=p.stilts?20:0;
    const ty=p.y-stiltH;
    // stilts
    if(p.stilts){
      ctx.strokeStyle='#888';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(tx-6,p.y);ctx.lineTo(tx-4,ty);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx+6,p.y);ctx.lineTo(tx+4,ty);ctx.stroke();
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx-5,p.y-stiltH*.5);ctx.lineTo(tx+5,p.y-stiltH*.5);ctx.stroke();
    }
    // parachute (when falling)
    if(p.parachuteOpen>0){
      ctx.strokeStyle='#fff';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx-8,ty-28);ctx.quadraticCurveTo(tx,ty-38,tx+8,ty-28);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx-8,ty-28);ctx.lineTo(tx,ty-16);ctx.lineTo(tx+8,ty-28);ctx.stroke();
    }
    // shield
    if(p.shield>0){ctx.strokeStyle='#0ff';ctx.lineWidth=1;ctx.strokeRect(tx-14,ty-18,28,20);}
    // treads
    ctx.fillStyle='#444';ctx.fillRect(tx-11,ty-3,22,4);
    ctx.fillStyle='#222';for(let wx=-10;wx<=10;wx+=4)ctx.fillRect(tx+wx,ty-2,2,2);
    // body
    ctx.fillStyle=p.color;
    ctx.fillRect(tx-9,ty-8,18,6);
    // turret dome
    ctx.fillRect(tx-5,ty-12,10,5);
    // barrel
    const rad=p.angle*Math.PI/180;
    const bx=Math.cos(rad)*16,by=-Math.sin(rad)*16;
    ctx.strokeStyle=p.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(tx,ty-12);ctx.lineTo(tx+bx,ty-12+by);ctx.stroke();
    // hp bar (DOS style)
    ctx.fillStyle='#800';ctx.fillRect(tx-12,ty-16,24,2);
    ctx.fillStyle=p.hp>p.maxHp*.5?'#0f0':p.hp>p.maxHp*.25?'#ff0':'#f00';ctx.fillRect(tx-12,ty-16,Math.floor(24*p.hp/(p.maxHp||100)),2);
    // fuel bar
    ctx.fillStyle='#004';ctx.fillRect(tx-12,ty-14,24,1);
    ctx.fillStyle='#08f';ctx.fillRect(tx-12,ty-14,Math.floor(24*p.fuel/100),1);
    // name
    ctx.fillStyle='#ff0';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText((p.cpu?'CPU ':'')+p.name,tx,ty-19);
    if(players.indexOf(p)===currentPlayer&&gameState==='aiming'){ctx.fillStyle='#fff';ctx.fillText('v',tx,ty-24);}
  }

  // lemmings (classic pixel art with hair, arms, walking)
  for(const l of lemmings){
    const lp=Math.sin(l.timer*10);
    const dir=l.vx>0?1:-1;
    const bx=l.x,by=l.y;
    // all lemmings get: hair, body, arms, legs
    // hair (green tuft like original lemmings)
    ctx.fillStyle='#0a0';
    ctx.fillRect(bx-2,by-12,4,2);ctx.fillRect(bx-1,by-13,2,1);
    // head
    ctx.fillStyle=l.color;
    ctx.fillRect(bx-2,by-10,4,3);
    // eyes
    ctx.fillStyle='#000';ctx.fillRect(bx+dir,by-9,1,1);
    // body
    if(l.ltype==='digger'){
      ctx.fillStyle='#a0a';ctx.fillRect(bx-2,by-7,4,5);
      // pickaxe
      ctx.strokeStyle='#aaa';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(bx+dir*3,by-9);ctx.lineTo(bx+dir*7,by-13+lp*3);ctx.stroke();
      ctx.fillStyle='#888';ctx.fillRect(bx+dir*6,by-14+lp*3,3,2);
    }else if(l.ltype==='jumper'){
      ctx.fillStyle='#ff0';ctx.fillRect(bx-2,by-7,4,5);
      // cape
      ctx.fillStyle='#f00';ctx.fillRect(bx-dir*2,by-7,2,4+Math.abs(l.vy));
    }else if(l.ltype==='healer'){
      ctx.fillStyle='#fff';ctx.fillRect(bx-2,by-7,4,5);
      // red cross
      ctx.fillStyle='#f00';ctx.fillRect(bx-0.5,by-7,1,5);ctx.fillRect(bx-2,by-5,4,1);
      // heal sparkle
      if(Math.sin(l.timer*5)>.5){ctx.fillStyle='#0f0';ctx.fillRect(bx+dir*4,by-8,2,2);}
    }else{
      // bomber - blue suit
      ctx.fillStyle='#00f';ctx.fillRect(bx-2,by-7,4,5);
    }
    // arms (swing with walk)
    ctx.fillStyle=l.color;
    ctx.fillRect(bx-3,by-6+lp,1,3);ctx.fillRect(bx+2,by-6-lp,1,3);
    // legs (walk cycle)
    ctx.fillRect(bx-2,by-2,2,2+lp*1.5);ctx.fillRect(bx,by-2,2,2-lp*1.5);
    // feet
    ctx.fillStyle='#000';
    ctx.fillRect(bx-2,by+lp*1.5,2,1);ctx.fillRect(bx,by-lp*1.5,2,1);
  }

  // smoke from damaged tanks
  for(const p of players){
    if(!p.alive||p.hp>40)continue;
    if(Math.random()<.15){
      particles.push({x:p.x+(Math.random()-0.5)*6,y:p.y-14,vx:(Math.random()-.5)*.5,vy:-1-Math.random(),
        life:15+Math.random()*10,color:p.hp>20?'#555':'#333'});
    }
  }

  // projectiles (DOS-style: white dot + dotted trail)
  for(const p of projectiles){
    // dotted trail
    ctx.fillStyle='#aa8';
    for(let i=0;i<p.trail.length;i+=2)ctx.fillRect(p.trail[i].x,p.trail[i].y,1,1);
    // death's head draws a skull
    if(p.type==='deathshead'){
      ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('☠',p.x,p.y+3);
    }else{
      // normal bullet: bright pixel
      ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1,3,3);
      ctx.fillStyle='#ff0';ctx.fillRect(p.x,p.y,1,1);
    }
  }

  // explosions (chunky DOS-style concentric rings)
  for(const e of explosions){
    const a=e.life/12;
    ctx.globalAlpha=a;
    const r=e.radius*(1.2-a*.2);
    ctx.fillStyle='#400';ctx.fillRect(e.x-r,e.y-r,r*2,r*2);
    ctx.fillStyle='#f00';ctx.fillRect(e.x-r*.7,e.y-r*.7,r*1.4,r*1.4);
    ctx.fillStyle='#ff0';ctx.fillRect(e.x-r*.4,e.y-r*.4,r*.8,r*.8);
    ctx.fillStyle='#fff';ctx.fillRect(e.x-r*.15,e.y-r*.15,r*.3,r*.3);
    ctx.globalAlpha=1;
  }
  // particles
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life/25);ctx.fillStyle=p.color;ctx.fillRect(p.x-1,p.y-1,3,3);}
  ctx.globalAlpha=1;

  // death skulls
  ctx.font='bold 12px monospace';ctx.textAlign='center';
  for(const sk of skulls){
    ctx.globalAlpha=Math.min(1,sk.life/30);
    ctx.fillStyle='#fff';ctx.fillText('☠',sk.x,sk.y);
    ctx.globalAlpha=1;
  }

  // talk bubbles
  for(let i=talkBubbles.length-1;i>=0;i--){
    const tb=talkBubbles[i];tb.life--;tb.y-=.15;
    if(tb.life<=0){talkBubbles.splice(i,1);continue;}
    const a=Math.min(1,tb.life/30);
    ctx.globalAlpha=a;
    const tw=ctx.measureText||null;
    ctx.font='7px monospace';ctx.textAlign='center';
    const txt=tb.text.length>30?tb.text.slice(0,28)+'..':tb.text;
    const mx=Math.min(Math.max(txt.length*3.8+8,40),W*.45);
    const bx=Math.max(mx/2+2,Math.min(W-mx/2-2,tb.x));
    // bubble bg
    ctx.fillStyle='#000';ctx.fillRect(bx-mx/2-2,tb.y-10,mx+4,14);
    ctx.strokeStyle=tb.color;ctx.lineWidth=1;ctx.strokeRect(bx-mx/2-2,tb.y-10,mx+4,14);
    // pointer
    ctx.fillStyle='#000';ctx.fillRect(bx-2,tb.y+4,4,3);
    // text
    ctx.fillStyle=tb.color;ctx.fillText(txt,bx,tb.y);
    ctx.globalAlpha=1;
  }

  // wind indicator (DOS style bar)
  const wx=W/2,wy=H-10;
  ctx.fillStyle='#222';ctx.fillRect(wx-30,wy-2,60,4);
  ctx.fillStyle='#444';ctx.fillRect(wx-1,wy-3,2,6);
  const ww=Math.abs(wind)*8;
  ctx.fillStyle=Math.abs(wind)>2?'#f00':Math.abs(wind)>1?'#ff0':'#0ff';
  if(wind>0)ctx.fillRect(wx,wy-1,ww,2);else ctx.fillRect(wx-ww,wy-1,ww,2);
  ctx.fillStyle='#fff';ctx.font='7px monospace';ctx.textAlign='center';
  ctx.fillText('WIND',wx,wy-5);

  // CPU thinking indicator
  if(gameState==='aiming'&&players[currentPlayer]&&players[currentPlayer].cpu){
    ctx.fillStyle='#ff0';ctx.font='10px monospace';ctx.textAlign='center';
    const dots='.'.repeat(1+Math.floor(performance.now()/300)%3);
    ctx.fillText('CPU THINKING'+dots,W/2,H/2-20);
  }

  ctx.restore();
  // weather effects
  if(weather&&weather.rain){
    ctx.fillStyle='rgba(100,150,255,.3)';
    for(let r=0;r<30;r++){
      const rx=(performance.now()*.3+r*137)%W,ry=(performance.now()*.8+r*89)%H;
      ctx.fillRect(rx,ry,1,4+Math.random()*3);
    }
  }
  if(weather&&weather.snow){
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let s=0;s<20;s++){
      const sx2=(performance.now()*.1+s*173+Math.sin(performance.now()*.001+s)*20)%W;
      const sy2=(performance.now()*.2+s*97)%H;
      ctx.fillRect(sx2,sy2,2,2);
    }
  }
  if(weather&&weather.skyTint){ctx.fillStyle=weather.skyTint;ctx.globalAlpha=.15;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(weather&&weather.visMult<1){ctx.fillStyle='rgba(0,0,0,'+(1-weather.visMult)*.3+')';ctx.fillRect(0,0,W,H);}

  // floor/wall labels
  if(floorType){
    // bottom bar
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,H-28,W,14);
    ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillStyle='#888';ctx.fillText('Floor '+round+' | '+BACKGROUNDS[bgIdx].name+' | '+weather.name,W/2,H-19);
    // ground type label on terrain surface
    ctx.fillStyle='rgba(0,0,0,.4)';
    const lw=floorType.name.length*5+floorType.desc.length*4+20;
    ctx.fillRect(4,H*.65-6,lw,14);
    ctx.strokeStyle=floorType.color;ctx.lineWidth=1;ctx.strokeRect(4,H*.65-6,lw,14);
    ctx.textAlign='left';
    ctx.fillStyle=floorType.color;ctx.font='bold 8px monospace';ctx.fillText(floorType.name,8,H*.65+3);
    ctx.fillStyle='#888';ctx.font='7px monospace';ctx.fillText(floorType.desc,8+floorType.name.length*5+4,H*.65+3);
    // left wall label
    ctx.save();ctx.translate(8,H*.35);ctx.rotate(-Math.PI/2);
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(-20,-6,40,12);
    ctx.fillStyle='#666';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('WALL',0,3);
    ctx.restore();
    // right wall label
    ctx.save();ctx.translate(W-8,H*.35);ctx.rotate(Math.PI/2);
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(-20,-6,40,12);
    ctx.fillStyle='#666';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('WALL',0,3);
    ctx.restore();
    // ceiling label
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(W/2-20,2,40,10);
    ctx.fillStyle='#555';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText('SKY',W/2,10);
  }

  // CRT scanlines
  ctx.fillStyle='rgba(0,0,0,.08)';
  for(let sy=0;sy<H;sy+=2)ctx.fillRect(0,sy,W,1);
  // CRT vignette corners
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fillRect(0,0,4,H);ctx.fillRect(W-4,0,4,H);ctx.fillRect(0,0,W,3);ctx.fillRect(0,H-3,W,3);
  // round/turn counter
  ctx.fillStyle='#0f0';ctx.font='8px monospace';ctx.textAlign='left';
  ctx.fillText('R'+round+'/'+maxRounds+' T'+turnCount,6,H-6);
}

let lastT=performance.now();
function loop(){
  const now=performance.now(),dt=Math.min(.04,(now-lastT)/1000);lastT=now;
  if(gameState!=='over'&&gameState!=='roundOver'){update(dt);render();requestAnimationFrame(loop);}
  else{render();}
}

// touch
let touchSY=null,touchSX=null;
// keyboard: arrow keys move tank, z/x adjust angle
const keysDown={};
document.onkeydown=e=>{keysDown[e.code]=true;if(actx&&actx.state==='suspended')actx.resume();
  if(gameState!=='aiming'||players[currentPlayer].cpu)return;
  const p=players[currentPlayer];
  if(e.code==='ArrowLeft'&&p.fuel>0){p.x=Math.max(15,p.x-3);p.fuel-=2;p.y=terrain[Math.floor(p.x)];sfx('move');}
  if(e.code==='ArrowRight'&&p.fuel>0){p.x=Math.min(W-15,p.x+3);p.fuel-=2;p.y=terrain[Math.floor(p.x)];sfx('move');}
  if(e.code==='ArrowUp'){p.angle=Math.min(180,p.angle+2);sfx('turret');}
  if(e.code==='ArrowDown'){p.angle=Math.max(0,p.angle-2);sfx('turret');}
  if(e.code==='Space')fire();
  updateUI();
};
document.onkeyup=e=>{keysDown[e.code]=false;};
cv.addEventListener('touchstart',e=>{if(gameState!=='aiming'||players[currentPlayer].cpu)return;const t=e.touches[0];touchSY=t.clientY;touchSX=t.clientX;if(actx&&actx.state==='suspended')actx.resume();});
cv.addEventListener('touchmove',e=>{if(gameState!=='aiming'||touchSY===null||players[currentPlayer].cpu)return;e.preventDefault();const t=e.touches[0];const dy=touchSY-t.clientY,dx=t.clientX-touchSX;const p=players[currentPlayer];p.angle=Math.max(0,Math.min(180,p.angle+Math.round(dy*.25)));p.power=Math.max(5,Math.min(100,p.power+Math.round(dx*.15)));touchSY=t.clientY;touchSX=t.clientX;updateUI();},{passive:false});
cv.addEventListener('touchend',()=>{touchSY=null;touchSX=null;});
let lastTap=0;
cv.addEventListener('touchend',()=>{const n=Date.now();if(n-lastTap<300&&gameState==='aiming'&&!players[currentPlayer].cpu)fire();lastTap=n;});
</script>
