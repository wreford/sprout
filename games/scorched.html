<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scorched</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:system-ui;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:8px 12px;display:none;background:rgba(0,0,0,.85);border-top:1px solid #333}
#ui.show{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center}
#ui label{font:11px monospace;color:#aaa}
#ui input[type=range]{width:100px;height:20px;accent-color:#ff6b35}
#ui .val{font:bold 12px monospace;color:#ff6b35;min-width:35px;text-align:center}
#ui button{font:bold 13px monospace;padding:8px 20px;border:2px solid #ff6b35;border-radius:6px;background:transparent;color:#ff6b35;cursor:pointer}
#ui button:active{background:rgba(255,107,53,.2)}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;padding:6px 10px;display:none;font:bold 12px monospace;color:#fff;text-shadow:0 1px 3px #000;pointer-events:none}
#hud.show{display:flex;gap:12px;align-items:center}
.wp{font:bold 11px monospace;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.5)}
#start{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0808;text-align:center}
#start h1{font:900 32px system-ui;color:#ff6b35;text-shadow:0 0 20px rgba(255,107,53,.3);letter-spacing:2px;margin-bottom:6px}
#start .sub{font:12px monospace;color:#665;max-width:300px;line-height:1.6;margin-bottom:16px}
#start button{font:bold 15px monospace;padding:12px 36px;border:2px solid #ff6b35;border-radius:8px;background:transparent;color:#ff6b35;cursor:pointer;letter-spacing:1px}
#start select{font:13px monospace;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#1a1a1a;color:#ccc;margin-bottom:12px}
#msg{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:15;font:bold 18px system-ui;color:#ff6b35;text-shadow:0 0 15px rgba(255,107,53,.4);opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
#msg.show{opacity:1}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud">
  <span id="turnInfo" style="color:#ff6b35"></span>
  <span id="windInfo" class="wp"></span>
  <span style="margin-left:auto" id="scores"></span>
</div>
<div id="ui">
  <label>Angle</label><input type="range" id="angleSlider" min="0" max="180" value="60"><span class="val" id="angleVal">60°</span>
  <label>Power</label><input type="range" id="powerSlider" min="5" max="100" value="50"><span class="val" id="powerVal">50</span>
  <button id="fireBtn" onclick="fire()">FIRE</button>
</div>
<div id="start">
  <h1>SCORCHED</h1>
  <div class="sub">Tanks on a hill. Adjust angle & power. Destroy the others. Wind changes each turn.</div>
  <select id="numPlayers">
    <option value="2">2 Players</option>
    <option value="3" selected>3 Players</option>
    <option value="4">4 Players</option>
    <option value="5">5 Players</option>
  </select><br>
  <select id="numRounds">
    <option value="3">3 Rounds</option>
    <option value="5" selected>5 Rounds</option>
    <option value="10">10 Rounds</option>
  </select><br>
  <button onclick="startGame()">PLAY</button>
</div>
<div id="msg"></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();onresize=resize;

const COLORS=['#ff6b35','#4ade80','#38bdf8','#f7c948','#a78bfa'];
const NAMES=['P1','P2','P3','P4','P5'];
let terrain,players,currentPlayer,wind,projectile,explosions,particles;
let gameState,round,maxRounds,numPlayers,msgTimer;
let actx;

function initAudio(){if(actx)return;actx=new(AudioContext||webkitAudioContext)();if(actx.state==='suspended')actx.resume();}
function sfx(type){
  if(!actx||actx.state!=='running')return;
  const n=actx.currentTime;
  if(type==='fire'){
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sawtooth';o.frequency.value=100;o.frequency.exponentialRampToValueAtTime(400,n+.08);
    g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);
    o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.15);
  }else if(type==='explode'){
    const buf=actx.createBuffer(1,actx.sampleRate*.4,actx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){const t=i/actx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-t*8);}
    const s=actx.createBufferSource();s.buffer=buf;
    const g=actx.createGain();g.gain.value=.15;
    const fl=actx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=400;
    s.connect(fl);fl.connect(g);g.connect(actx.destination);s.start(n);
  }else if(type==='hit'){
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';o.frequency.value=300;o.frequency.exponentialRampToValueAtTime(80,n+.2);
    g.gain.setValueAtTime(.12,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);
    o.connect(g);g.connect(actx.destination);o.start(n);o.stop(n+.3);
  }else if(type==='win'){
    [523,659,784,1047].forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='square';o.frequency.value=f;
      g.gain.setValueAtTime(.04,n+i*.12);g.gain.exponentialRampToValueAtTime(.001,n+i*.12+.2);
      o.connect(g);g.connect(actx.destination);o.start(n+i*.12);o.stop(n+i*.12+.2);
    });
  }
}

function generateTerrain(){
  terrain=new Float32Array(W);
  const baseH=H*.55;
  let y=baseH+Math.random()*H*.1;
  for(let x=0;x<W;x++){
    y+=Math.sin(x*.008)*2+Math.sin(x*.02)*1+(Math.random()-.5)*.8;
    y=Math.max(H*.25,Math.min(H*.85,y));
    terrain[x]=y;
  }
  // smooth
  for(let pass=0;pass<3;pass++){
    const tmp=new Float32Array(W);
    for(let x=0;x<W;x++){
      let sum=0,count=0;
      for(let dx=-3;dx<=3;dx++){const xx=x+dx;if(xx>=0&&xx<W){sum+=terrain[xx];count++;}}
      tmp[x]=sum/count;
    }
    terrain=tmp;
  }
}

function placePlayers(){
  players=[];
  const spacing=W/(numPlayers+1);
  for(let i=0;i<numPlayers;i++){
    const x=Math.floor(spacing*(i+1))+Math.floor(Math.random()*30-15);
    const tx=Math.max(20,Math.min(W-20,x));
    players.push({
      x:tx,y:terrain[tx],hp:100,alive:true,color:COLORS[i],name:NAMES[i],
      score:0,angle:i<numPlayers/2?60:120,power:50
    });
  }
}

function showMsg(txt,dur){
  const el=document.getElementById('msg');el.textContent=txt;el.classList.add('show');
  clearTimeout(msgTimer);msgTimer=setTimeout(()=>el.classList.remove('show'),dur||2000);
}

function startGame(){
  document.getElementById('start').style.display='none';
  initAudio();
  numPlayers=parseInt(document.getElementById('numPlayers').value);
  maxRounds=parseInt(document.getElementById('numRounds').value);
  round=1;
  newRound();
}

function newRound(){
  resize();
  generateTerrain();
  placePlayers();
  currentPlayer=0;
  projectile=null;
  explosions=[];
  particles=[];
  wind=(Math.random()-.5)*2;
  gameState='aiming';
  showMsg('Round '+round,2000);
  updateUI();
  document.getElementById('hud').classList.add('show');
  document.getElementById('ui').classList.add('show');
  loop();
}

function updateUI(){
  const p=players[currentPlayer];
  if(!p)return;
  document.getElementById('turnInfo').textContent=p.name+"'s turn";
  document.getElementById('turnInfo').style.color=p.color;
  document.getElementById('windInfo').textContent='Wind: '+(wind>0?'→':'←')+' '+Math.abs(wind).toFixed(1);
  document.getElementById('windInfo').style.color=wind>0?'#38bdf8':'#a78bfa';
  const scoreStr=players.map(p2=>p2.name+':'+p2.score).join(' ');
  document.getElementById('scores').textContent=scoreStr;
  document.getElementById('angleSlider').value=p.angle;
  document.getElementById('angleVal').textContent=p.angle+'°';
  document.getElementById('powerSlider').value=p.power;
  document.getElementById('powerVal').textContent=p.power;
  document.getElementById('fireBtn').disabled=gameState!=='aiming';
}

document.getElementById('angleSlider').oninput=function(){
  if(gameState!=='aiming')return;
  players[currentPlayer].angle=parseInt(this.value);
  document.getElementById('angleVal').textContent=this.value+'°';
};
document.getElementById('powerSlider').oninput=function(){
  if(gameState!=='aiming')return;
  players[currentPlayer].power=parseInt(this.value);
  document.getElementById('powerVal').textContent=this.value;
};

function fire(){
  if(gameState!=='aiming')return;
  const p=players[currentPlayer];
  const rad=p.angle*Math.PI/180;
  const speed=p.power*.12;
  projectile={
    x:p.x,y:p.y-12,
    vx:Math.cos(rad)*speed*(p.x<W/2?1:-1),
    vy:-Math.sin(rad)*speed,
    trail:[]
  };
  gameState='flying';
  sfx('fire');
}

function explode(x,y,radius){
  sfx('explode');
  // crater in terrain
  for(let tx=Math.max(0,Math.floor(x-radius));tx<Math.min(W,Math.ceil(x+radius));tx++){
    const dx=tx-x;
    const depth=Math.sqrt(Math.max(0,radius*radius-dx*dx));
    if(terrain[tx]<y+depth)terrain[tx]=Math.min(H,terrain[tx]+depth*.7);
  }
  // damage players
  for(const p of players){
    if(!p.alive)continue;
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<radius*1.5){
      const dmg=Math.floor((1-d/(radius*1.5))*60);
      p.hp-=dmg;
      if(p.hp<=0){p.hp=0;p.alive=false;sfx('hit');
        players[currentPlayer].score+=10;
        showMsg(p.name+' destroyed!',1500);
      }
    }
  }
  // particles
  for(let i=0;i<30;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,life:30+Math.random()*20,
      color:Math.random()>.5?'#ff6b35':'#ffd700'});
  }
  explosions.push({x,y,radius,life:15});
}

function nextTurn(){
  let attempts=0;
  do{
    currentPlayer=(currentPlayer+1)%numPlayers;
    attempts++;
  }while(!players[currentPlayer].alive&&attempts<numPlayers);

  const alive=players.filter(p=>p.alive);
  if(alive.length<=1){
    if(alive.length===1){
      alive[0].score+=20;
      showMsg(alive[0].name+' wins the round!',2000);
      sfx('win');
    }
    setTimeout(()=>{
      round++;
      if(round>maxRounds){
        endGame();
      }else{
        newRound();
      }
    },2500);
    gameState='over';
    return;
  }
  wind+=(Math.random()-.5)*.6;
  wind=Math.max(-3,Math.min(3,wind));
  gameState='aiming';
  updateUI();
}

function endGame(){
  gameState='over';
  document.getElementById('ui').classList.remove('show');
  document.getElementById('hud').classList.remove('show');
  const winner=players.reduce((a,b)=>a.score>b.score?a:b);
  document.getElementById('start').style.display='flex';
  document.querySelector('#start h1').textContent=winner.name+' WINS!';
  document.querySelector('#start .sub').textContent=players.map(p=>p.name+': '+p.score+' pts').join('\n');
  sfx('win');
}

function update(dt){
  // projectile physics
  if(gameState==='flying'&&projectile){
    projectile.trail.push({x:projectile.x,y:projectile.y});
    if(projectile.trail.length>30)projectile.trail.shift();
    projectile.vx+=wind*.02;
    projectile.vy+=9.8*dt*2.5;
    projectile.x+=projectile.vx;
    projectile.y+=projectile.vy;
    // check terrain hit
    const px2=Math.floor(projectile.x);
    if(px2>=0&&px2<W&&projectile.y>=terrain[px2]){
      explode(projectile.x,projectile.y,35);
      projectile=null;
      setTimeout(nextTurn,1200);
      return;
    }
    // out of bounds
    if(projectile.x<-50||projectile.x>W+50||projectile.y>H+50){
      projectile=null;
      showMsg('Miss!',1000);
      setTimeout(nextTurn,1000);
    }
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
  // explosions
  for(let i=explosions.length-1;i>=0;i--){
    explosions[i].life--;
    if(explosions[i].life<=0)explosions.splice(i,1);
  }
  // settle tanks onto terrain
  for(const p of players){
    if(!p.alive)continue;
    const tx=Math.floor(p.x);
    if(tx>=0&&tx<W)p.y=terrain[tx];
  }
}

function render(){
  resize();
  // sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0a1a');sky.addColorStop(.4,'#1a1a3a');sky.addColorStop(.7,'#2a1a2a');sky.addColorStop(1,'#1a0a0a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // stars
  ctx.fillStyle='rgba(255,255,255,.4)';
  for(let i=0;i<40;i++){
    const sx2=(i*137+i*i*31)%W,sy2=(i*89+i*i*17)%(H*.4);
    ctx.fillRect(sx2,sy2,1,1);
  }

  // terrain
  ctx.fillStyle='#2a4a2a';
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<W;x++)ctx.lineTo(x,terrain[x]);
  ctx.lineTo(W,H);ctx.closePath();ctx.fill();
  // terrain top edge
  ctx.strokeStyle='#4a8a4a';ctx.lineWidth=2;
  ctx.beginPath();for(let x=0;x<W;x++){x===0?ctx.moveTo(x,terrain[x]):ctx.lineTo(x,terrain[x]);}ctx.stroke();
  // terrain texture
  ctx.fillStyle='rgba(20,60,20,.3)';
  for(let x=0;x<W;x+=3){
    const h=H-terrain[x];
    if(h>5)ctx.fillRect(x,terrain[x]+2,2,Math.min(h-2,8));
  }

  // aiming line
  if(gameState==='aiming'){
    const p=players[currentPlayer];
    if(p&&p.alive){
      const rad=p.angle*Math.PI/180;
      const dir=p.x<W/2?1:-1;
      const len=p.power*.6;
      ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(p.x,p.y-12);
      ctx.lineTo(p.x+Math.cos(rad)*len*dir,p.y-12-Math.sin(rad)*len);
      ctx.stroke();ctx.setLineDash([]);
    }
  }

  // players (tanks)
  for(const p of players){
    if(!p.alive)continue;
    const tx=p.x,ty=p.y;
    // tank body
    ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.fillRect(tx-10,ty-8,20,8);
    // turret
    ctx.fillRect(tx-5,ty-12,10,5);
    // barrel
    const rad=p.angle*Math.PI/180;
    const dir=p.x<W/2?1:-1;
    ctx.strokeStyle=p.color;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(tx,ty-12);
    ctx.lineTo(tx+Math.cos(rad)*15*dir,ty-12-Math.sin(rad)*15);
    ctx.stroke();
    ctx.shadowBlur=0;
    // hp bar
    ctx.fillStyle='#300';ctx.fillRect(tx-12,ty-20,24,3);
    ctx.fillStyle=p.hp>50?'#4f4':p.hp>25?'#ff0':'#f44';
    ctx.fillRect(tx-12,ty-20,24*p.hp/100,3);
    // name
    ctx.fillStyle=p.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText(p.name,tx,ty-23);
    // current player indicator
    if(players.indexOf(p)===currentPlayer&&gameState==='aiming'){
      ctx.fillStyle='#fff';ctx.font='8px monospace';
      ctx.fillText('▼',tx,ty-30);
    }
  }

  // projectile
  if(projectile){
    // trail
    ctx.strokeStyle='rgba(255,107,53,.3)';ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<projectile.trail.length;i++){
      const t=projectile.trail[i];
      i===0?ctx.moveTo(t.x,t.y):ctx.lineTo(t.x,t.y);
    }
    ctx.stroke();
    // bullet
    ctx.fillStyle='#fff';ctx.shadowColor='#ff6b35';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(projectile.x,projectile.y,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }

  // explosions
  for(const e of explosions){
    const alpha=e.life/15;
    ctx.globalAlpha=alpha;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.radius);
    g.addColorStop(0,'rgba(255,200,50,.8)');g.addColorStop(.4,'rgba(255,107,53,.4)');g.addColorStop(1,'rgba(255,50,50,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // particles
  for(const p of particles){
    ctx.globalAlpha=Math.max(0,p.life/30);
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-1,p.y-1,3,3);
  }
  ctx.globalAlpha=1;

  // wind indicator at top
  if(gameState==='aiming'||gameState==='flying'){
    const wx=W/2,wy=30;
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(wx-30,wy);ctx.lineTo(wx+30,wy);ctx.stroke();
    ctx.fillStyle='#38bdf8';
    const wx2=wx+wind*10;
    ctx.beginPath();ctx.moveTo(wx2,wy-4);ctx.lineTo(wx2+(wind>0?8:-8),wy);ctx.lineTo(wx2,wy+4);ctx.fill();
  }
}

let lastT=performance.now();
function loop(){
  if(gameState==='over'&&explosions.length===0&&particles.length===0)return;
  const now=performance.now(),dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  update(dt);render();
  requestAnimationFrame(loop);
}

// touch aiming: swipe up/down on canvas to adjust angle, left/right for power
let touchStartY=null,touchStartX=null;
cv.addEventListener('touchstart',e=>{
  if(gameState!=='aiming')return;
  const t=e.touches[0];touchStartY=t.clientY;touchStartX=t.clientX;
  if(actx&&actx.state==='suspended')actx.resume();
});
cv.addEventListener('touchmove',e=>{
  if(gameState!=='aiming'||touchStartY===null)return;
  e.preventDefault();
  const t=e.touches[0];
  const dy=touchStartY-t.clientY;
  const dx=t.clientX-touchStartX;
  const p=players[currentPlayer];
  p.angle=Math.max(0,Math.min(180,p.angle+Math.round(dy*.3)));
  p.power=Math.max(5,Math.min(100,p.power+Math.round(dx*.2)));
  touchStartY=t.clientY;touchStartX=t.clientX;
  updateUI();
},{passive:false});
cv.addEventListener('touchend',()=>{touchStartY=null;touchStartX=null;});

// double tap to fire
let lastTap=0;
cv.addEventListener('touchend',e=>{
  const now2=Date.now();
  if(now2-lastTap<300&&gameState==='aiming')fire();
  lastTap=now2;
});
</script>
</body>
</html>
