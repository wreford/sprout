<script>
const C = document.getElementById('c'), X = C.getContext('2d');
const $ = id => document.getElementById(id);
const TAG_COLORS = ['#e879f9','#38bdf8','#34d399','#fbbf24','#f87171','#a78bfa'];
const SIZES = [[40,32],[60,42],[85,55]];
const GRAVITY = 0.45, B_FRIC = 0.86, B_REST = 0.3, SLEEP_T = 0.12, TERM_V = 16;
const PRI_ORD = {'#ef4444':0,'#f97316':1,'#f7c948':2,'#4ade80':3,'#60a5fa':4};
const ZC = ['#3b82f6','#f97316','#4ade80'], ZN = ['TO DO','DOING','DONE'];

let W, H, TOP = 44, BOT = 50, blocks = [], parts = [], gravDir = 1;
let shake = {x:0,y:0}, dpr = 1;
let dragBlock = null, dragOff = {x:0,y:0}, lastM = {x:0,y:0}, prevM = {x:0,y:0};
let dragMoved = false, addFormOpen = false, editBlock = null, lpTimer = null, flipTimer = null;
let colCD = 0, frame = 0, frozenUntil = 0, tornadoUntil = 0;
let bhPos = null, bhUntil = 0;
let bouncyMode = false, iceMode = false, searchTerm = '', nukeFlash = 0;
let deletedStack = [], doneToday = 0, history = [];
let doingTimers = {}, FRIC = B_FRIC, REST = B_REST;
let searchOpen = false, statsOpen = false, waveOff = 0;

// --- Audio ---
const AC = new(window.AudioContext || window.webkitAudioContext)();
function snd(type) {
  if (AC.state === 'suspended') AC.resume();
  const g = AC.createGain(), o = AC.createOscillator();
  g.connect(AC.destination); o.connect(g);
  const t = AC.currentTime, V = 0.02;
  const recipes = {
    thud:[60,'sine',V,0.2], 'thud-big':[40,'sine',V,0.3],
    tap:[250,'triangle',V*0.6,0.04], 'tap-small':[400,'triangle',V*0.4,0.03],
    rumble:[45,'sawtooth',V,0.35], pop:[600,'sine',V,0.08]
  };
  if (recipes[type]) {
    const [f,w,v,d] = recipes[type];
    o.frequency.value = f; o.type = w;
    g.gain.setValueAtTime(v, t); g.gain.exponentialRampToValueAtTime(0.001, t+d);
    o.start(t); o.stop(t+d);
  } else if (type === 'shatter') {
    const n = AC.createBufferSource();
    const buf = AC.createBuffer(1, AC.sampleRate*0.3, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(d.length*0.15));
    n.buffer = buf;
    const gn = AC.createGain();
    gn.gain.setValueAtTime(V, t); gn.gain.exponentialRampToValueAtTime(0.001, t+0.3);
    n.connect(gn); gn.connect(AC.destination); n.start(t);
  } else if (type === 'chime' || type === 'victory') {
    const notes = type === 'victory' ? [523,659,784,1047] : [523,659,784];
    notes.forEach((f,i) => o.frequency.setValueAtTime(f, t + i*0.08));
    o.type = 'sine';
    g.gain.setValueAtTime(V, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08*notes.length + 0.3);
    o.start(t); o.stop(t + 0.08*notes.length + 0.3);
  } else if (type === 'whoosh') {
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(800, t+0.15);
    o.type = 'sawtooth';
    g.gain.setValueAtTime(V*0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.2);
    o.start(t); o.stop(t+0.2);
  } else if (type === 'zap') {
    o.frequency.setValueAtTime(1200, t);
    o.frequency.exponentialRampToValueAtTime(100, t+0.2);
    o.type = 'sawtooth';
    g.gain.setValueAtTime(V, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
    o.start(t); o.stop(t+0.25);
  }
}

// --- Resize ---
function resize() {
  dpr = window.devicePixelRatio || 1; W = window.innerWidth; H = window.innerHeight;
  C.width = W*dpr; C.height = H*dpr;
  C.style.width = W+'px'; C.style.height = H+'px';
  X.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

function zoneX(i) { return i * W / 3 }
function getZone(x) { return x < W/3 ? 0 : x < 2*W/3 ? 1 : 2 }

// --- Block creation ---
function mkBlock(title, color, si, x, y, due, tags) {
  const s = SIZES[si];
  return {
    id: Date.now() + Math.random(), title, color, sizeIdx: si,
    w: s[0], h: s[1], x: x ?? W/2 - s[0]/2, y: y ?? TOP + 5,
    vx: 0, vy: 0, angle: 0, angVel: 0,
    sleeping: false, sleepTime: 0, mass: si + 1,
    rot: (Math.random() - 0.5) * 0.12, wobble: 0, wobbleV: 0,
    due: due || null, tags: tags || [], prevZone: -1, lastVel: 0
  };
}

function addBlock(title, color, si, due, tags) {
  const b = mkBlock(title, color, si, 50 + Math.random()*(W-100), TOP+5, due, tags);
  blocks.push(b); snd('pop'); save(); return b;
}

// --- Particles ---
function spawnParts(b, count, type) {
  for (let i = 0; i < count; i++) {
    const isC = type === 'confetti', spd = isC ? 14 : 10;
    parts.push({
      x: b.x + b.w/2, y: b.y + b.h/2,
      vx: (Math.random()-.5) * spd, vy: (Math.random()-.5) * spd - (isC ? 6 : 4),
      life: 1,
      color: isC ? ['#ef4444','#f97316','#f7c948','#4ade80','#60a5fa','#e879f9','#fff'][Math.random()*7|0] : b.color,
      size: isC ? 3+Math.random()*4 : 2+Math.random()*5,
      rot: Math.random() * 6.28, type: type || 'square', rs: (Math.random()-.5) * 0.3
    });
  }
}

function spawnDust(x, y, n) {
  for (let i = 0; i < n; i++)
    parts.push({ x, y, vx: (Math.random()-.5)*4, vy: -Math.random()*3-1,
      life: 0.7, color: 'rgba(180,180,180,0.6)', size: 4+Math.random()*6,
      rot: 0, type: 'dust', rs: 0 });
}

function spawnFlame(b) {
  parts.push({
    x: b.x + Math.random()*b.w, y: b.y + b.h*0.3 + Math.random()*b.h*0.5,
    vx: (Math.random()-.5)*1.5, vy: -1.5 - Math.random()*2,
    life: 0.5, color: Math.random() > 0.4 ? '#ef4444' : '#f97316',
    size: 3+Math.random()*4, rot: 0, type: 'flame', rs: 0
  });
}

function deleteBlock(b) {
  deletedStack.push({...b});
  spawnParts(b, 25); snd('shatter');
  blocks = blocks.filter(bl => bl !== b); save();
}

function isOverdue(b) {
  if (!b.due) return false;
  const d = new Date(); d.setHours(0,0,0,0);
  return new Date(b.due) < d;
}

// --- Physics ---
function updatePhysics() {
  if (Date.now() < frozenUntil) return;
  FRIC = iceMode ? 0.995 : B_FRIC;
  REST = bouncyMode ? 0.85 : B_REST;
  const floor = H - BOT, now = Date.now();
  colCD = Math.max(0, colCD - 1);

  for (const b of blocks) {
    if (b === dragBlock) continue;
    if (b.sleeping) { b.sleepTime += 16; continue; }
    b.sleepTime = 0;
    b.vy += GRAVITY * gravDir;

    // Black hole attraction
    if (bhPos && now < bhUntil) {
      const dx = bhPos.x - (b.x+b.w/2), dy = bhPos.y - (b.y+b.h/2);
      const d = Math.sqrt(dx*dx + dy*dy) + 1;
      const f = Math.min(8, 600/d);
      b.vx += dx/d * f * 0.15; b.vy += dy/d * f * 0.15;
    }

    // Tornado vortex
    if (now < tornadoUntil) {
      const cx = W/2, cy = (TOP+floor)/2;
      const dx = cx - (b.x+b.w/2), dy = cy - (b.y+b.h/2);
      const d = Math.sqrt(dx*dx + dy*dy) + 1;
      b.vx += (-dy/d*3 + dx/d*0.3) * 0.08;
      b.vy += (dx/d*3 + dy/d*0.3) * 0.08;
      b.angVel += 0.01;
    }

    // DONE zone gentle magnet
    const bcx = b.x + b.w/2;
    if (bcx > W*0.55) b.vx += (W*5/6 - bcx) * 0.0004;

    // Velocity limits, friction, rotation
    b.vx = Math.max(-TERM_V, Math.min(TERM_V, b.vx));
    b.vy = Math.max(-TERM_V, Math.min(TERM_V, b.vy));
    b.vx *= FRIC;
    b.angle += b.angVel;
    b.angVel *= 0.96;
    if (Math.abs(b.angVel) < 0.001) b.angVel = 0;

    b.x += b.vx; b.y += b.vy;
    b.lastVel = Math.sqrt(b.vx*b.vx + b.vy*b.vy);

    // Floor / ceiling with dust and wobble
    if (gravDir > 0) {
      if (b.y + b.h > floor) {
        const iv = Math.abs(b.vy);
        b.y = floor - b.h; b.vy *= -REST; b.vx *= iceMode ? 0.99 : 0.9;
        if (Math.abs(b.vy) < 1) b.vy = 0;
        b.angVel += b.vx * 0.01;
        if (iv > 4) spawnDust(b.x + b.w/2, floor, Math.min(8, iv|0));
        if (iv > 3) { b.wobble = 0; b.wobbleV = iv * 0.03; }
        b.angVel += -b.angle * 0.1;
      }
      if (b.y < TOP) { b.y = TOP; b.vy *= -REST; }
    } else {
      if (b.y < TOP) {
        const iv = Math.abs(b.vy);
        b.y = TOP; b.vy *= -REST; b.vx *= iceMode ? 0.99 : 0.9;
        if (Math.abs(b.vy) < 1) b.vy = 0;
        if (iv > 4) spawnDust(b.x + b.w/2, TOP, Math.min(8, iv|0));
      }
      if (b.y + b.h > floor) { b.y = floor - b.h; b.vy *= -REST; }
    }

    // Walls
    if (b.x < 0) { b.x = 0; b.vx *= -REST; b.angVel -= b.vy * 0.005; }
    if (b.x + b.w > W) { b.x = W - b.w; b.vx *= -REST; b.angVel += b.vy * 0.005; }

    // Wobble spring damping
    b.wobbleV += -b.wobble * 0.3;
    b.wobbleV *= 0.85;
    b.wobble += b.wobbleV;
    if (Math.abs(b.wobble) < 0.001 && Math.abs(b.wobbleV) < 0.001) { b.wobble = 0; b.wobbleV = 0; }

    // Sleep check
    if (Math.abs(b.vx) < SLEEP_T && Math.abs(b.vy) < SLEEP_T && Math.abs(b.angVel) < 0.002) {
      const onF = gravDir > 0 ? (b.y + b.h >= floor-1) : (b.y <= TOP+1);
      if (onF || isOnBlock(b)) { b.sleeping = true; b.vx = 0; b.vy = 0; b.angVel = 0; }
    }

    // Zone change -> confetti when entering DONE
    const cz = getZone(b.x + b.w/2);
    if (b.prevZone >= 0 && b.prevZone !== 2 && cz === 2) {
      spawnParts(b, 40, 'confetti'); snd('victory');
      doneToday++; saveHist();
    }
    b.prevZone = cz;
  }

  // Block-block collisions
  for (let i = 0; i < blocks.length; i++)
    for (let j = i+1; j < blocks.length; j++) {
      if (blocks[i] === dragBlock || blocks[j] === dragBlock) continue;
      resolveCol(blocks[i], blocks[j]);
    }

  // Drag block pushes others
  if (dragBlock) {
    for (const b of blocks) {
      if (b === dragBlock) continue;
      const ox = Math.min(dragBlock.x+dragBlock.w, b.x+b.w) - Math.max(dragBlock.x, b.x);
      const oy = Math.min(dragBlock.y+dragBlock.h, b.y+b.h) - Math.max(dragBlock.y, b.y);
      if (ox > 0 && oy > 0) {
        b.sleeping = false;
        if (ox < oy) {
          const d = dragBlock.x < b.x ? 1 : -1;
          b.x += d*ox; b.vx += d*3; b.angVel += d*0.05;
        } else {
          const d = dragBlock.y < b.y ? 1 : -1;
          b.y += d*oy; b.vy += d*3;
        }
      }
    }
    // Drag trail sparkles
    const dv = Math.sqrt((lastM.x - (prevM.x||lastM.x))**2 + (lastM.y - (prevM.y||lastM.y))**2);
    if (dv > 5 && frame % 2 === 0) {
      parts.push({
        x: dragBlock.x + dragBlock.w/2 + (Math.random()-.5)*8,
        y: dragBlock.y + dragBlock.h/2 + (Math.random()-.5)*8,
        vx: (Math.random()-.5)*2, vy: (Math.random()-.5)*2,
        life: 0.6, color: dragBlock.color, size: 2+Math.random()*3,
        rot: Math.random()*6.28, type: 'sparkle', rs: 0.2
      });
    }
  }

  // Update particles
  for (let i = parts.length-1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy;
    if (p.type === 'dust') { p.vy -= 0.05; p.vx *= 0.95; p.size *= 0.97; }
    else if (p.type === 'flame') { p.vy -= 0.02; p.size *= 0.96; }
    else p.vy += 0.25;
    p.life -= p.type === 'dust' ? 0.025 : p.type === 'flame' ? 0.04 : 0.018;
    p.rot += p.rs || 0.1;
    if (p.life <= 0) parts.splice(i, 1);
  }

  // Shake decay, nuke flash, overdue fire
  shake.x *= 0.82; shake.y *= 0.82;
  if (Math.abs(shake.x) < 0.3) shake.x = 0;
  if (Math.abs(shake.y) < 0.3) shake.y = 0;
  if (nukeFlash > 0) nukeFlash -= 0.04;
  if (frame % 4 === 0) {
    for (const b of blocks)
      if (isOverdue(b) && getZone(b.x + b.w/2) !== 2) spawnFlame(b);
  }
}

function isOnBlock(a) {
  for (const b of blocks) {
    if (a === b) continue;
    if (a.x+a.w > b.x+1 && a.x < b.x+b.w-1) {
      if (gravDir > 0 && Math.abs((a.y+a.h) - b.y) < 3) return true;
      if (gravDir < 0 && Math.abs(a.y - (b.y+b.h)) < 3) return true;
    }
  }
  return false;
}

function resolveCol(a, b) {
  const ox = Math.min(a.x+a.w, b.x+b.w) - Math.max(a.x, b.x);
  const oy = Math.min(a.y+a.h, b.y+b.h) - Math.max(a.y, b.y);
  if (ox <= 0 || oy <= 0) return;
  a.sleeping = false; b.sleeping = false;
  const tm = a.mass + b.mass, ar = b.mass/tm, br = a.mass/tm;
  if (ox < oy) {
    const d = a.x < b.x ? -1 : 1;
    a.x += d*ox*ar; b.x -= d*ox*br;
    const rv = a.vx - b.vx;
    a.vx -= rv * ar * (1+REST) * 0.5; b.vx += rv * br * (1+REST) * 0.5;
    const hy = (Math.max(a.y, b.y) + Math.min(a.y+a.h, b.y+b.h)) / 2;
    a.angVel += (hy - (a.y+a.h/2)) * 0.002 * rv;
    b.angVel -= (hy - (b.y+b.h/2)) * 0.002 * rv;
  } else {
    const d = a.y < b.y ? -1 : 1;
    a.y += d*oy*ar; b.y -= d*oy*br;
    const rv = a.vy - b.vy;
    a.vy -= rv * ar * (1+REST) * 0.5; b.vy += rv * br * (1+REST) * 0.5;
  }
  if (colCD === 0) {
    const iv = Math.abs(a.vx-b.vx) + Math.abs(a.vy-b.vy);
    if (iv > 2) { snd(a.mass+b.mass > 4 ? 'thud' : 'tap-small'); colCD = 3; }
  }
}

// --- Rendering ---
function draw() {
  X.save(); X.translate(shake.x, shake.y);
  X.clearRect(-20, -20, W+40, H+40);

  // Background grid
  X.strokeStyle = 'rgba(255,255,255,0.018)'; X.lineWidth = 1;
  for (let x = 0; x < W; x += 35) { X.beginPath(); X.moveTo(x,TOP); X.lineTo(x,H-BOT); X.stroke(); }
  for (let y = TOP; y < H-BOT; y += 35) { X.beginPath(); X.moveTo(0,y); X.lineTo(W,y); X.stroke(); }
  X.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x = 0; x < W; x += 35)
    for (let y = TOP; y < H-BOT; y += 35) X.fillRect(x-.5, y-.5, 1, 1);

  // Zone backgrounds with wave animation
  waveOff += 0.015;
  const zw = W/3, zB = H - BOT;
  for (let i = 0; i < 3; i++) {
    const g = X.createLinearGradient(0, zB-120, 0, zB);
    const wv = Math.sin(waveOff + i*1.2) * 0.03;
    g.addColorStop(0, 'transparent');
    g.addColorStop(0.6 - wv, ZC[i]+'08');
    g.addColorStop(1, ZC[i]+'1a');
    X.fillStyle = g; X.fillRect(zoneX(i), TOP, zw, zB-TOP);
    // Zone label + count
    X.fillStyle = ZC[i]+'40'; X.font = 'bold 22px system-ui'; X.textAlign = 'center';
    X.fillText(ZN[i], zoneX(i)+zw/2, zB-14);
    const zn = blocks.filter(b => getZone(b.x+b.w/2) === i).length;
    X.fillStyle = ZC[i]+'30'; X.font = 'bold 11px system-ui';
    X.fillText(zn + ' task' + (zn !== 1 ? 's' : ''), zoneX(i)+zw/2, zB-34);
    if (i > 0) {
      X.setLineDash([4,8]); X.strokeStyle = ZC[i]+'20'; X.lineWidth = 1;
      X.beginPath(); X.moveTo(zoneX(i),TOP); X.lineTo(zoneX(i),zB); X.stroke();
      X.setLineDash([]);
    }
  }

  // Black hole visual
  if (bhPos && Date.now() < bhUntil) {
    const pr = 1 - (bhUntil - Date.now()) / 3000, r = 60*(1-pr*0.5);
    const g = X.createRadialGradient(bhPos.x, bhPos.y, 0, bhPos.x, bhPos.y, r);
    g.addColorStop(0, 'rgba(60,0,120,0.8)');
    g.addColorStop(0.5, 'rgba(30,0,60,0.4)');
    g.addColorStop(1, 'transparent');
    X.fillStyle = g; X.beginPath(); X.arc(bhPos.x, bhPos.y, r, 0, Math.PI*2); X.fill();
    X.strokeStyle = 'rgba(160,80,255,0.3)'; X.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const a = waveOff*4 + i*Math.PI/3;
      X.beginPath(); X.arc(bhPos.x, bhPos.y, r*0.3+Math.sin(a*2)*10, a, a+1.5); X.stroke();
    }
  }

  // Blocks (dragged on top)
  const now = Date.now();
  const drawOrd = dragBlock ? [...blocks.filter(b => b !== dragBlock), dragBlock] : blocks;
  for (const b of drawOrd) {
    X.save();
    const isDrag = b === dragBlock;
    const hl = searchTerm && b.title.toLowerCase().includes(searchTerm.toLowerCase());
    if (searchTerm && !hl) X.globalAlpha = 0.25;
    const cx = b.x+b.w/2, cy = b.y+b.h/2;
    X.translate(cx, cy);
    if (isDrag) X.scale(1.08, 1.08);
    X.rotate(b.rot + b.angle + b.wobble);
    X.translate(-cx, -cy);

    // Priority glow pulse for urgent blocks
    if (b.color === '#ef4444') {
      X.shadowColor = '#ef4444'; X.shadowBlur = 15 * (0.3 + Math.sin(frame*0.06)*0.15);
    }
    if (hl) { X.shadowColor = '#fff'; X.shadowBlur = 20; }

    // Drop shadow
    const sh = isDrag ? 8 : 4;
    X.fillStyle = `rgba(0,0,0,${isDrag ? 0.5 : 0.35})`;
    rr(X, b.x+sh, b.y+sh, b.w, b.h, 4); X.fill();

    // Sticky note body gradient
    const bg = X.createLinearGradient(b.x, b.y, b.x, b.y+b.h);
    bg.addColorStop(0, lc(b.color, 30)); bg.addColorStop(0.5, b.color);
    bg.addColorStop(1, dc(b.color, 15));
    X.fillStyle = bg; rr(X, b.x, b.y, b.w, b.h, 4); X.fill();

    // Paper texture overlay
    const tg = X.createLinearGradient(b.x, b.y, b.x+b.w*0.7, b.y+b.h);
    tg.addColorStop(0, 'rgba(255,255,255,0.12)');
    tg.addColorStop(0.5, 'rgba(255,255,255,0.03)');
    tg.addColorStop(1, 'rgba(0,0,0,0.05)');
    X.fillStyle = tg; rr(X, b.x, b.y, b.w, b.h, 4); X.fill();

    // Fold corner (top-right)
    const fs2 = Math.min(b.w, b.h) * 0.22;
    X.fillStyle = dc(b.color, 25);
    X.beginPath(); X.moveTo(b.x+b.w-fs2, b.y); X.lineTo(b.x+b.w, b.y+fs2);
    X.lineTo(b.x+b.w, b.y); X.closePath(); X.fill();
    X.fillStyle = 'rgba(0,0,0,0.1)';
    X.beginPath(); X.moveTo(b.x+b.w-fs2, b.y); X.lineTo(b.x+b.w, b.y+fs2);
    X.lineTo(b.x+b.w-fs2*0.5, b.y+fs2*0.5); X.closePath(); X.fill();

    // Border
    X.strokeStyle = 'rgba(255,255,255,0.1)'; X.lineWidth = 0.5;
    rr(X, b.x, b.y, b.w, b.h, 4); X.stroke();
    X.shadowColor = 'transparent'; X.shadowBlur = 0;

    // Tag dots
    if (b.tags && b.tags.length)
      for (let ti = 0; ti < b.tags.length; ti++) {
        X.fillStyle = TAG_COLORS[b.tags[ti]];
        X.beginPath(); X.arc(b.x+6+ti*8, b.y+b.h-6, 2.5, 0, Math.PI*2); X.fill();
      }

    // Due date label
    if (b.due && getZone(b.x+b.w/2) !== 2) {
      X.fillStyle = isOverdue(b) ? 'rgba(239,68,68,0.9)' : 'rgba(255,255,255,0.4)';
      X.font = 'bold ' + (b.sizeIdx === 0 ? 5 : 6) + 'px system-ui';
      X.textAlign = 'right'; X.textBaseline = 'bottom';
      X.fillText(b.due.slice(5), b.x+b.w-3, b.y+b.h-2);
    }

    // Task text (handwritten font)
    const fs = b.sizeIdx === 0 ? 8 : b.sizeIdx === 1 ? 10 : 13;
    X.fillStyle = 'rgba(0,0,0,0.75)'; X.textAlign = 'center'; X.textBaseline = 'middle';
    X.font = `bold ${fs}px 'Segoe Print','Comic Sans MS',cursive`;
    let txt = b.title, mw = b.w - 8;
    if (X.measureText(txt).width > mw) {
      while (txt.length > 1 && X.measureText(txt+'..').width > mw) txt = txt.slice(0,-1);
      txt += '..';
    }
    X.fillText(txt, cx, cy - (b.sizeIdx === 0 ? 3 : 5));

    // Expressive emoji face
    const vel = b.lastVel || 0, zone = getZone(cx);
    let em;
    if (vel > 10) em = '\u{1F631}';
    else if (vel > 5) em = '\u{1F632}';
    else if (Math.abs(b.angVel) > 0.08) em = '\u{1F635}';
    else if (isDrag) em = '\u{1F525}';
    else if (b.sleeping && b.sleepTime > 5000) em = '\u{1F634}';
    else if (zone === 2) em = '\u{1F60E}';
    else if (zone === 1) em = '\u{1F4AA}';
    else if (isOverdue(b)) em = '\u{1F630}';
    else em = '\u{1F4DD}';
    X.font = `${b.sizeIdx === 0 ? 7 : b.sizeIdx === 1 ? 10 : 14}px system-ui`;
    X.fillText(em, cx, cy + (b.sizeIdx === 0 ? 4 : fs*0.6));

    // DOING zone timer
    if (zone === 1 && doingTimers[b.id]) {
      const el = Math.floor((now - doingTimers[b.id]) / 1000);
      const m = Math.floor(el/60), s = el % 60;
      X.fillStyle = 'rgba(255,255,255,0.5)';
      X.font = `bold ${b.sizeIdx === 0 ? 5 : 6}px system-ui`;
      X.textAlign = 'left'; X.textBaseline = 'top';
      X.fillText(`${m}:${String(s).padStart(2,'0')}`, b.x+2, b.y+2);
    }
    X.restore();
  }

  // Particles
  for (const p of parts) {
    X.save(); X.globalAlpha = Math.max(0, p.life);
    if (p.type === 'dust') {
      X.fillStyle = p.color; X.beginPath(); X.arc(p.x, p.y, p.size/2, 0, Math.PI*2); X.fill();
    } else if (p.type === 'sparkle') {
      X.fillStyle = p.color; X.translate(p.x, p.y); X.rotate(p.rot);
      drawStar(X, 0, 0, p.size*0.4, p.size, 4); X.fill();
    } else if (p.type === 'confetti') {
      X.fillStyle = p.color; X.translate(p.x, p.y); X.rotate(p.rot);
      X.fillRect(-p.size/2, -p.size*0.3, p.size, p.size*0.6);
    } else if (p.type === 'flame') {
      X.fillStyle = p.color; X.beginPath(); X.arc(p.x, p.y, p.size/2, 0, Math.PI*2); X.fill();
    } else {
      X.fillStyle = p.color; X.translate(p.x, p.y); X.rotate(p.rot);
      X.fillRect(-p.size/2, -p.size/2, p.size, p.size);
    }
    X.restore();
  }

  // Nuke flash
  if (nukeFlash > 0) { X.fillStyle = `rgba(255,255,255,${nukeFlash})`; X.fillRect(0,0,W,H); }

  // Freeze overlay with wavy ice lines
  if (Date.now() < frozenUntil) {
    X.fillStyle = 'rgba(100,180,255,0.06)'; X.fillRect(0, TOP, W, H-TOP-BOT);
    X.strokeStyle = 'rgba(100,180,255,0.15)'; X.lineWidth = 2; X.setLineDash([8,12]);
    for (let y = TOP; y < H-BOT; y += 40) {
      X.beginPath();
      X.moveTo(0, y + Math.sin(waveOff*3 + y*0.1)*5);
      X.lineTo(W, y + Math.sin(waveOff*3 + y*0.1 + 2)*5);
      X.stroke();
    }
    X.setLineDash([]);
  }

  X.restore();
  drawMinimap();
}

// --- Utility draw functions ---
function drawMinimap() {
  const mc = $('minimap'), mx = mc.getContext('2d'), mw = 80, mh = 60;
  mc.width = mw*dpr; mc.height = mh*dpr;
  mx.setTransform(dpr, 0, 0, dpr, 0, 0); mx.clearRect(0, 0, mw, mh);
  const sx = mw/W, sy = mh/H;
  for (let i = 0; i < 3; i++) { mx.fillStyle = ZC[i]+'15'; mx.fillRect(i*mw/3, 0, mw/3, mh); }
  for (const b of blocks) {
    mx.fillStyle = b.color + 'cc';
    mx.fillRect(b.x*sx, b.y*sy, Math.max(2, b.w*sx), Math.max(1.5, b.h*sy));
  }
}

function drawStar(c, x, y, ir, or, pts) {
  c.beginPath();
  for (let i = 0; i < pts*2; i++) {
    const r = i%2 === 0 ? or : ir, a = Math.PI/pts * i - Math.PI/2;
    i === 0 ? c.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r) : c.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
  }
  c.closePath();
}

function rr(c, x, y, w, h, r) {
  c.beginPath(); c.moveTo(x+r, y); c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r); c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h); c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r); c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y); c.closePath();
}

function lc(hex, p) {
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${Math.min(255,(n>>16&255)+p)},${Math.min(255,(n>>8&255)+p)},${Math.min(255,(n&255)+p)})`;
}
function dc(hex, p) {
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${Math.max(0,(n>>16&255)-p)},${Math.max(0,(n>>8&255)-p)},${Math.max(0,(n&255)-p)})`;
}

function updateCounts() {
  const zc = [0,0,0]; blocks.forEach(b => zc[getZone(b.x+b.w/2)]++);
  $('counts').textContent = `${zc[0]} / ${zc[1]} / ${zc[2]} (${blocks.length})`;
  $('streak').textContent = doneToday > 0 ? doneToday + ' done today!' : '';
}

function updateDoingTimers() {
  const now = Date.now();
  for (const b of blocks) {
    const z = getZone(b.x + b.w/2);
    if (z === 1 && !doingTimers[b.id]) doingTimers[b.id] = now;
    else if (z !== 1 && doingTimers[b.id]) delete doingTimers[b.id];
  }
}

// --- Input handling ---
function getPos(e) { const t = e.touches ? e.touches[0] : e; return {x: t.clientX, y: t.clientY}; }
function hitTest(x, y) {
  for (let i = blocks.length-1; i >= 0; i--) {
    const b = blocks[i];
    if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) return b;
  }
  return null;
}

function startDrag(e) {
  e.preventDefault();
  if (AC.state === 'suspended') AC.resume();
  const p = getPos(e), b = hitTest(p.x, p.y);
  if (!b) return;
  dragBlock = b; dragMoved = false;
  b.sleeping = false; b.vx = 0; b.vy = 0; b.angVel = 0;
  dragOff.x = p.x - b.x; dragOff.y = p.y - b.y;
  lastM = {x: p.x, y: p.y, t: Date.now()}; prevM = {...lastM};
  blocks = blocks.filter(bl => bl !== b); blocks.push(b);
  lpTimer = setTimeout(() => {
    if (dragBlock === b && !dragMoved) { deleteBlock(b); dragBlock = null; }
  }, 800);
}

function moveDrag(e) {
  if (!dragBlock) return; e.preventDefault();
  const p = getPos(e);
  if (Math.abs(p.x - lastM.x) > 3 || Math.abs(p.y - lastM.y) > 3) dragMoved = true;
  prevM = {...lastM}; lastM = {x: p.x, y: p.y, t: Date.now()};
  dragBlock.x = Math.max(0, Math.min(W - dragBlock.w, p.x - dragOff.x));
  dragBlock.y = Math.max(TOP, Math.min(H - BOT - dragBlock.h, p.y - dragOff.y));
  dragBlock.angVel += (p.x - prevM.x) * 0.001;
  if (lpTimer && dragMoved) { clearTimeout(lpTimer); lpTimer = null; }
}

function endDrag() {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  if (!dragBlock) return;
  const dt = Math.max(1, Date.now() - prevM.t), vs = Math.min(1, 16/dt);
  dragBlock.vx = Math.max(-TERM_V, Math.min(TERM_V, (lastM.x - prevM.x) * vs * 1.3));
  dragBlock.vy = Math.max(-TERM_V, Math.min(TERM_V, (lastM.y - prevM.y) * vs * 1.3));
  const spd = Math.sqrt(dragBlock.vx**2 + dragBlock.vy**2);
  snd(spd > 8 ? 'whoosh' : 'thud');
  dragBlock.sleeping = false;
  const rel = dragBlock; dragBlock = null; save();
  if (!dragMoved) lastTapBlock = rel;
}

let lastTapBlock = null, lastTapTime = 0;
function handleDown(e, getP) {
  const now = Date.now(), p = getP(), b = hitTest(p.x, p.y);
  if (b && b === lastTapBlock && now - lastTapTime < 400) { openEdit(b); lastTapBlock = null; return true; }
  lastTapTime = now; return false;
}
C.addEventListener('mousedown', e => { if (!handleDown(e, () => ({x:e.clientX, y:e.clientY}))) startDrag(e); });
C.addEventListener('mousemove', moveDrag);
C.addEventListener('mouseup', endDrag);
C.addEventListener('mouseleave', endDrag);
C.addEventListener('touchstart', e => {
  if (handleDown(e, () => getPos(e))) { e.preventDefault(); return; } startDrag(e);
}, {passive: false});
C.addEventListener('touchmove', moveDrag, {passive: false});
C.addEventListener('touchend', endDrag);
C.addEventListener('dblclick', e => { const b = hitTest(e.clientX, e.clientY); if (b) openEdit(b); });
C.addEventListener('contextmenu', e => { e.preventDefault(); const b = hitTest(e.clientX, e.clientY); if (b) deleteBlock(b); });

// --- Edit overlay ---
function openEdit(b) {
  editBlock = b;
  $('editInput').value = b.title;
  $('editDue').value = b.due || '';
  document.querySelectorAll('#editBox .tagdot').forEach(d =>
    d.classList.toggle('sel', b.tags && b.tags.includes(+d.dataset.tag)));
  $('editOverlay').classList.add('open');
  setTimeout(() => $('editInput').focus(), 50);
}
document.querySelectorAll('#editBox .tagdot').forEach(d =>
  d.addEventListener('click', () => d.classList.toggle('sel')));

$('editSave').onclick = () => {
  if (editBlock) {
    editBlock.title = $('editInput').value.trim() || editBlock.title;
    editBlock.due = $('editDue').value || null;
    const tags = [];
    document.querySelectorAll('#editBox .tagdot.sel').forEach(d => tags.push(+d.dataset.tag));
    editBlock.tags = tags.slice(0, 3); save();
  }
  $('editOverlay').classList.remove('open'); editBlock = null;
};
$('editDel').onclick = () => {
  if (editBlock) deleteBlock(editBlock);
  $('editOverlay').classList.remove('open'); editBlock = null;
};
$('editCancel').onclick = () => { $('editOverlay').classList.remove('open'); editBlock = null; };
$('editInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('editSave').click();
  if (e.key === 'Escape') $('editCancel').click();
});
$('editOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) $('editCancel').click(); });

// --- Add form ---
$('btnAdd').onclick = () => {

};
$('taskSubmit').onclick = () => {

  addBlock(t, $('taskPriority').value, +$('taskSize').value, $('taskDue').value || null);
  $('taskTitle').value = ''; $('taskDue').value = '';
  addFormOpen = false; $('addform').classList.remove('open');
};
$('taskTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('taskSubmit').click();
  if (e.key === 'Escape') { addFormOpen = false; $('addform').classList.remove('open'); }
});

// --- Fun buttons ---
$('btnShake').onclick = () => {
  blocks.forEach(b => {
    b.sleeping = false; b.vy = -6 - Math.random()*8;
    b.vx = (Math.random()-.5)*12; b.angVel = (Math.random()-.5)*0.2;
  });
  shake.x = 12; shake.y = 8; snd('rumble');
};

$('btnExplode').onclick = () => {
  const done = blocks.filter(b => getZone(b.x+b.w/2) === 2);
  done.forEach(b => spawnParts(b, 35, 'confetti'));
  blocks = blocks.filter(b => getZone(b.x+b.w/2) !== 2);
  if (done.length) { snd('shatter'); shake.x = 8; shake.y = 5; }
  save();
};

const TNAMES = ['Fix bug','Write tests','Code review','Deploy','Design UI','Refactor','Meeting',
  'Write docs','Plan sprint','API work','Optimize','Research','Prototype','Ship it','Debug',
  'Update deps','Add logging','Setup CI','Write RFC','User testing','Coffee break','Reply emails'];

$('btnSort').onclick = () => {
  snd('chime');
  const sorted = [...blocks].sort((a,b) => (PRI_ORD[a.color]??4) - (PRI_ORD[b.color]??4));
  let cx = 6, cy = H - BOT;
  sorted.forEach(b => {
    b.sleeping = false;
    if (cx + b.w + 6 > W) { cx = 6; cy -= 58; }
    b.vx = (cx - b.x) * 0.12; b.vy = (cy - b.h - 6 - b.y) * 0.08 - 3;
    b.angVel = -b.angle * 0.2; cx += b.w + 6;
  });
};

$('btnFlip').onclick = () => {
  if (flipTimer) return;
  gravDir = -1;
  blocks.forEach(b => { b.sleeping = false; b.angVel = (Math.random()-.5)*0.15; });
  snd('rumble');
  flipTimer = setTimeout(() => {
    gravDir = 1; blocks.forEach(b => b.sleeping = false); snd('rumble'); flipTimer = null;
  }, 2500);
};

$('btnTornado').onclick = () => {
  tornadoUntil = Date.now() + 3000;
  blocks.forEach(b => b.sleeping = false); snd('rumble');
};

$('btnRandom').onclick = () => {
  blocks.forEach(b => {
    b.sleeping = false; b.x = 20+Math.random()*(W-80); b.y = TOP+10+Math.random()*40;
    b.vx = (Math.random()-.5)*6; b.vy = Math.random()*4; b.angVel = (Math.random()-.5)*0.2;
  });
  snd('pop');
};

$('btnStack').onclick = () => {
  snd('chime'); const cx = W/2; let cy = H - BOT;
  blocks.forEach(b => {
    b.sleeping = false; cy -= b.h + 2;
    b.vx = (cx - b.w/2 - b.x) * 0.15; b.vy = (cy - b.y) * 0.1 - 2;
    b.angVel = -b.angle * 0.3;
  });
};

$('btnNuke').onclick = () => {
  blocks.forEach(b => {
    b.sleeping = false;
    const dx = (b.x+b.w/2) - W/2, dy = (b.y+b.h/2) - H/2;
    const d = Math.sqrt(dx*dx+dy*dy) + 1;
    b.vx += dx/d*20; b.vy += dy/d*20 - 5;
    b.angVel += (Math.random()-.5)*0.5; spawnParts(b, 15);
  });
  nukeFlash = 0.8; shake.x = 20; shake.y = 15; snd('shatter');
  for (let i = 0; i < 60; i++)
    parts.push({ x: W/2, y: H/2, vx: (Math.random()-.5)*20, vy: (Math.random()-.5)*20,
      life: 1.2, color: ['#ef4444','#f97316','#f7c948','#fff'][Math.random()*4|0],
      size: 3+Math.random()*8, rot: Math.random()*6.28, type: 'confetti', rs: (Math.random()-.5)*0.4 });
};

$('btnFreeze').onclick = () => {
  frozenUntil = Date.now() + 3000;
  blocks.forEach(b => { b.sleeping = true; b.vx = 0; b.vy = 0; b.angVel = 0; });
  snd('tap');
};

$('btnZap').onclick = () => {
  if (!blocks.length) return;
  const t = blocks[Math.random()*blocks.length|0]; snd('zap');
  for (let i = 0; i < 20; i++)
    parts.push({ x: t.x+t.w/2, y: t.y, vx: (Math.random()-.5)*3, vy: -Math.random()*8,
      life: 0.8, color: '#fef08a', size: 2+Math.random()*4, rot: 0, type: 'sparkle', rs: 0.3 });
  if (t.sizeIdx > 0) {
    const ns = t.sizeIdx - 1;
    const b1 = addBlock(t.title+' (1)', t.color, ns);
    b1.x = t.x-10; b1.y = t.y; b1.vx = -3; b1.vy = -4; b1.angVel = -0.1;
    const b2 = addBlock(t.title+' (2)', t.color, ns);
    b2.x = t.x+10; b2.y = t.y; b2.vx = 3; b2.vy = -4; b2.angVel = 0.1;
    blocks = blocks.filter(b => b !== t); save();
  } else {
    t.sleeping = false; t.vy = -12; t.vx = (Math.random()-.5)*10;
    t.angVel = (Math.random()-.5)*0.3; spawnParts(t, 15);
  }
};

$('btnBlackHole').onclick = () => {
  bhPos = {x: W/2, y: (TOP+H-BOT)/2}; bhUntil = Date.now() + 3000;
  blocks.forEach(b => b.sleeping = false); snd('rumble');
};

$('btnBouncy').onclick = () => {
  bouncyMode = !bouncyMode;
  $('btnBouncy').classList.toggle('active', bouncyMode);
  if (bouncyMode) { iceMode = false; $('btnIce').classList.remove('active'); }
  blocks.forEach(b => b.sleeping = false);
};

$('btnIce').onclick = () => {
  iceMode = !iceMode;
  $('btnIce').classList.toggle('active', iceMode);
  if (iceMode) { bouncyMode = false; $('btnBouncy').classList.remove('active'); }
  blocks.forEach(b => b.sleeping = false);
};

// --- Search ---
$('btnSearch').onclick = () => {
  searchOpen = !searchOpen;
  $('searchBar').classList.toggle('open', searchOpen);
  if (searchOpen) { setTimeout(() => $('searchInput').focus(), 50); TOP = 80; }
  else { searchTerm = ''; $('searchInput').value = ''; TOP = 44; }
};
$('searchInput').addEventListener('input', e => searchTerm = e.target.value);
$('searchClose').onclick = () => {
  searchOpen = false; searchTerm = ''; $('searchInput').value = '';
  $('searchBar').classList.remove('open'); TOP = 44;
};

// --- Stats panel ---
$('btnStats').onclick = () => {
  statsOpen = !statsOpen;
  $('statsPanel').classList.toggle('open', statsOpen);
  if (statsOpen) updateStats();
};

function updateStats() {
  const zc = [0,0,0]; blocks.forEach(b => zc[getZone(b.x+b.w/2)]++);
  const dc = Object.keys(doingTimers).length;
  let avg = '--';
  if (dc > 0) {
    const now = Date.now();
    const tot = Object.values(doingTimers).reduce((s,t) => s+now-t, 0);
    const a = Math.floor(tot/dc/1000); avg = Math.floor(a/60)+'m '+a%60+'s';
  }
  const cr = blocks.length > 0 ? Math.round(zc[2]/blocks.length*100)+'%' : '--';
  $('statsContent').innerHTML =
    [['Total',blocks.length],['TO DO',zc[0]],['DOING',zc[1]],['DONE',zc[2]],
     ['Avg DOING',avg],['Done rate',cr],['Today',doneToday]]
    .map(([k,v]) => `<div class="stat"><span>${k}</span><span>${v}</span></div>`).join('');
  // Productivity chart
  const cc = $('chartCanvas'), cx2 = cc.getContext('2d');
  cx2.clearRect(0, 0, 190, 60);
  const h = history.slice(-7); if (h.length < 1) return;
  const mx = Math.max(1, ...h.map(e => e.count)), bw = 190/h.length - 4;
  h.forEach((e, i) => {
    const bh = Math.max(2, e.count/mx * 48);
    cx2.fillStyle = 'rgba(74,222,128,0.5)';
    cx2.fillRect(i*(bw+4)+2, 58-bh, bw, bh);
    cx2.fillStyle = 'rgba(255,255,255,0.3)'; cx2.font = '7px system-ui'; cx2.textAlign = 'center';
    cx2.fillText(e.count, i*(bw+4)+2+bw/2, 56-bh);
  });
}

// --- Undo & Export ---
$('btnUndo').onclick = () => {
  if (!deletedStack.length) return;
  const d = deletedStack.pop();
  const b = mkBlock(d.title, d.color, d.sizeIdx, d.x, d.y, d.due, d.tags);
  b.vy = -4; b.sleeping = false; blocks.push(b); snd('pop'); save();
};

$('btnExport').onclick = () => {
  let t = 'PHYSICS TASKS EXPORT\n' + new Date().toLocaleDateString() + '\n\n';
  for (let i = 0; i < 3; i++) {
    const zb = blocks.filter(b => getZone(b.x+b.w/2) === i);
    t += '=== ' + ZN[i] + ' (' + zb.length + ') ===\n';
    zb.forEach(b => t += '  - ' + b.title + (b.due ? ' [due: '+b.due+']' : '') + '\n');
    t += '\n';
  }
  navigator.clipboard.writeText(t).then(() => snd('chime')).catch(() => {});
};

// --- Tutorial ---
if (!localStorage.getItem('ptut-seen'))
  setTimeout(() => $('tutorial').classList.add('show'), 500);
$('tutClose').onclick = () => {
  $('tutorial').classList.remove('show');
  localStorage.setItem('ptut-seen', '1');
};

// --- Persistence ---
function save() {
  const d = blocks.map(b => ({
    id:b.id, title:b.title, color:b.color, sizeIdx:b.sizeIdx,
    x:b.x, y:b.y, due:b.due, tags:b.tags, rot:b.rot
  }));
  try { localStorage.setItem('physics-tasks', JSON.stringify(d)); } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('physics-tasks'));
    if (d && Array.isArray(d)) blocks = d.map(s => {
      const b = mkBlock(s.title, s.color, s.sizeIdx, s.x, s.y, s.due, s.tags);
      b.id = s.id; b.sleeping = true;
      b.rot = s.rot || (Math.random()-.5)*0.12;
      b.prevZone = getZone(b.x + b.w/2);
      return b;
    });
  } catch(e) {}
  try {
    const h = JSON.parse(localStorage.getItem('pt-history'));
    if (h && Array.isArray(h)) history = h;
    const today = new Date().toISOString().slice(0,10);
    const e = history.find(e => e.date === today);
    if (e) doneToday = e.count;
  } catch(e) {}
}

function saveHist() {
  const today = new Date().toISOString().slice(0,10);
  let e = history.find(e => e.date === today);
  if (e) e.count = doneToday;
  else history.push({date: today, count: doneToday});
  if (history.length > 30) history = history.slice(-30);
  try { localStorage.setItem('pt-history', JSON.stringify(history)); } catch(e) {}
}

load();

// --- Main loop ---
let lastSave = 0;
function loop() {
  frame++;
  updatePhysics();
  updateDoingTimers();
  draw();
  updateCounts();
  if (Date.now() - lastSave > 3000) { save(); lastSave = Date.now(); }
  if (statsOpen && frame % 60 === 0) updateStats();
  requestAnimationFrame(loop);
}
loop();
</script>
