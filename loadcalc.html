<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Structural Load Visualizer</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:900px;margin:auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:20px;margin:8px 0 12px;display:flex;align-items:center;gap:8px}h1 span{font-size:24px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.controls label{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:13px;display:flex;align-items:center;gap:6px}
.controls select,.controls input{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:13px;width:70px}
.controls select{width:auto}
canvas{width:100%;border-radius:8px;background:var(--bg2);border:1px solid var(--border);display:block;cursor:crosshair;touch-action:none}
.info{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.info div{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;flex:1;min-width:120px}
.info div b{color:var(--accent);font-size:15px}
.legend{font-size:12px;color:var(--dim);margin-top:8px;text-align:center}
</style></head><body>
<a class="home" href="index.html">&larr; home</a>
<h1><span>🏗️</span> Structural Load Visualizer</h1>
<div class="controls">
<label>Beam <input id="bLen" type="number" value="10" min="2" max="30" step="1">m</label>
<label>Type <select id="bType"><option value="simple">Simply Supported</option><option value="cantilever">Cantilever</option></select></label>
<label>Load <select id="lType"><option value="point">Point Load</option><option value="dist">Distributed</option></select></label>
<label>Magnitude <input id="lMag" type="number" value="10" min="1" max="200" step="1">kN</label>
</div>
<canvas id="cv"></canvas>
<div class="info"><div>Left Reaction<br><b id="rL">0 kN</b></div><div>Right Reaction<br><b id="rR">0 kN</b></div><div>Max Shear<br><b id="mS">0 kN</b></div><div>Max Moment<br><b id="mM">0 kN·m</b></div></div>
<div class="legend">Click on beam to place loads. Tap existing loads to remove. Colors: <span style="color:var(--green)">■</span> safe <span style="color:#facc15">■</span> caution <span style="color:#ef4444">■</span> overloaded</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let loads=[],W,H,beamY,px;
const $=id=>document.getElementById(id);
function resize(){const r=cv.getBoundingClientRect();cv.width=r.width*devicePixelRatio;cv.height=Math.min(420,r.width*0.55)*devicePixelRatio;
ctx.scale(devicePixelRatio,devicePixelRatio);W=r.width;H=cv.height/devicePixelRatio;beamY=H*0.38;cv.style.height=H+'px'}
function bLen(){return+$('bLen').value}
function margin(){return 50}
function xToCanvas(x){return margin()+x/bLen()*(W-2*margin())}
function canvasToX(cx){return Math.max(0,Math.min(bLen(),(cx-margin())/(W-2*margin())*bLen()))}
function getReactions(){const L=bLen(),type=$('bType').value;let rL=0,rR=0;
if(type==='simple'){let totalF=0,totalM=0;
loads.forEach(ld=>{if(ld.t==='point'){totalF+=ld.f;totalM+=ld.f*ld.x}else{const w=ld.f,a=ld.x,b=Math.min(ld.x2||ld.x+2,L);totalF+=w*(b-a);totalM+=w*(b-a)*(a+b)/2}});
rR=totalM/L;rL=totalF-rR}
else{loads.forEach(ld=>{if(ld.t==='point'){rL+=ld.f}else{const w=ld.f,a=ld.x,b=Math.min(ld.x2||ld.x+2,L);rL+=w*(b-a)}})}
return{rL,rR}}
function shearAt(x){const type=$('bType').value;const{rL}=getReactions();let V=type==='simple'?rL:rL;
loads.forEach(ld=>{if(ld.t==='point'&&ld.x<=x)V-=ld.f;
else if(ld.t==='dist'){const a=ld.x,b=ld.x2||ld.x+2,w=ld.f;if(x>=b)V-=w*(b-a);else if(x>a)V-=w*(x-a)}});return V}
function momentAt(x){const type=$('bType').value;const{rL}=getReactions();let M=type==='simple'?rL*x:0;
if(type==='cantilever'){loads.forEach(ld=>{if(ld.t==='point'){M-=ld.f*(x>ld.x?x-ld.x:0);M+=ld.f*0}else{const a=ld.x,b=ld.x2||ld.x+2,w=ld.f;if(x>=b)M-=w*(b-a)*(x-(a+b)/2);else if(x>a)M-=w*(x-a)*(x-a)/2}});
loads.forEach(ld=>{if(ld.t==='point')M+=ld.f*(bLen()-ld.x);else{const a=ld.x,b=ld.x2||ld.x+2,w=ld.f;M+=w*(b-a)*(bLen()-(a+b)/2)}});return M}
loads.forEach(ld=>{if(ld.t==='point'&&ld.x<=x)M-=ld.f*(x-ld.x);
else if(ld.t==='dist'){const a=ld.x,b=ld.x2||ld.x+2,w=ld.f;if(x>=b)M-=w*(b-a)*(x-(a+b)/2);else if(x>a)M-=w*(x-a)*(x-a)/2}});return M}
function stressColor(ratio){if(ratio<0.5)return'#4ade80';if(ratio<0.8)return'#facc15';return'#ef4444'}
function draw(){ctx.clearRect(0,0,W,H);const L=bLen(),type=$('bType').value;const x1=xToCanvas(0),x2=xToCanvas(L);
const{rL,rR}=getReactions();
// beam shadow
ctx.fillStyle='rgba(255,107,53,0.05)';ctx.fillRect(x1,beamY-2,x2-x1,4);
// supports
ctx.fillStyle=var_accent='#ff6b35';
if(type==='simple'){drawTriangle(x1,beamY+4,12);drawTriangle(x2,beamY+4,12)}
else{ctx.fillRect(x1-3,beamY,6,30);for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x1-8,beamY+8+i*7);ctx.lineTo(x1+8,beamY+15+i*7);ctx.strokeStyle='#ff6b35';ctx.lineWidth=1.5;ctx.stroke()}}
// beam
ctx.strokeStyle='#888';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(x1,beamY);ctx.lineTo(x2,beamY);ctx.stroke();
// deflection curve
let maxM=1;for(let i=0;i<=40;i++){const mx=Math.abs(momentAt(i/40*L));if(mx>maxM)maxM=mx}
ctx.beginPath();const defScale=Math.min(60,60*maxM/100);
for(let i=0;i<=80;i++){const xp=i/80*L,cx=xToCanvas(xp),m=momentAt(xp);
const dy=m/maxM*defScale;const cy=beamY+dy;
if(i===0)ctx.moveTo(cx,cy);else ctx.lineTo(cx,cy)}
ctx.strokeStyle='rgba(74,222,128,0.4)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
// stress gradient on beam
for(let i=0;i<80;i++){const xp=i/80*L,cx=xToCanvas(xp),nx=xToCanvas((i+1)/80*L);
const ratio=Math.min(1,Math.abs(momentAt(xp))/Math.max(maxM,1));
ctx.fillStyle=stressColor(ratio);ctx.fillRect(cx,beamY-4,nx-cx+1,8)}
// loads
loads.forEach((ld,idx)=>{if(ld.t==='point'){const cx=xToCanvas(ld.x);
ctx.beginPath();ctx.moveTo(cx,beamY-60);ctx.lineTo(cx,beamY-8);ctx.strokeStyle='#ef4444';ctx.lineWidth=2.5;ctx.stroke();
ctx.beginPath();ctx.moveTo(cx,beamY-8);ctx.lineTo(cx-5,beamY-18);ctx.moveTo(cx,beamY-8);ctx.lineTo(cx+5,beamY-18);ctx.stroke();
ctx.fillStyle='#f0f0f0';ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.fillText(ld.f+'kN',cx,beamY-65)}
else{const ax=xToCanvas(ld.x),bx=xToCanvas(ld.x2||ld.x+2);
ctx.fillStyle='rgba(239,68,68,0.15)';ctx.fillRect(ax,beamY-50,bx-ax,42);
for(let j=ax;j<bx;j+=15){ctx.beginPath();ctx.moveTo(j,beamY-50);ctx.lineTo(j,beamY-8);ctx.strokeStyle='rgba(239,68,68,0.6)';ctx.lineWidth=1;ctx.stroke()}
ctx.fillStyle='#f0f0f0';ctx.font='bold 11px system-ui';ctx.textAlign='center';ctx.fillText(ld.f+'kN/m',(ax+bx)/2,beamY-55)}});
// shear & moment diagrams
const diagramTop=beamY+60,diagramH=50;
ctx.fillStyle='#6e6e73';ctx.font='11px system-ui';ctx.textAlign='left';ctx.fillText('Shear (V)',x1,diagramTop-5);
ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x1,diagramTop+diagramH/2);ctx.lineTo(x2,diagramTop+diagramH/2);ctx.stroke();
let maxV=1;for(let i=0;i<=80;i++){const v=Math.abs(shearAt(i/80*L));if(v>maxV)maxV=v}
ctx.beginPath();for(let i=0;i<=80;i++){const xp=i/80*L,cx=xToCanvas(xp),v=shearAt(xp);
const cy=diagramTop+diagramH/2-v/maxV*(diagramH/2);if(i===0)ctx.moveTo(cx,cy);else ctx.lineTo(cx,cy)}
ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;ctx.stroke();
const mDiagTop=diagramTop+diagramH+30;
ctx.fillStyle='#6e6e73';ctx.fillText('Moment (M)',x1,mDiagTop-5);
ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x1,mDiagTop+diagramH/2);ctx.lineTo(x2,mDiagTop+diagramH/2);ctx.stroke();
ctx.beginPath();for(let i=0;i<=80;i++){const xp=i/80*L,cx=xToCanvas(xp),m=momentAt(xp);
const cy=mDiagTop+diagramH/2-m/maxM*(diagramH/2);if(i===0)ctx.moveTo(cx,cy);else ctx.lineTo(cx,cy)}
ctx.strokeStyle='#c084fc';ctx.lineWidth=2;ctx.stroke();
// reactions
ctx.fillStyle='var(--green)';ctx.font='bold 11px system-ui';ctx.textAlign='center';
ctx.fillStyle='#4ade80';ctx.fillText('R='+rL.toFixed(1)+'kN',x1,beamY+50);
if(type==='simple')ctx.fillText('R='+rR.toFixed(1)+'kN',x2,beamY+50);
// update info
$('rL').textContent=rL.toFixed(1)+' kN';$('rR').textContent=type==='simple'?rR.toFixed(1)+' kN':'N/A (fixed)';
$('mS').textContent=maxV.toFixed(1)+' kN';$('mM').textContent=maxM.toFixed(1)+' kN·m'}
function drawTriangle(cx,cy,s){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx-s/2,cy+s);ctx.lineTo(cx+s/2,cy+s);ctx.closePath();ctx.fill()}
cv.addEventListener('pointerdown',e=>{const r=cv.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
const clickX=canvasToX(mx);
// check if clicking existing load to remove
const idx=loads.findIndex(ld=>{const lx=xToCanvas(ld.x);return Math.abs(mx-lx)<15&&my<beamY});
if(idx>=0){loads.splice(idx,1);draw();return}
if(my>beamY-70&&my<beamY+5){const type=$('lType').value,mag=+$('lMag').value;
if(type==='point')loads.push({t:'point',x:Math.round(clickX*10)/10,f:mag});
else loads.push({t:'dist',x:Math.round(clickX*10)/10,x2:Math.round(Math.min(clickX+2,bLen())*10)/10,f:mag});
draw()}});
['bLen','bType','lType','lMag'].forEach(id=>$(id).addEventListener('change',draw));
window.addEventListener('resize',()=>{resize();draw()});resize();draw();
</script></body></html>
