<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Wrefle</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --bg: #121213;
      --bg-light: #1a1a1b;
      --border: #3a3a3c;
      --text: #ffffff;
      --text-dim: #818384;
      --green: #538d4e;
      --yellow: #b59f3b;
      --gray: #3a3a3c;
      --key-bg: #818384;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); overflow-x: hidden; }
    @keyframes flip { 0% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } 100% { transform: rotateX(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(2px)} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-16px)} 60%{transform:translateY(-8px)} }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
    .flip { animation: flip 0.5s ease; }
    .shake { animation: shake 0.4s ease; }
    .bounce { animation: bounce 0.6s ease; }
    .pop { animation: pop 0.12s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

const COLS = 5;
const ROWS = 7;
const STARTERS = [
  { name: "Nyah", code: "NYAHW" },
  { name: "Keira", code: "KEIRA" },
  { name: "Lily", code: "LILYW" },
  { name: "Jacky", code: "JACKY" },
  { name: "Troy", code: "TROYW" },
];

const ANSWERS = ["CRANE","SLATE","BRAIN","CLOTH","TREND","FROST","GRIND","SWIRL","PLUME","DWELT","CHUNK","BLAZE","DRIFT","STOMP","CRISP","PLANT","SWIFT","CHARM","BRIEF","GLYPH","WALTZ","PERCH","STORK","QUILT","RELIC","BUDGE","VIGOR","JEWEL","PSALM","MIRTH","BLUNT","CRAVE","SHRUG","GRASP","STUMP","FROWN","CLASP","WHIRL","PLUCK","SPURN","CLEFT","GRILL","BRISK","KNELT","FLASK","SHOVE","CRUST","FLINT","QUIRK","SCALP","TROUT","PLAID","BRAWL","DOUGH","WRIST","CLOAK","GRAPH","SWORN","GLEAM","BLINK","SHRUB","BRUNT","CLAMP","SWEPT","GRIEF","PLUMB","SKIRT","FLUSH","CRIMP","STRUT","VAULT","PRISM","SNARE","GLINT","CLUMP","SCALD","BLURT","SKIMP","CREPT","TWIRL","GRAFT","FLUNK","BLISS","SPRIG","PLUNK","STAMP","STALE","BRACE","GLOBE","SCOWL","FLAIR","TRYST","HASTE","KNACK","PATCH","WATCH","BEACH","REACH","TEACH","CRASH","FLASH","STASH","TRASH","BRUSH","CRUSH","BLUSH","SMITH","FAITH","NORTH","SOUTH","YOUTH","MOUTH","NIGHT","LIGHT","FIGHT","MIGHT","SIGHT","RIGHT","TIGHT","THINK","DRINK","STINK","BLANK","THANK","FRANK","CRANK","DRANK","PLANK","SPELL","SWELL","DWELL","KNEEL","STEEL","WHEEL","SHELL","SMELL","SMALL","STALL","SKULL","STILL","SKILL","SPILL","DRILL","CHILL","CORAL","MORAL","TOTAL","ROYAL","LOYAL","FINAL","VITAL","MEDAL","METAL","PETAL","LEGAL","REGAL","VOCAL","LOCAL","FOCAL","NAIVE","OLIVE","ALIVE","SHAVE","BRAVE","GRAVE","DROVE","STOVE","GROVE","PROVE","ABOVE","GLOVE","NERVE","SERVE","CURVE","NURSE","HORSE","FORCE","GRACE","PLACE","SPACE","TRACE","DANCE","FENCE","SINCE","JUICE","VOICE","PRICE","TWICE","SPICE","SLICE","PRIDE","GLIDE","GUIDE","TRIBE","PRIME","CRIME","SPINE","SHINE","STONE","PHONE","DRONE","CLONE","FRAME","BLAME","FLAME","SHAME","SHARE","STARE","GLARE","SPARE","SNARE","SCARE","SCORE","STORE","SHORE","SNORE","ADORE","WHOLE","STEAL","STEAM","DREAM","CREAM","SWEAR","CLEAR","BREAD","DREAD","TREAD","SNEAK","HEART","SMART","START","CHART","CRAFT","DRAFT","SHAFT","GRANT","CHANT","SLANT","GIANT","PAINT","FAINT","SAINT","POINT","PRINT","FLINT","FRONT","BLUNT","STUNT","GRUNT","MOUNT","COUNT","SHOUT","SCOUT","CLOUD","PROUD","FOUND","SOUND","ROUND","BOUND","WOUND","MOUND","CROWD","POWER","TOWER","LOWER","COVER","HOVER","RIVER","FEVER","LEVER","NEVER","ANGER","UNDER","OUTER","AFTER","WATER","LATER","PAPER","SUPER","OTHER"];
const DICT = new Set([...ANSWERS, ...STARTERS.map(function(s) { return s.code; })]);

function pickAnswer() { return ANSWERS[Math.floor(Math.random() * ANSWERS.length)]; }

function loadStats() {
  try { return JSON.parse(localStorage.getItem("wrefle-stats")) || { played: 0, won: 0, streak: 0, maxStreak: 0 }; }
  catch(e) { return { played: 0, won: 0, streak: 0, maxStreak: 0 }; }
}
function saveStats(s) { localStorage.setItem("wrefle-stats", JSON.stringify(s)); }

var audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, type, vol) {
  try {
    var ctx = getAudio();
    var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.type = type || "sine"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.06, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function sndType() { playTone(880, 0.04, "square", 0.03); }
function sndFlip(i) { playTone(300 + i * 60, 0.12, "triangle", 0.05); }
function sndWin() { [523,659,784,1047].forEach(function(f,i) { setTimeout(function() { playTone(f, 0.25, "sine", 0.08); }, i * 100); }); }
function sndLose() { [300,250,200].forEach(function(f,i) { setTimeout(function() { playTone(f, 0.3, "sawtooth", 0.04); }, i * 180); }); }
function sndError() { playTone(150, 0.15, "square", 0.05); }

function fetchGif(tag) {
  return fetch("https://api.giphy.com/v1/gifs/random?api_key=dc6zaTOxFJmzC&tag=" + encodeURIComponent(tag) + "&rating=g")
    .then(function(r) { return r.json(); })
    .then(function(data) { return (data.data && data.data.images && data.data.images.fixed_height) ? data.data.images.fixed_height.url : null; })
    .catch(function() { return null; });
}

function getColor(letter, idx, answer) {
  if (answer[idx] === letter) return "var(--green)";
  if (answer.includes(letter)) return "var(--yellow)";
  return "var(--gray)";
}

function Jackson(props) {
  var faces = { neutral: "\u{1F63A}", happy: "\u{1F638}", sad: "\u{1F63F}", love: "\u{1F63B}", think: "\u{1F431}" };
  return <span style={{ fontSize: props.size || "2rem" }}>{faces[props.mood] || faces.neutral}</span>;
}

function PickerScreen(props) {
  var stats = props.stats;
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "1.5rem", gap: "1rem" }}>
      <Jackson mood="love" size="2.5rem" />
      <div style={{ fontFamily: "var(--font-mono)", fontSize: "clamp(1.8rem,8vw,2.4rem)", fontWeight: 700, letterSpacing: "0.1em" }}>WREFLE</div>
      <div style={{ fontSize: "0.8rem", color: "var(--text-dim)", maxWidth: 300, textAlign: "center", lineHeight: 1.5 }}>
        Pick your starter word — it locks in as guess #1. Then find the 5-letter word!
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%", maxWidth: 260 }}>
        {STARTERS.map(function(s) {
          return (
            <button key={s.code} onClick={function() { sndType(); props.onPick(s); }} style={{ background: "var(--bg-light)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 14px", color: "var(--text)", fontFamily: "var(--font-mono)", fontSize: "1rem", fontWeight: 600, letterSpacing: "0.15em", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span>{s.code}</span>
              <span style={{ fontSize: "0.7rem", color: "var(--text-dim)", fontWeight: 400 }}>{s.name}</span>
            </button>
          );
        })}
      </div>
      {stats.played > 0 && (
        <div style={{ marginTop: 12, background: "var(--bg-light)", border: "1px solid var(--border)", borderRadius: 8, padding: "10px 16px", display: "flex", gap: 16, fontSize: "0.72rem", fontFamily: "var(--font-mono)", color: "var(--text-dim)" }}>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1.2rem", color: "var(--text)", fontWeight: 700 }}>{stats.played}</div>Played</div>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1.2rem", color: "var(--text)", fontWeight: 700 }}>{stats.played ? Math.round(stats.won / stats.played * 100) : 0}%</div>Win</div>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1.2rem", color: "var(--text)", fontWeight: 700 }}>{stats.streak}</div>Streak</div>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1.2rem", color: "var(--green)", fontWeight: 700 }}>{stats.maxStreak}</div>Best</div>
        </div>
      )}
    </div>
  );
}

function Game(props) {
  var starter = props.starter;
  var stats = props.stats;
  var answerRef = React.useRef(pickAnswer());
  var answer = answerRef.current;
  var [guesses, setGuesses] = useState([starter.code]);
  var [current, setCurrent] = useState("");
  var [gameOver, setGameOver] = useState(false);
  var [message, setMessage] = useState("");
  var [shakeRow, setShakeRow] = useState(-1);
  var [flipRow, setFlipRow] = useState(-1);
  var [bounceRow, setBounceRow] = useState(-1);
  var [catMood, setCatMood] = useState("neutral");
  var [gif, setGif] = useState(null);
  var [showStats, setShowStats] = useState(false);

  useEffect(function() {
    if (starter.code === answer) {
      setGameOver(true); setMessage("No way! First try!"); setCatMood("happy"); sndWin();
      var s = { played: stats.played + 1, won: stats.won + 1, streak: stats.streak + 1, maxStreak: Math.max(stats.maxStreak, stats.streak + 1) };
      saveStats(s); setShowStats(true);
      fetchGif("excited cat").then(setGif);
    } else {
      setFlipRow(0);
      for (var i = 0; i < 5; i++) (function(j) { setTimeout(function() { sndFlip(j); }, j * 70); })(i);
    }
  }, []);

  var submit = function() {
    if (current.length !== 5) { setShakeRow(guesses.length); sndError(); setTimeout(function() { setShakeRow(-1); }, 400); return; }
    var guess = current.toUpperCase();
    if (!DICT.has(guess)) {
      setMessage("Not in word list"); setShakeRow(guesses.length); sndError();
      setTimeout(function() { setShakeRow(-1); setMessage(""); }, 1200);
      return;
    }
    var next = guesses.concat([guess]);
    setGuesses(next); setCurrent(""); setFlipRow(next.length - 1);
    for (var i = 0; i < 5; i++) (function(j) { setTimeout(function() { sndFlip(j); }, j * 70); })(i);

    if (guess === answer) {
      setTimeout(function() {
        setGameOver(true); setMessage("You got it!"); setCatMood("happy"); setBounceRow(next.length - 1); sndWin();
        var s = { played: stats.played + 1, won: stats.won + 1, streak: stats.streak + 1, maxStreak: Math.max(stats.maxStreak, stats.streak + 1) };
        saveStats(s); setShowStats(true);
        fetchGif("happy cat celebration").then(setGif);
      }, 450);
    } else if (next.length >= ROWS) {
      setTimeout(function() {
        setGameOver(true); setMessage("It was " + answer); setCatMood("sad"); sndLose();
        var s = { played: stats.played + 1, won: stats.won, streak: 0, maxStreak: stats.maxStreak };
        saveStats(s); setShowStats(true);
        fetchGif("sad cat").then(setGif);
      }, 450);
    }
  };

  var onKey = function(key) {
    if (gameOver) return;
    if (key === "ENTER") return submit();
    if (key === "BACKSPACE") return setCurrent(function(c) { return c.slice(0, -1); });
    if (/^[A-Z]$/.test(key) && current.length < 5) { setCurrent(function(c) { return c + key; }); sndType(); }
  };

  useEffect(function() {
    var handler = function(e) {
      if (e.ctrlKey || e.metaKey) return;
      var k = e.key.toUpperCase();
      if (k === "ENTER" || k === "BACKSPACE" || (/^[A-Z]$/.test(k) && k.length === 1)) { e.preventDefault(); onKey(k); }
    };
    window.addEventListener("keydown", handler);
    return function() { window.removeEventListener("keydown", handler); };
  });

  var usedColors = {};
  guesses.forEach(function(g) {
    for (var i = 0; i < 5; i++) {
      if (!g[i]) return;
      var c = getColor(g[i], i, answer);
      var prev = usedColors[g[i]];
      if (c === "var(--green)" || !prev) usedColors[g[i]] = c;
      else if (c === "var(--yellow)" && prev !== "var(--green)") usedColors[g[i]] = c;
    }
  });

  var kbRows = ["QWERTYUIOP".split(""),"ASDFGHJKL".split(""),["ENTER"].concat("ZXCVBNM".split("")).concat(["DEL"])];
  var cellSize = Math.min(52, Math.floor((window.innerWidth - 48) / 5));
  var keyW = Math.min(32, Math.floor((window.innerWidth - 60) / 10));

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", padding: "0.5rem 0.5rem 0", overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", maxWidth: 360, padding: "6px 0", borderBottom: "1px solid var(--border)", marginBottom: 6 }}>
        <Jackson mood={catMood} size="1.4rem" />
        <span style={{ fontFamily: "var(--font-mono)", fontSize: "1.1rem", fontWeight: 700, letterSpacing: "0.08em" }}>WREFLE</span>
        <span style={{ fontSize: "0.6rem", color: "var(--text-dim)", fontFamily: "var(--font-mono)", marginLeft: "auto" }}>{starter.name}</span>
      </div>

      {message && (
        <div style={{ fontFamily: "var(--font-mono)", fontSize: "0.78rem", margin: "4px 0", padding: "4px 12px", background: "var(--bg-light)", border: "1px solid var(--border)", borderRadius: 5, fontWeight: 600 }}>{message}</div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 4, margin: "6px 0" }}>
        {Array.from({ length: ROWS }).map(function(_, row) {
          var guess = guesses[row];
          var isCurrentRow = row === guesses.length && !gameOver;
          return (
            <div key={row} className={shakeRow === row ? "shake" : bounceRow === row ? "bounce" : ""}
              style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 4 }}>
              {Array.from({ length: COLS }).map(function(_, col) {
                var letter = ""; var bg = "transparent"; var border = "2px solid var(--border)";
                if (guess) { letter = guess[col]; bg = getColor(letter, col, answer); border = "2px solid " + bg; }
                else if (isCurrentRow && current[col]) { letter = current[col]; border = "2px solid var(--text-dim)"; }
                return (
                  <div key={col} className={flipRow === row && guess ? "flip" : (isCurrentRow && current.length === col + 1 ? "pop" : "")}
                    style={{ width: cellSize, height: cellSize, display: "flex", alignItems: "center", justifyContent: "center", fontSize: (cellSize * 0.48) + "px", fontWeight: 700, fontFamily: "var(--font-mono)", background: bg, border: border, borderRadius: 4, color: "var(--text)", animationDelay: guess ? (col * 0.07) + "s" : "0s", textTransform: "uppercase" }}>
                    {letter}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {gif && <img src={gif} alt="reaction" style={{ width: 140, height: 100, objectFit: "cover", borderRadius: 8, margin: "6px 0" }} />}

      {showStats && (
        <div style={{ background: "var(--bg-light)", border: "1px solid var(--border)", borderRadius: 8, padding: "8px 14px", margin: "4px 0", display: "flex", gap: 14, fontSize: "0.68rem", fontFamily: "var(--font-mono)", color: "var(--text-dim)" }}>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1rem", color: "var(--text)", fontWeight: 700 }}>{stats.played + 1}</div>Played</div>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1rem", color: "var(--text)", fontWeight: 700 }}>{Math.round((stats.won + (guesses[guesses.length-1] === answer ? 1 : 0)) / (stats.played + 1) * 100)}%</div>Win</div>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1rem", color: "var(--text)", fontWeight: 700 }}>{guesses[guesses.length-1] === answer ? stats.streak + 1 : 0}</div>Streak</div>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: "1rem", color: "var(--green)", fontWeight: 700 }}>{Math.max(stats.maxStreak, guesses[guesses.length-1] === answer ? stats.streak + 1 : 0)}</div>Best</div>
        </div>
      )}

      {gameOver && (
        <button onClick={props.onDone} style={{ margin: "6px 0", background: "var(--green)", border: "none", borderRadius: 6, padding: "10px 24px", color: "#fff", fontFamily: "var(--font-mono)", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer" }}>Play Again</button>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 5, alignItems: "center", marginTop: "auto", paddingBottom: 10 }}>
        {kbRows.map(function(row, ri) {
          return (
            <div key={ri} style={{ display: "flex", gap: 4 }}>
              {row.map(function(k) {
                var isWide = k === "ENTER" || k === "DEL";
                var color = usedColors[k];
                return (
                  <button key={k} onClick={function() { onKey(k === "DEL" ? "BACKSPACE" : k); }}
                    style={{ minWidth: isWide ? keyW * 1.6 : keyW, height: 44, display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 4, fontSize: isWide ? "0.58rem" : "0.76rem", fontWeight: 600, fontFamily: "var(--font-mono)", cursor: "pointer", border: "none", background: color || "var(--key-bg)", color: "var(--text)", padding: "0 3px" }}>
                    {k}
                  </button>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  var [starter, setStarter] = useState(null);
  var [stats, setStats] = useState(loadStats);
  var [key, setKey] = useState(0);

  var reset = function() { setStarter(null); setStats(loadStats()); setKey(function(k) { return k + 1; }); };

  if (!starter) return <PickerScreen onPick={setStarter} stats={stats} />;
  return <Game key={key} starter={starter} onDone={reset} stats={stats} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
// Build: 2026-05-17T${new Date().toISOString()}
  </script>
  <div style="position:fixed;bottom:4px;right:6px;font-size:0.55rem;color:#3a3a3c;font-family:monospace;">build 20260517-1</div>
</body>
</html>
