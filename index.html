<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrefle</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --bg: #121213;
      --bg-light: #1a1a1b;
      --border: #3a3a3c;
      --text: #ffffff;
      --text-dim: #818384;
      --green: #538d4e;
      --yellow: #b59f3b;
      --gray: #3a3a3c;
      --key-bg: #818384;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-sans); overflow-x: hidden; }

    @keyframes flip {
      0% { transform: rotateX(0); }
      50% { transform: rotateX(90deg); }
      100% { transform: rotateX(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(2px); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes catBlink {
      0%, 90%, 100% { clip-path: inset(0 0 0 0); }
      95% { clip-path: inset(30% 0 30% 0); }
    }
    .flip { animation: flip 0.5s ease; }
    .shake { animation: shake 0.4s ease; }
    .bounce { animation: bounce 0.6s ease; }
    .pop { animation: pop 0.15s ease; }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="app.js" type="text/babel" data-type="module"></script>
</body>
</html>
