<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskIAP — Interactive Work Planning</title>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f8f8;
      --color-background-tertiary: #f0f1f2;
      --color-border-secondary: #e0e2e4;
      --color-border-tertiary: #ebedef;
      --color-border-danger: #f5b3b2;
      --color-text-primary: #111316;
      --color-text-secondary: #6b7078;
      --color-text-danger: #c43b3a;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; background: var(--color-background-tertiary); color: var(--color-text-primary); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
    .boot { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    .boot .brand { font-family: var(--font-mono); font-size: 2.4rem; font-weight: 700; letter-spacing: 0.08em; }
    .boot .sub { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--color-text-secondary); }
    .boot .dot { width: 6px; height: 6px; border-radius: 50%; background: #EF9F27; animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    input:focus, button:focus { outline: none; border-color: #854f0b; }
    button { font: inherit; cursor: pointer; }
    button:hover { filter: brightness(0.97); }
  </style>
</head>
<body>
  <div id="root">
    <div class="boot">
      <div class="sub">Interactive Work Planning</div>
      <div class="brand">TASK IAP</div>
      <div class="dot"></div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="app.js" type="text/babel" data-type="module"></script>
</body>
</html>
