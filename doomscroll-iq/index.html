<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0e18">
<meta name="description" content="Doomscroll IQ — infinite scroll, but for your brain. Each swipe: a fact, a word, a concept, a question. Get smarter by accident.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Doomscroll IQ">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,900&family=Newsreader:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2358a6ff'/%3E%3Cstop offset='1' stop-color='%23ffd23f'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='%230a0e18'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Fraunces,Georgia,serif' font-weight='900' font-size='16' fill='url(%23g)'%3EiQ%3C/text%3E%3C/svg%3E">
<title>Doomscroll IQ — infinite scroll, for your brain</title>
<style>
:root{
  --bg:#0a0e18;
  --surface:#131a29;
  --surface-2:#1b2338;
  --text:#e8ecf5;
  --text-2:#b4bccf;
  --dim:#7684a3;
  --dimmer:#4a556e;
  --line:rgba(255,255,255,.08);
  --line-2:rgba(255,255,255,.16);
  --blue:#58a6ff;
  --gold:#ffd23f;
  --mint:#8ee0c4;
  --pink:#ff89c8;
  --violet:#b088ff;
  --peach:#ff9e6b;
  --disp:'Fraunces',Georgia,serif;
  --serif:'Newsreader',Georgia,serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
  --squish:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%;overflow:hidden}
html,body{
  background:#000;color:var(--text);font-family:var(--sans);
  overscroll-behavior:none;overflow:hidden;
  -webkit-font-smoothing:antialiased
}
body{position:fixed;inset:0;width:100%;height:100%}
button,a{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
::selection{background:rgba(88,166,255,.32);color:#fff}

/* Feed — one card per viewport, vertical snap */
.feed{
  position:fixed;inset:0;z-index:1;
  overflow-y:scroll;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scroll-snap-type:y mandatory
}
.card{
  height:100vh;height:100dvh;width:100%;position:relative;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 78px) max(22px,env(safe-area-inset-right)) calc(env(safe-area-inset-bottom) + 96px) max(22px,env(safe-area-inset-left));
  background:
    radial-gradient(90% 40% at 50% 0%, var(--tint,rgba(88,166,255,.14)), transparent 65%),
    radial-gradient(80% 40% at 50% 100%, var(--tint2,rgba(88,166,255,.08)), transparent 65%),
    linear-gradient(180deg,#0f1524 0%,#0a0e18 100%)
}

/* Consistent card content — kicker, anchor, title, body, footer */
.c-inner{
  flex:1;min-height:0;
  display:flex;flex-direction:column;justify-content:center;
  max-width:34rem;margin:0 auto;width:100%;
  animation:c-in .5s var(--ease) both
}
@keyframes c-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.c-kicker{
  display:inline-flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;font-weight:700;
  color:var(--accent,var(--blue));margin-bottom:26px
}
.c-kicker::before{content:"";width:22px;height:1px;background:currentColor;opacity:.7}
.c-kicker .num{color:var(--dim);font-weight:600;letter-spacing:.14em;opacity:.9}

/* Big visual anchor — emoji or big number */
.c-anchor{
  font-family:var(--disp);font-weight:900;line-height:.85;letter-spacing:-.05em;
  color:var(--accent,var(--blue));
  margin-bottom:22px;font-variant-numeric:tabular-nums;
  display:flex;align-items:baseline;gap:14px;flex-wrap:wrap
}
.c-anchor.emoji{font-size:78px;line-height:1;letter-spacing:0}
.c-anchor.num{font-size:clamp(96px,22vw,148px)}
.c-anchor.word{font-family:var(--disp);font-weight:900;font-style:italic;font-size:clamp(48px,12vw,84px);color:var(--text)}
.c-anchor .aside{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-weight:600;letter-spacing:.16em}

/* Title */
.c-title{
  font-family:var(--disp);font-weight:900;letter-spacing:-.028em;line-height:1.02;
  font-size:clamp(28px,6.8vw,40px);color:var(--text);
  margin-bottom:14px;overflow-wrap:anywhere
}
.c-title em{color:var(--accent,var(--blue));font-style:italic}

/* Body — the meat */
.c-body{
  font-family:var(--serif);font-size:17px;line-height:1.55;color:var(--text-2);
  max-width:38ch
}

/* Question card — options list */
.c-options{display:flex;flex-direction:column;gap:8px;margin-top:14px;max-width:38ch}
.c-options button{
  padding:12px 16px;border-radius:14px;text-align:left;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  color:var(--text);font-family:var(--serif);font-size:15.5px;line-height:1.3;
  min-height:48px;cursor:pointer;transition:all .16s var(--ease);
  display:flex;align-items:center;justify-content:space-between;gap:10px
}
.c-options button:hover{background:rgba(255,255,255,.09);border-color:var(--accent,var(--blue))}
.c-options button.right{background:linear-gradient(135deg,rgba(142,224,196,.22),rgba(142,224,196,.06));border-color:var(--mint);color:#fff}
.c-options button.right::after{content:"✓";color:var(--mint);font-weight:900;font-size:18px}
.c-options button.wrong{background:linear-gradient(135deg,rgba(255,137,200,.2),rgba(255,137,200,.06));border-color:var(--pink);color:#fff}
.c-options button.wrong::after{content:"✕";color:var(--pink);font-weight:900;font-size:18px}
.c-options button:disabled{cursor:default}
.c-explain{
  margin-top:16px;padding:12px 14px;border-radius:12px;
  background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.22);
  font-family:var(--serif);font-style:italic;font-size:14.5px;line-height:1.5;color:var(--text-2);
  display:none
}
.c-explain.show{display:block;animation:c-in .3s var(--ease) both}
.c-explain b{color:var(--text);font-style:normal;font-weight:600}

/* Card footer — source attribution + save */
.c-foot{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin-top:24px;flex-shrink:0;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--dim)
}
.c-foot a{color:var(--dim);text-decoration:none;transition:color .14s;display:inline-flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.c-foot a:hover{color:var(--accent,var(--blue))}
.c-foot a::after{content:"↗";font-family:var(--serif);font-weight:400;font-size:14px;opacity:.7}

/* Loading state — spinner instead of content */
.card.loading .c-inner{align-items:center;justify-content:center;text-align:center;gap:16px;flex-direction:column}
.card.loading .c-inner .spin{display:flex;gap:6px}
.card.loading .c-inner .spin span{width:10px;height:10px;border-radius:50%;background:var(--accent,var(--blue));animation:bounce 1.4s ease-in-out infinite;box-shadow:0 0 10px currentColor}
.card.loading .c-inner .spin span:nth-child(2){animation-delay:.15s;background:var(--gold)}
.card.loading .c-inner .spin span:nth-child(3){animation-delay:.3s;background:var(--mint)}
@keyframes bounce{0%,100%{transform:scale(1) translateY(0);opacity:1}50%{transform:scale(1.2) translateY(-6px);opacity:.6}}
.card.loading .c-inner .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;font-weight:600}

/* Kind tints */
.card[data-kind="concept"]  {--accent:var(--blue);   --tint:rgba(88,166,255,.16); --tint2:rgba(88,166,255,.08)}
.card[data-kind="number"]   {--accent:var(--gold);   --tint:rgba(255,210,63,.18);  --tint2:rgba(255,210,63,.08)}
.card[data-kind="word"]     {--accent:var(--mint);   --tint:rgba(142,224,196,.16); --tint2:rgba(142,224,196,.08)}
.card[data-kind="fact"]     {--accent:var(--pink);   --tint:rgba(255,137,200,.14); --tint2:rgba(255,137,200,.06)}
.card[data-kind="question"] {--accent:var(--violet); --tint:rgba(176,136,255,.16); --tint2:rgba(176,136,255,.06)}
.card[data-kind="quote"]    {--accent:var(--peach);  --tint:rgba(255,158,107,.16); --tint2:rgba(255,158,107,.06)}

/* Top nav — just a wordmark + IQ counter */
.top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:calc(env(safe-area-inset-top) + 12px) max(16px,env(safe-area-inset-right)) 14px max(16px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:linear-gradient(180deg,rgba(10,14,24,.9),rgba(10,14,24,.5) 60%,transparent);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  pointer-events:none
}
.top .brand{
  pointer-events:auto;
  display:flex;align-items:center;gap:10px;
  color:var(--text);font-family:var(--disp);font-weight:900;font-size:18px;letter-spacing:-.028em
}
.top .brand .badge{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--gold));
  display:flex;align-items:center;justify-content:center;
  color:#0a0e18;font-family:var(--disp);font-weight:900;font-size:14px;letter-spacing:-.04em;
  box-shadow:0 4px 12px rgba(88,166,255,.4),inset 0 1px 0 rgba(255,255,255,.4)
}
.top .brand em{color:var(--gold);font-style:italic;font-weight:900;letter-spacing:-.04em}
.top .iq{
  pointer-events:auto;
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:100px;
  background:rgba(255,255,255,.06);border:1px solid var(--line-2);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
  color:var(--text);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)
}
.top .iq .n{color:var(--gold);font-family:var(--disp);font-weight:900;font-size:14px;letter-spacing:-.02em}
.top .iq.pop{animation:iq-pop .5s var(--squish)}
@keyframes iq-pop{0%,100%{transform:scale(1)}30%{transform:scale(1.14)}}

/* Bottom bar — save button + saved count */
.bot{
  position:fixed;left:0;right:0;bottom:0;z-index:15;
  padding:0 max(20px,env(safe-area-inset-right)) calc(env(safe-area-inset-bottom) + 18px) max(20px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:center;gap:10px;
  pointer-events:none
}
.bot .btn{
  pointer-events:auto;
  padding:12px 20px 12px 18px;border-radius:100px;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border:1px solid var(--line-2);color:var(--text);
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;
  min-height:44px;cursor:pointer;
  display:inline-flex;align-items:center;gap:10px;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 8px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.14);
  transition:all .16s var(--squish)
}
.bot .btn:hover{transform:translateY(-2px);border-color:var(--accent,var(--blue));color:var(--accent,var(--blue))}
.bot .btn:active{transform:translateY(0) scale(.96)}
.bot .btn.on{background:linear-gradient(180deg,var(--gold),#e6b625);color:#0a0e18;border-color:transparent;box-shadow:0 8px 22px rgba(255,210,63,.4),inset 0 1px 0 rgba(255,255,255,.35)}
.bot .btn .heart{font-size:14px;line-height:1}
.bot .btn .num{padding:2px 8px;border-radius:100px;background:rgba(255,255,255,.2);font-size:10px;color:inherit;font-weight:800}
.bot .btn.on .num{background:rgba(10,14,24,.25);color:#0a0e18}

/* Saved sheet */
.sheet-bg{
  position:fixed;inset:0;z-index:180;background:rgba(10,14,24,.75);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;opacity:0;transition:opacity .2s var(--ease)
}
.sheet-bg.show{display:block;opacity:1}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:190;
  background:linear-gradient(180deg,var(--surface),var(--bg));
  border-top:1px solid var(--line);border-radius:24px 24px 0 0;
  transform:translateY(100%);transition:transform .3s var(--ease);
  display:flex;flex-direction:column;
  max-height:82dvh;
  padding-bottom:calc(env(safe-area-inset-bottom) + 18px);
  box-shadow:0 -20px 60px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08)
}
.sheet.show{transform:none}
.sheet .hdr{
  padding:16px 20px 14px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative
}
.sheet .hdr::before{content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:2px;background:var(--line-2)}
.sheet .hdr h3{font-family:var(--disp);font-weight:900;font-style:italic;font-size:22px;color:var(--text);letter-spacing:-.02em}
.sheet .hdr .close{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.06);color:var(--text);font-size:18px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
.sheet .list{flex:1;overflow-y:auto;padding:12px 16px}
.sheet .item{
  padding:14px 16px;border-radius:14px;margin-bottom:8px;
  background:rgba(255,255,255,.04);border:1px solid var(--line);
  display:flex;gap:12px;align-items:flex-start;position:relative
}
.sheet .item .k{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--gold);
  text-transform:uppercase;font-weight:700;margin-bottom:6px;display:block
}
.sheet .item .txt{font-family:var(--serif);font-size:15px;line-height:1.4;color:var(--text-2);margin-bottom:8px}
.sheet .item .src{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;font-weight:600}
.sheet .item .body{flex:1;min-width:0}
.sheet .item .x{width:28px;height:28px;border-radius:50%;background:transparent;color:var(--dim);font-size:14px;flex-shrink:0;transition:all .12s}
.sheet .item .x:hover{background:rgba(255,137,200,.2);color:var(--pink)}
.sheet .empty{padding:60px 24px;text-align:center;color:var(--dim);font-family:var(--serif);font-style:italic;font-size:15.5px;line-height:1.5}
.sheet .empty::before{content:"🧠";display:block;font-size:36px;margin-bottom:14px;opacity:.7}

/* Hint — one-time swipe hint */
.hint{
  position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 80px);transform:translateX(-50%);
  z-index:12;pointer-events:none;white-space:nowrap;
  padding:8px 16px;border-radius:100px;
  background:rgba(255,255,255,.06);border:1px solid var(--line-2);color:var(--text-2);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;
  backdrop-filter:blur(12px);
  animation:hintfade 3.5s ease-in forwards;opacity:0
}
@keyframes hintfade{0%{opacity:0}12%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* Error state */
.card.err .c-inner{align-items:center;text-align:center}
.card.err .lbl{font-family:var(--disp);font-style:italic;font-weight:900;font-size:24px;color:var(--pink);margin-bottom:8px}
.card.err .msg{font-family:var(--serif);font-size:15px;color:var(--text-2);line-height:1.5;max-width:32ch;margin-bottom:16px}
.card.err .retry{padding:10px 18px;border-radius:100px;background:rgba(255,255,255,.08);border:1px solid var(--line-2);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.card.err .retry:hover{border-color:var(--pink);color:var(--pink)}
</style>
</head>
<body>

<nav class="top">
  <div class="brand"><span class="badge">iQ</span>Doomscroll <em>IQ</em></div>
  <div class="iq" id="iqPill">IQ <span class="n" id="iqN">100</span></div>
</nav>

<div class="feed" id="feed"></div>

<div class="hint" id="hint">↑ swipe · get smarter, involuntarily ↑</div>

<div class="bot">
  <button class="btn" id="saveBtn"><span class="heart">☆</span><span id="saveLbl">Save this</span></button>
  <button class="btn" id="showSaved"><span class="heart">🧠</span>Brain <span class="num" id="savedN">0</span></button>
</div>

<!-- Saved sheet -->
<div class="sheet-bg" id="sheetBg"></div>
<aside class="sheet" id="sheet">
  <div class="hdr">
    <h3>Your brain</h3>
    <button class="close" id="sheetClose">×</button>
  </div>
  <div class="list" id="savedList"></div>
</aside>

<script>
'use strict';

const $ = id => document.getElementById(id);
const rand = a => a[Math.floor(Math.random() * a.length)];
const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const TIMEOUT_MS = 7000;
function fetchJson(url, opts = {}) {
  const ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
  const to = ctrl ? setTimeout(() => ctrl.abort(), TIMEOUT_MS) : null;
  const headers = { accept: 'application/json', ...(opts.headers || {}) };
  return fetch(url, { ...opts, headers, signal: ctrl ? ctrl.signal : undefined })
    .then(r => { if (to) clearTimeout(to); if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
    .catch(e => { if (to) clearTimeout(to); throw e; });
}

/* ═══════════════════════════════════════════════════════
   Content sources — every card is one of these
   ═══════════════════════════════════════════════════════ */

async function makeConcept() {
  const j = await fetchJson('https://en.wikipedia.org/api/rest_v1/page/random/summary');
  if (!j.extract || j.extract.length < 40) throw new Error('too short');
  // Clip extract to first 2 sentences OR ~240 chars
  let body = j.extract;
  const period = body.indexOf('. ', 140);
  if (period > 0 && period < 280) body = body.slice(0, period + 1);
  else body = body.slice(0, 260) + (body.length > 260 ? '…' : '');
  return {
    kind: 'concept',
    kicker: 'A concept',
    title: j.title,
    body,
    source: 'Wikipedia',
    href: (j.content_urls && j.content_urls.desktop && j.content_urls.desktop.page) || `https://en.wikipedia.org/wiki/${encodeURIComponent(j.title.replace(/ /g,'_'))}`,
    anchor: null
  };
}

async function makeFact() {
  const j = await fetchJson('https://uselessfacts.jsph.pl/api/v2/facts/random?language=en');
  return {
    kind: 'fact',
    kicker: 'Did you know',
    title: '',
    body: j.text,
    source: 'Useless Facts',
    href: 'https://uselessfacts.jsph.pl',
    anchor: { emoji: rand(['🌍','🔬','⚗️','🌱','🐙','🪐','🧠','⚡','🐌','🔭','🍞','🕰️','🌌','🦋']) }
  };
}

async function makeQuestion() {
  const j = await fetchJson('https://opentdb.com/api.php?amount=1&type=multiple&encode=url3986');
  const r = j.results && j.results[0];
  if (!r) throw new Error('no question');
  const dec = decodeURIComponent;
  const correct = dec(r.correct_answer);
  const options = [correct, ...r.incorrect_answers.map(dec)].sort(() => Math.random() - .5);
  return {
    kind: 'question',
    kicker: `Trivia · ${dec(r.category)}`,
    title: dec(r.question),
    body: '',
    source: 'Open Trivia DB',
    href: 'https://opentdb.com',
    options, correct,
    anchor: { emoji: '❓' }
  };
}

async function makeWord() {
  const w = (await fetchJson('https://random-word-api.vercel.app/api?words=1'))[0];
  if (!w) throw new Error('no word');
  let entries = [];
  try { entries = await fetchJson('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(w)); }
  catch (e) { /* fallback: word only */ }
  const first = (entries[0] && entries[0].meanings && entries[0].meanings[0]);
  const def = first && first.definitions && first.definitions[0] && first.definitions[0].definition;
  const pos = first && first.partOfSpeech;
  const phon = entries[0] && (entries[0].phonetic || (entries[0].phonetics && entries[0].phonetics[0] && entries[0].phonetics[0].text));
  if (!def) throw new Error('no definition');
  return {
    kind: 'word',
    kicker: pos ? `Word · ${pos}` : 'Word of the moment',
    title: '',
    body: def,
    source: 'Free Dictionary',
    href: `https://en.wiktionary.org/wiki/${encodeURIComponent(w)}`,
    anchor: { word: w, aside: phon || '' }
  };
}

async function makeQuote() {
  // ZenQuotes has occasional CORS hiccups; wrap in try
  const j = await fetchJson('https://api.quotable.io/random');
  if (!j.content) throw new Error('no quote');
  return {
    kind: 'quote',
    kicker: 'They said it',
    title: '',
    body: '“' + j.content + '”',
    source: j.author || 'Anonymous',
    href: 'https://quotable.io',
    anchor: null
  };
}

async function makeNumber() {
  // Numbers API is http-only, so we synthesise from Wikipedia's "years" random.
  // Actually — use an on-this-day style: pick a random year 1600–2020, hit Wikipedia for that year.
  const y = randInt(1600, 2020);
  const j = await fetchJson(`https://en.wikipedia.org/api/rest_v1/page/summary/${y}`);
  const body = (j.extract || '').split('. ').slice(0, 2).join('. ');
  if (!body || body.length < 20) throw new Error('no year extract');
  return {
    kind: 'number',
    kicker: 'A year in numbers',
    title: '',
    body: body + (body.endsWith('.') ? '' : '.'),
    source: 'Wikipedia',
    href: `https://en.wikipedia.org/wiki/${y}`,
    anchor: { num: String(y), aside: 'a year' }
  };
}

const MAKERS = [
  { name:'concept',  fn:makeConcept,  weight:3 },
  { name:'fact',     fn:makeFact,     weight:2 },
  { name:'question', fn:makeQuestion, weight:2 },
  { name:'word',     fn:makeWord,     weight:2 },
  { name:'number',   fn:makeNumber,   weight:1 },
  { name:'quote',    fn:makeQuote,    weight:1 },
];

function pickMaker() {
  const alive = MAKERS.filter(m => !state.dead.has(m.name));
  const pool = alive.length ? alive : MAKERS;
  const bag = [];
  for (const m of pool) for (let i = 0; i < m.weight; i++) bag.push(m);
  return rand(bag);
}

/* ═══════════════════════════════════════════════════════
   State + feed
   ═══════════════════════════════════════════════════════ */
const state = {
  cards: 0,          // total cards revealed (drives IQ counter)
  saved: JSON.parse(localStorage.getItem('diq-saved') || '[]'),
  currentCard: null, // { kind, kicker, title, body, source, href, ... }
  dead: new Set(),   // maker names that failed
};
const FEED = { el:null, currentIndex:0, io:null, busy:false, elements:[] };

async function refill() {
  if (FEED.busy) return;
  FEED.busy = true;
  try {
    const need = Math.max(0, 4 - (FEED.elements.length - FEED.currentIndex));
    for (let i = 0; i < need; i++) {
      const maker = pickMaker();
      const el = appendPending();
      hydrateCard(el, maker);
    }
  } finally { FEED.busy = false; }
}

function appendPending() {
  const el = document.createElement('div');
  el.className = 'card loading';
  el.dataset.kind = 'concept'; // default tint until loaded
  el.innerHTML = `<div class="c-inner"><div class="spin"><span></span><span></span><span></span></div><div class="lbl">summoning a thought…</div></div>`;
  FEED.el.appendChild(el);
  FEED.elements.push(el);
  if (FEED.io) FEED.io.observe(el);
  return el;
}

async function hydrateCard(el, maker) {
  let attempts = 0;
  while (attempts < 2) {
    try {
      const c = await maker.fn();
      renderCard(el, c);
      return;
    } catch (err) {
      attempts++;
      if (attempts >= 2) {
        // This maker is looking dead — mark and try another
        state.dead.add(maker.name);
        const alternative = pickMaker();
        if (alternative.name !== maker.name) {
          try {
            const c = await alternative.fn();
            renderCard(el, c);
            return;
          } catch (_) { /* fall through to error state */ }
        }
        renderError(el);
        return;
      }
    }
  }
}

function renderCard(el, c) {
  el.classList.remove('loading');
  el.dataset.kind = c.kind;
  el.dataset.cardData = ''; // marker
  el._cardData = c;

  let anchorHtml = '';
  if (c.anchor) {
    if (c.anchor.emoji) anchorHtml = `<div class="c-anchor emoji">${esc(c.anchor.emoji)}</div>`;
    else if (c.anchor.num) anchorHtml = `<div class="c-anchor num">${esc(c.anchor.num)}${c.anchor.aside ? `<span class="aside">${esc(c.anchor.aside)}</span>` : ''}</div>`;
    else if (c.anchor.word) anchorHtml = `<div class="c-anchor word">${esc(c.anchor.word)}${c.anchor.aside ? `<span class="aside">${esc(c.anchor.aside)}</span>` : ''}</div>`;
  }

  const titleHtml = c.title ? `<h2 class="c-title">${esc(c.title)}</h2>` : '';
  const bodyHtml = c.body ? `<div class="c-body">${esc(c.body)}</div>` : '';

  let optsHtml = '';
  if (c.kind === 'question' && Array.isArray(c.options)) {
    optsHtml = `<div class="c-options">${c.options.map(o => `<button data-opt="${esc(o)}">${esc(o)}</button>`).join('')}</div>
      <div class="c-explain" data-explain>Answer · <b>${esc(c.correct)}</b></div>`;
  }

  el.innerHTML = `
    <div class="c-inner">
      <div class="c-kicker">${esc(c.kicker)}</div>
      ${anchorHtml}
      ${titleHtml}
      ${bodyHtml}
      ${optsHtml}
      <div class="c-foot">
        <a href="${esc(c.href || '#')}" target="_blank" rel="noopener">via ${esc(c.source)}</a>
        <span>swipe up</span>
      </div>
    </div>`;

  if (c.kind === 'question') {
    const opts = el.querySelectorAll('.c-options button');
    const explain = el.querySelector('[data-explain]');
    opts.forEach(b => b.addEventListener('click', e => {
      e.stopPropagation();
      const chosen = b.dataset.opt;
      opts.forEach(o => {
        o.disabled = true;
        if (o.dataset.opt === c.correct) o.classList.add('right');
      });
      if (chosen !== c.correct) b.classList.add('wrong');
      if (explain) explain.classList.add('show');
    }));
  }
}

function renderError(el) {
  el.classList.remove('loading');
  el.classList.add('err');
  el.dataset.kind = 'fact';
  el._cardData = null;
  el.innerHTML = `
    <div class="c-inner">
      <div class="c-kicker">Hiccup</div>
      <div class="lbl">The internet blinked.</div>
      <div class="msg">Every source we tried returned an error. Might be a blip, might be a content blocker. Swipe up to try another.</div>
      <button class="retry" data-act="retry">Try again</button>
    </div>`;
  el.querySelector('[data-act="retry"]').addEventListener('click', e => {
    e.stopPropagation();
    el.classList.remove('err');
    el.classList.add('loading');
    el.innerHTML = `<div class="c-inner"><div class="spin"><span></span><span></span><span></span></div><div class="lbl">retrying…</div></div>`;
    hydrateCard(el, pickMaker());
  });
}

/* ═══════════════════════════════════════════════════════
   IQ counter · saved list
   ═══════════════════════════════════════════════════════ */
function bumpIQ() {
  state.cards++;
  const iq = 100 + Math.floor(state.cards * 0.5); // gag: +0.5 IQ per card
  const el = $('iqN');
  el.textContent = iq;
  const pill = $('iqPill');
  pill.classList.remove('pop');
  void pill.offsetWidth;
  pill.classList.add('pop');
}

function updateSavedCount() {
  const el = $('savedN');
  el.textContent = state.saved.length;
  const sb = $('saveBtn');
  const c = getCurrentCard();
  const isSaved = c && state.saved.some(x => x.id === c.id);
  sb.classList.toggle('on', isSaved);
  $('saveLbl').textContent = isSaved ? 'Saved' : 'Save this';
  document.querySelector('.bot .btn:first-child .heart').textContent = isSaved ? '★' : '☆';
}
function persistSaved() { try { localStorage.setItem('diq-saved', JSON.stringify(state.saved)); } catch(e) {} }
function saveCurrent() {
  const c = getCurrentCard();
  if (!c) return;
  const id = cardId(c);
  const idx = state.saved.findIndex(x => x.id === id);
  if (idx >= 0) { state.saved.splice(idx, 1); }
  else { state.saved.unshift({ id, ...c, ts: Date.now() }); }
  persistSaved();
  updateSavedCount();
}
function cardId(c) {
  const key = `${c.kind}|${c.title || ''}|${(c.body || '').slice(0, 60)}`;
  let h = 0;
  for (let i = 0; i < key.length; i++) h = (h * 31 + key.charCodeAt(i)) >>> 0;
  return String(h);
}
function getCurrentCard() {
  const el = FEED.elements[FEED.currentIndex];
  if (!el || !el._cardData) return null;
  const c = el._cardData;
  return { ...c, id: cardId(c) };
}
function openSaved() {
  const list = $('savedList');
  if (!state.saved.length) {
    list.innerHTML = `<div class="empty">Nothing saved yet.<br>Tap “Save this” on a card that surprised you.</div>`;
  } else {
    list.innerHTML = state.saved.map(s => `
      <div class="item" data-id="${esc(s.id)}">
        <div class="body">
          <span class="k">${esc(s.kind)}</span>
          ${s.title ? `<div style="font-family:var(--disp);font-weight:900;font-style:italic;font-size:17px;color:var(--text);letter-spacing:-.015em;margin-bottom:6px">${esc(s.title)}</div>` : ''}
          <div class="txt">${esc(s.body || '').slice(0, 260)}${(s.body || '').length > 260 ? '…' : ''}</div>
          <div class="src">via ${esc(s.source || '')}</div>
        </div>
        <button class="x" data-un="${esc(s.id)}" aria-label="Remove">×</button>
      </div>`).join('');
    list.querySelectorAll('.item').forEach(row => {
      row.querySelector('.x').addEventListener('click', e => {
        e.stopPropagation();
        const id = e.currentTarget.dataset.un;
        state.saved = state.saved.filter(x => x.id !== id);
        persistSaved(); updateSavedCount(); openSaved();
      });
    });
  }
  $('sheet').classList.add('show');
  $('sheetBg').classList.add('show');
}
function closeSaved() { $('sheet').classList.remove('show'); $('sheetBg').classList.remove('show'); }

/* ═══════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════ */
async function init() {
  FEED.el = $('feed');
  $('saveBtn').addEventListener('click', saveCurrent);
  $('showSaved').addEventListener('click', openSaved);
  $('sheetClose').addEventListener('click', closeSaved);
  $('sheetBg').addEventListener('click', closeSaved);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSaved(); });

  FEED.io = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting && e.intersectionRatio > 0.6) {
        const idx = FEED.elements.indexOf(e.target);
        if (idx >= 0 && idx !== FEED.currentIndex) {
          FEED.currentIndex = idx;
          bumpIQ();
          updateSavedCount();
          if (idx >= FEED.elements.length - 3) refill();
        }
      }
    }
  }, { root: FEED.el, threshold: [0, 0.6, 1] });

  FEED.el.addEventListener('scroll', () => {
    if (FEED._sch) return;
    FEED._sch = true;
    requestAnimationFrame(() => {
      FEED._sch = false;
      const h = FEED.el.clientHeight || window.innerHeight;
      const approx = Math.floor(FEED.el.scrollTop / h);
      if (approx !== FEED.currentIndex && FEED.elements[approx]) {
        FEED.currentIndex = approx;
        updateSavedCount();
      }
      const ahead = FEED.elements.length - FEED.currentIndex;
      if (ahead < 3) refill();
    });
  }, { passive: true });

  updateSavedCount();
  bumpIQ(); // first card = +IQ
  await refill();
}
init();
</script>
</body>
</html>
