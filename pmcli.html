<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PM CLI — TaskIAP</title>
<style>
:root{--bg:#0a0a0f;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80;--termgreen:#00ff41;--red:#ef4444;--gold:#f7c948;--purple:#a78bfa;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--termgreen);font-family:var(--mono);font-size:14px;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.topbar{padding:6px 16px;background:rgba(10,10,15,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.topbar a{font-size:12px}
.topbar .brand{font-weight:800;font-size:13px;color:var(--accent);letter-spacing:.06em}

.terminal{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:0;scroll-behavior:smooth}
.terminal::-webkit-scrollbar{width:6px}
.terminal::-webkit-scrollbar-track{background:var(--bg)}
.terminal::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
.terminal::-webkit-scrollbar-thumb:hover{background:#444}

.output-line{white-space:pre-wrap;word-break:break-all;line-height:1.5;font-size:13px}
.output-line.cmd{color:#33ff77}
.output-line.error{color:var(--red)}
.output-line.info{color:var(--dim)}
.output-line.accent{color:var(--accent)}
.output-line.gold{color:var(--gold)}
.output-line.purple{color:var(--purple)}
.output-line.green{color:var(--green)}
.output-line.red{color:var(--red)}
.output-line.banner{color:var(--accent);font-weight:bold}

.table-line{white-space:pre;line-height:1.4;font-size:12px;color:var(--termgreen)}
.table-line.header{color:var(--accent);font-weight:bold}
.table-line.sep{color:#1a3a1a}
.table-line.dim{color:var(--dim)}

.input-area{flex-shrink:0;display:flex;align-items:center;padding:8px 16px;border-top:1px solid var(--border);background:rgba(10,10,15,0.98);position:relative}
.prompt{color:var(--accent);font-weight:bold;margin-right:8px;white-space:nowrap;font-size:13px}
.input-area input{flex:1;background:transparent;border:none;outline:none;color:var(--termgreen);font-family:var(--mono);font-size:14px;caret-color:var(--termgreen)}
.input-area input::placeholder{color:#1a4a1a}

.autocomplete{position:absolute;bottom:100%;left:0;right:0;background:#111118;border:1px solid var(--border);border-bottom:none;max-height:200px;overflow-y:auto;display:none;z-index:20}
.autocomplete.show{display:block}
.ac-item{padding:4px 16px;font-size:12px;color:var(--dim);cursor:pointer;display:flex;justify-content:space-between}
.ac-item.active,.ac-item:hover{background:rgba(0,255,65,0.08);color:var(--termgreen)}
.ac-item .desc{color:#444;font-size:11px}

.copy-btn{position:absolute;right:4px;top:-28px;background:#1a1a1c;border:1px solid var(--border);color:var(--dim);font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;display:none;font-family:var(--mono)}
.copy-btn:hover{color:var(--termgreen);border-color:var(--termgreen)}
.copy-btn.show{display:block}

@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.cursor-blink{animation:blink 1s step-end infinite;color:var(--termgreen)}

@keyframes bootFade{from{opacity:0}to{opacity:1}}
.boot-fade{animation:bootFade .3s ease-out}

::selection{background:rgba(0,255,65,0.15);color:var(--termgreen)}

@media(max-width:600px){
  body{font-size:12px}
  .terminal{padding:8px}
  .input-area{padding:8px}
  .table-line,.output-line{font-size:11px}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">&larr; home</a>
  <span class="brand">PM CLI</span>
  <span style="font-size:11px;color:var(--dim)" id="clock"></span>
</div>

<div class="terminal" id="terminal"></div>

<div class="input-area" id="inputArea">
  <div class="autocomplete" id="autocomplete"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyLastOutput()">copy</button>
  <span class="prompt">taskiap&gt;</span>
  <input type="text" id="cmdInput" placeholder="type help for commands..." autocomplete="off" spellcheck="false" autofocus/>
</div>

<script>
/* ── Constants ── */
const VERSION='1.0.0';
const STORAGE_KEYS={
  kanban:'kanban-data',
  risks:'risk-register',
  rfis:'rfi-tracker',
  punchlist:'punchlist-data',
  timeline:'timeline-data',
  estimate:'estimate-projects',
  dailylog:'daily-log-data',
  assumptions:'assumptions-log',
  lessons:'lessons-learned',
  requirements:'requirements-data',
  standup:'standup-data',
  retro:'retro-data',
  materials:'materials-calc',
  bidcompare:'bidcompare-data'
};

const SETTINGS_KEY='pmcli-settings';

/* ── State ── */
let history=[], histIdx=-1, lastOutput='', acIdx=-1, booted=false;
let lastExportData=null;

const term=document.getElementById('terminal');
const input=document.getElementById('cmdInput');
const acEl=document.getElementById('autocomplete');
const copyBtn=document.getElementById('copyBtn');

/* ── Helpers ── */
function esc(s){const d=document.createElement('span');d.textContent=s;return d.innerHTML}
function getData(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null}catch{return null}}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return'—';try{return new Date(d+'T00:00:00').toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'})}catch{return d}}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/(864e5))}
function truncate(s,n){if(!s)return'—';s=String(s);return s.length>n?s.slice(0,n-1)+'…':s}
function padR(s,n){s=String(s!=null?s:'');return s.length>=n?s.slice(0,n):s+' '.repeat(n-s.length)}
function padL(s,n){s=String(s!=null?s:'');return s.length>=n?s.slice(0,n):' '.repeat(n-s.length)+s}

/* ── Output ── */
function print(text,cls){
  const div=document.createElement('div');
  div.className='output-line'+(cls?' '+cls:'');
  div.innerHTML=text;
  term.appendChild(div);
}
function printPre(text,cls){
  const div=document.createElement('div');
  div.className='table-line'+(cls?' '+cls:'');
  div.textContent=text;
  term.appendChild(div);
}
function nl(){print('')}
function scrollBottom(){requestAnimationFrame(()=>{term.scrollTop=term.scrollHeight})}

function printTable(headers,rows,widths){
  if(!rows.length){print('  No data found.','info');return}
  const sep=widths.map(w=>'─'.repeat(w)).join('─┼─');
  const hdr=headers.map((h,i)=>padR(h,widths[i])).join(' │ ');
  printPre('  '+hdr,'header');
  printPre('  '+sep,'sep');
  rows.forEach(row=>{
    const line=row.map((c,i)=>padR(String(c!=null?c:''),widths[i])).join(' │ ');
    printPre('  '+line);
  });
  nl();
  print('  '+rows.length+' record'+(rows.length!==1?'s':''),'info');
}

/* ── Clock ── */
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(updateClock,1000);updateClock();

/* ── Boot Sequence ── */
function boot(){
  const ascii=[
    '  ____  __  __    ____ _     ___',
    ' |  _ \\|  \\/  |  / ___| |   |_ _|',
    ' | |_) | |\\/| | | |   | |    | |',
    ' |  __/| |  | | | |___| |___ | |',
    ' |_|   |_|  |_|  \\____|_____|___|',
  ];

  let lineIdx=0;
  function typeLine(){
    if(lineIdx<ascii.length){
      print(esc(ascii[lineIdx]),'banner');
      lineIdx++;
      scrollBottom();
      setTimeout(typeLine,60);
    }else{
      finishBoot();
    }
  }

  function finishBoot(){
    nl();
    print('  TaskIAP Project Management CLI v'+VERSION,'accent');
    print('  Type <span style="color:var(--termgreen)">help</span> for available commands','info');
    nl();

    let sources=0,records=0;
    Object.entries(STORAGE_KEYS).forEach(([name,key])=>{
      const d=getData(key);
      if(d){
        sources++;
        if(Array.isArray(d))records+=d.length;
        else if(typeof d==='object')records+=Object.keys(d).length;
      }
    });
    print('  Connected to '+sources+' data source'+(sources!==1?'s':'')+' ('+records+' total records)','green');
    nl();
    booted=true;
    scrollBottom();
    input.focus();
  }

  typeLine();
}

/* ── Command Definitions (for autocomplete & help) ── */
const COMMANDS=[
  {cmd:'tasks',desc:'List kanban board tasks',flags:['--status backlog|doing|review|done','--priority high|med|low','--count']},
  {cmd:'risks',desc:'List risk register items',flags:['--open','--critical','--sort score']},
  {cmd:'rfis',desc:'List RFI tracker items',flags:['--open','--overdue']},
  {cmd:'punchlist',desc:'List punch list items',flags:['--open','--critical','--progress']},
  {cmd:'schedule',desc:'Show timeline/schedule tasks',flags:['--critical','--late','--next 7']},
  {cmd:'budget',desc:'Show estimate summary',flags:['--breakdown','--over']},
  {cmd:'dailylog',desc:'Show daily log entries',flags:['--today','--week']},
  {cmd:'assumptions',desc:'List assumptions',flags:['--active','--invalid']},
  {cmd:'lessons',desc:'List lessons learned',flags:['--success']},
  {cmd:'requirements',desc:'List requirements',flags:['--must']},
  {cmd:'standup',desc:'Show standup notes',flags:['--today','--week']},
  {cmd:'retro',desc:'Show retrospective items',flags:[]},
  {cmd:'materials',desc:'Show materials list',flags:[]},
  {cmd:'bids',desc:'Show bid comparison data',flags:[]},
  {cmd:'dashboard',desc:'Project health overview',flags:['--risks','--schedule','--budget']},
  {cmd:'help',desc:'Show available commands',flags:[]},
  {cmd:'clear',desc:'Clear terminal',flags:[]},
  {cmd:'export csv',desc:'Export last view as CSV',flags:[]},
  {cmd:'export json',desc:'Export last view as JSON',flags:[]},
  {cmd:'stats',desc:'Storage statistics',flags:[]},
  {cmd:'version',desc:'Show version info',flags:[]},
];

/* ── Autocomplete ── */
function getCompletions(text){
  text=text.toLowerCase().trim();
  if(!text)return COMMANDS.map(c=>({val:c.cmd,desc:c.desc}));
  const parts=text.split(/\s+/);
  const base=parts[0];

  /* check for export special case */
  if(base==='export'&&parts.length<=2){
    return[{val:'export csv',desc:'Export as CSV'},{val:'export json',desc:'Export as JSON'}].filter(c=>c.val.startsWith(text));
  }

  const cmd=COMMANDS.find(c=>c.cmd===base);
  if(cmd&&parts.length>1){
    const last=parts[parts.length-1];
    if(last.startsWith('-')){
      return cmd.flags.filter(f=>f.startsWith(last)).map(f=>({val:base+' '+f,desc:'flag'}));
    }
    return[];
  }

  return COMMANDS.filter(c=>c.cmd.startsWith(text)).map(c=>({val:c.cmd,desc:c.desc}));
}

function showAC(items){
  if(!items.length){acEl.classList.remove('show');return}
  acIdx=-1;
  acEl.innerHTML=items.map((it,i)=>'<div class="ac-item" data-idx="'+i+'" data-val="'+esc(it.val)+'"><span>'+esc(it.val)+'</span><span class="desc">'+esc(it.desc)+'</span></div>').join('');
  acEl.classList.add('show');
  acEl.querySelectorAll('.ac-item').forEach(el=>{
    el.addEventListener('click',()=>{input.value=el.dataset.val+' ';acEl.classList.remove('show');input.focus()});
  });
}

function hideAC(){acEl.classList.remove('show');acIdx=-1}

/* ── Parse Command ── */
function parseArgs(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0]||'';
  const flags={};
  const args=[];
  for(let i=1;i<parts.length;i++){
    if(parts[i].startsWith('--')){
      const key=parts[i].slice(2);
      if(i+1<parts.length&&!parts[i+1].startsWith('--')){
        flags[key]=parts[i+1];i++;
      }else{
        flags[key]=true;
      }
    }else{
      args.push(parts[i]);
    }
  }
  return{cmd,flags,args};
}

/* ── Command Handlers ── */

function cmdTasks(flags){
  const raw=getData(STORAGE_KEYS.kanban);
  if(!raw||!raw.length){print('  No kanban data found.','info');print('  Populate data at <a href="kanban.html">kanban.html</a>','info');return}
  let items=raw.slice();

  if(flags.status){
    const map={backlog:'backlog',doing:'progress','in-progress':'progress',progress:'progress',review:'review',done:'done'};
    const col=map[flags.status.toLowerCase()]||flags.status.toLowerCase();
    items=items.filter(t=>t.col===col);
  }
  if(flags.priority){
    items=items.filter(t=>t.priority&&t.priority.toLowerCase()===flags.priority.toLowerCase());
  }
  if(flags.count){
    const cols={backlog:0,progress:0,review:0,done:0};
    raw.forEach(t=>{if(cols[t.col]!==undefined)cols[t.col]++});
    print('  Task Counts by Column:','accent');nl();
    Object.entries(cols).forEach(([k,v])=>{
      const bar='█'.repeat(Math.min(v*2,40));
      printPre('  '+padR(k,12)+padL(String(v),4)+' '+bar);
    });
    nl();
    print('  Total: '+raw.length+' tasks','info');
    return;
  }

  const widths=[20,10,8,12];
  const headers=['Title','Column','Priority','Due'];
  const rows=items.map(t=>[truncate(t.title,20),t.col||'—',t.priority||'—',t.due||'—']);
  lastExportData={headers,rows:items};
  printTable(headers,rows,widths);
}

function cmdRisks(flags){
  const raw=getData(STORAGE_KEYS.risks);
  if(!raw||!raw.length){print('  No risk data found.','info');print('  Populate data at <a href="risks.html">risks.html</a>','info');return}
  let items=raw.slice();

  if(flags.open)items=items.filter(r=>r.status==='Open');
  if(flags.critical)items=items.filter(r=>r.score>=15);
  items.sort((a,b)=>(b.score||0)-(a.score||0));

  const widths=[24,10,5,5,6,8];
  const headers=['Description','Category','Lik','Imp','Score','Status'];
  const rows=items.map(r=>[truncate(r.desc,24),r.cat||'—',r.lik,r.imp,r.score,r.status||'—']);
  lastExportData={headers,rows:items};
  printTable(headers,rows,widths);
}

function cmdRfis(flags){
  const raw=getData(STORAGE_KEYS.rfis);
  if(!raw||!raw.length){print('  No RFI data found.','info');print('  Populate data at <a href="rfi.html">rfi.html</a>','info');return}
  let items=raw.slice();

  if(flags.open)items=items.filter(r=>r.status==='Open');
  if(flags.overdue){
    const now=today();
    items=items.filter(r=>r.status==='Open'&&r.dateNeed&&r.dateNeed<now);
  }

  const widths=[6,24,10,12,12,10];
  const headers=['#','Subject','Priority','Submitted','Needed','Status'];
  const rows=items.map(r=>[r.num||'—',truncate(r.subj,24),r.priority||'—',r.dateSubmit||'—',r.dateNeed||'—',r.status||'—']);
  lastExportData={headers,rows:items};
  printTable(headers,rows,widths);
}

function cmdPunchlist(flags){
  const raw=getData(STORAGE_KEYS.punchlist);
  if(!raw||!raw.length){print('  No punch list data found.','info');print('  Populate data at <a href="punchlist.html">punchlist.html</a>','info');return}
  let items=raw.slice();

  if(flags.open)items=items.filter(p=>p.status==='Open');
  if(flags.critical)items=items.filter(p=>p.priority&&p.priority.toLowerCase()==='critical');

  if(flags.progress){
    const total=raw.length;
    const closed=raw.filter(p=>p.status==='Closed'||p.status==='Done'||p.status==='Complete').length;
    const pct=total?Math.round(closed/total*100):0;
    const barLen=30;
    const filled=Math.round(pct/100*barLen);
    const bar='█'.repeat(filled)+'░'.repeat(barLen-filled);
    nl();
    print('  Punch List Progress','accent');nl();
    printPre('  ['+bar+'] '+pct+'%');
    nl();
    print('  '+closed+'/'+total+' items complete','info');
    return;
  }

  const widths=[24,12,10,10,12];
  const headers=['Description','Location','Priority','Status','Date'];
  const rows=items.map(p=>[truncate(p.description,24),truncate(p.location,12),p.priority||'—',p.status||'—',p.date||'—']);
  lastExportData={headers,rows:items};
  printTable(headers,rows,widths);
}

function cmdSchedule(flags){
  const raw=getData(STORAGE_KEYS.timeline);
  if(!raw||!raw.length){print('  No timeline data found.','info');print('  Populate data at <a href="timeline.html">timeline.html</a>','info');return}
  let items=raw.slice();
  const now=today();

  if(flags.late)items=items.filter(t=>t.end&&t.end<now);
  if(flags.critical)items=items.filter(t=>t.dep);
  if(flags.next){
    const days=parseInt(flags.next)||7;
    const future=new Date();future.setDate(future.getDate()+days);
    const futureStr=future.toISOString().slice(0,10);
    items=items.filter(t=>t.start>=now&&t.start<=futureStr);
  }

  const widths=[22,12,12,12,8];
  const headers=['Task','Start','End','Category','Days'];
  const rows=items.map(t=>{
    const days=t.start&&t.end?daysBetween(t.start,t.end):'—';
    return[truncate(t.name,22),t.start||'—',t.end||'—',truncate(t.cat,12),days];
  });
  lastExportData={headers,rows:items};
  printTable(headers,rows,widths);
}

function cmdBudget(flags){
  const raw=getData(STORAGE_KEYS.estimate);
  let items=null,projName='';
  if(raw){
    if(Array.isArray(raw)){
      if(raw.length&&raw[0].items){
        const proj=raw[0];
        items=proj.items||[];
        projName=proj.name||'Untitled';
      }else if(raw.length&&raw[0].desc!==undefined){
        items=raw;
      }
    }else if(typeof raw==='object'&&raw.items){
      items=raw.items;
      projName=raw.name||'Untitled';
    }
  }
  if(!items||!items.length){print('  No estimate data found.','info');print('  Populate data at <a href="estimate.html">estimate.html</a>','info');return}
  if(projName)print('  Project: '+esc(projName),'accent');
  nl();

  if(flags.breakdown){
    const widths=[24,10,6,10,12];
    const headers=['Description','Category','Qty','Price','Total'];
    const rows=items.map(it=>{
      const total=(it.qty||0)*(it.price||0);
      return[truncate(it.desc,24),it.cat||'—',it.qty||0,'$'+(it.price||0).toFixed(0),'$'+total.toLocaleString()];
    });
    lastExportData={headers,rows:items};
    printTable(headers,rows,widths);
    const grand=items.reduce((s,it)=>s+(it.qty||0)*(it.price||0),0);
    print('  Grand Total: $'+grand.toLocaleString(),'accent');
    return;
  }

  if(flags.over){
    /* show items where actual > budget (if tracked) - for now just show all sorted by total desc */
    items.sort((a,b)=>((b.qty||0)*(b.price||0))-((a.qty||0)*(a.price||0)));
    const top=items.slice(0,10);
    print('  Top 10 Cost Items:','accent');nl();
    top.forEach(it=>{
      const total=(it.qty||0)*(it.price||0);
      printPre('  '+padR(truncate(it.desc,24),26)+'$'+padL(total.toLocaleString(),10));
    });
    nl();
    return;
  }

  /* summary by category */
  const cats={};
  items.forEach(it=>{
    const c=it.cat||'Other';
    if(!cats[c])cats[c]=0;
    cats[c]+=(it.qty||0)*(it.price||0);
  });
  const grand=Object.values(cats).reduce((a,b)=>a+b,0);
  print('  Budget Summary','accent');nl();
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    const pct=grand?Math.round(v/grand*100):0;
    printPre('  '+padR(k,16)+'$'+padL(v.toLocaleString(),10)+'  '+pct+'%');
  });
  printPre('  '+'─'.repeat(32));
  printPre('  '+padR('TOTAL',16)+'$'+padL(grand.toLocaleString(),10));
  nl();
  print('  '+items.length+' line items','info');
  lastExportData={headers:['Category','Amount'],rows:Object.entries(cats).map(([k,v])=>({cat:k,amount:v}))};
}

function cmdDailylog(flags){
  const raw=getData(STORAGE_KEYS.dailylog);
  if(!raw||!Object.keys(raw).length){print('  No daily log data found.','info');print('  Populate data at <a href="dailylog.html">dailylog.html</a>','info');return}

  let entries=Object.entries(raw).sort((a,b)=>b[0].localeCompare(a[0]));

  if(flags.today){
    entries=entries.filter(([k])=>k===today());
  }
  if(flags.week){
    const d=new Date();
    d.setDate(d.getDate()-7);
    const weekAgo=d.toISOString().slice(0,10);
    entries=entries.filter(([k])=>k>=weekAgo);
  }

  if(!entries.length){print('  No entries for selected period.','info');return}

  entries.slice(0,14).forEach(([date,log])=>{
    print('  ┌─ '+date+' ──────────────────','accent');
    if(log.weather)printPre('  │ Weather: '+(log.weather||'')+(log.temp?' '+log.temp:''));
    if(log.projectName)printPre('  │ Project: '+log.projectName);
    if(log.workPerformed)printPre('  │ Work: '+truncate(log.workPerformed,50));
    if(log.crew&&log.crew.length){
      const hrs=log.crew.reduce((s,c)=>s+(c.hours||0),0);
      printPre('  │ Crew: '+log.crew.length+' workers, '+hrs+' man-hours');
    }
    if(log.materials&&log.materials.length)printPre('  │ Materials: '+log.materials.length+' items received');
    if(log.issues)printPre('  │ Issues: '+truncate(log.issues,50));
    if(log.safetyInc==='Yes')printPre('  │ SAFETY INCIDENT REPORTED');
    printPre('  └─────────────────────────────');
    nl();
  });
  print('  '+entries.length+' log entr'+(entries.length!==1?'ies':'y')+' (showing up to 14)','info');
}

function cmdAssumptions(flags){
  const raw=getData(STORAGE_KEYS.assumptions);

function cmdStandup(flags){
  const raw=getData(STORAGE_KEYS.standup);
  if(!raw||!Object.keys(raw).length){print('  No standup data found.','info');print('  Populate data at <a href="standup.html">standup.html</a>','info');return}

  let entries=Object.entries(raw).sort((a,b)=>b[0].localeCompare(a[0]));

  if(flags.today)entries=entries.filter(([k])=>k===today());
  if(flags.week){
    const d=new Date();d.setDate(d.getDate()-7);
    const wa=d.toISOString().slice(0,10);
    entries=entries.filter(([k])=>k>=wa);
  }

  if(!entries.length){print('  No standup entries for selected period.','info');return}

  entries.slice(0,10).forEach(([date,e])=>{
    print('  '+date,'accent');
    if(e.yesterday)printPre('    Yesterday: '+truncate(e.yesterday,50));
    if(e.today)printPre('    Today:     '+truncate(e.today,50));
    if(e.blockers)printPre('    Blockers:  '+truncate(e.blockers,50));
    nl();
  });
  print('  '+entries.length+' total standup'+(entries.length!==1?'s':'')+' (showing up to 10)','info');
}

/* ── Dashboard ── */
function cmdDashboard(flags){
  if(flags.risks){cmdDashRisks();return}
  if(flags.schedule){cmdDashSchedule();return}
  if(flags.budget){cmdDashBudget();return}

  print('  ┌────────────────────────────────────┐','accent');
  print('  │    PROJECT HEALTH DASHBOARD         │','accent');
  print('  └────────────────────────────────────┘','accent');
  nl();

  /* Tasks */
  const tasks=getData(STORAGE_KEYS.kanban)||[];
  const taskCols={backlog:0,progress:0,review:0,done:0};
  tasks.forEach(t=>{if(taskCols[t.col]!==undefined)taskCols[t.col]++});
  print('  TASKS','green');
  printPre('    Total: '+tasks.length+'  |  Backlog: '+taskCols.backlog+'  |  In Progress: '+taskCols.progress+'  |  Review: '+taskCols.review+'  |  Done: '+taskCols.done);
  if(tasks.length){
    const pct=Math.round(taskCols.done/tasks.length*100);
    const filled=Math.round(pct/100*20);
    const bar='█'.repeat(filled)+'░'.repeat(20-filled);
    printPre('    Progress: ['+bar+'] '+pct+'%');
  }
  nl();

  /* Risks */
  const risks=getData(STORAGE_KEYS.risks)||[];
  const openR=risks.filter(r=>r.status==='Open');
  const critR=risks.filter(r=>(r.score||0)>=15);
  print('  RISKS','red');
  printPre('    Total: '+risks.length+'  |  Open: '+openR.length+'  |  Critical (15+): '+critR.length);
  if(critR.length)printPre('    !! '+critR.length+' critical risk(s) need attention');
  nl();

  /* RFIs */
  const rfis=getData(STORAGE_KEYS.rfis)||[];
  const openRfi=rfis.filter(r=>r.status==='Open');
  const overdueRfi=rfis.filter(r=>r.status==='Open'&&r.dateNeed&&r.dateNeed<today());
  print('  RFIs','gold');
  printPre('    Total: '+rfis.length+'  |  Open: '+openRfi.length+'  |  Overdue: '+overdueRfi.length);
  nl();

  /* Punch List */
  const punch=getData(STORAGE_KEYS.punchlist)||[];
  const openP=punch.filter(p=>p.status==='Open');
  const pctP=punch.length?Math.round((punch.length-openP.length)/punch.length*100):0;
  print('  PUNCH LIST','purple');
  printPre('    Total: '+punch.length+'  |  Open: '+openP.length+'  |  Complete: '+pctP+'%');
  nl();

  /* Schedule */
  const sched=getData(STORAGE_KEYS.timeline)||[];
  const late=sched.filter(t=>t.end&&t.end<today());
  print('  SCHEDULE','accent');
  printPre('    Tasks: '+sched.length+'  |  Overdue: '+late.length);
  nl();

  /* Requirements */
  const reqs=getData(STORAGE_KEYS.requirements)||[];
  const implReq=reqs.filter(r=>['Implemented','Verified'].includes(r.status)).length;
  const approvedReq=reqs.filter(r=>['Approved','Implemented','Verified'].includes(r.status)).length;
  print('  REQUIREMENTS','green');
  printPre('    Total: '+reqs.length+'  |  Approved+: '+approvedReq+'  |  Implemented+: '+implReq);
  nl();

  /* Assumptions */
  const assumptions=getData(STORAGE_KEYS.assumptions)||[];
  const activeA=assumptions.filter(a=>a.status==='Active').length;
  const invalidA=assumptions.filter(a=>a.status==='Invalid').length;
  if(assumptions.length){
    print('  ASSUMPTIONS','info');
    printPre('    Total: '+assumptions.length+'  |  Active: '+activeA+'  |  Invalid: '+invalidA);
    nl();
  }

  print('  Use dashboard --risks | --schedule | --budget for details','info');
}

function cmdDashRisks(){
  const risks=getData(STORAGE_KEYS.risks)||[];
  if(!risks.length){print('  No risk data available.','info');return}
  print('  RISK SUMMARY','red');nl();

  const cats={};
  risks.forEach(r=>{const c=r.cat||'Other';cats[c]=(cats[c]||0)+1});
  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    printPre('    '+padR(k,16)+padL(String(v),4)+' '+'█'.repeat(Math.min(v,30)));
  });
  nl();

  const avg=Math.round(risks.reduce((s,r)=>s+(r.score||0),0)/risks.length*10)/10;
  const max=risks.reduce((a,b)=>(a.score||0)>(b.score||0)?a:b);
  printPre('    Avg Score: '+avg);
  printPre('    Highest:   '+(max.score||0)+' - '+truncate(max.desc,30));
  nl();

  print('  Risk Matrix (Likelihood x Impact):','accent');
  for(let l=5;l>=1;l--){
    let row='    '+l+' │';
    for(let i=1;i<=5;i++){
      const count=risks.filter(r=>r.lik===l&&r.imp===i).length;
      const score=l*i;
      if(count){
        row+=(score>=15?'\x1b[31m':score>=8?'\x1b[33m':' ')+padL(String(count),2)+' ';
      }else{
        row+=' . ';
      }
    }
    printPre(row);
  }
  printPre('      └───────────────');
  printPre('        1  2  3  4  5');
  nl();
  print('    Likelihood →','info');
}

function cmdDashSchedule(){
  const tasks=getData(STORAGE_KEYS.timeline)||[];
  if(!tasks.length){print('  No schedule data available.','info');return}
  print('  SCHEDULE HEALTH','accent');nl();

  const now=today();
  const late=tasks.filter(t=>t.end&&t.end<now);
  const active=tasks.filter(t=>t.start&&t.end&&t.start<=now&&t.end>=now);
  const upcoming=tasks.filter(t=>t.start&&t.start>now);
  const done=tasks.filter(t=>t.end&&t.end<now);

  printPre('    Total tasks:   '+tasks.length);
  printPre('    Active now:    '+active.length);
  printPre('    Upcoming:      '+upcoming.length);
  printPre('    Completed:     '+done.length);
  printPre('    Overdue:       '+late.length);
  nl();

  if(late.length){
    print('  Overdue Tasks:','red');
    late.forEach(t=>{
      const days=daysBetween(t.end,now);
      printPre('    • '+truncate(t.name,28)+' ('+days+' day'+(days!==1?'s':'')+' late)');
    });
    nl();
  }

  if(active.length){
    print('  Active Tasks:','green');
    active.forEach(t=>{
      const remaining=daysBetween(now,t.end);
      printPre('    • '+truncate(t.name,28)+' ('+remaining+' day'+(remaining!==1?'s':'')+' left)');
    });
  }
}

function cmdDashBudget(){
  const raw=getData(STORAGE_KEYS.estimate);
  let items=null;
  if(raw){
    if(Array.isArray(raw)&&raw.length){
      items=raw[0].items||raw;
    }else if(typeof raw==='object'&&raw.items){
      items=raw.items;
    }
  }
  if(!items||!items.length){print('  No budget data available.','info');return}
  print('  BUDGET OVERVIEW','gold');nl();

  const cats={};
  items.forEach(it=>{
    const c=it.cat||'Other';
    cats[c]=(cats[c]||0)+(it.qty||0)*(it.price||0);
  });
  const grand=Object.values(cats).reduce((a,b)=>a+b,0);

  Object.entries(cats).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    const pct=grand?Math.round(v/grand*100):0;
    const barLen=Math.round(pct/2);
    const bar='█'.repeat(barLen);
    printPre('    '+padR(k,14)+'$'+padL(v.toLocaleString(),10)+' ('+padL(pct+'%',4)+') '+bar);
  });
  nl();
  printPre('    TOTAL: $'+grand.toLocaleString());
  nl();
  print('  '+items.length+' line items across '+Object.keys(cats).length+' categories','info');
}

/* ── Utilities ── */
function cmdClear(){
  term.innerHTML='';
  copyBtn.classList.remove('show');
}

function cmdExport(args){
  if(!lastExportData||!lastExportData.rows||!lastExportData.rows.length){
    print('  No data to export. Run a query first.','error');
    return;
  }
  const fmt=(args[0]||'json').toLowerCase();
  let output='';

  if(fmt==='csv'){
    if(lastExportData.headers){
      output+=lastExportData.headers.join(',')+'\n';
    }
    lastExportData.rows.forEach(r=>{
      if(Array.isArray(r)){
        output+=r.map(c=>'"'+String(c!=null?c:'').replace(/"/g,'""')+'"').join(',')+'\n';
      }else{
        output+=Object.values(r).map(c=>'"'+String(c!=null?c:'').replace(/"/g,'""')+'"').join(',')+'\n';
      }
    });
  }else{
    output=JSON.stringify(lastExportData.rows,null,2);
  }

  navigator.clipboard.writeText(output).then(()=>{
    print('  Copied '+fmt.toUpperCase()+' to clipboard ('+lastExportData.rows.length+' records)','green');
  }).catch(()=>{
    /* fallback: show truncated output */
    print('  '+fmt.toUpperCase()+' output (clipboard unavailable):','info');
    const lines=output.split('\n').slice(0,20);
    lines.forEach(l=>printPre('  '+l));
    if(output.split('\n').length>20)print('  ... ('+output.split('\n').length+' total lines)','info');
  });
}

function cmdStats(){
  print('  STORAGE STATISTICS','accent');nl();

  let totalBytes=0;
  const entries=[];

  Object.entries(STORAGE_KEYS).forEach(([name,key])=>{
    const raw=localStorage.getItem(key);
    const bytes=raw?new Blob([raw]).size:0;
    totalBytes+=bytes;
    let count=0;
    if(raw){
      try{
        const data=JSON.parse(raw);
        if(Array.isArray(data))count=data.length;
        else if(data&&typeof data==='object')count=Object.keys(data).length;
      }catch{}
    }
    entries.push({name,key,bytes,count,hasData:!!raw});
  });

  const widths=[14,20,10,8];
  const headers=['Source','Key','Size','Records'];
  const rows=entries.map(e=>[
    e.name,
    e.key,
    e.bytes>1024?(Math.round(e.bytes/1024*10)/10)+' KB':e.bytes+' B',
    e.hasData?String(e.count):'—'
  ]);
  printTable(headers,rows,widths);
  nl();
  const kb=Math.round(totalBytes/1024*10)/10;
  print('  Total storage used: '+(kb>1024?(Math.round(kb/1024*10)/10)+' MB':kb+' KB'),'info');
}

/* ── Execute Command ── */
function execute(raw){
  if(!raw.trim())return;

  print('taskiap&gt; '+esc(raw),'cmd');

  if(!history.length||history[history.length-1]!==raw){
    history.push(raw);
  }
  histIdx=history.length;

  const{cmd,flags,args}=parseArgs(raw);

  switch(cmd.toLowerCase()){
    case'tasks':cmdTasks(flags);break;
    case'risks':cmdRisks(flags);break;
    case'rfis':cmdRfis(flags);break;
    case'punchlist':cmdPunchlist(flags);break;
    case'schedule':cmdSchedule(flags);break;
    case'budget':cmdBudget(flags);break;
    case'dailylog':cmdDailylog(flags);break;
    case'assumptions':cmdAssumptions(flags);break;
    case'lessons':cmdLessons(flags);break;
    case'requirements':cmdRequirements(flags);break;
    case'standup':cmdStandup(flags);break;
    case'retro':cmdRetro(flags);break;
    case'materials':cmdMaterials(flags);break;
    case'bids':cmdBids(flags);break;
    case'dashboard':cmdDashboard(flags);break;
    case'help':cmdHelp(args);break;
    case'clear':cmdClear();break;
    case'export':cmdExport(args);break;
    case'stats':cmdStats();break;
    case'version':cmdVersion();break;
    default:
      print('  Unknown command: '+esc(cmd),'error');
      print('  Type <span style="color:var(--termgreen)">help</span> for available commands','info');
  }
  nl();
  scrollBottom();
  lastOutput=term.innerText;
}

/* ── Copy Output ── */
function copyLastOutput(){
  const lines=[...term.querySelectorAll('.output-line,.table-line')];
  let startIdx=0;
  for(let i=lines.length-1;i>=0;i--){
    if(lines[i].classList.contains('cmd')){startIdx=i+1;break}
  }
  const text=lines.slice(startIdx).map(l=>l.textContent).filter(l=>l.trim()).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    copyBtn.textContent='copied!';
    setTimeout(()=>{copyBtn.textContent='copy'},1500);
  }).catch(()=>{});
}

/* ── Input Handling ── */
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    hideAC();
    const val=input.value;
    input.value='';
    execute(val);
    copyBtn.classList.add('show');
    return;
  }

  if(e.key==='Tab'){
    e.preventDefault();
    const completions=getCompletions(input.value);
    if(completions.length===1){
      input.value=completions[0].val+' ';
      hideAC();
    }else if(completions.length>1){
      if(!acEl.classList.contains('show')){
        showAC(completions);
        acIdx=0;
        acEl.querySelectorAll('.ac-item')[0]?.classList.add('active');
        input.value=completions[0].val;
      }else{
        const items=acEl.querySelectorAll('.ac-item');
        if(items.length){
          acIdx=(acIdx+1)%items.length;
          items.forEach((el,i)=>el.classList.toggle('active',i===acIdx));
          input.value=items[acIdx].dataset.val;
        }
      }
    }
    return;
  }

  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(acEl.classList.contains('show')){
      const items=acEl.querySelectorAll('.ac-item');
      if(items.length){
        acIdx=acIdx<=0?items.length-1:acIdx-1;
        items.forEach((el,i)=>el.classList.toggle('active',i===acIdx));
        input.value=items[acIdx].dataset.val;
      }
      return;
    }
    if(histIdx>0){
      histIdx--;
      input.value=history[histIdx];
    }
    return;
  }

  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(acEl.classList.contains('show')){
      const items=acEl.querySelectorAll('.ac-item');
      if(items.length){
        acIdx=(acIdx+1)%items.length;
        items.forEach((el,i)=>el.classList.toggle('active',i===acIdx));
        input.value=items[acIdx].dataset.val;
      }
      return;
    }
    if(histIdx<history.length-1){
      histIdx++;
      input.value=history[histIdx];
    }else{
      histIdx=history.length;
      input.value='';
    }
    return;
  }

  if(e.key==='Escape'){
    hideAC();
    return;
  }

  /* hide AC on typing so it refreshes on next Tab */
  setTimeout(()=>{
    if(acEl.classList.contains('show'))hideAC();
  },0);
});

/* click terminal to focus input */
term.addEventListener('click',()=>input.focus());
document.addEventListener('click',e=>{
  if(!acEl.contains(e.target)&&e.target!==input)hideAC();
});

function saveSettings(s){localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}

const settings=loadSettings();
if(settings.history&&Array.isArray(settings.history))history=settings.history;

window.addEventListener('beforeunload',()=>{
  const s=loadSettings();
  s.history=history.slice(-100);
  saveSettings(s);
});

/* ── Boot ── */
boot();
</script>
</body>
</html>
