// ── Sound ──────────────────────────────────────────────────────
var audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(f, d, t, v) {
  try {
    var c = getAudio(), o = c.createOscillator(), g = c.createGain();
    o.type = t || "sine";
    o.frequency.value = f;
    g.gain.setValueAtTime(v || 0.04, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + d);
  } catch (e) {}
}

// Richer sound effects
function sndJump() {
  // 3-note ascending arp C-E-G
  tone(262, 0.06, "sine", 0.02);
  setTimeout(function() { tone(330, 0.06, "sine", 0.02); }, 20);
  setTimeout(function() { tone(392, 0.06, "sine", 0.02); }, 40);
}

function sndDie() {
  // Dramatic 5-note descending G-F-Eb-D-C with slight detune
  var notes = [392, 349, 311, 294, 262];
  for (var i = 0; i < notes.length; i++) {
    (function(idx) {
      setTimeout(function() {
        tone(notes[idx], 0.15, "sine", 0.025);
        tone(notes[idx] * 1.005, 0.15, "sine", 0.01); // slight detune
      }, idx * 80);
    })(i);
  }
}

function sndOrb() {
  // Sparkly chime -- high note + octave
  try {
    var c = getAudio();
    var o1 = c.createOscillator(), o2 = c.createOscillator();
    var g1 = c.createGain(), g2 = c.createGain();
    o1.type = "sine"; o1.frequency.value = 1047;
    o2.type = "sine"; o2.frequency.value = 2094;
    g1.gain.setValueAtTime(0.02, c.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.12);
    g2.gain.setValueAtTime(0.015, c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
    o1.connect(g1); g1.connect(c.destination);
    o2.connect(g2); g2.connect(c.destination);
    o1.start(); o1.stop(c.currentTime + 0.12);
    o2.start(); o2.stop(c.currentTime + 0.08);
  } catch (e) {}
}

function sndBeat() {
  // Kick drum feel -- 60Hz with pitch bend down
  try {
    var c = getAudio();
    var o = c.createOscillator(), g = c.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(120, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(60, c.currentTime + 0.04);
    g.gain.setValueAtTime(0.015, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.06);
  } catch (e) {}
}

function sndCheckpoint() {
  // Triumphant 4-note fanfare C-E-G-C5
  var notes = [262, 330, 392, 523];
  for (var i = 0; i < notes.length; i++) {
    (function(idx) {
      setTimeout(function() {
        tone(notes[idx], 0.15, "sine", 0.03);
      }, idx * 75);
    })(i);
  }
}

function sndNearMiss() {
  // High ping with vibrato
  try {
    var c = getAudio();
    var o = c.createOscillator(), g = c.createGain();
    var lfo = c.createOscillator(), lfoGain = c.createGain();
    o.type = "sine"; o.frequency.value = 1600;
    lfo.type = "sine"; lfo.frequency.value = 20;
    lfoGain.gain.value = 30;
    lfo.connect(lfoGain); lfoGain.connect(o.frequency);
    g.gain.setValueAtTime(0.015, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
    o.connect(g); g.connect(c.destination);
    o.start(); lfo.start();
    o.stop(c.currentTime + 0.1); lfo.stop(c.currentTime + 0.1);
  } catch (e) {}
}

function sndCombo(comboCount) {
  // Ascending pitch for each consecutive orb
  var freq = 600 + comboCount * 80;
  if (freq > 2400) freq = 2400;
  try {
    var c = getAudio();
    var o1 = c.createOscillator(), o2 = c.createOscillator();
    var g1 = c.createGain(), g2 = c.createGain();
    o1.type = "sine"; o1.frequency.value = freq;
    o2.type = "sine"; o2.frequency.value = freq * 2;
    g1.gain.setValueAtTime(0.02, c.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
    g2.gain.setValueAtTime(0.012, c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
    o1.connect(g1); g1.connect(c.destination);
    o2.connect(g2); g2.connect(c.destination);
    o1.start(); o1.stop(c.currentTime + 0.1);
    o2.start(); o2.stop(c.currentTime + 0.06);
  } catch (e) {}
}

// ── Background Music System ──────────────────────────────────
var musicPlaying = false;
var musicNodes = [];
var musicInterval = null;
var currentSongIndex = 0;
var musicBeatCount = 0;
var musicBarCount = 0;
var MUSIC_BPM = 140;
var MUSIC_BEAT_MS = 60000 / MUSIC_BPM; // ~428ms per beat
var beatFlash = 0; // visual beat flash

// Songs: each has a root set, bass pattern, melody notes
var SONGS = [
  { // Song 1: C minor -- dark, driving
    name: "C minor",
    bass: [65.41, 65.41, 77.78, 73.42, 65.41, 65.41, 82.41, 77.78], // C2, C2, Eb2, D2...
    melody: [311, 370, 392, 466, 523, 466, 392, 370, 311, 262, 311, 370, 392, 523, 466, 392],
    chords: [[131, 156, 196], [131, 156, 196], [110, 131, 165], [117, 147, 175]]
  },
  { // Song 2: F major -- uplifting, faster
    name: "F major",
    bass: [87.31, 87.31, 110, 98, 87.31, 87.31, 110, 98],
    melody: [349, 440, 523, 440, 349, 523, 659, 523, 440, 349, 523, 659, 523, 440, 349, 440],
    chords: [[175, 220, 262], [175, 220, 262], [147, 175, 220], [165, 196, 247]]
  },
  { // Song 3: A minor -- moody, syncopated
    name: "A minor",
    bass: [55, 55, 65.41, 73.42, 55, 55, 65.41, 73.42],
    melody: [440, 523, 659, 523, 440, 392, 330, 392, 440, 523, 659, 784, 659, 523, 440, 392],
    chords: [[110, 131, 165], [110, 131, 165], [98, 131, 147], [87, 110, 131]]
  },
  { // Song 4: E minor -- intense, building
    name: "E minor",
    bass: [82.41, 82.41, 98, 87.31, 82.41, 82.41, 98, 110],
    melody: [330, 392, 494, 392, 330, 494, 587, 494, 392, 330, 494, 587, 659, 587, 494, 392],
    chords: [[165, 196, 247], [165, 196, 247], [147, 175, 220], [131, 165, 196]]
  }
];

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
  // Fade out all active music nodes
  for (var i = 0; i < musicNodes.length; i++) {
    try {
      musicNodes[i].g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      musicNodes[i].o.stop(audioCtx.currentTime + 0.15);
    } catch (e) {}
  }
  musicNodes = [];
}

function playMusicNote(freq, duration, type, vol, detune) {
  try {
    var c = getAudio();
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(vol || 0.01, c.currentTime);
    g.gain.setValueAtTime(vol || 0.01, c.currentTime + duration * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duration);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + duration);
    musicNodes.push({o: o, g: g});
  } catch (e) {}
}

function musicTick() {
  if (!musicPlaying) return;
  var song = SONGS[currentSongIndex];
  var beatInBar = musicBeatCount % 4;
  var barInPhrase = musicBarCount % 4;

  // Clean up old nodes
  var newNodes = [];
  for (var i = 0; i < musicNodes.length; i++) {
    try {
      if (musicNodes[i].o.context.currentTime < musicNodes[i].o.context.currentTime + 2) {
        newNodes.push(musicNodes[i]);
      }
    } catch (e) {}
  }
  if (musicNodes.length > 50) musicNodes = newNodes.slice(-20);

  var beatDur = MUSIC_BEAT_MS / 1000;

  // Kick on beats 1 and 3
  if (beatInBar === 0 || beatInBar === 2) {
    try {
      var c = getAudio();
      var o = c.createOscillator(), g = c.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(100, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(40, c.currentTime + 0.05);
      g.gain.setValueAtTime(0.015, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + 0.08);
      musicNodes.push({o: o, g: g});
    } catch (e) {}
    beatFlash = 0.12;
  }

  // Hi-hat on off-beats (very quiet)
  if (beatInBar === 1 || beatInBar === 3) {
    try {
      var c = getAudio();
      var o = c.createOscillator(), g = c.createGain();
      o.type = "square";
      o.frequency.value = 8000 + Math.random() * 2000;
      g.gain.setValueAtTime(0.004, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.02);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + 0.02);
      musicNodes.push({o: o, g: g});
    } catch (e) {}
  }

  // Bass line: plays on every beat
  var bassIdx = musicBeatCount % song.bass.length;
  playMusicNote(song.bass[bassIdx], beatDur * 0.8, "sine", 0.012);

  // Melody: plays sixteenth-note patterns
  var melIdx = (musicBeatCount * 2) % song.melody.length;
  playMusicNote(song.melody[melIdx], beatDur * 0.4, "triangle", 0.008);
  // Second melody note (offbeat sixteenth)
  setTimeout(function() {
    if (!musicPlaying) return;
    var melIdx2 = (musicBeatCount * 2 + 1) % song.melody.length;
    playMusicNote(song.melody[melIdx2], beatDur * 0.35, "triangle", 0.006);
  }, MUSIC_BEAT_MS / 2);

  // Chord pad on beat 1 of each bar (sustained)
  if (beatInBar === 0) {
    var chord = song.chords[barInPhrase % song.chords.length];
    for (var ci = 0; ci < chord.length; ci++) {
      playMusicNote(chord[ci], beatDur * 3.5, "sine", 0.004, (ci - 1) * 5);
    }
  }

  musicBeatCount++;
  if (musicBeatCount % 4 === 0) musicBarCount++;
}

function startMusic() {
  if (musicPlaying) return;
  getAudio();
  musicPlaying = true;
  musicBeatCount = 0;
  musicBarCount = 0;
  currentSongIndex = 0;
  musicInterval = setInterval(musicTick, MUSIC_BEAT_MS);
  musicTick(); // play first beat immediately
}

function updateMusicForDistance(dist) {
  // Switch songs every 2000 distance
  var newSong = Math.floor(dist / 2000) % SONGS.length;
  if (newSong !== currentSongIndex) {
    currentSongIndex = newSong;
    musicBeatCount = 0;
    musicBarCount = 0;
  }
}

// ── Colors & visuals ─────────────────────────────────────────
var NEON_COLORS = ["#00ffff","#ff00ff","#00ff88","#ff6600","#ffff00","#ff0066","#6644ff","#00ccff"];

// ── Parallax star field ──────────────────────────────────────

// ── Pattern-based level system ───────────────────────────────
var PATTERNS = [
  // Pattern 0: Easy intro -- single spike with orb reward
  [{type:'spike',offset:0}, {type:'orb',offset:60,y:-50}],
  // Pattern 1: Single spike, gap, orb
  [{type:'spike',offset:0}, {type:'orb',offset:100,y:-40}],
  // Pattern 2: Two spikes spaced apart
  [{type:'spike',offset:0}, {type:'spike',offset:60}],
  // Pattern 3: Block to jump on, orb above
  [{type:'block',offset:0,y:-50,w:50,h:50}, {type:'orb',offset:25,y:-80}],
  // Pattern 4: Double spike tight
  [{type:'spike',offset:0}, {type:'spike',offset:28}],
  // Pattern 5: Platform hop with orbs
  [{type:'block',offset:0,y:-60,w:60,h:20}, {type:'orb',offset:30,y:-90}, {type:'block',offset:140,y:-90,w:50,h:20}, {type:'orb',offset:165,y:-120}],
  // Pattern 6: Saw blade
  [{type:'saw',offset:0}, {type:'orb',offset:80,y:-60}],
  // Pattern 7: Spike then block wall
  [{type:'spike',offset:0}, {type:'block',offset:60,y:-55,w:30,h:55}],
  // Pattern 8: Triple spike run
  [{type:'spike',offset:0}, {type:'spike',offset:28}, {type:'spike',offset:56}],
  // Pattern 9: Floating platforms with orb chain
  [{type:'block',offset:0,y:-60,w:70,h:18}, {type:'orb',offset:100,y:-70}, {type:'orb',offset:130,y:-80}, {type:'orb',offset:160,y:-70}],
  // Pattern 10: Saw + spike combo
  [{type:'saw',offset:0}, {type:'spike',offset:60}, {type:'orb',offset:120,y:-50}],
  // Pattern 11: Block staircase
  [{type:'block',offset:0,y:-40,w:35,h:40}, {type:'block',offset:50,y:-70,w:35,h:70}, {type:'orb',offset:67,y:-100}],
  // Pattern 12: Spike sandwich (spikes around orb)
  [{type:'spike',offset:0}, {type:'orb',offset:35,y:-45}, {type:'spike',offset:70}],
  // Pattern 13: Double saw
  [{type:'saw',offset:0}, {type:'saw',offset:50}],
  // Pattern 14: Long platform with spikes below and after
  [{type:'block',offset:0,y:-55,w:100,h:18}, {type:'orb',offset:50,y:-85}, {type:'spike',offset:130}, {type:'spike',offset:158}],
  // Pattern 15: Rapid spike chain (hard)
  [{type:'spike',offset:0}, {type:'spike',offset:26}, {type:'spike',offset:52}, {type:'spike',offset:78}],
  // Pattern 16: Tall block walls with gap
  [{type:'block',offset:0,y:-80,w:25,h:80}, {type:'block',offset:80,y:-80,w:25,h:80}, {type:'orb',offset:50,y:-60}],
  // Pattern 17: Saw + platform escape
  [{type:'saw',offset:0}, {type:'block',offset:50,y:-70,w:55,h:18}, {type:'orb',offset:77,y:-100}, {type:'spike',offset:130}],
  // Pattern 18: Orb gauntlet (reward run)
  [{type:'orb',offset:0,y:-40}, {type:'orb',offset:30,y:-55}, {type:'orb',offset:60,y:-70}, {type:'orb',offset:90,y:-55}, {type:'orb',offset:120,y:-40}],
  // Pattern 19: Intense -- saws and spikes
  [{type:'saw',offset:0}, {type:'spike',offset:50}, {type:'spike',offset:78}, {type:'saw',offset:120}, {type:'orb',offset:170,y:-50}]
];

// Difficulty tiers: which patterns to pick from at each distance tier
var EASY_PATTERNS = [0, 1, 2, 3, 4, 18]; // distance 0-2000
var MED_PATTERNS = [2, 4, 5, 6, 7, 8, 9, 10, 11, 12, 18]; // distance 2000-5000
var HARD_PATTERNS = [5, 8, 10, 11, 12, 13, 14, 15, 16, 17, 19]; // distance 5000+

var currentPatternIndex = 0;
var patternQueue = []; // obstacles waiting to be placed from current pattern
var patternSpawnX = 0; // X position to spawn next pattern from

function getPatternPool() {
  if (distance < 2000) return EASY_PATTERNS;
  if (distance < 5000) return MED_PATTERNS;
  return HARD_PATTERNS;
}

function spawnPattern() {
  var pool = getPatternPool();
  var pIdx = pool[Math.floor(Math.random() * pool.length)];
  var pattern = PATTERNS[pIdx];

  // Find rightmost edge of existing obstacles
  var rightmostEdge = 0;
  for (var i = 0; i < obstacles.length; i++) {
    var oRight = obstacles[i].x + (obstacles[i].w || 30);
    if (oRight > rightmostEdge) rightmostEdge = oRight;
  }
  for (var i = 0; i < orbs.length; i++) {
    if (orbs[i].x + 10 > rightmostEdge) rightmostEdge = orbs[i].x + 10;
  }

  // Gap between patterns scales with difficulty, tighter as you progress
  var baseGap = 180;
  if (distance > 3000) baseGap = 150;
  if (distance > 6000) baseGap = 130;
  var gap = baseGap + Math.random() * 60;

  var startX = Math.max(W + 50, rightmostEdge + gap);

  for (var i = 0; i < pattern.length; i++) {
    var p = pattern[i];
    var x = startX + (p.offset || 0);

    if (p.type === 'spike') {
      obstacles.push({x: x, y: groundY, w: 20, h: 30, type: "spike"});
    } else if (p.type === 'block') {
      var bw = p.w || 30;
      var bh = p.h || 30;
      var by = p.y ? groundY + p.y : groundY - bh;
      obstacles.push({x: x, y: by, w: bw, h: bh, type: "block"});
    } else if (p.type === 'saw') {
      obstacles.push({x: x, y: groundY - 15, w: 30, h: 30, type: "saw", rot: 0});
    } else if (p.type === 'orb') {
      var oy = p.y ? groundY + p.y : groundY - 50;
      orbs.push({x: x, y: oy, collected: false});
    }
  }

  currentPatternIndex++;
}

  bgStars.push({x:Math.random()*2000,y:Math.random()*1000,s:0.5+Math.random()*2,b:Math.random()});

function reset() {
  player = {x:W*0.2, y:groundY-22, vy:0, size:22, rotation:0, onGround:true, trail:[]};
  obstacles = [];
  orbs = [];
  particles = [];
  checkpointMarkers = [];
  comboTexts = [];
  score = 0;
  comboCount = 0;
  comboTimer = 0;
  currentPatternIndex = 0;
  distance = lastCheckpoint;
  speed = Math.min(10, Math.max(5, 5 + Math.floor(lastCheckpoint / 400) * 0.3));
  frame = Math.floor(lastCheckpoint / speed) || 0;
  neonIdx = 0;
  shakeX = 0; shakeY = 0; shakeDuration = 0;
  nearMissFlash = 0;
  beatFlash = 0;
  // Pre-spawn some patterns ahead
  for (var i = 0; i < 3; i++) {
    spawnPattern();
  }
}

function jump() {
  if (STATE === "menu") {
    STATE = "playing";
    lastCheckpoint = 0;
    reset();
    startMusic();
    sndJump();
    return;
  }
  if (STATE === "dead") { STATE = "menu"; return; }
  if (player.onGround) {
    player.vy = jumpPower;
    player.onGround = false;
    doubleJumpAvailable = true;
    sndJump();
  } else if (doubleJumpAvailable) {
    player.vy = jumpPower * 0.85;
    doubleJumpAvailable = false;
    sndJump();
  }
}

function spawnParticles(x, y, color, count) {
  for (var i = 0; i < (count || 8); i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5) * 8,
      vy: (Math.random()-0.5) * 8 - 3,
      life: 1,
      color: color || NEON_COLORS[neonIdx],
      size: 2 + Math.random() * 4
    });
  }
}

// More dramatic death particles
function spawnDeathParticles(x, y) {
  var colors = ["#ff0044", "#ff2266", "#ff4488", "#ff0000", "#ff6600", "#ffffff"];
  for (var i = 0; i < 40; i++) {
    var angle = (i / 40) * Math.PI * 2 + Math.random() * 0.3;
    var spd = 3 + Math.random() * 10;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 6
    });
  }
}

// ── Near-miss detection ──────────────────────────────────────
function checkNearMiss(o) {
  var px = player.x, py = player.y, ps = player.size;
  var nearDist = 8;
  if (o.type === "spike") {
    var inKill = (px+ps > o.x+5 && px < o.x+o.w-5 && py+ps > o.y-o.h+8);
    var inNear = (px+ps > o.x+5-nearDist && px < o.x+o.w-5+nearDist && py+ps > o.y-o.h+8-nearDist);
    if (inNear && !inKill) return true;
  } else if (o.type === "saw") {
    var dx = (px+ps/2)-(o.x+o.w/2), dy = (py+ps/2)-(o.y-o.h/2);
    var dist = Math.sqrt(dx*dx+dy*dy);
    var killRadius = ps/2 + o.w/2 - 8;
    var nearRadius = killRadius + nearDist;
    if (dist < nearRadius && dist >= killRadius) return true;
  } else {
    var inKill = (px+ps > o.x+3 && px < o.x+o.w-3 && py+ps > o.y+3 && py < o.y+o.h-3);
    var inNear = (px+ps > o.x+3-nearDist && px < o.x+o.w-3+nearDist && py+ps > o.y+3-nearDist && py < o.y+o.h-3+nearDist);
    if (inNear && !inKill) return true;
  }
  return false;
}

function update() {
  if (STATE !== "playing") return;
  frame++;
  distance += speed;
  bgHue = (bgHue + 0.3) % 360;

  // Update music song based on distance
  updateMusicForDistance(distance);

  // Beat pulse
  beatTimer++;
  if (beatTimer >= 15) { beatTimer = 0; pulseScale = 1.06; sndBeat(); }
  pulseScale += (1 - pulseScale) * 0.15;

  // Beat flash decay
  if (beatFlash > 0) beatFlash -= 0.015;

  // Ground pulse
  groundPulseOffset = Math.sin(frame * 0.21) * 2.5 + Math.sin(frame * 0.1) * 1.5;

  // Speed ramp
  if (frame % 400 === 0) speed = Math.min(10, speed + 0.3);

  // Neon color cycle
  if (frame % 120 === 0) neonIdx = (neonIdx + 1) % NEON_COLORS.length;

  // Combo timer decay
  if (comboCount > 0) {
    comboTimer++;
    if (comboTimer >= COMBO_TIMEOUT) {
      comboCount = 0;
      comboTimer = 0;
    }
  }

  // Combo floating texts
  for (var ct = comboTexts.length - 1; ct >= 0; ct--) {
    comboTexts[ct].y -= 1;
    comboTexts[ct].life -= 0.02;
    if (comboTexts[ct].life <= 0) comboTexts.splice(ct, 1);
  }

  // Checkpoint system
  var currentCheckpointZone = Math.floor(distance / CHECKPOINT_INTERVAL) * CHECKPOINT_INTERVAL;
  if (currentCheckpointZone > lastCheckpoint && currentCheckpointZone > 0) {
    lastCheckpoint = currentCheckpointZone;
    checkpointFlash = 1.0;
    sndCheckpoint();
    spawnParticles(player.x + player.size/2, player.y + player.size/2, "#22ff88", 16);
  }
  if (checkpointFlash > 0) checkpointFlash -= 0.02;

  // Checkpoint markers
  var nextCPDist = (Math.floor(distance / CHECKPOINT_INTERVAL) + 1) * CHECKPOINT_INTERVAL;
  var cpScreenX = player.x + (nextCPDist - distance);
  if (cpScreenX < W + 200) {
    var alreadyExists = false;
    for (var ci = 0; ci < checkpointMarkers.length; ci++) {
      if (checkpointMarkers[ci].dist === nextCPDist) { alreadyExists = true; break; }
    }
    if (!alreadyExists) {
      checkpointMarkers.push({dist: nextCPDist, flash: 0});
    }
  }
  for (var ci = checkpointMarkers.length - 1; ci >= 0; ci--) {
    if (checkpointMarkers[ci].dist < distance - 200) checkpointMarkers.splice(ci, 1);
  }

  // Screen shake decay
  if (shakeDuration > 0) {
    shakeDuration--;
    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
    shakeIntensity *= 0.9;
  } else {
    shakeX = 0; shakeY = 0;
  }

  // Player physics
  player.vy += gravity;
  player.y += player.vy;
  player.rotation += speed * 0.04;

  var currentGroundY = groundY + groundPulseOffset;
  if (player.y >= currentGroundY - player.size) {
    player.y = currentGroundY - player.size;
    player.vy = 0;
    player.onGround = true;
  }

  // Trail
  player.trail.push({x:player.x, y:player.y+player.size/2, life:1});
  if (player.trail.length > 20) player.trail.shift();
  for (var t = 0; t < player.trail.length; t++) player.trail[t].life -= 0.05;

  // Spawn patterns when needed
  var lastObs = 0;
  for (var i = 0; i < obstacles.length; i++) {
    if (obstacles[i].x > lastObs) lastObs = obstacles[i].x;
  }
  for (var i = 0; i < orbs.length; i++) {
    if (orbs[i].x > lastObs) lastObs = orbs[i].x;
  }
  if (lastObs < W + 100) {
    spawnPattern();
  }

  // Near-miss flash decay
  if (nearMissFlash > 0) nearMissFlash -= 0.06;

  // Move obstacles
  for (var i = obstacles.length-1; i >= 0; i--) {
    var o = obstacles[i];
    o.x -= speed;
    if (o.type === "saw") o.rot += 0.15;
    if (o.x < -60) { obstacles.splice(i,1); continue; }

    // Near-miss check
    if (checkNearMiss(o) && nearMissFlash <= 0) {
      nearMissFlash = 1.0;
      sndNearMiss();
    }

    // Collision
    var px = player.x, py = player.y, ps = player.size;
    if (o.type === "spike") {
      if (px+ps > o.x+5 && px < o.x+o.w-5 && py+ps > o.y-o.h+8) {
        die(); return;
      }
    } else if (o.type === "saw") {
      var dx = (px+ps/2)-(o.x+o.w/2), dy = (py+ps/2)-(o.y-o.h/2);
      if (Math.sqrt(dx*dx+dy*dy) < ps/2+o.w/2-8) { die(); return; }
    } else {
      // Block = platform
      if (px+ps > o.x+3 && px < o.x+o.w-3 && py+ps > o.y+3 && py+ps < o.y+12 && player.vy >= 0) {
        player.y = o.y - ps;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Orbs
  for (var i = orbs.length-1; i >= 0; i--) {
    var o = orbs[i];
    o.x -= speed;
    if (o.x < -30) { orbs.splice(i,1); continue; }
    if (!o.collected) {
      var dx = (player.x+player.size/2)-o.x, dy = (player.y+player.size/2)-o.y;
      if (Math.sqrt(dx*dx+dy*dy) < 24) {
        o.collected = true;
        comboCount++;
        comboTimer = 0;
        var orbValue = 10 * Math.max(1, comboCount);
        score += orbValue;
        if (comboCount > 1) {
          sndCombo(comboCount);
          comboTexts.push({
            x: o.x,
            y: o.y - 15,
            text: "x" + comboCount + "!",
            life: 1,
            color: NEON_COLORS[neonIdx]
          });
        } else {
          sndOrb();
        }
        spawnParticles(o.x, o.y, NEON_COLORS[neonIdx], 12);
        orbs.splice(i,1);
      }
    }
  }

  // Score from distance
  score = Math.max(score, Math.floor(distance / 20));

  // Particles
  for (var i = particles.length-1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i,1);
  }
}

function die() {
  STATE = "dead";
  deathCount++;
  localStorage.setItem("tism-deaths", deathCount);
  if (score > highScore) { highScore = score; localStorage.setItem("tism-high", highScore); }
  shakeDuration = 25;
  shakeIntensity = 15;
  comboCount = 0;
  comboTimer = 0;
  sndDie();
  stopMusic();
  spawnDeathParticles(player.x + player.size/2, player.y + player.size/2);
}

function drawBgShapes() {
  for (var i = 0; i < bgShapes.length; i++) {
    var s = bgShapes[i];
    var sx = ((s.x - distance * s.speed) % (W + 200) + W + 200) % (W + 200) - 100;
    var sy = s.y;
    var hue = (bgHue + s.hueOffset) % 360;
    var rot = frame * s.rotSpeed;

    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(rot);
    ctx.globalAlpha = s.alpha;
    ctx.strokeStyle = "hsl(" + hue + ",60%,40%)";
    ctx.lineWidth = 1;

    if (s.type === 0) {
      ctx.beginPath();
      ctx.moveTo(0, -s.size/2);
      ctx.lineTo(-s.size/2, s.size/2);
      ctx.lineTo(s.size/2, s.size/2);
      ctx.closePath();
      ctx.stroke();
    } else if (s.type === 1) {
      ctx.beginPath();
      ctx.arc(0, 0, s.size/2, 0, Math.PI * 2);
      ctx.stroke();
    } else if (s.type === 2) {
      ctx.beginPath();
      ctx.moveTo(0, -s.size/2);
      ctx.lineTo(s.size/2, 0);
      ctx.lineTo(0, s.size/2);
      ctx.lineTo(-s.size/2, 0);
      ctx.closePath();
      ctx.stroke();
    } else {
      ctx.strokeRect(-s.size/2, -s.size/2, s.size, s.size);
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawParallaxStars() {
  for (var i = 0; i < parallaxStars.length; i++) {
    var s = parallaxStars[i];
    var sx = ((s.x - distance * s.speed) % (W + 200) + W + 200) % (W + 200) - 100;
    var twinkle = 0.5 + 0.5 * Math.sin(frame * s.twinkleSpeed + s.twinkleOffset);
    var alpha = s.brightness * twinkle;
    ctx.fillStyle = "rgba(255,255,255," + alpha + ")";
    ctx.beginPath();
    ctx.arc(sx, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function draw() {
  ctx.save();
  if (shakeDuration > 0) {
    ctx.translate(shakeX, shakeY);
  }

  // Background
  var bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0, "hsl("+(bgHue%360)+",30%,5%)");
  bgGrad.addColorStop(1, "hsl("+((bgHue+60)%360)+",20%,3%)");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-20,-20,W+40,H+40);

  // Parallax star field
  drawParallaxStars();

  // Stars (original)
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var sx = ((s.x - distance*0.3) % (W+100) + W+100) % (W+100);
    var sy = s.y % (groundY-20);
    ctx.fillStyle = "rgba(255,255,255,"+(0.2+s.b*0.5)+")";
    ctx.fillRect(sx, sy, s.s, s.s);
  }

  // Background geometric shapes
  drawBgShapes();

  // Beat flash overlay
  if (beatFlash > 0) {
    ctx.fillStyle = "rgba(255,255,255," + (beatFlash * 0.1) + ")";
    ctx.fillRect(-20, -20, W+40, H+40);
  }

  // Ground
  var neon = NEON_COLORS[neonIdx];
  var currentGroundY = groundY + groundPulseOffset;
  ctx.fillStyle = "#0f0f1a";
  ctx.fillRect(0, currentGroundY, W, H - currentGroundY + 20);

  // Ground line glows brighter on beats 1 and 3
  var groundGlow = 8;
  var groundAlpha = 1;
  if (beatFlash > 0.05) {
    groundGlow = 16;
    groundAlpha = 1;
  }
  ctx.strokeStyle = neon;
  ctx.lineWidth = 2;
  ctx.shadowColor = neon;
  ctx.shadowBlur = groundGlow;
  ctx.globalAlpha = groundAlpha;
  ctx.beginPath(); ctx.moveTo(0,currentGroundY); ctx.lineTo(W,currentGroundY); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // Ground grid lines
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth = 1;
  for (var gx = -(distance*2 % 40); gx < W; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, currentGroundY); ctx.lineTo(gx, H+20); ctx.stroke();
  }

  // Checkpoint markers on ground
  if (STATE === "playing" || STATE === "dead") {
    for (var ci = 0; ci < checkpointMarkers.length; ci++) {
      var cm = checkpointMarkers[ci];
      var cmx = player.x + (cm.dist - distance);
      if (cmx < -50 || cmx > W + 50) continue;
      var reached = distance >= cm.dist;
      var markerColor = reached ? "#22ff88" : "#335544";
      ctx.save();
      ctx.globalAlpha = reached ? 0.6 : 0.3;
      ctx.strokeStyle = markerColor;
      ctx.shadowColor = markerColor;
      ctx.shadowBlur = reached ? 10 : 0;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cmx, currentGroundY);
      ctx.lineTo(cmx, currentGroundY - 40);
      ctx.stroke();
      ctx.fillStyle = markerColor;
      ctx.beginPath();
      ctx.moveTo(cmx, currentGroundY - 40);
      ctx.lineTo(cmx + 16, currentGroundY - 33);
      ctx.lineTo(cmx, currentGroundY - 26);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  if (STATE === "menu") {
    ctx.textAlign = "center";
    ctx.font = "bold 36px monospace";
    ctx.fillStyle = neon;
    ctx.shadowColor = neon;
    ctx.shadowBlur = 15;
    ctx.fillText("'TISM TRAIL", W/2, H*0.25);
    ctx.shadowBlur = 0;
    ctx.font = "48px serif";
    ctx.fillText("\u{1F7E6}", W/2, H*0.38);
    ctx.font = "13px monospace";
    ctx.fillStyle = "#888";
    ctx.fillText("Tap / Space to jump (DOUBLE JUMP!)", W/2, H*0.49);
    ctx.fillText("Spikes = death. Blocks = platforms.", W/2, H*0.54);
    ctx.fillText("Your cube has autism. It only goes right.", W/2, H*0.59);
    if (highScore > 0) {
      ctx.fillStyle = neon;
      ctx.fillText("Best: " + highScore, W/2, H*0.66);
    }
    if (deathCount > 0) {
      ctx.fillStyle = "#ff4466";
      ctx.font = "11px monospace";
      ctx.fillText("Attempts: " + deathCount, W/2, H*0.72);
    }
    if (lastCheckpoint > 0) {
      ctx.fillStyle = "#22ff88";
      ctx.font = "11px monospace";
      ctx.fillText("Checkpoint: " + lastCheckpoint + " (tap to resume)", W/2, H*0.77);
    }
    ctx.font = "10px monospace";
    ctx.fillStyle = "#444";
    ctx.fillText("taskiap.com", W/2, H*0.85);
    ctx.restore();
    return;
  }

  // Trail
  for (var t = 0; t < player.trail.length; t++) {
    var tr = player.trail[t];
    if (tr.life <= 0) continue;
    ctx.globalAlpha = tr.life * 0.4;
    ctx.fillStyle = neon;
    ctx.shadowColor = neon;
    ctx.shadowBlur = 6;
    var ts = player.size * tr.life * 0.5;
    ctx.fillRect(tr.x - ts/2, tr.y - ts/2, ts, ts);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Obstacles
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (o.type === "spike") {
      ctx.fillStyle = "#ff2244";
      ctx.shadowColor = "#ff2244";
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y);
      ctx.lineTo(o.x + o.w/2, o.y - o.h);
      ctx.lineTo(o.x + o.w, o.y);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#ff6677";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else if (o.type === "saw") {
      ctx.save();
      ctx.translate(o.x + o.w/2, o.y - o.h/2);
      ctx.rotate(o.rot);
      ctx.fillStyle = "#ff4400";
      ctx.shadowColor = "#ff4400";
      ctx.shadowBlur = 8;
      ctx.beginPath();
      for (var tooth = 0; tooth < 8; tooth++) {
        var angle = (tooth/8)*Math.PI*2;
        var r1 = o.w/2;
        var r2 = o.w/2 + 6;
        ctx.lineTo(Math.cos(angle)*r2, Math.sin(angle)*r2);
        var mid = angle + Math.PI/8;
        ctx.lineTo(Math.cos(mid)*r1, Math.sin(mid)*r1);
      }
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#ff8844";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = "#220800";
      ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
      ctx.restore();
    } else {
      // Block
      ctx.fillStyle = "#2a2a4a";
      ctx.shadowColor = neon;
      ctx.shadowBlur = 4;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = neon;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 0.5;
      ctx.strokeRect(o.x+4, o.y+4, o.w-8, o.h-8);
    }
  }

  // Orbs (pulse to beat)
  var orbPulse = beatFlash > 0.05 ? 3 : 0;
  for (var i = 0; i < orbs.length; i++) {
    var o = orbs[i];
    if (o.collected) continue;
    ctx.fillStyle = neon;
    ctx.shadowColor = neon;
    ctx.shadowBlur = 12;
    var orbRadius = 8 + Math.sin(frame * 0.1) * 2 + orbPulse;
    ctx.beginPath();
    ctx.arc(o.x, o.y, orbRadius, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(o.x-2, o.y-2, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // Player
  ctx.save();
  ctx.translate(player.x + player.size/2, player.y + player.size/2);
  ctx.rotate(player.rotation);
  ctx.scale(pulseScale, pulseScale);
  ctx.fillStyle = neon;
  ctx.shadowColor = neon;
  ctx.shadowBlur = 12;
  ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fillRect(-player.size/2+3, -player.size/2+3, player.size-6, player.size/2-3);
  ctx.strokeStyle = "rgba(255,255,255,0.4)";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
  ctx.restore();

  // Particles
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 4;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Combo floating texts
  for (var ct = 0; ct < comboTexts.length; ct++) {
    var ctxt = comboTexts[ct];
    ctx.globalAlpha = ctxt.life;
    ctx.font = "bold 18px monospace";
    ctx.fillStyle = ctxt.color;
    ctx.shadowColor = ctxt.color;
    ctx.shadowBlur = 8;
    ctx.textAlign = "center";
    ctx.fillText(ctxt.text, ctxt.x, ctxt.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // Near-miss flash overlay
  if (nearMissFlash > 0) {
    ctx.fillStyle = "rgba(255,255,255," + (nearMissFlash * 0.18) + ")";
    ctx.fillRect(-20, -20, W+40, H+40);
    if (nearMissFlash > 0.5) {
      ctx.globalAlpha = (nearMissFlash - 0.5) * 2;
      ctx.font = "bold 14px monospace";
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.fillText("CLOSE!", player.x + player.size/2, player.y - 20);
      ctx.globalAlpha = 1;
    }
  }

  // Checkpoint flash overlay
  if (checkpointFlash > 0) {
    ctx.fillStyle = "rgba(34,255,136," + (checkpointFlash * 0.12) + ")";
    ctx.fillRect(-20, -20, W+40, H+40);
    if (checkpointFlash > 0.5) {
      ctx.globalAlpha = (checkpointFlash - 0.5) * 2;
      ctx.font = "bold 16px monospace";
      ctx.fillStyle = "#22ff88";
      ctx.textAlign = "center";
      ctx.shadowColor = "#22ff88";
      ctx.shadowBlur = 10;
      ctx.fillText("CHECKPOINT!", W/2, H*0.15);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }

  // HUD
  ctx.font = "bold 20px monospace";
  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";
  ctx.shadowColor = neon;
  ctx.shadowBlur = 6;
  ctx.fillText(score, W/2, 36);
  ctx.shadowBlur = 0;

  // Combo display in HUD
  if (comboCount > 1) {
    ctx.font = "bold 14px monospace";
    ctx.fillStyle = NEON_COLORS[neonIdx];
    ctx.shadowColor = NEON_COLORS[neonIdx];
    ctx.shadowBlur = 6;
    ctx.fillText("COMBO x" + comboCount, W/2, 56);
    ctx.shadowBlur = 0;
  }

  // Death counter (top-right)
  ctx.font = "11px monospace";
  ctx.fillStyle = "#666";
  ctx.textAlign = "right";
  ctx.fillText("Attempts: " + deathCount, W - 16, 24);
  ctx.textAlign = "center";

  // Checkpoint indicator (top-left)
  if (lastCheckpoint > 0) {
    ctx.font = "11px monospace";
    ctx.fillStyle = "#22ff88";
    ctx.textAlign = "left";
    ctx.fillText("CP: " + lastCheckpoint, 16, 24);
    ctx.textAlign = "center";
  }

  // Song indicator (top-left, below CP)
  if (musicPlaying) {
    ctx.font = "10px monospace";
    ctx.fillStyle = "#555";
    ctx.textAlign = "left";
    ctx.fillText(SONGS[currentSongIndex].name, 16, 38);
    ctx.textAlign = "center";
  }

  // Percentage bar
  var pct = Math.min(1, distance / 5000);
  ctx.fillStyle = "rgba(255,255,255,0.08)";
  ctx.fillRect(20, H-20, W-40, 4);
  ctx.fillStyle = neon;
  ctx.shadowColor = neon;
  ctx.shadowBlur = 4;
  ctx.fillRect(20, H-20, (W-40)*pct, 4);
  ctx.shadowBlur = 0;

  // Dead screen
  if (STATE === "dead") {
    ctx.fillStyle = "rgba(0,0,0,0.65)";
    ctx.fillRect(-20,-20,W+40,H+40);
    ctx.textAlign = "center";
    ctx.font = "bold 28px monospace";
    ctx.fillStyle = "#ff2244";
    ctx.shadowColor = "#ff2244";
    ctx.shadowBlur = 12;
    var DEATH_MSGS=["CRASHED","SPLAT","OOF","CUBE DOWN","RIP CUBE","GEOMETRY DASHED","SKILL ISSUE","NOT THE SPIKES","CUBED","DESTROYED"];
    ctx.fillText(DEATH_MSGS[deathCount%DEATH_MSGS.length], W/2, H*0.28);
    ctx.shadowBlur = 0;
    ctx.font = "32px serif";
    var DEATH_EMOJIS=["\u{1F4A5}\u{1F7E6}\u{1F4A5}","\u{1FAA6}\u{1F7E6}\u{1FAA6}","\u{1F62D}\u{1F7E6}\u{1F62D}","\u{1F480}\u{1F7E6}\u{1F480}","\u{1F525}\u{1F7E6}\u{1F525}"];
    ctx.fillText(DEATH_EMOJIS[deathCount%DEATH_EMOJIS.length], W/2, H*0.38);
    ctx.font = "bold 18px monospace";
    ctx.fillStyle = neon;
    ctx.fillText("Score: " + score, W/2, H*0.50);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = "#22c55e";
      ctx.font = "13px monospace";
      ctx.fillText("NEW BEST!", W/2, H*0.56);
    } else {
      ctx.font = "13px monospace";
      ctx.fillStyle = "#888";
      ctx.fillText("Best: " + highScore, W/2, H*0.56);
    }
    ctx.fillStyle = "#ff4466";
    ctx.font = "12px monospace";
    ctx.fillText("Attempt #" + deathCount, W/2, H*0.63);
    if (lastCheckpoint > 0) {
      ctx.fillStyle = "#22ff88";
      ctx.font = "11px monospace";
      ctx.fillText("Restart from checkpoint: " + lastCheckpoint, W/2, H*0.68);
    }
    ctx.font = "12px monospace";
    ctx.fillStyle = "#666";
    ctx.fillText("Tap to continue", W/2, H*0.76);
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
