// ── WebGL Confetti
var confettiParts = [];
var confettiCtx = null;
var confettiAnim = null;
function initConfetti() {
  var c = document.getElementById("confetti");
  c.width = window.innerWidth; c.height = window.innerHeight;
  confettiCtx = c.getContext("2d");
}
function spawnConfetti() {
  initConfetti();
  var colors = ["#4ade80","#facc15","#60a5fa","#f472b6","#a78bfa","#fb923c"];
  for (var i = 0; i < 120; i++) {
    confettiParts.push({
      x: Math.random() * window.innerWidth,
      y: -20 - Math.random() * 200,
      w: 6 + Math.random() * 6,
      h: 4 + Math.random() * 4,
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1
    });
  }
  if (!confettiAnim) animateConfetti();
}
function animateConfetti() {
  if (!confettiCtx) return;
  confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  confettiParts = confettiParts.filter(function(p) { return p.life > 0; });
  confettiParts.forEach(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.rotV; p.life -= 0.005;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    confettiCtx.globalAlpha = p.life;
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    confettiCtx.restore();
  });
  if (confettiParts.length > 0) { confettiAnim = requestAnimationFrame(animateConfetti); }
  else { confettiAnim = null; confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); }
}

// ── Sound
var audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, type, vol) {
  try {
    var ctx = getAudio(); var osc = ctx.createOscillator(); var gain = ctx.createGain();
    osc.type = type || "sine"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function sndType() { playTone(660, 0.03, "square", 0.02); }
function sndFlip(i) { playTone(350 + i * 50, 0.1, "triangle", 0.04); }
function sndWin() { [523,659,784,1047].forEach(function(f,i) { setTimeout(function(){playTone(f,0.3,"sine",0.07);},i*90); }); }
function sndLose() { [280,220,180].forEach(function(f,i) { setTimeout(function(){playTone(f,0.35,"sawtooth",0.03);},i*160); }); }
function sndError() { playTone(140, 0.12, "square", 0.04); }

// ── Giphy
function fetchGif(tag) {
  return fetch("https://api.giphy.com/v1/gifs/random?api_key=dc6zaTOxFJmzC&tag="+encodeURIComponent(tag)+"&rating=g")
    .then(function(r){return r.json();})
    .then(function(d){return d.data&&d.data.images&&d.data.images.fixed_height?d.data.images.fixed_height.url:null;})
    .catch(function(){return null;});
}

// ── Color
function getColor(letter, idx, answer) {
  if (answer[idx] === letter) return "green";
  if (answer.includes(letter)) return "yellow";
  return "gray";
}
function colorVar(c) { return c==="green"?"var(--green)":c==="yellow"?"var(--yellow)":"var(--gray)"; }
function colorBg(c) { return c==="green"?"var(--green-d)":c==="yellow"?"var(--yellow-d)":"var(--gray)"; }

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Share
function shareResult(guesses, answer, starter, won) {
  var rows = guesses.map(function(g) {
    var line = "";
    for (var i = 0; i < 5; i++) {
      if (answer[i] === g[i]) line += "\u{1F7E9}";
      else if (answer.includes(g[i])) line += "\u{1F7E8}";
      else line += "\u{2B1B}";
    }
    return line;
  });
  var text = "Wrefle " + (won ? guesses.length : "X") + "/7 (" + starter.name + ")\n" + rows.join("\n") + "\ntaskiap.com";
  if (navigator.share) { navigator.share({ text: text }); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(text); return "Copied to clipboard!"; }
  return "Shared!";
}

// ── Picker
function PickerScreen(props) {
  var stats = props.stats;
  var [lobbyGif, setLobbyGif] = useState(null);

}

// ── Game
function Game(props) {
  var starter = props.starter;
  var stats = props.stats;
  var answerRef = useRef(pickAnswer());
  var answer = answerRef.current;
  var [guesses, setGuesses] = useState([starter.code]);
  var [current, setCurrent] = useState("");
  var [gameOver, setGameOver] = useState(false);
  var [message, setMessage] = useState("");
  var [shakeRow, setShakeRow] = useState(-1);
  var [flipRow, setFlipRow] = useState(-1);
  var [bounceRow, setBounceRow] = useState(-1);
  var [catMood, setCatMood] = useState("think");
  var [gif, setGif] = useState(null);
  var [showStats, setShowStats] = useState(false);
  var [revealedRows, setRevealedRows] = useState([true]);

  useEffect(function(){
    if(starter.code===answer){
      setGameOver(true);setMessage("WHAT. First try?! Jackson fainted.");setCatMood("scream");sndWin();spawnConfetti();
      var s={played:stats.played+1,won:stats.won+1,streak:stats.streak+1,maxStreak:Math.max(stats.maxStreak,stats.streak+1)};
      saveStats(s);setShowStats(true);fetchGif("cat mind blown").then(setGif);
    } else {
      setFlipRow(0);
      for(var i=0;i<5;i++)(function(j){setTimeout(function(){sndFlip(j);},j*70);})(i);
    }
  },[]);

  var submit = function(){
    if(current.length!==5){setShakeRow(guesses.length);sndError();setTimeout(function(){setShakeRow(-1);},500);return;}
    var guess=current.toUpperCase();
    if(guess==="MEOWS"){setMessage("Jackson says hi! 😺 ...but that's not the answer.");setCatMood("love");fetchGif("cat meowing").then(setGif);setShakeRow(guesses.length);setTimeout(function(){setShakeRow(-1);setMessage("");},2500);return;}
    if(guess==="CATTY"){setMessage("Jackson takes that personally.");setCatMood("smirk");}
    if(!DICT.has(guess)){setMessage(pick(INVALID_MSGS));setShakeRow(guesses.length);sndError();setTimeout(function(){setShakeRow(-1);setMessage("");},2000);return;}
    var next=guesses.concat([guess]);
    setGuesses(next);setCurrent("");setFlipRow(next.length-1);
    for(var i=0;i<5;i++)(function(j){setTimeout(function(){sndFlip(j);},j*70);})(i);
    setTimeout(function(){setRevealedRows(function(r){var n=r.slice();n[next.length-1]=true;return n;});},400);

    if(guess===answer){
      setTimeout(function(){
        var newStreak = stats.streak+1;
        var msg = STREAK_MSGS[newStreak] || pick(WIN_MSGS);
        setGameOver(true);setMessage(msg);setCatMood("happy");setBounceRow(next.length-1);sndWin();spawnConfetti();
        var s={played:stats.played+1,won:stats.won+1,streak:newStreak,maxStreak:Math.max(stats.maxStreak,newStreak)};
        saveStats(s);setShowStats(true);
        var gifTag = newStreak>=5?"cat partying hard":newStreak>=3?"cat dancing":"cat celebration happy";
        fetchGif(gifTag).then(setGif);
      },500);
    } else if(next.length>=ROWS){
      setTimeout(function(){
        setGameOver(true);setMessage(pick(LOSE_MSGS)+" ("+answer+")");setCatMood("sad");sndLose();
        var s={played:stats.played+1,won:stats.won,streak:0,maxStreak:stats.maxStreak};
        saveStats(s);setShowStats(true);fetchGif("cat disappointed dramatic").then(setGif);
      },500);
    } else {
      var greens=0;var yellows=0;
      for(var gi=0;gi<5;gi++){if(answer[gi]===guess[gi])greens++;else if(answer.includes(guess[gi]))yellows++;}
      if(greens>=3){setCatMood("happy");setMessage(pick(CLOSE_MSGS));fetchGif("cat excited screaming").then(setGif);setTimeout(function(){setMessage("");},2500);}
      else if(greens===0&&yellows===0){setCatMood("shock");setMessage(pick(MISS_MSGS));fetchGif("cat confused staring").then(setGif);setTimeout(function(){setMessage("");},2500);}
      else if(greens===0&&yellows>=2){setCatMood("think");setMessage("Letters are there... just scrambled!");setGif(null);setTimeout(function(){setMessage("");},2000);}
      else{setCatMood("neutral");setGif(null);}
    }
  };

  var onKey = function(key){
    if(gameOver)return;
    if(key==="ENTER")return submit();
    if(key==="BACKSPACE")return setCurrent(function(c){return c.slice(0,-1);});
    if(/^[A-Z]$/.test(key)&&current.length<5){setCurrent(function(c){return c+key;});sndType();}
  };

  useEffect(function(){
    var handler=function(e){
      if(e.ctrlKey||e.metaKey)return;
      var k=e.key.toUpperCase();
      if(k==="ENTER"||k==="BACKSPACE"||(/^[A-Z]$/.test(k)&&k.length===1)){e.preventDefault();onKey(k);}
    };
    window.addEventListener("keydown",handler);
    return function(){window.removeEventListener("keydown",handler);};
  });

  var usedColors={};
  guesses.forEach(function(g,ri){
    if(!revealedRows[ri])return;
    for(var i=0;i<5;i++){
      if(!g[i])return;
      var c=getColor(g[i],i,answer);
      var prev=usedColors[g[i]];
      if(c==="green"||!prev)usedColors[g[i]]=c;
      else if(c==="yellow"&&prev!=="green")usedColors[g[i]]=c;
    }
  });

  var vw=window.innerWidth;
  var vh=window.innerHeight;
  var cellSize=Math.min(58,Math.floor((vw-44)/5),Math.floor((vh-320)/(ROWS+1)));
  var gap=4;
  var keyH=56;
  var keyW=Math.max(32,Math.min(40,Math.floor((vw-44)/10)));

  var kbRows=["QWERTYUIOP".split(""),"ASDFGHJKL".split(""),["ZXCVBNM".split("").concat(["DEL"])].flat()];

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 4px 0",overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,width:"100%",maxWidth:380,padding:"4px 6px",marginBottom:4}}>
        <Jackson mood={catMood} size="1.3rem"/>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,letterSpacing:"0.06em",background:"linear-gradient(90deg,var(--green),var(--yellow))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>WREFLE</span>
        <span style={{fontSize:"0.55rem",color:"var(--dim)",fontFamily:"var(--font-mono)",marginLeft:"auto"}}>{starter.name} · {guesses.length}/{ROWS}</span>
      </div>

      {/* Message */}
      {message&&<div style={{fontFamily:"var(--font-mono)",fontSize:"0.82rem",margin:"2px 0",padding:"4px 14px",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,fontWeight:700}}>{message}</div>}

      {/* Grid */}
      <div style={{display:"flex",flexDirection:"column",gap:gap,margin:"8px 0",flex:"0 0 auto"}}>
        {Array.from({length:ROWS}).map(function(_,row){
          var guess=guesses[row];
          var isCurrentRow=row===guesses.length&&!gameOver;
          return(
            <div key={row} className={shakeRow===row?"shake":bounceRow===row?"bounce":""} style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:gap}}>
              {Array.from({length:COLS}).map(function(_,col){
                var letter="";var bg="transparent";var border="2px solid var(--border)";var color="var(--text)";
                if(guess){
                  letter=guess[col];
                  var c=getColor(letter,col,answer);
                  bg=colorBg(c);border="2px solid "+colorVar(c);color=colorVar(c);
                } else if(isCurrentRow&&current[col]){
                  letter=current[col];border="2px solid var(--dim)";
                }
                return(
                  <div key={col} className={flipRow===row&&guess?"flip":(isCurrentRow&&current.length===col+1?"pop":"")}
                    style={{width:cellSize,height:cellSize,display:"flex",alignItems:"center",justifyContent:"center",fontSize:(cellSize*0.5)+"px",fontWeight:800,fontFamily:"var(--font-mono)",background:bg,border:border,borderRadius:6,color:color,animationDelay:guess?(col*0.08)+"s":"0s",textTransform:"uppercase",transition:"background 0.3s"}}>
                    {letter}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Gif */}
      {gif&&<img src={gif} alt="" style={{width:180,height:130,objectFit:"cover",borderRadius:12,margin:"6px 0",border:"2px solid var(--border)",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}/>}

      {/* Stats */}
      {showStats&&(
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"6px 12px",margin:"4px 0",display:"flex",gap:12,fontSize:"0.62rem",fontFamily:"var(--font-mono)",color:"var(--dim)"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:"0.95rem",color:"var(--text)",fontWeight:700}}>{stats.played+1}</div>played</div>
          <div style={{textAlign:"center"}}><div style={{fontSize:"0.95rem",color:"var(--text)",fontWeight:700}}>{Math.round((stats.won+(guesses[guesses.length-1]===answer?1:0))/(stats.played+1)*100)}%</div>win</div>
          <div style={{textAlign:"center"}}><div style={{fontSize:"0.95rem",color:"var(--green)",fontWeight:700}}>{guesses[guesses.length-1]===answer?stats.streak+1:0}</div>streak</div>
        </div>
      )}

      {/* Play Again + Share */}
      {gameOver&&(
        <div style={{display:"flex",gap:8,margin:"4px 0"}}>
          <button onClick={props.onDone} style={{background:"var(--green-d)",border:"2px solid var(--green)",borderRadius:8,padding:"10px 24px",color:"var(--green)",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,cursor:"pointer",animation:"glow 2s infinite"}}>PLAY AGAIN</button>
          <button onClick={function(){var r=shareResult(guesses,answer,starter,guesses[guesses.length-1]===answer);if(r)setMessage(r);setTimeout(function(){setMessage("");},2000);}} style={{background:"var(--bg3)",border:"2px solid var(--border)",borderRadius:8,padding:"10px 18px",color:"var(--text)",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,cursor:"pointer"}}>SHARE 📋</button>
        </div>
      )}

      {/* Keyboard */}
      <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"center",marginTop:"auto",paddingBottom:6,width:"100%",maxWidth:500}}>
        {kbRows.map(function(row,ri){return(
          <div key={ri} style={{display:"flex",gap:4,justifyContent:"center",width:"100%"}}>
            {row.map(function(k){
              var isWide=k==="DEL";
              var c=usedColors[k];
              var bg=c?colorBg(c):"var(--key)";
              var clr=c?colorVar(c):"var(--text)";
              if(isWide){bg="#dc2626";clr="#fff";}
              return(
                <button key={k} onClick={function(){onKey(k==="DEL"?"BACKSPACE":k);}}
                  style={{flex:isWide?"1.5":"1",maxWidth:isWide?keyW*2:keyW,height:keyH,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,fontSize:isWide?"0.72rem":"0.9rem",fontWeight:700,fontFamily:"var(--font-mono)",cursor:"pointer",border:"none",background:bg,color:clr,transition:"all 0.15s"}}>
                  {isWide?"⌫":k}
                </button>
              );
            })}
          </div>
        );})}
        {/* Big ENTER */}
        <button onClick={function(){onKey("ENTER");}} style={{width:"100%",maxWidth:340,height:keyH+4,borderRadius:8,fontSize:"1rem",fontWeight:800,fontFamily:"var(--font-mono)",letterSpacing:"0.15em",cursor:"pointer",border:"2px solid var(--green)",background:"var(--green-d)",color:"var(--green)",marginTop:2,transition:"all 0.15s"}}
          onMouseDown={function(e){e.currentTarget.style.transform="scale(0.97)";}}
          onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}}
          onTouchStart={function(e){e.currentTarget.style.transform="scale(0.97)";}}
          onTouchEnd={function(e){e.currentTarget.style.transform="scale(1)";}}>
          ENTER
        </button>
      </div>
    </div>
  );
}

// ── Root
function App(){
  var [starter,setStarter]=useState(null);
  var [stats,setStats]=useState(loadStats);
  var [key,setKey]=useState(0);
  var reset=function(){setStarter(null);setStats(loadStats());setKey(function(k){return k+1;});};
  if(!starter)return <PickerScreen onPick={setStarter} stats={stats}/>;
  return <Game key={key} starter={starter} onDone={reset} stats={stats}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <div style="position:fixed;bottom:2px;right:4px;font-size:0.5rem;color:#333;font-family:monospace">build-20260517-5</div>
</body>
</html>
