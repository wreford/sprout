<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Confined Space Entry Permit</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:900px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.3em;margin:8px 0 10px}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}.field{flex:1;min-width:140px}
label{display:block;font-size:12px;color:var(--dim);margin-bottom:2px}
input,select,textarea{width:100%;padding:7px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:13px}
button{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;margin:4px 2px}
button:hover{opacity:.85}
h2{font-size:1em;color:var(--accent);margin:14px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.gauges{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:10px 0}
.gauge-wrap{text-align:center}
canvas.gauge{width:120px;height:120px}
.gauge-val{font-size:1.2em;font-weight:700;margin-top:-10px}
.gauge-lbl{font-size:11px;color:var(--dim)}
.chk{display:flex;align-items:center;gap:6px;font-size:13px;padding:3px 0}
.chk input{width:auto}
.log-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.log-table th,.log-table td{padding:5px 8px;border:1px solid var(--border);text-align:left}
.log-table th{background:var(--bg2);color:var(--dim)}
.permits{margin:10px 0}.permit-btn{display:block;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin:4px 0;cursor:pointer;font-size:13px;text-align:left;color:var(--text);width:100%}
.permit-btn:hover{border-color:var(--accent)}
.ref{font-size:11px;color:var(--dim);margin-top:12px}
@media print{button,.no-print{display:none!important}body{color:#000;background:#fff}input,select,textarea{border:1px solid #999;background:#fff;color:#000}}
</style></head><body>
<a href="index.html" class="home">← home</a>
<h1>Confined Space Entry Permit</h1>
<div class="no-print"><button onclick="newPermit()">New Permit</button><button onclick="window.print()">Print Permit</button></div>
<div class="permits no-print" id="saved"></div>
<div id="permit">
<h2>Space Identification</h2>
<div class="row">
 <div class="field"><label>Space ID</label><input id="spaceId" placeholder="CS-001"></div>
 <div class="field"><label>Location</label><input id="loc" placeholder="Building A, Level B1"></div>
 <div class="field"><label>Date</label><input id="pdate" type="date"></div>
</div>
<div class="row">
 <div class="field"><label>Purpose of Entry</label><input id="purpose" placeholder="Inspect sump pit"></div>
 <div class="field"><label>Communication Method</label><select id="comm"><option>Voice</option><option>Radio</option><option>Hand signals</option><option>Hardwired comm</option></select></div>
</div>
<h2>Personnel</h2>
<div class="row">
 <div class="field"><label>Entrant</label><input id="entrant"></div>
 <div class="field"><label>Attendant</label><input id="attendant"></div>
 <div class="field"><label>Entry Supervisor</label><input id="supervisor"></div>
</div>
<h2>Atmospheric Monitoring</h2>
<div class="gauges" id="gauges">
 <div class="gauge-wrap"><canvas class="gauge" id="g_o2" width="240" height="240"></canvas><div class="gauge-val" id="v_o2">20.9%</div><div class="gauge-lbl">Oxygen (O₂)</div>
  <input type="range" min="0" max="25" step="0.1" value="20.9" oninput="updateGas('o2',this.value)" style="width:110px"></div>
 <div class="gauge-wrap"><canvas class="gauge" id="g_lel" width="240" height="240"></canvas><div class="gauge-val" id="v_lel">0%</div><div class="gauge-lbl">LEL</div>
  <input type="range" min="0" max="100" step="1" value="0" oninput="updateGas('lel',this.value)" style="width:110px"></div>
 <div class="gauge-wrap"><canvas class="gauge" id="g_co" width="240" height="240"></canvas><div class="gauge-val" id="v_co">0 ppm</div><div class="gauge-lbl">CO</div>
  <input type="range" min="0" max="200" step="1" value="0" oninput="updateGas('co',this.value)" style="width:110px"></div>
 <div class="gauge-wrap"><canvas class="gauge" id="g_h2s" width="240" height="240"></canvas><div class="gauge-val" id="v_h2s">0 ppm</div><div class="gauge-lbl">H₂S</div>
  <input type="range" min="0" max="50" step="0.5" value="0" oninput="updateGas('h2s',this.value)" style="width:110px"></div>
</div>
<h2>Rescue Plan</h2>
<div class="chk"><input type="checkbox" id="r1"><label for="r1">Rescue team on standby / notified</label></div>
<div class="chk"><input type="checkbox" id="r2"><label for="r2">Retrieval system in place (tripod + winch)</label></div>
<div class="chk"><input type="checkbox" id="r3"><label for="r3">SCBA / airline available at entry point</label></div>
<div class="chk"><input type="checkbox" id="r4"><label for="r4">First aid kit present</label></div>
<div class="chk"><input type="checkbox" id="r5"><label for="r5">Communication tested</label></div>
<div class="chk"><input type="checkbox" id="r6"><label for="r6">Lockout/tagout complete</label></div>
<div class="chk"><input type="checkbox" id="r7"><label for="r7">Ventilation in operation</label></div>
<h2>Entry/Exit Log</h2>
<table class="log-table"><thead><tr><th>Name</th><th>Entry Time</th><th>Exit Time</th></tr></thead><tbody id="logBody"></tbody></table>
<div class="no-print"><button onclick="addLog()">+ Log Entry</button><button onclick="savePermit()">Save Permit</button></div>
</div>
<div class="ref">Per OHSA O. Reg. 632/05 — Confined Spaces</div>
<script>
const gasConfig={
 o2:{min:0,max:25,safe:[19.5,23.5],unit:'%',warn:18,danger:16},
 lel:{min:0,max:100,safe:[0,10],unit:'%',warn:10,danger:25},
 co:{min:0,max:200,safe:[0,25],unit:' ppm',warn:25,danger:50},
 h2s:{min:0,max:50,safe:[0,10],unit:' ppm',warn:10,danger:15}
};
let gasVals={o2:20.9,lel:0,co:0,h2s:0};
let logEntries=[];
let permits=JSON.parse(localStorage.getItem('cs_permits')||'[]');

document.getElementById('pdate').value=new Date().toISOString().slice(0,10);

function updateGas(gas,val){
 gasVals[gas]=+val;
 const cfg=gasConfig[gas];
 document.getElementById('v_'+gas).textContent=val+cfg.unit;
 drawGauge(gas);
}

function drawGauge(gas){
 const c=document.getElementById('g_'+gas),ctx=c.getContext('2d');
 const cfg=gasConfig[gas];const val=gasVals[gas];
 ctx.clearRect(0,0,240,240);
 const cx=120,cy=130,r=90;
 const startA=Math.PI*0.8,endA=Math.PI*2.2;
 // Background arc
 ctx.beginPath();ctx.arc(cx,cy,r,startA,endA);ctx.strokeStyle='#2a2a2d';ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
 // Safe zone (green)
 const safeStart=startA+(cfg.safe[0]-cfg.min)/(cfg.max-cfg.min)*(endA-startA);
 const safeEnd=startA+(cfg.safe[1]-cfg.min)/(cfg.max-cfg.min)*(endA-startA);
 ctx.beginPath();ctx.arc(cx,cy,r,safeStart,safeEnd);ctx.strokeStyle='rgba(74,222,128,0.3)';ctx.lineWidth=16;ctx.stroke();
 // Value arc
 const valA=startA+(val-cfg.min)/(cfg.max-cfg.min)*(endA-startA);
 const inSafe=val>=cfg.safe[0]&&val<=cfg.safe[1];
 const inDanger=gas==='o2'?val<cfg.danger:val>cfg.danger;
 const color=inSafe?'#4ade80':inDanger?'#ef4444':'#f59e0b';
 ctx.beginPath();ctx.arc(cx,cy,r,startA,valA);ctx.strokeStyle=color;ctx.lineWidth=16;ctx.lineCap='round';ctx.stroke();
 // Needle
 const nx=cx+70*Math.cos(valA),ny=cy+70*Math.sin(valA);
 ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nx,ny);ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
 ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
 // Status text
 ctx.fillStyle=color;ctx.font='bold 12px system-ui';ctx.textAlign='center';
 ctx.fillText(inSafe?'SAFE':inDanger?'DANGER':'WARNING',cx,cy+50);
}

function addLog(){
 const name=prompt('Entrant name:');if(!name)return;
 const now=new Date().toTimeString().slice(0,5);
 logEntries.push({name,entry:now,exit:''});renderLog();
}
function exitLog(i){logEntries[i].exit=new Date().toTimeString().slice(0,5);renderLog();}
function renderLog(){
 const tb=document.getElementById('logBody');tb.innerHTML='';
 logEntries.forEach((l,i)=>{
  tb.innerHTML+=`<tr><td>${l.name}</td><td>${l.entry}</td><td>${l.exit||`<button class="no-print" onclick="exitLog(${i})" style="padding:2px 8px;font-size:11px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer">Exit Now</button>`}</td></tr>`;
 });
}

function savePermit(){
 const p={id:Date.now(),spaceId:document.getElementById('spaceId').value,loc:document.getElementById('loc').value,
  date:document.getElementById('pdate').value,purpose:document.getElementById('purpose').value,
  entrant:document.getElementById('entrant').value,attendant:document.getElementById('attendant').value,
  supervisor:document.getElementById('supervisor').value,gas:{...gasVals},log:[...logEntries]};
 permits.push(p);localStorage.setItem('cs_permits',JSON.stringify(permits));renderSaved();
}
function newPermit(){
 ['spaceId','loc','purpose','entrant','attendant','supervisor'].forEach(id=>document.getElementById(id).value='');
 document.getElementById('pdate').value=new Date().toISOString().slice(0,10);
 logEntries=[];renderLog();gasVals={o2:20.9,lel:0,co:0,h2s:0};
 Object.keys(gasVals).forEach(g=>{updateGas(g,gasVals[g]);});
}
function renderSaved(){
 const d=document.getElementById('saved');
 d.innerHTML=permits.length?'<div style="font-size:12px;color:var(--dim);margin-bottom:4px">Saved Permits:</div>':'';
 permits.slice(-5).reverse().forEach(p=>{
  d.innerHTML+=`<button class="permit-btn">${p.date} — ${p.spaceId} ${p.loc} (${p.entrant})</button>`;
 });
}
Object.keys(gasVals).forEach(g=>drawGauge(g));
renderSaved();renderLog();
</script></body></html>
