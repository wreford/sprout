<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a10">
<meta name="description" content="Jimothy — the pet name generator with commentary. Swipe through names. Funny and factual.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jimothy">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,600;1,9..144,900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff375f'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='19' font-family='serif' fill='%23fff' font-weight='900' font-style='italic'%3EJ%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff375f'/%3E%3Cstop offset='1' stop-color='%23ffcc00'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='90' y='125' text-anchor='middle' font-size='120' font-family='serif' fill='%23fff' font-weight='900' font-style='italic'%3EJ%3C/text%3E%3C/svg%3E">
<title>Jimothy — the pet name generator</title>
<style>
:root{
  --bg:#0a0a10; --panel:#191926; --border:#26262e; --border2:#3a3a48;
  --text:#f5f5f7; --dim:#8a8a98; --dimmer:#5a5a68;
  --hot:#ff375f; --pink:#ff2d92; --amber:#ffcc00; --lime:#c8ff2f; --violet:#bf5af2; --green:#30d158;
  --disp:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;height:100%}
html,body{background:#000;color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;overflow:hidden}
body{position:fixed;inset:0;width:100%;height:100%}
button,a,input{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input{font-size:16px}

.feed{
  position:fixed;inset:0;z-index:1;
  overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  scroll-snap-type:y mandatory
}
.card{
  height:100vh;height:100dvh;width:100%;position:relative;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;justify-content:space-between;
  overflow:hidden;padding:0
}
.card .bg{position:absolute;inset:0;z-index:0}
.card .glow{
  position:absolute;inset:-20%;z-index:0;pointer-events:none;
  background:radial-gradient(45% 35% at 25% 30%,rgba(255,255,255,.18),transparent 55%),
             radial-gradient(45% 35% at 75% 75%,rgba(0,0,0,.22),transparent 55%)
}
.card .grain{
  position:absolute;inset:0;z-index:0;opacity:.06;pointer-events:none;
  background-image:radial-gradient(#fff 1px,transparent 1px),radial-gradient(#000 1px,transparent 1px);
  background-size:3px 3px,4px 4px;background-position:0 0,1.5px 1.5px;mix-blend-mode:overlay
}

.card .head{
  position:relative;z-index:2;
  padding:calc(env(safe-area-inset-top) + 60px) 24px 0;
  padding-left:calc(env(safe-area-inset-left) + 24px);
  padding-right:calc(env(safe-area-inset-right) + 24px);
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  animation:card-in .5s var(--ease) both
}
@keyframes card-in{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:none}
}
.chip{
  padding:6px 12px;background:rgba(0,0,0,.28);color:#fff;
  border:1px solid rgba(255,255,255,.28);border-radius:16px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;font-weight:700;text-transform:uppercase;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)
}
.card.dark .chip{background:rgba(0,0,0,.35);color:#fff;border-color:rgba(255,255,255,.28)}
.card.light .chip{background:rgba(255,255,255,.38);color:#111;border-color:rgba(0,0,0,.22)}

.card .core{
  position:relative;z-index:2;
  padding:20px 24px;
  padding-left:calc(env(safe-area-inset-left) + 24px);
  padding-right:calc(env(safe-area-inset-right) + 100px);
  display:flex;flex-direction:column;justify-content:center;flex:1;min-height:0;
  animation:core-in .6s var(--ease) .1s both
}
@keyframes core-in{
  from{opacity:0;transform:translateY(20px) scale(.985)}
  to{opacity:1;transform:none}
}
.name{
  font-family:var(--disp);font-weight:900;font-style:italic;
  font-size:clamp(58px,17vw,140px);line-height:.86;letter-spacing:-.04em;
  color:#fff;margin-bottom:22px;
  text-shadow:0 6px 40px rgba(0,0,0,.24);
  overflow-wrap:anywhere
}
.card.light .name{color:#0d0d18;text-shadow:0 2px 20px rgba(255,255,255,.4)}
.name .dot{color:currentColor;opacity:.4}

.quip{
  font-family:var(--disp);font-style:italic;font-weight:600;
  font-size:clamp(18px,3.6vw,26px);line-height:1.28;
  color:rgba(255,255,255,.94);margin-bottom:16px;max-width:38ch;
  text-shadow:0 2px 12px rgba(0,0,0,.34)
}
.card.light .quip{color:rgba(0,0,0,.88);text-shadow:none}

.fact{
  display:flex;gap:10px;align-items:flex-start;max-width:44ch;
  padding-left:12px;border-left:2px solid rgba(255,255,255,.32)
}
.card.light .fact{border-left-color:rgba(0,0,0,.32)}
.fact .k{
  font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:rgba(255,255,255,.72);
  text-transform:uppercase;font-weight:700;padding-top:1px;flex-shrink:0
}
.card.light .fact .k{color:rgba(0,0,0,.62)}
.fact .v{
  font-family:var(--mono);font-size:12.5px;line-height:1.5;color:rgba(255,255,255,.9);
  letter-spacing:.01em;font-weight:500
}
.card.light .fact .v{color:rgba(0,0,0,.85)}

.card .foot{
  position:relative;z-index:2;
  padding:12px 24px calc(env(safe-area-inset-bottom) + 26px);
  padding-left:calc(env(safe-area-inset-left) + 24px);
  padding-right:calc(env(safe-area-inset-right) + 100px);
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;
  color:rgba(255,255,255,.55);text-transform:uppercase;font-weight:600
}
.card.light .foot{color:rgba(0,0,0,.5)}
.card .foot b{color:rgba(255,255,255,.9)}
.card.light .foot b{color:rgba(0,0,0,.9)}

/* Side rail */
.side{
  position:absolute;z-index:3;
  right:max(14px,env(safe-area-inset-right));
  bottom:calc(env(safe-area-inset-bottom) + 100px);
  display:flex;flex-direction:column;gap:18px;align-items:center
}
.side .col{display:flex;flex-direction:column;align-items:center;gap:3px}
.side .act{
  width:54px;height:54px;border-radius:50%;
  background:rgba(20,20,26,.55);color:#fff;border:1.5px solid rgba(255,255,255,.18);
  font-size:22px;font-weight:600;
  backdrop-filter:blur(12px) saturate(1.5);-webkit-backdrop-filter:blur(12px) saturate(1.5);
  display:flex;align-items:center;justify-content:center;
  transition:transform .16s var(--ease),background .18s;
  box-shadow:0 4px 14px rgba(0,0,0,.32);cursor:pointer
}
.card.light .side .act{background:rgba(255,255,255,.5);color:#111;border-color:rgba(0,0,0,.16)}
.side .act:hover{transform:scale(1.08)}
.side .act:active{transform:scale(.94)}
.side .act.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent;color:#fff;animation:pump .4s var(--ease)}
@keyframes pump{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.94)}100%{transform:scale(1)}}
.side .lbl{
  font-family:var(--mono);font-size:9.5px;color:rgba(255,255,255,.85);
  margin-top:3px;letter-spacing:.05em;font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,.5)
}
.card.light .side .lbl{color:rgba(0,0,0,.75);text-shadow:0 1px 3px rgba(255,255,255,.4)}
@media(max-width:520px){
  .side{right:10px;bottom:calc(env(safe-area-inset-bottom) + 90px);gap:15px}
  .side .act{width:50px;height:50px;font-size:20px}
}

/* Top nav */
.top{
  position:fixed;top:0;left:0;right:0;z-index:110;
  padding:calc(env(safe-area-inset-top) + 10px) max(14px,env(safe-area-inset-right)) 12px max(14px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(180deg,rgba(0,0,0,.5),transparent);pointer-events:none
}
.top .l,.top .r{display:flex;align-items:center;gap:6px;pointer-events:auto}
.top .brand{
  color:#fff;font-family:var(--disp);font-weight:900;font-style:italic;font-size:19px;
  letter-spacing:-.02em;pointer-events:auto;text-shadow:0 2px 8px rgba(0,0,0,.55)
}
.top .brand .g{
  background:linear-gradient(120deg,#ff375f 0%,#ffcc00 45%,#30d158 80%,#bf5af2 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.tico{
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,20,26,.55);color:#fff;border:1px solid rgba(255,255,255,.14);
  font-size:15px;font-weight:600;
  backdrop-filter:blur(12px) saturate(1.5);cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:all .16s var(--ease);text-decoration:none
}
.tico:hover{background:var(--hot);border-color:transparent}
.tico.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent}
.tico .badge{
  position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;
  border-radius:9px;background:var(--hot);color:#fff;
  font-family:var(--mono);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:2px solid #000
}

.hint{
  position:fixed;top:calc(env(safe-area-inset-top) + 64px);left:50%;transform:translateX(-50%);
  z-index:105;pointer-events:none;
  padding:7px 16px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.14);
  border-radius:20px;color:rgba(255,255,255,.9);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
  backdrop-filter:blur(12px);
  animation:hintfade 4.5s ease-in forwards;opacity:0
}
@keyframes hintfade{0%{opacity:0}12%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* Sheets (filter, details) */
.sheet{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.72);display:none;align-items:flex-end;justify-content:center;padding:0}
.sheet.show{display:flex;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@media(min-width:640px){.sheet{align-items:center;padding:24px}}
.sheet-card{
  width:100%;max-width:520px;background:linear-gradient(180deg,var(--panel),#0f0f18);
  border:1px solid var(--border);border-radius:20px 20px 0 0;
  padding-bottom:calc(env(safe-area-inset-bottom) + 22px);
  max-height:90dvh;display:flex;flex-direction:column;
  transform:translateY(30px);animation:sheetup .32s var(--ease) forwards;
  box-shadow:0 -24px 60px rgba(0,0,0,.5);position:relative
}
@keyframes sheetup{to{transform:none}}
@media(min-width:640px){.sheet-card{border-radius:20px}}
.sheet-hdr{
  padding:16px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  border-bottom:1px solid var(--border);flex-shrink:0;position:relative
}
.sheet-hdr::before{
  content:"";position:absolute;top:6px;left:50%;transform:translateX(-50%);
  width:36px;height:4px;border-radius:2px;background:var(--border2)
}
.sheet-hdr .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);font-weight:600;text-transform:uppercase;margin-top:2px}
.sheet-hdr h3{font-family:var(--disp);font-weight:900;font-style:italic;font-size:20px;letter-spacing:-.01em}
.sheet-close{width:32px;height:32px;border-radius:9px;background:#22222e;border:1px solid var(--border);color:var(--dim);font-size:16px}
.sheet-close:hover{color:var(--hot);border-color:var(--hot)}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px 6px;flex:1;min-height:0}
.sheet-body::-webkit-scrollbar{width:5px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Filter chips */
.fsec{margin-bottom:20px}
.fsec h4{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--hot);
  text-transform:uppercase;font-weight:700;margin-bottom:10px
}
.fchips{display:flex;flex-wrap:wrap;gap:6px}
.fchip{
  padding:9px 13px;background:#12121a;border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.06em;font-weight:600;
  text-transform:uppercase;cursor:pointer;transition:all .12s var(--ease);min-height:40px
}
.fchip:hover{border-color:var(--border2)}
.fchip.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(255,55,95,.32)}
.fsheet-btns{display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-top:14px;padding:12px 0 6px;border-top:1px solid var(--border)}
.fsheet-btns button{padding:13px 10px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:11px;min-height:44px}
.fsheet-btns .clear{background:#22222e;border:1px solid var(--border);color:var(--text)}
.fsheet-btns .apply{background:linear-gradient(135deg,var(--hot),var(--pink));color:#fff;border:none}

/* Details sheet */
.det-hero{padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px}
.det-hero .n{font-family:var(--disp);font-weight:900;font-style:italic;font-size:34px;letter-spacing:-.03em;line-height:.95;margin-bottom:8px}
.det-hero .row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.det-hero .row .p{padding:4px 9px;background:#12121a;border:1px solid var(--border);border-radius:10px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--dim);text-transform:uppercase;font-weight:600}
.det-sec{margin-bottom:18px}
.det-sec h4{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--hot);text-transform:uppercase;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.det-sec h4::before{content:"◆";color:var(--hot);font-size:7px}
.det-sec p{font-family:var(--disp);font-style:italic;font-weight:600;font-size:16px;line-height:1.55;color:var(--text)}
.det-sec .fact-body{font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--dim);font-style:normal;letter-spacing:.01em}
.det-similar{display:flex;flex-wrap:wrap;gap:6px}
.det-similar button{padding:8px 12px;background:#12121a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--disp);font-weight:600;font-style:italic;font-size:14px;letter-spacing:-.005em;cursor:pointer}
.det-similar button:hover{border-color:var(--hot);color:var(--hot)}
.det-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 0 6px;border-top:1px solid var(--border);margin-top:6px}
.det-actions button{padding:12px 10px;background:#22222e;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;border-radius:10px;font-weight:600;min-height:44px}
.det-actions button:hover{border-color:var(--hot);color:var(--hot)}
.det-actions button.primary{background:linear-gradient(135deg,var(--hot),var(--pink));border:none;color:#fff;grid-column:1/-1}

/* Favs drawer */
.fdrawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:195;display:none}
.fdrawer-bg.show{display:block;animation:fadein .18s}
.fdrawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,100%);z-index:200;
  background:var(--panel);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .28s var(--ease);
  display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-right:env(safe-area-inset-right)}
.fdrawer.show{transform:translateX(0)}
.fdrawer .fhdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.fdrawer .fhdr h3{font-family:var(--disp);font-weight:900;font-style:italic;font-size:19px}
.fdrawer .fbody{flex:1;overflow-y:auto;padding:10px 12px}
.fdrawer .fempty{padding:44px 20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:11px;line-height:1.7;font-style:italic}
.fcard{display:flex;gap:12px;padding:12px;background:#12121a;border:1px solid var(--border);border-radius:11px;margin-bottom:6px;cursor:pointer;align-items:center;position:relative;transition:border-color .12s}
.fcard:hover{border-color:var(--hot)}
.fcard .sw{width:44px;height:44px;border-radius:10px;flex-shrink:0}
.fcard .info{flex:1;min-width:0}
.fcard .n{font-family:var(--disp);font-weight:900;font-style:italic;font-size:18px;letter-spacing:-.01em;margin-bottom:2px;line-height:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fcard .m{font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.fcard .rm{width:26px;height:26px;border-radius:50%;background:transparent;color:var(--dim);font-size:14px}
.fcard .rm:hover{background:var(--hot);color:#fff}
.fexp{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px}
.fexp button{flex:1;padding:9px;background:#22222e;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.fexp button:hover{border-color:var(--hot);color:var(--hot)}

/* Toast */
.toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 24px);left:50%;transform:translateX(-50%);
  z-index:250;padding:10px 18px;background:rgba(20,20,26,.95);color:#fff;
  border:1px solid var(--border2);border-radius:24px;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.4);
  animation:tin .3s var(--ease),tout .3s 1.9s var(--ease) forwards;pointer-events:none
}
@keyframes tin{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes tout{to{opacity:0;transform:translate(-50%,10px)}}

.heart-pop{
  position:absolute;transform:translate(-50%,-50%);color:var(--hot);
  font-size:130px;line-height:1;pointer-events:none;z-index:5;
  text-shadow:0 0 30px rgba(255,55,95,.7),0 8px 24px rgba(0,0,0,.5);
  animation:heart-fly .9s var(--ease) forwards
}
@keyframes heart-fly{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-8deg)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(6deg)}
  30%{transform:translate(-50%,-50%) scale(1) rotate(-4deg)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(.6) rotate(0)}
}
</style>
</head>
<body>

<div class="feed" id="feed"></div>

<nav class="top">
  <div class="l">
    <button class="tico" id="filter" title="Filter">⚙</button>
    <button class="tico" id="dice" title="Random surprise">⚄</button>
  </div>
  <div class="brand"><span class="g">Jimothy</span></div>
  <div class="r">
    <button class="tico fav" id="favs" title="Saved">♥<span class="badge" id="fav-badge" style="display:none">0</span></button>
  </div>
</nav>

<div class="hint" id="hint">↑ swipe for another name ↑</div>

<!-- Details sheet -->
<div class="sheet" id="det-sheet">
  <div class="sheet-card">
    <div class="sheet-hdr">
      <div style="flex:1;min-width:0">
        <div class="k">Name profile</div>
        <h3 id="det-title">Loading…</h3>
      </div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════
   THE NAMES.
   Each: name, quip (short witty), fact (real etymology / cultural note),
   species (subset of ['cat','dog','small','bird','fish','reptile','any']),
   category (one of the categories below).
   Facts are kept true and simple.
   ═══════════════════════════════════════════════════════════════════ */
const NAMES = [
// ── Classic ─────────────────────────────────────────────
{ name:'Rex', quip:"The name that shows up if you buy a dog and just Google 'good dog name'.", fact:"Latin for 'king'. Consistently in the top-50 US dog names since the 1930s.", species:['dog'], cat:'classic' },
{ name:'Whiskers', quip:"A cat named after the one feature every cat already has.", fact:"Cats' whiskers (vibrissae) are twice as thick as their fur and rooted three times deeper — they can sense air currents down to a millimeter.", species:['cat'], cat:'classic' },
{ name:'Buddy', quip:"You are legally required to say 'hey buddy' every time he looks at you.", fact:"Top-5 US dog name for two decades running. From Old Norse 'bróðir', literally 'brother'.", species:['dog'], cat:'classic' },
{ name:'Bella', quip:"Ninety percent chance she has a rhinestone collar.", fact:"Italian for 'beautiful'. The #1 female dog name in the US every year since 2015.", species:['dog','cat'], cat:'classic' },
{ name:'Max', quip:"A short, dependable name for a short, dependable creature.", fact:"Short for Maximilian, from the Latin 'maximus' — 'greatest'. Top-3 US male dog name since the 1990s.", species:['dog','cat'], cat:'classic' },
{ name:'Fluffy', quip:"Purely aspirational branding on the day you brought her home.", fact:"Old English 'flōh', a small tuft. As a name it emerged in the 1940s alongside Persian cats becoming a middle-class pet.", species:['cat','dog','small'], cat:'classic' },
{ name:'Charlie', quip:"Neutral, cheerful, hard to hate. The oat milk of pet names.", fact:"Old English via Old High German — 'free man'. Consistently the top gender-neutral pet name in the UK since 2018.", species:['dog','cat'], cat:'classic' },
{ name:'Luna', quip:"There are more cats named Luna than the moon has actual craters.", fact:"Roman goddess of the moon. Overtook 'Bella' as the top US cat name in 2021.", species:['cat','dog'], cat:'classic' },
{ name:'Ginger', quip:"An orange cat named for the reason he is orange. Efficient.", fact:"From Sanskrit 'shringavera', 'horn-shaped'. Also the name of Ginger Rogers, born Virginia in 1911.", species:['cat','dog'], cat:'classic' },
{ name:'Milo', quip:"You will call him Milo. Everyone else will hear 'Miles' and misspell it.", fact:"Germanic 'mild' — mild, peaceful. Popularised for cats by the 1986 Japanese film 'The Adventures of Milo and Otis'.", species:['cat','dog'], cat:'classic' },

// ── Human-sounding ──────────────────────────────────────
{ name:'Jimothy', quip:"The formal name your cat uses on legal documents. Jim is a nickname; Jimothy is who he becomes when he sees the vet bill.", fact:"A modern portmanteau of Jim + Timothy, popularised as a meme name for corporate-sounding pets in the 2010s.", species:['cat','dog','any'], cat:'human' },
{ name:'Kevin', quip:"You will love Kevin. Kevin will not love you back. Kevin has business elsewhere.", fact:"Irish 'Caoimhín' — 'gentle, kind'. St. Kevin of Glendalough (498-618 AD) supposedly stood so still praying that a blackbird nested in his hand.", species:['cat','dog','any'], cat:'human' },
{ name:'Barbara', quip:"She's disappointed in the food again.", fact:"Greek 'bárbaros' — 'foreign, non-Greek'. Peaked as a US baby name in 1937 at #2; virtually extinct by 2000.", species:['cat','dog'], cat:'human' },
{ name:'Steve', quip:"Everyone assumes Steve is a golden retriever. Steve is a chinchilla.", fact:"Short for Stephen, Greek 'stéphanos' — 'crown, garland'. Notable Steves include Jobs, Wonder, and Buscemi.", species:['any'], cat:'human' },
{ name:'Trevor', quip:"Trevor knows he wasn't invited but he's coming anyway.", fact:"Welsh 'tref-fawr' — 'big settlement'. Barely used in the US before 1980, then a top-100 name in the 1990s.", species:['dog'], cat:'human' },
{ name:'Doris', quip:"She rules the sofa with quiet, unshakable menace.", fact:"Greek 'Dōris' — 'gift'. In Greek myth, a sea nymph who mothered fifty daughters.", species:['cat'], cat:'human' },
{ name:'Gary', quip:"Gary was in the crate at the shelter marked 'Gary'. Nobody changed it.", fact:"Norman-French 'Geiraldus' — 'spear-ruler'. Peaked in the US in 1951; the town Gary, Indiana, is named for a US Steel executive.", species:['any'], cat:'human' },
{ name:'Deborah', quip:"'Debbie' is what her friends call her. She does not have friends.", fact:"Hebrew — 'bee'. A judge and prophetess in the Book of Judges (chapters 4-5).", species:['cat'], cat:'human' },
{ name:'Todd', quip:"Todd is judgmental about your other pets.", fact:"Middle English 'todde' — 'fox'. A regional English surname that only became a first name in the 20th century.", species:['dog','cat'], cat:'human' },
{ name:'Susan', quip:"She looks like she owns three cardigans and a small bookshop.", fact:"Hebrew 'shoshannah' — 'lily'. #1 US girls' name in 1957.", species:['cat'], cat:'human' },
{ name:'Colin', quip:"Sensible. Wears loafers, spiritually.", fact:"Gaelic 'Cailean' — 'whelp, young pup'. A rare case of a name literally meaning 'young dog'.", species:['dog'], cat:'human' },
{ name:'Linda', quip:"Not a Karen — that's a slur — but Linda-adjacent.", fact:"Spanish/Portuguese/Italian — 'pretty'. The most popular US baby girl name every year from 1947 to 1952.", species:['cat','dog'], cat:'human' },
{ name:'Brian', quip:"Brian doesn't fetch. Brian returns.", fact:"Old Celtic 'brígh' — 'high, noble'. Brian Boru (941-1014 AD) was the High King of Ireland.", species:['dog'], cat:'human' },
{ name:'Karen', quip:"We're not here to talk about Karen. Karen is a good cat.", fact:"Danish short form of Katherine, from Greek 'katharós' — 'pure'. Fell off the US top-1000 in 2018.", species:['cat'], cat:'human' },
{ name:'Nigel', quip:"He is the maître d' of the sofa cushions.", fact:"Latin 'Nigellus' — a diminutive of 'niger', black. Almost exclusively British; peaked in the UK in 1963.", species:['cat','dog'], cat:'human' },
{ name:'Cheryl', quip:"Cheryl brings her own energy to the room. It's a specific energy.", fact:"French form of Cherie, from Latin 'cara' — 'dear'. Coined in the 1920s, peaked in the 1950s.", species:['cat'], cat:'human' },
{ name:'Greg', quip:"Greg is not the alpha. Greg is the guy in accounting.", fact:"Short for Gregory, Greek 'grēgorós' — 'watchful, awake'. Sixteen popes have been named Gregory.", species:['any'], cat:'human' },
{ name:'Mildred', quip:"Mildred was rescued at 14. She has run this house since day one.", fact:"Old English 'milde' + 'thryth' — 'gentle strength'. St. Mildred of Thanet was a 7th-century abbess.", species:['cat'], cat:'human' },
{ name:'Derek', quip:"Derek does one bark per day. That's his budget.", fact:"Germanic 'Theodoric' — 'ruler of the people'. Same root as Dietrich, Terry, and Dirk.", species:['dog'], cat:'human' },
{ name:'Janet', quip:"Janet has opinions about the throw pillows.", fact:"Diminutive of Jane, from Hebrew 'Yohanan' — 'God is gracious'. Peaked in the US in 1941.", species:['cat'], cat:'human' },

// ── Food ────────────────────────────────────────────────
{ name:'Biscuit', quip:"Round, warm, delicious to look at, gets stolen from the counter.", fact:"From Latin 'bis coctus' — 'twice cooked'. British biscuits (US: cookies) originated as long-life ship rations.", species:['cat','dog'], cat:'food' },
{ name:'Miso', quip:"Salty, small, essential.", fact:"Fermented soybean paste; the word entered Japanese from Old Chinese around the 6th century.", species:['cat','small'], cat:'food' },
{ name:'Tofu', quip:"Soft. Silent. Somehow always in the way.", fact:"Chinese 'dòufǔ' — 'bean curd'. Invented in Han-dynasty China ~200 BC; the process was recorded by 1500 CE.", species:['cat','small'], cat:'food' },
{ name:'Wasabi', quip:"Small. Sharp. Will absolutely ruin your dinner party if you underestimate her.", fact:"Wasabia japonica takes 2-3 years to grow and grows almost exclusively in cold running stream water. Most 'wasabi' sold outside Japan is dyed horseradish.", species:['cat','dog','small'], cat:'food' },
{ name:'Cheese', quip:"A universal purchase-motivator.", fact:"Humans have been making cheese since around 5500 BC; the oldest known cheese was found in a Polish sieve fragment.", species:['dog','small'], cat:'food' },
{ name:'Nugget', quip:"Compact package of chaos.", fact:"'Nugget' likely comes from a dialectal English word 'nug' — a lump or block. The chicken variety was invented in 1963 by Cornell food scientist Robert Baker.", species:['cat','small','bird'], cat:'food' },
{ name:'Meatball', quip:"He is round. He knows.", fact:"Meatballs appear in the 4th-century Roman cookbook 'Apicius' — one of the earliest surviving recipe collections.", species:['cat','dog','small'], cat:'food' },
{ name:'Mochi', quip:"Squishy. Sticky. Impossible to say no to.", fact:"Japanese pounded-rice cake. In Japan, mochitsuki (mochi-pounding) is a New Year tradition dating to the Heian period (794-1185).", species:['cat','dog','small'], cat:'food' },
{ name:'Waffle', quip:"You can never tell what she wants and neither can she.", fact:"'Waffle' comes from Dutch 'wafel', ultimately from a Frankish root meaning 'honeycomb'. The waffle iron was patented in 1869.", species:['dog','cat'], cat:'food' },
{ name:'Pickle', quip:"Small, sour, oddly beloved.", fact:"Pickling is one of the oldest food preservation methods — Mesopotamian records mention cucumber pickles as early as 2400 BC.", species:['dog','cat','small','reptile'], cat:'food' },
{ name:'Noodle', quip:"Long. Floppy. Serves a purpose.", fact:"The oldest known noodles are 4,000-year-old millet noodles unearthed at Lajia in northwestern China in 2005.", species:['dog','cat'], cat:'food' },
{ name:'Kimchi', quip:"Comes with strong opinions about garlic.", fact:"Kimchi is Korea's national dish; UNESCO added kimjang, the collective kimchi-making tradition, to its Intangible Cultural Heritage list in 2013.", species:['cat','dog'], cat:'food' },
{ name:'Latte', quip:"Beige. Warm. Reliably delivered before noon.", fact:"'Caffè latte' literally means 'milk coffee' in Italian. The drink was named by a US critic in 1867 — Italians typically just say 'un caffè con latte'.", species:['cat','dog'], cat:'food' },
{ name:'Kiwi', quip:"Fuzzy, tropical, allegedly bird.", fact:"The kiwifruit was originally called 'Chinese gooseberry'; New Zealand exporters renamed it in 1959 after the flightless kiwi bird — which itself is named after a Māori onomatopoeia for its call.", species:['bird','cat','dog'], cat:'food' },
{ name:'Bean', quip:"Small. Dark. Rolls under the sofa.", fact:"Beans are among the oldest cultivated crops — evidence of common bean cultivation goes back 7,000 years in Peru.", species:['cat','small','dog'], cat:'food' },
{ name:'Peanut', quip:"Not a nut. Not a peer. Somewhere in between.", fact:"Peanuts are technically legumes — they grow underground, unlike almonds and walnuts. Native to South America; George Washington Carver popularised over 300 uses.", species:['cat','dog','small'], cat:'food' },
{ name:'Butter', quip:"Slick. Yellow. Appears where he shouldn't.", fact:"Butter's earliest known reference is on 4,500-year-old Sumerian tablets. It takes about 22 pints of milk to make one pound.", species:['cat','dog'], cat:'food' },
{ name:'Marshmallow', quip:"Named for size. Named for fluffiness. Named for a small deception about calorie content.", fact:"Original marshmallows were made from the sap of the marshmallow plant (Althaea officinalis). The modern gelatin-based version was invented in France ca. 1850.", species:['cat','dog','small'], cat:'food' },
{ name:'Taco', quip:"Small, folded, full of surprises.", fact:"The word 'taco' first appeared in print in Mexico in 1885, though the food itself likely dates back to Mexican silver miners in the 18th century.", species:['dog','cat'], cat:'food' },
{ name:'Espresso', quip:"He is a very small dog who thinks he is a very large dog.", fact:"'Espresso' means both 'expressed' (pressed out) and 'fast' in Italian. The steam-pressure machine was patented by Angelo Moriondo in Turin in 1884.", species:['dog','cat'], cat:'food' },

// ── Literary ────────────────────────────────────────────
{ name:'Atticus', quip:"He would represent you at trial and you would probably lose.", fact:"After Atticus Finch in Harper Lee's 'To Kill a Mockingbird' (1960). The original Atticus — Titus Pomponius Atticus (110-32 BC) — was Cicero's best friend and publisher.", species:['dog','cat'], cat:'literary' },
{ name:'Frodo', quip:"Small. Furry-footed. On a journey he did not ask for.", fact:"Old English 'fród' — 'wise, experienced'. Tolkien's Frodo carries the One Ring in 'The Lord of the Rings' (1954).", species:['small','cat','dog'], cat:'literary' },
{ name:'Sherlock', quip:"He knows where you hid the treats. He's just waiting to explain how.", fact:"Coined by Arthur Conan Doyle for the 1887 story 'A Study in Scarlet'. Doyle borrowed the surname from cricketer Mordecai Sherwin and combined it with the given name of a musician friend.", species:['dog','cat'], cat:'literary' },
{ name:'Ophelia', quip:"Dramatic. Beautiful. Slightly unwell.", fact:"Greek 'ōphéleia' — 'help, benefit'. Shakespeare coined the character in Hamlet (~1600), likely inspired by a name in Jacopo Sannazaro's 1504 pastoral 'Arcadia'.", species:['cat','dog'], cat:'literary' },
{ name:'Gatsby', quip:"He throws parties for people who don't invite him back.", fact:"Fitzgerald's 'The Great Gatsby' (1925). The character's real name was James Gatz — Jay Gatsby is entirely his own invention.", species:['dog','cat'], cat:'literary' },
{ name:'Beowulf', quip:"He killed a monster in the kitchen. It was a moth.", fact:"The Old English epic Beowulf is the oldest surviving long poem in English, likely composed between 700 and 1000 AD.", species:['dog'], cat:'literary' },
{ name:'Hermione', quip:"Every single problem: solved by her, resented for by others.", fact:"Greek 'Hermes' + feminine suffix. Shakespeare used it in 'The Winter's Tale'; JK Rowling revived it for a generation of British schoolchildren after 1997.", species:['cat'], cat:'literary' },
{ name:'Poirot', quip:"He solved a crime in this house before you noticed there was one.", fact:"Belgian detective created by Agatha Christie in 1920 for 'The Mysterious Affair at Styles'. Poirot appeared in 33 novels — Christie eventually resented him.", species:['cat'], cat:'literary' },
{ name:'Iago', quip:"Do not trust Iago. Iago has plans.", fact:"Spanish form of Jacob. In Shakespeare's Othello (~1603), Iago is a byword for treacherous confidants.", species:['cat','bird'], cat:'literary' },
{ name:'Dickens', quip:"He causes disturbances. It's what he does.", fact:"'What the dickens' as an exclamation predates Charles Dickens by centuries — it appears in Shakespeare's Merry Wives of Windsor. 'Dickens' here is a euphemism for 'devil'.", species:['dog'], cat:'literary' },
{ name:'Kafka', quip:"He wakes up. He looks at you. He is transformed.", fact:"Franz Kafka's 'The Metamorphosis' opens with a man waking as a giant insect. Kafka wrote the novella in three weeks in 1912.", species:['cat','reptile'], cat:'literary' },
{ name:'Ahab', quip:"His entire personality is one thing he hates.", fact:"Herman Melville's obsessive whaling captain in Moby-Dick (1851). The name is from a biblical king of Israel notorious in the books of Kings.", species:['cat','dog'], cat:'literary' },
{ name:'Bilbo', quip:"You didn't ask him on this adventure. He came anyway.", fact:"Tolkien named his 1937 hobbit protagonist after 'Bilbao', the Spanish port, and older words for 'sword-blade'.", species:['small','cat'], cat:'literary' },
{ name:'Cordelia', quip:"Honest to her father. Look how well that went for her.", fact:"Shakespeare's youngest daughter of Lear (~1606). The name likely combines Latin 'cor' — heart — with Celtic elements meaning 'jewel of the sea'.", species:['cat','dog'], cat:'literary' },
{ name:'Puck', quip:"Impossible to catch. Also impossible to keep out.", fact:"A shape-shifting sprite in Shakespeare's A Midsummer Night's Dream (~1595), from Old English 'púca' — a mischievous spirit.", species:['cat','dog','small'], cat:'literary' },
{ name:'Milton', quip:"Sees things you can't. Says nothing about it.", fact:"John Milton wrote 'Paradise Lost' (1667) while fully blind, dictating the epic to daughters and secretaries.", species:['cat','bird'], cat:'literary' },

// ── Noble / Regal ───────────────────────────────────────
{ name:'Duke', quip:"Everyone salutes and no one is quite sure why.", fact:"From Latin 'dux' — 'leader'. The English peerage rank of Duke was created for Edward, the Black Prince, in 1337.", species:['dog'], cat:'noble' },
{ name:'Baron', quip:"He administers his territory (the couch) with grave dignity.", fact:"Old High German 'baro' — a freeman. In England, the rank was introduced by William the Conqueror in 1066.", species:['dog','cat'], cat:'noble' },
{ name:'Countess', quip:"Do not touch her tail. Do not touch her ever.", fact:"Female equivalent of Count/Earl, from Latin 'comes' — 'companion'. In England the male equivalent is 'Earl', but the wife of an Earl is a Countess.", species:['cat'], cat:'noble' },
{ name:'Empress', quip:"You do not own the Empress. You are her staff.", fact:"Latin 'imperatrix'. Notable empresses include Wu Zetian (China, 690-705 AD), the only woman to rule China as emperor in her own name.", species:['cat'], cat:'noble' },
{ name:'Kaiser', quip:"Speaks little. Considers himself sovereign.", fact:"German for 'emperor', derived from 'Caesar'. Kaiser Wilhelm II was Germany's last Kaiser, abdicating in 1918.", species:['dog'], cat:'noble' },
{ name:'Sultan', quip:"Slow. Deliberate. Makes his ministers wait.", fact:"Arabic 'sulṭān' — 'power, authority'. The Ottoman Sultanate lasted from 1299 to 1922, spanning 623 years and 36 sultans.", species:['cat'], cat:'noble' },
{ name:'Czar', quip:"Formidable. Slightly out-of-date.", fact:"Russian derivation of 'Caesar'. Ivan IV was crowned the first 'Tsar of All Russia' in 1547.", species:['dog','cat'], cat:'noble' },
{ name:'Regina', quip:"Latin for 'queen'. It shows.", fact:"Latin 'regina' — 'queen'. Also the given name of Regina, Saskatchewan (1882), named after Queen Victoria.", species:['cat','dog'], cat:'noble' },
{ name:'Sir Whiskers', quip:"He was knighted in your kitchen. You witnessed it.", fact:"The rank of knight predates Norman England; the practice of dubbing with a sword became standard under the Plantagenets in the 12th century.", species:['cat'], cat:'noble' },
{ name:'Pharaoh', quip:"Sun-worshipper. Bad with mice, actually.", fact:"From Egyptian 'per-aa' — literally 'great house'. Cats were sacred to Bastet; killing one, even accidentally, was punishable by death in Ptolemaic Egypt.", species:['cat'], cat:'noble' },

// ── Weird ───────────────────────────────────────────────
{ name:'Doorknob', quip:"Named for the first thing he tried to eat.", fact:"'Knob' entered English from Old Dutch or Middle Low German around 1400, originally meaning a lump or protuberance.", species:['dog','cat'], cat:'weird' },
{ name:'Toothpaste', quip:"He is white. He gets on you. You wanted him closer to the sink.", fact:"Toothpaste dates back to Ancient Egypt (~5000 BC) — a mixture of crushed rock salt, mint, dried iris flowers, and pepper.", species:['cat','dog','small'], cat:'weird' },
{ name:'Spatula', quip:"Long. Thin. Unclear purpose.", fact:"From Latin 'spatula' — a diminutive of 'spatha', a broad flat blade. The tool has existed in one form or another since the Bronze Age.", species:['dog','cat','reptile'], cat:'weird' },
{ name:'Radiator', quip:"Warm. Faintly clanking. Beloved.", fact:"The first radiator was patented in 1855 by Franz San Galli, a Prussian-born Russian businessman.", species:['cat'], cat:'weird' },
{ name:'Photocopier', quip:"He wakes you up at 3 AM making the sound.", fact:"Chester Carlson invented xerography in 1938; it took him 21 years to sell the idea. The first commercial photocopier (Xerox 914) shipped in 1959.", species:['cat'], cat:'weird' },
{ name:'Yoghurt', quip:"He is smooth, sits still, and expires quickly.", fact:"'Yoghurt' entered English via Turkish, from a verb meaning 'to knead / condense'. Fermented milk products date back over 5,000 years.", species:['cat','small'], cat:'weird' },
{ name:'Envelope', quip:"He posts himself under the door and cannot get back out.", fact:"The first mass-produced envelopes appeared in 1845 — before then, letters were folded and sealed with wax.", species:['small','cat'], cat:'weird' },
{ name:'Casserole', quip:"Layered. Bubbly. Somewhat tuna-flavoured.", fact:"French for 'small pan'. The 'tuna casserole' phenomenon in America dates to the 1930s, when canned fish became a household staple.", species:['cat'], cat:'weird' },
{ name:'Gary The Snake', quip:"Just Gary is too much like a normal snake.", fact:"Gary as a first name appeared in the US top-100 baby names for the first time in 1946. It has essentially never appeared in snake naming records.", species:['reptile'], cat:'weird' },
{ name:'Rotisserie', quip:"He spins on the floor sometimes. Nobody knows why.", fact:"'Rotisserie' comes from French 'rôtir' — to roast. The mechanical rotisserie spit was described in Christoforo di Messisbugo's 1549 Italian cookbook.", species:['cat'], cat:'weird' },
{ name:'Chairman Meow', quip:"Enforces a strict five-hour nap policy.", fact:"A play on Mao Zedong (Chairman Mao, 1893-1976). The pun appears in the 1985 short-story collection 'Blood on the Cat's Neck' and countless later cat-name lists.", species:['cat'], cat:'weird' },
{ name:'Sir Barks-a-Lot', quip:"A knighthood earned through sheer volume.", fact:"Anthropomorphic pet names with 'Sir' are documented in English fiction from at least the 1600s — 'Sir Bark-a-lot' specifically appears in a 1930s American children's book series.", species:['dog'], cat:'weird' },
{ name:'Vending Machine', quip:"Nothing comes out. You put more in.", fact:"The first modern vending machine (postcards, in Britain, 1883) was invented by Percival Everitt.", species:['cat'], cat:'weird' },
{ name:'Application', quip:"He submits himself for consideration daily.", fact:"'Application' from Latin 'applicare' — to attach, join. Job application forms as we know them are a 20th-century phenomenon.", species:['cat','dog'], cat:'weird' },

// ── Tech / Internet ─────────────────────────────────────
{ name:'Sudo', quip:"He will do the thing whether you asked or not.", fact:"Unix command from 'substitute user do'. First appeared at SUNY/Buffalo circa 1980, written by Bob Coggeshall and Cliff Spencer.", species:['cat','dog'], cat:'tech' },
{ name:'Bitcoin', quip:"Small. Volatile. You probably shouldn't have gotten him.", fact:"Bitcoin's whitepaper was published on Halloween 2008 by an anonymous figure known only as Satoshi Nakamoto.", species:['cat','dog'], cat:'tech' },
{ name:'Compiler', quip:"Slow start. Refuses to work if any part of him is wrong.", fact:"Grace Hopper wrote the first compiler (A-0) in 1952. She was 46, a Navy commander, and famously kept a nanosecond of copper wire on her desk.", species:['cat','dog'], cat:'tech' },
{ name:'Zoom', quip:"He runs. And runs. And runs.", fact:"Zoom Video Communications was founded in 2011 by Eric Yuan, who had previously helped build WebEx.", species:['dog','cat'], cat:'tech' },
{ name:'Debug', quip:"You created her. Now you cannot remove her.", fact:"Grace Hopper (again) popularised the term after her team found an actual moth caught in a Harvard Mark II relay in 1947. The moth is taped into the log book.", species:['cat','dog','small'], cat:'tech' },
{ name:'Cache', quip:"He hides everything. Everywhere. All the time.", fact:"From French 'cacher' — to hide. Computing use dates to the 1960s at IBM.", species:['cat','small'], cat:'tech' },
{ name:'Rustacean', quip:"He complains loudly and correctly about your other pets.", fact:"The unofficial mascot of the Rust programming language is 'Ferris', a crab. The community adopted the name 'Rustacean' around 2014.", species:['reptile','cat'], cat:'tech' },
{ name:'Ctrl-Z', quip:"He wants to undo the last thing you did. And the thing before that.", fact:"The Ctrl-Z shortcut was popularised by Apple's Lisa in 1983, standardising 'undo' across operating systems.", species:['cat','dog'], cat:'tech' },
{ name:'Elon', quip:"He tweets. He does not deliver.", fact:"'Elon' is a Hebrew biblical name meaning 'oak tree'. It appears in the Book of Judges as the name of one of Israel's judges.", species:['dog','cat'], cat:'tech' },
{ name:'Segfault', quip:"He crashes into things and blames the memory.", fact:"'Segmentation fault' — an attempt to access memory the process isn't allowed to. Introduced with Unix's memory protection in the 1970s.", species:['cat','dog'], cat:'tech' },
{ name:'404', quip:"You call. He is not found.", fact:"HTTP status 404 was introduced in the 1990s as HTTP evolved. The '4xx' family denotes client-side errors.", species:['cat'], cat:'tech' },
{ name:'Cookie', quip:"He follows you around and remembers everything.", fact:"Web cookies were invented by Lou Montulli at Netscape in 1994. The term comes from 'magic cookie', a Unix concept for opaque data.", species:['dog','cat','small'], cat:'tech' },

// ── Mythology ───────────────────────────────────────────
{ name:'Zeus', quip:"Small dog. Enormous thunder.", fact:"Chief of the Greek gods. His Roman equivalent is Jupiter; both descend from a Proto-Indo-European sky-god *dyḗus.", species:['dog','cat'], cat:'myth' },
{ name:'Loki', quip:"Beautiful. Enchanting. Absolutely up to something.", fact:"Norse trickster. Loki's parents were giants, but he was counted among the gods until he arranged the death of Baldur, provoking Ragnarök.", species:['cat','dog'], cat:'myth' },
{ name:'Athena', quip:"Wise beyond her years. Judgmental beyond your patience.", fact:"Greek goddess of wisdom and warfare; born fully-armoured from Zeus's forehead after he swallowed her pregnant mother Metis.", species:['cat','dog','bird'], cat:'myth' },
{ name:'Odin', quip:"One-eyed. Deeply serious. Followed by ravens.", fact:"Chief god in Norse mythology. He hung himself from the world-tree Yggdrasil for nine nights to learn the runes.", species:['dog','cat','bird'], cat:'myth' },

  favs: JSON.parse(localStorage.getItem('jim-favs') || '[]'),
  species: JSON.parse(localStorage.getItem('jim-species') || '[]'),
  cats: JSON.parse(localStorage.getItem('jim-cats') || '[]'),
  order: [], idx: 0,
};
function persist() {
  localStorage.setItem('jim-favs', JSON.stringify(state.favs));
  localStorage.setItem('jim-species', JSON.stringify(state.species));
  localStorage.setItem('jim-cats', JSON.stringify(state.cats));
}
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}
function haptic(p) { try { navigator.vibrate && navigator.vibrate(p); } catch(e) {} }
function isFav(name) { return state.favs.includes(name); }
function toggleFav(name) {
  if (isFav(name)) state.favs = state.favs.filter(x => x !== name);
  else state.favs.push(name);
  persist(); updateFavBadge();
}
function updateFavBadge() {
  const b = $('fav-badge');
  const n = state.favs.length;
  if (b) { b.textContent = n; b.style.display = n ? 'flex' : 'none'; }
  $('favs').classList.toggle('on', n > 0);
  $('fav-hdr').textContent = n ? '· ' + n : '';
  $('fav-exp').style.display = n ? 'flex' : 'none';
}

/* ═══════════ Filtering + order ═══════════ */
function matchesFilters(entry) {
  if (state.species.length) {
    const ok = state.species.some(s => entry.species.includes(s) || entry.species.includes('any'));
    if (!ok) return false;
  }
  if (state.cats.length) {
    if (!state.cats.includes(entry.cat)) return false;
  }
  return true;
}
function buildOrder() {
  const pool = NAMES.map((n, i) => ({ ...n, _idx: i })).filter(matchesFilters);
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  state.order = pool;
  state.idx = 0;
}

/* ═══════════ Feed rendering ═══════════ */
const FEED = { el:null, io:null, currentIndex:0, MIN_AHEAD:5 };

function appendCard(entry, position) {
  const card = document.createElement('div');
  card.className = 'card';
  const grad = gradientFor(position);
  if (grad.light) card.classList.add('light'); else card.classList.add('dark');
  const speciesLabel = entry.species
    .map(s => SPECIES.find(x => x.key === s))
    .filter(Boolean)
    .map(s => s.label)
    .join(' · ') || 'Any pet';
  const catLabel = CATEGORIES.find(c => c.key === entry.cat)?.label || entry.cat;
  card.dataset.name = entry.name;
  card.dataset.position = position;
  card.innerHTML = `
    <div class="bg" style="background:${grad.g}"></div>
    <div class="glow"></div>
    <div class="grain"></div>
    <div class="head">
      <span class="chip">${catLabel}</span>
      ${entry.species.slice(0,2).map(s => `<span class="chip">${SPECIES.find(x => x.key === s)?.label || s}</span>`).join('')}
    </div>
    <div class="side">
      <div class="col"><button class="act ${isFav(entry.name) ? 'on' : ''}" data-act="fav">${isFav(entry.name) ? '♥' : '♡'}</button><span class="lbl">save</span></div>
      <div class="col"><button class="act" data-act="share">↗</button><span class="lbl">share</span></div>
      <div class="col"><button class="act" data-act="dice">⚄</button><span class="lbl">skip</span></div>
      <div class="col"><button class="act" data-act="details">ⓘ</button><span class="lbl">more</span></div>
    </div>
    <div class="core">
      <div class="name">${entry.name}</div>
      <div class="quip">${entry.quip}</div>
      <div class="fact"><span class="k">Fact</span><span class="v">${entry.fact}</span></div>
    </div>
    <div class="foot"><b>${position + 1}</b> · ${catLabel.toUpperCase()}</div>
    <div class="heart-holder" style="position:absolute;inset:0;pointer-events:none;z-index:5"></div>`;

  FEED.el.appendChild(card);
  wireCard(card, entry);
  if (FEED.io) FEED.io.observe(card);
  return card;
}

function wireCard(card, entry) {
  card.querySelector('[data-act="fav"]').addEventListener('click', e => {
    e.stopPropagation();
    toggleFav(entry.name);
    const b = card.querySelector('[data-act="fav"]');
    b.textContent = isFav(entry.name) ? '♥' : '♡';
    b.classList.toggle('on', isFav(entry.name));
    haptic([15,25,15]);
  });
  card.querySelector('[data-act="share"]').addEventListener('click', e => {
    e.stopPropagation();
    shareEntry(entry);
  });
  card.querySelector('[data-act="dice"]').addEventListener('click', e => {
    e.stopPropagation();
    skipAhead();
  });
  card.querySelector('[data-act="details"]').addEventListener('click', e => {
    e.stopPropagation();
    openDetails(entry);
  });

  // Double-tap to save
  let lastTap = 0;
  card.addEventListener('click', e => {
    if (e.target.closest('.side, [data-act]')) return;
    const now = Date.now();
    if (now - lastTap < 320) {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX || (rect.left + rect.width / 2)) - rect.left;
      const y = (e.clientY || (rect.top + rect.height / 2)) - rect.top;
      const h = document.createElement('div');
      h.className = 'heart-pop'; h.textContent = '♥';
      h.style.left = x + 'px'; h.style.top = y + 'px';
      card.querySelector('.heart-holder').appendChild(h);
      setTimeout(() => h.remove(), 900);
      if (!isFav(entry.name)) toggleFav(entry.name);
      const b = card.querySelector('[data-act="fav"]');
      b.textContent = '♥'; b.classList.add('on');
      haptic([15,25,15]);
      lastTap = 0;
    } else lastTap = now;
  });
}

function refill(count = 6) {
  for (let i = 0; i < count; i++) {
    if (state.order.length === 0) return;
    const entry = state.order[state.idx % state.order.length];
    const position = FEED.currentIndex + FEED.el.querySelectorAll('.card').length;
    appendCard(entry, position);
    state.idx++;
  }
}

function skipAhead() {
  const cards = [...FEED.el.querySelectorAll('.card')];
  const idx = Math.min(cards.length - 1, FEED.currentIndex + 5);
  if (cards[idx]) cards[idx].scrollIntoView({ behavior:'smooth', block:'start' });
  haptic(30);
}

/* ═══════════ Sharing ═══════════ */
async function shareEntry(entry) {
  const base = (location.protocol.startsWith('http') ? location.origin : '') + '/jimothy/';
  const idx = NAMES.findIndex(n => n.name === entry.name);
  const url = `${base}?n=${idx}`;
  const text = `Just met a pet named ${entry.name} — ${entry.quip} · via Jimothy`;
  if (navigator.share) {
    try { await navigator.share({ title:'Jimothy · ' + entry.name, text, url }); return; }
    catch(e) { if (e.name === 'AbortError') return; }
  }
  try { await navigator.clipboard.writeText(url + '\n\n' + text); toast('link copied'); }
  catch(e) { toast('couldn\'t copy'); }
}

/* ═══════════ Details sheet ═══════════ */
function openDetails(entry) {
  $('det-title').textContent = entry.name;
  const speciesLabels = entry.species.map(s => SPECIES.find(x => x.key === s)?.label || s).join(', ');
  const catLabel = CATEGORIES.find(c => c.key === entry.cat)?.label || entry.cat;
  const similar = NAMES.filter(n => n.name !== entry.name && (n.cat === entry.cat || n.species.some(s => entry.species.includes(s))))
    .sort(() => Math.random() - 0.5).slice(0, 6);
  const body = $('det-body');
  body.innerHTML = `
    <div class="det-hero">
      <div class="n">${entry.name}</div>
      <div class="row">
        <span class="p">${catLabel}</span>
        <span class="p">${speciesLabels}</span>
      </div>
    </div>
    <div class="det-sec">
      <h4>The Quip</h4>
      <p>${entry.quip}</p>
    </div>
    <div class="det-sec">
      <h4>The Fact</h4>
      <p class="fact-body">${entry.fact}</p>
    </div>
    <div class="det-sec">
      <h4>Similar vibes</h4>
      <div class="det-similar">
        ${similar.map(s => `<button data-name="${s.name}">${s.name}</button>`).join('')}
      </div>
    </div>
    <div class="det-actions">
      <button id="det-copy-name">Copy name</button>
      <button id="det-copy-both">Copy quip + fact</button>
      <button class="primary" id="det-share">Share</button>
    </div>
  `;
  body.querySelectorAll('.det-similar button').forEach(b => b.addEventListener('click', () => {
    const nm = b.dataset.name;
    const e = NAMES.find(n => n.name === nm);
    if (e) { closeSheet('det-sheet'); jumpToName(nm); }
  }));
  $('det-copy-name').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(entry.name); toast('name copied'); } catch(e) {}
  });
  $('det-copy-both').addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(`${entry.name}\n\n${entry.quip}\n\n${entry.fact}`); toast('copied to clipboard'); } catch(e) {}
  });
  $('det-share').addEventListener('click', () => shareEntry(entry));
  $('det-sheet').classList.add('show');
}

/* ═══════════ Filter sheet ═══════════ */
function openFilter() {
  const body = $('filter-body');
  body.innerHTML = `
    <div class="fsec">
      <h4>Species</h4>
      <div class="fchips">
        ${SPECIES.map(s => `<button class="fchip ${state.species.includes(s.key) ? 'on' : ''}" data-species="${s.key}">${s.label}</button>`).join('')}
      </div>
    </div>
    <div class="fsec">
      <h4>Category</h4>
      <div class="fchips">
        ${CATEGORIES.map(c => `<button class="fchip ${state.cats.includes(c.key) ? 'on' : ''}" data-cat="${c.key}">${c.label}</button>`).join('')}
      </div>
    </div>
    <div class="fsheet-btns">
      <button class="clear" id="f-clear">Reset</button>
      <button class="apply" id="f-apply">Apply</button>
    </div>
  `;
  body.querySelectorAll('[data-species]').forEach(b => b.addEventListener('click', () => {
    const k = b.dataset.species;
    if (state.species.includes(k)) state.species = state.species.filter(x => x !== k);
    else state.species.push(k);
    b.classList.toggle('on');
  }));
  body.querySelectorAll('[data-cat]').forEach(b => b.addEventListener('click', () => {
    const k = b.dataset.cat;
    if (state.cats.includes(k)) state.cats = state.cats.filter(x => x !== k);
    else state.cats.push(k);
    b.classList.toggle('on');
  }));
  $('f-clear').addEventListener('click', () => {
    state.species = []; state.cats = [];
    body.querySelectorAll('.fchip').forEach(b => b.classList.remove('on'));
  });
  $('f-apply').addEventListener('click', () => {
    persist();
    closeSheet('filter-sheet');
    resetFeed();
  });
  $('filter-sheet').classList.add('show');
}

function resetFeed() {
  buildOrder();
  FEED.el.querySelectorAll('.card').forEach(c => c.remove());
  FEED.currentIndex = 0;
  FEED.el.scrollTo({ top:0, behavior:'auto' });
  refill(6);
}

/* ═══════════ Favs drawer ═══════════ */
function openFavs() {
  const list = $('fav-list');
  if (!state.favs.length) {
    list.innerHTML = `<div class="fempty">Nothing saved yet.<br><br>Double-tap a name or hit ♡ to save.</div>`;
  } else {
    list.innerHTML = state.favs.slice().reverse().map(nm => {
      const e = NAMES.find(n => n.name === nm);
      const grad = e ? gradientFor(NAMES.indexOf(e)) : GRADIENTS[0];
      return `<div class="fcard" data-name="${nm}">
        <div class="sw" style="background:${grad.g}"></div>
        <div class="info">
          <div class="n">${nm}</div>
          <div class="m">${e ? (CATEGORIES.find(c => c.key === e.cat)?.label || e.cat) : ''}</div>
        </div>
        <button class="rm" data-act="rm">×</button>
      </div>`;
    }).join('');
    list.querySelectorAll('.fcard').forEach(card => {
      card.addEventListener('click', e => {
        if (e.target.closest('[data-act="rm"]')) {
          const nm = card.dataset.name;
          state.favs = state.favs.filter(f => f !== nm);
          persist(); updateFavBadge(); openFavs();
          return;
        }
        closeFavs();
        jumpToName(card.dataset.name);
      });
    });
  }
  $('fdrawer').classList.add('show');
  $('fdrawer-bg').classList.add('show');
}
function closeFavs() {
  $('fdrawer').classList.remove('show');
  $('fdrawer-bg').classList.remove('show');
}

function jumpToName(nm) {
  const entry = NAMES.find(n => n.name === nm);
  if (!entry) return;
  // Reset feed and insert this at the top
  state.order = [entry, ...NAMES.filter(n => n.name !== nm).sort(() => Math.random() - 0.5)];
  state.idx = 0;
  FEED.el.querySelectorAll('.card').forEach(c => c.remove());
  FEED.currentIndex = 0;
  refill(6);
  FEED.el.scrollTo({ top:0, behavior:'auto' });
}

/* ═══════════ Sheet close ═══════════ */
function closeSheet(id) { const el = $(id); if (el) el.classList.remove('show'); }
document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => closeSheet(el.dataset.close)));
['det-sheet','filter-sheet'].forEach(id => {
  const el = $(id);
  if (el) el.addEventListener('click', e => { if (e.target.id === id) closeSheet(id); });
});

/* ═══════════ Init ═══════════ */
async function init() {
  FEED.el = $('feed');
  $('filter').addEventListener('click', openFilter);
  $('dice').addEventListener('click', () => { const cards = [...FEED.el.querySelectorAll('.card')]; if (cards.length > FEED.currentIndex + 1) cards[FEED.currentIndex + 1].scrollIntoView({ behavior:'smooth', block:'start' }); haptic(30); });
  $('favs').addEventListener('click', openFavs);
  $('fav-close').addEventListener('click', closeFavs);
  $('fdrawer-bg').addEventListener('click', closeFavs);
  $('fav-copy').addEventListener('click', async () => {
    const txt = state.favs.join('\n');
    try { await navigator.clipboard.writeText(txt); toast(`copied ${state.favs.length} names`); } catch(e) {}
  });
  $('fav-clear').addEventListener('click', () => {
    if (!confirm('Clear all saved names?')) return;
    state.favs = []; persist(); updateFavBadge(); openFavs();
  });
  updateFavBadge();

  FEED.io = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting && e.intersectionRatio > 0.6) {
        const cards = [...FEED.el.querySelectorAll('.card')];
        const idx = cards.indexOf(e.target);
        FEED.currentIndex = idx;
        if (idx >= cards.length - FEED.MIN_AHEAD) refill(6);
      }
    }
  }, { root: FEED.el, threshold: [0, 0.6, 1] });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeSheet('det-sheet'); closeSheet('filter-sheet'); closeFavs(); }
  });

  // Deep link ?n=<idx>
  const p = new URLSearchParams(location.search);
  const dl = p.get('n');
  if (dl != null) {
    const idx = parseInt(dl, 10);
    if (!isNaN(idx) && NAMES[idx]) {
      state.order = [NAMES[idx], ...NAMES.filter((_, i) => i !== idx).sort(() => Math.random() - 0.5)];
      state.idx = 0;
      refill(6);
      return;
    }
  }

  buildOrder();
  refill(6);
}
init();
</script>
</body>
</html>
