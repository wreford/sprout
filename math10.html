var announceOn=true;
function getVoices(){return speechSynthesis.getVoices();}
function findVoice(names){
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];
  }
}
return null;
}

const q=activeQ[state.qi];
const correct=idx===q.a;
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{
b.disabled=true;
const i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
let pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreakSound();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrectChime();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrongBuzz();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

const fb=document.getElementById("feedback");
fb.innerHTML=`
<div class="feedback ${correct?"correct-fb":"wrong-fb"}">
<h3>${correct?"Correct!"+(state.streak>=3?" &#x1F525; Streak x"+state.streak+"!":""):"Wrong!"}</h3>
${!correct?`<p>The answer was: <strong>${q.o[q.a]}</strong></p>`:""}
${state.streak>=3&&correct?`<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>`:""}
<div class="fact-card"><span class="fact-emoji">&#x1F4A1;</span><span>${q.fact}</span></div>
</div>
<button class="next-btn" id="next-btn" ${_speaking?'disabled style="opacity:0.4"':''}>${state.qi+1>=activeQ.length?"See Results":"Next Question &#x2192;"}</button>`;
var nb=document.getElementById("next-btn");
nb.onclick=()=>{
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopMusic();stopAmbient();
const pct=Math.round(state.correct/activeQ.length*100);
const maxScore=50*10+50*20+50*30+50*50;
const totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
const totalMin=Math.floor(totalTimeSec/60);
const totalSec=totalTimeSec%60;
const timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
const avgTimeSec=activeQ.length>0?Math.round(totalTimeSec/activeQ.length*10)/10:0;
let grade='F',gradeColor='#ef4444';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='#f7c948';}
else if(pct>=60){grade='C';gradeColor='#f59e0b';}
const accBarColor=pct>=80?'var(--green)':pct>=60?'#f7c948':'#ef4444';
app.innerHTML=`
<div class="end-screen">
<h2>Game Over!</h2>
<div class="final-score">${state.score}</div>
<p style="color:rgba(232,232,240,0.5)">out of ${maxScore} possible</p>
${state.score>=state.highScore?`<div class="high-label">New High Score!</div>`:`<div class="high-label" style="color:var(--gold)">High Score: ${state.highScore}</div>`}
<div class="grade-badge" style="background:${gradeColor};color:#000">${grade}</div>
<div style="text-align:left;margin:12px 0">
<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>${pct}%</span></div>
<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:${pct}%;background:${accBarColor}"></div></div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="val">${state.correct}</div><div class="lbl">Correct</div></div>
<div class="stat-card"><div class="val">${state.wrong}</div><div class="lbl">Wrong</div></div>
<div class="stat-card"><div class="val">${state.bestStreak}</div><div class="lbl">Best Streak</div></div>
<div class="stat-card"><div class="val">${timeStr}</div><div class="lbl">Total Time</div></div>
<div class="stat-card"><div class="val">${avgTimeSec}s</div><div class="lbl">Avg / Question</div></div>
<div class="stat-card"><div class="val">${grade}</div><div class="lbl">Grade</div></div>
<div class="stat-card"><div class="val">${state.byDiff[1]}/${50}</div><div class="lbl">Easy</div></div>
<div class="stat-card"><div class="val">${state.byDiff[2]}/${50}</div><div class="lbl">Medium</div></div>
<div class="stat-card"><div class="val">${state.byDiff[3]}/${50}</div><div class="lbl">Hard</div></div>
<div class="stat-card"><div class="val">${state.byDiff[4]}/${50}</div><div class="lbl">Expert</div></div>
</div>
<button class="share-btn" id="share-btn">&#x1F4CB; Share Score</button>
<button class="restart-btn" id="restart-btn">Play Again</button>
<p style="margin-top:18px;font-size:14px;color:rgba(232,232,240,0.5)">Also try: <a href="mathtrivia.html">Grade 11 Math</a> | <a href="baseball.html">Baseball Trivia</a> | <a href="hockey.html">Hockey Trivia</a></p>
</div>`;
document.getElementById("share-btn").onclick=function(){
var txt="&#x1F4D0; Grade 10 Math Trivia\nScore: "+state.score+"/"+maxScore+" ("+pct+"%)\nGrade: "+grade+"\nBest Streak: "+state.bestStreak+"\nTime: "+timeStr+"\n#MathTrivia";
navigator.clipboard.writeText(txt).then(function(){var b=document.getElementById('share-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='\u{1F4CB} Share Score';},2000);}).catch(function(){});
};
document.getElementById("restart-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true};
_gameStartTime=Date.now();
saveState();playMusic();playAmbient();renderQ();
};
}

// Init
renderStart();
</script>
</body>
</html>
