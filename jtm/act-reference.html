/* ---------- Scene (JTM reading) ---------- */
const ISO_S=3.4;
function isoPt(x,y,z){return [(x-y)*0.866*ISO_S,(x+y)*0.5*ISO_S-z*ISO_S];}
function isoBox(b){const [x,y,z,w,d,ht]=b;
  const c=[[x,y,z],[x+w,y,z],[x+w,y+d,z],[x,y+d,z],[x,y,z+ht],[x+w,y,z+ht],[x+w,y+d,z+ht],[x,y+d,z+ht]].map(q=>isoPt(q[0],q[1],q[2]));
  const poly=i=>i.map(j=>c[j].map(v=>v.toFixed(1)).join(',')).join(' ');
  return {top:poly([4,5,6,7]),lf:poly([3,2,6,7]),rt:poly([1,2,6,5]),labAt:[(c[4][0]+c[6][0])/2,(c[4][1]+c[6][1])/2]};}
function sceneZones(){return STORE.all.filter(a=>a.type==='zone'&&a.jtm&&a.jtm.box&&a.alias!=='ZONE-SITE')
  .slice().sort((a,b)=>{const A=a.jtm.box,B=b.jtm.box;return (A[0]+A[1]+A[2])-(B[0]+B[1]+B[2])||(B[3]*B[4]*B[5])-(A[3]*A[4]*A[5]);})
  .slice(0,320);}
function jtmSource(){const w=windows();let t='jtm scene act-site\nunit m  axes x y z w d h\n';
  STORE.all.filter(a=>a.type==='zone'&&a.jtm&&a.jtm.box).forEach(z=>{t+='box  '+z.alias+'  '+z.jtm.box.join(' ')+'\n';});
  const wk=Object.keys(w);wk.slice(0,200).forEach(al=>{const v=w[al];t+='work '+al+'  in '+v.zone+'  day '+v.start.toFixed(1)+' .. '+v.end.toFixed(1)+'\n';});
  if(wk.length>200)t+='... (+'+(wk.length-200)+' more)\n';
  return t;}
let SCENE_W=null,SCENE_FIN=0,SCENE_T=null,SCENE_CRIT=new Set(),SCENE_CTR={};
function sceneHTML(){
  const S=scheduleAll();SCENE_W=windows();SCENE_FIN=Math.ceil(S.finish);SCENE_CRIT=S.critical;
  const zoneCrit={};Object.keys(SCENE_W).forEach(al=>{if(SCENE_CRIT.has(al))zoneCrit[SCENE_W[al].zone]=true;});
  SCENE_CTR={};
  const doneZ=new Set();STORE.all.forEach(a=>{if((a.est||a.qty)&&isComplete(a))(a['in-zone']||[]).forEach(z=>doneZ.add(z));});
  const zs=sceneZones();
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  const built=zs.map(z=>{const g=isoBox(z.jtm.box);
    [g.top,g.lf,g.rt].forEach(pl=>pl.split(' ').forEach(pt=>{const[a,b]=pt.split(',').map(Number);if(a<minX)minX=a;if(a>maxX)maxX=a;if(b<minY)minY=b;if(b>maxY)maxY=b;}));
    return {z,g};});
  const pad=16,vb=(minX-pad)+' '+(minY-pad)+' '+(maxX-minX+2*pad)+' '+(maxY-minY+2*pad);
  let svg='<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg">';
  built.forEach(({z,g})=>{const shell=(z.contains&&z.contains.length)?' zshell':'';
    const crit=zoneCrit[z.alias]?' zcritz':'';
    const adone=doneZ.has(z.alias)?' zdone':'';
    SCENE_CTR[z.alias]=g.labAt;
    svg+='<g class="zgrp'+shell+crit+adone+'" data-zone="'+z.alias+'" data-go="'+z.alias+'">'
      +'<polygon class="zface lf" points="'+g.lf+'"/><polygon class="zface rt" points="'+g.rt+'"/><polygon class="zface top" points="'+g.top+'"/>'
      +(shell?'':'<text class="zlab" x="'+g.labAt[0].toFixed(1)+'" y="'+g.labAt[1].toFixed(1)+'" text-anchor="middle">'+z.alias.replace('ZONE-','')+'</text>')
      +'</g>';
    if(z.alias==='ZONE-RB-L0')svg+='<g id="pourfill"></g>';});
  // crane: mast, swing radius (the circle CON-0009 worries about), live jib layer
  const crn=get('CRN-01');
  if(crn&&crn.jtm){const m=isoBox(crn.jtm.box);
    svg+='<g data-go="CRN-01" style="cursor:pointer"><polygon class="crane lf" points="'+m.lf+'"/><polygon class="crane rt" points="'+m.rt+'"/><polygon class="crane top" points="'+m.top+'"/></g>';
    let sw='';for(let a2=0;a2<=48;a2++){const an=a2/48*2*Math.PI;const p2=isoPt(66+45*Math.cos(an),30+45*Math.sin(an),46);sw+=p2[0].toFixed(1)+','+p2[1].toFixed(1)+' ';}
    svg+='<polyline class="swing" points="'+sw+'"/>';}
  // module travel path, laydown stacks, crew layer, module layer
  const t0=isoPt(110,80,5),t1=isoPt(105,22,5);
  svg+='<line class="trail" x1="'+t0[0].toFixed(1)+'" y1="'+t0[1].toFixed(1)+'" x2="'+t1[0].toFixed(1)+'" y2="'+t1[1].toFixed(1)+'"/>';
  svg+='<g id="stacks"></g><g id="crewdots"></g><g id="modbox"></g><g id="jib"></g></svg>';
  let h='<div class="rcover"><div class="reye">Reading VI</div><h2>Scene</h2><p>The site drawn from the graph and run like a film. Press play: crews move through volumes, the condenser module travels from the yard to its bay, and the slab rises truck by truck as pour tickets land. Tap any volume to open its atom.</p></div><div class="panel">';
  h+='<div class="scenewrap">'+svg
    +'<div class="scrubrow"><button class="cxbtn" id="sceneplay">&#9654; Play</button><span class="day" id="sceneday">Day 0</span><input type="range" id="scrub" min="0" max="'+SCENE_FIN+'" step="0.25" value="0"></div>'
    +'<div class="slegend"><span><i class="sw1"></i>working</span><span><i class="sw2"></i>clash</span><span><i class="sw3"></i>critical chain</span><span><i class="sw4"></i>concrete in</span><span><i class="sw5"></i>module transit</span><span><i class="sw6"></i>crane swing</span><span><i class="sw7"></i>as-built</span></div>'
    +'<div class="scenelive" id="scenelive"></div></div>';
  h+='<details class="jtmsrc"><summary>View as JTM text</summary><pre class="jtmtext">'+jtmSource()+'</pre></details>';
  h+='<div class="lead-note" style="margin-top:12px">Every frame is derived, never drawn. Clear a constraint, sequence a clash, tap a truck on the pour card -- come back and the same scrub plays a different film. Media as a reading of the graph, in a format that is just text.</div>';
  return h+'</div>';}
function updateScene(t){
  if(!SCENE_W)return;
  const active=Object.keys(SCENE_W).filter(al=>SCENE_W[al].start<=t&&t<SCENE_W[al].end);
  const occ={},clash=new Set();
  active.forEach(al=>{const z=SCENE_W[al].zone;(occ[z]=occ[z]||[]).push(al);});
  for(let i=0;i<active.length;i++)for(let j=i+1;j<active.length;j++){
    const za=SCENE_W[active[i]].zone,zb=SCENE_W[active[j]].zone;
    if(zonesOverlap(za,zb)){clash.add(za);clash.add(zb);}}
  document.querySelectorAll('.zgrp').forEach(g=>{const z=g.dataset.zone;
    g.classList.toggle('zocc',!!occ[z]&&!clash.has(z));g.classList.toggle('zclash',clash.has(z));});
  // the slab rises truck by truck: cleared pour quanta become poured concrete
  const pf=document.getElementById('pourfill');
  if(pf){const pour=get('IWP-011003');const ch=out(pour,'contains');
    const frac=ch.length?ch.filter(x=>isComplete(x)).length/ch.length:0;
    if(frac>0){const g=isoBox([0,0,0,60,60,6*frac]);
      pf.innerHTML='<polygon class="pour lf" points="'+g.lf+'"/><polygon class="pour rt" points="'+g.rt+'"/><polygon class="pour top" points="'+g.top+'"/>';}
    else pf.innerHTML='';}
  // the condenser module travels yard-to-bay over the three days before its set begins
  const mb=document.getElementById('modbox');
  if(mb){const w=SCENE_W['IWP-021001'];
    if(w&&t>=w.start-3&&t<w.start){const k=(t-(w.start-3))/3;
      const x=104+(99-104)*k,y=74+(16-74)*k; // laydown center -> condenser bay center
      const g=isoBox([x,y,0,12,9,8]);
      mb.innerHTML='<polygon class="mod lf" points="'+g.lf+'"/><polygon class="mod rt" points="'+g.rt+'"/><polygon class="mod top" points="'+g.top+'"/>';}
    else mb.innerHTML='';}
  // crews on station: a dot per active package, colored by crew
  const cd=document.getElementById('crewdots');
  if(cd){const CREWCOL={'SUB-RE':'#b13d2c','SUB-RW':'#2c5d78','SUB-CV':'#2f7d4f','SUB-MECH':'#6c5fae'};
    let s='';active.forEach(al=>{const a=get(al),crew=out(a,'done-by')[0],ctr=SCENE_CTR[SCENE_W[al].zone];
      if(!crew||!ctr)return;
      s+='<circle cx="'+ctr[0].toFixed(1)+'" cy="'+(ctr[1]-7).toFixed(1)+'" r="3" class="crewdot" fill="'+(CREWCOL[crew.alias]||'#544c3a')+'"/>'
        +'<text x="'+ctr[0].toFixed(1)+'" y="'+(ctr[1]-11).toFixed(1)+'" class="zlab" text-anchor="middle">'+crew.alias.replace('SUB-','')+'</text>';});
    cd.innerHTML=s;}
  // the jib swings while the crane has an active lift
  const jib=document.getElementById('jib');
  if(jib){const crn=get('CRN-01'),lifts=(crn&&crn['lifts-for'])||[];
    if(lifts.some(al=>active.includes(al))){const an=t*0.7,R=45;
      const px=66+R*Math.cos(an),py=30+R*Math.sin(an);
      const a0=isoPt(66,30,46),a1=isoPt(px,py,46),h1=isoPt(px,py,8);
      jib.innerHTML='<line class="jibln" x1="'+a0[0].toFixed(1)+'" y1="'+a0[1].toFixed(1)+'" x2="'+a1[0].toFixed(1)+'" y2="'+a1[1].toFixed(1)+'"/>'
        +'<line class="hookln" x1="'+a1[0].toFixed(1)+'" y1="'+a1[1].toFixed(1)+'" x2="'+h1[0].toFixed(1)+'" y2="'+h1[1].toFixed(1)+'"/>';}
    else jib.innerHTML='';}
  // laydown stacks: one leaves when the condenser module ships
  const st=document.getElementById('stacks');
  if(st){const w2=SCENE_W['IWP-021001'],gone=w2&&t>=w2.start-3;
    let s='';const nst=gone?4:5;
    for(let i=0;i<nst;i++){const g=isoBox([86+i*11,66,0,8,7,5]);
      s+='<polygon class="stk lf" points="'+g.lf+'"/><polygon class="stk rt" points="'+g.rt+'"/><polygon class="stk top" points="'+g.top+'"/>';}

    return (c?'<span class="cl">&#9632; ':'&#9632; ')+al+' &middot; '+(a?a.name:'')+(cr?' &middot; CRIT':'')+(c?' &middot; CLASH</span>':'');}).join('<br>'):'No work in progress at this hour.';
}

/* ---------- Card ---------- */

  h+=`<dt>UUID</dt><dd class="mono">${a.uuid}</dd></dl>`;
  const g=modelingGap(a);
  if(g)h+=`<div class="note" style="border-color:#5a3320;color:var(--warn)">Named, not modeled -- ${g.reasons.join('. ')}. The model is holding the name until this is answered.</div>`;
  h+=`<div class="note">QR on the package encodes the UUID; alias <b>${a.alias}</b> is for radio and eyeballs. Scan or type either to land here.</div>`;
  if(a.contentRef)h+=`<div class="lens">&#9670; Lens &middot; ${a.contentRef.system} &rsaquo; ${a.contentRef.id}</div>`;
  if(a.attrs&&a.attrs.capacity&&a.attrs.claimed){const cap=parseFloat(a.attrs.capacity),clm=parseFloat(a.attrs.claimed),pc=Math.round(clm/cap*100);
    h+=`<div class="note" style="border-color:${pc>=90?'#a8401f':'var(--rule2)'}">Capacity: ${a.attrs.claimed} of ${a.attrs.capacity} claimed (${pc}%)</div><div class="capbar"><i style="width:${Math.min(pc,100)}%;${pc>=90?'background:#b13d2c':''}"></i><b style="left:90%"></b></div>`;}
  if(a.src)h+=`<div class="grp"><span class="t">Literate source -- this text runs</span><span class="ln"></span></div><pre class="jtmtext">${a.src}</pre>`;
  if(a.type==='iwp'&&a.contains&&a.contains.length){const ch=out(a,'contains'),cl=ch.filter(x=>isComplete(x)).length;
    h+=`<div class="note">Progress is cleared, not claimed: ${cl} of ${ch.length} quanta in${a.qty?' ('+Math.round(cl/ch.length*a.qty)+' of '+a.qty+' '+(a.unit||'')+')':''}. Tap a truck as its ticket lands.</div>`;
    h+=`<div class="qgrid">${ch.map(x=>`<button class="qd ${isComplete(x)?'on':''}" data-toggle="${x.alias}" title="${x.alias}"></button>`).join('')}</div>`;}
  if(a.completionKind==='leaf'){
    const bound=isBound(a),lab=a.type==='iwp'?'Work complete':a.type==='material'?'Delivered on site':a.type==='rfi'?'Answered':a.type==='document'?'Approved':a.type==='action'?'Done':a.type==='asset'?'Installed / turned over':'Complete';
    h+=`<div class="toggle ${a.complete?'on':''} ${bound?'':'locked'}" ${bound?`data-toggle="${a.alias}"`:''}><div class="sw"><i></i></div><div class="tt"><div class="a">${lab}</div><div class="b">${bound?'tap to set state':'unbound -- bind before completing'}</div></div></div>`;
  }
  if(a.type==='iwp'){const ob=openBlockers(a);h+=`<div class="note">Readiness is worked out, not stored: ${ob.length?ob.length+' constraint(s) still block this package.':'no open constraints -- ready to work.'}</div>`;}
  if(a.completionKind==='gate')h+=`<div class="note">This gate clears itself when everything it waits on clears -- it is not flipped by hand.</div>`;
  REL.forEach(rel=>{const items=out(a,rel);if(!items.length)return;h+=`<div class="grp"><span class="t">${RELLABEL[rel]||rel}</span><span class="ln"></span><span class="ct">${items.length}</span></div>`;items.forEach(x=>h+=rowHTML(x));});
  const incRels=['blocks','contains','allocated-to','enables','supplies','verified-by','responsible-for','threatens','informs','applies-to','builds','tag','in-zone','after','raised-by','governed-by','answers-to'];
  const incGroups={};(STORE.incoming[a.alias]||[]).forEach(e=>{if(incRels.includes(e.rel))(incGroups[e.rel]=incGroups[e.rel]||[]).push(e.from);});
  Object.keys(incGroups).forEach(rel=>{const items=incGroups[rel].map(get).filter(Boolean);if(!items.length)return;
    const lab=rel==='contains'?'Contained by':rel==='blocks'?'Blocked by':rel==='allocated-to'?'Allocated from':rel==='enables'?'Enabled by':rel==='supplies'?'Supplied by':rel==='responsible-for'?'Owned by':rel==='informs'?'Informed by':rel==='verified-by'?'Verifies':rel==='after'?'Comes before':rel==='in-zone'?'Zone of':rel==='raised-by'?'Raised':rel==='governed-by'?'Governs':rel==='answers-to'?'Authority over':(RELLABEL[rel]||rel)+' (in)';
    h+=`<div class="grp"><span class="t">${lab}</span><span class="ln"></span><span class="ct">${items.length}</span></div>`;items.forEach(x=>h+=rowHTML(x));});
  h+=`<details class="audit"><summary>Audit stream &middot; ${a.stream.length} message(s)</summary>`;
  a.stream.forEach(m=>h+=`<div class="msg"><span class="nm">${m.name}</span><span>${m.arg!=null?m.arg:''}</span><span class="tm">${m.time}</span></div>`);
  return h+`</details>`;
}

/* ---------- nav / wiring ---------- */
let tab='paper',stack=[];
const view=document.getElementById('view'),stackEl=document.getElementById('stack'),cardBody=document.getElementById('cardbody'),cardTy=document.getElementById('cardty'),hpart=document.getElementById('hpart'),ring=document.getElementById('ring');
const PARTNAME={paper:'Theory',atoms:'Topology',board:'Triage',forecast:'Forecast',clash:'Clash',scene:'Scene'};
function renderTab(){
  if(tab==='paper')view.innerHTML=paperHTML();
  else if(tab==='atoms')view.innerHTML=atomsHTML();
  else if(tab==='board')view.innerHTML=boardHTML();
  else if(tab==='forecast')view.innerHTML=forecastHTML();
  else if(tab==='clash')view.innerHTML=clashHTML();
  else {view.innerHTML=sceneHTML();updateScene(0);}
  hpart.textContent=PARTNAME[tab];
  document.querySelectorAll('.dock button').forEach(b=>b.classList.toggle('on',b.dataset.tab===tab));
  if(tab==='atoms'){const si=document.getElementById('searchin');if(si)si.oninput=e=>{searchQ=e.target.value;const pos=e.target.selectionStart;renderTab();const n=document.getElementById('searchin');if(n){n.focus();n.setSelectionRange(pos,pos);}};}
  window.scrollTo(0,0);
}
function refreshMeter(){const p=pctNow();document.getElementById('pcttxt').textContent=p+'%';ring.style.background=`conic-gradient(var(--oxide) ${p}%,var(--rule2) 0)`;}
function openCard(al){const a=get(al);if(!a)return;stack.push(al);cardTy.innerHTML=(TYLABEL[a.type]||a.type)+(stack.length>1?' &middot; depth '+stack.length:'');cardBody.innerHTML=cardHTML(a);cardBody.scrollTop=0;stackEl.classList.add('on');}
function recard(){cardBody.innerHTML=cardHTML(get(stack[stack.length-1]));refreshMeter();}
function back(){stack.pop();if(!stack.length){stackEl.classList.remove('on');return;}const a=get(stack[stack.length-1]);cardTy.innerHTML=(TYLABEL[a.type]||a.type)+(stack.length>1?' &middot; depth '+stack.length:'');cardBody.innerHTML=cardHTML(a);}
document.getElementById('backbtn').onclick=back;
document.addEventListener('input',e=>{const id=e.target&&e.target.id;
  if(id==='scrub')updateScene(parseFloat(e.target.value));
  else if(id==='thick'){const t=parseFloat(e.target.value);const pour=get('IWP-011003');pour.qty=Math.round(1800*t);
    const S=scheduleAll();const set=(i,v)=>{const el=document.getElementById(i);if(el)el.textContent=v;};
    set('pxt',t.toFixed(2)+' m');set('pxvol',pour.qty+' m3');set('pxtrucks',Math.ceil(pour.qty/45)+' trucks');
    set('pxdur',baseDur(pour).toFixed(1)+' d');set('pxfin','finish Day '+Math.ceil(S.finish));}});
document.addEventListener('click',e=>{
  const go=e.target.closest('[data-go]');if(go){openCard(go.dataset.go);return;}
  const tg=e.target.closest('[data-toggle]');if(tg){const a=get(tg.dataset.toggle);a.complete=!a.complete;a.stream.push({sender:'demo-user',name:'set-complete',arg:String(a.complete),time:'now'});refreshMeter();
    if(stack.length)recard();else if(tab==='paper'){const ex=document.getElementById('exhibit-cascade');if(ex)ex.innerHTML=cascadeInner();}else renderTab();return;}
  const tb=e.target.closest('[data-tab]');if(tb){if(SCENE_T){clearInterval(SCENE_T);SCENE_T=null;}tab=tb.dataset.tab;if(stack.length){stack=[];stackEl.classList.remove('on');}renderTab();return;}
  const sp=e.target.closest('#sceneplay');if(sp){
    if(SCENE_T){clearInterval(SCENE_T);SCENE_T=null;sp.innerHTML='&#9654; Play';}
    else{sp.innerHTML='&#10074;&#10074; Pause';SCENE_T=setInterval(()=>{const s=document.getElementById('scrub');
      if(!s){clearInterval(SCENE_T);SCENE_T=null;return;}
      let v=parseFloat(s.value)+0.25;if(v>SCENE_FIN)v=0;s.value=v;updateScene(v);},110);}
    return;}
  const bm=e.target.closest('[data-bm]');if(bm){boardMode=bm.dataset.bm;renderTab();return;}
  const pf=e.target.closest('[data-perf]');if(pf){applyPerf(pf.dataset.perf);renderTab();return;}
  const rv=e.target.closest('[data-resolve]');if(rv){const[short,long]=rv.dataset.resolve.split('|');addEdge(short,'after',long);refreshMeter();renderTab();return;}
});
renderTab();refreshMeter();
</script>
