<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ACT -- Atomic Constraint Theory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f2ecdf; --hi:#faf6ec; --panel:#faf7ee; --panel2:#f3edde;
  --ink:#221c10; --ink2:#544c3a; --faint:#9a9077; --rule:#ddd2b6; --rule2:#cabd9c;
  --oxide:#a8401f; --green:#2f7d4f; --red:#b13d2c; --amber:#a87718; --blue:#2c5d78; --violet:#6c5fae; --warn:#a65a2a;
  --disp:'Fraunces',Georgia,serif; --serif:'Newsreader',Georgia,serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:#dcd3bd;font-family:var(--serif);color:var(--ink);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative;overflow:hidden;
  box-shadow:0 0 0 1px #00000014,0 24px 70px rgba(60,48,24,.18)}

/* running header */
.run{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
  padding:11px 18px;background:rgba(250,246,236,.94);backdrop-filter:blur(6px);border-bottom:1px solid var(--rule)}
.run-mark{font-family:var(--disp);font-weight:900;font-size:20px;letter-spacing:.04em;color:var(--ink)}
.run-mark b{color:var(--oxide)}
.run-part{font-family:var(--mono);font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--faint);padding-left:12px;border-left:1px solid var(--rule2)}
.run-meter{margin-left:auto;display:flex;align-items:center;gap:8px}
.run-meter span{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink)}
.ring{width:22px;height:22px;border-radius:50%;background:conic-gradient(var(--oxide) 0,var(--rule2) 0);position:relative;flex:none;transition:background .5s cubic-bezier(.2,.8,.2,1)}
.ring::after{content:'';position:absolute;inset:4px;border-radius:50%;background:var(--hi)}

main{padding:0 0 92px}
.doc{padding:22px 20px 8px}

/* cover */
.cover{padding:30px 20px 24px;border-bottom:2px solid var(--ink);position:relative;overflow:hidden}
.docno{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--oxide);display:flex;justify-content:space-between}
.cover h1{font-family:var(--disp);font-weight:900;font-size:76px;line-height:.84;letter-spacing:-.03em;margin:18px 0 0}
.cover .full{font-family:var(--disp);font-weight:500;font-style:italic;font-size:22px;margin-top:10px}
.cover .def{font-size:15px;color:var(--ink2);margin:14px 0 0;max-width:40ch}
.index{margin-top:20px;border-top:1px solid var(--rule);padding-top:4px}
.index .row-i{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-bottom:1px solid var(--rule)}
.index .n{font-family:var(--mono);font-size:10px;color:var(--oxide);width:22px;flex:none}
.index .nm{font-family:var(--disp);font-weight:600;font-size:14px}
.index .d{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;margin-left:auto}
.abstract{margin-top:22px;font-size:15px;line-height:1.62}
.abstract .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--oxide);display:block;margin-bottom:5px}
.abstract p{margin:0;color:var(--ink2)}

/* sections */
section{margin:30px 0 0;opacity:0;transform:translateY(12px);animation:rise .65s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes rise{to{opacity:1;transform:none}}
.snum{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--oxide);font-weight:600}
h2{font-family:var(--disp);font-weight:600;font-size:25px;line-height:1.06;letter-spacing:-.012em;margin:4px 0 7px}
p{margin:11px 0;color:var(--ink2)}
p strong{color:var(--ink);font-weight:500}
.drop::first-letter{font-family:var(--disp);font-weight:900;font-size:56px;line-height:.66;float:left;margin:8px 9px 0 0;color:var(--oxide)}
.aside{border-left:2px solid var(--oxide);padding:3px 0 3px 14px;margin:16px 0;font-size:13.5px;line-height:1.52;color:var(--ink2);font-style:italic}
.aside b{font-style:normal;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--ink);text-transform:uppercase}
.rule{height:1px;background:var(--rule);margin:26px 0}
a.alias{font-family:var(--mono);font-size:.82em;font-style:normal;color:var(--blue);text-decoration:none;border-bottom:1px solid var(--rule2);cursor:pointer;white-space:nowrap;padding-bottom:1px}
a.alias:active{color:var(--oxide);border-color:var(--oxide)}

/* exhibit -- a framed figure, same paper */
.exhibit{margin:22px 0}
.exlabel{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--oxide);display:flex;align-items:center;gap:9px;margin-bottom:8px}
.exlabel .live{margin-left:auto;color:var(--green);display:inline-flex;align-items:center;gap:5px}
.exlabel .live i{width:6px;height:6px;border-radius:50%;background:var(--green)}
.console{background:var(--hi);border:1px solid var(--rule2);border-radius:10px;padding:16px;box-shadow:0 1px 0 #fff inset,0 2px 8px rgba(60,48,24,.06)}
.excap{font-size:13px;font-style:italic;color:var(--faint);margin-top:9px;line-height:1.5}
.excap b{font-style:normal;font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--ink2)}

/* status */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex:none}
.dot.green{background:var(--green)} .dot.red{background:var(--red)} .dot.amber{background:var(--amber)} .dot.blue{background:var(--blue)}
.pill{font-family:var(--mono);font-size:9px;letter-spacing:.11em;text-transform:uppercase;padding:3px 8px;border-radius:30px;border:1px solid var(--rule2);color:var(--ink2);white-space:nowrap;display:inline-flex;align-items:center;gap:5px;background:var(--hi)}
.pill.green{color:var(--green);border-color:#b8cfbb} .pill.red{color:var(--red);border-color:#d9b3a8}
.pill.amber{color:var(--amber);border-color:#d6c391} .pill.blue{color:var(--blue);border-color:#b3c6d0}
.pill.warn{color:var(--warn);border-color:#d8b694}

/* rows */
.row{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--panel);border:1px solid var(--rule2);
  border-radius:10px;padding:12px 13px;margin:8px 0;cursor:pointer;color:var(--ink);transition:background .15s,transform .06s;box-shadow:0 1px 2px rgba(60,48,24,.05)}
.row:active{background:var(--panel2);transform:scale(.992)}
.row .body{flex:1;min-width:0}
.row .al{font-family:var(--mono);font-size:11px;color:var(--blue);letter-spacing:.02em}
.row .nm{font-family:var(--serif);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.row .tag{font-family:var(--mono);font-size:8.5px;color:var(--faint);letter-spacing:.16em;text-transform:uppercase}
.chev{color:var(--faint);font-size:18px;flex:none;font-family:var(--serif)}
.grp{margin:18px 0 5px;display:flex;align-items:center;gap:9px}
.grp .t{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink2)}
.grp .ln{flex:1;height:1px;background:var(--rule)} .grp .ct{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
.empty{font-family:var(--mono);font-size:11px;color:var(--faint);text-align:center;padding:18px 0;letter-spacing:.04em}

/* reading cover */
.rcover{padding:26px 20px 8px}
.reye{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--oxide)}
.rcover h2{font-family:var(--disp);font-weight:900;font-size:38px;letter-spacing:-.02em;margin:8px 0 4px;line-height:1}
.rcover p{font-size:14.5px;color:var(--ink2);margin:8px 0 16px;line-height:1.52}
.panel{margin:0 16px}

/* triage */
.gauge{display:flex;gap:9px;margin:2px 0}
.stat{flex:1;background:var(--panel);border:1px solid var(--rule2);border-radius:10px;padding:12px;box-shadow:0 1px 2px rgba(60,48,24,.05)}
.stat .v{font-family:var(--disp);font-weight:900;font-size:24px;line-height:1}
.stat .l{font-family:var(--mono);font-size:8px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-top:6px}
.stat.r .v{color:var(--red)} .stat.a .v{color:var(--amber)} .stat.g .v{color:var(--green)}
.seg{display:flex;background:var(--panel2);border:1px solid var(--rule2);border-radius:10px;padding:3px;margin:14px 0 4px;gap:2px}
.seg button{flex:1;background:none;border:0;color:var(--ink2);font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:8px 0;border-radius:7px;cursor:pointer;transition:background .15s,color .15s}
.seg button.on{background:var(--hi);color:var(--ink);box-shadow:0 1px 2px rgba(60,48,24,.08)}
.ownerblk{margin:14px 0}
.ownerblk .oh{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.ownerblk .oh .nm{font-family:var(--disp);font-weight:600;font-size:13px}
.ownerblk .oh .ct{font-family:var(--mono);font-size:9.5px;color:var(--red);margin-left:auto}
.lead-note{font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.55;margin:2px 0 8px}

/* search */
.search{padding:0 0 10px}
.search input{width:100%;background:var(--hi);border:1px solid var(--rule2);border-radius:10px;color:var(--ink);font-family:var(--mono);font-size:13px;padding:12px 13px;letter-spacing:.04em}
.search input::placeholder{color:var(--faint)} .search input:focus{outline:none;border-color:var(--oxide)}

/* forecast */
.finishcard{background:var(--panel);border:1px solid var(--rule2);border-radius:11px;padding:15px;margin:2px 0 8px;box-shadow:0 1px 2px rgba(60,48,24,.05)}
.finishcard .fl{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.finishcard .fv{font-family:var(--disp);font-weight:900;font-size:32px;line-height:1;margin:5px 0 14px}
.hist{position:relative;height:58px;display:flex;align-items:flex-end;gap:2px;margin-top:4px}
.hbar{flex:1;background:linear-gradient(180deg,#c9a96a,#9fb693);border-radius:2px 2px 0 0;min-height:1px;opacity:.7;transition:height .4s}
.hov{position:absolute;top:-3px;bottom:0;width:2px;border-radius:2px}
.hov.p50{background:var(--blue)} .hov.p80{background:var(--oxide)}
.haxis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.06em;text-transform:uppercase;margin-top:7px}
.pcts{display:flex;gap:16px;margin:11px 0 1px;font-family:var(--mono);font-size:10.5px;color:var(--ink2)}
.pcts b{color:var(--ink);font-weight:600} .pcts .k{color:var(--oxide);letter-spacing:.08em}
.perfrow{display:flex;gap:8px;margin:9px 0 2px}
.cxbtn{font-family:var(--mono);font-size:10px;letter-spacing:.03em;border-radius:8px;padding:9px 11px;cursor:pointer;border:1px solid var(--rule2);background:var(--hi);color:var(--ink2);transition:transform .06s}
.cxbtn:active{transform:scale(.97)} .cxbtn.flex{flex:1;text-align:center}
.cxbtn.done{border-color:#b8cfbb;color:var(--green)}
.row.sched{align-items:flex-start} .row.sched .body{display:block}
.sline{display:block;font-family:var(--mono);font-size:9.5px;color:var(--ink2);margin-top:4px;line-height:1.5}
.sline2{display:block;font-family:var(--mono);font-size:9px;color:var(--faint);margin-top:2px}
.sline2.warn2,.warn2{color:var(--warn)}
.crit{font-family:var(--mono);font-size:7.5px;letter-spacing:.12em;background:#f4ded6;color:var(--red);border:1px solid #d9b3a8;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}

/* clash */
.clashcard{background:var(--panel);border:1px solid #d9b3a8;border-radius:11px;padding:13px;margin:9px 0;box-shadow:0 1px 2px rgba(60,48,24,.05)}
.clashcard .cz{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.clashcard .cz .w{color:var(--oxide)}
.clashcard .cpair{margin:5px 0 10px} .clashcard .cpair .row{margin:6px 0}

/* exhibit cascade internals */
.cx-iwp{display:flex;align-items:center;gap:10px;padding-bottom:13px;border-bottom:1px solid var(--rule);margin-bottom:3px}
.cx-iwp .al{font-family:var(--mono);font-size:11px;color:var(--blue)}
.cx-iwp .nm{font-family:var(--disp);font-weight:600;font-size:15px}
.cx-iwp .st{margin-left:auto}
.cx-gate{display:flex;align-items:center;gap:10px;padding:12px 0 4px}
.cx-gate .info{flex:1;min-width:0}
.cx-gate .gal{font-family:var(--mono);font-size:10px;color:var(--faint)}
.cx-gate .gnm{font-size:13px}

/* card overlay */
#stack{position:absolute;inset:0;z-index:60;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);background:var(--paper);display:flex;flex-direction:column}
#stack.on{transform:translateX(0)}
.cardtop{position:sticky;top:0;background:rgba(250,246,236,.95);border-bottom:1px solid var(--rule);padding:11px 14px;display:flex;align-items:center;gap:11px;z-index:5}
.back{background:var(--hi);border:1px solid var(--rule2);color:var(--ink);font-family:var(--mono);font-size:11px;border-radius:8px;padding:7px 11px;cursor:pointer}
.back:active{background:var(--panel2)}
.cardtop .tyc{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:.18em;text-transform:uppercase}
.cardbody{overflow-y:auto;padding:18px 16px 44px;flex:1}
.chead{display:flex;align-items:flex-start;gap:11px}
.chead .al{font-family:var(--mono);font-size:13px;color:var(--blue)}
.chead h1{font-family:var(--disp);font-weight:900;font-size:22px;line-height:1.08;margin:3px 0 0}
.states{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0}
.kv{display:grid;grid-template-columns:92px 1fr;gap:7px 12px;margin:15px 0;font-size:13px}
.kv dt{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;padding-top:3px}
.kv dd{margin:0} .kv dd.mono{font-family:var(--mono);font-size:11px;color:var(--ink2);word-break:break-all}
.lens{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;color:var(--violet);border:1px solid #cdc6e2;background:#f1eef8;border-radius:9px;padding:7px 11px}
.toggle{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--rule2);border-radius:11px;padding:13px;margin:15px 0;cursor:pointer;box-shadow:0 1px 2px rgba(60,48,24,.05)}
.toggle .sw{width:44px;height:25px;border-radius:14px;background:var(--panel2);border:1px solid var(--rule2);position:relative;flex:none;transition:.2s}
.toggle .sw i{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--faint);transition:.2s}
.toggle.on .sw{background:#dcead9;border-color:#b8cfbb} .toggle.on .sw i{left:21px;background:var(--green)}
.toggle .tt{flex:1} .toggle .tt .a{font-size:13px} .toggle .tt .b{font-family:var(--mono);font-size:9.5px;color:var(--faint);margin-top:2px}
.toggle.locked{opacity:.55;cursor:not-allowed}
details.audit{margin-top:17px;border:1px solid var(--rule2);border-radius:11px;background:var(--panel);overflow:hidden}
details.audit summary{list-style:none;cursor:pointer;padding:12px 13px;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2)}
details.audit summary::-webkit-details-marker{display:none}
.msg{border-top:1px solid var(--rule);padding:9px 13px;font-family:var(--mono);font-size:10px;color:var(--ink2);display:flex;gap:9px}
.msg .nm{color:var(--green)} .msg .tm{color:var(--faint);margin-left:auto;white-space:nowrap}
.note{font-family:var(--mono);font-size:10.5px;color:var(--faint);border-left:2px solid var(--rule2);padding:7px 0 7px 12px;margin:15px 0;line-height:1.55}

/* scene */
.scenewrap{background:var(--hi);border:1px solid var(--rule2);border-radius:11px;padding:10px 8px 6px;box-shadow:0 1px 2px rgba(60,48,24,.05)}
.scenewrap svg{display:block;width:100%;height:auto}
.zface{stroke:var(--ink);stroke-width:.7;stroke-linejoin:round}
.zface.top{fill:#efe7d2} .zface.lf{fill:#e3d9bd} .zface.rt{fill:#d9cdab}
.zshell .zface{fill:none;stroke:var(--faint);stroke-dasharray:3 3;stroke-width:.6}
.zocc .zface.top{fill:#ecd9a8} .zocc .zface.lf{fill:#e0c98c} .zocc .zface.rt{fill:#d4bb77}
.zclash .zface{stroke:var(--oxide);stroke-width:1}
.zclash .zface.top{fill:#ecc4b4} .zclash .zface.lf{fill:#e2af9a} .zclash .zface.rt{fill:#d59c85}
.zcritz .zface.top{stroke:#a8401f;stroke-width:1}
.pour{stroke:#221c10;stroke-width:.5}
.pour.top{fill:#b8a98a}.pour.lf{fill:#a89878}.pour.rt{fill:#9c8c6c}
.mod{stroke:#221c10;stroke-width:.7}
.mod.top{fill:#8fa9c4}.mod.lf{fill:#7d97b2}.mod.rt{fill:#6d87a2}
.slegend{display:flex;flex-wrap:wrap;gap:12px;margin:9px 2px 2px;font-family:var(--mono);font-size:8px;color:var(--ink2);letter-spacing:.04em}
.slegend i{display:inline-block;width:10px;height:10px;border-radius:2px;border:1px solid #221c10;margin-right:4px;vertical-align:-1px}
.slegend .sw1{background:#ecd9a8}.slegend .sw2{background:#ecc4b4}.slegend .sw3{background:none;border-color:#a8401f}.slegend .sw4{background:#b8a98a}.slegend .sw5{background:#8fa9c4}
.zgrp{cursor:pointer}
.zdone .zface.top{fill:#ded2b0}.zdone .zface.lf{fill:#d2c5a0}.zdone .zface.rt{fill:#c6b890}
.crane{stroke:#221c10;stroke-width:.6}
.crane.top{fill:#cfc8b8}.crane.lf{fill:#bfb8a8}.crane.rt{fill:#afa898}
.swing{fill:none;stroke:#a8401f;stroke-width:.6;stroke-dasharray:2 3;opacity:.45}
.jibln{stroke:#221c10;stroke-width:1.3;stroke-linecap:round}
.hookln{stroke:#221c10;stroke-width:.6;stroke-dasharray:2 2}
.trail{stroke:#8fa9c4;stroke-width:.7;stroke-dasharray:3 3;opacity:.65}
.stk{stroke:#221c10;stroke-width:.4}
.stk.top{fill:#d4b87c}.stk.lf{fill:#c6a96c}.stk.rt{fill:#b89a5c}
.crewdot{stroke:#221c10;stroke-width:.5}
.slegend .sw6{background:none;border-style:dashed;border-color:#a8401f}.slegend .sw7{background:#ded2b0}
.zlab{font-family:var(--mono);font-size:6.5px;fill:var(--ink2)}
.scrubrow{display:flex;align-items:center;gap:11px;margin:10px 2px 2px}
.scrubrow .day{font-family:var(--mono);font-size:11px;font-weight:600;min-width:58px}
.scrubrow input[type=range]{flex:1;accent-color:var(--oxide)}
.scenelive{font-family:var(--mono);font-size:9.5px;color:var(--ink2);line-height:1.7;margin:8px 2px 0;min-height:30px}
.scenelive .cl{color:var(--oxide)}
.jtmtext{font-family:var(--mono);font-size:10px;line-height:1.65;color:var(--ink2);background:var(--panel2);border:1px solid var(--rule2);border-radius:9px;padding:11px 13px;margin:0;overflow-x:auto;white-space:pre}
details.jtmsrc{margin:12px 0 0}
details.jtmsrc summary{list-style:none;cursor:pointer;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink2);padding:4px 0}
details.jtmsrc summary::-webkit-details-marker{display:none}

/* parametric chain + governance diagram */
.pxrow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.pxrow input{flex:1;accent-color:var(--oxide)}
.pxl{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.pxv{font-family:var(--mono);font-size:11px;font-weight:600;min-width:54px;text-align:right}
.pxchain{display:flex;flex-wrap:wrap;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;color:var(--ink2)}

.scurve{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

  .doc{padding:26px 24px 8px}

  body,p{font-size:16.5px}

  .finishcard .fv{font-size:40px}
  .annex{max-width:none}
  .annex .mono{font-size:12px}
  .jtmtext{font-size:11.5px}
}

/* ============================================================ SUBSTRATE
   One substance: the atom. There is no edge, no wire, no link table. A
   relationship is a FIELD on the atom whose value is a list of atoms
   (by alias here; by UUID in the real build). Pointing is just a field
   holding a thing -- the same mechanism as every other field. */
function Cell(type,alias){return{uuid:(crypto.randomUUID?crypto.randomUUID():'u-'+Math.random().toString(16).slice(2)),type,alias,stream:[]};}
const Identified=(c,a)=>Object.assign(c,{name:a.name,attrs:a.attrs||{}});
const Owned=(c,a)=>Object.assign(c,{owner:a.owner||null});
const Timed=(c,a)=>Object.assign(c,{needBy:a.needBy||null});
const Completes=(c,a)=>Object.assign(c,{completionKind:a.completionKind,complete:!!a.complete});
const ContentRef=(c,a)=>Object.assign(c,{contentRef:a.contentRef||null});
const Scheduled=(c,a)=>Object.assign(c,{est:a.est||null,qty:a.qty||null,unit:a.unit||null,rate:a.rate||null,estBias:a.estBias!=null?a.estBias:null,deliveryFactor:a.deliveryFactor!=null?a.deliveryFactor:null,spread:a.spread!=null?a.spread:null,samples:a.samples!=null?a.samples:null});
const Geo=(c,a)=>Object.assign(c,{jtm:a.jtm||null,src:a.src||null}); /* JTM parametric -- a few numbers of text describing real geometry */
const REL=['contains','enables','blocks','waits-on','cleared-by','supplies','allocated-to','verified-by','applies-to','after','estimated-by','done-by','in-zone','responsible-for','threatens','informs','builds','content','tag','raised-by','answers-to','governed-by','lifts-for'];
const Related=(c,a)=>{REL.forEach(r=>{if(a[r])c[r]=a[r].slice();});return c;};
function atom(s){const c=Cell(s.type,s.alias);Identified(c,s);Owned(c,s);Timed(c,s);Completes(c,s);ContentRef(c,s);Scheduled(c,s);Geo(c,s);Related(c,s);
  c.stream.push({sender:'seed',name:'created',arg:s.type,time:s.t0||'D-540'});
  if(REL.some(r=>c[r]&&c[r].length))c.stream.push({sender:'seed',name:'linked',arg:'fields',time:s.t0||'D-540'});
  return c;}
const STORE={byAlias:{},all:[],incoming:{}};
function load(list){list.forEach(s=>{const a=atom(s);STORE.byAlias[a.alias]=a;STORE.all.push(a);});
  STORE.all.forEach(a=>REL.forEach(r=>{(a[r]||[]).forEach(to=>{(STORE.incoming[to]=STORE.incoming[to]||[]).push({rel:r,from:a.alias});});}));}
const get=al=>STORE.byAlias[al];
const out=(a,rel)=>(a[rel]||[]).map(get).filter(Boolean);
const inc=(al,rel)=>(STORE.incoming[al]||[]).filter(e=>e.rel===rel).map(e=>get(e.from)).filter(Boolean);
const isBound=a=>REL.some(r=>a[r]&&a[r].length)||(STORE.incoming[a.alias]||[]).length>0;

/* COMPLETION -- polymorphic, cycle-guarded. trivial|leaf|gate|rollup|verified.
   A non-trivial atom must be BOUND before it may complete. */
function isComplete(a,seen){seen=seen||new Set();if(!a)return false;
  if(a.completionKind==='trivial')return true;
  if(seen.has(a.alias))return false;seen.add(a.alias);
  if(!isBound(a))return false;
  switch(a.completionKind){
    case 'leaf':return !!a.complete;
    case 'gate':{const t=[...out(a,'waits-on'),...out(a,'cleared-by')];return t.length>0&&t.every(x=>isComplete(x,seen));}
    case 'rollup':{const ch=out(a,'contains');return ch.length>0&&ch.every(x=>isComplete(x,seen));}
    case 'verified':{const v=out(a,'verified-by');return v.length>0&&v.every(x=>isComplete(x,seen));}
    default:return !!a.complete;}}
function openBlockers(iwp){return inc(iwp.alias,'blocks').filter(c=>!isComplete(c));}
function isReady(iwp){return openBlockers(iwp).length===0;}

/* THE ONE FAILURE MODE -- an atom named but not modeled: bound (or should be)
   yet with no statable test for when it is met, or no one named who can say so.
   trivial atoms are exempt; completion that is derived downstream (rollup,
   verified) needs no owner of its own. */
const GOVERNANCE=['constraint','risk','decision','action'];
function reachesNexus(al,seen){const a=get(al);if(!a)return false;if(a.type==='nexus')return true;seen=seen||new Set();if(seen.has(al))return false;seen.add(al);return (a['answers-to']||[]).some(x=>reachesNexus(x,seen));}
function modelingGap(a){
  if(a.completionKind==='trivial')return null;
  let missingTest=false;
  if(a.completionKind==='gate')missingTest=([...out(a,'waits-on'),...out(a,'cleared-by')].length===0);
  else if(a.completionKind==='rollup')missingTest=(out(a,'contains').length===0);
  else if(a.completionKind==='verified')missingTest=(out(a,'verified-by').length===0);
  const missingAuthority=GOVERNANCE.includes(a.type)&&!a.owner;
  const orphaned=GOVERNANCE.includes(a.type)&&a.owner&&!reachesNexus(a.owner);
  if(!missingTest&&!missingAuthority&&!orphaned)return null;
  const reasons=[];
  if(missingTest)reasons.push('No clearing condition -- nothing defines when this is met');
  if(missingAuthority)reasons.push('No named authority -- no one is assigned who can say it is met');
  if(orphaned)reasons.push("Orphaned authority -- the owner's chain does not reach the management nexus");
  return{missingTest,missingAuthority,orphaned,reasons};
}

/* ============================================================ FORECAST
   A duration is a spread, not a number. The estimator (who owns the
   estimate) sets the middle; the crew (who does the work) sets the width;
   thin track records pull toward caution. The planned date is a
   medium-pessimism point on that spread. Links are pure sequence -- no lag. */
const PERF0={'SUB-RE':{deliveryFactor:1.22,spread:0.30,samples:5}};
function applyPerf(mode){const c=get('SUB-RE');if(!c)return;
  if(mode==='improve'){c.deliveryFactor=1.05;c.spread=0.14;c.samples=14;}
  else{c.deliveryFactor=PERF0['SUB-RE'].deliveryFactor;c.spread=PERF0['SUB-RE'].spread;c.samples=PERF0['SUB-RE'].samples;}}
const workAtoms=()=>STORE.all.filter(a=>a.est||a.qty);
function baseDur(a){const crew=out(a,'done-by')[0];
  if(a.qty&&crew&&crew.rate)return a.qty/crew.rate; /* parametric: quantity over calibrated rate */
  return a.est;}
function plan(a){
  const base=baseDur(a);if(!base)return null;
  const estr=out(a,'estimated-by')[0],crew=out(a,'done-by')[0];
  const eBias=estr&&estr.estBias!=null?estr.estBias:1.0, eConf=estr&&estr.samples!=null?Math.min(estr.samples,8)/8:0;
  const c0=base*(1+(eBias-1)*eConf);
  const cBias=crew&&crew.deliveryFactor!=null?crew.deliveryFactor:1.0, cConf=crew&&crew.samples!=null?Math.min(crew.samples,8)/8:0;
  const central=c0*(1+(cBias-1)*cConf);
  const own=crew&&crew.spread!=null?crew.spread:0.25;
  const spread=0.25*(1-cConf)+own*cConf;
  return {central, planned:central*(1+spread*0.6), spread, low:central*(1-spread*0.4), high:central*(1+spread*1.4)};
}
function nbDay(s){const m=/(\d+)/.exec(s||'');return m?+m[1]:0;}
function blockFloor(a){let f=0;openBlockers(a).forEach(c=>{const d=nbDay(c.needBy);if(d>f)f=d;});return f;}
function ef(a,memo,seen){memo=memo||{};seen=seen||new Set();
  if(memo[a.alias]!=null)return memo[a.alias];
  if(seen.has(a.alias))return 0;seen.add(a.alias);
  let start=blockFloor(a); /* dates cannot start work its open constraints still hold */
  out(a,'after').forEach(p=>{start=Math.max(start,ef(p,memo,seen));});
  const p=plan(a);const dur=isComplete(a)?0:(p?p.planned:0);
  return memo[a.alias]=start+dur;}
function scheduleAll(){const memo={},work=workAtoms();work.forEach(a=>ef(a,memo));
  let finish=0,last=null;work.forEach(a=>{if(memo[a.alias]>finish){finish=memo[a.alias];last=a;}});
  const crit=new Set();let cur=last;
  while(cur){crit.add(cur.alias);let best=null,bf=-1;out(cur,'after').forEach(p=>{if(memo[p.alias]>bf){bf=memo[p.alias];best=p;}});cur=best;}
  let lo=0,hi=0;crit.forEach(al=>{const a=get(al);if(isComplete(a))return;const p=plan(a);if(p){lo+=p.low;hi+=p.high;}});
  return {memo,finish,critical:crit,bandLow:lo,bandHigh:hi};}



function addEdge(fromAl,rel,toAl){const f=get(fromAl);if(!f)return;f[rel]=f[rel]||[];if(f[rel].includes(toAl))return;
  if(rel==='after'){const seen=new Set();const reaches=(x,t)=>{if(x===t)return true;if(seen.has(x))return false;seen.add(x);return ((get(x)||{}).after||[]).some(p=>reaches(p,t));};if(reaches(toAl,fromAl))return;}
  f[rel].push(toAl);(STORE.incoming[toAl]=STORE.incoming[toAl]||[]).push({rel,from:fromAl});
  f.stream.push({sender:'decision',name:'sequenced-after',arg:toAl,time:'now'});}

function zoneAncestors(z,acc){acc=acc||new Set();inc(z,'contains').forEach(p=>{if(p.type==='zone'&&!acc.has(p.alias)){acc.add(p.alias);zoneAncestors(p.alias,acc);}});return acc;}
function boxOf(z){const a=get(z);return a&&a.jtm&&a.jtm.box||null;} /* [x,y,z,w,d,h] */
function boxesIntersect(p,q){return p[0]<q[0]+q[3]&&q[0]<p[0]+p[3]&&p[1]<q[1]+q[4]&&q[1]<p[1]+p[4]&&p[2]<q[2]+q[5]&&q[2]<p[2]+p[5];}
function zonesOverlap(a,b){if(!a||!b)return false;if(a===b)return true;
  const pa=boxOf(a),pb=boxOf(b);
  if(pa&&pb)return boxesIntersect(pa,pb); /* real volumes when the parametrics exist */
  return zoneAncestors(a).has(b)||zoneAncestors(b).has(a);}
function windows(){const S=scheduleAll(),w={};
  workAtoms().forEach(a=>{if(isComplete(a))return;const p=plan(a),dur=p?p.planned:0,end=S.memo[a.alias];
    const z=(out(a,'in-zone')[0]||{}).alias||null;if(z)w[a.alias]={start:end-dur,end,zone:z};});return w;}
function zoneRoot(z,cache){if(cache[z])return cache[z];let cur=z,guard=0;
  for(;;){const par=inc(cur,'contains').find(p=>p&&p.type==='zone');if(!par||++guard>64)break;cur=par.alias;}
  return cache[z]=cur;}
function clashes(){const w=windows(),cache={},buckets={},list=[];
  /* claims can only collide inside one root volume, so pair within buckets, never across */
  Object.keys(w).forEach(a2=>{const r=zoneRoot(w[a2].zone,cache);(buckets[r]=buckets[r]||[]).push(a2);});
  for(const r in buckets){const al=buckets[r];
    for(let i=0;i<al.length;i++)for(let j=i+1;j<al.length;j++){
      const A=w[al[i]],B=w[al[j]];
      const s=Math.max(A.start,B.start),e=Math.min(A.end,B.end);
      if(e<=s+0.01)continue;
      if(!zonesOverlap(A.zone,B.zone))continue;
      const da=A.end-A.start,db=B.end-B.start,long=da>=db?al[i]:al[j],short=da>=db?al[j]:al[i];
      list.push({za:w[long].zone,zb:w[short].zone,long,short,start:s,end:e});}}
  return list;}

/* ---------- shared force layout (tiny, fast, no library) ---------- */
function graphLayout(n,edges,W,H,iters){
  const X=new Float64Array(n),Y=new Float64Array(n);
  for(let i=0;i<n;i++){const a=i*2.399963;const r=Math.min(W,H)*0.07*Math.sqrt(i+1);
    X[i]=W/2+r*Math.cos(a);Y[i]=H/2+r*Math.sin(a)*0.9;}
  for(let it=0;it<iters;it++){
    const cool=1-it/iters,fx=new Float64Array(n),fy=new Float64Array(n);
    for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){
      let dx=X[i]-X[j],dy=Y[i]-Y[j];const d2=dx*dx+dy*dy+1;
      const f=620/d2;fx[i]+=dx*f;fy[i]+=dy*f;fx[j]-=dx*f;fy[j]-=dy*f;}
    for(let e=0;e<edges.length;e++){const a=edges[e][0],b=edges[e][1];
      let dx=X[b]-X[a],dy=Y[b]-Y[a];const d=Math.sqrt(dx*dx+dy*dy)+0.01;
      const f=(d-30)*0.035;fx[a]+=dx/d*f*d*0.04+dx/d*f;fy[a]+=dy/d*f;fx[b]-=dx/d*f;fy[b]-=dy/d*f;}
    for(let i=0;i<n;i++){fx[i]+=(W/2-X[i])*0.012;fy[i]+=(H/2-Y[i])*0.012;
      X[i]+=Math.max(-9,Math.min(9,fx[i]))*cool;Y[i]+=Math.max(-9,Math.min(9,fy[i]))*cool;
      X[i]=Math.max(14,Math.min(W-14,X[i]));Y[i]=Math.max(12,Math.min(H-12,Y[i]));}}
  return {X,Y};}

/* ---------- Theory (the paper) ---------- */
function A(al){return `<a class="alias" data-go="${al}">${al}</a>`;}
function paperHTML(){
  return `
  <div class="cover">
    <div class="docno"><span>ACT / WP-01</span><span>Rev. E &middot; Field paper</span></div>
    <h1>ACT</h1>
    <div class="full">Atomic Constraint Theory</div>
    <p class="def">One thing runs the whole job: the atom. A constraint, tied in or floating loose. The job is done when every atom is done. That is the entire theory.</p>
    <div class="index">
      <div class="row-i"><span class="n">I</span><span class="nm">Theory</span><span class="d">the idea</span></div>
      <div class="row-i"><span class="n">II</span><span class="nm">Topology</span><span class="d">the wiring</span></div>
      <div class="row-i"><span class="n">III</span><span class="nm">Triage</span><span class="d">6am</span></div>
      <div class="row-i"><span class="n">IV</span><span class="nm">Forecast</span><span class="d">the dates</span></div>
      <div class="row-i"><span class="n">V</span><span class="nm">Clash</span><span class="d">the space</span></div>
      <div class="row-i"><span class="n">VI</span><span class="nm">Scene</span><span class="d">the picture</span></div>
    </div>
    ${(()=>{const tot=STORE.all.length,done=STORE.all.filter(x=>isComplete(x)).length;
      const oc=STORE.all.filter(x=>x.completionKind==='gate'&&(x.blocks&&x.blocks.length)&&!isComplete(x)).length;
      const cls=clashes().length,gp=STORE.all.filter(x=>modelingGap(x)).length,fin=Math.ceil(scheduleAll().finish);
      const cell=(v,l)=>'<span class="cv"><b>'+v+'</b><i>'+l+'</i></span>';
      return '<div class="covstats">'+cell(tot,'atoms')+cell(Math.round(done/tot*100)+'%','done')+cell(oc,'blocking')+cell(cls,'clashes')+cell(gp,'gaps')+cell('Day '+fin,'finish')+'</div>';})()}
    <div class="abstract"><span class="lbl">Abstract</span>
      <p>Twenty years of project systems, each keeping its own list of every kind of thing, with half the effort going into keeping the lists in step. This paper takes the other path: one store, one shape, read six ways. The first half is the model. The second half is the system at work -- how it is fed, governed, shared, and remembered. An annex carries the build spec, so the paper, the demonstration, and the input to construction are one file. The exhibits are live; try them as you read.</p>
    </div>
  </div>
  <div class="doc">
    <section style="animation-delay:.02s"><div class="snum">&sect; 1 &middot; THE MODEL</div><h2>One table, not a zoo</h2>
      <p class="drop">The standard platform keeps a table for work packages, a table for materials, a table for RFIs, a table for risk, and a layer of integrations to hold them all in step. ACT keeps one table. A "type" is just which traits an atom is wearing, so a new kind of thing next year is atoms with a new word attached -- no new table, no migration. The dial up top is the whole theory in one number: how many atoms are done. Anything underlined is a real atom; tap it. The paper runs inside the system it describes.</p>
      <div class="aside"><b>Lineage</b> Not new math. Theory of Constraints -- a job moves as fast as whatever is binding it -- taken off the trailer wall and made the data instead of a poster.</div>
    </section>

    <section style="animation-delay:.04s"><div class="snum">&sect; 2</div><h2>The atom</h2>
      <p>An atom starts as a bare thing with an ID, and traits are added to it: who owns it, when it is due, how it finishes, what it links to. It is built by stacking traits, not by inheriting down a family tree of classes -- a programming habit that turns brittle when the real world does not fit the tree. Because it stacks, any one atom can wear a trait none of its neighbours have. A hand in the field puts a one-off constraint on one specific pump and the model takes it. No schema change.</p>
      <p>Constraints arrive from three worlds -- the schedule, the CAD model, the engineering requirements -- and they are all the same atom in the same graph. A weld hold point is one atom that the scheduler reads as a hold and the engineer reads as a code requirement. The discipline-specific part is the vocabulary, never the thing.</p>
    </section>

    <section style="animation-delay:.06s"><div class="snum">&sect; 3</div><h2>Bound, and floating</h2>
      <p>An atom is born loose. It gets tied down later -- to the work it waits on, the work it feeds. The rule: nothing real gets called done until it is tied into something. You do not turn over a package that belongs to no area. The loose ones, like ${A('CON-0009')} -- a crane worry somebody thumbed in at the gate -- sit amber under Triage as floating. That is correct. The field logs the worry first and finds it a home second.</p>
      <div class="aside"><b>Where it breaks</b> A model that absorbs everything has to keep meaning something. The test: if you cannot say what "done" means for an atom and name who is allowed to call it, it is not modeled yet -- only named. The Gaps view lists exactly those, so the weak spots stay visible.</div>
    </section>

    <section style="animation-delay:.08s"><div class="snum">&sect; 4</div><h2>Done is not ready</h2>
      <p>Done and ready are two different things. A package is ready when nothing is in its way; it is done when the work is in. Ready is never stored -- it is worked out fresh from whatever is still blocking. Run it:</p>
      <div class="exhibit">
        <div class="exlabel">Exhibit A &middot; the cascade <span class="live"><i></i>live</span></div>
        <div class="console" id="exhibit-cascade">${cascadeInner()}</div>
        <div class="excap">Land the rebar, close the RFI. Each <b>gate</b> flips the moment the thing it waited on lands; the package goes <b>ready</b> and the dial up top moves. One tap rolls through the links -- nobody rekeyed a date.</div>
      </div>
    </section>

    <section style="animation-delay:.1s"><div class="snum">&sect; 5</div><h2>Five ways a thing finishes</h2>
      <p><strong>Leaf</strong> -- somebody flips it: ${A('MAT-RBR-014')} on site, ${A('RFI-1043')} answered.<br>
      <strong>Gate</strong> -- a constraint; clears itself when everything it waits on clears: ${A('CON-0001')}.<br>
      <strong>Rollup</strong> -- done when its children are done: ${A('CWP-0110')}, ${A('CWA-01')}.<br>
      <strong>Verified</strong> -- done when something else proves it: ${A('REQ-N287')} waits on its test report.<br>
      <strong>Trivial</strong> -- born done, blocks nobody: ${A('LES-0007')}, ${A('ASM-0002')}.</p>
      <p>Some conditions are not events at all but arithmetic, evaluated whenever read. A permit is current while today sits inside its dates; a pour window holds while the forecast stays above the limit. Nothing expires in the model -- the read starts returning false, and Triage can say "this goes false in five days and three open packages read it" before it flips, not after.</p>
    </section>

    <section style="animation-delay:.12s"><div class="snum">&sect; 6</div><h2>One tree, the rest are tags</h2>
      <p>One hierarchy carries the math -- one parent per atom, no debate, because that is what the rollups count. Anything that really belongs in two places is a ${A('TAG-CIVIL')}: a label you stack and nest to slice the job however you like, and it never touches a rollup. One tree for the truth, as many tag views as you want for looking at it.</p>
    </section>

    <section style="animation-delay:.14s"><div class="snum">&sect; 7</div><h2>Atoms here, content stays put</h2>
      <p>The only thing that resists being an atom is dead content -- the 3D model, the drawing, the document body. That already lives in BIM, GIS and the document system, so it stays there. ACT points at it; it does not hoard it. Open ${A('SYS-CONTAIN')} or ${A('ASSET-SLAB')} and the pointer is on the card. ACT owns the graph -- the things, their state, how they connect -- and drives those systems instead of copying them. The exception that proves the rule is geometry small enough to be text: a zone's volume is a few plain numbers (JTM), and those the graph keeps, because they price the work and schedule the space.</p>
    </section>

    <section style="animation-delay:.16s"><div class="snum">&sect; 8</div><h2>The schedule is a reading</h2>
      <p>A strong claim, so here is why it holds. The links that carry "is it ready" already carry "what comes first" -- ${A('IWP-011003')} comes after the east mat. Put a duration on each piece of work, walk the order, and the dates and the longest chain fall out: the critical path, on the same graph. And because schedule and constraints are one graph, the dates cannot say a pour starts Tuesday while a permit is still open. Two separate systems cannot promise that, because they were always two separate books.</p>
      <p>Two rules keep it clean. <strong>Lag is illegal</strong> -- the links carry no number. Every wait that used to hide as "+3 days" on an arrow becomes its own atom with a name and a clock: concrete cure is a three-day thing the next pour waits on. And the date walk reads only order and containment, never supply or ownership, or the dates stop meaning anything.</p>
    </section>

    <section style="animation-delay:.18s"><div class="snum">&sect; 9</div><h2>What a duration is</h2>
      <p>A duration is a range, built from six inputs. The estimator's optimistic-to-pessimistic spread seeds it -- and on first-of-a-kind work, where no records exist yet, that spread is the whole story, made with the normal tools of the trade. The estimator's track record shifts the middle; the crew's track record sets the width; recent progress -- how this crew is actually running, lately -- pulls open durations in or out without anyone re-estimating. Where the work carries a quantity, the arithmetic informs the range: ${A('IWP-011003')} is 450 m3 at the crew's rate, a number that can flow in automatically or sit as a suggestion the planner accepts. And the sixth input watches the other five: every finished package lands its actual against what was forecast, and the blend shifts toward whatever has been predicting well. Nobody retunes anything by hand.</p>
      <p>The planner stays on top, and on the record. The model advises; the planner commits; the commitment is itself a tracked prediction, scored like everything else. The published schedule is a range -- the single-date schedule was always the convenient fiction -- but execution still needs points: "when do I show up" gets Monday, 7am. A point is an appointment, sampled from the range when reality demands one, and kept or missed on the record.</p>
      ${durAnatomyHTML()}
      <div class="aside"><b>Care</b> This runs on the track record of real people and real crews. It sizes durations; it does not build a file on anyone. Thin samples move the numbers barely, and a crew can see its own record.</div>
    </section>

    <section style="animation-delay:.2s"><div class="snum">&sect; 10</div><h2>Time and space</h2>
      <p>AWP had this instinct all along: a construction work area is a claim on a volume for a window. ACT keeps the idea and adds precision. Every zone carries its geometry as a few plain numbers -- open ${A('ZONE-RB-SLAB-E')} and the volume is on the card -- and anything with a footprint and a window makes a claim: a crew, a module on its way to the bay, a scaffold that squats for a month, a laydown stack. Two claims on one volume in one window is a clash, raised by the system before anyone mobilizes and cleared the way it gets cleared in the field: a call that splits them, this one first, then the next. The decision writes the sequence and the dates move to match.</p>
      ${paramChainHTML()}
      <p>The same arithmetic read as capacity covers the quieter problem: a yard at 95 percent is not a clash yet, but it is a constraint on every delivery routed toward it -- a threshold that goes false exactly like a lapsing permit. Congestion, the productivity cost no current system can see, becomes a number on a card with an owner. <strong>Scene</strong> draws all of it, day by day, straight from the graph.</p>
    </section>

    <section style="animation-delay:.22s"><div class="snum">&sect; 11</div><h2>Risks, and the unknown</h2>
      <p>A risk is an atom that relates differently: it threatens work rather than blocking it, and it carries a probability and an impact. That is the right home for the constraints nobody on the project commands -- the regulator's review, the grid connection, a labor market that has to produce eight hundred ironworkers. Each is watched by an internal owner, and the day one fires it does what risks do: spawns an ordinary constraint, owned and dated, like ${A('RSK-0003')} would. The forecast samples the risk register directly -- some runs the review slips, some it does not -- so the externals are priced without being faked.</p>
      <p>The interruptions nobody names -- the late RFI, the surprise condition -- are already priced inside the estimator's pessimism; injecting imagined constraints on top would charge the job twice. The measured discovery rate reports to the sixth input instead: if a kind of work keeps discovering more than its ranges absorbed, the ranges learn it from the actuals.</p>
    </section>

    <section style="animation-delay:.24s"><div class="snum">&sect; 12 &middot; THE SYSTEM AT WORK</div><h2>Nobody feeds it</h2>
      <p>The question every veteran asks first: who feeds this thing? Nobody. It eats events. The scan that opens the package card at the face -- the card with the drawings, the holds, and the answer to "am I clear" -- is the start of work; the sign-offs the job already requires are the finish; stand-downs fall out on their own, because no scan means no working time. Two scans a shift, riding acts the field performs out of self-interest, not compliance.</p>
      <p>Quantity is captured by quantizing it: a hundred cubic metres of pour is ten constraints of ten, and each truck's ticket clears one. Progress can no longer be claimed, only cleared, with paper behind every clearing -- which retires percent complete as a reported number. Earned value stops being a monthly reconciliation and becomes a live property of the graph.</p>
      <p>Through the construction peak, any phone does this. As the security envelope closes toward fuel load, owner-issued devices take over -- same atoms, same scans, different glass.</p>
    </section>

    <section style="animation-delay:.26s"><div class="snum">&sect; 13</div><h2>The whole picture, plus your slice</h2>
      <p>The foreman's default view is her slice -- today's packages, today's holds, who is in my zone, what the forecast says clears by noon. The whole graph is one tap away, and nothing is walled off, because the foreman who can see why her package lost the crane plans better than the one who just sees "crane: no." Filtered is fine; siloed never. And the morning huddle changes character: the graph already knows status, so the fifteen minutes stop being status collection and become what huddles were always meant to be -- decisions about the day.</p>
    </section>

    <section style="animation-delay:.28s"><div class="snum">&sect; 14</div><h2>Procedures that run</h2>
      <p>A procedure here is a document and a program at once: prose carrying the reasoning, with the rules written as constraint blocks that load and run. "Every pour requires an approved pour card" stops being a description the system might drift from and becomes the source the system executes -- there is no gap between what the procedure says and what is enforced, because they are the same text. Auditing becomes reading. The procedure writer becomes the programmer without ever learning that they did.</p>
      <div class="exhibit"><div class="exlabel">Exhibit C &middot; governance, drawn from the graph <span class="live"><i></i>live</span></div>
      <div class="console" style="padding:12px 8px">${processSVG()}</div>
      <div class="excap">The authority tree comes off the answers-to fields; the rule chain off raised-by, blocks and governed-by. <b>J. Doyle has no chain to the nexus -- the same orphan the Gaps view flags.</b></div></div>
      <p>Governance is made of the same substance it governs. A revision raises a decision -- apply the new rule to the forty open pours, or grandfather them -- answered by an authority, on the record, with each package showing which revision governs it. An override is a clearing with a name attached, by someone whose authority to clear is itself written in a procedure. Changes crossing between disciplines move by setting: automatic, released by the engineer, or accepted by the construction manager -- and a pending crossing is an open constraint on the board, in the one state everybody sees. Run this way, most of a management system standard like N286 is not implemented so much as it falls out: authorities, records, verification, hold points, change control, traceability -- all properties of the graph. Every authority chain terminates somewhere; that point has a name -- the management nexus -- and it is an atom, so the ceiling of the system is visible inside the system. A chain that does not reach it is a gap.</p>
    </section>

    <section style="animation-delay:.3s"><div class="snum">&sect; 15</div><h2>The contract is the interface</h2>
      <p>At a commercial boundary, the treaty is the contract, and the contract names what crosses: constraint states, quantum clearings, appointments kept or missed -- the agreed set, nothing more. A sub's internal rates and float stay theirs. What changes everything is one property: both sides have the same data. Not similar data, not monthly-reconciled data -- the same atoms, the same timestamps, recorded jointly as events happened. A claim is two private ledgers disagreeing about the past; with one shared record there is nothing to reconstruct, and the dispute shrinks to entitlement. It cuts both ways, which is why a careful counterparty signs it: the record that shows the owner's access delay is the record that shows the slow mobilization.</p>
      <p>The contract clauses that govern data are procedures, loaded like any other. And the realistic path in is the owner's: this is an owner's instrument -- the owner carries the finish date, eats the claims, and holds the only ledger that can span every contractor. It enters as a planning tool, reading the submittals everyone already provides, and earns its place by being right when the official schedule is not.</p>
    </section>

    <section style="animation-delay:.32s"><div class="snum">&sect; 16</div><h2>The job remembers</h2>
      <p>Because every change arrives as a message with its sender, its content, and its time, the system's operation is its history -- there is no separate archive to build. Replay is the same computation as the live board, stopped at an earlier day: what did the morning look like when that decision was made. And the next project inherits the data, not a binder: estimator ranges seeded from scored estimates, crew rates carried as records instead of reputations, a risk register that starts as the constraints that actually fired last time, with frequencies. The learning curve -- the thing this industry keeps failing to keep -- becomes a property of the database. The first estimate on the next unit is the last project's lesson.</p>
    </section>

    <section style="animation-delay:.34s"><div class="snum">&sect; 17 &middot; CLOSE</div><h2>The path of no resistance</h2>
      <p>A constraint is binary: open or met. There is no partially blocked, and no pushing through an open constraint by trying harder -- the rebar is on site or it is not. So resistance does not come in degrees here, and the working rule is simple: work never pushes against an open constraint. Crews flow to the open work -- the jar of ready, in-scope, resourced, approved packages -- while the owners of the open constraints attack the resistance itself. Two different jobs, and the discipline is never confusing them. On day one the open water is upstream -- the permit application is not blocked, the design is not blocked -- and the rule holds there the same as at peak. When deviating genuinely pays, the risk acceptance is a clearing by an authority, on the record, and the rule never broke: no constraints, go.</p>
      <p>That is the whole idea: one store of one thing, read six ways -- the argument, the wiring, the morning list, the dates, the spaces, the picture. Same atoms every time; nothing converted, nothing reconciled, nothing out of step.</p>
      <div class="aside"><b>Wishlist</b> What to ask of the platform: one store of one thing; one tree for rollups, free tags for views; own the graph, point at BIM, GIS and docs; a lag-free schedule that is just a reading; durations as ranges from records, with the planner on top; capture as a side effect of the work; procedures and contracts that run; clash raised off space and time before crews collide; and the whole history kept, because the next project starts from it. Everything linked, everything an atom.</div>
    </section>
    <div class="annex">
      <div class="snum">ANNEX A &middot; BUILD SPEC</div>
      <h2>The same system, stated for the builder</h2>
      <p>Everything above, restated as the input to a build. This annex matches the running demo exactly; the demo is the worked example of every line here. Where the demo simplifies for legibility, the simplification is named.</p>

      <div class="ax">A1 &middot; Substrate</div>
      <h3>Atoms, traits, fields</h3>
      <p>One stored thing: the atom. A plain object built by stacking trait functions -- identity, ownership, timing, completion, content reference, scheduling, geometry -- never class inheritance. Any single atom may carry a trait its type's default recipe lacks. There is no link or edge object: a relationship is a field on the atom whose value is a list of other atoms. The demo holds targets by readable alias; the build holds them by UUID, with the alias as a display field, so a rename touches one atom and breaks nothing. The reverse question (what points at me) is an index built by scanning the relationship fields at load and maintained on every change -- a lookup, not a thing in the model.</p>
      <div class="mono">relationship fields: contains, enables, blocks, waits-on, cleared-by,
supplies, allocated-to, verified-by, applies-to, after, estimated-by,
done-by, in-zone, responsible-for, threatens, informs, builds, content,
tag, raised-by, answers-to, governed-by</div>

      <div class="ax">A2 &middot; Identity</div>
      <h3>Two names, one key</h3>
      <p>Every atom carries a UUID as the real key and a type-prefixed alias (IWP-011003, CON-0004) for radio and eyeballs. The QR on the physical package encodes the UUID; scan or type either and land on the same card. History is not a side log: it is the stream of messages the atom received -- sender, name, argument, time -- and replay is folding that stream to an earlier day.</p>

      <div class="ax">A3 &middot; Completion</div>
      <h3>Five kinds, plus arithmetic</h3>
      <p>trivial (born done, blocks nothing), leaf (somebody flips it), gate (clears itself when everything it waits on clears), rollup (done when contained children are done), verified (done when a separate atom proves it). All walks are cycle-guarded. A non-trivial atom must be bound -- tied into the graph -- before it may be called done. Readiness is separate from completion and never stored: a package is ready when no open gate blocks it. Some conditions are not events but arithmetic evaluated on read: a permit current while today sits inside its dates, a yard under its capacity threshold. Nothing expires in the model; the read starts returning false, and Triage flags the flip before it lands.</p>

      <div class="ax">A4 &middot; The two schedule rules</div>
      <h3>Order is clean or dates are noise</h3>
      <p>Lag is illegal: relationship fields hold atoms, never numbers, and every wait that hides as "+3 days" on an arrow becomes its own atom with a name and a clock. The date walk reads only the after field and the containment tree -- never supply, ownership, or any other field. One hierarchy carries the rollup math, single parent, no debate; everything that belongs in two places is a tag, stackable, nestable, never counted.</p>

      <div class="ax">A5 &middot; Catalog</div>
      <h3>Types are recipes, not tables</h3>
      <p>CWA, CWP, IWP (rollups and work); quantum (a unit of installed quantity -- a hundred cubic metres of pour is ten atoms of ten, each cleared by its ticket, so progress is cleared, never claimed); constraint, risk (threatens with probability and impact), action, decision (a call made on the record, with its ratifying authority), appointment (a point sampled from a range, kept or missed and scored); material, purchase order, supplier, RFI, document, requirement; EWP, PWP, procedure (carries literate source that runs); building, system, asset, zone (carries JTM geometry and optionally capacity arithmetic); person (estimate bias, sample count, answers-to chain), crew (delivery factor, spread, sample count, production rate); lesson, assumption, tag, nexus. A new type next year is atoms with a new word attached.</p>

      <div class="ax">A6 &middot; Duration</div>
      <h3>Six inputs, one range</h3>
      <p>Base duration is quantity over the crew's rate where a quantity exists, else the estimate. The estimator's record shifts the middle, the crew's record sets the width, thin samples pull toward caution. Recent progress (not yet in the demo) tightens or widens open durations from this job's actuals. The sixth input scores the forecast itself and retunes the blend, including scoring planner overrides -- the planner commits, the commitment is tracked.</p>
      <div class="mono">base    = qty / crew.rate            (else est)
central = base * (1 + (estBias - 1) * eConf)
        *       (1 + (deliveryFactor - 1) * cConf)
spread  = 0.25 * (1 - cConf) + crew.spread * cConf
planned = central * (1 + spread * 0.6)   -- medium pessimism
conf    = min(samples, 8) / 8            -- thin records earn slowly</div>

      <div class="ax">A7 &middot; Forecast</div>
      <h3>Simulated, with the register in it</h3>
      <p>Project the graph to work atoms and their after fields; topo-sort once; each run is a straight-line pass: finish = duration + max of predecessor finishes. Shared factors are sampled once per run and pushed down -- each crew's week, the site weather -- so correlation comes from the graph instead of being assumed away. Durations sample lognormal: work runs late more than early. The risk register is sampled directly: each named risk fires with its probability and lands its impact days on the work it threatens; unnamed interruptions stay priced inside the estimator's pessimism, never injected twice. Outputs: the finish distribution (P50, P80, P90) and a criticality index -- how often each task drives the finish across all runs. The engine in this file already runs the flat-array pass with an adaptive run count, and conflict detection buckets claims by their root volume so buildings never compare across each other. Measured on a single core: a million-atom graph loads in about half a minute, the constraint-aware date walk takes three seconds, conflict detection finds a hundred and twenty-six thousand claim overlaps in four, and the simulation lands in twelve. At a hundred thousand atoms every reading answers in under a second after load. Memory is the practical ceiling -- roughly 3.5 GB at a million atoms -- which is a workstation, not a phone; the phone reads a slice served by the store. Past that, the remaining levers are the ones already named: vectorize across iterations and prune completed and high-float work.</p>

      <div class="ax">A8 &middot; Space and time</div>
      <h3>Claims on volumes</h3>
      <p>A zone carries its geometry as a JTM parametric -- a few plain numbers, box x y z w d h in site coordinates -- nested as a breakdown: site, building, level, bay. Anything with a footprint and a window claims space: crews, modules in transit, scaffolds, laydown stacks. Two claims conflict when their volumes intersect (tree ancestry as fallback where no geometry exists) and their schedule windows overlap. A clash is raised by the system, cleared by a decision that splits the claimants; the decision writes a real after field and the dates move. Capacity is the same arithmetic read as a threshold: claimed over available, going false like a lapsing permit. Scene draws all of it from the graph, day by day, and the scene serializes as JTM text.</p>

      <div class="ax">A9 &middot; Gaps</div>
      <h3>Three ways to be named, not modeled</h3>
      <p>Every atom must answer: what counts as done, and who may say so. Flagged: a gate with nothing to wait on (no clearing condition); a governance atom with no owner (no named authority); and an owner whose answers-to chain does not reach the management nexus (orphaned authority). The nexus is an atom -- every authority chain terminates there, what sits above it is outside the system, and the system says so.</p>

      <div class="ax">A10 &middot; Governance</div>
      <h3>Made of the same substance</h3>
      <p>A procedure is a document and a program: prose plus rule blocks that load and run, raising constraints that carry raised-by back to their source. A revision raises a decision -- apply to open work or grandfather it -- answered by an authority on the record, with each package showing its governing revision. An override is a clearing with a name attached. Changes crossing between disciplines move by setting: automatic, released by the engineer, or accepted by the construction manager; a pending crossing is an open constraint in the one state everybody sees. There are never two truths.</p>
      <div class="exhibit"><div class="exlabel">Exhibit E &middot; a change crossing disciplines <span class="live"><i></i>live</span></div>
      <div class="console" style="padding:12px 8px">${crossingSVG()}</div>
      <div class="excap">Rev B left engineering, flowed into the model automatically, and is waiting at the schedule boundary for the CM's pull. The pending crossing is an ordinary open constraint -- find CHG-0005 under Triage, owned, dated, in the one state everybody sees.</div></div>

      <div class="ax">A11 &middot; Capture</div>
      <h3>It eats events</h3>
      <p>Start of work is the scan that opens the package card at the face; finish is the sign-offs the job already requires; stand-downs fall out because no scan means no working time. Quantity arrives quantized: each ticket clears a quantum. No progress reporting exists anywhere in the system. Any phone through the construction peak; owner-issued devices as the security envelope closes. The records size durations -- they are not a file on anyone; thin samples move numbers barely, and a crew can see its own record.</p>

      <div class="ax">A12 &middot; Boundary and memory</div>
      <h3>Contracts run; the job remembers</h3>
      <p>At a commercial boundary the contract names what crosses -- constraint states, quantum clearings, appointments kept or missed -- and both sides hold the same atoms with the same timestamps, so a dispute shrinks to entitlement. The data clauses are procedures, loaded like any other. The stream is the archive: replay is the live computation stopped at an earlier day, and the next project seeds its estimator ranges, crew records, risk register, and blend weightings from this one's actuals.</p>

      <div class="ax">A13 &middot; Open items</div>
      <h3>Known distance to the build</h3>
      <p>Fields resolve by UUID (demo uses aliases). The zone breakdown needs real site grain. The Monte Carlo needs the vectorized pass and fitted distributions in place of placeholder constants. The recent-progress input needs the time series the scans will produce. Offline sync and its conflict queue are deferred on purpose: they are the heaviest build and prove nothing about whether the model is right. The seed inside this file is the canonical example dataset -- read it as the worked example of everything above.</p>
    </div>

  </div>`;
}

/* ---------- Topology ---------- */
let searchQ='';
function atomsHTML(){
  const q=searchQ.trim().toUpperCase();
  let list=STORE.all.filter(a=>a.type!=='content');
  if(q)list=list.filter(a=>a.alias.toUpperCase().includes(q)||(a.name||'').toUpperCase().includes(q)||(TYLABEL[a.type]||'').toUpperCase().includes(q));
  const order=['cwa','cwp','iwp','quantum','constraint','decision','appointment','material','purchase-order','supplier','rfi','document','action','requirement','procedure','equipment','ewp','pwp','building','system','asset','zone','risk','lesson','assumption','person','crew','nexus','tag'];
  list.sort((x,y)=>(order.indexOf(x.type)-order.indexOf(y.type))||x.alias.localeCompare(y.alias));
  let h=`<div class="rcover"><div class="reye">Reading II</div><h2>Topology</h2><p>The wiring itself: every atom a node, every relationship field a line, settled by force. Open work glows hollow; gaps ring in oxide. Tap any node to open it.</p></div>
    <div class="panel">${topoGraphSVG()}<div class="search"><input id="searchin" placeholder="SEARCH ALIAS, NAME OR TYPE" value="${searchQ.replace(/"/g,'&quot;')}"></div>
    <div class="grp"><span class="t">All atoms</span><span class="ln"></span><span class="ct">${list.length}</span></div>`;
  if(!list.length)h+=`<div class="empty">No match</div>`;
  list.slice(0,300).forEach(a=>h+=rowHTML(a));
  if(list.length>300)h+=`<div class="empty">showing 300 of ${list.length} -- search to narrow</div>`;
  return h+`</div>`;
}

/* ---------- Triage ---------- */
let boardMode='lookahead';
function boardHTML(){
  const total=STORE.all.length,done=STORE.all.filter(a=>isComplete(a)).length;
  const blocked=STORE.all.filter(a=>a.type==='iwp'&&!isReady(a)).length;
  const openCons=STORE.all.filter(a=>a.completionKind==='gate'&&(a.blocks&&a.blocks.length>0)&&!isComplete(a));
  const floating=STORE.all.filter(a=>!isBound(a)&&a.completionKind!=='trivial');
  let h=`<div class="rcover"><div class="reye">Reading III</div><h2>Triage</h2><p>What the graph gives you at 6am: what is choking the next stretch of work, sorted by who can clear it.</p></div>
    <div class="panel">
    <div class="gauge"><div class="stat g"><div class="v">${done}</div><div class="l">Atoms done</div></div><div class="stat a"><div class="v">${total-done}</div><div class="l">Open</div></div><div class="stat r"><div class="v">${blocked}</div><div class="l">IWPs blocked</div></div></div>
    <div class="seg">
      <button data-bm="lookahead" class="${boardMode==='lookahead'?'on':''}">Lookahead</button>
      <button data-bm="mywork" class="${boardMode==='mywork'?'on':''}">My Work</button>
      <button data-bm="float" class="${boardMode==='float'?'on':''}">Floating</button>
      <button data-bm="gaps" class="${boardMode==='gaps'?'on':''}">Gaps</button>
    </div>`;
  if(boardMode==='lookahead'){
    const byOwner={};openCons.forEach(c=>{const o=c.owner||'(unassigned)';(byOwner[o]=byOwner[o]||[]).push(c);});
    h+=`<div class="grp"><span class="t">Blocking the work</span><span class="ln"></span><span class="ct">${openCons.length} open</span></div>`;
    h+=wallSVG(openCons);
    if(!openCons.length)h+=`<div class="empty">All clear -- nothing blocking</div>`;
    const computed=STORE.all.filter(a2=>a2.attrs&&(a2.attrs['valid window']||a2.attrs['threshold']));
    if(computed.length){h+=`<div class="grp"><span class="t">Computed conditions</span><span class="ln"></span><span class="ct">${computed.length}</span></div>`;
      computed.forEach(a2=>{const readers=inc(a2.alias,'waits-on').filter(c2=>!isComplete(c2)).length;
        const line=a2.attrs['valid window']?'holds while today is inside '+a2.attrs['valid window']+' &middot; read by '+readers+' open constraint(s) -- flagged before it flips, not after':a2.attrs['threshold'];
        h+=rowHTML(a2)+`<div class="sline2" style="margin:-3px 4px 10px;padding-left:19px">${line}</div>`;});}
    Object.keys(byOwner).forEach(o=>{const p=get(o);h+=`<div class="ownerblk"><div class="oh"><span class="dot amber"></span><span class="nm">${p?p.name:o}</span><span class="ct">${byOwner[o].length} owned</span></div>`;byOwner[o].slice(0,15).forEach(c=>h+=rowHTML(c));if(byOwner[o].length>15)h+=`<div class="empty">+ ${byOwner[o].length-15} more</div>`;h+=`</div>`;});
  }else if(boardMode==='mywork'){
    const me=get('PER-TM'),mine=out(me,'responsible-for');
    h+=`<div class="grp"><span class="t">${me.name} &middot; responsible for</span><span class="ln"></span><span class="ct">${mine.length}</span></div>`;
    mine.forEach(x=>h+=rowHTML(x));
    const ownedOpen=STORE.all.filter(a=>a.owner==='PER-TM'&&!isComplete(a)&&a.type!=='iwp');
    h+=`<div class="grp"><span class="t">Open items I own</span><span class="ln"></span><span class="ct">${ownedOpen.length}</span></div>`;
    if(!ownedOpen.length)h+=`<div class="empty">Nothing open</div>`;
    ownedOpen.forEach(x=>h+=rowHTML(x));
  }else if(boardMode==='float'){
    h+=`<div class="grp"><span class="t">Floating obligations</span><span class="ln"></span><span class="ct">${floating.length}</span></div>`;
    h+=`<div class="lead-note">Logged, not yet tied in. Cannot be called done until bound.</div>`;
    if(!floating.length)h+=`<div class="empty">None</div>`;
    floating.slice(0,120).forEach(x=>h+=rowHTML(x));
    if(floating.length>120)h+=`<div class="empty">+ ${floating.length-120} more</div>`;
  }else{
    const gaps=STORE.all.filter(a=>modelingGap(a));
    h+=`<div class="grp"><span class="t">Named, not modeled</span><span class="ln"></span><span class="ct">${gaps.length}</span></div>`;
    h+=`<div class="lead-note">A name but no test for when it is done, or nobody allowed to call it. Until that is filled in, the model is only repeating the name back.</div>`;
    if(!gaps.length)h+=`<div class="empty">Nothing unmodeled</div>`;
    gaps.slice(0,120).forEach(x=>{const g=modelingGap(x);h+=rowHTML(x)+`<div class="sline2 warn2" style="margin:-3px 4px 10px;padding-left:19px">${g.reasons.map(r=>'&bull; '+r).join('<br>')}</div>`;});
  }
  return h+`</div>`;
}

/* ---------- Forecast (Monte Carlo) ----------
   The million-atom trick, small: project to work-and-sequence, topo-sort once,
   then run K iterations as straight-line passes over the fixed order. Shared
   factors (crew week, site weather) are sampled once per run and pushed down
   their tasks, so correlation is free -- it is already in the graph. Outputs a
   finish distribution (P50/P80/P90) and a criticality index per task. */
function gauss(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function lnMult(s){return s<=0?1:Math.exp(s*gauss()-s*s/2);} // lognormal, right-skewed, median ~1
function topoWork(){const order=[],seen=new Set();
  function visit(a){if(seen.has(a.alias))return;seen.add(a.alias);out(a,'after').forEach(p=>{if(p.est||p.qty)visit(p);});order.push(a);}
  workAtoms().forEach(visit);return order;}
function monteCarlo(K){
  /* the scale shape from Annex A7: project to work+after, topo once, then every
     run is one straight pass over flat arrays -- indices, never object lookups.
     K adapts to graph size so the reading stays interactive at any scale. */
  const order=topoWork(),N=order.length,idx={};
  order.forEach((a,i)=>idx[a.alias]=i);
  const central=new Float64Array(N),indep=new Float64Array(N),floorA=new Float64Array(N);
  const doneA=new Uint8Array(N),crewIdx=new Int16Array(N).fill(-1);
  const crewList=STORE.all.filter(a=>a.type==='crew');
  const crewSd=crewList.map(c=>{const conf=Math.min(c.samples||0,8)/8;return (c.spread!=null?c.spread:0.25)*0.5+(1-conf)*0.1;});
  const cIdx={};crewList.forEach((c,i)=>cIdx[c.alias]=i);
  const predTmp=[];
  order.forEach((a,i)=>{const p=plan(a),crew=out(a,'done-by')[0];
    central[i]=p?p.central:0;indep[i]=(p?p.spread:0)*0.6;floorA[i]=blockFloor(a);doneA[i]=isComplete(a)?1:0;
    if(crew&&cIdx[crew.alias]!=null)crewIdx[i]=cIdx[crew.alias];
    predTmp.push(out(a,'after').filter(x=>(x.est||x.qty)&&idx[x.alias]!=null).map(x=>idx[x.alias]));});
  const predOff=new Int32Array(N+1);let tot=0;
  predTmp.forEach((p,i)=>{predOff[i]=tot;tot+=p.length;});predOff[N]=tot;
  const preds=new Int32Array(tot);{let k2=0;predTmp.forEach(p=>p.forEach(v=>preds[k2++]=v));}
  const IMPACT={High:15,Medium:7,Low:3};
  const risks=STORE.all.filter(a=>a.type==='risk'&&a.attrs&&a.attrs.probability).map(r=>{
    const targets=[];out(r,'threatens').forEach(tg=>{if(idx[tg.alias]!=null)targets.push(idx[tg.alias]);out(tg,'contains').forEach(c2=>{if(idx[c2.alias]!=null)targets.push(idx[c2.alias]);});});
    return {alias:r.alias,p:parseFloat(r.attrs.probability)/100,days:IMPACT[r.attrs.impact]||7,targets,fired:0};});
  K=K||3000;if(N>1200)K=Math.max(400,Math.min(K,Math.floor(40e6/Math.max(N,1))));
  const fin=new Float64Array(N),extra=new Float64Array(N);
  const critCount=new Float64Array(N),samples=new Float64Array(K),crewF=new Float64Array(crewList.length);
  const touched=[];
  for(let k=0;k<K;k++){
    const weather=lnMult(0.07);
    for(let c=0;c<crewF.length;c++)crewF[c]=lnMult(crewSd[c]);
    touched.length=0;
    for(const r of risks){if(Math.random()<r.p){r.fired++;
      for(const ti of r.targets){if(!doneA[ti]){extra[ti]+=r.days;touched.push(ti);break;}}}}
    let projF=0,last=-1;
    for(let i=0;i<N;i++){
      let start=doneA[i]?0:floorA[i];
      for(let pi=predOff[i];pi<predOff[i+1];pi++){const f=fin[preds[pi]];if(f>start)start=f;}
      const dur=doneA[i]?0:central[i]*lnMult(indep[i])*(crewIdx[i]>=0?crewF[crewIdx[i]]:1)*weather+extra[i];
      fin[i]=start+dur;if(fin[i]>projF){projF=fin[i];last=i;}}
    samples[k]=projF;
    let cur=last;
    while(cur>=0){critCount[cur]++;let best=-1,bf=-1;
      for(let pi=predOff[cur];pi<predOff[cur+1];pi++){const p2=preds[pi];if(fin[p2]>bf){bf=fin[p2];best=p2;}}
      cur=best;}
    for(const ti of touched)extra[ti]=0;
  }
  const arr=Array.from(samples).sort((a,b)=>a-b),pct=q=>arr[Math.min(arr.length-1,Math.floor(q*arr.length))];
  const crit={};order.forEach((a,i)=>{if(critCount[i])crit[a.alias]=critCount[i]/K;});
  const min=arr[0],max=arr[arr.length-1],bins=22,h=new Array(bins).fill(0),span=(max-min)||1;
  arr.forEach(v=>{let b2=Math.floor((v-min)/span*bins);if(b2>=bins)b2=bins-1;if(b2<0)b2=0;h[b2]++;});
  return {p10:pct(.1),p50:pct(.5),p80:pct(.8),p90:pct(.9),min,max,crit,hist:h,binMin:min,binMax:max,K,risks};
}

function schedRow(a,S,MC){
  const p=plan(a),crew=out(a,'done-by')[0],done=isComplete(a),planned=p?Math.ceil(p.planned):0,ci=Math.round((MC.crit[a.alias]||0)*100);
  const fin=S.memo[a.alias]||0,st=Math.max(0,fin-(p?p.planned:0)),sc=(S.finish*1.06)||1;
  const band=p?`<span class="gtrk"><i class="gband${done?' gdone':''}" style="left:${(st/sc*100).toFixed(1)}%;width:${(((p.high-p.low)+ (p.planned))/sc*100).toFixed(1)}%"></i><i class="gplan" style="left:${(fin/sc*100).toFixed(1)}%"></i></span>`:'';
  return `<button class="row sched" data-go="${a.alias}"><span class="dot ${rowDot(a)}" style="margin-top:3px"></span>
    <span class="body"><span class="al">${a.alias}${ci>=50?'<span class="crit">DRIVES '+ci+'%</span>':''}</span><span class="nm">${a.name}</span>
    ${band}
    <span class="sline">${a.qty?a.qty+' '+(a.unit||'')+' @ '+((out(a,'done-by')[0]||{}).rate||'?')+'/shift = '+(baseDur(a)||0).toFixed(1)+'d':'est '+a.est+'d'} &rarr; planned ${planned}d ${p?`(${Math.floor(p.low)}--${Math.ceil(p.high)})`:''} &middot; finish Day ${Math.ceil(S.memo[a.alias])}${done?' &middot; done':''}</span>
    <span class="sline2">${crew?`crew ${crew.alias} &times;${crew.deliveryFactor.toFixed(2)} n=${crew.samples}${crew.samples<8?' (thin)':''}`:'<span class="warn2">no crew / estimator</span>'} &middot; drives finish ${ci}%</span>
    </span><span class="chev">&rsaquo;</span></button>`;}
function forecastHTML(){
  const S=scheduleAll(),MC=monteCarlo(3000);
  const p50=Math.ceil(MC.p50),p80=Math.ceil(MC.p80),p90=Math.ceil(MC.p90);
  const work=workAtoms().slice().sort((a,b)=>(MC.crit[b.alias]||0)-(MC.crit[a.alias]||0)||S.memo[a.alias]-S.memo[b.alias]);
  const jar=workAtoms().filter(a=>!isComplete(a)&&isReady(a)&&(MC.crit[a.alias]||0)<0.5);
  const lo=MC.binMin,hi=MC.binMax,span=(hi-lo)||1,xp=v=>((v-lo)/span*100),maxH=Math.max(...MC.hist,1);
  const bars=MC.hist.map(c=>`<div class="hbar" style="height:${Math.max(2,c/maxH*100)}%"></div>`).join('');
  let acc=0;const tot=MC.hist.reduce((x,y)=>x+y,0)||1;
  const pts=MC.hist.map((c,i)=>{acc+=c;return ((i+0.5)/MC.hist.length*100).toFixed(1)+','+(100-acc/tot*100).toFixed(1);}).join(' ');
  const scurve=`<svg class="scurve" viewBox="0 0 100 100" preserveAspectRatio="none"><polyline points="${pts}"/></svg>`;
  let h=`<div class="rcover"><div class="reye">Reading IV</div><h2>Forecast</h2><p>The dated reading, run as a simulation. Durations are sampled thousands of times with shared crew-week and weather swings, so the finish is a distribution, not a guess -- and the chain that drives it is whichever one wins most often.</p></div>
    <div class="panel">
    <div class="finishcard"><div class="fl">Planned finish &middot; P80 of ${MC.K.toLocaleString()} runs</div><div class="fv">Day ${p80}</div>
      <div class="hist">${bars}${scurve}<div class="hov p50" style="left:${xp(MC.p50)}%"></div><div class="hov p80" style="left:${xp(MC.p80)}%"></div></div>
      <div class="haxis"><span>Day ${Math.floor(lo)}</span><span>finish distribution</span><span>Day ${Math.ceil(hi)}</span></div>
      <div class="pcts"><span><span class="k">P50</span> <b>Day ${p50}</b></span><span><span class="k">P80</span> <b>Day ${p80}</b></span><span><span class="k">P90</span> <b>Day ${p90}</b></span></div></div>
    <div class="perfrow"><button class="cxbtn flex" data-perf="improve">Log strong run &middot; east crew</button><button class="cxbtn flex" data-perf="reset">Reset records</button></div>
    ${tornadoHTML(MC)}
    <div class="grp"><span class="t">What drives the finish</span><span class="ln"></span><span class="ct">criticality</span></div>`;
  const drivers=work.filter(a=>(MC.crit[a.alias]||0)>0.01).slice(0,60);
  (drivers.length?drivers:work.slice(0,1)).forEach(a=>h+=schedRow(a,S,MC));
  h+=`<div class="grp"><span class="t">All work, by criticality</span><span class="ln"></span><span class="ct">${work.length}</span></div>`;
  work.slice(0,150).forEach(a=>h+=schedRow(a,S,MC));
  if(work.length>150)h+=`<div class="empty">showing 150 of ${work.length}</div>`;
  if(MC.risks&&MC.risks.length){
    h+=`<div class="grp"><span class="t">Risk register &middot; sampled</span><span class="ln"></span><span class="ct">${MC.risks.length}</span></div>`;
    MC.risks.forEach(r=>{const a=get(r.alias);if(!a)return;
      h+=rowHTML(a)+`<div class="sline2" style="margin:-3px 4px 10px;padding-left:19px">fired in ${Math.round(r.fired/MC.K*100)}% of runs &middot; +${r.days}d on ${r.targets.join(', ')||'(no scheduled target)'}</div>`;});
  }
  h+=`<div class="grp"><span class="t">Job jar &middot; ready pull-ahead</span><span class="ln"></span><span class="ct">${jar.length}</span></div>`;
  h+=`<div class="lead-note">Ready, no strings, rarely on the driving chain. Throw it at a crew that gets ahead or stuck -- the slack from planning slow, spent instead of wasted.</div>`;
  if(!jar.length)h+=`<div class="empty">Jar empty</div>`;
  jar.slice(0,60).forEach(a=>h+=rowHTML(a));
  if(jar.length>60)h+=`<div class="empty">showing 60 of ${jar.length}</div>`;
  return h+`</div>`;
}
