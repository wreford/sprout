<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuclear Construction Simulator</title>
<style>
:root {
  --bench: #ECEDEE; --panel: #FFFFFF; --ink: #20242A; --muted: #6A7178; --hair: #D5D8DB;
  --ok: #3E9B6B; --warn: #D9952F; --bad: #C85A4F; --blue: #3B6FB5; --purple: #7C5CBF;
  --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
  --sans: Inter, "Segoe UI", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; }
body { background: var(--bench); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.45; }

/* --- Sticky top --- */
.sticky-top { position: sticky; top: 0; z-index: 20; background: var(--bench); border-bottom: 1px solid var(--hair); }
header { padding: 14px 28px 8px; display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid var(--hair); }
header h1 { font-family: var(--mono); font-size: 20px; font-weight: 700; letter-spacing: .06em; }
header h1 .dim { color: var(--muted); font-weight: 400; font-size: 13px; }
.controls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; padding: 8px 28px; border-bottom: 1px solid var(--hair); background: var(--panel); }
.controls label { font-size: 12px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
select { font: inherit; padding: 4px 8px; border: 1px solid var(--hair); border-radius: 4px; background: var(--panel); font-size: 13px; }
button { font: 600 13px var(--sans); padding: 6px 14px; border-radius: 4px; cursor: pointer; border: 1px solid var(--ink); background: var(--ink); color: var(--panel); }
button.ghost { background: var(--panel); color: var(--ink); }
input[type=range] { accent-color: var(--ink); }
#scrub { width: 220px; }
.tlabel { font-family: var(--mono); font-size: 12px; min-width: 100px; }

.viewport { background: var(--panel); padding: 10px 28px 14px; }
.viewport figcaption { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
.viewport figcaption b { color: var(--ink); }
#site-canvas { width: 100%; aspect-ratio: 16/10; display: block; border: 1px solid var(--hair); background: #FFFFFF; border-radius: 2px; }

/* --- Below viewport --- */
.below { max-width: 1200px; margin: 0 auto; padding: 0 28px 40px; }
.section-title { font-family: var(--mono); font-size: 12px; letter-spacing: .1em; font-weight: 600; margin: 20px 0 10px; color: var(--ink); text-transform: uppercase; }

/* KPI row */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
.kpi { background: var(--panel); border: 1px solid var(--hair); border-radius: 4px; padding: 8px 10px; }
.kpi .kv { font: 700 18px var(--mono); }
.kpi .kl { font: 500 10px var(--mono); letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
.kpi.ok .kv { color: var(--ok); } .kpi.w .kv { color: var(--warn); } .kpi.bad .kv { color: var(--bad); }
.kpi.bl .kv { color: var(--blue); } .kpi.vi .kv { color: var(--purple); }

/* Two-column grid */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
@media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }
.panel { background: var(--panel); border: 1px solid var(--hair); border-radius: 4px; padding: 14px; }
.panel h3 { font-family: var(--mono); font-size: 11px; letter-spacing: .1em; font-weight: 600; margin-bottom: 10px; text-transform: uppercase; color: var(--muted); }
#scurve { width: 100%; height: 140px; display: block; background: #FAFBFB; border: 1px solid var(--hair); border-radius: 2px; }

/* Discipline bars */
.disc-bar { display: flex; align-items: center; gap: 6px; margin: 4px 0; font: 500 11px var(--mono); }
.disc-bar .db-name { width: 50px; color: var(--muted); text-transform: uppercase; }
.disc-bar .db-track { flex: 1; height: 10px; background: var(--bench); border-radius: 3px; overflow: hidden; }
.disc-bar .db-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.disc-bar .db-pct { width: 36px; text-align: right; font-weight: 700; }

/* Pour log */
.pour-item { font: 11px var(--mono); padding: 3px 0; border-bottom: 1px solid var(--hair); color: var(--muted); display: flex; gap: 6px; }
.pour-item .pm { font-weight: 700; color: var(--ink); min-width: 28px; }
.pour-item.done { color: var(--ok); }

/* Milestones */
.ms-row { display: flex; flex-wrap: wrap; gap: 6px; }
.ms-pill { font: 600 10px var(--mono); padding: 4px 8px; border-radius: 12px; border: 1px solid var(--hair); background: var(--panel); color: var(--muted); white-space: nowrap; }
.ms-pill.hit { border-color: var(--ok); color: var(--ok); background: #e8f5e9; }
.ms-pill.future { opacity: .5; }

/* Event feed */
.ev-item { font: 11px var(--mono); padding: 3px 0; border-bottom: 1px solid var(--hair); display: flex; gap: 6px; color: var(--muted); }
.ev-item .ev-mo { font-weight: 700; color: var(--ink); min-width: 28px; }
.ev-item.risk { color: var(--bad); } .ev-item.good { color: var(--ok); } .ev-item.mile { color: var(--purple); }

/* Risk / Long-lead */
.risk-item, .ll-item { display: inline-flex; align-items: center; gap: 4px; font: 11px var(--mono); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--hair); margin: 2px; background: var(--panel); }
.risk-item.hit { border-color: var(--bad); color: var(--bad); background: #fce4ec; }
.risk-item.clear { border-color: var(--ok); color: var(--ok); }
.ll-item.del { border-color: var(--ok); color: var(--ok); background: #e8f5e9; }
.ll-item.wait { color: var(--warn); border-color: var(--warn); }
.ll-item.late { color: var(--bad); border-color: var(--bad); background: #fce4ec; }

/* Report */
.report { font: 12px/1.6 var(--mono); background: #FAFBFB; border: 1px solid var(--hair); border-radius: 4px; padding: 12px; color: var(--muted); white-space: pre-wrap; }

/* What-if / Dims */
.whatif-row { display: flex; flex-wrap: wrap; gap: 6px; }
.whatif-row button { font: 600 11px var(--mono); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--hair); background: var(--panel); color: var(--ink); cursor: pointer; }
.whatif-row button:hover { background: var(--bench); }
.dim-row { display: flex; align-items: center; gap: 6px; font: 11px var(--mono); margin: 3px 0; }
.dim-row label { color: var(--muted); width: 50px; }
.dim-row input[type=range] { flex: 1; height: 4px; }
.dim-row .dv { width: 40px; text-align: right; font-weight: 700; color: var(--blue); }

/* Safety dash */
.safety-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.safety-card { text-align: center; padding: 8px; background: var(--bench); border-radius: 4px; }
.safety-card .sv { font: 700 20px var(--mono); color: var(--ok); }
.safety-card .sl { font: 10px var(--mono); color: var(--muted); text-transform: uppercase; margin-top: 2px; }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 2px; }
</style>
</head>

/* ===== STATE ===== */
let V={}, plant='pwr', month=0, playing=false, spdX=1;
let riskHits=new Set(), delayTotal=0, eventLog=[];
let whatIfDelay=0, whatIfBudget=0, whatIfCrew=0;
let lastRiskCheck=0, msHit=new Set();

/* ===== WHAT-IF ===== */
function whatIf(type,val){
  if(type==='reset'){whatIfDelay=0;whatIfBudget=0;whatIfCrew=0;delayTotal=0;riskHits=new Set();eventLog.push({m:Math.round(month),type:'good',msg:'All scenarios reset'});updateAll();return;}
  if(type==='delay'){whatIfDelay+=val;delayTotal+=Math.max(0,val);eventLog.push({m:Math.round(month),type:'risk',msg:'SCENARIO: '+(val>0?'+':'')+val+'mo schedule impact'});}
  if(type==='accel'){whatIfDelay+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: Schedule crashed by '+Math.abs(val)+'mo'});}
  if(type==='budget'){whatIfBudget+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: Budget increased by $'+val+'B'});}
  if(type==='crew'){whatIfCrew+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: +'+val+' workers added'});}
  updateAll();
}

/* ===== PLANT SETUP ===== */
function setPlant(p){
  plant=p; const cfg=PLANTS[p]; V=Object.assign({},cfg.v);
  PHASES=buildPhases(cfg.dur); MILESTONES=buildMilestones(cfg.dur);
  riskHits=new Set(); delayTotal=0; eventLog=[]; whatIfDelay=0; whatIfBudget=0; whatIfCrew=0; msHit=new Set(); lastRiskCheck=0;
  eventLog.push({m:0,type:'mile',msg:'NTP: '+cfg.name+'. Budget $'+cfg.budget+'B, '+cfg.dur+'mo. '+cfg.fuel+' / '+cfg.coolant+'. Peak workforce: '+cfg.peakWF});
  buildDims(); buildWhatIf(); updateAll();
}

/* ===== SIMULATION HELPERS ===== */
function vis(m,s,e){return m<s?0:m>=e?1:e<=s?0:Math.max(.001,Math.min(1,(m-s)/(e-s)));}
function planned(m){
  const d=PLANTS[plant].dur, x=Math.max(0,Math.min(1,m/d));
  const t=x*x*(3-2*x), s=t*t*(3-2*t);
  return 100*s;
}
function earned(m){
  const effectiveM=Math.max(0,m-delayTotal*.5), baseEV=planned(effectiveM);
  const d=PLANTS[plant].dur, frac=m/d;
  const efficiency=frac<0.15?0.88:frac<0.35?0.93:frac<0.65?0.97:frac<0.85?0.94:0.90;
  return Math.min(100,baseEV*efficiency);
}
function workforce(m){
  if(m<=0)return 0;
  const cfg=PLANTS[plant], pk=cfg.peakWF+whatIfCrew, d=cfg.dur, frac=m/d;
  let factor;
  if(frac<0.20) factor=frac/0.20;
  else if(frac<0.65) factor=1.0;
  else if(frac<0.90) factor=1.0-(frac-0.65)/0.25*0.85;
  else factor=0.15;
  factor*=(1+0.04*Math.sin(m*0.52));
  return Math.round(pk*factor);
}
function discProg(d,m){return m<d.s?0:m>=d.e?100:Math.round((m-d.s)/(d.e-d.s)*100);}

/* ===== COST MODEL =====
   Total monthly cost = labor + materials/overhead + equipment purchases.
   Labor: workforce × $18,000/mo (nuclear-qualified, fully burdened).
   Indirect: workforce × $12,000/mo (supervision, QA, site services, engineering).
   Materials: workforce × $22,000/mo (concrete, rebar, steel, cable, pipe — varies by phase).
   Equipment: lump sum purchases at delivery months (RPV, SGs, turbine, fuel, etc).
   Total "burn rate" per worker: ~$52,000/mo all-in. */
function projectSpent(m){
  const cfg=PLANTS[plant], dur=cfg.dur;
  const mInt=Math.min(Math.round(m),dur);
  let labor=0, indirect=0, materials=0, equipment=0;
  for(let i=1;i<=mInt;i++){
    const wf=workforce(i);
    labor+=wf*18000;
    indirect+=wf*12000;
    const frac=i/dur;
    const matRate=frac<0.15?15000:frac<0.5?28000:frac<0.75?20000:8000;
    materials+=wf*matRate;
  }
  if(cfg.equip){
    cfg.equip.forEach(e=>{if(m>=e.m)equipment+=e.cost*1e9;});
  }
  return{labor:labor/1e9,indirect:indirect/1e9,materials:materials/1e9,equipment:equipment/1e9,
    total:(labor+indirect+materials+equipment)/1e9};
}

/* ===== KPI COMPUTATION ===== */
function kpis(m){
  const cfg=PLANTS[plant],B=cfg.budget+whatIfBudget,ev=earned(m),pv=planned(m),spi=pv>0?ev/pv:1;
  const cost=projectSpent(m),spent=cost.total;
  const cpi=spent>0.1?(ev/100*B)/spent:1,eac=Math.min(B*2.5,cpi>0.1?B/cpi:B);
  const dur=cfg.dur;
  const mwe=m>=dur?cfg.mwe:m>=dur-6?Math.round(cfg.mwe*.5):m>=dur-12?Math.round(cfg.mwe*.05):0;
  let cumVol=0;POURS.forEach(p=>{if(m>=p.m+2)cumVol+=p.vol;});
  const wf=workforce(m);
  const activePhases=PHASES.filter(p=>m>=p.s&&m<p.e).length;
  const deliveredLL=LONGLEAD.filter(l=>m>=l.deliver).length;
  return[
    {v:Math.round(m/dur*100)+'%',l:'schedule',c:m>=dur?'ok':''},
    {v:ev.toFixed(0)+'%',l:'earned val',c:ev>=pv?'ok':ev>=pv*.9?'w':'bad'},
    {v:spi.toFixed(2),l:'SPI',c:spi>=.95?'ok':spi>=.85?'w':'bad'},
    {v:cpi.toFixed(2),l:'CPI',c:cpi>=.95?'ok':cpi>=.85?'w':'bad'},
    {v:'$'+spent.toFixed(1)+'B',l:'spent/$'+B.toFixed(1)+'B',c:spent>B?'bad':spent>B*.9?'w':''},
    {v:'$'+eac.toFixed(1)+'B',l:'EAC',c:eac<=B*1.05?'ok':eac<=B*1.15?'w':'bad'},
    {v:wf.toLocaleString(),l:'workforce',c:'bl'},
    {v:mwe||'--',l:'MWe',c:mwe>=cfg.mwe?'vi':mwe>0?'w':''},
    {v:activePhases,l:'phases',c:activePhases>4?'w':'bl'},
    {v:deliveredLL+'/'+LONGLEAD.length,l:'long-lead',c:deliveredLL>=LONGLEAD.length?'ok':''},
    {v:delayTotal+'mo',l:'delay',c:delayTotal>6?'bad':delayTotal>0?'w':'ok'},
    {v:riskHits.size+'/'+RISKS.length,l:'risks',c:riskHits.size>4?'bad':riskHits.size>0?'w':'ok'}
  ];
}

/* ===== RISK / MILESTONE CHECKS ===== */
function checkRisks(m){
  if(Math.floor(m)===lastRiskCheck)return;
  lastRiskCheck=Math.floor(m);
  RISKS.forEach((r,i)=>{
    if(riskHits.has(i))return;
    if(Math.abs(m-r.trigger)<1&&Math.random()<r.prob){
      riskHits.add(i);delayTotal+=r.impact;
      eventLog.push({m:Math.round(m),type:'risk',msg:'RISK: '+r.n+' -- '+r.desc});
    }
  });
}
function checkMilestones(m){
  MILESTONES.forEach((ms,i)=>{
    if(msHit.has(i))return;
    if(m>=ms.m){
      msHit.add(i);
      eventLog.push({m:ms.m,type:'mile',msg:'MILESTONE: '+ms.n});
    }
  });
}

/* ===== MONTHLY REPORT ===== */
function genReport(m){
  const cfg=PLANTS[plant], dur=cfg.dur;
  const phase=PHASES.find(p=>m>=p.s&&m<p.e)||PHASES[PHASES.length-1];
  const ev=earned(m), pv=planned(m), spi=pv>0?(ev/pv).toFixed(2):'--';
  const cost=projectSpent(m),spent=cost.total;
  const cpi=spent>0.1?((ev/100*cfg.budget)/spent).toFixed(2):'--';
  let cumVol=0;POURS.forEach(p=>{if(m>=p.m+2)cumVol+=p.vol;});
  const wf=workforce(m);
  const lti=Math.floor(m/25);
  const safeDays=Math.round((m-lti*25)*30);
  const nextMS=MILESTONES.find(ms=>ms.m>m);
  const recentRisks=Array.from(riskHits).slice(-3).map(i=>RISKS[i].n).join(', ');
  return `MONTHLY STATUS -- Month ${Math.round(m)} / ${dur}
Plant: ${cfg.name}  |  Phase: ${phase.n}
Schedule: ${Math.round(m/dur*100)}%  |  EV: ${ev.toFixed(1)}%  |  PV: ${pv.toFixed(1)}%
SPI: ${spi}  |  CPI: ${cpi}  |  Budget: $${cfg.budget}B
Cost Breakdown: Labor $${cost.labor.toFixed(1)}B + Indirect $${cost.indirect.toFixed(1)}B + Materials $${cost.materials.toFixed(1)}B + Equipment $${cost.equipment.toFixed(1)}B = $${spent.toFixed(1)}B
Workforce: ${wf.toLocaleString()}  |  Concrete: ${cumVol.toLocaleString()} m3
Safety: ${safeDays} days LTI-free  |  Delay: ${delayTotal} mo
${nextMS?'Next milestone: M'+nextMS.m+' '+nextMS.n:'All milestones achieved'}
${recentRisks?'Recent risks: '+recentRisks:'No risks materialized yet'}`;
}

/* ===== 2D CANVAS SITE PLAN ===== */
const cv=$('site-canvas'), ctx=cv.getContext('2d');

/* Site layout: coordinates in a logical grid, scaled to canvas */
function drawSite(m){
  const dpr=window.devicePixelRatio||1;
  const w=cv.clientWidth*dpr, h=cv.clientHeight*dpr;
  if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,w,h);

  /* Transform: site coords -> canvas pixels. Site is ~600m wide, ~400m tall */
  const margin=40*dpr;
  const sW=600, sH=400;
  const scale=Math.min((w-margin*2)/sW,(h-margin*2)/sH);
  const ox=margin+(w-margin*2-sW*scale)/2;
  const oy=margin+(h-margin*2-sH*scale)/2;
  function sx(x){return ox+x*scale;} function sy(y){return oy+y*scale;}
  function sw(v){return v*scale;}

  const mono=Math.round(9*dpr)+'px ui-monospace, "SF Mono", Menlo, monospace';
  const monoSmall=Math.round(7.5*dpr)+'px ui-monospace, "SF Mono", Menlo, monospace';
  const lw=1*dpr; const lwThin=0.5*dpr;

  /* --- Grid --- */
  ctx.strokeStyle='#E8EAEC'; ctx.lineWidth=lwThin;
  for(let gx=0;gx<=sW;gx+=50){ctx.beginPath();ctx.moveTo(sx(gx),sy(0));ctx.lineTo(sx(gx),sy(sH));ctx.stroke();}
  for(let gy=0;gy<=sH;gy+=50){ctx.beginPath();ctx.moveTo(sx(0),sy(gy));ctx.lineTo(sx(sW),sy(gy));ctx.stroke();}
  /* Grid labels */
  ctx.font=monoSmall;ctx.fillStyle='#C0C4C8';ctx.textAlign='center';
  for(let gx=0;gx<=sW;gx+=100){ctx.fillText(gx+'m',sx(gx),sy(sH)+12*dpr);}
  ctx.textAlign='right';
  for(let gy=0;gy<=sH;gy+=100){ctx.fillText(gy+'m',sx(0)-4*dpr,sy(gy)+3*dpr);}

  /* --- Water body (left side) --- */
  ctx.fillStyle='#E3EEF6';ctx.fillRect(sx(0),sy(0),sw(80),sw(sH));
  /* Wave pattern */
  ctx.strokeStyle='#C4D8E8';ctx.lineWidth=lwThin;
  for(let wy=20;wy<sH;wy+=30){
    ctx.beginPath();
    for(let wx=5;wx<75;wx+=2){ctx.lineTo(sx(wx),sy(wy)+Math.sin(wx*0.3+wy*0.1)*sw(3));}
    ctx.stroke();
  }
  ctx.font=monoSmall;ctx.fillStyle='#8AACCA';ctx.textAlign='center';
  ctx.fillText('LAKE',sx(40),sy(sH/2));

  /* --- Site boundary --- */
  const bx=90, by=30, bw=480, bh=340;
  ctx.strokeStyle='#20242A';ctx.lineWidth=lw;ctx.setLineDash([]);
  ctx.strokeRect(sx(bx),sy(by),sw(bw),sw(bh));
  /* Fence hatching on boundary */
  ctx.strokeStyle='#C0C4C8';ctx.lineWidth=lwThin;
  const hatchStep=8;
  for(let i=0;i<bw+bh;i+=hatchStep){
    const x1=bx+Math.min(i,bw), y1=by+Math.max(0,i-bw);
    const x2=bx+Math.max(0,i-bh), y2=by+Math.min(i,bh);
    if(i<20||i>bw+bh-20){ctx.beginPath();ctx.moveTo(sx(x1),sy(y1)-sw(3));ctx.lineTo(sx(x1),sy(y1)+sw(3));ctx.stroke();}
  }

  /* --- Helper: draw building --- */
  function drawRect(x,y,w,h,label,startM,endM,fillColor){
    const prog=vis(m,startM,endM);
    if(prog<=0)return;
    const complete=prog>=1;
    ctx.strokeStyle='#20242A';
    ctx.lineWidth=complete?lw*1.5:lw;
    ctx.setLineDash(complete?[]:[4*dpr,4*dpr]);
    ctx.strokeRect(sx(x),sy(y),sw(w),sw(h));
    /* Cross-hatching when complete */
    if(complete&&fillColor){
      ctx.save();ctx.beginPath();ctx.rect(sx(x),sy(y),sw(w),sw(h));ctx.clip();
      ctx.strokeStyle=fillColor||'#D0D3D6';ctx.lineWidth=lwThin;ctx.setLineDash([]);
      for(let i=-h;i<w;i+=6){
        ctx.beginPath();ctx.moveTo(sx(x+i),sy(y));ctx.lineTo(sx(x+i+h),sy(y+h));ctx.stroke();
      }
      ctx.restore();
    }
    /* Label */
    if(label){
      ctx.font=mono;ctx.fillStyle='#6A7178';ctx.textAlign='left';ctx.setLineDash([]);
      ctx.fillText(label,sx(x),sy(y)-4*dpr);
    }
    ctx.setLineDash([]);
  }
  function drawCircle(cx,cy,r,label,startM,endM,fillColor){
    const prog=vis(m,startM,endM);
    if(prog<=0)return;
    const complete=prog>=1;
    ctx.strokeStyle='#20242A';
    ctx.lineWidth=complete?lw*1.5:lw;
    ctx.setLineDash(complete?[]:[4*dpr,4*dpr]);
    ctx.beginPath();ctx.arc(sx(cx),sy(cy),sw(r),0,Math.PI*2);ctx.stroke();
    if(complete&&fillColor){
      ctx.save();ctx.beginPath();ctx.arc(sx(cx),sy(cy),sw(r),0,Math.PI*2);ctx.clip();
      ctx.strokeStyle=fillColor||'#D0D3D6';ctx.lineWidth=lwThin;ctx.setLineDash([]);
      const d=r*2;
      for(let i=-d;i<d;i+=6){
        ctx.beginPath();ctx.moveTo(sx(cx-r+i),sy(cy-r));ctx.lineTo(sx(cx-r+i+d),sy(cy+r));ctx.stroke();
      }
      ctx.restore();
    }
    if(label){
      ctx.font=mono;ctx.fillStyle='#6A7178';ctx.textAlign='center';ctx.setLineDash([]);
      ctx.fillText(label,sx(cx),sy(cy-r)-4*dpr);
    }
    ctx.setLineDash([]);
  }

  /* --- Buildings (plan view positions) --- */
  const rbCx=230, rbCy=190, rbR=55;
  /* Reactor Building (circle) */
  drawCircle(rbCx,rbCy,rbR,'REACTOR BLDG',16,40,'#B0B5BA');
  /* Containment liner (inner dashed circle) */
  if(vis(m,24,46)>0){
    const cProg=vis(m,24,46);
    ctx.strokeStyle=cProg>=1?'#7C5CBF':'#A090C0';
    ctx.lineWidth=lw;ctx.setLineDash([3*dpr,3*dpr]);
    ctx.beginPath();ctx.arc(sx(rbCx),sy(rbCy),sw(rbR-10),0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    if(cProg>=1){ctx.font=monoSmall;ctx.fillStyle='#7C5CBF';ctx.textAlign='center';ctx.fillText('CONTAINMENT',sx(rbCx),sy(rbCy)+3*dpr);}
  }

  /* Turbine Building */
  drawRect(310,150,120,80,'TURBINE BLDG',22,42,'#C4BEB2');

  /* Auxiliary Building */
  drawRect(290,90,50,40,'AUX BLDG',26,44,'#B8B3A8');

  /* Cooling Water Intake */
  drawRect(95,120,25,30,'CW INTAKE',28,42,'#7E8B98');
  /* CW line */
  if(vis(m,28,48)>0){
    ctx.strokeStyle='#0891B2';ctx.lineWidth=lw;
    ctx.setLineDash(vis(m,28,48)>=1?[]:[4*dpr,4*dpr]);
    ctx.beginPath();ctx.moveTo(sx(120),sy(135));ctx.lineTo(sx(rbCx-rbR),sy(190));ctx.stroke();
    /* Outfall line */
    ctx.beginPath();ctx.moveTo(sx(rbCx+rbR),sy(190));ctx.lineTo(sx(440),sy(300));ctx.lineTo(sx(95),sy(300));ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=monoSmall;ctx.fillStyle='#0891B2';ctx.textAlign='left';
    ctx.fillText('CW OUTFALL',sx(95),sy(310)+3*dpr);
  }

  /* Switchyard */
  drawRect(340,280,100,60,'SWITCHYARD',44,60,'#4A4840');
  /* Transformer cross-hatch markers */
  if(vis(m,52,60)>0){
    ctx.strokeStyle='#6B7280';ctx.lineWidth=lw;ctx.setLineDash([]);
    [360,400].forEach(tx=>{
      ctx.beginPath();ctx.moveTo(sx(tx-8),sy(298));ctx.lineTo(sx(tx+8),sy(318));ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx(tx+8),sy(298));ctx.lineTo(sx(tx-8),sy(318));ctx.stroke();
    });
  }

  /* Diesel Generator Building */
  drawRect(140,260,40,25,'DIESEL GEN',38,52,'#A0968A');

  /* Admin Building */
  drawRect(460,80,50,35,'ADMIN BLDG',16,30,'#CFC9BE');

  /* Batch Plant (circle) */
  if(vis(m,5,50)>0){
    const bpProg=vis(m,5,50);
    ctx.strokeStyle='#20242A';ctx.lineWidth=lw;
    ctx.setLineDash(bpProg>=1?[]:[4*dpr,4*dpr]);
    ctx.beginPath();ctx.arc(sx(480),sy(200),sw(12),0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=monoSmall;ctx.fillStyle='#6A7178';ctx.textAlign='center';
    ctx.fillText('BATCH PLANT',sx(480),sy(200-14));
  }

  /* Laydown Area */
  if(vis(m,3,84)>0){
    ctx.strokeStyle='#9E9E9E';ctx.lineWidth=lwThin;ctx.setLineDash([6*dpr,3*dpr]);
    ctx.strokeRect(sx(420),sy(140),sw(120),sw(60));
    ctx.setLineDash([]);
    ctx.font=monoSmall;ctx.fillStyle='#9E9E9E';ctx.textAlign='center';
    ctx.fillText('LAYDOWN AREA',sx(480),sy(170)+3*dpr);
  }

  /* Crane (cross + radius circle) */
  if(vis(m,4,64)>0 && m<64){
    const crX=260, crY=130;
    ctx.strokeStyle='#C85A4F';ctx.lineWidth=lw*1.5;ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(sx(crX-8),sy(crY));ctx.lineTo(sx(crX+8),sy(crY));ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx(crX),sy(crY-8));ctx.lineTo(sx(crX),sy(crY+8));ctx.stroke();
    /* Reach circle */
    ctx.strokeStyle='rgba(200,90,79,0.25)';ctx.lineWidth=lwThin;ctx.setLineDash([2*dpr,2*dpr]);
    ctx.beginPath();ctx.arc(sx(crX),sy(crY),sw(100),0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=monoSmall;ctx.fillStyle='#C85A4F';ctx.textAlign='left';
    ctx.fillText('CRANE',sx(crX+10),sy(crY-2));
  }

  /* Roads */
  if(vis(m,2,10)>0){
    ctx.strokeStyle='#AAACAE';ctx.lineWidth=sw(5);ctx.setLineDash([]);
    /* Main access road */
    ctx.beginPath();ctx.moveTo(sx(90),sy(370));ctx.lineTo(sx(460),sy(370));ctx.stroke();
    /* Internal road to RB */
    ctx.beginPath();ctx.moveTo(sx(230),sy(370));ctx.lineTo(sx(230),sy(rbCy+rbR+10));ctx.stroke();
    /* Road to TB */
    ctx.beginPath();ctx.moveTo(sx(370),sy(370));ctx.lineTo(sx(370),sy(230));ctx.stroke();
    ctx.lineWidth=lw;
  }

  /* --- Dimension lines --- */
  ctx.strokeStyle='#B0B4B8';ctx.lineWidth=lwThin;ctx.setLineDash([]);
  ctx.font=monoSmall;ctx.fillStyle='#B0B4B8';ctx.textAlign='center';
  /* RB to TB distance */
  if(vis(m,22,84)>0){
    const dy=sy(260);
    ctx.beginPath();ctx.moveTo(sx(rbCx),dy);ctx.lineTo(sx(310),dy);ctx.stroke();
    /* Arrows */
    ctx.beginPath();ctx.moveTo(sx(rbCx),dy-3*dpr);ctx.lineTo(sx(rbCx),dy+3*dpr);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx(310),dy-3*dpr);ctx.lineTo(sx(310),dy+3*dpr);ctx.stroke();
    ctx.fillText('80m',sx((rbCx+310)/2),dy-3*dpr);
  }

  /* --- North arrow --- */
  const nax=sx(sW-30), nay=sy(25);
  ctx.strokeStyle='#20242A';ctx.lineWidth=lw*1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(nax,nay+sw(18));ctx.lineTo(nax,nay);ctx.stroke();
  ctx.beginPath();ctx.moveTo(nax-sw(4),nay+sw(6));ctx.lineTo(nax,nay);ctx.lineTo(nax+sw(4),nay+sw(6));ctx.stroke();
  ctx.font=mono;ctx.fillStyle='#20242A';ctx.textAlign='center';
  ctx.fillText('N',nax,nay-4*dpr);

  /* --- Scale bar --- */
  const sbx=sx(100), sby=sy(sH)+22*dpr;
  ctx.strokeStyle='#20242A';ctx.lineWidth=lw;
  ctx.beginPath();ctx.moveTo(sbx,sby);ctx.lineTo(sbx+sw(100),sby);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sbx,sby-3*dpr);ctx.lineTo(sbx,sby+3*dpr);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sbx+sw(100),sby-3*dpr);ctx.lineTo(sbx+sw(100),sby+3*dpr);ctx.stroke();
  ctx.font=monoSmall;ctx.fillStyle='#20242A';ctx.textAlign='center';
  ctx.fillText('100 m',sbx+sw(50),sby+10*dpr);

  /* --- Excavation area (before foundation) --- */
  if(vis(m,3,12)>0&&m<22){
    ctx.strokeStyle='#8D6E63';ctx.lineWidth=lwThin;ctx.setLineDash([3*dpr,2*dpr]);
    ctx.beginPath();ctx.arc(sx(rbCx),sy(rbCy),sw(rbR+12),0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.font=monoSmall;ctx.fillStyle='#8D6E63';ctx.textAlign='center';
    ctx.fillText('EXCAVATION',sx(rbCx),sy(rbCy+rbR+16));
  }

  /* --- Phase label overlay --- */
  const phase=PHASES.find(p=>m>=p.s&&m<p.e)||PHASES[PHASES.length-1];
  ctx.font=Math.round(11*dpr)+'px '+('ui-monospace, "SF Mono", Menlo, monospace');
  ctx.fillStyle='#20242A';ctx.textAlign='left';
  ctx.fillText('M'+Math.round(m)+' -- '+phase.n,sx(bx+4),sy(by)+14*dpr);
}

/* ===== S-CURVE CHART ===== */
function drawSCurve(){
  const el=$('scurve');if(!el)return;
  const c=el.getContext('2d'), dur=PLANTS[plant].dur;
  const dpr=window.devicePixelRatio||1;
  const w=el.width=el.clientWidth*dpr, h=el.height=el.clientHeight*dpr;
  c.fillStyle='#FAFBFB';c.fillRect(0,0,w,h);
  const px=30*dpr, py=12*dpr, pw=w-px-10*dpr, ph=h-py-20*dpr;
  /* Grid */
  c.strokeStyle='#E8EAEC';c.lineWidth=0.5*dpr;
  for(let i=0;i<=4;i++){const y=py+ph*(1-i/4);c.beginPath();c.moveTo(px,y);c.lineTo(px+pw,y);c.stroke();}
  /* Y-axis labels */
  c.font=Math.round(8*dpr)+'px ui-monospace, "SF Mono", Menlo, monospace';c.fillStyle='#B0B4B8';c.textAlign='right';
  for(let i=0;i<=4;i++){c.fillText((i*25)+'%',px-4*dpr,py+ph*(1-i/4)+3*dpr);}
  /* Actual cost (faded red) */
  c.strokeStyle='rgba(200,90,79,0.3)';c.lineWidth=1.5*dpr;c.beginPath();
  let cumCost=0;
  const cfg2=PLANTS[plant];let cLab=0,cInd=0,cMat=0,cEq=0;
  for(let mi=0;mi<=dur;mi++){
    if(mi>0){const wf=workforce(mi);const fr=mi/dur;cLab+=wf*18000;cInd+=wf*12000;cMat+=wf*(fr<.15?15000:fr<.5?28000:fr<.75?20000:8000);}
    if(cfg2.equip)cfg2.equip.forEach(e=>{if(mi===Math.round(e.m))cEq+=e.cost*1e9;});
    cumCost=(cLab+cInd+cMat+cEq)/1e9;
    const x=px+mi/dur*pw,y=py+ph*(1-Math.min(1,cumCost/(cfg2.budget*1.15)));mi?c.lineTo(x,y):c.moveTo(x,y);
  }c.stroke();
  /* Plan (gray) */
  c.strokeStyle='#B0B4B8';c.lineWidth=1.5*dpr;c.beginPath();
  for(let mi=0;mi<=dur;mi++){const x=px+mi/dur*pw,y=py+ph*(1-planned(mi)/100);mi?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  /* Earned (dark) */
  c.strokeStyle='#20242A';c.lineWidth=2*dpr;c.beginPath();
  for(let mi=0;mi<=Math.min(month,dur);mi++){const x=px+mi/dur*pw,y=py+ph*(1-earned(mi)/100);mi?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  /* Now line */
  const nx=px+month/dur*pw;c.strokeStyle='rgba(200,90,79,0.4)';c.lineWidth=1*dpr;c.setLineDash([3*dpr,3*dpr]);
  c.beginPath();c.moveTo(nx,py);c.lineTo(nx,py+ph);c.stroke();c.setLineDash([]);
  /* Legend */
  const ly=py+ph+14*dpr;
  c.font=Math.round(8*dpr)+'px ui-monospace, "SF Mono", Menlo, monospace';c.textAlign='left';
  c.fillStyle='#B0B4B8';c.fillText('Plan',px,ly);
  c.fillStyle='#20242A';c.fillText('Earned',px+40*dpr,ly);
  c.fillStyle='rgba(200,90,79,0.5)';c.fillText('Cost',px+90*dpr,ly);
}

/* ===== UI BUILDERS ===== */
function buildDims(){
  const el=$('dims');el.innerHTML='';
  for(const k in RANGES){
    const r=RANGES[k],d=document.createElement('div');d.className='dim-row';
    d.innerHTML='<label>'+k+'</label><input type="range" min="'+r[0]+'" max="'+r[1]+'" step="'+((r[1]-r[0])/100)+'" value="'+(V[k]||r[0])+'" data-k="'+k+'"><span class="dv" data-dv="'+k+'">'+(V[k]||r[0])+'</span>';
    el.appendChild(d);
  }
  el.addEventListener('input',e=>{
    if(!e.target.dataset.k)return;
    V[e.target.dataset.k]=+e.target.value;
    document.querySelector('[data-dv="'+e.target.dataset.k+'"]').textContent=(+e.target.value).toFixed(+e.target.value>=10?0:1);
  });
}
function buildWhatIf(){
  const btns=[
    ['+6mo regulatory','delay',6],['+3mo strike','delay',3],['+2mo supply','delay',2],['+4mo NDE rework','delay',4],
    ['Crash -4mo','accel',-4],['OT -2mo','accel',-2],['Budget +$0.5B','budget',0.5],['Budget +$1B','budget',1.0],
    ['+500 crew','crew',500],['+1k crew','crew',1000],['-300 crew','crew',-300],['Reset','reset',0]
  ];
  $('whatif').innerHTML=btns.map(b=>'<button class="ghost" onclick="whatIf(\''+b[1]+'\','+b[2]+')">'+b[0]+'</button>').join('');
}

/* ===== UPDATE ALL UI ===== */
function updateAll(){
  const dur=PLANTS[plant].dur;
  const phase=PHASES.find(p=>month>=p.s&&month<p.e)||PHASES[PHASES.length-1];
  const yr=Math.floor(month/12)+1, mo=Math.round(month%12)+1;

  /* Header labels */
  $('tlabel').textContent='M'+Math.round(month)+' / '+dur+' -- '+phase.n;
  $('scrub').max=dur*10;$('scrub').value=Math.round(month*10);
  $('caption-right').textContent='Y'+yr+' M'+mo+' ('+Math.round(month/dur*100)+'% schedule)';

  /* Site canvas */
  drawSite(month);

  /* KPIs */
  const K=kpis(month);
  $('kpi-grid').innerHTML=K.map(k=>'<div class="kpi'+(k.c?' '+k.c:'')+'"><div class="kv">'+k.v+'</div><div class="kl">'+k.l+'</div></div>').join('');

  /* S-Curve */
  drawSCurve();

  /* Discipline bars */
  $('disc-bars').innerHTML=DISCIPLINES.map(d=>{
    const pct=discProg(d,month);
    return'<div class="disc-bar"><span class="db-name">'+d.n.slice(0,5)+'</span><div class="db-track"><div class="db-fill" style="width:'+pct+'%;background:'+d.c+'"></div></div><span class="db-pct" style="color:'+d.c+'">'+pct+'%</span></div>';
  }).join('');

  /* Pour log */
  $('pours').innerHTML=POURS.map(p=>{
    const done=month>=p.m+2;
    return'<div class="pour-item'+(done?' done':'')+'"><span class="pm">M'+p.m+'</span><span>'+p.n+' ('+p.vol+' m3, '+p.spec+')'+(done?' &#10003;':'')+'</span></div>';
  }).join('');

  /* Safety */
  const wf=workforce(month);
  const lti=Math.floor(month/25);
  const safeDays=Math.round((month-lti*25)*30);
  let cumVol=0;POURS.forEach(p=>{if(month>=p.m+2)cumVol+=p.vol;});
  $('safety').innerHTML=
    '<div class="safety-card"><div class="sv">'+safeDays+'</div><div class="sl">Days LTI-free</div></div>'+
    '<div class="safety-card"><div class="sv">'+wf.toLocaleString()+'</div><div class="sl">Workforce</div></div>'+
    '<div class="safety-card"><div class="sv">'+Math.round(cumVol/1000)+'k</div><div class="sl">Concrete m3</div></div>'+
    '<div class="safety-card"><div class="sv">'+(month>0?Math.round(wf*170*month/1e5)+'00k':'0')+'</div><div class="sl">Worker-hours</div></div>';

  /* Milestones */
  $('milestones').innerHTML=MILESTONES.map((ms,i)=>{
    const hit=msHit.has(i);
    const future=month<ms.m;
    return'<span class="ms-pill'+(hit?' hit':'')+(future?' future':'')+'">M'+ms.m+' '+ms.n+'</span>';
  }).join('');

  /* Feed */
  $('feed').innerHTML=eventLog.slice(-15).reverse().map(e=>
    '<div class="ev-item '+e.type+'"><span class="ev-mo">M'+e.m+'</span><span>'+e.msg+'</span></div>').join('');

  /* Risks */
  $('risks').innerHTML=RISKS.map((r,i)=>{
    const hit=riskHits.has(i);
    return'<span class="risk-item'+(hit?' hit':month>r.trigger+2&&!hit?' clear':'')+'">'+
      (hit?'&#9888; ':'')+(month>r.trigger+2&&!hit?'&#10003; ':'')+r.n+'</span>';
  }).join('');

  /* Long-lead */
  $('ll').innerHTML=LONGLEAD.map(l=>{
    const cls=month>=l.deliver?'del':month>=l.need&&month<l.deliver?'late':month>=l.order?'wait':'';
    return'<span class="ll-item '+cls+'">'+(cls==='del'?'&#10003;':cls==='late'?'&#9888;':cls==='wait'?'&#9881;':'&#8987;')+' '+l.n+'</span>';
  }).join('');

  /* Report */
  $('report').textContent=genReport(month);
}

/* ===== MAIN LOOP ===== */
let lastFrame=performance.now();
function loop(now){
  const dt=(now-lastFrame)/1000; lastFrame=now;
  if(playing){
    const dur=PLANTS[plant].dur;
    month=Math.min(dur,month+dt*spdX*6);
    if(month>=dur){
      playing=false;$('play-btn').textContent='Play';
      eventLog.push({m:dur,type:'good',msg:'COMMERCIAL OPERATION DATE achieved!'});
    }
    checkRisks(month);checkMilestones(month);
    /* Random construction events */
    if(Math.random()<.003&&month>5){
      const msgs=[
        "Concrete test cylinders pass 28-day strength ("+Math.round(40+Math.random()*15)+" MPa)",
        "Survey crew as-built check: within 3mm tolerance",
        "QC inspection: zero NCRs this period",
        "Safety: "+(Math.round(workforce(month)*170*month/1e5))+"00k worker-hours LTI-free",
        "Environmental monitoring: all parameters within limits",
        "Night shift pour completed: "+Math.round(200+Math.random()*400)+" m3",
        "Crane monthly inspection: all passed",
        "Welding NDE: "+Math.round(96+Math.random()*4)+"% first-time pass rate",
        "Rebar: "+Math.round(15+Math.random()*10)+" tonnes/day achieved",
        "Cable pulling: "+Math.round(2+Math.random()*6)+" km this week"
      ];
      eventLog.push({m:Math.round(month),type:'good',msg:msgs[Math.floor(Math.random()*msgs.length)]});
    }
    if(Math.random()<.001&&month>20){
      const insp=["CNSC inspection: satisfactory","TSSA pressure vessel: approved","ISO 9001 audit: no NCRs"];
      eventLog.push({m:Math.round(month),type:'mile',msg:insp[Math.floor(Math.random()*insp.length)]});
    }
    updateAll();
  }
  requestAnimationFrame(loop);
}

/* ===== CONTROLS ===== */
$('play-btn').onclick=()=>{
  if(playing){playing=false;$('play-btn').textContent='Play';}
  else{if(month>=PLANTS[plant].dur)month=0;playing=true;$('play-btn').textContent='Pause';}
};
$('spd-btn').onclick=function(){spdX=spdX===1?2:spdX===2?5:spdX===5?10:1;this.textContent=spdX+'x';};
$('scrub').oninput=function(){month=+this.value/10;playing=false;$('play-btn').textContent='Play';updateAll();};
$('plant').onchange=function(){month=0;playing=false;$('play-btn').textContent='Play';setPlant(this.value);};

/* ===== KEYBOARD ===== */
document.onkeydown=e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.code==='Space'){e.preventDefault();$('play-btn').click();}
  if(e.code==='ArrowLeft'){e.preventDefault();month=Math.max(0,month-(e.shiftKey?6:1));playing=false;$('play-btn').textContent='Play';updateAll();}
  if(e.code==='ArrowRight'){e.preventDefault();month=Math.min(PLANTS[plant].dur,month+(e.shiftKey?6:1));playing=false;$('play-btn').textContent='Play';updateAll();}
};

/* ===== INIT ===== */
setPlant('pwr');
requestAnimationFrame(loop);
</script>
