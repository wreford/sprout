<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuclear Construction Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f2ecdf; --hi:#faf6ec; --panel:#faf7ee; --panel2:#f3edde;
  --ink:#221c10; --ink2:#544c3a; --faint:#9a9077; --rule:#ddd2b6; --rule2:#cabd9c;
  --oxide:#a8401f; --green:#2f7d4f; --red:#b13d2c; --amber:#a87718; --blue:#2c5d78; --violet:#6c5fae;
  --disp:'Fraunces',Georgia,serif; --serif:'Newsreader',Georgia,serif; --mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{background:var(--paper);color:var(--ink);font-family:var(--serif);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;touch-action:manipulation}

/* Header bar */
.hdr{display:flex;align-items:center;gap:10px;padding:6px 14px;border-bottom:1px solid var(--rule);background:rgba(250,246,236,.95);backdrop-filter:blur(4px);flex-shrink:0}
.hdr h1{font-family:var(--disp);font-weight:900;font-size:18px;letter-spacing:.02em;flex:none}
.hdr h1 b{color:var(--oxide)}
.hdr select,.hdr button{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 8px;border:1px solid var(--rule2);border-radius:6px;background:var(--hi);color:var(--ink2);cursor:pointer}
.hdr button.on{background:var(--ink);color:var(--hi)}
.hdr .sp{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint)}
.tl{padding:4px 14px 6px;border-bottom:1px solid var(--rule);background:var(--panel);flex-shrink:0}
.tl-r{display:flex;align-items:center;gap:6px}
.tl-r input[type=range]{flex:1;accent-color:var(--oxide)}
.tl-r .lb{font-family:var(--mono);font-size:10px;font-weight:600;min-width:70px}
.pbar{display:flex;gap:1px;margin-top:3px;height:12px}
.pbar .ps{flex:1;border-radius:4px;font:600 8px var(--mono);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap}
.pbar .ps.now{outline:2px solid var(--oxide);outline-offset:-1px;z-index:1}
.pbar .ps.fut{opacity:.15}

/* Dashboard grid — fits 1920x1080 minus header/timeline */
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto auto;gap:1px;background:var(--rule);flex:1;overflow:hidden}
.dash>*{background:var(--panel);overflow:hidden}

/* 3D viewport spans 2 columns */
.gl-cell{grid-column:1/2;grid-row:1/3;padding:0;position:relative}
.gl-cell .exlabel{font:600 9px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--oxide);padding:4px 10px 2px;display:flex;align-items:center;gap:6px}
.gl-cell .live{margin-left:auto;color:var(--green);display:inline-flex;align-items:center;gap:4px;font-size:9px}
.gl-cell .live i{width:5px;height:5px;border-radius:50%;background:var(--green)}
#gl{width:100%;display:block;background:#1a1d22}

/* Panels */
.pan{padding:6px 10px;overflow-y:auto}
.pan h3{font:600 9px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 4px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.k{background:var(--hi);border:1px solid var(--rule2);border-radius:6px;padding:4px;text-align:center}
.k .v{font:900 14px var(--disp);line-height:1}
.k .l{font:500 8px var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-top:2px}
.k.ok .v{color:var(--green)}.k.w .v{color:var(--amber)}.k.bad .v{color:var(--red)}.k.bl .v{color:var(--blue)}.k.vi .v{color:var(--violet)}

/* Charts */
.card canvas{width:100%;height:50px;display:block;border:1px solid var(--rule2);border-radius:4px;background:var(--hi)}

/* Milestones */
.ms{display:flex;flex-wrap:wrap;gap:2px}
.ms .m{font:500 9px var(--mono);letter-spacing:.04em;padding:2px 6px;border-radius:10px;border:1px solid var(--rule2);background:var(--hi);color:var(--ink2);white-space:nowrap}
.ms .m.d{border-color:#b8cfbb;color:var(--green)}.ms .m.a{border-color:#d6c391;color:var(--amber)}.ms .m.f{color:var(--faint);opacity:.5}
.ms .md{width:4px;height:4px;border-radius:50%;display:inline-block}

/* Feed */
.feed{max-height:100%;overflow-y:auto}
.feed .ev{font:10px var(--mono);padding:2px 0;border-bottom:1px solid var(--rule);display:flex;gap:4px;color:var(--ink2)}
.feed .ev .t{color:var(--oxide);font-weight:600;min-width:28px}
.feed .ev .typ{display:none}
.feed .ev.risk{color:var(--red)}.feed .ev.good{color:var(--green)}.feed .ev.mile{color:var(--violet)}

/* Risk/LL pills */
.ri,.li{font:9px var(--mono);letter-spacing:.04em;padding:2px 6px;border-radius:10px;border:1px solid var(--rule2);display:inline-flex;align-items:center;gap:3px;background:var(--hi);color:var(--ink2);white-space:nowrap;margin:1px}
.ri.hit{border-color:#d9b3a8;color:var(--red)}.ri.ok{border-color:#b8cfbb;color:var(--green)}
.li.del{border-color:#b8cfbb;color:var(--green)}.li.wait{color:var(--amber);border-color:#d6c391}.li.late{color:var(--red);border-color:#d9b3a8}

/* Report */
.report{font:9px var(--mono);line-height:1.5;color:var(--faint);overflow-y:auto}
.report b{color:var(--ink)}

/* Safety */
.sf{display:inline-block;font:600 9px var(--mono);padding:4px 6px;border-radius:6px;border:1px solid var(--rule2);text-align:center;min-width:50px;background:var(--hi)}
.sf.g{border-color:#b8cfbb;color:var(--green)}.sf.y{border-color:#d6c391;color:var(--amber)}.sf.r{border-color:#d9b3a8;color:var(--red)}
.sf .sv{font:900 13px var(--disp);display:block;line-height:1}
.sf .sl{font:8px var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-top:2px}

/* Pour log */
.pour-row{padding:1px 0;border-bottom:1px solid var(--rule);display:flex;gap:4px;font:9px var(--mono);color:var(--ink2)}
.pour-row .pm{font-weight:600;color:var(--oxide);min-width:24px}
.pour-row .pn{flex:1}.pour-row .pv{color:var(--blue);font-weight:600;min-width:32px;text-align:right}
.pour-row.done{color:var(--green)}.pour-row.future{color:var(--rule2)}

/* What-if */
.whatif-section button{font:9px var(--mono);padding:3px 6px;border:1px solid var(--rule2);border-radius:4px;background:var(--hi);color:var(--ink2);cursor:pointer}
.whatif-section button:hover{border-color:var(--oxide);color:var(--oxide)}

/* Dims */
.dims{display:flex;gap:8px;flex-wrap:wrap}
.dim{display:flex;align-items:center;gap:3px;font:10px var(--mono)}
.dim label{color:var(--faint);font-size:9px;letter-spacing:.04em;text-transform:uppercase}
.dim input{width:40px;accent-color:var(--oxide)}
.dim .dv{font-weight:600;min-width:20px;text-align:right;color:var(--ink)}

/* ACT panel */
.act-pan{overflow-y:auto}
.act-pan h3{font:600 9px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 3px}
.act-cwa{cursor:pointer;padding:2px 0;border-bottom:1px solid var(--rule)}
.act-cwa:hover{background:var(--hi)}
.act-row{display:flex;align-items:center;gap:4px;font-size:10px;line-height:1.5}
.act-dot{width:6px;height:6px;border-radius:50%;flex:none}
.act-dot.g{background:var(--green)}.act-dot.a{background:var(--amber)}.act-dot.f{background:var(--rule2)}.act-dot.r{background:var(--red)}
.act-alias{font-family:var(--mono);font-size:9px;color:var(--blue);min-width:42px}
.act-name{font-family:var(--serif);font-size:10px;color:var(--ink2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-pill{font-family:var(--mono);font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:1px 5px;border-radius:10px;border:1px solid var(--rule2);color:var(--ink2);white-space:nowrap;display:inline-flex;align-items:center;gap:3px;background:var(--hi)}
.act-pill.green{color:var(--green);border-color:#b8cfbb}
.act-pill.amber{color:var(--amber);border-color:#d6c391}
.act-pill.red{color:var(--red);border-color:#d9b3a8}
.act-sub{padding-left:14px;display:none}
.act-cwa.open .act-sub{display:block}
.act-cwp{padding:1px 0}
.act-con{padding:1px 0 1px 12px;font:9px var(--mono);color:var(--ink2)}
.act-con .rel{font-size:9px;color:var(--faint);font-style:italic;font-family:var(--serif)}

/* Clash modal */
.clash-overlay{position:fixed;inset:0;z-index:200;background:rgba(34,28,16,.55);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.clash-modal{background:var(--panel);border:2px solid var(--oxide);border-radius:10px;padding:14px 16px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(34,28,16,.3)}
.clash-modal h4{font:900 14px var(--disp);color:var(--oxide);margin:0 0 6px;letter-spacing:.01em}
.clash-modal p{font:11px var(--serif);color:var(--ink2);margin:6px 0 10px;line-height:1.4}
.clash-modal .clash-btns{display:flex;gap:6px}
.clash-modal .clash-btn{flex:1;font:500 10px var(--mono);padding:8px 6px;border:1px solid var(--rule2);border-radius:6px;background:var(--hi);color:var(--ink2);cursor:pointer;text-align:center;line-height:1.3}
.clash-modal .clash-btn:hover{border-color:var(--oxide);color:var(--oxide)}
.clash-modal .clash-btn.picked{background:var(--oxide);color:#fff;border-color:var(--oxide)}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">
<div class="hdr">
  <h1><b>NUCLEAR</b> BUILD</h1>
  <select id="plant"><option value="pwr">4×PWR 4000 MWe</option><option value="candu">4×CANDU 3600 MWe</option><option value="smr">12×SMR 3600 MWe</option><option value="ap1000">4×AP1000 4400 MWe</option><option value="epr">3×EPR 4950 MWe</option></select>
  <select id="cam"><option value="orbit">Orbit</option><option value="aerial">Aerial</option><option value="reactor">Reactor</option><option value="turbine">Turbine</option><option value="intake">Intake</option><option value="crane">Crane</option></select>
  <button id="play">Play</button>
  <button id="spd" data-s="1">1x</button>
  <span class="sp" id="sp"></span>
</div>
<div class="tl">
  <div class="tl-r"><input type="range" id="mo" min="0" max="84" value="0" step="0.1"><span class="lb" id="mlab">M0</span></div>
  <div class="pbar" id="pb"></div>
</div>

<div class="dash">
  <!-- Row 1-2: 3D viewport (2 cols) + KPIs + S-curve -->
  <div class="gl-cell">
    <div class="exlabel">Construction Site <span class="live"><i></i>live</span></div>
    <canvas id="gl"></canvas>
  </div>
  <div class="pan" style="grid-column:2;grid-row:1">
    <h3>Performance</h3>
    <div class="kpis" id="kpis"></div>
  </div>
  <div class="pan" style="grid-column:2;grid-row:2">
    <h3>S-Curve</h3>
    <canvas id="sc" style="width:100%;height:50px;display:block;border:1px solid var(--rule2);border-radius:4px;background:var(--hi)"></canvas>
    <h3 style="margin-top:4px">Discipline</h3>
    <canvas id="disc" style="width:100%;height:40px;display:block;border:1px solid var(--rule2);border-radius:4px;background:var(--hi)"></canvas>
  </div>
  <div class="pan" style="grid-column:3;grid-row:1/3">
    <h3>Events</h3>
    <div class="feed" id="feed" style="max-height:100%;overflow-y:auto"></div>
  </div>

  <!-- Row 3: Milestones + Risks + Long-lead -->
  <div class="pan" style="grid-column:1">
    <h3>Milestones</h3>
    <div class="ms" id="ms"></div>
  </div>
  <div class="pan" style="grid-column:2">
    <h3>Risk Register</h3>
    <div id="risks" style="display:flex;flex-wrap:wrap;gap:2px"></div>
  </div>
  <div class="pan" style="grid-column:3">
    <h3>Long-Lead Items</h3>
    <div id="ll" style="display:flex;flex-wrap:wrap;gap:2px"></div>
  </div>

  <!-- Row 4: Safety | What-if + Dims | ACT Constraints -->
  <div class="pan" style="grid-column:1">
    <h3>Safety</h3>
    <div id="safety" style="display:flex;gap:4px;flex-wrap:wrap"></div>
  </div>
  <div class="pan" style="grid-column:2">
    <h3>What-If</h3>
    <div style="display:flex;gap:4px;flex-wrap:wrap">
      <button onclick="whatIf('delay',6)" style="font:9px var(--mono);padding:3px 6px;border:1px solid var(--rule2);border-radius:4px;background:var(--hi);color:var(--ink2);cursor:pointer">+6mo</button>
      <button onclick="whatIf('delay',3)" style="font:9px var(--mono);padding:3px 6px;border:1px solid var(--rule2);border-radius:4px;background:var(--hi);color:var(--ink2);cursor:pointer">+3mo</button>
      <button onclick="whatIf('accel',-4)" style="font:9px var(--mono);padding:3px 6px;border:1px solid var(--rule2);border-radius:4px;background:var(--hi);color:var(--ink2);cursor:pointer">Crash</button>
      <button onclick="whatIf('budget',1)" style="font:9px var(--mono);padding:3px 6px;border:1px solid var(--rule2);border-radius:4px;background:var(--hi);color:var(--ink2);cursor:pointer">+$1B</button>
      <button onclick="whatIf('reset',0)" style="font:9px var(--mono);padding:3px 6px;border:1px solid var(--rule2);border-radius:4px;background:var(--hi);color:var(--ink2);cursor:pointer">Reset</button>
    </div>
    <h3 style="margin-top:4px">Dimensions</h3>
    <div class="dims" id="dims"></div>
  </div>
  <div class="pan act-pan" style="grid-column:3">
    <h3>ACT Constraints</h3>
    <div id="actpanel" style="max-height:80px;overflow-y:auto"></div>
  </div>
</div>
<div id="report" class="report" style="flex-shrink:0;max-height:52px;padding:4px 14px;font-size:9px;line-height:1.4;border-top:1px solid var(--rule)"></div>
<script>

let whatIfDelay=0,whatIfBudget=0,whatIfCrew=0;
function whatIf(type,val){
  if(type==='reset'){whatIfDelay=0;whatIfBudget=0;whatIfCrew=0;delayTotal=0;riskHits=new Set();eventLog.push({m:Math.round(month),type:'good',msg:'All scenarios reset'});return;}
  if(type==='delay'){whatIfDelay+=val;delayTotal+=Math.max(0,val);eventLog.push({m:Math.round(month),type:'risk',msg:'SCENARIO: '+(val>0?'+':'')+val+'mo schedule impact'});}
  if(type==='accel'){whatIfDelay+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: Schedule crashed by '+Math.abs(val)+'mo'});}
  if(type==='budget'){whatIfBudget+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: Budget increased by $'+val+'B'});}
  if(type==='crew'){whatIfCrew+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: +'+val+' workers added'});}
}

// metrics
function planned(m){const d=PLANTS[plant].dur;const x=Math.max(0,Math.min(1,m/d));const t=x*x*(3-2*x);return 100*t*t*(3-2*t);}
function earned(m){const eff=m<15?.88:m<40?.93:m<60?.97:.92;return Math.min(100,planned(Math.max(0,m-delayTotal*.4))*eff);}
function workforce(m){
  if(m<=0)return 0;
  const cfg=PLANTS[plant],pk=(cfg.peakWF||3200)+whatIfCrew,d=cfg.dur,frac=m/d;
  let f;if(frac<.20)f=frac/.20;else if(frac<.65)f=1;else if(frac<.90)f=1-(frac-.65)/.25*.85;else f=.15;
  return Math.round(pk*f*(1+.04*Math.sin(m*.52)));
}
// Cost model: labor + indirect + materials + equipment
function projectSpent(m){
  const cfg=PLANTS[plant],dur=cfg.dur,mI=Math.min(Math.round(m),dur);
  let lab=0,ind=0,mat=0,eq=0;
  for(let i=1;i<=mI;i++){const wf=workforce(i);const fr=i/dur;lab+=wf*18000;ind+=wf*12000;mat+=wf*(fr<.15?15000:fr<.5?28000:fr<.75?20000:8000);}
  if(cfg.equip)cfg.equip.forEach(e=>{if(m>=e.m)eq+=e.c*1e9;});
  const total=(lab+ind+mat+eq)/1e9;
  return{labor:lab/1e9,indirect:ind/1e9,materials:mat/1e9,equipment:eq/1e9,total};
}
function discProg(d,m){return m<d.s?0:m>=d.e?100:Math.round((m-d.s)/(d.e-d.s)*100);}

function kpis(m){
  const cfg=PLANTS[plant],B=cfg.budget+whatIfBudget,ev=earned(m),pv=planned(m),spi=pv>0?ev/pv:1;
  const cost=projectSpent(m),spent=cost.total;
  const cpi=spent>.1?(ev/100*B)/spent:1,eac=Math.min(B*2.5,cpi>.1?B/cpi:B);
  const dur=cfg.dur;
  const mwe=m>=dur?cfg.mwe:m>=dur-6?Math.round(cfg.mwe*.5):m>=dur-12?Math.round(cfg.mwe*.05):0;
  let cumVol=0;POURS.forEach(p=>{if(m>=p.m+2)cumVol+=p.vol;});
  const wf=workforce(m);
  const hrs=Math.round(wf*170*m);
  const activePhases=PHASES.filter(p=>m>=p.s&&m<p.e).length;
  const deliveredLL=LONGLEAD.filter(l=>m>=l.deliver).length;
  return[
    {v:Math.round(m/dur*100)+'%',l:'schedule',c:m>=dur?'ok':''},
    {v:ev.toFixed(0)+'%',l:'earned value',c:ev>=pv?'ok':ev>=pv*.9?'w':'bad'},
    {v:spi.toFixed(2),l:'SPI',c:spi>=.95?'ok':spi>=.85?'w':'bad'},
    {v:cpi.toFixed(2),l:'CPI',c:cpi>=.95?'ok':cpi>=.85?'w':'bad'},
    {v:'$'+spent.toFixed(1)+'B',l:'spent / $'+B.toFixed(1)+'B',c:spent>B?'bad':spent>B*.9?'w':''},
    {v:'$'+eac.toFixed(1)+'B',l:'EAC',c:eac<=B*1.05?'ok':eac<=B*1.15?'w':'bad'},
    {v:wf.toLocaleString(),l:'workforce',c:'bl'},
    {v:mwe||'--',l:'MWe output',c:mwe>=cfg.mwe?'vi':mwe>0?'w':''},
    {v:Math.round(cumVol/1000)+'k',l:'concrete m3',c:''},
    {v:Math.round(hrs/1e6)+'M',l:'worker-hours',c:''},
    {v:activePhases,l:'active phases',c:activePhases>4?'w':'bl'},
    {v:deliveredLL+'/'+LONGLEAD.length,l:'delivered LL',c:deliveredLL>=LONGLEAD.length?'ok':''},
    {v:delayTotal+'mo',l:'delay',c:delayTotal>6?'bad':delayTotal>0?'w':'ok'},
    {v:riskHits.size+'/'+RISKS.length,l:'risks hit',c:riskHits.size>4?'bad':riskHits.size>0?'w':'ok'}
  ];
}

function genReport(m){
  const cfg=PLANTS[plant],yr=Math.floor(m/12)+1,mo=Math.round(m%12)+1;
  const phase=PHASES.filter(p=>m>=p.s&&m<p.e);
  const wf=workforce(m),ev=earned(m),pv=planned(m),spi=pv>0?ev/pv:1;
  const cost=projectSpent(m),spent=cost.total;
  const cpi=spent>.1?(ev/100*cfg.budget)/spent:1;
  let cumVol=0;POURS.forEach(p=>{if(m>=p.m+2)cumVol+=p.vol;});
  const nextPour=POURS.find(p=>m<p.m);
  const nextMS=MILESTONES.find(ms=>m<ms.m);
  const activeFab=LONGLEAD.filter(l=>m>=l.order&&m<l.deliver);
  const lateItems=LONGLEAD.filter(l=>m>=l.need&&m<l.deliver);
  const activeRisks=RISKS.filter((r,i)=>riskHits.has(i));
  const hrs=Math.round(wf*170*m);

  let r='<b>'+cfg.name+' -- Monthly Construction Report</b><br>';
  r+='<b>Period:</b> Year '+yr+', Month '+mo+' (Project Month '+Math.round(m)+' of '+cfg.dur+')<br>';
  r+='<b>Active phases:</b> '+(phase.length?phase.map(p=>p.n).join(', '):'Commissioning')+'<br>';
  r+='<b>Workforce:</b> '+wf.toLocaleString()+' | <b>Earned:</b> '+ev.toFixed(1)+'% | <b>SPI:</b> '+spi.toFixed(2)+' | <b>CPI:</b> '+cpi.toFixed(2)+'<br>';
  const eac=Math.min(cfg.budget*2.5,cpi>.1?cfg.budget/cpi:cfg.budget);
  r+='<b>Budget:</b> $'+cfg.budget+'B | <b>Spent:</b> $'+spent.toFixed(1)+'B | <b>EAC:</b> $'+eac.toFixed(1)+'B<br>';
  r+='<b>Cost breakdown:</b> Labor $'+cost.labor.toFixed(1)+'B + Indirect $'+cost.indirect.toFixed(1)+'B + Materials $'+cost.materials.toFixed(1)+'B + Equipment $'+cost.equipment.toFixed(1)+'B<br>';
  r+='<b>Concrete placed:</b> '+cumVol.toLocaleString()+' m3'+(nextPour?' | Next: '+nextPour.n+' (M'+nextPour.m+', '+nextPour.vol+' m3)':'')+'<br>';
  r+='<b>Worker-hours:</b> '+Math.round(hrs/1e6)+'M | <b>LTI-free days:</b> '+Math.round((m-Math.floor(m/25)*25)*30)+'<br>';
  r+='<b>Reactor type:</b> '+cfg.fuel+' / '+cfg.coolant+' / '+cfg.contain+'<br>';
  if(activeFab.length)r+='<b>In fabrication:</b> '+activeFab.map(l=>l.n).join(', ')+'<br>';
  if(lateItems.length)r+='<span style="color:var(--red)"><b>LATE deliveries:</b> '+lateItems.map(l=>l.n).join(', ')+'</span><br>';
  if(delayTotal>0)r+='<span style="color:var(--red)"><b>Cumulative delay:</b> '+delayTotal+'mo from '+riskHits.size+' risk event(s): '+activeRisks.map(r=>r.n).join(', ')+'</span><br>';
  if(nextMS)r+='<b>Next milestone:</b> '+nextMS.n+' (M'+nextMS.m+', '+(nextMS.m-Math.round(m)>0?nextMS.m-Math.round(m)+'mo away':'NOW')+')<br>';
  if(spi<0.9)r+='<span style="color:var(--red)"><b>WARNING:</b> SPI below 0.90 -- schedule recovery plan required.</span><br>';
  if(cpi<0.9)r+='<span style="color:var(--red)"><b>WARNING:</b> CPI below 0.90 -- cost overrun projected at EAC $'+(cpi>0?cfg.budget/cpi:0).toFixed(1)+'B.</span><br>';
  return r;
}

// check risk triggers
let lastRiskCheck=0;
function checkRisks(m){
  if(Math.floor(m)===lastRiskCheck)return;
  lastRiskCheck=Math.floor(m);
  RISKS.forEach((r,i)=>{
    if(riskHits.has(i))return;
    if(Math.abs(m-r.trigger)<1&&Math.random()<r.prob){
      riskHits.add(i);delayTotal+=r.impact;
      eventLog.push({m:Math.round(m),type:'risk',msg:'RISK: '+r.n+' -- '+r.desc});
    }
  });
}

// check milestones
let msHit=new Set();
function checkMilestones(m){
  MILESTONES.forEach((ms,i)=>{
    if(msHit.has(i))return;
    if(m>=ms.m){msHit.add(i);eventLog.push({m:ms.m,type:'mile',msg:'MILESTONE: '+ms.n+' achieved'});}
  });
}

// WebGL (same raymarcher)
const VERT=`#version 300 es\nin vec2 aP;\nvoid main(){gl_Position=vec4(aP,0,1);}`;
const FRAG=`#version 300 es
precision highp float;out vec4 F;
uniform vec2 uR;uniform vec3 uC,uL;uniform float uV;uniform int uN;
uniform int uT[24];uniform vec3 uP[24],uS[24],uO[24];uniform float uB[24],uX[24];
uniform vec3 uD,uA,uZ;uniform float uNight;
float sB(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sS(vec3 p,float r){return length(p)-r;}
float sC(vec3 p,float r,float h){vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);return min(max(d.x,d.y),0.)+length(max(d,0.));}
float sT(vec3 p,float R,float r){return length(vec2(length(p.xz)-R,p.y))-r;}
float sm(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
float sO(int i,vec3 p){vec3 q=p-uP[i],s=uS[i]*.5;if(uT[i]==0)return sB(q,s);if(uT[i]==1)return sS(q,s.x);if(uT[i]==2)return sC(q,s.x,s.y);if(uT[i]==4)return sC(q.yxz,s.x,s.y);if(uT[i]==5)return sC(q.xzy,s.x,s.y);return sT(q,s.x,s.y);}
float map(vec3 p){float d=p.y;for(int i=0;i<24;i++){if(i>=uN)break;float di=sO(i,p);if(uX[i]>.5)d=max(d,-di);else if(uB[i]>.001)d=sm(d,di,uB[i]);else d=min(d,di);if(d<.001)break;}return d;}
vec3 mc(vec3 p,float dist){float d=p.y;vec2 q=abs(fract(p.xz*.5)-.5);float mx=max(q.x,q.y),w=.008*(1.+dist*.12),ln=smoothstep(.5-w,.5,mx);
vec3 c=mix(vec3(.80,.81,.83),vec3(.56,.59,.64),ln*.85);
for(int i=0;i<24;i++){if(i>=uN)break;float di=sO(i,p);if(uX[i]>.5)d=max(d,-di);else if(uB[i]>.001){float nd=sm(d,di,uB[i]);if(di<d)c=uO[i];d=nd;}else{if(di<d){d=di;c=uO[i];}}}return c;}
vec3 N(vec3 p){float d=map(p);vec2 e=vec2(.003,0);return normalize(vec3(map(p+e.xyy)-d,map(p+e.yxy)-d,map(p+e.yyx)-d));}
float sh(vec3 o,vec3 d){float r=1.,t=.1;for(int i=0;i<10;i++){float h=map(o+d*t);r=min(r,6.*h/t);t+=clamp(h,.06,.8);if(r<.02||t>15.)break;}return clamp(r,0.,1.);}
float ao(vec3 p,vec3 n){float o=0.,s=1.;for(int i=1;i<=3;i++){float h=.08*float(i);o+=(h-map(p+n*h))*s;s*=.65;}return clamp(1.-2.*o,0.,1.);}
void main(){vec2 uv=(gl_FragCoord.xy*2.-uR)/uR.y;
vec3 fw=normalize(uL-uC),rt=normalize(cross(fw,vec3(0,1,0))),up=cross(rt,fw);
float fl=1./tan(radians(uV)*.5);vec3 rd=normalize(fw*fl+rt*uv.x+up*uv.y),ro=uC;
vec3 sun=normalize(uD);
float ni=uNight;
vec3 sky1=mix(uA,vec3(.05,.06,.12),ni),sky2=mix(uZ,vec3(.02,.03,.06),ni);
vec3 sky=mix(sky2,sky1,clamp(rd.y*.7+.5,0.,1.));
sky+=vec3(1,.9,.7)*pow(max(dot(rd,sun),0.),64.)*.4*(1.-ni*.8);
float t=0.;bool hit=false;for(int i=0;i<48;i++){float h=map(ro+rd*t);if(h<.004*max(t,1.)){hit=true;break;}t+=h;if(t>50.)break;}
vec3 col=sky;if(hit){vec3 p=ro+rd*t,n=N(p),base=mc(p,t);
float dif=max(dot(n,sun),0.)*sh(p+n*.02,sun)*(1.-ni*.6);float amb=(.5+.5*n.y)*(1.-ni*.3);float occ=ao(p,n);
col=base*(vec3(1,.96,.88)*dif*(1.-ni*.5)+mix(sky2,sky1,.5)*amb*.55)*occ;
col+=vec3(pow(max(dot(reflect(rd,n),sun),0.),24.)*.2*dif);
col=mix(col,sky,1.-exp(-.001*t*t));}
col=pow(max(col,vec3(0)),vec3(1./2.2));F=vec4(col,1);}`;

const cv=$('gl'),gl=cv.getContext("webgl2",{antialias:false});

function cmp(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(sh));return sh;}
const prg=gl.createProgram();gl.attachShader(prg,cmp(gl.VERTEX_SHADER,VERT));gl.attachShader(prg,cmp(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prg);gl.useProgram(prg);
const bf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,bf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prg,"aP");gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
const U={};["uR","uC","uL","uV","uN","uT","uP","uS","uO","uB","uX","uD","uA","uZ","uNight"].forEach(n=>U[n]=gl.getUniformLocation(prg,n));

function getCam(m){
  const t=m/84*Math.PI*2;
  if(camMode==='aerial')return{p:[0,18,.01],l:[0,0,0],f:55};
  if(camMode==='reactor')return{p:[sc(-10)+4,sc(V["rb-h"]*.4),5],l:[sc(-10),sc(V["rb-h"]*.3),0],f:50};
  if(camMode==='turbine')return{p:[sc(25)+6,4,8],l:[sc(25),sc(V["tb-h"]*.3),0],f:52};
  if(camMode==='intake')return{p:[sc(-38),4,sc(-20)+8],l:[sc(-20),1,sc(-20)],f:50};
  if(camMode==='crane')return{p:[sc(5)+2,sc(V["cr-h"]*.7),sc(12)+3],l:[sc(-10),sc(V["rb-h"]*.3),0],f:48};
  return{p:[Math.cos(t*.25)*14,8,Math.sin(t*.25)*14],l:[0,2.5,0],f:48};
}

  const objs=buildObjs(month);
  const tp=new Int32Array(MAX_OBJ),ps=new Float32Array(MAX_OBJ*3),sz=new Float32Array(MAX_OBJ*3),cl=new Float32Array(MAX_OBJ*3),bl=new Float32Array(MAX_OBJ),sb=new Float32Array(MAX_OBJ);
  objs.forEach((o,i)=>{tp[i]=SHAPE_IDS[o.shape]??0;ps.set(o.pos,i*3);sz.set([o.size[0]??1,o.size[1]??o.size[0]??1,o.size[2]??o.size[0]??1],i*3);cl.set(unhex(o.color||"#999"),i*3);bl[i]=o.blend||0;sb[i]=o.sub?1:0;});
  const cam=getCam(month);
  gl.viewport(0,0,w,h);gl.uniform2f(U.uR,w,h);gl.uniform3fv(U.uC,cam.p);gl.uniform3fv(U.uL,cam.l);gl.uniform1f(U.uV,cam.f);
  gl.uniform1i(U.uN,objs.length);gl.uniform1iv(U.uT,tp);gl.uniform3fv(U.uP,ps);gl.uniform3fv(U.uS,sz);gl.uniform3fv(U.uO,cl);gl.uniform1fv(U.uB,bl);gl.uniform1fv(U.uX,sb);
  gl.uniform3f(U.uD,.5,1,.3);gl.uniform3fv(U.uA,[.80,.84,.90]);gl.uniform3fv(U.uZ,[.58,.63,.72]);
  gl.uniform1f(U.uNight,nightMode?1:0);

}

const scCtx=$('sc').getContext('2d'),dsCtx=$('disc').getContext('2d');
function drawCharts(){
  const dur=PLANTS[plant].dur;
  // S-curve
  let c=scCtx,w=c.canvas.width=c.canvas.clientWidth*2,h=c.canvas.height=c.canvas.clientHeight*2;
  c.fillStyle='#faf7ee';c.fillRect(0,0,w,h);
  c.strokeStyle='#ddd2b6';c.lineWidth=1;for(let i=0;i<=4;i++){const y=h*.08+h*.84*(1-i/4);c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // actual cost line
  c.strokeStyle='#b13d2c44';c.lineWidth=2;c.beginPath();
  let cumCost=0;for(let m=0;m<=dur;m++){const cs=projectSpent(m);cumCost=cs.total;const x=m/dur*w,y=h*.08+h*.84*(1-Math.min(1,cumCost/(PLANTS[plant].budget*1.15)));m?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  c.strokeStyle='#cabd9c';c.lineWidth=2;c.beginPath();for(let m=0;m<=dur;m++){const x=m/dur*w,y=h*.08+h*.84*(1-planned(m)/100);m?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  c.strokeStyle='#2c5d78';c.lineWidth=3;c.beginPath();for(let m=0;m<=Math.min(month,dur);m++){const x=m/dur*w,y=h*.08+h*.84*(1-earned(m)/100);m?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  const nx=month/dur*w;c.strokeStyle='#a87718';c.lineWidth=2;c.setLineDash([4,4]);c.beginPath();c.moveTo(nx,0);c.lineTo(nx,h);c.stroke();c.setLineDash([]);
  c.fillStyle='#9a9077';c.font='bold '+(h*.1)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
  c.fillText('Plan',4,h*.1);c.fillStyle='#2c5d78';c.fillText('Earned',w*.15,h*.1);c.fillStyle='#b13d2c88';c.fillText('Cost',w*.32,h*.1);

  // discipline progress
  c=dsCtx;w=c.canvas.width=c.canvas.clientWidth*2;h=c.canvas.height=c.canvas.clientHeight*2;
  c.fillStyle='#faf7ee';c.fillRect(0,0,w,h);
  const bw=w/(DISCIPLINES.length+.5),bh=h*.78;
  DISCIPLINES.forEach((d,i)=>{
    const pct=discProg(d,month)/100;
    c.fillStyle=d.c+'33';c.fillRect(i*bw+bw*.15,h*.1,bw*.7,bh);
    c.fillStyle=d.c;c.fillRect(i*bw+bw*.15,h*.1+bh*(1-pct),bw*.7,bh*pct);
    c.fillStyle='#9a9077';c.font=(h*.08)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
    c.fillText(d.n.slice(0,4),i*bw+bw*.2,h*.98);
    c.fillStyle=d.c;c.font='bold '+(h*.09)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
    c.fillText(discProg(d,month)+'%',i*bw+bw*.2,h*.1+bh*(1-pct)-4);
  });
  c.strokeStyle='#a87718';c.lineWidth=2;c.setLineDash([4,4]);c.beginPath();c.moveTo(nx,0);c.lineTo(nx,h);c.stroke();c.setLineDash([]);
}

function drawCostDisc(){
  const el=document.getElementById('costd');if(!el)return;
  const c=el.getContext('2d'),w=el.width=el.clientWidth*2,h=el.height=el.clientHeight*2;
  c.fillStyle='#faf7ee';c.fillRect(0,0,w,h);
  const dur=PLANTS[plant].dur,B=PLANTS[plant].budget*1000;
  TRADES.forEach((t,ti)=>{
    c.strokeStyle=t.color;c.lineWidth=2;c.beginPath();
    let cum=0;
    for(let m=0;m<=Math.min(month,dur);m++){
      const wf=workforce(m);const share=t.peak*(m<20?ti<2?1.5:.3:m<50?1:ti>3?1.5:.5);
      cum+=wf*52*share/1e3;
      const x=m/dur*w,y=h*.08+h*.84*(1-cum/B);
      m?c.lineTo(x,y):c.moveTo(x,y);
    }
    c.stroke();
  });
  c.fillStyle='#9a9077';c.font='bold '+(h*.09)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
  TRADES.forEach((t,i)=>{c.fillStyle=t.color;c.fillText(t.n,4+i*w/TRADES.length,h*.97);});
}

function drawWfTrade(){
  const el=document.getElementById('wftrade');if(!el)return;
  const c=el.getContext('2d'),w=el.width=el.clientWidth*2,h=el.height=el.clientHeight*2;
  c.fillStyle='#faf7ee';c.fillRect(0,0,w,h);
  const wf=workforce(Math.round(month));
  const bw=w/TRADES.length,bh=h*.78;
  TRADES.forEach((t,i)=>{
    const share=t.peak*(month<20?i<2?1.5:.3:month<50?1:i>3?1.5:.5);
    const tw=Math.round(wf*share);
    const pct=tw/4000;
    c.fillStyle=t.color+'44';c.fillRect(i*bw+bw*.1,h*.1,bw*.8,bh);
    c.fillStyle=t.color;c.fillRect(i*bw+bw*.1,h*.1+bh*(1-pct),bw*.8,bh*pct);
    c.fillStyle='#9a9077';c.font=(h*.08)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
    c.fillText(t.n.slice(0,4),i*bw+bw*.15,h*.97);
    c.fillStyle=t.color;c.font='bold '+(h*.09)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
    c.fillText(tw,i*bw+bw*.15,h*.1+bh*(1-pct)-3);

const ACT_ATOMS = {};
const ACT_ALL = [];

function actAtom(spec) {
  const a = Object.assign({
    alias: spec.alias,
    type: spec.type,
    name: spec.name,
    completionKind: spec.completionKind || 'leaf',
    complete: false,
    contains: spec.contains || [],
    'waits-on': spec['waits-on'] || [],
    blocks: spec.blocks || [],
    enables: spec.enables || [],
    'cleared-by': spec['cleared-by'] || [],
    completeAtMonth: spec.completeAtMonth != null ? spec.completeAtMonth : null,
    desc: spec.desc || ''
  }, spec);
  ACT_ATOMS[a.alias] = a;
  ACT_ALL.push(a);
  return a;
}

// --- ACT Completion Logic ---
// leaf: complete when month >= completeAtMonth
// gate: complete when all waits-on are complete
// rollup: complete when all children complete

function actIsComplete(alias, seen) {
  seen = seen || new Set();
  const a = ACT_ATOMS[alias];
  if (!a) return false;
  if (seen.has(alias)) return false;
  seen.add(alias);

  if (a.complete) return true;

  switch (a.completionKind) {
    case 'leaf':
      return a.completeAtMonth != null && month >= a.completeAtMonth;
    case 'gate': {
      const deps = a['waits-on'] || [];
      if (deps.length === 0) return false;
      const depsOk = deps.every(d => actIsComplete(d, new Set(seen)));
      // If gate also has a schedule month, require that too
      if (a.completeAtMonth != null) return depsOk && month >= a.completeAtMonth;
      return depsOk;
    }
    case 'rollup': {
      const ch = a.contains || [];
      if (ch.length === 0) return false;
      return ch.every(c => actIsComplete(c, new Set(seen)));
    }
    default:
      return a.completeAtMonth != null && month >= a.completeAtMonth;
  }
}

function actStatus(alias) {
  const a = ACT_ATOMS[alias];
  if (!a) return 'f';
  if (actIsComplete(alias)) return 'g'; // green = complete

  // For rollups: in progress if any child is complete or in progress
  if (a.completionKind === 'rollup' && a.contains && a.contains.length) {
    if (a.contains.some(c => actIsComplete(c) || actStatus(c) === 'a')) return 'a';
  }
  // For gates: in progress if some waits-on are complete or if scheduled to start soon
  if (a.completionKind === 'gate' && a['waits-on'] && a['waits-on'].length) {
    if (a['waits-on'].some(d => actIsComplete(d))) return 'a';
  }
  // For leaves: in progress if within 6 months of completion
  if (a.completionKind === 'leaf' && a.completeAtMonth != null) {
    if (month >= a.completeAtMonth - 6) return 'a';
  }

  return 'f'; // gray = future
}

function actConstraintsForCWP(cwpAlias) {
  return ACT_ALL.filter(a =>
    a.type === 'constraint' && (a.blocks || []).includes(cwpAlias)
  );
}

// --- ACT Panel Rendering ---
let actExpandedCWA = null;

function updateACTPanel() {
  const el = document.getElementById('actpanel');
  if (!el) return;

  const cwas = ACT_ALL.filter(a => a.type === 'cwa');
  let html = '';

  cwas.forEach(cwa => {
    const st = actStatus(cwa.alias);
    const dotCls = st;
    const expanded = actExpandedCWA === cwa.alias;
    const pillCls = st === 'g' ? 'green' : st === 'a' ? 'amber' : '';

    html += '<div class="act-cwa' + (expanded ? ' open' : '') + '" data-act-cwa="' + cwa.alias + '">';
    html += '<div class="act-row">';
    html += '<span class="act-dot ' + dotCls + '"></span>';
    html += '<span class="act-alias">' + cwa.alias + '</span>';
    html += '<span class="act-name">' + cwa.name + '</span>';
    html += '<span class="act-pill ' + pillCls + '">' + (st === 'g' ? 'Done' : st === 'a' ? 'Active' : 'Future') + '</span>';
    html += '</div>';

    // Expandable children
    html += '<div class="act-sub">';
    (cwa.contains || []).forEach(cwpAlias => {
      const cwp = ACT_ATOMS[cwpAlias];
      if (!cwp) return;
      const cwpSt = actStatus(cwpAlias);
      const cwpDot = cwpSt;
      const cwpPill = cwpSt === 'g' ? 'green' : cwpSt === 'a' ? 'amber' : '';

      html += '<div class="act-cwp">';
      html += '<div class="act-row">';
      html += '<span class="act-dot ' + cwpDot + '"></span>';
      html += '<span class="act-alias">' + cwpAlias + '</span>';
      html += '<span class="act-name">' + cwp.name + '</span>';
      html += '<span class="act-pill ' + cwpPill + '">' + (cwpSt === 'g' ? 'Done' : cwpSt === 'a' ? 'Active' : 'Pending') + '</span>';
      html += '</div>';

      // Constraints for this CWP
      const cons = actConstraintsForCWP(cwpAlias);
      cons.forEach(con => {
        const conComplete = actIsComplete(con.alias);
        const blocking = !conComplete;
        html += '<div class="act-con">';
        html += '<span class="act-dot ' + (conComplete ? 'g' : 'r') + '"></span> ';
        html += '<span style="color:' + (blocking ? 'var(--red)' : 'var(--green)') + '">' + con.alias + '</span> ';
        html += con.name;
        if (con['waits-on'] && con['waits-on'].length) {
          const waitNames = con['waits-on'].map(w => {
            const wa = ACT_ATOMS[w];
            return wa ? wa.name : w;
          }).join(', ');
          html += ' <span class="rel">waits-on: ' + waitNames + '</span>';
        }
        if (con.enables && con.enables.length) {
          html += ' <span class="rel">enables: ' + con.enables.join(', ') + '</span>';
        }
        html += '</div>';
      });

      // Show waits-on relationships
      if (cwp['waits-on'] && cwp['waits-on'].length) {
        cwp['waits-on'].forEach(dep => {
          if (ACT_ATOMS[dep] && ACT_ATOMS[dep].type !== 'constraint') {
            const depA = ACT_ATOMS[dep];
            html += '<div class="act-con"><span class="act-dot ' + (actIsComplete(dep) ? 'g' : 'a') + '"></span> ';
            html += '<span class="rel">waits-on: ' + depA.name + '</span></div>';
          }
        });
      }
      if (cwp.enables && cwp.enables.length) {
        html += '<div class="act-con"><span class="rel">enables: ' + cwp.enables.map(e => {
          const ea = ACT_ATOMS[e];
          return ea ? ea.name : e;
        }).join(', ') + '</span></div>';
      }

      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  });

  el.innerHTML = html;
}

// Click handler for ACT panel expand/collapse
document.addEventListener('click', function(e) {
  const cwaEl = e.target.closest('[data-act-cwa]');
  if (cwaEl) {
    const alias = cwaEl.dataset.actCwa;
    actExpandedCWA = actExpandedCWA === alias ? null : alias;
    updateACTPanel();
    return;
  }
  // Clash modal button handler
  const clashBtn = e.target.closest('[data-clash-choice]');
  if (clashBtn) {
    const choice = clashBtn.dataset.clashChoice;
    const overlay = document.getElementById('clash-overlay');
    const clashId = overlay ? overlay.dataset.clashId : '';
    if (overlay) overlay.remove();
    // Apply effects
    if (choice === 'a') {
      // Option A effects (typically +delay)
      const spec = ACT_CLASHES_SPEC[clashId];
      if (spec && spec.effectA) {
        delayTotal += spec.effectA.delay || 0;
        eventLog.push({m: Math.round(month), type: 'risk', msg: 'CLASH RESOLVED: ' + spec.title + ' -- ' + spec.optA});
      }
    } else {
      const spec = ACT_CLASHES_SPEC[clashId];
      if (spec && spec.effectB) {
        delayTotal += spec.effectB.delay || 0;
        eventLog.push({m: Math.round(month), type: 'good', msg: 'CLASH RESOLVED: ' + spec.title + ' -- ' + spec.optB});
      }
    }
    actClashFired[clashId] = true;
  }
});


// --- Clash Resolution Modals ---
const ACT_CLASHES_SPEC = {
  'CL-PIPE-CABLE': {
    triggerMonth: 30,
    title: 'Piping / Cable Tray Interference',
    desc: 'CLASH: Piping route P-RC-01 conflicts with cable tray ET-4A in Reactor Building elevation +12m. The routing was not coordinated between disciplines.',
    optA: 'Accept reroute (+2 weeks to piping schedule)',
    optB: 'Escalate to engineering for combined solution',
    effectA: { delay: 0.5 },
    effectB: { delay: 0 }
  },
  'CL-RPV-LINER': {
    triggerMonth: 45,
    title: 'RPV Set / Liner Weld Conflict',
    desc: 'CLASH: RPV set sequence conflicts with containment liner weld inspection window. Both crews require exclusive access to the containment interior.',
    optA: 'Delay RPV set by 1 month to clear inspection',
    optB: 'Parallel inspection with restricted RPV rigging zone',
    effectA: { delay: 1 },
    effectB: { delay: 0 }
  },
  'CL-COND-GROUT': {
    triggerMonth: 55,
    title: 'Condenser / Turbine Pedestal Sequence',
    desc: 'CLASH: Condenser tube pull schedule overlaps with turbine pedestal grouting cure window. Both activities occupy the turbine building main bay.',
    optA: 'Sequence condenser first, delay grouting (+3 weeks)',
    optB: 'Grout first, condenser waits for cure (+2 weeks)',
    effectA: { delay: 0.75 },
    effectB: { delay: 0.5 }
  }
};

const actClashFired = {};

function checkACTClashes() {
  for (const id in ACT_CLASHES_SPEC) {
    if (actClashFired[id]) continue;
    const spec = ACT_CLASHES_SPEC[id];
    if (Math.abs(month - spec.triggerMonth) < 0.5) {
      showClashModal(id, spec);
      actClashFired[id] = true;
      break; // only one at a time
    }
  }
}

function showClashModal(id, spec) {
  // Don't show if already showing
  if (document.getElementById('clash-overlay')) return;

  const overlay = document.createElement('div');
  overlay.className = 'clash-overlay';
  overlay.id = 'clash-overlay';
  overlay.dataset.clashId = id;

  overlay.innerHTML =
    '<div class="clash-modal">' +
    '<h4>' + spec.title + '</h4>' +
    '<p>' + spec.desc + '</p>' +
    '<div class="clash-btns">' +
    '<button class="clash-btn" data-clash-choice="a">' + spec.optA + '</button>' +
    '<button class="clash-btn" data-clash-choice="b">' + spec.optB + '</button>' +
    '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  // Pause playback so user can read
  if (playing) {
    playing = false;
    $('play').textContent = 'Play';
  }
}


// --- ACT Event Integration ---
// Track which ACT events we've already logged
const actEventsLogged = {};

function checkACTEvents() {
  ACT_ALL.forEach(a => {
    if (actEventsLogged[a.alias]) return;
    if (actIsComplete(a.alias)) {
      actEventsLogged[a.alias] = true;
      if (a.type === 'constraint') {
        eventLog.push({m: Math.round(month), type: 'good', msg: a.alias + ' cleared: ' + a.name});
      } else if (a.type === 'cwa') {
        eventLog.push({m: Math.round(month), type: 'mile', msg: 'CWA complete: ' + a.name});
      } else if (a.type === 'cwp') {
        eventLog.push({m: Math.round(month), type: 'good', msg: a.alias + ' complete: ' + a.name});
      }
    }
  });
}

// --- Patch into the main update loop ---
const _origUpdateUI = updateUI;
updateUI = function() {
  _origUpdateUI();
  updateACTPanel();
  checkACTEvents();
  checkACTClashes();
};

// Reset ACT state when plant changes
const _origSetPlant = setPlant;
setPlant = function(p) {
  _origSetPlant(p);
  // Reset ACT completion tracking
  for (const k in actEventsLogged) delete actEventsLogged[k];
  for (const k in actClashFired) delete actClashFired[k];
  ACT_ALL.forEach(a => { a.complete = false; });
};

// Re-init with current plant to apply patched setPlant
// (no-op reset -- the existing setPlant('pwr') already ran, this just hooks the ACT reset)
