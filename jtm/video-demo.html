<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JTM -- video / record and play as text</title>
<style>
:root{--bg:#12141a;--panel:#1a1d25;--ink:#e8eaed;--muted:#7a8290;--hair:#2a2e38;--red:#C85A4F;--ok:#3E9B6B;--blue:#3E78C9;--accent:#D9952F;--mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,Menlo,monospace;--sans:Inter,"Segoe UI",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;touch-action:manipulation}
header{padding:14px 20px 10px;border-bottom:1px solid var(--hair)}
header h1{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:.06em}
header h1 .dim{color:var(--muted);font-weight:400}
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 20px;border-bottom:1px solid var(--hair);background:var(--panel)}
button{font:600 12px var(--sans);padding:6px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--hair);background:var(--panel);color:var(--ink);transition:.15s}
button:hover{border-color:var(--ink)}
button.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
button.rec{background:var(--red);border-color:var(--red);color:#fff;animation:none}
button.rec.on{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
select{font:12px var(--mono);padding:4px 8px;border:1px solid var(--hair);border-radius:4px;background:var(--panel);color:var(--ink)}
.status{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.view{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--hair)}
@media(max-width:600px){.view{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
.pane{position:relative;background:#000;aspect-ratio:4/3;overflow:hidden}
.pane video,.pane canvas{width:100%;height:100%;object-fit:contain;display:block}
.pane .lbl{position:absolute;top:6px;left:8px;font:600 10px var(--mono);color:#fff;background:rgba(0,0,0,.6);padding:2px 7px;border-radius:3px;letter-spacing:.08em}
.progress{height:4px;background:var(--hair)}
.progress-fill{height:100%;background:var(--accent);width:0;transition:width 50ms}
.editor{padding:12px 20px 16px}
.editor h2{font-family:var(--mono);font-size:12px;letter-spacing:.1em;font-weight:600;margin-right:auto}
.editor .info{font-family:var(--mono);font-size:11px;color:var(--muted)}
textarea{width:100%;height:200px;resize:vertical;font:11px/1.4 var(--mono);color:var(--ink);background:#0a0c0e;border:1px solid var(--hair);border-radius:6px;padding:10px;white-space:pre;tab-size:2}
textarea:focus{outline:2px solid var(--blue);outline-offset:-1px}
.hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}
.hint code{font-family:var(--mono);background:var(--panel);padding:1px 4px;border-radius:3px}
aside{padding:10px 20px 14px;border-top:1px solid var(--hair)}
aside h2{font-family:var(--mono);font-size:11px;letter-spacing:.1em;font-weight:600;margin-bottom:6px}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.stat{background:var(--panel);border:1px solid var(--hair);border-radius:6px;padding:8px 10px;text-align:center}
.stat .v{font-family:var(--mono);font-size:16px;font-weight:700}
.stat .l{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.stat.ok .v{color:var(--ok)}.stat.blue .v{color:var(--blue)}.stat.accent .v{color:var(--accent)}
footer{padding:10px 20px 20px;color:var(--muted);font-size:11px}
</style>
</head>
<body>
<header><h1>JTM<span class="dim"> / video</span></h1></header>
<div class="bar">
  <button id="camBtn">Camera</button>
  <button id="flipBtn">Flip</button>
  <input type="file" id="fileIn" accept="video/*" style="display:none">
  <button id="fileBtn">Upload</button>
  <select id="res"><option value="32">32px</option><option value="48" selected>48px</option><option value="64">64px</option></select>
  <select id="fps"><option value="5">5fps</option><option value="8" selected>8fps</option><option value="12">12fps</option></select>
  <button id="recBtn" class="rec">Record</button>
  <button id="stopBtn">Stop</button>
  <button id="playBtn">Play</button>
  <span class="status" id="st">ready</span>
</div>
<div class="view">
  <div class="pane"><video id="vid" playsinline autoplay muted></video><video id="fvid" playsinline muted style="display:none"></video><span class="lbl">SOURCE</span></div>
  <div class="pane"><canvas id="out"></canvas><span class="lbl">PLAYBACK</span></div>
</div>
<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="editor">
  <div class="bar" style="padding:0 0 8px;border:none;background:none">
    <h2>JTM VIDEO DATA</h2>
    <span class="info" id="bytes"></span>
    <button id="dlBtn" style="font-size:11px;padding:4px 10px">Download</button>
  </div>
  <textarea id="text" spellcheck="false"></textarea>
  <p class="hint">Record from camera or upload a file. The text below IS the video. Paste JTM video JSON and hit Play to decode it.</p>
</div>
<aside>
  <h2>STATS</h2>
  <div class="stats" id="stats"></div>
</aside>
<footer>Palette-quantized, delta-encoded video as JSON text. Keyframes (K) + delta frames (D) with RLE.</footer>
<script>
const $=id=>document.getElementById(id);
const vid=$('vid'),fvid=$('fvid'),outC=$('out'),octx=outC.getContext('2d');
const sc=document.createElement('canvas'),sctx=sc.getContext('2d');
let stream=null,facing='environment',camOK=false;
let recording=false,playing=false,jtm=null;
let recBuf=[],recTimer=null,playTimer=null,playIdx=0,playDec=null;

// palette chars: a-z A-Z (52 chars, never digits)
const PAL_CH='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
function palChar(i){return PAL_CH[i]||'a';}
function palIdx(c){const i=PAL_CH.indexOf(c);return i>=0?i:0;}

function rleEnc(arr){
  let s='';
  for(let i=0;i<arr.length;){
    let j=i;while(j<arr.length&&arr[j]===arr[i]&&j-i<255)j++;
    const n=j-i,c=palChar(arr[i]);
    s+=n>2?String(n)+c:c.repeat(n);
    i=j;
  }
  return s;
}
function rleDec(s){
  const out=[];let i=0;
  while(i<s.length){
    let num='';
    while(i<s.length&&s[i]>='0'&&s[i]<='9'){num+=s[i++];}
    if(i>=s.length)break;
    const v=palIdx(s[i++]);
    const n=num?parseInt(num):1;
    for(let j=0;j<n;j++)out.push(v);
  }
  return out;
}

// camera
async function startCam(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    camOK=false;
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:640}},audio:false});
    vid.srcObject=stream;vid.style.display='';fvid.style.display='none';fvid.pause();
    $('st').textContent='loading...';
    await new Promise(r=>{
      if(vid.readyState>=2){r();return;}
      vid.onloadeddata=()=>{vid.onloadeddata=null;r();};
    });
    camOK=true;
    $('st').textContent='camera '+vid.videoWidth+'x'+vid.videoHeight;
    $('camBtn').classList.add('on');
  }catch(e){$('st').textContent=e.message;}
}
function stopCam(){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  camOK=false;$('camBtn').classList.remove('on');
}

function grab(cols){
  const src=fvid.style.display!=='none'?fvid:vid;
  const vw=src.videoWidth,vh=src.videoHeight;
  if(!vw||!vh)return null;
  const rows=Math.round(cols*vh/vw);
  sc.width=cols;sc.height=rows;
  sctx.drawImage(src,0,0,cols,rows);
  return sctx.getImageData(0,0,cols,rows);
}

// encode
function encode(frames,fps){
  const ki=8,maxP=Math.min(PAL_CH.length,48);
  const w=frames[0].width,h=frames[0].height,npx=w*h;

  // global palette
  const bkt=new Map();
  for(const f of frames){
    const d=f.data;
    for(let i=0;i<npx;i++){
      const k=((d[i*4]>>4)<<8)|((d[i*4+1]>>4)<<4)|(d[i*4+2]>>4);
      bkt.set(k,(bkt.get(k)||0)+1);
    }
  }
  const top=[...bkt.entries()].sort((a,b)=>b[1]-a[1]).slice(0,maxP);
  const pal=top.map(([k])=>[((k>>8)&0xf)*17,((k>>4)&0xf)*17,(k&0xf)*17]);

  function nearest(r,g,b){
    let bi=0,bd=1e9;
    for(let p=0;p<pal.length;p++){
      const dr=r-pal[p][0],dg=g-pal[p][1],db=b-pal[p][2],d=dr*dr+dg*dg+db*db;
      if(d<bd){bd=d;bi=p;}
    }
    return bi;
  }

  let prev=null;
  const enc=[];
  for(let fi=0;fi<frames.length;fi++){
    const d=frames[fi].data,idx=new Uint8Array(npx);
    for(let i=0;i<npx;i++)idx[i]=nearest(d[i*4],d[i*4+1],d[i*4+2]);

    if(!prev||fi%ki===0){
      const rows=[];
      for(let y=0;y<h;y++)rows.push(rleEnc(idx.subarray(y*w,y*w+w)));
      enc.push({t:'K',r:rows});
    }else{
      const ch=[];
      for(let i=0;i<npx;i++)if(idx[i]!==prev[i])ch.push(i,idx[i]);
      if(ch.length>=npx){
        const rows=[];
        for(let y=0;y<h;y++)rows.push(rleEnc(idx.subarray(y*w,y*w+w)));
        enc.push({t:'K',r:rows});
      }else{
        enc.push({t:'D',c:ch});
      }
    }
    prev=idx.slice();
  }

  return{
    kind:'video',w,h,fps,ki,
    pal:pal.map(c=>'#'+c.map(v=>v.toString(16).padStart(2,'0')).join('')),
    f:enc
  };
}

// decode
function decode(j){
  const pal=j.pal.map(h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]);
  const w=j.w,h=j.h,n=w*h,cur=new Uint8Array(n),out=[];
  for(const fr of j.f){
    if(fr.t==='K'){
      let off=0;
      for(const row of fr.r){
        const px=rleDec(row);
        for(let x=0;x<Math.min(px.length,w);x++)cur[off+x]=px[x];
        off+=w;
      }
    }else{
      for(let i=0;i<fr.c.length;i+=2)cur[fr.c[i]]=fr.c[i+1];
    }
    const img=new Uint8ClampedArray(n*4);
    for(let i=0;i<n;i++){
      const c=pal[cur[i]]||[0,0,0];
      img[i*4]=c[0];img[i*4+1]=c[1];img[i*4+2]=c[2];img[i*4+3]=255;
    }
    out.push(new ImageData(img,w,h));
  }
  return out;
}

// record
function startRec(){
  const src=fvid.style.display!=='none'?fvid:vid;
  if(!src.videoWidth||(src===vid&&!camOK)){$('st').textContent='start camera or upload first';return;}
  if(src===fvid){fvid.currentTime=0;fvid.play();}
  recBuf=[];recording=true;
  $('recBtn').classList.add('on');$('recBtn').textContent='REC';
  const cols=+$('res').value,rate=+$('fps').value;
  $('st').textContent='recording...';
  recTimer=setInterval(()=>{
    if(!recording)return;
    const f=grab(cols);
    if(f)recBuf.push(f);
    $('st').textContent='rec: '+recBuf.length+'f ('+(recBuf.length/rate).toFixed(1)+'s)';
  },1000/rate);
}
function stopRec(){
  recording=false;clearInterval(recTimer);
  $('recBtn').classList.remove('on');$('recBtn').textContent='Record';
  if(!recBuf.length){$('st').textContent='no frames';return;}
  $('st').textContent='encoding '+recBuf.length+' frames...';
  setTimeout(()=>{
    jtm=encode(recBuf,+$('fps').value);
    $('text').value=JSON.stringify(jtm);
    showStats();
    $('st').textContent='done: '+recBuf.length+'f encoded';
    recBuf=[];
  },50);
}

// play
function startPlay(){
  let d=jtm;
  if(!d){try{d=JSON.parse($('text').value);jtm=d;}catch(e){$('st').textContent='paste valid JTM JSON first';return;}}
  stopPlay();
  $('st').textContent='decoding...';
  setTimeout(()=>{
    playDec=decode(d);
    if(!playDec.length){$('st').textContent='no frames decoded';return;}
    outC.width=d.w;outC.height=d.h;
    playIdx=0;playing=true;
    $('playBtn').classList.add('on');$('playBtn').textContent='Stop';
    $('st').textContent='playing '+playDec.length+' frames';
    playTimer=setInterval(()=>{
      if(playIdx>=playDec.length)playIdx=0;
      octx.putImageData(playDec[playIdx],0,0);
      $('prog').style.width=(playIdx/playDec.length*100)+'%';
      playIdx++;
    },1000/d.fps);
  },50);
}
function stopPlay(){
  playing=false;clearInterval(playTimer);playTimer=null;
  $('playBtn').classList.remove('on');$('playBtn').textContent='Play';
}

function fmtB(n){return n>=1048576?(n/1048576).toFixed(1)+' MB':n>=1024?(n/1024).toFixed(1)+' KB':n+' B';}
function showStats(){
  if(!jtm)return;
  const t=$('text').value,nf=jtm.f.length,dur=nf/jtm.fps;
  const raw=jtm.w*jtm.h*3*nf,nk=jtm.f.filter(f=>f.t==='K').length;
  $('bytes').textContent=fmtB(t.length);
  $('stats').innerHTML=
    '<div class="stat blue"><div class="v">'+nf+'</div><div class="l">frames ('+nk+'K '+(nf-nk)+'D)</div></div>'+
    '<div class="stat"><div class="v">'+jtm.w+'x'+jtm.h+'</div><div class="l">resolution</div></div>'+
    '<div class="stat accent"><div class="v">'+dur.toFixed(1)+'s</div><div class="l">duration</div></div>'+
    '<div class="stat"><div class="v">'+jtm.pal.length+'</div><div class="l">palette</div></div>'+
    '<div class="stat"><div class="v">'+fmtB(t.length)+'</div><div class="l">JTM text</div></div>'+
    '<div class="stat ok"><div class="v">'+(raw>0?Math.round(raw/t.length)+'x':'--')+'</div><div class="l">vs raw RGB</div></div>';
}

// wiring
$('camBtn').onclick=()=>{if(stream)stopCam();else startCam();};
$('flipBtn').onclick=()=>{facing=facing==='environment'?'user':'environment';if(stream)startCam();};
$('fileBtn').onclick=()=>$('fileIn').click();
$('fileIn').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  fvid.src=URL.createObjectURL(f);fvid.style.display='';vid.style.display='none';
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;camOK=false;$('camBtn').classList.remove('on');}
  fvid.load();
  fvid.onloadeddata=()=>{fvid.onloadeddata=null;$('st').textContent='loaded '+fvid.videoWidth+'x'+fvid.videoHeight+' -- Record';};
};
$('recBtn').onclick=()=>{if(recording)stopRec();else startRec();};
$('stopBtn').onclick=()=>{if(recording)stopRec();if(playing)stopPlay();};
$('playBtn').onclick=()=>{if(playing)stopPlay();else startPlay();};
$('dlBtn').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('text').value],{type:'application/json'}));a.download='video.jtm';a.click();};
</script>
</body>
</html>
