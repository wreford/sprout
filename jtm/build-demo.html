<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JTM -- build sequence / nuclear construction simulator</title>
<style>
:root{--bg:#f4f5f6;--p:#fff;--ink:#1c1f26;--m:#6b7280;--h:#dde0e4;--ok:#16a34a;--w:#d97706;--bad:#dc2626;--bl:#2563eb;--vi:#7c3aed;--mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,Menlo,monospace;--sans:Inter,"Segoe UI",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;touch-action:manipulation}
.top{position:sticky;top:0;z-index:20;background:var(--bg)}
.hdr{padding:6px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--h)}
.hdr h1{font:700 15px var(--mono);letter-spacing:.05em;flex:none}
.hdr h1 b{color:var(--vi)}
.hdr select,.hdr button{font:600 10px var(--sans);padding:4px 10px;border:1px solid var(--h);border-radius:4px;background:var(--p);color:var(--ink);cursor:pointer}
.hdr button.on{background:var(--ink);color:var(--p);border-color:var(--ink)}
.hdr .sp{margin-left:auto;font:11px var(--mono);color:var(--m)}
.tl{padding:5px 16px 8px;background:var(--p);border-bottom:1px solid var(--h)}
.tl-r{display:flex;align-items:center;gap:6px}
.tl-r input[type=range]{flex:1;accent-color:var(--ink)}
.tl-r .lb{font:600 11px var(--mono);min-width:80px}
.pbar{display:flex;gap:1px;margin-top:4px;height:14px}
.pbar .ps{flex:1;border-radius:2px;font:600 7px var(--mono);display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;overflow:hidden;white-space:nowrap;transition:.12s}
.pbar .ps.now{outline:2px solid var(--ink);outline-offset:-1px;z-index:1}
.pbar .ps.fut{opacity:.2}
#gl{width:100%;aspect-ratio:16/10;display:block;background:#1a1d22;border-bottom:1px solid var(--h)}
@media(max-width:700px){.top #gl{max-height:30vh;aspect-ratio:auto}}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--h)}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
.card{background:var(--p);padding:10px 14px}
.card h3{font:600 9px var(--mono);letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:5px}
.card canvas{width:100%;height:80px;display:block;border:1px solid var(--h);border-radius:3px;background:#fafbfc}

.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px;padding:8px 16px}
.k{background:var(--p);border:1px solid var(--h);border-radius:5px;padding:5px 6px;text-align:center}
.k .v{font:800 14px var(--mono)}.k .l{font:500 7px var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--m);margin-top:1px}
.k.ok .v{color:var(--ok)}.k.w .v{color:var(--w)}.k.bad .v{color:var(--bad)}.k.bl .v{color:var(--bl)}.k.vi .v{color:var(--vi)}

.ms{padding:6px 16px;display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--h)}
.ms .m{font:500 8px var(--mono);padding:2px 6px;border-radius:3px;border:1px solid var(--h);display:flex;align-items:center;gap:3px}
.ms .m.d{border-color:var(--ok);color:var(--ok);background:#f0fdf4}.ms .m.a{border-color:var(--w);color:var(--w);background:#fffbeb}.ms .m.f{color:var(--m)}
.ms .md{width:5px;height:5px;border-radius:50%}

.feed{background:var(--p);border-bottom:1px solid var(--h);max-height:120px;overflow-y:auto;padding:6px 16px}
.feed .ev{font:11px var(--mono);padding:3px 0;border-bottom:1px solid #f0f0f0;display:flex;gap:6px;color:var(--m)}
.feed .ev .t{color:var(--ink);font-weight:600;min-width:40px}.feed .ev .typ{min-width:50px}
.feed .ev.risk{color:var(--bad)}.feed .ev.good{color:var(--ok)}.feed .ev.mile{color:var(--vi)}

.risk{background:var(--p);padding:8px 16px;border-bottom:1px solid var(--h)}
.risk h3{font:600 9px var(--mono);letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:4px}
.rr{display:flex;gap:4px;flex-wrap:wrap}
.ri{font:10px var(--mono);padding:3px 7px;border-radius:4px;border:1px solid var(--h);display:flex;align-items:center;gap:4px}
.ri.hit{border-color:var(--bad);color:var(--bad);background:#fef2f2}
.ri.ok{border-color:var(--ok);color:var(--ok)}

.llt{background:var(--p);padding:8px 16px;border-bottom:1px solid var(--h)}
.llt h3{font:600 9px var(--mono);letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:4px}
.ll{display:flex;gap:4px;flex-wrap:wrap}
.li{font:10px var(--mono);padding:3px 7px;border-radius:4px;border:1px solid var(--h);display:flex;align-items:center;gap:4px}
.li.del{border-color:var(--ok);color:var(--ok);background:#f0fdf4}.li.wait{color:var(--w);border-color:var(--w);background:#fffbeb}.li.late{color:var(--bad);border-color:var(--bad)}

.dims{padding:6px 16px;background:var(--p);display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--h)}
.dim{display:flex;align-items:center;gap:4px;font:11px var(--mono)}
.dim label{color:var(--m)}.dim input{width:50px;accent-color:var(--bl)}.dim .dv{font-weight:600;min-width:24px;text-align:right}
.report{background:var(--p);padding:10px 16px;border-bottom:1px solid var(--h);font:11px/1.6 var(--mono);color:var(--m);max-height:100px;overflow-y:auto}
.report b{color:var(--ink)}
.sf{display:inline-block;font:700 10px var(--mono);padding:3px 8px;border-radius:4px;border:1px solid var(--h);text-align:center;min-width:60px}
.sf.g{border-color:var(--ok);color:var(--ok);background:#f0fdf4}
.sf.y{border-color:var(--w);color:var(--w);background:#fffbeb}
.sf.r{border-color:var(--bad);color:var(--bad);background:#fef2f2}
.sf .sv{font-size:14px;display:block}.sf .sl{font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--m);font-weight:500;margin-top:1px}
.pour-row{padding:2px 0;border-bottom:1px solid #f0f0f0;display:flex;gap:8px}
.pour-row .pm{font-weight:600;color:var(--ink);min-width:30px}
.pour-row .pn{flex:1}.pour-row .pv{color:var(--bl);font-weight:600;min-width:40px;text-align:right}
.pour-row.done{color:var(--ok)}.pour-row.future{color:var(--h)}
</style>
</head>
<body>
<div class="top">
<div class="hdr">
  <h1><b>BUILD</b> SEQUENCE</h1>
  <select id="plant"><option value="pwr">PWR 600 MWe</option><option value="candu">CANDU 700 MWe</option><option value="smr">SMR 300 MWe</option></select>
  <select id="cam"><option value="orbit">Orbit</option><option value="aerial">Aerial</option><option value="reactor">Reactor</option><option value="turbine">Turbine</option><option value="intake">Intake</option><option value="crane">Crane</option></select>
  <button id="night">Night</button>
  <button id="weather">Weather</button>
  <button id="play">Play</button>
  <button id="spd" data-s="1">1x</button>
  <span class="sp" id="sp"></span>
</div>
<div class="tl">
  <div class="tl-r"><input type="range" id="mo" min="0" max="84" value="0" step="0.1"><span class="lb" id="mlab">M0</span></div>
  <div class="pbar" id="pb"></div>
</div>
<canvas id="gl"></canvas>
</div>

<div class="grid">
  <div class="card"><h3>S-CURVE (PLAN vs EARN vs ACTUAL COST)</h3><canvas id="sc"></canvas></div>
  <div class="card"><h3>DISCIPLINE PROGRESS</h3><canvas id="disc"></canvas></div>
</div>
<div class="kpis" id="kpis"></div>
<div class="ms" id="ms"></div>
<div class="feed" id="feed"></div>
<div class="grid">
  <div class="risk"><h3>RISK REGISTER</h3><div class="rr" id="risks"></div></div>
  <div class="llt"><h3>LONG-LEAD ITEMS</h3><div class="ll" id="ll"></div></div>
</div>
<div class="report" id="report"></div>
<div class="dims" id="dims"></div>
<div class="grid">
  <div class="card"><h3>COST BY DISCIPLINE (CUMULATIVE $M)</h3><canvas id="costd"></canvas></div>
  <div class="card"><h3>WORKFORCE BY TRADE</h3><canvas id="wftrade"></canvas></div>
</div>
<div class="grid">
  <div class="pours" style="background:var(--p);padding:8px 14px;border-bottom:1px solid var(--h)">
    <h3 style="font:600 9px var(--mono);letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:4px">CONCRETE POUR LOG</h3>
    <div id="pourlog" style="font:10px var(--mono);color:var(--m);max-height:80px;overflow-y:auto"></div>
  </div>
  <div style="background:var(--p);padding:8px 14px;border-bottom:1px solid var(--h)">
    <h3 style="font:600 9px var(--mono);letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:4px">SAFETY DASHBOARD</h3>
    <div id="safety" style="display:flex;gap:4px;flex-wrap:wrap"></div>
  </div>
</div>
<div style="background:var(--p);padding:8px 16px;border-bottom:1px solid var(--h)">
  <h3 style="font:600 9px var(--mono);letter-spacing:.12em;color:var(--m);text-transform:uppercase;margin-bottom:6px">WHAT-IF SCENARIOS</h3>
  <div style="display:flex;gap:6px;flex-wrap:wrap" id="whatif">
    <button onclick="whatIf('delay',6)">+6mo regulatory hold</button>
    <button onclick="whatIf('delay',3)">+3mo labour strike</button>
    <button onclick="whatIf('accel',-4)">Crash schedule -4mo</button>
    <button onclick="whatIf('budget',0.5)">Budget +$0.5B</button>
    <button onclick="whatIf('crew',500)">Add 500 workers</button>
    <button onclick="whatIf('reset',0)">Reset all</button>
  </div>
</div>
<script>
const SHAPE_IDS={box:0,sphere:1,cyl:2,torus:3,"cyl-x":4,"cyl-z":5},MAX_OBJ=24;
function unhex(h){return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255]}
const $=id=>document.getElementById(id);

const PHASES=[
{n:"Site prep",c:"#78909c",s:0,e:6},{n:"Excavation",c:"#8d6e63",s:3,e:12},{n:"Foundation",c:"#9e9e9e",s:8,e:18},
{n:"RB structure",c:"#607d8b",s:14,e:38},{n:"Containment",c:"#7c3aed",s:20,e:42},{n:"TB build",c:"#a1887f",s:22,e:40},
{n:"Mechanical",c:"#f59e0b",s:34,e:60},{n:"Piping",c:"#6b7280",s:30,e:58},{n:"Electrical",c:"#2563eb",s:40,e:66},
{n:"CW system",c:"#0891b2",s:28,e:52},{n:"I&C",c:"#059669",s:50,e:70},{n:"Commission",c:"#16a34a",s:62,e:84}];

const MILESTONES=[
{m:0,n:"NTP"},{m:10,n:"1st concrete"},{m:18,n:"Basemat"},{m:36,n:"RB topped"},
{m:42,n:"Containment"},{m:48,n:"RPV set"},{m:56,n:"Turbine"},{m:60,n:"Turnover"},
{m:66,n:"Hot func"},{m:72,n:"Fuel load"},{m:78,n:"Criticality"},{m:84,n:"COD"}];

const RISKS=[
{n:"Rebar supply delay",prob:0.3,impact:3,trigger:14,desc:"+3mo to RB walls"},
{n:"Concrete batch plant breakdown",prob:0.2,impact:2,trigger:20,desc:"+2mo civil"},
{n:"Containment weld NDE fail",prob:0.25,impact:4,trigger:34,desc:"+4mo containment"},
{n:"Labour strike",prob:0.15,impact:3,trigger:40,desc:"+3mo all trades"},
{n:"Steam generator delivery late",prob:0.35,impact:5,trigger:38,desc:"+5mo mechanical"},
{n:"Commissioning deficiency flood",prob:0.2,impact:2,trigger:64,desc:"+2mo commissioning"},
{n:"Regulatory hold: design change",prob:0.1,impact:6,trigger:50,desc:"+6mo all"},
{n:"Winter pour heating failure",prob:0.25,impact:1,trigger:16,desc:"+1mo foundation"}];

const LONGLEAD=[
{n:"RPV",order:0,deliver:44,need:48},{n:"Steam gen (x2)",order:2,deliver:38,need:42},
{n:"Turbine rotor",order:6,deliver:48,need:54},{n:"Main transformer",order:10,deliver:50,need:56},
{n:"Containment liner",order:4,deliver:18,need:22},{n:"Coolant pumps (x4)",order:8,deliver:42,need:46},
{n:"Control rod drives",order:12,deliver:52,need:56},{n:"CW pipe (3.5km)",order:6,deliver:28,need:32}];

const DISCIPLINES=[
{n:"Civil",c:"#9e9e9e",s:3,e:44},{n:"Mechanical",c:"#f59e0b",s:30,e:62},{n:"Electrical",c:"#2563eb",s:38,e:68},
{n:"Piping",c:"#6b7280",s:28,e:60},{n:"I&C",c:"#059669",s:48,e:72},{n:"Nuclear",c:"#7c3aed",s:40,e:76}];

// plant configs
const PLANTS={
  pwr:{name:"PWR 600 MWe",mwe:600,v:{"rb-d":42,"rb-h":50,"tb-w":60,"tb-h":30,"cw-d":3.5,"cr-h":65},budget:4.8,dur:84},
  candu:{name:"CANDU 700 MWe",mwe:700,v:{"rb-d":50,"rb-h":35,"tb-w":70,"tb-h":35,"cw-d":4,"cr-h":60},budget:5.6,dur:84},
  smr:{name:"SMR 300 MWe",mwe:300,v:{"rb-d":24,"rb-h":30,"tb-w":30,"tb-h":20,"cw-d":2,"cr-h":45},budget:2.2,dur:60}
};
const R={"rb-d":[20,55],"rb-h":[25,65],"tb-w":[25,80],"tb-h":[18,40],"cw-d":[1.5,5],"cr-h":[35,80]};

let V={},plant='pwr',nightMode=false,weatherOn=false,month=0,playing=false,lastF=performance.now(),spdX=1,camMode='orbit';
let riskHits=new Set(),delayTotal=0,eventLog=[];

const POURS=[
{m:10,n:"Mudmat",vol:120},{m:12,n:"Basemat east",vol:2800},{m:14,n:"Basemat west",vol:2800},
{m:16,n:"RB wall lift 1",vol:400},{m:18,n:"RB wall lift 2",vol:400},{m:20,n:"RB wall lift 3",vol:400},
{m:22,n:"RB wall lift 4",vol:400},{m:24,n:"TB foundation",vol:1600},{m:26,n:"RB wall lift 5",vol:400},
{m:28,n:"CW intake base",vol:300},{m:30,n:"RB wall lift 6",vol:400},{m:32,n:"Aux bldg slab",vol:500},
{m:34,n:"RB ring beam",vol:600},{m:38,n:"Diesel gen pad",vol:200},{m:42,n:"Switchyard pad",vol:150}];

const TRADES=[
{n:"Civil",color:"#9e9e9e",peak:0.35},{n:"Mech",color:"#f59e0b",peak:0.25},
{n:"Elec",color:"#2563eb",peak:0.15},{n:"Pipe",color:"#6b7280",peak:0.15},
{n:"I&C",color:"#059669",peak:0.06},{n:"Nuclear",color:"#7c3aed",peak:0.04}];

let whatIfDelay=0,whatIfBudget=0,whatIfCrew=0;
function whatIf(type,val){
  if(type==='reset'){whatIfDelay=0;whatIfBudget=0;whatIfCrew=0;delayTotal=0;riskHits=new Set();eventLog.push({m:Math.round(month),type:'good',msg:'All scenarios reset'});return;}
  if(type==='delay'){whatIfDelay+=val;delayTotal+=Math.max(0,val);eventLog.push({m:Math.round(month),type:'risk',msg:'SCENARIO: '+(val>0?'+':'')+val+'mo schedule impact'});}
  if(type==='accel'){whatIfDelay+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: Schedule crashed by '+Math.abs(val)+'mo'});}
  if(type==='budget'){whatIfBudget+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: Budget increased by $'+val+'B'});}
  if(type==='crew'){whatIfCrew+=val;eventLog.push({m:Math.round(month),type:'good',msg:'SCENARIO: +'+val+' workers added'});}
}

function setPlant(p){
  plant=p;const cfg=PLANTS[p];V=Object.assign({},cfg.v);
  riskHits=new Set();delayTotal=0;eventLog=[];
  eventLog.push({m:0,type:'mile',msg:'Notice to Proceed issued. '+cfg.name+', $'+cfg.budget+'B budget.'});
  buildDims();
}

function sc(v){return v*0.12;}
function vis(m,s,e){return m<s?0:m>=e?1:Math.min(1,(m-s)/(e-s));}
function eo(t){return 1-Math.pow(1-t,3);}

function buildObjs(m){
  const o=[];
  function add(s,e,obj){const v=vis(m,s,e);if(v<=0)return;obj._v=v;o.push(obj);}
  const D=V;

  // ground + water
  add(0,1,{shape:"box",pos:[0,-.01,0],size:[14,.02,10],color:"#b3aa97"});
  add(0,1,{shape:"box",pos:[sc(-50),sc(-1.5),sc(-20)],size:[sc(35),sc(3),sc(45)],color:weatherOn?"#2d5a7a":"#3f6f8f"});
  // roads
  add(2,8,{shape:"box",pos:[0,.01,sc(-32)],size:[12*eo(vis(m,2,8)),.02,sc(3.5)],color:"#555"});
  add(4,10,{shape:"box",pos:[sc(42),.01,0],size:[sc(3.5),.02,sc(50)*eo(vis(m,4,10))],color:"#555"});
  // laydown area
  add(3,84,{shape:"box",pos:[sc(38),.015,sc(-28)],size:[sc(20)*eo(vis(m,3,10)),.01,sc(16)],color:"#c8c0b0"});

  // excavation
  if(m>=3)add(3,84,{shape:"box",pos:[sc(-10),sc(-3)*eo(vis(m,3,12)),0],size:[sc(D["rb-d"]+12),sc(6)*eo(vis(m,3,12)),sc(D["rb-d"]+12)],color:"#8a7a60",sub:true});
  // basemat
  if(m>=8)add(8,84,{shape:"box",pos:[sc(-10),sc(-.3),0],size:[sc(D["rb-d"]+10),sc(3)*eo(vis(m,8,18)),sc(D["rb-d"]+10)],color:"#b9bec4"});
  // RB walls
  const rbH=sc(D["rb-h"])*eo(vis(m,14,38));
  if(m>=14)add(14,84,{shape:"cyl",pos:[sc(-10),rbH/2+sc(1.5),0],size:[sc(D["rb-d"]),rbH],color:"#90a4ae"});
  // containment liner
  if(m>=22&&rbH>.5)add(22,84,{shape:"cyl",pos:[sc(-10),rbH*.48+sc(1.5),0],size:[sc(D["rb-d"]-4),rbH*.95*eo(vis(m,22,38))],color:"#7c3aed"});
  // dome
  if(m>=36)add(36,42,{shape:"sphere",pos:[sc(-10),rbH+sc(1.5),0],size:[sc(D["rb-d"])*eo(vis(m,36,42))],color:"#9aa7b4",blend:.3});
  // RPV
  if(m>=40)add(40,50,{shape:"cyl",pos:[sc(-10),sc(10),0],size:[sc(8),sc(14)*eo(vis(m,40,50))],color:"#d97706"});
  // SGs
  if(m>=42){
    const sv=eo(vis(m,42,54));
    add(42,84,{shape:"cyl",pos:[sc(-10)+sc(9),sc(10)*sv,sc(5)],size:[sc(3.5),sc(12)*sv],color:"#d97706"});
    add(42,84,{shape:"cyl",pos:[sc(-10)-sc(9),sc(10)*sv,sc(-5)],size:[sc(3.5),sc(12)*sv],color:"#d97706"});
  }
  // pressurizer
  if(m>=44)add(44,54,{shape:"cyl",pos:[sc(-10)+sc(5),sc(14)*eo(vis(m,44,54)),sc(-8)],size:[sc(2.5),sc(8)*eo(vis(m,44,54))],color:"#d97706"});
  // TB
  const tbH=sc(D["tb-h"])*eo(vis(m,22,40));
  if(m>=22)add(22,84,{shape:"box",pos:[sc(25),tbH/2,0],size:[sc(D["tb-w"]),tbH,sc(28)],color:"#c4beb2"});
  // turbine + gen
  if(m>=46){
    add(46,58,{shape:"cyl-z",pos:[sc(25),sc(D["tb-h"]*.4),sc(-3)],size:[sc(7),sc(18)*eo(vis(m,46,58))],color:"#8a9099"});
    add(48,58,{shape:"cyl-z",pos:[sc(25),sc(D["tb-h"]*.4),sc(8)],size:[sc(5),sc(10)*eo(vis(m,48,58))],color:"#6b7280"});
  }
  // CW intake
  if(m>=28)add(28,42,{shape:"box",pos:[sc(-38),sc(2.5)*eo(vis(m,28,42)),sc(-20)],size:[sc(8),sc(6)*eo(vis(m,28,42)),sc(D["cw-d"]*3+2)],color:"#7e8b98"});
  // CW conduit
  if(m>=32)add(32,48,{shape:"cyl-x",pos:[sc(-5),sc(D["cw-d"]/2),sc(-20)],size:[sc(D["cw-d"]),sc(60)*eo(vis(m,32,48))],color:"#5d6671"});
  // outfall
  if(m>=36)add(36,48,{shape:"box",pos:[sc(50),sc(2)*eo(vis(m,36,48)),sc(-20)],size:[sc(5),sc(4)*eo(vis(m,36,48)),sc(D["cw-d"]*2+4)],color:"#7e8b98"});
  // switchyard
  if(m>=44)add(44,60,{shape:"box",pos:[sc(30),.15,sc(24)],size:[sc(22)*eo(vis(m,44,56)),.3,sc(16)],color:"#e8e4de"});
  if(m>=52){
    add(52,60,{shape:"box",pos:[sc(24),sc(3)*eo(vis(m,52,60)),sc(24)],size:[sc(4),sc(5)*eo(vis(m,52,60)),sc(3)],color:"#6b7280"});
    add(52,60,{shape:"box",pos:[sc(36),sc(3)*eo(vis(m,52,60)),sc(24)],size:[sc(4),sc(5)*eo(vis(m,52,60)),sc(3)],color:"#6b7280"});
  }
  // crane
  if(m>=4&&m<64){
    const ch=sc(D["cr-h"]);
    add(4,64,{shape:"box",pos:[sc(5),ch/2,sc(12)],size:[sc(.8),ch,sc(.8)],color:"#dc2626"});

  if(m>=38)add(38,52,{shape:"box",pos:[sc(-30),sc(2.5)*eo(vis(m,38,52)),sc(15)],size:[sc(12),sc(5)*eo(vis(m,38,52)),sc(6)],color:"#a0968a"});

// metrics
function planned(m){const d=PLANTS[plant].dur;return 100*(1-Math.exp(-.06*m))/(1-Math.exp(-.06*d));}
function earned(m){const delay=delayTotal*.5*Math.sin(m*.1);return Math.min(100,planned(Math.max(0,m-delayTotal*.3+delay))*(m<20?.92:m<50?.88:.95));}
function workforce(m){if(m<=0)return 0;const pk=(plant==='smr'?1800:plant==='candu'?3800:3200)+whatIfCrew;return Math.round(pk*Math.min(1,m/18)*(m<16?m/16:m<55?1:Math.max(.05,1-(m-55)/25))*(1+.06*Math.sin(m*.5)));}
function discProg(d,m){return m<d.s?0:m>=d.e?100:Math.round((m-d.s)/(d.e-d.s)*100);}

function kpis(m){
  const B=PLANTS[plant].budget,ev=earned(m),pv=planned(m),spi=pv>0?ev/pv:1;
  let spent=0;for(let i=0;i<=m;i++)spent+=workforce(i)*8500/1e6;
  const cpi=spent>0?(ev/100*B)/spent:1,eac=cpi>0?B/cpi:B;
  const mwe=m>=PLANTS[plant].dur?PLANTS[plant].mwe:m>=PLANTS[plant].dur-6?Math.round(PLANTS[plant].mwe*.5):0;
  return[
    {v:Math.round(m/PLANTS[plant].dur*100)+'%',l:'schedule',c:m>=PLANTS[plant].dur?'ok':''},
    {v:ev.toFixed(0)+'%',l:'EV%',c:ev>=pv?'ok':ev>=pv*.9?'w':'bad'},
    {v:spi.toFixed(2),l:'SPI',c:spi>=.95?'ok':spi>=.85?'w':'bad'},
    {v:cpi.toFixed(2),l:'CPI',c:cpi>=.95?'ok':cpi>=.85?'w':'bad'},
    {v:'$'+spent.toFixed(1)+'B',l:'spent',c:''},
    {v:'$'+eac.toFixed(1)+'B',l:'EAC',c:eac<=B*1.1?'ok':eac<=B*1.2?'w':'bad'},
    {v:workforce(m).toLocaleString(),l:'workers',c:'bl'},
    {v:mwe||'--',l:'MWe',c:mwe?'vi':''},
    {v:delayTotal,l:'delay mo',c:delayTotal>0?'bad':'ok'},
    {v:riskHits.size+'/'+RISKS.length,l:'risks hit',c:riskHits.size>3?'bad':riskHits.size>0?'w':'ok'}
  ];
}

function genReport(m){
  const yr=Math.floor(m/12)+1,mo=Math.round(m%12)+1;
  const phase=PHASES.find(p=>m>=p.s&&m<p.e)||PHASES[PHASES.length-1];
  const wf=workforce(m);
  const ev=earned(m).toFixed(0);
  let r='<b>Monthly Report -- Year '+yr+' Month '+mo+'</b><br>';
  r+='Phase: <b>'+phase.n+'</b> | Workforce: <b>'+wf.toLocaleString()+'</b> | Earned: <b>'+ev+'%</b><br>';
  if(delayTotal>0)r+='Cumulative delays: <b>'+delayTotal+' months</b> from '+riskHits.size+' risk event(s).<br>';
  const active=LONGLEAD.filter(l=>m>=l.order&&m<l.deliver);
  if(active.length)r+='In fabrication: '+active.map(l=>l.n).join(', ')+'.<br>';
  const overdue=LONGLEAD.filter(l=>m>=l.need&&m<l.deliver);
  if(overdue.length)r+='<span style="color:var(--bad)">LATE: '+overdue.map(l=>l.n).join(', ')+'</span><br>';
  return r;
}

// check risk triggers
let lastRiskCheck=0;
function checkRisks(m){
  if(Math.floor(m)===lastRiskCheck)return;
  lastRiskCheck=Math.floor(m);
  RISKS.forEach((r,i)=>{
    if(riskHits.has(i))return;
    if(Math.abs(m-r.trigger)<1&&Math.random()<r.prob){
      riskHits.add(i);delayTotal+=r.impact;
      eventLog.push({m:Math.round(m),type:'risk',msg:'RISK: '+r.n+' -- '+r.desc});
    }
  });
}

// check milestones
let msHit=new Set();
function checkMilestones(m){
  MILESTONES.forEach((ms,i)=>{
    if(msHit.has(i))return;
    if(m>=ms.m){msHit.add(i);eventLog.push({m:ms.m,type:'mile',msg:'MILESTONE: '+ms.n+' achieved'});}
  });
}

// WebGL (same raymarcher)
const VERT=`#version 300 es\nin vec2 aP;\nvoid main(){gl_Position=vec4(aP,0,1);}`;
const FRAG=`#version 300 es
precision highp float;out vec4 F;
uniform vec2 uR;uniform vec3 uC,uL;uniform float uV;uniform int uN;
uniform int uT[24];uniform vec3 uP[24],uS[24],uO[24];uniform float uB[24],uX[24];
uniform vec3 uD,uA,uZ;uniform float uNight;
float sB(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sS(vec3 p,float r){return length(p)-r;}
float sC(vec3 p,float r,float h){vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);return min(max(d.x,d.y),0.)+length(max(d,0.));}
float sT(vec3 p,float R,float r){return length(vec2(length(p.xz)-R,p.y))-r;}
float sm(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
float sO(int i,vec3 p){vec3 q=p-uP[i],s=uS[i]*.5;if(uT[i]==0)return sB(q,s);if(uT[i]==1)return sS(q,s.x);if(uT[i]==2)return sC(q,s.x,s.y);if(uT[i]==4)return sC(q.yxz,s.x,s.y);if(uT[i]==5)return sC(q.xzy,s.x,s.y);return sT(q,s.x,s.y);}
float map(vec3 p){float d=p.y;for(int i=0;i<24;i++){if(i>=uN)break;float di=sO(i,p);if(uX[i]>.5)d=max(d,-di);else if(uB[i]>.001)d=sm(d,di,uB[i]);else d=min(d,di);}return d;}
vec3 mc(vec3 p,float dist){float d=p.y;vec2 q=abs(fract(p.xz*.5)-.5);float mx=max(q.x,q.y),w=.008*(1.+dist*.12),ln=smoothstep(.5-w,.5,mx);
vec3 c=mix(vec3(.80,.81,.83),vec3(.56,.59,.64),ln*.85);
for(int i=0;i<24;i++){if(i>=uN)break;float di=sO(i,p);if(uX[i]>.5)d=max(d,-di);else if(uB[i]>.001){float nd=sm(d,di,uB[i]);if(di<d)c=uO[i];d=nd;}else{if(di<d){d=di;c=uO[i];}}}return c;}
vec3 N(vec3 p){vec2 e=vec2(.002,0);return normalize(vec3(map(p+e.xyy)-map(p-e.xyy),map(p+e.yxy)-map(p-e.yxy),map(p+e.yyx)-map(p-e.yyx)));}
float sh(vec3 o,vec3 d){float r=1.,t=.05;for(int i=0;i<32;i++){float h=map(o+d*t);r=min(r,10.*h/t);t+=clamp(h,.02,.5);if(r<.005||t>30.)break;}return clamp(r,0.,1.);}
float ao(vec3 p,vec3 n){float o=0.,s=1.;for(int i=1;i<=5;i++){float h=.06*float(i);o+=(h-map(p+n*h))*s;s*=.7;}return clamp(1.-2.*o,0.,1.);}
void main(){vec2 uv=(gl_FragCoord.xy*2.-uR)/uR.y;
vec3 fw=normalize(uL-uC),rt=normalize(cross(fw,vec3(0,1,0))),up=cross(rt,fw);
float fl=1./tan(radians(uV)*.5);vec3 rd=normalize(fw*fl+rt*uv.x+up*uv.y),ro=uC;
vec3 sun=normalize(uD);
float ni=uNight;
vec3 sky1=mix(uA,vec3(.05,.06,.12),ni),sky2=mix(uZ,vec3(.02,.03,.06),ni);
vec3 sky=mix(sky2,sky1,clamp(rd.y*.7+.5,0.,1.));
sky+=vec3(1,.9,.7)*pow(max(dot(rd,sun),0.),64.)*.4*(1.-ni*.8);
float t=0.;bool hit=false;for(int i=0;i<128;i++){float h=map(ro+rd*t);if(h<.002*max(t,1.)){hit=true;break;}t+=h;if(t>80.)break;}
vec3 col=sky;if(hit){vec3 p=ro+rd*t,n=N(p),base=mc(p,t);
float dif=max(dot(n,sun),0.)*sh(p+n*.02,sun)*(1.-ni*.6);float amb=(.5+.5*n.y)*(1.-ni*.3);float occ=ao(p,n);
col=base*(vec3(1,.96,.88)*dif*(1.-ni*.5)+mix(sky2,sky1,.5)*amb*.55)*occ;
col+=vec3(pow(max(dot(reflect(rd,n),sun),0.),24.)*.2*dif);
col=mix(col,sky,1.-exp(-.001*t*t));}
col=pow(max(col,vec3(0)),vec3(1./2.2));F=vec4(col,1);}`;

const cv=$('gl'),gl=cv.getContext("webgl2",{antialias:false});
if(!gl)document.body.innerHTML="<p>WebGL2 required</p>";
function cmp(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(sh));return sh;}
const prg=gl.createProgram();gl.attachShader(prg,cmp(gl.VERTEX_SHADER,VERT));gl.attachShader(prg,cmp(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prg);gl.useProgram(prg);
const bf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,bf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prg,"aP");gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
const U={};["uR","uC","uL","uV","uN","uT","uP","uS","uO","uB","uX","uD","uA","uZ","uNight"].forEach(n=>U[n]=gl.getUniformLocation(prg,n));

function getCam(m){
  const t=m/84*Math.PI*2;

  if(camMode==='reactor')return{p:[sc(-10)+4,sc(V["rb-h"]*.4),5],l:[sc(-10),sc(V["rb-h"]*.3),0],f:50};

  objs.forEach((o,i)=>{tp[i]=SHAPE_IDS[o.shape]??0;ps.set(o.pos,i*3);sz.set([o.size[0]??1,o.size[1]??o.size[0]??1,o.size[2]??o.size[0]??1],i*3);cl.set(unhex(o.color||"#999"),i*3);bl[i]=o.blend||0;sb[i]=o.sub?1:0;});
  const cam=getCam(month);
  gl.viewport(0,0,w,h);gl.uniform2f(U.uR,w,h);gl.uniform3fv(U.uC,cam.p);gl.uniform3fv(U.uL,cam.l);gl.uniform1f(U.uV,cam.f);

      (hit?'&#9888; ':'')+(month>r.trigger+2&&!hit?'&#10003; ':'')+r.n+'</div>';}).join('');

  $('ll').innerHTML=LONGLEAD.map(l=>{
    const cls=month>=l.deliver?'del':month>=l.need&&month<l.deliver?'late':month>=l.order?'wait':'';
    return'<div class="li '+cls+'">'+(cls==='del'?'&#10003;':cls==='late'?'&#9888;':cls==='wait'?'&#9881;':'&#8987;')+' '+l.n+
      (cls==='wait'?' (fab)':cls==='del'?' (on site)':cls==='late'?' LATE':'')+'</div>';}).join('');

  // feed (show last 8)
  $('feed').innerHTML=eventLog.slice(-8).reverse().map(e=>
    '<div class="ev '+e.type+'"><span class="t">M'+e.m+'</span><span class="typ">'+e.type+'</span><span>'+e.msg+'</span></div>').join('');

  $('report').innerHTML=genReport(Math.round(month));
  drawCharts();drawCostDisc();drawWfTrade();updatePours();updateSafety();
}

function buildDims(){
  $('dims').innerHTML='';
  for(const k in R){
    const r=R[k],d=document.createElement('div');d.className='dim';
    d.innerHTML='<label>'+k+'</label><input type="range" min="'+r[0]+'" max="'+r[1]+'" step="'+((r[1]-r[0])/100)+'" value="'+(V[k]||r[0])+'" data-k="'+k+'"><span class="dv" data-dv="'+k+'">'+(V[k]||r[0])+'</span>';
    $('dims').appendChild(d);
  }
  $('dims').addEventListener('input',e=>{if(!e.target.dataset.k)return;V[e.target.dataset.k]=+e.target.value;document.querySelector('[data-dv="'+e.target.dataset.k+'"]').textContent=(+e.target.value).toFixed(+e.target.value>=10?0:1);});
}

function loop(now){
  const dt=(now-lastF)/1000;lastF=now;
  if(playing){
    const dur=PLANTS[plant].dur;
    month=Math.min(dur,month+dt*spdX*3);
    $('mo').value=month;
    if(month>=dur){playing=false;$('play').textContent='Play';eventLog.push({m:dur,type:'good',msg:'COMMERCIAL OPERATION DATE achieved!'});}
    checkRisks(month);checkMilestones(month);
    // random events
    if(Math.random()<.002&&month>10&&month<70){
      const msgs=["Concrete test cylinders pass 28-day","Survey crew completes as-built","QC inspection: no NCRs","Safety milestone: 500k hours LTI-free","Environmental audit: compliant","Night shift pour completed successfully","Crane maintenance window completed","Batch plant calibration verified"];
      eventLog.push({m:Math.round(month),type:'good',msg:msgs[Math.floor(Math.random()*msgs.length)]});
    }
  }
  render3D();updateUI();
  requestAnimationFrame(loop);
}

// wiring
$('mo').oninput=e=>{month=+e.target.value;playing=false;$('play').textContent='Play';};
$('play').onclick=()=>{if(playing){playing=false;$('play').textContent='Play';}else{if(month>=PLANTS[plant].dur)month=0;playing=true;$('play').textContent='Pause';}};
$('spd').onclick=function(){spdX=spdX===1?3:spdX===3?8:1;this.textContent=spdX+'x';};
$('cam').onchange=e=>{camMode=e.target.value;};
$('night').onclick=function(){nightMode=!nightMode;this.classList.toggle('on');};
$('weather').onclick=function(){weatherOn=!weatherOn;this.classList.toggle('on');if(weatherOn)eventLog.push({m:Math.round(month),type:'risk',msg:'Weather event: heavy rain, outdoor work slowed'});};
$('plant').onchange=e=>{month=0;playing=false;$('play').textContent='Play';msHit=new Set();lastRiskCheck=0;setPlant(e.target.value);};
$('pb').onclick=e=>{const ph=e.target.closest('.ps');if(!ph)return;month=PHASES[+ph.dataset.ph].s;playing=false;$('play').textContent='Play';};
document.onkeydown=e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();$('play').click();}};

setPlant('pwr');requestAnimationFrame(loop);
</script>
</body>
</html>
