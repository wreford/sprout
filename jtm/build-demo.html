<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JTM -- build sequence / nuclear power plant</title>
<style>
:root{--bench:#ECEDEE;--panel:#fff;--ink:#20242A;--muted:#6A7178;--hair:#D5D8DB;--ok:#3E9B6B;--warn:#D9952F;--bad:#C85A4F;--blue:#3E78C9;--violet:#7c5cbf;--mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,Menlo,monospace;--sans:Inter,"Segoe UI",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bench);color:var(--ink);font-family:var(--sans);font-size:14px;touch-action:manipulation}
.sticky{position:sticky;top:0;z-index:20;background:var(--bench);border-bottom:1px solid var(--hair)}
header{padding:8px 20px 4px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
header h1{font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:.06em}
header h1 .dim{color:var(--muted);font-weight:400;font-size:14px}
.tl{padding:6px 20px 10px;background:var(--panel);border-bottom:1px solid var(--hair)}
.tl-row{display:flex;align-items:center;gap:8px}
.tl-row input[type=range]{flex:1;accent-color:var(--ink)}
button{font:600 11px var(--sans);padding:5px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--hair);background:var(--panel);color:var(--ink)}
button:hover{border-color:var(--ink)}
button.on{background:var(--ink);color:var(--panel);border-color:var(--ink)}
select{font:11px var(--mono);padding:3px 6px;border:1px solid var(--hair);border-radius:4px;background:var(--panel);color:var(--ink)}
.tl-info{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;gap:12px;margin-top:4px;flex-wrap:wrap}
.tl-info b{color:var(--ink)}
.phases{display:flex;gap:1px;margin-top:5px;height:16px}
.ph{flex:1;border-radius:2px;font-family:var(--mono);font-size:7px;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:opacity .12s;overflow:hidden;white-space:nowrap}
.ph.past{opacity:1}.ph.now{opacity:1;outline:2px solid var(--ink);outline-offset:-1px}.ph.future{opacity:.25}
#gl{width:100%;aspect-ratio:16/10;display:block;background:#1a1d22}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--hair);border-bottom:1px solid var(--hair)}
@media(max-width:700px){.panels{grid-template-columns:1fr}.sticky #gl{max-height:28vh;aspect-ratio:auto}}
.chart-pane{background:var(--panel);padding:10px 14px}
.chart-pane h3{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.chart-pane canvas{width:100%;height:100px;display:block;border:1px solid var(--hair);border-radius:4px;background:#fafbfc}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;padding:10px 20px}
.kpi{background:var(--panel);border:1px solid var(--hair);border-radius:6px;padding:7px 8px;text-align:center}
.kpi .v{font-family:var(--mono);font-size:16px;font-weight:800}
.kpi .l{font-family:var(--mono);font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.kpi.ok .v{color:var(--ok)}.kpi.warn .v{color:var(--warn)}.kpi.bad .v{color:var(--bad)}.kpi.blue .v{color:var(--blue)}.kpi.violet .v{color:var(--violet)}
.dims{padding:8px 20px;background:var(--panel);display:flex;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--hair)}
.dim{display:flex;align-items:center;gap:5px;font-size:11px}
.dim label{font-family:var(--mono);color:var(--muted)}
.dim input[type=range]{width:60px;accent-color:var(--blue)}
.dim .dv{font-family:var(--mono);font-weight:600;min-width:28px;text-align:right;font-size:11px}
.milestone{background:var(--panel);padding:8px 20px;border-bottom:1px solid var(--hair)}
.ms-list{display:flex;gap:6px;flex-wrap:wrap}
.ms{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--hair);display:flex;align-items:center;gap:4px}
.ms.done{border-color:var(--ok);color:var(--ok);background:rgba(62,155,107,.06)}
.ms.active{border-color:var(--warn);color:var(--warn);background:rgba(217,149,47,.06)}
.ms.future{color:var(--muted)}
.ms-dot{width:6px;height:6px;border-radius:50%}
.legend{padding:6px 20px;font-family:var(--mono);font-size:9px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:3px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
</style>
</head>
<body>
<div class="sticky">
<header><h1>JTM<span class="dim"> / build sequence -- 600 MWe nuclear</span></h1></header>
<div class="tl">
  <div class="tl-row">
    <button id="play">Play</button>
    <button id="speed" data-s="1">1x</button>
    <select id="cam"><option value="orbit">Orbit</option><option value="aerial">Aerial</option><option value="reactor">Reactor close</option><option value="turbine">Turbine hall</option><option value="intake">CW intake</option></select>
    <input type="range" id="month" min="0" max="84" value="0" step="0.1">
    <span style="font:600 11px var(--mono);min-width:90px" id="mlab">Month 0 / 84</span>
  </div>
  <div class="tl-info" id="info"></div>
  <div class="phases" id="phases"></div>
</div>
<canvas id="gl"></canvas>
</div>
<div class="panels">
  <div class="chart-pane"><h3>S-CURVE (PLANNED vs EARNED)</h3><canvas id="scurve"></canvas></div>
  <div class="chart-pane"><h3>WORKFORCE / MONTH</h3><canvas id="workforce"></canvas></div>
</div>
<div class="kpis" id="kpis"></div>
<div class="milestone"><div class="ms-list" id="milestones"></div></div>
<div class="dims" id="dims"></div>
<div class="legend">
  <span><i style="background:#b9bec4"></i>concrete</span><span><i style="background:#8a9099"></i>steel</span>
  <span><i style="background:#c85a4f"></i>crane</span><span><i style="background:#d9952f"></i>equipment</span>
  <span><i style="background:#3f6f8f"></i>water</span><span><i style="background:#3E78C9"></i>electrical</span>
  <span><i style="background:#9aa7b4"></i>reactor</span><span><i style="background:#c4beb2"></i>civil</span>
  <span><i style="background:#7c5cbf"></i>nuclear</span>
</div>
<script>
const SHAPE_IDS={box:0,sphere:1,cyl:2,torus:3,"cyl-x":4,"cyl-z":5},MAX_OBJ=24;
function unhex(h){return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255]}

const PHASES=[
  {n:"Site prep",c:"#78909c",s:0,e:6},
  {n:"Excavation",c:"#8d6e63",s:3,e:12},
  {n:"Foundation",c:"#b9bec4",s:8,e:18},
  {n:"RB structure",c:"#90a4ae",s:14,e:38},
  {n:"Containment",c:"#7c5cbf",s:20,e:42},
  {n:"TB structure",c:"#c4beb2",s:22,e:40},
  {n:"Mechanical",c:"#d9952f",s:34,e:60},
  {n:"Piping",c:"#5d6671",s:30,e:58},
  {n:"Electrical",c:"#3E78C9",s:40,e:66},
  {n:"CW system",c:"#3f6f8f",s:28,e:52},
  {n:"Instrumentation",c:"#26a69a",s:50,e:70},
  {n:"Commissioning",c:"#3E9B6B",s:62,e:84}
];

const MILESTONES=[
  {m:0,n:"NTP"},
  {m:10,n:"First concrete"},
  {m:18,n:"Basemat complete"},
  {m:36,n:"RB walls topped"},
  {m:42,n:"Containment closed"},
  {m:48,n:"Reactor set"},
  {m:56,n:"Turbine set"},
  {m:60,n:"Systems turnover"},
  {m:66,n:"Hot functional"},
  {m:72,n:"Fuel load"},
  {m:78,n:"First criticality"},
  {m:84,n:"Commercial operation"}
];

const V={"rb-d":42,"rb-h":50,"tb-w":60,"tb-h":30,"cw-d":3.5,"crane-h":65,"site":120};
const R={"rb-d":[30,55],"rb-h":[35,65],"tb-w":[40,80],"tb-h":[20,40],"cw-d":[2,5],"crane-h":[50,80],"site":[80,160]};

function sc(v){return v*0.12;}
function vis(m,s,e){return m<s?0:m>=e?1:Math.min(1,(m-s)/(e-s));}
function easeOut(t){return 1-Math.pow(1-t,3);}

function buildObjs(m){
  const o=[];
  function add(s,e,obj){const v=vis(m,s,e);if(v<=0)return;obj._v=v;o.push(obj);}

  // ground + water
  add(0,1,{shape:"box",pos:[0,-0.01,0],size:[sc(V.site),0.02,sc(V.site*0.7)],color:"#b3aa97"});
  add(0,1,{shape:"box",pos:[sc(-50),sc(-1.5),sc(-20)],size:[sc(35),sc(3),sc(45)],color:"#3f6f8f"});

  // site roads
  add(2,8,{shape:"box",pos:[0,0.01,sc(-32)],size:[sc(V.site*0.8)*easeOut(vis(m,2,8)),0.02,sc(4)],color:"#6b6b6b"});
  add(4,10,{shape:"box",pos:[sc(40),0.01,0],size:[sc(4),0.02,sc(50)*easeOut(vis(m,4,10))],color:"#6b6b6b"});

  // excavation
  const pitD=easeOut(vis(m,3,12));
  if(m>=3)add(3,84,{shape:"box",pos:[sc(-10),sc(-3)*pitD,0],size:[sc(V["rb-d"]+12),sc(6)*pitD,sc(V["rb-d"]+12)],color:"#8a7a60",sub:true});

  // basemat
  const bv=easeOut(vis(m,8,18));
  if(m>=8)add(8,84,{shape:"box",pos:[sc(-10),sc(-0.3),0],size:[sc(V["rb-d"]+10),sc(3)*bv,sc(V["rb-d"]+10)],color:"#b9bec4"});

  // RB walls
  const rbH=sc(V["rb-h"])*easeOut(vis(m,14,38));
  if(m>=14)add(14,84,{shape:"cyl",pos:[sc(-10),rbH/2+sc(1.5),0],size:[sc(V["rb-d"]),rbH],color:"#90a4ae"});

  // containment liner (inner cylinder, slightly smaller)
  if(m>=22&&rbH>0.5)add(22,84,{shape:"cyl",pos:[sc(-10),rbH*0.48+sc(1.5),0],size:[sc(V["rb-d"]-4),rbH*0.95*easeOut(vis(m,22,38))],color:"#7c5cbf"});

  // dome
  if(m>=36)add(36,42,{shape:"sphere",pos:[sc(-10),rbH+sc(1.5),0],size:[sc(V["rb-d"])*easeOut(vis(m,36,42))],color:"#9aa7b4",blend:0.3});

  // reactor vessel
  if(m>=40)add(40,50,{shape:"cyl",pos:[sc(-10),sc(10),0],size:[sc(8),sc(14)*easeOut(vis(m,40,50))],color:"#d9952f"});

  // steam generators
  if(m>=42){
    const sgv=easeOut(vis(m,42,54));
    add(42,84,{shape:"cyl",pos:[sc(-10)+sc(9),sc(10)*sgv,sc(5)],size:[sc(3.5),sc(12)*sgv],color:"#d9952f"});
    add(42,84,{shape:"cyl",pos:[sc(-10)-sc(9),sc(10)*sgv,sc(-5)],size:[sc(3.5),sc(12)*sgv],color:"#d9952f"});
  }

  // pressurizer
  if(m>=44)add(44,54,{shape:"cyl",pos:[sc(-10)+sc(5),sc(14)*easeOut(vis(m,44,54)),sc(-8)],size:[sc(2.5),sc(8)*easeOut(vis(m,44,54))],color:"#d9952f"});

  // turbine building
  const tbH=sc(V["tb-h"])*easeOut(vis(m,22,40));
  if(m>=22)add(22,84,{shape:"box",pos:[sc(25),tbH/2,0],size:[sc(V["tb-w"]),tbH,sc(28)],color:"#c4beb2"});

  // turbine + generator
  if(m>=46){
    add(46,58,{shape:"cyl-z",pos:[sc(25),sc(V["tb-h"]*0.4),sc(-3)],size:[sc(7),sc(18)*easeOut(vis(m,46,58))],color:"#8a9099"});
    add(48,58,{shape:"cyl-z",pos:[sc(25),sc(V["tb-h"]*0.4),sc(8)],size:[sc(5),sc(10)*easeOut(vis(m,48,58))],color:"#6b7280"});
  }

  // CW intake structure
  if(m>=28)add(28,42,{shape:"box",pos:[sc(-38),sc(2.5)*easeOut(vis(m,28,42)),sc(-20)],size:[sc(8),sc(6)*easeOut(vis(m,28,42)),sc(V["cw-d"]*3+2)],color:"#7e8b98"});

  // CW conduit
  if(m>=32)add(32,48,{shape:"cyl-x",pos:[sc(-5),sc(V["cw-d"]/2),sc(-20)],size:[sc(V["cw-d"]),sc(60)*easeOut(vis(m,32,48))],color:"#5d6671"});

  // outfall
  if(m>=36)add(36,48,{shape:"box",pos:[sc(50),sc(2)*easeOut(vis(m,36,48)),sc(-20)],size:[sc(5),sc(4)*easeOut(vis(m,36,48)),sc(V["cw-d"]*2+4)],color:"#7e8b98"});

  // switchyard
  if(m>=44)add(44,60,{shape:"box",pos:[sc(30),sc(0.15),sc(24)],size:[sc(22)*easeOut(vis(m,44,56)),0.3,sc(16)],color:"#e8e4de"});
  if(m>=52){
    add(52,60,{shape:"box",pos:[sc(24),sc(3)*easeOut(vis(m,52,60)),sc(24)],size:[sc(4),sc(5)*easeOut(vis(m,52,60)),sc(3)],color:"#6b7280"});
    add(52,60,{shape:"box",pos:[sc(36),sc(3)*easeOut(vis(m,52,60)),sc(24)],size:[sc(4),sc(5)*easeOut(vis(m,52,60)),sc(3)],color:"#6b7280"});
  }

  // tower crane (present during heavy construction)
  if(m>=4&&m<64){
    const ch=sc(V["crane-h"]);
    add(4,64,{shape:"box",pos:[sc(5),ch/2,sc(12)],size:[sc(0.8),ch,sc(0.8)],color:"#c85a4f"});
    add(4,64,{shape:"box",pos:[sc(-12),ch-sc(0.3),sc(12)],size:[sc(36),sc(0.5),sc(0.5)],color:"#c85a4f"});
  }

  // auxiliary building
  if(m>=26)add(26,44,{shape:"box",pos:[sc(8),sc(4)*easeOut(vis(m,26,44)),sc(14)],size:[sc(14),sc(8)*easeOut(vis(m,26,44)),sc(10)],color:"#b8b3a8"});

  // diesel generator building
  if(m>=38)add(38,52,{shape:"box",pos:[sc(-30),sc(2.5)*easeOut(vis(m,38,52)),sc(15)],size:[sc(12),sc(5)*easeOut(vis(m,38,52)),sc(6)],color:"#a0968a"});

  // admin/control building
  if(m>=16)add(16,30,{shape:"box",pos:[sc(42),sc(3)*easeOut(vis(m,16,30)),sc(14)],size:[sc(10),sc(6)*easeOut(vis(m,16,30)),sc(8)],color:"#cfc9be"});

  return o.slice(0,MAX_OBJ);
}

// S-curve: cumulative planned value
function planned(m){return 100*(1-Math.exp(-0.06*m))/(1-Math.exp(-0.06*84));}
function earned(m){
  const delay=Math.sin(m*0.15)*2;
  const eff=m<20?0.92:m<50?0.88:0.95;
  return Math.min(100,planned(m+delay)*eff);
}
function workforce(m){
  if(m<=0)return 0;
  const ramp=Math.min(1,m/18);
  const peak=3200;
  const plateau=m<16?ramp:m<55?1:Math.max(0.05,1-(m-55)/25);
  const wave=1+0.08*Math.sin(m*0.5);
  return Math.round(peak*ramp*plateau*wave*(0.85+0.15*Math.random()));
}
function monthlyCost(m){return workforce(m)*8500/1e6;}

function computeKPIs(m){
  const pct=Math.min(100,Math.round(m/84*100));
  const ev=earned(m);
  const pv=planned(m);
  const spi=pv>0?(ev/pv):1;
  const budget=4.8;
  const spent=(function(){let s=0;for(let i=0;i<=m;i++)s+=monthlyCost(i);return s;})();
  const cpi=spent>0?(ev/100*budget)/spent:1;
  const eac=cpi>0?budget/cpi:budget;
  const conc=Math.PI*(V["rb-d"]/2)**2*V["rb-h"]*0.08+V["tb-w"]*V["tb-h"]*28*0.04;
  const steel=conc*0.12;
  const wf=workforce(m);
  const mwe=m>=84?600:m>=78?300:m>=72?50:0;
  return[
    {v:pct+'%',l:'schedule',c:pct>=100?'ok':''},
    {v:ev.toFixed(0)+'%',l:'earned value',c:ev>=pv?'ok':ev>=pv*0.9?'warn':'bad'},
    {v:spi.toFixed(2),l:'SPI',c:spi>=0.95?'ok':spi>=0.85?'warn':'bad'},
    {v:cpi.toFixed(2),l:'CPI',c:cpi>=0.95?'ok':cpi>=0.85?'warn':'bad'},
    {v:'$'+spent.toFixed(1)+'B',l:'spent',c:''},
    {v:'$'+eac.toFixed(1)+'B',l:'EAC',c:eac<=budget*1.1?'ok':eac<=budget*1.2?'warn':'bad'},
    {v:wf.toLocaleString(),l:'workforce',c:'blue'},
    {v:mwe,l:'MWe',c:mwe>0?'violet':''},
    {v:Math.round(conc/1000)+'k',l:'concrete m3',c:''},
    {v:Math.round(steel/1000)+'k',l:'steel t',c:''}
  ];
}

// WebGL raymarcher (same as constraints)
const VERT=`#version 300 es\nin vec2 aPos;\nvoid main(){gl_Position=vec4(aPos,0,1);}`;
const FRAG=`#version 300 es
precision highp float;out vec4 frag;
uniform vec2 uRes;uniform vec3 uCamPos,uCamLook;uniform float uFov;uniform int uCount;
uniform int uType[24];uniform vec3 uPos[24],uSize[24],uColor[24];uniform float uBlend[24],uSub[24];
uniform vec3 uSun,uSky1,uSky2;
float sdBox(vec3 p,vec3 b){vec3 q=abs(p)-b;return length(max(q,0.))+min(max(q.x,max(q.y,q.z)),0.);}
float sdSphere(vec3 p,float r){return length(p)-r;}
float sdCyl(vec3 p,float r,float h){vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);return min(max(d.x,d.y),0.)+length(max(d,0.));}
float sdTorus(vec3 p,float R,float r){vec2 q=vec2(length(p.xz)-R,p.y);return length(q)-r;}
float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
float sdObj(int i,vec3 p){vec3 q=p-uPos[i],s=uSize[i]*.5;if(uType[i]==0)return sdBox(q,s);if(uType[i]==1)return sdSphere(q,s.x);if(uType[i]==2)return sdCyl(q,s.x,s.y);if(uType[i]==4)return sdCyl(q.yxz,s.x,s.y);if(uType[i]==5)return sdCyl(q.xzy,s.x,s.y);return sdTorus(q,s.x,s.y);}
float mapD(vec3 p){float d=p.y;for(int i=0;i<24;i++){if(i>=uCount)break;float di=sdObj(i,p);if(uSub[i]>.5)d=max(d,-di);else if(uBlend[i]>.001)d=smin(d,di,uBlend[i]);else d=min(d,di);}return d;}
vec3 mapC(vec3 p,float dist){float d=p.y;vec2 q2=abs(fract(p.xz*.5)-.5);float mx=max(q2.x,q2.y),w=.008*(1.+dist*.12),line=smoothstep(.5-w,.5,mx);
vec3 col=mix(vec3(.80,.81,.83),vec3(.56,.59,.64),line*.85);
for(int i=0;i<24;i++){if(i>=uCount)break;float di=sdObj(i,p);if(uSub[i]>.5)d=max(d,-di);else if(uBlend[i]>.001){float nd=smin(d,di,uBlend[i]);if(di<d)col=uColor[i];d=nd;}else{if(di<d){d=di;col=uColor[i];}}}return col;}
vec3 N(vec3 p){vec2 e=vec2(.002,0);return normalize(vec3(mapD(p+e.xyy)-mapD(p-e.xyy),mapD(p+e.yxy)-mapD(p-e.yxy),mapD(p+e.yyx)-mapD(p-e.yyx)));}
float sh(vec3 ro,vec3 rd){float r=1.,t=.05;for(int i=0;i<32;i++){float h=mapD(ro+rd*t);r=min(r,10.*h/t);t+=clamp(h,.02,.5);if(r<.005||t>30.)break;}return clamp(r,0.,1.);}
float ao(vec3 p,vec3 n){float o=0.,s=1.;for(int i=1;i<=5;i++){float h=.06*float(i);o+=(h-mapD(p+n*h))*s;s*=.7;}return clamp(1.-2.*o,0.,1.);}
void main(){vec2 uv=(gl_FragCoord.xy*2.-uRes)/uRes.y;
vec3 fwd=normalize(uCamLook-uCamPos),rgt=normalize(cross(fwd,vec3(0,1,0))),up=cross(rgt,fwd);
float fl=1./tan(radians(uFov)*.5);vec3 rd=normalize(fwd*fl+rgt*uv.x+up*uv.y),ro=uCamPos;
vec3 sun=normalize(vec3(.5,1.,.3)),sky=mix(vec3(.58,.63,.72),vec3(.80,.84,.90),clamp(rd.y*.7+.5,0.,1.));
sky+=vec3(1,.9,.7)*pow(max(dot(rd,sun),0.),64.)*.4;
float t=0.;bool hit=false;for(int i=0;i<128;i++){float h=mapD(ro+rd*t);if(h<.002*max(t,1.)){hit=true;break;}t+=h;if(t>80.)break;}
vec3 col=sky;if(hit){vec3 p=ro+rd*t,n=N(p),base=mapC(p,t);
float dif=max(dot(n,sun),0.)*sh(p+n*.02,sun),amb=.5+.5*n.y,occ=ao(p,n);
col=base*(vec3(1,.96,.88)*dif*1.1+vec3(.55,.58,.65)*amb*.55)*occ;
col+=vec3(pow(max(dot(reflect(rd,n),sun),0.),24.)*.2*dif);
col=mix(col,sky,1.-exp(-.001*t*t));}
col=pow(max(col,vec3(0)),vec3(1./2.2));frag=vec4(col,1);}`;

const cv=document.getElementById("gl"),gl=cv.getContext("webgl2",{antialias:false});
if(!gl)document.body.innerHTML="<p style='padding:40px'>WebGL2 required.</p>";
function comp(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))throw new Error(gl.getShaderInfoLog(sh));return sh;}
const prg=gl.createProgram();gl.attachShader(prg,comp(gl.VERTEX_SHADER,VERT));gl.attachShader(prg,comp(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(prg);gl.useProgram(prg);
const bf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,bf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prg,"aPos");gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
const U={};["uRes","uCamPos","uCamLook","uFov","uCount","uType","uPos","uSize","uColor","uBlend","uSub","uSun","uSky1","uSky2"].forEach(n=>U[n]=gl.getUniformLocation(prg,n));

const $=id=>document.getElementById(id);
let month=0,playing=false,lastF=performance.now(),speedX=1,camMode='orbit';
const scC=$('scurve').getContext('2d'),wfC=$('workforce').getContext('2d');

function getCam(m){
  const t=m/84*Math.PI*2;
  if(camMode==='aerial')return{pos:[0,16,0.01],look:[0,0,0],fov:55};
  if(camMode==='reactor')return{pos:[sc(-10)+4,sc(V["rb-h"]*0.4),5],look:[sc(-10),sc(V["rb-h"]*0.3),0],fov:50};
  if(camMode==='turbine')return{pos:[sc(25)+6,4,8],look:[sc(25),sc(V["tb-h"]*0.3),0],fov:52};
  if(camMode==='intake')return{pos:[sc(-38),4,sc(-20)+8],look:[sc(-20),1,sc(-20)],fov:50};
  return{pos:[Math.cos(t*0.25)*14,8,Math.sin(t*0.25)*14],look:[0,2.5,0],fov:48};
}

function render3D(){
  const dpr=Math.min(devicePixelRatio||1,1.5);
  const w=Math.min(1100,Math.round(cv.clientWidth*dpr)),h=Math.round(w*10/16);
  if(cv.width!==w){cv.width=w;cv.height=h;}
  const objs=buildObjs(month);
  const type=new Int32Array(MAX_OBJ),pos=new Float32Array(MAX_OBJ*3),size=new Float32Array(MAX_OBJ*3),color=new Float32Array(MAX_OBJ*3),blend=new Float32Array(MAX_OBJ),sub=new Float32Array(MAX_OBJ);
  objs.forEach((o,i)=>{type[i]=SHAPE_IDS[o.shape]??0;pos.set(o.pos,i*3);size.set([o.size[0]??1,o.size[1]??o.size[0]??1,o.size[2]??o.size[0]??1],i*3);color.set(unhex(o.color||"#999"),i*3);blend[i]=o.blend||0;sub[i]=o.sub?1:0;});
  const cam=getCam(month);
  gl.viewport(0,0,w,h);gl.uniform2f(U.uRes,w,h);gl.uniform3fv(U.uCamPos,cam.pos);gl.uniform3fv(U.uCamLook,cam.look);gl.uniform1f(U.uFov,cam.fov);
  gl.uniform1i(U.uCount,objs.length);gl.uniform1iv(U.uType,type);gl.uniform3fv(U.uPos,pos);gl.uniform3fv(U.uSize,size);gl.uniform3fv(U.uColor,color);gl.uniform1fv(U.uBlend,blend);gl.uniform1fv(U.uSub,sub);
  gl.uniform3f(U.uSun,-.5,-1,-.3);gl.uniform3fv(U.uSky1,[.80,.84,.90]);gl.uniform3fv(U.uSky2,[.58,.63,.72]);
  gl.drawArrays(gl.TRIANGLES,0,3);
}

function drawScurve(){
  const c=scC,w=c.canvas.width=c.canvas.clientWidth*2,h=c.canvas.height=c.canvas.clientHeight*2;
  c.fillStyle='#fafbfc';c.fillRect(0,0,w,h);
  // grid
  c.strokeStyle='#e8e8e8';c.lineWidth=1;
  for(let i=0;i<=4;i++){const y=h*0.1+h*0.8*(1-i/4);c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  // planned
  c.strokeStyle='#D5D8DB';c.lineWidth=3;c.beginPath();
  for(let m=0;m<=84;m++){const x=m/84*w,y=h*0.1+h*0.8*(1-planned(m)/100);m?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  // earned
  c.strokeStyle='#3E78C9';c.lineWidth=3;c.beginPath();
  for(let m=0;m<=Math.min(month,84);m++){const x=m/84*w,y=h*0.1+h*0.8*(1-earned(m)/100);m?c.lineTo(x,y):c.moveTo(x,y);}c.stroke();
  // now marker
  const nx=month/84*w;c.strokeStyle='#D9952F';c.lineWidth=2;c.setLineDash([4,4]);c.beginPath();c.moveTo(nx,0);c.lineTo(nx,h);c.stroke();c.setLineDash([]);
  // labels
  c.fillStyle='#6A7178';c.font='bold '+(h*0.12)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
  c.fillText('Planned',8,h*0.12);c.fillStyle='#3E78C9';c.fillText('Earned',8+w*0.2,h*0.12);
}

function drawWorkforce(){
  const c=wfC,w=c.canvas.width=c.canvas.clientWidth*2,h=c.canvas.height=c.canvas.clientHeight*2;
  c.fillStyle='#fafbfc';c.fillRect(0,0,w,h);
  const maxW=3600;
  // bars
  for(let m=0;m<=84;m++){
    const wf=workforce(m);
    const bw=w/85,bh=wf/maxW*h*0.85;
    c.fillStyle=m<=month?'#3E78C966':'#D5D8DB44';
    c.fillRect(m*bw,h-bh,bw-1,bh);
  }
  // now marker
  const nx=month/84*w;c.strokeStyle='#D9952F';c.lineWidth=2;c.setLineDash([4,4]);c.beginPath();c.moveTo(nx,0);c.lineTo(nx,h);c.stroke();c.setLineDash([]);
  c.fillStyle='#6A7178';c.font='bold '+(h*0.12)+'px '+getComputedStyle(document.body).getPropertyValue('--mono');
  c.fillText(workforce(Math.round(month)).toLocaleString()+' workers',8,h*0.14);
}

function updateUI(){
  $('mlab').textContent='Month '+Math.round(month)+' / 84';
  $('month').value=month;
  const phase=PHASES.find(p=>month>=p.s&&month<p.e)||PHASES[PHASES.length-1];
  const yr=Math.floor(month/12),mo=Math.round(month%12);
  $('info').innerHTML='<span><b>'+phase.n+'</b></span><span>Year '+(yr+1)+', Month '+(mo+1)+'</span><span>'+Math.round(month/84*100)+'% schedule</span>';

  // phases
  $('phases').innerHTML=PHASES.map((p,i)=>{
    const cls=month>=p.e?'past':month>=p.s?'now':'future';
    return'<div class="ph '+cls+'" style="background:'+p.c+'" data-ph="'+i+'">'+p.n.split(' ')[0]+'</div>';
  }).join('');

  // KPIs
  const kpis=computeKPIs(Math.round(month));
  $('kpis').innerHTML=kpis.map(k=>'<div class="kpi'+(k.c?' '+k.c:'')+'"><div class="v">'+k.v+'</div><div class="l">'+k.l+'</div></div>').join('');

  // milestones
  $('milestones').innerHTML=MILESTONES.map(ms=>{
    const cls=month>=ms.m+2?'done':month>=ms.m-2?'active':'future';
    const dotC=cls==='done'?'background:var(--ok)':cls==='active'?'background:var(--warn)':'background:var(--hair)';
    return'<div class="ms '+cls+'"><span class="ms-dot" style="'+dotC+'"></span>M'+ms.m+' '+ms.n+'</div>';
  }).join('');

  drawScurve();drawWorkforce();
}

function buildDims(){
  $('dims').innerHTML='';
  for(const k in R){
    const r=R[k];
    const d=document.createElement('div');d.className='dim';
    d.innerHTML='<label>'+k+'</label><input type="range" min="'+r[0]+'" max="'+r[1]+'" step="'+((r[1]-r[0])/100)+'" value="'+V[k]+'" data-k="'+k+'"><span class="dv" data-dv="'+k+'">'+V[k]+'</span>';
    $('dims').appendChild(d);
  }
  $('dims').addEventListener('input',e=>{
    if(!e.target.dataset.k)return;
    V[e.target.dataset.k]=+e.target.value;
    document.querySelector('[data-dv="'+e.target.dataset.k+'"]').textContent=(+e.target.value).toFixed(+e.target.value>=10?0:1);
  });
}

function loop(now){
  const dt=(now-lastF)/1000;lastF=now;
  if(playing){month=Math.min(84,month+dt*speedX*3);if(month>=84){playing=false;$('play').textContent='Play';}}
  render3D();updateUI();
  requestAnimationFrame(loop);
}

$('month').addEventListener('input',e=>{month=+e.target.value;playing=false;$('play').textContent='Play';});
$('play').addEventListener('click',()=>{if(playing){playing=false;$('play').textContent='Play';}else{if(month>=84)month=0;playing=true;$('play').textContent='Pause';}});
$('speed').addEventListener('click',function(){speedX=speedX===1?3:speedX===3?6:1;this.textContent=speedX+'x';this.dataset.s=speedX;});
$('cam').addEventListener('change',e=>{camMode=e.target.value;});
$('phases').addEventListener('click',e=>{const ph=e.target.closest('.ph');if(!ph)return;const p=PHASES[+ph.dataset.ph];month=p.s;playing=false;$('play').textContent='Play';});
document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();$('play').click();}});

buildDims();requestAnimationFrame(loop);
</script>
</body>
</html>
