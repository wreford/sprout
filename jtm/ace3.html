<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE — Atomic Constraint Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ── ACE — Clean White/Grey/Brown ──────────────────────── */
    :root {
      --paper:  #f5f3ee;
      --ink:    #1a1a1a;
      --oxide:  #a8401f;
      --green:  #2f7d4f;
      --red:    #b13d2c;
      --blue:   #2c5d78;
      --amber:  #b8860b;
      --violet: #6b4c9a;
      --faint:  #8a8578;
      --card:   #ffffff;
      --border: #e0dcd4;
      --term-bg: #1a1a18;
      --term-fg: #4ade80;
      --mono: 'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body { height: 100%; overflow: hidden; background: var(--paper); color: var(--ink); font-family: 'Newsreader', serif; font-size: 14px; -webkit-font-smoothing: antialiased; }

    :focus-visible { outline: 2px solid var(--oxide); outline-offset: 2px; }

    .app { display: grid; grid-template-rows: 48px 1fr; grid-template-columns: 200px 1fr; height: 100vh; }
    #topbar {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; gap: 12px;
      background: #1a1a1a; color: #f5f3ee;
    }
    #sidebar {
      grid-row: 2; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); padding: 12px 0; overflow-y: auto;
      background: var(--card); scrollbar-width: thin;
    }
    #sidebar::-webkit-scrollbar { width: 5px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 3px; }
    #content { grid-row: 2; overflow-y: auto; padding: 16px; scrollbar-width: thin; }
    #content::-webkit-scrollbar { width: 5px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 3px; }

    /* ── Top Bar ──────────────────────────────────────────── */
    .topbar-left { display: flex; align-items: baseline; gap: 12px; flex-shrink: 0; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 700; letter-spacing: 0.04em; }
    .topbar-subtitle { font-size: 11px; color: var(--faint); font-family: var(--mono); }
    .topbar-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .topbar-group { display: flex; align-items: center; gap: 4px; padding: 0 4px; border-left: 1px solid rgba(255,255,255,.15); }
    .topbar-group:first-child { border-left: none; padding-left: 0; }
    .btn-ctrl {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.2); color: #f5f3ee;
      padding: 6px 12px; font-family: var(--mono); font-size: 11px;
      cursor: pointer; border-radius: 8px; transition: all 0.2s ease;
    }
    .btn-ctrl:hover { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.15); }
    .btn-ctrl:active { background: rgba(255,255,255,.2); transform: scale(0.97); }
    .sel-speed { background: var(--ink); color: var(--paper); border: 1px solid var(--faint); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 2px 4px; border-radius: 3px; cursor: pointer; transition: border-color 0.15s ease; }
    .sel-speed:hover { border-color: var(--paper); }
    .scrubber { flex: 1; min-width: 100px; max-width: 300px; accent-color: var(--oxide); cursor: pointer; }
    .topbar-month { font-family: 'IBM Plex Mono', monospace; font-size: 12px; min-width: 70px; }
    .topbar-pct { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; color: var(--oxide); }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar-tabs { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; }
    .sidebar-tab {
      text-align: left; background: none; border: none; padding: 10px 14px;
      font-family: 'Newsreader', serif; font-size: 14px; cursor: pointer;
      border-radius: 8px; color: var(--ink); transition: all 0.2s ease;
    }
    .sidebar-tab:hover { background: var(--border); }
    .sidebar-tab.active { background: var(--oxide); color: #fff; font-weight: 500; }
    .sidebar-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; padding: 16px 12px; border-top: 1px solid var(--border); margin-top: 12px; }
    .sidebar-stat { text-align: center; }
    .stat-val { display: block; font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
    .stat-lbl { display: block; font-size: 10px; color: var(--faint); font-family: var(--mono); text-transform: uppercase; }
    .sidebar-export { padding: 12px; border-top: 1px solid var(--border); margin-top: auto; display: flex; flex-direction: column; gap: 4px; }
    .btn-export {
      background: none; border: 1px solid var(--border); padding: 6px 12px;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      cursor: pointer; border-radius: 4px; color: var(--ink);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .btn-export:hover { border-color: var(--oxide); color: var(--oxide); background: rgba(168,64,31,0.04); }
    .btn-export:active { background: rgba(168,64,31,0.1); }

    /* ── Dashboard ────────────────────────────────────────── */
    .dash-gantt { width: 100%; height: 40%; min-height: 300px; }
    .dash-gantt canvas { width: 100%; height: 100%; display: block; border-radius: 10px; }
    .dash-kpis { display: flex; gap: 10px; padding: 12px 0; flex-wrap: wrap; }
    .kpi {
      flex: 1; min-width: 90px; text-align: center; padding: 14px 8px;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      border-left: 3px solid var(--border); transition: all 0.2s ease;
    }
    .kpi:hover { border-color: var(--oxide); box-shadow: 0 2px 12px rgba(0,0,0,.06); }
    .kpi:has(.kpi-good) { border-left-color: var(--green); }
    .kpi:has(.kpi-bad) { border-left-color: var(--red); }
    .kpi-val { display: block; font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; }
    .kpi-lbl { display: block; font-size: 10px; color: var(--faint); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; margin-top: 2px; }
    .kpi-good { color: var(--green); }
    .kpi-bad { color: var(--red); }
    .dash-feed { padding: 8px 0; }
    .feed-title { font-family: 'Fraunces', serif; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .feed-empty { color: var(--faint); font-style: italic; font-size: 13px; padding: 12px 8px; }
    .feed-item { padding: 3px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
    .feed-type { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); }
    .feed-name { cursor: pointer; color: var(--blue); transition: color 0.15s ease; }
    .feed-name:hover { text-decoration: underline; color: var(--oxide); }

    /* ── Constraint List ──────────────────────────────────── */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    .filter-input {
      flex: 1; padding: 8px 14px; border: 1px solid var(--glass-border); border-radius: 8px;
      font-family: var(--mono); font-size: 12px; background: var(--card); color: var(--ink);
      transition: all 0.2s ease;
    }
    .filter-input:focus { border-color: var(--oxide); box-shadow: 0 0 0 2px rgba(168,64,31,.1); outline: none; }
    .filter-select {
      padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-family: var(--mono); font-size: 12px; background: var(--card); color: var(--ink);
      cursor: pointer; transition: all 0.2s ease;
    }
    .filter-select:focus { border-color: var(--oxide); outline: none; }
    .atom-list { display: flex; flex-direction: column; gap: 2px; }
    .atom-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border-radius: 8px; cursor: pointer; font-size: 13px;
      border-left: 3px solid transparent;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .atom-row:hover { background: rgba(0,0,0,.03); border-left-color: var(--oxide); }
    .atom-row:active { background: var(--border); }
    .atom-status { font-family: 'IBM Plex Mono', monospace; font-size: 12px; width: 24px; flex-shrink: 0; }
    .atom-done { color: var(--green); }
    .atom-open { color: var(--faint); }
    .atom-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--blue); min-width: 100px; }
    .atom-name { flex: 1; }
    .atom-type {
      font-family: var(--mono); font-size: 10px; color: var(--faint);
      background: var(--paper); padding: 2px 8px; border-radius: 10px;
    }

    /* ── Tag pills with type-based coloring ───────────────── */
    .atom-tag {
      font-family: 'IBM Plex Mono', monospace; font-size: 9px;
      padding: 2px 8px; border-radius: 10px;
    }
    .pill {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 2px 10px; border-radius: 12px; display: inline-block;
      transition: opacity 0.15s ease;
    }
    .pill:hover { opacity: 0.8; }
    /* Default pill */
    .pill { background: rgba(168,64,31,0.1); color: var(--oxide); border: 1px solid rgba(168,64,31,0.25); }
    /* Risk */
    .pill-risk { background: rgba(177,61,44,0.12); color: var(--red); border: 1px solid rgba(177,61,44,0.3); }
    /* Constraint */
    .pill-constraint { background: rgba(184,134,11,0.12); color: var(--amber); border: 1px solid rgba(184,134,11,0.3); }
    /* Phase */
    .pill-phase { background: rgba(44,93,120,0.12); color: var(--blue); border: 1px solid rgba(44,93,120,0.3); }
    /* IWP / AWP */
    .pill-iwp, .pill-awp { background: rgba(47,125,79,0.12); color: var(--green); border: 1px solid rgba(47,125,79,0.3); }
    /* Milestone */
    .pill-milestone { background: rgba(107,76,154,0.12); color: var(--violet); border: 1px solid rgba(107,76,154,0.3); }
    /* Nuclear */
    .pill-nuclear { background: rgba(168,64,31,0.12); color: var(--oxide); border: 1px solid rgba(168,64,31,0.25); }
    /* Opportunity */
    .pill-opportunity { background: rgba(47,125,79,0.12); color: var(--green); border: 1px solid rgba(47,125,79,0.3); }
    /* Long-lead */
    .pill-long-lead { background: rgba(184,134,11,0.1); color: var(--amber); border: 1px solid rgba(184,134,11,0.25); }

    /* ── WBS Tree ─────────────────────────────────────────── */
    .wbs-tree { font-size: 13px; }
    .tree-node {
      display: flex; align-items: center; gap: 6px; padding: 4px 4px;
      cursor: pointer; border-radius: 3px;
      transition: background 0.15s ease;
    }
    .tree-node:hover { background: rgba(0,0,0,.03); }
    .tree-node:active { background: var(--border); }
    .tree-icon {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint);
      width: 20px; flex-shrink: 0; text-align: center; cursor: pointer;
      transition: color 0.15s ease;
    }
    .tree-icon:hover { color: var(--oxide); }
    .tree-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--blue); min-width: 80px; }
    .tree-name { flex: 1; }
    .tree-pct { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); min-width: 36px; text-align: right; }
    .tree-bar-wrap { width: 48px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .tree-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
    .tree-indent-line { border-left: 1px solid var(--border); margin-left: 9px; }

    /* ── Risks ────────────────────────────────────────────── */
    .risk-header { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .risk-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 20px; }
    .risk-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      border-radius: 8px; cursor: pointer; font-size: 13px;
      border-left: 3px solid transparent;
      transition: background 0.15s ease;
    }
    .risk-row:hover { background: rgba(0,0,0,.03); }
    .risk-row:active { background: var(--border); }
    .risk-high { border-left-color: var(--red); }
    .risk-med { border-left-color: var(--oxide); }
    .risk-low { border-left-color: var(--green); }
    .risk-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); min-width: 100px; }
    .risk-name { flex: 1; }
    .risk-prob, .risk-impact, .risk-score, .risk-ev {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint);
    }
    .risk-bar-wrap { width: 48px; height: 8px; background: var(--paper); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .risk-bar-fill { height: 100%; border-radius: 4px; }
    .mc-section { margin-top: 12px; }
    .mc-header { font-family: 'Fraunces', serif; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .mc-canvas-wrap { min-width: 300px; min-height: 160px; }
    .mc-canvas { width: 100%; height: 100%; display: block; }
    .mc-stats { display: flex; gap: 16px; padding: 8px 0; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--faint); flex-wrap: wrap; }

    /* ── Terminal ─────────────────────────────────────────── */
    .terminal {
      background: #1a1a1a; color: #4ade80;
      font-family: var(--mono); font-size: 13px;
      padding: 16px 18px; height: calc(100% - 48px); min-height: 200px;
      overflow-y: auto; border-radius: 10px 10px 0 0;
      border: 1px solid rgba(255,255,255,.08); border-bottom: none;
      word-wrap: break-word; overflow-wrap: break-word; white-space: pre-wrap;
      line-height: 1.6; scrollbar-width: thin;
    }
    .terminal::-webkit-scrollbar { width: 5px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 3px; }
    .term-input { color: #e0dcd4; }
    .term-output, .term-system { color: #4ade80; }
    .term-error { color: var(--red); }
    .term-prompt {
      display: flex; align-items: center;
      background: #1a1a1a; padding: 10px 18px; border-radius: 0 0 10px 10px;
      border: 1px solid rgba(255,255,255,.08); border-top: none;
    }
    .term-caret {
      color: #a8401f; font-family: var(--mono); font-size: 13px;
      margin-right: 10px; flex-shrink: 0; font-weight: 600;
    }
    .term-field {
      flex: 1; background: none; border: none; color: #e0dcd4;
      font-family: var(--mono); font-size: 13px; outline: none;
      caret-color: #4ade80;
    }
    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }
    .term-blink {
      display: inline-block; width: 7px; height: 14px;
      background: #4ade80; vertical-align: text-bottom;
      animation: blink-cursor 1s step-end infinite; margin-left: 2px;
    }

    /* ── Overlay & Card ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,26,26,0.4);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      animation: overlay-in 0.2s ease;
    }
    @keyframes overlay-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 24px;
      width: 100%; max-width: 500px; max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 4px 12px rgba(0,0,0,.08);
      animation: card-in 0.2s ease;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 12px; }
    .card-breadcrumb { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); margin-bottom: 4px; }
    .card-breadcrumb .crumb { cursor: pointer; color: var(--blue); transition: color 0.15s ease; }
    .card-breadcrumb .crumb:hover { text-decoration: underline; color: var(--oxide); }
    .card-close {
      background: none; border: none; font-family: 'IBM Plex Mono', monospace;
      font-size: 16px; cursor: pointer; color: var(--faint); padding: 4px 8px;
      border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .card-close:hover { color: var(--red); background: rgba(177,61,44,0.08); }
    .card-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .card-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    .card-field { display: flex; gap: 6px; font-size: 13px; }
    .field-lbl { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--faint); min-width: 60px; }
    .field-val { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
    .val-done { color: var(--green); }
    .val-open { color: var(--oxide); }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .card-section { margin-bottom: 10px; }
    .section-lbl {
      display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      color: var(--oxide); text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 4px; font-weight: 500;
    }
    .card-link {
      display: block; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      color: var(--blue); cursor: pointer; padding: 3px 6px;
      border-radius: 3px;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .card-link:hover { background: rgba(44,93,120,0.08); text-decoration: underline; }
    .card-evidence, .card-narrative { font-size: 13px; color: var(--ink); padding: 8px 12px; background: var(--paper); border-radius: 4px; }
    .card-toolbar { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .btn-card {
      background: none; border: 1px solid var(--border);
      padding: 6px 12px; font-family: var(--mono);
      font-size: 11px; cursor: pointer; border-radius: 8px; color: var(--ink);
      transition: all 0.2s ease;
    }
    .btn-card:hover { border-color: var(--oxide); color: var(--oxide); background: rgba(168,64,31,.04); }
    .btn-card:active { background: rgba(168,64,31,.1); }
    .btn-apply { background: var(--green); border-color: var(--green); color: white; }
    .btn-apply:hover { background: var(--green); border-color: var(--green); color: white; opacity: 0.9; }
    .btn-apply:active { background: var(--green); opacity: 0.8; }
    .card-source { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--term-bg); color: var(--term-fg); padding: 12px; border-radius: 6px; margin-top: 10px; overflow-x: auto; white-space: pre; }
    .card-edit { margin-top: 10px; }
    .edit-textarea { width: 100%; height: 160px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); resize: vertical; transition: border-color 0.15s ease; }
    .edit-textarea:focus { border-color: var(--oxide); outline: none; }

    /* ── Create / Edit form labels ────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 3px; }
    .form-group .field-lbl { display: block; margin-bottom: 1px; }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .form-actions { display: flex; gap: 6px; margin-top: 4px; }
    .form-validation { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--red); margin-top: 2px; }

    /* ── IWP status badges ────────────────────────────────── */
    .badge-workable {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 2px 8px; border-radius: 10px;
      background: rgba(47,125,79,0.12); color: var(--green);
      border: 1px solid rgba(47,125,79,0.3);
    }
    .badge-blocked {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 2px 8px; border-radius: 10px;
      background: rgba(177,61,44,0.1); color: var(--red);
      border: 1px solid rgba(177,61,44,0.25);
    }
    .badge-done {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      padding: 2px 8px; border-radius: 10px;
      background: rgba(47,125,79,0.12); color: var(--green);
      border: 1px solid rgba(47,125,79,0.3);
    }
    .blocker-link {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      color: var(--red); cursor: pointer;
      transition: color 0.15s ease;
    }
    .blocker-link:hover { color: var(--oxide); text-decoration: underline; }

    /* ── MC histogram legend ──────────────────────────────── */
    .mc-legend { display: flex; gap: 12px; padding: 6px 0; flex-wrap: wrap; }

<body>
  <div class="app">
    <div id="topbar">
      <button id="btn-menu">[=]</button>
    </div>
    <div id="sidebar"></div>
    <div id="content"></div>
  </div>
  <script>
/**
 * ACE Core — Atomic Constraint Engine
 *
 * One primitive: the atom.
 * Two completion kinds: manual, derived.
 * Three link types: contains, requires, tag.
 *
 * Completion is computed by settling the graph (least fixed point).
 * Progress never reverses. Loops can't cheat.
 */

const ACE = (function () {
  'use strict';

  // ── Atom Store ──────────────────────────────────────────────

  const atoms = {};      // id → atom
  const children = {};   // id → Set of child ids (reverse of parent)
  const dependents = {}; // id → Set of ids that require this atom

  /**
   * Create an atom. Returns the atom.
   *
   * kind: 'manual' | 'derived'
   *   manual  — a person clears it with evidence
   *   derived — done when all requires AND all contains are done
   */
  function create(spec) {
    if (!spec.id) throw new Error('Atom requires an id');
    if (atoms[spec.id]) throw new Error('Atom ' + spec.id + ' already exists');

    const atom = {
      id:       spec.id,
      name:     spec.name || spec.id,
      type:     spec.type || 'atom',
      kind:     spec.kind || 'derived',
      tags:     Array.isArray(spec.tags) ? spec.tags.slice() : [],
      requires: [],
      contains: [],

      // State (not part of the spec — internal)
      _complete: false,
      _evidence: null,
      _narrative: null,
      _parent: null
    };

    atoms[atom.id] = atom;
    children[atom.id] = new Set();
    dependents[atom.id] = new Set();

    // Wire up relationships from spec
    if (Array.isArray(spec.requires)) {
      spec.requires.forEach(function (rid) { link(atom.id, 'requires', rid); });
    }
    if (Array.isArray(spec.contains)) {
      spec.contains.forEach(function (cid) { link(atom.id, 'contains', cid); });
    }

    return atom;
  }

  /** Get an atom by id. Returns undefined if not found. */
  function get(id) {
    return atoms[id];
  }

  /** Remove an atom and all its links. */
  function remove(id) {
    var a = atoms[id];
    if (!a) return;

    // Remove from parent's children set
    if (a._parent && children[a._parent]) {
      children[a._parent].delete(id);
    }

    // Remove from dependents of everything it requires
    a.requires.forEach(function (rid) {
      if (dependents[rid]) dependents[rid].delete(id);
    });

    // Remove children's parent pointers
    a.contains.forEach(function (cid) {
      var child = atoms[cid];
      if (child) child._parent = null;
    });

    delete atoms[id];
    delete children[id];
    delete dependents[id];
  }

  // ── Links ───────────────────────────────────────────────────

  /**
   * Add a link between two atoms.
   *
   * rel: 'requires' | 'contains'
   *
   * contains enforces one parent — adding a second parent throws.
   * requires checks for cycles — adding a cycle throws.
   */
  function link(fromId, rel, toId) {
    var from = atoms[fromId];
    var to = atoms[toId];
    if (!from) throw new Error('Unknown atom: ' + fromId);
    if (!to) throw new Error('Unknown atom: ' + toId);

    if (rel === 'contains') {
      // One parent rule
      if (to._parent && to._parent !== fromId) {
        throw new Error(toId + ' already has parent ' + to._parent + '; cannot add second parent ' + fromId);
      }
      if (from.contains.indexOf(toId) === -1) {
        from.contains.push(toId);
        children[fromId].add(toId);
        to._parent = fromId;
      }
    } else if (rel === 'requires') {
      // Cycle check
      if (wouldCycle(fromId, toId)) {
        throw new Error('Adding ' + fromId + ' requires ' + toId + ' would create a cycle');
      }
      if (from.requires.indexOf(toId) === -1) {
        from.requires.push(toId);
        dependents[toId].add(fromId);
      }
    } else {
      throw new Error('Unknown link type: ' + rel + '. Use requires or contains.');
    }
  }

  /** Remove a link. */
  function unlink(fromId, rel, toId) {
    var from = atoms[fromId];
    if (!from) return;

    if (rel === 'contains') {
      var idx = from.contains.indexOf(toId);
      if (idx >= 0) {
        from.contains.splice(idx, 1);
        if (children[fromId]) children[fromId].delete(toId);
        var to = atoms[toId];
        if (to && to._parent === fromId) to._parent = null;
      }
    } else if (rel === 'requires') {
      var idx2 = from.requires.indexOf(toId);
      if (idx2 >= 0) {
        from.requires.splice(idx2, 1);
        if (dependents[toId]) dependents[toId].delete(fromId);
      }
    }
  }

  /** Would adding fromId requires toId create a cycle? */
  function wouldCycle(fromId, toId) {
    // If toId can reach fromId via requires, it's a cycle
    var visited = {};
    var stack = [fromId];
    while (stack.length) {
      var current = stack.pop();
      if (current === toId) return true; // toId reaches fromId — cycle
      if (visited[current]) continue;
      visited[current] = true;
      var a = atoms[current];
      if (a) {
        // Walk upstream: who requires current?
        if (dependents[current]) {
          dependents[current].forEach(function (dep) { stack.push(dep); });
        }
      }
    }
    return false;
  }

  // ── Completion Engine ───────────────────────────────────────

  /**
   * Settle the graph. Compute completion for all derived atoms.
   * Returns the count of atoms that changed state.
   *
   * This is the least fixed point from ACT Section 3.
   * Manual atoms are only complete if explicitly cleared.
   * Derived atoms are complete when all requires AND contains are complete.
   */
  function settle() {
    var changed = true;
    var totalChanged = 0;

    while (changed) {
      changed = false;
      for (var id in atoms) {
        var a = atoms[id];
        if (a.kind !== 'derived') continue;

        var was = a._complete;
        var allReqs = a.requires.length === 0 || a.requires.every(function (rid) {
          var r = atoms[rid];
          return r && r._complete;
        });
        var allChildren = a.contains.length === 0 || a.contains.every(function (cid) {
          var c = atoms[cid];
          return c && c._complete;
        });

        // Derived atom needs at least one input to be meaningful
        var hasInputs = a.requires.length > 0 || a.contains.length > 0;
        a._complete = hasInputs && allReqs && allChildren;

        if (a._complete !== was) {
          changed = true;
          totalChanged++;
        }
      }
    }

    return totalChanged;
  }

  /**
   * Clear a manual atom with evidence.
   * Returns true if the atom was cleared, false if already complete or not manual.
   */
  function complete(id, evidence, narrative) {
    var a = atoms[id];
    if (!a) return false;
    if (a.kind !== 'manual') return false;
    if (a._complete) return false;

    a._complete = true;
    a._evidence = evidence || null;
    a._narrative = narrative || null;

    return true;
  }

  /** Is this atom complete? */
  function isComplete(id) {
    var a = atoms[id];
    return a ? a._complete : false;
  }

  // ── Query ───────────────────────────────────────────────────

  /** Return all atoms as an array. */
  function all() {
    var result = [];
    for (var id in atoms) result.push(atoms[id]);
    return result;
  }

  /**
   * Query atoms by filter.
   * filter: { type, tag, complete, search }
   */
  function query(filter) {
    var result = all();
    if (filter.type) {
      result = result.filter(function (a) { return a.type === filter.type; });
    }
    if (filter.tag) {
      result = result.filter(function (a) { return a.tags.indexOf(filter.tag) >= 0; });
    }
    if (filter.complete !== undefined) {
      result = result.filter(function (a) { return a._complete === filter.complete; });
    }
    if (filter.search) {
      var s = filter.search.toLowerCase();
      result = result.filter(function (a) {
        return a.id.toLowerCase().indexOf(s) >= 0 || a.name.toLowerCase().indexOf(s) >= 0;
      });
    }
    return result;
  }

  /**
   * The workable set: atoms not complete whose entire requires list is complete.
   * These are the atoms a crew can pick up right now.
   */
  function workable() {
    return all().filter(function (a) {
      if (a._complete) return false;
      if (a.kind === 'derived') return false; // derived atoms aren't "worked"
      return a.requires.every(function (rid) {
        var r = atoms[rid];
        return r && r._complete;
      });
    });
  }

  // ── Rollup ──────────────────────────────────────────────────

  /**
   * Percent complete for an atom.
   * Counts completed descendants / total descendants in the contains tree.
   * Weight defaults to 1 per atom.
   */
  function percentComplete(id) {
    var a = atoms[id];
    if (!a) return 0;

    var leaves = descendants(id);
    if (leaves.length === 0) return a._complete ? 100 : 0;

    var done = 0;
    leaves.forEach(function (lid) {
      if (atoms[lid] && atoms[lid]._complete) done++;
    });
    return Math.round(done / leaves.length * 100);
  }

  /** All descendant ids (recursive contains). */
  function descendants(id) {
    var result = [];
    var a = atoms[id];
    if (!a) return result;

    a.contains.forEach(function (cid) {
      result.push(cid);
      result = result.concat(descendants(cid));
    });
    return result;
  }

  /** Parent chain (breadcrumb). */
  function ancestors(id) {
    var chain = [];
    var a = atoms[id];
    while (a && a._parent) {
      chain.unshift(a._parent);
      a = atoms[a._parent];
    }
    return chain;
  }

  // ── Export ───────────────────────────────────────────────────

  /** Export all atoms as a clean JSON array (no internal state). */
  function exportJSON() {
    return all().map(function (a) {
      var obj = { id: a.id, name: a.name, type: a.type, kind: a.kind };
      if (a.tags.length) obj.tags = a.tags;
      if (a.requires.length) obj.requires = a.requires;
      if (a.contains.length) obj.contains = a.contains;
      if (a._complete) obj.complete = true;
      if (a._evidence) obj.evidence = a._evidence;
      if (a._narrative) obj.narrative = a._narrative;
      return obj;
    });
  }

  /** Import atoms from a JSON array. Clears existing store. */
  function importJSON(arr) {
    reset();
    // Two passes: create all atoms first, then wire links
    arr.forEach(function (spec) {
      var s = { id: spec.id, name: spec.name, type: spec.type, kind: spec.kind || 'derived', tags: spec.tags || [] };
      create(s);
      if (spec.complete) atoms[spec.id]._complete = true;
      if (spec.evidence) atoms[spec.id]._evidence = spec.evidence;
      if (spec.narrative) atoms[spec.id]._narrative = spec.narrative;
    });
    arr.forEach(function (spec) {
      (spec.requires || []).forEach(function (rid) { if (atoms[rid]) link(spec.id, 'requires', rid); });
      (spec.contains || []).forEach(function (cid) { if (atoms[cid]) link(spec.id, 'contains', cid); });
    });
    settle();
  }

  /** Clear everything. */
  function reset() {
    for (var id in atoms) delete atoms[id];
    for (var id2 in children) delete children[id2];
    for (var id3 in dependents) delete dependents[id3];
  }

  /** Summary for LLM context. */
  function summary() {
    var total = all().length;
    var done = query({ complete: true }).length;
    var types = {};
    all().forEach(function (a) { types[a.type] = (types[a.type] || 0) + 1; });
    return {
      atoms: total,
      complete: done,
      percent: total > 0 ? Math.round(done / total * 100) : 0,
      types: types,
      workable: workable().length
    };
  }

  // ── Public API ──────────────────────────────────────────────

  return {
    create:          create,
    get:             get,
    remove:          remove,
    link:            link,
    unlink:          unlink,
    settle:          settle,
    complete:        complete,
    isComplete:      isComplete,
    all:             all,
    query:           query,
    workable:        workable,
    percentComplete: percentComplete,
    descendants:     descendants,
    ancestors:       ancestors,
    exportJSON:      exportJSON,
    importJSON:      importJSON,
    reset:           reset,
    summary:         summary
  };

})();

// Node.js / CommonJS
if (typeof module !== 'undefined' && module.exports) {
  module.exports = ACE;
}
/**
 * ACE Schedule — CPM + Monte Carlo for the Atomic Constraint Engine
 *
 * Depends on ACE from ace-core.js being loaded first.
 * All durations in months. All math is pure functions over ACE atoms.
 */

const ACE_Schedule = (function () {
  'use strict';

  /** Duration storage: atom id -> {min, likely, max} in months */
  const durations = {};

  /** Planned value curve: month -> cumulative planned % */
  const plannedValue = {};

  /** Set a three-point duration estimate for an atom */
  function setDuration(id, min, likely, max) {
    if (min > likely || likely > max) {
      throw new Error('Duration requires min <= likely <= max');
    }
    durations[id] = { min: min, likely: likely, max: max };
  }

  /** Get the likely duration for an atom, defaulting to 0 */
  function getDuration(id) {
    var d = durations[id];
    return d ? d.likely : 0;
  }

  /** Topological sort of atoms by requires (Kahn's algorithm) */
  function topoSort() {
    var allAtoms = ACE.all();
    var inDegree = {};
    var adj = {};
    var ids = [];

    allAtoms.forEach(function (a) {
      ids.push(a.id);
      inDegree[a.id] = 0;
      adj[a.id] = [];
    });

    allAtoms.forEach(function (a) {
      a.requires.forEach(function (rid) {
        if (adj[rid]) {
          adj[rid].push(a.id);
          inDegree[a.id]++;
        }
      });
    });

    var queue = ids.filter(function (id) { return inDegree[id] === 0; });
    var sorted = [];

    while (queue.length) {
      var current = queue.shift();
      sorted.push(current);
      adj[current].forEach(function (nid) {
        inDegree[nid]--;
        if (inDegree[nid] === 0) queue.push(nid);
      });
    }

    return sorted;
  }

  /** Critical Path Method using likely durations */
  function cpm() {
    var order = topoSort();
    var earlyFinish = {};
    var earlyStart = {};

    // Forward pass
    order.forEach(function (id) {
      var a = ACE.get(id);
      if (!a) return;
      var dur = getDuration(id);
      var maxPredFinish = 0;
      a.requires.forEach(function (rid) {
        if (earlyFinish[rid] !== undefined && earlyFinish[rid] > maxPredFinish) {
          maxPredFinish = earlyFinish[rid];
        }
      });
      earlyStart[id] = maxPredFinish;
      earlyFinish[id] = maxPredFinish + dur;
    });

    // Find project finish
    var projectFinish = 0;
    for (var id in earlyFinish) {
      if (earlyFinish[id] > projectFinish) projectFinish = earlyFinish[id];
    }

    // Backward pass
    var lateFinish = {};
    var lateStart = {};
    var reverseOrder = order.slice().reverse();

    reverseOrder.forEach(function (id) {
      var dur = getDuration(id);
      var a = ACE.get(id);
      if (!a) return;

      // Find successors (atoms that require this one)
      var minSuccStart = projectFinish;
      ACE.all().forEach(function (s) {
        if (s.requires.indexOf(id) >= 0 && lateStart[s.id] !== undefined) {
          if (lateStart[s.id] < minSuccStart) minSuccStart = lateStart[s.id];
        }
      });

      lateFinish[id] = minSuccStart;
      lateStart[id] = minSuccStart - dur;
    });

    // Float and critical path
    var floatMap = {};
    var criticalPath = [];
    order.forEach(function (id) {
      floatMap[id] = (lateFinish[id] || 0) - (earlyFinish[id] || 0);
      if (Math.abs(floatMap[id]) < 0.001 && getDuration(id) > 0) {
        criticalPath.push(id);
      }
    });

    return {
      finishes: earlyFinish,
      starts: earlyStart,
      lateFinishes: lateFinish,
      lateStarts: lateStart,
      floats: floatMap,
      criticalPath: criticalPath,
      projectFinish: projectFinish
    };
  }

  /** Sample from a triangular distribution */
  function sampleTriangular(min, likely, max) {
    var u = Math.random();
    var fc = (likely - min) / (max - min);
    if (u < fc) {
      return min + Math.sqrt(u * (max - min) * (likely - min));
    } else {
      return max - Math.sqrt((1 - u) * (max - min) * (max - likely));
    }
  }

  /** Monte Carlo simulation: sample N iterations, return percentiles */
  function monteCarlo(iterations) {
    var order = topoSort();
    var results = [];
    var risks = ACE.query({ type: 'risk' });

    for (var i = 0; i < iterations; i++) {
      var earlyFinish = {};

      // Roll risk impacts once per run
      var riskHits = {};
      risks.forEach(function (r) {
        var prob = parseFloat(r.tags.find(function (t) { return t.startsWith('p:'); })?.replace('p:', '') || '0');
        var impact = parseFloat(r.tags.find(function (t) { return t.startsWith('impact:'); })?.replace('impact:', '') || '0');
        riskHits[r.id] = Math.random() < prob ? impact : 0;
      });

      // Forward pass with sampled durations
      order.forEach(function (id) {
        var a = ACE.get(id);
        if (!a) return;
        var dur = 0;
        var d = durations[id];
        if (d) {
          dur = sampleTriangular(d.min, d.likely, d.max);
        }
        // Add risk impact if this atom has risk dependencies
        a.requires.forEach(function (rid) {
          if (riskHits[rid]) dur += riskHits[rid];
        });

        var maxPredFinish = 0;
        a.requires.forEach(function (rid) {
          if (earlyFinish[rid] !== undefined && earlyFinish[rid] > maxPredFinish) {
            maxPredFinish = earlyFinish[rid];
          }
        });
        earlyFinish[id] = maxPredFinish + dur;
      });

      var projectFinish = 0;
      for (var id2 in earlyFinish) {
        if (earlyFinish[id2] > projectFinish) projectFinish = earlyFinish[id2];
      }
      results.push({ finish: projectFinish, iteration: i });
    }

    results.sort(function (a, b) { return a.finish - b.finish; });

    return {
      p10: results[Math.floor(iterations * 0.1)],
      p50: results[Math.floor(iterations * 0.5)],
      p80: results[Math.floor(iterations * 0.8)],
      p90: results[Math.floor(iterations * 0.9)],
      results: results
    };
  }

  /** Set the planned value curve (month -> cumulative %) */
  function setPlannedValue(curve) {
    for (var m in curve) plannedValue[m] = curve[m];
  }

  /** Earned Schedule: find the month where PV equals current EV */
  function earnedSchedule(currentMonth) {
    var summary = ACE.summary();
    var ev = summary.percent;
    var months = Object.keys(plannedValue).map(Number).sort(function (a, b) { return a - b; });

    if (months.length === 0) return { es: currentMonth, spi_t: 1.0 };

    // Find the month where PV crosses EV
    var es = months[0];
    for (var i = 0; i < months.length - 1; i++) {
      if (plannedValue[months[i]] <= ev && plannedValue[months[i + 1]] >= ev) {
        // Interpolate
        var fraction = (ev - plannedValue[months[i]]) /
                       (plannedValue[months[i + 1]] - plannedValue[months[i]]);
        es = months[i] + fraction * (months[i + 1] - months[i]);
        break;
      }
      if (plannedValue[months[i]] >= ev) {
        es = months[i];
        break;
      }
    }

    var spi_t = currentMonth > 0 ? es / currentMonth : 1.0;

    return { es: es, spi_t: spi_t };
  }

  return {
    setDuration: setDuration,
    getDuration: getDuration,
    durations: durations,
    cpm: cpm,
    monteCarlo: monteCarlo,
    topoSort: topoSort,
    sampleTriangular: sampleTriangular,
    setPlannedValue: setPlannedValue,
    earnedSchedule: earnedSchedule
  };

})();

// Node.js / CommonJS
if (typeof module !== 'undefined' && module.exports) {
  module.exports = ACE_Schedule;
}
/**
 * ACE Data — NDX Nuclear Plant Dataset
 *
 * NDX 5x1000 MWe CANDU Station
 * Budget: $58B | Baseline: 108 months
 * Depends on ACE (ace-core.js) and ACE_Schedule (ace-schedule.js).
 */

const ACE_Data = (function () {
  'use strict';

  /** Plant constants */

    { title: '8. Advanced Work Packaging', sub: 'CWA → CWP → IWP Hierarchy', body: 'AWP decomposes construction into executable work packages:\n\nCWA-01  Reactor Building       (4 CWPs, 9 IWPs)\nCWA-02  Turbine Building       (3 CWPs, 5 IWPs)\nCWA-03  Mechanical Systems     (3 CWPs, 7 IWPs)\n\nEach IWP is a manual atom with constraint prerequisites.\nThe Constraints view shows workable/blocked status in real time.\n6 constraints gate IWP execution (rebar, crane, welders, CNSC hold, coolant, formwork).', section: 'awp' },
    { title: '9. Earned Value Management', sub: 'S-Curve · SPI · CPI · EAC', body: 'The S-curve plots three lines over time:\n\n  Budget     — linear baseline spend\n  Planned Value — S-curve (3t² − 2t³) expected progress\n  Earned Value  — actual completion percentage\n\nSchedule Performance Index: SPI = ES / AT\nCost Performance Index:     CPI = EV% / Budget%\nEstimate at Completion:     EAC = Budget / SPI\n\nGreen SPI ≥ 0.95 | Red SPI < 0.85', section: 'evm' },
    { title: '10. Simulation Controls', sub: 'Play · Decide · Observe · Export', body: 'Press Play to simulate the 108-month construction program.\n\nAtoms auto-complete when CPM finish date is reached.\nTriage events pause simulation for your decision.\nBackground events generate realistic construction narrative.\n\nSpeed: 1× · 2× · 5× · 10×\nExport: JSON · CSV · PDF · P6 (XER)\n\nKeyboard: Space (play), ← → (scrub), / (search), ? (help), P (present), 0-4 (views)', section: 'controls' }
  ];

  // ── Vertex shader (fullscreen quad) ──
  var VS = 'attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}';

  // ── Fragment shader (raymarcher) ──
  var FS = [
    'precision highp float;',
    'uniform float t,ar;',
    'uniform vec3 cam;',
    'uniform float pr_site,pr_fnd,pr_rx,pr_ct,pr_tb,pr_cool,pr_aux,pr_crane,pr_pipe;',
    '',
    'float box(vec3 p,vec3 b){vec3 d=abs(p)-b;return min(max(d.x,max(d.y,d.z)),0.)+length(max(d,0.));}',
    'float cyl(vec3 p,float r,float h){return max(length(p.xz)-r,abs(p.y)-h);}',
    'float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}',
    '',
    'float ground(vec3 p){return p.y+.01;}',
    '',
    'float building(vec3 p,vec3 pos,vec3 sz,float vis){',
    '  if(vis<.001)return 1e5;',
    '  return box(p-pos,sz*vis)/vis;',
    '}',
    '',
    'float scene(vec3 p){',
    '  float d=ground(p);',
    // Foundation pad
    '  d=min(d,building(p,vec3(0,-.45,0),vec3(3.5,.05,2.5),pr_fnd));',
    // Reactor building (cylinder)
    '  float rx=cyl(p-vec3(-1.,pr_rx*.9,0.),0.8,pr_rx*.9);',
    '  if(pr_rx>.001)d=min(d,rx);',
    // Containment dome
    '  float dome=length(p-vec3(-1.,pr_ct*1.8,0.))-1.0;',
    '  dome=max(dome,-(p.y-pr_ct*1.6));',
    '  if(pr_ct>.3)d=min(d,dome);',
    // Turbine building (box)
    '  d=min(d,building(p,vec3(1.2,.4,0.),vec3(1.2,.4,.8),pr_tb));',
    // Cooling towers (2)
    '  float ct1=cyl(p-vec3(2.5,pr_cool*1.2,-1.),0.5-0.15*(p.y/2.),pr_cool*1.2);',
    '  float ct2=cyl(p-vec3(2.5,pr_cool*1.2,1.),0.5-0.15*(p.y/2.),pr_cool*1.2);',
    '  if(pr_cool>.001){d=min(d,ct1);d=min(d,ct2);}',
    // Auxiliary building
    '  d=min(d,building(p,vec3(-.2,.2,-1.5),vec3(.6,.2,.4),pr_aux));',
    // Crane
    '  float crH=pr_crane*3.;',
    '  if(pr_crane>.001){',
    '    d=min(d,box(p-vec3(0.,crH*.5,1.8),vec3(.04,crH*.5,.04)));',
    '    d=min(d,box(p-vec3(0.,crH,1.8),vec3(1.5,.03,.03)));',
    '  }',
    // Pipes (connecting reactor to turbine)
    '  if(pr_pipe>.3){',
    '    float pipe=cyl(vec3(p.y-.3,p.z,p.x-.1),.06,1.2);',
    '    d=min(d,pipe);',
    '  }',
    '  return d;',
    '}',
    '',
    'vec3 norm(vec3 p){vec2 e=vec2(.001,0);return normalize(vec3(',
    '  scene(p+e.xyy)-scene(p-e.xyy),',
    '  scene(p+e.yxy)-scene(p-e.yxy),',
    '  scene(p+e.yyx)-scene(p-e.yyx)));}',
    '',
    'float shadow(vec3 ro,vec3 rd,float mint,float maxt){',
    '  float res=1.;',
    '  for(float t2=mint;t2<maxt;){',
    '    float h=scene(ro+rd*t2);',
    '    if(h<.001)return 0.;',
    '    res=min(res,8.*h/t2);',
    '    t2+=h;',
    '  }return res;}',
    '',
    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy/vec2(textureSize(0))-0.5);',
    '  uv.x*=ar;',
    '',
    '  vec3 ro=cam;',
    '  vec3 ta=vec3(0,.5,0);',
    '  vec3 fwd=normalize(ta-ro);',
    '  vec3 right=normalize(cross(fwd,vec3(0,1,0)));',
    '  vec3 up=cross(right,fwd);',
    '  vec3 rd=normalize(fwd+uv.x*right+uv.y*up);',
    '',
    '  vec3 col=vec3(.92,.90,.85);', // sky
    '  float td=0.;',
    '  for(int i=0;i<80;i++){',
    '    vec3 p=ro+rd*td;',
    '    float d=scene(p);',
    '    if(d<.001){',
    '      vec3 n=norm(p);',
    '      vec3 ld=normalize(vec3(.8,1.,.6));',
    '      float diff=max(dot(n,ld),0.);',
    '      float sh=shadow(p+n*.01,ld,.02,10.);',
    '      float ao=1.;',
    // Material colors
    '      vec3 mat;',
    '      if(p.y<.01)mat=vec3(.85,.82,.75);', // ground
    '      else if(abs(p.x+1.)<.9&&length(p.xz-vec2(-1.,0.))<.85)mat=vec3(.75,.75,.78);', // reactor gray
    '      else if(p.x>0.&&p.y>.1&&abs(p.z)<.9)mat=vec3(.55,.60,.65);', // turbine steel
    '      else if(length(p.xz-vec2(2.5,0.))>1.5)mat=vec3(.82,.78,.72);', // cooling
    '      else mat=vec3(.78,.74,.68);', // default concrete
    '      col=mat*(0.25+0.75*diff*sh);',
    '      break;',
    '    }',
    '    td+=d;',
    '    if(td>25.)break;',
    '  }',
    // Fog
    '  col=mix(col,vec3(.92,.90,.85),1.-exp(-.015*td*td));',
    '  col=pow(col,vec3(.9));', // gamma
    '  gl_FragColor=vec4(col,1);',
    '}'].join('\n');

  // Fix: use resolution uniform instead of textureSize
  var FS_FIXED = FS.replace('vec2(textureSize(0))', 'res').replace(
    'uniform float pr_site',
    'uniform vec2 res;\nuniform float pr_site'
  );

  function initGL(cvs) {
    canvas = cvs;
    gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
    if (!gl) return false;

    var vs = compile(gl.VERTEX_SHADER, VS);
    var fs = compile(gl.FRAGMENT_SHADER, FS_FIXED);
    if (!vs || !fs) return false;

    program = gl.createProgram();
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      console.error('ACE 3D link error:', gl.getProgramInfoLog(program));
      return false;
    }
    gl.useProgram(program);

    // Fullscreen quad
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
    var pLoc = gl.getAttribLocation(program, 'p');
    gl.enableVertexAttribArray(pLoc);
    gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

    startTime = performance.now();
    return true;
  }

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error('ACE 3D shader error:', gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  function updateProgress() {
    if (typeof ACE === 'undefined') return;
    var pct = function(id) { return ACE.percentComplete(id) / 100; };
    var simM = (typeof ACE_UI !== 'undefined' && ACE_UI.getSimMonth) ? ACE_UI.getSimMonth() : 0;
    var t = simM / (ACE_Data.PLANT.baselineMonths || 108);

    progress.site = Math.min(1, t * 6);
    progress.foundation = pct('PH-EXCAV') || Math.min(1, Math.max(0, (t - 0.05) * 4));
    progress.reactor = pct('PH-REACT') || Math.min(1, Math.max(0, (t - 0.3) * 3));
    progress.containment = pct('PH-CONTAIN') || Math.min(1, Math.max(0, (t - 0.2) * 2.5));
    progress.turbine = pct('PH-MECH') || Math.min(1, Math.max(0, (t - 0.25) * 3));
    progress.cooling = Math.min(1, Math.max(0, (t - 0.15) * 2));
    progress.aux = pct('PH-AUX') || Math.min(1, Math.max(0, (t - 0.3) * 3));
    progress.crane = t < 0.85 ? Math.min(1, t * 3) : Math.max(0, (1 - t) * 6);
    progress.pipes = pct('PH-PIPE') || Math.min(1, Math.max(0, (t - 0.35) * 3));
  }

  function render() {
    if (!active || !gl) return;

    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = canvas.clientWidth * dpr;
    var h = canvas.clientHeight * dpr;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
    gl.viewport(0, 0, w, h);

    var time = (performance.now() - startTime) / 1000;
    var cam = CAMS[camMode] || CAMS.orbit;

    if (cam.auto) camAngle += 0.003;
    var pitch = cam.pitch !== undefined ? cam.pitch : camPitch;
    var dist = cam.dist !== undefined ? cam.dist : camDist;
    var angle = cam.angle !== undefined ? cam.angle : camAngle;

    var cx = Math.cos(angle) * Math.cos(pitch) * dist;
    var cy = Math.sin(pitch) * dist + 1.0;
    var cz = Math.sin(angle) * Math.cos(pitch) * dist;

    updateProgress();

    var u = function(name) { return gl.getUniformLocation(program, name); };
    gl.uniform1f(u('t'), time);
    gl.uniform1f(u('ar'), w / h);
    gl.uniform2f(u('res'), w, h);
    gl.uniform3f(u('cam'), cx, cy, cz);
    gl.uniform1f(u('pr_site'), progress.site);
    gl.uniform1f(u('pr_fnd'), progress.foundation);
    gl.uniform1f(u('pr_rx'), progress.reactor);
    gl.uniform1f(u('pr_ct'), progress.containment);
    gl.uniform1f(u('pr_tb'), progress.turbine);
    gl.uniform1f(u('pr_cool'), progress.cooling);
    gl.uniform1f(u('pr_aux'), progress.aux);
    gl.uniform1f(u('pr_crane'), progress.crane);
    gl.uniform1f(u('pr_pipe'), progress.pipes);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    animFrame = requestAnimationFrame(render);
  }

  function start(cvs) {
    var glOk = false;
    try { glOk = initGL(cvs); } catch (e) { glOk = false; }
    if (!glOk) {
      // Replace canvas with a fresh one for 2D fallback
      var parent = cvs.parentElement;
      var newCvs = document.createElement('canvas');
      newCvs.id = cvs.id;
      newCvs.style.cssText = cvs.style.cssText;
      parent.replaceChild(newCvs, cvs);
      startFallback(newCvs);
      return;
    }
    active = true;
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('wheel', onWheel);
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd);
    render();
  }

  function stop() {
    active = false;
    if (animFrame) cancelAnimationFrame(animFrame);
    if (canvas) {
      canvas.removeEventListener('mousedown', onMouseDown);
      canvas.removeEventListener('mousemove', onMouseMove);
      canvas.removeEventListener('mouseup', onMouseUp);
      canvas.removeEventListener('wheel', onWheel);
    }
  }

  // ── Fallback 2D renderer (no WebGL) ──
  function startFallback(cvs) {
    canvas = cvs;
    active = true;
    renderFallback();
  }

  function renderFallback() {
    if (!active) return;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = canvas.clientWidth;
    var h = canvas.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    var c = canvas.getContext('2d');
    if (!c) { animFrame = requestAnimationFrame(renderFallback); return; }
    c.scale(dpr, dpr);

    updateProgress();
    var time = performance.now() / 1000;
    var simM = (typeof ACE_UI !== 'undefined' && ACE_UI.getSimMonth) ? ACE_UI.getSimMonth() : 0;
    var pctDone = (typeof ACE !== 'undefined') ? ACE.summary().percent : 0;

    // Light paper background
    c.fillStyle = '#f0ede6';
    c.fillRect(0, 0, w, h);

    // Subtle grid (isometric)
    c.strokeStyle = 'rgba(0,0,0,.04)';
    c.lineWidth = 0.5;
    var gs = 30;
    for (var gx = 0; gx < w; gx += gs) { c.beginPath(); c.moveTo(gx, 0); c.lineTo(gx, h); c.stroke(); }
    for (var gy = 0; gy < h; gy += gs) { c.beginPath(); c.moveTo(0, gy); c.lineTo(w, gy); c.stroke(); }

    var groundY = h * 0.68;
    var cx = w * 0.40;
    var s = Math.min(w, h) * 0.0032;

    // Isometric helpers
    var ISO_ANGLE = 0.46;
    var cosA = Math.cos(ISO_ANGLE), sinA = Math.sin(ISO_ANGLE);
    function isoX(x, z) { return cx + (x * cosA - z * cosA) * s; }
    function isoY(x, z, y) { return groundY + (x * sinA + z * sinA) * s * 0.5 - y * s; }

    // Ground line
    c.strokeStyle = 'rgba(168,64,31,.4)';
    c.lineWidth = 1;
    c.setLineDash([8, 4]);
    c.beginPath(); c.moveTo(0, groundY); c.lineTo(w, groundY); c.stroke();
    c.setLineDash([]);

    // -- Isometric 3D box drawing --
    function isoBox(bx, bz, bw, bd, bh, prog, color, label) {
      var ghostAlpha = 0.15 + 0.08 * Math.sin(time * 1.5);
      var h2 = bh * Math.max(0.001, prog);
      // 4 base corners
      var fl = [isoX(bx - bw/2, bz - bd/2), isoY(bx - bw/2, bz - bd/2, 0)];
      var fr = [isoX(bx + bw/2, bz - bd/2), isoY(bx + bw/2, bz - bd/2, 0)];
      var bl = [isoX(bx - bw/2, bz + bd/2), isoY(bx - bw/2, bz + bd/2, 0)];
      var br = [isoX(bx + bw/2, bz + bd/2), isoY(bx + bw/2, bz + bd/2, 0)];
      // 4 top corners
      var tfl = [isoX(bx - bw/2, bz - bd/2), isoY(bx - bw/2, bz - bd/2, h2)];
      var tfr = [isoX(bx + bw/2, bz - bd/2), isoY(bx + bw/2, bz - bd/2, h2)];
      var tbl = [isoX(bx - bw/2, bz + bd/2), isoY(bx - bw/2, bz + bd/2, h2)];
      var tbr = [isoX(bx + bw/2, bz + bd/2), isoY(bx + bw/2, bz + bd/2, h2)];

      // Ghost outline (always)
      c.strokeStyle = 'rgba(168,130,90,' + ghostAlpha + ')';
      c.lineWidth = 1;
      c.setLineDash([5, 4]);
      var gh = bh;
      var gfl = [fl[0], isoY(bx-bw/2,bz-bd/2,gh)];
      var gfr = [fr[0], isoY(bx+bw/2,bz-bd/2,gh)];
      var gbr = [br[0], isoY(bx+bw/2,bz+bd/2,gh)];
      c.beginPath(); c.moveTo(fl[0],fl[1]); c.lineTo(fr[0],fr[1]); c.lineTo(gfr[0],gfr[1]); c.lineTo(gfl[0],gfl[1]); c.closePath(); c.stroke();
      c.beginPath(); c.moveTo(fr[0],fr[1]); c.lineTo(br[0],br[1]); c.lineTo(gbr[0],gbr[1]); c.lineTo(gfr[0],gfr[1]); c.closePath(); c.stroke();
      c.setLineDash([]);

      if (prog > 0.01) {
        // Front face
        c.fillStyle = color;
        c.globalAlpha = 0.7;
        c.beginPath(); c.moveTo(fl[0],fl[1]); c.lineTo(fr[0],fr[1]); c.lineTo(tfr[0],tfr[1]); c.lineTo(tfl[0],tfl[1]); c.closePath(); c.fill();
        // Right face (darker)
        c.globalAlpha = 0.5;
        c.beginPath(); c.moveTo(fr[0],fr[1]); c.lineTo(br[0],br[1]); c.lineTo(tbr[0],tbr[1]); c.lineTo(tfr[0],tfr[1]); c.closePath(); c.fill();
        // Top face (lighter)
        c.globalAlpha = 0.85;
        c.beginPath(); c.moveTo(tfl[0],tfl[1]); c.lineTo(tfr[0],tfr[1]); c.lineTo(tbr[0],tbr[1]); c.lineTo(tbl[0],tbl[1]); c.closePath(); c.fill();
        c.globalAlpha = 1;
        // Edges
        c.strokeStyle = 'rgba(0,0,0,.15)';
        c.lineWidth = 1;
        c.beginPath(); c.moveTo(tfl[0],tfl[1]); c.lineTo(tfr[0],tfr[1]); c.lineTo(tbr[0],tbr[1]); c.lineTo(tbl[0],tbl[1]); c.closePath(); c.stroke();
        c.beginPath(); c.moveTo(fl[0],fl[1]); c.lineTo(tfl[0],tfl[1]); c.stroke();
        c.beginPath(); c.moveTo(fr[0],fr[1]); c.lineTo(tfr[0],tfr[1]); c.stroke();
        c.beginPath(); c.moveTo(br[0],br[1]); c.lineTo(tbr[0],tbr[1]); c.stroke();
      }
      // Label
      var lx = isoX(bx, bz - bd/2 - 8);
      var ly = isoY(bx, bz - bd/2 - 8, 0) + 4;
      c.fillStyle = prog > 0.1 ? '#5a5448' : 'rgba(138,133,120,.4)';
      c.font = Math.max(9, 8 * s) + 'px IBM Plex Mono, monospace';
      c.textAlign = 'center';
      c.fillText(label, lx, ly);
      if (prog > 0.05) {
        c.fillStyle = color;
        c.fillText(Math.round(prog * 100) + '%', isoX(bx, bz), isoY(bx, bz, h2) - 6);
      }
    }

    // Isometric ground plane
    c.fillStyle = 'rgba(0,0,0,.03)';
    c.beginPath();
    c.moveTo(isoX(-120, -80), isoY(-120, -80, 0));
    c.lineTo(isoX(180, -80), isoY(180, -80, 0));
    c.lineTo(isoX(180, 80), isoY(180, 80, 0));
    c.lineTo(isoX(-120, 80), isoY(-120, 80, 0));
    c.closePath(); c.fill();
    c.strokeStyle = 'rgba(168,64,31,.15)'; c.lineWidth = 1; c.setLineDash([6,4]); c.stroke(); c.setLineDash([]);

    // Buildings (back to front for proper overlap)
    // Cooling Towers (far right, back)
    isoBox(160, 30, 25, 25, 90, progress.cooling, 'rgb(107,76,154)', 'CT-2');
    isoBox(160, -30, 25, 25, 90, progress.cooling, 'rgb(107,76,154)', 'CT-1');

    // Turbine Building (right)
    isoBox(60, 0, 80, 50, 55, progress.turbine, 'rgb(44,93,120)', 'TB');

    // Auxiliary Building (front left)
    isoBox(-40, 40, 35, 30, 30, progress.aux, 'rgb(184,134,11)', 'AUX');

    // Reactor Building (left, tall)
    isoBox(-60, 0, 50, 50, 120, progress.reactor, 'rgb(168,64,31)', 'RB');

    // Containment dome on top of reactor
    if (progress.containment > 0.05) {
      var dCx = isoX(-60, 0), dCy = isoY(-60, 0, 120 * progress.reactor);
      var dR = 22 * s * progress.containment;
      c.fillStyle = 'rgba(168,64,31,.45)';
      c.beginPath(); c.arc(dCx, dCy, dR, 0, Math.PI * 2); c.fill();
      c.strokeStyle = 'rgba(242,236,223,.3)'; c.lineWidth = 1;
      c.beginPath(); c.arc(dCx, dCy, dR, 0, Math.PI * 2); c.stroke();
    }

    // Crane (center, tallest)
    var crBase = [isoX(10, -10), isoY(10, -10, 0)];
    var crTopH = 160 * (progress.crane > 0 ? progress.crane : 1);
    var crTop = [isoX(10, -10), isoY(10, -10, crTopH)];
    c.strokeStyle = progress.crane > 0 ? 'rgba(168,64,31,.8)' : 'rgba(154,144,119,.12)';
    c.lineWidth = progress.crane > 0 ? 2 : 1;
    if (progress.crane <= 0) c.setLineDash([4, 3]);
    c.beginPath(); c.moveTo(crBase[0], crBase[1]); c.lineTo(crTop[0], crTop[1]); c.stroke();
    // Boom
    var boomL = [isoX(-60, -10), isoY(-60, -10, crTopH)];
    var boomR = [isoX(80, -10), isoY(80, -10, crTopH)];
    c.beginPath(); c.moveTo(boomL[0], boomL[1]); c.lineTo(boomR[0], boomR[1]); c.stroke();
    c.setLineDash([]);
    // Swinging cable
    if (progress.crane > 0) {
