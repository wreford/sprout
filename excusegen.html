*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:700px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}a.home:hover{text-decoration:underline}
h1{font-size:1.5em;margin:8px 0 4px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin:10px 0}
.cat{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--accent);color:#fff;margin-bottom:8px}
.excuse-text{font-size:1.15em;line-height:1.5;margin:8px 0}
.meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--dim);margin:8px 0}
.stars{color:#fbbf24}.risk{color:#ef4444}
button{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700}button:hover{opacity:.85}
.bigbtn{width:100%;padding:18px;font-size:1.3em;border-radius:12px;margin:12px 0;text-transform:uppercase;letter-spacing:1px}
.sm{padding:6px 14px;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text)}
.counter{text-align:center;color:var(--dim);font-size:13px;margin:4px 0}
.email{background:#111;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;white-space:pre-wrap;line-height:1.6;margin:8px 0;display:none}
.hof{margin:12px 0}.hof-item{padding:8px;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center}
.hof-item .del{color:var(--dim);cursor:pointer;font-size:11px}

<a class="home" href="index.html">&larr; home</a>
<h1>&#x1f6a7; Construction Delay Excuse Generator</h1>
<p style="color:var(--dim);font-size:13px">Because "stuff happens" isn't professional enough</p>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
    <button class="sm" onclick="showEmail()">&#x1f4e7; Email Draft</button>
    <button class="sm" onclick="saveHOF()">&#x2b50; Hall of Fame</button>
    <button class="sm" onclick="copyExcuse()">&#x1f4cb; Copy</button>
  </div>
  <div class="email" id="emailBox"></div>
</div>

let cnt=+(localStorage.getItem('excuse_cnt')||0),cur=null,hof=JSON.parse(localStorage.getItem('excuse_hof')||'[]');
document.getElementById('cnt').textContent=cnt;
function stars(n){return '&#9733;'.repeat(n)+'&#9734;'.repeat(5-n)}
function generate(){
  cur=E[Math.floor(Math.random()*E.length)];cnt++;localStorage.setItem('excuse_cnt',cnt);
  document.getElementById('cnt').textContent=cnt;
  document.getElementById('out').style.display='block';
  document.getElementById('oCat').textContent=cur[0].toUpperCase();
  document.getElementById('oTxt').textContent=cur[1];
  document.getElementById('oDays').textContent=cur[2];
  document.getElementById('oBel').innerHTML=stars(cur[3]);
  document.getElementById('oRisk').innerHTML=stars(cur[4]);
  document.getElementById('emailBox').style.display='none';
}
function showEmail(){
  if(!cur)return;const el=document.getElementById('emailBox');el.style.display=el.style.display==='none'?'block':'none';
  el.textContent=`Subject: Schedule Impact Notice — ${cur[0].charAt(0).toUpperCase()+cur[0].slice(1)} Delay\n\nDear Project Team,\n\nPlease be advised that we have encountered an unforeseen circumstance that will impact the current project schedule.\n\nDescription: ${cur[1]}\n\nAnticipated Impact: ${cur[2]} working day(s)\nCategory: ${cur[0].charAt(0).toUpperCase()+cur[0].slice(1)}\n\nWe are actively working to mitigate the impact and will provide updates as the situation develops. Please reference the project schedule for revised milestone dates.\n\nWe appreciate your understanding and patience.\n\nRegards,\n[Your Name]\n[Your Title]\n[Company Name]`;
}
function saveHOF(){if(!cur)return;hof.unshift(cur[1]);if(hof.length>10)hof.pop();localStorage.setItem('excuse_hof',JSON.stringify(hof));renderHOF()}
function copyExcuse(){if(cur)navigator.clipboard.writeText(cur[1])}
function renderHOF(){const el=document.getElementById('hof');if(!hof.length){el.innerHTML='<div style="color:var(--dim);font-size:13px;padding:8px">No saved excuses yet</div>';return}
  el.innerHTML=hof.map((h,i)=>`<div class="hof-item"><span>${h}</span><span class="del" onclick="delHOF(${i})">&#x2716;</span></div>`).join('')}
function delHOF(i){hof.splice(i,1);localStorage.setItem('excuse_hof',JSON.stringify(hof));renderHOF()}
