<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="TurfLoop — claim territory by running closed loops. You vs an AI. Winner has the most land at end.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23000814'/%3E%3Cpath d='M8 20 L14 8 L22 22 L18 14 L12 22 Z' fill='none' stroke='%2330d158' stroke-width='2'/%3E%3C/svg%3E">
<title>TurfLoop · claim territory by loops</title>
<style>
:root{
  --bg:#050810; --bg2:#0a0d18; --panel:#12141f; --panel2:#1a1d2b; --border:#22263a; --border2:#2e344a;
  --text:#f5f5f7; --dim:#8a8a98; --dimmer:#5a5a68; --faint:#3a3a48;
  --you:#30d158; --you-dim:#0a5a24; --you-glow:rgba(48,209,88,.4);
  --ai:#ff375f; --ai-dim:#6a0a20; --ai-glow:rgba(255,55,95,.4);
  --gold:#ffcc00; --violet:#bf5af2; --cyan:#5ee7f0;
  --disp:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;overscroll-behavior:none;touch-action:manipulation}
body{position:fixed;inset:0;height:100dvh}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input,select,textarea{font-family:inherit;color:inherit;font-size:16px}
::selection{background:rgba(48,209,88,.3);color:#fff}
:root{--top-h:56px}

/* ══════ Top ══════ */
.top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  height:calc(var(--top-h) + env(safe-area-inset-top));
  padding:env(safe-area-inset-top) max(14px,env(safe-area-inset-right)) 0 max(14px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:linear-gradient(180deg,rgba(10,13,24,.92),rgba(10,13,24,.55));
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;flex-shrink:0}
.mark{width:36px;height:36px;border-radius:9px;background:radial-gradient(circle at 30% 30%,var(--you),#0a5a24);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:12px;color:#000;border:1px solid var(--you-dim);position:relative}
.mark::before{content:"⤴";}
.wordmark{display:flex;flex-direction:column;line-height:1;gap:3px}
.wordmark .n{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.01em}
.wordmark .n .lp{color:var(--you)}
.wordmark .t{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase}

.top-mid{flex:1;display:flex;justify-content:center;gap:22px;font-family:var(--mono);font-size:11.5px;min-width:0}
@media(max-width:640px){.top-mid{gap:10px}.top-mid .score .v{font-size:17px}.top-mid .timer{padding:5px 8px;font-size:10.5px}}
@media(max-width:520px){
  /* When score strip is showing, hide wordmark text to make room */
  body.in-game .wordmark{display:none}
  body.in-game .brand{flex-shrink:1;min-width:0}
  .top-mid .score .lbl{font-size:8.5px}
  .top-mid .score .v{font-size:15px}
  .top-mid .score .u{font-size:8px}
  .top-mid{gap:6px}
}
@media(max-width:420px){.wordmark .t{display:none}.wordmark .n{font-size:17px}}
.score{display:flex;flex-direction:column;line-height:1.1;align-items:center;gap:2px}
.score .lbl{font-size:9.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
.score .v{font-family:var(--disp);font-weight:900;font-size:22px;letter-spacing:-.01em}
.score.you .v{color:var(--you);text-shadow:0 0 12px var(--you-glow)}
.score.ai .v{color:var(--ai);text-shadow:0 0 12px var(--ai-glow)}
.score .u{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.1em;margin-left:3px}

.top-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{width:36px;height:36px;border-radius:9px;background:var(--panel);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;text-decoration:none}
.icon-btn:hover{border-color:var(--border2);color:var(--you)}

.timer{
  font-family:var(--mono);padding:6px 14px;border-radius:20px;
  background:var(--panel);border:1px solid var(--border);color:var(--text);
  display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;letter-spacing:.04em
}
.timer.active{background:linear-gradient(135deg,rgba(48,209,88,.15),rgba(191,90,242,.08));border-color:rgba(48,209,88,.4);color:var(--you)}
.timer.warn{background:rgba(255,204,0,.1);border-color:rgba(255,204,0,.35);color:var(--gold)}
.timer.crit{background:rgba(255,55,95,.1);border-color:rgba(255,55,95,.35);color:var(--ai)}
.timer .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}

/* ══════ Side ══════ */
.side{
  position:fixed;z-index:15;
  top:calc(var(--top-h) + env(safe-area-inset-top) + 12px);
  left:calc(env(safe-area-inset-left) + 12px);
  width:340px;
  max-height:calc(100dvh - var(--top-h) - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 24px);
  overflow-y:auto;padding:16px 14px 20px;
  background:rgba(12,14,25,.86);
  border:1px solid var(--border);border-radius:14px;
  backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);
  box-shadow:0 22px 60px rgba(0,0,0,.55);
}
.side::-webkit-scrollbar{width:8px}
.side::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.side.hidden{display:none}

/* Mobile drawer */
@media(max-width:900px){
  .side{
    top:auto;left:0;right:0;bottom:0;width:auto;
    max-height:calc(72dvh - env(safe-area-inset-bottom));
    padding:8px 16px calc(20px + env(safe-area-inset-bottom));
    border-radius:18px 18px 0 0;
    border-bottom:none;border-left:none;border-right:none;
    transition:transform .32s var(--ease);
    box-shadow:0 -18px 44px rgba(0,0,0,.55);
    overscroll-behavior:contain;
  }
  .side::before{
    content:'';display:block;width:38px;height:4px;border-radius:2px;
    background:var(--border2);margin:4px auto 10px;
  }
  .side.collapsed{transform:translateY(calc(100% - 46px))}
}
.side-toggle{
  display:none;position:fixed;z-index:16;
  bottom:calc(env(safe-area-inset-bottom) + 14px);
  right:calc(env(safe-area-inset-right) + 14px);
  min-width:52px;height:52px;padding:0 16px;border-radius:26px;
  background:linear-gradient(135deg,var(--you),#0a5a24);color:#000;
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  box-shadow:0 10px 26px rgba(48,209,88,.4);
  align-items:center;justify-content:center;gap:6px;
}
@media(max-width:900px){.side-toggle.show{display:inline-flex}}

/* Setup panel */
.setup h3{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--dim);
  text-transform:uppercase;margin-bottom:10px;font-weight:600
}
.duration-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:16px}
.dur-opt{
  padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:9px;
  cursor:pointer;transition:all .15s;text-align:left
}
.dur-opt:hover{border-color:var(--border2)}
.dur-opt.on{background:linear-gradient(135deg,rgba(48,209,88,.12),rgba(48,209,88,.02));border-color:rgba(48,209,88,.4)}
.dur-opt .n{font-family:var(--disp);font-weight:600;font-size:14px;margin-bottom:3px}
.dur-opt .d{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.04em}

.setup-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.setup-row .lbl{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.setup-row select{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-family:var(--mono);font-size:11.5px}

.big-cta{
  width:100%;padding:14px;margin-top:16px;background:linear-gradient(135deg,var(--you),#0a5a24);
  border:none;border-radius:10px;color:#000;font-family:var(--disp);font-weight:900;font-size:16px;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 6px 18px rgba(48,209,88,.3);letter-spacing:-.005em
}
.big-cta:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(48,209,88,.4)}
.big-cta:active{transform:translateY(0)}

/* Playing panel */
.play-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.play-hdr h3{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:-.01em;color:var(--text)}
.play-hdr .badge{font-family:var(--mono);font-size:9.5px;color:var(--you);letter-spacing:.15em;text-transform:uppercase;padding:2px 8px;background:rgba(48,209,88,.08);border:1px solid rgba(48,209,88,.3);border-radius:12px}

.instructions{
  padding:12px;background:var(--panel);border-left:3px solid var(--you);border-radius:0 8px 8px 0;
  font-size:13px;line-height:1.55;color:var(--text-dim);margin-bottom:14px
}
.instructions b{color:var(--you);font-weight:600}

.gps-toggle{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:12px}
.gps-toggle button{
  flex:1;padding:7px 10px;font-family:var(--mono);font-size:11px;color:var(--dim);
  letter-spacing:.06em;border-radius:6px;cursor:pointer;transition:all .15s;text-transform:uppercase
}
.gps-toggle button.on{background:var(--you);color:#000;font-weight:600}

.loops-list{margin-top:16px}
.loops-list h3{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin-bottom:10px;font-weight:600;display:flex;justify-content:space-between}
.loop-card{
  padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;
  margin-bottom:6px;font-size:12.5px;cursor:pointer;transition:border-color .15s
}
.loop-card:hover{border-color:var(--border2)}
.loop-card.you{border-left:3px solid var(--you)}
.loop-card.ai{border-left:3px solid var(--ai)}
.loop-card .n{font-family:var(--disp);font-weight:600;font-size:13px;margin-bottom:2px}
.loop-card .m{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.03em}
.loop-card .m .who{color:var(--you)}
.loop-card.ai .m .who{color:var(--ai)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.stat{padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:8px}
.stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin-bottom:3px}
.stat .v{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:-.01em}
.stat.you .v{color:var(--you)}
.stat.ai .v{color:var(--ai)}

/* Achievements */
.ach-block{margin-top:20px}
.ach{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;
  transition:all .15s;opacity:.5
}
.ach.unlocked{opacity:1;background:linear-gradient(135deg,rgba(255,204,0,.06),var(--panel));border-color:rgba(255,204,0,.3)}
.ach .ic{width:28px;height:28px;border-radius:7px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ach.unlocked .ic{background:linear-gradient(135deg,var(--gold),#c99a00);color:#000}
.ach .info{flex:1;min-width:0}
.ach .n{font-family:var(--disp);font-weight:600;font-size:13.5px;line-height:1.15;margin-bottom:2px}
.ach .d{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.02em;line-height:1.35}

/* Actions */
.side-actions{display:flex;gap:6px;margin-top:14px}
.side-actions .btn{
  flex:1;padding:8px 10px;background:var(--panel);border:1px solid var(--border);
  border-radius:7px;color:var(--text-dim);font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
  cursor:pointer;transition:all .15s;text-transform:uppercase
}
.side-actions .btn:hover{border-color:var(--border2);color:var(--text)}
.side-actions .btn.danger{color:var(--ai);border-color:rgba(255,55,95,.25)}
.side-actions .btn.danger:hover{background:rgba(255,55,95,.08);border-color:var(--ai)}

/* ══════ Map ══════ */
.map{position:fixed;inset:0;z-index:1;background:#000}
#map{position:absolute;inset:0;width:100%;height:100%;background:#000}
.leaflet-container{background:#0a0d18 !important;font-family:var(--sans)}
/* Dark themed tile hue-shift */
.leaflet-tile{filter:brightness(0.7) contrast(1.05) invert(0.92) hue-rotate(180deg) saturate(0.65)}
/* leaflet controls dark */
.leaflet-bar{border:1px solid var(--border2) !important;background:var(--panel) !important;box-shadow:0 4px 12px rgba(0,0,0,.5) !important}
.leaflet-bar a{background:var(--panel) !important;color:var(--text) !important;border-bottom:1px solid var(--border) !important}
.leaflet-bar a:hover{background:var(--panel2) !important;color:var(--you) !important}
.leaflet-control-attribution{background:rgba(0,0,0,.6) !important;color:var(--dim) !important;font-size:9px !important}
.leaflet-control-attribution a{color:var(--dim) !important}
/* keep leaflet controls out from under top nav / mobile drawer */
.leaflet-top{top:calc(var(--top-h) + env(safe-area-inset-top) + 8px) !important}
.leaflet-left{left:calc(env(safe-area-inset-left) + 8px) !important}
.leaflet-right{right:calc(env(safe-area-inset-right) + 8px) !important}
.leaflet-bottom{bottom:calc(env(safe-area-inset-bottom) + 8px) !important}
@media(min-width:901px){.leaflet-top.leaflet-left{left:calc(env(safe-area-inset-left) + 366px) !important}}

.map-overlay{
  position:fixed;top:calc(var(--top-h) + env(safe-area-inset-top) + 12px);
  left:50%;transform:translateX(-50%);z-index:18;
  background:rgba(10,13,24,.9);border:1px solid var(--border2);border-radius:22px;
  padding:8px 16px;font-family:var(--mono);font-size:11.5px;color:var(--text);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  letter-spacing:.04em;display:flex;align-items:center;gap:10px;pointer-events:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:calc(100vw - 32px);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis
}
@media(min-width:901px){.map-overlay{left:calc(env(safe-area-inset-left) + 366px + (100vw - env(safe-area-inset-left) - env(safe-area-inset-right) - 366px)/2);transform:translateX(-50%)}}
.map-overlay .dot{width:8px;height:8px;border-radius:50%;background:var(--you);animation:pulse 1.5s infinite}
.map-overlay b{color:var(--you)}

.finish-loop{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 20px);
  left:50%;transform:translateX(-50%);z-index:18;
  padding:14px 26px;min-height:48px;background:linear-gradient(135deg,var(--you),#0a5a24);
  color:#000;border:none;border-radius:26px;font-family:var(--disp);font-weight:700;font-size:15px;
  cursor:pointer;box-shadow:0 8px 24px rgba(48,209,88,.4);
  display:none;align-items:center;gap:10px;letter-spacing:-.005em
}
.finish-loop.show{display:inline-flex}
.finish-loop:hover{transform:translateX(-50%) scale(1.03)}
.finish-loop:disabled{opacity:.4;cursor:not-allowed}

.cancel-btn{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 20px);
  right:calc(env(safe-area-inset-right) + 20px);z-index:18;
  padding:10px 16px;min-height:44px;background:rgba(10,13,24,.9);border:1px solid var(--border2);
  color:var(--dim);border-radius:20px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
  cursor:pointer;text-transform:uppercase;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)
}
.cancel-btn:hover{color:var(--ai);border-color:var(--ai)}

/* Popup */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{
  background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--border2);
  border-radius:16px;max-width:520px;width:100%;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7);
  animation:pop .3s var(--ease)
}
@keyframes pop{0%{opacity:0;transform:scale(.96) translateY(8px)}100%{opacity:1;transform:none}}
.modal-hdr{padding:24px 28px 8px;text-align:center}
.modal-hdr .k{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;font-weight:600}
.modal-hdr h2{font-family:var(--disp);font-weight:900;font-size:28px;letter-spacing:-.02em;margin-bottom:6px}
.modal-hdr .sub{color:var(--dim);font-size:14px;line-height:1.5}
.modal-body{padding:18px 28px 24px}
.winner-scores{display:flex;justify-content:center;gap:24px;padding:20px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px}
.winner-scores .side-score{text-align:center}
.winner-scores .side-score .name{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.winner-scores .side-score.you .name{color:var(--you)}
.winner-scores .side-score.ai .name{color:var(--ai)}
.winner-scores .side-score .val{font-family:var(--disp);font-weight:900;font-size:36px;letter-spacing:-.02em}
.winner-scores .side-score.you .val{color:var(--you)}
.winner-scores .side-score.ai .val{color:var(--ai)}
.winner-scores .side-score .u{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:2px}
.modal-actions{display:flex;gap:8px}
.modal-actions button{
  flex:1;padding:12px 14px;border-radius:8px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;font-weight:600
}
.modal-actions .primary{background:linear-gradient(135deg,var(--you),#0a5a24);color:#000;border:none}
.modal-actions .secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text)}

/* ══════ VS mode ══════ */
.mode-tabs{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px;gap:2px}
.mode-tabs button{
  flex:1;padding:9px 8px;font-family:var(--mono);font-size:11px;color:var(--dim);
  letter-spacing:.08em;border-radius:7px;cursor:pointer;transition:all .15s;text-transform:uppercase;
  min-height:38px
}
.mode-tabs button.on{background:var(--you);color:#000;font-weight:700}
.mode-tabs button.on.vs{background:linear-gradient(135deg,var(--violet),#7c3aed);color:#fff}

.vs-block{margin-top:4px}
.vs-input{
  width:100%;padding:10px 12px;background:var(--panel);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:var(--mono);font-size:12px;
  margin-bottom:8px;min-height:44px
}
.vs-input:focus{outline:none;border-color:var(--violet)}
.vs-textarea{
  width:100%;padding:10px 12px;background:var(--panel);border:1px solid var(--border);
  border-radius:9px;color:var(--text);font-family:var(--mono);font-size:11px;
  min-height:80px;resize:vertical;margin-bottom:8px;word-break:break-all
}

.vs-btn{
  width:100%;padding:12px;margin-top:8px;
  background:linear-gradient(135deg,var(--violet),#7c3aed);border:none;border-radius:10px;
  color:#fff;font-family:var(--disp);font-weight:700;font-size:15px;
  cursor:pointer;box-shadow:0 6px 18px rgba(191,90,242,.3);min-height:48px
}
.vs-btn.ghost{
  background:var(--panel);color:var(--text);border:1px solid var(--border);

.vs-hud{

}
.vs-hud .btn{

}
.vs-hud .btn.vs-primary{border-color:rgba(191,90,242,.35);color:var(--violet)}
.vs-hud .btn:hover{border-color:var(--border2)}

.vs-sync-status{

.score.vs .v{color:var(--violet);text-shadow:0 0 12px rgba(191,90,242,.4)}

/* Share modal */
.share-code{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:10px;font-family:var(--mono);font-size:11px;color:var(--text);
  word-break:break-all;max-height:120px;overflow-y:auto;margin-bottom:10px;
  line-height:1.5
}
.share-url{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:12px;font-family:var(--mono);font-size:11.5px;color:var(--you);
  word-break:break-all;margin-bottom:10px;line-height:1.5
}
.share-row{display:flex;gap:6px;margin-top:8px}
.share-row button{
  flex:1;padding:10px;background:var(--panel2);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--mono);font-size:11px;
  letter-spacing:.06em;cursor:pointer;text-transform:uppercase;font-weight:600;min-height:42px
}
.share-row button.primary{background:linear-gradient(135deg,var(--violet),#7c3aed);color:#fff;border:none}
.share-row button:hover{border-color:var(--border2)}
.share-hint{

/* Toast */
.toast{
  position:fixed;top:70px;left:50%;transform:translate(-50%,-20px);
  background:rgba(0,0,0,.9);color:#fff;padding:10px 18px;border-radius:22px;
  font-family:var(--mono);font-size:12px;z-index:300;opacity:0;pointer-events:none;
  transition:all .25s var(--ease);border:1px solid var(--border2);box-shadow:0 12px 32px rgba(0,0,0,.5);
  letter-spacing:.04em
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.gold{border-color:var(--gold);color:var(--gold)}
.toast.you{border-color:var(--you);color:var(--you)}
.toast.ai{border-color:var(--ai);color:var(--ai)}

/* ══════ Tutorial ══════ */
.tut-bg{
  position:fixed;inset:0;background:radial-gradient(circle at 50% 30%,rgba(48,209,88,.08),rgba(0,0,0,.85) 60%);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  z-index:500;display:none;align-items:center;justify-content:center;
  padding:max(20px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));
  overflow-y:auto
}
.tut-bg.show{display:flex}
.tut-card{
  width:100%;max-width:460px;
  background:linear-gradient(180deg,rgba(26,29,43,.98),rgba(10,13,24,.98));
  border:1px solid var(--border2);border-radius:20px;
  box-shadow:0 32px 90px rgba(0,0,0,.75),0 0 0 1px rgba(48,209,88,.08);
  overflow:hidden;animation:pop .35s var(--ease);
  display:flex;flex-direction:column
}
.tut-skip{
  position:absolute;top:calc(max(20px,env(safe-area-inset-top)) + 6px);
  right:calc(max(20px,env(safe-area-inset-right)) + 6px);
  padding:8px 14px;min-height:36px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);background:rgba(18,20,31,.7);border:1px solid var(--border);border-radius:20px;
  cursor:pointer;transition:all .15s
}
.tut-skip:hover{color:var(--text);border-color:var(--border2)}
.tut-visual{
  height:180px;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 60%,rgba(48,209,88,.09),transparent 65%),linear-gradient(180deg,#0a0d18,#050810);
  border-bottom:1px solid var(--border);position:relative;overflow:hidden
}
.tut-visual .icon{font-size:64px;filter:drop-shadow(0 4px 24px rgba(48,209,88,.4))}
.tut-visual svg{max-width:100%;max-height:100%}
.tut-body{padding:22px 26px 8px;text-align:center}
.tut-kicker{
  font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--you);
  text-transform:uppercase;margin-bottom:10px;font-weight:600
}
.tut-title{
  font-family:var(--disp);font-weight:900;font-size:26px;line-height:1.15;letter-spacing:-.02em;
  color:var(--text);margin-bottom:10px
}
.tut-desc{
  color:var(--dim);font-size:14.5px;line-height:1.55;
  max-width:360px;margin:0 auto 4px
}
.tut-desc b{color:var(--text);font-weight:600}
.tut-desc .lp{color:var(--you)}
.tut-desc .ai-hi{color:var(--ai)}
.tut-desc .gold-hi{color:var(--gold)}
.tut-mini-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px auto 0;max-width:360px
}
.tut-mini{
  padding:12px 10px;background:rgba(18,20,31,.7);border:1px solid var(--border);border-radius:10px;
  text-align:left
}
.tut-mini .ic{font-size:20px;margin-bottom:4px;display:block}
.tut-mini .n{font-family:var(--disp);font-weight:600;font-size:13.5px;line-height:1.15;margin-bottom:2px}

.tut-dur-strip{
  display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:14px auto 0;max-width:360px
}
.tut-dur{
  padding:6px 11px;background:rgba(18,20,31,.7);border:1px solid var(--border);border-radius:14px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--dim);text-transform:uppercase
}
.tut-dur.hi{color:var(--you);border-color:rgba(48,209,88,.4);background:rgba(48,209,88,.06)}
.tut-ach-strip{
  display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:14px auto 0;max-width:340px
}
.tut-ach-strip .a{
  width:30px;height:30px;border-radius:8px;background:var(--panel2);
  display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);
  border:1px solid var(--border)
}
.tut-ach-strip .a.hi{background:linear-gradient(135deg,var(--gold),#c99a00);color:#000;border-color:var(--gold)}
.tut-foot{
  padding:16px 22px 20px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:12px;
  padding-bottom:max(20px,calc(env(safe-area-inset-bottom) + 8px))
}
.tut-dots{display:flex;justify-content:center;gap:8px}
.tut-dots .d{
  width:7px;height:7px;border-radius:50%;background:var(--faint);
  transition:all .2s var(--ease)
}
.tut-dots .d.on{background:var(--you);box-shadow:0 0 8px var(--you-glow);width:22px;border-radius:4px}
.tut-buttons{display:flex;gap:8px}
.tut-btn{
  flex:1;min-height:44px;padding:12px 14px;border-radius:10px;
  font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  cursor:pointer;transition:all .15s;border:1px solid var(--border);color:var(--text);background:var(--panel)
}
.tut-btn:hover{border-color:var(--border2)}
.tut-btn.primary{
  background:linear-gradient(135deg,var(--you),#0a5a24);color:#000;border:none;
  box-shadow:0 4px 14px rgba(48,209,88,.28)
}
.tut-btn.primary:hover{box-shadow:0 8px 22px rgba(48,209,88,.4);transform:translateY(-1px)}
.tut-btn:disabled{opacity:.35;cursor:not-allowed}

/* Loop-draw animation for step 3 */
.tut-loop-svg .edge{
  stroke:var(--you);stroke-width:2.5;fill:none;stroke-dasharray:6 5;
  stroke-dashoffset:400;animation:tutDraw 3s var(--ease) infinite
}
.tut-loop-svg .fill{fill:var(--you);opacity:0;animation:tutFill 3s var(--ease) infinite}
.tut-loop-svg .pt{fill:var(--you);opacity:0;animation:tutPt 3s var(--ease) infinite}
.tut-loop-svg .pt.p1{animation-delay:0s}
.tut-loop-svg .pt.p2{animation-delay:.5s}
.tut-loop-svg .pt.p3{animation-delay:1s}
.tut-loop-svg .pt.p4{animation-delay:1.5s}
.tut-loop-svg .pt.p5{animation-delay:2s}
@keyframes tutDraw{0%{stroke-dashoffset:400}70%{stroke-dashoffset:0}90%,100%{stroke-dashoffset:0}}
@keyframes tutFill{0%,70%{opacity:0}85%,100%{opacity:.18}}
@keyframes tutPt{0%{opacity:0;transform:scale(.4)}20%{opacity:1;transform:scale(1)}100%{opacity:1;transform:scale(1)}}

/* AI vs You mini-map for step 4 */
.tut-vs-svg .you-zone{fill:var(--you);opacity:.24;stroke:var(--you);stroke-width:1.5}
.tut-vs-svg .ai-zone{fill:var(--ai);opacity:.24;stroke:var(--ai);stroke-width:1.5;animation:tutFade 2.5s ease-in-out infinite}
@keyframes tutFade{0%,100%{opacity:.08}50%{opacity:.32}}

@media(max-width:520px){
  .tut-visual{height:150px}
  .tut-visual .icon{font-size:52px}
  .tut-title{font-size:22px}
  .tut-desc{font-size:14px}
  .tut-body{padding:18px 20px 6px}
  .tut-foot{padding:14px 18px 18px}
}
</style>
</head>
<body>

<nav class="top">
  <a href="/" class="brand" aria-label="Home">
    <div class="mark"></div>
    <div class="wordmark">
      <div class="n">Turf<span class="lp">Loop</span></div>
      <div class="t">claim by loops</div>
    </div>
  </a>
  <div class="top-mid" id="score-strip" style="display:none">
    <div class="score you"><span class="lbl" id="you-label">You</span><span class="v"><span id="you-area">0</span><span class="u">km²</span></span></div>
    <div class="timer" id="timer"><span class="dot"></span><span id="time-left">—</span></div>
    <div class="score ai" id="opp-score"><span class="lbl" id="opp-label">AI</span><span class="v"><span id="ai-area">0</span><span class="u">km²</span></span></div>
  </div>
  <div class="top-r">
    <button class="icon-btn" id="help-btn" title="How to play" aria-label="How to play">?</button>
    <a href="/" class="icon-btn" title="Home">⌂</a>
  </div>
</nav>

<aside class="side" id="side"></aside>
<button class="side-toggle" id="side-toggle" type="button" aria-label="Toggle panel">
  <span id="side-toggle-label">Menu</span>
</button>

<main class="map">
  <div id="map"></div>
  <div class="map-overlay" id="map-overlay" style="display:none">
    <span class="dot"></span>
    <span id="overlay-text">Click to place your first waypoint</span>
  </div>
  <button class="finish-loop" id="finish-loop">◇ Close the loop</button>
  <button class="cancel-btn" id="cancel-loop" style="display:none">Cancel</button>
</main>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<div class="tut-bg" id="tut-bg" role="dialog" aria-modal="true" aria-labelledby="tut-title">
  <button class="tut-skip" id="tut-skip" type="button">Skip</button>
  <div class="tut-card" id="tut-card"></div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════════════
   Config · game presets
   ═══════════════════════════════════════════════════════════════════════ */
const DURATIONS = [
  { id:'sprint',   n:'Sprint',   ms: 60*60*1000,          ai:'aggressive', d:'1 hour · fast AI' },
  { id:'evening',  n:'Evening',  ms: 4*60*60*1000,        ai:'aggressive', d:'4 hours' },
  { id:'day',      n:'Day',      ms: 24*60*60*1000,       ai:'balanced',   d:'24 hours' },
  { id:'week',     n:'Week',     ms: 7*24*60*60*1000,     ai:'balanced',   d:'7 days' },
  { id:'month',    n:'Month',    ms: 30*24*60*60*1000,    ai:'chill',      d:'30 days · slow AI' },
  { id:'year',     n:'Year',     ms: 365*24*60*60*1000,   ai:'chill',      d:'365 days' },
];

const ACHIEVEMENTS = [
  { id:'first-blood',   ic:'🎯', n:'First blood',          d:'Claim your first territory' },
  { id:'triangle',      ic:'△',  n:'Triangulate',          d:'Close a 3-point loop' },
  { id:'big-loop',      ic:'⬡',  n:'Big loop',             d:'Claim > 0.1 km² in one loop' },
  { id:'huge-loop',     ic:'⬢',  n:'Massive loop',         d:'Claim > 1 km² in one loop' },
  { id:'quintuple',     ic:'✦',  n:'Cartographer',         d:'Own 5 territories at once' },
  { id:'decagon',       ic:'⚡',  n:'Prolific',             d:'Own 10 territories at once' },
  { id:'landslide',     ic:'👑', n:'Landslide victory',    d:'Beat the AI by more than 2x' },
  { id:'underdog',      ic:'🐺', n:'Underdog',             d:'Win after being behind 60%+' },
  { id:'territorialist',ic:'🏴', n:'Territorialist',       d:'Claim 25+ total territories' },
  { id:'marathon',      ic:'🏔', n:'Marathon',             d:'Play a game longer than 7 days' },
  { id:'yearling',      ic:'🌍', n:'Yearling',             d:'Complete a year-long game' },
  { id:'shutout',       ic:'⚔',  n:'Shutout',              d:'Beat the AI while it has zero territory' },
];

/* ═══════════════════════════════════════════════════════════════════════
   Persisted achievements
   ═══════════════════════════════════════════════════════════════════════ */
const unlockedAch = new Set(JSON.parse(localStorage.getItem('turf-ach') || '[]'));

/* ═══════════════════════════════════════════════════════════════════════
   Game state
   ═══════════════════════════════════════════════════════════════════════ */
const state = {
  phase: 'setup', // setup | playing | ended
  mode: 'pve',    // pve | vs
  duration: DURATIONS[0],
  aiLevel: 'balanced',
  startedAt: 0,
  endsAt: 0,
  center: null, // [lat, lng]
  yourLoops: [],   // { id, points, area, color, layer, timestamp }
  aiLoops: [],   // in VS mode this holds opponent loops
  drawingPoints: [], // WIP polygon in progress
  drawingLayer: null,
  drawingMarkers: [],
  gpsMode: false,
  gpsWatchId: null,
  gpsPath: [],       // realtime GPS coords being recorded
  gpsPathLayer: null,
  aiTimer: null,
  tickTimer: null,
  achievementsUnlockedThisGame: new Set(),
  // VS mode
  vs: null,       // { gameId, role, name, oppName, blobId, lastSyncAt, syncing, syncTimer }
};

const $ = id => document.getElementById(id);

/* ═══════════════════════════════════════════════════════════════════════
   Map init
   ═══════════════════════════════════════════════════════════════════════ */
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true,
}).setView([51.505, -0.09], 15); // London default
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// Try to center on user's location on load
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
    state.center = [pos.coords.latitude, pos.coords.longitude];
  }, () => {}, { timeout: 4000 });
}

/* ═══════════════════════════════════════════════════════════════════════
   Geometry · polygon area on a sphere (approx km²)
   Uses the spherical excess formula.
   ═══════════════════════════════════════════════════════════════════════ */
const R = 6371.0088; // earth radius km
function polygonArea(latlngs) {
  if (latlngs.length < 3) return 0;
  let total = 0;
  for (let i = 0; i < latlngs.length; i++) {
    const p1 = latlngs[i];
    const p2 = latlngs[(i + 1) % latlngs.length];
    const lat1 = p1[0] * Math.PI / 180, lat2 = p2[0] * Math.PI / 180;
    const lng1 = p1[1] * Math.PI / 180, lng2 = p2[1] * Math.PI / 180;
    total += (lng2 - lng1) * (2 + Math.sin(lat1) + Math.sin(lat2));
  }
  return Math.abs(total * R * R / 2);
}

/* ═══════════════════════════════════════════════════════════════════════
   Setup screen
   ═══════════════════════════════════════════════════════════════════════ */
function renderSetup() {
  const side = $('side');
  const isVs = state.mode === 'vs';
  const durationHTML = `
    <h3>1 · Pick a game length</h3>
    <div class="duration-grid" id="dur-grid">
      ${DURATIONS.map(d => `
        <button class="dur-opt ${state.duration.id === d.id ? 'on' : ''}" data-id="${d.id}">
          <div class="n">${d.n}</div><div class="d">${d.d}</div>
        </button>`).join('')}
    </div>`;
  const pveHTML = `
    ${durationHTML}
    <h3>2 · AI opponent</h3>
    <div class="setup-row">
      <span class="lbl">Difficulty</span>
      <select id="ai-level">
        <option value="chill">Chill · casual pace</option>
        <option value="balanced" selected>Balanced · plays every ~5 min</option>
        <option value="aggressive">Aggressive · relentless</option>
      </select>
    </div>
    <div class="setup-row">
      <span class="lbl">AI focus</span>
      <select id="ai-strategy">
        <option value="spread">Spread wide</option>
        <option value="compact" selected>Cluster near you</option>
        <option value="mixed">Mix it up</option>
      </select>
    </div>
    <h3 style="margin-top:16px">3 · Ready?</h3>
    <button class="big-cta" id="start-btn">Start game</button>`;
  const vsHTML = `
    ${durationHTML}
    <h3>2 · Your name</h3>
    <div style="margin-bottom:12px">
      <input type="text" class="vs-input" id="vs-name" placeholder="Your name" maxlength="20" value="${escapeHTML(loadVsName())}">
    </div>
    <h3>3 · Start or join</h3>
    <div class="vs-block">
      <button class="vs-btn" id="vs-create-btn">Create VS game →</button>
      <div style="font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;text-align:center;margin:14px 0 8px">or join a friend</div>
      <input type="text" class="vs-input" id="vs-join-code" placeholder="Paste share code…" autocomplete="off">
      <button class="vs-btn ghost" id="vs-join-btn">Join VS game</button>
      <div class="share-hint">
        Head-to-head on the same map. Share a link or a paste-code with a friend. Sync happens automatically over jsonblob (or manually if offline).
      </div>
    </div>`;

  side.innerHTML = `
    <div class="setup">
      <div class="mode-tabs" id="mode-tabs">
        <button data-mode="pve" class="${!isVs ? 'on' : ''}">◆ VS AI</button>
        <button data-mode="vs" class="${isVs ? 'on vs' : ''}">⚔ 1v1 · Live</button>
      </div>
      ${isVs ? vsHTML : pveHTML}
      <button class="btn" id="show-tutorial-btn" style="width:100%;margin-top:10px;padding:10px 10px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--dim);font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;cursor:pointer;text-transform:uppercase;min-height:40px">? Show tutorial</button>

      <div class="ach-block">
        <h3 style="display:flex;justify-content:space-between">
          Achievements
          <span style="color:var(--gold);letter-spacing:.06em">${unlockedAch.size} / ${ACHIEVEMENTS.length}</span>
        </h3>
        ${ACHIEVEMENTS.map(a => `
          <div class="ach ${unlockedAch.has(a.id) ? 'unlocked' : ''}">
            <div class="ic">${a.ic}</div>
            <div class="info">
              <div class="n">${a.n}</div>
              <div class="d">${a.d}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  `;
  $('mode-tabs').addEventListener('click', e => {
    const b = e.target.closest('button[data-mode]'); if (!b) return;
    state.mode = b.dataset.mode;
    renderSetup();
  });
  $('dur-grid').addEventListener('click', e => {
    const b = e.target.closest('.dur-opt'); if (!b) return;
    state.duration = DURATIONS.find(d => d.id === b.dataset.id);
    const aiLvl = $('ai-level'); if (aiLvl) state.duration.aiLevel = aiLvl.value;
    renderSetup();
    const aiLvl2 = $('ai-level'); if (aiLvl2) aiLvl2.value = state.duration.aiLevel || 'balanced';
  });
  const aiLvl = $('ai-level');
  if (aiLvl) aiLvl.addEventListener('change', e => { state.duration.aiLevel = e.target.value; });
  const startBtn = $('start-btn'); if (startBtn) startBtn.addEventListener('click', startGame);
  const showTutBtn = $('show-tutorial-btn');
  if (showTutBtn) showTutBtn.addEventListener('click', () => openTutorial());
  if (isVs) {
    $('vs-create-btn').addEventListener('click', () => vsCreateGame());
    $('vs-join-btn').addEventListener('click', () => {
      const code = $('vs-join-code').value.trim();
      if (!code) { toast('Paste a share code first', 'ai'); return; }
      vsJoinFromCode(code);
    });
    $('vs-name').addEventListener('change', e => { saveVsName(e.target.value.trim() || 'Player'); });
  }
}

function escapeHTML(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ═══════════════════════════════════════════════════════════════════════
   Playing screen
   ═══════════════════════════════════════════════════════════════════════ */
function renderPlaying() {
  const side = $('side');
  const yourArea = state.yourLoops.reduce((s, l) => s + l.area, 0);
  const aiArea = state.aiLoops.reduce((s, l) => s + l.area, 0);
  const isVs = state.mode === 'vs';
  const oppLabel = isVs ? (state.vs.oppName || 'Opponent') : 'AI';
  const meLabel = isVs ? 'You' : 'You';
  const vsSyncLine = isVs ? `<div class="vs-sync-status ${state.vs.lastErr ? 'err' : (state.vs.blobId ? 'ok' : '')}" id="vs-sync-status">${vsSyncStatusText()}</div>` : '';
  const vsHudRow = isVs ? `
    <div class="vs-hud">
      <button class="btn vs-primary" id="vs-share-btn">↗ Share link</button>
      <button class="btn vs-primary" id="vs-sync-btn">↻ Sync now</button>
    </div>
    ${vsSyncLine}` : '';
  const oppClass = isVs ? 'vs' : 'ai';
  side.innerHTML = `
    <div class="play-hdr">
      <h3>${isVs ? 'VS · ' + escapeHTML(state.vs.name || 'Game') : 'Game in progress'}</h3>
      <span class="badge">${state.duration.n}</span>
    </div>

    <div class="instructions">
      ${state.gpsMode
        ? '<b>GPS mode.</b> Walk or run — your path is recorded. Tap <b>Close loop</b> when you\'re back near the start.'
        : '<b>Click the map</b> to drop waypoints and draw a loop. When it looks closed, tap <b>Close the loop</b> below.'}
    </div>

    <div class="gps-toggle">
      <button class="${!state.gpsMode ? 'on' : ''}" data-mode="click">✎ Click mode</button>
      <button class="${state.gpsMode ? 'on' : ''}" data-mode="gps">◉ GPS mode</button>
    </div>

    ${vsHudRow}

    <div class="stats-grid" style="margin-top:${isVs ? '12px' : '0'}">
      <div class="stat you"><div class="k">Your loops</div><div class="v">${state.yourLoops.length}</div></div>
      <div class="stat ${oppClass}"><div class="k">${oppLabel} loops</div><div class="v">${state.aiLoops.length}</div></div>
      <div class="stat you"><div class="k">Your km²</div><div class="v">${yourArea.toFixed(3)}</div></div>
      <div class="stat ${oppClass}"><div class="k">${oppLabel} km²</div><div class="v">${aiArea.toFixed(3)}</div></div>
    </div>

    <div class="loops-list">
      <h3>Territories <span style="color:var(--dim)">${state.yourLoops.length + state.aiLoops.length}</span></h3>
      ${[...state.yourLoops.map(l=>({...l,who:'you'})), ...state.aiLoops.map(l=>({...l,who:'ai'}))].sort((a,b)=>b.timestamp-a.timestamp).slice(0,10).map(l => `
        <div class="loop-card ${l.who}" data-id="${l.id}">
          <div class="n">${escapeHTML(l.name)}</div>
          <div class="m"><span class="who">${l.who === 'you' ? meLabel.toUpperCase() : oppLabel.toUpperCase()}</span> · ${l.area.toFixed(3)} km² · ${l.points.length} pts</div>
        </div>`).join('') || '<div style="color:var(--dim);font-family:var(--mono);font-size:11px;padding:8px 0">No territories claimed yet</div>'}
    </div>

    <div class="side-actions">
      <button class="btn" id="fit-btn">Fit map</button>
      <button class="btn danger" id="quit-btn">${isVs ? 'Leave game' : 'Concede'}</button>
    </div>
  `;

  document.querySelectorAll('.gps-toggle button').forEach(b => b.addEventListener('click', () => {
    const mode = b.dataset.mode;
    if (mode === 'gps') startGpsMode(); else stopGpsMode();
  }));
  document.querySelectorAll('.loop-card').forEach(c => c.addEventListener('click', () => {
    const l = [...state.yourLoops, ...state.aiLoops].find(x => x.id === c.dataset.id);
    if (l && l.layer) map.fitBounds(l.layer.getBounds(), { padding: [40, 40] });
  }));
  $('fit-btn').addEventListener('click', fitAll);
  $('quit-btn').addEventListener('click', () => {
    const msg = isVs ? 'Leave this VS game?' : 'Concede the game?';
    if (confirm(msg)) endGame();
  });
  if (isVs) {
    $('vs-share-btn').addEventListener('click', () => showVsShareModal());
    $('vs-sync-btn').addEventListener('click', () => vsManualSync());
  }
  updateScores();
}

function fitAll() {
  const all = [...state.yourLoops, ...state.aiLoops];
  if (!all.length) return;
  const group = L.featureGroup(all.map(l => l.layer));
  map.fitBounds(group.getBounds(), { padding: [40, 40] });
}

/* ═══════════════════════════════════════════════════════════════════════
   Start game
   ═══════════════════════════════════════════════════════════════════════ */
function startGame() {
  state.mode = 'pve';
  state.vs = null;
  state.phase = 'playing';
  state.startedAt = Date.now();
  state.endsAt = state.startedAt + state.duration.ms;
  state.yourLoops = []; state.aiLoops = []; state.achievementsUnlockedThisGame = new Set();
  state.center = [map.getCenter().lat, map.getCenter().lng];
  $('score-strip').style.display = 'flex';
  $('you-label').textContent = 'You';
  $('opp-label').textContent = 'AI';
  $('opp-score').classList.remove('vs'); $('opp-score').classList.add('ai');
  renderPlaying();
  bindMapClicks();
  scheduleAiMoves();
  startTicker();
  showOverlay('Click to place your first waypoint');
  if (window.innerWidth <= 900) collapseDrawer();
  updateSideToggle();
}

function endGame() {
  state.phase = 'ended';
  clearInterval(state.tickTimer);
  clearTimeout(state.aiTimer);
  if (state.vs && state.vs.syncTimer) clearInterval(state.vs.syncTimer);
  stopGpsMode();
  hideOverlay();
  showResults();
}

/* ═══════════════════════════════════════════════════════════════════════
   Drawing loops (click mode)
   ═══════════════════════════════════════════════════════════════════════ */
let mapClickHandler = null;
function bindMapClicks() {
  if (mapClickHandler) map.off('click', mapClickHandler);
  mapClickHandler = e => { if (!state.gpsMode) addPoint(e.latlng); };
  map.on('click', mapClickHandler);
}

function addPoint(latlng) {
  state.drawingPoints.push([latlng.lat, latlng.lng]);
  drawWip();
  showOverlay(`${state.drawingPoints.length} waypoint${state.drawingPoints.length !== 1 ? 's' : ''} · ${state.drawingPoints.length >= 3 ? 'Close the loop when ready' : `${3 - state.drawingPoints.length} more to make a loop`}`);
  $('finish-loop').classList.toggle('show', state.drawingPoints.length >= 3);
  $('cancel-loop').style.display = state.drawingPoints.length > 0 ? 'inline-block' : 'none';
}
function drawWip() {
  if (state.drawingLayer) map.removeLayer(state.drawingLayer);
  state.drawingMarkers.forEach(m => map.removeLayer(m));
  state.drawingMarkers = [];
  if (state.drawingPoints.length === 0) return;
  const style = { color: '#30d158', weight: 3, opacity: 1, dashArray: '6,6', fill: state.drawingPoints.length >= 3, fillColor: '#30d158', fillOpacity: 0.15 };
  if (state.drawingPoints.length >= 3) {
    state.drawingLayer = L.polygon(state.drawingPoints, style).addTo(map);
  } else {
    state.drawingLayer = L.polyline(state.drawingPoints, style).addTo(map);
  }
  state.drawingPoints.forEach((p, i) => {
    const m = L.circleMarker(p, {
      radius: 5, color: '#30d158', fillColor: i === 0 ? '#fff' : '#30d158', fillOpacity: 1, weight: 2
    }).addTo(map);
    state.drawingMarkers.push(m);
  });
}
function cancelWip() {
  state.drawingPoints = [];
  if (state.drawingLayer) map.removeLayer(state.drawingLayer);
  state.drawingMarkers.forEach(m => map.removeLayer(m));
  state.drawingMarkers = [];
  state.drawingLayer = null;
  $('finish-loop').classList.remove('show');
  $('cancel-loop').style.display = 'none';
  hideOverlay();
}
function finishLoop() {
  const pts = state.drawingPoints.slice();
  if (pts.length < 3) return;
  const area = polygonArea(pts);
  const layer = L.polygon(pts, {
    color: '#30d158', weight: 2, opacity: 1, fillColor: '#30d158', fillOpacity: 0.28
  }).addTo(map);
  const loop = {
    id: 'you-' + Date.now(),
    name: nameFor('you', state.yourLoops.length + 1),
    points: pts, area, layer, timestamp: Date.now(),
  };
  state.yourLoops.push(loop);
  cancelWip();
  checkAchievements(loop);
  renderPlaying();
  toast(`Claimed ${loop.name} · ${area.toFixed(3)} km²`, 'you');
  if (state.mode === 'vs') vsSaveLocal();
}

$('finish-loop').addEventListener('click', () => {
  if (state.gpsMode) finishGpsLoop();
  else finishLoop();
});
$('cancel-loop').addEventListener('click', cancelWip);

function nameFor(who, n) {
  const words = who === 'you'
    ? ['Verdant Reach','Meadow Grove','Northgate','Bright Hollow','Grasslands','Cedar Rise','Fernwood','Willow Bend','Kites Field','Longview','Elmwood','Bramble Point','High Ridge']
    : ['Iron Basin','Shadow Fen','Black Marsh','Ashcroft','Gloamside','Rust Reach','Twilight Camp','Coldspring','Hollow Pass','Grimwood','Sable Rise'];
  return words[(n - 1) % words.length] + (n > words.length ? ' ' + Math.ceil(n / words.length) : '');
}

/* ═══════════════════════════════════════════════════════════════════════
   GPS mode
   ═══════════════════════════════════════════════════════════════════════ */
function startGpsMode() {
  if (!navigator.geolocation) { toast('Geolocation not available', 'ai'); return; }
  state.gpsMode = true;
  state.gpsPath = [];
  if (state.gpsPathLayer) map.removeLayer(state.gpsPathLayer);
  state.gpsPathLayer = L.polyline([], { color: '#30d158', weight: 4, opacity: 0.85 }).addTo(map);
  state.gpsWatchId = navigator.geolocation.watchPosition(pos => {
    const p = [pos.coords.latitude, pos.coords.longitude];
    state.gpsPath.push(p);
    state.gpsPathLayer.setLatLngs(state.gpsPath);
    if (state.gpsPath.length === 1) map.setView(p, 17);
    showOverlay(`GPS · ${state.gpsPath.length} points · ${(pathLength(state.gpsPath) * 1000).toFixed(0)} m walked`);
    if (state.gpsPath.length >= 3) $('finish-loop').classList.add('show');
  }, err => { toast('GPS error: ' + err.message, 'ai'); state.gpsMode = false; renderPlaying(); }, { enableHighAccuracy: true, maximumAge: 5000 });
  renderPlaying();
}
function stopGpsMode() {
  if (state.gpsWatchId != null && navigator.geolocation) navigator.geolocation.clearWatch(state.gpsWatchId);
  state.gpsWatchId = null; state.gpsMode = false;
  if (state.gpsPathLayer) map.removeLayer(state.gpsPathLayer);
  state.gpsPath = [];
  state.gpsPathLayer = null;
}
function pathLength(pts) {
  let sum = 0;
  for (let i = 1; i < pts.length; i++) {
    const [a1, a2] = [pts[i-1][0]*Math.PI/180, pts[i][0]*Math.PI/180];
    const dLat = a2 - a1, dLon = (pts[i][1] - pts[i-1][1]) * Math.PI/180;
    const h = Math.sin(dLat/2)**2 + Math.cos(a1)*Math.cos(a2)*Math.sin(dLon/2)**2;
    sum += 2 * R * Math.asin(Math.sqrt(h));
  }
  return sum;
}
function finishGpsLoop() {
  if (state.gpsPath.length < 3) return;
  // simplify by taking every Nth point
  const step = Math.max(1, Math.floor(state.gpsPath.length / 40));
  const pts = state.gpsPath.filter((_, i) => i % step === 0);
  const area = polygonArea(pts);
  if (area < 0.0001) { toast('Loop too small', 'ai'); return; }
  const layer = L.polygon(pts, { color: '#30d158', weight: 2, opacity: 1, fillColor: '#30d158', fillOpacity: 0.28 }).addTo(map);
  const loop = { id: 'you-' + Date.now(), name: nameFor('you', state.yourLoops.length + 1), points: pts, area, layer, timestamp: Date.now() };
  state.yourLoops.push(loop);
  state.gpsPath = [];
  if (state.gpsPathLayer) { state.gpsPathLayer.setLatLngs([]); }
  $('finish-loop').classList.remove('show');
  checkAchievements(loop);
  renderPlaying();
  toast(`Claimed ${loop.name} · ${area.toFixed(3)} km²`, 'you');
  if (state.mode === 'vs') vsSaveLocal();
}

/* ═══════════════════════════════════════════════════════════════════════
   AI opponent
   ═══════════════════════════════════════════════════════════════════════ */
function aiIntervalMs() {
  // Fit ~10-30 AI moves into the game duration based on level
  const level = state.duration.aiLevel || 'balanced';
  const target = level === 'aggressive' ? 40 : level === 'balanced' ? 20 : 10;
  return Math.max(30 * 1000, state.duration.ms / target);
}
function scheduleAiMoves() {
  clearTimeout(state.aiTimer);
  if (state.mode !== 'pve') return; // no AI in VS mode
  const delay = aiIntervalMs() * (0.5 + Math.random() * 0.8);
  state.aiTimer = setTimeout(() => {
    if (state.phase !== 'playing' || state.mode !== 'pve') return;
    doAiMove();
    scheduleAiMoves();
  }, delay);
}
function doAiMove() {
  // Pick center: near you or spread depending on strategy
  const strategy = ($('ai-strategy') && $('ai-strategy').value) || 'compact';
  let cx, cy;
  const yourCenters = state.yourLoops.map(l => centroid(l.points));
  if (strategy === 'compact' && yourCenters.length) {
    const base = yourCenters[yourCenters.length - 1];
    cx = base[0] + (Math.random() - 0.5) * 0.006;
    cy = base[1] + (Math.random() - 0.5) * 0.008;
  } else if (strategy === 'spread' || !state.center) {
    const c = state.center || [map.getCenter().lat, map.getCenter().lng];
    cx = c[0] + (Math.random() - 0.5) * 0.02;
    cy = c[1] + (Math.random() - 0.5) * 0.03;
  } else {
    if (Math.random() < 0.5 && yourCenters.length) {
      const base = yourCenters[Math.floor(Math.random() * yourCenters.length)];
      cx = base[0] + (Math.random() - 0.5) * 0.008;
      cy = base[1] + (Math.random() - 0.5) * 0.012;
    } else {
      const c = state.center || [map.getCenter().lat, map.getCenter().lng];
      cx = c[0] + (Math.random() - 0.5) * 0.02;
      cy = c[1] + (Math.random() - 0.5) * 0.03;
    }
  }
  // Generate a rough n-gon
  const n = 5 + Math.floor(Math.random() * 5);
  const radius = 0.002 + Math.random() * 0.006; // deg-ish
  const jitter = 0.35;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const r = radius * (1 - jitter + Math.random() * jitter * 2);
    pts.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r * 1.4]); // ellipse for realism
  }
  const area = polygonArea(pts);
  const layer = L.polygon(pts, { color: '#ff375f', weight: 2, opacity: 1, fillColor: '#ff375f', fillOpacity: 0.24 }).addTo(map);
  const loop = { id: 'ai-' + Date.now(), name: nameFor('ai', state.aiLoops.length + 1), points: pts, area, layer, timestamp: Date.now() };
  state.aiLoops.push(loop);
  renderPlaying();
  toast(`AI claimed ${loop.name} · ${area.toFixed(3)} km²`, 'ai');
}
function centroid(pts) {
  const sx = pts.reduce((s, p) => s + p[0], 0);
  const sy = pts.reduce((s, p) => s + p[1], 0);
  return [sx / pts.length, sy / pts.length];
}

/* ═══════════════════════════════════════════════════════════════════════
   Ticker · timer + game end
   ═══════════════════════════════════════════════════════════════════════ */
function startTicker() {
  clearInterval(state.tickTimer);
  state.tickTimer = setInterval(() => {
    const now = Date.now();
    const left = state.endsAt - now;
    const t = $('timer');
    if (left <= 0) { $('time-left').textContent = 'Ended'; endGame(); return; }
    $('time-left').textContent = fmtRemain(left);
    t.classList.remove('warn', 'crit'); t.classList.add('active');
    if (left < state.duration.ms * 0.1) t.classList.add('crit');
    else if (left < state.duration.ms * 0.3) t.classList.add('warn');
  }, 500);
}
function fmtRemain(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s left`;
  const m = Math.floor(s / 60); if (m < 60) return `${m}m ${s % 60}s`;
  const h = Math.floor(m / 60); if (h < 24) return `${h}h ${m % 60}m`;
  const d = Math.floor(h / 24); return `${d}d ${h % 24}h`;
}
function updateScores() {
  $('you-area').textContent = state.yourLoops.reduce((s, l) => s + l.area, 0).toFixed(3);
  $('ai-area').textContent = state.aiLoops.reduce((s, l) => s + l.area, 0).toFixed(3);
}

/* ═══════════════════════════════════════════════════════════════════════
   Achievements
   ═══════════════════════════════════════════════════════════════════════ */
function unlock(id) {
  if (unlockedAch.has(id) || state.achievementsUnlockedThisGame.has(id)) return;
  unlockedAch.add(id);
  state.achievementsUnlockedThisGame.add(id);
  localStorage.setItem('turf-ach', JSON.stringify([...unlockedAch]));
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  toast(`Achievement · ${ach.ic} ${ach.n}`, 'gold');
}
function checkAchievements(loop) {
  if (state.yourLoops.length === 1) unlock('first-blood');
  if (loop && loop.points.length === 3) unlock('triangle');
  if (loop && loop.area > 0.1) unlock('big-loop');
  if (loop && loop.area > 1) unlock('huge-loop');
  if (state.yourLoops.length >= 5) unlock('quintuple');
  if (state.yourLoops.length >= 10) unlock('decagon');
  if (state.yourLoops.length + state.aiLoops.length >= 25 && state.yourLoops.length >= 25) unlock('territorialist');
  if (state.duration.ms > 7 * 24 * 60 * 60 * 1000) unlock('marathon');
}

/* ═══════════════════════════════════════════════════════════════════════
   Results modal
   ═══════════════════════════════════════════════════════════════════════ */
function showResults() {
  const you = state.yourLoops.reduce((s, l) => s + l.area, 0);
  const ai = state.aiLoops.reduce((s, l) => s + l.area, 0);
  const total = you + ai;
  const youPct = total > 0 ? (you / total * 100) : 0;
  const winner = you > ai ? 'you' : ai > you ? 'ai' : 'tie';
  const isVs = state.mode === 'vs';
  const oppLabel = isVs ? (state.vs && state.vs.oppName ? state.vs.oppName : 'Opponent') : 'AI';
  if (winner === 'you' && !isVs) {
    if (ai === 0) unlock('shutout');
    if (you > ai * 2 && ai > 0) unlock('landslide');
  }
  if (state.duration.id === 'year') unlock('yearling');

  const winTitle = isVs
    ? (winner === 'you' ? 'You took the turf' : winner === 'ai' ? `${oppLabel} took the turf` : 'A dead heat')
    : (winner === 'you' ? 'You claimed the land' : winner === 'ai' ? 'The AI won' : 'Neither of you claimed enough');
  const winSub = winner === 'you'
    ? `You took ${youPct.toFixed(0)}% of the total claimed area over ${state.duration.n.toLowerCase()}.`
    : winner === 'ai'
      ? `You held ${youPct.toFixed(0)}%. Better luck next round.`
      : 'Equal ground. Restart?';

  const modal = $('modal');
  modal.innerHTML = `
    <div class="modal-hdr">
      <div class="k">${winner === 'you' ? 'Victory' : winner === 'ai' ? 'Defeat' : 'A tie'}</div>
      <h2>${winTitle}</h2>
      <div class="sub">${winSub}</div>
    </div>
    <div class="modal-body">
      <div class="winner-scores">
        <div class="side-score you"><div class="name">You</div><div class="val">${you.toFixed(3)}</div><div class="u">km² · ${state.yourLoops.length} loops</div></div>
        <div class="side-score ai"><div class="name">${escapeHTML(oppLabel)}</div><div class="val">${ai.toFixed(3)}</div><div class="u">km² · ${state.aiLoops.length} loops</div></div>
      </div>
      ${state.achievementsUnlockedThisGame.size > 0 ? `<div style="text-align:center;margin-bottom:14px;padding:10px;background:rgba(255,204,0,.06);border:1px solid rgba(255,204,0,.3);border-radius:8px">
        <div style="font-family:var(--mono);font-size:10.5px;color:var(--gold);letter-spacing:.14em;margin-bottom:6px">Achievements unlocked this game</div>
        <div style="font-size:18px;line-height:1.6">${[...state.achievementsUnlockedThisGame].map(id => { const a = ACHIEVEMENTS.find(x => x.id === id); return `<span style="margin:0 4px">${a.ic}</span>`; }).join('')}</div>
      </div>` : ''}
      <div class="modal-actions">
        <button class="secondary" id="modal-close">Keep viewing map</button>
        <button class="primary" id="modal-new">Start new game</button>
      </div>
    </div>
  `;
  $('modal-bg').classList.add('show');
  $('modal-close').addEventListener('click', () => { $('modal-bg').classList.remove('show'); });
  $('modal-new').addEventListener('click', () => {
    // Clear map
    state.yourLoops.forEach(l => l.layer && map.removeLayer(l.layer));
    state.aiLoops.forEach(l => l.layer && map.removeLayer(l.layer));
    state.yourLoops = []; state.aiLoops = [];
    if (state.vs && state.vs.syncTimer) clearInterval(state.vs.syncTimer);
    state.vs = null;
    state.mode = 'pve';
    $('score-strip').style.display = 'none';
    $('modal-bg').classList.remove('show');
    state.phase = 'setup';
    renderSetup();
    expandDrawer();
    updateSideToggle();
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   UI utils
   ═══════════════════════════════════════════════════════════════════════ */
let toastTimer = null;
function toast(msg, kind = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + kind;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
function showOverlay(text) { $('overlay-text').textContent = text; $('map-overlay').style.display = 'flex'; }
function hideOverlay() { $('map-overlay').style.display = 'none'; }

/* ═══════════════════════════════════════════════════════════════════════
   VS mode · async multiplayer via share codes + jsonblob
   ═══════════════════════════════════════════════════════════════════════ */
const VS_NAME_KEY = 'turf-vs-name';
const VS_GAMES_KEY = 'turf-vs-games';
const VS_STATE_VERSION = 1;
const JSONBLOB_BASE = 'https://jsonblob.com/api/jsonBlob';
const VS_SYNC_INTERVAL_MS = 30 * 1000;

function loadVsName() { try { return localStorage.getItem(VS_NAME_KEY) || 'Player'; } catch (e) { return 'Player'; } }
function saveVsName(n) { try { localStorage.setItem(VS_NAME_KEY, n); } catch (e) {} }

function loadVsGames() {
  try { return JSON.parse(localStorage.getItem(VS_GAMES_KEY) || '{}'); } catch (e) { return {}; }
}
function saveVsGame(gameId, payload) {
  const games = loadVsGames();
  games[gameId] = { ...payload, savedAt: Date.now() };
  // cap to 20 games
  const keys = Object.keys(games).sort((a,b) => (games[b].savedAt||0) - (games[a].savedAt||0));
  const trimmed = {};
  keys.slice(0, 20).forEach(k => { trimmed[k] = games[k]; });
  try { localStorage.setItem(VS_GAMES_KEY, JSON.stringify(trimmed)); } catch (e) {}
}

function shortId(len = 8) {
  const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
  let s = '';
  const buf = new Uint8Array(len);
  crypto.getRandomValues(buf);
  for (let i = 0; i < len; i++) s += chars[buf[i] % chars.length];
  return s;
}

/* ─── Share code encode / decode ───────────────────────────────────────── */
async function encodeShareCode(obj) {
  const json = JSON.stringify(obj);
  try {
    if (typeof CompressionStream !== 'undefined') {
      const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('deflate-raw'));
      const buf = await new Response(stream).arrayBuffer();
      return 'z1.' + b64EncodeBytes(new Uint8Array(buf));
    }
  } catch (e) { /* fall through to plain */ }
  const bytes = new TextEncoder().encode(json);
  return 'p1.' + b64EncodeBytes(bytes);
}
async function decodeShareCode(raw) {
  const code = String(raw || '').trim();
  const dot = code.indexOf('.');
  if (dot < 0) throw new Error('Invalid code');
  const prefix = code.slice(0, dot);
  const bytes = b64DecodeBytes(code.slice(dot + 1));
  if (prefix === 'z1') {
    if (typeof DecompressionStream === 'undefined') throw new Error('Decompression not supported in this browser');
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
    const text = await new Response(stream).text();
    return JSON.parse(text);
  }
  if (prefix === 'p1') {
    return JSON.parse(new TextDecoder().decode(bytes));
  }
  throw new Error('Unknown code format');
}
function b64EncodeBytes(bytes) {
  let s = '';
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    s += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64DecodeBytes(str) {
  const s = str.replace(/-/g,'+').replace(/_/g,'/');
  const pad = s.length % 4 === 0 ? '' : '='.repeat(4 - (s.length % 4));
  const bin = atob(s + pad);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

/* ─── jsonblob API with one retry + content-type check ─────────────────── */
async function jsonblobRequest(url, opts, attempt = 0) {
  try {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res;
  } catch (e) {
    if (attempt < 1) {
      await new Promise(r => setTimeout(r, 700 + attempt * 800));
      return jsonblobRequest(url, opts, attempt + 1);
    }
    throw e;
  }
}
async function jsonblobCreate(payload) {
  const res = await jsonblobRequest(JSONBLOB_BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload)
  });
  const loc = res.headers.get('Location') || '';
  const id = loc.split('/').filter(Boolean).pop();
  if (!id) throw new Error('No blob id returned');
  return id;
}
async function jsonblobGet(id) {
  const res = await jsonblobRequest(JSONBLOB_BASE + '/' + id, {
    headers: { 'Accept': 'application/json' }
  });
  const ct = res.headers.get('Content-Type') || '';
  if (!ct.toLowerCase().includes('json')) throw new Error('Bad content-type: ' + ct);
  return await res.json();
}
async function jsonblobPut(id, payload) {
  await jsonblobRequest(JSONBLOB_BASE + '/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload)
  });
  return true;
}

/* ─── VS state shape ───────────────────────────────────────────────────── */
function makeVsState({ name, duration, center }) {
  const now = Date.now();
  return {
    v: VS_STATE_VERSION,
    id: 'vs-' + shortId(8),
    name: name || 'Untitled game',
    createdAt: now,
    startedAt: now,
    endsAt: now + duration.ms,
    duration: duration.id,
    seed: shortId(6),
    center: center || [map.getCenter().lat, map.getCenter().lng],
    players: {
      p1: { name: loadVsName(), loops: [] },
      p2: { name: 'Waiting…', loops: [] }
    }
  };
}

function loopToDto(l) {
  return { id: l.id, name: l.name, points: l.points, area: l.area, timestamp: l.timestamp };
}
function loopFromDto(dto, color) {
  const layer = L.polygon(dto.points, { color, weight: 2, opacity: 1, fillColor: color, fillOpacity: 0.28 }).addTo(map);
  return { id: dto.id, name: dto.name, points: dto.points, area: dto.area, layer, timestamp: dto.timestamp };
}

/* ─── Create / join VS games ───────────────────────────────────────────── */
async function vsCreateGame() {
  const nameInput = $('vs-name');
  const myName = (nameInput && nameInput.value.trim()) || 'Player';
  saveVsName(myName);
  const vsState = makeVsState({ name: myName + "'s turf", duration: state.duration, center: [map.getCenter().lat, map.getCenter().lng] });
  vsState.players.p1.name = myName;
  const btn = $('vs-create-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }
  let blobId = null;
  try {
    blobId = await jsonblobCreate(vsState);
    vsState.blobId = blobId;
  } catch (e) {
    console.warn('jsonblob create failed', e);
    toast('Cloud sync unavailable — using share code', 'ai');
  }
  saveVsGame(vsState.id, { role: 'p1', blobId, state: vsState });
  state.mode = 'vs';
  state.vs = {
    gameId: vsState.id, role: 'p1', name: vsState.name, blobId,
    oppName: vsState.players.p2.name, lastSyncAt: 0, lastErr: null
  };
  bootVsGameplay(vsState);
  showVsShareModal(blobId, await encodeShareCode(vsState), vsState);
}

async function vsJoinFromCode(codeOrUrl) {
  const btn = $('vs-join-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Joining…'; }
  try {
    // Detect URL with ?vs= param
    const urlMatch = codeOrUrl.match(/[?&]vs=([^&#\s]+)/);
    let vsState;
    let blobId = null;
    if (urlMatch) {
      blobId = decodeURIComponent(urlMatch[1]);
      vsState = await jsonblobGet(blobId);
      vsState.blobId = blobId;
    } else {
      vsState = await decodeShareCode(codeOrUrl);
      blobId = vsState.blobId || null;
    }
    if (!vsState || !vsState.id || !vsState.players) throw new Error('Not a valid VS game');
    const myName = ($('vs-name') && $('vs-name').value.trim()) || 'Player';
    saveVsName(myName);
    vsState.players.p2.name = myName;
    if (blobId) {
      try { await jsonblobPut(blobId, vsState); } catch (e) { console.warn('put after join failed', e); }
    }
    saveVsGame(vsState.id, { role: 'p2', blobId, state: vsState });
    state.mode = 'vs';
    state.vs = {
      gameId: vsState.id, role: 'p2', name: vsState.name, blobId,
      oppName: vsState.players.p1.name, lastSyncAt: 0, lastErr: null
    };
    bootVsGameplay(vsState);
    toast(`Joined ${vsState.name}`, 'gold');
  } catch (e) {
    console.error('vs join failed', e);
    toast('Could not join: ' + (e.message || 'invalid code'), 'ai');
    if (btn) { btn.disabled = false; btn.textContent = 'Join VS game'; }
  }
}

function bootVsGameplay(vsState) {
  state.phase = 'playing';
  state.startedAt = vsState.startedAt;
  state.endsAt = vsState.endsAt;
  state.duration = DURATIONS.find(d => d.id === vsState.duration) || DURATIONS[0];
  state.center = vsState.center;
  state.achievementsUnlockedThisGame = new Set();
  // Clear any existing loops on map
  state.yourLoops.forEach(l => l.layer && map.removeLayer(l.layer));
  state.aiLoops.forEach(l => l.layer && map.removeLayer(l.layer));
  const mine = state.vs.role === 'p1' ? vsState.players.p1 : vsState.players.p2;
  const opp = state.vs.role === 'p1' ? vsState.players.p2 : vsState.players.p1;
  state.yourLoops = (mine.loops || []).map(dto => loopFromDto(dto, '#30d158'));
  state.aiLoops = (opp.loops || []).map(dto => loopFromDto(dto, '#bf5af2'));
  if (vsState.center) map.setView(vsState.center, 15);
  $('score-strip').style.display = 'flex';
  $('you-label').textContent = 'You';
  $('opp-label').textContent = (opp.name || 'Opp').slice(0, 10);
  $('opp-score').classList.remove('ai'); $('opp-score').classList.add('vs');
  renderPlaying();
  bindMapClicks();
  startTicker();
  showOverlay('VS · claim more turf than ' + (opp.name || 'your opponent'));
  if (state.vs.blobId) {
    if (state.vs.syncTimer) clearInterval(state.vs.syncTimer);
    state.vs.syncTimer = setInterval(() => vsAutoSync(), VS_SYNC_INTERVAL_MS);
  }
  if (window.innerWidth <= 900) collapseDrawer();
  updateSideToggle();
}

/* ─── Serialize current local state back into the vs blob shape ────────── */
function buildCurrentVsSnapshot() {
  const games = loadVsGames();
  const rec = games[state.vs.gameId];
  const base = (rec && rec.state) || makeVsState({ name: state.vs.name, duration: state.duration });
  base.v = VS_STATE_VERSION;
  base.id = state.vs.gameId;
  base.name = state.vs.name;
  base.duration = state.duration.id;
  base.startedAt = state.startedAt;
  base.endsAt = state.endsAt;
  base.center = state.center;
  base.blobId = state.vs.blobId || base.blobId;
  base.players = base.players || { p1: {}, p2: {} };
  const myKey = state.vs.role;
  const oppKey = myKey === 'p1' ? 'p2' : 'p1';
  base.players[myKey] = { name: loadVsName(), loops: state.yourLoops.map(loopToDto) };
  base.players[oppKey] = base.players[oppKey] || { name: state.vs.oppName || 'Opponent', loops: [] };
  return base;
}

function vsSaveLocal() {
  if (!state.vs) return;
  const snap = buildCurrentVsSnapshot();
  saveVsGame(state.vs.gameId, { role: state.vs.role, blobId: state.vs.blobId, state: snap });
}

/* ─── Sync (pull remote, merge opponent loops, push local) ─────────────── */
async function vsAutoSync() { return vsSync(false); }
async function vsManualSync() { return vsSync(true); }

async function vsSync(manual) {
  if (!state.vs) return;
  if (!state.vs.blobId) {
    state.vs.lastErr = 'No cloud sync — share by code';
    updateVsSyncStatus();
    if (manual) {
      // Fall back to producing a fresh share code
      const snap = buildCurrentVsSnapshot();
      showVsShareModal(null, await encodeShareCode(snap), snap);
    }
    return;
  }
  if (state.vs.syncing) return;
  state.vs.syncing = true;
  updateVsSyncStatus();
  try {
    // 1. Pull remote
    const remote = await jsonblobGet(state.vs.blobId);
    // 2. Merge opponent
    const oppKey = state.vs.role === 'p1' ? 'p2' : 'p1';
    const oppLoops = (remote.players && remote.players[oppKey] && remote.players[oppKey].loops) || [];
    const oppName = (remote.players && remote.players[oppKey] && remote.players[oppKey].name) || state.vs.oppName;
    // Clear existing opp layers, rebuild from remote
    state.aiLoops.forEach(l => l.layer && map.removeLayer(l.layer));
    state.aiLoops = oppLoops.map(dto => loopFromDto(dto, '#bf5af2'));
    if (state.vs.oppName !== oppName) {
      state.vs.oppName = oppName;
      $('opp-label').textContent = (oppName || 'Opp').slice(0, 10);
    }
    // 3. Build and push our snapshot
    const snap = buildCurrentVsSnapshot();
    snap.players[oppKey] = { name: oppName, loops: oppLoops };
    await jsonblobPut(state.vs.blobId, snap);
    saveVsGame(state.vs.gameId, { role: state.vs.role, blobId: state.vs.blobId, state: snap });
    state.vs.lastSyncAt = Date.now();
    state.vs.lastErr = null;
    if (state.phase === 'playing') renderPlaying();
    if (manual) toast('Synced', 'you');
  } catch (e) {
    console.warn('vs sync failed', e);
    state.vs.lastErr = e.message || 'Sync failed';
    if (manual) toast('Sync failed — will retry', 'ai');
  } finally {
    state.vs.syncing = false;
    updateVsSyncStatus();
  }
}

function updateVsSyncStatus() {
  const el = $('vs-sync-status'); if (!el) return;
  el.textContent = vsSyncStatusText();
  el.className = 'vs-sync-status' + (state.vs && state.vs.lastErr ? ' err' : (state.vs && state.vs.blobId ? ' ok' : ''));
}
function vsSyncStatusText() {
  if (!state.vs) return '';
  if (state.vs.syncing) return '↻ Syncing…';
  if (state.vs.lastErr) return '⚠ ' + state.vs.lastErr;
  if (!state.vs.blobId) return 'Offline · share by code';
  if (!state.vs.lastSyncAt) return 'Ready · auto-sync every 30s';
  const ago = Math.floor((Date.now() - state.vs.lastSyncAt) / 1000);
  return `Synced ${ago < 5 ? 'just now' : ago + 's ago'}`;
}

/* ─── Share modal ──────────────────────────────────────────────────────── */
async function showVsShareModal(blobIdArg, codeArg, vsStateArg) {
  const blobId = blobIdArg !== undefined ? blobIdArg : (state.vs && state.vs.blobId);
  const vsState = vsStateArg || buildCurrentVsSnapshot();
  const code = codeArg || await encodeShareCode(vsState);
  const shareUrl = blobId ? buildShareUrl(blobId) : '';
  const modal = $('modal');
  modal.innerHTML = `
    <div class="modal-hdr">
      <div class="k" style="color:var(--violet)">1v1 · Live</div>
      <h2>Send this to a friend</h2>
      <div class="sub">They pick which side, tap join, and you both play on the same map. ${blobId ? 'Cloud sync active.' : 'No cloud — use the code below.'}</div>
    </div>
    <div class="modal-body">
      ${shareUrl ? `
        <div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin-bottom:8px">Share link</div>
        <div class="share-url" id="share-url-txt">${escapeHTML(shareUrl)}</div>
        <div class="share-row">
          <button class="primary" id="copy-url">Copy link</button>
          ${navigator.share ? '<button id="share-native">Share…</button>' : ''}
        </div>` : ''}
      <div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin:14px 0 8px">Or paste-code (works offline)</div>
      <div class="share-code" id="share-code-txt">${escapeHTML(code)}</div>
      <div class="share-row">
        <button class="primary" id="copy-code">Copy code</button>
      </div>
      <div class="share-hint">
        Progress syncs both ways ${blobId ? 'automatically every 30s' : 'when you paste an updated code back'}. Close this and start claiming — you're in game.
      </div>
      <div class="modal-actions" style="margin-top:16px">
        <button class="secondary" id="modal-close">Close</button>
      </div>
    </div>
  `;
  $('modal-bg').classList.add('show');
  $('modal-close').addEventListener('click', () => $('modal-bg').classList.remove('show'));
  const copyBtn = $('copy-code');
  if (copyBtn) copyBtn.addEventListener('click', () => copyText(code, copyBtn));
  const copyUrl = $('copy-url');
  if (copyUrl) copyUrl.addEventListener('click', () => copyText(shareUrl, copyUrl));
  const shareNative = $('share-native');
  if (shareNative) shareNative.addEventListener('click', async () => {
    try { await navigator.share({ title: 'TurfLoop VS', url: shareUrl, text: 'Join my TurfLoop game' }); } catch (e) {}
  });
}

function buildShareUrl(blobId) {
  const u = new URL(location.href);
  u.searchParams.set('vs', blobId);
  u.hash = '';
  return u.toString();
}

async function copyText(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied ✓';
      setTimeout(() => { btn.textContent = orig; }, 1400);
    }
  } catch (e) {
    // Fallback: select + prompt
    const el = document.createElement('textarea');
    el.value = text; el.style.position = 'fixed'; el.style.top = '-1000px';
    document.body.appendChild(el); el.select();
    try { document.execCommand('copy'); if (btn) { btn.textContent = 'Copied ✓'; setTimeout(() => btn.textContent = 'Copy', 1400); } } catch {}
    document.body.removeChild(el);
  }
}

/* ─── Auto-join from URL on load ───────────────────────────────────────── */
async function checkVsUrlOnLoad() {
  const params = new URLSearchParams(location.search);
  const blobId = params.get('vs');
  if (!blobId) return;
  // Delay so tutorial can settle
  setTimeout(async () => {
    try {
      const remote = await jsonblobGet(blobId);
      if (!remote || !remote.players) throw new Error('Not a valid VS game');
      // Show a modal offering to join
      const modal = $('modal');
      modal.innerHTML = `
        <div class="modal-hdr">
          <div class="k" style="color:var(--violet)">Invitation</div>
          <h2>Join VS game</h2>
          <div class="sub">${escapeHTML(remote.players.p1.name || 'Someone')} invited you to a live turf battle · ${escapeHTML((DURATIONS.find(d => d.id === remote.duration) || DURATIONS[0]).n)}</div>
        </div>
        <div class="modal-body">
          <div style="margin-bottom:10px">
            <input type="text" class="vs-input" id="vs-join-name" placeholder="Your name" maxlength="20" value="${escapeHTML(loadVsName())}">
          </div>
          <div class="modal-actions">
            <button class="secondary" id="modal-close">Not now</button>
            <button class="primary" id="modal-vs-join">Join as Player 2</button>
          </div>
        </div>
      `;
      $('modal-bg').classList.add('show');
      $('modal-close').addEventListener('click', () => $('modal-bg').classList.remove('show'));
      $('modal-vs-join').addEventListener('click', async () => {
        const name = $('vs-join-name').value.trim() || 'Player';
        saveVsName(name);
        $('modal-bg').classList.remove('show');
        vsJoinFromCode(location.href); // reuse join-from-url path
      });
    } catch (e) {
      console.warn('auto-join failed', e);
      toast('Could not load VS game from link', 'ai');
    }
  }, 500);
}

  const s = TUT_STEPS[tutStep];
  const total = TUT_STEPS.length;
  const dots = TUT_STEPS.map((_, i) => `<span class="d ${i === tutStep ? 'on' : ''}"></span>`).join('');
  const isFirst = tutStep === 0;
  const isLast = tutStep === total - 1;
  $('tut-card').innerHTML = `
    <div class="tut-visual">${s.visualHTML || ''}</div>
    <div class="tut-body">
      <div class="tut-kicker">${s.kicker}</div>
      <h2 class="tut-title" id="tut-title">${s.title}</h2>
      <p class="tut-desc">${s.desc}</p>
      ${s.extraHTML || ''}
    </div>
    <div class="tut-foot">
      <div class="tut-dots">${dots}</div>
      <div class="tut-buttons">
        <button class="tut-btn" id="tut-back" ${isFirst ? 'disabled' : ''}>Back</button>
        <button class="tut-btn primary" id="tut-next">${isLast ? 'Start playing' : 'Next'}</button>
      </div>
    </div>
  `;
  $('tut-back').addEventListener('click', () => { if (tutStep > 0) { tutStep--; renderTutorial(); } });
  $('tut-next').addEventListener('click', () => {
    if (isLast) closeTutorial();
    else { tutStep++; renderTutorial(); }
  });
}

// Wire skip + help button
$('tut-skip').addEventListener('click', closeTutorial);
$('help-btn').addEventListener('click', openTutorial);
$('tut-bg').addEventListener('click', e => {
  if (e.target === $('tut-bg')) closeTutorial();
});
document.addEventListener('keydown', e => {
  if (!$('tut-bg').classList.contains('show')) return;
  if (e.key === 'Escape') closeTutorial();
  else if (e.key === 'ArrowRight') { $('tut-next') && $('tut-next').click(); }
  else if (e.key === 'ArrowLeft') { $('tut-back') && $('tut-back').click(); }
});

// First-run auto-open
try {
  if (!localStorage.getItem(TUTORIAL_KEY)) {
    setTimeout(openTutorial, 300);
  }
} catch (e) {}

/* ═══════════════════════════════════════════════════════════════════════
   Mobile drawer toggle
   ═══════════════════════════════════════════════════════════════════════ */
function collapseDrawer() { $('side').classList.add('collapsed'); updateSideToggleLabel(); }
function expandDrawer() { $('side').classList.remove('collapsed'); updateSideToggleLabel(); }
function toggleDrawer() {
  const s = $('side');
  s.classList.toggle('collapsed');
  updateSideToggleLabel();
}
function updateSideToggle() {
  const t = $('side-toggle');
  if (!t) return;
  // Show only during playing phase on mobile
  if (state.phase === 'playing' && window.innerWidth <= 900) t.classList.add('show');
  else t.classList.remove('show');
  updateSideToggleLabel();
}
function updateSideToggleLabel() {
  const t = $('side-toggle-label');
  if (!t) return;
  t.textContent = $('side').classList.contains('collapsed') ? 'Menu ▲' : 'Hide ▼';
}
$('side-toggle').addEventListener('click', toggleDrawer);
window.addEventListener('resize', () => {
  updateSideToggle();
  if (window.innerWidth > 900) $('side').classList.remove('collapsed');
  // let leaflet resize
  setTimeout(() => map.invalidateSize(), 50);
});

// Also allow tapping the drawer handle to toggle on mobile
$('side').addEventListener('click', e => {
  if (window.innerWidth > 900) return;
  if (!$('side').classList.contains('collapsed')) return;
  // If collapsed, any tap on visible header expands it
  const rect = $('side').getBoundingClientRect();
  if (e.clientY <= rect.top + 46) toggleDrawer();
});

// Init
renderSetup();
checkVsUrlOnLoad();

// Ensure map takes correct size after layout paints
setTimeout(() => map.invalidateSize(), 100);
</script>
</body>
</html>
