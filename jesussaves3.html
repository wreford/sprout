// ═══ Sound — organ/arena style (max 0.025 vol) ═══
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

function organ(freq,dur,vol){
  if(!audioCtx)return;
  [1,2,3,4].forEach(function(h){
    var osc=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    osc.type="sine";
    osc.frequency.value=freq*h;
    g.gain.setValueAtTime(Math.min((vol||0.02)/(h*h),0.025),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    osc.connect(g);g.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+dur);
  });
}

function sndSave(){organ(523,0.15,0.02);setTimeout(function(){organ(659,0.15,0.02);},80);setTimeout(function(){organ(784,0.2,0.02);},160);}
function sndGoal(){
  if(!audioCtx)return;
  // Goal horn — low buzzer
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sawtooth";osc.frequency.value=150;
  g.gain.setValueAtTime(0.025,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.5);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+1.5);
}
function sndBigSave(){organ(784,0.2,0.02);setTimeout(function(){organ(988,0.2,0.02);},100);setTimeout(function(){organ(1175,0.3,0.02);},200);}
function sndWhistle(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sine";osc.frequency.value=3200;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.4);
}
function sndCrowdRoar(){
  if(!audioCtx)return;
  // Brief noise burst for crowd
  var bufSize=audioCtx.sampleRate*0.3;
  var buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*0.5;
  var src=audioCtx.createBufferSource();
  var g=audioCtx.createGain();
  src.buffer=buf;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
  src.connect(g);g.connect(audioCtx.destination);src.start();
}
function sndPowerup(){organ(600,0.1,0.02);setTimeout(function(){organ(900,0.1,0.02);},60);setTimeout(function(){organ(1200,0.15,0.02);},120);}

// ── Organ music loop
var musicPlaying=false,musicInterval=null;
function playChargeTheme(){
  if(musicPlaying)return;musicPlaying=true;
  var notes=[{f:262,t:0,d:0.2},{f:330,t:200,d:0.2},{f:392,t:400,d:0.2},{f:523,t:600,d:0.4},{f:392,t:1000,d:0.2},{f:523,t:1200,d:0.6}];
  function playOnce(){notes.forEach(function(n){setTimeout(function(){organ(n.f,n.d,0.012);},n.t);});}
  playOnce();musicInterval=setInterval(playOnce,4000);
}
function stopMusic(){musicPlaying=false;clearInterval(musicInterval);}

function jesusSpeak(text,force){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(!force&&now-lastJokeTime<6000)return;
    if(!force&&jokeSpoken[text])return;
    jokeSpoken[text]=true;
    lastJokeTime=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var utter=new SpeechSynthesisUtterance(text);
        utter.rate=1.0;utter.pitch=0.9;utter.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var pick=null;
          for(var i=0;i<voices.length;i++){
            if(voices[i].lang&&voices[i].lang.indexOf('en')===0){pick=voices[i];break;}
          }
          if(pick)utter.voice=pick;
        }
        speechSynthesis.speak(utter);
      }catch(e){}
    },50);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}
function pickJoke(arr){return arr[Math.floor(Math.random()*arr.length)];}

// ═══ Game State ═══
var STATE="menu";
var goalie,pucks,particles,crowd,powerupDrops;
var saves,goals,totalShots,wave,frame;
var streak,bestStreak;
var shotSpeed,shotInterval,shotTimer;
var periodTime,period;
var crowdMood;
var bestSaves=parseInt(localStorage.getItem("jesus3-best"))||0;

// Power-up state
var holyShieldActive=false,holyShieldSaves=0;
var breadMultActive=false,breadMultTimer=0;
var fishPowerActive=false,fishPowerTimer=0;
var holyWaterActive=false,holyWaterTimer=0;
var lastPowerupDrop=0;

// Goal flash
var goalFlashTimer=0;

// Jumbotron
var jumbotronMsg="";
var jumbotronTimer=0;
var JUMBOTRON_MSGS=[
  "KISS CAM! 💋 Jesus blushes.",
  "WAVE CHECK! 🌊 Everyone waves!",
  "FAN OF THE GAME: That guy in the fish hat",
  "REPLAY: Was that a miracle? YES.",
  "TRIVIA: How many loaves? FIVE. Correct!",
  "AD: Shepherd's Rod Insurance — We've got you covered!",
  "SCORE UPDATE: Heaven 1, Everyone Else 0",
  "STAT: Jesus SV% is literally divine",
  "PROMO: Buy 2 loaves get 5000 free!",
  "ALERT: Donkey in parking lot C. Again.",
  "FUN FACT: This ice was blessed twice.",
  "NOTICE: No sandal-throwing in the stands.",
  "AD: Noah's Ark Pet Transport — Two by Two!",
  "REPLAY: That save was UNREAL!",
  "STAT: Crowd holiness level: MAXIMUM"
];

// Wave animation for crowd
var waveOffset=0;

// Goalie & net
var goalX,goalY,goalW,goalH;
var netX,netY,netW,netH;
var baseGoalieW=44;

function reset(){
  goalW=Math.min(260,W*0.5);
  goalH=60;
  netX=W/2-goalW/2;
  netY=H-goalH-35;
  netW=goalW;
  netH=goalH;

  goalie={x:W/2,y:netY+10,w:baseGoalieW,h:54,targetX:W/2};
  pucks=[];
  particles=[];
  crowd=[];
  powerupDrops=[];

  var crowdEmojis=["👨","👩","👦","👧","🧑","👴","👵","🧒","👱","👲","🧔","👳","🤶","🎅","👼","🧙"];
  for(var i=0;i<70;i++){
    crowd.push({
      x:15+Math.random()*(W-30),
      y:10+Math.random()*75,
      emoji:crowdEmojis[Math.floor(Math.random()*crowdEmojis.length)],
      bobSpeed:1+Math.random()*2,
      bobOffset:Math.random()*Math.PI*2,
      idx:i
    });
  }

  saves=0;goals=0;totalShots=0;wave=1;frame=0;
  streak=0;bestStreak=0;
  shotSpeed=3;shotInterval=55;shotTimer=0;
  periodTime=5400; // 90 seconds per period (90*60)
  period=1;
  crowdMood=50;
  holyShieldActive=false;holyShieldSaves=0;
  breadMultActive=false;breadMultTimer=0;
  fishPowerActive=false;fishPowerTimer=0;
  holyWaterActive=false;holyWaterTimer=0;
  lastPowerupDrop=0;
  goalFlashTimer=0;
  waveOffset=0;
  jumbotronMsg=JUMBOTRON_MSGS[0];
  jumbotronTimer=0;
}

// ═══ Shot Types ═══
function shootPuck(type){
  totalShots++;
  var fromX=50+Math.random()*(W-100);
  var fromY=30+Math.random()*70;
  var targetX=netX+20+Math.random()*(netW-40);
  var targetY=netY+Math.random()*netH*0.5;
  var dx=targetX-fromX,dy=targetY-fromY;
  var len=Math.sqrt(dx*dx+dy*dy);

  var speed,curve,shotType;
  if(!type) type=Math.random()<0.4?'wrist':(Math.random()<0.6?'slap':'deke');

  if(type==='slap'){
    speed=(shotSpeed+2)+Math.random()*2;
    curve=(Math.random()-0.5)*0.15;
    shotType='slap';
  } else if(type==='deke'){
    speed=shotSpeed*0.6+Math.random()*0.5;
    curve=(Math.random()-0.5)*0.8;
    shotType='deke';
  } else {
    speed=shotSpeed+Math.random()*1.5;
    curve=(Math.random()-0.5)*0.3;
    shotType='wrist';
  }

  pucks.push({
    x:fromX,y:fromY,
    vx:dx/len*speed,vy:dy/len*speed,
    curve:curve,radius:8,active:true,
    shotType:shotType,
    trail:[]
  });
}

function shootMultiple(count){
  for(var i=0;i<count;i++){
    setTimeout(function(){if(STATE==="playing")shootPuck();},i*200);
  }
}

// ═══ Power-up Drops ═══
var POWERUP_DROP_TYPES=[
  {emoji:'✝️',type:'shield',name:'Holy Shield'},
  {emoji:'🍞',type:'bread',name:'Bread Multiplier'},
  {emoji:'🐟',type:'fish',name:'Fish Power'},
  {emoji:'💧',type:'water',name:'Holy Water'}
];

function spawnPowerupDrop(){
  var pu=POWERUP_DROP_TYPES[Math.floor(Math.random()*POWERUP_DROP_TYPES.length)];
  powerupDrops.push({
    x:60+Math.random()*(W-120),
    y:-20,
    vy:1.5+Math.random(),
    emoji:pu.emoji,
    type:pu.type,
    name:pu.name,
    alive:true,
    ring:0
  });
}

// ═══ Input ═══
var mouseX=W/2;
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;});
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();initAudio();
  if(STATE==="menu"){STATE="playing";reset();playChargeTheme();sndWhistle();jokeSpoken={};setTimeout(function(){jesusSpeak(pickJoke(JOKES_GAME_START),true);},500);return;}
  if(STATE==="gameover"){STATE="playing";reset();playChargeTheme();sndWhistle();jokeSpoken={};setTimeout(function(){jesusSpeak(pickJoke(JOKES_GAME_START),true);},500);return;}
  mouseX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();mouseX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('click',function(){
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();playChargeTheme();sndWhistle();jokeSpoken={};setTimeout(function(){jesusSpeak(pickJoke(JOKES_GAME_START),true);},500);}
  else if(STATE==="gameover"){STATE="playing";reset();playChargeTheme();sndWhistle();jokeSpoken={};setTimeout(function(){jesusSpeak(pickJoke(JOKES_GAME_START),true);},500);}
});

// ═══ Particles ═══
function spawnParts(x,y,emoji,count){
  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,emoji:emoji,size:12+Math.random()*8});
  }
}

// ═══ Update ═══
function update(){
  if(STATE!=="playing")return;
  frame++;
  periodTime--;

  // Power-up timers
  var nowMs=Date.now();
  if(breadMultActive&&nowMs-breadMultTimer>10000){breadMultActive=false;}
  if(fishPowerActive&&nowMs-fishPowerTimer>5000){fishPowerActive=false;goalie.w=baseGoalieW;}
  if(holyWaterActive&&nowMs-holyWaterTimer>2000){holyWaterActive=false;}
  if(goalFlashTimer>0)goalFlashTimer--;

  // Wave offset for crowd
  waveOffset+=0.04;

  // Jumbotron update every ~10 seconds
  jumbotronTimer++;
  if(jumbotronTimer>=600){
    jumbotronTimer=0;
    jumbotronMsg=JUMBOTRON_MSGS[Math.floor(Math.random()*JUMBOTRON_MSGS.length)];
  }

  // Period transitions
  if(periodTime<=0){
    period++;
    periodTime=5400;
    sndWhistle();
    jesusSpeak(pickJoke(JOKES_PERIOD_END),true);
    if(period>3){
      STATE="gameover";
      stopMusic();
      sndGoal();
      if(saves>bestSaves){bestSaves=saves;localStorage.setItem("jesus3-best",bestSaves);}
      return;
    }
    shotSpeed+=0.7;
    shotInterval=Math.max(20,shotInterval-8);
  }

  // Random joke every ~30 seconds
  if(frame%1800===900&&frame>300){jesusSpeak(pickJoke(JOKES_RANDOM));}

  // Wave escalation
  if(frame%600===0&&frame>0){
    wave++;
    shotInterval=Math.max(12,shotInterval-3);
    shotSpeed=Math.min(9,shotSpeed+0.25);
  }

  // Power-up drops every 30 seconds (1800 frames)
  if(frame>0&&frame%1800===0){
    spawnPowerupDrop();
  }

  // Shoot pucks
  shotTimer++;
  if(shotTimer>=shotInterval){
    shotTimer=0;
    if(Math.random()<0.15&&wave>=2)shootMultiple(2);
    else if(Math.random()<0.08&&wave>=3)shootMultiple(3);
    else shootPuck();
  }

  // Move goalie
  var effectiveW=fishPowerActive?baseGoalieW*1.8:baseGoalieW;
  goalie.w=effectiveW;
  goalie.targetX=Math.max(netX+goalie.w/2,Math.min(netX+netW-goalie.w/2,mouseX));
  goalie.x+=(goalie.targetX-goalie.x)*0.15;

  // Update power-up drops
  for(var i=powerupDrops.length-1;i>=0;i--){
    var pd=powerupDrops[i];
    if(!pd.alive){powerupDrops.splice(i,1);continue;}
    pd.y+=pd.vy;
    pd.ring+=0.08;
    // Check if goalie catches it
    if(pd.y>goalie.y-20&&pd.y<goalie.y+goalie.h&&pd.x>goalie.x-goalie.w/2-15&&pd.x<goalie.x+goalie.w/2+15){
      pd.alive=false;
      sndPowerup();
      jesusSpeak(pickJoke(JOKES_POWERUP),true);
      spawnParts(pd.x,pd.y,"✨",4);
      if(pd.type==='shield'){holyShieldActive=true;holyShieldSaves=3;}
      else if(pd.type==='bread'){breadMultActive=true;breadMultTimer=Date.now();}
      else if(pd.type==='fish'){fishPowerActive=true;fishPowerTimer=Date.now();goalie.w=baseGoalieW*1.8;}
      else if(pd.type==='water'){
        holyWaterActive=true;holyWaterTimer=Date.now();
        // Freeze all active pucks
        for(var j=0;j<pucks.length;j++){
          if(pucks[j].active){pucks[j].vx=0;pucks[j].vy=0;pucks[j].curve=0;}
        }
      }
    }
    // Off screen
    if(pd.y>H+20)powerupDrops.splice(i,1);
  }

  // Update pucks
  for(var i=pucks.length-1;i>=0;i--){
    var p=pucks[i];
    if(!p.active)continue;

    // Holy water freeze effect
    if(holyWaterActive){
      // pucks already frozen, skip movement
    } else {
      p.vx+=p.curve*0.02;
      p.x+=p.vx;
      p.y+=p.vy;
    }

    // Trail
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>8)p.trail.shift();

    // Check save
    var gLeft=goalie.x-goalie.w/2;
    var gRight=goalie.x+goalie.w/2;
    var gTop=goalie.y-12;
    var gBot=goalie.y+goalie.h;
    if(p.x>gLeft-p.radius&&p.x<gRight+p.radius&&p.y>gTop-p.radius&&p.y<gBot+p.radius){
      var pts=breadMultActive?2:1;
      saves+=pts;
      streak++;
      bestStreak=Math.max(bestStreak,streak);
      p.active=false;
      crowdMood=Math.min(100,crowdMood+5);
      sndCrowdRoar();

      if(streak%5===0){sndBigSave();spawnParts(p.x,p.y,"✝️",5);spawnParts(p.x,p.y,"⭐",3);jesusSpeak(pickJoke(JOKES_STREAK),true);}
      else if(streak%3===0){sndSave();spawnParts(p.x,p.y,"🙏",3);spawnParts(p.x,p.y,"✨",3);jesusSpeak(pickJoke(JOKES_SAVE));}
      else{sndSave();spawnParts(p.x,p.y,"🙏",2);spawnParts(p.x,p.y,"✨",2);}

      p.vy=-Math.abs(p.vy)*0.6;p.vx=(Math.random()-0.5)*4;
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},500);})(p);
      continue;
    }

    // Holy Shield auto-block
    if(holyShieldActive&&p.y>netY-30&&p.x>netX&&p.x<netX+netW){
      holyShieldSaves--;
      if(holyShieldSaves<=0)holyShieldActive=false;
      saves+=(breadMultActive?2:1);
      streak++;
      bestStreak=Math.max(bestStreak,streak);
      p.active=false;
      sndBigSave();
      spawnParts(p.x,p.y,"✝️",4);
      spawnParts(p.x,p.y,"🛡️",2);
      p.vy=-Math.abs(p.vy);
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},500);})(p);
      continue;
    }

    // Check goal
    if(p.y>netY+10&&p.x>netX+5&&p.x<netX+netW-5){
      goals++;
      streak=0;
      p.active=false;
      crowdMood=Math.max(0,crowdMood-15);
      goalFlashTimer=30; // 0.5s at 60fps
      sndGoal();
      jesusSpeak(pickJoke(JOKES_GOAL),true);
      spawnParts(p.x,p.y,"🚨",4);
      spawnParts(p.x,p.y,"😱",2);
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},800);})(p);
      continue;
    }

    // Off screen
    if(p.y>H+20||p.x<-20||p.x>W+20||p.y<-20){
      pucks.splice(i,1);
    }
  }

  // Crowd mood decay
  if(frame%30===0)crowdMood=Math.max(20,crowdMood-0.5);

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life-=0.02;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ═══ Draw ═══
function draw(){
  // Ice rink background — gradient
  var iceGrad=ctx.createLinearGradient(0,0,0,H);
  iceGrad.addColorStop(0,"#c8dce8");
  iceGrad.addColorStop(0.5,"#e0eef6");
  iceGrad.addColorStop(1,"#d0dfe8");
  ctx.fillStyle=iceGrad;
  ctx.fillRect(0,0,W,H);

  // Ice scratches
  ctx.strokeStyle="rgba(180,200,220,0.3)";
  ctx.lineWidth=0.5;
  for(var sc=0;sc<20;sc++){
    var sx1=Math.sin(sc*7+frame*0.001)*W;
    ctx.beginPath();ctx.moveTo(sx1,0);ctx.lineTo(sx1+50,H);ctx.stroke();
  }
  // Horizontal scratches
  for(var sc=0;sc<10;sc++){
    var sy1=Math.cos(sc*11+frame*0.0005)*H;
    ctx.beginPath();ctx.moveTo(0,sy1);ctx.lineTo(W,sy1+30);ctx.stroke();
  }

  // Goal flash overlay
  if(goalFlashTimer>0){
    ctx.fillStyle="rgba(255,0,0,"+(goalFlashTimer/30*0.3)+")";
    ctx.fillRect(0,0,W,H);
  }

  // Rink boards
  ctx.strokeStyle="#445";ctx.lineWidth=6;
  ctx.beginPath();ctx.roundRect(6,6,W-12,H-12,16);ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,14);ctx.stroke();

  // Blue lines
  ctx.fillStyle="rgba(41,98,255,0.2)";
  ctx.fillRect(12,H*0.35-2,W-24,6);
  // Red line
  ctx.fillStyle="rgba(255,30,30,0.2)";
  ctx.fillRect(12,H*0.55-2,W-24,6);

  // Center circle + logo
  ctx.strokeStyle="rgba(255,30,30,0.18)";ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(W/2,H*0.45,60,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle="rgba(41,98,255,0.12)";ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,H*0.45,55,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle="rgba(41,98,255,0.1)";
  ctx.beginPath();ctx.arc(W/2,H*0.45,8,0,Math.PI*2);ctx.fill();
  ctx.font="14px serif";ctx.textAlign="center";ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillText("✝️",W/2,H*0.45+5);

  // Face-off circles
  ctx.strokeStyle="rgba(255,30,30,0.1)";ctx.lineWidth=1.5;
  var foY1=H*0.35,foY2=H*0.55;
  ctx.beginPath();ctx.arc(W*0.25,foY1,25,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.75,foY1,25,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.25,foY2,25,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.75,foY2,25,0,Math.PI*2);ctx.stroke();

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 28px monospace";ctx.fillStyle="#1a2744";
    ctx.fillText("JESUS SAVES 3",W/2,H*0.15);
    ctx.font="bold 16px monospace";ctx.fillStyle="#666";
    ctx.fillText("THE HOLY TRILOGY",W/2,H*0.21);
    ctx.font="48px serif";ctx.fillStyle="#1a2744";
    ctx.fillText("⛸️🧔✝️🏒",W/2,H*0.34);
    ctx.font="13px monospace";ctx.fillStyle="#555";
    ctx.fillText("Move left/right to block pucks",W/2,H*0.46);
    ctx.fillText("3 periods of 90 seconds each!",W/2,H*0.51);
    ctx.fillText("3 shot types: Wrist, Slap, Deke",W/2,H*0.56);
    ctx.fillText("Catch power-ups falling from above!",W/2,H*0.61);
    if(bestSaves>0){ctx.fillStyle="#1a2744";ctx.fillText("Best: "+bestSaves+" saves",W/2,H*0.68);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";
    ctx.fillText("[ Tap / Click to play ]",W/2,H*0.78);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.90);
    return;
  }

  // ── Jumbotron (top center) ──
  var jbW=Math.min(300,W*0.7);
  var jbH=36;
  var jbX=W/2-jbW/2;
  var jbY=2;
  // Jumbotron frame
  ctx.fillStyle="rgba(20,20,40,0.85)";
  ctx.beginPath();ctx.roundRect(jbX,jbY,jbW,jbH,6);ctx.fill();
  ctx.strokeStyle="rgba(255,215,0,0.5)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(jbX,jbY,jbW,jbH,6);ctx.stroke();
  // LED dots border
  ctx.fillStyle="rgba(255,215,0,0.3)";
  for(var d=0;d<Math.floor(jbW/8);d++){
    ctx.beginPath();ctx.arc(jbX+4+d*8,jbY+2,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(jbX+4+d*8,jbY+jbH-2,1.5,0,Math.PI*2);ctx.fill();
  }
  // Jumbotron text
  ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.fillStyle="#FFD700";
  ctx.fillText(jumbotronMsg,W/2,jbY+jbH/2+4);

  // ── Crowd with wave ──
  for(var i=0;i<crowd.length;i++){
    var c=crowd[i];
    var wavePhase=Math.sin(waveOffset-c.x*0.02);
    var waveBob=wavePhase>0.7?-8:0; // pop up during wave
    var moodBob=Math.sin(frame*0.03*c.bobSpeed+c.bobOffset)*(crowdMood>70?4:1);
    ctx.font="16px serif";
    ctx.textAlign="center";
    ctx.fillText(c.emoji,c.x,c.y+moodBob+waveBob+40);
  }
  if(crowdMood>70){
    ctx.font="10px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";ctx.textAlign="center";
    ctx.fillText("🔊 CROWD GOES WILD!",W/2,118);
  }

  // Banners
  ctx.fillStyle="rgba(26,39,68,0.08)";
  ctx.fillRect(W*0.03,120,W*0.14,18);
  ctx.fillRect(W*0.83,120,W*0.14,18);
  ctx.font="7px monospace";ctx.fillStyle="rgba(0,0,0,0.2)";ctx.textAlign="center";
  ctx.fillText("HOLY SAVES ARENA",W*0.10,132);
  ctx.fillText("TRINITY SPONSORS",W*0.90,132);

  // ── Scoreboard (HOME vs AWAY) ──
  var sbW=220,sbH=28;
  var sbX=W/2-sbW/2;
  var sbY=jbY+jbH+4;
  ctx.fillStyle="rgba(20,20,40,0.75)";
  ctx.beginPath();ctx.roundRect(sbX,sbY,sbW,sbH,4);ctx.fill();
  ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.fillStyle="#fff";
  ctx.fillText("HOME",sbX+30,sbY+sbH/2+4);
  ctx.font="bold 14px monospace";ctx.fillStyle="#4CAF50";
  ctx.fillText(String(saves),sbX+70,sbY+sbH/2+5);
  ctx.font="bold 10px monospace";ctx.fillStyle="#aaa";
  ctx.fillText("P"+period,sbX+sbW/2,sbY+sbH/2+4);
  ctx.font="bold 14px monospace";ctx.fillStyle="#F44336";
  ctx.fillText(String(goals),sbX+sbW-70,sbY+sbH/2+5);
  ctx.font="bold 10px monospace";ctx.fillStyle="#fff";
  ctx.fillText("AWAY",sbX+sbW-30,sbY+sbH/2+4);

  // Net
  ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillRect(netX,netY,netW,netH);
  ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=0.5;
  for(var ny=netY;ny<netY+netH;ny+=8){ctx.beginPath();ctx.moveTo(netX,ny);ctx.lineTo(netX+netW,ny);ctx.stroke();}
  for(var nx=netX;nx<netX+netW;nx+=8){ctx.beginPath();ctx.moveTo(nx,netY);ctx.lineTo(nx,netY+netH);ctx.stroke();}
  // Goal posts
  ctx.fillStyle="#cc0000";
  ctx.fillRect(netX-3,netY,6,netH);
  ctx.fillRect(netX+netW-3,netY,6,netH);
  ctx.fillRect(netX,netY-3,netW,6);
  // Crease
  ctx.strokeStyle="rgba(255,0,0,0.2)";ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.6,30,0,Math.PI,0);ctx.stroke();

  // ── Goalie (Better Jesus) ──
  var gx=goalie.x;
  var gy=goalie.y;
  var gw=goalie.w;

  // Halo glow
  ctx.beginPath();
  ctx.arc(gx,gy-8,16,0,Math.PI*2);
  var haloGrad=ctx.createRadialGradient(gx,gy-8,4,gx,gy-8,16);
  haloGrad.addColorStop(0,"rgba(255,215,0,0.4)");
  haloGrad.addColorStop(1,"rgba(255,215,0,0)");
  ctx.fillStyle=haloGrad;
  ctx.fill();

  // Halo ring
  ctx.strokeStyle="rgba(255,215,0,0.7)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(gx,gy-6,12,4,0,0,Math.PI*2);ctx.stroke();

  // Body (white jersey)
  ctx.fillStyle="rgba(255,255,255,0.9)";
  ctx.beginPath();
  ctx.moveTo(gx-gw/2+4,gy+10);
  ctx.lineTo(gx+gw/2-4,gy+10);
  ctx.lineTo(gx+gw/2,gy+goalie.h-6);
  ctx.lineTo(gx-gw/2,gy+goalie.h-6);
  ctx.closePath();ctx.fill();
  // Jersey border
  ctx.strokeStyle="rgba(0,0,0,0.15)";ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(gx-gw/2+4,gy+10);ctx.lineTo(gx+gw/2-4,gy+10);
  ctx.lineTo(gx+gw/2,gy+goalie.h-6);ctx.lineTo(gx-gw/2,gy+goalie.h-6);
  ctx.closePath();ctx.stroke();

  // Red cross on chest
  ctx.strokeStyle="rgba(200,0,0,0.6)";ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(gx,gy+14);ctx.lineTo(gx,gy+30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(gx-8,gy+20);ctx.lineTo(gx+8,gy+20);ctx.stroke();

  // Jersey stripes
  ctx.strokeStyle="rgba(200,0,0,0.2)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx-gw/2+2,gy+goalie.h-10);ctx.lineTo(gx+gw/2-2,gy+goalie.h-10);ctx.stroke();
  ctx.beginPath();ctx.moveTo(gx-gw/2+2,gy+goalie.h-14);ctx.lineTo(gx+gw/2-2,gy+goalie.h-14);ctx.stroke();

  // Face
  ctx.font="28px serif";ctx.textAlign="center";
  ctx.fillText("🧔",gx,gy+8);

  // Goalie pads
  ctx.fillStyle="rgba(240,240,255,0.85)";
  ctx.fillRect(gx-gw/2+2,gy+goalie.h-8,gw-4,10);
  ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=1;
  ctx.strokeRect(gx-gw/2+2,gy+goalie.h-8,gw-4,10);
  // Pad stripes
  ctx.strokeStyle="rgba(200,0,0,0.3)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(gx-gw/2+6,gy+goalie.h-6);ctx.lineTo(gx-gw/2+6,gy+goalie.h+1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(gx+gw/2-6,gy+goalie.h-6);ctx.lineTo(gx+gw/2-6,gy+goalie.h+1);ctx.stroke();

  // Hockey stick
  ctx.font="20px serif";ctx.fillText("🏒",gx+gw/2+4,gy+goalie.h-10);

  // Blocker (left hand)
  ctx.fillStyle="rgba(200,200,220,0.8)";
  ctx.fillRect(gx-gw/2-8,gy+16,12,16);
  ctx.strokeStyle="rgba(0,0,0,0.15)";ctx.lineWidth=1;
  ctx.strokeRect(gx-gw/2-8,gy+16,12,16);

  // Fish power glow
  if(fishPowerActive){
    ctx.strokeStyle="rgba(0,200,255,"+(0.4+Math.sin(frame*0.1)*0.2)+")";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.ellipse(gx,gy+goalie.h/2,gw/2+10,goalie.h/2+10,0,0,Math.PI*2);
    ctx.stroke();
  }

  // Holy shield visual
  if(holyShieldActive){
    ctx.strokeStyle="rgba(255,215,0,"+(0.5+Math.sin(frame*0.08)*0.3)+")";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(gx,gy+goalie.h/2,gw/2+20,0,Math.PI*2);
    ctx.stroke();
    ctx.font="10px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";
    ctx.fillText("🛡️x"+holyShieldSaves,gx,gy-16);
  }

  // ── Power-up drops ──
  for(var i=0;i<powerupDrops.length;i++){
    var pd=powerupDrops[i];
    if(!pd.alive)continue;
    // Glow
    ctx.beginPath();ctx.arc(pd.x,pd.y,18+Math.sin(pd.ring)*3,0,Math.PI*2);
    ctx.fillStyle="rgba(255,215,0,0.15)";ctx.fill();
    ctx.strokeStyle="rgba(255,215,0,0.5)";ctx.lineWidth=2;ctx.stroke();
    // Emoji
    ctx.font="24px serif";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(pd.emoji,pd.x,pd.y);
    ctx.textBaseline="alphabetic";
  }

  // Holy water overlay
  if(holyWaterActive){
    ctx.fillStyle="rgba(100,180,255,0.1)";
    ctx.fillRect(0,0,W,H);
  }

  // ── Pucks ──
  for(var i=0;i<pucks.length;i++){
    var p=pucks[i];
    // Trail
    for(var t=0;t<p.trail.length;t++){
      var a=t/p.trail.length*0.3;
      ctx.fillStyle="rgba(0,0,0,"+a+")";
      ctx.beginPath();ctx.arc(p.trail[t].x,p.trail[t].y,p.radius*0.5,0,Math.PI*2);ctx.fill();
    }
    // Shadow
    ctx.fillStyle="rgba(0,0,0,0.15)";
    ctx.beginPath();ctx.ellipse(p.x,p.y+4,p.radius,p.radius*0.4,0,0,Math.PI*2);ctx.fill();
    // Puck body
    var puckColor=p.shotType==='slap'?"#cc0000":p.shotType==='deke'?"#0044cc":"#111";
    ctx.fillStyle=puckColor;
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
    // Shot type indicator
    if(p.shotType==='slap'){
      ctx.strokeStyle="rgba(255,100,0,0.3)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x-p.vx*3,p.y-p.vy*3);ctx.lineTo(p.x-p.vx*8,p.y-p.vy*8);ctx.stroke();
    } else if(p.shotType==='deke'){
      // Curve trail
      ctx.strokeStyle="rgba(0,100,255,0.2)";ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.radius+4,0,Math.PI*2);ctx.stroke();
    }
  }

  // ── Particles ──
  for(var i=0;i<particles.length;i++){
    var pt=particles[i];
    ctx.globalAlpha=pt.life;
    ctx.font=pt.size+"px serif";ctx.textAlign="center";
    ctx.fillText(pt.emoji,pt.x,pt.y);
  }
  ctx.globalAlpha=1;

  // ── HUD ──
  // Period timer
  var timeLeft=Math.ceil(periodTime/60);
  ctx.textAlign="center";
  ctx.font="bold 11px monospace";ctx.fillStyle="rgba(26,39,68,0.7)";
  ctx.fillText("P"+period+" · "+timeLeft+"s",W/2,H-10);

  // Streak
  if(streak>=3){
    ctx.font="bold 14px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";ctx.textAlign="center";
    ctx.fillText("🔥 "+streak+" SAVE STREAK!",W/2,netY-25);
  }

  // Power-up indicators
  var puY=H-50;
  ctx.textAlign="left";ctx.font="bold 10px monospace";
  if(breadMultActive){ctx.fillStyle="#FF9800";ctx.fillText("🍞 x2 SCORE",8,puY);puY-=14;}
  if(fishPowerActive){ctx.fillStyle="#00BCD4";ctx.fillText("🐟 WIDE GOALIE",8,puY);puY-=14;}
  if(holyWaterActive){ctx.fillStyle="#42A5F5";ctx.fillText("💧 FROZEN",8,puY);puY-=14;}

  // Save percentage
  var savePct=totalShots>0?Math.round(saves/totalShots*100):100;
  ctx.textAlign="left";ctx.font="10px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillText("SV% "+savePct+"%",8,H-12);
  ctx.textAlign="right";
  ctx.fillText("WAVE "+wave,W-8,H-12);

  // Big save text
  if(streak>0&&streak%10===0&&frame%60<30){
    ctx.font="bold 20px monospace";ctx.fillStyle="rgba(200,0,0,0.6)";ctx.textAlign="center";
    ctx.fillText("✝️ DIVINE INTERVENTION! ✝️",W/2,H*0.4);
  }

  // ── Game Over ──
  if(STATE==="gameover"){
    ctx.fillStyle="rgba(26,39,68,0.88)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.font="bold 24px monospace";ctx.fillStyle="#fff";
    ctx.fillText("FINAL BUZZER",W/2,H*0.12);
    ctx.font="bold 14px monospace";ctx.fillStyle="#aaa";
    ctx.fillText("THE HOLY TRILOGY - COMPLETE",W/2,H*0.18);
    ctx.font="48px serif";ctx.fillStyle="#fff";
    ctx.fillText("🧔✝️🏒",W/2,H*0.28);

    ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
    ctx.fillText("Saves: "+saves,W/2,H*0.40);
    ctx.fillText("Goals Against: "+goals,W/2,H*0.46);
    ctx.fillText("Save %: "+savePct+"%",W/2,H*0.52);
    ctx.fillText("Best Streak: "+bestStreak,W/2,H*0.58);

    var msg=savePct>=90?"MIRACLE ON ICE! The trilogy is BLESSED! 🙌":
            savePct>=75?"Blessed performance! The Holy Trilogy is complete! ✝️":
            savePct>=60?"Decent showing. The Father is... moderately pleased.":
            savePct>=40?"Even Jesus has bad trilogies. Like the prequels.":
            "Holy... that was rough. The congregation sends thoughts and prayers. 😬";
    ctx.font="12px monospace";ctx.fillStyle="#aaa";
    // Word wrap the message
    var words=msg.split(' ');
    var line='';
    var lineY=H*0.66;
    for(var wi=0;wi<words.length;wi++){
      var test=line+words[wi]+' ';
      if(ctx.measureText(test).width>W*0.8){
        ctx.fillText(line.trim(),W/2,lineY);
        line=words[wi]+' ';
        lineY+=16;
      } else {
        line=test;
      }
    }
    if(line.trim())ctx.fillText(line.trim(),W/2,lineY);

    if(saves>=bestSaves&&saves>0){ctx.fillStyle="#ffd700";ctx.font="13px monospace";ctx.fillText("🏆 NEW RECORD!",W/2,lineY+22);}

    ctx.fillStyle="#2962ff";ctx.font="14px monospace";
    ctx.fillText("[ Tap to play again ]",W/2,H*0.88);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
