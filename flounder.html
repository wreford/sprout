<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Flounder Flicker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a1628;--panel:#0d1f3c;--border:#1a3a5c;--text:#e0eaff;--dim:#5a7a9a;--green:#4ade80;--gold:#ffd700;--blue:#3b82f6}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center}

/* News ticker */
.ticker-bar{width:100%;background:#061020;border-bottom:1px solid var(--border);overflow:hidden;height:28px;display:flex;align-items:center;flex-shrink:0;z-index:11}
.ticker-track{display:flex;white-space:nowrap;animation:tickerScroll 80s linear infinite}
.ticker-item{font-size:0.72rem;color:var(--dim);padding:0 40px}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Header */
.header{width:100%;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;gap:8px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.title{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#4ade80,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.prestige-badge{font-size:0.75rem;color:var(--gold)}
.prestige-name-badge{font-size:0.7rem;color:var(--gold);font-weight:700;background:rgba(255,215,0,0.1);padding:2px 8px;border-radius:6px;border:1px solid rgba(255,215,0,0.3)}
.achieve-badge{font-size:0.75rem;color:var(--dim);cursor:pointer}
.event-badge{font-size:0.72rem;color:#ff6b6b;font-weight:700;animation:eventPulse 2s ease-in-out infinite}
@keyframes eventPulse{0%,100%{opacity:0.7}50%{opacity:1}}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.header-btn{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:5px 12px;border-radius:8px;font-size:0.72rem;cursor:pointer;font-weight:600}
.header-btn:hover{border-color:var(--blue)}
.prestige-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:0.75rem;cursor:pointer;display:none;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.4)}50%{box-shadow:0 0 20px rgba(255,215,0,0.8)}}

/* Prestige progress bar */
.prestige-progress-wrap{width:100%;background:#061020;height:6px;flex-shrink:0;position:relative;overflow:hidden}
.prestige-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#ff8c00);transition:width 0.3s;width:0%}
.prestige-progress-label{position:absolute;right:8px;top:-1px;font-size:0.55rem;color:var(--gold);font-weight:700}

/* Main layout */
.main{display:flex;flex:1;width:100%;max-width:1200px;overflow:hidden}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;min-height:0;overflow:hidden}
.upgrade-panel{width:340px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0}

/* Upgrade tab bar */
.tab-bar{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab-btn{flex:1;min-width:60px;background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:6px 4px;border-radius:6px;font-size:0.65rem;font-weight:700;cursor:pointer;text-align:center}
.tab-btn.active{border-color:var(--blue);color:var(--text);background:rgba(59,130,246,0.1)}

/* Fish counter */
.fish-count{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;text-align:center;color:#fff;text-shadow:0 0 20px rgba(59,130,246,0.5);transition:color 0.5s}
.fish-count.golden-mode{color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.8)}
.fps-display{font-size:0.9rem;color:var(--dim);margin-top:4px;text-align:center}
.click-power{font-size:0.75rem;color:var(--dim);margin-top:2px;text-align:center}
.multiplier-display{font-size:0.7rem;color:var(--gold);margin-top:2px;text-align:center;min-height:16px}
.fun-fact-display{font-size:0.65rem;color:var(--dim);margin-top:6px;text-align:center;font-style:italic;max-width:400px;opacity:0.8;min-height:16px}

/* Flounder */
.flounder-wrap{position:relative;margin:24px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.flounder{font-size:100px;transition:transform 0.1s,font-size 0.5s;display:block;filter:drop-shadow(0 0 30px rgba(59,130,246,0.4))}
.flounder:active{transform:scale(0.92)}
.flounder.wiggle{animation:wiggle 0.3s ease}
@keyframes wiggle{0%{transform:rotate(0)}20%{transform:rotate(-15deg) scale(1.1)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(5deg)}100%{transform:rotate(0)}}

/* Prestige visual overlays */
.prestige-crown{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:36px;pointer-events:none;z-index:5}
.prestige-level-stars{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:12px;pointer-events:none;z-index:5;white-space:nowrap;color:var(--gold)}

/* Golden glow effect */
.flounder.golden-glow{filter:drop-shadow(0 0 30px rgba(255,215,0,0.8)) drop-shadow(0 0 60px rgba(255,215,0,0.4))}

/* Rainbow shimmer */
.flounder.rainbow-shimmer{animation:wiggle 0.3s ease, rainbowShimmer 3s linear infinite}
@keyframes rainbowShimmer{
  0%{filter:drop-shadow(0 0 30px rgba(255,0,0,0.6)) hue-rotate(0deg)}
  25%{filter:drop-shadow(0 0 30px rgba(0,255,0,0.6)) hue-rotate(90deg)}
  50%{filter:drop-shadow(0 0 30px rgba(0,0,255,0.6)) hue-rotate(180deg)}
  75%{filter:drop-shadow(0 0 30px rgba(255,0,255,0.6)) hue-rotate(270deg)}
  100%{filter:drop-shadow(0 0 30px rgba(255,0,0,0.6)) hue-rotate(360deg)}
}

/* Fire particles */
.fire-particle{position:absolute;pointer-events:none;z-index:4;font-size:14px;animation:fireFloat 1s ease-out forwards}
@keyframes fireFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(0.3)}}

/* Santa hat overlay */
.santa-hat{position:absolute;top:-20px;left:50%;transform:translateX(-40%);font-size:40px;pointer-events:none;z-index:5}

/* Particles */
.particle{position:absolute;pointer-events:none;border-radius:50%;animation:splash 0.6s ease-out forwards}
@keyframes splash{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}}

/* Click text */
.click-text{position:absolute;pointer-events:none;font-weight:800;font-size:1.2rem;color:var(--green);animation:floatUp 0.8s ease-out forwards;z-index:20}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* Bubbles background */
.bubble-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bubble{position:absolute;border-radius:50%;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.08);animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(100vh) scale(1)}100%{transform:translateY(-100px) scale(0.5)}}

/* Ocean waves */
.ocean-waves{position:fixed;bottom:0;left:0;width:200%;height:80px;pointer-events:none;z-index:0;opacity:0.4}
.wave{position:absolute;bottom:0;width:200%;height:50px;border-radius:50% 50% 0 0}
.wave1{background:rgba(30,80,160,0.3);animation:waveMove 6s ease-in-out infinite;left:-50%}
.wave2{background:rgba(20,60,140,0.25);animation:waveMove 8s ease-in-out infinite reverse;left:-30%;bottom:5px}
.wave3{background:rgba(10,40,120,0.2);animation:waveMove 10s ease-in-out infinite;left:-40%;bottom:10px}
@keyframes waveMove{0%,100%{transform:translateX(0)}50%{transform:translateX(60px)}}

/* Prestige wave animation */
.prestige-wave-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;background:linear-gradient(180deg,rgba(59,130,246,0.9),rgba(0,20,60,0.95));animation:prestigeWave 1.5s ease-in-out forwards}
@keyframes prestigeWave{0%{opacity:0;transform:translateY(100%)}30%{opacity:1;transform:translateY(0)}70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100%)}}
.prestige-wave-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;color:var(--gold);text-align:center;text-shadow:0 0 30px rgba(255,215,0,0.6)}

/* Golden Fish */
.golden-fish{position:fixed;z-index:50;cursor:pointer;font-size:48px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.8));animation:goldenSwim var(--swim-duration,5s) linear forwards;pointer-events:auto;user-select:none;-webkit-tap-highlight-color:transparent}
@keyframes goldenSwim{0%{transform:translateX(var(--start-x)) translateY(var(--start-y)) scaleX(var(--dir,1))}100%{transform:translateX(var(--end-x)) translateY(var(--end-y)) scaleX(var(--dir,1))}}
.golden-sparkle{position:fixed;pointer-events:none;font-size:16px;animation:sparkle 0.5s ease-out forwards;z-index:49}
@keyframes sparkle{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-30px)}}

/* Mega golden fish */
.mega-golden-fish{font-size:72px !important;filter:drop-shadow(0 0 40px rgba(255,215,0,1)) drop-shadow(0 0 80px rgba(255,100,0,0.6)) !important}

/* Golden fish click burst */
.golden-burst{position:fixed;pointer-events:none;z-index:51;font-size:28px;animation:burstOut 0.8s ease-out forwards}
@keyframes burstOut{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0.3)}}

/* Fish rain */
.fish-rain{position:fixed;pointer-events:none;z-index:1;font-size:20px;animation:fishFall linear forwards;opacity:0.4}
@keyframes fishFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0.5}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}

/* Mini-game overlay */
.minigame-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
.minigame-title{font-size:1.5rem;font-weight:900;color:var(--gold);margin-bottom:8px}
.minigame-sub{font-size:0.9rem;color:var(--dim);margin-bottom:16px}
.minigame-arena{width:90%;max-width:600px;height:300px;background:rgba(10,30,60,0.8);border:2px solid var(--border);border-radius:16px;position:relative;overflow:hidden}
.minigame-fish{position:absolute;font-size:32px;cursor:pointer;user-select:none;animation:miniSwim var(--mini-dur,3s) linear forwards}
@keyframes miniSwim{0%{left:-40px}100%{left:calc(100% + 40px)}}
.minigame-score{font-size:1.2rem;color:var(--green);font-weight:800;margin-top:12px}
.minigame-timer{font-size:2rem;color:#fff;font-weight:900;margin-bottom:8px}

/* Stats modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:150;display:flex;align-items:center;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:800;margin-bottom:16px;color:var(--blue)}
.modal-close{float:right;background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.82rem}
.stat-label{color:var(--dim)}
.stat-value{color:var(--text);font-weight:700}

/* Prestige confirmation modal */
.prestige-modal{max-width:500px}
.prestige-modal h2{color:var(--gold)}
.prestige-unlock{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:10px;margin:10px 0;font-size:0.85rem;color:var(--gold)}
.prestige-keeps{color:var(--green);font-size:0.8rem;margin:4px 0}
.prestige-resets{color:#ff6b6b;font-size:0.8rem;margin:4px 0}
.prestige-confirm-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:10px 24px;border-radius:10px;font-weight:800;font-size:1rem;cursor:pointer;margin-top:12px;width:100%}
.prestige-confirm-btn:hover{opacity:0.9}
.prestige-cancel-btn{background:var(--bg);color:var(--dim);border:1px solid var(--border);padding:8px 20px;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;margin-top:8px;width:100%}

/* PP shop */
.pp-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.pp-item:hover{border-color:var(--gold)}
.pp-item.affordable{border-color:var(--gold)}
.pp-item.owned{opacity:0.5;border-color:var(--green)}
.pp-icon{font-size:1.4rem;flex-shrink:0}
.pp-info{flex:1}
.pp-name{font-size:0.82rem;font-weight:700}
.pp-desc{font-size:0.65rem;color:var(--dim)}
.pp-cost{font-size:0.75rem;font-weight:700;color:var(--gold);flex-shrink:0}
.pp-count{font-size:0.7rem;color:var(--green);font-weight:700}

/* Upgrades */
.upgrade-section-title{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin:12px 0 6px;padding-left:4px}
.upgrade-btn{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text);transition:all 0.15s;text-align:left}
.upgrade-btn:hover:not(:disabled){border-color:var(--blue);transform:translateX(2px)}
.upgrade-btn.affordable{border-color:var(--green)}
.upgrade-btn.affordable:hover{border-color:#6ee7a0;box-shadow:0 0 12px rgba(74,222,128,0.2)}
.upgrade-btn:disabled{opacity:0.35;cursor:not-allowed}
.upgrade-btn.purchased{border-color:var(--gold);opacity:0.5;cursor:default}
.upg-icon{font-size:1.6rem;flex-shrink:0}
.upg-info{flex:1;min-width:0}
.upg-name{font-size:0.85rem;font-weight:700}
.upg-desc{font-size:0.65rem;color:var(--dim);margin-top:2px}
.upg-cost{font-size:0.75rem;font-weight:700;color:var(--green);margin-top:2px}
.upg-count{font-size:0.85rem;font-weight:800;color:var(--blue);flex-shrink:0;min-width:24px;text-align:right}
.milestone-badge{font-size:0.55rem;color:var(--gold);margin-left:4px}

/* Toast */
.toast{position:fixed;top:90px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:10px 20px;border-radius:10px;font-weight:700;font-size:0.85rem;z-index:100;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;box-shadow:0 4px 20px rgba(255,215,0,0.4);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* Frenzy banner */
.frenzy-banner{position:fixed;top:120px;left:50%;transform:translateX(-50%);padding:8px 24px;border-radius:10px;font-weight:900;font-size:0.9rem;z-index:99;animation:frenzyPulse 0.5s ease-in-out infinite alternate;pointer-events:none;white-space:nowrap}
.frenzy-banner.fish-frenzy{background:linear-gradient(135deg,#ff6b35,#ff1744);color:#fff}
.frenzy-banner.elder-bonus{background:linear-gradient(135deg,#7c4dff,#e040fb);color:#fff}
@keyframes frenzyPulse{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(1.05)}}

/* Tooltip */
.fact-tooltip{position:fixed;background:rgba(13,31,60,0.95);border:1px solid var(--gold);color:var(--text);padding:10px 14px;border-radius:10px;font-size:0.75rem;max-width:300px;z-index:500;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5)}

/* Mobile */
@media(max-width:768px){
  .main{flex-direction:column}
  .upgrade-panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:45vh}
  .game-area{padding:15px;justify-content:flex-start;padding-top:12px}
  .flounder{font-size:80px}
  .fish-count{font-size:2rem}
  .flounder-wrap{margin:12px 0}
  .header{padding:8px 12px}
  .header-btn{padding:4px 8px;font-size:0.65rem}
}
</style>
</head>

<a href="index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>

<!-- News ticker -->
<div class="ticker-bar"><div class="ticker-track" id="tickerTrack"></div></div>

<!-- Prestige progress bar -->
<div class="prestige-progress-wrap">
  <div class="prestige-progress-bar" id="prestigeProgressBar"></div>
  <span class="prestige-progress-label" id="prestigeProgressLabel"></span>
</div>

<!-- Background bubbles -->
<div class="bubble-bg" id="bubbleBg"></div>

<!-- Ocean waves -->
<div class="ocean-waves"><div class="wave wave1"></div><div class="wave wave2"></div><div class="wave wave3"></div></div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span class="title">Flounder Flicker</span>
    <span class="prestige-name-badge" id="prestigeNameBadge" style="display:none"></span>
    <span class="prestige-badge" id="prestigeBadge"></span>
    <span class="achieve-badge" id="achieveBadge" onclick="showStats()">🏆 0/35</span>
    <span class="event-badge" id="eventBadge"></span>
  </div>
  <div class="header-right">
    <button class="header-btn" onclick="showStats()">📊 Stats</button>
    <button class="header-btn" onclick="showPrestigeShop()" id="ppShopBtn" style="display:none">🛒 PP Shop</button>
    <button class="prestige-btn" id="prestigeBtn" onclick="showPrestigeConfirm()">⭐ Prestige</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="game-area" id="gameArea">
    <div class="fish-count" id="fishCount">0 fish</div>
    <div class="fps-display" id="fpsDisplay">0.0 fish/sec</div>
    <div class="click-power" id="clickPower">+1 per flick</div>
    <div class="multiplier-display" id="multiplierDisplay"></div>
    <div class="fun-fact-display" id="funFactDisplay"></div>
    <div class="flounder-wrap" id="flounderWrap">
      <span class="flounder" id="flounder" role="button" aria-label="Flick the flounder">🐟</span>
      <span class="prestige-level-stars" id="prestigeStars"></span>
    </div>
  </div>
  <div class="upgrade-panel" id="upgradePanel">
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="buildings" onclick="switchTab('buildings')">🏗 Build</button>
      <button class="tab-btn" data-tab="clicks" onclick="switchTab('clicks')">👆 Click</button>
      <button class="tab-btn" data-tab="research" onclick="switchTab('research')">🔬 Research</button>
      <button class="tab-btn" data-tab="prestige" onclick="switchTab('prestige')">⭐ Prestige</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

var currentFact = '';

function getRandomFact() {
  var idx;
  do { idx = Math.floor(Math.random() * FUN_FACTS.length); } while (idx === lastFactIndex);
  lastFactIndex = idx;
  currentFact = FUN_FACTS[idx];
  return currentFact;
}

// Show rotating fact in the fun fact display area
function updateFunFact() {
  var el = document.getElementById('funFactDisplay');
  if (el) {
    el.textContent = '"' + getRandomFact() + '"';
    el.title = currentFact;
  }
}

// ── Helpers ──
function fmt(n){
  if(!isFinite(n))return 'Infinity';
  if(n>=1e60)return (n/1e60).toFixed(1)+'Nv';
  if(n>=1e57)return (n/1e57).toFixed(1)+'Oc';
  if(n>=1e54)return (n/1e54).toFixed(1)+'Sp';
  if(n>=1e51)return (n/1e51).toFixed(1)+'Sx';
  if(n>=1e48)return (n/1e48).toFixed(1)+'Qi';
  if(n>=1e45)return (n/1e45).toFixed(1)+'Qa';
  if(n>=1e42)return (n/1e42).toFixed(1)+'Td';
  if(n>=1e39)return (n/1e39).toFixed(1)+'Dd';
  if(n>=1e36)return (n/1e36).toFixed(1)+'Ud';
  if(n>=1e33)return (n/1e33).toFixed(1)+'Dc';
  if(n>=1e30)return (n/1e30).toFixed(1)+'No';
  if(n>=1e27)return (n/1e27).toFixed(1)+'Oc';
  if(n>=1e24)return (n/1e24).toFixed(1)+'Sp';
  if(n>=1e21)return (n/1e21).toFixed(1)+'Sx';
  if(n>=1e18)return (n/1e18).toFixed(1)+'Qn';
  if(n>=1e15)return (n/1e15).toFixed(1)+'Q';
  if(n>=1e12)return (n/1e12).toFixed(1)+'T';
  if(n>=1e9)return (n/1e9).toFixed(1)+'B';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return n.toLocaleString('en-US',{maximumFractionDigits:0});
  return Math.floor(n).toString();
}

function getPrestigeData(){
  // Get the current prestige level definition and the next one
  var current = null;
  var next = null;
  for(var i=0;i<PRESTIGE_LEVELS.length;i++){
    if(PRESTIGE_LEVELS[i].level === state.prestigeLevel){
      current = PRESTIGE_LEVELS[i];
    }
    if(PRESTIGE_LEVELS[i].level === state.prestigeLevel+1){
      next = PRESTIGE_LEVELS[i];
    }
  }
  return {current:current, next:next};
}

function getNextPrestigeReq(){
  var pd = getPrestigeData();
  return pd.next ? pd.next.req : Infinity;
}

function getNextPrestigeMult(){
  var pd = getPrestigeData();
  return pd.next ? pd.next.mult : state.prestigeMultiplier;
}

function getPPUpgradeCount(id){
  return state.ppUpgrades[id] || 0;
}

function getAutoCost(i){return Math.floor(autoUpgradeDefs[i].baseCost*Math.pow(1.15,state.autoUpgrades[i]));}

function getClickPower(){
  let p=1;
  // PP: starting click power
  p += getPPUpgradeCount('startClickPower');
  clickUpgradeDefs.forEach((d,i)=>{if(state.clickUpgrades[i])p+=d.power;});
  // Tidal Wave research: click +50%
  if(state.researchUpgrades[8])p*=1.5;
  // Big Bang Splash: everything x3
  if(state.researchUpgrades[14])p*=3;
  // Event multiplier
  const ev=getActiveEvent();
  if(ev&&ev.mult>1)p*=ev.mult;
  // Frenzy
  if(Date.now()<state.frenzyEnd)p*=10;
  // PP: mult bonus
  var multBonusPct = getPPUpgradeCount('multBonus');
  if(multBonusPct > 0) p *= (1 + multBonusPct/100);
  return Math.floor(p*state.prestigeMultiplier);
}
function getBuildingFps(i){
  let base=autoUpgradeDefs[i].fps;
  // Research building multiplier
  researchDefs.forEach((r,ri)=>{
    if(state.researchUpgrades[ri]&&r.target==='building'&&r.idx===i){
      base*=r.mult;
    }
  });
  return base;
}
function calcFPS(){
  let f=0;
  autoUpgradeDefs.forEach((d,i)=>{
    f+=getBuildingFps(i)*state.autoUpgrades[i];
  });
  // All FPS research multipliers
  let allMult=1;
  researchDefs.forEach((r,ri)=>{
    if(state.researchUpgrades[ri]&&r.target==='allFps'){
      allMult+=r.mult;
    }
  });
  f*=allMult;
  // Big Bang Splash: everything x3
  if(state.researchUpgrades[14])f*=3;
  // Event multiplier
  const ev=getActiveEvent();
  if(ev&&ev.mult>1)f*=ev.mult;
  // Elder bonus
  if(Date.now()<state.elderEnd)f*=2;
  // PP: mult bonus
  var multBonusPct = getPPUpgradeCount('multBonus');
  if(multBonusPct > 0) f *= (1 + multBonusPct/100);
  return f*state.prestigeMultiplier;
}

// ── Flick ──
const flounderEl=document.getElementById('flounder');
const flounderWrap=document.getElementById('flounderWrap');
let ambientStarted=false;
function flick(e){
  e.preventDefault();
  if(!ambientStarted){ambientStarted=true;startAmbient();}
  const power=getClickPower();
  state.fish+=power;
  state.totalFish+=power;
  state.allTimeFish+=power;
  state.thisPrestigeFish+=power;
  state.totalFlicks++;
  playFlick(power);
  // Wiggle
  flounderEl.classList.remove('wiggle');
  void flounderEl.offsetWidth;
  flounderEl.classList.add('wiggle');
  // Click text
  const ct=document.createElement('div');
  ct.className='click-text';
  ct.textContent='+'+fmt(power);
  const rect=flounderWrap.getBoundingClientRect();
  const gRect=document.getElementById('gameArea').getBoundingClientRect();
  ct.style.left=(rect.left-gRect.left+rect.width/2-20)+'px';
  ct.style.top=(rect.top-gRect.top-10)+'px';
  document.getElementById('gameArea').appendChild(ct);
  setTimeout(()=>ct.remove(),800);
  // Particles
  spawnParticles(e.clientX||e.touches?.[0]?.clientX||rect.left+rect.width/2,e.clientY||e.touches?.[0]?.clientY||rect.top+rect.height/2);
  updateDisplay();
  checkAchievements();
}

function doPrestige(){
  var nextReq = getNextPrestigeReq();
  if(state.totalFish < nextReq) return;
  if(state.prestigeLevel >= 100) return;

  var pd = getPrestigeData();
  var next = pd.next;
  if(!next) return;

  // Record prestige history
  var timePlayed = Math.floor((Date.now() - state.prestigeSessionStart) / 1000);
  state.prestigeHistory.push({
    level: next.level,
    fishAtPrestige: state.totalFish,
    date: Date.now(),
    timePlayed: timePlayed
  });

  // Track fastest/highest
  if(timePlayed < state.fastestPrestige) state.fastestPrestige = timePlayed;
  if(state.totalFish > state.highestFishAtPrestige) state.highestFishAtPrestige = state.totalFish;

  // Earn prestige points
  var ppEarned = next.level;
  state.prestigePoints += ppEarned;

  // Calculate kept fish from PP upgrade
  var keepFishPct = getPPUpgradeCount('keepFish');
  var keptFish = keepFishPct > 0 ? Math.floor(state.fish * keepFishPct / 100) : 0;

  // Apply prestige
  state.prestigeLevel = next.level;
  state.prestigeMultiplier = next.mult;

  // Reset values
  state.fish = keptFish;
  state.totalFish = keptFish;
  state.thisPrestigeFish = 0;
  state.totalFlicks = 0;
  state.autoUpgrades = [0,0,0,0,0,0,0,0];
  state.clickUpgrades = [false,false,false,false,false];
  state.researchUpgrades = new Array(15).fill(false);
  state.fps = 0;
  state.frenzyEnd = 0;
  state.elderEnd = 0;
  state.prestigeSessionStart = Date.now();

  // PP upgrade: start with 100 fish
  if(getPPUpgradeCount('startFish') > 0){
    state.fish += 100;
    state.totalFish += 100;
  }

  // PP upgrade: free shrimp
  if(getPPUpgradeCount('freeShrimp') > 0){
    state.autoUpgrades[0] = 1;
  }

  state.fps = calcFPS();

  // Prestige wave animation
  showPrestigeAnimation(next);

  playPrestigeSound();
  showToast('⭐ Prestige Level ' + next.level + ': ' + next.name + '! ' + next.mult + 'x multiplier! +' + ppEarned + ' PP');

  updateAutoClicker();
  if(state.prestigeLevel >= 3) startFishRain();
  if(state.prestigeLevel >= 75) startFireEffect();
  updatePrestigeVisuals();
  renderUpgrades();
  updateDisplay();
  checkAchievements();
  saveGame();
}

function showPrestigeShop(){
  var existing = document.querySelector('.modal-overlay');
  if(existing) existing.remove();

  overlay.className = 'modal-overlay';
  overlay.onclick = function(e){if(e.target===overlay)overlay.remove();};

    var maxed = !upg.stacks && count >= upg.max;

    var canAfford = state.prestigePoints >= upg.cost && !maxed;
    var cls = maxed ? 'pp-item owned' : (canAfford ? 'pp-item affordable' : 'pp-item');
    itemsHtml += '<div class="'+cls+'" onclick="buyPPUpgrade(\''+upg.id+'\')">' +

      (maxed ? '<span class="pp-count">MAX</span>' :
       (upg.stacks ? '<span class="pp-count">x'+count+'</span>' : '')) +
      '<span class="pp-cost">'+(maxed?'✅':upg.cost+' PP')+'</span></div>';
  });

  overlay.innerHTML = '<div class="modal">' +
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>' +
    '<h2>🛒 Prestige Point Shop</h2>' +

    '<div style="margin-top:12px">' + itemsHtml + '</div></div>';
  document.body.appendChild(overlay);
}

function buyPPUpgrade(id){
  var upg = PP_UPGRADES.find(function(u){return u.id===id;});
  if(!upg) return;
  var count = getPPUpgradeCount(id);
  var maxed = !upg.stacks && count >= upg.max;
  if(upg.stacks && upg.max && count >= upg.max) maxed = true;
  if(maxed) return;
  if(state.prestigePoints < upg.cost) return;

  state.prestigePoints -= upg.cost;
  state.ppUpgrades[id] = (state.ppUpgrades[id] || 0) + 1;

  playBuy(3);
  showToast('🛒 Bought: ' + upg.name);

  // Refresh the shop
  showPrestigeShop();
  updateDisplay();
  checkAchievements();
  saveGame();
}

// ── Golden Fish ──
let goldenTimer=null;
function getGoldenInterval(){
  let base=30000+Math.random()*30000; // 30-60s
  if(state.researchUpgrades[12])base/=2; // Fish Gravity: 2x more often
  const ev=getActiveEvent();
  if(ev&&ev.goldenMult)base/=ev.goldenMult;
  // Prestige level 1: golden fish more often
  if(state.prestigeLevel >= 1) base *= 0.8;
  if(state.prestigeLevel >= 29) base *= 0.5;
  // PP upgrade: golden fish faster
  var goldenFasterCount = getPPUpgradeCount('goldenFaster');
  if(goldenFasterCount > 0) base *= Math.pow(0.75, goldenFasterCount);
  return base;
}
function scheduleGoldenFish(){
  if(goldenTimer)clearTimeout(goldenTimer);
  goldenTimer=setTimeout(()=>{
    spawnGoldenFish();
    scheduleGoldenFish();
  },getGoldenInterval());
}
function spawnGoldenFish(isMega){
  const fish=document.createElement('div');
  fish.className='golden-fish' + (isMega ? ' mega-golden-fish' : '');
  fish.textContent=isMega ? '🐳' : '🐠';
  fish.setAttribute('role','button');
  fish.setAttribute('aria-label','Click the golden fish for a bonus!');
  const fromLeft=Math.random()>0.5;
  const yPos=80+Math.random()*(window.innerHeight-200);
  const dur = state.prestigeLevel >= 23 ? 7 : 5; // slower = easier at level 23+
  fish.style.setProperty('--start-x',fromLeft?'-60px':(window.innerWidth+60)+'px');
  fish.style.setProperty('--end-x',fromLeft?(window.innerWidth+60)+'px':'-60px');
  fish.style.setProperty('--start-y',yPos+'px');
  fish.style.setProperty('--end-y',(yPos+Math.random()*80-40)+'px');
  fish.style.setProperty('--dir',fromLeft?'1':'-1');
  fish.style.setProperty('--swim-duration',dur+'s');
  fish.style.top='0';fish.style.left='0';
  // Sparkle trail
  let sparkleInterval=setInterval(()=>{
    if(!document.body.contains(fish)){clearInterval(sparkleInterval);return;}
    const r=fish.getBoundingClientRect();
    const s=document.createElement('div');
    s.className='golden-sparkle';
    s.textContent='✨';
    s.style.left=(r.left+r.width/2)+'px';
    s.style.top=(r.top+r.height/2)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),500);
  },200);

  function clickGolden(e){
    e.stopPropagation();e.preventDefault();
    clearInterval(sparkleInterval);
    state.goldenClicked++;
    state.goldenBonuses++;
    playGoldenFish();
    // Burst particles
    const rect=fish.getBoundingClientRect();
    for(let i=0;i<12;i++){
      const b=document.createElement('div');
      b.className='golden-burst';
      b.textContent=['⭐','🌟','💫','✨','🐠'][Math.floor(Math.random()*5)];
      const angle=Math.random()*Math.PI*2;
      const dist=60+Math.random()*80;
      b.style.setProperty('--bx',Math.cos(angle)*dist+'px');
      b.style.setProperty('--by',Math.sin(angle)*dist+'px');
      b.style.left=rect.left+rect.width/2+'px';
      b.style.top=rect.top+rect.height/2+'px';
      document.body.appendChild(b);
      setTimeout(()=>b.remove(),800);
    }
    fish.remove();

    var rewardMult = 1;
    if(isMega) rewardMult = 100;
    else if(state.prestigeLevel >= 43) rewardMult = 5;
    else if(state.prestigeLevel >= 11) rewardMult = 2;

    // Pick bonus
    const roll=Math.random();
    if(roll<0.33){
      // Fish Frenzy
      var frenzyDuration = 15000;
      if(state.prestigeLevel >= 21) frenzyDuration += 5000;
      state.frenzyEnd=Date.now()+frenzyDuration;
      showToast('🔥 FISH FRENZY! 10x clicking for '+(frenzyDuration/1000)+'s!');
      showFrenzyBanner('fish-frenzy','🔥 FISH FRENZY — 10x clicks!',frenzyDuration);
    }else if(roll<0.66){
      // Lucky Catch
      const bonus=Math.max(Math.floor(state.totalFish*0.1*rewardMult),100);
      state.fish+=bonus;
      state.totalFish+=bonus;
      state.allTimeFish+=bonus;
      state.thisPrestigeFish+=bonus;
      showToast('🍀 Lucky Catch! +'+fmt(bonus)+' fish!');
    }else{
      // Elder Bonus
      var elderDuration = 30000;
      if(state.prestigeLevel >= 34) elderDuration = 60000;
      state.elderEnd=Date.now()+elderDuration;
      state.fps=calcFPS();
      showToast('👴 Elder Bonus! Double FPS for '+(elderDuration/1000)+'s!');
      showFrenzyBanner('elder-bonus','👴 ELDER BONUS — 2x FPS!',elderDuration);
    }
    updateDisplay();
    checkAchievements();
  }
  fish.addEventListener('click',clickGolden);
  fish.addEventListener('touchstart',(e)=>{e.preventDefault();clickGolden(e);},{passive:false});
  document.body.appendChild(fish);
  setTimeout(()=>{clearInterval(sparkleInterval);if(document.body.contains(fish))fish.remove();},dur*1000);
}

function startMinigame(){
  minigameActive=true;
  const overlay=document.createElement('div');
  overlay.className='minigame-overlay';
  let caught=0;
  let timeLeft=5;
  overlay.innerHTML='<div class="minigame-title">🎣 Fishing Mini-game!</div><div class="minigame-sub">Tap the fish! Each = 1 minute of FPS earnings</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div class="minigame-arena" id="mgArena"></div><div class="minigame-score" id="mgScore">Caught: 0</div>';
  document.body.appendChild(overlay);
  const arena=overlay.querySelector('#mgArena');
  const scoreEl=overlay.querySelector('#mgScore');
  const timerEl=overlay.querySelector('#mgTimer');

  for(let i=0;i<10;i++){
    setTimeout(()=>{
      if(!document.body.contains(overlay))return;
      const f=document.createElement('div');
      f.className='minigame-fish';
      f.textContent=['🐟','🐠','🐡','🦈','🐬'][Math.floor(Math.random()*5)];
      const topPos=20+Math.random()*(260);
      f.style.top=topPos+'px';
      const dur=2+Math.random()*2;
      f.style.setProperty('--mini-dur',dur+'s');
      function catchFish(e){
        e.stopPropagation();e.preventDefault();
        caught++;
        scoreEl.textContent='Caught: '+caught;
        f.textContent='💥';
        f.style.pointerEvents='none';
        playFlick(caught*100);
        setTimeout(()=>f.remove(),200);

      f.addEventListener('click',catchFish);
      f.addEventListener('touchstart',(e)=>{e.preventDefault();catchFish(e);},{passive:false});
      arena.appendChild(f);
      setTimeout(()=>{if(document.body.contains(f))f.remove();},dur*1000);

  const ti=setInterval(()=>{

      state.thisPrestigeFish+=bonus;
      overlay.innerHTML='<div class="minigame-title">🎣 Results!</div><div class="minigame-sub">You caught '+caught+' fish!</div><div class="minigame-score">Bonus: +'+fmt(bonus)+' fish</div>';
      setTimeout(()=>{overlay.remove();minigameActive=false;updateDisplay();},2500);
    }
  },1000);
}

// ── Display ──
function updateDisplay(){
  state.fps=calcFPS();
  document.getElementById('fishCount').textContent=fmt(state.fish)+' fish';
  document.getElementById('fpsDisplay').textContent=fmt(state.fps)+' fish/sec';
  document.getElementById('clickPower').textContent='+'+fmt(getClickPower())+' per flick';

  // Multiplier display
  let mults=[];
  if(state.prestigeMultiplier>1)mults.push(fmt(state.prestigeMultiplier)+'x prestige');
  const ev=getActiveEvent();
  if(ev&&ev.mult>1)mults.push(ev.mult+'x '+ev.name);
  if(Date.now()<state.frenzyEnd)mults.push('10x frenzy!');
  if(Date.now()<state.elderEnd)mults.push('2x elder');
  document.getElementById('multiplierDisplay').textContent=mults.length?mults.join(' | '):'';

  // Prestige button and progress bar
  var nextReq = getNextPrestigeReq();
  var pb = document.getElementById('prestigeBtn');
  if(state.prestigeLevel >= 100){
    pb.style.display = 'block';
    pb.textContent = '🦑 KRAKEN';
    pb.onclick = function(){showToast('You have ascended. There is nothing beyond the Kraken.');};
  } else {
    pb.style.display = state.totalFish >= nextReq * 0.5 ? 'block' : 'none';
    var pd = getPrestigeData();
    var nextName = pd.next ? pd.next.name : '???';
    pb.textContent = '⭐ Prestige → ' + nextName;
    pb.style.opacity = state.totalFish >= nextReq ? '1' : '0.6';
    pb.onclick = function(){showPrestigeConfirm();};
  }

  // Progress bar
  var progressBar = document.getElementById('prestigeProgressBar');
  var progressLabel = document.getElementById('prestigeProgressLabel');
  if(state.prestigeLevel >= 100){
    progressBar.style.width = '100%';
    progressLabel.textContent = 'KRAKEN MODE';
  } else {
    var progress = Math.min(state.totalFish / nextReq, 1) * 100;
    progressBar.style.width = progress + '%';
    if(progress > 5){
      progressLabel.textContent = Math.floor(progress) + '% to next prestige';
    } else {
      progressLabel.textContent = '';
    }
  }

  // Prestige badge (old style, kept for compatibility)
  document.getElementById('prestigeBadge').textContent = state.prestigeLevel > 0 ? fmt(state.prestigeMultiplier) + 'x' : '';

  // PP Shop button visibility
  document.getElementById('ppShopBtn').style.display = state.prestigeLevel > 0 ? 'inline-block' : 'none';

  // Event badge
  const eBadge=document.getElementById('eventBadge');
  if(ev){
    eBadge.textContent=ev.emoji+' '+ev.desc;
  }else{eBadge.textContent='';}

  // Update upgrade affordability in current tab
  document.querySelectorAll('.auto-upg').forEach((btn,i)=>{
    const cost=getAutoCost(i);
    btn.classList.toggle('affordable',state.fish>=cost);
    btn.disabled=state.fish<cost;
    const costEl=btn.querySelector('.upg-cost');
    const countEl=btn.querySelector('.upg-count');
    if(costEl)costEl.textContent=fmt(cost)+' fish';
    if(countEl)countEl.textContent=state.autoUpgrades[i];
  });
  document.querySelectorAll('.click-upg').forEach((btn,i)=>{
    if(state.clickUpgrades[i]){
      btn.classList.add('purchased');btn.classList.remove('affordable');btn.disabled=true;
      const costEl=btn.querySelector('.upg-cost');
      if(costEl)costEl.textContent='Owned';
    }else{
      btn.classList.toggle('affordable',state.fish>=clickUpgradeDefs[i].cost);
      btn.disabled=state.fish<clickUpgradeDefs[i].cost;
    }
  });
  document.querySelectorAll('.research-upg').forEach((btn,i)=>{
    if(state.researchUpgrades[i]){
      btn.classList.add('purchased');btn.classList.remove('affordable');btn.disabled=true;
      const costEl=btn.querySelector('.upg-cost');
      if(costEl)costEl.textContent='Owned';
    }else{
      btn.classList.toggle('affordable',state.fish>=researchDefs[i].cost);
      btn.disabled=state.fish<researchDefs[i].cost;
    }
  });

  updateFlounderSize();
  updateBackgroundDepth();
}

function getBuildingIcon(def,count){
  let icon=def.icon;
  if(count>=100)icon='💎'+icon;
  else if(count>=50)icon='🌟'+icon;
  else if(count>=25)icon='⭐'+icon;
  else if(count>=10)icon='✨'+icon;
  return icon;
}

function getMilestoneText(count){
  if(count>=100)return ' [LEGENDARY]';
  if(count>=50)return ' [EPIC]';
  if(count>=25)return ' [RARE]';
  if(count>=10)return ' [UPGRADED]';
  return '';
}

function renderUpgrades(){
  const content=document.getElementById('tabContent');
  content.innerHTML='';

  if(state.activeTab==='buildings'){
    const h1=document.createElement('div');
    h1.className='upgrade-section-title';

    autoUpgradeDefs.forEach((d,i)=>{
      const btn=document.createElement('button');
      btn.className='upgrade-btn auto-upg';
      const cost=getAutoCost(i);
      const count=state.autoUpgrades[i];
      const icon=getBuildingIcon(d,count);
      const milestone=getMilestoneText(count);
      const effectiveFps=getBuildingFps(i);
      btn.innerHTML='<span class="upg-icon">'+icon+'</span><div class="upg-info"><div class="upg-name">'+d.name+(milestone?'<span class="milestone-badge">'+milestone+'</span>':'')+'</div><div class="upg-desc">+'+effectiveFps+' fish/sec each</div><div class="upg-cost">'+fmt(cost)+' fish</div></div><span class="upg-count">'+count+'</span>';
      btn.onclick=()=>buyAuto(i);
      content.appendChild(btn);
    });
  }else if(state.activeTab==='clicks'){
    const h2=document.createElement('div');
    h2.className='upgrade-section-title';
    h2.textContent='Click Power (permanent)';
    content.appendChild(h2);
    clickUpgradeDefs.forEach((d,i)=>{
      const btn=document.createElement('button');
      btn.className='upgrade-btn click-upg';
      if(state.clickUpgrades[i])btn.classList.add('purchased');
      btn.innerHTML='<span class="upg-icon">'+d.icon+'</span><div class="upg-info"><div class="upg-name">'+d.name+'</div><div class="upg-desc">+'+d.power+' fish per flick</div><div class="upg-cost">'+(state.clickUpgrades[i]?'Owned':fmt(d.cost)+' fish')+'</div></div><span class="upg-count">'+(state.clickUpgrades[i]?'✓':'')+'</span>';
      btn.onclick=()=>buyClick(i);
      if(state.clickUpgrades[i])btn.disabled=true;
      content.appendChild(btn);
    });
  }else if(state.activeTab==='research'){
    const h3=document.createElement('div');
    h3.className='upgrade-section-title';
    h3.textContent='Research (permanent bonuses)';
    content.appendChild(h3);
    researchDefs.forEach((d,i)=>{
      const btn=document.createElement('button');
      btn.className='upgrade-btn research-upg';
      if(state.researchUpgrades[i])btn.classList.add('purchased');
      btn.innerHTML='<span class="upg-icon">'+d.icon+'</span><div class="upg-info"><div class="upg-name">'+d.name+'</div><div class="upg-desc">'+d.desc+'</div><div class="upg-cost">'+(state.researchUpgrades[i]?'Owned':fmt(d.cost)+' fish')+'</div></div><span class="upg-count">'+(state.researchUpgrades[i]?'✓':'')+'</span>';
      btn.onclick=()=>buyResearch(i);
      if(state.researchUpgrades[i])btn.disabled=true;
      content.appendChild(btn);
    });
  }else if(state.activeTab==='prestige'){
    // Prestige tab: show level progression, PP shop link, auto-prestige toggle
    var h4=document.createElement('div');
    h4.className='upgrade-section-title';
    h4.textContent='Prestige Levels (⭐ '+state.prestigeLevel+'/100)';
    content.appendChild(h4);

    // PP display
    var ppRow = document.createElement('div');
    ppRow.className = 'stat-row';
    ppRow.style.marginBottom = '10px';
    ppRow.innerHTML = '<span class="stat-label">Prestige Points</span><span class="stat-value" style="color:var(--gold)">'+state.prestigePoints+' PP</span>';
    content.appendChild(ppRow);

    // PP Shop button
    var shopBtn = document.createElement('button');
    shopBtn.className = 'upgrade-btn affordable';
    shopBtn.innerHTML = '<span class="upg-icon">🛒</span><div class="upg-info"><div class="upg-name">Prestige Point Shop</div><div class="upg-desc">Spend PP on permanent meta-upgrades</div></div>';
    shopBtn.onclick = function(){showPrestigeShop();};
    content.appendChild(shopBtn);

    // Auto-prestige toggle (level 75+)
    if(state.prestigeLevel >= 75){
      var autoBtn = document.createElement('button');
      autoBtn.className = 'upgrade-btn' + (state.autoPrestige ? ' purchased' : ' affordable');
      autoBtn.innerHTML = '<span class="upg-icon">🔄</span><div class="upg-info"><div class="upg-name">Auto-Prestige</div><div class="upg-desc">'+(state.autoPrestige?'ON: Will prestige automatically':'OFF: Click to enable auto-prestige')+'</div></div>';
      autoBtn.onclick = function(){
        state.autoPrestige = !state.autoPrestige;
        showToast('Auto-prestige: ' + (state.autoPrestige ? 'ON' : 'OFF'));
        renderUpgrades();
      };
      content.appendChild(autoBtn);
    }

    // Show next few prestige levels
    var h5 = document.createElement('div');
    h5.className = 'upgrade-section-title';
    h5.textContent = 'Level Roadmap';
    content.appendChild(h5);

    // Show a window of levels around the current level
    var startShow = Math.max(0, state.prestigeLevel - 2);
    var endShow = Math.min(PRESTIGE_LEVELS.length, state.prestigeLevel + 8);
    for(var li = startShow; li < endShow; li++){
      var pl = PRESTIGE_LEVELS[li];
      var isCompleted = state.prestigeLevel >= pl.level;
      var isCurrent = state.prestigeLevel === pl.level - 1;
      var canPrestige = state.totalFish >= pl.req && isCurrent;

      var lvlBtn = document.createElement('div');
      lvlBtn.className = 'upgrade-btn' + (isCompleted ? ' purchased' : (canPrestige ? ' affordable' : ''));
      lvlBtn.style.cursor = 'default';
      lvlBtn.innerHTML = '<span class="upg-icon">' + pl.icon + '</span><div class="upg-info"><div class="upg-name">Lv.' + pl.level + ': ' + pl.name + '</div><div class="upg-desc">' + pl.unlock + '</div><div class="upg-cost">' + (isCompleted ? '✅ Complete' : fmt(pl.req) + ' fish | ' + fmt(pl.mult) + 'x mult') + '</div></div>';
      content.appendChild(lvlBtn);
    }
  }
}

// ── Game loop ──
let lastTick=Date.now();
let tickCount=0;
function gameTick(){
  const now=Date.now();
  const dt=(now-lastTick)/1000;
  lastTick=now;
  // Recalc FPS (accounts for elder bonus expiring, etc)
  state.fps=calcFPS();
  if(state.fps>0){
    const earned=state.fps*dt;
    state.fish+=earned;
    state.totalFish+=earned;
    state.allTimeFish+=earned;
    state.thisPrestigeFish+=earned;
  }
  tickCount++;
  if(tickCount%30===0){
    updateDisplay();
    checkAchievements();
    // Auto-prestige check
    if(state.autoPrestige && state.prestigeLevel < 100){
      var nextReq = getNextPrestigeReq();
      if(state.totalFish >= nextReq){
        doPrestige();
      }
    }
  }else if(tickCount%5===0){
    // Lighter update
    document.getElementById('fishCount').textContent=fmt(state.fish)+' fish';
    document.getElementById('fpsDisplay').textContent=fmt(state.fps)+' fish/sec';
  }
  requestAnimationFrame(gameTick);
}

// ── Save/Load ──
function saveGame(){
  const data={
    fish:state.fish,totalFish:state.totalFish,totalFlicks:state.totalFlicks,
    allTimeFish:state.allTimeFish,thisPrestigeFish:state.thisPrestigeFish,
    clickPower:state.clickPower,autoUpgrades:state.autoUpgrades,
    clickUpgrades:state.clickUpgrades,researchUpgrades:state.researchUpgrades,
    prestigeLevel:state.prestigeLevel,prestigeMultiplier:state.prestigeMultiplier,
    achievements:[...state.achievements],lastSave:Date.now(),
    goldenClicked:state.goldenClicked,goldenBonuses:state.goldenBonuses,
    totalTimePlayed:state.totalTimePlayed+Math.floor((Date.now()-state.sessionStart)/1000),
    offlineEarnings:state.offlineEarnings,
    // NEW
    prestigePoints:state.prestigePoints,
    ppUpgrades:state.ppUpgrades,
    prestigeHistory:state.prestigeHistory,
    fastestPrestige:state.fastestPrestige,
    highestFishAtPrestige:state.highestFishAtPrestige,
    autoPrestige:state.autoPrestige
  };
  try{localStorage.setItem('flounderFlicker',JSON.stringify(data));}catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem('flounderFlicker');
    if(!raw)return;
    const d=JSON.parse(raw);
    state.fish=d.fish||0;
    state.totalFish=d.totalFish||0;
    state.allTimeFish=d.allTimeFish||d.totalFish||0;
    state.thisPrestigeFish=d.thisPrestigeFish||0;
    state.totalFlicks=d.totalFlicks||0;
    state.autoUpgrades=d.autoUpgrades||[0,0,0,0,0,0,0,0];
    state.clickUpgrades=d.clickUpgrades||[false,false,false,false,false];
    state.researchUpgrades=d.researchUpgrades||new Array(15).fill(false);
    state.prestigeLevel=d.prestigeLevel||0;
    state.prestigeMultiplier=d.prestigeMultiplier||1;
    state.achievements=new Set(d.achievements||[]);
    state.goldenClicked=d.goldenClicked||0;
    state.goldenBonuses=d.goldenBonuses||0;
    state.totalTimePlayed=d.totalTimePlayed||0;
    state.offlineEarnings=d.offlineEarnings||0;
    // NEW
    state.prestigePoints=d.prestigePoints||0;
    state.ppUpgrades=d.ppUpgrades||{};
    state.prestigeHistory=d.prestigeHistory||[];
    state.fastestPrestige=d.fastestPrestige||Infinity;
    state.highestFishAtPrestige=d.highestFishAtPrestige||0;
    state.autoPrestige=d.autoPrestige||false;

    state.fps=calcFPS();
    // Offline progress
    if(d.lastSave&&state.fps>0){
      const elapsed=(Date.now()-d.lastSave)/1000;
      const maxOffline=3600*8;
      const secs=Math.min(elapsed,maxOffline);
      if(secs>5){
        var offlineMult = 1;
        if(getPPUpgradeCount('startFishPercent') > 0) offlineMult += 0.1 * getPPUpgradeCount('startFishPercent');
        const earned=state.fps*secs*offlineMult;
        state.fish+=earned;
        state.totalFish+=earned;
        state.allTimeFish+=earned;
        state.thisPrestigeFish+=earned;
        state.offlineEarnings+=earned;
        showToast('Welcome back! +'+fmt(earned)+' fish ('+Math.floor(secs/60)+'m offline)');
      }
    }
  }catch(e){}
}
setInterval(saveGame,10000);

// ── Bubbles ──
function createBubbles(){
  const bg=document.getElementById('bubbleBg');
  for(let i=0;i<25;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const size=6+Math.random()*40;
    b.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;animation-duration:'+(6+Math.random()*14)+'s;animation-delay:'+Math.random()*10+'s';
    bg.appendChild(b);
  }
}

// ── Ticker (now includes fun facts) ──
function createTicker(){
  const track=document.getElementById('tickerTrack');
  // Merge ticker messages with fun facts
  var allMessages = tickerMessages.slice();
  // Add some fun facts to the ticker
  for(var fi=0; fi<FUN_FACTS.length; fi++){
    allMessages.push('💡 Fun Fact: ' + FUN_FACTS[fi]);
  }
  // Shuffle
  for(var si=allMessages.length-1;si>0;si--){
    var j=Math.floor(Math.random()*(si+1));
    var tmp=allMessages[si];allMessages[si]=allMessages[j];allMessages[j]=tmp;
  }
  // Take a subset and duplicate for seamless loop
  var subset = allMessages.slice(0, 40);
  var msgs=[...subset,...subset];
  track.innerHTML='';
  msgs.forEach(m=>{
    const span=document.createElement('span');
    span.className='ticker-item';
    span.textContent='📰 '+m;
    track.appendChild(span);
  });

  // Adjust ticker speed based on prestige
  if(state.prestigeLevel >= 4){
    track.style.animationDuration = '25s';
  }
}

// ── Narrator ──
let lastNarration=0;
function tryNarrate(){
  if(!window.speechSynthesis)return;
  const now=Date.now();
  if(now-lastNarration<25000)return;
  if(state.totalFlicks<3)return;
  lastNarration=now;
  const line=narratorLines[Math.floor(Math.random()*narratorLines.length)];
  const u=new SpeechSynthesisUtterance(line);
  u.rate=0.85;u.pitch=0.8;u.volume=0.4;
  const voices=speechSynthesis.getVoices();
  const brit=voices.find(v=>/en.GB/i.test(v.lang))||voices.find(v=>/en/i.test(v.lang));
  if(brit)u.voice=brit;
  speechSynthesis.speak(u);
}
setInterval(tryNarrate,25000);

// ── Fun fact rotation ──
setInterval(updateFunFact, 30000);

// ── Minigame check ──
setInterval(checkMinigame,30000);

// ── Time tracking ──
setInterval(()=>{
  state.totalTimePlayed++;
},1000);

// ── Init ──
loadGame();
createBubbles();
createTicker();
updateSantaHat();
updatePrestigeVisuals();
updateAutoClicker();
if(state.prestigeLevel >= 3) startFishRain();
if(state.prestigeLevel >= 75) startFireEffect();
scheduleMegaGolden();
renderUpgrades();
updateDisplay();
updateFunFact();
scheduleGoldenFish();
requestAnimationFrame(gameTick);

// Check for frenzy/elder expiry periodically
setInterval(()=>{
  if(state.frenzyEnd&&Date.now()>=state.frenzyEnd){
    state.frenzyEnd=0;
    const b=document.querySelector('.frenzy-banner.fish-frenzy');
    if(b)b.remove();
  }
  if(state.elderEnd&&Date.now()>=state.elderEnd){
    state.elderEnd=0;
    state.fps=calcFPS();
    const b=document.querySelector('.frenzy-banner.elder-bonus');
    if(b)b.remove();
  }
},1000);

// Tooltip on flounder hover showing a fun fact
flounderWrap.addEventListener('mouseenter', function(e){
  var tip = document.createElement('div');
  tip.className = 'fact-tooltip';
  tip.id = 'flounderTooltip';
  tip.textContent = '💡 ' + getRandomFact();
  tip.style.left = (e.clientX + 15) + 'px';
  tip.style.top = (e.clientY + 15) + 'px';
  document.body.appendChild(tip);
});
flounderWrap.addEventListener('mousemove', function(e){
  var tip = document.getElementById('flounderTooltip');
  if(tip){
    tip.style.left = (e.clientX + 15) + 'px';
    tip.style.top = (e.clientY + 15) + 'px';
  }
});
flounderWrap.addEventListener('mouseleave', function(){
  var tip = document.getElementById('flounderTooltip');
  if(tip) tip.remove();
});
</script>
