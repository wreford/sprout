<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Hex Claim 2: Pop Edition</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#1a1a2e;overflow:hidden;touch-action:manipulation;user-select:none}
    canvas{display:block;width:100%;height:100%}
    #dpad{position:fixed;bottom:18px;left:18px;display:none;z-index:10}
    #dpad button{position:absolute;width:44px;height:44px;border:none;border-radius:10px;background:rgba(0,0,0,0.18);color:#fff;font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    #dpad .u{left:44px;top:0} #dpad .d{left:44px;top:88px} #dpad .l{left:0;top:44px} #dpad .r{left:88px;top:44px}
    @media(pointer:coarse){#dpad{display:block}}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dpad"><button class="u" ontouchstart="dpadDir(0,-1)">&#9650;</button><button class="d" ontouchstart="dpadDir(0,1)">&#9660;</button><button class="l" ontouchstart="dpadDir(-1,0)">&#9664;</button><button class="r" ontouchstart="dpadDir(1,0)">&#9654;</button></div>
<script>
var C=document.getElementById('c'),ctx=C.getContext('2d'),W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;}
resize(); addEventListener('resize',resize);

// ── Audio ──
var ac=null;
function ga(){if(!ac)ac=new(AudioContext||webkitAudioContext)();return ac;}
function tone(f,d,t,v){try{var c=ga(),o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.03,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
var NOTES=[261,293,329,392,440,523,587,659];var nI=0;
function sndClaim(){var c=ga(),o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();o.type='sine';o2.type='triangle';var f=NOTES[nI%NOTES.length];o.frequency.value=f;o2.frequency.value=f*2.01;g.gain.setValueAtTime(.025,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);o.connect(g);o2.connect(g);g.connect(c.destination);o.start();o2.start();o.stop(c.currentTime+.18);o2.stop(c.currentTime+.18);nI++;}
function sndCapture(){var b=NOTES[Math.floor(Math.random()*5)];tone(b,.3,'sine',.04);setTimeout(function(){tone(b*1.25,.3,'triangle',.03)},100);setTimeout(function(){tone(b*1.5,.35,'sine',.03)},200);setTimeout(function(){tone(b*2,.4,'triangle',.025)},320);}
function sndDie(){tone(392,.3,'sine',.04);setTimeout(function(){tone(330,.35,'sine',.035)},150);setTimeout(function(){tone(261,.4,'sine',.03)},300);setTimeout(function(){tone(196,.6,'triangle',.025)},460);}
function sndKill(){tone(523,.12,'sine',.03);setTimeout(function(){tone(659,.12,'triangle',.03)},80);}
function sndPowerup(){tone(523,.1,'sine',.04);setTimeout(function(){tone(659,.1,'sine',.04)},60);setTimeout(function(){tone(784,.15,'sine',.04)},120);}

// ── Chill Voiceover — original quotes inspired by pop vibes ──
var chillLastSpoke=0;
var chillLines=[
  "Everything is going to be alright. Just keep moving.",
  "The hexagons don't judge you. They just exist.",
  "Look at all that territory. You did that.",
  "Sometimes the best path is the one you haven't taken yet.",
  "The colors are soft. The music is gentle. You are enough.",
  "Nobody is watching. This is just for you.",
  "Every tile you claim is a tiny victory.",
  "Breathe in. Breathe out. Claim a hex.",
  "The world is chaotic. This grid is not. Enjoy it.",
  "You're doing great. Even the AI thinks so.",
  "Paradise is a hex grid with no enemies nearby.",
  "Some people run from their problems. You claim them.",
  "The stars don't care about territory. But you do. And that's beautiful.",
  "In another life, you were probably also claiming hexagons.",
  "Fix your crown. It's made of hexagons.",
  "Let it go. Let it flow. Let the hexagons grow.",
  "Yellow might be the color of madness. Or joy. Here it's just a tile.",
  "Somewhere out there, someone is proud of your hex percentage.",
  "The trail behind you is proof you went somewhere.",
  "Speed is temporary. Territory is forever. Well, until someone takes it.",
  "Viva la hex. Viva la claim.",
  "Clocks don't tick in here. Only hexagons.",
  "When you feel lost, go home. Home is your colored tiles.",
  "A sky full of hexagons. That's all anyone really needs.",
  "Don't look back. You're not going that way. Literally, you can't reverse.",
];
var chillSpoken={};

function chillSpeak(){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-chillLastSpoke<25000)return;
    if(speechSynthesis.speaking)return;
    var unsaid=chillLines.filter(function(l){return !chillSpoken[l];});
    if(unsaid.length===0){chillSpoken={};unsaid=chillLines;}
    var text=unsaid[Math.floor(Math.random()*unsaid.length)];
    chillSpoken[text]=true;
    chillLastSpoke=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=0.85;u.pitch=0.95;u.volume=0.7;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var pick=voices.find(function(v){return v.lang&&v.lang.indexOf('en')===0;});
          if(pick)u.voice=pick;
        }
        speechSynthesis.speak(u);
      }catch(e){}
    },50);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// ── Procedural Pop Music ──
var musicPlaying=false,musicNodes=[],musicInterval=null;
var chords=[[261.63,329.63,392],[392,493.88,587.33],[440,523.25,659.25],[349.23,440,523.25]]; // C-G-Am-F
var melodyNotes=[659.25,587.33,523.25,587.33,659.25,659.25,659.25,587.33,587.33,587.33,659.25,783.99,783.99,659.25,587.33,523.25];
var melI=0,chI=0,beatI=0,bpm=120;

function stopMusic(){musicPlaying=false;if(musicInterval)clearInterval(musicInterval);musicInterval=null;musicNodes.forEach(function(n){try{n.stop();}catch(e){}});musicNodes=[];}
function startMusic(){
  if(musicPlaying)return;musicPlaying=true;
  var beatMs=60000/bpm/2;melI=0;chI=0;beatI=0;
  musicInterval=setInterval(function(){
    if(!musicPlaying)return;
    try{
      var c=ga(),now=c.currentTime;
      // Kick on beats 0,4 (1 and 3 of the measure)
      if(beatI%8===0||beatI%8===4){
        var ko=c.createOscillator(),kg=c.createGain();ko.type='sine';ko.frequency.setValueAtTime(150,now);ko.frequency.exponentialRampToValueAtTime(40,now+.08);kg.gain.setValueAtTime(.06,now);kg.gain.exponentialRampToValueAtTime(.001,now+.12);ko.connect(kg);kg.connect(c.destination);ko.start(now);ko.stop(now+.12);musicNodes.push(ko);
      }
      // Arpeggio
      var chord=chords[chI%4];var arpNote=chord[beatI%3];
      var ao=c.createOscillator(),ag=c.createGain();ao.type='triangle';ao.frequency.value=arpNote;ag.gain.setValueAtTime(.015,now);ag.gain.exponentialRampToValueAtTime(.001,now+beatMs/1000*.8);ao.connect(ag);ag.connect(c.destination);ao.start(now);ao.stop(now+beatMs/1000*.8);musicNodes.push(ao);
      // Melody every other beat
      if(beatI%2===0){
        var mf=melodyNotes[melI%melodyNotes.length];
        var mo=c.createOscillator(),mg=c.createGain();mo.type='sine';mo.frequency.value=mf;mg.gain.setValueAtTime(.02,now);mg.gain.exponentialRampToValueAtTime(.001,now+beatMs/1000*1.5);mo.connect(mg);mg.connect(c.destination);mo.start(now);mo.stop(now+beatMs/1000*1.5);musicNodes.push(mo);melI++;
      }
      beatI++;
      if(beatI%8===0)chI++;
      // Cleanup old nodes
      if(musicNodes.length>60)musicNodes.splice(0,30);
    }catch(e){}
  },beatMs);
}
function playVictoryChord(){try{var c=ga();[523.25,659.25,783.99].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.03,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.06);o.stop(c.currentTime+.5);});}catch(e){}}

// ── Hex Grid ──
var HEX=16,GW=80,GH=60,sq3=Math.sqrt(3);
var grid=[],trail=[];
function h2p(gx,gy){return{x:HEX*1.5*gx,y:HEX*sq3*(gy+(gx%2===1?.5:0))};}
function hexN(gx,gy){var e=gx%2===0;return[{gx:gx+1,gy:e?gy-1:gy},{gx:gx+1,gy:e?gy:gy+1},{gx:gx-1,gy:e?gy-1:gy},{gx:gx-1,gy:e?gy:gy+1},{gx:gx,gy:gy-1},{gx:gx,gy:gy+1}];}
function inB(gx,gy){return gx>=0&&gy>=0&&gx<GW&&gy<GH;}
function gC(gx,gy){return inB(gx,gy)?grid[gy*GW+gx]:-1;}
function sC(gx,gy,v){if(inB(gx,gy))grid[gy*GW+gx]=v;}

// ── Pastel Colors ──
// Dark soft palette — chill vibes
var PCOL={1:'#7c6f9f',2:'#5b7a9d',3:'#5a8a72',4:'#8a6b8a',5:'#8a7a5a'};
var PCOL_RGB={1:[124,111,159],2:[91,122,157],3:[90,138,114],4:[138,107,138],5:[138,122,90]};
var TCOL={};var TRCOL={};
for(var ci=1;ci<=5;ci++){var r=PCOL_RGB[ci];TCOL[ci]='rgba('+r[0]+','+r[1]+','+r[2]+',0.3)';TRCOL[ci]='rgba('+r[0]+','+r[1]+','+r[2]+',0.65)';}

// ── Power-ups ──
var PWTYPES=[{icon:'⚡',name:'Speed',dur:5000},{icon:'🛡️',name:'Shield',dur:3000},{icon:'💎',name:'Double',dur:0},{icon:'🌀',name:'Teleport',dur:0}];
var powerups=[];var pwTimer=0;
function spawnPowerup(){
  for(var tries=0;tries<20;tries++){
    var gx=2+Math.floor(Math.random()*(GW-4)),gy=2+Math.floor(Math.random()*(GH-4));
    if(gC(gx,gy)===0){powerups.push({gx:gx,gy:gy,type:Math.floor(Math.random()*4),age:0});return;}
  }
}

// ── Entities ──
var player,ais,particles,sparkles,STATE='menu',score,frame,gameTime,bestPct;
bestPct=parseInt(localStorage.getItem('hc2best'))||0;

function createEnt(id,sx,sy){
  for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++)if(inB(sx+dx,sy+dy))sC(sx+dx,sy+dy,id);
  return{id:id,gx:sx,gy:sy,trail:[],dir:{gx:1,gy:0},alive:true,speed:0,moveTimer:0,kills:0,pw:null,pwEnd:0};
}
function reset(){
  grid=new Array(GW*GH).fill(0);particles=[];sparkles=[];frame=0;score=0;gameTime=0;powerups=[];pwTimer=0;
  player=createEnt(1,Math.floor(GW/2),Math.floor(GH/2));player.speed=10;
  ais=[];var as=[{gx:10,gy:10},{gx:GW-10,gy:10},{gx:10,gy:GH-10},{gx:GW-10,gy:GH-10}];
  for(var i=0;i<4;i++){var ai=createEnt(i+2,as[i].gx,as[i].gy);ai.speed=14+Math.floor(Math.random()*6);ai.tgx=Math.floor(Math.random()*GW);ai.tgy=Math.floor(Math.random()*GH);ai.maxT=12+Math.floor(Math.random()*10);ais.push(ai);}
  camX=player.gx*HEX*1.5-W/2;camY=player.gy*HEX*sq3-H/2;
  stopMusic();startMusic();
}
var camX=0,camY=0,keys={},swipeDir={gx:0,gy:0};

function moveEnt(ent){
  var ngx=ent.gx+ent.dir.gx,ngy=ent.gy+ent.dir.gy;
  if(!inB(ngx,ngy)){if(!inB(ngx,ent.gy))ent.dir.gx=-ent.dir.gx;if(!inB(ent.gx,ngy))ent.dir.gy=-ent.dir.gy;return;}
  var cell=gC(ngx,ngy);
  var shielded=ent.pw==='Shield'&&Date.now()<ent.pwEnd;
  // Check AI trails
  for(var i=0;i<ais.length;i++){if(!ais[i].alive)continue;for(var t=0;t<ais[i].trail.length;t++){if(ais[i].trail[t].gx===ngx&&ais[i].trail[t].gy===ngy&&ent.id!==ais[i].id){killEnt(ais[i]);ent.kills++;if(ent.id===1)sndKill();}}}
  // Check player trail
  if(ent.id!==1&&!shielded){for(var t=0;t<player.trail.length;t++){if(player.trail[t].gx===ngx&&player.trail[t].gy===ngy){killEnt(player);return;}}}
  if(ent.id===1&&!shielded){for(var i=0;i<ais.length;i++){if(!ais[i].alive)continue;for(var t=0;t<ais[i].trail.length;t++){if(ais[i].trail[t].gx===ngx&&ais[i].trail[t].gy===ngy){killEnt(ent);return;}}}}
  // Self trail skip
  // Own trail: just skip over it, don't block or die
  var onOwnTrail=false;
  for(var t=0;t<ent.trail.length;t++){if(ent.trail[t].gx===ngx&&ent.trail[t].gy===ngy){onOwnTrail=true;break;}}
  if(onOwnTrail){ent.gx=ngx;ent.gy=ngy;return;}
  ent.gx=ngx;ent.gy=ngy;
  // Powerup pickup
  if(ent.id===1){for(var p=powerups.length-1;p>=0;p--){if(powerups[p].gx===ngx&&powerups[p].gy===ngy){applyPW(ent,powerups[p].type);powerups.splice(p,1);sndPowerup();}}}
  if(cell===ent.id){if(ent.trail.length>0){captureTrail(ent);if(ent.id===1){sndCapture();playVictoryChord();}}}else{ent.trail.push({gx:ngx,gy:ngy});if(ent.id===1)sndClaim();}
}
function applyPW(ent,type){
  var pw=PWTYPES[type];
  if(type===0){ent.pw='Speed';ent.pwEnd=Date.now()+pw.dur;ent.speed=5;}
  else if(type===1){ent.pw='Shield';ent.pwEnd=Date.now()+pw.dur;}
  else if(type===2){ent.pw='Double';ent.pwEnd=Date.now()+100;}
  else if(type===3){ent.gx=2+Math.floor(Math.random()*(GW-4));ent.gy=2+Math.floor(Math.random()*(GH-4));ent.trail=[];}
}
function captureTrail(ent){
  var isDouble=ent.pw==='Double'&&Date.now()<ent.pwEnd+200;
  for(var i=0;i<ent.trail.length;i++){sC(ent.trail[i].gx,ent.trail[i].gy,ent.id);var pp=h2p(ent.trail[i].gx,ent.trail[i].gy);spawnSparkle(pp.x,pp.y,PCOL[ent.id]);}
  floodCap(ent.id);
  if(isDouble){/* Claim neighbors of all newly claimed */var extra=[];for(var i=0;i<ent.trail.length;i++){var nb=hexN(ent.trail[i].gx,ent.trail[i].gy);for(var n=0;n<nb.length;n++){if(inB(nb[n].gx,nb[n].gy)&&gC(nb[n].gx,nb[n].gy)!==ent.id){extra.push(nb[n]);}}}for(var i=0;i<extra.length;i++)sC(extra[i].gx,extra[i].gy,ent.id);}
  if(ent.id===1)score=countT(1);ent.trail=[];
}
function floodCap(id){
  var vis=new Uint8Array(GW*GH),cap=[];
  for(var gy=0;gy<GH;gy++)for(var gx=0;gx<GW;gx++){
    if(vis[gy*GW+gx]||gC(gx,gy)===id)continue;
    var reg=[],q=[{gx:gx,gy:gy}],edge=false;vis[gy*GW+gx]=1;
    while(q.length>0){var cur=q.shift();reg.push(cur);if(cur.gx<=0||cur.gy<=0||cur.gx>=GW-1||cur.gy>=GH-1)edge=true;
      var nb=hexN(cur.gx,cur.gy);for(var n=0;n<nb.length;n++){var b=nb[n];if(!inB(b.gx,b.gy)){edge=true;continue;}var idx=b.gy*GW+b.gx;if(vis[idx]||gC(b.gx,b.gy)===id)continue;vis[idx]=1;q.push(b);}}
    if(!edge&&reg.length<GW*GH*.4)cap=cap.concat(reg);
  }
  for(var i=0;i<cap.length;i++)sC(cap[i].gx,cap[i].gy,id);
}
function countT(id){var c=0;for(var i=0;i<grid.length;i++)if(grid[i]===id)c++;return c;}
function killEnt(ent){
  if(!ent.alive)return;ent.alive=false;
  for(var i=0;i<ent.trail.length;i++){var p=h2p(ent.trail[i].gx,ent.trail[i].gy);spawnPart(p.x,p.y,PCOL[ent.id],4);}
  ent.trail=[];var dp=h2p(ent.gx,ent.gy);spawnPart(dp.x,dp.y,PCOL[ent.id],14);
  if(ent.id===1){sndDie();stopMusic();STATE='dead';var pct=Math.round(score/(GW*GH)*100);if(pct>bestPct){bestPct=pct;localStorage.setItem('hc2best',''+bestPct);}}
  if(ent.id>1)setTimeout(function(){if(STATE!=='playing')return;ent.gx=2+Math.floor(Math.random()*(GW-4));ent.gy=2+Math.floor(Math.random()*(GH-4));ent.trail=[];ent.alive=true;for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++)if(inB(ent.gx+dx,ent.gy+dy))sC(ent.gx+dx,ent.gy+dy,ent.id);},3000);
}
function spawnPart(x,y,col,n){for(var i=0;i<n;i++)particles.push({x:x,y:y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,color:col,size:2+Math.random()*3});}
function spawnSparkle(x,y,col){for(var i=0;i<5;i++)sparkles.push({x:x+(Math.random()-.5)*14,y:y+(Math.random()-.5)*14,life:1,color:col,size:1+Math.random()*3,vy:-0.8-Math.random()*1.2,vx:(Math.random()-.5)*1.5,twinkle:Math.random()*Math.PI*2});}

// ── AI ──
function updateAI(ai){
  if(!ai.alive)return;
  // Speed up over time
  var speedBonus=Math.min(6,Math.floor(gameTime/1800));
  ai.moveTimer++;if(ai.moveTimer<ai.speed-speedBonus)return;ai.moveTimer=0;
  // Check for dangerous trails nearby
  function isDangerous(gx,gy){
    for(var i=0;i<ais.length;i++){if(ais[i].id===ai.id||!ais[i].alive)continue;for(var t=0;t<ais[i].trail.length;t++)if(ais[i].trail[t].gx===gx&&ais[i].trail[t].gy===gy)return true;}
    for(var t=0;t<player.trail.length;t++)if(player.trail[t].gx===gx&&player.trail[t].gy===gy)return true;return false;
  }
  if(ai.trail.length>=ai.maxT){
    var nb=hexN(ai.gx,ai.gy),bd=99999,bdir=null;
    for(var n=0;n<nb.length;n++){var b=nb[n];if(!inB(b.gx,b.gy)||isDangerous(b.gx,b.gy))continue;
      var onT=false;for(var t=0;t<ai.trail.length;t++)if(ai.trail[t].gx===b.gx&&ai.trail[t].gy===b.gy){onT=true;break;}if(onT)continue;
      if(gC(b.gx,b.gy)===ai.id){ai.dir={gx:b.gx-ai.gx,gy:b.gy-ai.gy};moveEnt(ai);return;}
      var dx=b.gx-ai.tgx,dy=b.gy-ai.tgy,d=dx*dx+dy*dy;if(d<bd){bd=d;bdir={gx:b.gx-ai.gx,gy:b.gy-ai.gy};}}
    if(bdir){ai.dir=bdir;moveEnt(ai);}return;
  }
  // Target near player sometimes
  if(Math.random()<.12||(Math.abs(ai.gx-ai.tgx)<3&&Math.abs(ai.gy-ai.tgy)<3)){
    if(Math.random()<.4&&player.alive){ai.tgx=player.gx+Math.floor(Math.random()*20-10);ai.tgy=player.gy+Math.floor(Math.random()*20-10);}
    else{ai.tgx=Math.floor(Math.random()*GW);ai.tgy=Math.floor(Math.random()*GH);}
  }
  var nb2=hexN(ai.gx,ai.gy),bd2=99999,bdir2=null;
  for(var n=0;n<nb2.length;n++){var b2=nb2[n];if(!inB(b2.gx,b2.gy)||isDangerous(b2.gx,b2.gy))continue;
    var onT2=false;for(var t=0;t<ai.trail.length;t++)if(ai.trail[t].gx===b2.gx&&ai.trail[t].gy===b2.gy){onT2=true;break;}if(onT2)continue;
    var dx2=b2.gx-ai.tgx,dy2=b2.gy-ai.tgy,d2=dx2*dx2+dy2*dy2;if(d2<bd2){bd2=d2;bdir2={gx:b2.gx-ai.gx,gy:b2.gy-ai.gy};}}
  if(bdir2){ai.dir=bdir2;moveEnt(ai);}
}

// ── Input ──
addEventListener('keydown',function(e){keys[e.code]=true;});
addEventListener('keyup',function(e){keys[e.code]=false;});
var touchA=false,tsx=0,tsy=0;
function dpadDir(dx,dy){if(STATE==='playing')swipeDir={gx:dx,gy:dy};}
window.dpadDir=dpadDir;
C.addEventListener('touchstart',function(e){e.preventDefault();if(STATE==='menu'){STATE='playing';reset();return;}if(STATE==='dead'){STATE='playing';reset();return;}touchA=true;tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:false});
C.addEventListener('touchmove',function(e){e.preventDefault();if(!touchA)return;var dx=e.touches[0].clientX-tsx,dy=e.touches[0].clientY-tsy;if(Math.abs(dx)>15||Math.abs(dy)>15){if(Math.abs(dx)>Math.abs(dy))swipeDir={gx:dx>0?1:-1,gy:0};else swipeDir={gx:0,gy:dy>0?1:-1};tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;}},{passive:false});
C.addEventListener('touchend',function(){touchA=false;});
C.addEventListener('click',function(){if(STATE==='menu'){STATE='playing';reset();}else if(STATE==='dead'){STATE='playing';reset();}});

// ── Update ──
function update(){
  if(STATE!=='playing')return;frame++;gameTime++;
  // Chill voiceover every ~25 seconds
  if(frame%1500===750)chillSpeak();
  if(keys.ArrowRight||keys.KeyD)player.dir={gx:1,gy:0};
  else if(keys.ArrowLeft||keys.KeyA)player.dir={gx:-1,gy:0};
  else if(keys.ArrowDown||keys.KeyS)player.dir={gx:0,gy:1};
  else if(keys.ArrowUp||keys.KeyW)player.dir={gx:0,gy:-1};
  if(swipeDir.gx||swipeDir.gy){player.dir=swipeDir;swipeDir={gx:0,gy:0};}
  // Speed powerup expiry
  if(player.pw==='Speed'&&Date.now()>player.pwEnd){player.speed=10;player.pw=null;}
  if(player.pw==='Shield'&&Date.now()>player.pwEnd)player.pw=null;
  player.moveTimer++;if(player.moveTimer>=player.speed){player.moveTimer=0;if(player.alive)moveEnt(player);}
  for(var i=0;i<ais.length;i++)updateAI(ais[i]);
  // Camera
  var pp=h2p(player.gx,player.gy);camX+=(pp.x-W/2-camX)*.04;camY+=(pp.y-H/2-camY)*.04;
  if(frame%30===0)score=countT(1);
  // Power-up spawning
  pwTimer++;if(pwTimer>=600&&powerups.length<6){pwTimer=0;spawnPowerup();}
  // Particles
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=.025;if(p.life<=0)particles.splice(i,1);}
  for(var i=sparkles.length-1;i>=0;i--){var s=sparkles[i];s.y+=s.vy;s.x+=(s.vx||0)*0.3;s.life-=.025;if(s.life<=0)sparkles.splice(i,1);}
}

// ── Draw ──
function drawHex(cx,cy,sz,fill,stroke,glow){
  ctx.beginPath();for(var i=0;i<6;i++){var a=Math.PI/180*(60*i-30),x=cx+sz*Math.cos(a),y=cy+sz*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();
  if(glow){ctx.save();ctx.shadowColor=glow;ctx.shadowBlur=10;if(fill){ctx.fillStyle=fill;ctx.fill();}ctx.restore();}
  else if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=.5;ctx.stroke();}
}
function drawGradHex(cx,cy,sz,col,alpha){
  var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,sz);
  var r=PCOL_RGB[col];
  grd.addColorStop(0,'rgba('+r[0]+','+r[1]+','+r[2]+','+(alpha+.1)+')');
  grd.addColorStop(1,'rgba('+r[0]+','+r[1]+','+r[2]+','+alpha+')');
  drawHex(cx,cy,sz,grd,null);
}

function draw(){
  // Pastel background
  ctx.fillStyle='#12121e';ctx.fillRect(0,0,W,H);
  if(STATE==='menu'){
    ctx.textAlign='center';
    ctx.font='bold 28px sans-serif';ctx.fillStyle='#7c6f9f';ctx.fillText('HEX CLAIM 2',W/2,H*.22);
    ctx.font='14px sans-serif';ctx.fillStyle='#5b7a9d';ctx.fillText('Chill Edition',W/2,H*.28);
    ctx.font='48px serif';ctx.fillText('🔷',W/2,H*.38);
    ctx.font='12px sans-serif';ctx.fillStyle='#999';
    ctx.fillText('Territory capture with pop music & power-ups',W/2,H*.50);
    ctx.fillText('Venture out, draw a path, return home to claim land',W/2,H*.55);
    ctx.fillText('Avoid other players\' trails!',W/2,H*.60);
    ctx.fillText('WASD / Arrows / Swipe / D-pad',W/2,H*.66);
    ctx.fillText('⚡ Speed  🛡️ Shield  💎 Double  🌀 Teleport',W/2,H*.72);
    ctx.fillStyle='#7c6f9f';ctx.font='13px sans-serif';ctx.fillText('[ Tap / Click to start ]',W/2,H*.82);
    if(bestPct>0){ctx.fillStyle='#5b7a9d';ctx.font='11px sans-serif';ctx.fillText('Best: '+bestPct+'%',W/2,H*.88);}
    ctx.font='10px sans-serif';ctx.fillStyle='#444';ctx.fillText('taskiap.com',W/2,H*.94);
    return;
  }
  // Visible grid
  var sg=Math.max(0,Math.floor((camX-HEX)/(HEX*1.5))),eg=Math.min(GW,Math.ceil((camX+W+HEX)/(HEX*1.5)));
  var sy=Math.max(0,Math.floor((camY-HEX)/(HEX*sq3))),ey=Math.min(GH,Math.ceil((camY+H+HEX)/(HEX*sq3)));
  for(var gy=sy;gy<ey;gy++)for(var gx=sg;gx<eg;gx++){
    var p=h2p(gx,gy),sx=p.x-camX,sy2=p.y-camY,cell=gC(gx,gy);
    if(cell>0)drawGradHex(sx,sy2,HEX-1,cell,.25);
    else drawHex(sx,sy2,HEX-1,'#ede6f5','rgba(200,190,215,0.25)');
  }
  // Territory glow — subtle pulsing border glow
  var glowPulse=0.6+0.4*Math.sin(frame*0.03);
  for(var gy=sy;gy<ey;gy++)for(var gx=sg;gx<eg;gx++){
    var cell=gC(gx,gy);if(cell<=0)continue;
    var nb=hexN(gx,gy),border=false;for(var n=0;n<nb.length;n++){if(gC(nb[n].gx,nb[n].gy)!==cell){border=true;break;}}
    if(border){var p=h2p(gx,gy),sx3=p.x-camX,sy3=p.y-camY;
      // Outer glow
      ctx.save();ctx.shadowColor=PCOL[cell];ctx.shadowBlur=8*glowPulse;
      drawHex(sx3,sy3,HEX-1,null,PCOL[cell]);
      ctx.restore();
      // Inner highlight
      var rr=PCOL_RGB[cell];
      ctx.beginPath();for(var ii=0;ii<6;ii++){var aa=Math.PI/180*(60*ii-30),xx=sx3+(HEX-2)*Math.cos(aa),yy=sy3+(HEX-2)*Math.sin(aa);ii===0?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy);}ctx.closePath();
      ctx.strokeStyle='rgba('+rr[0]+','+rr[1]+','+rr[2]+','+(0.15+0.1*glowPulse)+')';ctx.lineWidth=1.5;ctx.stroke();
    }
  }
  // Trails with shimmer
  function drawTrail(ent){
    var pulse=.5+.3*Math.sin(frame*.1);
    for(var i=0;i<ent.trail.length;i++){
      var p=h2p(ent.trail[i].gx,ent.trail[i].gy),r=PCOL_RGB[ent.id];
      var a=.5+pulse*.2+i/ent.trail.length*.3;
      drawHex(p.x-camX,p.y-camY,HEX-1,'rgba('+r[0]+','+r[1]+','+r[2]+','+a+')',PCOL[ent.id]);
    }
  }
  if(player.alive)drawTrail(player);for(var i=0;i<ais.length;i++)if(ais[i].alive)drawTrail(ais[i]);
  // Power-ups
  for(var i=0;i<powerups.length;i++){
    var pw=powerups[i],p=h2p(pw.gx,pw.gy),sx=p.x-camX,sy2=p.y-camY;
    var bob=Math.sin(frame*.08+i)*3;
    ctx.font='14px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(PWTYPES[pw.type].icon,sx,sy2+bob);
  }
  // Entities
  function drawEnt(ent){
    if(!ent.alive)return;var p=h2p(ent.gx,ent.gy),sx=p.x-camX,sy2=p.y-camY;
    // Glow ring
    ctx.beginPath();ctx.arc(sx,sy2,9,0,Math.PI*2);ctx.fillStyle=PCOL[ent.id];ctx.globalAlpha=.3+.15*Math.sin(frame*.12);ctx.fill();ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(sx,sy2,6,0,Math.PI*2);ctx.fillStyle=PCOL[ent.id];ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy2,3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    // Shield indicator
    if(ent.pw==='Shield'&&Date.now()<ent.pwEnd){ctx.beginPath();ctx.arc(sx,sy2,11,0,Math.PI*2);ctx.strokeStyle='rgba(100,200,255,0.6)';ctx.lineWidth=2;ctx.stroke();}
    // Speed indicator
    if(ent.pw==='Speed'&&Date.now()<ent.pwEnd){ctx.beginPath();ctx.arc(sx,sy2,11,0,Math.PI*2);ctx.strokeStyle='rgba(255,200,50,0.5)';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);}
  }
  drawEnt(player);for(var i=0;i<ais.length;i++)drawEnt(ais[i]);
  // Sparkles — enhanced with twinkle, glow, and drift
  for(var i=0;i<sparkles.length;i++){var s=sparkles[i];
    var twinkleAlpha=0.5+0.5*Math.sin((s.twinkle||0)+frame*0.15);
    ctx.globalAlpha=s.life*twinkleAlpha;ctx.fillStyle=s.color;ctx.beginPath();
    var sz=s.size*s.life;
    var sx4=s.x-camX+(s.vx||0)*Math.sin(frame*0.05)*3,sy4=s.y-camY;
    // Star shape with slow rotation
    for(var j=0;j<5;j++){var a=Math.PI*2/5*j-Math.PI/2+frame*0.02,ax=sx4+Math.cos(a)*sz,ay=sy4+Math.sin(a)*sz;j===0?ctx.moveTo(ax,ay):ctx.lineTo(ax,ay);var a2=a+Math.PI/5;ctx.lineTo(sx4+Math.cos(a2)*sz*.4,sy4+Math.sin(a2)*sz*.4);}
    ctx.closePath();ctx.fill();
    // Soft glow around sparkle
    if(sz>1.5){ctx.globalAlpha=s.life*twinkleAlpha*0.25;ctx.beginPath();ctx.arc(sx4,sy4,sz*2,0,Math.PI*2);ctx.fill();}}
  ctx.globalAlpha=1;
  // Particles
  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-camX-p.size/2,p.y-camY-p.size/2,p.size,p.size);}
  ctx.globalAlpha=1;
  // HUD
  var total=GW*GH,pct=Math.round(score/total*100);
  var elapsed=Math.floor(gameTime/60);var mm=Math.floor(elapsed/60),ss=elapsed%60;var timeStr=mm+':'+(ss<10?'0':'')+ss;
  ctx.font='bold 14px sans-serif';ctx.textAlign='left';ctx.fillStyle='#e879a0';ctx.fillText('You: '+pct+'%',12,24);
  ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.fillText('Kills: '+player.kills,12,42);
  ctx.fillText('Time: '+timeStr,12,58);
  if(bestPct>0){ctx.fillText('Best: '+bestPct+'%',12,74);}
  // Active powerup
  if(player.pw&&Date.now()<player.pwEnd){var rem=Math.ceil((player.pwEnd-Date.now())/1000);ctx.fillStyle='#e879a0';ctx.fillText(player.pw+': '+rem+'s',12,90);}
  // All player territories
  ctx.textAlign='right';
  for(var i=0;i<ais.length;i++){var aiPct=Math.round(countT(ais[i].id)/total*100);ctx.fillStyle=PCOL[ais[i].id];ctx.font='11px sans-serif';ctx.fillText((ais[i].alive?'●':'✗')+' '+aiPct+'%',W-12,24+i*16);}
  // Minimap
  var mmW=80,mmH=60,mmX=W-mmW-8,mmY=H-mmH-8;
  ctx.fillStyle='rgba(245,240,250,0.85)';ctx.fillRect(mmX,mmY,mmW,mmH);ctx.strokeStyle='#d8d0e8';ctx.lineWidth=1;ctx.strokeRect(mmX,mmY,mmW,mmH);
  for(var gy2=0;gy2<GH;gy2+=2)for(var gx2=0;gx2<GW;gx2+=2){var c=gC(gx2,gy2);if(c>0){ctx.fillStyle=PCOL[c];ctx.fillRect(mmX+gx2*mmW/GW,mmY+gy2*mmH/GH,2,2);}}
  ctx.fillStyle='#e879a0';ctx.fillRect(mmX+player.gx*mmW/GW-1,mmY+player.gy*mmH/GH-1,3,3);
  // Dead screen
  if(STATE==='dead'){
    ctx.fillStyle='rgba(245,240,250,0.75)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';ctx.font='bold 26px sans-serif';ctx.fillStyle='#e879a0';ctx.fillText('TRAIL CUT!',W/2,H*.28);
    ctx.font='36px serif';ctx.fillText('💀🔷💀',W/2,H*.38);
    ctx.font='bold 16px sans-serif';ctx.fillStyle='#b08dd4';
    ctx.fillText('Territory: '+score+' ('+pct+'%)',W/2,H*.50);
    ctx.fillText('Kills: '+player.kills,W/2,H*.57);
    ctx.fillText('Time: '+timeStr,W/2,H*.64);
    if(pct>=bestPct&&pct>0){ctx.fillStyle='#4ade80';ctx.fillText('NEW BEST!',W/2,H*.71);}
    ctx.font='13px sans-serif';ctx.fillStyle='#999';ctx.fillText('Tap to retry',W/2,H*.80);
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
