<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keira's Mancala</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'SF Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
a#back { position: fixed; top: 14px; left: 16px; font-size: 12px; color: #555; text-decoration: none; }
a#back:hover { color: #aaa; }
h1 { margin-top: 48px; font-size: 22px; color: #7c5cbf; letter-spacing: 0.04em; }
#subtitle { font-size: 11px; color: #555; margin-top: 4px; }
canvas { display: block; margin: 24px auto 0; border-radius: 12px; cursor: pointer; touch-action: none; max-width: 100%; }
#status { margin-top: 14px; font-size: 13px; color: #6ec1e4; min-height: 20px; text-align: center; font-weight: bold; }
#msg { margin-top: 4px; font-size: 12px; color: #777; min-height: 18px; text-align: center; }
button#restart { margin-top: 14px; background: none; border: 1px solid #333; color: #666; padding: 8px 20px; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 6px; }
button#restart:hover { color: #fff; border-color: #7c5cbf; }
#rules { max-width: 400px; margin: 20px 16px 40px; font-size: 10px; color: #444; line-height: 1.9; text-align: center; }
</style>
</head>
<body>
<a href="index.html" id="back">← home</a>
<h1>🔵 Keira's Mancala</h1>
<p id="subtitle">animated · play vs AI</p>
<canvas id="c" width="480" height="200"></canvas>
<div id="status">Your turn — pick a pit</div>
<div id="msg"></div>
<button id="restart">New Game</button>
<div id="rules">
  Pick a pit on the bottom row. Stones drop counter-clockwise one by one.<br>
  Land in your store (right) → extra turn. Land in empty pit on your side → capture opposite.<br>
  Game ends when one side is empty. Most stones wins!
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var statusEl = document.getElementById('status');
var msgEl = document.getElementById('msg');
var W = 480, H = 200;

var board, turn, gameOver, animating;
var particles = [];
var floatingStones = []; // for sow animation

// Sound
var audioCtx = null;
function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playTone(freq, dur, type, vol) {
  try { var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.value=freq;g.gain.setValueAtTime(vol||0.04,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur); } catch(e){}
}
function sndDrop() { playTone(200 + Math.random()*200, 0.08, "triangle", 0.05); }
function sndCapture() { playTone(523, 0.15, "sine", 0.07); setTimeout(function(){playTone(659,0.15,"sine",0.07);},80); }
function sndExtra() { playTone(784, 0.2, "sine", 0.06); }
function sndWin() { [523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.25,"sine",0.08);},i*100);}); }
function sndLose() { [300,250,200].forEach(function(f,i){setTimeout(function(){playTone(f,0.3,"sawtooth",0.04);},i*150);}); }

// Pit positions
function pitX(i) {
  if (i >= 1 && i <= 6) return 88 + (i-1)*58;
  if (i >= 8 && i <= 13) return 88 + (13-i)*58;
  return i === 7 ? 438 : 42;
}
function pitY(i) {
  if (i === 7 || i === 14) return H/2;
  return i >= 1 && i <= 6 ? 148 : 52;
}
function pitR(i) { return i === 7 || i === 14 ? 36 : 24; }

// Colors for individual stones
var STONE_COLORS = ['#7c5cbf','#50c878','#e06c75','#6ec1e4','#e5c07b','#c678dd','#56b6c2','#ff9f43'];
function stoneColor(seed) { return STONE_COLORS[seed % STONE_COLORS.length]; }

// Draw a single stone at position
function drawStone(x, y, color, radius) {
  radius = radius || 5;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI*2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  // highlight
  ctx.beginPath();
  ctx.arc(x - radius*0.3, y - radius*0.3, radius*0.3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fill();
}

// Get stone positions within a pit
function stonePositions(pitIdx, count) {
  var cx = pitX(pitIdx), cy = pitY(pitIdx);
  var r = pitR(pitIdx) - 8;
  var positions = [];
  if (count <= 4) {
    var offsets = [[0,0],[-6,-6],[6,-6],[-6,6],[6,6]];
    for (var i = 0; i < count; i++) positions.push([cx + offsets[i][0], cy + offsets[i][1]]);
  } else {
    for (var i = 0; i < count; i++) {
      var angle = (i / count) * Math.PI * 2 + pitIdx;
      var dist = r * 0.6 * (0.5 + (i % 3) * 0.2);
      positions.push([cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist]);
    }
  }
  return positions;
}

function drawBoard() {
  ctx.clearRect(0, 0, W, H);

  // Board bg
  ctx.fillStyle = '#16213e';
  ctx.beginPath(); ctx.roundRect(4, 4, W-8, H-8, 14); ctx.fill();
  ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(4, 4, W-8, H-8, 14); ctx.stroke();

  // Store dividers
  ctx.strokeStyle = '#222244'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(68, 12); ctx.lineTo(68, H-12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-68, 12); ctx.lineTo(W-68, H-12); ctx.stroke();

  // Labels
  ctx.fillStyle = '#444'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('YOU', W/2, H-10);
  ctx.fillText('AI', W/2, 14);

  for (var i = 1; i <= 14; i++) {
    var x = pitX(i), y = pitY(i), r = pitR(i);
    var isStore = i === 7 || i === 14;
    var isAI = i >= 8 && i <= 14;
    var stones = board[i];

    // Pit hole
    ctx.fillStyle = '#0f1629';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();

    // Pit border
    var isClickable = !gameOver && !animating && turn === 1 && i >= 1 && i <= 6 && stones > 0;
    ctx.strokeStyle = isStore
      ? (i===7 ? '#3a6080' : '#5a3a80')
      : isClickable ? '#50c878' : '#2a2a4a';
    ctx.lineWidth = isClickable ? 2.5 : 1.5;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();

    // Clickable glow
    if (isClickable) {
      ctx.shadowColor = '#50c878';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Draw stones
    if (stones > 0 && stones <= 12) {
      var positions = stonePositions(i, stones);
      for (var s = 0; s < positions.length; s++) {
        drawStone(positions[s][0], positions[s][1], stoneColor(i * 7 + s), 4.5);
      }
    } else if (stones > 12) {
      // Too many, just show count with a few stones
      for (var s = 0; s < 8; s++) {
        var angle = (s / 8) * Math.PI * 2;
        drawStone(x + Math.cos(angle) * (r*0.5), y + Math.sin(angle) * (r*0.5), stoneColor(i * 7 + s), 4);
      }
      ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(stones, x, y);
    }

    // Store count always visible
    if (isStore) {
      ctx.fillStyle = stones > 0 ? '#fff' : '#333'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(stones, x, y + r + 12);
    }

    // Pit number
    if (!isStore) {
      ctx.fillStyle = '#333'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
      ctx.fillText(i <= 6 ? i : '', x, isAI ? y+r+10 : y-r-6);
    }
  }

  // Floating stones (animation)
  for (var f = 0; f < floatingStones.length; f++) {
    var fs = floatingStones[f];
    drawStone(fs.x, fs.y, fs.color, 5);
  }

  // Particles
  for (var p = 0; p < particles.length; p++) {
    var pt = particles[p];
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function spawnParticles(x, y, color, count) {
  for (var i = 0; i < (count||8); i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*4,
      vy: (Math.random()-0.5)*4 - 2,
      r: 2 + Math.random()*3,
      life: 1,
      color: color || stoneColor(Math.floor(Math.random()*8))
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Animated sowing
function animateSow(pitIdx, player, callback) {
  animating = true;
  var stones = board[pitIdx];
  board[pitIdx] = 0;
  drawBoard();

  var positions = [];
  var pos = pitIdx;
  for (var i = 0; i < stones; i++) {
    pos = nextPit(pos, player);
    positions.push(pos);
  }

  var idx = 0;
  function dropNext() {
    if (idx >= positions.length) {
      callback(positions[positions.length - 1]);
      return;
    }
    var target = positions[idx];
    board[target]++;
    sndDrop();
    spawnParticles(pitX(target), pitY(target), null, 3);
    drawBoard();
    idx++;
    setTimeout(dropNext, 150);
  }
  dropNext();
}

function nextPit(pos, player) {
  var p = pos % 14 + 1;
  if (player === 1 && p === 14) p = 1;
  if (player === 2 && p === 7) p = 8;
  return p;
}

function checkCapture(lastPit, player) {
  var myPits = player === 1 ? [1,2,3,4,5,6] : [8,9,10,11,12,13];
  var myStore = player === 1 ? 7 : 14;
  if (myPits.indexOf(lastPit) !== -1 && board[lastPit] === 1) {
    var opp = 14 - lastPit;
    if (board[opp] > 0) {
      var captured = 1 + board[opp];
      board[myStore] += captured;
      board[lastPit] = 0; board[opp] = 0;
      spawnParticles(pitX(opp), pitY(opp), '#e5c07b', 12);
      sndCapture();
      drawBoard();
      return true;
    }
  }
  return false;
}

function checkExtra(lastPit, player) {
  return lastPit === (player === 1 ? 7 : 14);
}

function checkEnd() {
  var p1empty = [1,2,3,4,5,6].every(function(i){return board[i]===0;});
  var p2empty = [8,9,10,11,12,13].every(function(i){return board[i]===0;});
  if (p1empty || p2empty) {
    [1,2,3,4,5,6].forEach(function(i){board[7]+=board[i];board[i]=0;});
    [8,9,10,11,12,13].forEach(function(i){board[14]+=board[i];board[i]=0;});
    return true;
  }
  return false;
}

function endGame() {
  gameOver = true; animating = false;
  drawBoard();
  var you = board[7], ai = board[14];
  if (you > ai) { statusEl.textContent = 'You win! ' + you + ' vs ' + ai + ' 🎉'; sndWin(); spawnParticles(W/2,H/2,'#50c878',20); }
  else if (ai > you) { statusEl.textContent = 'AI wins. ' + ai + ' vs ' + you; sndLose(); }
  else { statusEl.textContent = 'Tie! ' + you + ' each'; }
  msgEl.textContent = '';
}

function aiChoose() {
  var valid = [8,9,10,11,12,13].filter(function(i){return board[i]>0;});
  if (!valid.length) return -1;
  // Prefer extra turn
  var chosen = null;
  for (var v = 0; v < valid.length; v++) {
    var pos = valid[v], s = board[valid[v]];
    while (s-- > 0) pos = nextPit(pos, 2);
    if (pos === 14) { chosen = valid[v]; break; }
  }
  // Prefer capture
  if (!chosen) for (var v = 0; v < valid.length; v++) {
    var pos = valid[v], s = board[valid[v]];
    while (s-- > 0) pos = nextPit(pos, 2);
    var opp = 14 - pos;
    if ([8,9,10,11,12,13].indexOf(pos) !== -1 && board[pos] === 0 && board[opp] > 0) { chosen = valid[v]; break; }
  }
  // Prefer most stones
  if (!chosen) {
    valid.sort(function(a,b){return board[b]-board[a];});
    chosen = valid[0];
  }
  return chosen;
}

function aiMove() {
  animating = true;
  statusEl.textContent = 'AI thinking...';
  setTimeout(function() {
    var pit = aiChoose();
    if (pit === -1) { endGame(); return; }
    animateSow(pit, 2, function(lastPit) {
      if (checkEnd()) { endGame(); return; }
      var captured = checkCapture(lastPit, 2);
      if (checkExtra(lastPit, 2)) {
        msgEl.textContent = 'AI gets another turn!';
        sndExtra();
        setTimeout(aiMove, 800);
      } else {
        turn = 1;
        animating = false;
        statusEl.textContent = 'Your turn';
        msgEl.textContent = captured ? 'AI captured!' : '';
      }
    });
  }, 600);
}

function playerMove(pitIdx) {
  if (gameOver || animating || turn !== 1) return;
  if (pitIdx < 1 || pitIdx > 6 || board[pitIdx] === 0) return;
  animateSow(pitIdx, 1, function(lastPit) {
    if (checkEnd()) { endGame(); return; }
    var captured = checkCapture(lastPit, 1);
    if (checkExtra(lastPit, 1)) {
      msgEl.textContent = 'Extra turn! 🎉';
      sndExtra();
      animating = false;
      statusEl.textContent = 'Your turn';
    } else {
      msgEl.textContent = captured ? 'Captured! 💎' : '';
      turn = 2;
      setTimeout(aiMove, 400);
    }
  });
}

function newGame() {
  board = [0, 4,4,4,4,4,4,0, 4,4,4,4,4,4,0];
  turn = 1; gameOver = false; animating = false;
  particles = []; floatingStones = [];
  statusEl.textContent = 'Your turn — pick a pit';
  msgEl.textContent = '';
  drawBoard();
}

// Click/touch
function handleClick(cx, cy) {
  if (gameOver || animating || turn !== 1) return;
  for (var i = 1; i <= 6; i++) {
    var dx = cx - pitX(i), dy = cy - pitY(i);
    if (Math.sqrt(dx*dx+dy*dy) <= pitR(i) + 6) { playerMove(i); return; }
  }
}
canvas.addEventListener('click', function(e) {
  var r = canvas.getBoundingClientRect();
  var scale = W / r.width;
  handleClick((e.clientX - r.left) * scale, (e.clientY - r.top) * scale);
});
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var r = canvas.getBoundingClientRect();
  var scale = W / r.width;
  var t = e.touches[0];
  handleClick((t.clientX - r.left) * scale, (t.clientY - r.top) * scale);
}, { passive: false });

document.getElementById('restart').addEventListener('click', newGame);

// Animation loop for particles
function gameLoop() {
  updateParticles();
  if (particles.length > 0) drawBoard();
  requestAnimationFrame(gameLoop);
}

newGame();
gameLoop();
</script>
</body>
</html>
