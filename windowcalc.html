<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Window &amp; Door Schedule</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px}
a{color:var(--accent);text-decoration:none}h1{font-size:1.3rem}.bar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
canvas{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:100%;max-width:800px;display:block;margin:0 auto 10px;cursor:crosshair}
.row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:end}
label{font-size:.75rem;color:var(--dim);display:flex;flex-direction:column;gap:2px}
input,select{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:5px 6px;border-radius:6px;font-size:.8rem;width:80px}
button{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.8rem}
button.sec{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:8px}th,td{border:1px solid var(--border);padding:5px 6px;text-align:left}
th{background:var(--bg2);color:var(--accent);font-weight:600}tr:nth-child(even){background:var(--bg2)}
.tabs{display:flex;gap:4px;margin-bottom:8px}.tab{padding:6px 12px;border-radius:6px 6px 0 0;cursor:pointer;font-size:.8rem;background:var(--bg2);border:1px solid var(--border);border-bottom:none}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
@media(max-width:600px){input{width:60px}}
</style></head><body>
<div class="bar"><a href="index.html">← home</a><h1>Window &amp; Door Schedule</h1></div>
<canvas id="cv" width="800" height="300"></canvas>
<div class="tabs"><div class="tab active" onclick="setTab('win')">Add Window</div><div class="tab" onclick="setTab('door')">Add Door</div></div>
<div id="winForm" class="row">
<label>Mark<input id="wMark" value="W1" style="width:50px"></label>
<label>Width(mm)<input id="wW" type="number" value="1200"></label>
<label>Height(mm)<input id="wH" type="number" value="1500"></label>
<label>Sill(mm)<input id="wSill" type="number" value="900"></label>
<label>Type<select id="wType"><option>Casement</option><option>Awning</option><option>Fixed</option><option>Slider</option><option>Double Hung</option></select></label>
<label>Glazing<select id="wGlaze"><option>Double</option><option>Triple</option><option>Single</option></select></label>
<label>Material<select id="wMat"><option>Vinyl</option><option>Aluminum</option><option>Wood</option><option>Fiberglass</option></select></label>
<label>X pos<input id="wX" type="number" value="100"></label>
<button onclick="addWin()">Add Window</button>
</div>
<div id="doorForm" class="row" style="display:none">
<label>Mark<input id="dMark" value="D1" style="width:50px"></label>
<label>Width(mm)<input id="dW" type="number" value="900"></label>
<label>Height(mm)<input id="dH" type="number" value="2100"></label>
<label>Type<select id="dType"><option>Hinged</option><option>Sliding</option><option>Bi-fold</option><option>Pocket</option></select></label>
<label>Swing<select id="dSwing"><option>Left</option><option>Right</option></select></label>
<label>Hardware<select id="dHW"><option>Passage</option><option>Privacy</option><option>Entry</option><option>Panic</option></select></label>
<label>X pos<input id="dX" type="number" value="400"></label>
<button onclick="addDoor()">Add Door</button>
</div>
<div class="row"><button class="sec" onclick="clearAll()">Clear All</button><button class="sec" onclick="printSchedule()">Print Schedule</button></div>
<div id="scheduleOut"></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let items=[],wallH=3000,wallW=8000,tab='win';
const costs={Vinyl:350,Aluminum:500,Wood:700,Fiberglass:600,Hinged:400,Sliding:550,'Bi-fold':800,Pocket:650};
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='win'?0:1)));
document.getElementById('winForm').style.display=t==='win'?'flex':'none';document.getElementById('doorForm').style.display=t==='door'?'flex':'none'}
function sx(v){return v/wallW*780+10}function sy(v){return 280-v/wallH*260}
function draw(){ctx.clearRect(0,0,800,300);ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.strokeRect(sx(0),sy(wallH),sx(wallW)-sx(0),sy(0)-sy(wallH));
items.forEach(it=>{const x=sx(it.x),bh=it.kind==='win'?it.sill:0,y1=sy(bh+it.h),y2=sy(bh),w=(it.w/wallW)*780;
ctx.fillStyle=it.kind==='win'?'rgba(100,180,255,0.25)':'rgba(160,120,80,0.3)';ctx.fillRect(x,y1,w,y2-y1);
ctx.strokeStyle=it.kind==='win'?'#64b5f6':'#a0784f';ctx.lineWidth=1.5;ctx.strokeRect(x,y1,w,y2-y1);
ctx.fillStyle=var_text();ctx.font='bold 11px system-ui';ctx.fillText(it.mark,x+2,y1-3)})}
function var_text(){return'#f0f0f0'}
function addWin(){const it={kind:'win',mark:gv('wMark'),w:+gv('wW'),h:+gv('wH'),sill:+gv('wSill'),type:gv('wType'),glaze:gv('wGlaze'),mat:gv('wMat'),x:+gv('wX'),cost:costs[gv('wMat')]||400};
items.push(it);draw();renderTable();autoInc('wMark')}
function addDoor(){const it={kind:'door',mark:gv('dMark'),w:+gv('dW'),h:+gv('dH'),sill:0,type:gv('dType'),swing:gv('dSwing'),hw:gv('dHW'),x:+gv('dX'),cost:costs[gv('dType')]||400};
items.push(it);draw();renderTable();autoInc('dMark')}
function autoInc(id){const el=document.getElementById(id),v=el.value,m=v.match(/^([A-Z]+)(\d+)$/);if(m)el.value=m[1]+(+m[2]+1)}
function gv(id){return document.getElementById(id).value}
function clearAll(){items=[];draw();renderTable()}
function renderTable(){const wins=items.filter(i=>i.kind==='win'),doors=items.filter(i=>i.kind==='door');
let html='<h3 style="margin-top:10px;font-size:.9rem">Window Schedule</h3><table><tr><th>Mark</th><th>Type</th><th>W×H</th><th>Sill</th><th>Head</th><th>Glazing</th><th>Material</th><th>Est. Cost</th></tr>';
wins.forEach(w=>{html+=`<tr><td>${w.mark}</td><td>${w.type}</td><td>${w.w}×${w.h}</td><td>${w.sill}</td><td>${w.sill+w.h}</td><td>${w.glaze}</td><td>${w.mat}</td><td>$${w.cost}</td></tr>`});
html+='</table><h3 style="margin-top:10px;font-size:.9rem">Door Schedule</h3><table><tr><th>Mark</th><th>Type</th><th>W×H</th><th>Swing</th><th>Hardware</th><th>Est. Cost</th></tr>';
doors.forEach(d=>{html+=`<tr><td>${d.mark}</td><td>${d.type}</td><td>${d.w}×${d.h}</td><td>${d.swing}</td><td>${d.hw}</td><td>$${d.cost}</td></tr>`});
html+='</table>';const total=items.reduce((s,i)=>s+i.cost,0);html+=`<p style="margin-top:8px;font-size:.85rem">Total items: ${items.length} | Rough estimate: <strong>$${total.toLocaleString()}</strong></p>`;
document.getElementById('scheduleOut').innerHTML=html}
function printSchedule(){const w=window.open('');w.document.write('<html><head><style>body{font-family:system-ui;font-size:12px;padding:20px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #333;padding:4px}th{background:#eee}</style></head><body>'+document.getElementById('scheduleOut').innerHTML+'</body></html>');w.document.close();w.print()}
draw()
</script></body></html>
