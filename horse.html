<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Lily's Horse 🐴</title>
  <style>
    :root{--font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--bg:#faf5ef;--bg2:#f0e8dc;--bg3:#e6dac8;--border:#d4c4a8;--text:#3a2a1a;--dim:#8a7a5a;--brown:#8B4513;--gold:#d4a017;--green:#4a8c3f;--red:#c44;--pink:#e88da0;--sky:#87CEEB}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow-x:hidden;touch-action:manipulation}
    #root{height:100%}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes hearts{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.5)}}
    @keyframes munch{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.85)}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
    @keyframes sleepBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    .bounce{animation:bounce 0.5s ease}.wiggle{animation:wiggle 0.4s ease}.fade-in{animation:fadeIn 0.3s ease}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
var { useState, useEffect, useCallback, useRef } = React;

// ── Save/Load
function loadHorse() {
  try { return JSON.parse(localStorage.getItem("lily-horse")); } catch(e) { return null; }
}
function saveHorse(h) { localStorage.setItem("lily-horse", JSON.stringify(h)); }

// ── Sound (softened — sine waves only, max volume 0.02)
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(Math.min(v||0.02,0.02),c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndNeigh(){tone(400,0.15,"sine",0.02);setTimeout(function(){tone(500,0.2,"sine",0.02);},100);setTimeout(function(){tone(350,0.15,"sine",0.015);},250);}
function sndMunch(){tone(200,0.06,"sine",0.02);setTimeout(function(){tone(250,0.06,"sine",0.02);},80);setTimeout(function(){tone(180,0.06,"sine",0.015);},160);}
function sndBrush(){for(var i=0;i<4;i++){(function(j){setTimeout(function(){tone(800+j*50,0.04,"sine",0.015);},j*60);})(i);}}
function sndHappy(){[440,550,660,880].forEach(function(f,i){setTimeout(function(){tone(f,0.15,"sine",0.02);},i*100);});}
function sndSad(){tone(220,0.3,"sine",0.015);setTimeout(function(){tone(180,0.3,"sine",0.015);},200);}
function sndTrot(){tone(100,0.04,"sine",0.015);setTimeout(function(){tone(120,0.04,"sine",0.015);},120);}
function sndSleep(){tone(150,0.3,"sine",0.01);}

// ── Narration (Web Speech API)
var narratorSpeaking = false;
var lastNarrationTime = 0;
var NARRATION_GAP = 4000; // 4 second gap between lines

var NARRATIONS = {
  feed: [
    "Mmm, carrots! {name} loves those.",
    "{name} munches happily on the food.",
    "Yummy! {name} licks their lips.",
    "What a tasty treat for {name}!",
    "{name} nickers softly, wanting more.",
    "Good nutrition keeps {name} strong."
  ],
  brush: [
    "{name} looks so shiny now!",
    "What a beautiful coat {name} has.",
    "{name} stands still, enjoying the brushing.",
    "Smooth and silky, just like {name} deserves.",
    "Every stroke makes {name} happier.",
    "{name} gleams in the sunlight."
  ],
  pet: [
    "Aww, {name} nuzzles your hand.",
    "{name} leans into your gentle touch.",
    "Such a sweet moment with {name}.",
    "{name} closes their eyes, so content.",
    "You can feel {name}'s warmth.",
    "{name} loves when you pet them."
  ],
  play: [
    "{name} gallops around happily!",
    "Look at {name} go! So full of energy!",
    "{name} tosses their mane with joy.",
    "Playtime is {name}'s favorite time!",
    "{name} kicks up their hooves playfully.",
    "What a spirited horse {name} is!"
  ],
  ride: [
    "Giddy up! What a ride!",
    "The wind rushes past as {name} gallops.",
    "{name} runs with such grace.",
    "You and {name} make a great team!",
    "What an adventure with {name}!",
    "Riding {name} feels like flying."
  ],
  sleep: [
    "Goodnight, {name}. Sweet dreams.",
    "{name} curls up for a cozy rest.",
    "Shhh, {name} is drifting off to sleep.",
    "Rest well, dear {name}.",
    "Time for {name} to recharge.",
    "{name} yawns and closes their eyes."
  ],
  wake: [
    "Good morning, {name}!",
    "{name} stretches and greets the new day.",
    "Rise and shine, sleepy {name}!",
    "{name} blinks awake, ready for fun.",
    "A brand new day for {name}!",
    "{name} whinnies a cheerful hello."
  ],
  lowHunger: [
    "{name} looks hungry...",
    "{name}'s tummy is rumbling.",
    "Poor {name} could really use some food.",
    "{name} noses around, looking for snacks.",
    "Time to feed {name}, don't you think?"
  ],
  lowClean: [
    "{name} needs a bath...",
    "{name}'s coat is looking a bit dusty.",
    "A good brushing would make {name} feel better.",
    "{name} could use some grooming love.",
    "Time to clean up {name}!"
  ]
};

function narrate(action, horseName) {
  if (narratorSpeaking) return;
  var now = Date.now();
  if (now - lastNarrationTime < NARRATION_GAP) return;
  if (!window.speechSynthesis) return;

  var lines = NARRATIONS[action];
  if (!lines || lines.length === 0) return;

  var text = lines[Math.floor(Math.random() * lines.length)];
  text = text.replace(/\{name\}/g, horseName);

  var utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.95;
  utterance.pitch = 1.1;
  utterance.volume = 0.8;

  // Try to pick a female voice
  var voices = window.speechSynthesis.getVoices();
  var femaleVoice = voices.find(function(v) {
    return v.name.toLowerCase().indexOf("female") !== -1 || v.name.indexOf("Samantha") !== -1 || v.name.indexOf("Karen") !== -1 || v.name.indexOf("Victoria") !== -1 || v.name.indexOf("Fiona") !== -1;
  });
  if (femaleVoice) utterance.voice = femaleVoice;

  utterance.onstart = function() { narratorSpeaking = true; };
  utterance.onend = function() { narratorSpeaking = false; lastNarrationTime = Date.now(); };
  utterance.onerror = function() { narratorSpeaking = false; };

  window.speechSynthesis.speak(utterance);
}

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

// ── Days survived counter
function getDaysSurvived(horse) {
  if (!horse || !horse.created) return 0;
  var diff = Date.now() - horse.created;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

// ── Horse moods & expressions
var HORSE_COLORS = {
  "Lady":"#C4956A","Sebastian":"#8B6914","Tonka":"#D2691E",
  "Boots":"#2F1B14","Chester":"#CD853F","Cruisin":"#A0522D"
};
var DEFAULT_COLOR = "#B8860B";

function getHorseMood(horse) {
  var avg = (horse.hunger + horse.happiness + horse.energy + horse.clean) / 4;
  if (horse.sleeping) return "sleeping";
  if (avg >= 80) return "ecstatic";
  if (avg >= 60) return "happy";
  if (avg >= 40) return "okay";
  if (avg >= 20) return "sad";
  return "miserable";
}

function getHorseEmoji(mood) {
  if (mood === "sleeping") return "😴";
  if (mood === "ecstatic") return "🥰";
  if (mood === "happy") return "😊";
  if (mood === "okay") return "😐";
  if (mood === "sad") return "😢";
  return "😭";
}

function getHorseQuote(mood, name) {
  var quotes = {
    sleeping: [name+" is dreaming of open fields...", "Zzz... *happy horse noises*...", "Shhh... "+name+" is resting."],
    ecstatic: [name+" loves you SO much! 💕", name+" is the happiest horse alive!", name+" wants to go for a gallop! 🏇", name+" nuzzles your hand."],
    happy: [name+" swishes their tail happily.", name+" neighs softly at you.", name+" is feeling great today!", name+" trots around proudly."],
    okay: [name+" could use some attention.", name+" looks at you expectantly.", name+" paws at the ground.", "Maybe "+name+" needs something?"],
    sad: [name+" looks at you with big eyes.", name+" hangs their head.", name+" needs some love.", "Please take care of "+name+"..."],
    miserable: [name+" is really struggling!", "PLEASE help "+name+"!", name+" needs food and care NOW!", name+" whimpers softly..."]
  };
  var arr = quotes[mood] || quotes.okay;
  return arr[Math.floor(Math.random() * arr.length)];
}

// ── Stat bar
function StatBar(props) {
  var color = props.value > 60 ? "var(--green)" : props.value > 30 ? "var(--gold)" : "var(--red)";
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
      <span style={{fontSize:"1rem",width:24,textAlign:"center"}}>{props.icon}</span>
      <span style={{fontSize:"0.65rem",fontFamily:"var(--font-mono)",color:"var(--dim)",width:55}}>{props.label}</span>
      <div style={{flex:1,height:10,background:"var(--bg3)",borderRadius:5,overflow:"hidden",border:"1px solid var(--border)"}}>
        <div style={{width:props.value+"%",height:"100%",background:color,borderRadius:5,transition:"width 0.5s ease"}}/>
      </div>
      <span style={{fontSize:"0.6rem",fontFamily:"var(--font-mono)",color:"var(--dim)",width:24,textAlign:"right"}}>{Math.round(props.value)}</span>
    </div>
  );
}

// ── Floating particles
function FloatingParticle(props) {
  return (
    <span style={{position:"absolute",left:props.x,top:props.y,fontSize:"1.2rem",animation:"hearts 1s ease forwards",pointerEvents:"none"}}>{props.emoji}</span>
  );
}

// ── Horse Display
function HorseDisplay(props) {
  var horse = props.horse;
  var mood = getHorseMood(horse);
  var color = HORSE_COLORS[horse.name] || DEFAULT_COLOR;
  var moodEmoji = getHorseEmoji(mood);

  var bodyAnim = "";
  if (props.action === "feed") bodyAnim = "munch 0.3s ease 3";
  else if (props.action === "brush") bodyAnim = "wiggle 0.4s ease 2";
  else if (props.action === "play") bodyAnim = "bounce 0.5s ease 3";
  else if (horse.sleeping) bodyAnim = "sleepBob 2s ease infinite";

  return (
    <div style={{position:"relative",textAlign:"center",padding:"16px 0"}}>
      {/* Sky background */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:120,background:"linear-gradient(180deg, var(--sky), #B8E8B0)",borderRadius:16,zIndex:0}}/>
      {/* Ground */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:50,background:"linear-gradient(180deg, #7CB342, #558B2F)",borderRadius:"0 0 16px 16px",zIndex:0}}/>

      {/* Horse body */}
      <div style={{position:"relative",zIndex:1,fontSize:"5rem",lineHeight:1,animation:bodyAnim,display:"inline-block",filter:horse.sleeping?"brightness(0.7)":"none"}}>
        🐴
      </div>

      {/* Mood face */}
      <div style={{position:"absolute",top:8,right:16,fontSize:"1.5rem",zIndex:2}}>{moodEmoji}</div>

      {/* Sleep Zzzs */}
      {horse.sleeping && (
        <div style={{position:"absolute",top:20,right:40,fontSize:"1.2rem",animation:"sleepBob 1.5s ease infinite",zIndex:2}}>💤</div>
      )}

      {/* Name plate */}
      <div style={{position:"relative",zIndex:1,marginTop:4}}>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1.1rem",fontWeight:700,color:"var(--brown)",letterSpacing:"0.04em"}}>{horse.name}</span>
        <span style={{fontSize:"0.65rem",color:"var(--dim)",marginLeft:8,fontFamily:"var(--font-mono)"}}>Age: {horse.age}d</span>
      </div>

      {/* Particles */}
      {props.particles.map(function(p,i) {
        return <FloatingParticle key={p.id} x={p.x} y={p.y} emoji={p.emoji}/>;
      })}
    </div>
  );
}

// ── Action Button
function ActionBtn(props) {
  return (
    <button onClick={props.onClick} disabled={props.disabled}
      style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 4px",
        background:props.disabled?"var(--bg3)":"var(--bg2)",border:"1.5px solid "+(props.disabled?"var(--bg3)":"var(--border)"),
        borderRadius:10,cursor:props.disabled?"default":"pointer",opacity:props.disabled?0.5:1,transition:"all 0.15s",
        fontFamily:"var(--font-sans)"}}>
      <span style={{fontSize:"1.5rem"}}>{props.icon}</span>
      <span style={{fontSize:"0.65rem",fontWeight:600,color:"var(--text)"}}>{props.label}</span>
    </button>
  );
}

// ── Name Picker
function NamePicker(props) {
  var [custom, setCustom] = useState("");
  var names = ["Lady","Sebastian","Tonka","Boots","Chester","Cruisin"];
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",gap:"1rem"}}>
      <div style={{fontSize:"4rem"}}>🐴</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:"clamp(1.5rem,6vw,2rem)",fontWeight:800,color:"var(--brown)"}}>Lily's Horse</div>
      <div style={{fontSize:"0.85rem",color:"var(--dim)",textAlign:"center",maxWidth:280}}>Choose your horse's name!</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,width:"100%",maxWidth:280}}>
        {names.map(function(n) {
          return (
            <button key={n} onClick={function(){props.onPick(n);}}
              style={{background:"var(--bg2)",border:"1.5px solid var(--border)",borderRadius:10,padding:"12px",
                fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:600,color:"var(--brown)",cursor:"pointer",transition:"all 0.15s"}}
              onMouseEnter={function(e){e.currentTarget.style.borderColor="var(--gold)";e.currentTarget.style.transform="scale(1.03)";}}
              onMouseLeave={function(e){e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.transform="scale(1)";}}>
              {n}
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",gap:8,width:"100%",maxWidth:280,marginTop:4}}>
        <input value={custom} onChange={function(e){setCustom(e.target.value);}} placeholder="Or type a name..."
          style={{flex:1,padding:"10px 12px",borderRadius:8,border:"1.5px solid var(--border)",background:"var(--bg2)",
            fontFamily:"var(--font-mono)",fontSize:"0.85rem",color:"var(--text)",outline:"none"}}
          onKeyDown={function(e){if(e.key==="Enter"&&custom.trim())props.onPick(custom.trim());}}/>
        <button onClick={function(){if(custom.trim())props.onPick(custom.trim());}}
          style={{padding:"10px 16px",borderRadius:8,border:"none",background:"var(--brown)",color:"#fff",
            fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:600,cursor:"pointer"}}>Go</button>
      </div>
      <a href="index.html" style={{marginTop:8,fontSize:"0.6rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textDecoration:"none"}}>← taskiap.com</a>
    </div>
  );
}

// ── Main Game
function Game(props) {
  var [horse, setHorse] = useState(props.horse);
  var [action, setAction] = useState(null);
  var [particles, setParticles] = useState([]);
  var [quote, setQuote] = useState("");
  var [showShop, setShowShop] = useState(false);
  var particleId = useRef(0);

  // Update quote periodically
  useEffect(function() {
    setQuote(getHorseQuote(getHorseMood(horse), horse.name));
    var iv = setInterval(function() {
      setQuote(getHorseQuote(getHorseMood(horse), horse.name));
    }, 8000);
    return function() { clearInterval(iv); };
  }, [horse.hunger, horse.happiness, horse.energy, horse.clean, horse.sleeping]);

  // Stat decay over time
  useEffect(function() {
    var iv = setInterval(function() {
      setHorse(function(h) {
        var next = Object.assign({}, h);
        if (!next.sleeping) {
          next.hunger = Math.max(0, next.hunger - 0.8);
          next.happiness = Math.max(0, next.happiness - 0.4);
          next.clean = Math.max(0, next.clean - 0.3);
          next.energy = Math.max(0, next.energy - 0.5);
        } else {
          next.energy = Math.min(100, next.energy + 1.5);
          next.hunger = Math.max(0, next.hunger - 0.3);
          if (next.energy >= 100) next.sleeping = false;
        }
        // Age up every ~5 min of play
        next.playTime = (next.playTime || 0) + 3;
        if (next.playTime >= 300) { next.playTime = 0; next.age = (next.age || 1) + 1; }
        saveHorse(next);
        return next;
      });
    }, 3000);
    // Low stat narration (every 15s check)
    var lowStatIv = setInterval(function() {
      setHorse(function(h) {
        if (h.sleeping) return h;
        if (h.hunger < 25) narrate("lowHunger", h.name);
        else if (h.clean < 25) narrate("lowClean", h.name);
        return h;
      });
    }, 15000);
    return function() { clearInterval(iv); clearInterval(lowStatIv); };
  }, []);

  var spawnParticle = function(emoji) {
    var id = particleId.current++;
    var x = 30 + Math.random() * 60 + "%";
    var y = 10 + Math.random() * 30 + "%";
    setParticles(function(p) { return p.concat([{id:id,x:x,y:y,emoji:emoji}]); });
    setTimeout(function() { setParticles(function(p) { return p.filter(function(pp){return pp.id!==id;}); }); }, 1000);
  };

  var doAction = function(type) {
    if (horse.sleeping && type !== "wake") return;
    setAction(type);
    setTimeout(function() { setAction(null); }, 1000);

    setHorse(function(h) {
      var next = Object.assign({}, h);
      if (type === "feed") {
        next.hunger = Math.min(100, next.hunger + 25);
        next.coins = (next.coins || 0) - 1;
        sndMunch();
        spawnParticle("🥕"); spawnParticle("🌾");
        next.happiness = Math.min(100, next.happiness + 5);
        narrate("feed", next.name);
      } else if (type === "brush") {
        next.clean = Math.min(100, next.clean + 30);
        sndBrush();
        spawnParticle("✨"); spawnParticle("💫");
        next.happiness = Math.min(100, next.happiness + 8);
        narrate("brush", next.name);
      } else if (type === "play") {
        next.happiness = Math.min(100, next.happiness + 20);
        next.energy = Math.max(0, next.energy - 15);
        next.hunger = Math.max(0, next.hunger - 8);
        sndHappy(); sndTrot();
        spawnParticle("💕"); spawnParticle("🏇");
        next.coins = (next.coins || 0) + 2;
        narrate("play", next.name);
      } else if (type === "treat") {
        next.happiness = Math.min(100, next.happiness + 15);
        next.hunger = Math.min(100, next.hunger + 10);
        next.coins = (next.coins || 0) - 2;
        sndMunch();
        spawnParticle("🍎"); spawnParticle("😋");
        narrate("feed", next.name);
      } else if (type === "sleep") {
        next.sleeping = true;
        sndSleep();
        spawnParticle("💤"); spawnParticle("🌙");
        narrate("sleep", next.name);
      } else if (type === "wake") {
        next.sleeping = false;
        sndNeigh();
        spawnParticle("☀️"); spawnParticle("🐴");
        narrate("wake", next.name);
      } else if (type === "pet") {
        next.happiness = Math.min(100, next.happiness + 12);
        sndNeigh();
        spawnParticle("❤️"); spawnParticle("💕"); spawnParticle("🥰");
        narrate("pet", next.name);
      } else if (type === "ride") {
        next.happiness = Math.min(100, next.happiness + 25);
        next.energy = Math.max(0, next.energy - 25);
        next.hunger = Math.max(0, next.hunger - 12);
        next.coins = (next.coins || 0) + 5;
        sndTrot(); sndHappy();
        spawnParticle("🏇"); spawnParticle("💨"); spawnParticle("🌟");
        narrate("ride", next.name);
      }
      saveHorse(next);
      return next;
    });
  };

  var mood = getHorseMood(horse);
  var coins = horse.coins || 0;

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1.5px solid var(--border)",background:"var(--bg2)"}}>
        <span style={{fontSize:"1.2rem"}}>🐴</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,color:"var(--brown)"}}>Lily's Horse</span>
        <span style={{fontSize:"0.6rem",fontFamily:"var(--font-mono)",color:"var(--dim)",marginLeft:4}}>Day {getDaysSurvived(horse) + 1}</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:"0.8rem"}}>🪙</span>
          <span style={{fontFamily:"var(--font-mono)",fontSize:"0.8rem",fontWeight:700,color:"var(--gold)"}}>{coins}</span>
        </div>
      </div>

      {/* Horse display */}
      <div style={{background:"var(--bg2)",margin:"8px",borderRadius:16,overflow:"hidden",position:"relative",minHeight:180}}>
        <HorseDisplay horse={horse} action={action} particles={particles}/>
      </div>

      {/* Quote */}
      <div className="fade-in" key={quote} style={{textAlign:"center",padding:"0 16px",minHeight:36}}>
        <span style={{fontSize:"0.78rem",color:"var(--dim)",fontStyle:"italic"}}>{quote}</span>
      </div>

      {/* Stats */}
      <div style={{padding:"4px 16px",flex:"0 0 auto"}}>
        <StatBar icon="🥕" label="Hunger" value={horse.hunger}/>
        <StatBar icon="😊" label="Happy" value={horse.happiness}/>
        <StatBar icon="⚡" label="Energy" value={horse.energy}/>
        <StatBar icon="✨" label="Clean" value={horse.clean}/>
      </div>

      {/* Actions */}
      <div style={{padding:"8px 12px",marginTop:"auto",display:"flex",flexDirection:"column",gap:6}}>
        <div style={{display:"flex",gap:6}}>
          <ActionBtn icon="🥕" label="Feed" onClick={function(){doAction("feed");}} disabled={horse.sleeping||coins<1}/>
          <ActionBtn icon="🧹" label="Brush" onClick={function(){doAction("brush");}} disabled={horse.sleeping}/>
          <ActionBtn icon="❤️" label="Pet" onClick={function(){doAction("pet");}} disabled={horse.sleeping}/>
          <ActionBtn icon="🎠" label="Play" onClick={function(){doAction("play");}} disabled={horse.sleeping||horse.energy<15}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          <ActionBtn icon="🍎" label="Treat" onClick={function(){doAction("treat");}} disabled={horse.sleeping||coins<2}/>
          <ActionBtn icon="🏇" label="Ride" onClick={function(){doAction("ride");}} disabled={horse.sleeping||horse.energy<25}/>
          <ActionBtn icon={horse.sleeping?"☀️":"🌙"} label={horse.sleeping?"Wake":"Sleep"} onClick={function(){doAction(horse.sleeping?"wake":"sleep");}}/>
          <ActionBtn icon="🏪" label="Shop" onClick={function(){setShowShop(!showShop);}}/>
        </div>
      </div>

      {/* Shop overlay */}
      {showShop && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}
          onClick={function(){setShowShop(false);}}>
          <div className="fade-in" onClick={function(e){e.stopPropagation();}}
            style={{background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:16,padding:20,width:"90%",maxWidth:320}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,color:"var(--brown)",marginBottom:12,textAlign:"center"}}>🏪 Horse Shop</div>
            <div style={{fontSize:"0.75rem",color:"var(--dim)",textAlign:"center",marginBottom:12}}>You have 🪙 {coins} coins</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={function(){if(coins>=5){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)-5;n.hunger=100;n.happiness=Math.min(100,n.happiness+10);saveHorse(n);return n;});spawnParticle("🥕");spawnParticle("🌾");spawnParticle("🍎");}}}
                disabled={coins<5}
                style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=5?"var(--bg2)":"var(--bg3)",cursor:coins>=5?"pointer":"default",opacity:coins>=5?1:0.5,textAlign:"left",fontFamily:"var(--font-sans)"}}>
                <span style={{fontSize:"0.85rem"}}>🪣 Premium Feed — Full hunger + happiness</span>
                <span style={{float:"right",fontFamily:"var(--font-mono)",color:"var(--gold)"}}>🪙 5</span>
              </button>
              <button onClick={function(){if(coins>=3){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)-3;n.clean=100;saveHorse(n);return n;});spawnParticle("🛁");spawnParticle("✨");}}}
                disabled={coins<3}
                style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=3?"var(--bg2)":"var(--bg3)",cursor:coins>=3?"pointer":"default",opacity:coins>=3?1:0.5,textAlign:"left",fontFamily:"var(--font-sans)"}}>
                <span style={{fontSize:"0.85rem"}}>🛁 Spa Day — Full cleanliness</span>
                <span style={{float:"right",fontFamily:"var(--font-mono)",color:"var(--gold)"}}>🪙 3</span>
              </button>
              <button onClick={function(){if(coins>=8){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)-8;n.hunger=100;n.happiness=100;n.energy=100;n.clean=100;saveHorse(n);return n;});sndHappy();spawnParticle("🌟");spawnParticle("👑");spawnParticle("💎");}}}
                disabled={coins<8}
                style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=8?"var(--bg2)":"var(--bg3)",cursor:coins>=8?"pointer":"default",opacity:coins>=8?1:0.5,textAlign:"left",fontFamily:"var(--font-sans)"}}>
                <span style={{fontSize:"0.85rem"}}>👑 Royal Treatment — Max ALL stats</span>
                <span style={{float:"right",fontFamily:"var(--font-mono)",color:"var(--gold)"}}>🪙 8</span>
              </button>
            </div>
            <div style={{textAlign:"center",marginTop:12,fontSize:"0.65rem",color:"var(--dim)"}}>Earn coins by playing and riding!</div>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{textAlign:"center",padding:"4px",fontSize:"0.55rem",color:"var(--dim)",fontFamily:"var(--font-mono)"}}>
        made for Lily 💕 · taskiap.com
      </div>
    </div>
  );
}

// ── App
function App() {
  var [horse, setHorse] = useState(loadHorse);

  var createHorse = function(name) {
    var h = {
      name: name,
      hunger: 80,
      happiness: 70,
      energy: 100,
      clean: 90,
      sleeping: false,
      age: 1,
      coins: 10,
      playTime: 0,
      created: Date.now()
    };
    saveHorse(h);
    setHorse(h);
  };

  if (!horse) return <NamePicker onPick={createHorse}/>;
  return <Game horse={horse}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
