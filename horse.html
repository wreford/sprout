// ── Sound (softened)
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(Math.min(v||0.02,0.02),c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}

// ── Procedural Background Music (Web Audio API)
var bgMusic = {
  ctx: null,
  melodyOsc: null,
  bassOsc: null,
  melodyGain: null,
  bassGain: null,
  masterGain: null,
  playing: false,
  muted: false,
  intervalId: null,
  noteIndex: 0,
  baseVolume: 0.01,
  // Pentatonic scale in C major: C4, D4, E4, G4, A4, C5, D5, E5
  melodyNotes: [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25],
  // Bass notes (lower octave): C3, D3, E3, G3, A3
  bassNotes: [130.81, 146.83, 164.81, 196.00, 220.00],
  // Pre-composed gentle melody pattern (indices into melodyNotes)
  melodyPattern: [0, 2, 4, 3, 2, 0, 1, 3, 4, 5, 4, 2, 3, 1, 0, 2],
  // Bass pattern (indices into bassNotes)
  bassPattern: [0, 0, 3, 3, 4, 4, 2, 0],
};

function startBgMusic() {
  if (bgMusic.playing) return;
  try {
    var c = getAudio();
    bgMusic.ctx = c;

    // Master gain
    bgMusic.masterGain = c.createGain();
    bgMusic.masterGain.gain.setValueAtTime(bgMusic.muted ? 0 : bgMusic.baseVolume, c.currentTime);
    bgMusic.masterGain.connect(c.destination);

    bgMusic.playing = true;
    bgMusic.noteIndex = 0;

    // 80 BPM = 750ms per beat
    var beatMs = 750;

    function playNote() {
      if (!bgMusic.playing) return;
      try {
        var c = bgMusic.ctx;
        var now = c.currentTime;

        // Melody note (sine wave)
        var mIdx = bgMusic.melodyPattern[bgMusic.noteIndex % bgMusic.melodyPattern.length];
        var mFreq = bgMusic.melodyNotes[mIdx];
        var mOsc = c.createOscillator();
        var mGain = c.createGain();
        mOsc.type = "sine";
        mOsc.frequency.setValueAtTime(mFreq, now);
        mGain.gain.setValueAtTime(0, now);
        mGain.gain.linearRampToValueAtTime(0.7, now + 0.05);
        mGain.gain.setValueAtTime(0.7, now + 0.3);
        mGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        mOsc.connect(mGain);
        mGain.connect(bgMusic.masterGain);
        mOsc.start(now);
        mOsc.stop(now + 0.75);

        // Bass note every 2 beats (triangle wave, soft)
        if (bgMusic.noteIndex % 2 === 0) {
          var bIdx = bgMusic.bassPattern[Math.floor(bgMusic.noteIndex / 2) % bgMusic.bassPattern.length];
          var bFreq = bgMusic.bassNotes[bIdx];
          var bOsc = c.createOscillator();
          var bGain = c.createGain();
          bOsc.type = "triangle";
          bOsc.frequency.setValueAtTime(bFreq, now);
          bGain.gain.setValueAtTime(0, now);
          bGain.gain.linearRampToValueAtTime(0.5, now + 0.08);
          bGain.gain.setValueAtTime(0.5, now + 0.8);
          bGain.gain.exponentialRampToValueAtTime(0.001, now + 1.45);
          bOsc.connect(bGain);
          bGain.connect(bgMusic.masterGain);
          bOsc.start(now);
          bOsc.stop(now + 1.5);
        }

        bgMusic.noteIndex++;
      } catch(e) {}
    }

    playNote();
    bgMusic.intervalId = setInterval(playNote, beatMs);
  } catch(e) {}
}

function stopBgMusic() {
  bgMusic.playing = false;
  if (bgMusic.intervalId) { clearInterval(bgMusic.intervalId); bgMusic.intervalId = null; }
}

function setBgMusicVolume(vol) {
  if (bgMusic.masterGain && bgMusic.ctx) {
    try { bgMusic.masterGain.gain.setValueAtTime(vol, bgMusic.ctx.currentTime); } catch(e) {}
  }
}

function toggleBgMusicMute() {
  bgMusic.muted = !bgMusic.muted;
  setBgMusicVolume(bgMusic.muted ? 0 : bgMusic.baseVolume);
}

// ── Streak Counter
function getStreak() {
  try {
    var data = JSON.parse(localStorage.getItem("lily-horse-streak") || "{}");
    return data;
  } catch(e) { return {}; }
}
function updateStreak() {
  var data = getStreak();
  var today = new Date().toDateString();
  var yesterday = new Date(Date.now() - 86400000).toDateString();
  if (data.lastVisit === today) {
    // Already visited today
    return data.streak || 1;
  }
  if (data.lastVisit === yesterday) {
    // Consecutive day
    data.streak = (data.streak || 1) + 1;
  } else {
    // Streak broken or first visit
    data.streak = 1;
  }
  data.lastVisit = today;
  localStorage.setItem("lily-horse-streak", JSON.stringify(data));
  return data.streak;
}

// ── Daily Bonus
function checkDailyBonus(horse) {
  if (!horse || !horse.created) return { earned: false };
  var now = Date.now();
  var lastBonusDate = horse.lastBonusDate || "";
  var today = new Date().toDateString();
  if (lastBonusDate === today) return { earned: false };
  // Horse must have been created before today (survived overnight)
  var createdDate = new Date(horse.created).toDateString();
  if (createdDate === today) return { earned: false };
  return { earned: true };
}

function narrate(action, horseName) {
  try {
    if (!window.speechSynthesis) return;
    var now = Date.now();
    if (now - lastNarrationTime < 4000) return;
    lastNarrationTime = now;
    var lines = NARRATIONS[action];
    if (!lines || lines.length === 0) return;
    var text = lines[Math.floor(Math.random() * lines.length)];
    text = text.replace(/\{name\}/g, horseName);
    try { speechSynthesis.cancel(); } catch(e) {}
    setTimeout(function() {
      try {
        var utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.95;
        utter.pitch = 1.1;
        utter.volume = 1.0;
        var voices = speechSynthesis.getVoices();
        if (voices && voices.length > 0) {
          var voice = null;
          for (var i = 0; i < voices.length; i++) {
            var v = voices[i];
            if (!v.lang || v.lang.indexOf('en') !== 0) continue;
            if (!voice) voice = v;
            if (v.name && (v.name.indexOf('Samantha') > -1 || v.name.indexOf('Female') > -1 ||
                v.name.indexOf('Google') > -1 || v.name.indexOf('Karen') > -1)) {
              voice = v; break;
            }
          }
          if (voice) utter.voice = voice;
        }
        speechSynthesis.speak(utter);
      } catch(e) {}
    }, 60);
  } catch(e) {}
}
if (window.speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = function(){}; }

// ── Days survived counter
function getDaysSurvived(horse) {
  if (!horse || !horse.created) return 0;
  return Math.floor((Date.now() - horse.created) / (1000 * 60 * 60 * 24));
}

// ── Horse moods & expressions
function getHorseMood(horse) {
  var avg = (horse.hunger + horse.happiness + horse.energy + horse.clean) / 4;
  if (horse.sleeping) return "sleeping";
  if (horse.hunger < 20 || horse.happiness < 20 || horse.energy < 20 || horse.clean < 20) return "stressed";
  if (avg >= 80) return "ecstatic";
  if (avg >= 60) return "happy";
  if (avg >= 40) return "okay";
  if (avg >= 20) return "sad";
  return "miserable";
}

function getHorseEmoji(mood) {
  if (mood === "sleeping") return "😴";
  if (mood === "stressed") return "😰";
  if (mood === "ecstatic") return "🐎";
  if (mood === "happy") return "😊";
  if (mood === "okay") return "😐";
  if (mood === "sad") return "😢";
  return "😭";
}

function getHorseQuote(mood, name) {
  var quotes = {
    sleeping: [name+" is dreaming of open fields...", "Zzz... *happy horse noises*..."],
    stressed: [name+" looks uncomfortable...", "Poor "+name+" needs some care!"],
    ecstatic: [name+" loves you SO much!", name+" is the happiest horse alive!", name+" wants to gallop!"],
    happy: [name+" swishes their tail happily.", name+" neighs softly at you.", name+" trots around proudly."],
    okay: [name+" could use some attention.", name+" looks at you expectantly."],
    sad: [name+" looks at you with big eyes.", name+" hangs their head."],
    miserable: [name+" is really struggling!", "PLEASE help "+name+"!"]
  };
  var arr = quotes[mood] || quotes.okay;
  return arr[Math.floor(Math.random() * arr.length)];
}

  var horse = props.horse;
  var mood = getHorseMood(horse);

// ── Race Mini-Game
function RaceGame(props) {
  var [running, setRunning] = useState(false);
  var [horsePos, setHorsePos] = useState(0);
  var [obstacles, setObstacles] = useState([]);
  var [jumping, setJumping] = useState(false);
  var [score, setScore] = useState(0);
  var [gameOver, setGameOver] = useState(false);
  var frameRef = useRef(null);
  var obstacleRef = useRef([]);
  var jumpRef = useRef(false);
  var scoreRef = useRef(0);
  var posRef = useRef(0);

  function startRace() {
    setRunning(true); setGameOver(false); setScore(0); setHorsePos(50);
    obstacleRef.current = [{x: 320}];
    jumpRef.current = false;
    scoreRef.current = 0;
    posRef.current = 50;
    setObstacles([{x:320}]);
    runLoop();
  }

  function runLoop() {
    frameRef.current = setInterval(function() {
      var obs = obstacleRef.current;
      for (var i = obs.length - 1; i >= 0; i--) {
        obs[i].x -= 5;
        if (obs[i].x < -30) {
          obs.splice(i, 1);
          scoreRef.current++;
        }
      }
      // Check collision
      var hit = false;
      for (var i = 0; i < obs.length; i++) {
        if (obs[i].x > 30 && obs[i].x < 80 && !jumpRef.current) {
          hit = true;
        }
      }
      if (hit) {
        clearInterval(frameRef.current);
        setGameOver(true); setRunning(false);
        setScore(scoreRef.current);
        props.onFinish(scoreRef.current);
        return;
      }
      // Add new obstacles
      if (obs.length === 0 || obs[obs.length-1].x < 200) {
        if (Math.random() < 0.03) obs.push({x: 320});
      }
      obstacleRef.current = obs;
      setObstacles(obs.slice());
      setScore(scoreRef.current);
    }, 50);
  }

  function jump() {
    if (!running || jumpRef.current) return;
    jumpRef.current = true;
    setJumping(true);
    setTimeout(function() { jumpRef.current = false; setJumping(false); }, 500);
  }

  useEffect(function() {
    return function() { if (frameRef.current) clearInterval(frameRef.current); };
  }, []);

  if (!running && !gameOver) {
    return (
      <div style={{textAlign:"center",padding:12}}>
        <div style={{fontSize:"0.85rem",fontWeight:700,marginBottom:8}}>Race Mini-Game</div>
        <div style={{fontSize:"0.7rem",color:"var(--dim)",marginBottom:8}}>Tap to jump over obstacles! Earn 10 coins per obstacle.</div>
        <button onClick={startRace} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"var(--brown)",color:"#fff",fontWeight:600,cursor:"pointer"}}>Start Race</button>
      </div>
    );
  }

  if (gameOver) {
    return (
      <div style={{textAlign:"center",padding:12}}>
        <div style={{fontSize:"1rem",fontWeight:700}}>Race Over!</div>
        <div style={{fontSize:"0.85rem",color:"var(--gold)",marginTop:4}}>Cleared {score} obstacles = {score * 10} coins!</div>
        <button onClick={function(){setGameOver(false);}} style={{marginTop:8,padding:"6px 16px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg2)",cursor:"pointer",fontSize:"0.75rem"}}>Close</button>
      </div>
    );
  }

  return (
    <div onClick={jump} style={{position:"relative",height:100,background:"linear-gradient(180deg,var(--sky),#c8e6c9)",borderRadius:12,overflow:"hidden",cursor:"pointer",userSelect:"none"}}>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:20,background:"#558B2F"}}/>
      <div style={{position:"absolute",bottom:jumping?50:20,left:50,fontSize:"2rem",transition:"bottom 0.15s"}}>🐴</div>
      {obstacles.map(function(o,i){
        return <div key={i} style={{position:"absolute",bottom:20,left:o.x,fontSize:"1.5rem"}}>🌵</div>;
      })}
      <div style={{position:"absolute",top:4,right:8,fontSize:"0.7rem",fontFamily:"var(--font-mono)",color:"var(--brown)"}}>Cleared: {score}</div>
      <div style={{position:"absolute",top:4,left:8,fontSize:"0.65rem",color:"var(--dim)"}}>TAP TO JUMP</div>
    </div>
  );
}

// ── Grooming Challenge
function GroomingGame(props) {
  var [playing, setPlaying] = useState(false);
  var [taps, setTaps] = useState(0);
  var [timeLeft, setTimeLeft] = useState(5);
  var [done, setDone] = useState(false);
  var timerRef = useRef(null);
  var tapsRef = useRef(0);

  function startGame() {
    setPlaying(true); setDone(false); setTaps(0); setTimeLeft(5);
    tapsRef.current = 0;
    timerRef.current = setInterval(function() {
      setTimeLeft(function(t) {
        if (t <= 0.1) {
          clearInterval(timerRef.current);
          setPlaying(false); setDone(true);
          props.onFinish(tapsRef.current);
          return 0;
        }
        return t - 0.1;
      });
    }, 100);
  }

  function tap() {
    if (!playing) return;
    tapsRef.current++;
    setTaps(tapsRef.current);
  }

  useEffect(function() {
    return function() { if (timerRef.current) clearInterval(timerRef.current); };
  }, []);

  var progress = Math.min(taps / 30, 1);
  var reward = Math.floor(progress * 15);

  if (!playing && !done) {
    return (
      <div style={{textAlign:"center",padding:12}}>
        <div style={{fontSize:"0.85rem",fontWeight:700,marginBottom:8}}>Grooming Challenge</div>
        <div style={{fontSize:"0.7rem",color:"var(--dim)",marginBottom:8}}>Tap as fast as you can in 5 seconds to brush your horse!</div>
        <button onClick={startGame} style={{padding:"8px 20px",borderRadius:8,border:"none",background:"var(--brown)",color:"#fff",fontWeight:600,cursor:"pointer"}}>Start Grooming</button>
      </div>
    );
  }

  if (done) {
    return (
      <div style={{textAlign:"center",padding:12}}>
        <div style={{fontSize:"1rem",fontWeight:700}}>Grooming Done!</div>
        <div style={{fontSize:"0.85rem",color:"var(--gold)",marginTop:4}}>{taps} taps = {reward} coins!</div>
        <button onClick={function(){setDone(false);}} style={{marginTop:8,padding:"6px 16px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg2)",cursor:"pointer",fontSize:"0.75rem"}}>Close</button>
      </div>
    );
  }

  return (
    <div onClick={tap} style={{textAlign:"center",padding:16,background:"var(--bg2)",borderRadius:12,cursor:"pointer",userSelect:"none"}}>
      <div style={{fontSize:"0.7rem",color:"var(--dim)"}}>TAP RAPIDLY!</div>
      <div style={{fontSize:"2.5rem",margin:"8px 0"}}>🧹</div>
      <div style={{width:"100%",height:12,background:"var(--bg3)",borderRadius:6,overflow:"hidden",margin:"4px 0"}}>
        <div style={{width:(progress*100)+"%",height:"100%",background:"var(--green)",borderRadius:6,transition:"width 0.1s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:"var(--dim)"}}>
        <span>Taps: {taps}</span>
        <span>Time: {timeLeft.toFixed(1)}s</span>
      </div>
    </div>
  );
}

function NamePicker(props) {

// ── Main Game
function Game(props) {
  var [horse, setHorse] = useState(props.horse);
  var [action, setAction] = useState(null);
  var [particles, setParticles] = useState([]);
  var [quote, setQuote] = useState("");
  var [showShop, setShowShop] = useState(false);
  var [showMiniGame, setShowMiniGame] = useState(null);
  var [adventureResult, setAdventureResult] = useState(null);
  var [musicMuted, setMusicMuted] = useState(false);
  var [streak, setStreak] = useState(1);
  var [welcomeMsg, setWelcomeMsg] = useState(null);
  var particleId = useRef(0);
  var weather = getSessionWeather();

  // Start music and check streak/daily bonus on mount
  useEffect(function() {
    // Start background music
    startBgMusic();

    // Update streak
    var currentStreak = updateStreak();
    setStreak(currentStreak);

    // Check daily bonus
    var bonus = checkDailyBonus(horse);
    if (bonus.earned) {
      setHorse(function(h) {
        var next = Object.assign({}, h);
        next.coins = (next.coins || 0) + 5;
        next.lastBonusDate = new Date().toDateString();
        saveHorse(next);
        return next;
      });
      setWelcomeMsg("Welcome back! +5 bonus coins! 🌟");
      sndCoin();
      setTimeout(function() { setWelcomeMsg(null); }, 4000);
    }

    return function() { stopBgMusic(); };
  }, []);

  // Adjust music volume based on sleeping state
  useEffect(function() {
    if (!bgMusic.muted) {
      setBgMusicVolume(horse.sleeping ? bgMusic.baseVolume * 0.3 : bgMusic.baseVolume);
    }
  }, [horse.sleeping]);

  useEffect(function() {
    setQuote(getHorseQuote(getHorseMood(horse), horse.name));
    var iv = setInterval(function() {
      setQuote(getHorseQuote(getHorseMood(horse), horse.name));
    }, 8000);
    return function() { clearInterval(iv); };
  }, [horse.hunger, horse.happiness, horse.energy, horse.clean, horse.sleeping]);

  // Stat decay over time - SLOWER for more relaxing gameplay
  useEffect(function() {
    var iv = setInterval(function() {
      setHorse(function(h) {
        var next = Object.assign({}, h);
        if (!next.sleeping) {
          next.hunger = Math.max(0, next.hunger - 0.3);
          next.happiness = Math.max(0, next.happiness - 0.15);
          next.clean = Math.max(0, next.clean - 0.12);
          next.energy = Math.max(0, next.energy - 0.2);
        } else {
          next.energy = Math.min(100, next.energy + 1.5);
          next.hunger = Math.max(0, next.hunger - 0.1);
          if (next.energy >= 100) next.sleeping = false;
        }
        next.playTime = (next.playTime || 0) + 5;
        if (next.playTime >= 300) { next.playTime = 0; next.age = (next.age || 1) + 1; }
        saveHorse(next);
        return next;
      });
    }, 5000);
    return function() { clearInterval(iv); };
  }, []);

  // Apply weather effects once on mount
  useEffect(function() {
    setHorse(function(h) {
      var next = Object.assign({}, h);
      next.happiness = Math.max(0, Math.min(100, next.happiness + weather.happinessBonus));
      next.clean = Math.max(0, Math.min(100, next.clean + weather.cleanBonus));
      saveHorse(next);
      return next;
    });
  }, []);

  var spawnParticle = function(emoji) {
    var id = particleId.current++;
    var x = 30 + Math.random() * 60 + "%";
    var y = 10 + Math.random() * 30 + "%";
    setParticles(function(p) { return p.concat([{id:id,x:x,y:y,emoji:emoji}]); });
    setTimeout(function() { setParticles(function(p) { return p.filter(function(pp){return pp.id!==id;}); }); }, 1000);
  };

  var doAction = function(type) {
    if (horse.sleeping && type !== "wake") return;
    setAction(type);
    setTimeout(function() { setAction(null); }, 1000);

    setHorse(function(h) {
      var next = Object.assign({}, h);
      if (type === "feed") {
        next.hunger = Math.min(100, next.hunger + 25);
        next.coins = (next.coins || 0) - 1;
        sndMunch(); spawnParticle("🥕"); spawnParticle("🌾");
        next.happiness = Math.min(100, next.happiness + 5);
        narrate("feed", next.name);
      } else if (type === "brush") {
        next.clean = Math.min(100, next.clean + 30);
        sndBrush(); spawnParticle("✨"); spawnParticle("💫");
        next.happiness = Math.min(100, next.happiness + 8);
        narrate("brush", next.name);
      } else if (type === "play") {
        next.happiness = Math.min(100, next.happiness + 20);
        next.energy = Math.max(0, next.energy - 15);
        next.hunger = Math.max(0, next.hunger - 8);
        sndHappy(); sndTrot(); spawnParticle("💕"); spawnParticle("🏇");
        next.coins = (next.coins || 0) + 2;
        narrate("play", next.name);
      } else if (type === "treat") {
        next.happiness = Math.min(100, next.happiness + 15);
        next.hunger = Math.min(100, next.hunger + 10);
        next.coins = (next.coins || 0) - 2;
        sndMunch(); spawnParticle("🍎"); spawnParticle("😋");
        narrate("feed", next.name);
      } else if (type === "sleep") {
        next.sleeping = true;
        sndSleep(); spawnParticle("💤"); spawnParticle("🌙");
        narrate("sleep", next.name);
      } else if (type === "wake") {
        next.sleeping = false;
        sndNeigh(); spawnParticle("☀️"); spawnParticle("🐴");
        narrate("wake", next.name);
      } else if (type === "pet") {
        next.happiness = Math.min(100, next.happiness + 12);
        sndNeigh(); spawnParticle("❤️"); spawnParticle("💕"); spawnParticle("🥰");
        narrate("pet", next.name);
      } else if (type === "ride") {
        next.happiness = Math.min(100, next.happiness + 25);
        next.energy = Math.max(0, next.energy - 25);
        next.hunger = Math.max(0, next.hunger - 12);
        next.coins = (next.coins || 0) + 5;
        sndTrot(); sndHappy(); spawnParticle("🏇"); spawnParticle("💨"); spawnParticle("🌟");
        narrate("ride", next.name);
      }
      saveHorse(next);
      return next;
    });
  };

  var doAdventure = function() {
    if (horse.energy < 20) return;
    var adv = ADVENTURES[Math.floor(Math.random() * ADVENTURES.length)];
    var text = adv.text.replace("{name}", horse.name);
    setAdventureResult({ text: text, coins: adv.coins, happiness: adv.happiness });
    sndTrot();
    setHorse(function(h) {
      var next = Object.assign({}, h);
      next.energy = Math.max(0, next.energy - 20);
      next.coins = Math.max(0, (next.coins || 0) + adv.coins);
      next.happiness = Math.max(0, Math.min(100, next.happiness + adv.happiness));
      if (adv.energy) next.energy = Math.max(0, Math.min(100, next.energy + adv.energy));
      saveHorse(next);
      return next;
    });
    if (adv.coins > 0) spawnParticle("🪙");
    if (adv.happiness > 0) spawnParticle("💕");
    if (adv.happiness < 0) spawnParticle("😰");
  };

  var handleRaceFinish = function(obstacles) {
    var earned = obstacles * 10;
    sndCoin();
    setHorse(function(h) {
      var next = Object.assign({}, h);
      next.coins = (next.coins || 0) + earned;
      next.energy = Math.max(0, next.energy - 10);
      saveHorse(next);
      return next;
    });
  };

  var handleGroomFinish = function(taps) {
    var progress = Math.min(taps / 30, 1);
    var earned = Math.floor(progress * 15);
    sndCoin();
    setHorse(function(h) {
      var next = Object.assign({}, h);
      next.coins = (next.coins || 0) + earned;
      next.clean = Math.min(100, next.clean + 20);
      saveHorse(next);
      return next;
    });
  };

  var buyAccessory = function(acc) {
    setHorse(function(h) {
      var next = Object.assign({}, h);
      if ((next.coins || 0) < acc.cost) return h;
      var accessories = next.accessories || [];
      if (accessories.indexOf(acc.id) >= 0) return h;
      next.coins -= acc.cost;
      next.accessories = accessories.concat([acc.id]);
      sndHappy(); spawnParticle(acc.emoji);
      saveHorse(next);
      return next;
    });
  };

  var resetHorse = function() {
    localStorage.removeItem("lily-horse");
    window.location.reload();
  };

  var mood = getHorseMood(horse);
  var coins = horse.coins || 0;
  var accessories = horse.accessories || [];

  return (
    <div style={{minHeight:"100%",display:"flex",flexDirection:"column",paddingBottom:16}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1.5px solid var(--border)",background:"var(--bg2)"}}>
        <span style={{fontSize:"1.2rem"}}>{"🐴"}</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,color:"var(--brown)"}}>Lily's Horse</span>
        <span style={{fontSize:"0.6rem",fontFamily:"var(--font-mono)",color:"var(--dim)",marginLeft:4}}>Day {getDaysSurvived(horse) + 1}</span>
        <span style={{fontSize:"0.75rem",marginLeft:4}} title={weather.name}>{weather.emoji}</span>
        <span style={{fontSize:"0.55rem",fontFamily:"var(--font-mono)",color:"var(--pink)",marginLeft:4}} title="Consecutive days visiting">{"🔥"} {streak}d</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <button onClick={function(){ setMusicMuted(function(m){ var newM = !m; bgMusic.muted = newM; setBgMusicVolume(newM ? 0 : (horse.sleeping ? bgMusic.baseVolume * 0.3 : bgMusic.baseVolume)); return newM; }); }} style={{fontSize:"1rem",padding:"2px 6px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer",lineHeight:1}} title={musicMuted?"Unmute music":"Mute music"}>{musicMuted ? "🔇" : "🔊"}</button>
          <span style={{fontFamily:"var(--font-mono)",fontSize:"0.8rem",fontWeight:700,color:"var(--gold)"}}>🪙 {coins}</span>
          <button onClick={resetHorse} style={{fontSize:"0.6rem",padding:"3px 8px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",color:"var(--dim)",cursor:"pointer",fontFamily:"var(--font-mono)"}}>New Horse</button>
        </div>
      </div>

      {/* Weather banner */}
      <div style={{textAlign:"center",padding:"4px 12px",fontSize:"0.7rem",color:"var(--dim)",background:"var(--bg2)",borderBottom:"1px solid var(--border)"}}>
        {weather.emoji} {weather.name} today! {weather.happinessBonus > 0 ? "+"+weather.happinessBonus+" happiness" : weather.happinessBonus < 0 ? weather.happinessBonus+" happiness" : ""} {weather.cleanBonus < 0 ? weather.cleanBonus+" clean" : ""} {weather.warmthBonus < 0 ? weather.warmthBonus+" warmth" : ""}
      </div>

      {/* Welcome back / daily bonus message */}
      {welcomeMsg && (
        <div className="fade-in" style={{textAlign:"center",padding:"6px 12px",fontSize:"0.8rem",fontWeight:700,color:"var(--gold)",background:"linear-gradient(90deg,transparent,rgba(212,160,23,0.1),transparent)"}}>
          {welcomeMsg}
        </div>
      )}

      {/* Horse display */}
      <div style={{background:"var(--bg2)",margin:"8px",borderRadius:16,overflow:"hidden",position:"relative",minHeight:180}}>
        <HorseDisplay horse={horse} action={action} particles={particles}/>
      </div>

      {/* Quote */}
      <div className="fade-in" key={quote} style={{textAlign:"center",padding:"0 16px",minHeight:30}}>
        <span style={{fontSize:"0.75rem",color:"var(--dim)",fontStyle:"italic"}}>{quote}</span>
      </div>

      {/* Stats */}
      <div style={{padding:"4px 16px",flex:"0 0 auto"}}>
        <StatBar icon="🥕" label="Hunger" value={horse.hunger}/>
        <StatBar icon="😊" label="Happy" value={horse.happiness}/>
        <StatBar icon="⚡" label="Energy" value={horse.energy}/>
        <StatBar icon="✨" label="Clean" value={horse.clean}/>
      </div>

      {/* Actions */}
      <div style={{padding:"8px 12px",display:"flex",flexDirection:"column",gap:6}}>
        <div style={{display:"flex",gap:6}}>
          <ActionBtn icon="🥕" label="Feed" onClick={function(){doAction("feed");}} disabled={horse.sleeping||coins<1}/>
          <ActionBtn icon="🧹" label="Brush" onClick={function(){doAction("brush");}} disabled={horse.sleeping}/>
          <ActionBtn icon="❤️" label="Pet" onClick={function(){doAction("pet");}} disabled={horse.sleeping}/>
          <ActionBtn icon="🎠" label="Play" onClick={function(){doAction("play");}} disabled={horse.sleeping||horse.energy<15}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          <ActionBtn icon="🍎" label="Treat" onClick={function(){doAction("treat");}} disabled={horse.sleeping||coins<2}/>
          <ActionBtn icon="🏇" label="Ride" onClick={function(){doAction("ride");}} disabled={horse.sleeping||horse.energy<25}/>
          <ActionBtn icon={horse.sleeping?"☀️":"🌙"} label={horse.sleeping?"Wake":"Sleep"} onClick={function(){doAction(horse.sleeping?"wake":"sleep");}}/>
          <ActionBtn icon="🏪" label="Shop" onClick={function(){setShowShop(!showShop);}}/>
        </div>
        <div style={{display:"flex",gap:6}}>
          <ActionBtn icon="🗺️" label="Adventure" onClick={doAdventure} disabled={horse.sleeping||horse.energy<20}/>
          <ActionBtn icon="🏁" label="Race" onClick={function(){setShowMiniGame("race");}} disabled={horse.sleeping||horse.energy<10}/>
          <ActionBtn icon="🧹" label="Groom" onClick={function(){setShowMiniGame("groom");}} disabled={horse.sleeping}/>
        </div>
      </div>

      {/* Adventure result */}
      {adventureResult && (
        <div className="fade-in" style={{margin:"0 12px",padding:12,background:"var(--bg2)",borderRadius:10,border:"1px solid var(--border)",textAlign:"center"}}>
          <div style={{fontSize:"0.8rem",fontWeight:600,marginBottom:4}}>{adventureResult.text}</div>
          <div style={{fontSize:"0.7rem",color:"var(--gold)"}}>
            {adventureResult.coins > 0 ? "+"+adventureResult.coins+" coins " : ""}
            {adventureResult.happiness > 0 ? "+"+adventureResult.happiness+" happiness" : adventureResult.happiness < 0 ? adventureResult.happiness+" happiness" : ""}
          </div>
          <button onClick={function(){setAdventureResult(null);}} style={{marginTop:6,fontSize:"0.65rem",padding:"4px 12px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer"}}>OK</button>
        </div>
      )}

      {/* Mini-game overlay */}
      {showMiniGame && (
        <div style={{margin:"0 12px",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",background:"var(--bg2)"}}>
          {showMiniGame === "race" && <RaceGame onFinish={handleRaceFinish}/>}
          {showMiniGame === "groom" && <GroomingGame onFinish={handleGroomFinish}/>}
          <div style={{textAlign:"center",padding:6}}>
            <button onClick={function(){setShowMiniGame(null);}} style={{fontSize:"0.65rem",padding:"4px 12px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg3)",cursor:"pointer"}}>Close</button>
          </div>
        </div>
      )}

      {/* Shop overlay */}
      {showShop && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}
          onClick={function(){setShowShop(false);}}>
          <div className="fade-in" onClick={function(e){e.stopPropagation();}}
            style={{background:"var(--bg)",border:"1.5px solid var(--border)",borderRadius:16,padding:20,width:"90%",maxWidth:340,maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:"0.9rem",fontWeight:700,color:"var(--brown)",marginBottom:12,textAlign:"center"}}>🏪 Horse Shop</div>
            <div style={{fontSize:"0.75rem",color:"var(--dim)",textAlign:"center",marginBottom:12}}>You have 🪙 {coins} coins</div>

            {/* Stat items */}
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              <button onClick={function(){if(coins>=5){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)-5;n.hunger=100;n.happiness=Math.min(100,n.happiness+10);saveHorse(n);return n;});spawnParticle("🥕");}}}
                disabled={coins<5}
                style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=5?"var(--bg2)":"var(--bg3)",cursor:coins>=5?"pointer":"default",opacity:coins>=5?1:0.5,textAlign:"left",fontFamily:"var(--font-sans)"}}>
                <span style={{fontSize:"0.85rem"}}>🪣 Premium Feed</span>
                <span style={{float:"right",fontFamily:"var(--font-mono)",color:"var(--gold)"}}>🪙 5</span>
              </button>
              <button onClick={function(){if(coins>=3){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)-3;n.clean=100;saveHorse(n);return n;});spawnParticle("🛁");}}}
                disabled={coins<3}
                style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=3?"var(--bg2)":"var(--bg3)",cursor:coins>=3?"pointer":"default",opacity:coins>=3?1:0.5,textAlign:"left",fontFamily:"var(--font-sans)"}}>
                <span style={{fontSize:"0.85rem"}}>🛁 Spa Day</span>
                <span style={{float:"right",fontFamily:"var(--font-mono)",color:"var(--gold)"}}>🪙 3</span>
              </button>
              <button onClick={function(){if(coins>=8){setHorse(function(h){var n=Object.assign({},h);n.coins=(n.coins||0)-8;n.hunger=100;n.happiness=100;n.energy=100;n.clean=100;saveHorse(n);return n;});sndHappy();spawnParticle("👑");}}}
                disabled={coins<8}
                style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid var(--border)",background:coins>=8?"var(--bg2)":"var(--bg3)",cursor:coins>=8?"pointer":"default",opacity:coins>=8?1:0.5,textAlign:"left",fontFamily:"var(--font-sans)"}}>
                <span style={{fontSize:"0.85rem"}}>👑 Royal Treatment — Max ALL</span>
                <span style={{float:"right",fontFamily:"var(--font-mono)",color:"var(--gold)"}}>🪙 8</span>
              </button>
            </div>

            {/* Accessories */}
            <div style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",fontWeight:700,color:"var(--brown)",marginBottom:8}}>Accessories</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {ACCESSORIES.map(function(acc) {
                var owned = accessories.indexOf(acc.id) >= 0;
                return (
                  <button key={acc.id} onClick={function(){buyAccessory(acc);}} disabled={owned || coins < acc.cost}
                    style={{padding:"8px 14px",borderRadius:8,border:"1.5px solid var(--border)",
                      background:owned?"var(--bg3)":coins>=acc.cost?"var(--bg2)":"var(--bg3)",
                      cursor:owned||coins<acc.cost?"default":"pointer",opacity:owned||coins<acc.cost?0.5:1,
                      textAlign:"left",fontFamily:"var(--font-sans)",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:"1.2rem"}}>{acc.emoji}</span>
                    <span style={{fontSize:"0.8rem",flex:1}}>{acc.name} {owned ? "(owned)" : ""}</span>
                    {!owned && <span style={{fontFamily:"var(--font-mono)",color:"var(--gold)",fontSize:"0.8rem"}}>🪙 {acc.cost}</span>}
                  </button>
                );
              })}
            </div>

            <div style={{textAlign:"center",marginTop:12,fontSize:"0.65rem",color:"var(--dim)"}}>Earn coins by playing, riding, racing, and adventuring!</div>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{textAlign:"center",padding:"8px",fontSize:"0.55rem",color:"var(--dim)",fontFamily:"var(--font-mono)",marginTop:"auto"}}>
        made for Lily {"💕"}
      </div>
    </div>
  );
}

// ── App
function App() {
  var [horse, setHorse] = useState(loadHorse);

  var createHorse = function(name) {
    var h = {
      name: name,
      hunger: 80,
      happiness: 70,
      energy: 100,
      clean: 90,
      sleeping: false,
      age: 1,
      coins: 10,
      playTime: 0,
      created: Date.now(),
      accessories: []
    };
    saveHorse(h);
    setHorse(h);
  };

  if (!horse) return <NamePicker onPick={createHorse}/>;
  return <Game horse={horse}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
