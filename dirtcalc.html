<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cut &amp; Fill Optimizer</title>
<style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px}
a{color:var(--accent);text-decoration:none}h1{font-size:1.3rem;margin-bottom:8px}
.bar{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
canvas{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:100%;max-width:800px;display:block;margin:0 auto 10px;cursor:crosshair}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
button{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem}
button.sec{background:var(--bg2);border:1px solid var(--border);color:var(--text)}
select,input{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:6px;font-size:.85rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:10px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat span{display:block;font-size:1.2rem;font-weight:700;color:var(--accent)}.stat small{color:var(--dim);font-size:.75rem}
</style></head><body>
<div class="bar"><a href="index.html">← home</a><h1>Cut &amp; Fill Optimizer</h1></div>
<div class="row">
<button id="btnTerrain">Draw Terrain</button><button id="btnGrade" class="sec">Draw Grade</button>
<button id="btnClear" class="sec">Clear All</button>
<label style="color:var(--dim);font-size:.85rem">Shrink/Swell:
<select id="sf"><option value="0.8">0.80 (Rock)</option><option value="0.9">0.90 (Gravel)</option><option value="1" selected>1.00 (None)</option><option value="1.1">1.10 (Clay)</option><option value="1.25">1.25 (Loose)</option></select></label>
</div>
<canvas id="cv" width="800" height="260"></canvas>
<div class="stats">
<div class="stat"><small>Cut Volume</small><span id="sCut">0 m³</span></div>
<div class="stat"><small>Fill Volume</small><span id="sFill">0 m³</span></div>
<div class="stat"><small>Net (adj.)</small><span id="sNet">0 m³</span></div>
<div class="stat"><small>Balance Pt</small><span id="sBal">—</span></div>
</div>
<canvas id="cv2" width="800" height="160"></canvas>
<p style="color:var(--dim);font-size:.75rem;text-align:center;margin-top:4px">Mass Haul Diagram — cumulative earthwork balance</p>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),cv2=document.getElementById('cv2'),ctx2=cv2.getContext('2d');
let mode='terrain',terrain=[],grade=[],W=800,H=260,H2=160;
function resize(){const r=cv.parentElement.clientWidth;cv.style.width=Math.min(r,800)+'px';cv2.style.width=Math.min(r,800)+'px'}
resize();window.addEventListener('resize',resize);
document.getElementById('btnTerrain').onclick=()=>{mode='terrain';document.getElementById('btnTerrain').style.background='var(--accent)';document.getElementById('btnGrade').style.background='var(--bg2)'};
document.getElementById('btnGrade').onclick=()=>{mode='grade';document.getElementById('btnGrade').style.background='var(--accent)';document.getElementById('btnTerrain').style.background='var(--bg2)'};
document.getElementById('btnClear').onclick=()=>{terrain=[];grade=[];draw();calcVolumes()};
cv.addEventListener('click',e=>{const rect=cv.getBoundingClientRect(),sx=W/rect.width,x=Math.round((e.clientX-rect.left)*sx),y=Math.round((e.clientY-rect.top)*(H/rect.height));
const arr=mode==='terrain'?terrain:grade;arr.push({x,y});arr.sort((a,b)=>a.x-b.x);draw();calcVolumes()});
function draw(){ctx.clearRect(0,0,W,H);ctx.strokeStyle=var_border();ctx.lineWidth=0.5;
for(let i=0;i<=10;i++){let y=i*H/10;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
drawLine(terrain,'#8b5cf6',true);drawLine(grade,getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#ff6b35',false)}
function var_border(){return '#2a2a2d'}
function drawLine(pts,color,fill){if(pts.length<2)return;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill()})}
function interp(pts,x){if(pts.length<2)return null;if(x<=pts[0].x)return pts[0].y;if(x>=pts[pts.length-1].x)return pts[pts.length-1].y;
for(let i=0;i<pts.length-1;i++){if(x>=pts[i].x&&x<=pts[i+1].x){let t=(x-pts[i].x)/(pts[i+1].x-pts[i].x);return pts[i].y+t*(pts[i+1].y-pts[i].y)}}return null}
function calcVolumes(){if(terrain.length<2||grade.length<2){document.getElementById('sCut').textContent='0 m³';document.getElementById('sFill').textContent='0 m³';document.getElementById('sNet').textContent='0 m³';document.getElementById('sBal').textContent='—';ctx2.clearRect(0,0,W,H2);return}
const sf=parseFloat(document.getElementById('sf').value),xMin=Math.max(terrain[0].x,grade[0].x),xMax=Math.min(terrain[terrain.length-1].x,grade[grade.length-1].x);
let cut=0,fill=0,cumul=[],step=2;
for(let x=xMin;x<xMax;x+=step){let t1=interp(terrain,x),t2=interp(terrain,x+step),g1=interp(grade,x),g2=interp(grade,x+step);
if(t1==null||g1==null)continue;let d1=t1-g1,d2=t2-g2,area=(d1+d2)/2*step;
if(area>0)cut+=area;else fill+=Math.abs(area);
let last=cumul.length?cumul[cumul.length-1].v:0;cumul.push({x,v:last+area})}
let scaleFill=fill*sf,net=cut-scaleFill;
document.getElementById('sCut').textContent=cut.toFixed(1)+' m³';
document.getElementById('sFill').textContent=scaleFill.toFixed(1)+' m³';
document.getElementById('sNet').textContent=(net>0?'+':'')+net.toFixed(1)+' m³';
let balPt='—';for(let i=1;i<cumul.length;i++){if((cumul[i-1].v<=0&&cumul[i].v>=0)||(cumul[i-1].v>=0&&cumul[i].v<=0)){balPt='Sta '+cumul[i].x;break}}
document.getElementById('sBal').textContent=balPt;
drawMassHaul(cumul)}
function drawMassHaul(data){ctx2.clearRect(0,0,W,H2);if(!data.length)return;
let minV=Math.min(...data.map(d=>d.v)),maxV=Math.max(...data.map(d=>d.v));if(maxV===minV)maxV=minV+1;
let xMin=data[0].x,xMax=data[data.length-1].x;if(xMax===xMin)xMax=xMin+1;
ctx2.strokeStyle='#2a2a2d';ctx2.lineWidth=0.5;let zeroY=H2-((0-minV)/(maxV-minV))*(H2-20)-10;
ctx2.beginPath();ctx2.moveTo(0,zeroY);ctx2.lineTo(W,zeroY);ctx2.stroke();
ctx2.beginPath();ctx2.strokeStyle='#ff6b35';ctx2.lineWidth=2;
data.forEach((d,i)=>{let px=(d.x-xMin)/(xMax-xMin)*W,py=H2-((d.v-minV)/(maxV-minV))*(H2-20)-10;i===0?ctx2.moveTo(px,py):ctx2.lineTo(px,py)});ctx2.stroke()}
document.getElementById('sf').onchange=calcVolumes;draw()
</script></body></html>
