<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TaskIAP Studio 🎹</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a14;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;overflow:hidden}
body{display:flex;flex-direction:column;height:100vh}

h1{text-align:center;padding:6px;font-size:1.1rem;background:linear-gradient(135deg,#ff6ec4,#7873f5,#4ade80);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.04em}

/* Layout */
.main{display:grid;grid-template-columns:1fr 180px;grid-template-rows:auto auto 1fr;gap:6px;padding:6px;flex:1;overflow:hidden;max-height:calc(100vh - 40px)}
.beat-section{grid-column:1/2;grid-row:1}
.effects-section{grid-column:1/2;grid-row:2}
.instruments-section{grid-column:1/2;grid-row:3}
.sidebar{grid-column:2/3;grid-row:1/4;overflow-y:auto}

/* Sections */
.sidebar{overflow-y:auto;max-height:100%}
.section{background:#12121e;border:1px solid #2a2a3d;border-radius:8px;padding:8px;margin-bottom:6px}
.section-title{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#7873f5;margin-bottom:8px}

/* Beat Machine */
.beat-controls{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.beat-controls button{background:#1e1e2e;border:1px solid #3a3a5d;color:#e0e0e0;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-weight:600}
.beat-controls button:hover{border-color:#7873f5}
.beat-controls button.active{background:#7873f5;border-color:#7873f5;color:#fff}
.tempo-group{display:flex;align-items:center;gap:6px;font-size:0.7rem;color:#888}
.tempo-group input[type=range]{width:80px;accent-color:#7873f5}

.grid-container{overflow-x:auto}
.seq-grid{display:grid;grid-template-columns:60px repeat(16,1fr);gap:2px;min-width:500px}
.seq-label{font-size:0.65rem;color:#888;display:flex;align-items:center;padding-right:4px}
.seq-cell{aspect-ratio:1;background:#1a1a2a;border-radius:4px;cursor:pointer;transition:background 0.1s;min-width:20px}
.seq-cell.on{background:#4ade80}
.seq-cell.playhead{box-shadow:inset 0 0 0 2px #ff6ec4}
.seq-cell.on.playhead{background:#ff6ec4}

/* Effects */
.effects-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fx-btn{background:#1e1e2e;border:1px solid #3a3a5d;color:#aaa;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:0.68rem;font-weight:600}
.fx-btn.active{background:#ff6ec4;border-color:#ff6ec4;color:#fff}
.filter-group{display:flex;align-items:center;gap:4px;font-size:0.65rem;color:#888}
.filter-group input{width:80px;accent-color:#ff6ec4}

/* Instruments & Recording */
.inst-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.inst-row select{background:#1a1a2a;border:1px solid #3a3a5d;color:#e0e0e0;padding:5px 8px;border-radius:6px;font-size:0.75rem}
.rec-btn{background:#c0392b;border:none;color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:600}
.rec-btn.recording{animation:pulse 0.8s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:0.5}}
.play-rec-btn{background:#1e1e2e;border:1px solid #3a3a5d;color:#e0e0e0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:0.7rem}

.tracks-display{margin-top:6px;display:flex;gap:4px}
.track-bar{height:16px;flex:1;background:#1a1a2a;border-radius:3px;position:relative;overflow:hidden}
.track-bar.has-data{background:#1e2e1e;border:1px solid #4ade80}
.track-bar span{font-size:0.55rem;position:absolute;left:4px;top:2px;color:#888}

/* Voiceover */
.voice-section{margin-top:8px}
.voice-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.voice-row input[type=text]{flex:1;min-width:100px;background:#1a1a2a;border:1px solid #3a3a5d;color:#e0e0e0;padding:5px 8px;border-radius:6px;font-size:0.72rem}
.voice-row button{background:#1e1e2e;border:1px solid #3a3a5d;color:#e0e0e0;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:0.7rem}
.voice-sliders{display:flex;gap:10px;font-size:0.6rem;color:#888;align-items:center}
.voice-sliders input{width:60px;accent-color:#facc15}

/* Sidebar - Premade Songs */
.song-btn{display:block;width:100%;background:#1a1a2a;border:1px solid #2a2a3d;color:#e0e0e0;padding:8px;border-radius:6px;cursor:pointer;text-align:left;margin-bottom:4px;font-size:0.68rem;transition:border-color 0.2s}
.song-btn:hover{border-color:#4ade80}
.song-btn .song-name{font-weight:700;color:#fff}
.song-btn .song-desc{color:#666;font-size:0.6rem;margin-top:2px}

/* Piano */
.piano-container{background:#12121e;border-top:1px solid #2a2a3d;padding:10px;position:sticky;bottom:0}
.piano{display:flex;justify-content:center;position:relative;height:120px;max-width:700px;margin:0 auto;user-select:none}
.key{position:relative;cursor:pointer;border-radius:0 0 5px 5px;transition:background 0.05s}
.white-key{width:36px;height:120px;background:#f8f8f8;border:1px solid #333;margin-right:1px;z-index:1}
.white-key:active,.white-key.pressed{background:#7873f5}
.black-key{width:24px;height:75px;background:#222;border:1px solid #000;position:absolute;z-index:2;margin-left:-12px}
.black-key:active,.black-key.pressed{background:#ff6ec4}
.key-label{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:0.5rem;color:#666;pointer-events:none}

/* Mobile */
@media(max-width:700px){
  .main{grid-template-columns:1fr;grid-template-rows:auto auto auto auto}
  .sidebar{grid-column:1;grid-row:4}
  .piano .white-key{width:28px;height:90px}
  .piano .black-key{width:18px;height:55px;margin-left:-9px}
}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>
<h1>TaskIAP Studio 🎹</h1>

<div class="main">
  <!-- Beat Machine -->
  <div class="section beat-section">
    <div class="section-title">Beat Machine</div>
    <div class="beat-controls">
      <button id="beatPlayBtn" onclick="toggleBeat()">▶ Play</button>
      <div class="tempo-group">
        <span>BPM:</span>
        <input type="range" id="tempoSlider" min="60" max="180" value="120" oninput="setTempo(this.value)">
        <span id="tempoVal">120</span>
      </div>
    </div>
    <div class="grid-container">
      <div class="seq-grid" id="seqGrid"></div>
    </div>
  </div>

  <!-- Effects -->
  <div class="section effects-section">
    <div class="section-title">Effects</div>
    <div class="effects-row">
      <button class="fx-btn" id="fxReverb" onclick="toggleFx('reverb')">Reverb</button>
      <button class="fx-btn" id="fxDelay" onclick="toggleFx('delay')">Delay</button>
      <button class="fx-btn" id="fxDist" onclick="toggleFx('distortion')">Distortion</button>
      <div class="filter-group">
        <span>Filter:</span>
        <input type="range" id="filterSlider" min="100" max="8000" value="8000" oninput="setFilter(this.value)">
      </div>
    </div>
  </div>

  <!-- Instruments & Recording & Voiceover -->
  <div class="section instruments-section">
    <div class="section-title">Instrument & Recording</div>
    <div class="inst-row">
      <select id="instSelect" onchange="changeInstrument()">
        <option value="piano">Piano</option>
        <option value="epiano">Electric Piano</option>
        <option value="bass">Bass</option>
        <option value="strings">Strings</option>
        <option value="organ">Organ</option>
        <option value="lead">Synth Lead</option>
        <option value="8bit">8-bit</option>
        <option value="pluck">Pluck</option>
      </select>
      <button class="rec-btn" id="recBtn" onclick="toggleRecord()">⏺ REC</button>
      <button class="play-rec-btn" onclick="playRecording()">▶ Play Rec</button>
      <button class="play-rec-btn" onclick="clearRecordings()">✕ Clear</button>
    </div>
    <div class="tracks-display" id="tracksDisplay">
      <div class="track-bar"><span>Track 1</span></div>
      <div class="track-bar"><span>Track 2</span></div>
      <div class="track-bar"><span>Track 3</span></div>
      <div class="track-bar"><span>Track 4</span></div>
    </div>

    <div class="voice-section">
      <div class="section-title">Voiceover</div>
      <div class="voice-row">
        <input type="text" id="voiceText" placeholder="Type text to speak or sing...">
        <button onclick="speakText()">Speak</button>
        <button onclick="singText()">Sing</button>
      </div>
      <div class="voice-sliders">
        <span>Pitch:</span><input type="range" id="voicePitch" min="0.5" max="2" step="0.1" value="1">
        <span>Rate:</span><input type="range" id="voiceRate" min="0.3" max="2" step="0.1" value="1">
      </div>
    </div>
  </div>

  <!-- Sidebar: Premade Songs -->
  <div class="section sidebar">
    <div class="section-title">Genre Demos</div>
    <button class="song-btn" onclick="loadSong('jazz')"><div class="song-name">🎷 Jazz</div><div class="song-desc">Walking bass, swing</div></button>
    <button class="song-btn" onclick="loadSong('rock')"><div class="song-name">🎸 Rock</div><div class="song-desc">Power chords, driving</div></button>
    <button class="song-btn" onclick="loadSong('edm')"><div class="song-name">🎧 EDM</div><div class="song-desc">Four-on-floor, synth arp</div></button>
    <button class="song-btn" onclick="loadSong('hiphop')"><div class="song-name">🎤 Hip Hop</div><div class="song-desc">Boom-bap, 808</div></button>
    <button class="song-btn" onclick="loadSong('classical')"><div class="song-name">🎻 Classical</div><div class="song-desc">Waltz, legato strings</div></button>
    <button class="song-btn" onclick="loadSong('reggae')"><div class="song-name">🌴 Reggae</div><div class="song-desc">Offbeat skank</div></button>
    <button class="song-btn" onclick="loadSong('blues')"><div class="song-name">🎺 Blues</div><div class="song-desc">Shuffle, pentatonic</div></button>
    <button class="song-btn" onclick="loadSong('lofi')"><div class="song-name">☕ Lofi</div><div class="song-desc">Lazy beats, warm</div></button>
    <button class="song-btn" onclick="loadSong('funk')"><div class="song-name">🕺 Funk</div><div class="song-desc">Slap bass, groove</div></button>
    <button class="song-btn" onclick="loadSong('ambient')"><div class="song-name">🌊 Ambient</div><div class="song-desc">Dreamy pads</div></button>
    <button class="song-btn" onclick="loadSong('disco')"><div class="song-name">🪩 Disco</div><div class="song-desc">Dancey, sparkly</div></button>
    <button class="song-btn" onclick="loadSong('country')"><div class="song-name">🤠 Country</div><div class="song-desc">Twangy plucks</div></button>
    <button class="song-btn" onclick="loadSong('metal')"><div class="song-name">🤘 Metal</div><div class="song-desc">Fast, aggressive</div></button>
    <button class="song-btn" onclick="loadSong('bossa')"><div class="song-name">🌴 Bossa</div><div class="song-desc">Smooth, Brazilian</div></button>
    <button class="song-btn" onclick="loadSong('trap')"><div class="song-name">💎 Trap</div><div class="song-desc">808 bass, hi-hats</div></button>
    <button class="song-btn" onclick="loadSong('waltz')"><div class="song-name">💃 Waltz</div><div class="song-desc">3/4 elegant</div></button>
  </div>
</div>

<!-- Piano Keyboard -->
<div class="piano-container">
  <div class="piano" id="piano"></div>
</div>

<script>
// ===== AUDIO SETUP =====
let audioStarted = false;
async function ensureAudio(){
  if(!audioStarted){await Tone.start();audioStarted=true}
}

// Effects chain
const reverb = new Tone.Reverb({decay:2.5,wet:0}).toDestination();
const delay = new Tone.FeedbackDelay({delayTime:"8n",feedback:0.3,wet:0}).connect(reverb);
const distortion = new Tone.Distortion({distortion:0.4,wet:0}).connect(delay);
const filter = new Tone.Filter({frequency:8000,type:"lowpass"}).connect(distortion);

let fxState = {reverb:false,delay:false,distortion:false};

function toggleFx(name){
  fxState[name]=!fxState[name];
  if(name==='reverb'){reverb.wet.value=fxState.reverb?0.5:0;document.getElementById('fxReverb').classList.toggle('active')}
  if(name==='delay'){delay.wet.value=fxState.delay?0.4:0;document.getElementById('fxDelay').classList.toggle('active')}
  if(name==='distortion'){distortion.wet.value=fxState.distortion?0.6:0;document.getElementById('fxDist').classList.toggle('active')}
}
function setFilter(v){filter.frequency.value=parseFloat(v)}

// ===== INSTRUMENTS =====
let currentInstrument = null;
let currentInstName = 'piano';

function makeInstrument(name){
  switch(name){
    case 'piano': return new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:0.005,decay:0.3,sustain:0.2,release:0.8}}).connect(filter);
    case 'epiano': return new Tone.FMSynth({modulationIndex:3,envelope:{attack:0.01,decay:0.4,sustain:0.3,release:1}}).connect(filter);
    case 'bass': return new Tone.MonoSynth({oscillator:{type:'square'},envelope:{attack:0.02,decay:0.3,sustain:0.6,release:0.5},filterEnvelope:{attack:0.02,decay:0.1,sustain:0.5,release:0.5,baseFrequency:200,octaves:2}}).connect(filter);
    case 'strings': return new Tone.PolySynth(Tone.Synth,{oscillator:{type:'sawtooth'},envelope:{attack:0.4,decay:0.5,sustain:0.8,release:1.5}}).connect(filter);
    case 'organ': return new Tone.AMSynth({envelope:{attack:0.01,decay:0.2,sustain:0.8,release:0.3}}).connect(filter);
    case 'lead': return new Tone.Synth({oscillator:{type:'sawtooth'},envelope:{attack:0.01,decay:0.2,sustain:0.5,release:0.4}}).connect(filter);
    case '8bit': return new Tone.Synth({oscillator:{type:'square'},envelope:{attack:0.001,decay:0.1,sustain:0.1,release:0.1}}).connect(filter);
    case 'pluck': return new Tone.PluckSynth({resonance:0.9}).connect(filter);
  }
}

function changeInstrument(){
  const name = document.getElementById('instSelect').value;
  currentInstName = name;
  if(currentInstrument) currentInstrument.dispose();
  currentInstrument = makeInstrument(name);
}
changeInstrument();

function playNote(note, dur){
  ensureAudio();
  if(currentInstName==='pluck'){
    currentInstrument.triggerAttack(note, Tone.now());
  } else if(currentInstName==='strings'){
    currentInstrument.triggerAttackRelease([note], dur||'8n');
  } else {
    currentInstrument.triggerAttackRelease(note, dur||'8n');
  }
}

// ===== DRUM SOUNDS =====
const kick = new Tone.MembraneSynth({pitchDecay:0.05,octaves:6,envelope:{attack:0.001,decay:0.3,sustain:0,release:0.3}}).toDestination();
const snare = new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:0.001,decay:0.15,sustain:0,release:0.1}}).toDestination();
const hihat = new Tone.NoiseSynth({noise:{type:'brown'},envelope:{attack:0.001,decay:0.05,sustain:0,release:0.02}}).toDestination();
const clap = new Tone.NoiseSynth({noise:{type:'pink'},envelope:{attack:0.001,decay:0.12,sustain:0,release:0.08}}).toDestination();

// ===== BEAT MACHINE =====
const drumNames = ['Kick','Snare','Hi-hat','Clap'];
let grid = [[],[],[],[]];
for(let i=0;i<4;i++) for(let j=0;j<16;j++) grid[i][j]=0;

let beatPlaying = false;
let currentStep = 0;
let beatInterval = null;

function buildGrid(){
  const el = document.getElementById('seqGrid');
  el.innerHTML='';
  for(let r=0;r<4;r++){
    const lbl=document.createElement('div');lbl.className='seq-label';lbl.textContent=drumNames[r];el.appendChild(lbl);
    for(let c=0;c<16;c++){
      const cell=document.createElement('div');cell.className='seq-cell';
      cell.dataset.row=r;cell.dataset.col=c;
      if(grid[r][c]) cell.classList.add('on');
      cell.addEventListener('click',()=>{grid[r][c]=grid[r][c]?0:1;cell.classList.toggle('on')});
      el.appendChild(cell);
    }
  }
}
buildGrid();

function setTempo(v){
  document.getElementById('tempoVal').textContent=v;
  Tone.Transport.bpm.value=parseInt(v);
  if(beatPlaying){stopBeat();startBeat()}
}

function toggleBeat(){
  ensureAudio();
  if(beatPlaying){stopBeat()}else{startBeat()}
}

function startBeat(){
  beatPlaying=true;
  currentStep=0;
  const btn=document.getElementById('beatPlayBtn');
  btn.textContent='■ Stop';btn.classList.add('active');
  const bpm=parseInt(document.getElementById('tempoSlider').value);
  const stepTime=()=>60000/bpm/4;
  function tick(){
    const cells=document.querySelectorAll('.seq-cell');
    cells.forEach(c=>c.classList.remove('playhead'));
    for(let r=0;r<4;r++){
      const idx=r*16+currentStep;
      cells[idx].classList.add('playhead');
      if(grid[r][currentStep]){
        if(r===0) kick.triggerAttackRelease('C1','8n');
        else if(r===1) snare.triggerAttackRelease('8n');
        else if(r===2) hihat.triggerAttackRelease('32n');
        else clap.triggerAttackRelease('16n');
      }
    }
    currentStep=(currentStep+1)%16;
    beatInterval=setTimeout(tick,stepTime());
  }
  tick();
}

function stopBeat(){
  beatPlaying=false;
  clearTimeout(beatInterval);
  const btn=document.getElementById('beatPlayBtn');
  btn.textContent='▶ Play';btn.classList.remove('active');
  document.querySelectorAll('.seq-cell').forEach(c=>c.classList.remove('playhead'));
}

// ===== PIANO KEYBOARD =====
const notes2oct=['C3','C#3','D3','D#3','E3','F3','F#3','G3','G#3','A3','A#3','B3',
                 'C4','C#4','D4','D#4','E4','F4','F#4','G4','G#4','A4','A#4','B4'];
const whiteNotes=['C3','D3','E3','F3','G3','A3','B3','C4','D4','E4','F4','G4','A4','B4'];
const blackNotes=['C#3','D#3','F#3','G#3','A#3','C#4','D#4','F#4','G#4','A#4'];

function buildPiano(){
  const piano=document.getElementById('piano');
  piano.innerHTML='';
  const whiteKeyPositions=[];
  let wIdx=0;
  // Build white keys
  whiteNotes.forEach((note,i)=>{
    const key=document.createElement('div');
    key.className='key white-key';
    key.dataset.note=note;
    const lbl=document.createElement('div');lbl.className='key-label';lbl.textContent=note.replace('#','');
    key.appendChild(lbl);
    piano.appendChild(key);
    key.addEventListener('mousedown',e=>{e.preventDefault();keyOn(note,key)});
    key.addEventListener('mouseup',()=>keyOff(note,key));
    key.addEventListener('mouseleave',()=>keyOff(note,key));
    key.addEventListener('touchstart',e=>{e.preventDefault();keyOn(note,key)},{passive:false});
    key.addEventListener('touchend',()=>keyOff(note,key));
  });
  // Black keys positioned absolutely
  // Figure out positions of white keys
  const whiteKeys=piano.querySelectorAll('.white-key');
  const blackPattern=[1,1,0,1,1,1,0]; // C#, D#, skip, F#, G#, A#, skip (per octave)
  const blackNoteList=['C#3','D#3','F#3','G#3','A#3','C#4','D#4','F#4','G#4','A#4'];
  // Position: after white key index 0,1, 3,4,5, 7,8, 10,11,12
  const blackAfterWhite=[0,1,3,4,5,7,8,10,11,12];
  blackNoteList.forEach((note,i)=>{
    const key=document.createElement('div');
    key.className='key black-key';
    key.dataset.note=note;
    const wk=whiteKeys[blackAfterWhite[i]];
    const leftPos=wk.offsetLeft+wk.offsetWidth-12;
    key.style.left=leftPos+'px';
    piano.appendChild(key);
    key.addEventListener('mousedown',e=>{e.preventDefault();keyOn(note,key)});
    key.addEventListener('mouseup',()=>keyOff(note,key));
    key.addEventListener('mouseleave',()=>keyOff(note,key));
    key.addEventListener('touchstart',e=>{e.preventDefault();keyOn(note,key)},{passive:false});
    key.addEventListener('touchend',()=>keyOff(note,key));
  });
}

let activeNotes={};
function keyOn(note,el){
  ensureAudio();
  if(activeNotes[note]) return;
  activeNotes[note]=Date.now();
  el.classList.add('pressed');
  playNote(note);
  if(isRecording) recordNote(note);
}
function keyOff(note,el){
  el.classList.remove('pressed');
  if(activeNotes[note] && isRecording){
    const dur=Date.now()-activeNotes[note];
    const last=recordings[currentTrack][recordings[currentTrack].length-1];
    if(last && last.note===note && !last.duration) last.duration=dur;
  }
  delete activeNotes[note];
}

// Computer keyboard mapping
const keyMap={
  'a':'C3','w':'C#3','s':'D3','e':'D#3','d':'E3','f':'F3','t':'F#3',
  'g':'G3','y':'G#3','h':'A3','u':'A#3','j':'B3','k':'C4','o':'C#4',
  'l':'D4','p':'D#4'
};
const keyPressed={};
document.addEventListener('keydown',e=>{
  if(e.repeat||e.target.tagName==='INPUT') return;
  const note=keyMap[e.key.toLowerCase()];
  if(note && !keyPressed[e.key]){
    keyPressed[e.key]=true;
    const el=document.querySelector(`.key[data-note="${note}"]`);
    if(el) keyOn(note,el);
  }
});
document.addEventListener('keyup',e=>{
  const note=keyMap[e.key.toLowerCase()];
  if(note){
    keyPressed[e.key]=false;
    const el=document.querySelector(`.key[data-note="${note}"]`);
    if(el) keyOff(note,el);
  }
});

// Build piano after DOM ready
setTimeout(buildPiano,50);
window.addEventListener('resize',buildPiano);

// ===== RECORDING =====
let isRecording=false;
let recordings=[[],[],[],[]];
let currentTrack=0;
let recStartTime=0;

function toggleRecord(){
  ensureAudio();
  const btn=document.getElementById('recBtn');
  if(!isRecording){
    // Find next empty track
    for(let i=0;i<4;i++){if(recordings[i].length===0){currentTrack=i;break}}
    isRecording=true;
    recStartTime=Date.now();
    btn.classList.add('recording');btn.textContent='■ STOP';
  } else {
    isRecording=false;
    btn.classList.remove('recording');btn.textContent='⏺ REC';
    updateTracksDisplay();
  }
}

function recordNote(note){
  recordings[currentTrack].push({note,time:Date.now()-recStartTime,duration:0});
}

function playRecording(){
  ensureAudio();
  recordings.forEach(track=>{
    track.forEach(ev=>{
      setTimeout(()=>{
        playNote(ev.note, Math.max(ev.duration||200,50)+'ms');
        // Highlight key
        const el=document.querySelector(`.key[data-note="${ev.note}"]`);
        if(el){el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),Math.min(ev.duration||200,300))}
      },ev.time);
    });
  });
}

function clearRecordings(){
  recordings=[[],[],[],[]];
  updateTracksDisplay();
}

function updateTracksDisplay(){
  const bars=document.querySelectorAll('.track-bar');
  bars.forEach((bar,i)=>{
    if(recordings[i].length>0) bar.classList.add('has-data');
    else bar.classList.remove('has-data');
  });
}

// ===== VOICEOVER =====
function speakText(){
  const text=document.getElementById('voiceText').value;
  if(!text) return;
  const utter=new SpeechSynthesisUtterance(text);
  utter.pitch=parseFloat(document.getElementById('voicePitch').value);
  utter.rate=parseFloat(document.getElementById('voiceRate').value);
  speechSynthesis.speak(utter);
}

function singText(){
  ensureAudio();
  const text=document.getElementById('voiceText').value;
  if(!text) return;
  const syllables=text.split(/[\s]+/);
  const melodyNotes=['C4','D4','E4','F4','G4','A4','B4','C5'];
  syllables.forEach((syl,i)=>{
    setTimeout(()=>{
      const note=melodyNotes[i%melodyNotes.length];
      playNote(note,'4n');
      const utter=new SpeechSynthesisUtterance(syl);
      utter.pitch=0.8+(i%8)*0.15;
      utter.rate=1.2;
      speechSynthesis.speak(utter);
    },i*400);
  });
}

let songMelodyTimeout=[];

function loadSong(name){
  ensureAudio();
  const song=songs[name];
  if(!song) return;

  // Stop anything playing
  stopBeat();
  songMelodyTimeout.forEach(t=>clearTimeout(t));
  songMelodyTimeout=[];

  // Set tempo
  document.getElementById('tempoSlider').value=song.tempo;
  document.getElementById('tempoVal').textContent=song.tempo;

  // Set instrument
  document.getElementById('instSelect').value=song.instrument;
  changeInstrument();

  // Set grid
  for(let r=0;r<4;r++) for(let c=0;c<16;c++) grid[r][c]=song.grid[r][c];
  buildGrid();

  // Start beat
  startBeat();

  // Play melody
  const bpm=song.tempo;
  const stepMs=60000/bpm/4;
  song.melody.forEach((note,i)=>{
    const t=setTimeout(()=>{
      playNote(note,'8n');
      const el=document.querySelector(`.key[data-note="${note}"]`);
      if(el){el.classList.add('pressed');setTimeout(()=>el.classList.remove('pressed'),150)}
    },i*stepMs*2);
    songMelodyTimeout.push(t);
  });
}
