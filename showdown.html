// ==================== TTS ====================
var lastSpoke=0,GAP=2500;
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastSpoke<GAP)return;
    lastSpoke=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=1.1;u.pitch=0.85;u.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var v=null;
          for(var i=0;i<voices.length;i++){
            if(voices[i].lang&&voices[i].lang.indexOf('en')===0){v=voices[i];break;}
          }
          if(v)u.voice=v;
        }
        speechSynthesis.speak(u);
      }catch(e){}
    },60);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// ==================== AUDIO ====================
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;try{
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=Math.min(vol||0.02,0.02);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);}catch(e){}
}
function playNoise(dur,vol){
  if(!audioCtx)return;try{
  var bufSize=audioCtx.sampleRate*dur,buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);
  var src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  src.buffer=buf;g.gain.value=Math.min(vol||0.02,0.02);
  src.connect(g);g.connect(audioCtx.destination);
  src.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxPunch(){playNoise(0.08,0.02);playTone(300,0.06,'square',0.015);}
function sfxKick(){playNoise(0.12,0.02);playTone(150,0.1,'square',0.015);}
function sfxBlock(){playTone(800,0.05,'sine',0.015);playTone(1200,0.05,'sine',0.01);}
function sfxSpecial(){playTone(400,0.15,'sawtooth',0.015);playTone(600,0.15,'sawtooth',0.012);playTone(800,0.15,'sawtooth',0.01);}
function sfxKO(){playTone(100,0.5,'sawtooth',0.02);playTone(80,0.6,'square',0.015);}
function sfxGong(){playTone(220,0.6,'sine',0.02);playTone(330,0.4,'sine',0.015);playTone(440,0.3,'sine',0.01);}

// Background music
var bgmInterval=null;
function startBGM(){
  if(bgmInterval)return;
  var beat=0;
  bgmInterval=setInterval(function(){
    if(!audioCtx)return;
    var b=beat%8;
    if(b===0||b===4)playTone(60,0.08,'square',0.012);
    if(b%2===0)playNoise(0.03,0.008);
    if(b===2||b===6)playTone(55,0.06,'square',0.008);
    beat++;
  },150);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}

function loadStats(){try{return JSON.parse(localStorage.getItem('tvshowdown-stats'))||{};}catch(e){return {};}}
function saveStats(id,won){
  var s=loadStats();
  if(!s[id])s[id]={w:0,l:0};
  if(won)s[id].w++;else s[id].l++;
  try{localStorage.setItem('tvshowdown-stats',JSON.stringify(s));}catch(e){}

ctx=canvas.getContext('2d');

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  SCALE=Math.min(W/800,H/500);
  FLOOR_Y=H*0.78;
}
window.addEventListener('resize',resize);
resize();

// ==================== SCREENS ====================
function showScreen(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById(name);
  if(el)el.classList.add('active');
  document.getElementById('homeLink').style.opacity=(name==='titleScreen'||name==='charSelect')?'1':'0';
  document.getElementById('homeLink').style.pointerEvents=(name==='titleScreen'||name==='charSelect')?'auto':'none';
}

function showCharSelect(){
  initAudio();
  gameState='select';selectedChar=null;
  showScreen('charSelect');
  document.getElementById('controls').style.display='none';
  document.getElementById('fightBtn').style.display='none';
  document.getElementById('charBio').style.display='none';
  buildGrid();
  stopBGM();
}

function buildGrid(){
  var g=document.getElementById('charGrid');g.innerHTML='';
  CHARS.forEach(function(c,i){
    var d=document.createElement('div');d.className='char-card';
    d.innerHTML='<span class="emoji">'+c.emoji+'</span><span class="cname">'+c.name+'</span><span class="cshow">'+c.show+'</span>';
    d.onclick=function(){selectChar(i);};
    g.appendChild(d);
  });
}

function selectChar(i){
  selectedChar=i;
  var c=CHARS[i];
  document.querySelectorAll('.char-card').forEach(function(el,j){el.classList.toggle('sel',j===i);});
  var bio=document.getElementById('charBio');
  bio.style.display='block';
  bio.querySelector('.bio-name').textContent=c.name+' '+c.emoji;
  bio.querySelector('.bio-line').textContent=c.bio;
  bio.querySelector('.bio-special').textContent='⚡ Special: '+c.specialName;
  document.getElementById('fightBtn').style.display='block';
  if(charSelectLines[c.id])speak(charSelectLines[c.id]);
}

function setDiff(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach(function(b){b.classList.toggle('sel',parseInt(b.dataset.d)===d);});
}

// ==================== FIGHTER CREATION ====================
function createFighter(charData,x,facing){
  return{
    char:charData,x:x,y:FLOOR_Y,vy:0,facing:facing,
    hp:100,maxHp:100,meter:0,
    state:'idle',stateTimer:0,
    attackFrame:0,attackDur:0,attackType:null,
    hitDealt:false,
    blockTimer:0,stunTimer:0,
    crouching:false,grounded:true,
    speedBoostTimer:0,counterActive:false,
    width:40*SCALE,height:90*SCALE,
    flashTimer:0,
    wins:0
  };
}

// ==================== START GAME ====================
function startGame(){
  if(selectedChar===null)return;
  initAudio();
  gameState='fight';
  showScreen(null);
  document.getElementById('controls').style.display='block';
  // Pick random opponent different from player
  var aiIdx;
  do{aiIdx=Math.floor(Math.random()*CHARS.length);}while(aiIdx===selectedChar);
  p1=createFighter(CHARS[selectedChar],W*0.3,1);
  p2=createFighter(CHARS[aiIdx],W*0.7,-1);
  round=1;p1Rounds=0;p2Rounds=0;
  particles=[];projectiles=[];
  startRound();
}

function rematch(){
  if(!p1||!p2)return;
  gameState='fight';
  showScreen(null);
  document.getElementById('controls').style.display='block';
  p1.hp=100;p1.meter=0;p1.state='idle';p1.stateTimer=0;p1.stunTimer=0;p1.speedBoostTimer=0;p1.counterActive=false;
  p2.hp=100;p2.meter=0;p2.state='idle';p2.stateTimer=0;p2.stunTimer=0;p2.speedBoostTimer=0;p2.counterActive=false;
  round=1;p1Rounds=0;p2Rounds=0;
  particles=[];projectiles=[];
  p1.x=W*0.3;p2.x=W*0.7;p1.y=FLOOR_Y;p2.y=FLOOR_Y;
  startRound();
}

function startRound(){
  fightStarted=false;
  roundTimer=60*60; // 60 seconds at 60fps
  p1.hp=100;p1.meter=Math.min(p1.meter,50);p1.state='idle';p1.stateTimer=0;p1.stunTimer=0;p1.crouching=false;p1.speedBoostTimer=0;p1.counterActive=false;
  p2.hp=100;p2.meter=Math.min(p2.meter,50);p2.state='idle';p2.stateTimer=0;p2.stunTimer=0;p2.crouching=false;p2.speedBoostTimer=0;p2.counterActive=false;
  p1.x=W*0.3;p2.x=W*0.7;
  p1.y=FLOOR_Y;p2.y=FLOOR_Y;p1.vy=0;p2.vy=0;
  particles=[];projectiles=[];
  showBanner('ROUND '+round+'!',90);
  sfxGong();
  if(round===1){
    var intros=[
      p1.char.name+' versus '+p2.char.name+'! This is going to be ugly!',
      p1.char.name+' vs '+p2.char.name+'! A matchup for the ages! Or at least for Wednesday night!',
      'It\'s '+p1.char.name+' against '+p2.char.name+'! Neither asked for this! Both are here anyway!',
      p1.char.name+' faces '+p2.char.name+'! This is the crossover episode your therapist warned you about!'
    ];
    speak(intros[Math.floor(Math.random()*intros.length)]);
  }else{
    var roundLines=['Round '+round+'! Fight!','Round '+round+'! They\'re back for more punishment!','Round '+round+'! The rematch nobody deserves!'];
    speak(roundLines[Math.floor(Math.random()*roundLines.length)]);
  }
  setTimeout(function(){fightStarted=true;startBGM();},1500);
}

function showBanner(text,dur){
  bannerText=text;bannerTimer=dur||90;
  var el=document.getElementById('roundBanner');
  el.textContent=text;el.style.display='block';
  setTimeout(function(){el.style.display='none';},dur*16.67);
}

function showCommentary(text,dur){
  commentaryText=text;commentaryTimer=dur||180;
  var el=document.getElementById('commentary');
  el.textContent=text;el.style.display='block';
  setTimeout(function(){el.style.display='none';},(dur||180)*16.67);
}

function getCommentary(winner,loser){
  var allPools=[betweenRoundLines,crossoverLines,funnyFacts];
  var pool=allPools[Math.floor(Math.random()*allPools.length)];
  var line=pool[Math.floor(Math.random()*pool.length)];
  return line.replace(/{w}/g,winner).replace(/{l}/g,loser);
}

var lastFightNarration=0;
function maybeFightNarrate(){
  var now=Date.now();
  if(now-lastFightNarration<8000)return;
  if(Math.random()>0.3)return;
  lastFightNarration=now;
  // Check for low health
  if(p1&&p1.hp<25&&p1.hp>0){
    var line=lowHealthLines[Math.floor(Math.random()*lowHealthLines.length)].replace(/{name}/g,p1.char.name);
    showCommentary(line,180);speak(line);return;
  }
  if(p2&&p2.hp<25&&p2.hp>0){
    var line=lowHealthLines[Math.floor(Math.random()*lowHealthLines.length)].replace(/{name}/g,p2.char.name);
    showCommentary(line,180);speak(line);return;
  }
  var line=fightNarrationLines[Math.floor(Math.random()*fightNarrationLines.length)];
  showCommentary(line,120);speak(line);
}

// Touch controls
var touchDpad={left:false,right:false,up:false,down:false};
var touchBtns={punch:false,kick:false,special:false};
var prevTouchBtns={punch:false,kick:false,special:false};

function setupTouch(id,obj,key){
  var el=document.getElementById(id);
  el.addEventListener('touchstart',function(e){e.preventDefault();obj[key]=true;initAudio();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();obj[key]=false;},{passive:false});
  el.addEventListener('touchcancel',function(e){obj[key]=false;});
  el.addEventListener('mousedown',function(e){e.preventDefault();obj[key]=true;initAudio();});
  el.addEventListener('mouseup',function(e){e.preventDefault();obj[key]=false;});
  el.addEventListener('mouseleave',function(e){obj[key]=false;});
}
setupTouch('dUp',touchDpad,'up');
setupTouch('dDown',touchDpad,'down');
setupTouch('dLeft',touchDpad,'left');
setupTouch('dRight',touchDpad,'right');
setupTouch('btnPunch',touchBtns,'punch');
setupTouch('btnKick',touchBtns,'kick');
setupTouch('btnSpecial',touchBtns,'special');

function updateTouchInput(){
  input.left=input.left||touchDpad.left;
  input.right=input.right||touchDpad.right;
  input.up=input.up||touchDpad.up;
  input.down=input.down||touchDpad.down;
  if(touchBtns.punch&&!prevTouchBtns.punch)input.punch=true;
  if(touchBtns.kick&&!prevTouchBtns.kick)input.kick=true;
  if(touchBtns.special&&!prevTouchBtns.special)input.special=true;
  prevTouchBtns.punch=touchBtns.punch;
  prevTouchBtns.kick=touchBtns.kick;
  prevTouchBtns.special=touchBtns.special;
}

// ==================== AI ====================
function updateAI(ai,target){
  if(!fightStarted||ai.stunTimer>0)return;
  var dx=target.x-ai.x;
  var dist=Math.abs(dx);
  var dirToTarget=dx>0?1:-1;
  // Difficulty settings
  var reactChance=[0.01,0.03,0.06][difficulty];
  var blockChance=[0.05,0.2,0.5][difficulty];
  var specialChance=[0.005,0.01,0.02][difficulty];
  var aggressiveness=[0.3,0.5,0.8][difficulty];

  // Reset walking state
  if(ai.state==='walking')ai.state='idle';

  // AI decision
  if(ai.state==='idle'){
    // Block incoming attacks
    if(target.state==='attacking'&&dist<120*SCALE&&Math.random()<blockChance){
      ai.facing=-dirToTarget; // face away to block
      return;
    }
    ai.facing=dirToTarget;
    // Use special if meter full
    if(ai.meter>=100&&Math.random()<specialChance*3){
      doAttack(ai,target,'special');
      return;
    }
    // Approach if far
    if(dist>100*SCALE){
      ai.x+=dirToTarget*ai.char.speed*SCALE*0.5*(ai.speedBoostTimer>0?2:1);
      ai.state='walking';
    }else if(dist>50*SCALE){
      // Attack range
      if(Math.random()<reactChance*aggressiveness){
        doAttack(ai,target,Math.random()>0.4?'punch':'kick');
      }else if(Math.random()<0.02){
        // Jump sometimes
        if(ai.grounded){ai.vy=-10*SCALE;ai.grounded=false;}
      }else{
        ai.x+=dirToTarget*ai.char.speed*SCALE*0.3*(ai.speedBoostTimer>0?2:1);
      }
    }else{
      // Too close, maybe retreat or attack
      if(Math.random()<reactChance*aggressiveness*1.5){
        doAttack(ai,target,Math.random()>0.5?'punch':'kick');
      }else if(Math.random()<0.03){
        ai.x-=dirToTarget*ai.char.speed*SCALE*0.5;
      }
    }
    // Random jump
    if(ai.grounded&&Math.random()<0.005)ai.vy=-10*SCALE;
    // Crouch to dodge sometimes (hard only)
    if(difficulty===2&&target.state==='attacking'&&!target.crouching&&Math.random()<0.1){
      ai.crouching=true;
      setTimeout(function(){ai.crouching=false;},500);
    }
  }
}

// ==================== ATTACKS ====================
function doAttack(fighter,target,type){
  if(fighter.state==='attacking'||fighter.stunTimer>0)return;
  if(type==='special'&&fighter.meter<100)return;
  fighter.state='attacking';
  fighter.attackType=type;
  fighter.hitDealt=false;
  fighter.attackFrame=0;
  if(type==='punch'){fighter.attackDur=15;}
  else if(type==='kick'){fighter.attackDur=22;}
  else if(type==='special'){
    fighter.attackDur=30;
    fighter.meter=0;
    sfxSpecial();
    var specialTaunts={
      johnny:['Sweep the leg!','This one\'s for the 80s!','Cobra Kai!'],
      daniel:['Wax on, wax off!','Miyagi-Do!','The best defense is a counter!'],
      kreese:['No mercy!','Strike first!','Pain does not exist in this dojo!'],
      phil:["I'm the cool dad!",'WOW! Did you see that?','Magic is REAL!','Check THIS out!'],
      gloria:['Ay! Jay!','Take my chancla!','Nobody escapes the chancla!','In Colombia, this is a compliment!'],
      luke:["I don't even know what happened!",'Was that good? That felt good.','Oops!'],
      lorelai:['I need coffee now!','Caffeine powers ACTIVATE!','I talk fast AND fight fast!'],
      emily:['I have a DAR meeting!','How disappointing.','I expected better. I always do.'],
      luked:['Aw jeez.','Here. Have some coffee.','I didn\'t want to do this!','This pot was fresh!'],
      frankie:['I am DONE! I am SO done!','You think THIS is bad? Try raising Axl!','MICHAEL HECK GET IN HERE!','I haven\'t slept since 2009!'],
      axl:['Boom! The Axman cometh!','Check out THESE guns!','Shirts are for losers!','AXL HECK IN THE HOUSE!'],
      sue:['I can do this! Sue Heck never gives up!','Positive energy!','I believe in MYSELF!','This is MY moment!'],
      jackson:['Meow.','Hiss!','Prrrrr... ATTACK!','*knocks your health off the table*','Mrow!']
    };
    var taunts=specialTaunts[fighter.char.id]||[fighter.char.specialLine];
    speak(taunts[Math.floor(Math.random()*taunts.length)]);
    handleSpecial(fighter,target);
  }
}

function handleSpecial(fighter,target){
  var id=fighter.char.id;
  if(id==='johnny'){
    // Crane Kick: big leap towards opponent
    fighter.vy=-14*SCALE;
    fighter.grounded=false;
  }else if(id==='daniel'){
    // Miyagi-Do Counter: auto-block next hit
    fighter.counterActive=true;
    setTimeout(function(){fighter.counterActive=false;},3000);
    spawnParticles(fighter.x,fighter.y-40*SCALE,'#88ccff',8);
  }else if(id==='kreese'){
    // Chokehold: grab if close
    // Handled in hit detection
  }else if(id==='phil'){
    // Magic Trick: teleport behind opponent
    spawnParticles(fighter.x,fighter.y-40*SCALE,'#aa88ff',6);
    fighter.x=target.x+(-target.facing)*80*SCALE;
    fighter.facing=target.x>fighter.x?1:-1;
    spawnParticles(fighter.x,fighter.y-40*SCALE,'#aa88ff',8);
  }else if(id==='gloria'){
    // Chancla Throw: projectile
    projectiles.push({
      x:fighter.x+fighter.facing*30*SCALE,
      y:fighter.y-50*SCALE,
      vx:fighter.facing*8*SCALE,
      vy:0,
      dmg:fighter.char.specialDmg,
      owner:fighter,
      life:120,
      type:'chancla'
    });
  }else if(id==='luke'){
    // Accidental Genius: random powerful move
    var effects=['bigPunch','teleport','speedUp'];
    var eff=effects[Math.floor(Math.random()*effects.length)];
    if(eff==='bigPunch'){
      // Just do extra damage - handled in hit
    }else if(eff==='teleport'){
      fighter.x=target.x+(-target.facing)*60*SCALE;
      spawnParticles(fighter.x,fighter.y-40*SCALE,'#66ff66',10);
    }else{
      fighter.speedBoostTimer=180;
    }
  }else if(id==='lorelai'){
    // Caffeine Rush: speed boost
    fighter.speedBoostTimer=180; // 3 seconds
    spawnParticles(fighter.x,fighter.y-60*SCALE,'#8b4513',10);
  }else if(id==='emily'){
    // Withering Disapproval: stun
    if(Math.abs(target.x-fighter.x)<200*SCALE){
      target.stunTimer=90; // 1.5 seconds
      target.state='idle';
      spawnParticles(target.x,target.y-60*SCALE,'#ff88ff',10);
    }
  }else if(id==='luked'){
    // Coffee Pot Smash: projectile
    projectiles.push({
      x:fighter.x+fighter.facing*30*SCALE,
      y:fighter.y-50*SCALE,
      vx:fighter.facing*7*SCALE,
      vy:-2*SCALE,
      dmg:fighter.char.specialDmg,
      owner:fighter,
      life:120,
      type:'coffeepot'
    });
  }else if(id==='frankie'){
    // Mom Meltdown: AoE scream — damages if within range, brief stun
    if(Math.abs(target.x-fighter.x)<180*SCALE){
      target.hp-=fighter.char.specialDmg;
      target.stunTimer=50;
      target.flashTimer=20;
      shakeTimer=20;
      spawnParticles(fighter.x,fighter.y-70*SCALE,'#ffaa44',15);
      spawnParticles(target.x,target.y-50*SCALE,'#ff4444',8);
    }
  }else if(id==='axl'){
    // Shirt Off Intimidation: speed boost + next punch does 3x damage
    fighter.speedBoostTimer=240;
    fighter.axlPoweredUp=true;
    spawnParticles(fighter.x,fighter.y-60*SCALE,'#ffcc00',12);
  }else if(id==='sue'){
    // Unstoppable Optimism: heal 20 HP + speed boost
    fighter.hp=Math.min(fighter.maxHp,fighter.hp+20);
    fighter.speedBoostTimer=120;
    spawnParticles(fighter.x,fighter.y-60*SCALE,'#ff88cc',15);
    spawnParticles(fighter.x,fighter.y-40*SCALE,'#ffcc00',8);
  }else if(id==='jackson'){
    // Nine Lives: teleport randomly + hit from above
    var side=Math.random()>0.5?1:-1;
    fighter.x=target.x+side*60*SCALE;
    fighter.y=FLOOR_Y-80*SCALE;
    fighter.vy=12*SCALE;
    fighter.grounded=false;
    spawnParticles(fighter.x,fighter.y,'#333',10);
    spawnParticles(target.x,target.y-60*SCALE,'#ffcc00',6);
    // Scratch attack on landing handled in update
    fighter.jacksonPounce=true;
  }
}

function checkHit(attacker,defender){
  if(attacker.hitDealt)return;
  var range,dmg;
  if(attacker.attackType==='punch'){range=55*SCALE;dmg=attacker.char.punchDmg;}
  else if(attacker.attackType==='kick'){range=75*SCALE;dmg=attacker.char.kickDmg;}
  else{range=70*SCALE;dmg=attacker.char.specialDmg;}

  var hitFrame=attacker.attackType==='punch'?5:8;
  if(attacker.attackType==='special')hitFrame=10;
  if(attacker.attackFrame<hitFrame)return;

  var dx=defender.x-attacker.x;
  var dist=Math.abs(dx);
  var dir=dx>0?1:-1;
  if(dir!==attacker.facing)return;
  if(dist>range)return;

  // Vertical check
  var dy=Math.abs((defender.y-45*SCALE)-(attacker.y-45*SCALE));
  if(dy>60*SCALE)return;

  // Crouch dodge high attacks
  if(defender.crouching&&!attacker.crouching&&attacker.attackType!=='kick')return;

  attacker.hitDealt=true;

  // Counter check (Daniel special)
  if(defender.counterActive){
    defender.counterActive=false;
    dmg=0;
    // Counter attack
    attacker.hp-=15;
    attacker.flashTimer=15;
    shakeTimer=10;
    spawnParticles(attacker.x,attacker.y-50*SCALE,'#88ccff',8);
    sfxPunch();
    speak('Countered!');
    defender.meter=Math.min(100,defender.meter+15);
    return;
  }

  // Block check: hold direction AWAY from opponent to block
  var isBlocking=false;
  if(defender===p1){
    // Opponent is to the right => hold left to block; opponent to left => hold right
    var oppDir=attacker.x>defender.x?1:-1;
    isBlocking=(input.left&&oppDir===1)||(input.right&&oppDir===-1);
  }else{
    // AI block: facing away from target means blocking
    var aiOppDir=dx>0?1:-1;
    isBlocking=defender.facing!==aiOppDir;
  }

  if(isBlocking&&defender.stunTimer<=0){
    dmg=Math.floor(dmg*0.25);
    sfxBlock();
    defender.meter=Math.min(100,defender.meter+15);
    spawnParticles(defender.x,defender.y-45*SCALE,'#aaaaff',4);
  }else{
    if(attacker.attackType==='punch')sfxPunch();
    else if(attacker.attackType==='kick')sfxKick();
    else sfxSpecial();
    // Knockback
    defender.x+=attacker.facing*15*SCALE;
  }

  // Kreese chokehold: sustained damage
  if(attacker.char.id==='kreese'&&attacker.attackType==='special'&&!isBlocking){
    defender.stunTimer=45;
    // Extra ticks
    var ticks=0;
    var interval=setInterval(function(){
      if(ticks>=3||defender.hp<=0){clearInterval(interval);return;}
      defender.hp-=5;defender.flashTimer=8;
      spawnParticles(defender.x,defender.y-50*SCALE,'#ff4444',3);
      ticks++;
    },300);
  }

  // Axl powered-up punch bonus
  if(attacker.char.id==='axl'&&attacker.axlPoweredUp&&attacker.attackType==='punch'){
    dmg*=3;attacker.axlPoweredUp=false;
    spawnParticles(defender.x,defender.y-50*SCALE,'#ffcc00',10);
  }
  defender.hp-=dmg;
  defender.flashTimer=15;
  shakeTimer=attacker.attackType==='special'?15:8;
  spawnParticles(defender.x+attacker.facing*(-10)*SCALE,defender.y-45*SCALE,'#ff6b35',attacker.attackType==='special'?10:5);

  attacker.meter=Math.min(100,attacker.meter+10);
  defender.meter=Math.min(100,defender.meter+5);

  if(defender.hp<=0)defender.hp=0;
}

// ==================== PARTICLES ====================
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    particles.push({
      x:x,y:y,
      vx:(Math.random()-0.5)*6*SCALE,
      vy:(Math.random()-0.5)*6*SCALE-2*SCALE,
      life:20+Math.random()*20,
      maxLife:40,
      color:color,
      size:3+Math.random()*4
    });
  }
}

// ==================== UPDATE ====================
function update(){
  if(gameState!=='fight')return;
  if(!p1||!p2)return;

  if(bannerTimer>0){bannerTimer--;if(!fightStarted)return;}

  // Input
  input.punch=false;input.kick=false;input.special=false;
  updateKeyboardInput();
  updateTouchInput();

  if(!fightStarted)return;

  // Round timer
  roundTimer--;
  if(roundTimer<=0){
    endRound(p1.hp>=p2.hp?p1:p2,p1.hp>=p2.hp?p2:p1);
    return;
  }

  // Update specials button glow
  document.getElementById('btnSpecial').classList.toggle('ready',p1.meter>=100);

  // Player 1 movement
  if(p1.stunTimer>0){p1.stunTimer--;}
  else{
    var spd=p1.char.speed*SCALE*(p1.speedBoostTimer>0?2:1);
    if(p1.state!=='attacking'){
      if(input.left)p1.x-=spd;
      if(input.right)p1.x+=spd;
      p1.crouching=input.down;
      if(input.up&&p1.grounded){p1.vy=-11*SCALE;p1.grounded=false;}
      // Auto-face opponent
      p1.facing=p2.x>p1.x?1:-1;
    }
    if(input.punch)doAttack(p1,p2,'punch');
    if(input.kick)doAttack(p1,p2,'kick');
    if(input.special)doAttack(p1,p2,'special');
  }

  // Player 2 AI
  if(p2.stunTimer>0){p2.stunTimer--;}
  else{updateAI(p2,p1);}

  // Physics for both
  [p1,p2].forEach(function(f){
    // Gravity
    if(!f.grounded){
      f.vy+=0.6*SCALE;
      f.y+=f.vy;
      if(f.y>=FLOOR_Y){
        f.y=FLOOR_Y;f.vy=0;f.grounded=true;
        if(f.jacksonPounce){
          f.jacksonPounce=false;
          var t=f===p1?p2:p1;
          if(Math.abs(f.x-t.x)<70*SCALE){
            t.hp-=f.char.specialDmg;t.flashTimer=15;shakeTimer=15;
            spawnParticles(t.x,t.y-50*SCALE,'#ffcc00',10);sfxPunch();
          }
        }
      }
    }
    // Bounds
    f.x=Math.max(30*SCALE,Math.min(W-30*SCALE,f.x));
    // Attack timer
    if(f.state==='attacking'){
      f.attackFrame++;
      if(f.attackFrame>=f.attackDur){f.state='idle';f.attackFrame=0;}
    }
    // Flash
    if(f.flashTimer>0)f.flashTimer--;
    // Speed boost
    if(f.speedBoostTimer>0)f.speedBoostTimer--;
  });

  // Prevent overlap
  var overlap=60*SCALE-Math.abs(p1.x-p2.x);
  if(overlap>0){
    var push=overlap/2;
    if(p1.x<p2.x){p1.x-=push;p2.x+=push;}
    else{p1.x+=push;p2.x-=push;}
  }

  // Hit detection
  if(p1.state==='attacking')checkHit(p1,p2);
  if(p2.state==='attacking')checkHit(p2,p1);

  // Projectiles
  for(var i=projectiles.length-1;i>=0;i--){
    var pr=projectiles[i];
    pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
    if(pr.life<=0){projectiles.splice(i,1);continue;}
    // Check hit
    var target=pr.owner===p1?p2:p1;
    if(Math.abs(pr.x-target.x)<40*SCALE&&Math.abs(pr.y-(target.y-45*SCALE))<50*SCALE){
      target.hp-=pr.dmg;target.flashTimer=15;shakeTimer=12;
      target.meter=Math.min(100,target.meter+5);
      pr.owner.meter=Math.min(100,pr.owner.meter+10);
      spawnParticles(pr.x,pr.y,'#ff6b35',8);
      sfxPunch();
      if(target.hp<0)target.hp=0;
      projectiles.splice(i,1);
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life--;
    if(pt.life<=0)particles.splice(i,1);
  }

  // Shake
  if(shakeTimer>0){
    shakeTimer--;
    shakeX=(Math.random()-0.5)*shakeTimer*0.8;
    shakeY=(Math.random()-0.5)*shakeTimer*0.8;
  }else{shakeX=0;shakeY=0;}

  // Mid-fight narration
  maybeFightNarrate();

  // KO check
  if(p1.hp<=0){endRound(p2,p1);}
  else if(p2.hp<=0){endRound(p1,p2);}
}

function endRound(winner,loser){
  fightStarted=false;
  stopBGM();
  var perfect=winner.hp>=100;
  if(perfect){
    showBanner('PERFECT K.O.!',120);
    var perfectLines=['Perfect K.O.! Absolutely flawless!','PERFECT! Not a scratch! That\'s disrespectful!','PERFECT K.O.! They didn\'t even get touched! Call the police!','FLAWLESS! That wasn\'t a fight, that was a demonstration!'];
    speak(perfectLines[Math.floor(Math.random()*perfectLines.length)]);
  }else{
    showBanner('K.O.!',90);sfxKO();
    var koLines=['K.O.!','Knockout!','DOWN GOES '+loser.char.name+'!','And that\'s all she wrote!','GOODNIGHT '+loser.char.name+'!','Someone call an ambulance! Actually call two!'];
    speak(koLines[Math.floor(Math.random()*koLines.length)]);
  }

  if(winner===p1)p1Rounds++;else p2Rounds++;

  var comm=getCommentary(winner.char.name,loser.char.name);
  setTimeout(function(){
    showCommentary(comm,240);
    speak(comm);
  },1500);

  // Check match over
  if(p1Rounds>=2||p2Rounds>=2){
    setTimeout(function(){
      gameState='victory';
      showScreen('victoryScreen');
      document.getElementById('controls').style.display='none';
      document.getElementById('winnerName').textContent=winner.char.name+' WINS!';
      document.getElementById('winEmoji').textContent=winner.char.emoji;
      var wq=winner.char.winQuotes?winner.char.winQuotes[Math.floor(Math.random()*winner.char.winQuotes.length)]:winner.char.winQuote;
      document.getElementById('winQuote').textContent='"'+wq+'"';
      speak(winner.char.name+' wins the match! '+wq);
      saveStats(winner.char.id,true);
      saveStats(loser.char.id,false);
    },3500);
  }else{
    round++;
    setTimeout(function(){startRound();},3500);
  }
}

// ==================== DRAW ====================
function drawBackground(){
  // Sky gradient
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0a15');
  grad.addColorStop(0.6,'#151525');
  grad.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // City silhouette
  ctx.fillStyle='#0d0d1a';
  var buildings=[[0.05,0.35],[0.12,0.5],[0.2,0.38],[0.28,0.55],[0.35,0.42],[0.42,0.6],[0.5,0.45],[0.58,0.52],[0.65,0.38],[0.72,0.48],[0.8,0.55],[0.88,0.4],[0.95,0.5]];
  buildings.forEach(function(b,bi){
    var bx=b[0]*W,bw=W*0.07,bh=b[1]*FLOOR_Y*0.4;
    ctx.fillRect(bx,FLOOR_Y-bh-20,bw,bh+20);
    // Window lights (seeded by building index to avoid flicker)
    ctx.fillStyle='#2a2a40';
    var wi=0;
    for(var wy=FLOOR_Y-bh;wy<FLOOR_Y-25;wy+=15){
      for(var wx=bx+5;wx<bx+bw-5;wx+=12){
        if(((bi*31+wi*17+7)%10)>4)ctx.fillRect(wx,wy,5,5);
        wi++;
      }
    }
    ctx.fillStyle='#0d0d1a';
  });

  // Floor
  var floorGrad=ctx.createLinearGradient(0,FLOOR_Y,0,H);
  floorGrad.addColorStop(0,'#2a2a3e');
  floorGrad.addColorStop(1,'#15151f');
  ctx.fillStyle=floorGrad;
  ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);

  // Floor line
  ctx.strokeStyle='#3a3a5a';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,FLOOR_Y);ctx.lineTo(W,FLOOR_Y);ctx.stroke();
}

function drawCharacter(f,isP1){
  var c=f.char;
  var x=f.x,y=f.y;
  var s=SCALE;
  var facing=f.facing;
  var crouch=f.crouching?0.7:1;
  var flash=f.flashTimer>0&&f.flashTimer%4<2;

  ctx.save();
  ctx.translate(x,y);
  if(facing<0)ctx.scale(-1,1);

  var headY=-80*s*crouch;
  var torsoY=-55*s*crouch;
  var torsoH=35*s;
  var legY=-20*s*crouch;
  var legH=20*s;

  // Attack animations
  var armExtend=0;
  var legExtend=0;
  var kickLeg=false;
  if(f.state==='attacking'){
    var prog=f.attackFrame/f.attackDur;
    var swing=Math.sin(prog*Math.PI);
    if(f.attackType==='punch'){armExtend=swing*35*s;}
    if(f.attackType==='kick'){legExtend=swing*40*s;kickLeg=true;}
    if(f.attackType==='special'){armExtend=swing*25*s;legExtend=swing*15*s;}
  }

  if(flash){ctx.globalAlpha=0.5;}

  // Stun indicator
  if(f.stunTimer>0){
    ctx.globalAlpha=0.4+Math.sin(Date.now()*0.02)*0.3;
    // Stars around head
    ctx.fillStyle='#f7c948';ctx.font=(10*s)+'px sans-serif';
    ctx.fillText('★',10*s,headY-10*s);
    ctx.fillText('★',-15*s,headY-5*s);
    ctx.fillText('★',5*s,headY-20*s);
    ctx.globalAlpha=1;if(flash)ctx.globalAlpha=0.5;
  }

  // Speed boost aura
  if(f.speedBoostTimer>0){
    ctx.strokeStyle='rgba(255,200,50,0.4)';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,torsoY+torsoH/2,30*s,50*s*crouch,0,0,Math.PI*2);ctx.stroke();
  }

  // Counter shield
  if(f.counterActive){
    ctx.strokeStyle='rgba(100,180,255,0.5)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,torsoY+torsoH/2,40*s,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(100,180,255,0.3)';
    ctx.beginPath();ctx.arc(0,torsoY+torsoH/2,45*s,0,Math.PI*2);ctx.stroke();
  }

  // === LEGS ===
  ctx.fillStyle=c.pants||c.shirt||'#444';
  var footY=0; // relative to y (which is floor)
  if(c.dress){
    // Dress/skirt
    ctx.fillStyle=c.shirt;
    ctx.beginPath();
    ctx.moveTo(-15*s,torsoY+torsoH);
    ctx.lineTo(15*s,torsoY+torsoH);
    ctx.lineTo(20*s,footY);
    ctx.lineTo(-20*s,footY);
    ctx.fill();
  }else{
    // Left leg
    ctx.fillRect(-12*s,legY,10*s,legH);
    // Right leg
    if(kickLeg){
      ctx.save();
      ctx.translate(5*s,legY);
      ctx.rotate(-0.5*legExtend/(40*s));
      ctx.fillRect(0,0,10*s,legH+legExtend*0.5);
      ctx.restore();
    }else{
      ctx.fillRect(5*s,legY,10*s,legH);
    }
  }

  // Shoes
  ctx.fillStyle='#222';
  ctx.fillRect(-14*s,footY-4*s,12*s,4*s);
  if(!kickLeg)ctx.fillRect(4*s,footY-4*s,12*s,4*s);

  // === TORSO ===
  var torsoColor=c.gi||c.shirt||'#666';
  ctx.fillStyle=torsoColor;
  ctx.fillRect(-15*s,torsoY,30*s,torsoH);

  // Gi belt
  if(c.gi){
    ctx.fillStyle=c.id==='johnny'?'#222':'#333';
    ctx.fillRect(-15*s,torsoY+torsoH*0.6,30*s,4*s);
  }

  // Flannel pattern (Luke Danes)
  if(c.flannel){
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    for(var ly=torsoY;ly<torsoY+torsoH;ly+=6*s){
      ctx.beginPath();ctx.moveTo(-15*s,ly);ctx.lineTo(15*s,ly);ctx.stroke();
    }
    for(var lx=-15*s;lx<15*s;lx+=8*s){
      ctx.beginPath();ctx.moveTo(lx,torsoY);ctx.lineTo(lx,torsoY+torsoH);ctx.stroke();
    }
  }

  // Blazer (Emily)
  if(c.blazer){
    ctx.fillStyle='#8a7a6a';
    ctx.fillRect(-17*s,torsoY,6*s,torsoH);
    ctx.fillRect(11*s,torsoY,6*s,torsoH);
    // Lapels
    ctx.strokeStyle='#666';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-5*s,torsoY);ctx.lineTo(0,torsoY+15*s);ctx.lineTo(5*s,torsoY);ctx.stroke();
  }

  // === ARMS ===
  ctx.fillStyle=c.gi?torsoColor:(c.id==='emily'?'#e8c9a0':'#dbb89a');
  // Back arm
  ctx.fillRect(-18*s,torsoY+5*s,6*s,25*s);
  // Front arm (punching arm)
  ctx.save();
  ctx.translate(14*s,torsoY+8*s);
  ctx.fillRect(0,0,6*s+armExtend,20*s);
  // Fist
  if(armExtend>5){
    ctx.fillStyle='#dbb89a';
    ctx.fillRect(6*s+armExtend-5*s,-2*s,8*s,10*s);
  }
  ctx.restore();

  // === HEAD ===
  ctx.fillStyle='#e8c9a0';
  var headR=14*s;
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI*2);ctx.fill();

  // Eyes
  ctx.fillStyle='#222';
  ctx.fillRect(-6*s,headY-3*s,3*s,4*s);
  ctx.fillRect(3*s,headY-3*s,3*s,4*s);

  // Mouth
  if(f.state==='attacking'){
    ctx.fillRect(-4*s,headY+5*s,8*s,3*s);
  }else if(f.stunTimer>0){
    ctx.beginPath();ctx.arc(0,headY+6*s,3*s,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillRect(-3*s,headY+5*s,6*s,2*s);
  }

  // === CHARACTER-SPECIFIC FEATURES ===

  // Hair
  ctx.fillStyle=c.hair||'#333';
  if(c.id==='gloria'){
    // Big voluminous hair
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,18*s,14*s,0,Math.PI,Math.PI*2);
    ctx.fill();
    ctx.beginPath();ctx.ellipse(-14*s,headY,6*s,16*s,0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(14*s,headY,6*s,16*s,-0.2,0,Math.PI*2);ctx.fill();
  }else if(c.id==='lorelai'){
    // Long dark hair
    ctx.beginPath();
    ctx.ellipse(0,headY-6*s,16*s,12*s,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-16*s,headY-6*s,6*s,30*s);
    ctx.fillRect(10*s,headY-6*s,6*s,30*s);
  }else if(c.id==='emily'){
    // Short styled hair
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,16*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-15*s,headY-8*s,30*s,8*s);
  }else if(c.id==='kreese'){
    // Short military hair
    ctx.fillStyle='#999';
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,14*s,8*s,0,Math.PI,Math.PI*2);ctx.fill();
  }else{
    // Standard hair
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,14*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
  }

  // Headband (Johnny, Daniel)
  if(c.headband){
    ctx.fillStyle=c.headband;
    ctx.fillRect(-15*s,headY-6*s,30*s,5*s);
    // Headband tails
    ctx.fillRect(14*s,headY-6*s,3*s,12*s);
  }

  // Cap (Luke Danes)
  if(c.cap){
    ctx.fillStyle='#2244aa';
    ctx.fillRect(-16*s,headY-14*s,32*s,10*s);
    // Brim (backwards)
    ctx.fillRect(-20*s,headY-6*s,8*s,4*s);
  }

  // Pearls (Emily)
  if(c.id==='emily'){
    ctx.fillStyle='#fffff0';
    for(var pi=0;pi<5;pi++){
      ctx.beginPath();ctx.arc(-8*s+pi*4*s,torsoY-2*s,2*s,0,Math.PI*2);ctx.fill();
    }
  }

  // Coffee cup (Lorelai)
  if(c.id==='lorelai'){
    ctx.fillStyle='#8b4513';
    ctx.fillRect(-22*s,torsoY+10*s,7*s,10*s);
    ctx.fillStyle='#fff';
    ctx.fillRect(-22*s,torsoY+8*s,9*s,3*s);
    // Steam
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    var st=Date.now()*0.005;
    ctx.beginPath();ctx.moveTo(-18*s,torsoY+6*s);
    ctx.quadraticCurveTo(-18*s+Math.sin(st)*4*s,torsoY,0-18*s,torsoY-6*s);ctx.stroke();
  }

  // Polo collar (Phil)
  if(c.id==='phil'){
    ctx.fillStyle='#5aa0e9';
    ctx.beginPath();ctx.moveTo(-8*s,torsoY);ctx.lineTo(0,torsoY+6*s);ctx.lineTo(8*s,torsoY);
    ctx.lineTo(10*s,torsoY-4*s);ctx.lineTo(-10*s,torsoY-4*s);ctx.fill();
  }

  // Luke Dunphy messy look
  if(c.id==='luke'){
    ctx.fillStyle=c.hair;
    for(var hi=0;hi<5;hi++){
      ctx.beginPath();
      ctx.moveTo(-12*s+hi*6*s,headY-12*s);
      ctx.lineTo(-9*s+hi*6*s,headY-20*s-Math.random()*5*s);
      ctx.lineTo(-6*s+hi*6*s,headY-12*s);
      ctx.fill();
    }
  }

  // Frankie Heck — tired eyes, messy ponytail
  if(c.id==='frankie'){
    ctx.fillStyle=c.hair;
    ctx.beginPath();ctx.ellipse(0,headY-6*s,15*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
    // Ponytail
    ctx.fillRect(10*s,headY-4*s,4*s,22*s);
    ctx.beginPath();ctx.ellipse(12*s,headY+18*s,5*s,4*s,0,0,Math.PI*2);ctx.fill();
    // Bags under eyes
    ctx.strokeStyle='rgba(100,60,60,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(-5*s,headY,4*s,0.2,Math.PI-0.2);ctx.stroke();
    ctx.beginPath();ctx.arc(5*s,headY,4*s,0.2,Math.PI-0.2);ctx.stroke();
  }

  // Axl Heck — shirtless (skin color torso), messy hair
  if(c.shirtless){
    // Redraw torso as skin (already drawn as shirt color which is null/'#111')
    // We override above, so draw abs lines for fun
    ctx.strokeStyle='rgba(180,140,100,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,torsoY+10*s);ctx.lineTo(0,torsoY+torsoH-5*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-8*s,torsoY+14*s);ctx.lineTo(8*s,torsoY+14*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-8*s,torsoY+22*s);ctx.lineTo(8*s,torsoY+22*s);ctx.stroke();
    // Flexing indicator when powered up
    if(f.axlPoweredUp){
      ctx.fillStyle='rgba(255,200,0,0.3)';
      ctx.beginPath();ctx.ellipse(0,torsoY+torsoH/2,25*s,40*s,0,0,Math.PI*2);ctx.fill();
    }
  }
  if(c.id==='axl'){
    ctx.fillStyle=c.hair;
    for(var hi=0;hi<4;hi++){
      ctx.beginPath();
      ctx.moveTo(-10*s+hi*7*s,headY-10*s);
      ctx.lineTo(-7*s+hi*7*s,headY-18*s);
      ctx.lineTo(-4*s+hi*7*s,headY-10*s);
      ctx.fill();
    }
  }

  // Sue Heck — big smile, headband, bouncy hair
  if(c.id==='sue'){
    ctx.fillStyle=c.hair;
    ctx.beginPath();ctx.ellipse(0,headY-6*s,16*s,11*s,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-15*s,headY-4*s,5*s,20*s);
    ctx.fillRect(10*s,headY-4*s,5*s,20*s);
    // Headband
    ctx.fillStyle='#ff88cc';
    ctx.fillRect(-14*s,headY-8*s,28*s,4*s);
    // Always smiling (override mouth)
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(0,headY+5*s,4*s,0,Math.PI);ctx.fill();
  }

  // Jackson — cat body! Ears, tail, whiskers
  if(c.isCat){
    // Override — cat head (dark circle)
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(0,headY,headR+2*s,0,Math.PI*2);ctx.fill();
    // Ears
    ctx.beginPath();ctx.moveTo(-10*s,headY-12*s);ctx.lineTo(-6*s,headY-24*s);ctx.lineTo(-2*s,headY-12*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(2*s,headY-12*s);ctx.lineTo(6*s,headY-24*s);ctx.lineTo(10*s,headY-12*s);ctx.fill();
    // Inner ears
    ctx.fillStyle='#ff88aa';
    ctx.beginPath();ctx.moveTo(-8*s,headY-13*s);ctx.lineTo(-6*s,headY-20*s);ctx.lineTo(-4*s,headY-13*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(4*s,headY-13*s);ctx.lineTo(6*s,headY-20*s);ctx.lineTo(8*s,headY-13*s);ctx.fill();
    // Eyes — green cat eyes
    ctx.fillStyle='#44cc44';
    ctx.beginPath();ctx.ellipse(-5*s,headY-2*s,3*s,4*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5*s,headY-2*s,3*s,4*s,0,0,Math.PI*2);ctx.fill();
    // Pupils
    ctx.fillStyle='#000';
    ctx.fillRect(-5.5*s,headY-4*s,1.5*s,5*s);
    ctx.fillRect(4.5*s,headY-4*s,1.5*s,5*s);
    // Nose
    ctx.fillStyle='#ff6688';
    ctx.beginPath();ctx.moveTo(-2*s,headY+3*s);ctx.lineTo(0,headY+1*s);ctx.lineTo(2*s,headY+3*s);ctx.fill();
    // Whiskers
    ctx.strokeStyle='#888';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-14*s,headY+1*s);ctx.lineTo(-4*s,headY+3*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-14*s,headY+4*s);ctx.lineTo(-4*s,headY+4*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4*s,headY+3*s);ctx.lineTo(14*s,headY+1*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4*s,headY+4*s);ctx.lineTo(14*s,headY+4*s);ctx.stroke();
    // Tail
    ctx.strokeStyle='#222';ctx.lineWidth=3*s;
    ctx.beginPath();
    var tailTime=Date.now()*0.003;
    ctx.moveTo(-15*s,legY+5*s);
    ctx.quadraticCurveTo(-25*s,legY-10*s+Math.sin(tailTime)*8*s,-20*s,legY-25*s+Math.sin(tailTime+1)*5*s);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHUD(){
  var barW=W*0.35;
  var barH=16*SCALE;
  var barY=15;
  var margin=15;

  // P1 health bar (left)
  drawHealthBar(margin,barY,barW,barH,p1.hp/p1.maxHp,p1.char.name,p1.char.emoji,true);
  // P2 health bar (right)
  drawHealthBar(W-margin-barW,barY,barW,barH,p2.hp/p2.maxHp,p2.char.name,p2.char.emoji,false);

  // Special meters
  drawMeter(margin,barY+barH+8,barW*0.6,8*SCALE,p1.meter/100,'#f7c948');
  drawMeter(W-margin-barW*0.6,barY+barH+8,barW*0.6,8*SCALE,p2.meter/100,'#f7c948');

  // Timer
  var timeLeft=Math.ceil(roundTimer/60);
  ctx.fillStyle='#fff';ctx.font='bold '+Math.round(20*SCALE)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText(timeLeft,W/2,barY+barH);

  // Round indicators
  ctx.font=Math.round(12*SCALE)+'px sans-serif';ctx.fillStyle='#888';
  ctx.textAlign='left';ctx.fillText('W:'+p1Rounds,margin,barY+barH+28);
  ctx.textAlign='right';ctx.fillText('W:'+p2Rounds,W-margin,barY+barH+28);
  ctx.textAlign='left';
}

function drawHealthBar(x,y,w,h,pct,name,emoji,isLeft){
  pct=Math.max(0,pct);
  // Background
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.fill();
  // Health
  var hpColor=pct>0.5?'#44cc44':pct>0.25?'#cccc44':'#cc4444';
  var grad=ctx.createLinearGradient(x,y,x,y+h);
  grad.addColorStop(0,hpColor);grad.addColorStop(1,shadeColor(hpColor,-30));
  ctx.fillStyle=grad;
  if(isLeft){
    ctx.beginPath();ctx.roundRect(x,y,w*pct,h,4);ctx.fill();
  }else{
    ctx.beginPath();ctx.roundRect(x+w*(1-pct),y,w*pct,h,4);ctx.fill();
  }
  // Border
  ctx.strokeStyle='#555';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(x,y,w,h,4);ctx.stroke();
  // Name
  ctx.fillStyle='#fff';ctx.font='bold '+Math.round(11*SCALE)+'px sans-serif';
  ctx.textAlign=isLeft?'left':'right';
  var nameX=isLeft?x+6:x+w-6;
  ctx.fillText(emoji+' '+name,nameX,y+h-4);
  ctx.textAlign='left';
}

function drawMeter(x,y,w,h,pct,color){
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();
  if(pct>0){
    ctx.fillStyle=pct>=1?'rgba(247,201,72,'+(0.7+Math.sin(Date.now()*0.01)*0.3)+')':color;
    ctx.beginPath();ctx.roundRect(x,y,w*Math.min(1,pct),h,3);ctx.fill();
  }
  ctx.strokeStyle='#444';ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.stroke();
  // Label
  ctx.fillStyle='#aaa';ctx.font=Math.round(8*SCALE)+'px sans-serif';
  ctx.fillText('⚡',x+2,y+h-1);
}

function shadeColor(hex,pct){
  var num=parseInt(hex.replace('#',''),16);
  var r=Math.min(255,Math.max(0,((num>>16)&0xff)+pct));
  var g=Math.min(255,Math.max(0,((num>>8)&0xff)+pct));
  var b=Math.min(255,Math.max(0,(num&0xff)+pct));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function drawProjectiles(){
  projectiles.forEach(function(pr){
    ctx.save();ctx.translate(pr.x,pr.y);
    if(pr.type==='chancla'){
      ctx.rotate(Date.now()*0.01);
      ctx.fillStyle='#cc8844';
      ctx.fillRect(-8*SCALE,-4*SCALE,16*SCALE,8*SCALE);
      ctx.fillStyle='#aa6633';
      ctx.fillRect(-6*SCALE,-2*SCALE,4*SCALE,4*SCALE);
    }else if(pr.type==='coffeepot'){
      ctx.fillStyle='#8b4513';
      ctx.fillRect(-6*SCALE,-8*SCALE,12*SCALE,16*SCALE);
      ctx.fillStyle='#4a2800';
      ctx.fillRect(-4*SCALE,-4*SCALE,8*SCALE,8*SCALE);
      ctx.fillStyle='#fff';
      ctx.fillRect(-3*SCALE,-10*SCALE,6*SCALE,3*SCALE);
    }
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(function(pt){
    var alpha=pt.life/pt.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=pt.color;
    ctx.fillRect(pt.x-pt.size/2,pt.y-pt.size/2,pt.size,pt.size);
  });
  ctx.globalAlpha=1;
}

function draw(){
  ctx.clearRect(0,0,W,H);

  if(gameState==='fight'||gameState==='roundEnd'){
    ctx.save();
    ctx.translate(shakeX,shakeY);

    drawBackground();
    if(p1&&p2){
      // Draw further-back character first
      if(p1.y>p2.y){drawCharacter(p2,false);drawCharacter(p1,true);}
      else{drawCharacter(p1,true);drawCharacter(p2,false);}
      drawProjectiles();
      drawParticles();
      drawHUD();
    }
    ctx.restore();
  }else{
    drawBackground();
  }
}

// ==================== GAME LOOP ====================
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// RoundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();return this;
  };
}

// Start
resize();
gameLoop();

// Title screen announcer
var titleIntros=[
  'TV Showdown! The crossover nobody asked for!',
  'TV Showdown! Where sitcom characters solve their problems with violence!',
  'TV Showdown! Lawyers have advised us not to make this game!',
  'TV Showdown! Three shows enter! One champion leaves!',
  'TV Showdown! More dramatic than a Gilmore Girls dinner party!'
];
setTimeout(function(){speak(titleIntros[Math.floor(Math.random()*titleIntros.length)]);},500);

// Rotate title subtitles
var subtitles=['The crossover nobody asked for.','Now with 100% more chancla.','Emily Gilmore disapproves of this game.','Phil Dunphy thinks this is awesome.','Luke Danes does NOT want to be here.','Quiet Riot plays in the background.','Viewer discretion is advised.','No karate students were harmed. Probably.','Rated PG-13 for passive-aggressive comments.','May cause spontaneous crane kicks.','Axl Heck is already shirtless.','Sue Heck tried out 47 times to be in this game.','Frankie Heck is too tired for this but she\'s here anyway.','Jackson the cat is judging you right now.','The Hecks can\'t afford this game but they play it anyway.','4 shows. 13 fighters. 0 network approval.','Now featuring a cat who can beat up karate masters.','The crossover your therapist warned you about.'];
var subIdx=0;
setInterval(function(){
  if(gameState!=='title')return;
  subIdx=(subIdx+1)%subtitles.length;
  document.getElementById('titleSub').textContent=subtitles[subIdx];
},4000);
</script>
