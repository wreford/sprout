// ==================== TTS ====================
var lastSpoke=0,GAP=2500;
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastSpoke<GAP)return;
    lastSpoke=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=1.1;u.pitch=0.85;u.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var v=null;
          for(var i=0;i<voices.length;i++){
            if(voices[i].lang&&voices[i].lang.indexOf('en')===0){v=voices[i];break;}
          }
          if(v)u.voice=v;
        }
        speechSynthesis.speak(u);
      }catch(e){}
    },60);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// ==================== AUDIO ====================
var audioCtx=null;
function initAudio(){if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function playTone(freq,dur,type,vol){
  if(!audioCtx)return;try{
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.value=Math.min(vol||0.02,0.02);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);}catch(e){}
}
function playNoise(dur,vol){
  if(!audioCtx)return;try{
  var bufSize=audioCtx.sampleRate*dur,buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);
  var src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  src.buffer=buf;g.gain.value=Math.min(vol||0.02,0.02);
  src.connect(g);g.connect(audioCtx.destination);
  src.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxPunch(){playNoise(0.08,0.02);playTone(300,0.06,'square',0.015);}
function sfxKick(){playNoise(0.12,0.02);playTone(150,0.1,'square',0.015);}
function sfxBlock(){playTone(800,0.05,'sine',0.015);playTone(1200,0.05,'sine',0.01);}
function sfxSpecial(){playTone(400,0.15,'sawtooth',0.015);playTone(600,0.15,'sawtooth',0.012);playTone(800,0.15,'sawtooth',0.01);}
function sfxKO(){playTone(100,0.5,'sawtooth',0.02);playTone(80,0.6,'square',0.015);}
function sfxGong(){playTone(220,0.6,'sine',0.02);playTone(330,0.4,'sine',0.015);playTone(440,0.3,'sine',0.01);}

// Background music
var bgmInterval=null;
function startBGM(){
  if(bgmInterval)return;
  var beat=0;
  bgmInterval=setInterval(function(){
    if(!audioCtx)return;
    var b=beat%8;
    if(b===0||b===4)playTone(60,0.08,'square',0.012);
    if(b%2===0)playNoise(0.03,0.008);
    if(b===2||b===6)playTone(55,0.06,'square',0.008);
    beat++;
  },150);
}
function stopBGM(){if(bgmInterval){clearInterval(bgmInterval);bgmInterval=null;}}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var el=document.getElementById(name);
  if(el)el.classList.add('active');
  document.getElementById('homeLink').style.opacity=(name==='titleScreen'||name==='charSelect')?'1':'0';
  document.getElementById('homeLink').style.pointerEvents=(name==='titleScreen'||name==='charSelect')?'auto':'none';
}

function showCharSelect(){
  initAudio();
  gameState='select';selectedChar=null;
  showScreen('charSelect');
  document.getElementById('controls').style.display='none';
  document.getElementById('fightBtn').style.display='none';
  document.getElementById('charBio').style.display='none';
  buildGrid();
  stopBGM();
}

function buildGrid(){
  var g=document.getElementById('charGrid');g.innerHTML='';
  CHARS.forEach(function(c,i){
    if(c.secret&&!secretsUnlocked){
      var d=document.createElement('div');d.className='char-card';
      d.style.opacity='0.3';d.style.cursor='default';
      d.innerHTML='<span class="emoji">🔒</span><span class="cname">???</span><span class="cshow">SECRET</span>';
      d.onclick=function(){
        showCommentary('Type the secret code to unlock!',120);
        speak('Type the secret code to unlock hidden fighters!');
      };
      g.appendChild(d);
      return;
    }
    var d=document.createElement('div');d.className='char-card';
    d.innerHTML='<span class="emoji">'+c.emoji+'</span><span class="cname">'+c.name+'</span><span class="cshow">'+(c.secret?'⭐ '+c.show:c.show)+'</span>';
    if(c.secret)d.style.borderColor='#f7c948';
    d.onclick=function(){selectChar(i);};
    g.appendChild(d);
  });
}

// ==================== FIGHTER CREATION ====================
function createFighter(charData,x,facing){
  return{
    char:charData,x:x,y:FLOOR_Y,vy:0,facing:facing,
    hp:100,maxHp:100,meter:0,
    state:'idle',stateTimer:0,
    attackFrame:0,attackDur:0,attackType:null,
    hitDealt:false,
    blockTimer:0,stunTimer:0,
    crouching:false,grounded:true,
    speedBoostTimer:0,counterActive:false,
    width:40*SCALE,height:90*SCALE,
    flashTimer:0,
    wins:0
  };
}

// ==================== START GAME ====================
function startGame(){
  if(selectedChar===null)return;
  initAudio();tournamentMode=false;
  gameState='fight';
  showScreen(null);
  document.getElementById('controls').style.display='block';
  var aiIdx;
  do{aiIdx=Math.floor(Math.random()*CHARS.length);}while(aiIdx===selectedChar);
  p1=createFighter(CHARS[selectedChar],W*0.3,1);
  p2=createFighter(CHARS[aiIdx],W*0.7,-1);
  round=1;p1Rounds=0;p2Rounds=0;
  particles=[];projectiles=[];
  startRound();
}

function startTournament(){
  if(selectedChar===null)return;
  initAudio();tournamentMode=true;tournamentWins=0;
  // Queue all opponents in random order
  tournamentQueue=[];
  for(var i=0;i<CHARS.length;i++){if(i!==selectedChar)tournamentQueue.push(i);}
  for(var i=tournamentQueue.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=tournamentQueue[i];tournamentQueue[i]=tournamentQueue[j];tournamentQueue[j]=tmp;}
  var firstIdx=tournamentQueue.shift();
  gameState='fight';showScreen(null);
  document.getElementById('controls').style.display='block';
  p1=createFighter(CHARS[selectedChar],W*0.3,1);
  p2=createFighter(CHARS[firstIdx],W*0.7,-1);
  round=1;p1Rounds=0;p2Rounds=0;particles=[];projectiles=[];
  showBanner('🏆 TOURNAMENT!',120);
  speak('Tournament mode! '+CHARS[selectedChar].name+' versus all '+(CHARS.length-1)+' opponents! First up: '+CHARS[firstIdx].name+'!');
  setTimeout(function(){startRound();},2500);
}

function rematch(){
  if(!p1||!p2)return;
  gameState='fight';
  showScreen(null);
  document.getElementById('controls').style.display='block';
  p1.hp=100;p1.meter=0;p1.state='idle';p1.stateTimer=0;p1.stunTimer=0;p1.speedBoostTimer=0;p1.counterActive=false;
  p2.hp=100;p2.meter=0;p2.state='idle';p2.stateTimer=0;p2.stunTimer=0;p2.speedBoostTimer=0;p2.counterActive=false;
  round=1;p1Rounds=0;p2Rounds=0;
  particles=[];projectiles=[];
  p1.x=W*0.3;p2.x=W*0.7;p1.y=FLOOR_Y;p2.y=FLOOR_Y;
  startRound();
}

function startRound(){
  fightStarted=false;
  roundTimer=25*60; // 25 seconds at 60fps
  p1.hp=100;p1.meter=Math.min(p1.meter,50);p1.state='idle';p1.stateTimer=0;p1.stunTimer=0;p1.crouching=false;p1.speedBoostTimer=0;p1.counterActive=false;
  p2.hp=100;p2.meter=Math.min(p2.meter,50);p2.state='idle';p2.stateTimer=0;p2.stunTimer=0;p2.crouching=false;p2.speedBoostTimer=0;p2.counterActive=false;
  p1.x=W*0.3;p2.x=W*0.7;
  p1.y=FLOOR_Y;p2.y=FLOOR_Y;p1.vy=0;p2.vy=0;
  particles=[];projectiles=[];dmgNumbers=[];
  // Generate platforms
  platforms=[
    {x:W*0.2,y:FLOOR_Y-100*SCALE,w:80*SCALE,h:8*SCALE},
    {x:W*0.5-40*SCALE,y:FLOOR_Y-140*SCALE,w:80*SCALE,h:8*SCALE},
    {x:W*0.8-80*SCALE,y:FLOOR_Y-100*SCALE,w:80*SCALE,h:8*SCALE}
  ];
  crowdReaction=0;
  showBanner('ROUND '+round+'!',90);
  sfxGong();
  if(round===1){
    var intros=[
      p1.char.name+' versus '+p2.char.name+'! This is going to be ugly!',
      p1.char.name+' vs '+p2.char.name+'! A matchup for the ages! Or at least for Wednesday night!',
      'It\'s '+p1.char.name+' against '+p2.char.name+'! Neither asked for this! Both are here anyway!',
      p1.char.name+' faces '+p2.char.name+'! This is the crossover episode your therapist warned you about!'
    ];
    speak(intros[Math.floor(Math.random()*intros.length)]);
  }else{
    var roundLines=['Round '+round+'! Fight!','Round '+round+'! They\'re back for more punishment!','Round '+round+'! The rematch nobody deserves!'];
    speak(roundLines[Math.floor(Math.random()*roundLines.length)]);
  }
  setTimeout(function(){fightStarted=true;startBGM();},1500);
}

function showBanner(text,dur){
  bannerText=text;bannerTimer=dur||90;
  var el=document.getElementById('roundBanner');
  el.textContent=text;el.style.display='block';
  setTimeout(function(){el.style.display='none';},dur*16.67);
}

function showCommentary(text,dur){
  commentaryText=text;commentaryTimer=dur||180;
  var el=document.getElementById('commentary');
  el.textContent=text;el.style.display='block';
  setTimeout(function(){el.style.display='none';},(dur||180)*16.67);
}

'johnny_gloria':['Johnny caught the chancla! Nobody catches the chancla!','Cobra Kai vs Colombian fury! The 80s beat the passion!','Gloria is calling Jay. Jay cannot help.','Johnny just swept Gloria\'s leg AND her dignity!'],
'johnny_luke':['Johnny just beat up a teenager. Again. It\'s kind of his thing.','Luke didn\'t know what happened. Johnny didn\'t care.','Cobra Kai picks on kids. Some things never change.','Luke is going home to eat cereal and forget this happened.'],
'johnny_lorelai':['Johnny cut off Lorelai mid-sentence! Nobody does that!','Lorelai tried to talk her way out. Johnny doesn\'t listen.','Coffee vs karate. Karate wins. Coffee weeps.','Johnny has never watched Gilmore Girls and he\'s proud of it.'],
'johnny_emily':['Johnny just punched through Emily\'s passive-aggression!','Emily\'s disapproval couldn\'t stop an 80s karate montage!','The DAR is sending a strongly worded letter about this.','Emily needs a new martini. And a new strategy.'],
'johnny_luked':['Two dudes in flannel energy fought. The one with karate won.','Luke D brought coffee. Johnny brought a crane kick. Mismatch.','Aw jeez indeed. Johnny didn\'t hold back.','Luke\'s diner just lost its toughest regular... to Johnny Lawrence.'],
'johnny_frankie':['Johnny just beat up a tired mom. Real noble, Lawrence.','Frankie was too exhausted to dodge. Life prepared her for defeat.','The Heck family insurance does NOT cover crane kicks.','Frankie is going home to microwave something and cry.'],
'johnny_axl':['Two shirtless energy dudes and the one from the 80s wins!','Axl\'s abs are cosmetic. Johnny\'s are functional.','Axl learned that being cool doesn\'t stop a crane kick.','Johnny just fathered Axl in combat. Literally dadded him.'],
'johnny_sue':['Johnny just beat the most optimistic person alive. Monster.','Sue is STILL smiling. Someone check on her.','Sue tried out for karate team 12 times. Still lost.','Even Sue\'s relentless positivity couldn\'t survive Cobra Kai.'],
'johnny_jackson':['Johnny beat a cat. Peak Cobra Kai behavior.','Jackson has 8 lives left. Johnny has 0 chill.','Even cats aren\'t safe from the Cobra Kai dojo.','Jackson is plotting revenge. Cats always plot revenge.'],

// ── DANIEL vs everyone ──
'daniel_johnny':['Daniel wins again! 1984 flashbacks intensify!','Wax on, wax off, lights out, Johnny!','LaRusso Auto Group sponsors this victory!','Daniel has been dining out on this rivalry for 40 years.'],
'daniel_kreese':['The student of the student beats the master! It\'s confusing!','Miyagi-Do defeats Cobra Kai! Balance wins!','Kreese is going to need a new evil plan.','Daniel avenged Mr. Miyagi! Again! He does this a lot!'],
'daniel_phil':['Daniel just karate-chopped the cool dad! Not cool anymore!','Phil\'s magic trick: making his own health bar vanish!','LaRusso Auto Group: better deals than Dunphy Real Estate!','Phil needs to sell a house to afford that hospital bill.'],
'daniel_gloria':['Daniel blocked the chancla with Miyagi-Do! Impossible!','Gloria\'s chancla met its match! Colombian Twitter is furious!','Wax on. Chancla off. Daniel wins.','Gloria is speed-dialing every relative in Barranquilla.'],
'daniel_luke':['Daniel just taught Luke a lesson. Luke already forgot it.','Miyagi-Do vs Whatever Luke Does. Miyagi wins.','Luke says he\'s fine. Luke is not fine.','Daniel opens a dojo for confused teenagers. First student: Luke.'],
'daniel_lorelai':['Daniel out-talked Lorelai! Wait, no, he out-fought her.','Lorelai offered Daniel coffee. He said no. She was stunned.','Stars Hollow has no karate dojo. That was the problem.','Daniel and Lorelai should really just date. The chemistry is there.'],
'daniel_emily':['Emily disapproves of karate. Daniel doesn\'t care.','Miyagi-Do countered Emily\'s passive-aggression!','Emily is firing her trainer. And her maid. And her florist.','The DAR formally condemns Daniel LaRusso and all dojos.'],
'daniel_luked':['Two Lukes enter, only Daniel matters! Wait—','Daniel broke Luke\'s coffee pot AND his spirit!','Luke D needs a new diner. And a new pot. And therapy.','Aw jeez. Daniel just LaRusso\'d another Luke.'],
'daniel_frankie':['Daniel beat Frankie. She was already having a bad day.','Frankie tried to use her mom voice. Daniel has Miyagi.','The Heck budget cannot afford this loss.','Frankie is adding "beat up by karate man" to her complaint list.'],
'daniel_axl':['Miyagi-Do vs shirtless confidence. Discipline wins.','Axl\'s abs provided zero protection against a crane kick.','Daniel just schooled a kid half his age. Classic move.','Axl needs to put a shirt on AND an ice pack.'],
'daniel_sue':['Daniel beat Sue but she asked for his autograph after!','Sue is applying to be Daniel\'s dojo student immediately!','Sue lost and still says it was the BEST DAY EVER!','Daniel feels terrible. Sue is THRIVING.'],
'daniel_jackson':['Daniel waxed on the cat. Cat did not wax off.','Miyagi would NOT have approved of fighting a cat.','Jackson lands on his feet. Daniel lands on his principles.','LaRusso Auto Group does not endorse fighting cats.'],

// ── KREESE vs everyone ──
'kreese_johnny':['The master defeats the student! No mercy!','Kreese reminds Johnny who runs Cobra Kai!','Johnny should have stayed in the 80s.','Kreese is 70+ and still terrifying. Respect.'],
'kreese_daniel':['Kreese choked out the chosen one! Mr. Miyagi is rolling!','No amount of bonsai trees could save Daniel from that!','Cobra Kai: 1, Miyagi-Do: hospitalised.','Kreese just undid 40 years of character development.'],
'kreese_phil':['Kreese just choked out the cool dad. The COOL DAD.','Phil\'s magic tricks don\'t work on Vietnam vets!','Phil is reconsidering his career. And his life choices.','No mercy for real estate agents!'],
'kreese_gloria':['Kreese caught the chancla with his bare hand! Terrifying!','Gloria met the one person angrier than a Colombian mother!','Even the chancla fears Kreese.','Gloria is calling the Colombian military. This is escalating.'],
'kreese_luke':['Kreese just choked out a child. On brand.','Luke didn\'t know what happened. Also on brand.','Kreese has been bullying teens since the 70s.','Someone call Luke\'s parents. Actually, they won\'t help either.'],
'kreese_lorelai':['Kreese doesn\'t respond to witty banter. Lorelai is shook.','No mercy. No coffee. No talking your way out.','Lorelai just learned that words can\'t block a chokehold.','Kreese has never seen Gilmore Girls. He never will.'],
'kreese_emily':['Two cold-blooded people fought. The one with a chokehold won.','Emily met someone more intimidating. She\'s filing a complaint.','Kreese\'s disapproval beats Emily\'s disapproval. Barely.','The DAR vs Cobra Kai. Both are terrifying. One has karate.'],
'kreese_luked':['Kreese vs Luke Danes. Two angry men. One winner.','Luke\'s flannel provided zero armor against no mercy.','Kreese broke the coffee pot AND Luke\'s will to live.','Aw jeez doesn\'t stop a chokehold.'],
'kreese_frankie':['Kreese just beat up an exhausted mother. New low.','Frankie\'s mom meltdown was nothing compared to Kreese\'s life meltdown.','The Hecks thought they had it bad before this.','Kreese showed no mercy to a woman running on 3 hours of sleep.'],
'kreese_axl':['Kreese taught Axl that abs are not a personality.','Axl met a real tough guy and it was NOT him.','Shirt off doesn\'t scare Vietnam vets, kid.','Kreese just enrolled Axl in Cobra Kai. Involuntarily.'],
'kreese_sue':['Kreese beat Sue and she STILL asked to join his dojo!','Sue\'s optimism could not survive no mercy.','Kreese feels nothing. Sue feels EVERYTHING.','Sue is going to try again tomorrow. That\'s the scariest part.'],
'kreese_jackson':['Kreese showed no mercy to a cat! Monster!','Jackson scratched. Kreese choked. Kreese wins.','Animal control has been called. Kreese doesn\'t care.','Even cats know to fear Cobra Kai now.'],

// ── PHIL vs everyone ──
'phil_johnny':['Phil magic-tricked his way past KARATE! Claire will never believe this!','The cool dad beats the karate dad!','Phil Dunphy: real estate, magic, and now mixed martial arts!','Johnny got PHILed! Get it? PHIL? ...anyone?'],
'phil_daniel':['Phil beat a professional karate man with a card trick!','LaRusso Auto Group just got out-sold by Dunphy Real Estate!','Phil and Daniel should do a crossover open house!','Wax off THIS, Daniel!'],
'phil_kreese':['PHIL DUNPHY BEAT KREESE? The cool dad BEAT the Vietnam vet?!','Phil\'s magic trick: making Kreese\'s dignity disappear!','Claire! CLAIRE! I BEAT A KARATE VILLAIN!','Phil Dunphy is the real no mercy.'],
'phil_gloria':['Phil caught the chancla and made it vanish! ACTUAL magic!','Gloria\'s chancla vs Phil\'s dad energy. Dad energy wins!','Phil is now legally a Colombian enemy of the state.','Jay is going to hear about this for DECADES.'],
'phil_luke':['One Phil vs one Luke. The Phil was cooler. Obviously.','Luke walked into Phil\'s magic show and got sawed in half!','Phil thinks he\'s Luke\'s cool uncle now. He is not.','Phil won AND did a card trick during. Multitasking king.'],
'phil_lorelai':['Two fast-talkers enter! The one with magic wins!','Phil and Lorelai talked simultaneously for 3 minutes. Phil won.','Lorelai needs coffee. Phil needs applause. Phil got his.','The cool dad meets the cool mom. Cool dad wins.'],
'phil_emily':['Phil magic-tricked Emily and she is LIVID!','Emily has never been so insulted by a real estate agent!','Phil just out-embarrassed Emily\'s worst nightmare.','The DAR is banning magic. And Phil. And fun.'],
'phil_luked':['Phil teleported behind Luke D and yelled "TADA!"','Luke made coffee. Phil made it DISAPPEAR. Magic!','Aw jeez meets WOW! WOW wins.','Phil tried to sell Luke a house after winning. Classic Phil.'],
'phil_frankie':['Phil showed Frankie a magic trick and she fell asleep.','Two parents fighting. The rested one wins.','Phil invited Frankie to his open house. She can\'t afford it.','Dunphy Real Estate: out of the Hecks\' price range.'],
'phil_axl':['Phil dad-joked Axl into submission!','Axl\'s coolness is no match for aggressively uncool dad energy!','Phil is the cool dad. Axl is the cool kid. Dad wins. Always.','Phil wants to adopt Axl. Claire says absolutely not.'],
'phil_sue':['Phil beat Sue and she asked him to teach her magic!','Sue wants to join Phil\'s magic club! Phil is thrilled! No one else is!','Two optimists fought. The one with a teleport won.','Sue and Phil should host a variety show together.'],
'phil_jackson':['Phil tried to make Jackson disappear. Jackson did NOT cooperate.','Phil is now a cat person. Not by choice.','Magic beats cats! Phil is writing this down for his act.','Jackson slow-blinked at Phil. Phil took it as applause.'],

// ── GLORIA vs everyone ──
'gloria_johnny':['The chancla is mightier than the crane kick!','Gloria just smacked the 80s out of Johnny!','In Colombia, karate is just angry dancing. Gloria dances better.','Jay! I beat a karate man! Where is my prize?!'],
'gloria_daniel':['The chancla blocked the Miyagi-Do counter!','Gloria doesn\'t need wax on. She needs CHANCLA on!','LaRusso Auto has no Colombian location. For good reason.','Daniel tried to bow. Gloria threw a shoe at him.'],
'gloria_kreese':['Gloria just beat the scariest man on TV! WITH A SHOE!','Even Kreese fears the chancla! NO ONE is safe!','Gloria showed Kreese what REAL no mercy looks like!','In Colombia, Kreese would be an entry-level abuela.'],
'gloria_phil':['Gloria chancla\'d the cool dad into the uncool afterlife!','Phil tried magic. Gloria tried violence. Violence works.','AY PHIL! THAT\'S WHAT HAPPENS!','Gloria hit Phil so hard his real estate license shattered.'],
'gloria_luke':['Gloria just whooped a child with a shoe! She is FEARLESS!','Luke is now terrified of all mothers everywhere.','Gloria reminds Luke of his mom. In the worst way.','Luke Dunphy has learned a valuable lesson about Colombian women.'],
'gloria_lorelai':['Gloria outcaffeinated Lorelai! Coffee country WINS!','Colombian coffee beats Stars Hollow coffee! FACT!','Lorelai talked fast. Gloria\'s chancla flew faster.','Two strong women fought. The one with a projectile won.'],
'gloria_emily':['Gloria\'s passion beats Emily\'s passive-aggression!','Emily tried a withering look. Gloria threw a shoe.','Two terrifying women. One chancla. Result: Gloria wins.','Emily needs a new martini and a new fight strategy.'],
'gloria_luked':['Gloria hit Luke with a chancla and a coffee pot. Double kill!','Luke D poured coffee. Gloria poured FURY!','Flannel does not stop chanclas! Luke learned this the hard way!','Aw jeez. Gloria just ended Luke\'s whole career.'],
'gloria_frankie':['Two exhausted moms fought! The Colombian one was less exhausted!','Frankie ran out of energy. Gloria runs on spite.','Gloria\'s chancla vs Frankie\'s frustration. Chancla wins.','The Hecks wish they had Gloria\'s intensity. And budget.'],
'gloria_axl':['Gloria chancla\'d the shirt right off— wait, it was already off.','Axl flexed at Gloria. She was NOT impressed.','Gloria has smacked bigger men than Axl. Much bigger.','Axl reminds Gloria of Manny. Except dumber.'],
'gloria_sue':['Gloria beat Sue and Sue asked for her hair routine!','Sue\'s positivity vs Gloria\'s fury. Fury always wins.','Gloria is now Sue\'s role model. Sue has taste.','AY SUE! You tried your best! IT WAS NOT ENOUGH!'],
'gloria_jackson':['Gloria threw a chancla at a cat! The cat dodged! She threw another!','Jackson met his match: an angry Colombian woman.','The chancla vs nine lives. Chancla only needed one.','Jackson is filing a complaint with the Cat Council of TaskIAP.'],

// ── LUKE DUNPHY vs everyone ──
'luke_johnny':['Luke accidentally beat a karate master! Peak Luke energy!','Luke doesn\'t know karate. He doesn\'t need to. He has chaos.','Johnny was ready for a fight. He was NOT ready for Luke.','Luke won by falling into Johnny. Accidentally. Brilliantly.'],
'luke_daniel':['Luke beat Daniel by tripping INTO him! Miyagi didn\'t train for this!','Luke\'s fighting style: confused flailing. It works!','Daniel tried to read Luke\'s moves. There were no moves to read.','Luke Dunphy: the most dangerous opponent because he has no plan.'],
'luke_kreese':['Luke BEAT KREESE?! By ACCIDENT?! THIS IS THE BEST DAY!','Kreese couldn\'t find mercy OR a pattern in Luke\'s attacks!','Luke doesn\'t know who Kreese is. Kreese wishes he didn\'t know Luke.','Accidental genius beats intentional evil! What a world!'],
'luke_phil':['Luke beat his own dad! Thanksgiving is going to be WEIRD!','Phil is proud AND concussed! That\'s parenting!','Like father, unlike son. Son wins.','Phil taught Luke everything. Luke learned nothing. Luke won anyway.'],
'luke_gloria':['Luke avoided the chancla by not knowing it was coming!','Gloria can\'t hit what she can\'t predict! Luke is unpredictable!','Luke accidentally disarmed Gloria. Neither of them knows how.','Gloria is confused and angry. Luke is confused and happy.'],
'luke_lorelai':['Luke beat the fast-talker by not understanding words!','Lorelai\'s verbal attacks do nothing to someone who doesn\'t listen!','Luke tuned out Lorelai\'s monologue and won! Classic Luke!','Luke thinks Gilmore Girls is a band.'],
'luke_emily':['Emily\'s disapproval bounced off Luke! He doesn\'t know what DAR means!','Luke is immune to passive-aggression! He doesn\'t notice it!','Emily tried a withering stare. Luke was looking the other way.','Luke beat Emily and asked if she was somebody\'s grandma.'],
'luke_luked':['Two Lukes fought! The dumber one won! Life isn\'t fair!','Luke D lost to Luke D! Wait, the other Luke. The dumb one. Yeah.','Diner Luke vs Dunphy Luke! Dunphy chaos wins!','Aw jeez, Luke just lost to a kid named Luke. Rock bottom.'],
'luke_frankie':['Luke beat another mom! He feels nothing!','Frankie lost to a teenager. This is the Heck legacy.','Luke and Frankie: equally confused, only one winner.','Frankie is adding Luke to her list of disappointments.'],
'luke_axl':['Two dumb guys fought! The accidentally smart one won!','Axl lost to a kid who ate a candle! Humiliation complete!','Luke out-dumbed Axl and somehow that means he wins!','The battle of who\'s less aware. Luke wins by losing track.'],
'luke_sue':['Luke beat Sue! She congratulated him! He was confused!','Sue and Luke should form a support group for confused teenagers.','Luke won and still doesn\'t understand the rules. Neither does Sue.','Two pure hearts fought. Pure chaos beats pure optimism.'],
'luke_jackson':['Luke pet the cat mid-fight and somehow won!','Jackson was confused by Luke. That\'s Luke\'s superpower.','Luke thought Jackson was his pet. Jackson objects.','Luke accidentally sat on Jackson. It counted as a move.'],

// ── LORELAI vs everyone ──
'lorelai_johnny':['Lorelai talked Johnny into a coma! Words beat kicks!','Johnny never stood a chance against a Gilmore monologue!','Lorelai caffeinated her way to victory over Cobra Kai!','Johnny needs a coffee. Lorelai needs another coffee.'],
'lorelai_daniel':['Lorelai karate-chopped with her words! Verbal Miyagi-Do!','Daniel couldn\'t wax off Lorelai\'s verbal assault!','Two stubborn people fought. The one with caffeine wins.','Lorelai is reviewing LaRusso Auto on Yelp. One star.'],
'lorelai_kreese':['Lorelai talked KREESE into submission?! She\'s that good!','Kreese showed no mercy. Lorelai showed no silence. She wins.','Even Vietnam didn\'t prepare Kreese for Lorelai Gilmore.','Lorelai offers Kreese a coffee. He is confused. She wins.'],
'lorelai_phil':['Two fast talkers! Lorelai\'s caffeine gives her the edge!','Phil\'s magic couldn\'t keep up with Lorelai\'s mouth!','Lorelai wins! Sookie is making a celebration cake!','Phil and Lorelai could host a talk show. A FAST one.'],
'lorelai_gloria':['Lorelai outcaffeinated a COLOMBIAN! This is international news!','Stars Hollow coffee > Colombian coffee! (Don\'t tell Gloria)','Lorelai talked faster than Gloria could throw!','Two iconic moms. One coffee cup. Winner: Lorelai.'],
'lorelai_luke':['Lorelai beat a teenager! She feels weird about it!','Luke reminds Lorelai of Rory. If Rory was much dumber.','Lorelai wins and immediately calls Rory to tell her.','Luke doesn\'t know who Lorelai is. Lorelai won\'t stop talking.'],
'lorelai_emily':['Lorelai beat her own mother! Friday dinner is CANCELLED!','Emily vs Lorelai! The eternal Gilmore battle! Lorelai wins THIS time!','Lorelai and Emily will fight about this fight for 7 seasons.','Emily is cutting Lorelai out of the will. Again.'],
'lorelai_luked':['Lorelai beat Luke! This is going to make the diner SO awkward!','Luke poured coffee. Lorelai drank it and KEPT FIGHTING!','Their relationship is complicated. And now also violent.','Lorelai wins and Luke is somehow still in love.'],
'lorelai_frankie':['Two tired moms fought! The caffeinated one won!','Frankie needs coffee. Lorelai IS coffee.','Lorelai and Frankie bonding over exhaustion mid-fight.','Frankie wishes she had Lorelai\'s energy. And budget.'],
'lorelai_axl':['Lorelai beat a shirtless teenager and feels NOTHING!','Axl tried to be cool. Lorelai invented cool.','Put a shirt on, Axl. Lorelai has standards.','Lorelai roasted Axl so hard his abs deflated.'],
'lorelai_sue':['Lorelai beat Sue and they became best friends immediately!','Sue wants to move to Stars Hollow now! Lorelai says maybe!','Two unstoppable optimists! Caffeine breaks the tie!','Lorelai sees young Rory in Sue. Sue sees an idol in Lorelai.'],
'lorelai_jackson':['Lorelai tried to adopt Jackson mid-fight! He said no.','Jackson and Lorelai have the same energy: chaotic warmth.','Lorelai wins! Paul Anka the dog is jealous of Jackson.','Jackson slow-blinked. Lorelai took it as friendship.'],

// ── EMILY vs everyone ──
'emily_johnny':['Emily withered an 80s karate man with ONE look!','Emily doesn\'t need karate. She has social standing.','Johnny has survived Vietnam-era Cobra Kai but not Emily Gilmore.','Emily is calling her lawyer about Johnny\'s headband. It\'s hideous.'],
'emily_daniel':['Emily disapproves of dojos. And Daniel. And everything.','Miyagi-Do couldn\'t counter a Connecticut socialite!','Emily is writing a strongly worded letter to LaRusso Auto.','Daniel bowed. Emily did not. Emily won.'],
'emily_kreese':['Two ice-cold people fought. Emily was COLDER.','Kreese showed no mercy. Emily showed no emotion. Emily wins.','Emily\'s passive-aggression beats Kreese\'s actual aggression!','Emily fired Kreese mid-fight. He wasn\'t even employed by her.'],
'emily_phil':['Emily just destroyed Phil\'s self-esteem with one sentence!','Phil tried to be charming. Emily is immune to charm.','Emily disapproves of magic, real estate, AND Phil Dunphy.','Phil needs therapy after that fight. Emily recommends nobody.'],
'emily_gloria':['Emily caught the chancla and handed it to a maid!','Two fierce women! The one with a martini wins!','Emily and Gloria should start a business. Or a war.','Gloria\'s passion met Emily\'s control. Control wins.'],
'emily_luke':['Emily disapproved of Luke so hard he forgot how to fight!','Luke reminds Emily of a young man she once fired.','Emily just grounded a stranger\'s child. Through combat.','Luke needs an adult. Emily IS the adult. He still needs help.'],
'emily_lorelai':['Emily beat Lorelai! Friday night dinner is MANDATORY now!','Lorelai lost to her mother. Season 1 flashbacks.','Emily will use this victory at every dinner for the next decade.','Lorelai is moving further from Hartford. Much further.'],
'emily_luked':['Emily stunned Luke Danes with one disappointed look!','Luke\'s diner does NOT meet Emily\'s standards. Neither does Luke.','Emily would never eat at Luke\'s. Now Luke knows why.','Aw jeez. Emily just out-grumped the grumpiest man in Stars Hollow.'],
'emily_frankie':['Emily looked at Frankie\'s house and Frankie took psychic damage!','Frankie\'s life quality does not meet Emily\'s minimum standards!','Emily disapproves of the Hecks\' everything. Frankie agrees.','Emily offered Frankie decorating advice mid-fight. Brutal.'],
'emily_axl':['Emily made Axl put his shirt ON through sheer disapproval!','Emily\'s stare is stronger than Axl\'s abs!','Axl has never felt more judged. And he lives with Frankie.','Emily disapproves of Axl. Axl doesn\'t know what DAR means.'],
'emily_sue':['Emily beat Sue and Sue asked to join the DAR!','Sue\'s optimism vs Emily\'s pessimism! Pessimism wins!','Emily sees potential in Sue. No she doesn\'t. She lied.','Sue thinks Emily is "really elegant!" Emily thinks Sue is loud.'],
'emily_jackson':['Emily tried to have Jackson removed. Jackson removed HER.','Wait— Emily BEAT the cat? Through sheer will?','Emily disapproves of pets. Jackson disapproves of Emily.','Jackson knocked a vase off. Emily fired a maid over it.'],

// ── LUKE DANES vs everyone ──
'luked_johnny':['Luke served Johnny a knuckle sandwich. No tip.','Aw jeez, Johnny. You just got diner\'d.','Flannel power beats Cobra Kai! Take that, headband!','Luke just wanted to be left alone. Johnny wouldn\'t leave.'],
'luked_daniel':['Luke broke a coffee pot over karate! He\'s buying a new one.','Daniel tried to wax. Luke tried to not be here. Luke won.','Luke Danes: better at fighting than at expressing emotions.','Aw jeez. Luke beat another regular.'],
'luked_kreese':['Luke Danes beat Kreese! The diner is now a dojo!','Flannel beats military training! Who knew!','Kreese showed no mercy. Luke showed no patience. Luke wins.','Luke hit Kreese with a pot so hard it echoed across Stars Hollow.'],
'luked_phil':['Luke poured hot coffee on Phil\'s magic act!','Phil tried to sell Luke a house. Luke already has a diner.','Aw jeez, Phil. Stop being so... Phil.','Luke and Phil should never meet again. For everyone\'s sake.'],
'luked_gloria':['Luke Danes dodged the chancla! Diner reflexes!','Gloria threw a shoe. Luke threw a pot. Diner pot wins.','Luke\'s grumpiness overpowered Gloria\'s fury! Impressive!','Aw jeez. Gloria is scarier than Taylor. Almost.'],
'luked_luke':['Luke Danes beats Luke Dunphy! The REAL Luke!','There can only be one Luke. Diner Luke is the one.','Confused Luke meets angry Luke. Angry wins.','Luke D just established Luke dominance.'],
'luked_lorelai':['Luke beat Lorelai and now their relationship is WEIRD!','Luke and Lorelai fighting is basically just a Tuesday.','Lorelai lost! She\'s going to Luke\'s diner to complain about it!','Their love language is violence now, I guess.'],
'luked_emily':['Luke Danes beat Emily Gilmore! He\'s UNINVITED from Friday dinner!','Emily is appalled! A diner owner beat her!','Luke doesn\'t care about the DAR. Emily is devastated.','Aw jeez. Luke just ended the Gilmore social hierarchy.'],
'luked_frankie':['Two blue-collar heroes fought! The one with coffee won!','Frankie and Luke should open a diner together. A sad diner.','Luke\'s diner vs Heck household. Diner has better food.','Frankie reminds Luke of a customer who never tips.'],
'luked_axl':['Luke hit Axl with a pot and told him to put a shirt on!','Aw jeez, Axl. Nobody wants to see that. — Luke, probably.','Luke Danes is everyone\'s angry dad now.','Axl tried to order at the diner. Luke said no.'],
'luked_sue':['Luke beat Sue and she asked for his pie recipe!','Sue wants to work at Luke\'s! Luke is horrified!','Aw jeez, Sue. Stop being so... happy.','Sue tipped Luke 200%. Luke is confused but grateful.'],
'luked_jackson':['Luke served the cat. Cats don\'t drink coffee. Luke wins.','Jackson tried to knock a mug off the counter. Luke caught it.','Aw jeez. A cat. In my diner.','Luke and Jackson glared at each other for 60 seconds. Luke won.'],

// ── FRANKIE vs everyone ──
'frankie_johnny':['Frankie just beat a karate master! Through EXHAUSTION!','Mom meltdown beats crane kick! Science can\'t explain it!','Frankie won and she still looks like she needs a nap!','The Hecks finally beat something! Frankie is calling Mike!'],
'frankie_daniel':['Frankie screamed at Daniel until he gave up! Classic mom move!','Miyagi-Do has no defense against an overtired mother!','Frankie won something! Write it on the fridge!','Daniel tried to teach Frankie karate. She fell asleep.'],
'frankie_kreese':['FRANKIE BEAT KREESE?! The mom who can barely open a jar?!','Frankie\'s scream was louder than Kreese\'s war cry!','Kreese showed no mercy. Frankie showed no energy. She still won.','Mom power beats Vietnam power! The Middle Season 47!'],
'frankie_phil':['Frankie beat the cool dad! She can\'t afford his house anyway!','Phil tried to show Frankie a house. She showed him the door.','Frankie and Phil: two parents, one winner. Neither is cool.','Phil invited Frankie to a BBQ. Frankie said she\'s busy (she\'s not).'],

function getCommentary(wId,lId,wName,lName){
  var key=wId+'_'+lId;
  if(MATCHUP[key]){
    var lines=MATCHUP[key];
    return lines[Math.floor(Math.random()*lines.length)];
  }
  // Fallback to generic only if no matchup exists
  var allPools=[betweenRoundLines,crossoverLines];
  var pool=allPools[Math.floor(Math.random()*allPools.length)];
  var line=pool[Math.floor(Math.random()*pool.length)];
  return line.replace(/{w}/g,wName).replace(/{l}/g,lName);
}

var lastFightNarration=0;
function maybeFightNarrate(){
  var now=Date.now();
  if(now-lastFightNarration<8000)return;
  if(Math.random()>0.3)return;
  lastFightNarration=now;
  // Check for low health
  if(p1&&p1.hp<25&&p1.hp>0){
    var line=lowHealthLines[Math.floor(Math.random()*lowHealthLines.length)].replace(/{name}/g,p1.char.name);
    showCommentary(line,180);speak(line);return;
  }
  if(p2&&p2.hp<25&&p2.hp>0){
    var line=lowHealthLines[Math.floor(Math.random()*lowHealthLines.length)].replace(/{name}/g,p2.char.name);
    showCommentary(line,180);speak(line);return;
  }
  var line=fightNarrationLines[Math.floor(Math.random()*fightNarrationLines.length)];
  showCommentary(line,120);speak(line);
}

// ==================== INPUT ====================
var keys={};
document.addEventListener('keydown',function(e){
  keys[e.key.toLowerCase()]=true;
  initAudio();
});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});

function updateKeyboardInput(){
  input.left=!!keys['a'];
  input.right=!!keys['d'];
  input.up=!!keys['w'];
  input.down=!!keys['s'];
  if(keys['j']&&!lastInput.punch)input.punch=true;
  if(keys['k']&&!lastInput.kick)input.kick=true;
  if(keys['l']&&!lastInput.special)input.special=true;
  lastInput.punch=!!keys['j'];
  lastInput.kick=!!keys['k'];
  lastInput.special=!!keys['l'];
}

// Touch controls
var touchDpad={left:false,right:false,up:false,down:false};
var touchBtns={punch:false,kick:false,special:false};
var prevTouchBtns={punch:false,kick:false,special:false};

function setupTouch(id,obj,key){
  var el=document.getElementById(id);
  el.addEventListener('touchstart',function(e){e.preventDefault();obj[key]=true;initAudio();},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();obj[key]=false;},{passive:false});
  el.addEventListener('touchcancel',function(e){obj[key]=false;});
  el.addEventListener('mousedown',function(e){e.preventDefault();obj[key]=true;initAudio();});
  el.addEventListener('mouseup',function(e){e.preventDefault();obj[key]=false;});
  el.addEventListener('mouseleave',function(e){obj[key]=false;});
}
setupTouch('dUp',touchDpad,'up');
setupTouch('dDown',touchDpad,'down');
setupTouch('dLeft',touchDpad,'left');
setupTouch('dRight',touchDpad,'right');
setupTouch('btnPunch',touchBtns,'punch');
setupTouch('btnKick',touchBtns,'kick');
setupTouch('btnSpecial',touchBtns,'special');

function updateTouchInput(){
  input.left=input.left||touchDpad.left;
  input.right=input.right||touchDpad.right;
  input.up=input.up||touchDpad.up;
  input.down=input.down||touchDpad.down;
  if(touchBtns.punch&&!prevTouchBtns.punch)input.punch=true;
  if(touchBtns.kick&&!prevTouchBtns.kick)input.kick=true;
  if(touchBtns.special&&!prevTouchBtns.special)input.special=true;
  prevTouchBtns.punch=touchBtns.punch;
  prevTouchBtns.kick=touchBtns.kick;
  prevTouchBtns.special=touchBtns.special;
}

// ==================== AI ====================
function updateAI(ai,target){
  if(!fightStarted||ai.stunTimer>0)return;
  var dx=target.x-ai.x;
  var dist=Math.abs(dx);
  var dirToTarget=dx>0?1:-1;
  // Difficulty settings
  var reactChance=[0.02,0.04,0.07][difficulty];
  var blockChance=[0.08,0.25,0.55][difficulty];
  var specialChance=[0.008,0.015,0.025][difficulty];
  var aggressiveness=[0.4,0.6,0.85][difficulty];

  // Reset walking state
  if(ai.state==='walking')ai.state='idle';

  // AI decision
  if(ai.state==='idle'){
    // Block incoming attacks
    if(target.state==='attacking'&&dist<120*SCALE&&Math.random()<blockChance){
      ai.facing=-dirToTarget; // face away to block
      return;
    }
    ai.facing=dirToTarget;
    // Use special if meter full
    if(ai.meter>=100&&Math.random()<specialChance*3){
      doAttack(ai,target,'special');
      return;
    }
    // Approach if far
    if(dist>100*SCALE){
      ai.x+=dirToTarget*ai.char.speed*SCALE*0.5*(ai.speedBoostTimer>0?2:1);
      ai.state='walking';
    }else if(dist>50*SCALE){
      // Attack range
      if(Math.random()<reactChance*aggressiveness){
        doAttack(ai,target,Math.random()>0.4?'punch':'kick');
      }else if(Math.random()<0.02){
        // Jump sometimes
        if(ai.grounded){ai.vy=-(ai.char.jump||10)*SCALE;ai.grounded=false;}
      }else{
        ai.x+=dirToTarget*ai.char.speed*SCALE*0.3*(ai.speedBoostTimer>0?2:1);
      }
    }else{
      // Too close, maybe retreat or attack
      if(Math.random()<reactChance*aggressiveness*1.5){
        doAttack(ai,target,Math.random()>0.5?'punch':'kick');
      }else if(Math.random()<0.03){
        ai.x-=dirToTarget*ai.char.speed*SCALE*0.5;
      }
    }
    // Random jump
    if(ai.grounded&&Math.random()<0.005)ai.vy=-(ai.char.jump||10)*SCALE;
    // Crouch to dodge sometimes (hard only)
    if(difficulty===2&&target.state==='attacking'&&!target.crouching&&Math.random()<0.1){
      ai.crouching=true;
      setTimeout(function(){ai.crouching=false;},500);
    }
  }
}

// ==================== ATTACKS ====================

function checkHit(attacker,defender){
  if(attacker.hitDealt)return;
  var range,dmg;
  if(attacker.attackType==='punch'){range=55*SCALE;dmg=attacker.char.punchDmg;}
  else if(attacker.attackType==='kick'){range=75*SCALE;dmg=attacker.char.kickDmg;}
  else{range=70*SCALE;dmg=attacker.char.specialDmg;}

  var hitFrame=attacker.attackType==='punch'?3:5;
  if(attacker.attackType==='special')hitFrame=8;
  if(attacker.attackFrame<hitFrame)return;

  var dx=defender.x-attacker.x;
  var dist=Math.abs(dx);
  var dir=dx>0?1:-1;
  if(dir!==attacker.facing)return;
  if(dist>range)return;

  // Vertical check
  var dy=Math.abs((defender.y-45*SCALE)-(attacker.y-45*SCALE));
  if(dy>60*SCALE)return;

  // Crouch dodge high attacks
  if(defender.crouching&&!attacker.crouching&&attacker.attackType!=='kick')return;

  attacker.hitDealt=true;

  // Counter check (Daniel special)
  if(defender.counterActive){
    defender.counterActive=false;
    dmg=0;
    // Counter attack
    attacker.hp-=15;
    attacker.flashTimer=15;
    shakeTimer=10;
    spawnParticles(attacker.x,attacker.y-50*SCALE,'#88ccff',8);
    sfxPunch();
    speak('Countered!');
    defender.meter=Math.min(100,defender.meter+15);
    return;
  }

  // Block check: hold direction AWAY from opponent to block
  var isBlocking=false;
  if(defender===p1){
    // Opponent is to the right => hold left to block; opponent to left => hold right
    var oppDir=attacker.x>defender.x?1:-1;
    isBlocking=(input.left&&oppDir===1)||(input.right&&oppDir===-1);
  }else{
    // AI block: facing away from target means blocking
    var aiOppDir=dx>0?1:-1;
    isBlocking=defender.facing!==aiOppDir;
  }

  if(isBlocking&&defender.stunTimer<=0){
    dmg=Math.floor(dmg*0.25);
    sfxBlock();
    defender.meter=Math.min(100,defender.meter+15);
    spawnParticles(defender.x,defender.y-45*SCALE,'#aaaaff',4);
  }else{
    if(attacker.attackType==='punch')sfxPunch();
    else if(attacker.attackType==='kick')sfxKick();
    else sfxSpecial();
    // Knockback
    defender.x+=attacker.facing*(attacker.attackType==='special'?25:18)*SCALE;
  }

  // Kreese chokehold: sustained damage
  if(attacker.char.id==='kreese'&&attacker.attackType==='special'&&!isBlocking){
    defender.stunTimer=45;
    // Extra ticks
    var ticks=0;
    var interval=setInterval(function(){
      if(ticks>=3||defender.hp<=0){clearInterval(interval);return;}
      defender.hp-=5;defender.flashTimer=8;
      spawnParticles(defender.x,defender.y-50*SCALE,'#ff4444',3);
      ticks++;
    },300);
  }

  // Axl powered-up punch bonus
  if(attacker.char.id==='axl'&&attacker.axlPoweredUp&&attacker.attackType==='punch'){
    dmg*=3;attacker.axlPoweredUp=false;
    spawnParticles(defender.x,defender.y-50*SCALE,'#ffcc00',10);
  }
  defender.hp-=dmg;
  defender.flashTimer=15;
  shakeTimer=attacker.attackType==='special'?18:10;
  hitStopTimer=attacker.attackType==='special'?6:3;
  // Damage number
  dmgNumbers.push({x:defender.x+(Math.random()-0.5)*20*SCALE,y:defender.y-70*SCALE,text:'-'+dmg,life:50,vy:-2*SCALE,big:attacker.attackType==='special',color:isBlocking?'#8888ff':'#ff4444'});
  // Combo
  if(attacker===p1){comboCount++;comboTimer=90;if(comboCount>=3)dmgNumbers.push({x:attacker.x,y:attacker.y-90*SCALE,text:comboCount+'x COMBO!',life:60,vy:-1.5*SCALE,big:true,color:'#f7c948'});}
  crowdReaction=Math.min(10,crowdReaction+(attacker.attackType==='special'?6:3));
  spawnParticles(defender.x+attacker.facing*(-10)*SCALE,defender.y-45*SCALE,'#ff6b35',attacker.attackType==='special'?16:8);
  if(attacker.attackType==='special')spawnParticles(defender.x,defender.y-55*SCALE,'#f7c948',8);

  attacker.meter=Math.min(100,attacker.meter+10);
  defender.meter=Math.min(100,defender.meter+5);

  if(defender.hp<=0)defender.hp=0;
}

// ==================== PARTICLES ====================
function spawnParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    particles.push({
      x:x,y:y,
      vx:(Math.random()-0.5)*8*SCALE,
      vy:(Math.random()-0.5)*8*SCALE-3*SCALE,
      life:25+Math.random()*25,
      maxLife:50,
      color:color,
      size:2+Math.random()*6
    });
  }
}

// ==================== UPDATE ====================
function update(){
  if(gameState!=='fight')return;
  if(!p1||!p2)return;

  if(bannerTimer>0){bannerTimer--;if(!fightStarted)return;}
  if(hitStopTimer>0){hitStopTimer--;return;}

  // Combo decay
  if(comboTimer>0){comboTimer--;}else{comboCount=0;}

  // Input
  input.punch=false;input.kick=false;input.special=false;
  updateKeyboardInput();
  updateTouchInput();

  if(!fightStarted)return;

  // Round timer
  roundTimer--;
  if(roundTimer<=0){
    endRound(p1.hp>=p2.hp?p1:p2,p1.hp>=p2.hp?p2:p1);
    return;
  }

  // Update specials button glow
  document.getElementById('btnSpecial').classList.toggle('ready',p1.meter>=100);

  // Player 1 movement
  if(p1.stunTimer>0){p1.stunTimer--;}
  else{
    var spd=p1.char.speed*SCALE*(p1.speedBoostTimer>0?2:1);
    if(p1.state!=='attacking'){
      if(input.left)p1.x-=spd;
      if(input.right)p1.x+=spd;
      p1.crouching=input.down;
      if(input.up&&p1.grounded){p1.vy=-(p1.char.jump||11)*SCALE;p1.grounded=false;}
      // Auto-face opponent
      p1.facing=p2.x>p1.x?1:-1;
    }
    if(input.punch)doAttack(p1,p2,'punch');
    if(input.kick)doAttack(p1,p2,'kick');
    if(input.special)doAttack(p1,p2,'special');
  }

  // Player 2 AI
  if(p2.stunTimer>0){p2.stunTimer--;}
  else{updateAI(p2,p1);}

  // Physics for both
  [p1,p2].forEach(function(f){
    // Gravity
    if(!f.grounded){
      f.vy+=0.6*SCALE;
      f.y+=f.vy;
      // Platform collision (only when falling)
      if(f.vy>0){
        for(var pi=0;pi<platforms.length;pi++){
          var pl=platforms[pi];
          if(f.x>pl.x&&f.x<pl.x+pl.w&&f.y>=pl.y&&f.y-f.vy<pl.y+2*SCALE){
            f.y=pl.y;f.vy=0;f.grounded=true;f.onPlatform=pi;break;
          }
        }
      }
      if(f.y>=FLOOR_Y){
        f.y=FLOOR_Y;f.vy=0;f.grounded=true;f.onPlatform=-1;
        if(f.jacksonPounce){
          f.jacksonPounce=false;
          var t=f===p1?p2:p1;
          if(Math.abs(f.x-t.x)<70*SCALE){
            t.hp-=f.char.specialDmg;t.flashTimer=15;shakeTimer=15;
            spawnParticles(t.x,t.y-50*SCALE,'#ffcc00',10);sfxPunch();
          }
        }
      }
    }
    // Fall off platform
    if(f.grounded&&f.onPlatform>=0){
      var pl=platforms[f.onPlatform];
      if(f.x<pl.x||f.x>pl.x+pl.w){f.grounded=false;f.onPlatform=-1;}
    }
    // Bounds
    f.x=Math.max(30*SCALE,Math.min(W-30*SCALE,f.x));
    // Attack timer
    if(f.state==='attacking'){
      f.attackFrame++;
      if(f.attackFrame>=f.attackDur){f.state='idle';f.attackFrame=0;}
    }
    // Flash
    if(f.flashTimer>0)f.flashTimer--;
    // Speed boost
    if(f.speedBoostTimer>0)f.speedBoostTimer--;
  });

  // Prevent overlap
  var overlap=60*SCALE-Math.abs(p1.x-p2.x);
  if(overlap>0){
    var push=overlap/2;
    if(p1.x<p2.x){p1.x-=push;p2.x+=push;}
    else{p1.x+=push;p2.x-=push;}
  }

  // Hit detection
  if(p1.state==='attacking')checkHit(p1,p2);
  if(p2.state==='attacking')checkHit(p2,p1);

  // Projectiles
  for(var i=projectiles.length-1;i>=0;i--){
    var pr=projectiles[i];
    pr.x+=pr.vx;pr.y+=pr.vy;pr.life--;
    if(pr.life<=0){projectiles.splice(i,1);continue;}
    // Check hit
    var target=pr.owner===p1?p2:p1;
    if(Math.abs(pr.x-target.x)<40*SCALE&&Math.abs(pr.y-(target.y-45*SCALE))<50*SCALE){
      target.hp-=pr.dmg;target.flashTimer=15;shakeTimer=12;
      target.meter=Math.min(100,target.meter+5);
      pr.owner.meter=Math.min(100,pr.owner.meter+10);
      spawnParticles(pr.x,pr.y,'#ff6b35',8);
      sfxPunch();
      if(target.hp<0)target.hp=0;
      projectiles.splice(i,1);
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.15;pt.life--;
    if(pt.life<=0)particles.splice(i,1);
  }

  // Shake
  if(shakeTimer>0){
    shakeTimer--;
    shakeX=(Math.random()-0.5)*shakeTimer*0.8;
    shakeY=(Math.random()-0.5)*shakeTimer*0.8;
  }else{shakeX=0;shakeY=0;}

  // Mid-fight narration
  maybeFightNarrate();

  // KO check
  if(p1.hp<=0){endRound(p2,p1);}
  else if(p2.hp<=0){endRound(p1,p2);}
}

function endRound(winner,loser){
  fightStarted=false;
  stopBGM();
  var perfect=winner.hp>=100;
  if(perfect){
    showBanner('PERFECT K.O.!',120);
    var perfectLines=['Perfect K.O.! Absolutely flawless!','PERFECT! Not a scratch! That\'s disrespectful!','PERFECT K.O.! They didn\'t even get touched! Call the police!','FLAWLESS! That wasn\'t a fight, that was a demonstration!'];
    speak(perfectLines[Math.floor(Math.random()*perfectLines.length)]);
  }else{
    showBanner('K.O.!',90);sfxKO();
    var koLines=['K.O.!','Knockout!','DOWN GOES '+loser.char.name+'!','And that\'s all she wrote!','GOODNIGHT '+loser.char.name+'!','Someone call an ambulance! Actually call two!'];
    speak(koLines[Math.floor(Math.random()*koLines.length)]);
  }

  if(winner===p1)p1Rounds++;else p2Rounds++;

  var comm=getCommentary(winner.char.id,loser.char.id,winner.char.name,loser.char.name);
  setTimeout(function(){
    showCommentary(comm,240);
    speak(comm);
  },1500);

  // Check match over
  if(p1Rounds>=1||p2Rounds>=1){
    setTimeout(function(){
      saveStats(winner.char.id,true);
      saveStats(loser.char.id,false);
      // Tournament mode: next opponent or championship
      if(tournamentMode&&winner===p1&&tournamentQueue.length>0){
        tournamentWins++;
        var nextIdx=tournamentQueue.shift();
        gameState='fight';showScreen(null);
        document.getElementById('controls').style.display='block';
        p2=createFighter(CHARS[nextIdx],W*0.7,-1);
        p1.hp=Math.min(100,p1.hp+30);p1.meter=Math.min(50,p1.meter);
        p1.state='idle';p1.stateTimer=0;p1.stunTimer=0;p1.speedBoostTimer=0;p1.counterActive=false;
        round=1;p1Rounds=0;p2Rounds=0;
        showBanner('OPPONENT '+(tournamentWins+1)+'/'+CHARS.length,120);
        speak('Next opponent! '+CHARS[nextIdx].name+'! You have '+tournamentWins+' wins!');
        setTimeout(function(){startRound();},2000);
        return;
      }
      if(tournamentMode&&winner===p1&&tournamentQueue.length===0){
        tournamentWins++;tournamentMode=false;
        gameState='victory';showScreen('victoryScreen');
        document.getElementById('controls').style.display='none';
        document.getElementById('winnerName').textContent='🏆 CHAMPION! 🏆';
        document.getElementById('winEmoji').textContent=winner.char.emoji;
        document.getElementById('winQuote').textContent=winner.char.name+' defeated ALL '+tournamentWins+' opponents!';
        speak(winner.char.name+' is the TV Showdown CHAMPION! '+tournamentWins+' victories! Unbelievable!');
        return;
      }
      if(tournamentMode&&winner===p2){tournamentMode=false;}
      gameState='victory';
      showScreen('victoryScreen');
      document.getElementById('controls').style.display='none';
      document.getElementById('winnerName').textContent=winner.char.name+' WINS!';
      document.getElementById('winEmoji').textContent=winner.char.emoji;
      var wq=winner.char.winQuotes?winner.char.winQuotes[Math.floor(Math.random()*winner.char.winQuotes.length)]:winner.char.winQuote;
      document.getElementById('winQuote').textContent='"'+wq+'"';
      speak(winner.char.name+' wins the match! '+wq);
      if(tournamentMode){
        document.getElementById('winQuote').textContent+='\nTournament over after '+tournamentWins+' wins.';
        tournamentMode=false;
      }
    },3500);
  }else{
    round++;
    setTimeout(function(){startRound();},3500);
  }
}

// ==================== DRAW ====================
var bgFrame=0;
function drawBackground(){
  bgFrame++;
  // Sky gradient with subtle color shift
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#080812');
  grad.addColorStop(0.4,'#10102a');
  grad.addColorStop(0.7,'#1a1a35');
  grad.addColorStop(1,'#12121f');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // Animated spotlights
  var t=bgFrame*0.015;
  ctx.globalAlpha=0.06;
  var spot1X=W*0.3+Math.sin(t)*W*0.1;
  var spot2X=W*0.7+Math.sin(t+2)*W*0.1;
  var sg1=ctx.createRadialGradient(spot1X,0,0,spot1X,FLOOR_Y*0.5,W*0.3);
  sg1.addColorStop(0,'#ff6b35');sg1.addColorStop(1,'transparent');
  ctx.fillStyle=sg1;ctx.fillRect(0,0,W,FLOOR_Y);
  var sg2=ctx.createRadialGradient(spot2X,0,0,spot2X,FLOOR_Y*0.5,W*0.3);
  sg2.addColorStop(0,'#4488ff');sg2.addColorStop(1,'transparent');
  ctx.fillStyle=sg2;ctx.fillRect(0,0,W,FLOOR_Y);
  ctx.globalAlpha=1;

  // City silhouette (darker, more depth)
  ctx.fillStyle='#0a0a18';
  var buildings=[[0.02,0.3],[0.09,0.5],[0.16,0.35],[0.23,0.55],[0.3,0.4],[0.37,0.62],[0.44,0.42],[0.51,0.55],[0.58,0.38],[0.65,0.48],[0.72,0.58],[0.79,0.35],[0.86,0.5],[0.93,0.42]];
  buildings.forEach(function(b,bi){
    var bx=b[0]*W,bw=W*0.065,bh=b[1]*FLOOR_Y*0.4;
    ctx.fillRect(bx,FLOOR_Y-bh-20,bw,bh+20);
    ctx.fillStyle='#1a1a30';
    var wi=0;
    for(var wy=FLOOR_Y-bh;wy<FLOOR_Y-25;wy+=14){
      for(var wx=bx+4;wx<bx+bw-4;wx+=10){
        if(((bi*31+wi*17+7)%10)>4){
          var flicker=((bi*7+wi*13+bgFrame)%200)>190?'#4a4a70':'#1a1a30';
          ctx.fillStyle=flicker;
          ctx.fillRect(wx,wy,4,5);
        }
        wi++;
      }
    }
    ctx.fillStyle='#0a0a18';
  });

  // Crowd silhouettes (row of heads above floor)
  ctx.fillStyle='#0e0e1a';
  for(var ci=0;ci<Math.floor(W/18);ci++){
    var cx=ci*18+9,cy=FLOOR_Y-4;
    var bob=Math.sin(bgFrame*0.04+ci*0.7)*(2+crowdReaction*0.5);
    ctx.beginPath();ctx.arc(cx,cy+bob,6,0,Math.PI*2);ctx.fill();
    ctx.fillRect(cx-4,cy+bob+4,8,6);
  }

  // Floor with reflection
  var floorGrad=ctx.createLinearGradient(0,FLOOR_Y,0,H);
  floorGrad.addColorStop(0,'#2a2a45');
  floorGrad.addColorStop(0.15,'#222238');
  floorGrad.addColorStop(1,'#12121f');
  ctx.fillStyle=floorGrad;
  ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);

  // Floor highlight line
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;ctx.globalAlpha=0.4;
  ctx.beginPath();ctx.moveTo(0,FLOOR_Y);ctx.lineTo(W,FLOOR_Y);ctx.stroke();
  ctx.globalAlpha=0.08;
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,FLOOR_Y+4);ctx.lineTo(W,FLOOR_Y+4);ctx.stroke();
  ctx.globalAlpha=1;

  // Stage markers
  ctx.fillStyle='rgba(255,107,53,0.15)';
  ctx.fillRect(W*0.25-2,FLOOR_Y,4,8);
  ctx.fillRect(W*0.75-2,FLOOR_Y,4,8);

  // Crowd signs (big legible signs held up)
  var signFrame=Math.floor(bgFrame/200)%bgSigns.length;
  for(var si=0;si<3;si++){
    var idx=(signFrame+si*7)%bgSigns.length;
    var sx=W*(0.15+si*0.3)+Math.sin(bgFrame*0.015+si*2)*12;
    var sy=FLOOR_Y-40-Math.sin(bgFrame*0.03+si)*5;
    var signText=bgSigns[idx];
    ctx.font='bold '+Math.round(11*SCALE)+'px sans-serif';
    var tw=ctx.measureText(signText).width+16;
    // Sign background
    ctx.fillStyle='rgba(255,255,220,0.92)';
    ctx.beginPath();ctx.roundRect(sx-tw/2,sy-16,tw,24,4);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(sx-tw/2,sy-16,tw,24,4);ctx.stroke();
    // Sign text
    ctx.fillStyle='#1a1a1a';ctx.textAlign='center';
    ctx.fillText(signText,sx,sy+2);
    // Stick
    ctx.fillStyle='rgba(180,160,120,0.7)';ctx.fillRect(sx-1.5,sy+8,3,16);
  }
  ctx.textAlign='left';

  // Crowd reaction (jumps higher after hits)
  if(crowdReaction>0)crowdReaction-=0.5;

  // Draw platforms
  for(var pi=0;pi<platforms.length;pi++){
    var pl=platforms[pi];
    var plGrad=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+pl.h);
    plGrad.addColorStop(0,'#3a3a5a');plGrad.addColorStop(1,'#2a2a40');
    ctx.fillStyle=plGrad;
    ctx.beginPath();ctx.roundRect(pl.x,pl.y,pl.w,pl.h,3);ctx.fill();
    // Platform glow
    ctx.strokeStyle='rgba(255,107,53,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(pl.x,pl.y,pl.w,pl.h,3);ctx.stroke();
    // Support brackets
    ctx.fillStyle='#2a2a3a';
    ctx.fillRect(pl.x+5,pl.y+pl.h,3,12*SCALE);
    ctx.fillRect(pl.x+pl.w-8,pl.y+pl.h,3,12*SCALE);
  }
}

function drawCharacter(f,isP1){
  var c=f.char;
  var x=f.x,y=f.y;
  var s=SCALE;
  var facing=f.facing;
  var crouch=f.crouching?0.7:1;
  var flash=f.flashTimer>0&&f.flashTimer%4<2;

  ctx.save();
  // Idle bob
  var bob=0;
  if(f.state==='idle'&&f.grounded&&f.stunTimer<=0){
    bob=Math.sin(Date.now()*0.005+(isP1?0:Math.PI))*2*s;
  }
  var cs=c.size||1;
  ctx.translate(x,y+bob);
  if(facing<0)ctx.scale(-1,1);
  ctx.scale(cs,cs);
  ctx.translate(0,(1-cs)*80*s);

  // Shadow on floor
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(0,-bob-(1-cs)*80*s,20*s*cs,5*s,0,0,Math.PI*2);ctx.fill();

  var headY=-80*s*crouch;
  var torsoY=-55*s*crouch;
  var torsoH=35*s;
  var legY=-20*s*crouch;
  var legH=20*s;

  // Attack animations
  var armExtend=0;
  var legExtend=0;
  var kickLeg=false;
  if(f.state==='attacking'){
    var prog=f.attackFrame/f.attackDur;
    var swing=Math.sin(prog*Math.PI);
    if(f.attackType==='punch'){armExtend=swing*35*s;}
    if(f.attackType==='kick'){legExtend=swing*40*s;kickLeg=true;}
    if(f.attackType==='special'){armExtend=swing*25*s;legExtend=swing*15*s;}
  }

  if(flash){ctx.globalAlpha=0.5;}

  // Stun indicator
  if(f.stunTimer>0){
    ctx.globalAlpha=0.4+Math.sin(Date.now()*0.02)*0.3;
    // Stars around head
    ctx.fillStyle='#f7c948';ctx.font=(10*s)+'px sans-serif';
    ctx.fillText('★',10*s,headY-10*s);
    ctx.fillText('★',-15*s,headY-5*s);
    ctx.fillText('★',5*s,headY-20*s);
    ctx.globalAlpha=1;if(flash)ctx.globalAlpha=0.5;
  }

  // Speed boost aura
  if(f.speedBoostTimer>0){
    ctx.strokeStyle='rgba(255,200,50,0.4)';ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(0,torsoY+torsoH/2,30*s,50*s*crouch,0,0,Math.PI*2);ctx.stroke();
  }

  // Counter shield
  if(f.counterActive){
    ctx.strokeStyle='rgba(100,180,255,0.5)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,torsoY+torsoH/2,40*s,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(100,180,255,0.3)';
    ctx.beginPath();ctx.arc(0,torsoY+torsoH/2,45*s,0,Math.PI*2);ctx.stroke();
  }

  // === LEGS ===
  ctx.fillStyle=c.pants||c.shirt||'#444';
  var footY=0; // relative to y (which is floor)
  if(c.dress){
    // Dress/skirt
    ctx.fillStyle=c.shirt;
    ctx.beginPath();
    ctx.moveTo(-15*s,torsoY+torsoH);
    ctx.lineTo(15*s,torsoY+torsoH);
    ctx.lineTo(20*s,footY);
    ctx.lineTo(-20*s,footY);
    ctx.fill();
  }else{
    // Left leg
    ctx.fillRect(-12*s,legY,10*s,legH);
    // Right leg
    if(kickLeg){
      ctx.save();
      ctx.translate(5*s,legY);
      ctx.rotate(-0.5*legExtend/(40*s));
      ctx.fillRect(0,0,10*s,legH+legExtend*0.5);
      ctx.restore();
    }else{
      ctx.fillRect(5*s,legY,10*s,legH);
    }
  }

  // Shoes
  ctx.fillStyle='#222';
  ctx.fillRect(-14*s,footY-4*s,12*s,4*s);
  if(!kickLeg)ctx.fillRect(4*s,footY-4*s,12*s,4*s);

  // === TORSO ===
  var torsoColor=c.gi||c.shirt||'#666';
  ctx.fillStyle=torsoColor;
  ctx.fillRect(-15*s,torsoY,30*s,torsoH);

  // Gi belt
  if(c.gi){
    ctx.fillStyle=c.id==='johnny'?'#222':'#333';
    ctx.fillRect(-15*s,torsoY+torsoH*0.6,30*s,4*s);
  }

  // Flannel pattern (Luke Danes)
  if(c.flannel){
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
    for(var ly=torsoY;ly<torsoY+torsoH;ly+=6*s){
      ctx.beginPath();ctx.moveTo(-15*s,ly);ctx.lineTo(15*s,ly);ctx.stroke();
    }
    for(var lx=-15*s;lx<15*s;lx+=8*s){
      ctx.beginPath();ctx.moveTo(lx,torsoY);ctx.lineTo(lx,torsoY+torsoH);ctx.stroke();
    }
  }

  // Blazer (Emily)
  if(c.blazer){
    ctx.fillStyle='#8a7a6a';
    ctx.fillRect(-17*s,torsoY,6*s,torsoH);
    ctx.fillRect(11*s,torsoY,6*s,torsoH);
    // Lapels
    ctx.strokeStyle='#666';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-5*s,torsoY);ctx.lineTo(0,torsoY+15*s);ctx.lineTo(5*s,torsoY);ctx.stroke();
  }

  // === ARMS ===
  ctx.fillStyle=c.gi?torsoColor:(c.id==='emily'?'#e8c9a0':'#dbb89a');
  // Back arm
  ctx.fillRect(-18*s,torsoY+5*s,6*s,25*s);
  // Front arm (punching arm)
  ctx.save();
  ctx.translate(14*s,torsoY+8*s);
  ctx.fillRect(0,0,6*s+armExtend,20*s);
  // Fist
  if(armExtend>5){
    ctx.fillStyle='#dbb89a';
    ctx.fillRect(6*s+armExtend-5*s,-2*s,8*s,10*s);
  }
  ctx.restore();

  // === HEAD ===
  ctx.fillStyle='#e8c9a0';
  var headR=14*s;
  ctx.beginPath();ctx.arc(0,headY,headR,0,Math.PI*2);ctx.fill();

  // Eyes
  ctx.fillStyle='#222';
  ctx.fillRect(-6*s,headY-3*s,3*s,4*s);
  ctx.fillRect(3*s,headY-3*s,3*s,4*s);

  // Mouth
  if(f.state==='attacking'){
    ctx.fillRect(-4*s,headY+5*s,8*s,3*s);
  }else if(f.stunTimer>0){
    ctx.beginPath();ctx.arc(0,headY+6*s,3*s,0,Math.PI*2);ctx.fill();
  }else{
    ctx.fillRect(-3*s,headY+5*s,6*s,2*s);
  }

  // === CHARACTER-SPECIFIC FEATURES ===

  // Hair
  ctx.fillStyle=c.hair||'#333';
  if(c.id==='gloria'){
    // Big voluminous hair
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,18*s,14*s,0,Math.PI,Math.PI*2);
    ctx.fill();
    ctx.beginPath();ctx.ellipse(-14*s,headY,6*s,16*s,0.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(14*s,headY,6*s,16*s,-0.2,0,Math.PI*2);ctx.fill();
  }else if(c.id==='lorelai'){
    // Long dark hair
    ctx.beginPath();
    ctx.ellipse(0,headY-6*s,16*s,12*s,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-16*s,headY-6*s,6*s,30*s);
    ctx.fillRect(10*s,headY-6*s,6*s,30*s);
  }else if(c.id==='emily'){
    // Short styled hair
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,16*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-15*s,headY-8*s,30*s,8*s);
  }else if(c.id==='kreese'){
    // Short military hair
    ctx.fillStyle='#999';
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,14*s,8*s,0,Math.PI,Math.PI*2);ctx.fill();
  }else{
    // Standard hair
    ctx.beginPath();
    ctx.ellipse(0,headY-8*s,14*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
  }

  // Headband (Johnny, Daniel)
  if(c.headband){
    ctx.fillStyle=c.headband;
    ctx.fillRect(-15*s,headY-6*s,30*s,5*s);
    // Headband tails
    ctx.fillRect(14*s,headY-6*s,3*s,12*s);
  }

  // Cap (Luke Danes)
  if(c.cap){
    ctx.fillStyle='#2244aa';
    ctx.fillRect(-16*s,headY-14*s,32*s,10*s);
    // Brim (backwards)
    ctx.fillRect(-20*s,headY-6*s,8*s,4*s);
  }

  // Pearls (Emily)
  if(c.id==='emily'){
    ctx.fillStyle='#fffff0';
    for(var pi=0;pi<5;pi++){
      ctx.beginPath();ctx.arc(-8*s+pi*4*s,torsoY-2*s,2*s,0,Math.PI*2);ctx.fill();
    }
  }

  // Coffee cup (Lorelai)
  if(c.id==='lorelai'){
    ctx.fillStyle='#8b4513';
    ctx.fillRect(-22*s,torsoY+10*s,7*s,10*s);
    ctx.fillStyle='#fff';
    ctx.fillRect(-22*s,torsoY+8*s,9*s,3*s);
    // Steam
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
    var st=Date.now()*0.005;
    ctx.beginPath();ctx.moveTo(-18*s,torsoY+6*s);
    ctx.quadraticCurveTo(-18*s+Math.sin(st)*4*s,torsoY,0-18*s,torsoY-6*s);ctx.stroke();
  }

  // Polo collar (Phil)
  if(c.id==='phil'){
    ctx.fillStyle='#5aa0e9';
    ctx.beginPath();ctx.moveTo(-8*s,torsoY);ctx.lineTo(0,torsoY+6*s);ctx.lineTo(8*s,torsoY);
    ctx.lineTo(10*s,torsoY-4*s);ctx.lineTo(-10*s,torsoY-4*s);ctx.fill();
  }

  // Luke Dunphy messy look
  if(c.id==='luke'){
    ctx.fillStyle=c.hair;
    for(var hi=0;hi<5;hi++){
      ctx.beginPath();
      ctx.moveTo(-12*s+hi*6*s,headY-12*s);
      ctx.lineTo(-9*s+hi*6*s,headY-20*s-Math.random()*5*s);
      ctx.lineTo(-6*s+hi*6*s,headY-12*s);
      ctx.fill();
    }
  }

  // Frankie Heck — tired eyes, messy ponytail
  if(c.id==='frankie'){
    ctx.fillStyle=c.hair;
    ctx.beginPath();ctx.ellipse(0,headY-6*s,15*s,10*s,0,Math.PI,Math.PI*2);ctx.fill();
    // Ponytail
    ctx.fillRect(10*s,headY-4*s,4*s,22*s);
    ctx.beginPath();ctx.ellipse(12*s,headY+18*s,5*s,4*s,0,0,Math.PI*2);ctx.fill();
    // Bags under eyes
    ctx.strokeStyle='rgba(100,60,60,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(-5*s,headY,4*s,0.2,Math.PI-0.2);ctx.stroke();
    ctx.beginPath();ctx.arc(5*s,headY,4*s,0.2,Math.PI-0.2);ctx.stroke();
  }

  // Axl Heck — shirtless (skin color torso), messy hair
  if(c.shirtless){
    // Redraw torso as skin (already drawn as shirt color which is null/'#111')
    // We override above, so draw abs lines for fun
    ctx.strokeStyle='rgba(180,140,100,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,torsoY+10*s);ctx.lineTo(0,torsoY+torsoH-5*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-8*s,torsoY+14*s);ctx.lineTo(8*s,torsoY+14*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-8*s,torsoY+22*s);ctx.lineTo(8*s,torsoY+22*s);ctx.stroke();
    // Flexing indicator when powered up
    if(f.axlPoweredUp){
      ctx.fillStyle='rgba(255,200,0,0.3)';
      ctx.beginPath();ctx.ellipse(0,torsoY+torsoH/2,25*s,40*s,0,0,Math.PI*2);ctx.fill();
    }
  }
  if(c.id==='axl'){
    ctx.fillStyle=c.hair;
    for(var hi=0;hi<4;hi++){
      ctx.beginPath();
      ctx.moveTo(-10*s+hi*7*s,headY-10*s);
      ctx.lineTo(-7*s+hi*7*s,headY-18*s);
      ctx.lineTo(-4*s+hi*7*s,headY-10*s);
      ctx.fill();
    }
  }

  // Sue Heck — big smile, headband, bouncy hair
  if(c.id==='sue'){
    ctx.fillStyle=c.hair;
    ctx.beginPath();ctx.ellipse(0,headY-6*s,16*s,11*s,0,Math.PI,Math.PI*2);ctx.fill();
    ctx.fillRect(-15*s,headY-4*s,5*s,20*s);
    ctx.fillRect(10*s,headY-4*s,5*s,20*s);
    // Headband
    ctx.fillStyle='#ff88cc';
    ctx.fillRect(-14*s,headY-8*s,28*s,4*s);
    // Always smiling (override mouth)
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(0,headY+5*s,4*s,0,Math.PI);ctx.fill();
  }

  // Brick Heck — glasses, small, book always in hand
  if(c.id==='brick'){
    ctx.fillStyle=c.hair;
    ctx.beginPath();ctx.ellipse(0,headY-6*s,13*s,9*s,0,Math.PI,Math.PI*2);ctx.fill();
    // Glasses
    ctx.strokeStyle='#666';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.rect(-9*s,headY-5*s,7*s,6*s);ctx.stroke();
    ctx.beginPath();ctx.rect(2*s,headY-5*s,7*s,6*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-2*s,headY-2*s);ctx.lineTo(2*s,headY-2*s);ctx.stroke();
    // Book in back hand
    ctx.fillStyle='#4488aa';
    ctx.fillRect(-24*s,torsoY+8*s,8*s,10*s);
    ctx.fillStyle='#fff';
    ctx.fillRect(-23*s,torsoY+9*s,6*s,8*s);
    // Whisper text bubble
    if(Math.random()<0.02){
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='italic '+Math.round(7*s)+'px serif';
      ctx.fillText('brick',5*s,headY-20*s);
    }
  }

  // Jackson — cat body! Ears, tail, whiskers
  if(c.isCat){
    // Override — cat head (dark circle)
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(0,headY,headR+2*s,0,Math.PI*2);ctx.fill();
    // Ears
    ctx.beginPath();ctx.moveTo(-10*s,headY-12*s);ctx.lineTo(-6*s,headY-24*s);ctx.lineTo(-2*s,headY-12*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(2*s,headY-12*s);ctx.lineTo(6*s,headY-24*s);ctx.lineTo(10*s,headY-12*s);ctx.fill();
    // Inner ears
    ctx.fillStyle='#ff88aa';
    ctx.beginPath();ctx.moveTo(-8*s,headY-13*s);ctx.lineTo(-6*s,headY-20*s);ctx.lineTo(-4*s,headY-13*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(4*s,headY-13*s);ctx.lineTo(6*s,headY-20*s);ctx.lineTo(8*s,headY-13*s);ctx.fill();
    // Eyes — green cat eyes
    ctx.fillStyle='#44cc44';
    ctx.beginPath();ctx.ellipse(-5*s,headY-2*s,3*s,4*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5*s,headY-2*s,3*s,4*s,0,0,Math.PI*2);ctx.fill();
    // Pupils
    ctx.fillStyle='#000';
    ctx.fillRect(-5.5*s,headY-4*s,1.5*s,5*s);
    ctx.fillRect(4.5*s,headY-4*s,1.5*s,5*s);
    // Nose
    ctx.fillStyle='#ff6688';
    ctx.beginPath();ctx.moveTo(-2*s,headY+3*s);ctx.lineTo(0,headY+1*s);ctx.lineTo(2*s,headY+3*s);ctx.fill();
    // Whiskers
    ctx.strokeStyle='#888';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-14*s,headY+1*s);ctx.lineTo(-4*s,headY+3*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-14*s,headY+4*s);ctx.lineTo(-4*s,headY+4*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4*s,headY+3*s);ctx.lineTo(14*s,headY+1*s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4*s,headY+4*s);ctx.lineTo(14*s,headY+4*s);ctx.stroke();
    // Tail
    ctx.strokeStyle='#222';ctx.lineWidth=3*s;
    ctx.beginPath();
    var tailTime=Date.now()*0.003;
    ctx.moveTo(-15*s,legY+5*s);
    ctx.quadraticCurveTo(-25*s,legY-10*s+Math.sin(tailTime)*8*s,-20*s,legY-25*s+Math.sin(tailTime+1)*5*s);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHUD(){
  var barW=W*0.38;
  var barH=28*SCALE;
  var barY=15;
  var margin=15;

  // P1 health bar (left)
  drawHealthBar(margin,barY,barW,barH,p1.hp/p1.maxHp,p1.char.name,p1.char.emoji,true);
  // P2 health bar (right)
  drawHealthBar(W-margin-barW,barY,barW,barH,p2.hp/p2.maxHp,p2.char.name,p2.char.emoji,false);

  // Special meters
  drawMeter(margin,barY+barH+8,barW*0.6,8*SCALE,p1.meter/100,'#f7c948');
  drawMeter(W-margin-barW*0.6,barY+barH+8,barW*0.6,8*SCALE,p2.meter/100,'#f7c948');

  // Timer
  var timeLeft=Math.ceil(roundTimer/60);
  ctx.fillStyle='#fff';ctx.font='bold '+Math.round(20*SCALE)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText(timeLeft,W/2,barY+barH);

  // Round indicators + tournament counter
  ctx.font='bold '+Math.round(11*SCALE)+'px sans-serif';ctx.fillStyle='#888';
  if(tournamentMode){
    ctx.textAlign='center';
    ctx.fillStyle='#f7c948';
    ctx.fillText('🏆 TOURNAMENT — Win '+(tournamentWins+1)+'/'+(CHARS.length-1),W/2,barY+barH+30);
  }
  ctx.textAlign='left';
}

function drawHealthBar(x,y,w,h,pct,name,emoji,isLeft){
  pct=Math.max(0,pct);
  // Background with inner shadow
  ctx.fillStyle='#1a1a25';
  ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.fill();
  ctx.fillStyle='#111118';
  ctx.beginPath();ctx.roundRect(x+1,y+1,w-2,h-2,5);ctx.fill();
  // Health gradient
  var hpColor1=pct>0.5?'#22dd55':pct>0.25?'#ddcc22':'#dd3333';
  var hpColor2=pct>0.5?'#11aa33':pct>0.25?'#aa9911':'#aa1111';
  var grad=ctx.createLinearGradient(x,y,x,y+h);
  grad.addColorStop(0,hpColor1);grad.addColorStop(1,hpColor2);
  ctx.fillStyle=grad;
  if(isLeft){
    ctx.beginPath();ctx.roundRect(x+2,y+2,Math.max(0,(w-4)*pct),h-4,4);ctx.fill();
  }else{
    var hpW=Math.max(0,(w-4)*pct);
    ctx.beginPath();ctx.roundRect(x+w-2-hpW,y+2,hpW,h-4,4);ctx.fill();
  }
  // Shine highlight
  ctx.globalAlpha=0.15;ctx.fillStyle='#fff';
  if(isLeft){ctx.beginPath();ctx.roundRect(x+2,y+2,Math.max(0,(w-4)*pct),h*0.4,4);ctx.fill();}
  else{var hpW2=Math.max(0,(w-4)*pct);ctx.beginPath();ctx.roundRect(x+w-2-hpW2,y+2,hpW2,h*0.4,4);ctx.fill();}
  ctx.globalAlpha=1;
  // Border
  ctx.strokeStyle=pct<0.25?'rgba(255,50,50,0.6)':'#444';ctx.lineWidth=pct<0.25?2:1;
  ctx.beginPath();ctx.roundRect(x,y,w,h,6);ctx.stroke();
  // Low health pulse
  if(pct<0.25&&pct>0){
    ctx.globalAlpha=0.15+Math.sin(Date.now()*0.01)*0.1;
    ctx.strokeStyle='#ff3333';ctx.lineWidth=3;
    ctx.beginPath();ctx.roundRect(x-1,y-1,w+2,h+2,7);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Name with shadow
  var fontSize=Math.round(Math.min(18*SCALE,h-6));
  ctx.font='bold '+fontSize+'px sans-serif';
  ctx.textAlign=isLeft?'left':'right';
  var nameX=isLeft?x+8:x+w-8;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillText(emoji+' '+name,nameX+1,y+h-5);
  ctx.fillStyle='#fff';ctx.fillText(emoji+' '+name,nameX,y+h-6);
  ctx.textAlign='left';
}

function drawMeter(x,y,w,h,pct,color){
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.roundRect(x,y,w,h,3);ctx.fill();
  if(pct>0){
    var mGrad=ctx.createLinearGradient(x,y,x+w*Math.min(1,pct),y);
    if(pct>=1){
      var pulse=0.7+Math.sin(Date.now()*0.012)*0.3;
      mGrad.addColorStop(0,'rgba(255,200,50,'+pulse+')');
      mGrad.addColorStop(1,'rgba(255,120,30,'+pulse+')');
    }else{
      mGrad.addColorStop(0,'#cc9900');mGrad.addColorStop(1,color);
    }
    ctx.fillStyle=mGrad;
    ctx.beginPath();ctx.roundRect(x+1,y+1,Math.max(0,(w-2)*Math.min(1,pct)),h-2,2);ctx.fill();
  }
  if(pct>=1){
    ctx.globalAlpha=0.3+Math.sin(Date.now()*0.01)*0.2;
    ctx.strokeStyle='#f7c948';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(x-1,y-1,w+2,h+2,4);ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.fillStyle='#ccc';ctx.font='bold '+Math.round(7*SCALE)+'px sans-serif';
  ctx.fillText('⚡ '+(pct>=1?'READY':Math.round(pct*100)+'%'),x+3,y+h-1);
}

function shadeColor(hex,pct){
  var num=parseInt(hex.replace('#',''),16);
  var r=Math.min(255,Math.max(0,((num>>16)&0xff)+pct));
  var g=Math.min(255,Math.max(0,((num>>8)&0xff)+pct));
  var b=Math.min(255,Math.max(0,(num&0xff)+pct));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function drawProjectiles(){
  projectiles.forEach(function(pr){
    ctx.save();ctx.translate(pr.x,pr.y);
    if(pr.type==='chancla'){
      ctx.rotate(Date.now()*0.01);
      ctx.fillStyle='#cc8844';
      ctx.fillRect(-8*SCALE,-4*SCALE,16*SCALE,8*SCALE);
      ctx.fillStyle='#aa6633';
      ctx.fillRect(-6*SCALE,-2*SCALE,4*SCALE,4*SCALE);
    }else if(pr.type==='book'){
      ctx.rotate(Date.now()*0.008);
      ctx.fillStyle='#4488aa';
      ctx.fillRect(-7*SCALE,-5*SCALE,14*SCALE,10*SCALE);
      ctx.fillStyle='#fff';
      ctx.fillRect(-5*SCALE,-3*SCALE,10*SCALE,6*SCALE);
      ctx.fillStyle='#333';ctx.font=Math.round(6*SCALE)+'px sans-serif';ctx.textAlign='center';
      ctx.fillText('📖',0,3*SCALE);
    }else if(pr.type==='coffeepot'){
      ctx.fillStyle='#8b4513';
      ctx.fillRect(-6*SCALE,-8*SCALE,12*SCALE,16*SCALE);
      ctx.fillStyle='#4a2800';
      ctx.fillRect(-4*SCALE,-4*SCALE,8*SCALE,8*SCALE);
      ctx.fillStyle='#fff';
      ctx.fillRect(-3*SCALE,-10*SCALE,6*SCALE,3*SCALE);
    }
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(function(pt){
    var alpha=pt.life/pt.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size/2,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawDmgNumbers(){
  for(var i=dmgNumbers.length-1;i>=0;i--){
    var d=dmgNumbers[i];
    d.y+=d.vy;d.life--;
    if(d.life<=0){dmgNumbers.splice(i,1);continue;}
    var alpha=Math.min(1,d.life/20);
    ctx.globalAlpha=alpha;
    var sz=d.big?Math.round(20*SCALE):Math.round(14*SCALE);
    ctx.font='bold '+sz+'px sans-serif';
    ctx.textAlign='center';
    ctx.fillStyle='#000';
    ctx.fillText(d.text,d.x+1,d.y+1);
    ctx.fillStyle=d.color;
    ctx.fillText(d.text,d.x,d.y);
  }
  ctx.globalAlpha=1;
  ctx.textAlign='left';
}

function draw(){
  ctx.clearRect(0,0,W,H);

  if(gameState==='fight'||gameState==='roundEnd'){
    ctx.save();
    ctx.translate(shakeX,shakeY);

    drawBackground();
    if(p1&&p2){
      // Draw further-back character first
      if(p1.y>p2.y){drawCharacter(p2,false);drawCharacter(p1,true);}
      else{drawCharacter(p1,true);drawCharacter(p2,false);}
      drawProjectiles();
      drawParticles();
      drawDmgNumbers();
      drawHUD();
    }
    ctx.restore();
  }else{
    drawBackground();
  }
}

// ==================== GAME LOOP ====================
function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// RoundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];
    this.moveTo(x+r[0],y);
    this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);
    this.closePath();return this;
  };
}

// Start
resize();
gameLoop();

// Title screen announcer
var titleIntros=[
  'TV Showdown! The crossover nobody asked for!',
  'TV Showdown! Where sitcom characters solve their problems with violence!',
  'TV Showdown! Lawyers have advised us not to make this game!',
  'TV Showdown! Three shows enter! One champion leaves!',
  'TV Showdown! More dramatic than a Gilmore Girls dinner party!'
];
setTimeout(function(){speak(titleIntros[Math.floor(Math.random()*titleIntros.length)]);},500);

// Rotate title subtitles
var subtitles=['The crossover nobody asked for.','Now with 100% more chancla.','Emily Gilmore disapproves of this game.','Phil Dunphy thinks this is awesome.','Luke Danes does NOT want to be here.','Quiet Riot plays in the background.','Viewer discretion is advised.','No karate students were harmed. Probably.','Rated PG-13 for passive-aggressive comments.','May cause spontaneous crane kicks.','Axl Heck is already shirtless.','Sue Heck tried out 47 times to be in this game.','Frankie Heck is too tired for this but she\'s here anyway.','Jackson the cat is judging you right now.','The Hecks can\'t afford this game but they play it anyway.','4 shows. 13 fighters. 0 network approval.','Now featuring a cat who can beat up karate masters.','The crossover your therapist warned you about.'];
var subIdx=0;
setInterval(function(){
  if(gameState!=='title')return;
  subIdx=(subIdx+1)%subtitles.length;
  document.getElementById('titleSub').textContent=subtitles[subIdx];
},4000);
</script>
