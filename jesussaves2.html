var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function organ(freq,dur,vol){
  if(!audioCtx)return;
  [1,2,3,4].forEach(function(h){
    var osc=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    osc.type="sine";
    osc.frequency.value=freq*h;
    g.gain.setValueAtTime((vol||0.02)/(h*h),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    osc.connect(g);g.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+dur);
  });
}

function sndGoal(){organ(262,0.3,0.04);setTimeout(function(){organ(330,0.3,0.04);},150);setTimeout(function(){organ(392,0.3,0.04);},300);}

function sndWhistle(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sine";osc.frequency.value=3200;
  g.gain.setValueAtTime(0.03,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.4);
}
function sndBuzzer(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sawtooth";osc.frequency.value=150;
  g.gain.setValueAtTime(0.05,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.5);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+1.5);
}
function sndHorn(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sawtooth";osc.frequency.value=220;
  g.gain.setValueAtTime(0.06,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.06,audioCtx.currentTime+1.0);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+2.0);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+2.0);
}

function jesusSpeak(text){
  try{
    if(!window.speechSynthesis)return;
    if(speechSynthesis.speaking)return;
    var now=Date.now();
    if(now-lastJokeTime<8000)return;
    if(jokeSpoken[text])return;
    jokeSpoken[text]=true;
    lastJokeTime=now;
    var utter=new SpeechSynthesisUtterance(text);
    utter.rate=1.0;utter.pitch=0.9;
    var voices=speechSynthesis.getVoices();
    if(voices&&voices.length>0){
      var voice=voices.find(function(v){return v.lang&&v.lang.indexOf('en')===0;});
      if(voice)utter.voice=voice;
    }
    speechSynthesis.speak(utter);
  }catch(e){}
}

// ═══ SVG Stick Figure Drawing ═══
function drawStickFigure(x,y,height,opts){
  // opts: {headColor, jerseyColor, crossOnJersey, halo, stickHand, gloveHand, armRaise, legSpread, bobOffset}
  opts=opts||{};
  var scale=height/60;
  var headR=6*scale;
  var bodyLen=20*scale;
  var armLen=14*scale;
  var legLen=16*scale;

  var headY=y-height+headR;
  var neckY=headY+headR;
  var hipY=neckY+bodyLen;

  ctx.lineWidth=2*scale;
  ctx.lineCap="round";

  // Halo
  if(opts.halo){
    ctx.strokeStyle="rgba(255,215,0,0.8)";
    ctx.lineWidth=2*scale;
    ctx.beginPath();
    ctx.ellipse(x,headY-headR-3*scale,headR+2*scale,4*scale,0,0,Math.PI*2);
    ctx.stroke();
  }

  // Head
  ctx.fillStyle=opts.headColor||"#ffd3a3";
  ctx.strokeStyle="#333";
  ctx.lineWidth=1.5*scale;
  ctx.beginPath();ctx.arc(x,headY,headR,0,Math.PI*2);ctx.fill();ctx.stroke();

  // Body
  ctx.strokeStyle="#333";
  ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(x,neckY);ctx.lineTo(x,hipY);ctx.stroke();

  // Jersey
  if(opts.jerseyColor){
    ctx.fillStyle=opts.jerseyColor;
    ctx.fillRect(x-5*scale,neckY+2*scale,10*scale,12*scale);
    ctx.strokeStyle="rgba(0,0,0,0.2)";
    ctx.lineWidth=0.5*scale;
    ctx.strokeRect(x-5*scale,neckY+2*scale,10*scale,12*scale);
  }

  // Cross on jersey
  if(opts.crossOnJersey){
    ctx.strokeStyle="rgba(200,0,0,0.7)";
    ctx.lineWidth=1.5*scale;
    ctx.beginPath();ctx.moveTo(x,neckY+4*scale);ctx.lineTo(x,neckY+12*scale);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-3*scale,neckY+7*scale);ctx.lineTo(x+3*scale,neckY+7*scale);ctx.stroke();
  }

  // Arms
  var armRaise=opts.armRaise||0; // 0 to 1 (how raised)
  ctx.strokeStyle="#333";
  ctx.lineWidth=2*scale;
  // Left arm (glove side)
  var lArmAngle=Math.PI/2+0.3+(opts.gloveHand?armRaise*-1.2:0);
  var lArmX=x+Math.cos(lArmAngle)*armLen;
  var lArmY=neckY+5*scale+Math.sin(lArmAngle)*armLen;
  ctx.beginPath();ctx.moveTo(x,neckY+5*scale);ctx.lineTo(lArmX,lArmY);ctx.stroke();
  // Glove
  if(opts.gloveHand){
    ctx.fillStyle="#c22";
    ctx.beginPath();ctx.arc(lArmX,lArmY,3*scale,0,Math.PI*2);ctx.fill();
  }

  // Right arm (stick side)
  var rArmAngle=Math.PI/2-0.3-(opts.stickHand?armRaise*-1.2:0);
  rArmAngle=Math.PI-(rArmAngle);
  var rArmX=x+Math.cos(rArmAngle)*armLen;
  var rArmY=neckY+5*scale-Math.sin(rArmAngle)*armLen;
  ctx.beginPath();ctx.moveTo(x,neckY+5*scale);ctx.lineTo(rArmX,rArmY);ctx.stroke();

  // Stick
  if(opts.stickHand){
    ctx.strokeStyle="#8B4513";
    ctx.lineWidth=2.5*scale;
    ctx.beginPath();
    ctx.moveTo(rArmX,rArmY);
    ctx.lineTo(rArmX+12*scale,rArmY+10*scale);
    ctx.lineTo(rArmX+18*scale,rArmY+10*scale);
    ctx.stroke();
  }

  // Legs
  var spread=opts.legSpread||0.3;
  ctx.strokeStyle="#333";
  ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x-spread*legLen,hipY+legLen);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x+spread*legLen,hipY+legLen);ctx.stroke();

  // Skates
  ctx.fillStyle="#222";
  ctx.fillRect(x-spread*legLen-2*scale,hipY+legLen-1*scale,5*scale,3*scale);
  ctx.fillRect(x+spread*legLen-2*scale,hipY+legLen-1*scale,5*scale,3*scale);
}

function drawShooterFigure(x,y,height,armRaise,jerseyColor){
  var scale=height/60;
  var headR=6*scale;
  var bodyLen=20*scale;
  var armLen=14*scale;
  var legLen=16*scale;
  var headY=y-height+headR;
  var neckY=headY+headR;
  var hipY=neckY+bodyLen;

  ctx.lineWidth=2*scale;ctx.lineCap="round";

  // Head + helmet
  ctx.fillStyle="#333";
  ctx.beginPath();ctx.arc(x,headY,headR+1*scale,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ffd3a3";
  ctx.beginPath();ctx.arc(x,headY+1*scale,headR*0.7,0,Math.PI*2);ctx.fill();

  // Body
  ctx.strokeStyle="#333";ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(x,neckY);ctx.lineTo(x,hipY);ctx.stroke();

  // Jersey
  ctx.fillStyle=jerseyColor||"#c22";
  ctx.fillRect(x-5*scale,neckY+2*scale,10*scale,12*scale);

  // Arms with windup
  var windAngle=armRaise*1.5;
  // Left arm
  ctx.strokeStyle="#333";ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(x,neckY+5*scale);
  ctx.lineTo(x-armLen*0.7,neckY+5*scale+armLen*0.5);ctx.stroke();
  // Right arm (stick arm — winds up)
  var rAX=x+Math.cos(-windAngle)*armLen;
  var rAY=neckY+5*scale-Math.sin(windAngle)*armLen*0.8;
  ctx.beginPath();ctx.moveTo(x,neckY+5*scale);ctx.lineTo(rAX,rAY);ctx.stroke();

  // Stick
  ctx.strokeStyle="#8B4513";ctx.lineWidth=2.5*scale;
  ctx.beginPath();ctx.moveTo(rAX,rAY);
  ctx.lineTo(rAX+10*scale,rAY+14*scale);
  ctx.lineTo(rAX+16*scale,rAY+14*scale);
  ctx.stroke();

  // Legs (skating stance)
  ctx.strokeStyle="#333";ctx.lineWidth=2*scale;
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x-6*scale,hipY+legLen);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x+6*scale,hipY+legLen);ctx.stroke();

  // Skates
  ctx.fillStyle="#222";
  ctx.fillRect(x-8*scale,hipY+legLen-1*scale,5*scale,3*scale);
  ctx.fillRect(x+4*scale,hipY+legLen-1*scale,5*scale,3*scale);
}

function drawCrowdFigure(x,y,headColor,bob){
  var s=0.33;
  ctx.fillStyle=headColor;
  ctx.beginPath();ctx.arc(x,y+bob,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=headColor;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y+4+bob);ctx.lineTo(x,y+12+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-4,y+7+bob);ctx.lineTo(x+4,y+7+bob);ctx.stroke();
}

      y:H*0.35,

      targetY:H*0.5,
      state:"idle", // idle, skating, windup, shoot, retreat
      timer:60+i*80,
      armRaise:0,
      shotType:"wrist", // wrist, slap, deke
      jerseyColor:["#c0392b","#e74c3c","#b71c1c"][i],
      speed:1.5+Math.random()*0.5,
      homeX:W*0.3+i*(W*0.2),
      homeY:H*0.3
    });
  }

  saves=0;goals=0;totalShots=0;wave=1;frame=0;
  streak=0;bestStreak=0;
  shotSpeed=3.5;shotInterval=90;shotTimer=0;
  periodTime=3600;period=1;
  crowdMood=50;goalFlash=0;
  faceoffTimer=0;
}

// ═══ Shooting ═══
function shootPuckFrom(shooter){
  totalShots++;
  var fromX=shooter.x;
  var fromY=shooter.y;
  var targetX=netX+20+Math.random()*(netW-40);
  var targetY=netY+Math.random()*netH*0.5;
  var dx=targetX-fromX,dy=targetY-fromY;
  var len=Math.sqrt(dx*dx+dy*dy);
  var speed=shotSpeed;
  var accuracy=0;

  if(shooter.shotType==="slap"){speed*=1.5;accuracy=(Math.random()-0.5)*2;}
  else if(shooter.shotType==="wrist"){speed*=1.0;accuracy=(Math.random()-0.5)*0.5;}
  else if(shooter.shotType==="deke"){speed*=0.6;accuracy=(Math.random()-0.5)*0.3;}

  pucks.push({
    x:fromX,y:fromY,
    vx:dx/len*speed+accuracy,vy:dy/len*speed,
    curve:(Math.random()-0.5)*0.2,
    radius:7,
    active:true,
    bounces:0,
    fromShooter:true,
    isDeke:shooter.shotType==="deke"
  });
}

  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color:color,size:3+Math.random()*4});

// ═══ Update ═══
function update(){
  if(STATE!=="playing")return;
  frame++;
  periodTime--;
  if(goalFlash>0)goalFlash-=0.03;

  // Period transitions
  if(periodTime<=0){
    period++;
    periodTime=3600;
    sndHorn();sndWhistle();
    jesusSpeak(pickJoke(JOKES_PERIOD_END));
    faceoffTimer=120;
    if(period>3){
      STATE="gameover";stopMusic();sndBuzzer();
      if(saves>bestSaves){bestSaves=saves;localStorage.setItem("jesus2-best",bestSaves);}
      return;
    }
    shotSpeed+=0.7;shotInterval=Math.max(25,shotInterval-10);
  }

  // Faceoff pause between periods
  if(faceoffTimer>0){faceoffTimer--;return;}

  // Random joke every ~25 seconds
  if(frame%1500===750&&frame>300){jesusSpeak(pickJoke(JOKES_RANDOM));}

  // Wave escalation
  if(frame%600===0&&frame>0){
    wave++;shotInterval=Math.max(15,shotInterval-3);shotSpeed=Math.min(8,shotSpeed+0.2);
  }

  // Move goalie
  goalie.targetX=Math.max(netX+goalie.w/2,Math.min(netX+netW-goalie.w/2,mouseX));
  goalie.x+=(goalie.targetX-goalie.x)*0.15;

  // Update shooters
  for(var s=0;s<shooters.length;s++){
    var sh=shooters[s];
    sh.timer--;
    if(sh.state==="idle"&&sh.timer<=0){
      sh.state="skating";
      sh.targetX=W/2+(Math.random()-0.5)*200;
      sh.targetY=H*0.45+Math.random()*40;
      sh.shotType=["wrist","wrist","slap","slap","deke"][Math.floor(Math.random()*5)];
    }
    if(sh.state==="skating"){
      var sdx=sh.targetX-sh.x,sdy=sh.targetY-sh.y;
      var sdist=Math.sqrt(sdx*sdx+sdy*sdy);
      if(sdist>5){sh.x+=sdx/sdist*sh.speed*2;sh.y+=sdy/sdist*sh.speed*2;}
      else{sh.state="windup";sh.timer=sh.shotType==="deke"?20:40;sh.armRaise=0;}
    }
    if(sh.state==="windup"){
      sh.armRaise=Math.min(1,sh.armRaise+0.04);
      sh.timer--;
      if(sh.timer<=0){sh.state="shoot";}
    }
    if(sh.state==="shoot"){
      shootPuckFrom(sh);
      sh.state="retreat";sh.timer=30;
    }
    if(sh.state==="retreat"){
      var rdx=sh.homeX-sh.x,rdy=sh.homeY-sh.y;
      var rdist=Math.sqrt(rdx*rdx+rdy*rdy);
      if(rdist>5){sh.x+=rdx/rdist*sh.speed*2.5;sh.y+=rdy/rdist*sh.speed*2.5;}
      else{
        sh.state="idle";
        sh.timer=shotInterval+Math.floor(Math.random()*40);
        sh.armRaise=0;
      }
    }
  }

  // Update pucks
  for(var i=pucks.length-1;i>=0;i--){
    var p=pucks[i];
    if(!p.active)continue;
    p.vx+=p.curve*0.02;
    p.x+=p.vx;p.y+=p.vy;

    // Bouncing off boards (left/right)
    if(p.x<15){p.x=15;p.vx=Math.abs(p.vx)*0.9;}
    if(p.x>W-15){p.x=W-15;p.vx=-Math.abs(p.vx)*0.9;}
    // Top board
    if(p.y<30){p.y=30;p.vy=Math.abs(p.vy)*0.9;}

    // Check goal posts bounce
    var postLeft=netX;var postRight=netX+netW;var crossbar=netY;
    // Left post
    if(p.y>crossbar&&p.y<crossbar+netH&&Math.abs(p.x-postLeft)<8){
      p.vx=-Math.abs(p.vx)*0.8;p.x=postLeft-8;
      spawnParts(p.x,p.y,"#ff0",3);organ(800,0.05,0.02);
      continue;
    }
    // Right post
    if(p.y>crossbar&&p.y<crossbar+netH&&Math.abs(p.x-postRight)<8){
      p.vx=Math.abs(p.vx)*0.8;p.x=postRight+8;
      spawnParts(p.x,p.y,"#ff0",3);organ(800,0.05,0.02);
      continue;
    }
    // Crossbar
    if(Math.abs(p.y-crossbar)<8&&p.x>postLeft&&p.x<postRight){
      p.vy=-Math.abs(p.vy)*0.8;p.y=crossbar-8;
      spawnParts(p.x,p.y,"#ff0",3);organ(900,0.05,0.02);
      continue;
    }

    // Check save (goalie block) with bounce physics
    var gLeft=goalie.x-goalie.w/2;
    var gRight=goalie.x+goalie.w/2;
    var gTop=goalie.y-5;
    var gBot=goalie.y+goalie.h-10;
    if(p.x>gLeft-p.radius&&p.x<gRight+p.radius&&p.y>gTop-p.radius&&p.y<gBot+p.radius){
      saves++;streak++;bestStreak=Math.max(bestStreak,streak);
      p.active=false;p.bounces++;
      crowdMood=Math.min(100,crowdMood+5);

      // Determine hit side for realistic bounce
      var hitX=(p.x-goalie.x)/(goalie.w/2); // -1 to 1
      var hitY=(p.y-goalie.y)/(goalie.h); // 0 to 1

      // Bounce direction based on where it hit
      var bounceVX=hitX*5+p.vx*-0.3;
      var bounceVY=-Math.abs(p.vy)*0.7-2;

      // Glove save (left side) vs stick save (right side)
      var isGloveSide=hitX<0;

      if(streak%5===0){sndBigSave();spawnParts(p.x,p.y,"#ffd700",6);spawnParts(p.x,p.y,"#fff",3);jesusSpeak(pickJoke(JOKES_STREAK));}
      else if(streak%3===0){sndSave();spawnParts(p.x,p.y,isGloveSide?"#c22":"#8B4513",3);jesusSpeak(pickJoke(JOKES_SAVE));}
      else{sndSave();spawnParts(p.x,p.y,isGloveSide?"#c22":"#8B4513",2);}

      // Create rebound puck
      if(Math.random()<0.3&&p.bounces<2){
        pucks.push({
          x:p.x+bounceVX*2,y:p.y+bounceVY*2,
          vx:bounceVX*0.6,vy:bounceVY*0.6,
          curve:0,radius:7,active:true,bounces:p.bounces,fromShooter:false,isDeke:false
        });
      }
      // Remove saved puck after delay
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},300);})(p);
      continue;
    }

    // Check goal (puck enters net)
    if(p.y>netY+12&&p.x>netX+8&&p.x<netX+netW-8&&p.active){
      goals++;streak=0;p.active=false;
      crowdMood=Math.max(0,crowdMood-15);
      goalFlash=1.0;
      sndGoal();sndBuzzer();jesusSpeak(pickJoke(JOKES_GOAL));
      spawnParts(p.x,p.y,"#ff0000",6);
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},800);})(p);
      continue;
    }

    // Off screen
    if(p.y>H+30||p.x<-30||p.x>W+30){pucks.splice(i,1);}
  }

  // Crowd mood decay
  if(frame%30===0)crowdMood=Math.max(20,crowdMood-0.5);

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;pt.life-=0.025;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ═══ Draw ═══
function draw(){
  // Ice surface
  var iceGrad=ctx.createLinearGradient(0,0,0,H);
  iceGrad.addColorStop(0,"#d4e6f1");
  iceGrad.addColorStop(0.5,"#eaf2f8");
  iceGrad.addColorStop(1,"#d6eaf8");
  ctx.fillStyle=iceGrad;
  ctx.fillRect(0,0,W,H);

  // Zamboni marks (curved lines)
  ctx.strokeStyle="rgba(180,210,230,0.3)";
  ctx.lineWidth=1;
  for(var zm=0;zm<8;zm++){
    ctx.beginPath();
    var zy=H*0.3+zm*30;
    ctx.moveTo(20,zy);
    ctx.quadraticCurveTo(W/2,zy+15*Math.sin(zm*0.7+frame*0.002),W-20,zy);
    ctx.stroke();
  }

  // ── Boards (thick) ──
  ctx.fillStyle="#2c3e50";
  ctx.fillRect(0,0,12,H);ctx.fillRect(W-12,0,12,H);
  ctx.fillRect(0,0,W,12);ctx.fillRect(0,H-12,W,12);
  // Board padding color
  ctx.fillStyle="#34495e";
  ctx.fillRect(12,0,4,H);ctx.fillRect(W-16,0,4,H);
  ctx.fillRect(0,12,W,4);ctx.fillRect(0,H-16,W,4);

  // ── Glass panels (semi-transparent above boards) ──
  ctx.fillStyle="rgba(200,230,255,0.15)";
  ctx.fillRect(0,0,W,35);
  ctx.strokeStyle="rgba(255,255,255,0.2)";
  ctx.lineWidth=1;
  for(var gl=0;gl<W;gl+=60){
    ctx.beginPath();ctx.moveTo(gl,0);ctx.lineTo(gl,35);ctx.stroke();
  }

  // ── Dasher board ads ──
  ctx.fillStyle="rgba(255,255,255,0.9)";
  var adW=Math.min(120,W/5);
  for(var a=0;a<dasherAds.length;a++){
    var adX=15+a*(W-30)/dasherAds.length;
    ctx.fillStyle="rgba(255,255,255,0.85)";
    ctx.fillRect(adX,H-35,adW-5,20);
    ctx.strokeStyle="rgba(0,0,0,0.2)";
    ctx.lineWidth=1;
    ctx.strokeRect(adX,H-35,adW-5,20);
    ctx.fillStyle="#1a2744";
    ctx.font="bold 8px monospace";ctx.textAlign="center";
    ctx.fillText(dasherAds[a],adX+(adW-5)/2,H-22);
  }

  // ── Rink markings ──
  ctx.fillStyle="rgba(41,98,255,0.15)";
  ctx.fillRect(16,H*0.35,W-32,4);
  ctx.fillStyle="rgba(255,30,30,0.15)";
  ctx.fillRect(16,H*0.5,W-32,4);
  ctx.fillStyle="rgba(41,98,255,0.15)";
  ctx.fillRect(16,H*0.65,W-32,4);

  // Center circle
  ctx.strokeStyle="rgba(255,30,30,0.15)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,H*0.5,50,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle="rgba(41,98,255,0.08)";
  ctx.beginPath();ctx.arc(W/2,H*0.5,6,0,Math.PI*2);ctx.fill();

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 26px monospace";ctx.fillStyle="#1a2744";
    ctx.fillText("JESUS SAVES 2",W/2,H*0.18);
    ctx.font="bold 16px monospace";ctx.fillStyle="#c0392b";
    ctx.fillText("THE SECOND COMING",W/2,H*0.24);
    ctx.font="11px monospace";ctx.fillStyle="#555";
    ctx.fillText("SVG Hockey — Now with 100% more bouncing",W/2,H*0.30);

    // Draw a preview goalie
    drawStickFigure(W/2,H*0.52,60,{headColor:"#ffd3a3",jerseyColor:"#fff",crossOnJersey:true,halo:true,stickHand:true,gloveHand:true,armRaise:0,legSpread:0.4});

    ctx.font="13px monospace";ctx.fillStyle="#555";
    ctx.fillText("Move left/right to block pucks",W/2,H*0.62);
    ctx.fillText("Pucks bounce! Shooters wind up!",W/2,H*0.67);
    ctx.fillText("Survive 3 periods!",W/2,H*0.72);
    if(bestSaves>0){ctx.fillStyle="#1a2744";ctx.fillText("Best: "+bestSaves+" saves",W/2,H*0.77);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";
    ctx.fillText("[ Tap / Click to play ]",W/2,H*0.85);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.92);
    return;
  }

  // ── Red goal light flash ──
  if(goalFlash>0){
    ctx.fillStyle="rgba(255,0,0,"+goalFlash*0.3+")";
    ctx.beginPath();ctx.arc(W/2,netY+netH,80,0,Math.PI*2);ctx.fill();
    // Red lamp
    ctx.fillStyle="rgba(255,0,0,"+goalFlash*0.9+")";
    ctx.beginPath();ctx.arc(W/2,netY+netH+10,12,0,Math.PI*2);ctx.fill();
  }

  // ── Crowd (stick figures) ──
  for(var i=0;i<crowd.length;i++){
    var c=crowd[i];
    var bob=Math.sin(frame*0.04*c.bobSpeed+c.bobOffset)*(crowdMood>70?3:1);
    drawCrowdFigure(c.x,c.y,c.color,bob);
  }
  if(crowdMood>70){
    ctx.font="9px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";ctx.textAlign="center";
    ctx.fillText("CROWD GOES WILD!",W/2,100);
  }

  // ── Net (with mesh pattern) ──
  ctx.fillStyle="rgba(0,0,0,0.04)";
  ctx.fillRect(netX,netY,netW,netH);
  // Net mesh — diagonal crosshatch
  ctx.strokeStyle="rgba(0,0,0,0.06)";
  ctx.lineWidth=0.5;
  for(var ni=0;ni<netW+netH;ni+=10){
    ctx.beginPath();ctx.moveTo(netX+ni,netY);ctx.lineTo(netX+ni-netH,netY+netH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(netX+ni,netY);ctx.lineTo(netX+ni+netH,netY+netH);ctx.stroke();
  }
  // Goal frame
  ctx.strokeStyle="#cc0000";ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(netX,netY+netH);ctx.lineTo(netX,netY);ctx.lineTo(netX+netW,netY);ctx.lineTo(netX+netW,netY+netH);
  ctx.stroke();
  // Crease
  ctx.strokeStyle="rgba(255,0,0,0.2)";ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.55,25,0,Math.PI,0);ctx.stroke();

  // ── Goalie (Jesus SVG stick figure) ──
  var armAnim=Math.sin(frame*0.1)*0.1;
  drawStickFigure(goalie.x,goalie.y+goalie.h,60,{
    headColor:"#ffd3a3",
    jerseyColor:"#ffffff",
    crossOnJersey:true,
    halo:true,
    stickHand:true,
    gloveHand:true,
    armRaise:armAnim,
    legSpread:0.45
  });

  // ── Shooters ──
  for(var s=0;s<shooters.length;s++){
    var sh=shooters[s];
    if(sh.state!=="idle"||true){
      drawShooterFigure(sh.x,sh.y+50,50,sh.armRaise,sh.jerseyColor);
    }
  }

  // ── Pucks ──
  for(var i=0;i<pucks.length;i++){
    var p=pucks[i];
    // Shadow
    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.beginPath();ctx.ellipse(p.x,p.y+3,p.radius,p.radius*0.4,0,0,Math.PI*2);ctx.fill();
    // Puck
    ctx.fillStyle=p.active?"#111":"#555";
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
    // Speed lines
    if(p.active){
      ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x-p.vx*2,p.y-p.vy*2);ctx.lineTo(p.x-p.vx*5,p.y-p.vy*5);ctx.stroke();
    }
  }

  // ── Particles ──
  for(var i=0;i<particles.length;i++){
    var pt=particles[i];
    ctx.globalAlpha=pt.life;
    ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── Faceoff animation ──
  if(faceoffTimer>0){
    ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";ctx.font="bold 22px monospace";ctx.fillStyle="#fff";
    ctx.fillText("PERIOD "+period,W/2,H*0.45);
    ctx.font="14px monospace";
    ctx.fillText("Face-off in "+Math.ceil(faceoffTimer/60)+"...",W/2,H*0.52);
    // Faceoff dot animation
    var dotPulse=Math.sin(frame*0.1)*5+15;
    ctx.fillStyle="rgba(255,30,30,0.5)";
    ctx.beginPath();ctx.arc(W/2,H*0.6,dotPulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#c0392b";
    ctx.beginPath();ctx.arc(W/2,H*0.6,6,0,Math.PI*2);ctx.fill();
  }

  // ── Scoreboard ──
  var sbW=220,sbH=36;
  var sbX=W/2-sbW/2,sbY=5;
  ctx.fillStyle="rgba(26,39,68,0.92)";
  ctx.fillRect(sbX,sbY,sbW,sbH);
  ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;
  ctx.strokeRect(sbX,sbY,sbW,sbH);
  ctx.textAlign="center";ctx.font="bold 10px monospace";ctx.fillStyle="#aaa";
  ctx.fillText("HOME",sbX+40,sbY+12);
  ctx.fillText("AWAY",sbX+sbW-40,sbY+12);
  ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
  ctx.fillText(""+(totalShots-goals-saves>=0?saves:0),sbX+40,sbY+28);
  ctx.fillText(""+goals,sbX+sbW-40,sbY+28);
  ctx.font="bold 9px monospace";ctx.fillStyle="#4ade80";
  ctx.fillText("P"+period+" "+Math.ceil(periodTime/60)+"s",W/2,sbY+20);
  // Divider
  ctx.fillStyle="rgba(255,255,255,0.2)";
  ctx.fillRect(W/2-0.5,sbY+4,1,sbH-8);

  // ── Streak ──
  if(streak>=3){
    ctx.font="bold 12px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";ctx.textAlign="center";
    ctx.fillText("SAVE STREAK: "+streak,W/2,netY-15);
  }

  // Big save flash
  if(streak>0&&streak%10===0&&frame%60<30){
    ctx.font="bold 18px monospace";ctx.fillStyle="rgba(200,0,0,0.6)";ctx.textAlign="center";
    ctx.fillText("DIVINE INTERVENTION!",W/2,H*0.4);
  }

  // Save %
  var savePct=totalShots>0?Math.round(saves/totalShots*100):100;
  ctx.textAlign="left";ctx.font="9px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillText("SV% "+savePct+"%",18,H-40);
  ctx.textAlign="right";
  ctx.fillText("WAVE "+wave,W-18,H-40);

  // ── Game Over ──
  if(STATE==="gameover"){
    ctx.fillStyle="rgba(26,39,68,0.9)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.font="bold 26px monospace";ctx.fillStyle="#fff";
    ctx.fillText("FINAL BUZZER",W/2,H*0.17);
    ctx.font="bold 14px monospace";ctx.fillStyle="#c0392b";
    ctx.fillText("THE SECOND COMING HAS ENDED",W/2,H*0.23);

    // Draw goalie
    drawStickFigure(W/2,H*0.42,60,{headColor:"#ffd3a3",jerseyColor:"#fff",crossOnJersey:true,halo:true,stickHand:true,gloveHand:true,armRaise:0,legSpread:0.4});

    ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
    ctx.fillText("Saves: "+saves,W/2,H*0.50);
    ctx.fillText("Goals Against: "+goals,W/2,H*0.56);
    ctx.fillText("Save %: "+savePct+"%",W/2,H*0.62);
    ctx.fillText("Best Streak: "+bestStreak,W/2,H*0.68);

    var msg=savePct>=90?"MIRACLE ON ICE!":savePct>=75?"Blessed performance!":savePct>=60?"He died for these saves.":savePct>=40?"Even Jesus can't save that.":"Holy... that was bad.";
    ctx.font="12px monospace";ctx.fillStyle="#aaa";
    ctx.fillText(msg,W/2,H*0.75);

    if(saves>=bestSaves&&saves>0){ctx.fillStyle="#ffd700";ctx.fillText("NEW RECORD!",W/2,H*0.80);}

    ctx.fillStyle="#2962ff";ctx.font="14px monospace";
    ctx.fillText("[ Tap to play again ]",W/2,H*0.88);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
