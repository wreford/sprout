<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Jesus Saves 4: Overtime</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#1a2744;overflow:hidden;touch-action:manipulation;user-select:none}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// Sound
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function organ(freq,dur,vol){
  if(!audioCtx)return;
  [1,2,3,4].forEach(function(h){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=freq*h;g.gain.setValueAtTime((vol||0.02)/(h*h),audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);});
}
function sndSave(){organ(523,0.12,0.025);setTimeout(function(){organ(784,0.15,0.025);},70);}
function sndGoal(){organ(165,0.4,0.035);setTimeout(function(){organ(131,0.5,0.03);},200);}
function sndWhistle(){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=3200;g.gain.setValueAtTime(0.025,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.35);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.35);}
function sndBuzzer(){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sawtooth";o.frequency.value=150;g.gain.setValueAtTime(0.04,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+1.2);}

// Soft organ music loop
var musicPlaying=false,musicInterval=null;
function playOrganLoop(){
  if(musicPlaying)return;musicPlaying=true;
  var chords=[[262,330,392],[220,277,330],[247,311,370],[262,330,392]],ci=0;
  function play(){if(!musicPlaying)return;var c=chords[ci%chords.length];for(var i=0;i<c.length;i++)organ(c[i],1.8,0.006);ci++;}
  play();musicInterval=setInterval(play,2400);
}
function stopMusic(){musicPlaying=false;if(musicInterval){clearInterval(musicInterval);musicInterval=null;}}

// Narrator -- PROVEN cancel-then-speak-60ms pattern, deadpan British
var lastSpeakTime=0;
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastSpeakTime<4000)return;
    lastSpeakTime=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=0.85;u.pitch=0.8;u.volume=1.0;
        var voices=speechSynthesis.getVoices();
        var pick=null;
        for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.indexOf('en-GB')===0){pick=voices[i];break;}}
        if(!pick)for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.indexOf('en')===0){pick=voices[i];break;}}
        if(pick)u.voice=pick;
        speechSynthesis.speak(u);
      }catch(e){}
    },60);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// Jokes
var JOKES_SAVE=["Saved. Divine.","Blocked. Hallelujah.","Denied. Amen.","What a stop. Miraculous.","Glove save. Blessed.","The puck is confused.","Not today, puck.","Jesus saves. Obviously.","That puck had no prayer.","Nope. Try again.","Blocked by faith.","Stick save. Holy.","The net remains pure.","Puck rejected.","Save percentage: godly.","Another miracle on ice.","The crease is sacred.","No entry. Holy ground.","Saved by the bell. And Jesus.","That puck is going to church."];
var JOKES_GOAL=["Goal. Even God blinked.","In. Unfortunate.","Scored on. Humbling.","That one hurt.","The organ weeps.","Five hole. Embarrassing.","Goal. Prayers needed.","The net has been violated.","Score. Not great.","In. The crowd gasps.","Goal. Even saints miss.","That got through. Somehow.","Scored. The halo dims.","In. Regrettable.","Goal. Moving on."];
var JOKES_RANDOM=["The Zamboni is Noah's.","Concessions: bread and fish.","The ref is Judas.","Penalty box equals confession.","Team mascot: a lamb.","Half time: communion.","The ice is holy water.","Opposing team: Romans.","Arena capacity: five thousand.","Parking lot: donkeys only.","The replay goes to heaven.","Jersey number: thirty three.","Coach's strategy: faith.","The puck weighs six ounces. Like sin.","Overtime is purgatory.","Power play: divine intervention.","The away team's bus: a chariot.","Stadium snacks: loaves.","The national anthem: a hymn.","The jumbotron shows parables.","Ticket price: free will.","The blue line is the red sea.","Hat trick equals holy trinity.","The goalie coach is God.","The ice girls are angels.","The scoreboard is scripture.","Intermission: forty days.","The team doctor: Luke.","Draft pick: number one son.","The cup is the holy grail."];
var JOKES_STREAK=["Three saves. Father, son, spirit.","Five. Pentecost of saves.","Seven. Biblical number.","Ten. The commandments of goalkeeping.","Fifteen. Fifteen stations of saves."];
var saveJokeIdx=0,goalJokeIdx=0,randomJokeIdx=0,streakJokeIdx=0;
function pickSave(){var j=JOKES_SAVE[saveJokeIdx%JOKES_SAVE.length];saveJokeIdx++;return j;}
function pickGoal(){var j=JOKES_GOAL[goalJokeIdx%JOKES_GOAL.length];goalJokeIdx++;return j;}
function pickRandom(){var j=JOKES_RANDOM[randomJokeIdx%JOKES_RANDOM.length];randomJokeIdx++;return j;}
function pickStreak(){var j=JOKES_STREAK[streakJokeIdx%JOKES_STREAK.length];streakJokeIdx++;return j;}

// Game state
var STATE="menu";
var goalie,pucks,particles;
var saves,goals,totalShots,frame,streak,bestStreak;
var shotSpeed,shotInterval,shotTimer;
var periodTime,period;
var bestSaves=parseInt(localStorage.getItem("jesus4-best"))||0;
var goalW,goalH,netX,netY,netW,netH;
var lastRandomJokeFrame=0;

function reset(){
  goalW=Math.min(240,W*0.5);goalH=60;
  netX=W/2-goalW/2;netY=H-goalH-30;netW=goalW;netH=goalH;
  goalie={x:W/2,y:netY+10,w:40,h:50,targetX:W/2};
  pucks=[];particles=[];
  saves=0;goals=0;totalShots=0;frame=0;streak=0;bestStreak=0;
  shotSpeed=3;shotInterval=55;shotTimer=0;
  periodTime=3600;period=1;lastRandomJokeFrame=0;
  saveJokeIdx=Math.floor(Math.random()*JOKES_SAVE.length);
  goalJokeIdx=Math.floor(Math.random()*JOKES_GOAL.length);
  randomJokeIdx=Math.floor(Math.random()*JOKES_RANDOM.length);
  streakJokeIdx=0;
}

function shootPuck(){
  totalShots++;var fromX=50+Math.random()*(W-100),fromY=30+Math.random()*70;
  var tx=netX+20+Math.random()*(netW-40),ty=netY+Math.random()*netH*0.5;
  var dx=tx-fromX,dy=ty-fromY,len=Math.sqrt(dx*dx+dy*dy);
  var spd=shotSpeed+Math.random()*1.5;
  pucks.push({x:fromX,y:fromY,vx:dx/len*spd,vy:dy/len*spd,curve:(Math.random()-0.5)*0.3,radius:8,active:true});
}

// Input
var mouseX=W/2;
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;});
canvas.addEventListener('touchstart',function(e){e.preventDefault();initAudio();if(STATE==="menu"||STATE==="gameover"){STATE="playing";reset();playOrganLoop();sndWhistle();setTimeout(function(){speak("Puck drop. Let there be hockey.");},600);return;}mouseX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();mouseX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('click',function(){initAudio();if(STATE==="menu"||STATE==="gameover"){STATE="playing";reset();playOrganLoop();sndWhistle();setTimeout(function(){speak("Puck drop. Let there be hockey.");},600);}});

function spawnParts(x,y,color,count){for(var i=0;i<count;i++)particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color:color,size:3+Math.random()*4});}

function update(){
  if(STATE!=="playing")return;
  frame++;periodTime--;
  // Period end
  if(periodTime<=0){
    period++;periodTime=3600;sndWhistle();
    if(period>3){STATE="gameover";stopMusic();sndBuzzer();if(saves>bestSaves){bestSaves=saves;localStorage.setItem("jesus4-best",bestSaves);}speak("Final buzzer. "+saves+" saves. "+goals+" goals against.");return;}
    shotSpeed+=0.7;shotInterval=Math.max(20,shotInterval-8);
    speak("Period "+period+". Increasing difficulty.");
  }
  // Random joke every 25 seconds (1500 frames)
  if(frame-lastRandomJokeFrame>=1500&&frame>300){lastRandomJokeFrame=frame;speak(pickRandom());}
  // Shoot
  shotTimer++;if(shotTimer>=shotInterval){shotTimer=0;if(Math.random()<0.12&&period>=2)setTimeout(function(){if(STATE==="playing")shootPuck();},200);shootPuck();}
  // Move goalie
  goalie.targetX=Math.max(netX+goalie.w/2,Math.min(netX+netW-goalie.w/2,mouseX));
  goalie.x+=(goalie.targetX-goalie.x)*0.15;
  // Pucks
  for(var i=pucks.length-1;i>=0;i--){
    var p=pucks[i];if(!p.active)continue;
    p.vx+=p.curve*0.02;p.x+=p.vx;p.y+=p.vy;
    var gL=goalie.x-goalie.w/2,gR=goalie.x+goalie.w/2,gT=goalie.y-10,gB=goalie.y+goalie.h;
    if(p.x>gL-p.radius&&p.x<gR+p.radius&&p.y>gT-p.radius&&p.y<gB+p.radius){
      saves++;streak++;bestStreak=Math.max(bestStreak,streak);p.active=false;sndSave();
      spawnParts(p.x,p.y,"#ffd700",6);spawnParts(p.x,p.y,"#ffffff",3);
      if(streak===3||streak===5||streak===7||streak===10||streak===15){speak(pickStreak());}
      else if(Math.random()<0.4){speak(pickSave());}
      p.vy=-Math.abs(p.vy)*0.5;p.vx=(Math.random()-0.5)*4;
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},400);})(p);
      continue;
    }
    if(p.y>netY+10&&p.x>netX+5&&p.x<netX+netW-5){
      goals++;streak=0;p.active=false;sndGoal();sndBuzzer();
      spawnParts(p.x,p.y,"#ff3333",8);speak(pickGoal());
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},600);})(p);
      continue;
    }
    if(p.y>H+20||p.x<-20||p.x>W+20||p.y<-20)pucks.splice(i,1);
  }
  // Particles
  for(var i=particles.length-1;i>=0;i--){var pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life-=0.025;if(pt.life<=0)particles.splice(i,1);}
}

function draw(){
  // Ice gradient
  var ig=ctx.createLinearGradient(0,0,0,H);ig.addColorStop(0,"#c8dce8");ig.addColorStop(0.5,"#e0eef6");ig.addColorStop(1,"#d0dfe8");
  ctx.fillStyle=ig;ctx.fillRect(0,0,W,H);
  // Boards
  ctx.strokeStyle="#445";ctx.lineWidth=5;ctx.beginPath();ctx.roundRect(5,5,W-10,H-10,14);ctx.stroke();
  // Blue line
  ctx.fillStyle="rgba(41,98,255,0.18)";ctx.fillRect(12,H*0.35,W-24,5);
  // Red line
  ctx.fillStyle="rgba(255,30,30,0.18)";ctx.fillRect(12,H*0.55,W-24,5);
  // Center circle
  ctx.strokeStyle="rgba(255,30,30,0.15)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(W/2,H*0.45,55,0,Math.PI*2);ctx.stroke();
  ctx.font="12px serif";ctx.textAlign="center";ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillText("✞",W/2,H*0.45+4);

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 28px monospace";ctx.fillStyle="#1a2744";ctx.fillText("JESUS SAVES 4",W/2,H*0.18);
    ctx.font="bold 16px monospace";ctx.fillStyle="#555";ctx.fillText("OVERTIME",W/2,H*0.24);
    ctx.font="42px serif";ctx.fillText("⛸️\u{1F9D4}✞\u{1F3D2}",W/2,H*0.36);
    ctx.font="13px monospace";ctx.fillStyle="#555";
    ctx.fillText("Move left/right to block pucks",W/2,H*0.48);
    ctx.fillText("3 periods of 60 seconds each",W/2,H*0.53);
    ctx.fillText("British commentator included",W/2,H*0.58);
    if(bestSaves>0){ctx.fillStyle="#1a2744";ctx.font="12px monospace";ctx.fillText("Best: "+bestSaves+" saves",W/2,H*0.66);}
    ctx.fillStyle="#2962ff";ctx.font="13px monospace";ctx.fillText("[ Tap / Click to play ]",W/2,H*0.76);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.88);
    return;
  }

  // Net
  ctx.fillStyle="rgba(0,0,0,0.05)";ctx.fillRect(netX,netY,netW,netH);
  ctx.strokeStyle="rgba(0,0,0,0.07)";ctx.lineWidth=0.5;
  for(var ny=netY;ny<netY+netH;ny+=8){ctx.beginPath();ctx.moveTo(netX,ny);ctx.lineTo(netX+netW,ny);ctx.stroke();}
  for(var nx=netX;nx<netX+netW;nx+=8){ctx.beginPath();ctx.moveTo(nx,netY);ctx.lineTo(nx,netY+netH);ctx.stroke();}
  ctx.fillStyle="#cc0000";ctx.fillRect(netX-3,netY,5,netH);ctx.fillRect(netX+netW-2,netY,5,netH);ctx.fillRect(netX,netY-3,netW,5);
  // Crease
  ctx.strokeStyle="rgba(255,0,0,0.18)";ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.6,28,0,Math.PI,0);ctx.stroke();

  // Goalie
  var gx=goalie.x,gy=goalie.y;
  ctx.font="34px serif";ctx.textAlign="center";ctx.fillText("\u{1F9D4}",gx,gy+28);
  ctx.font="14px serif";ctx.fillText("\u{1F607}",gx,gy-4);
  ctx.font="18px serif";ctx.fillText("\u{1F3D2}",gx+16,gy+32);
  ctx.fillStyle="rgba(255,255,255,0.65)";ctx.fillRect(gx-17,gy+18,34,16);
  ctx.strokeStyle="rgba(0,0,0,0.12)";ctx.lineWidth=1;ctx.strokeRect(gx-17,gy+18,34,16);
  ctx.strokeStyle="rgba(200,0,0,0.3)";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(gx,gy+6);ctx.lineTo(gx,gy+20);ctx.stroke();ctx.beginPath();ctx.moveTo(gx-5,gy+12);ctx.lineTo(gx+5,gy+12);ctx.stroke();

  // Pucks
  for(var i=0;i<pucks.length;i++){
    var p=pucks[i];
    ctx.fillStyle="rgba(0,0,0,0.12)";ctx.beginPath();ctx.ellipse(p.x,p.y+3,p.radius,p.radius*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#111";ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
    if(p.active){ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x-p.vx*2,p.y-p.vy*2);ctx.lineTo(p.x-p.vx*5,p.y-p.vy*5);ctx.stroke();}
  }

  // Particles
  for(var i=0;i<particles.length;i++){var pt=particles[i];ctx.globalAlpha=pt.life;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // HUD
  ctx.fillStyle="rgba(26,39,68,0.85)";ctx.fillRect(W/2-110,H-24,220,22);
  ctx.font="bold 11px monospace";ctx.textAlign="center";ctx.fillStyle="#fff";
  ctx.fillText("P"+period+"  "+Math.ceil(periodTime/60)+"s   SAVES: "+saves+"   GA: "+goals,W/2,H-8);
  // Streak
  if(streak>=3){ctx.font="bold 13px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";ctx.fillText("\u{1F525} "+streak+" STREAK",W/2,netY-18);}
  // Save %
  var svp=totalShots>0?Math.round(saves/totalShots*100):100;
  ctx.textAlign="left";ctx.font="10px monospace";ctx.fillStyle="rgba(0,0,0,0.25)";ctx.fillText("SV% "+svp+"%",8,H-30);

  // Game over
  if(STATE==="gameover"){
    ctx.fillStyle="rgba(26,39,68,0.88)";ctx.fillRect(0,0,W,H);ctx.textAlign="center";
    ctx.font="bold 26px monospace";ctx.fillStyle="#fff";ctx.fillText("FINAL BUZZER",W/2,H*0.18);
    ctx.font="42px serif";ctx.fillText("\u{1F9D4}✞\u{1F3D2}",W/2,H*0.3);
    ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
    ctx.fillText("Saves: "+saves,W/2,H*0.42);ctx.fillText("Goals Against: "+goals,W/2,H*0.48);
    ctx.fillText("Save %: "+svp+"%",W/2,H*0.54);ctx.fillText("Best Streak: "+bestStreak,W/2,H*0.60);
    var msg=svp>=90?"Miracle on ice.":svp>=75?"Blessed performance.":svp>=60?"Respectable.":svp>=40?"Prayers needed.":"The congregation is disappointed.";
    ctx.font="12px monospace";ctx.fillStyle="#aaa";ctx.fillText(msg,W/2,H*0.68);
    if(saves>=bestSaves&&saves>0){ctx.fillStyle="#ffd700";ctx.fillText("\u{1F3C6} NEW RECORD!",W/2,H*0.74);}
    ctx.fillStyle="#2962ff";ctx.font="13px monospace";ctx.fillText("[ Tap to play again ]",W/2,H*0.84);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
