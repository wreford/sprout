  `An electrical ${["contact","arc flash","shock","fire"][Math.floor(r()*4)]} incident occurred at a ${site} in ${city} when a ${age}-year-old ${trade} ${["contacted energized 347V conductors in an open panel","operated a boom lift within 2m of 27.6kV overhead powerlines","cut into a live electrical cable that was not de-energized","was working on a circuit that had not been locked out","used a damaged extension cord in wet conditions"][Math.floor(r()*5)]}. ${["LOTO procedures were not followed.","The minimum approach distance was not maintained.","Temporary power had no GFCI protection.","The worker was not a licensed electrician.","The electrical panel had no danger signage."][Math.floor(r()*5)]} ${outcome} Investigation referenced ${REGS[catIdx]}.`,
  `At a ${site} in ${city}, a ${age}-year-old ${trade} was ${sev==="fatal"?"killed":"injured"} when ${["a scaffold plank gave way under load","the scaffold collapsed due to missing bracing","a rolling scaffold tipped over on uneven ground","a worker fell from a scaffold with no guardrails","a suspended scaffold's wire rope failed"][Math.floor(r()*5)]}. ${["The scaffold had not been inspected that day.","The scaffold was loaded beyond its rated capacity.","The scaffold was erected by untrained workers.","Planking was not properly secured to the frame.","Base plates were sitting directly on frozen soil."][Math.floor(r()*5)]} ${outcome} Violations of ${REGS[catIdx]} were identified.`,
  `A ${["crane","boom truck","mobile crane","tower crane"][Math.floor(r()*4)]} incident at a ${site} in ${city} resulted in ${sev} when ${["the load swung and struck a ${trade}","a rigging sling failed during a routine lift","the crane exceeded its rated capacity at operating radius","the crane contacted overhead powerlines during repositioning","outrigger pads sank into soft ground causing the crane to tip"][Math.floor(r()*5).toString().replace("a ${trade}","a "+trade)]}. ${["The operator did not have a valid certificate.","No signal person was present despite obstructed view.","The load chart was not consulted before the lift.","The rigging was not inspected before use.","A critical lift plan was not prepared."][Math.floor(r()*5)]} ${outcome} ${REGS[catIdx]} cited.`,
  `A confined space ${sev} occurred at a ${site} in ${city} when a ${age}-year-old ${trade} ${["entered a manhole without atmospheric testing","collapsed inside a storage tank due to oxygen deficiency","was overcome by H2S in a sanitary sewer connection","entered a valve pit without a rescue plan in place","was exposed to toxic vapours in an unventilated space"][Math.floor(r()*5)]}. ${["No entry permit had been issued.","Atmospheric monitoring was not continuous.","The attendant had left the entry point unattended.","Ventilation equipment was not set up before entry.","The rescue team was not on standby as required."][Math.floor(r()*5)]} ${outcome} Charges laid under ${REGS[catIdx]}.`,
  `A struck-by incident at a ${site} in ${city}: a ${age}-year-old ${trade} was ${["hit by a falling tool dropped from the level above","struck by concrete debris during chipping operations","hit by a swinging steel beam during crane operations","struck by material falling from an unsecured load","injured by a nail gun discharge that penetrated their hand"][Math.floor(r()*5)]}. ${["No toe boards were installed on the upper work platform.","The area below overhead work was not barricaded.","The worker was not wearing required eye protection.","Materials were not properly secured for lifting.","The tool lanyard requirement was not enforced."][Math.floor(r()*5)]} ${outcome} ${REGS[catIdx]} orders issued.`,
  `A caught-between ${sev} at a ${site} in ${city} involved a ${age}-year-old ${trade} who ${["was pinned between a concrete wall and a reversing skid steer","was caught in an unguarded conveyor belt","was trapped between a steel beam and a column during erection","was crushed when formwork collapsed during stripping","was pinned by a pipe that rolled off an unsecured stack"][Math.floor(r()*5)]}. ${["No spotter was present for the reversing vehicle.","The machine guard had been removed for maintenance.","The worker was positioned in the swing radius.","The formwork was stripped before concrete reached strength.","Materials were not properly chocked and secured."][Math.floor(r()*5)]} ${outcome} ${REGS[catIdx]} cited in the investigation.`
 ];
 let incidentIdx=catIdx%incidentTemplates.length;
 let incident=incidentTemplates[incidentIdx];
 const lessonTemplates=[
  `This incident reinforces that ${cat.toLowerCase()} controls must never be removed or bypassed without immediate replacement. A pre-task inspection that day would have identified the hazard. All workers must feel empowered to refuse unsafe work under OHSA s.43.`,
  `The root cause was a failure in the supervision system. The constructor did not ensure that the competent person had verified conditions before work began. Regular toolbox talks covering ${cat.toLowerCase()} requirements could have prevented this.`,
  `A proper hazard assessment before starting work would have identified this risk. The joint health and safety committee should review procedures for ${cat.toLowerCase()} and ensure all workers receive refresher training.`,
  `This incident highlights the critical importance of daily inspections and proper communication between trades. When one trade modifies safety controls, all affected workers must be notified immediately.`,
  `The lesson here is that complacency kills. The crew had done this task many times before without incident, which led to shortcuts. Following established procedures every time, regardless of experience, is the only reliable defense.`
 ];
 const lesson=lessonTemplates[Math.floor(r()*lessonTemplates.length)];
 const discuss=DISCUSS_TEMPLATES[Math.floor(r()*DISCUSS_TEMPLATES.length)];
 return{cat,icon,title,pts,incident,lesson,reg:REGS[catIdx],discuss,sev};
}
function renderCard(topic,dateStr,isToday,dayOfYear){
 const viewed=JSON.parse(localStorage.getItem("sd_viewed")||"{}");
 const viewedMark=viewed[dateStr]?'<span class="viewed">✓ Viewed</span>':"";
 viewed[dateStr]=true;localStorage.setItem("sd_viewed",JSON.stringify(viewed));
 return`<div class="card${isToday?" today":""}">
  ${viewedMark}
  <div class="cat">${topic.icon} ${topic.cat}</div>
  <div class="ttl">${topic.title}</div>
  <div style="font-size:12px;color:var(--dim);margin-bottom:6px">${dateStr} — Day ${dayOfYear} of 365</div>
  <div class="section"><h3>Key Safety Points</h3><ul>${topic.pts.map(p=>"<li>"+p+"</li>").join("")}</ul></div>
  <div class="section"><h3>Incident Report (${topic.sev})</h3><div class="incident">${topic.incident}</div></div>
  <div class="section"><h3>Lesson Learned</h3><div class="lesson">${topic.lesson}</div></div>
  <div class="reg">${topic.reg}</div>
  <div class="section"><h3>Discussion Question</h3><div class="discuss">"${topic.discuss}"</div></div>
 </div>`;
}
const today=new Date();const dayOfYear=getDayOfYear(today);
const todayStr=today.toISOString().slice(0,10);
const topic=genTopic(dayOfYear);
document.getElementById("ctr").textContent=`Day ${dayOfYear} of 365 safety topics`;
document.getElementById("today").innerHTML=renderCard(topic,todayStr,true,dayOfYear);
let archiveDays=0;
function loadMore(){
 const el=document.getElementById("archive");
 if(!archiveDays)el.innerHTML="<div class='archive-hdr'>Previous Days</div>";
 for(let i=0;i<7;i++){
  archiveDays++;const d=new Date(today);d.setDate(d.getDate()-archiveDays);
  const doy=getDayOfYear(d);const ds=d.toISOString().slice(0,10);
  const t=genTopic(doy);
  el.innerHTML+=renderCard(t,ds,false,doy);
 }
}
function printTopic(){window.print();}
function shareTopic(){
 const t=topic;const txt=`SAFETY TOPIC OF THE DAY — ${todayStr}\n\n${t.icon} ${t.cat}: ${t.title}\n\nKey Points:\n${t.pts.map((p,i)=>(i+1)+". "+p).join("\n")}\n\nINCIDENT REPORT (${t.sev}):\n${t.incident}\n\nLESSON LEARNED:\n${t.lesson}\n\nRegulation: ${t.reg}\n\nDiscussion: "${t.discuss}"\n\n— Ontario Construction Safety | OHSA / O. Reg. 213/91`;
 navigator.clipboard.writeText(txt).then(()=>{
  const b=document.getElementById("shareBtn");b.textContent="✓ Copied!";b.classList.add("copied");
  setTimeout(()=>{b.textContent="📋 Share";b.classList.remove("copied")},2000);
 });
}
</script>
