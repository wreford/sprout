<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ProjectIQ — Unified Project Intelligence</title>
<style>
:root{
  --bg:#0a0a12;--bg2:#12121a;--bg3:#1a1a24;--border:#2a2a3d;
  --text:#f0f0f0;--dim:#6e6e80;--accent:#ff6b35;--green:#4ade80;
  --red:#ef4444;--gold:#f7c948;--purple:#a78bfa;--blue:#60a5fa;
  --cyan:#22d3ee;--pink:#f472b6;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#555}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,10,18,0.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.topbar-row1{display:flex;align-items:center;gap:10px;padding:0 16px;height:48px}
.topbar .brand{font-family:var(--mono);font-weight:800;font-size:1.05rem;letter-spacing:.04em;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;cursor:default}
.project-name{background:none;border:1px solid transparent;border-radius:6px;color:var(--dim);font-size:.8rem;padding:3px 6px;font-family:var(--font);max-width:140px;transition:border-color .2s}
.project-name:focus{outline:none;border-color:var(--accent);background:var(--bg2);color:var(--text)}
.record-count{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:10px;font-family:var(--mono)}
.topbar-spacer{flex:1}
.topbar-actions{display:flex;gap:6px;align-items:center}
.topbar-row2{display:flex;align-items:center;gap:8px;padding:6px 16px 8px;border-top:1px solid rgba(255,255,255,0.04)}
.search-wrap{flex:1;position:relative}
.search-wrap input{width:100%;padding:8px 12px 8px 32px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem}
.search-wrap input:focus{outline:none;border-color:var(--accent)}
.search-wrap::before{content:"🔍";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.75rem;pointer-events:none}
.action-btns{display:flex;gap:4px;flex-shrink:0}
.btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:.82rem;cursor:pointer;font-weight:600;transition:all .15s;white-space:nowrap}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-sm{padding:6px 10px;font-size:.72rem}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red)}
.btn-blue{background:var(--blue);color:#000}
.btn-icon{padding:6px 8px;background:var(--bg2);border:1px solid var(--border);color:var(--dim);font-size:.78rem;border-radius:6px;cursor:pointer;transition:all .15s}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon.active{border-color:var(--accent);color:var(--accent);background:rgba(255,107,53,.1)}
.home-link{color:var(--dim);text-decoration:none;font-size:1.1rem;padding:4px 6px;border-radius:6px;transition:color .2s;flex-shrink:0}
.home-link:hover{color:var(--accent)}

/* Filter Bar */
.filterbar{border-bottom:1px solid var(--border);background:rgba(10,10,18,0.6)}
.type-chips-row{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.type-chips-row::-webkit-scrollbar{display:none}
.type-chip{padding:5px 10px;border-radius:16px;font-size:.7rem;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--dim);transition:all .2s;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:3px;flex-shrink:0}
.type-chip:hover{border-color:var(--accent);color:var(--text)}
.type-chip.active{border-color:var(--accent);color:#fff;background:rgba(255,107,53,.15)}
.filter-dropdowns{display:flex;gap:6px;padding:0 16px 8px;flex-wrap:wrap}
.filter-select{padding:5px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.72rem;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent)}

/* Layout */
.app-layout{display:flex;min-height:calc(100vh - 112px)}
.main-content{flex:1;padding:16px 20px;overflow-y:auto}
.sidebar{width:320px;border-left:1px solid var(--border);background:var(--bg2);padding:16px;overflow-y:auto;flex-shrink:0}

/* Record Cards */
.records-grid{display:flex;flex-direction:column;gap:8px}
.record-card{background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--dim);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative}
.record-card:hover{border-color:var(--accent);transform:translateX(2px);box-shadow:0 2px 16px rgba(255,107,53,.08)}
.record-card.expanded{background:var(--bg3)}
.record-card .card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.record-card .card-icon{font-size:1rem;flex-shrink:0}
.record-card .card-id{font-family:var(--mono);font-size:.72rem;color:var(--dim);flex-shrink:0}
.record-card .card-title{font-size:.9rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.record-card .card-badges{display:flex;gap:6px;align-items:center;flex-shrink:0}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:600;white-space:nowrap}
.badge-status{background:rgba(255,255,255,.08);color:var(--dim)}
.badge-priority-Critical{background:rgba(239,68,68,.2);color:var(--red)}
.badge-priority-High{background:rgba(247,201,72,.15);color:var(--gold)}
.badge-priority-Medium{background:rgba(96,165,250,.15);color:var(--blue)}
.badge-priority-Low{background:rgba(110,110,128,.15);color:var(--dim)}
.card-meta{display:flex;gap:12px;margin-top:6px;font-size:.72rem;color:var(--dim);flex-wrap:wrap}
.card-meta span{display:flex;align-items:center;gap:3px}
.card-detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);animation:fadeIn .2s}
.card-detail .desc{font-size:.84rem;color:#ccc;line-height:1.5;margin-bottom:10px;white-space:pre-wrap}
.card-detail .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:10px}
.card-detail .fg-item{background:var(--bg);border-radius:6px;padding:8px 10px}
.card-detail .fg-label{font-size:.68rem;color:var(--dim);margin-bottom:2px}
.card-detail .fg-value{font-size:.82rem;font-weight:500}
.card-detail .linked-records{margin-top:8px}
.card-detail .linked-records .lr-title{font-size:.72rem;color:var(--dim);margin-bottom:4px}
.card-detail .linked-records .lr-chip{display:inline-block;padding:2px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:.7rem;margin:2px;cursor:pointer;color:var(--accent);transition:all .15s}
.card-detail .linked-records .lr-chip:hover{border-color:var(--accent)}
.card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.score-display{font-family:var(--mono);font-weight:800;font-size:1rem}
.score-high{color:var(--red)}.score-med{color:var(--gold)}.score-low{color:var(--green)}

/* Overdue pulse */
.record-card.overdue{animation:overduePulse 2s ease-in-out infinite}
@keyframes overduePulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 12px rgba(239,68,68,.3)}}
/* High risk glow */
.record-card.high-risk{box-shadow:0 0 10px rgba(239,68,68,.15)}

/* Type colors */
.type-Risk{border-left-color:#ef4444}.type-Opportunity{border-left-color:#f7c948}
.type-Assumption{border-left-color:#a78bfa}.type-Requirement{border-left-color:#60a5fa}
.type-Task{border-left-color:#4ade80}.type-Action{border-left-color:#ff6b35}
.type-Lesson{border-left-color:#f472b6}.type-Fact{border-left-color:#22d3ee}
.type-Decision{border-left-color:#fb923c}.type-Dependency{border-left-color:#818cf8}

/* Sidebar */
.sidebar-section{margin-bottom:20px}
.sidebar-section h3{font-size:.78rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.donut-wrap{display:flex;justify-content:center;margin-bottom:8px}
.donut-legend{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:.68rem}
.donut-legend span{display:flex;align-items:center;gap:4px}
.donut-legend .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stat-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.72rem}
.stat-bar .bar-label{width:70px;color:var(--dim);text-align:right;flex-shrink:0}
.stat-bar .bar-track{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.stat-bar .bar-fill{height:100%;border-radius:4px;transition:width .4s}
.stat-bar .bar-count{width:24px;color:var(--text);font-family:var(--mono);font-weight:600;text-align:right}
.heat-map{display:grid;grid-template-columns:24px repeat(5,1fr);gap:2px;font-size:.62rem;text-align:center}
.heat-map .hm-cell{padding:4px 2px;border-radius:3px;min-height:24px;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--mono)}
.heat-map .hm-label{color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:.58rem}
.big-num{font-size:2rem;font-weight:800;font-family:var(--mono);text-align:center}
.big-num.red{color:var(--red)}.big-num.green{color:var(--green)}.big-num.gold{color:var(--gold)}
.mini-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:.75rem;cursor:pointer;transition:background .15s}
.mini-item:hover{background:var(--bg3)}
.mini-item .mi-icon{flex-shrink:0}.mini-item .mi-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-item .mi-sub{color:var(--dim);font-size:.68rem;flex-shrink:0}
.health-bar{height:10px;border-radius:5px;background:var(--bg);overflow:hidden;margin:6px 0}
.health-fill{height:100%;border-radius:5px;transition:width .5s}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;padding:24px;position:relative;transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h2{font-size:1.1rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--dim);font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:4px;transition:color .15s}
.modal .close-btn:hover{color:var(--red)}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.form-field{flex:1;min-width:140px}
.form-field label{display:block;font-size:.72rem;color:var(--dim);margin-bottom:4px;font-weight:500}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:9px 12px;font-size:.85rem;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);resize:vertical;transition:border-color .15s}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--accent)}
.form-field textarea{min-height:60px}
.type-selector{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.type-opt{padding:6px 14px;border-radius:20px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--dim);transition:all .2s;display:flex;align-items:center;gap:4px}
.type-opt:hover{border-color:var(--accent);color:var(--text)}
.type-opt.selected{border-color:var(--accent);color:#fff;background:rgba(255,107,53,.18)}
.form-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.82rem;z-index:600;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-state .es-icon{font-size:3rem;margin-bottom:12px}
.empty-state h3{font-size:1rem;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:.82rem;margin-bottom:16px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.record-card{animation:fadeIn .25s ease}

/* Template modal */
.template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:12px}
.template-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.template-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.template-card .tc-icon{font-size:1.8rem;margin-bottom:6px}
.template-card .tc-name{font-size:.85rem;font-weight:600;margin-bottom:4px}
.template-card .tc-count{font-size:.7rem;color:var(--dim)}

/* Convert dropdown */
.convert-menu{position:absolute;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:300;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.convert-menu button{display:block;width:100%;text-align:left;padding:6px 10px;background:none;border:none;color:var(--text);font-size:.78rem;cursor:pointer;border-radius:4px;transition:background .15s}
.convert-menu button:hover{background:var(--bg2)}

/* Responsive */
@media(max-width:900px){
  .sidebar{display:none}
  .app-layout.show-sidebar .sidebar{display:block;position:fixed;bottom:0;left:0;right:0;width:100%;height:50vh;z-index:300;border-left:none;border-top:1px solid var(--border);border-radius:14px 14px 0 0}
  .app-layout.show-sidebar .main-content{margin-bottom:50vh}
}
@media(max-width:600px){
  .topbar-row1{padding:0 10px;height:44px;gap:6px}
  .topbar-row2{padding:4px 10px 6px;gap:6px}
  .project-name{max-width:90px;font-size:.72rem}
  .type-chips-row{padding:6px 10px}
  .filter-dropdowns{padding:0 10px 6px}
  .main-content{padding:10px}
  .record-card{padding:10px 12px}
  .btn{padding:7px 12px;font-size:.78rem}
  .btn-sm{padding:5px 8px;font-size:.68rem}
}
@media print{
  body{background:#fff;color:#000}
  .topbar,.filterbar,.sidebar,.btn,.card-actions,.modal-overlay{display:none!important}
  .record-card{border:1px solid #ccc;break-inside:avoid;background:#fff}
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-row1">
    <a href="index.html" class="home-link" title="Home">&#8592;</a>
    <div class="brand">&#129504; ProjectIQ</div>
    <input class="project-name" id="projectName" value="My Project" placeholder="Project name" title="Click to edit project name"/>
    <span class="record-count" id="recordCount">0</span>
    <div class="topbar-spacer"></div>
    <div class="topbar-actions">
      <button class="btn btn-sm" id="sidebarToggle" onclick="toggleSidebar()" style="display:none">&#128202;</button>
      <button class="btn" onclick="openModal()">&#43; Record</button>
    </div>
  </div>
  <div class="topbar-row2">
    <div class="search-wrap"><input type="text" id="searchInput" placeholder="Search records... ( / )"/></div>
    <div class="action-btns">
      <button class="btn-icon" id="raidBtn" onclick="toggleRAID()" title="RAID Log View">RAID</button>
      <button class="btn-icon" onclick="showTemplates()" title="Load template">&#128221;</button>
      <button class="btn-icon" onclick="exportCSV()" title="Export CSV">&#128229;</button>
    </div>
  </div>
</div>

<!-- Filter Bar -->
<div class="filterbar">
  <div class="type-chips-row" id="typeChips"></div>
  <div class="filter-dropdowns" id="filterDropdowns"></div>
</div>

<!-- App Layout -->
<div class="app-layout" id="appLayout">
  <div class="main-content" id="mainContent"></div>
  <div class="sidebar" id="sidebar"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ============================================
   ProjectIQ — Unified Project Intelligence
   ============================================ */

const STORAGE_KEY = 'projectiq-data';

const TYPES = {
  Risk:       {icon:'🔴',color:'#ef4444',statuses:['Open','Mitigated','Closed','Occurred']},
  Opportunity:{icon:'⭐',color:'#f7c948',statuses:['Identified','Pursuing','Captured','Expired']},
  Assumption: {icon:'💭',color:'#a78bfa',statuses:['Active','Validated','Invalid']},
  Requirement:{icon:'📏',color:'#60a5fa',statuses:['Draft','Approved','Implemented','Verified','Changed']},
  Task:       {icon:'📋',color:'#4ade80',statuses:['To Do','In Progress','Review','Done']},
  Action:     {icon:'⚡',color:'#ff6b35',statuses:['Open','In Progress','Complete','Overdue']},
  Lesson:     {icon:'📖',color:'#f472b6',statuses:['Draft','Approved','Shared']},
  Fact:       {icon:'📌',color:'#22d3ee',statuses:['Confirmed','Unconfirmed','Disputed']},
  Decision:   {icon:'🎯',color:'#fb923c',statuses:['Pending','Made','Reversed']},
  Dependency: {icon:'🔗',color:'#818cf8',statuses:['Active','Resolved','Blocked']}
};

const PRIORITIES = ['Critical','High','Medium','Low'];

let state = {
  projectName: 'My Project',
  records: [],
  nextId: 1,
  filters: { types: [], status: '', priority: '', owner: '', sort: 'newest' },
  raidMode: false,
  expandedId: null,
  editingId: null,
  showSidebar: false
};

/* ── Persistence ── */
function save() {
  state.projectName = document.getElementById('projectName').value || 'My Project';
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (d) {
      state = { ...state, ...d };
      if (!state.filters) state.filters = { types:[], status:'', priority:'', owner:'', sort:'newest' };
    }
  } catch(e) {}
  document.getElementById('projectName').value = state.projectName;
}

/* ── Generate ID ── */
function genId() {
  const id = 'IQ-' + String(state.nextId).padStart(3,'0');
  state.nextId++;
  return id;
}

/* ── Toast ── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── Filter Bar ── */
function renderFilterBar() {
  const chips = document.getElementById('typeChips');
  const drops = document.getElementById('filterDropdowns');
  let chipHtml = '';
  Object.keys(TYPES).forEach(t => {
    const active = state.filters.types.includes(t) ? 'active' : '';
    chipHtml += `<div class="type-chip ${active}" onclick="toggleTypeFilter('${t}')">${TYPES[t].icon} ${t}</div>`;
  });
  chips.innerHTML = chipHtml;

  let dropHtml = '';
  const allStatuses = [...new Set(Object.values(TYPES).flatMap(t=>t.statuses))];
  dropHtml += '<select class="filter-select" onchange="state.filters.status=this.value;save();render()"><option value="">All Status</option>';
  allStatuses.forEach(s => dropHtml += `<option ${state.filters.status===s?'selected':''}>${s}</option>`);
  dropHtml += '</select>';
  dropHtml += '<select class="filter-select" onchange="state.filters.priority=this.value;save();render()"><option value="">All Priority</option>';
  PRIORITIES.forEach(p => dropHtml += `<option ${state.filters.priority===p?'selected':''}>${p}</option>`);
  dropHtml += '</select>';
  const owners = [...new Set(state.records.map(r=>r.owner).filter(Boolean))].sort();
  dropHtml += '<select class="filter-select" onchange="state.filters.owner=this.value;save();render()"><option value="">All Owners</option>';
  owners.forEach(o => dropHtml += `<option ${state.filters.owner===o?'selected':''}>${o}</option>`);
  dropHtml += '</select>';
  dropHtml += '<select class="filter-select" onchange="state.filters.sort=this.value;save();render()">';
  ['newest','oldest','priority','score','due date'].forEach(s => {
    dropHtml += `<option ${state.filters.sort===s?'selected':''}>${s}</option>`;
  });
  dropHtml += '</select>';
  drops.innerHTML = dropHtml;

  // Update RAID button state
  const raidBtn = document.getElementById('raidBtn');
  if (raidBtn) raidBtn.classList.toggle('active', state.raidMode);
}

function toggleTypeFilter(type) {
  const idx = state.filters.types.indexOf(type);
  if (idx >= 0) state.filters.types.splice(idx, 1);
  else state.filters.types.push(type);
  save(); renderFilterBar(); render();
}

/* ── Filter & Sort Records ── */
function getFilteredRecords() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let recs = state.records.filter(r => {
    if (state.filters.types.length && !state.filters.types.includes(r.type)) return false;
    if (state.filters.status && r.status !== state.filters.status) return false;
    if (state.filters.priority && r.priority !== state.filters.priority) return false;
    if (state.filters.owner && r.owner !== state.filters.owner) return false;
    if (q) {
      const hay = (r.id+' '+r.title+' '+r.description+' '+r.type+' '+r.status+' '+r.owner+' '+(r.tags||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (state.raidMode) {
      if (!['Risk','Assumption','Action','Dependency'].includes(r.type)) return false;
    }
    return true;
  });
  const priOrd = {Critical:0,High:1,Medium:2,Low:3};
  switch(state.filters.sort) {
    case 'oldest': recs.sort((a,b)=>new Date(a.created)-new Date(b.created)); break;
    case 'priority': recs.sort((a,b)=>(priOrd[a.priority]??4)-(priOrd[b.priority]??4)); break;
    case 'score': recs.sort((a,b)=>((b.extra?.score||0)-(a.extra?.score||0))); break;
    case 'due date': recs.sort((a,b)=>{
      const da = a.extra?.dueDate || 'z', db = b.extra?.dueDate || 'z';
      return da < db ? -1 : da > db ? 1 : 0;
    }); break;
    default: recs.sort((a,b)=>new Date(b.created)-new Date(a.created));
  }
  return recs;
}

/* ── Check overdue ── */
function isOverdue(r) {
  const due = r.extra?.dueDate;
  if (!due) return false;
  const doneStatuses = ['Done','Complete','Closed','Captured','Resolved','Verified','Shared','Made','Mitigated','Validated'];
  if (doneStatuses.includes(r.status)) return false;
  return new Date(due) < new Date(new Date().toDateString());
}

/* ── Render Main ── */
function render() {
  const recs = getFilteredRecords();
  const main = document.getElementById('mainContent');
  document.getElementById('recordCount').textContent = state.records.length;

  if (recs.length === 0) {
    if (state.records.length === 0) {
      main.innerHTML = `<div class="empty-state"><div class="es-icon">🧠</div><h3>Welcome to ProjectIQ</h3><p>Track risks, tasks, assumptions, decisions and everything else in one unified register.</p><button class="btn" onclick="openModal()">&#43; Add First Record</button>&nbsp;<button class="btn btn-ghost" onclick="showTemplates()">Load Template</button></div>`;
    } else {
      main.innerHTML = `<div class="empty-state"><div class="es-icon">🔍</div><h3>No matching records</h3><p>Try adjusting your filters or search.</p></div>`;
    }
    renderSidebar();
    return;
  }

  let html = '<div class="records-grid">';
  recs.forEach(r => {
    const t = TYPES[r.type];
    const expanded = state.expandedId === r.id;
    const overdue = isOverdue(r);
    const highRisk = r.type === 'Risk' && (r.extra?.score || 0) >= 15;
    let cls = `record-card type-${r.type}`;
    if (expanded) cls += ' expanded';
    if (overdue) cls += ' overdue';
    if (highRisk) cls += ' high-risk';

    html += `<div class="${cls}" onclick="toggleExpand('${r.id}')">`;
    html += `<div class="card-top">`;
    html += `<span class="card-icon">${t.icon}</span>`;
    html += `<span class="card-id">${r.id}</span>`;
    html += `<span class="card-title">${esc(r.title)}</span>`;
    html += `<div class="card-badges">`;
    if (r.extra?.score) {
      const sc = r.extra.score;
      const scCls = sc >= 15 ? 'score-high' : sc >= 8 ? 'score-med' : 'score-low';
      html += `<span class="score-display ${scCls}">${sc}</span>`;
    }
    html += `<span class="badge badge-status">${r.status}</span>`;
    html += `<span class="badge badge-priority-${r.priority}">${r.priority}</span>`;
    if (overdue) html += `<span class="badge" style="background:rgba(239,68,68,.25);color:#ef4444">OVERDUE</span>`;
    html += `</div></div>`;
    html += `<div class="card-meta">`;
    if (r.owner) html += `<span>👤 ${esc(r.owner)}</span>`;
    html += `<span>📅 ${fmtDate(r.created)}</span>`;
    if (r.extra?.dueDate) html += `<span>⏰ ${fmtDate(r.extra.dueDate)}</span>`;
    if (r.tags) html += `<span>🏷️ ${esc(r.tags)}</span>`;
    html += `</div>`;

    if (expanded) {
      html += `<div class="card-detail" onclick="event.stopPropagation()">`;
      if (r.description) html += `<div class="desc">${esc(r.description)}</div>`;
      html += `<div class="field-grid">`;
      html += renderExtraFields(r);
      html += `</div>`;
      // Linked records
      if (r.linkedRecords && r.linkedRecords.length) {
        html += `<div class="linked-records"><div class="lr-title">🔗 Linked Records</div>`;
        r.linkedRecords.forEach(lid => {
          const lr = state.records.find(x=>x.id===lid);
          if (lr) html += `<span class="lr-chip" onclick="scrollToRecord('${lid}')">${lid}: ${esc(lr.title)}</span>`;
          else html += `<span class="lr-chip">${lid} (not found)</span>`;
        });
        html += `</div>`;
      }
      html += `<div class="card-actions">`;
      html += `<button class="btn btn-sm" onclick="openModal('${r.id}')">✏️ Edit</button>`;
      html += `<button class="btn btn-sm btn-ghost" onclick="showConvertMenu(event,'${r.id}')">🔄 Convert</button>`;
      html += `<button class="btn btn-sm btn-ghost" onclick="duplicateRecord('${r.id}')">📄 Duplicate</button>`;
      html += `<button class="btn btn-sm btn-red" onclick="deleteRecord('${r.id}')">🗑️ Delete</button>`;
      html += `</div></div>`;
    }
    html += `</div>`;
  });
  html += '</div>';
  main.innerHTML = html;
  renderSidebar();
}

function renderExtraFields(r) {
  let html = '';
  const fg = (label, val) => {
    if (val === undefined || val === null || val === '') return '';
    return `<div class="fg-item"><div class="fg-label">${label}</div><div class="fg-value">${esc(String(val))}</div></div>`;
  };
  switch(r.type) {
    case 'Risk':
      html += fg('Likelihood', r.extra?.likelihood);
      html += fg('Impact', r.extra?.impact);
      html += fg('Score', r.extra?.score);
      html += fg('Mitigation', r.extra?.mitigation);
      break;
    case 'Opportunity':
      html += fg('Probability', r.extra?.probability);
      html += fg('Benefit', r.extra?.benefit);
      html += fg('Score', r.extra?.score);
      html += fg('Action to Capture', r.extra?.actionToCapture);
      break;
    case 'Assumption':
      html += fg('Impact if Wrong', r.extra?.impactIfWrong);
      html += fg('Validation Method', r.extra?.validationMethod);
      break;
    case 'Requirement':
      html += fg('MoSCoW', r.extra?.moscow);
      html += fg('Source', r.extra?.source);
      html += fg('Acceptance Criteria', r.extra?.acceptanceCriteria);
      break;
    case 'Task':
      html += fg('Due Date', r.extra?.dueDate);
      html += fg('Effort (hrs)', r.extra?.effort);
      html += fg('Assignee', r.extra?.assignee);
      break;
    case 'Action':
      html += fg('Due Date', r.extra?.dueDate);
      html += fg('Assigned To', r.extra?.assignedTo);
      html += fg('Source', r.extra?.actionSource);
      break;
    case 'Lesson':
      html += fg('Category', r.extra?.category);
      html += fg('Phase', r.extra?.phase);
      html += fg('Recommendation', r.extra?.recommendation);
      break;
    case 'Fact':
      html += fg('Source', r.extra?.factSource);
      html += fg('Evidence', r.extra?.evidence);
      html += fg('Relevance', r.extra?.relevance);
      break;
    case 'Decision':
      html += fg('Decision Maker', r.extra?.decisionMaker);
      html += fg('Alternatives', r.extra?.alternatives);
      html += fg('Rationale', r.extra?.rationale);
      break;
    case 'Dependency':
      html += fg('Depends On', r.extra?.dependsOn);
      html += fg('Type', r.extra?.depType);
      html += fg('Impact if Unresolved', r.extra?.impactIfUnresolved);
      break;
  }
  html += fg('Updated', r.updated ? fmtDate(r.updated) : '');
  return html;
}

function toggleExpand(id) {
  state.expandedId = state.expandedId === id ? null : id;
  render();
}

function scrollToRecord(id) {
  state.expandedId = id;
  render();
  setTimeout(() => {
    const el = document.querySelector(`.record-card.expanded`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 50);
}

/* ── Sidebar / Dashboard ── */
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!state.records.length) {
    sb.innerHTML = '<div style="text-align:center;color:var(--dim);padding:30px;font-size:.82rem">Add records to see your dashboard</div>';
    return;
  }
  let html = '';

  // Record breakdown donut
  html += '<div class="sidebar-section"><h3>📊 Breakdown</h3><div class="donut-wrap"><canvas id="donutChart" width="160" height="160"></canvas></div><div class="donut-legend" id="donutLegend"></div></div>';

  // Status bars
  html += '<div class="sidebar-section"><h3>📋 Status</h3>';
  const statusCounts = {};
  state.records.forEach(r => { statusCounts[r.status] = (statusCounts[r.status]||0)+1; });
  const maxSC = Math.max(...Object.values(statusCounts), 1);
  Object.entries(statusCounts).sort((a,b)=>b[1]-a[1]).slice(0,8).forEach(([s,c]) => {
    html += `<div class="stat-bar"><span class="bar-label">${s}</span><div class="bar-track"><div class="bar-fill" style="width:${c/maxSC*100}%;background:var(--accent)"></div></div><span class="bar-count">${c}</span></div>`;
  });
  html += '</div>';

  // Risk heat map
  const risks = state.records.filter(r=>r.type==='Risk' && r.status!=='Closed');
  if (risks.length) {
    html += '<div class="sidebar-section"><h3>🔥 Risk Heat Map</h3><div class="heat-map" id="heatMap">';
    // Header row
    html += '<div class="hm-label"></div>';
    for(let i=1;i<=5;i++) html += `<div class="hm-label">${i}</div>`;
    // Rows
    for(let impact=5;impact>=1;impact--) {
      html += `<div class="hm-label">${impact}</div>`;
      for(let lik=1;lik<=5;lik++) {
        const count = risks.filter(r=>(r.extra?.likelihood||0)==lik && (r.extra?.impact||0)==impact).length;
        const score = lik*impact;
        let bg = score >= 15 ? 'rgba(239,68,68,.5)' : score >= 8 ? 'rgba(247,201,72,.35)' : score >= 4 ? 'rgba(96,165,250,.2)' : 'rgba(255,255,255,.04)';
        html += `<div class="hm-cell" style="background:${bg}">${count||''}</div>`;
      }
    }
    html += '</div></div>';
  }

  // Health score
  html += '<div class="sidebar-section"><h3>💚 Health Score</h3>';
  const health = calcHealth();
  const hColor = health >= 70 ? 'var(--green)' : health >= 40 ? 'var(--gold)' : 'var(--red)';
  html += `<div class="big-num" style="color:${hColor}">${health}<span style="font-size:.8rem;color:var(--dim)">/100</span></div>`;
  html += `<div class="health-bar"><div class="health-fill" style="width:${health}%;background:${hColor}"></div></div>`;
  html += '</div>';

  // Overdue
  const overdueRecs = state.records.filter(isOverdue);
  html += '<div class="sidebar-section"><h3>⏰ Overdue</h3>';
  html += `<div class="big-num ${overdueRecs.length?'red':'green'}">${overdueRecs.length}</div>`;
  if (overdueRecs.length) {
    overdueRecs.slice(0,5).forEach(r => {
      html += `<div class="mini-item" onclick="scrollToRecord('${r.id}')"><span class="mi-icon">${TYPES[r.type].icon}</span><span class="mi-text">${esc(r.title)}</span><span class="mi-sub">${r.extra?.dueDate||''}</span></div>`;
    });
  }
  html += '</div>';

  // Top risks
  const topRisks = state.records.filter(r=>r.type==='Risk'&&r.status!=='Closed').sort((a,b)=>(b.extra?.score||0)-(a.extra?.score||0)).slice(0,3);
  if (topRisks.length) {
    html += '<div class="sidebar-section"><h3>🔴 Top Risks</h3>';
    topRisks.forEach(r => {
      const sc = r.extra?.score||0;
      const scCls = sc>=15?'score-high':sc>=8?'score-med':'score-low';
      html += `<div class="mini-item" onclick="scrollToRecord('${r.id}')"><span class="mi-icon score-display ${scCls}" style="font-size:.8rem">${sc}</span><span class="mi-text">${esc(r.title)}</span></div>`;
    });
    html += '</div>';
  }

  // Upcoming actions
  const upcoming = state.records.filter(r=>r.extra?.dueDate && !['Done','Complete','Closed','Captured','Resolved','Verified','Shared','Made','Mitigated'].includes(r.status)).sort((a,b)=>a.extra.dueDate.localeCompare(b.extra.dueDate)).slice(0,5);
  if (upcoming.length) {
    html += '<div class="sidebar-section"><h3>📅 Upcoming</h3>';
    upcoming.forEach(r => {
      html += `<div class="mini-item" onclick="scrollToRecord('${r.id}')"><span class="mi-icon">${TYPES[r.type].icon}</span><span class="mi-text">${esc(r.title)}</span><span class="mi-sub">${r.extra.dueDate}</span></div>`;
    });
    html += '</div>';
  }

  // Recent activity
  const recent = [...state.records].sort((a,b)=>new Date(b.updated||b.created)-new Date(a.updated||a.created)).slice(0,5);
  html += '<div class="sidebar-section"><h3>🕐 Recent</h3>';
  recent.forEach(r => {
    html += `<div class="mini-item" onclick="scrollToRecord('${r.id}')"><span class="mi-icon">${TYPES[r.type].icon}</span><span class="mi-text">${esc(r.title)}</span><span class="mi-sub">${fmtDate(r.updated||r.created)}</span></div>`;
  });
  html += '</div>';

  sb.innerHTML = html;

  // Draw donut chart
  setTimeout(drawDonut, 10);
}

function drawDonut() {
  const canvas = document.getElementById('donutChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 80, cy = 80, r = 60, rInner = 36;
  ctx.clearRect(0,0,160,160);

  const counts = {};
  Object.keys(TYPES).forEach(t => counts[t] = 0);
  state.records.forEach(rec => counts[rec.type]++);
  const total = state.records.length;
  if (!total) return;

  let angle = -Math.PI/2;
  const entries = Object.entries(counts).filter(([,c])=>c>0);

  entries.forEach(([type, count]) => {
    const sweep = (count/total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx,cy,r,angle,angle+sweep);
    ctx.arc(cx,cy,rInner,angle+sweep,angle,true);
    ctx.closePath();
    ctx.fillStyle = TYPES[type].color;
    ctx.fill();
    angle += sweep;
  });

  // Center text
  ctx.fillStyle = '#f0f0f0';
  ctx.font = 'bold 20px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(total, cx, cy - 6);
  ctx.font = '10px -apple-system,sans-serif';
  ctx.fillStyle = '#6e6e80';
  ctx.fillText('records', cx, cy + 10);

  // Legend
  const legend = document.getElementById('donutLegend');
  if (legend) {
    legend.innerHTML = entries.map(([t,c]) => `<span><span class="dot" style="background:${TYPES[t].color}"></span>${t} (${c})</span>`).join('');
  }
}

function calcHealth() {
  if (!state.records.length) return 100;
  let score = 100;
  const openHighRisks = state.records.filter(r=>r.type==='Risk'&&r.status==='Open'&&(r.extra?.score||0)>=15).length;
  score -= openHighRisks * 10;
  const overdueCount = state.records.filter(isOverdue).length;
  score -= overdueCount * 5;
  const invalidAssumptions = state.records.filter(r=>r.type==='Assumption'&&r.status==='Invalid').length;
  score -= invalidAssumptions * 5;
  const blockedDeps = state.records.filter(r=>r.type==='Dependency'&&r.status==='Blocked').length;
  score -= blockedDeps * 8;
  const openActions = state.records.filter(r=>r.type==='Action'&&r.status==='Open').length;
  score -= openActions * 2;
  const pendingDecisions = state.records.filter(r=>r.type==='Decision'&&r.status==='Pending').length;
  score -= pendingDecisions * 3;
  return Math.max(0, Math.min(100, Math.round(score)));
}

/* ── Modal (Add/Edit) ── */
function openModal(editId) {
  state.editingId = editId || null;
  const rec = editId ? state.records.find(r=>r.id===editId) : null;
  const isEdit = !!rec;
  const selType = rec ? rec.type : 'Risk';

  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');

  let html = `<button class="close-btn" onclick="closeModal()">&times;</button>`;
  html += `<h2>${isEdit ? '✏️ Edit' : '➕ New'} Record ${isEdit ? rec.id : ''}</h2>`;

  // Type selector
  html += '<div class="type-selector" id="typeSelector">';
  Object.keys(TYPES).forEach(t => {
    html += `<div class="type-opt ${t===selType?'selected':''}" onclick="changeModalType('${t}')" data-type="${t}">${TYPES[t].icon} ${t}</div>`;
  });
  html += '</div>';

  html += buildFormFields(selType, rec);

  html += '<div class="form-actions">';
  if (isEdit) html += `<button class="btn btn-red btn-sm" onclick="deleteRecord('${rec.id}');closeModal()">Delete</button>`;
  html += `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>`;
  html += `<button class="btn" onclick="saveRecord()">${isEdit ? 'Update' : 'Create'}</button>`;
  html += '</div>';

  modal.innerHTML = html;
  overlay.classList.add('open');
  setTimeout(() => { const ti = document.getElementById('fTitle'); if(ti) ti.focus(); }, 100);
}

function buildFormFields(type, rec) {
  const v = (field, def='') => rec ? (rec[field] ?? rec.extra?.[field] ?? def) : def;
  let html = '<div id="formFields">';
  // Common
  html += '<div class="form-row">';
  html += `<div class="form-field" style="flex:3"><label>Title *</label><input id="fTitle" value="${esc(v('title'))}" placeholder="What is this record about?"></div>`;
  html += `<div class="form-field"><label>Priority</label><select id="fPriority">${PRIORITIES.map(p=>`<option ${v('priority','Medium')===p?'selected':''}>${p}</option>`).join('')}</select></div>`;
  html += '</div>';
  html += `<div class="form-row"><div class="form-field"><label>Description</label><textarea id="fDesc" rows="3" placeholder="Detailed description...">${esc(v('description'))}</textarea></div></div>`;
  html += '<div class="form-row">';
  html += `<div class="form-field"><label>Status</label><select id="fStatus">${TYPES[type].statuses.map(s=>`<option ${v('status',TYPES[type].statuses[0])===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  html += `<div class="form-field"><label>Owner</label><input id="fOwner" value="${esc(v('owner'))}" placeholder="Who owns this?"></div>`;
  html += '</div>';
  html += '<div class="form-row">';
  html += `<div class="form-field"><label>Tags</label><input id="fTags" value="${esc(v('tags',''))}" placeholder="Comma-separated tags"></div>`;
  html += `<div class="form-field"><label>Linked Records</label><input id="fLinked" value="${rec && rec.linkedRecords ? rec.linkedRecords.join(', ') : ''}" placeholder="IQ-001, IQ-002..."></div>`;
  html += '</div>';

  // Type-specific
  html += '<div id="typeSpecificFields">';
  html += getTypeFields(type, rec);
  html += '</div>';
  html += '</div>';
  return html;
}

function getTypeFields(type, rec) {
  const v = (field, def='') => rec ? (rec.extra?.[field] ?? def) : def;
  let html = '';
  switch(type) {
    case 'Risk':
      html += '<div class="form-row">';
      html += `<div class="form-field"><label>Likelihood (1-5)</label><select id="fLikelihood">${[1,2,3,4,5].map(n=>`<option ${v('likelihood',3)==n?'selected':''}>${n}</option>`).join('')}</select></div>`;
      html += `<div class="form-field"><label>Impact (1-5)</label><select id="fImpact">${[1,2,3,4,5].map(n=>`<option ${v('impact',3)==n?'selected':''}>${n}</option>`).join('')}</select></div>`;
      html += '</div>';
      html += `<div class="form-row"><div class="form-field"><label>Mitigation Strategy</label><textarea id="fMitigation" rows="2" placeholder="How will this risk be mitigated?">${esc(v('mitigation'))}</textarea></div></div>`;
      break;
    case 'Opportunity':
      html += '<div class="form-row">';
      html += `<div class="form-field"><label>Probability (1-5)</label><select id="fProbability">${[1,2,3,4,5].map(n=>`<option ${v('probability',3)==n?'selected':''}>${n}</option>`).join('')}</select></div>`;
      html += `<div class="form-field"><label>Benefit (1-5)</label><select id="fBenefit">${[1,2,3,4,5].map(n=>`<option ${v('benefit',3)==n?'selected':''}>${n}</option>`).join('')}</select></div>`;
      html += '</div>';
      html += `<div class="form-row"><div class="form-field"><label>Action to Capture</label><textarea id="fActionToCapture" rows="2" placeholder="What action is needed?">${esc(v('actionToCapture'))}</textarea></div></div>`;
      break;
    case 'Assumption':
      html += '<div class="form-row">';
      html += `<div class="form-field"><label>Impact if Wrong</label><select id="fImpactIfWrong"><option ${v('impactIfWrong','Medium')==='High'?'selected':''}>High</option><option ${v('impactIfWrong','Medium')==='Medium'?'selected':''}>Medium</option><option ${v('impactIfWrong','Medium')==='Low'?'selected':''}>Low</option></select></div>`;
      html += `<div class="form-field"><label>Validation Method</label><input id="fValidationMethod" value="${esc(v('validationMethod'))}" placeholder="How to validate?"></div>`;
      html += '</div>';
      break;
    case 'Requirement':
      html += '<div class="form-row">';
      html += `<div class="form-field"><label>MoSCoW Priority</label><select id="fMoscow"><option ${v('moscow','Should')==='Must'?'selected':''}>Must</option><option ${v('moscow','Should')==='Should'?'selected':''}>Should</option><option ${v('moscow','Should')==='Could'?'selected':''}>Could</option><option ${v('moscow','Should')==="Won't"?'selected':''}>Won't</option></select></div>`;
      html += `<div class="form-field"><label>Source</label><input id="fSource" value="${esc(v('source'))}" placeholder="Where did this come from?"></div>`;
      html += '</div>';
      html += `<div class="form-row"><div class="form-field"><label>Acceptance Criteria</label><textarea id="fAcceptanceCriteria" rows="2" placeholder="How will we know it's done?">${esc(v('acceptanceCriteria'))}</textarea></div></div>`;
      break;
    case 'Task':
      html += '<div class="form-row">';
      html += `<div class="form-field"><label>Due Date</label><input type="date" id="fDueDate" value="${v('dueDate')}"></div>`;
      html += `<div class="form-field"><label>Effort (hours)</label><input type="number" id="fEffort" value="${v('effort','')}" min="0" step="0.5" placeholder="0"></div>`;
      html += `<div class="form-field"><label>Assignee</label><input id="fAssignee" value="${esc(v('assignee'))}" placeholder="Who?"></div>`;
      html += '</div>';
      break;

function changeModalType(type) {
  document.querySelectorAll('.type-opt').forEach(el => el.classList.toggle('selected', el.dataset.type === type));
  // Rebuild status dropdown
  const statusEl = document.getElementById('fStatus');
  if (statusEl) {
    statusEl.innerHTML = TYPES[type].statuses.map(s => `<option>${s}</option>`).join('');
  }
  // Rebuild type-specific fields
  const tsf = document.getElementById('typeSpecificFields');
  if (tsf) tsf.innerHTML = getTypeFields(type, null);
}

function getSelectedType() {
  const sel = document.querySelector('.type-opt.selected');
  return sel ? sel.dataset.type : 'Risk';
}

function saveRecord() {
  const title = document.getElementById('fTitle')?.value?.trim();
  if (!title) { toast('Title is required'); return; }

  const type = getSelectedType();
  const now = new Date().toISOString();

  const rec = state.editingId ? state.records.find(r=>r.id===state.editingId) : {
    id: genId(),
    created: now,
    extra: {}
  };

  rec.title = title;
  rec.type = type;
  rec.description = document.getElementById('fDesc')?.value || '';
  rec.status = document.getElementById('fStatus')?.value || TYPES[type].statuses[0];
  rec.priority = document.getElementById('fPriority')?.value || 'Medium';
  rec.owner = document.getElementById('fOwner')?.value?.trim() || '';
  rec.tags = document.getElementById('fTags')?.value?.trim() || '';
  rec.updated = now;

  // Linked records
  const linkedStr = document.getElementById('fLinked')?.value || '';
  rec.linkedRecords = linkedStr.split(',').map(s=>s.trim()).filter(s=>s.match(/^IQ-\d+$/));

  // Type-specific extras
  if (!rec.extra) rec.extra = {};
  switch(type) {
    case 'Risk':
      rec.extra.likelihood = parseInt(document.getElementById('fLikelihood')?.value || 3);
      rec.extra.impact = parseInt(document.getElementById('fImpact')?.value || 3);
      rec.extra.score = rec.extra.likelihood * rec.extra.impact;
      rec.extra.mitigation = document.getElementById('fMitigation')?.value || '';
      break;
    case 'Opportunity':
      rec.extra.probability = parseInt(document.getElementById('fProbability')?.value || 3);
      rec.extra.benefit = parseInt(document.getElementById('fBenefit')?.value || 3);
      rec.extra.score = rec.extra.probability * rec.extra.benefit;
      rec.extra.actionToCapture = document.getElementById('fActionToCapture')?.value || '';
      break;
    case 'Assumption':
      rec.extra.impactIfWrong = document.getElementById('fImpactIfWrong')?.value || 'Medium';
      rec.extra.validationMethod = document.getElementById('fValidationMethod')?.value || '';
      break;
    case 'Requirement':
      rec.extra.moscow = document.getElementById('fMoscow')?.value || 'Should';
      rec.extra.source = document.getElementById('fSource')?.value || '';
      rec.extra.acceptanceCriteria = document.getElementById('fAcceptanceCriteria')?.value || '';
      break;
    case 'Task':
      rec.extra.dueDate = document.getElementById('fDueDate')?.value || '';
      rec.extra.effort = document.getElementById('fEffort')?.value || '';
      rec.extra.assignee = document.getElementById('fAssignee')?.value || '';
      break;
    case 'Action':
      rec.extra.dueDate = document.getElementById('fDueDate')?.value || '';
      rec.extra.assignedTo = document.getElementById('fAssignedTo')?.value || '';
      rec.extra.actionSource = document.getElementById('fActionSource')?.value || '';
      break;
    case 'Lesson':
      rec.extra.category = document.getElementById('fCategory')?.value || 'Suggestion';
      rec.extra.phase = document.getElementById('fPhase')?.value || '';
      rec.extra.recommendation = document.getElementById('fRecommendation')?.value || '';
      break;
    case 'Fact':
      rec.extra.factSource = document.getElementById('fFactSource')?.value || '';
      rec.extra.evidence = document.getElementById('fEvidence')?.value || '';
      rec.extra.relevance = document.getElementById('fRelevance')?.value || '';
      break;
    case 'Decision':
      rec.extra.decisionMaker = document.getElementById('fDecisionMaker')?.value || '';
      rec.extra.alternatives = document.getElementById('fAlternatives')?.value || '';
      rec.extra.rationale = document.getElementById('fRationale')?.value || '';
      break;
    case 'Dependency':
      rec.extra.dependsOn = document.getElementById('fDependsOn')?.value || '';
      rec.extra.depType = document.getElementById('fDepType')?.value || 'Internal';
      rec.extra.impactIfUnresolved = document.getElementById('fImpactIfUnresolved')?.value || '';
      break;
  }

  if (!state.editingId) {
    state.records.push(rec);
    toast(`Created ${rec.id}`);
  } else {
    toast(`Updated ${rec.id}`);
  }

  save();
  closeModal();
  renderFilterBar();
  render();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  state.editingId = null;
}

function deleteRecord(id) {
  if (!confirm('Delete this record?')) return;
  state.records = state.records.filter(r => r.id !== id);
  if (state.expandedId === id) state.expandedId = null;
  // Remove from linked records
  state.records.forEach(r => {
    if (r.linkedRecords) r.linkedRecords = r.linkedRecords.filter(l => l !== id);
  });
  save(); renderFilterBar(); render();
  toast('Deleted ' + id);
}

function duplicateRecord(id) {
  const src = state.records.find(r=>r.id===id);
  if (!src) return;
  const now = new Date().toISOString();
  const dup = JSON.parse(JSON.stringify(src));
  dup.id = genId();
  dup.title = src.title + ' (copy)';
  dup.created = now;
  dup.updated = now;
  state.records.push(dup);
  save(); renderFilterBar(); render();
  toast(`Duplicated as ${dup.id}`);
}

/* ── Convert Type ── */
function showConvertMenu(event, id) {
  event.stopPropagation();
  // Remove any existing
  document.querySelectorAll('.convert-menu').forEach(m=>m.remove());
  const rec = state.records.find(r=>r.id===id);
  if (!rec) return;
  const menu = document.createElement('div');
  menu.className = 'convert-menu';
  Object.keys(TYPES).filter(t=>t!==rec.type).forEach(t => {
    const btn = document.createElement('button');
    btn.innerHTML = `${TYPES[t].icon} Convert to ${t}`;
    btn.onclick = (e) => { e.stopPropagation(); convertRecord(id, t); menu.remove(); };
    menu.appendChild(btn);
  });
  // Position near button
  const rect = event.target.getBoundingClientRect();
  menu.style.position = 'fixed';
  menu.style.top = (rect.bottom + 4) + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
  document.body.appendChild(menu);
  setTimeout(() => {
    const closer = () => { menu.remove(); document.removeEventListener('click', closer); };
    document.addEventListener('click', closer);
  }, 10);
}

function convertRecord(id, newType) {
  const rec = state.records.find(r=>r.id===id);
  if (!rec) return;
  rec.type = newType;
  rec.status = TYPES[newType].statuses[0];
  rec.updated = new Date().toISOString();
  save(); renderFilterBar(); render();
  toast(`Converted ${rec.id} to ${newType}`);
}

  state.raidMode = !state.raidMode;
  if (state.raidMode) {
    state.filters.types = ['Risk','Assumption','Action','Dependency'];
    toast('RAID Log view enabled');
  } else {
    state.filters.types = [];
    toast('Full view restored');
  }

}

/* ── Export CSV ── */
function exportCSV() {
  const recs = getFilteredRecords();
  if (!recs.length) { toast('No records to export'); return; }
  const headers = ['ID','Type','Title','Description','Status','Priority','Owner','Tags','Created','Updated','Score','Due Date','Extra'];
  let csv = headers.join(',') + '\n';
  recs.forEach(r => {
    const extraStr = JSON.stringify(r.extra || {}).replace(/"/g, '""');
    csv += [
      r.id, r.type, csvField(r.title), csvField(r.description),
      r.status, r.priority, csvField(r.owner), csvField(r.tags || ''),
      r.created, r.updated || '', r.extra?.score || '',
      r.extra?.dueDate || '', `"${extraStr}"`
    ].join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `projectiq-${state.projectName.replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('Exported CSV');
}

function csvField(s) { return '"' + (s||'').replace(/"/g,'""') + '"'; }

function loadTemplate(name) {
  const templates = getTemplates();
  const recs = templates[name];
  if (!recs) return;
  const now = new Date().toISOString();
  recs.forEach(r => {
    r.id = genId();
    r.created = now;
    r.updated = now;
    if (!r.extra) r.extra = {};
    if ((r.type==='Risk'||r.type==='Opportunity') && r.extra.likelihood && r.extra.impact)
      r.extra.score = r.extra.likelihood * r.extra.impact;
    if ((r.type==='Risk'||r.type==='Opportunity') && r.extra.probability && r.extra.benefit)
      r.extra.score = r.extra.probability * r.extra.benefit;
    if (!r.linkedRecords) r.linkedRecords = [];
    state.records.push(r);
  });
  save(); closeModal(); renderFilterBar(); render();
  toast(`Loaded ${recs.length} records`);
}

/* ── Utilities ── */
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d) { if (!d) return ''; try { return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); } catch(e) { return d; } }

/* ── Keyboard Shortcuts ── */
document.addEventListener('keydown', e => {
  // Don't fire shortcuts if in input
  const tag = document.activeElement?.tagName;
  const isInput = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

  if (e.key === 'Escape') {
    closeModal();
    document.querySelectorAll('.convert-menu').forEach(m=>m.remove());
    return;
  }
  if (isInput) return;
  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); openModal(); }
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

/* ── Search ── */
document.getElementById('searchInput').addEventListener('input', () => { render(); });
document.getElementById('projectName').addEventListener('change', () => { save(); });

/* ── Init ── */
load();
renderFilterBar();
render();
checkMobile();
window.addEventListener('resize', checkMobile);
