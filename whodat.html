<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Who Dat?! 🤔</title>
  <style>
    :root{--font-sans:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;--font-mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace;--bg:#0a1628;--bg2:#132040;--bg3:#1a2a50;--border:#2a3a60;--text:#e8eef8;--dim:#6080a8;--accent:#f59e0b;--red:#ef4444;--green:#22c55e;--blue:#3b82f6}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow-x:hidden;touch-action:manipulation}
    #root{height:100%}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes flipDown{0%{transform:rotateX(0)}100%{transform:rotateX(90deg);opacity:0.3}}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
    @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,158,11,0.3)}50%{box-shadow:0 0 20px rgba(245,158,11,0.6)}}
    .fade-in{animation:fadeIn 0.3s ease}.pop{animation:pop 0.2s ease}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
var { useState, useEffect, useCallback } = React;

// ── Character definitions
var CHARACTERS = [
  {id:0,name:"Blaze",emoji:"😎",hat:true,glasses:true,hair:"none",gender:"m",mouth:"smile",skin:"yellow",extra:"cool"},
  {id:1,name:"Giggles",emoji:"😂",hat:false,glasses:false,hair:"none",gender:"n",mouth:"laugh",skin:"yellow",extra:"tears"},
  {id:2,name:"Grumps",emoji:"😡",hat:false,glasses:false,hair:"none",gender:"m",mouth:"frown",skin:"red",extra:"angry"},
  {id:3,name:"Nerdy",emoji:"🤓",hat:false,glasses:true,hair:"none",gender:"m",mouth:"smile",skin:"yellow",extra:"teeth"},
  {id:4,name:"Spooky",emoji:"👻",hat:false,glasses:false,hair:"none",gender:"n",mouth:"open",skin:"white",extra:"ghost"},
  {id:5,name:"Clowny",emoji:"🤡",hat:false,glasses:false,hair:"red",gender:"m",mouth:"smile",skin:"white",extra:"nose"},
  {id:6,name:"Princess",emoji:"👸",hat:true,glasses:false,hair:"brown",gender:"f",mouth:"smile",skin:"yellow",extra:"crown"},
  {id:7,name:"Cowboy",emoji:"🤠",hat:true,glasses:false,hair:"none",gender:"m",mouth:"smile",skin:"yellow",extra:"hat"},
  {id:8,name:"Chillin",emoji:"🥶",hat:false,glasses:false,hair:"none",gender:"n",mouth:"open",skin:"blue",extra:"cold"},
  {id:9,name:"Hottie",emoji:"🥵",hat:false,glasses:false,hair:"none",gender:"n",mouth:"open",skin:"red",extra:"hot"},
  {id:10,name:"Starry",emoji:"🤩",hat:false,glasses:false,hair:"none",gender:"n",mouth:"smile",skin:"yellow",extra:"stars"},
  {id:11,name:"Pukey",emoji:"🤮",hat:false,glasses:false,hair:"none",gender:"n",mouth:"open",skin:"green",extra:"sick"},
  {id:12,name:"Smarty",emoji:"🧐",hat:false,glasses:true,hair:"none",gender:"m",mouth:"neutral",skin:"yellow",extra:"monocle"},
  {id:13,name:"Devil",emoji:"😈",hat:false,glasses:false,hair:"none",gender:"m",mouth:"smile",skin:"purple",extra:"horns"},
  {id:14,name:"Angel",emoji:"😇",hat:true,glasses:false,hair:"none",gender:"f",mouth:"smile",skin:"yellow",extra:"halo"},
  {id:15,name:"Pirate",emoji:"🏴‍☠️",hat:true,glasses:false,hair:"none",gender:"m",mouth:"neutral",skin:"yellow",extra:"flag"},
  {id:16,name:"Alien",emoji:"👽",hat:false,glasses:false,hair:"none",gender:"n",mouth:"neutral",skin:"green",extra:"alien"},
  {id:17,name:"Robot",emoji:"🤖",hat:false,glasses:false,hair:"none",gender:"n",mouth:"neutral",skin:"grey",extra:"robot"},
  {id:18,name:"Skull",emoji:"💀",hat:false,glasses:false,hair:"none",gender:"n",mouth:"open",skin:"white",extra:"dead"},
  {id:19,name:"Ninja",emoji:"🥷",hat:true,glasses:false,hair:"none",gender:"n",mouth:"hidden",skin:"dark",extra:"mask"},
  {id:20,name:"Santa",emoji:"🎅",hat:true,glasses:false,hair:"white",gender:"m",mouth:"smile",skin:"yellow",extra:"beard"},
  {id:21,name:"Wizard",emoji:"🧙",hat:true,glasses:false,hair:"grey",gender:"m",mouth:"neutral",skin:"yellow",extra:"magic"},
  {id:22,name:"Zombie",emoji:"🧟",hat:false,glasses:false,hair:"messy",gender:"n",mouth:"open",skin:"green",extra:"undead"},
  {id:23,name:"Vampire",emoji:"🧛",hat:false,glasses:false,hair:"black",gender:"m",mouth:"fangs",skin:"white",extra:"cape"},
];

// ── Questions (trait-based)
var QUESTIONS = [
  {text:"Do they wear a hat or headwear?",test:function(c){return c.hat;}},
  {text:"Do they wear glasses?",test:function(c){return c.glasses;}},
  {text:"Are they smiling?",test:function(c){return c.mouth==="smile";}},
  {text:"Are they human-colored (yellow skin)?",test:function(c){return c.skin==="yellow";}},
  {text:"Are they red or hot-looking?",test:function(c){return c.skin==="red";}},
  {text:"Are they green?",test:function(c){return c.skin==="green";}},
  {text:"Are they white/pale?",test:function(c){return c.skin==="white";}},
  {text:"Do they have hair?",test:function(c){return c.hair!=="none";}},
  {text:"Are they male-presenting?",test:function(c){return c.gender==="m";}},
  {text:"Are they female-presenting?",test:function(c){return c.gender==="f";}},
  {text:"Is their mouth open?",test:function(c){return c.mouth==="open";}},
  {text:"Are they a creature (not human)?",test:function(c){return ["ghost","alien","robot","dead","undead"].indexOf(c.extra)!==-1;}},
  {text:"Are they scary or spooky?",test:function(c){return ["ghost","dead","undead","horns","cape"].indexOf(c.extra)!==-1;}},
  {text:"Are they sick or gross?",test:function(c){return ["sick","cold","hot"].indexOf(c.extra)!==-1;}},
  {text:"Do they have a special accessory?",test:function(c){return ["crown","monocle","mask","beard","cape","flag"].indexOf(c.extra)!==-1;}},
];

function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ── Sound
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.04,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndFlip(){playTone(300,0.08,"triangle",0.04);}
function sndYes(){playTone(523,0.1,"sine",0.05);setTimeout(function(){playTone(659,0.1,"sine",0.05);},80);}
function sndNo(){playTone(200,0.12,"square",0.04);}
function sndWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){playTone(f,0.25,"sine",0.08);},i*100);});}
function sndLose(){[300,250,200].forEach(function(f,i){setTimeout(function(){playTone(f,0.3,"sawtooth",0.04);},i*150);});}

// ── Humor
var THINK_MSGS=["Hmm...","Let me think...","Interesting...","🤔","Curious..."];
var RIGHT_MSGS=["You got me! 🎉","Nailed it!","How did you know?!","Impressive detective work!","Sherlock who?"];
var WRONG_MSGS=["Nope! That's not me!","Wrong face, buddy.","Try again, detective.","Not even close! 😏"];
var AI_WIN_MSGS=["I figured it out! 🧠","Too easy!","Elementary, my dear.","Your face gave it away."];

// ── Game
function Game(props) {
  var [playerTarget] = useState(function(){return CHARACTERS[Math.floor(Math.random()*24)];});
  var [aiTarget] = useState(function(){return CHARACTERS[Math.floor(Math.random()*24)];});
  var [eliminated, setEliminated] = useState({});
  var [aiEliminated, setAiEliminated] = useState({});
  var [turn, setTurn] = useState("player");
  var [message, setMessage] = useState("Your turn! Ask a question or guess a face.");
  var [gameOver, setGameOver] = useState(false);
  var [winner, setWinner] = useState("");
  var [showQuestions, setShowQuestions] = useState(false);
  var [questionsAsked, setQuestionsAsked] = useState(0);
  var [aiQuestionsAsked, setAiQuestionsAsked] = useState(0);
  var [usedQuestions, setUsedQuestions] = useState([]);

  var remaining = CHARACTERS.filter(function(c){return !eliminated[c.id];});

  // Player asks a question
  var askQuestion = function(q, idx) {
    var answer = q.test(aiTarget);
    sndFlip();
    setUsedQuestions(function(u){return u.concat([idx]);});
    setQuestionsAsked(function(n){return n+1;});
    setShowQuestions(false);

    // Eliminate characters
    var newElim = {};
    CHARACTERS.forEach(function(c){
      if (eliminated[c.id]) return;
      if (answer && !q.test(c)) newElim[c.id] = true;
      if (!answer && q.test(c)) newElim[c.id] = true;
    });
    setEliminated(function(e){var n=Object.assign({},e);Object.keys(newElim).forEach(function(k){n[k]=true;});return n;});

    var newRemaining = CHARACTERS.filter(function(c){return !eliminated[c.id]&&!newElim[c.id];});
    setMessage((answer?"YES! ✅":"NO ❌")+" — "+newRemaining.length+" left. AI's turn...");

    if (answer) sndYes(); else sndNo();

    // AI turn after delay
    setTimeout(function(){aiTurn();},1200);
  };

  // Player guesses directly
  var guessCharacter = function(c) {
    if (turn !== "player" || gameOver) return;
    if (c.id === aiTarget.id) {
      setGameOver(true); setWinner("player");
      setMessage(pick(RIGHT_MSGS)+" It was "+aiTarget.name+" "+aiTarget.emoji+" in "+questionsAsked+" questions!");
      sndWin();
    } else {
      setMessage(pick(WRONG_MSGS)+" AI wins by default!");
      setGameOver(true); setWinner("ai"); sndLose();
    }
  };

  // AI turn
  var aiTurn = function() {
    setTurn("ai");
    setMessage(pick(THINK_MSGS));

    setTimeout(function() {
      var aiRemaining = CHARACTERS.filter(function(c){return !aiEliminated[c.id];});

      // If AI has narrowed to 1-2, guess
      if (aiRemaining.length <= 2) {
        if (aiRemaining[0].id === playerTarget.id || (aiRemaining.length===1)) {
          setGameOver(true); setWinner("ai");
          setMessage(pick(AI_WIN_MSGS)+" It was "+playerTarget.name+" "+playerTarget.emoji+"! (AI asked "+aiQuestionsAsked+" questions)");
          sndLose();
          return;
        }
      }

      // AI picks best question (most even split)
      var bestQ = null; var bestScore = 999;
      QUESTIONS.forEach(function(q,qi) {
        var yesCount = aiRemaining.filter(function(c){return q.test(c);}).length;
        var noCount = aiRemaining.length - yesCount;
        if (yesCount === 0 || noCount === 0) return;
        var score = Math.abs(yesCount - noCount);
        if (score < bestScore) { bestScore = score; bestQ = qi; }
      });

      if (bestQ === null) {
        // Random guess
        var guess = aiRemaining[Math.floor(Math.random()*aiRemaining.length)];
        if (guess.id === playerTarget.id) {
          setGameOver(true); setWinner("ai");
          setMessage(pick(AI_WIN_MSGS)+" It was "+playerTarget.name+" "+playerTarget.emoji+"!");
          sndLose();
        } else {
          setMessage("AI guessed "+guess.name+" "+guess.emoji+"... WRONG! Your turn!");
          setGameOver(true); setWinner("player"); sndWin();
        }
        return;
      }

      var q = QUESTIONS[bestQ];
      var answer = q.test(playerTarget);
      setAiQuestionsAsked(function(n){return n+1;});

      var newAiElim = {};
      CHARACTERS.forEach(function(c) {
        if (aiEliminated[c.id]) return;
        if (answer && !q.test(c)) newAiElim[c.id] = true;
        if (!answer && q.test(c)) newAiElim[c.id] = true;
      });
      setAiEliminated(function(e){var n=Object.assign({},e);Object.keys(newAiElim).forEach(function(k){n[k]=true;});return n;});

      var aiLeft = CHARACTERS.filter(function(c){return !aiEliminated[c.id]&&!newAiElim[c.id];}).length;
      setMessage("AI asks: \""+q.text+"\" "+(answer?"YES":"NO")+". (AI has "+aiLeft+" left) Your turn!");
      if(answer)sndYes();else sndNo();
      setTurn("player");
    }, 1000);
  };

  var vw = window.innerWidth;
  var cols = vw < 400 ? 4 : vw < 600 ? 6 : 8;
  var cellSize = Math.floor((vw - 24 - (cols-1)*4) / cols);
  cellSize = Math.min(cellSize, 64);

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <span style={{fontSize:"1.2rem"}}>🤔</span>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,color:"var(--accent)"}}>WHO DAT?!</span>
        <span style={{fontSize:"0.6rem",color:"var(--dim)",fontFamily:"var(--font-mono)",marginLeft:"auto"}}>Q:{questionsAsked} · {remaining.length} left</span>
      </div>

      {/* Your secret character */}
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",background:"var(--bg2)",borderBottom:"1px solid var(--border)",flexShrink:0}}>
        <span style={{fontSize:"0.6rem",color:"var(--dim)"}}>AI is guessing:</span>
        <span style={{fontSize:"1.2rem"}}>{playerTarget.emoji}</span>
        <span style={{fontSize:"0.7rem",color:"var(--text)",fontWeight:600}}>{playerTarget.name}</span>
        <span style={{fontSize:"0.6rem",color:"var(--dim)",marginLeft:"auto"}}>AI asked: {aiQuestionsAsked}</span>
      </div>

      {/* Message */}
      <div className="fade-in" style={{padding:"6px 12px",textAlign:"center",flexShrink:0}}>
        <span style={{fontFamily:"var(--font-mono)",fontSize:"0.72rem",color:"var(--dim)"}}>{message}</span>
      </div>

      {/* Character grid */}
      <div style={{flex:1,overflowY:"auto",padding:"4px 8px",WebkitOverflowScrolling:"touch"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat("+cols+",1fr)",gap:4}}>
          {CHARACTERS.map(function(c) {
            var isOut = !!eliminated[c.id];
            return (
              <div key={c.id}
                onClick={!isOut&&turn==="player"&&!gameOver?function(){guessCharacter(c);}:undefined}
                style={{
                  width:"100%",aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  background:isOut?"rgba(20,20,40,0.5)":"var(--bg2)",
                  border:isOut?"1px solid rgba(40,40,60,0.5)":"1px solid var(--border)",
                  borderRadius:8,cursor:isOut||turn!=="player"?"default":"pointer",
                  opacity:isOut?0.25:1,transition:"all 0.2s",
                  transform:isOut?"scale(0.9)":"scale(1)"
                }}>
                <span style={{fontSize:cellSize>50?"1.8rem":"1.3rem"}}>{c.emoji}</span>
                <span style={{fontSize:"0.5rem",color:isOut?"var(--dim)":"var(--text)",fontFamily:"var(--font-mono)",marginTop:2}}>{c.name}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Game over */}
      {gameOver && (
        <div className="fade-in" style={{padding:"12px",textAlign:"center",background:"var(--bg2)",borderTop:"1px solid var(--border)"}}>
          <div style={{fontSize:"1.5rem",marginBottom:4}}>{winner==="player"?"🎉":"😢"}</div>
          <button onClick={props.onRestart} style={{background:"var(--accent)",border:"none",borderRadius:8,padding:"10px 24px",color:"#000",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,cursor:"pointer"}}>
            Play Again
          </button>
        </div>
      )}

      {/* Question panel */}
      {showQuestions && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:100}}
          onClick={function(){setShowQuestions(false);}}>
          <div className="fade-in" onClick={function(e){e.stopPropagation();}}
            style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"16px 16px 0 0",padding:"16px",width:"100%",maxWidth:500,maxHeight:"70vh",overflowY:"auto"}}>
            <div style={{fontFamily:"var(--font-mono)",fontSize:"0.75rem",color:"var(--dim)",marginBottom:12,textAlign:"center"}}>Ask a yes/no question</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {QUESTIONS.map(function(q,i){
                var used = usedQuestions.indexOf(i) !== -1;
                return (
                  <button key={i} disabled={used}
                    onClick={used?undefined:function(){askQuestion(q,i);}}
                    style={{background:used?"var(--bg)":"var(--bg3)",border:"1px solid "+(used?"var(--bg)":"var(--border)"),borderRadius:8,padding:"10px 14px",color:used?"var(--dim)":"var(--text)",fontFamily:"var(--font-sans)",fontSize:"0.82rem",cursor:used?"default":"pointer",textAlign:"left",opacity:used?0.4:1}}>
                    {q.text} {used?"✓":""}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* Bottom controls */}
      {!gameOver && (
        <div style={{display:"flex",gap:6,padding:"8px",background:"var(--bg2)",borderTop:"1px solid var(--border)",flexShrink:0}}>
          <button onClick={turn==="player"?function(){setShowQuestions(true);}:undefined}
            style={{flex:2,height:48,borderRadius:8,border:"2px solid var(--accent)",background:"rgba(245,158,11,0.1)",color:"var(--accent)",fontFamily:"var(--font-mono)",fontSize:"0.85rem",fontWeight:700,cursor:turn==="player"?"pointer":"default",opacity:turn==="player"?1:0.4}}>
            ASK QUESTION 🤔
          </button>
          <div style={{flex:1,height:48,borderRadius:8,background:"var(--bg3)",border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.65rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textAlign:"center"}}>
            Tap a face<br/>to guess
          </div>
        </div>
      )}
    </div>
  );
}

// ── Splash
function Splash(props) {
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",gap:"1rem"}}>
      <div style={{fontSize:"3.5rem"}}>🤔</div>
      <div style={{fontFamily:"var(--font-mono)",fontSize:"clamp(2rem,10vw,3rem)",fontWeight:800,color:"var(--accent)"}}>WHO DAT?!</div>
      <div style={{fontSize:"0.85rem",color:"var(--dim)",maxWidth:300,textAlign:"center",lineHeight:1.6}}>
        Guess Who — but with emojis. Ask yes/no questions to narrow down the AI's secret character. Tap a face to guess. First to guess right wins!
      </div>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:4,maxWidth:280}}>
        {CHARACTERS.slice(0,12).map(function(c){return <span key={c.id} style={{fontSize:"1.5rem"}}>{c.emoji}</span>;})}
        <span style={{fontSize:"1rem",color:"var(--dim)"}}>+12 more</span>
      </div>
      <button onClick={props.onStart} style={{marginTop:8,background:"var(--accent)",border:"none",borderRadius:10,padding:"14px 32px",color:"#000",fontFamily:"var(--font-mono)",fontSize:"1rem",fontWeight:800,cursor:"pointer"}}>
        WHO DAT?!
      </button>
      <a href="index.html" style={{marginTop:8,fontSize:"0.65rem",color:"var(--dim)",fontFamily:"var(--font-mono)",textDecoration:"none"}}>← taskiap.com</a>
    </div>
  );
}

function App() {
  var [playing, setPlaying] = useState(false);
  var [key, setKey] = useState(0);
  if (!playing) return <Splash onStart={function(){setPlaying(true);}} />;
  return <Game key={key} onRestart={function(){setKey(function(k){return k+1;});}} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
