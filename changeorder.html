<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Order Calculator</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:800px;margin:auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:20px;margin:8px 0 12px}h2{font-size:16px;color:var(--accent);margin:12px 0 6px}
input,button{background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:14px}
button{background:var(--accent);border:none;cursor:pointer;font-weight:600}button:hover{opacity:.85}
.g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
label{font-size:12px;color:var(--dim);display:block;margin-bottom:2px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}th,td{padding:6px 8px;border:1px solid var(--border);text-align:left}th{background:var(--bg2)}
td.num{text-align:right;font-family:monospace}
.total{font-size:22px;font-weight:700;color:var(--accent)}
.sumrow td{font-weight:700;background:var(--bg2)}
.running{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0}
@media print{button,a.home,#form{display:none!important}.card{color:#000;background:#fff;border:1px solid #ccc}}
</style></head><body>
<a class="home" href="index.html">&larr; home</a><h1>Change Order Calculator</h1>
<div class="card" id="form">
<div class="g">
<div><label>CO Number</label><input id="conum" value="CO-001" style="width:100%"></div>
<div><label>Description</label><input id="codesc" placeholder="Added scope..." style="width:100%"></div>
<div><label>Direct Cost ($)</label><input id="direct" type="number" value="10000" style="width:100%"></div>
<div><label>Sub Markup (%)</label><input id="subm" type="number" value="15" style="width:100%"></div>
<div><label>GC Markup (%)</label><input id="gcm" type="number" value="10" style="width:100%"></div>
<div><label>Bond Rate (%)</label><input id="bond" type="number" value="1.5" step="0.1" style="width:100%"></div>
<div><label>Insurance Rate (%)</label><input id="ins" type="number" value="2" step="0.1" style="width:100%"></div>
<div><label>Fee / Contingency (%)</label><input id="fee" type="number" value="5" style="width:100%"></div>
</div>
<h2>Time Impact</h2>
<div class="g">
<div><label>Additional Days</label><input id="days" type="number" value="0" style="width:100%"></div>
<div><label>Daily Indirect Cost ($)</label><input id="dailyc" type="number" value="2500" style="width:100%"></div>
</div>
<div style="display:flex;gap:8px;margin-top:10px">
<button onclick="calc()">Calculate</button>
<button onclick="addToProject()" style="background:var(--green);color:#000">Add to Project</button>
<button onclick="copyEmail()">Copy for Email</button>
<button onclick="window.print()" style="background:var(--border)">Print</button>
</div></div>
<div id="result"></div>
<h2>Project Change Orders</h2>
<div class="running" id="running"></div>
<script>
let cos=JSON.parse(localStorage.getItem('co_data')||'[]'),lastCalc=null;
function fmt(n){return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function calc(){const d=+document.getElementById('direct').value,subP=+document.getElementById('subm').value/100,
gcP=+document.getElementById('gcm').value/100,bondP=+document.getElementById('bond').value/100,
insP=+document.getElementById('ins').value/100,feeP=+document.getElementById('fee').value/100,
days=+document.getElementById('days').value,daily=+document.getElementById('dailyc').value;
let running=d;const rows=[];rows.push({item:'Direct Cost',pct:'—',amt:d,running:d});
const sub=running*subP;running+=sub;rows.push({item:'Sub Markup',pct:(subP*100).toFixed(1)+'%',amt:sub,running});
const gc=running*gcP;running+=gc;rows.push({item:'GC Markup',pct:(gcP*100).toFixed(1)+'%',amt:gc,running});
const bond=running*bondP;running+=bond;rows.push({item:'Bond',pct:(bondP*100).toFixed(1)+'%',amt:bond,running});
const ins=running*insP;running+=ins;rows.push({item:'Insurance',pct:(insP*100).toFixed(1)+'%',amt:ins,running});
const fee=running*feeP;running+=fee;rows.push({item:'Fee/Contingency',pct:(feeP*100).toFixed(1)+'%',amt:fee,running});
const timeImpact=days*daily;running+=timeImpact;
if(days>0)rows.push({item:`Time Impact (${days} days)`,pct:'—',amt:timeImpact,running});
const effective=((running-d)/d*100).toFixed(1);
let h=`<div class="card"><h2>${document.getElementById('conum').value}: ${document.getElementById('codesc').value}</h2>
<table><thead><tr><th>Item</th><th>Rate</th><th>Amount</th><th>Running Total</th></tr></thead><tbody>`;
rows.forEach(r=>h+=`<tr><td>${r.item}</td><td class="num">${r.pct}</td><td class="num">${fmt(r.amt)}</td><td class="num">${fmt(r.running)}</td></tr>`);
h+=`<tr class="sumrow"><td colspan="2">TOTAL CHANGE ORDER</td><td class="num">${fmt(running)}</td><td class="num">+${effective}% effective markup</td></tr>`;
h+=`</tbody></table></div>`;lastCalc={num:document.getElementById('conum').value,desc:document.getElementById('codesc').value,direct:d,total:running,days};
document.getElementById('result').innerHTML=h}
function addToProject(){if(!lastCalc){alert('Calculate first');return}cos.push({...lastCalc,date:new Date().toLocaleDateString()});
localStorage.setItem('co_data',JSON.stringify(cos));renderRunning();
document.getElementById('conum').value='CO-'+(cos.length+1).toString().padStart(3,'0')}
function renderRunning(){let totD=0,totT=0,totDays=0;let h='<table><thead><tr><th>CO#</th><th>Description</th><th>Direct</th><th>Total</th><th>Days</th><th>Date</th><th></th></tr></thead><tbody>';
cos.forEach((c,i)=>{totD+=c.direct;totT+=c.total;totDays+=c.days||0;
h+=`<tr><td>${c.num}</td><td>${c.desc}</td><td class="num">${fmt(c.direct)}</td><td class="num">${fmt(c.total)}</td><td class="num">${c.days||0}</td><td>${c.date}</td><td><button onclick="removeCO(${i})" style="font-size:11px;padding:2px 8px;background:var(--border)">X</button></td></tr>`});
h+=`<tr class="sumrow"><td colspan="2">TOTALS (${cos.length} COs)</td><td class="num">${fmt(totD)}</td><td class="num">${fmt(totT)}</td><td class="num">${totDays}</td><td colspan="2"></td></tr></tbody></table>`;
document.getElementById('running').innerHTML=cos.length?h:'<span style="color:var(--dim)">No change orders on project yet.</span>'}
function removeCO(i){cos.splice(i,1);localStorage.setItem('co_data',JSON.stringify(cos));renderRunning()}
function copyEmail(){if(!lastCalc){alert('Calculate first');return}
const txt=`Change Order: ${lastCalc.num}\nDescription: ${lastCalc.desc}\nDirect Cost: ${fmt(lastCalc.direct)}\nTotal (with markups): ${fmt(lastCalc.total)}\nTime Impact: ${lastCalc.days||0} days\n\nPlease review and approve.`;
navigator.clipboard.writeText(txt).then(()=>alert('Copied to clipboard')).catch(()=>alert('Copy failed — check permissions'))}
calc();renderRunning();
</script></body></html>
