<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Tismatic 3: Neon Fusion</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#1a0a2a;overflow:hidden;touch-action:manipulation;user-select:none}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<a href="index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>
<canvas id="c"></canvas>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H,groundY,horizonY;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;groundY=H-60;horizonY=H*0.38;}
resize();window.addEventListener('resize',resize);

// Visual themes cycling every 2000 distance
var THEMES=[
  {name:"Sunset",bg1:"#1a0a2a",bg2:"#6b2fa0",bg3:"#d4458b",bg4:"#ff71ce",sun:"#ff71ce",grid:"rgba(255,113,206,0.2)",neon:"#ff71ce",accent:"#ffaa44"},
  {name:"Midnight",bg1:"#050520",bg2:"#0a1a4a",bg3:"#1a3a7a",bg4:"#01cdfe",sun:"#01cdfe",grid:"rgba(1,205,254,0.2)",neon:"#01cdfe",accent:"#6688ff"},
  {name:"Neon",bg1:"#0a1a0a",bg2:"#1a3a1a",bg3:"#2a5a2a",bg4:"#05ffa1",sun:"#b967ff",grid:"rgba(5,255,161,0.2)",neon:"#05ffa1",accent:"#b967ff"},
  {name:"Dawn",bg1:"#1a1a0a",bg2:"#4a3a1a",bg3:"#8a6a2a",bg4:"#ffd700",sun:"#ffd700",grid:"rgba(255,215,0,0.2)",neon:"#e8b4f8",accent:"#ffd700"}
];
function getTheme(){return THEMES[Math.floor(distance/2000)%THEMES.length];}

// Audio
var audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.015,c.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndJump(){tone(523,0.15,"sine",0.015);tone(659,0.12,"sine",0.01);}
function sndDie(){tone(220,0.6,"sine",0.012);tone(165,0.8,"sine",0.009);}
function sndOrb(){tone(880,0.3,"sine",0.012);tone(1100,0.25,"sine",0.008);}
function sndCheckpoint(){tone(660,0.25,"sine",0.015);setTimeout(function(){tone(880,0.25,"sine",0.012);},100);setTimeout(function(){tone(1047,0.3,"sine",0.015);},200);}
function sndNearMiss(){tone(1600,0.08,"sine",0.012);}
function sndCombo(n){var f=600+n*80;if(f>2400)f=2400;tone(f,0.1,"sine",0.015);tone(f*2,0.06,"sine",0.008);}

// Music at 120 BPM -- hybrid electronic + ambient
var musicPlaying=false,musicInterval=null,musicNodes=[],musicBeat=0,musicBar=0,currentSong=0,beatFlash=0;
var BPM=120,BEAT_MS=60000/BPM;
var SONGS=[
  {bass:[65.41,65.41,77.78,73.42,65.41,82.41,77.78,65.41],melody:[311,370,392,466,523,466,392,370,311,262,311,370,392,523,466,392],pads:[[131,156,196],[110,131,165],[117,147,175],[131,165,196]]},
  {bass:[87.31,87.31,110,98,87.31,110,98,87.31],melody:[349,440,523,440,349,523,659,523,440,349,523,659,523,440,349,440],pads:[[175,220,262],[147,175,220],[165,196,247],[175,220,262]]},
  {bass:[55,55,65.41,73.42,55,65.41,73.42,55],melody:[440,523,659,523,440,392,330,392,440,523,659,784,659,523,440,392],pads:[[110,131,165],[98,131,147],[87,110,131],[110,131,165]]},
  {bass:[82.41,82.41,98,87.31,82.41,98,110,82.41],melody:[330,392,494,392,330,494,587,494,392,330,494,587,659,587,494,392],pads:[[165,196,247],[147,175,220],[131,165,196],[165,196,247]]}
];

function playNote(freq,dur,type,vol,detune){
  try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.value=freq;if(detune)o.detune.value=detune;g.gain.setValueAtTime(vol||0.008,c.currentTime);g.gain.setValueAtTime(vol||0.008,c.currentTime+dur*0.6);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+dur);musicNodes.push({o:o,g:g});}catch(e){}
}
function musicTick(){
  if(!musicPlaying)return;
  var song=SONGS[currentSong],beatInBar=musicBeat%4,barInPhrase=musicBar%4,dur=BEAT_MS/1000;
  if(musicNodes.length>40)musicNodes=musicNodes.slice(-15);
  // Kick on 1,3
  if(beatInBar===0||beatInBar===2){
    try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(90,c.currentTime);o.frequency.exponentialRampToValueAtTime(40,c.currentTime+0.04);g.gain.setValueAtTime(0.012,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.06);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.06);musicNodes.push({o:o,g:g});}catch(e){}
    beatFlash=0.12;
  }
  // Hi-hat on 2,4
  if(beatInBar===1||beatInBar===3){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type="square";o.frequency.value=7000+Math.random()*2000;g.gain.setValueAtTime(0.003,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.02);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.02);musicNodes.push({o:o,g:g});}catch(e){}}
  // Bass
  playNote(song.bass[musicBeat%song.bass.length],dur*0.7,"sine",0.01);
  // Melody
  var mi=(musicBeat*2)%song.melody.length;
  playNote(song.melody[mi],dur*0.35,"triangle",0.006);
  setTimeout(function(){if(!musicPlaying)return;playNote(song.melody[(mi+1)%song.melody.length],dur*0.3,"triangle",0.005);},BEAT_MS/2);
  // Ambient pad on beat 1
  if(beatInBar===0){var pad=song.pads[barInPhrase%song.pads.length];for(var i=0;i<pad.length;i++)playNote(pad[i],dur*3.5,"sine",0.004,(i-1)*5);}
  musicBeat++;if(musicBeat%4===0)musicBar++;
}
function startMusic(){if(musicPlaying)return;getAudio();musicPlaying=true;musicBeat=0;musicBar=0;currentSong=0;musicInterval=setInterval(musicTick,BEAT_MS);musicTick();}
function stopMusic(){musicPlaying=false;if(musicInterval){clearInterval(musicInterval);musicInterval=null;}for(var i=0;i<musicNodes.length;i++){try{musicNodes[i].g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);musicNodes[i].o.stop(audioCtx.currentTime+0.15);}catch(e){}}musicNodes=[];}

// Stars
var bgStars=[];for(var i=0;i<100;i++)bgStars.push({x:Math.random()*3000,y:Math.random()*600,s:0.3+Math.random()*1.8,b:0.2+Math.random()*0.6,drift:0.05+Math.random()*0.15});

// Game state
var STATE="menu",player={x:0,y:0,vy:0,size:22,rotation:0,onGround:false,ghosts:[]};
var obstacles=[],orbs=[],particles=[],comboTexts=[];
var score=0,highScore=parseInt(localStorage.getItem("tismatic3-high"))||0;
var distance=0,speed=4,frame=0,gravity=0.52,jumpPower=-10.2;
var doubleJumpAvailable=true,pulseScale=1,beatTimer=0;
var deathCount=parseInt(localStorage.getItem("tismatic3-deaths"))||0;
var comboCount=0,comboTimer=0,COMBO_TIMEOUT=180;
var CHECKPOINT_INTERVAL=2000,lastCheckpoint=0,checkpointFlash=0,checkpointParticles=[];
var deathSlowMo=0,deathFade=0,nearMissFlash=0,gridScroll=0;
var DEATH_MSGS=["Rest now.","Breathe.","The grid awaits.","No rush.","It's okay.","Take your time.","The sunset will wait.","Try again.","Feel the rhythm.","Chill."];

// Narration — chill death lines spoken softly
var DEATH_SPEAK=["The grid remembers you.","Rest now.","You were beautiful out there.","The neon fades, but you remain.","Breathe. The beat goes on."];
var lastSpeechTime=0;
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastSpeechTime<6000)return;
    lastSpeechTime=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var utter=new SpeechSynthesisUtterance(text);
        utter.rate=0.85;
        utter.pitch=0.9;
        utter.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var v=null;
          for(var i=0;i<voices.length;i++){
            if(voices[i].lang&&voices[i].lang.indexOf('en')===0){v=voices[i];break;}
          }
          if(v)utter.voice=v;
        }
        speechSynthesis.speak(utter);
      }catch(e){}
    },60);
  }catch(e){}
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}

// Patterns (20 patterns, 3 tiers)
var PATTERNS=[
  [{type:'spike',offset:0},{type:'orb',offset:60,y:-50}],
  [{type:'spike',offset:0},{type:'orb',offset:100,y:-40}],
  [{type:'spike',offset:0},{type:'spike',offset:60}],
  [{type:'block',offset:0,y:-50,w:50,h:50},{type:'orb',offset:25,y:-80}],
  [{type:'spike',offset:0},{type:'spike',offset:28}],
  [{type:'block',offset:0,y:-60,w:60,h:20},{type:'orb',offset:30,y:-90},{type:'block',offset:140,y:-90,w:50,h:20},{type:'orb',offset:165,y:-120}],
  [{type:'saw',offset:0},{type:'orb',offset:80,y:-60}],
  [{type:'spike',offset:0},{type:'block',offset:60,y:-55,w:30,h:55}],
  [{type:'spike',offset:0},{type:'spike',offset:28},{type:'spike',offset:56}],
  [{type:'block',offset:0,y:-60,w:70,h:18},{type:'orb',offset:100,y:-70},{type:'orb',offset:130,y:-80},{type:'orb',offset:160,y:-70}],
  [{type:'saw',offset:0},{type:'spike',offset:60},{type:'orb',offset:120,y:-50}],
  [{type:'block',offset:0,y:-40,w:35,h:40},{type:'block',offset:50,y:-70,w:35,h:70},{type:'orb',offset:67,y:-100}],
  [{type:'spike',offset:0},{type:'orb',offset:35,y:-45},{type:'spike',offset:70}],
  [{type:'saw',offset:0},{type:'saw',offset:50}],
  [{type:'block',offset:0,y:-55,w:100,h:18},{type:'orb',offset:50,y:-85},{type:'spike',offset:130},{type:'spike',offset:158}],
  [{type:'spike',offset:0},{type:'spike',offset:26},{type:'spike',offset:52},{type:'spike',offset:78}],
  [{type:'block',offset:0,y:-80,w:25,h:80},{type:'block',offset:80,y:-80,w:25,h:80},{type:'orb',offset:50,y:-60}],
  [{type:'saw',offset:0},{type:'block',offset:50,y:-70,w:55,h:18},{type:'orb',offset:77,y:-100},{type:'spike',offset:130}],
  [{type:'orb',offset:0,y:-40},{type:'orb',offset:30,y:-55},{type:'orb',offset:60,y:-70},{type:'orb',offset:90,y:-55},{type:'orb',offset:120,y:-40}],
  [{type:'saw',offset:0},{type:'spike',offset:50},{type:'spike',offset:78},{type:'saw',offset:120},{type:'orb',offset:170,y:-50}]
];
var EASY=[0,1,2,3,4,18],MED=[2,4,5,6,7,8,9,10,11,12,18],HARD=[5,8,10,11,12,13,14,15,16,17,19];

function getPool(){if(distance<2000)return EASY;if(distance<5000)return MED;return HARD;}

function spawnPattern(){
  var pool=getPool(),pIdx=pool[Math.floor(Math.random()*pool.length)],pat=PATTERNS[pIdx];
  var rightmost=0;
  for(var i=0;i<obstacles.length;i++){var r=obstacles[i].x+(obstacles[i].w||30);if(r>rightmost)rightmost=r;}
  for(var i=0;i<orbs.length;i++){if(orbs[i].x+10>rightmost)rightmost=orbs[i].x+10;}
  var baseGap=180;if(distance>3000)baseGap=155;if(distance>6000)baseGap=135;
  var startX=Math.max(W+50,rightmost+baseGap+Math.random()*60);
  for(var i=0;i<pat.length;i++){
    var p=pat[i],x=startX+(p.offset||0);
    if(p.type==='spike')obstacles.push({x:x,y:groundY,w:20,h:28,type:"spike"});
    else if(p.type==='block'){var bw=p.w||30,bh=p.h||30,by=p.y?groundY+p.y:groundY-bh;obstacles.push({x:x,y:by,w:bw,h:bh,type:"block"});}
    else if(p.type==='saw')obstacles.push({x:x,y:groundY-15,w:30,h:30,type:"saw",rot:0});
    else if(p.type==='orb'){var oy=p.y?groundY+p.y:groundY-50;orbs.push({x:x,y:oy,collected:false});}
  }
}

function reset(){
  player={x:W*0.2,y:groundY-22,vy:0,size:22,rotation:0,onGround:true,ghosts:[]};
  obstacles=[];orbs=[];particles=[];comboTexts=[];checkpointParticles=[];
  score=0;comboCount=0;comboTimer=0;distance=lastCheckpoint;
  speed=Math.min(8,Math.max(4,4+Math.floor(lastCheckpoint/500)*0.2));
  frame=Math.floor(lastCheckpoint/speed)||0;deathSlowMo=0;deathFade=0;nearMissFlash=0;
  for(var i=0;i<3;i++)spawnPattern();
}

function jump(){
  if(STATE==="menu"){STATE="playing";lastCheckpoint=0;reset();startMusic();sndJump();return;}
  if(STATE==="dead"){STATE="menu";return;}
  if(STATE==="dying")return;
  if(player.onGround){player.vy=jumpPower;player.onGround=false;doubleJumpAvailable=true;sndJump();}
  else if(doubleJumpAvailable){player.vy=jumpPower*0.85;doubleJumpAvailable=false;sndJump();spawnParticles(player.x+player.size/2,player.y+player.size,getTheme().neon,5);}
}
canvas.addEventListener('mousedown',jump);
canvas.addEventListener('touchstart',function(e){e.preventDefault();jump();},{passive:false});
window.addEventListener('keydown',function(e){if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();jump();}});

function spawnParticles(x,y,color,count){for(var i=0;i<(count||6);i++)particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color:color,size:2+Math.random()*4});}

function checkNearMiss(o){
  var px=player.x,py=player.y,ps=player.size,nd=8;
  if(o.type==="spike"){var ik=(px+ps>o.x+6&&px<o.x+o.w-6&&py+ps>o.y-o.h+9);var inr=(px+ps>o.x+6-nd&&px<o.x+o.w-6+nd&&py+ps>o.y-o.h+9-nd);if(inr&&!ik)return true;}
  else if(o.type==="saw"){var dx=(px+ps/2)-(o.x+o.w/2),dy=(py+ps/2)-(o.y-o.h/2),dist=Math.sqrt(dx*dx+dy*dy),kr=ps/2+o.w/2-8;if(dist<kr+nd&&dist>=kr)return true;}
  return false;
}

function update(){
  if(STATE==="dying"){
    deathSlowMo--;player.vy+=gravity*0.1;player.y+=player.vy*0.1;player.rotation+=0.02;deathFade=Math.min(1,deathFade+0.04);
    if(deathSlowMo<=0){STATE="dead";stopMusic();if(score>highScore){highScore=score;localStorage.setItem("tismatic3-high",highScore);}spawnParticles(player.x+player.size/2,player.y+player.size/2,getTheme().neon,20);}
    for(var i=particles.length-1;i>=0;i--){particles[i].x+=particles[i].vx*0.2;particles[i].y+=particles[i].vy*0.2;particles[i].vy+=0.05;particles[i].life-=0.015;if(particles[i].life<=0)particles.splice(i,1);}
    return;
  }
  if(STATE!=="playing")return;
  frame++;distance+=speed;gridScroll+=speed;
  // Song switch
  var ns=Math.floor(distance/2000)%SONGS.length;if(ns!==currentSong){currentSong=ns;musicBeat=0;musicBar=0;}
  // Beat
  beatTimer++;var beatsPerFrame=Math.round(60/(BPM/60));if(beatTimer>=beatsPerFrame){beatTimer=0;pulseScale=1.05;}
  pulseScale+=(1-pulseScale)*0.12;if(beatFlash>0)beatFlash-=0.015;
  // Speed
  if(frame%600===0)speed=Math.min(8,speed+0.2);
  // Combo
  if(comboCount>0){comboTimer++;if(comboTimer>=COMBO_TIMEOUT){comboCount=0;comboTimer=0;}}
  for(var ct=comboTexts.length-1;ct>=0;ct--){comboTexts[ct].y-=1;comboTexts[ct].life-=0.02;if(comboTexts[ct].life<=0)comboTexts.splice(ct,1);}
  // Checkpoint
  var cpZone=Math.floor(distance/CHECKPOINT_INTERVAL)*CHECKPOINT_INTERVAL;
  if(cpZone>lastCheckpoint&&cpZone>0){lastCheckpoint=cpZone;checkpointFlash=1.0;sndCheckpoint();
    for(var i=0;i<20;i++)checkpointParticles.push({x:player.x+player.size/2+((Math.random()-0.5)*40),y:player.y+((Math.random()-0.5)*40),vx:(Math.random()-0.5)*3,vy:-1-Math.random()*3,life:1,size:2+Math.random()*3});}
  if(checkpointFlash>0)checkpointFlash-=0.015;
  for(var i=checkpointParticles.length-1;i>=0;i--){var cp=checkpointParticles[i];cp.x+=cp.vx;cp.y+=cp.vy;cp.vy+=0.02;cp.life-=0.02;if(cp.life<=0)checkpointParticles.splice(i,1);}
  // Near miss decay
  if(nearMissFlash>0)nearMissFlash-=0.06;
  // Physics
  player.vy+=gravity;player.y+=player.vy;player.rotation+=speed*0.03;
  if(player.y>=groundY-player.size){player.y=groundY-player.size;player.vy=0;player.onGround=true;}
  // Ghosts
  if(frame%3===0)player.ghosts.push({x:player.x,y:player.y,rot:player.rotation,life:1});
  if(player.ghosts.length>8)player.ghosts.shift();
  for(var g=0;g<player.ghosts.length;g++)player.ghosts[g].life-=0.04;
  // Spawn patterns
  var lastO=0;for(var i=0;i<obstacles.length;i++)if(obstacles[i].x>lastO)lastO=obstacles[i].x;
  for(var i=0;i<orbs.length;i++)if(orbs[i].x>lastO)lastO=orbs[i].x;
  if(lastO<W+100)spawnPattern();
  // Obstacles
  for(var i=obstacles.length-1;i>=0;i--){
    var o=obstacles[i];o.x-=speed;if(o.type==="saw")o.rot+=0.12;if(o.x<-80){obstacles.splice(i,1);continue;}
    if(checkNearMiss(o)&&nearMissFlash<=0){nearMissFlash=1.0;sndNearMiss();}
    var px=player.x,py=player.y,ps=player.size;
    if(o.type==="spike"){if(px+ps>o.x+6&&px<o.x+o.w-6&&py+ps>o.y-o.h+9){die();return;}}
    else if(o.type==="saw"){var dx=(px+ps/2)-(o.x+o.w/2),dy=(py+ps/2)-(o.y-o.h/2);if(Math.sqrt(dx*dx+dy*dy)<ps/2+o.w/2-8){die();return;}}
    else{if(px+ps>o.x+3&&px<o.x+o.w-3&&py+ps>o.y+3&&py+ps<o.y+14&&player.vy>=0){player.y=o.y-ps;player.vy=0;player.onGround=true;}}
  }
  // Orbs
  for(var i=orbs.length-1;i>=0;i--){
    var o=orbs[i];o.x-=speed;if(o.x<-30){orbs.splice(i,1);continue;}
    if(!o.collected){var dx=(player.x+player.size/2)-o.x,dy=(player.y+player.size/2)-o.y;
      if(Math.sqrt(dx*dx+dy*dy)<25){o.collected=true;comboCount++;comboTimer=0;var val=10*Math.max(1,comboCount);score+=val;
        if(comboCount>1){sndCombo(comboCount);comboTexts.push({x:o.x,y:o.y-15,text:"x"+comboCount+"!",life:1,color:getTheme().neon});}else sndOrb();
        spawnParticles(o.x,o.y,getTheme().neon,10);orbs.splice(i,1);}}
  }
  score=Math.max(score,Math.floor(distance/20));
  // Particles
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.life-=0.025;if(p.life<=0)particles.splice(i,1);}
}

function die(){STATE="dying";deathSlowMo=30;deathFade=0;deathCount++;localStorage.setItem("tismatic3-deaths",deathCount);sndDie();speak(DEATH_SPEAK[deathCount%DEATH_SPEAK.length]);
  // Dramatic particles from Tism
  var colors=[getTheme().neon,getTheme().accent,"#ffffff"];
  for(var i=0;i<30;i++){var a=(i/30)*Math.PI*2,spd=3+Math.random()*8;particles.push({x:player.x+player.size/2,y:player.y+player.size/2,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,life:1,color:colors[Math.floor(Math.random()*colors.length)],size:2+Math.random()*5});}}

function drawSunset(){
  var th=getTheme();
  var grad=ctx.createLinearGradient(0,0,0,horizonY+40);
  grad.addColorStop(0,th.bg1);grad.addColorStop(0.4,th.bg2);grad.addColorStop(0.7,th.bg3);grad.addColorStop(1,th.bg4);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,horizonY+40);
  // Sun
  var sunX=W*0.5,sunY=horizonY-10,sunR=Math.min(W,H)*0.11;
  var sg=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR);
  sg.addColorStop(0,"#fffb96");sg.addColorStop(0.3,th.sun);sg.addColorStop(0.7,th.accent);sg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sunX,sunY,sunR,0,Math.PI*2);ctx.fill();
  // Sun lines
  ctx.save();ctx.beginPath();ctx.rect(0,sunY-sunR,W,sunR*2);ctx.clip();
  ctx.fillStyle=th.bg1;for(var ly=sunY-sunR*0.6;ly<sunY+sunR;ly+=8){ctx.fillRect(sunX-sunR,ly,sunR*2,2+(ly-sunY+sunR)*0.02);}
  ctx.restore();
}

function drawRetroGrid(){
  var th=getTheme();ctx.fillStyle="#0d0520";ctx.fillRect(0,groundY,W,H-groundY);
  var vx=W/2,vy=horizonY,gl=20;
  ctx.strokeStyle=th.grid;ctx.lineWidth=1;
  for(var i=-gl;i<=gl;i++){var bx=vx+i*(W/gl)*1.5;ctx.beginPath();ctx.moveTo(vx+(bx-vx)*0.01,vy);ctx.lineTo(bx,H);ctx.stroke();}
  var so=(gridScroll*2)%60;
  for(var row=0;row<15;row++){var t=(row*60+so)/(H-vy);if(t<=0||t>1.2)continue;var yy=vy+t*(H-vy);ctx.strokeStyle=th.grid.replace(/[\d.]+\)$/,Math.min(0.35,t*0.4)+")");ctx.beginPath();ctx.moveTo(0,yy);ctx.lineTo(W,yy);ctx.stroke();}
  ctx.strokeStyle=th.neon;ctx.lineWidth=2;ctx.shadowColor=th.neon;ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(W,groundY);ctx.stroke();ctx.shadowBlur=0;
}

function draw(){
  ctx.save();var th=getTheme();
  ctx.fillStyle=th.bg1;ctx.fillRect(0,0,W,H);
  drawSunset();
  // Stars
  for(var i=0;i<bgStars.length;i++){var s=bgStars[i];var sx=((s.x-distance*s.drift)%(W+200)+W+200)%(W+200);var sy=s.y%(horizonY-30);var tw=0.3+Math.sin(frame*0.02+i)*0.3;ctx.fillStyle="rgba(255,251,150,"+(s.b*tw)+")";ctx.beginPath();ctx.arc(sx,sy,s.s,0,Math.PI*2);ctx.fill();}
  drawRetroGrid();
  // Beat flash
  if(beatFlash>0){ctx.fillStyle="rgba(255,255,255,"+(beatFlash*0.08)+")";ctx.fillRect(0,0,W,H);}

  if(STATE==="menu"){
    ctx.textAlign="center";ctx.font="bold 34px monospace";ctx.fillStyle=th.neon;ctx.shadowColor=th.neon;ctx.shadowBlur=20;
    ctx.fillText("TISMATIC 3",W/2,H*0.18);ctx.shadowBlur=0;
    ctx.font="16px monospace";ctx.fillStyle=th.accent;ctx.fillText("NEON FUSION",W/2,H*0.24);
    ctx.font="48px serif";ctx.fillText("\u{1F7EA}",W/2,H*0.35);
    ctx.font="12px monospace";ctx.fillStyle="rgba(255,255,255,0.4)";
    ctx.fillText("Tap / Space to jump (double jump!)",W/2,H*0.46);
    ctx.fillText("Collect orbs. Build combos. Feel the beat.",W/2,H*0.51);
    if(highScore>0){ctx.fillStyle=th.neon;ctx.font="11px monospace";ctx.fillText("Best: "+highScore,W/2,H*0.59);}
    if(deathCount>0){ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="10px monospace";ctx.fillText("Attempts: "+deathCount,W/2,H*0.64);}
    if(lastCheckpoint>0){ctx.fillStyle="#05ffa1";ctx.font="11px monospace";ctx.fillText("Checkpoint: "+lastCheckpoint,W/2,H*0.69);}
    ctx.font="10px monospace";ctx.fillStyle="rgba(255,255,255,0.2)";ctx.fillText("taskiap.com",W/2,H*0.82);
    ctx.restore();return;
  }

  // Ghost trail (afterimages)
  for(var g=0;g<player.ghosts.length;g++){var gh=player.ghosts[g];if(gh.life<=0)continue;ctx.save();ctx.globalAlpha=gh.life*0.25;ctx.translate(gh.x+player.size/2,gh.y+player.size/2);ctx.rotate(gh.rot);ctx.fillStyle=th.accent;ctx.shadowColor=th.accent;ctx.shadowBlur=6;ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);ctx.shadowBlur=0;ctx.restore();}
  ctx.globalAlpha=1;

  // Obstacles
  for(var i=0;i<obstacles.length;i++){
    var o=obstacles[i];
    if(o.type==="spike"){ctx.fillStyle=th.neon;ctx.shadowColor=th.neon;ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+o.w/2,o.y-o.h);ctx.lineTo(o.x+o.w,o.y);ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle="rgba(255,255,255,0.3)";ctx.lineWidth=1;ctx.stroke();}
    else if(o.type==="saw"){ctx.save();ctx.translate(o.x+o.w/2,o.y-o.h/2);ctx.rotate(o.rot);ctx.fillStyle=th.accent;ctx.shadowColor=th.accent;ctx.shadowBlur=8;ctx.beginPath();for(var t=0;t<8;t++){var a=(t/8)*Math.PI*2;ctx.lineTo(Math.cos(a)*(o.w/2+6),Math.sin(a)*(o.w/2+6));ctx.lineTo(Math.cos(a+Math.PI/8)*(o.w/2),Math.sin(a+Math.PI/8)*(o.w/2));}ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="rgba(0,0,0,0.4)";ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();ctx.restore();}
    else{ctx.fillStyle="rgba(185,103,255,0.15)";ctx.shadowColor=th.neon;ctx.shadowBlur=4;ctx.fillRect(o.x,o.y,o.w,o.h);ctx.shadowBlur=0;ctx.strokeStyle=th.neon;ctx.lineWidth=1.5;ctx.strokeRect(o.x,o.y,o.w,o.h);}
  }

  // Orbs
  var orbPulse=beatFlash>0.05?3:0;
  for(var i=0;i<orbs.length;i++){var o=orbs[i];if(o.collected)continue;ctx.fillStyle=th.neon;ctx.shadowColor=th.neon;ctx.shadowBlur=14;var r=7+Math.sin(frame*0.08+i)*2+orbPulse;ctx.beginPath();ctx.arc(o.x,o.y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="rgba(255,255,255,0.3)";ctx.beginPath();ctx.arc(o.x-2,o.y-2,r*0.35,0,Math.PI*2);ctx.fill();}

  // Player
  ctx.save();ctx.translate(player.x+player.size/2,player.y+player.size/2);ctx.rotate(player.rotation);ctx.scale(pulseScale,pulseScale);
  ctx.shadowColor=th.neon;ctx.shadowBlur=14;
  var pg=ctx.createLinearGradient(-player.size/2,-player.size/2,player.size/2,player.size/2);pg.addColorStop(0,th.neon);pg.addColorStop(1,th.accent);
  ctx.fillStyle=pg;ctx.fillRect(-player.size/2,-player.size/2,player.size,player.size);ctx.shadowBlur=0;
  ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(-player.size/2+3,-player.size/2+3,player.size-6,player.size/2-3);
  ctx.strokeStyle="rgba(255,255,255,0.3)";ctx.lineWidth=1;ctx.strokeRect(-player.size/2,-player.size/2,player.size,player.size);
  ctx.restore();

  // Particles
  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  ctx.globalAlpha=1;

  // Checkpoint sparkles
  for(var i=0;i<checkpointParticles.length;i++){var cp=checkpointParticles[i];ctx.globalAlpha=cp.life;ctx.fillStyle="#05ffa1";ctx.shadowColor="#05ffa1";ctx.shadowBlur=6;ctx.beginPath();ctx.arc(cp.x,cp.y,cp.size,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  ctx.globalAlpha=1;

  // Combo texts
  for(var ct=0;ct<comboTexts.length;ct++){var c=comboTexts[ct];ctx.globalAlpha=c.life;ctx.font="bold 18px monospace";ctx.fillStyle=c.color;ctx.shadowColor=c.color;ctx.shadowBlur=8;ctx.textAlign="center";ctx.fillText(c.text,c.x,c.y);ctx.shadowBlur=0;}
  ctx.globalAlpha=1;

  // Near-miss
  if(nearMissFlash>0){ctx.fillStyle="rgba(255,255,255,"+(nearMissFlash*0.15)+")";ctx.fillRect(0,0,W,H);if(nearMissFlash>0.5){ctx.globalAlpha=(nearMissFlash-0.5)*2;ctx.font="bold 13px monospace";ctx.fillStyle="#fff";ctx.textAlign="center";ctx.fillText("CLOSE!",player.x+player.size/2,player.y-18);ctx.globalAlpha=1;}}
  // Checkpoint flash
  if(checkpointFlash>0){ctx.fillStyle="rgba(5,255,161,"+(checkpointFlash*0.08)+")";ctx.fillRect(0,0,W,H);if(checkpointFlash>0.5){ctx.globalAlpha=(checkpointFlash-0.5)*2;ctx.font="bold 14px monospace";ctx.fillStyle="#05ffa1";ctx.textAlign="center";ctx.shadowColor="#05ffa1";ctx.shadowBlur=10;ctx.fillText("CHECKPOINT",W/2,H*0.14);ctx.shadowBlur=0;ctx.globalAlpha=1;}}

  // HUD minimal
  ctx.font="16px monospace";ctx.fillStyle="rgba(255,255,255,0.5)";ctx.textAlign="center";ctx.fillText(score,W/2,30);
  if(comboCount>1){ctx.font="bold 13px monospace";ctx.fillStyle=th.neon;ctx.fillText("COMBO x"+comboCount,W/2,48);}
  if(highScore>0){ctx.font="10px monospace";ctx.fillStyle="rgba(255,255,255,0.25)";ctx.textAlign="right";ctx.fillText("best "+highScore,W-14,22);ctx.textAlign="center";}
  if(lastCheckpoint>0&&STATE==="playing"){ctx.font="9px monospace";ctx.fillStyle="rgba(5,255,161,0.3)";ctx.textAlign="left";ctx.fillText("cp "+lastCheckpoint,12,22);ctx.textAlign="center";}
  // Theme name
  ctx.font="9px monospace";ctx.fillStyle="rgba(255,255,255,0.2)";ctx.textAlign="left";ctx.fillText(th.name,12,36);ctx.textAlign="center";
  // Death counter
  ctx.font="9px monospace";ctx.fillStyle="rgba(255,255,255,0.2)";ctx.textAlign="right";ctx.fillText("#"+deathCount,W-14,36);ctx.textAlign="center";

  // Dying overlay
  if(STATE==="dying"){ctx.fillStyle="rgba(255,113,206,"+(deathFade*0.3)+")";ctx.fillRect(0,0,W,H);}

  // Dead screen
  if(STATE==="dead"){
    ctx.fillStyle="rgba(26,10,42,0.8)";ctx.fillRect(0,0,W,H);ctx.textAlign="center";
    ctx.font="20px monospace";ctx.fillStyle=th.neon;ctx.shadowColor=th.neon;ctx.shadowBlur=15;
    ctx.fillText(DEATH_MSGS[deathCount%DEATH_MSGS.length],W/2,H*0.28);ctx.shadowBlur=0;
    ctx.font="14px monospace";ctx.fillStyle="rgba(255,255,255,0.5)";ctx.fillText("Score: "+score,W/2,H*0.42);
    if(score>=highScore&&score>0){ctx.fillStyle="#05ffa1";ctx.font="11px monospace";ctx.fillText("new best",W/2,H*0.48);}
    else if(highScore>0){ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="11px monospace";ctx.fillText("best: "+highScore,W/2,H*0.48);}
    if(lastCheckpoint>0){ctx.fillStyle="rgba(5,255,161,0.4)";ctx.font="10px monospace";ctx.fillText("restart from "+lastCheckpoint,W/2,H*0.55);}
    ctx.font="11px monospace";ctx.fillStyle="rgba(255,255,255,0.25)";ctx.fillText("tap to continue",W/2,H*0.66);
  }
  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
