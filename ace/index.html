<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08080d">
<meta name="description" content="ACE — Atomic Constraint Engine. One app: plan, forecast, constrain, explore, watch.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='30%25' cy='30%25'%3E%3Cstop offset='0' stop-color='%23bf5af2'/%3E%3Cstop offset='.6' stop-color='%238b3fd4'/%3E%3Cstop offset='1' stop-color='%231a0530'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)'/%3E%3Cellipse cx='16' cy='16' rx='13' ry='4' fill='none' stroke='rgba(255,255,255,.4)'/%3E%3Cellipse cx='16' cy='16' rx='13' ry='4' fill='none' stroke='rgba(255,255,255,.3)' transform='rotate(60 16 16)'/%3E%3Cellipse cx='16' cy='16' rx='13' ry='4' fill='none' stroke='rgba(255,255,255,.3)' transform='rotate(120 16 16)'/%3E%3C/svg%3E">
<title>ACE · Atomic Constraint Engine</title>
<style>
:root{
  --bg:#08080d; --bg2:#0d0d15; --panel:#12121b; --panel2:#191926;
  --border:#1e1e2b; --border2:#2e2e3e; --border3:#4a4a5c;
  --text:#f5f5f7; --dim:#8a8a98; --dimmer:#5a5a68; --faint:#3a3a48;
  --violet:#bf5af2; --violet-dim:#8b3fd4; --violet-glow:rgba(191,90,242,.4);
  --red:#ff375f; --amber:#ffcc00; --green:#30d158; --blue:#5aa0ff; --oxide:#d05a2a;
  --disp:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*:focus-visible{outline:2px solid var(--violet);outline-offset:2px;border-radius:4px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;overscroll-behavior:none;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;grid-template-areas:"top top" "rail stage";height:100vh;height:100dvh}
input,button,select,textarea{font-family:inherit;color:inherit}
button{background:none;border:none;cursor:pointer;color:inherit}
::selection{background:rgba(191,90,242,.35);color:#fff}
@media(max-width:720px){body{grid-template-columns:1fr;grid-template-rows:56px auto 1fr;grid-template-areas:"top" "rail" "stage"}}

/* ══════ Top bar ══════ */
.top{
  grid-area:top;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;gap:12px;position:relative;z-index:20;
  background:linear-gradient(180deg,rgba(18,18,27,.94),rgba(8,8,13,.85));
  backdrop-filter:blur(12px) saturate(1.4);
  -webkit-backdrop-filter:blur(12px) saturate(1.4);
  border-bottom:1px solid rgba(255,255,255,.05);
  box-shadow:0 1px 0 rgba(0,0,0,.5)
}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.back-btn{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:14px;text-decoration:none;transition:all .18s var(--ease-out);
  border:1px solid transparent
}
.back-btn:hover{color:var(--text);background:rgba(255,255,255,.04);border-color:var(--border2)}
.sym{width:32px;height:32px;flex-shrink:0}
.sym canvas{width:100%;height:100%;display:block}
.wordmark{display:flex;flex-direction:column;line-height:1;gap:3px}
.wordmark .n{
  font-family:var(--disp);font-weight:900;font-size:20px;letter-spacing:.06em;
  background:linear-gradient(120deg,var(--oxide),var(--violet) 60%,var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.wordmark .t{font-family:var(--mono);font-size:9px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase}
.crumb{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;flex:1;text-align:center;display:none}
@media(min-width:900px){.crumb{display:block}}
.crumb .now{color:var(--text)}
.crumb .sep{color:var(--faint);margin:0 8px}
.top-r{display:flex;gap:6px}
.icon-btn{
  width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);color:var(--text);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s var(--ease-out)
}
.icon-btn:hover{border-color:var(--border3);color:var(--violet);background:rgba(191,90,242,.06)}
.icon-btn:active{transform:scale(.94)}
.icon-btn.on{background:linear-gradient(135deg,var(--violet),var(--red));border-color:transparent;color:#fff}

/* ══════ Left rail ══════ */
.rail{
  grid-area:rail;background:var(--bg2);border-right:1px solid var(--border);
  padding:16px 10px 24px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;position:relative
}
@media(max-width:720px){
  .rail{border-right:none;border-bottom:1px solid var(--border);flex-direction:row;overflow-x:auto;padding:8px;gap:4px}
  .rail::-webkit-scrollbar{display:none}
  .rail-hdr{display:none}
  .rail-view{flex-direction:column;gap:2px;min-width:76px;padding:8px 10px}
  .rail-view .lbl{font-size:9.5px}
  .rail-view .sub{display:none}
  .rail-ico{font-size:16px}
}
.rail-hdr{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);
  text-transform:uppercase;padding:8px 12px 6px;display:flex;align-items:center;gap:10px
}
.rail-hdr .rule{flex:1;height:1px;background:var(--border)}
.rail-view{
  display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:9px;
  color:var(--dim);cursor:pointer;transition:all .18s var(--ease-out);
  border:1px solid transparent;position:relative;background:none;text-align:left;width:100%
}
.rail-view:hover{color:var(--text);background:rgba(255,255,255,.03)}
.rail-view.active{
  color:var(--text);background:linear-gradient(90deg,rgba(191,90,242,.14),rgba(191,90,242,.04));
  border-color:rgba(191,90,242,.2)
}
.rail-view.active::before{
  content:"";position:absolute;left:-1px;top:8px;bottom:8px;width:3px;
  background:linear-gradient(180deg,var(--violet),var(--red));border-radius:0 3px 3px 0
}
.rail-ico{font-size:15px;flex-shrink:0;width:20px;text-align:center;filter:grayscale(.3)}
.rail-view.active .rail-ico{filter:none}
.rail-view .lbl{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:.02em;line-height:1}
.rail-view .sub{font-family:var(--mono);font-size:9.5px;color:var(--dimmer);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;line-height:1}
.rail-view .txt{flex:1;min-width:0}
.rail-view kbd{
  font-family:var(--mono);font-size:9.5px;color:var(--dim);background:var(--panel);
  border:1px solid var(--border);padding:2px 6px;border-radius:4px;flex-shrink:0
}
.rail-foot{margin-top:auto;padding:12px;font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;line-height:1.7}
.rail-foot a{color:var(--dim);text-decoration:none;border-bottom:1px solid transparent}
.rail-foot a:hover{color:var(--text);border-color:var(--border3)}

/* ══════ Stage ══════ */
.stage{grid-area:stage;position:relative;background:#000;overflow:hidden;isolation:isolate}
.stage iframe{
  position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;
  opacity:0;transition:opacity .32s var(--ease-out);will-change:opacity
}
.stage iframe.show{opacity:1}
.loader{
  position:absolute;inset:0;background:radial-gradient(ellipse at center,var(--bg2),var(--bg));
  z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  opacity:1;transition:opacity .32s var(--ease-out);pointer-events:none
}
.loader.hide{opacity:0}
.loader-core{width:56px;height:56px}
.loader-core canvas{width:100%;height:100%}
.loader-lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase}
.loader-lbl b{color:var(--text)}

/* ══════ Command palette ══════ */
.palette-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);z-index:80;
  display:none;align-items:flex-start;justify-content:center;padding-top:12vh;
  opacity:0;transition:opacity .18s var(--ease-out)
}
.palette-bg.show{display:flex;opacity:1}
.palette{
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--border2);border-radius:14px;
  width:min(560px,92vw);overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 0 0 1px rgba(255,255,255,.03);
  transform:translateY(-8px) scale(.98);opacity:0;
  transition:transform .28s var(--ease-spring),opacity .2s var(--ease-out)
}
.palette-bg.show .palette{transform:translateY(0) scale(1);opacity:1}
.palette-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--border)}
.palette-hdr .search-ico{color:var(--dim);font-size:15px}
.palette input{flex:1;background:transparent;border:none;padding:0;font-size:15px;color:var(--text);outline:none}
.palette input::placeholder{color:var(--dimmer)}
.palette .esc{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.12em;background:var(--panel);border:1px solid var(--border2);padding:3px 7px;border-radius:5px}
.palette-list{max-height:56vh;overflow-y:auto;padding:6px 0}
.palette-item{display:flex;align-items:center;gap:14px;padding:10px 18px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s}
.palette-item.active,.palette-item:hover{background:rgba(191,90,242,.08);border-left-color:var(--violet)}
.palette-item .ico{width:28px;height:28px;border-radius:6px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);flex-shrink:0}
.palette-item .lb{flex:1;min-width:0}
.palette-item .lb .t{font-size:13.5px;font-weight:500}
.palette-item .lb .s{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:2px}
.palette-item .kbd{font-family:var(--mono);font-size:10px;background:var(--panel);border:1px solid var(--border2);padding:2px 6px;border-radius:4px;color:var(--dim)}
.palette-empty{padding:32px 18px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:12px}

/* Fullscreen */
body.fs{grid-template-columns:1fr;grid-template-rows:1fr;grid-template-areas:"stage"}
body.fs .top,body.fs .rail{display:none}
</style>
</head>
<body>

<div class="top" role="banner">
  <div style="display:flex;align-items:center;gap:12px">
    <a href="/" class="back-btn" title="Back to taskiap" aria-label="Back to taskiap">←</a>
    <a href="#plan" class="brand" aria-label="ACE — home">
      <div class="sym"><canvas></canvas></div>
      <div class="wordmark">
        <div class="n">ACE</div>
        <div class="t">Atomic Constraint Engine</div>
      </div>
    </a>
  </div>
  <div class="crumb" id="crumb"></div>
  <div class="top-r">
    <button class="icon-btn" id="cmd-btn" title="Command palette · ⌘K" aria-label="Command palette">⌘</button>
    <button class="icon-btn" id="fs-btn" title="Full screen · F" aria-label="Toggle full screen">⛶</button>
    <button class="icon-btn" id="reload-btn" title="Reload view · R" aria-label="Reload view">⟳</button>
    <button class="icon-btn" id="open-btn" title="Open in new tab" aria-label="Open in new tab">↗</button>
  </div>
</div>

<aside class="rail" id="rail" role="navigation">
  <div class="rail-hdr">views <div class="rule"></div></div>
</aside>

<main class="stage">
  <div class="loader hide" id="loader">
    <div class="loader-core"><canvas></canvas></div>
    <div class="loader-lbl">Loading <b id="loader-name">…</b></div>
  </div>
  <iframe id="frame" src="about:blank" title="ACE view" allow="camera; microphone; fullscreen; clipboard-write; xr-spatial-tracking"></iframe>
</main>

<div class="palette-bg" id="palette-bg" role="dialog" aria-label="Command palette">
  <div class="palette">
    <div class="palette-hdr">
      <span class="search-ico">⌕</span>
      <input type="text" id="palette-input" placeholder="Jump to a view…" autocomplete="off" spellcheck="false">
      <span class="esc">esc</span>
    </div>
    <div class="palette-list" id="palette-list"></div>
  </div>
</div>

<script>
(() => {
'use strict';

// One app. Five views. Everything else is a view.
const VIEWS = [
  { id:'plan',      label:'Plan',      sub:'the engine',    icon:'⚙',  url:'/jtm/ace/ace.html',          kbd:'1', color:'#bf5af2', desc:'The working engine — Plan, Forecast, Constraints, Explore.' },
  { id:'scene',     label:'Scene',     sub:'3D constraints',icon:'📐', url:'/jtm/ace-parametric.html',   kbd:'2', color:'#30d158', desc:'Parametric 3D scenes — objects placed by constraints, not coordinates.' },
  { id:'reel',      label:'Reel',      sub:'2:30 render',   icon:'🎬', url:'/media/ace-x.html',          kbd:'3', color:'#ff375f', desc:'The engine, rendered to pixels — settle, CPM, and Monte Carlo running per frame.' },
  { id:'reference', label:'Reference', sub:'the theory',    icon:'📖', url:'/act/',                      kbd:'4', color:'#d05a2a', desc:'The atomic constraint theory — one atom, two link types, one settle. Read the model.' },
];

const state = {
  activeId: null,
  loaded: new Set(),
};

const $ = id => document.getElementById(id);
const rail = $('rail'), frame = $('frame'), loader = $('loader'), crumb = $('crumb');

// ══════ Atom canvas ══════
function paintAtom(canvas, opts = {}) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const { speed = 1, rings = 3 } = opts;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
  }
  const ro = new ResizeObserver(resize); ro.observe(canvas);
  resize();
  const ctx = canvas.getContext('2d');
  function tick(now) {
    const t = now * 0.001 * speed;
    const w = canvas.width, h = canvas.height, cx = w/2, cy = h/2, R = Math.min(w, h) * 0.42;
    ctx.clearRect(0, 0, w, h);
    // Glow
    const g = ctx.createRadialGradient(cx - R*0.2, cy - R*0.2, 0, cx, cy, R * 1.8);
    g.addColorStop(0, 'rgba(191,90,242,0.55)');
    g.addColorStop(0.4, 'rgba(191,90,242,0.15)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
    // Core
    const cg = ctx.createRadialGradient(cx - R*0.25, cy - R*0.25, 0, cx, cy, R * 0.6);
    cg.addColorStop(0, '#e88bff'); cg.addColorStop(0.5, '#bf5af2'); cg.addColorStop(1, '#4a1a70');
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.55, 0, Math.PI*2);
    ctx.fillStyle = cg; ctx.fill();
    ctx.beginPath(); ctx.arc(cx - R*0.2, cy - R*0.22, R * 0.15, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
    // Rings
    ctx.save(); ctx.translate(cx, cy);
    const hues = ['#ffcc00','#5aa0ff','#ff375f','#30d158','#5ee7f0'];
    for (let i = 0; i < rings; i++) {
      const rot = t * (0.9 + i * 0.35);
      ctx.save(); ctx.rotate(i * Math.PI / rings);
      const rx = R * 0.98, ry = R * 0.32;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(255,255,255,${0.15 + i*0.03})`;
      ctx.lineWidth = 1 * dpr;
      for (let a = 0; a < Math.PI * 2; a += 0.05) {
        const x = Math.cos(a) * rx, y = Math.sin(a) * ry;
        if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath(); ctx.stroke();
      const ax = Math.cos(rot) * rx, ay = Math.sin(rot) * ry;
      const eG = ctx.createRadialGradient(ax, ay, 0, ax, ay, 8 * dpr);
      const col = hues[i % hues.length];
      eG.addColorStop(0, col); eG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = eG;
      ctx.fillRect(ax - 8*dpr, ay - 8*dpr, 16*dpr, 16*dpr);
      ctx.beginPath(); ctx.arc(ax, ay, 2 * dpr, 0, Math.PI*2);
      ctx.fillStyle = col; ctx.fill();
      ctx.restore();
    }
    ctx.restore();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
paintAtom(document.querySelector('.sym canvas'), { speed: 0.5 });
paintAtom(document.querySelector('.loader-core canvas'), { speed: 1.4 });

// ══════ Rail ══════
function renderRail() {
  const items = VIEWS.map((v, i) => `
    <button class="rail-view${state.activeId === v.id ? ' active' : ''}" data-id="${v.id}" role="tab" aria-selected="${state.activeId === v.id}">
      <div class="rail-ico">${v.icon}</div>
      <div class="txt">
        <div class="lbl">${v.label}</div>
        <div class="sub">${v.sub}</div>
      </div>
      <kbd>${v.kbd}</kbd>
    </button>
  `).join('');
  rail.innerHTML = `<div class="rail-hdr">views <div class="rule"></div></div>${items}<div class="rail-foot">
    ACE v1<br>
    <a href="/">← taskiap</a> · <a href="/media/">media</a> · <a href="/jtm/">jtm</a>
  </div>`;
  rail.querySelectorAll('.rail-view').forEach(b => {
    b.addEventListener('click', () => activate(b.dataset.id));
  });
}

// ══════ Activate ══════
function activate(id) {
  const v = VIEWS.find(x => x.id === id);
  if (!v) return;
  state.activeId = id;
  history.replaceState(null, '', '#' + id);
  document.title = `${v.label} · ACE`;
  rail.querySelectorAll('.rail-view').forEach(el => {
    const on = el.dataset.id === id;
    el.classList.toggle('active', on);
    el.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  crumb.innerHTML = `<span>${v.icon}</span> <span class="now">${v.label}</span> <span class="sep">·</span> <span>${v.sub}</span>`;

  const targetUrl = new URL(v.url, location.href).href;
  if (state.loaded.has(id) && frame.src === targetUrl) {
    frame.classList.add('show'); loader.classList.add('hide'); return;
  }
  frame.classList.remove('show');
  $('loader-name').textContent = v.label;
  loader.classList.remove('hide');
  frame.addEventListener('load', function onLoad() {
    frame.removeEventListener('load', onLoad);
    state.loaded.add(id);
    setTimeout(() => { frame.classList.add('show'); loader.classList.add('hide'); }, 100);
  });
  frame.src = v.url;
}

// ══════ Command palette ══════
const palBg = $('palette-bg'), palInput = $('palette-input'), palList = $('palette-list');
let palIdx = 0, palItems = [];

function openPalette() {
  palBg.classList.add('show'); palInput.value = '';
  paintPalette(''); requestAnimationFrame(() => palInput.focus());
}
function closePalette() { palBg.classList.remove('show'); }

function fuzzy(needle, hay) {
  needle = needle.toLowerCase(); hay = hay.toLowerCase();
  if (!needle) return 1;
  let ni = 0, score = 0, streak = 0;
  for (let i = 0; i < hay.length && ni < needle.length; i++) {
    if (hay[i] === needle[ni]) { ni++; streak++; score += 1 + streak * 0.5; }
    else streak = 0;
  }
  return ni === needle.length ? score / hay.length : 0;
}
function paintPalette(q) {
  palIdx = 0; palList.innerHTML = '';
  const scored = VIEWS
    .map(v => ({ v, s: fuzzy(q, `${v.label} ${v.sub} ${v.desc}`) }))
    .filter(x => x.s > 0)
    .sort((a, b) => b.s - a.s);
  palItems = scored;
  if (scored.length === 0) {
    palList.innerHTML = `<div class="palette-empty">No match. Try "plan", "reel", "reference".</div>`;
    return;
  }
  scored.forEach((x, i) => {
    const el = document.createElement('div');
    el.className = 'palette-item' + (i === 0 ? ' active' : '');
    el.innerHTML = `
      <div class="ico">${x.v.icon}</div>
      <div class="lb"><div class="t">${x.v.label}</div><div class="s">${x.v.desc}</div></div>
      <span class="kbd">${x.v.kbd}</span>
    `;
    el.addEventListener('click', () => { activate(x.v.id); closePalette(); });
    el.addEventListener('mouseenter', () => setActive(i));
    palList.appendChild(el);
  });
}
function setActive(i) {
  palIdx = Math.max(0, Math.min(palItems.length - 1, i));
  palList.querySelectorAll('.palette-item').forEach((el, idx) => el.classList.toggle('active', idx === palIdx));
  palList.querySelectorAll('.palette-item')[palIdx]?.scrollIntoView({ block: 'nearest' });
}
palInput.addEventListener('input', e => paintPalette(e.target.value));
palInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePalette();
  else if (e.key === 'ArrowDown') { setActive(palIdx + 1); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { setActive(palIdx - 1); e.preventDefault(); }
  else if (e.key === 'Enter') {
    if (palItems[palIdx]) { activate(palItems[palIdx].v.id); closePalette(); }
  }
});
palBg.addEventListener('click', ev => { if (ev.target === palBg) closePalette(); });
$('cmd-btn').addEventListener('click', openPalette);

// ══════ Top-bar buttons ══════
$('open-btn').addEventListener('click', () => {
  const v = VIEWS.find(x => x.id === state.activeId);
  if (v?.url) window.open(v.url, '_blank');
});
$('fs-btn').addEventListener('click', () => {
  document.body.classList.toggle('fs'); $('fs-btn').classList.toggle('on');
});
$('reload-btn').addEventListener('click', () => {
  const v = VIEWS.find(x => x.id === state.activeId); if (!v) return;
  state.loaded.delete(v.id);
  frame.classList.remove('show'); loader.classList.remove('hide');
  frame.src = v.url;
});

// ══════ Keyboard ══════
window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); openPalette(); return; }
  if (e.target.matches('input, textarea, select') && e.target !== palInput) return;
  if (palBg.classList.contains('show')) return;
  if (/^[1-9]$/.test(e.key)) {
    const idx = parseInt(e.key, 10) - 1;
    if (VIEWS[idx]) activate(VIEWS[idx].id);
  }
  else if (e.key === 'Escape') {
    if (document.body.classList.contains('fs')) { document.body.classList.remove('fs'); $('fs-btn').classList.remove('on'); }
  }
  else if (e.key === 'f' || e.key === 'F') { document.body.classList.toggle('fs'); $('fs-btn').classList.toggle('on'); }
  else if (e.key === 'r' || e.key === 'R') $('reload-btn').click();
});

// ══════ Hash routing ══════
function routeFromHash() {
  const id = (location.hash || '#plan').slice(1);
  activate(VIEWS.find(x => x.id === id) ? id : 'plan');
}
window.addEventListener('hashchange', routeFromHash);

// ══════ Init ══════
renderRail();
routeFromHash();

})();
</script>
</body>
</html>
