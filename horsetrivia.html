<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lily's Horse Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#2a1a10;--surface:#1e140c;--accent:#d4956a;--green:#88c98a;--gold:#e8c170;--text:#f5ede4}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;height:100vh;overflow:hidden;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);opacity:0.15}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(245,237,228,0.7);font-size:13px;margin-top:4px}
.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(245,237,228,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(245,237,228,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:#f59e0b;color:#000}
.badge-4{background:#ef4444;color:#fff}
.category{font-size:13px;color:rgba(245,237,228,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(245,237,228,0.2);background:rgba(0,0,0,0.3);color:var(--text);border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(136,201,138,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(212,149,106,0.2);border-color:var(--accent);color:var(--accent)}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(136,201,138,0.1);border:1px solid rgba(136,201,138,0.3)}
.feedback.wrong-fb{background:rgba(212,149,106,0.1);border:1px solid rgba(212,149,106,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(245,237,228,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(212,149,106,0.3)}50%{text-shadow:0 0 12px rgba(212,149,106,0.7)}100%{text-shadow:0 0 4px rgba(212,149,106,0.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{0%{transform:scale(1);color:var(--text)}50%{transform:scale(1.3);color:var(--accent)}100%{transform:scale(1);color:var(--text)}}
.opt-btn{animation:cardIn 0.3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:0.07s}
.opt-btn:nth-child(3){animation-delay:0.14s}
.opt-btn:nth-child(4){animation-delay:0.21s}
.opt-btn.correct{animation:correctPop 0.35s ease}
.opt-btn.wrong{animation:wrongShake 0.4s ease}
.streak-fire{animation:streakFire 1.5s ease-in-out infinite}
.score-pop{animation:scoreUp 0.4s ease}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(245,237,228,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(245,237,228,0.7)}
.start-btn{width:100%;min-height:48px;padding:12px;margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.resume-btn{background:var(--gold);color:#000;margin-top:10px}
.start-btn:hover,.resume-btn:hover{opacity:0.9}
.hidden{display:none!important}
@keyframes fireBorder{0%{border-color:#d4956a;box-shadow:0 0 8px rgba(212,149,106,0.4)}50%{border-color:#e8c170;box-shadow:0 0 18px rgba(232,193,112,0.6)}100%{border-color:#d4956a;box-shadow:0 0 8px rgba(212,149,106,0.4)}}
@keyframes warmPulse{0%{background:var(--bg)}50%{background:#2e1e14}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}
body.streak-pulse{animation:warmPulse 3s ease-in-out infinite}
body.streak-shake{animation:screenShake 0.4s ease}
.progress-bar-wrap{width:100%;height:5px;background:rgba(245,237,228,0.1);border-radius:3px;margin-bottom:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:18px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
.fact-card{background:rgba(245,237,228,0.06);border:1px solid rgba(245,237,228,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(245,237,228,0.85);line-height:1.5}
.fact-card .fact-emoji{font-size:22px;flex-shrink:0;line-height:1.3}
.sound-toggle{background:none;border:1px solid rgba(245,237,228,0.2);border-radius:6px;color:var(--text);font-size:18px;cursor:pointer;padding:2px 7px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}
.start-hero{font-size:56px;line-height:1;margin-bottom:8px}
.start-high-score{font-size:22px;color:var(--green);font-weight:700;margin:8px 0}
.start-last-score{font-size:14px;color:rgba(245,237,228,0.5);margin-bottom:4px}
.start-badge-300{display:inline-block;background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0}
.accuracy-bar-wrap{width:100%;height:10px;background:rgba(245,237,228,0.1);border-radius:5px;overflow:hidden;margin:6px 0 4px}
.accuracy-bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.grade-badge{display:inline-block;font-size:36px;font-weight:900;padding:6px 20px;border-radius:12px;margin:10px 0}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(212,149,106,0.1)}
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>LILY'S HORSE TRIVIA</h1>
<div class="subtitle">For Horse Lovers Everywhere</div>
</header>
<div id="app"></div>
</div>

<script>
const Q=[
// ===== EASY (d:1) — Questions 1-50 =====
// Breeds (10)
{q:"What is one of the most popular horse breeds known for its speed in racing?",o:["Thoroughbred","Clydesdale","Shetland Pony","Friesian"],a:0,d:1,cat:"breeds",fact:"Thoroughbreds are the stars of horse racing! They can run at speeds over 40 miles per hour and are known for their athletic build and spirited personality."},
{q:"Which small horse breed is named after islands in Scotland?",o:["Welsh Pony","Connemara","Shetland Pony","Haflinger"],a:2,d:1,cat:"breeds",fact:"Shetland ponies come from the Shetland Islands in Scotland. Despite being small (usually under 10.2 hands), they are incredibly strong for their size and were once used in coal mines!"},
{q:"Which large draft horse breed is known for its feathered feet and was used to pull beer wagons?",o:["Arabian","Clydesdale","Mustang","Quarter Horse"],a:1,d:1,cat:"breeds",fact:"Clydesdales are famous gentle giants! They can stand over 18 hands tall and weigh up to 2,200 pounds. The Budweiser Clydesdales made the breed a household name."},
{q:"What breed of horse is considered one of the oldest in the world?",o:["Quarter Horse","Morgan","Arabian","Appaloosa"],a:2,d:1,cat:"breeds",fact:"Arabian horses are one of the oldest breeds, with origins dating back over 4,500 years in the Arabian Peninsula. They have a distinctive dished face and high tail carriage."},
{q:"Which American breed is the most popular in the United States?",o:["Thoroughbred","American Quarter Horse","Friesian","Paint"],a:1,d:1,cat:"breeds",fact:"The American Quarter Horse is the most popular breed in America with over 3 million registered horses! They got their name because they could outrun other breeds in quarter-mile races."},
{q:"What breed is known for its spotted coat pattern?",o:["Friesian","Morgan","Appaloosa","Arabian"],a:2,d:1,cat:"breeds",fact:"Appaloosas are famous for their beautiful spotted coat patterns! The Nez Perce people of the Pacific Northwest originally bred them. Their patterns include blanket, leopard, and snowflake."},
{q:"Which breed is always black in color?",o:["Friesian","Palomino","Appaloosa","Paint"],a:0,d:1,cat:"breeds",fact:"Friesian horses are almost always black! They come from the Netherlands and are known for their flowing manes, feathered legs, and graceful movement. They are popular in movies and dressage."},
{q:"What breed of wild horse roams free in the American West?",o:["Thoroughbred","Mustang","Clydesdale","Shetland"],a:1,d:1,cat:"breeds",fact:"Mustangs are free-roaming horses descended from horses brought to America by Spanish explorers over 500 years ago. About 86,000 mustangs still roam the western United States today!"},
{q:"Which breed is known for being the foundation of many other American breeds?",o:["Morgan","Friesian","Appaloosa","Shetland"],a:0,d:1,cat:"breeds",fact:"The Morgan horse traces back to a single stallion named Figure (later called Justin Morgan after his owner). Morgans are known for being versatile, friendly, and eager to please."},
// Care (8)
{q:"What is the main food that horses eat?",o:["Corn","Hay and grass","Bread","Oats only"],a:1,d:1,cat:"care",fact:"Horses are herbivores and mainly eat hay and grass! A horse can eat about 15-20 pounds of hay per day. Good quality forage is the most important part of a horse's diet."},
{q:"How much water does a horse typically drink per day?",o:["1-2 gallons","5-10 gallons","25-30 gallons","50 gallons"],a:1,d:1,cat:"care",fact:"Horses drink about 5-10 gallons (20-40 liters) of water every day! In hot weather or after exercise, they may drink even more. Fresh, clean water should always be available."},
{q:"What tool is used to clean a horse's hooves?",o:["Curry comb","Hoof pick","Mane comb","Sweat scraper"],a:1,d:1,cat:"care",fact:"A hoof pick is an essential grooming tool used to remove dirt, rocks, and debris from a horse's hooves. Picking hooves daily helps prevent infections and keeps horses comfortable."},
{q:"What is the person called who trims and shoes horses' hooves?",o:["Veterinarian","Trainer","Farrier","Groom"],a:2,d:1,cat:"care",fact:"A farrier is a specialist who trims and shoes horses' hooves. Horses usually need their hooves trimmed every 6-8 weeks, just like you need a haircut! Healthy hooves are essential for a healthy horse."},
{q:"Which of these is a safe treat for horses?",o:["Chocolate","Carrots","Avocado","Onions"],a:1,d:1,cat:"care",fact:"Carrots and apples are favorite horse treats! However, chocolate, avocados, and onions are toxic to horses. Always cut treats into small pieces to prevent choking."},
{q:"What is the name for the place where horses sleep and live?",o:["Kennel","Stable","Coop","Den"],a:1,d:1,cat:"care",fact:"A stable (or barn) is where horses live! Each horse usually has their own stall with bedding made of straw or wood shavings. Stalls need to be cleaned (mucked out) every day."},
{q:"What type of bedding is commonly used in horse stalls?",o:["Newspaper","Sand","Straw or wood shavings","Leaves"],a:2,d:1,cat:"care",fact:"Straw and wood shavings are the most common bedding materials for horse stalls. Good bedding provides cushioning, absorbs moisture, and keeps horses comfortable and warm."},
{q:"What is it called when you clean out a horse's stall?",o:["Sweeping","Mucking out","Dusting","Raking"],a:1,d:1,cat:"care",fact:"Mucking out means cleaning a horse's stall by removing dirty bedding and manure, then adding fresh bedding. It's usually done every day to keep the horse healthy and comfortable!"},
// Riding (8)
{q:"What are the four natural gaits of a horse in order from slowest to fastest?",o:["Walk, trot, canter, gallop","Trot, walk, canter, gallop","Walk, canter, trot, gallop","Walk, trot, gallop, canter"],a:0,d:1,cat:"riding",fact:"Walk, trot, canter, and gallop are the four natural gaits! Walk is a 4-beat gait, trot is 2-beat, canter is 3-beat, and gallop is the fastest 4-beat gait."},
{q:"What must you always wear on your head when riding a horse?",o:["Baseball cap","Cowboy hat","Riding helmet","Headband"],a:2,d:1,cat:"riding",fact:"A properly fitted riding helmet is the most important piece of safety equipment! It protects your head in case of a fall. Always wear an ASTM/SEI certified helmet when riding."},
{q:"Which side of the horse do you traditionally mount from?",o:["Right side","Left side","Either side","The back"],a:1,d:1,cat:"riding",fact:"Traditionally, riders mount from the left side (also called the 'near side'). This tradition comes from the days when soldiers wore swords on their left hip, making it easier to swing their right leg over."},
{q:"What is the slowest gait of a horse?",o:["Trot","Canter","Walk","Gallop"],a:2,d:1,cat:"riding",fact:"The walk is the slowest gait, at about 4 miles per hour. It's a four-beat gait, meaning you can hear four separate hoofbeats. It's the most comfortable gait for beginners!"},
{q:"What do you say to ask a horse to stop?",o:["Halt","Whoa","Stop","Both A and B"],a:3,d:1,cat:"riding",fact:"Both 'halt' and 'whoa' are common commands to ask a horse to stop. Riders also use their seat and rein aids together with voice commands. Every horse learns these words from training!"},
{q:"What are the two main styles of horseback riding?",o:["Fast and slow","English and Western","Indoor and outdoor","Beginner and advanced"],a:1,d:1,cat:"riding",fact:"English and Western are the two main riding styles! English riding uses a smaller saddle and is common in dressage and jumping. Western riding uses a larger saddle with a horn and comes from ranching traditions."},
{q:"What is the piece of equipment that goes on a horse's back for riding?",o:["Bridle","Halter","Saddle","Girth"],a:2,d:1,cat:"riding",fact:"A saddle sits on the horse's back and helps the rider stay balanced and comfortable. Saddles come in many styles for different riding disciplines. They are placed on top of a saddle pad to protect the horse's back."},
{q:"What piece of equipment goes on a horse's head to help steer?",o:["Saddle","Bridle","Girth","Blanket"],a:1,d:1,cat:"riding",fact:"A bridle goes on the horse's head and includes the bit (which goes in the mouth), reins, and headstall. The rider uses the reins attached to the bridle to communicate direction to the horse."},
// Anatomy (8)
{q:"How are horses measured for height?",o:["In feet","In inches","In hands","In meters"],a:2,d:1,cat:"anatomy",fact:"Horses are measured in 'hands,' where one hand equals 4 inches! The measurement is taken from the ground to the top of the withers (the ridge between the shoulder blades). A 15-hand horse is 60 inches (5 feet) tall at the withers."},
{q:"What is the color of a horse that is reddish-brown with a matching mane and tail?",o:["Bay","Chestnut","Palomino","Grey"],a:1,d:1,cat:"anatomy",fact:"A chestnut horse is reddish-brown all over, including its mane and tail. It's one of the most common horse colors! Chestnuts can range from light golden to dark liver chestnut."},
{q:"What is a baby horse called?",o:["Cub","Foal","Pup","Kit"],a:1,d:1,cat:"anatomy",fact:"A baby horse is called a foal! A baby girl horse is called a filly, and a baby boy horse is called a colt. Foals can stand and walk within an hour of being born!"},
{q:"What is a female adult horse called?",o:["Filly","Stallion","Mare","Gelding"],a:2,d:1,cat:"anatomy",fact:"An adult female horse (4 years and older) is called a mare. A young female horse under 4 is called a filly. Mares are often chosen for their calm temperaments."},
{q:"What is the white marking on a horse's forehead called if it's a small round spot?",o:["Blaze","Star","Stripe","Snip"],a:1,d:1,cat:"anatomy",fact:"A star is a white marking on a horse's forehead. Other face markings include a blaze (a wide white stripe down the face), a stripe (a narrow white line), and a snip (a small white mark on the nose)."},
{q:"What color is a palomino horse?",o:["Black","Golden with a white mane","Brown","Grey"],a:1,d:1,cat:"anatomy",fact:"Palomino horses have a beautiful golden coat with a white or cream-colored mane and tail. The shade of gold can range from light cream to deep gold. They look like they're made of sunshine!"},
{q:"What part of a horse is the 'muzzle'?",o:["The ears","The nose and mouth area","The tail","The hooves"],a:1,d:1,cat:"anatomy",fact:"The muzzle is the soft, velvety area around a horse's nose and mouth. Horses have very sensitive muzzles with whiskers that help them feel their food and surroundings. Many horses love gentle muzzle rubs!"},
{q:"How many legs does a horse have?",o:["2","4","6","8"],a:1,d:1,cat:"anatomy",fact:"Horses have four legs! The front legs are called forelegs and the back legs are called hind legs. A horse's legs are incredibly strong and designed for running at high speeds."},
// History (8)
{q:"What famous horse won the Triple Crown and is considered one of the greatest racehorses ever?",o:["Black Beauty","Seabiscuit","Secretariat","Trigger"],a:2,d:1,cat:"history",fact:"Secretariat won the Triple Crown in 1973 and set records that still stand today! He won the Belmont Stakes by an incredible 31 lengths. Many consider him the greatest racehorse of all time."},
{q:"In Greek mythology, what was the name of the winged horse?",o:["Unicorn","Centaur","Pegasus","Phoenix"],a:2,d:1,cat:"history",fact:"Pegasus was the magnificent winged horse of Greek mythology! According to legend, Pegasus was born from the blood of Medusa and was ridden by the hero Bellerophon."},
{q:"What was the name of the famous talking horse on the classic TV show?",o:["Trigger","Mr. Ed","Silver","Flicka"],a:1,d:1,cat:"history",fact:"Mr. Ed was a famous TV show (1961-1966) about a talking palomino horse. The real horse who played Mr. Ed was named Bamboo Harvester. The show's famous line was 'A horse is a horse, of course, of course!'"},
{q:"What famous mail delivery service used horses to carry mail across America?",o:["FedEx","Pony Express","Horse Mail","Gallop Post"],a:1,d:1,cat:"history",fact:"The Pony Express operated from 1860-1861, carrying mail from Missouri to California in just 10 days! Riders would gallop between stations, switching to fresh horses every 10-15 miles."},
{q:"What is the Kentucky Derby?",o:["A horse show","A famous horse race","A type of horse","A horse farm"],a:1,d:1,cat:"history",fact:"The Kentucky Derby is one of the most famous horse races in the world! It's held every May at Churchill Downs in Louisville, Kentucky, and has been running since 1875. It's called 'The Most Exciting Two Minutes in Sports.'"},
{q:"What is a mythical horse with a single horn on its head called?",o:["Pegasus","Centaur","Unicorn","Hippogriff"],a:2,d:1,cat:"history",fact:"Unicorns are mythical horses with a single spiraling horn on their forehead. They appear in legends from many cultures around the world and symbolize purity, grace, and magic."},
{q:"What is a centaur?",o:["A winged horse","Half human, half horse","A very old horse","A tiny horse"],a:1,d:1,cat:"history",fact:"In Greek mythology, centaurs were creatures with the upper body of a human and the lower body of a horse. The wisest centaur was Chiron, who taught many Greek heroes."},
{q:"Which cowboy's horse was named Trigger?",o:["John Wayne","Roy Rogers","Lone Ranger","Buffalo Bill"],a:1,d:1,cat:"history",fact:"Trigger was Roy Rogers' famous palomino horse. Trigger was so smart he could reportedly untie knots and count to 20! Roy Rogers called him 'the smartest horse in the movies.'"},
// Fun Facts (8)
{q:"Can horses sleep standing up?",o:["Yes","No","Only baby horses","Only old horses"],a:0,d:1,cat:"fun-facts",fact:"Yes! Horses can sleep standing up thanks to a special 'stay apparatus' in their legs that locks their joints. However, they do need to lie down for short periods to get deep REM sleep."},
{q:"About how long do horses typically live?",o:["5-10 years","10-15 years","25-30 years","50-60 years"],a:2,d:1,cat:"fun-facts",fact:"Horses typically live 25-30 years, though some live much longer! The oldest recorded horse, Old Billy, lived to be 62 years old. With good care, many horses live well into their 30s."},
{q:"What sound does a horse make?",o:["Bark","Neigh or whinny","Moo","Chirp"],a:1,d:1,cat:"fun-facts",fact:"Horses make several sounds! A neigh or whinny is the loudest, used to call to other horses. They also nicker (a soft greeting), snort (blowing through nostrils), and squeal during play or disagreement."},
{q:"How soon after birth can a foal stand up?",o:["Within 1 hour","After 1 day","After 1 week","After 1 month"],a:0,d:1,cat:"fun-facts",fact:"Foals can usually stand within 30 minutes to an hour after birth and can walk shortly after! In the wild, this ability is crucial for survival, allowing the foal to keep up with the herd."},
{q:"What is a group of horses called?",o:["A pack","A flock","A herd","A school"],a:2,d:1,cat:"fun-facts",fact:"A group of horses is called a herd! In the wild, herds are usually led by a dominant mare (female horse). A stallion (male horse) protects the herd from danger."},
{q:"Do horses have good memories?",o:["No, they forget quickly","Yes, they have excellent memories","They only remember food","They only remember bad things"],a:1,d:1,cat:"fun-facts",fact:"Horses have excellent long-term memories! They can remember people, places, and other horses even after many years apart. They also remember how they were treated, which is why kindness in training is so important."},
{q:"How fast can the fastest horses run?",o:["About 15 mph","About 25 mph","About 45 mph","About 70 mph"],a:2,d:1,cat:"fun-facts",fact:"The fastest horses (Thoroughbreds and Quarter Horses) can reach speeds of about 43-55 mph in short bursts! The fastest recorded speed for a racehorse is about 43.97 mph over two furlongs."},
{q:"What do horses use their tails for?",o:["Just for looks","To swat flies and show emotions","To help them run faster","To hold things"],a:1,d:1,cat:"fun-facts",fact:"Horses use their tails to swat away flies and insects, but their tail position also shows how they're feeling! A raised tail means excitement, a clamped tail means fear, and a relaxed swishing tail means contentment."},
{q:"Which horse breed has a distinctive two-tone coat with large patches of white and another color?",o:["Arabian","Paint Horse","Friesian","Clydesdale"],a:1,d:1,cat:"breeds",fact:"Paint Horses have beautiful pinto coloring with large patches of white and another color. They share bloodlines with Quarter Horses and are known for being calm, friendly, and versatile riding horses."},

// ===== MEDIUM (d:2) — Questions 51-100 =====
// Breeds (8)
{q:"At what height (in hands) is a horse considered a pony rather than a horse?",o:["12.2 hands","13.2 hands","14.2 hands","15.2 hands"],a:2,d:2,cat:"breeds",fact:"An equine that measures under 14.2 hands (58 inches) at the withers is generally classified as a pony, not a horse. Some breeds like Icelandic Horses are exceptions and are called horses despite being pony-sized."},
{q:"Which draft horse breed from Belgium can weigh over 2,000 pounds?",o:["Belgian Draft","Friesian","Hanoverian","Andalusian"],a:0,d:2,cat:"breeds",fact:"Belgian Draft horses are one of the strongest horse breeds! They typically weigh 1,800-2,200 pounds and can pull tremendous loads. They were bred for heavy farm work in Belgium."},
{q:"What breed of horse is most associated with dressage?",o:["Quarter Horse","Hanoverian","Mustang","Shetland Pony"],a:1,d:2,cat:"breeds",fact:"Hanoverians are one of the most successful dressage breeds in the world! Originally from Germany, they are known for their elegant movement, trainability, and athletic ability in Olympic-level dressage."},
{q:"Which Spanish breed is also known as the 'Pure Spanish Horse'?",o:["Lusitano","Andalusian","Paso Fino","Azteca"],a:1,d:2,cat:"breeds",fact:"The Andalusian, also called Pura Raza Espanola (Pure Spanish Horse), has been prized for centuries. They are known for their intelligence, willingness, and incredible ability in classical dressage."},
{q:"What is a color breed?",o:["A breed defined by its color pattern rather than bloodlines","A breed that comes in many colors","A breed used for painting","A dyed horse"],a:0,d:2,cat:"breeds",fact:"A color breed is registered based on coat color/pattern rather than pedigree alone. Paint Horses, Palominos, and Buckskins are examples. A true breed like Thoroughbred is based on bloodlines regardless of color."},
{q:"Which pony breed from Wales is known for being an excellent children's mount?",o:["Shetland Pony","Welsh Pony","Exmoor Pony","Dartmoor Pony"],a:1,d:2,cat:"breeds",fact:"Welsh Ponies are beloved children's mounts! They come in four sections (A through D) based on size. They are known for being kind, intelligent, and athletic, excelling in both English and Western disciplines."},
{q:"What breed of horse is used most in polo?",o:["Clydesdale","Thoroughbred crosses","Shetland Pony","Friesian"],a:1,d:2,cat:"breeds",fact:"Polo ponies are typically Thoroughbred crosses, especially Argentine Thoroughbred-Criollo crosses. They're called 'ponies' regardless of size because of polo tradition. They need speed, agility, and quick reflexes."},
{q:"Which Icelandic breed is known for having five gaits instead of the usual four?",o:["Norwegian Fjord","Icelandic Horse","Shetland Pony","Haflinger"],a:1,d:2,cat:"breeds",fact:"Icelandic Horses have five natural gaits: walk, trot, canter, tolt (a smooth four-beat gait), and flying pace. They are one of the purest breeds in the world because Iceland has banned horse imports since 982 AD!"},
// Care (8)
{q:"How often should a horse's hooves be trimmed by a farrier?",o:["Every week","Every 6-8 weeks","Every 6 months","Once a year"],a:1,d:2,cat:"care",fact:"Horses need their hooves trimmed every 6-8 weeks, whether they wear shoes or not. Hooves grow continuously, like our fingernails, and need regular maintenance to stay healthy and balanced."},
{q:"What is colic in horses?",o:["A hoof disease","Abdominal pain that can be life-threatening","A skin condition","An eye infection"],a:1,d:2,cat:"care",fact:"Colic is abdominal pain in horses and is one of the most common veterinary emergencies. Signs include pawing, rolling, looking at their belly, and refusing to eat. It can range from mild gas to a serious condition requiring surgery."},
{q:"What is the name of the strap that goes under a horse's belly to hold the saddle in place?",o:["Bridle","Girth (or cinch)","Halter","Breastplate"],a:1,d:2,cat:"care",fact:"The girth (in English riding) or cinch (in Western riding) goes under the horse's belly to keep the saddle secure. It should be tight enough to prevent the saddle from slipping but not so tight that it's uncomfortable."},
{q:"What does 'turnout' mean in horse care?",o:["Dressing the horse nicely","Letting the horse out in a field or paddock","Turning the horse in circles","Selling the horse"],a:1,d:2,cat:"care",fact:"Turnout means letting a horse spend time outside in a pasture or paddock. It's essential for a horse's physical and mental health. Horses need room to move, graze, and socialize with other horses."},
{q:"What brush is used first when grooming a horse to loosen dirt?",o:["Body brush","Curry comb","Hoof pick","Mane comb"],a:1,d:2,cat:"care",fact:"The curry comb is used first in a circular motion to loosen dirt, mud, and loose hair. Then a stiff dandy brush flicks away the loosened dirt, followed by a soft body brush for finishing. Grooming is also great bonding time!"},
{q:"Why do some horses wear blankets?",o:["For decoration","To protect them from cold, rain, or flies","Because they're cold-blooded","To hide their color"],a:1,d:2,cat:"care",fact:"Horse blankets serve many purposes! Turnout blankets protect from rain and cold, fly sheets protect from insects in summer, and cooler sheets help horses dry after exercise. Whether a horse needs a blanket depends on climate, coat, and shelter."},
{q:"How many times a day should a horse typically be fed?",o:["Once","At least 2-3 times","Every hour","Once a week"],a:1,d:2,cat:"care",fact:"Horses should eat at least 2-3 times per day, but ideally they should have access to hay most of the time. Horses have small stomachs relative to their size and are designed to eat small amounts continuously throughout the day."},
{q:"What mineral is especially important for horses and is often provided as a block in their stall?",o:["Iron","Calcium","Salt","Zinc"],a:2,d:2,cat:"care",fact:"Salt (sodium chloride) is essential for horses! Salt blocks or loose salt should always be available. Horses lose salt through sweat, especially during exercise or hot weather, and they instinctively know when they need more."},
// Riding (8)
{q:"What is 'posting' the trot?",o:["Mailing a letter while riding","Rising and sitting with the horse's rhythm at the trot","Trotting near a fence post","Stopping suddenly"],a:1,d:2,cat:"riding",fact:"Posting (or rising trot) means the rider rises out of the saddle and sits back down in rhythm with the horse's two-beat trot. It's more comfortable for both horse and rider than sitting the trot, especially over long distances."},
{q:"What riding discipline involves horses performing precise movements and patterns?",o:["Barrel racing","Dressage","Trail riding","Endurance"],a:1,d:2,cat:"riding",fact:"Dressage is often called 'horse ballet'! It involves performing a series of precise movements from memory in a 20x60 meter arena. The word dressage comes from the French word for 'training.' It's an Olympic sport!"},
{q:"In Western riding, what is barrel racing?",o:["Racing around three barrels in a clover pattern","Rolling barrels with horses","A slow walking exercise","Jumping over barrels"],a:0,d:2,cat:"riding",fact:"Barrel racing is a fast-paced Western riding event where horse and rider gallop around three barrels set in a clover-leaf pattern as quickly as possible. It requires incredible teamwork, speed, and agility!"},
{q:"What are 'aids' in horseback riding?",o:["First aid kits","Signals the rider uses to communicate with the horse","Helper riders","Training treats"],a:1,d:2,cat:"riding",fact:"Aids are how riders communicate with horses! Natural aids include your legs (to go forward), hands/reins (to steer and stop), seat/weight (for balance cues), and voice. Artificial aids include crops and spurs."},
{q:"What type of riding boot has a heel?",o:["Sneakers","Riding boots (both English and Western)","Flip flops","Rain boots"],a:1,d:2,cat:"riding",fact:"All proper riding boots have a heel (usually about 1 inch) to prevent your foot from sliding through the stirrup. This is a critical safety feature! Riding in shoes without heels can be very dangerous."},
{q:"What is an equestrian?",o:["A type of horse","A person who rides horses","A horse trainer only","A horse doctor"],a:1,d:2,cat:"riding",fact:"An equestrian is anyone who rides horses! The word comes from the Latin 'equus' meaning horse. Equestrianism includes all forms of horseback riding, from casual trail riding to competitive Olympic sports."},
{q:"What does it mean to 'lunge' a horse?",o:["To feed the horse lunch","To exercise a horse in a circle on a long line","To jump on a horse quickly","To run away from a horse"],a:1,d:2,cat:"riding",fact:"Lunging (or longeing) involves the handler standing in the center while the horse moves in a circle on a long line (lunge line). It's used for exercise, training, and warming up before riding. The line is usually about 25-30 feet long."},
{q:"What is a 'lead' in cantering?",o:["A rope to lead the horse","Which front leg reaches forward first","The rider in front of the group","A type of saddle"],a:1,d:2,cat:"riding",fact:"At the canter, one front leg reaches further forward than the other. The 'correct lead' means the inside front leg (closest to the center of the arena) leads. Riding on the wrong lead can be unbalanced and uncomfortable."},
// Anatomy (8)
{q:"What is the 'frog' of a horse's hoof?",o:["A small amphibian that lives near horses","The triangular cushion on the bottom of the hoof","The top of the hoof","A hoof disease"],a:1,d:2,cat:"anatomy",fact:"The frog is the V-shaped rubbery structure on the bottom of a horse's hoof. It acts as a shock absorber, helps with blood circulation, and provides traction. It should be cleaned daily with a hoof pick!"},
{q:"Where are a horse's 'withers'?",o:["On the legs","The ridge between the shoulder blades","On the head","At the tail"],a:1,d:2,cat:"anatomy",fact:"The withers are the highest point of a horse's back, located at the ridge between the shoulder blades. This is where horses are measured for height. Some horses have high withers which can affect saddle fit."},
{q:"What color is a bay horse?",o:["All white","Golden with white mane","Brown body with black mane, tail, and lower legs","Spotted"],a:2,d:2,cat:"anatomy",fact:"A bay horse has a brown body (ranging from light to dark) with black 'points' — black mane, tail, ear tips, and lower legs. Bay is one of the most common horse colors and is found in almost every breed."},
{q:"What is the 'poll' of a horse?",o:["The top of the head between the ears","The bottom of the hoof","A voting system for horses","The tip of the nose"],a:0,d:2,cat:"anatomy",fact:"The poll is the area at the very top of a horse's head, right between the ears. It's an important area because the bridle sits here. Horses can be sensitive at the poll, so handlers should be gentle around it."},
{q:"What is the difference between a 'sock' and a 'stocking' on a horse's leg?",o:["Socks are on front legs, stockings on back","A sock is a short white marking, a stocking goes above the knee","They're the same thing","Socks are dark, stockings are white"],a:1,d:2,cat:"anatomy",fact:"A sock is a white marking that extends from the hoof partway up the leg (below the knee or hock). A stocking is a white marking that extends above the knee or hock. These white leg markings help identify individual horses!"},
{q:"How many teeth does an adult male horse typically have?",o:["20","30","40","50"],a:2,d:2,cat:"anatomy",fact:"Adult male horses typically have 40 teeth, while mares usually have 36 (they often lack the canine teeth). A horse's teeth continue to grow and change throughout their life, which is why regular dental care is important."},
{q:"What is a 'blaze' on a horse?",o:["A fiery horse","A wide white stripe running down the face","A type of gallop","A brand mark"],a:1,d:2,cat:"anatomy",fact:"A blaze is a wide white marking that runs down the center of a horse's face from forehead to nose. It's one of the most common face markings. A very wide blaze that covers most of the face is sometimes called a 'bald face.'"},
{q:"What is the 'cannon bone' on a horse?",o:["A bone shaped like a cannon","The bone between the knee and the fetlock joint","A bone in the neck","A bone in the skull"],a:1,d:2,cat:"anatomy",fact:"The cannon bone is the large bone between the knee (or hock) and the fetlock joint on a horse's leg. It's one of the most important weight-bearing bones. Injuries to the cannon bone area are a common concern in horse care."},
// History (8)
{q:"What are the three races that make up the Triple Crown?",o:["Kentucky Derby, Preakness, Belmont Stakes","Kentucky Derby, Preakness, Breeders' Cup","Kentucky Derby, Melbourne Cup, Royal Ascot","Preakness, Belmont, Dubai World Cup"],a:0,d:2,cat:"history",fact:"The Triple Crown consists of the Kentucky Derby (1.25 miles), the Preakness Stakes (1.1875 miles), and the Belmont Stakes (1.5 miles). Only 13 horses have ever won all three races!"},
{q:"What famous Depression-era racehorse became a symbol of hope for America?",o:["Secretariat","Man o' War","Seabiscuit","Citation"],a:2,d:2,cat:"history",fact:"Seabiscuit was an undersized, unlikely racehorse who became a beloved champion during the Great Depression in the 1930s. His rags-to-riches story inspired millions of Americans during difficult times."},
{q:"What breed of wild horse, native to Mongolia, was once thought to be extinct?",o:["Mustang","Brumby","Przewalski's horse","Tarpan"],a:2,d:2,cat:"history",fact:"Przewalski's horse is the only truly wild horse species remaining today. They were declared extinct in the wild in 1969 but have been successfully reintroduced to Mongolia through breeding programs. They have never been domesticated!"},
{q:"In what Olympic sports do horses compete?",o:["Racing and polo","Dressage, show jumping, and eventing","Dressage only","No horses compete in the Olympics"],a:1,d:2,cat:"history",fact:"Three equestrian disciplines are in the Olympics: dressage, show jumping, and eventing (which combines dressage, cross-country, and show jumping). Equestrian is one of the few Olympic sports where men and women compete directly against each other!"},
{q:"What famous book tells the story of a horse from the horse's own point of view?",o:["National Velvet","The Black Stallion","Black Beauty","Flicka"],a:2,d:2,cat:"history",fact:"Black Beauty was written by Anna Sewell in 1877 and tells the life story of a horse from his own perspective. It was one of the first books to advocate for animal welfare and changed how people treated horses in England!"},
{q:"What were warhorses called in medieval times?",o:["Battle steeds","Destriers","Cavalry horses","Knight riders"],a:1,d:2,cat:"history",fact:"Destriers were the prized warhorses of medieval knights. They were specially trained for battle, bred for strength and courage, and could cost as much as a small estate! They were not the largest horses but were powerful and agile."},
{q:"What country is considered the origin of modern horse racing?",o:["United States","France","England","Arabia"],a:2,d:2,cat:"history",fact:"England is considered the birthplace of modern horse racing! The sport became popular among English royalty, earning it the nickname 'The Sport of Kings.' The Jockey Club was founded in England in 1750 to regulate racing."},
{q:"What was the role of horses in the Pony Express?",o:["They carried passengers","They carried mail across America at high speed","They pulled wagons","They guarded forts"],a:1,d:2,cat:"history",fact:"Pony Express riders would ride at full gallop, switching to a fresh horse every 10-15 miles at relay stations. A rider would cover about 75-100 miles before passing the mail to the next rider. The entire route from Missouri to California took about 10 days!"},
// Fun Facts (10)
{q:"Can horses see almost 360 degrees around them?",o:["No, they can only see forward","Yes, they have nearly 360-degree vision","They can see exactly 360 degrees","They can only see to the sides"],a:1,d:2,cat:"fun-facts",fact:"Horses have nearly 360-degree vision because their eyes are on the sides of their head! They have two small blind spots: directly in front of their nose and directly behind their tail. This wide vision helped them spot predators in the wild."},
{q:"What is a horse's favorite position of their ears when they're happy?",o:["Pinned flat back","Pointed forward or relaxed to the sides","One forward, one back","Completely still"],a:1,d:2,cat:"fun-facts",fact:"Happy, relaxed horses have their ears pointed forward (alert and interested) or relaxed slightly to the sides. Ears pinned flat back signal anger or discomfort. Horses can rotate their ears 180 degrees independently!"},
{q:"How much does an average horse's brain weigh?",o:["About 1.5 pounds","About 5 pounds","About 10 pounds","About 0.5 pounds"],a:0,d:2,cat:"fun-facts",fact:"A horse's brain weighs about 1.5 pounds (623 grams), which is relatively small compared to their body size. Despite this, horses are highly intelligent animals with excellent memory and problem-solving abilities!"},
{q:"What is the world's smallest horse breed?",o:["Shetland Pony","Miniature Horse","Falabella","Welsh Pony"],a:2,d:2,cat:"fun-facts",fact:"The Falabella is the world's smallest horse breed, originating from Argentina. They typically stand only 28-34 inches tall! Despite their tiny size, they are proportioned like full-sized horses, not ponies."},
{q:"Can horses swim?",o:["No, they sink","Yes, horses are natural swimmers","Only some breeds can swim","Only baby horses can swim"],a:1,d:2,cat:"fun-facts",fact:"Yes, horses are natural swimmers! They instinctively know how to swim and many horses enjoy water. Some horse sports even involve swimming, and therapeutic swimming is used to help injured horses recover."},
{q:"How long is a horse's pregnancy (gestation period)?",o:["About 6 months","About 9 months (like humans)","About 11 months","About 2 years"],a:2,d:2,cat:"fun-facts",fact:"A horse's pregnancy lasts about 11 months (approximately 340 days). That's about 2 months longer than a human pregnancy! Mares usually give birth to a single foal, and twins are very rare and often problematic."},
{q:"What does it mean when a horse 'nickers'?",o:["It's angry","It's making a soft, friendly greeting sound","It's scared","It's hungry"],a:1,d:2,cat:"fun-facts",fact:"A nicker is a soft, low sound horses make as a friendly greeting. Horses often nicker when they see their owner coming with food or when a mare calls to her foal. It's one of the sweetest sounds a horse makes!"},
{q:"Do horses have a dominant side, like humans being right- or left-handed?",o:["No, they're always balanced","Yes, most horses are naturally one-sided","Only stallions have a dominant side","Only ponies are one-sided"],a:1,d:2,cat:"fun-facts",fact:"Just like humans are right- or left-handed, horses tend to be stronger or more flexible on one side! This is called 'laterality.' Good training helps horses become more balanced on both sides. Most horses favor their left side."},
{q:"What is the record for the tallest horse ever?",o:["18 hands","19 hands","Over 21 hands","22 hands"],a:2,d:2,cat:"fun-facts",fact:"The tallest horse ever recorded was a Shire gelding named Sampson (later renamed Mammoth) who stood 21.2 hands (7 feet 2.5 inches) tall! He was born in England in 1846. Modern tall horses are usually 19-20 hands."},
{q:"Why do horses roll on the ground?",o:["They are sick","To scratch itches, stretch muscles, and coat their skin with dust","They are playing dead","They are trying to sleep"],a:1,d:2,cat:"fun-facts",fact:"Rolling is a natural and healthy behavior for horses! They roll to scratch hard-to-reach itches, stretch their back muscles, dry off after getting wet, and coat themselves with dust for insect protection. A horse that rolls all the way over is said to be worth more!"},

// ===== HARD (d:3) — Questions 101-150 =====
// Breeds (10)
{q:"What is the Lipizzaner breed most famous for?",o:["Racing","The Spanish Riding School of Vienna and 'airs above the ground'","Pulling carriages","Wild mustangs"],a:1,d:3,cat:"breeds",fact:"Lipizzaner stallions perform at the famous Spanish Riding School in Vienna, Austria. They are known for 'airs above the ground' — spectacular leaps including the capriole, levade, and courbette. Most Lipizzaners are born dark and turn white as they age!"},
{q:"Which American gaited breed is known for a smooth four-beat gait called the 'running walk'?",o:["Missouri Fox Trotter","Tennessee Walking Horse","Standardbred","Saddlebred"],a:1,d:3,cat:"breeds",fact:"The Tennessee Walking Horse is famous for its incredibly smooth running walk, where the horse nods its head in rhythm. Riders can sit comfortably without bouncing. They were originally bred for plantation owners who needed to ride for long hours."},
{q:"What is the Thoroughbred's country of origin?",o:["United States","Ireland","England","Arabia"],a:2,d:3,cat:"breeds",fact:"Thoroughbreds were developed in England in the 17th and 18th centuries by crossing native mares with three imported Arabian stallions: the Byerly Turk, the Darley Arabian, and the Godolphin Arabian. Every modern Thoroughbred traces back to these three!"},
{q:"What is the Standardbred breed primarily used for?",o:["Dressage","Show jumping","Harness racing","Polo"],a:2,d:3,cat:"breeds",fact:"Standardbreds are the stars of harness racing! They pull a lightweight cart called a sulky while either trotting or pacing. They got their name because they had to meet a 'standard' time for the mile to be registered."},
{q:"Which warmblood breed from the Netherlands is popular in show jumping?",o:["Hanoverian","Trakehner","Dutch Warmblood (KWPN)","Holsteiner"],a:2,d:3,cat:"breeds",fact:"The Dutch Warmblood (KWPN) is one of the most successful sport horse breeds in the world. They excel in show jumping, dressage, and eventing. The Netherlands has a very strict breeding program that selects for athletic ability and temperament."},
{q:"What makes the Akhal-Teke breed's coat so unique?",o:["It's always spotted","It has a metallic, golden sheen","It changes color with seasons","It's naturally curly"],a:1,d:3,cat:"breeds",fact:"The Akhal-Teke from Turkmenistan has a unique hair structure that makes their coat appear metallic and shimmery, especially in golden and buckskin colors. They're sometimes called 'the golden horses.' They are one of the oldest and rarest breeds in the world."},
{q:"What is a Warmblood horse?",o:["A horse with warm blood temperature","A cross between hot-blooded and cold-blooded horse types","A horse from warm climates","A sick horse with a fever"],a:1,d:3,cat:"breeds",fact:"Warmbloods are breeds developed by crossing 'hot-blooded' horses (like Thoroughbreds and Arabians, known for speed) with 'cold-blooded' horses (like draft breeds, known for calm temperaments). This produces athletic, trainable sport horses."},
{q:"Which breed is known for its 'paso fino' gait and originated in Latin America?",o:["Andalusian","Paso Fino","Criollo","Azteca"],a:1,d:3,cat:"breeds",fact:"The Paso Fino ('fine step') breed has a unique natural four-beat lateral gait that is incredibly smooth. The gait is so even that riders barely move in the saddle! They originated from horses brought to the Americas by Spanish conquistadors."},
{q:"What is unique about the Curly Horse breed?",o:["It has a curly tail only","It has a hypoallergenic curly coat","It can't gallop","It's always miniature"],a:1,d:3,cat:"breeds",fact:"Curly Horses have a unique curly coat, mane, and tail! Amazingly, many people who are allergic to other horses can be around Curlies without problems. Their origin is mysterious, but they were treasured by the Lakota Sioux people."},
{q:"How many foundation stallions does every modern Thoroughbred trace back to?",o:["One","Two","Three","Five"],a:2,d:3,cat:"breeds",fact:"Every modern Thoroughbred traces back to three foundation stallions: the Byerly Turk (imported around 1689), the Darley Arabian (imported around 1704), and the Godolphin Arabian (imported around 1729). About 95% descend through the Darley Arabian's line!"},
// Care (8)
{q:"What is 'founder' (laminitis) in horses?",o:["When a horse starts a new herd","A painful inflammation of tissue inside the hoof","When a horse learns a new trick","A type of horseshoe"],a:1,d:3,cat:"care",fact:"Laminitis (founder) is a serious, painful condition where the laminae (tissue connecting the hoof wall to the coffin bone) become inflamed. It can be caused by overeating rich grass, grain overload, or other metabolic issues. It requires immediate veterinary care!"},
{q:"What does 'floating' a horse's teeth mean?",o:["Putting them in water","Filing down sharp edges on the teeth","Removing teeth","Brushing the teeth"],a:1,d:3,cat:"care",fact:"Floating means filing down the sharp points that develop on a horse's teeth as they wear unevenly from chewing. A veterinarian or equine dentist does this every 1-2 years. Without floating, sharp edges can cut a horse's cheeks and make eating painful."},
{q:"What is the difference between a halter and a bridle?",o:["They're the same thing","A halter is for leading/tying; a bridle is for riding with a bit","A halter has a bit; a bridle doesn't","A halter is for riding; a bridle is for leading"],a:1,d:3,cat:"care",fact:"A halter is a simple headpiece used for leading, tying, and handling a horse on the ground. A bridle includes a bit (which goes in the mouth), reins, and a headstall, and is used for riding to communicate steering and stopping cues."},
{q:"How can you tell a horse's approximate age by looking at its teeth?",o:["You can't tell age from teeth","By the color of the teeth only","By the angle, shape, and wear patterns of the teeth","By counting the teeth"],a:2,d:3,cat:"care",fact:"An experienced horseperson can estimate a horse's age by examining the angle of the incisors (they become more angled with age), the shape of the biting surface (round to triangular), and the presence of 'Galvayne's groove.' The saying 'don't look a gift horse in the mouth' comes from this practice!"},
{q:"What vaccinations do horses commonly need?",o:["None, horses don't need vaccines","Tetanus, rabies, West Nile, and influenza","Only rabies","Only tetanus"],a:1,d:3,cat:"care",fact:"Core vaccinations for horses include tetanus, rabies, West Nile virus, Eastern/Western equine encephalomyelitis, and equine influenza. Your veterinarian will recommend a vaccination schedule based on your horse's risk factors and location."},
{q:"What does it mean when a horse is described as 'hard keeper' or 'easy keeper'?",o:["Hard to catch vs easy to catch","Needs more food to maintain weight vs gains weight easily","Hard to train vs easy to train","Hard to shoe vs easy to shoe"],a:1,d:3,cat:"care",fact:"A 'hard keeper' is a horse that has difficulty maintaining weight and needs extra calories. An 'easy keeper' gains weight easily and may need a restricted diet. Thoroughbreds tend to be hard keepers, while ponies and some draft breeds are often easy keepers."},
{q:"What is 'thrush' in horse hooves?",o:["A type of bird","A bacterial infection of the frog that causes a foul smell","A type of horseshoe","A decorative hoof polish"],a:1,d:3,cat:"care",fact:"Thrush is a bacterial infection that attacks the frog and surrounding tissue of the hoof. It produces a black, foul-smelling discharge. It's commonly caused by standing in wet, dirty conditions. Daily hoof picking and clean stalls help prevent it."},
{q:"What is the purpose of a horse's 'chestnuts' (the small hard patches on the inside of their legs)?",o:["They serve no current purpose but are remnants of evolution","They help the horse grip the ground","They produce sweat","They protect the leg joints"],a:0,d:3,cat:"care",fact:"Chestnuts are believed to be remnants of a toe from the horse's ancient multi-toed ancestors. Each horse's chestnuts are unique, like human fingerprints! Some registries have used chestnut patterns for identification purposes."},
// Riding (6)
{q:"What is 'collection' in riding?",o:["Collecting ribbons","When the horse shortens its stride and carries more weight on the hindquarters","Collecting the horse from the pasture","A group of riders"],a:1,d:3,cat:"riding",fact:"Collection is an advanced concept where the horse shifts its balance rearward, carrying more weight on the hindquarters. This results in shorter, more elevated strides with greater impulsion. It requires significant training and strength from the horse."},
{q:"What is the difference between a 'diagonal' and a 'lead'?",o:["They're the same thing","Diagonals apply to trot, leads apply to canter","Diagonals are for Western, leads are for English","There is no difference"],a:1,d:3,cat:"riding",fact:"At the trot, 'diagonals' refer to the pair of legs that move together (right front + left hind). The rider posts on the correct diagonal by rising when the outside shoulder moves forward. At canter, the 'lead' refers to which front leg reaches furthest forward."},
{q:"What is 'eventing' in equestrian sports?",o:["Any horse event","A three-phase competition: dressage, cross-country, and show jumping","A Western riding competition","A horse race"],a:1,d:3,cat:"riding",fact:"Eventing is often called the 'triathlon of equestrian sports.' It tests horse and rider in three phases: dressage (precision), cross-country (endurance and bravery over solid obstacles), and show jumping (accuracy). It's one of the most demanding equestrian sports!"},
{q:"What does 'on the bit' mean in riding?",o:["The horse is biting the rider","The horse accepts light contact with the bit and rounds its back","The horse is fighting the bit","The bit is too tight"],a:1,d:3,cat:"riding",fact:"When a horse is 'on the bit,' it accepts soft contact through the reins, flexes at the poll, rounds its back, and engages its hindquarters. This creates a beautiful, connected frame. It takes years of training for both horse and rider to achieve consistently."},
{q:"What is a 'half-halt' in riding?",o:["Stopping halfway","A brief, coordinated aid to rebalance the horse","Slowing to half speed","A half turn"],a:1,d:3,cat:"riding",fact:"A half-halt is one of the most important and subtle riding aids. It's a brief, coordinated use of seat, legs, and hands to rebalance the horse, prepare for a transition, or get the horse's attention. It lasts just a moment — like a gentle 'heads up' to the horse."},
{q:"What is 'cross-country' in equestrian eventing?",o:["Riding across the country","Jumping solid, natural obstacles over a long outdoor course","A type of dressage","Western trail riding"],a:1,d:3,cat:"riding",fact:"Cross-country is the most thrilling phase of eventing! Horse and rider gallop over a course of 20-40 solid, fixed obstacles (like logs, ditches, water jumps, and banks) spread over 2-4 miles. It tests the horse's bravery, endurance, and the rider's skill."},
// Anatomy (6)
{q:"What is the 'fetlock' joint on a horse?",o:["The joint in the neck","The ankle-like joint above the hoof","The knee joint","The hip joint"],a:1,d:3,cat:"anatomy",fact:"The fetlock is the joint just above the hoof at the back of the leg. Despite being called the 'ankle,' it actually corresponds to the ball of a human's foot. It's a critical joint that absorbs tremendous impact when the horse moves."},
{q:"How do horses regulate their body temperature?",o:["They can't regulate temperature","Primarily through sweating and respiration","By changing coat color","By lying in water"],a:1,d:3,cat:"anatomy",fact:"Horses are one of the few animals (like humans) that cool themselves primarily through sweating. Their large body surface area and extensive network of blood vessels near the skin help dissipate heat. Horses can produce up to 3-4 gallons of sweat per hour during intense exercise!"},
{q:"What is a 'grey' horse in terms of genetics?",o:["A horse born grey","A horse that progressively lightens from any base color to white","A horse mixed with white and black hairs","An old horse"],a:1,d:3,cat:"anatomy",fact:"Grey is actually a modifier gene, not a base color! Grey horses are born dark (black, bay, chestnut, etc.) and progressively lighten over their lifetime. By their teens, most grey horses appear completely white. They technically never become 'white' — they are always called 'grey.'"},
{q:"What is a horse's 'hock'?",o:["A type of lock for the stable","The joint on the hind leg corresponding to the human ankle","The lower jaw","A type of horseshoe"],a:1,d:3,cat:"anatomy",fact:"The hock is the large angular joint on the hind leg, equivalent to the human ankle. It's one of the hardest-working joints in the horse's body and is crucial for propulsion and jumping power. Hock problems are common in performance horses."},
{q:"How many bones does a horse have in its body?",o:["About 100","About 205","About 350","About 500"],a:1,d:3,cat:"anatomy",fact:"Horses have approximately 205 bones in their body. Interestingly, Arabian horses typically have one fewer lumbar vertebra, one fewer tail vertebra, and one fewer pair of ribs than other breeds, giving them 201 bones!"},
{q:"What is a 'roan' coat color?",o:["Solid dark color","White hairs evenly mixed with a base color throughout the body","Spotted pattern","Striped pattern"],a:1,d:3,cat:"anatomy",fact:"Roan is a coat pattern where white hairs are evenly mixed with a base color. Blue roan has white mixed with black, red roan has white mixed with chestnut, and bay roan has white mixed with bay. Unlike grey horses, roans don't lighten with age!"},
// History (10)
{q:"What horse set the still-standing record for the Belmont Stakes by winning by 31 lengths?",o:["Man o' War","Seabiscuit","Secretariat","Citation"],a:2,d:3,cat:"history",fact:"Secretariat's 1973 Belmont Stakes victory is considered one of the greatest athletic performances in any sport. He won by 31 lengths in a time of 2:24 that has never been beaten. His heart weighed about 22 pounds — more than twice the average horse heart!"},
{q:"What ancient people were among the first to domesticate horses around 4000 BC?",o:["Romans","Egyptians","Botai people of Central Asia","Greeks"],a:2,d:3,cat:"history",fact:"The Botai people of Kazakhstan are believed to be among the first to domesticate horses around 3500-4000 BC. Evidence shows they rode horses and even milked mares. Domestication of horses revolutionized human civilization, enabling faster travel, trade, and warfare."},
{q:"What role did horses play in World War I?",o:["They were not used","They served as cavalry, transport, and communication","They only carried supplies","They only served as cavalry"],a:1,d:3,cat:"history",fact:"Over 8 million horses died in World War I. They served as cavalry mounts, pulled artillery and supply wagons, and carried messages. The war's trench warfare and machine guns made cavalry charges increasingly deadly. The book 'War Horse' tells this story beautifully."},
{q:"What is the oldest horse race still run today?",o:["Kentucky Derby","The St. Leger Stakes","The Palio di Siena","The Kiplingcotes Derby"],a:3,d:3,cat:"history",fact:"The Kiplingcotes Derby in England has been run since 1519, making it the oldest horse race still in existence! It's a simple flat race over 4 miles across farmland in Yorkshire. Interestingly, the runner-up often wins more money than the winner due to ancient rules!"},
{q:"What famous horse is buried standing up at the Kentucky Horse Park?",o:["Secretariat","Man o' War","Seabiscuit","Citation"],a:1,d:3,cat:"history",fact:"Man o' War (1917-1947) was one of the greatest racehorses ever, winning 20 of 21 races. When he died at age 30, an estimated 2,000 people attended his funeral. He is buried at the Kentucky Horse Park in Lexington, Kentucky."},
{q:"In which century did the Spanish bring horses back to the Americas?",o:["13th century","15th century","16th century","18th century"],a:2,d:3,cat:"history",fact:"Spanish conquistadors brought horses to the Americas in the 1500s (16th century). Horses had actually evolved in North America millions of years ago but went extinct there about 10,000 years ago. The Spanish reintroduction changed the lives of many Native American peoples forever."},
{q:"What was the significance of the horse Clever Hans?",o:["He was the fastest racehorse","He appeared to solve math problems but was actually reading human body language","He was the tallest horse","He won the most races"],a:1,d:3,cat:"history",fact:"Clever Hans was a horse in early 1900s Germany who seemed to solve math problems by tapping his hoof. Investigation revealed he was actually reading subtle, unconscious body language cues from his handler. This discovery revolutionized the study of animal cognition and experimental psychology!"},
{q:"What is the Tevis Cup?",o:["A dressage championship","One of the most famous 100-mile endurance rides in the world","A polo tournament","A horse breeding award"],a:1,d:3,cat:"history",fact:"The Tevis Cup (Western States Trail Ride) is a grueling 100-mile endurance ride through the Sierra Nevada mountains, completed in one day. It crosses rugged terrain with extreme elevation changes. Arabian horses dominate this event due to their incredible endurance!"},
{q:"Who was Alexander the Great's famous horse?",o:["Pegasus","Trigger","Bucephalus","Rocinante"],a:2,d:3,cat:"history",fact:"Bucephalus was Alexander the Great's beloved horse. According to legend, a young Alexander was the only person who could tame him by turning him toward the sun (the horse was scared of his own shadow). Alexander rode Bucephalus into every major battle and named a city after him."},
{q:"What is the Spanish Riding School and why is it called 'Spanish'?",o:["A riding school in Spain","A school in Vienna that uses Lipizzaner horses descended from Spanish stock","A school that teaches Spanish riding style","A school in Mexico"],a:1,d:3,cat:"history",fact:"The Spanish Riding School is in Vienna, Austria, not Spain! It's called 'Spanish' because the Lipizzaner horses used there descend from Spanish horse stock. Founded in 1572, it is the oldest riding school in the world that still practices classical dressage."},
// Fun Facts (6)
{q:"Can horses vomit?",o:["Yes, regularly","Yes, but only when sick","No, horses physically cannot vomit","Only foals can vomit"],a:2,d:3,cat:"fun-facts",fact:"Horses cannot vomit due to the strong band of muscle around their esophagus and the angle at which the esophagus connects to the stomach. This is one reason colic can be so dangerous — if a horse eats something harmful, it cannot throw it back up."},
{q:"How many muscles does a horse have in each ear?",o:["3","5","10","16"],a:2,d:3,cat:"fun-facts",fact:"Each of a horse's ears has 10 muscles (compared to 3 in a human ear)! This allows them to rotate their ears 180 degrees independently to pinpoint sounds from different directions. Ear position is also one of the main ways horses communicate their emotions."},
{q:"What unique feature do horses share with humans and very few other animals?",o:["They can cry emotional tears","They can sunburn, especially on pink skin","They can talk","They can write"],a:1,d:3,cat:"fun-facts",fact:"Horses with pink skin (especially around the nose and under white markings) can get sunburned just like humans! Horse owners often apply equine sunscreen to protect sensitive areas. Light-colored horses are most susceptible."},
{q:"How soon after a horse drinks water does it reach its stomach?",o:["Instantly","About 5 seconds","About 30 minutes","About 2 hours"],a:1,d:3,cat:"fun-facts",fact:"Water reaches a horse's stomach in about 5 seconds! However, it takes much longer for water to be fully absorbed and distributed throughout the body. Horses should always have access to clean water and ideally drink before eating."},
{q:"What is 'horse whispering'?",o:["Literally whispering to horses","A method of training based on understanding horse behavior and communication","A type of horse music","A veterinary technique"],a:1,d:3,cat:"fun-facts",fact:"Horse whispering (natural horsemanship) is a training philosophy based on understanding horse psychology and communication. Instead of using force, horse whisperers use body language, pressure and release, and trust-building. The movie 'The Horse Whisperer' popularized the concept."},
{q:"Can horses recognize themselves in a mirror?",o:["Yes, always","Studies suggest some horses may show signs of self-recognition","No, never","Only Arabian horses can"],a:1,d:3,cat:"fun-facts",fact:"Research is ongoing, but some studies suggest horses may show signs of self-recognition. In experiments, some horses tried to rub marks off their faces after seeing them in a mirror. This puts them in a select group of animals (alongside apes, dolphins, and elephants) that may pass the mirror test!"},
{q:"What is 'imprinting' in foal training?",o:["Putting a stamp on the foal","Handling a newborn foal extensively in its first hours to build trust with humans","Teaching a foal to copy its mother","A type of branding"],a:1,d:3,cat:"care",fact:"Imprint training involves gentle handling of a newborn foal within hours of birth, touching all parts of its body, introducing it to human contact, and desensitizing it to various stimuli. Veterinarian Robert Miller popularized this method. It can help produce calmer, more trusting horses throughout their lives."},
{q:"What is a 'green horse'?",o:["A horse that is green in color","A young or inexperienced horse that is still in early training","A horse that eats only grass","An eco-friendly horse farm"],a:1,d:3,cat:"riding",fact:"A 'green' horse is one that is young or inexperienced — still in the early stages of training. Green horses need patient, experienced riders. The term can apply to any age horse that hasn't had much training, not just young ones. A 'green' rider is similarly a beginner!"},
{q:"What is the purpose of a horse's 'pastern' and why is its angle important?",o:["It's just a leg joint","The pastern connects the hoof to the fetlock; its angle affects shock absorption and soundness","It helps with breathing","It stores energy for galloping"],a:1,d:3,cat:"anatomy",fact:"The pastern is the area between the fetlock and the hoof. Its angle is critical — too upright increases concussion on joints, while too sloping puts excessive strain on tendons. An ideal pastern angle (around 50-55 degrees) matches the hoof angle and provides good shock absorption for long-term soundness."},
{q:"What is 'natural horsemanship' and how does it differ from traditional training?",o:["Using only natural materials","A training philosophy based on understanding horse psychology, using pressure-and-release rather than force","Letting horses train themselves","Training horses in nature only"],a:1,d:3,cat:"fun-facts",fact:"Natural horsemanship is a training approach that works with a horse's natural instincts rather than against them. Popularized by trainers like Pat Parelli, Clinton Anderson, and Monty Roberts, it emphasizes body language, groundwork, and building trust. Instead of forcing compliance, it helps the horse choose the right answer through clear communication."},

// ===== EXPERT (d:4) — Questions 151-200 =====
// Breeds (8)
{q:"What are the three foundation sire lines of the Thoroughbred breed?",o:["Byerly Turk, Darley Arabian, Godolphin Arabian","Eclipse, Matchem, Herod","Northern Dancer, Sadler's Wells, Danehill","Storm Cat, A.P. Indy, Unbridled"],a:0,d:4,cat:"breeds",fact:"All modern Thoroughbreds trace back to three stallions imported to England: the Byerly Turk (c.1689), the Darley Arabian (c.1704), and the Godolphin Arabian (c.1729). These three crossed with English mares to create the breed. About 95% of modern Thoroughbreds trace through the Darley Arabian's great-great-grandson Eclipse!"},
{q:"What is the difference between a 'hot blood,' 'cold blood,' and 'warm blood' horse?",o:["Blood temperature differences","Hot bloods are spirited (Arabians, Thoroughbreds), cold bloods are calm drafts, warm bloods are crosses","It refers to their origin climate only","Hot bloods are red, cold bloods are grey"],a:1,d:4,cat:"breeds",fact:"These terms describe temperament and type, not actual blood temperature! Hot bloods (Arabians, Thoroughbreds) are spirited, fast, and refined. Cold bloods (Clydesdales, Percherons) are calm, large, and strong. Warm bloods (Hanoverians, Dutch Warmbloods) combine qualities of both for sport."},
{q:"What is a 'sport horse' and how do sport horse breeding programs work?",o:["Any horse that plays games","A horse selectively bred through performance testing for athletic disciplines","A horse that watches sports","A retired racehorse"],a:1,d:4,cat:"breeds",fact:"Sport horse breeding programs use rigorous performance testing (including movement evaluation, jumping ability, temperament, and conformation scoring) to select breeding stock. Stallions must pass inspections to be approved. This systematic approach has produced some of the world's best dressage and jumping horses."},
{q:"What is the Mangalarga Marchador and what makes its gait special?",o:["A Brazilian breed with a smooth diagonal gait called the 'marcha'","A Spanish breed with a high-stepping trot","An Italian breed known for racing","A Portuguese breed that can't canter"],a:0,d:4,cat:"breeds",fact:"The Mangalarga Marchador is Brazil's national horse breed. Their signature 'marcha' gait is a smooth, rhythmic, four-beat lateral or diagonal gait that allows the rider to sit comfortably for hours. They are the most numerous breed in Brazil with over 600,000 registered horses!"},
{q:"What genetic condition are some white-pattern horses (like Overo Paints) at risk for?",o:["Color blindness","Lethal White Overo Syndrome (LWOS)","Albinism","Dwarfism"],a:1,d:4,cat:"breeds",fact:"Lethal White Overo Syndrome occurs when a foal inherits the frame overo gene from both parents. These foals are born completely white with blue eyes and have a non-functional colon. Genetic testing can identify carriers to prevent this tragedy. Responsible breeders always test before breeding."},
{q:"What is the Marwari horse known for and where does it originate?",o:["Speed, from Australia","Unique inward-turning ears, from India","Height, from Germany","Endurance, from Arabia"],a:1,d:4,cat:"breeds",fact:"The Marwari horse from India is famous for its uniquely shaped ears that curve inward and can rotate 180 degrees, sometimes touching at the tips! Bred by the Rathore clan of Rajasthan, they were prized warhorses known for their loyalty, hardiness, and ability to survive in the desert."},
{q:"What makes the American Saddlebred's five gaits unique among show horses?",o:["They're all fast gaits","The slow gait and rack are trained four-beat gaits in addition to walk, trot, and canter","All five are natural gaits","They include jumping"],a:1,d:4,cat:"breeds",fact:"Five-gaited American Saddlebreds perform the walk, trot, canter, slow gait (a slow, four-beat lateral gait), and rack (a fast, flashy four-beat gait). The rack is especially exciting to watch — the horse moves each leg independently at high speed with no moment of suspension. Saddlebreds are called 'the peacock of the horse world!'"},
{q:"What is the Cleveland Bay and why is it historically significant?",o:["A brown horse from Ohio","England's oldest established horse breed, used as royal carriage horses","A race breed from Ireland","A color variation of the Thoroughbred"],a:1,d:4,cat:"breeds",fact:"The Cleveland Bay is England's oldest established horse breed, dating back to the Middle Ages. Always bay in color (hence the name), they have served as royal carriage horses for the British monarchy for centuries. Today they are critically endangered with fewer than 900 remaining worldwide."},
// Care (7)
{q:"What is Equine Metabolic Syndrome (EMS) and which horses are most susceptible?",o:["A respiratory disease in Thoroughbreds","A metabolic disorder causing insulin resistance, common in easy keepers and ponies","A skin condition in grey horses","A hoof disease in draft horses"],a:1,d:4,cat:"care",fact:"EMS is similar to Type 2 diabetes in humans. Horses with EMS have insulin resistance, are prone to obesity, and have an increased risk of laminitis. Ponies, Morgans, and easy-keeper breeds are most susceptible. Management includes controlled diet, regular exercise, and limited access to lush pasture."},
{q:"What is 'cribbing' and what causes it?",o:["Building a baby horse crib","A stereotypic behavior where the horse grips a surface with its teeth and gulps air","A type of stall decoration","A feeding method"],a:1,d:4,cat:"care",fact:"Cribbing (crib-biting) is a compulsive behavior where a horse grabs a fence or stall edge with its incisors, arches its neck, and swallows air. It may be caused by stress, boredom, or gastric ulcers. Once established, it's very difficult to stop. Increasing turnout and reducing stress can help prevent it."},
{q:"What is the 'digital pulse' and why do horse owners check it?",o:["A horse's heart rate","The pulse felt in the arteries near the hoof, which increases with hoof inflammation","A type of music horses like","A digital tracking device"],a:1,d:4,cat:"care",fact:"The digital pulse is felt in the arteries on either side of the fetlock or pastern. A strong, bounding digital pulse can indicate inflammation in the hoof, which is an early warning sign of laminitis. Horse owners learn to check this as part of routine health monitoring."},
{q:"What is 'EPM' (Equine Protozoal Myeloencephalitis)?",o:["A type of worm","A neurological disease caused by a protozoan parasite","A breathing condition","A skin disease"],a:1,d:4,cat:"care",fact:"EPM is a serious neurological disease caused by the protozoan Sarcocystis neurona, which horses get from eating feed contaminated with opossum feces. It attacks the central nervous system, causing symptoms from mild incoordination to severe neurological impairment. Early treatment is crucial for recovery."},
{q:"What is the importance of the horse's hindgut in digestion?",o:["It's not important","The cecum and large colon ferment fiber, producing most of the horse's energy from forage","It only processes water","It only stores waste"],a:1,d:4,cat:"care",fact:"The horse's hindgut (cecum and large colon) acts as a massive fermentation vat, housing billions of microbes that break down fiber from hay and grass into volatile fatty acids — the horse's primary energy source. This is why sudden diet changes can be dangerous: they disrupt the delicate microbial balance."},
{q:"What are 'splints' in horses and what causes them?",o:["Leg bandages","Bony growths on the cannon bone caused by stress or trauma to the splint bones","A type of shoe","Cracks in the hoof"],a:1,d:4,cat:"care",fact:"Splints are bony enlargements that form on the splint bones (small bones running alongside the cannon bone). They're usually caused by concussion, strain, or direct trauma, and are most common in young horses in hard work. While often just a cosmetic blemish, active splints can cause temporary lameness."},
{q:"What is a 'coggins test' and why is it required?",o:["A test of horse intelligence","A blood test for Equine Infectious Anemia (EIA), required for travel and shows","A test for colic","A test for worms"],a:1,d:4,cat:"care",fact:"A Coggins test detects antibodies for Equine Infectious Anemia (EIA), an incurable viral disease. A negative Coggins test is required in most states for transporting horses, attending shows, and boarding at facilities. The test is named after Dr. Leroy Coggins who developed it in 1970."},
// Riding (5)
{q:"What is 'piaffe' in dressage?",o:["A type of jump","A highly collected trot in place with elevated, cadenced steps","A fast gallop","A Western sliding stop"],a:1,d:4,cat:"riding",fact:"Piaffe is one of the most difficult dressage movements. The horse trots in place with great elevation, cadence, and engagement of the hindquarters. It takes years of progressive training to develop the strength and balance needed. It's performed in Grand Prix dressage at the highest level of competition."},
{q:"What is the 'FEI' and what role does it play in equestrian sports?",o:["A type of horse feed","The Federation Equestre Internationale — the international governing body for equestrian sports","A breed registry","A veterinary organization"],a:1,d:4,cat:"riding",fact:"The FEI (Federation Equestre Internationale), headquartered in Lausanne, Switzerland, is the sole international governing body for equestrian sports recognized by the International Olympic Committee. It governs dressage, jumping, eventing, driving, vaulting, reining, endurance, and para-equestrian sports worldwide."},
