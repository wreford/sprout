{q:"What does 'flying change' mean in dressage?",o:["The horse flies through the air","The horse changes its canter lead mid-stride without breaking gait","Changing horses mid-ride","A change of direction while galloping"],a:1,d:4,cat:"riding",fact:"A flying change is when a horse switches its leading leg at the canter during the moment of suspension (when all four feet are off the ground). Advanced dressage horses perform tempis — flying changes every stride (one-tempis), two strides, three strides, or four strides in sequence!"},
{q:"What is a 'triple combination' in show jumping?",o:["Three horses jumping together","Three fences placed close together that must be jumped in sequence","Three jumps of the same height","Three rounds of jumping"],a:1,d:4,cat:"riding",fact:"A triple combination consists of three fences placed 1-2 strides apart. The horse and rider must jump all three in sequence with the correct number of strides between each. Combinations test the horse's adjustability and the rider's ability to plan ahead for each element."},
{q:"What is 'passage' in dressage and how does it differ from piaffe?",o:["Walking through a passage","A slow, elevated, extremely cadenced trot with forward movement (piaffe is in place)","A type of gallop","A Western jog"],a:1,d:4,cat:"riding",fact:"Passage is a majestic, slow-motion trot with great elevation, suspension, and cadence. Unlike piaffe (which is on the spot), passage moves forward. The transition between piaffe and passage is one of the most challenging movements in Grand Prix dressage and showcases the ultimate partnership between horse and rider."},
// Anatomy (5)
{q:"What is the 'stay apparatus' and how does it allow horses to sleep standing up?",o:["A barn fixture","A system of ligaments and tendons that lock the leg joints in place with minimal muscular effort","An alarm system for the stable","A type of halter"],a:1,d:4,cat:"anatomy",fact:"The stay apparatus is a remarkable system of tendons and ligaments in the horse's legs that can lock the major joints in a standing position. This allows horses to bear weight while using almost no muscular effort, so they can rest and even sleep while standing. It evolved as a survival mechanism to allow quick escape from predators."},
{q:"How does a horse's eye structure differ from a human's and affect its vision?",o:["No difference","Horses have the largest eyes of any land mammal, with a horizontal pupil allowing wide peripheral vision but limited depth perception","Horse eyes are smaller than human eyes","Horses are completely colorblind"],a:1,d:4,cat:"anatomy",fact:"Horse eyes are the largest of any land mammal! Their horizontal pupils and eye placement give nearly 350-degree vision. They see well in low light but have limited depth perception and see some colors (blue and green) but not red. They also take longer to adjust between light and dark, which is why they may hesitate entering dark barns."},
{q:"What is the 'coffin bone' and why is it critical to hoof health?",o:["A bone shaped like a coffin","The main bone inside the hoof (P3/distal phalanx) that can rotate or sink in laminitis cases","A bone in the skull","The tailbone"],a:1,d:4,cat:"anatomy",fact:"The coffin bone (P3 or distal phalanx) is the main bone inside the hoof. It's suspended inside the hoof capsule by the laminae. In severe laminitis, the laminae fail and the coffin bone can rotate or sink within the hoof — a devastating condition called 'founder.' This is why laminitis is treated as a medical emergency."},
{q:"How does a horse's respiratory system adapt during exercise?",o:["It doesn't change","The horse links its breathing to its stride at canter/gallop — one breath per stride","Horses breathe faster but shallower","Horses hold their breath while galloping"],a:1,d:4,cat:"anatomy",fact:"At the canter and gallop, horses link their breathing to their stride in a 1:1 ratio — one breath per stride. This 'locomotor-respiratory coupling' occurs because the movement of the internal organs and ribcage during the stride mechanically assists breathing. This is why stride frequency essentially controls breathing rate at speed!"},
{q:"What is the significance of the horse's 'ergot' and 'chestnut'?",o:["They are decorative features","They are vestigial structures from the horse's multi-toed ancestor, corresponding to remnant toes/footpads","They are glands that produce scent","They are protective calluses from work"],a:1,d:4,cat:"anatomy",fact:"Both ergots (small hard growths behind the fetlock) and chestnuts (patches on the inside of the legs) are vestigial remnants of the horse's ancient multi-toed ancestors. Millions of years ago, horses had multiple toes. These structures correspond to remnants of the footpads and toes that were lost as horses evolved to run on a single toe."},
// History (10)
{q:"What is the significance of Eohippus (Hyracotherium) in horse evolution?",o:["It's the modern horse's ancestor","It's the earliest known ancestor of horses, about the size of a fox","It's a breed of horse","It's a type of horse disease"],a:1,d:4,cat:"history",fact:"Eohippus (now called Hyracotherium) lived about 55 million years ago and was the earliest known horse ancestor. It was only about 12 inches tall, had four toes on the front feet and three on the back, and lived in forests eating leaves. Over millions of years, horses evolved to be larger, faster, and single-toed."},
{q:"How many horses have won the American Triple Crown, and who was the most recent?",o:["13 horses; Justify (2018)","11 horses; American Pharoah (2015)","8 horses; Secretariat (1973)","15 horses; Justify (2018)"],a:0,d:4,cat:"history",fact:"Only 13 horses have won the American Triple Crown. Justify was the most recent in 2018, ending a 37-year drought after Affirmed won in 1978 before American Pharoah broke the drought in 2015. The feat is so rare because each race has different distances and the races are held only 5 weeks apart."},
{q:"What was the significance of the horse in the Mongol Empire under Genghis Khan?",o:["Horses were only used for food","Mongol horses enabled the creation of the largest contiguous land empire through cavalry warfare and communication","Horses were sacred and never ridden","They only used camels"],a:1,d:4,cat:"history",fact:"The Mongol horse was essential to Genghis Khan's empire. Each warrior had 3-5 horses, allowing them to travel vast distances quickly. They could ride up to 100 miles a day by switching mounts. The Mongol postal system (Yam) used relay horses to send messages across the entire empire at incredible speed."},
{q:"What role did the 'Cavalry' play in warfare and when did mounted combat become obsolete?",o:["Cavalry was never important","Cavalry dominated warfare for millennia but became obsolete with WWI's machine guns and trenches","Cavalry ended in the 1500s","Cavalry is still used today in combat"],a:1,d:4,cat:"history",fact:"Cavalry was a dominant military force for over 3,000 years. From ancient chariot warfare to medieval knights to Napoleon's dragoons, horses shaped military history. WWI's machine guns, barbed wire, and trenches made cavalry charges suicidal. The last major cavalry charge was by Polish lancers in WWII (1939). Today, horses are used only in ceremonial roles."},
{q:"What is the 'Darley Arabian' and why is it so important to horse breeding?",o:["A modern racing horse","One of three foundation sires; ancestor of about 95% of all modern Thoroughbreds through his descendant Eclipse","A breed of show horse","A famous war horse"],a:1,d:4,cat:"history",fact:"The Darley Arabian was purchased by Thomas Darley in Syria around 1704 and imported to England. His great-great-grandson Eclipse (born 1764) was undefeated in 18 races and became the most influential sire in Thoroughbred history. About 95% of all modern male-line Thoroughbreds trace to Eclipse!"},
{q:"What was the role of horses in the American Civil War?",o:["Horses weren't used","Approximately 1.5 million horses and mules served, with catastrophic casualties","Only generals rode horses","Horses were replaced by trains"],a:1,d:4,cat:"history",fact:"The Civil War was devastating for horses. Approximately 1.5 million horses and mules served both sides, and it's estimated that over 1 million died from combat, disease, exhaustion, and starvation. A cavalry horse's average lifespan in service was only about 6 months. Both sides struggled to replace horses as the war continued."},
{q:"What is the 'Przewalski's horse' and why is it genetically significant?",o:["A domesticated breed","The only truly wild horse species with a different chromosome number (66 vs 64) than domestic horses","A type of pony","An extinct horse"],a:1,d:4,cat:"history",fact:"Przewalski's horse (Equus ferus przewalskii) has 66 chromosomes compared to 64 in domestic horses. They have never been domesticated and represent a separate evolutionary lineage. They were extinct in the wild by 1969 but have been successfully reintroduced to Mongolia. They are stocky with a distinctive upright mane and dun coloring."},
{q:"What was the 'Great Horse' of medieval Europe and how did it evolve into modern breeds?",o:["A fairy tale horse","A large warhorse bred to carry armored knights, ancestor of modern draft breeds","The tallest horse ever","A horse statue"],a:1,d:4,cat:"history",fact:"The 'Great Horse' or destrier was bred progressively larger and stronger from the 11th to 16th centuries to carry knights in increasingly heavy armor (up to 300 lbs of armor!). When gunpowder made armor obsolete, these horses were crossed with lighter breeds for farming. They evolved into modern draft breeds like Shires, Clydesdales, and Percherons."},
{q:"What is the historical significance of the Lipizzaner stallions' rescue in WWII ('Operation Cowboy')?",o:["They were never at risk","US General Patton authorized a rescue mission to save them from capture by the Soviet Army in 1945","They were hidden in a cave","They fled on their own"],a:1,d:4,cat:"history",fact:"In April 1945, the Lipizzaner stallions of the Spanish Riding School were in danger from the advancing Soviet Army. Colonel Charles Reed, with General Patton's authorization, led 'Operation Cowboy' — US troops crossed into Czechoslovakia to rescue approximately 375 horses. This daring mission saved the breed from potential destruction. The film 'Miracle of the White Stallions' tells this story."},
{q:"How did the reintroduction of horses to the Americas by the Spanish transform Native American cultures?",o:["It had no effect","Horses revolutionized Plains Indian culture, transforming hunting, warfare, trade, and social structures within 200 years","Native Americans already had horses","Only one tribe used horses"],a:1,d:4,cat:"history",fact:"Before Spanish horses arrived in the 1500s, Plains tribes hunted buffalo on foot. Horses spread north through trade and escape, reaching the northern Plains by the early 1700s. Horses transformed everything: buffalo hunting became far more productive, tribes became more mobile, warfare changed, wealth was measured in horses, and entirely new cultural practices developed around horsemanship."},
// Fun Facts (5)
{q:"What is the most expensive horse ever sold?",o:["Secretariat for $6 million","Fusaichi Pegasus for approximately $70 million","Justify for $50 million","Frankel for $200 million"],a:1,d:4,cat:"fun-facts",fact:"Fusaichi Pegasus was sold for approximately $70 million after winning the 2000 Kentucky Derby. While stallion shares can make horses worth even more (the undefeated Frankel's stud career was valued over $200 million), Fusaichi Pegasus holds the record for single sale price. The horse racing industry involves enormous sums of money!"},
{q:"How do horses communicate emotions through their facial expressions?",o:["Horses don't have facial expressions","Horses have 17 facial movements (compared to 27 in humans and 16 in dogs)","Only through ear position","Only through eye movements"],a:1,d:4,cat:"fun-facts",fact:"Research from the University of Sussex identified 17 distinct facial movements in horses (called EquiFACS). This is more than dogs (16) and close to humans (27)! Horses use combinations of ear, eye, nostril, and lip movements to express emotions like fear, surprise, and happiness. Understanding these helps us better communicate with horses."},
{q:"What is unique about a horse's visual system that makes them sometimes spook at familiar objects?",o:["Horses have perfect vision","Each eye sends information mainly to the opposite brain hemisphere; what they see with one eye may not be fully recognized when seen from the other side","Horses are completely colorblind","Horses can see in the dark like cats"],a:1,d:4,cat:"fun-facts",fact:"Horses have limited ability to transfer visual information between brain hemispheres. A horse that sees a scary object with its right eye may spook at the same object when it appears on the left side because the left brain didn't fully process the earlier experience. This is why trainers desensitize horses from both sides!"},
{q:"What is 'equine-assisted therapy' and how does it work?",o:["Giving therapy to horses","Using horses as therapeutic partners to help humans with physical, emotional, or cognitive challenges","A horse massage technique","Horse veterinary medicine"],a:1,d:4,cat:"fun-facts",fact:"Equine-assisted therapy uses the horse's rhythmic movement, warmth, and intuitive nature to help people with disabilities, PTSD, anxiety, and other challenges. The horse's walking motion mimics the human pelvis movement, helping improve balance and muscle tone. Horses also respond to human emotions, providing powerful emotional feedback."},
{q:"What is the 'flehmen response' that horses sometimes show?",o:["A sneeze","Curling the upper lip to draw scents into the vomeronasal organ for analysis","A yawn","A sign of pain"],a:1,d:4,cat:"fun-facts",fact:"The flehmen response is when a horse curls its upper lip and extends its neck. This draws scent molecules into the vomeronasal (Jacobson's) organ in the roof of the mouth, which analyzes pheromones and unusual scents. Stallions do this most often when detecting mares in heat, but all horses do it when encountering interesting or unfamiliar smells!"},
{q:"What is 'Cushing's disease' (PPID) in horses and how does it affect them?",o:["A skin rash","A pituitary gland disorder causing a long curly coat, increased thirst, laminitis risk, and muscle wasting","A hoof crack","An eye condition"],a:1,d:4,cat:"care",fact:"Pituitary Pars Intermedia Dysfunction (PPID), commonly called Cushing's disease, is a hormonal disorder of the pituitary gland. It's most common in older horses (15+). Affected horses develop a long, curly coat that doesn't shed, drink excessively, lose muscle, and are at high risk for laminitis. It can be managed with the medication pergolide."},
{q:"What is 'heaves' (Recurrent Airway Obstruction) in horses?",o:["A type of colic","A chronic respiratory condition similar to asthma in humans, often triggered by dusty hay","A heart condition","A leg injury"],a:1,d:4,cat:"care",fact:"Heaves (RAO) is a chronic, allergic respiratory condition similar to human asthma. Horses develop coughing, nasal discharge, and labored breathing, often triggered by dust and mold in hay and bedding. Management includes soaking hay, improving ventilation, and maximizing turnout time."},
{q:"What is the biomechanical principle behind how a horse jumps?",o:["Pure leg strength","A coordinated sequence: approach, takeoff (pushing off hind legs), bascule (folding over the fence), and landing (absorbing impact through forelegs)","Wing-like movement","Bouncing off the ground"],a:1,d:4,cat:"riding",fact:"Jumping involves a precise biomechanical sequence: the horse assesses the fence during approach, rocks back onto powerful hindquarters for takeoff, creates a 'bascule' (arc) over the fence by rounding the back and tucking the forelegs, then absorbs 2-3 times its body weight through the forelegs on landing. The rider must stay in balance throughout!"},
{q:"What is 'navicular syndrome' and why is it a significant lameness concern?",o:["A navigation problem","A degenerative condition of the navicular bone and surrounding structures in the heel area of the hoof","A skin condition","A breathing disorder"],a:1,d:4,cat:"anatomy",fact:"Navicular syndrome involves degeneration of the navicular bone, bursa, and deep digital flexor tendon in the heel of the hoof. It's one of the most common causes of forelimb lameness. Signs include intermittent lameness, shortened stride, and landing toe-first. Management includes corrective shoeing, anti-inflammatories, and controlled exercise."},
{q:"What was the significance of horses in ancient chariot warfare?",o:["Chariots were not important","Chariot warfare (from ~2000 BC) was the first major military use of horses, revolutionizing warfare before mounted cavalry developed","Chariots were only for racing","Horses pulled chariots for fun"],a:1,d:4,cat:"history",fact:"Chariot warfare emerged around 2000 BC in the Near East and spread across civilizations from Egypt to China. Chariots, pulled by teams of horses, provided mobile platforms for archers and were devastating weapons. They required specialized horses, drivers, and warriors. Chariot technology was a closely guarded military secret and helped shape the rise and fall of ancient empires."},
{q:"What is 'proprioception' in horses and why is it important for riding?",o:["A type of saddle","The horse's awareness of its own body position and movement in space","A type of feed","A grooming technique"],a:1,d:4,cat:"riding",fact:"Proprioception is a horse's sense of where its body is in space — awareness of limb position, balance, and movement. It's crucial for athletic performance. Exercises like cavaletti work, hill training, and varied terrain improve proprioception. Horses with good proprioception are more surefooted, balanced, and less likely to stumble or injure themselves."},
{q:"What is the 'suspensory ligament' and why are injuries to it so serious?",o:["A ligament in the neck","A critical ligament in the lower leg that supports the fetlock; injuries can end a horse's athletic career","A ligament in the jaw","A ligament connecting the tail"],a:1,d:4,cat:"anatomy",fact:"The suspensory ligament runs down the back of the cannon bone and supports the fetlock joint. It's one of the most commonly injured structures in athletic horses, especially racehorses and sport horses. Suspensory injuries are notoriously slow to heal (6-12+ months) because ligaments have poor blood supply. Advanced treatments include shockwave therapy and stem cell therapy."},
{q:"How has the use of DNA and genetic testing transformed modern horse breeding?",o:["It hasn't changed anything","DNA testing identifies genetic diseases, verifies parentage, determines coat color, and guides breeding decisions to produce healthier horses","It's only used for coat color","It only determines breed"],a:1,d:4,cat:"breeds",fact:"Genetic testing has revolutionized horse breeding! Tests can identify carriers of over 50 genetic diseases (like HYPP, GBED, and LWOS), confirm parentage with 99.99% accuracy, predict coat colors, and even assess genetic potential for certain athletic traits. Responsible breeders use genetic testing to avoid producing foals with inherited diseases."},
{q:"What is the theory of 'learned helplessness' in horse training and why is it a welfare concern?",o:["A teaching method","When horses stop responding because they've learned that nothing they do changes their situation — a sign of poor training and compromised welfare","A type of behavior training","When horses learn to help themselves"],a:1,d:4,cat:"fun-facts",fact:"Learned helplessness occurs when a horse is subjected to conflicting, confusing, or inescapable pressure and gives up trying to respond. The horse appears 'calm' or 'obedient' but is actually shut down mentally. This is a serious welfare concern in the horse industry. Ethical training uses clear, consistent, reward-based methods that allow the horse to understand and respond willingly."},
{q:"What is 'cross-firing' in gaited horses and what causes it?",o:["Shooting from horseback","When a horse's hind legs move in a lateral gait while the front legs trot, indicating an incorrect gait","A type of jump","Running through fire"],a:1,d:4,cat:"riding",fact:"Cross-firing occurs when a gaited horse mixes gait patterns — typically trotting in front while pacing behind (or vice versa). It creates an uncomfortable, unbalanced movement. Causes include poor conformation, lack of training, fatigue, or incorrect saddle fit. Skilled trainers use specific exercises, correct collection, and proper conditioning to help horses maintain a clean, pure gait."}
];

function findVoice(names){
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].lang.startsWith('en')&&voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];

}
return null;
}

app.innerHTML=`
<div class="start-screen">
<div class="start-hero">&#x1F434;</div>
${hs>0?`<div class="start-high-score">&#x1F3C6; High Score: ${hs}</div>`:''}
${lastScore!==null?`<div class="start-last-score">Last game: ${lastScore} pts (Q${saved.qi}/${activeQ.length})</div>`:''}
<div class="start-badge-300">&#x1F3C7; 200 Questions</div>
<p>All about horses &mdash; breeds, care, riding, anatomy, history &amp; fun facts!</p>
<div class="notice">Points scale with difficulty. Streak bonus after 3 in a row!</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;">
<span class="badge badge-1">Easy +10</span>
<span class="badge badge-2">Medium +20</span>
<span class="badge badge-3">Hard +30</span>
<span class="badge badge-4">Expert +50</span>
</div>
<button class="start-btn" id="start-btn">Start New Game</button>
${resumeHTML}
<p style="margin-top:14px;font-size:15px;color:rgba(245,237,228,0.6)">Made with love for Lily &#x2764;&#xFE0F;</p>
<p style="margin-top:18px;font-size:14px;color:rgba(245,237,228,0.5)">Also try: <a href="mathtrivia.html">Grade 10 Math</a> | <a href="mathtrivia11.html">Grade 11 Math</a> | <a href="baseball.html">Baseball Trivia</a> | <a href="hockey.html">Hockey Trivia</a></p>
</div>`;
document.getElementById("start-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:saved?saved.highScore||0:0,byDiff:[0,0,0,0,0],started:true};
activeQ=Q.slice();for(var si=activeQ.length-1;si>0;si--){var sj=Math.floor(Math.random()*(si+1));var st=activeQ[si];activeQ[si]=activeQ[sj];activeQ[sj]=st;}
_gameStartTime=Date.now();
saveState();playMusic();playAmbient();announce("Let's get started! You've got this, Lily!");renderQ();
};
const rb=document.getElementById("resume-btn");
if(rb){rb.onclick=()=>{state=saved;state.answered=false;_gameStartTime=Date.now();playMusic();playAmbient();renderQ();};}
}

function renderQ(){
if(state.qi>=activeQ.length){renderEnd();return;}
if(state.qi===50)showBanner("Difficulty Up: Medium!","#e8c170","Moving to Medium difficulty! Let's trot ahead!");
if(state.qi===100)showBanner("Difficulty Up: Hard!","#f59e0b","Hard questions now! Time to canter!");
if(state.qi===150)showBanner("Difficulty Up: Expert!","#ef4444","Expert level! Full gallop ahead!");

const q=activeQ[state.qi];
const d=q.d;
readQuestion(q.q);
const progPct=Math.round((state.qi/activeQ.length)*100);
const progColors={1:'var(--green)',2:'#e8c170',3:'#f59e0b',4:'var(--accent)'};
const progColor=progColors[d]||'var(--accent)';
const streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
document.body.classList.toggle('streak-pulse',state.streak>=5);
app.innerHTML=`
<div class="${streakBarClass}" style="position:relative">
<span>Score: <strong>${state.score}</strong></span>
<span class="streak-fire">${state.streak>=3?"&#x1F525; ":""}Streak: ${state.streak}</span>
<span>Q ${state.qi+1}/${activeQ.length}</span>
<button class="sound-toggle" id="sound-toggle" title="Toggle sound">${_soundMuted?'&#x1F507;':'&#x1F50A;'}</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progPct}%;background:${progColor}"></div></div>
<div class="q-header">
<span class="q-number">Question ${state.qi+1}</span>
<span class="badge ${DIFF_CLASSES[d]}">${DIFF_LABELS[d]}</span>
<span class="category">${q.cat}</span>
</div>
<div class="question-text">${q.q}</div>
<div class="options" id="opts">
${q.o.map((o,i)=>`<button class="opt-btn" data-i="${i}">${o}</button>`).join("")}
</div>
<div id="feedback"></div>`;
document.getElementById('sound-toggle').onclick=function(){_soundMuted=!_soundMuted;this.textContent=_soundMuted?'\u{1F507}':'\u{1F50A}';if(_soundMuted){stopMusic();stopAmbient();speechSynthesis.cancel();}else{playMusic();playAmbient();}};
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{b.onclick=()=>handleAnswer(parseInt(b.dataset.i));});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
const q=activeQ[state.qi];
const correct=idx===q.a;
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{
b.disabled=true;
const i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
let pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');sb.offsetHeight;sb.classList.add('score-pop');}},50);
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreakSound();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrectChime();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrongBuzz();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

const fb=document.getElementById("feedback");
fb.innerHTML=`
<div class="feedback ${correct?"correct-fb":"wrong-fb"}">
<h3>${correct?"Correct!"+(state.streak>=3?" &#x1F525; Streak x"+state.streak+"!":""):"Wrong!"}</h3>
${!correct?`<p>The answer was: <strong>${q.o[q.a]}</strong></p>`:""}
${state.streak>=3&&correct?`<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>`:""}
<div class="fact-card"><span class="fact-emoji">&#x1F434;</span><span>${q.fact}</span></div>
</div>
<button class="next-btn" id="next-btn" ${_speaking?'disabled style="opacity:0.4"':''}>${state.qi+1>=activeQ.length?"See Results":"Next Question &#x2192;"}</button>`;
var nb=document.getElementById("next-btn");
nb.onclick=()=>{
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
setTimeout(function(){nb.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopMusic();stopAmbient();
const pct=Math.round(state.correct/activeQ.length*100);
const maxScore=50*10+50*20+50*30+50*50;
const totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
const totalMin=Math.floor(totalTimeSec/60);
const totalSec=totalTimeSec%60;
const timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
const avgTimeSec=activeQ.length>0?Math.round(totalTimeSec/activeQ.length*10)/10:0;
let grade='F',gradeColor='#ef4444';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='#e8c170';}
else if(pct>=60){grade='C';gradeColor='#f59e0b';}
const accBarColor=pct>=80?'var(--green)':pct>=60?'#e8c170':'#ef4444';
app.innerHTML=`
<div class="end-screen">
<h2>Great Ride!</h2>
<div class="final-score">${state.score}</div>
<p style="color:rgba(245,237,228,0.5)">out of ${maxScore} possible</p>
${state.score>=state.highScore?`<div class="high-label">New High Score!</div>`:`<div class="high-label" style="color:var(--gold)">High Score: ${state.highScore}</div>`}
<div class="grade-badge" style="background:${gradeColor};color:#000">${grade}</div>
<div style="text-align:left;margin:12px 0">
<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>${pct}%</span></div>
<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:${pct}%;background:${accBarColor}"></div></div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="val">${state.correct}</div><div class="lbl">Correct</div></div>
<div class="stat-card"><div class="val">${state.wrong}</div><div class="lbl">Wrong</div></div>
<div class="stat-card"><div class="val">${state.bestStreak}</div><div class="lbl">Best Streak</div></div>
<div class="stat-card"><div class="val">${timeStr}</div><div class="lbl">Total Time</div></div>
<div class="stat-card"><div class="val">${avgTimeSec}s</div><div class="lbl">Avg / Question</div></div>
<div class="stat-card"><div class="val">${grade}</div><div class="lbl">Grade</div></div>
<div class="stat-card"><div class="val">${state.byDiff[1]}/${50}</div><div class="lbl">Easy</div></div>
<div class="stat-card"><div class="val">${state.byDiff[2]}/${50}</div><div class="lbl">Medium</div></div>
<div class="stat-card"><div class="val">${state.byDiff[3]}/${50}</div><div class="lbl">Hard</div></div>
<div class="stat-card"><div class="val">${state.byDiff[4]}/${50}</div><div class="lbl">Expert</div></div>
</div>
<button class="share-btn" id="share-btn">&#x1F4CB; Share Score</button>
<button class="restart-btn" id="restart-btn">Play Again</button>
<p style="margin-top:18px;font-size:14px;color:rgba(245,237,228,0.5)">Also try: <a href="mathtrivia.html">Grade 10 Math</a> | <a href="mathtrivia11.html">Grade 11 Math</a> | <a href="baseball.html">Baseball Trivia</a> | <a href="hockey.html">Hockey Trivia</a></p>
</div>`;
document.getElementById("share-btn").onclick=function(){
var txt="&#x1F434; Lily's Horse Trivia\nScore: "+state.score+"/"+maxScore+" ("+pct+"%)\nGrade: "+grade+"\nBest Streak: "+state.bestStreak+"\nTime: "+timeStr+"\n#HorseTrivia";
navigator.clipboard.writeText(txt).then(function(){var b=document.getElementById('share-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='\u{1F4CB} Share Score';},2000);}).catch(function(){});
};
document.getElementById("restart-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true};
_gameStartTime=Date.now();
saveState();playMusic();playAmbient();renderQ();
};
}

// Init
renderStart();
</script>
</body>
</html>
