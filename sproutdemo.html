<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sprout Language Demo 🌱</title>
  <style>
    :root{--bg:#1e1f29;--bg2:#282a36;--bg3:#383a4a;--text:#f8f8f2;--dim:#6272a4;--accent:#bd93f9;--green:#50fa7b;--pink:#ff79c6;--yellow:#f1fa8c;--orange:#ffb86c;--red:#ff5555;--cyan:#8be9fd;--font:ui-monospace,"SF Mono","Cascadia Code","Fira Code",Consolas,monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
    body{display:flex;flex-direction:column}
    header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--bg3)}
    header h1{font-size:16px;color:var(--accent);letter-spacing:0.05em}
    header a{color:var(--dim);font-size:11px;text-decoration:none}
    header a:hover{color:var(--text)}
    .main{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto;overflow:hidden}
    .editor-pane{display:flex;flex-direction:column;border-right:1px solid var(--bg3);overflow:hidden}
    .output-pane{display:flex;flex-direction:column;overflow:hidden}
    .pane-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg2);font-size:11px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase;border-bottom:1px solid var(--bg3)}
    textarea{flex:1;background:var(--bg);color:var(--text);border:none;padding:12px;font-family:var(--font);font-size:13px;line-height:1.6;resize:none;outline:none;tab-size:2}
    #output{flex:1;background:#1a1b26;color:var(--green);padding:12px;font-family:var(--font);font-size:13px;line-height:1.6;overflow-y:auto;white-space:pre-wrap}
    .error{color:var(--red)}
    .toolbar{display:flex;gap:6px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--bg3);grid-column:1/-1;flex-wrap:wrap}
    .btn{background:var(--bg3);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:6px 14px;border-radius:6px;font-family:var(--font);font-size:11px;cursor:pointer}
    .btn:hover{border-color:var(--accent)}
    .btn.run{background:var(--green);color:#1a1b26;font-weight:700;border:none}
    .btn.run:hover{filter:brightness(1.1)}
    .examples{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
    .examples .btn{font-size:10px;padding:4px 10px;color:var(--cyan)}
    @media(max-width:600px){.main{grid-template-columns:1fr;grid-template-rows:1fr 1fr auto}}
  </style>
</head>
<body>
<header>
  <a href="index.html">← home</a>
  <span style="font-size:20px">🌱</span>
  <h1>Sprout Language Demo</h1>
  <span style="font-size:10px;color:var(--dim);margin-left:auto">MVP Runtime · JS Target</span>
</header>
<div class="main">
  <div class="editor-pane">
    <div class="pane-header"><span>Sprout Code (compiled form)</span></div>
    <textarea id="code" spellcheck="false">// Sprout compiled to JS — edit and run!
// Variables
bind(top, 'name', 'World');
bind(top, 'greeting', send('Hello, ', n('+')));
send(send(lookup(top, 'greeting'), lookup(top, 'name')), n('say'));

// Math
bind(top, 'x', 10);
bind(top, 'y', send(send(lookup(top, 'x'), n('*')), 3));
send(send(lookup(top, 'y'), n('+')), 2, n('say'));
send(lookup(top, 'y'), n('say'));

// Conditionals
send(send(send(lookup(top, 'if'),
  send(send(lookup(top, 'y'), n('>')), 20)),
  blk([], [(s) => send('y is greater than 20!', n('say'))], top)),
  blk([], [(s) => send('y is 20 or less', n('say'))], top));

// Lists
bind(top, 'fruits', lst(['apple', 'banana', 'cherry']));
send('--- Fruits ---', n('say'));
send(send(lookup(top, 'fruits'), n('each')),
  blk(['f'], [(s) => send(lookup(s, 'f'), n('say'))], top));

// Map: double numbers
bind(top, 'nums', lst([1, 2, 3, 4, 5]));
send('--- Doubled ---', n('say'));
const doubled = send(send(lookup(top, 'nums'), n('map')),
  blk(['n'], [(s) => send(send(lookup(s, 'n'), n('*')), 2)], top));
send(send(doubled, n('each')),
  blk(['v'], [(s) => send(lookup(s, 'v'), n('say'))], top));

// While loop: countdown
send('--- Countdown ---', n('say'));
bind(top, 'count', 5);
send(send(lookup(top, 'while'),
  blk([], [(s) => send(send(lookup(top, 'count'), n('>')), 0)], top)),
  blk([], [(s) => {
    send(lookup(top, 'count'), n('say'));
    return bind(top, 'count', send(send(lookup(top, 'count'), n('-')), 1));
  }], top));
send('Blast off! 🚀', n('say'));</textarea>
  </div>
  <div class="output-pane">
    <div class="pane-header"><span>Output</span><span id="time"></span></div>
    <div id="output">Click ▶ Run to execute Sprout code...</div>
  </div>
  <div class="toolbar">
    <button class="btn run" id="run-btn">▶ Run</button>
    <button class="btn" id="clear-btn">Clear</button>
    <div class="examples">
      <button class="btn" onclick="loadExample('hello')">Hello</button>
      <button class="btn" onclick="loadExample('math')">Math</button>
      <button class="btn" onclick="loadExample('loops')">Loops</button>
      <button class="btn" onclick="loadExample('lists')">Lists</button>
      <button class="btn" onclick="loadExample('blocks')">Blocks</button>
      <button class="btn" onclick="loadExample('cells')">Cells</button>
      <button class="btn" onclick="loadExample('fizzbuzz')">FizzBuzz</button>
      <button class="btn" onclick="loadExample('fibonacci')">Fibonacci</button>
    </div>
  </div>
</div>

<script>
// ═══ Sprout Runtime (embedded) ═══
class Cell {
  constructor() { this.fields = new Map(); }
}
class List extends Cell {
  constructor(items) { super(); this.items = items || []; }
  get size() { return this.items.length; }
}
class Block extends Cell {
  constructor({ params = [], body = null, closure = null, native = null, boundArgs = [] } = {}) {
    super();
    this.params = params;
    this.body = body;
    this.closure = closure;
    this.native = native;
    this.boundArgs = boundArgs;
  }
}
var CELL_MIXIN = new Map();

function scope(parent) {
  var s = new Cell();
  s.parent = parent || null;
  return s;
}
function bind(s, name, value) { s.fields.set(name, value); return value; }
function lookup(s, name) {
  var cur = s;
  while (cur) { if (cur.fields.has(name)) return cur.fields.get(name); cur = cur.parent; }
  if (CELL_MIXIN.has(name)) return CELL_MIXIN.get(name);
  throw new Error('unbound name: ' + name);
}

function send(receiver, message) {
  if (receiver instanceof Block && receiver.params.length > 0) return activateWithArg(receiver, message);
  if (message instanceof Block) return activateWithArg(message, receiver);
  if (typeof message === 'symbol') return resolveField(receiver, message.description);
  if (message instanceof Cell && !(message instanceof List)) {
    if (!(receiver instanceof Cell)) throw new Error('cannot merge cell into literal');
    for (var [k, v] of message.fields) receiver.fields.set(k, v);
    return receiver;
  }
  if (isLiteral(message)) {
    if (isLiteral(receiver)) return new List([receiver, message]);
    if (receiver instanceof List) { receiver.items.push(message); return receiver; }
    if (receiver instanceof Cell && receiver.fields.has('receive')) return send(receiver.fields.get('receive'), message);
    throw new Error('cell has no receive for literal: ' + describe(message));
  }
  if (message instanceof List) throw new Error('list cannot be sent as message; use each/map');
  throw new Error('cannot send ' + typeof message);
}

function activateWithArg(block, arg) {
  if (block.params.length === 0) {
    if (block.native) return block.native.apply(null, block.boundArgs);
    var s = scope(block.closure);
    if (arg instanceof Cell) s.parent = arg;
    return execBody(block.body, s);
  }
  if (block.params.length === 1) {
    if (block.native) return block.native.apply(null, block.boundArgs.concat([arg]));
    var s2 = scope(block.closure);
    s2.fields.set(block.params[0], arg);
    return execBody(block.body, s2);
  }
  if (block.native) {
    return new Block({ params: block.params.slice(1), native: block.native, boundArgs: block.boundArgs.concat([arg]) });
  }
  var inner = scope(block.closure);
  inner.fields.set(block.params[0], arg);
  return new Block({ params: block.params.slice(1), body: block.body, closure: inner });
}

function execBody(body, s) { var last; for (var i = 0; i < body.length; i++) last = body[i](s); return last; }
function force(v) { if (v instanceof Block && v.params.length === 0) return activateWithArg(v, null); return v; }

function resolveField(receiver, name) {
  if (typeof receiver === 'number') return liftNative(NUM_PROTO, receiver, name);
  if (typeof receiver === 'string') return liftNative(STR_PROTO, receiver, name);
  if (typeof receiver === 'boolean') return liftNative(BOOL_PROTO, receiver, name);
  if (receiver instanceof Cell) {
    var v = receiver.fields.has(name) ? receiver.fields.get(name) : CELL_MIXIN.has(name) ? CELL_MIXIN.get(name) : undefined;
    if (v === undefined) throw new Error("no field '" + name + "' on " + describe(receiver));
    if (v instanceof Block) return activateWithArg(v, receiver);
    return v;
  }
  throw new Error("no field '" + name + "' on " + describe(receiver));
}

function liftNative(proto, recv, name) {
  var entry = proto[name];
  if (!entry) throw new Error("no '" + name + "' on " + typeof recv);
  if (entry.arity === 0) return entry.fn(recv);
  return new Block({ params: Array.from({ length: entry.arity }, function(_, i) { return '$' + i; }), native: function() { return entry.fn.apply(null, [recv].concat(Array.from(arguments))); }, boundArgs: [] });
}

function isLiteral(v) { var t = typeof v; return t === 'number' || t === 'string' || t === 'boolean'; }
function describe(v) {
  if (v === null || v === undefined) return String(v);
  if (isLiteral(v)) return JSON.stringify(v);
  if (v instanceof List) return 'list(' + v.items.length + ')';
  if (v instanceof Block) return 'block/' + v.params.length;
  if (v instanceof Cell) return 'cell';
  return typeof v;
}
function stringify(v) {
  if (isLiteral(v)) return String(v);
  if (v instanceof List) return '[' + v.items.map(stringify).join(', ') + ']';
  return describe(v);
}

// Redirect say to output panel
var outputEl = document.getElementById('output');
var outputLines = [];

var NUM_PROTO = {
  '+': { arity: 1, fn: function(a, b) { return a + b; } },
  '-': { arity: 1, fn: function(a, b) { return a - b; } },
  '*': { arity: 1, fn: function(a, b) { return a * b; } },
  '/': { arity: 1, fn: function(a, b) { return a / b; } },
  '%': { arity: 1, fn: function(a, b) { return a % b; } },
  '=': { arity: 1, fn: function(a, b) { return a === b; } },
  '<': { arity: 1, fn: function(a, b) { return a < b; } },
  '>': { arity: 1, fn: function(a, b) { return a > b; } },
  say: { arity: 0, fn: function(a) { outputLines.push(String(a)); return a; } },
};
var STR_PROTO = {
  '+': { arity: 1, fn: function(a, b) { return a + (typeof b === 'string' ? b : stringify(b)); } },
  '=': { arity: 1, fn: function(a, b) { return a === b; } },
  length: { arity: 0, fn: function(a) { return a.length; } },
  say: { arity: 0, fn: function(a) { outputLines.push(a); return a; } },
};
var BOOL_PROTO = {
  '=': { arity: 1, fn: function(a, b) { return a === b; } },
  say: { arity: 0, fn: function(a) { outputLines.push(String(a)); return a; } },
};

function truthy(v) { return v !== false && v != null && v !== 0 && v !== ''; }
function n(name) { return Symbol.for(name); }
function blk(params, body, closure) { return new Block({ params: params, body: body, closure: closure }); }
function lst(items) { return new List(items); }

CELL_MIXIN.set('true', true);
CELL_MIXIN.set('false', false);
CELL_MIXIN.set('if', new Block({ params: ['$test', '$then', '$else'], native: function(t, a, b) { return truthy(t) ? force(a) : force(b); } }));
CELL_MIXIN.set('while', new Block({ params: ['$cond', '$body'], native: function(cb, bb) { var last; var iters = 0; while (truthy(force(cb)) && iters < 10000) { last = force(bb); iters++; } return last; } }));
CELL_MIXIN.set('until', new Block({ params: ['$cond', '$body'], native: function(cb, bb) { var last; var iters = 0; while (!truthy(force(cb)) && iters < 10000) { last = force(bb); iters++; } return last; } }));
CELL_MIXIN.set('map', new Block({ params: ['$list', '$fn'], native: function(list, fn) { if (!(list instanceof List)) throw new Error('map expects list'); var out = []; for (var i = 0; i < list.items.length; i++) out.push(send(fn, list.items[i])); return new List(out); } }));
CELL_MIXIN.set('each', new Block({ params: ['$list', '$fn'], native: function(list, fn) { if (!(list instanceof List)) throw new Error('each expects list'); for (var i = 0; i < list.items.length; i++) send(fn, list.items[i]); return list; } }));
CELL_MIXIN.set('say', new Block({ params: ['self'], native: function(self) { outputLines.push(stringify(self)); return self; } }));
CELL_MIXIN.set('range', new Block({ params: ['$start', '$end'], native: function(start, end) { var items = []; for (var i = start; i < end; i++) items.push(i); return new List(items); } }));

// ═══ Examples ═══
var EXAMPLES = {
  hello: '// Hello World in Sprout\nbind(top, \'name\', \'Sprout\');\nsend(send(\'Hello, \', n(\'+\')), lookup(top, \'name\'));\nsend(send(\'Hello, \', n(\'+\')), lookup(top, \'name\'), n(\'say\'));\n\n// Actually let\'s do it right:\nbind(top, \'msg\', send(send(\'Hello, \', n(\'+\')), \'Sprout!\'));\nsend(lookup(top, \'msg\'), n(\'say\'));',

  math: '// Math operations\nbind(top, \'a\', 42);\nbind(top, \'b\', 13);\n\nsend(\'Addition:\', n(\'say\'));\nsend(send(send(lookup(top, \'a\'), n(\'+\')), lookup(top, \'b\')), n(\'say\'));\n\nsend(\'Multiplication:\', n(\'say\'));\nsend(send(send(lookup(top, \'a\'), n(\'*\')), lookup(top, \'b\')), n(\'say\'));\n\nsend(\'Division:\', n(\'say\'));\nsend(send(send(lookup(top, \'a\'), n(\'/\')), lookup(top, \'b\')), n(\'say\'));\n\nsend(\'Is 42 > 13?\', n(\'say\'));\nsend(send(send(lookup(top, \'a\'), n(\'>\')), lookup(top, \'b\')), n(\'say\'));',

  loops: '// While loop: print 1 to 10\nsend(\'Counting to 10:\', n(\'say\'));\nbind(top, \'i\', 1);\nsend(send(lookup(top, \'while\'),\n  blk([], [(s) => send(send(lookup(top, \'i\'), n(\'<\')), 11)], top)),\n  blk([], [(s) => {\n    send(lookup(top, \'i\'), n(\'say\'));\n    return bind(top, \'i\', send(send(lookup(top, \'i\'), n(\'+\')), 1));\n  }], top));\n\nsend(\'Done!\', n(\'say\'));',

  lists: '// List operations\nbind(top, \'colors\', lst([\'red\', \'green\', \'blue\', \'yellow\']));\n\nsend(\'Colors:\', n(\'say\'));\nsend(send(lookup(top, \'colors\'), n(\'each\')),\n  blk([\'c\'], [(s) => send(send(\'  -> \', n(\'+\')), lookup(s, \'c\'))], top));\n\nsend(\'\\nDoubled numbers:\', n(\'say\'));\nvar doubled = send(send(lst([1,2,3,4,5]), n(\'map\')),\n  blk([\'x\'], [(s) => send(send(lookup(s, \'x\'), n(\'*\')), 2)], top));\nsend(send(doubled, n(\'each\')),\n  blk([\'v\'], [(s) => send(lookup(s, \'v\'), n(\'say\'))], top));',

  blocks: '// Blocks (lambdas) and currying\n// A block that adds two numbers\nbind(top, \'add\', blk([\'a\', \'b\'], [\n  (s) => send(send(lookup(s, \'a\'), n(\'+\')), lookup(s, \'b\'))\n], top));\n\n// Full application\nsend(\'3 + 4 =\', n(\'say\'));\nsend(send(send(lookup(top, \'add\'), 3), 4), n(\'say\'));\n\n// Partial application (currying!)\nbind(top, \'add5\', send(lookup(top, \'add\'), 5));\nsend(\'5 + 10 =\', n(\'say\'));\nsend(send(lookup(top, \'add5\'), 10), n(\'say\'));\nsend(\'5 + 20 =\', n(\'say\'));\nsend(send(lookup(top, \'add5\'), 20), n(\'say\'));',

  cells: '// Cells (objects with fields)\nbind(top, \'dog\', new Cell());\nbind(lookup(top, \'dog\'), \'name\', \'Rex\');\nbind(lookup(top, \'dog\'), \'age\', 5);\nbind(lookup(top, \'dog\'), \'speak\', blk([], [(s) => send(\'Woof! My name is Rex\', n(\'say\'))], top));\n\nsend(\'Dog name:\', n(\'say\'));\nsend(resolveField(lookup(top, \'dog\'), \'name\'), n(\'say\'));\nsend(\'Dog age:\', n(\'say\'));\nsend(resolveField(lookup(top, \'dog\'), \'age\'), n(\'say\'));\nresolveField(lookup(top, \'dog\'), \'speak\');',

  fizzbuzz: '// FizzBuzz in Sprout!\nsend(\'=== FizzBuzz ===\', n(\'say\'));\nbind(top, \'i\', 1);\nsend(send(lookup(top, \'while\'),\n  blk([], [(s) => send(send(lookup(top, \'i\'), n(\'<\')), 21)], top)),\n  blk([], [(s) => {\n    var i = lookup(top, \'i\');\n    var mod3 = send(send(i, n(\'%\')), 3) === 0;\n    var mod5 = send(send(i, n(\'%\')), 5) === 0;\n    if (mod3 && mod5) send(\'FizzBuzz\', n(\'say\'));\n    else if (mod3) send(\'Fizz\', n(\'say\'));\n    else if (mod5) send(\'Buzz\', n(\'say\'));\n    else send(i, n(\'say\'));\n    return bind(top, \'i\', send(send(i, n(\'+\')), 1));\n  }], top));',

  fibonacci: '// Fibonacci sequence\nsend(\'=== Fibonacci ===\', n(\'say\'));\nbind(top, \'a\', 0);\nbind(top, \'b\', 1);\nbind(top, \'count\', 0);\nsend(send(lookup(top, \'while\'),\n  blk([], [(s) => send(send(lookup(top, \'count\'), n(\'<\')), 15)], top)),\n  blk([], [(s) => {\n    send(lookup(top, \'a\'), n(\'say\'));\n    var next = send(send(lookup(top, \'a\'), n(\'+\')), lookup(top, \'b\'));\n    bind(top, \'a\', lookup(top, \'b\'));\n    bind(top, \'b\', next);\n    return bind(top, \'count\', send(send(lookup(top, \'count\'), n(\'+\')), 1));\n  }], top));\nsend(\'...and so on!\', n(\'say\'));',
};

function loadExample(name) {
  document.getElementById('code').value = EXAMPLES[name];
}

// ═══ Run ═══
document.getElementById('run-btn').addEventListener('click', function() {
  var code = document.getElementById('code').value;
  outputLines = [];
  outputEl.innerHTML = '';
  var top = scope(null);
  var start = performance.now();
  try {
    eval(code);
    var elapsed = (performance.now() - start).toFixed(1);
    document.getElementById('time').textContent = elapsed + 'ms';
    outputEl.innerHTML = outputLines.map(function(line) {
      return '<div>' + line.replace(/</g, '&lt;') + '</div>';
    }).join('');
    if (outputLines.length === 0) outputEl.innerHTML = '<div style="color:var(--dim)">(no output — use .say to print)</div>';
  } catch(e) {
    outputEl.innerHTML = '<div class="error">Error: ' + e.message.replace(/</g, '&lt;') + '</div>';
    document.getElementById('time').textContent = '';
  }
});

document.getElementById('clear-btn').addEventListener('click', function() {
  outputEl.innerHTML = '';
  document.getElementById('time').textContent = '';
});

// Ctrl+Enter to run
document.getElementById('code').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('run-btn').click();
  }
  // Tab inserts 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    var start = this.selectionStart;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(this.selectionEnd);
    this.selectionStart = this.selectionEnd = start + 2;
  }
});
</script>
</body>
</html>
