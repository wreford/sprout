<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Extreme Tic Tac Toe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f10;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden;user-select:none}
h1{font-size:1.4rem;margin:12px 0 4px;letter-spacing:1px;color:#fff}
.subtitle{font-size:.75rem;color:#888;margin-bottom:8px}
/* Mode selector */
.modes{display:flex;gap:6px;margin-bottom:8px}
.modes button{background:#1a1a2e;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
.modes button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.modes button:hover{border-color:#555}
/* Lobby */
#lobby{display:none;flex-direction:column;align-items:center;gap:10px;margin:10px 0}
#lobby button{background:#3b82f6;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:1rem;cursor:pointer}
#lobby button:hover{background:#2563eb}
#lobby input{background:#1a1a2e;border:1px solid #444;color:#fff;padding:10px 16px;border-radius:8px;font-size:1.2rem;text-align:center;width:160px;letter-spacing:4px;text-transform:uppercase}
.room-code{font-size:2rem;letter-spacing:6px;color:#3b82f6;font-weight:bold;margin:6px 0}
.room-status{font-size:.8rem;color:#888}
/* AI select */
#aiSelect{display:none;gap:6px;margin-bottom:8px}
#aiSelect button{background:#1a1a2e;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:.2s}
#aiSelect button.active{background:#ec4899;color:#fff;border-color:#ec4899}
/* Board */
#boardWrap{position:relative;margin:4px 0}
#board{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;max-width:360px;width:90vw;aspect-ratio:1}
.mini-board{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#2a2a3a;border:2px solid #333;border-radius:4px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.mini-board.active-board{border-color:#22c55e;box-shadow:0 0 10px rgba(34,197,94,.4)}
.mini-board.won-x{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4)}
.mini-board.won-o{background:rgba(236,72,153,.15);border-color:rgba(236,72,153,.4)}
.mini-board.drawn{background:rgba(100,100,100,.1);border-color:#444}
.cell{background:#161622;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.5vw,18px);font-weight:bold;cursor:pointer;aspect-ratio:1;transition:background .15s;min-width:0;min-height:0;position:relative}
.cell:hover{background:#1e1e32}
.cell.x{color:#3b82f6}
.cell.o{color:#ec4899}
.cell.pop{animation:pop .25s ease-out}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.cell.shake{animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
/* Won overlay */
.mini-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,8vw,48px);font-weight:900;pointer-events:none;z-index:2;animation:fadeIn .4s ease}
.mini-overlay.x-win{color:rgba(59,130,246,.7)}
.mini-overlay.o-win{color:rgba(236,72,153,.7)}
@keyframes fadeIn{from{opacity:0;transform:scale(1.5)}to{opacity:1;transform:scale(1)}}
.mini-board.won-x .cell,.mini-board.won-o .cell,.mini-board.drawn .cell{pointer-events:none;opacity:.3}
/* Win line */
#winLine{position:absolute;pointer-events:none;z-index:10}
#winLine line{stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 8px currentColor);animation:glowPulse 1.5s infinite alternate}
@keyframes glowPulse{from{filter:drop-shadow(0 0 8px currentColor)}to{filter:drop-shadow(0 0 16px currentColor)}}
/* Status */
.status{font-size:1rem;margin:8px 0;min-height:1.4em;text-align:center}
.status .x-color{color:#3b82f6}
.status .o-color{color:#ec4899}
/* Buttons row */
.btns{display:flex;gap:8px;margin:8px 0}
.btns button{background:#1a1a2e;border:1px solid #333;color:#ccc;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:.8rem}
.btns button:hover{border-color:#3b82f6;color:#fff}
/* Record */
.record{font-size:.7rem;color:#666;margin:4px 0}
/* Confetti canvas */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:100}
/* History */
#history{display:none;max-height:100px;overflow-y:auto;font-size:.65rem;color:#666;margin:4px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>
<h1>EXTREME TIC TAC TOE</h1>
<div class="subtitle">Ultimate Tic Tac Toe &bull; 9 boards within a board</div>

<div class="modes">
  <button id="mLocal" class="active" onclick="setMode('local')">Local</button>
  <button id="mOnline" onclick="setMode('online')">Online</button>
  <button id="mAI" onclick="setMode('ai')">vs AI</button>
</div>

<div id="aiSelect">
  <button id="aiEasy" class="active" onclick="setAI('easy')">Easy</button>
  <button id="aiHard" onclick="setAI('hard')">Hard</button>
</div>

<div id="lobby">
  <button id="btnHost" onclick="hostGame()">Host Game</button>
  <div style="display:flex;gap:6px;align-items:center">
    <input id="codeInput" maxlength="4" placeholder="CODE">
    <button onclick="joinGame()">Join</button>
  </div>
  <div class="room-code" id="roomCode"></div>
  <div class="room-status" id="roomStatus"></div>
</div>

<div id="boardWrap">
  <div id="board"></div>
  <svg id="winLine" width="100%" height="100%"></svg>
</div>

<div class="status" id="status">X's turn</div>

<div class="btns">
  <button onclick="rematch()">Rematch</button>
  <button onclick="toggleHistory()">History</button>
  <button id="muteBtn" onclick="toggleMute()">🔊</button>
</div>

<div class="record" id="record"></div>
<div id="history"></div>

<canvas id="confetti"></canvas>

<script>
// === PubNub ===
var PUB="demo", SUB="demo";
var pubnub=null, channel="", myRole="", opponentJoined=false;

// === State ===
var board=[], bigBoard=[], turn="X", gameOver=false, mode="local", aiDiff="easy";
var forcedBoard=-1, moveHist=[], muted=false;
var record={x:0,o:0,d:0};

// Narration
var narrations=["X marks the spot.","O responds.","That mini-board is won.","Strategic placement.",
  "The grid within the grid.","Forced into the corner. Interesting.","A bold move.",
  "The big board is heating up.","Three in a row on the small board.","That changes everything.",
  "The game within the game.","Checkmate. Wait, wrong game.","An unexpected play.",
  "The tension is palpable.","And the winner is decided."];
var lastNarr=0, narrIdx=0;

// Load record
try{var r=JSON.parse(localStorage.getItem("xttt-record"));if(r)record=r}catch(e){}

// === Init ===
function init(){
  board=[];bigBoard=Array(9).fill(null);turn="X";gameOver=false;forcedBoard=-1;moveHist=[];
  for(var i=0;i<9;i++){board[i]=Array(9).fill(null)}
  renderBoard();updateStatus();updateRecord();
  var wl=document.getElementById("winLine");wl.innerHTML="";
}

function renderBoard(){
  var el=document.getElementById("board");el.innerHTML="";
  for(var bi=0;bi<9;bi++){
    var mb=document.createElement("div");
    mb.className="mini-board";mb.dataset.bi=bi;
    if(bigBoard[bi]==="X")mb.classList.add("won-x");
    else if(bigBoard[bi]==="O")mb.classList.add("won-o");
    else if(bigBoard[bi]==="D")mb.classList.add("drawn");
    if(!gameOver&&forcedBoard===-1&&!bigBoard[bi])mb.classList.add("active-board");
    if(!gameOver&&forcedBoard===bi&&!bigBoard[bi])mb.classList.add("active-board");
    for(var ci=0;ci<9;ci++){
      var c=document.createElement("div");
      c.className="cell";c.dataset.bi=bi;c.dataset.ci=ci;
      if(board[bi][ci]){c.textContent=board[bi][ci];c.classList.add(board[bi][ci].toLowerCase())}
      c.addEventListener("click",onCellClick);
      mb.appendChild(c);
    }
    if(bigBoard[bi]==="X"||bigBoard[bi]==="O"){
      var ov=document.createElement("div");
      ov.className="mini-overlay "+(bigBoard[bi]==="X"?"x-win":"o-win");
      ov.textContent=bigBoard[bi];mb.appendChild(ov);
    }
    el.appendChild(mb);
  }
}

function updateHighlights(){
  var mbs=document.querySelectorAll(".mini-board");
  mbs.forEach(function(mb){
    var bi=parseInt(mb.dataset.bi);
    mb.classList.remove("active-board");
    if(!gameOver&&!bigBoard[bi]){
      if(forcedBoard===-1||forcedBoard===bi)mb.classList.add("active-board");
    }
  });
}

// === Click ===
function onCellClick(e){
  var bi=parseInt(e.target.dataset.bi), ci=parseInt(e.target.dataset.ci);
  if(mode==="online"){
    if(gameOver)return;
    if((myRole==="host"&&turn!=="X")||(myRole==="guest"&&turn!=="O"))return;
    if(!isValidMove(bi,ci)){shakeCell(e.target);playBuzz();return}
    makeMove(bi,ci,turn);
    publishMove(bi,ci,turn);
    return;
  }
  if(mode==="ai"&&turn==="O")return;
  if(gameOver)return;
  if(!isValidMove(bi,ci)){shakeCell(e.target);playBuzz();return}
  makeMove(bi,ci,turn);
  if(mode==="ai"&&!gameOver)setTimeout(aiMove,300);
}

function isValidMove(bi,ci){
  if(gameOver)return false;
  if(board[bi][ci])return false;
  if(bigBoard[bi])return false;
  if(forcedBoard!==-1&&forcedBoard!==bi)return false;
  return true;
}

function makeMove(bi,ci,player){
  board[bi][ci]=player;
  moveHist.push({bi:bi,ci:ci,p:player});
  // Animate
  var cell=document.querySelector('.cell[data-bi="'+bi+'"][data-ci="'+ci+'"]');
  if(cell){cell.textContent=player;cell.classList.add(player.toLowerCase());cell.classList.add("pop")}
  playClick();
  // Check mini-board
  var mw=checkWin(board[bi]);
  if(mw){
    bigBoard[bi]=mw;
    var mb=document.querySelector('.mini-board[data-bi="'+bi+'"]');
    if(mw==="X")mb.classList.add("won-x");
    else mb.classList.add("won-o");
    // Overlay
    var ov=document.createElement("div");
    ov.className="mini-overlay "+(mw==="X"?"x-win":"o-win");
    ov.textContent=mw;mb.appendChild(ov);
    // Dim cells
    mb.querySelectorAll(".cell").forEach(function(c){c.style.opacity=".3";c.style.pointerEvents="none"});
    playChime();maybeNarrate(2);
  } else if(isFull(board[bi])){
    bigBoard[bi]="D";
    var mb2=document.querySelector('.mini-board[data-bi="'+bi+'"]');
    mb2.classList.add("drawn");
    mb2.querySelectorAll(".cell").forEach(function(c){c.style.opacity=".3";c.style.pointerEvents="none"});
  } else {
    maybeNarrate(turn==="X"?0:1);
  }
  // Check big board
  var bw=checkBigWin();
  if(bw){
    gameOver=true;
    if(bw==="X"){record.x++;playFanfare();showConfetti();drawWinLine(bw)}
    else if(bw==="O"){record.o++;playFanfare();showConfetti();drawWinLine(bw)}
    else{record.d++}
    saveRecord();updateStatus();updateRecord();
    return;
  }
  // Check big draw
  if(bigBoard.every(function(v){return v!==null})){
    gameOver=true;record.d++;saveRecord();updateStatus();updateRecord();return;
  }
  // Set forced board
  if(!bigBoard[ci])forcedBoard=ci;
  else forcedBoard=-1;
  // Switch turn
  turn=turn==="X"?"O":"X";
  updateHighlights();updateStatus();updateHistory();
  if(mode==="online"&&((myRole==="host"&&turn!=="X")||(myRole==="guest"&&turn!=="O"))){
    playPing();
  }
}

// === Win checking ===
var lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function checkWin(b){
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(b[l[0]]&&b[l[0]]===b[l[1]]&&b[l[1]]===b[l[2]])return b[l[0]];
  }
  return null;
}
function isFull(b){return b.every(function(v){return v!==null})}

function checkBigWin(){
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(bigBoard[l[0]]&&bigBoard[l[0]]!=="D"&&bigBoard[l[0]]===bigBoard[l[1]]&&bigBoard[l[1]]===bigBoard[l[2]])return bigBoard[l[0]];
  }
  return null;
}

var winLineIndices=null;
function drawWinLine(winner){
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(bigBoard[l[0]]&&bigBoard[l[0]]!=="D"&&bigBoard[l[0]]===bigBoard[l[1]]&&bigBoard[l[1]]===bigBoard[l[2]]&&bigBoard[l[0]]===winner){
      winLineIndices=l;break;
    }
  }
  if(!winLineIndices)return;
  var boardEl=document.getElementById("board");
  var bRect=boardEl.getBoundingClientRect();
  var mbs=document.querySelectorAll(".mini-board");
  var svg=document.getElementById("winLine");
  svg.style.width=bRect.width+"px";svg.style.height=bRect.height+"px";
  svg.style.position="absolute";svg.style.top="0";svg.style.left="0";
  var pts=winLineIndices.map(function(idx){
    var r=mbs[idx].getBoundingClientRect();
    return{x:r.left-bRect.left+r.width/2,y:r.top-bRect.top+r.height/2};
  });
  var color=winner==="X"?"#3b82f6":"#ec4899";
  svg.innerHTML='<line x1="'+pts[0].x+'" y1="'+pts[0].y+'" x2="'+pts[2].x+'" y2="'+pts[2].y+'" stroke="'+color+'" />';
}

// === Status ===
function updateStatus(){
  var el=document.getElementById("status");
  if(gameOver){
    var bw=checkBigWin();
    if(bw){
      var cls=bw==="X"?"x-color":"o-color";
      if(mode==="online"){
        var iWon=(myRole==="host"&&bw==="X")||(myRole==="guest"&&bw==="O");
        el.innerHTML=iWon?'<span class="'+cls+'">You win!</span>':'<span class="'+cls+'">You lose!</span>';
      } else {
        el.innerHTML='<span class="'+cls+'">'+bw+' wins!</span>';
      }
    } else {
      el.innerHTML="Draw!";
    }
    return;
  }
  if(mode==="online"){
    var myTurn=(myRole==="host"&&turn==="X")||(myRole==="guest"&&turn==="O");
    el.innerHTML=myTurn?'Your turn (<span class="'+(turn==="X"?"x-color":"o-color")+'">'+turn+'</span>)':'Waiting for opponent...';
  } else {
    var cls2=turn==="X"?"x-color":"o-color";
    el.innerHTML='<span class="'+cls2+'">'+turn+"'s turn</span>";
  }
}

function updateRecord(){
  document.getElementById("record").textContent="X wins: "+record.x+" | O wins: "+record.o+" | Draws: "+record.d;
}
function saveRecord(){try{localStorage.setItem("xttt-record",JSON.stringify(record))}catch(e){}}

function updateHistory(){
  var el=document.getElementById("history");
  el.innerHTML=moveHist.map(function(m,i){
    return(i+1)+". "+m.p+" → B"+m.bi+"C"+m.ci;
  }).join(" &bull; ");
}
function toggleHistory(){
  var el=document.getElementById("history");
  el.style.display=el.style.display==="block"?"none":"block";
}

// === Shake ===
function shakeCell(c){c.classList.add("shake");setTimeout(function(){c.classList.remove("shake")},300)}

// === Modes ===
function setMode(m){
  mode=m;
  document.querySelectorAll(".modes button").forEach(function(b){b.classList.remove("active")});
  document.getElementById("m"+m.charAt(0).toUpperCase()+m.slice(1)).classList.add("active");
  document.getElementById("lobby").style.display=m==="online"?"flex":"none";
  document.getElementById("aiSelect").style.display=m==="ai"?"flex":"none";
  if(pubnub){try{pubnub.unsubscribeAll()}catch(e){}}
  pubnub=null;opponentJoined=false;
  document.getElementById("roomCode").textContent="";
  document.getElementById("roomStatus").textContent="";
  init();
}
function setAI(d){
  aiDiff=d;
  document.querySelectorAll("#aiSelect button").forEach(function(b){b.classList.remove("active")});
  document.getElementById("ai"+d.charAt(0).toUpperCase()+d.slice(1)).classList.add("active");
  init();
}

// === Rematch ===
function rematch(){
  winLineIndices=null;init();
  if(mode==="online"&&pubnub){
    pubnub.publish({channel:channel,message:{type:"rematch"}});
  }
  if(mode==="ai"&&turn==="O")setTimeout(aiMove,300);
}

// === PubNub Online ===
function loadPubNub(cb){
  if(window.PubNub)return cb();
  var s=document.createElement("script");
  s.src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js";
  s.onload=cb;document.head.appendChild(s);
}

function genCode(){
  var chars="ABCDEFGHJKLMNPQRSTUVWXYZ";
  var c="";for(var i=0;i<4;i++)c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function hostGame(){
  loadPubNub(function(){
    var code=genCode();
    channel="xtictactoe-"+code;myRole="host";
    document.getElementById("roomCode").textContent=code;
    document.getElementById("roomStatus").textContent="Waiting for opponent...";
    pubnub=new PubNub({publishKey:PUB,subscribeKey:SUB,uuid:"host-"+Date.now()});
    pubnub.subscribe({channels:[channel]});
    pubnub.addListener({message:function(msg){onMessage(msg.message)}});
    init();
  });
}

function joinGame(){
  var code=document.getElementById("codeInput").value.toUpperCase().trim();
  if(code.length!==4)return;
  loadPubNub(function(){
    channel="xtictactoe-"+code;myRole="guest";
    document.getElementById("roomCode").textContent=code;
    document.getElementById("roomStatus").textContent="Joining...";
    pubnub=new PubNub({publishKey:PUB,subscribeKey:SUB,uuid:"guest-"+Date.now()});
    pubnub.subscribe({channels:[channel]});
    pubnub.addListener({message:function(msg){onMessage(msg.message)}});
    // Announce join
    pubnub.publish({channel:channel,message:{type:"join"}});
    opponentJoined=true;
    document.getElementById("roomStatus").textContent="Connected! You are O.";
    init();
  });
}

function publishMove(bi,ci,player){
  if(!pubnub)return;
  pubnub.publish({channel:channel,message:{type:"move",bi:bi,ci:ci,player:player}});
}

function onMessage(msg){
  if(msg.type==="join"&&myRole==="host"){
    opponentJoined=true;
    document.getElementById("roomStatus").textContent="Opponent joined! You are X.";
    // Send current state
    pubnub.publish({channel:channel,message:{type:"sync",board:board,bigBoard:bigBoard,turn:turn,forcedBoard:forcedBoard,moveHist:moveHist}});
  }
  if(msg.type==="sync"&&myRole==="guest"){
    board=msg.board;bigBoard=msg.bigBoard;turn=msg.turn;forcedBoard=msg.forcedBoard;moveHist=msg.moveHist||[];
    gameOver=false;renderBoard();updateHighlights();updateStatus();
  }
  if(msg.type==="move"){
    if(myRole==="host"&&msg.player==="O"){makeMove(msg.bi,msg.ci,msg.player)}
    if(myRole==="guest"&&msg.player==="X"){makeMove(msg.bi,msg.ci,msg.player)}
  }
  if(msg.type==="rematch"){
    winLineIndices=null;init();
  }
}

// === AI ===
function aiMove(){
  if(gameOver||turn!=="O")return;
  var move;
  if(aiDiff==="easy")move=aiEasy();
  else move=aiHard();
  if(move)makeMove(move.bi,move.ci,"O");
}

function getValidMoves(){
  var moves=[];
  for(var bi=0;bi<9;bi++){
    if(bigBoard[bi])continue;
    if(forcedBoard!==-1&&forcedBoard!==bi)continue;
    for(var ci=0;ci<9;ci++){
      if(!board[bi][ci])moves.push({bi:bi,ci:ci});
    }
  }
  return moves;
}

function aiEasy(){
  var moves=getValidMoves();
  if(!moves.length)return null;
  return moves[Math.floor(Math.random()*moves.length)];
}

function aiHard(){
  var moves=getValidMoves();
  if(!moves.length)return null;
  var bestScore=-Infinity, bestMove=moves[0];
  for(var i=0;i<moves.length;i++){
    var m=moves[i];
    var score=evalMove(m,4,false,-Infinity,Infinity);
    if(score>bestScore){bestScore=score;bestMove=m}
  }
  return bestMove;
}

function evalMove(move,depth,isMax,alpha,beta){
  // Simulate
  var oldBoard=board.map(function(b){return b.slice()});
  var oldBig=bigBoard.slice();
  var oldForced=forcedBoard;
  var player=isMax?"O":"X";
  // Apply
  board[move.bi][move.ci]=player;
  var mw=checkWin(board[move.bi]);
  if(mw)bigBoard[move.bi]=mw;
  else if(isFull(board[move.bi]))bigBoard[move.bi]="D";
  if(!bigBoard[move.ci])forcedBoard=move.ci;
  else forcedBoard=-1;
  var bw=checkBigWin();
  var score=0;
  if(bw==="O"){score=1000+depth}
  else if(bw==="X"){score=-1000-depth}
  else if(bigBoard.every(function(v){return v!==null})){score=0}
  else if(depth<=0){score=heuristic()}
  else{
    var moves=getValidMoves();
    if(!moves.length){score=0}
    else if(!isMax){
      // Next is O (maximizing)
      var best=-Infinity;
      for(var i=0;i<moves.length;i++){
        var s=evalMove(moves[i],depth-1,true,alpha,beta);
        if(s>best)best=s;
        if(best>alpha)alpha=best;
        if(beta<=alpha)break;
      }
      score=best;
    } else {
      // Next is X (minimizing)
      var worst=Infinity;
      for(var j=0;j<moves.length;j++){
        var s2=evalMove(moves[j],depth-1,false,alpha,beta);
        if(s2<worst)worst=s2;
        if(worst<beta)beta=worst;
        if(beta<=alpha)break;
      }
      score=worst;
    }
  }
  // Restore
  board=oldBoard;bigBoard=oldBig;forcedBoard=oldForced;
  return score;
}

function heuristic(){
  var score=0;
  // Count big board advantage
  for(var i=0;i<9;i++){
    if(bigBoard[i]==="O")score+=10;
    else if(bigBoard[i]==="X")score-=10;
  }
  // Check big board lines
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    var ox=0,oo=0;
    for(var j=0;j<3;j++){
      if(bigBoard[l[j]]==="X")ox++;
      else if(bigBoard[l[j]]==="O")oo++;
    }
    if(oo===2&&ox===0)score+=30;
    if(ox===2&&oo===0)score-=30;
  }
  // Center advantage
  if(bigBoard[4]==="O")score+=5;
  if(bigBoard[4]==="X")score-=5;
  return score;
}

// === Sound ===
var actx;
function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}

function playTone(freq,dur,vol,type){
  if(muted)return;
  try{
    var a=getACtx(),o=a.createOscillator(),g=a.createGain();
    o.type=type||"sine";o.frequency.value=freq;
    g.gain.value=Math.min(vol||0.02,0.02);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur);
  }catch(e){}
}
function playClick(){playTone(400,0.04,0.02)}
function playBuzz(){playTone(150,0.15,0.02)}
function playPing(){playTone(800,0.08,0.015)}
function playChime(){
  playTone(523,0.12,0.02);
  setTimeout(function(){playTone(659,0.12,0.02)},80);
  setTimeout(function(){playTone(784,0.15,0.02)},160);
}
function playFanfare(){
  var notes=[523,659,784,1047,1319];
  notes.forEach(function(n,i){setTimeout(function(){playTone(n,0.2,0.02)},i*100)});
}
function toggleMute(){muted=!muted;document.getElementById("muteBtn").textContent=muted?"🔇":"🔊"}

// === Narration ===
function maybeNarrate(hintIdx){
  if(muted)return;
  var now=Date.now();
  if(now-lastNarr<12000)return;
  if(!window.speechSynthesis)return;
  lastNarr=now;
  var text;
  if(typeof hintIdx==="number"&&hintIdx<narrations.length)text=narrations[hintIdx];
  else{text=narrations[narrIdx%narrations.length];narrIdx++}
  speechSynthesis.cancel();
  setTimeout(function(){
    var u=new SpeechSynthesisUtterance(text);
    u.rate=0.9;u.pitch=0.85;u.volume=0.5;
    var voices=speechSynthesis.getVoices();
    for(var i=0;i<voices.length;i++){
      if(voices[i].lang.startsWith("en")&&voices[i].name.toLowerCase().indexOf("british")>=0){
        u.voice=voices[i];break;
      }
    }
    speechSynthesis.speak(u);
  },60);
}

// === Confetti ===
function showConfetti(){
  var cv=document.getElementById("confetti"),ctx=cv.getContext("2d");
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  var parts=[];
  for(var i=0;i<120;i++){
    parts.push({x:cv.width/2+Math.random()*200-100,y:cv.height/2,
      vx:Math.random()*8-4,vy:Math.random()*-12-4,
      size:Math.random()*6+3,
      color:["#3b82f6","#ec4899","#22c55e","#f59e0b","#8b5cf6"][Math.floor(Math.random()*5)],
      rot:Math.random()*6,rv:Math.random()*0.3-0.15,life:1});
  }
  var frame=0;
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    var alive=false;
    parts.forEach(function(p){
      if(p.life<=0)return;alive=true;
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.rot+=p.rv;p.life-=0.008;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.globalAlpha=p.life;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      ctx.restore();
    });
    frame++;
    if(alive&&frame<200)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  draw();
}

// === Start ===
init();
