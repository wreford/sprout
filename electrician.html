*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px}
a{color:var(--accent);text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:.78rem;color:var(--dim)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:var(--accent);margin-bottom:10px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:110px}
.field label{display:block;font-size:.72rem;color:var(--dim);margin-bottom:3px}
.field input,.field select{width:100%;padding:10px;font-size:.95rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text)}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.btn{padding:9px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;margin-top:4px}
.btn:active{opacity:.8}
.result{margin-top:10px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:.88rem;line-height:1.7;white-space:pre-line}
.warn{color:var(--red);font-weight:600}
.ok{color:var(--green);font-weight:600}
.pane{display:none}.pane.active{display:block}
table.ref{width:100%;border-collapse:collapse;font-size:.8rem;margin-top:8px}
table.ref th,table.ref td{padding:6px 8px;border:1px solid var(--border);text-align:left}
table.ref th{background:var(--bg);color:var(--accent)}
.swatch{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:5px;border:1px solid #555}
.wheel{width:180px;height:180px;margin:10px auto;display:block}
@media(max-width:600px){.row{flex-direction:column}.field{min-width:100%}}
</style>

/* ── Ohm's Law ── */
function calcOhm(){
  let V=p('oV'),I=p('oI'),R=p('oR'),P=p('oP'),n=[V,I,R,P].filter(x=>x!==null).length;
  if(n<2)return show('ohmRes','Enter at least 2 values.');
  if(V!==null&&I!==null){R=V/I;P=V*I}
  else if(V!==null&&R!==null){I=V/R;P=V*V/R}
  else if(V!==null&&P!==null){I=P/V;R=V/I}
  else if(I!==null&&R!==null){V=I*R;P=I*I*R}
  else if(I!==null&&P!==null){V=P/I;R=V/I}
  else if(R!==null&&P!==null){V=Math.sqrt(P*R);I=V/R}
  show('ohmRes',`Voltage: ${f(V)} V\nCurrent: ${f(I)} A\nResistance: ${f(R)} Ω\nPower: ${f(P)} W`);
}

/* ── Wire Sizing (CEC) ── */
const AWG_AMPS_CU=[{g:'14',a:15},{g:'12',a:20},{g:'10',a:30},{g:'8',a:40},{g:'6',a:55},{g:'4',a:70},{g:'3',a:80},{g:'2',a:95},{g:'1',a:110},{g:'1/0',a:125},{g:'2/0',a:145},{g:'3/0',a:165},{g:'4/0',a:195},{g:'250',a:215},{g:'300',a:240},{g:'350',a:260},{g:'500',a:320}];
const AWG_AMPS_AL=[{g:'14',a:15},{g:'12',a:15},{g:'10',a:25},{g:'8',a:30},{g:'6',a:40},{g:'4',a:55},{g:'3',a:65},{g:'2',a:75},{g:'1',a:85},{g:'1/0',a:100},{g:'2/0',a:115},{g:'3/0',a:130},{g:'4/0',a:155},{g:'250',a:170},{g:'300',a:190},{g:'350',a:210},{g:'500',a:260}];
function calcWire(){
  const amps=p('wA'),dist=p('wD'),mat=document.getElementById('wM').value,volt=+document.getElementById('wV').value;
  if(!amps||!dist)return show('wireRes','Enter amperage and distance.');
  const tbl=mat==='cu'?AWG_AMPS_CU:AWG_AMPS_AL;
  let pick=tbl.find(w=>w.a>=amps);
  if(!pick)return show('wireRes','<span class="warn">Load exceeds table — consult CEC tables for parallel runs.</span>');
  const rOhm=wireRes_per_km(pick.g,mat),vd=2*dist*amps*rOhm/1000,pct=vd/volt*100;
  let note=pct>3?'\n<span class="warn">⚠ Voltage drop '+f(pct)+'% exceeds 3% — consider upsizing.</span>':'\n<span class="ok">✓ Voltage drop '+f(pct)+'% is acceptable.</span>';
  if(pct>3){const bigger=tbl.filter(w=>w.a>=amps);for(const b of bigger){const vd2=2*dist*amps*wireRes_per_km(b.g,mat)/1000;if(vd2/volt*100<=3){pick=b;note='\n<span class="ok">✓ Upsized to #'+b.g+' for voltage drop ('+f(vd2/volt*100)+'%).</span>';break}}}
  show('wireRes',`Recommended: <b>#${pick.g} AWG ${mat==='cu'?'Copper':'Aluminium'}</b>\nRated for ${pick.a} A (CEC Table 2 / D3)${note}`);
}
function wireRes_per_km(g,m){const cu={'14':8.44,'12':5.31,'10':3.34,'8':2.10,'6':1.32,'4':0.833,'3':0.661,'2':0.524,'1':0.415,'1/0':0.329,'2/0':0.261,'3/0':0.207,'4/0':0.164,'250':0.1391,'300':0.1159,'350':0.0994,'500':0.0695};const al={'14':13.9,'12':8.73,'10':5.49,'8':3.45,'6':2.17,'4':1.37,'3':1.09,'2':0.861,'1':0.683,'1/0':0.541,'2/0':0.429,'3/0':0.340,'4/0':0.270,'250':0.2291,'300':0.1909,'350':0.1636,'500':0.1145};return(m==='cu'?cu:al)[g]||1}

    'rigid':{'0.5':0.125,'0.75':0.214,'1':0.346,'1.25':0.598,'1.5':0.814,'2':1.342,'2.5':2.054,'3':3.0,'3.5':4.07,'4':5.27}};
  const wireArea={'thhn':{'14':0.0097,'12':0.0133,'10':0.0211,'8':0.0366,'6':0.0507,'4':0.0824,'3':0.0973,'2':0.1158,'1':0.1562,'1/0':0.1855,'2/0':0.2223,'3/0':0.2679,'4/0':0.3237,'250':0.3970,'300':0.4608,'350':0.5281,'500':0.7163},
    'tw':{'14':0.0139,'12':0.0181,'10':0.0243,'8':0.0437,'6':0.0726,'4':0.1087,'3':0.1263,'2':0.1473,'1':0.1901,'1/0':0.2223,'2/0':0.2624,'3/0':0.3117,'4/0':0.3718,'250':0.4536,'300':0.5217,'350':0.5958,'500':0.7901},
    'rwu':{'14':0.0097,'12':0.0133,'10':0.0211,'8':0.0366,'6':0.0507,'4':0.0824,'3':0.0973,'2':0.1158,'1':0.1562,'1/0':0.1855,'2/0':0.2223,'3/0':0.2679,'4/0':0.3237,'250':0.3970,'300':0.4608,'350':0.5281,'500':0.7163}};
  const cA=condArea[ct]?.[sz],wA=wireArea[wt]?.[ws];
  if(!cA||!wA)return show('conduitRes','Data not available for this combination.');
  const fill=qty*wA,maxFill=qty===1?0.53:qty===2?0.31:0.40,pct=fill/cA*100,allowed=maxFill*100;
  const ok=pct<=allowed;
  show('conduitRes',`Conduit area: ${f(cA)} sq in\nWire area (each): ${wA} sq in × ${qty} = ${f(fill)} sq in\nFill: <b>${f(pct)}%</b> of conduit\nAllowed: ${allowed}% (${qty===1?'1 wire: 53%':qty===2?'2 wires: 31%':'3+ wires: 40%'})\n${ok?'<span class="ok">✓ Within allowable fill.</span>':'<span class="warn">⚠ Exceeds maximum conduit fill — upsize conduit.</span>'}`);
}

/* ── Voltage Drop ── */
function calcVdrop(){
  const g=document.getElementById('vG').value,L=p('vL'),I=p('vA'),V=p('vV'),ph=+document.getElementById('vPh').value,mat=document.getElementById('vM').value;
  if(!L||!I||!V)return show('vdropRes','Fill in all fields.');
  const r=wireRes_per_km(g,mat),factor=ph===3?1.732:2,vd=factor*L*I*r/1000,pct=vd/V*100;
  let status=pct<=3?'<span class="ok">✓ Within 3% branch circuit limit.</span>':pct<=5?'<span class="warn">⚠ Exceeds 3% (branch) — acceptable for feeder if total ≤5%.</span>':'<span class="warn">⚠ Exceeds 5% — not acceptable per CEC Rule 8-102.</span>';
  show('vdropRes',`Voltage drop: <b>${f(vd)} V</b> (${f(pct)}%)\nVoltage at load: ${f(V-vd)} V\n${status}`);
}

/* ── Breaker Sizing ── */
function calcBreaker(){
  const W=p('bW'),V=p('bV'),ph=+document.getElementById('bPh').value,pf=+document.getElementById('bPF').value;
  if(!W||!V)return show('breakerRes','Enter watts and voltage.');
  const I=ph===3?W/(1.732*V*pf):W/(V*pf);
  const std=[15,20,30,40,50,60,70,80,90,100,125,150,200],pick=std.find(s=>s>=I)||'> 200';
  const i125=I*1.25,pickCont=std.find(s=>s>=i125)||'> 200';
  show('breakerRes',`Calculated current: <b>${f(I)} A</b>\nMinimum breaker: ${typeof pick==='number'?pick+'A':pick}\nFor continuous loads (125%): ${f(i125)} A → <b>${typeof pickCont==='number'?pickCont+'A':pickCont} breaker</b>`);
}

/* ── Resistor ── */
function calcResistor(){const b1=+document.getElementById('rb1').value+1,b2=+document.getElementById('rb2').value,mul=+document.getElementById('rb3').value,tol=document.getElementById('rb4').value;
  const val=(b1*10+b2)*mul;show('resistorRes','Resistance: '+fmtR(val)+' ±'+tol+'%');}
function fmtR(v){return v>=1e6?f(v/1e6)+' MΩ':v>=1e3?f(v/1e3)+' kΩ':f(v)+' Ω'}

/* ── Box Fill ── */
function calcBox(){
  const vol={'14':2.0,'12':2.25,'10':2.5,'8':3.0,'6':5.0};
  const g=document.getElementById('bxG').value,v=vol[g]||2.0;
  const nC=+document.getElementById('bxC').value,nGnd=+document.getElementById('bxGnd').value,nD=+document.getElementById('bxD').value,nCl=+document.getElementById('bxCl').value;
  const cap=+document.getElementById('bxCap').value;
  const total=nC*v+(nGnd>0?1:0)*v+nD*2*v+(nCl>0?1:0)*v;
  const ok=total<=cap;
  show('boxRes',`Volume per conductor (#${g}): ${v} cu in\nConductors: ${nC} × ${v} = ${f(nC*v)} cu in\nGrounds (1 count): ${nGnd>0?v:0} cu in\nDevices: ${nD} × ${2*v} = ${f(nD*2*v)} cu in (2× each)\nClamps (1 count): ${nCl>0?v:0} cu in\n<b>Total fill: ${f(total)} cu in</b> / ${cap} cu in capacity\n${ok?'<span class="ok">✓ Within box capacity.</span>':'<span class="warn">⚠ Exceeds box fill — use larger box.</span>'}`);
}

/* ── Helpers ── */
function p(id){const v=document.getElementById(id).value;return v===''?null:+v}
function f(n){return Math.round(n*1000)/1000}
function show(id,html){const el=document.getElementById(id);el.style.display='block';el.innerHTML=html}
