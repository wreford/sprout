<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>Coffee Clicker ☕</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a0f0a;--panel:#2a1a10;--border:#4a3020;--text:#f5e6d0;--dim:#8a7a6a;--green:#c8a850;--gold:#ffd700;--blue:#d4a060;--coffee:#8B6914;--cream:#f5deb3;--espresso:#3c1e0a}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;margin:0;padding:0}
body{display:flex;flex-direction:column;align-items:center;height:100vh}

/* Coffee stain rings background */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 15% 25%, rgba(139,105,20,0.08) 0%, transparent 120px),
    radial-gradient(circle at 75% 15%, rgba(139,105,20,0.06) 0%, transparent 100px),
    radial-gradient(circle at 45% 70%, rgba(139,105,20,0.07) 0%, transparent 140px),
    radial-gradient(circle at 85% 65%, rgba(139,105,20,0.05) 0%, transparent 90px),
    radial-gradient(circle at 25% 85%, rgba(139,105,20,0.06) 0%, transparent 110px);
}

/* News ticker */
.ticker-bar{width:100%;background:#120a05;border-bottom:1px solid var(--border);overflow:hidden;height:24px;display:flex;align-items:center;flex-shrink:0;z-index:11}
.ticker-track{display:flex;white-space:nowrap;animation:tickerScroll 80s linear infinite}
.ticker-item{font-size:0.68rem;color:var(--dim);padding:0 40px}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Header */
.header{width:100%;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;gap:6px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.title{font-size:1rem;font-weight:800;background:linear-gradient(135deg,#c8a850,#8B6914);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.prestige-badge{font-size:0.7rem;color:var(--gold)}
.prestige-name-badge{font-size:0.65rem;color:var(--gold);font-weight:700;background:rgba(255,215,0,0.1);padding:2px 6px;border-radius:6px;border:1px solid rgba(255,215,0,0.3)}
.achieve-badge{font-size:0.7rem;color:var(--dim);cursor:pointer}
.event-badge{font-size:0.68rem;color:#ff6b6b;font-weight:700;animation:eventPulse 2s ease-in-out infinite}
@keyframes eventPulse{0%,100%{opacity:0.7}50%{opacity:1}}
.header-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.header-btn{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 10px;border-radius:8px;font-size:0.68rem;cursor:pointer;font-weight:600}
.header-btn:hover{border-color:var(--blue)}
.prestige-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:4px 12px;border-radius:8px;font-weight:700;font-size:0.7rem;cursor:pointer;display:none;animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.4)}50%{box-shadow:0 0 20px rgba(255,215,0,0.8)}}

/* Prestige progress bar */
.prestige-progress-wrap{width:100%;background:#120a05;height:4px;flex-shrink:0;position:relative;overflow:hidden}
.prestige-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#ff8c00);transition:width 0.3s;width:0%}
.prestige-progress-label{position:absolute;right:8px;top:-1px;font-size:0.5rem;color:var(--gold);font-weight:700}

/* Main layout - fit to screen */
.main{display:flex;flex-direction:column;flex:1;width:100%;max-width:1200px;overflow:hidden;min-height:0}
.game-area{flex:0 0 40%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 20px;position:relative;min-height:0;overflow:hidden}
.bottom-area{flex:0 0 60%;display:flex;flex-direction:row;overflow:hidden;border-top:1px solid var(--border);min-height:0}
.upgrade-panel{flex:1;background:var(--panel);overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* Upgrade tab bar */
.tab-bar{display:flex;gap:2px;padding:6px 8px 0;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto}
.tab-btn{flex:0 0 auto;min-width:50px;background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:5px 6px;border-radius:6px 6px 0 0;font-size:0.6rem;font-weight:700;cursor:pointer;text-align:center;white-space:nowrap}
.tab-btn.active{border-color:var(--blue);color:var(--text);background:rgba(212,160,96,0.15);border-bottom-color:transparent}
.tab-content-wrap{flex:1;overflow-y:auto;padding:8px;min-height:0}

/* Bean counter */
.fish-count{font-size:clamp(1.6rem,5vw,2.8rem);font-weight:900;text-align:center;color:#8B6914;text-shadow:0 0 20px rgba(139,105,20,0.5);transition:color 0.5s}
.fish-count.golden-mode{color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,0.8)}
.fps-display{font-size:0.8rem;color:var(--dim);margin-top:2px;text-align:center}
.click-power{font-size:0.7rem;color:var(--dim);margin-top:1px;text-align:center}
.multiplier-display{font-size:0.65rem;color:var(--gold);margin-top:1px;text-align:center;min-height:14px}
.fun-fact-display{font-size:0.6rem;color:var(--dim);margin-top:3px;text-align:center;font-style:italic;max-width:400px;min-height:14px;transition:opacity 0.8s ease-in-out}

/* Barista speech bubble */
.barista-bubble{position:absolute;right:12px;top:20%;background:rgba(42,26,16,0.9);border:1px solid var(--border);border-radius:12px;padding:6px 10px;font-size:0.65rem;color:var(--cream);max-width:160px;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.5s}
.barista-bubble.show{opacity:1}
.barista-bubble::after{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:rgba(42,26,16,0.9)}

/* Customer queue */
.customer-queue{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);font-size:0.7rem;display:flex;gap:1px;opacity:0.7;pointer-events:none;z-index:3;white-space:nowrap;max-width:90%;overflow:hidden}
.customer-queue span{display:inline-block;animation:customerShuffle 2s ease-in-out infinite}
@keyframes customerShuffle{0%,100%{transform:translateX(0)}50%{transform:translateX(-2px)}}

/* Coffee cup */
.flounder-wrap{position:relative;margin:10px 0;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.flounder{font-size:80px;transition:transform 0.1s,font-size 0.5s;display:block;filter:drop-shadow(0 0 30px rgba(139,105,20,0.4))}
.flounder:active{transform:scale(0.92)}
.flounder.wiggle{animation:wiggle 0.3s ease}
@keyframes wiggle{0%{transform:rotate(0)}20%{transform:rotate(-15deg) scale(1.1)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(5deg)}100%{transform:rotate(0)}}
.flounder.aggressive-wiggle{animation:aggressiveWiggle 0.2s ease}
@keyframes aggressiveWiggle{0%{transform:rotate(0) scale(1)}15%{transform:rotate(-20deg) scale(1.15)}30%{transform:rotate(18deg) scale(1.1)}45%{transform:rotate(-15deg) scale(1.12)}60%{transform:rotate(12deg) scale(1.08)}75%{transform:rotate(-8deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}

/* Steam effect near cup */
.steam-particle{position:absolute;pointer-events:none;z-index:4;font-size:12px;animation:steamFloat 1.2s ease-out forwards;opacity:0.6}
@keyframes steamFloat{0%{opacity:0.6;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(0.3)}}

/* Overflow drip */
.drip-particle{position:absolute;pointer-events:none;z-index:4;width:4px;height:6px;background:var(--coffee);border-radius:50%;animation:dripFall 0.8s ease-in forwards}
@keyframes dripFall{0%{opacity:0.8;transform:translateY(0)}100%{opacity:0;transform:translateY(40px)}}

/* Prestige visual overlays */
.prestige-crown{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:30px;pointer-events:none;z-index:5}
.prestige-level-stars{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);font-size:10px;pointer-events:none;z-index:5;white-space:nowrap;color:var(--gold)}

/* Golden glow effect */
.flounder.golden-glow{filter:drop-shadow(0 0 30px rgba(255,215,0,0.8)) drop-shadow(0 0 60px rgba(255,215,0,0.4))}

/* Latte art swirl */
.flounder.rainbow-shimmer{animation:wiggle 0.3s ease, latteSwirl 3s linear infinite}
@keyframes latteSwirl{
  0%{filter:drop-shadow(0 0 30px rgba(200,168,80,0.6)) hue-rotate(0deg)}
  25%{filter:drop-shadow(0 0 30px rgba(245,222,179,0.6)) hue-rotate(15deg)}
  50%{filter:drop-shadow(0 0 30px rgba(255,215,0,0.6)) hue-rotate(30deg)}
  75%{filter:drop-shadow(0 0 30px rgba(139,105,20,0.6)) hue-rotate(15deg)}
  100%{filter:drop-shadow(0 0 30px rgba(200,168,80,0.6)) hue-rotate(0deg)}
}

/* Steam particles (prestige) */
.fire-particle{position:absolute;pointer-events:none;z-index:4;font-size:14px;animation:steamFloat 1.5s ease-out forwards}

/* Candy cane decoration for December */
.santa-hat{position:absolute;top:-20px;left:50%;transform:translateX(-40%);font-size:32px;pointer-events:none;z-index:5}

/* Particles */
.particle{position:absolute;pointer-events:none;border-radius:50%;animation:splash 0.6s ease-out forwards}
@keyframes splash{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.3)}}

/* Click text */
.click-text{position:absolute;pointer-events:none;font-weight:800;font-size:1rem;color:var(--green);animation:floatUp 0.8s ease-out forwards;z-index:20}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}

/* Steam background */
.bubble-bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bubble{position:absolute;border-radius:50%;background:rgba(139,105,20,0.04);border:1px solid rgba(139,105,20,0.06);animation:steamRise linear infinite}
@keyframes steamRise{0%{transform:translateY(100vh) scale(1);opacity:0.6}100%{transform:translateY(-100px) scale(0.3);opacity:0}}

/* Coffee waves at bottom */
.ocean-waves{position:fixed;bottom:0;left:0;width:200%;height:60px;pointer-events:none;z-index:0;opacity:0.3}
.wave{position:absolute;bottom:0;width:200%;height:40px;border-radius:50% 50% 0 0}
.wave1{background:rgba(60,30,10,0.3);animation:waveMove 6s ease-in-out infinite;left:-50%}
.wave2{background:rgba(42,26,16,0.25);animation:waveMove 8s ease-in-out infinite reverse;left:-30%;bottom:5px}
.wave3{background:rgba(26,15,10,0.2);animation:waveMove 10s ease-in-out infinite;left:-40%;bottom:10px}
@keyframes waveMove{0%,100%{transform:translateX(0)}50%{transform:translateX(60px)}}

/* Prestige wave animation */
.prestige-wave-overlay{position:fixed;inset:0;z-index:300;pointer-events:none;background:linear-gradient(180deg,rgba(139,105,20,0.9),rgba(26,15,10,0.95));animation:prestigeWave 1.5s ease-in-out forwards}
@keyframes prestigeWave{0%{opacity:0;transform:translateY(100%)}30%{opacity:1;transform:translateY(0)}70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100%)}}
.prestige-wave-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;color:var(--gold);text-align:center;text-shadow:0 0 30px rgba(255,215,0,0.6)}

/* Golden Latte */
.golden-fish{position:fixed;z-index:50;cursor:pointer;font-size:48px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.8));animation:goldenSwim var(--swim-duration,5s) linear forwards;pointer-events:auto;user-select:none;-webkit-tap-highlight-color:transparent}
@keyframes goldenSwim{0%{transform:translateX(var(--start-x)) translateY(var(--start-y)) scaleX(var(--dir,1))}100%{transform:translateX(var(--end-x)) translateY(var(--end-y)) scaleX(var(--dir,1))}}
.golden-sparkle{position:fixed;pointer-events:none;font-size:16px;animation:sparkle 0.5s ease-out forwards;z-index:49}
@keyframes sparkle{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-30px)}}

/* Mega golden latte */
.mega-golden-fish{font-size:72px !important;filter:drop-shadow(0 0 40px rgba(255,215,0,1)) drop-shadow(0 0 80px rgba(255,100,0,0.6)) !important}

/* Golden latte click burst */
.golden-burst{position:fixed;pointer-events:none;z-index:51;font-size:28px;animation:burstOut 0.8s ease-out forwards}
@keyframes burstOut{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0.3)}}

/* Bean rain */
.fish-rain{position:fixed;pointer-events:none;z-index:1;font-size:20px;animation:fishFall linear forwards;opacity:0.4}
@keyframes fishFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0.5}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}

/* Mini-game overlay */
.minigame-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.minigame-title{font-size:1.4rem;font-weight:900;color:var(--gold);margin-bottom:6px}
.minigame-sub{font-size:0.8rem;color:var(--dim);margin-bottom:12px;text-align:center}
.minigame-arena{width:90%;max-width:500px;height:250px;background:rgba(42,26,16,0.9);border:2px solid var(--border);border-radius:16px;position:relative;overflow:hidden}
.minigame-fish{position:absolute;font-size:32px;cursor:pointer;user-select:none;animation:miniSwim var(--mini-dur,3s) linear forwards}
@keyframes miniSwim{0%{left:-40px}100%{left:calc(100% + 40px)}}
.minigame-score{font-size:1.1rem;color:var(--green);font-weight:800;margin-top:10px}
.minigame-timer{font-size:1.8rem;color:#fff;font-weight:900;margin-bottom:6px}
.minigame-result{font-size:1.2rem;color:var(--gold);font-weight:800;margin-top:16px;text-align:center}

/* Mini-game bean items */
.mg-bean{position:absolute;font-size:28px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.mg-bean.falling{animation:beanFall var(--fall-dur,2s) linear forwards}
@keyframes beanFall{0%{transform:translateY(-40px)}100%{transform:translateY(300px)}}

/* Speed brew meter */
.speed-meter{width:80%;max-width:300px;height:30px;background:var(--bg);border:2px solid var(--border);border-radius:15px;overflow:hidden;margin:10px auto}
.speed-meter-fill{height:100%;background:linear-gradient(90deg,var(--coffee),var(--gold));transition:width 0.05s;width:0%}

/* Memory game cards */
.mg-card{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;background:var(--bg);border:2px solid var(--border);border-radius:10px;font-size:28px;cursor:pointer;margin:6px;user-select:none;transition:all 0.2s}
.mg-card.revealed{border-color:var(--gold);background:rgba(200,168,80,0.2)}
.mg-card.hidden-card{background:var(--espresso);color:transparent}

/* Tip jar numbers */
.mg-number{position:absolute;font-size:2rem;font-weight:900;color:var(--gold);cursor:pointer;user-select:none;text-shadow:0 0 10px rgba(255,215,0,0.5);transition:transform 0.1s}
.mg-number:hover{transform:scale(1.2)}

/* Mini-game available button */
.minigame-available-btn{position:fixed;bottom:60px;right:16px;z-index:90;background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:8px 16px;border-radius:12px;font-weight:800;font-size:0.85rem;cursor:pointer;animation:mgPulse 1.5s ease-in-out infinite;box-shadow:0 0 20px rgba(255,215,0,0.5)}
@keyframes mgPulse{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(255,215,0,0.5)}50%{transform:scale(1.08);box-shadow:0 0 35px rgba(255,215,0,0.8)}}

/* Stats modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:150;display:flex;align-items:center;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1rem;font-weight:800;margin-bottom:12px;color:var(--blue)}
.modal-close{float:right;background:none;border:none;color:var(--dim);font-size:1.2rem;cursor:pointer}
.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:0.78rem}
.stat-label{color:var(--dim)}
.stat-value{color:var(--text);font-weight:700}

/* Prestige confirmation modal */
.prestige-modal{max-width:500px}
.prestige-modal h2{color:var(--gold)}
.prestige-unlock{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:8px;padding:8px;margin:8px 0;font-size:0.8rem;color:var(--gold)}
.prestige-keeps{color:var(--green);font-size:0.75rem;margin:3px 0}
.prestige-resets{color:#ff6b6b;font-size:0.75rem;margin:3px 0}
.prestige-confirm-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;border:none;padding:8px 20px;border-radius:10px;font-weight:800;font-size:0.95rem;cursor:pointer;margin-top:10px;width:100%}
.prestige-confirm-btn:hover{opacity:0.9}
.prestige-cancel-btn{background:var(--bg);color:var(--dim);border:1px solid var(--border);padding:7px 18px;border-radius:8px;font-weight:600;font-size:0.8rem;cursor:pointer;margin-top:6px;width:100%}

/* PP shop */
.pp-item{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px;margin-bottom:5px;cursor:pointer;transition:all 0.15s}
.pp-item:hover{border-color:var(--gold)}
.pp-item.affordable{border-color:var(--gold)}
.pp-item.owned{opacity:0.5;border-color:var(--green)}
.pp-icon{font-size:1.3rem;flex-shrink:0}
.pp-info{flex:1}
.pp-name{font-size:0.78rem;font-weight:700}
.pp-desc{font-size:0.62rem;color:var(--dim)}
.pp-cost{font-size:0.72rem;font-weight:700;color:var(--gold);flex-shrink:0}
.pp-count{font-size:0.67rem;color:var(--green);font-weight:700}

/* Upgrades */
.upgrade-section-title{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);margin:10px 0 5px;padding-left:4px}
.upgrade-btn{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text);transition:all 0.15s;text-align:left}
.upgrade-btn:hover:not(:disabled){border-color:var(--blue);transform:translateX(2px)}
.upgrade-btn.affordable{border-color:var(--green)}
.upgrade-btn.affordable:hover{border-color:#d4b870;box-shadow:0 0 12px rgba(200,168,80,0.2)}
.upgrade-btn:disabled{opacity:0.35;cursor:not-allowed}
.upgrade-btn.purchased{border-color:var(--gold);opacity:0.5;cursor:default}
.upg-icon{font-size:1.4rem;flex-shrink:0}
.upg-info{flex:1;min-width:0}
.upg-name{font-size:0.8rem;font-weight:700}
.upg-desc{font-size:0.62rem;color:var(--dim);margin-top:1px}
.upg-cost{font-size:0.72rem;font-weight:700;color:var(--green);margin-top:1px}
.upg-count{font-size:0.8rem;font-weight:800;color:var(--blue);flex-shrink:0;min-width:22px;text-align:right}
.milestone-badge{font-size:0.52rem;color:var(--gold);margin-left:4px}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:8px 16px;border-radius:10px;font-weight:700;font-size:0.8rem;z-index:100;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;box-shadow:0 4px 20px rgba(255,215,0,0.4);white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}

/* Frenzy banner */
.frenzy-banner{position:fixed;top:110px;left:50%;transform:translateX(-50%);padding:6px 20px;border-radius:10px;font-weight:900;font-size:0.85rem;z-index:99;animation:frenzyPulse 0.5s ease-in-out infinite alternate;pointer-events:none;white-space:nowrap}
.frenzy-banner.fish-frenzy{background:linear-gradient(135deg,#8B6914,#c8a850);color:#fff}
.frenzy-banner.elder-bonus{background:linear-gradient(135deg,#6b4226,#d4a060);color:#fff}
@keyframes frenzyPulse{0%{transform:translateX(-50%) scale(1)}100%{transform:translateX(-50%) scale(1.05)}}

/* Tooltip */
.fact-tooltip{position:fixed;background:rgba(42,26,16,0.95);border:1px solid var(--gold);color:var(--text);padding:8px 12px;border-radius:10px;font-size:0.72rem;max-width:280px;z-index:500;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.5)}

/* Mini-games list in tab */
.mg-list-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.mg-list-item:hover{border-color:var(--blue)}
.mg-list-item.ready{border-color:var(--gold);box-shadow:0 0 10px rgba(255,215,0,0.2)}
.mg-list-item.cooldown{opacity:0.5;cursor:not-allowed}

function getActiveEvent(){

  const month=now.getMonth();
  const hour=now.getHours();

}

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

// Coffee pour sound (sine 100-150Hz with wobble)
function playPourSound(){
  try{
    const c=getAudio();
    const o=c.createOscillator(),g=c.createGain();
    const lfo=c.createOscillator(),lfoG=c.createGain();
    o.connect(g);g.connect(c.destination);
    lfo.connect(lfoG);lfoG.connect(o.frequency);
    o.frequency.value=120;o.type='sine';
    lfo.frequency.value=8;lfo.type='sine';
    lfoG.gain.value=25;
    g.gain.value=0.025;
    o.start();lfo.start();
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);
    o.stop(c.currentTime+0.13);lfo.stop(c.currentTime+0.13);
  }catch(e){}
}

}

// ── Helpers ──
function fmt(n){
  if(!isFinite(n))return 'Infinity';
  if(n>=1e60)return (n/1e60).toFixed(1)+'Nv';
  if(n>=1e57)return (n/1e57).toFixed(1)+'Oc';
  if(n>=1e54)return (n/1e54).toFixed(1)+'Sp';
  if(n>=1e51)return (n/1e51).toFixed(1)+'Sx';
  if(n>=1e48)return (n/1e48).toFixed(1)+'Qi';
  if(n>=1e45)return (n/1e45).toFixed(1)+'Qa';
  if(n>=1e42)return (n/1e42).toFixed(1)+'Td';
  if(n>=1e39)return (n/1e39).toFixed(1)+'Dd';
  if(n>=1e36)return (n/1e36).toFixed(1)+'Ud';
  if(n>=1e33)return (n/1e33).toFixed(1)+'Dc';
  if(n>=1e30)return (n/1e30).toFixed(1)+'No';
  if(n>=1e27)return (n/1e27).toFixed(1)+'Oc';
  if(n>=1e24)return (n/1e24).toFixed(1)+'Sp';
  if(n>=1e21)return (n/1e21).toFixed(1)+'Sx';
  if(n>=1e18)return (n/1e18).toFixed(1)+'Qn';
  if(n>=1e15)return (n/1e15).toFixed(1)+'Q';
  if(n>=1e12)return (n/1e12).toFixed(1)+'T';
  if(n>=1e9)return (n/1e9).toFixed(1)+'B';
  if(n>=1e6)return (n/1e6).toFixed(1)+'M';
  if(n>=1e3)return n.toLocaleString('en-US',{maximumFractionDigits:0});
  return Math.floor(n).toString();
}

function getPrestigeData(){
  var current = null;
  var next = null;
  for(var i=0;i<PRESTIGE_LEVELS.length;i++){
    if(PRESTIGE_LEVELS[i].level === state.prestigeLevel){
      current = PRESTIGE_LEVELS[i];
    }
    if(PRESTIGE_LEVELS[i].level === state.prestigeLevel+1){
      next = PRESTIGE_LEVELS[i];
    }
  }
  return {current:current, next:next};
}

function getNextPrestigeReq(){
  var pd = getPrestigeData();
  return pd.next ? pd.next.req : Infinity;
}

function getNextPrestigeMult(){
  var pd = getPrestigeData();
  return pd.next ? pd.next.mult : state.prestigeMultiplier;
}

function getPPUpgradeCount(id){
  return state.ppUpgrades[id] || 0;
}

function getAutoCost(i){return Math.floor(autoUpgradeDefs[i].baseCost*Math.pow(1.15,state.autoUpgrades[i]));}

function getClickPower(){
  let p=1;
  p += getPPUpgradeCount('startClickPower');
  clickUpgradeDefs.forEach((d,i)=>{if(state.clickUpgrades[i])p+=d.power;});
  if(state.researchUpgrades[8])p*=1.5;
  if(state.researchUpgrades[14])p*=3;
  const ev=getActiveEvent();
  if(ev&&ev.mult>1)p*=ev.mult;
  if(Date.now()<state.frenzyEnd)p*=10;
  var multBonusPct = getPPUpgradeCount('multBonus');
  if(multBonusPct > 0) p *= (1 + multBonusPct/100);
  return Math.floor(p*state.prestigeMultiplier);
}
function getBuildingFps(i){
  let base=autoUpgradeDefs[i].fps;
  researchDefs.forEach((r,ri)=>{
    if(state.researchUpgrades[ri]&&r.target==='building'&&r.idx===i){
      base*=r.mult;
    }
  });
  return base;
}
function calcFPS(){
  let f=0;
  autoUpgradeDefs.forEach((d,i)=>{
    f+=getBuildingFps(i)*state.autoUpgrades[i];
  });
  let allMult=1;
  researchDefs.forEach((r,ri)=>{
    if(state.researchUpgrades[ri]&&r.target==='allFps'){
      allMult+=r.mult;
    }
  });
  f*=allMult;
  if(state.researchUpgrades[14])f*=3;
  const ev=getActiveEvent();
  if(ev&&ev.mult>1)f*=ev.mult;
  if(Date.now()<state.elderEnd)f*=2;
  var multBonusPct = getPPUpgradeCount('multBonus');
  if(multBonusPct > 0) f *= (1 + multBonusPct/100);
  return f*state.prestigeMultiplier;
}

// ── Brew (click) ──
const flounderEl=document.getElementById('flounder');
const flounderWrap=document.getElementById('flounderWrap');
let ambientStarted=false;
function flick(e){
  e.preventDefault();
  if(!ambientStarted){ambientStarted=true;startAmbient();}
  const power=getClickPower();
  state.fish+=power;
  state.totalFish+=power;
  state.allTimeFish+=power;
  state.thisPrestigeFish+=power;
  state.totalFlicks++;

  // Track taps for streak detection
  recentTaps.push(Date.now());
  var tapRate = getRecentTapRate();

  // Sound: pour on normal, hiss on streak
  playPourSound();
  if(tapRate >= 8){
    playSteamHiss();
  }

  // Cup animation: aggressive wiggle on rapid taps
  flounderEl.classList.remove('wiggle','aggressive-wiggle');
  void flounderEl.offsetWidth;
  if(tapRate >= 6){
    flounderEl.classList.add('aggressive-wiggle');
  } else {
    flounderEl.classList.add('wiggle');
  }

  // Steam increases with click speed
  if(tapRate >= 3){
    spawnSteamParticle();
    if(tapRate >= 5) spawnSteamParticle();
  }

  // Overflow drip on streak (10+ taps in 2 sec)
  if(tapRate >= 10 && !isStreaking){
    isStreaking = true;
    spawnDrip();
    setTimeout(function(){ isStreaking = false; }, 500);
  }

  const ct=document.createElement('div');
  ct.className='click-text';
  ct.textContent='+'+fmt(power);
  const rect=flounderWrap.getBoundingClientRect();
  const gRect=document.getElementById('gameArea').getBoundingClientRect();
  ct.style.left=(rect.left-gRect.left+rect.width/2-20)+'px';
  ct.style.top=(rect.top-gRect.top-10)+'px';
  document.getElementById('gameArea').appendChild(ct);
  setTimeout(()=>ct.remove(),800);
  spawnParticles(e.clientX||e.touches?.[0]?.clientX||rect.left+rect.width/2,e.clientY||e.touches?.[0]?.clientY||rect.top+rect.height/2);
  updateDisplay();
  checkAchievements();
}
flounderWrap.addEventListener('click',flick);
flounderWrap.addEventListener('touchstart',function(e){e.preventDefault();flick(e);},{passive:false});

function spawnParticles(cx,cy){
  const ga=document.getElementById('gameArea');
  const gr=ga.getBoundingClientRect();
  const colors=['rgba(139,105,20,0.8)','rgba(245,222,179,0.7)','rgba(200,168,80,0.6)','rgba(255,215,0,0.5)'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=Math.random()*Math.PI*2;
    const dist=40+Math.random()*80;
    const dx=Math.cos(angle)*dist;
    const dy=Math.sin(angle)*dist-20;
    p.style.cssText='left:'+(cx-gr.left)+'px;top:'+(cy-gr.top)+'px;width:'+(4+Math.random()*8)+'px;height:'+(4+Math.random()*8)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';--dx:'+dx+'px;--dy:'+dy+'px';
    ga.appendChild(p);
    setTimeout(()=>p.remove(),600);
  }
}

function showPrestigeConfirm(){
  var nextReq = getNextPrestigeReq();
  if(state.totalFish < nextReq) return;
  if(state.prestigeLevel >= 100){
    showToast('You have achieved the God Shot! No further prestige needed.');
    return;
  }

  var existing = document.querySelector('.modal-overlay');
  if(existing) existing.remove();

  var pd = getPrestigeData();
  var next = pd.next;
  if(!next) return;

  var ppEarned = next.level;

  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e){if(e.target===overlay)overlay.remove();};

  var keepFishPct = getPPUpgradeCount('keepFish');
  var keptFish = keepFishPct > 0 ? Math.floor(state.fish * keepFishPct / 100) : 0;

  var factHtml = '<div style="font-size:0.72rem;color:var(--dim);font-style:italic;margin-top:10px">"' + getRandomFact() + '"</div>';

  overlay.innerHTML = '<div class="modal prestige-modal">' +
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>' +
    '<h2>⭐ Prestige to Level ' + next.level + ': ' + next.name + '</h2>' +
    '<div class="prestige-unlock">🔓 Unlock: ' + next.unlock + '</div>' +
    '<div class="stat-row"><span class="stat-label">New Multiplier</span><span class="stat-value">' + next.mult + 'x</span></div>' +
    '<div class="stat-row"><span class="stat-label">Prestige Points Earned</span><span class="stat-value">+' + ppEarned + ' PP</span></div>' +
    (keptFish > 0 ? '<div class="stat-row"><span class="stat-label">Beans Kept ('+keepFishPct+'%)</span><span class="stat-value">' + fmt(keptFish) + '</span></div>' : '') +
    '<div style="margin-top:10px">' +
    '<div class="prestige-resets">Resets: Beans, buildings, click upgrades, research</div>' +
    '<div class="prestige-keeps">Keeps: Prestige level, multiplier, all-time beans, achievements, PP upgrades</div>' +
    '</div>' +
    factHtml +
    '<button class="prestige-confirm-btn" onclick="doPrestige();this.closest(\'.modal-overlay\').remove()">⭐ Prestige Now!</button>' +
    '<button class="prestige-cancel-btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
    '</div>';
  document.body.appendChild(overlay);
}

function doPrestige(){
  var nextReq = getNextPrestigeReq();
  if(state.totalFish < nextReq) return;
  if(state.prestigeLevel >= 100) return;

  var pd = getPrestigeData();
  var next = pd.next;
  if(!next) return;

  var timePlayed = Math.floor((Date.now() - state.prestigeSessionStart) / 1000);
  state.prestigeHistory.push({level:next.level,fishAtPrestige:state.totalFish,date:Date.now(),timePlayed:timePlayed});

  if(timePlayed < state.fastestPrestige) state.fastestPrestige = timePlayed;
  if(state.totalFish > state.highestFishAtPrestige) state.highestFishAtPrestige = state.totalFish;

  var ppEarned = next.level;
  state.prestigePoints += ppEarned;

  var keepFishPct = getPPUpgradeCount('keepFish');
  var keptFish = keepFishPct > 0 ? Math.floor(state.fish * keepFishPct / 100) : 0;

  state.prestigeLevel = next.level;
  state.prestigeMultiplier = next.mult;
  state.fish = keptFish;
  state.totalFish = keptFish;
  state.thisPrestigeFish = 0;
  state.totalFlicks = 0;
  state.autoUpgrades = [0,0,0,0,0,0,0,0];
  state.clickUpgrades = [false,false,false,false,false];
  state.researchUpgrades = new Array(15).fill(false);
  state.fps = 0;
  state.frenzyEnd = 0;
  state.elderEnd = 0;
  state.prestigeSessionStart = Date.now();

  if(getPPUpgradeCount('startFish') > 0){
    state.fish += 100;
    state.totalFish += 100;
  }

  if(getPPUpgradeCount('freeShrimp') > 0){
    state.autoUpgrades[0] = 1;
  }

  state.fps = calcFPS();
  showPrestigeAnimation(next);
  playPrestigeSound();
  showToast('⭐ Prestige Level ' + next.level + ': ' + next.name + '! ' + next.mult + 'x multiplier! +' + ppEarned + ' PP');
  updateAutoClicker();
  if(state.prestigeLevel >= 3) startFishRain();
  if(state.prestigeLevel >= 75) startFireEffect();
  updatePrestigeVisuals();
  renderUpgrades();
  updateDisplay();
  checkAchievements();
  saveGame();
}

function showPrestigeAnimation(next){
  var overlay = document.createElement('div');
  overlay.className = 'prestige-wave-overlay';
  overlay.innerHTML = '<div class="prestige-wave-text">⭐ ' + next.name + ' ⭐<br><span style="font-size:1rem;color:#fff">Level ' + next.level + ' — ' + next.mult + 'x</span><br><span style="font-size:0.8rem;color:var(--dim)">' + next.unlock + '</span></div>';
  document.body.appendChild(overlay);
  setTimeout(function(){overlay.remove();}, 1500);
}

function showPrestigeShop(){
  var existing = document.querySelector('.modal-overlay');
  if(existing) existing.remove();
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = function(e){if(e.target===overlay)overlay.remove();};

    itemsHtml += '<div class="'+cls+'" onclick="buyPPUpgrade(\''+upg.id+'\')">' +
      '<span class="pp-icon">'+upg.icon+'</span>' +
      '<div class="pp-info"><div class="pp-name">'+upg.name+'</div><div class="pp-desc">'+upg.desc+'</div></div>' +
      (maxed ? '<span class="pp-count">MAX</span>' :
       (upg.stacks ? '<span class="pp-count">x'+count+'</span>' : '')) +
      '<span class="pp-cost">'+(maxed?'Done':upg.cost+' PP')+'</span></div>';
  });
  overlay.innerHTML = '<div class="modal">' +
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</button>' +
    '<h2>🛒 Prestige Point Shop</h2>' +

    '<div style="margin-top:10px">' + itemsHtml + '</div></div>';
  document.body.appendChild(overlay);
}

function buyPPUpgrade(id){
  var upg = PP_UPGRADES.find(function(u){return u.id===id;});
  if(!upg) return;
  var count = getPPUpgradeCount(id);
  var maxed = !upg.stacks && count >= upg.max;
  if(upg.stacks && upg.max && count >= upg.max) maxed = true;
  if(maxed) return;
  if(state.prestigePoints < upg.cost) return;
  state.prestigePoints -= upg.cost;
  state.ppUpgrades[id] = (state.ppUpgrades[id] || 0) + 1;
  playBuy(3);
  showToast('🛒 Bought: ' + upg.name);
  showPrestigeShop();
  updateDisplay();
  checkAchievements();
  saveGame();
}

// ── Golden Latte ──
let goldenTimer=null;
function getGoldenInterval(){
  let base=30000+Math.random()*30000;
  if(state.researchUpgrades[12])base/=2;
  const ev=getActiveEvent();
  if(ev&&ev.goldenMult)base/=ev.goldenMult;
  if(state.prestigeLevel >= 1) base *= 0.8;
  if(state.prestigeLevel >= 29) base *= 0.5;
  var goldenFasterCount = getPPUpgradeCount('goldenFaster');
  if(goldenFasterCount > 0) base *= Math.pow(0.75, goldenFasterCount);
  return base;
}
function scheduleGoldenFish(){
  if(goldenTimer)clearTimeout(goldenTimer);
  goldenTimer=setTimeout(()=>{
    spawnGoldenFish();
    scheduleGoldenFish();
  },getGoldenInterval());
}
function spawnGoldenFish(isMega){
  const fish=document.createElement('div');
  fish.className='golden-fish' + (isMega ? ' mega-golden-fish' : '');
  fish.textContent=isMega ? '🏆' : '🥤';
  fish.setAttribute('role','button');
  fish.setAttribute('aria-label','Click the golden latte for a bonus!');
  const fromLeft=Math.random()>0.5;
  const yPos=80+Math.random()*(window.innerHeight-200);
  const dur = state.prestigeLevel >= 23 ? 7 : 5;
  fish.style.setProperty('--start-x',fromLeft?'-60px':(window.innerWidth+60)+'px');
  fish.style.setProperty('--end-x',fromLeft?(window.innerWidth+60)+'px':'-60px');
  fish.style.setProperty('--start-y',yPos+'px');
  fish.style.setProperty('--end-y',(yPos+Math.random()*80-40)+'px');
  fish.style.setProperty('--dir',fromLeft?'1':'-1');
  fish.style.setProperty('--swim-duration',dur+'s');
  fish.style.top='0';fish.style.left='0';
  let sparkleInterval=setInterval(()=>{
    if(!document.body.contains(fish)){clearInterval(sparkleInterval);return;}
    const r=fish.getBoundingClientRect();
    const s=document.createElement('div');
    s.className='golden-sparkle';
    s.textContent='✨';
    s.style.left=(r.left+r.width/2)+'px';
    s.style.top=(r.top+r.height/2)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),500);
  },200);

  function clickGolden(e){
    e.stopPropagation();e.preventDefault();
    clearInterval(sparkleInterval);
    state.goldenClicked++;
    state.goldenBonuses++;
    playGoldenFish();
    const rect=fish.getBoundingClientRect();
    for(let i=0;i<12;i++){
      const b=document.createElement('div');
      b.className='golden-burst';
      b.textContent=['⭐','🌟','💫','✨','☕'][Math.floor(Math.random()*5)];
      const angle=Math.random()*Math.PI*2;
      const dist=60+Math.random()*80;
      b.style.setProperty('--bx',Math.cos(angle)*dist+'px');
      b.style.setProperty('--by',Math.sin(angle)*dist+'px');
      b.style.left=rect.left+rect.width/2+'px';
      b.style.top=rect.top+rect.height/2+'px';
      document.body.appendChild(b);
      setTimeout(()=>b.remove(),800);
    }
    fish.remove();

    var rewardMult = 1;
    if(isMega) rewardMult = 100;
    else if(state.prestigeLevel >= 43) rewardMult = 5;
    else if(state.prestigeLevel >= 11) rewardMult = 2;

    const roll=Math.random();
    if(roll<0.33){
      var frenzyDuration = 15000;
      if(state.prestigeLevel >= 21) frenzyDuration += 5000;
      state.frenzyEnd=Date.now()+frenzyDuration;
      showToast('☕ CAFFEINE RUSH! 10x clicking for '+(frenzyDuration/1000)+'s!');
      showFrenzyBanner('fish-frenzy','☕ CAFFEINE RUSH — 10x clicks!',frenzyDuration);
    }else if(roll<0.66){
      const bonus=Math.max(Math.floor(state.totalFish*0.1*rewardMult),100);
      state.fish+=bonus;
      state.totalFish+=bonus;
      state.allTimeFish+=bonus;
      state.thisPrestigeFish+=bonus;
      showToast('🆓 Free Refill! +'+fmt(bonus)+' beans!');
    }else{
      var elderDuration = 30000;
      if(state.prestigeLevel >= 34) elderDuration = 60000;
      state.elderEnd=Date.now()+elderDuration;
      state.fps=calcFPS();
      showToast('☕ Double Shot! 2x BPS for '+(elderDuration/1000)+'s!');
      showFrenzyBanner('elder-bonus','☕ DOUBLE SHOT — 2x BPS!',elderDuration);
    }
    updateDisplay();
    checkAchievements();
  }
  fish.addEventListener('click',clickGolden);
  fish.addEventListener('touchstart',(e)=>{e.preventDefault();clickGolden(e);},{passive:false});
  document.body.appendChild(fish);
  setTimeout(()=>{clearInterval(sparkleInterval);if(document.body.contains(fish))fish.remove();},dur*1000);
}

  if(megaGoldenTimer) clearInterval(megaGoldenTimer);
  if(state.prestigeLevel >= 50){
    megaGoldenTimer = setInterval(function(){

    }, 60000);

function showFrenzyBanner(cls,text,duration){
  const existing=document.querySelector('.frenzy-banner');
  if(existing)existing.remove();
  const b=document.createElement('div');
  b.className='frenzy-banner '+cls;
  b.textContent=text;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),duration);
}

// ══════════════════════════════════════════
// 5 MINI-GAMES
// ══════════════════════════════════════════
var lastMinigameTime = Date.now();
var minigameActive = false;
var minigameAvailableBtn = null;
var miniGameCooldowns = {latte:0, bean:0, speed:0, tip:0, memory:0};

var MINIGAME_DEFS = [
  {id:'latte', name:'Latte Art', icon:'🎨', desc:'Tap 5 cups to pour latte art. Each = 1 min BPS.', duration:'~8s'},
  {id:'bean',  name:'Bean Sort', icon:'🫘', desc:'Tap BROWN beans only. Wrong = lose beans! 10s.', duration:'10s'},
  {id:'speed', name:'Speed Brew', icon:'⚡', desc:'Tap as fast as you can for 5 seconds!', duration:'5s'},
  {id:'tip',   name:'Tip Jar', icon:'💰', desc:'Tap the HIGHEST number before it vanishes. 8 rounds.', duration:'~12s'},
  {id:'memory',name:'Coffee Memory', icon:'🧠', desc:'Remember the pattern, tap in order.', duration:'~10s'}
];

function getMiniGameCooldown(){
  var cd = 180000; // 3 minutes
  if(state.prestigeLevel >= 37) cd = 120000;
  if(state.prestigeLevel >= 15) cd = Math.min(cd, 150000);
  return cd;
}

function getAnyMiniGameReady(){
  var now = Date.now();
  var cd = getMiniGameCooldown();
  for(var i = 0; i < MINIGAME_DEFS.length; i++){
    var mg = MINIGAME_DEFS[i];
    if(now - (miniGameCooldowns[mg.id] || 0) >= cd) return true;
  }
  return false;
}

function checkMinigameAvailable(){
  if(minigameActive) return;
  if(state.totalFlicks < 10) return;
  if(getAnyMiniGameReady()){
    showMinigameButton();
  } else {
    hideMinigameButton();
  }
}

function showMinigameButton(){
  if(minigameAvailableBtn) return;
  var btn = document.createElement('button');
  btn.className = 'minigame-available-btn';
  btn.textContent = '🎮 MINI-GAME!';
  btn.onclick = function(){
    hideMinigameButton();
    switchTab('minigames');
  };
  document.body.appendChild(btn);
  minigameAvailableBtn = btn;
}

function hideMinigameButton(){
  if(minigameAvailableBtn){
    minigameAvailableBtn.remove();
    minigameAvailableBtn = null;
  }
}

function getMiniGameRewardMult(){
  var m = 1;
  if(state.prestigeLevel >= 20) m = 3;
  if(state.prestigeLevel >= 57) m = 9;
  return m;
}

function addBeans(amount){
  state.fish += amount;
  state.totalFish += amount;
  state.allTimeFish += amount;
  state.thisPrestigeFish += amount;
}

// ── Mini-game 1: Latte Art ──
function startLatteArt(){
  if(minigameActive) return;
  var now = Date.now();
  var cd = getMiniGameCooldown();
  if(now - (miniGameCooldowns.latte||0) < cd) return;
  minigameActive = true;
  miniGameCooldowns.latte = now;
  hideMinigameButton();
  playMiniGameJingle('latte');

  var overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  var caught = 0;
  var total = 5;
  var timeLeft = 8;
  overlay.innerHTML = '<div class="minigame-title">🎨 Latte Art</div><div class="minigame-sub">Tap each cup to pour latte art! Each = 1 min of BPS</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div class="minigame-arena" id="mgArena"></div><div class="minigame-score" id="mgScore">Poured: 0/'+total+'</div>';
  document.body.appendChild(overlay);

  var arena = overlay.querySelector('#mgArena');
  var scoreEl = overlay.querySelector('#mgScore');
  var timerEl = overlay.querySelector('#mgTimer');

  // Place 5 cups randomly
  var cups = ['☕','☕','☕','☕','☕'];
  cups.forEach(function(cup, idx){
    setTimeout(function(){
      if(!document.body.contains(overlay)) return;
      var el = document.createElement('div');
      el.className = 'mg-bean';
      el.textContent = cup;
      el.style.fontSize = '36px';
      el.style.left = (10 + Math.random()*75) + '%';
      el.style.top = (10 + Math.random()*70) + '%';
      el.style.transition = 'transform 0.2s, opacity 0.3s';
      function tapCup(e){
        e.stopPropagation(); e.preventDefault();
        caught++;
        playMGTap();
        el.textContent = '🎨';
        el.style.transform = 'scale(1.3)';
        el.style.pointerEvents = 'none';
        scoreEl.textContent = 'Poured: '+caught+'/'+total;
        setTimeout(function(){ el.style.opacity = '0'; }, 300);
      }
      el.addEventListener('click', tapCup);
      el.addEventListener('touchstart', function(e){e.preventDefault();tapCup(e);},{passive:false});
      arena.appendChild(el);
      // Disappear after 3 seconds
      setTimeout(function(){ if(el.style.opacity !== '0') el.style.opacity = '0.3'; }, 3000);
    }, idx * 1200);
  });

  var ti = setInterval(function(){
    timeLeft--;
    if(timerEl) timerEl.textContent = timeLeft;
    if(timeLeft <= 0){
      clearInterval(ti);
      var bonus = caught * state.fps * 60 * getMiniGameRewardMult();
      addBeans(bonus);
      playMGResult();
      overlay.innerHTML = '<div class="minigame-title">🎨 Results!</div><div class="minigame-sub">You poured '+caught+'/'+total+' latte art designs!</div><div class="minigame-result">+'+fmt(bonus)+' beans</div>';
      setTimeout(function(){ overlay.remove(); minigameActive = false; updateDisplay(); }, 2500);
    }
  }, 1000);
}

// ── Mini-game 2: Bean Sort ──
function startBeanSort(){
  if(minigameActive) return;
  var now = Date.now();
  var cd = getMiniGameCooldown();
  if(now - (miniGameCooldowns.bean||0) < cd) return;
  minigameActive = true;
  miniGameCooldowns.bean = now;
  hideMinigameButton();
  playMiniGameJingle('bean');

  var overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  var score = 0;
  var wrong = 0;
  var timeLeft = 10;
  overlay.innerHTML = '<div class="minigame-title">🫘 Bean Sort</div><div class="minigame-sub">Tap BROWN beans only! Avoid green and black.</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div class="minigame-arena" id="mgArena"></div><div class="minigame-score" id="mgScore">Correct: 0 | Wrong: 0</div>';
  document.body.appendChild(overlay);

  var arena = overlay.querySelector('#mgArena');
  var scoreEl = overlay.querySelector('#mgScore');
  var timerEl = overlay.querySelector('#mgTimer');

  var beanTypes = [
    {emoji:'🟤', color:'brown', good:true},
    {emoji:'🟢', color:'green', good:false},
    {emoji:'⚫', color:'black', good:false}
  ];

  var spawnInterval = setInterval(function(){
    if(!document.body.contains(overlay)){clearInterval(spawnInterval); return;}
    var bean = beanTypes[Math.floor(Math.random()*3)];
    var el = document.createElement('div');
    el.className = 'mg-bean falling';
    el.textContent = bean.emoji;
    el.style.left = (5 + Math.random()*85) + '%';
    el.style.top = '0';
    var fallDur = 1.5 + Math.random();
    el.style.setProperty('--fall-dur', fallDur + 's');

    function tapBean(e){
      e.stopPropagation(); e.preventDefault();
      el.style.pointerEvents = 'none';
      if(bean.good){
        score++;
        el.textContent = '✓';
        playMGTap();
      } else {
        wrong++;
        el.textContent = '✗';
        playMGWrong();
      }
      scoreEl.textContent = 'Correct: '+score+' | Wrong: '+wrong;
      setTimeout(function(){ el.remove(); }, 200);
    }
    el.addEventListener('click', tapBean);
    el.addEventListener('touchstart', function(e){e.preventDefault();tapBean(e);},{passive:false});
    arena.appendChild(el);
    setTimeout(function(){ el.remove(); }, fallDur * 1000);
  }, 600);

  var ti = setInterval(function(){
    timeLeft--;
    if(timerEl) timerEl.textContent = timeLeft;
    if(timeLeft <= 0){
      clearInterval(ti);
      clearInterval(spawnInterval);
      var bonus = Math.max(0, (score - wrong) * getClickPower() * 10 * getMiniGameRewardMult());
      addBeans(bonus);
      playMGResult();
      overlay.innerHTML = '<div class="minigame-title">🫘 Results!</div><div class="minigame-sub">Correct: '+score+' | Wrong: '+wrong+'</div><div class="minigame-result">+'+fmt(bonus)+' beans</div>';
      setTimeout(function(){ overlay.remove(); minigameActive = false; updateDisplay(); }, 2500);
    }
  }, 1000);
}

// ── Mini-game 3: Speed Brew ──
function startSpeedBrew(){
  if(minigameActive) return;
  var now = Date.now();
  var cd = getMiniGameCooldown();
  if(now - (miniGameCooldowns.speed||0) < cd) return;
  minigameActive = true;
  miniGameCooldowns.speed = now;
  hideMinigameButton();
  playMiniGameJingle('speed');

  var overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  var taps = 0;
  var timeLeft = 5;
  overlay.innerHTML = '<div class="minigame-title">⚡ Speed Brew</div><div class="minigame-sub">TAP AS FAST AS YOU CAN!</div><div class="minigame-timer" id="mgTimer">'+timeLeft+'</div><div class="speed-meter"><div class="speed-meter-fill" id="mgMeter"></div></div><div style="font-size:2.5rem;cursor:pointer;user-select:none;text-align:center;margin:10px 0" id="mgTapArea">☕</div><div class="minigame-score" id="mgScore">Taps: 0</div>';
  document.body.appendChild(overlay);

  var scoreEl = overlay.querySelector('#mgScore');
  var timerEl = overlay.querySelector('#mgTimer');
  var meterEl = overlay.querySelector('#mgMeter');
  var tapArea = overlay.querySelector('#mgTapArea');

  function doTap(e){
    e.stopPropagation(); e.preventDefault();
    taps++;
    playMGTap();
    scoreEl.textContent = 'Taps: ' + taps;
    meterEl.style.width = Math.min(taps * 2, 100) + '%';
    tapArea.style.transform = 'scale(' + (1 + Math.random()*0.2) + ')';
    setTimeout(function(){ tapArea.style.transform = 'scale(1)'; }, 50);
  }
  tapArea.addEventListener('click', doTap);
  tapArea.addEventListener('touchstart', function(e){e.preventDefault();doTap(e);},{passive:false});
  // Also allow tapping the overlay itself
  overlay.addEventListener('click', function(e){ if(e.target === overlay) doTap(e); });

  var ti = setInterval(function(){
    timeLeft--;
    if(timerEl) timerEl.textContent = timeLeft;
    if(timeLeft <= 0){
      clearInterval(ti);
      var bonus = taps * getClickPower() * getMiniGameRewardMult();
      addBeans(bonus);
      playMGResult();
      overlay.innerHTML = '<div class="minigame-title">⚡ Results!</div><div class="minigame-sub">You tapped '+taps+' times!</div><div class="minigame-result">+'+fmt(bonus)+' beans</div>';
      setTimeout(function(){ overlay.remove(); minigameActive = false; updateDisplay(); }, 2500);
    }
  }, 1000);
}

// ── Mini-game 4: Tip Jar ──
function startTipJar(){
  if(minigameActive) return;
  var now = Date.now();
  var cd = getMiniGameCooldown();
  if(now - (miniGameCooldowns.tip||0) < cd) return;
  minigameActive = true;
  miniGameCooldowns.tip = now;
  hideMinigameButton();
  playMiniGameJingle('tip');

  var overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';
  var totalTipped = 0;
  var round = 0;
  var maxRounds = 8;
  overlay.innerHTML = '<div class="minigame-title">💰 Tip Jar</div><div class="minigame-sub">Tap the HIGHEST number before it disappears!</div><div class="minigame-timer" id="mgTimer">Round 1/'+maxRounds+'</div><div class="minigame-arena" id="mgArena"></div><div class="minigame-score" id="mgScore">Tips: 0</div>';
  document.body.appendChild(overlay);

  var arena = overlay.querySelector('#mgArena');
  var scoreEl = overlay.querySelector('#mgScore');
  var timerEl = overlay.querySelector('#mgTimer');

  function showRound(){
    round++;
    if(round > maxRounds){
      var bonus = totalTipped * getClickPower() * getMiniGameRewardMult();
      addBeans(bonus);
      playMGResult();
      overlay.innerHTML = '<div class="minigame-title">💰 Results!</div><div class="minigame-sub">Total tips collected: '+totalTipped+'</div><div class="minigame-result">+'+fmt(bonus)+' beans</div>';
      setTimeout(function(){ overlay.remove(); minigameActive = false; updateDisplay(); }, 2500);
      return;
    }
    timerEl.textContent = 'Round '+round+'/'+maxRounds;
    arena.innerHTML = '';

    var values = [1, 5, 10, 25, 50];
    // Shuffle
    for(var i = values.length - 1; i > 0; i--){
      var j = Math.floor(Math.random()*(i+1));
      var t = values[i]; values[i] = values[j]; values[j] = t;
    }
    // Show 3-4 random values
    var count = 3 + Math.floor(Math.random()*2);
    var shown = values.slice(0, count);
    var highest = Math.max.apply(null, shown);
    var roundDone = false;

    shown.forEach(function(val){
      var el = document.createElement('div');
      el.className = 'mg-number';
      el.textContent = val;
      el.style.left = (10 + Math.random()*70) + '%';
      el.style.top = (10 + Math.random()*70) + '%';
      el.style.fontSize = (1.2 + val/30) + 'rem';

      function tapNum(e){
        e.stopPropagation(); e.preventDefault();
        if(roundDone) return;
        roundDone = true;
        totalTipped += val;
        if(val === highest) playMGTap(); else playMGWrong();
        scoreEl.textContent = 'Tips: ' + totalTipped;
        el.style.transform = 'scale(1.5)';
        el.style.color = val === highest ? '#00ff00' : '#ff4444';
        setTimeout(showRound, 600);
      }
      el.addEventListener('click', tapNum);
      el.addEventListener('touchstart', function(e){e.preventDefault();tapNum(e);},{passive:false});
      arena.appendChild(el);
    });

    // Auto-advance if no tap in 1.5s
    setTimeout(function(){
      if(!roundDone && document.body.contains(overlay)){
        roundDone = true;
        showRound();
      }
    }, 1500);
  }

  showRound();
}

// ── Mini-game 5: Coffee Memory ──
function startCoffeeMemory(){
  if(minigameActive) return;
  var now = Date.now();
  var cd = getMiniGameCooldown();
  if(now - (miniGameCooldowns.memory||0) < cd) return;
  minigameActive = true;
  miniGameCooldowns.memory = now;
  hideMinigameButton();
  playMiniGameJingle('memory');

  var overlay = document.createElement('div');
  overlay.className = 'minigame-overlay';

  var emojis = ['☕','🥤','🧋','🫖'];
  // Create a random pattern of 4
  var pattern = [];
  for(var i = 0; i < 4; i++){
    pattern.push(emojis[Math.floor(Math.random()*emojis.length)]);
  }

  overlay.innerHTML = '<div class="minigame-title">🧠 Coffee Memory</div><div class="minigame-sub">Memorize the pattern, then tap in order!</div><div class="minigame-timer" id="mgTimer">Memorize...</div><div style="text-align:center;margin:16px 0" id="mgCards"></div><div class="minigame-score" id="mgScore"></div>';
  document.body.appendChild(overlay);

  var cardsEl = overlay.querySelector('#mgCards');
  var timerEl = overlay.querySelector('#mgTimer');
  var scoreEl = overlay.querySelector('#mgScore');

  // Show pattern
  pattern.forEach(function(emoji){
    var card = document.createElement('span');
    card.className = 'mg-card revealed';
    card.textContent = emoji;
    cardsEl.appendChild(card);
  });

  // After 3 seconds, hide and let player tap
  setTimeout(function(){
    if(!document.body.contains(overlay)) return;
    timerEl.textContent = 'Tap in order!';

    // Show all 4 possible emojis as choices
    cardsEl.innerHTML = '';
    var tappedIndex = 0;
    var correct = true;

    emojis.forEach(function(emoji){
      var card = document.createElement('span');
      card.className = 'mg-card';
      card.textContent = emoji;
      card.style.cursor = 'pointer';

      function tapCard(e){
        e.stopPropagation(); e.preventDefault();
        if(tappedIndex >= pattern.length) return;

        if(emoji === pattern[tappedIndex]){
          playMGTap();
          scoreEl.textContent = (tappedIndex+1) + '/' + pattern.length + ' correct!';
          tappedIndex++;
          card.style.transform = 'scale(1.1)';
          setTimeout(function(){ card.style.transform = 'scale(1)'; }, 100);
        } else {
          playMGWrong();
          correct = false;
          tappedIndex = pattern.length; // end it
          scoreEl.textContent = 'Wrong!';
        }

        if(tappedIndex >= pattern.length){
          // Game over
          setTimeout(function(){
            var bonus;
            if(correct){
              bonus = state.fps * 120 * getMiniGameRewardMult(); // big bonus
            } else {
              bonus = state.fps * 10 * getMiniGameRewardMult(); // consolation
            }
            addBeans(bonus);
            playMGResult();
            overlay.innerHTML = '<div class="minigame-title">🧠 Results!</div><div class="minigame-sub">' + (correct ? 'Perfect memory!' : 'Not quite... consolation prize!') + '</div><div class="minigame-result">+'+fmt(bonus)+' beans</div>';
            setTimeout(function(){ overlay.remove(); minigameActive = false; updateDisplay(); }, 2500);
          }, 500);
        }
      }
      card.addEventListener('click', tapCard);
      card.addEventListener('touchstart', function(e){e.preventDefault();tapCard(e);},{passive:false});
      cardsEl.appendChild(card);
    });
  }, 3000);
}

    '<div class="stat-row"><span class="stat-label">Total beans (this prestige)</span><span class="stat-value">'+fmt(state.thisPrestigeFish)+'</span></div>' +
    '<div class="stat-row"><span class="stat-label">Current beans</span><span class="stat-value">'+fmt(state.fish)+'</span></div>' +

    '<div class="stat-row"><span class="stat-label">Beans per second</span><span class="stat-value">'+fmt(state.fps)+'</span></div>' +

// ── Display ──
function updateDisplay(){
  state.fps=calcFPS();
  document.getElementById('fishCount').textContent=fmt(state.fish)+' beans';
  document.getElementById('fpsDisplay').textContent=fmt(state.fps)+' beans/sec';
  document.getElementById('clickPower').textContent='+'+fmt(getClickPower())+' per brew';

  let mults=[];
  if(state.prestigeMultiplier>1)mults.push(fmt(state.prestigeMultiplier)+'x prestige');
  const ev=getActiveEvent();
  if(ev&&ev.mult>1)mults.push(ev.mult+'x '+ev.name);
  if(Date.now()<state.frenzyEnd)mults.push('10x caffeine rush!');
  if(Date.now()<state.elderEnd)mults.push('2x double shot');
  document.getElementById('multiplierDisplay').textContent=mults.length?mults.join(' | '):'';

  var nextReq = getNextPrestigeReq();
  var pb = document.getElementById('prestigeBtn');
  if(state.prestigeLevel >= 100){
    pb.style.display = 'block';
    pb.textContent = '☕ GOD SHOT';
    pb.onclick = function(){showToast('You have ascended. There is nothing beyond the God Shot.');};
  } else {
    pb.style.display = state.totalFish >= nextReq * 0.5 ? 'block' : 'none';
    var pd = getPrestigeData();
    var nextName = pd.next ? pd.next.name : '???';
    pb.textContent = '⭐ Prestige → ' + nextName;
    pb.style.opacity = state.totalFish >= nextReq ? '1' : '0.6';
    pb.onclick = function(){showPrestigeConfirm();};
  }

  var progressBar = document.getElementById('prestigeProgressBar');
  var progressLabel = document.getElementById('prestigeProgressLabel');
  if(state.prestigeLevel >= 100){
    progressBar.style.width = '100%';
    progressLabel.textContent = 'GOD SHOT MODE';
  } else {
    var progress = Math.min(state.totalFish / nextReq, 1) * 100;
    progressBar.style.width = progress + '%';
    if(progress > 5){
      progressLabel.textContent = Math.floor(progress) + '% to next prestige';
    } else {
      progressLabel.textContent = '';
    }
  }

  document.getElementById('prestigeBadge').textContent = state.prestigeLevel > 0 ? fmt(state.prestigeMultiplier) + 'x' : '';
  document.getElementById('ppShopBtn').style.display = state.prestigeLevel > 0 ? 'inline-block' : 'none';

  const eBadge=document.getElementById('eventBadge');
  if(ev){eBadge.textContent=ev.emoji+' '+ev.desc;}else{eBadge.textContent='';}

  document.querySelectorAll('.auto-upg').forEach((btn,i)=>{
    const cost=getAutoCost(i);
    btn.classList.toggle('affordable',state.fish>=cost);
    btn.disabled=state.fish<cost;
    const costEl=btn.querySelector('.upg-cost');
    const countEl=btn.querySelector('.upg-count');
    if(costEl)costEl.textContent=fmt(cost)+' beans';
    if(countEl)countEl.textContent=state.autoUpgrades[i];
  });
  document.querySelectorAll('.click-upg').forEach((btn,i)=>{
    if(state.clickUpgrades[i]){
      btn.classList.add('purchased');btn.classList.remove('affordable');btn.disabled=true;
      const costEl=btn.querySelector('.upg-cost');
      if(costEl)costEl.textContent='Owned';
    }else{
      btn.classList.toggle('affordable',state.fish>=clickUpgradeDefs[i].cost);
      btn.disabled=state.fish<clickUpgradeDefs[i].cost;
    }
  });
  document.querySelectorAll('.research-upg').forEach((btn,i)=>{
    if(state.researchUpgrades[i]){
      btn.classList.add('purchased');btn.classList.remove('affordable');btn.disabled=true;
      const costEl=btn.querySelector('.upg-cost');
      if(costEl)costEl.textContent='Owned';
    }else{
      btn.classList.toggle('affordable',state.fish>=researchDefs[i].cost);
      btn.disabled=state.fish<researchDefs[i].cost;
    }
  });

  updateFlounderSize();
  updateBackgroundDepth();
  updateCustomerQueue();
}

function getBuildingIcon(def,count){
  let icon=def.icon;
  if(count>=100)icon='💎'+icon;
  else if(count>=50)icon='🌟'+icon;
  else if(count>=25)icon='⭐'+icon;
  else if(count>=10)icon='✨'+icon;
  return icon;
}

function getMilestoneText(count){
  if(count>=100)return ' [LEGENDARY]';
  if(count>=50)return ' [EPIC]';
  if(count>=25)return ' [RARE]';
  if(count>=10)return ' [UPGRADED]';
  return '';
}

function renderUpgrades(){
  const content=document.getElementById('tabContent');
  content.innerHTML='';

  if(state.activeTab==='buildings'){
    const h1=document.createElement('div');
    h1.className='upgrade-section-title';
    h1.textContent='Auto-Brewers (beans/sec)';
    content.appendChild(h1);
    autoUpgradeDefs.forEach((d,i)=>{
      const btn=document.createElement('button');
      btn.className='upgrade-btn auto-upg';
      const cost=getAutoCost(i);
      const count=state.autoUpgrades[i];
      const icon=getBuildingIcon(d,count);
      const milestone=getMilestoneText(count);
      const effectiveFps=getBuildingFps(i);
      btn.innerHTML='<span class="upg-icon">'+icon+'</span><div class="upg-info"><div class="upg-name">'+d.name+(milestone?'<span class="milestone-badge">'+milestone+'</span>':'')+'</div><div class="upg-desc">+'+effectiveFps+' beans/sec each</div><div class="upg-cost">'+fmt(cost)+' beans</div></div><span class="upg-count">'+count+'</span>';
      btn.onclick=()=>buyAuto(i);
      content.appendChild(btn);
    });
  }else if(state.activeTab==='clicks'){
    const h2=document.createElement('div');
    h2.className='upgrade-section-title';
    h2.textContent='Click Power (permanent)';
    content.appendChild(h2);
    clickUpgradeDefs.forEach((d,i)=>{
      const btn=document.createElement('button');
      btn.className='upgrade-btn click-upg';
      if(state.clickUpgrades[i])btn.classList.add('purchased');
      btn.innerHTML='<span class="upg-icon">'+d.icon+'</span><div class="upg-info"><div class="upg-name">'+d.name+'</div><div class="upg-desc">+'+d.power+' beans per brew</div><div class="upg-cost">'+(state.clickUpgrades[i]?'Owned':fmt(d.cost)+' beans')+'</div></div><span class="upg-count">'+(state.clickUpgrades[i]?'✓':'')+'</span>';
      btn.onclick=()=>buyClick(i);
      if(state.clickUpgrades[i])btn.disabled=true;
      content.appendChild(btn);
    });
  }else if(state.activeTab==='research'){
    const h3=document.createElement('div');
    h3.className='upgrade-section-title';
    h3.textContent='Research (permanent bonuses)';
    content.appendChild(h3);
    researchDefs.forEach((d,i)=>{
      const btn=document.createElement('button');
      btn.className='upgrade-btn research-upg';
      if(state.researchUpgrades[i])btn.classList.add('purchased');
      btn.innerHTML='<span class="upg-icon">'+d.icon+'</span><div class="upg-info"><div class="upg-name">'+d.name+'</div><div class="upg-desc">'+d.desc+'</div><div class="upg-cost">'+(state.researchUpgrades[i]?'Owned':fmt(d.cost)+' beans')+'</div></div><span class="upg-count">'+(state.researchUpgrades[i]?'✓':'')+'</span>';
      btn.onclick=()=>buyResearch(i);
      if(state.researchUpgrades[i])btn.disabled=true;
      content.appendChild(btn);
    });
  }else if(state.activeTab==='prestige'){
    var h4=document.createElement('div');
    h4.className='upgrade-section-title';
    h4.textContent='Prestige Levels (⭐ '+state.prestigeLevel+'/100)';
    content.appendChild(h4);

    var ppRow = document.createElement('div');
    ppRow.className = 'stat-row';
    ppRow.style.marginBottom = '8px';
    ppRow.innerHTML = '<span class="stat-label">Prestige Points</span><span class="stat-value" style="color:var(--gold)">'+state.prestigePoints+' PP</span>';
    content.appendChild(ppRow);

    var shopBtn = document.createElement('button');
    shopBtn.className = 'upgrade-btn affordable';
    shopBtn.innerHTML = '<span class="upg-icon">🛒</span><div class="upg-info"><div class="upg-name">Prestige Point Shop</div><div class="upg-desc">Spend PP on permanent meta-upgrades</div></div>';
    shopBtn.onclick = function(){showPrestigeShop();};
    content.appendChild(shopBtn);

    if(state.prestigeLevel >= 75){
      var autoBtn = document.createElement('button');
      autoBtn.className = 'upgrade-btn' + (state.autoPrestige ? ' purchased' : ' affordable');
      autoBtn.innerHTML = '<span class="upg-icon">🔄</span><div class="upg-info"><div class="upg-name">Auto-Prestige</div><div class="upg-desc">'+(state.autoPrestige?'ON: Will prestige automatically':'OFF: Click to enable auto-prestige')+'</div></div>';
      autoBtn.onclick = function(){
        state.autoPrestige = !state.autoPrestige;
        showToast('Auto-prestige: ' + (state.autoPrestige ? 'ON' : 'OFF'));
        renderUpgrades();
      };
      content.appendChild(autoBtn);
    }

    var h5 = document.createElement('div');
    h5.className = 'upgrade-section-title';
    h5.textContent = 'Level Roadmap';
    content.appendChild(h5);

    var startShow = Math.max(0, state.prestigeLevel - 2);
    var endShow = Math.min(PRESTIGE_LEVELS.length, state.prestigeLevel + 8);
    for(var li = startShow; li < endShow; li++){
      var pl = PRESTIGE_LEVELS[li];
      var isCompleted = state.prestigeLevel >= pl.level;
      var isCurrent = state.prestigeLevel === pl.level - 1;
      var canPrestige = state.totalFish >= pl.req && isCurrent;

      var lvlBtn = document.createElement('div');
      lvlBtn.className = 'upgrade-btn' + (isCompleted ? ' purchased' : (canPrestige ? ' affordable' : ''));
      lvlBtn.style.cursor = 'default';
      lvlBtn.innerHTML = '<span class="upg-icon">' + pl.icon + '</span><div class="upg-info"><div class="upg-name">Lv.' + pl.level + ': ' + pl.name + '</div><div class="upg-desc">' + pl.unlock + '</div><div class="upg-cost">' + (isCompleted ? 'Complete' : fmt(pl.req) + ' beans | ' + fmt(pl.mult) + 'x mult') + '</div></div>';
      content.appendChild(lvlBtn);
    }
  }else if(state.activeTab==='minigames'){
    var mgh = document.createElement('div');
    mgh.className = 'upgrade-section-title';
    mgh.textContent = 'Mini-Games (available every 3 min)';
    content.appendChild(mgh);

    var now = Date.now();
    var cd = getMiniGameCooldown();

    var mgStartFuncs = {latte:startLatteArt, bean:startBeanSort, speed:startSpeedBrew, tip:startTipJar, memory:startCoffeeMemory};

    MINIGAME_DEFS.forEach(function(mg){
      var timeSince = now - (miniGameCooldowns[mg.id] || 0);
      var isReady = timeSince >= cd;
      var el = document.createElement('div');
      el.className = 'mg-list-item' + (isReady ? ' ready' : ' cooldown');
      var statusText = isReady ? '<span style="color:var(--gold)">READY!</span>' : '<span style="color:var(--dim)">' + Math.ceil((cd - timeSince)/1000) + 's</span>';
      el.innerHTML = '<span class="mg-list-icon">'+mg.icon+'</span><div class="mg-list-info"><div class="mg-list-name">'+mg.name+'</div><div class="mg-list-desc">'+mg.desc+'</div></div><span class="mg-list-status">'+statusText+'</span>';
      if(isReady){
        el.onclick = function(){ mgStartFuncs[mg.id](); };
      }
      content.appendChild(el);
    });
  }
}

// ── Game loop ──
let lastTick=Date.now();
let tickCount=0;
function gameTick(){
  const now=Date.now();
  const dt=(now-lastTick)/1000;
  lastTick=now;
  state.fps=calcFPS();
  if(state.fps>0){
    const earned=state.fps*dt;
    state.fish+=earned;
    state.totalFish+=earned;
    state.allTimeFish+=earned;
    state.thisPrestigeFish+=earned;
  }
  tickCount++;
  if(tickCount%30===0){
    updateDisplay();
    checkAchievements();
    checkMinigameAvailable();
    if(state.activeTab === 'minigames') renderUpgrades(); // refresh cooldowns
    if(state.autoPrestige && state.prestigeLevel < 100){
      var nextReq = getNextPrestigeReq();
      if(state.totalFish >= nextReq){
        doPrestige();
      }
    }
  }else if(tickCount%5===0){
    document.getElementById('fishCount').textContent=fmt(state.fish)+' beans';
    document.getElementById('fpsDisplay').textContent=fmt(state.fps)+' beans/sec';
  }
  requestAnimationFrame(gameTick);
}

// ── Save/Load ──
function saveGame(){
  const data={
    fish:state.fish,totalFish:state.totalFish,totalFlicks:state.totalFlicks,
    allTimeFish:state.allTimeFish,thisPrestigeFish:state.thisPrestigeFish,
    clickPower:state.clickPower,autoUpgrades:state.autoUpgrades,
    clickUpgrades:state.clickUpgrades,researchUpgrades:state.researchUpgrades,
    prestigeLevel:state.prestigeLevel,prestigeMultiplier:state.prestigeMultiplier,
    achievements:[...state.achievements],lastSave:Date.now(),
    goldenClicked:state.goldenClicked,goldenBonuses:state.goldenBonuses,
    totalTimePlayed:state.totalTimePlayed+Math.floor((Date.now()-state.sessionStart)/1000),
    offlineEarnings:state.offlineEarnings,
    prestigePoints:state.prestigePoints,
    ppUpgrades:state.ppUpgrades,
    prestigeHistory:state.prestigeHistory,
    fastestPrestige:state.fastestPrestige,
    highestFishAtPrestige:state.highestFishAtPrestige,
    autoPrestige:state.autoPrestige
  };
  try{localStorage.setItem('coffeeClicker',JSON.stringify(data));}catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem('coffeeClicker');
    if(!raw)return;
    const d=JSON.parse(raw);
    state.fish=d.fish||0;
    state.totalFish=d.totalFish||0;
    state.allTimeFish=d.allTimeFish||d.totalFish||0;
    state.thisPrestigeFish=d.thisPrestigeFish||0;
    state.totalFlicks=d.totalFlicks||0;
    state.autoUpgrades=d.autoUpgrades||[0,0,0,0,0,0,0,0];
    state.clickUpgrades=d.clickUpgrades||[false,false,false,false,false];
    state.researchUpgrades=d.researchUpgrades||new Array(15).fill(false);
    state.prestigeLevel=d.prestigeLevel||0;
    state.prestigeMultiplier=d.prestigeMultiplier||1;
    state.achievements=new Set(d.achievements||[]);
    state.goldenClicked=d.goldenClicked||0;
    state.goldenBonuses=d.goldenBonuses||0;
    state.totalTimePlayed=d.totalTimePlayed||0;
    state.offlineEarnings=d.offlineEarnings||0;
    state.prestigePoints=d.prestigePoints||0;
    state.ppUpgrades=d.ppUpgrades||{};
    state.prestigeHistory=d.prestigeHistory||[];
    state.fastestPrestige=d.fastestPrestige||Infinity;
    state.highestFishAtPrestige=d.highestFishAtPrestige||0;
    state.autoPrestige=d.autoPrestige||false;

    state.fps=calcFPS();
    if(d.lastSave&&state.fps>0){
      const elapsed=(Date.now()-d.lastSave)/1000;
      const maxOffline=3600*8;
      const secs=Math.min(elapsed,maxOffline);
      if(secs>5){
        var offlineMult = 1;
        if(getPPUpgradeCount('startFishPercent') > 0) offlineMult += 0.1 * getPPUpgradeCount('startFishPercent');
        const earned=state.fps*secs*offlineMult;
        state.fish+=earned;
        state.totalFish+=earned;
        state.allTimeFish+=earned;
        state.thisPrestigeFish+=earned;
        state.offlineEarnings+=earned;
        showToast('Welcome back! +'+fmt(earned)+' beans ('+Math.floor(secs/60)+'m offline)');
      }
    }
  }catch(e){}
}
setInterval(saveGame,10000);

// ── Steam particles ──
function createBubbles(){
  const bg=document.getElementById('bubbleBg');
  for(let i=0;i<20;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const size=6+Math.random()*35;
    b.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;animation-duration:'+(6+Math.random()*14)+'s;animation-delay:'+Math.random()*10+'s';
    bg.appendChild(b);
  }
}

// ── Ticker ──
function createTicker(){
  const track=document.getElementById('tickerTrack');
  var allMessages = tickerMessages.slice();
  for(var si=allMessages.length-1;si>0;si--){
    var j=Math.floor(Math.random()*(si+1));
    var tmp=allMessages[si];allMessages[si]=allMessages[j];allMessages[j]=tmp;
  }
  var subset = allMessages.slice(0, 20);
  var msgs=[...subset,...subset];
  track.innerHTML='';
  msgs.forEach(m=>{
    const span=document.createElement('span');
    span.className='ticker-item';
    span.textContent='📰 '+m;
    track.appendChild(span);
  });
}

// ── Narrator (cancel → 60ms → speak) ──
let lastNarration=0;
function tryNarrate(){
  if(!window.speechSynthesis)return;
  const now=Date.now();
  if(now-lastNarration<25000)return;
  if(state.totalFlicks<3)return;
  lastNarration=now;
  const line=narratorLines[Math.floor(Math.random()*narratorLines.length)];
  speechSynthesis.cancel();
  setTimeout(function(){
    const u=new SpeechSynthesisUtterance(line);
    u.rate=0.85;u.pitch=0.8;u.volume=0.4;
    const voices=speechSynthesis.getVoices();
    const brit=voices.find(v=>/en.GB/i.test(v.lang))||voices.find(v=>/en/i.test(v.lang));
    if(brit)u.voice=brit;
    speechSynthesis.speak(u);
  }, 60);
}
setInterval(tryNarrate,25000);

setInterval(updateFunFact, 30000);

// Barista quotes every 20 seconds

setTimeout(updateBaristaQuote, 2000); // Show first one after 2s

// Customer queue updates with display

setInterval(()=>{state.totalTimePlayed++;},1000);

    state.fps=calcFPS();
