<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AWPP Methodology — Interactive Learning</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
a{color:#ff6b35;text-decoration:none}
a:hover{text-decoration:underline}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:#101020;border-bottom:1px solid #1a1a2e}
.topbar a{font-size:14px}
.topbar h1{font-size:18px;color:#ff6b35;flex:1}
.tabs{display:flex;gap:2px;background:#101020;padding:4px 16px 0}
.tab{padding:10px 22px;cursor:pointer;border-radius:8px 8px 0 0;font-weight:600;font-size:14px;color:#888;background:#0d0d18;transition:.2s;border:1px solid transparent;border-bottom:none}
.tab:hover{color:#ccc;background:#14142a}
.tab.active{color:#ff6b35;background:#0a0a12;border-color:#1a1a2e}
.panel{display:none;padding:20px;max-width:960px;margin:0 auto}
.panel.active{display:block}
.lesson{background:#101020;border:1px solid #1a1a2e;border-radius:10px;margin-bottom:12px;overflow:hidden}
.lesson-head{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:600;transition:.2s}
.lesson-head:hover{background:#14142a}
.lesson-head .num{background:#ff6b35;color:#0a0a12;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.lesson-head .check{margin-left:auto;font-size:18px;opacity:.3}
.lesson-head .check.done{opacity:1;color:#4caf50}
.lesson-body{padding:0 18px 18px;display:none;line-height:1.7;font-size:14px}
.lesson-body.open{display:block}
.lesson-body h3{color:#ff6b35;margin:14px 0 6px;font-size:15px}
.lesson-body p{margin:6px 0}
.lesson-body ul{margin:6px 0 6px 20px}
.lesson-body li{margin:3px 0}
.principle{background:#1a1a2e;padding:12px 16px;border-left:3px solid #ff6b35;border-radius:0 6px 6px 0;margin:10px 0;font-style:italic}
canvas{display:block;margin:12px auto;border-radius:8px;background:#0d0d18;cursor:pointer;max-width:100%}
.btn{background:#ff6b35;color:#0a0a12;border:none;padding:8px 18px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px;transition:.2s}
.btn:hover{background:#ff8c5a}
.btn.sm{padding:5px 12px;font-size:12px}
.btn.outline{background:transparent;color:#ff6b35;border:1px solid #ff6b35}
.btn.outline:hover{background:#ff6b3520}
.tts-btn{position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;z-index:99}
/* Drag areas */
.drag-zone{min-height:60px;background:#14142a;border:2px dashed #2a2a4e;border-radius:8px;padding:8px;margin:6px 0;display:flex;flex-wrap:wrap;gap:6px;transition:.2s}
.drag-zone.over{border-color:#ff6b35;background:#1a1020}
.drag-item{padding:6px 12px;border-radius:6px;cursor:grab;font-size:13px;font-weight:500;user-select:none;transition:.15s}
.drag-item:active{cursor:grabbing;opacity:.7}
.drag-item.cwp{background:#1e3a5f;color:#7eb8ff;border:1px solid #2a5a8f}
.drag-item.ewp{background:#2e1f5e;color:#b39dff;border:1px solid #4a3580}
.drag-item.iwp{background:#1a4a2e;color:#7fff9a;border:1px solid #2a6a3e}
.drag-item.scope{background:#2a2a3e;color:#ccc;border:1px solid #3a3a5e}
.step-nav{display:flex;gap:8px;margin:16px 0;justify-content:center}
.step-dot{width:10px;height:10px;border-radius:50%;background:#2a2a4e;transition:.2s}
.step-dot.active{background:#ff6b35}
.step-dot.done{background:#4caf50}
/* Constraint board */
.constraint-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#14142a;border-radius:6px;margin:4px 0;cursor:pointer;transition:.2s}
.constraint-row:hover{background:#1a1a3e}
.constraint-indicator{width:14px;height:14px;border-radius:50%;border:2px solid #555;transition:.3s}
.constraint-indicator.green{background:#4caf50;border-color:#4caf50}
.constraint-indicator.red{background:#e53935;border-color:#e53935}
/* Glossary */
.search-box{width:100%;padding:10px 14px;background:#101020;border:1px solid #2a2a4e;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:14px}
.search-box:focus{outline:none;border-color:#ff6b35}
.gloss-item{background:#101020;border:1px solid #1a1a2e;border-radius:8px;padding:14px;margin-bottom:8px}
.gloss-item .term{color:#ff6b35;font-weight:700;font-size:15px}
.gloss-item .acr{color:#888;font-size:12px;margin-left:6px}
.gloss-item .def{margin-top:4px;font-size:13px;line-height:1.6}
.gloss-item .ex{color:#aaa;font-size:12px;margin-top:4px;font-style:italic}
/* Tools */
.tool-card{background:#101020;border:1px solid #1a1a2e;border-radius:10px;padding:18px;margin-bottom:14px}
.tool-card h3{color:#ff6b35;margin-bottom:10px}
.tool-card table{width:100%;border-collapse:collapse;font-size:13px;margin:8px 0}
.tool-card th,.tool-card td{padding:7px 10px;border:1px solid #1a1a2e;text-align:left}
.tool-card th{background:#14142a;color:#ff6b35}
.tool-card input[type=number]{width:100%;padding:6px;background:#14142a;border:1px solid #2a2a4e;border-radius:4px;color:#e0e0e0}
.tool-card label{font-size:13px;color:#aaa}
.result-box{background:#1a1a2e;padding:12px;border-radius:6px;margin-top:10px;font-size:14px;text-align:center}
.score-bar{height:20px;background:#1a1a2e;border-radius:10px;overflow:hidden;margin:8px 0}
.score-fill{height:100%;background:linear-gradient(90deg,#ff6b35,#4caf50);border-radius:10px;transition:width .5s}
.progress-bar{display:flex;gap:4px;margin:8px 0}
.progress-pip{flex:1;height:4px;background:#1a1a2e;border-radius:2px}
.progress-pip.done{background:#ff6b35}
.timeline-step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;cursor:pointer}
.timeline-num{width:28px;height:28px;border-radius:50%;background:#1a1a2e;color:#888;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:.2s;border:2px solid #2a2a4e}
.timeline-num.hl{background:#ff6b35;color:#0a0a12;border-color:#ff6b35}
.timeline-text{font-size:13px;line-height:1.5}
.timeline-text strong{color:#ff6b35}
.timeline-detail{font-size:12px;color:#888;margin-top:4px;display:none}
.timeline-detail.show{display:block}
@media print{body{background:#fff;color:#000}.topbar,.tabs,.tts-btn{display:none}.panel{display:block!important;max-width:100%}.tool-card{border-color:#ccc;break-inside:avoid}}
@media(max-width:600px){.tabs{overflow-x:auto}.tab{padding:8px 14px;font-size:13px;white-space:nowrap}.panel{padding:14px}.drag-item{font-size:12px;padding:5px 9px}}
</style>
</head>
<body>
<div class="topbar"><a href="index.html">← Home</a><h1>🏗️ AWPP Methodology</h1><div class="progress-bar" id="progBar"></div></div>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<button class="btn tts-btn" id="ttsBtn" title="Read aloud">🔊</button>
<script>
const TAB_NAMES=['LEARN','PRACTICE','GLOSSARY','TOOLS'];
const LS_KEY='awpp_progress';
let state=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
if(!state.lessons)state.lessons=[false,false,false,false,false];
if(!state.score)state.score=0;
function save(){localStorage.setItem(LS_KEY,JSON.stringify(state))}

/* --- TABS --- */
const tabsEl=document.getElementById('tabs'),panelsEl=document.getElementById('panels');
TAB_NAMES.forEach((n,i)=>{
 const t=document.createElement('div');t.className='tab'+(i===0?' active':'');t.textContent=n;
 t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.getElementById('panel-'+i).classList.add('active');};
 tabsEl.appendChild(t);
 const p=document.createElement('div');p.className='panel'+(i===0?' active':'');p.id='panel-'+i;panelsEl.appendChild(p);
});
const panels=TAB_NAMES.map((_,i)=>document.getElementById('panel-'+i));

function updateProgress(){
 const bar=document.getElementById('progBar');bar.innerHTML='';
 state.lessons.forEach(d=>{const p=document.createElement('div');p.className='progress-pip'+(d?' done':'');bar.appendChild(p);});
}
updateProgress();

/* ===================== TAB 0: LEARN ===================== */
const lessons=[
{title:'What is AWPP/AWP?',icon:'📘',content:`
<h3>Definition</h3>
<p>AWPP (Activity-based Work Packaging Planning), also known as <strong>AWP (Advanced Work Packaging)</strong>, is a disciplined approach to project planning that organizes all project deliverables and work into logical, manageable <strong>work packages</strong> before execution begins.</p>
<div class="principle">"Plan the work, then work the plan." — The fundamental AWPP principle</div>
<h3>Why does AWPP exist?</h3>
<p>Traditional construction projects often suffer from poor coordination between engineering, procurement, and construction. Work arrives at the field incomplete — missing drawings, materials, or permits. AWPP solves this by ensuring <strong>everything needed is assembled before work starts</strong>.</p>
<h3>Key Goals</h3>
<ul>
<li><strong>Predictable execution</strong> — know exactly what will be built, when, and with what resources</li>
<li><strong>Reduced rework</strong> — complete information means fewer errors and changes</li>
<li><strong>Improved productivity</strong> — foremen spend time building, not chasing information</li>
<li><strong>Better safety</strong> — hazards identified and mitigated before work begins</li>
</ul>
<h3>The Work Package Hierarchy</h3>
<canvas id="cv0" width="700" height="220"></canvas>
<p style="text-align:center;color:#888;font-size:12px">Click each level for details</p>
<h3>Industry Adoption</h3>
<p>AWPP/AWP has been adopted globally by organizations like the Construction Industry Institute (CII) and COAA (Construction Owners Association of Alberta). Studies show projects using AWP achieve <strong>10-25% productivity improvements</strong> and significant schedule predictability gains.</p>
`},
{title:'The Work Package Hierarchy',icon:'📦',content:`
<h3>Three Levels of Work Packages</h3>
<p>AWPP organizes work into three nested levels. Each level serves a different planning purpose and audience.</p>
<canvas id="cv1" width="700" height="350"></canvas>
<p style="text-align:center;color:#888;font-size:12px">Click any box for details</p>
<div id="wpDetail" style="margin-top:10px"></div>
<h3>How They Relate</h3>
<ul>
<li>A project has many <strong>CWPs</strong> (typically 20-100+ depending on size)</li>
<li>Each CWP is supported by one or more <strong>EWPs</strong></li>
<li>Each CWP is broken into multiple <strong>IWPs</strong> (5-20+ per CWP)</li>
<li>An IWP is sized for one crew, one discipline, ~1-2 weeks of work</li>
</ul>
<h3>Real Example</h3>
<p><strong>Project:</strong> New warehouse facility</p>
<ul>
<li><strong>CWP-001:</strong> "Foundation — Warehouse" (all foundation work)</li>
<li><strong>EWP-F01:</strong> Foundation design drawings &amp; rebar schedules</li>
<li><strong>IWP-001-A:</strong> "Excavation — Grid A-D" (crew of 4, 5 days)</li>
<li><strong>IWP-001-B:</strong> "Rebar — Footings A-D" (crew of 6, 4 days)</li>
<li><strong>IWP-001-C:</strong> "Concrete pour — Footings A-D" (crew of 8, 2 days)</li>
</ul>
`},
{title:'Path of Construction',icon:'🗺️',content:`
<h3>What is the Path of Construction?</h3>
<p>The <strong>Path of Construction (PoC)</strong> is the planned geographical and logical sequence in which a project will be built. It is the single most important planning decision in AWPP because it drives everything downstream.</p>
<h3>Why It Matters</h3>
<ul>
<li>Determines the order CWPs are executed</li>
<li>Drives engineering priorities (which drawings are needed first)</li>
<li>Sets procurement timing (which materials to order first)</li>
<li>Establishes construction equipment and crew deployment</li>
</ul>
<h3>Interactive: Set the Build Sequence</h3>
<p>Drag these construction phases into the correct order:</p>
<div id="pocZone" class="drag-zone"></div>
<div id="pocFeedback" style="margin:8px 0;font-size:13px"></div>
<button class="btn sm" onclick="checkPoC()">Check Order</button>
<h3>Downstream Impact</h3>
<p>When you change the Path of Construction, <strong>everything shifts</strong>: engineering schedules, procurement dates, subcontractor mobilization, and crane/equipment plans. This is why PoC must be established early and agreed upon by all stakeholders.</p>
`},
{title:'Constraint Analysis',icon:'🔍',content:`
<h3>What are Constraints?</h3>
<p>A <strong>constraint</strong> is anything that must be in place or resolved before an IWP can be executed in the field. If any constraint is unresolved, the IWP is <strong>not ready</strong> and should not be released to the field.</p>
<h3>The 8 Common Constraints</h3>
<p>Try it: click each constraint to toggle its status. The IWP can only be released when <strong>all 8 are green</strong>.</p>
<div id="constraintBoard"></div>
<div id="constraintResult" style="margin:10px 0;font-size:14px;font-weight:600"></div>
<h3>Why This Matters</h3>
<p>Releasing an IWP with unresolved constraints leads to:</p>
<ul>
<li>Idle crews waiting for materials or information</li>
<li>Rework when incomplete drawings cause errors</li>
<li>Safety incidents from inadequate planning</li>
<li>Schedule delays that cascade through the project</li>
</ul>
<div class="principle">A well-run AWPP project targets 100% constraint-free IWPs at release. Industry benchmark: ≥90%.</div>
`},
{title:'The AWPP Process Flow',icon:'🔄',content:`
<h3>End-to-End AWPP Process</h3>
<p>Click each step to learn more about what happens at that stage:</p>
<div id="timeline"></div>
<h3>Timing</h3>
<p>The AWPP process begins at <strong>project sanction</strong> (or even earlier in feasibility). CWPs are defined during early engineering. IWPs are developed <strong>4-6 weeks before execution</strong>, giving enough time to identify and remove constraints.</p>
<div class="principle">AWPP is not just a construction tool — it is a project-wide philosophy that aligns engineering, procurement, construction, and commissioning from day one.</div>
`}
];

const timelineSteps=[
{t:'Define Path of Construction',d:'Establish the geographical and logical build sequence. This decision drives all downstream planning. Involves construction, engineering, and project management.'},
{t:'Develop CWP Breakdown',d:'Divide the total project scope into Construction Work Packages. Each CWP is a logical chunk of construction work, typically aligned with an area, system, or discipline.'},
{t:'Align EWPs to CWPs',d:'Engineering Work Packages are created and mapped to the CWPs they support. This ensures engineering delivers drawings and specs in the order construction needs them.'},
{t:'Identify Constraints Early',d:'Begin identifying what is needed for each scope of work: materials, equipment, labor, permits, safety plans, prerequisite work. Start procurement and long-lead items.'},
{t:'Develop IWPs (4-6 weeks ahead)',d:'Break each CWP into Installation Work Packages. Each IWP is crew-sized (1 crew, 1-2 weeks). Include scope, drawings, material lists, safety plans, quality requirements.'},
{t:'Constraint Removal (ongoing)',d:'Actively track and resolve constraints. Coordinate with procurement, engineering, safety, and subcontractors. Use constraint logs and look-ahead meetings.'},
{t:'Release IWPs (constraint-free)',d:'Only release IWPs to the field when ALL constraints are resolved. A constraint-free IWP means the foreman has everything needed to execute without delays.'},
{t:'Execute and Track',d:'Field crews execute IWPs. Track progress daily. Measure planned vs actual. Report productivity metrics. Feed information back to planners.'},
{t:'Close Out and Lessons Learned',d:'Complete IWPs, update as-builts, compile turnover packages. Capture lessons learned to improve the process for future projects.'}
];

const constraints=[
{name:'Engineering',desc:'Drawings approved and issued for construction',icon:'📐'},
{name:'Materials',desc:'All materials received and staged at site',icon:'📦'},
{name:'Equipment',desc:'Required equipment/tools available',icon:'🏗️'},
{name:'Labor',desc:'Qualified crew assigned and available',icon:'👷'},
{name:'Quality (ITP)',desc:'Inspection/test plans prepared',icon:'✅'},
{name:'Safety',desc:'Safety plan and JHA completed',icon:'🦺'},
{name:'Environment',desc:'Environmental permits and controls in place',icon:'🌿'},
{name:'Pre-requisite Work',desc:'Prior work activities completed',icon:'🔗'}
];

(function buildLearnTab(){
 let html='';
 lessons.forEach((l,i)=>{
  html+=`<div class="lesson"><div class="lesson-head" onclick="toggleLesson(${i})">
   <span class="num">${i+1}</span><span>${l.icon} ${l.title}</span>
   <span class="check ${state.lessons[i]?'done':''}" id="lcheck${i}">✔</span></div>
   <div class="lesson-body" id="lbody${i}">${l.content}</div></div>`;
 });
 panels[0].innerHTML=html;
})();

function toggleLesson(i){
 const b=document.getElementById('lbody'+i);
 const isOpen=b.classList.contains('open');
 document.querySelectorAll('.lesson-body').forEach(x=>x.classList.remove('open'));
 if(!isOpen){b.classList.add('open');state.lessons[i]=true;save();updateProgress();
  document.getElementById('lcheck'+i).classList.add('done');
  setTimeout(()=>{if(i===0)drawHierarchy0();if(i===1)drawHierarchy1();if(i===2)initPoC();if(i===3)initConstraints();if(i===4)initTimeline();},50);
 }
}

/* Canvas: Lesson 0 hierarchy */
function drawHierarchy0(){
 const c=document.getElementById('cv0');if(!c)return;
 const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
 const boxes=[{x:270,y:15,w:160,h:36,t:'Project',c:'#ff6b35'},
  {x:270,y:75,w:160,h:36,t:'CWP',c:'#1e3a5f',tc:'#7eb8ff'},
  {x:120,y:145,w:160,h:36,t:'EWP',c:'#2e1f5e',tc:'#b39dff'},
  {x:420,y:145,w:160,h:36,t:'IWP',c:'#1a4a2e',tc:'#7fff9a'}];
 // lines
 ctx.strokeStyle='#333';ctx.lineWidth=2;
 ctx.beginPath();ctx.moveTo(350,51);ctx.lineTo(350,75);ctx.stroke();
 ctx.beginPath();ctx.moveTo(350,111);ctx.lineTo(200,145);ctx.stroke();
 ctx.beginPath();ctx.moveTo(350,111);ctx.lineTo(500,145);ctx.stroke();
 boxes.forEach(b=>{
  ctx.fillStyle=b.c;roundRect(ctx,b.x,b.y,b.w,b.h,8);ctx.fill();
  ctx.fillStyle=b.tc||'#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(b.t,b.x+b.w/2,b.y+b.h/2);
 });
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

/* Canvas: Lesson 1 interactive hierarchy */
let wpBoxes=[];
function drawHierarchy1(){
 const c=document.getElementById('cv1');if(!c)return;
 const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
 wpBoxes=[
  {x:250,y:20,w:200,h:50,t:'CWP',sub:'Construction Work Package',c:'#1e3a5f',tc:'#7eb8ff',
   info:'<strong style="color:#7eb8ff">CWP — Construction Work Package</strong><br>A large scope of work defined by construction. Typically covers one area, discipline, or system.<br><em>Example: "Foundation — Building A", "Electrical — Floor 2"</em><br>Contains: scope definition, schedule, budget, drawings list, material list.'},
  {x:60,y:140,w:200,h:50,t:'EWP',sub:'Engineering Work Package',c:'#2e1f5e',tc:'#b39dff',
   info:'<strong style="color:#b39dff">EWP — Engineering Work Package</strong><br>The engineering deliverables that support a CWP. Created by engineering and aligned to the CWP sequence.<br><em>Example: "Structural drawings — Building A Foundation"</em><br>Contains: drawings, specifications, calculations, 3D models, RFIs.'},
  {x:440,y:140,w:200,h:50,t:'IWP',sub:'Installation Work Package',c:'#1a4a2e',tc:'#7fff9a',
   info:'<strong style="color:#7fff9a">IWP — Installation Work Package</strong><br>The field-executable package given to a foreman. Contains EVERYTHING needed to do the work for ~1-2 weeks with one crew.<br><em>Example: "Steel Erection — Level 1 Columns, Grid A-C"</em><br>Contains: scope, drawings, material list, safety plan, quality ITP, tools list, crew assignment.'},
  {x:100,y:260,w:150,h:36,t:'Drawings',c:'#222',tc:'#aaa'},
  {x:290,y:260,w:150,h:36,t:'Specs & Calcs',c:'#222',tc:'#aaa'},
  {x:460,y:260,w:90,h:36,t:'IWP-01',c:'#1a4a2e',tc:'#7fff9a'},
  {x:560,y:260,w:90,h:36,t:'IWP-02',c:'#1a4a2e',tc:'#7fff9a'}
 ];
 // lines
 ctx.strokeStyle='#333';ctx.lineWidth=2;
 [[350,70,160,140],[350,70,540,140],[160,190,175,260],[160,190,365,260],[540,190,505,260],[540,190,605,260]].forEach(l=>{
  ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);ctx.stroke();
 });
 wpBoxes.forEach(b=>{
  ctx.fillStyle=b.c;roundRect(ctx,b.x,b.y,b.w,b.h,8);ctx.fill();
  ctx.fillStyle=b.tc||'#fff';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(b.t,b.x+b.w/2,b.y+b.h/2-(b.sub?8:0));
  if(b.sub){ctx.font='11px sans-serif';ctx.fillText(b.sub,b.x+b.w/2,b.y+b.h/2+10);}
 });
 c.onclick=function(e){
  const r=c.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  const hit=wpBoxes.find(b=>mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h&&b.info);
  document.getElementById('wpDetail').innerHTML=hit?`<div class="principle">${hit.info}</div>`:'';
 };
}

/* Lesson 2: Path of Construction drag */
const pocItems=['Foundation','Structure','MEP Rough-in','Building Envelope','Finishes'];
const pocCorrect=['Foundation','Structure','MEP Rough-in','Building Envelope','Finishes'];
function initPoC(){
 const zone=document.getElementById('pocZone');if(!zone)return;zone.innerHTML='';
 const shuffled=[...pocItems].sort(()=>Math.random()-.5);
 shuffled.forEach(t=>{
  const d=document.createElement('div');d.className='drag-item scope';d.textContent=t;d.draggable=true;
  d.ondragstart=e=>e.dataTransfer.setData('text',t);
  zone.appendChild(d);
 });
 zone.ondragover=e=>{e.preventDefault();zone.classList.add('over')};

/* ===================== TAB 2: GLOSSARY ===================== */
const glossary=[
 {term:'AWP',full:'Advanced Work Packaging',def:'The overarching methodology for organizing project work into manageable packages. Sometimes used interchangeably with AWPP.',ex:'AWP is endorsed by CII and COAA as a best practice for capital projects.'},
 {term:'AWPP',full:'Activity-based Work Packaging Planning',def:'A disciplined planning approach that breaks all deliverables into logical work packages before execution, ensuring everything is ready when crews arrive.',ex:'The project adopted AWPP from day one, resulting in 15% better productivity.'},
 {term:'CWP',full:'Construction Work Package',def:'A large, logical division of construction scope, defined by area, system, or discipline. CWPs are the primary building blocks of the construction plan.',ex:'CWP-003: Structural Steel — Building A, Levels 1-3.'},
 {term:'EWP',full:'Engineering Work Package',def:'A package of engineering deliverables (drawings, specs, calculations) aligned to support a specific CWP. Ensures engineering delivers in the order construction needs.',ex:'EWP-003: Structural design package for Building A steel.'},
 {term:'IWP',full:'Installation Work Package',def:'The smallest, field-executable work package given to a foreman. Sized for one crew, one discipline, approximately 1-2 weeks of work. Contains everything needed to execute.',ex:'IWP-003-A: Steel erection — Level 1 columns, Grid A through D.'},
 {term:'Path of Construction',full:'',def:'The planned geographical and logical sequence in which the project will be built. Drives CWP sequencing, engineering priorities, and procurement timing.',ex:'PoC: Start with foundations in Zone 1, then move east to Zone 2 while Zone 1 starts superstructure.'},
 {term:'Constraint',full:'',def:'Any requirement that must be fulfilled before an IWP can be released to the field. Common constraints include engineering, materials, equipment, labor, safety, quality, environmental, and prerequisite work.',ex:'Constraint: Rebar not delivered — IWP cannot be released until material arrives.'},
 {term:'WBS',full:'Work Breakdown Structure',def:'A hierarchical decomposition of the total project scope into manageable sections. The WBS provides the framework for CWP development.',ex:'WBS Level 3: 1.0 Site Prep → 1.1 Earthwork → 1.1.1 Excavation.'},
 {term:'Work Face Planning',full:'WFP',def:'The process of developing detailed IWPs for field execution. Focuses on ensuring crews have productive, constraint-free work every day.',ex:'The WFP team develops IWPs 4-6 weeks before the planned execution date.'},
 {term:'Turnover Package',full:'TOP',def:'The documentation package handed to the owner/operator at system completion, including as-builts, test records, warranties, and manuals.',ex:'TOP-HVAC-01: Contains all test results, commissioning data, and O&M manuals for the HVAC system.'},
 {term:'System Completion',full:'',def:'The process of verifying that all components of a system are installed, tested, and ready for commissioning.',ex:'Mechanical completion of the fire protection system was achieved on schedule.'},
 {term:'Commissioning',full:'Cx',def:'The systematic process of verifying that building systems perform according to design intent and owner requirements.',ex:'Commissioning of the chilled water system included flow balancing and controls verification.'},
 {term:'Constructability',full:'',def:'The review of engineering designs to ensure they can be efficiently and safely built in the field. A key AWPP principle applied during EWP development.',ex:'Constructability review identified that beam connections should be bolted, not welded, to improve field productivity.'},
 {term:'Look-ahead Schedule',full:'',def:'A rolling short-term schedule (typically 3-6 weeks) used to identify upcoming IWPs and trigger constraint removal activities.',ex:'The 4-week look-ahead shows 12 IWPs scheduled; 3 still have open constraints.'},
 {term:'Constraint Log',full:'',def:'A tracking document that lists all identified constraints, their status, responsible parties, and resolution dates.',ex:'The constraint log shows 45 open items, 12 of which are critical path.'},
 {term:'Scaffold',full:'',def:'Temporary structure used to support workers and materials during construction. Often a constraint category in IWP planning.',ex:'IWP constraint: scaffold at elevation 15m must be erected and inspected before cladding work can begin.'},
 {term:'CWA',full:'Construction Work Area',def:'A defined physical area of the project site used to organize CWPs geographically.',ex:'CWA-North includes Building A foundations, structural steel, and cladding CWPs.'}
];

 const hrs=+document.getElementById('cwpHrs').value;
 const crew=+document.getElementById('crewSize').value;
 const hd=+document.getElementById('hrsDay').value;
 const dur=+document.getElementById('iwpDays').value;
 const hrsPerIWP=crew*hd*dur;
 const count=Math.ceil(hrs/hrsPerIWP);
 document.getElementById('iwpResult').innerHTML=`<strong style="color:#ff6b35;font-size:24px">${count}</strong> IWPs<br>
  <span style="font-size:12px;color:#aaa">${hrsPerIWP} work-hours per IWP (${crew} workers × ${hd} hrs/day × ${dur} days)</span>`;
}

function calcReady(){
 const total=+document.getElementById('totalIWPs').value;
 const free=+document.getElementById('freeIWPs').value;
 const pct=Math.round(free/total*100);
 const color=pct>=90?'#4caf50':pct>=70?'#ff6b35':'#e53935';
 const msg=pct>=90?'Excellent — above industry benchmark (90%)':pct>=70?'Acceptable — work to resolve remaining constraints':'Below target — significant constraint resolution needed';
 document.getElementById('readyResult').innerHTML=`<strong style="color:${color};font-size:24px">${pct}%</strong> Ready<br>
  <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>
  <span style="font-size:12px;color:#aaa">${msg}</span>`;
}

/* ===================== TTS ===================== */
let ttsOn=false;
document.getElementById('ttsBtn').onclick=function(){
 if(ttsOn){speechSynthesis.cancel();ttsOn=false;this.style.background='#ff6b35';return;}
 const active=document.querySelector('.panel.active');
 const text=active.innerText.substring(0,3000);
 if(!text)return;
 const u=new SpeechSynthesisUtterance(text);u.rate=0.95;u.onend=()=>{ttsOn=false;document.getElementById('ttsBtn').style.background='#ff6b35';};
 speechSynthesis.speak(u);ttsOn=true;this.style.background='#4caf50';
};
</script>
