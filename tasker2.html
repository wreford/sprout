  });
  downloadFile(STATE.projectName + '.csv', csv, 'text/csv');
  showToast('Exported P6 CSV', 'success');
}

function exportXER() {
  let xer = 'ERMHDR\t11.0\n';
  xer += '%T\tPROJECT\n%F\tproj_id\tproj_short_name\tproj_name\n';
  xer += `%R\t1\t${STATE.projectName}\t${STATE.projectName}\n`;
  xer += '%T\tCALENDAR\n%F\tclndr_id\tclndr_name\tday_hr_cnt\tweek_hr_cnt\n';
  xer += `%R\t1\t${STATE.calendarDays}d Calendar\t8\t${STATE.calendarDays * 8}\n`;
  xer += '%T\tTASK\n%F\ttask_id\ttask_code\ttask_name\ttarget_drtn_hr_cnt\tremain_drtn_hr_cnt\tphys_complete_pct\ttarget_start_date\ttarget_end_date\ttotal_float_hr_cnt\tfree_float_hr_cnt\n';
  STATE.activities.forEach((a, i) => {
    xer += `%R\t${i+1}\t${a.id}\t${a.name}\t${a.od*8}\t${a.rd*8}\t${a.pct}\t${fmtDate(a.start)}\t${fmtDate(a.finish)}\t${a.tf*8}\t${a.ff*8}\n`;
  });
  xer += '%T\tTASKPRED\n%F\ttask_pred_id\ttask_id\tpred_task_id\tpred_type\tlag_hr_cnt\n';
  let predId = 1;
  STATE.activities.forEach((a, i) => {
    parsePreds(a.preds).forEach(p => {
      const pi = STATE.activities.findIndex(x => x.id === p.id);
      if (pi >= 0) xer += `%R\t${predId++}\t${i+1}\t${pi+1}\tPR_${p.type}\t${p.lag*8}\n`;
    });
  });
  xer += '%E\n';
  downloadFile(STATE.projectName + '.xer', xer, 'text/plain');
  showToast('Exported XER', 'success');
}

function exportMSXML() {
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n<Project xmlns="http://schemas.microsoft.com/project">\n';
  xml += `  <Name>${esc(STATE.projectName)}</Name>\n  <StartDate>${STATE.projectStart}T08:00:00</StartDate>\n  <Tasks>\n`;
  STATE.activities.forEach((a, i) => {
    xml += `    <Task><UID>${i+1}</UID><ID>${i+1}</ID><Name>${esc(a.name)}</Name><Duration>PT${a.od*8}H0M0S</Duration>`;
    xml += `<Start>${fmtDate(a.start)}T08:00:00</Start><Finish>${fmtDate(a.finish)}T17:00:00</Finish>`;
    xml += `<PercentComplete>${a.pct}</PercentComplete><Milestone>${a.actType==='Milestone'?1:0}</Milestone>`;
    xml += `<WBS>${a.wbs}</WBS><TotalSlack>${a.tf*4800}</TotalSlack>`;
    if (a.cost) xml += `<Cost>${a.cost}</Cost>`;
    xml += '</Task>\n';
  });
  xml += '  </Tasks>\n  <Links>\n';
  STATE.activities.forEach((a, i) => {
    parsePreds(a.preds).forEach(p => {
      const pi = STATE.activities.findIndex(x => x.id === p.id);
      if (pi >= 0) {
        const typeMap = {FS:1, FF:0, SS:3, SF:2};
        xml += `    <Link><PredecessorUID>${pi+1}</PredecessorUID><SuccessorUID>${i+1}</SuccessorUID><Type>${typeMap[p.type]||1}</Type>`;
        if (p.lag) xml += `<LinkLag>${p.lag*4800}</LinkLag>`;
        xml += '</Link>\n';
      }
    });
  });
  xml += '  </Links>\n</Project>\n';
  downloadFile(STATE.projectName + '.xml', xml, 'application/xml');
  showToast('Exported MS Project XML', 'success');
}

function copyClipboard() {
  let text = 'ID\tName\tDuration\tStart\tFinish\tFloat\tPredecessors\tResource\tWBS\n';
  STATE.activities.forEach(a => {
    text += `${a.id}\t${a.name}\t${a.od}d\t${fmtDateShort(a.start)}\t${fmtDateShort(a.finish)}\t${a.tf}d\t${a.preds}\t${a.resource}\t${a.wbs}\n`;
  });
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard', 'success'));
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// SETTINGS SHEET
// ============================================================
function openSettings() {
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.id = 'settings-overlay';
  overlay.onclick = closeSettings;

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.id = 'settings-sheet';
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <h2>Project Settings</h2>
    <div class="settings-group">
      <div class="settings-field">
        <label>Project Name</label>
        <input type="text" id="set-name" value="${esc(STATE.projectName)}" onchange="STATE.projectName=this.value;document.getElementById('project-name-display').textContent=this.value;autoSave()">
      </div>
      <div class="settings-field">
        <label>Project Start Date</label>
        <input type="date" id="set-start" value="${STATE.projectStart}" onchange="STATE.projectStart=this.value;schedule();renderAll();autoSave()">
      </div>
      <div class="settings-field">
        <label>Data Date</label>
        <input type="date" id="set-datadate" value="${STATE.dataDate}" onchange="STATE.dataDate=this.value;autoSave()">
      </div>
      <div class="settings-field">
        <label>Calendar</label>
        <select id="set-cal" onchange="STATE.calendarDays=+this.value;STATE.activities.forEach(a=>a.cal=+STATE.calendarDays);schedule();renderAll();autoSave()">
          <option value="5" ${STATE.calendarDays==5?'selected':''}>5 days/week (Mon-Fri)</option>
          <option value="6" ${STATE.calendarDays==6?'selected':''}>6 days/week (Mon-Sat)</option>
          <option value="7" ${STATE.calendarDays==7?'selected':''}>7 days/week</option>
        </select>
      </div>
    </div>
    <div class="settings-group">
      <h3>Holidays</h3>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input type="date" id="add-holiday-date" style="flex:1">
        <button onclick="addHoliday()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;min-width:48px;padding:0 16px">+</button>
      </div>
      <div class="holiday-list" id="holiday-list">
        ${STATE.holidays.map((h, i) => `<div class="holiday-item">
          <span style="flex:1;font-family:var(--mono)">${h}</span>
          <button onclick="removeHoliday(${i})">×</button>
        </div>`).join('')}
        ${!STATE.holidays.length ? '<div style="color:var(--dim);font-size:13px;padding:8px 0">No holidays set</div>' : ''}
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-primary" onclick="closeSettings()">Done</button>
    </div>
  `;

  document.body.appendChild(overlay);
  document.body.appendChild(sheet);
  requestAnimationFrame(() => {
    overlay.classList.add('show');
    sheet.classList.add('show');
  });
}

function closeSettings() {
  const overlay = document.getElementById('settings-overlay');
  const sheet = document.getElementById('settings-sheet');
  if (overlay) { overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 200); }
  if (sheet) { sheet.classList.remove('show'); setTimeout(() => sheet.remove(), 300); }
}

function addHoliday() {
  const input = document.getElementById('add-holiday-date');
  if (!input || !input.value) return;
  STATE.holidays.push(input.value);
  STATE.holidays.sort();
  schedule();
  renderAll();
  autoSave();
  // Re-render settings
  closeSettings();
  setTimeout(openSettings, 350);
}

function removeHoliday(idx) {
  STATE.holidays.splice(idx, 1);
  schedule();
  renderAll();
  autoSave();
  closeSettings();
  setTimeout(openSettings, 350);
}

// ============================================================
// PROJECT NAME EDIT
// ============================================================
function editProjectName() {
  const name = prompt('Project Name:', STATE.projectName);
  if (name !== null && name.trim()) {
    STATE.projectName = name.trim();
    document.getElementById('project-name-display').textContent = STATE.projectName;
    autoSave();
  }
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveProject(silent) {
  if (!STATE.projectId) STATE.projectId = 'p_' + Date.now();
  const data = {
    id: STATE.projectId,
    name: STATE.projectName,
    projectStart: STATE.projectStart,
    dataDate: STATE.dataDate,
    calendarDays: STATE.calendarDays,
    holidays: STATE.holidays,
    activities: STATE.activities,
    resources: STATE.resources,
    nextId: STATE.nextId,
    count: STATE.activities.length
  };

  let projects = [];
  try { projects = JSON.parse(localStorage.getItem('tasker2-projects') || '[]'); } catch(e) {}
  const idx = projects.findIndex(p => p.id === STATE.projectId);
  if (idx >= 0) projects[idx] = data;
  else projects.push(data);
  localStorage.setItem('tasker2-projects', JSON.stringify(projects));
  if (!silent) showToast('Project saved', 'success');
}

let _autoSaveTimer = null;
function autoSave() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => saveProject(true), 1500);
}

function loadProject(pid) {
  let projects = [];
  try { projects = JSON.parse(localStorage.getItem('tasker2-projects') || '[]'); } catch(e) {}
  const proj = projects.find(p => p.id === pid);
  if (!proj) { showToast('Project not found', 'error'); return; }

  STATE.projectId = proj.id;
  STATE.projectName = proj.name || 'Untitled';
  STATE.projectStart = proj.projectStart || today();
  STATE.dataDate = proj.dataDate || today();
  STATE.calendarDays = proj.calendarDays || 5;
  STATE.holidays = proj.holidays || [];
  STATE.activities = (proj.activities || []).map(a => createActivity(a));
  STATE.resources = proj.resources || [];
  STATE.nextId = proj.nextId || (Math.max(...STATE.activities.map(a => a.uid), 0) + 1);
  STATE.undoStack = [];
  STATE.expandedCard = null;

  document.getElementById('project-name-display').textContent = STATE.projectName;
  schedule();
  renderAll();
  showToast(`Loaded "${STATE.projectName}"`, 'success');
  switchTab('activities');
}

function deleteProject(pid) {
  if (!confirm('Delete this project?')) return;
  let projects = [];
  try { projects = JSON.parse(localStorage.getItem('tasker2-projects') || '[]'); } catch(e) {}
  projects = projects.filter(p => p.id !== pid);
  localStorage.setItem('tasker2-projects', JSON.stringify(projects));
  if (pid === STATE.projectId) newProject();
  renderMore();
  showToast('Project deleted');
}

function newProject() {
  STATE.projectId = null;
  STATE.projectName = 'New Project';
  STATE.projectStart = today();
  STATE.dataDate = today();
  STATE.calendarDays = 5;
  STATE.holidays = [];
  STATE.activities = [];
  STATE.resources = [];
  STATE.nextId = 1;
  STATE.undoStack = [];
  STATE.expandedCard = null;

  document.getElementById('project-name-display').textContent = STATE.projectName;
  schedule();
  renderAll();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || 'success');
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('dismissing');
    setTimeout(() => toast.remove(), 200);
  }, 2500);
}

// ============================================================
// UTILITY
// ============================================================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g, '&#039;');
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); openAddSheet(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveProject(); }
});

// Shake to undo (mobile)
let lastShake = 0;
if (window.DeviceMotionEvent) {
  window.addEventListener('devicemotion', e => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    const total = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
    if (total > 45 && Date.now() - lastShake > 2000) {
      lastShake = Date.now();
      doUndo();
    }
  });
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderFilterChips();
  renderSortChips();
  renderActivities();
  if (STATE.activeTab === 'schedule') renderGantt();
  if (STATE.activeTab === 'dashboard') renderDashboard();
  if (STATE.activeTab === 'more') renderMore();
}

// ============================================================
// INIT
// ============================================================
function init() {
  STATE.projectStart = today();
  STATE.dataDate = today();

  // Try to load most recent project
  try {
    const projects = JSON.parse(localStorage.getItem('tasker2-projects') || '[]');
    if (projects.length > 0) {
      const last = projects[projects.length - 1];
      loadProject(last.id);
      return;
    }
  } catch(e) {}

  document.getElementById('project-name-display').textContent = STATE.projectName;
  renderAll();
}

init();
</script>
</body>
</html>
