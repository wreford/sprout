<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Tasker 2 — CPM Project Scheduler</title>
<style>
:root {
  --bg: #0f0f10;
  --surface: #1a1a1c;
  --surface2: #222226;
  --border: #2a2a2d;
  --text: #f0f0f0;
  --dim: #6e6e73;
  --accent: #ff6b35;
  --green: #4ade80;
  --red: #ef4444;
  --gold: #f7c948;
  --blue: #60a5fa;
  --radius: 14px;
  --font: -apple-system, system-ui, sans-serif;
  --mono: ui-monospace, "SF Mono", monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 16px;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--accent); color: #fff; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

input, select, textarea, button {
  font-family: inherit; font-size: 16px; color: var(--text);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}
button {
  cursor: pointer; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  min-height: 48px; transition: all 0.2s ease;
}
button:active { transform: scale(0.96); }
textarea { resize: vertical; min-height: 80px; }

/* ── APP SHELL ── */
#app {
  display: flex; flex-direction: column; height: 100%;
  padding-top: var(--safe-top);
}

/* ── TOP BAR ── */
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; padding-left: calc(16px + var(--safe-left));
  padding-right: calc(16px + var(--safe-right));
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0; min-height: 52px; z-index: 20;
}
.home-link {
  color: var(--dim); text-decoration: none; font-size: 14px;
  font-family: var(--mono); transition: color 0.2s;
  flex-shrink: 0; min-width: 48px; min-height: 48px;
  display: flex; align-items: center;
}
.home-link:hover { color: var(--accent); }
#project-name-display {
  flex: 1; font-weight: 700; font-size: 17px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; padding: 4px 0;
  transition: color 0.2s;
}
#project-name-display:hover { color: var(--accent); }
.topbar-btn {
  background: none; border: none; color: var(--dim);
  font-size: 22px; min-width: 48px; min-height: 48px;
  border-radius: 12px; padding: 0;
  transition: all 0.2s;
}
.topbar-btn:hover { color: var(--text); background: var(--surface2); }

/* ── TAB CONTENT ── */
#tab-content {
  flex: 1; overflow: hidden; position: relative;
}
.tab-panel {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 100px 0;
  opacity: 0; visibility: hidden;
  transition: opacity 0.2s ease;
}
.tab-panel.active {
  opacity: 1; visibility: visible;
}
.tab-inner {
  padding: 12px; padding-left: calc(12px + var(--safe-left));
  padding-right: calc(12px + var(--safe-right));
  max-width: 800px; margin: 0 auto;
}

/* ── BOTTOM TAB BAR ── */
#tab-bar {
  display: flex; background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0; z-index: 20;
}
.tab-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  background: none; border: none; color: var(--dim);
  padding: 8px 0 6px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.3px; text-transform: uppercase;
  min-height: 52px; transition: color 0.2s;
  border-radius: 0;
}
.tab-item .tab-icon { font-size: 22px; line-height: 1; }
.tab-item.active { color: var(--accent); }
.tab-item:active { transform: none; }

/* ── SEARCH BAR ── */
.search-bar {
  position: relative; margin-bottom: 12px;
}
.search-bar input {
  width: 100%; padding-left: 42px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 15px;
}
.search-bar::before {
  content: '🔍'; position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%); font-size: 16px; pointer-events: none;
}

/* ── CHIPS ── */
.chip-row {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 12px; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 8px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--dim); white-space: nowrap; cursor: pointer;
  transition: all 0.2s; flex-shrink: 0;
  min-height: 36px; display: flex; align-items: center;
}
.chip.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.chip:not(.active):hover { border-color: var(--dim); color: var(--text); }

/* ── ACTIVITY CARDS ── */
.act-card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 4px solid var(--blue); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.2s ease;
  position: relative; overflow: hidden;
  touch-action: pan-y;
}
.act-card:hover { border-color: var(--accent); }
.act-card.critical { border-left-color: var(--red); }
.act-card.milestone { border-left-color: var(--gold); }
.act-card.done { border-left-color: var(--dim); opacity: 0.65; }
.act-card.expanded { border-color: var(--accent); background: var(--surface2); }

.act-card .card-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.act-card .card-id {
  font-family: var(--mono); font-size: 12px; color: var(--dim);
}
.act-card .card-float {
  font-family: var(--mono); font-size: 11px;
  padding: 2px 8px; border-radius: 8px;
  background: var(--surface2);
}
.act-card .card-float.critical-float { background: rgba(239,68,68,0.15); color: var(--red); }
.act-card .card-name {
  font-weight: 700; font-size: 16px; margin-bottom: 6px;
  line-height: 1.3;
}
.act-card .card-row {
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; margin-bottom: 4px;
}
.act-card .card-dates {
  font-family: var(--mono); font-size: 12px; color: var(--dim);
}
.act-card .card-badge {
  font-size: 12px; font-weight: 600;
  padding: 2px 8px; border-radius: 8px;
  background: var(--surface2); color: var(--text);
}
.act-card .card-resource {
  font-size: 12px; color: var(--dim);
}
.act-card .card-progress {
  height: 4px; background: var(--surface2); border-radius: 2px;
  margin-top: 8px; overflow: hidden;
}
.act-card .card-progress-fill {
  height: 100%; border-radius: 2px;
  background: var(--accent); transition: width 0.3s ease;
}

/* Swipe delete */
.act-card .swipe-delete {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: 80px; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; font-size: 14px;
  transform: translateX(80px); transition: transform 0.2s ease;
}
.act-card.swiped .swipe-delete { transform: translateX(0); }
.act-card .card-content {
  transition: transform 0.2s ease; position: relative;
  background: inherit; z-index: 1;
}
.act-card.swiped .card-content { transform: translateX(-80px); }

/* Card detail (expanded) */
.card-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
  padding-top: 0;
}
.act-card.expanded .card-detail {
  max-height: 2000px; padding-top: 14px;
}
.detail-form { display: flex; flex-direction: column; gap: 10px; }
.detail-field {
  display: flex; flex-direction: column; gap: 4px;
}
.detail-field label {
  font-size: 12px; color: var(--dim); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.detail-field input, .detail-field select, .detail-field textarea {
  font-size: 16px; padding: 10px 12px; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--border);
}
.detail-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.detail-row-3 {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
}
.pred-list { display: flex; flex-direction: column; gap: 6px; }
.pred-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg); padding: 8px 10px; border-radius: 10px;
  font-size: 14px;
}
.pred-item .pred-id { font-family: var(--mono); font-weight: 600; flex: 1; }
.pred-item select { padding: 6px 8px; font-size: 14px; min-height: 36px; flex-shrink: 0; width: 64px; }
.pred-item input[type="number"] { width: 54px; padding: 6px 8px; font-size: 14px; min-height: 36px; }
.pred-remove {
  background: var(--red); color: #fff; border: none;
  width: 32px; height: 32px; min-height: 32px;
  border-radius: 8px; font-size: 16px; padding: 0;
}
.add-pred-row {
  display: flex; gap: 6px;
}
.add-pred-row select { flex: 1; font-size: 14px; min-height: 44px; }
.add-pred-row button {
  background: var(--accent); color: #fff; border: none;
  min-width: 48px; border-radius: 10px; font-size: 18px;
  padding: 0;
}
.delete-act-btn {
  background: var(--red); color: #fff; border: none;
  border-radius: 10px; font-size: 14px; margin-top: 6px;
}
.pct-slider-wrap {
  display: flex; align-items: center; gap: 10px;
}
.pct-slider-wrap input[type="range"] {
  flex: 1; accent-color: var(--accent);
  -webkit-appearance: auto; appearance: auto;
  padding: 0; min-height: 24px; background: transparent; border: none;
}
.pct-slider-wrap .pct-val {
  font-family: var(--mono); font-weight: 700; font-size: 16px;
  min-width: 44px; text-align: right;
}

/* ── FAB ── */
#fab {
  position: fixed; bottom: calc(72px + var(--safe-bottom));
  right: calc(20px + var(--safe-right));
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 28px; box-shadow: 0 4px 20px rgba(255,107,53,0.4);
  z-index: 30; min-height: 56px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#fab:active { transform: scale(0.9); }

/* ── BOTTOM SHEET ── */
.sheet-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  opacity: 0; transition: opacity 0.2s ease;
}
.sheet-overlay.show { opacity: 1; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 20px; padding-bottom: calc(20px + var(--safe-bottom));
  padding-left: calc(20px + var(--safe-left));
  padding-right: calc(20px + var(--safe-right));
  z-index: 101; max-height: 90vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}
.sheet.show { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 0 auto 16px;
}
.sheet h2 {
  font-size: 20px; font-weight: 700; margin-bottom: 16px;
}
.sheet .sheet-form { display: flex; flex-direction: column; gap: 12px; }
.sheet .sheet-actions {
  display: flex; gap: 10px; margin-top: 6px;
}
.sheet .btn-primary {
  flex: 1; background: var(--accent); color: #fff; border: none;
  border-radius: 12px; font-size: 16px; font-weight: 700;
  min-height: 50px;
}
.sheet .btn-secondary {
  flex: 1; background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  border-radius: 12px; font-size: 16px; font-weight: 600;
  min-height: 50px;
}
.type-toggle {
  display: flex; background: var(--bg); border-radius: 12px;
  padding: 4px; gap: 4px;
}
.type-toggle button {
  flex: 1; border: none; background: transparent;
  color: var(--dim); border-radius: 10px;
  font-size: 14px; font-weight: 600; min-height: 40px;
  transition: all 0.2s;
}
.type-toggle button.active {
  background: var(--accent); color: #fff;
}

/* ── GANTT ── */
#gantt-wrap {
  width: 100%; overflow: auto; -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y pinch-zoom;
}
#gantt-canvas { display: block; }
.gantt-controls {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.gantt-controls button {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 8px 14px; font-size: 13px;
  color: var(--text); min-height: 40px;
}
.gantt-controls button.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.gantt-info {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  margin-top: 12px; font-size: 14px;
}
.gantt-info .gi-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
.gantt-info .gi-row {
  display: flex; justify-content: space-between;
  font-size: 13px; color: var(--dim); padding: 2px 0;
}
.gantt-info .gi-val { color: var(--text); font-family: var(--mono); }

/* ── DASHBOARD ── */
.dash-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 16px;
}
.dash-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
}
.dash-card .dash-val {
  font-size: 28px; font-weight: 800; color: var(--accent);
  font-family: var(--mono); line-height: 1.2;
}
.dash-card .dash-label {
  font-size: 11px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.5px; margin-top: 4px; font-weight: 600;
}
.dash-card.wide { grid-column: 1 / -1; }

.progress-ring-wrap {
  display: flex; justify-content: center; align-items: center;
  padding: 10px 0;
}

.dash-section {
  margin-bottom: 16px;
}
.dash-section h3 {
  font-size: 14px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 700; margin-bottom: 10px;
}
.critical-chain-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-left: 3px solid var(--red);
  border-radius: 10px; margin-bottom: 6px; font-size: 14px;
}
.critical-chain-item .cci-arrow { color: var(--dim); font-size: 12px; }
.overdue-item {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--red); border-radius: 10px;
  padding: 10px 14px; margin-bottom: 6px; font-size: 14px;
}
.overdue-item .oi-name { font-weight: 600; }
.overdue-item .oi-info { font-size: 12px; color: var(--dim); margin-top: 2px; }

#scurve-canvas {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
}

/* ── MORE TAB ── */
.more-section {
  margin-bottom: 20px;
}
.more-section h3 {
  font-size: 13px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 700; margin-bottom: 10px;
}
.template-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.template-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  cursor: pointer; transition: all 0.2s; text-align: center;
  min-height: 48px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
}
.template-card:hover { border-color: var(--accent); }
.template-card:active { transform: scale(0.97); }
.template-card .tc-icon { font-size: 28px; }
.template-card .tc-name { font-size: 13px; font-weight: 600; }
.template-card .tc-count { font-size: 11px; color: var(--dim); }

.more-btn {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  font-size: 15px; color: var(--text); margin-bottom: 8px;
  justify-content: flex-start;
}
.more-btn:hover { border-color: var(--accent); color: var(--accent); }
.more-btn .mb-icon { font-size: 18px; width: 28px; text-align: center; }

.project-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 8px; display: flex; align-items: center;
  gap: 10px; cursor: pointer; transition: all 0.2s;
}
.project-item:hover { border-color: var(--accent); }
.project-item.current { border-color: var(--accent); background: rgba(255,107,53,0.06); }
.project-item .pi-name { flex: 1; font-weight: 600; font-size: 15px; }
.project-item .pi-count { font-size: 12px; color: var(--dim); }
.project-item .pi-del {
  background: none; border: none; color: var(--dim);
  font-size: 18px; min-height: 36px; min-width: 36px; padding: 0;
}
.project-item .pi-del:hover { color: var(--red); }

/* ── SETTINGS SHEET ── */
.settings-group {
  margin-bottom: 16px;
}
.settings-group h3 {
  font-size: 13px; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 700; margin-bottom: 10px;
}
.settings-field {
  display: flex; flex-direction: column; gap: 4px;
  margin-bottom: 12px;
}
.settings-field label {
  font-size: 13px; color: var(--dim); font-weight: 600;
}
.settings-field input, .settings-field select {
  font-size: 16px; padding: 12px 14px;
}
.holiday-list { margin-top: 8px; }
.holiday-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0; font-size: 14px;
}
.holiday-item button {
  background: none; border: none; color: var(--red);
  font-size: 16px; min-height: 32px; min-width: 32px; padding: 0;
}

/* ── TOAST ── */
#toast-container {
  position: fixed; bottom: calc(80px + var(--safe-bottom));
  left: 16px; right: 16px; z-index: 200;
  display: flex; flex-direction: column-reverse; gap: 8px;
  pointer-events: none;
}
.toast {
  pointer-events: auto; background: var(--surface);
  border: 1px solid var(--border); border-left: 4px solid var(--green);
  border-radius: 12px; padding: 14px 16px; font-size: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: toastIn 0.3s ease;
}
.toast.error { border-left-color: var(--red); }
.toast.warning { border-left-color: var(--gold); }
.toast.dismissing { animation: toastOut 0.2s ease forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(20px); } }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--dim);
}
.empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .es-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.empty-state .es-sub { font-size: 14px; line-height: 1.5; }

/* ── HIDDEN FILE INPUT ── */
#file-input { display: none; }

/* ── PERT INPUTS ── */
.pert-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
}
.pert-row .detail-field label { font-size: 11px; }
.pert-row input { font-size: 14px; padding: 8px 10px; }

/* ── PRINT ── */
@media print {
  #tab-bar, #fab, #toast-container, .sheet-overlay, .sheet, .topbar-btn { display: none !important; }
  body { background: #fff !important; color: #111 !important; overflow: visible !important; }
  #app { height: auto; overflow: visible; }
  .tab-panel { position: static; opacity: 1; visibility: visible; overflow: visible; }
  * { color: #111 !important; border-color: #ccc !important; }
}

/* ── DESKTOP ── */
@media (min-width: 768px) {
  .tab-inner { padding: 20px; max-width: 900px; }
  .dash-grid { grid-template-columns: repeat(4, 1fr); }
  .template-grid { grid-template-columns: repeat(4, 1fr); }
  #fab { bottom: calc(80px + var(--safe-bottom)); right: calc(40px + var(--safe-right)); width: 64px; height: 64px; font-size: 32px; min-height: 64px; }
  .sheet { max-width: 500px; left: 50%; margin-left: -250px; border-radius: 20px 20px 0 0; }
}
</style>
</head>

<script>
// ============================================================
// STATE
// ============================================================
const STATE = {
  projectId: null,
  projectName: 'New Project',
  projectStart: '',
  dataDate: '',
  calendarDays: 5,
  holidays: [],
  activities: [],
  resources: [],
  nextId: 1,
  undoStack: [],
  activeTab: 'activities',
  filter: 'all',
  sort: 'default',
  expandedCard: null,
  ganttZoom: 1,
  ganttSelectedId: null
};

// ============================================================
// DATE / CALENDAR UTILS
// ============================================================
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  return dt.toISOString().slice(0, 10);
}

function fmtDateShort(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  const m = dt.toLocaleString('en', {month:'short'});
  return dt.getDate() + ' ' + m;
}

function fmtDateMed(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('en', {month:'short', day:'numeric', year:'2-digit'});
}

function parseDate(s) {
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function today() { return fmtDate(new Date()); }

function isWorkday(date, cal) {
  cal = cal || STATE.calendarDays;
  const d = new Date(date);
  const day = d.getDay();
  if (cal == 5 && (day === 0 || day === 6)) return false;
  if (cal == 6 && day === 0) return false;
  const ds = fmtDate(d);
  if (STATE.holidays.includes(ds)) return false;
  return true;
}

function addWorkdays(startDate, days, cal) {
  cal = cal || STATE.calendarDays;
  if (days <= 0) return new Date(startDate);
  let d = new Date(startDate);
  let count = 0;
  while (count < days) {
    if (isWorkday(d, cal)) count++;
    if (count < days) d.setDate(d.getDate() + 1);
  }
  return d;
}

function workdaysBetween(d1, d2, cal) {
  cal = cal || STATE.calendarDays;
  let a = new Date(d1), b = new Date(d2);
  if (a > b) return 0;
  let count = 0;
  let cur = new Date(a);
  while (cur <= b) {
    if (isWorkday(cur, cal)) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function nextWorkday(date, cal) {
  let d = new Date(date);
  d.setDate(d.getDate() + 1);
  while (!isWorkday(d, cal)) d.setDate(d.getDate() + 1);
  return d;
}

function prevWorkday(date, cal) {
  let d = new Date(date);
  d.setDate(d.getDate() - 1);
  while (!isWorkday(d, cal)) d.setDate(d.getDate() - 1);
  return d;
}

function ensureWorkday(date, cal) {
  let d = new Date(date);
  while (!isWorkday(d, cal)) d.setDate(d.getDate() + 1);
  return d;
}

function subtractWorkdays(date, days, cal) {
  cal = cal || STATE.calendarDays;
  if (days <= 0) return new Date(date);
  let d = new Date(date);
  let count = 0;
  while (count < days) {
    if (isWorkday(d, cal)) count++;
    if (count < days) d.setDate(d.getDate() - 1);
  }
  return d;
}

function daysBetween(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}

// ============================================================
// ACTIVITY FACTORY
// ============================================================
function createActivity(overrides) {
  const a = {
    uid: STATE.nextId++,
    id: overrides.id || ('A' + String(STATE.nextId).padStart(4, '0')),
    name: 'New Activity',
    od: 5, rd: 5, pct: 0,
    es: null, ef: null, ls: null, lf: null,
    start: null, finish: null,
    actualStart: null, actualFinish: null,
    tf: 0, ff: 0,
    preds: '',
    resource: '',
    cost: 0, actualCost: 0,
    wbs: '',
    actType: 'Task',
    cal: STATE.calendarDays,
    notes: '',
    pertO: null, pertM: null, pertP: null,
    ...overrides
  };
  if (a.actType === 'Milestone') { a.od = 0; a.rd = 0; }
  return a;
}

// ============================================================
// PREDECESSOR PARSING
// ============================================================
function parsePreds(predStr) {
  if (!predStr || !predStr.trim()) return [];
  return predStr.split(',').map(s => {
    s = s.trim();
    const m = s.match(/^([A-Za-z0-9_.]+)\s*(FS|FF|SS|SF)?\s*([+-]?\d+)?$/i);
    if (!m) return null;
    return { id: m[1], type: (m[2] || 'FS').toUpperCase(), lag: parseInt(m[3] || '0', 10) };
  }).filter(Boolean);
}

function buildPredStr(preds) {
  return preds.map(p => {
    let s = p.id;
    if (p.type !== 'FS' || p.lag !== 0) s += p.type;
    if (p.lag !== 0) s += (p.lag > 0 ? '+' : '') + p.lag;
    return s;
  }).join(',');
}

function getActivityById(id) {
  return STATE.activities.find(a => a.id === id);
}

// ============================================================
// CPM SCHEDULING ENGINE
// ============================================================
function schedule() {
  const acts = STATE.activities;
  if (!acts.length) return;
  const pStart = parseDate(STATE.projectStart);
  if (!pStart) return;

  const byId = {};
  acts.forEach(a => { byId[a.id] = a; });

  // Reset
  acts.forEach(a => {
    a.es = null; a.ef = null; a.ls = null; a.lf = null;
    a.tf = 0; a.ff = 0;
    a._preds = parsePreds(a.preds);
    a._succs = [];
  });

  // Build successor list
  acts.forEach(a => {
    a._preds.forEach(p => {
      const pred = byId[p.id];
      if (pred) pred._succs.push({id: a.id, type: p.type, lag: p.lag});
    });
  });

  // PERT: apply expected duration
  acts.forEach(a => {
    if (a.pertO != null && a.pertM != null && a.pertP != null) {
      a.od = Math.round((a.pertO + 4 * a.pertM + a.pertP) / 6);
      if (a.actType !== 'Milestone') a.rd = Math.max(1, Math.round(a.od * (1 - a.pct / 100)));
    }
  });

  // Topological sort
  const inDeg = {};
  acts.forEach(a => { inDeg[a.id] = 0; });
  acts.forEach(a => {
    a._preds.forEach(p => {
      if (byId[p.id]) inDeg[a.id]++;
    });
  });
  const queue = [];
  acts.forEach(a => { if (inDeg[a.id] === 0) queue.push(a); });
  const sorted = [];
  while (queue.length) {
    const a = queue.shift();
    sorted.push(a);
    a._succs.forEach(s => {
      const sa = byId[s.id];
      if (sa) {
        inDeg[sa.id]--;
        if (inDeg[sa.id] === 0) queue.push(sa);
      }
    });
  }

  // Circular dependency detection
  if (sorted.length < acts.length) {
    const sortedIds = new Set(sorted.map(a => a.id));
    acts.forEach(a => {
      if (!sortedIds.has(a.id)) {
        a.es = fmtDate(pStart);
        a.ef = fmtDate(addWorkdays(pStart, Math.max(a.od, 1), a.cal));
        a.start = a.es; a.finish = a.ef;
        a.tf = -999; a.ff = 0;
        sorted.push(a);
      }
    });
    showToast('Circular dependency detected!', 'error');
  }

  // ── FORWARD PASS ──
  sorted.forEach(a => {
    const cal = a.cal || STATE.calendarDays;
    let esDate = ensureWorkday(pStart, cal);

    a._preds.forEach(p => {
      const pred = byId[p.id];
      if (!pred || !pred.ef) return;
      let refDate;
      switch (p.type) {
        case 'FS':
          refDate = nextWorkday(parseDate(pred.ef), cal);
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          break;
        case 'SS':
          refDate = new Date(parseDate(pred.es));
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          refDate = ensureWorkday(refDate, cal);
          break;
        case 'FF':
          refDate = new Date(parseDate(pred.ef));
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          if (a.actType === 'Milestone') refDate = ensureWorkday(refDate, cal);
          else refDate = subtractWorkdays(refDate, Math.max(a.od - 1, 0), cal);
          break;
        case 'SF':
          refDate = new Date(parseDate(pred.es));
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          if (a.actType === 'Milestone') refDate = ensureWorkday(refDate, cal);
          else refDate = subtractWorkdays(refDate, Math.max(a.od - 1, 0), cal);
          break;
      }
      if (refDate && refDate > esDate) esDate = refDate;
    });

    esDate = ensureWorkday(esDate, cal);
    a.es = fmtDate(esDate);

    if (a.actType === 'Milestone') {
      a.ef = a.es;
    } else {
      const dur = Math.max(a.od || 1, 1);
      a.ef = fmtDate(addWorkdays(esDate, dur - 1, cal));
    }

    // Progress
    if (a.pct >= 100) {
      a.actualFinish = a.actualFinish || a.ef;
      a.rd = 0;
    } else if (a.pct > 0) {
      a.actualStart = a.actualStart || a.es;
      a.rd = Math.max(1, Math.round(a.od * (1 - a.pct / 100)));
    } else {
      a.rd = a.od;
    }
    a.start = a.actualStart || a.es;
    a.finish = a.actualFinish || a.ef;
  });

  // ── BACKWARD PASS ──
  let projectEnd = parseDate(acts[0].ef);
  acts.forEach(a => {
    const ef = parseDate(a.ef);
    if (ef && ef > projectEnd) projectEnd = ef;
  });

  for (let i = sorted.length - 1; i >= 0; i--) {
    const a = sorted[i];
    const cal = a.cal || STATE.calendarDays;
    let lfDate = null;

    if (a._succs.length === 0) {
      lfDate = new Date(projectEnd);
    } else {
      a._succs.forEach(s => {
        const succ = byId[s.id];
        if (!succ || !succ.ls) return;
        let refDate;
        switch (s.type) {
          case 'FS':
            refDate = prevWorkday(parseDate(succ.ls), cal);
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            break;
          case 'SS':
            refDate = new Date(parseDate(succ.ls));
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            if (a.actType === 'Milestone') refDate = ensureWorkday(refDate, cal);
            else refDate = addWorkdays(refDate, Math.max(a.od - 1, 0), cal);
            break;
          case 'FF':
            refDate = new Date(parseDate(succ.lf));
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            refDate = ensureWorkday(refDate, cal);
            break;
          case 'SF':
            refDate = new Date(parseDate(succ.lf));
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            if (a.actType === 'Milestone') refDate = ensureWorkday(refDate, cal);
            else refDate = addWorkdays(refDate, Math.max(a.od - 1, 0), cal);
            break;
        }
        if (refDate) {
          if (!lfDate || refDate < lfDate) lfDate = refDate;
        }
      });
      if (!lfDate) lfDate = new Date(projectEnd);
    }

    a.lf = fmtDate(lfDate);
    if (a.actType === 'Milestone') {
      a.ls = a.lf;
    } else {
      a.ls = fmtDate(subtractWorkdays(lfDate, Math.max(a.od - 1, 0), cal));
    }

    // Total Float
    const esD = parseDate(a.es), lsD = parseDate(a.ls);
    if (esD && lsD) {
      a.tf = 0;
      let tmp = new Date(esD);
      if (lsD >= esD) {
        while (fmtDate(tmp) !== fmtDate(lsD)) {
          if (isWorkday(tmp, cal)) a.tf++;
          tmp.setDate(tmp.getDate() + 1);
        }
      } else {
        while (fmtDate(tmp) !== fmtDate(lsD)) {
          if (isWorkday(tmp, cal)) a.tf--;
          tmp.setDate(tmp.getDate() - 1);
        }
      }
    }
  }

  // Free Float
  sorted.forEach(a => {
    const cal = a.cal || STATE.calendarDays;
    if (a._succs.length === 0) {
      a.ff = a.tf;
    } else {
      let minGap = Infinity;
      a._succs.forEach(s => {
        const succ = byId[s.id];
        if (!succ || !succ.es) return;
        let gap = 0;
        const aef = parseDate(a.ef);
        const ses = parseDate(succ.es);
        switch (s.type) {
          case 'FS': gap = workdaysBetween(aef, ses, cal) - 1 - (s.lag || 0) - 1; break;
          case 'SS': gap = workdaysBetween(parseDate(a.es), ses, cal) - 1 - (s.lag || 0); break;
          case 'FF': gap = workdaysBetween(aef, parseDate(succ.ef), cal) - 1 - (s.lag || 0); break;
          case 'SF': gap = workdaysBetween(parseDate(a.es), parseDate(succ.ef), cal) - 1 - (s.lag || 0); break;
        }
        if (gap < minGap) minGap = gap;
      });
      a.ff = minGap === Infinity ? a.tf : Math.max(0, minGap);
    }
  });

  // Cleanup
  acts.forEach(a => { delete a._preds; delete a._succs; });
}

// ============================================================
// UNDO
// ============================================================
function pushUndo() {
  STATE.undoStack.push(JSON.stringify(STATE.activities.map(a => ({...a}))));
  if (STATE.undoStack.length > 50) STATE.undoStack.shift();
}

function doUndo() {
  if (!STATE.undoStack.length) { showToast('Nothing to undo', 'warning'); return; }
  const snap = JSON.parse(STATE.undoStack.pop());
  STATE.activities = snap.map(a => createActivity(a));
  STATE.nextId = Math.max(...STATE.activities.map(a => a.uid), 0) + 1;
  schedule();
  renderAll();
  showToast('Undone');
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab) {
  STATE.activeTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  // Show/hide FAB
  document.getElementById('fab').style.display = tab === 'activities' ? '' : 'none';

  // Render tab-specific content
  if (tab === 'schedule') renderGantt();
  if (tab === 'dashboard') renderDashboard();
  if (tab === 'more') renderMore();
}

// ============================================================
// ACTIVITIES TAB
// ============================================================
function getFilteredActivities() {
  let acts = [...STATE.activities];
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  if (q) {
    acts = acts.filter(a =>
      a.name.toLowerCase().includes(q) ||
      a.id.toLowerCase().includes(q) ||
      (a.resource || '').toLowerCase().includes(q)
    );
  }
  switch (STATE.filter) {
    case 'critical': acts = acts.filter(a => a.tf <= 0 && a.pct < 100); break;
    case 'incomplete': acts = acts.filter(a => a.pct < 100); break;
    case 'milestones': acts = acts.filter(a => a.actType === 'Milestone'); break;
  }
  switch (STATE.sort) {
    case 'name': acts.sort((a,b) => a.name.localeCompare(b.name)); break;
    case 'duration': acts.sort((a,b) => b.od - a.od); break;
    case 'start': acts.sort((a,b) => (a.es||'').localeCompare(b.es||'')); break;
    case 'critical': acts.sort((a,b) => a.tf - b.tf); break;
    case 'float': acts.sort((a,b) => a.tf - b.tf); break;
  }
  return acts;
}

function renderFilterChips() {
  const filters = [
    {id:'all', label:'All'},
    {id:'critical', label:'Critical'},
    {id:'incomplete', label:'Incomplete'},
    {id:'milestones', label:'Milestones'}
  ];
  const el = document.getElementById('filter-chips');
  el.innerHTML = filters.map(f =>
    `<div class="chip ${STATE.filter===f.id?'active':''}" onclick="STATE.filter='${f.id}';renderFilterChips();renderActivities()">${f.label}</div>`
  ).join('');
}

function renderSortChips() {
  const sorts = [
    {id:'default', label:'Default'},
    {id:'name', label:'Name'},
    {id:'duration', label:'Duration'},
    {id:'start', label:'Start'},
    {id:'float', label:'Float'}
  ];
  const el = document.getElementById('sort-chips');
  el.innerHTML = sorts.map(s =>
    `<div class="chip ${STATE.sort===s.id?'active':''}" onclick="STATE.sort='${s.id}';renderSortChips();renderActivities()">${s.label}</div>`
  ).join('');
}

function renderActivities() {
  const acts = getFilteredActivities();
  const list = document.getElementById('activity-list');

  if (!STATE.activities.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="es-icon">📋</div>
      <div class="es-title">No Activities Yet</div>
      <div class="es-sub">Tap the + button to add your first activity,<br>or load a template from the More tab.</div>
    </div>`;
    return;
  }

  if (!acts.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="es-icon">🔍</div>
      <div class="es-title">No Results</div>
      <div class="es-sub">Try a different search or filter.</div>
    </div>`;
    return;
  }

  list.innerHTML = acts.map(a => {
    const isCritical = a.tf <= 0 && a.pct < 100;
    const isMilestone = a.actType === 'Milestone';
    const isDone = a.pct >= 100;
    const isExpanded = STATE.expandedCard === a.uid;
    let cls = 'act-card';
    if (isCritical) cls += ' critical';
    if (isMilestone) cls += ' milestone';
    if (isDone) cls += ' done';
    if (isExpanded) cls += ' expanded';

    return `<div class="${cls}" data-uid="${a.uid}" onclick="toggleCard(${a.uid})">
      <div class="card-content">
        <div class="card-top">
          <span class="card-id">${esc(a.id)}</span>
          <span class="card-float ${a.tf<=0?'critical-float':''}">${a.tf}d float</span>
        </div>
        <div class="card-name">${esc(a.name)}</div>
        <div class="card-row">
          <span class="card-badge">${isMilestone ? '◆ Milestone' : a.od + 'd'}</span>
          <span class="card-dates">${fmtDateShort(a.start)} → ${fmtDateShort(a.finish)}</span>
        </div>
        <div class="card-row">
          ${a.resource ? `<span class="card-resource">👤 ${esc(a.resource)}</span>` : ''}
          ${a.cost ? `<span class="card-resource">💰 $${Number(a.cost).toLocaleString()}</span>` : ''}
        </div>
        <div class="card-progress"><div class="card-progress-fill" style="width:${a.pct}%;background:${isCritical?'var(--red)':isDone?'var(--green)':'var(--accent)'}"></div></div>
      </div>
      <div class="card-detail" onclick="event.stopPropagation()">
        ${isExpanded ? renderCardDetail(a) : ''}
      </div>
      <div class="swipe-delete" onclick="event.stopPropagation();confirmDelete(${a.uid})">Delete</div>
    </div>`;
  }).join('');

  // Set up swipe gestures
  setupSwipeGestures();
}

function renderCardDetail(a) {
  const otherActs = STATE.activities.filter(x => x.id !== a.id);
  const preds = parsePreds(a.preds);

  return `<div class="detail-form">
    <div class="detail-field">
      <label>Name</label>
      <input type="text" value="${esc(a.name)}" onchange="updateAct(${a.uid},'name',this.value)" onclick="event.stopPropagation()">
    </div>
    <div class="detail-row">
      <div class="detail-field">
        <label>Duration (days)</label>
        <input type="number" min="0" value="${a.od}" onchange="updateAct(${a.uid},'od',+this.value)" onclick="event.stopPropagation()">
      </div>
      <div class="detail-field">
        <label>Type</label>
        <select onchange="updateAct(${a.uid},'actType',this.value)" onclick="event.stopPropagation()">
          <option value="Task" ${a.actType==='Task'?'selected':''}>Task</option>
          <option value="Milestone" ${a.actType==='Milestone'?'selected':''}>Milestone</option>
        </select>
      </div>
    </div>
    <div class="detail-field">
      <label>% Complete</label>
      <div class="pct-slider-wrap" onclick="event.stopPropagation()">
        <input type="range" min="0" max="100" value="${a.pct}" oninput="this.nextElementSibling.textContent=this.value+'%'" onchange="updateAct(${a.uid},'pct',+this.value)">
        <span class="pct-val">${a.pct}%</span>
      </div>
    </div>
    <div class="detail-row">
      <div class="detail-field">
        <label>Start</label>
        <input type="date" value="${a.start||''}" disabled style="opacity:0.6">
      </div>
      <div class="detail-field">
        <label>Finish</label>
        <input type="date" value="${a.finish||''}" disabled style="opacity:0.6">
      </div>
    </div>

    <div class="detail-field">
      <label>PERT Estimation (Optimistic / Most Likely / Pessimistic)</label>
      <div class="pert-row" onclick="event.stopPropagation()">
        <div class="detail-field"><label>O</label><input type="number" min="0" value="${a.pertO!=null?a.pertO:''}" placeholder="—" onchange="updateAct(${a.uid},'pertO',this.value?+this.value:null)"></div>
        <div class="detail-field"><label>M</label><input type="number" min="0" value="${a.pertM!=null?a.pertM:''}" placeholder="—" onchange="updateAct(${a.uid},'pertM',this.value?+this.value:null)"></div>
        <div class="detail-field"><label>P</label><input type="number" min="0" value="${a.pertP!=null?a.pertP:''}" placeholder="—" onchange="updateAct(${a.uid},'pertP',this.value?+this.value:null)"></div>
      </div>
    </div>

    <div class="detail-field">
      <label>Predecessors</label>
      <div class="pred-list" onclick="event.stopPropagation()">
        ${preds.map((p, i) => `<div class="pred-item">
          <span class="pred-id">${p.id}</span>
          <select onchange="updatePred(${a.uid},${i},'type',this.value)">
            <option value="FS" ${p.type==='FS'?'selected':''}>FS</option>
            <option value="FF" ${p.type==='FF'?'selected':''}>FF</option>
            <option value="SS" ${p.type==='SS'?'selected':''}>SS</option>
            <option value="SF" ${p.type==='SF'?'selected':''}>SF</option>
          </select>
          <input type="number" value="${p.lag}" onchange="updatePred(${a.uid},${i},'lag',+this.value)" style="width:54px">
          <button class="pred-remove" onclick="removePred(${a.uid},${i})">×</button>
        </div>`).join('')}
        ${otherActs.length ? `<div class="add-pred-row">
          <select id="add-pred-${a.uid}">
            <option value="">Add predecessor...</option>
            ${otherActs.map(x => `<option value="${x.id}">${x.id} — ${esc(x.name)}</option>`).join('')}
          </select>
          <button onclick="addPred(${a.uid})">+</button>
        </div>` : ''}
      </div>
    </div>

    <div class="detail-row">
      <div class="detail-field">
        <label>Resource</label>
        <input type="text" value="${esc(a.resource)}" onchange="updateAct(${a.uid},'resource',this.value)" onclick="event.stopPropagation()">
      </div>
      <div class="detail-field">
        <label>Cost ($)</label>
        <input type="number" min="0" value="${a.cost||0}" onchange="updateAct(${a.uid},'cost',+this.value)" onclick="event.stopPropagation()">
      </div>
    </div>
    <div class="detail-field">
      <label>WBS Code</label>
      <input type="text" value="${esc(a.wbs||'')}" onchange="updateAct(${a.uid},'wbs',this.value)" onclick="event.stopPropagation()">
    </div>
    <div class="detail-field">
      <label>Notes</label>
      <textarea onchange="updateAct(${a.uid},'notes',this.value)" onclick="event.stopPropagation()">${esc(a.notes||'')}</textarea>
    </div>
    <button class="delete-act-btn" onclick="event.stopPropagation();confirmDelete(${a.uid})">Delete Activity</button>
  </div>`;
}

function toggleCard(uid) {
  if (STATE.expandedCard === uid) {
    STATE.expandedCard = null;
  } else {
    STATE.expandedCard = uid;
  }
  renderActivities();
}

function updateAct(uid, key, val) {
  const act = STATE.activities.find(a => a.uid === uid);
  if (!act) return;
  pushUndo();
  act[key] = val;
  if (key === 'actType' && val === 'Milestone') { act.od = 0; act.rd = 0; }
  if (key === 'od') act.rd = val;
  schedule();
  renderActivities();
  autoSave();
}

function updatePred(uid, idx, key, val) {
  const act = STATE.activities.find(a => a.uid === uid);
  if (!act) return;
  pushUndo();
  const preds = parsePreds(act.preds);
  if (preds[idx]) preds[idx][key] = val;
  act.preds = buildPredStr(preds);
  schedule();
  renderActivities();
  autoSave();
}

function addPred(uid) {
  const sel = document.getElementById('add-pred-' + uid);
  if (!sel || !sel.value) return;
  const act = STATE.activities.find(a => a.uid === uid);
  if (!act) return;
  pushUndo();
  const preds = parsePreds(act.preds);
  preds.push({id: sel.value, type: 'FS', lag: 0});
  act.preds = buildPredStr(preds);
  schedule();
  renderActivities();
  autoSave();
}

function removePred(uid, idx) {
  const act = STATE.activities.find(a => a.uid === uid);
  if (!act) return;
  pushUndo();
  const preds = parsePreds(act.preds);
  preds.splice(idx, 1);
  act.preds = buildPredStr(preds);
  schedule();
  renderActivities();
  autoSave();
}

function confirmDelete(uid) {
  const act = STATE.activities.find(a => a.uid === uid);
  if (!act) return;
  if (confirm(`Delete "${act.name}"?`)) {
    pushUndo();
    STATE.activities = STATE.activities.filter(a => a.uid !== uid);
    if (STATE.expandedCard === uid) STATE.expandedCard = null;
    schedule();
    renderActivities();
    autoSave();
    showToast('Activity deleted');
  }
}

// Swipe to delete gesture
function setupSwipeGestures() {
  document.querySelectorAll('.act-card').forEach(card => {
    let startX = 0, currentX = 0, swiping = false;
    const content = card.querySelector('.card-content');
    const del = card.querySelector('.swipe-delete');
    if (!content || !del) return;

    card.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      swiping = false;
      content.style.transition = 'none';
      del.style.transition = 'none';
    }, {passive: true});

    card.addEventListener('touchmove', e => {
      currentX = e.touches[0].clientX;
      const dx = currentX - startX;
      if (dx < -10) {
        swiping = true;
        const move = Math.max(dx, -80);
        content.style.transform = `translateX(${move}px)`;
        del.style.transform = `translateX(${80 + move}px)`;
      }
    }, {passive: true});

    card.addEventListener('touchend', () => {
      content.style.transition = '';
      del.style.transition = '';
      if (swiping && currentX - startX < -40) {
        card.classList.add('swiped');
      } else {
        card.classList.remove('swiped');
        content.style.transform = '';
        del.style.transform = '';
      }
    });
  });
}

// ============================================================
let addSheetOpen = false;

function openAddSheet() {
  if (addSheetOpen) return;
  addSheetOpen = true;
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.id = 'add-overlay';
  overlay.onclick = closeAddSheet;

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.id = 'add-sheet';

  const nextId = 'A' + String(STATE.nextId + 1).padStart(4, '0');

  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <h2>Add Activity</h2>
    <div class="sheet-form">
      <div class="detail-field">
        <label>Activity Name</label>
        <input type="text" id="add-name" placeholder="Activity name" autofocus>
      </div>
      <div class="detail-row">
        <div class="detail-field">
          <label>Duration (days)</label>
          <input type="number" id="add-duration" value="5" min="0">
        </div>
        <div class="detail-field">
          <label>Type</label>
          <div class="type-toggle">
            <button class="active" onclick="setAddType('Task',this)">Task</button>
            <button onclick="setAddType('Milestone',this)">Milestone</button>
          </div>
        </div>
      </div>
      ${STATE.activities.length ? `<div class="detail-field">
        <label>Predecessor</label>
        <select id="add-pred">
          <option value="">None</option>
          ${STATE.activities.map(a => `<option value="${a.id}">${a.id} — ${esc(a.name)}</option>`).join('')}
        </select>
      </div>` : ''}
      <div class="sheet-actions">
        <button class="btn-secondary" onclick="closeAddSheet()">Cancel</button>
        <button class="btn-primary" onclick="doAddActivity()">Add</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  document.body.appendChild(sheet);
  requestAnimationFrame(() => {
    overlay.classList.add('show');
    sheet.classList.add('show');
    setTimeout(() => document.getElementById('add-name')?.focus(), 300);
  });
}

let addType = 'Task';
function setAddType(type, btn) {
  addType = type;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const durInput = document.getElementById('add-duration');
  if (type === 'Milestone') { durInput.value = 0; durInput.disabled = true; }
  else { durInput.disabled = false; if (durInput.value === '0') durInput.value = 5; }
}

function doAddActivity() {
  const name = document.getElementById('add-name')?.value.trim();
  if (!name) { showToast('Enter a name', 'warning'); return; }
  const dur = parseInt(document.getElementById('add-duration')?.value) || 0;
  const predSel = document.getElementById('add-pred');
  const pred = predSel ? predSel.value : '';

  pushUndo();
  const act = createActivity({
    name,
    od: addType === 'Milestone' ? 0 : dur,
    rd: addType === 'Milestone' ? 0 : dur,
    actType: addType,
    preds: pred || '',
    cal: STATE.calendarDays
  });
  STATE.activities.push(act);
  schedule();
  renderActivities();
  autoSave();
  showToast(`Added "${name}"`);

  // Reset for quick add
  document.getElementById('add-name').value = '';
  document.getElementById('add-name').focus();
  if (predSel) {
    // Update pred options
    predSel.innerHTML = `<option value="">None</option>${STATE.activities.map(a => `<option value="${a.id}">${a.id} — ${esc(a.name)}</option>`).join('')}`;
    predSel.value = act.id; // default next pred to this one
  }
}

function closeAddSheet() {
  addSheetOpen = false;
  addType = 'Task';
  const overlay = document.getElementById('add-overlay');
  const sheet = document.getElementById('add-sheet');
  if (overlay) { overlay.classList.remove('show'); setTimeout(() => overlay.remove(), 200); }
  if (sheet) { sheet.classList.remove('show'); setTimeout(() => sheet.remove(), 300); }
}

// ============================================================
// GANTT CHART (CANVAS)
// ============================================================
function renderGantt() {
  const canvas = document.getElementById('gantt-canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('gantt-wrap');
  const acts = STATE.activities;

  if (!acts.length || !acts[0].es) {
    canvas.width = wrap.clientWidth;
    canvas.height = 200;
    ctx.fillStyle = '#6e6e73';
    ctx.font = '16px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No activities scheduled', canvas.width / 2, 100);
    return;
  }

  // Render controls
  const ctrlEl = document.getElementById('gantt-controls');
  ctrlEl.innerHTML = `
    <button onclick="zoomGantt(-1)">−</button>
    <button onclick="zoomGantt(1)">+</button>
    <button onclick="zoomGantt(0)">Fit</button>
  `;

  const dpr = window.devicePixelRatio || 1;
  const ROW_H = 32;
  const HEADER_H = 44;
  const LEFT_W = 140;
  const BAR_H = 18;
  const PAD = 8;

  // Date range
  let minD = null, maxD = null;
  acts.forEach(a => {
    const s = parseDate(a.es), f = parseDate(a.ef);
    if (s && (!minD || s < minD)) minD = s;
    if (f && (!maxD || f > maxD)) maxD = f;
  });
  if (!minD || !maxD) return;

  // Add padding
  minD = new Date(minD); minD.setDate(minD.getDate() - 3);
  maxD = new Date(maxD); maxD.setDate(maxD.getDate() + 7);

  const totalDays = daysBetween(minD, maxD) + 1;
  const dayW = Math.max(8, 24 * STATE.ganttZoom);
  const chartW = LEFT_W + totalDays * dayW;
  const chartH = HEADER_H + acts.length * ROW_H + PAD;

  canvas.style.width = Math.max(chartW, wrap.clientWidth) + 'px';
  canvas.style.height = chartH + 'px';
  canvas.width = Math.max(chartW, wrap.clientWidth) * dpr;
  canvas.height = chartH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const dateToX = d => LEFT_W + daysBetween(minD, d) * dayW;

  // Background
  ctx.fillStyle = '#0f0f10';
  ctx.fillRect(0, 0, chartW, chartH);

  // Header bg
  ctx.fillStyle = '#1a1a1c';
  ctx.fillRect(0, 0, chartW, HEADER_H);

  // Grid lines and date labels
  ctx.strokeStyle = '#1e1e20';
  ctx.lineWidth = 0.5;
  const labelStep = dayW < 12 ? 7 : dayW < 20 ? 3 : 1;
  let cur = new Date(minD);
  let dayIdx = 0;
  while (cur <= maxD) {
    const x = LEFT_W + dayIdx * dayW;
    const isWeekend = cur.getDay() === 0 || cur.getDay() === 6;

    if (isWeekend && STATE.calendarDays < 7) {
      ctx.fillStyle = 'rgba(255,255,255,0.015)';
      ctx.fillRect(x, HEADER_H, dayW, chartH);
    }

    if (dayIdx % labelStep === 0) {
      ctx.strokeStyle = '#1e1e20';
      ctx.beginPath(); ctx.moveTo(x, HEADER_H); ctx.lineTo(x, chartH); ctx.stroke();

      ctx.fillStyle = '#6e6e73';
      ctx.font = `${Math.min(11, dayW - 2)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign = 'center';
      const label = dayW >= 20
        ? cur.getDate() + ' ' + cur.toLocaleString('en', {month:'short'})
        : cur.getDate() + '/' + (cur.getMonth()+1);
      ctx.fillText(label, x + dayW / 2, HEADER_H - 8);

      if (dayIdx % (labelStep * 4) === 0 || dayIdx === 0) {
        ctx.fillStyle = '#4a4a50';
        ctx.font = `bold ${Math.min(10, dayW)}px -apple-system, system-ui, sans-serif`;
        ctx.fillText(cur.toLocaleString('en', {month:'short', year:'2-digit'}), x + dayW / 2, 14);
      }
    }

    cur.setDate(cur.getDate() + 1);
    dayIdx++;
  }

  // Today line
  const todayD = parseDate(today());
  if (todayD >= minD && todayD <= maxD) {
    const tx = dateToX(todayD) + dayW / 2;
    ctx.strokeStyle = '#ff6b35';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(tx, HEADER_H); ctx.lineTo(tx, chartH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ff6b35';
    ctx.font = 'bold 9px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('TODAY', tx, HEADER_H - 2);
  }

  // Data date line
  const dataD = parseDate(STATE.dataDate);
  if (dataD && dataD >= minD && dataD <= maxD) {
    const dx = dateToX(dataD) + dayW / 2;
    ctx.strokeStyle = '#60a5fa';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(dx, HEADER_H); ctx.lineTo(dx, chartH); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Header separator
  ctx.strokeStyle = '#2a2a2d';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, HEADER_H); ctx.lineTo(chartW, HEADER_H); ctx.stroke();

  // Left labels bg
  ctx.fillStyle = '#141416';
  ctx.fillRect(0, HEADER_H, LEFT_W, chartH);
  ctx.strokeStyle = '#2a2a2d';
  ctx.beginPath(); ctx.moveTo(LEFT_W, 0); ctx.lineTo(LEFT_W, chartH); ctx.stroke();

  // Build ID map for dependency arrows
  const actIdxMap = {};
  acts.forEach((a, i) => { actIdxMap[a.id] = i; });

  // Draw bars
  acts.forEach((a, i) => {
    const y = HEADER_H + i * ROW_H;
    const isCritical = a.tf <= 0 && a.pct < 100;
    const isMilestone = a.actType === 'Milestone';
    const isDone = a.pct >= 100;
    const isSelected = STATE.ganttSelectedId === a.id;

    // Row bg
    if (isSelected) {
      ctx.fillStyle = 'rgba(255,107,53,0.06)';
      ctx.fillRect(0, y, chartW, ROW_H);
    }
    if (i % 2 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.01)';
      ctx.fillRect(LEFT_W, y, chartW - LEFT_W, ROW_H);
    }

    // Row line
    ctx.strokeStyle = '#1e1e20';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0, y + ROW_H); ctx.lineTo(chartW, y + ROW_H); ctx.stroke();

    // Left label
    ctx.fillStyle = isSelected ? '#ff6b35' : (isCritical ? '#ef4444' : '#e0e0e0');
    ctx.font = `${isCritical ? 'bold ' : ''}12px -apple-system, system-ui, sans-serif`;
    ctx.textAlign = 'left';
    const name = a.name.length > 16 ? a.name.slice(0, 15) + '...' : a.name;
    ctx.fillText(name, 6, y + ROW_H / 2 + 4);

    // Bar
    const es = parseDate(a.es), ef = parseDate(a.ef);
    if (!es || !ef) return;
    const barX = dateToX(es);
    const barW = Math.max(daysBetween(es, ef) * dayW + dayW, dayW);
    const barY = y + (ROW_H - BAR_H) / 2;

    if (isMilestone) {
      const mx = barX + dayW / 2;
      const my = y + ROW_H / 2;
      const sz = 7;
      ctx.fillStyle = isDone ? '#6e6e73' : '#f7c948';
      ctx.beginPath();
      ctx.moveTo(mx, my - sz); ctx.lineTo(mx + sz, my);
      ctx.lineTo(mx, my + sz); ctx.lineTo(mx - sz, my);
      ctx.closePath(); ctx.fill();
    } else {
      // Bar bg
      ctx.fillStyle = isDone ? '#3a3a3d' : (isCritical ? 'rgba(239,68,68,0.25)' : 'rgba(96,165,250,0.2)');
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW, BAR_H, 4);
      ctx.fill();

      // Progress fill
      if (a.pct > 0) {
        const fillW = barW * a.pct / 100;
        ctx.fillStyle = isDone ? '#6e6e73' : (isCritical ? '#ef4444' : '#60a5fa');
        ctx.beginPath();
        ctx.roundRect(barX, barY, fillW, BAR_H, 4);
        ctx.fill();
      }

      // Bar border
      ctx.strokeStyle = isDone ? '#4a4a4d' : (isCritical ? '#ef4444' : '#60a5fa');
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(barX, barY, barW, BAR_H, 4);
      ctx.stroke();
    }
  });

  // Draw dependency arrows
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  acts.forEach((a, i) => {
    const preds = parsePreds(a.preds);
    preds.forEach(p => {
      const pi = actIdxMap[p.id];
      if (pi === undefined) return;
      const pred = acts[pi];
      const predEs = parseDate(pred.es), predEf = parseDate(pred.ef);
      const succEs = parseDate(a.es), succEf = parseDate(a.ef);
      if (!predEs || !predEf || !succEs || !succEf) return;

      let fromX, fromY, toX, toY;
      const predY = HEADER_H + pi * ROW_H + ROW_H / 2;
      const succY = HEADER_H + i * ROW_H + ROW_H / 2;

      switch (p.type) {
        case 'FS':
          fromX = dateToX(predEf) + dayW;
          toX = dateToX(succEs);
          break;
        case 'SS':
          fromX = dateToX(predEs);
          toX = dateToX(succEs);
          break;
        case 'FF':
          fromX = dateToX(predEf) + dayW;
          toX = dateToX(succEf) + dayW;
          break;
        case 'SF':
          fromX = dateToX(predEs);
          toX = dateToX(succEf) + dayW;
          break;
      }
      fromY = predY; toY = succY;

      const isCrit = pred.tf <= 0 && a.tf <= 0 && pred.pct < 100 && a.pct < 100;
      ctx.strokeStyle = isCrit ? 'rgba(239,68,68,0.5)' : 'rgba(255,255,255,0.15)';
      ctx.lineWidth = isCrit ? 1.5 : 1;

      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      if (p.type === 'FS') {
        const midX = fromX + 6;
        ctx.lineTo(midX, fromY);
        ctx.lineTo(midX, toY);
        ctx.lineTo(toX, toY);
      } else {
        ctx.lineTo(fromX, (fromY + toY) / 2);
        ctx.lineTo(toX, (fromY + toY) / 2);
        ctx.lineTo(toX, toY);
      }
      ctx.stroke();

      // Arrow head
      const aSize = 4;
      ctx.fillStyle = ctx.strokeStyle;
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - aSize, toY - aSize);
      ctx.lineTo(toX - aSize, toY + aSize);
      ctx.closePath();
      ctx.fill();
    });
  });

  // Tap on bars
  canvas.onclick = e => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rowIdx = Math.floor((y - HEADER_H) / ROW_H);
    if (rowIdx >= 0 && rowIdx < acts.length) {
      STATE.ganttSelectedId = acts[rowIdx].id;
      renderGantt();
      renderGanttInfo(acts[rowIdx]);
    }
  };
}

function renderGanttInfo(a) {
  const el = document.getElementById('gantt-info');
  if (!a) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = `
    <div class="gi-name">${esc(a.name)}</div>
    <div class="gi-row"><span>ID</span><span class="gi-val">${a.id}</span></div>
    <div class="gi-row"><span>Duration</span><span class="gi-val">${a.od}d</span></div>
    <div class="gi-row"><span>Start</span><span class="gi-val">${fmtDateMed(a.start)}</span></div>
    <div class="gi-row"><span>Finish</span><span class="gi-val">${fmtDateMed(a.finish)}</span></div>

  `;
}

function zoomGantt(dir) {
  if (dir === 0) STATE.ganttZoom = 1;
  else STATE.ganttZoom = Math.max(0.3, Math.min(4, STATE.ganttZoom + dir * 0.3));
  renderGantt();
}

// Pinch zoom for Gantt
(function() {
  let lastDist = 0;
  const wrap = document.getElementById('gantt-wrap');
  if (!wrap) return;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, {passive: true});
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const delta = dist - lastDist;
      if (Math.abs(delta) > 5) {
        STATE.ganttZoom = Math.max(0.3, Math.min(4, STATE.ganttZoom + delta * 0.005));
        renderGantt();
        lastDist = dist;
      }
    }
  }, {passive: true});
})();

function renderDashboard() {
  const el = document.getElementById('dashboard-content');
  const acts = STATE.activities;

  if (!acts.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="es-icon">📈</div>
      <div class="es-title">No Data Yet</div>
      <div class="es-sub">Add activities to see your project dashboard.</div>
    </div>`;
    return;
  }

  const total = acts.length;
  const complete = acts.filter(a => a.pct >= 100).length;
  const critical = acts.filter(a => a.tf <= 0 && a.pct < 100).length;
  const milestones = acts.filter(a => a.actType === 'Milestone').length;

  // Project duration
  let minStart = null, maxFinish = null;
  acts.forEach(a => {
    const s = parseDate(a.start), f = parseDate(a.finish);
    if (s && (!minStart || s < minStart)) minStart = s;
    if (f && (!maxFinish || f > maxFinish)) maxFinish = f;
  });
  const projDur = minStart && maxFinish ? workdaysBetween(minStart, maxFinish) : 0;

  // % Complete (weighted by duration)
  let totalDur = 0, completedDur = 0;
  acts.forEach(a => {
    if (a.actType !== 'Milestone') {
      totalDur += a.od;
      completedDur += a.od * a.pct / 100;
    }
  });
  const overallPct = totalDur > 0 ? Math.round(completedDur / totalDur * 100) : 0;

  // Costs
  const totalCost = acts.reduce((s, a) => s + (a.cost || 0), 0);
  const earnedCost = acts.reduce((s, a) => s + (a.cost || 0) * a.pct / 100, 0);

  // CPI / SPI
  let hasCosts = totalCost > 0;
  let bac = totalCost;
  let ev = earnedCost;
  let plannedPct = totalDur > 0 ? (acts.reduce((s, a) => {
    if (a.actType === 'Milestone') return s;
    const dd = parseDate(STATE.dataDate);
    const es = parseDate(a.es), ef = parseDate(a.ef);
    if (!dd || !es || !ef) return s;
    if (dd >= ef) return s + a.od;
    if (dd <= es) return s;
    return s + workdaysBetween(es, dd);
  }, 0) / totalDur * 100) : 0;
  let pv = bac * plannedPct / 100;
  let spi = pv > 0 ? (ev / pv) : 1;
  let cpi = ev > 0 ? 1 : 1; // simplified

  // Overdue
  const dataDate = parseDate(STATE.dataDate);
  const overdue = acts.filter(a => {
    const ef = parseDate(a.ef);
    return a.pct < 100 && ef && dataDate && ef < dataDate;
  });

  // Critical path chain
  const criticalPath = acts.filter(a => a.tf <= 0 && a.pct < 100)
    .sort((a, b) => (a.es || '').localeCompare(b.es || ''));

  el.innerHTML = `
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-val">${projDur}</div>
        <div class="dash-label">Duration (days)</div>
      </div>
      <div class="dash-card">
        <div class="dash-val">${total}</div>
        <div class="dash-label">Activities</div>
      </div>
      <div class="dash-card">
        <div class="dash-val" style="color:var(--green)">${complete}</div>
        <div class="dash-label">Complete</div>
      </div>
      <div class="dash-card">
        <div class="dash-val" style="color:var(--red)">${critical}</div>
        <div class="dash-label">Critical</div>
      </div>
    </div>

    <div class="dash-card wide" style="margin-bottom:16px">
      <div class="progress-ring-wrap">
        <canvas id="progress-ring" width="140" height="140" style="width:140px;height:140px"></canvas>
      </div>
      <div class="dash-label" style="margin-top:4px">Overall Progress</div>
    </div>

    ${hasCosts ? `<div class="dash-grid">
      <div class="dash-card">
        <div class="dash-val" style="font-size:20px">$${(totalCost/1000).toFixed(0)}k</div>
        <div class="dash-label">Total Cost</div>
      </div>
      <div class="dash-card">
        <div class="dash-val" style="font-size:20px">$${(earnedCost/1000).toFixed(0)}k</div>
        <div class="dash-label">Earned Value</div>
      </div>
      <div class="dash-card">
        <div class="dash-val" style="font-size:20px;color:${spi>=1?'var(--green)':'var(--red)'}">${spi.toFixed(2)}</div>
        <div class="dash-label">SPI</div>
      </div>
      <div class="dash-card">
        <div class="dash-val" style="font-size:20px">—</div>
        <div class="dash-label">CPI</div>
      </div>
    </div>` : ''}

    <div class="dash-section">
      <h3>S-Curve</h3>
      <canvas id="scurve-canvas" height="200"></canvas>
    </div>

    ${criticalPath.length ? `<div class="dash-section">
      <h3>Critical Path (${criticalPath.length} activities)</h3>
      ${criticalPath.map(a => `<div class="critical-chain-item">
        <span style="font-family:var(--mono);font-size:12px;color:var(--dim)">${a.id}</span>
        <span style="flex:1">${esc(a.name)}</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--dim)">${a.od}d</span>
      </div>`).join('')}
    </div>` : ''}

    ${overdue.length ? `<div class="dash-section">
      <h3 style="color:var(--red)">Overdue (${overdue.length})</h3>
      ${overdue.map(a => `<div class="overdue-item">
        <div class="oi-name">${esc(a.name)}</div>
        <div class="oi-info">Should have finished ${fmtDateMed(a.ef)} — ${a.pct}% complete</div>
      </div>`).join('')}
    </div>` : ''}
  `;

  // Draw progress ring
  drawProgressRing(overallPct);
  drawSCurve();
}

function drawProgressRing(pct) {
  const canvas = document.getElementById('progress-ring');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = 140 * dpr; canvas.height = 140 * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cx = 70, cy = 70, r = 55, lw = 10;

  // BG ring
  ctx.strokeStyle = '#2a2a2d';
  ctx.lineWidth = lw; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  // Progress ring
  const angle = (pct / 100) * Math.PI * 2 - Math.PI / 2;
  ctx.strokeStyle = pct >= 100 ? '#4ade80' : '#ff6b35';
  ctx.lineWidth = lw; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, r, -Math.PI / 2, angle);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#f0f0f0';
  ctx.font = 'bold 28px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(pct + '%', cx, cy);
}

function drawSCurve() {
  const canvas = document.getElementById('scurve-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth;
  const h = 200;
  canvas.style.width = w + 'px';
  canvas.width = w * dpr; canvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const acts = STATE.activities;
  if (!acts.length) return;

  // Find project date range
  let minD = null, maxD = null;
  acts.forEach(a => {
    const s = parseDate(a.es), f = parseDate(a.ef);
    if (s && (!minD || s < minD)) minD = s;
    if (f && (!maxD || f > maxD)) maxD = f;
  });
  if (!minD || !maxD) return;

  const totalDays = daysBetween(minD, maxD) + 1;
  const pad = 30;
  const chartW = w - pad * 2;
  const chartH = h - pad * 2;

  // Calculate planned % at each day
  const totalDur = acts.reduce((s, a) => a.actType === 'Milestone' ? s : s + a.od, 0);
  if (!totalDur) return;

  const planned = [];
  for (let i = 0; i <= totalDays; i++) {
    const d = new Date(minD);
    d.setDate(d.getDate() + i);
    let cum = 0;
    acts.forEach(a => {
      if (a.actType === 'Milestone') return;
      const es = parseDate(a.es), ef = parseDate(a.ef);
      if (!es || !ef) return;
      if (d >= ef) cum += a.od;
      else if (d > es) cum += workdaysBetween(es, d);
    });
    planned.push(cum / totalDur * 100);
  }

  // Draw grid
  ctx.fillStyle = '#1a1a1c';
  ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#2a2a2d';
  ctx.lineWidth = 0.5;
  for (let p = 0; p <= 100; p += 25) {
    const y = pad + chartH - (p / 100) * chartH;
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(pad + chartW, y); ctx.stroke();
    ctx.fillStyle = '#6e6e73';
    ctx.font = '10px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(p + '%', pad - 4, y + 3);
  }

  // Draw planned line
  ctx.strokeStyle = '#60a5fa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  planned.forEach((v, i) => {
    const x = pad + (i / totalDays) * chartW;
    const y = pad + chartH - (v / 100) * chartH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Legend
  ctx.fillStyle = '#60a5fa';
  ctx.font = '11px -apple-system, system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Planned', pad + 4, pad + 12);
}

function loadTemplate(name) {
  const tmpl = TEMPLATES[name];
  if (!tmpl) return;
  if (STATE.activities.length > 0 && !confirm(`Load template "${name}"? This will replace current activities.`)) return;

  STATE.projectName = name;
  STATE.calendarDays = tmpl.calendarDays || 5;
  STATE.projectStart = today();
  STATE.dataDate = today();
  STATE.activities = tmpl.activities.map(a => createActivity({ ...a, cal: tmpl.calendarDays || 5 }));
  STATE.nextId = STATE.activities.length + 100;
  STATE.undoStack = [];
  STATE.expandedCard = null;

  document.getElementById('project-name-display').textContent = STATE.projectName;
  schedule();
  renderAll();
  autoSave();
  showToast(`Loaded "${name}"`, 'success');
  switchTab('activities');
}

function exportJSON() {
  const data = {
    projectName: STATE.projectName,
    projectStart: STATE.projectStart,
    dataDate: STATE.dataDate,
    calendarDays: STATE.calendarDays,
    holidays: STATE.holidays,
    activities: STATE.activities,
    resources: STATE.resources
  };
  downloadFile(STATE.projectName + '.json', JSON.stringify(data, null, 2), 'application/json');
  showToast('Exported JSON', 'success');
}

function importJSON() {
  const fi = document.getElementById('file-input');
  fi.accept = '.json';
  fi.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        STATE.projectName = data.projectName || 'Imported';
        STATE.projectStart = data.projectStart || today();
        STATE.dataDate = data.dataDate || today();
        STATE.calendarDays = data.calendarDays || 5;
        STATE.holidays = data.holidays || [];
        STATE.activities = (data.activities || []).map(a => createActivity(a));
        STATE.resources = data.resources || [];
        STATE.nextId = Math.max(...STATE.activities.map(a => a.uid), 0) + 1;
        document.getElementById('project-name-display').textContent = STATE.projectName;
        schedule();
        renderAll();
        autoSave();
        showToast(`Imported ${STATE.activities.length} activities`, 'success');
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    };
    reader.readAsText(f);
    fi.value = '';
  };
  fi.click();
}

function importCSV() {
  const fi = document.getElementById('file-input');
  fi.accept = '.csv';
  fi.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) { showToast('CSV must have header + data', 'error'); return; }
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/['"]/g, ''));
        const idIdx = headers.findIndex(h => h.includes('id') || h.includes('activity'));
        const nameIdx = headers.findIndex(h => h.includes('name') || h.includes('description'));
        const durIdx = headers.findIndex(h => h.includes('dur'));
        const predIdx = headers.findIndex(h => h.includes('pred'));
        const wbsIdx = headers.findIndex(h => h.includes('wbs'));

        STATE.activities = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          const a = createActivity({
            id: (idIdx >= 0 ? cols[idIdx] : 'A' + String(i).padStart(4, '0')).trim(),
            name: (nameIdx >= 0 ? cols[nameIdx] : 'Activity ' + i).trim(),
            od: durIdx >= 0 ? (parseInt(cols[durIdx]) || 5) : 5,
            preds: predIdx >= 0 ? (cols[predIdx] || '').trim() : '',
            wbs: wbsIdx >= 0 ? (cols[wbsIdx] || '').trim() : ''
          });
          a.rd = a.od;
          STATE.activities.push(a);
        }
        STATE.nextId = STATE.activities.length + 1;
        schedule();
        renderAll();
        autoSave();
        showToast(`Imported ${STATE.activities.length} activities`, 'success');
      } catch (err) {
        showToast('CSV error: ' + err.message, 'error');
      }
    };
    reader.readAsText(f);
    fi.value = '';
  };
  fi.click();
}

function parseCSVLine(line) {
  const result = [];
  let current = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; continue; }
    if (c === ',' && !inQuotes) { result.push(current); current = ''; continue; }
    current += c;
  }
  result.push(current);
  return result;
}

function exportCSV() {
  let csv = 'Activity ID,Activity Name,Original Duration,Remaining Duration,% Complete,Start,Finish,Total Float,Predecessors,Resource,Cost,WBS\n';
  STATE.activities.forEach(a => {
