<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFI Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f10;color:#e0e0e0;min-height:100vh;padding:12px}
a{color:#ff6b35;text-decoration:none}
.header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.header h1{font-size:1.3rem;color:#ff6b35}
.home-link{font-size:1.1rem;padding:6px 12px;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px}
.card{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:.95rem;color:#ff6b35;margin-bottom:12px;cursor:pointer}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.field{flex:1;min-width:120px}
.field label{display:block;font-size:.75rem;color:#999;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:12px;font-size:1rem;background:#0f0f10;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#ff6b35}
textarea{min-height:60px}
.btn{padding:10px 16px;background:#ff6b35;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;margin-right:8px;margin-top:4px}
.btn-sm{padding:8px 12px;font-size:.8rem}
.btn-green{background:#4ade80;color:#000}
.btn-red{background:#ef4444}
.btn:active{opacity:.8}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat{background:#1a1a1c;border:1px solid #2a2a2d;border-radius:8px;padding:12px;text-align:center}
.stat .v{font-size:1.4rem;font-weight:700}
.stat .l{font-size:.7rem;color:#999;margin-top:2px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select{padding:10px;font-size:.9rem;background:#1a1a1c;border:1px solid #2a2a2d;border-radius:6px;color:#e0e0e0}
.rfi-card{background:#1a1a1c;border-left:4px solid #ff6b35;border-radius:8px;padding:12px;margin-bottom:8px;transition:all .2s}
.rfi-card.overdue{border-color:#ef4444;background:#ef444411}
.rfi-card.answered{border-color:#4ade80}
.rfi-card.closed{border-color:#666}
.rfi-card .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.rfi-card .subj{font-size:.95rem;font-weight:600;margin:6px 0}
.rfi-card .q{font-size:.85rem;color:#bbb;margin:4px 0;padding:8px;background:#0f0f10;border-radius:6px}
.rfi-card .ans{font-size:.85rem;color:#4ade80;margin:4px 0;padding:8px;background:#0f0f1099;border-radius:6px;border:1px solid #4ade8033}
.rfi-card .meta{font-size:.75rem;color:#999;display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;background:#2a2a2d}
.badge.urgent{color:#ef4444;border:1px solid #ef4444}
.badge.overdue{background:#ef444433;color:#ef4444}
.days{font-weight:700;font-size:.85rem}
.days.warn{color:#f7c948}.days.over{color:#ef4444}.days.ok{color:#4ade80}
.del{background:none;border:none;color:#ef4444;font-size:1.1rem;cursor:pointer;padding:4px 8px}
.collapse{max-height:0;overflow:hidden;transition:max-height .3s ease}
.collapse.open{max-height:900px}
.resp-form{margin-top:8px;padding:8px;background:#0f0f10;border-radius:6px;border:1px solid #2a2a2d}
.resp-form textarea,.resp-form input{margin-bottom:6px}
@media print{body{background:#fff;color:#000}.card,.rfi-card,.stat{border-color:#ccc;break-inside:avoid}
.btn,.del,.filters,.home-link{display:none!important}.rfi-card .q,.rfi-card .ans{border-color:#ccc}}
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="home-link">&#8592;</a>
<h1>RFI Tracker</h1>
<button class="btn btn-sm btn-green" onclick="exportData()">Export</button>
<button class="btn btn-sm" onclick="window.print()">Print</button>
</div>
<div class="stats" id="stats"></div>
<div class="card">
<h2 onclick="toggleForm()">&#43; Add RFI &#9662;</h2>
<div class="collapse" id="formWrap">
<div class="row"><div class="field"><label>Subject</label><input id="rSubj"></div></div>
<div class="row"><div class="field"><label>Question</label><textarea id="rQ"></textarea></div></div>
<div class="row">
<div class="field"><label>Submitted By</label><input id="rBy"></div>
<div class="field"><label>Submitted To</label><input id="rTo"></div>
</div>
<div class="row">
<div class="field"><label>Date Submitted</label><input type="date" id="rDate"></div>
<div class="field"><label>Date Needed By</label><input type="date" id="rNeed"></div>
</div>
<div class="row">
<div class="field"><label>Priority</label><select id="rPri"><option>Normal</option><option>Urgent</option><option>Low</option></select></div>
</div>
<button class="btn" onclick="addRFI()">Submit RFI</button>
</div>
</div>
<div class="filters">
<select id="fStatus" onchange="render()"><option value="">All Status</option><option>Open</option><option>Answered</option><option>Closed</option><option>Void</option></select>
<select id="fPri" onchange="render()"><option value="">All Priority</option><option>Urgent</option><option>Normal</option><option>Low</option></select>
</div>
<div id="list"></div>
<script>
const KEY='rfi-tracker';
let rfis=JSON.parse(localStorage.getItem(KEY)||'[]');
function save(){localStorage.setItem(KEY,JSON.stringify(rfis))}
function toggleForm(){document.getElementById('formWrap').classList.toggle('open')}
function nextNum(){return rfis.length?Math.max(...rfis.map(r=>r.num))+1:1}
function fmtNum(n){return 'RFI-'+String(n).padStart(3,'0')}
function addRFI(){
 const s=document.getElementById('rSubj').value.trim();if(!s)return;
 const today=new Date().toISOString().split('T')[0];
 rfis.push({num:nextNum(),subj:s,question:document.getElementById('rQ').value.trim(),
  by:document.getElementById('rBy').value.trim(),to:document.getElementById('rTo').value.trim(),
  dateSubmit:document.getElementById('rDate').value||today,dateNeed:document.getElementById('rNeed').value,
  priority:document.getElementById('rPri').value,status:'Open',
  answer:'',respBy:'',respDate:''});
 save();['rSubj','rQ','rBy','rTo'].forEach(x=>document.getElementById(x).value='');
 document.getElementById('rDate').value='';document.getElementById('rNeed').value='';render();
}
function delRFI(num){rfis=rfis.filter(r=>r.num!==num);save();render()}
function changeStatus(num,s){const r=rfis.find(x=>x.num===num);if(r){r.status=s;save();render()}}
function toggleResp(num){const el=document.getElementById('resp-'+num);el.classList.toggle('open')}
function submitResp(num){
 const r=rfis.find(x=>x.num===num);if(!r)return;
 r.answer=document.getElementById('ans-'+num).value.trim();
 r.respBy=document.getElementById('respby-'+num).value.trim();
 r.respDate=new Date().toISOString().split('T')[0];
 r.status='Answered';save();render();
}
function daysBetween(d1,d2){return Math.floor((new Date(d2)-new Date(d1))/(1000*60*60*24))}
function isOverdue(r){
 if(r.status==='Closed'||r.status==='Void'||r.status==='Answered')return false;
 if(!r.dateNeed)return false;
 return new Date()>new Date(r.dateNeed);
}
function daysOpen(r){
 const end=r.respDate||new Date().toISOString().split('T')[0];
 return daysBetween(r.dateSubmit,end);
}
function render(){
 const fs=document.getElementById('fStatus').value,fp=document.getElementById('fPri').value;
 let f=rfis.filter(r=>(!fs||r.status===fs)&&(!fp||r.priority===fp));
 const open=rfis.filter(r=>r.status==='Open').length;
 const overdue=rfis.filter(r=>isOverdue(r)).length;
 const answered=rfis.filter(r=>r.respDate);
 const avgResp=answered.length?Math.round(answered.reduce((s,r)=>s+daysOpen(r),0)/answered.length*10)/10:0;
 document.getElementById('stats').innerHTML=`
  <div class="stat"><div class="v" style="color:#ff6b35">${rfis.length}</div><div class="l">Total RFIs</div></div>
  <div class="stat"><div class="v" style="color:#f7c948">${open}</div><div class="l">Open</div></div>
  <div class="stat"><div class="v" style="color:#4ade80">${avgResp}d</div><div class="l">Avg Response</div></div>
  <div class="stat"><div class="v" style="color:#ef4444">${overdue}</div><div class="l">Overdue</div></div>`;
 document.getElementById('list').innerHTML=f.map(r=>{
  const od=isOverdue(r),d=daysOpen(r);
  const cls=od?'overdue':r.status==='Answered'?'answered':r.status==='Closed'?'closed':'';
  return `<div class="rfi-card ${cls}">
  <div class="top"><div><span style="font-weight:700;color:#ff6b35">${fmtNum(r.num)}</span>
  ${r.priority==='Urgent'?'<span class="badge urgent">URGENT</span>':''}
  <span class="badge">${r.status}</span>
  ${od?'<span class="badge overdue">OVERDUE</span>':''}</div>
  <div style="display:flex;align-items:center;gap:4px">
  <span class="days ${od?'over':d>7?'warn':'ok'}">${d}d</span>
  <select onchange="changeStatus(${r.num},this.value)" style="padding:6px;background:#0f0f10;border:1px solid #2a2a2d;border-radius:4px;color:#e0e0e0;font-size:.8rem">
  ${['Open','Answered','Closed','Void'].map(s=>`<option${r.status===s?' selected':''}>${s}</option>`).join('')}</select>
  <button class="del" onclick="delRFI(${r.num})">&#10005;</button></div></div>
  <div class="subj">${r.subj}</div>
  <div class="q">${r.question}</div>
  <div class="meta">
  ${r.by?'<span>From: '+r.by+'</span>':''}${r.to?'<span>To: '+r.to+'</span>':''}
  <span>Submitted: ${r.dateSubmit}</span>${r.dateNeed?'<span>Needed: '+r.dateNeed+'</span>':''}</div>
  ${r.answer?'<div class="ans"><strong>Response ('+r.respDate+'):</strong> '+r.answer+(r.respBy?' — '+r.respBy:'')+'</div>':''}
  ${r.status==='Open'?`<div><button class="btn btn-sm btn-green" onclick="toggleResp(${r.num})" style="margin-top:6px">Add Response</button>
  <div class="collapse" id="resp-${r.num}"><div class="resp-form">
  <div class="field"><label>Answer</label><textarea id="ans-${r.num}"></textarea></div>
  <div class="field"><label>Responded By</label><input id="respby-${r.num}"></div>
  <button class="btn btn-sm btn-green" onclick="submitResp(${r.num})">Submit Response</button>
  </div></div></div>`:''}
  </div>`}).join('');
}
function exportData(){
 let t='RFI TRACKER\n'+new Date().toLocaleDateString()+'\n'+('='.repeat(40))+'\n\n';
 rfis.forEach(r=>{
  t+=`${fmtNum(r.num)}: ${r.subj}\n  Status: ${r.status} | Priority: ${r.priority} | Days Open: ${daysOpen(r)}\n`;
  t+=`  From: ${r.by} | To: ${r.to} | Submitted: ${r.dateSubmit}`;
  if(r.dateNeed)t+=` | Needed: ${r.dateNeed}`;t+='\n';
  t+=`  Question: ${r.question}\n`;
  if(r.answer)t+=`  Answer (${r.respDate}): ${r.answer}${r.respBy?' — '+r.respBy:''}\n`;
  if(isOverdue(r))t+=`  *** OVERDUE ***\n`;t+='\n';});
 navigator.clipboard.writeText(t).then(()=>alert('Copied to clipboard'));
}
document.getElementById('rDate').value=new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
