<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Nerdle</title>
<style>
:root{--bg:#121213;--bg2:#1a1a1c;--border:#3a3a3c;--text:#ffffff;--dim:#818384;--correct:#7b5ea7;--present:#9b59b6;--gray:#3a3a3c;--key-bg:#818384;--key-text:#ffffff;--accent:#9b59b6;--toast-bg:#ffffff;--toast-text:#121213}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden;touch-action:manipulation;user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto}
header{display:flex;align-items:center;justify-content:center;padding:8px 16px;border-bottom:1px solid var(--border);position:relative;min-height:50px}
header h1{font-size:1.5rem;font-weight:800;letter-spacing:0.08em;background:linear-gradient(135deg,var(--accent),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-btn{background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;padding:4px 8px;position:absolute}
#statsBtn{right:12px}
#helpBtn{left:12px;font-size:1rem}
.game-num{font-size:0.6rem;color:var(--dim);position:absolute;bottom:2px}
#board{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:5px;padding:10px}
.row{display:flex;gap:4px}
.tile{width:52px;height:52px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;transition:border-color 0.1s}
.tile.filled{border-color:#565758}
.tile.pop{animation:pop 0.1s ease}
.tile.flip{animation:flipTile 0.5s ease forwards}
.tile.correct{--flip-bg:var(--correct);box-shadow:0 0 6px rgba(123,94,167,0.5)}
.tile.present{--flip-bg:var(--present);box-shadow:0 0 6px rgba(155,89,182,0.4)}
.tile.absent{--flip-bg:var(--gray)}
.tile.bounce{animation:bounce 0.6s ease}
.row.shake{animation:shake 0.5s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes flipTile{0%{transform:rotateX(0deg)}50%{transform:rotateX(90deg);background:transparent;border-color:transparent}51%{background:var(--flip-bg);border-color:var(--flip-bg);color:#fff}100%{transform:rotateX(0deg);background:var(--flip-bg);border-color:var(--flip-bg);color:#fff}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}50%{transform:translateY(-7px)}70%{transform:translateY(-3px)}}
#keyboard{padding:8px 6px 12px;display:flex;flex-direction:column;gap:6px;align-items:center}
.kb-row{display:flex;gap:4px}
.key{height:52px;min-width:38px;border:none;border-radius:4px;background:var(--key-bg);color:var(--key-text);font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s,transform 0.05s;padding:0 4px}
.key:active{transform:scale(0.95)}
.key.wide{min-width:60px;font-size:0.7rem}
.key.correct{background:var(--correct);color:#fff}
.key.present{background:var(--present);color:#fff}
.key.absent{background:#3a3a3c;color:#fff}
.key.op{background:#4a4a4e;font-size:1.1rem}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--toast-bg);color:var(--toast-text);padding:12px 20px;border-radius:4px;font-weight:700;font-size:0.9rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
#toast.show{opacity:1}
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200}
#modal.show{display:flex}
.modal-content{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:380px;width:90%;text-align:center;max-height:90vh;overflow-y:auto}
.modal-content h2{margin-bottom:16px;font-size:1.1rem}
.stat-row{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-val{font-size:2rem;font-weight:700}
.stat-label{font-size:0.6rem;color:var(--dim)}
.dist{text-align:left;margin:12px 0}
.dist-row{display:flex;align-items:center;gap:4px;margin:3px 0}
.dist-num{font-size:0.75rem;width:10px}
.dist-bar{height:20px;min-width:20px;background:var(--gray);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:0.7rem;font-weight:700;color:#fff;border-radius:2px}
.dist-bar.highlight{background:var(--correct)}
.share-btn{background:var(--correct);color:#fff;border:none;border-radius:4px;padding:12px 24px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:8px}
.share-btn:active{opacity:0.8}
.help-text{text-align:left;font-size:0.8rem;color:var(--dim);line-height:1.6;margin:12px 0}
.help-text b{color:var(--text)}
.example{display:flex;gap:3px;margin:8px 0;justify-content:center}
.ex-tile{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;color:#fff;border-radius:3px}
@media(max-width:500px){.tile{width:44px;height:44px;font-size:1.3rem}.key{height:46px;min-width:32px;font-size:0.9rem}.key.wide{min-width:50px}}
</style>
</head>

  return Math.abs(left-right)<0.0001&&Number.isInteger(left)&&left>=0;}catch(e){return false;}
});

const answer=VALID_EQUATIONS[dayNum%VALID_EQUATIONS.length];
const COLS=8,ROWS_COUNT=6;
const VALID_CHARS=new Set('0123456789+-*/='.split(''));

let board=Array.from({length:ROWS_COUNT},()=>Array(COLS).fill(''));
let colors=Array.from({length:ROWS_COUNT},()=>Array(COLS).fill(''));
let row=0,col=0,gameOver=false;
let keyColors={};
let startingGuessUsed=false;
let audioCtx=null;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,dur,vol=0.02,type='sine'){
  try{const ctx=getAudio();const o=ctx.createOscillator();const g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(ctx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.stop(ctx.currentTime+dur);}catch(e){}
}
function clickSound(){playTone(600,0.05,0.015);}
function flipSound(i){playTone(350+i*60,0.1,0.02);}
function winSound(){[440,554,659,880].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,0.02),i*100));}
function errorSound(){playTone(180,0.15,0.015,'square');}

const boardEl=document.getElementById('board');
function renderBoard(){
  boardEl.innerHTML='';
  for(let r=0;r<ROWS_COUNT;r++){
    const rowEl=document.createElement('div');rowEl.className='row';rowEl.id='row-'+r;
    for(let c=0;c<COLS;c++){
      const t=document.createElement('div');t.className='tile';
      if(board[r][c])t.classList.add('filled');
      if(colors[r][c])t.classList.add(colors[r][c]);
      t.textContent=board[r][c];
      t.id='tile-'+r+'-'+c;
      rowEl.appendChild(t);
    }
    boardEl.appendChild(rowEl);
  }
}

const KB_ROWS=[['1','2','3','4','5','6','7','8','9','0'],['+','-','*','/','=','Enter','Delete']];
const kbEl=document.getElementById('keyboard');
function renderKeyboard(){
  kbEl.innerHTML='';
  KB_ROWS.forEach(kr=>{
    const rowEl=document.createElement('div');rowEl.className='kb-row';
    kr.forEach(k=>{
      const btn=document.createElement('button');btn.className='key';
      if(k==='Enter'||k==='Delete'){btn.classList.add('wide');btn.textContent=k==='Delete'?'⌫':'ENTER';}
      else{btn.textContent=k;if('+-*/='.includes(k))btn.classList.add('op');}
      if(keyColors[k])btn.classList.add(keyColors[k]);
      btn.addEventListener('click',()=>handleKey(k));
      rowEl.appendChild(btn);
    });
    kbEl.appendChild(rowEl);
  });
}

function showToast(msg,dur=1500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function isValidEquation(str){
  if(str.length!==8)return false;
  const eqIdx=str.indexOf('=');
  if(eqIdx<1||eqIdx===str.length-1)return false;
  if(str.indexOf('=',eqIdx+1)!==-1)return false;
  const left=str.slice(0,eqIdx);const right=str.slice(eqIdx+1);
  if(!/^[\d+\-*/]+$/.test(left)||!/^\d+$/.test(right))return false;
  if(/[+\-*/]{2}/.test(left))return false;
  if(/^[*/]/.test(left)||/[+\-*/]$/.test(left))return false;
  if(right.length>1&&right[0]==='0')return false;
  try{const lv=Function('"use strict";return ('+left+')')();
  const rv=parseFloat(right);
  return Number.isFinite(lv)&&Math.abs(lv-rv)<0.0001&&Number.isInteger(lv)&&lv>=0;}catch(e){return false;}
}

function handleKey(key){
  if(gameOver)return;
  if(key==='Delete'||key==='Backspace'){
    if(col>0){col--;board[row][col]='';renderBoard();}return;
  }
  if(key==='Enter'){
    if(col<COLS){showToast('Not enough characters');shakeRow();return;}
    const guess=board[row].join('');
    if(!isValidEquation(guess)){showToast("That doesn't compute!");shakeRow();errorSound();return;}
    revealRow(guess);return;
  }
  if(VALID_CHARS.has(key)&&col<COLS){
    board[row][col]=key;col++;renderBoard();
    const tile=document.getElementById('tile-'+row+'-'+(col-1));
    if(tile)tile.classList.add('pop');
    clickSound();
  }
}

function shakeRow(){
  const rowEl=document.getElementById('row-'+row);
  if(rowEl){rowEl.classList.add('shake');setTimeout(()=>rowEl.classList.remove('shake'),500);}
}

function getColors(guess,target){
  const res=Array(COLS).fill('absent');
  const tArr=target.split('');const gArr=guess.split('');
  for(let i=0;i<COLS;i++){if(gArr[i]===tArr[i]){res[i]='correct';tArr[i]='_';gArr[i]='*';}}
  for(let i=0;i<COLS;i++){if(gArr[i]!=='*'){const idx=tArr.indexOf(gArr[i]);if(idx!==-1){res[i]='present';tArr[idx]='_';}}}
  return res;
}

function revealRow(guess){
  const result=getColors(guess,answer);
  let delay=0;
  for(let c=0;c<COLS;c++){
    setTimeout(()=>{
      colors[row][c]=result[c];
      const tile=document.getElementById('tile-'+row+'-'+c);
      if(tile)tile.classList.add('flip',result[c]);
      flipSound(c);
      const ch=guess[c];
      if(result[c]==='correct')keyColors[ch]='correct';
      else if(result[c]==='present'&&keyColors[ch]!=='correct')keyColors[ch]='present';
      else if(result[c]==='absent'&&!keyColors[ch])keyColors[ch]='absent';
      if(c===COLS-1){
        setTimeout(()=>{
          renderBoard();renderKeyboard();
          if(guess===answer){winGame();}
          else if(row>=ROWS_COUNT-1){loseGame();}
          else{row++;col=0;}
          saveGame();
        },300);
      }
    },delay);
    delay+=100;
  }
}

function winGame(){
  gameOver=true;
  setTimeout(()=>{for(let c=0;c<COLS;c++){setTimeout(()=>{const t=document.getElementById('tile-'+row+'-'+c);if(t)t.classList.add('bounce');},c*80);}},200);
  winSound();saveStats(true,row+1);
  setTimeout(()=>showStats(),1800);
}
function loseGame(){
  gameOver=true;showToast(answer,3000);saveStats(false,0);
  setTimeout(()=>showStats(),2500);
}

function getStats(){return JSON.parse(localStorage.getItem('nerdlestats')||'{"played":0,"won":0,"streak":0,"maxStreak":0,"dist":[0,0,0,0,0,0],"lastDay":-1}');}
function saveStats(win,guesses){
  const s=getStats();if(s.lastDay===dayNum)return;
  s.played++;s.lastDay=dayNum;
  if(win){s.won++;s.streak++;if(s.streak>s.maxStreak)s.maxStreak=s.streak;s.dist[guesses-1]++;}
  else s.streak=0;
  localStorage.setItem('nerdlestats',JSON.stringify(s));
}

function showStats(){
  const s=getStats();const modal=document.getElementById('modal');const mc=document.getElementById('modalContent');
  const maxDist=Math.max(...s.dist,1);
  mc.innerHTML=`<h2>Statistics</h2>
  <div class="stat-row">
    <div class="stat"><div class="stat-val">${s.played}</div><div class="stat-label">Played</div></div>
    <div class="stat"><div class="stat-val">${s.played?Math.round(s.won/s.played*100):0}</div><div class="stat-label">Win %</div></div>
    <div class="stat"><div class="stat-val">${s.streak}</div><div class="stat-label">Streak</div></div>
    <div class="stat"><div class="stat-val">${s.maxStreak}</div><div class="stat-label">Max Streak</div></div>
  </div>
  <div class="dist">${s.dist.map((d,i)=>`<div class="dist-row"><div class="dist-num">${i+1}</div><div class="dist-bar${gameOver&&row===i?' highlight':''}" style="width:${Math.max(8,d/maxDist*100)}%">${d}</div></div>`).join('')}</div>
  ${gameOver?`<button class="share-btn" onclick="shareResult()">Share 📋</button>`:''}
  <br><button class="share-btn" style="background:var(--gray)" onclick="document.getElementById('modal').classList.remove('show')">Close</button>`;
  modal.classList.add('show');
}

window.shareResult=function(){
  const emojis=colors.slice(0,row+1).map(r=>r.map(c=>c==='correct'?'🟪':c==='present'?'🟣':'⬛').join('')).join('\n');
  const text=`Nerdle #${dayNum} ${gameOver&&board[row].join('')===answer?row+1:'X'}/6\n\n${emojis}`;
  navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!')).catch(()=>showToast('Could not copy'));
};

function showHelp(){
  const modal=document.getElementById('modal');const mc=document.getElementById('modalContent');
  mc.innerHTML=`<h2>How to Play Nerdle</h2>
  <div class="help-text">
  <p>Guess the math equation in 6 tries. Each guess must be a <b>valid equation</b> that is exactly <b>8 characters</b>.</p><br>
  <p>Use numbers <b>0-9</b> and operators <b>+ - * / =</b></p><br>
  <p>The equation must be mathematically correct (left side = right side).</p><br>
  <p>After each guess, the tiles change color:</p>
  </div>
  <div class="example">
    <div class="ex-tile" style="background:var(--correct)">1</div>
    <div class="ex-tile" style="background:var(--gray)">2</div>
    <div class="ex-tile" style="background:var(--present)">+</div>
    <div class="ex-tile" style="background:var(--gray)">3</div>
    <div class="ex-tile" style="background:var(--gray)">4</div>
    <div class="ex-tile" style="background:var(--correct)">=</div>
    <div class="ex-tile" style="background:var(--gray)">4</div>
    <div class="ex-tile" style="background:var(--gray)">6</div>
  </div>
  <div class="help-text">
  <p><b style="color:var(--correct)">Purple</b> = right character, right spot</p>
  <p><b style="color:var(--present)">Light purple</b> = right character, wrong spot</p>
  <p><b style="color:var(--gray)">Gray</b> = not in the equation</p>
  </div>
  <br><button class="share-btn" style="background:var(--gray)" onclick="document.getElementById('modal').classList.remove('show')">Got it!</button>`;
  modal.classList.add('show');
}

function loadGame(){
  const saved=JSON.parse(localStorage.getItem('nerdlegame')||'null');
  if(saved&&saved.day===dayNum){board=saved.board;colors=saved.colors;row=saved.row;col=saved.col;gameOver=saved.gameOver;keyColors=saved.keyColors||{};startingGuessUsed=true;}
}
function saveGame(){
  localStorage.setItem('nerdlegame',JSON.stringify({day:dayNum,board,colors,row,col,gameOver,keyColors}));
}

// Random starting expression — auto-submit a valid equation as first guess
var STARTING_GUESSES=["10+26=36","48-13=35","9*6-2=52","72/8+1=10","15+33=48","50-17=33","7*8-6=50","24/4+8=14","32+16=48","81/9+3=12"];
function autoFirstGuess(){
  if(startingGuessUsed||row>0||gameOver)return;
  startingGuessUsed=true;
  var starter=STARTING_GUESSES[dayNum%STARTING_GUESSES.length];
  for(var i=0;i<COLS;i++){board[0][i]=starter[i];}
  col=COLS;
  renderBoard();
  setTimeout(function(){handleKey('Enter');},300);
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Enter')handleKey('Enter');
  else if(e.key==='Backspace')handleKey('Delete');
  else if(VALID_CHARS.has(e.key))handleKey(e.key);
});

const origHandle=handleKey;
handleKey=function(k){origHandle(k);saveGame();};

document.getElementById('statsBtn').addEventListener('click',showStats);
document.getElementById('helpBtn').addEventListener('click',showHelp);
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')e.target.classList.remove('show');});

loadGame();renderBoard();renderKeyboard();
setTimeout(function(){autoFirstGuess();},500);
})();
</script>
</body>
</html>
