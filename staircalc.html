<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stair Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;padding:16px;max-width:600px;margin:0 auto}
a{color:var(--accent);text-decoration:none}
h1{font-size:1.3rem;margin:8px 0 16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card h2{font-size:.95rem;color:var(--accent);margin-bottom:10px}
label{display:block;font-size:.8rem;color:var(--dim);margin-bottom:3px}
input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:1rem;margin-bottom:8px}
.row{display:flex;gap:8px}.row>*{flex:1}
.rr{display:flex;justify-content:space-between;padding:5px 0;font-size:.88rem;border-bottom:1px solid var(--border)}
.rr:last-child{border:none}
.rr span:first-child{color:var(--dim)}
.rr .val{color:var(--green);font-weight:600}
.warn{color:#f87171;font-weight:600}
.ok{color:var(--green);font-weight:600}
canvas{width:100%;height:200px;border-radius:8px;background:var(--bg)}
.note{font-size:.75rem;color:var(--dim);margin-top:6px}
table{width:100%;font-size:.78rem;border-collapse:collapse}
td,th{padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:600}
.badge.pass{background:#064e3b;color:var(--green)}
.badge.fail{background:#450a0a;color:#f87171}
</style>
</head>
<body>
<a href="index.html">&larr; home</a>
<h1>Stair Calculator</h1>

<div class="card">
<h2>Input</h2>
<div class="row">
<div><label>Total Rise — floor to floor (in)</label><input type="number" id="tr" value="108" oninput="calc()" step="any"></div>
<div><label>Desired Riser Height (in)</label><input type="number" id="dr" value="7.5" oninput="calc()" step="any"></div>
</div>
<p class="note">Rule: 2R + T = 24&ndash;26 in (targeting 25). Code: riser 4&ndash;7.75 in, tread &ge; 10 in.</p>
</div>

<div class="card">
<h2>Side View</h2>
<canvas id="cv"></canvas>
</div>

<div class="card">
<h2>Results</h2>
<div id="out"></div>
</div>

<div class="card">
<h2>Code Reference (IRC 2021)</h2>
<table>
<tr><th>Parameter</th><th>Min</th><th>Max</th></tr>
<tr><td>Riser height</td><td>4"</td><td>7.75" (7 3/4")</td></tr>
<tr><td>Tread depth</td><td>10"</td><td>--</td></tr>
<tr><td>Headroom</td><td>6' 8"</td><td>--</td></tr>
<tr><td>Width</td><td>36"</td><td>--</td></tr>
<tr><td>Nosing</td><td>3/4"</td><td>1 1/4"</td></tr>
<tr><td>Handrail height</td><td>34"</td><td>38"</td></tr>
</table>
</div>

<script>
function calc(){
  const totalRise=+document.getElementById('tr').value;
  const desired=+document.getElementById('dr').value;
  if(!totalRise||!desired){document.getElementById('out').innerHTML='';return;}

  const numRisers=Math.round(totalRise/desired);
  const actualRiser=totalRise/numRisers;
  const tread=25-2*actualRiser;
  const numTreads=numRisers-1;
  const totalRun=numTreads*tread;
  const stringer=Math.sqrt(totalRise*totalRise+totalRun*totalRun);
  const angle=Math.atan2(totalRise,totalRun)*180/Math.PI;

  const riserOk=actualRiser>=4&&actualRiser<=7.75;
  const treadOk=tread>=10;
  const comfortOk=(2*actualRiser+tread)>=24&&(2*actualRiser+tread)<=26;

  function badge(ok){return '<span class="badge '+(ok?'pass':'fail')+'">'+(ok?'PASS':'FAIL')+'</span>';}

  let h='';
  h+='<div class="rr"><span>Number of risers</span><span class="val">'+numRisers+'</span></div>';
  h+='<div class="rr"><span>Actual riser height</span><span class="val">'+actualRiser.toFixed(3)+'" '+badge(riserOk)+'</span></div>';
  h+='<div class="rr"><span>Number of treads</span><span>'+numTreads+'</span></div>';
  h+='<div class="rr"><span>Tread depth (2R+T=25)</span><span class="val">'+tread.toFixed(3)+'" '+badge(treadOk)+'</span></div>';
  h+='<div class="rr"><span>2R + T</span><span>'+(2*actualRiser+tread).toFixed(2)+'" '+badge(comfortOk)+'</span></div>';
  h+='<div class="rr"><span>Total run</span><span>'+totalRun.toFixed(2)+'" ('+(totalRun/12).toFixed(2)+' ft)</span></div>';
  h+='<div class="rr"><span>Stringer length</span><span class="val">'+stringer.toFixed(2)+'" ('+(stringer/12).toFixed(2)+' ft)</span></div>';
  h+='<div class="rr"><span>Angle</span><span>'+angle.toFixed(1)+'&deg;</span></div>';
  document.getElementById('out').innerHTML=h;
  draw(numRisers,actualRiser,tread,totalRise,totalRun);
}

function draw(n,r,t,totalR,totalRun){
  const cv=document.getElementById('cv');
  cv.width=cv.clientWidth*2;cv.height=cv.clientHeight*2;
  const ctx=cv.getContext('2d');ctx.scale(2,2);
  const w=cv.clientWidth,h=cv.clientHeight;
  ctx.clearRect(0,0,w,h);

  const pad=30;
  const drawW=w-pad*2,drawH=h-pad*2;
  const scaleX=drawW/totalRun,scaleY=drawH/totalR;
  const sc=Math.min(scaleX,scaleY)*0.9;
  const ox=pad,oy=h-pad;

  // Draw stair steps
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.moveTo(ox,oy);
  for(let i=0;i<n;i++){
    const x1=ox+(i>0?i-0:0)*t*sc+(i===0?0:0);
    const riserBottom=oy-i*r*sc;
    const riserTop=oy-(i+1)*r*sc;
    // riser (vertical)
    ctx.lineTo(ox+(i)*t*sc, riserBottom);
    ctx.lineTo(ox+(i)*t*sc, riserTop);
    // tread (horizontal) - except after last riser
    if(i<n-1){
      ctx.lineTo(ox+(i+1)*t*sc, riserTop);
    }
  }
  ctx.stroke();

  // Stringer line
  ctx.strokeStyle='#4ade80';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+(n-1)*t*sc,oy-n*r*sc);ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle='var(--dim)';ctx.font='10px sans-serif';
  ctx.fillText('Total rise: '+(totalR/12).toFixed(1)+"'",ox+4,oy-totalR*sc*0.5);
  ctx.fillText('Total run: '+(totalRun/12).toFixed(1)+"'",ox+totalRun*sc*0.3,oy+14);
}
calc();
</script>
</body>
</html>
