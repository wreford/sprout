// ═══ PROVEN NARRATION (from jesusdunks.html) ═══
var lastCommentary=0;
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastCommentary<8000)return;
    lastCommentary=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=0.85;u.pitch=0.8;u.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var v=null;
          for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.indexOf('en')===0){v=voices[i];break;}}
          if(v)u.voice=v;
        }
        speechSynthesis.speak(u);
      }catch(e){}
    },60);
  }catch(e){}
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ═══ Jokes (60+ short) ═══
var SAVES=["Saved. Divine.","Blocked. Hallelujah.","Denied. Amen.","Glove save. Blessed leather.","Not today, puck.","The crease is sacred ground.","Stick save. Carpentry helps.","Another miracle on ice.","The net stays pure.","Rejected. Like a false prophet.","What reflexes. What divinity.","Saved by the bell. And Jesus.","That puck found religion.","Stone cold stop.","Nope. Access denied."];
var GOALS=["Goal. Even God blinked.","In. The organ weeps.","Scored. The halo dims.","Five hole. Humbling.","That got through. Somehow.","The crowd gasps.","Goal. Moving on.","In. Regrettable.","Even saints miss sometimes.","The net has been violated."];
var RANDOMS=["The Zamboni is Noah's.","Penalty box equals confession.","Team mascot: a lamb.","The ref is Judas.","Arena capacity: five thousand.","Concessions: bread and fish.","The ice is holy water.","Jersey number: thirty three.","Overtime is purgatory.","The blue line is the red sea.","Hat trick equals holy trinity.","The scoreboard is scripture.","The team doctor is Luke.","Draft pick: number one son.","The cup is the holy grail.","The away team: the Romans.","Parking: donkeys only.","The anthem: a hymn.","The jumbotron shows parables.","Ticket price: free will.","Power play: divine intervention.","The goalie coach is God.","The ice girls are angels.","Intermission: forty days.","The replay goes to heaven."];

// ═══ Audio ═══
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function organ(freq,dur,vol){
  if(!audioCtx)return;
  [1,2,3,4].forEach(function(h){
    var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.type="sine";osc.frequency.value=freq*h;
    g.gain.setValueAtTime((vol||0.02)/(h*h),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+dur);
  });
}
function sndSave(){organ(523,0.15,0.02);setTimeout(function(){organ(659,0.15,0.02);},80);setTimeout(function(){organ(784,0.2,0.02);},160);}
function sndGoal(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type="sawtooth";osc.frequency.value=150;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.5);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+1.5);
}
function sndBigSave(){organ(784,0.2,0.02);setTimeout(function(){organ(988,0.2,0.02);},100);setTimeout(function(){organ(1175,0.3,0.02);},200);}
function sndWhistle(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type="sine";osc.frequency.value=3200;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.4);
}
function sndPost(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type="triangle";osc.frequency.value=800;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.15);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.15);
}
function sndCrowdBurst(){
  if(!audioCtx)return;
  var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.2,audioCtx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.3;
  var src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.015,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.3);
  src.connect(g);g.connect(audioCtx.destination);src.start();
}
function sndPowerUp(){organ(440,0.1,0.02);setTimeout(function(){organ(554,0.1,0.02);},80);setTimeout(function(){organ(660,0.1,0.02);},160);setTimeout(function(){organ(880,0.15,0.02);},240);}

// Music
var musicPlaying=false,musicInterval=null;
function playChargeTheme(){
  if(musicPlaying)return;musicPlaying=true;
  var notes=[{f:262,t:0,d:0.2},{f:330,t:200,d:0.2},{f:392,t:400,d:0.2},{f:523,t:600,d:0.4},{f:392,t:1000,d:0.2},{f:523,t:1200,d:0.6}];
  function playOnce(){notes.forEach(function(n){setTimeout(function(){organ(n.f,n.d,0.015);},n.t);});}
  playOnce();musicInterval=setInterval(playOnce,6000);
}
function playWaltz(){
  if(musicPlaying)return;musicPlaying=true;
  var notes=[{f:262,t:0,d:0.4},{f:330,t:500,d:0.3},{f:392,t:1000,d:0.3},{f:330,t:1500,d:0.4},{f:262,t:2000,d:0.5}];
  function playOnce(){notes.forEach(function(n){setTimeout(function(){organ(n.f,n.d,0.01);},n.t);});}
  playOnce();musicInterval=setInterval(playOnce,3000);
}
function stopMusic(){musicPlaying=false;clearInterval(musicInterval);}

var goalie,pucks,particles,crowd,shooters,powerUps;

var periodTime,period,crowdMood,goalFlash;

var goalW,goalH,netX,netY,netW,netH;
var faceoffTimer=0,lastRandomTime=0;
var dasherAds=["HOLY WATER Co.","BLESSED INSURANCE","NAZARETH NAILS","FISH & BREAD Inc.","ARK CRUISES"];

// Power-up state
var shieldCount=0,wideTimer=0,freezeTimer=0;
var powerUpTimer=0;

// ═══ Goalie Figure (80px tall, detailed) ═══
function drawGoalie(x,y,goW,goH,armRaise){
  var sc=80/60;
  var headR=7*sc, bodyLen=22*sc, armLen=16*sc, legLen=18*sc, padW=7*sc, padH=16*sc;
  var headY=y-4-legLen-bodyLen-headR;
  var neckY=headY+headR;
  var hipY=neckY+bodyLen;
  var footY=hipY+legLen;

  // Halo glow
  ctx.save();
  ctx.shadowColor="rgba(255,215,0,0.6)";ctx.shadowBlur=18;
  ctx.strokeStyle="rgba(255,215,0,0.9)";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.ellipse(x,headY-headR-4*sc,headR+4*sc,5*sc,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Head
  ctx.fillStyle="#ffd3a3";ctx.strokeStyle="#333";ctx.lineWidth=1.5*sc;
  ctx.beginPath();ctx.arc(x,headY,headR,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Eyes
  ctx.fillStyle="#333";
  ctx.beginPath();ctx.arc(x-3*sc,headY-1*sc,1.2*sc,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+3*sc,headY-1*sc,1.2*sc,0,Math.PI*2);ctx.fill();
  // Helmet
  ctx.strokeStyle="#555";ctx.lineWidth=1.5*sc;
  ctx.beginPath();ctx.arc(x,headY,headR+1*sc,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();

  // Body
  ctx.strokeStyle="#333";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(x,neckY);ctx.lineTo(x,hipY);ctx.stroke();

  // Jersey (white with lines)
  ctx.fillStyle="#ffffff";
  ctx.fillRect(x-7*sc,neckY+2*sc,14*sc,15*sc);
  ctx.strokeStyle="rgba(200,200,200,0.5)";ctx.lineWidth=0.8*sc;
  ctx.strokeRect(x-7*sc,neckY+2*sc,14*sc,15*sc);
  // Jersey stripes
  ctx.strokeStyle="rgba(180,180,180,0.4)";ctx.lineWidth=0.5*sc;
  ctx.beginPath();ctx.moveTo(x-7*sc,neckY+7*sc);ctx.lineTo(x+7*sc,neckY+7*sc);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-7*sc,neckY+12*sc);ctx.lineTo(x+7*sc,neckY+12*sc);ctx.stroke();
  // Red cross on chest
  ctx.strokeStyle="rgba(200,0,0,0.8)";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,neckY+4*sc);ctx.lineTo(x,neckY+14*sc);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-4*sc,neckY+8*sc);ctx.lineTo(x+4*sc,neckY+8*sc);ctx.stroke();

  // Left arm (glove hand) - blocker
  var lAng=Math.PI/2+0.4+armRaise*-1.0;
  var lAX=x+Math.cos(lAng)*armLen, lAY=neckY+5*sc+Math.sin(lAng)*armLen;
  ctx.strokeStyle="#333";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(x-3*sc,neckY+5*sc);ctx.lineTo(lAX,lAY);ctx.stroke();
  // Glove (blocker)
  ctx.fillStyle="#cc2222";
  ctx.beginPath();ctx.arc(lAX,lAY,4.5*sc,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#991111";ctx.lineWidth=1*sc;ctx.stroke();

  // Right arm (stick hand) - catcher
  var rAng=Math.PI/2-0.4-armRaise*-1.0;
  rAng=Math.PI-rAng;
  var rAX=x+Math.cos(rAng)*armLen, rAY=neckY+5*sc-Math.sin(rAng)*armLen;
  ctx.strokeStyle="#333";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(x+3*sc,neckY+5*sc);ctx.lineTo(rAX,rAY);ctx.stroke();
  // Stick
  ctx.strokeStyle="#8B4513";ctx.lineWidth=3*sc;
  ctx.beginPath();ctx.moveTo(rAX,rAY);ctx.lineTo(rAX+14*sc,rAY+12*sc);ctx.stroke();
  // Blade
  ctx.strokeStyle="#8B4513";ctx.lineWidth=3.5*sc;
  ctx.beginPath();ctx.moveTo(rAX+14*sc,rAY+12*sc);ctx.lineTo(rAX+22*sc,rAY+12*sc);ctx.stroke();

  // Legs with goalie pads
  var spread=0.45;
  var lFootX=x-spread*legLen, rFootX=x+spread*legLen;
  ctx.strokeStyle="#333";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(lFootX,footY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(rFootX,footY);ctx.stroke();

  // Goalie pads (rectangles on legs)
  ctx.fillStyle="#eeeeee";ctx.strokeStyle="#aaa";ctx.lineWidth=1*sc;
  var padAngleL=Math.atan2(footY-hipY,lFootX-x);
  var padAngleR=Math.atan2(footY-hipY,rFootX-x);
  // Left pad
  ctx.save();ctx.translate((x+lFootX)/2,(hipY+footY)/2);ctx.rotate(padAngleL);
  ctx.fillRect(-padW/2,-padH/2,padW,padH);ctx.strokeRect(-padW/2,-padH/2,padW,padH);
  // Pad stripe
  ctx.fillStyle="rgba(200,0,0,0.3)";ctx.fillRect(-padW/2,-padH/2,padW,3*sc);
  ctx.restore();
  // Right pad
  ctx.save();ctx.translate((x+rFootX)/2,(hipY+footY)/2);ctx.rotate(padAngleR);
  ctx.fillStyle="#eeeeee";ctx.fillRect(-padW/2,-padH/2,padW,padH);ctx.strokeStyle="#aaa";ctx.strokeRect(-padW/2,-padH/2,padW,padH);
  ctx.fillStyle="rgba(200,0,0,0.3)";ctx.fillRect(-padW/2,-padH/2,padW,3*sc);
  ctx.restore();

  // Skates
  ctx.fillStyle="#222";
  ctx.fillRect(lFootX-3*sc,footY-1*sc,7*sc,3*sc);
  ctx.fillRect(rFootX-3*sc,footY-1*sc,7*sc,3*sc);
  // Blades
  ctx.fillStyle="#aaa";
  ctx.fillRect(lFootX-3*sc,footY+2*sc,7*sc,1.5*sc);
  ctx.fillRect(rFootX-3*sc,footY+2*sc,7*sc,1.5*sc);
}

function drawShooter(x,y,height,armRaise,jerseyColor,legAnim){
  var sc=height/60,headR=6*sc,bodyLen=20*sc,armLen=14*sc,legLen=16*sc;
  var headY=y-height+headR,neckY=headY+headR,hipY=neckY+bodyLen;
  ctx.lineWidth=2*sc;ctx.lineCap="round";
  // Helmet
  ctx.fillStyle="#333";ctx.beginPath();ctx.arc(x,headY,headR+1*sc,0,Math.PI*2);ctx.fill();
  // Face
  ctx.fillStyle="#ffd3a3";ctx.beginPath();ctx.arc(x,headY+1*sc,headR*0.7,0,Math.PI*2);ctx.fill();
  // Body
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;ctx.beginPath();ctx.moveTo(x,neckY);ctx.lineTo(x,hipY);ctx.stroke();
  // Jersey
  ctx.fillStyle=jerseyColor||"#c22";ctx.fillRect(x-6*sc,neckY+2*sc,12*sc,13*sc);
  // Jersey number
  ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="bold "+(7*sc)+"px monospace";ctx.textAlign="center";
  ctx.fillText(""+Math.floor(x%30+10),x,neckY+12*sc);
  // Left arm
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,neckY+5*sc);ctx.lineTo(x-armLen*0.7,neckY+5*sc+armLen*0.5);ctx.stroke();
  // Right arm with stick
  var wA=armRaise*1.5;
  var rX=x+Math.cos(-wA)*armLen,rY=neckY+5*sc-Math.sin(wA)*armLen*0.8;
  ctx.beginPath();ctx.moveTo(x,neckY+5*sc);ctx.lineTo(rX,rY);ctx.stroke();
  ctx.strokeStyle="#8B4513";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(rX,rY);ctx.lineTo(rX+10*sc,rY+14*sc);ctx.lineTo(rX+16*sc,rY+14*sc);ctx.stroke();
  // Legs with skating animation
  var legSwing=legAnim||0;
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x-6*sc+Math.sin(legSwing)*4*sc,hipY+legLen);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x+6*sc-Math.sin(legSwing)*4*sc,hipY+legLen);ctx.stroke();
  // Skates
  ctx.fillStyle="#222";
  ctx.fillRect(x-8*sc+Math.sin(legSwing)*4*sc,hipY+legLen-1*sc,5*sc,3*sc);
  ctx.fillRect(x+4*sc-Math.sin(legSwing)*4*sc,hipY+legLen-1*sc,5*sc,3*sc);
}

function drawCrowdFig(x,y,color,bob,size,sign){
  var s=size||1;
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y+bob,4*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=1*s;
  ctx.beginPath();ctx.moveTo(x,y+4*s+bob);ctx.lineTo(x,y+12*s+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-4*s,y+7*s+bob);ctx.lineTo(x+4*s,y+7*s+bob);ctx.stroke();
  // Sign
  if(sign){
    ctx.fillStyle="rgba(255,255,255,0.85)";
    ctx.fillRect(x-12,y-14+bob,24,10);
    ctx.fillStyle="#c22";ctx.font="bold 6px monospace";ctx.textAlign="center";
    ctx.fillText(sign,x,y-7+bob);
  }
}

// ═══ Reset ═══
function reset(){
  goalW=Math.min(260,W*0.55);goalH=70;
  netX=W/2-goalW/2;netY=H-goalH-50;netW=goalW;netH=goalH;
  // Goalie stands IN FRONT of the net, not on top of it
  goalie={x:W/2,y:netY-30,w:50,h:80,targetX:W/2};
  pucks=[];particles=[];crowd=[];shooters=[];powerUps=[];
  var colors=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#ff69b4","#00bcd4","#8bc34a"];
  var signs=[null,null,null,null,null,null,null,"GO!","SAVE","J33",null,null,null,null,"AMEN",null,null,null,null,null,null,"HOLY!",null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null,null];
  for(var i=0;i<40;i++){
    var sz=0.7+Math.random()*0.6;
    crowd.push({x:15+Math.random()*(W-30),y:45+Math.random()*50,color:colors[Math.floor(Math.random()*colors.length)],bobSpeed:1+Math.random()*2,bobOffset:Math.random()*Math.PI*2,size:sz,sign:signs[i]||null});
  }
  for(var i=0;i<3;i++){
    shooters.push({x:W*0.3+i*(W*0.2),y:H*0.35,targetX:W/2,targetY:H*0.5,state:"idle",timer:60+i*80,armRaise:0,shotType:"wrist",jerseyColor:["#c0392b","#2980b9","#27ae60"][i],speed:1.5+Math.random()*0.5,homeX:W*0.3+i*(W*0.2),homeY:H*0.3,legPhase:Math.random()*Math.PI*2});
  }
  saves=0;goals=0;totalShots=0;frame=0;
  streak=0;bestStreak=0;
  shotSpeed=3.5;shotInterval=90;
  periodTime=3600;period=1;crowdMood=50;goalFlash=0;
  faceoffTimer=0;lastRandomTime=0;
  shieldCount=0;wideTimer=0;freezeTimer=0;powerUpTimer=1800;
}

// ═══ Shooting ═══
function shootPuck(sh){
  totalShots++;
  var fx=sh.x,fy=sh.y;
  // Aim at various spots across the net, some deliberately wide of goalie
  var tx=netX+10+Math.random()*(netW-20),ty=netY+10+Math.random()*netH*0.6;
  var dx=tx-fx,dy=ty-fy,len=Math.sqrt(dx*dx+dy*dy);
  var spd=shotSpeed,acc=0;
  if(sh.shotType==="slap"){spd*=1.5;acc=(Math.random()-0.5)*2.5;}
  else if(sh.shotType==="deke"){spd*=0.6;acc=(Math.random()-0.5)*0.4;}
  else{acc=(Math.random()-0.5)*0.6;}
  pucks.push({x:fx,y:fy,vx:dx/len*spd+acc,vy:dy/len*spd,curve:sh.shotType==="deke"?(Math.random()-0.5)*0.5:0,radius:8,active:true,bounces:0,type:sh.shotType,prevX:fx,prevY:fy});
}

// ═══ Input ═══
var mouseX=0;
function inputStart(cx){
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();playChargeTheme();sndWhistle();setTimeout(function(){speak("Puck drop. Let there be hockey.");},500);return;}
  if(STATE==="gameover"){STATE="playing";reset();playChargeTheme();sndWhistle();setTimeout(function(){speak("Puck drop. Let there be hockey.");},500);return;}
  mouseX=cx;
}
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;});
canvas.addEventListener('touchstart',function(e){e.preventDefault();inputStart(e.touches[0].clientX);},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();mouseX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('click',function(e){inputStart(e.clientX);});

// ═══ Particles ═══
function spawnParts(x,y,color,count){
  for(var i=0;i<count;i++){particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color:color,size:3+Math.random()*4});}
}

// ═══ Power-ups ═══
function spawnPowerUp(){
  var types=["shield","fish","water"];
  var t=types[Math.floor(Math.random()*types.length)];
  powerUps.push({x:50+Math.random()*(W-100),y:-20,vy:1+Math.random(),type:t,life:1});
}

// ═══ Update ═══
function update(){
  if(STATE!=="playing")return;
  frame++;
  periodTime--;
  if(goalFlash>0)goalFlash-=0.02;
  if(wideTimer>0){wideTimer--;goalie.w=80;}else{goalie.w=50;}
  if(freezeTimer>0)freezeTimer--;

  // Period transitions
  if(periodTime<=0){
    period++;periodTime=3600;sndWhistle();stopMusic();
    speak(period<=3?"Period over. Intermission.":"Final buzzer.");
    faceoffTimer=120;
    if(period>3){
      STATE="gameover";sndGoal();
      if(saves>bestSaves){bestSaves=saves;localStorage.setItem("js5-best",bestSaves);}
      return;
    }
    shotSpeed+=0.5;shotInterval=Math.max(25,shotInterval-10);
    playWaltz();setTimeout(function(){stopMusic();playChargeTheme();},3500);
  }

  if(faceoffTimer>0){faceoffTimer--;return;}

  // Random joke every 25s (~1500 frames)
  if(frame-lastRandomTime>1500&&frame>300){lastRandomTime=frame;speak(pick(RANDOMS));}

  // Power-up spawn
  powerUpTimer--;
  if(powerUpTimer<=0){spawnPowerUp();sndPowerUp();powerUpTimer=1800;}

  // Move goalie - constrained to net width
  goalie.targetX=Math.max(netX+goalie.w/2,Math.min(netX+netW-goalie.w/2,mouseX));
  goalie.x+=(goalie.targetX-goalie.x)*0.15;

  // Update shooters
  for(var s=0;s<shooters.length;s++){
    var sh=shooters[s];
    sh.timer--;
    if(sh.state==="skating"||sh.state==="retreat") sh.legPhase+=0.15;
    if(sh.state==="idle"&&sh.timer<=0){
      sh.state="skating";sh.targetX=W/2+(Math.random()-0.5)*200;sh.targetY=H*0.45+Math.random()*40;
      sh.shotType=["wrist","wrist","slap","slap","deke"][Math.floor(Math.random()*5)];
    }
    if(sh.state==="skating"){
      var dx=sh.targetX-sh.x,dy=sh.targetY-sh.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){sh.x+=dx/d*sh.speed*2;sh.y+=dy/d*sh.speed*2;}
      else{sh.state="windup";sh.timer=sh.shotType==="deke"?20:40;sh.armRaise=0;}
    }
    if(sh.state==="windup"){sh.armRaise=Math.min(1,sh.armRaise+0.04);sh.timer--;if(sh.timer<=0)sh.state="shoot";}
    if(sh.state==="shoot"){shootPuck(sh);sh.state="retreat";sh.timer=30;}
    if(sh.state==="retreat"){
      var dx=sh.homeX-sh.x,dy=sh.homeY-sh.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){sh.x+=dx/d*sh.speed*2.5;sh.y+=dy/d*sh.speed*2.5;}
      else{sh.state="idle";sh.timer=shotInterval+Math.floor(Math.random()*40);sh.armRaise=0;}
    }
  }

  // Update power-ups
  for(var i=powerUps.length-1;i>=0;i--){
    var pu=powerUps[i];
    pu.y+=pu.vy;
    // Check goalie collision
    if(Math.abs(pu.x-goalie.x)<goalie.w/2+15&&Math.abs(pu.y-(goalie.y+goalie.h/2))<goalie.h/2+15){
      if(pu.type==="shield"){shieldCount+=3;speak("Holy shield. Three free blocks.");}
      else if(pu.type==="fish"){wideTimer=300;speak("Fish power. The goalie grows.");}
      else if(pu.type==="water"){freezeTimer=120;speak("Holy water. Pucks frozen.");}
      sndPowerUp();spawnParts(pu.x,pu.y,"#ffd700",8);powerUps.splice(i,1);continue;
    }
    if(pu.y>H+30)powerUps.splice(i,1);
  }

  // Update pucks
  for(var i=pucks.length-1;i>=0;i--){
    var p=pucks[i];
    if(!p.active)continue;
    if(freezeTimer>0){continue;} // frozen

    // Store previous position for trail
    p.prevX=p.x;p.prevY=p.y;
    p.vx+=p.curve*0.02;p.x+=p.vx;p.y+=p.vy;

    // Side boards only (no bottom board - pucks should go past into net area)
    if(p.x<15){p.x=15;p.vx=Math.abs(p.vx)*0.9;}
    if(p.x>W-15){p.x=W-15;p.vx=-Math.abs(p.vx)*0.9;}
    if(p.y<30){p.y=30;p.vy=Math.abs(p.vy)*0.9;}

    // Goal posts - only the vertical posts of the goal frame
    var pL=netX,pR=netX+netW,cbar=netY;

    // Left post
    if(p.y>cbar&&p.y<cbar+netH&&Math.abs(p.x-pL)<6){
      p.vx=-Math.abs(p.vx)*0.8;p.x=pL-6;spawnParts(p.x,p.y,"#ff0",3);sndPost();continue;
    }
    // Right post
    if(p.y>cbar&&p.y<cbar+netH&&Math.abs(p.x-pR)<6){
      p.vx=Math.abs(p.vx)*0.8;p.x=pR+6;spawnParts(p.x,p.y,"#ff0",3);sndPost();continue;
    }
    // Crossbar - only bounces pucks that are ABOVE the goalie (haven't passed through yet)
    // Pucks that miss the goalie laterally should sail into the net, not bounce off crossbar
    if(p.vy>0&&Math.abs(p.y-cbar)<5&&p.x>pL+6&&p.x<pR-6){
      // Only bounce if puck is within goalie's x-range (would have been saved anyway)
      var gL2=goalie.x-goalie.w/2, gR2=goalie.x+goalie.w/2;
      if(p.x>gL2-p.radius&&p.x<gR2+p.radius){
        p.vy=-Math.abs(p.vy)*0.8;p.y=cbar-5;spawnParts(p.x,p.y,"#ff0",3);sndPost();continue;
      }
      // Otherwise puck passes through crossbar zone into the net - don't bounce
    }

    // Shield auto-block (in front of net)
    if(shieldCount>0&&p.y>goalie.y-20&&p.y<goalie.y+goalie.h&&p.x>netX&&p.x<netX+netW){
      shieldCount--;saves++;streak++;bestStreak=Math.max(bestStreak,streak);
      p.active=false;spawnParts(p.x,p.y,"#ffd700",5);sndBigSave();
      speak("Shield block. Automatic.");
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},300);})(p);
      continue;
    }

    // Goalie save - check if puck hits the goalie's body
    // Goalie hitbox: centered on goalie.x, from goalie.y to goalie.y+goalie.h, width = goalie.w
    var gL=goalie.x-goalie.w/2, gR=goalie.x+goalie.w/2;
    var gT=goalie.y, gB=goalie.y+goalie.h;
    if(p.x>gL-p.radius&&p.x<gR+p.radius&&p.y>gT-p.radius&&p.y<gB+p.radius){
      saves++;streak++;bestStreak=Math.max(bestStreak,streak);
      p.active=false;crowdMood=Math.min(100,crowdMood+5);
      var hitX=(p.x-goalie.x)/(goalie.w/2);
      var isGlove=hitX<0;
      if(streak===3){speak(STREAKS[0]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",6);sndCrowdBurst();}
      else if(streak===5){speak(STREAKS[1]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",8);sndCrowdBurst();}
      else if(streak===10){speak(STREAKS[2]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",10);sndCrowdBurst();}
      else if(streak===15){speak(STREAKS[3]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",12);sndCrowdBurst();}
      else if(streak===20){speak(STREAKS[4]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",15);sndCrowdBurst();}
      else{sndSave();spawnParts(p.x,p.y,isGlove?"#c22":"#8B4513",3);if(Math.random()<0.4)speak(pick(SAVES));}
      // Rebound
      if(Math.random()<0.25&&p.bounces<2){
        var bvx=hitX*5+p.vx*-0.3,bvy=-Math.abs(p.vy)*0.7-2;
        pucks.push({x:p.x+bvx*2,y:p.y+bvy*2,vx:bvx*0.6,vy:bvy*0.6,curve:0,radius:8,active:true,bounces:p.bounces+1,type:"wrist",prevX:p.x,prevY:p.y});
      }
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},300);})(p);
      continue;
    }

    // GOAL SCORED - puck got past the goalie and into the net area
    // The puck must be past the goalie's bottom edge AND within the net bounds
    if(p.active&&p.y>goalie.y+goalie.h*0.6&&p.x>netX+6&&p.x<netX+netW-6){
      goals++;streak=0;p.active=false;crowdMood=Math.max(0,crowdMood-15);
      goalFlash=1.0;sndGoal();speak(pick(GOALS));
      spawnParts(p.x,p.y,"#ff0000",8);
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},800);})(p);
      continue;
    }

    // Puck off screen (missed shot - no goal, no save)
    if(p.y>H+30||p.x<-30||p.x>W+30)pucks.splice(i,1);
  }

  // Crowd mood decay
  if(frame%30===0)crowdMood=Math.max(20,crowdMood-0.5);

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;pt.life-=0.025;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ═══ Draw ═══
function draw(){
  // Ice - gradient from light blue-white at top to slightly darker at bottom
  var iceGrad=ctx.createLinearGradient(0,0,0,H);
  iceGrad.addColorStop(0,"#e8f4f8");iceGrad.addColorStop(0.3,"#f0f7fa");iceGrad.addColorStop(0.7,"#e0edf5");iceGrad.addColorStop(1,"#c8dde8");
  ctx.fillStyle=iceGrad;ctx.fillRect(0,0,W,H);

  // Subtle curved scratch marks (8 lines)
  ctx.strokeStyle="rgba(160,200,220,0.25)";ctx.lineWidth=0.8;
  for(var zm=0;zm<8;zm++){
    ctx.beginPath();
    var zy=H*0.2+zm*40+Math.sin(zm*1.3)*15;
    var cp1x=W*0.25+Math.sin(zm*0.9)*40;
    var cp1y=zy+20*Math.sin(zm*0.7+frame*0.001);
    var cp2x=W*0.75-Math.sin(zm*1.1)*40;
    var cp2y=zy-15*Math.cos(zm*0.5+frame*0.001);
    ctx.moveTo(20,zy);
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,W-20,zy+Math.sin(zm)*10);
    ctx.stroke();
  }

  // Rink lines - center red line and two blue lines
  ctx.fillStyle="rgba(41,98,255,0.2)";ctx.fillRect(16,H*0.35,W-32,4);
  ctx.fillStyle="rgba(255,30,30,0.25)";ctx.fillRect(16,H*0.5,W-32,5);
  ctx.fillStyle="rgba(41,98,255,0.2)";ctx.fillRect(16,H*0.65,W-32,4);
  // Center circle
  ctx.strokeStyle="rgba(255,30,30,0.2)";ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,H*0.5,50,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle="rgba(41,98,255,0.1)";ctx.beginPath();ctx.arc(W/2,H*0.5,6,0,Math.PI*2);ctx.fill();
  // Face-off circles
  ctx.strokeStyle="rgba(255,30,30,0.12)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(W*0.25,H*0.65,30,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.75,H*0.65,30,0,Math.PI*2);ctx.stroke();

  // Boards - thick dark border with rounded corners
  ctx.save();
  ctx.strokeStyle="#1a2744";ctx.lineWidth=8;
  ctx.beginPath();
  var br=20; // board radius
  ctx.moveTo(br,0);ctx.lineTo(W-br,0);ctx.arcTo(W,0,W,br,br);
  ctx.lineTo(W,H-br);ctx.arcTo(W,H,W-br,H,br);
  ctx.lineTo(br,H);ctx.arcTo(0,H,0,H-br,br);
  ctx.lineTo(0,br);ctx.arcTo(0,0,br,0,br);
  ctx.closePath();ctx.stroke();
  ctx.restore();
  // Inner board edge
  ctx.strokeStyle="#2c3e50";ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(br,4);ctx.lineTo(W-br,4);ctx.arcTo(W-4,4,W-4,br,br-4);
  ctx.lineTo(W-4,H-br);ctx.arcTo(W-4,H-4,W-br,H-4,br-4);
  ctx.lineTo(br,H-4);ctx.arcTo(4,H-4,4,H-br,br-4);
  ctx.lineTo(4,br);ctx.arcTo(4,4,br,4,br-4);
  ctx.closePath();ctx.stroke();

  // Glass panels above boards (semi-transparent at top)
  ctx.fillStyle="rgba(200,230,255,0.12)";ctx.fillRect(0,0,W,40);
  ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;
  for(var gl=0;gl<W;gl+=55){
    ctx.beginPath();ctx.moveTo(gl,0);ctx.lineTo(gl,40);ctx.stroke();
  }
  // Glass highlight
  ctx.fillStyle="rgba(255,255,255,0.05)";
  ctx.fillRect(0,0,W,6);

  // Dasher board ads
  var adW=Math.min(130,W/5);
  for(var a=0;a<dasherAds.length;a++){
    var adX=18+a*(W-36)/dasherAds.length;
    ctx.fillStyle="rgba(255,255,255,0.88)";
    ctx.fillRect(adX,H-38,adW-8,22);
    ctx.strokeStyle="rgba(0,0,0,0.15)";ctx.lineWidth=1;ctx.strokeRect(adX,H-38,adW-8,22);
    ctx.fillStyle="#1a2744";ctx.font="bold 9px monospace";ctx.textAlign="center";
    ctx.fillText(dasherAds[a],adX+(adW-8)/2,H-24);
  }

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 28px monospace";ctx.fillStyle="#1a2744";ctx.fillText("JESUS SAVES 5",W/2,H*0.13);
    ctx.font="bold 14px monospace";ctx.fillStyle="#c0392b";ctx.fillText("SVG REBORN",W/2,H*0.19);
    ctx.font="11px monospace";ctx.fillStyle="#555";ctx.fillText("The BEST Jesus Saves game",W/2,H*0.25);
    // Draw big goalie on menu
    drawGoalie(W/2,H*0.35,50,80,0);
    ctx.font="12px monospace";ctx.fillStyle="#555";
    ctx.fillText("Move to block pucks. 3 periods.",W/2,H*0.62);
    ctx.fillText("Power-ups: Shield, Fish, Holy Water",W/2,H*0.67);
    ctx.fillText("With live commentary!",W/2,H*0.72);
    if(bestSaves>0){ctx.fillStyle="#1a2744";ctx.fillText("Best: "+bestSaves+" saves",W/2,H*0.78);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";ctx.fillText("[ Tap / Click to play ]",W/2,H*0.86);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.93);
    return;
  }

  // Goal flash - red glow behind net
  if(goalFlash>0){
    ctx.save();
    ctx.shadowColor="rgba(255,0,0,"+goalFlash*0.8+")";ctx.shadowBlur=60;
    ctx.fillStyle="rgba(255,0,0,"+goalFlash*0.4+")";
    ctx.beginPath();ctx.arc(W/2,netY+netH,90,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // Goal light bulb
    ctx.fillStyle="rgba(255,0,0,"+goalFlash+")";
    ctx.beginPath();ctx.arc(W/2,netY+netH+15,14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="rgba(200,0,0,"+goalFlash*0.8+")";ctx.lineWidth=2;ctx.stroke();
  }

  // Crowd with wave - varied sizes, some with signs
  for(var i=0;i<crowd.length;i++){
    var c=crowd[i];
    var waveBob=0;
    if(crowdMood>70){
      var wavePhase=(c.x/W)*Math.PI*2-frame*0.05;
      waveBob=Math.sin(wavePhase)*5;
    }
    var bob=Math.sin(frame*0.04*c.bobSpeed+c.bobOffset)*(crowdMood>70?3:1)+waveBob;
    drawCrowdFig(c.x,c.y,c.color,bob,c.size,c.sign);
  }
  if(crowdMood>70){
    ctx.font="bold 10px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";ctx.textAlign="center";
    ctx.fillText("THE WAVE!",W/2,100);
  }

  // Net - white crosshatch grid pattern behind the goalie
  // Net background
  ctx.fillStyle="rgba(220,220,220,0.15)";ctx.fillRect(netX,netY,netW,netH);
  // Crosshatch pattern
  ctx.strokeStyle="rgba(200,200,200,0.35)";ctx.lineWidth=0.8;
  // Diagonal lines one way
  for(var ni=-netH;ni<netW+netH;ni+=8){
    ctx.beginPath();
    ctx.moveTo(Math.max(netX,netX+ni),Math.max(netY,netY-ni));
    ctx.lineTo(Math.min(netX+netW,netX+ni+netH),Math.min(netY+netH,netY+netW-ni));
    ctx.stroke();
  }
  // Diagonal lines other way
  for(var ni=-netH;ni<netW+netH;ni+=8){
    ctx.beginPath();
    var sx=netX+ni,sy=netY;
    var ex=netX+ni-netH,ey=netY+netH;
    ctx.moveTo(Math.max(netX,Math.min(netX+netW,sx)),Math.max(netY,Math.min(netY+netH,sy)));
    ctx.lineTo(Math.max(netX,Math.min(netX+netW,ex)),Math.max(netY,Math.min(netY+netH,ey)));
    ctx.stroke();
  }

  // Goal frame - red posts (thick)
  ctx.strokeStyle="#cc0000";ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(netX,netY+netH);ctx.lineTo(netX,netY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(netX+netW,netY+netH);ctx.lineTo(netX+netW,netY);ctx.stroke();
  // Crossbar
  ctx.strokeStyle="#cc0000";ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(netX,netY);ctx.lineTo(netX+netW,netY);ctx.stroke();
  // Post caps (circles at top of posts)
  ctx.fillStyle="#cc0000";
  ctx.beginPath();ctx.arc(netX,netY,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(netX+netW,netY,4,0,Math.PI*2);ctx.fill();

  // Crease (semi-circle in front of goal)
  ctx.strokeStyle="rgba(255,0,0,0.25)";ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.55,30,0,Math.PI,0);ctx.stroke();
  ctx.fillStyle="rgba(200,220,255,0.06)";
  ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.55,30,0,Math.PI,0);ctx.fill();

  // Goalie (Jesus) - 80px tall, drawn in front of the net
  var armA=Math.sin(frame*0.1)*0.1;
  // Wide glow when fish power active
  if(wideTimer>0){
    ctx.fillStyle="rgba(0,100,255,0.1)";
    ctx.beginPath();ctx.ellipse(goalie.x,goalie.y+goalie.h/2,goalie.w/2+15,goalie.h/2+8,0,0,Math.PI*2);ctx.fill();
  }
  drawGoalie(goalie.x,goalie.y,goalie.w,goalie.h,armA);

  // Shield indicator
  if(shieldCount>0){
    ctx.strokeStyle="rgba(255,215,0,0.5)";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(goalie.x,goalie.y+goalie.h/2,45,0,Math.PI*2);ctx.stroke();
    ctx.font="bold 10px monospace";ctx.fillStyle="#ffd700";ctx.textAlign="center";
    ctx.fillText("SHIELD x"+shieldCount,goalie.x,goalie.y-15);
  }

  // Freeze indicator
  if(freezeTimer>0){
    ctx.font="bold 14px monospace";ctx.fillStyle="rgba(0,150,255,0.7)";ctx.textAlign="center";
    ctx.fillText("FROZEN!",W/2,H*0.4);
  }

  // Shooters with skating animation
  for(var s=0;s<shooters.length;s++){
    var sh=shooters[s];
    var legAnim=(sh.state==="skating"||sh.state==="retreat")?sh.legPhase:0;
    drawShooter(sh.x,sh.y+50,55,sh.armRaise,sh.jerseyColor,legAnim);
  }

  // Pucks - bigger (radius 8), with motion trail
  for(var i=0;i<pucks.length;i++){
    var p=pucks[i];
    // Motion trail (line from previous to current position)
    if(p.active&&p.prevX!==undefined){
      ctx.strokeStyle="rgba(0,0,0,0.15)";ctx.lineWidth=p.radius*1.2;
      ctx.beginPath();ctx.moveTo(p.prevX,p.prevY);ctx.lineTo(p.x,p.y);ctx.stroke();
    }
    // Shadow
    ctx.fillStyle="rgba(0,0,0,0.12)";ctx.beginPath();ctx.ellipse(p.x,p.y+4,p.radius,p.radius*0.35,0,0,Math.PI*2);ctx.fill();
    // Puck body
    ctx.fillStyle=p.active?"#111":"#555";ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
    // Puck highlight
    ctx.fillStyle="rgba(255,255,255,0.15)";ctx.beginPath();ctx.arc(p.x-2,p.y-2,p.radius*0.4,0,Math.PI*2);ctx.fill();
    if(p.active){
      // Speed lines / trail for slap shots
      if(p.type==="slap"){
        ctx.strokeStyle="rgba(255,0,0,0.25)";ctx.lineWidth=2.5;
        ctx.beginPath();ctx.moveTo(p.x-p.vx*3,p.y-p.vy*3);ctx.lineTo(p.x-p.vx*8,p.y-p.vy*8);ctx.stroke();
      }
      // Frozen pucks glow
      if(freezeTimer>0){
        ctx.fillStyle="rgba(0,150,255,0.3)";ctx.beginPath();ctx.arc(p.x,p.y,p.radius+5,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Power-ups
  for(var i=0;i<powerUps.length;i++){
    var pu=powerUps[i];
    var pulse=Math.sin(frame*0.1)*3;
    ctx.fillStyle=pu.type==="shield"?"rgba(255,215,0,0.7)":pu.type==="fish"?"rgba(0,150,255,0.7)":"rgba(0,200,200,0.7)";
    ctx.beginPath();ctx.arc(pu.x,pu.y,12+pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(pu.type==="shield"?"S":pu.type==="fish"?"F":"W",pu.x,pu.y);
    ctx.textBaseline="alphabetic";
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var pt=particles[i];ctx.globalAlpha=pt.life;ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Faceoff
  if(faceoffTimer>0){
    ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";ctx.font="bold 22px monospace";ctx.fillStyle="#fff";
    ctx.fillText("PERIOD "+period,W/2,H*0.45);
    ctx.font="14px monospace";ctx.fillText("Face-off in "+Math.ceil(faceoffTimer/60)+"...",W/2,H*0.52);
    var dotPulse=Math.sin(frame*0.1)*5+15;
    ctx.fillStyle="rgba(255,30,30,0.5)";ctx.beginPath();ctx.arc(W/2,H*0.6,dotPulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#c0392b";ctx.beginPath();ctx.arc(W/2,H*0.6,6,0,Math.PI*2);ctx.fill();
  }

  // Scoreboard - prominent at top center
  var sbW=280,sbH=46,sbX=W/2-sbW/2,sbY=3;
  // Dark background
  ctx.fillStyle="rgba(20,25,40,0.95)";
  ctx.beginPath();
  ctx.moveTo(sbX+6,sbY);ctx.lineTo(sbX+sbW-6,sbY);ctx.arcTo(sbX+sbW,sbY,sbX+sbW,sbY+6,6);
  ctx.lineTo(sbX+sbW,sbY+sbH-6);ctx.arcTo(sbX+sbW,sbY+sbH,sbX+sbW-6,sbY+sbH,6);
  ctx.lineTo(sbX+6,sbY+sbH);ctx.arcTo(sbX,sbY+sbH,sbX,sbY+sbH-6,6);
  ctx.lineTo(sbX,sbY+6);ctx.arcTo(sbX,sbY,sbX+6,sbY,6);
  ctx.closePath();ctx.fill();
  // Border
  ctx.strokeStyle="rgba(255,255,255,0.25)";ctx.lineWidth=1;ctx.stroke();
  // HOME / AWAY labels
  ctx.textAlign="center";ctx.font="bold 10px monospace";ctx.fillStyle="#aaa";
  ctx.fillText("HOME",sbX+50,sbY+14);ctx.fillText("AWAY",sbX+sbW-50,sbY+14);
  // Score numbers
  ctx.font="bold 20px monospace";ctx.fillStyle="#fff";
  ctx.fillText(""+saves,sbX+50,sbY+36);ctx.fillText(""+goals,sbX+sbW-50,sbY+36);
  // Period and time
  ctx.font="bold 10px monospace";ctx.fillStyle="#4ade80";
  ctx.fillText("P"+period,W/2,sbY+14);
  ctx.font="bold 14px monospace";ctx.fillStyle="#fff";
  var timeLeft=Math.ceil(periodTime/60);
  var mins=Math.floor(timeLeft/60);var secs=timeLeft%60;
  ctx.fillText(mins+":"+(secs<10?"0":"")+secs,W/2,sbY+34);
  // Divider lines
  ctx.fillStyle="rgba(255,255,255,0.15)";
  ctx.fillRect(sbX+sbW*0.33,sbY+5,1,sbH-10);
  ctx.fillRect(sbX+sbW*0.67,sbY+5,1,sbH-10);

  // Streak
  if(streak>=3){
    ctx.font="bold 12px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";ctx.textAlign="center";
    ctx.fillText("SAVE STREAK: "+streak,W/2,goalie.y-20);
  }
  if(streak>0&&streak%10===0&&frame%60<30){
    ctx.font="bold 18px monospace";ctx.fillStyle="rgba(200,0,0,0.6)";ctx.textAlign="center";
    ctx.fillText("DIVINE INTERVENTION!",W/2,H*0.4);
  }

  // Save %
  var savePct=totalShots>0?Math.round(saves/totalShots*100):100;
  ctx.textAlign="left";ctx.font="9px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillText("SV% "+savePct+"%",18,H-45);

  // Game Over
  if(STATE==="gameover"){
    ctx.fillStyle="rgba(26,39,68,0.92)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.font="bold 28px monospace";ctx.fillStyle="#fff";ctx.fillText("FINAL BUZZER",W/2,H*0.12);
    ctx.font="bold 14px monospace";ctx.fillStyle="#c0392b";ctx.fillText("SVG REBORN HAS ENDED",W/2,H*0.18);
    drawGoalie(W/2,H*0.30,50,80,0);
    ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
    ctx.fillText("Saves: "+saves,W/2,H*0.48);
    ctx.fillText("Goals Against: "+goals,W/2,H*0.54);
    ctx.fillText("Save %: "+savePct+"%",W/2,H*0.60);
    ctx.fillText("Best Streak: "+bestStreak,W/2,H*0.66);
    var msg=savePct>=90?"MIRACLE ON ICE!":savePct>=75?"Blessed performance!":savePct>=60?"Decent. For a deity.":savePct>=40?"The fans are praying.":"Holy. That was bad.";
    ctx.font="12px monospace";ctx.fillStyle="#aaa";ctx.fillText(msg,W/2,H*0.73);
    if(saves>=bestSaves&&saves>0){ctx.fillStyle="#ffd700";ctx.fillText("NEW RECORD!",W/2,H*0.78);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";ctx.fillText("[ Tap to play again ]",W/2,H*0.86);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.93);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
