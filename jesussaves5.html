<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Jesus Saves 5: SVG Reborn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#1a2744;overflow:hidden;touch-action:manipulation;user-select:none}
canvas{display:block;width:100%;height:100%}
</style>

<body>
<canvas id="c"></canvas>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ═══ PROVEN NARRATION (from jesusdunks.html) ═══
var lastCommentary=0;
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){};}
function speak(text){
  try{
    if(!window.speechSynthesis)return;
    var now=Date.now();
    if(now-lastCommentary<8000)return;
    lastCommentary=now;
    try{speechSynthesis.cancel();}catch(e){}
    setTimeout(function(){
      try{
        var u=new SpeechSynthesisUtterance(text);
        u.rate=0.85;u.pitch=0.8;u.volume=1.0;
        var voices=speechSynthesis.getVoices();
        if(voices&&voices.length>0){
          var v=null;
          for(var i=0;i<voices.length;i++){if(voices[i].lang&&voices[i].lang.indexOf('en')===0){v=voices[i];break;}}
          if(v)u.voice=v;
        }
        speechSynthesis.speak(u);
      }catch(e){}
    },60);
  }catch(e){}
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

// ═══ Jokes (60+ short) ═══
var SAVES=["Saved. Divine.","Blocked. Hallelujah.","Denied. Amen.","Glove save. Blessed leather.","Not today, puck.","The crease is sacred ground.","Stick save. Carpentry helps.","Another miracle on ice.","The net stays pure.","Rejected. Like a false prophet.","What reflexes. What divinity.","Saved by the bell. And Jesus.","That puck found religion.","Stone cold stop.","Nope. Access denied."];
var GOALS=["Goal. Even God blinked.","In. The organ weeps.","Scored. The halo dims.","Five hole. Humbling.","That got through. Somehow.","The crowd gasps.","Goal. Moving on.","In. Regrettable.","Even saints miss sometimes.","The net has been violated."];
var RANDOMS=["The Zamboni is Noah's.","Penalty box equals confession.","Team mascot: a lamb.","The ref is Judas.","Arena capacity: five thousand.","Concessions: bread and fish.","The ice is holy water.","Jersey number: thirty three.","Overtime is purgatory.","The blue line is the red sea.","Hat trick equals holy trinity.","The scoreboard is scripture.","The team doctor is Luke.","Draft pick: number one son.","The cup is the holy grail.","The away team: the Romans.","Parking: donkeys only.","The anthem: a hymn.","The jumbotron shows parables.","Ticket price: free will.","Power play: divine intervention.","The goalie coach is God.","The ice girls are angels.","Intermission: forty days.","The replay goes to heaven."];
var STREAKS=["Three saves. Holy trinity.","Five. Pentecost.","Ten. The commandments.","Fifteen. Apostles plus extras.","Twenty. A biblical streak."];

// ═══ Audio ═══
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function organ(freq,dur,vol){
  if(!audioCtx)return;
  [1,2,3,4].forEach(function(h){
    var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
    osc.type="sine";osc.frequency.value=freq*h;
    g.gain.setValueAtTime((vol||0.02)/(h*h),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+dur);
  });
}
function sndSave(){organ(523,0.15,0.02);setTimeout(function(){organ(659,0.15,0.02);},80);setTimeout(function(){organ(784,0.2,0.02);},160);}
function sndGoal(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type="sawtooth";osc.frequency.value=150;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.5);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+1.5);
}
function sndBigSave(){organ(784,0.2,0.02);setTimeout(function(){organ(988,0.2,0.02);},100);setTimeout(function(){organ(1175,0.3,0.02);},200);}
function sndWhistle(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type="sine";osc.frequency.value=3200;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.4);
}
function sndPost(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator(),g=audioCtx.createGain();
  osc.type="triangle";osc.frequency.value=800;
  g.gain.setValueAtTime(0.02,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.15);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.15);
}
function sndCrowdBurst(){
  if(!audioCtx)return;
  var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.2,audioCtx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.3;
  var src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  src.buffer=buf;g.gain.setValueAtTime(0.015,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.3);
  src.connect(g);g.connect(audioCtx.destination);src.start();
}
function sndPowerUp(){organ(440,0.1,0.02);setTimeout(function(){organ(554,0.1,0.02);},80);setTimeout(function(){organ(660,0.1,0.02);},160);setTimeout(function(){organ(880,0.15,0.02);},240);}

// Music
var musicPlaying=false,musicInterval=null;
function playChargeTheme(){
  if(musicPlaying)return;musicPlaying=true;
  var notes=[{f:262,t:0,d:0.2},{f:330,t:200,d:0.2},{f:392,t:400,d:0.2},{f:523,t:600,d:0.4},{f:392,t:1000,d:0.2},{f:523,t:1200,d:0.6}];
  function playOnce(){notes.forEach(function(n){setTimeout(function(){organ(n.f,n.d,0.015);},n.t);});}
  playOnce();musicInterval=setInterval(playOnce,6000);
}
function playWaltz(){
  if(musicPlaying)return;musicPlaying=true;
  var notes=[{f:262,t:0,d:0.4},{f:330,t:500,d:0.3},{f:392,t:1000,d:0.3},{f:330,t:1500,d:0.4},{f:262,t:2000,d:0.5}];
  function playOnce(){notes.forEach(function(n){setTimeout(function(){organ(n.f,n.d,0.01);},n.t);});}
  playOnce();musicInterval=setInterval(playOnce,3000);
}
function stopMusic(){musicPlaying=false;clearInterval(musicInterval);}

// ═══ Game State ═══
var STATE="menu";
var goalie,pucks,particles,crowd,shooters,powerUps;
var saves,goals,totalShots,frame;
var streak,bestStreak;
var shotSpeed,shotInterval;
var periodTime,period,crowdMood,goalFlash;
var bestSaves=parseInt(localStorage.getItem("js5-best"))||0;
var goalW,goalH,netX,netY,netW,netH;
var faceoffTimer=0,lastRandomTime=0;
var dasherAds=["HOLY WATER Co.","BLESSED INSURANCE","NAZARETH NAILS","FISH & BREAD Inc.","ARK CRUISES"];

// Power-up state
var shieldCount=0,wideTimer=0,freezeTimer=0;
var powerUpTimer=0;

// ═══ SVG Stick Figures ═══
function drawStickFigure(x,y,height,opts){
  opts=opts||{};
  var sc=height/60,headR=6*sc,bodyLen=20*sc,armLen=14*sc,legLen=16*sc;
  var headY=y-height+headR,neckY=headY+headR,hipY=neckY+bodyLen;
  ctx.lineWidth=2*sc;ctx.lineCap="round";
  // Halo
  if(opts.halo){
    ctx.strokeStyle="rgba(255,215,0,0.8)";ctx.lineWidth=2*sc;
    ctx.beginPath();ctx.ellipse(x,headY-headR-3*sc,headR+2*sc,4*sc,0,0,Math.PI*2);ctx.stroke();
  }
  // Head
  ctx.fillStyle=opts.headColor||"#ffd3a3";ctx.strokeStyle="#333";ctx.lineWidth=1.5*sc;
  ctx.beginPath();ctx.arc(x,headY,headR,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Body
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,neckY);ctx.lineTo(x,hipY);ctx.stroke();
  // Jersey
  if(opts.jerseyColor){
    ctx.fillStyle=opts.jerseyColor;
    ctx.fillRect(x-5*sc,neckY+2*sc,10*sc,12*sc);
    ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=0.5*sc;
    ctx.strokeRect(x-5*sc,neckY+2*sc,10*sc,12*sc);
  }
  // Cross
  if(opts.crossOnJersey){
    ctx.strokeStyle="rgba(200,0,0,0.7)";ctx.lineWidth=1.5*sc;
    ctx.beginPath();ctx.moveTo(x,neckY+4*sc);ctx.lineTo(x,neckY+12*sc);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-3*sc,neckY+7*sc);ctx.lineTo(x+3*sc,neckY+7*sc);ctx.stroke();
  }
  // Arms
  var armRaise=opts.armRaise||0;
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  var lAng=Math.PI/2+0.3+(opts.gloveHand?armRaise*-1.2:0);
  var lAX=x+Math.cos(lAng)*armLen,lAY=neckY+5*sc+Math.sin(lAng)*armLen;
  ctx.beginPath();ctx.moveTo(x,neckY+5*sc);ctx.lineTo(lAX,lAY);ctx.stroke();
  if(opts.gloveHand){ctx.fillStyle="#c22";ctx.beginPath();ctx.arc(lAX,lAY,3*sc,0,Math.PI*2);ctx.fill();}
  var rAng=Math.PI/2-0.3-(opts.stickHand?armRaise*-1.2:0);
  rAng=Math.PI-rAng;
  var rAX=x+Math.cos(rAng)*armLen,rAY=neckY+5*sc-Math.sin(rAng)*armLen;
  ctx.beginPath();ctx.moveTo(x,neckY+5*sc);ctx.lineTo(rAX,rAY);ctx.stroke();
  if(opts.stickHand){
    ctx.strokeStyle="#8B4513";ctx.lineWidth=2.5*sc;
    ctx.beginPath();ctx.moveTo(rAX,rAY);ctx.lineTo(rAX+12*sc,rAY+10*sc);ctx.lineTo(rAX+18*sc,rAY+10*sc);ctx.stroke();
  }
  // Legs
  var spread=opts.legSpread||0.3;
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x-spread*legLen,hipY+legLen);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x+spread*legLen,hipY+legLen);ctx.stroke();
  // Skates
  ctx.fillStyle="#222";
  ctx.fillRect(x-spread*legLen-2*sc,hipY+legLen-1*sc,5*sc,3*sc);
  ctx.fillRect(x+spread*legLen-2*sc,hipY+legLen-1*sc,5*sc,3*sc);
}

function drawShooter(x,y,height,armRaise,jerseyColor){
  var sc=height/60,headR=6*sc,bodyLen=20*sc,armLen=14*sc,legLen=16*sc;
  var headY=y-height+headR,neckY=headY+headR,hipY=neckY+bodyLen;
  ctx.lineWidth=2*sc;ctx.lineCap="round";
  ctx.fillStyle="#333";ctx.beginPath();ctx.arc(x,headY,headR+1*sc,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#ffd3a3";ctx.beginPath();ctx.arc(x,headY+1*sc,headR*0.7,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;ctx.beginPath();ctx.moveTo(x,neckY);ctx.lineTo(x,hipY);ctx.stroke();
  ctx.fillStyle=jerseyColor||"#c22";ctx.fillRect(x-5*sc,neckY+2*sc,10*sc,12*sc);
  var wA=armRaise*1.5;
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,neckY+5*sc);ctx.lineTo(x-armLen*0.7,neckY+5*sc+armLen*0.5);ctx.stroke();
  var rX=x+Math.cos(-wA)*armLen,rY=neckY+5*sc-Math.sin(wA)*armLen*0.8;
  ctx.beginPath();ctx.moveTo(x,neckY+5*sc);ctx.lineTo(rX,rY);ctx.stroke();
  ctx.strokeStyle="#8B4513";ctx.lineWidth=2.5*sc;
  ctx.beginPath();ctx.moveTo(rX,rY);ctx.lineTo(rX+10*sc,rY+14*sc);ctx.lineTo(rX+16*sc,rY+14*sc);ctx.stroke();
  ctx.strokeStyle="#333";ctx.lineWidth=2*sc;
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x-6*sc,hipY+legLen);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,hipY);ctx.lineTo(x+6*sc,hipY+legLen);ctx.stroke();
  ctx.fillStyle="#222";
  ctx.fillRect(x-8*sc,hipY+legLen-1*sc,5*sc,3*sc);
  ctx.fillRect(x+4*sc,hipY+legLen-1*sc,5*sc,3*sc);
}

function drawCrowdFig(x,y,color,bob){
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y+bob,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=color;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x,y+4+bob);ctx.lineTo(x,y+12+bob);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-4,y+7+bob);ctx.lineTo(x+4,y+7+bob);ctx.stroke();
}

// ═══ Reset ═══
function reset(){
  goalW=Math.min(240,W*0.5);goalH=60;
  netX=W/2-goalW/2;netY=H-goalH-40;netW=goalW;netH=goalH;
  goalie={x:W/2,y:netY+5,w:50,h:60,targetX:W/2};
  pucks=[];particles=[];crowd=[];shooters=[];powerUps=[];
  var colors=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#ff69b4","#00bcd4","#8bc34a"];
  for(var i=0;i<40;i++){
    crowd.push({x:15+Math.random()*(W-30),y:45+Math.random()*50,color:colors[Math.floor(Math.random()*colors.length)],bobSpeed:1+Math.random()*2,bobOffset:Math.random()*Math.PI*2});
  }
  for(var i=0;i<3;i++){
    shooters.push({x:W*0.3+i*(W*0.2),y:H*0.35,targetX:W/2,targetY:H*0.5,state:"idle",timer:60+i*80,armRaise:0,shotType:"wrist",jerseyColor:["#c0392b","#2980b9","#27ae60"][i],speed:1.5+Math.random()*0.5,homeX:W*0.3+i*(W*0.2),homeY:H*0.3});
  }
  saves=0;goals=0;totalShots=0;frame=0;
  streak=0;bestStreak=0;
  shotSpeed=3.5;shotInterval=90;
  periodTime=3600;period=1;crowdMood=50;goalFlash=0;
  faceoffTimer=0;lastRandomTime=0;
  shieldCount=0;wideTimer=0;freezeTimer=0;powerUpTimer=1800;
}

// ═══ Shooting ═══
function shootPuck(sh){
  totalShots++;
  var fx=sh.x,fy=sh.y;
  var tx=netX+20+Math.random()*(netW-40),ty=netY+Math.random()*netH*0.5;
  var dx=tx-fx,dy=ty-fy,len=Math.sqrt(dx*dx+dy*dy);
  var spd=shotSpeed,acc=0;
  if(sh.shotType==="slap"){spd*=1.5;acc=(Math.random()-0.5)*2;}
  else if(sh.shotType==="deke"){spd*=0.6;acc=(Math.random()-0.5)*0.3;}
  else{acc=(Math.random()-0.5)*0.5;}
  pucks.push({x:fx,y:fy,vx:dx/len*spd+acc,vy:dy/len*spd,curve:sh.shotType==="deke"?(Math.random()-0.5)*0.4:0,radius:7,active:true,bounces:0,type:sh.shotType});
}

// ═══ Input ═══
var mouseX=0;
function inputStart(cx){
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();playChargeTheme();sndWhistle();setTimeout(function(){speak("Puck drop. Let there be hockey.");},500);return;}
  if(STATE==="gameover"){STATE="playing";reset();playChargeTheme();sndWhistle();setTimeout(function(){speak("Puck drop. Let there be hockey.");},500);return;}
  mouseX=cx;
}
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;});
canvas.addEventListener('touchstart',function(e){e.preventDefault();inputStart(e.touches[0].clientX);},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();mouseX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('click',function(e){inputStart(e.clientX);});

// ═══ Particles ═══
function spawnParts(x,y,color,count){
  for(var i=0;i<count;i++){particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,color:color,size:3+Math.random()*4});}
}

// ═══ Power-ups ═══
function spawnPowerUp(){
  var types=["shield","fish","water"];
  var t=types[Math.floor(Math.random()*types.length)];
  powerUps.push({x:50+Math.random()*(W-100),y:-20,vy:1+Math.random(),type:t,life:1});
}

// ═══ Update ═══
function update(){
  if(STATE!=="playing")return;
  frame++;
  periodTime--;
  if(goalFlash>0)goalFlash-=0.03;
  if(wideTimer>0){wideTimer--;goalie.w=80;}else{goalie.w=50;}
  if(freezeTimer>0)freezeTimer--;

  // Period transitions
  if(periodTime<=0){
    period++;periodTime=3600;sndWhistle();stopMusic();
    speak(period<=3?"Period over. Intermission.":"Final buzzer.");
    faceoffTimer=120;
    if(period>3){
      STATE="gameover";sndGoal();
      if(saves>bestSaves){bestSaves=saves;localStorage.setItem("js5-best",bestSaves);}
      return;
    }
    shotSpeed+=0.5;shotInterval=Math.max(25,shotInterval-10);
    playWaltz();setTimeout(function(){stopMusic();playChargeTheme();},3500);
  }

  if(faceoffTimer>0){faceoffTimer--;return;}

  // Random joke every 25s (~1500 frames)
  if(frame-lastRandomTime>1500&&frame>300){lastRandomTime=frame;speak(pick(RANDOMS));}

  // Power-up spawn
  powerUpTimer--;
  if(powerUpTimer<=0){spawnPowerUp();sndPowerUp();powerUpTimer=1800;}

  // Move goalie
  goalie.targetX=Math.max(netX+goalie.w/2,Math.min(netX+netW-goalie.w/2,mouseX));
  goalie.x+=(goalie.targetX-goalie.x)*0.15;

  // Update shooters
  for(var s=0;s<shooters.length;s++){
    var sh=shooters[s];
    sh.timer--;
    if(sh.state==="idle"&&sh.timer<=0){
      sh.state="skating";sh.targetX=W/2+(Math.random()-0.5)*200;sh.targetY=H*0.45+Math.random()*40;
      sh.shotType=["wrist","wrist","slap","slap","deke"][Math.floor(Math.random()*5)];
    }
    if(sh.state==="skating"){
      var dx=sh.targetX-sh.x,dy=sh.targetY-sh.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){sh.x+=dx/d*sh.speed*2;sh.y+=dy/d*sh.speed*2;}
      else{sh.state="windup";sh.timer=sh.shotType==="deke"?20:40;sh.armRaise=0;}
    }
    if(sh.state==="windup"){sh.armRaise=Math.min(1,sh.armRaise+0.04);sh.timer--;if(sh.timer<=0)sh.state="shoot";}
    if(sh.state==="shoot"){shootPuck(sh);sh.state="retreat";sh.timer=30;}
    if(sh.state==="retreat"){
      var dx=sh.homeX-sh.x,dy=sh.homeY-sh.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d>5){sh.x+=dx/d*sh.speed*2.5;sh.y+=dy/d*sh.speed*2.5;}
      else{sh.state="idle";sh.timer=shotInterval+Math.floor(Math.random()*40);sh.armRaise=0;}
    }
  }

  // Update power-ups
  for(var i=powerUps.length-1;i>=0;i--){
    var pu=powerUps[i];
    pu.y+=pu.vy;
    // Check goalie collision
    if(Math.abs(pu.x-goalie.x)<goalie.w/2+15&&Math.abs(pu.y-(goalie.y+goalie.h/2))<goalie.h/2+15){
      if(pu.type==="shield"){shieldCount+=3;speak("Holy shield. Three free blocks.");}
      else if(pu.type==="fish"){wideTimer=300;speak("Fish power. The goalie grows.");}
      else if(pu.type==="water"){freezeTimer=120;speak("Holy water. Pucks frozen.");}
      sndPowerUp();spawnParts(pu.x,pu.y,"#ffd700",8);powerUps.splice(i,1);continue;
    }
    if(pu.y>H+30)powerUps.splice(i,1);
  }

  // Update pucks
  for(var i=pucks.length-1;i>=0;i--){
    var p=pucks[i];
    if(!p.active)continue;
    if(freezeTimer>0){continue;} // frozen
    p.vx+=p.curve*0.02;p.x+=p.vx;p.y+=p.vy;
    // Boards
    if(p.x<15){p.x=15;p.vx=Math.abs(p.vx)*0.9;}
    if(p.x>W-15){p.x=W-15;p.vx=-Math.abs(p.vx)*0.9;}
    if(p.y<30){p.y=30;p.vy=Math.abs(p.vy)*0.9;}
    // Posts
    var pL=netX,pR=netX+netW,cbar=netY;
    if(p.y>cbar&&p.y<cbar+netH&&Math.abs(p.x-pL)<8){p.vx=-Math.abs(p.vx)*0.8;p.x=pL-8;spawnParts(p.x,p.y,"#ff0",3);sndPost();continue;}
    if(p.y>cbar&&p.y<cbar+netH&&Math.abs(p.x-pR)<8){p.vx=Math.abs(p.vx)*0.8;p.x=pR+8;spawnParts(p.x,p.y,"#ff0",3);sndPost();continue;}
    if(Math.abs(p.y-cbar)<8&&p.x>pL&&p.x<pR){p.vy=-Math.abs(p.vy)*0.8;p.y=cbar-8;spawnParts(p.x,p.y,"#ff0",3);sndPost();continue;}

    // Shield auto-block
    if(shieldCount>0&&p.y>goalie.y-30&&p.y<goalie.y+goalie.h&&p.x>netX&&p.x<netX+netW){
      shieldCount--;saves++;streak++;bestStreak=Math.max(bestStreak,streak);
      p.active=false;spawnParts(p.x,p.y,"#ffd700",5);sndBigSave();
      speak("Shield block. Automatic.");
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},300);})(p);
      continue;
    }

    // Goalie save
    var gL=goalie.x-goalie.w/2,gR=goalie.x+goalie.w/2,gT=goalie.y-5,gB=goalie.y+goalie.h-10;
    if(p.x>gL-p.radius&&p.x<gR+p.radius&&p.y>gT-p.radius&&p.y<gB+p.radius){
      saves++;streak++;bestStreak=Math.max(bestStreak,streak);
      p.active=false;crowdMood=Math.min(100,crowdMood+5);
      var hitX=(p.x-goalie.x)/(goalie.w/2);
      var isGlove=hitX<0;
      if(streak===3){speak(STREAKS[0]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",6);sndCrowdBurst();}
      else if(streak===5){speak(STREAKS[1]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",8);sndCrowdBurst();}
      else if(streak===10){speak(STREAKS[2]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",10);sndCrowdBurst();}
      else if(streak===15){speak(STREAKS[3]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",12);sndCrowdBurst();}
      else if(streak===20){speak(STREAKS[4]);sndBigSave();spawnParts(p.x,p.y,"#ffd700",15);sndCrowdBurst();}
      else{sndSave();spawnParts(p.x,p.y,isGlove?"#c22":"#8B4513",3);if(Math.random()<0.4)speak(pick(SAVES));}
      // Rebound
      if(Math.random()<0.25&&p.bounces<2){
        var bvx=hitX*5+p.vx*-0.3,bvy=-Math.abs(p.vy)*0.7-2;
        pucks.push({x:p.x+bvx*2,y:p.y+bvy*2,vx:bvx*0.6,vy:bvy*0.6,curve:0,radius:7,active:true,bounces:p.bounces+1,type:"wrist"});
      }
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},300);})(p);
      continue;
    }

    // Goal
    if(p.y>netY+12&&p.x>netX+8&&p.x<netX+netW-8&&p.active){
      goals++;streak=0;p.active=false;crowdMood=Math.max(0,crowdMood-15);
      goalFlash=1.0;sndGoal();speak(pick(GOALS));
      spawnParts(p.x,p.y,"#ff0000",6);
      (function(pp){setTimeout(function(){var idx=pucks.indexOf(pp);if(idx>-1)pucks.splice(idx,1);},800);})(p);
      continue;
    }
    if(p.y>H+30||p.x<-30||p.x>W+30)pucks.splice(i,1);
  }

  // Crowd mood decay
  if(frame%30===0)crowdMood=Math.max(20,crowdMood-0.5);

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.12;pt.life-=0.025;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ═══ Draw ═══
function draw(){
  // Ice
  var iceGrad=ctx.createLinearGradient(0,0,0,H);
  iceGrad.addColorStop(0,"#d4e6f1");iceGrad.addColorStop(0.5,"#eaf2f8");iceGrad.addColorStop(1,"#d6eaf8");
  ctx.fillStyle=iceGrad;ctx.fillRect(0,0,W,H);

  // Zamboni marks
  ctx.strokeStyle="rgba(180,210,230,0.3)";ctx.lineWidth=1;
  for(var zm=0;zm<8;zm++){
    ctx.beginPath();var zy=H*0.3+zm*30;
    ctx.moveTo(20,zy);ctx.quadraticCurveTo(W/2,zy+15*Math.sin(zm*0.7+frame*0.002),W-20,zy);ctx.stroke();
  }

  // Boards
  ctx.fillStyle="#2c3e50";ctx.fillRect(0,0,12,H);ctx.fillRect(W-12,0,12,H);ctx.fillRect(0,0,W,12);ctx.fillRect(0,H-12,W,12);
  ctx.fillStyle="#34495e";ctx.fillRect(12,0,4,H);ctx.fillRect(W-16,0,4,H);ctx.fillRect(0,12,W,4);ctx.fillRect(0,H-16,W,4);

  // Glass
  ctx.fillStyle="rgba(200,230,255,0.15)";ctx.fillRect(0,0,W,35);
  ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;
  for(var gl=0;gl<W;gl+=60){ctx.beginPath();ctx.moveTo(gl,0);ctx.lineTo(gl,35);ctx.stroke();}

  // Dasher ads
  var adW=Math.min(120,W/5);
  for(var a=0;a<dasherAds.length;a++){
    var adX=15+a*(W-30)/dasherAds.length;
    ctx.fillStyle="rgba(255,255,255,0.85)";ctx.fillRect(adX,H-35,adW-5,20);
    ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=1;ctx.strokeRect(adX,H-35,adW-5,20);
    ctx.fillStyle="#1a2744";ctx.font="bold 8px monospace";ctx.textAlign="center";
    ctx.fillText(dasherAds[a],adX+(adW-5)/2,H-22);
  }

  // Rink lines
  ctx.fillStyle="rgba(41,98,255,0.15)";ctx.fillRect(16,H*0.35,W-32,4);
  ctx.fillStyle="rgba(255,30,30,0.15)";ctx.fillRect(16,H*0.5,W-32,4);
  ctx.fillStyle="rgba(41,98,255,0.15)";ctx.fillRect(16,H*0.65,W-32,4);
  // Center circle
  ctx.strokeStyle="rgba(255,30,30,0.15)";ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,H*0.5,50,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle="rgba(41,98,255,0.08)";ctx.beginPath();ctx.arc(W/2,H*0.5,6,0,Math.PI*2);ctx.fill();
  // Face-off circles
  ctx.strokeStyle="rgba(255,30,30,0.1)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(W*0.25,H*0.65,30,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.75,H*0.65,30,0,Math.PI*2);ctx.stroke();

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 26px monospace";ctx.fillStyle="#1a2744";ctx.fillText("JESUS SAVES 5",W/2,H*0.15);
    ctx.font="bold 14px monospace";ctx.fillStyle="#c0392b";ctx.fillText("SVG REBORN",W/2,H*0.21);
    ctx.font="11px monospace";ctx.fillStyle="#555";ctx.fillText("The BEST Jesus Saves game",W/2,H*0.27);
    drawStickFigure(W/2,H*0.48,60,{headColor:"#ffd3a3",jerseyColor:"#fff",crossOnJersey:true,halo:true,stickHand:true,gloveHand:true,armRaise:0,legSpread:0.4});
    ctx.font="12px monospace";ctx.fillStyle="#555";
    ctx.fillText("Move to block pucks. 3 periods.",W/2,H*0.58);
    ctx.fillText("Power-ups: Shield, Fish, Holy Water",W/2,H*0.63);
    ctx.fillText("With live commentary!",W/2,H*0.68);
    if(bestSaves>0){ctx.fillStyle="#1a2744";ctx.fillText("Best: "+bestSaves+" saves",W/2,H*0.74);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";ctx.fillText("[ Tap / Click to play ]",W/2,H*0.83);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.90);
    return;
  }

  // Goal flash
  if(goalFlash>0){
    ctx.fillStyle="rgba(255,0,0,"+goalFlash*0.3+")";
    ctx.beginPath();ctx.arc(W/2,netY+netH,80,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,0,0,"+goalFlash*0.9+")";
    ctx.beginPath();ctx.arc(W/2,netY+netH+10,12,0,Math.PI*2);ctx.fill();
  }

  // Crowd with wave
  for(var i=0;i<crowd.length;i++){
    var c=crowd[i];
    var waveBob=0;
    if(crowdMood>70){
      var wavePhase=(c.x/W)*Math.PI*2-frame*0.05;
      waveBob=Math.sin(wavePhase)*5;
    }
    var bob=Math.sin(frame*0.04*c.bobSpeed+c.bobOffset)*(crowdMood>70?3:1)+waveBob;
    drawCrowdFig(c.x,c.y,c.color,bob);
  }
  if(crowdMood>70){
    ctx.font="9px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";ctx.textAlign="center";
    ctx.fillText("THE WAVE!",W/2,100);
  }

  // Net
  ctx.fillStyle="rgba(0,0,0,0.04)";ctx.fillRect(netX,netY,netW,netH);
  ctx.strokeStyle="rgba(0,0,0,0.06)";ctx.lineWidth=0.5;
  for(var ni=0;ni<netW+netH;ni+=10){
    ctx.beginPath();ctx.moveTo(netX+ni,netY);ctx.lineTo(netX+ni-netH,netY+netH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(netX+ni,netY);ctx.lineTo(netX+ni+netH,netY+netH);ctx.stroke();
  }
  // Goal frame
  ctx.strokeStyle="#cc0000";ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(netX,netY+netH);ctx.lineTo(netX,netY);ctx.lineTo(netX+netW,netY);ctx.lineTo(netX+netW,netY+netH);ctx.stroke();
  // Crease
  ctx.strokeStyle="rgba(255,0,0,0.2)";ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.55,25,0,Math.PI,0);ctx.stroke();

  // Goalie (Jesus)
  var armA=Math.sin(frame*0.1)*0.1;
  // Wide glow when fish power active
  if(wideTimer>0){
    ctx.fillStyle="rgba(0,100,255,0.1)";
    ctx.beginPath();ctx.ellipse(goalie.x,goalie.y+goalie.h/2,goalie.w/2+10,goalie.h/2+5,0,0,Math.PI*2);ctx.fill();
  }
  drawStickFigure(goalie.x,goalie.y+goalie.h,60,{headColor:"#ffd3a3",jerseyColor:"#ffffff",crossOnJersey:true,halo:true,stickHand:true,gloveHand:true,armRaise:armA,legSpread:0.45});

  // Shield indicator
  if(shieldCount>0){
    ctx.strokeStyle="rgba(255,215,0,0.5)";ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(goalie.x,goalie.y+goalie.h/2,35,0,Math.PI*2);ctx.stroke();
    ctx.font="bold 10px monospace";ctx.fillStyle="#ffd700";ctx.textAlign="center";
    ctx.fillText("SHIELD x"+shieldCount,goalie.x,goalie.y-10);
  }

  // Freeze indicator
  if(freezeTimer>0){
    ctx.font="bold 12px monospace";ctx.fillStyle="rgba(0,150,255,0.7)";ctx.textAlign="center";
    ctx.fillText("FROZEN!",W/2,H*0.4);
  }

  // Shooters
  for(var s=0;s<shooters.length;s++){
    var sh=shooters[s];
    drawShooter(sh.x,sh.y+50,50,sh.armRaise,sh.jerseyColor);
  }

  // Pucks
  for(var i=0;i<pucks.length;i++){
    var p=pucks[i];
    ctx.fillStyle="rgba(0,0,0,0.1)";ctx.beginPath();ctx.ellipse(p.x,p.y+3,p.radius,p.radius*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=p.active?"#111":"#555";ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
    if(p.active){
      // Speed lines / trail
      if(p.type==="slap"){
        ctx.strokeStyle="rgba(255,0,0,0.2)";ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(p.x-p.vx*2,p.y-p.vy*2);ctx.lineTo(p.x-p.vx*6,p.y-p.vy*6);ctx.stroke();
      } else {
        ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(p.x-p.vx*2,p.y-p.vy*2);ctx.lineTo(p.x-p.vx*5,p.y-p.vy*5);ctx.stroke();
      }
      // Frozen pucks glow
      if(freezeTimer>0){
        ctx.fillStyle="rgba(0,150,255,0.3)";ctx.beginPath();ctx.arc(p.x,p.y,p.radius+4,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Power-ups
  for(var i=0;i<powerUps.length;i++){
    var pu=powerUps[i];
    var pulse=Math.sin(frame*0.1)*3;
    ctx.fillStyle=pu.type==="shield"?"rgba(255,215,0,0.7)":pu.type==="fish"?"rgba(0,150,255,0.7)":"rgba(0,200,200,0.7)";
    ctx.beginPath();ctx.arc(pu.x,pu.y,12+pulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#fff";ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText(pu.type==="shield"?"S":pu.type==="fish"?"F":"W",pu.x,pu.y);
    ctx.textBaseline="alphabetic";
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var pt=particles[i];ctx.globalAlpha=pt.life;ctx.fillStyle=pt.color;
    ctx.beginPath();ctx.arc(pt.x,pt.y,pt.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Faceoff
  if(faceoffTimer>0){
    ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";ctx.font="bold 22px monospace";ctx.fillStyle="#fff";
    ctx.fillText("PERIOD "+period,W/2,H*0.45);
    ctx.font="14px monospace";ctx.fillText("Face-off in "+Math.ceil(faceoffTimer/60)+"...",W/2,H*0.52);
    var dotPulse=Math.sin(frame*0.1)*5+15;
    ctx.fillStyle="rgba(255,30,30,0.5)";ctx.beginPath();ctx.arc(W/2,H*0.6,dotPulse,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#c0392b";ctx.beginPath();ctx.arc(W/2,H*0.6,6,0,Math.PI*2);ctx.fill();
  }

  // Scoreboard
  var sbW=220,sbH=36,sbX=W/2-sbW/2,sbY=5;
  ctx.fillStyle="rgba(26,39,68,0.92)";ctx.fillRect(sbX,sbY,sbW,sbH);
  ctx.strokeStyle="rgba(255,255,255,0.2)";ctx.lineWidth=1;ctx.strokeRect(sbX,sbY,sbW,sbH);
  ctx.textAlign="center";ctx.font="bold 10px monospace";ctx.fillStyle="#aaa";
  ctx.fillText("HOME",sbX+40,sbY+12);ctx.fillText("AWAY",sbX+sbW-40,sbY+12);
  ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
  ctx.fillText(""+saves,sbX+40,sbY+28);ctx.fillText(""+goals,sbX+sbW-40,sbY+28);
  ctx.font="bold 9px monospace";ctx.fillStyle="#4ade80";
  ctx.fillText("P"+period+" "+Math.ceil(periodTime/60)+"s",W/2,sbY+20);
  ctx.fillStyle="rgba(255,255,255,0.2)";ctx.fillRect(W/2-0.5,sbY+4,1,sbH-8);

  // Streak
  if(streak>=3){
    ctx.font="bold 12px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";ctx.textAlign="center";
    ctx.fillText("SAVE STREAK: "+streak,W/2,netY-15);
  }
  if(streak>0&&streak%10===0&&frame%60<30){
    ctx.font="bold 18px monospace";ctx.fillStyle="rgba(200,0,0,0.6)";ctx.textAlign="center";
    ctx.fillText("DIVINE INTERVENTION!",W/2,H*0.4);
  }

  // Save %
  var savePct=totalShots>0?Math.round(saves/totalShots*100):100;
  ctx.textAlign="left";ctx.font="9px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillText("SV% "+savePct+"%",18,H-40);

  // Game Over
  if(STATE==="gameover"){
    ctx.fillStyle="rgba(26,39,68,0.9)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.font="bold 26px monospace";ctx.fillStyle="#fff";ctx.fillText("FINAL BUZZER",W/2,H*0.15);
    ctx.font="bold 14px monospace";ctx.fillStyle="#c0392b";ctx.fillText("SVG REBORN HAS ENDED",W/2,H*0.21);
    drawStickFigure(W/2,H*0.40,60,{headColor:"#ffd3a3",jerseyColor:"#fff",crossOnJersey:true,halo:true,stickHand:true,gloveHand:true,armRaise:0,legSpread:0.4});
    ctx.font="bold 16px monospace";ctx.fillStyle="#fff";
    ctx.fillText("Saves: "+saves,W/2,H*0.48);
    ctx.fillText("Goals Against: "+goals,W/2,H*0.54);
    ctx.fillText("Save %: "+savePct+"%",W/2,H*0.60);
    ctx.fillText("Best Streak: "+bestStreak,W/2,H*0.66);
    var msg=savePct>=90?"MIRACLE ON ICE!":savePct>=75?"Blessed performance!":savePct>=60?"Decent. For a deity.":savePct>=40?"The fans are praying.":"Holy. That was bad.";
    ctx.font="12px monospace";ctx.fillStyle="#aaa";ctx.fillText(msg,W/2,H*0.73);
    if(saves>=bestSaves&&saves>0){ctx.fillStyle="#ffd700";ctx.fillText("NEW RECORD!",W/2,H*0.78);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";ctx.fillText("[ Tap to play again ]",W/2,H*0.86);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.92);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
