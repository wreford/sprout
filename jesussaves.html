  <style>

<body>
<a href="index.html" style="position:fixed;top:4px;left:8px;z-index:9999;font-size:0.7rem;color:#6e6e73;text-decoration:none;font-family:ui-monospace,monospace;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity=1;this.style.color=\x27#4ade80\x27" onmouseout="this.style.opacity=0.7;this.style.color=\x27#6e6e73\x27">&larr; home</a>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// ═══ Sound — organ/arena style ═══
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function organ(freq,dur,vol){
  if(!audioCtx)return;
  // Organ = multiple harmonics
  var gains=[];
  [1,2,3,4].forEach(function(h){
    var osc=audioCtx.createOscillator();
    var g=audioCtx.createGain();
    osc.type = h===1?"sine":"sine";
    osc.frequency.value=freq*h;
    g.gain.setValueAtTime((vol||0.02)/(h*h),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    osc.connect(g);g.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+dur);
  });
}
function sndSave(){organ(523,0.15,0.03);setTimeout(function(){organ(659,0.15,0.03);},80);setTimeout(function(){organ(784,0.2,0.03);},160);}
function sndGoal(){organ(262,0.3,0.04);setTimeout(function(){organ(330,0.3,0.04);},150);setTimeout(function(){organ(392,0.3,0.04);},300);}
function sndBigSave(){organ(784,0.2,0.04);setTimeout(function(){organ(988,0.2,0.04);},100);setTimeout(function(){organ(1175,0.3,0.04);},200);}
function sndWhistle(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sine";osc.frequency.value=3200;
  g.gain.setValueAtTime(0.03,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.4);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+0.4);
}
function sndBuzzer(){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();var g=audioCtx.createGain();
  osc.type="sawtooth";osc.frequency.value=150;
  g.gain.setValueAtTime(0.05,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.5);
  osc.connect(g);g.connect(audioCtx.destination);osc.start();osc.stop(audioCtx.currentTime+1.5);
}

// ── Organ music loop (plays the classic arena charge)
var musicPlaying=false;
var musicInterval=null;
function playChargeTheme(){
  if(musicPlaying)return;
  musicPlaying=true;
  // Da da da DA da DAAA (charge!)
  var notes=[
    {f:262,t:0,d:0.2},{f:330,t:200,d:0.2},{f:392,t:400,d:0.2},
    {f:523,t:600,d:0.4},{f:392,t:1000,d:0.2},{f:523,t:1200,d:0.6}
  ];
  function playOnce(){
    notes.forEach(function(n){
      setTimeout(function(){organ(n.f,n.d,0.015);},n.t);
    });
  }
  playOnce();
  musicInterval=setInterval(playOnce,4000);
}
function stopMusic(){musicPlaying=false;clearInterval(musicInterval);}

// ═══ Narrator — hockey commentator with religious puns ═══
var lastJokeTime = 0;

var JOKES_SAVE = [
  "WHAT A SAVE! Truly divine intervention!",
  "He saves! That's what he does! It's literally in the name!",
  "Blocked! The puck had no prayer!",
  "Denied! Like Peter at the gates! Wait, wrong story.",
  "Saved! The crowd goes biblical!",
  "Holy blocker, Batman! Wait, wrong franchise.",
  "Miracle save! Turning pucks into misses since year one!",
  "He rose again! And blocked that puck!",
];

var JOKES_GOAL = [
  "Goal against! Even the messiah can't save them all.",
  "It went in. Sometimes even divine plans have gaps.",
  "Scored on! The congregation is NOT happy.",
  "That one got past him. Let he who has never been scored on cast the first puck.",
  "Goal! Somewhere a church organ plays a sad note.",
];

var JOKES_STREAK = [

  "Ten saves! The crowd is speaking in tongues!",
  "Fifteen! At this point they should retire his jersey! Which is a robe!",
  "Twenty saves! That's not a streak, that's a MIRACLE!",
];

var JOKES_RANDOM = [
  "Fun fact. Jesus would have played center but he kept giving the puck away.",
  "The ref is considering a penalty. But who can judge HIM?",
  "This arena seats five thousand. Fed entirely by one hot dog stand.",
  "The Zamboni driver is Moses. He parts the ice beautifully.",
  "Jesus saves. Moses invests. Buddha achieves inner peace. But only one plays hockey.",
  "The penalty box is just confession with worse seating.",

  "The other goalie is using a regulation stick. Jesus is using a shepherd's crook. Unfair advantage? Maybe.",
  "Half time entertainment is a man walking on the freshly Zamboni'd ice. Nobody is impressed.",
  "The hot dog vendor is selling loaves and fishes dogs. They're surprisingly filling.",
  "Jesus's save percentage is heavenly. That's not a pun, it's a statistic.",
  "The opposing team just called a timeout. They're praying. Ironic.",

  "A fan just held up a sign that says John 3:16. The scoreboard reads 3-16. Coincidence? PROBABLY.",
  "The ice girls are angels. Literally. They have wings. It's a whole thing.",
  "Someone in the crowd is doing the wave. Jesus approves. He invented waves.",
  "The commentator's booth is in the rafters. Which is where all the best stories happen.",
  "Intermission report: water has been turned into Gatorade. The trainers are confused.",
  "The puck is made of vulcanized rubber. Jesus preferred wooden things. Different era.",
  "Breaking news: the other team's coach has been ejected for blasphemy. The refs take that seriously here.",
  "Fun fact: Jesus has never been called for icing. He can't. He's the son of God. House rules.",
  "The organ is playing beautifully tonight. It always does. It's a church organ. It has ONE JOB.",
  "A member of the crowd just performed a minor miracle. He found his car keys.",
  "The arena nachos are described as heavenly. They're not. They're arena nachos. Manage expectations.",
];

var JOKES_PERIOD_END = [
  "End of the period! Time for communion wine and orange slices!",
  "Period over! Jesus heads to the locker room to turn water into sports drinks.",
  "Intermission! The Zamboni is driven by Noah. He's good with large vehicles.",
];

var JOKES_GAME_START = [
  "And we're underway! Jesus takes the crease! The crease takes Jesus! Everyone's excited!",
  "Puck drop! Let there be hockey!",
  "The game begins! In the beginning, there was the puck. And it was good.",
];

function jesusSpeak(text) {
  try {
    if (!window.speechSynthesis) return;
    var now = Date.now();
    if (now - lastJokeTime < 8000) return;
    lastJokeTime = now;
    try { speechSynthesis.cancel(); } catch(e) {}
    setTimeout(function() {
      try {
        var utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.0;
        utter.pitch = 0.9;
        utter.volume = 1.0;
        var voices = speechSynthesis.getVoices();
        if (voices && voices.length > 0) {
          var voice = null;
          for (var i = 0; i < voices.length; i++) {
            if (voices[i].lang && voices[i].lang.indexOf('en') === 0) { voice = voices[i]; break; }
          }
          if (voice) utter.voice = voice;
        }
        speechSynthesis.speak(utter);
      } catch(e) {}
    }, 60);
  } catch(e) {}
}
if (window.speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = function(){}; }

function pickJoke(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ═══ Game state ═══
var STATE="menu";
var goalie,pucks,particles,crowd;
var saves,goals,totalShots,wave,frame;
var streak,bestStreak;
var shotSpeed,shotInterval,shotTimer;
var periodTime,period;
var crowdMood; // 0-100
var bestSaves=parseInt(localStorage.getItem("jesus-best"))||0;

// Goalie (Jesus) position
var goalX,goalY,goalW,goalH;
var netX,netY,netW,netH;

function reset(){
  // Goal/net dimensions (bottom center)
  goalW=Math.min(240,W*0.5);
  goalH=60;
  netX=W/2-goalW/2;
  netY=H-goalH-30;
  netW=goalW;
  netH=goalH;

  goalie={x:W/2,y:netY+10,w:40,h:50,targetX:W/2};
  pucks=[];
  particles=[];
  crowd=[];
  // Generate crowd
  var crowdEmojis=["👨","👩","👦","👧","🧑","👴","👵","🧒","👱","👲","🧔","👳","🤶","🎅"];
  for(var i=0;i<60;i++){
    crowd.push({
      x:20+Math.random()*(W-40),
      y:10+Math.random()*80,
      emoji:crowdEmojis[Math.floor(Math.random()*crowdEmojis.length)],
      bobSpeed:1+Math.random()*2,
      bobOffset:Math.random()*Math.PI*2
    });
  }

  saves=0;goals=0;totalShots=0;wave=1;frame=0;
  streak=0;bestStreak=0;
  shotSpeed=3;shotInterval=60;shotTimer=0;
  periodTime=3600; // 60 seconds per period
  period=1;
  crowdMood=50;
}

// ═══ Puck shooting ═══
function shootPuck(){
  totalShots++;
  var fromX=50+Math.random()*(W-100);
  var fromY=40+Math.random()*80;
  // Aim at a random spot in the net
  var targetX=netX+20+Math.random()*(netW-40);
  var targetY=netY+Math.random()*netH*0.5;
  var dx=targetX-fromX,dy=targetY-fromY;
  var len=Math.sqrt(dx*dx+dy*dy);
  var speed=shotSpeed+Math.random()*1.5;
  // Add curve
  var curve=(Math.random()-0.5)*0.3;

  pucks.push({
    x:fromX,y:fromY,
    vx:dx/len*speed,vy:dy/len*speed,
    curve:curve,
    radius:8,
    active:true,
    shooter:["🏒","🥅","⛸️"][Math.floor(Math.random()*3)]
  });
}

function shootMultiple(count){
  for(var i=0;i<count;i++){
    setTimeout(function(){if(STATE==="playing")shootPuck();},i*200);
  }
}

// ═══ Input ═══
var mouseX=W/2;
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;});
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();playChargeTheme();sndWhistle();initAudio();setTimeout(function(){jesusSpeak(pickJoke(JOKES_GAME_START));},500);return;}
  if(STATE==="gameover"){STATE="playing";reset();playChargeTheme();sndWhistle();setTimeout(function(){jesusSpeak(pickJoke(JOKES_GAME_START));},500);return;}
  mouseX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  mouseX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('click',function(){
  initAudio();
  if(STATE==="menu"){STATE="playing";reset();playChargeTheme();sndWhistle();}
  else if(STATE==="gameover"){STATE="playing";reset();playChargeTheme();sndWhistle();}
});

// ═══ Particles ═══
function spawnParts(x,y,emoji,count){
  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6-2,life:1,emoji:emoji,size:12+Math.random()*8});
  }
}

// ═══ Update ═══
function update(){
  if(STATE!=="playing")return;
  frame++;
  periodTime--;

  // Period transitions
  if(periodTime<=0){
    period++;
    periodTime=3600;
    sndWhistle();
    if(period>3){
      // Game over after 3 periods
      STATE="gameover";
      stopMusic();
      sndBuzzer();
      if(saves>bestSaves){bestSaves=saves;localStorage.setItem("jesus-best",bestSaves);}
      return;
    }
    // Speed up each period
    shotSpeed+=0.8;
    shotInterval=Math.max(20,shotInterval-10);
  }

  // Random joke every ~30 seconds (1800 frames at 60fps)
  if(frame%1800===900&&frame>300){jesusSpeak(pickJoke(JOKES_RANDOM));}

  // Wave escalation
  if(frame%600===0&&frame>0){
    wave++;
    shotInterval=Math.max(15,shotInterval-3);
    shotSpeed=Math.min(8,shotSpeed+0.3);
  }

  // Shoot pucks
  shotTimer++;
  if(shotTimer>=shotInterval){
    shotTimer=0;
    if(Math.random()<0.15&&wave>=2)shootMultiple(2);
    else if(Math.random()<0.08&&wave>=3)shootMultiple(3);
    else shootPuck();
  }

  // Move goalie toward mouse
  goalie.targetX=Math.max(netX+goalie.w/2,Math.min(netX+netW-goalie.w/2,mouseX));
  goalie.x+=(goalie.targetX-goalie.x)*0.15;

  // Update pucks
  for(var i=pucks.length-1;i>=0;i--){
    var p=pucks[i];
    if(!p.active)continue;
    p.vx+=p.curve*0.02;
    p.x+=p.vx;
    p.y+=p.vy;

    // Check save (goalie block)
    var gLeft=goalie.x-goalie.w/2;
    var gRight=goalie.x+goalie.w/2;
    var gTop=goalie.y-10;
    var gBot=goalie.y+goalie.h;
    if(p.x>gLeft-p.radius&&p.x<gRight+p.radius&&p.y>gTop-p.radius&&p.y<gBot+p.radius){
      // SAVED!
      saves++;
      streak++;
      bestStreak=Math.max(bestStreak,streak);
      p.active=false;
      crowdMood=Math.min(100,crowdMood+5);
      if(streak%5===0){sndBigSave();spawnParts(p.x,p.y,"✝️",5);spawnParts(p.x,p.y,"⭐",3);jesusSpeak(pickJoke(JOKES_STREAK));}
      else if(streak%3===0){sndSave();spawnParts(p.x,p.y,"🙏",2);spawnParts(p.x,p.y,"✨",2);jesusSpeak(pickJoke(JOKES_SAVE));}
      else{sndSave();spawnParts(p.x,p.y,"🙏",2);spawnParts(p.x,p.y,"✨",2);}
      // Deflect puck
      p.vy=-Math.abs(p.vy)*0.6;
      p.vx=(Math.random()-0.5)*4;
      setTimeout(function(){var idx=pucks.indexOf(p);if(idx>-1)pucks.splice(idx,1);},500);
      continue;
    }

    // Check goal (puck enters net)
    if(p.y>netY+10&&p.x>netX+5&&p.x<netX+netW-5){
      // GOAL SCORED AGAINST
      goals++;
      streak=0;
      p.active=false;
      crowdMood=Math.max(0,crowdMood-15);
      sndGoal();sndBuzzer();jesusSpeak(pickJoke(JOKES_GOAL));
      spawnParts(p.x,p.y,"🚨",4);
      spawnParts(p.x,p.y,"😱",2);
      setTimeout(function(){var idx=pucks.indexOf(p);if(idx>-1)pucks.splice(idx,1);},800);
      continue;
    }

    // Off screen
    if(p.y>H+20||p.x<-20||p.x>W+20||p.y<-20){
      pucks.splice(i,1);
    }
  }

  // Crowd mood decay
  if(frame%30===0)crowdMood=Math.max(20,crowdMood-0.5);

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.life-=0.02;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ═══ Draw ═══
function draw(){
  // Ice rink background — gradient for depth
  var iceGrad = ctx.createLinearGradient(0,0,0,H);
  iceGrad.addColorStop(0,"#c8dce8");
  iceGrad.addColorStop(0.5,"#e0eef6");
  iceGrad.addColorStop(1,"#d0dfe8");
  ctx.fillStyle=iceGrad;
  ctx.fillRect(0,0,W,H);

  // Ice texture — subtle scratches
  ctx.strokeStyle="rgba(180,200,220,0.3)";
  ctx.lineWidth=0.5;
  for(var sc=0;sc<15;sc++){
    var sx1=Math.sin(sc*7+frame*0.001)*W;
    ctx.beginPath();ctx.moveTo(sx1,0);ctx.lineTo(sx1+50,H);ctx.stroke();
  }

  // Rink boards — thicker, rounded
  ctx.strokeStyle="#445";
  ctx.lineWidth=6;
  ctx.beginPath();ctx.roundRect(6,6,W-12,H-12,16);ctx.stroke();
  // Board glass reflection
  ctx.strokeStyle="rgba(255,255,255,0.15)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(8,8,W-16,H-16,14);ctx.stroke();

  // Blue lines — thicker
  ctx.fillStyle="rgba(41,98,255,0.2)";
  ctx.fillRect(12,H*0.35-2,W-24,6);
  // Red line
  ctx.fillStyle="rgba(255,30,30,0.2)";
  ctx.fillRect(12,H*0.55-2,W-24,6);

  // Center ice circle + logo
  ctx.strokeStyle="rgba(255,30,30,0.18)";
  ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(W/2,H*0.45,60,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle="rgba(41,98,255,0.12)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(W/2,H*0.45,55,0,Math.PI*2);ctx.stroke();
  // Center dot
  ctx.fillStyle="rgba(41,98,255,0.1)";
  ctx.beginPath();ctx.arc(W/2,H*0.45,8,0,Math.PI*2);ctx.fill();
  // Center logo
  ctx.font="14px serif";ctx.textAlign="center";ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillText("✝️",W/2,H*0.45+5);

  // Face-off circles
  ctx.strokeStyle="rgba(255,30,30,0.1)";
  ctx.lineWidth=1.5;
  var faceOffY1=H*0.35,faceOffY2=H*0.55;
  ctx.beginPath();ctx.arc(W*0.25,faceOffY1,25,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.75,faceOffY1,25,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.25,faceOffY2,25,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(W*0.75,faceOffY2,25,0,Math.PI*2);ctx.stroke();

  if(STATE==="menu"){
    ctx.textAlign="center";
    ctx.font="bold 32px monospace";ctx.fillStyle="#1a2744";ctx.fillText("JESUS SAVES",W/2,H*0.2);
    ctx.font="48px serif";ctx.fillText("⛸️🧔✝️🏒",W/2,H*0.34);
    ctx.font="14px monospace";ctx.fillStyle="#555";
    ctx.fillText("Jesus is a hockey goalie",W/2,H*0.46);
    ctx.fillText("Move left/right to block pucks",W/2,H*0.51);
    ctx.fillText("Survive 3 periods!",W/2,H*0.56);
    ctx.fillText("",W/2,H*0.61);
    if(bestSaves>0){ctx.fillStyle="#1a2744";ctx.fillText("Best: "+bestSaves+" saves",W/2,H*0.66);}
    ctx.fillStyle="#2962ff";ctx.font="14px monospace";
    ctx.fillText("[ Tap / Click to play ]",W/2,H*0.76);
    ctx.font="10px monospace";ctx.fillStyle="#999";ctx.fillText("taskiap.com",W/2,H*0.90);
    return;
  }

  // Crowd (top of screen)
  for(var i=0;i<crowd.length;i++){
    var c=crowd[i];
    var bob=Math.sin(frame*0.03*c.bobSpeed+c.bobOffset)*(crowdMood>70?4:1);
    ctx.font="18px serif";
    ctx.fillText(c.emoji,c.x,c.y+bob);
  }
  // Crowd mood indicator
  if(crowdMood>70){
    ctx.font="10px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";ctx.textAlign="center";
    ctx.fillText("🔊 CROWD GOES WILD!",W/2,98);
  }

  // Banners
  ctx.fillStyle="rgba(26,39,68,0.08)";
  ctx.fillRect(W*0.05,100,W*0.12,20);
  ctx.fillRect(W*0.83,100,W*0.12,20);
  ctx.font="8px monospace";ctx.fillStyle="rgba(0,0,0,0.2)";ctx.textAlign="center";
  ctx.fillText("HOLY SAVES",W*0.11,113);
  ctx.fillText("AMEN ARENA",W*0.89,113);

  // Net
  ctx.fillStyle="rgba(0,0,0,0.06)";
  ctx.fillRect(netX,netY,netW,netH);
  // Net mesh lines
  ctx.strokeStyle="rgba(0,0,0,0.08)";
  ctx.lineWidth=0.5;
  for(var ny=netY;ny<netY+netH;ny+=8){ctx.beginPath();ctx.moveTo(netX,ny);ctx.lineTo(netX+netW,ny);ctx.stroke();}
  for(var nx=netX;nx<netX+netW;nx+=8){ctx.beginPath();ctx.moveTo(nx,netY);ctx.lineTo(nx,netY+netH);ctx.stroke();}
  // Goal posts
  ctx.fillStyle="#cc0000";
  ctx.fillRect(netX-3,netY,6,netH);
  ctx.fillRect(netX+netW-3,netY,6,netH);
  ctx.fillRect(netX,netY-3,netW,6);
  // Crease
  ctx.strokeStyle="rgba(255,0,0,0.2)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(W/2,netY,goalW*0.6,30,0,Math.PI,0);ctx.stroke();

  // Goalie (Jesus)
  var gx=goalie.x;
  var gy=goalie.y;
  // Body
  ctx.font="36px serif";
  ctx.textAlign="center";
  ctx.fillText("🧔",gx,gy+30);
  // Halo
  ctx.font="16px serif";
  ctx.fillText("😇",gx,gy-2);
  // Hockey stick
  ctx.font="20px serif";
  ctx.fillText("🏒",gx+18,gy+35);
  // Goalie pads (simple rectangles)
  ctx.fillStyle="rgba(255,255,255,0.7)";
  ctx.fillRect(gx-18,gy+20,36,18);
  ctx.strokeStyle="rgba(0,0,0,0.15)";
  ctx.lineWidth=1;
  ctx.strokeRect(gx-18,gy+20,36,18);
  // Cross on chest
  ctx.strokeStyle="rgba(200,0,0,0.3)";
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(gx,gy+8);ctx.lineTo(gx,gy+22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(gx-6,gy+14);ctx.lineTo(gx+6,gy+14);ctx.stroke();

  // Pucks
  for(var i=0;i<pucks.length;i++){
    var p=pucks[i];
    // Shadow
    ctx.fillStyle="rgba(0,0,0,0.15)";
    ctx.beginPath();ctx.ellipse(p.x,p.y+4,p.radius,p.radius*0.4,0,0,Math.PI*2);ctx.fill();
    // Puck
    ctx.fillStyle="#111";
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="#333";
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.stroke();
    // Speed lines
    if(p.active){
      ctx.strokeStyle="rgba(0,0,0,0.1)";
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x-p.vx*2,p.y-p.vy*2);ctx.lineTo(p.x-p.vx*5,p.y-p.vy*5);ctx.stroke();
    }
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var pt=particles[i];
    ctx.globalAlpha=pt.life;
    ctx.font=pt.size+"px serif";
    ctx.textAlign="center";
    ctx.fillText(pt.emoji,pt.x,pt.y);
  }
  ctx.globalAlpha=1;

  // ── HUD ──
  ctx.textAlign="left";
  ctx.font="bold 12px monospace";
  // Scoreboard background
  ctx.fillStyle="rgba(26,39,68,0.85)";
  ctx.fillRect(W/2-100,H-24,200,22);
  ctx.font="bold 11px monospace";ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.fillText("P"+period+"  "+Math.ceil(periodTime/60)+"s   SAVES: "+saves+"   GOALS: "+goals,W/2,H-8);

  // Streak
  if(streak>=3){
    ctx.font="bold 14px monospace";ctx.fillStyle="rgba(255,215,0,0.8)";ctx.textAlign="center";
    ctx.fillText("🔥 "+streak+" SAVE STREAK!",W/2,netY-20);
  }

  // Big save text
  if(streak>0&&streak%10===0&&frame%60<30){
    ctx.font="bold 20px monospace";ctx.fillStyle="rgba(200,0,0,0.6)";ctx.textAlign="center";
    ctx.fillText("✝️ DIVINE INTERVENTION! ✝️",W/2,H*0.4);
  }

  // Save percentage
  var savePct=totalShots>0?Math.round(saves/totalShots*100):100;
  ctx.textAlign="left";ctx.font="10px monospace";ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillText("SV% "+savePct+"%",8,H-30);
  ctx.textAlign="right";
  ctx.fillText("WAVE "+wave,W-8,H-30);

  // Game over
  if(STATE==="gameover"){
    ctx.fillStyle="rgba(26,39,68,0.85)";ctx.fillRect(0,0,W,H);
    ctx.textAlign="center";
    ctx.font="bold 28px monospace";ctx.fillStyle="#fff";
    ctx.fillText("FINAL BUZZER",W/2,H*0.2);
    ctx.font="48px serif";ctx.fillText("🧔✝️🏒",W/2,H*0.32);
    ctx.font="bold 18px monospace";ctx.fillStyle="#fff";
    ctx.fillText("Saves: "+saves,W/2,H*0.44);
    ctx.fillText("Goals Against: "+goals,W/2,H*0.50);
    ctx.fillText("Save %: "+savePct+"%",W/2,H*0.56);
    ctx.fillText("Best Streak: "+bestStreak,W/2,H*0.62);

    var msg=savePct>=90?"MIRACLE ON ICE! 🙌":savePct>=75?"Blessed performance! ✝️":savePct>=60?"He died for these saves.":savePct>=40?"Even Jesus can't save that.":"Holy... that was bad. 😬";
    ctx.font="13px monospace";ctx.fillStyle="#aaa";
    ctx.fillText(msg,W/2,H*0.70);

    if(saves>=bestSaves&&saves>0){ctx.fillStyle="#ffd700";ctx.fillText("🏆 NEW RECORD!",W/2,H*0.76);}

    ctx.fillStyle="#2962ff";ctx.font="14px monospace";
    ctx.fillText("[ Tap to play again ]",W/2,H*0.85);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
