<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donny's Baseball Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0C2340;--surface:#0a1a30;--accent:#FA4616;--green:#4ade80;--gold:#FA4616;--blue:#0C2340;--text:#ffffff;--orange:#FA4616;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;height:100vh;overflow:hidden;line-height:1.4;position:relative;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);opacity:0.5}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.3) 100%)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto;padding:10px 16px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:12px 0 8px}
header h1{font-size:clamp(18px,5vw,26px);letter-spacing:2px;color:var(--accent);font-weight:800;text-transform:uppercase}
header .subtitle{color:rgba(255,255,255,0.7);font-size:13px;margin-top:4px}
.notice{background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);padding:8px 12px;border-radius:6px;font-size:13px;margin:8px 0 12px;color:rgba(255,255,255,0.7)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.3);padding:8px 12px;border:2px solid var(--accent);border-radius:8px;margin-bottom:10px;font-size:14px;flex-wrap:wrap;gap:4px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(232,232,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:var(--orange);color:#000}
.badge-4{background:var(--red);color:#fff}
.category{font-size:13px;color:rgba(232,232,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:48px;padding:10px 14px;border:2px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.3);color:#fff;border-radius:8px;font-size:15px;font-family:inherit;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,0.2);border-color:var(--accent);color:var(--accent)}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes correctPop{0%{transform:scale(1)}40%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes streakFire{0%{text-shadow:0 0 4px rgba(250,70,22,0.3)}50%{text-shadow:0 0 12px rgba(250,70,22,0.7)}100%{text-shadow:0 0 4px rgba(250,70,22,0.3)}}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreUp{0%{transform:scale(1);color:#fff}50%{transform:scale(1.3);color:var(--accent)}100%{transform:scale(1);color:#fff}}
.opt-btn{animation:cardIn 0.3s ease both}
.opt-btn:nth-child(1){animation-delay:0s}
.opt-btn:nth-child(2){animation-delay:0.07s}
.opt-btn:nth-child(3){animation-delay:0.14s}
.opt-btn:nth-child(4){animation-delay:0.21s}
.opt-btn.correct{animation:correctPop 0.35s ease}
.opt-btn.wrong{animation:wrongShake 0.4s ease}
.streak-fire{animation:streakFire 1.5s ease-in-out infinite}
.score-pop{animation:scoreUp 0.4s ease}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(232,232,240,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(232,232,240,0.7)}
.start-btn{width:100%;min-height:48px;padding:12px;margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.resume-btn{background:var(--gold);color:#000;margin-top:10px}
.start-btn:hover,.resume-btn:hover{opacity:0.9}
.hidden{display:none!important}
/* === IMPROVEMENT 2: Streak visuals === */
@keyframes fireBorder{0%{border-color:#FA4616;box-shadow:0 0 8px rgba(250,70,22,0.4)}50%{border-color:#ff9933;box-shadow:0 0 18px rgba(255,153,51,0.6)}100%{border-color:#FA4616;box-shadow:0 0 8px rgba(250,70,22,0.4)}}
@keyframes orangePulse{0%{background:var(--bg)}50%{background:#1a1000}100%{background:var(--bg)}}
@keyframes screenShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-4px)}20%{transform:translateX(4px)}30%{transform:translateX(-3px)}40%{transform:translateX(3px)}50%{transform:translateX(-2px)}60%{transform:translateX(2px)}}
.score-bar.streak-fire-border{animation:fireBorder 1.2s ease-in-out infinite}
body.streak-pulse{animation:orangePulse 3s ease-in-out infinite}
body.streak-shake{animation:screenShake 0.4s ease}
/* === IMPROVEMENT 5: Progress bar === */
.progress-bar-wrap{width:100%;height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:10px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}
/* === IMPROVEMENT 6: Floating points === */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.float-pts{position:absolute;right:12px;top:-4px;font-weight:800;font-size:18px;color:var(--green);pointer-events:none;animation:floatUp 1s ease forwards;z-index:50}
/* === IMPROVEMENT 7: Fun fact card === */
.fact-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:10px;font-size:14px;color:rgba(232,232,240,0.85);line-height:1.5}
.fact-card .fact-emoji{font-size:22px;flex-shrink:0;line-height:1.3}
/* === IMPROVEMENT 8: Sound toggle === */
.sound-toggle{background:none;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:18px;cursor:pointer;padding:2px 7px;line-height:1;-webkit-tap-highlight-color:transparent}
.sound-toggle:hover{border-color:var(--accent)}
/* === IMPROVEMENT 1: Start screen === */
.start-hero{font-size:56px;line-height:1;margin-bottom:8px}
.start-high-score{font-size:22px;color:var(--green);font-weight:700;margin:8px 0}
.start-last-score{font-size:14px;color:rgba(232,232,240,0.5);margin-bottom:4px}
.start-badge-300{display:inline-block;background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0}
/* === IMPROVEMENT 4: End screen extras === */
.accuracy-bar-wrap{width:100%;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;margin:6px 0 4px}
.accuracy-bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease}
.grade-badge{display:inline-block;font-size:36px;font-weight:900;padding:6px 20px;border-radius:12px;margin:10px 0}
.share-btn{width:100%;min-height:48px;padding:12px;margin-top:10px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.share-btn:hover{background:rgba(250,70,22,0.1)}
/* === IMPROVEMENT 3: Difficulty flash === */
@keyframes diffFlash{0%{opacity:0}15%{opacity:0.25}30%{opacity:0}50%{opacity:0.15}100%{opacity:0}}
.diff-flash{position:fixed;inset:0;pointer-events:none;z-index:99;animation:diffFlash 0.8s ease forwards}
@keyframes bannerSlide35{0%{transform:translateY(-100%);opacity:0}12%{transform:translateY(0);opacity:1}88%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>DONNY'S BASEBALL TRIVIA</h1>
<div class="subtitle">1960&ndash;1980 &mdash; The Golden Era</div>
</header>
<div id="app"></div>
</div>

<script>
const Q=[
// ===== EASY (d:1) — Questions 1-50 =====
{q:"Who hit 61 home runs in 1961, breaking Babe Ruth's single-season record?",o:["Roger Maris","Mickey Mantle","Harmon Killebrew","Willie Mays"],a:0,d:1,cat:"Hitting",fact:"Maris's record stood for 37 years until Mark McGwire hit 70 in 1998."},
{q:"What team was known as 'The Big Red Machine'?",o:["Cincinnati Reds","St. Louis Cardinals","Philadelphia Phillies","Boston Red Sox"],a:0,d:1,cat:"Teams",fact:"The Big Red Machine won back-to-back World Series in 1975 and 1976."},
{q:"Who was nicknamed 'The Say Hey Kid'?",o:["Hank Aaron","Willie Mays","Roberto Clemente","Ernie Banks"],a:1,d:1,cat:"Players",fact:"Mays earned the nickname for his habit of greeting people with 'Say hey!'"},
{q:"What position did Johnny Bench play?",o:["First Base","Shortstop","Catcher","Outfield"],a:2,d:1,cat:"Players",fact:"Bench revolutionized catching with his one-handed catching style."},
{q:"Who broke Babe Ruth's career home run record in 1974?",o:["Willie Mays","Frank Robinson","Hank Aaron","Reggie Jackson"],a:2,d:1,cat:"Records",fact:"Aaron hit #715 on April 8, 1974, off Al Downing of the Dodgers."},
{q:"What team did Roberto Clemente play for his entire career?",o:["New York Yankees","Pittsburgh Pirates","Baltimore Orioles","Chicago Cubs"],a:1,d:1,cat:"Players",fact:"Clemente died in a plane crash on Dec. 31, 1972, delivering aid to earthquake victims in Nicaragua."},
{q:"Which pitcher threw a perfect game in the 1956 World Series?",o:["Whitey Ford","Sandy Koufax","Don Larsen","Bob Gibson"],a:2,d:1,cat:"Pitching",fact:"It remains the only perfect game in World Series history."},
{q:"What does 'DH' stand for in baseball?",o:["Double Hitter","Designated Hitter","Defensive Helper","Dugout Hero"],a:1,d:1,cat:"Records",fact:"The American League adopted the DH rule in 1973."},
{q:"Who was the first African American to play in Major League Baseball?",o:["Satchel Paige","Willie Mays","Jackie Robinson","Hank Aaron"],a:2,d:1,cat:"Players",fact:"Robinson broke the color barrier on April 15, 1947, with the Brooklyn Dodgers."},
{q:"Which team won the 1969 World Series in a famous upset?",o:["Baltimore Orioles","New York Mets","Chicago Cubs","Detroit Tigers"],a:1,d:1,cat:"World Series",fact:"The 'Miracle Mets' had never finished higher than 9th place before that season."},
{q:"What was Sandy Koufax's primary team?",o:["New York Yankees","San Francisco Giants","Los Angeles Dodgers","Chicago Cubs"],a:2,d:1,cat:"Players",fact:"Koufax retired at just 30 years old due to arthritis in his left elbow."},
{q:"Who managed the Oakland A's dynasty of the early 1970s?",o:["Sparky Anderson","Dick Williams","Billy Martin","Earl Weaver"],a:1,d:1,cat:"Teams",fact:"Dick Williams managed the A's to two World Series titles in 1972 and 1973."},
{q:"What year did the New York Mets first join Major League Baseball?",o:["1960","1961","1962","1965"],a:2,d:1,cat:"Teams",fact:"The 1962 Mets went 40-120, one of the worst records in modern baseball history."},
{q:"Who was known as 'Mr. October'?",o:["Pete Rose","Reggie Jackson","Johnny Bench","Steve Garvey"],a:1,d:1,cat:"Players",fact:"Jackson earned the nickname for his clutch World Series performances, especially his 3 HR game in 1977."},
{q:"How many games are in a regulation baseball game?",o:["7 innings","8 innings","9 innings","10 innings"],a:2,d:1,cat:"Records",fact:"The 9-inning standard has been in place since 1857."},
{q:"Which league adopted the Designated Hitter rule first?",o:["National League","American League","Both at the same time","Neither — it was an interleague rule"],a:1,d:1,cat:"Records",fact:"Ron Blomberg of the Yankees was the first DH on April 6, 1973."},
{q:"What city did the Braves move to from Milwaukee in 1966?",o:["Baltimore","Atlanta","Houston","Tampa"],a:1,d:1,cat:"Teams",fact:"The Braves had previously moved from Boston to Milwaukee in 1953."},
{q:"Who pitched four no-hitters during the 1960s?",o:["Bob Gibson","Juan Marichal","Sandy Koufax","Nolan Ryan"],a:2,d:1,cat:"Pitching",fact:"Koufax threw no-hitters in 1962, 1963, 1964, and a perfect game in 1965."},
{q:"What team did Mickey Mantle play for?",o:["Boston Red Sox","New York Yankees","Detroit Tigers","Cleveland Indians"],a:1,d:1,cat:"Players",fact:"Mantle played his entire 18-year career (1951-1968) with the Yankees."},
{q:"Who won the 1975 World Series?",o:["Boston Red Sox","Cincinnati Reds","Oakland A's","Pittsburgh Pirates"],a:1,d:1,cat:"World Series",fact:"The 1975 Series is considered one of the greatest ever, featuring Carlton Fisk's famous Game 6 homer."},
{q:"What is a 'shutout' in baseball?",o:["A game where both teams score zero","A game where one team scores zero","A game decided in the 9th inning","A game with no hits"],a:1,d:1,cat:"Pitching",fact:"Nolan Ryan threw 61 career shutouts, 12th most in MLB history."},
{q:"Which team did Pete Rose play for from 1963-1978?",o:["Cincinnati Reds","Philadelphia Phillies","Montreal Expos","Boston Red Sox"],a:0,d:1,cat:"Players",fact:"Rose was a 17-time All-Star and the all-time hits leader with 4,256."},
{q:"Who was the first player to reach 3,000 hits in the 1970s?",o:["Hank Aaron","Pete Rose","Roberto Clemente","Willie Mays"],a:3,d:1,cat:"Records",fact:"Mays got his 3,000th hit on July 18, 1970, with a single off Mike Wegener."},
{q:"What team won three consecutive World Series from 1972-1974?",o:["Cincinnati Reds","New York Yankees","Oakland A's","Baltimore Orioles"],a:2,d:1,cat:"World Series",fact:"The A's were known for their colorful uniforms, mustaches, and clubhouse fights."},
{q:"Which pitcher is known for the quote 'I ain't what I used to be, but who the hell is?'",o:["Dizzy Dean","Satchel Paige","Whitey Ford","Warren Spahn"],a:1,d:1,cat:"Players",fact:"Paige was the oldest rookie in MLB history, debuting at age 42 in 1948."},
{q:"What does 'ERA' stand for in baseball?",o:["Earned Run Average","Extra Running Average","Early Run Attempt","Error Rate Average"],a:0,d:1,cat:"Pitching",fact:"The lowest single-season ERA in the live-ball era is Bob Gibson's 1.12 in 1968."},
{q:"Who won the 1960 World Series with a walk-off home run in Game 7?",o:["Mickey Mantle","Roberto Clemente","Bill Mazeroski","Roger Maris"],a:2,d:1,cat:"World Series",fact:"Mazeroski's homer off Ralph Terry is the only walk-off HR to end a Game 7."},
{q:"What was the name of the Houston team before they became the Astros?",o:["Houston Stars","Houston Texans","Houston Colts","Houston Colt .45s"],a:3,d:1,cat:"Teams",fact:"They became the Astros in 1965 when they moved into the Astrodome."},
{q:"Who was the American League MVP in 1961 alongside Roger Maris?",o:["Mickey Mantle","Yogi Berra","Whitey Ford","Elston Howard"],a:0,d:1,cat:"Players",fact:"Mantle hit 54 homers in 1961 but Maris won MVP with 61 homers and 142 RBI."},
{q:"What team did Tom Seaver pitch for in the 1969 World Series?",o:["Baltimore Orioles","Cincinnati Reds","New York Mets","Los Angeles Dodgers"],a:2,d:1,cat:"Pitching",fact:"Seaver was known as 'Tom Terrific' and won 3 Cy Young Awards."},
{q:"How many bases are there on a baseball diamond?",o:["3","4","5","6"],a:1,d:1,cat:"Records",fact:"The bases are 90 feet apart in Major League Baseball."},
{q:"Who managed the Cincinnati Reds' Big Red Machine?",o:["Earl Weaver","Billy Martin","Sparky Anderson","Dick Williams"],a:2,d:1,cat:"Teams",fact:"Anderson was the first manager to win a World Series in both leagues."},
{q:"What pitcher struck out 19 batters in a single game in 1969?",o:["Nolan Ryan","Bob Gibson","Steve Carlton","Tom Seaver"],a:3,d:1,cat:"Pitching",fact:"Seaver struck out 19 against the San Diego Padres, including the last 10 in a row."},
{q:"Which team did Hank Aaron play for when he broke the HR record?",o:["Milwaukee Brewers","Atlanta Braves","Cincinnati Reds","New York Mets"],a:1,d:1,cat:"Players",fact:"Aaron finished his career with 755 home runs, a record that stood until 2007."},
{q:"What is a 'triple play' in baseball?",o:["Hitting a triple","Three outs on one play","Three runs scored on one play","Three errors in one inning"],a:1,d:1,cat:"Records",fact:"Unassisted triple plays are among the rarest feats in baseball — only 15 in MLB history."},
{q:"Who threw seven no-hitters during his career, including several in the 1970s?",o:["Tom Seaver","Steve Carlton","Nolan Ryan","Bob Gibson"],a:2,d:1,cat:"Pitching",fact:"Ryan threw his record 7th no-hitter in 1991 at age 44."},
{q:"What year did Hank Aaron hit his 715th home run?",o:["1972","1973","1974","1975"],a:2,d:1,cat:"Records",fact:"Aaron received death threats and racist mail during his pursuit of Ruth's record."},
{q:"Which team played in the first indoor baseball game at the Astrodome?",o:["Houston Astros","New York Yankees","Philadelphia Phillies","Los Angeles Dodgers"],a:0,d:1,cat:"Teams",fact:"The Astrodome opened on April 9, 1965, and was called the 'Eighth Wonder of the World.'"},
{q:"Who won the N.L. MVP award three times during the 1960s-1970s era?",o:["Willie Mays","Hank Aaron","Johnny Bench","Pete Rose"],a:0,d:1,cat:"Players",fact:"Mays won MVPs in 1954 and 1965, with several close runner-up finishes."},
{q:"What color are the bases in baseball?",o:["Red","Blue","White","Brown"],a:2,d:1,cat:"Records",fact:"Home plate is a five-sided slab of whitened rubber, 17 inches wide."},
{q:"Which expansion team began play in 1969 in Canada?",o:["Toronto Blue Jays","Montreal Expos","Vancouver Mounties","Ottawa Senators"],a:1,d:1,cat:"Teams",fact:"The Expos were the first MLB team outside the United States."},
{q:"Who was the N.L. Rookie of the Year in 1963?",o:["Pete Rose","Joe Morgan","Tommy Harper","Jim Ray Hart"],a:0,d:1,cat:"Players",fact:"Rose was nicknamed 'Charlie Hustle' for his all-out playing style."},
{q:"What is a 'grand slam' in baseball?",o:["Four home runs in one game","A home run with the bases loaded","Winning all four games in a series","Striking out four batters in one inning"],a:1,d:1,cat:"Hitting",fact:"The most grand slams in a career is 23, held by Alex Rodriguez."},
{q:"Which pitcher won 31 games in 1968?",o:["Bob Gibson","Juan Marichal","Denny McLain","Mickey Lolich"],a:2,d:1,cat:"Pitching",fact:"McLain was the last pitcher to win 30+ games, a feat not accomplished since."},
{q:"What team did Carl Yastrzemski play for his entire career?",o:["New York Yankees","Baltimore Orioles","Boston Red Sox","Detroit Tigers"],a:2,d:1,cat:"Players",fact:"Yaz played 23 seasons, all with the Red Sox, from 1961 to 1983."},
{q:"Who was the first Black player in the American League?",o:["Jackie Robinson","Larry Doby","Satchel Paige","Minnie Minoso"],a:1,d:1,cat:"Players",fact:"Doby broke the A.L. color barrier on July 5, 1947, just 11 weeks after Robinson."},
{q:"Which team won the 1970 World Series?",o:["Cincinnati Reds","Baltimore Orioles","Pittsburgh Pirates","Oakland A's"],a:1,d:1,cat:"World Series",fact:"The Orioles won in 5 games behind Brooks Robinson's legendary defensive plays."},
{q:"What is a 'sacrifice fly'?",o:["A fly ball that scores a runner","A bunt that advances a runner","A fly ball caught for the third out","Missing the ball intentionally"],a:0,d:1,cat:"Hitting",fact:"The sacrifice fly was reintroduced as an official rule in 1954 after being removed in 1940."},
{q:"Who threw a no-hitter in his final career start?",o:["Sandy Koufax","Nolan Ryan","Bob Feller","Jim Palmer"],a:0,d:1,cat:"Pitching",fact:"Actually, Koufax's final regular-season game was a complete game but not a no-hitter. His perfect game was in 1965, and he retired after 1966."},
{q:"What trophy is awarded to the World Series champion?",o:["The Pennant Cup","The Commissioner's Trophy","The World Series Cup","The Championship Belt"],a:1,d:1,cat:"World Series",fact:"The Commissioner's Trophy has been awarded since 1967, and unlike other sports trophies, a new one is made each year."},
// ===== MEDIUM (d:2) — Questions 51-100 =====

{q:"What was Denny McLain's win-loss record in 1968 when he won 31 games?",o:["31-5","31-6","31-7","31-9"],a:1,d:3,cat:"pitching",fact:"McLain was the last pitcher to win 30 games, but his career unraveled due to gambling, mob connections, and legal troubles — he was later sentenced to prison."},
{q:"Who hit the longest measured home run at Tiger Stadium?",o:["Al Kaline","Norm Cash","Cecil Fielder","Frank Howard"],a:3,d:3,cat:"hitting",fact:"Frank Howard's mammoth blasts were legendary — standing 6'7\" and 255 pounds, he was a true giant of his era and once hit four home runs in four consecutive at-bats."},
{q:"What reliever served up Bill Mazeroski's walk-off home run in Game 7 of the 1960 World Series?",o:["Jim Coates","Bobby Shantz","Ralph Terry","Ryne Duren"],a:2,d:3,cat:"world series",fact:"Terry served up the famous homer but redeemed himself by winning the 1962 World Series MVP. The Yankees outscored the Pirates 55-27 in the 1960 Series but still lost."},
{q:"How many career home runs did Harmon Killebrew hit?",o:["559","563","573","581"],a:2,d:3,cat:"records",fact:"Killebrew hit 573 homers despite standing just 5'11\" — Ted Williams said Killebrew had more raw power than anyone he'd ever seen."},
{q:"What pitcher wrote an autobiography titled 'Me and the Spitter' admitting he threw illegal pitches?",o:["Don Drysdale","Whitey Ford","Gaylord Perry","Lew Burdette"],a:2,d:3,cat:"pitching",fact:"Perry's book came out in 1974 while he was still an active player. He was only ejected once in his career for a doctored ball — in 1982 at age 43."},
{q:"Who was the first Black player on the Detroit Tigers?",o:["Willie Horton","Jake Wood","Ozzie Virgil Sr.","Gates Brown"],a:2,d:3,cat:"players",fact:"Ozzie Virgil Sr. broke the Tigers' color line on June 6, 1958 — the Tigers were the second-to-last A.L. team to integrate, ahead of only the Red Sox."},
{q:"How many total bases did Al Kaline accumulate in his 22-year Tigers career?",o:["4,852","5,168","5,389","4,583"],a:1,d:3,cat:"records",fact:"Kaline retired with exactly 3,007 hits, 399 home runs, and a .297 lifetime average — falling agonizingly short of .300 and 400 homers."},
{q:"What was Bob Gibson's strikeout-to-walk ratio in his legendary 1968 season?",o:["4.5 to 1","5.8 to 1","7.2 to 1","6.3 to 1"],a:2,d:3,cat:"pitching",fact:"Gibson struck out 268 batters while walking only 62 in 304.2 innings — an extraordinary display of control and dominance."},
{q:"Which Detroit Tiger hit a walk-off home run on the final day of the 1961 season?",o:["Al Kaline","Rocky Colavito","Norm Cash","Dick McAuliffe"],a:2,d:3,cat:"hitting",fact:"Cash finished 1961 with a .361 average, 41 homers, and 132 RBI — yet finished 4th in MVP voting behind Maris, Mantle, and Gentile."},
{q:"What were the 'Baltimore Orioles Baby Birds' known for in 1966?",o:["Their mascot","Young pitchers who powered a World Series sweep","Their farm team","A promotional giveaway"],a:1,d:3,cat:"pitching",fact:"Jim Palmer (20), Wally Bunker (21), and Dave McNally (23) were the young arms that powered the Orioles' shocking 1966 World Series sweep of the Dodgers."},
{q:"Who was the first player to earn $200,000 in a single season?",o:["Willie Mays","Mickey Mantle","Hank Aaron","Bob Gibson"],a:0,d:3,cat:"records",fact:"Mays signed for $200,000 with the Giants in 1966 — a staggering sum at the time. Today's MLB league minimum is over $700,000."},
{q:"How many stolen bases did Bert Campaneris swipe in the 1973 World Series?",o:["3","5","6","4"],a:0,d:3,cat:"world series",fact:"Campaneris was a spark plug for the A's dynasty — he once played all nine positions in a single game for the Kansas City A's in 1965."},
{q:"What infamous 1979 promotion caused a riot and forfeited game at Comiskey Park?",o:["Disco Demolition Night","Bat Day","10-Cent Beer Night","Fireworks Night"],a:0,d:3,cat:"teams",fact:"Radio DJ Steve Dahl blew up disco records between games of a doubleheader on July 12, 1979. Fans stormed the field, the turf was destroyed, and the White Sox forfeited the second game."},
{q:"Which Tigers pitcher was suspended three times in 1970 for off-field misconduct?",o:["Mickey Lolich","Earl Wilson","Denny McLain","Joe Sparma"],a:2,d:3,cat:"players",fact:"McLain was suspended for gambling ties, for dousing reporters with water, and for carrying a gun. He was traded to the Senators after the season and won just 10 more games."},
{q:"How many times did the Tigers and Cardinals meet in the World Series during the 1960s?",o:["1","2","3","0"],a:0,d:3,cat:"world series",fact:"The Tigers and Cardinals met in the 1968 World Series, with Detroit rallying from a 3-1 deficit to win in 7 games. The franchises also clashed in 1934."},
{q:"What controversial act got Dick Allen suspended by the Phillies in 1969?",o:["He threw a baseball at a fan","He refused to play first base","He was chronically absent and missed a doubleheader","He punched teammate Frank Thomas"],a:2,d:3,cat:"players",fact:"Allen's tumultuous time in Philadelphia included scratching messages in the infield dirt with his cleats — he once wrote 'BOO' to mock the hostile fans."},
{q:"What stadium did the Tigers share with the NFL Lions from 1938 to 1974?",o:["Comerica Park","The Silverdome","Tiger Stadium","Michigan Stadium"],a:2,d:3,cat:"teams",fact:"Tiger Stadium hosted both Tigers baseball and Lions football for 36 years, with the football field laid out diagonally across the baseball diamond."},
{q:"How many games did the Tigers win in their 1968 championship season?",o:["100","103","105","107"],a:1,d:3,cat:"teams",fact:"The 103-win Tigers clinched the pennant by 12 games over the Orioles, powered by McLain's 31 wins and a lineup that pulled together after the 1967 Detroit unrest."},
{q:"Who was the only Tiger to win the A.L. batting title between 1960 and 1980?",o:["Al Kaline","Norm Cash","Harvey Kuenn","No Tiger won it in that span"],a:1,d:3,cat:"hitting",fact:"Norm Cash won the 1961 batting title with a .361 average — the highest by a Tiger in the expansion era. Remarkably, he never hit above .283 again."},
{q:"What position did the Tigers' Dick McAuliffe play?",o:["Catcher","Shortstop and Second Base","Third Base","Outfield"],a:1,d:3,cat:"players",fact:"McAuliffe had an unorthodox open batting stance with his front foot pointing toward third base — one of the most distinctive stances in baseball history."},
{q:"Who was the oldest pitcher to throw a no-hitter in the 1960s?",o:["Hoyt Wilhelm","Warren Spahn","Early Wynn","Lew Burdette"],a:1,d:3,cat:"pitching",fact:"Spahn threw a no-hitter at age 40 on April 28, 1961, against the Giants. He then threw another no-hitter five months later at age 40 — the oldest to accomplish the feat until Nolan Ryan."},

{q:"What specific play did Curt Flood misjudge in Game 7 of the 1968 World Series?",o:["A fly ball by Norm Cash","A line drive by Jim Northrup","A pop fly by Al Kaline","A bloop by Bill Freehan"],a:1,d:4,cat:"world series",fact:"Flood took a step in on Northrup's drive before reversing — the ball sailed over his head for a two-run triple that broke the scoreless tie in the 7th inning."},
{q:"How many career shutouts did Mickey Lolich throw for the Tigers?",o:["29","39","44","50"],a:2,d:4,cat:"pitching",fact:"Lolich threw 195 complete games and 44 shutouts as a Tiger, and his 2,679 career strikeouts were the most by any left-hander at the time of his retirement."},
{q:"What was the exact price George Steinbrenner paid for the Yankees in 1973?",o:["$8.8 million","$10 million","$12 million","$14.4 million"],a:1,d:4,cat:"teams",fact:"Steinbrenner famously said at the press conference: 'I won't be active in day-to-day operations.' He then proceeded to change managers 20 times in the next 23 years."},
{q:"How many consecutive errorless games did Brooks Robinson play at third base from 1960 to 1961?",o:["52","67","78","86"],a:2,d:4,cat:"records",fact:"Robinson's 78 consecutive errorless games at third base set a record and was one reason he earned the nickname 'The Human Vacuum Cleaner.'"},

{q:"How many career triples did Roberto Clemente hit?",o:["146","152","166","172"],a:2,d:4,cat:"hitting",fact:"Clemente's 166 triples were the most by any player active in the 1960s-70s, a testament to his blazing speed and aggressive baserunning."},
{q:"What specific jersey number did the Tigers retire for Charlie Gehringer, the first retired in franchise history?",o:["#2","#5","#6","#23"],a:0,d:4,cat:"teams",fact:"Gehringer's #2 was retired in 1983. The Tigers eventually also retired Kaline's #6, Greenberg's #5, and Horton's #23."},
{q:"Who was the backup catcher behind Johnny Bench on the 1975 Big Red Machine?",o:["Bill Plummer","Pat Corrales","Dave Concepcion","Darrel Chaney"],a:0,d:4,cat:"players",fact:"Plummer caught only 42 games in 1975 behind Bench but was considered an excellent defensive catcher — he just had the misfortune of being stuck behind the greatest catcher ever."},

// Crowd sounds (synthesized)
var _crowdTimer=null;
function playCrowdAmbient(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopCrowdAmbient();
function loop(){
try{
var dur=2+Math.random()*2;
var bs=Math.floor(actx.sampleRate*dur);var buf=actx.createBuffer(1,bs,actx.sampleRate);
var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
var src=actx.createBufferSource();src.buffer=buf;
var bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=800+Math.random()*400;bp.Q.value=0.5;
var lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1200;
var g=actx.createGain();g.gain.setValueAtTime(0.006,actx.currentTime);
g.gain.linearRampToValueAtTime(0.01,actx.currentTime+dur*0.3);
g.gain.linearRampToValueAtTime(0.005,actx.currentTime+dur);
src.connect(bp);bp.connect(lp);lp.connect(g);g.connect(actx.destination);
src.start();src.stop(actx.currentTime+dur);
}catch(e){}
_crowdTimer=setTimeout(loop,dur*800);
}
_crowdTimer=setTimeout(loop,500);
}
function stopCrowdAmbient(){if(_crowdTimer){clearTimeout(_crowdTimer);_crowdTimer=null;}}

var src=actx.createBufferSource();src.buffer=buf;

g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);

// Sports announcer TTS
var announceOn=true;
// Two voices: reader (calm, clear) and announcer (excited, deep)
function getVoices(){return speechSynthesis.getVoices();}
function findVoice(names){
var voices=getVoices();
for(var ni=0;ni<names.length;ni++){
  for(var vi=0;vi<voices.length;vi++){
    if(voices[vi].lang.startsWith('en')&&voices[vi].name.toLowerCase().indexOf(names[ni])!==-1)return voices[vi];
  }
}
return null;
}

// Voice 1: Question Reader — woman, clear and warm
function readQuestion(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
try{speechSynthesis.cancel();setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);
u.rate=0.95;u.pitch=1.0;u.volume=0.7;
var v=findVoice(['samantha','victoria','karen','kate','zoe','tessa','fiona','moira','female','woman']);
if(v)u.voice=v;
speechSynthesis.speak(u);},80);}catch(e){}
}

// Voice 2: Color Commentator — clear, enthusiastic
var _speaking=false;
function announce(text){
if(_soundMuted||!announceOn||!('speechSynthesis' in window))return;
_speaking=true;
try{setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);
u.rate=1.0;u.pitch=1.0;u.volume=0.8;
u.lang='en-GB';
var v=findVoice(['daniel','oliver','malcolm','arthur','george','rishi','male','man']);
if(v)u.voice=v;
u.onend=function(){_speaking=false;enableNextBtn();};
u.onerror=function(){_speaking=false;enableNextBtn();};
speechSynthesis.speak(u);
// Fallback: enable after 6s max in case onend doesn't fire
setTimeout(function(){_speaking=false;enableNextBtn();},6000);
},500);}catch(e){_speaking=false;enableNextBtn();}
}

}

g.gain.setValueAtTime(0.02,t+i*0.1);
g.gain.linearRampToValueAtTime(0,t+i*0.1+0.2);
o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
});
}

function playBallgame(){
if(_soundMuted)return;
if(!actx||actx.state==='suspended')actx.resume();
stopBallgame();
var s=SONGS[_currentSong%SONGS.length];
var beat=60/s.bpm;var idx=0;var bc=0;
function pn(){
if(idx>=s.n.length){idx=0;bc=0;_currentSong++;s=SONGS[_currentSong%SONGS.length];beat=60/s.bpm;}
try{
if(s.n[idx]>0){
var o=actx.createOscillator(),g=actx.createGain();o.type=s.w;o.frequency.value=s.n[idx];
g.gain.setValueAtTime(0.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.8);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+s.d[idx]*beat*0.8);
// Bass
var ob=actx.createOscillator(),gb=actx.createGain();ob.type='triangle';ob.frequency.value=s.n[idx]*0.5;
gb.gain.setValueAtTime(0.018,actx.currentTime);gb.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+s.d[idx]*beat*0.9);
ob.connect(gb);gb.connect(actx.destination);ob.start();ob.stop(actx.currentTime+s.d[idx]*beat*0.9);
}
// Drums on 2 and 4
if(bc%4===1||bc%4===3){
var bs2=Math.floor(actx.sampleRate*0.06);var buf=actx.createBuffer(1,bs2,actx.sampleRate);var dd=buf.getChannelData(0);
for(var i=0;i<bs2;i++)dd[i]=(Math.random()*2-1)*0.4;
var src=actx.createBufferSource();src.buffer=buf;var gn=actx.createGain();
gn.gain.setValueAtTime(0.02,actx.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.06);
src.connect(gn);gn.connect(actx.destination);src.start();src.stop(actx.currentTime+0.06);
}
}catch(e){}
bc++;_ballgameTimer=setTimeout(pn,s.d[idx]*beat*1000);idx++;}
_ballgameTimer=setTimeout(pn,300);
}
function stopBallgame(){if(_ballgameTimer){clearTimeout(_ballgameTimer);_ballgameTimer=null;}}

function getDiffForQ(i){
if(gameDifficulty>=1&&gameDifficulty<=4)return gameDifficulty;
if(gameDifficulty===5)return 4; // insane = all expert difficulty
if(i<50)return 1;if(i<100)return 2;if(i<150)return 3;return 4;
}

}

document.getElementById("start-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:saved?saved.highScore||0:0,byDiff:[0,0,0,0,0],started:true};
activeQ=Q.slice();activeQ.sort(function(){return Math.random()-0.5;});
_gameStartTime=Date.now();
saveState();playBallgame();playCrowdAmbient();announce("Play ball! Let's see what you've got!");renderQ();
};
const rb=document.getElementById("resume-btn");
if(rb){rb.onclick=()=>{state=saved;state.answered=false;_gameStartTime=Date.now();playBallgame();playCrowdAmbient();renderQ();};}
}

function renderQ(){
if(state.qi>=activeQ.length){renderEnd();return;}
// Check difficulty transitions (question indices in shuffled deck use original question boundaries)
if(state.qi===75)showBanner("Difficulty Up: Medium!","#f7c948","Moving to Medium questions now! Let's step it up!");
if(state.qi===150)showBanner("Difficulty Up: Hard!","#f59e0b","Moving to Hard questions now! Time to separate the fans from the fanatics!");
if(state.qi===225)showBanner("Difficulty Up: Expert!","#ef4444","Moving to Expert questions now! Only true baseball scholars survive this!");

const q=activeQ[state.qi];
const d=q.d;
// Reader reads the question aloud
readQuestion(q.q);
// Progress bar color by difficulty
const progPct=Math.round((state.qi/activeQ.length)*100);
const progColors={1:'var(--green)',2:'#f7c948',3:'#f59e0b',4:'var(--red)'};
const progColor=progColors[d]||'var(--accent)';
// Streak visual classes
const streakBarClass=state.streak>=3?'score-bar streak-fire-border':'score-bar';
// Body streak effects
document.body.classList.toggle('streak-pulse',state.streak>=5);
app.innerHTML=`
<div class="${streakBarClass}" style="position:relative">
<span>Score: <strong>${state.score}</strong></span>
<span class="streak-fire">${state.streak>=3?"🔥 ":""}Streak: ${state.streak}</span>
<span>Q ${state.qi+1}/${activeQ.length}</span>
<button class="sound-toggle" id="sound-toggle" title="Toggle sound">${_soundMuted?'🔇':'🔊'}</button>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progPct}%;background:${progColor}"></div></div>
<div class="q-header">
<span class="q-number">Question ${state.qi+1}</span>
<span class="badge ${DIFF_CLASSES[d]}">${DIFF_LABELS[d]}</span>
<span class="category">${q.cat}</span>
</div>
<div class="question-text">${q.q}</div>
<div class="options" id="opts">
${q.o.map((o,i)=>`<button class="opt-btn" data-i="${i}">${o}</button>`).join("")}
</div>
<div id="feedback"></div>`;
document.getElementById('sound-toggle').onclick=function(){_soundMuted=!_soundMuted;this.textContent=_soundMuted?'🔇':'🔊';if(_soundMuted){stopBallgame();stopCrowdAmbient();speechSynthesis.cancel();}else{playBallgame();playCrowdAmbient();}};
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{b.onclick=()=>handleAnswer(parseInt(b.dataset.i));});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
const q=activeQ[state.qi];
const correct=idx===q.a;
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{
b.disabled=true;
const i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
let pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
// Floating points animation (Improvement 6)
var scoreBar=document.querySelector('.score-bar');
if(scoreBar){var fp=document.createElement('div');fp.className='float-pts';fp.textContent='+'+pts;scoreBar.appendChild(fp);setTimeout(function(){fp.remove();},1100);}
// Score pop animation
setTimeout(function(){var sb=document.querySelector('.score-bar strong');if(sb){sb.classList.remove('score-pop');sb.offsetHeight;sb.classList.add('score-pop');}},50);
// Streak visuals update
var sbar=document.querySelector('.score-bar');
if(state.streak>=3&&sbar){sbar.classList.add('streak-fire-border');}
if(state.streak>=5){document.body.classList.add('streak-pulse');}
// Screen shake at 10+ streak (Improvement 2)
if(state.streak>=10){document.body.classList.add('streak-shake');setTimeout(function(){document.body.classList.remove('streak-shake');},450);}
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreak();playCrowdRoar();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrect();playCrowdCheer();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
document.body.classList.remove('streak-pulse');
var sbar2=document.querySelector('.score-bar');if(sbar2)sbar2.classList.remove('streak-fire-border');
if(actx.state==="suspended")actx.resume();
playWrong();playCrowdGroan();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

const fb=document.getElementById("feedback");
fb.innerHTML=`
<div class="feedback ${correct?"correct-fb":"wrong-fb"}">
<h3>${correct?"Correct!"+(state.streak>=3?" 🔥 Streak x"+state.streak+"!":""):"Wrong!"}</h3>
${!correct?`<p>The answer was: <strong>${q.o[q.a]}</strong></p>`:""}
${state.streak>=3&&correct?`<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>`:""}
<div class="fact-card"><span class="fact-emoji">⚾</span><span>${q.fact}</span></div>
</div>
<button class="next-btn" id="next-btn" ${_speaking?'disabled style="opacity:0.4"':''}>${state.qi+1>=activeQ.length?"See Results":"Next Question →"}</button>`;
document.getElementById("next-btn").onclick=()=>{
if(_speaking)return;
speechSynthesis.cancel();
state.qi++;state.answered=false;saveState();renderQ();
};
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
document.body.classList.remove('streak-pulse');
stopBallgame();stopCrowdAmbient();
const pct=Math.round(state.correct/activeQ.length*100);
const maxScore=75*10+75*20+75*30+75*50;
// Time stats
const totalTimeSec=_gameStartTime?Math.round((Date.now()-_gameStartTime)/1000):0;
const totalMin=Math.floor(totalTimeSec/60);
const totalSec=totalTimeSec%60;
const timeStr=totalMin>0?totalMin+'m '+totalSec+'s':totalSec+'s';
const avgTimeSec=activeQ.length>0?Math.round(totalTimeSec/activeQ.length*10)/10:0;
// Grade
let grade='F',gradeColor='var(--red)';
if(pct>=90){grade='A+';gradeColor='var(--green)';}
else if(pct>=80){grade='A';gradeColor='var(--green)';}
else if(pct>=70){grade='B';gradeColor='#f7c948';}
else if(pct>=60){grade='C';gradeColor='#f59e0b';}
// Accuracy bar color
const accBarColor=pct>=80?'var(--green)':pct>=60?'#f7c948':'var(--red)';
app.innerHTML=`
<div class="end-screen">
<h2>Game Over!</h2>
<div class="final-score">${state.score}</div>
<p style="color:rgba(232,232,240,0.5)">out of ${maxScore} possible</p>
${state.score>=state.highScore?`<div class="high-label">New High Score!</div>`:`<div class="high-label" style="color:var(--gold)">High Score: ${state.highScore}</div>`}
<div class="grade-badge" style="background:${gradeColor};color:#000">${grade}</div>
<div style="text-align:left;margin:12px 0">
<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:2px"><span>Accuracy</span><span>${pct}%</span></div>
<div class="accuracy-bar-wrap"><div class="accuracy-bar-fill" style="width:${pct}%;background:${accBarColor}"></div></div>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="val">${state.correct}</div><div class="lbl">Correct</div></div>
<div class="stat-card"><div class="val">${state.wrong}</div><div class="lbl">Wrong</div></div>
<div class="stat-card"><div class="val">${state.bestStreak}</div><div class="lbl">Best Streak</div></div>
<div class="stat-card"><div class="val">${timeStr}</div><div class="lbl">Total Time</div></div>
<div class="stat-card"><div class="val">${avgTimeSec}s</div><div class="lbl">Avg / Question</div></div>
<div class="stat-card"><div class="val">${grade}</div><div class="lbl">Grade</div></div>
<div class="stat-card"><div class="val">${state.byDiff[1]}/${75}</div><div class="lbl">Easy</div></div>
<div class="stat-card"><div class="val">${state.byDiff[2]}/${75}</div><div class="lbl">Medium</div></div>
<div class="stat-card"><div class="val">${state.byDiff[3]}/${75}</div><div class="lbl">Hard</div></div>
<div class="stat-card"><div class="val">${state.byDiff[4]}/${75}</div><div class="lbl">Expert</div></div>
</div>
<button class="share-btn" id="share-btn">📋 Share Score</button>
<button class="restart-btn" id="restart-btn">Play Again</button>
</div>`;
document.getElementById("share-btn").onclick=function(){
var txt="⚾ Donny's Baseball Trivia\nScore: "+state.score+"/"+maxScore+" ("+pct+"%)\nGrade: "+grade+"\nBest Streak: "+state.bestStreak+"\nTime: "+timeStr+"\n#BaseballTrivia";
navigator.clipboard.writeText(txt).then(function(){var b=document.getElementById('share-btn');b.textContent='Copied!';setTimeout(function(){b.textContent='📋 Share Score';},2000);}).catch(function(){});

document.getElementById("restart-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true};

saveState();playBallgame();playCrowdAmbient();renderQ();
};
}

renderStart();
