<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donny's Baseball Trivia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--accent:#e94560;--green:#4ade80;--gold:#f7c948;--blue:#0f3460;--text:#e8e8f0;--orange:#f59e0b;--red:#ef4444}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;min-height:100vh;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:600px;margin:0 auto;padding:16px}
.home-link{display:inline-block;padding:8px 0;font-size:16px;min-height:44px;line-height:44px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:clamp(20px,5vw,28px);letter-spacing:2px;color:var(--accent);font-weight:800}
header .subtitle{color:var(--gold);font-size:14px;margin-top:4px;opacity:0.85}
.notice{background:var(--surface);border-left:3px solid var(--gold);padding:10px 14px;border-radius:6px;font-size:14px;margin:12px 0 20px;color:var(--gold)}
.score-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);padding:10px 16px;border-radius:10px;margin-bottom:16px;font-size:15px;flex-wrap:wrap;gap:6px}
.score-bar span{display:flex;align-items:center;gap:4px}
.streak-fire{color:var(--accent)}
.q-header{margin-bottom:12px}
.q-number{font-size:14px;color:rgba(232,232,240,0.5)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin:0 6px;vertical-align:middle}
.badge-1{background:var(--green);color:#000}
.badge-2{background:var(--gold);color:#000}
.badge-3{background:var(--orange);color:#000}
.badge-4{background:var(--red);color:#fff}
.category{font-size:13px;color:rgba(232,232,240,0.5);text-transform:uppercase;letter-spacing:1px}
.question-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;margin:16px 0 20px;line-height:1.4}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{width:100%;min-height:52px;padding:12px 16px;border:2px solid var(--blue);background:var(--surface);color:var(--text);border-radius:10px;font-size:16px;cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.opt-btn:active{transform:scale(0.98)}
.opt-btn:hover{border-color:var(--accent)}
.opt-btn.correct{background:rgba(74,222,128,0.2);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:rgba(233,69,96,0.2);border-color:var(--accent);color:var(--accent)}
.opt-btn.reveal{border-color:var(--green);opacity:0.7}
.opt-btn:disabled{cursor:default;opacity:0.85}
.feedback{margin-top:16px;padding:16px;border-radius:10px;animation:fadeSlide 0.3s ease}
.feedback.correct-fb{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3)}
.feedback.wrong-fb{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3)}
.feedback h3{margin-bottom:6px;font-size:18px}
.feedback .fact{font-size:14px;color:rgba(232,232,240,0.7);margin-top:8px;font-style:italic}
.next-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.next-btn:hover{opacity:0.9}
.next-btn:active{transform:scale(0.98)}
.difficulty-banner{position:fixed;top:0;left:0;right:0;padding:16px;text-align:center;font-size:18px;font-weight:700;z-index:100;animation:bannerSlide 2.5s ease forwards;pointer-events:none}
@keyframes bannerSlide{0%{transform:translateY(-100%);opacity:0}15%{transform:translateY(0);opacity:1}85%{transform:translateY(0);opacity:1}100%{transform:translateY(-100%);opacity:0}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.end-screen{text-align:center;padding:30px 0}
.end-screen h2{font-size:28px;color:var(--gold);margin-bottom:8px}
.end-screen .final-score{font-size:48px;font-weight:800;color:var(--accent);margin:16px 0}
.end-screen .high-label{color:var(--green);font-size:16px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
.stat-card{background:var(--surface);padding:14px;border-radius:10px;text-align:center}
.stat-card .val{font-size:24px;font-weight:700;color:var(--accent)}
.stat-card .lbl{font-size:12px;color:rgba(232,232,240,0.5);margin-top:4px;text-transform:uppercase}
.restart-btn{width:100%;min-height:52px;padding:14px;margin-top:20px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:600;cursor:pointer}
.restart-btn:hover{opacity:0.9}
.start-screen{text-align:center;padding:20px 0}
.start-screen p{margin:12px 0;font-size:15px;color:rgba(232,232,240,0.7)}
.start-btn{width:100%;min-height:52px;padding:14px;margin-top:16px;background:var(--green);color:#000;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer}
.resume-btn{background:var(--gold);color:#000;margin-top:10px}
.start-btn:hover,.resume-btn:hover{opacity:0.9}
.hidden{display:none!important}
</style>
</head>

<script>
const Q=[
// ===== EASY (d:1) — Questions 1-50 =====
{q:"Who hit 61 home runs in 1961, breaking Babe Ruth's single-season record?",o:["Roger Maris","Mickey Mantle","Harmon Killebrew","Willie Mays"],a:0,d:1,cat:"Hitting",fact:"Maris's record stood for 37 years until Mark McGwire hit 70 in 1998."},
{q:"What team was known as 'The Big Red Machine'?",o:["Cincinnati Reds","St. Louis Cardinals","Philadelphia Phillies","Boston Red Sox"],a:0,d:1,cat:"Teams",fact:"The Big Red Machine won back-to-back World Series in 1975 and 1976."},

{q:"What team did Roberto Clemente play for his entire career?",o:["New York Yankees","Pittsburgh Pirates","Baltimore Orioles","Chicago Cubs"],a:1,d:1,cat:"Players",fact:"Clemente died in a plane crash on Dec. 31, 1972, delivering aid to earthquake victims in Nicaragua."},
{q:"Which pitcher threw a perfect game in the 1956 World Series?",o:["Whitey Ford","Sandy Koufax","Don Larsen","Bob Gibson"],a:2,d:1,cat:"Pitching",fact:"It remains the only perfect game in World Series history."},

{q:"What team did Mickey Mantle play for?",o:["Boston Red Sox","New York Yankees","Detroit Tigers","Cleveland Indians"],a:1,d:1,cat:"Players",fact:"Mantle played his entire 18-year career (1951-1968) with the Yankees."},
{q:"Who won the 1975 World Series?",o:["Boston Red Sox","Cincinnati Reds","Oakland A's","Pittsburgh Pirates"],a:1,d:1,cat:"World Series",fact:"The 1975 Series is considered one of the greatest ever, featuring Carlton Fisk's famous Game 6 homer."},
{q:"What is a 'shutout' in baseball?",o:["A game where both teams score zero","A game where one team scores zero","A game decided in the 9th inning","A game with no hits"],a:1,d:1,cat:"Pitching",fact:"Nolan Ryan threw 61 career shutouts, 12th most in MLB history."},
{q:"Which team did Pete Rose play for from 1963-1978?",o:["Cincinnati Reds","Philadelphia Phillies","Montreal Expos","Boston Red Sox"],a:0,d:1,cat:"Players",fact:"Rose was a 17-time All-Star and the all-time hits leader with 4,256."},
{q:"Who was the first player to reach 3,000 hits in the 1970s?",o:["Hank Aaron","Pete Rose","Roberto Clemente","Willie Mays"],a:3,d:1,cat:"Records",fact:"Mays got his 3,000th hit on July 18, 1970, with a single off Mike Wegener."},
{q:"What team won three consecutive World Series from 1972-1974?",o:["Cincinnati Reds","New York Yankees","Oakland A's","Baltimore Orioles"],a:2,d:1,cat:"World Series",fact:"The A's were known for their colorful uniforms, mustaches, and clubhouse fights."},
{q:"Which pitcher is known for the quote 'I ain't what I used to be, but who the hell is?'",o:["Dizzy Dean","Satchel Paige","Whitey Ford","Warren Spahn"],a:1,d:1,cat:"Players",fact:"Paige was the oldest rookie in MLB history, debuting at age 42 in 1948."},

{q:"Who won the 1960 World Series with a walk-off home run in Game 7?",o:["Mickey Mantle","Roberto Clemente","Bill Mazeroski","Roger Maris"],a:2,d:1,cat:"World Series",fact:"Mazeroski's homer off Ralph Terry is the only walk-off HR to end a Game 7."},
{q:"What was the name of the Houston team before they became the Astros?",o:["Houston Stars","Houston Texans","Houston Colts","Houston Colt .45s"],a:3,d:1,cat:"Teams",fact:"They became the Astros in 1965 when they moved into the Astrodome."},
{q:"Who was the American League MVP in 1961 alongside Roger Maris?",o:["Mickey Mantle","Yogi Berra","Whitey Ford","Elston Howard"],a:0,d:1,cat:"Players",fact:"Mantle hit 54 homers in 1961 but Maris won MVP with 61 homers and 142 RBI."},
{q:"What team did Tom Seaver pitch for in the 1969 World Series?",o:["Baltimore Orioles","Cincinnati Reds","New York Mets","Los Angeles Dodgers"],a:2,d:1,cat:"Pitching",fact:"Seaver was known as 'Tom Terrific' and won 3 Cy Young Awards."},
{q:"How many bases are there on a baseball diamond?",o:["3","4","5","6"],a:1,d:1,cat:"Records",fact:"The bases are 90 feet apart in Major League Baseball."},
{q:"Who managed the Cincinnati Reds' Big Red Machine?",o:["Earl Weaver","Billy Martin","Sparky Anderson","Dick Williams"],a:2,d:1,cat:"Teams",fact:"Anderson was the first manager to win a World Series in both leagues."},

{q:"Which team did Hank Aaron play for when he broke the HR record?",o:["Milwaukee Brewers","Atlanta Braves","Cincinnati Reds","New York Mets"],a:1,d:1,cat:"Players",fact:"Aaron finished his career with 755 home runs, a record that stood until 2007."},
{q:"What is a 'triple play' in baseball?",o:["Hitting a triple","Three outs on one play","Three runs scored on one play","Three errors in one inning"],a:1,d:1,cat:"Records",fact:"Unassisted triple plays are among the rarest feats in baseball — only 15 in MLB history."},

{q:"What year did Hank Aaron hit his 715th home run?",o:["1972","1973","1974","1975"],a:2,d:1,cat:"Records",fact:"Aaron received death threats and racist mail during his pursuit of Ruth's record."},
{q:"Which team played in the first indoor baseball game at the Astrodome?",o:["Houston Astros","New York Yankees","Philadelphia Phillies","Los Angeles Dodgers"],a:0,d:1,cat:"Teams",fact:"The Astrodome opened on April 9, 1965, and was called the 'Eighth Wonder of the World.'"},
{q:"Who won the NL MVP award three times during the 1960s-1970s era?",o:["Willie Mays","Hank Aaron","Johnny Bench","Pete Rose"],a:0,d:1,cat:"Players",fact:"Mays won MVPs in 1954 and 1965, with several close runner-up finishes."},
{q:"What color are the bases in baseball?",o:["Red","Blue","White","Brown"],a:2,d:1,cat:"Records",fact:"Home plate is a five-sided slab of whitened rubber, 17 inches wide."},
{q:"Which expansion team began play in 1969 in Canada?",o:["Toronto Blue Jays","Montreal Expos","Vancouver Mounties","Ottawa Senators"],a:1,d:1,cat:"Teams",fact:"The Expos were the first MLB team outside the United States."},
{q:"Who was the NL Rookie of the Year in 1963?",o:["Pete Rose","Joe Morgan","Tommy Harper","Jim Ray Hart"],a:0,d:1,cat:"Players",fact:"Rose was nicknamed 'Charlie Hustle' for his all-out playing style."},
{q:"What is a 'grand slam' in baseball?",o:["Four home runs in one game","A home run with the bases loaded","Winning all four games in a series","Striking out four batters in one inning"],a:1,d:1,cat:"Hitting",fact:"The most grand slams in a career is 23, held by Alex Rodriguez."},
{q:"Which pitcher won 31 games in 1968?",o:["Bob Gibson","Juan Marichal","Denny McLain","Mickey Lolich"],a:2,d:1,cat:"Pitching",fact:"McLain was the last pitcher to win 30+ games, a feat not accomplished since."},
{q:"What team did Carl Yastrzemski play for his entire career?",o:["New York Yankees","Baltimore Orioles","Boston Red Sox","Detroit Tigers"],a:2,d:1,cat:"Players",fact:"Yaz played 23 seasons, all with the Red Sox, from 1961 to 1983."},
{q:"Who was the first Black player in the American League?",o:["Jackie Robinson","Larry Doby","Satchel Paige","Minnie Minoso"],a:1,d:1,cat:"Players",fact:"Doby broke the AL color barrier on July 5, 1947, just 11 weeks after Robinson."},
{q:"Which team won the 1970 World Series?",o:["Cincinnati Reds","Baltimore Orioles","Pittsburgh Pirates","Oakland A's"],a:1,d:1,cat:"World Series",fact:"The Orioles won in 5 games behind Brooks Robinson's legendary defensive plays."},
{q:"What is a 'sacrifice fly'?",o:["A fly ball that scores a runner","A bunt that advances a runner","A fly ball caught for the third out","Missing the ball intentionally"],a:0,d:1,cat:"Hitting",fact:"The sacrifice fly was reintroduced as an official rule in 1954 after being removed in 1940."},
{q:"Who threw a no-hitter in his final career start?",o:["Sandy Koufax","Nolan Ryan","Bob Feller","Jim Palmer"],a:0,d:1,cat:"Pitching",fact:"Actually, Koufax's final regular-season game was a complete game but not a no-hitter. His perfect game was in 1965, and he retired after 1966."},
{q:"What trophy is awarded to the World Series champion?",o:["The Pennant Cup","The Commissioner's Trophy","The World Series Cup","The Championship Belt"],a:1,d:1,cat:"World Series",fact:"The Commissioner's Trophy has been awarded since 1967, and unlike other sports trophies, a new one is made each year."},
// ===== MEDIUM (d:2) — Questions 51-100 =====
{q:"What was Bob Gibson's ERA in 1968?",o:["1.12","1.34","1.56","1.01"],a:0,d:2,cat:"Pitching",fact:"Gibson's 1968 ERA is the lowest in the live-ball era, leading to the mound being lowered in 1969."},

{q:"What year was the Designated Hitter rule introduced in the AL?",o:["1971","1972","1973","1975"],a:2,d:2,cat:"Records",fact:"Ron Blomberg of the Yankees was the first DH, drawing a walk in his first at-bat."},
{q:"Who won the AL Triple Crown in 1966?",o:["Harmon Killebrew","Carl Yastrzemski","Frank Robinson","Mickey Mantle"],a:2,d:2,cat:"Hitting",fact:"Robinson won the Triple Crown in his first year in the AL after being traded from the Reds."},

const DIFF_LABELS=["","Easy","Medium","Hard","Expert","INSANE"];
var gameDifficulty=0; // 0=progressive, 1=easy only, 2=medium only, 3=hard only, 4=expert only, 5=insane (all expert, half time)
const DIFF_CLASSES=["","badge-1","badge-2","badge-3","badge-4"];
const DIFF_POINTS=[0,10,20,30,50,100];
const STORAGE_KEY="donnys-baseball";
const app=document.getElementById("app");

let state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:0,byDiff:[0,0,0,0,0],started:false};

function loadState(){
try{const s=localStorage.getItem(STORAGE_KEY);if(s){const p=JSON.parse(s);return p;}}catch(e){}return null;
}
function saveState(){
try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}

// Sports announcer TTS
var announceOn=true;
function announce(text){
if(!announceOn||!('speechSynthesis' in window))return;
try{speechSynthesis.cancel();setTimeout(function(){
var u=new SpeechSynthesisUtterance(text);u.rate=1.15;u.pitch=0.9;u.volume=0.6;
var voices=speechSynthesis.getVoices();
var male=voices.find(function(v){return v.lang.startsWith('en')&&v.name.toLowerCase().includes('male');});
if(male)u.voice=male;
speechSynthesis.speak(u);},60);}catch(e){}
}
var CORRECT_CALLS=["And that one is OUTTA HERE!","He connects! That's a base hit!","Right down the middle! STRIKE THREE on the batter!","And the crowd goes WILD!","That's a GRAND SLAM answer!","Swinging for the fences and he GOT IT!","What a PLAY! Unbelievable!","He's safe at home! The run SCORES!","A diving catch! SPECTACULAR!","Right on the money! What a throw!"];
var WRONG_CALLS=["Swing and a miss!","Oh! He went down looking! Called strike three!","That one's foul, way outta here!","Caught looking! The umpire rings him up!","Ground ball to short... and he's OUT at first!","Fly ball... caught! That's the third out!","And he pops it up! Easy out!","Picked off at second! He wasn't paying attention!"];
var STREAK_CALLS=["He's on FIRE! That's {n} in a row!","What a hitting streak! {n} consecutive!","Can ANYBODY stop this guy? {n} straight!","This kid is the REAL DEAL! {n} in a row!"];

// Audio
const actx=new (window.AudioContext||window.webkitAudioContext)();
function playCorrect(){
const o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.frequency.setValueAtTime(880,actx.currentTime);
o.frequency.setValueAtTime(1100,actx.currentTime+0.08);
g.gain.setValueAtTime(0.02,actx.currentTime);
g.gain.exponentialDecayToValueAtTime&&g.gain.exponentialDecayToValueAtTime?g.gain.setValueAtTime(0.02,actx.currentTime):0;
g.gain.linearRampToValueAtTime(0,actx.currentTime+0.25);
o.start(actx.currentTime);o.stop(actx.currentTime+0.25);
}
function playWrong(){
const o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.type="sawtooth";
o.frequency.setValueAtTime(200,actx.currentTime);
o.frequency.setValueAtTime(150,actx.currentTime+0.15);
g.gain.setValueAtTime(0.02,actx.currentTime);
g.gain.linearRampToValueAtTime(0,actx.currentTime+0.3);
o.start(actx.currentTime);o.stop(actx.currentTime+0.3);
}
function playStreak(){
const t=actx.currentTime;
[660,880,1100].forEach((f,i)=>{
const o=actx.createOscillator(),g=actx.createGain();
o.connect(g);g.connect(actx.destination);
o.frequency.setValueAtTime(f,t+i*0.1);
g.gain.setValueAtTime(0.02,t+i*0.1);
g.gain.linearRampToValueAtTime(0,t+i*0.1+0.2);
o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
});
}

// Baseball organ theme (Take Me Out to the Ball Game style)
var _ballgameTimer=null;
function playBallgame(){
if(!actx||actx.state==='suspended')actx.resume();
stopBallgame();
var notes=[262,262,330,262,349,330,262,196,262,262,330,262,392,349,330,262];
var durs=[.25,.25,.25,.25,.5,.25,.25,.5,.25,.25,.25,.25,.5,.25,.25,1];
var bpm=140;var beat=60/bpm;var idx=0;
function pn(){
if(idx>=notes.length)idx=0;
try{var o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=notes[idx];
g.gain.setValueAtTime(0.015,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+durs[idx]*beat*0.8);
o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+durs[idx]*beat*0.8);}catch(e){}
_ballgameTimer=setTimeout(pn,durs[idx]*beat*1000);idx++;}
_ballgameTimer=setTimeout(pn,300);
}
function stopBallgame(){if(_ballgameTimer){clearTimeout(_ballgameTimer);_ballgameTimer=null;}}

function getDiffForQ(i){
if(gameDifficulty>=1&&gameDifficulty<=4)return gameDifficulty;
if(gameDifficulty===5)return 4; // insane = all expert difficulty
if(i<50)return 1;if(i<100)return 2;if(i<150)return 3;return 4;
}

function showBanner(text,color){
const b=document.createElement("div");
b.className="difficulty-banner";
b.style.background=color;
b.style.color="#fff";
b.textContent=text;
document.body.appendChild(b);
setTimeout(()=>b.remove(),2600);
}

function renderStart(){
const saved=loadState();
let resumeHTML="";
if(saved&&saved.qi>0&&saved.qi<Q.length&&saved.started){
resumeHTML=`<button class="start-btn resume-btn" id="resume-btn">Resume (Q${saved.qi+1}/${Q.length}, Score: ${saved.score})</button>`;
}
app.innerHTML=`
<div class="start-screen">
<p>200 questions covering 1960-1980 MLB history.</p>
<p>Gets progressively harder!</p>
<div class="notice">Choose your difficulty or let it progress naturally!</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0">
<button class="start-btn" style="padding:10px 16px;font-size:14px;background:var(--surface);min-width:auto" onclick="gameDifficulty=0;document.getElementById('diff-pick').textContent='Progressive'" id="d0">Progressive</button>
<button class="start-btn" style="padding:10px 16px;font-size:14px;background:#166534;min-width:auto" onclick="gameDifficulty=1;document.getElementById('diff-pick').textContent='Easy'">Easy</button>
<button class="start-btn" style="padding:10px 16px;font-size:14px;background:#854d0e;min-width:auto" onclick="gameDifficulty=2;document.getElementById('diff-pick').textContent='Medium'">Medium</button>
<button class="start-btn" style="padding:10px 16px;font-size:14px;background:#9a3412;min-width:auto" onclick="gameDifficulty=3;document.getElementById('diff-pick').textContent='Hard'">Hard</button>
<button class="start-btn" style="padding:10px 16px;font-size:14px;background:#991b1b;min-width:auto" onclick="gameDifficulty=4;document.getElementById('diff-pick').textContent='Expert'">Expert</button>
<button class="start-btn" style="padding:10px 16px;font-size:14px;background:#4a044e;min-width:auto;border:2px solid #a855f7" onclick="gameDifficulty=5;document.getElementById('diff-pick').textContent='INSANE'">INSANE</button>
</div>
<p style="font-size:14px;text-align:center;margin-bottom:8px">Selected: <strong id="diff-pick" style="color:var(--gold)">Progressive</strong></p>
<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0;">
<span class="badge badge-1">Easy +10</span>
<span class="badge badge-2">Medium +20</span>
<span class="badge badge-3">Hard +30</span>
<span class="badge badge-4">Expert +50</span>
</div>
<p style="font-size:13px;color:rgba(232,232,240,0.5)">Streak bonus: +5 after 3 consecutive correct</p>
<button class="start-btn" id="start-btn">Start New Game</button>
${resumeHTML}
</div>`;
document.getElementById("start-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:saved?saved.highScore||0:0,byDiff:[0,0,0,0,0],started:true};
saveState();playBallgame();announce("Play ball! Let's see what you've got!");renderQ();
};
const rb=document.getElementById("resume-btn");
if(rb){rb.onclick=()=>{state=saved;state.answered=false;renderQ();};}
}

function renderQ(){
if(state.qi>=Q.length){renderEnd();return;}
// Check difficulty transitions
if(state.qi===50)showBanner("Difficulty Up: Medium!","#f7c948");
if(state.qi===100)showBanner("Difficulty Up: Hard!","#f59e0b");
if(state.qi===150)showBanner("Difficulty Up: Expert!","#ef4444");

const q=Q[state.qi];
const d=q.d;
app.innerHTML=`
<div class="score-bar">
<span>Score: <strong>${state.score}</strong></span>
<span class="streak-fire">${state.streak>=3?"🔥 ":""}Streak: ${state.streak}</span>
<span>Q ${state.qi+1}/${Q.length}</span>
</div>
<div class="q-header">
<span class="q-number">Question ${state.qi+1}</span>
<span class="badge ${DIFF_CLASSES[d]}">${DIFF_LABELS[d]}</span>
<span class="category">${q.cat}</span>
</div>
<div class="question-text">${q.q}</div>
<div class="options" id="opts">
${q.o.map((o,i)=>`<button class="opt-btn" data-i="${i}">${o}</button>`).join("")}
</div>
<div id="feedback"></div>`;
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{b.onclick=()=>handleAnswer(parseInt(b.dataset.i));});
}

function handleAnswer(idx){
if(state.answered)return;
state.answered=true;
const q=Q[state.qi];
const correct=idx===q.a;
const btns=document.querySelectorAll(".opt-btn");
btns.forEach(b=>{
b.disabled=true;
const i=parseInt(b.dataset.i);
if(i===q.a)b.classList.add("correct");
if(i===idx&&!correct)b.classList.add("wrong");
});

if(correct){
state.correct++;
state.streak++;
if(state.streak>state.bestStreak)state.bestStreak=state.streak;
let pts=DIFF_POINTS[q.d];
if(state.streak>=3)pts+=5;
state.score+=pts;
state.byDiff[q.d]++;
if(actx.state==="suspended")actx.resume();
if(state.streak>=3){playStreak();announce(STREAK_CALLS[Math.floor(Math.random()*STREAK_CALLS.length)].replace('{n}',state.streak));}
else{playCorrect();announce(CORRECT_CALLS[Math.floor(Math.random()*CORRECT_CALLS.length)]);}
}else{
state.wrong++;
state.streak=0;
if(actx.state==="suspended")actx.resume();
playWrong();
announce(WRONG_CALLS[Math.floor(Math.random()*WRONG_CALLS.length)]);
}

const fb=document.getElementById("feedback");
fb.innerHTML=`
<div class="feedback ${correct?"correct-fb":"wrong-fb"}">
<h3>${correct?"Correct!"+(state.streak>=3?" 🔥 Streak x"+state.streak+"!":""):"Wrong!"}</h3>
${!correct?`<p>The answer was: <strong>${q.o[q.a]}</strong></p>`:""}
${state.streak>=3&&correct?`<p style="font-size:13px;color:var(--green)">+5 streak bonus!</p>`:""}
<p class="fact">${q.fact}</p>
</div>
<button class="next-btn" id="next-btn">${state.qi+1>=Q.length?"See Results":"Next Question →"}</button>`;
document.getElementById("next-btn").onclick=()=>{
state.qi++;state.answered=false;saveState();renderQ();
};
saveState();
}

function renderEnd(){
if(state.score>state.highScore)state.highScore=state.score;
saveState();
const pct=Math.round(state.correct/Q.length*100);
const maxScore=50*10+50*20+50*30+50*50;
app.innerHTML=`
<div class="end-screen">
<h2>Game Over!</h2>
<div class="final-score">${state.score}</div>
<p style="color:rgba(232,232,240,0.5)">out of ${maxScore} possible</p>
${state.score>=state.highScore?`<div class="high-label">New High Score!</div>`:`<div class="high-label" style="color:var(--gold)">High Score: ${state.highScore}</div>`}
<div class="stats-grid">
<div class="stat-card"><div class="val">${state.correct}</div><div class="lbl">Correct</div></div>
<div class="stat-card"><div class="val">${state.wrong}</div><div class="lbl">Wrong</div></div>
<div class="stat-card"><div class="val">${pct}%</div><div class="lbl">Accuracy</div></div>
<div class="stat-card"><div class="val">${state.bestStreak}</div><div class="lbl">Best Streak</div></div>
<div class="stat-card"><div class="val">${state.byDiff[1]}/${50}</div><div class="lbl">Easy</div></div>
<div class="stat-card"><div class="val">${state.byDiff[2]}/${50}</div><div class="lbl">Medium</div></div>
<div class="stat-card"><div class="val">${state.byDiff[3]}/${50}</div><div class="lbl">Hard</div></div>
<div class="stat-card"><div class="val">${state.byDiff[4]}/${50}</div><div class="lbl">Expert</div></div>
</div>
<button class="restart-btn" id="restart-btn">Play Again</button>
</div>`;
document.getElementById("restart-btn").onclick=()=>{
state={qi:0,score:0,streak:0,bestStreak:0,correct:0,wrong:0,answered:false,highScore:state.highScore,byDiff:[0,0,0,0,0],started:true};
saveState();renderQ();
};
}

// Init
renderStart();
</script>
</body>
</html>
