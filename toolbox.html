<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Toolbox Talk Roulette</title><style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:16px;max-width:800px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.5em;margin:8px 0 4px}
canvas{display:block;margin:8px auto;touch-action:none}
button{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}button:hover{opacity:.85}
.sm{padding:6px 14px;font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin:10px 0}
.tp{font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)}.tp:last-child{border:0}
h2{font-size:1.05em;color:var(--accent);margin:14px 0 6px}
.timer{font-size:2.5em;font-weight:700;text-align:center;font-variant-numeric:tabular-nums}
.timer.warn{color:#ef4444}
input{padding:6px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;width:100%}
.tag{display:inline-block;padding:3px 8px;background:var(--accent);color:#fff;border-radius:10px;font-size:11px;margin:2px}
.hist-item{padding:6px;border-bottom:1px solid var(--border);font-size:13px;color:var(--dim)}
@media print{body{background:#fff;color:#000}.card{border:1px solid #ccc}canvas,button,.home{display:none!important}}
</style></head><body>
<a class="home" href="index.html">&larr; home</a>
<h1>&#x1f3a1; Toolbox Talk Roulette</h1>
<p style="color:var(--dim);font-size:13px">Spin the wheel, deliver the talk, keep everyone alive</p>
<canvas id="wheel" width="320" height="320"></canvas>
<div style="text-align:center"><button onclick="spin()" id="spinBtn">&#x1f3b0; SPIN THE WHEEL</button></div>
<div id="result" style="display:none">
<div class="card"><h2 id="topicName"></h2>
<div id="points"></div>
<div style="margin-top:10px"><b style="color:var(--green)">Discussion Q:</b> <span id="disc"></span></div>
<div style="margin-top:8px"><b style="color:#ef4444">Incident Scenario:</b> <span id="incident"></span></div></div>
<h2>&#x23f1; Talk Timer (5 min)</h2>
<div class="timer" id="tmr">5:00</div>
<div style="text-align:center;margin:8px 0;display:flex;gap:8px;justify-content:center">
<button class="sm" onclick="startTimer()">Start</button><button class="sm" onclick="stopTimer()">Pause</button><button class="sm" onclick="resetTimer()">Reset</button></div>
<h2>&#x1f4cb; Attendance</h2>
<div style="display:flex;gap:8px;margin:6px 0"><input id="nameIn" placeholder="Add attendee name" onkeydown="if(event.key==='Enter')addName()"><button class="sm" onclick="addName()">Add</button></div>
<div id="names" style="margin:6px 0"></div>
<div style="display:flex;gap:8px;margin:10px 0"><button onclick="completeTalk()">&#x2705; Talk Completed</button><button class="sm" onclick="window.print()">&#x1f5a8; Print</button></div>
<div id="signoff" class="card" style="display:none"></div>
</div>
<h2>&#x1f4da; Talk History</h2>
<div id="hist"></div>
<script>
const T=[
{n:"Fall Protection",p:["100% tie-off above 6 feet","Inspect harness before each use","Know your anchor point capacity","Maintain 3-point contact on ladders","Guardrails first, then nets, then personal fall arrest"],q:"What would you do if you saw a coworker unclipped at height?",i:"A worker stepped backward off a 12ft scaffold while pulling up material. His harness caught him — but the shock absorber deployed fully, and his feet were 6 inches from the ground."},
{n:"Ladder Safety",p:["3-point contact at all times","Extend 3 feet above landing","1:4 ratio for straight ladders","Never stand on top 2 rungs","Inspect before each use — look for cracks and bends"],q:"When was the last time you actually inspected a ladder before climbing it?",i:"A painter leaned a ladder against a rain gutter. The gutter gave way and the ladder slid sideways. He fractured his wrist catching himself on the windowsill."},
{n:"Heat Stress",p:["Drink water every 15-20 minutes","Know signs: dizziness, confusion, hot dry skin","Acclimatize new workers over 7-14 days","Provide shade for break areas","Buddy system — watch each other"],q:"How do you tell the difference between heat exhaustion and heat stroke?",i:"A laborer collapsed during an afternoon concrete pour. His coworkers thought he was just tired. He was in heat stroke — core temp 105F. Early recognition saved his life."},
{n:"Electrical Safety",p:["Assume all wires are live","GFCI on all temporary power","Lock out/Tag out before work","Keep 10 feet from power lines","Inspect cords for damage daily"],q:"What's the minimum distance you should maintain from overhead power lines?",i:"An apprentice drilled into a live conduit hidden in a wall. The bit completed the circuit through his hand. He survived but lost feeling in two fingers permanently."},
{n:"Trenching & Excavation",p:["Slope, shore, or shield trenches over 5 feet","Competent person inspects daily","Keep spoils 2 feet from edge","Have egress every 25 feet","Never enter an unprotected trench — not even for a second"],q:"Why is trench collapse one of the deadliest construction hazards?",i:"A 6-foot trench collapsed on a worker retrieving a dropped tool. Soil weighs roughly 100 lbs per cubic foot. His coworkers dug him out in 4 minutes — any longer would have been fatal."},
{n:"PPE Essentials",p:["Hard hat: inspect for cracks, replace after impact","Safety glasses: wear them even for 'quick' tasks","Gloves: match to the hazard","Hi-vis: required near mobile equipment","Hearing protection: if you have to shout, it's too loud"],q:"What's the most common PPE violation you see on this site?",i:"A worker removed his safety glasses 'for just a second' to wipe sweat. A piece of grinding debris hit his eye immediately. He needed surgery to save his vision."},
{n:"Housekeeping",p:["Clean as you go — don't wait until end of day","Clear walkways of cords, hoses, debris","Stack materials properly","Secure tools and materials from falling","Good housekeeping prevents 25% of all construction accidents"],q:"What's the messiest area on our site right now, and what's the risk?",i:"A carpenter tripped over a pile of cutoffs on the floor, fell into a table saw, and lacerated his forearm. The cutoffs had been building up all morning."},
{n:"Fire Prevention",p:["Know extinguisher locations and types","Hot work permits required for welding/cutting","Keep flammables in approved containers","30-minute fire watch after hot work","Clear area of combustibles before hot work"],q:"Where is the nearest fire extinguisher to your current work area?",i:"A welder's sparks ignited insulation two floors below through an open penetration. The fire spread through the chase before anyone noticed. Entire floor had to be re-done."},
{n:"Silica Dust",p:["Use wet cutting methods when possible","Wear N95 or better respirator","Silicosis is permanent and incurable","Engineering controls first, then PPE","Clean up with HEPA vacuum, never dry sweep"],q:"How long does silica dust stay suspended in the air after cutting?",i:"A mason spent 20 years dry-cutting block with no respirator. He was diagnosed with silicosis at 48. His lung capacity is now 40% of normal."},
{n:"Hand & Power Tools",p:["Inspect before use — remove damaged tools","Use the right tool for the right job","Guards in place and functional","Carry tools in belts, not pockets","Disconnect before changing blades or bits"],q:"What's the most dangerous tool you use regularly, and what makes it dangerous?",i:"A worker used a screwdriver as a chisel. It slipped and punctured his palm between the thumb and index finger, severing a tendon."},
{n:"Back Safety & Lifting",p:["Lift with legs, keep load close to body","Get help or use equipment for loads over 50 lbs","Plan your lift path before picking up","Stretch before repetitive lifting tasks","Twisting while lifting is the #1 cause of back injuries"],q:"Has anyone here had a back injury? What did it teach you?",i:"A plumber twisted to hand a water heater to his partner. He felt a pop in his lower back. Three herniated discs. Six months off work."},
{n:"Struck-By Hazards",p:["Never stand under suspended loads","Wear hard hats in all designated areas","Secure tools on scaffolds — toe boards and nets","Barricade zones below overhead work","High-vis vest near equipment at all times"],q:"What's the most common 'struck-by' near-miss you've seen?",i:"A wrench fell 4 stories from a scaffold and struck a worker's hard hat. The hat cracked in half. His head didn't."},
{n:"Scaffolding Safety",p:["Competent person supervises erection and inspection","Full decking, guardrails, and toe boards","Never ride a scaffold being moved","Inspect after weather events","Capacity posted and respected"],q:"How do you know if a scaffold is overloaded?",i:"An overloaded scaffold buckled at the second lift. Six workers rode it down like a collapsing building. Miraculous that injuries were only broken bones."},
{n:"Confined Spaces",p:["Test atmosphere before entry: O2, LEL, toxics","Attendant stays at opening at all times","Rescue plan before anyone enters","Ventilate continuously","Permit required — no exceptions"],q:"Why should you NEVER try to rescue someone in a confined space without proper equipment?",i:"A worker entered a manhole and collapsed from hydrogen sulfide. His partner jumped in to help and also collapsed. The attendant called rescue instead of entering — that decision saved both lives."},
{n:"Crane Signals",p:["Only one signal person per operation","Standard hand signals known by all","Stop signal can come from anyone","Maintain eye contact with operator","Radio communication as backup"],q:"What does a 'dog everything' signal look like?",i:"Mixed signals between a rigger and crane operator caused a beam to swing into a column, knocking a worker off a platform. Clear communication protocols were implemented the next day."},
{n:"Lockout/Tagout",p:["Zero energy state before maintenance","Each worker applies own lock","Try to start — verify lockout works","Never remove another person's lock","LOTO procedures posted at each machine"],q:"What's the most tempting piece of equipment to skip LOTO on? Why is that dangerous?",i:"An electrician was working in a panel while a coworker re-energized it, not knowing anyone was inside. The breaker lockout hasp was 'in the truck.' Third-degree burns."},
{n:"Hearing Protection",p:["Exposure above 85 dB requires protection","Insert plugs correctly — pull ear up and back","Noise-induced hearing loss is permanent","Know your NRR rating","Remove in safe areas to stay aware of surroundings"],q:"What's the loudest task on our site and are we protecting against it properly?",i:"After 15 years of running a concrete saw with no hearing protection, a finisher can't hear his grandchildren speak. He says it's his biggest regret."},
{n:"Respiratory Protection",p:["Fit test annually — facial hair breaks seal","Match filter to hazard type","Inspect before each use","Clean and store properly","Know when to change cartridges"],q:"How do you know when your respirator cartridge needs to be replaced?",i:"A painter wore the same cartridges for 3 months. He started getting headaches and nausea. Doctor confirmed solvent exposure — the cartridges were fully saturated."},
{n:"Chemical Handling",p:["Read the SDS before using any chemical","Proper PPE for each chemical","Know spill response procedures","Never mix chemicals without authorization","Store incompatible chemicals separately"],q:"Where are the SDS sheets for chemicals on this site?",i:"A worker mixed two cleaning products to make a 'super cleaner.' The resulting chlorine gas sent 4 people to the hospital."},
{n:"First Aid Basics",p:["Know location of first aid kits","Direct pressure stops most bleeding","Don't move spinal injury victims","Call 911 for chest pain, difficulty breathing, severe bleeding","AED location known by all workers"],q:"Could you give basic first aid right now if someone collapsed?",i:"A worker went into cardiac arrest on the 5th floor. The nearest AED was on the ground floor in a locked trailer. They now keep one on every active floor."},
{n:"Mental Health on Site",p:["Construction has one of the highest suicide rates of any industry","It's okay to not be okay — speak up","Watch for changes in coworker behavior","Know the crisis hotline: 988","Substances mask problems, they don't solve them"],q:"What would you do if you noticed a coworker seemed really down or withdrawn?",i:"A foreman noticed his lead carpenter had become withdrawn, irritable, and was making mistakes. He pulled him aside privately. That conversation led to the carpenter getting help for depression. He credits that conversation with saving his life."},
{n:"Fatigue Management",p:["Fatigue causes errors equal to .05 BAC impairment","Limit shifts to 10 hours when possible","Mandatory breaks every 2 hours","Overnight shifts need extra safety measures","Drowsy driving to/from site is a real risk"],q:"How many hours of sleep did you get last night? Is it enough?",i:"An equipment operator fell asleep at the controls of a skid steer at 5:30am on his second double shift. He drove into a trench. Fatigue was the only factor."},
{n:"Emergency Evacuation",p:["Know assembly points and exit routes","Account for all workers after evacuation","Never re-enter until all-clear given","Emergency numbers posted in break area","Practice evacuation — know the plan before you need it"],q:"Where is the nearest emergency exit from where you are right now?",i:"When a fire broke out on the 3rd floor, half the crew didn't know the assembly point. 20 minutes were spent searching for workers who were already safe across the street."},
{n:"Hot Work Permits",p:["Permit required for welding, cutting, brazing, soldering","Fire watch for 30 min after completion","Inspect area 35 feet around for combustibles","Fire extinguisher within 20 feet","Cover or move anything that can burn"],q:"Have you ever seen hot work sparks travel farther than expected?",i:"A welder's sparks traveled through a 2-inch gap in the floor and ignited cardboard stored below. The fire suppression system wasn't active yet. Damage: $400,000."},
{n:"Rigging & Hoisting",p:["Inspect slings and hardware before each lift","Know load weight — never guess","Tag lines on all loads","Rated capacity clearly marked on equipment","Never stand under a suspended load — ever"],q:"How do you determine the weight of something that isn't labeled?",i:"A rigging sling failed because a previous cut in the webbing wasn't reported. The load dropped 30 feet. Nobody was underneath by pure luck."},
{n:"Driving Safety",p:["Seatbelt — every trip, every time","No phones while driving — it can wait","Slow down in work zones","Fatigue kills — pull over if drowsy","Pre-trip inspection on all vehicles"],q:"How many of you check your mirrors and blind spots every time you back up on site?",i:"A pickup truck backing up on site struck a worker who was in the blind spot. The worker was wearing hi-vis. The driver was looking at his phone."},
{n:"Eye Protection",p:["Safety glasses minimum on all construction sites","Goggles for chemical splash risk","Face shield for grinding","Prescription safety glasses available","Flush eyes 15 minutes for chemical exposure"],q:"When was the last time you cleaned your safety glasses?",i:"A small piece of copper flew off a pipe being cut and lodged behind a worker's safety glasses. It scratched his cornea. He was off work for a week."},
{n:"Drug & Alcohol Policy",p:["Zero tolerance on construction sites","Impairment puts everyone at risk, not just you","Know the testing policy — random, post-incident, reasonable suspicion","Prescription drugs can also impair — disclose to supervisor","Help is available and confidential through EAP"],q:"If you suspected a coworker was impaired, what would you do?",i:"An equipment operator was running a loader after taking prescription painkillers. He misjudged a turn and drove into the side of the building. He wasn't injured but was terminated. The repair cost $85,000."},
{n:"New Worker Orientation",p:["Every new worker gets a site-specific orientation","Identify hazards specific to this project","Buddy system for first week","New workers have 3x the injury rate","Encourage questions — there are no dumb ones on safety"],q:"What do you wish someone had told you on your first day?",i:"A first-day apprentice walked through an active pour area because nobody told him the boundaries. He sank to his knees in fresh concrete. Chemical burns required medical treatment."}
];
const cv=document.getElementById('wheel'),cx=cv.getContext('2d'),colors=['#ff6b35','#4ade80','#3b82f6','#a855f7','#f59e0b','#ec4899','#14b8a6','#ef4444'];
let angle=0,spinning=false,selected=null,tmrId=null,tmrSec=300,attendees=[];
let hist=JSON.parse(localStorage.getItem('tbt_hist')||'[]');
function drawWheel(){
  const n=T.length,arc=Math.PI*2/n,r=155,cx0=160,cy0=160;
  cx.clearRect(0,0,320,320);
  for(let i=0;i<n;i++){const a=angle+i*arc;cx.beginPath();cx.moveTo(cx0,cy0);cx.arc(cx0,cy0,r,a,a+arc);cx.fillStyle=colors[i%colors.length];cx.globalAlpha=.7;cx.fill();cx.globalAlpha=1;cx.strokeStyle='#0f0f10';cx.lineWidth=1;cx.stroke();
    cx.save();cx.translate(cx0,cy0);cx.rotate(a+arc/2);cx.fillStyle='#fff';cx.font='bold 7px sans-serif';cx.textAlign='left';cx.fillText(T[i].n.substring(0,18),30,3);cx.restore();}
  cx.beginPath();cx.moveTo(cx0+r+5,cy0);cx.lineTo(cx0+r+18,cy0-8);cx.lineTo(cx0+r+18,cy0+8);cx.fillStyle='#ff6b35';cx.fill();
}
function spin(){
  if(spinning)return;spinning=true;document.getElementById('spinBtn').textContent='Spinning...';
  const dur=3000+Math.random()*2000,start=performance.now(),totalRot=(5+Math.random()*5)*Math.PI*2;
  function anim(t){const p=Math.min(1,(t-start)/dur),ease=1-Math.pow(1-p,3);angle=totalRot*ease;drawWheel();
    if(p<1)requestAnimationFrame(anim);
    else{spinning=false;document.getElementById('spinBtn').textContent='SPIN AGAIN';
      const idx=Math.floor((((-angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2))/(Math.PI*2)*T.length)%T.length;showTopic(T[idx])}}
  requestAnimationFrame(anim);
}
function showTopic(t){
  selected=t;document.getElementById('result').style.display='block';
  document.getElementById('topicName').textContent=t.n;
  document.getElementById('points').innerHTML=t.p.map((p,i)=>`<div class="tp"><b>${i+1}.</b> ${p}</div>`).join('');
  document.getElementById('disc').textContent=t.q;document.getElementById('incident').textContent=t.i;
  resetTimer();attendees=[];renderNames();document.getElementById('signoff').style.display='none';
}
function pad(n){return String(n).padStart(2,'0')}
function updateTmr(){const m=Math.floor(tmrSec/60),s=tmrSec%60;const el=document.getElementById('tmr');el.textContent=`${m}:${pad(s)}`;el.className=tmrSec<60?'timer warn':'timer'}
function startTimer(){if(tmrId)return;tmrId=setInterval(()=>{if(tmrSec>0){tmrSec--;updateTmr()}else{clearInterval(tmrId);tmrId=null}},1000)}
function stopTimer(){clearInterval(tmrId);tmrId=null}
function resetTimer(){stopTimer();tmrSec=300;updateTmr()}
function addName(){const inp=document.getElementById('nameIn'),v=inp.value.trim();if(!v)return;attendees.push(v);inp.value='';renderNames()}
function renderNames(){document.getElementById('names').innerHTML=attendees.map(n=>`<span class="tag">${n}</span>`).join(' ')}
function completeTalk(){if(!selected)return;const d=new Date().toLocaleDateString();const rec={topic:selected.n,date:d,attendees:[...attendees]};hist.unshift(rec);if(hist.length>50)hist.pop();localStorage.setItem('tbt_hist',JSON.stringify(hist));
  document.getElementById('signoff').style.display='block';document.getElementById('signoff').innerHTML=`<b style="color:var(--green)">Talk Completed</b><br>Topic: ${selected.n}<br>Date: ${d}<br>Attendees: ${attendees.join(', ')||'None recorded'}`;renderHist()}
function renderHist(){document.getElementById('hist').innerHTML=hist.length?hist.slice(0,10).map(h=>`<div class="hist-item">${h.date} — <b>${h.topic}</b> (${h.attendees.length} attendees)</div>`).join(''):'<div style="color:var(--dim);font-size:13px">No talks recorded yet</div>'}
drawWheel();renderHist();
</script></body></html>
