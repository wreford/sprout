<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Flappy Flip Flop 🩴</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#87CEEB;overflow:hidden;touch-action:manipulation;user-select:none}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Sound
var audioCtx = null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.05,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndFlap(){tone(520,0.05,"sine",0.03);}
function sndSmack(){tone(300,0.06,"sine",0.04);setTimeout(function(){tone(400,0.06,"sine",0.03);},50);}
function sndDie(){tone(250,0.15,"sine",0.04);setTimeout(function(){tone(180,0.15,"sine",0.03);},120);}
function sndScore(){tone(660,0.06,"sine",0.04);setTimeout(function(){tone(880,0.06,"sine",0.03);},50);}

// ── Mom Narrator (angry mom with a flip flop)
var momEnabled = true;
var momLastSpoke = 0;
var momVoice = null;
var momVoicesLoaded = false;

function loadMomVoice() {
  if (momVoicesLoaded) return;
  var voices = speechSynthesis.getVoices();
  if (!voices || voices.length === 0) return;
  momVoicesLoaded = true;
  // Try to find a female English voice
  momVoice = voices.find(function(v){return v.name.indexOf('Samantha')>-1;})
    || voices.find(function(v){return v.name.indexOf('Google UK English Female')>-1;})
    || voices.find(function(v){return v.name.indexOf('Karen')>-1;})
    || voices.find(function(v){return v.name.indexOf('Fiona')>-1;})
    || voices.find(function(v){return v.lang.indexOf('en')===0&&(v.name.indexOf('Female')>-1||v.name.indexOf('female')>-1);})
    || voices.find(function(v){return v.lang.indexOf('en')===0;})
    || null;
}

// Load voices — browsers fire this async
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = loadMomVoice;
  loadMomVoice();
}

function momSpeak(text, priority) {
  if (!momEnabled || !window.speechSynthesis) return;
  if (!momVoicesLoaded) loadMomVoice();
  var now = Date.now();
  if (!priority && now - momLastSpoke < 4000) return;
  momLastSpoke = now;
  if (priority) speechSynthesis.cancel();
  var utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.1;
  utter.pitch = 1.3;
  if (momVoice) utter.voice = momVoice;
  speechSynthesis.speak(utter);
}

var MOM_FLAP = [
  "Don't you DARE hit those pipes!",
  "I swear if you die again...",
  "Flap HARDER! What is wrong with you!",
  "My mother never had this problem. She used a WOODEN spoon.",
  "You call that flying? That's not flying. That's falling with style. Bad style.",
  "I didn't raise you to hit pipes!",
  "Where is my candle? I can't play without my candle.",
  "No water in bed! How many times!",
  "Your father is a condescending A-hole and so are these pipes.",
  "If I have to tell you one more time to FLAP...",
  "This is exactly like getting the kids ready for school. Chaos.",
  "I need wine after this.",
  "You're grounded if you hit that pipe.",
  "La chancla NEVER misses. Remember that.",
  "My flip flop, my rules.",
];

var MOM_SMACK = [
  "TAKE THAT! La chancla strikes again!",
  "That's what you GET!",
  "RIGHT in the face! Beautiful!",
  "Smacked! Just like when your brother ate my leftovers!",
  "Nobody escapes the flip flop. NOBODY.",
  "Consider yourself DISCIPLINED!",
  "My mother would be so proud right now.",
  "That's for leaving your towel on the floor!",
  "And THAT'S for not doing the dishes!",
  "Chancla justice has been SERVED!",
  "I've been waiting ALL DAY for that!",
  "Who's next?! WHO'S NEXT?!",
];

var MOM_DIE = [
  "Are you KIDDING me right now?!",
  "I TOLD you to watch out! Do you EVER listen?!",
  "Unbelievable. Un. Believable.",
  "This is just like when your father tries to park.",
  "I'm not mad. I'm disappointed. No wait, I'm mad.",
  "We're going AGAIN. And you're going to DO BETTER.",
  "Your father would have died on wave one. At least you made it here.",
  "I need to sit down. My blood pressure.",
  "Where's my phone? I need to complain to someone about this.",
  "This wouldn't happen if you ate breakfast.",
];

var MOM_IDLE = [
  "Are we playing or are we just staring at the screen?",
  "Hello?? The pipes aren't going to dodge themselves!",
  "I don't have all day. I have laundry.",
  "Where is my candle? I left it right here.",
  "No water in bed. No snacks on the couch. No dying in my game.",
  "Your dad would just sit here too. Apple doesn't fall far.",
  "I could be watching my show right now.",
  "If you're not going to play, I'm giving your turn to your sister.",
];

var MOM_STREAK = [
  "YES! THAT'S my baby! THAT'S what I'm talking about!",
  "FIVE slaps! I haven't been this proud since your school play!",
  "TEN?! Oh my GOD call grandma!",
  "You get this from MY side of the family!",
  "The chancla is UNSTOPPABLE today!",
];

var MOM_START = [
  "Alright. Let's DO this. Mama's got her flip flop and she's READY.",
  "Nobody asked if I wanted to be a flying sandal. But here we are.",
  "Let's smack some faces. For THERAPY.",
  "Okay. Deep breath. Candle lit. Wine poured. Let's go.",
];

var MOM_LOWSPITE = [
  "You're running out of spite! Smack someone! QUICKLY!",
  "The spite meter is LOW! Just like my patience!",
  "You need more spite! Think about how your husband loads the dishwasher!",
  "SMACK A FACE! Your spite is almost gone and so is my SANITY!",
];

var momSmackCount = 0;
var momIdleTimer = 0;
var momLastSpite = 100;

function pickMom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// speechSynthesis voice loading
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = function(){};

// ── Game state
var STATE = "menu"; // menu, playing, dying, dead
var flipflop = {x:0, y:0, vy:0, rotation:0, spite:100, spinSpeed:0};
var faces = [];
var particles = [];
var score = 0;
var highScore = parseInt(localStorage.getItem("flappy-high")) || 0;
var frame = 0;
var gravity = 0.4;
var flapPower = -7;
var spiteDrain = 0.12; // per frame
var spiteGain = 35; // per smack
var baseScrollSpeed = 3;
var scrollSpeed = 3;
var faceSpawnTimer = 0;
var faceSpawnInterval = 90; // frames

// Death animation state
var deathTimer = 0;
var deathFlashAlpha = 0;
var DEATH_TUMBLE_DURATION = 60; // frames of tumbling before game over

// Parallax layer offsets
var parallaxOffset1 = 0; // far mountains
var parallaxOffset2 = 0; // mid buildings
var groundOffset = 0;    // ground dashes

// Faces to smack
var FACE_EMOJIS = ["😏","🤨","😤","🙄","😒","🤪","😬","🥴","😮‍💨","🫠","😑","🤡","👁️","😐","🫤","😶","🧒","👦","👧","👶","🧒","🤓","😜","😝","🤭","🫢","🪱"];
var SMACK_MSGS = ["SMACK!","THWACK!","POW!","SLAP!","WHACK!","FLOP'D!","EAT RUBBER!","FLIP FLOP'D!","TAKE THAT!","CHANCLA'D!","LA CHANCLA!","MOM MODE!","SANDAL JUSTICE!","THONG SLAP!","DESERVED IT!"];

function pick(a){return a[Math.floor(Math.random()*a.length)];}

function spawnFace() {
  var gap = 120 + Math.random() * 80;
  var centerY = H * 0.2 + Math.random() * H * 0.6;
  // Top face and bottom face with gap
  faces.push({
    x: W + 40,
    y: centerY - gap/2 - 30,
    emoji: "",
    scored: false,
    hit: false,
    size: 40,
    type: "top"
  });
  faces.push({
    x: W + 40,
    y: centerY + gap/2 + 10,
    emoji: "",
    scored: false,
    hit: false,
    size: 40,
    type: "bottom"
  });
  // Bonus face in the gap (smackable for spite)
  if (Math.random() < 0.6) {
    faces.push({
      x: W + 60,
      y: centerY + (Math.random() - 0.5) * gap * 0.5,
      emoji: pick(FACE_EMOJIS),
      scored: false,
      hit: false,
      size: 30,
      type: "bonus",
      bobOffset: Math.random() * Math.PI * 2
    });
  }
}

function spawnParticles(x, y, text) {
  for (var i = 0; i < 6; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6 - 2,
      life: 1,
      text: i === 0 ? text : "💥",
      size: i === 0 ? 14 : 8 + Math.random()*8
    });
  }
}

function reset() {
  flipflop = {x: W * 0.25, y: H * 0.5, vy: 0, rotation: 0, spite: 100, spinSpeed: 0};
  faces = [];
  particles = [];
  score = 0;
  frame = 0;
  momSmackCount = 0;
  momIdleTimer = 0;
  momLastSpite = 100;
  momSpeak(pickMom(MOM_START), true);
  // Give a long safe runway before first obstacle
  faceSpawnTimer = -90;
  baseScrollSpeed = 3;
  scrollSpeed = 3;
  spiteDrain = 0.12;
  deathTimer = 0;
  deathFlashAlpha = 0;
}

function triggerDeath() {
  STATE = "dying";
  momSpeak(pickMom(MOM_DIE), true);
  deathTimer = 0;
  deathFlashAlpha = 0.6;
  flipflop.spinSpeed = 0.25 + Math.random() * 0.15;
  flipflop.vy = -5; // pop up before tumbling down
  if (score > highScore) { highScore = score; localStorage.setItem("flappy-high", highScore); }
  sndDie();
  spawnParticles(flipflop.x, flipflop.y, "💀");
}

// Simple: death just goes to menu. Menu tap starts fresh.

var deadSince = 0;

function flap() {
  if (STATE === "menu") {
    STATE = "playing";
    reset();
    deathFlashAlpha = 0;
    return;
  }
  if (STATE === "playing") {
    flipflop.vy = flapPower;
    flipflop.rotation = -0.4;
    return;
  }
  // Dead: require 1.5 seconds before accepting restart tap
  if (STATE === "dead") {
    if (Date.now() - deadSince < 1500) return;
    if (speechSynthesis.speaking) speechSynthesis.cancel();
    STATE = "playing";
    reset();
    deathFlashAlpha = 0;
  }
}

// Input
var isTouchDevice = false;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  isTouchDevice = true;
  flap();
}, {passive:false});
canvas.addEventListener('mousedown', function() {
  if (!isTouchDevice) flap();
});
window.addEventListener('keydown', function(e) {
  if (e.code==="Space"||e.code==="ArrowUp") {
    e.preventDefault();
    flap();
  }
});

function update() {
  // (input lock handled by setTimeout)
  // Update parallax even in menu for ambiance
  if (STATE === "menu") {
    parallaxOffset1 = (parallaxOffset1 + 0.3) % W;
    parallaxOffset2 = (parallaxOffset2 + 0.6) % W;
    groundOffset = (groundOffset + 1.5) % 40;
    return;
  }

  // Dying animation: tumble/spin before showing game over
  if (STATE === "dying") {
    deathTimer++;
    deathFlashAlpha = Math.max(0, deathFlashAlpha - 0.015);
    flipflop.vy += gravity * 0.8;
    flipflop.y += flipflop.vy;
    flipflop.rotation += flipflop.spinSpeed;
    // Keep on screen during tumble
    if (flipflop.y > H - 40) {
      flipflop.y = H - 40;
      flipflop.vy = -Math.abs(flipflop.vy) * 0.3;
      flipflop.spinSpeed *= 0.7;
    }
    // Update particles during death
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.1; pt.life -= 0.025;
      if (pt.life <= 0) particles.splice(p, 1);
    }
    if (deathTimer >= DEATH_TUMBLE_DURATION) {
      STATE = "dead";
      deadSince = Date.now();
    }
    return;
  }

  // STATE === "playing"
  frame++;

  // Mom idle commentary
  momIdleTimer++;
  if (momIdleTimer > 600 && momIdleTimer % 600 === 0) momSpeak(pickMom(MOM_IDLE));
  // Mom low-spite warning
  if (flipflop.spite < 30 && momLastSpite >= 30) momSpeak(pickMom(MOM_LOWSPITE));
  if (flipflop.spite < 15 && momLastSpite >= 15) momSpeak("SMACK SOMEONE RIGHT NOW OR WE'RE DONE!");
  momLastSpite = flipflop.spite;
  // Random mom commentary during play
  if (frame % 900 === 0 && frame > 300) momSpeak(pickMom(MOM_FLAP));

  // Speed increase over time
  if (frame % 300 === 0) {
    baseScrollSpeed = Math.min(7, baseScrollSpeed + 0.25);
    spiteDrain = Math.min(0.25, spiteDrain + 0.01);
  }
  scrollSpeed = baseScrollSpeed;

  // Update parallax offsets
  parallaxOffset1 = (parallaxOffset1 + scrollSpeed * 0.2) % W;
  parallaxOffset2 = (parallaxOffset2 + scrollSpeed * 0.4) % W;
  groundOffset = (groundOffset + scrollSpeed) % 40;

  // Flip flop physics
  flipflop.vy += gravity;
  flipflop.y += flipflop.vy;
  flipflop.rotation = Math.min(1.2, flipflop.rotation + 0.04);
  flipflop.spite -= spiteDrain;

  // Die conditions
  if (flipflop.y > H - 20 || flipflop.y < -20 || flipflop.spite <= 0) {
    triggerDeath();
    return;
  }

  // Spawn faces
  faceSpawnTimer++;
  if (faceSpawnTimer >= faceSpawnInterval) {
    faceSpawnTimer = 0;
    faceSpawnInterval = Math.max(50, 90 - Math.floor(frame / 500) * 5);
    spawnFace();
  }

  // Update faces
  for (var i = faces.length - 1; i >= 0; i--) {
    var f = faces[i];
    f.x -= scrollSpeed;

    // Bob bonus faces
    if (f.type === "bonus") {
      f.y += Math.sin(frame * 0.05 + f.bobOffset) * 0.5;
    }

    // Collision
    var ps = 14; // flip flop half-size
    var px = flipflop.x;
    var py = flipflop.y;

    if (f.type === "bonus") {
      // Circle collision for bonus faces
      var bdx = px - f.x;
      var bdy = py - f.y;
      if (!f.hit && Math.sqrt(bdx*bdx + bdy*bdy) < 28) {
        f.hit = true;
        flipflop.spite = Math.min(100, flipflop.spite + spiteGain);
        score++;
        sndSmack();
        momSmackCount++;
        // Tyler crossover!
        if (f.emoji === "🪱") {
          var TYLER_LINES = [
            "Hi Tyler! Sorry about this! La chancla has no friends!",
            "Tyler?! What are you doing outside the body?!",
            "Oh no, Tyler from Tapeworm! Small world! Well, small intestine!",
            "TYLER! I slapped Tyler! He's from the other game! I feel bad! ...No I don't!",
            "Tyler the Tapeworm?! This is a CROSSOVER EVENT, people!",
          ];
          momSpeak(pickMom(TYLER_LINES), true);
        }
        else if (momSmackCount === 5) momSpeak(MOM_STREAK[0]);
        else if (momSmackCount === 10) momSpeak(MOM_STREAK[2]);
        else if (momSmackCount % 3 === 0) momSpeak(pickMom(MOM_SMACK));
        momIdleTimer = 0;
        spawnParticles(f.x, f.y, pick(SMACK_MSGS));
        faces.splice(i, 1);
        continue;
      }
    } else {
      // Rectangle collision for pipes (full pipe body + cap)
      var pipeW = 44;
      var capW = 54;
      var capH = 16;
      if (f.type === "top") {
        var pipeBottom = f.y - 10;
        // Check pipe body: from top of screen to pipeBottom
        if (px + ps > f.x - pipeW/2 && px - ps < f.x + pipeW/2 && py - ps < pipeBottom) {
          triggerDeath(); return;
        }
        // Check cap
        if (px + ps > f.x - capW/2 && px - ps < f.x + capW/2 && py - ps < pipeBottom && py + ps > pipeBottom - capH) {
          triggerDeath(); return;
        }
      } else {
        var pipeTop = f.y + 25;
        // Check pipe body: from pipeTop+capH to bottom of screen
        if (px + ps > f.x - pipeW/2 && px - ps < f.x + pipeW/2 && py + ps > pipeTop + capH) {
          triggerDeath(); return;
        }
        // Check cap
        if (px + ps > f.x - capW/2 && px - ps < f.x + capW/2 && py + ps > pipeTop && py - ps < pipeTop + capH) {
          triggerDeath(); return;
        }
      }
    }

    // Score when passing pipe faces
    if (f.type === "top" && !f.scored && f.x + 20 < flipflop.x) {
      f.scored = true;
    }

    // Remove off-screen
    if (f.x < -60) faces.splice(i, 1);
  }

  // Update particles
  for (var p = particles.length - 1; p >= 0; p--) {
    var pt = particles[p];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.1; pt.life -= 0.025;
    if (pt.life <= 0) particles.splice(p, 1);
  }
}

// ── Drawing helpers

function drawParallaxBackground() {
  // Layer 1: Distant mountains (far, slow)
  var mountainColor1 = "#5B8C5A";
  var mountainColor2 = "#3D6B4F";
  ctx.fillStyle = mountainColor1;
  var baseY1 = H * 0.65;
  ctx.beginPath();
  ctx.moveTo(-parallaxOffset1 - W, H);
  for (var mx = -parallaxOffset1 - W; mx < W + 200; mx += 180) {
    var peakH = 40 + Math.abs(Math.sin(mx * 0.005 + 1.2)) * 80;
    ctx.lineTo(mx, baseY1 - peakH);
    ctx.lineTo(mx + 90, baseY1 - peakH * 0.3);
  }
  ctx.lineTo(W + 200, H);
  ctx.closePath();
  ctx.fill();

  // Layer 2: Mid-ground buildings/structures (medium speed)
  var baseY2 = H * 0.75;
  for (var bx = -parallaxOffset2 - W; bx < W + 120; bx += 100) {
    var bw = 30 + Math.abs(Math.sin(bx * 0.01 + 3.7)) * 30;
    var bh = 20 + Math.abs(Math.sin(bx * 0.013 + 0.5)) * 60;
    ctx.fillStyle = mountainColor2;
    ctx.fillRect(bx, baseY2 - bh, bw, bh + (H - baseY2));
    // Window dots
    ctx.fillStyle = "#2d8a4e";
    for (var wy = baseY2 - bh + 8; wy < baseY2; wy += 12) {
      for (var wx = bx + 6; wx < bx + bw - 4; wx += 10) {
        if (Math.sin(wx * 0.7 + wy * 0.3) > 0.2) {
          ctx.fillRect(wx, wy, 4, 4);
        }
      }
    }
  }
}

function drawScrollingGround() {
  var groundY = H - 14;
  // Ground fill
  ctx.fillStyle = "#1B5E20";
  ctx.fillRect(0, groundY, W, 14);

  // Top border line
  ctx.strokeStyle = "#2E7D32";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // Scrolling dashes on the ground
  ctx.strokeStyle = "#2d8a4e";
  ctx.lineWidth = 1;
  for (var gx = -groundOffset; gx < W + 40; gx += 40) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY + 5);
    ctx.lineTo(gx + 18, groundY + 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx + 10, groundY + 10);
    ctx.lineTo(gx + 28, groundY + 10);
    ctx.stroke();
  }
}

function drawPipe(f) {
  var pipeW = 44;
  var capW = 54;
  var capH = 16;

  if (f.type === "top") {
    var pipeBottom = f.y - 10;
    // Pipe body — flat green
    ctx.fillStyle = "#2E7D32";
    ctx.fillRect(f.x - pipeW/2, 0, pipeW, pipeBottom);
    // Pipe cap
    ctx.fillStyle = "#388E3C";
    ctx.fillRect(f.x - capW/2, pipeBottom - capH, capW, capH);
    // Highlight stripe
    ctx.fillStyle = "#43A047";
    ctx.fillRect(f.x - pipeW/2 + 4, 0, 6, pipeBottom);
    // Border
    ctx.strokeStyle = "#1B5E20";
    ctx.lineWidth = 2;
    ctx.strokeRect(f.x - pipeW/2, 0, pipeW, pipeBottom);
    ctx.strokeRect(f.x - capW/2, pipeBottom - capH, capW, capH);

  } else {
    var pipeTop = f.y + 25;
    // Pipe body — flat green
    ctx.fillStyle = "#2E7D32";
    ctx.fillRect(f.x - pipeW/2, pipeTop + capH, pipeW, H - pipeTop - capH);
    // Pipe cap
    ctx.fillStyle = "#388E3C";
    ctx.fillRect(f.x - capW/2, pipeTop, capW, capH);
    // Highlight stripe
    ctx.fillStyle = "#43A047";
    ctx.fillRect(f.x - pipeW/2 + 4, pipeTop + capH, 6, H - pipeTop - capH);
    // Border
    ctx.strokeStyle = "#1B5E20";
    ctx.lineWidth = 2;
    ctx.strokeRect(f.x - pipeW/2, pipeTop + capH, pipeW, H - pipeTop - capH);
    ctx.strokeRect(f.x - capW/2, pipeTop, capW, capH);
  }
}

function draw() {
  // Reset all state that might leak
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.shadowColor = "transparent";
  ctx.setLineDash([]);

  // Flat sky background
  ctx.fillStyle = "#81D4FA";
  ctx.fillRect(0, 0, W, H);

  // Simple ground
  ctx.fillStyle = "#4CAF50";
  ctx.fillRect(0, H - 30, W, 30);
  ctx.fillStyle = "#388E3C";
  ctx.fillRect(0, H - 30, W, 3);

  if (STATE === "menu") {
    // Title
    ctx.textAlign = "center";
    ctx.font = "bold 42px monospace";
    ctx.fillStyle = "#f59e0b";
    ctx.fillText("FLAPPY FLIP FLOP", W/2, H*0.3);
    ctx.font = "60px serif";
    ctx.fillText("🩴", W/2, H*0.45);
    ctx.font = "14px monospace";
    ctx.fillStyle = "#333";
    ctx.fillText("Tap / Space to flap", W/2, H*0.58);
    ctx.fillText("Smack kids' faces to refuel spite", W/2, H*0.63);
    ctx.fillText("La Chancla never misses 🩴💨", W/2, H*0.68);
    if (highScore > 0) {
      ctx.fillStyle = "#f59e0b";
      ctx.fillText("Best: " + highScore, W/2, H*0.76);
    }
    ctx.font = "11px monospace";
    ctx.fillStyle = "#444";
    ctx.fillText("🎙️ Mom narrates your game", W/2, H*0.84);
    ctx.fillText("taskiap.com", W/2, H*0.92);
    return;
  }

  // Draw faces (pipes + bonus)
  for (var i = 0; i < faces.length; i++) {
    var f = faces[i];

    if (f.type === "bonus") {
      // Bonus face with simple ring
      ctx.beginPath();
      ctx.arc(f.x, f.y, 26, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(245, 158, 11, 0.4)";
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = f.size + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(f.emoji, f.x, f.y);
    } else {
      drawPipe(f);
    }
  }

  // Draw flip flop (visible in playing and dying states)
  ctx.save();
  ctx.translate(flipflop.x, flipflop.y);
  ctx.rotate(flipflop.rotation);
  ctx.font = "32px serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🩴", 0, 0);
  ctx.restore();

  // Particles
  for (var p = 0; p < particles.length; p++) {
    var pt = particles[p];
    ctx.globalAlpha = pt.life;
    ctx.font = pt.size + "px monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = "#f59e0b";
    ctx.fillText(pt.text, pt.x, pt.y);
    ctx.globalAlpha = 1;
  }

  // Death red flash overlay
  if (deathFlashAlpha > 0) {
    ctx.fillStyle = "rgba(200, 20, 20, " + deathFlashAlpha + ")";
    ctx.fillRect(0, 0, W, H);
  }

  // HUD: Spite meter (only during playing or dying)
  if (STATE === "playing" || STATE === "dying") {
    var meterW = 120;
    var meterH = 12;
    var meterX = W/2 - meterW/2;
    var meterY = 16;
    ctx.fillStyle = "#1B5E20";
    ctx.fillRect(meterX - 1, meterY - 1, meterW + 2, meterH + 2);
    var spiteColor = flipflop.spite > 50 ? "#f59e0b" : flipflop.spite > 25 ? "#ef4444" : "#7f1d1d";
    ctx.fillStyle = spiteColor;
    ctx.fillRect(meterX, meterY, meterW * (Math.max(0, flipflop.spite) / 100), meterH);
    ctx.strokeStyle = "#2E7D32";
    ctx.lineWidth = 1;
    ctx.strokeRect(meterX - 1, meterY - 1, meterW + 2, meterH + 2);
    ctx.font = "bold 9px monospace";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.fillText("SPITE: " + Math.max(0, Math.ceil(flipflop.spite)) + "%", W/2, meterY + meterH - 2);

    // Score (center)
    ctx.font = "bold 24px monospace";
    ctx.fillStyle = "#f59e0b";
    ctx.textAlign = "center";
    ctx.fillText(score, W/2, meterY + meterH + 28);

    // Best score (top right)
    ctx.font = "bold 11px monospace";
    ctx.fillStyle = "#666";
    ctx.textAlign = "right";
    ctx.fillText("BEST: " + highScore, W - 14, 26);

    // Speed indicator (top left)
    ctx.font = "9px monospace";
    ctx.fillStyle = "#444";
    ctx.textAlign = "left";
    ctx.fillText("SPD " + baseScrollSpeed.toFixed(1) + "x", 14, 26);
  }

  // Dead screen (after tumble animation)
  if (STATE === "dead") {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, W, H);
    ctx.font = "bold 32px monospace";
    ctx.fillStyle = "#ef4444";
    ctx.textAlign = "center";
    ctx.fillText("OUT OF SPITE", W/2, H*0.35);
    ctx.font = "40px serif";
    ctx.fillText("🩴💀", W/2, H*0.45);
    ctx.font = "bold 20px monospace";
    ctx.fillStyle = "#f59e0b";
    ctx.fillText("Score: " + score, W/2, H*0.58);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = "#22c55e";
      ctx.font = "14px monospace";
      ctx.fillText("NEW HIGH SCORE!", W/2, H*0.64);
    } else {
      ctx.font = "14px monospace";
      ctx.fillStyle = "#888";
      ctx.fillText("Best: " + highScore, W/2, H*0.64);
    }
    ctx.font = "bold 14px monospace";
    ctx.fillStyle = "#22c55e";
    ctx.fillText("Tap to play again", W/2, H*0.74);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
