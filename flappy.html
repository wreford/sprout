<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Flappy Flip Flop 🩴</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#87CEEB;overflow:hidden;touch-action:manipulation;user-select:none}
    canvas{display:block;width:100%;height:100%}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Sound
var audioCtx = null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,d,t,v){try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.value=f;g.gain.setValueAtTime(v||0.05,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sndFlap(){tone(400,0.06,"triangle",0.04);}
function sndSmack(){tone(100,0.12,"square",0.08);setTimeout(function(){tone(80,0.08,"sawtooth",0.06);},50);}
function sndDie(){[300,200,120].forEach(function(f,i){setTimeout(function(){tone(f,0.2,"sawtooth",0.05);},i*100);});}
function sndScore(){tone(600,0.08,"sine",0.05);setTimeout(function(){tone(800,0.08,"sine",0.05);},60);}

// ── Game state
var STATE = "menu"; // menu, playing, dying, dead
var flipflop = {x:0, y:0, vy:0, rotation:0, spite:100, spinSpeed:0};
var faces = [];
var particles = [];
var score = 0;
var highScore = parseInt(localStorage.getItem("flappy-high")) || 0;
var frame = 0;
var gravity = 0.4;
var flapPower = -7;
var spiteDrain = 0.12; // per frame
var spiteGain = 35; // per smack
var baseScrollSpeed = 3;
var scrollSpeed = 3;
var faceSpawnTimer = 0;
var faceSpawnInterval = 90; // frames

// Death animation state
var deathTimer = 0;
var deathFlashAlpha = 0;
var DEATH_TUMBLE_DURATION = 60; // frames of tumbling before game over

// Parallax layer offsets
var parallaxOffset1 = 0; // far mountains
var parallaxOffset2 = 0; // mid buildings
var groundOffset = 0;    // ground dashes

// Faces to smack
var FACE_EMOJIS = ["😏","🤨","😤","🙄","😒","🤪","😬","🥴","😮‍💨","🫠","😑","🤡","👁️","😐","🫤","😶","🧒","👦","👧","👶","🧒","🤓","😜","😝","🤭","🫢"];
var SMACK_MSGS = ["SMACK!","THWACK!","POW!","SLAP!","WHACK!","FLOP'D!","EAT RUBBER!","FLIP FLOP'D!","TAKE THAT!","CHANCLA'D!","LA CHANCLA!","MOM MODE!","SANDAL JUSTICE!","THONG SLAP!","DESERVED IT!"];

function pick(a){return a[Math.floor(Math.random()*a.length)];}

function spawnFace() {
  var gap = 120 + Math.random() * 80;
  var centerY = H * 0.2 + Math.random() * H * 0.6;
  // Top face and bottom face with gap
  faces.push({
    x: W + 40,
    y: centerY - gap/2 - 30,
    emoji: "",
    scored: false,
    hit: false,
    size: 40,
    type: "top"
  });
  faces.push({
    x: W + 40,
    y: centerY + gap/2 + 10,
    emoji: "",
    scored: false,
    hit: false,
    size: 40,
    type: "bottom"
  });
  // Bonus face in the gap (smackable for spite)
  if (Math.random() < 0.6) {
    faces.push({
      x: W + 60,
      y: centerY + (Math.random() - 0.5) * gap * 0.5,
      emoji: pick(FACE_EMOJIS),
      scored: false,
      hit: false,
      size: 30,
      type: "bonus",
      bobOffset: Math.random() * Math.PI * 2
    });
  }
}

function spawnParticles(x, y, text) {
  for (var i = 0; i < 6; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random()-0.5)*6,
      vy: (Math.random()-0.5)*6 - 2,
      life: 1,
      text: i === 0 ? text : "💥",
      size: i === 0 ? 14 : 8 + Math.random()*8
    });
  }
}

function reset() {
  flipflop = {x: W * 0.25, y: H * 0.5, vy: 0, rotation: 0, spite: 100, spinSpeed: 0};
  faces = [];
  particles = [];
  score = 0;
  frame = 0;
  faceSpawnTimer = 0;
  baseScrollSpeed = 3;
  scrollSpeed = 3;
  spiteDrain = 0.12;
  deathTimer = 0;
  deathFlashAlpha = 0;
}

function triggerDeath() {
  STATE = "dying";
  deathTimer = 0;
  deathFlashAlpha = 0.6;
  flipflop.spinSpeed = 0.25 + Math.random() * 0.15;
  flipflop.vy = -5; // pop up before tumbling down
  if (score > highScore) { highScore = score; localStorage.setItem("flappy-high", highScore); }
  sndDie();
  spawnParticles(flipflop.x, flipflop.y, "💀");
}

var deadCooldown = 0;
function flap() {
  if (STATE === "menu") {
    STATE = "playing";
    reset();
    deathFlashAlpha = 0;
    sndFlap();
    return;
  }
  if (STATE === "dead") {
    if (deadCooldown > 0) return;
    STATE = "menu";
    deathFlashAlpha = 0;
    return;
  }
  if (STATE === "dying") return;
  flipflop.vy = flapPower;
  flipflop.rotation = -0.4;
  sndFlap();
}

// Input
canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', function(e){e.preventDefault();flap();},{passive:false});
window.addEventListener('keydown', function(e){if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();flap();}});

function update() {
  if (deadCooldown > 0) deadCooldown--;
  // Update parallax even in menu for ambiance
  if (STATE === "menu") {
    parallaxOffset1 = (parallaxOffset1 + 0.3) % W;
    parallaxOffset2 = (parallaxOffset2 + 0.6) % W;
    groundOffset = (groundOffset + 1.5) % 40;
    return;
  }

  // Dying animation: tumble/spin before showing game over
  if (STATE === "dying") {
    deathTimer++;
    deathFlashAlpha = Math.max(0, deathFlashAlpha - 0.015);
    flipflop.vy += gravity * 0.8;
    flipflop.y += flipflop.vy;
    flipflop.rotation += flipflop.spinSpeed;
    // Keep on screen during tumble
    if (flipflop.y > H - 40) {
      flipflop.y = H - 40;
      flipflop.vy = -Math.abs(flipflop.vy) * 0.3;
      flipflop.spinSpeed *= 0.7;
    }
    // Update particles during death
    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.1; pt.life -= 0.025;
      if (pt.life <= 0) particles.splice(p, 1);
    }
    if (deathTimer >= DEATH_TUMBLE_DURATION) {
      STATE = "dead";
      deadCooldown = 30;
    }
    return;
  }

  // STATE === "playing"
  frame++;

  // Speed increase over time
  if (frame % 300 === 0) {
    baseScrollSpeed = Math.min(7, baseScrollSpeed + 0.25);
    spiteDrain = Math.min(0.25, spiteDrain + 0.01);
  }
  scrollSpeed = baseScrollSpeed;

  // Update parallax offsets
  parallaxOffset1 = (parallaxOffset1 + scrollSpeed * 0.2) % W;
  parallaxOffset2 = (parallaxOffset2 + scrollSpeed * 0.4) % W;
  groundOffset = (groundOffset + scrollSpeed) % 40;

  // Flip flop physics
  flipflop.vy += gravity;
  flipflop.y += flipflop.vy;
  flipflop.rotation = Math.min(1.2, flipflop.rotation + 0.04);
  flipflop.spite -= spiteDrain;

  // Die conditions
  if (flipflop.y > H - 20 || flipflop.y < -20 || flipflop.spite <= 0) {
    triggerDeath();
    return;
  }

  // Spawn faces
  faceSpawnTimer++;
  if (faceSpawnTimer >= faceSpawnInterval) {
    faceSpawnTimer = 0;
    faceSpawnInterval = Math.max(50, 90 - Math.floor(frame / 500) * 5);
    spawnFace();
  }

  // Update faces
  for (var i = faces.length - 1; i >= 0; i--) {
    var f = faces[i];
    f.x -= scrollSpeed;

    // Bob bonus faces
    if (f.type === "bonus") {
      f.y += Math.sin(frame * 0.05 + f.bobOffset) * 0.5;
    }

    // Collision with flip flop
    var dx = flipflop.x - f.x;
    var dy = flipflop.y - f.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var hitDist = f.type === "bonus" ? 28 : 30;

    if (!f.hit && dist < hitDist) {
      if (f.type === "bonus") {
        // Smack bonus face for spite!
        f.hit = true;
        flipflop.spite = Math.min(100, flipflop.spite + spiteGain);
        score++;
        sndSmack();
        spawnParticles(f.x, f.y, pick(SMACK_MSGS));
        sndScore();
        faces.splice(i, 1);
        continue;
      } else {
        // Hit a pipe face = death
        triggerDeath();
        return;
      }
    }

    // Score when passing pipe faces
    if (f.type === "top" && !f.scored && f.x + 20 < flipflop.x) {
      f.scored = true;
    }

    // Remove off-screen
    if (f.x < -60) faces.splice(i, 1);
  }

  // Update particles
  for (var p = particles.length - 1; p >= 0; p--) {
    var pt = particles[p];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.1; pt.life -= 0.025;
    if (pt.life <= 0) particles.splice(p, 1);
  }
}

// ── Drawing helpers

function drawParallaxBackground() {
  // Layer 1: Distant mountains (far, slow)
  var mountainColor1 = "#5B8C5A";
  var mountainColor2 = "#3D6B4F";
  ctx.fillStyle = mountainColor1;
  var baseY1 = H * 0.65;
  ctx.beginPath();
  ctx.moveTo(-parallaxOffset1 - W, H);
  for (var mx = -parallaxOffset1 - W; mx < W + 200; mx += 180) {
    var peakH = 40 + Math.abs(Math.sin(mx * 0.005 + 1.2)) * 80;
    ctx.lineTo(mx, baseY1 - peakH);
    ctx.lineTo(mx + 90, baseY1 - peakH * 0.3);
  }
  ctx.lineTo(W + 200, H);
  ctx.closePath();
  ctx.fill();

  // Layer 2: Mid-ground buildings/structures (medium speed)
  var baseY2 = H * 0.75;
  for (var bx = -parallaxOffset2 - W; bx < W + 120; bx += 100) {
    var bw = 30 + Math.abs(Math.sin(bx * 0.01 + 3.7)) * 30;
    var bh = 20 + Math.abs(Math.sin(bx * 0.013 + 0.5)) * 60;
    ctx.fillStyle = mountainColor2;
    ctx.fillRect(bx, baseY2 - bh, bw, bh + (H - baseY2));
    // Window dots
    ctx.fillStyle = "#2d8a4e";
    for (var wy = baseY2 - bh + 8; wy < baseY2; wy += 12) {
      for (var wx = bx + 6; wx < bx + bw - 4; wx += 10) {
        if (Math.sin(wx * 0.7 + wy * 0.3) > 0.2) {
          ctx.fillRect(wx, wy, 4, 4);
        }
      }
    }
  }
}

function drawScrollingGround() {
  var groundY = H - 14;
  // Ground fill
  ctx.fillStyle = "#1a6b35";
  ctx.fillRect(0, groundY, W, 14);

  // Top border line
  ctx.strokeStyle = "#45c46a";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // Scrolling dashes on the ground
  ctx.strokeStyle = "#2d8a4e";
  ctx.lineWidth = 1;
  for (var gx = -groundOffset; gx < W + 40; gx += 40) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY + 5);
    ctx.lineTo(gx + 18, groundY + 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx + 10, groundY + 10);
    ctx.lineTo(gx + 28, groundY + 10);
    ctx.stroke();
  }
}

function drawPipe(f) {
  var pipeW = 40;
  var capW = 52;
  var capH = 18;

  if (f.type === "top") {
    var pipeBottom = f.y - 10;
    // Pipe body with gradient
    var pipeGrad = ctx.createLinearGradient(f.x - pipeW/2, 0, f.x + pipeW/2, 0);
    pipeGrad.addColorStop(0, "#1a6b35");
    pipeGrad.addColorStop(0.3, "#38a85c");
    pipeGrad.addColorStop(0.5, "#4a2222");
    pipeGrad.addColorStop(0.7, "#38a85c");
    pipeGrad.addColorStop(1, "#1a6b35");
    ctx.fillStyle = pipeGrad;
    ctx.fillRect(f.x - pipeW/2, 0, pipeW, pipeBottom);

    // Pipe cap with gradient
    var capGrad = ctx.createLinearGradient(f.x - capW/2, 0, f.x + capW/2, 0);
    capGrad.addColorStop(0, "#2a0e0e");
    capGrad.addColorStop(0.15, "#4a2222");
    capGrad.addColorStop(0.4, "#5c2e2e");
    capGrad.addColorStop(0.5, "#6a3535");
    capGrad.addColorStop(0.6, "#5c2e2e");
    capGrad.addColorStop(0.85, "#4a2222");
    capGrad.addColorStop(1, "#2a0e0e");
    ctx.fillStyle = capGrad;
    ctx.fillRect(f.x - capW/2, pipeBottom - capH, capW, capH);

    // Highlight on cap top edge
    ctx.strokeStyle = "#6a3535";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(f.x - capW/2 + 2, pipeBottom - capH);
    ctx.lineTo(f.x + capW/2 - 2, pipeBottom - capH);
    ctx.stroke();

    // Shadow on cap bottom edge
    ctx.strokeStyle = "#1a6b35";
    ctx.beginPath();
    ctx.moveTo(f.x - capW/2 + 2, pipeBottom);
    ctx.lineTo(f.x + capW/2 - 2, pipeBottom);
    ctx.stroke();

    // Outline
    ctx.strokeStyle = "#45c46a";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(f.x - pipeW/2, 0, pipeW, pipeBottom);
    ctx.strokeRect(f.x - capW/2, pipeBottom - capH, capW, capH);

  } else {
    var pipeTop = f.y + 25;
    // Pipe body with gradient
    var pipeGrad2 = ctx.createLinearGradient(f.x - pipeW/2, 0, f.x + pipeW/2, 0);
    pipeGrad2.addColorStop(0, "#1a6b35");
    pipeGrad2.addColorStop(0.3, "#38a85c");
    pipeGrad2.addColorStop(0.5, "#4a2222");
    pipeGrad2.addColorStop(0.7, "#38a85c");
    pipeGrad2.addColorStop(1, "#1a6b35");
    ctx.fillStyle = pipeGrad2;
    ctx.fillRect(f.x - pipeW/2, pipeTop + capH, pipeW, H - pipeTop - capH);

    // Pipe cap with gradient
    var capGrad2 = ctx.createLinearGradient(f.x - capW/2, 0, f.x + capW/2, 0);
    capGrad2.addColorStop(0, "#2a0e0e");
    capGrad2.addColorStop(0.15, "#4a2222");
    capGrad2.addColorStop(0.4, "#5c2e2e");
    capGrad2.addColorStop(0.5, "#6a3535");
    capGrad2.addColorStop(0.6, "#5c2e2e");
    capGrad2.addColorStop(0.85, "#4a2222");
    capGrad2.addColorStop(1, "#2a0e0e");
    ctx.fillStyle = capGrad2;
    ctx.fillRect(f.x - capW/2, pipeTop, capW, capH);

    // Highlight on cap top edge
    ctx.strokeStyle = "#6a3535";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(f.x - capW/2 + 2, pipeTop);
    ctx.lineTo(f.x + capW/2 - 2, pipeTop);
    ctx.stroke();

    // Shadow on cap bottom edge
    ctx.strokeStyle = "#1a6b35";
    ctx.beginPath();
    ctx.moveTo(f.x - capW/2 + 2, pipeTop + capH);
    ctx.lineTo(f.x + capW/2 - 2, pipeTop + capH);
    ctx.stroke();

    // Outline
    ctx.strokeStyle = "#45c46a";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(f.x - pipeW/2, pipeTop + capH, pipeW, H - pipeTop - capH);
    ctx.strokeRect(f.x - capW/2, pipeTop, capW, capH);
  }
}

function draw() {
  // Background gradient
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#4FC3F7");
  grad.addColorStop(0.5, "#81D4FA");
  grad.addColorStop(1, "#B3E5FC");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Parallax background layers
  drawParallaxBackground();

  // Ground with scrolling dashes
  drawScrollingGround();

  if (STATE === "menu") {
    // Title
    ctx.textAlign = "center";
    ctx.font = "bold 42px monospace";
    ctx.fillStyle = "#f59e0b";
    ctx.fillText("FLAPPY FLIP FLOP", W/2, H*0.3);
    ctx.font = "60px serif";
    ctx.fillText("🩴", W/2, H*0.45);
    ctx.font = "14px monospace";
    ctx.fillStyle = "#333";
    ctx.fillText("Tap / Space to flap", W/2, H*0.58);
    ctx.fillText("Smack kids' faces to refuel spite", W/2, H*0.63);
    ctx.fillText("La Chancla never misses 🩴💨", W/2, H*0.68);
    if (highScore > 0) {
      ctx.fillStyle = "#f59e0b";
      ctx.fillText("Best: " + highScore, W/2, H*0.76);
    }
    ctx.font = "11px monospace";
    ctx.fillStyle = "#444";
    ctx.fillText("taskiap.com", W/2, H*0.88);
    return;
  }

  // Draw faces (pipes + bonus)
  for (var i = 0; i < faces.length; i++) {
    var f = faces[i];

    if (f.type === "bonus") {
      // Collection radius indicator ring
      var ringPulse = 0.3 + Math.sin(frame * 0.06 + (f.bobOffset || 0)) * 0.15;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 28, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(245, 158, 11, " + ringPulse + ")";
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Glowing bonus face
      ctx.font = f.size + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "#f59e0b";
      ctx.shadowBlur = 10;
      ctx.fillText(f.emoji, f.x, f.y);
      ctx.shadowBlur = 0;
    } else {
      drawPipe(f);
    }
  }

  // Draw flip flop (visible in playing and dying states)
  ctx.save();
  ctx.translate(flipflop.x, flipflop.y);
  ctx.rotate(flipflop.rotation);
  ctx.font = "32px serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🩴", 0, 0);
  ctx.restore();

  // Particles
  for (var p = 0; p < particles.length; p++) {
    var pt = particles[p];
    ctx.globalAlpha = pt.life;
    ctx.font = pt.size + "px monospace";
    ctx.textAlign = "center";
    ctx.fillStyle = "#f59e0b";
    ctx.fillText(pt.text, pt.x, pt.y);
    ctx.globalAlpha = 1;
  }

  // Death red flash overlay
  if (deathFlashAlpha > 0) {
    ctx.fillStyle = "rgba(200, 20, 20, " + deathFlashAlpha + ")";
    ctx.fillRect(0, 0, W, H);
  }

  // HUD: Spite meter (only during playing or dying)
  if (STATE === "playing" || STATE === "dying") {
    var meterW = 120;
    var meterH = 12;
    var meterX = W/2 - meterW/2;
    var meterY = 16;
    ctx.fillStyle = "#1a6b35";
    ctx.fillRect(meterX - 1, meterY - 1, meterW + 2, meterH + 2);
    var spiteColor = flipflop.spite > 50 ? "#f59e0b" : flipflop.spite > 25 ? "#ef4444" : "#7f1d1d";
    ctx.fillStyle = spiteColor;
    ctx.fillRect(meterX, meterY, meterW * (Math.max(0, flipflop.spite) / 100), meterH);
    ctx.strokeStyle = "#45c46a";
    ctx.lineWidth = 1;
    ctx.strokeRect(meterX - 1, meterY - 1, meterW + 2, meterH + 2);
    ctx.font = "bold 9px monospace";
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.fillText("SPITE: " + Math.max(0, Math.ceil(flipflop.spite)) + "%", W/2, meterY + meterH - 2);

    // Score (center)
    ctx.font = "bold 24px monospace";
    ctx.fillStyle = "#f59e0b";
    ctx.textAlign = "center";
    ctx.fillText(score, W/2, meterY + meterH + 28);

    // Best score (top right)
    ctx.font = "bold 11px monospace";
    ctx.fillStyle = "#666";
    ctx.textAlign = "right";
    ctx.fillText("BEST: " + highScore, W - 14, 26);

    // Speed indicator (top left)
    ctx.font = "9px monospace";
    ctx.fillStyle = "#444";
    ctx.textAlign = "left";
    ctx.fillText("SPD " + baseScrollSpeed.toFixed(1) + "x", 14, 26);
  }

  // Dead screen (after tumble animation)
  if (STATE === "dead") {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, W, H);
    ctx.font = "bold 32px monospace";
    ctx.fillStyle = "#ef4444";
    ctx.textAlign = "center";
    ctx.fillText("OUT OF SPITE", W/2, H*0.35);
    ctx.font = "40px serif";
    ctx.fillText("🩴💀", W/2, H*0.45);
    ctx.font = "bold 20px monospace";
    ctx.fillStyle = "#f59e0b";
    ctx.fillText("Score: " + score, W/2, H*0.58);
    if (score >= highScore && score > 0) {
      ctx.fillStyle = "#22c55e";
      ctx.font = "14px monospace";
      ctx.fillText("NEW HIGH SCORE!", W/2, H*0.64);
    } else {
      ctx.font = "14px monospace";
      ctx.fillStyle = "#888";
      ctx.fillText("Best: " + highScore, W/2, H*0.64);
    }
    ctx.font = "13px monospace";
    ctx.fillStyle = "#666";
    ctx.fillText("Tap to restart", W/2, H*0.74);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
