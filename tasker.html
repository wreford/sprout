<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tasker — CPM Project Scheduling</title>
<style>
:root{--bg:#0a0a12;--bg2:#12121a;--bg3:#1a1a24;--bg4:#22222e;--border:#2a2a3d;--border2:#3a3a4d;--text:#f0f0f0;--dim:#6e6e80;--accent:#ff6b35;--green:#4ade80;--red:#ef4444;--gold:#f7c948;--blue:#60a5fa;--purple:#a78bfa;--cyan:#22d3ee;--font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;--mono:ui-monospace,"SF Mono",Menlo,Monaco,Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;transition:background .15s}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
::-webkit-scrollbar-corner{background:var(--bg)}
::selection{background:var(--accent);color:#fff}
input,select,button,textarea{font-family:inherit;font-size:inherit;color:var(--text);background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:3px 6px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,107,53,.1)}
button{cursor:pointer;background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:4px;color:var(--text);white-space:nowrap;transition:all .12s;font-weight:500;font-size:12px}
button:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent)}
button:active{transform:scale(.97)}
button.primary{background:linear-gradient(180deg,#ff7b45,var(--accent));color:#fff;border-color:var(--accent);font-weight:700;box-shadow:0 1px 6px rgba(255,107,53,.2)}
button.primary:hover{background:linear-gradient(180deg,#ff8855,#e85a2a);box-shadow:0 2px 10px rgba(255,107,53,.3)}

/* TOP BAR */
#topbar{display:flex;align-items:center;gap:6px;padding:4px 10px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:38px}
#topbar .home-link{color:var(--dim);text-decoration:none;font-size:11px;font-family:var(--mono);opacity:.7;transition:all .15s}
#topbar .home-link:hover{color:var(--accent);opacity:1}
#topbar .app-title{font-weight:800;font-size:14px;color:var(--accent);margin-right:2px;letter-spacing:-.02em}
#topbar .sep{width:1px;height:18px;background:var(--border);margin:0 2px;opacity:.5}
#topbar label{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
#topbar input[type="date"],#topbar input[type="text"]{width:118px;font-family:var(--mono);font-size:11px;padding:2px 5px;background:var(--bg);border-radius:4px}
#topbar select{font-size:11px;padding:2px 5px;background:var(--bg);border-radius:4px}
.btn-group{display:flex;gap:1px}

/* MAIN AREA */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#workspace{flex:1;display:flex;overflow:hidden;position:relative}

/* LEFT PANEL (TABLE) */
#table-panel{width:55%;min-width:300px;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);position:relative}
#table-wrap{flex:1;overflow:auto;position:relative}
#activity-table{border-collapse:collapse;width:max-content;min-width:100%}
#activity-table thead{position:sticky;top:0;z-index:10}
#activity-table th{background:linear-gradient(180deg,var(--bg3),var(--bg2));border:1px solid var(--border);padding:4px 8px;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;cursor:pointer;user-select:none;white-space:nowrap;position:relative;font-weight:700;transition:color .1s}
#activity-table th:hover{color:var(--accent)}
#activity-table th .sort-arrow{font-size:9px;margin-left:2px}
#activity-table td{border:1px solid var(--border);padding:2px 6px;white-space:nowrap;cursor:default;font-size:12px;height:26px;max-width:200px;overflow:hidden;text-overflow:ellipsis}
#activity-table td.mono{font-family:var(--mono);font-size:11px}
#activity-table td.editable:hover{background:var(--bg3)}
#activity-table tr{background:var(--bg)}
#activity-table tr:hover{background:var(--bg2)}
#activity-table tr.selected{background:rgba(255,107,53,.06);outline:1px solid var(--accent);outline-offset:-1px}
#activity-table tr.critical td.name-cell{color:var(--red);font-weight:600}
#activity-table tr.milestone td.name-cell{color:var(--gold);font-weight:600}
#activity-table tr.completed td{color:var(--dim);opacity:.7}
#activity-table tr.wbs-row{background:var(--bg2);font-weight:600}
#activity-table tr.wbs-row td{border-bottom:2px solid var(--border2)}
.cell-edit{background:var(--bg);border:2px solid var(--accent);padding:1px 4px;width:100%;height:100%;font-size:12px;outline:none;position:absolute;left:0;top:0;z-index:5}
.cell-edit.mono{font-family:var(--mono)}

/* RESIZE HANDLE */
#resize-h{width:4px;cursor:col-resize;background:transparent;flex-shrink:0;z-index:5;transition:background .15s}
#resize-h:hover{background:var(--accent);box-shadow:0 0 6px rgba(255,107,53,.3)}

/* RIGHT PANEL (GANTT) */
#gantt-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#gantt-header{height:44px;overflow:hidden;background:var(--bg2);border-bottom:1px solid var(--border);position:relative}
#gantt-header canvas{display:block}
#gantt-body{flex:1;overflow:auto;position:relative}
#gantt-body canvas{display:block}
.gantt-tooltip{position:fixed;background:rgba(26,26,36,.95);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;font-size:11px;z-index:100;pointer-events:none;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);line-height:1.5}
.gantt-tooltip .tt-title{font-weight:700;color:var(--accent);margin-bottom:4px}
.gantt-tooltip .tt-row{display:flex;justify-content:space-between;gap:12px}
.gantt-tooltip .tt-label{color:var(--dim)}
.gantt-tooltip .tt-val{font-family:var(--mono);color:var(--text)}

/* BOTTOM PANEL */
#bottom-panel{height:200px;min-height:50px;border-top:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0}
#resize-v{height:4px;cursor:row-resize;background:transparent;flex-shrink:0;transition:background .15s}
#resize-v:hover{background:var(--accent);box-shadow:0 0 6px rgba(255,107,53,.3)}
#bottom-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
#bottom-tabs button{border:none;border-bottom:2px solid transparent;border-radius:0;background:transparent;color:var(--dim);padding:6px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:600;transition:all .12s}
#bottom-tabs button.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(255,107,53,.04)}
#bottom-tabs button:hover{color:var(--text);background:rgba(255,255,255,.02)}
#bottom-content{flex:1;overflow:auto;padding:8px 12px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.detail-field{display:flex;flex-direction:column;gap:2px}
.detail-field label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.detail-field input,.detail-field select{padding:4px 6px;font-size:12px}
#rel-table,#res-table,#log-table{width:100%;border-collapse:collapse}
#rel-table th,#res-table th,#log-table th{background:var(--bg3);padding:4px 8px;text-align:left;font-size:11px;color:var(--dim);border:1px solid var(--border)}
#rel-table td,#res-table td,#log-table td{padding:3px 8px;border:1px solid var(--border);font-size:12px}

/* STATUS BAR */
#statusbar{display:flex;align-items:center;gap:14px;padding:3px 12px;background:linear-gradient(180deg,var(--bg),var(--bg2));border-top:1px solid var(--border);font-size:10px;color:var(--dim);flex-shrink:0;font-weight:500;letter-spacing:.02em}
#statusbar .stat{display:flex;align-items:center;gap:3px}
#statusbar .stat .val{color:var(--text);font-family:var(--mono);font-weight:700;font-size:11px}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 0;z-index:200;min-width:190px;box-shadow:0 8px 32px rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.ctx-menu div{padding:7px 14px;cursor:pointer;font-size:12px;transition:background .08s;border-radius:2px;margin:0 4px}
.ctx-menu div:hover{background:var(--accent);color:#fff}
.ctx-menu .ctx-sep{height:1px;background:var(--border);margin:2px 0;padding:0;cursor:default}
.ctx-menu .ctx-sep:hover{background:var(--border)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:linear-gradient(145deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:10px;padding:24px;min-width:400px;max-width:90vw;max-height:90vh;overflow:auto;box-shadow:0 16px 64px rgba(0,0,0,.8);animation:modalIn .15s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal h3{color:var(--accent);margin-bottom:12px;font-size:16px}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* DROPDOWN */
.dropdown{position:relative;display:inline-block}
.dropdown-content{display:none;position:absolute;top:calc(100% + 2px);left:0;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;min-width:210px;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.7);padding:4px 0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.dropdown-content.show{display:block;animation:ddIn .12s ease}
@keyframes ddIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.dropdown-content div{padding:7px 12px;cursor:pointer;font-size:12px;transition:background .08s;border-radius:2px;margin:0 4px}
.dropdown-content div:hover{background:var(--accent);color:#fff}
.dropdown-content .dd-sep{height:1px;background:var(--border);margin:2px 0;padding:0}

@media print{
  #topbar,#bottom-panel,#statusbar,#resize-h,#resize-v{display:none!important}
  body{overflow:visible!important}
  #main,#workspace{overflow:visible!important;height:auto!important}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <a href="index.html" class="home-link">← home</a>
  <span class="app-title">📊 Tasker</span>
  <div class="sep"></div>
  <label>Project: <input type="text" id="project-name" value="New Project" style="width:150px"></label>
  <div class="sep"></div>
  <label>Start: <input type="date" id="project-start"></label>
  <label>Data Date: <input type="date" id="data-date"></label>
  <label>Calendar: <select id="calendar-sel"><option value="5">5d/wk</option><option value="6">6d/wk</option><option value="7">7d/wk</option></select></label>
  <div class="sep"></div>
  <div class="btn-group">
    <button onclick="addActivity()" title="Add Activity">+ Activity</button>
    <button onclick="addMilestone()" title="Add Milestone">+ Milestone</button>
  </div>
  <div class="sep"></div>
  <button onclick="doUndo()" title="Ctrl+Z">Undo</button>
  <div class="sep"></div>
  <label>WBS: <select id="wbs-filter" onchange="applyWBSFilter()"><option value="">All</option></select></label>
  <div class="sep"></div>
  <div class="dropdown">
    <button onclick="toggleDropdown('tmpl-dd')">Templates ▾</button>
    <div id="tmpl-dd" class="dropdown-content"></div>
  </div>
  <div class="dropdown">
    <button onclick="toggleDropdown('io-dd')">Import/Export ▾</button>
    <div id="io-dd" class="dropdown-content">
      <div onclick="importJSON()">Import JSON</div>
      <div onclick="importCSV()">Import CSV</div>
      <div class="dd-sep"></div>
      <div onclick="exportJSON()">Export JSON</div>
      <div onclick="exportCSV()">Export P6 CSV</div>
      <div onclick="exportXER()">Export XER</div>
      <div onclick="exportMSXML()">Export MS Project XML</div>
      <div class="dd-sep"></div>
      <div onclick="copyClipboard()">Copy to Clipboard</div>
    </div>
  </div>
  <div class="dropdown">
    <button onclick="toggleDropdown('proj-dd')">Projects ▾</button>
    <div id="proj-dd" class="dropdown-content"></div>
  </div>
  <button onclick="saveProject()" class="primary">Save</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="workspace">
    <!-- LEFT: Activity Table -->
    <div id="table-panel">
      <div id="table-wrap">
        <table id="activity-table">
          <thead><tr id="table-header"></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
    <div id="resize-h"></div>
    <!-- RIGHT: Gantt -->
    <div id="gantt-panel">
      <div id="gantt-toolbar" style="display:flex;align-items:center;gap:4px;padding:2px 6px;background:var(--bg2);border-bottom:1px solid var(--border);height:24px;flex-shrink:0">
        <button onclick="zoomIn()" style="padding:1px 6px;font-size:11px" title="Zoom In">+</button>
        <button onclick="zoomOut()" style="padding:1px 6px;font-size:11px" title="Zoom Out">−</button>
        <button onclick="zoomFit()" style="padding:1px 6px;font-size:11px" title="Zoom to Fit">Fit</button>
        <span style="font-size:10px;color:var(--dim);margin-left:4px">Ctrl+Scroll to zoom</span>
        <span style="flex:1"></span>
        <button onclick="setAllBaselines()" style="padding:1px 6px;font-size:11px" title="Set baseline for all activities">Set Baselines</button>
        <button onclick="clearAllBaselines()" style="padding:1px 6px;font-size:11px" title="Clear all baselines">Clear Baselines</button>
      </div>
      <div id="gantt-header"><canvas id="gantt-header-canvas"></canvas></div>
      <div id="gantt-body"><canvas id="gantt-canvas"></canvas></div>
    </div>
  </div>
  <div id="resize-v"></div>
  <!-- BOTTOM -->
  <div id="bottom-panel">
    <div id="bottom-tabs">
      <button class="active" onclick="switchBottomTab('details')">Activity Details</button>
      <button onclick="switchBottomTab('relationships')">Relationships</button>
      <button onclick="switchBottomTab('resources')">Resources</button>
      <button onclick="switchBottomTab('ev')">Earned Value</button>
      <button onclick="switchBottomTab('log')">Log</button>
    </div>
    <div id="bottom-content"></div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div class="stat">Duration: <span class="val" id="stat-duration">0d</span></div>
  <div class="stat">Activities: <span class="val" id="stat-activities">0</span></div>
  <div class="stat">Critical: <span class="val" id="stat-critical" style="color:var(--red)">0</span></div>
  <div class="stat">Complete: <span class="val" id="stat-complete">0%</span></div>
  <div class="stat">Total Cost: <span class="val" id="stat-cost">$0</span></div>
  <div class="stat">Data Date: <span class="val" id="stat-datadate">-</span></div>
</div>

<!-- TOOLTIP -->
<div class="gantt-tooltip" id="tooltip" style="display:none"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="file-input" style="display:none" accept=".json,.csv">

<script>
// ============================================================
// Tasker — Full CPM Project Scheduling Tool
// ============================================================

const LS_KEY = 'tasker-projects';
const ROW_H = 26;
const HEADER_H = 44;
const DAY_PX = 28;
let zoomLevel = DAY_PX;
const MIN_ZOOM = 8, MAX_ZOOM = 60;

// Column definitions
const COLUMNS = [
  {key:'id',label:'Activity ID',width:90,mono:true,editable:true},
  {key:'name',label:'Activity Name',width:200,editable:true},
  {key:'od',label:'OD',width:45,mono:true,editable:true,type:'number'},
  {key:'rd',label:'RD',width:45,mono:true,editable:true,type:'number'},
  {key:'pct',label:'%',width:40,mono:true,editable:true,type:'number'},
  {key:'start',label:'Start',width:85,mono:true},
  {key:'finish',label:'Finish',width:85,mono:true},
  {key:'tf',label:'TF',width:40,mono:true},
  {key:'ff',label:'FF',width:40,mono:true},
  {key:'preds',label:'Predecessors',width:110,mono:true,editable:true},
  {key:'succs',label:'Successors',width:110,mono:true},
  {key:'resource',label:'Resource',width:90,editable:true},
  {key:'cost',label:'Cost',width:70,mono:true,editable:true,type:'number'},
  {key:'wbs',label:'WBS',width:70,mono:true,editable:true},
  {key:'actType',label:'Type',width:65,editable:true},
  {key:'cal',label:'Cal',width:50,editable:true}
];

// ============================================================
// STATE
// ============================================================
let STATE = {
  projectId: null,
  projectName: 'New Project',
  projectStart: null,
  dataDate: null,
  calendarDays: 5,
  holidays: [],
  activities: [],
  resources: [],
  baselines: {},
  nextId: 1,
  log: [],
  undoStack: [],
  sortCol: null,
  sortDir: 1,
  selectedRows: new Set(),
  activeCell: null,
  wbsFilter: '',
  bottomTab: 'details',
  zoomLevel: DAY_PX
};

let filteredActivities = [];
let editingCell = null;

// ============================================================
// CALENDAR ENGINE
// ============================================================
function isWorkday(date, cal) {
  cal = cal || STATE.calendarDays;
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun,6=Sat
  if (cal == 5 && (day === 0 || day === 6)) return false;
  if (cal == 6 && day === 0) return false;
  const ds = fmtDate(d);
  if (STATE.holidays.includes(ds)) return false;
  return true;
}

function addWorkdays(startDate, days, cal) {
  cal = cal || STATE.calendarDays;
  if (days <= 0) return new Date(startDate);
  let d = new Date(startDate);
  let count = 0;
  // The start date counts as day 1 if it's a workday
  while (count < days) {
    if (isWorkday(d, cal)) count++;
    if (count < days) d.setDate(d.getDate() + 1);
  }
  return d;
}

function workdaysBetween(d1, d2, cal) {
  cal = cal || STATE.calendarDays;
  let a = new Date(d1), b = new Date(d2);
  if (a > b) return 0;
  let count = 0;
  let cur = new Date(a);
  while (cur <= b) {
    if (isWorkday(cur, cal)) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function nextWorkday(date, cal) {
  let d = new Date(date);
  d.setDate(d.getDate() + 1);
  while (!isWorkday(d, cal)) d.setDate(d.getDate() + 1);
  return d;
}

function prevWorkday(date, cal) {
  let d = new Date(date);
  d.setDate(d.getDate() - 1);
  while (!isWorkday(d, cal)) d.setDate(d.getDate() - 1);
  return d;
}

function ensureWorkday(date, cal) {
  let d = new Date(date);
  while (!isWorkday(d, cal)) d.setDate(d.getDate() + 1);
  return d;
}

function subtractWorkdays(date, days, cal) {
  cal = cal || STATE.calendarDays;
  if (days <= 0) return new Date(date);
  let d = new Date(date);
  let count = 0;
  while (count < days) {
    if (isWorkday(d, cal)) count++;
    if (count < days) d.setDate(d.getDate() - 1);
  }
  return d;
}

// ============================================================
// DATE UTILS
// ============================================================
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  return dt.toISOString().slice(0, 10);
}

function fmtDateShort(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  const m = dt.toLocaleString('en', {month:'short'});
  return dt.getDate() + '-' + m + '-' + String(dt.getFullYear()).slice(2);
}

function parseDate(s) {
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  return isNaN(d) ? null : d;
}

function daysBetween(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}

function dateAdd(d, days) {
  const r = new Date(d);
  r.setDate(r.getDate() + days);
  return r;
}

function minDate(...dates) {
  const valid = dates.filter(d => d);
  if (!valid.length) return null;
  return new Date(Math.min(...valid.map(d => new Date(d).getTime())));
}

function maxDate(...dates) {
  const valid = dates.filter(d => d);
  if (!valid.length) return null;
  return new Date(Math.max(...valid.map(d => new Date(d).getTime())));
}

function today() { return fmtDate(new Date()); }

// ============================================================
// ACTIVITY FACTORY
// ============================================================
function createActivity(overrides) {
  const a = {
    uid: STATE.nextId++,
    id: overrides.id || ('A' + String(STATE.nextId).padStart(4, '0')),
    name: 'New Activity',
    od: 5,
    rd: 5,
    pct: 0,
    es: null, ef: null, ls: null, lf: null,
    start: null, finish: null,
    actualStart: null, actualFinish: null,
    tf: 0, ff: 0,
    preds: '', // "A1000FS+0,A1010SS+2"
    resource: '',
    cost: 0,
    actualCost: 0,
    wbs: '1.0',
    actType: 'Task', // Task, Milestone, LOE, Hammock
    cal: STATE.calendarDays,
    baseline: null, // {start, finish}
    notes: '',
    ...overrides
  };
  if (a.actType === 'Milestone') { a.od = 0; a.rd = 0; }
  return a;
}

// ============================================================
// PARSE PREDECESSORS
// ============================================================
function parsePreds(predStr) {
  if (!predStr || !predStr.trim()) return [];
  return predStr.split(',').map(s => {
    s = s.trim();
    const m = s.match(/^([A-Za-z0-9_.]+)\s*(FS|FF|SS|SF)?\s*([+-]?\d+)?$/i);
    if (!m) return null;
    return {
      id: m[1],
      type: (m[2] || 'FS').toUpperCase(),
      lag: parseInt(m[3] || '0', 10)
    };
  }).filter(Boolean);
}

function buildPredStr(preds) {
  return preds.map(p => {
    let s = p.id;
    if (p.type !== 'FS' || p.lag !== 0) s += p.type;
    if (p.lag !== 0) s += (p.lag > 0 ? '+' : '') + p.lag;
    return s;
  }).join(',');
}

function getActivityById(id) {
  return STATE.activities.find(a => a.id === id);
}

function getSuccessors(act) {
  return STATE.activities.filter(a => {
    const preds = parsePreds(a.preds);
    return preds.some(p => p.id === act.id);
  });
}

// ============================================================
// CPM SCHEDULING ENGINE
// ============================================================
function schedule() {
  const acts = STATE.activities;
  if (!acts.length) return;
  const pStart = parseDate(STATE.projectStart);
  if (!pStart) return;

  // Build adjacency
  const byId = {};
  acts.forEach(a => { byId[a.id] = a; });

  // Reset calculated fields
  acts.forEach(a => {
    a.es = null; a.ef = null; a.ls = null; a.lf = null;
    a.tf = 0; a.ff = 0;
    a._preds = parsePreds(a.preds);
    a._succs = [];
  });

  // Build successor list
  acts.forEach(a => {
    a._preds.forEach(p => {
      const pred = byId[p.id];
      if (pred) {
        pred._succs.push({id: a.id, type: p.type, lag: p.lag});
      }
    });
  });

  // Compute successors string
  acts.forEach(a => {
    a.succs = a._succs.map(s => {
      let str = s.id;
      if (s.type !== 'FS' || s.lag !== 0) str += s.type;
      if (s.lag !== 0) str += (s.lag > 0 ? '+' : '') + s.lag;
      return str;
    }).join(',');
  });

  // Handle LOE and Hammock later, first do Task and Milestone

  // ---- FORWARD PASS ----
  // Topological sort
  const inDeg = {};
  acts.forEach(a => { inDeg[a.id] = 0; });
  acts.forEach(a => {
    a._preds.forEach(p => {
      if (byId[p.id]) inDeg[a.id]++;
    });
  });

  const queue = [];
  acts.forEach(a => { if (inDeg[a.id] === 0) queue.push(a); });
  const sorted = [];

  while (queue.length) {
    const a = queue.shift();
    sorted.push(a);
    a._succs.forEach(s => {
      const sa = byId[s.id];
      if (sa) {
        inDeg[sa.id]--;
        if (inDeg[sa.id] === 0) queue.push(sa);
      }
    });
  }

  // Detect circular — any remaining
  if (sorted.length < acts.length) {
    // Mark unsorted activities
    const sortedIds = new Set(sorted.map(a => a.id));
    acts.forEach(a => {
      if (!sortedIds.has(a.id)) {
        a.es = fmtDate(pStart);
        a.ef = fmtDate(addWorkdays(pStart, Math.max(a.od, 1), a.cal));
        a.start = a.es;
        a.finish = a.ef;
        a.tf = -999;
        a.ff = 0;
      }
    });
    // Add them to sorted for backward pass
    acts.forEach(a => { if (!sortedIds.has(a.id)) sorted.push(a); });
  }

  // Forward pass
  sorted.forEach(a => {
    const cal = a.cal || STATE.calendarDays;
    let esDate = ensureWorkday(pStart, cal);

    // Consider predecessors
    a._preds.forEach(p => {
      const pred = byId[p.id];
      if (!pred || !pred.ef) return;
      let refDate;
      switch (p.type) {
        case 'FS':
          refDate = nextWorkday(parseDate(pred.ef), cal);
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          break;
        case 'SS':
          refDate = new Date(parseDate(pred.es));
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          refDate = ensureWorkday(refDate, cal);
          break;
        case 'FF':
          refDate = new Date(parseDate(pred.ef));
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          // EF constrained, so ES = EF - duration + 1
          if (a.actType === 'Milestone') {
            refDate = ensureWorkday(refDate, cal);
          } else {
            refDate = subtractWorkdays(refDate, Math.max(a.od - 1, 0), cal);
          }
          break;
        case 'SF':
          refDate = new Date(parseDate(pred.es));
          if (p.lag > 0) refDate = addWorkdays(refDate, p.lag, cal);
          else if (p.lag < 0) refDate = subtractWorkdays(refDate, -p.lag, cal);
          if (a.actType === 'Milestone') {
            refDate = ensureWorkday(refDate, cal);
          } else {
            refDate = subtractWorkdays(refDate, Math.max(a.od - 1, 0), cal);
          }
          break;
      }
      if (refDate && refDate > esDate) esDate = refDate;
    });

    esDate = ensureWorkday(esDate, cal);
    a.es = fmtDate(esDate);

    if (a.actType === 'Milestone') {
      a.ef = a.es;
    } else {
      const dur = a.pct >= 100 ? (a.od || 1) : Math.max(a.od || 1, 1);
      a.ef = fmtDate(addWorkdays(esDate, dur - 1, cal));
    }

    // Progress overrides
    if (a.pct >= 100) {
      a.actualFinish = a.actualFinish || a.ef;
      a.rd = 0;
    } else if (a.pct > 0) {
      a.actualStart = a.actualStart || a.es;
      if (!a._rdManual) {
        a.rd = Math.max(1, Math.round(a.od * (1 - a.pct / 100)));
      }
    } else {
      if (!a._rdManual) a.rd = a.od;
    }

    a.start = a.actualStart || a.es;
    a.finish = a.actualFinish || a.ef;
  });

  // ---- BACKWARD PASS ----
  // Find project end
  let projectEnd = parseDate(acts[0].ef);
  acts.forEach(a => {
    const ef = parseDate(a.ef);
    if (ef && ef > projectEnd) projectEnd = ef;
  });

  // Backward pass (reverse topological order)
  for (let i = sorted.length - 1; i >= 0; i--) {
    const a = sorted[i];
    const cal = a.cal || STATE.calendarDays;
    let lfDate = new Date(projectEnd);

    if (a._succs.length === 0) {
      lfDate = new Date(projectEnd);
    } else {
      lfDate = null;
      a._succs.forEach(s => {
        const succ = byId[s.id];
        if (!succ || !succ.ls) return;
        let refDate;
        switch (s.type) {
          case 'FS':
            refDate = prevWorkday(parseDate(succ.ls), cal);
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            break;
          case 'SS':
            refDate = new Date(parseDate(succ.ls));
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            // LS constrained, LF = LS + dur - 1
            if (a.actType === 'Milestone') {
              refDate = ensureWorkday(refDate, cal);
            } else {
              refDate = addWorkdays(refDate, Math.max(a.od - 1, 0), cal);
            }
            break;
          case 'FF':
            refDate = new Date(parseDate(succ.lf));
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            refDate = ensureWorkday(refDate, cal);
            break;
          case 'SF':
            refDate = new Date(parseDate(succ.lf));
            if (s.lag > 0) refDate = subtractWorkdays(refDate, s.lag, cal);
            else if (s.lag < 0) refDate = addWorkdays(refDate, -s.lag, cal);
            if (a.actType === 'Milestone') {
              refDate = ensureWorkday(refDate, cal);
            } else {
              refDate = addWorkdays(refDate, Math.max(a.od - 1, 0), cal);
            }
            break;
        }
        if (refDate) {
          if (!lfDate || refDate < lfDate) lfDate = refDate;
        }
      });
      if (!lfDate) lfDate = new Date(projectEnd);
    }

    a.lf = fmtDate(lfDate);
    if (a.actType === 'Milestone') {
      a.ls = a.lf;
    } else {
      a.ls = fmtDate(subtractWorkdays(lfDate, Math.max(a.od - 1, 0), cal));
    }

    // Total Float
    const esD = parseDate(a.es), lsD = parseDate(a.ls);
    if (esD && lsD) {
      a.tf = workdaysBetween(esD, lsD, cal) - 1;
      if (a.actType === 'Milestone') a.tf = workdaysBetween(esD, lsD, cal);
      // Simpler: LS - ES in working days
      a.tf = 0;
      let tmp = new Date(esD);
      let cnt = 0;
      if (lsD >= esD) {
        while (fmtDate(tmp) !== fmtDate(lsD)) {
          if (isWorkday(tmp, cal)) cnt++;
          tmp.setDate(tmp.getDate() + 1);
        }
      } else {
        while (fmtDate(tmp) !== fmtDate(lsD)) {
          if (isWorkday(tmp, cal)) cnt--;
          tmp.setDate(tmp.getDate() - 1);
        }
      }
      a.tf = cnt;
    }
  }

  // Free Float
  sorted.forEach(a => {
    const cal = a.cal || STATE.calendarDays;
    if (a._succs.length === 0) {
      a.ff = a.tf;
    } else {
      let minGap = Infinity;
      a._succs.forEach(s => {
        const succ = byId[s.id];
        if (!succ || !succ.es) return;
        let gap = 0;
        const aef = parseDate(a.ef);
        const ses = parseDate(succ.es);
        switch (s.type) {
          case 'FS':
            gap = workdaysBetween(aef, ses, cal) - 1 - (s.lag || 0) - 1;
            break;
          case 'SS':
            gap = workdaysBetween(parseDate(a.es), ses, cal) - 1 - (s.lag || 0);
            break;
          case 'FF':
            gap = workdaysBetween(aef, parseDate(succ.ef), cal) - 1 - (s.lag || 0);
            break;
          case 'SF':
            gap = workdaysBetween(parseDate(a.es), parseDate(succ.ef), cal) - 1 - (s.lag || 0);
            break;
        }
        if (gap < minGap) minGap = gap;
      });
      a.ff = minGap === Infinity ? a.tf : Math.max(0, minGap);
    }
  });

  // LOE: span from earliest pred start to latest succ finish
  acts.filter(a => a.actType === 'LOE').forEach(a => {
    let earliest = null, latest = null;
    a._preds.forEach(p => {
      const pred = byId[p.id];
      if (pred) {
        const s = parseDate(pred.es);
        const f = parseDate(pred.ef);
        if (!earliest || s < earliest) earliest = s;
        if (!latest || f > latest) latest = f;
      }
    });
    a._succs.forEach(s => {
      const succ = byId[s.id];
      if (succ) {
        const f = parseDate(succ.ef);
        if (!latest || f > latest) latest = f;
      }
    });
    if (earliest) { a.es = a.start = fmtDate(earliest); }
    if (latest) { a.ef = a.finish = fmtDate(latest); }
    if (earliest && latest) {
      a.od = workdaysBetween(earliest, latest, a.cal);
      a.rd = Math.round(a.od * (1 - a.pct / 100));
    }
    a.tf = 0;
    a.ff = 0;
  });

  // Hammock: duration calc from constraints
  acts.filter(a => a.actType === 'Hammock').forEach(a => {
    let earliest = null, latest = null;
    a._preds.forEach(p => {
      const pred = byId[p.id];
      if (pred) {
        const ef = parseDate(pred.ef);
        if (!earliest || ef < earliest) earliest = ef;
      }
    });
    a._succs.forEach(s => {
      const succ = byId[s.id];
      if (succ) {
        const es = parseDate(succ.es);
        if (!latest || (es && es > latest)) latest = es;
      }
    });
    if (earliest && latest) {
      a.es = a.start = fmtDate(nextWorkday(earliest, a.cal));
      a.ef = a.finish = fmtDate(prevWorkday(latest, a.cal));
      a.od = workdaysBetween(parseDate(a.es), parseDate(a.ef), a.cal);
      a.rd = Math.round(a.od * (1 - a.pct / 100));
    }
  });

  // Clean up temp
  acts.forEach(a => { delete a._preds; delete a._succs; });
}

// ============================================================
// UNDO SYSTEM
// ============================================================
function pushUndo() {
  const snap = JSON.stringify(STATE.activities.map(a => ({...a})));
  STATE.undoStack.push(snap);
  if (STATE.undoStack.length > 50) STATE.undoStack.shift();
}

function doUndo() {
  if (!STATE.undoStack.length) return;
  const snap = JSON.parse(STATE.undoStack.pop());
  STATE.activities = snap;
  schedule();
  render();
}

// ============================================================
// RENDER TABLE
// ============================================================
function buildHeader() {
  const tr = document.getElementById('table-header');
  tr.innerHTML = '';
  COLUMNS.forEach((col, ci) => {
    const th = document.createElement('th');
    th.textContent = col.label;
    th.style.width = col.width + 'px';
    th.style.minWidth = col.width + 'px';
    if (STATE.sortCol === col.key) {
      th.innerHTML += ` <span class="sort-arrow">${STATE.sortDir > 0 ? '▲' : '▼'}</span>`;
    }
    th.onclick = () => {
      if (STATE.sortCol === col.key) STATE.sortDir *= -1;
      else { STATE.sortCol = col.key; STATE.sortDir = 1; }
      render();
    };
    // Column resize
    const grip = document.createElement('div');
    grip.style.cssText = 'position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2';
    grip.onmousedown = (e) => {
      e.stopPropagation();
      e.preventDefault();
      const startX = e.clientX;
      const startW = col.width;
      const onMove = (ev) => {
        col.width = Math.max(40, startW + ev.clientX - startX);
        th.style.width = col.width + 'px';
        th.style.minWidth = col.width + 'px';
        // Update all cells in this column
        document.querySelectorAll(`#activity-table td[data-col="${ci}"]`).forEach(td => {
          td.style.width = col.width + 'px';
          td.style.minWidth = col.width + 'px';
        });
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    };
    // Freeze first 2 header cols
    if (ci < 2) {
      th.style.position = 'sticky';
      th.style.left = (ci === 0 ? 0 : COLUMNS[0].width) + 'px';
      th.style.zIndex = 12;
    }
    th.appendChild(grip);
    tr.appendChild(th);
  });
}

function getFilteredActivities() {
  let acts = STATE.activities;
  if (STATE.wbsFilter) {
    acts = acts.filter(a => a.wbs === STATE.wbsFilter || a.wbs.startsWith(STATE.wbsFilter + '.'));
  }
  if (STATE.sortCol) {
    acts = [...acts].sort((a, b) => {
      let va = a[STATE.sortCol], vb = b[STATE.sortCol];
      if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * STATE.sortDir;
      va = String(va || ''); vb = String(vb || '');
      return va.localeCompare(vb) * STATE.sortDir;
    });
  }
  return acts;
}

function renderTable() {
  filteredActivities = getFilteredActivities();
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  filteredActivities.forEach((act, ri) => {
    const tr = document.createElement('tr');
    tr.dataset.uid = act.uid;
    if (act.tf === 0 && act.actType !== 'Milestone' && act.pct < 100) tr.classList.add('critical');
    if (act.actType === 'Milestone') tr.classList.add('milestone');
    if (act.pct >= 100) tr.classList.add('completed');
    if (STATE.selectedRows.has(act.uid)) tr.classList.add('selected');

    tr.onclick = (e) => {
      if (e.shiftKey && STATE.selectedRows.size) {
        // Range select
        const lastSel = [...STATE.selectedRows].pop();
        const lastIdx = filteredActivities.findIndex(a => a.uid === lastSel);
        const curIdx = ri;
        const from = Math.min(lastIdx, curIdx), to = Math.max(lastIdx, curIdx);
        for (let i = from; i <= to; i++) STATE.selectedRows.add(filteredActivities[i].uid);
      } else if (e.ctrlKey || e.metaKey) {
        if (STATE.selectedRows.has(act.uid)) STATE.selectedRows.delete(act.uid);
        else STATE.selectedRows.add(act.uid);
      } else {
        STATE.selectedRows = new Set([act.uid]);
      }
      renderTable();
      renderBottomPanel();
      renderGantt();
    };

    tr.oncontextmenu = (e) => {
      e.preventDefault();
      STATE.selectedRows = new Set([act.uid]);
      renderTable();
      showContextMenu(e.clientX, e.clientY, act, ri);
    };

    COLUMNS.forEach((col, ci) => {
      const td = document.createElement('td');
      td.dataset.col = ci;
      td.style.width = col.width + 'px';
      td.style.minWidth = col.width + 'px';
      if (col.mono) td.classList.add('mono');
      if (col.editable) td.classList.add('editable');
      if (col.key === 'name') td.classList.add('name-cell');

      let val = act[col.key];
      if (col.key === 'start') val = fmtDateShort(act.start);
      else if (col.key === 'finish') val = fmtDateShort(act.finish);
      else if (col.key === 'cost') val = act.cost ? '$' + Number(act.cost).toLocaleString() : '';
      else if (col.key === 'pct') val = act.pct + '%';
      else if (col.key === 'tf' || col.key === 'ff') {
        val = act[col.key];
        if (val < 0) td.style.color = 'var(--red)';
        else if (val === 0) td.style.color = 'var(--red)';
      }
      td.textContent = val ?? '';

      if (col.editable) {
        td.ondblclick = () => startEdit(td, act, col, ci, ri);
      }

      // Freeze first 2 cols
      if (ci < 2) {
        td.style.position = 'sticky';
        td.style.left = (ci === 0 ? 0 : COLUMNS[0].width) + 'px';
        td.style.zIndex = ci === 0 ? 3 : 2;
        td.style.background = act.pct >= 100 ? 'var(--bg)' : (STATE.selectedRows.has(act.uid) ? 'var(--bg3)' : (ri % 2 ? 'var(--bg2)' : 'var(--bg)'));
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function startEdit(td, act, col, ci, ri) {
  if (editingCell) commitEdit();
  const rect = td.getBoundingClientRect();
  const parentRect = td.offsetParent.getBoundingClientRect();

  td.style.position = 'relative';
  const input = document.createElement('input');
  input.className = 'cell-edit' + (col.mono ? ' mono' : '');

  if (col.key === 'actType') {
    const sel = document.createElement('select');
    sel.className = 'cell-edit';
    ['Task','Milestone','LOE','Hammock'].forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      if (act[col.key] === t) o.selected = true;
      sel.appendChild(o);
    });
    td.appendChild(sel);
    sel.focus();
    editingCell = {el: sel, act, col, td};
    sel.onchange = () => commitEdit();
    sel.onblur = () => setTimeout(() => { if (editingCell && editingCell.el === sel) commitEdit(); }, 100);
    return;
  }

  if (col.key === 'cal') {
    const sel = document.createElement('select');
    sel.className = 'cell-edit';
    [5,6,7].forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v + 'd';
      if (act.cal == v) o.selected = true;
      sel.appendChild(o);
    });
    td.appendChild(sel);
    sel.focus();
    editingCell = {el: sel, act, col, td};
    sel.onchange = () => commitEdit();
    sel.onblur = () => setTimeout(() => { if (editingCell && editingCell.el === sel) commitEdit(); }, 100);
    return;
  }

  let val = act[col.key];
  if (col.key === 'pct') val = act.pct;
  if (col.key === 'cost') val = act.cost || '';
  input.value = val ?? '';
  if (col.type === 'number') input.type = 'number';

  td.appendChild(input);
  input.focus();
  input.select();
  editingCell = {el: input, act, col, td};

  input.onkeydown = (e) => {
    if (e.key === 'Enter') { commitEdit(); e.preventDefault(); }
    else if (e.key === 'Escape') { cancelEdit(); e.preventDefault(); }
    else if (e.key === 'Tab') {
      e.preventDefault();
      commitEdit();
      // Move to next editable cell
      const nextCol = e.shiftKey ? findPrevEditable(ci) : findNextEditable(ci);
      if (nextCol >= 0) {
        const row = td.parentElement;
        const nextTd = row.children[nextCol];
        if (nextTd) {
          const nextAct = act;
          const nextColDef = COLUMNS[nextCol];
          startEdit(nextTd, nextAct, nextColDef, nextCol, ri);
        }
      }
    }
  };
  input.onblur = () => {
    setTimeout(() => { if (editingCell && editingCell.el === input) commitEdit(); }, 100);
  };
}

function findNextEditable(ci) {
  for (let i = ci + 1; i < COLUMNS.length; i++) if (COLUMNS[i].editable) return i;
  return -1;
}
function findPrevEditable(ci) {
  for (let i = ci - 1; i >= 0; i--) if (COLUMNS[i].editable) return i;
  return -1;
}

function commitEdit() {
  if (!editingCell) return;
  const {el, act, col, td} = editingCell;
  const val = el.value;
  editingCell = null;
  el.remove();

  pushUndo();
  if (col.type === 'number') {
    act[col.key] = parseFloat(val) || 0;
  } else {
    act[col.key] = val;
  }

  // Special handling
  if (col.key === 'od') {
    act.od = Math.max(0, parseInt(val) || 0);
    if (act.actType === 'Milestone') act.od = 0;
    if (!act._rdManual) act.rd = Math.round(act.od * (1 - act.pct / 100));
  }
  if (col.key === 'rd') {
    act.rd = Math.max(0, parseInt(val) || 0);
    act._rdManual = true;
  }
  if (col.key === 'pct') {
    act.pct = Math.min(100, Math.max(0, parseFloat(val) || 0));
    if (!act._rdManual) act.rd = Math.max(0, Math.round(act.od * (1 - act.pct / 100)));
    if (act.pct >= 100) { act.rd = 0; }
  }
  if (col.key === 'actType') {
    if (val === 'Milestone') { act.od = 0; act.rd = 0; }
  }
  if (col.key === 'cal') {
    act.cal = parseInt(val) || 5;
  }

  addLog(`Edited ${act.id} ${col.label}: "${val}"`);
  schedule();
  render();
  autoSave();
}

function cancelEdit() {
  if (!editingCell) return;
  editingCell.el.remove();
  editingCell = null;
}

// ============================================================
// CONTEXT MENU
// ============================================================
function showContextMenu(x, y, act, ri) {
  closeAllMenus();
  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';

  const items = [
    {label: 'Insert Activity Above', fn: () => insertActivity(ri, 'above')},
    {label: 'Insert Activity Below', fn: () => insertActivity(ri, 'below')},
    {label: 'Insert Milestone', fn: () => insertMilestone(ri)},
    {sep: true},
    {label: 'Delete Activity', fn: () => deleteActivity(act)},
    {sep: true},
    {label: 'Set as Critical Constraint', fn: () => { act.tf = 0; schedule(); render(); }},
    {label: act.actType === 'Milestone' ? 'Convert to Task' : 'Mark as Milestone', fn: () => {
      pushUndo();
      act.actType = act.actType === 'Milestone' ? 'Task' : 'Milestone';
      if (act.actType === 'Milestone') { act.od = 0; act.rd = 0; }
      schedule(); render(); autoSave();
    }},
    {sep: true},
    {label: 'Set Baseline', fn: () => {
      act.baseline = {start: act.start, finish: act.finish};
      addLog(`Baseline set for ${act.id}`);
      render(); autoSave();
    }},
    {label: 'Clear Baseline', fn: () => { act.baseline = null; render(); autoSave(); }},
    {sep: true},
    {label: 'Set 100% Complete', fn: () => {
      pushUndo();
      act.pct = 100; act.rd = 0;
      act.actualStart = act.actualStart || act.start;
      act.actualFinish = act.actualFinish || act.finish;
      schedule(); render(); autoSave();
    }},
  ];

  items.forEach(item => {
    if (item.sep) {
      const d = document.createElement('div');
      d.className = 'ctx-sep';
      menu.appendChild(d);
    } else {
      const d = document.createElement('div');
      d.textContent = item.label;
      d.onclick = () => { closeAllMenus(); item.fn(); };
      menu.appendChild(d);
    }
  });

  document.body.appendChild(menu);

  // Adjust if off screen
  const mr = menu.getBoundingClientRect();
  if (mr.right > window.innerWidth) menu.style.left = (x - mr.width) + 'px';
  if (mr.bottom > window.innerHeight) menu.style.top = (y - mr.height) + 'px';

  setTimeout(() => {
    document.addEventListener('click', closeAllMenus, {once: true});
  }, 10);
}

function closeAllMenus() {
  document.querySelectorAll('.ctx-menu').forEach(m => m.remove());
  document.querySelectorAll('.dropdown-content.show').forEach(m => m.classList.remove('show'));
}

// ============================================================
// ACTIVITY OPERATIONS
// ============================================================
function addActivity() {
  pushUndo();
  const a = createActivity({
    id: 'A' + String(STATE.nextId).padStart(4, '0'),
    name: 'New Activity',
    od: 5, rd: 5, wbs: '1.0'
  });
  STATE.activities.push(a);
  addLog(`Added activity ${a.id}`);
  schedule();
  render();
  autoSave();
}

function addMilestone() {
  pushUndo();
  const a = createActivity({
    id: 'M' + String(STATE.nextId).padStart(4, '0'),
    name: 'New Milestone',
    od: 0, rd: 0, actType: 'Milestone', wbs: '1.0'
  });
  STATE.activities.push(a);
  addLog(`Added milestone ${a.id}`);
  schedule();
  render();
  autoSave();
}

function insertActivity(ri, pos) {
  pushUndo();
  const idx = STATE.activities.indexOf(filteredActivities[ri]);
  const a = createActivity({
    id: 'A' + String(STATE.nextId).padStart(4, '0'),
    name: 'New Activity',
    od: 5, rd: 5, wbs: filteredActivities[ri]?.wbs || '1.0'
  });
  STATE.activities.splice(pos === 'above' ? idx : idx + 1, 0, a);
  addLog(`Inserted activity ${a.id}`);
  schedule();
  render();
  autoSave();
}

function insertMilestone(ri) {
  pushUndo();
  const idx = STATE.activities.indexOf(filteredActivities[ri]);
  const a = createActivity({
    id: 'M' + String(STATE.nextId).padStart(4, '0'),
    name: 'New Milestone',
    od: 0, rd: 0, actType: 'Milestone', wbs: filteredActivities[ri]?.wbs || '1.0'
  });
  STATE.activities.splice(idx + 1, 0, a);
  schedule(); render(); autoSave();
}

function deleteActivity(act) {
  if (!confirm(`Delete ${act.id} - ${act.name}?`)) return;
  pushUndo();
  STATE.activities = STATE.activities.filter(a => a.uid !== act.uid);
  // Remove from predecessors
  STATE.activities.forEach(a => {
    const preds = parsePreds(a.preds);
    const filtered = preds.filter(p => p.id !== act.id);
    a.preds = buildPredStr(filtered);
  });
  STATE.selectedRows.delete(act.uid);
  addLog(`Deleted activity ${act.id}`);
  schedule(); render(); autoSave();
}

// ============================================================
// GANTT CHART RENDERING (Canvas)
// ============================================================
let ganttDragState = null;

function getGanttRange() {
  if (!filteredActivities.length || !STATE.projectStart) {
    const s = parseDate(STATE.projectStart || today());
    return {start: s, end: dateAdd(s, 90), days: 90};
  }
  let minD = parseDate(STATE.projectStart);
  let maxD = dateAdd(minD, 30);
  filteredActivities.forEach(a => {
    if (a.start) { const d = parseDate(a.start); if (d < minD) minD = d; }
    if (a.finish) { const d = parseDate(a.finish); if (d > maxD) maxD = d; }
    if (a.baseline) {
      if (a.baseline.start) { const d = parseDate(a.baseline.start); if (d < minD) minD = d; }
      if (a.baseline.finish) { const d = parseDate(a.baseline.finish); if (d > maxD) maxD = d; }
    }
    // Show float extension
    if (a.lf) { const d = parseDate(a.lf); if (d > maxD) maxD = d; }
  });
  minD = dateAdd(minD, -7);
  maxD = dateAdd(maxD, 14);
  const days = daysBetween(minD, maxD);
  return {start: minD, end: maxD, days: Math.max(days, 30)};
}

function dateToX(date, range) {
  return daysBetween(range.start, date) * zoomLevel;
}

function xToDate(x, range) {
  const days = Math.round(x / zoomLevel);
  return dateAdd(range.start, days);
}

function renderGanttHeader() {
  const canvas = document.getElementById('gantt-header-canvas');
  const container = document.getElementById('gantt-header');
  const ganttBody = document.getElementById('gantt-body');
  const range = getGanttRange();
  const totalW = range.days * zoomLevel;

  canvas.width = Math.max(totalW, container.clientWidth);
  canvas.height = HEADER_H;
  canvas.style.width = canvas.width + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Sync scroll
  canvas.style.marginLeft = -ganttBody.scrollLeft + 'px';

  const startDate = new Date(range.start);

  if (zoomLevel >= 18) {
    // Month / Day view
    // Top row: months
    ctx.fillStyle = '#12121a';
    ctx.fillRect(0, 0, canvas.width, 22);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(0, 22, canvas.width, 22);

    let d = new Date(startDate);
    let lastMonth = -1;
    let monthStart = 0;

    for (let i = 0; i <= range.days; i++) {
      const x = i * zoomLevel;
      const curDate = dateAdd(startDate, i);
      const m = curDate.getMonth();

      if (m !== lastMonth) {
        if (lastMonth >= 0) {
          ctx.fillStyle = '#6e6e80';
          ctx.font = '11px system-ui';
          ctx.textAlign = 'left';
          const mName = dateAdd(startDate, i - 1).toLocaleString('en', {month: 'short', year: '2-digit'});
          ctx.fillText(mName, monthStart + 4, 15);
          ctx.strokeStyle = '#2a2a3d';
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 22); ctx.stroke();
        }
        monthStart = x;
        lastMonth = m;
      }

      // Bottom row: days
      const day = curDate.getDay();
      const isWE = (STATE.calendarDays == 5 && (day === 0 || day === 6)) ||
                   (STATE.calendarDays == 6 && day === 0);
      if (isWE) {
        ctx.fillStyle = 'rgba(42,42,61,0.5)';
        ctx.fillRect(x, 22, zoomLevel, 22);
      }

      ctx.strokeStyle = '#2a2a3d';
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(x, 22); ctx.lineTo(x, HEADER_H); ctx.stroke();

      if (zoomLevel >= 22) {
        ctx.fillStyle = isWE ? '#4a4a5d' : '#6e6e80';
        ctx.font = '9px ' + (typeof getComputedStyle !== 'undefined' ? 'ui-monospace,monospace' : 'monospace');
        ctx.textAlign = 'center';
        ctx.fillText(curDate.getDate(), x + zoomLevel / 2, 38);
      }
    }
    // Last month label
    const mName = dateAdd(startDate, range.days).toLocaleString('en', {month: 'short', year: '2-digit'});
    ctx.fillStyle = '#6e6e80';
    ctx.font = '11px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(mName, monthStart + 4, 15);
  } else {
    // Week / Month view (zoomed out)
    ctx.fillStyle = '#12121a';
    ctx.fillRect(0, 0, canvas.width, 22);
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(0, 22, canvas.width, 22);

    let lastMonth = -1, monthStart = 0;
    for (let i = 0; i <= range.days; i++) {
      const x = i * zoomLevel;
      const curDate = dateAdd(startDate, i);
      const m = curDate.getMonth();
      const day = curDate.getDay();

      if (m !== lastMonth) {
        if (lastMonth >= 0) {
          ctx.strokeStyle = '#2a2a3d';
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 22); ctx.stroke();
          ctx.fillStyle = '#6e6e80';
          ctx.font = '10px system-ui';
          ctx.textAlign = 'left';
          const mName = dateAdd(startDate, i - 1).toLocaleString('en', {month: 'short', year: 'numeric'});
          ctx.fillText(mName, monthStart + 3, 14);
        }
        monthStart = x;
        lastMonth = m;
      }

      // Week lines
      if (day === 1) {
        ctx.strokeStyle = '#2a2a3d';
        ctx.beginPath(); ctx.moveTo(x, 22); ctx.lineTo(x, HEADER_H); ctx.stroke();
        if (zoomLevel >= 10) {
          ctx.fillStyle = '#6e6e80';
          ctx.font = '9px monospace';
          ctx.textAlign = 'left';
          ctx.fillText(curDate.getDate() + '', x + 2, 37);
        }
      }
    }
  }
}

function renderGantt() {
  const canvas = document.getElementById('gantt-canvas');
  const container = document.getElementById('gantt-body');
  const range = getGanttRange();
  const totalW = Math.max(range.days * zoomLevel, container.clientWidth);
  const totalH = Math.max(filteredActivities.length * ROW_H, container.clientHeight);

  canvas.width = totalW;
  canvas.height = totalH;
  canvas.style.width = totalW + 'px';
  canvas.style.height = totalH + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, totalW, totalH);

  // Weekend shading
  for (let i = 0; i < range.days; i++) {
    const curDate = dateAdd(range.start, i);
    const day = curDate.getDay();
    const isWE = (STATE.calendarDays == 5 && (day === 0 || day === 6)) ||
                 (STATE.calendarDays == 6 && day === 0);
    if (isWE) {
      ctx.fillStyle = 'rgba(42,42,61,0.15)';
      ctx.fillRect(i * zoomLevel, 0, zoomLevel, totalH);
    }
  }

  // Row alternating + grid lines
  filteredActivities.forEach((act, ri) => {
    const y = ri * ROW_H;
    if (ri % 2 === 1) {
      ctx.fillStyle = 'rgba(18,18,26,0.5)';
      ctx.fillRect(0, y, totalW, ROW_H);
    }
    ctx.strokeStyle = 'rgba(42,42,61,0.3)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0, y + ROW_H); ctx.lineTo(totalW, y + ROW_H); ctx.stroke();
  });

  // Data date line
  if (STATE.dataDate) {
    const ddX = dateToX(parseDate(STATE.dataDate), range);
    ctx.strokeStyle = '#f7c948';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 3]);
    ctx.beginPath(); ctx.moveTo(ddX, 0); ctx.lineTo(ddX, totalH); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Today line
  const todayX = dateToX(new Date(), range);
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(todayX, 0); ctx.lineTo(todayX, totalH); ctx.stroke();
  ctx.setLineDash([]);

  // Draw dependency arrows first (behind bars)
  const byId = {};
  filteredActivities.forEach((a, i) => { byId[a.id] = {act: a, idx: i}; });

  filteredActivities.forEach((act, ri) => {
    const preds = parsePreds(act.preds);
    preds.forEach(p => {
      const pred = byId[p.id];
      if (!pred) return;
      drawArrow(ctx, pred.act, pred.idx, act, ri, p.type, range);
    });
  });

  // Draw bars
  filteredActivities.forEach((act, ri) => {
    const y = ri * ROW_H;
    const barY = y + 6;
    const barH = ROW_H - 12;

    if (!act.start || !act.finish) return;

    const startX = dateToX(parseDate(act.start), range);
    const finishX = dateToX(parseDate(act.finish), range) + zoomLevel;

    // Baseline bar
    if (act.baseline && act.baseline.start && act.baseline.finish) {
      const bsX = dateToX(parseDate(act.baseline.start), range);
      const bfX = dateToX(parseDate(act.baseline.finish), range) + zoomLevel;
      ctx.fillStyle = 'rgba(110,110,128,0.25)';
      ctx.fillRect(bsX, barY + barH - 3, bfX - bsX, 4);
    }

    // Float line
    if (act.tf > 0 && act.lf) {
      const lfX = dateToX(parseDate(act.lf), range) + zoomLevel;
      ctx.strokeStyle = 'rgba(110,110,128,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(finishX, y + ROW_H / 2);
      ctx.lineTo(lfX, y + ROW_H / 2);
      ctx.stroke();
    }

    if (act.actType === 'Milestone') {
      // Diamond
      const cx = startX + zoomLevel / 2;
      const cy = y + ROW_H / 2;
      const s = 7;
      ctx.fillStyle = act.pct >= 100 ? '#6e6e80' : '#f7c948';
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s, cy);
      ctx.lineTo(cx, cy + s);
      ctx.lineTo(cx - s, cy);
      ctx.closePath();
      ctx.fill();
      if (STATE.selectedRows.has(act.uid)) {
        ctx.strokeStyle = '#ff6b35';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    } else {
      const barW = Math.max(finishX - startX, 4);
      const isCritical = act.tf === 0 && act.pct < 100;
      const isComplete = act.pct >= 100;

      // Bar background
      ctx.fillStyle = isComplete ? '#3a3a4d' : (isCritical ? 'rgba(239,68,68,0.3)' : 'rgba(96,165,250,0.3)');
      ctx.beginPath();
      ctx.roundRect(startX, barY, barW, barH, 2);
      ctx.fill();

      // Bar border
      ctx.strokeStyle = isComplete ? '#6e6e80' : (isCritical ? '#ef4444' : '#60a5fa');
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(startX, barY, barW, barH, 2);
      ctx.stroke();

      // Progress fill
      if (act.pct > 0) {
        const pW = barW * (act.pct / 100);
        ctx.fillStyle = isComplete ? '#6e6e80' : (isCritical ? '#ef4444' : '#60a5fa');
        ctx.beginPath();
        ctx.roundRect(startX, barY, pW, barH, 2);
        ctx.fill();
      }

      // Selected highlight
      if (STATE.selectedRows.has(act.uid)) {
        ctx.strokeStyle = '#ff6b35';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(startX - 1, barY - 1, barW + 2, barH + 2, 3);
        ctx.stroke();
      }

      // Activity name if zoomed in enough
      if (zoomLevel >= 16 && barW > 50) {
        ctx.fillStyle = '#f0f0f0';
        ctx.font = '10px system-ui';
        ctx.textAlign = 'left';
        ctx.save();
        ctx.beginPath();
        ctx.rect(startX + 2, barY, barW - 4, barH);
        ctx.clip();
        ctx.fillText(act.name, startX + 4, barY + barH - 2);
        ctx.restore();
      }
    }
  });

  renderGanttHeader();
}

function drawArrow(ctx, predAct, predIdx, succAct, succIdx, type, range) {
  if (!predAct.start || !predAct.finish || !succAct.start || !succAct.finish) return;

  const predStartX = dateToX(parseDate(predAct.start), range);
  const predFinishX = dateToX(parseDate(predAct.finish), range) + zoomLevel;
  const succStartX = dateToX(parseDate(succAct.start), range);
  const succFinishX = dateToX(parseDate(succAct.finish), range) + zoomLevel;

  const predY = predIdx * ROW_H + ROW_H / 2;
  const succY = succIdx * ROW_H + ROW_H / 2;

  let fromX, toX;
  switch (type) {
    case 'FS': fromX = predFinishX; toX = succStartX; break;
    case 'SS': fromX = predStartX; toX = succStartX; break;
    case 'FF': fromX = predFinishX; toX = succFinishX; break;
    case 'SF': fromX = predStartX; toX = succFinishX; break;
    default: fromX = predFinishX; toX = succStartX;
  }

  const isCritical = predAct.tf === 0 && succAct.tf === 0;
  ctx.strokeStyle = isCritical ? 'rgba(239,68,68,0.6)' : 'rgba(96,165,250,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(fromX, predY);

  if (succIdx > predIdx) {
    // Going down
    ctx.lineTo(fromX + 6, predY);
    ctx.lineTo(fromX + 6, succY - 4);
    if (fromX + 6 < toX) {
      ctx.lineTo(toX, succY - 4);
      ctx.lineTo(toX, succY);
    } else {
      ctx.lineTo(fromX + 6, succY);
      ctx.lineTo(toX, succY);
    }
  } else if (succIdx < predIdx) {
    // Going up
    ctx.lineTo(fromX + 6, predY);
    ctx.lineTo(fromX + 6, succY + 4);
    if (fromX + 6 < toX) {
      ctx.lineTo(toX, succY + 4);
      ctx.lineTo(toX, succY);
    } else {
      ctx.lineTo(fromX + 6, succY);
      ctx.lineTo(toX, succY);
    }
  } else {
    ctx.lineTo(toX, succY);
  }
  ctx.stroke();

  // Arrowhead
  const aSize = 4;
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(toX, succY);
  ctx.lineTo(toX - aSize, succY - aSize);
  ctx.lineTo(toX - aSize, succY + aSize);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// GANTT INTERACTIONS
// ============================================================
function setupGanttInteractions() {
  const canvas = document.getElementById('gantt-canvas');
  const container = document.getElementById('gantt-body');
  const tooltip = document.getElementById('tooltip');

  // Hover tooltip
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + container.scrollLeft;
    const my = e.clientY - rect.top + container.scrollTop;
    const ri = Math.floor(my / ROW_H);
    const range = getGanttRange();

    if (ri >= 0 && ri < filteredActivities.length) {
      const act = filteredActivities[ri];
      if (act.start && act.finish) {
        const startX = dateToX(parseDate(act.start), range);
        const finishX = dateToX(parseDate(act.finish), range) + zoomLevel;
        if (mx >= startX - 8 && mx <= finishX + 8) {
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY + 12) + 'px';
          // Adjust if off screen
          if (e.clientX + 320 > window.innerWidth) tooltip.style.left = (e.clientX - 310) + 'px';
          if (e.clientY + 200 > window.innerHeight) tooltip.style.top = (e.clientY - 180) + 'px';

          tooltip.innerHTML = `
            <div class="tt-title">${act.id} - ${act.name}</div>
            <div class="tt-row"><span class="tt-label">Type:</span><span class="tt-val">${act.actType}</span></div>
            <div class="tt-row"><span class="tt-label">Duration:</span><span class="tt-val">${act.od}d (${act.rd}d rem)</span></div>
            <div class="tt-row"><span class="tt-label">Start:</span><span class="tt-val">${fmtDateShort(act.start)}</span></div>
            <div class="tt-row"><span class="tt-label">Finish:</span><span class="tt-val">${fmtDateShort(act.finish)}</span></div>
            <div class="tt-row"><span class="tt-label">% Complete:</span><span class="tt-val">${act.pct}%</span></div>
            <div class="tt-row"><span class="tt-label">Total Float:</span><span class="tt-val" style="color:${act.tf===0?'var(--red)':'var(--text)'}">${act.tf}d</span></div>
            <div class="tt-row"><span class="tt-label">Free Float:</span><span class="tt-val">${act.ff}d</span></div>
            ${act.resource ? `<div class="tt-row"><span class="tt-label">Resource:</span><span class="tt-val">${act.resource}</span></div>` : ''}
            ${act.cost ? `<div class="tt-row"><span class="tt-label">Cost:</span><span class="tt-val">$${Number(act.cost).toLocaleString()}</span></div>` : ''}
            <div class="tt-row"><span class="tt-label">WBS:</span><span class="tt-val">${act.wbs}</span></div>
            ${act.preds ? `<div class="tt-row"><span class="tt-label">Predecessors:</span><span class="tt-val">${act.preds}</span></div>` : ''}
          `;

          // Check for drag resize cursor
          if (act.actType !== 'Milestone') {
            if (Math.abs(mx - finishX) < 6) {
              canvas.style.cursor = 'ew-resize';
            } else if (mx >= startX && mx <= finishX) {
              canvas.style.cursor = 'grab';
            } else {
              canvas.style.cursor = 'default';
            }
          }
          return;
        }
      }
    }
    tooltip.style.display = 'none';
    canvas.style.cursor = 'default';
  };

  canvas.onmouseleave = () => {
    tooltip.style.display = 'none';
  };

  // Drag to move/resize bars
  canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + container.scrollLeft;
    const my = e.clientY - rect.top + container.scrollTop;
    const ri = Math.floor(my / ROW_H);
    const range = getGanttRange();

    if (ri >= 0 && ri < filteredActivities.length) {
      const act = filteredActivities[ri];
      if (act.start && act.finish && act.actType !== 'Milestone') {
        const startX = dateToX(parseDate(act.start), range);
        const finishX = dateToX(parseDate(act.finish), range) + zoomLevel;

        if (Math.abs(mx - finishX) < 6) {
          // Resize (change duration)
          ganttDragState = {act, mode: 'resize', startMouseX: mx, origDur: act.od, range};
          pushUndo();
        } else if (mx >= startX && mx <= finishX) {
          // Move (change start date)
          ganttDragState = {act, mode: 'move', startMouseX: mx, origStart: act.start, range};
          pushUndo();
          STATE.selectedRows = new Set([act.uid]);
          renderTable();
        }
      }
    }
  };

  canvas.addEventListener('mousemove', (e) => {
    if (!ganttDragState) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + container.scrollLeft;
    const dx = mx - ganttDragState.startMouseX;
    const daysDelta = Math.round(dx / zoomLevel);

    if (ganttDragState.mode === 'resize') {
      ganttDragState.act.od = Math.max(1, ganttDragState.origDur + daysDelta);
      ganttDragState.act.rd = Math.round(ganttDragState.act.od * (1 - ganttDragState.act.pct / 100));
      schedule();
      renderTable();
      renderGantt();
    } else if (ganttDragState.mode === 'move') {
      // Remove predecessors constraint temporarily to allow manual move
      // Actually, just let the user see the visual feedback
      schedule();
      renderTable();
      renderGantt();
    }
  });

  document.addEventListener('mouseup', () => {
    if (ganttDragState) {
      ganttDragState = null;
      schedule();
      render();
      autoSave();
    }
  });

  // Click to select
  canvas.onclick = (e) => {
    if (ganttDragState) return;
    const rect = canvas.getBoundingClientRect();
    const my = e.clientY - rect.top + container.scrollTop;
    const ri = Math.floor(my / ROW_H);
    if (ri >= 0 && ri < filteredActivities.length) {
      const act = filteredActivities[ri];
      STATE.selectedRows = new Set([act.uid]);
      renderTable();
      renderBottomPanel();
      renderGantt();
      // Scroll table to match
      const tableRow = document.querySelector(`tr[data-uid="${act.uid}"]`);
      if (tableRow) tableRow.scrollIntoView({block: 'nearest'});
    }
  };

  // Zoom
  container.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -2 : 2;
      zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel + delta));
      STATE.zoomLevel = zoomLevel;
      renderGantt();
    }
  }, {passive: false});

  // Sync scroll between table and gantt
  const tableWrap = document.getElementById('table-wrap');
  container.addEventListener('scroll', () => {
    tableWrap.scrollTop = container.scrollTop;
    renderGanttHeader();
  });
  tableWrap.addEventListener('scroll', () => {
    container.scrollTop = tableWrap.scrollTop;
  });
}

  document.querySelectorAll('#bottom-tabs button').forEach((b, i) => {

}

function updateDetail(uid, key, val) {
  const act = STATE.activities.find(a => a.uid == uid);
  if (!act) return;
  pushUndo();
  act[key] = val;
  if (key === 'od') {
    act.od = Math.max(0, parseInt(val) || 0);
    if (!act._rdManual) act.rd = Math.round(act.od * (1 - act.pct / 100));
  }
  if (key === 'rd') { act._rdManual = true; }
  if (key === 'pct') {
    act.pct = Math.min(100, Math.max(0, parseFloat(val) || 0));
    if (!act._rdManual) act.rd = Math.max(0, Math.round(act.od * (1 - act.pct / 100)));
    if (act.pct >= 100) act.rd = 0;
  }
  if (key === 'actType' && val === 'Milestone') { act.od = 0; act.rd = 0; }
  addLog(`Updated ${act.id} ${key}: "${val}"`);
  schedule();
  render();
  autoSave();
}

function removePred(uid, predId) {
  const act = STATE.activities.find(a => a.uid == uid);
  if (!act) return;
  pushUndo();
  const preds = parsePreds(act.preds).filter(p => p.id !== predId);
  act.preds = buildPredStr(preds);
  addLog(`Removed predecessor ${predId} from ${act.id}`);
  schedule(); render(); autoSave();
}

function addPredFromPanel(uid) {
  const act = STATE.activities.find(a => a.uid == uid);
  if (!act) return;
  const id = document.getElementById('new-pred-id').value.trim();
  const type = document.getElementById('new-pred-type').value;
  const lag = parseInt(document.getElementById('new-pred-lag').value) || 0;
  if (!id) return;
  pushUndo();
  const preds = parsePreds(act.preds);
  preds.push({id, type, lag});
  act.preds = buildPredStr(preds);
  addLog(`Added predecessor ${id}${type}${lag?'+'+lag:''} to ${act.id}`);
  schedule(); render(); autoSave();
}

function addResource() {
  const name = document.getElementById('new-res-name').value.trim();
  const type = document.getElementById('new-res-type').value;
  const rate = parseFloat(document.getElementById('new-res-rate').value) || 0;
  if (!name) return;
  STATE.resources.push({name, type, rate});
  addLog(`Added resource: ${name}`);
  renderBottomPanel();
  autoSave();
}

function removeResource(i) {
  STATE.resources.splice(i, 1);
  renderBottomPanel();
  autoSave();
}

function addLog(msg) {
  STATE.log.push({time: new Date().toLocaleString(), msg});
  if (STATE.log.length > 200) STATE.log.shift();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================================
// STATUS BAR
// ============================================================
function updateStatusBar() {
  const acts = STATE.activities.filter(a => a.actType !== 'Milestone');
  const mils = STATE.activities.filter(a => a.actType === 'Milestone');

  // Project duration
  let minS = null, maxF = null;
  STATE.activities.forEach(a => {
    if (a.start) { const d = parseDate(a.start); if (!minS || d < minS) minS = d; }
    if (a.finish) { const d = parseDate(a.finish); if (!maxF || d > maxF) maxF = d; }
  });
  const projDur = (minS && maxF) ? workdaysBetween(minS, maxF, STATE.calendarDays) : 0;
  document.getElementById('stat-duration').textContent = projDur + 'd';
  document.getElementById('stat-activities').textContent = STATE.activities.length;
  document.getElementById('stat-critical').textContent = STATE.activities.filter(a => a.tf === 0 && a.pct < 100).length;

  const totalW = STATE.activities.reduce((s, a) => s + (a.od || 0), 0);
  const doneW = STATE.activities.reduce((s, a) => s + (a.od || 0) * (a.pct / 100), 0);
  const overallPct = totalW ? Math.round(doneW / totalW * 100) : 0;
  document.getElementById('stat-complete').textContent = overallPct + '%';

  const totalCost = STATE.activities.reduce((s, a) => s + (a.cost || 0), 0);
  document.getElementById('stat-cost').textContent = '$' + totalCost.toLocaleString();
  document.getElementById('stat-datadate').textContent = STATE.dataDate ? fmtDateShort(STATE.dataDate) : '-';
}

// ============================================================
// WBS FILTER
// ============================================================
function updateWBSFilter() {
  const sel = document.getElementById('wbs-filter');
  const codes = new Set();
  STATE.activities.forEach(a => {
    if (a.wbs) {
      const parts = a.wbs.split('.');
      let acc = '';
      parts.forEach((p, i) => {
        acc += (i ? '.' : '') + p;
        codes.add(acc);
      });
    }
  });
  const sorted = [...codes].sort();
  sel.innerHTML = '<option value="">All</option>';
  sorted.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === STATE.wbsFilter) o.selected = true;
    sel.appendChild(o);
  });
}

function applyWBSFilter() {
  STATE.wbsFilter = document.getElementById('wbs-filter').value;
  render();
}

function toggleDropdown(id) {
  closeAllMenus();
  const dd = document.getElementById(id);

    setTimeout(() => document.addEventListener('click', closeAllMenus, {once: true}), 10);

// ============================================================
// RESIZE PANELS
// ============================================================
function setupResizers() {
  // Horizontal resize (table | gantt)
  const rh = document.getElementById('resize-h');
  const tp = document.getElementById('table-panel');
  rh.onmousedown = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = tp.offsetWidth;
    const onMove = (ev) => {
      tp.style.width = Math.max(200, startW + ev.clientX - startX) + 'px';
      renderGantt();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };

  // Vertical resize (workspace | bottom)
  const rv = document.getElementById('resize-v');
  const bp = document.getElementById('bottom-panel');
  rv.onmousedown = (e) => {
    e.preventDefault();
    const startY = e.clientY;
    const startH = bp.offsetHeight;
    const onMove = (ev) => {
      bp.style.height = Math.max(50, startH - (ev.clientY - startY)) + 'px';
      renderGantt();
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
}

// ============================================================

// ============================================================
function saveProject() {
  const projects = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  if (!STATE.projectId) STATE.projectId = 'proj_' + Date.now();
  projects[STATE.projectId] = {
    projectId: STATE.projectId,
    projectName: STATE.projectName,
    projectStart: STATE.projectStart,
    dataDate: STATE.dataDate,
    calendarDays: STATE.calendarDays,
    holidays: STATE.holidays,
    activities: STATE.activities,
    resources: STATE.resources,
    baselines: STATE.baselines,
    nextId: STATE.nextId,
    log: STATE.log.slice(-100),
    zoomLevel: zoomLevel,
    savedAt: new Date().toISOString()
  };
  localStorage.setItem(LS_KEY, JSON.stringify(projects));
  addLog('Project saved');
  updateProjectsDropdown();
  renderBottomPanel();
}

function autoSave() {
  clearTimeout(autoSave._timer);
  autoSave._timer = setTimeout(saveProject, 2000);
}

function loadProject(pid) {
  const projects = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  const p = projects[pid];
  if (!p) return;
  STATE.projectId = p.projectId;
  STATE.projectName = p.projectName;
  STATE.projectStart = p.projectStart;
  STATE.dataDate = p.dataDate;

function deleteProject(pid) {
  if (!confirm('Delete this project?')) return;
  const projects = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  delete projects[pid];
  localStorage.setItem(LS_KEY, JSON.stringify(projects));
  updateProjectsDropdown();
}

function updateProjectsDropdown() {
  const dd = document.getElementById('proj-dd');
  const projects = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  dd.innerHTML = '<div onclick="newProject()">+ New Project</div><div class="dd-sep"></div>';
  Object.entries(projects).forEach(([pid, p]) => {
    const d = document.createElement('div');
    d.style.display = 'flex';
    d.style.justifyContent = 'space-between';
    d.style.alignItems = 'center';
    d.innerHTML = `<span>${esc(p.projectName)}</span><span style="font-size:10px;color:var(--dim)">${new Date(p.savedAt).toLocaleDateString()}</span>`;
    d.onclick = (e) => { e.stopPropagation(); closeAllMenus(); loadProject(pid); };
    dd.appendChild(d);
  });
}

function importJSON() {
  const fi = document.getElementById('file-input');
  fi.accept = '.json';
  fi.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        STATE.projectName = data.projectName || 'Imported';
        STATE.projectStart = data.projectStart || today();
        STATE.dataDate = data.dataDate || today();
        STATE.calendarDays = data.calendarDays || 5;
        STATE.holidays = data.holidays || [];
        STATE.activities = (data.activities || []).map(a => createActivity(a));
        STATE.resources = data.resources || [];
        STATE.nextId = Math.max(...STATE.activities.map(a => a.uid), 0) + 1;

        document.getElementById('project-name').value = STATE.projectName;
        document.getElementById('project-start').value = STATE.projectStart;
        document.getElementById('data-date').value = STATE.dataDate;
        document.getElementById('calendar-sel').value = STATE.calendarDays;

        schedule();
        render();
        addLog('Imported JSON project');
        autoSave();
      } catch (err) {
        alert('Error parsing JSON: ' + err.message);
      }
    };
    reader.readAsText(f);
    fi.value = '';
  };
  fi.click();
}

function importCSV() {
  const fi = document.getElementById('file-input');
  fi.accept = '.csv';
  fi.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const lines = ev.target.result.split('\n').map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) { alert('CSV must have header + data'); return; }
        const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/['"]/g, ''));
        const idIdx = headers.findIndex(h => h.includes('id') || h.includes('activity'));
        const nameIdx = headers.findIndex(h => h.includes('name') || h.includes('description'));
        const durIdx = headers.findIndex(h => h.includes('dur'));
        const predIdx = headers.findIndex(h => h.includes('pred'));
        const wbsIdx = headers.findIndex(h => h.includes('wbs'));

        if (idIdx < 0 && nameIdx < 0) { alert('CSV needs at least Activity ID or Name column'); return; }

        STATE.activities = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);
          const a = createActivity({
            id: (idIdx >= 0 ? cols[idIdx] : 'A' + String(i).padStart(4, '0')).trim(),
            name: (nameIdx >= 0 ? cols[nameIdx] : 'Activity ' + i).trim(),
            od: durIdx >= 0 ? (parseInt(cols[durIdx]) || 5) : 5,
            preds: predIdx >= 0 ? (cols[predIdx] || '').trim() : '',
            wbs: wbsIdx >= 0 ? (cols[wbsIdx] || '1.0').trim() : '1.0'
          });
          a.rd = a.od;
          STATE.activities.push(a);
        }
        STATE.nextId = STATE.activities.length + 1;
        schedule();
        render();
        addLog('Imported CSV with ' + STATE.activities.length + ' activities');
        autoSave();
      } catch (err) {
        alert('Error parsing CSV: ' + err.message);
      }
    };
    reader.readAsText(f);
    fi.value = '';
  };
  fi.click();
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; continue; }
    if (c === ',' && !inQuotes) { result.push(current); current = ''; continue; }
    current += c;
  }
  result.push(current);
  return result;
}

function exportCSV() {
