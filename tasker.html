}

function exportXER() {
  // Simplified XER format
  let xer = 'ERMHDR\t11.0\n';
  xer += '%T\tPROJECT\n';
  xer += '%F\tproj_id\tproj_short_name\tproj_name\n';
  xer += `%R\t1\t${STATE.projectName}\t${STATE.projectName}\n`;

  xer += '%T\tCALENDAR\n';
  xer += '%F\tclndr_id\tclndr_name\tday_hr_cnt\tweek_hr_cnt\n';
  xer += `%R\t1\t${STATE.calendarDays}d Calendar\t8\t${STATE.calendarDays * 8}\n`;

  xer += '%T\tTASK\n';
  xer += '%F\ttask_id\ttask_code\ttask_name\ttarget_drtn_hr_cnt\tremain_drtn_hr_cnt\tphys_complete_pct\ttarget_start_date\ttarget_end_date\ttotal_float_hr_cnt\tfree_float_hr_cnt\n';
  STATE.activities.forEach((a, i) => {
    xer += `%R\t${i+1}\t${a.id}\t${a.name}\t${a.od * 8}\t${a.rd * 8}\t${a.pct}\t${fmtDate(a.start)}\t${fmtDate(a.finish)}\t${a.tf * 8}\t${a.ff * 8}\n`;
  });

  xer += '%T\tTASKPRED\n';
  xer += '%F\ttask_pred_id\ttask_id\tpred_task_id\tpred_type\tlag_hr_cnt\n';
  let predId = 1;
  STATE.activities.forEach((a, i) => {
    parsePreds(a.preds).forEach(p => {
      const pi = STATE.activities.findIndex(x => x.id === p.id);
      if (pi >= 0) {
        xer += `%R\t${predId++}\t${i+1}\t${pi+1}\tPR_${p.type}\t${p.lag * 8}\n`;
      }
    });
  });

  xer += '%T\tTASKRSRC\n';
  xer += '%F\ttaskrsrc_id\ttask_id\trsrc_name\ttarget_cost\n';
  STATE.activities.forEach((a, i) => {
    if (a.resource) {
      xer += `%R\t${i+1}\t${i+1}\t${a.resource}\t${a.cost||0}\n`;
    }
  });

  xer += '%E\n';
  downloadFile(STATE.projectName + '.xer', xer, 'text/plain');
}

function exportMSXML() {
  let xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
  xml += '<Project xmlns="http://schemas.microsoft.com/project">\n';
  xml += `  <Name>${esc(STATE.projectName)}</Name>\n`;
  xml += `  <StartDate>${STATE.projectStart}T08:00:00</StartDate>\n`;
  xml += '  <Tasks>\n';
  STATE.activities.forEach((a, i) => {
    xml += '    <Task>\n';
    xml += `      <UID>${i+1}</UID>\n`;
    xml += `      <ID>${i+1}</ID>\n`;
    xml += `      <Name>${esc(a.name)}</Name>\n`;
    xml += `      <Duration>PT${a.od * 8}H0M0S</Duration>\n`;
    xml += `      <Start>${fmtDate(a.start)}T08:00:00</Start>\n`;
    xml += `      <Finish>${fmtDate(a.finish)}T17:00:00</Finish>\n`;
    xml += `      <PercentComplete>${a.pct}</PercentComplete>\n`;
    xml += `      <Milestone>${a.actType === 'Milestone' ? 1 : 0}</Milestone>\n`;
    xml += `      <WBS>${a.wbs}</WBS>\n`;
    xml += `      <TotalSlack>${a.tf * 4800}</TotalSlack>\n`;
    if (a.cost) xml += `      <Cost>${a.cost}</Cost>\n`;
    xml += '    </Task>\n';
  });
  xml += '  </Tasks>\n';

  // Links
  xml += '  <Links>\n';
  let linkId = 1;
  STATE.activities.forEach((a, i) => {
    parsePreds(a.preds).forEach(p => {
      const pi = STATE.activities.findIndex(x => x.id === p.id);
      if (pi >= 0) {
        const typeMap = {FS: 1, FF: 0, SS: 3, SF: 2};
        xml += '    <Link>\n';
        xml += `      <PredecessorUID>${pi+1}</PredecessorUID>\n`;
        xml += `      <SuccessorUID>${i+1}</SuccessorUID>\n`;
        xml += `      <Type>${typeMap[p.type] || 1}</Type>\n`;
        if (p.lag) xml += `      <LinkLag>${p.lag * 4800}</LinkLag>\n`;
        xml += '    </Link>\n';
      }
    });
  });
  xml += '  </Links>\n';
  xml += '</Project>\n';
  downloadFile(STATE.projectName + '.xml', xml, 'application/xml');
}

function copyClipboard() {
  let text = 'ID\tName\tDuration\tStart\tFinish\tFloat\tPredecessors\tResource\tWBS\n';
  STATE.activities.forEach(a => {
    text += `${a.id}\t${a.name}\t${a.od}d\t${fmtDateShort(a.start)}\t${fmtDateShort(a.finish)}\t${a.tf}d\t${a.preds}\t${a.resource}\t${a.wbs}\n`;
  });
  navigator.clipboard.writeText(text).then(() => addLog('Copied to clipboard'));
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

function buildTemplatesDropdown() {
  const dd = document.getElementById('tmpl-dd');
  dd.innerHTML = '';
  Object.keys(TEMPLATES).forEach(name => {
    const d = document.createElement('div');
    d.textContent = name;
    d.onclick = () => { closeAllMenus(); loadTemplate(name); };
    dd.appendChild(d);
  });
}

function loadTemplate(name) {
  const tmpl = TEMPLATES[name];
  if (!tmpl) return;

  if (STATE.activities.length > 0 && !confirm(`Load template "${name}"? This will replace current activities.`)) return;

  STATE.projectName = name;
  STATE.calendarDays = tmpl.calendarDays || 5;
  STATE.projectStart = today();
  STATE.dataDate = today();
  STATE.activities = tmpl.activities.map(a => createActivity({
    ...a,
    cal: tmpl.calendarDays || 5
  }));
  STATE.resources = [];
  STATE.nextId = STATE.activities.length + 100;
  STATE.undoStack = [];
  STATE.selectedRows = new Set();

  document.getElementById('project-name').value = STATE.projectName;
  document.getElementById('project-start').value = STATE.projectStart;
  document.getElementById('data-date').value = STATE.dataDate;
  document.getElementById('calendar-sel').value = STATE.calendarDays;

  addLog(`Loaded template: ${name}`);
  schedule();
  render();
  autoSave();
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
function setupKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (editingCell) return;

    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (STATE.selectedRows.size && !document.activeElement.matches('input,textarea,select')) {
        e.preventDefault();
        const uids = [...STATE.selectedRows];
        uids.forEach(uid => {
          const act = STATE.activities.find(a => a.uid === uid);
          if (act) deleteActivity(act);
        });
      }
    }

    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      doUndo();
    }

    // Arrow nav
    if (e.key === 'ArrowDown' && STATE.selectedRows.size === 1) {
      e.preventDefault();
      const uid = [...STATE.selectedRows][0];
      const idx = filteredActivities.findIndex(a => a.uid === uid);
      if (idx < filteredActivities.length - 1) {
        STATE.selectedRows = new Set([filteredActivities[idx + 1].uid]);
        renderTable();
        renderBottomPanel();
        renderGantt();
      }
    }
    if (e.key === 'ArrowUp' && STATE.selectedRows.size === 1) {
      e.preventDefault();
      const uid = [...STATE.selectedRows][0];
      const idx = filteredActivities.findIndex(a => a.uid === uid);
      if (idx > 0) {
        STATE.selectedRows = new Set([filteredActivities[idx - 1].uid]);
        renderTable();
        renderBottomPanel();
        renderGantt();
      }
    }
  });
}

// ============================================================
// RENDER ALL
// ============================================================
function render() {
  buildHeader();
  renderTable();
  renderGantt();
  renderBottomPanel();
  updateStatusBar();
  updateWBSFilter();
}

// ============================================================
// INIT
// ============================================================
// ============================================================
// ZOOM & BASELINE CONTROLS
// ============================================================
function zoomIn() {
  zoomLevel = Math.min(MAX_ZOOM, zoomLevel + 4);
  STATE.zoomLevel = zoomLevel;
  renderGantt();
}

function zoomOut() {
  zoomLevel = Math.max(MIN_ZOOM, zoomLevel - 4);
  STATE.zoomLevel = zoomLevel;
  renderGantt();
}

function zoomFit() {
  const container = document.getElementById('gantt-body');
  const range = getGanttRange();
  if (range.days > 0) {
    zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, Math.floor(container.clientWidth / range.days)));
    STATE.zoomLevel = zoomLevel;
    renderGantt();
  }
}

function setAllBaselines() {
  STATE.activities.forEach(a => {
    a.baseline = {start: a.start, finish: a.finish};
  });
  addLog('Set baselines for all activities');
  renderGantt();
  autoSave();
}

function clearAllBaselines() {
  STATE.activities.forEach(a => { a.baseline = null; });
  addLog('Cleared all baselines');
  renderGantt();
  autoSave();
}

function init() {
  // Set defaults
  STATE.projectStart = today();
  STATE.dataDate = today();
  document.getElementById('project-start').value = STATE.projectStart;
  document.getElementById('data-date').value = STATE.dataDate;

  // Bind toolbar inputs
  document.getElementById('project-name').oninput = (e) => {
    STATE.projectName = e.target.value;
    autoSave();
  };
  document.getElementById('project-start').onchange = (e) => {
    STATE.projectStart = e.target.value;
    schedule(); render(); autoSave();
  };
  document.getElementById('data-date').onchange = (e) => {
    STATE.dataDate = e.target.value;
    render(); autoSave();
  };
  document.getElementById('calendar-sel').onchange = (e) => {
    STATE.calendarDays = parseInt(e.target.value);
    STATE.activities.forEach(a => { a.cal = STATE.calendarDays; });
    schedule(); render(); autoSave();
  };

  setupResizers();
  setupGanttInteractions();
  setupKeyboard();
  buildTemplatesDropdown();
  updateProjectsDropdown();

  // Try to restore last project
  const projects = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
  const pids = Object.keys(projects);
  if (pids.length > 0) {
    // Load most recent
    let latest = pids[0];
    pids.forEach(pid => {
      if (projects[pid].savedAt > projects[latest].savedAt) latest = pid;
    });
    loadProject(latest);
  } else {
    // Load default template
    loadTemplate('Residential Construction');
  }

  // Handle window resize
  window.addEventListener('resize', () => {
    renderGantt();
  });
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

init();
