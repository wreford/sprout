<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Atomic — one unified surface for ACT + ACE</title>
<style>
:root{
  --bg:#0a0a0f; --panel:#0f0f16; --panel2:#141420; --border:#22222e; --border2:#3a3a48;
  --text:#f5f5f7; --dim:#8a8a94; --faint:#4a4a56;
  --oxide:#a8401f; --oxide2:#d05a2a;
  --violet:#bf5af2; --violet2:#8b3fd4; --amber:#ffcc00; --red:#ff375f; --green:#30d158; --blue:#5aa0ff;
  --disp:'Fraunces',Georgia,serif;
  --serif:'Newsreader',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}
input,button,select,textarea{font-family:inherit;color:inherit}
button{background:none;border:none;cursor:pointer}

/* ══════════════════════════════════════════════════════════════ */
/* TOP BAR                                                        */
/* ══════════════════════════════════════════════════════════════ */
.top{
  flex-shrink:0;height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:linear-gradient(180deg,#0f0f18,#0a0a0f);
  border-bottom:1px solid var(--border);gap:10px;position:relative;z-index:10
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand .sym{
  width:30px;height:30px;position:relative;flex-shrink:0;
  background:radial-gradient(circle at 30% 30%,var(--violet),var(--violet2) 60%,#1a0530);
  border-radius:50%;box-shadow:0 0 12px rgba(191,90,242,.35),inset 0 -2px 4px rgba(0,0,0,.4)
}
.brand .sym::before{
  content:"";position:absolute;inset:5px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.4);
  border-color:rgba(255,255,255,.4) rgba(255,255,255,.1) rgba(255,255,255,.4) rgba(255,255,255,.1);
  transform:rotate(0deg);animation:orbit 5s linear infinite
}
.brand .sym::after{
  content:"";position:absolute;inset:5px;border-radius:50%;
  border:1.5px dashed rgba(255,255,255,.2);transform:rotate(60deg)
}
@keyframes orbit{to{transform:rotate(360deg)}}
.brand .lock{display:flex;flex-direction:column;line-height:1}
.brand .lock .name{font-family:var(--disp);font-weight:900;font-size:18px;letter-spacing:.03em}
.brand .lock .tag{font-family:var(--mono);font-size:9px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;margin-top:2px}
.brand .lock .name .a{color:var(--oxide2)}
.brand a{text-decoration:none;color:inherit;display:flex;align-items:center;gap:10px}
.brand .home{color:var(--dim);font-family:var(--mono);font-size:12px;margin-right:8px}
.brand .home:hover{color:var(--text)}

.top-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.icon-btn{
  width:36px;height:36px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:transform .1s
}
.icon-btn:hover{border-color:var(--border2)}
.icon-btn:active{transform:scale(.94)}
.icon-btn.on{background:linear-gradient(135deg,var(--violet),var(--red));border-color:transparent}

/* ══════════════════════════════════════════════════════════════ */
/* TAB STRIP                                                      */
/* ══════════════════════════════════════════════════════════════ */
.tabs{
  flex-shrink:0;display:flex;overflow-x:auto;overflow-y:hidden;
  background:var(--panel);border-bottom:1px solid var(--border);
  scrollbar-width:none
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:120px;padding:12px 12px;background:none;color:var(--dim);
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  position:relative;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:color .15s,background .15s;border-right:1px solid var(--border)
}
.tab:last-child{border-right:none}
.tab:hover{color:var(--text);background:rgba(191,90,242,.04)}
.tab.active{color:var(--text);background:linear-gradient(180deg,rgba(191,90,242,.14),rgba(191,90,242,.03))}
.tab.active::after{
  content:"";position:absolute;bottom:0;left:14%;right:14%;height:2px;
  background:linear-gradient(90deg,var(--violet),var(--red));border-radius:2px 2px 0 0
}
.tab .ico{font-size:14px}
.tab .lbl{font-weight:600;letter-spacing:.08em}
.tab .sub{color:var(--faint);font-size:9px;letter-spacing:.1em;font-weight:400;display:none}
@media(min-width:900px){.tab{flex-direction:column;gap:2px;padding:10px 10px 8px} .tab .sub{display:block}}
@media(max-width:600px){.tab{min-width:0;padding:10px 8px;flex:0 0 auto} .tab .sub{display:none}}

/* ══════════════════════════════════════════════════════════════ */
/* CONTENT                                                        */
/* ══════════════════════════════════════════════════════════════ */
.stage{
  flex:1;position:relative;background:#000;overflow:hidden;
  display:flex;align-items:stretch
}
.stage iframe{
  width:100%;height:100%;border:none;background:#000;flex:1
}

/* Loader */
.loader{
  position:absolute;inset:0;background:var(--bg);z-index:5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  opacity:1;transition:opacity .3s;pointer-events:none
}
.loader.hide{opacity:0}
.loader .ring{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(191,90,242,.15);
  border-top-color:var(--violet);
  animation:spin 1s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}

/* ══════════════════════════════════════════════════════════════ */
/* HOME (dashboard) — shown when no tab active                    */
/* ══════════════════════════════════════════════════════════════ */
.home-view{
  position:absolute;inset:0;overflow-y:auto;padding:0;
  background:radial-gradient(1200px 500px at 20% -10%,rgba(168,64,31,.10),transparent 60%),radial-gradient(1000px 400px at 90% 20%,rgba(191,90,242,.10),transparent 60%),var(--bg);
  display:none
}
.home-view.show{display:block}
.home-wrap{max-width:920px;margin:0 auto;padding:56px 24px 96px}
.home-eye{font-family:var(--mono);font-size:11px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.home-eye::before{content:"";width:22px;height:1px;background:var(--oxide2)}
.home-view h1{font-family:var(--disp);font-weight:900;font-size:clamp(42px,7vw,72px);line-height:.98;letter-spacing:-.02em;margin-bottom:20px}
.home-view h1 .grad{background:linear-gradient(135deg,var(--oxide2) 0%,var(--violet) 50%,var(--red) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-view h1 em{font-style:italic;font-weight:500;color:var(--dim)}
.home-view .lede{color:var(--dim);font-size:clamp(15px,2vw,17px);line-height:1.7;max-width:720px;margin-bottom:44px}
.home-view .lede b{color:var(--text);font-weight:500}
.home-view .lede code{font-family:var(--mono);font-size:.9em;background:var(--panel);padding:1px 6px;border-radius:4px;border:1px solid var(--border);color:var(--amber)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{
  position:relative;background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:22px 22px 18px;text-decoration:none;color:inherit;overflow:hidden;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  display:flex;flex-direction:column;min-height:200px;cursor:pointer
}
.card::before{
  content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
  background:linear-gradient(135deg,var(--c,transparent) 0%,transparent 50%);opacity:.08;transition:opacity .25s
}
.card:hover{transform:translateY(-3px);border-color:#3a3a48;box-shadow:0 12px 32px rgba(0,0,0,.35)}
.card:hover::before{opacity:.16}
.card .num{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between}
.card .num .kind{color:var(--c)}
.card h3{font-family:var(--disp);font-size:22px;font-weight:600;letter-spacing:-.01em;margin-bottom:8px;color:var(--text)}
.card p{color:var(--dim);font-size:13.5px;line-height:1.55;flex:1;font-family:var(--sans)}
.card .foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
.card .foot .go{color:var(--c,var(--text))}
.card .foot .tag{color:var(--dim)}

.home-strip{margin-top:56px;padding-top:24px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:20px;justify-content:space-between}
.home-strip h4{font-family:var(--mono);font-size:11px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.home-strip .kbd{font-family:var(--mono);font-size:11px;background:var(--panel2);border:1px solid var(--border);padding:3px 8px;border-radius:5px;color:var(--text);margin-right:4px}
.home-strip .item{font-family:var(--mono);font-size:12px;color:var(--dim);line-height:1.9}
.home-strip .item b{color:var(--text)}

footer{
  margin-top:56px;padding:20px 0;font-family:var(--mono);font-size:10.5px;color:var(--dim);
  text-align:center;border-top:1px solid var(--border)
}
footer a{color:var(--dim);text-decoration:none;border-bottom:1px solid transparent}
footer a:hover{color:var(--text);border-color:var(--dim)}

/* Palette command bar */
.palette-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:80;
  display:none;align-items:flex-start;justify-content:center;padding-top:12vh
}
.palette-bg.show{display:flex}
.palette{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  width:min(560px,92vw);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6)
}
.palette input{
  width:100%;background:transparent;border:none;padding:16px 18px;font-size:16px;
  color:var(--text);border-bottom:1px solid var(--border);outline:none
}
.palette input::placeholder{color:var(--faint)}
.palette-list{max-height:50vh;overflow-y:auto}
.palette-item{
  display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;
  font-family:var(--mono);font-size:13px;color:var(--text);border-left:2px solid transparent
}
.palette-item .ico{width:24px;text-align:center;color:var(--dim);font-size:15px}
.palette-item .lb{flex:1}
.palette-item .lb b{color:var(--text)}
.palette-item .lb span{color:var(--dim);font-size:11px}
.palette-item .kbd{font-family:var(--mono);font-size:10px;background:var(--panel2);border:1px solid var(--border);padding:2px 6px;border-radius:4px;color:var(--dim)}
.palette-item.active,.palette-item:hover{background:rgba(191,90,242,.1);border-left-color:var(--violet)}

/* Fullscreen mode: hide chrome */
body.fs .top,body.fs .tabs{display:none}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <a href="/" class="home" title="Home">←</a>
    <div class="sym"></div>
    <div class="lock">
      <div class="name"><span class="a">ATOMIC</span></div>
      <div class="tag">ACT + ACE unified</div>
    </div>
  </div>
  <div class="top-r">
    <button class="icon-btn" id="cmd-btn" title="Command palette (Ctrl+K)">⌘</button>
    <button class="icon-btn" id="fs-btn" title="Full screen this tab (F)">⛶</button>
    <button class="icon-btn" id="open-btn" title="Open in new tab">↗</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="stage" id="stage">
  <div class="loader" id="loader"><div class="ring"></div><div class="lbl">Loading…</div></div>
  <div class="home-view show" id="home"></div>
  <iframe id="frame" src="about:blank" allow="camera; microphone; fullscreen; clipboard-write"></iframe>
</div>

<div class="palette-bg" id="palette-bg"><div class="palette">
  <input type="text" id="palette-input" placeholder="Jump to a view… (theory, engine, X, gpu…)" autocomplete="off">
  <div class="palette-list" id="palette-list"></div>
</div></div>

<script>
(() => {
'use strict';

// ═══════════════════════════════════════════════════════════════
// TABS — the six ACT/ACE surfaces, unified.
// ═══════════════════════════════════════════════════════════════
const TABS = [
  { id: 'home',       label: 'Home',       sub: 'overview',   icon: '⌂',  url: null },
  { id: 'theory',     label: 'Theory',     sub: 'ACT paper',  icon: '📖', url: '/act/',                       kind: 'Essay',    color: '#d05a2a', desc: 'Atomic Constraint Theory — the paper, section by section, with live exhibits. Read the model before you run it.' },
  { id: 'engine',     label: 'Engine',     sub: 'ACE 3.0',    icon: '⚙',  url: '/jtm/ace/ace.html',           kind: 'App',      color: '#bf5af2', desc: 'ACE 3.0 — the working engine. Four views: Plan (Gantt), Forecast (Monte Carlo), Constraints, Explore. All state is in-memory atoms.' },
  { id: 'video',      label: 'X',          sub: 'ACE-X reel', icon: '🎬', url: '/media/ace-x.html',           kind: 'Video',    color: '#ff375f', desc: 'ACE-X — 2:30 rendered composition. Real settle math, real CPM, real Monte Carlo. Every frame is pure(frame) → pixels.' },
  { id: 'ace3',       label: 'Estimate',   sub: 'ACE 3',      icon: '📊', url: '/jtm/ace3.html',              kind: 'App',      color: '#ffcc00', desc: 'ACE 3 — earlier working prototype with estimating flow. Load, edit, export.' },
  { id: 'gpu',        label: 'GPU',        sub: 'ace-gpu',    icon: '🖥',  url: '/jtm/ace-gpu.html',           kind: 'Demo',     color: '#5aa0ff', desc: 'GPU-accelerated ACE demo — parallel solve with WebGL2 compute passes.' },
  { id: 'parametric', label: 'Parametric', sub: 'ace-param',  icon: '📐', url: '/jtm/ace-parametric.html',    kind: 'Demo',     color: '#30d158', desc: 'Parametric ACE — scenes as JSON where objects place by constraints, not coordinates.' },
  { id: 'reference',  label: 'Reference',  sub: 'ACT ref',    icon: '📚', url: '/jtm/act-reference.html',     kind: 'Essay',    color: '#a8401f', desc: 'ACT reference — the field guide. Terms, canonical operators, worked examples.' },
];

const state = {
  activeId: 'home',
  loaded: new Set(),
};

const $ = id => document.getElementById(id);
const tabsEl = $('tabs'), frame = $('frame'), loader = $('loader'), home = $('home');

// ═══════════════════════════════════════════════════════════════
// TAB RENDERING
// ═══════════════════════════════════════════════════════════════
function renderTabs() {
  tabsEl.innerHTML = '';
  TABS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'tab' + (state.activeId === t.id ? ' active' : '');
    b.dataset.id = t.id;
    b.innerHTML = `<div class="ico">${t.icon}</div><div class="lbl">${t.label}</div>` +
                  (t.sub ? `<div class="sub">${t.sub}</div>` : '');
    b.addEventListener('click', () => activate(t.id));
    tabsEl.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════════════════
// HOME (dashboard)
// ═══════════════════════════════════════════════════════════════
function renderHome() {
  const cards = TABS.filter(t => t.id !== 'home');
  home.innerHTML = `
    <div class="home-wrap">
      <div class="home-eye">Unified surface · one shell, six tools</div>
      <h1>The <span class="grad">atomic</span><br><em>constraint stack.</em></h1>
      <p class="lede">
        <b>ACT</b> is the theory — atoms with two link types, one settle, one graph. <b>ACE</b> is the engine that runs it — plan, forecast, constrain, explore. <b>ACE-X</b> is what it looks like when you render the math to pixels. This shell puts every surface behind one <code>⌘K</code> and one shared brand.
      </p>
      <div class="grid" id="home-grid"></div>
      <div class="home-strip">
        <div>
          <h4>Shortcuts</h4>
          <div class="item"><span class="kbd">⌘K</span> command palette</div>
          <div class="item"><span class="kbd">1</span>–<span class="kbd">7</span> jump to tab</div>
          <div class="item"><span class="kbd">F</span> full-screen active tab</div>
          <div class="item"><span class="kbd">Esc</span> home</div>
        </div>
        <div>
          <h4>Deep links</h4>
          <div class="item"><b>#theory</b> / <b>#engine</b> / <b>#video</b></div>
          <div class="item"><b>#ace3</b> / <b>#gpu</b> / <b>#parametric</b> / <b>#reference</b></div>
        </div>
        <div>
          <h4>The atom</h4>
          <div class="item">id · name · type · kind</div>
          <div class="item">tags · requires · contains</div>
          <div class="item">everything else is a view</div>
        </div>
      </div>
      <footer>atomic · taskiap.com · <a href="/">taskiap</a> · <a href="/media/">media</a> · <a href="/jtm/">jtm</a></footer>
    </div>`;
  const grid = home.querySelector('#home-grid');
  cards.forEach((t, i) => {
    const el = document.createElement('a');
    el.className = 'card'; el.style.setProperty('--c', t.color);
    el.href = '#' + t.id;
    el.innerHTML = `
      <div class="num"><span>${String(i+1).padStart(2,'0')} · <span class="kind">${t.kind}</span></span><span>${t.icon}</span></div>
      <h3>${t.label} <span style="color:var(--dim);font-family:var(--mono);font-size:11px;font-weight:400">· ${t.sub}</span></h3>
      <p>${t.desc}</p>
      <div class="foot"><span class="go">open ↗</span><span class="tag">${t.url ? t.url.replace(/^\//,'') : ''}</span></div>
    `;
    el.addEventListener('click', ev => { ev.preventDefault(); activate(t.id); });
    grid.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
// ACTIVATE (switch to a tab)
// ═══════════════════════════════════════════════════════════════
function activate(id) {
  const tab = TABS.find(t => t.id === id);
  if (!tab) return;
  state.activeId = id;
  history.replaceState(null, '', '#' + id);
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  if (id === 'home') {
    home.classList.add('show');
    frame.style.display = 'none';
    loader.classList.add('hide');
    return;
  }
  home.classList.remove('show');
  frame.style.display = 'block';
  // Show loader only if this tab hasn't been loaded yet
  if (!state.loaded.has(id)) {
    loader.classList.remove('hide');
    frame.addEventListener('load', () => {
      state.loaded.add(id);
      loader.classList.add('hide');
    }, { once: true });
    frame.src = tab.url;
  } else {
    // Just swap src (or if already this src, do nothing)
    if (frame.src !== new URL(tab.url, location.href).href) {
      loader.classList.remove('hide');
      frame.addEventListener('load', () => { loader.classList.add('hide'); }, { once: true });
      frame.src = tab.url;
    } else {
      loader.classList.add('hide');
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// COMMAND PALETTE
// ═══════════════════════════════════════════════════════════════
const palBg = $('palette-bg'), palInput = $('palette-input'), palList = $('palette-list');
let palIdx = 0, palItems = [];
function openPalette() {
  palBg.classList.add('show');
  palInput.value = ''; palInput.focus();
  paintPalette('');
}
function closePalette() { palBg.classList.remove('show'); }
function paintPalette(q) {
  const query = q.toLowerCase().trim();
  palItems = TABS.filter(t => {
    if (!query) return true;
    return (t.label + ' ' + t.sub + ' ' + t.id).toLowerCase().includes(query);
  });
  palIdx = 0;
  palList.innerHTML = '';
  palItems.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'palette-item' + (i === 0 ? ' active' : '');
    el.innerHTML = `<div class="ico">${t.icon}</div><div class="lb"><b>${t.label}</b> <span>· ${t.sub}</span></div><div class="kbd">${i+1}</div>`;
    el.addEventListener('click', () => { activate(t.id); closePalette(); });
    palList.appendChild(el);
  });
}
palInput.addEventListener('input', e => paintPalette(e.target.value));
palInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePalette(); return; }
  if (e.key === 'ArrowDown') { palIdx = Math.min(palItems.length - 1, palIdx + 1); repaintActive(); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { palIdx = Math.max(0, palIdx - 1); repaintActive(); e.preventDefault(); }
  else if (e.key === 'Enter') {
    if (palItems[palIdx]) { activate(palItems[palIdx].id); closePalette(); }
  }
});
function repaintActive() {
  const items = palList.querySelectorAll('.palette-item');
  items.forEach((el, i) => el.classList.toggle('active', i === palIdx));
  items[palIdx]?.scrollIntoView({ block: 'nearest' });
}
palBg.addEventListener('click', ev => { if (ev.target === palBg) closePalette(); });
$('cmd-btn').addEventListener('click', openPalette);

// ═══════════════════════════════════════════════════════════════
// TOP-BAR ACTIONS
// ═══════════════════════════════════════════════════════════════
$('open-btn').addEventListener('click', () => {
  const t = TABS.find(x => x.id === state.activeId);
  if (t?.url) window.open(t.url, '_blank');
});
$('fs-btn').addEventListener('click', () => {
  document.body.classList.toggle('fs');
  $('fs-btn').classList.toggle('on');
});

// ═══════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
  // Command palette
  if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
    e.preventDefault(); openPalette(); return;
  }
  // If typing in inputs, ignore
  if (e.target.matches('input, textarea, select') && e.target !== palInput) return;
  // Number keys → tab index
  if (/^[1-9]$/.test(e.key)) {
    const idx = parseInt(e.key, 10) - 1;
    if (TABS[idx]) activate(TABS[idx].id);
  }
  // Escape → home
  else if (e.key === 'Escape') {
    if (palBg.classList.contains('show')) closePalette();
    else if (document.body.classList.contains('fs')) { document.body.classList.remove('fs'); $('fs-btn').classList.remove('on'); }
    else activate('home');
  }
  // F → fullscreen
  else if (e.key === 'f' || e.key === 'F') {
    if (state.activeId !== 'home') { document.body.classList.toggle('fs'); $('fs-btn').classList.toggle('on'); }
  }
});

// ═══════════════════════════════════════════════════════════════
// URL HASH ROUTING
// ═══════════════════════════════════════════════════════════════
function routeFromHash() {
  const id = (location.hash || '#home').slice(1);
  if (TABS.find(t => t.id === id)) activate(id);
  else activate('home');
}
window.addEventListener('hashchange', routeFromHash);

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderTabs();
renderHome();
routeFromHash();

})();
</script>
