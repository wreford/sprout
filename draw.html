<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>TaskIAP Draw 🎨</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:#1a1a1c;font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;color:#f0f0f0;touch-action:none}
    body{display:flex;flex-direction:column}

    #toolbar{background:#111113;border-bottom:1px solid #2a2a2d;padding:8px 12px;display:flex;align-items:center;gap:8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
    #toolbar::-webkit-scrollbar{height:4px}
    #toolbar::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

    .tool-group{display:flex;align-items:center;gap:4px;flex-shrink:0}
    .tool-group+.tool-group{border-left:1px solid #333;padding-left:8px}

    .tbtn{background:#2a2a2d;border:1px solid #3a3a3d;color:#f0f0f0;border-radius:6px;padding:6px 10px;font-size:0.75rem;cursor:pointer;white-space:nowrap;transition:all 0.15s}
    .tbtn:hover{background:#3a3a3d;border-color:#4ade80}
    .tbtn.active{background:#4ade80;color:#111;border-color:#4ade80;font-weight:700}
    .tbtn:active{transform:scale(0.95)}

    .slider-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px}
    .slider-wrap label{font-size:0.55rem;color:#6e6e73;text-transform:uppercase;letter-spacing:0.05em}
    .slider-wrap input[type=range]{width:60px;height:4px;accent-color:#4ade80}

    #color-palette{display:flex;gap:3px;align-items:center}
    .color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color 0.15s,transform 0.15s}
    .color-swatch:hover{transform:scale(1.15)}
    .color-swatch.active{border-color:#fff;transform:scale(1.2)}
    #custom-color{width:22px;height:22px;border:none;background:none;cursor:pointer;border-radius:50%;overflow:hidden}
    #custom-color::-webkit-color-swatch-wrapper{padding:0}
    #custom-color::-webkit-color-swatch{border:2px solid #555;border-radius:50%}

    #canvas-wrap{flex:1;position:relative;overflow:hidden;background:#fff}
    #main-canvas,#grid-canvas,#preview-canvas{position:absolute;top:0;left:0}
    #grid-canvas{pointer-events:none;z-index:1}
    #preview-canvas{pointer-events:none;z-index:2}

    #stamp-picker,#text-input-wrap{display:none;position:absolute;z-index:10;background:#222;border:1px solid #444;border-radius:8px;padding:8px}
    #stamp-picker{gap:4px;flex-wrap:wrap;width:200px}
    .stamp-opt{font-size:1.5rem;cursor:pointer;padding:4px;border-radius:4px;transition:background 0.15s}
    .stamp-opt:hover{background:#333}
    .stamp-opt.active{background:#4ade80;border-radius:4px}

    #text-input-wrap{top:50%;left:50%;transform:translate(-50%,-50%)}
    #text-input-wrap input{background:#111;border:1px solid #4ade80;color:#fff;font-size:1rem;padding:6px 10px;border-radius:4px;width:200px}
    #text-input-wrap small{color:#6e6e73;font-size:0.6rem;display:block;margin-top:4px;text-align:center}

    @media(max-width:600px){
      #toolbar{padding:6px 8px;gap:6px}
      .tbtn{padding:5px 7px;font-size:0.65rem}
      .color-swatch{width:18px;height:18px}
      .slider-wrap input[type=range]{width:50px}
    }
  </style>
</head>
<body>

<div id="toolbar">
  <div class="tool-group" id="brush-tools">
    <button class="tbtn active" data-tool="pen">Pen</button>
    <button class="tbtn" data-tool="marker">Marker</button>
    <button class="tbtn" data-tool="eraser">Eraser</button>
    <button class="tbtn" data-tool="spray">Spray</button>
    <button class="tbtn" data-tool="rainbow">Rainbow</button>
    <button class="tbtn" data-tool="stamp">Stamp</button>
    <button class="tbtn" data-tool="text">Text</button>
  </div>

  <div class="tool-group" id="color-palette">
    <div class="color-swatch active" data-color="#000000" style="background:#000000"></div>
    <div class="color-swatch" data-color="#ffffff" style="background:#ffffff"></div>
    <div class="color-swatch" data-color="#ff0000" style="background:#ff0000"></div>
    <div class="color-swatch" data-color="#ff6600" style="background:#ff6600"></div>
    <div class="color-swatch" data-color="#ffcc00" style="background:#ffcc00"></div>
    <div class="color-swatch" data-color="#33cc33" style="background:#33cc33"></div>
    <div class="color-swatch" data-color="#0099ff" style="background:#0099ff"></div>
    <div class="color-swatch" data-color="#6633ff" style="background:#6633ff"></div>
    <div class="color-swatch" data-color="#ff33cc" style="background:#ff33cc"></div>
    <div class="color-swatch" data-color="#663300" style="background:#663300"></div>
    <div class="color-swatch" data-color="#336666" style="background:#336666"></div>
    <div class="color-swatch" data-color="#999999" style="background:#999999"></div>
    <input type="color" id="custom-color" value="#ff00ff" title="Custom color">
  </div>

  <div class="tool-group">
    <div class="slider-wrap">
      <label>Size</label>
      <input type="range" id="brush-size" min="1" max="50" value="5">
    </div>
    <div class="slider-wrap">
      <label>Opacity</label>
      <input type="range" id="brush-opacity" min="10" max="100" value="100">
    </div>
  </div>

  <div class="tool-group">
    <button class="tbtn" id="btn-undo">Undo</button>
    <button class="tbtn" id="btn-clear">Clear</button>
    <button class="tbtn" id="btn-fill">Fill BG</button>
    <button class="tbtn" id="btn-grid">Grid</button>
    <button class="tbtn" id="btn-symmetry">Mirror</button>
    <button class="tbtn" id="btn-save">Save</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="main-canvas"></canvas>
  <canvas id="grid-canvas"></canvas>
  <canvas id="preview-canvas"></canvas>

  <div id="stamp-picker"></div>
  <div id="text-input-wrap">
    <input type="text" id="text-input" placeholder="Type text...">
    <small>Press Enter to stamp</small>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('main-canvas');
  const ctx = canvas.getContext('2d');
  const gridCanvas = document.getElementById('grid-canvas');
  const gridCtx = gridCanvas.getContext('2d');
  const previewCanvas = document.getElementById('preview-canvas');
  const previewCtx = previewCanvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  let W, H;
  function resize(){
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    // Save current image
    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width = W; canvas.height = H;
    gridCanvas.width = W; gridCanvas.height = H;
    previewCanvas.width = W; previewCanvas.height = H;
    // Restore
    ctx.putImageData(imgData, 0, 0);
    if(showGrid) drawGrid();
  }
  resize();
  // Fill white initially
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  window.addEventListener('resize', resize);

  // State
  let currentTool = 'pen';
  let currentColor = '#000000';
  let brushSize = 5;
  let brushOpacity = 1.0;
  let showGrid = false;
  let symmetryMode = false;
  let rainbowHue = 0;
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let undoStack = [];
  let currentStamp = '⭐';
  const stamps = ['⭐','🌈','🔥','💀','🎵','❤️','🌸','🦋','🐱','🌍'];

  // Save state for undo
  function saveState(){
    undoStack.push(canvas.toDataURL());
    if(undoStack.length > 20) undoStack.shift();
  }

  // Tool buttons
  document.querySelectorAll('#brush-tools .tbtn').forEach(btn => {
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('#brush-tools .tbtn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentTool = btn.dataset.tool;
      hideStampPicker();
      hideTextInput();
      if(currentTool === 'stamp') showStampPicker();
    });
  });

  // Color palette
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', ()=>{
      document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      currentColor = sw.dataset.color;
    });
  });
  document.getElementById('custom-color').addEventListener('input', e=>{
    currentColor = e.target.value;
    document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
  });

  // Sliders
  document.getElementById('brush-size').addEventListener('input', e=>{ brushSize = parseInt(e.target.value); });
  document.getElementById('brush-opacity').addEventListener('input', e=>{ brushOpacity = parseInt(e.target.value)/100; });

  // Undo
  document.getElementById('btn-undo').addEventListener('click', ()=>{
    if(undoStack.length === 0) return;
    const img = new Image();
    img.onload = ()=>{
      ctx.clearRect(0,0,W,H);
      ctx.drawImage(img,0,0);
    };
    img.src = undoStack.pop();
  });

  // Clear
  document.getElementById('btn-clear').addEventListener('click', ()=>{
    saveState();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,W,H);
  });

  // Fill BG
  document.getElementById('btn-fill').addEventListener('click', ()=>{
    saveState();
    ctx.fillStyle = currentColor;
    ctx.fillRect(0,0,W,H);
  });

  // Grid
  function drawGrid(){
    gridCtx.clearRect(0,0,W,H);
    gridCtx.strokeStyle = 'rgba(180,180,180,0.3)';
    gridCtx.lineWidth = 0.5;
    const step = 40;
    for(let x=0;x<W;x+=step){ gridCtx.beginPath(); gridCtx.moveTo(x,0); gridCtx.lineTo(x,H); gridCtx.stroke(); }
    for(let y=0;y<H;y+=step){ gridCtx.beginPath(); gridCtx.moveTo(0,y); gridCtx.lineTo(W,y); gridCtx.stroke(); }
    // Center lines
    gridCtx.strokeStyle = 'rgba(180,180,180,0.5)';
    gridCtx.beginPath(); gridCtx.moveTo(W/2,0); gridCtx.lineTo(W/2,H); gridCtx.stroke();
    gridCtx.beginPath(); gridCtx.moveTo(0,H/2); gridCtx.lineTo(W,H/2); gridCtx.stroke();
  }
  document.getElementById('btn-grid').addEventListener('click', ()=>{
    showGrid = !showGrid;
    document.getElementById('btn-grid').classList.toggle('active', showGrid);
    if(showGrid) drawGrid(); else gridCtx.clearRect(0,0,W,H);
  });

  // Symmetry
  document.getElementById('btn-symmetry').addEventListener('click', ()=>{
    symmetryMode = !symmetryMode;
    document.getElementById('btn-symmetry').classList.toggle('active', symmetryMode);
  });

  // Save
  document.getElementById('btn-save').addEventListener('click', ()=>{
    const link = document.createElement('a');
    link.download = 'drawing.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // Stamp picker
  const stampPicker = document.getElementById('stamp-picker');
  stamps.forEach(s=>{
    const el = document.createElement('span');
    el.className = 'stamp-opt' + (s===currentStamp?' active':'');
    el.textContent = s;
    el.addEventListener('click', ()=>{
      document.querySelectorAll('.stamp-opt').forEach(o=>o.classList.remove('active'));
      el.classList.add('active');
      currentStamp = s;
    });
    stampPicker.appendChild(el);
  });
  function showStampPicker(){ stampPicker.style.display = 'flex'; stampPicker.style.top = '10px'; stampPicker.style.left = '10px'; }
  function hideStampPicker(){ stampPicker.style.display = 'none'; }

  // Text input
  const textWrap = document.getElementById('text-input-wrap');
  const textInput = document.getElementById('text-input');
  let textX=0, textY=0;
  function hideTextInput(){ textWrap.style.display='none'; }
  textInput.addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      saveState();
      ctx.font = `${brushSize*2}px sans-serif`;
      ctx.fillStyle = currentColor;
      ctx.globalAlpha = brushOpacity;
      ctx.fillText(textInput.value, textX, textY);
      if(symmetryMode){
        ctx.save();
        ctx.translate(W,0);
        ctx.scale(-1,1);
        ctx.fillText(textInput.value, W-textX, textY);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      textInput.value = '';
      hideTextInput();
    } else if(e.key==='Escape'){
      hideTextInput();
    }
  });

  // Drawing
  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    if(e.touches && e.touches.length>0){
      return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    }
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function startDraw(e){
    if(currentTool==='stamp'){
      const pos = getPos(e);
      saveState();
      ctx.font = `${brushSize*2}px sans-serif`;
      ctx.globalAlpha = brushOpacity;
      ctx.fillText(currentStamp, pos.x - brushSize, pos.y + brushSize/2);
      if(symmetryMode){
        ctx.fillText(currentStamp, W - pos.x - brushSize, pos.y + brushSize/2);
      }
      ctx.globalAlpha = 1;
      return;
    }
    if(currentTool==='text'){
      const pos = getPos(e);
      textX = pos.x; textY = pos.y;
      textWrap.style.display = 'block';
      textInput.focus();
      return;
    }
    isDrawing = true;
    saveState();
    const pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
    // Single dot
    drawAt(pos.x, pos.y);
  }

  function drawAt(x, y){
    ctx.globalAlpha = brushOpacity;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    if(currentTool==='pen'){
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
      ctx.lineWidth = brushSize;
    } else if(currentTool==='marker'){
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
      ctx.globalAlpha = 0.3 * brushOpacity;
      ctx.lineWidth = brushSize * 3;
    } else if(currentTool==='eraser'){
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = brushSize * 2;
    } else if(currentTool==='spray'){
      ctx.globalCompositeOperation = 'source-over';
      const density = brushSize * 2;
      for(let i=0;i<density;i++){
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * brushSize;
        const sx = x + Math.cos(angle)*radius;
        const sy = y + Math.sin(angle)*radius;
        ctx.fillStyle = currentColor;
        ctx.fillRect(sx, sy, 1, 1);
        if(symmetryMode){
          ctx.fillRect(W-sx, sy, 1, 1);
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      return;
    } else if(currentTool==='rainbow'){
      ctx.globalCompositeOperation = 'source-over';
      rainbowHue = (rainbowHue + 2) % 360;
      ctx.strokeStyle = `hsl(${rainbowHue},100%,50%)`;
      ctx.lineWidth = brushSize;
    }

    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();

    if(symmetryMode && currentTool!=='spray'){
      ctx.beginPath();
      ctx.moveTo(W-lastX, lastY);
      ctx.lineTo(W-x, y);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  function draw(e){
    if(!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    drawAt(pos.x, pos.y);
    lastX = pos.x; lastY = pos.y;
  }

  function endDraw(){
    isDrawing = false;
  }

  // Mouse events
  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);

  // Touch events
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); startDraw(e); }, {passive:false});
  canvas.addEventListener('touchmove', e=>{ e.preventDefault(); draw(e); }, {passive:false});
  canvas.addEventListener('touchend', e=>{ e.preventDefault(); endDraw(); }, {passive:false});
  canvas.addEventListener('touchcancel', endDraw);

  // Make canvas clickable for stamps/text (pointer events go to main canvas)
  previewCanvas.style.pointerEvents = 'none';
  gridCanvas.style.pointerEvents = 'none';

})();
</script>
</body>
</html>
