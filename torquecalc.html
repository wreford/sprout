<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bolt Torque Calculator</title><style>
:root{--bg:#0f0f10;--bg2:#1a1a1c;--border:#2a2a2d;--text:#f0f0f0;--dim:#6e6e73;--accent:#ff6b35;--green:#4ade80}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;padding:12px;max-width:900px;margin:0 auto}
a.home{color:var(--accent);text-decoration:none;font-size:14px}h1{font-size:1.3em;margin:8px 0 12px}
.row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}.field{flex:1;min-width:130px}
label{display:block;font-size:12px;color:var(--dim);margin-bottom:3px}
select,input{width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px}
button{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin:6px 4px 6px 0}
button:hover{opacity:.85}
.result{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin:10px 0;font-size:14px}
.big{font-size:1.6em;color:var(--accent);font-weight:700}
canvas{width:100%;max-width:500px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;display:block;margin:10px auto;cursor:crosshair}
.ref{font-size:11px;color:var(--dim);margin-top:10px}
@media print{button{display:none}}
</style></head><body>
<a href="index.html" class="home">← home</a>
<h1>Bolt Torque Calculator</h1>
<div class="row">
 <div class="field"><label>System</label><select id="sys" onchange="updateSizes()"><option value="metric">Metric</option><option value="imperial">Imperial</option></select></div>
 <div class="field"><label>Bolt Size</label><select id="bsize"></select></div>
 <div class="field"><label>Grade</label><select id="grade"></select></div>
 <div class="field"><label>Lubrication</label><select id="lube"><option value="0.20">Dry (K=0.20)</option><option value="0.18">Lightly Oiled (K=0.18)</option><option value="0.15" selected>Anti-Seize (K=0.15)</option><option value="0.12">Moly Paste (K=0.12)</option></select></div>
</div>
<div class="row">
 <div class="field"><label>Bolt Count on Flange</label><input id="bcount" type="number" value="8" min="3" max="48"></div>
 <div class="field"><label>Flange OD (mm)</label><input id="fod" type="number" value="400"></div>
</div>
<button onclick="calc()">Calculate</button><button onclick="window.print()">Print Record Sheet</button>
<div class="result" id="res"></div>
<canvas id="flange" height="500" width="500"></canvas>
<div class="ref">Ref: ASME PCC-1 Guidelines for Pressure Boundary Bolted Flange Joint Assembly · CSA B51 Boiler, Pressure Vessel, and Pressure Piping Code</div>
<script>
const metricSizes=[{n:'M10',d:10,a:58},{n:'M12',d:12,a:84.3},{n:'M16',d:16,a:157},{n:'M20',d:20,a:245},{n:'M24',d:24,a:353},{n:'M27',d:27,a:459},{n:'M30',d:30,a:561},{n:'M33',d:33,a:694},{n:'M36',d:36,a:817}];
const impSizes=[{n:'3/8"',d:9.525,a:54.8},{n:'1/2"',d:12.7,a:91.5},{n:'5/8"',d:15.875,a:146},{n:'3/4"',d:19.05,a:215},{n:'7/8"',d:22.225,a:295},{n:'1"',d:25.4,a:389},{n:'1-1/8"',d:28.575,a:497},{n:'1-1/4"',d:31.75,a:625},{n:'1-1/2"',d:38.1,a:908}];
const metricGrades=[{n:'8.8',fy:640},{n:'10.9',fy:900},{n:'12.9',fy:1080}];
const impGrades=[{n:'Grade 5 (SAE)',fy:635},{n:'Grade 8 (SAE)',fy:896},{n:'A325',fy:635},{n:'A490',fy:896}];
let bolts=[];

function updateSizes(){
 const sys=document.getElementById('sys').value;
 const bs=document.getElementById('bsize'),gr=document.getElementById('grade');
 const sizes=sys==='metric'?metricSizes:impSizes;
 const grades=sys==='metric'?metricGrades:impGrades;
 bs.innerHTML=sizes.map(s=>`<option value="${s.d}" data-a="${s.a}">${s.n}</option>`).join('');
 gr.innerHTML=grades.map(g=>`<option value="${g.fy}">${g.n} (Fy=${g.fy} MPa)</option>`).join('');
}

function calc(){
 const d=+document.getElementById('bsize').value;
 const opt=document.getElementById('bsize').selectedOptions[0];
 const At=+opt.dataset.a;
 const Fy=+document.getElementById('grade').value;
 const K=+document.getElementById('lube').value;
 const clamp=0.70*Fy*At; // 70% proof load
 const torque=K*d*clamp/1000; // N·m
 const n=+document.getElementById('bcount').value;
 const ftlbs=torque*0.7376;
 let html=`<div class="big">${torque.toFixed(1)} N·m (${ftlbs.toFixed(1)} ft·lbs)</div>`;
 html+=`<p>Clamp Load per Bolt: ${(clamp/1000).toFixed(1)} kN · Total Joint Clamp: ${(clamp*n/1000).toFixed(0)} kN</p>`;
 html+=`<p style="color:var(--dim)">Stress Area: ${At} mm² · K-factor: ${K} · Pre-load: 70% Fy</p>`;
 document.getElementById('res').innerHTML=html;
 drawFlange(n);
}

function drawFlange(n){
 const c=document.getElementById('flange'),ctx=c.getContext('2d');
 c.width=500*2;c.height=500*2;ctx.scale(2,2);
 const W=250,H=250,R=160,br=12;
 ctx.clearRect(0,0,500,500);
 ctx.strokeStyle=var_border();ctx.lineWidth=2;
 ctx.beginPath();ctx.arc(W,H,R+20,0,Math.PI*2);ctx.stroke();
 ctx.beginPath();ctx.arc(W,H,R-30,0,Math.PI*2);ctx.stroke();
 bolts=[];
 // Star pattern sequence
 const seq=starPattern(n);
 for(let i=0;i<n;i++){
  const ang=(Math.PI*2*i/n)-Math.PI/2;
  const x=W+R*Math.cos(ang),y=H+R*Math.sin(ang);
  const order=seq.indexOf(i)+1;
  bolts.push({x,y,idx:i,order});
  ctx.beginPath();ctx.arc(x,y,br,0,Math.PI*2);
  ctx.fillStyle='var(--bg)';ctx.fill();
  ctx.strokeStyle='var(--accent)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 12px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(order,x,y);
 }
 // Draw sequence arrows
 ctx.strokeStyle='rgba(255,107,53,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
 for(let i=0;i<n-1;i++){
  const a=bolts.find(b=>b.order===i+1),b_=bolts.find(b=>b.order===i+2);
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b_.x,b_.y);ctx.stroke();
 }
 ctx.setLineDash([]);
 ctx.fillStyle='var(--dim)';ctx.font='11px system-ui';ctx.textAlign='center';
 ctx.fillText('Star Pattern Tightening Sequence (ASME PCC-1)',W,H+R+50);
}

function starPattern(n){
 const seq=[];const used=new Set();
 let pos=0;
 for(let i=0;i<n;i++){
  while(used.has(pos%n))pos++;
  seq.push(pos%n);used.add(pos%n);
  pos+=Math.floor(n/2);if(pos>=n*2)pos=seq.length;
 }
 return seq;
}

function var_border(){return getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'#2a2a2d'}
updateSizes();calc();
</script></body></html>
