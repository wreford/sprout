<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a10" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0a0a10">
<meta name="description" content="What the f*ck do I eat — one button, one meal. Healthy, fat-ass, or somewhere in between. Free.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WTF">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23ff375f'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-family='monospace' fill='%23fff' font-weight='700'%3E%F0%9F%8D%9C%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23ff375f'/%3E%3Cstop offset='1' stop-color='%23ffcc00'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='90' y='128' text-anchor='middle' font-size='108' font-family='sans-serif'%3E%F0%9F%8D%9C%3C/text%3E%3C/svg%3E">
<title>WTF do I eat</title>
<style>
:root{
  --bg:#0a0a10; --bg2:#12121a; --panel:#191926; --panel2:#22222e; --border:#26262e; --border2:#3a3a48;
  --text:#f5f5f7; --dim:#8a8a98; --dimmer:#5a5a68;
  --hot:#ff375f; --amber:#ffcc00; --lime:#c8ff2f; --pink:#ff2d92; --violet:#bf5af2; --green:#30d158;
  --disp:'Fraunces',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  min-height:100vh;min-height:100dvh;
  padding-bottom:env(safe-area-inset-bottom);
  background:
    radial-gradient(1000px 400px at 20% -10%,rgba(255,55,95,.15),transparent 55%),
    radial-gradient(800px 400px at 80% 110%,rgba(200,255,47,.06),transparent 55%),
    var(--bg)
}
button,a,input,select,textarea{touch-action:manipulation}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input,select,textarea{font-size:16px}  /* Prevent iOS zoom-on-focus */
a{color:var(--hot)}
::selection{background:rgba(255,55,95,.4);color:#fff}

/* ══════ Top ══════ */
.top{
  position:sticky;top:0;z-index:20;
  padding:calc(env(safe-area-inset-top) + 10px) max(14px,env(safe-area-inset-right)) 10px max(14px,env(safe-area-inset-left));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:linear-gradient(180deg,rgba(10,10,16,.94),rgba(10,10,16,.6));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.05)
}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:inherit;min-width:0}
.brand-mark{
  width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--hot),var(--amber));
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0
}
.brand-txt{min-width:0;overflow:hidden}
.brand .n{font-family:var(--disp);font-weight:900;font-size:16px;letter-spacing:-.005em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .t{font-family:var(--mono);font-size:9px;letter-spacing:.22em;color:var(--dim);text-transform:uppercase;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-r{display:flex;gap:6px;align-items:center;flex-shrink:0}
.icon-btn{width:38px;height:38px;border-radius:9px;background:var(--panel);border:1px solid var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;text-decoration:none}
.icon-btn:hover{border-color:var(--border2);color:var(--hot)}
.icon-btn.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent;color:#fff}
.icon-btn .cnt{margin-left:3px;font-family:var(--mono);font-size:10px;font-weight:600}
@media(max-width:460px){
  .brand .t{display:none}
  .brand-mark{width:30px;height:30px;font-size:15px}
  .brand .n{font-size:15px}
}

/* ══════ Hero ══════ */
.hero{padding:28px 20px 18px;text-align:center;max-width:720px;margin:0 auto}
.hero .eye{
  font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--dim);
  text-transform:uppercase;margin-bottom:10px
}
.hero h1{
  font-family:var(--disp);font-weight:900;letter-spacing:-.03em;
  font-size:clamp(34px,8.5vw,72px);line-height:.94;margin-bottom:10px
}
.hero h1 .g{
  background:linear-gradient(120deg,var(--amber) 0%,var(--hot) 45%,var(--pink) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.hero .sub{color:var(--dim);font-size:14px;line-height:1.45;max-width:440px;margin:0 auto 18px;font-style:italic}
.hero .sub b{color:var(--text);font-style:normal;font-weight:600}

.bigbtn{
  display:inline-flex;align-items:center;gap:10px;padding:16px 30px;
  background:linear-gradient(135deg,var(--hot),var(--pink));
  color:#fff;border:none;border-radius:14px;
  font-family:var(--disp);font-weight:900;font-size:20px;letter-spacing:-.005em;
  cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s var(--ease);
  box-shadow:0 10px 30px rgba(255,55,95,.35);
  text-transform:uppercase;font-style:italic;min-height:52px
}
.bigbtn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 16px 38px rgba(255,55,95,.45)}
.bigbtn:active{transform:translateY(0) scale(.98)}
.bigbtn .ic{font-size:24px}
.bigbtn.busy{pointer-events:none;opacity:.6}
.bigbtn.busy .ic{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.hero-note{margin-top:8px;font-family:var(--mono);font-size:10.5px;color:var(--dimmer);letter-spacing:.06em;font-style:italic}
.hero-note b{color:var(--dim);font-style:normal}

@media(max-width:460px){
  .hero{padding:18px 16px 12px}
  .hero .eye{font-size:9px;letter-spacing:.22em;margin-bottom:8px}
  .hero h1{font-size:36px;margin-bottom:8px}
  .hero .sub{font-size:12.5px;margin-bottom:14px;line-height:1.4}
  .bigbtn{width:100%;padding:15px 20px;font-size:19px}
  .hero-note{font-size:9.5px}
}

/* ══════ Toolbar (dropdowns) ══════ */
.toolbar{
  max-width:1000px;margin:0 auto;padding:0 16px 10px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:center
}
.dd{position:relative;flex:1;min-width:140px}
.dd-btn{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  color:var(--text);cursor:pointer;transition:border-color .15s;font-size:13px;min-height:44px
}
@media(max-width:460px){
  .toolbar{gap:6px;padding:0 14px 8px}
  .dd{min-width:calc(50% - 3px);flex:1 0 calc(50% - 3px)}
  .dd-btn{padding:8px 10px}
  .dd-btn .k{font-size:8.5px;letter-spacing:.14em}
  .dd-btn .v{font-size:12.5px}
}
.dd-btn:hover{border-color:var(--border2)}
.dd-btn.active{border-color:var(--hot)}
.dd-btn .l{display:flex;flex-direction:column;align-items:flex-start;gap:2px;flex:1;min-width:0;overflow:hidden}
.dd-btn .k{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.18em;text-transform:uppercase;font-weight:600;line-height:1}
.dd-btn .v{font-weight:500;line-height:1.1;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;color:var(--text)}
.dd-btn.active .v{color:var(--hot)}
.dd-btn .chev{color:var(--dim);font-size:11px;flex-shrink:0}
.dd-menu{
  position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;
  background:var(--panel2);border:1px solid var(--border2);border-radius:10px;
  padding:6px;box-shadow:0 12px 30px rgba(0,0,0,.5);
  max-height:340px;overflow-y:auto;display:none
}
.dd-menu.show{display:block;animation:pop .18s var(--ease)}
@keyframes pop{0%{opacity:0;transform:translateY(-4px)}100%{opacity:1;transform:none}}
.dd-opt{
  padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-dim);
  display:flex;align-items:center;gap:8px;transition:all .12s
}
.dd-opt:hover{background:var(--panel);color:var(--text)}
.dd-opt.on{background:rgba(255,55,95,.1);color:var(--hot);font-weight:600}
.dd-opt .em{font-size:16px;flex-shrink:0}
.dd-opt .txt{flex:1;min-width:0}
.dd-opt .txt .n{font-weight:500;line-height:1.1}
.dd-opt .txt .s{font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:.03em;margin-top:2px;font-style:italic}
.dd-opt.on .txt .s{color:var(--hot);opacity:.7}

/* Diet buttons (bigger visual) */
.dd-menu.diets{padding:4px}
.dd-menu.diets .dd-opt{padding:10px 12px}

.search-row{
  max-width:1000px;margin:0 auto;padding:0 16px 12px;
  display:flex;gap:8px;align-items:center
}
.searchrow{
  flex:1;min-width:0;display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:9px 14px;
  transition:border-color .18s;min-height:44px
}
.searchrow:focus-within{border-color:var(--hot)}
.searchrow input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-size:16px}
.searchrow input::placeholder{color:var(--dimmer)}
.searchrow .ic{color:var(--dim);flex-shrink:0}
.searchrow .clr{padding:2px 8px;font-family:var(--mono);font-size:10px;color:var(--dim);cursor:pointer;border-radius:4px;letter-spacing:.06em;text-transform:uppercase;transition:color .12s;flex-shrink:0}
.searchrow .clr:hover{color:var(--hot)}
.reset-all{
  padding:9px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;
  color:var(--dim);font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:all .12s;flex-shrink:0;min-height:44px;min-width:44px
}
.reset-all:hover{color:var(--hot);border-color:var(--hot)}
.reset-all:disabled{opacity:.4;cursor:not-allowed}
.reset-all .lbl{display:inline}
.reset-all .ico{display:none}
@media(max-width:460px){
  .search-row{padding:0 14px 10px;gap:6px}
  .searchrow{padding:8px 12px}
  .reset-all{padding:0;width:44px;font-size:16px;display:flex;align-items:center;justify-content:center}
  .reset-all .lbl{display:none}
  .reset-all .ico{display:inline}
}

/* Active filter pills */
.pills{max-width:1000px;margin:0 auto;padding:0 20px 12px;display:flex;gap:5px;flex-wrap:wrap}
.pill{
  padding:3px 8px 3px 10px;background:var(--panel);border:1px solid var(--border);border-radius:14px;
  font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.02em;
  display:inline-flex;align-items:center;gap:5px
}
.pill.diet{border-color:rgba(200,255,47,.35);color:var(--lime);background:rgba(200,255,47,.05)}
.pill.cuisine{border-color:rgba(191,90,242,.35);color:var(--violet);background:rgba(191,90,242,.05)}
.pill.category{border-color:rgba(255,204,0,.35);color:var(--amber);background:rgba(255,204,0,.05)}
.pill.ing{border-color:rgba(48,209,88,.35);color:var(--green);background:rgba(48,209,88,.05)}
.pill .x{
  width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.3);border-radius:50%;font-size:10px;color:inherit;
  cursor:pointer;transition:all .12s;margin-left:2px
}
.pill .x:hover{background:currentColor;color:#000}

/* ══════ Meal ══════ */
.stage{padding:0 20px 40px;max-width:1000px;margin:0 auto}
@media(max-width:460px){.stage{padding:0 14px 32px}}
.meal-loading{padding:56px 20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:12px;letter-spacing:.06em}
.meal-loading::before{content:"◇";display:inline-block;margin-right:8px;animation:spin 1.4s linear infinite}
.meal-loading em{color:var(--text-dim);font-style:italic;display:block;margin-top:6px;font-size:11px}
.meal-error{padding:22px;background:rgba(255,55,95,.08);border:1px solid rgba(255,55,95,.3);border-radius:12px;color:var(--hot);text-align:center;font-size:13.5px;line-height:1.5}
.meal-error b{color:var(--text)}
.meal-error em{color:var(--dim);font-style:italic;display:block;margin-top:6px;font-size:12px}

.meal{
  display:grid;grid-template-columns:minmax(0,360px) 1fr;gap:24px;
  background:linear-gradient(180deg,var(--panel),var(--bg2));
  border:1px solid var(--border);border-radius:16px;overflow:hidden;
  animation:pop .35s var(--ease)
}
@keyframes pop{0%{opacity:0;transform:translateY(10px) scale(.98)}100%{opacity:1;transform:none}}
@media(max-width:800px){.meal{grid-template-columns:1fr;gap:0}}

.meal-img-wrap{position:relative;background:#000;min-height:260px}
.meal-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;min-height:260px}
@media(max-width:800px){
  .meal-img-wrap{min-height:auto;aspect-ratio:4/3}
  .meal-img-wrap img{min-height:0;aspect-ratio:4/3;height:auto}
}
.meal-tags{position:absolute;top:10px;left:10px;display:flex;flex-wrap:wrap;gap:5px}
.meal-tag{
  padding:4px 9px;background:rgba(0,0,0,.75);color:#fff;border-radius:14px;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1)
}
.meal-tag.cat{background:rgba(255,204,0,.9);color:#000}
.meal-tag.area{background:rgba(200,255,47,.9);color:#000}
.meal-tag.h{background:rgba(48,209,88,.9);color:#000}
.meal-tag.f{background:rgba(255,55,95,.9);color:#fff}

.fav-btn{
  position:absolute;top:10px;right:10px;
  width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:17px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.15);
  transition:all .18s;cursor:pointer
}
.fav-btn:hover{transform:scale(1.1)}
.fav-btn.on{background:var(--hot);border-color:transparent}

.meal-body{padding:24px 24px 24px 0;overflow:hidden}
@media(max-width:800px){.meal-body{padding:18px 16px 20px}}

.meal-title{font-family:var(--disp);font-weight:900;font-size:28px;line-height:1.05;letter-spacing:-.02em;margin-bottom:5px}
@media(max-width:460px){.meal-title{font-size:24px}}
.meal-meta{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.04em;margin-bottom:14px}
.meal-meta b{color:var(--text)}
.meal-meta .dot{color:var(--dimmer);margin:0 5px}

.meal-section{margin-bottom:16px}
.meal-section h4{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--hot);text-transform:uppercase;margin-bottom:8px;font-weight:600}

.ingredients{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px 10px}
.ing{
  display:flex;align-items:baseline;gap:8px;padding:5px 8px;background:var(--bg2);
  border:1px solid var(--border);border-radius:6px;font-size:12.5px;line-height:1.3
}
.ing .name{color:var(--text);font-weight:500;flex:1;min-width:0}
.ing .meas{color:var(--dim);font-family:var(--mono);font-size:10px;flex-shrink:0}

.instructions{color:var(--dim);font-size:14px;line-height:1.7;max-height:280px;overflow-y:auto;padding-right:8px;-webkit-overflow-scrolling:touch}
.instructions p{margin-bottom:10px}
.instructions p:first-of-type{color:var(--text)}
.instructions::-webkit-scrollbar{width:5px}
.instructions::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:800px){
  .instructions{max-height:none;padding-right:0;font-size:14.5px;line-height:1.6}
}

.yt-wrap{position:relative;padding-top:56.25%;background:#000;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;cursor:pointer}
.yt-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.yt-wrap .thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.8)}
.yt-wrap .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:66px;height:66px;border-radius:50%;background:rgba(255,55,95,.9);border:2px solid #fff;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.5);transition:transform .18s var(--ease)}
.yt-wrap:hover .play{transform:translate(-50%,-50%) scale(1.08)}
.yt-wrap .badge{position:absolute;top:10px;left:10px;padding:4px 10px;background:rgba(0,0,0,.75);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.1em;border-radius:12px;text-transform:uppercase;font-weight:600;backdrop-filter:blur(6px)}
@media(max-width:460px){.yt-wrap .play{width:54px;height:54px;font-size:20px}}

.meal-actions{display:flex;gap:6px;padding-top:12px;border-top:1px solid var(--border);margin-top:14px;flex-wrap:wrap}
.action{padding:9px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-family:var(--mono);font-size:10.5px;color:var(--text);letter-spacing:.05em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .12s;min-height:38px}
.action:hover{border-color:var(--hot);color:var(--hot)}
.action.primary{background:linear-gradient(135deg,var(--hot),var(--pink));border:none;color:#fff}
.action.primary:hover{filter:brightness(1.1)}
@media(max-width:460px){
  .meal-actions{display:flex;flex-wrap:wrap;gap:8px}
  .action{flex:1 1 calc(50% - 4px);padding:12px 10px;font-size:11px;min-height:44px}
  .action.primary{flex:1 1 100%;font-size:12.5px;letter-spacing:.07em;min-height:48px}
}

/* ══════ Drawer + modal ══════ */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:80;display:none;opacity:0;transition:opacity .2s}
.drawer-bg.show{display:block;opacity:1}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,100%);z-index:90;background:var(--panel);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .28s var(--ease);display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-right:env(safe-area-inset-right)}
.drawer.show{transform:translateX(0)}
.drawer-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.drawer-hdr h3{font-family:var(--disp);font-weight:600;font-size:17px}
.drawer-list{flex:1;overflow-y:auto;padding:10px}
.fav-card{display:flex;gap:9px;padding:7px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;margin-bottom:5px;cursor:pointer;transition:border-color .15s;position:relative}
.fav-card:hover{border-color:var(--hot)}
.fav-card img{width:52px;height:52px;object-fit:cover;border-radius:5px;flex-shrink:0}
.fav-card .info{flex:1;min-width:0;padding:2px 0}
.fav-card .info .n{font-family:var(--disp);font-weight:600;font-size:13px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-card .info .m{font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:.04em}
.fav-card .remove{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.4);color:var(--dim);display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:all .12s}
.fav-card:hover .remove{opacity:1}
.fav-card .remove:hover{background:var(--hot);color:#fff}
.drawer-empty{padding:36px 20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:11px;font-style:italic;line-height:1.6}

/* Ingredient picker modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:120;display:none;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .2s}
.mbg.show{display:flex;opacity:1}
.mcard{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--border2);border-radius:14px;width:min(620px,100%);max-height:80vh;max-height:80dvh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.7);transform:translateY(-8px) scale(.98);opacity:0;transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .2s}
.mbg.show .mcard{transform:none;opacity:1}
@media(max-width:520px){
  .mbg{align-items:flex-end;padding:0}
  .mcard{max-height:88dvh;width:100%;border-radius:16px 16px 0 0;padding-bottom:env(safe-area-inset-bottom);transform:translateY(30px);opacity:1}
  .mbg.show .mcard{transform:none}
}
.mhdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:12px}
.mhdr h3{font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:-.01em}
.mhdr .cnt{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--lime);font-weight:600}
.mclose{width:30px;height:30px;border-radius:7px;background:var(--panel2);border:1px solid var(--border);color:var(--dim);font-size:15px}
.mclose:hover{color:var(--hot)}
.msearch{padding:10px 18px;border-bottom:1px solid var(--border)}
.msearch input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .18s}
.msearch input:focus{border-color:var(--lime)}
.mbody{flex:1;overflow-y:auto;padding:10px 14px 14px}
.mbody::-webkit-scrollbar{width:6px}
.mbody::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:5px}
.iopt{padding:7px 9px;background:var(--panel);border:1px solid var(--border);border-radius:7px;font-size:12px;color:var(--text-dim);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:7px;line-height:1.1}
.iopt:hover{border-color:var(--border2);color:var(--text)}
.iopt.on{background:linear-gradient(135deg,rgba(200,255,47,.15),rgba(200,255,47,.05));border-color:rgba(200,255,47,.5);color:var(--lime);font-weight:600}
.iopt .ck{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s;color:transparent;font-size:10px}
.iopt.on .ck{background:var(--lime);border-color:var(--lime);color:#000}
.iopt.on .ck::before{content:"✓"}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.mfoot .info{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
.mfoot .info b{color:var(--text)}
.mbtn{padding:8px 14px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-weight:600;color:var(--text)}
.mbtn:hover{border-color:var(--border2)}
.mbtn.primary{background:linear-gradient(135deg,var(--hot),var(--pink));color:#fff;border:none;box-shadow:0 6px 18px rgba(255,55,95,.3)}
.mbtn.primary:hover{filter:brightness(1.1)}

/* Results grid */
.results-hdr{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px;font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}
.results-hdr b{color:var(--text);font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:-.01em;text-transform:none}
.results-hdr .back{color:var(--hot);cursor:pointer;padding:3px 9px;background:var(--panel);border:1px solid var(--border);border-radius:12px;transition:all .12s;font-weight:500}
.results-hdr .back:hover{background:rgba(255,55,95,.08);border-color:var(--hot)}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.result-card{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:pointer;transition:all .18s;text-decoration:none;color:inherit;position:relative}
.result-card:hover{transform:translateY(-2px);border-color:var(--hot);box-shadow:0 12px 24px rgba(0,0,0,.3)}
.result-card img{width:100%;aspect-ratio:16/10;object-fit:cover;background:#000}
.result-card .rc-body{padding:10px 12px}
.result-card .rc-name{font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:-.01em;line-height:1.2;margin-bottom:3px}
.result-card .rc-meta{font-family:var(--mono);font-size:9.5px;color:var(--dim)}
.result-card .rc-tag{position:absolute;top:7px;left:7px;padding:2px 7px;background:rgba(0,0,0,.75);border-radius:12px;font-family:var(--mono);font-size:9px;color:#fff;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.result-card .rc-tag.h{background:rgba(48,209,88,.85);color:#000}
.result-card .rc-tag.f{background:rgba(255,55,95,.85)}

.hint{padding:14px 20px 30px;text-align:center;color:var(--dimmer);font-family:var(--mono);font-size:10px;letter-spacing:.1em;line-height:1.7}
.hint a{color:var(--dim);text-decoration:none;border-bottom:1px dotted currentColor}
.hint a:hover{color:var(--text)}

/* ══════ Doomscroll ══════ */
.doom-btn{background:linear-gradient(135deg,var(--violet),var(--pink));border-color:transparent;color:#fff}
.doom-btn:hover{color:#fff;filter:brightness(1.15)}

.doom{
  position:fixed;inset:0;z-index:100;background:#000;
  scroll-snap-type:y mandatory;overflow-y:scroll;overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  display:none;
}
body.doom-locked{position:fixed;width:100%;overflow:hidden}
.doom.show{display:block;animation:fadein .3s var(--ease)}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.doom-card{
  height:100vh;height:100dvh;width:100%;position:relative;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;align-items:flex-end;justify-content:center;
  background:#000;overflow:hidden
}
.doom-card .bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
  filter:blur(28px) brightness(.5);transform:scale(1.15);z-index:0
}
.doom-card .img-frame{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:1;padding:calc(env(safe-area-inset-top) + 46px) 16px calc(env(safe-area-inset-bottom) + 172px)
}
@media(max-height:720px){
  .doom-card .img-frame{padding:calc(env(safe-area-inset-top) + 38px) 14px calc(env(safe-area-inset-bottom) + 152px)}
}
.doom-card img{
  max-width:100%;max-height:100%;width:auto;height:auto;
  border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.6);
  animation:doomin .5s var(--ease)
}
@keyframes doomin{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:none}}
.doom-card.pending .img-frame{opacity:0}
.doom-card.pending::after{
  content:"";position:absolute;top:50%;left:50%;width:34px;height:34px;
  margin:-17px 0 0 -17px;border:2px solid rgba(255,255,255,.15);
  border-top-color:var(--hot);border-radius:50%;
  animation:spin 1s linear infinite;z-index:2
}

.doom-loading-card{background:radial-gradient(circle at center,rgba(20,20,30,.8),#000);align-items:center;justify-content:center;flex-direction:column;gap:16px}
.doom-loading-card .loading-spin{display:flex;gap:8px;align-items:center}
.doom-loading-card .ls-dot{width:12px;height:12px;border-radius:50%;background:var(--hot);animation:ls-bounce 1.4s ease-in-out infinite}
.doom-loading-card .ls-dot:nth-child(2){animation-delay:.2s;background:var(--pink)}
.doom-loading-card .ls-dot:nth-child(3){animation-delay:.4s;background:var(--amber)}
@keyframes ls-bounce{0%,100%{transform:scale(1) translateY(0);opacity:1}50%{transform:scale(1.2) translateY(-8px);opacity:.6}}
.doom-loading-card .loading-txt{
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;
  color:rgba(255,255,255,.6);text-transform:uppercase
}

/* Skeleton shimmer while image loads */
.doom-card .img-frame img{transition:opacity .3s var(--ease)}
.doom-card .img-frame img[data-loaded="0"]{opacity:0}
.doom-card .skeleton{
  position:absolute;inset:0;z-index:0;
  background:linear-gradient(110deg,#111 0%,#1a1a24 40%,#252530 50%,#1a1a24 60%,#111 100%);
  background-size:200% 100%;animation:skeleton-shimmer 1.8s linear infinite;
  transition:opacity .35s var(--ease)
}
@keyframes skeleton-shimmer{from{background-position:120% 0}to{background-position:-20% 0}}
.doom-card .skeleton.hidden{opacity:0;pointer-events:none}

/* Empty filter state */
.doom-empty{
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 28px;text-align:center;scroll-snap-align:start;background:#000
}
.doom-empty h3{
  font-family:var(--disp);font-weight:900;font-size:26px;line-height:1.1;
  color:#fff;letter-spacing:-.02em;max-width:340px;margin-bottom:10px
}
.doom-empty p{color:var(--dim);font-size:14px;line-height:1.5;max-width:340px;margin-bottom:22px;font-style:italic}
.doom-empty p b{color:#fff;font-style:normal;font-weight:600}
.doom-empty .fixes{display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px}
.doom-empty .fix{
  padding:12px 16px;background:rgba(20,20,26,.7);border:1px solid var(--border2);
  border-radius:12px;color:#fff;font-family:var(--mono);font-size:12px;letter-spacing:.05em;
  text-align:center;font-weight:600;cursor:pointer;transition:all .14s var(--ease);
  min-height:44px;display:flex;align-items:center;justify-content:center
}
.doom-empty .fix:hover{border-color:var(--hot);color:var(--hot);transform:translateY(-1px)}
.doom-empty .fix.primary{background:linear-gradient(135deg,var(--hot),var(--pink));border:none;color:#fff}
.doom-info{
  position:absolute;left:0;right:0;bottom:0;z-index:3;
  padding:40px 22px calc(env(safe-area-inset-bottom) + 22px);
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.55) 28%,rgba(0,0,0,.9) 72%,rgba(0,0,0,.98));
  color:#fff;padding-left:calc(env(safe-area-inset-left) + 22px);padding-right:calc(env(safe-area-inset-right) + 96px)
}
@media(max-height:720px){
  .doom-info{padding-top:32px;padding-bottom:calc(env(safe-area-inset-bottom) + 16px)}
  .doom-info .tags{margin-bottom:8px}
}
.doom-info .tags{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.doom-info .tag{
  padding:5px 11px;background:rgba(255,255,255,.14);border-radius:14px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;font-weight:600;
  backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.16);
  cursor:pointer;transition:all .14s var(--ease);color:#fff;
  display:inline-flex;align-items:center;gap:5px
}
.doom-info .tag:hover{background:rgba(255,255,255,.28);transform:scale(1.04)}
.doom-info .tag:active{transform:scale(.97)}
.doom-info .tag.h{background:linear-gradient(135deg,rgba(48,209,88,.9),rgba(48,209,88,.7));color:#001a08;border-color:rgba(48,209,88,.4);cursor:default}
.doom-info .tag.f{background:linear-gradient(135deg,rgba(255,55,95,.9),rgba(255,45,146,.9));color:#fff;border-color:rgba(255,55,95,.5);cursor:default}
.doom-info .tag.h:hover,.doom-info .tag.f:hover{transform:none}
.doom-info .tag.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(255,55,95,.4)}
.doom-info .tag.on .plus{display:none}
.doom-info .tag .plus{font-weight:900;opacity:.7;font-size:9px}
.doom-info h2{
  font-family:var(--disp);font-weight:900;font-size:clamp(24px,5.5vw,34px);
  line-height:1.02;letter-spacing:-.025em;margin-bottom:8px;max-width:640px;
  text-shadow:0 3px 14px rgba(0,0,0,.6)
}
.doom-info .meta{
  font-family:var(--mono);font-size:11.5px;color:rgba(255,255,255,.75);letter-spacing:.04em;
  display:flex;gap:8px;align-items:center;flex-wrap:wrap
}
.doom-info .meta b{color:#fff;font-weight:700}
.doom-info .meta .dot{color:rgba(255,255,255,.35)}

.doom-side{
  position:absolute;z-index:4;
  right:max(12px,env(safe-area-inset-right));
  bottom:calc(env(safe-area-inset-bottom) + 140px);
  display:flex;flex-direction:column;gap:22px;align-items:center
}
.doom-side .act{
  width:58px;height:58px;border-radius:50%;
  background:rgba(20,20,26,.55);color:#fff;
  border:1.5px solid rgba(255,255,255,.16);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;cursor:pointer;
  backdrop-filter:blur(14px) saturate(1.6);-webkit-backdrop-filter:blur(14px) saturate(1.6);
  transition:transform .18s var(--ease),background .18s,border-color .18s;
  box-shadow:0 4px 14px rgba(0,0,0,.4)
}
.doom-side .act:hover{transform:scale(1.08);background:rgba(0,0,0,.75)}
.doom-side .act:active{transform:scale(.94)}
.doom-side .act.on{background:linear-gradient(135deg,var(--hot),var(--pink));border-color:transparent;animation:pump .4s var(--ease)}
.doom-side .act.airfried{background:linear-gradient(135deg,var(--amber),var(--hot));border-color:transparent;box-shadow:0 4px 14px rgba(255,204,0,.4)}
.doom-side .act.airfried:hover{filter:brightness(1.15)}

/* Heart-burst on double-tap */
.heart-burst{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.heart-pop{
  position:absolute;transform:translate(-50%,-50%);color:var(--hot);
  font-size:120px;line-height:1;pointer-events:none;
  text-shadow:0 0 30px rgba(255,55,95,.7),0 8px 24px rgba(0,0,0,.5);
  animation:heart-fly .9s var(--ease) forwards
}
@keyframes heart-fly{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-8deg)}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(6deg)}
  30%{transform:translate(-50%,-50%) scale(1) rotate(-4deg)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(.6) rotate(0)}
}
@keyframes pump{0%{transform:scale(1)}30%{transform:scale(1.3)}60%{transform:scale(.94)}100%{transform:scale(1)}}
.doom-side .lbl{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.85);margin-top:4px;letter-spacing:.05em;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.doom-side .col{display:flex;flex-direction:column;align-items:center;gap:3px}
@media(max-width:520px){
  .doom-side{right:8px;bottom:calc(env(safe-area-inset-bottom) + 120px);gap:18px}
  .doom-side .act{width:52px;height:52px;font-size:24px;border-width:1.25px}
  .doom-side .lbl{font-size:9.5px}
}

/* Doom filter FAB (in top-left) */
.doom-fab{
  pointer-events:auto;width:40px;height:40px;border-radius:50%;
  background:rgba(20,20,26,.55);color:#fff;border:1.25px solid rgba(255,255,255,.14);
  font-size:17px;backdrop-filter:blur(10px);cursor:pointer;
  display:flex;align-items:center;justify-content:center;margin-right:8px
}
.doom-fab:hover{background:var(--hot);border-color:transparent}
.doom-fab.pending::after{
  content:"";position:absolute;top:-2px;right:-2px;width:9px;height:9px;
  border-radius:50%;background:var(--hot);border:2px solid #000
}
.doom-top-l{display:flex;align-items:center;gap:8px;pointer-events:auto}
.doom-top-l .brand{color:#fff;font-family:var(--disp);font-weight:900;font-size:15px;display:flex;align-items:center;gap:8px}
.doom-top-l .brand .dot{
  width:8px;height:8px;border-radius:50%;background:var(--hot);
  animation:pulse 1.4s ease-in-out infinite
}

/* ══════ Cook Mode (fullscreen hands-free) ══════ */
.cook{
  position:fixed;inset:0;z-index:180;
  background:radial-gradient(1000px 500px at 50% -10%,rgba(255,55,95,.14),transparent 60%),
             radial-gradient(700px 400px at 50% 110%,rgba(255,204,0,.08),transparent 60%),
             #0a0a10;
  color:#fff;display:none;flex-direction:column;
  padding:calc(env(safe-area-inset-top) + 14px) max(20px,env(safe-area-inset-left)) calc(env(safe-area-inset-bottom) + 20px);
  padding-right:max(20px,env(safe-area-inset-right))
}
.cook.show{display:flex;animation:fadein .28s var(--ease)}
.cook-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
.cook-back,.cook-sound{
  background:rgba(20,20,26,.55);border:1px solid rgba(255,255,255,.14);
  color:#fff;padding:9px 14px;border-radius:20px;
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;
  min-height:40px;min-width:44px;cursor:pointer;backdrop-filter:blur(10px)
}
.cook-back:hover,.cook-sound:hover{border-color:var(--hot);color:var(--hot)}
.cook-sound.speaking{background:var(--hot);border-color:transparent;color:#fff;animation:pulse 1.2s ease-in-out infinite}
.cook-progress{
  flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;position:relative
}
.cook-progress::after{
  content:"";position:absolute;left:0;top:0;bottom:0;width:var(--pct,0%);
  background:linear-gradient(90deg,var(--hot),var(--pink),var(--amber));
  transition:width .4s var(--ease)
}
.cook-body{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px 0;text-align:center;overflow-y:auto
}
.cook-meal{
  font-family:var(--mono);font-size:11px;letter-spacing:.2em;
  color:var(--dim);text-transform:uppercase;margin-bottom:12px
}
.cook-step-n{
  font-family:var(--mono);font-size:12px;letter-spacing:.3em;
  color:var(--hot);text-transform:uppercase;font-weight:700;margin-bottom:24px
}
.cook-step{
  font-family:var(--disp);font-weight:600;font-size:clamp(24px,4.5vw,36px);line-height:1.35;
  color:#fff;max-width:640px;letter-spacing:-.005em
}
.cook-timer{
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:14px 18px;margin:0 auto 16px;max-width:280px;
  background:rgba(20,20,26,.7);border:1px solid var(--border2);border-radius:14px
}
.cook-timer-face{
  font-family:var(--disp);font-weight:900;font-size:34px;letter-spacing:-.02em;
  color:var(--amber);font-variant-numeric:tabular-nums
}
.cook-timer-lbl{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
.cook-timer-stop{
  padding:6px 10px;background:transparent;border:1px solid var(--border2);border-radius:8px;
  color:var(--dim);font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em
}
.cook-timer-stop:hover{color:var(--hot);border-color:var(--hot)}
.cook-timer.done{border-color:var(--hot);animation:pulse 1s ease-in-out infinite}
.cook-timer.done .cook-timer-face{color:var(--hot)}
.cook-quick{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.cook-quick button{
  padding:8px 12px;background:rgba(20,20,26,.5);border:1px solid var(--border2);border-radius:14px;
  color:var(--text);font-family:var(--mono);font-size:11px;letter-spacing:.04em;cursor:pointer;min-height:36px
}
.cook-quick button:hover{border-color:var(--amber);color:var(--amber)}
.cook-controls{display:flex;gap:10px}
.cook-btn{
  flex:1;padding:16px 20px;background:rgba(20,20,26,.6);border:1px solid var(--border2);
  color:#fff;font-family:var(--mono);font-size:12.5px;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;border-radius:14px;
  min-height:52px;cursor:pointer;transition:all .14s var(--ease)
}

.doom-chips{
  display:none;

/* ═══════════════════════════════════════════════════════════════════════

const state = {

/* ═══════════════════════════════════════════════════════════════════════
   Dropdowns
   ═══════════════════════════════════════════════════════════════════════ */
function wireMenu(ddId, onPick, labelFn) {
  const dd = $(ddId);
  const menu = dd.querySelector('.dd-menu');

    menu.querySelectorAll('.dd-opt').forEach(x => x.classList.toggle('on', x === opt));

function closeAllDropdowns(except) {
  document.querySelectorAll('.dd-menu.show').forEach(m => { if (m !== except) m.classList.remove('show'); });
  document.querySelectorAll('.dd-btn.active').forEach(b => { const m = b.parentElement.querySelector('.dd-menu'); if (m !== except) b.classList.remove('active'); });
}
document.addEventListener('click', () => closeAllDropdowns());

function initDiets() {
  const menu = $('dd-diet-menu');
  if (!menu) return;

    <div class="dd-opt ${k === state.diet ? 'on' : ''}" data-val="${k}">

function updateDropdownLabels() {
  // TikTok-only mode: classic dropdown labels don't exist. Just re-render the chip row + doom-top state.
  renderFilterChips();
}
function updateBtnLabel() { /* classic-only, noop */ }
function anyFilterActive() {

}

function renderPills() {
  const box = $('pills');
  const items = [];
  if (state.diet !== 'any') items.push({ cls:'diet', label: DIETS[state.diet].em + ' ' + DIETS[state.diet].label, on:() => { state.diet = 'any'; refresh(); } });
  if (state.area) items.push({ cls:'cuisine', label: state.area, on:() => { state.area = ''; refreshDropdowns(); refresh(); } });
  if (state.category) items.push({ cls:'category', label: state.category, on:() => { state.category = ''; refreshDropdowns(); refresh(); } });

function refresh() { renderFilterChips(); }
function refreshDropdowns() { /* classic-only, noop */ }
function renderPills() { renderFilterChips(); }

/* ═══════════════════════════════════════════════════════════════════════
   Meal fetching (intersects diet + cuisine + category + ingredients)
   ═══════════════════════════════════════════════════════════════════════ */
// Cache ingredient filter lookups (they don't change during a session)
const ingCache = new Map();
async function idsForIngredient(ing) {
  if (ingCache.has(ing)) return ingCache.get(ing);
  const j = await fetch(`${API}/filter.php?i=${encodeURIComponent(ing.replace(/\s+/g,'_'))}`).then(r => r.json()).catch(() => ({}));
  const set = new Set((j.meals || []).map(m => m.idMeal));
  ingCache.set(ing, set);
  return set;
}
async function dietIngredientUnion(diet) {
  if (!diet.mustHaveAny || !diet.mustHaveAny.length) return null;
  const sets = await Promise.all(diet.mustHaveAny.map(idsForIngredient));
  const union = new Set();
  for (const s of sets) for (const id of s) union.add(id);
  return union;
}
function countIngredients(meal) {
  let n = 0;
  for (let i = 1; i <= 20; i++) {
    const v = meal[`strIngredient${i}`];
    if (v && v.trim()) n++;
  }
  return n;
}

async function idsForCategory(c) {
  const j = await fetch(`${API}/filter.php?c=${encodeURIComponent(c)}`).then(r => r.json()).catch(() => ({}));
  return new Set((j.meals || []).map(m => m.idMeal));
}
async function idsForCuisine(a) {
  const j = await fetch(`${API}/filter.php?a=${encodeURIComponent(a)}`).then(r => r.json()).catch(() => ({}));
  return new Set((j.meals || []).map(m => m.idMeal));
}

// Compute the pool of candidate meal IDs from state chips + diet
async function computeCandidatePool() {
  const diet = DIETS[state.diet];
  const dietCats = diet.cats;
  const mustHaveUnion = await dietIngredientUnion(diet);
  const mode = state.chipMode; // 'and' | 'or'

  // Diet: always intersecting (a mode constrains everything)
  // Chips: mode determines whether we union (or) or intersect (and) the individual chip sets

  // Fetch every chip set
  const catSets = await Promise.all(state.categories.map(idsForCategory));
  const cuisineSets = await Promise.all(state.cuisines.map(idsForCuisine));
  const ingSets = await Promise.all(state.ingredients.map(idsForIngredient));

  const chipSets = [...catSets, ...cuisineSets, ...ingSets];
  const hasChips = chipSets.length > 0;

  let poolIds; // Set of ids
  if (hasChips) {
    if (mode === 'or') {
      poolIds = new Set();
      for (const s of chipSets) for (const id of s) poolIds.add(id);
    } else {
      poolIds = new Set(chipSets[0]);
      for (let i = 1; i < chipSets.length; i++) {
        const next = new Set();
        for (const id of poolIds) if (chipSets[i].has(id)) next.add(id);
        poolIds = next;
      }
    }
  } else {
    poolIds = null; // no chips → open
  }

  // Diet cats: union of diet cats intersected with pool
  if (dietCats && dietCats.length) {
    const dcSets = await Promise.all(dietCats.map(idsForCategory));
    const dietUnion = new Set();
    for (const s of dcSets) for (const id of s) dietUnion.add(id);
    if (poolIds === null) poolIds = new Set(dietUnion);
    else {
      const next = new Set();
      for (const id of poolIds) if (dietUnion.has(id)) next.add(id);
      poolIds = next;
    }
  }

  // Diet mustHaveAny (extreme fat-ass, poor)
  if (mustHaveUnion) {
    if (poolIds === null) poolIds = new Set(mustHaveUnion);
    else {
      const next = new Set();
      for (const id of poolIds) if (mustHaveUnion.has(id)) next.add(id);
      poolIds = next;
    }
  }

  return poolIds;
}

async function fetchRandomMeal() {
  const diet = DIETS[state.diet];
  const poolIds = await computeCandidatePool();

  // Fully open → random.php
  if (poolIds === null) {
    const res = await fetch(`${API}/random.php`).then(r => r.json());
    if (!res.meals || !res.meals[0]) throw new Error('nothing came back');
    return res.meals[0];
  }

  if (poolIds.size === 0) throw new Error(pick(EMPTY_QUIPS));

  const recent = new Set(state.history.slice(-3));
  const arr = [...poolIds];
  let candidates = arr.filter(id => !recent.has(id));
  if (!candidates.length) candidates = arr;

  if (diet.maxIngredients) {
    const shuf = candidates.slice().sort(() => Math.random() - .5).slice(0, 6);
    for (const id of shuf) {
      const full = await fetchMealById(id).catch(() => null);
      if (full && countIngredients(full) <= diet.maxIngredients) return full;
    }
    return fetchMealById(pick(candidates));
  }
  return fetchMealById(pick(candidates));
}
async function fetchAllMatching() {
  const filters = [];
  const dietCats = DIETS[state.diet].cats;
  let cats = state.category ? [state.category] : (dietCats || []);
  // If cats has entries, we'll query one per and union them; other filters intersect on top
  if (cats.length === 0) cats = [null];
  const other = [];
  if (state.area) other.push(`${API}/filter.php?a=${encodeURIComponent(state.area)}`);
  for (const ing of state.ingredients) other.push(`${API}/filter.php?i=${encodeURIComponent(ing.replace(/\s+/g,'_'))}`);
  if (cats[0] === null && other.length === 0) return [];
  const otherLists = await Promise.all(other.map(u => fetch(u).then(r => r.json()).then(j => new Map((j.meals || []).map(m => [m.idMeal, m])))));
  const results = [];
  const seen = new Set();
  for (const c of cats) {
    let list;
    if (c) {
      const j = await fetch(`${API}/filter.php?c=${encodeURIComponent(c)}`).then(r => r.json());
      list = new Map((j.meals || []).map(m => [m.idMeal, { ...m, strCategory:c }]));
    } else if (otherLists.length) {
      list = otherLists[0];
    } else continue;
    for (const [id, m] of list) {
      if (seen.has(id)) continue;
      if (otherLists.every(o => c ? o.has(id) : true)) {
        if (c === null && !otherLists[0].has(id)) continue;
        seen.add(id); results.push(m);
      }
    }
  }
  return results;
}

async function fetchMealById(id) {
  const res = await fetch(`${API}/lookup.php?i=${id}`).then(r => r.json());
  return res.meals && res.meals[0];
}

/* ═══════════════════════════════════════════════════════════════════════
   Render meal / results
   ═══════════════════════════════════════════════════════════════════════ */
function ingredientsFrom(meal) {
  const out = [];
  for (let i = 1; i <= 20; i++) {
    const n = meal[`strIngredient${i}`], m = meal[`strMeasure${i}`];
    if (n && n.trim()) out.push({ name:n.trim(), meas:(m || '').trim() });
  }
  return out;
}
function ytVideoId(url) {
  if (!url) return null;
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?&]+)/) || url.match(/embed\/([^?&]+)/);
  return m ? m[1] : null;
}
function ytEmbed(url) {
  const id = ytVideoId(url);
  return id ? `https://www.youtube.com/watch?v=${id}` : (url || null);
}
function ytEmbedUrl(url) {
  const id = ytVideoId(url);
  return id ? `https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1&color=white` : null;
}
function ytThumb(url) {
  const id = ytVideoId(url);
  return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
}
function isFav(id) { return state.favorites.some(f => f.idMeal === id); }
function toggleFav(meal) {
  if (isFav(meal.idMeal)) state.favorites = state.favorites.filter(f => f.idMeal !== meal.idMeal);
  else state.favorites.push({ idMeal:meal.idMeal, strMeal:meal.strMeal, strMealThumb:meal.strMealThumb, strCategory:meal.strCategory, strArea:meal.strArea });
  localStorage.setItem('wtf-favs', JSON.stringify(state.favorites));
  updateFavCount(); renderFavDrawer(); render();
}
function updateFavCount() {
  const cnt = $('fav-count'), btn = $('fav-btn');
  if (cnt) cnt.textContent = state.favorites.length ? state.favorites.length : '';
  if (btn) btn.classList.toggle('on', state.favorites.length > 0);
  const doomCnt = $('doom-fav-count');
  if (doomCnt) doomCnt.textContent = state.favorites.length || '';
}

// Health signal — heuristic on category
function healthTag(m) {
  const c = (m.strCategory || '').toLowerCase();
  if (['dessert','pasta','pork','beef'].includes(c)) return { cls:'f', label:'INDULGE' };
  if (['vegan','vegetarian','seafood'].includes(c)) return { cls:'h', label:'HEALTHY' };
  return null;
}

// Rough cooking time estimate from instructions
function cookTime(m) {
  const txt = (m.strInstructions || '').toLowerCase();
  // Look for explicit "X hours" or "X minutes"
  const hrs = [...txt.matchAll(/(\d+)\s*(?:hour|hr)/g)].reduce((s,m) => s + Number(m[1]) * 60, 0);
  const mins = [...txt.matchAll(/(\d+)\s*(?:minutes?|mins?)/g)].reduce((s,m) => s + Number(m[1]), 0);
  const total = hrs + mins;
  if (total >= 30) return total;
  // Estimate from instruction length + ingredient count if no explicit times
  const paras = txt.split(/\r?\n/).filter(l => l.trim()).length;
  const ings = countIngredients(m);
  return Math.max(15, Math.min(180, paras * 4 + ings * 3));
}

function difficultyStars(m) {
  const ings = countIngredients(m);
  const time = cookTime(m);
  const complexity = (m.strInstructions || '').length;
  let stars = 1;
  if (ings > 8 || time > 45 || complexity > 800) stars = 2;
  if (ings > 12 || time > 90 || complexity > 1500) stars = 3;
  if (ings > 16 || time > 120 || complexity > 2500) stars = 4;
  return stars;
}

// Time-of-day → suggested category bias
function timeOfDayMeal() {
  const h = new Date().getHours();
  if (h < 10) return { emoji:'', label:'breakfast time', suggest:'Breakfast' };
  if (h < 14) return { emoji:'', label:'lunch time', suggest:null };
  if (h < 17) return { emoji:'', label:'afternoon snack', suggest:'Side' };
  if (h < 22) return { emoji:'', label:'dinner time', suggest:null };
  return { emoji:'', label:'late night', suggest:'Dessert' };
}

function loadQuip() {
  const m = MODE_QUIPS[state.diet];
  return pick(m ? [...m.load, ...LOADING_QUIPS] : LOADING_QUIPS);
}
function startQuip() {
  const m = MODE_QUIPS[state.diet];
  return pick(m ? [...m.start, ...START_QUIPS] : START_QUIPS);
}

function render() {
  const stage = document.querySelector('.stage');
  if (state.loading) {
    stage.innerHTML = `<div class="meal-loading">${loadQuip()}<em>hang on…</em></div>`;
    return;
  }
  if (state.view === 'results') {
    stage.innerHTML = `
      <div class="results-hdr">
        <span><b>${state.resultsLabel}</b></span>
        <span class="back" id="back-to-meal">← back${state.currentMeal ? ' to ' + state.currentMeal.strMeal : ''}</span>

  stage.innerHTML = `
    <div class="meal">
      <div class="meal-img-wrap">

        <div class="meal-tags">
          ${h ? `<span class="meal-tag ${h.cls}">${h.label}</span>` : ''}
          ${meal.strCategory ? `<span class="meal-tag cat">${meal.strCategory}</span>` : ''}
          ${meal.strArea ? `<span class="meal-tag area">${meal.strArea}</span>` : ''}

        </div>

        </div>
        ${ytUrl ? `

async function roll() {
  state.loading = true; state.view = 'meal';
  const btn = $('roll'); btn.classList.add('busy'); render();
  try {
    const meal = await fetchRandomMeal();
    state.currentMeal = meal; state.history.push(meal.idMeal);
    state.loading = false; btn.classList.remove('busy'); render();

  } catch(e) {
    state.loading = false; btn.classList.remove('busy');
    document.querySelector('.stage').innerHTML = `<div class="meal-error">${e.message}<em>${pick(EMPTY_QUIPS)}</em></div>`;
  }
}

async function runSearch(q) {
  state.loading = true;
  document.querySelector('.stage').innerHTML = `<div class="meal-loading">Searching for "${q}"…<em>${loadQuip()}</em></div>`;
  try {
    const [nameR, ingR] = await Promise.all([
      fetch(`${API}/search.php?s=${encodeURIComponent(q)}`).then(r => r.json()).catch(() => ({ meals:[] })),
      fetch(`${API}/filter.php?i=${encodeURIComponent(q.replace(/\s+/g,'_'))}`).then(r => r.json()).catch(() => ({ meals:[] })),
    ]);
    const seen = new Set(); const merged = [];
    for (const m of (nameR.meals || [])) if (!seen.has(m.idMeal)) { seen.add(m.idMeal); merged.push({ ...m, _hit:'name' }); }
    for (const m of (ingR.meals || [])) if (!seen.has(m.idMeal)) { seen.add(m.idMeal); merged.push({ ...m, _hit:'ingredient' }); }
    state.loading = false;
    if (merged.length === 0) {
      document.querySelector('.stage').innerHTML = `<div class="meal-error">Nothing matched "${q}".<em>either misspelled or genuinely doesn't exist.</em></div>`;
      return;
    }
    if (merged.length === 1) {
      const m = merged[0].strInstructions ? merged[0] : await fetchMealById(merged[0].idMeal);
      state.currentMeal = m; state.history.push(m.idMeal); state.view = 'meal'; render(); return;
    }
    state.results = merged; state.resultsLabel = `${merged.length} matches for "${q}"`; state.view = 'results'; render();
  } catch(err) {
    state.loading = false;
    document.querySelector('.stage').innerHTML = `<div class="meal-error">Search broke. <em>the internet let us down.</em></div>`;
  }
}

  $('ing-modal').classList.add('show');

  setTimeout(() => $('ing-search').focus(), 80);

function closeIng() { $('ing-modal').classList.remove('show'); }
function updateIngCount() { $('ing-selected-count').textContent = state.ingModalSelected.size; }
function paintIngGrid(filter) {
  const grid = $('ing-grid');
  const q = filter.toLowerCase();
  const items = state.allIngredients.filter(i => !q || i.toLowerCase().includes(q));
  const sel = items.filter(i => state.ingModalSelected.has(i));
  const rest = items.filter(i => !state.ingModalSelected.has(i));
  const sorted = [...sel, ...rest];
  if (sorted.length === 0) { grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--dim);padding:26px 20px;font-family:var(--mono);font-size:11px">Nothing matches "${filter}"</div>`; return; }
  grid.innerHTML = sorted.slice(0, 240).map(i => {
    const on = state.ingModalSelected.has(i);
    return `<button class="iopt ${on ? 'on' : ''}" data-ing="${i.replace(/"/g,'&quot;')}"><span class="ck"></span><span>${i}</span></button>`;
  }).join('');
  grid.querySelectorAll('.iopt').forEach(el => el.addEventListener('click', () => {
    const ing = el.dataset.ing;
    if (state.ingModalSelected.has(ing)) state.ingModalSelected.delete(ing); else state.ingModalSelected.add(ing);
    updateIngCount(); el.classList.toggle('on');
  }));
}

function mealShareURL(meal) {
  const base = location.origin + location.pathname.replace(/index\.html$/, '');
  return `${base}?m=${meal.idMeal}`;
}
function mealShareText(meal) {
  return `${meal.strMeal} — via WTF do I eat`;
}
async function shareNative(meal) {
  const url = mealShareURL(meal);
  const text = mealShareText(meal);
  if (navigator.share) {
    try { await navigator.share({ title: meal.strMeal, text, url }); return true; }
    catch(e) { if (e.name === 'AbortError') return true; }
  }
  return false;
}
function openShare(meal) {
  const url = mealShareURL(meal);
  const text = mealShareText(meal);
  const enc = encodeURIComponent;
  const sheet = $('share-sheet');
  $('share-preview').innerHTML = `
    <img src="${meal.strMealThumb}" alt="">
    <div class="info">
      <div class="n">${meal.strMeal}</div>
      <div class="u">${url.replace(/^https?:\/\//,'')}</div>
    </div>`;
  const opts = [
    { em:'●', label:'Share…', act:async () => { const ok = await shareNative(meal); if (ok) closeShare(); else toast('sharing not available on this device'); } },
    { em:'𝕏', label:'X', href:`https://twitter.com/intent/tweet?text=${enc(text)}&url=${enc(url)}` },
    { em:'W', label:'WhatsApp', href:`https://wa.me/?text=${enc(text + ' ' + url)}` },
    { em:'@', label:'Email', href:`mailto:?subject=${enc(meal.strMeal)}&body=${enc(text + '\n\n' + url)}` },
    { em:'R', label:'Reddit', href:`https://www.reddit.com/submit?url=${enc(url)}&title=${enc(meal.strMeal)}` },
    { em:'P', label:'Pinterest', href:`https://pinterest.com/pin/create/button/?url=${enc(url)}&media=${enc(meal.strMealThumb)}&description=${enc(text)}` },
    { em:'in', label:'LinkedIn', href:`https://www.linkedin.com/sharing/share-offsite/?url=${enc(url)}` },
    { em:'⧉', label:'Copy', act:() => copyLink(url) },
  ];
  $('share-opts').innerHTML = opts.map((o, i) => o.href
    ? `<a class="share-opt" href="${o.href}" target="_blank" rel="noopener" data-i="${i}"><span class="em">${o.em}</span>${o.label}</a>`
    : `<button class="share-opt" data-i="${i}"><span class="em">${o.em}</span>${o.label}</button>`
  ).join('');
  $('share-opts').querySelectorAll('[data-i]').forEach(el => el.addEventListener('click', () => {
    const o = opts[+el.dataset.i]; if (o.act) o.act(); if (o.href) closeShare();
  }));
  $('share-link').value = url;
  $('share-copy-btn').textContent = 'Copy';
  sheet.classList.add('show');
}

/* ═══════════════════════════════════════════════════════════════════════
   Doomscroll  ·  vertical snap feed with image prefetch
   ═══════════════════════════════════════════════════════════════════════ */
const DOOM = {
  el:null, queue:[], seen:new Set(), busy:false, currentIndex:0, io:null, warmed:new Set(),
  BUFFER_AHEAD:10,       // start fetching more when this close to end
  BATCH_SIZE:8,          // meals per fetch batch
  MIN_QUEUE:18,          // target queue size (always keep this many ahead)
  WARM_AHEAD:10,         // preload image for next N cards
  scrollScheduled:false,
};
function warmImage(src) {
  if (!src || DOOM.warmed.has(src)) return;
  DOOM.warmed.add(src);
  const i = new Image(); i.src = src;
}
async function fetchDoomBatch(n) {
  const diet = DIETS[state.diet];
  const poolIds = await computeCandidatePool();

  // Fully open — mix random + latest for variety
  if (poolIds === null) {
    const latestP = Math.random() < 0.3
      ? fetch(`${API}/latest.php`).then(r => r.json()).catch(() => ({})).then(r => (r.meals || []).sort(() => Math.random() - .5).slice(0, Math.min(3, n)))
      : Promise.resolve([]);
    const latest = await latestP;
    const need = Math.max(0, n - latest.length);
    const randoms = await Promise.all(Array.from({ length:need }, () => fetch(`${API}/random.php`).then(r => r.json()).catch(() => ({}))));
    return [...latest, ...randoms.map(r => r.meals && r.meals[0])].filter(Boolean);
  }

  if (poolIds.size === 0) return [];

  const unseen = [...poolIds].filter(id => !DOOM.seen.has(id));
  const pool = unseen.length ? unseen : [...poolIds];
  const shuffled = pool.slice().sort(() => Math.random() - .5);
  const takeN = diet.maxIngredients ? Math.min(shuffled.length, n * 2) : n;
  const chosen = shuffled.slice(0, takeN);
  const meals = (await Promise.all(chosen.map(id => fetchMealById(id).catch(() => null)))).filter(Boolean);
  if (diet.maxIngredients) return meals.filter(m => countIngredients(m) <= diet.maxIngredients).slice(0, n);
  return meals.slice(0, n);
}
async function fillDoomQueue() {
  if (DOOM.busy) return;
  DOOM.busy = true;
  showDoomLoadingCard();
  try {
    // Fill so there are always MIN_QUEUE cards AHEAD of current position
    const ahead = DOOM.queue.length - DOOM.currentIndex;
    const need = Math.max(0, DOOM.MIN_QUEUE - ahead);
    if (need > 0) {
      let meals = await fetchDoomBatch(Math.max(DOOM.BATCH_SIZE, need));
      const gotNew = meals.filter(m => !DOOM.seen.has(m.idMeal));
      if (gotNew.length < Math.max(3, DOOM.BATCH_SIZE / 2)) {
        // Seen set has drained the useful pool — rotate & re-fetch
        if (DOOM.seen.size > 40) {
          const arr = [...DOOM.seen];
          DOOM.seen = new Set(arr.slice(-15));
        }
        const extra = await fetchDoomBatch(DOOM.BATCH_SIZE).catch(() => []);
        meals = [...gotNew, ...extra];
      }
      let added = 0;
      for (const m of meals) {
        if (!DOOM.seen.has(m.idMeal)) {
          DOOM.seen.add(m.idMeal);
          DOOM.queue.push(m);
          warmImage(m.strMealThumb);
          appendDoomCard(m);
          added++;
        }
      }
      // Last-ditch: if we STILL added nothing (e.g. filters give tiny pool),
      // pull raw random meals as filler so the feed never dies
      if (added === 0 && need > 0) {
        const anyRandoms = await Promise.all(Array.from({ length: DOOM.BATCH_SIZE }, () =>
          fetch(`${API}/random.php`).then(r => r.json()).catch(() => ({}))
        ));
        for (const r of anyRandoms) {
          const m = r.meals && r.meals[0];
          if (m && !DOOM.seen.has(m.idMeal)) {
            DOOM.seen.add(m.idMeal);
            DOOM.queue.push(m);
            warmImage(m.strMealThumb);
            appendDoomCard(m);
          }
        }
      }
    }
  } catch(e) {
    console.warn('queue fill failed', e);
  } finally {
    DOOM.busy = false;
    removeDoomLoadingCard();
    // Show empty state if filters killed the pool and we have nothing
    if (DOOM.queue.length === 0 && (state.categories.length + state.cuisines.length + state.ingredients.length > 0 || state.diet !== 'any')) {
      showDoomEmpty();
      return;
    }
    // Recurse if still under threshold — forever scroll
    const stillAhead = DOOM.queue.length - DOOM.currentIndex;
    if (stillAhead < DOOM.MIN_QUEUE - 2 && DOOM.queue.length > 0) setTimeout(fillDoomQueue, 250);
  }
}

function showDoomLoadingCard() {
  if (!DOOM.el) return;
  if (DOOM.el.querySelector('.doom-loading-card')) return;
  const el = document.createElement('div');
  el.className = 'doom-card doom-loading-card';
  el.innerHTML = `<div class="loading-spin"><div class="ls-dot"></div><div class="ls-dot"></div><div class="ls-dot"></div></div><div class="loading-txt">finding more meals…</div>`;
  DOOM.el.appendChild(el);
}
function removeDoomLoadingCard() {
  if (!DOOM.el) return;
  DOOM.el.querySelectorAll('.doom-loading-card').forEach(el => el.remove());
}
function showDoomEmpty() {
  if (!DOOM.el) return;
  DOOM.el.querySelectorAll('.doom-card, .doom-empty').forEach(el => el.remove());
  const el = document.createElement('div');
  el.className = 'doom-empty';
  // Explain which filters killed it
  const chips = [];
  if (state.categories.length) chips.push('categories: ' + state.categories.join(', '));
  if (state.cuisines.length) chips.push('cuisines: ' + state.cuisines.join(', '));
  if (state.ingredients.length) chips.push('ingredients: ' + state.ingredients.join(', '));
  if (state.diet !== 'any') chips.push('mood: ' + DIETS[state.diet].label);
  const mode = state.chipMode === 'and' ? 'ALL' : 'ANY';
  el.innerHTML = `
    <h3>No meals survived those filters.</h3>
    <p>Currently matching <b>${mode}</b> of: ${chips.length ? chips.join(' · ') : '<b>nothing set</b>'}</p>

      ${state.chipMode === 'and' && chips.length > 1 ? '<button class="fix primary" data-fix="or">Try OR mode instead</button>' : ''}
      <button class="fix" data-fix="clear">Reset all filters</button>
      <button class="fix" data-fix="filter">Open filters</button>

  el.querySelector('[data-fix="clear"]')?.addEventListener('click', () => {

  });

}

/* ═══════ Haptic + sound feedback ═══════ */
function haptic(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}
let _actx = null;
function ensureAudio() { if (!_actx) { try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} } if (_actx && _actx.state === 'suspended') _actx.resume(); }
function chime(freq = 880, dur = 0.14) {
  if (!localStorage.getItem('wtf-sound-on')) return;
  ensureAudio(); if (!_actx) return;
  const t = _actx.currentTime, o = _actx.createOscillator(), g = _actx.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.12, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(_actx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}

async function runSearchAndFeed(q) {
  q = q.trim();
  if (!q) return;
  closeSheet('search-sheet');
  try {
    const [nameR, ingR] = await Promise.all([
      fetch(`${API}/search.php?s=${encodeURIComponent(q)}`).then(r => r.json()).catch(() => ({ meals:[] })),
      fetch(`${API}/filter.php?i=${encodeURIComponent(q.replace(/\s+/g,'_'))}`).then(r => r.json()).catch(() => ({ meals:[] })),
    ]);
    const seen = new Set(); const merged = [];
    for (const m of (nameR.meals || [])) if (!seen.has(m.idMeal)) { seen.add(m.idMeal); merged.push(m); }
    for (const m of (ingR.meals || [])) if (!seen.has(m.idMeal)) {
      seen.add(m.idMeal);
      const full = await fetchMealById(m.idMeal).catch(() => null);
      if (full) merged.push(full);
    }
    if (!merged.length) { toast(`nothing for "${q}"`); return; }
    // Seed doom feed with these
    DOOM.queue = []; DOOM.seen.clear(); DOOM.currentIndex = 0; DOOM.warmed.clear();
    DOOM.el.querySelectorAll('.doom-card').forEach(c => c.remove());
    for (const m of merged) {
      if (!DOOM.seen.has(m.idMeal)) {
        DOOM.seen.add(m.idMeal);
        DOOM.queue.push(m);
        warmImage(m.strMealThumb);
        appendDoomCard(m);
      }
    }
    DOOM.el.scrollTo({ top:0, behavior:'auto' });
    toast(`${merged.length} results for "${q}"`);
  } catch (e) { toast('search broke'); }
}

/* ═══════════════════════════════════════════════════════════════════════
   Cook Mode  ·  hands-free step-by-step + TTS + timers + wake lock
   ═══════════════════════════════════════════════════════════════════════ */
const COOK = { meal:null, steps:[], idx:0, wake:null, timerId:0, timerEndsAt:0, timerLabel:'', synth:null, utter:null };

function detectTimersInStep(txt) {
  // Return array of {label, seconds} found in step text
  const out = [];
  const re = /(\d+)\s*(?:-\s*\d+\s*)?\s*(seconds?|secs?|minutes?|mins?|hours?|hrs?)/gi;
  let m;
  while ((m = re.exec(txt)) !== null) {
    const n = Number(m[1]);
    const unit = m[2].toLowerCase();
    let s;
    if (unit.startsWith('sec')) s = n;
    else if (unit.startsWith('min')) s = n * 60;
    else s = n * 3600;
    if (s > 0 && s <= 7200) out.push({ label: `${n} ${unit}`, seconds: s });
  }
  return out;
}

async function openCookMode(meal, steps) {
  COOK.meal = meal;
  COOK.steps = steps.length ? steps : ['(no recipe steps found)'];
  COOK.idx = 0;
  const el = document.getElementById('cook');
  el.classList.add('show');
  renderCookStep();

  // Wake lock (keeps phone screen on while cooking)
  try {
    if ('wakeLock' in navigator) COOK.wake = await navigator.wakeLock.request('screen');
  } catch(e) {}

  document.getElementById('cook-back').onclick = closeCookMode;
  document.getElementById('cook-next').onclick = () => {
    if (COOK.idx < COOK.steps.length - 1) { COOK.idx++; renderCookStep(); haptic(20); }
    else { closeCookMode(); toast('recipe complete'); chime(1200, 0.2); }
  };
  document.getElementById('cook-prev').onclick = () => {
    if (COOK.idx > 0) { COOK.idx--; renderCookStep(); haptic(15); }
  };
  document.getElementById('cook-sound').onclick = () => toggleSpeak();
  document.getElementById('cook-timer-stop').onclick = stopCookTimer;
}

function closeCookMode() {
  const el = document.getElementById('cook');
  el.classList.remove('show');
  stopCookTimer();
  stopSpeak();
  try { if (COOK.wake) COOK.wake.release(); } catch(e) {}
  COOK.wake = null;
}

function renderCookStep() {
  const el = document.getElementById('cook');
  document.getElementById('cook-meal').textContent = COOK.meal.strMeal;
  document.getElementById('cook-step-n').textContent = `Step ${COOK.idx + 1} of ${COOK.steps.length}`;
  document.getElementById('cook-step').textContent = COOK.steps[COOK.idx];
  const pct = ((COOK.idx + 1) / COOK.steps.length) * 100;
  document.getElementById('cook-progress').style.setProperty('--pct', pct + '%');
  const prev = document.getElementById('cook-prev');
  const next = document.getElementById('cook-next');
  prev.disabled = COOK.idx === 0;
  next.textContent = COOK.idx === COOK.steps.length - 1 ? '✓ done' : 'next step →';
  next.classList.toggle('done', COOK.idx === COOK.steps.length - 1);

  // Quick timers detected in this step
  const timers = detectTimersInStep(COOK.steps[COOK.idx]);
  const quick = document.getElementById('cook-quick');
  quick.innerHTML = timers.map((t, i) => `<button data-t="${t.seconds}" data-l="${t.label}">Start ${t.label} timer</button>`).join('');
  quick.querySelectorAll('[data-t]').forEach(b => b.onclick = () => startCookTimer(Number(b.dataset.t), b.dataset.l));

  stopCookTimer();
}

function startCookTimer(seconds, label) {
  stopCookTimer();
  COOK.timerEndsAt = Date.now() + seconds * 1000;
  COOK.timerLabel = label;
  const tel = document.getElementById('cook-timer');
  tel.style.display = 'flex';
  tel.classList.remove('done');
  document.getElementById('cook-timer-lbl').textContent = 'timer · ' + label;
  const tick = () => {
    const remain = Math.max(0, COOK.timerEndsAt - Date.now());
    const s = Math.floor(remain / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    document.getElementById('cook-timer-face').textContent = `${mm}:${ss}`;
    if (remain <= 0) {
      tel.classList.add('done');
      clearInterval(COOK.timerId); COOK.timerId = 0;
      // Alarm
      for (let i = 0; i < 3; i++) setTimeout(() => chime(880 + i * 100, 0.25), i * 350);
      haptic([80, 60, 80, 60, 200]);
      toast(label + ' done');
    }
  };
  tick();
  COOK.timerId = setInterval(tick, 250);
}
function stopCookTimer() {
  clearInterval(COOK.timerId); COOK.timerId = 0;
  const tel = document.getElementById('cook-timer');
  if (tel) { tel.style.display = 'none'; tel.classList.remove('done'); }
}

/* ── TTS ── */
function toggleSpeak() {
  if (COOK.utter && COOK.synth && (COOK.synth.speaking || COOK.synth.paused)) { stopSpeak(); return; }
  speakCurrentStep();
}
function speakCurrentStep() {
  if (!window.speechSynthesis) { toast('voice not supported'); return; }
  stopSpeak();
  COOK.synth = window.speechSynthesis;
  const text = `Step ${COOK.idx + 1}. ${COOK.steps[COOK.idx]}`;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.98; u.pitch = 1.0;
  // Prefer natural-ish voice
  const voices = COOK.synth.getVoices();
  const pref = voices.find(v => /english/i.test(v.name) && /natural|neural/i.test(v.name))
             || voices.find(v => v.lang && v.lang.startsWith('en'));
  if (pref) u.voice = pref;
  u.onend = () => { document.getElementById('cook-sound').classList.remove('speaking'); };
  u.onerror = u.onend;
  COOK.utter = u;
  COOK.synth.speak(u);
  document.getElementById('cook-sound').classList.add('speaking');
}
function stopSpeak() {
  try { if (COOK.synth) COOK.synth.cancel(); } catch(e) {}
  const b = document.getElementById('cook-sound');
  if (b) b.classList.remove('speaking');
}

/* ═══════════════════════════════════════════════════════════════════════
   TheCocktailDB pairing  ·  same team as TheMealDB, no key
   ═══════════════════════════════════════════════════════════════════════ */
const COCKTAIL_API = 'https://www.thecocktaildb.com/api/json/v1/1';
// Curated cuisine → pairing suggestions
const CUISINE_COCKTAILS = {
  Italian:['Negroni','Aperol Spritz','Bellini','Espresso Martini'],
  Mexican:['Margarita','Paloma','Michelada','Mezcal Sour'],
  Japanese:['Whiskey Highball','Sake','Yuzu Sour','Japanese Slipper'],
  Chinese:['Lychee Martini','Ginger Highball','Mai Tai'],
  Thai:['Thai Basil Smash','Lemongrass Cooler','Mai Tai'],
  Vietnamese:['Vietnamese Coffee','Saigon Sunrise'],
  Indian:['Bombay Sling','Chai Old Fashioned','Mango Lassi'],
  French:['Kir Royale','French 75','Sidecar','Champagne Cocktail'],
  British:["Pimm's Cup",'Gin and Tonic','Espresso Martini'],
  American:['Old Fashioned','Manhattan','Whiskey Sour','Moscow Mule'],
  Greek:['Ouzo','Mythos'],
  Spanish:['Sangria','Rebujito','Tinto de Verano'],
  Turkish:['Raki','Turkish Coffee'],
  Moroccan:['Mint Julep','Casablanca Cooler'],
  Jamaican:['Rum Punch','Dark and Stormy','Mojito'],
  Irish:['Irish Coffee','Guinness'],
  Malaysian:['Singapore Sling','Passionfruit Caipirinha'],
};
// Category → pairing hints
const CAT_COCKTAILS = {
  Dessert:['Espresso Martini','White Russian','Grasshopper','Amaretto Sour'],
  Beef:['Old Fashioned','Manhattan','Bloody Mary'],
  Pork:['Old Fashioned','Bourbon Smash'],
  Chicken:['Aperol Spritz','Gin and Tonic','Margarita'],
  Seafood:['Aperol Spritz','Vesper Martini','Champagne Cocktail','Bloody Mary'],
  Pasta:['Negroni','Chianti','Aperol Spritz'],
  Vegan:['Cucumber Cooler','Virgin Mojito','Ginger Fizz'],
  Vegetarian:['Aperol Spritz','Gin and Tonic'],
  Breakfast:['Bloody Mary','Mimosa','Espresso Martini'],
  Side:['Aperol Spritz','Prosecco'],
  Starter:['Aperol Spritz','Prosecco','Champagne Cocktail'],
  Lamb:['Old Fashioned','Red Wine Sangria'],
};
const cocktailCache = new Map();
async function searchCocktail(name) {
  if (cocktailCache.has(name)) return cocktailCache.get(name);
  const r = await fetch(`${COCKTAIL_API}/search.php?s=${encodeURIComponent(name)}`).then(r => r.json()).catch(() => ({}));
  const first = r.drinks && r.drinks[0];
  cocktailCache.set(name, first || null);
  return first || null;
}
async function fetchCocktailPairing(meal) {
  const candidates = [];
  if (meal.strArea && CUISINE_COCKTAILS[meal.strArea]) candidates.push(...CUISINE_COCKTAILS[meal.strArea]);
  if (meal.strCategory && CAT_COCKTAILS[meal.strCategory]) candidates.push(...CAT_COCKTAILS[meal.strCategory]);
  // Try curated in random order — first hit wins
  for (const name of candidates.sort(() => Math.random() - .5)) {
    try {
      const c = await searchCocktail(name);
      if (c) return c;
    } catch(e) {}
  }
  // Fallback to random cocktail
  try {
    const r = await fetch(`${COCKTAIL_API}/random.php`).then(r => r.json());
    return r.drinks && r.drinks[0];
  } catch(e) { return null; }
}

/* ═══════════════════════════════════════════════════════════════════════
   Filter sheet  ·  moves toolbar dropdowns into a bottom sheet
   ═══════════════════════════════════════════════════════════════════════ */
function openFilterSheet() {
  const body = $('filter-sheet-body');
  const dietOpts = Object.entries(DIETS).map(([k, d]) => `
    <button class="fs-diet-opt ${k === state.diet ? 'on' : ''}" data-val="${k}">
      <span class="em">${d.em}</span>
      <span class="txt"><span class="n">${d.label}</span><span class="s">${d.sub}</span></span>
    </button>`).join('');

  const catChips = state.allCategories.map(c => {
    const on = state.categories.includes(c);
    return `<button class="fs-chip ${on ? 'on' : ''}" data-type="category" data-val="${c}">${c}</button>`;
  }).join('');
  const cuiChips = state.allCuisines.map(a => {
    const on = state.cuisines.includes(a);
    return `<button class="fs-chip ${on ? 'on' : ''}" data-type="cuisine" data-val="${a}">${a}</button>`;
  }).join('');
  const ingChips = state.ingredients.map(ing =>
    `<button class="fs-chip on" data-type="ingredient" data-val="${ing}">${ing}</button>`
  ).join('');

  body.innerHTML = `
    <div class="fs-mode">
      <div class="k">Match meals that satisfy</div>
      <div class="chip-mode" style="margin:0">
        <button data-mode="and" class="${state.chipMode === 'and' ? 'on' : ''}">ALL filters (AND)</button>
        <button data-mode="or" class="${state.chipMode === 'or' ? 'on' : ''}">ANY filter (OR)</button>
      </div>
    </div>

    <div class="fs-section">
      <h4>Mood</h4>
      <div class="fs-diets">${dietOpts}</div>
    </div>

    <div class="fs-section">
      <h4>Categories <span class="hint-lite">${state.categories.length ? state.categories.length + ' selected' : 'tap to add'}</span></h4>
      <div class="fs-chips">${catChips}</div>
    </div>

    <div class="fs-section">
      <h4>Cuisines <span class="hint-lite">${state.cuisines.length ? state.cuisines.length + ' selected' : 'tap to add'}</span></h4>
      <div class="fs-chips">${cuiChips}</div>
    </div>

    <div class="fs-section">
      <h4>Ingredients <span class="hint-lite">${state.ingredients.length ? state.ingredients.length + ' picked' : 'browse the pantry'}</span></h4>
      <div class="fs-chips" id="fs-ing-chips">${ingChips}</div>
      <button class="mbtn" id="fs-open-fridge" style="width:100%;margin-top:8px">Open fridge</button>
    </div>

    <div class="fsheet-btns">
      <button class="mbtn" id="fs-reset">Reset all</button>
      <button class="mbtn primary" id="fs-apply">Apply · Refresh feed</button>
    </div>
  `;

  body.querySelector('.chip-mode').addEventListener('click', e => {
    const b = e.target.closest('button[data-mode]'); if (!b) return;
    state.chipMode = b.dataset.mode;
    body.querySelectorAll('.chip-mode button').forEach(x => x.classList.toggle('on', x === b));
  });

  body.querySelector('.fs-diets').addEventListener('click', e => {
    const b = e.target.closest('.fs-diet-opt'); if (!b) return;
    state.diet = b.dataset.val || 'any';
    body.querySelectorAll('.fs-diet-opt').forEach(x => x.classList.toggle('on', x === b));
  });

  body.querySelectorAll('.fs-chips').forEach(container => {
    container.addEventListener('click', e => {
      const b = e.target.closest('.fs-chip'); if (!b) return;
      const type = b.dataset.type, val = b.dataset.val;
      const bucket = type === 'category' ? state.categories : type === 'cuisine' ? state.cuisines : state.ingredients;
      const i = bucket.indexOf(val);
      if (i >= 0) { bucket.splice(i, 1); b.classList.remove('on'); }
      else { bucket.push(val); b.classList.add('on'); }
      if (type === 'ingredient') {
        // if it was an already-picked chip and got removed, drop the visual chip
        if (i >= 0) b.remove();
      }
      // Update section-level count hint
      body.querySelectorAll('.fs-section h4').forEach(h => {
        const label = h.textContent.trim().split(' ')[0];
        // (skip live-updating — user can see the button state)
      });
    });
  });

  $('fs-open-fridge').addEventListener('click', () => {
    closeSheet('filter-sheet');
    setTimeout(openIng, 120);
  });

  $('fs-reset').addEventListener('click', () => {
    state.diet = 'any'; state.categories = []; state.cuisines = []; state.ingredients = [];
    openFilterSheet(); // rebuild
  });
  $('fs-apply').addEventListener('click', () => {
    closeSheet('filter-sheet');
    refreshFeed();
  });

  $('filter-sheet').classList.add('show');
}

/* Sheet close helpers */
function closeSheet(id) { const el = $(id); if (el) el.classList.remove('show'); }
// Search sheet wiring
document.addEventListener('DOMContentLoaded', () => {
  const goBtn = $('search-sheet-go'), inp = $('search-sheet-input');
  if (goBtn) goBtn.addEventListener('click', () => runSearchAndFeed(inp.value));

document.querySelectorAll('[data-close-sheet]').forEach(el => {

});
['details-sheet','filter-sheet'].forEach(id => {

});

/* ═══════════════════════════════════════════════════════════════════════
   Deep links  ·  ?m=<mealId>
   ═══════════════════════════════════════════════════════════════════════ */
async function loadFromURL() {
  const p = new URLSearchParams(location.search);
  const id = p.get('m');
  if (!id) return;
  try {
    state.loading = true; render();
    const m = await fetchMealById(id);
    if (m) {
      state.currentMeal = m; state.history.push(m.idMeal); state.view = 'meal';
    }
    state.loading = false; render();
  } catch(e) { state.loading = false; render(); }
}
